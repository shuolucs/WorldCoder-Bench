<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldCoder-Bench — Interactive 3D World Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fafbfc;
      color: #1a1a2e;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 24px 40px;
      background: #fff;
      border-bottom: 1px solid #eef0f2;
    }
    .hero h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: #1a1a2e;
    }
    .hero h1 span { color: #6366f1; }
    .hero p {
      font-size: 1rem;
      color: #64748b;
      max-width: 640px;
      margin: 0 auto 20px;
    }
    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      flex-wrap: wrap;
    }
    .hero-stat {
      text-align: center;
    }
    .hero-stat .num {
      font-size: 1.5rem;
      font-weight: 700;
      color: #6366f1;
    }
    .hero-stat .label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Filter Tabs */
    .filters {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      border-bottom: 1px solid #eef0f2;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      transition: all 0.15s ease;
    }
    .filter-btn:hover {
      border-color: #6366f1;
      color: #6366f1;
    }
    .filter-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    /* Grid */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
      .hero { padding: 40px 16px 28px; }
      .hero h1 { font-size: 1.6rem; }
    }

    /* Cards */
    .card {
      background: #fff;
      border: 1px solid #eef0f2;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(99,102,241,0.08), 0 4px 12px rgba(0,0,0,0.04);
    }
    .card-preview {
      width: 100%;
      height: 180px;
      position: relative;
      background: #f1f5f9;
      overflow: hidden;
    }
    .card-preview iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }
    .card-preview .placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #cbd5e1;
      font-size: 2rem;
    }
    .card-body {
      padding: 14px 16px 16px;
    }
    .card-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 10px;
    }
    .card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }
    .tag {
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 500;
    }
    .tag-domain {
      background: #eef2ff;
      color: #6366f1;
    }
    .tag-diff {
      background: #ecfdf5;
      color: #059669;
    }
    .tag-models {
      background: #fef3c7;
      color: #d97706;
    }
    .card-play {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 500;
      color: #6366f1;
    }
    .card-play svg {
      width: 14px;
      height: 14px;
    }

    /* Overlay */
    .overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(15,23,42,0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .overlay.active { display: flex; }
    .overlay-panel {
      width: 100%;
      max-width: 1100px;
      height: 85vh;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 25px 60px rgba(0,0,0,0.15);
    }
    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #eef0f2;
      gap: 12px;
    }
    .overlay-title {
      font-size: 1rem;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .model-tabs {
      display: flex;
      gap: 6px;
    }
    .model-tab {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid #e2e8f0;
      background: #fff;
      color: #64748b;
      cursor: pointer;
      transition: all 0.15s;
    }
    .model-tab:hover { border-color: #6366f1; color: #6366f1; }
    .model-tab.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }
    .close-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      color: #64748b;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .close-btn:hover { background: #fee2e2; color: #dc2626; border-color: #fecaca; }
    .overlay-frame {
      flex: 1;
      border: none;
      width: 100%;
    }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #94a3b8;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>World<span>Coder</span>-Bench</h1>
    <p>Browse and play interactive 3D worlds generated by frontier LLMs. Each scene is a self-contained Three.js program created from natural language.</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num" id="stat-games">—</div><div class="label">Worlds</div></div>
      <div class="hero-stat"><div class="num">3</div><div class="label">Models</div></div>
      <div class="hero-stat"><div class="num">6</div><div class="label">Domains</div></div>
    </div>
  </div>

  <div class="filters" id="filters"></div>

  <div class="container">
    <div class="grid" id="grid"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-panel">
      <div class="overlay-header">
        <div class="overlay-title" id="overlay-title"></div>
        <div class="model-tabs" id="model-tabs"></div>
        <button class="close-btn" id="close-btn">&times;</button>
      </div>
      <iframe class="overlay-frame" id="game-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>
  </div>

  <script>
    const DOMAINS = ['all','physics','game','product','education','visualization','creative'];
    const MODEL_LABELS = { gpt54: 'GPT-5.4', opus46: 'Claude Opus', gemini31: 'Gemini 3.1' };

    let games = [];
    let currentDomain = 'all';
    let currentGame = null;
    let currentModel = 'gpt54';

    async function init() {
      const res = await fetch('games.json');
      games = await res.json();
      document.getElementById('stat-games').textContent = games.length;
      renderFilters();
      renderGrid();
    }

    function renderFilters() {
      const el = document.getElementById('filters');
      DOMAINS.forEach(d => {
        const btn = document.createElement('button');
        btn.className = `filter-btn ${d === 'all' ? 'active' : ''}`;
        const count = d === 'all' ? games.length : games.filter(g => g.domain === d).length;
        btn.textContent = `${d === 'all' ? 'All' : d.charAt(0).toUpperCase() + d.slice(1)} (${count})`;
        btn.onclick = () => {
          currentDomain = d;
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGrid();
        };
        el.appendChild(btn);
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const filtered = currentDomain === 'all' ? games : games.filter(g => g.domain === currentDomain);

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty">No worlds in this category.</div>';
        return;
      }

      grid.innerHTML = filtered.map(g => `
        <div class="card" onclick="openGame('${g.id}')">
          <div class="card-preview" data-id="${g.id}">
            <div class="placeholder">&#9654;</div>
          </div>
          <div class="card-body">
            <div class="card-title">${g.title}</div>
            <div class="card-tags">
              <span class="tag tag-domain">${g.domain}</span>
              <span class="tag tag-diff">${g.difficulty}</span>
              <span class="tag tag-models">${g.models.length} models</span>
            </div>
            <div class="card-play">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Try to Play
            </div>
          </div>
        </div>
      `).join('');

      lazyLoadPreviews();
    }

    function lazyLoadPreviews() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const el = entry.target;
            const id = el.dataset.id;
            const game = games.find(g => g.id === id);
            if (game) {
              const model = game.models.includes('gpt54') ? 'gpt54' : game.models[0];
              const iframe = document.createElement('iframe');
              iframe.src = `games/${id}/${model}.html`;
              iframe.loading = 'lazy';
              iframe.sandbox = 'allow-scripts allow-same-origin';
              el.querySelector('.placeholder').remove();
              el.appendChild(iframe);
            }
            observer.unobserve(el);
          }
        });
      }, { rootMargin: '200px' });
      document.querySelectorAll('.card-preview[data-id]').forEach(el => observer.observe(el));
    }

    function openGame(id) {
      currentGame = games.find(g => g.id === id);
      if (!currentGame) return;
      currentModel = currentGame.models.includes('gpt54') ? 'gpt54' : currentGame.models[0];
      document.getElementById('overlay-title').textContent = currentGame.title;
      renderModelTabs();
      loadGameFrame();
      document.getElementById('overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function renderModelTabs() {
      const el = document.getElementById('model-tabs');
      el.innerHTML = currentGame.models.map(m =>
        `<button class="model-tab ${m === currentModel ? 'active' : ''}" onclick="switchModel('${m}')">${MODEL_LABELS[m] || m}</button>`
      ).join('');
    }

    function switchModel(m) {
      currentModel = m;
      renderModelTabs();
      loadGameFrame();
    }

    function loadGameFrame() {
      document.getElementById('game-frame').src = `games/${currentGame.id}/${currentModel}.html`;
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('game-frame').src = '';
      document.body.style.overflow = '';
    }

    document.getElementById('close-btn').onclick = closeOverlay;
    document.getElementById('overlay').onclick = (e) => {
      if (e.target === document.getElementById('overlay')) closeOverlay();
    };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

    init();
  </script>
</body>
</html>
