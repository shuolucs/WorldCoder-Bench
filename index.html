<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WorldCoder-Bench — Interactive 3D World Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f0f14;
      --card: #1a1a24;
      --border: rgba(255,255,255,0.08);
      --text: #e8e8f0;
      --dim: #7a7a90;
      --accent: #6366f1;
      --green: #10b981;
      --orange: #f59e0b;
      --radius: 12px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,20,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .logo { font-size: 20px; font-weight: 700; }
    .logo span { color: var(--accent); }
    .stats { font-size: 13px; color: var(--dim); }
    .tabs {
      display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
      padding-bottom: 2px;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500; cursor: pointer;
      border: 1px solid var(--border); background: transparent;
      color: var(--dim); transition: all 0.2s;
    }
    .tab:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px; padding: 24px;
    }
    @media (max-width: 640px) { .grid { grid-template-columns: 1fr; padding: 12px; } }

    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(99,102,241,0.1);
    }
    .card-preview {
      width: 100%; height: 200px; position: relative;
      background: #0a0a10; overflow: hidden;
    }
    .card-preview iframe {
      width: 100%; height: 100%; border: none;
      pointer-events: none; transform: scale(1); transform-origin: top left;
    }
    .card-info { padding: 12px 16px; }
    .card-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-bottom: 8px;
    }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; }
    .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500;
    }
    .badge-domain { background: rgba(99,102,241,0.15); color: #a5b4fc; }
    .badge-diff { background: rgba(16,185,129,0.12); color: #6ee7b7; }
    .badge-models { background: rgba(245,158,11,0.12); color: #fbbf24; }

    .overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.95); display: none;
      flex-direction: column;
    }
    .overlay.active { display: flex; }
    .overlay-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: rgba(20,20,30,0.9);
      border-bottom: 1px solid var(--border);
    }
    .overlay-title { font-size: 15px; font-weight: 600; }
    .model-tabs { display: flex; gap: 6px; }
    .model-tab {
      padding: 4px 12px; border-radius: 14px; font-size: 12px;
      border: 1px solid var(--border); background: transparent;
      color: var(--dim); cursor: pointer; transition: all 0.2s;
    }
    .model-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .close-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: none;
      color: #fff; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: rgba(255,255,255,0.2); }
    .overlay iframe { flex: 1; border: none; width: 100%; }

    .empty { text-align: center; padding: 60px; color: var(--dim); font-size: 15px; }
    .loading { text-align: center; padding: 60px; color: var(--dim); }
  </style>
</head>
<body>
  <header>
    <div class="header-top">
      <div class="logo">World<span>Coder</span>-Bench</div>
      <div class="stats" id="stats"></div>
    </div>
    <div class="tabs" id="tabs"></div>
  </header>
  <div class="grid" id="grid"><div class="loading">Loading games...</div></div>

  <div class="overlay" id="overlay">
    <div class="overlay-bar">
      <div class="overlay-title" id="overlay-title"></div>
      <div class="model-tabs" id="model-tabs"></div>
      <button class="close-btn" id="close-btn">&times;</button>
    </div>
    <iframe id="game-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>

  <script>
    const DOMAINS = ['all','physics','game','product','education','visualization','creative'];
    const MODEL_LABELS = { gpt54: 'GPT-5.4', opus46: 'Claude Opus', gemini31: 'Gemini 3.1' };

    let games = [];
    let currentDomain = 'all';
    let currentGame = null;
    let currentModel = 'gpt54';

    async function init() {
      const res = await fetch('games.json');
      games = await res.json();
      renderTabs();
      renderGrid();
    }

    function renderTabs() {
      const el = document.getElementById('tabs');
      DOMAINS.forEach(d => {
        const tab = document.createElement('div');
        tab.className = `tab ${d === 'all' ? 'active' : ''}`;
        tab.textContent = d === 'all' ? `All (${games.length})` : `${d.charAt(0).toUpperCase()+d.slice(1)} (${games.filter(g=>g.domain===d).length})`;
        tab.onclick = () => {
          currentDomain = d;
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          renderGrid();
        };
        el.appendChild(tab);
      });
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      const filtered = currentDomain === 'all' ? games : games.filter(g => g.domain === currentDomain);
      document.getElementById('stats').textContent = `${filtered.length} interactive 3D worlds`;

      if (!filtered.length) { grid.innerHTML = '<div class="empty">No games in this category</div>'; return; }

      grid.innerHTML = filtered.map(g => `
        <div class="card" onclick="openGame('${g.id}')">
          <div class="card-preview" data-id="${g.id}"></div>
          <div class="card-info">
            <div class="card-title">${g.title}</div>
            <div class="card-meta">
              <span class="badge badge-domain">${g.domain}</span>
              <span class="badge badge-diff">${g.difficulty}</span>
              <span class="badge badge-models">${g.models.length} models</span>
            </div>
          </div>
        </div>
      `).join('');

      lazyLoadPreviews();
    }

    function lazyLoadPreviews() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const el = entry.target;
            const id = el.dataset.id;
            const game = games.find(g => g.id === id);
            if (game) {
              const model = game.models.includes('gpt54') ? 'gpt54' : game.models[0];
              const iframe = document.createElement('iframe');
              iframe.src = `games/${id}/${model}.html`;
              iframe.loading = 'lazy';
              iframe.sandbox = 'allow-scripts allow-same-origin';
              el.appendChild(iframe);
            }
            observer.unobserve(el);
          }
        });
      }, { rootMargin: '200px' });
      document.querySelectorAll('.card-preview[data-id]').forEach(el => observer.observe(el));
    }

    function openGame(id) {
      currentGame = games.find(g => g.id === id);
      if (!currentGame) return;
      currentModel = currentGame.models.includes('gpt54') ? 'gpt54' : currentGame.models[0];

      document.getElementById('overlay-title').textContent = currentGame.title;
      renderModelTabs();
      loadGameFrame();
      document.getElementById('overlay').classList.add('active');
    }

    function renderModelTabs() {
      const el = document.getElementById('model-tabs');
      el.innerHTML = currentGame.models.map(m =>
        `<div class="model-tab ${m===currentModel?'active':''}" onclick="switchModel('${m}')">${MODEL_LABELS[m]||m}</div>`
      ).join('');
    }

    function switchModel(m) {
      currentModel = m;
      renderModelTabs();
      loadGameFrame();
    }

    function loadGameFrame() {
      document.getElementById('game-frame').src = `games/${currentGame.id}/${currentModel}.html`;
    }

    function closeOverlay() {
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('game-frame').src = '';
    }

    document.getElementById('close-btn').onclick = closeOverlay;
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

    init();
  </script>
</body>
</html>
