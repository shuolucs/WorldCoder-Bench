<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Double Spring-Mass System</title>
<style>
  body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    color: #00ff88;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid #00ff8844;
    min-width: 220px;
    z-index: 100;
  }
  #hud .label { color: #aaaacc; }
  #hud .value { color: #00ff88; }
  #hud .status-on { color: #00ff00; }
  #hud .status-off { color: #ff4444; }
  #controls {
    position: fixed;
    bottom: 10px;
    left: 10px;
    color: #888;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
    z-index: 100;
  }
</style>
</head>
<body>
<div id="hud"></div>
<div id="controls">
  <b style="color:#aaa;">Controls:</b><br>
  Drag masses to reposition | R: Reset | G: Toggle Gravity<br>
  Space: Pause | 1: Impulse A ↑ | 2: Impulse B ↓ | D: Toggle Damping
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
  directionalLight.position.set(5, 10, 7);
  scene.add(directionalLight);

  // Anchor
  const anchorY = 4;
  const anchorGeom = new THREE.BoxGeometry(0.4, 0.4, 0.4);
  const anchorMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
  const anchorMesh = new THREE.Mesh(anchorGeom, anchorMat);
  anchorMesh.position.set(0, anchorY, 0);
  scene.add(anchorMesh);

  // Mass A (red sphere)
  const massAGeom = new THREE.SphereGeometry(0.3, 32, 32);
  const massAMat = new THREE.MeshPhongMaterial({ color: 0xff3333, shininess: 80 });
  const massAMesh = new THREE.Mesh(massAGeom, massAMat);
  scene.add(massAMesh);

  // Mass B (blue sphere)
  const massBGeom = new THREE.SphereGeometry(0.3, 32, 32);
  const massBMat = new THREE.MeshPhongMaterial({ color: 0x3333ff, shininess: 80 });
  const massBMesh = new THREE.Mesh(massBGeom, massBMat);
  scene.add(massBMesh);

  // Spring visualization
  const springSegments = 20;

  function createSpringGeometry() {
    const points = [];
    for (let i = 0; i <= springSegments; i++) {
      points.push(new THREE.Vector3(0, 0, 0));
    }
    return new THREE.BufferGeometry().setFromPoints(points);
  }

  const spring1Geom = createSpringGeometry();
  const spring1Mat = new THREE.LineBasicMaterial({ color: 0xffff00, linewidth: 2 });
  const spring1Line = new THREE.Line(spring1Geom, spring1Mat);
  scene.add(spring1Line);

  const spring2Geom = createSpringGeometry();
  const spring2Mat = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
  const spring2Line = new THREE.Line(spring2Geom, spring2Mat);
  scene.add(spring2Line);

  function updateSpringGeometry(geometry, topY, bottomY, amplitude) {
    const positions = geometry.attributes.position.array;
    const length = topY - bottomY;
    const amp = amplitude * Math.min(1, Math.abs(length) / 0.5);

    for (let i = 0; i <= springSegments; i++) {
      const t = i / springSegments;
      const y = topY - t * (topY - bottomY);
      let x = 0;
      let z = 0;

      if (i > 0 && i < springSegments) {
        const zigzag = (i % 2 === 0) ? 1 : -1;
        x = zigzag * amp;
        z = zigzag * amp * 0.3;
      }

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;
    }
    geometry.attributes.position.needsUpdate = true;
  }

  // Physics state
  const state = {
    massA_y: 2.0,
    massB_y: 0.0,
    velA: 0.0,
    velB: 0.0,
    spring1_length: 2.0,
    spring2_length: 2.0,
    totalEnergy: 0.0,
    gravityOn: true,
    paused: false,
    dampingOn: true,
    draggingA: false,
    draggingB: false,
    simTime: 0.0,
    massA_mass: 1.0,
    massB_mass: 1.5,
    k1: 20,
    k2: 15
  };

  window.__3D_STATE__ = state;

  const g_value = 9.81;
  const restLength1 = 2.0;
  const restLength2 = 2.0;
  const dampingCoeff = 0.05;
  const dt = 1 / 60;

  // Drag state
  let isDragging = false;
  let dragTarget = null; // 'A' or 'B'
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

  function getMouseWorldY(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersection);
    return intersection ? intersection.y : null;
  }

  renderer.domElement.addEventListener('mousedown', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const intersectsA = raycaster.intersectObject(massAMesh);
    const intersectsB = raycaster.intersectObject(massBMesh);

    if (intersectsA.length > 0 && (intersectsB.length === 0 || intersectsA[0].distance <= intersectsB[0].distance)) {
      isDragging = true;
      dragTarget = 'A';
      state.draggingA = true;
      state.velA = 0;
    } else if (intersectsB.length > 0) {
      isDragging = true;
      dragTarget = 'B';
      state.draggingB = true;
      state.velB = 0;
    }
  });

  renderer.domElement.addEventListener('mousemove', (event) => {
    if (!isDragging) return;
    const worldY = getMouseWorldY(event);
    if (worldY === null) return;

    if (dragTarget === 'A') {
      state.massA_y = worldY;
      state.velA = 0;
    } else if (dragTarget === 'B') {
      state.massB_y = worldY;
      state.velB = 0;
    }
  });

  renderer.domElement.addEventListener('mouseup', () => {
    isDragging = false;
    state.draggingA = false;
    state.draggingB = false;
    dragTarget = null;
  });

  renderer.domElement.addEventListener('mouseleave', () => {
    isDragging = false;
    state.draggingA = false;
    state.draggingB = false;
    dragTarget = null;
  });

  // Keyboard controls
  document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'r') {
      state.massA_y = 2.0;
      state.massB_y = 0.0;
      state.velA = 0;
      state.velB = 0;
    } else if (key === 'g') {
      state.gravityOn = !state.gravityOn;
    } else if (key === ' ') {
      event.preventDefault();
      state.paused = !state.paused;
    } else if (key === '1') {
      state.velA += 5.0;
    } else if (key === '2') {
      state.velB -= 5.0;
    } else if (key === 'd') {
      state.dampingOn = !state.dampingOn;
    }
  });

  // Window resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // HUD
  const hudDiv = document.getElementById('hud');

  function updateHUD() {
    const gravStatus = state.gravityOn ? '<span class="status-on">ON</span>' : '<span class="status-off">OFF</span>';
    const pauseStatus = state.paused ? '<span class="status-off">YES</span>' : '<span class="status-on">NO</span>';
    const dampStatus = state.dampingOn ? '<span class="status-on">ON</span>' : '<span class="status-off">OFF</span>';

    hudDiv.innerHTML = `
      <span class="label">Mass A Y:</span> <span class="value">${state.massA_y.toFixed(2)}</span><br>
      <span class="label">Mass B Y:</span> <span class="value">${state.massB_y.toFixed(2)}</span><br>
      <span class="label">Vel A:</span> <span class="value">${state.velA.toFixed(2)}</span><br>
      <span class="label">Vel B:</span> <span class="value">${state.velB.toFixed(2)}</span><br>
      <span class="label">Total Energy:</span> <span class="value">${state.totalEnergy.toFixed(2)}</span><br>
      <span class="label">Gravity:</span> ${gravStatus}<br>
      <span class="label">Paused:</span> ${pauseStatus}<br>
      <span class="label">Damping:</span> ${dampStatus}
    `;
  }

  // Physics step
  function physicsStep() {
    if (state.paused) return;

    const g = state.gravityOn ? g_value : 0;
    const damping = state.dampingOn ? dampingCoeff : 0;

    // Spring 1: anchor to Mass A
    const len1 = anchorY - state.massA_y;
    const currentLen1 = Math.abs(len1);
    const dir1 = len1 >= 0 ? 1 : -1;
    const springForce1 = state.k1 * (currentLen1 - restLength1) * dir1;

    // Spring 2: Mass A to Mass B
    const len2 = state.massA_y - state.massB_y;
    const currentLen2 = Math.abs(len2);
    const dir2 = len2 >= 0 ? 1 : -1;
    const springForce2onA = -state.k2 * (currentLen2 - restLength2) * dir2;
    const springForce2onB = state.k2 * (currentLen2 - restLength2) * dir2;

    // Forces on Mass A
    if (!state.draggingA) {
      const forceA = springForce1 + springForce2onA - state.massA_mass * g;
      const accA = forceA / state.massA_mass;

      // Semi-implicit Euler: update velocity first, then position
      state.velA += accA * dt;
      state.velA *= (1 - damping * dt);
      state.massA_y += state.velA * dt;
    }

    // Forces on Mass B
    if (!state.draggingB) {
      const forceB = springForce2onB - state.massB_mass * g;
      const accB = forceB / state.massB_mass;

      state.velB += accB * dt;
      state.velB *= (1 - damping * dt);
      state.massB_y += state.velB * dt;
    }

    state.simTime += dt;

    // Update spring lengths
    state.spring1_length = Math.abs(anchorY - state.massA_y);
    state.spring2_length = Math.abs(state.massA_y - state.massB_y);

    // Calculate total energy
    const g_current = state.gravityOn ? g_value : 0;
    const keA = 0.5 * state.massA_mass * state.velA * state.velA;
    const keB = 0.5 * state.massB_mass * state.velB * state.velB;
    const peSpring1 = 0.5 * state.k1 * Math.pow(state.spring1_length - restLength1, 2);
    const peSpring2 = 0.5 * state.k2 * Math.pow(state.spring2_length - restLength2, 2);
    const peGravA = state.massA_mass * g_current * state.massA_y;
    const peGravB = state.massB_mass * g_current * state.massB_y;

    state.totalEnergy = keA + keB + peSpring1 + peSpring2 + peGravA + peGravB;
  }

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    physicsStep();

    // Update mesh positions
    massAMesh.position.set(0, state.massA_y, 0);
    massBMesh.position.set(0, state.massB_y, 0);

    // Update spring visuals
    updateSpringGeometry(spring1Geom, anchorY, state.massA_y, 0.25);
    updateSpringGeometry(spring2Geom, state.massA_y, state.massB_y, 0.25);

    // Update HUD
    updateHUD();

    renderer.render(scene, camera);
  }

  // Also compute initial energy
  state.spring1_length = Math.abs(anchorY - state.massA_y);
  state.spring2_length = Math.abs(state.massA_y - state.massB_y);

  animate();
})();
</script>
</body>
</html>
