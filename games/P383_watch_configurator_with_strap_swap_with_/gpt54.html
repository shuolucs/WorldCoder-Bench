<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Configurator</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #title-bar {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 12px 18px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 22px;
      font-weight: bold;
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    #top-right-controls {
      position: absolute;
      top: 16px;
      right: 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #history-display {
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      min-width: 90px;
      text-align: center;
    }

    #btn-undo, #btn-redo, #btn-rotate {
      padding: 10px 14px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s, transform 0.1s;
    }

    #btn-undo:hover, #btn-redo:hover, #btn-rotate:hover,
    .strap-btn:hover {
      background: rgba(255,255,255,0.16);
    }

    #btn-undo:active, #btn-redo:active, #btn-rotate:active,
    .strap-btn:active {
      transform: scale(0.98);
    }

    #bottom-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      padding: 12px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      backdrop-filter: blur(6px);
      flex-wrap: wrap;
      justify-content: center;
      max-width: calc(100vw - 40px);
    }

    .strap-btn {
      padding: 12px 16px;
      border-radius: 10px;
      border: 2px solid transparent;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      color: #fff;
      min-width: 120px;
      text-align: center;
      box-sizing: border-box;
      background: rgba(255,255,255,0.08);
    }

    .strap-btn.active {
      border-color: #ffffff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15) inset;
    }

    #btn-leather-black { background: #1a1a1a; }
    #btn-leather-brown { background: #8B4513; }
    #btn-rubber-blue { background: #1e3a5f; }
    #btn-metal-silver { background: #c0c0c0; color: #111; }
    #btn-fabric-red { background: #8b1a1a; }
  </style>
</head>
<body>
  <div id="title-bar">Watch Configurator</div>

  <div id="top-right-controls">
    <div id="history-display">Step 1/1</div>
    <div id="btn-undo">Undo</div>
    <div id="btn-redo">Redo</div>
    <div id="btn-rotate">Pause Rotation</div>
  </div>

  <div id="bottom-bar">
    <div class="strap-btn active" id="btn-leather-black" data-strap="leather_black">Leather Black</div>
    <div class="strap-btn" id="btn-leather-brown" data-strap="leather_brown">Leather Brown</div>
    <div class="strap-btn" id="btn-rubber-blue" data-strap="rubber_blue">Rubber Blue</div>
    <div class="strap-btn" id="btn-metal-silver" data-strap="metal_silver">Metal Silver</div>
    <div class="strap-btn" id="btn-fabric-red" data-strap="fabric_red">Fabric Red</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const platformMaterial = new THREE.MeshStandardMaterial({
      color: '#333344',
      metalness: 0.8,
      roughness: 0.25
    });
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(2, 2, 0.2, 64),
      platformMaterial
    );
    platform.position.set(0, 0, 0);
    scene.add(platform);

    const watchGroup = new THREE.Group();
    watchGroup.position.set(0, 1.5, 0);
    scene.add(watchGroup);

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: '#c0c0c0',
      metalness: 0.9,
      roughness: 0.1
    });
    const watchCase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.8, 0.8, 0.15, 32),
      caseMaterial
    );
    watchCase.rotation.x = Math.PI / 2;
    watchGroup.add(watchCase);

    const faceMaterial = new THREE.MeshStandardMaterial({
      color: '#111122',
      metalness: 0.15,
      roughness: 0.6
    });
    const watchFace = new THREE.Mesh(
      new THREE.CircleGeometry(0.75, 32),
      faceMaterial
    );
    watchFace.position.z = 0.08;
    watchGroup.add(watchFace);

    const strapConfigs = [
      { name: 'leather_black', color: '#1a1a1a', metalness: 0.1, roughness: 0.8 },
      { name: 'leather_brown', color: '#8B4513', metalness: 0.1, roughness: 0.8 },
      { name: 'rubber_blue', color: '#1e3a5f', metalness: 0.05, roughness: 0.9 },
      { name: 'metal_silver', color: '#c0c0c0', metalness: 0.9, roughness: 0.15 },
      { name: 'fabric_red', color: '#8b1a1a', metalness: 0.05, roughness: 1.0 }
    ];

    function makeStrapMaterial(config) {
      return new THREE.MeshStandardMaterial({
        color: config.color,
        metalness: config.metalness ?? 0.1,
        roughness: config.roughness ?? 0.8
      });
    }

    let currentStrapIndex = 0;
    let strapMaterial = makeStrapMaterial(strapConfigs[currentStrapIndex]);

    const strapTop = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 1.2, 0.08),
      strapMaterial
    );
    strapTop.position.set(0, 0.75, 0);
    watchGroup.add(strapTop);

    const strapBottom = new THREE.Mesh(
      new THREE.BoxGeometry(0.4, 1.2, 0.08),
      strapMaterial
    );
    strapBottom.position.set(0, -0.75, 0);
    watchGroup.add(strapBottom);

    const loader = new GLTFLoader();
    let horseLoaded = false;

    loader.load(
      'horse.glb',
      (gltf) => {
        const horse = gltf.scene;
        horse.scale.set(0.01, 0.01, 0.01);
        horse.position.set(2.5, 0, 0);
        scene.add(horse);
        horseLoaded = true;
        syncState();
      },
      undefined,
      (error) => {
        console.warn('Failed to load horse.glb:', error);
        horseLoaded = false;
        syncState();
      }
    );

    const strapButtons = Array.from(document.querySelectorAll('.strap-btn'));
    const historyDisplay = document.getElementById('history-display');
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnRotate = document.getElementById('btn-rotate');

    let history = [strapConfigs[0].name];
    let historyPosition = 0;
    let autoRotate = true;
    let undoCount = 0;
    let redoCount = 0;
    let strapChangeCount = 0;

    window.__3D_STATE__ = {
      currentStrap: strapConfigs[0].name,
      strapIndex: 0,
      history: [...history],
      historyPosition,
      historyLength: history.length,
      watchRotationY: watchGroup.rotation.y,
      autoRotate,
      platformRotationY: platform.rotation.y,
      horseLoaded,
      undoCount,
      redoCount,
      strapChangeCount
    };

    function syncState() {
      window.__3D_STATE__.currentStrap = strapConfigs[currentStrapIndex].name;
      window.__3D_STATE__.strapIndex = currentStrapIndex;
      window.__3D_STATE__.history = [...history];
      window.__3D_STATE__.historyPosition = historyPosition;
      window.__3D_STATE__.historyLength = history.length;
      window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.platformRotationY = platform.rotation.y;
      window.__3D_STATE__.horseLoaded = horseLoaded;
      window.__3D_STATE__.undoCount = undoCount;
      window.__3D_STATE__.redoCount = redoCount;
      window.__3D_STATE__.strapChangeCount = strapChangeCount;
    }

    function updateHistoryDisplay() {
      historyDisplay.textContent = `Step ${historyPosition + 1}/${history.length}`;
    }

    function updateActiveButton() {
      const currentName = strapConfigs[currentStrapIndex].name;
      strapButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.strap === currentName);
      });
    }

    function applyStrapByIndex(index) {
      currentStrapIndex = index;
      const config = strapConfigs[index];
      const newMaterial = makeStrapMaterial(config);
      strapTop.material = newMaterial;
      strapBottom.material = newMaterial;
      updateActiveButton();
      updateHistoryDisplay();
      syncState();
    }

    function recordStrapChange(index) {
      if (index === currentStrapIndex) return;

      if (historyPosition < history.length - 1) {
        history = history.slice(0, historyPosition + 1);
      }

      history.push(strapConfigs[index].name);
      historyPosition = history.length - 1;
      strapChangeCount++;
      applyStrapByIndex(index);
    }

    function undo() {
      if (historyPosition > 0) {
        historyPosition--;
        const strapName = history[historyPosition];
        const index = strapConfigs.findIndex(s => s.name === strapName);
        if (index !== -1) {
          undoCount++;
          applyStrapByIndex(index);
        }
      }
    }

    function redo() {
      if (historyPosition < history.length - 1) {
        historyPosition++;
        const strapName = history[historyPosition];
        const index = strapConfigs.findIndex(s => s.name === strapName);
        if (index !== -1) {
          redoCount++;
          applyStrapByIndex(index);
        }
      }
    }

    strapButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const strapName = btn.dataset.strap;
        const index = strapConfigs.findIndex(s => s.name === strapName);
        if (index !== -1) {
          recordStrapChange(index);
        }
      });
    });

    btnUndo.addEventListener('click', undo);
    btnRedo.addEventListener('click', redo);

    btnRotate.addEventListener('click', () => {
      autoRotate = !autoRotate;
      btnRotate.textContent = autoRotate ? 'Pause Rotation' : 'Resume Rotation';
      syncState();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (e.ctrlKey && key === 'z') {
        e.preventDefault();
        undo();
      }
      if (e.ctrlKey && key === 'y') {
        e.preventDefault();
        redo();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHistoryDisplay();
    updateActiveButton();
    syncState();

    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate) {
        watchGroup.rotation.y += 0.01;
      }

      platform.rotation.y += 0.005;

      syncState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
