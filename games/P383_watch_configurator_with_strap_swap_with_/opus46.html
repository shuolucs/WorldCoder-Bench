<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Configurator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #title-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 56px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0e0f0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  #strap-panel {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 14px;
    z-index: 100;
    background: rgba(10, 10, 30, 0.8);
    backdrop-filter: blur(10px);
    padding: 14px 24px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .strap-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid rgba(255,255,255,0.15);
    transition: all 0.3s ease;
    position: relative;
  }
  .strap-btn:hover {
    transform: scale(1.15);
    border-color: rgba(255,255,255,0.5);
  }
  .strap-btn.active {
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
    transform: scale(1.1);
  }
  .strap-btn::after {
    content: attr(data-label);
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #aaa;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .strap-btn:hover::after { opacity: 1; }

  #top-right-controls {
    position: fixed;
    top: 70px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 100;
  }

  .ctrl-btn {
    padding: 10px 18px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.2s;
    text-align: center;
  }
  .ctrl-btn:hover {
    background: rgba(30, 30, 60, 0.9);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  #history-display {
    padding: 8px 14px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    color: #aab;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    font-size: 12px;
    text-align: center;
    letter-spacing: 1px;
  }

  #btn-rotate.active-rotate {
    color: #6f6;
    border-color: rgba(100,255,100,0.3);
  }
</style>
</head>
<body>

<div id="title-bar">Watch Configurator</div>

<div id="top-right-controls">
  <button class="ctrl-btn" id="btn-undo">⟲ Undo</button>
  <button class="ctrl-btn" id="btn-redo">⟳ Redo</button>
  <div id="history-display">Step 1/1</div>
  <button class="ctrl-btn active-rotate" id="btn-rotate">⟳ Auto Rotate: ON</button>
</div>

<div id="strap-panel">
  <div class="strap-btn active" id="btn-leather-black" data-strap="leather_black" data-label="Black Leather" style="background:#1a1a1a;"></div>
  <div class="strap-btn" id="btn-leather-brown" data-strap="leather_brown" data-label="Brown Leather" style="background:#8B4513;"></div>
  <div class="strap-btn" id="btn-rubber-blue" data-strap="rubber_blue" data-label="Blue Rubber" style="background:#1e3a5f;"></div>
  <div class="strap-btn" id="btn-metal-silver" data-strap="metal_silver" data-label="Silver Metal" style="background:#c0c0c0;"></div>
  <div class="strap-btn" id="btn-fabric-red" data-strap="fabric_red" data-label="Red Fabric" style="background:#8b1a1a;"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Strap definitions
const STRAPS = [
  { name: 'leather_black', color: '#1a1a1a', metalness: 0.1, roughness: 0.8 },
  { name: 'leather_brown', color: '#8B4513', metalness: 0.1, roughness: 0.8 },
  { name: 'rubber_blue', color: '#1e3a5f', metalness: 0.0, roughness: 0.6 },
  { name: 'metal_silver', color: '#c0c0c0', metalness: 0.9, roughness: 0.1 },
  { name: 'fabric_red', color: '#8b1a1a', metalness: 0.0, roughness: 0.9 },
];

const STRAP_NAME_TO_INDEX = {};
STRAPS.forEach((s, i) => STRAP_NAME_TO_INDEX[s.name] = i);

// State
window.__3D_STATE__ = {
  currentStrap: 'leather_black',
  strapIndex: 0,
  history: ['leather_black'],
  historyPosition: 0,
  historyLength: 1,
  watchRotationY: 0,
  autoRotate: true,
  platformRotationY: 0,
  horseLoaded: false,
  undoCount: 0,
  redoCount: 0,
  strapChangeCount: 0,
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Additional fill light for better visuals
const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// Platform
const platformGeom = new THREE.CylinderGeometry(2, 2, 0.2, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x333344,
  metalness: 0.7,
  roughness: 0.3,
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = 0;
scene.add(platform);

// Watch Group
const watchGroup = new THREE.Group();
watchGroup.position.set(0, 1.5, 0);
scene.add(watchGroup);

// Watch case
const caseGeom = new THREE.CylinderGeometry(0.8, 0.8, 0.15, 32);
const caseMat = new THREE.MeshStandardMaterial({
  color: 0xc0c0c0,
  metalness: 0.9,
  roughness: 0.1,
});
const watchCase = new THREE.Mesh(caseGeom, caseMat);
watchGroup.add(watchCase);

// Watch face
const faceGeom = new THREE.CircleGeometry(0.75, 32);
const faceMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  metalness: 0.3,
  roughness: 0.5,
});
const watchFace = new THREE.Mesh(faceGeom, faceMat);
watchFace.rotation.x = -Math.PI / 2;
watchFace.position.y = 0.076;
watchGroup.add(watchFace);

// Watch face details - hour markers
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const markerGeom = new THREE.BoxGeometry(0.03, 0.002, 0.08);
  const markerMat = new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.8, roughness: 0.2 });
  const marker = new THREE.Mesh(markerGeom, markerMat);
  const radius = 0.62;
  marker.position.set(Math.sin(angle) * radius, 0.078, -Math.cos(angle) * radius);
  marker.rotation.y = angle;
  watchGroup.add(marker);
}

// Watch hands
const hourHandGeom = new THREE.BoxGeometry(0.025, 0.003, 0.3);
const hourHandMat = new THREE.MeshStandardMaterial({ color: 0xddddee, metalness: 0.8, roughness: 0.2 });
const hourHand = new THREE.Mesh(hourHandGeom, hourHandMat);
hourHand.position.set(0, 0.08, -0.12);
watchGroup.add(hourHand);

const minuteHandGeom = new THREE.BoxGeometry(0.018, 0.003, 0.4);
const minuteHandMat = new THREE.MeshStandardMaterial({ color: 0xddddee, metalness: 0.8, roughness: 0.2 });
const minuteHand = new THREE.Mesh(minuteHandGeom, minuteHandMat);
minuteHand.position.set(0.1, 0.082, 0);
minuteHand.rotation.y = Math.PI / 3;
watchGroup.add(minuteHand);

// Straps
function createStrapMaterial(strapDef) {
  return new THREE.MeshStandardMaterial({
    color: new THREE.Color(strapDef.color),
    metalness: strapDef.metalness,
    roughness: strapDef.roughness,
  });
}

const strapGeomTop = new THREE.BoxGeometry(0.4, 1.2, 0.08);
const strapGeomBottom = new THREE.BoxGeometry(0.4, 1.2, 0.08);

let currentStrapMat = createStrapMaterial(STRAPS[0]);

const strapTop = new THREE.Mesh(strapGeomTop, currentStrapMat);
strapTop.position.y = 0.75;
watchGroup.add(strapTop);

const strapBottom = new THREE.Mesh(strapGeomBottom, currentStrapMat);
strapBottom.position.y = -0.75;
watchGroup.add(strapBottom);

// Strap buckle detail on bottom strap
const buckleGeom = new THREE.BoxGeometry(0.44, 0.1, 0.09);
const buckleMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9, roughness: 0.1 });
const buckle = new THREE.Mesh(buckleGeom, buckleMat);
buckle.position.y = -0.35;
watchGroup.add(buckle);

// Load horse.glb
const loader = new GLTFLoader();
loader.load(
  'horse.glb',
  (gltf) => {
    const horse = gltf.scene;
    horse.scale.set(0.01, 0.01, 0.01);
    horse.position.set(2.5, 0, 0);
    scene.add(horse);
    state.horseLoaded = true;
    console.log('Horse model loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load horse.glb, creating placeholder:', error);
    // Create a placeholder horse-like figure
    const horseGroup = new THREE.Group();
    
    // Body
    const bodyGeom = new THREE.CylinderGeometry(0.15, 0.12, 0.5, 8);
    bodyGeom.rotateZ(Math.PI / 2);
    const horseMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, metalness: 0.3, roughness: 0.7 });
    const body = new THREE.Mesh(bodyGeom, horseMat);
    body.position.y = 0.45;
    horseGroup.add(body);
    
    // Head
    const headGeom = new THREE.CylinderGeometry(0.06, 0.08, 0.25, 8);
    const head = new THREE.Mesh(headGeom, horseMat);
    head.position.set(0.25, 0.6, 0);
    head.rotation.z = -Math.PI / 4;
    horseGroup.add(head);
    
    // Legs
    const legGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.35, 6);
    const positions = [[-0.15, 0.17, 0.07], [-0.15, 0.17, -0.07], [0.15, 0.17, 0.07], [0.15, 0.17, -0.07]];
    positions.forEach(p => {
      const leg = new THREE.Mesh(legGeom, horseMat);
      leg.position.set(p[0], p[1], p[2]);
      horseGroup.add(leg);
    });
    
    // Tail
    const tailGeom = new THREE.CylinderGeometry(0.02, 0.01, 0.2, 6);
    const tail = new THREE.Mesh(tailGeom, horseMat);
    tail.position.set(-0.3, 0.5, 0);
    tail.rotation.z = Math.PI / 3;
    horseGroup.add(tail);
    
    horseGroup.position.set(2.5, 0, 0);
    scene.add(horseGroup);
    state.horseLoaded = true;
  }
);

// Functions
function applyStrap(strapName) {
  const idx = STRAP_NAME_TO_INDEX[strapName];
  const strapDef = STRAPS[idx];
  currentStrapMat = createStrapMaterial(strapDef);
  strapTop.material = currentStrapMat;
  strapBottom.material = currentStrapMat;
  
  state.currentStrap = strapName;
  state.strapIndex = idx;
  
  // Update button active states
  document.querySelectorAll('.strap-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.strap === strapName);
  });
  
  updateHistoryDisplay();
  updateUndoRedoButtons();
}

function recordStrapChange(strapName) {
  // Truncate any redo history
  state.history = state.history.slice(0, state.historyPosition + 1);
  state.history.push(strapName);
  state.historyPosition = state.history.length - 1;
  state.historyLength = state.history.length;
  
  applyStrap(strapName);
}

function undo() {
  if (state.historyPosition > 0) {
    state.historyPosition--;
    state.undoCount++;
    const strapName = state.history[state.historyPosition];
    applyStrap(strapName);
  }
}

function redo() {
  if (state.historyPosition < state.history.length - 1) {
    state.historyPosition++;
    state.redoCount++;
    const strapName = state.history[state.historyPosition];
    applyStrap(strapName);
  }
}

function updateHistoryDisplay() {
  const display = document.getElementById('history-display');
  display.textContent = `Step ${state.historyPosition + 1}/${state.history.length}`;
  state.historyLength = state.history.length;
}

function updateUndoRedoButtons() {
  document.getElementById('btn-undo').disabled = state.historyPosition <= 0;
  document.getElementById('btn-redo').disabled = state.historyPosition >= state.history.length - 1;
}

// Event listeners
document.querySelectorAll('.strap-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const strapName = btn.dataset.strap;
    if (strapName !== state.currentStrap) {
      state.strapChangeCount++;
      recordStrapChange(strapName);
    }
  });
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

document.getElementById('btn-rotate').addEventListener('click', () => {
  state.autoRotate = !state.autoRotate;
  const btn = document.getElementById('btn-rotate');
  btn.textContent = `⟳ Auto Rotate: ${state.autoRotate ? 'ON' : 'OFF'}`;
  btn.classList.toggle('active-rotate', state.autoRotate);
});

document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
    e.preventDefault();
    redo();
  }
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial UI state
updateUndoRedoButtons();
updateHistoryDisplay();

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  // Auto-rotate watch
  if (state.autoRotate) {
    watchGroup.rotation.y += 0.01;
  }
  state.watchRotationY = watchGroup.rotation.y;
  
  // Platform always rotates
  platform.rotation.y += 0.005;
  state.platformRotationY = platform.rotation.y;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
