<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #title-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }
        #controls-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-end;
        }
        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        #history-display {
            font-size: 14px;
            margin-top: 5px;
            color: #aaaaaa;
        }
        #strap-selector {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .strap-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.2s, border-color 0.2s;
        }
        .strap-btn:hover {
            transform: scale(1.1);
        }
        .strap-btn.active {
            border-color: #ffffff;
            transform: scale(1.1);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="title-bar">Watch Configurator</div>

    <div id="controls-right">
        <div style="display: flex; gap: 10px;">
            <button id="btn-undo" class="control-btn">Undo</button>
            <button id="btn-redo" class="control-btn">Redo</button>
        </div>
        <div id="history-display">Step 1/1</div>
        <button id="btn-rotate" class="control-btn" style="margin-top: 10px;">Toggle Rotation</button>
    </div>

    <div id="strap-selector">
        <div class="strap-btn active" id="btn-leather-black" data-strap="leather_black" style="background: #1a1a1a;"></div>
        <div class="strap-btn" id="btn-leather-brown" data-strap="leather_brown" style="background: #8B4513;"></div>
        <div class="strap-btn" id="btn-rubber-blue" data-strap="rubber_blue" style="background: #1e3a5f;"></div>
        <div class="strap-btn" id="btn-metal-silver" data-strap="metal_silver" style="background: #c0c0c0;"></div>
        <div class="strap-btn" id="btn-fabric-red" data-strap="fabric_red" style="background: #8b1a1a;"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            currentStrap: 'leather_black',
            strapIndex: 0,
            history: ['leather_black'],
            historyPosition: 0,
            historyLength: 1,
            watchRotationY: 0,
            autoRotate: true,
            platformRotationY: 0,
            horseLoaded: false,
            undoCount: 0,
            redoCount: 0,
            strapChangeCount: 0
        };

        const strapOptions = [
            { id: 'leather_black', color: 0x1a1a1a, metalness: 0.1, roughness: 0.8 },
            { id: 'leather_brown', color: 0x8B4513, metalness: 0.1, roughness: 0.8 },
            { id: 'rubber_blue', color: 0x1e3a5f, metalness: 0.0, roughness: 0.6 },
            { id: 'metal_silver', color: 0xc0c0c0, metalness: 0.9, roughness: 0.1 },
            { id: 'fabric_red', color: 0x8b1a1a, metalness: 0.0, roughness: 0.9 }
        ];

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Platform Group
        const platformGroup = new THREE.Group();
        scene.add(platformGroup);

        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.2, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.4, roughness: 0.6 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        platformGroup.add(platform);

        // Load Horse Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Horse/glTF-Binary/Horse.glb', (gltf) => {
            const horse = gltf.scene;
            horse.scale.set(0.01, 0.01, 0.01);
            horse.position.set(2.5, 0.1, 0); // Slightly above 0 to sit on platform visually
            
            // Apply a nice material to the horse
            horse.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xd4af37, // Gold
                        metalness: 0.8,
                        roughness: 0.2
                    });
                }
            });
            
            platformGroup.add(horse);
            window.__3D_STATE__.horseLoaded = true;
        });

        // Watch Group
        const watchGroup = new THREE.Group();
        watchGroup.position.set(0, 1.5, 0);
        scene.add(watchGroup);

        // Watch Case
        const caseGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.15, 32);
        const caseMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.9, roughness: 0.1 });
        const watchCase = new THREE.Mesh(caseGeo, caseMat);
        watchCase.rotation.x = Math.PI / 2;
        watchGroup.add(watchCase);

        // Watch Face
        const faceGeo = new THREE.CircleGeometry(0.75, 32);
        const faceMat = new THREE.MeshBasicMaterial({ color: 0x111122 });
        const watchFace = new THREE.Mesh(faceGeo, faceMat);
        watchFace.position.z = 0.076; // Slightly above case surface
        watchGroup.add(watchFace);

        // Watch Straps
        const strapGeo = new THREE.BoxGeometry(0.4, 1.2, 0.08);
        const strapMat = new THREE.MeshStandardMaterial({ 
            color: strapOptions[0].color, 
            metalness: strapOptions[0].metalness, 
            roughness: strapOptions[0].roughness 
        });

        const strapTop = new THREE.Mesh(strapGeo, strapMat);
        strapTop.position.set(0, 0.75, 0);
        watchGroup.add(strapTop);

        const strapBottom = new THREE.Mesh(strapGeo, strapMat);
        strapBottom.position.set(0, -0.75, 0);
        watchGroup.add(strapBottom);

        // Logic Functions
        function updateUI() {
            const state = window.__3D_STATE__;
            
            document.querySelectorAll('.strap-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.strap === state.currentStrap);
            });

            document.getElementById('history-display').innerText = `Step ${state.historyPosition + 1}/${state.historyLength}`;
            
            document.getElementById('btn-undo').disabled = state.historyPosition === 0;
            document.getElementById('btn-redo').disabled = state.historyPosition === state.historyLength - 1;
        }

        function applyStrapVisuals(strapId) {
            const option = strapOptions.find(o => o.id === strapId);
            if (option) {
                strapMat.color.setHex(option.color);
                strapMat.metalness = option.metalness;
                strapMat.roughness = option.roughness;
                
                window.__3D_STATE__.currentStrap = strapId;
                window.__3D_STATE__.strapIndex = strapOptions.indexOf(option);
            }
        }

        function changeStrap(strapId, isUserAction = false) {
            const state = window.__3D_STATE__;
            if (state.currentStrap === strapId && isUserAction) return;

            if (isUserAction) {
                state.strapChangeCount++;
                state.history = state.history.slice(0, state.historyPosition + 1);
                state.history.push(strapId);
                state.historyPosition++;
                state.historyLength = state.history.length;
            }

            applyStrapVisuals(strapId);
            updateUI();
        }

        function undo() {
            const state = window.__3D_STATE__;
            if (state.historyPosition > 0) {
                state.undoCount++;
                state.historyPosition--;
                applyStrapVisuals(state.history[state.historyPosition]);
                updateUI();
            }
        }

        function redo() {
            const state = window.__3D_STATE__;
            if (state.historyPosition < state.historyLength - 1) {
                state.redoCount++;
                state.historyPosition++;
                applyStrapVisuals(state.history[state.historyPosition]);
                updateUI();
            }
        }

        // Event Listeners
        document.querySelectorAll('.strap-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                changeStrap(e.target.dataset.strap, true);
            });
        });

        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);
        
        document.getElementById('btn-rotate').addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
        });

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    undo();
                } else if (e.key.toLowerCase() === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize UI
        updateUI();

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.autoRotate) {
                watchGroup.rotation.y += 0.01;
            }
            platformGroup.rotation.y += 0.005;

            window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;
            window.__3D_STATE__.platformRotationY = platformGroup.rotation.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
