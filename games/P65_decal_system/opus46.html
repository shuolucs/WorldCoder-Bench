<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decal Geometry Demo</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  #canvas-container { width: 100vw; height: 100vh; }
  canvas { display: block; }

  #controls {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(15, 15, 35, 0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 24px;
    color: #e0e0e0;
    min-width: 280px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  #controls h2 {
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #controls h2::before {
    content: '🎨';
    font-size: 22px;
  }

  .control-group {
    margin-bottom: 16px;
  }

  .control-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #4a4a8a, #7b68ee);
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #7b68ee;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(123, 104, 238, 0.5);
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .size-value {
    min-width: 40px;
    text-align: center;
    font-weight: 600;
    color: #7b68ee;
    font-size: 14px;
  }

  input[type="color"] {
    -webkit-appearance: none;
    appearance: none;
    width: 50px;
    height: 36px;
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    padding: 2px;
  }

  input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
  }

  input[type="color"]::-webkit-color-swatch {
    border: none;
    border-radius: 5px;
  }

  .color-hex {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #ccc;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }

  .btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  #undoBtn {
    background: linear-gradient(135deg, #4a4a8a, #5a5aaa);
    color: #fff;
  }

  #undoBtn:hover {
    background: linear-gradient(135deg, #5a5aaa, #6a6abb);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(90, 90, 170, 0.4);
  }

  #clearBtn {
    background: linear-gradient(135deg, #8a3a3a, #aa4a4a);
    color: #fff;
  }

  #clearBtn:hover {
    background: linear-gradient(135deg, #aa4a4a, #cc5a5a);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(170, 74, 74, 0.4);
  }

  .btn:active {
    transform: translateY(0);
  }

  .stats {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    font-size: 12px;
    color: #777;
  }

  .stats span {
    color: #7b68ee;
    font-weight: 600;
  }

  .hint {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 15, 35, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px 24px;
    color: #aaa;
    font-size: 13px;
    pointer-events: none;
    transition: opacity 0.5s;
  }

  .hint strong { color: #7b68ee; }
</style>
</head>
<body>
<div id="canvas-container"></div>

<div id="controls">
  <h2>Decal Painter</h2>

  <div class="control-group">
    <label>Decal Size</label>
    <div class="control-row">
      <input type="range" id="decalSize" min="0.1" max="3.0" step="0.05" value="0.8">
      <span class="size-value" id="sizeDisplay">0.8</span>
    </div>
  </div>

  <div class="control-group">
    <label>Decal Color</label>
    <div class="control-row">
      <input type="color" id="decalColor" value="#ff4488">
      <span class="color-hex" id="colorDisplay">#ff4488</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn" id="undoBtn">↩ Undo</button>
    <button class="btn" id="clearBtn">✕ Clear All</button>
  </div>

  <div class="stats">
    Decals placed: <span id="decalCountDisplay">0</span> &nbsp;|&nbsp; Undo stack: <span id="undoStackDisplay">0</span>
  </div>
</div>

<div class="hint">
  <strong>Click</strong> on the sphere to place a decal &nbsp;|&nbsp; <strong>Drag</strong> to rotate
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';

// ─── Scene Setup ───
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 15;

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0x7b68ee, 0.4);
dirLight2.position.set(-5, -3, -5);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0xff6688, 0.3, 20);
pointLight.position.set(-3, 2, 4);
scene.add(pointLight);

// ─── Sphere (Decal Target) ───
const sphereGeometry = new THREE.SphereGeometry(2, 128, 128);
const sphereMaterial = new THREE.MeshStandardMaterial({
  color: 0x2a2a4a,
  roughness: 0.35,
  metalness: 0.6,
});
const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
sphere.receiveShadow = true;
scene.add(sphere);

// Subtle wireframe overlay
const wireGeo = new THREE.SphereGeometry(2.005, 32, 32);
const wireMat = new THREE.MeshBasicMaterial({
  color: 0x4a4a8a,
  wireframe: true,
  transparent: true,
  opacity: 0.06,
});
scene.add(new THREE.Mesh(wireGeo, wireMat));

// ─── Decal Texture ───
function createDecalTexture() {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Radial gradient for soft circle
  const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(255,255,255,0.95)');
  gradient.addColorStop(0.6, 'rgba(255,255,255,0.6)');
  gradient.addColorStop(0.85, 'rgba(255,255,255,0.15)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');

  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);

  // Star/splat pattern
  ctx.globalCompositeOperation = 'destination-in';
  ctx.beginPath();
  const cx = size / 2, cy = size / 2;
  const outerR = size * 0.48, innerR = size * 0.25;
  const points = 8;
  for (let i = 0; i < points * 2; i++) {
    const angle = (Math.PI * 2 * i) / (points * 2) - Math.PI / 2;
    const r = i % 2 === 0 ? outerR : innerR;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'white';
  ctx.fill();

  // Actually, let's just use a soft circle for cleaner look
  const canvas2 = document.createElement('canvas');
  canvas2.width = size;
  canvas2.height = size;
  const ctx2 = canvas2.getContext('2d');

  const grad2 = ctx2.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  grad2.addColorStop(0, 'rgba(255,255,255,1)');
  grad2.addColorStop(0.4, 'rgba(255,255,255,0.9)');
  grad2.addColorStop(0.7, 'rgba(255,255,255,0.4)');
  grad2.addColorStop(1, 'rgba(255,255,255,0)');

  ctx2.fillStyle = grad2;
  ctx2.beginPath();
  ctx2.arc(size/2, size/2, size/2, 0, Math.PI * 2);
  ctx2.fill();

  const texture = new THREE.CanvasTexture(canvas2);
  texture.needsUpdate = true;
  return texture;
}

const decalTexture = createDecalTexture();

// ─── Decal State ───
const decalStack = []; // Array of { mesh, position }
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ─── UI Elements ───
const decalSizeInput = document.getElementById('decalSize');
const decalColorInput = document.getElementById('decalColor');
const undoBtn = document.getElementById('undoBtn');
const clearBtn = document.getElementById('clearBtn');
const sizeDisplay = document.getElementById('sizeDisplay');
const colorDisplay = document.getElementById('colorDisplay');
const decalCountDisplay = document.getElementById('decalCountDisplay');
const undoStackDisplay = document.getElementById('undoStackDisplay');

// ─── State Object ───
// lastDecalPos: when no decals, {x:0, y:0, z:0}
window.__3D_STATE__ = {
  decalCount: 0,
  decalSize: parseFloat(decalSizeInput.value),
  decalColor: decalColorInput.value,
  lastDecalPos: { x: 0, y: 0, z: 0 },
  undoStackSize: 0
};

function updateState() {
  const s = window.__3D_STATE__;
  s.decalCount = decalStack.length;
  s.decalSize = parseFloat(decalSizeInput.value);
  s.decalColor = decalColorInput.value;
  s.undoStackSize = decalStack.length;

  if (decalStack.length > 0) {
    const lastPos = decalStack[decalStack.length - 1].position;
    s.lastDecalPos = { x: lastPos.x, y: lastPos.y, z: lastPos.z };
  } else {
    s.lastDecalPos = { x: 0, y: 0, z: 0 };
  }

  decalCountDisplay.textContent = s.decalCount;
  undoStackDisplay.textContent = s.undoStackSize;
}

// ─── UI Event Listeners ───
decalSizeInput.addEventListener('input', () => {
  sizeDisplay.textContent = parseFloat(decalSizeInput.value).toFixed(2);
  updateState();
});

decalColorInput.addEventListener('input', () => {
  colorDisplay.textContent = decalColorInput.value;
  updateState();
});

// ─── Place Decal Function ───
function placeDecalAt(point, normal) {
  const size = parseFloat(decalSizeInput.value);
  const color = decalColorInput.value;

  // Orientation: align decal to surface normal
  const position = point.clone();
  const orientation = new THREE.Euler();

  // Create a helper to look along the normal
  const helper = new THREE.Object3D();
  const lookTarget = position.clone().add(normal);
  helper.position.copy(position);
  helper.lookAt(lookTarget);
  orientation.copy(helper.rotation);

  const decalSize = new THREE.Vector3(size, size, size);

  const decalGeometry = new DecalGeometry(sphere, position, orientation, decalSize);

  const decalMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(color),
    map: decalTexture,
    transparent: true,
    depthTest: true,
    depthWrite: false,
    polygonOffset: true,
    polygonOffsetFactor: -4,
    roughness: 0.3,
    metalness: 0.2,
    opacity: 0.9,
  });

  const decalMesh = new THREE.Mesh(decalGeometry, decalMaterial);
  scene.add(decalMesh);

  decalStack.push({
    mesh: decalMesh,
    position: position.clone()
  });

  updateState();
}

// ─── Click Handler ───
let mouseDownPos = new THREE.Vector2();
let isMouseDown = false;

renderer.domElement.addEventListener('pointerdown', (e) => {
  mouseDownPos.set(e.clientX, e.clientY);
  isMouseDown = true;
});

renderer.domElement.addEventListener('pointerup', (e) => {
  if (!isMouseDown) return;
  isMouseDown = false;

  // Only place decal if mouse didn't move much (not a drag)
  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  if (Math.sqrt(dx * dx + dy * dy) > 5) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(sphere);

  if (intersects.length > 0) {
    const hit = intersects[0];
    placeDecalAt(hit.point, hit.face.normal.clone().transformDirection(sphere.matrixWorld).normalize());
  }
});

// ─── Undo ───
undoBtn.addEventListener('click', () => {
  if (decalStack.length === 0) return;
  const last = decalStack.pop();
  scene.remove(last.mesh);
  last.mesh.geometry.dispose();
  last.mesh.material.dispose();
  updateState();
});

// ─── Clear All ───
clearBtn.addEventListener('click', () => {
  while (decalStack.length > 0) {
    const item = decalStack.pop();
    scene.remove(item.mesh);
    item.mesh.geometry.dispose();
    item.mesh.material.dispose();
  }
  updateState();
});

// ─── ICG Helper: place decal programmatically at front of sphere ───
window.__ICG_placeDecal__ = function() {
  // Place at the front of the sphere (positive Z)
  const point = new THREE.Vector3(0, 0, 2); // sphere radius is 2
  const normal = new THREE.Vector3(0, 0, 1);
  placeDecalAt(point, normal);
};

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
updateState();
</script>
</body>
</html>
