<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js DecalGeometry Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
            user-select: none;
        }
        .control-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #45a049;
        }
        button:active {
            background: #3e8e41;
        }
        #clearBtn {
            background: #f44336;
        }
        #clearBtn:hover {
            background: #da190b;
        }
        input[type="color"] {
            cursor: pointer;
            padding: 0;
            border: none;
            width: 30px;
            height: 30px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="decalSize">Size:</label>
            <input type="range" id="decalSize" min="0.5" max="5" step="0.1" value="2">
        </div>
        <div class="control-group">
            <label for="decalColor">Color:</label>
            <input type="color" id="decalColor" value="#ff00aa">
        </div>
        <div class="control-group">
            <button id="undoBtn">Undo Last</button>
            <button id="clearBtn">Clear All</button>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            decalCount: 0,
            decalSize: 2,
            decalColor: "#ff00aa",
            lastDecalPos: { x: 0, y: 0, z: 0 },
            undoStackSize: 0
        };

        const decals = [];

        function updateState() {
            const sizeInput = document.getElementById('decalSize');
            const colorInput = document.getElementById('decalColor');
            
            let lastPos = { x: 0, y: 0, z: 0 };
            if (decals.length > 0) {
                const pos = decals[decals.length - 1].userData.hitPoint;
                lastPos = { x: pos.x, y: pos.y, z: pos.z };
            }

            window.__3D_STATE__ = {
                decalCount: decals.length,
                decalSize: parseFloat(sizeInput.value),
                decalColor: colorInput.value,
                lastDecalPos: lastPos,
                undoStackSize: decals.length
            };
        }

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight2.position.set(-10, -10, -10);
        scene.add(dirLight2);

        // Main Sphere Carrier
        const sphereRadius = 5;
        const sphereGeometry = new THREE.SphereGeometry(sphereRadius, 64, 64);
        const sphereMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x888888, 
            roughness: 0.4, 
            metalness: 0.1 
        });
        const sphereMesh = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(sphereMesh);

        // --- Decal Material Preparation ---
        // Create a procedural splat/circle texture to avoid external loading issues
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.8, 'rgba(255,255,255,0.9)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 256, 256);
        const decalTexture = new THREE.CanvasTexture(canvas);

        const baseDecalMaterial = new THREE.MeshStandardMaterial({
            map: decalTexture,
            transparent: true,
            depthTest: true,
            depthWrite: false,
            polygonOffset: true,
            polygonOffsetFactor: -4,
            polygonOffsetUnits: -4,
            roughness: 0.5,
            metalness: 0.1
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let pointerDownPos = new THREE.Vector2();

        function placeDecal(position, normal) {
            const dummy = new THREE.Object3D();
            dummy.position.copy(position);
            dummy.lookAt(position.clone().add(normal));
            
            // Randomize rotation around the normal slightly
            dummy.rotateZ(Math.random() * Math.PI * 2);

            const sizeVal = parseFloat(document.getElementById('decalSize').value);
            const size = new THREE.Vector3(sizeVal, sizeVal, sizeVal);

            const decalGeo = new DecalGeometry(sphereMesh, position, dummy.rotation, size);
            
            const material = baseDecalMaterial.clone();
            material.color.set(document.getElementById('decalColor').value);

            const decalMesh = new THREE.Mesh(decalGeo, material);
            decalMesh.userData.hitPoint = position.clone();
            
            scene.add(decalMesh);
            decals.push(decalMesh);
            
            updateState();
        }

        // Handle clicks (distinguish from drag)
        renderer.domElement.addEventListener('pointerdown', (e) => {
            pointerDownPos.set(e.clientX, e.clientY);
        });

        renderer.domElement.addEventListener('pointerup', (e) => {
            // If moved less than 2 pixels, consider it a click
            if (Math.abs(e.clientX - pointerDownPos.x) < 2 && Math.abs(e.clientY - pointerDownPos.y) < 2) {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObject(sphereMesh);

                if (intersects.length > 0) {
                    const hit = intersects[0];
                    placeDecal(hit.point, hit.face.normal);
                }
            }
        });

        // --- UI Event Listeners ---
        document.getElementById('decalSize').addEventListener('input', updateState);
        document.getElementById('decalColor').addEventListener('input', updateState);

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (decals.length > 0) {
                const decal = decals.pop();
                scene.remove(decal);
                decal.geometry.dispose();
                decal.material.dispose();
                updateState();
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            decals.forEach(decal => {
                scene.remove(decal);
                decal.geometry.dispose();
                decal.material.dispose();
            });
            decals.length = 0;
            updateState();
        });

        // --- ICG Helper ---
        window.__ICG_placeDecal__ = () => {
            // Place at the front of the sphere
            const pos = new THREE.Vector3(0, 0, sphereRadius);
            const normal = new THREE.Vector3(0, 0, 1);
            placeDecal(pos, normal);
        };

        // --- Render Loop ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize state
        updateState();
        animate();
    </script>
</body>
</html>
