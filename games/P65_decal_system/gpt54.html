<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js DecalGeometry 球体贴花演示</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 16px;
      backdrop-filter: blur(6px);
      min-width: 260px;
    }

    .ui h3 {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
    }

    .row label {
      min-width: 70px;
      font-size: 14px;
    }

    .row input[type="range"] {
      flex: 1;
    }

    .row input[type="number"] {
      width: 72px;
    }

    .row input[type="color"] {
      width: 44px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
    }

    .btns {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      background: #2b78ff;
      color: white;
      font-size: 14px;
    }

    button:hover {
      filter: brightness(1.08);
    }

    button.secondary {
      background: #666;
    }

    .tips {
      margin-top: 10px;
      font-size: 12px;
      color: #ddd;
      line-height: 1.5;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div class="ui">
      <h3>球体贴花 DecalGeometry</h3>

      <div class="row">
        <label for="decalSize">贴花大小</label>
        <input id="decalSize" type="range" min="0.15" max="1.2" step="0.01" value="0.35" />
        <input id="decalSizeNumber" type="number" min="0.15" max="1.2" step="0.01" value="0.35" />
      </div>

      <div class="row">
        <label for="decalColor">贴花颜色</label>
        <input id="decalColor" type="color" value="#ff4da6" />
      </div>

      <div class="btns">
        <button id="undoBtn" class="secondary">撤销</button>
        <button id="clearBtn" class="secondary">清空</button>
      </div>

      <div class="tips">
        点击球体表面放置贴花；拖拽可旋转视角。<br />
        状态暴露在 <code>window.__3D_STATE__</code>。<br />
        测试函数：<code>window.__ICG_placeDecal__()</code>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { DecalGeometry } from 'three/addons/geometries/DecalGeometry.js';

    const app = document.getElementById('app');
    const sizeInput = document.getElementById('decalSize');
    const sizeNumber = document.getElementById('decalSizeNumber');
    const colorInput = document.getElementById('decalColor');
    const undoBtn = document.getElementById('undoBtn');
    const clearBtn = document.getElementById('clearBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101418);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.8, 5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.2));

    const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight.position.set(3, 4, 5);
    scene.add(dirLight);

    const rimLight = new THREE.DirectionalLight(0x88aaff, 1.2);
    rimLight.position.set(-4, 2, -3);
    scene.add(rimLight);

    const sphereRadius = 1.5;

    const sphereGeometry = new THREE.SphereGeometry(sphereRadius, 96, 64);
    const sphereMaterial = new THREE.MeshStandardMaterial({
      color: 0xd9dde7,
      roughness: 0.55,
      metalness: 0.08
    });
    const sphereMesh = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(sphereMesh);

    const decalsGroup = new THREE.Group();
    scene.add(decalsGroup);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const decalMeshes = [];

    // 说明：
    // 当无贴花时，lastDecalPos 约定为 {x:0,y:0,z:0}
    window.__3D_STATE__ = {
      decalCount: 0,
      decalSize: parseFloat(sizeInput.value),
      decalColor: colorInput.value,
      lastDecalPos: { x: 0, y: 0, z: 0 },
      undoStackSize: 0
    };

    function updateState(lastPos = null) {
      window.__3D_STATE__.decalCount = decalMeshes.length;
      window.__3D_STATE__.decalSize = parseFloat(sizeInput.value);
      window.__3D_STATE__.decalColor = colorInput.value;
      window.__3D_STATE__.undoStackSize = decalMeshes.length;

      if (lastPos) {
        window.__3D_STATE__.lastDecalPos = {
          x: Number(lastPos.x.toFixed(6)),
          y: Number(lastPos.y.toFixed(6)),
          z: Number(lastPos.z.toFixed(6))
        };
      } else if (decalMeshes.length === 0) {
        window.__3D_STATE__.lastDecalPos = { x: 0, y: 0, z: 0 };
      }
    }

    function syncSizeInputs(fromRange = true) {
      if (fromRange) {
        sizeNumber.value = sizeInput.value;
      } else {
        let v = parseFloat(sizeNumber.value);
        if (Number.isNaN(v)) v = 0.35;
        v = Math.max(parseFloat(sizeInput.min), Math.min(parseFloat(sizeInput.max), v));
        sizeInput.value = String(v);
        sizeNumber.value = String(v);
      }
      updateState();
    }

    sizeInput.addEventListener('input', () => syncSizeInputs(true));
    sizeNumber.addEventListener('input', () => syncSizeInputs(false));
    colorInput.addEventListener('input', () => updateState());

    function createDecalMaterial(hexColor) {
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(hexColor),
        transparent: true,
        opacity: 0.95,
        roughness: 0.35,
        metalness: 0.0,
        polygonOffset: true,
        polygonOffsetFactor: -4,
        depthTest: true,
        depthWrite: false
      });
    }

    function placeDecalAt(point, normal) {
      const size = parseFloat(sizeInput.value);
      const color = colorInput.value;

      const up = new THREE.Vector3(0, 0, 1);
      const orientation = new THREE.Euler();

      const lookMat = new THREE.Matrix4();
      const target = point.clone().add(normal.clone());
      lookMat.lookAt(point, target, up);
      orientation.setFromRotationMatrix(lookMat);

      orientation.z += Math.random() * Math.PI * 2;

      const decalSize = new THREE.Vector3(size, size, size);
      const decalGeometry = new DecalGeometry(sphereMesh, point, orientation, decalSize);
      const decalMaterial = createDecalMaterial(color);
      const decalMesh = new THREE.Mesh(decalGeometry, decalMaterial);

      decalsGroup.add(decalMesh);
      decalMeshes.push(decalMesh);
      updateState(point);
    }

    function getIntersectionFromClient(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(sphereMesh, false);
      if (!hits.length) return null;

      const hit = hits[0];
      const normalMatrix = new THREE.Matrix3().getNormalMatrix(sphereMesh.matrixWorld);
      const worldNormal = hit.face.normal.clone().applyMatrix3(normalMatrix).normalize();

      return {
        point: hit.point.clone(),
        normal: worldNormal
      };
    }

    let pointerDownPos = null;
    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDownPos = { x: e.clientX, y: e.clientY };
    });

    renderer.domElement.addEventListener('pointerup', (e) => {
      if (!pointerDownPos) return;
      const dx = e.clientX - pointerDownPos.x;
      const dy = e.clientY - pointerDownPos.y;
      const moved = Math.sqrt(dx * dx + dy * dy);
      pointerDownPos = null;

      if (moved > 5) return;

      const hit = getIntersectionFromClient(e.clientX, e.clientY);
      if (hit) placeDecalAt(hit.point, hit.normal);
    });

    undoBtn.addEventListener('click', () => {
      const mesh = decalMeshes.pop();
      if (!mesh) {
        updateState();
        return;
      }
      decalsGroup.remove(mesh);
      mesh.geometry.dispose();
      mesh.material.dispose();

      if (decalMeshes.length > 0) {
        const last = decalMeshes[decalMeshes.length - 1].position;
        updateState(last);
      } else {
        updateState();
      }
    });

    clearBtn.addEventListener('click', () => {
      while (decalMeshes.length) {
        const mesh = decalMeshes.pop();
        decalsGroup.remove(mesh);
        mesh.geometry.dispose();
        mesh.material.dispose();
      }
      updateState();
    });

    window.__ICG_placeDecal__ = function () {
      const point = new THREE.Vector3(0, 0, sphereRadius);
      const normal = point.clone().normalize();
      placeDecalAt(point, normal);
    };

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const grid = new THREE.GridHelper(12, 24, 0x334455, 0x223344);
    grid.position.y = -2.2;
    scene.add(grid);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    syncSizeInputs(true);
    animate();
  </script>
</body>
</html>
