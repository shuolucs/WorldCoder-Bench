<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalanche Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 260px;
    z-index: 10;
}
#hud .title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
}
#hud .label { color: #aaa; }
#hud .value { color: #4fc3f7; font-weight: bold; }
#buttons {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
}
#buttons button {
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
#buttons button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
#buttons button:active { transform: translateY(0); }
#startBtn { background: #4CAF50; }
#pauseBtn { background: #FF9800; }
#resetBtn { background: #f44336; }
#undoBtn { background: #2196F3; }
#redoBtn { background: #9C27B0; }
#instructions {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0,0,0,0.75);
    color: #aaa;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
}
#instructions .key { color: #ffeb3b; font-weight: bold; }
</style>
</head>
<body>

<div id="hud">
    <div class="title">🏔️ Avalanche Simulation</div>
    <div><span class="label">Particles: </span><span class="value" id="hudParticles">0</span></div>
    <div><span class="label">Time: </span><span class="value" id="hudTime">0.0</span>s</div>
    <div><span class="label">Kinetic Energy: </span><span class="value" id="hudEnergy">0.00</span></div>
    <div><span class="label">Center of Mass: </span><span class="value" id="hudCOM">(0.0, 0.0, 0.0)</span></div>
    <div><span class="label">History: </span><span class="value" id="hudHistory">0 / 0</span></div>
    <div><span class="label">Particles at Rest: </span><span class="value" id="hudRest">0</span></div>
    <div><span class="label">Max Speed: </span><span class="value" id="hudMaxSpeed">0.00</span></div>
</div>

<div id="instructions">
    <div><span class="key">A</span> - Add 10 particles at peak</div>
    <div><span class="key">E</span> - Explosion from center of mass</div>
    <div><span class="key">Click</span> - Drop 5 particles on terrain</div>
    <div><span class="key">Ctrl+Z</span> - Undo</div>
    <div><span class="key">Ctrl+Y</span> - Redo</div>
</div>

<div id="buttons">
    <button id="startBtn">▶ Start</button>
    <button id="pauseBtn">⏸ Pause</button>
    <button id="resetBtn">↺ Reset</button>
    <button id="undoBtn">⟲ Undo</button>
    <button id="redoBtn">⟳ Redo</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 40, 60);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(50, 80, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 200;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

// Hemisphere light for sky
const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.3);
scene.add(hemiLight);

// OrbitControls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 5, 0);

// ============ TERRAIN ============
function getTerrainHeight(x, z) {
    return 8 * Math.sin(x * 0.15) * Math.cos(z * 0.12) + 4 * Math.sin(x * 0.3 + 1) * Math.sin(z * 0.25 + 2);
}

function getTerrainGradient(x, z) {
    const eps = 0.1;
    const hx1 = getTerrainHeight(x + eps, z);
    const hx0 = getTerrainHeight(x - eps, z);
    const hz1 = getTerrainHeight(x, z + eps);
    const hz0 = getTerrainHeight(x, z - eps);
    return {
        dhdx: (hx1 - hx0) / (2 * eps),
        dhdz: (hz1 - hz0) / (2 * eps)
    };
}

const terrainGeo = new THREE.PlaneGeometry(100, 100, 64, 64);
terrainGeo.rotateX(-Math.PI / 2);

const positions = terrainGeo.attributes.position;
const colors = [];
let maxTerrainY = -Infinity;
let peakX = 0, peakZ = 0;

for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const z = positions.getZ(i);
    const y = getTerrainHeight(x, z);
    positions.setY(i, y);

    if (y > maxTerrainY) {
        maxTerrainY = y;
        peakX = x;
        peakZ = z;
    }

    // Color gradient: green below 4, white above 8, blend between
    let r, g, b;
    if (y < 4) {
        r = 0.2; g = 0.5; b = 0.15;
    } else if (y > 8) {
        r = 1.0; g = 1.0; b = 1.0;
    } else {
        const t = (y - 4) / 4;
        r = 0.2 + t * 0.8;
        g = 0.5 + t * 0.5;
        b = 0.15 + t * 0.85;
    }
    colors.push(r, g, b);
}

terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshLambertMaterial({
    vertexColors: true,
    side: THREE.DoubleSide
});
const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// Pond/lake at (-10, 0, -10)
const pondGeo = new THREE.CircleGeometry(5, 32);
pondGeo.rotateX(-Math.PI / 2);
const pondMat = new THREE.MeshPhongMaterial({
    color: 0x2196F3,
    transparent: true,
    opacity: 0.6,
    shininess: 100
});
const pondHeight = getTerrainHeight(-10, -10);
const pond = new THREE.Mesh(pondGeo, pondMat);
pond.position.set(-10, pondHeight + 0.1, -10);
scene.add(pond);

// ============ FISH (placeholder since model won't load) ============
let fishMesh = null;
let fishBaseY = pondHeight + 0.5;

// Try loading GLTF, fallback to simple fish shape
try {
    const loader = new THREE.GLTFLoader();
    loader.load('._BarramundiFish.glb',
        (gltf) => {
            fishMesh = gltf.scene;
            fishMesh.position.set(-10, fishBaseY, -10);
            fishMesh.scale.set(5, 5, 5);
            scene.add(fishMesh);
        },
        undefined,
        (error) => {
            createFallbackFish();
        }
    );
} catch (e) {
    createFallbackFish();
}

// Fallback timeout
setTimeout(() => {
    if (!fishMesh) createFallbackFish();
}, 1000);

function createFallbackFish() {
    if (fishMesh) return;
    const fishGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.ConeGeometry(0.5, 2, 8);
    bodyGeo.rotateZ(Math.PI / 2);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xFF6F00, shininess: 80 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    fishGroup.add(body);

    // Tail
    const tailGeo = new THREE.ConeGeometry(0.4, 0.8, 4);
    tailGeo.rotateZ(-Math.PI / 2);
    const tail = new THREE.Mesh(tailGeo, bodyMat);
    tail.position.set(-1.2, 0, 0);
    fishGroup.add(tail);

    // Eye
    const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(0.6, 0.2, 0.3);
    fishGroup.add(eye);
    const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
    eye2.position.set(0.6, 0.2, -0.3);
    fishGroup.add(eye2);

    fishGroup.position.set(-10, fishBaseY, -10);
    fishGroup.scale.set(1.5, 1.5, 1.5);
    scene.add(fishGroup);
    fishMesh = fishGroup;
}

// ============ SNOW PARTICLES ============
const snowParticles = [];
const snowGeo = new THREE.SphereGeometry(0.3, 8, 6);
const snowMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF, shininess: 60 });

function createParticle(x, y, z) {
    const mesh = new THREE.Mesh(snowGeo, snowMat);
    mesh.castShadow = true;
    mesh.position.set(x, y, z);
    scene.add(mesh);
    return {
        mesh: mesh,
        vx: 0, vy: 0, vz: 0,
        ax: 0, ay: 0, az: 0
    };
}

function addParticlesAtPeak(count) {
    const maxTotal = 200;
    const toAdd = Math.min(count, maxTotal - snowParticles.length);
    for (let i = 0; i < toAdd; i++) {
        const ox = (Math.random() - 0.5) * 3;
        const oz = (Math.random() - 0.5) * 3;
        const px = peakX + ox;
        const pz = peakZ + oz;
        const py = getTerrainHeight(px, pz) + 0.5 + Math.random() * 2;
        snowParticles.push(createParticle(px, py, pz));
    }
}

function addParticlesAtPosition(x, y, z, count) {
    const maxTotal = 200;
    const toAdd = Math.min(count, maxTotal - snowParticles.length);
    for (let i = 0; i < toAdd; i++) {
        const ox = (Math.random() - 0.5) * 2;
        const oz = (Math.random() - 0.5) * 2;
        const px = x + ox;
        const pz = z + oz;
        const py = Math.max(y, getTerrainHeight(px, pz)) + 0.5 + Math.random();
        snowParticles.push(createParticle(px, py, pz));
    }
}

// Initial 50 particles at peak
addParticlesAtPeak(50);

// Store initial positions for reset
const initialPositions = snowParticles.map(p => ({
    x: p.mesh.position.x,
    y: p.mesh.position.y,
    z: p.mesh.position.z
}));

// ============ SIMULATION STATE ============
let simRunning = false;
let simTime = 0;
let frameCount = 0;
const dt = 1 / 60;
const gravity = -9.8;
const damping = 0.98;
const slopeForce = 5.0;
const maxVelocity = 20;

// ============ UNDO/REDO ============
let undoStack = [];
let redoStack = [];
let historySnapshotCount = 0;
const maxHistory = 30;
let lastAction = 'none';

function takeSnapshot() {
    const snapshot = {
        particles: snowParticles.map(p => ({
            x: p.mesh.position.x,
            y: p.mesh.position.y,
            z: p.mesh.position.z,
            vx: p.vx, vy: p.vy, vz: p.vz
        })),
        simTime: simTime,
        fishPosition: fishMesh ? {
            x: fishMesh.position.x,
            y: fishMesh.position.y,
            z: fishMesh.position.z
        } : { x: -10, y: fishBaseY, z: -10 }
    };
    return snapshot;
}

function restoreSnapshot(snapshot) {
    // Restore existing particles
    for (let i = 0; i < snapshot.particles.length && i < snowParticles.length; i++) {
        const p = snowParticles[i];
        const s = snapshot.particles[i];
        p.mesh.position.set(s.x, s.y, s.z);
        p.vx = s.vx; p.vy = s.vy; p.vz = s.vz;
    }

    // Remove extra particles
    while (snowParticles.length > snapshot.particles.length) {
        const p = snowParticles.pop();
        scene.remove(p.mesh);
    }

    // Add missing particles
    while (snowParticles.length < snapshot.particles.length) {
        const idx = snowParticles.length;
        const s = snapshot.particles[idx];
        const p = createParticle(s.x, s.y, s.z);
        p.vx = s.vx; p.vy = s.vy; p.vz = s.vz;
        snowParticles.push(p);
    }

    simTime = snapshot.simTime;
    if (fishMesh && snapshot.fishPosition) {
        fishMesh.position.set(snapshot.fishPosition.x, snapshot.fishPosition.y, snapshot.fishPosition.z);
    }
}

function saveToUndoStack() {
    undoStack.push(takeSnapshot());
    if (undoStack.length > maxHistory) {
        undoStack.shift();
    }
    historySnapshotCount++;
    // Clear redo stack on new action
    redoStack = [];
}

function undo() {
    if (undoStack.length === 0) return;
    redoStack.push(takeSnapshot());
    const snapshot = undoStack.pop();
    restoreSnapshot(snapshot);
    lastAction = 'undo';
}

function redo() {
    if (redoStack.length === 0) return;
    undoStack.push(takeSnapshot());
    const snapshot = redoStack.pop();
    restoreSnapshot(snapshot);
    lastAction = 'redo';
}

// ============ PHYSICS ============
function updatePhysics() {
    for (const p of snowParticles) {
        const px = p.mesh.position.x;
        const pz = p.mesh.position.z;

        // Terrain gradient
        const grad = getTerrainGradient(px, pz);

        // Acceleration: gravity + slope forces
        p.ax = -grad.dhdx * slopeForce;
        p.ay = gravity;
        p.az = -grad.dhdz * slopeForce;

        // Update velocity
        p.vx += p.ax * dt;
        p.vy += p.ay * dt;
        p.vz += p.az * dt;

        // Damping
        p.vx *= damping;
        p.vy *= damping;
        p.vz *= damping;

        // Velocity cap
        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy + p.vz * p.vz);
        if (speed > maxVelocity) {
            const scale = maxVelocity / speed;
            p.vx *= scale;
            p.vy *= scale;
            p.vz *= scale;
        }

        // Update position
        p.mesh.position.x += p.vx * dt;
        p.mesh.position.y += p.vy * dt;
        p.mesh.position.z += p.vz * dt;

        // Terrain collision
        const terrainY = getTerrainHeight(p.mesh.position.x, p.mesh.position.z);
        if (p.mesh.position.y < terrainY + 0.3) {
            p.mesh.position.y = terrainY + 0.3;
            if (p.vy < 0) {
                p.vy = -p.vy * 0.2; // Bounce with energy loss
            }
        }

        // Boundary clamping
        p.mesh.position.x = Math.max(-50, Math.min(50, p.mesh.position.x));
        p.mesh.position.z = Math.max(-50, Math.min(50, p.mesh.position.z));
    }

    simTime += dt;
}

// ============ COMPUTE STATS ============
function computeStats() {
    let totalKE = 0;
    let comX = 0, comY = 0, comZ = 0;
    let maxSpeed = 0;
    let atRest = 0;
    let hasNaN = false;
    let allAbove = true;

    const n = snowParticles.length;
    for (const p of snowParticles) {
        const px = p.mesh.position.x;
        const py = p.mesh.position.y;
        const pz = p.mesh.position.z;

        if (isNaN(px) || isNaN(py) || isNaN(pz) || isNaN(p.vx) || isNaN(p.vy) || isNaN(p.vz)) {
            hasNaN = true;
        }

        const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy + p.vz * p.vz);
        totalKE += 0.5 * 1.0 * speed * speed;
        comX += px;
        comY += py;
        comZ += pz;
        if (speed > maxSpeed) maxSpeed = speed;
        if (speed < 0.1) atRest++;

        const terrainY = getTerrainHeight(px, pz);
        if (py < terrainY - 0.01) allAbove = false;
    }

    if (n > 0) {
        comX /= n; comY /= n; comZ /= n;
    }

    return { totalKE, comX, comY, comZ, maxSpeed, atRest, hasNaN, allAbove };
}

// ============ UI UPDATES ============
function updateHUD(stats) {
    document.getElementById('hudParticles').textContent = snowParticles.length;
    document.getElementById('hudTime').textContent = simTime.toFixed(1);
    document.getElementById('hudEnergy').textContent = stats.totalKE.toFixed(2);
    document.getElementById('hudCOM').textContent = `(${stats.comX.toFixed(1)}, ${stats.comY.toFixed(1)}, ${stats.comZ.toFixed(1)})`;
    document.getElementById('hudHistory').textContent = `${undoStack.length} / ${redoStack.length}`;
    document.getElementById('hudRest').textContent = stats.atRest;
    document.getElementById('hudMaxSpeed').textContent = stats.maxSpeed.toFixed(2);
}

// ============ GLOBAL STATE ============
window.__3D_STATE__ = {
    simRunning: false,
    particleCount: 0,
    simTime: 0,
    totalKineticEnergy: 0,
    centerOfMass: { x: 0, y: 0, z: 0 },
    undoStackSize: 0,
    redoStackSize: 0,
    fishPosition: { x: -10, y: fishBaseY, z: -10 },
    maxParticleSpeed: 0,
    particlesAtRest: 0,
    frameCount: 0,
    historySnapshotCount: 0,
    lastAction: 'none',
    allParticlesAboveTerrain: true,
    hasNaN: false
};

function updateGlobalState(stats) {
    window.__3D_STATE__.simRunning = simRunning;
    window.__3D_STATE__.particleCount = snowParticles.length;
    window.__3D_STATE__.simTime = simTime;
    window.__3D_STATE__.totalKineticEnergy = stats.totalKE;
    window.__3D_STATE__.centerOfMass = { x: stats.comX, y: stats.comY, z: stats.comZ };
    window.__3D_STATE__.undoStackSize = undoStack.length;
    window.__3D_STATE__.redoStackSize = redoStack.length;
    window.__3D_STATE__.fishPosition = fishMesh ? {
        x: fishMesh.position.x,
        y: fishMesh.position.y,
        z: fishMesh.position.z
    } : { x: -10, y: fishBaseY, z: -10 };
    window.__3D_STATE__.maxParticleSpeed = stats.maxSpeed;
    window.__3D_STATE__.particlesAtRest = stats.atRest;
    window.__3D_STATE__.frameCount = frameCount;
    window.__3D_STATE__.historySnapshotCount = historySnapshotCount;
    window.__3D_STATE__.lastAction = lastAction;
    window.__3D_STATE__.allParticlesAboveTerrain = stats.allAbove;
    window.__3D_STATE__.hasNaN = stats.hasNaN;
}

// ============ EVENT HANDLERS ============
document.getElementById('startBtn').addEventListener('click', () => {
    simRunning = true;
    lastAction = 'start';
});

document.getElementById('pauseBtn').addEventListener('click', () => {
    simRunning = false;
    lastAction = 'pause';
});

document.getElementById('resetBtn').addEventListener('click', () => {
    simRunning = false;
    simTime = 0;
    frameCount = 0;
    undoStack = [];
    redoStack = [];
    lastAction = 'reset';

    // Remove all particles
    for (const p of snowParticles) {
        scene.remove(p.mesh);
    }
    snowParticles.length = 0;

    // Recreate initial 50 particles
    for (let i = 0; i < initialPositions.length; i++) {
        const ip = initialPositions[i];
        snowParticles.push(createParticle(ip.x, ip.y, ip.z));
    }
});

document.getElementById('undoBtn').addEventListener('click', () => { undo(); });
document.getElementById('redoBtn').addEventListener('click', () => { redo(); });

document.addEventListener('keydown', (e) => {
    if (e.key === 'a' || e.key === 'A') {
        addParticlesAtPeak(10);
        lastAction = 'addParticles';
    }
    if (e.key === 'e' || e.key === 'E') {
        // Explosion from center of mass
        const stats = computeStats();
        const cx = stats.comX, cy = stats.comY, cz = stats.comZ;
        for (const p of snowParticles) {
            const dx = p.mesh.position.x - cx;
            const dy = p.mesh.position.y - cy;
            const dz = p.mesh.position.z - cz;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz) || 1;
            p.vx += (dx / dist) * 8;
            p.vy += (dy / dist) * 8;
            p.vz += (dz / dist) * 8;
        }
        lastAction = 'explosion';
    }
    if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
    }
    if (e.ctrlKey && e.key === 'y') {
        e.preventDefault();
        redo();
    }
});

// Raycasting for click on terrain
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
    // Ignore if clicking on UI
    if (e.target !== renderer.domElement) return;

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(terrain);
    if (intersects.length > 0) {
        const point = intersects[0].point;
        addParticlesAtPosition(point.x, point.y, point.z, 5);
        lastAction = 'clickDrop';
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ PARTICLE TRAIL EFFECT ============
// Add some visual snow dust particles using points
const dustCount = 500;
const dustGeo = new THREE.BufferGeometry();
const dustPositions = new Float32Array(dustCount * 3);
for (let i = 0; i < dustCount; i++) {
    dustPositions[i * 3] = (Math.random() - 0.5) * 100;
    dustPositions[i * 3 + 1] = Math.random() * 30 + 5;
    dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
}
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
const dustMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.5 });
const dustParticles = new THREE.Points(dustGeo, dustMat);
scene.add(dustParticles);

// ============ ANIMATION LOOP ============
let snapshotTimer = 0;

function animate() {
    requestAnimationFrame(animate);

    frameCount++;

    // Fish bobbing animation
    if (fishMesh) {
        fishMesh.position.y = fishBaseY + Math.sin(Date.now() * 0.001 * Math.PI * 2) * 0.3;
    }

    // Dust animation
    const dustPos = dustGeo.attributes.position;
    for (let i = 0; i < dustCount; i++) {
        dustPos.array[i * 3 + 1] -= 0.02;
        if (dustPos.array[i * 3 + 1] < 0) {
            dustPos.array[i * 3 + 1] = 30 + Math.random() * 10;
        }
    }
    dustPos.needsUpdate = true;

    // Physics
    if (simRunning) {
        updatePhysics();
        snapshotTimer++;

        // Auto-save snapshot every 60 frames
        if (snapshotTimer >= 60) {
            saveToUndoStack();
            snapshotTimer = 0;
        }
    }

    // Compute stats
    const stats = computeStats();

    // NaN check - auto pause
    if (stats.hasNaN) {
        simRunning = false;
    }

    // Update HUD
    updateHUD(stats);

    // Update global state
    updateGlobalState(stats);

    // Controls
    controls.update();

    // Render
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
