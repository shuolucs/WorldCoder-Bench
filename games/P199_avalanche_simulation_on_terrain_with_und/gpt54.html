<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Avalanche Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87b6e6;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      font-size: 14px;
      line-height: 1.5;
      border-radius: 8px;
      min-width: 260px;
      z-index: 10;
      white-space: pre-line;
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      background: white;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <div id="controls">
    <button id="startBtn">Start</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
    <button id="undoBtn">Undo</button>
    <button id="redoBtn">Redo</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9dc7f0);
    scene.fog = new THREE.Fog(0x9dc7f0, 80, 180);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 40, 60);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(50, 80, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -80;
    dirLight.shadow.camera.right = 80;
    dirLight.shadow.camera.top = 80;
    dirLight.shadow.camera.bottom = -80;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 250;
    scene.add(dirLight);

    const terrainSize = 100;
    const terrainSegments = 64;
    const terrainGeometry = new THREE.PlaneGeometry(
      terrainSize,
      terrainSize,
      terrainSegments,
      terrainSegments
    );
    terrainGeometry.rotateX(-Math.PI / 2);

    function terrainHeight(x, z) {
      return (
        8 * Math.sin(x * 0.15) * Math.cos(z * 0.12) +
        4 * Math.sin(x * 0.3 + 1) * Math.sin(z * 0.25 + 2)
      );
    }

    function terrainGradient(x, z) {
      const dhdx =
        8 * 0.15 * Math.cos(x * 0.15) * Math.cos(z * 0.12) +
        4 * 0.3 * Math.cos(x * 0.3 + 1) * Math.sin(z * 0.25 + 2);

      const dhdz =
        8 * Math.sin(x * 0.15) * (-0.12) * Math.sin(z * 0.12) +
        4 * Math.sin(x * 0.3 + 1) * 0.25 * Math.cos(z * 0.25 + 2);

      return new THREE.Vector2(dhdx, dhdz);
    }

    const posAttr = terrainGeometry.attributes.position;
    const colors = [];
    let maxPeak = { x: 0, y: -Infinity, z: 0 };

    for (let i = 0; i < posAttr.count; i++) {
      const x = posAttr.getX(i);
      const z = posAttr.getZ(i);
      const y = terrainHeight(x, z);
      posAttr.setY(i, y);

      if (y > maxPeak.y) {
        maxPeak = { x, y, z };
      }

      let color;
      if (y <= 4) {
        color = new THREE.Color(0x3c9b4a);
      } else if (y >= 8) {
        color = new THREE.Color(0xffffff);
      } else {
        const t = (y - 4) / 4;
        color = new THREE.Color(0x3c9b4a).lerp(new THREE.Color(0xffffff), t);
      }
      colors.push(color.r, color.g, color.b);
    }

    terrainGeometry.setAttribute(
      "color",
      new THREE.Float32BufferAttribute(colors, 3)
    );
    terrainGeometry.computeVertexNormals();

    const terrainMaterial = new THREE.MeshLambertMaterial({
      vertexColors: true
    });
    const terrain = new THREE.Mesh(terrainGeometry, terrainMaterial);
    terrain.receiveShadow = true;
    terrain.castShadow = false;
    scene.add(terrain);

    const lakeGeometry = new THREE.CircleGeometry(8, 48);
    const lakeMaterial = new THREE.MeshPhongMaterial({
      color: 0x4da6d9,
      transparent: true,
      opacity: 0.85
    });
    const lake = new THREE.Mesh(lakeGeometry, lakeMaterial);
    lake.rotation.x = -Math.PI / 2;
    lake.position.set(-10, terrainHeight(-10, -10) + 0.08, -10);
    scene.add(lake);

    let fish = null;
    let fishBasePosition = new THREE.Vector3(-10, 0, -10);
    const loader = new GLTFLoader();
    loader.load(
      "._BarramundiFish.glb",
      (gltf) => {
        fish = gltf.scene;
        fish.scale.set(5, 5, 5);
        fishBasePosition.set(-10, terrainHeight(-10, -10) + 0.8, -10);
        fish.position.copy(fishBasePosition);
        fish.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(fish);
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.SphereGeometry(1.2, 24, 16),
          new THREE.MeshStandardMaterial({ color: 0xff8844 })
        );
        fallback.scale.set(1.8, 1, 0.8);
        fish = fallback;
        fishBasePosition.set(-10, terrainHeight(-10, -10) + 0.8, -10);
        fish.position.copy(fishBasePosition);
        fish.castShadow = true;
        scene.add(fish);
      }
    );

    const particleGeometry = new THREE.SphereGeometry(0.3, 10, 10);
    const particleMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff
    });

    const particles = [];
    const initialParticleStates = [];
    const undoStack = [];
    const redoStack = [];
    let historySnapshotCount = 0;

    let simRunning = false;
    let simTime = 0;
    let frameCount = 0;
    let accumulator = 0;
    const fixedDt = 1 / 60;
    let lastFrame = performance.now() / 1000;
    let lastAction = "none";
    let totalKineticEnergy = 0;
    const centerOfMass = new THREE.Vector3();
    let maxParticleSpeed = 0;
    let particlesAtRest = 0;
    let allParticlesAboveTerrain = true;
    let hasNaN = false;

    function createParticle(position, velocity = new THREE.Vector3()) {
      const mesh = new THREE.Mesh(particleGeometry, particleMaterial);
      mesh.castShadow = true;
      mesh.receiveShadow = false;
      mesh.position.copy(position);
      scene.add(mesh);

      const particle = {
        mesh,
        position: mesh.position.clone(),
        velocity: velocity.clone(),
        mass: 1.0
      };
      particles.push(particle);
      return particle;
    }

    function getPeakSpawnPosition(spread = 1.2) {
      return new THREE.Vector3(
        maxPeak.x + (Math.random() - 0.5) * spread,
        maxPeak.y + 1 + Math.random() * 0.5,
        maxPeak.z + (Math.random() - 0.5) * spread
      );
    }

    function initializeParticles(count = 50) {
      for (const p of particles) {
        scene.remove(p.mesh);
      }
      particles.length = 0;
      initialParticleStates.length = 0;

      for (let i = 0; i < count; i++) {
        const pos = getPeakSpawnPosition();
        const p = createParticle(pos, new THREE.Vector3(0, 0, 0));
        initialParticleStates.push({
          position: p.position.clone(),
          velocity: p.velocity.clone()
        });
      }
      syncParticleMeshes();
    }

    function syncParticleMeshes() {
      for (const p of particles) {
        p.mesh.position.copy(p.position);
      }
    }

    function computeSystemStats() {
      totalKineticEnergy = 0;
      centerOfMass.set(0, 0, 0);
      maxParticleSpeed = 0;
      particlesAtRest = 0;
      allParticlesAboveTerrain = true;
      hasNaN = false;

      if (particles.length === 0) return;

      for (const p of particles) {
        const speed = p.velocity.length();
        const terrainY = terrainHeight(p.position.x, p.position.z);

        totalKineticEnergy += 0.5 * p.mass * speed * speed;
        centerOfMass.add(p.position);
        maxParticleSpeed = Math.max(maxParticleSpeed, speed);
        if (speed < 0.1) particlesAtRest++;

        if (p.position.y < terrainY - 1e-4) {
          allParticlesAboveTerrain = false;
        }

        const vals = [
          p.position.x, p.position.y, p.position.z,
          p.velocity.x, p.velocity.y, p.velocity.z
        ];
        if (vals.some(v => Number.isNaN(v) || !Number.isFinite(v))) {
          hasNaN = true;
        }
      }

      centerOfMass.divideScalar(particles.length);

      if (hasNaN) {
        simRunning = false;
      }
    }

    function captureSnapshot() {
      const snapshot = {
        particles: particles.map(p => ({
          position: p.position.toArray(),
          velocity: p.velocity.toArray()
        })),
        simTime,
        fishPosition: fish ? fish.position.toArray() : fishBasePosition.toArray(),
        frameCount
      };
      return snapshot;
    }

    function applySnapshot(snapshot) {
      while (particles.length > snapshot.particles.length) {
        const p = particles.pop();
        scene.remove(p.mesh);
      }

      while (particles.length < snapshot.particles.length) {
        createParticle(new THREE.Vector3(), new THREE.Vector3());
      }

      snapshot.particles.forEach((sp, i) => {
        particles[i].position.fromArray(sp.position);
        particles[i].velocity.fromArray(sp.velocity);
      });

      if (fish) {
        fish.position.fromArray(snapshot.fishPosition);
      } else {
        fishBasePosition.fromArray(snapshot.fishPosition);
      }

      simTime = snapshot.simTime;
      frameCount = snapshot.frameCount;
      syncParticleMeshes();
      computeSystemStats();
    }

    function saveHistorySnapshot() {
      undoStack.push(captureSnapshot());
      if (undoStack.length > 30) undoStack.shift();
      historySnapshotCount++;
    }

    function undo() {
      if (undoStack.length <= 1) return;
      const current = undoStack.pop();
      redoStack.push(current);
      const prev = undoStack[undoStack.length - 1];
      applySnapshot(prev);
      simRunning = false;
      lastAction = "undo";
    }

    function redo() {
      if (redoStack.length === 0) return;
      const snapshot = redoStack.pop();
      undoStack.push(snapshot);
      applySnapshot(snapshot);
      simRunning = false;
      lastAction = "redo";
    }

    function clearRedoOnNewAction() {
      if (redoStack.length > 0) redoStack.length = 0;
    }

    function resetSimulation() {
      simRunning = false;
      simTime = 0;
      frameCount = 0;
      accumulator = 0;

      while (particles.length > initialParticleStates.length) {
        const p = particles.pop();
        scene.remove(p.mesh);
      }

      while (particles.length < initialParticleStates.length) {
        createParticle(new THREE.Vector3(), new THREE.Vector3());
      }

      initialParticleStates.forEach((state, i) => {
        particles[i].position.copy(state.position);
        particles[i].velocity.copy(state.velocity);
      });

      if (fish) fish.position.copy(fishBasePosition);

      undoStack.length = 0;
      redoStack.length = 0;
      historySnapshotCount = 0;
      syncParticleMeshes();
      computeSystemStats();
      saveHistorySnapshot();
      lastAction = "reset";
    }

    function addParticles(n) {
      clearRedoOnNewAction();
      const toAdd = Math.min(n, 200 - particles.length);
      for (let i = 0; i < toAdd; i++) {
        createParticle(getPeakSpawnPosition(), new THREE.Vector3());
      }
      syncParticleMeshes();
      computeSystemStats();
      lastAction = "addParticles";
    }

    function triggerExplosion() {
      if (particles.length === 0) return;
      clearRedoOnNewAction();
      computeSystemStats();
      for (const p of particles) {
        const dir = p.position.clone().sub(centerOfMass);
        if (dir.lengthSq() < 1e-6) {
          dir.set(
            Math.random() - 0.5,
            Math.random() * 0.5,
            Math.random() - 0.5
          );
        }
        dir.normalize().multiplyScalar(8);
        p.velocity.add(dir);
      }
      lastAction = "explosion";
    }

    function dropParticlesAt(position, count = 5) {
      clearRedoOnNewAction();
      for (let i = 0; i < count && particles.length < 200; i++) {
        const pos = position.clone().add(new THREE.Vector3(
          (Math.random() - 0.5) * 1.2,
          1 + Math.random() * 0.5,
          (Math.random() - 0.5) * 1.2
        ));
        createParticle(pos, new THREE.Vector3());
      }
      lastAction = "clickDrop";
    }

    function physicsStep(dt) {
      if (redoStack.length > 0) redoStack.length = 0;

      for (const p of particles) {
        const grad = terrainGradient(p.position.x, p.position.z);

        p.velocity.y += -9.8 * dt;
        p.velocity.x += (-grad.x * 5.0) * dt;
        p.velocity.z += (-grad.y * 5.0) * dt;

        p.velocity.multiplyScalar(0.98);

        const speed = p.velocity.length();
        if (speed > 20) {
          p.velocity.multiplyScalar(20 / speed);
        }

        p.position.addScaledVector(p.velocity, dt);

        const groundY = terrainHeight(p.position.x, p.position.z);
        if (p.position.y < groundY) {
          p.position.y = groundY;
          if (p.velocity.y < 0) p.velocity.y = 0;

          const gradGround = terrainGradient(p.position.x, p.position.z);
          const slopeMag = gradGround.length();
          if (slopeMag < 0.05) {
            p.velocity.x *= 0.85;
            p.velocity.z *= 0.85;
          }
        }
      }

      simTime += dt;
      frameCount++;

      if (frameCount % 60 === 0) {
        saveHistorySnapshot();
      }

      syncParticleMeshes();
      computeSystemStats();
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener("click", (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(terrain);
      if (hits.length > 0) {
        dropParticlesAt(hits[0].point, 5);
      }
    });

    document.getElementById("startBtn").addEventListener("click", () => {
      simRunning = true;
      clearRedoOnNewAction();
      lastAction = "start";
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
      simRunning = false;
      lastAction = "pause";
    });

    document.getElementById("resetBtn").addEventListener("click", () => {
      resetSimulation();
    });

    document.getElementById("undoBtn").addEventListener("click", () => {
      undo();
    });

    document.getElementById("redoBtn").addEventListener("click", () => {
      redo();
    });

    window.addEventListener("keydown", (e) => {
      if (e.ctrlKey && e.key.toLowerCase() === "z") {
        e.preventDefault();
        undo();
        return;
      }
      if (e.ctrlKey && e.key.toLowerCase() === "y") {
        e.preventDefault();
        redo();
        return;
      }

      if (e.key.toLowerCase() === "a") {
        addParticles(10);
      }

      if (e.key.toLowerCase() === "e") {
        triggerExplosion();
      }
    });

    const hud = document.getElementById("hud");

    function updateHUD() {
      hud.textContent =
`Particle Count: ${particles.length}
Simulation Time: ${simTime.toFixed(1)} s
Total Kinetic Energy: ${totalKineticEnergy.toFixed(2)}
Center of Mass: (${centerOfMass.x.toFixed(1)}, ${centerOfMass.y.toFixed(1)}, ${centerOfMass.z.toFixed(1)})
History stack size: ${undoStack.length} / ${redoStack.length}`;
    }

    window.__3D_STATE__ = {
      simRunning: false,
      particleCount: 0,
      simTime: 0,
      totalKineticEnergy: 0,
      centerOfMass: { x: 0, y: 0, z: 0 },
      undoStackSize: 0,
      redoStackSize: 0,
      fishPosition: { x: fishBasePosition.x, y: fishBasePosition.y, z: fishBasePosition.z },
      maxParticleSpeed: 0,
      particlesAtRest: 0,
      frameCount: 0,
      historySnapshotCount: 0,
      lastAction: "none",
      allParticlesAboveTerrain: true,
      hasNaN: false
    };

    function updateExposedState() {
      const fishPos = fish ? fish.position : fishBasePosition;
      window.__3D_STATE__.simRunning = simRunning;
      window.__3D_STATE__.particleCount = particles.length;
      window.__3D_STATE__.simTime = simTime;
      window.__3D_STATE__.totalKineticEnergy = totalKineticEnergy;
      window.__3D_STATE__.centerOfMass = {
        x: centerOfMass.x,
        y: centerOfMass.y,
        z: centerOfMass.z
      };
      window.__3D_STATE__.undoStackSize = undoStack.length;
      window.__3D_STATE__.redoStackSize = redoStack.length;
      window.__3D_STATE__.fishPosition = {
        x: fishPos.x,
        y: fishPos.y,
        z: fishPos.z
      };
      window.__3D_STATE__.maxParticleSpeed = maxParticleSpeed;
      window.__3D_STATE__.particlesAtRest = particlesAtRest;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.historySnapshotCount = historySnapshotCount;
      window.__3D_STATE__.lastAction = lastAction;
      window.__3D_STATE__.allParticlesAboveTerrain = allParticlesAboveTerrain;
      window.__3D_STATE__.hasNaN = hasNaN;
    }

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now() / 1000;
      let delta = now - lastFrame;
      lastFrame = now;
      delta = Math.min(delta, 0.1);

      controls.update();

      if (fish) {
        fish.position.x = fishBasePosition.x;
        fish.position.z = fishBasePosition.z;
        fish.position.y = fishBasePosition.y + 0.3 * Math.sin(simTime * Math.PI * 2 * 1.0);
      }

      if (simRunning) {
        accumulator += delta;
        while (accumulator >= fixedDt) {
          physicsStep(fixedDt);
          accumulator -= fixedDt;
          if (hasNaN) break;
        }
      } else {
        computeSystemStats();
      }

      updateHUD();
      updateExposedState();

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initializeParticles(50);
    computeSystemStats();
    saveHistorySnapshot();
    updateHUD();
    updateExposedState();
    animate();
  </script>
</body>
</html>
