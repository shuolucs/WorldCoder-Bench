<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Mesh Deformation Tool</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #e0e0e0;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-width: 220px;
}

#hud h3 {
    margin-bottom: 8px;
    color: #64ffda;
    font-size: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    padding-bottom: 6px;
}

#hud .stat-label {
    color: #aaa;
}

#hud .stat-value {
    color: #64ffda;
    font-weight: bold;
}

#controls {
    position: absolute;
    top: 15px;
    right: 15px;
    color: #e0e0e0;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-width: 260px;
}

#controls h3 {
    margin-bottom: 10px;
    color: #ff6b9d;
    font-size: 16px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    padding-bottom: 6px;
}

#controls label {
    display: block;
    margin-top: 10px;
    margin-bottom: 4px;
    color: #ccc;
}

#controls input[type="range"] {
    width: 100%;
    accent-color: #ff6b9d;
    cursor: pointer;
}

#controls .slider-value {
    float: right;
    color: #ff6b9d;
    font-weight: bold;
}

.btn-group {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.btn {
    flex: 1;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    transition: all 0.2s;
}

#undoBtn {
    background: #3a3a5c;
    color: #e0e0e0;
    border: 1px solid rgba(255, 255, 255, 0.15);
}

#undoBtn:hover {
    background: #4a4a7c;
}

#resetBtn {
    background: #5c2a2a;
    color: #e0e0e0;
    border: 1px solid rgba(255, 255, 255, 0.15);
}

#resetBtn:hover {
    background: #7c3a3a;
}

#instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.08);
}

#instructions span {
    color: #64ffda;
}

#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #64ffda;
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>
<body>

<div id="hud">
    <h3>📊 Statistics</h3>
    <div><span class="stat-label">Deform Count: </span><span class="stat-value" id="deformCount">0</span></div>
    <div><span class="stat-label">Brush Size: </span><span class="stat-value" id="brushValue">0.15</span></div>
    <div><span class="stat-label">Undo Stack: </span><span class="stat-value" id="undoSize">0</span></div>
</div>

<div id="controls">
    <h3>🎨 Brush Controls</h3>
    <label>Brush Size <span class="slider-value" id="brushSizeDisplay">0.15</span></label>
    <input type="range" id="brushSize" min="0.05" max="0.5" step="0.01" value="0.15">
    <label>Strength <span class="slider-value" id="strengthDisplay">0.03</span></label>
    <input type="range" id="strength" min="0.01" max="0.1" step="0.005" value="0.03">
    <div class="btn-group">
        <button class="btn" id="undoBtn">↩ Undo</button>
        <button class="btn" id="resetBtn">🔄 Reset</button>
    </div>
</div>

<div id="instructions">
    <span>Left Click</span> to push outward · <span>Shift + Click</span> to push inward · <span>Right Drag</span> to rotate
</div>

<div id="loading">Loading model...</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    deformCount: 0,
    brushSize: 0.15,
    strength: 0.03,
    undoStackSize: 0,
    vertexCount: 0
};

let deformCount = 0;
const undoStack = [];
const MAX_UNDO = 20;
let originalPositions = null;
let targetMesh = null;
let isDeforming = false;
let shiftPressed = false;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0.15, 0.6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight1.position.set(3, 5, 3);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.8);
dirLight2.position.set(-3, 2, -3);
scene.add(dirLight2);

const pointLight = new THREE.PointLight(0xff6b9d, 0.5, 10);
pointLight.position.set(0, 1, 2);
scene.add(pointLight);

// Grid helper
const gridHelper = new THREE.GridHelper(2, 20, 0x333355, 0x222244);
scene.add(gridHelper);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Brush indicator
const brushIndicator = new THREE.Mesh(
    new THREE.SphereGeometry(0.15, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0x64ffda, transparent: true, opacity: 0.15, wireframe: false, depthWrite: false })
);
brushIndicator.visible = false;
scene.add(brushIndicator);

const brushRing = new THREE.Mesh(
    new THREE.RingGeometry(0.14, 0.15, 64),
    new THREE.MeshBasicMaterial({ color: 0x64ffda, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false })
);
brushRing.visible = false;
scene.add(brushRing);

// UI Elements
const brushSizeSlider = document.getElementById('brushSize');
const strengthSlider = document.getElementById('strength');
const brushSizeDisplay = document.getElementById('brushSizeDisplay');
const strengthDisplay = document.getElementById('strengthDisplay');
const undoBtn = document.getElementById('undoBtn');
const resetBtn = document.getElementById('resetBtn');
const deformCountEl = document.getElementById('deformCount');
const brushValueEl = document.getElementById('brushValue');
const undoSizeEl = document.getElementById('undoSize');
const loadingEl = document.getElementById('loading');

brushSizeSlider.addEventListener('input', () => {
    const val = parseFloat(brushSizeSlider.value);
    brushSizeDisplay.textContent = val.toFixed(2);
    brushValueEl.textContent = val.toFixed(2);
    brushIndicator.geometry.dispose();
    brushIndicator.geometry = new THREE.SphereGeometry(val, 32, 32);
    brushRing.geometry.dispose();
    brushRing.geometry = new THREE.RingGeometry(val - 0.005, val, 64);
    window.__3D_STATE__.brushSize = val;
});

strengthSlider.addEventListener('input', () => {
    const val = parseFloat(strengthSlider.value);
    strengthDisplay.textContent = val.toFixed(3);
    window.__3D_STATE__.strength = val;
});

// Load model
const loader = new GLTFLoader();
loader.load('assets/Corset.glb', (gltf) => {
    const model = gltf.scene;

    // Compute bounding box for centering and scaling
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 0.4 / maxDim;

    model.position.sub(center);
    model.scale.multiplyScalar(scale);
    model.position.y += (size.y * scale) / 2;

    scene.add(model);

    // Find the first mesh with geometry
    model.traverse((child) => {
        if (child.isMesh && !targetMesh) {
            targetMesh = child;
            // Ensure geometry has computed vertex normals
            if (!child.geometry.attributes.normal) {
                child.geometry.computeVertexNormals();
            }
            // Store original positions
            const posAttr = child.geometry.attributes.position;
            originalPositions = new Float32Array(posAttr.array);
            window.__3D_STATE__.vertexCount = posAttr.count;
        }
        if (child.isMesh) {
            child.material.side = THREE.DoubleSide;
        }
    });

    loadingEl.style.display = 'none';
    window.__3D_STATE__.modelLoaded = true;

    console.log(`Model loaded. Vertex count: ${window.__3D_STATE__.vertexCount}`);
}, (progress) => {
    if (progress.total > 0) {
        const pct = Math.round((progress.loaded / progress.total) * 100);
        loadingEl.textContent = `Loading model... ${pct}%`;
    }
}, (error) => {
    console.error('Error loading model:', error);
    loadingEl.textContent = 'Error loading model. Check console.';
});

// Deformation function
function deformMesh(intersection, inward) {
    if (!targetMesh) return;

    const geometry = targetMesh.geometry;
    const posAttr = geometry.attributes.position;
    const normalAttr = geometry.attributes.normal;
    const brushRadius = parseFloat(brushSizeSlider.value);
    const strengthVal = parseFloat(strengthSlider.value);

    // Convert intersection point to local space
    const localPoint = targetMesh.worldToLocal(intersection.point.clone());

    // Save current state for undo
    const savedPositions = new Float32Array(posAttr.array);
    undoStack.push(savedPositions);
    if (undoStack.length > MAX_UNDO) {
        undoStack.shift();
    }

    const direction = inward ? -1 : 1;
    let modified = false;

    const vertex = new THREE.Vector3();
    const normal = new THREE.Vector3();

    for (let i = 0; i < posAttr.count; i++) {
        vertex.fromBufferAttribute(posAttr, i);
        const dist = vertex.distanceTo(localPoint);

        if (dist < brushRadius) {
            // Gaussian falloff
            const sigma = brushRadius / 2.5;
            const falloff = Math.exp(-(dist * dist) / (2 * sigma * sigma));
            const displacement = strengthVal * falloff * direction;

            normal.fromBufferAttribute(normalAttr, i).normalize();

            posAttr.setXYZ(
                i,
                posAttr.getX(i) + normal.x * displacement,
                posAttr.getY(i) + normal.y * displacement,
                posAttr.getZ(i) + normal.z * displacement
            );
            modified = true;
        }
    }

    if (modified) {
        posAttr.needsUpdate = true;
        geometry.computeVertexNormals();
        geometry.computeBoundingBox();
        geometry.computeBoundingSphere();
        deformCount++;
    } else {
        // No vertices affected, remove saved state
        undoStack.pop();
    }

    updateHUD();
}

// Undo
function undo() {
    if (undoStack.length === 0 || !targetMesh) return;

    const prevPositions = undoStack.pop();
    const posAttr = targetMesh.geometry.attributes.position;
    posAttr.array.set(prevPositions);
    posAttr.needsUpdate = true;
    targetMesh.geometry.computeVertexNormals();
    targetMesh.geometry.computeBoundingBox();
    targetMesh.geometry.computeBoundingSphere();

    if (deformCount > 0) deformCount--;
    updateHUD();
}

// Reset
function resetMesh() {
    if (!targetMesh || !originalPositions) return;

    const posAttr = targetMesh.geometry.attributes.position;
    posAttr.array.set(originalPositions);
    posAttr.needsUpdate = true;
    targetMesh.geometry.computeVertexNormals();
    targetMesh.geometry.computeBoundingBox();
    targetMesh.geometry.computeBoundingSphere();

    undoStack.length = 0;
    deformCount = 0;
    updateHUD();
}

function updateHUD() {
    deformCountEl.textContent = deformCount;
    brushValueEl.textContent = parseFloat(brushSizeSlider.value).toFixed(2);
    undoSizeEl.textContent = undoStack.length;

    window.__3D_STATE__.deformCount = deformCount;
    window.__3D_STATE__.undoStackSize = undoStack.length;
}

// Event listeners
undoBtn.addEventListener('click', undo);
resetBtn.addEventListener('click', resetMesh);

document.addEventListener('keydown', (e) => {
    if (e.key === 'Shift') shiftPressed = true;
    if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        undo();
    }
});

document.addEventListener('keyup', (e) => {
    if (e.key === 'Shift') shiftPressed = false;
});

// Mouse interaction
let mouseDown = false;
let mouseMoved = false;
let lastDeformTime = 0;

renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button === 0) {
        mouseDown = true;
        mouseMoved = false;
    }
});

renderer.domElement.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    if (mouseDown) {
        mouseMoved = true;
    }

    // Update brush indicator
    if (targetMesh) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(targetMesh, true);
        if (intersects.length > 0) {
            const point = intersects[0].point;
            brushIndicator.position.copy(point);
            brushIndicator.visible = true;
            brushRing.position.copy(point);
            brushRing.lookAt(camera.position);
            brushRing.visible = true;
            renderer.domElement.style.cursor = 'crosshair';

            // Continuous deformation while dragging
            if (mouseDown && isDeforming) {
                const now = Date.now();
                if (now - lastDeformTime > 50) {
                    deformMesh(intersects[0], shiftPressed);
                    lastDeformTime = now;
                }
            }
        } else {
            brushIndicator.visible = false;
            brushRing.visible = false;
            renderer.domElement.style.cursor = 'default';
        }
    }
});

renderer.domElement.addEventListener('mouseup', (e) => {
    if (e.button === 0) {
        if (!mouseMoved && targetMesh) {
            // Single click deformation
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(targetMesh, true);
            if (intersects.length > 0) {
                deformMesh(intersects[0], shiftPressed);
            }
        }
        mouseDown = false;
        isDeforming = false;
        controls.enabled = true;
    }
});

// Disable orbit controls when deforming
renderer.domElement.addEventListener('pointerdown', (e) => {
    if (e.button === 0 && targetMesh) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObject(targetMesh, true);
        if (intersects.length > 0) {
            controls.enabled = false;
            isDeforming = true;
        }
    }
});

renderer.domElement.addEventListener('pointerup', () => {
    controls.enabled = true;
    isDeforming = false;
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Update state
    window.__3D_STATE__.brushSize = parseFloat(brushSizeSlider.value);
    window.__3D_STATE__.strength = parseFloat(strengthSlider.value);
    window.__3D_STATE__.deformCount = deformCount;
    window.__3D_STATE__.undoStackSize = undoStack.length;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
