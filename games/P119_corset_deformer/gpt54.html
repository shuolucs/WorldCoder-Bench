<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 网格变形工具</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 260px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      min-width: 180px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px;
      backdrop-filter: blur(6px);
      z-index: 10;
      line-height: 1.8;
      font-size: 14px;
    }

    .row {
      margin-bottom: 12px;
    }

    .row label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .value {
      color: #7fd4ff;
      margin-left: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    .btns {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      border: none;
      border-radius: 8px;
      padding: 10px 12px;
      background: #2e6cff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #4b82ff;
    }

    button:active {
      transform: translateY(1px);
    }

    #hint {
      margin-top: 10px;
      font-size: 12px;
      color: #ccc;
      line-height: 1.5;
    }

    #status {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      z-index: 10;
      color: #ddd;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>变形次数：<span id="deformCount">0</span></div>
      <div>画笔大小：<span id="brushValue">0.15</span></div>
      <div>Undo 栈大小：<span id="undoSize">0</span></div>
    </div>

    <div id="ui">
      <div class="row">
        <label for="brushSize">Brush 大小 <span class="value" id="brushSizeLabel">0.15</span></label>
        <input id="brushSize" type="range" min="0.05" max="0.5" step="0.01" value="0.15" />
      </div>

      <div class="row">
        <label for="strength">变形强度 <span class="value" id="strengthLabel">0.03</span></label>
        <input id="strength" type="range" min="0.01" max="0.1" step="0.005" value="0.03" />
      </div>

      <div class="btns">
        <button id="undoBtn">Undo</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div id="hint">
        左键点击/拖拽模型表面进行推拉<br />
        默认向外推，按住 Shift 向内推<br />
        变形时会禁用 OrbitControls
      </div>
    </div>

    <div id="status">正在加载模型...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');

    const brushSizeEl = document.getElementById('brushSize');
    const strengthEl = document.getElementById('strength');
    const brushSizeLabel = document.getElementById('brushSizeLabel');
    const strengthLabel = document.getElementById('strengthLabel');

    const deformCountEl = document.getElementById('deformCount');
    const brushValueEl = document.getElementById('brushValue');
    const undoSizeEl = document.getElementById('undoSize');

    const undoBtn = document.getElementById('undoBtn');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x16181d);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.4, 2.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.15);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight1.position.set(2, 3, 2);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight2.position.set(-2, 1, -2);
    scene.add(dirLight2);

    const grid = new THREE.GridHelper(6, 24, 0x444444, 0x262626);
    grid.position.y = -0.8;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let modelRoot = null;
    let deformMesh = null;
    let deformGeometry = null;
    let deformPositions = null;
    let originalPositions = null;
    let vertexNormals = null;
    let modelLoaded = false;
    let vertexCount = 0;

    let isPointerDown = false;
    let isDeforming = false;
    let deformCount = 0;
    let undoStack = [];
    const MAX_UNDO = 20;

    let brushSize = parseFloat(brushSizeEl.value);
    let strength = parseFloat(strengthEl.value);

    const tempVec3 = new THREE.Vector3();
    const worldPoint = new THREE.Vector3();
    const localPoint = new THREE.Vector3();
    const normalMatrix = new THREE.Matrix3();
    const worldNormal = new THREE.Vector3();
    const localNormal = new THREE.Vector3();

    brushSizeLabel.textContent = brushSize.toFixed(2);
    strengthLabel.textContent = strength.toFixed(3);
    brushValueEl.textContent = brushSize.toFixed(2);

    function updateHUD() {
      deformCountEl.textContent = String(deformCount);
      brushValueEl.textContent = brushSize.toFixed(2);
      undoSizeEl.textContent = String(undoStack.length);
    }

    function pushUndoState() {
      if (!deformGeometry) return;
      const snapshot = new Float32Array(deformPositions.array);
      undoStack.push(snapshot);
      if (undoStack.length > MAX_UNDO) {
        undoStack.shift();
      }
      updateHUD();
    }

    function applyUndo() {
      if (!deformGeometry || undoStack.length === 0) return;
      const prev = undoStack.pop();
      deformPositions.array.set(prev);
      deformPositions.needsUpdate = true;
      deformGeometry.computeVertexNormals();
      vertexNormals = deformGeometry.attributes.normal;
      updateHUD();
    }

    function resetModel() {
      if (!deformGeometry || !originalPositions) return;
      deformPositions.array.set(originalPositions);
      deformPositions.needsUpdate = true;
      deformGeometry.computeVertexNormals();
      vertexNormals = deformGeometry.attributes.normal;
      undoStack = [];
      deformCount = 0;
      updateHUD();
    }

    function getPointerNDC(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function deformAtIntersection(intersection, inward = false) {
      if (!deformMesh || !deformGeometry) return;

      worldPoint.copy(intersection.point);
      localPoint.copy(deformMesh.worldToLocal(worldPoint.clone()));

      normalMatrix.getNormalMatrix(deformMesh.matrixWorld);
      worldNormal.copy(intersection.face.normal).applyMatrix3(normalMatrix).normalize();
      localNormal.copy(worldNormal).transformDirection(
        new THREE.Matrix4().copy(deformMesh.matrixWorld).invert()
      ).normalize();

      const posArray = deformPositions.array;
      const normalArray = vertexNormals.array;
      const radius = brushSize;
      const sigma = radius * 0.5;
      const direction = inward ? -1 : 1;

      for (let i = 0; i < posArray.length; i += 3) {
        tempVec3.set(posArray[i], posArray[i + 1], posArray[i + 2]);
        const dist = tempVec3.distanceTo(localPoint);
        if (dist > radius) continue;

        const falloff = Math.exp(-(dist * dist) / (2 * sigma * sigma));
        const nx = normalArray[i];
        const ny = normalArray[i + 1];
        const nz = normalArray[i + 2];

        posArray[i] += nx * strength * falloff * direction;
        posArray[i + 1] += ny * strength * falloff * direction;
        posArray[i + 2] += nz * strength * falloff * direction;
      }

      deformPositions.needsUpdate = true;
      deformGeometry.computeVertexNormals();
      vertexNormals = deformGeometry.attributes.normal;
    }

    function raycastModel(event) {
      if (!deformMesh) return null;
      getPointerNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(deformMesh, true);
      return hits.length > 0 ? hits[0] : null;
    }

    function beginDeform(event) {
      if (!modelLoaded || event.button !== 0) return;

      const hit = raycastModel(event);
      if (!hit) return;

      isPointerDown = true;
      isDeforming = true;
      controls.enabled = false;

      pushUndoState();
      deformCount += 1;
      deformAtIntersection(hit, event.shiftKey);
      updateHUD();
    }

    function moveDeform(event) {
      if (!isPointerDown || !isDeforming || !modelLoaded) return;
      const hit = raycastModel(event);
      if (!hit) return;
      deformAtIntersection(hit, event.shiftKey);
    }

    function endDeform() {
      isPointerDown = false;
      if (isDeforming) {
        isDeforming = false;
        controls.enabled = true;
      }
    }

    function prepareMesh(mesh) {
      let geometry = mesh.geometry.clone();

      if (geometry.index) {
        geometry = geometry.toNonIndexed();
      }

      geometry.computeVertexNormals();

      mesh.geometry.dispose();
      mesh.geometry = geometry;

      deformMesh = mesh;
      deformGeometry = geometry;
      deformPositions = deformGeometry.attributes.position;
      vertexNormals = deformGeometry.attributes.normal;
      originalPositions = new Float32Array(deformPositions.array);
      vertexCount = deformPositions.count;
    }

    function centerAndScale(object) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      object.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const targetSize = 1.5;
      const scale = targetSize / maxDim;
      object.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = new THREE.Vector3();
      box2.getCenter(center2);
      object.position.sub(center2);

      const box3 = new THREE.Box3().setFromObject(object);
      object.position.y -= box3.min.y - (-0.75);

      controls.target.set(0, 0.15, 0);
      controls.update();
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/Corset.glb',
      (gltf) => {
        modelRoot = gltf.scene;

        let targetMesh = null;
        modelRoot.traverse((child) => {
          if (child.isMesh && !targetMesh) {
            targetMesh = child;
          }
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material = child.material.clone();
              child.material.side = THREE.DoubleSide;
            }
          }
        });

        if (!targetMesh) {
          statusEl.textContent = '模型中未找到可变形 Mesh';
          return;
        }

        scene.add(modelRoot);
        centerAndScale(modelRoot);
        prepareMesh(targetMesh);

        modelLoaded = true;
        statusEl.textContent = '模型加载完成';
        updateHUD();
      },
      undefined,
      (err) => {
        console.error(err);
        statusEl.textContent = '模型加载失败：assets/Corset.glb';
      }
    );

    brushSizeEl.addEventListener('input', () => {
      brushSize = parseFloat(brushSizeEl.value);
      brushSizeLabel.textContent = brushSize.toFixed(2);
      updateHUD();
    });

    strengthEl.addEventListener('input', () => {
      strength = parseFloat(strengthEl.value);
      strengthLabel.textContent = strength.toFixed(3);
    });

    undoBtn.addEventListener('click', applyUndo);
    resetBtn.addEventListener('click', resetModel);

    renderer.domElement.addEventListener('pointerdown', beginDeform);
    window.addEventListener('pointermove', moveDeform);
    window.addEventListener('pointerup', endDeform);
    window.addEventListener('pointerleave', endDeform);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateExposedState() {
      window.__3D_STATE__ = {
        modelLoaded,
        deformCount,
        brushSize,
        strength,
        undoStackSize: undoStack.length,
        vertexCount
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateExposedState();
      renderer.render(scene, camera);
    }

    updateHUD();
    updateExposedState();
    animate();
  </script>
</body>
</html>
