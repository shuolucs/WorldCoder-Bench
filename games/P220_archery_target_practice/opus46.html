<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Archery Target Practice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 10;
}

#score-display {
  position: absolute;
  top: 20px; left: 20px;
  color: white;
  font-size: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  line-height: 1.6;
}

#wind-display {
  position: absolute;
  top: 20px; right: 20px;
  color: white;
  font-size: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
  text-align: right;
}

#power-bar-container {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 30px;
  background: rgba(0,0,0,0.6);
  border: 2px solid white;
  border-radius: 15px;
  overflow: hidden;
}

#power-bar-fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
  transition: none;
  border-radius: 13px;
}

#power-label {
  position: absolute;
  bottom: 75px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 16px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#crosshair {
  position: absolute;
  color: white;
  font-size: 30px;
  font-weight: bold;
  pointer-events: none;
  transform: translate(-50%, -50%);
  text-shadow: 0 0 5px rgba(0,0,0,0.8);
  z-index: 20;
  user-select: none;
}

#round-complete {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #FFD700;
  font-size: 36px;
  font-weight: bold;
  text-align: center;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
  display: none;
  line-height: 1.5;
}

#hit-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #FFD700;
  font-size: 48px;
  font-weight: bold;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
  display: none;
  z-index: 15;
  animation: fadeUp 1.5s ease-out forwards;
}

@keyframes fadeUp {
  0% { opacity: 1; transform: translate(-50%, -50%); }
  100% { opacity: 0; transform: translate(-50%, -150%); }
}

#instructions {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.6);
  font-size: 14px;
  text-align: center;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<div id="hud">
  <div id="score-display">
    <div>Score: <span id="score-value">0</span></div>
    <div>Arrows: <span id="arrows-value">5/5</span></div>
  </div>
  <div id="wind-display">
    Wind: <span id="wind-value">0.0</span> m/s <span id="wind-arrow">→</span>
  </div>
  <div id="power-label">Power</div>
  <div id="power-bar-container">
    <div id="power-bar-fill"></div>
  </div>
  <div id="instructions">Move mouse to aim | Hold SPACEBAR to charge | Release to fire | R to restart</div>
  <div id="round-complete"></div>
  <div id="hit-display"></div>
</div>
<div id="crosshair">+</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  score: 0,
  arrowsRemaining: 5,
  arrowsFired: 0,
  power: 0,
  isCharging: false,
  wind: 0,
  aimX: 0,
  aimY: 2.5,
  lastHitZone: 'none',
  lastHitScore: 0,
  roundComplete: false,
  arrowInFlight: false,
  horseLoaded: false,
  targetPosition: { x: 0, y: 2.5, z: -15 }
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);
camera.lookAt(0, 2, -15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x3a7d3a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Some grass patches for decoration
for (let i = 0; i < 30; i++) {
  const patchGeo = new THREE.PlaneGeometry(0.5 + Math.random(), 0.3 + Math.random() * 0.3);
  const patchMat = new THREE.MeshLambertMaterial({ color: new THREE.Color(0.15 + Math.random() * 0.1, 0.4 + Math.random() * 0.2, 0.1), side: THREE.DoubleSide });
  const patch = new THREE.Mesh(patchGeo, patchMat);
  patch.position.set((Math.random() - 0.5) * 30, 0.01, (Math.random() - 0.5) * 30);
  patch.rotation.x = -Math.PI / 2;
  scene.add(patch);
}

// Sky dome hint
const skyGeo = new THREE.SphereGeometry(45, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
const skyMat = new THREE.MeshBasicMaterial({ color: 0x87CEEB, side: THREE.BackSide });
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// ============ TARGET ============
const targetGroup = new THREE.Group();
targetGroup.position.set(0, 2.5, -15);

// Target stand
const standGeo = new THREE.BoxGeometry(0.2, 3, 0.2);
const standMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
const standLeft = new THREE.Mesh(standGeo, standMat);
standLeft.position.set(-1.2, -1, 0);
standLeft.castShadow = true;
targetGroup.add(standLeft);

const standRight = standLeft.clone();
standRight.position.set(1.2, -1, 0);
targetGroup.add(standRight);

const crossBar = new THREE.Mesh(new THREE.BoxGeometry(2.8, 0.15, 0.15), standMat);
crossBar.position.set(0, 0.3, 0);
targetGroup.add(crossBar);

// Target rings (back to front)
function createRing(radius, color, zOffset) {
  const geo = new THREE.CylinderGeometry(radius, radius, 0.05, 64);
  const mat = new THREE.MeshLambertMaterial({ color: color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = Math.PI / 2;
  mesh.position.z = zOffset;
  mesh.castShadow = true;
  return mesh;
}

const redRing = createRing(1.5, 0xCC0000, 0.01);
const whiteRing = createRing(1.1, 0xFFFFFF, 0.02);
const blueRing = createRing(0.7, 0x0044CC, 0.03);
const goldBullseye = createRing(0.3, 0xFFD700, 0.04);

targetGroup.add(redRing);
targetGroup.add(whiteRing);
targetGroup.add(blueRing);
targetGroup.add(goldBullseye);

scene.add(targetGroup);

// ============ BOW ============
const bowGroup = new THREE.Group();

// Bow limb (curved)
const bowCurve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0, -0.8, 0),
  new THREE.Vector3(-0.3, -0.4, 0),
  new THREE.Vector3(-0.4, 0, 0),
  new THREE.Vector3(-0.3, 0.4, 0),
  new THREE.Vector3(0, 0.8, 0)
]);
const bowTubeGeo = new THREE.TubeGeometry(bowCurve, 32, 0.03, 8, false);
const bowMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
const bowMesh = new THREE.Mesh(bowTubeGeo, bowMat);
bowGroup.add(bowMesh);

// Bow string
const stringGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, -0.8, 0),
  new THREE.Vector3(0, 0.8, 0)
]);
const stringMat = new THREE.LineBasicMaterial({ color: 0xCCCCCC, linewidth: 2 });
const bowString = new THREE.Line(stringGeo, stringMat);
bowGroup.add(bowString);

bowGroup.position.set(-1.5, 2, 5);
scene.add(bowGroup);

// ============ ARROW CREATION ============
function createArrow() {
  const arrowGroup = new THREE.Group();

  // Shaft
  const shaftGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 8);
  const shaftMat = new THREE.MeshLambertMaterial({ color: 0x8B6914 });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.rotation.x = Math.PI / 2;
  shaft.position.z = -0.75;
  arrowGroup.add(shaft);

  // Tip (cone)
  const tipGeo = new THREE.ConeGeometry(0.04, 0.15, 8);
  const tipMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.rotation.x = -Math.PI / 2;
  tip.position.z = -1.575;
  arrowGroup.add(tip);

  // Fletching
  const fletchGeo = new THREE.PlaneGeometry(0.08, 0.15);
  const fletchMat = new THREE.MeshLambertMaterial({ color: 0xCC0000, side: THREE.DoubleSide });
  for (let i = 0; i < 3; i++) {
    const fletch = new THREE.Mesh(fletchGeo, fletchMat);
    fletch.position.z = 0.05;
    fletch.rotation.z = (i * Math.PI * 2) / 3;
    arrowGroup.add(fletch);
  }

  arrowGroup.castShadow = true;
  return arrowGroup;
}

let currentArrow = null;
let firedArrows = [];

// ============ HORSE MODEL ============
const loader = new GLTFLoader();
try {
  loader.load(
    '._horse.glb',
    (gltf) => {
      const horse = gltf.scene;
      horse.position.set(5, 0, -8);
      horse.scale.set(2, 2, 2);
      horse.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      scene.add(horse);
      state.horseLoaded = true;
    },
    undefined,
    (error) => {
      console.warn('Horse model could not be loaded, creating placeholder:', error);
      createPlaceholderHorse();
    }
  );
} catch (e) {
  console.warn('Horse loading failed, creating placeholder');
  createPlaceholderHorse();
}

function createPlaceholderHorse() {
  const horseGroup = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(2.5, 1.2, 1);
  const horseMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
  const body = new THREE.Mesh(bodyGeo, horseMat);
  body.position.y = 1.8;
  body.castShadow = true;
  horseGroup.add(body);

  // Head
  const headGeo = new THREE.BoxGeometry(0.6, 0.8, 0.6);
  const head = new THREE.Mesh(headGeo, horseMat);
  head.position.set(1.5, 2.6, 0);
  head.rotation.z = -0.3;
  head.castShadow = true;
  horseGroup.add(head);

  // Neck
  const neckGeo = new THREE.BoxGeometry(0.4, 1, 0.5);
  const neck = new THREE.Mesh(neckGeo, horseMat);
  neck.position.set(1.2, 2.2, 0);
  neck.rotation.z = -0.4;
  horseGroup.add(neck);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 8);
  const legPositions = [
    [-0.8, 0.6, 0.3], [-0.8, 0.6, -0.3],
    [0.8, 0.6, 0.3], [0.8, 0.6, -0.3]
  ];
  legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, horseMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    horseGroup.add(leg);
  });

  // Tail
  const tailGeo = new THREE.CylinderGeometry(0.05, 0.08, 0.8, 8);
  const tailMat = new THREE.MeshLambertMaterial({ color: 0x2a1506 });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.set(-1.5, 2.0, 0);
  tail.rotation.z = 0.8;
  horseGroup.add(tail);

  horseGroup.position.set(5, 0, -8);
  horseGroup.scale.set(2, 2, 2);
  scene.add(horseGroup);
  state.horseLoaded = true;
}

// ============ SOME ENVIRONMENT ============
// Fence
function createFencePost(x, z) {
  const postGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
  const postMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(x, 0.75, z);
  post.castShadow = true;
  scene.add(post);
}

for (let i = -10; i <= 10; i += 2) {
  createFencePost(i, -20);
}

// Fence rails
const railGeo = new THREE.BoxGeometry(22, 0.08, 0.06);
const railMat = new THREE.MeshLambertMaterial({ color: 0x654321 });
const rail1 = new THREE.Mesh(railGeo, railMat);
rail1.position.set(0, 0.5, -20);
scene.add(rail1);
const rail2 = new THREE.Mesh(railGeo, railMat);
rail2.position.set(0, 1.0, -20);
scene.add(rail2);

// Trees
function createTree(x, z) {
  const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 2, 8);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a2f1a });
  const trunk = new THREE.Mesh(trunkGeo, trunkMat);
  trunk.position.set(x, 1, z);
  trunk.castShadow = true;
  scene.add(trunk);

  const leavesGeo = new THREE.SphereGeometry(1.2, 8, 8);
  const leavesMat = new THREE.MeshLambertMaterial({ color: 0x2d5a1e });
  const leaves = new THREE.Mesh(leavesGeo, leavesMat);
  leaves.position.set(x, 2.8, z);
  leaves.castShadow = true;
  scene.add(leaves);
}

createTree(-8, -12);
createTree(-10, -8);
createTree(10, -10);
createTree(12, -6);
createTree(-7, -18);
createTree(9, -16);

// ============ WIND ============
function generateWind() {
  state.wind = (Math.random() * 4 - 2);
  state.wind = Math.round(state.wind * 10) / 10;
  updateWindDisplay();
}

function updateWindDisplay() {
  document.getElementById('wind-value').textContent = Math.abs(state.wind).toFixed(1);
  document.getElementById('wind-arrow').textContent = state.wind >= 0 ? '→' : '←';
}

generateWind();

// ============ UI UPDATES ============
function updateUI() {
  document.getElementById('score-value').textContent = state.score;
  document.getElementById('arrows-value').textContent = `${state.arrowsRemaining}/5`;
  document.getElementById('power-bar-fill').style.width = `${state.power}%`;
}

// ============ MOUSE HANDLING ============
let mouseX = window.innerWidth / 2;
let mouseY = window.innerHeight / 2;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  // Update crosshair position
  const crosshair = document.getElementById('crosshair');
  crosshair.style.left = mouseX + 'px';
  crosshair.style.top = mouseY + 'px';

  // Map mouse to aim
  const normX = (mouseX / window.innerWidth) * 2 - 1;
  const normY = -(mouseY / window.innerHeight) * 2 + 1;

  state.aimX = normX * 3; // range -3 to 3
  state.aimY = 1 + (normY + 1) * 1.5; // range 1 to 4
  state.aimY = Math.max(1, Math.min(4, state.aimY));
});

// ============ KEYBOARD HANDLING ============
let chargeStartTime = 0;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    if (!state.isCharging && !state.arrowInFlight && !state.roundComplete && state.arrowsRemaining > 0) {
      state.isCharging = true;
      chargeStartTime = performance.now();

      // Create arrow at start position
      if (currentArrow) {
        scene.remove(currentArrow);
      }
      currentArrow = createArrow();
      currentArrow.position.set(0, 2.5, 6);
      scene.add(currentArrow);
    }
  }

  if (e.code === 'KeyR') {
    resetGame();
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state.isCharging && !state.arrowInFlight) {
      state.isCharging = false;
      fireArrow();
    }
  }
});

// ============ ARROW FLIGHT ============
let arrowFlightData = null;

function fireArrow() {
  if (state.arrowsRemaining <= 0 || state.arrowInFlight) return;

  state.arrowInFlight = true;
  state.arrowsRemaining--;
  state.arrowsFired++;

  const power = state.power / 100;
  const speed = 8 + power * 20; // base speed + power bonus

  // Calculate initial velocity
  const targetZ = -15;
  const startZ = 6;
  const distZ = Math.abs(targetZ - startZ);

  // Time to reach target based on speed
  const timeToTarget = distZ / speed;

  // Initial Y velocity to account for gravity and aim
  const targetY = state.aimY;
  const startY = 2.5;
  const vy = (targetY - startY) / timeToTarget + 0.5 * 9.8 * timeToTarget;

  arrowFlightData = {
    startPos: new THREE.Vector3(0, 2.5, 6),
    velocity: new THREE.Vector3(state.aimX / timeToTarget, vy, -speed),
    time: 0,
    windEffect: state.wind,
    startTime: performance.now()
  };

  // Update UI
  state.power = 0;
  updateUI();
}

function updateArrowFlight(dt) {
  if (!arrowFlightData || !currentArrow) return;

  arrowFlightData.time += dt;
  const t = arrowFlightData.time;

  const x = arrowFlightData.startPos.x + arrowFlightData.velocity.x * t + arrowFlightData.windEffect * t * 0.5;
  const y = arrowFlightData.startPos.y + arrowFlightData.velocity.y * t - 0.5 * 9.8 * t * t;
  const z = arrowFlightData.startPos.z + arrowFlightData.velocity.z * t;

  currentArrow.position.set(x, y, z);

  // Orient arrow along velocity
  const vx = arrowFlightData.velocity.x + arrowFlightData.windEffect * 0.5;
  const vy = arrowFlightData.velocity.y - 9.8 * t;
  const vz = arrowFlightData.velocity.z;
  const dir = new THREE.Vector3(vx, vy, vz).normalize();
  const quaternion = new THREE.Quaternion();
  const up = new THREE.Vector3(0, 1, 0);
  const matrix = new THREE.Matrix4();
  matrix.lookAt(new THREE.Vector3(0, 0, 0), dir, up);
  quaternion.setFromRotationMatrix(matrix);
  currentArrow.quaternion.copy(quaternion);

  // Check if arrow reached target Z or went past
  if (z <= -15) {
    // Calculate hit position
    const hitX = x;
    const hitY = y;
    checkHit(hitX, hitY);
    arrowFlightData = null;
    state.arrowInFlight = false;

    // Keep arrow stuck in target area
    firedArrows.push(currentArrow);
    currentArrow = null;

    // Generate new wind for next shot
    generateWind();

    // Check round complete
    if (state.arrowsRemaining <= 0) {
      state.roundComplete = true;
      showRoundComplete();
    }
  }

  // Arrow went below ground or too far
  if (y < 0 || z < -25) {
    state.lastHitZone = 'miss';
    state.lastHitScore = 0;
    showHitFeedback('Miss!', '#888888');
    arrowFlightData = null;
    state.arrowInFlight = false;

    if (currentArrow) {
      firedArrows.push(currentArrow);
      currentArrow = null;
    }

    generateWind();

    if (state.arrowsRemaining <= 0) {
      state.roundComplete = true;
      showRoundComplete();
    }
  }
}

function checkHit(hitX, hitY) {
  const targetCenterX = 0;
  const targetCenterY = 2.5;

  const dx = hitX - targetCenterX;
  const dy = hitY - targetCenterY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  let zone = 'miss';
  let points = 0;
  let color = '#888888';

  if (dist <= 0.3) {
    zone = 'bullseye';
    points = 10;
    color = '#FFD700';
  } else if (dist <= 0.7) {
    zone = 'blue';
    points = 7;
    color = '#4488FF';
  } else if (dist <= 1.1) {
    zone = 'white';
    points = 5;
    color = '#FFFFFF';
  } else if (dist <= 1.5) {
    zone = 'red';
    points = 3;
    color = '#FF4444';
  }

  state.lastHitZone = zone;
  state.lastHitScore = points;
  state.score += points;

  updateUI();

  const label = zone === 'miss' ? 'Miss!' : `${zone.charAt(0).toUpperCase() + zone.slice(1)}! +${points}`;
  showHitFeedback(label, color);
}

function showHitFeedback(text, color) {
  const hitDisplay = document.getElementById('hit-display');
  hitDisplay.textContent = text;
  hitDisplay.style.color = color;
  hitDisplay.style.display = 'block';
  hitDisplay.style.animation = 'none';
  hitDisplay.offsetHeight; // trigger reflow
  hitDisplay.style.animation = 'fadeUp 1.5s ease-out forwards';

  setTimeout(() => {
    hitDisplay.style.display = 'none';
  }, 1500);
}

function showRoundComplete() {
  const el = document.getElementById('round-complete');
  el.innerHTML = `Round Complete!<br>Total Score: ${state.score}<br><span style="font-size: 24px;">Press R to restart</span>`;
  el.style.display = 'block';
}

// ============ RESET ============
function resetGame() {
  state.score = 0;
  state.arrowsRemaining = 5;
  state.arrowsFired = 0;
  state.power = 0;
  state.isCharging = false;
  state.lastHitZone = 'none';
  state.lastHitScore = 0;
  state.roundComplete = false;
  state.arrowInFlight = false;

  // Remove fired arrows
  firedArrows.forEach(a => scene.remove(a));
  firedArrows = [];

  if (currentArrow) {
    scene.remove(currentArrow);
    currentArrow = null;
  }

  arrowFlightData = null;

  generateWind();
  updateUI();

  document.getElementById('round-complete').style.display = 'none';
  document.getElementById('hit-display').style.display = 'none';
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  // Update power charging
  if (state.isCharging) {
    const elapsed = (performance.now() - chargeStartTime) / 2000; // 2 seconds to full
    state.power = Math.min(100, elapsed * 100);
    document.getElementById('power-bar-fill').style.width = `${state.power}%`;

    // Update arrow position while charging (at bow)
    if (currentArrow) {
      currentArrow.position.set(0, 2.5, 6);
      currentArrow.lookAt(state.aimX, state.aimY, -15);
    }
  }

  // Update arrow flight
  if (state.arrowInFlight) {
    updateArrowFlight(dt);
  }

  // Animate bow slightly
  bowGroup.position.y = 2 + Math.sin(performance.now() * 0.002) * 0.05;

  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize crosshair position
const crosshair = document.getElementById('crosshair');
crosshair.style.left = (window.innerWidth / 2) + 'px';
crosshair.style.top = (window.innerHeight / 2) + 'px';

</script>
</body>
</html>
