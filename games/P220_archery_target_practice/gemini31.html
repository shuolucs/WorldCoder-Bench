<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Archery Target Practice</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            background-color: #87CEEB;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 24px;
            font-weight: bold;
            position: absolute;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
        }
        #top-left {
            top: 20px;
            left: 20px;
        }
        #top-right {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        #power-container {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 24px;
            background: rgba(0,0,0,0.6);
            border: 3px solid white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: background-color 0.1s;
        }
        #crosshair {
            position: absolute;
            color: rgba(255, 255, 255, 0.8);
            font-size: 32px;
            transform: translate(-50%, -50%);
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
            font-family: monospace;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 36px;
            text-shadow: 2px 2px 6px black;
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 30px 50px;
            border-radius: 15px;
            border: 2px solid white;
        }
        .small-text {
            font-size: 20px;
            color: #ccc;
            margin-top: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <div id="ui-layer">
        <div id="top-left" class="hud-text">
            Score: <span id="score">0</span><br>
            Arrows: <span id="arrows">5</span>/5
        </div>
        <div id="top-right" class="hud-text">
            Wind: <span id="wind">0.0</span> m/s <span id="wind-dir"></span>
        </div>
        <div id="power-container">
            <div id="power-bar"></div>
        </div>
        <div id="crosshair">+</div>
        <div id="message"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            score: 0,
            arrowsRemaining: 5,
            arrowsFired: 0,
            power: 0,
            isCharging: false,
            wind: 0,
            aimX: 0,
            aimY: 2.5,
            lastHitZone: 'none',
            lastHitScore: 0,
            roundComplete: false,
            arrowInFlight: false,
            horseLoaded: false,
            targetPosition: { x: 0, y: 2.5, z: -15 }
        };
        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Target
        const targetGroup = new THREE.Group();
        targetGroup.position.set(state.targetPosition.x, state.targetPosition.y, state.targetPosition.z);
        scene.add(targetGroup);

        const createRing = (radius, color, zOffset) => {
            const geo = new THREE.CylinderGeometry(radius, radius, 0.05, 32);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.z = zOffset;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            targetGroup.add(mesh);
        };

        createRing(1.5, 0xcc0000, 0);       // Red
        createRing(1.1, 0xffffff, 0.05);    // White
        createRing(0.7, 0x0055cc, 0.10);    // Blue
        createRing(0.3, 0xffd700, 0.15);    // Gold

        // Target Stand
        const standGeo = new THREE.CylinderGeometry(0.1, 0.1, 2.5, 8);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
        const stand = new THREE.Mesh(standGeo, standMat);
        stand.position.set(0, -1.25, 0);
        stand.castShadow = true;
        targetGroup.add(stand);

        // Bow
        const bowGeo = new THREE.TorusGeometry(1.2, 0.04, 8, 32, Math.PI);
        const bowMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 });
        const bow = new THREE.Mesh(bowGeo, bowMat);
        bow.position.set(-1.5, 2, 5);
        bow.rotation.z = -Math.PI / 2;
        bow.rotation.y = Math.PI / 6;
        scene.add(bow);

        // Arrow
        const startArrowPos = new THREE.Vector3(0, 2.5, 6);
        const arrowGroup = new THREE.Group();
        
        const shaftGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 8);
        shaftGeo.rotateX(Math.PI / 2);
        const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
        const shaft = new THREE.Mesh(shaftGeo, shaftMat);
        shaft.castShadow = true;
        
        const tipGeo = new THREE.ConeGeometry(0.04, 0.2, 8);
        tipGeo.rotateX(-Math.PI / 2);
        tipGeo.translate(0, 0, -0.75 - 0.1);
        const tipMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.castShadow = true;

        const fletchingGeo = new THREE.BoxGeometry(0.01, 0.15, 0.2);
        const fletchingMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const fletching1 = new THREE.Mesh(fletchingGeo, fletchingMat);
        fletching1.position.set(0, 0, 0.65);
        const fletching2 = fletching1.clone();
        fletching2.rotation.z = Math.PI / 2;

        arrowGroup.add(shaft);
        arrowGroup.add(tip);
        arrowGroup.add(fletching1);
        arrowGroup.add(fletching2);
        
        arrowGroup.position.copy(startArrowPos);
        scene.add(arrowGroup);

        let stuckArrows = [];

        // Horse Model
        const loader = new GLTFLoader();
        // Using a public URL as a fallback for '._horse.glb' to ensure it renders
        const horseUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Horse.glb';
        
        loader.load(horseUrl, (gltf) => {
            const horse = gltf.scene;
            horse.position.set(5, 0, -8);
            // Applying requested scale. Note: depending on the actual '._horse.glb', this might need adjustment.
            horse.scale.set(2, 2, 2); 
            
            horse.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Adjust material color if it's the default threejs horse to make it look like a statue/prop
                    if(child.material) {
                        child.material.color.setHex(0x8b4513);
                    }
                }
            });
            
            scene.add(horse);
            state.horseLoaded = true;
        }, undefined, (error) => {
            console.warn('Could not load horse model, using fallback box.', error);
            const box = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: 0x8b4513}));
            box.position.set(5, 1, -8);
            box.castShadow = true;
            scene.add(box);
            state.horseLoaded = true;
        });

        // Input & Logic
        const crosshairEl = document.getElementById('crosshair');
        let arrowVelocity = new THREE.Vector3();

        const generateWind = () => {
            state.wind = (Math.random() * 4 - 2);
        };
        generateWind();

        window.addEventListener('mousemove', (e) => {
            const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
            const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;
            
            state.aimX = ndcX * 3;
            state.aimY = 2.5 + ndcY * 1.5;

            crosshairEl.style.left = e.clientX + 'px';
            crosshairEl.style.top = e.clientY + 'px';
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if (!state.arrowInFlight && !state.roundComplete && state.arrowsRemaining > 0) {
                    state.isCharging = true;
                }
            }
            if (e.code === 'KeyR') {
                resetGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && state.isCharging) {
                fireArrow();
            }
        });

        function fireArrow() {
            state.isCharging = false;
            state.arrowInFlight = true;
            state.arrowsRemaining--;
            state.arrowsFired++;

            const aimPoint = new THREE.Vector3(state.aimX, state.aimY, state.targetPosition.z);
            const dir = new THREE.Vector3().subVectors(aimPoint, startArrowPos).normalize();
            
            // Base speed + power modifier
            const speed = 20 + (state.power / 100) * 30; 
            arrowVelocity.copy(dir).multiplyScalar(speed);
            
            state.power = 0;
        }

        function resetGame() {
            state.score = 0;
            state.arrowsRemaining = 5;
            state.arrowsFired = 0;
            state.power = 0;
            state.isCharging = false;
            state.roundComplete = false;
            state.arrowInFlight = false;
            state.lastHitZone = 'none';
            
            arrowGroup.position.copy(startArrowPos);
            arrowGroup.rotation.set(0, 0, 0);
            
            stuckArrows.forEach(a => scene.remove(a));
            stuckArrows = [];
            
            generateWind();
            document.getElementById('message').style.display = 'none';
        }

        function checkHit() {
            const targetFrontZ = state.targetPosition.z + 0.15;
            
            if (arrowGroup.position.z <= targetFrontZ) {
                const dx = arrowGroup.position.x - state.targetPosition.x;
                const dy = arrowGroup.position.y - state.targetPosition.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                let points = 0;
                let zone = 'miss';

                if (distance <= 0.3) { points = 10; zone = 'bullseye'; }
                else if (distance <= 0.7) { points = 7; zone = 'blue'; }
                else if (distance <= 1.1) { points = 5; zone = 'white'; }
                else if (distance <= 1.5) { points = 3; zone = 'red'; }

                state.score += points;
                state.lastHitScore = points;
                state.lastHitZone = zone;

                // Snap to target face
                arrowGroup.position.z = targetFrontZ;
                endFlight();
            } else if (arrowGroup.position.y <= 0) {
                state.lastHitScore = 0;
                state.lastHitZone = 'miss';
                arrowGroup.position.y = 0;
                endFlight();
            }
        }

        function endFlight() {
            state.arrowInFlight = false;
            
            const stuckArrow = arrowGroup.clone();
            scene.add(stuckArrow);
            stuckArrows.push(stuckArrow);

            arrowGroup.position.copy(startArrowPos);
            arrowGroup.rotation.set(0, 0, 0);
            
            if (state.arrowsRemaining === 0) {
                state.roundComplete = true;
            } else {
                generateWind();
            }
        }

        function updateUI() {
            document.getElementById('score').innerText = state.score;
            document.getElementById('arrows').innerText = state.arrowsRemaining;
            
            const windAbs = Math.abs(state.wind).toFixed(1);
            const windDir = state.wind > 0 ? '→' : (state.wind < 0 ? '←' : '-');
            document.getElementById('wind').innerText = windAbs;
            document.getElementById('wind-dir').innerText = windDir;

            const powerBar = document.getElementById('power-bar');
            powerBar.style.width = state.power + '%';
            
            const r = Math.min(255, Math.floor((state.power / 100) * 510));
            const g = Math.min(255, Math.floor((1 - state.power / 100) * 510));
            powerBar.style.backgroundColor = `rgb(${r},${g},0)`;

            if (state.roundComplete) {
                const msg = document.getElementById('message');
                msg.innerHTML = `Round Complete!<br>Score: ${state.score}<br><span class="small-text">Press R to restart</span>`;
                msg.style.display = 'block';
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (state.isCharging) {
                state.power += 50 * delta;
                if (state.power > 100) state.power = 100;
            }

            if (state.arrowInFlight) {
                arrowVelocity.y -= 9.8 * delta;
                
                arrowGroup.position.x += (arrowVelocity.x + state.wind) * delta;
                arrowGroup.position.y += arrowVelocity.y * delta;
                arrowGroup.position.z += arrowVelocity.z * delta;

                const actualVelocity = new THREE.Vector3(
                    arrowVelocity.x + state.wind,
                    arrowVelocity.y,
                    arrowVelocity.z
                );
                const lookTarget = arrowGroup.position.clone().add(actualVelocity);
                arrowGroup.lookAt(lookTarget);

                checkHit();
            } else {
                const aimPoint = new THREE.Vector3(state.aimX, state.aimY, state.targetPosition.z);
                arrowGroup.lookAt(aimPoint);
            }

            updateUI();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
