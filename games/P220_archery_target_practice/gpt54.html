<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Archery Target Practice</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    #hudLeft, #hudRight {
      position: absolute;
      top: 16px;
      font-size: 22px;
      line-height: 1.5;
      z-index: 10;
    }

    #hudLeft { left: 16px; }
    #hudRight { right: 16px; text-align: right; }

    #powerContainer {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      width: 320px;
      height: 22px;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      overflow: hidden;
    }

    #powerFill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ff66, #ffee00, #ff3300);
      transition: width 0.03s linear;
    }

    #powerLabel {
      position: absolute;
      left: 50%;
      bottom: 52px;
      transform: translateX(-50%);
      font-size: 18px;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: bold;
      color: white;
      z-index: 20;
      user-select: none;
    }

    #roundMessage {
      position: absolute;
      left: 50%;
      top: 35%;
      transform: translate(-50%, -50%);
      padding: 18px 26px;
      background: rgba(0,0,0,0.55);
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 12px;
      font-size: 28px;
      text-align: center;
      display: none;
      max-width: 80vw;
    }

    #instructions {
      position: absolute;
      left: 50%;
      top: 16px;
      transform: translateX(-50%);
      font-size: 14px;
      opacity: 0.9;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="instructions">Move mouse to aim • Hold Space to charge • Release Space to fire • Press R to reset</div>
    <div id="hudLeft">
      <div id="scoreText">Score: 0</div>
      <div id="arrowsText">Arrows: 0/5</div>
    </div>
    <div id="hudRight">
      <div id="windText">Wind: 0.0 m/s →</div>
    </div>
    <div id="crosshair">+</div>
    <div id="powerLabel">Power</div>
    <div id="powerContainer"><div id="powerFill"></div></div>
    <div id="roundMessage"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, clock;
    let targetGroup, arrow, bow;
    let horse = null;

    const scoreText = document.getElementById('scoreText');
    const arrowsText = document.getElementById('arrowsText');
    const windText = document.getElementById('windText');
    const powerFill = document.getElementById('powerFill');
    const crosshair = document.getElementById('crosshair');
    const roundMessage = document.getElementById('roundMessage');

    const targetPosition = new THREE.Vector3(0, 2.5, -15);
    const arrowStart = new THREE.Vector3(0, 2.5, 6);

    const state = {
      score: 0,
      arrowsRemaining: 5,
      arrowsFired: 0,
      power: 0,
      isCharging: false,
      wind: 0,
      aimX: 0,
      aimY: 2.5,
      lastHitZone: 'none',
      lastHitScore: 0,
      roundComplete: false,
      arrowInFlight: false,
      horseLoaded: false,
      targetPosition: { x: targetPosition.x, y: targetPosition.y, z: targetPosition.z }
    };

    window.__3D_STATE__ = state;

    const flight = {
      active: false,
      time: 0,
      start: new THREE.Vector3(),
      startY: 0,
      vx: 0,
      vy: 0,
      vz: 0,
      wind: 0
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 2, 8);
      camera.lookAt(0, 2, -10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(50, 50);
      const groundMat = new THREE.MeshLambertMaterial({ color: 0x2e8b57 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);

      createTarget();
      createBow();
      createArrow();
      loadHorse();

      generateWind();
      updateHUD();
      updateCrosshairFromAim();

      window.addEventListener('resize', onResize);
      window.addEventListener('mousemove', onMouseMove);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('keyup', onKeyUp);
    }

    function createTarget() {
      targetGroup = new THREE.Group();

      const rings = [
        { radius: 1.5, color: 0xcc2222, z: 0.00 },
        { radius: 1.1, color: 0xf5f5f5, z: 0.01 },
        { radius: 0.7, color: 0x2255cc, z: 0.02 },
        { radius: 0.3, color: 0xd4af37, z: 0.03 }
      ];

      for (const ring of rings) {
        const geo = new THREE.CylinderGeometry(ring.radius, ring.radius, 0.05, 64);
        const mat = new THREE.MeshStandardMaterial({ color: ring.color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.rotation.x = Math.PI / 2;
        mesh.position.z = ring.z;
        targetGroup.add(mesh);
      }

      const standGeo = new THREE.BoxGeometry(0.15, 3, 0.15);
      const standMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
      const leftStand = new THREE.Mesh(standGeo, standMat);
      const rightStand = new THREE.Mesh(standGeo, standMat);
      leftStand.position.set(-1.2, -1.2, -0.2);
      rightStand.position.set(1.2, -1.2, -0.2);
      targetGroup.add(leftStand, rightStand);

      targetGroup.position.copy(targetPosition);
      scene.add(targetGroup);
    }

    function createBow() {
      const points = [];
      for (let i = 0; i <= 30; i++) {
        const t = i / 30;
        const y = -1.1 + t * 2.2;
        const x = Math.sin((t - 0.5) * Math.PI) * 0.28;
        points.push(new THREE.Vector3(x, y, 0));
      }

      const bowGeo = new THREE.BufferGeometry().setFromPoints(points);
      const bowMat = new THREE.LineBasicMaterial({ color: 0x5c3317 });
      const bowLine = new THREE.Line(bowGeo, bowMat);

      const stringPoints = [
        new THREE.Vector3(0, -1.1, 0),
        new THREE.Vector3(-0.15, 0, 0),
        new THREE.Vector3(0, 1.1, 0)
      ];
      const stringGeo = new THREE.BufferGeometry().setFromPoints(stringPoints);
      const stringMat = new THREE.LineBasicMaterial({ color: 0xffffff });
      const stringLine = new THREE.Line(stringGeo, stringMat);

      bow = new THREE.Group();
      bow.add(bowLine, stringLine);
      bow.position.set(-1.5, 2, 5);
      scene.add(bow);
    }

    function createArrow() {
      if (arrow) scene.remove(arrow);

      arrow = new THREE.Group();

      const shaftGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 12);
      const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });
      const shaft = new THREE.Mesh(shaftGeo, shaftMat);
      shaft.rotation.x = Math.PI / 2;
      arrow.add(shaft);

      const tipGeo = new THREE.ConeGeometry(0.05, 0.18, 12);
      const tipMat = new THREE.MeshStandardMaterial({ color: 0x999999 });
      const tip = new THREE.Mesh(tipGeo, tipMat);
      tip.rotation.x = -Math.PI / 2;
      tip.position.z = -0.84;
      arrow.add(tip);

      const fletchMat = new THREE.MeshStandardMaterial({ color: 0xff2222 });
      for (let i = 0; i < 3; i++) {
        const finGeo = new THREE.BoxGeometry(0.01, 0.12, 0.08);
        const fin = new THREE.Mesh(finGeo, fletchMat);
        fin.position.z = 0.72;
        fin.rotation.z = (Math.PI * 2 / 3) * i;
        arrow.add(fin);
      }

      arrow.position.copy(arrowStart);
      scene.add(arrow);
    }

    function loadHorse() {
      const loader = new GLTFLoader();
      loader.load(
        '._horse.glb',
        (gltf) => {
          horse = gltf.scene;
          horse.position.set(5, 0, -8);
          horse.scale.set(2, 2, 2);
          scene.add(horse);
          state.horseLoaded = true;
        },
        undefined,
        () => {
          const fallbackGeo = new THREE.BoxGeometry(1.8, 1.2, 0.8);
          const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x6b4f3a });
          horse = new THREE.Mesh(fallbackGeo, fallbackMat);
          horse.position.set(5, 0.6, -8);
          scene.add(horse);
          state.horseLoaded = false;
        }
      );
    }

    function generateWind() {
      state.wind = (Math.random() * 4) - 2;
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onMouseMove(e) {
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = -(e.clientY / window.innerHeight) * 2 + 1;

      state.aimX = THREE.MathUtils.clamp(nx * 3, -3, 3);
      state.aimY = THREE.MathUtils.clamp(2.5 + ny * 1.5, 1, 4);

      crosshair.style.left = `${e.clientX}px`;
      crosshair.style.top = `${e.clientY}px`;
    }

    function updateCrosshairFromAim() {
      crosshair.style.left = `${window.innerWidth / 2}px`;
      crosshair.style.top = `${window.innerHeight / 2}px`;
    }

    function onKeyDown(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!state.isCharging && !state.arrowInFlight && !state.roundComplete && state.arrowsRemaining > 0) {
          state.isCharging = true;
        }
      }

      if (e.code === 'KeyR') {
        resetGame();
      }
    }

    function onKeyUp(e) {
      if (e.code === 'Space') {
        e.preventDefault();
        if (state.isCharging) {
          state.isCharging = false;
          if (!state.arrowInFlight && !state.roundComplete && state.arrowsRemaining > 0) {
            fireArrow();
          } else {
            state.power = 0;
          }
        }
      }
    }

    function fireArrow() {
      state.arrowInFlight = true;
      flight.active = true;
      flight.time = 0;
      flight.start.copy(arrowStart);
      flight.startY = state.aimY;

      arrow.position.copy(arrowStart);

      const powerFactor = THREE.MathUtils.clamp(state.power / 100, 0.05, 1.0);

      const totalDistanceZ = targetPosition.z - arrowStart.z;
      const desiredTime = THREE.MathUtils.lerp(1.6, 0.75, powerFactor);
      flight.vz = totalDistanceZ / desiredTime;

      const totalDistanceX = state.aimX - arrowStart.x;
      flight.vx = totalDistanceX / desiredTime;

      const g = -9.8;
      const dy = state.aimY - arrowStart.y;
      flight.vy = (dy - 0.5 * g * desiredTime * desiredTime) / desiredTime;

      flight.wind = state.wind * 0.35;

      state.power = 0;
    }

    function resolveHit(finalPos) {
      const dx = finalPos.x - targetPosition.x;
      const dy = finalPos.y - targetPosition.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      let zone = 'miss';
      let points = 0;

      if (dist <= 0.3) {
        zone = 'bullseye';
        points = 10;
      } else if (dist <= 0.7) {
        zone = 'blue';
        points = 7;
      } else if (dist <= 1.1) {
        zone = 'white';
        points = 5;
      } else if (dist <= 1.5) {
        zone = 'red';
        points = 3;
      }

      state.lastHitZone = zone;
      state.lastHitScore = points;
      state.score += points;
      state.arrowsFired += 1;
      state.arrowsRemaining = Math.max(0, 5 - state.arrowsFired);

      if (state.arrowsFired >= 5) {
        state.roundComplete = true;
        roundMessage.style.display = 'block';
        roundMessage.textContent = `Round Complete! Score: ${state.score}. Press R to restart.`;
      } else {
        generateWind();
      }

      updateHUD();

      setTimeout(() => {
        createArrow();
        state.arrowInFlight = false;
        flight.active = false;
      }, 700);
    }

    function resetGame() {
      state.score = 0;
      state.arrowsRemaining = 5;
      state.arrowsFired = 0;
      state.power = 0;
      state.isCharging = false;
      state.lastHitZone = 'none';
      state.lastHitScore = 0;
      state.roundComplete = false;
      state.arrowInFlight = false;
      flight.active = false;

      if (arrow) {
        scene.remove(arrow);
      }
      createArrow();

      generateWind();
      roundMessage.style.display = 'none';
      updateHUD();
    }

    function updateHUD() {
      scoreText.textContent = `Score: ${state.score}`;
      arrowsText.textContent = `Arrows: ${state.arrowsFired}/5`;

      const dir = state.wind < 0 ? '←' : '→';
      windText.textContent = `Wind: ${Math.abs(state.wind).toFixed(1)} m/s ${dir}`;

      powerFill.style.width = `${state.power}%`;
    }

    function updateArrowRotation(vx, vy, vz) {
      const dir = new THREE.Vector3(vx, vy, vz).normalize();
      const quat = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(0, 0, -1),
        dir
      );
      arrow.quaternion.copy(quat);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (state.isCharging && !state.arrowInFlight && !state.roundComplete) {
        state.power += (dt / 2) * 100;
        state.power = Math.min(100, state.power);
      }

      if (flight.active) {
        flight.time += dt;
        const t = flight.time;
        const g = -9.8;

        const x = flight.start.x + flight.vx * t + 0.5 * flight.wind * t * t;
        const y = flight.start.y + flight.vy * t + 0.5 * g * t * t;
        const z = flight.start.z + flight.vz * t;

        arrow.position.set(x, y, z);

        const currentVx = flight.vx + flight.wind * t;
        const currentVy = flight.vy + g * t;
        const currentVz = flight.vz;
        updateArrowRotation(currentVx, currentVy, currentVz);

        if (z <= targetPosition.z || y <= 0) {
          if (z <= targetPosition.z) {
            const hitTime = (targetPosition.z - flight.start.z) / flight.vz;
            const hitX = flight.start.x + flight.vx * hitTime + 0.5 * flight.wind * hitTime * hitTime;
            const hitY = flight.start.y + flight.vy * hitTime + 0.5 * g * hitTime * hitTime;
            arrow.position.set(hitX, hitY, targetPosition.z + 0.05);
            resolveHit(new THREE.Vector3(hitX, hitY, targetPosition.z));
          } else {
            resolveHit(new THREE.Vector3(999, 999, z));
          }
        }
      }

      updateHUD();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
