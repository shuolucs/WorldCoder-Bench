<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bowling Game with Undo/Redo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #hud-left, #hud-right, #instructions, #resetWrap {
      position: absolute;
      z-index: 10;
      color: white;
      user-select: none;
    }

    #hud-left {
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.5;
      font-size: 16px;
    }

    #hud-right {
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      line-height: 1.8;
      font-size: 16px;
      min-width: 110px;
      text-align: right;
    }

    .status {
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 6px;
      display: inline-block;
    }

    .available {
      background: #1f7a1f;
      color: #d6ffd6;
    }

    .unavailable {
      background: #555;
      color: #ddd;
    }

    #instructions {
      left: 50%;
      transform: translateX(-50%);
      bottom: 72px;
      background: rgba(0,0,0,0.6);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 15px;
      text-align: center;
      white-space: nowrap;
    }

    #resetWrap {
      left: 50%;
      transform: translateX(-50%);
      bottom: 20px;
    }

    #resetBtn {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #f0f0f0;
      color: #111;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    #resetBtn:hover {
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div id="hud-left">
    <div id="scoreText">Score: 0</div>
    <div id="throwText">Throws: 0/3</div>
    <div id="pinsText">Standing Pins: 10</div>
    <div id="lastThrowText">Last Throw: 0</div>
  </div>

  <div id="hud-right">
    <div>Undo <span id="undoStatus" class="status unavailable">U</span></div>
    <div>Redo <span id="redoStatus" class="status unavailable">R</span></div>
  </div>

  <div id="instructions">Arrow keys to aim, Space to throw, U to undo, R to redo</div>

  <div id="resetWrap">
    <button id="resetBtn">Reset Game</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x202838);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, -14);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.1, 30),
      new THREE.MeshPhongMaterial({ color: 0x303030 })
    );
    floor.position.set(0, -0.15, -5);
    scene.add(floor);

    const lane = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.2, 20),
      new THREE.MeshPhongMaterial({ color: 0xC4A46C })
    );
    lane.position.set(0, 0, -5);
    scene.add(lane);

    const gutterMaterial = new THREE.MeshPhongMaterial({ color: 0x3a3a3a });
    const leftGutter = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.14, 20),
      gutterMaterial
    );
    leftGutter.position.set(-1.175, -0.03, -5);
    scene.add(leftGutter);

    const rightGutter = new THREE.Mesh(
      new THREE.BoxGeometry(0.35, 0.14, 20),
      gutterMaterial
    );
    rightGutter.position.set(1.175, -0.03, -5);
    scene.add(rightGutter);

    const pinMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const pinGeometry = new THREE.CylinderGeometry(0.15, 0.12, 0.6, 20);

    const pins = [];
    const pinRows = [
      { z: -14.0, count: 1 },
      { z: -14.5, count: 2 },
      { z: -15.0, count: 3 },
      { z: -15.5, count: 4 }
    ];

    let pinIndex = 0;
    for (const row of pinRows) {
      const totalWidth = (row.count - 1) * 0.5;
      for (let i = 0; i < row.count; i++) {
        const x = i * 0.5 - totalWidth / 2;
        const pin = new THREE.Mesh(pinGeometry, pinMaterial);
        pin.position.set(x, 0.3, row.z);
        pin.rotation.set(0, 0, 0);
        pin.userData = {
          id: pinIndex++,
          standing: true,
          initialPosition: new THREE.Vector3(x, 0.3, row.z),
          initialRotation: new THREE.Euler(0, 0, 0)
        };
        pins.push(pin);
        scene.add(pin);
      }
    }

    const ballGeometry = new THREE.SphereGeometry(0.3, 32, 32);
    const ballMaterial = new THREE.MeshPhongMaterial({ color: 0x222244 });
    const ball = new THREE.Mesh(ballGeometry, ballMaterial);
    scene.add(ball);

    const BALL_START = new THREE.Vector3(0, 0.5, 5);
    ball.position.copy(BALL_START);

    let horse = null;
    const loader = new GLTFLoader();
    loader.load(
      'horse.glb',
      (gltf) => {
        horse = gltf.scene;
        horse.position.set(3, 0, 0);
        horse.scale.set(0.5, 0.5, 0.5);
        scene.add(horse);
        window.__3D_STATE__.horseLoaded = true;
        updateUI();
      },
      undefined,
      () => {
        window.__3D_STATE__.horseLoaded = false;
        updateUI();
      }
    );

    let historyStack = [];
    let redoStack = [];
    let currentThrowRecord = null;

    window.__3D_STATE__ = {
      ballPosition: { x: 0, y: 0.5, z: 5 },
      ballMoving: false,
      pinsStanding: 10,
      pinsKnockedThisThrow: 0,
      throwCount: 0,
      undoAvailable: false,
      redoAvailable: false,
      score: 0,
      horseLoaded: false,
      gameOver: false
    };

    function syncState() {
      const standing = pins.filter(p => p.userData.standing).length;
      window.__3D_STATE__.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      window.__3D_STATE__.ballMoving = ballMoving;
      window.__3D_STATE__.pinsStanding = standing;
      window.__3D_STATE__.undoAvailable = historyStack.length > 0 && !ballMoving;
      window.__3D_STATE__.redoAvailable = redoStack.length > 0 && !ballMoving;
      window.__3D_STATE__.gameOver =
        standing === 0 || window.__3D_STATE__.throwCount >= 3;
    }

    function updateUI() {
      syncState();

      document.getElementById('scoreText').textContent = `Score: ${window.__3D_STATE__.score}`;
      document.getElementById('throwText').textContent = `Throws: ${window.__3D_STATE__.throwCount}/3`;
      document.getElementById('pinsText').textContent = `Standing Pins: ${window.__3D_STATE__.pinsStanding}`;
      document.getElementById('lastThrowText').textContent = `Last Throw: ${window.__3D_STATE__.pinsKnockedThisThrow}`;

      const undoEl = document.getElementById('undoStatus');
      const redoEl = document.getElementById('redoStatus');

      undoEl.className = 'status ' + (window.__3D_STATE__.undoAvailable ? 'available' : 'unavailable');
      redoEl.className = 'status ' + (window.__3D_STATE__.redoAvailable ? 'available' : 'unavailable');
    }

    function setPinStanding(pin, standing) {
      pin.userData.standing = standing;
      if (standing) {
        pin.position.copy(pin.userData.initialPosition);
        pin.rotation.set(0, 0, 0);
      } else {
        pin.position.set(pin.userData.initialPosition.x, 0.15, pin.userData.initialPosition.z);
        pin.rotation.set(Math.PI / 2, 0, 0);
      }
    }

    function resetBallToStart() {
      ball.position.copy(BALL_START);
    }

    function resetGame() {
      historyStack = [];
      redoStack = [];
      currentThrowRecord = null;
      ballMoving = false;
      ballVelocity = 0.3;

      pins.forEach(pin => setPinStanding(pin, true));
      resetBallToStart();

      window.__3D_STATE__.pinsKnockedThisThrow = 0;
      window.__3D_STATE__.throwCount = 0;
      window.__3D_STATE__.score = 0;
      syncState();
      updateUI();
    }

    function completeThrow() {
      if (!currentThrowRecord) return;

      currentThrowRecord.ballEnd = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };

      historyStack.push(currentThrowRecord);
      redoStack = [];

      window.__3D_STATE__.pinsKnockedThisThrow = currentThrowRecord.knockedPins.length;
      window.__3D_STATE__.throwCount += 1;
      window.__3D_STATE__.score = currentThrowRecord.scoreBefore + currentThrowRecord.knockedPins.length;

      currentThrowRecord = null;

      syncState();
      updateUI();
    }

    function launchBall() {
      if (ballMoving || window.__3D_STATE__.gameOver) return;

      currentThrowRecord = {
        ballStart: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballEnd: null,
        knockedPins: [],
        scoreBefore: window.__3D_STATE__.score
      };

      ballMoving = true;
      syncState();
      updateUI();
    }

    function undoThrow() {
      if (ballMoving || historyStack.length === 0) return;

      const record = historyStack.pop();
      redoStack.push(record);

      for (const pinId of record.knockedPins) {
        const pin = pins.find(p => p.userData.id === pinId);
        if (pin) setPinStanding(pin, true);
      }

      ball.position.set(
        record.ballStart.x,
        record.ballStart.y,
        record.ballStart.z
      );

      window.__3D_STATE__.score = record.scoreBefore;
      window.__3D_STATE__.throwCount = Math.max(0, window.__3D_STATE__.throwCount - 1);
      window.__3D_STATE__.pinsKnockedThisThrow = 0;

      syncState();
      updateUI();
    }

    function redoThrow() {
      if (ballMoving || redoStack.length === 0) return;

      const record = redoStack.pop();

      for (const pinId of record.knockedPins) {
        const pin = pins.find(p => p.userData.id === pinId);
        if (pin) setPinStanding(pin, false);
      }

      if (record.ballEnd) {
        ball.position.set(record.ballEnd.x, record.ballEnd.y, record.ballEnd.z);
      }

      historyStack.push(record);
      window.__3D_STATE__.score = record.scoreBefore + record.knockedPins.length;
      window.__3D_STATE__.throwCount += 1;
      window.__3D_STATE__.pinsKnockedThisThrow = record.knockedPins.length;

      syncState();
      updateUI();
    }

    let ballMoving = false;
    let ballVelocity = 0.3;

    function checkCollisions() {
      if (!currentThrowRecord) return;

      for (const pin of pins) {
        if (!pin.userData.standing) continue;

        const dx = ball.position.x - pin.position.x;
        const dz = ball.position.z - pin.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist <= 0.5) {
          setPinStanding(pin, false);
          currentThrowRecord.knockedPins.push(pin.userData.id);
        }
      }
    }

    function updateBall() {
      if (!ballMoving) return;

      ball.position.z -= ballVelocity;
      checkCollisions();

      if (ball.position.z <= -16 || Math.abs(ball.position.x) > 1.2) {
        ballMoving = false;
        completeThrow();
      }
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'arrowleft') {
        e.preventDefault();
        if (!ballMoving && !window.__3D_STATE__.gameOver) {
          ball.position.x = Math.max(-0.8, ball.position.x - 0.1);
          updateUI();
        }
      } else if (key === 'arrowright') {
        e.preventDefault();
        if (!ballMoving && !window.__3D_STATE__.gameOver) {
          ball.position.x = Math.min(0.8, ball.position.x + 0.1);
          updateUI();
        }
      } else if (key === ' ' || e.code === 'Space') {
        e.preventDefault();
        launchBall();
      } else if (key === 'u') {
        undoThrow();
      } else if (key === 'r') {
        redoThrow();
      }
    });

    document.getElementById('resetBtn').addEventListener('click', resetGame);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      updateBall();
      renderer.render(scene, camera);
    }

    resetGame();
    animate();
  </script>
</body>
</html>
