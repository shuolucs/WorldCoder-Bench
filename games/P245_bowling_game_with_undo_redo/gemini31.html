<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bowling Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-box {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
        }
        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .indicator {
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            background: #555;
            color: #aaa;
            transition: all 0.2s;
        }
        .indicator.active {
            background: #28a745;
            color: white;
        }
        #bottom-center {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        #reset-btn {
            background: #dc3545;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            pointer-events: auto;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }
        #reset-btn:hover {
            background: #c82333;
        }
        #instructions {
            margin-bottom: 15px;
            color: #ddd;
            font-size: 16px;
            text-shadow: 1px 1px 2px black;
        }
        #game-over-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #ffc107;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            display: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="top-left" class="hud-box">
            <div id="score-display">Score: 0</div>
            <div id="throws-display">Throws: 0/3</div>
        </div>
        <div id="top-right">
            <div id="undo-ind" class="indicator">Undo (U)</div>
            <div id="redo-ind" class="indicator">Redo (R)</div>
        </div>
        <div id="game-over-text">GAME OVER</div>
        <div id="bottom-center">
            <div id="instructions">Arrow keys to aim, Space to throw, U to undo, R to redo</div>
            <button id="reset-btn">Reset Game</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 0.5, z: 5 },
            ballMoving: false,
            pinsStanding: 10,
            pinsKnockedThisThrow: 0,
            throwCount: 0,
            undoAvailable: false,
            redoAvailable: false,
            score: 0,
            horseLoaded: false,
            gameOver: false
        };

        let historyStack = [];
        let redoStack = [];
        let currentKnockedPins = [];
        let ballStartX = 0;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, -14);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Environment
        const laneGeo = new THREE.BoxGeometry(2, 0.2, 20);
        const laneMat = new THREE.MeshStandardMaterial({ color: 0xC4A46C, roughness: 0.4 });
        const lane = new THREE.Mesh(laneGeo, laneMat);
        lane.position.set(0, 0, -5);
        scene.add(lane);

        const gutterGeo = new THREE.BoxGeometry(0.5, 0.1, 20);
        const gutterMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const leftGutter = new THREE.Mesh(gutterGeo, gutterMat);
        leftGutter.position.set(-1.25, -0.05, -5);
        scene.add(leftGutter);
        const rightGutter = new THREE.Mesh(gutterGeo, gutterMat);
        rightGutter.position.set(1.25, -0.05, -5);
        scene.add(rightGutter);

        // Pins
        const pins = [];
        const pinGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 16);
        const pinMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2 });
        
        let pinId = 0;
        const rows = [
            { z: -14, count: 1 },
            { z: -14.5, count: 2 },
            { z: -15, count: 3 },
            { z: -15.5, count: 4 }
        ];

        rows.forEach(row => {
            const startX = -(row.count - 1) * 0.25;
            for (let i = 0; i < row.count; i++) {
                const pin = new THREE.Mesh(pinGeo, pinMat);
                pin.position.set(startX + i * 0.5, 0.4, row.z);
                pin.userData = { 
                    id: pinId++, 
                    isStanding: true, 
                    origPos: pin.position.clone() 
                };
                scene.add(pin);
                pins.push(pin);
            }
        });

        // Ball
        const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.2, metalness: 0.5 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.5, 5);
        scene.add(ball);

        // Mascot
        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/models/gltf/Horse.glb', (gltf) => {
            const horse = gltf.scene;
            horse.position.set(3, 0, 0);
            horse.scale.set(0.5, 0.5, 0.5);
            // Fix horse material to react to light properly
            horse.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
                }
            });
            scene.add(horse);
            window.__3D_STATE__.horseLoaded = true;
        });

        // UI Elements
        const scoreEl = document.getElementById('score-display');
        const throwsEl = document.getElementById('throws-display');
        const undoInd = document.getElementById('undo-ind');
        const redoInd = document.getElementById('redo-ind');
        const gameOverText = document.getElementById('game-over-text');

        function updateUI() {
            const state = window.__3D_STATE__;
            state.undoAvailable = historyStack.length > 0;
            state.redoAvailable = redoStack.length > 0;

            scoreEl.innerText = `Score: ${state.score}`;
            throwsEl.innerText = `Throws: ${state.throwCount}/3`;

            undoInd.className = `indicator ${state.undoAvailable ? 'active' : ''}`;
            redoInd.className = `indicator ${state.redoAvailable ? 'active' : ''}`;

            gameOverText.style.display = state.gameOver ? 'block' : 'none';
        }

        function endThrow() {
            const state = window.__3D_STATE__;
            state.ballMoving = false;
            
            historyStack.push({
                startX: ballStartX,
                knockedPins: [...currentKnockedPins]
            });
            redoStack = [];
            
            state.score += currentKnockedPins.length;
            state.throwCount++;

            if (state.throwCount >= 3 || state.pinsStanding === 0) {
                state.gameOver = true;
            }

            // Reset ball for next throw
            ball.position.set(0, 0.5, 5);
            state.ballPosition = { x: 0, y: 0.5, z: 5 };
            
            updateUI();
        }

        function undo() {
            const state = window.__3D_STATE__;
            if (!state.undoAvailable || state.ballMoving) return;

            const lastThrow = historyStack.pop();
            redoStack.push(lastThrow);

            lastThrow.knockedPins.forEach(id => {
                const pin = pins[id];
                pin.userData.isStanding = true;
                pin.rotation.x = 0;
                pin.position.copy(pin.userData.origPos);
            });

            state.score -= lastThrow.knockedPins.length;
            state.pinsStanding += lastThrow.knockedPins.length;
            state.throwCount--;
            state.gameOver = false;

            ball.position.set(lastThrow.startX, 0.5, 5);
            state.ballPosition = { x: lastThrow.startX, y: 0.5, z: 5 };
            
            updateUI();
        }

        function redo() {
            const state = window.__3D_STATE__;
            if (!state.redoAvailable || state.ballMoving) return;

            const nextThrow = redoStack.pop();
            historyStack.push(nextThrow);

            nextThrow.knockedPins.forEach(id => {
                const pin = pins[id];
                pin.userData.isStanding = false;
                pin.rotation.x = Math.PI / 2;
                pin.position.y = 0.15;
            });

            state.score += nextThrow.knockedPins.length;
            state.pinsStanding -= nextThrow.knockedPins.length;
            state.throwCount++;

            if (state.throwCount >= 3 || state.pinsStanding === 0) {
                state.gameOver = true;
            }

            ball.position.set(0, 0.5, 5);
            state.ballPosition = { x: 0, y: 0.5, z: 5 };
            
            updateUI();
        }

        function resetGame() {
            const state = window.__3D_STATE__;
            historyStack = [];
            redoStack = [];
            state.score = 0;
            state.throwCount = 0;
            state.pinsStanding = 10;
            state.gameOver = false;
            state.ballMoving = false;

            pins.forEach(pin => {
                pin.userData.isStanding = true;
                pin.rotation.x = 0;
                pin.position.copy(pin.userData.origPos);
            });

            ball.position.set(0, 0.5, 5);
            state.ballPosition = { x: 0, y: 0.5, z: 5 };
            
            updateUI();
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            if (state.ballMoving) return;

            if (e.key === 'ArrowLeft') {
                ball.position.x = Math.max(-0.8, ball.position.x - 0.1);
                state.ballPosition.x = ball.position.x;
            } else if (e.key === 'ArrowRight') {
                ball.position.x = Math.min(0.8, ball.position.x + 0.1);
                state.ballPosition.x = ball.position.x;
            } else if (e.key === ' ' && !state.gameOver) {
                ballStartX = ball.position.x;
                currentKnockedPins = [];
                state.ballMoving = true;
                state.pinsKnockedThisThrow = 0;
            } else if (e.key.toLowerCase() === 'u') {
                undo();
            } else if (e.key.toLowerCase() === 'r') {
                redo();
            }
        });

        document.getElementById('reset-btn').addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            const state = window.__3D_STATE__;

            if (state.ballMoving) {
                ball.position.z -= 0.3;
                state.ballPosition.z = ball.position.z;

                // Collision Detection
                pins.forEach(pin => {
                    if (pin.userData.isStanding) {
                        const dx = ball.position.x - pin.position.x;
                        const dz = ball.position.z - pin.position.z;
                        const dist = Math.sqrt(dx * dx + dz * dz);
                        
                        if (dist < 0.5) {
                            pin.userData.isStanding = false;
                            pin.rotation.x = Math.PI / 2;
                            pin.position.y = 0.15;
                            currentKnockedPins.push(pin.userData.id);
                            state.pinsStanding--;
                            state.pinsKnockedThisThrow++;
                        }
                    }
                });

                // End conditions
                if (ball.position.z <= -16 || Math.abs(ball.position.x) > 1.2) {
                    endThrow();
                }
            }

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
