<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud-top-left {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 16px;
    line-height: 1.6;
}

#hud-top-right {
    position: absolute;
    top: 15px;
    right: 15px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    text-align: right;
}

.status-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
}

.status-available { background: #4CAF50; box-shadow: 0 0 6px #4CAF50; }
.status-unavailable { background: #666; }

#hud-bottom {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
}

#reset-btn {
    padding: 10px 28px;
    font-size: 16px;
    background: #e74c3c;
    color: #fff;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    transition: background 0.3s;
    margin-bottom: 10px;
}

#reset-btn:hover { background: #c0392b; }

#instructions {
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    margin-top: 8px;
}

#game-over-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    display: none;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 15px;
}
</style>
</head>
<body>

<div id="hud-top-left">
    <div id="score-display">Score: 0</div>
    <div id="throw-display">Throws: 0/3</div>
</div>

<div id="hud-top-right">
    <div id="undo-status"><span class="status-indicator status-unavailable"></span>Undo (U)</div>
    <div id="redo-status"><span class="status-indicator status-unavailable"></span>Redo (R)</div>
</div>

<div id="hud-bottom">
    <button id="reset-btn">Reset Game</button>
    <div id="instructions">Arrow keys to aim, Space to throw, U to undo, R to redo</div>
</div>

<div id="game-over-msg">Game Over!</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, -5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -10;
directionalLight.shadow.camera.right = 10;
directionalLight.shadow.camera.top = 10;
directionalLight.shadow.camera.bottom = -10;
scene.add(directionalLight);

// Additional point light for atmosphere
const pointLight = new THREE.PointLight(0xffaa44, 0.3, 30);
pointLight.position.set(-3, 5, 0);
scene.add(pointLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(30, 40);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.set(0, -0.1, -5);
floor.receiveShadow = true;
scene.add(floor);

// Bowling lane
const laneGeo = new THREE.BoxGeometry(2, 0.2, 20);
const laneMat = new THREE.MeshStandardMaterial({ color: 0xC4A46C });
const lane = new THREE.Mesh(laneGeo, laneMat);
lane.position.set(0, 0, -5);
lane.receiveShadow = true;
lane.castShadow = true;
scene.add(lane);

// Lane markings
const arrowGeo = new THREE.PlaneGeometry(0.05, 1);
const arrowMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
for (let i = -3; i <= 3; i++) {
    const mark = new THREE.Mesh(arrowGeo, arrowMat);
    mark.rotation.x = -Math.PI / 2;
    mark.position.set(i * 0.2, 0.11, 0);
    scene.add(mark);
}

// Foul line
const foulGeo = new THREE.PlaneGeometry(2, 0.05);
const foulMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
const foulLine = new THREE.Mesh(foulGeo, foulMat);
foulLine.rotation.x = -Math.PI / 2;
foulLine.position.set(0, 0.11, 3);
scene.add(foulLine);

// Gutters
const gutterGeo = new THREE.BoxGeometry(0.4, 0.15, 20);
const gutterMat = new THREE.MeshStandardMaterial({ color: 0x444444 });

const gutterLeft = new THREE.Mesh(gutterGeo, gutterMat);
gutterLeft.position.set(-1.2, -0.025, -5);
gutterLeft.receiveShadow = true;
scene.add(gutterLeft);

const gutterRight = new THREE.Mesh(gutterGeo, gutterMat);
gutterRight.position.set(1.2, -0.025, -5);
gutterRight.receiveShadow = true;
scene.add(gutterRight);

// Gutter walls
const wallGeo = new THREE.BoxGeometry(0.05, 0.3, 20);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
const wallLeft = new THREE.Mesh(wallGeo, wallMat);
wallLeft.position.set(-1.42, 0.05, -5);
scene.add(wallLeft);
const wallRight = new THREE.Mesh(wallGeo, wallMat);
wallRight.position.set(1.42, 0.05, -5);
scene.add(wallRight);

// Back wall
const backWallGeo = new THREE.BoxGeometry(4, 1, 0.2);
const backWallMat = new THREE.MeshStandardMaterial({ color: 0x333344 });
const backWall = new THREE.Mesh(backWallGeo, backWallMat);
backWall.position.set(0, 0.4, -15.5);
scene.add(backWall);

// Pin creation
const PIN_POSITIONS = [];
const pinRows = [
    { z: -14, count: 1, offset: 0 },
    { z: -14.5, count: 2, offset: -0.25 },
    { z: -15, count: 3, offset: -0.5 },
    { z: -15.5, count: 4, offset: -0.75 }
];

pinRows.forEach(row => {
    for (let i = 0; i < row.count; i++) {
        PIN_POSITIONS.push({
            x: row.offset + i * 0.5,
            y: 0.4,
            z: row.z
        });
    }
});

const pins = [];
const pinGroup = new THREE.Group();
scene.add(pinGroup);

function createPin(pos, index) {
    const group = new THREE.Group();
    
    // Pin body (cylinder)
    const bodyGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 12);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);
    
    // Pin neck (thinner part)
    const neckGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.15, 10);
    const neckMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    const neck = new THREE.Mesh(neckGeo, neckMat);
    neck.position.y = 0.35;
    group.add(neck);
    
    // Pin head
    const headGeo = new THREE.SphereGeometry(0.09, 10, 10);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 0.45;
    group.add(head);
    
    // Red stripe
    const stripeGeo = new THREE.CylinderGeometry(0.155, 0.155, 0.05, 12);
    const stripeMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
    const stripe = new THREE.Mesh(stripeGeo, stripeMat);
    stripe.position.y = 0.15;
    group.add(stripe);
    
    group.position.set(pos.x, pos.y, pos.z);
    group.userData = { 
        index: index, 
        standing: true, 
        originalPos: { ...pos },
        originalRotation: { x: 0, y: 0, z: 0 }
    };
    
    pinGroup.add(group);
    return group;
}

PIN_POSITIONS.forEach((pos, i) => {
    pins.push(createPin(pos, i));
});

// Bowling ball
const ballGeo = new THREE.SphereGeometry(0.3, 24, 24);
const ballMat = new THREE.MeshStandardMaterial({ 
    color: 0x222244, 
    roughness: 0.2, 
    metalness: 0.3 
});
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.castShadow = true;

// Ball finger holes
const holeGeo = new THREE.CircleGeometry(0.04, 8);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x111122 });
for (let i = 0; i < 3; i++) {
    const hole = new THREE.Mesh(holeGeo, holeMat);
    const angle = (i / 3) * Math.PI * 0.5 - 0.3;
    hole.position.set(Math.cos(angle) * 0.15, 0.28, Math.sin(angle) * 0.15 - 0.1);
    hole.lookAt(0, 0.6, 0);
    ball.add(hole);
}

const BALL_START = { x: 0, y: 0.5, z: 5 };
ball.position.set(BALL_START.x, BALL_START.y, BALL_START.z);
scene.add(ball);

// Aim indicator
const aimGeo = new THREE.ConeGeometry(0.1, 0.3, 8);
const aimMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400, transparent: true, opacity: 0.8 });
const aimIndicator = new THREE.Mesh(aimGeo, aimMat);
aimIndicator.rotation.x = Math.PI / 2;
aimIndicator.position.set(0, 0.5, 4.5);
scene.add(aimIndicator);

// Load horse model
const loader = new GLTFLoader();
let horseMesh = null;

loader.load(
    'https://threejs.org/examples/models/gltf/Horse.glb',
    (gltf) => {
        horseMesh = gltf.scene;
        horseMesh.position.set(3, 0, 0);
        horseMesh.scale.set(0.005, 0.005, 0.005);
        horseMesh.rotation.y = -Math.PI / 4;
        horseMesh.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.material = new THREE.MeshStandardMaterial({ 
                    color: 0xcc8844,
                    roughness: 0.6
                });
            }
        });
        scene.add(horseMesh);
        
        // Play animation if available
        if (gltf.animations && gltf.animations.length > 0) {
            const mixer = new THREE.AnimationMixer(horseMesh);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
            horseMesh.userData.mixer = mixer;
        }
        
        window.__3D_STATE__.horseLoaded = true;
        updateHUD();
        console.log('Horse model loaded successfully');
    },
    (progress) => {
        console.log('Loading horse:', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load horse.glb, creating placeholder:', error);
        // Create a simple horse placeholder
        const placeholder = new THREE.Group();
        
        // Body
        const bodyG = new THREE.BoxGeometry(0.8, 0.5, 0.4);
        const bodyM = new THREE.MeshStandardMaterial({ color: 0xcc8844 });
        const bodyMesh = new THREE.Mesh(bodyG, bodyM);
        bodyMesh.position.y = 0.6;
        bodyMesh.castShadow = true;
        placeholder.add(bodyMesh);
        
        // Head
        const headG = new THREE.BoxGeometry(0.3, 0.35, 0.25);
        const headMesh = new THREE.Mesh(headG, bodyM);
        headMesh.position.set(0.55, 0.9, 0);
        headMesh.rotation.z = 0.3;
        headMesh.castShadow = true;
        placeholder.add(headMesh);
        
        // Legs
        const legG = new THREE.CylinderGeometry(0.05, 0.05, 0.5, 6);
        const positions = [[-0.25, 0.25, 0.12], [-0.25, 0.25, -0.12], [0.25, 0.25, 0.12], [0.25, 0.25, -0.12]];
        positions.forEach(p => {
            const leg = new THREE.Mesh(legG, bodyM);
            leg.position.set(...p);
            leg.castShadow = true;
            placeholder.add(leg);
        });
        
        // Sign
        const signGeo = new THREE.PlaneGeometry(1, 0.3);
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFD700';
        ctx.font = 'bold 28px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('🐴 MASCOT', 128, 40);
        const signTex = new THREE.CanvasTexture(canvas);
        const signMat = new THREE.MeshBasicMaterial({ map: signTex, transparent: true });
        const sign = new THREE.Mesh(signGeo, signMat);
        sign.position.set(0, 1.4, 0);
        placeholder.add(sign);
        
        placeholder.position.set(3, 0, 0);
        placeholder.scale.set(0.5, 0.5, 0.5);
        scene.add(placeholder);
        horseMesh = placeholder;
        
        window.__3D_STATE__.horseLoaded = true;
        updateHUD();
    }
);

// Game State
const MAX_THROWS = 3;

window.__3D_STATE__ = {
    ballPosition: { ...BALL_START },
    ballMoving: false,
    pinsStanding: 10,
    pinsKnockedThisThrow: 0,
    throwCount: 0,
    undoAvailable: false,
    redoAvailable: false,
    score: 0,
    horseLoaded: false,
    gameOver: false
};

// History system
let historyStack = [];
let redoStack = [];
let currentBallStartX = 0;

function saveThrowState(knockedPinIndices, ballStartX, scoreBefore) {
    return {
        knockedPinIndices: [...knockedPinIndices],
        ballStartX: ballStartX,
        scoreBefore: scoreBefore,
        throwCountBefore: window.__3D_STATE__.throwCount - 1
    };
}

// Pin knock tracking for current throw
let currentThrowKnockedPins = [];
let preThrowBallX = 0;
let preThrowScore = 0;

// Ball animation state
let ballVelocity = { x: 0, z: -0.3 };
let ballSpin = 0;

function knockDownPin(pin) {
    if (!pin.userData.standing) return;
    pin.userData.standing = false;
    
    // Animate knock down
    const targetRotX = Math.PI / 2 * (Math.random() > 0.5 ? 1 : -1);
    const targetRotZ = (Math.random() - 0.5) * 0.5;
    pin.userData.knockTarget = {
        rotX: targetRotX,
        rotZ: targetRotZ,
        y: 0.15,
        progress: 0
    };
}

function standUpPin(pin) {
    pin.userData.standing = true;
    pin.userData.knockTarget = null;
    const orig = pin.userData.originalPos;
    pin.position.set(orig.x, orig.y, orig.z);
    pin.rotation.set(0, 0, 0);
}

function updatePinAnimations() {
    pins.forEach(pin => {
        if (pin.userData.knockTarget) {
            const t = pin.userData.knockTarget;
            t.progress = Math.min(t.progress + 0.08, 1);
            const ease = 1 - Math.pow(1 - t.progress, 3);
            pin.rotation.x = t.rotX * ease;
            pin.rotation.z = t.rotZ * ease;
            pin.position.y = pin.userData.originalPos.y + (t.y - pin.userData.originalPos.y) * ease;
        }
    });
}

function countStandingPins() {
    return pins.filter(p => p.userData.standing).length;
}

function resetBall(x = 0) {
    ball.position.set(x, BALL_START.y, BALL_START.z);
    ball.rotation.set(0, 0, 0);
    window.__3D_STATE__.ballPosition = { x: x, y: BALL_START.y, z: BALL_START.z };
    window.__3D_STATE__.ballMoving = false;
    aimIndicator.visible = true;
    aimIndicator.position.x = x;
}

function launchBall() {
    const state = window.__3D_STATE__;
    if (state.ballMoving || state.gameOver) return;
    
    preThrowBallX = ball.position.x;
    preThrowScore = state.score;
    currentThrowKnockedPins = [];
    
    state.ballMoving = true;
    ballVelocity = { x: 0, z: -0.3 };
    ballSpin = 0;
    aimIndicator.visible = false;
    
    // Clear redo stack on new throw
    redoStack = [];
    state.redoAvailable = false;
    
    updateHUD();
}

function onThrowComplete() {
    const state = window.__3D_STATE__;
    const knocked = currentThrowKnockedPins.length;
    
    state.pinsKnockedThisThrow = knocked;
    state.score += knocked;
    state.throwCount++;
    state.pinsStanding = countStandingPins();
    
    // Save to history
    historyStack.push(saveThrowState(currentThrowKnockedPins, preThrowBallX, preThrowScore));
    state.undoAvailable = true;
    
    // Check game over
    if (state.pinsStanding === 0 || state.throwCount >= MAX_THROWS) {
        state.gameOver = true;
        document.getElementById('game-over-msg').style.display = 'block';
        if (state.pinsStanding === 0) {
            document.getElementById('game-over-msg').textContent = '🎳 STRIKE! All pins down!';
        } else {
            document.getElementById('game-over-msg').textContent = `Game Over! Score: ${state.score}/10`;
        }
    }
    
    resetBall(0);
    updateHUD();
}

function undoThrow() {
    const state = window.__3D_STATE__;
    if (!state.undoAvailable || historyStack.length === 0 || state.ballMoving) return;
    
    const lastThrow = historyStack.pop();
    redoStack.push(lastThrow);
    
    // Restore pins
    lastThrow.knockedPinIndices.forEach(idx => {
        standUpPin(pins[idx]);
    });
    
    // Restore state
    state.score = lastThrow.scoreBefore;
    state.throwCount = lastThrow.throwCountBefore;
    state.pinsStanding = countStandingPins();
    state.pinsKnockedThisThrow = 0;
    state.gameOver = false;
    state.undoAvailable = historyStack.length > 0;
    state.redoAvailable = true;
    
    document.getElementById('game-over-msg').style.display = 'none';
    
    resetBall(lastThrow.ballStartX);
    updateHUD();
}

function redoThrow() {
    const state = window.__3D_STATE__;
    if (!state.redoAvailable || redoStack.length === 0 || state.ballMoving) return;
    
    const throwData = redoStack.pop();
    
    // Re-knock pins
    throwData.knockedPinIndices.forEach(idx => {
        knockDownPin(pins[idx]);
    });
    
    const knocked = throwData.knockedPinIndices.length;
    state.score = throwData.scoreBefore + knocked;
    state.throwCount = throwData.throwCountBefore + 1;
    state.pinsStanding = countStandingPins();
    state.pinsKnockedThisThrow = knocked;
    
    // Push back to history
    historyStack.push(throwData);
    state.undoAvailable = true;
    state.redoAvailable = redoStack.length > 0;
    
    // Check game over again
    if (state.pinsStanding === 0 || state.throwCount >= MAX_THROWS) {
        state.gameOver = true;
        document.getElementById('game-over-msg').style.display = 'block';
        if (state.pinsStanding === 0) {
            document.getElementById('game-over-msg').textContent = '🎳 STRIKE! All pins down!';
        } else {
            document.getElementById('game-over-msg').textContent = `Game Over! Score: ${state.score}/10`;
        }
    }
    
    resetBall(0);
    updateHUD();
}

function resetGame() {
    const state = window.__3D_STATE__;
    
    // Reset all pins
    pins.forEach(pin => standUpPin(pin));
    
    // Reset ball
    resetBall(0);
    
    // Reset state
    state.pinsStanding = 10;
    state.pinsKnockedThisThrow = 0;
    state.throwCount = 0;
    state.score = 0;
    state.gameOver = false;
    state.undoAvailable = false;
    state.redoAvailable = false;
    state.ballMoving = false;
    
    // Clear history
    historyStack = [];
    redoStack = [];
    currentThrowKnockedPins = [];
    
    document.getElementById('game-over-msg').style.display = 'none';
    
    updateHUD();
}

function updateHUD() {
    const state = window.__3D_STATE__;
    
    document.getElementById('score-display').textContent = `Score: ${state.score}`;
    document.getElementById('throw-display').textContent = `Throws: ${state.throwCount}/${MAX_THROWS}`;
    
    const undoIndicator = document.querySelector('#undo-status .status-indicator');
    undoIndicator.className = `status-indicator ${state.undoAvailable ? 'status-available' : 'status-unavailable'}`;
    
    const redoIndicator = document.querySelector('#redo-status .status-indicator');
    redoIndicator.className = `status-indicator ${state.redoAvailable ? 'status-available' : 'status-unavailable'}`;
}

// Input handling
const keys = {};
document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    
    if (e.code === 'Space') {
        e.preventDefault();
        launchBall();
    }
    if (e.code === 'KeyU') {
        undoThrow();
    }
    if (e.code === 'KeyR') {
        redoThrow();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

document.getElementById('reset-btn').addEventListener('click', resetGame);

// Particle system for pin hits
const particles = [];
function createParticles(position) {
    for (let i = 0; i < 8; i++) {
        const geo = new THREE.SphereGeometry(0.03, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
        const particle = new THREE.Mesh(geo, mat);
        particle.position.copy(position);
        particle.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.2,
            Math.random() * 0.15 + 0.05,
            (Math.random() - 0.5) * 0.2
        );
        particle.userData.life = 1.0;
        scene.add(particle);
        particles.push(particle);
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= 0.03;
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.005;
        p.material.opacity = p.userData.life;
        p.material.transparent = true;
        
        if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    const state = window.__3D_STATE__;
    
    // Horse animation
    if (horseMesh && horseMesh.userData.mixer) {
        horseMesh.userData.mixer.update(delta);
    }
    
    // Ball aiming (before launch)
    if (!state.ballMoving && !state.gameOver) {
        const moveSpeed = 0.05;
        if (keys['ArrowLeft']) {
            ball.position.x = Math.max(ball.position.x - moveSpeed, -0.8);
        }
        if (keys['ArrowRight']) {
            ball.position.x = Math.min(ball.position.x + moveSpeed, 0.8);
        }
        aimIndicator.position.x = ball.position.x;
        
        // Aim indicator pulse
        const pulse = Math.sin(Date.now() * 0.005) * 0.1 + 0.8;
        aimIndicator.scale.set(pulse, pulse, pulse);
    }
    
    // Ball movement
    if (state.ballMoving) {
        ball.position.z += ballVelocity.z;
        ball.position.x += ballVelocity.x;
        
        // Ball rolling animation
        ball.rotation.x -= 0.15;
        
        // Update state
        state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
        
        // Collision detection with pins
        pins.forEach((pin, idx) => {
            if (!pin.userData.standing) return;
            
            const dx = ball.position.x - pin.position.x;
            const dz = ball.position.z - pin.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            
            if (dist < 0.5) {
                knockDownPin(pin);
                currentThrowKnockedPins.push(idx);
                createParticles(pin.position.clone());
                
                // Slight ball deflection
                ballVelocity.x += dx * 0.02;
            }
        });
        
        // Check if ball should stop
        if (ball.position.z <= -16 || Math.abs(ball.position.x) > 1.2) {
            // Small delay before completing throw
            setTimeout(() => {
                onThrowComplete();
            }, 300);
            state.ballMoving = false;
        }
    }
    
    // Update pin animations
    updatePinAnimations();
    
    // Update particles
    updateParticles();
    
    // Subtle camera sway
    if (!state.ballMoving) {
        camera.position.x = Math.sin(Date.now() * 0.0005) * 0.1;
    }
    
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
updateHUD();
animate();

</script>
</body>
</html>
