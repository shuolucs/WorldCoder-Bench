<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Periodic Table</title>
    <style>
        :root {
            --bg-color: #0a0a2e;
            --panel-bg: rgba(15, 15, 40, 0.75);
            --text-main: #ffffff;
            --text-muted: #a0a0c0;
            --accent: #4ecdc4;
            --accent-hover: #3db8b0;
            --correct: #4ade80;
            --incorrect: #f87171;
            --glow: 0 0 15px rgba(78, 205, 196, 0.5);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* UI Overlays */
        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* HUD */
        #hud {
            top: 20px;
            left: 20px;
            padding: 15px 20px;
            display: flex;
            gap: 20px;
            font-size: 1.1rem;
            font-weight: bold;
        }

        .hud-item span {
            color: var(--accent);
            margin-left: 5px;
        }

        .multiplier-glow {
            color: #f59e0b !important;
            text-shadow: 0 0 10px #f59e0b;
            animation: pulse-text 1s infinite alternate;
        }

        /* Start Button */
        #start-container {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--glow);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.8);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Quiz Panel */
        #quiz-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 400px;
        }

        #question-display {
            font-size: 1.3rem;
            text-align: center;
            margin-bottom: 20px;
            padding: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        #answers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }

        .answer-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
            padding: 15px;
            font-size: 1rem;
        }

        .answer-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }

        .answer-btn.correct { background: var(--correct); color: #000; }
        .answer-btn.incorrect { background: var(--incorrect); color: #000; }

        /* Info Panel */
        #info-panel {
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 300px;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #info-panel.visible {
            display: flex;
            opacity: 1;
        }

        #info-symbol {
            font-size: 3rem;
            font-weight: bold;
            text-align: center;
            margin: 0;
            color: var(--accent);
        }

        #info-name {
            font-size: 1.5rem;
            text-align: center;
            margin: 0 0 10px 0;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .info-label { color: var(--text-muted); }
        #info-desc { margin-top: 10px; font-size: 0.9rem; line-height: 1.4; color: #ccc; }
        .close-hint { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-top: 15px; }

        /* Results Panel */
        #results-panel {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
        }

        #results-panel h2 { margin: 0; font-size: 2rem; color: var(--accent); }
        .result-stat { font-size: 1.2rem; }

        @keyframes pulse-text {
            from { text-shadow: 0 0 5px #f59e0b; }
            to { text-shadow: 0 0 20px #f59e0b, 0 0 30px #f59e0b; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud" class="ui-layer glass-panel">
        <div class="hud-item">Score: <span id="hud-score">0</span></div>
        <div class="hud-item">Question: <span id="hud-question">0/5</span></div>
        <div class="hud-item">Streak: <span id="hud-streak">0</span></div>
        <div class="hud-item">Multiplier: <span id="hud-multiplier">1x</span></div>
    </div>

    <div id="start-container" class="ui-layer interactive">
        <button id="start-btn">Start Quiz</button>
        <div id="quiz-panel" class="glass-panel">
            <div id="question-display">Question goes here?</div>
            <div id="answers">
                <button class="answer-btn" id="answer-0">A</button>
                <button class="answer-btn" id="answer-1">B</button>
                <button class="answer-btn" id="answer-2">C</button>
                <button class="answer-btn" id="answer-3">D</button>
            </div>
        </div>
    </div>

    <div id="info-panel" class="ui-layer glass-panel interactive">
        <h1 id="info-symbol">H</h1>
        <h2 id="info-name">Hydrogen</h2>
        <div class="info-row"><span class="info-label">Atomic Number</span><span id="info-number">1</span></div>
        <div class="info-row"><span class="info-label">Category</span><span id="info-category">Nonmetal</span></div>
        <div id="info-desc">Description goes here.</div>
        <div class="close-hint">Click elsewhere or press ESC to close</div>
    </div>

    <div id="results-panel" class="ui-layer glass-panel interactive">
        <h2>Quiz Complete!</h2>
        <div class="result-stat">Final Score: <span id="res-score" style="color: var(--accent); font-weight: bold;">0</span></div>
        <div class="result-stat">Correct: <span id="res-correct" style="color: var(--correct);">0</span></div>
        <div class="result-stat">Incorrect: <span id="res-incorrect" style="color: var(--incorrect);">0</span></div>
        <button id="restart-btn" style="margin-top: 15px;">Play Again</button>
    </div>

    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            sceneReady: false,
            robotLoaded: false,
            elementCount: 0,
            quizActive: false,
            currentQuestion: -1,
            score: 0,
            streak: 0,
            multiplier: 1,
            totalCorrect: 0,
            totalIncorrect: 0,
            quizComplete: false,
            selectedElement: null,
            infoPanelVisible: false,
            highlightedElement: null,
            robotAnimation: 'idle',
            questionsAnswered: 0
        };

        const state = window.__3D_STATE__;

        // --- Element Data ---
        const categories = {
            'nonmetal': '#4ecdc4',
            'noble gas': '#a855f7',
            'alkali metal': '#ff6b6b',
            'alkaline earth': '#ffa500',
            'metalloid': '#f59e0b',
            'other metal': '#60a5fa',
            'halogen': '#ec4899'
        };

        const elementsData = [
            { symbol: 'H', name: 'Hydrogen', num: 1, cat: 'nonmetal', x: 1, y: 1, desc: 'Lightest element, highly flammable gas.' },
            { symbol: 'He', name: 'Helium', num: 2, cat: 'noble gas', x: 18, y: 1, desc: 'Inert gas, second lightest element.' },
            { symbol: 'Li', name: 'Lithium', num: 3, cat: 'alkali metal', x: 1, y: 2, desc: 'Soft, silvery-white alkali metal.' },
            { symbol: 'Be', name: 'Beryllium', num: 4, cat: 'alkaline earth', x: 2, y: 2, desc: 'Relatively rare element in the universe.' },
            { symbol: 'B', name: 'Boron', num: 5, cat: 'metalloid', x: 13, y: 2, desc: 'Crucial for plant cell walls.' },
            { symbol: 'C', name: 'Carbon', num: 6, cat: 'nonmetal', x: 14, y: 2, desc: 'Basis of all known life on Earth.' },
            { symbol: 'N', name: 'Nitrogen', num: 7, cat: 'nonmetal', x: 15, y: 2, desc: 'Makes up 78% of Earth\'s atmosphere.' },
            { symbol: 'O', name: 'Oxygen', num: 8, cat: 'nonmetal', x: 16, y: 2, desc: 'Highly reactive nonmetal, essential for respiration.' },
            { symbol: 'F', name: 'Fluorine', num: 9, cat: 'halogen', x: 17, y: 2, desc: 'Extremely reactive, poisonous pale yellow gas.' },
            { symbol: 'Ne', name: 'Neon', num: 10, cat: 'noble gas', x: 18, y: 2, desc: 'Glows reddish-orange in vacuum discharge tubes.' },
            { symbol: 'Na', name: 'Sodium', num: 11, cat: 'alkali metal', x: 1, y: 3, desc: 'Highly reactive metal, found in table salt.' },
            { symbol: 'Mg', name: 'Magnesium', num: 12, cat: 'alkaline earth', x: 2, y: 3, desc: 'Burns with a brilliant-white light.' },
            { symbol: 'Al', name: 'Aluminum', num: 13, cat: 'other metal', x: 13, y: 3, desc: 'Lightweight, corrosion-resistant metal.' },
            { symbol: 'Si', name: 'Silicon', num: 14, cat: 'metalloid', x: 14, y: 3, desc: 'Widely used in semiconductors and electronics.' },
            { symbol: 'P', name: 'Phosphorus', num: 15, cat: 'nonmetal', x: 15, y: 3, desc: 'Highly reactive, glows in the dark (white variant).' },
            { symbol: 'S', name: 'Sulfur', num: 16, cat: 'nonmetal', x: 16, y: 3, desc: 'Bright yellow crystalline solid at room temp.' },
            { symbol: 'Cl', name: 'Chlorine', num: 17, cat: 'halogen', x: 17, y: 3, desc: 'Toxic, pale green gas used as disinfectant.' },
            { symbol: 'Ar', name: 'Argon', num: 18, cat: 'noble gas', x: 18, y: 3, desc: 'Most abundant noble gas in Earth\'s crust.' }
        ];

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);
        scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 80;
        controls.minDistance = 10;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Build Periodic Table ---
        const elementMeshes = [];
        const boxGeo = new THREE.BoxGeometry(1.8, 1.8, 0.5);
        
        // Grid layout parameters
        const spacing = 2.2;
        const offsetX = 9.5; // Center of 18 columns
        const offsetY = 2;   // Center of 3 rows

        function createLabelTexture(symbol, num) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            
            ctx.font = 'bold 120px sans-serif';
            ctx.fillText(symbol, 128, 160);
            
            ctx.font = 'bold 40px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(num.toString(), 20, 50);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        elementsData.forEach((data, index) => {
            const color = new THREE.Color(categories[data.cat]);
            
            const materials = [
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 }), // right
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 }), // left
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 }), // top
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 }), // bottom
                new THREE.MeshStandardMaterial({ 
                    color: color, 
                    map: createLabelTexture(data.symbol, data.num),
                    roughness: 0.4,
                    metalness: 0.1
                }), // front
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 })  // back
            ];

            const mesh = new THREE.Mesh(boxGeo, materials);
            
            // Calculate position
            const posX = (data.x - offsetX) * spacing;
            const posY = (offsetY - data.y) * spacing;
            
            mesh.position.set(posX, posY, 0);
            
            // Store custom data
            mesh.userData = {
                ...data,
                baseY: posY,
                phase: Math.random() * Math.PI * 2,
                baseScale: 1,
                baseColor: color.clone()
            };

            scene.add(mesh);
            elementMeshes.push(mesh);
            state.elementCount++;
        });

        // --- Robot Tutor ---
        let robotGroup = new THREE.Group();
        robotGroup.position.set(-12, 0, 5);
        robotGroup.scale.set(2, 2, 2);
        // Face the table
        robotGroup.rotation.y = Math.PI / 4;
        scene.add(robotGroup);

        let robotTargetRotY = robotGroup.rotation.y;
        let robotBaseY = 0;

        // Procedural Robot Fallback
        function createProceduralRobot() {
            const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
            const accentMat = new THREE.MeshStandardMaterial({ color: 0x4ecdc4, emissive: 0x4ecdc4, emissiveIntensity: 0.5 });
            
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.5, 16), mat);
            body.position.y = 0.75;
            
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.6, 0.8), mat);
            head.position.y = 1.8;
            
            const eye1 = new THREE.Mesh(new THREE.SphereGeometry(0.1), accentMat);
            eye1.position.set(-0.2, 1.8, 0.4);
            const eye2 = new THREE.Mesh(new THREE.SphereGeometry(0.1), accentMat);
            eye2.position.set(0.2, 1.8, 0.4);

            const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 1);
            const armL = new THREE.Mesh(armGeo, mat);
            armL.position.set(-0.7, 1, 0);
            armL.rotation.z = Math.PI / 4;
            
            const armR = new THREE.Mesh(armGeo, mat);
            armR.position.set(0.7, 1, 0);
            armR.rotation.z = -Math.PI / 4;

            robotGroup.add(body, head, eye1, eye2, armL, armR);
        }

        // Attempt to load GLTF, fallback to procedural
        const loader = new GLTFLoader();
        loader.load(
            'robot.glb',
            (gltf) => {
                robotGroup.add(gltf.scene);
                state.robotLoaded = true;
                checkReady();
            },
            undefined,
            (error) => {
                console.warn("Could not load robot.glb, using procedural fallback.");
                createProceduralRobot();
                // We set it to true so the state reflects it's ready to be used
                state.robotLoaded = true; 
                checkReady();
            }
        );

        function checkReady() {
            if (state.elementCount === 18 && state.robotLoaded) {
                state.sceneReady = true;
            }
        }
        // Force ready if elements are done (since fallback is immediate)
        setTimeout(() => { if(!state.sceneReady) { state.sceneReady = true; state.robotLoaded = true; createProceduralRobot(); } }, 1000);

        // --- Particles ---
        let particles;
        function spawnParticles() {
            if (particles) scene.remove(particles);
            
            const partGeo = new THREE.BufferGeometry();
            const partCount = 50;
            const posArray = new Float32Array(partCount * 3);
            const velArray = [];

            for(let i=0; i<partCount*3; i+=3) {
                posArray[i] = robotGroup.position.x;
                posArray[i+1] = robotGroup.position.y + 2;
                posArray[i+2] = robotGroup.position.z;

                velArray.push({
                    x: (Math.random() - 0.5) * 0.2,
                    y: (Math.random() - 0.5) * 0.2 + 0.1,
                    z: (Math.random() - 0.5) * 0.2
                });
            }

            partGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const partMat = new THREE.PointsMaterial({
                size: 0.3,
                color: 0xf59e0b,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(partGeo, partMat);
            particles.userData = { velocities: velArray, age: 0 };
            scene.add(particles);
        }

        // --- Raycasting & Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (state.quizActive) return; // Disable info panel during quiz

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(elementMeshes);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const data = mesh.userData;
                
                state.selectedElement = data.symbol;
                state.infoPanelVisible = true;
                
                // Update UI
                document.getElementById('info-symbol').innerText = data.symbol;
                document.getElementById('info-name').innerText = data.name;
                document.getElementById('info-number').innerText = data.num;
                document.getElementById('info-category').innerText = data.cat.charAt(0).toUpperCase() + data.cat.slice(1);
                document.getElementById('info-desc').innerText = data.desc;
                
                document.getElementById('info-panel').classList.add('visible');
            } else {
                closeInfoPanel();
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeInfoPanel();
        });

        function closeInfoPanel() {
            state.selectedElement = null;
            state.infoPanelVisible = false;
            document.getElementById('info-panel').classList.remove('visible');
        }

        // --- Quiz System ---
        let quizQuestions = [];
        let currentQuestionData = null;

        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const quizPanel = document.getElementById('quiz-panel');
        const startContainer = document.getElementById('start-container');
        const resultsPanel = document.getElementById('results-panel');
        const answerBtns = [
            document.getElementById('answer-0'),
            document.getElementById('answer-1'),
            document.getElementById('answer-2'),
            document.getElementById('answer-3')
        ];

        startBtn.addEventListener('click', startQuiz);
        restartBtn.addEventListener('click', startQuiz);

        function startQuiz() {
            closeInfoPanel();
            state.quizActive = true;
            state.quizComplete = false;
            state.currentQuestion = 0;
            state.questionsAnswered = 0;
            state.score = 0;
            state.streak = 0;
            state.multiplier = 1;
            state.totalCorrect = 0;
            state.totalIncorrect = 0;
            state.robotAnimation = 'bobbing';
            
            updateHUD();
            generateQuestions();
            
            startBtn.style.display = 'none';
            resultsPanel.style.display = 'none';
            quizPanel.style.display = 'flex';
            
            loadQuestion();
        }

        function generateQuestions() {
            quizQuestions = [];
            const usedElements = new Set();
            
            while(quizQuestions.length < 5) {
                const el = elementsData[Math.floor(Math.random() * elementsData.length)];
                if (usedElements.has(el.symbol)) continue;
                usedElements.add(el.symbol);

                const type = Math.floor(Math.random() * 3);
                let qText, correctAns, wrongPool;

                if (type === 0) {
                    qText = `What is the atomic number of ${el.name} (${el.symbol})?`;
                    correctAns = el.num.toString();
                    wrongPool = elementsData.filter(e => e.num !== el.num).map(e => e.num.toString());
                } else if (type === 1) {
                    qText = `Which element has atomic number ${el.num}?`;
                    correctAns = el.name;
                    wrongPool = elementsData.filter(e => e.num !== el.num).map(e => e.name);
                } else {
                    qText = `What category does ${el.name} belong to?`;
                    correctAns = el.cat;
                    wrongPool = Object.keys(categories).filter(c => c !== el.cat);
                }

                // Shuffle wrong pool and pick 3
                wrongPool.sort(() => 0.5 - Math.random());
                const options = [correctAns, wrongPool[0], wrongPool[1], wrongPool[2]];
                options.sort(() => 0.5 - Math.random());

                quizQuestions.push({
                    text: qText,
                    options: options,
                    correct: correctAns,
                    targetSymbol: el.symbol
                });
            }
        }

        function loadQuestion() {
            currentQuestionData = quizQuestions[state.currentQuestion];
            document.getElementById('question-display').innerText = currentQuestionData.text;
            
            state.highlightedElement = currentQuestionData.targetSymbol;

            answerBtns.forEach((btn, i) => {
                btn.innerText = currentQuestionData.options[i];
                btn.className = 'answer-btn'; // reset classes
                btn.disabled = false;
                btn.onclick = () => handleAnswer(btn, currentQuestionData.options[i] === currentQuestionData.correct);
            });
            
            updateHUD();
        }

        function handleAnswer(btn, isCorrect) {
            answerBtns.forEach(b => b.disabled = true);
            state.questionsAnswered++;

            if (isCorrect) {
                btn.classList.add('correct');
                state.score += 10 * state.multiplier;
                state.streak++;
                state.totalCorrect++;
                state.robotAnimation = 'celebrating';
                robotTargetRotY += Math.PI * 2; // 360 rotation
                
                if (state.streak >= 5) state.multiplier = 3;
                else if (state.streak >= 3) state.multiplier = 2;

                if (state.streak === 3) spawnParticles();

            } else {
                btn.classList.add('incorrect');
                // Highlight correct answer
                answerBtns.forEach(b => {
                    if (b.innerText === currentQuestionData.correct) b.classList.add('correct');
                });
                
                state.score = Math.max(0, state.score - 3);
                state.streak = 0;
                state.multiplier = 1;
                state.totalIncorrect++;
                state.robotAnimation = 'wobbling';
            }

            updateHUD();

            setTimeout(() => {
                state.currentQuestion++;
                if (state.currentQuestion < 5) {
                    state.robotAnimation = 'bobbing';
                    loadQuestion();
                } else {
                    endQuiz();
                }
            }, 1500);
        }

        function endQuiz() {
            state.quizActive = false;
            state.quizComplete = true;
            state.currentQuestion = -1;
            state.highlightedElement = null;
            state.robotAnimation = 'idle';
            
            quizPanel.style.display = 'none';
            startBtn.style.display = 'block';
            startBtn.innerText = 'Restart Quiz';
            
            document.getElementById('res-score').innerText = state.score;
            document.getElementById('res-correct').innerText = state.totalCorrect;
            document.getElementById('res-incorrect').innerText = state.totalIncorrect;
            resultsPanel.style.display = 'flex';
        }

        function updateHUD() {
            document.getElementById('hud-score').innerText = state.score;
            document.getElementById('hud-question').innerText = state.quizActive ? `${state.currentQuestion + 1}/5` : '0/5';
            document.getElementById('hud-streak').innerText = state.streak;
            
            const multEl = document.getElementById('hud-multiplier');
            multEl.innerText = `${state.multiplier}x`;
            if (state.multiplier > 1) multEl.classList.add('multiplier-glow');
            else multEl.classList.remove('multiplier-glow');
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            controls.update();

            // Animate Elements
            elementMeshes.forEach(mesh => {
                const data = mesh.userData;
                
                // Floating
                mesh.position.y = data.baseY + Math.sin(time * 2 + data.phase) * 0.2;
                
                // Reset scale and emissive
                let targetScale = data.baseScale;
                mesh.material[4].emissive.setHex(0x000000);

                // Pulsing if selected
                if (state.selectedElement === data.symbol) {
                    targetScale = 1.1 + Math.sin(time * 8) * 0.05;
                }
                
                // Highlight during quiz
                if (state.highlightedElement === data.symbol) {
                    targetScale = 1.3;
                    mesh.material[4].emissive.copy(data.baseColor);
                    mesh.material[4].emissiveIntensity = 0.5 + Math.sin(time * 5) * 0.3;
                }

                mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.1);
            });

            // Animate Robot
            if (state.robotLoaded) {
                // Rotation Lerp (for celebration)
                robotGroup.rotation.y += (robotTargetRotY - robotGroup.rotation.y) * 0.1;

                // Reset transforms
                let targetZRot = 0;
                let targetYPos = robotBaseY;

                if (state.robotAnimation === 'bobbing') {
                    targetYPos = robotBaseY + Math.sin(time * 3) * 0.5;
                } else if (state.robotAnimation === 'wobbling') {
                    targetZRot = Math.sin(time * 15) * 0.3;
                }

                robotGroup.position.y += (targetYPos - robotGroup.position.y) * 0.1;
                robotGroup.rotation.z += (targetZRot - robotGroup.rotation.z) * 0.2;
            }

            // Animate Particles
            if (particles) {
                const positions = particles.geometry.attributes.position.array;
                const vels = particles.userData.velocities;
                particles.userData.age += 0.016;

                for(let i=0; i<vels.length; i++) {
                    positions[i*3] += vels[i].x;
                    positions[i*3+1] += vels[i].y;
                    positions[i*3+2] += vels[i].z;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                
                particles.material.opacity = Math.max(0, 1 - particles.userData.age);
                if (particles.userData.age > 1) {
                    scene.remove(particles);
                    particles = null;
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
