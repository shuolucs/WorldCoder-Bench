<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Periodic Table Tutor</title>
  <style>
    :root {
      --bg: #0a0a2e;
      --panel: rgba(15, 23, 42, 0.72);
      --panel-strong: rgba(17, 24, 39, 0.88);
      --border: rgba(255, 255, 255, 0.12);
      --text: #e5f2ff;
      --muted: #9fb3c8;
      --accent: #67e8f9;
      --accent2: #a855f7;
      --good: #22c55e;
      --bad: #ef4444;
      --glow: 0 0 20px rgba(103, 232, 249, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: fixed;
      z-index: 20;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      box-shadow: var(--glow);
    }

    #top-ui {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: min(92vw, 760px);
      pointer-events: none;
    }

    #start-quiz {
      pointer-events: auto;
      background: linear-gradient(135deg, #06b6d4, #7c3aed);
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 30px rgba(124, 58, 237, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    #start-quiz:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 12px 35px rgba(103, 232, 249, 0.35);
    }

    #start-quiz:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #question-display {
      width: 100%;
      min-height: 54px;
      padding: 14px 18px;
      background: var(--panel);
      border-radius: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      pointer-events: auto;
    }

    #answers-panel {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      z-index: 25;
      display: grid;
      grid-template-columns: repeat(2, minmax(180px, 260px));
      gap: 12px;
      width: min(90vw, 560px);
    }

    .answer-btn {
      background: rgba(30, 41, 59, 0.82);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 16px rgba(0,0,0,0.2);
    }

    .answer-btn:hover {
      transform: translateY(-2px);
      background: rgba(51, 65, 85, 0.92);
      border-color: rgba(103, 232, 249, 0.55);
    }

    .answer-btn.correct {
      background: rgba(34, 197, 94, 0.22);
      border-color: rgba(34, 197, 94, 0.9);
    }

    .answer-btn.incorrect {
      background: rgba(239, 68, 68, 0.22);
      border-color: rgba(239, 68, 68, 0.9);
    }

    #hud {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 30;
      background: var(--panel);
      border-radius: 16px;
      padding: 14px 16px;
      min-width: 220px;
      line-height: 1.7;
      font-size: 14px;
    }

    #hud strong {
      color: var(--accent);
    }

    #info-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 30;
      width: min(340px, 92vw);
      background: var(--panel-strong);
      border-radius: 18px;
      padding: 18px;
      display: none;
    }

    #info-panel h2 {
      margin: 0 0 8px 0;
      font-size: 24px;
    }

    #info-panel .meta {
      color: var(--muted);
      margin-bottom: 10px;
      font-size: 14px;
    }

    #info-panel p {
      margin: 8px 0;
      color: #d7e7ff;
      line-height: 1.5;
    }

    #results-panel {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(2, 6, 23, 0.55);
    }

    #results-card {
      width: min(420px, 92vw);
      background: var(--panel-strong);
      border-radius: 22px;
      padding: 24px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(103, 232, 249, 0.2);
    }

    #results-card h2 {
      margin-top: 0;
      font-size: 28px;
    }

    #results-card button {
      margin-top: 14px;
      background: linear-gradient(135deg, #06b6d4, #7c3aed);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    #tip {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 20;
      color: #cbd5e1;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
    }

    @media (max-width: 700px) {
      #answers-panel {
        grid-template-columns: 1fr;
        width: min(92vw, 420px);
      }
      #hud {
        min-width: 180px;
        font-size: 13px;
      }
      #question-display {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="top-ui">
    <button id="start-quiz">Start Quiz</button>
    <div id="question-display" class="overlay">Click an element to learn about it, or start the quiz.</div>
  </div>

  <div id="hud" class="overlay">
    <div><strong>Score:</strong> <span id="hud-score">0</span></div>
    <div><strong>Question:</strong> <span id="hud-question">-</span></div>
    <div><strong>Streak:</strong> <span id="hud-streak">0</span></div>
    <div><strong>Multiplier:</strong> <span id="hud-multiplier">1x</span></div>
  </div>

  <div id="info-panel" class="overlay">
    <h2 id="info-name">Element</h2>
    <div class="meta" id="info-meta"></div>
    <p><strong>Atomic Number:</strong> <span id="info-atomic"></span></p>
    <p><strong>Category:</strong> <span id="info-category"></span></p>
    <p id="info-description"></p>
  </div>

  <div id="answers-panel">
    <button class="answer-btn" id="answer-0" disabled>Option A</button>
    <button class="answer-btn" id="answer-1" disabled>Option B</button>
    <button class="answer-btn" id="answer-2" disabled>Option C</button>
    <button class="answer-btn" id="answer-3" disabled>Option D</button>
  </div>

  <div id="results-panel">
    <div id="results-card">
      <h2>Quiz Complete</h2>
      <p id="results-text">Final Score: 0</p>
      <button id="close-results">Close</button>
    </div>
  </div>

  <div id="tip">Tip: Drag to orbit, scroll to zoom, click elements for info, press Esc to close info.</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const state = window.__3D_STATE__ = {
      sceneReady: false,
      robotLoaded: false,
      elementCount: 0,
      quizActive: false,
      currentQuestion: -1,
      score: 0,
      streak: 0,
      multiplier: 1,
      totalCorrect: 0,
      totalIncorrect: 0,
      quizComplete: false,
      selectedElement: null,
      infoPanelVisible: false,
      highlightedElement: null,
      robotAnimation: "idle",
      questionsAnswered: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a2e");

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(60, 30, 0x223355, 0x112244);
    gridHelper.position.y = -3;
    scene.add(gridHelper);

    const categoryColors = {
      "alkali metal": "#ff6b6b",
      "alkaline earth": "#ffa500",
      "nonmetal": "#4ecdc4",
      "noble gas": "#a855f7",
      "metalloid": "#f59e0b",
      "other metal": "#60a5fa",
      "halogen": "#ec4899"
    };

    const elementsData = [
      { symbol:"H",  name:"Hydrogen",  atomic:1,  category:"nonmetal",       period:1, group:1,  desc:"Hydrogen is the lightest element and the most abundant element in the universe." },
      { symbol:"He", name:"Helium",    atomic:2,  category:"noble gas",      period:1, group:18, desc:"Helium is a noble gas known for its low density and use in balloons and cooling systems." },
      { symbol:"Li", name:"Lithium",   atomic:3,  category:"alkali metal",   period:2, group:1,  desc:"Lithium is a soft alkali metal widely used in rechargeable batteries." },
      { symbol:"Be", name:"Beryllium", atomic:4,  category:"alkaline earth", period:2, group:2,  desc:"Beryllium is a lightweight metal used in aerospace and X-ray equipment." },
      { symbol:"B",  name:"Boron",     atomic:5,  category:"metalloid",      period:2, group:13, desc:"Boron is a metalloid important in glass, detergents, and semiconductors." },
      { symbol:"C",  name:"Carbon",    atomic:6,  category:"nonmetal",       period:2, group:14, desc:"Carbon is the basis of organic life and appears in forms like diamond and graphite." },
      { symbol:"N",  name:"Nitrogen",  atomic:7,  category:"nonmetal",       period:2, group:15, desc:"Nitrogen makes up most of Earth's atmosphere and is essential for proteins." },
      { symbol:"O",  name:"Oxygen",    atomic:8,  category:"nonmetal",       period:2, group:16, desc:"Oxygen is vital for respiration and supports combustion." },
      { symbol:"F",  name:"Fluorine",  atomic:9,  category:"halogen",        period:2, group:17, desc:"Fluorine is a highly reactive halogen used in toothpaste and industrial chemistry." },
      { symbol:"Ne", name:"Neon",      atomic:10, category:"noble gas",      period:2, group:18, desc:"Neon is a noble gas famous for its bright glow in signs." },
      { symbol:"Na", name:"Sodium",    atomic:11, category:"alkali metal",   period:3, group:1,  desc:"Sodium is a reactive alkali metal essential in nerve and fluid balance." },
      { symbol:"Mg", name:"Magnesium", atomic:12, category:"alkaline earth", period:3, group:2,  desc:"Magnesium is a light metal important in biology, alloys, and fireworks." },
      { symbol:"Al", name:"Aluminum",  atomic:13, category:"other metal",    period:3, group:13, desc:"Aluminum is a lightweight, corrosion-resistant metal used in transport and packaging." },
      { symbol:"Si", name:"Silicon",   atomic:14, category:"metalloid",      period:3, group:14, desc:"Silicon is a key semiconductor and major component of sand and glass." },
      { symbol:"P",  name:"Phosphorus",atomic:15, category:"nonmetal",       period:3, group:15, desc:"Phosphorus is essential for DNA, ATP, and fertilizers." },
      { symbol:"S",  name:"Sulfur",    atomic:16, category:"nonmetal",       period:3, group:16, desc:"Sulfur is a yellow nonmetal used in sulfuric acid and biological molecules." },
      { symbol:"Cl", name:"Chlorine",  atomic:17, category:"halogen",        period:3, group:17, desc:"Chlorine is a halogen used in water treatment and chemical manufacturing." },
      { symbol:"Ar", name:"Argon",     atomic:18, category:"noble gas",      period:3, group:18, desc:"Argon is an inert noble gas commonly used in lighting and welding." }
    ];

    const periodicGroupOffset = 1.9;
    const periodicPeriodOffset = 2.2;
    const tableOriginX = -16.5;
    const tableOriginY = 8.0;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const elementMeshes = [];
    const elementMap = new Map();

    let selectedElementMesh = null;
    let highlightedElementMesh = null;
    let robot = null;
    let robotBaseY = 0;
    let robotAnimTimer = 0;
    let celebrateUntil = 0;
    let wobbleUntil = 0;
    let particles = [];

    const clock = new THREE.Clock();

    function createLabelTexture(element) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "rgba(255,255,255,0.08)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 6;
      ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);

      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";

      ctx.font = "bold 42px Arial";
      ctx.fillText(String(element.atomic), canvas.width / 2, 54);

      ctx.font = "bold 96px Arial";
      ctx.fillText(element.symbol, canvas.width / 2, 138);

      ctx.font = "28px Arial";
      ctx.fillStyle = "#dbeafe";
      ctx.fillText(element.name, canvas.width / 2, 198);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function createElementMesh(element, index) {
      const group = new THREE.Group();

      const color = categoryColors[element.category] || "#ffffff";
      const geometry = new THREE.BoxGeometry(1.8, 1.8, 0.5);
      const material = new THREE.MeshStandardMaterial({
        color,
        emissive: new THREE.Color(color).multiplyScalar(0.0),
        emissiveIntensity: 1.0,
        roughness: 0.35,
        metalness: 0.15
      });

      const box = new THREE.Mesh(geometry, material);
      box.castShadow = false;
      box.receiveShadow = false;
      group.add(box);

      const labelTexture = createLabelTexture(element);
      const labelMat = new THREE.MeshBasicMaterial({ map: labelTexture, transparent: true });
      const label = new THREE.Mesh(new THREE.PlaneGeometry(1.55, 1.55), labelMat);
      label.position.z = 0.28;
      group.add(label);

      const x = tableOriginX + (element.group - 1) * periodicGroupOffset;
      const y = tableOriginY - (element.period - 1) * periodicPeriodOffset;
      group.position.set(x, y, 0);

      group.userData = {
        element,
        basePosition: group.position.clone(),
        phase: index * 0.7,
        box,
        label,
        baseScale: 1
      };

      scene.add(group);
      elementMeshes.push(group);
      elementMap.set(element.symbol, group);
    }

    elementsData.forEach((el, i) => createElementMesh(el, i));
    state.elementCount = elementMeshes.length;

    function loadRobot() {
      const loader = new GLTFLoader();
      loader.load(
        "robot.glb",
        (gltf) => {
          robot = gltf.scene;
          robot.position.set(-12, 0, 5);
          robot.scale.set(2, 2, 2);
          robot.rotation.y = Math.PI / 3;
          robotBaseY = robot.position.y;

          robot.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = false;
              obj.receiveShadow = false;
            }
          });

          scene.add(robot);
          state.robotLoaded = true;
          updateSceneReady();
        },
        undefined,
        () => {
          const fallback = new THREE.Group();
          const body = new THREE.Mesh(
            new THREE.BoxGeometry(2, 3, 1.4),
            new THREE.MeshStandardMaterial({ color: "#94a3b8", metalness: 0.6, roughness: 0.35 })
          );
          body.position.y = 2.5;
          fallback.add(body);

          const head = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 1.3, 1.2),
            new THREE.MeshStandardMaterial({ color: "#cbd5e1", metalness: 0.4, roughness: 0.4 })
          );
          head.position.y = 4.6;
          fallback.add(head);

          const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
          const eyeMat = new THREE.MeshStandardMaterial({ color: "#67e8f9", emissive: "#67e8f9", emissiveIntensity: 1.2 });
          const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
          const eye2 = eye1.clone();
          eye1.position.set(-0.3, 4.7, 0.65);
          eye2.position.set(0.3, 4.7, 0.65);
          fallback.add(eye1, eye2);

          fallback.position.set(-12, 0, 5);
          fallback.scale.set(2, 2, 2);
          fallback.rotation.y = Math.PI / 3;
          robot = fallback;
          robotBaseY = robot.position.y;
          scene.add(robot);

          state.robotLoaded = true;
          updateSceneReady();
        }
      );
    }

    function updateSceneReady() {
      state.sceneReady = state.robotLoaded && state.elementCount === elementsData.length;
    }

    loadRobot();
    updateSceneReady();

    const startQuizBtn = document.getElementById("start-quiz");
    const questionDisplay = document.getElementById("question-display");
    const resultsPanel = document.getElementById("results-panel");
    const resultsText = document.getElementById("results-text");
    const closeResultsBtn = document.getElementById("close-results");

    const hudScore = document.getElementById("hud-score");
    const hudQuestion = document.getElementById("hud-question");
    const hudStreak = document.getElementById("hud-streak");
    const hudMultiplier = document.getElementById("hud-multiplier");

    const infoPanel = document.getElementById("info-panel");
    const infoName = document.getElementById("info-name");
    const infoMeta = document.getElementById("info-meta");
    const infoAtomic = document.getElementById("info-atomic");
    const infoCategory = document.getElementById("info-category");
    const infoDescription = document.getElementById("info-description");

    const answerButtons = [0,1,2,3].map(i => document.getElementById(`answer-${i}`));

    let quizQuestions = [];
    let currentQuestionData = null;
    let waitingNextQuestion = false;

    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getMultiplierFromStreak(streak) {
      if (streak >= 5) return 3;
      if (streak >= 3) return 2;
      return 1;
    }

    function updateHUD() {
      hudScore.textContent = state.score;
      hudQuestion.textContent = state.quizActive ? `${state.currentQuestion + 1}/5` : (state.quizComplete ? "5/5" : "-");
      hudStreak.textContent = state.streak;
      hudMultiplier.textContent = `${state.multiplier}x`;
    }

    function setQuestionHighlight(symbol) {
      clearQuestionHighlight();
      const mesh = elementMap.get(symbol);
      if (!mesh) return;
      highlightedElementMesh = mesh;
      state.highlightedElement = symbol;
      mesh.userData.box.material.emissive = new THREE.Color("#ffffff");
      mesh.userData.box.material.emissiveIntensity = 0.45;
      mesh.userData.targetHighlightScale = 1.3;
    }

    function clearQuestionHighlight() {
      if (highlightedElementMesh) {
        highlightedElementMesh.userData.box.material.emissive = new THREE.Color(0x000000);
        highlightedElementMesh.userData.box.material.emissiveIntensity = 1.0;
        highlightedElementMesh.userData.targetHighlightScale = 1.0;
      }
      highlightedElementMesh = null;
      state.highlightedElement = null;
    }

    function openInfoPanel(element) {
      infoName.textContent = element.name;
      infoMeta.textContent = `${element.symbol} · ${element.category}`;
      infoAtomic.textContent = element.atomic;
      infoCategory.textContent = element.category;
      infoDescription.textContent = element.desc;
      infoPanel.style.display = "block";

      state.selectedElement = element.symbol;
      state.infoPanelVisible = true;
      selectedElementMesh = elementMap.get(element.symbol);
    }

    function closeInfoPanel() {
      infoPanel.style.display = "none";
      state.selectedElement = null;
      state.infoPanelVisible = false;
      selectedElementMesh = null;
    }

    function randomDistinctElements(count, excludeSymbol = null) {
      const pool = elementsData.filter(e => e.symbol !== excludeSymbol);
      return shuffle(pool).slice(0, count);
    }

    function buildQuestion() {
      const type = shuffle(["atomic-of-symbol", "symbol-of-atomic", "category-of-element"])[0];
      const target = shuffle(elementsData)[0];
      let question = "";
      let options = [];
      let correct = "";
      let highlightSymbol = target.symbol;

      if (type === "atomic-of-symbol") {
        question = `What is the atomic number of ${target.symbol}?`;
        correct = String(target.atomic);
        const wrongNums = shuffle(elementsData.filter(e => e.symbol !== target.symbol).map(e => String(e.atomic)))
          .filter((v, i, a) => a.indexOf(v) === i)
          .slice(0, 3);
        options = shuffle([correct, ...wrongNums]);
      } else if (type === "symbol-of-atomic") {
        question = `Which element has atomic number ${target.atomic}?`;
        correct = target.symbol;
        const wrongSymbols = randomDistinctElements(3, target.symbol).map(e => e.symbol);
        options = shuffle([correct, ...wrongSymbols]);
      } else {
        question = `What category is ${target.name}?`;
        correct = target.category;
        const categories = [...new Set(elementsData.map(e => e.category).filter(c => c !== correct))];
        options = shuffle([correct, ...shuffle(categories).slice(0, 3)]);
      }

      return {
        question,
        options,
        correct,
        highlightSymbol,
        target,
        type
      };
    }

    function startQuiz() {
      state.quizActive = true;
      state.currentQuestion = 0;
      state.score = 0;
      state.streak = 0;
      state.multiplier = 1;
      state.totalCorrect = 0;
      state.totalIncorrect = 0;
      state.quizComplete = false;
      state.questionsAnswered = 0;
      waitingNextQuestion = false;

      quizQuestions = Array.from({ length: 5 }, () => buildQuestion());
      startQuizBtn.disabled = true;
      resultsPanel.style.display = "none";
      closeInfoPanel();
      updateHUD();
      showQuestion(0);
    }

    function showQuestion(index) {
      currentQuestionData = quizQuestions[index];
      state.currentQuestion = index;
      questionDisplay.textContent = currentQuestionData.question;
      answerButtons.forEach((btn, i) => {
        btn.disabled = false;
        btn.textContent = currentQuestionData.options[i];
        btn.classList.remove("correct", "incorrect");
      });
      setQuestionHighlight(currentQuestionData.highlightSymbol);
      state.robotAnimation = "bobbing";
      updateHUD();
    }

    function spawnRobotParticles() {
      if (!robot) return;
      const particleCount = 24;
      for (let i = 0; i < particleCount; i++) {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 8, 8),
          new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(Math.random(), 0.9, 0.65) })
        );
        const start = new THREE.Vector3();
        robot.getWorldPosition(start);
        start.y += 6;
        mesh.position.copy(start);
        scene.add(mesh);

        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          Math.random() * 1.5,
          (Math.random() - 0.5) * 2
        ).normalize().multiplyScalar(0.08 + Math.random() * 0.16);

        particles.push({
          mesh,
          velocity: dir,
          life: 1.2 + Math.random() * 0.6
        });
      }
    }

    function triggerCorrectRobot() {
      if (!robot) return;
      celebrateUntil = clock.getElapsedTime() + 1.0;
      state.robotAnimation = "celebrating";
    }

    function triggerWrongRobot() {
      if (!robot) return;
      wobbleUntil = clock.getElapsedTime() + 1.0;
      state.robotAnimation = "wobbling";
    }

    function answerQuestion(selected, btn) {
      if (!state.quizActive || waitingNextQuestion) return;

      waitingNextQuestion = true;
      const correct = selected === currentQuestionData.correct;

      answerButtons.forEach(b => b.disabled = true);

      if (correct) {
        btn.classList.add("correct");
        state.streak += 1;
        state.multiplier = getMultiplierFromStreak(state.streak);
        const gained = 10 * state.multiplier;
        state.score += gained;
        state.totalCorrect += 1;
        triggerCorrectRobot();
        if (state.streak === 3) spawnRobotParticles();
      } else {
        btn.classList.add("incorrect");
        const rightIndex = currentQuestionData.options.findIndex(o => o === currentQuestionData.correct);
        if (rightIndex >= 0) answerButtons[rightIndex].classList.add("correct");
        state.score -= 3;
        state.streak = 0;
        state.multiplier = 1;
        state.totalIncorrect += 1;
        triggerWrongRobot();
      }

      state.questionsAnswered += 1;
      updateHUD();

      setTimeout(() => {
        if (state.currentQuestion < 4) {
          showQuestion(state.currentQuestion + 1);
          waitingNextQuestion = false;
        } else {
          finishQuiz();
          waitingNextQuestion = false;
        }
      }, 1200);
    }

    function finishQuiz() {
      state.quizActive = false;
      state.quizComplete = true;
      state.currentQuestion = 4;
      clearQuestionHighlight();
      state.robotAnimation = "idle";
      questionDisplay.textContent = "Quiz complete! Review the elements or start again.";
      answerButtons.forEach(btn => {
        btn.disabled = true;
        btn.classList.remove("correct", "incorrect");
      });
      resultsText.innerHTML = `
        Final Score: <strong>${state.score}</strong><br>
        Correct: ${state.totalCorrect} · Incorrect: ${state.totalIncorrect}<br>
        Best Multiplier Reached: ${state.streak >= 5 ? "3x" : state.streak >= 3 ? "2x" : `${state.multiplier}x`}
      `;
      resultsPanel.style.display = "flex";
      startQuizBtn.disabled = false;
      updateHUD();
    }

    startQuizBtn.addEventListener("click", startQuiz);
    closeResultsBtn.addEventListener("click", () => {
      resultsPanel.style.display = "none";
    });

    answerButtons.forEach(btn => {
      btn.addEventListener("click", () => answerQuestion(btn.textContent, btn));
    });

    function pickObject(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elementMeshes, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.element && obj.parent) obj = obj.parent;
        if (obj && obj.userData.element) {
          openInfoPanel(obj.userData.element);
          return;
        }
      }
      closeInfoPanel();
    }

    renderer.domElement.addEventListener("click", pickObject);

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeInfoPanel();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animateRobot(elapsed) {
      if (!robot) return;

      robot.position.y = robotBaseY;
      robot.rotation.z = 0;

      if (state.quizActive) {
        robot.position.y = robotBaseY + Math.sin(elapsed * 2.2) * 0.25;
        if (state.robotAnimation === "bobbing") {
          // already bobbing from quiz active state
        }
      }

      if (celebrateUntil > elapsed) {
        const t = 1 - (celebrateUntil - elapsed);
        robot.rotation.y += t * Math.PI * 2 * 0.08;
      } else if (wobbleUntil > elapsed) {
        const phase = (1 - (wobbleUntil - elapsed)) * 12;
        robot.rotation.z = Math.sin(phase) * 0.22;
      } else {
        if (!state.quizActive) state.robotAnimation = "idle";
        else state.robotAnimation = "bobbing";
      }
    }

    function animateElements(elapsed) {
      elementMeshes.forEach(mesh => {
        const data = mesh.userData;
        mesh.position.y = data.basePosition.y + Math.sin(elapsed * 1.4 + data.phase) * 0.2;

        let targetScale = data.targetHighlightScale || 1.0;

        if (selectedElementMesh === mesh && state.infoPanelVisible) {
          targetScale = Math.max(targetScale, 1.0 + Math.sin(elapsed * 4.0) * 0.08 + 0.08);
        }

        mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.12);
      });
    }

    function animateParticles(delta) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta;
        p.mesh.position.addScaledVector(p.velocity, delta * 12);
        p.velocity.y -= delta * 0.08;
        p.mesh.scale.setScalar(Math.max(0.01, p.life));
        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function loop() {
      requestAnimationFrame(loop);
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      controls.update();
      animateElements(elapsed);
      animateRobot(elapsed);
      animateParticles(delta);

      renderer.render(scene, camera);
    }

    updateHUD();
    loop();
  </script>
</body>
</html>
