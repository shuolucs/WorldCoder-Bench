<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table Education</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a2e;
    color: #fff;
}

canvas {
    display: block;
}

#start-quiz {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    padding: 12px 32px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    letter-spacing: 0.5px;
}

#start-quiz:hover {
    transform: translateX(-50%) scale(1.05);
    box-shadow: 0 6px 25px rgba(99, 102, 241, 0.6);
}

#start-quiz:active {
    transform: translateX(-50%) scale(0.98);
}

#question-display {
    position: fixed;
    top: 75px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    padding: 16px 28px;
    font-size: 18px;
    font-weight: 500;
    color: #e0e7ff;
    background: rgba(15, 15, 50, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 12px;
    text-align: center;
    min-width: 400px;
    max-width: 600px;
    display: none;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
}

#answers-panel {
    position: fixed;
    top: 140px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: none;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 500px;
}

#answers-panel button {
    padding: 10px 24px;
    font-size: 15px;
    font-weight: 500;
    color: #fff;
    background: rgba(30, 30, 80, 0.9);
    border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 200px;
    backdrop-filter: blur(8px);
}

#answers-panel button:hover {
    background: rgba(99, 102, 241, 0.3);
    border-color: rgba(99, 102, 241, 0.7);
    transform: scale(1.03);
    box-shadow: 0 2px 12px rgba(99, 102, 241, 0.3);
}

#answers-panel button.correct {
    background: rgba(34, 197, 94, 0.5);
    border-color: #22c55e;
}

#answers-panel button.incorrect {
    background: rgba(239, 68, 68, 0.5);
    border-color: #ef4444;
}

#hud {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 100;
    padding: 16px 20px;
    background: rgba(15, 15, 50, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(99, 102, 241, 0.25);
    border-radius: 14px;
    display: none;
    flex-direction: column;
    gap: 8px;
    min-width: 180px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
}

#hud .hud-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
}

#hud .hud-label {
    color: #94a3b8;
    font-weight: 400;
}

#hud .hud-value {
    color: #e0e7ff;
    font-weight: 700;
    font-size: 16px;
}

#hud .hud-value.streak {
    color: #f59e0b;
}

#hud .hud-value.multiplier {
    color: #a855f7;
}

#hud .hud-value.score {
    color: #22c55e;
}

#info-panel {
    position: fixed;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 100;
    padding: 24px;
    background: rgba(15, 15, 50, 0.9);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(99, 102, 241, 0.3);
    border-radius: 16px;
    min-width: 260px;
    max-width: 300px;
    display: none;
    flex-direction: column;
    gap: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
}

#info-panel .info-symbol {
    font-size: 48px;
    font-weight: 800;
    text-align: center;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

#info-panel .info-name {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    color: #e0e7ff;
}

#info-panel .info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(99, 102, 241, 0.15);
}

#info-panel .info-row-label {
    color: #94a3b8;
    font-size: 13px;
}

#info-panel .info-row-value {
    color: #e0e7ff;
    font-weight: 600;
    font-size: 13px;
}

#info-panel .info-desc {
    font-size: 13px;
    color: #94a3b8;
    line-height: 1.5;
    margin-top: 4px;
}

#info-panel .close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    background: none;
    border: none;
    color: #94a3b8;
    font-size: 20px;
    cursor: pointer;
    transition: color 0.2s;
}

#info-panel .close-btn:hover {
    color: #fff;
}

#results-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    padding: 32px 40px;
    background: rgba(15, 15, 50, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(99, 102, 241, 0.4);
    border-radius: 20px;
    text-align: center;
    display: none;
    flex-direction: column;
    gap: 16px;
    min-width: 320px;
    box-shadow: 0 12px 48px rgba(0, 0, 0, 0.6);
}

#results-panel h2 {
    font-size: 28px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

#results-panel .result-score {
    font-size: 48px;
    font-weight: 800;
    color: #22c55e;
}

#results-panel .result-details {
    font-size: 15px;
    color: #94a3b8;
}

#results-panel button {
    padding: 12px 28px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 8px;
}

#results-panel button:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.5);
}

.category-legend {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(15, 15, 50, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(99, 102, 241, 0.2);
    border-radius: 12px;
    flex-wrap: wrap;
    justify-content: center;
}

.category-legend .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #94a3b8;
}

.category-legend .legend-color {
    width: 12px;
    height: 12px;
    border-radius: 3px;
}
</style>
</head>
<body>

<button id="start-quiz">🧪 Start Quiz</button>
<div id="question-display"></div>
<div id="answers-panel">
    <button id="answer-0"></button>
    <button id="answer-1"></button>
    <button id="answer-2"></button>
    <button id="answer-3"></button>
</div>

<div id="hud">
    <div class="hud-item">
        <span class="hud-label">Score</span>
        <span class="hud-value score" id="hud-score">0</span>
    </div>
    <div class="hud-item">
        <span class="hud-label">Question</span>
        <span class="hud-value" id="hud-question">1/5</span>
    </div>
    <div class="hud-item">
        <span class="hud-label">Streak</span>
        <span class="hud-value streak" id="hud-streak">0 🔥</span>
    </div>
    <div class="hud-item">
        <span class="hud-label">Multiplier</span>
        <span class="hud-value multiplier" id="hud-multiplier">1x</span>
    </div>
</div>

<div id="info-panel">
    <button class="close-btn" id="info-close">&times;</button>
    <div class="info-symbol" id="info-symbol"></div>
    <div class="info-name" id="info-name"></div>
    <div class="info-row">
        <span class="info-row-label">Atomic Number</span>
        <span class="info-row-value" id="info-number"></span>
    </div>
    <div class="info-row">
        <span class="info-row-label">Category</span>
        <span class="info-row-value" id="info-category"></span>
    </div>
    <div class="info-desc" id="info-desc"></div>
</div>

<div id="results-panel">
    <h2>Quiz Complete!</h2>
    <div class="result-score" id="result-score">0</div>
    <div class="result-details" id="result-details"></div>
    <button id="result-close">Close</button>
</div>

<div class="category-legend">
    <div class="legend-item"><div class="legend-color" style="background:#ff6b6b"></div>Alkali Metals</div>
    <div class="legend-item"><div class="legend-color" style="background:#ffa500"></div>Alkaline Earth</div>
    <div class="legend-item"><div class="legend-color" style="background:#4ecdc4"></div>Nonmetals</div>
    <div class="legend-item"><div class="legend-color" style="background:#a855f7"></div>Noble Gases</div>
    <div class="legend-item"><div class="legend-color" style="background:#f59e0b"></div>Metalloids</div>
    <div class="legend-item"><div class="legend-color" style="background:#60a5fa"></div>Other Metals</div>
    <div class="legend-item"><div class="legend-color" style="background:#ec4899"></div>Halogens</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State management
window.__3D_STATE__ = {
    sceneReady: false,
    robotLoaded: false,
    elementCount: 0,
    quizActive: false,
    currentQuestion: -1,
    score: 0,
    streak: 0,
    multiplier: 1,
    totalCorrect: 0,
    totalIncorrect: 0,
    quizComplete: false,
    selectedElement: null,
    infoPanelVisible: false,
    highlightedElement: null,
    robotAnimation: 'idle',
    questionsAnswered: 0
};

const state = window.__3D_STATE__;

// Element data
const elements = [
    { symbol: 'H', name: 'Hydrogen', number: 1, category: 'nonmetal', col: 0, row: 0, desc: 'The lightest and most abundant element in the universe. Essential for water and organic chemistry.' },
    { symbol: 'He', name: 'Helium', number: 2, category: 'noble gas', col: 17, row: 0, desc: 'A noble gas used in balloons and cryogenics. Second most abundant element in the universe.' },
    { symbol: 'Li', name: 'Lithium', number: 3, category: 'alkali metal', col: 0, row: 1, desc: 'The lightest metal, used in batteries and psychiatric medication.' },
    { symbol: 'Be', name: 'Beryllium', number: 4, category: 'alkaline earth', col: 1, row: 1, desc: 'A lightweight metal used in aerospace materials and X-ray windows.' },
    { symbol: 'B', name: 'Boron', number: 5, category: 'metalloid', col: 12, row: 1, desc: 'A metalloid used in glass, ceramics, and as a semiconductor dopant.' },
    { symbol: 'C', name: 'Carbon', number: 6, category: 'nonmetal', col: 13, row: 1, desc: 'The basis of organic chemistry. Found in diamonds, graphite, and all living things.' },
    { symbol: 'N', name: 'Nitrogen', number: 7, category: 'nonmetal', col: 14, row: 1, desc: 'Makes up 78% of Earth\'s atmosphere. Essential for amino acids and DNA.' },
    { symbol: 'O', name: 'Oxygen', number: 8, category: 'nonmetal', col: 15, row: 1, desc: 'Essential for respiration. Makes up 21% of Earth\'s atmosphere.' },
    { symbol: 'F', name: 'Fluorine', number: 9, category: 'halogen', col: 16, row: 1, desc: 'The most electronegative element. Used in toothpaste and Teflon.' },
    { symbol: 'Ne', name: 'Neon', number: 10, category: 'noble gas', col: 17, row: 1, desc: 'A noble gas famous for its use in bright neon signs.' },
    { symbol: 'Na', name: 'Sodium', number: 11, category: 'alkali metal', col: 0, row: 2, desc: 'A highly reactive metal. Combined with chlorine, it forms table salt.' },
    { symbol: 'Mg', name: 'Magnesium', number: 12, category: 'alkaline earth', col: 1, row: 2, desc: 'A lightweight metal essential for photosynthesis and human health.' },
    { symbol: 'Al', name: 'Aluminium', number: 13, category: 'other metal', col: 12, row: 2, desc: 'The most abundant metal in Earth\'s crust. Used in cans, foil, and aircraft.' },
    { symbol: 'Si', name: 'Silicon', number: 14, category: 'metalloid', col: 13, row: 2, desc: 'The backbone of modern electronics. Second most abundant element in Earth\'s crust.' },
    { symbol: 'P', name: 'Phosphorus', number: 15, category: 'nonmetal', col: 14, row: 2, desc: 'Essential for DNA, RNA, and ATP. Used in fertilizers and matches.' },
    { symbol: 'S', name: 'Sulfur', number: 16, category: 'nonmetal', col: 15, row: 2, desc: 'Known for its yellow color and smell. Used in gunpowder and vulcanization.' },
    { symbol: 'Cl', name: 'Chlorine', number: 17, category: 'halogen', col: 16, row: 2, desc: 'A halogen used to disinfect water and make PVC plastic.' },
    { symbol: 'Ar', name: 'Argon', number: 18, category: 'noble gas', col: 17, row: 2, desc: 'The third most abundant gas in Earth\'s atmosphere. Used in welding and lighting.' }
];

const categoryColors = {
    'alkali metal': 0xff6b6b,
    'alkaline earth': 0xffa500,
    'nonmetal': 0x4ecdc4,
    'noble gas': 0xa855f7,
    'metalloid': 0xf59e0b,
    'other metal': 0x60a5fa,
    'halogen': 0xec4899
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Additional lights for atmosphere
const pointLight1 = new THREE.PointLight(0x6366f1, 0.5, 50);
pointLight1.position.set(-15, 10, 0);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xa855f7, 0.3, 50);
pointLight2.position.set(15, 5, -5);
scene.add(pointLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 80;
controls.minDistance = 10;

// Grid helper (subtle)
const gridHelper = new THREE.GridHelper(60, 60, 0x1a1a4e, 0x1a1a4e);
gridHelper.position.y = -2;
scene.add(gridHelper);

// Stars background
function createStars() {
    const geometry = new THREE.BufferGeometry();
    const vertices = [];
    for (let i = 0; i < 2000; i++) {
        vertices.push(
            (Math.random() - 0.5) * 200,
            (Math.random() - 0.5) * 200,
            (Math.random() - 0.5) * 200
        );
    }
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
    const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6 });
    const stars = new THREE.Points(geometry, material);
    scene.add(stars);
    return stars;
}
const stars = createStars();

// Create element texture
function createElementTexture(element) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    const color = categoryColors[element.category];
    const r = (color >> 16) & 255;
    const g = (color >> 8) & 255;
    const b = color & 255;

    // Background
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.15)`;
    ctx.fillRect(0, 0, 256, 256);

    // Border
    ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
    ctx.lineWidth = 4;
    ctx.strokeRect(4, 4, 248, 248);

    // Atomic number
    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.8)`;
    ctx.font = 'bold 32px Segoe UI, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(element.number.toString(), 16, 40);

    // Symbol
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 80px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(element.symbol, 128, 150);

    // Name
    ctx.fillStyle = `rgba(255, 255, 255, 0.7)`;
    ctx.font = '24px Segoe UI, sans-serif';
    ctx.fillText(element.name, 128, 210);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

// Element meshes
const elementMeshes = {};
const elementGroup = new THREE.Group();

const gridOffsetX = -17;
const gridOffsetY = 5;
const spacing = 2.2;

elements.forEach((el, index) => {
    const geometry = new THREE.BoxGeometry(1.8, 1.8, 0.5);
    const color = categoryColors[el.category];

    const texture = createElementTexture(el);

    const materials = [
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }),
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }),
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }),
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }),
        new THREE.MeshStandardMaterial({ map: texture, metalness: 0.1, roughness: 0.5, emissive: new THREE.Color(color), emissiveIntensity: 0.1 }),
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 })
    ];

    const mesh = new THREE.Mesh(geometry, materials);
    const x = gridOffsetX + el.col * spacing;
    const y = gridOffsetY - el.row * spacing;
    mesh.position.set(x, y, 0);
    mesh.userData = { element: el, originalY: y, phase: index * 0.5, originalScale: 1 };
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    // Edge glow
    const edgeGeometry = new THREE.BoxGeometry(1.9, 1.9, 0.55);
    const edgeMaterial = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.15, side: THREE.BackSide });
    const edgeMesh = new THREE.Mesh(edgeGeometry, edgeMaterial);
    mesh.add(edgeMesh);

    elementGroup.add(mesh);
    elementMeshes[el.symbol] = mesh;
});

scene.add(elementGroup);
state.elementCount = elements.length;

// Robot placeholder (since we can't load actual GLB)
let robotGroup = new THREE.Group();
let robotMixer = null;

function createRobotPlaceholder() {
    const robot = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.5, 2, 1);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a5568, metalness: 0.8, roughness: 0.2 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1;
    robot.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(1.2, 1.2, 1);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x6366f1, metalness: 0.7, roughness: 0.3 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.6;
    robot.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x22c55e, emissive: 0x22c55e, emissiveIntensity: 0.8 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.3, 2.7, 0.5);
    robot.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.3, 2.7, 0.5);
    robot.add(rightEye);

    // Antenna
    const antennaGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8);
    const antennaMat = new THREE.MeshStandardMaterial({ color: 0xa855f7, metalness: 0.9 });
    const antenna = new THREE.Mesh(antennaGeo, antennaMat);
    antenna.position.y = 3.5;
    robot.add(antenna);

    const antennaBallGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const antennaBallMat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0xef4444, emissiveIntensity: 0.5 });
    const antennaBall = new THREE.Mesh(antennaBallGeo, antennaBallMat);
    antennaBall.position.y = 3.8;
    robot.add(antennaBall);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.4, 1.5, 0.4);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x4a5568, metalness: 0.8, roughness: 0.2 });
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-1.2, 1, 0);
    leftArm.rotation.z = 0.2;
    robot.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, armMat);
    rightArm.position.set(1.2, 1, 0);
    rightArm.rotation.z = -0.2;
    robot.add(rightArm);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.5, 1.2, 0.5);
    const leftLeg = new THREE.Mesh(legGeo, armMat);
    leftLeg.position.set(-0.4, -0.6, 0);
    robot.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, armMat);
    rightLeg.position.set(0.4, -0.6, 0);
    robot.add(rightLeg);

    // Chest light
    const chestGeo = new THREE.CircleGeometry(0.2, 16);
    const chestMat = new THREE.MeshStandardMaterial({ color: 0x6366f1, emissive: 0x6366f1, emissiveIntensity: 1.0 });
    const chest = new THREE.Mesh(chestGeo, chestMat);
    chest.position.set(0, 1.2, 0.51);
    robot.add(chest);

    return robot;
}

// Try to load robot.glb, fall back to placeholder
const gltfLoader = new GLTFLoader();
gltfLoader.load('robot.glb',
    (gltf) => {
        robotGroup = gltf.scene;
        robotGroup.scale.set(2, 2, 2);
        robotGroup.position.set(-12, 0, 5);
        robotGroup.rotation.y = Math.PI / 4;
        scene.add(robotGroup);
        state.robotLoaded = true;
        checkSceneReady();

        if (gltf.animations && gltf.animations.length > 0) {
            robotMixer = new THREE.AnimationMixer(robotGroup);
            const action = robotMixer.clipAction(gltf.animations[0]);
            action.play();
        }
    },
    undefined,
    (error) => {
        console.log('Robot GLB not found, using placeholder robot');
        robotGroup = createRobotPlaceholder();
        robotGroup.scale.set(2, 2, 2);
        robotGroup.position.set(-12, 0, 5);
        robotGroup.rotation.y = Math.PI / 4;
        scene.add(robotGroup);
        state.robotLoaded = true;
        checkSceneReady();
    }
);

function checkSceneReady() {
    if (state.robotLoaded && state.elementCount > 0) {
        state.sceneReady = true;
    }
}

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Particle system for streak effects
const particles = [];

function spawnStreakParticles() {
    const robotPos = robotGroup.position.clone();
    robotPos.y += 4;
    for (let i = 0; i < 30; i++) {
        const geo = new THREE.SphereGeometry(0.08, 8, 8);
        const colors = [0x6366f1, 0xa855f7, 0xf59e0b, 0x22c55e, 0xec4899];
        const mat = new THREE.MeshBasicMaterial({
            color: colors[Math.floor(Math.random() * colors.length)],
            transparent: true,
            opacity: 1
        });
        const particle = new THREE.Mesh(geo, mat);
        particle.position.copy(robotPos);
        particle.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.4,
            Math.random() * 0.3 + 0.1,
            (Math.random() - 0.5) * 0.4
        );
        particle.userData.life = 1.0;
        particle.userData.decay = 0.01 + Math.random() * 0.02;
        scene.add(particle);
        particles.push(particle);
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.005;
        p.userData.life -= p.userData.decay;
        p.material.opacity = p.userData.life;
        p.scale.setScalar(p.userData.life);
        if (p.userData.life <= 0) {
            scene.remove(p);
            p.geometry.dispose();
            p.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// Robot animations
let robotAnimState = { bobTime: 0, celebrateTime: 0, wobbleTime: 0, celebrating: false, wobbling: false };

function updateRobotAnimation(delta) {
    if (!robotGroup) return;

    const baseY = 0;

    if (robotAnimState.celebrating) {
        robotAnimState.celebrateTime += delta;
        const progress = robotAnimState.celebrateTime / 1.0;
        robotGroup.rotation.y = Math.PI / 4 + progress * Math.PI * 2;
        if (progress >= 1) {
            robotAnimState.celebrating = false;
            robotAnimState.celebrateTime = 0;
            robotGroup.rotation.y = Math.PI / 4;
            state.robotAnimation = state.quizActive ? 'bobbing' : 'idle';
        }
    } else if (robotAnimState.wobbling) {
        robotAnimState.wobbleTime += delta;
        robotGroup.rotation.z = Math.sin(robotAnimState.wobbleTime * 15) * 0.2 * Math.max(0, 1 - robotAnimState.wobbleTime / 0.8);
        if (robotAnimState.wobbleTime >= 0.8) {
            robotAnimState.wobbling = false;
            robotAnimState.wobbleTime = 0;
            robotGroup.rotation.z = 0;
            state.robotAnimation = state.quizActive ? 'bobbing' : 'idle';
        }
    } else if (state.quizActive) {
        robotAnimState.bobTime += delta;
        robotGroup.position.y = baseY + Math.sin(robotAnimState.bobTime * 2) * 0.3;
        state.robotAnimation = 'bobbing';
    } else {
        robotGroup.position.y = baseY + Math.sin(robotAnimState.bobTime * 0.5) * 0.1;
        robotAnimState.bobTime += delta;
        state.robotAnimation = 'idle';
    }
}

function triggerCelebration() {
    robotAnimState.celebrating = true;
    robotAnimState.celebrateTime = 0;
    state.robotAnimation = 'celebrating';
}

function triggerWobble() {
    robotAnimState.wobbling = true;
    robotAnimState.wobbleTime = 0;
    state.robotAnimation = 'wobbling';
}

// Quiz system
let quizQuestions = [];
let currentQuestionData = null;
let answerLocked = false;

function generateQuestions() {
    const questions = [];
    const types = ['atomic_number', 'element_from_number', 'category'];
    const shuffled = [...elements].sort(() => Math.random() - 0.5);

    for (let i = 0; i < 5; i++) {
        const el = shuffled[i % shuffled.length];
        const type = types[Math.floor(Math.random() * types.length)];
        let question, correctAnswer, answers;

        if (type === 'atomic_number') {
            question = `What is the atomic number of ${el.symbol} (${el.name})?`;
            correctAnswer = el.number.toString();
            answers = [correctAnswer];
            while (answers.length < 4) {
                const fake = (Math.floor(Math.random() * 18) + 1).toString();
                if (!answers.includes(fake)) answers.push(fake);
            }
        } else if (type === 'element_from_number') {
            question = `Which element has atomic number ${el.number}?`;
            correctAnswer = el.name;
            answers = [correctAnswer];
            while (answers.length < 4) {
                const fake = elements[Math.floor(Math.random() * elements.length)].name;
                if (!answers.includes(fake)) answers.push(fake);
            }
        } else {
            question = `What category is ${el.name} (${el.symbol})?`;
            correctAnswer = el.category;
            const allCategories = [...new Set(elements.map(e => e.category))];
            answers = [correctAnswer];
            const otherCats = allCategories.filter(c => c !== correctAnswer).sort(() => Math.random() - 0.5);
            for (let j = 0; j < 3 && j < otherCats.length; j++) {
                answers.push(otherCats[j]);
            }
            while (answers.length < 4) {
                answers.push('unknown');
            }
        }

        // Shuffle answers
        answers.sort(() => Math.random() - 0.5);

        questions.push({
            question,
            correctAnswer,
            answers,
            element: el,
            type
        });
    }

    return questions;
}

function highlightElement(symbol) {
    // Reset previous highlight
    if (state.highlightedElement && elementMeshes[state.highlightedElement]) {
        const prevMesh = elementMeshes[state.highlightedElement];
        prevMesh.scale.setScalar(1);
        prevMesh.material.forEach(m => {
            if (m.emissiveIntensity !== undefined) m.emissiveIntensity = 0.1;
        });
    }

    if (symbol && elementMeshes[symbol]) {
        const mesh = elementMeshes[symbol];
        mesh.scale.setScalar(1.3);
        mesh.material.forEach(m => {
            if (m.emissiveIntensity !== undefined) m.emissiveIntensity = 0.8;
        });
        state.highlightedElement = symbol;
    } else {
        state.highlightedElement = null;
    }
}

function showQuestion(index) {
    if (index >= quizQuestions.length) {
        endQuiz();
        return;
    }

    currentQuestionData = quizQuestions[index];
    state.currentQuestion = index;
    answerLocked = false;

    document.getElementById('question-display').style.display = 'block';
    document.getElementById('question-display').textContent = currentQuestionData.question;

    const panel = document.getElementById('answers-panel');
    panel.style.display = 'flex';

    for (let i = 0; i < 4; i++) {
        const btn = document.getElementById(`answer-${i}`);
        btn.textContent = currentQuestionData.answers[i];
        btn.className = '';
        btn.disabled = false;
    }

    highlightElement(currentQuestionData.element.symbol);
    updateHUD();
}

function handleAnswer(answerIndex) {
    if (answerLocked || !currentQuestionData) return;
    answerLocked = true;

    const selected = currentQuestionData.answers[answerIndex];
    const correct = selected === currentQuestionData.correctAnswer;
    const btn = document.getElementById(`answer-${answerIndex}`);

    if (correct) {
        btn.classList.add('correct');
        state.streak++;
        state.totalCorrect++;

        if (state.streak >= 5) state.multiplier = 3;
        else if (state.streak >= 3) state.multiplier = 2;
        else state.multiplier = 1;

        state.score += 10 * state.multiplier;
        triggerCelebration();

        if (state.streak === 3 || state.streak === 5) {
            spawnStreakParticles();
        }
    } else {
        btn.classList.add('incorrect');
        // Show correct answer
        for (let i = 0; i < 4; i++) {
            if (currentQuestionData.answers[i] === currentQuestionData.correctAnswer) {
                document.getElementById(`answer-${i}`).classList.add('correct');
            }
        }
        state.streak = 0;
        state.multiplier = 1;
        state.score = Math.max(0, state.score - 3);
        state.totalIncorrect++;
        triggerWobble();
    }

    state.questionsAnswered++;
    updateHUD();

    // Disable all buttons
    for (let i = 0; i < 4; i++) {
        document.getElementById(`answer-${i}`).disabled = true;
    }

    setTimeout(() => {
        highlightElement(null);
        showQuestion(state.currentQuestion + 1);
    }, 1500);
}

function startQuiz() {
    quizQuestions = generateQuestions();
    state.quizActive = true;
    state.quizComplete = false;
    state.currentQuestion = -1;
    state.score = 0;
    state.streak = 0;
    state.multiplier = 1;
    state.totalCorrect = 0;
    state.totalIncorrect = 0;
    state.questionsAnswered = 0;

    document.getElementById('start-quiz').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('results-panel').style.display = 'none';

    // Close info panel if open
    closeInfoPanel();

    showQuestion(0);
}

function endQuiz() {
    state.quizActive = false;
    state.quizComplete = true;
    state.currentQuestion = -1;

    document.getElementById('question-display').style.display = 'none';
    document.getElementById('answers-panel').style.display = 'none';

    highlightElement(null);

    const resultsPanel = document.getElementById('results-panel');
    resultsPanel.style.display = 'flex';
    document.getElementById('result-score').textContent = state.score;
    document.getElementById('result-details').textContent =
        `Correct: ${state.totalCorrect}/5 | Incorrect: ${state.totalIncorrect}/5 | Best Streak: ${Math.max(state.streak, state.totalCorrect)}`;

    updateHUD();
}

function updateHUD() {
    document.getElementById('hud-score').textContent = state.score;
    document.getElementById('hud-question').textContent = `${Math.min(state.questionsAnswered + 1, 5)}/5`;
    document.getElementById('hud-streak').textContent = `${state.streak} 🔥`;
    document.getElementById('hud-multiplier').textContent = `${state.multiplier}x`;
}

// Info panel
function showInfoPanel(element) {
    state.selectedElement = element.symbol;
    state.infoPanelVisible = true;

    const panel = document.getElementById('info-panel');
    panel.style.display = 'flex';
    document.getElementById('info-symbol').textContent = element.symbol;
    document.getElementById('info-name').textContent = element.name;
    document.getElementById('info-number').textContent = element.number;
    document.getElementById('info-category').textContent = element.category.charAt(0).toUpperCase() + element.category.slice(1);
    document.getElementById('info-desc').textContent = element.desc;
}

function closeInfoPanel() {
    state.selectedElement = null;
    state.infoPanelVisible = false;
    document.getElementById('info-panel').style.display = 'none';

    // Reset pulsing element
    Object.values(elementMeshes).forEach(mesh => {
        if (!state.highlightedElement || mesh.userData.element.symbol !== state.highlightedElement) {
            mesh.userData.pulsing = false;
        }
    });
}

// Event listeners
document.getElementById('start-quiz').addEventListener('click', startQuiz);

for (let i = 0; i < 4; i++) {
    document.getElementById(`answer-${i}`).addEventListener('click', () => handleAnswer(i));
}

document.getElementById('info-close').addEventListener('click', closeInfoPanel);

document.getElementById('result-close').addEventListener('click', () => {
    document.getElementById('results-panel').style.display = 'none';
    document.getElementById('start-quiz').style.display = 'block';
    document.getElementById('hud').style.display = 'none';
});

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeInfoPanel();
    }
});

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const meshes = Object.values(elementMeshes);
    const intersects = raycaster.intersectObjects(meshes, true);

    if (intersects.length > 0) {
        let target = intersects[0].object;
        // Walk up to find element mesh
        while (target && !target.userData.element) {
            target = target.parent;
        }
        if (target && target.userData.element) {
            // Reset previous pulsing
            Object.values(elementMeshes).forEach(m => m.userData.pulsing = false);
            target.userData.pulsing = true;
            showInfoPanel(target.userData.element);
        }
    } else if (!state.quizActive) {
        closeInfoPanel();
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    // Update controls
    controls.update();

    // Stars rotation
    stars.rotation.y += delta * 0.01;

    // Element floating animation
    Object.values(elementMeshes).forEach(mesh => {
        const { originalY, phase, pulsing } = mesh.userData;
        mesh.position.y = originalY + Math.sin(time * 1.5 + phase) * 0.2;

        // Pulsing for selected element
        if (pulsing && state.infoPanelVisible) {
            const pulseScale = 1 + Math.sin(time * 4) * 0.1;
            if (state.highlightedElement !== mesh.userData.element.symbol) {
                mesh.scale.setScalar(pulseScale);
            }
        }
    });

    // Robot animation
    updateRobotAnimation(delta);

    // Robot mixer
    if (robotMixer) {
        robotMixer.update(delta);
    }

    // Particles
    updateParticles();

    // Point lights animation
    pointLight1.intensity = 0.5 + Math.sin(time * 2) * 0.2;
    pointLight2.intensity = 0.3 + Math.sin(time * 1.5 + 1) * 0.15;

    renderer.render(scene, camera);
}

// Initialize
checkSceneReady();
animate();

</script>
