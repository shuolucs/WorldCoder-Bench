<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 玩具车迷宫导航游戏</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #dcdcdc;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.7;
      font-size: 14px;
      min-width: 180px;
    }

    #message {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 128, 0, 0.75);
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 16px;
      display: none;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>计时: <span id="time">0.0</span>s</div>
    <div>星星: <span id="stars">0/3</span></div>
    <div>速度: <span id="speed">0.0</span> m/s</div>
    <div>位置: <span id="position">(0.0, 0.0)</span></div>
  </div>
  <div id="message">到达终点，游戏完成！</div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd8d8d8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const worldSize = 16;
    const mazeCols = 8;
    const mazeRows = 8;
    const cellSize = worldSize / mazeCols;
    const wallThickness = 0.18;
    const wallHeight = 1.2;
    const floorY = 0;
    const carBaseY = 0.22;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(worldSize * 0.5, 18, worldSize * 0.55);
    camera.lookAt(worldSize * 0.5, 0, worldSize * 0.5);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(8, 14, 6);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(worldSize, worldSize),
      new THREE.MeshStandardMaterial({ color: 0xeeeeee })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(worldSize / 2, floorY, worldSize / 2);
    floor.receiveShadow = true;
    scene.add(floor);

    function createMaze(cols, rows) {
      const cells = [];
      for (let z = 0; z < rows; z++) {
        const row = [];
        for (let x = 0; x < cols; x++) {
          row.push({
            visited: false,
            walls: { top: true, right: true, bottom: true, left: true }
          });
        }
        cells.push(row);
      }

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function dfs(cx, cz) {
        cells[cz][cx].visited = true;
        const dirs = shuffle([
          { dx: 0, dz: -1, wall: 'top', opposite: 'bottom' },
          { dx: 1, dz: 0, wall: 'right', opposite: 'left' },
          { dx: 0, dz: 1, wall: 'bottom', opposite: 'top' },
          { dx: -1, dz: 0, wall: 'left', opposite: 'right' }
        ]);

        for (const dir of dirs) {
          const nx = cx + dir.dx;
          const nz = cz + dir.dz;
          if (nx < 0 || nx >= cols || nz < 0 || nz >= rows) continue;
          if (cells[nz][nx].visited) continue;

          cells[cz][cx].walls[dir.wall] = false;
          cells[nz][nx].walls[dir.opposite] = false;
          dfs(nx, nz);
        }
      }

      dfs(0, 0);
      return cells;
    }

    const maze = createMaze(mazeCols, mazeRows);

    const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x777777 });
    const wallMeshes = [];
    const wallBoxes = [];

    function addWall(x, z, w, d) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(w, wallHeight, d),
        wallMaterial
      );
      mesh.position.set(x, wallHeight / 2, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      wallMeshes.push(mesh);

      const box = new THREE.Box3().setFromObject(mesh);
      wallBoxes.push(box);
    }

    function buildMazeGeometry() {
      for (let z = 0; z < mazeRows; z++) {
        for (let x = 0; x < mazeCols; x++) {
          const cell = maze[z][x];
          const x0 = x * cellSize;
          const z0 = z * cellSize;
          const cx = x0 + cellSize / 2;
          const cz = z0 + cellSize / 2;

          if (cell.walls.top) {
            addWall(cx, z0, cellSize + wallThickness, wallThickness);
          }
          if (cell.walls.left) {
            addWall(x0, cz, wallThickness, cellSize + wallThickness);
          }
          if (z === mazeRows - 1 && cell.walls.bottom) {
            addWall(cx, z0 + cellSize, cellSize + wallThickness, wallThickness);
          }
          if (x === mazeCols - 1 && cell.walls.right) {
            addWall(x0 + cellSize, cz, wallThickness, cellSize + wallThickness);
          }
        }
      }
    }

    buildMazeGeometry();

    function cellCenter(cx, cz) {
      return new THREE.Vector3(
        cx * cellSize + cellSize / 2,
        carBaseY,
        cz * cellSize + cellSize / 2
      );
    }

    const startPos = cellCenter(0, 0);
    const goalPos = cellCenter(mazeCols - 1, mazeRows - 1);

    const goalMesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 0.15, 0.9),
      new THREE.MeshStandardMaterial({ color: 0x00aa00 })
    );
    goalMesh.position.set(goalPos.x, 0.08, goalPos.z);
    scene.add(goalMesh);

    const starMaterial = new THREE.MeshStandardMaterial({
      color: 0xffdd22,
      emissive: 0xaa8800
    });

    const stars = [];
    const occupied = new Set(['0,0', `${mazeCols - 1},${mazeRows - 1}`]);

    function randomFreeCell() {
      while (true) {
        const x = Math.floor(Math.random() * mazeCols);
        const z = Math.floor(Math.random() * mazeRows);
        const key = `${x},${z}`;
        if (!occupied.has(key)) {
          occupied.add(key);
          return { x, z };
        }
      }
    }

    for (let i = 0; i < 3; i++) {
      const { x, z } = randomFreeCell();
      const p = cellCenter(x, z);
      const star = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 16, 16),
        starMaterial
      );
      star.position.set(p.x, 0.35, p.z);
      star.castShadow = true;
      scene.add(star);
      stars.push({ mesh: star, collected: false });
    }

    let car = null;
    let modelLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'assets/ToyCar.glb',
      (gltf) => {
        car = gltf.scene;
        car.position.copy(startPos);
        car.rotation.y = 0;

        let box = new THREE.Box3().setFromObject(car);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scale = 0.9 / maxDim;
        car.scale.setScalar(scale);

        box.setFromObject(car);
        const minY = box.min.y;
        car.position.y += carBaseY - minY;

        car.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(car);
        modelLoaded = true;
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.7, 0.35, 1.0),
          new THREE.MeshStandardMaterial({ color: 0xff3333 })
        );
        fallback.position.copy(startPos);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        scene.add(fallback);
        car = fallback;
        modelLoaded = false;
      }
    );

    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      ArrowLeft: false,
      ArrowRight: false
    };

    window.addEventListener('keydown', (e) => {
      if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault();
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
        e.preventDefault();
      }
    });

    const acceleration = 3;
    const maxSpeed = 8;
    const damping = 0.95;
    const turnRate = 2.2;
    const carHalfExtents = new THREE.Vector3(0.32, 0.25, 0.48);

    let speed = 0;
    let starsCollected = 0;
    let completed = false;
    let elapsed = 0;

    function getCarAABB(pos) {
      return new THREE.Box3(
        new THREE.Vector3(pos.x - carHalfExtents.x, pos.y - carHalfExtents.y, pos.z - carHalfExtents.z),
        new THREE.Vector3(pos.x + carHalfExtents.x, pos.y + carHalfExtents.y, pos.z + carHalfExtents.z)
      );
    }

    function checkWallCollision(pos) {
      const box = getCarAABB(pos);
      for (const wallBox of wallBoxes) {
        if (box.intersectsBox(wallBox)) return true;
      }
      return false;
    }

    const clock = new THREE.Clock();

    const hudTime = document.getElementById('time');
    const hudStars = document.getElementById('stars');
    const hudSpeed = document.getElementById('speed');
    const hudPosition = document.getElementById('position');
    const message = document.getElementById('message');

    function updateCar(dt) {
      if (!car || completed) return;

      if (keys.ArrowUp) speed += acceleration * dt;
      if (keys.ArrowDown) speed -= acceleration * dt;

      speed = THREE.MathUtils.clamp(speed, -maxSpeed * 0.5, maxSpeed);

      if (keys.ArrowLeft) car.rotation.y += turnRate * dt * (speed >= 0 ? 1 : -1);
      if (keys.ArrowRight) car.rotation.y -= turnRate * dt * (speed >= 0 ? 1 : -1);

      speed *= damping;

      const dir = new THREE.Vector3(0, 0, 1).applyAxisAngle(new THREE.Vector3(0, 1, 0), car.rotation.y);
      const prevPos = car.position.clone();
      const move = dir.multiplyScalar(speed * dt);
      car.position.add(move);

      if (checkWallCollision(car.position)) {
        car.position.copy(prevPos);
        speed = -speed * 0.5;
      }

      const goalDist = car.position.clone().setY(0).distanceTo(goalMesh.position.clone().setY(0));
      if (goalDist < 0.7) {
        completed = true;
        message.style.display = 'block';
      }

      for (const star of stars) {
        if (star.collected) continue;
        const d = car.position.clone().setY(0).distanceTo(star.mesh.position.clone().setY(0));
        if (d < 0.5) {
          star.collected = true;
          star.mesh.visible = false;
          starsCollected++;
        } else {
          star.mesh.rotation.y += dt * 2.5;
        }
      }
    }

    function updateHUD() {
      hudTime.textContent = elapsed.toFixed(1);
      hudStars.textContent = `${starsCollected}/3`;
      hudSpeed.textContent = Math.abs(speed).toFixed(2);
      if (car) {
        hudPosition.textContent = `(${car.position.x.toFixed(2)}, ${car.position.z.toFixed(2)})`;
      } else {
        hudPosition.textContent = `(0.00, 0.00)`;
      }
    }

    function updateState() {
      window.__3D_STATE__ = {
        modelLoaded,
        time: elapsed,
        starsCollected,
        speed: Math.abs(speed),
        position: car ? { x: car.position.x, z: car.position.z } : { x: startPos.x, z: startPos.z },
        completed
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      if (!completed) elapsed += dt;

      updateCar(dt);
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
