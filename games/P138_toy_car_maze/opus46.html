<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toy Car Maze Navigation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    background: rgba(0,0,0,0.6);
    padding: 12px 16px;
    border-radius: 8px;
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
  }
  #hud span { color: #0f0; }
  #message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #0f0;
    font-family: 'Arial', sans-serif;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px #0f0, 0 0 40px #0f0;
    display: none;
    z-index: 20;
    text-align: center;
  }
  #instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaa;
    font-family: 'Arial', sans-serif;
    font-size: 14px;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 10;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  ⏱ Time: <span id="time">0.0</span>s<br>
  ⭐ Stars: <span id="stars">0 / 3</span><br>
  🚗 Speed: <span id="speed">0.0</span> m/s<br>
  📍 Position: <span id="position">(0, 0)</span>
</div>
<div id="message">🎉 YOU WIN! 🎉<br><span style="font-size:24px;">Maze Completed!</span></div>
<div id="instructions">Arrow Keys: ↑ Accelerate | ↓ Brake | ← → Steer</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
  modelLoaded: false,
  time: 0,
  starsCollected: 0,
  speed: 0,
  position: { x: 0, z: 0 },
  completed: false
};

// ============ MAZE GENERATION (DFS) ============
const MAZE_SIZE = 8;
const CELL_SIZE = 2.0;
const WALL_THICKNESS = 0.15;
const WALL_HEIGHT = 0.8;

function generateMaze(rows, cols) {
  // Each cell has walls: top, right, bottom, left
  const cells = [];
  for (let r = 0; r < rows; r++) {
    cells[r] = [];
    for (let c = 0; c < cols; c++) {
      cells[r][c] = { visited: false, walls: [true, true, true, true] }; // top, right, bottom, left
    }
  }

  const stack = [];
  const startR = 0, startC = 0;
  cells[startR][startC].visited = true;
  stack.push([startR, startC]);

  function getNeighbors(r, c) {
    const neighbors = [];
    if (r > 0 && !cells[r-1][c].visited) neighbors.push([r-1, c, 0, 2]); // top
    if (c < cols-1 && !cells[r][c+1].visited) neighbors.push([r, c+1, 1, 3]); // right
    if (r < rows-1 && !cells[r+1][c].visited) neighbors.push([r+1, c, 2, 0]); // bottom
    if (c > 0 && !cells[r][c-1].visited) neighbors.push([r, c-1, 3, 1]); // left
    return neighbors;
  }

  while (stack.length > 0) {
    const [cr, cc] = stack[stack.length - 1];
    const neighbors = getNeighbors(cr, cc);
    if (neighbors.length === 0) {
      stack.pop();
    } else {
      const [nr, nc, wallIdx, oppWallIdx] = neighbors[Math.floor(Math.random() * neighbors.length)];
      cells[cr][cc].walls[wallIdx] = false;
      cells[nr][nc].walls[oppWallIdx] = false;
      cells[nr][nc].visited = true;
      stack.push([nr, nc]);
    }
  }

  return cells;
}

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 30, 60);

const mazeWorldSize = MAZE_SIZE * CELL_SIZE;
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(mazeWorldSize / 2, mazeWorldSize * 1.1, mazeWorldSize / 2 + mazeWorldSize * 0.3);
camera.lookAt(mazeWorldSize / 2, 0, mazeWorldSize / 2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(mazeWorldSize, mazeWorldSize * 1.5, mazeWorldSize * 0.5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -mazeWorldSize;
dirLight.shadow.camera.right = mazeWorldSize;
dirLight.shadow.camera.top = mazeWorldSize;
dirLight.shadow.camera.bottom = -mazeWorldSize;
scene.add(dirLight);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(mazeWorldSize + 2, mazeWorldSize + 2);
const groundMat = new THREE.MeshStandardMaterial({ color: 0xd0d0d0, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(mazeWorldSize / 2, -0.01, mazeWorldSize / 2);
ground.receiveShadow = true;
scene.add(ground);

// ============ BUILD MAZE WALLS ============
const maze = generateMaze(MAZE_SIZE, MAZE_SIZE);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6 });
const wallBoxes = []; // For collision detection: array of THREE.Box3

function addWall(x, z, width, depth) {
  const geo = new THREE.BoxGeometry(width, WALL_HEIGHT, depth);
  const mesh = new THREE.Mesh(geo, wallMat);
  mesh.position.set(x, WALL_HEIGHT / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  const box = new THREE.Box3().setFromObject(mesh);
  wallBoxes.push(box);
}

for (let r = 0; r < MAZE_SIZE; r++) {
  for (let c = 0; c < MAZE_SIZE; c++) {
    const cell = maze[r][c];
    const cx = c * CELL_SIZE;
    const cz = r * CELL_SIZE;

    // Top wall (z = cz)
    if (cell.walls[0]) {
      addWall(cx + CELL_SIZE / 2, cz, CELL_SIZE + WALL_THICKNESS, WALL_THICKNESS);
    }
    // Left wall (x = cx)
    if (cell.walls[3]) {
      addWall(cx, cz + CELL_SIZE / 2, WALL_THICKNESS, CELL_SIZE + WALL_THICKNESS);
    }
  }
}

// Bottom boundary
for (let c = 0; c < MAZE_SIZE; c++) {
  if (maze[MAZE_SIZE - 1][c].walls[2]) {
    const cx = c * CELL_SIZE;
    const cz = MAZE_SIZE * CELL_SIZE;
    addWall(cx + CELL_SIZE / 2, cz, CELL_SIZE + WALL_THICKNESS, WALL_THICKNESS);
  }
}

// Right boundary
for (let r = 0; r < MAZE_SIZE; r++) {
  if (maze[r][MAZE_SIZE - 1].walls[1]) {
    const cx = MAZE_SIZE * CELL_SIZE;
    const cz = r * CELL_SIZE;
    addWall(cx, cz + CELL_SIZE / 2, WALL_THICKNESS, CELL_SIZE + WALL_THICKNESS);
  }
}

// ============ GOAL (GREEN BLOCK) ============
const goalR = MAZE_SIZE - 1, goalC = MAZE_SIZE - 1;
const goalX = goalC * CELL_SIZE + CELL_SIZE / 2;
const goalZ = goalR * CELL_SIZE + CELL_SIZE / 2;
const goalGeo = new THREE.BoxGeometry(CELL_SIZE * 0.6, 0.05, CELL_SIZE * 0.6);
const goalMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, emissiveIntensity: 0.3 });
const goalMesh = new THREE.Mesh(goalGeo, goalMat);
goalMesh.position.set(goalX, 0.025, goalZ);
scene.add(goalMesh);

// ============ STARS ============
const starPositions = [];
const starMeshes = [];
const starCollected = [false, false, false];

// Place stars in random cells (not start or end)
function getRandomStarPositions() {
  const positions = [];
  const used = new Set();
  used.add('0,0');
  used.add(`${MAZE_SIZE-1},${MAZE_SIZE-1}`);

  while (positions.length < 3) {
    const r = Math.floor(Math.random() * MAZE_SIZE);
    const c = Math.floor(Math.random() * MAZE_SIZE);
    const key = `${r},${c}`;
    if (!used.has(key)) {
      used.add(key);
      positions.push({
        x: c * CELL_SIZE + CELL_SIZE / 2,
        z: r * CELL_SIZE + CELL_SIZE / 2
      });
    }
  }
  return positions;
}

const starPos = getRandomStarPositions();
for (let i = 0; i < 3; i++) {
  const starGroup = new THREE.Group();

  // Star shape using icosahedron
  const starGeo = new THREE.IcosahedronGeometry(0.15, 0);
  const starMat = new THREE.MeshStandardMaterial({
    color: 0xFFD700,
    emissive: 0xFFAA00,
    emissiveIntensity: 0.5,
    metalness: 0.8,
    roughness: 0.2
  });
  const starMesh = new THREE.Mesh(starGeo, starMat);
  starGroup.add(starMesh);

  // Glow
  const glowGeo = new THREE.SphereGeometry(0.25, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xFFD700, transparent: true, opacity: 0.2 });
  const glowMesh = new THREE.Mesh(glowGeo, glowMat);
  starGroup.add(glowMesh);

  starGroup.position.set(starPos[i].x, 0.4, starPos[i].z);
  scene.add(starGroup);
  starMeshes.push(starGroup);
  starPositions.push(starPos[i]);
}

// ============ CAR ============
let carModel = null;
let carSpeed = 0;
let carAngle = Math.PI; // facing down (+z direction initially)
const carPosition = new THREE.Vector3(CELL_SIZE / 2, 0, CELL_SIZE / 2);

const ACCELERATION = 3.0;
const MAX_SPEED = 8.0;
const FRICTION = 0.95;
const TURN_SPEED = 2.5;
const BRAKE_DECEL = 6.0;

// Placeholder car (box) until model loads
const placeholderGeo = new THREE.BoxGeometry(0.6, 0.3, 0.9);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
const placeholderCar = new THREE.Mesh(placeholderGeo, placeholderMat);
placeholderCar.position.copy(carPosition);
placeholderCar.position.y = 0.15;
placeholderCar.castShadow = true;
scene.add(placeholderCar);

// Load car model
const loader = new GLTFLoader();
loader.load('assets/ToyCar.glb', (gltf) => {
  carModel = gltf.scene;

  // Compute bounding box to scale appropriately
  const box = new THREE.Box3().setFromObject(carModel);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const desiredSize = 0.8;
  const scale = desiredSize / maxDim;
  carModel.scale.setScalar(scale);

  carModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  carModel.position.copy(carPosition);
  carModel.position.y = 0;
  carModel.rotation.y = carAngle;
  scene.add(carModel);
  scene.remove(placeholderCar);

  window.__3D_STATE__.modelLoaded = true;
}, undefined, (error) => {
  console.warn('Could not load ToyCar.glb, using placeholder:', error);
  window.__3D_STATE__.modelLoaded = true; // Still mark as loaded with placeholder
});

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ============ COLLISION ============
function getCarAABB(pos) {
  const halfW = 0.3;
  const halfD = 0.45;
  // Axis-aligned bounding box around car center
  return new THREE.Box3(
    new THREE.Vector3(pos.x - halfW, 0, pos.z - halfD),
    new THREE.Vector3(pos.x + halfW, WALL_HEIGHT, pos.z + halfD)
  );
}

function checkCollision(pos) {
  const carBox = getCarAABB(pos);
  for (const wallBox of wallBoxes) {
    if (carBox.intersectsBox(wallBox)) {
      return true;
    }
  }
  return false;
}

// ============ GAME LOOP ============
let gameTime = 0;
let starsCollectedCount = 0;
let completed = false;
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = Math.min(clock.getDelta(), 0.05);

  if (!completed) {
    gameTime += delta;
  }

  // Input handling
  if (!completed) {
    if (keys['ArrowUp']) {
      carSpeed += ACCELERATION * delta;
    }
    if (keys['ArrowDown']) {
      carSpeed -= BRAKE_DECEL * delta;
    }
    if (keys['ArrowLeft']) {
      carAngle += TURN_SPEED * delta * (carSpeed > 0.1 ? 1 : (carSpeed < -0.1 ? -1 : 0));
    }
    if (keys['ArrowRight']) {
      carAngle -= TURN_SPEED * delta * (carSpeed > 0.1 ? 1 : (carSpeed < -0.1 ? -1 : 0));
    }

    // Clamp speed
    carSpeed = Math.max(-MAX_SPEED / 2, Math.min(MAX_SPEED, carSpeed));

    // Friction
    carSpeed *= Math.pow(FRICTION, delta * 60);

    // Stop if very slow
    if (Math.abs(carSpeed) < 0.01) carSpeed = 0;

    // Calculate new position
    const dx = Math.sin(carAngle) * carSpeed * delta;
    const dz = Math.cos(carAngle) * carSpeed * delta;

    const newPos = carPosition.clone();

    // Try X movement
    newPos.x = carPosition.x + dx;
    newPos.z = carPosition.z;
    if (checkCollision(newPos)) {
      carSpeed *= -0.3; // Bounce back
      newPos.x = carPosition.x;
    }

    // Try Z movement
    const testPos = newPos.clone();
    testPos.z = carPosition.z + dz;
    if (checkCollision(testPos)) {
      carSpeed *= -0.3;
      testPos.z = carPosition.z;
    }

    carPosition.x = newPos.x;
    carPosition.z = testPos.z;

    // Boundary clamp
    carPosition.x = Math.max(0.3, Math.min(mazeWorldSize - 0.3, carPosition.x));
    carPosition.z = Math.max(0.3, Math.min(mazeWorldSize - 0.3, carPosition.z));
  }

  // Update car model/placeholder
  const activeCar = carModel || placeholderCar;
  if (activeCar) {
    activeCar.position.x = carPosition.x;
    activeCar.position.z = carPosition.z;
    activeCar.rotation.y = carAngle;
  }

  // Star collection
  for (let i = 0; i < 3; i++) {
    if (!starCollected[i]) {
      const dist = Math.sqrt(
        (carPosition.x - starPositions[i].x) ** 2 +
        (carPosition.z - starPositions[i].z) ** 2
      );
      if (dist < 0.5) {
        starCollected[i] = true;
        scene.remove(starMeshes[i]);
        starsCollectedCount++;
      }
    }
  }

  // Animate remaining stars
  const t = clock.elapsedTime;
  for (let i = 0; i < 3; i++) {
    if (!starCollected[i]) {
      starMeshes[i].position.y = 0.4 + Math.sin(t * 3 + i) * 0.1;
      starMeshes[i].rotation.y = t * 2;
    }
  }

  // Goal pulse
  goalMesh.material.emissiveIntensity = 0.3 + Math.sin(t * 4) * 0.2;

  // Check completion
  if (!completed) {
    const distToGoal = Math.sqrt(
      (carPosition.x - goalX) ** 2 +
      (carPosition.z - goalZ) ** 2
    );
    if (distToGoal < 0.8) {
      completed = true;
      document.getElementById('message').style.display = 'block';
    }
  }

  // Update HUD
  document.getElementById('time').textContent = gameTime.toFixed(1);
  document.getElementById('stars').textContent = `${starsCollectedCount} / 3`;
  document.getElementById('speed').textContent = Math.abs(carSpeed).toFixed(1);
  document.getElementById('position').textContent = `(${carPosition.x.toFixed(1)}, ${carPosition.z.toFixed(1)})`;

  // Update state
  window.__3D_STATE__.time = parseFloat(gameTime.toFixed(1));
  window.__3D_STATE__.starsCollected = starsCollectedCount;
  window.__3D_STATE__.speed = parseFloat(Math.abs(carSpeed).toFixed(2));
  window.__3D_STATE__.position = { x: parseFloat(carPosition.x.toFixed(2)), z: parseFloat(carPosition.z.toFixed(2)) };
  window.__3D_STATE__.completed = completed;

  // Camera follows car from above
  const camOffsetY = mazeWorldSize * 0.9;
  const camOffsetZ = mazeWorldSize * 0.25;
  camera.position.set(
    carPosition.x,
    camOffsetY,
    carPosition.z + camOffsetZ
  );
  camera.lookAt(carPosition.x, 0, carPosition.z);

  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
