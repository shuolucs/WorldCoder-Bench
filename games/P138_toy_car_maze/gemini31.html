<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Car Maze</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 16px;
        }
        span.val {
            color: #00ff00;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>Time: <span id="time" class="val">0.0</span> s</div>
        <div>Stars: <span id="stars" class="val">0</span> / 3</div>
        <div>Speed: <span id="speed" class="val">0.0</span> m/s</div>
        <div>Pos: <span id="position" class="val">0.0, 0.0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            time: 0,
            starsCollected: 0,
            speed: 0,
            position: { x: 0, z: 0 },
            completed: false
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const aspect = window.innerWidth / window.innerHeight;
        const frustumSize = 36;
        const camera = new THREE.OrthographicCamera(
            frustumSize * aspect / -2, frustumSize * aspect / 2,
            frustumSize / 2, frustumSize / -2,
            1, 100
        );
        camera.position.set(0, 50, 0);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Maze Generation (DFS) ---
        const cols = 8, rows = 8;
        const cellSize = 4;
        const wallThick = 0.4;
        const wallHeight = 2;
        const startX = - (cols * cellSize) / 2 + cellSize / 2;
        const startZ = - (rows * cellSize) / 2 + cellSize / 2;

        const grid = Array.from({ length: rows }, (_, r) => 
            Array.from({ length: cols }, (_, c) => ({
                r, c, visited: false, walls: { top: true, right: true, bottom: true, left: true }
            }))
        );

        const stack = [];
        let current = grid[0][0];
        current.visited = true;

        while (true) {
            const neighbors = [];
            const { r, c } = current;
            if (r > 0 && !grid[r - 1][c].visited) neighbors.push({ cell: grid[r - 1][c], dir: 'top' });
            if (r < rows - 1 && !grid[r + 1][c].visited) neighbors.push({ cell: grid[r + 1][c], dir: 'bottom' });
            if (c > 0 && !grid[r][c - 1].visited) neighbors.push({ cell: grid[r][c - 1], dir: 'left' });
            if (c < cols - 1 && !grid[r][c + 1].visited) neighbors.push({ cell: grid[r][c + 1], dir: 'right' });

            if (neighbors.length > 0) {
                const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                stack.push(current);
                if (next.dir === 'top') { current.walls.top = false; next.cell.walls.bottom = false; }
                if (next.dir === 'bottom') { current.walls.bottom = false; next.cell.walls.top = false; }
                if (next.dir === 'left') { current.walls.left = false; next.cell.walls.right = false; }
                if (next.dir === 'right') { current.walls.right = false; next.cell.walls.left = false; }
                current = next.cell;
                current.visited = true;
            } else if (stack.length > 0) {
                current = stack.pop();
            } else {
                break;
            }
        }

        // --- Build Maze Meshes ---
        const wallGeo = new THREE.BoxGeometry(1, 1, 1);
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const wallAABBs = [];

        function addWall(x, z, w, d) {
            const mesh = new THREE.Mesh(wallGeo, wallMat);
            mesh.scale.set(w, wallHeight, d);
            mesh.position.set(x, wallHeight / 2, z);
            scene.add(mesh);
            const box = new THREE.Box3().setFromObject(mesh);
            wallAABBs.push(box);
        }

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const cell = grid[r][c];
                const cx = startX + c * cellSize;
                const cz = startZ + r * cellSize;
                
                if (cell.walls.top) addWall(cx, cz - cellSize / 2, cellSize + wallThick, wallThick);
                if (cell.walls.left) addWall(cx - cellSize / 2, cz, wallThick, cellSize + wallThick);
                if (r === rows - 1 && cell.walls.bottom) addWall(cx, cz + cellSize / 2, cellSize + wallThick, wallThick);
                if (c === cols - 1 && cell.walls.right) addWall(cx + cellSize / 2, cz, wallThick, cellSize + wallThick);
            }
        }

        // Ground
        const groundGeo = new THREE.PlaneGeometry(cols * cellSize, rows * cellSize);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0xcccccc });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // End Point
        const endX = startX + (cols - 1) * cellSize;
        const endZ = startZ + (rows - 1) * cellSize;
        const endGeo = new THREE.BoxGeometry(cellSize - 1, 0.1, cellSize - 1);
        const endMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
        const endMesh = new THREE.Mesh(endGeo, endMat);
        endMesh.position.set(endX, 0.05, endZ);
        scene.add(endMesh);

        // --- Collectibles (Stars) ---
        const stars = [];
        const starGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const starMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        
        const availableCells = [];
        for(let r=0; r<rows; r++) {
            for(let c=0; c<cols; c++) {
                if((r===0 && c===0) || (r===rows-1 && c===cols-1)) continue;
                availableCells.push({r, c});
            }
        }
        
        for(let i=0; i<3; i++) {
            const idx = Math.floor(Math.random() * availableCells.length);
            const cell = availableCells.splice(idx, 1)[0];
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set(startX + cell.c * cellSize, 0.5, startZ + cell.r * cellSize);
            scene.add(star);
            stars.push(star);
        }

        // --- Car Setup ---
        const carGroup = new THREE.Group();
        carGroup.position.set(startX, 0, startZ);
        scene.add(carGroup);

        // Fallback box
        const fallbackGeo = new THREE.BoxGeometry(1.2, 0.8, 2);
        const fallbackMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.position.y = 0.4;
        carGroup.add(fallbackMesh);

        const loader = new GLTFLoader();
        loader.load('assets/ToyCar.glb', (gltf) => {
            carGroup.remove(fallbackMesh);
            const model = gltf.scene;
            // Auto scale to fit roughly 1.5 units
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            model.scale.setScalar(1.5 / maxDim);
            model.position.y = 0.1;
            carGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, () => {
            // Keep fallback if load fails
            window.__3D_STATE__.modelLoaded = false;
        });

        // --- Physics & Controls ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        window.addEventListener('keydown', e => { if(keys.hasOwnProperty(e.code)) keys[e.code] = true; });
        window.addEventListener('keyup', e => { if(keys.hasOwnProperty(e.code)) keys[e.code] = false; });

        let speed = 0;
        let angle = 0;
        const acc = 3;
        const maxSpeed = 8;
        const friction = 0.95;
        const carAABB = new THREE.Box3();
        const carSize = new THREE.Vector3(1.2, 1, 1.2);

        const clock = new THREE.Clock();

        // --- DOM Elements ---
        const elTime = document.getElementById('time');
        const elStars = document.getElementById('stars');
        const elSpeed = document.getElementById('speed');
        const elPosition = document.getElementById('position');

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);

            if (!window.__3D_STATE__.completed) {
                window.__3D_STATE__.time += dt;

                // Input
                if (keys.ArrowUp) speed += acc * dt;
                if (keys.ArrowDown) speed -= acc * dt;

                // Steering
                if (Math.abs(speed) > 0.1) {
                    const turnSpeed = 2.5 * dt;
                    const dir = speed > 0 ? 1 : -1;
                    if (keys.ArrowLeft) angle += turnSpeed * dir;
                    if (keys.ArrowRight) angle -= turnSpeed * dir;
                }

                // Physics
                speed = Math.max(-maxSpeed, Math.min(maxSpeed, speed));
                speed *= Math.pow(friction, dt * 60);

                const vx = Math.sin(angle) * speed;
                const vz = Math.cos(angle) * speed;

                const nextPos = carGroup.position.clone();
                nextPos.x += vx * dt;
                nextPos.z += vz * dt;

                // Collision
                carAABB.setFromCenterAndSize(new THREE.Vector3(nextPos.x, 0.5, nextPos.z), carSize);
                let collision = false;
                for (let wallBox of wallAABBs) {
                    if (carAABB.intersectsBox(wallBox)) {
                        collision = true;
                        break;
                    }
                }

                if (collision) {
                    speed = -speed * 0.5;
                } else {
                    carGroup.position.copy(nextPos);
                }
                carGroup.rotation.y = angle;

                // Collectibles
                for (let i = stars.length - 1; i >= 0; i--) {
                    const star = stars[i];
                    // Calculate distance ignoring Y axis
                    const dx = carGroup.position.x - star.position.x;
                    const dz = carGroup.position.z - star.position.z;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    
                    if (dist < 0.5) {
                        scene.remove(star);
                        stars.splice(i, 1);
                        window.__3D_STATE__.starsCollected++;
                    }
                }

                // End condition
                const distToEnd = Math.sqrt(
                    Math.pow(carGroup.position.x - endX, 2) + 
                    Math.pow(carGroup.position.z - endZ, 2)
                );
                if (distToEnd < cellSize / 2) {
                    window.__3D_STATE__.completed = true;
                }
            }

            // Update State
            window.__3D_STATE__.speed = speed;
            window.__3D_STATE__.position.x = carGroup.position.x;
            window.__3D_STATE__.position.z = carGroup.position.z;

            // Update HUD
            elTime.innerText = window.__3D_STATE__.time.toFixed(1);
            elStars.innerText = window.__3D_STATE__.starsCollected;
            elSpeed.innerText = Math.abs(speed).toFixed(1);
            elPosition.innerText = `${carGroup.position.x.toFixed(1)}, ${carGroup.position.z.toFixed(1)}`;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
