<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Circuit Builder</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#infoPanel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.85);
    color: #00ff88;
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    border: 1px solid #00ff8844;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
    z-index: 10;
}

#infoPanel h2 {
    color: #ffffff;
    margin-bottom: 10px;
    font-size: 18px;
    border-bottom: 1px solid #00ff8844;
    padding-bottom: 8px;
}

#infoPanel .label {
    color: #88aacc;
}

#infoPanel .value {
    color: #00ff88;
    font-weight: bold;
    font-family: 'Courier New', monospace;
}

#infoPanel .led-on {
    color: #ff4444;
    text-shadow: 0 0 10px #ff4444;
}

#infoPanel .led-off {
    color: #666666;
}

#instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.85);
    color: #cccccc;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 13px;
    text-align: center;
    border: 1px solid #444;
    z-index: 10;
}

#instructions span {
    margin: 0 12px;
}

#instructions kbd {
    background: #333;
    border: 1px solid #555;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: monospace;
    color: #00ff88;
}

#sliderPanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.85);
    color: #ffcc00;
    padding: 20px;
    border-radius: 12px;
    font-size: 14px;
    border: 1px solid #ffcc0044;
    box-shadow: 0 0 20px rgba(255, 204, 0, 0.1);
    display: none;
    z-index: 10;
}

#sliderPanel h3 {
    margin-bottom: 10px;
    color: #ffffff;
}

#voltageSlider {
    width: 200px;
    -webkit-appearance: none;
    appearance: none;
    height: 8px;
    border-radius: 4px;
    background: #333;
    outline: none;
}

#voltageSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffcc00;
    cursor: pointer;
}

#voltageLabel {
    display: block;
    margin-top: 8px;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    color: #ffcc00;
}

#selectedInfo {
    position: absolute;
    top: 50%;
    right: 20px;
    transform: translateY(-50%);
    background: rgba(0, 0, 0, 0.85);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid #5588ff44;
    display: none;
    z-index: 10;
    min-width: 180px;
}

#selectedInfo h3 {
    color: #5588ff;
    margin-bottom: 8px;
}

#notification {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 255, 136, 0.9);
    color: #000;
    padding: 15px 30px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: bold;
    display: none;
    z-index: 20;
    animation: fadeOut 2s forwards;
}

@keyframes fadeOut {
    0% { opacity: 1; }
    70% { opacity: 1; }
    100% { opacity: 0; }
}
</style>
</head>
<body>

<div id="infoPanel">
    <h2>⚡ Circuit Builder</h2>
    <div><span class="label">Level:</span> <span class="value" id="levelDisplay">1 - Series</span></div>
    <div><span class="label">Total Resistance:</span> <span class="value" id="resistanceDisplay">-- Ω</span></div>
    <div><span class="label">Current:</span> <span class="value" id="currentDisplay">-- A</span></div>
    <div><span class="label">Battery Voltage:</span> <span class="value" id="voltageDisplay">9 V</span></div>
    <div><span class="label">LED Status:</span> <span id="ledStatus" class="led-off">● OFF</span></div>
    <div><span class="label">Connected:</span> <span class="value" id="connectedDisplay">None</span></div>
</div>

<div id="sliderPanel">
    <h3>🔋 Battery Voltage</h3>
    <input type="range" id="voltageSlider" min="1" max="12" step="0.1" value="9">
    <label id="voltageLabel">9.0 V</label>
</div>

<div id="selectedInfo">
    <h3 id="selectedName">No Selection</h3>
    <div id="selectedDetails"></div>
</div>

<div id="instructions">
    <span><kbd>Click</kbd> Select</span>
    <span><kbd>C</kbd> Connect</span>
    <span><kbd>N</kbd> Next Level</span>
    <span><kbd>R</kbd> Reset</span>
</div>

<div id="notification"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// State Management
window.__3D_STATE__ = {
    level: 1,
    circuitComplete: false,
    batteryVoltage: 9,
    resistanceR1: 100,
    resistanceR2: 200,
    totalResistance: 0,
    currentAmps: 0,
    ledOn: false,
    selectedComponent: null,
    connectedComponents: [],
    ledForwardVoltage: 2,
    componentsCount: 4
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 25, 50);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 18, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 15, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -15;
directionalLight.shadow.camera.right = 15;
directionalLight.shadow.camera.top = 15;
directionalLight.shadow.camera.bottom = -15;
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x4488ff, 0.3, 30);
pointLight.position.set(-5, 8, -5);
scene.add(pointLight);

// Workbench
const workbenchGeom = new THREE.BoxGeometry(20, 0.3, 20);
const workbenchMat = new THREE.MeshStandardMaterial({ 
    color: 0x2a2a3a,
    roughness: 0.8,
    metalness: 0.2
});
const workbench = new THREE.Mesh(workbenchGeom, workbenchMat);
workbench.position.y = -0.15;
workbench.receiveShadow = true;
scene.add(workbench);

// Grid lines on workbench
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Edge border for workbench
const edgeGeom = new THREE.EdgesGeometry(new THREE.BoxGeometry(20, 0.3, 20));
const edgeMat = new THREE.LineBasicMaterial({ color: 0x5588ff, linewidth: 1 });
const edgeLines = new THREE.LineSegments(edgeGeom, edgeMat);
edgeLines.position.y = -0.15;
scene.add(edgeLines);

// Component storage
const components = {};
const componentMeshes = [];
const wires = [];
let ledGlowLight = null;

// Positions
const unconnectedPositions = {
    battery: new THREE.Vector3(-7, 0, 3),
    r1: new THREE.Vector3(-7, 0, 0),
    r2: new THREE.Vector3(-7, 0, -3),
    led: new THREE.Vector3(-7, 0, -6)
};

const connectedPositionsL1 = {
    battery: new THREE.Vector3(-4, 0, 0),
    r1: new THREE.Vector3(0, 0, 0),
    led: new THREE.Vector3(4, 0, 0)
};

const connectedPositionsL2 = {
    battery: new THREE.Vector3(-5, 0, 0),
    r1: new THREE.Vector3(0, 0, -2),
    r2: new THREE.Vector3(0, 0, 2),
    led: new THREE.Vector3(5, 0, 0)
};

// Create Battery
function createBattery() {
    const group = new THREE.Group();
    group.userData = { name: 'battery', type: 'battery' };

    // Main body
    const bodyGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0xffcc00,
        roughness: 0.3,
        metalness: 0.5,
        emissive: 0x332200,
        emissiveIntensity: 0.2
    });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.4;
    body.castShadow = true;
    group.add(body);

    // Positive terminal
    const termGeom = new THREE.CylinderGeometry(0.15, 0.15, 0.15, 8);
    const termMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
    const posTerm = new THREE.Mesh(termGeom, termMat);
    posTerm.position.y = 0.88;
    group.add(posTerm);

    // Negative terminal
    const negTerm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 0.05, 8),
        new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 })
    );
    negTerm.position.y = 0.02;
    group.add(negTerm);

    // + label
    const plusGeom = new THREE.BoxGeometry(0.15, 0.02, 0.05);
    const plusMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const plusH = new THREE.Mesh(plusGeom, plusMat);
    plusH.position.set(0.42, 0.6, 0);
    group.add(plusH);
    const plusV = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.02, 0.15), plusMat);
    plusV.position.set(0.42, 0.6, 0);
    group.add(plusV);

    // Label text indicator
    const labelGeom = new THREE.BoxGeometry(0.5, 0.01, 0.2);
    const labelMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    const label = new THREE.Mesh(labelGeom, labelMat);
    label.position.set(0, 0.4, 0.41);
    group.add(label);

    group.position.copy(unconnectedPositions.battery);
    scene.add(group);
    components.battery = group;
    componentMeshes.push(group);
    return group;
}

// Create Resistor
function createResistor(name, resistance, position) {
    const group = new THREE.Group();
    group.userData = { name: name, type: 'resistor', resistance: resistance };

    // Body
    const bodyGeom = new THREE.BoxGeometry(1.0, 0.3, 0.3);
    const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0xc4a882,
        roughness: 0.7,
        metalness: 0.1
    });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.15;
    body.castShadow = true;
    group.add(body);

    // Color bands
    const bandColors = name === 'r1' ? [0x8B4513, 0x000000, 0x8B4513, 0xFFD700] : [0xFF0000, 0x000000, 0x8B4513, 0xFFD700];
    const bandWidth = 0.06;
    for (let i = 0; i < 4; i++) {
        const bandGeom = new THREE.BoxGeometry(bandWidth, 0.32, 0.32);
        const bandMat = new THREE.MeshStandardMaterial({ color: bandColors[i] });
        const band = new THREE.Mesh(bandGeom, bandMat);
        band.position.set(-0.3 + i * 0.2, 0.15, 0);
        group.add(band);
    }

    // Wire leads
    const leadGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6);
    const leadMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const leadL = new THREE.Mesh(leadGeom, leadMat);
    leadL.rotation.z = Math.PI / 2;
    leadL.position.set(-0.65, 0.15, 0);
    group.add(leadL);
    const leadR = new THREE.Mesh(leadGeom, leadMat);
    leadR.rotation.z = Math.PI / 2;
    leadR.position.set(0.65, 0.15, 0);
    group.add(leadR);

    group.position.copy(position);
    scene.add(group);
    components[name] = group;
    componentMeshes.push(group);
    return group;
}

// Create LED
function createLED() {
    const group = new THREE.Group();
    group.userData = { name: 'led', type: 'led' };

    // Dome
    const domeGeom = new THREE.SphereGeometry(0.25, 16, 16, 0, Math.PI * 2, 0, Math.PI / 2);
    const domeMat = new THREE.MeshStandardMaterial({ 
        color: 0xff0000,
        transparent: true,
        opacity: 0.8,
        roughness: 0.2,
        metalness: 0.1,
        emissive: 0x000000,
        emissiveIntensity: 0
    });
    const dome = new THREE.Mesh(domeGeom, domeMat);
    dome.position.y = 0.15;
    dome.castShadow = true;
    group.add(dome);

    // Base
    const baseGeom = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 16);
    const baseMat = new THREE.MeshStandardMaterial({ 
        color: 0xcc0000,
        roughness: 0.5
    });
    const base = new THREE.Mesh(baseGeom, baseMat);
    base.position.y = 0.075;
    group.add(base);

    // Legs
    const legGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const legL = new THREE.Mesh(legGeom, legMat);
    legL.position.set(-0.1, -0.1, 0);
    group.add(legL);
    const legR = new THREE.Mesh(legGeom, legMat);
    legR.position.set(0.1, -0.1, 0);
    legR.scale.y = 0.8;
    group.add(legR);

    // Glow light (initially off)
    ledGlowLight = new THREE.PointLight(0xff0000, 0, 5);
    ledGlowLight.position.y = 0.4;
    group.add(ledGlowLight);

    group.position.copy(unconnectedPositions.led);
    scene.add(group);
    components.led = group;
    componentMeshes.push(group);
    return group;
}

// Create wire between two points
function createWire(start, end) {
    const direction = new THREE.Vector3().subVectors(end, start);
    const length = direction.length();
    const midpoint = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

    const wireGeom = new THREE.CylinderGeometry(0.03, 0.03, length, 6);
    const wireMat = new THREE.MeshStandardMaterial({ 
        color: 0x888888,
        metalness: 0.8,
        roughness: 0.3
    });
    const wire = new THREE.Mesh(wireGeom, wireMat);
    wire.position.copy(midpoint);
    wire.position.y = 0.15;

    // Orient wire
    const axis = new THREE.Vector3(0, 1, 0);
    const quaternion = new THREE.Quaternion();
    const dir = direction.clone().normalize();
    quaternion.setFromUnitVectors(axis, dir);
    wire.quaternion.copy(quaternion);

    wire.castShadow = true;
    scene.add(wire);
    wires.push(wire);
    return wire;
}

// Clear all wires
function clearWires() {
    wires.forEach(w => scene.remove(w));
    wires.length = 0;
}

// Initialize components
createBattery();
createResistor('r1', 100, unconnectedPositions.r1);
createResistor('r2', 200, unconnectedPositions.r2);
createLED();

// Selection highlight
let highlightOutline = null;

function highlightComponent(comp) {
    removeHighlight();
    if (!comp) return;

    const box = new THREE.Box3().setFromObject(comp);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    const outlineGeom = new THREE.BoxGeometry(size.x + 0.2, size.y + 0.2, size.z + 0.2);
    const outlineMat = new THREE.MeshBasicMaterial({ 
        color: 0x5588ff,
        wireframe: true,
        transparent: true,
        opacity: 0.8
    });
    highlightOutline = new THREE.Mesh(outlineGeom, outlineMat);
    highlightOutline.position.copy(center);
    scene.add(highlightOutline);
}

function removeHighlight() {
    if (highlightOutline) {
        scene.remove(highlightOutline);
        highlightOutline = null;
    }
}

// Calculate circuit
function calculateCircuit() {
    const s = state;

    if (!s.circuitComplete) {
        s.totalResistance = 0;
        s.currentAmps = 0;
        s.ledOn = false;
        updateLEDVisual(false);
        updateHUD();
        return;
    }

    if (s.level === 1) {
        s.totalResistance = s.resistanceR1;
    } else if (s.level === 2 || s.level === 3) {
        s.totalResistance = Math.round(((s.resistanceR1 * s.resistanceR2) / (s.resistanceR1 + s.resistanceR2)) * 100) / 100;
    }

    const effectiveVoltage = s.batteryVoltage - s.ledForwardVoltage;

    if (effectiveVoltage <= 0 || s.totalResistance <= 0) {
        s.currentAmps = 0;
        s.ledOn = false;
    } else {
        s.currentAmps = Math.round((effectiveVoltage / s.totalResistance) * 10000) / 10000;
        s.currentAmps = Math.max(0, s.currentAmps);
        s.ledOn = s.currentAmps >= 0.01;
    }

    // Safety checks
    if (!isFinite(s.currentAmps) || isNaN(s.currentAmps)) {
        s.currentAmps = 0;
        s.ledOn = false;
    }
    if (!isFinite(s.totalResistance) || isNaN(s.totalResistance)) {
        s.totalResistance = 0;
    }

    updateLEDVisual(s.ledOn);
    updateHUD();
}

// Update LED visual
function updateLEDVisual(on) {
    const ledGroup = components.led;
    if (!ledGroup) return;

    const dome = ledGroup.children[0];
    if (on) {
        dome.material.emissive.setHex(0xff0000);
        dome.material.emissiveIntensity = 1.5;
        dome.material.opacity = 1.0;
        if (ledGlowLight) {
            ledGlowLight.intensity = 2;
            ledGlowLight.distance = 8;
        }
    } else {
        dome.material.emissive.setHex(0x000000);
        dome.material.emissiveIntensity = 0;
        dome.material.opacity = 0.8;
        if (ledGlowLight) {
            ledGlowLight.intensity = 0;
        }
    }
}

// Update HUD
function updateHUD() {
    const s = state;
    const levelNames = { 1: '1 - Series', 2: '2 - Parallel', 3: '3 - Variable' };
    document.getElementById('levelDisplay').textContent = levelNames[s.level] || s.level;
    document.getElementById('resistanceDisplay').textContent = s.circuitComplete ? s.totalResistance.toFixed(2) + ' Ω' : '-- Ω';
    document.getElementById('currentDisplay').textContent = s.circuitComplete ? s.currentAmps.toFixed(4) + ' A' : '-- A';
    document.getElementById('voltageDisplay').textContent = s.batteryVoltage.toFixed(1) + ' V';

    const ledStatusEl = document.getElementById('ledStatus');
    if (s.ledOn) {
        ledStatusEl.textContent = '● ON';
        ledStatusEl.className = 'led-on';
    } else {
        ledStatusEl.textContent = '● OFF';
        ledStatusEl.className = 'led-off';
    }

    document.getElementById('connectedDisplay').textContent = s.connectedComponents.length > 0 ? s.connectedComponents.join(' → ') : 'None';
}

// Show notification
function showNotification(text) {
    const el = document.getElementById('notification');
    el.textContent = text;
    el.style.display = 'block';
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = 'fadeOut 2s forwards';
    setTimeout(() => { el.style.display = 'none'; }, 2000);
}

// Update selected info panel
function updateSelectedInfo() {
    const panel = document.getElementById('selectedInfo');
    const nameEl = document.getElementById('selectedName');
    const detailsEl = document.getElementById('selectedDetails');

    if (!state.selectedComponent) {
        panel.style.display = 'none';
        return;
    }

    panel.style.display = 'block';
    const comp = state.selectedComponent;

    const names = {
        battery: '🔋 Battery',
        r1: '📦 Resistor R1',
        r2: '📦 Resistor R2',
        led: '💡 LED'
    };

    nameEl.textContent = names[comp] || comp;

    let details = '';
    if (comp === 'battery') {
        details = `<div>Voltage: ${state.batteryVoltage}V</div><div>Type: DC Source</div>`;
    } else if (comp === 'r1') {
        details = `<div>Resistance: ${state.resistanceR1}Ω</div><div>Tolerance: ±5%</div>`;
    } else if (comp === 'r2') {
        details = `<div>Resistance: ${state.resistanceR2}Ω</div><div>Tolerance: ±5%</div>`;
    } else if (comp === 'led') {
        details = `<div>Forward Voltage: ${state.ledForwardVoltage}V</div><div>Min Current: 0.01A</div><div>Color: Red</div>`;
    }

    const connected = state.connectedComponents.includes(comp);
    details += `<div style="margin-top:8px;color:${connected ? '#00ff88' : '#ff8844'}">${connected ? '✓ Connected' : '○ Not Connected'}</div>`;

    detailsEl.innerHTML = details;
}

// Animate component to position
function animateComponentTo(comp, targetPos, duration) {
    const startPos = comp.position.clone();
    const startTime = Date.now();

    function animate() {
        const elapsed = Date.now() - startTime;
        const t = Math.min(elapsed / duration, 1);
        const ease = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

        comp.position.lerpVectors(startPos, targetPos, ease);

        if (t < 1) {
            requestAnimationFrame(animate);
        }
    }
    animate();
}

// Build wires for current level
function buildWires() {
    clearWires();

    if (state.level === 1) {
        const connected = state.connectedComponents;
        const positions = connectedPositionsL1;

        if (connected.includes('battery') && connected.includes('r1')) {
            createWire(
                new THREE.Vector3(positions.battery.x + 0.5, 0, positions.battery.z),
                new THREE.Vector3(positions.r1.x - 0.7, 0, positions.r1.z)
            );
        }
        if (connected.includes('r1') && connected.includes('led')) {
            createWire(
                new THREE.Vector3(positions.r1.x + 0.7, 0, positions.r1.z),
                new THREE.Vector3(positions.led.x - 0.3, 0, positions.led.z)
            );
            // Return wire from LED to battery
            createWire(
                new THREE.Vector3(positions.led.x + 0.3, 0, positions.led.z),
                new THREE.Vector3(positions.led.x + 0.3, 0, positions.led.z + 2)
            );
            createWire(
                new THREE.Vector3(positions.led.x + 0.3, 0, positions.led.z + 2),
                new THREE.Vector3(positions.battery.x - 0.5, 0, positions.battery.z + 2)
            );
            createWire(
                new THREE.Vector3(positions.battery.x - 0.5, 0, positions.battery.z + 2),
                new THREE.Vector3(positions.battery.x - 0.5, 0, positions.battery.z)
            );
        }
    } else if (state.level === 2 || state.level === 3) {
        const connected = state.connectedComponents;
        const positions = connectedPositionsL2;

        if (connected.includes('battery')) {
            // Battery to split point
            createWire(
                new THREE.Vector3(positions.battery.x + 0.5, 0, positions.battery.z),
                new THREE.Vector3(-2, 0, 0)
            );
        }
        if (connected.includes('r1')) {
            // Split to R1
            createWire(
                new THREE.Vector3(-2, 0, 0),
                new THREE.Vector3(-2, 0, positions.r1.z)
            );
            createWire(
                new THREE.Vector3(-2, 0, positions.r1.z),
                new THREE.Vector3(positions.r1.x - 0.7, 0, positions.r1.z)
            );
            // R1 to merge
            createWire(
                new THREE.Vector3(positions.r1.x + 0.7, 0, positions.r1.z),
                new THREE.Vector3(2, 0, positions.r1.z)
            );
            createWire(
                new THREE.Vector3(2, 0, positions.r1.z),
                new THREE.Vector3(2, 0, 0)
            );
        }
        if (connected.includes('r2')) {
            // Split to R2
            createWire(
                new THREE.Vector3(-2, 0, 0),
                new THREE.Vector3(-2, 0, positions.r2.z)
            );
            createWire(
                new THREE.Vector3(-2, 0, positions.r2.z),
                new THREE.Vector3(positions.r2.x - 0.7, 0, positions.r2.z)
            );
            // R2 to merge
            createWire(
                new THREE.Vector3(positions.r2.x + 0.7, 0, positions.r2.z),
                new THREE.Vector3(2, 0, positions.r2.z)
            );
            createWire(
                new THREE.Vector3(2, 0, positions.r2.z),
                new THREE.Vector3(2, 0, 0)
            );
        }
        if (connected.includes('led')) {
            // Merge to LED
            createWire(
                new THREE.Vector3(2, 0, 0),
                new THREE.Vector3(positions.led.x - 0.3, 0, positions.led.z)
            );
            // Return wire
            createWire(
                new THREE.Vector3(positions.led.x + 0.3, 0, positions.led.z),
                new THREE.Vector3(positions.led.x + 0.3, 0, 3.5)
            );
            createWire(
                new THREE.Vector3(positions.led.x + 0.3, 0, 3.5),
                new THREE.Vector3(positions.battery.x - 0.5, 0, 3.5)
            );
            createWire(
                new THREE.Vector3(positions.battery.x - 0.5, 0, 3.5),
                new THREE.Vector3(positions.battery.x - 0.5, 0, positions.battery.z)
            );
        }
    }
}

// Connect component
function connectComponent() {
    if (!state.selectedComponent) {
        showNotification('Select a component first!');
        return;
    }

    const comp = state.selectedComponent;

    if (state.connectedComponents.includes(comp)) {
        showNotification(comp + ' is already connected!');
        return;
    }

    // Check connection order
    if (state.level === 1) {
        const order = ['battery', 'r1', 'led'];
        const nextIndex = state.connectedComponents.length;
        if (nextIndex >= order.length) {
            showNotification('Circuit is complete!');
            return;
        }
        if (comp !== order[nextIndex]) {
            showNotification('Connect ' + order[nextIndex] + ' first!');
            return;
        }

        state.connectedComponents.push(comp);
        animateComponentTo(components[comp], connectedPositionsL1[comp], 500);

        if (state.connectedComponents.length === order.length) {
            state.circuitComplete = true;
            showNotification('🎉 Level 1 Complete! Press N for next level.');
        } else {
            showNotification(comp + ' connected! Next: ' + order[nextIndex + 1]);
        }
    } else if (state.level === 2 || state.level === 3) {
        const order = ['battery', 'r1', 'r2', 'led'];
        const nextIndex = state.connectedComponents.length;
        if (nextIndex >= order.length) {
            showNotification('Circuit is complete!');
            return;
        }
        if (comp !== order[nextIndex]) {
            showNotification('Connect ' + order[nextIndex] + ' first!');
            return;
        }

        state.connectedComponents.push(comp);
        animateComponentTo(components[comp], connectedPositionsL2[comp], 500);

        if (state.connectedComponents.length === order.length) {
            state.circuitComplete = true;
            if (state.level === 2) {
                showNotification('🎉 Level 2 Complete! Press N for next level.');
            } else {
                showNotification('🎉 Level 3 Complete! Adjust voltage with slider.');
            }
        } else {
            showNotification(comp + ' connected! Next: ' + order[nextIndex + 1]);
        }
    }

    setTimeout(() => {
        buildWires();
        calculateCircuit();
    }, 550);

    updateSelectedInfo();
}

// Reset circuit
function resetCircuit() {
    state.level = 1;
    state.circuitComplete = false;
    state.batteryVoltage = 9;
    state.totalResistance = 0;
    state.currentAmps = 0;
    state.ledOn = false;
    state.selectedComponent = null;
    state.connectedComponents = [];
    state.componentsCount = 4;

    removeHighlight();
    clearWires();

    // Move all components back
    Object.keys(components).forEach(name => {
        animateComponentTo(components[name], unconnectedPositions[name], 500);
    });

    // Hide R2 visibility for level 1
    components.r2.visible = true;

    // Reset slider
    document.getElementById('sliderPanel').style.display = 'none';
    document.getElementById('voltageSlider').value = 9;
    document.getElementById('voltageLabel').textContent = '9.0 V';

    updateLEDVisual(false);
    updateHUD();
    updateSelectedInfo();
    showNotification('Circuit Reset! Level 1');
}

// Next level
function nextLevel() {
    if (!state.circuitComplete) {
        showNotification('Complete current circuit first!');
        return;
    }

    if (state.level >= 3) {
        showNotification('You\'ve completed all levels!');
        return;
    }

    state.level++;
    state.circuitComplete = false;
    state.connectedComponents = [];
    state.selectedComponent = null;
    state.totalResistance = 0;
    state.currentAmps = 0;
    state.ledOn = false;

    removeHighlight();
    clearWires();
    updateLEDVisual(false);

    // Move all components back to unconnected positions
    Object.keys(components).forEach(name => {
        animateComponentTo(components[name], unconnectedPositions[name], 500);
    });

    if (state.level === 2) {
        state.componentsCount = 4;
        components.r2.visible = true;
        showNotification('Level 2: Parallel Circuit! Connect all 4 components.');
    } else if (state.level === 3) {
        state.componentsCount = 4;
        components.r2.visible = true;
        document.getElementById('sliderPanel').style.display = 'block';
        showNotification('Level 3: Variable Voltage! Use the slider.');
    }

    updateHUD();
    updateSelectedInfo();
}

// Raycaster for selection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check all component groups
    let found = false;
    for (const name of Object.keys(components)) {
        const comp = components[name];
        if (!comp.visible) continue;

        // Level 1 doesn't use R2
        if (state.level === 1 && name === 'r2') continue;

        const intersects = raycaster.intersectObjects(comp.children, true);
        if (intersects.length > 0) {
            state.selectedComponent = name;
            highlightComponent(comp);
            updateSelectedInfo();
            found = true;
            break;
        }
    }

    if (!found) {
        state.selectedComponent = null;
        removeHighlight();
        updateSelectedInfo();
    }
}

// Keyboard controls
function onKeyDown(event) {
    const key = event.key.toLowerCase();

    if (key === 'c') {
        connectComponent();
    } else if (key === 'n') {
        nextLevel();
    } else if (key === 'r') {
        resetCircuit();
    }
}

// Voltage slider
document.getElementById('voltageSlider').addEventListener('input', function(e) {
    if (state.level !== 3) return;
    state.batteryVoltage = parseFloat(e.target.value);
    document.getElementById('voltageLabel').textContent = state.batteryVoltage.toFixed(1) + ' V';

    // Update battery color based on voltage
    const batteryBody = components.battery.children[0];
    const intensity = state.batteryVoltage / 12;
    batteryBody.material.emissiveIntensity = 0.1 + intensity * 0.5;

    calculateCircuit();
});

// Event listeners
window.addEventListener('click', onMouseClick);
window.addEventListener('keydown', onKeyDown);
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Simple camera orbit with mouse drag
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
let cameraAngle = { theta: 0, phi: Math.PI / 4 };
let cameraDistance = 22;

renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button === 2) {
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
    }
});

renderer.domElement.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const deltaX = e.clientX - previousMousePosition.x;
    const deltaY = e.clientY - previousMousePosition.y;

    cameraAngle.theta -= deltaX * 0.005;
    cameraAngle.phi = Math.max(0.2, Math.min(Math.PI / 2.2, cameraAngle.phi - deltaY * 0.005));

    previousMousePosition = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

renderer.domElement.addEventListener('wheel', (e) => {
    cameraDistance = Math.max(10, Math.min(40, cameraDistance + e.deltaY * 0.02));
});

// Animation loop
let time = 0;

function animate() {
    requestAnimationFrame(animate);
    time += 0.016;

    // Update camera position
    camera.position.x = cameraDistance * Math.sin(cameraAngle.theta) * Math.sin(cameraAngle.phi);
    camera.position.y = cameraDistance * Math.cos(cameraAngle.phi);
    camera.position.z = cameraDistance * Math.cos(cameraAngle.theta) * Math.sin(cameraAngle.phi);
    camera.lookAt(0, 0, 0);

    // Animate highlight
    if (highlightOutline) {
        highlightOutline.material.opacity = 0.4 + Math.sin(time * 4) * 0.3;
        highlightOutline.rotation.y += 0.02;
    }

    // LED pulsing when on
    if (state.ledOn && components.led) {
        const dome = components.led.children[0];
        const pulse = 1.0 + Math.sin(time * 6) * 0.3;
        dome.material.emissiveIntensity = pulse;
        if (ledGlowLight) {
            ledGlowLight.intensity = 1.5 + Math.sin(time * 6) * 0.5;
        }
    }

    // Subtle battery glow
    if (components.battery) {
        const body = components.battery.children[0];
        body.material.emissiveIntensity = 0.15 + Math.sin(time * 2) * 0.05;
    }

    renderer.render(scene, camera);
}

// Initial setup
updateHUD();
animate();
</script>
