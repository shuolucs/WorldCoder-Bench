<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Circuit Builder</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
    }

    canvas {
      display: block;
    }

    #infoPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.72);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      min-width: 220px;
      z-index: 10;
    }

    #instructions {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.8);
      padding: 10px 14px;
      font-size: 14px;
      text-align: center;
      z-index: 10;
    }

    #sliderPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.72);
      padding: 12px 14px;
      border-radius: 8px;
      display: none;
      z-index: 10;
    }

    #sliderPanel label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    #voltageSlider {
      width: 220px;
    }
  </style>
</head>
<body>
  <div id="infoPanel"></div>

  <div id="sliderPanel">
    <label for="voltageSlider">Battery Voltage: <span id="voltageValue">9V</span></label>
    <input id="voltageSlider" type="range" min="1" max="12" step="0.1" value="9" />
  </div>

  <div id="instructions">
    Click a component to select it. Press <b>C</b> to connect selected component. Press <b>N</b> for next level when complete. Press <b>R</b> to reset.
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script>
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 14, 14);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(0, 10, 0);
    scene.add(directionalLight);

    const workbench = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x2d4a2d, side: THREE.DoubleSide })
    );
    workbench.rotation.x = -Math.PI / 2;
    workbench.position.y = 0;
    scene.add(workbench);

    const grid = new THREE.GridHelper(20, 20, 0x88aa88, 0x446644);
    grid.position.y = 0.01;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const infoPanel = document.getElementById('infoPanel');
    const sliderPanel = document.getElementById('sliderPanel');
    const voltageSlider = document.getElementById('voltageSlider');
    const voltageValue = document.getElementById('voltageValue');

    const LED_FORWARD_VOLTAGE = 2;
    const LED_THRESHOLD = 0.01;

    const state = {
      level: 1,
      circuitComplete: false,
      batteryVoltage: 9,
      resistanceR1: 100,
      resistanceR2: 200,
      totalResistance: 0,
      currentAmps: 0,
      ledOn: false,
      selectedComponent: null,
      connectedComponents: [],
      ledForwardVoltage: LED_FORWARD_VOLTAGE,
      componentsCount: 4
    };

    window.__3D_STATE__ = state;

    const components = {};
    const selectable = [];
    const wireGroup = new THREE.Group();
    scene.add(wireGroup);

    function createBattery() {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.4, 0.8, 32),
        new THREE.MeshStandardMaterial({ color: 0xffdd33 })
      );
      body.rotation.z = Math.PI / 2;
      group.add(body);

      const cap1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.1, 0.1, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0xcccccc })
      );
      cap1.position.set(0.44, 0, 0);
      cap1.rotation.z = Math.PI / 2;
      group.add(cap1);

      const cap2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07, 0.07, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0x999999 })
      );
      cap2.position.set(-0.44, 0, 0);
      cap2.rotation.z = Math.PI / 2;
      group.add(cap2);

      group.position.set(-7, 0.4, -3);
      group.userData = { name: 'battery', baseColor: 0xffdd33 };
      scene.add(group);
      components.battery = group;
      selectable.push(group);
    }

    function createResistor(name, x, z) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.0, 0.3, 0.3),
        new THREE.MeshStandardMaterial({ color: 0xc79c6e })
      );
      group.add(body);

      const bandColors = [0x8b0000, 0xffcc00, 0x000000];
      const offsets = [-0.2, 0, 0.2];
      offsets.forEach((off, i) => {
        const band = new THREE.Mesh(
          new THREE.BoxGeometry(0.08, 0.32, 0.32),
          new THREE.MeshStandardMaterial({ color: bandColors[i] })
        );
        band.position.x = off;
        group.add(band);
      });

      group.position.set(x, 0.25, z);
      group.userData = { name, baseColor: 0xc79c6e };
      scene.add(group);
      components[name] = group;
      selectable.push(group);
    }

    function createLED() {
      const group = new THREE.Group();
      const bulbMat = new THREE.MeshStandardMaterial({
        color: 0xaa0000,
        emissive: 0x220000,
        emissiveIntensity: 0.2
      });

      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.25, 24, 24),
        bulbMat
      );
      group.add(bulb);

      const leg1 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.5, 8),
        new THREE.MeshStandardMaterial({ color: 0xcccccc })
      );
      leg1.position.set(-0.08, -0.35, 0);
      group.add(leg1);

      const leg2 = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.6, 8),
        new THREE.MeshStandardMaterial({ color: 0xcccccc })
      );
      leg2.position.set(0.08, -0.4, 0);
      group.add(leg2);

      group.position.set(-7, 0.6, 3);
      group.userData = { name: 'led', baseColor: 0xaa0000, bulbMat };
      scene.add(group);
      components.led = group;
      selectable.push(group);
    }

    createBattery();
    createResistor('r1', -7, -1);
    createResistor('r2', -7, 1);
    createLED();

    function clearWires() {
      while (wireGroup.children.length) {
        const child = wireGroup.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    }

    function getConnectionPath() {
      if (state.level === 1) {
        return {
          battery: new THREE.Vector3(-3, 0.4, -2),
          r1: new THREE.Vector3(0, 0.25, -2),
          led: new THREE.Vector3(3, 0.5, -2)
        };
      } else {
        return {
          battery: new THREE.Vector3(-4, 0.4, 0),
          r1: new THREE.Vector3(-0.5, 0.25, 1.2),
          r2: new THREE.Vector3(-0.5, 0.25, -1.2),
          led: new THREE.Vector3(3.2, 0.5, 0)
        };
      }
    }

    function moveConnectedComponents() {
      const path = getConnectionPath();
      Object.keys(components).forEach(name => {
        const target = path[name];
        const startPositions = {
          battery: new THREE.Vector3(-7, 0.4, -3),
          r1: new THREE.Vector3(-7, 0.25, -1),
          r2: new THREE.Vector3(-7, 0.25, 1),
          led: new THREE.Vector3(-7, 0.6, 3)
        };
        if (state.connectedComponents.includes(name) && target) {
          components[name].position.copy(target);
        } else {
          components[name].position.copy(startPositions[name]);
        }
      });
    }

    function createWireBetween(p1, p2) {
      const dir = new THREE.Vector3().subVectors(p2, p1);
      const len = dir.length();
      if (!isFinite(len) || len <= 0) return;

      const geometry = new THREE.CylinderGeometry(0.06, 0.06, len, 12);
      const material = new THREE.MeshStandardMaterial({ color: 0x999999 });
      const wire = new THREE.Mesh(geometry, material);

      const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
      wire.position.copy(mid);

      wire.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir.clone().normalize()
      );

      wireGroup.add(wire);
    }

    function rebuildWires() {
      clearWires();
      const pos = getConnectionPath();

      if (state.level === 1) {
        if (state.connectedComponents.includes('battery') && state.connectedComponents.includes('r1')) {
          createWireBetween(pos.battery, pos.r1);
        }
        if (state.connectedComponents.includes('r1') && state.connectedComponents.includes('led')) {
          createWireBetween(pos.r1, pos.led);
        }
      } else {
        if (state.connectedComponents.includes('battery') && state.connectedComponents.includes('r1')) {
          createWireBetween(pos.battery, pos.r1);
        }
        if (state.connectedComponents.includes('battery') && state.connectedComponents.includes('r2')) {
          createWireBetween(pos.battery, pos.r2);
        }
        if (state.connectedComponents.includes('r1') && state.connectedComponents.includes('led')) {
          createWireBetween(pos.r1, pos.led);
        }
        if (state.connectedComponents.includes('r2') && state.connectedComponents.includes('led')) {
          createWireBetween(pos.r2, pos.led);
        }
      }
    }

    function validNumber(n) {
      return Number.isFinite(n) ? n : 0;
    }

    function recalculateCircuit() {
      let totalResistance = 0;
      let current = 0;
      let complete = false;

      if (state.level === 1) {
        complete = ['battery', 'r1', 'led'].every(c => state.connectedComponents.includes(c));
        totalResistance = state.connectedComponents.includes('r1') ? state.resistanceR1 : 0;

        if (complete && totalResistance > 0) {
          const voltageAvailable = Math.max(0, state.batteryVoltage - state.ledForwardVoltage);
          current = voltageAvailable / totalResistance;
        }
      } else {
        complete = ['battery', 'r1', 'r2', 'led'].every(c => state.connectedComponents.includes(c));
        if (state.connectedComponents.includes('r1') && state.connectedComponents.includes('r2')) {
          totalResistance = (state.resistanceR1 * state.resistanceR2) / (state.resistanceR1 + state.resistanceR2);
        } else if (state.connectedComponents.includes('r1')) {
          totalResistance = state.resistanceR1;
        } else if (state.connectedComponents.includes('r2')) {
          totalResistance = state.resistanceR2;
        }

        if (complete && totalResistance > 0) {
          const voltageAvailable = Math.max(0, state.batteryVoltage - state.ledForwardVoltage);
          current = voltageAvailable / totalResistance;
        }
      }

      totalResistance = Math.max(0, validNumber(totalResistance));
      current = Math.max(0, validNumber(current));

      state.totalResistance = parseFloat(totalResistance.toFixed(2));
      state.currentAmps = parseFloat(current.toFixed(4));
      state.circuitComplete = complete;
      state.ledOn = state.circuitComplete && state.currentAmps >= LED_THRESHOLD;

      updateLED();
      updateHUD();
      rebuildWires();
      moveConnectedComponents();
    }

    function updateLED() {
      const bulbMat = components.led.userData.bulbMat;
      if (state.ledOn) {
        bulbMat.emissive.setHex(0xff2200);
        bulbMat.emissiveIntensity = 1.8;
        bulbMat.color.setHex(0xff4444);
      } else {
        bulbMat.emissive.setHex(0x220000);
        bulbMat.emissiveIntensity = 0.2;
        bulbMat.color.setHex(0xaa0000);
      }
    }

    function updateHUD() {
      infoPanel.innerHTML = `
        <div><b>Level:</b> ${state.level}</div>
        <div><b>Total Resistance:</b> ${state.totalResistance.toFixed(2)} Ω</div>
        <div><b>Current:</b> ${state.currentAmps.toFixed(4)} A</div>
        <div><b>LED Status:</b> ${state.ledOn ? 'ON' : 'OFF'}</div>
        <div><b>Selected:</b> ${state.selectedComponent || 'None'}</div>
        <div><b>Connected:</b> ${state.connectedComponents.join(' → ') || 'None'}</div>
      `;

      sliderPanel.style.display = state.level === 3 ? 'block' : 'none';
      voltageValue.textContent = `${state.batteryVoltage.toFixed(1)}V`;
    }

    function resetHighlight() {
      Object.values(components).forEach(obj => {
        obj.traverse(child => {
          if (child.isMesh && child.material && child.material.color) {
            const n = obj.userData.name;
            if (n === 'battery') child.material.color.setHex(child === obj.children[0] ? 0xffdd33 : child.material.color.getHex());
            if (n === 'r1' || n === 'r2') {
              if (child === obj.children[0]) child.material.color.setHex(0xc79c6e);
            }
            if (n === 'led' && child === obj.children[0]) {
              child.material.color.setHex(state.ledOn ? 0xff4444 : 0xaa0000);
            }
          }
        });
      });
    }

    function highlightSelected() {
      resetHighlight();
      if (!state.selectedComponent) return;
      const obj = components[state.selectedComponent];
      if (!obj) return;

      obj.traverse(child => {
        if (child.isMesh && child.material && child.material.color) {
          child.material.color.offsetHSL(0, 0, 0.18);
        }
      });
    }

    function canConnect(name) {
      if (state.connectedComponents.includes(name)) return false;

      if (state.level === 1) {
        const order = ['battery', 'r1', 'led'];
        return name === order[state.connectedComponents.length];
      }

      const required = ['battery', 'r1', 'r2', 'led'];
      return name === required[state.connectedComponents.length];
    }

    function connectSelected() {
      const name = state.selectedComponent;
      if (!name) return;
      if (!canConnect(name)) return;

      state.connectedComponents.push(name);
      recalculateCircuit();
      highlightSelected();
    }

    function nextLevel() {
      if (!state.circuitComplete) return;
      if (state.level >= 3) return;

      state.level += 1;
      state.circuitComplete = false;
      state.selectedComponent = null;
      state.connectedComponents = [];

      if (state.level === 2 || state.level === 3) {
        components.r2.visible = true;
      }

      if (state.level === 1) {
        components.r2.visible = false;
      }

      moveConnectedComponents();
      clearWires();
      recalculateCircuit();
      highlightSelected();
    }

    function resetAll() {
      state.level = 1;
      state.circuitComplete = false;
      state.batteryVoltage = 9;
      state.totalResistance = 0;
      state.currentAmps = 0;
      state.ledOn = false;
      state.selectedComponent = null;
      state.connectedComponents = [];
      voltageSlider.value = 9;
      components.r2.visible = false;
      moveConnectedComponents();
      clearWires();
      updateLED();
      updateHUD();
      highlightSelected();
    }

    components.r2.visible = false;

    window.addEventListener('pointerdown', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(selectable, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.name) obj = obj.parent;
        if (obj && obj.userData.name && obj.visible !== false) {
          state.selectedComponent = obj.userData.name;
        }
      } else {
        state.selectedComponent = null;
      }

      updateHUD();
      highlightSelected();
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();
      if (key === 'c') connectSelected();
      if (key === 'n') nextLevel();
      if (key === 'r') resetAll();
    });

    voltageSlider.addEventListener('input', () => {
      state.batteryVoltage = Math.max(1, Math.min(12, parseFloat(voltageSlider.value) || 9));
      recalculateCircuit();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    moveConnectedComponents();
    recalculateCircuit();
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
