<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Electrical Circuit Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #infoPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            min-width: 200px;
        }
        #infoPanel h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4da6ff;
        }
        .stat {
            margin: 5px 0;
            font-size: 14px;
        }
        .stat span {
            font-weight: bold;
            color: #ffd700;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            text-align: center;
            pointer-events: none;
            font-size: 14px;
            white-space: nowrap;
        }
        #sliderPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            display: none;
        }
        #sliderPanel label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }
        input[type=range] {
            width: 150px;
        }
        .led-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #330000;
            margin-left: 5px;
            vertical-align: middle;
        }
        .led-status.on {
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
        }
    </style>
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="infoPanel">
        <h2 id="levelDisplay">Level 1: Series Circuit</h2>
        <div class="stat">Total Resistance: <span id="resDisplay">0</span> Ω</div>
        <div class="stat">Current: <span id="currDisplay">0.0000</span> A</div>
        <div class="stat">LED Status: <div id="ledIndicator" class="led-status"></div></div>
        <div class="stat" style="margin-top: 10px; font-size: 12px; color: #aaa;">
            Selected: <span id="selDisplay" style="color:#fff;">None</span>
        </div>
    </div>

    <div id="sliderPanel">
        <label>Battery Voltage: <span id="voltageLabel">9.0</span>V</label>
        <input type="range" id="voltageSlider" min="1" max="12" step="0.1" value="9">
    </div>

    <div id="instructions">
        Click component to select | <b>C</b>: Connect | <b>N</b>: Next Level | <b>R</b>: Reset
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            level: 1,
            circuitComplete: false,
            batteryVoltage: 9,
            resistanceR1: 100,
            resistanceR2: 200,
            totalResistance: 0,
            currentAmps: 0,
            ledOn: false,
            selectedComponent: null,
            connectedComponents: [],
            ledForwardVoltage: 2,
            componentsCount: 4
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 5);
        scene.add(dirLight);

        // Workbench
        const planeGeo = new THREE.PlaneGeometry(20, 20);
        const planeMat = new THREE.MeshPhongMaterial({ color: 0x222222, depthWrite: false });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        scene.add(plane);

        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x444444);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- Components ---
        const components = {};
        const interactableObjects = [];
        const wireGroup = new THREE.Group();
        scene.add(wireGroup);

        // Start positions (Left side)
        const startPositions = {
            battery: new THREE.Vector3(-8, 0.4, -6),
            r1: new THREE.Vector3(-8, 0.15, -2),
            r2: new THREE.Vector3(-8, 0.15, 2),
            led: new THREE.Vector3(-8, 0.25, 6)
        };

        // Circuit positions
        const circuitPosL1 = {
            battery: new THREE.Vector3(-4, 0.4, 0),
            r1: new THREE.Vector3(0, 0.15, 0),
            led: new THREE.Vector3(4, 0.25, 0)
        };

        const circuitPosL2 = {
            battery: new THREE.Vector3(-5, 0.4, 0),
            r1: new THREE.Vector3(0, 0.15, -2),
            r2: new THREE.Vector3(0, 0.15, 2),
            led: new THREE.Vector3(5, 0.25, 0)
        };

        function createBattery() {
            const geo = new THREE.CylinderGeometry(0.4, 0.4, 0.8, 16);
            const mat = new THREE.MeshPhongMaterial({ color: 0xffcc00 });
            const mesh = new THREE.Mesh(geo, mat);
            
            // Add positive terminal
            const topGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 16);
            const topMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = 0.45;
            mesh.add(top);

            mesh.userData.name = 'battery';
            return mesh;
        }

        function createResistor(name, colorBands) {
            const group = new THREE.Group();
            
            const geo = new THREE.BoxGeometry(1.0, 0.3, 0.3);
            const mat = new THREE.MeshPhongMaterial({ color: 0xd2b48c });
            const mesh = new THREE.Mesh(geo, mat);
            group.add(mesh);

            // Add bands
            const bandGeo = new THREE.BoxGeometry(0.1, 0.32, 0.32);
            colorBands.forEach((color, index) => {
                const bandMat = new THREE.MeshBasicMaterial({ color: color });
                const band = new THREE.Mesh(bandGeo, bandMat);
                band.position.x = -0.3 + (index * 0.3);
                group.add(band);
            });

            // Add wire leads
            const leadGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.5);
            const leadMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
            const lead1 = new THREE.Mesh(leadGeo, leadMat);
            lead1.rotation.z = Math.PI / 2;
            lead1.position.x = -0.75;
            const lead2 = lead1.clone();
            lead2.position.x = 0.75;
            group.add(lead1, lead2);

            // Invisible hit box for easier clicking
            const hitGeo = new THREE.BoxGeometry(2.0, 0.5, 0.5);
            const hitMat = new THREE.MeshBasicMaterial({ visible: false });
            const hitBox = new THREE.Mesh(hitGeo, hitMat);
            hitBox.userData.name = name;
            group.add(hitBox);
            interactableObjects.push(hitBox);

            group.userData.name = name;
            return group;
        }

        function createLED() {
            const group = new THREE.Group();

            const geo = new THREE.SphereGeometry(0.25, 16, 16);
            const mat = new THREE.MeshPhongMaterial({ 
                color: 0x550000, 
                emissive: 0xff0000,
                emissiveIntensity: 0,
                transparent: true,
                opacity: 0.9
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.y = 0.2;
            group.add(mesh);
            components.ledMesh = mesh; // Store reference to update emissive

            // Base
            const baseGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.1, 16);
            const baseMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const base = new THREE.Mesh(baseGeo, baseMat);
            group.add(base);

            // Leads
            const leadGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4);
            const leadMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
            const lead1 = new THREE.Mesh(leadGeo, leadMat);
            lead1.position.set(-0.1, -0.2, 0);
            const lead2 = new THREE.Mesh(leadGeo, leadMat);
            lead2.position.set(0.1, -0.2, 0);
            group.add(lead1, lead2);

            // Hitbox
            const hitGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const hitMat = new THREE.MeshBasicMaterial({ visible: false });
            const hitBox = new THREE.Mesh(hitGeo, hitMat);
            hitBox.position.y = 0.1;
            hitBox.userData.name = 'led';
            group.add(hitBox);
            interactableObjects.push(hitBox);

            group.userData.name = 'led';
            return group;
        }

        // Initialize Components
        components.battery = createBattery();
        interactableObjects.push(components.battery);
        
        components.r1 = createResistor('r1', [0x8b4513, 0x000000, 0x8b4513]); // Brown Black Brown (100)
        components.r2 = createResistor('r2', [0xff0000, 0x000000, 0x8b4513]); // Red Black Brown (200)
        components.led = createLED();

        Object.values(components).forEach(comp => {
            if(comp.userData.name !== 'ledMesh') {
                scene.add(comp);
            }
        });

        function resetPositions() {
            Object.keys(startPositions).forEach(key => {
                components[key].position.copy(startPositions[key]);
                components[key].rotation.set(0,0,0);
                components[key].scale.set(1,1,1);
            });
        }
        resetPositions();

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                const name = intersects[0].object.userData.name;
                window.__3D_STATE__.selectedComponent = name;
                
                // Visual feedback
                Object.keys(components).forEach(k => {
                    if(k !== 'ledMesh') components[k].scale.set(1,1,1);
                });
                components[name].scale.set(1.2, 1.2, 1.2);
            } else {
                window.__3D_STATE__.selectedComponent = null;
                Object.keys(components).forEach(k => {
                    if(k !== 'ledMesh') components[k].scale.set(1,1,1);
                });
            }
            updateUI();
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toUpperCase();
            if (key === 'C') connectComponent();
            if (key === 'N') nextLevel();
            if (key === 'R') resetCircuit();
        });

        document.getElementById('voltageSlider').addEventListener('input', (e) => {
            window.__3D_STATE__.batteryVoltage = parseFloat(e.target.value);
            document.getElementById('voltageLabel').innerText = window.__3D_STATE__.batteryVoltage.toFixed(1);
            calculateCircuit();
        });

        // --- Logic ---
        function connectComponent() {
            const state = window.__3D_STATE__;
            if (!state.selectedComponent) return;
            if (state.connectedComponents.includes(state.selectedComponent)) return;

            const orderL1 = ['battery', 'r1', 'led'];
            const orderL2 = ['battery', 'r1', 'r2', 'led'];
            const currentOrder = state.level === 1 ? orderL1 : orderL2;
            
            const nextExpected = currentOrder[state.connectedComponents.length];
            
            if (state.selectedComponent === nextExpected) {
                state.connectedComponents.push(state.selectedComponent);
                updateComponentLayout();
                drawWires();
                calculateCircuit();
            }
        }

        function updateComponentLayout() {
            const state = window.__3D_STATE__;
            const posMap = state.level === 1 ? circuitPosL1 : circuitPosL2;

            state.connectedComponents.forEach(name => {
                const targetPos = posMap[name];
                components[name].position.copy(targetPos);
                components[name].scale.set(1,1,1); // reset scale on connect
                
                // Rotate battery to lay flat in circuit
                if (name === 'battery') {
                    components[name].rotation.z = -Math.PI / 2;
                }
            });
            state.selectedComponent = null;
        }

        function drawWireSegment(p1, p2) {
            const distance = p1.distanceTo(p2);
            const geo = new THREE.CylinderGeometry(0.03, 0.03, distance, 8);
            const mat = new THREE.MeshPhongMaterial({ color: 0x777777 });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.copy(p1).lerp(p2, 0.5);
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), p2.clone().sub(p1).normalize());
            wireGroup.add(mesh);
        }

        function drawWires() {
            // Clear old wires
            while(wireGroup.children.length > 0){ 
                wireGroup.remove(wireGroup.children[0]); 
            }

            const state = window.__3D_STATE__;
            const c = state.connectedComponents;
            const p = state.level === 1 ? circuitPosL1 : circuitPosL2;

            if (state.level === 1) {
                if (c.includes('battery') && c.includes('r1')) {
                    drawWireSegment(new THREE.Vector3(p.battery.x + 0.4, 0.15, 0), new THREE.Vector3(p.r1.x - 0.75, 0.15, 0));
                }
                if (c.includes('r1') && c.includes('led')) {
                    drawWireSegment(new THREE.Vector3(p.r1.x + 0.75, 0.15, 0), new THREE.Vector3(p.led.x - 0.2, 0.15, 0));
                }
                if (c.length === 3) {
                    // Return wire
                    drawWireSegment(new THREE.Vector3(p.led.x + 0.2, 0.15, 0), new THREE.Vector3(p.led.x + 0.2, 0.15, 3));
                    drawWireSegment(new THREE.Vector3(p.led.x + 0.2, 0.15, 3), new THREE.Vector3(p.battery.x - 0.4, 0.15, 3));
                    drawWireSegment(new THREE.Vector3(p.battery.x - 0.4, 0.15, 3), new THREE.Vector3(p.battery.x - 0.4, 0.15, 0));
                }
            } else {
                // Level 2 & 3
                if (c.includes('battery') && c.includes('r1')) {
                    drawWireSegment(new THREE.Vector3(p.battery.x + 0.4, 0.15, 0), new THREE.Vector3(-2.5, 0.15, 0));
                    drawWireSegment(new THREE.Vector3(-2.5, 0.15, 0), new THREE.Vector3(-2.5, 0.15, -2));
                    drawWireSegment(new THREE.Vector3(-2.5, 0.15, -2), new THREE.Vector3(p.r1.x - 0.75, 0.15, -2));
                }
                if (c.includes('battery') && c.includes('r2')) {
                    drawWireSegment(new THREE.Vector3(-2.5, 0.15, 0), new THREE.Vector3(-2.5, 0.15, 2));
                    drawWireSegment(new THREE.Vector3(-2.5, 0.15, 2), new THREE.Vector3(p.r2.x - 0.75, 0.15, 2));
                }
                if (c.includes('r1') && c.includes('led')) {
                    drawWireSegment(new THREE.Vector3(p.r1.x + 0.75, 0.15, -2), new THREE.Vector3(2.5, 0.15, -2));
                    drawWireSegment(new THREE.Vector3(2.5, 0.15, -2), new THREE.Vector3(2.5, 0.15, 0));
                    drawWireSegment(new THREE.Vector3(2.5, 0.15, 0), new THREE.Vector3(p.led.x - 0.2, 0.15, 0));
                }
                if (c.includes('r2') && c.includes('led')) {
                    drawWireSegment(new THREE.Vector3(p.r2.x + 0.75, 0.15, 2), new THREE.Vector3(2.5, 0.15, 2));
                    drawWireSegment(new THREE.Vector3(2.5, 0.15, 2), new THREE.Vector3(2.5, 0.15, 0));
                }
                if (c.length === 4) {
                    // Return wire
                    drawWireSegment(new THREE.Vector3(p.led.x + 0.2, 0.15, 0), new THREE.Vector3(p.led.x + 0.2, 0.15, 4));
                    drawWireSegment(new THREE.Vector3(p.led.x + 0.2, 0.15, 4), new THREE.Vector3(p.battery.x - 0.4, 0.15, 4));
                    drawWireSegment(new THREE.Vector3(p.battery.x - 0.4, 0.15, 4), new THREE.Vector3(p.battery.x - 0.4, 0.15, 0));
                }
            }
        }

        function calculateCircuit() {
            const state = window.__3D_STATE__;
            const expectedCount = state.level === 1 ? 3 : 4;

            if (state.connectedComponents.length === expectedCount) {
                state.circuitComplete = true;
                
                if (state.level === 1) {
                    state.totalResistance = state.resistanceR1;
                } else {
                    state.totalResistance = (state.resistanceR1 * state.resistanceR2) / (state.resistanceR1 + state.resistanceR2);
                }

                let v = state.batteryVoltage - state.ledForwardVoltage;
                if (v < 0) v = 0;
                
                state.currentAmps = v / state.totalResistance;

                if (state.currentAmps >= 0.01) {
                    state.ledOn = true;
                    components.ledMesh.material.emissiveIntensity = 1;
                } else {
                    state.ledOn = false;
                    components.ledMesh.material.emissiveIntensity = 0;
                }
            } else {
                state.circuitComplete = false;
                state.totalResistance = 0;
                state.currentAmps = 0;
                state.ledOn = false;
                components.ledMesh.material.emissiveIntensity = 0;
            }
            updateUI();
        }

        function nextLevel() {
            const state = window.__3D_STATE__;
            if (!state.circuitComplete) return;

            if (state.level === 1) {
                state.level = 2;
                state.connectedComponents = [];
                resetPositions();
                drawWires();
                calculateCircuit();
            } else if (state.level === 2) {
                state.level = 3;
                document.getElementById('sliderPanel').style.display = 'block';
            }
            updateUI();
        }

        function resetCircuit() {
            const state = window.__3D_STATE__;
            state.level = 1;
            state.connectedComponents = [];
            state.batteryVoltage = 9;
            document.getElementById('voltageSlider').value = 9;
            document.getElementById('voltageLabel').innerText = "9.0";
            document.getElementById('sliderPanel').style.display = 'none';
            
            resetPositions();
            drawWires();
            calculateCircuit();
        }

        function updateUI() {
            const state = window.__3D_STATE__;
            
            let levelText = "Level 1: Series Circuit";
            if (state.level === 2) levelText = "Level 2: Parallel Circuit";
            if (state.level === 3) levelText = "Level 3: Variable Voltage";
            document.getElementById('levelDisplay').innerText = levelText;

            document.getElementById('resDisplay').innerText = state.totalResistance.toFixed(2);
            document.getElementById('currDisplay').innerText = state.currentAmps.toFixed(4);
            
            const ledInd = document.getElementById('ledIndicator');
            if (state.ledOn) {
                ledInd.classList.add('on');
            } else {
                ledInd.classList.remove('on');
            }

            document.getElementById('selDisplay').innerText = state.selectedComponent ? state.selectedComponent.toUpperCase() : 'None';
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initial setup
        updateUI();
        animate();

    </script>
</body>
</html>
