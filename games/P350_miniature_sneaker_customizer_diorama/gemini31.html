<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Sneaker Customizer Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #customizer-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(15, 15, 30, 0.85);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .section {
            margin-bottom: 15px;
        }
        .btn-group {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #4a4a6a;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #3a3a5a;
        }
        button.active-part {
            border: 2px solid #00ffcc;
            background: #1a3a4a;
        }
        .swatches {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #fff;
            cursor: pointer;
            padding: 0;
            flex: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .swatch:hover {
            transform: scale(1.1);
        }
        #config-display {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.3);
            padding: 8px;
            border-radius: 4px;
        }
        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }
        input[type=range] {
            width: 100%;
            margin-top: 5px;
        }
        label {
            font-size: 0.9rem;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="customizer-panel">
        <h2>Sneaker Customizer</h2>
        
        <div id="config-display">Selected: sole (white)</div>

        <div class="section">
            <div class="btn-group">
                <button id="btn-sole" class="active-part">Sole</button>
                <button id="btn-body">Body</button>
                <button id="btn-toecap">Toe Cap</button>
            </div>
        </div>

        <div class="section">
            <div class="swatches">
                <button id="swatch-red" class="swatch" style="background-color: #ff3333;"></button>
                <button id="swatch-blue" class="swatch" style="background-color: #3366ff;"></button>
                <button id="swatch-green" class="swatch" style="background-color: #33cc33;"></button>
                <button id="swatch-white" class="swatch" style="background-color: #ffffff;"></button>
                <button id="swatch-black" class="swatch" style="background-color: #222222;"></button>
                <button id="swatch-yellow" class="swatch" style="background-color: #ffcc00;"></button>
            </div>
        </div>

        <div class="section btn-group">
            <button id="btn-reset">Reset (R)</button>
            <button id="btn-spin">Spin (S)</button>
        </div>

        <div class="section">
            <label for="slider-size">Size</label>
            <input type="range" id="slider-size" min="0.5" max="2.0" step="0.1" value="1.0">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            selectedPart: 'sole',
            colors: { sole: 'white', body: 'white', toecap: 'white' },
            spinning: false,
            sneakerScale: 1.0,
            sneakerRotationY: 0,
            sneakerPositionY: 0,
            partsCustomized: 0,
            dioramaVisible: false
        };

        const colorMap = {
            'red': 0xff3333,
            'blue': 0x3366ff,
            'green': 0x33cc33,
            'white': 0xffffff,
            'black': 0x222222,
            'yellow': 0xffcc00
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.5, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -5;
        dirLight.shadow.camera.right = 5;
        dirLight.shadow.camera.top = 5;
        dirLight.shadow.camera.bottom = -5;
        scene.add(dirLight);

        // --- Ground Plane ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Diorama Base (GLB) ---
        const loader = new GLTFLoader();
        loader.load(
            'ABeautifulGame.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(0, -0.5, 0);
                model.scale.set(0.5, 0.5, 0.5);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
                window.__3D_STATE__.dioramaVisible = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load ABeautifulGame.glb. Proceeding with sneaker only.', error);
            }
        );

        // --- Sneaker Model ---
        const sneakerGroup = new THREE.Group();
        scene.add(sneakerGroup);

        const parts = {};

        // Sole
        const soleGeo = new THREE.BoxGeometry(1.2, 0.15, 0.5);
        const soleMat = new THREE.MeshStandardMaterial({ color: colorMap['white'] });
        const soleMesh = new THREE.Mesh(soleGeo, soleMat);
        soleMesh.position.set(0, 1.0, 0);
        soleMesh.castShadow = true;
        soleMesh.receiveShadow = true;
        sneakerGroup.add(soleMesh);
        parts['sole'] = soleMesh;

        // Body
        const bodyGeo = new THREE.BoxGeometry(1.0, 0.4, 0.45);
        const bodyMat = new THREE.MeshStandardMaterial({ color: colorMap['white'] });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.position.set(0, 1.3, 0);
        bodyMesh.castShadow = true;
        bodyMesh.receiveShadow = true;
        sneakerGroup.add(bodyMesh);
        parts['body'] = bodyMesh;

        // Toe Cap
        const toeGeo = new THREE.SphereGeometry(0.25, 32, 16);
        const toeMat = new THREE.MeshStandardMaterial({ color: colorMap['white'] });
        const toeMesh = new THREE.Mesh(toeGeo, toeMat);
        toeMesh.scale.set(1, 0.6, 1);
        toeMesh.position.set(-0.5, 1.15, 0);
        toeMesh.castShadow = true;
        toeMesh.receiveShadow = true;
        sneakerGroup.add(toeMesh);
        parts['toecap'] = toeMesh;

        // --- UI & Interaction Logic ---
        const btnSole = document.getElementById('btn-sole');
        const btnBody = document.getElementById('btn-body');
        const btnToecap = document.getElementById('btn-toecap');
        const configDisplay = document.getElementById('config-display');
        const btnReset = document.getElementById('btn-reset');
        const btnSpin = document.getElementById('btn-spin');
        const sliderSize = document.getElementById('slider-size');

        function updateSelectionUI() {
            [btnSole, btnBody, btnToecap].forEach(btn => btn.classList.remove('active-part'));
            document.getElementById(`btn-${window.__3D_STATE__.selectedPart}`).classList.add('active-part');
            
            // Update Emissive Glow
            Object.keys(parts).forEach(key => {
                if (key === window.__3D_STATE__.selectedPart) {
                    parts[key].material.emissive.setHex(0x00ffcc);
                    parts[key].material.emissiveIntensity = 0.3;
                } else {
                    parts[key].material.emissive.setHex(0x000000);
                    parts[key].material.emissiveIntensity = 0;
                }
            });

            updateConfigDisplay();
        }

        function updateConfigDisplay() {
            const part = window.__3D_STATE__.selectedPart;
            const color = window.__3D_STATE__.colors[part];
            configDisplay.textContent = `Selected: ${part} (${color})`;
        }

        function selectPart(partName) {
            window.__3D_STATE__.selectedPart = partName;
            updateSelectionUI();
        }

        function applyColor(colorName) {
            const part = window.__3D_STATE__.selectedPart;
            window.__3D_STATE__.colors[part] = colorName;
            parts[part].material.color.setHex(colorMap[colorName]);
            updateConfigDisplay();
        }

        function resetCustomizer() {
            ['sole', 'body', 'toecap'].forEach(part => {
                window.__3D_STATE__.colors[part] = 'white';
                parts[part].material.color.setHex(colorMap['white']);
            });
            updateConfigDisplay();
        }

        function toggleSpin() {
            window.__3D_STATE__.spinning = !window.__3D_STATE__.spinning;
            btnSpin.style.background = window.__3D_STATE__.spinning ? '#1a3a4a' : '';
            btnSpin.style.border = window.__3D_STATE__.spinning ? '1px solid #00ffcc' : '';
        }

        // Event Listeners
        btnSole.addEventListener('click', () => selectPart('sole'));
        btnBody.addEventListener('click', () => selectPart('body'));
        btnToecap.addEventListener('click', () => selectPart('toecap'));

        Object.keys(colorMap).forEach(color => {
            document.getElementById(`swatch-${color}`).addEventListener('click', () => applyColor(color));
        });

        btnReset.addEventListener('click', resetCustomizer);
        btnSpin.addEventListener('click', toggleSpin);

        sliderSize.addEventListener('input', (e) => {
            const scale = parseFloat(e.target.value);
            window.__3D_STATE__.sneakerScale = scale;
            sneakerGroup.scale.set(scale, scale, scale);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') resetCustomizer();
            if (e.key.toLowerCase() === 's') toggleSpin();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize UI state
        updateSelectionUI();

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Bobbing effect (sine wave, amplitude 0.1, period 2s -> freq 0.5Hz -> angular freq PI)
            const bobOffset = Math.sin(time * Math.PI) * 0.1;
            sneakerGroup.position.y = bobOffset;

            // Spin effect
            if (window.__3D_STATE__.spinning) {
                // 1 radian per second. We use time to ensure smooth rotation regardless of framerate
                sneakerGroup.rotation.y = time * 1.0; 
            }

            controls.update();

            // Update State Object
            let customCount = 0;
            if (window.__3D_STATE__.colors.sole !== 'white') customCount++;
            if (window.__3D_STATE__.colors.body !== 'white') customCount++;
            if (window.__3D_STATE__.colors.toecap !== 'white') customCount++;
            
            window.__3D_STATE__.partsCustomized = customCount;
            window.__3D_STATE__.sneakerRotationY = sneakerGroup.rotation.y;
            window.__3D_STATE__.sneakerPositionY = sneakerGroup.position.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
