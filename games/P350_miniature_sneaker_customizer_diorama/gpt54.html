<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Sneaker Customizer Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #customizer-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 260px;
      padding: 14px;
      background: rgba(10, 10, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #customizer-panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
    }

    .section {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      margin-bottom: 8px;
      font-size: 13px;
      color: #cfd8ff;
    }

    .part-buttons,
    .swatches,
    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .part-btn,
    .action-btn {
      background: #22263b;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 13px;
    }

    .part-btn:hover,
    .action-btn:hover {
      background: #2c3350;
    }

    .part-btn.active {
      border: 2px solid #00ffcc;
      box-shadow: 0 0 10px rgba(0,255,204,0.35);
    }

    .action-btn.active {
      border: 2px solid #00ffcc;
      color: #00ffcc;
    }

    .swatch {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.5);
      cursor: pointer;
      padding: 0;
      outline: none;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .swatch:hover {
      transform: scale(1.08);
      border-color: #00ffcc;
    }

    #slider-size {
      width: 100%;
    }

    #config-display {
      font-size: 13px;
      line-height: 1.4;
      color: #d7fff7;
      background: rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 10px;
      min-height: 42px;
    }
  </style>
</head>
<body>
  <div id="customizer-panel">
    <h2>Sneaker Customizer</h2>

    <div class="section">
      <span class="label">Select Part</span>
      <div class="part-buttons">
        <button id="btn-sole" class="part-btn active">Sole</button>
        <button id="btn-body" class="part-btn">Body</button>
        <button id="btn-toecap" class="part-btn">Toe Cap</button>
      </div>
    </div>

    <div class="section">
      <span class="label">Colors</span>
      <div class="swatches">
        <button id="swatch-red" class="swatch" style="background:#ff3333" title="red"></button>
        <button id="swatch-blue" class="swatch" style="background:#3366ff" title="blue"></button>
        <button id="swatch-green" class="swatch" style="background:#33cc33" title="green"></button>
        <button id="swatch-white" class="swatch" style="background:#ffffff" title="white"></button>
        <button id="swatch-black" class="swatch" style="background:#222222" title="black"></button>
        <button id="swatch-yellow" class="swatch" style="background:#ffcc00" title="yellow"></button>
      </div>
    </div>

    <div class="section">
      <span class="label">Actions</span>
      <div class="action-buttons">
        <button id="btn-reset" class="action-btn">Reset</button>
        <button id="btn-spin" class="action-btn">Spin</button>
      </div>
    </div>

    <div class="section">
      <label class="label" for="slider-size">Size</label>
      <input id="slider-size" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
    </div>

    <div class="section">
      <span class="label">Current Configuration</span>
      <div id="config-display">Selected: sole | Color: white</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const colorMap = {
      red: '#ff3333',
      blue: '#3366ff',
      green: '#33cc33',
      white: '#ffffff',
      black: '#222222',
      yellow: '#ffcc00'
    };

    const state = {
      modelLoaded: false,
      selectedPart: 'sole',
      colors: {
        sole: 'white',
        body: 'white',
        toecap: 'white'
      },
      spinning: false,
      sneakerScale: 1.0,
      sneakerRotationY: 0,
      sneakerPositionY: 0,
      partsCustomized: 0,
      dioramaVisible: false
    };

    window.__3D_STATE__ = state;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(1024, 1024);
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 30;
    directionalLight.shadow.camera.left = -10;
    directionalLight.shadow.camera.right = 10;
    directionalLight.shadow.camera.top = 10;
    directionalLight.shadow.camera.bottom = -10;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: '#3a3a3a' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    scene.add(ground);

    let dioramaBase = null;

    const loader = new GLTFLoader();
    loader.load(
      'ABeautifulGame.glb',
      (gltf) => {
        dioramaBase = gltf.scene;
        dioramaBase.position.set(0, -0.5, 0);
        dioramaBase.scale.set(0.5, 0.5, 0.5);

        dioramaBase.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(dioramaBase);
        state.modelLoaded = true;
        state.dioramaVisible = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load ABeautifulGame.glb:', error);
        state.modelLoaded = false;
        state.dioramaVisible = false;
      }
    );

    const sneaker = new THREE.Group();
    sneaker.position.set(0, 0, 0);
    scene.add(sneaker);

    const baseMaterialSettings = {
      roughness: 0.7,
      metalness: 0.1
    };

    const soleMaterial = new THREE.MeshStandardMaterial({
      color: colorMap.white,
      emissive: 0x000000,
      emissiveIntensity: 0,
      ...baseMaterialSettings
    });
    const bodyMaterial = new THREE.MeshStandardMaterial({
      color: colorMap.white,
      emissive: 0x000000,
      emissiveIntensity: 0,
      ...baseMaterialSettings
    });
    const toecapMaterial = new THREE.MeshStandardMaterial({
      color: colorMap.white,
      emissive: 0x000000,
      emissiveIntensity: 0,
      ...baseMaterialSettings
    });

    const sole = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.15, 0.5),
      soleMaterial
    );
    sole.position.set(0, 1.0, 0);
    sole.castShadow = true;
    sole.receiveShadow = true;
    sole.name = 'sole';

    const body = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.4, 0.45),
      bodyMaterial
    );
    body.position.set(0, 1.3, 0);
    body.castShadow = true;
    body.receiveShadow = true;
    body.name = 'body';

    const toecap = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 32, 24),
      toecapMaterial
    );
    toecap.scale.set(1, 0.6, 1);
    toecap.position.set(-0.5, 1.15, 0);
    toecap.castShadow = true;
    toecap.receiveShadow = true;
    toecap.name = 'toecap';

    sneaker.add(sole, body, toecap);

    const parts = {
      sole,
      body,
      toecap
    };

    const partButtons = {
      sole: document.getElementById('btn-sole'),
      body: document.getElementById('btn-body'),
      toecap: document.getElementById('btn-toecap')
    };

    const configDisplay = document.getElementById('config-display');
    const btnReset = document.getElementById('btn-reset');
    const btnSpin = document.getElementById('btn-spin');
    const sliderSize = document.getElementById('slider-size');

    function updatePartSelectionUI() {
      Object.entries(partButtons).forEach(([part, btn]) => {
        btn.classList.toggle('active', state.selectedPart === part);
      });
    }

    function updateMeshHighlight() {
      Object.entries(parts).forEach(([partName, mesh]) => {
        mesh.material.emissive.set(state.selectedPart === partName ? '#00ffcc' : '#000000');
        mesh.material.emissiveIntensity = state.selectedPart === partName ? 0.3 : 0.0;
      });
    }

    function updateConfigDisplay() {
      configDisplay.textContent =
        `Selected: ${state.selectedPart} | Color: ${state.colors[state.selectedPart]}`;
    }

    function applyColor(partName, colorName) {
      state.colors[partName] = colorName;
      parts[partName].material.color.set(colorMap[colorName]);
      updateConfigDisplay();
    }

    function selectPart(partName) {
      state.selectedPart = partName;
      updatePartSelectionUI();
      updateMeshHighlight();
      updateConfigDisplay();
    }

    function resetSneaker() {
      applyColor('sole', 'white');
      applyColor('body', 'white');
      applyColor('toecap', 'white');
    }

    function toggleSpin() {
      state.spinning = !state.spinning;
      btnSpin.classList.toggle('active', state.spinning);
    }

    partButtons.sole.addEventListener('click', () => selectPart('sole'));
    partButtons.body.addEventListener('click', () => selectPart('body'));
    partButtons.toecap.addEventListener('click', () => selectPart('toecap'));

    document.getElementById('swatch-red').addEventListener('click', () => applyColor(state.selectedPart, 'red'));
    document.getElementById('swatch-blue').addEventListener('click', () => applyColor(state.selectedPart, 'blue'));
    document.getElementById('swatch-green').addEventListener('click', () => applyColor(state.selectedPart, 'green'));
    document.getElementById('swatch-white').addEventListener('click', () => applyColor(state.selectedPart, 'white'));
    document.getElementById('swatch-black').addEventListener('click', () => applyColor(state.selectedPart, 'black'));
    document.getElementById('swatch-yellow').addEventListener('click', () => applyColor(state.selectedPart, 'yellow'));

    btnReset.addEventListener('click', resetSneaker);
    btnSpin.addEventListener('click', toggleSpin);

    sliderSize.addEventListener('input', (e) => {
      state.sneakerScale = parseFloat(e.target.value);
      sneaker.scale.setScalar(state.sneakerScale);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') resetSneaker();
      if (e.key === 's' || e.key === 'S') toggleSpin();
    });

    updatePartSelectionUI();
    updateMeshHighlight();
    updateConfigDisplay();
    sneaker.scale.setScalar(state.sneakerScale);

    const clock = new THREE.Clock();

    function updateStatePerFrame(elapsed) {
      state.sneakerRotationY = sneaker.rotation.y;
      state.sneakerPositionY = sneaker.position.y;
      state.sneakerScale = sneaker.scale.x;
      state.partsCustomized = ['sole', 'body', 'toecap'].filter(
        part => state.colors[part] !== 'white'
      ).length;
      state.dioramaVisible = !!(dioramaBase && dioramaBase.parent === scene);
      state.modelLoaded = state.modelLoaded === true;
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      sneaker.position.y = Math.sin((elapsed / 2) * Math.PI * 2) * 0.1;

      if (state.spinning) {
        sneaker.rotation.y += 1.0 * delta;
      }

      controls.update();
      updateStatePerFrame(elapsed);
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
