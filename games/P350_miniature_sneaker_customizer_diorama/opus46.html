<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Customizer Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #customizer-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    width: 240px;
    z-index: 100;
  }

  #customizer-panel h2 {
    font-size: 16px;
    margin-bottom: 15px;
    text-align: center;
    color: #00ffcc;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .section-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    margin-top: 12px;
  }

  .part-buttons {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .part-btn {
    flex: 1;
    padding: 8px 4px;
    background: rgba(255,255,255,0.08);
    border: 2px solid transparent;
    border-radius: 6px;
    color: #ccc;
    font-size: 11px;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .part-btn:hover {
    background: rgba(255,255,255,0.15);
  }

  .part-btn.active {
    border-color: #00ffcc;
    color: #00ffcc;
    background: rgba(0, 255, 204, 0.1);
  }

  .color-swatches {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .color-swatch {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-swatch:hover {
    transform: scale(1.2);
    border-color: #fff;
  }

  .color-swatch.selected {
    border-color: #00ffcc;
    box-shadow: 0 0 8px rgba(0, 255, 204, 0.5);
  }

  .action-buttons {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .action-btn {
    flex: 1;
    padding: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: #ccc;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .action-btn:hover {
    background: rgba(255,255,255,0.15);
    color: #fff;
  }

  .action-btn.active {
    background: rgba(0, 255, 204, 0.15);
    border-color: #00ffcc;
    color: #00ffcc;
  }

  .slider-container {
    margin-top: 12px;
  }

  .slider-container label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #slider-size {
    width: 100%;
    margin-top: 6px;
    accent-color: #00ffcc;
    cursor: pointer;
  }

  #config-display {
    margin-top: 12px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 6px;
    font-size: 11px;
    color: #aaa;
    line-height: 1.6;
  }

  #config-display span {
    color: #00ffcc;
  }
</style>
</head>
<body>

<div id="customizer-panel">
  <h2>Sneaker Studio</h2>

  <div class="section-label">Select Part</div>
  <div class="part-buttons">
    <button id="btn-sole" class="part-btn active">Sole</button>
    <button id="btn-body" class="part-btn">Body</button>
    <button id="btn-toecap" class="part-btn">Toe Cap</button>
  </div>

  <div class="section-label">Choose Color</div>
  <div class="color-swatches">
    <button id="swatch-red" class="color-swatch" style="background-color: #ff3333;" title="Red"></button>
    <button id="swatch-blue" class="color-swatch" style="background-color: #3366ff;" title="Blue"></button>
    <button id="swatch-green" class="color-swatch" style="background-color: #33cc33;" title="Green"></button>
    <button id="swatch-white" class="color-swatch" style="background-color: #ffffff;" title="White"></button>
    <button id="swatch-black" class="color-swatch" style="background-color: #222222;" title="Black"></button>
    <button id="swatch-yellow" class="color-swatch" style="background-color: #ffcc00;" title="Yellow"></button>
  </div>

  <div class="action-buttons">
    <button id="btn-reset" class="action-btn">Reset</button>
    <button id="btn-spin" class="action-btn">Spin</button>
  </div>

  <div class="slider-container">
    <label>Size</label>
    <input type="range" id="slider-size" min="0.5" max="2.0" step="0.1" value="1.0">
  </div>

  <div id="config-display">
    Part: <span>sole</span><br>
    Color: <span>white</span>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Color map
const COLOR_MAP = {
  red: '#ff3333',
  blue: '#3366ff',
  green: '#33cc33',
  white: '#ffffff',
  black: '#222222',
  yellow: '#ffcc00'
};

// State
const state = {
  modelLoaded: false,
  selectedPart: 'sole',
  colors: { sole: 'white', body: 'white', toecap: 'white' },
  spinning: false,
  sneakerScale: 1.0,
  sneakerRotationY: 0,
  sneakerPositionY: 0,
  partsCustomized: 0,
  dioramaVisible: false
};
window.__3D_STATE__ = state;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Extra fill light
const fillLight = new THREE.DirectionalLight(0x4466ff, 0.3);
fillLight.position.set(-3, 4, -3);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// Load GLB diorama
let dioramaModel = null;
const loader = new GLTFLoader();
loader.load(
  'ABeautifulGame.glb',
  (gltf) => {
    dioramaModel = gltf.scene;
    dioramaModel.position.set(0, -0.5, 0);
    dioramaModel.scale.set(0.5, 0.5, 0.5);
    dioramaModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(dioramaModel);
    state.modelLoaded = true;
    state.dioramaVisible = true;
  },
  undefined,
  (error) => {
    console.warn('GLB load failed, continuing without diorama:', error);
    state.modelLoaded = false;
    state.dioramaVisible = false;
  }
);

// Create sneaker from primitives
const sneakerGroup = new THREE.Group();

// Sole
const soleMat = new THREE.MeshStandardMaterial({ color: COLOR_MAP.white, roughness: 0.4, metalness: 0.1 });
const soleGeo = new THREE.BoxGeometry(1.2, 0.15, 0.5);
const soleMesh = new THREE.Mesh(soleGeo, soleMat);
soleMesh.position.set(0, 1.0, 0);
soleMesh.castShadow = true;
soleMesh.receiveShadow = true;
soleMesh.userData.part = 'sole';
sneakerGroup.add(soleMesh);

// Body
const bodyMat = new THREE.MeshStandardMaterial({ color: COLOR_MAP.white, roughness: 0.5, metalness: 0.05 });
const bodyGeo = new THREE.BoxGeometry(1.0, 0.4, 0.45);
const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
bodyMesh.position.set(0, 1.3, 0);
bodyMesh.castShadow = true;
bodyMesh.receiveShadow = true;
bodyMesh.userData.part = 'body';
sneakerGroup.add(bodyMesh);

// Toe cap
const toecapMat = new THREE.MeshStandardMaterial({ color: COLOR_MAP.white, roughness: 0.4, metalness: 0.1 });
const toecapGeo = new THREE.SphereGeometry(0.25, 24, 16);
const toecapMesh = new THREE.Mesh(toecapGeo, toecapMat);
toecapMesh.scale.set(1, 0.6, 1);
toecapMesh.position.set(-0.5, 1.15, 0);
toecapMesh.castShadow = true;
toecapMesh.receiveShadow = true;
toecapMesh.userData.part = 'toecap';
sneakerGroup.add(toecapMesh);

sneakerGroup.position.set(0, 0, 0);
scene.add(sneakerGroup);

// Part mesh map
const partMeshes = {
  sole: soleMesh,
  body: bodyMesh,
  toecap: toecapMesh
};

const partMaterials = {
  sole: soleMat,
  body: bodyMat,
  toecap: toecapMat
};

// UI references
const btnSole = document.getElementById('btn-sole');
const btnBody = document.getElementById('btn-body');
const btnToecap = document.getElementById('btn-toecap');
const btnReset = document.getElementById('btn-reset');
const btnSpin = document.getElementById('btn-spin');
const sliderSize = document.getElementById('slider-size');
const configDisplay = document.getElementById('config-display');

const partButtons = { sole: btnSole, body: btnBody, toecap: btnToecap };

function selectPart(partName) {
  state.selectedPart = partName;

  // Update button styles
  Object.keys(partButtons).forEach(key => {
    partButtons[key].classList.toggle('active', key === partName);
  });

  // Update emissive glow
  Object.keys(partMaterials).forEach(key => {
    if (key === partName) {
      partMaterials[key].emissive = new THREE.Color('#00ffcc');
      partMaterials[key].emissiveIntensity = 0.3;
    } else {
      partMaterials[key].emissive = new THREE.Color(0x000000);
      partMaterials[key].emissiveIntensity = 0;
    }
  });

  updateConfigDisplay();
}

function applyColor(colorName) {
  const part = state.selectedPart;
  state.colors[part] = colorName;
  partMaterials[part].color.set(COLOR_MAP[colorName]);
  updateConfigDisplay();
}

function resetAll() {
  ['sole', 'body', 'toecap'].forEach(part => {
    state.colors[part] = 'white';
    partMaterials[part].color.set(COLOR_MAP.white);
  });
  updateConfigDisplay();
}

function toggleSpin() {
  state.spinning = !state.spinning;
  btnSpin.classList.toggle('active', state.spinning);
}

function updateConfigDisplay() {
  const part = state.selectedPart;
  const color = state.colors[part];
  configDisplay.innerHTML = `Part: <span>${part}</span><br>Color: <span>${color}</span>`;
}

// Part button events
btnSole.addEventListener('click', () => selectPart('sole'));
btnBody.addEventListener('click', () => selectPart('body'));
btnToecap.addEventListener('click', () => selectPart('toecap'));

// Color swatch events
Object.keys(COLOR_MAP).forEach(colorName => {
  const swatch = document.getElementById(`swatch-${colorName}`);
  swatch.addEventListener('click', () => applyColor(colorName));
});

// Action buttons
btnReset.addEventListener('click', resetAll);
btnSpin.addEventListener('click', toggleSpin);

// Size slider
sliderSize.addEventListener('input', (e) => {
  state.sneakerScale = parseFloat(e.target.value);
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    resetAll();
  }
  if (e.key === 's' || e.key === 'S') {
    toggleSpin();
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize selection
selectPart('sole');

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();
  const delta = clock.getDelta();

  // Bobbing
  const bobY = Math.sin(elapsed * Math.PI) * 0.1; // period ~2 seconds
  sneakerGroup.position.y = bobY;
  state.sneakerPositionY = sneakerGroup.position.y;

  // Spinning
  if (state.spinning) {
    sneakerGroup.rotation.y += 1.0 * (1 / 60); // ~1 rad/sec at 60fps
  }
  state.sneakerRotationY = sneakerGroup.rotation.y;

  // Scale
  sneakerGroup.scale.set(state.sneakerScale, state.sneakerScale, state.sneakerScale);

  // Count customized parts
  let customized = 0;
  ['sole', 'body', 'toecap'].forEach(part => {
    if (state.colors[part] !== 'white') customized++;
  });
  state.partsCustomized = customized;

  // Diorama visibility
  state.dioramaVisible = dioramaModel !== null && dioramaModel.parent === scene;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
