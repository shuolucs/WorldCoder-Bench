<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Morphing Geometry</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border: 1px solid #333355;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }
        #hud h3 {
            margin: 0 0 10px 0;
            color: #ffffff;
        }
        .player-stat {
            margin: 5px 0;
            font-size: 14px;
        }
        .active-indicator {
            color: #ffff00;
            font-weight: bold;
        }
        #blendBtn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            padding: 12px 24px;
            background: #333355;
            color: white;
            border: 2px solid #555577;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s;
            z-index: 10;
        }
        #blendBtn:hover {
            background: #444466;
            border-color: #7777aa;
        }
        #blendBtn:active {
            transform: scale(0.95);
        }
        #instructions {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border: 1px solid #333355;
            border-radius: 8px;
            pointer-events: none;
            text-align: right;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="hud"></div>
    <button id="blendBtn">Blend Colors</button>
    <div id="instructions">
        Keys 1-4: Select Player<br>
        Space: Morph Shape<br>
        Mouse: Rotate/Zoom
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Grid Floor
        const gridHelper = new THREE.GridHelper(20, 20, 0x333355, 0x333355);
        scene.add(gridHelper);

        // Geometries
        const geometries = [
            new THREE.SphereGeometry(1, 32, 32),
            new THREE.BoxGeometry(1.4, 1.4, 1.4),
            new THREE.IcosahedronGeometry(1, 1),
            new THREE.OctahedronGeometry(1)
        ];
        const shapeNames = ['sphere', 'cube', 'icosahedron', 'octahedron'];

        // Player Setup
        const players = [];
        const positions = [
            new THREE.Vector3(-3, 1.5, -3),
            new THREE.Vector3(3, 1.5, -3),
            new THREE.Vector3(-3, 1.5, 3),
            new THREE.Vector3(3, 1.5, 3)
        ];
        const colors = [0xff4466, 0x44ff66, 0x4466ff, 0xffaa44];
        const phases = [0, Math.PI / 2, Math.PI, 3 * Math.PI / 2];

        for (let i = 0; i < 4; i++) {
            const material = new THREE.MeshStandardMaterial({
                color: colors[i],
                metalness: 0.3,
                roughness: 0.4
            });
            const mesh = new THREE.Mesh(geometries[0], material);
            mesh.position.copy(positions[i]);
            scene.add(mesh);

            players.push({
                id: i + 1,
                mesh: mesh,
                baseColor: new THREE.Color(colors[i]),
                phaseOffset: phases[i],
                shapeIndex: 0,
                morphCount: 0,
                baseScale: 1.0,
                isMorphing: false,
                morphStartTime: 0,
                geometrySwapped: false
            });
        }

        // State
        let activePlayerIndex = 0;
        let blendMode = false;
        const particles = [];
        const clock = new THREE.Clock();

        // Calculate Average Color
        const averageColor = new THREE.Color(0, 0, 0);
        players.forEach(p => averageColor.add(p.baseColor));
        averageColor.multiplyScalar(0.25);

        // UI Elements
        const hudElement = document.getElementById('hud');
        const blendBtn = document.getElementById('blendBtn');

        blendBtn.addEventListener('click', () => {
            blendMode = !blendMode;
            blendBtn.innerText = blendMode ? 'Stop Blend' : 'Blend Colors';
        });

        // Input Handling
        window.addEventListener('keydown', (event) => {
            if (event.key >= '1' && event.key <= '4') {
                activePlayerIndex = parseInt(event.key) - 1;
            } else if (event.key === ' ') {
                const player = players[activePlayerIndex];
                if (!player.isMorphing) {
                    player.isMorphing = true;
                    player.morphStartTime = performance.now();
                    player.geometrySwapped = false;
                    player.morphCount++;
                    spawnParticles(player.mesh.position, player.mesh.material.color);
                }
            }
        });

        // Particle System
        const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
        function spawnParticles(position, color) {
            for (let i = 0; i < 20; i++) {
                const material = new THREE.MeshBasicMaterial({
                    color: color,
                    transparent: true,
                    opacity: 1.0
                });
                const mesh = new THREE.Mesh(particleGeometry, material);
                mesh.position.copy(position);
                
                const velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8
                );
                
                scene.add(mesh);
                particles.push({
                    mesh: mesh,
                    velocity: velocity,
                    life: 1.0
                });
            }
        }

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const now = performance.now();
            
            let isAnyAnimating = false;
            let totalMorphs = 0;

            // Color Blending Logic
            let blendFactor = 0;
            if (blendMode) {
                // Sine wave over 4 seconds (2s to average, 2s back)
                blendFactor = (Math.sin(time * Math.PI / 2 - Math.PI / 2) + 1) / 2;
            }

            // Update Players
            players.forEach((player, index) => {
                totalMorphs += player.morphCount;

                // Morph Animation
                if (player.isMorphing) {
                    isAnyAnimating = true;
                    const elapsedMorphTime = now - player.morphStartTime;
                    const t = Math.min(elapsedMorphTime / 400, 1.0); // 400ms total

                    if (t < 0.5) {
                        // Scale down (0 to 200ms)
                        const progress = t * 2; // 0 to 1
                        player.baseScale = 1.0 - (0.9 * progress); // 1.0 -> 0.1
                    } else {
                        // Swap geometry at midpoint
                        if (!player.geometrySwapped) {
                            player.shapeIndex = (player.shapeIndex + 1) % 4;
                            player.mesh.geometry = geometries[player.shapeIndex];
                            player.geometrySwapped = true;
                        }
                        // Scale up (200ms to 400ms)
                        const progress = (t - 0.5) * 2; // 0 to 1
                        player.baseScale = 0.1 + (0.9 * progress); // 0.1 -> 1.0
                    }

                    if (t >= 1.0) {
                        player.isMorphing = false;
                        player.baseScale = 1.0;
                    }
                }

                // Synchronized Pulse
                const pulseScale = player.baseScale * (1.0 + 0.1 * Math.sin(time * 2 + player.phaseOffset));
                player.mesh.scale.set(pulseScale, pulseScale, pulseScale);

                // Update Color
                if (blendMode) {
                    player.mesh.material.color.copy(player.baseColor).lerp(averageColor, blendFactor);
                } else {
                    player.mesh.material.color.copy(player.baseColor);
                }
            });

            // Update Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta; // Fade out over 1 second
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.mesh.material.opacity = p.life;
                }
            }

            // Update HUD
            let hudHTML = `<h3>Active Player: ${activePlayerIndex + 1}</h3>`;
            players.forEach((player, index) => {
                const isActive = index === activePlayerIndex;
                const prefix = isActive ? '<span class="active-indicator">►</span> ' : '&nbsp;&nbsp;';
                const colorHex = player.baseColor.getHexString();
                hudHTML += `<div class="player-stat" style="color: #${isActive ? 'ffffff' : colorHex}">
                    ${prefix}Player ${player.id}: ${shapeNames[player.shapeIndex]} [${player.morphCount}]
                </div>`;
            });
            hudElement.innerHTML = hudHTML;

            // Expose State
            window.__3D_STATE__ = {
                activePlayer: activePlayerIndex + 1,
                playerShapes: players.map(p => shapeNames[p.shapeIndex]),
                playerShapeIndices: players.map(p => p.shapeIndex),
                morphCounts: players.map(p => p.morphCount),
                totalMorphs: totalMorphs,
                blendMode: blendMode,
                playerScales: players.map(p => p.mesh.scale.x),
                particleCount: particles.length,
                isAnimating: isAnyAnimating,
                elapsedTime: time
            };

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
