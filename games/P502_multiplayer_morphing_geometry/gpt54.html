<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Multiplayer Morphing Geometry Scene</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #ffffff;
      background: rgba(10, 10, 26, 0.75);
      padding: 10px 12px;
      border: 1px solid rgba(120, 120, 180, 0.35);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      white-space: pre-line;
      z-index: 10;
      min-width: 260px;
    }

    #blendBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: #1d1d35;
      color: #fff;
      border: 1px solid #555588;
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    #blendBtn:hover {
      background: #2a2a4a;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: rgba(255,255,255,0.75);
      background: rgba(10, 10, 26, 0.55);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="blendBtn">Blend Colors</button>
  <div id="info">Keys: 1-4 select player, Space morphs active player, mouse to orbit.</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const grid = new THREE.GridHelper(20, 20, 0x333355, 0x333355);
    grid.position.y = 0;
    grid.material.opacity = 0.35;
    grid.material.transparent = true;
    scene.add(grid);

    const SHAPE_NAMES = ['sphere', 'cube', 'icosahedron', 'octahedron'];
    const PLAYER_POSITIONS = [
      new THREE.Vector3(-3, 1.5, -3),
      new THREE.Vector3( 3, 1.5, -3),
      new THREE.Vector3(-3, 1.5,  3),
      new THREE.Vector3( 3, 1.5,  3)
    ];
    const PLAYER_COLORS = [
      0xff4466,
      0x44ff66,
      0x4466ff,
      0xffaa44
    ];
    const PHASES = [0, Math.PI / 2, Math.PI, 3 * Math.PI / 2];

    const sharedMaterialProps = {
      metalness: 0.3,
      roughness: 0.4
    };

    function makeGeometrySet() {
      return [
        new THREE.SphereGeometry(1, 32, 32),
        new THREE.BoxGeometry(2, 2, 2, 16, 16, 16),
        new THREE.IcosahedronGeometry(1.25, 1),
        new THREE.OctahedronGeometry(1.4, 0)
      ];
    }

    const baseGeometries = makeGeometrySet();

    const players = [];
    const particles = [];
    const clock = new THREE.Clock();

    let activePlayer = 0;
    let blendMode = false;
    let blendStartTime = 0;

    const hud = document.getElementById('hud');
    const blendBtn = document.getElementById('blendBtn');

    function createPlayer(index) {
      const color = new THREE.Color(PLAYER_COLORS[index]);
      const material = new THREE.MeshStandardMaterial({
        color: color.clone(),
        ...sharedMaterialProps
      });

      const mesh = new THREE.Mesh(baseGeometries[0].clone(), material);
      mesh.position.copy(PLAYER_POSITIONS[index]);
      scene.add(mesh);

      return {
        id: index + 1,
        mesh,
        originalColor: color.clone(),
        currentShapeIndex: 0,
        morphCount: 0,
        phaseOffset: PHASES[index],
        morphAnim: null,
        baseScale: 1.0
      };
    }

    for (let i = 0; i < 4; i++) {
      players.push(createPlayer(i));
    }

    function emitParticles(position, color) {
      for (let i = 0; i < 20; i++) {
        const geom = new THREE.SphereGeometry(0.05, 8, 8);
        const mat = new THREE.MeshStandardMaterial({
          color: color.clone(),
          transparent: true,
          opacity: 1,
          emissive: color.clone().multiplyScalar(0.25),
          metalness: 0.1,
          roughness: 0.8
        });
        const particle = new THREE.Mesh(geom, mat);
        particle.position.copy(position);

        const dir = new THREE.Vector3(
          (Math.random() * 2 - 1),
          (Math.random() * 2 - 1),
          (Math.random() * 2 - 1)
        ).normalize();

        const speed = 1.5 + Math.random() * 2.5;

        particles.push({
          mesh: particle,
          velocity: dir.multiplyScalar(speed),
          life: 1.0,
          maxLife: 1.0
        });

        scene.add(particle);
      }
    }

    function morphPlayer(playerIndex) {
      const player = players[playerIndex];
      if (player.morphAnim) return;

      const nextShapeIndex = (player.currentShapeIndex + 1) % SHAPE_NAMES.length;
      const start = performance.now();

      player.morphCount++;

      emitParticles(player.mesh.position, player.mesh.material.color);

      player.morphAnim = {
        phase: 'down',
        startTime: start,
        duration: 200,
        nextShapeIndex
      };
    }

    function updateMorphs(now) {
      for (const player of players) {
        if (!player.morphAnim) {
          player.baseScale = 1.0;
          continue;
        }

        const anim = player.morphAnim;
        const elapsed = now - anim.startTime;
        const t = Math.min(elapsed / anim.duration, 1);

        if (anim.phase === 'down') {
          player.baseScale = THREE.MathUtils.lerp(1.0, 0.1, t);

          if (t >= 1) {
            player.currentShapeIndex = anim.nextShapeIndex;
            player.mesh.geometry.dispose();
            player.mesh.geometry = baseGeometries[player.currentShapeIndex].clone();

            anim.phase = 'up';
            anim.startTime = now;
          }
        } else if (anim.phase === 'up') {
          player.baseScale = THREE.MathUtils.lerp(0.1, 1.0, t);

          if (t >= 1) {
            player.baseScale = 1.0;
            player.morphAnim = null;
          }
        }
      }
    }

    function updateParticles(delta) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta;

        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
          continue;
        }

        p.mesh.position.addScaledVector(p.velocity, delta);
        p.velocity.y -= 1.2 * delta;
        p.mesh.material.opacity = p.life / p.maxLife;
        p.mesh.scale.setScalar(0.75 + 0.25 * (p.life / p.maxLife));
      }
    }

    function updateBlend(elapsedTime) {
      const avg = new THREE.Color(0, 0, 0);
      for (const c of PLAYER_COLORS) {
        avg.add(new THREE.Color(c));
      }
      avg.multiplyScalar(1 / 4);

      for (let i = 0; i < players.length; i++) {
        const player = players[i];
        const original = player.originalColor;

        if (!blendMode) {
          player.mesh.material.color.copy(original);
          continue;
        }

        const localTime = elapsedTime - blendStartTime;
        const pingPong = (Math.sin((Math.PI / 2) * localTime) + 1) / 2;
        const blendT = pingPong;

        player.mesh.material.color.copy(original).lerp(avg, blendT);
      }
    }

    function updatePulse(elapsedTime) {
      for (let i = 0; i < players.length; i++) {
        const player = players[i];
        const pulse = 1.0 + 0.1 * Math.sin(elapsedTime * 2 + player.phaseOffset);
        const finalScale = player.baseScale * pulse;
        player.mesh.scale.setScalar(finalScale);
      }
    }

    function updateHUD(elapsedTime) {
      const lines = [];
      lines.push(`Active Player: ${activePlayer + 1}`);
      lines.push('');
      for (let i = 0; i < players.length; i++) {
        const marker = i === activePlayer ? '▶' : ' ';
        lines.push(
          `${marker} Player ${i + 1}: ${SHAPE_NAMES[players[i].currentShapeIndex]} | Morphs: ${players[i].morphCount}`
        );
      }
      lines.push('');
      lines.push(`Blend Mode: ${blendMode ? 'ON' : 'OFF'}`);
      lines.push(`Total Morphs: ${players.reduce((sum, p) => sum + p.morphCount, 0)}`);
      lines.push(`Particles: ${particles.length}`);
      lines.push(`Time: ${elapsedTime.toFixed(2)}s`);
      hud.textContent = lines.join('\n');
    }

    function updateState(elapsedTime) {
      window.__3D_STATE__ = {
        activePlayer: activePlayer + 1,
        playerShapes: players.map(p => SHAPE_NAMES[p.currentShapeIndex]),
        playerShapeIndices: players.map(p => p.currentShapeIndex),
        morphCounts: players.map(p => p.morphCount),
        totalMorphs: players.reduce((sum, p) => sum + p.morphCount, 0),
        blendMode,
        playerScales: players.map(p => Number(p.mesh.scale.x.toFixed(4))),
        particleCount: particles.length,
        isAnimating: players.some(p => !!p.morphAnim),
        elapsedTime: Number(elapsedTime.toFixed(4))
      };
    }

    blendBtn.addEventListener('click', () => {
      blendMode = !blendMode;
      blendStartTime = clock.getElapsedTime();
      blendBtn.textContent = blendMode ? 'Stop Blend' : 'Blend Colors';
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Digit1') activePlayer = 0;
      if (e.code === 'Digit2') activePlayer = 1;
      if (e.code === 'Digit3') activePlayer = 2;
      if (e.code === 'Digit4') activePlayer = 3;

      if (e.code === 'Space') {
        e.preventDefault();
        morphPlayer(activePlayer);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsedTime = clock.elapsedTime;
      const now = performance.now();

      controls.update();
      updateMorphs(now);
      updatePulse(elapsedTime);
      updateBlend(elapsedTime);
      updateParticles(delta);
      updateHUD(elapsedTime);
      updateState(elapsedTime);

      renderer.render(scene, camera);
    }

    updateState(0);
    updateHUD(0);
    animate();
  </script>
</body>
</html>
