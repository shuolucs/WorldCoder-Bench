<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Morphing Geometry Scene</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0a0a1a;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas { display: block; }
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #ffffff;
    background: rgba(10, 10, 26, 0.85);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.6;
    border: 1px solid rgba(100, 100, 180, 0.3);
    backdrop-filter: blur(10px);
    min-width: 220px;
}
#hud h3 {
    margin: 0 0 8px 0;
    font-size: 16px;
    color: #aabbff;
    border-bottom: 1px solid rgba(100, 100, 180, 0.3);
    padding-bottom: 6px;
}
.player-line {
    margin: 4px 0;
}
.active-indicator {
    color: #ffdd44;
    font-weight: bold;
}
#blendBtn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 28px;
    font-size: 15px;
    background: rgba(68, 102, 255, 0.7);
    color: white;
    border: 1px solid rgba(100, 130, 255, 0.5);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(5px);
}
#blendBtn:hover {
    background: rgba(68, 102, 255, 0.9);
    box-shadow: 0 0 15px rgba(68, 102, 255, 0.5);
}
#controls-info {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
}
</style>
</head>
<body>
<div id="hud"></div>
<div id="controls-info">Keys 1-4: Select Player | Space: Cycle Shape | Mouse: Orbit</div>
<button id="blendBtn">Blend Colors</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0, 0);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    scene.add(directionalLight);

    // Grid Floor
    const gridHelper = new THREE.GridHelper(20, 20, 0x333355, 0x333355);
    scene.add(gridHelper);

    // Floor plane for shadow receiving
    const floorGeom = new THREE.PlaneGeometry(20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a1a, transparent: true, opacity: 0.5 });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    floor.receiveShadow = true;
    scene.add(floor);

    // Player Configuration
    const playerColors = [0xff4466, 0x44ff66, 0x4466ff, 0xffaa44];
    const playerPositions = [
        new THREE.Vector3(-3, 1.5, -3),
        new THREE.Vector3(3, 1.5, -3),
        new THREE.Vector3(-3, 1.5, 3),
        new THREE.Vector3(3, 1.5, 3)
    ];
    const phaseOffsets = [0, Math.PI / 2, Math.PI, 3 * Math.PI / 2];
    const shapeNames = ['sphere', 'cube', 'icosahedron', 'octahedron'];

    function createGeometry(shapeIndex) {
        switch (shapeIndex) {
            case 0: return new THREE.SphereGeometry(1, 32, 32);
            case 1: return new THREE.BoxGeometry(1.6, 1.6, 1.6);
            case 2: return new THREE.IcosahedronGeometry(1, 1);
            case 3: return new THREE.OctahedronGeometry(1, 0);
            default: return new THREE.SphereGeometry(1, 32, 32);
        }
    }

    // Player state
    const players = [];
    const playerShapeIndices = [0, 0, 0, 0];
    const morphCounts = [0, 0, 0, 0];
    let activePlayer = 1;
    let blendMode = false;
    let blendStartTime = 0;
    let isAnimating = false;
    let animatingPlayers = new Set();
    const startTime = performance.now() / 1000;

    // Particles
    const particles = [];

    // Create player meshes
    for (let i = 0; i < 4; i++) {
        const geometry = createGeometry(0);
        const material = new THREE.MeshStandardMaterial({
            color: playerColors[i],
            metalness: 0.3,
            roughness: 0.4,
            emissive: playerColors[i],
            emissiveIntensity: 0.1
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(playerPositions[i]);
        mesh.castShadow = true;
        scene.add(mesh);

        // Add a ring indicator below each player
        const ringGeom = new THREE.RingGeometry(1.2, 1.4, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: playerColors[i], side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
        const ring = new THREE.Mesh(ringGeom, ringMat);
        ring.rotation.x = -Math.PI / 2;
        ring.position.set(playerPositions[i].x, 0.02, playerPositions[i].z);
        scene.add(ring);

        // Player label
        const canvas = document.createElement('canvas');
        canvas.width = 128;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 36px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('P' + (i + 1), 64, 42);
        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.8 });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.position.set(playerPositions[i].x, 3.2, playerPositions[i].z);
        sprite.scale.set(1, 0.5, 1);
        scene.add(sprite);

        players.push({
            mesh: mesh,
            ring: ring,
            material: material,
            originalColor: new THREE.Color(playerColors[i]),
            baseScale: 1.0,
            morphAnimating: false,
            morphPhase: 'none', // 'shrink', 'grow', 'none'
            morphStartTime: 0,
            targetShapeIndex: 0
        });
    }

    // Morph shape function
    function morphPlayerShape(playerIndex) {
        const player = players[playerIndex];
        if (player.morphAnimating) return;

        const currentIndex = playerShapeIndices[playerIndex];
        const nextIndex = (currentIndex + 1) % 4;

        player.morphAnimating = true;
        player.morphPhase = 'shrink';
        player.morphStartTime = performance.now();
        player.targetShapeIndex = nextIndex;
        animatingPlayers.add(playerIndex);
        isAnimating = true;

        morphCounts[playerIndex]++;

        // Emit particles
        emitParticles(playerPositions[playerIndex], player.originalColor);
    }

    // Particle system
    function emitParticles(position, color) {
        for (let i = 0; i < 20; i++) {
            const geom = new THREE.SphereGeometry(0.05, 8, 8);
            const mat = new THREE.MeshBasicMaterial({
                color: color,
                transparent: true,
                opacity: 1.0
            });
            const particle = new THREE.Mesh(geom, mat);
            particle.position.copy(position);

            const velocity = new THREE.Vector3(
                (Math.random() - 0.5) * 6,
                (Math.random() - 0.5) * 6,
                (Math.random() - 0.5) * 6
            );

            scene.add(particle);
            particles.push({
                mesh: particle,
                velocity: velocity,
                startTime: performance.now(),
                lifetime: 1000
            });
        }
    }

    // Update particles
    function updateParticles() {
        const now = performance.now();
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            const elapsed = now - p.startTime;
            const t = elapsed / p.lifetime;

            if (t >= 1.0) {
                scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
                particles.splice(i, 1);
                continue;
            }

            const dt = 0.016;
            p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
            p.velocity.multiplyScalar(0.96);
            p.mesh.material.opacity = 1.0 - t;
            const scale = 1.0 - t * 0.5;
            p.mesh.scale.set(scale, scale, scale);
        }
    }

    // Keyboard input
    document.addEventListener('keydown', (e) => {
        if (e.key >= '1' && e.key <= '4') {
            activePlayer = parseInt(e.key);
            updateHUD();
        }
        if (e.key === ' ' || e.code === 'Space') {
            e.preventDefault();
            morphPlayerShape(activePlayer - 1);
            updateHUD();
        }
    });

    // Blend button
    const blendBtn = document.getElementById('blendBtn');
    blendBtn.addEventListener('click', () => {
        blendMode = !blendMode;
        blendBtn.textContent = blendMode ? 'Stop Blend' : 'Blend Colors';
        if (blendMode) {
            blendStartTime = performance.now();
        } else {
            // Reset colors
            for (let i = 0; i < 4; i++) {
                players[i].material.color.copy(players[i].originalColor);
                players[i].material.emissive.copy(players[i].originalColor);
            }
        }
    });

    // HUD update
    function updateHUD() {
        const hud = document.getElementById('hud');
        let html = '<h3>🎮 Morph Arena</h3>';
        html += `<div class="active-indicator">Active: Player ${activePlayer}</div>`;
        html += '<hr style="border-color: rgba(100,100,180,0.3); margin: 6px 0;">';

        for (let i = 0; i < 4; i++) {
            const isActive = (i + 1) === activePlayer;
            const colorHex = '#' + playerColors[i].toString(16).padStart(6, '0');
            const indicator = isActive ? ' ◄' : '';
            html += `<div class="player-line">
                <span style="color:${colorHex}; font-weight:bold;">P${i + 1}</span>: 
                ${shapeNames[playerShapeIndices[i]]} 
                <span style="color:#888;">[morphs: ${morphCounts[i]}]</span>
                <span class="active-indicator">${indicator}</span>
            </div>`;
        }

        const totalMorphs = morphCounts.reduce((a, b) => a + b, 0);
        html += '<hr style="border-color: rgba(100,100,180,0.3); margin: 6px 0;">';
        html += `<div style="color:#888;">Total Morphs: ${totalMorphs}</div>`;
        html += `<div style="color:#888;">Particles: ${particles.length}</div>`;
        html += `<div style="color:#888;">Blend: ${blendMode ? 'ON' : 'OFF'}</div>`;

        hud.innerHTML = html;
    }

    // Color blending
    function updateColorBlending() {
        if (!blendMode) return;

        const elapsed = (performance.now() - blendStartTime) / 1000;
        const cycleDuration = 4.0; // 2s blend + 2s unblend
        const cycleTime = elapsed % cycleDuration;

        // Compute average color
        const avgColor = new THREE.Color(0, 0, 0);
        for (let i = 0; i < 4; i++) {
            avgColor.r += players[i].originalColor.r / 4;
            avgColor.g += players[i].originalColor.g / 4;
            avgColor.b += players[i].originalColor.b / 4;
        }

        let t;
        if (cycleTime < 2.0) {
            t = cycleTime / 2.0; // 0 to 1 (blend toward average)
        } else {
            t = 1.0 - (cycleTime - 2.0) / 2.0; // 1 to 0 (blend back)
        }

        // Smooth easing
        t = t * t * (3 - 2 * t);

        for (let i = 0; i < 4; i++) {
            const color = new THREE.Color().copy(players[i].originalColor);
            color.lerp(avgColor, t);
            players[i].material.color.copy(color);
            players[i].material.emissive.copy(color);
            players[i].material.emissiveIntensity = 0.1;
        }
    }

    // Morph animation update
    function updateMorphAnimations() {
        const now = performance.now();
        let anyAnimating = false;

        for (const playerIndex of animatingPlayers) {
            const player = players[playerIndex];
            const elapsed = now - player.morphStartTime;

            if (player.morphPhase === 'shrink') {
                const t = Math.min(elapsed / 200, 1.0);
                const eased = t * t;
                player.baseScale = 1.0 - 0.9 * eased;

                if (t >= 1.0) {
                    // Swap geometry
                    player.mesh.geometry.dispose();
                    player.mesh.geometry = createGeometry(player.targetShapeIndex);
                    playerShapeIndices[playerIndex] = player.targetShapeIndex;

                    player.morphPhase = 'grow';
                    player.morphStartTime = now;
                    updateHUD();
                }
                anyAnimating = true;
            } else if (player.morphPhase === 'grow') {
                const t = Math.min(elapsed / 200, 1.0);
                const eased = 1 - (1 - t) * (1 - t);
                player.baseScale = 0.1 + 0.9 * eased;

                if (t >= 1.0) {
                    player.baseScale = 1.0;
                    player.morphAnimating = false;
                    player.morphPhase = 'none';
                    animatingPlayers.delete(playerIndex);
                }
                anyAnimating = true;
            }
        }

        isAnimating = anyAnimating;
    }

    // Pulse animation
    function updatePulse(time) {
        for (let i = 0; i < 4; i++) {
            const player = players[i];
            const pulse = player.baseScale * (1.0 + 0.1 * Math.sin(time * 2 + phaseOffsets[i]));
            player.mesh.scale.set(pulse, pulse, pulse);

            // Update ring for active player
            const isActive = (i + 1) === activePlayer;
            player.ring.material.opacity = isActive ? 0.6 : 0.2;

            // Gentle rotation
            player.mesh.rotation.y += 0.005;
            player.mesh.rotation.x = Math.sin(time + phaseOffsets[i]) * 0.1;
        }
    }

    // State exposure
    window.__3D_STATE__ = {};

    function updateState(elapsedTime) {
        window.__3D_STATE__ = {
            activePlayer: activePlayer,
            playerShapes: playerShapeIndices.map(i => shapeNames[i]),
            playerShapeIndices: [...playerShapeIndices],
            morphCounts: [...morphCounts],
            totalMorphs: morphCounts.reduce((a, b) => a + b, 0),
            blendMode: blendMode,
            playerScales: players.map(p => p.mesh.scale.x),
            particleCount: particles.length,
            isAnimating: isAnimating,
            elapsedTime: elapsedTime
        };
    }

    // Window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial HUD
    updateHUD();

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);

        const elapsedTime = performance.now() / 1000 - startTime;

        controls.update();
        updateMorphAnimations();
        updatePulse(elapsedTime);
        updateColorBlending();
        updateParticles();
        updateState(elapsedTime);

        renderer.render(scene, camera);
    }

    animate();
})();
</script>
</body>
</html>
