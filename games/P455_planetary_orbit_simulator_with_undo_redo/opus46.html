<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Planetary Orbit Simulator</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    canvas {
        display: block;
    }
    #ui-panel {
        position: fixed;
        top: 10px;
        left: 10px;
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 15px 20px;
        border-radius: 10px;
        z-index: 100;
        min-width: 220px;
        backdrop-filter: blur(5px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #ui-panel h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
        color: #FFdd44;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 8px;
    }
    .btn-row {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
    }
    button {
        background: rgba(255, 255, 255, 0.15);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.3);
        padding: 6px 12px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        transition: background 0.2s;
    }
    button:hover {
        background: rgba(255, 255, 255, 0.3);
    }
    button:active {
        background: rgba(255, 255, 255, 0.4);
    }
    .slider-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
    }
    .slider-row label {
        font-size: 13px;
        white-space: nowrap;
    }
    input[type="range"] {
        flex: 1;
        accent-color: #FFdd44;
    }
    #speedDisplay {
        font-weight: bold;
        color: #FFdd44;
        min-width: 30px;
        text-align: right;
    }
    .hud-info {
        font-size: 12px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.8);
    }
    .hud-info span {
        color: #FFdd44;
        font-weight: bold;
    }
</style>
</head>
<body>

<div id="ui-panel">
    <h3>🪐 Orbit Simulator</h3>
    <div class="btn-row">
        <button id="addPlanetBtn">Add Planet</button>
        <button id="pauseBtn">Pause</button>
    </div>
    <div class="btn-row">
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
    </div>
    <div class="slider-row">
        <label>Speed:</label>
        <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0">
        <span id="speedDisplay">1.0</span>
    </div>
    <div class="hud-info">
        Planets: <span id="planetCount">0</span><br>
        Undo Stack: <span id="undoStackSize">0</span><br>
        Redo Stack: <span id="redoStackSize">0</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 30, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xFFDD44, 2, 200);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

// --- Starfield ---
function createStarfield() {
    const starsGeometry = new THREE.BufferGeometry();
    const starCount = 300;
    const positions = new Float32Array(starCount * 3);
    for (let i = 0; i < starCount; i++) {
        const r = 150 + Math.random() * 200;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    for (let i = 0; i < starCount; i++) {
        const starGeo = new THREE.SphereGeometry(0.15 + Math.random() * 0.2, 4, 4);
        const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const star = new THREE.Mesh(starGeo, starMat);
        const r = 150 + Math.random() * 200;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        star.position.set(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta),
            r * Math.cos(phi)
        );
        scene.add(star);
    }
}
createStarfield();

// --- Sun ---
const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFDD44 });
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
scene.add(sun);

// Sun glow
const glowGeometry = new THREE.SphereGeometry(3.5, 32, 32);
const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0xFFDD44,
    transparent: true,
    opacity: 0.2,
    side: THREE.BackSide
});
const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(sunGlow);

// --- Lantern ---
let lanternModel = null;
let lanternLoaded = false;
let lanternRotationY = 0;

const loader = new GLTFLoader();
loader.load('._Lantern.glb',
    (gltf) => {
        lanternModel = gltf.scene;
        lanternModel.position.set(20, 0, 0);
        lanternModel.scale.set(2, 2, 2);
        scene.add(lanternModel);
        lanternLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load lantern GLB, creating placeholder:', error);
        // Create a placeholder lantern
        const lanternGroup = new THREE.Group();
        
        // Lantern body
        const bodyGeo = new THREE.CylinderGeometry(0.5, 0.7, 1.5, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 0.5 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        lanternGroup.add(body);
        
        // Lantern top
        const topGeo = new THREE.ConeGeometry(0.6, 0.5, 8);
        const topMat = new THREE.MeshStandardMaterial({ color: 0x884400 });
        const top = new THREE.Mesh(topGeo, topMat);
        top.position.y = 1.0;
        lanternGroup.add(top);
        
        // Lantern light
        const lightGeo = new THREE.SphereGeometry(0.3, 8, 8);
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const lightMesh = new THREE.Mesh(lightGeo, lightMat);
        lanternGroup.add(lightMesh);
        
        // Add a point light to the lantern
        const lanternLight = new THREE.PointLight(0xff6600, 1, 10);
        lanternGroup.add(lanternLight);
        
        lanternGroup.position.set(20, 0, 0);
        lanternGroup.scale.set(2, 2, 2);
        scene.add(lanternGroup);
        lanternModel = lanternGroup;
        lanternLoaded = true;
    }
);

// --- Planet System ---
let planets = [];
let planetIndex = 0;
let undoStack = [];
let redoStack = [];
let isPaused = false;
let speedMultiplier = 1.0;
let frameCount = 0;

function createOrbitRing(distance) {
    const segments = 128;
    const points = [];
    for (let i = 0; i <= segments; i++) {
        const theta = (i / segments) * Math.PI * 2;
        points.push(new THREE.Vector3(
            distance * Math.cos(theta),
            0,
            distance * Math.sin(theta)
        ));
    }
    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({
        color: 0x444466,
        transparent: true,
        opacity: 0.4
    });
    return new THREE.LineLoop(geometry, material);
}

function createPlanet(distance, speed, radius, color, index) {
    const geometry = new THREE.SphereGeometry(radius, 16, 16);
    const material = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.7,
        metalness: 0.3
    });
    const mesh = new THREE.Mesh(geometry, material);
    const orbitRing = createOrbitRing(distance);
    
    const angle = Math.random() * Math.PI * 2;
    mesh.position.set(
        distance * Math.cos(angle),
        0,
        distance * Math.sin(angle)
    );
    
    scene.add(mesh);
    scene.add(orbitRing);
    
    const planet = {
        index: index,
        mesh: mesh,
        orbitRing: orbitRing,
        distance: distance,
        speed: speed,
        angle: angle,
        radius: radius,
        color: color
    };
    
    planets.push(planet);
    return planet;
}

function removePlanetFromScene(planet) {
    scene.remove(planet.mesh);
    scene.remove(planet.orbitRing);
    planet.mesh.geometry.dispose();
    planet.mesh.material.dispose();
    planet.orbitRing.geometry.dispose();
    planet.orbitRing.material.dispose();
}

function addPlanetToScene(planetData) {
    const geometry = new THREE.SphereGeometry(planetData.radius, 16, 16);
    const material = new THREE.MeshStandardMaterial({
        color: planetData.color,
        roughness: 0.7,
        metalness: 0.3
    });
    const mesh = new THREE.Mesh(geometry, material);
    const orbitRing = createOrbitRing(planetData.distance);
    
    mesh.position.set(
        planetData.distance * Math.cos(planetData.angle),
        0,
        planetData.distance * Math.sin(planetData.angle)
    );
    
    scene.add(mesh);
    scene.add(orbitRing);
    
    const planet = {
        index: planetData.index,
        mesh: mesh,
        orbitRing: orbitRing,
        distance: planetData.distance,
        speed: planetData.speed,
        angle: planetData.angle,
        radius: planetData.radius,
        color: planetData.color
    };
    
    planets.push(planet);
    return planet;
}

// --- Default Planet ---
createPlanet(15, 0.02, 1, 0x4488ff, planetIndex++);

// --- UI Elements ---
const addPlanetBtn = document.getElementById('addPlanetBtn');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const pauseBtn = document.getElementById('pauseBtn');
const speedSlider = document.getElementById('speedSlider');
const speedDisplay = document.getElementById('speedDisplay');
const planetCountEl = document.getElementById('planetCount');
const undoStackSizeEl = document.getElementById('undoStackSize');
const redoStackSizeEl = document.getElementById('redoStackSize');

// --- Add Planet ---
addPlanetBtn.addEventListener('click', () => {
    const distance = 8 + Math.random() * 27; // 8 to 35
    const speed = 0.1 / Math.sqrt(distance);
    const radius = 0.5 + Math.random() * 1.0;
    const color = Math.random() * 0xffffff;
    const index = planetIndex++;
    
    const planet = createPlanet(distance, speed, radius, color, index);
    
    undoStack.push({
        index: planet.index,
        distance: planet.distance,
        speed: planet.speed,
        angle: planet.angle,
        radius: planet.radius,
        color: planet.color
    });
    
    // Clear redo stack
    redoStack = [];
    
    updateHUD();
});

// --- Undo ---
undoBtn.addEventListener('click', () => {
    if (undoStack.length === 0) return;
    
    const lastAction = undoStack.pop();
    
    // Find and remove the planet with this index
    const planetIdx = planets.findIndex(p => p.index === lastAction.index);
    if (planetIdx !== -1) {
        const planet = planets[planetIdx];
        // Save current angle before removing
        lastAction.angle = planet.angle;
        removePlanetFromScene(planet);
        planets.splice(planetIdx, 1);
    }
    
    redoStack.push(lastAction);
    updateHUD();
});

// --- Redo ---
redoBtn.addEventListener('click', () => {
    if (redoStack.length === 0) return;
    
    const action = redoStack.pop();
    addPlanetToScene(action);
    undoStack.push(action);
    updateHUD();
});

// --- Pause/Resume ---
pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
});

// --- Speed Slider ---
speedSlider.addEventListener('input', () => {
    speedMultiplier = parseFloat(speedSlider.value);
    speedDisplay.textContent = speedMultiplier.toFixed(1);
});

// --- HUD Update ---
function updateHUD() {
    planetCountEl.textContent = planets.length;
    undoStackSizeEl.textContent = undoStack.length;
    redoStackSizeEl.textContent = redoStack.length;
}

// --- State ---
window.__3D_STATE__ = {
    planetCount: 0,
    isPaused: false,
    speedMultiplier: 1.0,
    undoStackSize: 0,
    redoStackSize: 0,
    lanternLoaded: false,
    lanternRotationY: 0,
    planets: [],
    totalOrbitalEnergy: 0,
    frameCount: 0
};

function updateState() {
    const state = window.__3D_STATE__;
    state.planetCount = planets.length;
    state.isPaused = isPaused;
    state.speedMultiplier = speedMultiplier;
    state.undoStackSize = undoStack.length;
    state.redoStackSize = redoStack.length;
    state.lanternLoaded = lanternLoaded;
    state.lanternRotationY = lanternRotationY;
    state.frameCount = frameCount;
    
    state.planets = planets.map(p => ({
        index: p.index,
        distance: p.distance,
        speed: p.speed,
        angle: p.angle,
        color: p.color
    }));
    
    state.totalOrbitalEnergy = planets.reduce((sum, p) => {
        return sum + 0.5 * p.speed * p.speed * p.distance;
    }, 0);
}

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);
    
    if (!isPaused) {
        frameCount++;
        
        // Update planets
        for (const planet of planets) {
            planet.angle += planet.speed * speedMultiplier;
            planet.angle = planet.angle % (Math.PI * 2);
            
            planet.mesh.position.x = planet.distance * Math.cos(planet.angle);
            planet.mesh.position.z = planet.distance * Math.sin(planet.angle);
            
            // Rotate planet on its axis
            planet.mesh.rotation.y += 0.02 * speedMultiplier;
        }
        
        // Rotate lantern
        if (lanternModel) {
            lanternModel.rotation.y += 0.005 * speedMultiplier;
            lanternRotationY = lanternModel.rotation.y;
        }
        
        // Pulse sun glow
        const glowScale = 1.0 + 0.05 * Math.sin(frameCount * 0.03);
        sunGlow.scale.set(glowScale, glowScale, glowScale);
    }
    
    controls.update();
    updateState();
    updateHUD();
    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial HUD update
updateHUD();

// Start animation
animate();
</script>
</body>
</html>
