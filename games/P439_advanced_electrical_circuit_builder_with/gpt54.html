<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Circuit Builder Education Tool</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b1110;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
    }

    #score-display {
      top: 16px;
      left: 16px;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    #mode-display {
      top: 16px;
      right: 16px;
      color: cyan;
      font-size: 24px;
      font-weight: bold;
    }

    #circuit-status {
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: yellow;
      font-size: 24px;
      font-weight: bold;
    }

    #current-display {
      bottom: 16px;
      left: 16px;
      color: #4cff7a;
      font-size: 24px;
      font-weight: bold;
    }

    #evaluate-btn {
      position: absolute;
      z-index: 11;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      padding: 12px 24px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      background: linear-gradient(180deg, #2d7dff, #1a52b8);
      border: 1px solid #76a9ff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(45,125,255,0.5);
    }

    #evaluate-btn:hover {
      filter: brightness(1.1);
    }

    #help {
      position: absolute;
      z-index: 10;
      top: 56px;
      left: 16px;
      color: #d0d0d0;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 330px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="score-display" class="hud">Score: 0</div>
  <div id="mode-display" class="hud">Mode: Build</div>
  <div id="circuit-status" class="hud">Circuit Status: Open</div>
  <div id="current-display" class="hud">Current: 0.00 A</div>
  <button id="evaluate-btn">Evaluate Circuit</button>

  <div id="help">
    Keys: <b>C</b> Connect Mode, <b>X</b> Delete Mode, <b>S</b> Toggle Switch, <b>R</b> Reset, <b>E</b> Evaluate<br/>
    Build: click tray component, then click grid to place.<br/>
    Connect: click two placed components to wire them.
  </div>

  <script>
    window.__3D_STATE__ = {
      lampLoaded: false,
      mode: 'build',
      score: 0,
      componentsPlaced: 0,
      connectionsCount: 0,
      switchClosed: false,
      circuitComplete: false,
      circuitStatus: 'open',
      ledGlowing: false,
      currentAmps: 0,
      selectedComponent: null
    };
  </script>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1110);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const workbenchGeo = new THREE.PlaneGeometry(20, 20);
    const workbenchMat = new THREE.MeshStandardMaterial({
      color: 0x123b24,
      roughness: 0.9,
      metalness: 0.05,
      side: THREE.DoubleSide
    });
    const workbench = new THREE.Mesh(workbenchGeo, workbenchMat);
    workbench.rotation.x = -Math.PI / 2;
    workbench.position.y = 0;
    workbench.name = 'workbench';
    scene.add(workbench);

    const gridHelper = new THREE.GridHelper(20, 20, 0x88ff88, 0x3b7d4a);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    const trayGeo = new THREE.BoxGeometry(1.8, 0.3, 12);
    const trayMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const tray = new THREE.Mesh(trayGeo, trayMat);
    tray.position.set(-9, 0.15, 1);
    scene.add(tray);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const scoreDisplay = document.getElementById('score-display');
    const modeDisplay = document.getElementById('mode-display');
    const circuitStatusDisplay = document.getElementById('circuit-status');
    const currentDisplay = document.getElementById('current-display');
    const evaluateBtn = document.getElementById('evaluate-btn');

    const trayComponents = [];
    const placedComponents = [];
    const connections = [];

    let selectedTrayTemplate = null;
    let selectedPlacedForConnect = null;
    let lampModel = null;
    let lampPointLight = null;

    function makeLabelSprite(text) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffffff';
      ctx.font = '28px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(2.2, 0.55, 1);
      sprite.position.set(0, 1.0, 0);
      return sprite;
    }

    function createBattery() {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xffdd33, emissive: 0x000000 })
      );
      group.add(body);

      const plusCap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.1, 16),
        new THREE.MeshStandardMaterial({ color: 0xcccccc })
      );
      plusCap.rotation.z = Math.PI / 2;
      plusCap.position.set(0.55, 0, 0);
      group.add(plusCap);

      const minusCap = plusCap.clone();
      minusCap.position.set(-0.55, 0, 0);
      group.add(minusCap);

      group.userData.kind = 'battery';
      return group;
    }

    function createResistor() {
      const group = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 1, 24),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b, emissive: 0x000000 })
      );
      body.rotation.z = Math.PI / 2;
      group.add(body);

      const leadMat = new THREE.MeshStandardMaterial({ color: 0xb0b0b0 });
      const lead1 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.4, 12), leadMat);
      lead1.rotation.z = Math.PI / 2;
      lead1.position.x = -0.7;
      const lead2 = lead1.clone();
      lead2.position.x = 0.7;
      group.add(lead1, lead2);

      group.userData.kind = 'resistor';
      return group;
    }

    function createLED() {
      const group = new THREE.Group();
      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 24, 24),
        new THREE.MeshStandardMaterial({
          color: 0xff3333,
          emissive: 0x220000,
          emissiveIntensity: 0.2,
          transparent: true,
          opacity: 0.95
        })
      );
      bulb.position.y = 0.25;
      group.add(bulb);

      const base = new THREE.Mesh(
        new THREE.ConeGeometry(0.22, 0.4, 20),
        new THREE.MeshStandardMaterial({ color: 0x999999, emissive: 0x000000 })
      );
      base.position.y = -0.05;
      group.add(base);

      group.userData.kind = 'led';
      group.userData.ledBulb = bulb;
      return group;
    }

    function createWireTemplate() {
      const group = new THREE.Group();
      const wire = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 1, 16),
        new THREE.MeshStandardMaterial({ color: 0x999999, emissive: 0x000000 })
      );
      wire.rotation.z = Math.PI / 2;
      group.add(wire);
      group.userData.kind = 'wire';
      return group;
    }

    function createSwitch() {
      const group = new THREE.Group();
      const base = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.25, 0.5),
        new THREE.MeshStandardMaterial({ color: 0x4d4d4d, emissive: 0x000000 })
      );
      group.add(base);

      const lever = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.5, 0.08),
        new THREE.MeshStandardMaterial({ color: 0xc0c0c0, emissive: 0x000000 })
      );
      lever.position.set(0, 0.35, 0);
      lever.rotation.z = -Math.PI / 4;
      group.add(lever);

      group.userData.kind = 'switch';
      group.userData.lever = lever;
      group.userData.closed = false;
      return group;
    }

    function createTemplate(type, label, position) {
      let obj;
      if (type === 'battery') obj = createBattery();
      if (type === 'resistor') obj = createResistor();
      if (type === 'led') obj = createLED();
      if (type === 'wire') obj = createWireTemplate();
      if (type === 'switch') obj = createSwitch();

      obj.position.copy(position);
      obj.userData.isTray = true;
      obj.userData.templateType = type;
      obj.add(makeLabelSprite(label));

      obj.traverse(child => {
        if (child.isMesh) {
          child.userData.parentComponent = obj;
          child.userData.isInteractive = true;
        }
      });

      scene.add(obj);
      trayComponents.push(obj);
      return obj;
    }

    createTemplate('battery', 'Battery 9V', new THREE.Vector3(-9, 1, -3));
    createTemplate('resistor', 'Resistor 100Ω', new THREE.Vector3(-9, 1, -1));
    createTemplate('led', 'LED', new THREE.Vector3(-9, 1, 1));
    createTemplate('wire', 'Wire', new THREE.Vector3(-9, 1, 3));
    createTemplate('switch', 'Switch', new THREE.Vector3(-9, 1, 5));

    function instantiatePlacedComponent(type, position) {
      let obj;
      if (type === 'battery') obj = createBattery();
      if (type === 'resistor') obj = createResistor();
      if (type === 'led') obj = createLED();
      if (type === 'wire') obj = createWireTemplate();
      if (type === 'switch') obj = createSwitch();

      obj.position.copy(position);
      obj.userData.isPlaced = true;
      obj.userData.id = crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
      obj.userData.connections = [];

      obj.add(makeLabelSprite(type.charAt(0).toUpperCase() + type.slice(1)));

      obj.traverse(child => {
        if (child.isMesh) {
          child.userData.parentComponent = obj;
          child.userData.isInteractive = true;
          child.castShadow = false;
          child.receiveShadow = false;
        }
      });

      scene.add(obj);
      placedComponents.push(obj);
      updateCounts();
      return obj;
    }

    function setHighlight(component, on) {
      component.traverse(child => {
        if (child.isMesh && child.material && child.material.emissive !== undefined) {
          if (!child.userData.baseEmissive) {
            child.userData.baseEmissive = child.material.emissive.clone();
          }
          child.material.emissive.set(on ? 0xffff00 : child.userData.baseEmissive);
        }
      });
    }

    function clearHighlights() {
      trayComponents.forEach(c => setHighlight(c, false));
      placedComponents.forEach(c => setHighlight(c, false));
    }

    function snapToGrid(point) {
      const x = Math.max(-9, Math.min(9, Math.round(point.x)));
      const z = Math.max(-9, Math.min(9, Math.round(point.z)));
      return new THREE.Vector3(x, 0.5, z);
    }

    function getInteractiveObjects() {
      const arr = [];
      [...trayComponents, ...placedComponents].forEach(root => {
        root.traverse(child => {
          if (child.isMesh) arr.push(child);
        });
      });
      return arr;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${window.__3D_STATE__.score}`;
      const mode = window.__3D_STATE__.mode;
      modeDisplay.textContent = `Mode: ${mode.charAt(0).toUpperCase() + mode.slice(1)}`;
      const statusMap = { open: 'Open', closed: 'Closed', invalid: 'Invalid' };
      circuitStatusDisplay.textContent = `Circuit Status: ${statusMap[window.__3D_STATE__.circuitStatus]}`;
      currentDisplay.textContent = `Current: ${window.__3D_STATE__.currentAmps.toFixed(2)} A`;
    }

    function updateCounts() {
      window.__3D_STATE__.componentsPlaced = placedComponents.length;
      window.__3D_STATE__.connectionsCount = connections.length;
      updateHUD();
    }

    function addConnection(a, b) {
      if (!a || !b || a === b) return;
      const exists = connections.find(conn =>
        (conn.a === a && conn.b === b) || (conn.a === b && conn.b === a)
      );
      if (exists) return;

      const points = [a.position.clone(), b.position.clone()];
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color: 0x00ff66 });
      const line = new THREE.Line(geo, mat);
      scene.add(line);

      const connection = { a, b, line };
      connections.push(connection);
      a.userData.connections.push(b.userData.id);
      b.userData.connections.push(a.userData.id);
      updateCounts();
    }

    function removeConnectionsForComponent(component) {
      for (let i = connections.length - 1; i >= 0; i--) {
        const conn = connections[i];
        if (conn.a === component || conn.b === component) {
          scene.remove(conn.line);
          const other = conn.a === component ? conn.b : conn.a;
          if (other?.userData?.connections) {
            other.userData.connections = other.userData.connections.filter(id => id !== component.userData.id);
          }
          connections.splice(i, 1);
        }
      }
    }

    function updateConnectionLines() {
      for (const conn of connections) {
        const pts = [conn.a.position.clone(), conn.b.position.clone()];
        conn.line.geometry.dispose();
        conn.line.geometry = new THREE.BufferGeometry().setFromPoints(pts);
      }
    }

    function setLEDGlow(on) {
      const leds = placedComponents.filter(c => c.userData.kind === 'led');
      leds.forEach(led => {
        const bulb = led.userData.ledBulb;
        if (bulb && bulb.material) {
          bulb.material.emissive.set(on ? 0xff2222 : 0x220000);
          bulb.material.emissiveIntensity = on ? 1.0 : 0.2;
        }
      });
      window.__3D_STATE__.ledGlowing = on;
    }

    function setLampGlow(on) {
      if (!lampModel) return;
      if (on) {
        if (!lampPointLight) {
          lampPointLight = new THREE.PointLight(0xffddaa, 2, 8);
          lampPointLight.position.set(8, 2.2, -8);
          scene.add(lampPointLight);
        }
      } else {
        if (lampPointLight) {
          scene.remove(lampPointLight);
          lampPointLight = null;
        }
      }
    }

    function evaluateCircuit() {
      const battery = placedComponents.find(c => c.userData.kind === 'battery');
      const resistor = placedComponents.find(c => c.userData.kind === 'resistor');
      const led = placedComponents.find(c => c.userData.kind === 'led');
      const sw = placedComponents.find(c => c.userData.kind === 'switch');

      let score = 0;
      if (battery) score += 10;
      if (resistor) score += 10;
      if (led) score += 10;
      if (sw) score += 10;
      score += connections.length * 10;

      let complete = false;
      let status = 'invalid';
      let current = 0;

      if (battery || resistor || led || sw || connections.length > 0) {
        status = 'open';
      }

      if (battery && resistor && led && sw) {
        const graph = new Map();
        placedComponents.forEach(c => graph.set(c.userData.id, []));
        connections.forEach(conn => {
          graph.get(conn.a.userData.id)?.push(conn.b);
          graph.get(conn.b.userData.id)?.push(conn.a);
        });

        const ids = [battery.userData.id, resistor.userData.id, led.userData.id, sw.userData.id];

        const requiredReachable = ids.every(id => {
          const node = placedComponents.find(c => c.userData.id === id);
          return graph.get(id)?.length > 0 && node;
        });

        const batteryConnectedToSwitch = connections.some(conn =>
          (conn.a === battery && conn.b === sw) || (conn.a === sw && conn.b === battery)
        ) || connections.some(conn =>
          (conn.a === battery && conn.b.userData.kind === 'wire') || (conn.b === battery && conn.a.userData.kind === 'wire')
        );

        const hasPath = (start, target, visited = new Set()) => {
          if (start.userData.id === target.userData.id) return true;
          visited.add(start.userData.id);
          for (const conn of connections) {
            let next = null;
            if (conn.a === start) next = conn.b;
            else if (conn.b === start) next = conn.a;
            if (next && !visited.has(next.userData.id)) {
              if (hasPath(next, target, visited)) return true;
            }
          }
          return false;
        };

        const pathBR = hasPath(battery, resistor);
        const pathRL = hasPath(resistor, led);
        const pathLB = hasPath(led, battery);
        const pathBS = hasPath(battery, sw);
        const pathSL = hasPath(sw, led) || hasPath(sw, resistor);

        complete = requiredReachable && pathBR && pathRL && pathLB && pathBS && pathSL;

        if (complete && window.__3D_STATE__.switchClosed) {
          status = 'closed';
          score = 100;
          current = 9 / 100;
        } else if (complete) {
          status = 'open';
        } else {
          status = 'invalid';
        }
      }

      window.__3D_STATE__.score = score;
      window.__3D_STATE__.circuitComplete = complete && window.__3D_STATE__.switchClosed;
      window.__3D_STATE__.circuitStatus = status;
      window.__3D_STATE__.currentAmps = current;

      const powered = complete && window.__3D_STATE__.switchClosed;
      setLEDGlow(powered);
      setLampGlow(powered);

      updateHUD();
    }

    function resetScene() {
      clearHighlights();
      selectedTrayTemplate = null;
      selectedPlacedForConnect = null;
      window.__3D_STATE__.selectedComponent = null;
      window.__3D_STATE__.score = 0;
      window.__3D_STATE__.switchClosed = false;
      window.__3D_STATE__.circuitComplete = false;
      window.__3D_STATE__.circuitStatus = 'open';
      window.__3D_STATE__.ledGlowing = false;
      window.__3D_STATE__.currentAmps = 0;

      for (let i = placedComponents.length - 1; i >= 0; i--) {
        const c = placedComponents[i];
        scene.remove(c);
        placedComponents.splice(i, 1);
      }

      for (let i = connections.length - 1; i >= 0; i--) {
        scene.remove(connections[i].line);
        connections.splice(i, 1);
      }

      setLampGlow(false);
      updateCounts();
      updateHUD();
    }

    function togglePlacedSwitches() {
      const switches = placedComponents.filter(c => c.userData.kind === 'switch');
      if (!switches.length) return;
      window.__3D_STATE__.switchClosed = !window.__3D_STATE__.switchClosed;

      switches.forEach(sw => {
        sw.userData.closed = window.__3D_STATE__.switchClosed;
        if (sw.userData.lever) {
          sw.userData.lever.rotation.z = window.__3D_STATE__.switchClosed ? Math.PI / 4 : -Math.PI / 4;
        }
      });

      evaluateCircuit();
    }

    function screenToMouse(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function onPointerDown(event) {
      screenToMouse(event);
      raycaster.setFromCamera(mouse, camera);

      const mode = window.__3D_STATE__.mode;
      const intersects = raycaster.intersectObjects(getInteractiveObjects(), true);

      if (mode === 'build') {
        if (intersects.length) {
          const hit = intersects[0].object.userData.parentComponent;
          if (hit?.userData?.isTray) {
            clearHighlights();
            setHighlight(hit, true);
            selectedTrayTemplate = hit.userData.templateType;
            window.__3D_STATE__.selectedComponent = selectedTrayTemplate;
            return;
          }
        }

        if (selectedTrayTemplate) {
          const planeHit = raycaster.intersectObject(workbench);
          if (planeHit.length) {
            const pos = snapToGrid(planeHit[0].point);
            instantiatePlacedComponent(selectedTrayTemplate, pos);
            if (selectedTrayTemplate === 'wire') {
              // clicking tray wire spawns a new wire segment; placement also uses same flow
            }
            clearHighlights();
            selectedTrayTemplate = null;
            window.__3D_STATE__.selectedComponent = null;
            evaluateCircuit();
          }
        }
      }

      if (mode === 'connect') {
        if (intersects.length) {
          const hit = intersects[0].object.userData.parentComponent;
          if (hit?.userData?.isPlaced) {
            if (!selectedPlacedForConnect) {
              clearHighlights();
              selectedPlacedForConnect = hit;
              setHighlight(hit, true);
            } else {
              addConnection(selectedPlacedForConnect, hit);
              clearHighlights();
              selectedPlacedForConnect = null;
              evaluateCircuit();
            }
          }
        }
      }

      if (mode === 'delete') {
        if (intersects.length) {
          const hit = intersects[0].object.userData.parentComponent;
          if (hit?.userData?.isPlaced) {
            removeConnectionsForComponent(hit);
            scene.remove(hit);
            const idx = placedComponents.indexOf(hit);
            if (idx >= 0) placedComponents.splice(idx, 1);
            evaluateCircuit();
            updateCounts();
          }
        }
      }
    }

    window.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (key === 'c') {
        window.__3D_STATE__.mode = window.__3D_STATE__.mode === 'connect' ? 'build' : 'connect';
        selectedPlacedForConnect = null;
        clearHighlights();
        updateHUD();
      }

      if (key === 'x') {
        window.__3D_STATE__.mode = window.__3D_STATE__.mode === 'delete' ? 'build' : 'delete';
        selectedPlacedForConnect = null;
        clearHighlights();
        updateHUD();
      }

      if (key === 's') {
        togglePlacedSwitches();
      }

      if (key === 'r') {
        resetScene();
      }

      if (key === 'e') {
        evaluateCircuit();
      }
    });

    evaluateBtn.addEventListener('click', evaluateCircuit);

    const loader = new GLTFLoader();
    loader.load(
      'IridescenceLamp.glb',
      (gltf) => {
        lampModel = gltf.scene;
        lampModel.scale.set(0.5, 0.5, 0.5);
        lampModel.position.set(8, 0, -8);
        scene.add(lampModel);
        window.__3D_STATE__.lampLoaded = true;
      },
      undefined,
      () => {
        const fallbackLamp = new THREE.Group();
        const stem = new THREE.Mesh(
          new THREE.CylinderGeometry(0.08, 0.08, 2, 16),
          new THREE.MeshStandardMaterial({ color: 0x999999 })
        );
        stem.position.y = 1;

        const head = new THREE.Mesh(
          new THREE.ConeGeometry(0.5, 0.8, 20),
          new THREE.MeshStandardMaterial({ color: 0x6666aa })
        );
        head.rotation.z = Math.PI / 3;
        head.position.set(0.3, 2, 0);

        const base = new THREE.Mesh(
          new THREE.CylinderGeometry(0.5, 0.6, 0.15, 20),
          new THREE.MeshStandardMaterial({ color: 0x444444 })
        );
        base.position.y = 0.075;

        fallbackLamp.add(stem, head, base);
        fallbackLamp.scale.set(0.5, 0.5, 0.5);
        fallbackLamp.position.set(8, 0, -8);
        scene.add(fallbackLamp);
        lampModel = fallbackLamp;
        window.__3D_STATE__.lampLoaded = true;
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateConnectionLines();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
