<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Electrical Circuit Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-text {
            position: absolute;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #score-display {
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
        }
        #mode-display {
            top: 20px;
            right: 20px;
            color: cyan;
            font-size: 20px;
        }
        #circuit-status {
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: yellow;
            font-size: 22px;
        }
        #current-display {
            bottom: 20px;
            left: 20px;
            color: #00ff00;
            font-size: 20px;
        }
        #evaluate-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #0055ff;
            color: white;
            border: 2px solid #ffffff;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            pointer-events: auto;
            transition: background-color 0.2s;
        }
        #evaluate-btn:hover {
            background-color: #0077ff;
        }
        #evaluate-btn:active {
            background-color: #0033cc;
        }
        #instructions {
            position: absolute;
            top: 60px;
            right: 20px;
            color: #ccc;
            font-size: 14px;
            text-align: right;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <script>
        // Initialize State BEFORE async loading
        window.__3D_STATE__ = {
            lampLoaded: false,
            mode: 'build', // 'build' | 'connect' | 'delete'
            score: 0,
            componentsPlaced: 0,
            connectionsCount: 0,
            switchClosed: false,
            circuitComplete: false,
            circuitStatus: 'open',
            ledGlowing: false,
            currentAmps: 0,
            selectedComponent: null
        };
    </script>

    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="score-display" class="hud-text">Score: 0</div>
        <div id="mode-display" class="hud-text">Mode: Build</div>
        <div id="instructions">
            Click tray items to select.<br>
            Click grid to place.<br>
            <b>C</b>: Toggle Connect Mode<br>
            <b>X</b>: Toggle Delete Mode<br>
            <b>S</b>: Toggle Switch<br>
            <b>R</b>: Reset Circuit<br>
            <b>E</b>: Evaluate
        </div>
        <div id="circuit-status" class="hud-text">Circuit Status: Open</div>
        <div id="current-display" class="hud-text">Current: 0.00 A</div>
        <button id="evaluate-btn">Evaluate Circuit</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        scene.add(dirLight);

        // Workbench
        const planeGeom = new THREE.PlaneGeometry(20, 20);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x003300 });
        const plane = new THREE.Mesh(planeGeom, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        scene.add(plane);

        const gridHelper = new THREE.GridHelper(20, 20, 0x00ff00, 0x005500);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Lamp Setup
        let lampLight;
        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            'IridescenceLamp.glb',
            (gltf) => {
                const lamp = gltf.scene;
                lamp.scale.set(0.5, 0.5, 0.5);
                lamp.position.set(8, 0, -8);
                lamp.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(lamp);
                
                lampLight = new THREE.PointLight(0xffdd88, 0, 10);
                lampLight.position.set(8, 2, -8);
                scene.add(lampLight);

                window.__3D_STATE__.lampLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Could not load IridescenceLamp.glb, creating fallback.", error);
                // Fallback lamp
                const fallbackGroup = new THREE.Group();
                const base = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.2), new THREE.MeshStandardMaterial({color: 0x555555}));
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 2), new THREE.MeshStandardMaterial({color: 0x555555}));
                stem.position.y = 1;
                const head = new THREE.Mesh(new THREE.ConeGeometry(0.6, 0.8), new THREE.MeshStandardMaterial({color: 0x888888}));
                head.position.y = 2;
                fallbackGroup.add(base, stem, head);
                fallbackGroup.scale.set(0.5, 0.5, 0.5);
                fallbackGroup.position.set(8, 0, -8);
                scene.add(fallbackGroup);

                lampLight = new THREE.PointLight(0xffdd88, 0, 10);
                lampLight.position.set(8, 1, -8);
                scene.add(lampLight);

                window.__3D_STATE__.lampLoaded = true;
            }
        );

        // --- Component Definitions ---
        const materials = {
            battery: new THREE.MeshStandardMaterial({ color: 0xffff00 }),
            resistor: new THREE.MeshStandardMaterial({ color: 0x8b4513 }),
            ledBase: new THREE.MeshStandardMaterial({ color: 0x555555 }),
            ledBulbOff: new THREE.MeshStandardMaterial({ color: 0x880000 }),
            ledBulbOn: new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 1.0 }),
            wire: new THREE.MeshStandardMaterial({ color: 0x888888 }),
            switchBase: new THREE.MeshStandardMaterial({ color: 0x222222 }),
            switchLever: new THREE.MeshStandardMaterial({ color: 0xaaaaaa }),
            highlight: new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x555500, transparent: true, opacity: 0.8 })
        };

        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 64;
            context.font = "Bold 30px Arial";
            context.fillStyle = "white";
            context.textAlign = "center";
            context.fillText(message, 128, 40);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(2, 0.5, 1);
            sprite.position.y = 1.2;
            return sprite;
        }

        function createBattery() {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 0.5), materials.battery.clone());
            mesh.castShadow = true;
            return mesh;
        }

        function createResistor() {
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 1, 16), materials.resistor.clone());
            mesh.rotation.z = Math.PI / 2;
            mesh.castShadow = true;
            return mesh;
        }

        function createLED() {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.4, 16), materials.ledBase.clone());
            base.position.y = 0.2;
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), materials.ledBulbOff.clone());
            bulb.position.y = 0.5;
            bulb.name = "bulb";
            group.add(base, bulb);
            group.traverse(c => { if(c.isMesh) c.castShadow = true; });
            return group;
        }

        function createWireNode() {
            const mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2, 16), materials.wire.clone());
            mesh.castShadow = true;
            return mesh;
        }

        function createSwitch() {
            const group = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.2, 0.4), materials.switchBase.clone());
            base.position.y = 0.1;
            
            const pivot = new THREE.Group();
            pivot.position.set(0, 0.2, 0);
            const lever = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), materials.switchLever.clone());
            lever.position.y = 0.3;
            pivot.add(lever);
            pivot.name = "pivot";
            
            // Initial state: open (rotated)
            pivot.rotation.z = -Math.PI / 4;

            group.add(base, pivot);
            group.traverse(c => { if(c.isMesh) c.castShadow = true; });
            return group;
        }

        // --- Tray Setup ---
        const trayItems = [];
        const trayConfigs = [
            { type: 'battery', create: createBattery, z: -3, label: 'Battery (9V)' },
            { type: 'resistor', create: createResistor, z: -1, label: 'Resistor (100Ω)' },
            { type: 'led', create: createLED, z: 1, label: 'LED' },
            { type: 'wire', create: createWireNode, z: 3, label: 'Wire Node' },
            { type: 'switch', create: createSwitch, z: 5, label: 'Switch' }
        ];

        trayConfigs.forEach(config => {
            const obj = config.create();
            obj.position.set(-9, 0.5, config.z);
            obj.userData = { isTrayItem: true, type: config.type };
            
            // Add invisible hit box for easier clicking on groups
            const hitBox = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshBasicMaterial({visible: false}));
            hitBox.userData = obj.userData;
            obj.add(hitBox);

            const label = createTextSprite(config.label);
            obj.add(label);
            
            scene.add(obj);
            trayItems.push(obj);
        });

        // --- Interaction State ---
        const placedComponents = [];
        const connections = [];
        let componentIdCounter = 0;
        let connectStartNode = null;
        let hoverMesh = null;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // --- Helper Functions ---
        function updateUI() {
            document.getElementById('score-display').innerText = `Score: ${window.__3D_STATE__.score}`;
            
            let modeText = window.__3D_STATE__.mode.charAt(0).toUpperCase() + window.__3D_STATE__.mode.slice(1);
            document.getElementById('mode-display').innerText = `Mode: ${modeText}`;
            
            document.getElementById('circuit-status').innerText = `Circuit Status: ${window.__3D_STATE__.circuitStatus.toUpperCase()}`;
            document.getElementById('circuit-status').style.color = 
                window.__3D_STATE__.circuitStatus === 'closed' ? '#00ff00' : 
                window.__3D_STATE__.circuitStatus === 'invalid' ? '#ff0000' : 'yellow';
            
            document.getElementById('current-display').innerText = `Current: ${window.__3D_STATE__.currentAmps.toFixed(2)} A`;
        }

        function setMode(newMode) {
            window.__3D_STATE__.mode = newMode;
            window.__3D_STATE__.selectedComponent = null;
            connectStartNode = null;
            clearHighlights();
            updateUI();
        }

        function clearHighlights() {
            trayItems.forEach(item => setHighlight(item, false));
            placedComponents.forEach(comp => setHighlight(comp.mesh, false));
        }

        function setHighlight(obj, isHighlighted) {
            obj.traverse(child => {
                if (child.isMesh && child.material && child.name !== "bulb" && child.geometry.type !== 'BoxGeometry' /* ignore hitbox */) {
                    if (isHighlighted) {
                        if (!child.userData.origMat) child.userData.origMat = child.material;
                        child.material = materials.highlight;
                    } else {
                        if (child.userData.origMat) {
                            child.material = child.userData.origMat;
                        }
                    }
                }
            });
        }

        function getIntersectedObject(event, objects) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects, true);
            if (intersects.length > 0) {
                // Find root object with userData
                let obj = intersects[0].object;
                while (obj.parent && !obj.userData.type && !obj.userData.isPlacedItem) {
                    obj = obj.parent;
                }
                return { object: obj, point: intersects[0].point };
            }
            return null;
        }

        function drawConnection(compA, compB) {
            const material = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
            const points = [];
            points.push(new THREE.Vector3(compA.mesh.position.x, 0.5, compA.mesh.position.z));
            points.push(new THREE.Vector3(compB.mesh.position.x, 0.5, compB.mesh.position.z));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, material);
            scene.add(line);
            
            connections.push({
                fromId: compA.id,
                toId: compB.id,
                lineMesh: line
            });
            window.__3D_STATE__.connectionsCount++;
        }

        function removeComponent(comp) {
            scene.remove(comp.mesh);
            const index = placedComponents.indexOf(comp);
            if (index > -1) placedComponents.splice(index, 1);
            
            // Remove associated connections
            for (let i = connections.length - 1; i >= 0; i--) {
                if (connections[i].fromId === comp.id || connections[i].toId === comp.id) {
                    scene.remove(connections[i].lineMesh);
                    connections.splice(i, 1);
                    window.__3D_STATE__.connectionsCount--;
                }
            }
            window.__3D_STATE__.componentsPlaced--;
        }

        function toggleSwitchState() {
            let toggled = false;
            placedComponents.forEach(comp => {
                if (comp.type === 'switch') {
                    comp.isClosed = !comp.isClosed;
                    const pivot = comp.mesh.getObjectByName("pivot");
                    if (pivot) {
                        pivot.rotation.z = comp.isClosed ? 0 : -Math.PI / 4;
                    }
                    toggled = true;
                }
            });
            if (toggled) {
                // Check if any switch is closed
                window.__3D_STATE__.switchClosed = placedComponents.some(c => c.type === 'switch' && c.isClosed);
                evaluateCircuitLogic();
            }
        }

        function resetCircuit() {
            [...placedComponents].forEach(comp => removeComponent(comp));
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.switchClosed = false;
            window.__3D_STATE__.circuitComplete = false;
            window.__3D_STATE__.circuitStatus = 'open';
            window.__3D_STATE__.ledGlowing = false;
            window.__3D_STATE__.currentAmps = 0;
            updateVisuals();
            updateUI();
        }

        function evaluateCircuitLogic() {
            let score = 0;
            let hasBat = false, hasRes = false, hasLed = false, hasSw = false;
            
            placedComponents.forEach(c => {
                if (c.type === 'battery') { hasBat = true; score += 10; }
                if (c.type === 'resistor') { hasRes = true; score += 10; }
                if (c.type === 'led') { hasLed = true; score += 10; }
                if (c.type === 'switch') { hasSw = true; score += 10; }
            });
            
            score += connections.length * 10;

            let isComplete = false;
            
            // Simplified graph check: Are all required components present and is the graph connected?
            if (hasBat && hasRes && hasLed && hasSw) {
                const adj = {};
                placedComponents.forEach(c => adj[c.id] = []);
                connections.forEach(conn => {
                    if (adj[conn.fromId] && adj[conn.toId]) {
                        adj[conn.fromId].push(conn.toId);
                        adj[conn.toId].push(conn.fromId);
                    }
                });

                if (placedComponents.length > 0) {
                    const startNode = placedComponents[0].id;
                    const visited = new Set();
                    const q = [startNode];
                    visited.add(startNode);
                    
                    while (q.length > 0) {
                        const curr = q.shift();
                        adj[curr].forEach(neighbor => {
                            if (!visited.has(neighbor)) {
                                visited.add(neighbor);
                                q.push(neighbor);
                            }
                        });
                    }

                    // Check if all nodes have degree >= 2 (simple loop check)
                    let isLoop = true;
                    for (let id in adj) {
                        if (adj[id].length < 2) isLoop = false;
                    }

                    if (visited.size === placedComponents.length && isLoop) {
                        isComplete = true;
                    }
                }
            }

            const isClosed = window.__3D_STATE__.switchClosed;

            if (isComplete && isClosed) {
                window.__3D_STATE__.score = 100;
                window.__3D_STATE__.circuitComplete = true;
                window.__3D_STATE__.circuitStatus = 'closed';
                window.__3D_STATE__.ledGlowing = true;
                window.__3D_STATE__.currentAmps = 0.09; // 9V / 100ohm
            } else {
                window.__3D_STATE__.score = Math.min(score, 90);
                window.__3D_STATE__.circuitComplete = false;
                window.__3D_STATE__.circuitStatus = isComplete ? 'open' : (placedComponents.length > 0 ? 'invalid' : 'open');
                window.__3D_STATE__.ledGlowing = false;
                window.__3D_STATE__.currentAmps = 0;
            }

            updateVisuals();
            updateUI();
        }

        function updateVisuals() {
            // Update LEDs
            placedComponents.forEach(comp => {
                if (comp.type === 'led') {
                    const bulb = comp.mesh.getObjectByName("bulb");
                    if (bulb) {
                        bulb.material = window.__3D_STATE__.ledGlowing ? materials.ledBulbOn : materials.ledBulbOff;
                    }
                }
            });

            // Update Lamp
            if (lampLight) {
                lampLight.intensity = window.__3D_STATE__.ledGlowing ? 2 : 0;
            }
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('evaluate-btn').addEventListener('click', evaluateCircuitLogic);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'c') {
                setMode(window.__3D_STATE__.mode === 'connect' ? 'build' : 'connect');
            } else if (key === 'x') {
                setMode(window.__3D_STATE__.mode === 'delete' ? 'build' : 'delete');
            } else if (key === 's') {
                toggleSwitchState();
            } else if (key === 'r') {
                resetCircuit();
            } else if (key === 'e') {
                evaluateCircuitLogic();
            }
        });

        container.addEventListener('pointerdown', (e) => {
            if (e.button !== 0) return; // Only left click

            const mode = window.__3D_STATE__.mode;

            if (mode === 'build') {
                // Check Tray
                const trayHit = getIntersectedObject(e, trayItems);
                if (trayHit && trayHit.object.userData.isTrayItem) {
                    clearHighlights();
                    window.__3D_STATE__.selectedComponent = trayHit.object.userData.type;
                    setHighlight(trayHit.object, true);
                    return;
                }

                // Check Grid
                if (window.__3D_STATE__.selectedComponent) {
                    const gridHit = getIntersectedObject(e, [plane]);
                    if (gridHit) {
                        const type = window.__3D_STATE__.selectedComponent;
                        const config = trayConfigs.find(c => c.type === type);
                        if (config) {
                            const newMesh = config.create();
                            // Snap to grid
                            const gx = Math.round(gridHit.point.x);
                            const gz = Math.round(gridHit.point.z);
                            
                            // Prevent placing outside workbench or on top of tray
                            if (gx > -10 && gx < 10 && gz > -10 && gz < 10) {
                                newMesh.position.set(gx, 0.5, gz);
                                newMesh.userData = { isPlacedItem: true, id: componentIdCounter++ };
                                
                                // Add hitbox
                                const hitBox = new THREE.Mesh(new THREE.BoxGeometry(1.5, 1.5, 1.5), new THREE.MeshBasicMaterial({visible: false}));
                                hitBox.userData = newMesh.userData;
                                newMesh.add(hitBox);

                                scene.add(newMesh);
                                placedComponents.push({
                                    id: newMesh.userData.id,
                                    type: type,
                                    mesh: newMesh,
                                    isClosed: false // for switches
                                });
                                window.__3D_STATE__.componentsPlaced++;
                                evaluateCircuitLogic();
                            }
                        }
                    }
                }
            } else if (mode === 'connect') {
                const hit = getIntersectedObject(e, placedComponents.map(c => c.mesh));
                if (hit && hit.object.userData.isPlacedItem) {
                    const comp = placedComponents.find(c => c.id === hit.object.userData.id);
                    if (comp) {
                        if (!connectStartNode) {
                            connectStartNode = comp;
                            setHighlight(comp.mesh, true);
                        } else {
                            if (connectStartNode.id !== comp.id) {
                                drawConnection(connectStartNode, comp);
                                evaluateCircuitLogic();
                            }
                            setHighlight(connectStartNode.mesh, false);
                            connectStartNode = null;
                        }
                    }
                } else {
                    if (connectStartNode) {
                        setHighlight(connectStartNode.mesh, false);
                        connectStartNode = null;
                    }
                }
            } else if (mode === 'delete') {
                const hit = getIntersectedObject(e, placedComponents.map(c => c.mesh));
                if (hit && hit.object.userData.isPlacedItem) {
                    const comp = placedComponents.find(c => c.id === hit.object.userData.id);
                    if (comp) {
                        removeComponent(comp);
                        evaluateCircuitLogic();
                    }
                }
            }
        });

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Initial UI update
        updateUI();
        animate();

    </script>
</body>
</html>
