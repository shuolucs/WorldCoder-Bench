<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Builder Education Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#score-display {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    z-index: 10;
}

#mode-display {
    position: absolute;
    top: 15px;
    right: 15px;
    color: cyan;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,255,0.5);
    z-index: 10;
}

#circuit-status {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: yellow;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,0,0.5);
    z-index: 10;
}

#current-display {
    position: absolute;
    bottom: 15px;
    left: 15px;
    color: #00ff00;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,0,0.5);
    z-index: 10;
}

#evaluate-btn {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    background: linear-gradient(135deg, #0066ff, #0044cc);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    z-index: 10;
    box-shadow: 0 4px 15px rgba(0,102,255,0.4);
    transition: all 0.3s ease;
}

#evaluate-btn:hover {
    background: linear-gradient(135deg, #0088ff, #0066ff);
    box-shadow: 0 6px 20px rgba(0,102,255,0.6);
    transform: translateX(-50%) translateY(-2px);
}

#instructions {
    position: absolute;
    top: 50px;
    right: 15px;
    color: #aaa;
    font-size: 13px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 8px;
    line-height: 1.6;
}

#instructions kbd {
    background: #444;
    padding: 2px 6px;
    border-radius: 3px;
    color: #fff;
    font-size: 12px;
}
</style>
</head>
<body>

<div id="score-display">Score: 0</div>
<div id="mode-display">Mode: Build</div>
<div id="circuit-status">Circuit Status: Open</div>
<div id="current-display">Current: 0.00 A</div>
<button id="evaluate-btn">Evaluate Circuit</button>

<div id="instructions">
    <strong>Controls:</strong><br>
    Click component → Click grid to place<br>
    <kbd>C</kbd> Toggle Connect mode<br>
    <kbd>X</kbd> Toggle Delete mode<br>
    <kbd>S</kbd> Toggle Switch<br>
    <kbd>E</kbd> Evaluate Circuit<br>
    <kbd>R</kbd> Reset All
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Initialize state BEFORE any async loading
window.__3D_STATE__ = {
    lampLoaded: false,
    mode: 'build',
    score: 0,
    componentsPlaced: 0,
    connectionsCount: 0,
    switchClosed: false,
    circuitComplete: false,
    circuitStatus: 'open',
    ledGlowing: false,
    currentAmps: 0,
    selectedComponent: null
};

const STATE = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 25, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Workbench
const workbenchGeom = new THREE.PlaneGeometry(20, 20);
const workbenchMat = new THREE.MeshStandardMaterial({
    color: 0x1a4a1a,
    roughness: 0.8,
    metalness: 0.1
});
const workbench = new THREE.Mesh(workbenchGeom, workbenchMat);
workbench.rotation.x = -Math.PI / 2;
workbench.position.y = 0;
workbench.receiveShadow = true;
workbench.name = 'workbench';
scene.add(workbench);

const gridHelper = new THREE.GridHelper(20, 20, 0x2a6a2a, 0x1a5a1a);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Component tray (shelf on left side)
const trayGeom = new THREE.BoxGeometry(2, 0.1, 14);
const trayMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.5 });
const tray = new THREE.Mesh(trayGeom, trayMat);
tray.position.set(-9, 0.5, 1);
scene.add(tray);

const trayBackGeom = new THREE.BoxGeometry(0.1, 3, 14);
const trayBack = new THREE.Mesh(trayBackGeom, trayMat);
trayBack.position.set(-10, 1.5, 1);
scene.add(trayBack);

// Data structures
const trayComponents = [];
const placedComponents = [];
const connections = [];
const connectionLines = [];
let selectedTrayComponent = null;
let connectFirst = null;
let lampModel = null;
let lampLight = null;

// Helper: create text sprite
function createTextSprite(text, fontSize = 48, color = '#ffffff') {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(2, 0.5, 1);
    return sprite;
}

// Create Battery
function createBattery(isPlaced = false) {
    const group = new THREE.Group();
    const bodyGeom = new THREE.BoxGeometry(1, 0.5, 0.5);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, roughness: 0.3, metalness: 0.2 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.castShadow = true;
    group.add(body);

    // Positive terminal
    const posGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8);
    const posMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const pos = new THREE.Mesh(posGeom, posMat);
    pos.position.set(0.5, 0.3, 0);
    group.add(pos);

    // Negative terminal
    const negGeom = new THREE.CylinderGeometry(0.08, 0.08, 0.1, 8);
    const negMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
    const neg = new THREE.Mesh(negGeom, negMat);
    neg.position.set(-0.5, 0.3, 0);
    group.add(neg);

    // + and - labels
    const plusLabel = createTextSprite('+', 48, '#ff0000');
    plusLabel.position.set(0.5, 0.6, 0);
    plusLabel.scale.set(0.5, 0.25, 1);
    group.add(plusLabel);

    const minusLabel = createTextSprite('-', 48, '#0000ff');
    minusLabel.position.set(-0.5, 0.6, 0);
    minusLabel.scale.set(0.5, 0.25, 1);
    group.add(minusLabel);

    const label = createTextSprite('Battery 9V', 36, '#ffffff');
    label.position.set(0, 0.8, 0);
    group.add(label);

    group.userData = { type: 'battery', voltage: 9, isPlaced: isPlaced, isTray: !isPlaced };
    return group;
}

// Create Resistor
function createResistor(isPlaced = false) {
    const group = new THREE.Group();
    const bodyGeom = new THREE.CylinderGeometry(0.2, 0.2, 1, 12);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.rotation.z = Math.PI / 2;
    body.castShadow = true;
    group.add(body);

    // Color bands
    const bandColors = [0x8B4513, 0x000000, 0xff0000, 0xffd700];
    for (let i = 0; i < 4; i++) {
        const bandGeom = new THREE.CylinderGeometry(0.22, 0.22, 0.05, 12);
        const bandMat = new THREE.MeshStandardMaterial({ color: bandColors[i] });
        const band = new THREE.Mesh(bandGeom, bandMat);
        band.rotation.z = Math.PI / 2;
        band.position.x = -0.3 + i * 0.2;
        group.add(band);
    }

    // Wire leads
    const wireGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.3, 6);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const wire1 = new THREE.Mesh(wireGeom, wireMat);
    wire1.rotation.z = Math.PI / 2;
    wire1.position.x = 0.65;
    group.add(wire1);
    const wire2 = new THREE.Mesh(wireGeom, wireMat);
    wire2.rotation.z = Math.PI / 2;
    wire2.position.x = -0.65;
    group.add(wire2);

    const label = createTextSprite('Resistor 100Ω', 32, '#ffffff');
    label.position.set(0, 0.7, 0);
    group.add(label);

    group.userData = { type: 'resistor', resistance: 100, isPlaced: isPlaced, isTray: !isPlaced };
    return group;
}

// Create LED
function createLED(isPlaced = false) {
    const group = new THREE.Group();

    // Cone base
    const coneGeom = new THREE.ConeGeometry(0.2, 0.3, 12);
    const coneMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.3 });
    const cone = new THREE.Mesh(coneGeom, coneMat);
    cone.position.y = -0.05;
    cone.castShadow = true;
    group.add(cone);

    // Sphere top
    const sphereGeom = new THREE.SphereGeometry(0.3, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        roughness: 0.1,
        metalness: 0.1,
        transparent: true,
        opacity: 0.9,
        emissive: 0x000000,
        emissiveIntensity: 0
    });
    const sphere = new THREE.Mesh(sphereGeom, sphereMat);
    sphere.position.y = 0.25;
    sphere.castShadow = true;
    group.add(sphere);

    // Wire leads
    const wireGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 6);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const wire1 = new THREE.Mesh(wireGeom, wireMat);
    wire1.position.set(0.1, -0.35, 0);
    group.add(wire1);
    const wire2 = new THREE.Mesh(wireGeom, wireMat);
    wire2.position.set(-0.1, -0.45, 0);
    group.add(wire2);

    const label = createTextSprite('LED', 40, '#ff4444');
    label.position.set(0, 0.9, 0);
    group.add(label);

    group.userData = { type: 'led', isPlaced: isPlaced, isTray: !isPlaced, sphereMesh: sphere };
    return group;
}

// Create Wire
function createWire(isPlaced = false) {
    const group = new THREE.Group();
    const wireGeom = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
    const wireMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.7 });
    const wire = new THREE.Mesh(wireGeom, wireMat);
    wire.rotation.z = Math.PI / 2;
    wire.castShadow = true;
    group.add(wire);

    // Insulation
    const insGeom = new THREE.CylinderGeometry(0.07, 0.07, 0.3, 8);
    const insMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
    const ins1 = new THREE.Mesh(insGeom, insMat);
    ins1.rotation.z = Math.PI / 2;
    ins1.position.x = 0.6;
    group.add(ins1);
    const ins2 = new THREE.Mesh(insGeom, insMat);
    ins2.rotation.z = Math.PI / 2;
    ins2.position.x = -0.6;
    group.add(ins2);

    const label = createTextSprite('Wire', 40, '#aaaaaa');
    label.position.set(0, 0.6, 0);
    group.add(label);

    group.userData = { type: 'wire', isPlaced: isPlaced, isTray: !isPlaced };
    return group;
}

// Create Switch
function createSwitch(isPlaced = false) {
    const group = new THREE.Group();

    // Base
    const baseGeom = new THREE.BoxGeometry(0.8, 0.3, 0.5);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4 });
    const base = new THREE.Mesh(baseGeom, baseMat);
    base.castShadow = true;
    group.add(base);

    // Lever
    const leverGeom = new THREE.BoxGeometry(0.6, 0.08, 0.15);
    const leverMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.6 });
    const lever = new THREE.Mesh(leverGeom, leverMat);
    lever.position.set(0, 0.2, 0);
    lever.castShadow = true;
    group.add(lever);

    // Contacts
    const contactGeom = new THREE.CylinderGeometry(0.06, 0.06, 0.15, 8);
    const contactMat = new THREE.MeshStandardMaterial({ color: 0xccaa00, metalness: 0.8 });
    const contact1 = new THREE.Mesh(contactGeom, contactMat);
    contact1.position.set(-0.3, 0.2, 0);
    group.add(contact1);
    const contact2 = new THREE.Mesh(contactGeom, contactMat);
    contact2.position.set(0.3, 0.2, 0);
    group.add(contact2);

    const label = createTextSprite('Switch', 36, '#dddddd');
    label.position.set(0, 0.8, 0);
    group.add(label);

    group.userData = { type: 'switch', isPlaced: isPlaced, isTray: !isPlaced, closed: false, leverMesh: lever };
    return group;
}

// Place tray components
const battery = createBattery();
battery.position.set(-9, 1, -3);
scene.add(battery);
trayComponents.push(battery);

const resistor = createResistor();
resistor.position.set(-9, 1, -1);
scene.add(resistor);
trayComponents.push(resistor);

const led = createLED();
led.position.set(-9, 1, 1);
scene.add(led);
trayComponents.push(led);

const wire = createWire();
wire.position.set(-9, 1, 3);
scene.add(wire);
trayComponents.push(wire);

const switchComp = createSwitch();
switchComp.position.set(-9, 1, 5);
scene.add(switchComp);
trayComponents.push(switchComp);

// Load lamp model
const loader = new THREE.GLTFLoader();
loader.load(
    'IridescenceLamp.glb',
    function(gltf) {
        lampModel = gltf.scene;
        lampModel.scale.set(0.5, 0.5, 0.5);
        lampModel.position.set(8, 0, -8);
        lampModel.traverse(function(child) {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(lampModel);
        STATE.lampLoaded = true;
    },
    undefined,
    function(error) {
        console.log('Lamp model could not be loaded:', error);
        // Create a placeholder lamp
        const lampGroup = new THREE.Group();
        const lampBase = new THREE.CylinderGeometry(0.3, 0.4, 0.2, 12);
        const lampBaseMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.5 });
        const lampBaseMesh = new THREE.Mesh(lampBase, lampBaseMat);
        lampGroup.add(lampBaseMesh);

        const lampPole = new THREE.CylinderGeometry(0.05, 0.05, 1.5, 8);
        const lampPoleMat = new THREE.MeshStandardMaterial({ color: 0xaa8866, metalness: 0.6 });
        const lampPoleMesh = new THREE.Mesh(lampPole, lampPoleMat);
        lampPoleMesh.position.y = 0.85;
        lampGroup.add(lampPoleMesh);

        const lampShade = new THREE.ConeGeometry(0.5, 0.4, 12, 1, true);
        const lampShadeMat = new THREE.MeshStandardMaterial({ color: 0xddcc88, side: THREE.DoubleSide });
        const lampShadeMesh = new THREE.Mesh(lampShade, lampShadeMat);
        lampShadeMesh.position.y = 1.7;
        lampShadeMesh.rotation.x = Math.PI;
        lampGroup.add(lampShadeMesh);

        lampGroup.position.set(8, 0, -8);
        lampGroup.scale.set(0.5, 0.5, 0.5);
        scene.add(lampGroup);
        lampModel = lampGroup;
        STATE.lampLoaded = true;
    }
);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getMousePos(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function findComponentGroup(object) {
    let current = object;
    while (current) {
        if (current.userData && current.userData.type) return current;
        current = current.parent;
    }
    return null;
}

function highlightComponent(comp, highlight) {
    comp.traverse(function(child) {
        if (child.isMesh && child.material) {
            if (highlight) {
                child.material = child.material.clone();
                child.material.emissive = new THREE.Color(0xffff00);
                child.material.emissiveIntensity = 0.3;
            } else {
                if (child.material.emissive) {
                    child.material.emissive = new THREE.Color(0x000000);
                    child.material.emissiveIntensity = 0;
                }
            }
        }
    });
}

function snapToGrid(val) {
    return Math.round(val);
}

function createComponentCopy(type) {
    switch(type) {
        case 'battery': return createBattery(true);
        case 'resistor': return createResistor(true);
        case 'led': return createLED(true);
        case 'wire': return createWire(true);
        case 'switch': return createSwitch(true);
    }
    return null;
}

function updateUI() {
    document.getElementById('score-display').textContent = `Score: ${STATE.score}`;
    const modeNames = { build: 'Build', connect: 'Connect', delete: 'Delete' };
    document.getElementById('mode-display').textContent = `Mode: ${modeNames[STATE.mode] || STATE.mode}`;
    document.getElementById('circuit-status').textContent = `Circuit Status: ${STATE.circuitStatus.charAt(0).toUpperCase() + STATE.circuitStatus.slice(1)}`;
    document.getElementById('current-display').textContent = `Current: ${STATE.currentAmps.toFixed(2)} A`;
}

// Click handler
renderer.domElement.addEventListener('click', function(event) {
    getMousePos(event);
    raycaster.setFromCamera(mouse, camera);

    if (STATE.mode === 'build') {
        // Check if clicking on a tray component
        const trayIntersects = [];
        for (const comp of trayComponents) {
            const intersects = raycaster.intersectObject(comp, true);
            if (intersects.length > 0) {
                trayIntersects.push({ comp, dist: intersects[0].distance });
            }
        }

        if (trayIntersects.length > 0) {
            trayIntersects.sort((a, b) => a.dist - b.dist);
            // Deselect previous
            if (selectedTrayComponent) {
                highlightComponent(selectedTrayComponent, false);
            }
            selectedTrayComponent = trayIntersects[0].comp;
            highlightComponent(selectedTrayComponent, true);
            STATE.selectedComponent = selectedTrayComponent.userData.type;
            updateUI();
            return;
        }

        // Check if clicking on workbench to place
        if (selectedTrayComponent) {
            const workbenchIntersects = raycaster.intersectObject(workbench);
            if (workbenchIntersects.length > 0) {
                const point = workbenchIntersects[0].point;
                const gridX = snapToGrid(point.x);
                const gridZ = snapToGrid(point.z);

                // Don't place on tray area
                if (gridX >= -7 && gridX <= 9 && gridZ >= -9 && gridZ <= 9) {
                    const newComp = createComponentCopy(selectedTrayComponent.userData.type);
                    newComp.position.set(gridX, 0.5, gridZ);
                    newComp.userData.isPlaced = true;
                    newComp.userData.isTray = false;
                    newComp.userData.gridX = gridX;
                    newComp.userData.gridZ = gridZ;
                    scene.add(newComp);
                    placedComponents.push(newComp);
                    STATE.componentsPlaced = placedComponents.length;

                    highlightComponent(selectedTrayComponent, false);
                    selectedTrayComponent = null;
                    STATE.selectedComponent = null;
                    updateUI();
                }
            }
        }
    } else if (STATE.mode === 'connect') {
        // Find placed component
        const allIntersects = [];
        for (const comp of placedComponents) {
            const intersects = raycaster.intersectObject(comp, true);
            if (intersects.length > 0) {
                allIntersects.push({ comp, dist: intersects[0].distance });
            }
        }

        if (allIntersects.length > 0) {
            allIntersects.sort((a, b) => a.dist - b.dist);
            const clicked = allIntersects[0].comp;

            if (!connectFirst) {
                connectFirst = clicked;
                highlightComponent(connectFirst, true);
            } else if (connectFirst !== clicked) {
                // Create connection
                const from = connectFirst.position.clone();
                from.y = 0.5;
                const to = clicked.position.clone();
                to.y = 0.5;

                const points = [from, to];
                const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
                const line = new THREE.Line(lineGeom, lineMat);
                scene.add(line);

                connections.push({ from: connectFirst, to: clicked, line: line });
                connectionLines.push(line);
                STATE.connectionsCount = connections.length;

                highlightComponent(connectFirst, false);
                connectFirst = null;
                updateUI();
            }
        }
    } else if (STATE.mode === 'delete') {
        const allIntersects = [];
        for (const comp of placedComponents) {
            const intersects = raycaster.intersectObject(comp, true);
            if (intersects.length > 0) {
                allIntersects.push({ comp, dist: intersects[0].distance });
            }
        }

        if (allIntersects.length > 0) {
            allIntersects.sort((a, b) => a.dist - b.dist);
            const toRemove = allIntersects[0].comp;

            // Remove connections involving this component
            for (let i = connections.length - 1; i >= 0; i--) {
                if (connections[i].from === toRemove || connections[i].to === toRemove) {
                    scene.remove(connections[i].line);
                    connections.splice(i, 1);
                }
            }

            // Remove component
            scene.remove(toRemove);
            const idx = placedComponents.indexOf(toRemove);
            if (idx > -1) placedComponents.splice(idx, 1);

            STATE.componentsPlaced = placedComponents.length;
            STATE.connectionsCount = connections.length;
            updateUI();
        }
    }
});

// Keyboard handler
document.addEventListener('keydown', function(event) {
    const key = event.key.toLowerCase();

    if (key === 'c') {
        if (STATE.mode === 'connect') {
            STATE.mode = 'build';
            if (connectFirst) {
                highlightComponent(connectFirst, false);
                connectFirst = null;
            }
        } else {
            STATE.mode = 'connect';
            if (selectedTrayComponent) {
                highlightComponent(selectedTrayComponent, false);
                selectedTrayComponent = null;
                STATE.selectedComponent = null;
            }
        }
        updateUI();
    } else if (key === 'x') {
        if (STATE.mode === 'delete') {
            STATE.mode = 'build';
        } else {
            STATE.mode = 'delete';
            if (selectedTrayComponent) {
                highlightComponent(selectedTrayComponent, false);
                selectedTrayComponent = null;
                STATE.selectedComponent = null;
            }
            if (connectFirst) {
                highlightComponent(connectFirst, false);
                connectFirst = null;
            }
        }
        updateUI();
    } else if (key === 's') {
        // Toggle switches
        for (const comp of placedComponents) {
            if (comp.userData.type === 'switch') {
                comp.userData.closed = !comp.userData.closed;
                STATE.switchClosed = comp.userData.closed;
                const lever = comp.userData.leverMesh;
                if (lever) {
                    lever.rotation.z = comp.userData.closed ? Math.PI / 4 : 0;
                }
            }
        }
        updateUI();
    } else if (key === 'e') {
        evaluateCircuit();
    } else if (key === 'r') {
        resetAll();
    }
});

// Evaluate button
document.getElementById('evaluate-btn').addEventListener('click', evaluateCircuit);

function evaluateCircuit() {
    let score = 0;
    let hasBattery = false;
    let hasResistor = false;
    let hasLED = false;
    let hasSwitch = false;
    let switchClosed = false;

    for (const comp of placedComponents) {
        switch (comp.userData.type) {
            case 'battery': hasBattery = true; score += 10; break;
            case 'resistor': hasResistor = true; score += 10; break;
            case 'led': hasLED = true; score += 10; break;
            case 'switch':
                hasSwitch = true;
                score += 10;
                switchClosed = comp.userData.closed;
                break;
        }
    }

    // Score connections
    score += connections.length * 10;

    // Check for valid circuit using graph traversal
    let circuitComplete = false;

    if (hasBattery && hasResistor && hasLED) {
        // Build adjacency list
        const adj = new Map();
        for (const comp of placedComponents) {
            adj.set(comp, []);
        }
        for (const conn of connections) {
            adj.get(conn.from).push(conn.to);
            adj.get(conn.to).push(conn.from);
        }

        // Find battery, resistor, LED
        let batteryComp = null, resistorComp = null, ledComp = null, switchComp = null;
        for (const comp of placedComponents) {
            if (comp.userData.type === 'battery') batteryComp = comp;
            if (comp.userData.type === 'resistor') resistorComp = comp;
            if (comp.userData.type === 'led') ledComp = comp;
            if (comp.userData.type === 'switch') switchComp = comp;
        }

        // Check if there's a path from battery that visits resistor and LED and comes back
        // Simple: check if all key components are connected in some path
        function bfs(start) {
            const visited = new Set();
            const queue = [start];
            visited.add(start);
            while (queue.length > 0) {
                const current = queue.shift();
                const neighbors = adj.get(current) || [];
                for (const n of neighbors) {
                    if (!visited.has(n)) {
                        visited.add(n);
                        queue.push(n);
                    }
                }
            }
            return visited;
        }

        if (batteryComp) {
            const reachable = bfs(batteryComp);
            const allKeyConnected = reachable.has(resistorComp) && reachable.has(ledComp);

            if (allKeyConnected) {
                // Check if there's a cycle (circuit loop) - need at least as many edges as nodes in the connected subgraph
                const connectedNodes = [...reachable].filter(n => placedComponents.includes(n));
                let edgesInSubgraph = 0;
                for (const conn of connections) {
                    if (reachable.has(conn.from) && reachable.has(conn.to)) {
                        edgesInSubgraph++;
                    }
                }

                // For a loop, edges >= nodes
                if (edgesInSubgraph >= connectedNodes.length) {
                    if (hasSwitch) {
                        if (switchClosed) {
                            circuitComplete = true;
                            score = 100;
                        }
                    } else {
                        circuitComplete = true;
                        score = 100;
                    }
                }
            }
        }
    }

    STATE.score = score;
    STATE.circuitComplete = circuitComplete;

    if (circuitComplete) {
        STATE.circuitStatus = 'closed';
        STATE.currentAmps = 9 / 100; // Ohm's law: I = V/R
        STATE.ledGlowing = true;

        // Make LED glow
        for (const comp of placedComponents) {
            if (comp.userData.type === 'led') {
                comp.traverse(function(child) {
                    if (child.isMesh && child.geometry.type === 'SphereGeometry') {
                        child.material = child.material.clone();
                        child.material.emissive = new THREE.Color(0xff0000);
                        child.material.emissiveIntensity = 1.0;
                    }
                });

                // Add point light at LED
                const ledLight = new THREE.PointLight(0xff0000, 1.5, 5);
                ledLight.position.copy(comp.position);
                ledLight.position.y += 1;
                ledLight.name = 'ledLight';
                scene.add(ledLight);
            }
        }

        // Light up lamp
        if (lampModel && !lampLight) {
            lampLight = new THREE.PointLight(0xffdd88, 2, 10);
            lampLight.position.set(8, 2, -8);
            lampLight.name = 'lampLight';
            scene.add(lampLight);
        }
    } else {
        if (hasBattery || hasResistor || hasLED || hasSwitch) {
            STATE.circuitStatus = connections.length > 0 ? 'open' : 'open';
        } else {
            STATE.circuitStatus = 'open';
        }

        // Check if it's invalid (components placed but incorrectly wired)
        if (placedComponents.length > 0 && connections.length > 0 && !circuitComplete) {
            STATE.circuitStatus = 'invalid';
        } else if (placedComponents.length === 0) {
            STATE.circuitStatus = 'open';
        } else {
            STATE.circuitStatus = 'open';
        }

        STATE.currentAmps = 0;
        STATE.ledGlowing = false;
        STATE.circuitComplete = false;

        // Remove glow effects
        removeLightEffects();
    }

    updateUI();
}

function removeLightEffects() {
    // Remove LED lights
    const toRemove = [];
    scene.traverse(function(child) {
        if (child.name === 'ledLight' || child.name === 'lampLight') {
            toRemove.push(child);
        }
    });
    toRemove.forEach(obj => scene.remove(obj));
    lampLight = null;

    // Reset LED materials
    for (const comp of placedComponents) {
        if (comp.userData.type === 'led') {
            comp.traverse(function(child) {
                if (child.isMesh && child.geometry.type === 'SphereGeometry') {
                    child.material.emissive = new THREE.Color(0x000000);
                    child.material.emissiveIntensity = 0;
                }
            });
        }
    }
}

function resetAll() {
    // Remove all placed components
    for (const comp of placedComponents) {
        scene.remove(comp);
    }
    placedComponents.length = 0;

    // Remove all connections
    for (const conn of connections) {
        scene.remove(conn.line);
    }
    connections.length = 0;
    connectionLines.length = 0;

    // Remove light effects
    removeLightEffects();

    // Reset state
    STATE.score = 0;
    STATE.componentsPlaced = 0;
    STATE.connectionsCount = 0;
    STATE.switchClosed = false;
    STATE.circuitComplete = false;
    STATE.circuitStatus = 'open';
    STATE.ledGlowing = false;
    STATE.currentAmps = 0;
    STATE.selectedComponent = null;
    STATE.mode = 'build';

    if (selectedTrayComponent) {
        highlightComponent(selectedTrayComponent, false);
        selectedTrayComponent = null;
    }
    connectFirst = null;

    updateUI();
}

// Animation
let time = 0;
function animate() {
    requestAnimationFrame(animate);
    time += 0.016;

    controls.update();

    // Animate LED glow if circuit is complete
    if (STATE.ledGlowing) {
        const pulse = 0.7 + 0.3 * Math.sin(time * 5);
        for (const comp of placedComponents) {
            if (comp.userData.type === 'led') {
                comp.traverse(function(child) {
                    if (child.isMesh && child.geometry.type === 'SphereGeometry') {
                        child.material.emissiveIntensity = pulse;
                    }
                });
            }
        }

        // Pulse lamp light
        if (lampLight) {
            lampLight.intensity = 1.5 + 0.5 * Math.sin(time * 3);
        }
    }

    // Gentle hover animation for tray components
    for (const comp of trayComponents) {
        comp.position.y = 1 + Math.sin(time * 2 + trayComponents.indexOf(comp)) * 0.05;
    }

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateUI();
animate();
</script>
</body>
