<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bioluminescent Ocean</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #050510; }
canvas { display: block; }
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(5, 5, 16, 0.8);
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(0, 255, 255, 0.2);
    z-index: 100;
    min-width: 220px;
    line-height: 1.6;
}
#hud .label { color: #00cccc; }
#hud .value { color: #ffffff; }
.btn-container {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
}
.btn-container button {
    padding: 10px 20px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    border: 1px solid rgba(0, 255, 255, 0.4);
    border-radius: 6px;
    background: rgba(5, 5, 16, 0.85);
    color: #00ffff;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-container button:hover {
    background: rgba(0, 255, 255, 0.15);
    border-color: rgba(0, 255, 255, 0.8);
}
#controls-help {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(5, 5, 16, 0.8);
    color: #888;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 10px;
    border-radius: 6px;
    z-index: 100;
    line-height: 1.5;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Click Count: </span><span class="value" id="hud-clicks">0</span></div>
    <div><span class="label">Lantern Moves: </span><span class="value" id="hud-moves">0</span></div>
    <div><span class="label">Color Scheme: </span><span class="value" id="hud-scheme">deep_blue</span></div>
    <div><span class="label">Glow: </span><span class="value" id="hud-glow">OFF</span></div>
    <div><span class="label">Particles: </span><span class="value" id="hud-particles">500</span></div>
</div>

<div class="btn-container">
    <button id="btn-save">💾 Save State</button>
    <button id="btn-load">📂 Load State</button>
</div>

<div id="controls-help">
    [Click] Spawn particles on ocean<br>
    [G] Toggle glow bloom<br>
    [L] Move lantern randomly<br>
    [C] Cycle color scheme
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    sceneReady: false,
    lanternLoaded: false,
    lanternPosition: { x: 0, y: 3, z: 0 },
    glowEnabled: false,
    clickCount: 0,
    lanternMoveCount: 0,
    colorScheme: 'deep_blue',
    totalParticles: 500,
    savedStateExists: localStorage.getItem('bioOceanState') !== null,
    stateLoaded: false,
    elapsedTime: 0,
    ambientIntensity: 0.3,
    lanternLightIntensity: 2
};

const state = window.__3D_STATE__;

const colorSchemes = {
    deep_blue: new THREE.Color('#020830'),
    emerald: new THREE.Color('#021a08'),
    violet: new THREE.Color('#100228')
};
const schemeNames = ['deep_blue', 'emerald', 'violet'];
let schemeIndex = 0;

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color('#050510');
scene.fog = new THREE.FogExp2('#050510', 0.015);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 5;
controls.maxDistance = 50;

// Lights
const ambientLight = new THREE.AmbientLight('#0a0a2e', 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight('#1a1a4e', 0.4);
dirLight.position.set(0, 20, 10);
scene.add(dirLight);

// Ocean Shader Material
const oceanUniforms = {
    uTime: { value: 0 },
    uOceanColor: { value: colorSchemes.deep_blue.clone() },
    uGlowIntensity: { value: 1.0 }
};

const oceanMaterial = new THREE.ShaderMaterial({
    uniforms: oceanUniforms,
    vertexShader: `
        uniform float uTime;
        varying vec2 vUv;
        varying float vElevation;
        varying vec3 vWorldPos;

        void main() {
            vUv = uv;
            vec3 pos = position;

            float wave1 = sin(pos.x * 0.3 + uTime * 0.8) * cos(pos.z * 0.2 + uTime * 0.6) * 0.5;
            float wave2 = sin(pos.x * 0.5 + uTime * 1.2) * sin(pos.z * 0.4 + uTime * 0.9) * 0.3;
            float wave3 = cos(pos.x * 0.15 + uTime * 0.4) * sin(pos.z * 0.35 + uTime * 0.7) * 0.7;

            pos.y += wave1 + wave2 + wave3;
            vElevation = pos.y;
            vWorldPos = (modelMatrix * vec4(pos, 1.0)).xyz;

            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        }
    `,
    fragmentShader: `
        uniform float uTime;
        uniform vec3 uOceanColor;
        uniform float uGlowIntensity;
        varying vec2 vUv;
        varying float vElevation;
        varying vec3 vWorldPos;

        void main() {
            vec3 baseColor = uOceanColor;

            // Bioluminescent glow spots
            float glow1 = sin(vWorldPos.x * 0.8 + uTime * 0.5) * cos(vWorldPos.z * 0.6 + uTime * 0.3);
            float glow2 = cos(vWorldPos.x * 0.4 + uTime * 0.7) * sin(vWorldPos.z * 0.9 + uTime * 0.4);
            float glow3 = sin(vWorldPos.x * 1.2 + uTime * 0.3) * cos(vWorldPos.z * 0.3 + uTime * 0.8);

            float glowPattern = max(0.0, glow1) * 0.3 + max(0.0, glow2) * 0.2 + max(0.0, glow3) * 0.15;
            glowPattern = pow(glowPattern, 2.0);

            vec3 glowColor = mix(
                vec3(0.0, 0.4, 1.0),
                vec3(0.0, 1.0, 0.8),
                sin(uTime * 0.3 + vWorldPos.x * 0.1) * 0.5 + 0.5
            );

            vec3 finalColor = baseColor + glowColor * glowPattern * uGlowIntensity * 0.5;

            // Elevation-based highlights
            finalColor += vec3(0.0, 0.1, 0.2) * max(0.0, vElevation) * 0.3;

            // Edge foam-like glow
            float edgeFactor = smoothstep(0.4, 0.5, abs(vElevation));
            finalColor += vec3(0.0, 0.5, 0.7) * edgeFactor * 0.1 * uGlowIntensity;

            gl_FragColor = vec4(finalColor, 0.92);
        }
    `,
    transparent: true,
    side: THREE.DoubleSide
});

const oceanGeometry = new THREE.PlaneGeometry(100, 100, 64, 64);
oceanGeometry.rotateX(-Math.PI / 2);
const ocean = new THREE.Mesh(oceanGeometry, oceanMaterial);
ocean.position.y = 0;
scene.add(ocean);

// Bioluminescent Particles
const bioColors = [
    new THREE.Color('#00ffff'),
    new THREE.Color('#0066ff'),
    new THREE.Color('#00ff66')
];

class BioParticle {
    constructor(x, y, z, isSpawned = false) {
        this.baseX = x;
        this.baseY = y;
        this.baseZ = z;
        this.driftSpeed = Math.random() * 0.5 + 0.2;
        this.driftOffset = Math.random() * Math.PI * 2;
        this.pulseSpeed = Math.random() * 2 + 1;
        this.pulseOffset = Math.random() * Math.PI * 2;
        this.colorIndex = Math.floor(Math.random() * 3);
        this.colorSpeed = Math.random() * 0.5 + 0.3;
        this.size = Math.random() * 0.08 + 0.04;
        this.isSpawned = isSpawned;
        this.life = isSpawned ? 5.0 : Infinity;
        this.age = 0;
    }
}

let particles = [];
let particlePositions = [];
let particleColors = [];
let particleSizes = [];

function initParticles() {
    particles = [];
    for (let i = 0; i < 500; i++) {
        const x = (Math.random() - 0.5) * 80;
        const z = (Math.random() - 0.5) * 80;
        const y = Math.random() * 0.5 + 0.1;
        particles.push(new BioParticle(x, y, z));
    }
}

initParticles();

let particleGeometry = new THREE.BufferGeometry();
let particlePointsMaterial = new THREE.PointsMaterial({
    size: 0.15,
    vertexColors: true,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true
});

let particleSystem;

function buildParticleSystem() {
    const count = particles.length;
    particlePositions = new Float32Array(count * 3);
    particleColors = new Float32Array(count * 3);
    particleSizes = new Float32Array(count);

    for (let i = 0; i < count; i++) {
        const p = particles[i];
        particlePositions[i * 3] = p.baseX;
        particlePositions[i * 3 + 1] = p.baseY;
        particlePositions[i * 3 + 2] = p.baseZ;

        const c = bioColors[p.colorIndex];
        particleColors[i * 3] = c.r;
        particleColors[i * 3 + 1] = c.g;
        particleColors[i * 3 + 2] = c.b;

        particleSizes[i] = p.size;
    }

    particleGeometry.dispose();
    particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    if (particleSystem) {
        scene.remove(particleSystem);
    }
    particleSystem = new THREE.Points(particleGeometry, particlePointsMaterial);
    scene.add(particleSystem);
}

buildParticleSystem();

function updateParticles(time, delta) {
    let needsRebuild = false;

    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];

        if (p.isSpawned) {
            p.age += delta;
            if (p.age >= p.life) {
                particles.splice(i, 1);
                needsRebuild = true;
                continue;
            }
        }

        const driftX = Math.sin(time * p.driftSpeed + p.driftOffset) * 0.3;
        const driftZ = Math.cos(time * p.driftSpeed * 0.7 + p.driftOffset) * 0.3;
        const driftY = Math.sin(time * p.driftSpeed * 0.5 + p.driftOffset) * 0.1;

        const idx = i * 3;
        if (idx + 2 < particlePositions.length) {
            particlePositions[idx] = p.baseX + driftX;
            particlePositions[idx + 1] = p.baseY + driftY + (p.isSpawned ? p.age * 0.3 : 0);
            particlePositions[idx + 2] = p.baseZ + driftZ;

            const pulse = (Math.sin(time * p.pulseSpeed + p.pulseOffset) * 0.5 + 0.5);
            const glowMult = state.glowEnabled ? 2.0 : 1.0;
            const fadeMult = p.isSpawned ? Math.max(0, 1 - p.age / p.life) : 1.0;

            const t = (Math.sin(time * p.colorSpeed) * 0.5 + 0.5);
            const nextColorIndex = (p.colorIndex + 1) % 3;
            const c1 = bioColors[p.colorIndex];
            const c2 = bioColors[nextColorIndex];

            particleColors[idx] = THREE.MathUtils.lerp(c1.r, c2.r, t) * pulse * glowMult * fadeMult;
            particleColors[idx + 1] = THREE.MathUtils.lerp(c1.g, c2.g, t) * pulse * glowMult * fadeMult;
            particleColors[idx + 2] = THREE.MathUtils.lerp(c1.b, c2.b, t) * pulse * glowMult * fadeMult;
        }
    }

    if (needsRebuild) {
        buildParticleSystem();
    } else {
        particleGeometry.attributes.position.needsUpdate = true;
        particleGeometry.attributes.color.needsUpdate = true;
    }

    state.totalParticles = particles.length;
}

// Lantern
let lantern = null;
let lanternLight = null;
let lanternTargetX = 0;
let lanternGroup = new THREE.Group();
scene.add(lanternGroup);

// Create a fallback lantern geometry
function createFallbackLantern() {
    const group = new THREE.Group();

    // Main body
    const bodyGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.2, 8);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: '#cc6622',
        emissive: '#ff8833',
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: 0.85,
        roughness: 0.3
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    group.add(body);

    // Top cap
    const topGeo = new THREE.ConeGeometry(0.35, 0.4, 8);
    const topMat = new THREE.MeshStandardMaterial({ color: '#884422', roughness: 0.6 });
    const top = new THREE.Mesh(topGeo, topMat);
    top.position.y = 0.8;
    group.add(top);

    // Bottom ring
    const ringGeo = new THREE.TorusGeometry(0.5, 0.05, 8, 16);
    const ringMat = new THREE.MeshStandardMaterial({ color: '#664422', metalness: 0.5 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = -0.6;
    group.add(ring);

    // Handle
    const handleCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(-0.3, 0.8, 0),
        new THREE.Vector3(-0.4, 1.3, 0),
        new THREE.Vector3(0, 1.5, 0),
        new THREE.Vector3(0.4, 1.3, 0),
        new THREE.Vector3(0.3, 0.8, 0)
    ]);
    const handleGeo = new THREE.TubeGeometry(handleCurve, 20, 0.03, 8, false);
    const handleMat = new THREE.MeshStandardMaterial({ color: '#664422', metalness: 0.6 });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    group.add(handle);

    // Inner glow sphere
    const glowGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({
        color: '#ffaa33',
        transparent: true,
        opacity: 0.6
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    group.add(glow);

    return group;
}

// Try loading GLB, fallback to procedural
const loader = new GLTFLoader();
let lanternLoadAttempted = false;

function setupLantern(lanternObj) {
    lantern = lanternObj;
    lantern.scale.set(1.5, 1.5, 1.5);

    lanternLight = new THREE.PointLight('#ffaa33', 2, 15);
    lanternLight.position.set(0, 0, 0);
    lantern.add(lanternLight);

    lanternGroup.add(lantern);
    lanternGroup.position.set(0, 3, 0);

    state.lanternLoaded = true;
    state.lanternLightIntensity = 2;
    checkReady();
}

try {
    loader.load(
        '._Lantern.glb',
        (gltf) => {
            setupLantern(gltf.scene);
        },
        undefined,
        (error) => {
            console.log('GLB load failed, using fallback lantern');
            const fallback = createFallbackLantern();
            setupLantern(fallback);
        }
    );
} catch (e) {
    const fallback = createFallbackLantern();
    setupLantern(fallback);
}

// Fallback timer in case load hangs
setTimeout(() => {
    if (!state.lanternLoaded) {
        console.log('Lantern load timeout, using fallback');
        const fallback = createFallbackLantern();
        setupLantern(fallback);
    }
}, 3000);

function checkReady() {
    if (state.lanternLoaded) {
        state.sceneReady = true;
    }
}

// Stars
function createStars() {
    const starCount = 1000;
    const starGeo = new THREE.BufferGeometry();
    const starPos = new Float32Array(starCount * 3);
    const starCol = new Float32Array(starCount * 3);

    for (let i = 0; i < starCount; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.5;
        const r = 80 + Math.random() * 20;

        starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.cos(phi) + 10;
        starPos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);

        const brightness = Math.random() * 0.5 + 0.5;
        starCol[i * 3] = brightness;
        starCol[i * 3 + 1] = brightness;
        starCol[i * 3 + 2] = brightness * (0.8 + Math.random() * 0.2);
    }

    starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
    starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));

    const starMat = new THREE.PointsMaterial({
        size: 0.3,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true
    });

    scene.add(new THREE.Points(starGeo, starMat));
}
createStars();

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function spawnBurstParticles(worldPos) {
    for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * 2;
        const x = worldPos.x + Math.cos(angle) * radius;
        const z = worldPos.z + Math.sin(angle) * radius;
        const y = worldPos.y + Math.random() * 0.5 + 0.2;

        const p = new BioParticle(x, y, z, true);
        p.size = Math.random() * 0.12 + 0.06;
        particles.push(p);
    }
    buildParticleSystem();
    state.clickCount++;
    state.totalParticles = particles.length;
}

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ocean);

    if (intersects.length > 0) {
        spawnBurstParticles(intersects[0].point);
    }
});

// Keyboard
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'g') {
        state.glowEnabled = !state.glowEnabled;
        if (state.glowEnabled) {
            ambientLight.intensity = 0.6;
            oceanUniforms.uGlowIntensity.value = 2.0;
        } else {
            ambientLight.intensity = 0.3;
            oceanUniforms.uGlowIntensity.value = 1.0;
        }
        state.ambientIntensity = ambientLight.intensity;
    }

    if (key === 'l') {
        lanternTargetX = (Math.random() - 0.5) * 30;
        state.lanternMoveCount++;
    }

    if (key === 'c') {
        schemeIndex = (schemeIndex + 1) % schemeNames.length;
        state.colorScheme = schemeNames[schemeIndex];
        oceanUniforms.uOceanColor.value.copy(colorSchemes[state.colorScheme]);
    }
});

// Save/Load
document.getElementById('btn-save').addEventListener('click', () => {
    const saveData = {
        lanternPosition: {
            x: lanternGroup.position.x,
            y: lanternGroup.position.y,
            z: lanternGroup.position.z
        },
        lanternTargetX: lanternTargetX,
        glowEnabled: state.glowEnabled,
        clickCount: state.clickCount,
        lanternMoveCount: state.lanternMoveCount,
        colorScheme: state.colorScheme,
        totalParticles: state.totalParticles
    };
    localStorage.setItem('bioOceanState', JSON.stringify(saveData));
    state.savedStateExists = true;
    console.log('State saved');
});

document.getElementById('btn-load').addEventListener('click', () => {
    const raw = localStorage.getItem('bioOceanState');
    if (!raw) {
        console.log('No saved state found');
        return;
    }

    const saveData = JSON.parse(raw);

    // Restore lantern position
    lanternTargetX = saveData.lanternTargetX || saveData.lanternPosition.x;
    lanternGroup.position.x = saveData.lanternPosition.x;
    lanternGroup.position.z = saveData.lanternPosition.z;

    // Restore glow
    state.glowEnabled = saveData.glowEnabled;
    if (state.glowEnabled) {
        ambientLight.intensity = 0.6;
        oceanUniforms.uGlowIntensity.value = 2.0;
    } else {
        ambientLight.intensity = 0.3;
        oceanUniforms.uGlowIntensity.value = 1.0;
    }
    state.ambientIntensity = ambientLight.intensity;

    // Restore counts
    state.clickCount = saveData.clickCount;
    state.lanternMoveCount = saveData.lanternMoveCount;

    // Restore color scheme
    state.colorScheme = saveData.colorScheme;
    schemeIndex = schemeNames.indexOf(state.colorScheme);
    if (schemeIndex < 0) schemeIndex = 0;
    oceanUniforms.uOceanColor.value.copy(colorSchemes[state.colorScheme]);

    state.stateLoaded = true;
    console.log('State loaded');
});

// HUD update
function updateHUD() {
    document.getElementById('hud-clicks').textContent = state.clickCount;
    document.getElementById('hud-moves').textContent = state.lanternMoveCount;
    document.getElementById('hud-scheme').textContent = state.colorScheme;
    document.getElementById('hud-glow').textContent = state.glowEnabled ? 'ON' : 'OFF';
    document.getElementById('hud-particles').textContent = state.totalParticles;
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    state.elapsedTime = elapsed;

    // Update ocean
    oceanUniforms.uTime.value = elapsed;

    // Update particles
    updateParticles(elapsed, delta);

    // Update lantern
    if (lantern) {
        // Smooth move to target X
        lanternGroup.position.x += (lanternTargetX - lanternGroup.position.x) * 0.02;

        // Bob up and down
        lanternGroup.position.y = 3 + Math.sin(elapsed * 0.8) * 0.5;

        // Slow rotation
        lantern.rotation.y = elapsed * 0.3;

        state.lanternPosition.x = lanternGroup.position.x;
        state.lanternPosition.y = lanternGroup.position.y;
        state.lanternPosition.z = lanternGroup.position.z;

        // Lantern light flicker
        if (lanternLight) {
            lanternLight.intensity = 2 + Math.sin(elapsed * 3) * 0.3 + Math.sin(elapsed * 7) * 0.1;
            state.lanternLightIntensity = lanternLight.intensity;
        }
    }

    state.ambientIntensity = ambientLight.intensity;

    controls.update();
    updateHUD();

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
