<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bioluminescent Ocean</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(5, 5, 16, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1a1a4e;
            pointer-events: none;
            z-index: 10;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00ffff;
        }
        .hud-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 10;
            pointer-events: auto;
        }
        button {
            background: rgba(26, 26, 78, 0.8);
            color: #00ffff;
            border: 1px solid #00ffff;
            padding: 8px 16px;
            margin-right: 10px;
            cursor: pointer;
            font-family: monospace;
            border-radius: 4px;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(0, 255, 255, 0.2);
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.5);
            text-align: right;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h2>Ocean State</h2>
        <div class="hud-row">Clicks: <span id="val-clicks">0</span></div>
        <div class="hud-row">Lantern Moves: <span id="val-moves">0</span></div>
        <div class="hud-row">Color: <span id="val-color">deep_blue</span></div>
        <div class="hud-row">Glow: <span id="val-glow">OFF</span></div>
        <div class="hud-row">Particles: <span id="val-particles">500</span></div>
    </div>

    <div class="controls">
        <button id="btn-save">Save State</button>
        <button id="btn-load">Load State</button>
    </div>

    <div id="instructions">
        Click Ocean: Spawn Particles<br>
        [G]: Toggle Glow<br>
        [L]: Move Lantern<br>
        [C]: Cycle Color
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            sceneReady: false,
            lanternLoaded: false,
            lanternPosition: { x: 0, y: 3, z: 0 },
            glowEnabled: false,
            clickCount: 0,
            lanternMoveCount: 0,
            colorScheme: 'deep_blue',
            totalParticles: 0,
            savedStateExists: !!localStorage.getItem('bioOceanState'),
            stateLoaded: false,
            elapsedTime: 0,
            ambientIntensity: 0.3,
            lanternLightIntensity: 2
        };

        const colorSchemes = {
            'deep_blue': 0x020830,
            'emerald': 0x021a08,
            'violet': 0x100228
        };
        const colorKeys = Object.keys(colorSchemes);

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x0a0a2e, window.__3D_STATE__.ambientIntensity);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0x1a1a4e, 0.4);
        dirLight.position.set(0, 20, 0);
        scene.add(dirLight);

        // --- Ocean ---
        const oceanGeo = new THREE.PlaneGeometry(100, 100, 64, 64);
        oceanGeo.rotateX(-Math.PI / 2);

        const oceanVertexShader = `
            uniform float uTime;
            varying vec2 vUv;
            varying float vElevation;

            void main() {
                vUv = uv;
                vec4 modelPosition = modelMatrix * vec4(position, 1.0);
                
                float elevation = sin(modelPosition.x * 0.5 + uTime) * 0.4 + 
                                  cos(modelPosition.z * 0.5 + uTime * 0.8) * 0.4;
                
                modelPosition.y += elevation;
                vElevation = elevation;
                
                gl_Position = projectionMatrix * viewMatrix * modelPosition;
            }
        `;

        const oceanFragmentShader = `
            uniform vec3 uColor;
            varying vec2 vUv;
            varying float vElevation;

            void main() {
                // Add slight bioluminescent highlight on wave peaks
                float highlight = smoothstep(0.0, 0.8, vElevation);
                vec3 glowColor = vec3(0.0, 0.8, 1.0);
                vec3 finalColor = mix(uColor, glowColor, highlight * 0.3);
                
                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        const oceanMaterial = new THREE.ShaderMaterial({
            vertexShader: oceanVertexShader,
            fragmentShader: oceanFragmentShader,
            uniforms: {
                uTime: { value: 0 },
                uColor: { value: new THREE.Color(colorSchemes[window.__3D_STATE__.colorScheme]) }
            },
            wireframe: false
        });

        const ocean = new THREE.Mesh(oceanGeo, oceanMaterial);
        scene.add(ocean);

        // --- Bioluminescent Particles ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const particleColors = [0x00ffff, 0x0066ff, 0x00ff66];

        function createParticle(x, z) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.position.set(x, 0, z);
            scene.add(mesh);

            const baseColorHex = particleColors[Math.floor(Math.random() * particleColors.length)];
            
            particles.push({
                mesh: mesh,
                baseColor: new THREE.Color(baseColorHex),
                phase: Math.random() * Math.PI * 2,
                vx: (Math.random() - 0.5) * 0.02,
                vz: (Math.random() - 0.5) * 0.02
            });
            window.__3D_STATE__.totalParticles = particles.length;
        }

        // Initial 500 particles
        for (let i = 0; i < 500; i++) {
            createParticle((Math.random() - 0.5) * 80, (Math.random() - 0.5) * 80);
        }

        // --- Lantern Model ---
        const lanternGroup = new THREE.Group();
        lanternGroup.position.set(0, 3, 0);
        scene.add(lanternGroup);

        let lanternTargetX = 0;

        const lanternLight = new THREE.PointLight(0xffaa33, window.__3D_STATE__.lanternLightIntensity, 15);
        lanternGroup.add(lanternLight);

        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            '._Lantern.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(1.5, 1.5, 1.5);
                lanternGroup.add(model);
                window.__3D_STATE__.lanternLoaded = true;
            },
            undefined,
            (error) => {
                // Fallback if file not found
                const fallbackGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8);
                const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x222222, emissive: 0xffaa33, emissiveIntensity: 0.5 });
                const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                lanternGroup.add(fallbackMesh);
                window.__3D_STATE__.lanternLoaded = true;
            }
        );

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            // Ignore clicks on UI
            if(event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ocean);

            if (intersects.length > 0) {
                const point = intersects[0].point;
                // Spawn burst
                for (let i = 0; i < 20; i++) {
                    createParticle(
                        point.x + (Math.random() - 0.5) * 4,
                        point.z + (Math.random() - 0.5) * 4
                    );
                }
                window.__3D_STATE__.clickCount++;
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            
            if (key === 'g') {
                window.__3D_STATE__.glowEnabled = !window.__3D_STATE__.glowEnabled;
                ambientLight.intensity = window.__3D_STATE__.glowEnabled ? 0.6 : 0.3;
                window.__3D_STATE__.ambientIntensity = ambientLight.intensity;
            } 
            else if (key === 'l') {
                lanternTargetX = (Math.random() * 30) - 15;
                window.__3D_STATE__.lanternMoveCount++;
            }
            else if (key === 'c') {
                let currentIndex = colorKeys.indexOf(window.__3D_STATE__.colorScheme);
                currentIndex = (currentIndex + 1) % colorKeys.length;
                window.__3D_STATE__.colorScheme = colorKeys[currentIndex];
                oceanMaterial.uniforms.uColor.value.setHex(colorSchemes[window.__3D_STATE__.colorScheme]);
            }
        });

        // --- Save / Load ---
        document.getElementById('btn-save').addEventListener('click', () => {
            const stateToSave = {
                lanternTargetX: lanternTargetX,
                glowEnabled: window.__3D_STATE__.glowEnabled,
                clickCount: window.__3D_STATE__.clickCount,
                lanternMoveCount: window.__3D_STATE__.lanternMoveCount,
                colorScheme: window.__3D_STATE__.colorScheme,
                totalParticles: window.__3D_STATE__.totalParticles
            };
            localStorage.setItem('bioOceanState', JSON.stringify(stateToSave));
            window.__3D_STATE__.savedStateExists = true;
        });

        document.getElementById('btn-load').addEventListener('click', () => {
            const saved = localStorage.getItem('bioOceanState');
            if (saved) {
                const state = JSON.parse(saved);
                
                lanternTargetX = state.lanternTargetX;
                window.__3D_STATE__.glowEnabled = state.glowEnabled;
                window.__3D_STATE__.clickCount = state.clickCount;
                window.__3D_STATE__.lanternMoveCount = state.lanternMoveCount;
                window.__3D_STATE__.colorScheme = state.colorScheme;

                // Apply Glow
                ambientLight.intensity = state.glowEnabled ? 0.6 : 0.3;
                window.__3D_STATE__.ambientIntensity = ambientLight.intensity;

                // Apply Color
                oceanMaterial.uniforms.uColor.value.setHex(colorSchemes[state.colorScheme]);

                // Adjust Particles
                const diff = state.totalParticles - particles.length;
                if (diff > 0) {
                    for(let i=0; i<diff; i++) createParticle((Math.random()-0.5)*80, (Math.random()-0.5)*80);
                } else if (diff < 0) {
                    for(let i=0; i<-diff; i++) {
                        const p = particles.pop();
                        scene.remove(p.mesh);
                        p.mesh.geometry.dispose();
                        p.mesh.material.dispose();
                    }
                }
                window.__3D_STATE__.totalParticles = particles.length;
                window.__3D_STATE__.stateLoaded = true;
            }
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        const elClicks = document.getElementById('val-clicks');
        const elMoves = document.getElementById('val-moves');
        const elColor = document.getElementById('val-color');
        const elGlow = document.getElementById('val-glow');
        const elParticles = document.getElementById('val-particles');

        function updateHUD() {
            elClicks.textContent = window.__3D_STATE__.clickCount;
            elMoves.textContent = window.__3D_STATE__.lanternMoveCount;
            elColor.textContent = window.__3D_STATE__.colorScheme;
            elGlow.textContent = window.__3D_STATE__.glowEnabled ? 'ON' : 'OFF';
            elGlow.style.color = window.__3D_STATE__.glowEnabled ? '#00ff66' : '#fff';
            elParticles.textContent = window.__3D_STATE__.totalParticles;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        window.__3D_STATE__.sceneReady = true;

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            window.__3D_STATE__.elapsedTime = time;

            // Ocean Animation
            oceanMaterial.uniforms.uTime.value = time;

            // Lantern Animation
            lanternGroup.position.y = 3.0 + Math.sin(time * 1.5) * 0.5; // Bob between 2.5 and 3.5
            lanternGroup.position.x += (lanternTargetX - lanternGroup.position.x) * 0.02; // Smooth X move
            lanternGroup.rotation.y = time * 0.2;
            
            window.__3D_STATE__.lanternPosition.x = lanternGroup.position.x;
            window.__3D_STATE__.lanternPosition.y = lanternGroup.position.y;
            window.__3D_STATE__.lanternPosition.z = lanternGroup.position.z;

            // Particle Animation
            const glowMultiplier = window.__3D_STATE__.glowEnabled ? 2.0 : 1.0;
            
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                // Drift
                p.mesh.position.x += p.vx;
                p.mesh.position.z += p.vz;
                
                // Wrap around
                if(p.mesh.position.x > 50) p.mesh.position.x = -50;
                if(p.mesh.position.x < -50) p.mesh.position.x = 50;
                if(p.mesh.position.z > 50) p.mesh.position.z = -50;
                if(p.mesh.position.z < -50) p.mesh.position.z = 50;

                // Match ocean wave height approximately
                p.mesh.position.y = sinCosWave(p.mesh.position.x, p.mesh.position.z, time);

                // Pulse brightness
                const pulse = (Math.sin(time * 2 + p.phase) + 1.0) * 0.5; // 0 to 1
                p.mesh.material.color.copy(p.baseColor).multiplyScalar(0.2 + pulse * 0.8 * glowMultiplier);
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        function sinCosWave(x, z, t) {
            return Math.sin(x * 0.5 + t) * 0.4 + Math.cos(z * 0.5 + t * 0.8) * 0.4;
        }

        animate();
    </script>
</body>
</html>
