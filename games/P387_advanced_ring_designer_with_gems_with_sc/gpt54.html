<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #1a0a2e 0%, #0d0d0d 100%);
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 14px 18px;
      background: rgba(10, 10, 20, 0.65);
      color: #fff;
      border: 1px solid rgba(153, 102, 255, 0.4);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      z-index: 10;
      min-width: 180px;
      box-shadow: 0 0 20px rgba(153, 102, 255, 0.15);
    }

    #hud div {
      margin: 6px 0;
      font-size: 15px;
    }

    #toolbar {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      padding: 14px;
      width: min(95vw, 1100px);
      background: rgba(10, 10, 20, 0.72);
      border: 1px solid rgba(153, 102, 255, 0.35);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      z-index: 10;
      box-shadow: 0 0 20px rgba(153, 102, 255, 0.12);
    }

    .group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      padding: 4px 8px;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    .group:last-child {
      border-right: none;
    }

    button {
      background: #1b1326;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.45);
      background: #281a3d;
    }

    button.active {
      border: 2px solid #d7b8ff;
      box-shadow: 0 0 12px rgba(215, 184, 255, 0.5);
      background: #3a235d;
    }

    #hint {
      position: absolute;
      right: 16px;
      top: 16px;
      max-width: 260px;
      padding: 12px 14px;
      color: #ddd;
      background: rgba(10,10,20,0.55);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.4;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">Score: 0</div>
    <div id="rating">Rating: Bronze</div>
    <div id="gemsPlaced">Gems Placed: 0/8</div>
  </div>

  <div id="hint">
    Left-click a slot to place selected gem.<br>
    Right-click a gem to remove it.<br>
    Keys: 1-4 gems, R rotate, C clear.
  </div>

  <div id="toolbar">
    <div class="group">
      <button id="btn-gold">Gold</button>
      <button id="btn-platinum">Platinum</button>
      <button id="btn-rosegold">Rose Gold</button>
    </div>
    <div class="group">
      <button id="btn-diamond">Diamond</button>
      <button id="btn-ruby">Ruby</button>
      <button id="btn-emerald">Emerald</button>
      <button id="btn-sapphire">Sapphire</button>
    </div>
    <div class="group">
      <button id="btn-clear">Clear All</button>
      <button id="btn-rotate">Auto Rotate</button>
      <button id="btn-randomize">Randomize</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = false;
    controls.minDistance = 3;
    controls.maxDistance = 12;
    controls.target.set(0, 1.5, 0);

    const ambient = new THREE.AmbientLight('#9966ff', 0.3);
    scene.add(ambient);

    const warmLight = new THREE.PointLight('#ffaa44', 1.2, 100);
    warmLight.position.set(5, 8, 5);
    scene.add(warmLight);

    const coolLight = new THREE.PointLight('#4488ff', 0.8, 100);
    coolLight.position.set(-5, 6, -3);
    scene.add(coolLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(10, 64),
      new THREE.MeshStandardMaterial({
        color: '#111111',
        roughness: 0.9,
        metalness: 0.1
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    scene.add(floor);

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    const slotGroup = new THREE.Group();
    ringGroup.add(slotGroup);

    const gemGroup = new THREE.Group();
    ringGroup.add(gemGroup);

    const materialDefs = {
      gold:      { color: '#ffd700', metalness: 0.95, roughness: 0.1, multiplier: 1.0 },
      platinum:  { color: '#e5e4e2', metalness: 0.98, roughness: 0.05, multiplier: 1.5 },
      rosegold:  { color: '#b76e79', metalness: 0.9, roughness: 0.15, multiplier: 1.2 }
    };

    const gemDefs = {
      diamond: {
        geometry: new THREE.IcosahedronGeometry(0.12, 0),
        color: '#ffffff',
        emissive: '#aaddff',
        value: 100
      },
      ruby: {
        geometry: new THREE.OctahedronGeometry(0.1, 0),
        color: '#ff0033',
        emissive: '#ff0000',
        value: 75
      },
      emerald: {
        geometry: new THREE.BoxGeometry(0.14, 0.14, 0.14),
        color: '#00cc44',
        emissive: '#00ff00',
        value: 60
      },
      sapphire: {
        geometry: new THREE.DodecahedronGeometry(0.11, 0),
        color: '#0044ff',
        emissive: '#0033cc',
        value: 85
      }
    };

    const ringMaterial = new THREE.MeshStandardMaterial({
      color: materialDefs.gold.color,
      metalness: materialDefs.gold.metalness,
      roughness: materialDefs.gold.roughness
    });

    const ringMesh = new THREE.Mesh(
      new THREE.TorusGeometry(1.2, 0.15, 32, 100),
      ringMaterial
    );
    ringMesh.position.y = 1.5;
    ringMesh.rotation.x = Math.PI / 2;
    ringGroup.add(ringMesh);

    const slotMeshes = [];
    const gemMeshes = new Array(8).fill(null);
    const slotAngles = [];
    const ringRadius = 1.2;
    const tubeRadius = 0.15;

    function computeSlotPosition(angle) {
      const x = Math.cos(angle) * (ringRadius + tubeRadius * 0.05);
      const z = Math.sin(angle) * (ringRadius + tubeRadius * 0.05);
      const y = 1.5 + tubeRadius * 0.2;
      return new THREE.Vector3(x, y, z);
    }

    for (let i = 0; i < 8; i++) {
      const t = i / 7;
      const angle = THREE.MathUtils.lerp(-Math.PI / 3, Math.PI / 3, t);
      slotAngles.push(angle);

      const slot = new THREE.Mesh(
        new THREE.SphereGeometry(0.02, 16, 16),
        new THREE.MeshStandardMaterial({
          color: '#ffffff',
          emissive: '#bb99ff',
          emissiveIntensity: 1.2,
          metalness: 0.2,
          roughness: 0.4
        })
      );
      const pos = computeSlotPosition(angle);
      slot.position.copy(pos);
      slot.userData.slotIndex = i;
      slot.userData.isSlot = true;
      slotGroup.add(slot);
      slotMeshes.push(slot);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    let mixer = null;

    window.__3D_STATE__ = {
      ringMaterial: 'gold',
      selectedGem: 'diamond',
      gems: new Array(8).fill(null),
      gemsPlaced: 0,
      baseScore: 0,
      comboBonus: 0,
      symmetryBonus: 0,
      totalScore: 0,
      rating: 'Bronze',
      materialMultiplier: 1.0,
      autoRotate: false,
      modelLoaded: false,
      slotPositions: slotMeshes.map(s => ({ x: s.position.x, y: s.position.y, z: s.position.z })),
      animationPlaying: false
    };

    const hud = {
      score: document.getElementById('score'),
      rating: document.getElementById('rating'),
      gemsPlaced: document.getElementById('gemsPlaced')
    };

    const buttons = {
      gold: document.getElementById('btn-gold'),
      platinum: document.getElementById('btn-platinum'),
      rosegold: document.getElementById('btn-rosegold'),
      diamond: document.getElementById('btn-diamond'),
      ruby: document.getElementById('btn-ruby'),
      emerald: document.getElementById('btn-emerald'),
      sapphire: document.getElementById('btn-sapphire'),
      clear: document.getElementById('btn-clear'),
      rotate: document.getElementById('btn-rotate'),
      randomize: document.getElementById('btn-randomize')
    };

    function updateHUD() {
      hud.score.textContent = `Score: ${window.__3D_STATE__.totalScore}`;
      hud.rating.textContent = `Rating: ${window.__3D_STATE__.rating}`;
      hud.gemsPlaced.textContent = `Gems Placed: ${window.__3D_STATE__.gemsPlaced}/8`;
    }

    function updateButtonHighlights() {
      [buttons.gold, buttons.platinum, buttons.rosegold, buttons.diamond, buttons.ruby, buttons.emerald, buttons.sapphire, buttons.rotate]
        .forEach(btn => btn.classList.remove('active'));

      buttons[window.__3D_STATE__.ringMaterial].classList.add('active');
      buttons[window.__3D_STATE__.selectedGem].classList.add('active');
      if (window.__3D_STATE__.autoRotate) buttons.rotate.classList.add('active');
    }

    function setRingMaterial(name) {
      const def = materialDefs[name];
      ringMaterial.color.set(def.color);
      ringMaterial.metalness = def.metalness;
      ringMaterial.roughness = def.roughness;
      window.__3D_STATE__.ringMaterial = name;
      window.__3D_STATE__.materialMultiplier = def.multiplier;
      recalculateScore();
      updateButtonHighlights();
    }

    function setSelectedGem(name) {
      window.__3D_STATE__.selectedGem = name;
      updateButtonHighlights();
    }

    function createGemMesh(type, slotIndex) {
      const def = gemDefs[type];
      const material = new THREE.MeshStandardMaterial({
        color: def.color,
        emissive: def.emissive,
        emissiveIntensity: 0.5,
        metalness: 0.15,
        roughness: 0.2
      });
      const mesh = new THREE.Mesh(def.geometry, material);
      mesh.position.copy(slotMeshes[slotIndex].position);
      mesh.position.y += 0.08;
      mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      mesh.userData.slotIndex = slotIndex;
      mesh.userData.gemType = type;
      mesh.userData.isGem = true;
      return mesh;
    }

    function placeGem(slotIndex, type) {
      if (gemMeshes[slotIndex]) {
        gemGroup.remove(gemMeshes[slotIndex]);
      }
      const gem = createGemMesh(type, slotIndex);
      gemMeshes[slotIndex] = gem;
      gemGroup.add(gem);
      window.__3D_STATE__.gems[slotIndex] = type;
      recalculateScore();
    }

    function removeGem(slotIndex) {
      if (gemMeshes[slotIndex]) {
        gemGroup.remove(gemMeshes[slotIndex]);
        gemMeshes[slotIndex] = null;
        window.__3D_STATE__.gems[slotIndex] = null;
        recalculateScore();
      }
    }

    function clearAllGems() {
      for (let i = 0; i < 8; i++) removeGem(i);
      recalculateScore();
    }

    function getComboBonus(gems) {
      let bonus = 0;
      let streakType = null;
      let streakCount = 0;

      for (let i = 0; i < gems.length; i++) {
        if (gems[i] && gems[i] === streakType) {
          streakCount++;
        } else {
          if (streakCount >= 3) bonus += streakCount * 50;
          streakType = gems[i];
          streakCount = gems[i] ? 1 : 0;
        }
      }
      if (streakCount >= 3) bonus += streakCount * 50;
      return bonus;
    }

    function getSymmetryBonus(gems) {
      for (let i = 0; i < 4; i++) {
        if (gems[i] !== gems[7 - i]) return 0;
      }
      return 200;
    }

    function getRating(score) {
      if (score <= 200) return 'Bronze';
      if (score <= 500) return 'Silver';
      if (score <= 900) return 'Gold';
      return 'Platinum';
    }

    function recalculateScore() {
      const gems = window.__3D_STATE__.gems;
      let rawGemValue = 0;
      let placed = 0;

      for (const gem of gems) {
        if (gem) {
          rawGemValue += gemDefs[gem].value;
          placed++;
        }
      }

      const multiplier = materialDefs[window.__3D_STATE__.ringMaterial].multiplier;
      const baseScore = Math.round(rawGemValue * multiplier);
      const comboBonus = getComboBonus(gems);
      const symmetryBonus = getSymmetryBonus(gems);
      const totalScore = baseScore + comboBonus + symmetryBonus;
      const rating = getRating(totalScore);

      window.__3D_STATE__.gemsPlaced = placed;
      window.__3D_STATE__.baseScore = baseScore;
      window.__3D_STATE__.comboBonus = comboBonus;
      window.__3D_STATE__.symmetryBonus = symmetryBonus;
      window.__3D_STATE__.totalScore = totalScore;
      window.__3D_STATE__.rating = rating;
      window.__3D_STATE__.materialMultiplier = multiplier;

      updateHUD();
    }

    function randomizeGems() {
      const types = Object.keys(gemDefs);
      for (let i = 0; i < 8; i++) {
        const type = types[Math.floor(Math.random() * types.length)];
        placeGem(i, type);
      }
      recalculateScore();
    }

    function toggleRotate() {
      controls.autoRotate = !controls.autoRotate;
      window.__3D_STATE__.autoRotate = controls.autoRotate;
      updateButtonHighlights();
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      if (event.button === 2) {
        const gemHits = raycaster.intersectObjects(gemGroup.children, true);
        if (gemHits.length > 0) {
          const obj = gemHits[0].object;
          const slotIndex = obj.userData.slotIndex ?? obj.parent?.userData?.slotIndex;
          if (slotIndex !== undefined) removeGem(slotIndex);
        }
        return;
      }

      if (event.button !== 0) return;

      const slotHits = raycaster.intersectObjects(slotMeshes, true);
      if (slotHits.length > 0) {
        const slotIndex = slotHits[0].object.userData.slotIndex;
        placeGem(slotIndex, window.__3D_STATE__.selectedGem);
      }
    });

    renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());

    buttons.gold.addEventListener('click', () => setRingMaterial('gold'));
    buttons.platinum.addEventListener('click', () => setRingMaterial('platinum'));
    buttons.rosegold.addEventListener('click', () => setRingMaterial('rosegold'));

    buttons.diamond.addEventListener('click', () => setSelectedGem('diamond'));
    buttons.ruby.addEventListener('click', () => setSelectedGem('ruby'));
    buttons.emerald.addEventListener('click', () => setSelectedGem('emerald'));
    buttons.sapphire.addEventListener('click', () => setSelectedGem('sapphire'));

    buttons.clear.addEventListener('click', clearAllGems);
    buttons.rotate.addEventListener('click', toggleRotate);
    buttons.randomize.addEventListener('click', randomizeGems);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === '1') setSelectedGem('diamond');
      if (key === '2') setSelectedGem('ruby');
      if (key === '3') setSelectedGem('emerald');
      if (key === '4') setSelectedGem('sapphire');
      if (key === 'r') toggleRotate();
      if (key === 'c') clearAllGems();
    });

    const loader = new GLTFLoader();
    loader.load(
      'BoxAnimated.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(-4, 0, -2);
        model.scale.setScalar(0.5);
        scene.add(model);

        window.__3D_STATE__.modelLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
          window.__3D_STATE__.animationPlaying = true;
        }
      },
      undefined,
      (err) => {
        console.warn('Failed to load BoxAnimated.glb:', err);
        window.__3D_STATE__.modelLoaded = false;
        window.__3D_STATE__.animationPlaying = false;
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      controls.update();
      if (mixer) mixer.update(dt);

      gemGroup.children.forEach((gem, i) => {
        gem.rotation.y += 0.01 + i * 0.0005;
      });

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateButtonHighlights();
    animate();
  </script>
</body>
</html>
