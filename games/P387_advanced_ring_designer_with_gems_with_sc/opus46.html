<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0d0d0d; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(26, 10, 46, 0.85);
  border: 1px solid rgba(153, 102, 255, 0.4);
  border-radius: 12px;
  padding: 20px;
  color: #e0d0ff;
  min-width: 220px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(153, 102, 255, 0.2);
}

#hud h2 {
  font-size: 18px;
  margin-bottom: 12px;
  color: #cc99ff;
  text-transform: uppercase;
  letter-spacing: 2px;
}

#hud .stat {
  margin: 8px 0;
  font-size: 14px;
  display: flex;
  justify-content: space-between;
}

#hud .stat .value {
  font-weight: bold;
  color: #ffd700;
}

#hud .rating-display {
  margin-top: 12px;
  padding: 8px;
  text-align: center;
  border-radius: 6px;
  font-size: 16px;
  font-weight: bold;
  letter-spacing: 1px;
}

.rating-Bronze { background: rgba(205, 127, 50, 0.3); color: #cd7f32; border: 1px solid #cd7f32; }
.rating-Silver { background: rgba(192, 192, 192, 0.3); color: #c0c0c0; border: 1px solid #c0c0c0; }
.rating-Gold { background: rgba(255, 215, 0, 0.3); color: #ffd700; border: 1px solid #ffd700; }
.rating-Platinum { background: rgba(229, 228, 226, 0.3); color: #e5e4e2; border: 1px solid #e5e4e2; }

#toolbar {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(26, 10, 46, 0.9);
  border: 1px solid rgba(153, 102, 255, 0.4);
  border-radius: 12px;
  padding: 16px 20px;
  display: flex;
  gap: 8px;
  align-items: center;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 20px rgba(153, 102, 255, 0.2);
  flex-wrap: wrap;
  justify-content: center;
  max-width: 90vw;
}

#toolbar .separator {
  width: 1px;
  height: 36px;
  background: rgba(153, 102, 255, 0.3);
  margin: 0 4px;
}

#toolbar button {
  padding: 8px 14px;
  border: 2px solid rgba(153, 102, 255, 0.3);
  border-radius: 8px;
  background: rgba(13, 13, 13, 0.8);
  color: #c0b0e0;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.2s ease;
  white-space: nowrap;
}

#toolbar button:hover {
  background: rgba(153, 102, 255, 0.2);
  border-color: rgba(153, 102, 255, 0.6);
  color: #fff;
}

#toolbar button.active {
  border-color: #cc99ff;
  background: rgba(153, 102, 255, 0.35);
  color: #fff;
  box-shadow: 0 0 10px rgba(153, 102, 255, 0.4);
}

#btn-gold.active { border-color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.4); }
#btn-platinum.active { border-color: #e5e4e2; box-shadow: 0 0 10px rgba(229, 228, 226, 0.4); }
#btn-rosegold.active { border-color: #b76e79; box-shadow: 0 0 10px rgba(183, 110, 121, 0.4); }
#btn-diamond.active { border-color: #aaddff; box-shadow: 0 0 10px rgba(170, 221, 255, 0.4); }
#btn-ruby.active { border-color: #ff0033; box-shadow: 0 0 10px rgba(255, 0, 51, 0.4); }
#btn-emerald.active { border-color: #00cc44; box-shadow: 0 0 10px rgba(0, 204, 68, 0.4); }
#btn-sapphire.active { border-color: #0044ff; box-shadow: 0 0 10px rgba(0, 68, 255, 0.4); }

#btn-clear { border-color: rgba(255, 80, 80, 0.4); color: #ff8080; }
#btn-clear:hover { background: rgba(255, 80, 80, 0.2); border-color: #ff5050; }
#btn-randomize { border-color: rgba(80, 255, 180, 0.4); color: #80ffb4; }
#btn-randomize:hover { background: rgba(80, 255, 180, 0.2); border-color: #50ffb4; }

.label {
  color: #9966ff;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-right: 4px;
  align-self: center;
}
</style>
</head>
<body>

<div id="hud">
  <h2>Ring Designer</h2>
  <div class="stat"><span>Score:</span><span class="value" id="hud-score">0</span></div>
  <div class="stat"><span>Combo Bonus:</span><span class="value" id="hud-combo">0</span></div>
  <div class="stat"><span>Symmetry Bonus:</span><span class="value" id="hud-symmetry">0</span></div>
  <div class="stat"><span>Gems Placed:</span><span class="value" id="hud-gems">0/8</span></div>
  <div class="stat"><span>Material:</span><span class="value" id="hud-material">Gold (×1.0)</span></div>
  <div id="hud-rating" class="rating-display rating-Bronze">Bronze</div>
</div>

<div id="toolbar">
  <span class="label">Band:</span>
  <button id="btn-gold" class="active">Gold</button>
  <button id="btn-platinum">Platinum</button>
  <button id="btn-rosegold">Rose Gold</button>
  <div class="separator"></div>
  <span class="label">Gem:</span>
  <button id="btn-diamond" class="active">Diamond</button>
  <button id="btn-ruby">Ruby</button>
  <button id="btn-emerald">Emerald</button>
  <button id="btn-sapphire">Sapphire</button>
  <div class="separator"></div>
  <button id="btn-clear">Clear All</button>
  <button id="btn-rotate">Auto Rotate</button>
  <button id="btn-randomize">Randomize</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
  ringMaterial: 'gold',
  selectedGem: 'diamond',
  gems: [null, null, null, null, null, null, null, null],
  gemsPlaced: 0,
  baseScore: 0,
  comboBonus: 0,
  symmetryBonus: 0,
  totalScore: 0,
  rating: 'Bronze',
  materialMultiplier: 1.0,
  autoRotate: false,
  modelLoaded: false,
  slotPositions: [],
  animationPlaying: false
};
window.__3D_STATE__ = state;

// ============ MATERIAL DEFINITIONS ============
const materialDefs = {
  gold: { color: 0xffd700, metalness: 0.95, roughness: 0.1, multiplier: 1.0 },
  platinum: { color: 0xe5e4e2, metalness: 0.98, roughness: 0.05, multiplier: 1.5 },
  rosegold: { color: 0xb76e79, metalness: 0.9, roughness: 0.15, multiplier: 1.2 }
};

const gemDefs = {
  diamond: { score: 100, color: 0xffffff, emissive: 0xaaddff },
  ruby: { score: 75, color: 0xff0033, emissive: 0xff0000 },
  emerald: { score: 60, color: 0x00cc44, emissive: 0x00ff00 },
  sapphire: { score: 85, color: 0x0044ff, emissive: 0x0033cc }
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a0a2e');
gradient.addColorStop(1, '#0d0d0d');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Lights
const ambientLight = new THREE.AmbientLight(0x9966ff, 0.3);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xffaa44, 1.2);
warmLight.position.set(5, 8, 5);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x4488ff, 0.8);
coolLight.position.set(-5, 6, -3);
scene.add(coolLight);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.autoRotate = false;
controls.autoRotateSpeed = 2.0;
controls.minDistance = 3;
controls.maxDistance = 12;
controls.target.set(0, 1.5, 0);
controls.update();

// ============ FLOOR ============
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.5, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
scene.add(floor);

// ============ RING ============
const ringGroup = new THREE.Group();
ringGroup.position.y = 1.5;
scene.add(ringGroup);

const torusGeo = new THREE.TorusGeometry(1.2, 0.15, 32, 100);
let ringMat = new THREE.MeshStandardMaterial({
  color: materialDefs.gold.color,
  metalness: materialDefs.gold.metalness,
  roughness: materialDefs.gold.roughness
});
const ringMesh = new THREE.Mesh(torusGeo, ringMat);
ringMesh.castShadow = true;
ringGroup.add(ringMesh);

// ============ GEM SLOTS ============
const slotMeshes = [];
const gemMeshes = [null, null, null, null, null, null, null, null];
const slotAngles = [];

// 8 slots evenly spaced from -PI/3 to PI/3
for (let i = 0; i < 8; i++) {
  const t = -Math.PI / 3 + (i / 7) * (2 * Math.PI / 3);
  slotAngles.push(t);

  const R = 1.2;
  const r = 0.15;
  const x = (R + r) * Math.cos(t);
  const z = (R + r) * Math.sin(t);
  const y = 0;

  const slotGeo = new THREE.SphereGeometry(0.02, 8, 8);
  const slotMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0x9966ff,
    emissiveIntensity: 0.5,
    metalness: 0.5,
    roughness: 0.3
  });
  const slotMesh = new THREE.Mesh(slotGeo, slotMat);
  slotMesh.position.set(x, y, z);
  slotMesh.userData.slotIndex = i;
  slotMesh.userData.isSlot = true;
  ringGroup.add(slotMesh);
  slotMeshes.push(slotMesh);

  state.slotPositions.push({ x, y: y + 1.5, z });
}

// ============ GEM CREATION ============
function createGemMesh(gemType) {
  let geo;
  switch (gemType) {
    case 'diamond':
      geo = new THREE.IcosahedronGeometry(0.12, 0);
      break;
    case 'ruby':
      geo = new THREE.OctahedronGeometry(0.1, 0);
      break;
    case 'emerald':
      geo = new THREE.BoxGeometry(0.14, 0.14, 0.14);
      break;
    case 'sapphire':
      geo = new THREE.DodecahedronGeometry(0.11, 0);
      break;
  }

  const def = gemDefs[gemType];
  const mat = new THREE.MeshStandardMaterial({
    color: def.color,
    emissive: def.emissive,
    emissiveIntensity: 0.6,
    metalness: 0.3,
    roughness: 0.1,
    transparent: true,
    opacity: 0.9
  });

  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData.isGem = true;
  return mesh;
}

function placeGem(slotIndex, gemType) {
  // Remove existing gem if any
  if (gemMeshes[slotIndex]) {
    ringGroup.remove(gemMeshes[slotIndex]);
    gemMeshes[slotIndex] = null;
  }

  const gem = createGemMesh(gemType);
  const slot = slotMeshes[slotIndex];
  gem.position.copy(slot.position);
  gem.userData.slotIndex = slotIndex;
  gem.userData.gemType = gemType;
  ringGroup.add(gem);
  gemMeshes[slotIndex] = gem;
  state.gems[slotIndex] = gemType;

  recalculateScore();
  updateHUD();
}

function removeGem(slotIndex) {
  if (gemMeshes[slotIndex]) {
    ringGroup.remove(gemMeshes[slotIndex]);
    gemMeshes[slotIndex] = null;
    state.gems[slotIndex] = null;
    recalculateScore();
    updateHUD();
  }
}

function clearAllGems() {
  for (let i = 0; i < 8; i++) {
    if (gemMeshes[i]) {
      ringGroup.remove(gemMeshes[i]);
      gemMeshes[i] = null;
    }
    state.gems[i] = null;
  }
  recalculateScore();
  updateHUD();
}

function randomizeGems() {
  const gemTypes = ['diamond', 'ruby', 'emerald', 'sapphire'];
  for (let i = 0; i < 8; i++) {
    const randomGem = gemTypes[Math.floor(Math.random() * gemTypes.length)];
    placeGem(i, randomGem);
  }
}

// ============ SCORING ============
function recalculateScore() {
  // Count placed gems
  state.gemsPlaced = state.gems.filter(g => g !== null).length;

  // Base score
  let gemScoreSum = 0;
  for (let i = 0; i < 8; i++) {
    if (state.gems[i]) {
      gemScoreSum += gemDefs[state.gems[i]].score;
    }
  }
  state.baseScore = Math.round(gemScoreSum * state.materialMultiplier);

  // Combo bonus: 3+ adjacent same type
  state.comboBonus = 0;
  let visited = new Array(8).fill(false);
  for (let i = 0; i < 8; i++) {
    if (state.gems[i] && !visited[i]) {
      let count = 1;
      visited[i] = true;
      let j = i + 1;
      while (j < 8 && state.gems[j] === state.gems[i]) {
        visited[j] = true;
        count++;
        j++;
      }
      if (count >= 3) {
        state.comboBonus += 50 * count;
      }
    }
  }

  // Symmetry bonus: slot i matches slot 7-i for i=0..3
  state.symmetryBonus = 0;
  let symmetric = true;
  for (let i = 0; i <= 3; i++) {
    if (state.gems[i] !== state.gems[7 - i]) {
      symmetric = false;
      break;
    }
    // Both null is still symmetric but we need at least some gems for it to matter
  }
  // Only award symmetry bonus if at least one gem is placed and pattern is symmetric
  if (symmetric && state.gemsPlaced > 0) {
    state.symmetryBonus = 200;
  }

  state.totalScore = state.baseScore + state.comboBonus + state.symmetryBonus;

  // Rating
  if (state.totalScore >= 901) state.rating = 'Platinum';
  else if (state.totalScore >= 501) state.rating = 'Gold';
  else if (state.totalScore >= 201) state.rating = 'Silver';
  else state.rating = 'Bronze';
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('hud-score').textContent = state.totalScore;
  document.getElementById('hud-combo').textContent = state.comboBonus;
  document.getElementById('hud-symmetry').textContent = state.symmetryBonus;
  document.getElementById('hud-gems').textContent = `${state.gemsPlaced}/8`;

  const matNames = { gold: 'Gold', platinum: 'Platinum', rosegold: 'Rose Gold' };
  document.getElementById('hud-material').textContent = `${matNames[state.ringMaterial]} (×${state.materialMultiplier})`;

  const ratingEl = document.getElementById('hud-rating');
  ratingEl.textContent = state.rating;
  ratingEl.className = `rating-display rating-${state.rating}`;
}

// ============ MATERIAL CHANGE ============
function setRingMaterial(matKey) {
  state.ringMaterial = matKey;
  const def = materialDefs[matKey];
  state.materialMultiplier = def.multiplier;

  ringMesh.material.color.setHex(def.color);
  ringMesh.material.metalness = def.metalness;
  ringMesh.material.roughness = def.roughness;
  ringMesh.material.needsUpdate = true;

  // Update button highlights
  document.getElementById('btn-gold').classList.toggle('active', matKey === 'gold');
  document.getElementById('btn-platinum').classList.toggle('active', matKey === 'platinum');
  document.getElementById('btn-rosegold').classList.toggle('active', matKey === 'rosegold');

  recalculateScore();
  updateHUD();
}

function setSelectedGem(gemKey) {
  state.selectedGem = gemKey;
  document.getElementById('btn-diamond').classList.toggle('active', gemKey === 'diamond');
  document.getElementById('btn-ruby').classList.toggle('active', gemKey === 'ruby');
  document.getElementById('btn-emerald').classList.toggle('active', gemKey === 'emerald');
  document.getElementById('btn-sapphire').classList.toggle('active', gemKey === 'sapphire');
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  if (event.button !== 0) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check gem meshes first (for replacement)
  const allGems = gemMeshes.filter(g => g !== null);
  if (allGems.length > 0) {
    const gemIntersects = raycaster.intersectObjects(allGems);
    if (gemIntersects.length > 0) {
      const slotIdx = gemIntersects[0].object.userData.slotIndex;
      placeGem(slotIdx, state.selectedGem);
      return;
    }
  }

  // Check slot meshes
  const slotIntersects = raycaster.intersectObjects(slotMeshes);
  if (slotIntersects.length > 0) {
    const slotIdx = slotIntersects[0].object.userData.slotIndex;
    placeGem(slotIdx, state.selectedGem);
    return;
  }

  // Check ring mesh - find closest slot
  const ringIntersects = raycaster.intersectObject(ringMesh);
  if (ringIntersects.length > 0) {
    const point = ringIntersects[0].point;
    // Convert to ring group local space
    const localPoint = ringGroup.worldToLocal(point.clone());
    
    // Find closest slot
    let closestIdx = 0;
    let closestDist = Infinity;
    for (let i = 0; i < 8; i++) {
      const d = localPoint.distanceTo(slotMeshes[i].position);
      if (d < closestDist) {
        closestDist = d;
        closestIdx = i;
      }
    }
    if (closestDist < 0.5) {
      placeGem(closestIdx, state.selectedGem);
    }
  }
}

function onContextMenu(event) {
  event.preventDefault();

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const allGems = gemMeshes.filter(g => g !== null);
  if (allGems.length > 0) {
    const intersects = raycaster.intersectObjects(allGems);
    if (intersects.length > 0) {
      const slotIdx = intersects[0].object.userData.slotIndex;
      removeGem(slotIdx);
    }
  }
}

renderer.domElement.addEventListener('click', onMouseClick);
renderer.domElement.addEventListener('contextmenu', onContextMenu);

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'r') {
    state.autoRotate = !state.autoRotate;
    controls.autoRotate = state.autoRotate;
    document.getElementById('btn-rotate').classList.toggle('active', state.autoRotate);
  } else if (key === '1') {
    setSelectedGem('diamond');
  } else if (key === '2') {
    setSelectedGem('ruby');
  } else if (key === '3') {
    setSelectedGem('emerald');
  } else if (key === '4') {
    setSelectedGem('sapphire');
  } else if (key === 'c') {
    clearAllGems();
  }
});

// ============ BUTTON EVENTS ============
document.getElementById('btn-gold').addEventListener('click', () => setRingMaterial('gold'));
document.getElementById('btn-platinum').addEventListener('click', () => setRingMaterial('platinum'));
document.getElementById('btn-rosegold').addEventListener('click', () => setRingMaterial('rosegold'));
document.getElementById('btn-diamond').addEventListener('click', () => setSelectedGem('diamond'));
document.getElementById('btn-ruby').addEventListener('click', () => setSelectedGem('ruby'));
document.getElementById('btn-emerald').addEventListener('click', () => setSelectedGem('emerald'));
document.getElementById('btn-sapphire').addEventListener('click', () => setSelectedGem('sapphire'));
document.getElementById('btn-clear').addEventListener('click', clearAllGems);
document.getElementById('btn-randomize').addEventListener('click', randomizeGems);
document.getElementById('btn-rotate').addEventListener('click', () => {
  state.autoRotate = !state.autoRotate;
  controls.autoRotate = state.autoRotate;
  document.getElementById('btn-rotate').classList.toggle('active', state.autoRotate);
});

// ============ LOAD GLTF MODEL ============
let mixer = null;
const loader = new GLTFLoader();
loader.load(
  'BoxAnimated.glb',
  (gltf) => {
    const model = gltf.scene;
    model.position.set(-4, 0, -2);
    model.scale.set(0.5, 0.5, 0.5);
    scene.add(model);

    state.modelLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
      state.animationPlaying = true;
    }
  },
  undefined,
  (error) => {
    console.warn('Could not load BoxAnimated.glb:', error);
    // Create a fallback pedestal
    const pedestalGeo = new THREE.CylinderGeometry(0.4, 0.5, 1.0, 8);
    const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x4422aa, metalness: 0.7, roughness: 0.3 });
    const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
    pedestal.position.set(-4, 0.5, -2);
    pedestal.scale.set(0.5, 0.5, 0.5);
    scene.add(pedestal);
    state.modelLoaded = true;
  }
);

// ============ GEM ANIMATION ============
const clock = new THREE.Clock();

function animateGems(time) {
  for (let i = 0; i < 8; i++) {
    if (gemMeshes[i]) {
      gemMeshes[i].rotation.y = time * 2 + i;
      gemMeshes[i].rotation.x = Math.sin(time * 1.5 + i) * 0.3;
      
      // Gentle float
      const slot = slotMeshes[i];
      gemMeshes[i].position.y = slot.position.y + Math.sin(time * 2 + i * 0.5) * 0.02;
    }
  }

  // Pulse slot indicators
  for (let i = 0; i < 8; i++) {
    if (!gemMeshes[i]) {
      const pulse = 0.3 + Math.sin(time * 3 + i) * 0.2;
      slotMeshes[i].material.emissiveIntensity = pulse;
      slotMeshes[i].visible = true;
    } else {
      slotMeshes[i].visible = false;
    }
  }
}

// ============ RENDER LOOP ============
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  if (mixer) mixer.update(delta);

  controls.update();
  animateGems(elapsed);

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
