<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a0a2e, #0d0d0d);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #hud h2 { margin: 0 0 10px 0; font-size: 1.2rem; color: #aaddff; }
        #hud p { margin: 5px 0; font-size: 1rem; }
        .rating-text { font-weight: bold; }
        .rating-Bronze { color: #cd7f32; }
        .rating-Silver { color: #c0c0c0; }
        .rating-Gold { color: #ffd700; }
        .rating-Platinum { color: #e5e4e2; }

        #toolbar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
            align-items: center;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            padding-right: 15px;
        }
        .btn-group:last-child { border-right: none; padding-right: 0; }
        .group-label {
            position: absolute;
            top: -20px;
            font-size: 0.75rem;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .group-container { position: relative; display: flex; gap: 8px; }
        
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            font-size: 0.9rem;
        }
        button:hover { background: rgba(255, 255, 255, 0.2); }
        button.active {
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.25);
            font-weight: bold;
        }
        #controls-help {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 20, 0.7);
            padding: 15px;
            border-radius: 8px;
            font-size: 0.85rem;
            color: #ccc;
            pointer-events: auto;
        }
        #controls-help ul { margin: 5px 0 0 0; padding-left: 20px; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="hud">
            <h2>Design Stats</h2>
            <p>Score: <span id="ui-score">0</span></p>
            <p>Rating: <span id="ui-rating" class="rating-text rating-Bronze">Bronze</span></p>
            <p>Gems Placed: <span id="ui-gems-placed">0</span>/8</p>
            <div style="font-size: 0.8rem; color: #aaa; margin-top: 10px;">
                Base: <span id="ui-base">0</span> | Combo: <span id="ui-combo">0</span> | Sym: <span id="ui-sym">0</span>
            </div>
        </div>

        <div id="controls-help">
            <strong>Controls:</strong>
            <ul>
                <li>Left Click: Place/Replace Gem</li>
                <li>Right Click: Remove Gem</li>
                <li>1-4: Select Gem Type</li>
                <li>R: Toggle Auto-Rotate</li>
                <li>C: Clear All Gems</li>
            </ul>
        </div>

        <div id="toolbar">
            <div class="group-container">
                <div class="group-label">Material</div>
                <div class="btn-group">
                    <button id="btn-gold" class="active">Gold</button>
                    <button id="btn-platinum">Platinum</button>
                    <button id="btn-rosegold">Rose Gold</button>
                </div>
            </div>
            
            <div class="group-container">
                <div class="group-label">Gem Type</div>
                <div class="btn-group">
                    <button id="btn-diamond" class="active">Diamond</button>
                    <button id="btn-ruby">Ruby</button>
                    <button id="btn-emerald">Emerald</button>
                    <button id="btn-sapphire">Sapphire</button>
                </div>
            </div>

            <div class="group-container">
                <div class="group-label">Actions</div>
                <div class="btn-group" style="border: none;">
                    <button id="btn-clear">Clear All</button>
                    <button id="btn-randomize">Randomize</button>
                    <button id="btn-rotate">Auto Rotate</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ringMaterial: 'gold',
            selectedGem: 'diamond',
            gems: Array(8).fill(null),
            gemsPlaced: 0,
            baseScore: 0,
            comboBonus: 0,
            symmetryBonus: 0,
            totalScore: 0,
            rating: 'Bronze',
            materialMultiplier: 1.0,
            autoRotate: false,
            modelLoaded: false,
            slotPositions: Array(8).fill({x:0, y:0, z:0}),
            animationPlaying: false
        };
        const state = window.__3D_STATE__;

        // --- Configuration ---
        const MATERIALS = {
            gold: { color: 0xffd700, metalness: 0.95, roughness: 0.1, mult: 1.0 },
            platinum: { color: 0xe5e4e2, metalness: 0.98, roughness: 0.05, mult: 1.5 },
            rosegold: { color: 0xb76e79, metalness: 0.9, roughness: 0.15, mult: 1.2 }
        };

        const GEMS = {
            diamond: { geom: new THREE.IcosahedronGeometry(0.12, 0), color: 0xffffff, emissive: 0xaaddff, score: 100 },
            ruby: { geom: new THREE.OctahedronGeometry(0.1, 0), color: 0xff0033, emissive: 0xff0000, score: 75 },
            emerald: { geom: new THREE.BoxGeometry(0.14, 0.14, 0.14), color: 0x00cc44, emissive: 0x00ff00, score: 60 },
            sapphire: { geom: new THREE.DodecahedronGeometry(0.11, 0), color: 0x0044ff, emissive: 0x0033cc, score: 85 }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 3;
        controls.maxDistance = 12;
        controls.target.set(0, 1.5, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x9966ff, 0.3);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xffaa44, 1.2, 20);
        warmLight.position.set(5, 8, 5);
        warmLight.castShadow = true;
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x4488ff, 0.8, 20);
        coolLight.position.set(-5, 6, -3);
        scene.add(coolLight);

        // --- Ring Model ---
        const ringGroup = new THREE.Group();
        ringGroup.position.set(0, 1.5, 0);
        scene.add(ringGroup);

        const ringGeometry = new THREE.TorusGeometry(1.2, 0.15, 32, 100);
        const ringMaterial = new THREE.MeshStandardMaterial(MATERIALS.gold);
        const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
        ringMesh.castShadow = true;
        ringMesh.receiveShadow = true;
        ringGroup.add(ringMesh);

        // --- Slots ---
        const slots = [];
        const placedGemMeshes = Array(8).fill(null);
        const slotGeometry = new THREE.SphereGeometry(0.02, 16, 16);
        const slotMaterial = new THREE.MeshBasicMaterial({ color: 0xaaaaaa });

        const startAngle = Math.PI / 2 - Math.PI / 3;
        const endAngle = Math.PI / 2 + Math.PI / 3;
        const angleStep = (endAngle - startAngle) / 7;
        const placementRadius = 1.2 + 0.15; // Torus radius + tube radius

        for (let i = 0; i < 8; i++) {
            const angle = startAngle + i * angleStep;
            const slot = new THREE.Mesh(slotGeometry, slotMaterial);
            slot.position.x = placementRadius * Math.cos(angle);
            slot.position.y = placementRadius * Math.sin(angle);
            slot.position.z = 0;
            slot.userData = { isSlot: true, index: i };
            ringGroup.add(slot);
            slots.push(slot);
            
            const worldPos = new THREE.Vector3();
            slot.getWorldPosition(worldPos);
            state.slotPositions[i] = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
        }

        // --- GLTF Loader ---
        let mixer;
        const clock = new THREE.Clock();
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(-4, 0, -2);
                model.scale.set(0.5, 0.5, 0.5);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                state.modelLoaded = true;

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                    state.animationPlaying = true;
                }
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Logic Functions ---
        function updateScore() {
            let base = 0;
            let combo = 0;
            let sym = 0;
            let count = 0;

            // Base Score
            for (let i = 0; i < 8; i++) {
                if (state.gems[i]) {
                    base += GEMS[state.gems[i]].score;
                    count++;
                }
            }
            base = Math.floor(base * state.materialMultiplier);

            // Combo Bonus
            let currentRun = 1;
            for (let i = 1; i < 8; i++) {
                if (state.gems[i] && state.gems[i] === state.gems[i-1]) {
                    currentRun++;
                } else {
                    if (currentRun >= 3) combo += currentRun * 50;
                    currentRun = 1;
                }
            }
            if (currentRun >= 3) combo += currentRun * 50;

            // Symmetry Bonus
            let isSymmetric = true;
            let hasGems = false;
            for (let i = 0; i < 4; i++) {
                if (state.gems[i] !== state.gems[7-i]) isSymmetric = false;
                if (state.gems[i] || state.gems[7-i]) hasGems = true;
            }
            if (isSymmetric && hasGems) sym = 200;

            // Total & Rating
            const total = base + combo + sym;
            let rating = 'Bronze';
            if (total > 900) rating = 'Platinum';
            else if (total > 500) rating = 'Gold';
            else if (total > 200) rating = 'Silver';

            // Update State
            state.baseScore = base;
            state.comboBonus = combo;
            state.symmetryBonus = sym;
            state.totalScore = total;
            state.rating = rating;
            state.gemsPlaced = count;

            // Update UI
            document.getElementById('ui-score').textContent = total;
            document.getElementById('ui-base').textContent = base;
            document.getElementById('ui-combo').textContent = combo;
            document.getElementById('ui-sym').textContent = sym;
            document.getElementById('ui-gems-placed').textContent = count;
            
            const ratingEl = document.getElementById('ui-rating');
            ratingEl.textContent = rating;
            ratingEl.className = `rating-text rating-${rating}`;
        }

        function setMaterial(matName) {
            state.ringMaterial = matName;
            state.materialMultiplier = MATERIALS[matName].mult;
            
            ringMaterial.color.setHex(MATERIALS[matName].color);
            ringMaterial.metalness = MATERIALS[matName].metalness;
            ringMaterial.roughness = MATERIALS[matName].roughness;
            ringMaterial.needsUpdate = true;

            ['gold', 'platinum', 'rosegold'].forEach(m => {
                document.getElementById(`btn-${m}`).classList.toggle('active', m === matName);
            });
            updateScore();
        }

        function setGemType(gemName) {
            state.selectedGem = gemName;
            ['diamond', 'ruby', 'emerald', 'sapphire'].forEach(g => {
                document.getElementById(`btn-${g}`).classList.toggle('active', g === gemName);
            });
        }

        function placeGem(index, gemType) {
            if (placedGemMeshes[index]) {
                ringGroup.remove(placedGemMeshes[index]);
                placedGemMeshes[index].geometry.dispose();
                placedGemMeshes[index].material.dispose();
            }

            if (gemType) {
                const gData = GEMS[gemType];
                const mat = new THREE.MeshStandardMaterial({
                    color: gData.color,
                    emissive: gData.emissive,
                    emissiveIntensity: 0.4,
                    metalness: 0.1,
                    roughness: 0.1,
                    transparent: true,
                    opacity: 0.9
                });
                const mesh = new THREE.Mesh(gData.geom, mat);
                mesh.position.copy(slots[index].position);
                
                // Orient gem outwards
                const dir = mesh.position.clone().normalize();
                const axis = new THREE.Vector3(0, 1, 0);
                mesh.quaternion.setFromUnitVectors(axis, dir);

                mesh.userData = { isGem: true, index: index };
                mesh.castShadow = true;
                ringGroup.add(mesh);
                placedGemMeshes[index] = mesh;
                state.gems[index] = gemType;
            } else {
                placedGemMeshes[index] = null;
                state.gems[index] = null;
            }
            updateScore();
        }

        function clearAll() {
            for (let i = 0; i < 8; i++) {
                placeGem(i, null);
            }
        }

        function randomize() {
            const types = ['diamond', 'ruby', 'emerald', 'sapphire'];
            for (let i = 0; i < 8; i++) {
                const randomType = types[Math.floor(Math.random() * types.length)];
                placeGem(i, randomType);
            }
        }

        function toggleAutoRotate() {
            state.autoRotate = !state.autoRotate;
            controls.autoRotate = state.autoRotate;
            document.getElementById('btn-rotate').classList.toggle('active', state.autoRotate);
        }

        // --- Interaction (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseClick(event) {
            if (event.button !== 0 && event.button !== 2) return; // Only left/right click
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            
            const interactables = [...slots];
            placedGemMeshes.forEach(m => { if(m) interactables.push(m); });

            const intersects = raycaster.intersectObjects(interactables);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const index = hit.userData.index;

                if (event.button === 0) { // Left click: Place
                    placeGem(index, state.selectedGem);
                } else if (event.button === 2) { // Right click: Remove
                    if (hit.userData.isGem || placedGemMeshes[index]) {
                        placeGem(index, null);
                    }
                }
            }
        }

        window.addEventListener('mousedown', onMouseClick);
        window.addEventListener('contextmenu', e => e.preventDefault());

        // --- UI Event Listeners ---
        document.getElementById('btn-gold').addEventListener('click', () => setMaterial('gold'));
        document.getElementById('btn-platinum').addEventListener('click', () => setMaterial('platinum'));
        document.getElementById('btn-rosegold').addEventListener('click', () => setMaterial('rosegold'));

        document.getElementById('btn-diamond').addEventListener('click', () => setGemType('diamond'));
        document.getElementById('btn-ruby').addEventListener('click', () => setGemType('ruby'));
        document.getElementById('btn-emerald').addEventListener('click', () => setGemType('emerald'));
        document.getElementById('btn-sapphire').addEventListener('click', () => setGemType('sapphire'));

        document.getElementById('btn-clear').addEventListener('click', clearAll);
        document.getElementById('btn-randomize').addEventListener('click', randomize);
        document.getElementById('btn-rotate').addEventListener('click', toggleAutoRotate);

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': setGemType('diamond'); break;
                case '2': setGemType('ruby'); break;
                case '3': setGemType('emerald'); break;
                case '4': setGemType('sapphire'); break;
                case 'r': toggleAutoRotate(); break;
                case 'c': clearAll(); break;
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            
            controls.update();
            
            // Update slot world positions in state
            for(let i=0; i<8; i++) {
                const worldPos = new THREE.Vector3();
                slots[i].getWorldPosition(worldPos);
                state.slotPositions[i] = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
            }

            renderer.render(scene, camera);
        }

        // Init
        updateScore();
        animate();
    </script>
</body>
</html>
