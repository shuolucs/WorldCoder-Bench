<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Lens Optics Education Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            pointer-events: auto;
            min-width: 250px;
            user-select: none;
        }
        #hud h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #4da6ff;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stat-value {
            font-weight: bold;
            color: #aaddff;
        }
        hr {
            border: 0;
            border-top: 1px solid #444;
            margin: 15px 0;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 12px;
            margin-bottom: 8px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #4da6ff;
            color: #000;
            border-color: #4da6ff;
        }
        .instructions {
            font-size: 12px;
            color: #aaa;
            margin-top: 15px;
            line-height: 1.4;
        }
        .key {
            background: #444;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h3>Lens Optics</h3>
        <div class="stat-row"><span>Object Dist (do):</span> <span id="val-do" class="stat-value">0.00</span></div>
        <div class="stat-row"><span>Image Dist (di):</span> <span id="val-di" class="stat-value">0.00</span></div>
        <div class="stat-row"><span>Magnification (m):</span> <span id="val-m" class="stat-value">0.00</span></div>
        <div class="stat-row"><span>Focal Length (f):</span> <span id="val-f" class="stat-value">3.00</span></div>
        <div class="stat-row"><span>Image Type:</span> <span id="val-type" class="stat-value">-</span></div>
        <div class="stat-row"><span>Screen Pos:</span> <span id="val-screen" class="stat-value">6.00</span></div>
        <hr>
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
        <button id="resetBtn">Reset</button>
        <button id="toggleLensBtn">Toggle Lens Type</button>
        <div class="instructions">
            • Drag the lantern to move it.<br>
            • Use <span class="key">[</span> and <span class="key">]</span> to move screen.
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            lanternX: -8,
            screenX: 6,
            objectDistance: 8,
            imageDistance: 4.8,
            magnification: -0.6,
            focalLength: 3,
            imageType: 'Real',
            lensType: 'converging',
            isImageOnScreen: false,
            savedState: null,
            rayCount: 3,
            lanternLoaded: false,
            imagePositionX: 4.8,
            imageMagnitudeScale: 0.6
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Grid Helper
        const grid = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- Optical Elements ---
        const opticalAxisY = 2;

        // Lens
        const lensGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.1, 32);
        const lensMat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.4,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.5,
            side: THREE.DoubleSide
        });
        const lens = new THREE.Mesh(lensGeo, lensMat);
        lens.rotation.x = Math.PI / 2;
        lens.position.set(0, opticalAxisY, 0);
        scene.add(lens);

        // Focal Points
        const focalGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const focalMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const f1 = new THREE.Mesh(focalGeo, focalMat);
        const f2 = new THREE.Mesh(focalGeo, focalMat);
        scene.add(f1);
        scene.add(f2);

        // Screen
        const screenGeo = new THREE.PlaneGeometry(3, 4);
        const screenMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide });
        const screenMesh = new THREE.Mesh(screenGeo, screenMat);
        screenMesh.position.set(window.__3D_STATE__.screenX, opticalAxisY, 0);
        scene.add(screenMesh);

        // Screen Stand
        const standGeo = new THREE.CylinderGeometry(0.1, 0.1, opticalAxisY);
        const standMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const screenStand = new THREE.Mesh(standGeo, standMat);
        screenStand.position.set(0, -opticalAxisY/2, 0);
        screenMesh.add(screenStand);

        // Lantern Group
        const lanternGroup = new THREE.Group();
        lanternGroup.position.set(window.__3D_STATE__.lanternX, 1, 0);
        scene.add(lanternGroup);

        // Lantern Fallback
        const fallbackGeo = new THREE.BoxGeometry(1, 2, 1);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.position.y = 1;
        lanternGroup.add(fallbackMesh);

        // Lantern Tip Indicator
        const tipGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const tipMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const tipMesh = new THREE.Mesh(tipGeo, tipMat);
        tipMesh.position.y = 1.5; // Relative to lanternGroup (y=1), so world y=2.5
        lanternGroup.add(tipMesh);

        // Load GLB
        const loader = new GLTFLoader();
        loader.load('._Lantern.glb', (gltf) => {
            lanternGroup.remove(fallbackMesh);
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            // Adjust model position if needed so its visual top aligns with y=1.5 relative
            lanternGroup.add(model);
            window.__3D_STATE__.lanternLoaded = true;
        }, undefined, (err) => {
            // Silently fallback if file not found
        });

        // Light Cone
        const coneGeo = new THREE.BufferGeometry();
        const coneMat = new THREE.LineBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.2 });
        const coneLines = new THREE.LineSegments(coneGeo, coneMat);
        scene.add(coneLines);

        // Image Representation (Arrow)
        const imageGroup = new THREE.Group();
        scene.add(imageGroup);
        const arrowGeo = new THREE.CylinderGeometry(0.05, 0.05, 1);
        const headGeo = new THREE.ConeGeometry(0.15, 0.3);
        const imgMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
        const arrowMesh = new THREE.Mesh(arrowGeo, imgMat);
        const headMesh = new THREE.Mesh(headGeo, imgMat);
        imageGroup.add(arrowMesh);
        imageGroup.add(headMesh);

        // Rays
        const rayMaterials = {
            solid: [
                new THREE.LineBasicMaterial({ color: 0xff4444 }), // Red
                new THREE.LineBasicMaterial({ color: 0x44ff44 }), // Green
                new THREE.LineBasicMaterial({ color: 0x4444ff })  // Blue
            ],
            dashed: [
                new THREE.LineDashedMaterial({ color: 0xff4444, dashSize: 0.2, gapSize: 0.1 }),
                new THREE.LineDashedMaterial({ color: 0x44ff44, dashSize: 0.2, gapSize: 0.1 }),
                new THREE.LineDashedMaterial({ color: 0x4444ff, dashSize: 0.2, gapSize: 0.1 })
            ]
        };

        const rays = [];
        for (let i = 0; i < 3; i++) {
            const solidLine = new THREE.Line(new THREE.BufferGeometry(), rayMaterials.solid[i]);
            const dashedLine = new THREE.Line(new THREE.BufferGeometry(), rayMaterials.dashed[i]);
            scene.add(solidLine);
            scene.add(dashedLine);
            rays.push({ solid: solidLine, dashed: dashedLine });
        }

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let isDragging = false;

        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(lanternGroup, true);
            if (intersects.length > 0) {
                isDragging = true;
                controls.enabled = false;
            }
        });

        renderer.domElement.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);
            if (target) {
                let newX = target.x;
                newX = Math.max(-12, Math.min(-2, newX));
                lanternGroup.position.x = newX;
                window.__3D_STATE__.lanternX = newX;
                updateOptics();
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            controls.enabled = true;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === '[') {
                screenMesh.position.x = Math.max(2, screenMesh.position.x - 0.5);
                updateOptics();
            } else if (e.key === ']') {
                screenMesh.position.x = Math.min(12, screenMesh.position.x + 0.5);
                updateOptics();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI Buttons ---
        document.getElementById('saveBtn').addEventListener('click', () => {
            const stateToSave = {
                lanternX: lanternGroup.position.x,
                screenX: screenMesh.position.x,
                focalLength: window.__3D_STATE__.focalLength
            };
            localStorage.setItem('lensOpticsSave', JSON.stringify(stateToSave));
            window.__3D_STATE__.savedState = stateToSave;
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            const saved = localStorage.getItem('lensOpticsSave');
            if (saved) {
                const state = JSON.parse(saved);
                lanternGroup.position.x = state.lanternX;
                screenMesh.position.x = state.screenX;
                if (state.focalLength !== window.__3D_STATE__.focalLength) {
                    toggleLens();
                }
                updateOptics();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            lanternGroup.position.x = -8;
            screenMesh.position.x = 6;
            if (window.__3D_STATE__.focalLength < 0) toggleLens();
            updateOptics();
        });

        document.getElementById('toggleLensBtn').addEventListener('click', toggleLens);

        function toggleLens() {
            const state = window.__3D_STATE__;
            if (state.focalLength > 0) {
                state.focalLength = -3;
                state.lensType = 'diverging';
                lensMat.color.setHex(0xff8888);
            } else {
                state.focalLength = 3;
                state.lensType = 'converging';
                lensMat.color.setHex(0x88ccff);
            }
            updateOptics();
        }

        // --- Optics Engine ---
        function updateOptics() {
            const state = window.__3D_STATE__;
            state.lanternX = lanternGroup.position.x;
            state.screenX = screenMesh.position.x;

            const f = state.focalLength;
            const do_val = Math.abs(state.lanternX);
            
            // Thin lens equation
            let di_val;
            if (do_val === f) {
                di_val = 9999; // Avoid infinity
            } else {
                di_val = (f * do_val) / (do_val - f);
            }
            
            const m_val = -di_val / do_val;

            state.objectDistance = do_val;
            state.imageDistance = di_val;
            state.magnification = m_val;
            state.imageType = di_val > 0 ? 'Real' : 'Virtual';
            state.imagePositionX = di_val;
            state.imageMagnitudeScale = Math.abs(m_val);

            // Update Focal Points
            f1.position.set(-Math.abs(f), opticalAxisY, 0);
            f2.position.set(Math.abs(f), opticalAxisY, 0);

            // Update Image Arrow
            const objTipY = 2.5;
            const ho = objTipY - opticalAxisY;
            const hi = m_val * ho;
            
            imageGroup.position.set(di_val, opticalAxisY, 0);
            if (Math.abs(hi) > 0.05 && Math.abs(di_val) < 50) {
                imageGroup.visible = true;
                const len = Math.abs(hi);
                arrowMesh.scale.y = len;
                arrowMesh.position.y = hi / 2;
                headMesh.position.y = hi;
                headMesh.rotation.z = hi < 0 ? Math.PI : 0;
                
                // Dashed material for virtual image arrow
                if (di_val < 0) {
                    imgMat.transparent = true;
                    imgMat.opacity = 0.5;
                } else {
                    imgMat.transparent = false;
                    imgMat.opacity = 1.0;
                }
            } else {
                imageGroup.visible = false;
            }

            // Screen Focus Indicator
            state.isImageOnScreen = di_val > 0 && Math.abs(state.screenX - di_val) < 0.5;
            if (state.isImageOnScreen) {
                screenMat.emissive.setHex(0x332200);
            } else {
                screenMat.emissive.setHex(0x000000);
            }

            // Update Rays
            const Po = new THREE.Vector3(state.lanternX, objTipY, 0);
            const Pi = new THREE.Vector3(di_val, opticalAxisY + hi, 0);

            // Ray 1: Parallel -> Focal
            const Phit1 = new THREE.Vector3(0, objTipY, 0);
            updateRayGeometry(0, Po, Phit1, Pi, di_val);

            // Ray 2: Center
            const Phit2 = new THREE.Vector3(0, opticalAxisY, 0);
            updateRayGeometry(1, Po, Phit2, Pi, di_val);

            // Ray 3: Focal -> Parallel
            const Phit3 = new THREE.Vector3(0, Pi.y, 0);
            updateRayGeometry(2, Po, Phit3, Pi, di_val);

            // Update Light Cone
            const conePts = [];
            for(let i=0; i<=16; i++) {
                const angle = (i/16) * Math.PI * 2;
                const r = 2.5;
                conePts.push(Po.x, Po.y, Po.z);
                conePts.push(0, opticalAxisY + r * Math.cos(angle), r * Math.sin(angle));
            }
            coneGeo.setAttribute('position', new THREE.Float32BufferAttribute(conePts, 3));

            updateHUD();
        }

        function updateRayGeometry(index, Po, Phit, Pi, di) {
            const ray = rays[index];
            const solidPts = [Po.x, Po.y, Po.z, Phit.x, Phit.y, Phit.z];
            const dashedPts = [];

            if (Math.abs(di) < 50) {
                const dir = new THREE.Vector3();
                if (di > 0) {
                    // Real: Light goes from Phit through Pi
                    dir.subVectors(Pi, Phit).normalize();
                    const Pext = Phit.clone().add(dir.multiplyScalar(20));
                    solidPts.push(Phit.x, Phit.y, Phit.z, Pext.x, Pext.y, Pext.z);
                    ray.dashed.visible = false;
                } else {
                    // Virtual: Light diverges from Phit away from Pi
                    dir.subVectors(Phit, Pi).normalize();
                    const Pext = Phit.clone().add(dir.multiplyScalar(20));
                    solidPts.push(Phit.x, Phit.y, Phit.z, Pext.x, Pext.y, Pext.z);
                    
                    dashedPts.push(Phit.x, Phit.y, Phit.z, Pi.x, Pi.y, Pi.z);
                    ray.dashed.visible = true;
                }
            }

            ray.solid.geometry.setAttribute('position', new THREE.Float32BufferAttribute(solidPts, 3));
            if (dashedPts.length > 0) {
                ray.dashed.geometry.setAttribute('position', new THREE.Float32BufferAttribute(dashedPts, 3));
                ray.dashed.geometry.computeLineDistances();
            }
        }

        function updateHUD() {
            const s = window.__3D_STATE__;
            document.getElementById('val-do').innerText = s.objectDistance.toFixed(2);
            document.getElementById('val-di').innerText = Math.abs(s.imageDistance) > 50 ? '∞' : s.imageDistance.toFixed(2);
            document.getElementById('val-m').innerText = Math.abs(s.magnification) > 50 ? '∞' : s.magnification.toFixed(2);
            document.getElementById('val-f').innerText = s.focalLength.toFixed(2);
            document.getElementById('val-type').innerText = s.imageType;
            document.getElementById('val-screen').innerText = s.screenX.toFixed(2);
        }

        // Initialize
        updateOptics();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
