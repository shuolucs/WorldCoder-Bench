<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lens Optics Education Demo</title>
<style>
  body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    z-index: 10;
  }
  #hud h3 { margin: 0 0 8px 0; color: #88ccff; font-size: 16px; }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; }
  #hud .real { color: #4f4; }
  #hud .virtual { color: #f84; }
  #buttons {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  #buttons button {
    padding: 10px 18px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    transition: background 0.2s;
  }
  #saveBtn { background: #4CAF50; color: white; }
  #saveBtn:hover { background: #45a049; }
  #loadBtn { background: #2196F3; color: white; }
  #loadBtn:hover { background: #1e88e5; }
  #resetBtn { background: #ff9800; color: white; }
  #resetBtn:hover { background: #f57c00; }
  #toggleLensBtn { background: #9c27b0; color: white; }
  #toggleLensBtn:hover { background: #7b1fa2; }
  #instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #ccc;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 12px;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🔬 Lens Optics</h3>
  <div><span class="label">Object Distance (do):</span> <span class="value" id="hudDo">0.00</span></div>
  <div><span class="label">Image Distance (di):</span> <span class="value" id="hudDi">0.00</span></div>
  <div><span class="label">Magnification (m):</span> <span class="value" id="hudM">0.00</span></div>
  <div><span class="label">Focal Length (f):</span> <span class="value" id="hudF">3.00</span></div>
  <div><span class="label">Image Type:</span> <span class="value" id="hudType">Real</span></div>
  <div><span class="label">Screen Position:</span> <span class="value" id="hudScreen">6.00</span></div>
  <div><span class="label">Lens Type:</span> <span class="value" id="hudLens">Converging</span></div>
  <div><span class="label">Focused on Screen:</span> <span class="value" id="hudFocused">No</span></div>
</div>

<div id="buttons">
  <button id="saveBtn">💾 Save State</button>
  <button id="loadBtn">📂 Load State</button>
  <button id="resetBtn">🔄 Reset</button>
  <button id="toggleLensBtn">🔀 Toggle Lens Type</button>
</div>

<div id="instructions">
  Drag lantern left/right | [ ] keys move screen | Orbit: mouse right-click/scroll
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let lanternX = -8;
let screenX = 6;
let focalLength = 3;
let lensType = 'converging';
let lanternLoaded = false;
let savedState = null;

window.__3D_STATE__ = {
  lanternX: lanternX,
  screenX: screenX,
  objectDistance: 0,
  imageDistance: 0,
  magnification: 0,
  focalLength: focalLength,
  imageType: 'Real',
  lensType: lensType,
  isImageOnScreen: false,
  savedState: null,
  rayCount: 3,
  lanternLoaded: false,
  imagePositionX: 0,
  imageMagnitudeScale: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// --- Ground Plane ---
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Optical Axis ---
const axisGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(-15, 2, 0),
  new THREE.Vector3(15, 2, 0)
]);
const axisMat = new THREE.LineBasicMaterial({ color: 0x444466 });
const axisLine = new THREE.Line(axisGeo, axisMat);
scene.add(axisLine);

// --- Lens ---
const lensGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.1, 64);
const lensMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.35,
  roughness: 0.1,
  metalness: 0.0,
  side: THREE.DoubleSide,
  transmission: 0.5
});
const lens = new THREE.Mesh(lensGeo, lensMat);
lens.position.set(0, 2, 0);
lens.rotation.z = Math.PI / 2;
scene.add(lens);

// Lens edge ring
const ringGeo = new THREE.TorusGeometry(2.5, 0.05, 8, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0xaaddff });
const lensRing = new THREE.Mesh(ringGeo, ringMat);
lensRing.position.set(0, 2, 0);
scene.add(lensRing);

// --- Focal Points ---
const focalGeo = new THREE.SphereGeometry(0.12, 16, 16);
const focalMat = new THREE.MeshStandardMaterial({ color: 0xff3333, emissive: 0xff0000, emissiveIntensity: 0.5 });
const focalNear = new THREE.Mesh(focalGeo, focalMat);
const focalFar = new THREE.Mesh(focalGeo, focalMat.clone());
scene.add(focalNear);
scene.add(focalFar);

function updateFocalPoints() {
  focalNear.position.set(-Math.abs(focalLength), 2, 0);
  focalFar.position.set(Math.abs(focalLength), 2, 0);
}
updateFocalPoints();

// --- Projection Screen ---
const screenGeo = new THREE.PlaneGeometry(4, 3);
const screenMat = new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide, roughness: 0.5 });
const projScreen = new THREE.Mesh(screenGeo, screenMat);
projScreen.position.set(screenX, 2, 0);
projScreen.rotation.y = -Math.PI / 2;
scene.add(projScreen);

// Screen frame
const frameGeo = new THREE.BoxGeometry(0.1, 3.2, 4.2);
const frameMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
const screenFrame = new THREE.Mesh(frameGeo, frameMat);
screenFrame.position.set(screenX, 2, 0);
scene.add(screenFrame);

// Screen stand
const standGeo = new THREE.CylinderGeometry(0.08, 0.08, 2);
const standMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
const screenStand = new THREE.Mesh(standGeo, standMat);
screenStand.position.set(screenX, 0.5, 0);
scene.add(screenStand);

// --- Lantern (fallback if GLB fails) ---
let lanternGroup = new THREE.Group();
let lanternModel = null;

// Create a fallback lantern
function createFallbackLantern() {
  const group = new THREE.Group();
  
  // Base
  const baseGeo = new THREE.CylinderGeometry(0.3, 0.4, 0.3, 8);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.15;
  group.add(base);
  
  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.35, 0.3, 1.2, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.9;
  group.add(body);
  
  // Glass
  const glassGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.8, 8);
  const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xffee88, transparent: true, opacity: 0.5, emissive: 0xffaa00, emissiveIntensity: 0.8 });
  const glass = new THREE.Mesh(glassGeo, glassMat);
  glass.position.y = 0.9;
  group.add(glass);
  
  // Top
  const topGeo = new THREE.ConeGeometry(0.35, 0.4, 8);
  const topMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.6, roughness: 0.3 });
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.y = 1.7;
  group.add(top);
  
  // Light glow
  const glowGeo = new THREE.SphereGeometry(0.2, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.y = 0.9;
  group.add(glow);
  
  // Point light
  const pLight = new THREE.PointLight(0xffaa44, 1, 10);
  pLight.position.y = 0.9;
  group.add(pLight);
  
  return group;
}

// Try loading GLB, fallback to procedural
const loader = new GLTFLoader();
try {
  loader.load('._Lantern.glb', 
    (gltf) => {
      lanternModel = gltf.scene;
      lanternModel.scale.set(0.5, 0.5, 0.5);
      lanternGroup.add(lanternModel);
      lanternLoaded = true;
      window.__3D_STATE__.lanternLoaded = true;
    },
    undefined,
    (error) => {
      console.log('GLB load failed, using fallback lantern');
      const fallback = createFallbackLantern();
      lanternGroup.add(fallback);
      lanternLoaded = true;
      window.__3D_STATE__.lanternLoaded = true;
    }
  );
} catch(e) {
  const fallback = createFallbackLantern();
  lanternGroup.add(fallback);
  lanternLoaded = true;
  window.__3D_STATE__.lanternLoaded = true;
}

// If nothing loaded after a timeout, use fallback
setTimeout(() => {
  if (!lanternLoaded) {
    const fallback = createFallbackLantern();
    lanternGroup.add(fallback);
    lanternLoaded = true;
    window.__3D_STATE__.lanternLoaded = true;
  }
}, 2000);

lanternGroup.position.set(lanternX, 1, 0);
scene.add(lanternGroup);

// --- Light Cone Rays (from lantern to lens) ---
let lightConeLines = null;

function updateLightCone() {
  if (lightConeLines) {
    scene.remove(lightConeLines);
    lightConeLines.geometry.dispose();
  }
  
  const points = [];
  const lanternTip = new THREE.Vector3(lanternGroup.position.x, 2.5, 0);
  const numRays = 12;
  
  for (let i = 0; i < numRays; i++) {
    const angle = (i / numRays) * Math.PI * 2;
    const r = 2.0;
    const targetY = 2 + Math.cos(angle) * r;
    const targetZ = Math.sin(angle) * r;
    
    points.push(lanternTip.clone());
    points.push(new THREE.Vector3(0, targetY, targetZ));
  }
  
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0xffdd44, transparent: true, opacity: 0.3 });
  lightConeLines = new THREE.LineSegments(geo, mat);
  scene.add(lightConeLines);
}

// --- Principal Rays ---
let ray1Line = null, ray2Line = null, ray3Line = null;
let dashedRay1 = null, dashedRay2 = null, dashedRay3 = null;

function clearRays() {
  [ray1Line, ray2Line, ray3Line, dashedRay1, dashedRay2, dashedRay3].forEach(r => {
    if (r) {
      scene.remove(r);
      r.geometry.dispose();
      r.material.dispose();
    }
  });
  ray1Line = ray2Line = ray3Line = dashedRay1 = dashedRay2 = dashedRay3 = null;
}

function createLine(points, color, dashed = false) {
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  let mat;
  if (dashed) {
    mat = new THREE.LineDashedMaterial({ color, dashSize: 0.3, gapSize: 0.15, linewidth: 2 });
  } else {
    mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
  }
  const line = new THREE.Line(geo, mat);
  if (dashed) line.computeLineDistances();
  scene.add(line);
  return line;
}

// --- Image Arrow ---
let imageArrow = null;
let imageArrowLine = null;
let imageArrowHead = null;

function clearImage() {
  [imageArrow, imageArrowLine, imageArrowHead].forEach(obj => {
    if (obj) {
      scene.remove(obj);
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    }
  });
  imageArrow = imageArrowLine = imageArrowHead = null;
}

function createImageArrow(x, height, isVirtual) {
  clearImage();
  
  const color = isVirtual ? 0xff8844 : 0xff6600;
  const absHeight = Math.min(Math.abs(height), 5);
  
  // Arrow shaft
  const shaftPoints = [
    new THREE.Vector3(x, 2, 0),
    new THREE.Vector3(x, 2 + (height > 0 ? absHeight : -absHeight), 0)
  ];
  
  if (isVirtual) {
    imageArrowLine = createLine(shaftPoints, color, true);
  } else {
    imageArrowLine = createLine(shaftPoints, color, false);
  }
  
  // Arrow head
  const headGeo = new THREE.ConeGeometry(0.15, 0.4, 8);
  const headMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.3 });
  imageArrowHead = new THREE.Mesh(headGeo, headMat);
  imageArrowHead.position.set(x, 2 + (height > 0 ? absHeight : -absHeight), 0);
  if (height < 0) imageArrowHead.rotation.z = Math.PI;
  scene.add(imageArrowHead);
  
  // Glow sphere at image point
  const glowGeo = new THREE.SphereGeometry(0.15, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 });
  imageArrow = new THREE.Mesh(glowGeo, glowMat);
  imageArrow.position.set(x, 2, 0);
  scene.add(imageArrow);
}

// --- Object Arrow (at lantern) ---
let objectArrow = null;

function updateObjectArrow() {
  if (objectArrow) {
    scene.remove(objectArrow);
    objectArrow.geometry.dispose();
    objectArrow.material.dispose();
  }
  
  const points = [
    new THREE.Vector3(lanternGroup.position.x, 2, 0),
    new THREE.Vector3(lanternGroup.position.x, 3.5, 0)
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0x00ff88, linewidth: 2 });
  objectArrow = new THREE.Line(geo, mat);
  scene.add(objectArrow);
}

// --- Optics Calculation ---
function updateOptics() {
  const lensX = 0;
  const objectY = 2;
  const objectTipY = 3.5; // top of object arrow
  const objectHeight = objectTipY - objectY; // 1.5
  
  const doVal = Math.abs(lanternGroup.position.x - lensX);
  const f = focalLength;
  
  let di, m, imageType, imageX, imageHeight;
  
  if (Math.abs(doVal - Math.abs(f)) < 0.01) {
    // Object at focal point - image at infinity
    di = Infinity;
    m = Infinity;
    imageType = 'At Infinity';
    imageX = 100;
    imageHeight = 0;
  } else {
    di = (f * doVal) / (doVal - f);
    m = -di / doVal;
    
    if (f > 0) {
      // Converging lens
      if (doVal > f) {
        imageType = 'Real';
        imageX = lensX + di;
        imageHeight = m * objectHeight;
      } else {
        imageType = 'Virtual';
        imageX = lensX + di; // di is negative, so image on same side as object
        imageHeight = m * objectHeight;
      }
    } else {
      // Diverging lens - always virtual, upright, reduced
      imageType = 'Virtual';
      imageX = lensX + di; // di is negative
      imageHeight = m * objectHeight;
    }
  }
  
  const isVirtual = imageType === 'Virtual';
  const isReal = imageType === 'Real';
  
  // Update state
  const imagePositionX = isFinite(di) ? imageX : 100;
  const imageMagnitudeScale = isFinite(m) ? Math.abs(m) : 0;
  const isImageOnScreen = isFinite(di) && Math.abs(screenX - imagePositionX) < 0.5 && isReal;
  
  window.__3D_STATE__ = {
    lanternX: lanternGroup.position.x,
    screenX: screenX,
    objectDistance: doVal,
    imageDistance: isFinite(di) ? di : 9999,
    magnification: isFinite(m) ? m : 9999,
    focalLength: f,
    imageType: isVirtual ? 'Virtual' : 'Real',
    lensType: lensType,
    isImageOnScreen: isImageOnScreen,
    savedState: savedState,
    rayCount: 3,
    lanternLoaded: lanternLoaded,
    imagePositionX: imagePositionX,
    imageMagnitudeScale: imageMagnitudeScale
  };
  
  // Update HUD
  document.getElementById('hudDo').textContent = doVal.toFixed(2);
  document.getElementById('hudDi').textContent = isFinite(di) ? di.toFixed(2) : '∞';
  document.getElementById('hudM').textContent = isFinite(m) ? m.toFixed(2) : '∞';
  document.getElementById('hudF').textContent = f.toFixed(2);
  
  const typeEl = document.getElementById('hudType');
  typeEl.textContent = imageType;
  typeEl.className = 'value ' + (isVirtual ? 'virtual' : 'real');
  
  document.getElementById('hudScreen').textContent = screenX.toFixed(2);
  document.getElementById('hudLens').textContent = lensType === 'converging' ? 'Converging' : 'Diverging';
  
  const focusedEl = document.getElementById('hudFocused');
  focusedEl.textContent = isImageOnScreen ? 'Yes ✓' : 'No';
  focusedEl.style.color = isImageOnScreen ? '#4f4' : '#f84';
  
  // --- Draw Principal Rays ---
  clearRays();
  
  const objX = lanternGroup.position.x;
  const objTipY = objectTipY;
  const absF = Math.abs(f);
  
  if (isFinite(di) && isFinite(m)) {
    const imgTipY = objectY + (m * objectHeight);
    const clampedImageX = Math.max(-15, Math.min(15, imageX));
    
    if (f > 0) {
      // CONVERGING LENS
      if (doVal > f) {
        // Real image
        // Ray 1: Parallel to axis -> through far focal point
        ray1Line = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(0, objTipY, 0),
          new THREE.Vector3(clampedImageX, imgTipY, 0)
        ], 0xff4444);
        
        // Ray 2: Through center of lens -> straight
        ray2Line = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(clampedImageX, imgTipY, 0)
        ], 0x44ff44);
        
        // Ray 3: Through near focal point -> parallel after lens
        // Line from object tip through near focal point (-f, 2, 0)
        const nearFocalX = -absF;
        const nearFocalY = objectY;
        // Direction from object tip to near focal point
        const dx3 = nearFocalX - objX;
        const dy3 = nearFocalY - objTipY;
        // Find y at lens (x=0)
        const t3 = (0 - objX) / dx3;
        const yAtLens3 = objTipY + dy3 * t3;
        
        ray3Line = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(0, yAtLens3, 0),
          new THREE.Vector3(clampedImageX, yAtLens3, 0)
        ], 0x4444ff);
        
      } else {
        // Virtual image (do < f)
        // Ray 1: Parallel -> refracts toward far focal point, but extends back
        const farFocalX = absF;
        const farFocalY = objectY;
        // After lens, ray goes from (0, objTipY) toward (farFocalX, farFocalY)
        const dx1 = farFocalX - 0;
        const dy1 = farFocalY - objTipY;
        const extX1 = 12;
        const t1ext = (extX1) / dx1;
        const extY1 = objTipY + dy1 * t1ext;
        
        ray1Line = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(0, objTipY, 0),
          new THREE.Vector3(extX1, extY1, 0)
        ], 0xff4444);
        
        // Dashed extension backward
        const backT1 = (clampedImageX) / dx1;
        const backY1 = objTipY + dy1 * backT1;
        dashedRay1 = createLine([
          new THREE.Vector3(0, objTipY, 0),
          new THREE.Vector3(clampedImageX, imgTipY, 0)
        ], 0xff4444, true);
        
        // Ray 2: Through center -> straight, extends forward and dashed backward
        const dx2 = 0 - objX;
        const dy2 = objectY - objTipY;
        const slope2 = dy2 / dx2;
        const extX2 = 12;
        const extY2 = objTipY + slope2 * (extX2 - objX);
        
        ray2Line = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(extX2, extY2, 0)
        ], 0x44ff44);
        
        dashedRay2 = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(clampedImageX, imgTipY, 0)
        ], 0x44ff44, true);
        
        // Ray 3: Aimed at near focal point -> parallel after lens
        const nearFocalX = -absF;
        const nearFocalY = objectY;
        const dx3 = nearFocalX - objX;
        const dy3 = nearFocalY - objTipY;
        const t3 = (0 - objX) / dx3;
        const yAtLens3 = objTipY + dy3 * t3;
        
        ray3Line = createLine([
          new THREE.Vector3(objX, objTipY, 0),
          new THREE.Vector3(0, yAtLens3, 0),
          new THREE.Vector3(12, yAtLens3, 0)
        ], 0x4444ff);
        
        dashedRay3 = createLine([
          new THREE.Vector3(0, yAtLens3, 0),
          new THREE.Vector3(clampedImageX, imgTipY, 0)
        ], 0x4444ff, true);
      }
    } else {
      // DIVERGING LENS (f < 0) - always virtual
      // Ray 1: Parallel to axis -> diverges as if from near focal point (same side as incoming)
      // Near focal point for diverging lens is at x = f (negative, same side as object)
      const virtualFocalX = f; // negative
      
      // After lens, ray appears to come from (virtualFocalX, objTipY... no)
      // For diverging: parallel ray refracts so it appears to come from focal point on same side
      // Ray hits lens at (0, objTipY), diverges as if from (f, objectY) = (f, 2)
      const dx1 = 0 - f; // positive
      const dy1 = objTipY - objectY;
      const slope1 = dy1 / dx1;
      const extX1 = 12;
      const extY1 = objTipY + slope1 * extX1;
      
      ray1Line = createLine([
        new THREE.Vector3(objX, objTipY, 0),
        new THREE.Vector3(0, objTipY, 0),
        new THREE.Vector3(extX1, extY1, 0)
      ], 0xff4444);
      
      // Dashed back to virtual image
      dashedRay1 = createLine([
        new THREE.Vector3(0, objTipY, 0),
        new THREE.Vector3(clampedImageX, imgTipY, 0)
      ], 0xff4444, true);
      
      // Ray 2: Through center -> straight
      const slope2 = (objectY - objTipY) / (0 - objX);
      const extX2 = 12;
      const extY2 = objTipY + slope2 * (extX2 - objX);
      
      ray2Line = createLine([
        new THREE.Vector3(objX, objTipY, 0),
        new THREE.Vector3(extX2, extY2, 0)
      ], 0x44ff44);
      
      dashedRay2 = createLine([
        new THREE.Vector3(objX, objTipY, 0),
        new THREE.Vector3(clampedImageX, imgTipY, 0)
      ], 0x44ff44, true);
      
      // Ray 3: Aimed at far focal point (on other side, x = -f = positive for diverging)
      // For diverging lens, the "far" focal point is at x = -f (positive)
      const farFocalX = -f; // positive
      const farFocalY = objectY;
      const dx3 = farFocalX - objX;
      const dy3 = farFocalY - objTipY;
      const t3 = (0 - objX) / dx3;
      const yAtLens3 = objTipY + dy3 * t3;
      
      // After lens, this ray goes parallel
      ray3Line = createLine([
        new THREE.Vector3(objX, objTipY, 0),
        new THREE.Vector3(0, yAtLens3, 0),
        new THREE.Vector3(12, yAtLens3, 0)
      ], 0x4444ff);
      
      dashedRay3 = createLine([
        new THREE.Vector3(0, yAtLens3, 0),
        new THREE.Vector3(clampedImageX, imgTipY, 0)
      ], 0x4444ff, true);
    }
    
    // Draw image arrow
    const clampedHeight = m * objectHeight;
    const clampedH = Math.sign(clampedHeight) * Math.min(Math.abs(clampedHeight), 5);
    createImageArrow(clampedImageX, clampedH, isVirtual);
  } else {
    clearImage();
  }
  
  // Update light cone
  updateLightCone();
  
  // Update object arrow
  updateObjectArrow();
  
  // Screen glow when focused
  if (isImageOnScreen) {
    screenMat.emissive = new THREE.Color(0xffaa00);
    screenMat.emissiveIntensity = 0.3;
  } else {
    screenMat.emissive = new THREE.Color(0x000000);
    screenMat.emissiveIntensity = 0;
  }
}

// --- Dragging ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
let dragOffset = new THREE.Vector3();

// Create invisible drag target for lantern
const dragTargetGeo = new THREE.BoxGeometry(2, 3, 2);
const dragTargetMat = new THREE.MeshBasicMaterial({ visible: false });
const dragTarget = new THREE.Mesh(dragTargetGeo, dragTargetMat);
dragTarget.position.set(lanternX, 1.5, 0);
scene.add(dragTarget);

function onPointerDown(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObject(dragTarget);
  if (intersects.length > 0) {
    isDragging = true;
    controls.enabled = false;
    
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, intersectPoint);
    dragOffset.copy(lanternGroup.position).sub(intersectPoint);
  }
}

function onPointerMove(event) {
  if (!isDragging) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  const intersectPoint = new THREE.Vector3();
  raycaster.ray.intersectPlane(dragPlane, intersectPoint);
  
  let newX = intersectPoint.x + dragOffset.x;
  newX = Math.max(-12, Math.min(-2, newX));
  
  lanternGroup.position.x = newX;
  lanternX = newX;
  dragTarget.position.x = newX;
  
  updateOptics();
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false;
    controls.enabled = true;
  }
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.key === '[') {
    screenX = Math.max(2, screenX - 0.5);
    projScreen.position.x = screenX;
    screenFrame.position.x = screenX;
    screenStand.position.x = screenX;
    updateOptics();
  } else if (e.key === ']') {
    screenX = Math.min(12, screenX + 0.5);
    projScreen.position.x = screenX;
    screenFrame.position.x = screenX;
    screenStand.position.x = screenX;
    updateOptics();
  }
});

// --- Buttons ---
document.getElementById('saveBtn').addEventListener('click', () => {
  const state = {
    lanternX: lanternGroup.position.x,
    screenX: screenX,
    focalLength: focalLength,
    lensType: lensType,
    objectDistance: window.__3D_STATE__.objectDistance,
    imageDistance: window.__3D_STATE__.imageDistance,
    magnification: window.__3D_STATE__.magnification,
    imageType: window.__3D_STATE__.imageType,
    imagePositionX: window.__3D_STATE__.imagePositionX,
    imageMagnitudeScale: window.__3D_STATE__.imageMagnitudeScale
  };
  localStorage.setItem('lensOpticsSave', JSON.stringify(state));
  savedState = state;
  window.__3D_STATE__.savedState = state;
  
  // Visual feedback
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ Saved!';
  setTimeout(() => btn.textContent = '💾 Save State', 1000);
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const data = localStorage.getItem('lensOpticsSave');
  if (data) {
    const state = JSON.parse(data);
    
    lanternX = state.lanternX;
    lanternGroup.position.x = lanternX;
    dragTarget.position.x = lanternX;
    
    screenX = state.screenX;
    projScreen.position.x = screenX;
    screenFrame.position.x = screenX;
    screenStand.position.x = screenX;
    
    focalLength = state.focalLength;
    lensType = state.lensType;
    
    updateLensAppearance();
    updateFocalPoints();
    updateOptics();
    
    savedState = state;
    window.__3D_STATE__.savedState = state;
    
    const btn = document.getElementById('loadBtn');
    btn.textContent = '✓ Loaded!';
    setTimeout(() => btn.textContent = '📂 Load State', 1000);
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  lanternX = -8;
  lanternGroup.position.x = lanternX;
  dragTarget.position.x = lanternX;
  
  screenX = 6;
  projScreen.position.x = screenX;
  screenFrame.position.x = screenX;
  screenStand.position.x = screenX;
  
  focalLength = 3;
  lensType = 'converging';
  
  updateLensAppearance();
  updateFocalPoints();
  updateOptics();
});

function updateLensAppearance() {
  if (lensType === 'converging') {
    lensMat.color.set(0x88ccff);
    ringMat.color.set(0xaaddff);
  } else {
    lensMat.color.set(0xff8888);
    ringMat.color.set(0xffaaaa);
  }
}

document.getElementById('toggleLensBtn').addEventListener('click', () => {
  if (lensType === 'converging') {
    lensType = 'diverging';
    focalLength = -3;
  } else {
    lensType = 'converging';
    focalLength = 3;
  }
  
  updateLensAppearance();
  updateFocalPoints();
  updateOptics();
});

// --- Labels ---
function createTextSprite(text, position, color = '#ffffff') {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.font = 'bold 28px Arial';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, 128, 40);
  
  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(mat);
  sprite.position.copy(position);
  sprite.scale.set(2, 0.5, 1);
  scene.add(sprite);
  return sprite;
}

createTextSprite('Lens', new THREE.Vector3(0, 4.8, 0), '#88ccff');
createTextSprite('Screen', new THREE.Vector3(screenX, 4, 0), '#ffffff');
createTextSprite('f', new THREE.Vector3(3, 1.5, 0), '#ff4444');
createTextSprite('f', new THREE.Vector3(-3, 1.5, 0), '#ff4444');

// --- Grid helper on ground ---
const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x333333);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Tick marks on axis ---
for (let x = -14; x <= 14; x += 1) {
  if (x === 0) continue;
  const tickGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(x, 1.9, 0),
    new THREE.Vector3(x, 2.1, 0)
  ]);
  const tickMat = new THREE.LineBasicMaterial({ color: 0x666688 });
  scene.add(new THREE.Line(tickGeo, tickMat));
}

// --- Window Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Initial update ---
updateOptics();

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

</script>
</body>
