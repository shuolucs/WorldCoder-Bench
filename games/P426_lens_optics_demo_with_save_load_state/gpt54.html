<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thin Lens Optics Demo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border-radius: 8px;
      min-width: 250px;
      z-index: 10;
      line-height: 1.5;
      font-size: 14px;
    }
    #hud .buttons {
      margin-top: 10px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    #hud button {
      cursor: pointer;
      border: none;
      border-radius: 4px;
      padding: 6px 10px;
      background: #2d6cdf;
      color: white;
      font-size: 13px;
    }
    #hud button:hover {
      background: #1f57b7;
    }
    #instructions {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.55);
      color: #ddd;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><strong>Thin Lens Optics Demo</strong></div>
    <div>Object Distance (do): <span id="doVal">0.00</span></div>
    <div>Image Distance (di): <span id="diVal">0.00</span></div>
    <div>Magnification (m): <span id="mVal">0.00</span></div>
    <div>Focal Length (f): <span id="fVal">3.00</span></div>
    <div>Image Type: <span id="typeVal">Real</span></div>
    <div>Screen Position: <span id="screenVal">6.00</span></div>
    <div>Lens Type: <span id="lensTypeVal">converging</span></div>
    <div class="buttons">
      <button id="saveBtn">Save State</button>
      <button id="loadBtn">Load State</button>
      <button id="resetBtn">Reset</button>
      <button id="toggleLensBtn">Toggle Lens Type</button>
    </div>
  </div>

  <div id="instructions">
    Drag lantern left/right • [ and ] move screen • Toggle converging/diverging lens
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let lanternGroup, lanternModel = null, lanternLoaded = false;
    let lens, screen;
    let focalSphereLeft, focalSphereRight;
    let imageMarker;
    let axisLine;
    let principalRayGroup, sourceRayGroup;
    let dragPlane, raycaster, mouse;
    let isDragging = false;
    let dragOffset = new THREE.Vector3();

    const LENS_X = 0;
    const LENS_Y = 2;
    const LENS_Z = 0;

    let focalLength = 3;
    let lensType = 'converging';

    const lanternDefaultX = -8;
    const screenDefaultX = 6;

    const hud = {
      doVal: document.getElementById('doVal'),
      diVal: document.getElementById('diVal'),
      mVal: document.getElementById('mVal'),
      fVal: document.getElementById('fVal'),
      typeVal: document.getElementById('typeVal'),
      screenVal: document.getElementById('screenVal'),
      lensTypeVal: document.getElementById('lensTypeVal')
    };

    window.__3D_STATE__ = {
      lanternX: lanternDefaultX,
      screenX: screenDefaultX,
      objectDistance: 0,
      imageDistance: 0,
      magnification: 0,
      focalLength: focalLength,
      imageType: 'Real',
      lensType: lensType,
      isImageOnScreen: false,
      savedState: null,
      rayCount: 3,
      lanternLoaded: false,
      imagePositionX: 0,
      imageMagnitudeScale: 0
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 5, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 2, 0);
      controls.enableDamping = true;

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 30),
        new THREE.MeshStandardMaterial({ color: 0x333333, side: THREE.DoubleSide })
      );
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);

      const axisGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(-15, LENS_Y, 0),
        new THREE.Vector3(15, LENS_Y, 0)
      ]);
      axisLine = new THREE.Line(
        axisGeom,
        new THREE.LineBasicMaterial({ color: 0x888888 })
      );
      scene.add(axisLine);

      createLanternPlaceholder();
      createLens();
      createFocalPoints();
      createScreen();
      createImageMarker();

      principalRayGroup = new THREE.Group();
      scene.add(principalRayGroup);

      sourceRayGroup = new THREE.Group();
      scene.add(sourceRayGroup);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();
      dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -1);

      loadLanternModel();
      addEvents();
      updateOptics();
    }

    function createLanternPlaceholder() {
      lanternGroup = new THREE.Group();
      lanternGroup.position.set(lanternDefaultX, 1, 0);

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 1.2, 0.8),
        new THREE.MeshStandardMaterial({ color: 0x8b5a2b })
      );
      body.position.y = 0.6;
      lanternGroup.add(body);

      const top = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.25, 0.3, 16),
        new THREE.MeshStandardMaterial({ color: 0x666666 })
      );
      top.position.y = 1.35;
      lanternGroup.add(top);

      lanternGroup.userData.draggable = true;
      scene.add(lanternGroup);
    }

    function loadLanternModel() {
      const loader = new GLTFLoader();
      loader.load(
        '._Lantern.glb',
        (gltf) => {
          if (lanternModel) lanternGroup.remove(lanternModel);
          lanternModel = gltf.scene;
          lanternModel.scale.set(0.5, 0.5, 0.5);
          lanternModel.position.set(0, 0, 0);
          lanternGroup.add(lanternModel);
          lanternLoaded = true;
          updateState();
        },
        undefined,
        (err) => {
          console.warn('Could not load ._Lantern.glb, using placeholder.', err);
          lanternLoaded = false;
          updateState();
        }
      );
    }

    function createLens() {
      lens = new THREE.Mesh(
        new THREE.CylinderGeometry(2.5, 2.5, 0.1, 48),
        new THREE.MeshPhongMaterial({
          color: 0x88ccff,
          transparent: true,
          opacity: 0.45,
          side: THREE.DoubleSide
        })
      );
      lens.rotation.z = Math.PI / 2;
      lens.position.set(LENS_X, LENS_Y, LENS_Z);
      scene.add(lens);
    }

    function createFocalPoints() {
      const mat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
      const geom = new THREE.SphereGeometry(0.15, 16, 16);

      focalSphereLeft = new THREE.Mesh(geom, mat);
      focalSphereRight = new THREE.Mesh(geom, mat);
      scene.add(focalSphereLeft, focalSphereRight);
      updateFocalPointPositions();
    }

    function updateFocalPointPositions() {
      const absF = Math.abs(focalLength);
      focalSphereLeft.position.set(LENS_X - absF, LENS_Y, 0);
      focalSphereRight.position.set(LENS_X + absF, LENS_Y, 0);
    }

    function createScreen() {
      screen = new THREE.Mesh(
        new THREE.PlaneGeometry(3, 4),
        new THREE.MeshStandardMaterial({ color: 0xffffff, side: THREE.DoubleSide })
      );
      screen.position.set(screenDefaultX, 2, 0);
      screen.rotation.y = -Math.PI / 2;
      scene.add(screen);
    }

    function createImageMarker() {
      imageMarker = new THREE.Group();

      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, 1.0, 12),
        new THREE.MeshStandardMaterial({ color: 0xff9933 })
      );
      shaft.position.y = 0.5;
      imageMarker.add(shaft);

      const head = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.3, 12),
        new THREE.MeshStandardMaterial({ color: 0xff9933 })
      );
      head.position.y = 1.15;
      imageMarker.add(head);

      scene.add(imageMarker);
    }

    function addEvents() {
      window.addEventListener('resize', onResize);

      renderer.domElement.addEventListener('pointerdown', onPointerDown);
      renderer.domElement.addEventListener('pointermove', onPointerMove);
      renderer.domElement.addEventListener('pointerup', onPointerUp);
      renderer.domElement.addEventListener('pointerleave', onPointerUp);

      window.addEventListener('keydown', (e) => {
        if (e.key === '[') {
          screen.position.x = Math.max(2, screen.position.x - 0.5);
          updateOptics();
        } else if (e.key === ']') {
          screen.position.x = Math.min(12, screen.position.x + 0.5);
          updateOptics();
        }
      });

      document.getElementById('saveBtn').addEventListener('click', saveState);
      document.getElementById('loadBtn').addEventListener('click', loadState);
      document.getElementById('resetBtn').addEventListener('click', resetState);
      document.getElementById('toggleLensBtn').addEventListener('click', toggleLensType);
    }

    function onPointerDown(event) {
      setMouse(event);
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObject(lanternGroup, true);
      if (intersects.length > 0) {
        isDragging = true;
        controls.enabled = false;

        const hitPoint = new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane, hitPoint);
        dragOffset.copy(hitPoint).sub(lanternGroup.position);
      }
    }

    function onPointerMove(event) {
      if (!isDragging) return;
      setMouse(event);
      raycaster.setFromCamera(mouse, camera);

      const hitPoint = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(dragPlane, hitPoint)) {
        const newX = THREE.MathUtils.clamp(hitPoint.x - dragOffset.x, -12, -2);
        lanternGroup.position.set(newX, 1, 0);
        updateOptics();
      }
    }

    function onPointerUp() {
      isDragging = false;
      controls.enabled = true;
    }

    function setMouse(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    }

    function toggleLensType() {
      if (lensType === 'converging') {
        lensType = 'diverging';
        focalLength = -3;
        lens.material.color.set(0xff9999);
      } else {
        lensType = 'converging';
        focalLength = 3;
        lens.material.color.set(0x88ccff);
      }
      updateFocalPointPositions();
      updateOptics();
    }

    function saveState() {
      const optics = computeOptics();
      const state = {
        lanternX: lanternGroup.position.x,
        screenX: screen.position.x,
        objectDistance: optics.doVal,
        imageDistance: optics.di,
        magnification: optics.m,
        focalLength,
        imageType: optics.imageType,
        lensType,
        imagePositionX: optics.imageX,
        imageMagnitudeScale: Math.abs(optics.m)
      };
      localStorage.setItem('lensOpticsSave', JSON.stringify(state));
      window.__3D_STATE__.savedState = state;
      updateState();
    }

    function loadState() {
      const raw = localStorage.getItem('lensOpticsSave');
      if (!raw) return;
      try {
        const state = JSON.parse(raw);
        lanternGroup.position.x = THREE.MathUtils.clamp(state.lanternX ?? lanternDefaultX, -12, -2);
        screen.position.x = THREE.MathUtils.clamp(state.screenX ?? screenDefaultX, 2, 12);

        if (state.lensType === 'diverging') {
          lensType = 'diverging';
          focalLength = -3;
          lens.material.color.set(0xff9999);
        } else {
          lensType = 'converging';
          focalLength = 3;
          lens.material.color.set(0x88ccff);
        }

        window.__3D_STATE__.savedState = state;
        updateFocalPointPositions();
        updateOptics();
      } catch (e) {
        console.warn('Failed to load saved state:', e);
      }
    }

    function resetState() {
      lanternGroup.position.set(lanternDefaultX, 1, 0);
      screen.position.set(screenDefaultX, 2, 0);
      lensType = 'converging';
      focalLength = 3;
      lens.material.color.set(0x88ccff);
      updateFocalPointPositions();
      updateOptics();
    }

    function computeOptics() {
      const doVal = Math.abs(lanternGroup.position.x - LENS_X);
      let di;

      if (Math.abs(doVal - focalLength) < 0.0001) {
        di = 1e6;
      } else {
        di = (focalLength * doVal) / (doVal - focalLength);
      }

      const m = -di / doVal;
      const imageX = LENS_X + di;
      const imageType = di > 0 ? 'Real' : 'Virtual';

      return { doVal, di, m, imageX, imageType };
    }

    function clearGroup(group) {
      while (group.children.length > 0) {
        const child = group.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      }
    }

    function makeLine(points, color, dashed = false) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      let line;
      if (dashed) {
        const material = new THREE.LineDashedMaterial({
          color,
          dashSize: 0.3,
          gapSize: 0.18
        });
        line = new THREE.Line(geometry, material);
        line.computeLineDistances();
      } else {
        const material = new THREE.LineBasicMaterial({ color });
        line = new THREE.Line(geometry, material);
      }
      return line;
    }

    function updateLightCone() {
      clearGroup(sourceRayGroup);
      const origin = new THREE.Vector3(lanternGroup.position.x + 0.3, 1.8, 0);
      const targetsY = [0.5, 2.0, 3.5];
      for (const y of targetsY) {
        const target = new THREE.Vector3(LENS_X, y, 0);
        const line = makeLine([origin, target], 0xffff66, false);
        sourceRayGroup.add(line);
      }
    }

    function updatePrincipalRays(optics) {
      clearGroup(principalRayGroup);

      const objectTip = new THREE.Vector3(lanternGroup.position.x, 2.5, 0);
      const lensCenter = new THREE.Vector3(LENS_X, LENS_Y, 0);
      const imagePoint = new THREE.Vector3(optics.imageX, LENS_Y + optics.m * (objectTip.y - LENS_Y), 0);

      const absF = Math.abs(focalLength);
      const farFocus = new THREE.Vector3(LENS_X + absF, LENS_Y, 0);
      const nearFocus = new THREE.Vector3(LENS_X - absF, LENS_Y, 0);

      const hitParallel = new THREE.Vector3(LENS_X, objectTip.y, 0);

      // Ray 1: parallel then through far focal point (or appears from far focal point for diverging)
      principalRayGroup.add(makeLine([objectTip, hitParallel], 0xff3333));
      if (optics.di > 0) {
        principalRayGroup.add(makeLine([hitParallel, imagePoint], 0xff3333));
      } else {
        const forward = new THREE.Vector3(6, hitParallel.y + ((0 - hitParallel.x) !== 0 ? ((hitParallel.y - farFocus.y) / (hitParallel.x - farFocus.x)) * (6 - hitParallel.x) : 0), 0);
        principalRayGroup.add(makeLine([hitParallel, forward], 0xff3333));
        principalRayGroup.add(makeLine([hitParallel, imagePoint], 0xff3333, true));
      }

      // Ray 2: through center straight
      const dir2End = optics.di > 0 ? imagePoint : new THREE.Vector3(6, imagePoint.y + (6 - imagePoint.x) * ((lensCenter.y - imagePoint.y) / (lensCenter.x - imagePoint.x || 0.0001)), 0);
      principalRayGroup.add(makeLine([objectTip, lensCenter], 0x33ff66));
      if (optics.di > 0) {
        principalRayGroup.add(makeLine([lensCenter, imagePoint], 0x33ff66));
      } else {
        principalRayGroup.add(makeLine([lensCenter, dir2End], 0x33ff66));
        principalRayGroup.add(makeLine([lensCenter, imagePoint], 0x33ff66, true));
      }

      // Ray 3: through near focal point then parallel
      const hitAtLens3 = new THREE.Vector3(LENS_X, objectTip.y + ((nearFocus.y - objectTip.y) / (nearFocus.x - objectTip.x || 0.0001)) * (LENS_X - objectTip.x), 0);
      principalRayGroup.add(makeLine([objectTip, hitAtLens3], 0x3399ff));
      if (optics.di > 0) {
        principalRayGroup.add(makeLine([hitAtLens3, imagePoint], 0x3399ff));
      } else {
        const forward3 = new THREE.Vector3(6, hitAtLens3.y, 0);
        principalRayGroup.add(makeLine([hitAtLens3, forward3], 0x3399ff));
        principalRayGroup.add(makeLine([hitAtLens3, imagePoint], 0x3399ff, true));
      }
    }

    function updateImageMarker(optics) {
      const objectHeight = 2.5 - LENS_Y;
      const imgHeight = optics.m * objectHeight;
      const scaleY = Math.max(0.2, Math.abs(imgHeight) * 2);

      imageMarker.position.set(optics.imageX, LENS_Y, 0);
      imageMarker.scale.set(1, scaleY, 1);
      imageMarker.rotation.z = optics.m >= 0 ? 0 : Math.PI;

      imageMarker.visible = Number.isFinite(optics.imageX) && Math.abs(optics.imageX) < 1000;
    }

    function updateHUD(optics) {
      hud.doVal.textContent = optics.doVal.toFixed(2);
      hud.diVal.textContent = Number.isFinite(optics.di) ? optics.di.toFixed(2) : '∞';
      hud.mVal.textContent = Number.isFinite(optics.m) ? optics.m.toFixed(2) : '∞';
      hud.fVal.textContent = focalLength.toFixed(2);
      hud.typeVal.textContent = optics.imageType;
      hud.screenVal.textContent = screen.position.x.toFixed(2);
      hud.lensTypeVal.textContent = lensType;
    }

    function updateState() {
      const optics = computeOptics();
      window.__3D_STATE__.lanternX = lanternGroup.position.x;
      window.__3D_STATE__.screenX = screen.position.x;
      window.__3D_STATE__.objectDistance = optics.doVal;
      window.__3D_STATE__.imageDistance = optics.di;
      window.__3D_STATE__.magnification = optics.m;
      window.__3D_STATE__.focalLength = focalLength;
      window.__3D_STATE__.imageType = optics.imageType;
      window.__3D_STATE__.lensType = lensType;
      window.__3D_STATE__.isImageOnScreen = Math.abs(screen.position.x - optics.imageX) < 0.5;
      window.__3D_STATE__.rayCount = 3;
      window.__3D_STATE__.lanternLoaded = lanternLoaded;
      window.__3D_STATE__.imagePositionX = optics.imageX;
      window.__3D_STATE__.imageMagnitudeScale = Math.abs(optics.m);
    }

    function updateOptics() {
      const optics = computeOptics();
      updateLightCone();
      updatePrincipalRays(optics);
      updateImageMarker(optics);
      updateHUD(optics);
      updateState();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
