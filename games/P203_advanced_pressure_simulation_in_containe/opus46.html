<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Pressure Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.75);
    color: #ffffff;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(5px);
    z-index: 100;
    min-width: 280px;
}

#hud .title {
    font-size: 18px;
    font-weight: bold;
    color: #00d4ff;
    margin-bottom: 10px;
    text-align: center;
    border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    padding-bottom: 8px;
}

#hud .row {
    display: flex;
    justify-content: space-between;
    padding: 2px 0;
}

#hud .label { color: #aaa; }
#hud .value { color: #00ff88; font-weight: bold; }

#score-display {
    font-size: 22px !important;
    color: #ffd700 !important;
    text-align: center;
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid rgba(255, 255, 255, 0.3);
}

#status-display {
    text-align: center;
    margin-top: 5px;
    font-weight: bold;
}

.status-running { color: #00ff88; }
.status-paused { color: #ff4444; }

#pressure-bar-container {
    margin-top: 10px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 5px;
    height: 20px;
    overflow: hidden;
    position: relative;
}

#pressure-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00aaff, #ffaa00, #ff3300);
    transition: width 0.1s;
    border-radius: 5px;
}

#instructions {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #ccc;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    text-align: center;
    z-index: 100;
    border: 1px solid rgba(255, 255, 255, 0.15);
    max-width: 90vw;
}

#instructions span { color: #00d4ff; font-weight: bold; }
</style>
</head>
<body>

<div id="hud">
    <div class="title">⚗️ PRESSURE SIMULATOR</div>
    <div class="row"><span class="label">Pressure:</span><span class="value" id="pressure-display">0.00</span></div>
    <div class="row"><span class="label">Temperature:</span><span class="value" id="temperature-display">300</span></div>
    <div class="row"><span class="label">Volume:</span><span class="value" id="volume-display">0.00</span></div>
    <div class="row"><span class="label">Particles:</span><span class="value" id="particle-display">100</span></div>
    <div class="row"><span class="label">Piston Y:</span><span class="value" id="piston-display">4.00</span></div>
    <div id="pressure-bar-container"><div id="pressure-bar"></div></div>
    <div id="score-display">🏆 Score: 0</div>
    <div id="status-display" class="status-running">● RUNNING</div>
</div>

<div id="instructions">
    <span>↑↓</span> Move Piston &nbsp;|&nbsp; <span>H</span> Heat &nbsp;|&nbsp; <span>C</span> Cool &nbsp;|&nbsp; <span>R</span> Reset &nbsp;|&nbsp; <span>P</span> Pause &nbsp;|&nbsp; <span>Space</span> Release Valve &nbsp;|&nbsp; <span>Click Container</span> Add Particles
</div>

<script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.157.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.157.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// State
window.__3D_STATE__ = {
    pressure: 0,
    temperature: 300,
    volume: 0,
    pistonY: 4,
    particleCount: 100,
    score: 0,
    paused: false,
    fishScale: 2.0,
    maxPressureReached: 0,
    particleAvgSpeed: 0,
    fishLoaded: false,
    frameCount: 0
};

const state = window.__3D_STATE__;

// Score tracking for thresholds
let scoreThresholds = { 5: false, 10: false, 15: false };

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
scene.add(gridHelper);

// Container
const containerWidth = 6, containerHeight = 8, containerDepth = 6;

// Container wireframe edges
const containerGeo = new THREE.BoxGeometry(containerWidth, containerHeight, containerDepth);
const containerMat = new THREE.MeshPhysicalMaterial({
    color: 0x4488cc,
    transparent: true,
    opacity: 0.12,
    roughness: 0.1,
    metalness: 0.0,
    side: THREE.DoubleSide,
    depthWrite: false
});
const containerMesh = new THREE.Mesh(containerGeo, containerMat);
containerMesh.position.set(0, containerHeight / 2, 0);
scene.add(containerMesh);

// Container edges
const edgesGeo = new THREE.EdgesGeometry(containerGeo);
const edgesMat = new THREE.LineBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.6 });
const containerEdges = new THREE.LineSegments(edgesGeo, edgesMat);
containerEdges.position.copy(containerMesh.position);
scene.add(containerEdges);

// Piston
let pistonY = 4;
const pistonGeo = new THREE.BoxGeometry(6, 0.3, 6);
const pistonMat = new THREE.MeshStandardMaterial({
    color: 0x888899,
    metalness: 0.8,
    roughness: 0.3
});
const piston = new THREE.Mesh(pistonGeo, pistonMat);
piston.position.set(0, pistonY, 0);
piston.castShadow = true;
scene.add(piston);

// Piston rod visual
const rodGeo = new THREE.CylinderGeometry(0.15, 0.15, 4, 8);
const rodMat = new THREE.MeshStandardMaterial({ color: 0x666677, metalness: 0.9, roughness: 0.2 });
const rod = new THREE.Mesh(rodGeo, rodMat);
scene.add(rod);

function updateRod() {
    rod.position.set(0, pistonY + 2, 0);
    rod.scale.y = (8 - pistonY) / 4;
}
updateRod();

// Particles
const particles = [];
const particleGroup = new THREE.Group();
scene.add(particleGroup);

const baseSpeed = 0.02;

function createParticle() {
    const geo = new THREE.SphereGeometry(0.05, 8, 8);
    const mat = new THREE.MeshStandardMaterial({ color: 0x4488ff, emissive: 0x2244aa, emissiveIntensity: 0.5 });
    const mesh = new THREE.Mesh(geo, mat);

    const halfW = containerWidth / 2 - 0.1;
    const halfD = containerDepth / 2 - 0.1;

    mesh.position.set(
        (Math.random() - 0.5) * (containerWidth - 0.4),
        Math.random() * (pistonY - 0.5) + 0.2,
        (Math.random() - 0.5) * (containerDepth - 0.4)
    );

    const angle1 = Math.random() * Math.PI * 2;
    const angle2 = Math.random() * Math.PI * 2;
    const speed = baseSpeed;

    const particle = {
        mesh: mesh,
        velocity: new THREE.Vector3(
            Math.sin(angle1) * Math.cos(angle2) * speed,
            Math.sin(angle2) * speed,
            Math.cos(angle1) * Math.cos(angle2) * speed
        )
    };

    particleGroup.add(mesh);
    particles.push(particle);
    return particle;
}

// Initialize 100 particles
for (let i = 0; i < 100; i++) {
    createParticle();
}

// Fish
let fishModel = null;
let fishMixer = null;
let fishBasicScale = 2.0;

const loader = new THREE.GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/BarramundiFish/glTF-Binary/BarramundiFish.glb',
    function(gltf) {
        fishModel = gltf.scene;
        fishModel.scale.set(fishBasicScale, fishBasicScale, fishBasicScale);
        fishModel.position.set(0, 2, 0);
        fishModel.rotation.y = Math.PI / 2;
        scene.add(fishModel);
        state.fishLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
            fishMixer = new THREE.AnimationMixer(fishModel);
            gltf.animations.forEach(clip => {
                fishMixer.clipAction(clip).play();
            });
        }
    },
    undefined,
    function(error) {
        console.warn('Fish model failed to load, creating placeholder:', error);
        // Create a simple fish placeholder
        const fishGeo = new THREE.ConeGeometry(0.3, 1.2, 8);
        fishGeo.rotateZ(-Math.PI / 2);
        const fishMat = new THREE.MeshStandardMaterial({ color: 0x44aaff });
        fishModel = new THREE.Mesh(fishGeo, fishMat);
        fishModel.scale.set(fishBasicScale, fishBasicScale, fishBasicScale);
        fishModel.position.set(0, 2, 0);
        scene.add(fishModel);
        state.fishLoaded = true;
    }
);

// Physics
let temperature = 300;
const R = 0.01;

function calculatePressure() {
    const n = particles.length;
    const volume = containerWidth * containerDepth * pistonY;
    const pressure = (n * R * temperature) / volume;
    return { pressure, volume };
}

function getPressureFactor() {
    const { pressure } = calculatePressure();
    // Map pressure to factor 1.0 - 3.0
    return Math.min(3.0, Math.max(1.0, 1.0 + (pressure / 10.0) * 2.0));
}

// Score
let score = 0;

function addScore(points) {
    score = Math.max(0, score + points);
    state.score = score;
}

function checkPressureScore(pressure) {
    if (pressure > 5.0 && !scoreThresholds[5]) {
        scoreThresholds[5] = true;
        addScore(10);
    }
    if (pressure > 10.0 && !scoreThresholds[10]) {
        scoreThresholds[10] = true;
        addScore(25);
    }
    if (pressure > 15.0 && !scoreThresholds[15]) {
        scoreThresholds[15] = true;
        addScore(50);
    }
}

// Input handling
document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case 'ArrowUp':
            e.preventDefault();
            pistonY = Math.min(4, pistonY + 0.2);
            piston.position.y = pistonY;
            updateRod();
            break;
        case 'ArrowDown':
            e.preventDefault();
            pistonY = Math.max(1, pistonY - 0.2);
            piston.position.y = pistonY;
            updateRod();
            // Clamp particles below piston
            particles.forEach(p => {
                if (p.mesh.position.y > pistonY - 0.2) {
                    p.mesh.position.y = pistonY - 0.3;
                    p.velocity.y = -Math.abs(p.velocity.y);
                }
            });
            break;
        case 'h':
        case 'H':
            temperature = Math.min(600, temperature + 50);
            break;
        case 'c':
        case 'C':
            temperature = Math.max(100, temperature - 50);
            break;
        case 'r':
        case 'R':
            resetSimulation();
            break;
        case 'p':
        case 'P':
            state.paused = !state.paused;
            break;
        case ' ':
            e.preventDefault();
            pistonY = 4;
            piston.position.y = pistonY;
            updateRod();
            break;
    }
});

// Click to add particles
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(containerMesh);

    if (intersects.length > 0 && particles.length < 200) {
        for (let i = 0; i < 10 && particles.length < 200; i++) {
            createParticle();
        }
        addScore(5);
    }
});

function resetSimulation() {
    pistonY = 4;
    piston.position.y = pistonY;
    updateRod();
    temperature = 300;

    // Remove all particles
    while (particles.length > 0) {
        const p = particles.pop();
        particleGroup.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
    }

    // Recreate 100 particles
    for (let i = 0; i < 100; i++) {
        createParticle();
    }

    addScore(-10);
    scoreThresholds = { 5: false, 10: false, 15: false };
    state.maxPressureReached = 0;
}

// Color helpers
function lerpColor(color1, color2, t) {
    const c1 = new THREE.Color(color1);
    const c2 = new THREE.Color(color2);
    return c1.lerp(c2, t);
}

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    state.frameCount++;

    // Calculate physics
    const { pressure, volume } = calculatePressure();
    const pressureFactor = Math.min(3.0, Math.max(1.0, 1.0 + (pressure / 10.0) * 2.0));

    state.pressure = parseFloat(pressure.toFixed(2));
    state.temperature = temperature;
    state.volume = parseFloat(volume.toFixed(2));
    state.pistonY = parseFloat(pistonY.toFixed(2));
    state.particleCount = particles.length;

    if (pressure > state.maxPressureReached) {
        state.maxPressureReached = parseFloat(pressure.toFixed(2));
    }

    checkPressureScore(pressure);

    if (!state.paused) {
        // Update particles
        const halfW = containerWidth / 2 - 0.1;
        const halfD = containerDepth / 2 - 0.1;
        const minY = 0.1;
        const maxY = pistonY - 0.2;

        let totalSpeed = 0;

        particles.forEach(p => {
            const speed = baseSpeed * pressureFactor;

            // Normalize velocity and apply new speed
            const currentSpeed = p.velocity.length();
            if (currentSpeed > 0) {
                p.velocity.normalize().multiplyScalar(speed);
            } else {
                p.velocity.set(
                    (Math.random() - 0.5) * speed,
                    (Math.random() - 0.5) * speed,
                    (Math.random() - 0.5) * speed
                );
            }

            // Add slight randomness
            p.velocity.x += (Math.random() - 0.5) * 0.002;
            p.velocity.y += (Math.random() - 0.5) * 0.002;
            p.velocity.z += (Math.random() - 0.5) * 0.002;

            p.mesh.position.add(p.velocity);

            // Bounce off walls
            if (p.mesh.position.x > halfW) { p.mesh.position.x = halfW; p.velocity.x *= -1; }
            if (p.mesh.position.x < -halfW) { p.mesh.position.x = -halfW; p.velocity.x *= -1; }
            if (p.mesh.position.z > halfD) { p.mesh.position.z = halfD; p.velocity.z *= -1; }
            if (p.mesh.position.z < -halfD) { p.mesh.position.z = -halfD; p.velocity.z *= -1; }
            if (p.mesh.position.y < minY) { p.mesh.position.y = minY; p.velocity.y *= -1; }
            if (p.mesh.position.y > maxY) { p.mesh.position.y = maxY; p.velocity.y *= -1; }

            // Color based on speed
            const spd = p.velocity.length();
            totalSpeed += spd;
            const speedT = Math.min(1, (spd - baseSpeed) / (baseSpeed * 2));
            const col = lerpColor(0x4488ff, 0xff4422, speedT);
            p.mesh.material.color.copy(col);
            p.mesh.material.emissive.copy(col).multiplyScalar(0.4);
        });

        state.particleAvgSpeed = particles.length > 0 ? parseFloat((totalSpeed / particles.length).toFixed(4)) : 0;

        // Update fish
        if (fishModel) {
            // Bob animation
            const bobY = 2 + Math.sin(elapsed * 1.0) * 0.3;
            fishModel.position.y = Math.min(bobY, pistonY - 0.5);

            // Scale based on pressure: high pressure = smaller
            const pressureNorm = Math.min(1, pressure / 15.0);
            const fishScale = 2.0 - pressureNorm * 1.0; // 2.0 to 1.0
            fishModel.scale.set(fishScale, fishScale, fishScale);
            state.fishScale = parseFloat(fishScale.toFixed(2));

            // Color tint
            fishModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (!child.userData.originalColor) {
                        child.userData.originalColor = child.material.color.clone();
                    }
                    const tint = lerpColor(0x6688ff, 0xff4444, pressureNorm);
                    child.material.color.copy(child.userData.originalColor).lerp(tint, 0.4);
                }
            });

            // Gentle rotation
            fishModel.rotation.y = Math.PI / 2 + Math.sin(elapsed * 0.5) * 0.2;
        }

        if (fishMixer) {
            fishMixer.update(delta);
        }
    }

    // Update HUD
    document.getElementById('pressure-display').textContent = state.pressure.toFixed(2);
    document.getElementById('temperature-display').textContent = temperature + ' K';
    document.getElementById('volume-display').textContent = state.volume.toFixed(2);
    document.getElementById('particle-display').textContent = particles.length;
    document.getElementById('piston-display').textContent = pistonY.toFixed(2);
    document.getElementById('score-display').textContent = '🏆 Score: ' + score;

    const statusEl = document.getElementById('status-display');
    if (state.paused) {
        statusEl.textContent = '⏸ PAUSED';
        statusEl.className = 'status-paused';
    } else {
        statusEl.textContent = '● RUNNING';
        statusEl.className = 'status-running';
    }

    // Pressure bar
    const barPercent = Math.min(100, (pressure / 20) * 100);
    document.getElementById('pressure-bar').style.width = barPercent + '%';

    // Container glow based on pressure
    const pressureNorm = Math.min(1, pressure / 15.0);
    containerMat.color.copy(lerpColor(0x4488cc, 0xff4444, pressureNorm));
    containerMat.opacity = 0.12 + pressureNorm * 0.15;
    edgesMat.color.copy(lerpColor(0x66aaff, 0xff6644, pressureNorm));

    // Piston color feedback
    pistonMat.color.copy(lerpColor(0x888899, 0xaa6666, pressureNorm));

    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
