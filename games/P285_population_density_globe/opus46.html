<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Population Density Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
canvas { display: block; }

#statsPanel {
    position: absolute; top: 10px; left: 10px; z-index: 10;
    background: rgba(0,0,0,0.75); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.6; min-width: 220px;
    border: 1px solid rgba(255,255,255,0.1);
}
#statsPanel div { display: flex; justify-content: space-between; }
#statsPanel .label { color: #888; }
#statsPanel .value { color: #fff; font-weight: 600; }

.mode-buttons {
    position: absolute; top: 10px; right: 10px; z-index: 10;
    display: flex; gap: 6px;
}
.mode-btn {
    background: rgba(0,0,0,0.75); color: #ccc; border: 2px solid rgba(255,255,255,0.2);
    padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: all 0.3s;
}
.mode-btn:hover { border-color: rgba(255,255,255,0.5); color: #fff; }
.mode-btn.active { border-color: #00aaff; color: #00aaff; background: rgba(0,170,255,0.15); }

#tooltip {
    position: absolute; z-index: 20; display: none;
    background: rgba(0,0,0,0.9); padding: 8px 12px; border-radius: 6px;
    font-size: 12px; pointer-events: none; white-space: nowrap;
    border: 1px solid rgba(255,255,255,0.2);
}
#tooltip .tt-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
#tooltip .tt-value { color: #aaa; }

#detailPanel {
    position: absolute; top: 60px; right: 10px; z-index: 10; display: none;
    background: rgba(0,0,0,0.85); padding: 16px 20px; border-radius: 8px;
    min-width: 240px; border: 1px solid rgba(255,255,255,0.15);
}
#detailPanel h3 { margin-bottom: 8px; font-size: 16px; color: #00aaff; }
#detailPanel .detail-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
#detailPanel .detail-label { color: #888; }
#detailPanel .detail-value { color: #fff; }
#detailPanel .close-btn {
    position: absolute; top: 8px; right: 12px; cursor: pointer; color: #888;
    font-size: 18px;
}
#detailPanel .close-btn:hover { color: #fff; }

.slider-container {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); z-index: 10;
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.75); padding: 8px 16px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
}
.slider-container label { font-size: 12px; color: #888; }
.slider-container .speed-val { font-size: 12px; color: #fff; min-width: 20px; text-align: center; }
#speedSlider {
    -webkit-appearance: none; width: 150px; height: 4px; background: #333;
    border-radius: 2px; outline: none;
}
#speedSlider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px; background: #00aaff;
    border-radius: 50%; cursor: pointer;
}

.search-container {
    position: absolute; bottom: 15px; left: 10px; z-index: 10;
}
#searchInput {
    background: rgba(0,0,0,0.75); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; padding: 8px 12px; border-radius: 6px; font-size: 13px;
    width: 180px; outline: none;
}
#searchInput::placeholder { color: #666; }
#searchInput:focus { border-color: #00aaff; }

.keyboard-hints {
    position: absolute; bottom: 55px; left: 10px; z-index: 10;
    font-size: 11px; color: #555;
}
</style>
</head>
<body>

<div id="statsPanel">
    <div><span class="label">Visible Bars:</span><span class="value" id="statBars">200</span></div>
    <div><span class="label">Avg Density:</span><span class="value" id="statAvg">0.00</span></div>
    <div><span class="label">Mode:</span><span class="value" id="statMode">density</span></div>
    <div><span class="label">Rotation Speed:</span><span class="value" id="statSpeed">0.002</span></div>
    <div><span class="label">Frame:</span><span class="value" id="statFrame">0</span></div>
</div>

<div class="mode-buttons">
    <button class="mode-btn active" id="btnDensity" onclick="switchMode('density')">Density</button>
    <button class="mode-btn" id="btnGrowth" onclick="switchMode('growth')">Growth</button>
    <button class="mode-btn" id="btnUrban" onclick="switchMode('urban')">Urban</button>
</div>

<div id="tooltip">
    <div class="tt-name" id="ttName"></div>
    <div class="tt-value" id="ttValue"></div>
</div>

<div id="detailPanel">

    <div class="detail-row"><span class="detail-label">Longitude:</span><span class="detail-value" id="detailLon">0</span></div>

    <div class="detail-row"><span class="detail-label">Urbanization:</span><span class="detail-value" id="detailUrban">0</span></div>
</div>

<div class="slider-container">
    <label>Speed:</label>
    <input type="range" id="speedSlider" min="0" max="10" step="1" value="2">
    <span class="speed-val" id="speedVal">2</span>
</div>

<div class="search-container">
    <input type="text" id="searchInput" placeholder="Search city...">
</div>

<div class="keyboard-hints">R: Reset | T: Toggle opacity | 1/2/3: Switch mode</div>

// Procedural continent coloring via vertex colors
const continentRegions = [
    // Rough bounding boxes for continents [latMin, latMax, lonMin, lonMax]
    // North America
    {latMin:15,latMax:72,lonMin:-170,lonMax:-50},
    // South America
    {latMin:-56,latMax:13,lonMin:-82,lonMax:-34},
    // Europe

    // Africa

    // Middle East bridge
    {latMin:12,latMax:42,lonMin:25,lonMax:75},
    // Australia
    {latMin:-45,latMax:-10,lonMin:110,lonMax:155},
    // India/SE Asia
    {latMin:-10,latMax:35,lonMin:68,lonMax:140},
    // Greenland
    {latMin:60,latMax:84,lonMin:-73,lonMax:-12},
    // Antarctica (skip - ocean)
];

function isLand(lat, lon) {
    for (const r of continentRegions) {
        if (lat >= r.latMin && lat <= r.latMax && lon >= r.lonMin && lon <= r.lonMax) {
            // Add some noise to make coastlines more interesting
            const noise = Math.sin(lat * 0.3) * Math.cos(lon * 0.3) * 8;
            const noise2 = Math.sin(lat * 0.7 + 30) * Math.cos(lon * 0.5 + 20) * 5;
            // Shrink regions slightly with noise for more realistic look
            const margin = 3 + noise + noise2;
            if (lat >= r.latMin + margin * 0.3 && lat <= r.latMax - margin * 0.2 &&
                lon >= r.lonMin + margin * 0.4 && lon <= r.lonMax - margin * 0.3) {
                return true;
            }
            // Still return true for core areas
            if (lat >= r.latMin + 2 && lat <= r.latMax - 2 &&
                lon >= r.lonMin + 2 && lon <= r.lonMax - 2) {
                return true;
            }
        }
    }
    return false;
}

const colors = [];
const posAttr = globeGeometry.attributes.position;
const landColor = new THREE.Color(0x2d5a27);
const oceanColor = new THREE.Color(0x0a1a3a);

for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const y = posAttr.getY(i);
    const z = posAttr.getZ(i);
    
    const lat = Math.asin(y / globeRadius) * (180 / Math.PI);
    const lon = Math.atan2(z, x) * (180 / Math.PI);
    
    if (isLand(lat, lon)) {
        const variation = 0.8 + Math.random() * 0.4;
        colors.push(landColor.r * variation, landColor.g * variation, landColor.b * variation);
    } else {
        const variation = 0.85 + Math.random() * 0.3;
        colors.push(oceanColor.r * variation, oceanColor.g * variation, oceanColor.b * variation);
    }
}

// ============ BARS ============
function latLonToPos(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
    );
}

function densityToHeight(density, mode) {
    if (mode === 'density') return 0.05 + density * 0.55;
    if (mode === 'growth') return 0.05 + Math.abs(density) * 0.55;
    if (mode === 'urban') return 0.05 + density * 0.55;
    return 0.05 + density * 0.55;
}

function getDensityColor(value, mode) {
    const color = new THREE.Color();
    if (mode === 'density') {
        // Yellow to red via HSL
        const hue = 0.16 - value * 0.16; // 0.16 (yellow) to 0.0 (red)
        color.setHSL(hue, 1.0, 0.5);
    } else if (mode === 'growth') {
        if (value >= 0) {
            color.setHSL(0.33, 1.0, 0.3 + value * 0.4); // green
        } else {
            color.setHSL(0.0, 1.0, 0.3 + Math.abs(value) * 0.4); // red
        }
    } else if (mode === 'urban') {
        color.setHSL(0.58, 0.8, 0.3 + value * 0.4); // blue gradient
    }
    return color;
}

function getModeValue(data, mode) {
    if (mode === 'density') return data.density;
    if (mode === 'growth') return data.growth;
    if (mode === 'urban') return data.urban;
    return data.density;
}

cityData.forEach((city) => {
    const value = city.density;
    const height = densityToHeight(value, 'density');
    const color = getDensityColor(value, 'density');
    
    const material = new THREE.MeshPhongMaterial({
        color: color,
        emissive: new THREE.Color(0x000000),
        transparent: true,
        opacity: 1.0
    });
    
    const mesh = new THREE.Mesh(barGeometry, material);
    
    const pos = latLonToPos(city.lat, city.lon, globeRadius);
    mesh.position.copy(pos);
    
    // Orient radially outward
    const outward = pos.clone().normalize();
    const up = new THREE.Vector3(0, 1, 0);
    const quaternion = new THREE.Quaternion().setFromUnitVectors(up, outward);
    mesh.quaternion.copy(quaternion);
    
    mesh.scale.y = height;
    
    barGroup.add(mesh);
    
    bars.push({
        name: city.name,
        lat: city.lat,
        lon: city.lon,
        density: city.density,
        growth: city.growth,
        urban: city.urban,
        barMesh: mesh,
        targetHeight: height,
        currentHeight: height
    });
});

function createSelectionRing(bar) {
    if (selectionRing) barGroup.remove(selectionRing);
    
    const ringGeom = new THREE.RingGeometry(0.02, 0.035, 16);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.8
    });
    selectionRing = new THREE.Mesh(ringGeom, ringMat);
    
    const pos = latLonToPos(bar.lat, bar.lon, globeRadius + 0.001);
    selectionRing.position.copy(pos);
    
    const outward = pos.clone().normalize();
    const up = new THREE.Vector3(0, 0, 1);
    const quaternion = new THREE.Quaternion().setFromUnitVectors(up, outward);
    selectionRing.quaternion.copy(quaternion);
    
    barGroup.add(selectionRing);
}

function removeSelectionRing() {
    if (selectionRing) {
        barGroup.remove(selectionRing);
        selectionRing = null;
    }
}

// ============ MOUSE CONTROLS ============
let isDragging = false;

let spherical = { theta: 0, phi: Math.PI / 2 };
let cameraDistance = 3.5;
let targetTheta = 0;
let targetPhi = Math.PI / 2;

function updateCameraFromSpherical() {
    camera.position.x = cameraDistance * Math.sin(spherical.phi) * Math.sin(spherical.theta);
    camera.position.y = cameraDistance * Math.cos(spherical.phi);
    camera.position.z = cameraDistance * Math.sin(spherical.phi) * Math.cos(spherical.theta);
    camera.lookAt(0, 0, 0);
}

// Initialize spherical from camera position
spherical.theta = Math.atan2(camera.position.x, camera.position.z);
spherical.phi = Math.acos(camera.position.y / cameraDistance);

const canvas = renderer.domElement;

canvas.addEventListener('mousedown', (e) => {
    isDragging = true;
    previousMouse.x = e.clientX;
    previousMouse.y = e.clientY;
    autoRotateEnabled = false;
});

canvas.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    mouseScreen.x = e.clientX;
    mouseScreen.y = e.clientY;
    
    if (isDragging) {
        const dx = e.clientX - previousMouse.x;
        const dy = e.clientY - previousMouse.y;
        
        spherical.theta -= dx * 0.005;
        spherical.phi -= dy * 0.005;
        
        spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, spherical.phi));
        
        updateCameraFromSpherical();
        
        previousMouse.x = e.clientX;
        previousMouse.y = e.clientY;
    }
});

canvas.addEventListener('mouseup', () => {
    isDragging = false;
});

canvas.addEventListener('mouseleave', () => {
    isDragging = false;
});

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    cameraDistance += e.deltaY * 0.002;
    cameraDistance = Math.max(2.0, Math.min(8.0, cameraDistance));
    updateCameraFromSpherical();
}, { passive: false });

        cameraDistance = 3.5;
        spherical.theta = 0;
        spherical.phi = Math.PI / 2;
        updateCameraFromSpherical();
        autoRotateEnabled = true;
    }
    
    if (e.key === 't' || e.key === 'T') {
        if (globeOpacity === 1.0) globeOpacity = 0.5;
        else if (globeOpacity === 0.5) globeOpacity = 0.2;
        else globeOpacity = 1.0;
        globeMaterial.opacity = globeOpacity;

    if (e.key === '2') switchMode('growth');
    if (e.key === '3') switchMode('urban');

// ============ MODE SWITCHING ============
function switchMode(mode) {
    if (mode === currentMode && !isAnimating) return;
    currentMode = mode;
    
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn' + mode.charAt(0).toUpperCase() + mode.slice(1)).classList.add('active');
    
    // Set target heights and colors
    bars.forEach(bar => {
        const value = getModeValue(bar, mode);
        bar.targetHeight = densityToHeight(Math.abs(value), mode);
        const color = getDensityColor(value, mode);
        bar.barMesh.material.color.copy(color);
    });
    
    isAnimating = true;
    animationStart = performance.now();
}

// ============ ANIMATION LOOP ============
function animate() {
    requestAnimationFrame(animate);
    frameCount++;
    
    const now = performance.now();
    
    // Auto rotation
    if (autoRotateEnabled && !isDragging) {
        spherical.theta += autoRotateSpeed;
        updateCameraFromSpherical();
    }
    
    // Mode transition animation
    if (isAnimating) {
        const elapsed = now - animationStart;
        const t = Math.min(elapsed / animationDuration, 1.0);
        
        bars.forEach(bar => {
            bar.currentHeight = bar.currentHeight + (bar.targetHeight - bar.currentHeight) * t;
            bar.barMesh.scale.y = bar.currentHeight;
        });
        
        if (t >= 1.0) {
            isAnimating = false;
            bars.forEach(bar => {
                bar.currentHeight = bar.targetHeight;
                bar.barMesh.scale.y = bar.currentHeight;
            });
        }
    }
    
    // Search highlighting
    const pulseScale = 1.0 + Math.sin(now * 0.005) * 0.3;
    let visibleCount = 0;
    let densitySum = 0;
    let maxH = 0, minH = Infinity;
    
    bars.forEach(bar => {
        const mesh = bar.barMesh;
        
        if (searchQuery.length > 0) {
            const matches = bar.name.toLowerCase().includes(searchQuery);
            if (matches) {
                mesh.material.opacity = 1.0;
                mesh.scale.x = pulseScale;
                mesh.scale.z = pulseScale;
                visibleCount++;
                densitySum += getModeValue(bar, currentMode);
            } else {
                mesh.material.opacity = 0.3;
                mesh.scale.x = 1.0;
                mesh.scale.z = 1.0;
            }
        } else {
            mesh.material.opacity = 1.0;
            mesh.scale.x = 1.0;
            mesh.scale.z = 1.0;
            visibleCount++;
            densitySum += getModeValue(bar, currentMode);
        }
        
        if (mesh.material.opacity > 0.5) {
            if (mesh.scale.y > maxH) maxH = mesh.scale.y;
            if (mesh.scale.y < minH) minH = mesh.scale.y;
        }
    });
    
    if (visibleCount === 0) { minH = 0; maxH = 0; }
    
    // Hover detection
    raycaster.setFromCamera(mouse, camera);
    const meshes = bars.map(b => b.barMesh);
    const intersects = raycaster.intersectObjects(meshes);
    
    // Reset previous hover
    if (hoveredBar) {
        hoveredBar.barMesh.material.emissive.setHex(0x000000);
        hoveredBar = null;
    }
    tooltip.style.display = 'none';
    
    if (intersects.length > 0 && !isDragging) {
        const mesh = intersects[0].object;
        const bar = bars.find(b => b.barMesh === mesh);
        if (bar) {
            hoveredBar = bar;
            mesh.material.emissive.setHex(0x444444);
            
            const value = getModeValue(bar, currentMode);
            ttName.textContent = bar.name;
            ttValue.textContent = currentMode + ': ' + (typeof value === 'number' ? value.toFixed(3) : value);
            tooltip.style.display = 'block';
            tooltip.style.left = (mouseScreen.x + 15) + 'px';
            tooltip.style.top = (mouseScreen.y - 10) + 'px';
        }
    }
    
    // Selection ring pulse
    if (selectionRing) {
        selectionRing.material.opacity = 0.5 + Math.sin(now * 0.004) * 0.3;
    }
    
    // Update stats
    const avgDensity = visibleCount > 0 ? densitySum / visibleCount : 0;
    
    document.getElementById('statBars').textContent = visibleCount;
    document.getElementById('statAvg').textContent = avgDensity.toFixed(2);
    document.getElementById('statMode').textContent = currentMode;
    document.getElementById('statSpeed').textContent = autoRotateSpeed.toFixed(4);
    document.getElementById('statFrame').textContent = frameCount;
    
    // Update global state
    const state = window.__3D_STATE__;
    state.globeRotationY = spherical.theta;
    state.cameraDistance = cameraDistance;
    state.autoRotateEnabled = autoRotateEnabled;
    state.autoRotateSpeed = autoRotateSpeed;
    state.currentMode = currentMode;
    state.globeOpacity = globeOpacity;
    state.totalBars = 200;
    state.visibleBars = visibleCount;
    state.hoveredBar = hoveredBar ? hoveredBar.name : null;
    state.selectedBar = selectedBar ? selectedBar.name : null;
    state.avgDensity = parseFloat(avgDensity.toFixed(2));
    state.searchQuery = searchQuery;
    state.isAnimating = isAnimating;
    state.maxBarHeight = parseFloat(maxH.toFixed(4));
    state.minBarHeight = parseFloat((minH === Infinity ? 0 : minH).toFixed(4));
    state.frameCount = frameCount;
    
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateCameraFromSpherical();
animate();
</script>
</body>
</html>
