<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Population Density Globe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }

    .ui-panel {
      position: absolute;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    #statsPanel {
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      min-width: 250px;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
    }

    #modePanel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
    }

    .mode-btn {
      background: rgba(20,20,20,0.8);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s ease;
    }

    .mode-btn:hover {
      background: rgba(40,40,40,0.9);
    }

    .mode-btn.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.25), 0 0 16px rgba(255,255,255,0.15);
    }

    #speedPanel {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
      justify-content: center;
    }

    #searchPanel {
      position: absolute;
      left: 12px;
      bottom: 14px;
      z-index: 10;
      padding: 10px 12px;
    }

    #searchInput {
      width: 220px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(15,15,15,0.9);
      color: #fff;
      outline: none;
    }

    #speedSlider {
      width: 170px;
    }

    #tooltip {
      position: absolute;
      z-index: 20;
      pointer-events: none;
      padding: 8px 10px;
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      display: none;
      white-space: nowrap;
    }

    #detailPanel {
      top: 80px;
      right: 12px;
      width: 260px;
      padding: 14px;
      display: none;
      font-size: 13px;
      line-height: 1.5;
    }

    .label {
      color: #aaa;
      margin-right: 6px;
    }

    .mono {
      font-family: Consolas, Menlo, monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="statsPanel" class="ui-panel"></div>

    <div id="modePanel">
      <button id="btnDensity" class="mode-btn active">Density</button>
      <button id="btnGrowth" class="mode-btn">Growth</button>
      <button id="btnUrban" class="mode-btn">Urban</button>
    </div>

    <div id="speedPanel" class="ui-panel">
      <span>Rotation Speed</span>
      <input id="speedSlider" type="range" min="0" max="10" step="1" value="2" />
      <span id="speedValue" class="mono">2</span>
    </div>

    <div id="searchPanel" class="ui-panel">
      <input id="searchInput" type="text" placeholder="Search city..." />
    </div>

    <div id="tooltip"></div>
    <div id="detailPanel" class="ui-panel"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script>
    const app = document.getElementById('app');
    const statsPanel = document.getElementById('statsPanel');
    const tooltip = document.getElementById('tooltip');
    const detailPanel = document.getElementById('detailPanel');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const searchInput = document.getElementById('searchInput');
    const btnDensity = document.getElementById('btnDensity');
    const btnGrowth = document.getElementById('btnGrowth');
    const btnUrban = document.getElementById('btnUrban');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const barsGroup = new THREE.Group();
    globeGroup.add(barsGroup);

    function latLonToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const z = (radius * Math.sin(phi) * Math.sin(theta));
      const y = (radius * Math.cos(phi));
      return new THREE.Vector3(x, y, z);
    }

    function createEarthTexture(size = 1024) {
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size / 2;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#0a1a3a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      function lonLatToUV(lon, lat) {
        return {
          x: ((lon + 180) / 360) * canvas.width,
          y: ((90 - lat) / 180) * canvas.height
        };
      }

      function blob(points, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        points.forEach((p, i) => {
          const uv = lonLatToUV(p[0], p[1]);
          if (i === 0) ctx.moveTo(uv.x, uv.y);
          else ctx.lineTo(uv.x, uv.y);
        });
        ctx.closePath();
        ctx.fill();
      }

      const land = '#2d5a27';

      blob([[-168,72],[-140,70],[-125,60],[-115,50],[-108,38],[-100,25],[-92,18],[-85,24],[-82,30],[-78,38],[-74,44],[-66,48],[-60,54],[-72,62],[-100,72]], land);
      blob([[-82,12],[-78,6],[-76,-4],[-74,-12],[-70,-20],[-66,-30],[-62,-40],[-58,-50],[-52,-54],[-48,-40],[-50,-22],[-54,-8],[-58,2],[-64,8],[-72,10]], land);
      blob([[-10,36],[0,44],[12,50],[28,58],[48,60],[70,58],[92,54],[116,48],[136,44],[152,54],[162,62],[140,36],[118,22],[104,12],[90,8],[82,22],[72,24],[64,18],[54,16],[44,10],[36,2],[28,-6],[18,-18],[8,-30],[2,-34],[-6,-22],[-8,-6],[-12,10]], land);
      blob([[-18,34],[-6,36],[8,34],[20,28],[30,18],[38,6],[42,-10],[34,-22],[24,-30],[14,-34],[2,-28],[-8,-10],[-12,8]], land);
      blob([[112,-12],[124,-16],[138,-22],[150,-28],[154,-38],[144,-42],[132,-38],[118,-30],[112,-20]], land);
      blob([[-52,60],[-40,64],[-28,70],[-36,78],[-52,76],[-60,70]], land);
      blob([[46,-13],[49,-18],[49,-24],[46,-27],[43,-22]], land);
      blob([[136,34],[141,38],[145,42],[141,45],[137,42]], land);
      blob([[128,34],[130,38],[126,40],[122,37]], land);
      blob([[96,6],[104,4],[110,0],[116,-4],[120,-2],[118,6],[110,8],[102,10]], land);
      blob([[166,-35],[178,-40],[178,-46],[168,-44]], land);

      for (let i = 0; i < 3000; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const alpha = 0.03 + Math.random() * 0.05;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.fillRect(x, y, 1, 1);
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const earthGeometry = new THREE.SphereGeometry(1.0, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
      map: createEarthTexture(),
      transparent: true,
      opacity: 1.0,
      shininess: 12
    });
    const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
    globeGroup.add(earthMesh);

    const citySeeds = [
      ["Tokyo", 35.6762, 139.6503], ["Mumbai", 19.0760, 72.8777], ["Shanghai", 31.2304, 121.4737],
      ["Delhi", 28.6139, 77.2090], ["Beijing", 39.9042, 116.4074], ["Jakarta", -6.2088, 106.8456],
      ["Seoul", 37.5665, 126.9780], ["Manila", 14.5995, 120.9842], ["Bangkok", 13.7563, 100.5018],
      ["Dhaka", 23.8103, 90.4125], ["Karachi", 24.8607, 67.0011], ["Lagos", 6.5244, 3.3792],
      ["Cairo", 30.0444, 31.2357], ["Istanbul", 41.0082, 28.9784], ["Moscow", 55.7558, 37.6173],
      ["London", 51.5074, -0.1278], ["Paris", 48.8566, 2.3522], ["New York", 40.7128, -74.0060],
      ["Los Angeles", 34.0522, -118.2437], ["Mexico City", 19.4326, -99.1332], ["Sao Paulo", -23.5505, -46.6333],
      ["Buenos Aires", -34.6037, -58.3816], ["Johannesburg", -26.2041, 28.0473], ["Nairobi", -1.2921, 36.8219],
      ["Tehran", 35.6892, 51.3890], ["Riyadh", 24.7136, 46.6753], ["Baghdad", 33.3152, 44.3661],
      ["Singapore", 1.3521, 103.8198], ["Hong Kong", 22.3193, 114.1694], ["Taipei", 25.0330, 121.5654],
      ["Osaka", 34.6937, 135.5023], ["Chengdu", 30.5728, 104.0668], ["Wuhan", 30.5928, 114.3055],
      ["Guangzhou", 23.1291, 113.2644], ["Shenzhen", 22.5431, 114.0579], ["Chongqing", 29.4316, 106.9123],
      ["Tianjin", 39.3434, 117.3616], ["Kinshasa", -4.4419, 15.2663], ["Lima", -12.0464, -77.0428],
      ["Bogota", 4.7110, -74.0721]
    ];

    const populationData = [];
    for (let i = 0; i < 200; i++) {
      const base = citySeeds[i % citySeeds.length];
      const cluster = Math.floor(i / citySeeds.length);
      const lat = Math.max(-75, Math.min(75, base[1] + (Math.sin(i * 1.7 + cluster) * 3.8)));
      const lon = ((((base[2] + Math.cos(i * 1.31 + cluster) * 5.5) + 540) % 360) - 180);
      const density = 0.15 + ((Math.sin(i * 0.91) + 1) / 2) * 0.85;
      const growth = -0.08 + ((Math.cos(i * 1.17 + 0.4) + 1) / 2) * 0.18;
      const urban = 0.25 + ((Math.sin(i * 0.63 + 2.1) + 1) / 2) * 0.72;

      let boostedDensity = density;
      if (["Tokyo", "Mumbai", "Shanghai", "Delhi", "Dhaka", "Manila"].includes(base[0])) {
        boostedDensity = 0.9 + (i % 5) * 0.02;
      }

      populationData.push({
        name: `${base[0]} ${cluster + 1}`,
        lat,
        lon,
        density: Math.min(1, boostedDensity),
        growth: Math.max(-0.08, Math.min(0.10, growth)),
        urban: Math.min(1, urban),
        barMesh: null,
        ringMesh: null,
        currentHeight: 0.1,
        currentValue: 0,
        baseScale: 1
      });
    }

    const barGeometry = new THREE.BoxGeometry(0.02, 1, 0.02);

    function hslColor(h, s, l) {
      const c = new THREE.Color();
      c.setHSL(h, s, l);
      return c;
    }

    function densityVisual(v) {
      const height = 0.05 + v * (0.6 - 0.05);
      const hue = 0.16 * (1 - v);
      return {
        height,
        color: hslColor(hue, 1.0, 0.5),
        valueText: v.toFixed(2)
      };
    }

    function growthVisual(v) {
      const normalized = (v + 0.08) / 0.18;
      const height = 0.05 + normalized * (0.6 - 0.05);
      const color = v >= 0
        ? hslColor(0.33, 1.0, 0.35 + Math.min(0.25, v * 2))
        : hslColor(0.0, 1.0, 0.35 + Math.min(0.25, Math.abs(v) * 2));
      return {
        height,
        color,
        valueText: (v * 100).toFixed(1) + '%'
      };
    }

    function urbanVisual(v) {
      const height = 0.05 + v * (0.6 - 0.05);
      const color = hslColor(0.62 - v * 0.08, 1.0, 0.35 + v * 0.25);
      return {
        height,
        color,
        valueText: (v * 100).toFixed(1) + '%'
      };
    }

    function getVisualForMode(item, mode) {
      if (mode === 'growth') return growthVisual(item.growth);
      if (mode === 'urban') return urbanVisual(item.urban);
      return densityVisual(item.density);
    }

    let currentMode = 'density';
    let autoRotateEnabled = true;
    let autoRotateSpeed = parseInt(speedSlider.value, 10) * 0.001;
    let globeOpacity = 1.0;
    let hoveredBar = null;
    let selectedBar = null;
    let isDragging = false;
    let dragMoved = false;
    let lastMouse = { x: 0, y: 0 };
    let targetRotationX = 0.25;
    let targetRotationY = 0.0;
    let frameCount = 0;
    let searchQuery = '';
    let animationState = {
      active: false,
      startTime: 0,
      duration: 500
    };

    globeGroup.rotation.x = targetRotationX;
    globeGroup.rotation.y = targetRotationY;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function createBar(item) {
      const visual = getVisualForMode(item, currentMode);
      const material = new THREE.MeshPhongMaterial({
        color: visual.color,
        emissive: 0x000000,
        transparent: true,
        opacity: 1.0
      });

      const bar = new THREE.Mesh(barGeometry, material);

      const radius = 1.0;
      const height = visual.height;
      const dir = latLonToVector3(item.lat, item.lon, 1).normalize();
      const centerPos = dir.clone().multiplyScalar(radius + height / 2);

      bar.position.copy(centerPos);
      bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);

      bar.scale.y = height;
      bar.userData.item = item;

      item.barMesh = bar;
      item.currentHeight = height;
      item.currentValue = item.density;
      barsGroup.add(bar);

      const ringGeo = new THREE.TorusGeometry(0.03, 0.0025, 8, 32);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.9
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      const ringPos = dir.clone().multiplyScalar(radius + 0.012);
      ring.position.copy(ringPos);
      ring.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
      ring.visible = false;
      item.ringMesh = ring;
      barsGroup.add(ring);
    }

    populationData.forEach(createBar);

    function applyBarTransform(item, height) {
      const dir = latLonToVector3(item.lat, item.lon, 1).normalize();
      const centerPos = dir.clone().multiplyScalar(1.0 + height / 2);
      item.barMesh.position.copy(centerPos);
      item.barMesh.scale.y = height;
      item.barMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
      item.currentHeight = height;

      const ringPos = dir.clone().multiplyScalar(1.0 + 0.012);
      item.ringMesh.position.copy(ringPos);
      item.ringMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 0, 1), dir);
    }

    function setActiveButton(mode) {
      [btnDensity, btnGrowth, btnUrban].forEach(btn => btn.classList.remove('active'));
      if (mode === 'density') btnDensity.classList.add('active');
      if (mode === 'growth') btnGrowth.classList.add('active');
      if (mode === 'urban') btnUrban.classList.add('active');
    }

    function switchMode(mode) {
      if (currentMode === mode) return;
      currentMode = mode;
      setActiveButton(mode);
      animationState.active = true;
      animationState.startTime = performance.now();
      populationData.forEach(item => {
        const visual = getVisualForMode(item, mode);
        item.animFromHeight = item.currentHeight;
        item.animToHeight = visual.height;
        item.animFromColor = item.barMesh.material.color.clone();
        item.animToColor = visual.color.clone();
      });
    }

    btnDensity.addEventListener('click', () => switchMode('density'));
    btnGrowth.addEventListener('click', () => switchMode('growth'));
    btnUrban.addEventListener('click', () => switchMode('urban'));

    speedSlider.addEventListener('input', () => {
      speedValue.textContent = speedSlider.value;
      autoRotateSpeed = parseInt(speedSlider.value, 10) * 0.001;
    });

    searchInput.addEventListener('input', () => {
      searchQuery = searchInput.value.trim().toLowerCase();
    });

    function updateTooltip(item, clientX, clientY) {
      const visual = getVisualForMode(item, currentMode);
      tooltip.style.display = 'block';
      tooltip.style.left = (clientX + 12) + 'px';
      tooltip.style.top = (clientY + 12) + 'px';
      tooltip.innerHTML = `<strong>${item.name}</strong><br>${currentMode}: ${visual.valueText}`;
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    function showDetails(item) {
      detailPanel.style.display = 'block';
      detailPanel.innerHTML = `
        <div style="font-size:16px; font-weight:bold; margin-bottom:8px;">${item.name}</div>
        <div><span class="label">Latitude:</span><span class="mono">${item.lat.toFixed(2)}</span></div>
        <div><span class="label">Longitude:</span><span class="mono">${item.lon.toFixed(2)}</span></div>
        <div><span class="label">Density:</span><span class="mono">${item.density.toFixed(2)}</span></div>
        <div><span class="label">Growth:</span><span class="mono">${(item.growth * 100).toFixed(2)}%</span></div>
        <div><span class="label">Urban:</span><span class="mono">${(item.urban * 100).toFixed(2)}%</span></div>
        <div><span class="label">Mode:</span><span class="mono">${currentMode}</span></div>
      `;
    }

    function clearSelection() {
      if (selectedBar) selectedBar.ringMesh.visible = false;
      selectedBar = null;
      detailPanel.style.display = 'none';
    }

    renderer.domElement.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragMoved = false;
      autoRotateEnabled = false;
      lastMouse.x = e.clientX;
      lastMouse.y = e.clientY;
    });

    window.addEventListener('mousemove', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

      if (isDragging) {
        const dx = e.clientX - lastMouse.x;
        const dy = e.clientY - lastMouse.y;
        if (Math.abs(dx) > 1 || Math.abs(dy) > 1) dragMoved = true;
        targetRotationY += dx * 0.005;
        targetRotationX += dy * 0.005;
        targetRotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotationX));
        lastMouse.x = e.clientX;
        lastMouse.y = e.clientY;
      } else {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(populationData.map(d => d.barMesh), false);
        populationData.forEach(d => d.barMesh.material.emissive.setHex(0x000000));
        if (intersects.length > 0) {
          const item = intersects[0].object.userData.item;
          hoveredBar = item;
          item.barMesh.material.emissive.setHex(0x444444);
          updateTooltip(item, e.clientX, e.clientY);
        } else {
          hoveredBar = null;
          hideTooltip();
        }
      }
    });

    window.addEventListener('mouseup', (e) => {
      if (!isDragging) return;
      isDragging = false;
      if (!dragMoved) {
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(populationData.map(d => d.barMesh), false);
        if (intersects.length > 0) {
          const item = intersects[0].object.userData.item;
          if (selectedBar) selectedBar.ringMesh.visible = false;
          selectedBar = item;
          item.ringMesh.visible = true;
          showDetails(item);
        }
      }
    });

    renderer.domElement.addEventListener('wheel', (e) => {
      e.preventDefault();
      const dir = camera.position.clone().normalize();
      let distance = camera.position.length();
      distance += e.deltaY * 0.0015;
      distance = Math.max(2.0, Math.min(8.0, distance));
      camera.position.copy(dir.multiplyScalar(distance));
      camera.lookAt(0, 0, 0);
    }, { passive: false });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === 'r') {
        camera.position.set(0, 0, 3.5);
        targetRotationX = 0.25;
        targetRotationY = 0.0;
        globeGroup.rotation.x = targetRotationX;
        globeGroup.rotation.y = targetRotationY;
        autoRotateEnabled = true;
      } else if (key === 't') {
        globeOpacity = globeOpacity === 1.0 ? 0.5 : (globeOpacity === 0.5 ? 0.2 : 1.0);
        earthMaterial.opacity = globeOpacity;
      } else if (key === '1') {
        switchMode('density');
      } else if (key === '2') {
        switchMode('growth');
      } else if (key === '3') {
        switchMode('urban');
      }
    });

    function updateSearchEffects(time) {
      const hasQuery = searchQuery.length > 0;
      populationData.forEach((item, idx) => {
        const mat = item.barMesh.material;
        const match = !hasQuery || item.name.toLowerCase().includes(searchQuery);
        if (match) {
          mat.opacity = 1.0;
          const pulse = hasQuery ? (1 + 0.18 * Math.sin(time * 0.006 + idx)) : 1;
          item.barMesh.scale.x = pulse;
          item.barMesh.scale.z = pulse;
          item.baseScale = pulse;
        } else {
          mat.opacity = 0.3;
          item.barMesh.scale.x = 1;
          item.barMesh.scale.z = 1;
          item.baseScale = 1;
        }
      });
    }

    function updateModeAnimation(now) {
      if (!animationState.active) return;
      const t = Math.min(1, (now - animationState.startTime) / animationState.duration);
      populationData.forEach(item => {
        const h = THREE.MathUtils.lerp(item.animFromHeight, item.animToHeight, t);
        applyBarTransform(item, h);
        item.barMesh.material.color.copy(item.animFromColor).lerp(item.animToColor, t);
      });
      if (t >= 1) animationState.active = false;
    }

    function updateStats() {
      const visible = populationData.filter(d => d.barMesh.material.opacity > 0.5);
      const avgDensity = visible.length
        ? visible.reduce((a, b) => a + b.density, 0) / visible.length
        : 0;

      let maxBarHeight = -Infinity;
      let minBarHeight = Infinity;
      populationData.forEach(d => {
        maxBarHeight = Math.max(maxBarHeight, d.currentHeight);
        minBarHeight = Math.min(minBarHeight, d.currentHeight);
      });

      statsPanel.textContent =
`Visible Bars: ${visible.length} / ${populationData.length}
Average Density: ${avgDensity.toFixed(2)}
Mode: ${currentMode}
Rotation Speed: ${autoRotateSpeed.toFixed(3)} rad/frame
Auto Rotate: ${autoRotateEnabled}
Hovered: ${hoveredBar ? hoveredBar.name : 'None'}
Selected: ${selectedBar ? selectedBar.name : 'None'}
Globe Opacity: ${globeOpacity.toFixed(1)}
Frame: ${frameCount}`;

      window.__3D_STATE__ = {
        globeRotationY: globeGroup.rotation.y,
        cameraDistance: camera.position.length(),
        autoRotateEnabled,
        autoRotateSpeed,
        currentMode,
        globeOpacity,
        totalBars: 200,
        visibleBars: visible.length,
        hoveredBar: hoveredBar ? hoveredBar.name : null,
        selectedBar: selectedBar ? selectedBar.name : null,
        avgDensity: parseFloat(avgDensity.toFixed(2)),
        searchQuery: searchInput.value,
        isAnimating: animationState.active,
        maxBarHeight: parseFloat(maxBarHeight.toFixed(4)),
        minBarHeight: parseFloat(minBarHeight.toFixed(4)),
        frameCount
      };
    }

    function animate(now) {
      requestAnimationFrame(animate);
      frameCount++;

      if (autoRotateEnabled && !isDragging) {
        targetRotationY += autoRotateSpeed;
      }

      globeGroup.rotation.x += (targetRotationX - globeGroup.rotation.x) * 0.15;
      globeGroup.rotation.y += (targetRotationY - globeGroup.rotation.y) * 0.15;

      updateModeAnimation(now);
      updateSearchEffects(now);
      updateStats();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    speedValue.textContent = speedSlider.value;
    setActiveButton(currentMode);

    window.__3D_STATE__ = {
      globeRotationY: 0,
      cameraDistance: camera.position.length(),
      autoRotateEnabled: true,
      autoRotateSpeed,
      currentMode,
      globeOpacity,
      totalBars: 200,
      visibleBars: 200,
      hoveredBar: null,
      selectedBar: null,
      avgDensity: 0,
      searchQuery: '',
      isAnimating: false,
      maxBarHeight: 0,
      minBarHeight: 0,
      frameCount: 0
    };

    animate(performance.now());
  </script>
</body>
</html>
