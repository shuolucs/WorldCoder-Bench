<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Population Density Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
        }
        #statsPanel {
            top: 20px;
            left: 20px;
            width: 250px;
        }
        #statsPanel h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .stat-value {
            font-weight: bold;
            color: #4da6ff;
        }
        #modeButtons {
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .mode-btn {
            background: rgba(30, 30, 30, 0.8);
            color: white;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .mode-btn:hover {
            background: rgba(60, 60, 60, 0.8);
        }
        .mode-btn.active {
            border-color: #4da6ff;
            box-shadow: 0 0 10px rgba(77, 166, 255, 0.5);
            background: rgba(50, 50, 50, 0.9);
        }
        #bottomControls {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        #speedSlider {
            width: 200px;
            cursor: pointer;
        }
        #searchContainer {
            bottom: 20px;
            left: 20px;
        }
        #searchInput {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            width: 200px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        #searchInput:focus {
            border-color: #4da6ff;
        }
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #4da6ff;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            display: none;
            transform: translate(-50%, -120%);
            font-size: 13px;
            white-space: nowrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #tooltip .title { font-weight: bold; margin-bottom: 5px; font-size: 15px; color: #fff; }
        #tooltip .val { color: #aaa; }
        #detailPanel {
            top: 80px;
            right: 20px;
            width: 250px;
            display: none;
        }
        #detailPanel h3 { margin: 0 0 15px 0; color: #4da6ff; border-bottom: 1px solid #333; padding-bottom: 5px;}
        .detail-row { margin-bottom: 8px; font-size: 14px; }
        .detail-label { color: #888; display: inline-block; width: 100px; }
        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: #888;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="statsPanel" class="ui-layer panel">
    <h2>Global Stats</h2>
    <div class="stat-row"><span>Mode:</span> <span id="statMode" class="stat-value">Density</span></div>
    <div class="stat-row"><span>Visible Bars:</span> <span id="statVisible" class="stat-value">200 / 200</span></div>
    <div class="stat-row"><span>Avg Value:</span> <span id="statAvg" class="stat-value">0.00</span></div>
    <div class="stat-row"><span>Rotation Speed:</span> <span id="statSpeed" class="stat-value">0.002</span></div>
</div>

<div id="modeButtons" class="ui-layer interactive">
    <button id="btnDensity" class="mode-btn active" onclick="setMode('density')">Density (1)</button>
    <button id="btnGrowth" class="mode-btn" onclick="setMode('growth')">Growth (2)</button>
    <button id="btnUrban" class="mode-btn" onclick="setMode('urban')">Urban (3)</button>
</div>

<div id="detailPanel" class="ui-layer panel interactive">
    <h3 id="detailName">City Name</h3>
    <div class="detail-row"><span class="detail-label">Density:</span> <span id="detailDensity">0</span></div>
    <div class="detail-row"><span class="detail-label">Growth:</span> <span id="detailGrowth">0</span></div>
    <div class="detail-row"><span class="detail-label">Urbanization:</span> <span id="detailUrban">0</span></div>
    <div class="detail-row"><span class="detail-label">Coordinates:</span> <span id="detailCoords">0, 0</span></div>
</div>

<div id="bottomControls" class="ui-layer interactive panel">
    <label for="speedSlider" style="font-size: 12px; color: #aaa;">Auto-Rotation Speed</label>
    <input type="range" id="speedSlider" min="0" max="10" step="1" value="2">
</div>

<div id="searchContainer" class="ui-layer interactive">
    <input type="text" id="searchInput" placeholder="Search city...">
</div>

<div id="tooltip" class="ui-layer">
    <div class="title" id="ttTitle">City</div>
    <div class="val" id="ttVal">Value: 0</div>
</div>

<div id="instructions">
    Drag to rotate | Scroll to zoom<br>
    Hover/Click bars | 'R' Reset | 'T' Transparency
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script>
    // --- State Management ---
    window.__3D_STATE__ = {
        globeRotationY: 0,
        cameraDistance: 3.5,
        autoRotateEnabled: true,
        autoRotateSpeed: 0.002,
        currentMode: 'density',
        globeOpacity: 1.0,
        totalBars: 200,
        visibleBars: 200,
        hoveredBar: null,
        selectedBar: null,
        avgDensity: 0,
        searchQuery: '',
        isAnimating: false,
        maxBarHeight: 0,
        minBarHeight: 0,
        frameCount: 0
    };

    // --- Scene Setup ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    // Groups
    const earthGroup = new THREE.Group();
    scene.add(earthGroup);

    // --- Earth Mesh ---
    const earthGeo = new THREE.SphereGeometry(1.0, 64, 64);
    
    // Procedural Shader Material for Earth (Continents/Oceans)
    const earthVertexShader = `
        varying vec3 vPosition;
        void main() {
            vPosition = position;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `;
    const earthFragmentShader = `
        varying vec3 vPosition;
        uniform float opacity;
        
        // Simple 3D noise function
        vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
        vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
        vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
        float snoise(vec3 v) {
            const vec2 C = vec2(1.0/6.0, 1.0/3.0);
            const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
            vec3 i  = floor(v + dot(v, C.yyy) );
            vec3 x0 = v - i + dot(i, C.xxx) ;
            vec3 g = step(x0.yzx, x0.xyz);
            vec3 l = 1.0 - g;
            vec3 i1 = min( g.xyz, l.zxy );
            vec3 i2 = max( g.xyz, l.zxy );
            vec3 x1 = x0 - i1 + C.xxx;
            vec3 x2 = x0 - i2 + C.yyy;
            vec3 x3 = x0 - D.yyy;
            i = mod289(i);
            vec4 p = permute( permute( permute( i.z + vec4(0.0, i1.z, i2.z, 1.0 )) + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
            float n_ = 0.142857142857;
            vec3  ns = n_ * D.wyz - D.xzx;
            vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
            vec4 x_ = floor(j * ns.z);
            vec4 y_ = floor(j - 7.0 * x_ );
            vec4 x = x_ *ns.x + ns.yyyy;
            vec4 y = y_ *ns.x + ns.yyyy;
            vec4 h = 1.0 - abs(x) - abs(y);
            vec4 b0 = vec4( x.xy, y.xy );
            vec4 b1 = vec4( x.zw, y.zw );
            vec4 s0 = floor(b0)*2.0 + 1.0;
            vec4 s1 = floor(b1)*2.0 + 1.0;
            vec4 sh = -step(h, vec4(0.0));
            vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
            vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
            vec3 p0 = vec3(a0.xy,h.x);
            vec3 p1 = vec3(a0.zw,h.y);
            vec3 p2 = vec3(a1.xy,h.z);
            vec3 p3 = vec3(a1.zw,h.w);
            vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
            p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
            vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
            m = m * m;
            return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
        }

        void main() {
            float n = snoise(vPosition * 2.5) + 0.5 * snoise(vPosition * 5.0);
            vec3 ocean = vec3(0.039, 0.102, 0.227); // 0x0a1a3a
            vec3 land = vec3(0.176, 0.353, 0.153);  // 0x2d5a27
            vec3 color = mix(ocean, land, smoothstep(0.0, 0.1, n));
            
            // Add some fake lighting
            vec3 normal = normalize(vPosition);
            vec3 lightDir = normalize(vec3(5.0, 3.0, 5.0));
            float diff = max(dot(normal, lightDir), 0.0);
            vec3 ambient = vec3(0.2);
            
            gl_FragColor = vec4(color * (diff * 0.8 + ambient), opacity);
        }
    `;
    
    const earthMat = new THREE.ShaderMaterial({
        vertexShader: earthVertexShader,
        fragmentShader: earthFragmentShader,
        uniforms: { opacity: { value: 1.0 } },
        transparent: true
    });
    const earth = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earth);

    // --- Data Generation ---
    const barData = [];
    const cityNames = ["Tokyo", "Delhi", "Shanghai", "Sao Paulo", "Mexico City", "Cairo", "Mumbai", "Beijing", "Dhaka", "Osaka", "New York", "Karachi", "Buenos Aires", "Chongqing", "Istanbul", "Kolkata", "Manila", "Lagos", "Rio de Janeiro", "Tianjin", "Kinshasa", "Guangzhou", "Los Angeles", "Moscow", "Shenzhen", "Lahore", "Bangalore", "Paris", "Bogota", "Jakarta", "Chennai", "Lima", "Bangkok", "Seoul", "Nagoya", "Hyderabad", "London", "Tehran", "Chicago", "Chengdu", "Nanjing", "Wuhan", "Ho Chi Minh City", "Luanda", "Ahmedabad", "Kuala Lumpur", "Xi'an", "Hong Kong", "Dongguan", "Hangzhou", "Foshan", "Shenyang", "Riyadh", "Baghdad", "Santiago", "Surat", "Madrid", "Suzhou", "Pune", "Harbin", "Houston", "Dallas", "Toronto", "Dar es Salaam", "Miami", "Belo Horizonte", "Singapore", "Philadelphia", "Atlanta", "Fukuoka", "Khartoum", "Barcelona", "Johannesburg", "St. Petersburg", "Qingdao", "Dalian", "Washington", "Yangon", "Alexandria", "Jinan", "Guadalajara"];
    
    for (let i = 0; i < 200; i++) {
        // Random lat/lon, biased away from poles
        const u = Math.random();
        const v = Math.random();
        const theta = u * 2.0 * Math.PI;
        const phi = Math.acos(2.0 * v - 1.0);
        let lat = 90 - (phi * 180 / Math.PI);
        let lon = (theta * 180 / Math.PI) - 180;
        
        // Compress latitude to avoid too many cities at poles
        lat = lat * 0.7; 

        const name = cityNames[i % cityNames.length] + (i >= cityNames.length ? ` ${i}` : '');
        const density = Math.random(); // 0 to 1
        const growth = (Math.random() * 2) - 1; // -1 to 1
        const urban = Math.random(); // 0 to 1

        barData.push({ name, lat, lon, density, growth, urban, barMesh: null });
    }

    // --- Bar Creation ---
    const barGeo = new THREE.BoxGeometry(0.02, 1, 0.02);
    barGeo.translate(0, 0.5, 0); // Pivot at base

    function latLongToVector3(lat, lon, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const x = -(radius * Math.sin(phi) * Math.cos(theta));
        const z = (radius * Math.sin(phi) * Math.sin(theta));
        const y = (radius * Math.cos(phi));
        return new THREE.Vector3(x, y, z);
    }

    function getDensityColor(val) {
        // HSL: 0.16 (yellow) to 0.0 (red)
        const hue = 0.16 * (1.0 - val);
        return new THREE.Color().setHSL(hue, 1.0, 0.5);
    }

    function getGrowthColor(val) {
        // -1 to 1 -> Red to Green
        if (val < 0) return new THREE.Color().lerpColors(new THREE.Color(0xff0000), new THREE.Color(0x555555), 1 + val);
        return new THREE.Color().lerpColors(new THREE.Color(0x555555), new THREE.Color(0x00ff00), val);
    }

    function getUrbanColor(val) {
        // Blue gradient
        return new THREE.Color().lerpColors(new THREE.Color(0x002244), new THREE.Color(0x00aaff), val);
    }

    barData.forEach(data => {
        const mat = new THREE.MeshStandardMaterial({ 
            color: getDensityColor(data.density),
            roughness: 0.4,
            metalness: 0.1,
            transparent: true,
            opacity: 1.0
        });
        const mesh = new THREE.Mesh(barGeo, mat);
        
        const pos = latLongToVector3(data.lat, data.lon, 1.0);
        mesh.position.copy(pos);
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
        
        const height = 0.05 + (data.density * 0.55); // 0.05 to 0.6
        mesh.scale.set(1, height, 1);
        
        mesh.userData = { ...data, targetHeight: height, targetColor: mat.color.clone(), originalColor: mat.color.clone() };
        data.barMesh = mesh;
        earthGroup.add(mesh);
    });

    // --- Selection Ring ---
    const ringGeo = new THREE.TorusGeometry(0.03, 0.003, 8, 24);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true });
    const selectionRing = new THREE.Mesh(ringGeo, ringMat);
    selectionRing.visible = false;
    earthGroup.add(selectionRing);

    // --- Interaction Logic ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };
    
    // Animation state
    let transitionStartTime = 0;
    const transitionDuration = 500;

    // DOM Elements
    const tooltip = document.getElementById('tooltip');
    const ttTitle = document.getElementById('ttTitle');
    const ttVal = document.getElementById('ttVal');
    const detailPanel = document.getElementById('detailPanel');
    const searchInput = document.getElementById('searchInput');
    const speedSlider = document.getElementById('speedSlider');

    // Mouse Events
    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        window.__3D_STATE__.autoRotateEnabled = false;
        previousMousePosition = { x: e.offsetX, y: e.offsetY };
    });

    container.addEventListener('mousemove', (e) => {
        // Drag rotation
        if (isDragging) {
            const deltaMove = {
                x: e.offsetX - previousMousePosition.x,
                y: e.offsetY - previousMousePosition.y
            };
            
            earthGroup.rotation.y += deltaMove.x * 0.005;
            earthGroup.rotation.x += deltaMove.y * 0.005;
            
            // Clamp X rotation to prevent flipping
            earthGroup.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, earthGroup.rotation.x));
            
            previousMousePosition = { x: e.offsetX, y: e.offsetY };
        }

        // Hover logic
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(barData.map(d => d.barMesh));

        // Reset previous hover
        barData.forEach(d => {
            if (d.barMesh.material.emissive.getHex() !== 0x000000) {
                d.barMesh.material.emissive.setHex(0x000000);
            }
        });

        if (intersects.length > 0 && !isDragging) {
            const object = intersects[0].object;
            object.material.emissive.setHex(0x444444);
            window.__3D_STATE__.hoveredBar = object.userData.name;
            
            tooltip.style.display = 'block';
            tooltip.style.left = e.clientX + 'px';
            tooltip.style.top = e.clientY + 'px';
            ttTitle.innerText = object.userData.name;
            
            let valStr = '';
            if(window.__3D_STATE__.currentMode === 'density') valStr = `Density: ${(object.userData.density*100).toFixed(1)}%`;
            else if(window.__3D_STATE__.currentMode === 'growth') valStr = `Growth: ${(object.userData.growth*100).toFixed(1)}%`;
            else valStr = `Urban: ${(object.userData.urban*100).toFixed(1)}%`;
            ttVal.innerText = valStr;
            
            document.body.style.cursor = 'pointer';
        } else {
            window.__3D_STATE__.hoveredBar = null;
            tooltip.style.display = 'none';
            document.body.style.cursor = isDragging ? 'grabbing' : 'default';
        }
    });

    container.addEventListener('mouseup', () => {
        isDragging = false;
    });

    container.addEventListener('mouseleave', () => {
        isDragging = false;
        tooltip.style.display = 'none';
    });

    container.addEventListener('click', (e) => {
        if (isDragging) return; // Don't select if it was a drag
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(barData.map(d => d.barMesh));

        if (intersects.length > 0) {
            const object = intersects[0].object;
            const data = object.userData;
            window.__3D_STATE__.selectedBar = data.name;
            
            // Position ring
            selectionRing.position.copy(object.position);
            selectionRing.quaternion.copy(object.quaternion);
            selectionRing.rotateX(Math.PI / 2); // Align with surface
            selectionRing.visible = true;

            // Show detail panel
            detailPanel.style.display = 'block';
            document.getElementById('detailName').innerText = data.name;
            document.getElementById('detailDensity').innerText = (data.density * 100).toFixed(2) + '%';
            document.getElementById('detailGrowth').innerText = (data.growth * 100).toFixed(2) + '%';
            document.getElementById('detailUrban').innerText = (data.urban * 100).toFixed(2) + '%';
            document.getElementById('detailCoords').innerText = `${data.lat.toFixed(2)}°, ${data.lon.toFixed(2)}°`;
        } else {
            // Clicked on empty space or earth
            const earthIntersect = raycaster.intersectObject(earth);
            if(earthIntersect.length === 0) {
                window.__3D_STATE__.selectedBar = null;
                selectionRing.visible = false;
                detailPanel.style.display = 'none';
            }
        }
    });

    // Wheel Zoom
    container.addEventListener('wheel', (e) => {
        camera.position.z += e.deltaY * 0.005;
        camera.position.z = Math.max(2.0, Math.min(8.0, camera.position.z));
        window.__3D_STATE__.cameraDistance = camera.position.z;
    });

    // Keyboard Events
    window.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'r') {
            camera.position.set(0, 0, 3.5);
            earthGroup.rotation.set(0, 0, 0);
            window.__3D_STATE__.autoRotateEnabled = true;
            window.__3D_STATE__.cameraDistance = 3.5;
        } else if (key === 't') {
            const opacities = [1.0, 0.5, 0.2];
            let idx = opacities.indexOf(window.__3D_STATE__.globeOpacity);
            idx = (idx + 1) % opacities.length;
            window.__3D_STATE__.globeOpacity = opacities[idx];
            earthMat.uniforms.opacity.value = opacities[idx];
        } else if (key === '1') setMode('density');
        else if (key === '2') setMode('growth');
        else if (key === '3') setMode('urban');
    });

    // UI Inputs
    speedSlider.addEventListener('input', (e) => {
        window.__3D_STATE__.autoRotateSpeed = parseInt(e.target.value) * 0.001;
    });

    searchInput.addEventListener('input', (e) => {
        window.__3D_STATE__.searchQuery = e.target.value.toLowerCase();
    });

    // --- Mode Switching ---
    window.setMode = function(mode) {
        if (window.__3D_STATE__.currentMode === mode) return;
        
        window.__3D_STATE__.currentMode = mode;
        window.__3D_STATE__.isAnimating = true;
        transitionStartTime = performance.now();

        // Update buttons UI
        document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
        if(mode === 'density') document.getElementById('btnDensity').classList.add('active');
        if(mode === 'growth') document.getElementById('btnGrowth').classList.add('active');
        if(mode === 'urban') document.getElementById('btnUrban').classList.add('active');

        // Set targets
        barData.forEach(d => {
            let val, color;
            if (mode === 'density') {
                val = d.density;
                color = getDensityColor(val);
            } else if (mode === 'growth') {
                val = (d.growth + 1) / 2; // Normalize -1..1 to 0..1 for height
                color = getGrowthColor(d.growth);
            } else {
                val = d.urban;
                color = getUrbanColor(val);
            }
            
            d.barMesh.userData.targetHeight = 0.05 + (val * 0.55);
            d.barMesh.userData.targetColor = color;
            d.barMesh.userData.startHeight = d.barMesh.scale.y;
            d.barMesh.userData.startColor = d.barMesh.material.color.clone();
        });
    };

    // --- Resize Handler ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate(time) {
        requestAnimationFrame(animate);
        
        const delta = clock.getDelta();
        window.__3D_STATE__.frameCount++;

        // Auto Rotation
        if (window.__3D_STATE__.autoRotateEnabled) {
            earthGroup.rotation.y += window.__3D_STATE__.autoRotateSpeed;
        }
        window.__3D_STATE__.globeRotationY = earthGroup.rotation.y;

        // Mode Transition Animation
        if (window.__3D_STATE__.isAnimating) {
            let progress = (time - transitionStartTime) / transitionDuration;
            if (progress >= 1) {
                progress = 1;
                window.__3D_STATE__.isAnimating = false;
            }
            
            barData.forEach(d => {
                const mesh = d.barMesh;
                const ud = mesh.userData;
                mesh.scale.y = THREE.MathUtils.lerp(ud.startHeight, ud.targetHeight, progress);
                mesh.material.color.lerpColors(ud.startColor, ud.targetColor, progress);
                ud.originalColor.copy(mesh.material.color); // Update base color for search logic
            });
        }

        // Search Logic & Stats Calculation
        const query = window.__3D_STATE__.searchQuery;
        let visibleCount = 0;
        let sumValue = 0;
        let maxH = 0;
        let minH = 999;

        barData.forEach(d => {
            const mesh = d.barMesh;
            const isMatch = query === '' || d.name.toLowerCase().includes(query);
            
            if (isMatch) {
                mesh.material.opacity = 1.0;
                visibleCount++;
                
                // Pulse effect for matches if query is not empty
                if (query !== '') {
                    const pulse = 1 + 0.5 * Math.sin(time * 0.01);
                    mesh.scale.x = pulse;
                    mesh.scale.z = pulse;
                } else {
                    mesh.scale.x = 1;
                    mesh.scale.z = 1;
                }

                // Stats
                let val = window.__3D_STATE__.currentMode === 'density' ? d.density : 
                          (window.__3D_STATE__.currentMode === 'growth' ? d.growth : d.urban);
                sumValue += val;
                
                if(mesh.scale.y > maxH) maxH = mesh.scale.y;
                if(mesh.scale.y < minH) minH = mesh.scale.y;

            } else {
                mesh.material.opacity = 0.3;
                mesh.scale.x = 1;
                mesh.scale.z = 1;
            }
        });

        // Update State
        window.__3D_STATE__.visibleBars = visibleCount;
        window.__3D_STATE__.avgDensity = visibleCount > 0 ? sumValue / visibleCount : 0;
        window.__3D_STATE__.maxBarHeight = maxH;
        window.__3D_STATE__.minBarHeight = minH === 999 ? 0 : minH;

        // Update UI Stats
        document.getElementById('statMode').innerText = window.__3D_STATE__.currentMode.charAt(0).toUpperCase() + window.__3D_STATE__.currentMode.slice(1);
        document.getElementById('statVisible').innerText = `${visibleCount} / 200`;
        document.getElementById('statAvg').innerText = window.__3D_STATE__.avgDensity.toFixed(2);
        document.getElementById('statSpeed').innerText = window.__3D_STATE__.autoRotateSpeed.toFixed(3);

        renderer.render(scene, camera);
    }

    animate(performance.now());

</script>
</body>
