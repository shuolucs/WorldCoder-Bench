<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Configurator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      z-index: 10;
      color: white;
      user-select: none;
    }

    #title_bar {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      text-align: center;
      white-space: nowrap;
    }

    #strap_panel {
      top: 80px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: flex-start;
      background: rgba(0, 0, 0, 0.25);
      padding: 16px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }

    #swatches {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      box-sizing: border-box;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .swatch:hover {
      transform: scale(1.08);
    }

    .swatch.active {
      border-color: #FFD700;
    }

    #strap_label,
    #price_display {
      font-size: 16px;
      min-height: 20px;
    }

    #controls_panel {
      position: absolute;
      right: 20px;
      bottom: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ctrl-btn {
      padding: 10px 16px;
      font-size: 14px;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 8px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .ctrl-btn:hover {
      background: rgba(255,255,255,0.1);
    }

    .ctrl-btn.active {
      border-color: #FFD700;
      color: #FFD700;
    }

    .hidden-ui {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="title_bar" class="ui">WATCH CONFIGURATOR</div>

    <div id="strap_panel" class="ui">
      <div id="swatches">
        <button class="swatch active" id="swatch_leather_brown" title="Brown Leather" style="background:#8B4513;"></button>
        <button class="swatch" id="swatch_leather_black" title="Black Leather" style="background:#1a1a1a;"></button>
        <button class="swatch" id="swatch_metal_silver" title="Silver Metal" style="background:#C0C0C0;"></button>
        <button class="swatch" id="swatch_metal_gold" title="Gold Metal" style="background:#FFD700;"></button>
        <button class="swatch" id="swatch_rubber_sport" title="Sport Rubber" style="background:#2d3436;"></button>
      </div>
      <div id="strap_label">Brown Leather</div>
      <div id="price_display">$149</div>
    </div>

    <div id="controls_panel" class="ui">
      <button class="ctrl-btn" id="btn_rotate">Rotate</button>
      <button class="ctrl-btn" id="btn_zoom_fit">Zoom Fit</button>
      <button class="ctrl-btn" id="btn_screenshot">Screenshot Mode</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
    import { RoundedBoxGeometry } from "https://unpkg.com/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js";

    const app = document.getElementById("app");
    const titleBar = document.getElementById("title_bar");
    const strapPanel = document.getElementById("strap_panel");
    const controlsPanel = document.getElementById("controls_panel");
    const strapLabel = document.getElementById("strap_label");
    const priceDisplay = document.getElementById("price_display");
    const btnRotate = document.getElementById("btn_rotate");
    const btnZoomFit = document.getElementById("btn_zoom_fit");
    const btnScreenshot = document.getElementById("btn_screenshot");

    const strapConfigs = {
      leather_brown: { color: 0x8B4513, roughness: 0.8, metalness: 0.1, name: "Brown Leather", price: 149 },
      leather_black: { color: 0x1a1a1a, roughness: 0.7, metalness: 0.1, name: "Black Leather", price: 159 },
      metal_silver: { color: 0xC0C0C0, roughness: 0.3, metalness: 0.9, name: "Silver Metal", price: 299 },
      metal_gold: { color: 0xFFD700, roughness: 0.3, metalness: 0.9, name: "Gold Metal", price: 499 },
      rubber_sport: { color: 0x2d3436, roughness: 0.9, metalness: 0.0, name: "Sport Rubber", price: 89 }
    };

    const defaultCameraPos = new THREE.Vector3(0, 2, 5);

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.copy(defaultCameraPos);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.4;
    controls.minDistance = 3;
    controls.maxDistance = 8;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xffd700, 0.5);
    pointLight.position.set(-3, 3, -3);
    scene.add(pointLight);

    const gradientCanvas = document.createElement("canvas");
    gradientCanvas.width = 2;
    gradientCanvas.height = 512;
    const gctx = gradientCanvas.getContext("2d");
    const gradient = gctx.createLinearGradient(0, 0, 0, 512);
    gradient.addColorStop(0, "#1a1a2e");
    gradient.addColorStop(1, "#16213e");
    gctx.fillStyle = gradient;
    gctx.fillRect(0, 0, 2, 512);
    const gradientTexture = new THREE.CanvasTexture(gradientCanvas);
    scene.background = gradientTexture;

    const watchRoot = new THREE.Group();
    scene.add(watchRoot);

    let loadedModel = null;
    let modelLoaded = false;

    const strapMaterial = new THREE.MeshStandardMaterial({
      color: strapConfigs.leather_brown.color,
      roughness: strapConfigs.leather_brown.roughness,
      metalness: strapConfigs.leather_brown.metalness
    });

    const strapGeometry = new RoundedBoxGeometry(0.55, 1.7, 0.18, 6, 0.08);
    const topStrap = new THREE.Mesh(strapGeometry, strapMaterial);
    const bottomStrap = new THREE.Mesh(strapGeometry, strapMaterial);

    topStrap.position.set(0, 1.45, 0);
    bottomStrap.position.set(0, -1.45, 0);

    watchRoot.add(topStrap);
    watchRoot.add(bottomStrap);

    const loader = new GLTFLoader();
    loader.load(
      "ABeautifulGame.glb",
      (gltf) => {
        loadedModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(loadedModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const radius = size.length() / 2 || 1;
        const scale = 2 / radius;

        loadedModel.position.sub(center);
        loadedModel.scale.setScalar(scale);

        const boxAfterScale = new THREE.Box3().setFromObject(loadedModel);
        const centerAfterScale = boxAfterScale.getCenter(new THREE.Vector3());
        loadedModel.position.sub(centerAfterScale);

        watchRoot.add(loadedModel);
        modelLoaded = true;
      },
      undefined,
      (error) => {
        console.error("Failed to load ABeautifulGame.glb:", error);
      }
    );

    let currentStrap = "leather_brown";
    let autoRotate = false;
    let screenshotMode = false;
    let strapChangeCount = 0;

    let zoomFitActive = false;
    let zoomFrame = 0;
    const zoomTotalFrames = 30;
    let zoomStartPos = new THREE.Vector3();

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentStrap: "leather_brown",
      strapColor: strapConfigs.leather_brown.color,
      strapMetalness: strapConfigs.leather_brown.metalness,
      strapRoughness: strapConfigs.leather_brown.roughness,
      autoRotate: false,
      modelRotationY: 0,
      cameraDistance: camera.position.length(),
      price: strapConfigs.leather_brown.price,
      screenshotMode: false,
      strapChangeCount: 0,
      zoomFitActive: false
    };

    function updateSwatchUI(activeKey) {
      Object.keys(strapConfigs).forEach((key) => {
        const el = document.getElementById(`swatch_${key}`);
        if (el) el.classList.toggle("active", key === activeKey);
      });
    }

    function applyStrap(key, countChange = true) {
      const config = strapConfigs[key];
      if (!config) return;

      strapMaterial.color.setHex(config.color);
      strapMaterial.roughness = config.roughness;
      strapMaterial.metalness = config.metalness;
      strapMaterial.needsUpdate = true;

      currentStrap = key;
      strapLabel.textContent = config.name;
      priceDisplay.textContent = `$${config.price}`;
      updateSwatchUI(key);

      if (countChange) {
        strapChangeCount++;
      }
    }

    Object.keys(strapConfigs).forEach((key) => {
      const swatch = document.getElementById(`swatch_${key}`);
      swatch.addEventListener("click", () => {
        applyStrap(key, true);
      });
    });

    btnRotate.addEventListener("click", () => {
      autoRotate = !autoRotate;
      btnRotate.classList.toggle("active", autoRotate);
    });

    btnZoomFit.addEventListener("click", () => {
      zoomFitActive = true;
      zoomFrame = 0;
      zoomStartPos.copy(camera.position);
    });

    function setUIVisible(visible) {
      const method = visible ? "remove" : "add";
      titleBar.classList[method]("hidden-ui");
      strapPanel.classList[method]("hidden-ui");
      controlsPanel.classList[method]("hidden-ui");
    }

    btnScreenshot.addEventListener("click", () => {
      screenshotMode = !screenshotMode;
      if (screenshotMode) {
        setUIVisible(false); // keep screenshot button visible long enough? spec says hide all UI
        titleBar.classList.add("hidden-ui");
        strapPanel.classList.add("hidden-ui");
        controlsPanel.classList.add("hidden-ui");
        scene.background = new THREE.Color(0xffffff);
      } else {
        setUIVisible(true);
        scene.background = gradientTexture;
      }
    });

    applyStrap("leather_brown", false);

    function animate() {
      requestAnimationFrame(animate);

      if (autoRotate) {
        watchRoot.rotation.y += 0.00873;
      }

      if (zoomFitActive) {
        zoomFrame++;
        const t = Math.min(zoomFrame / zoomTotalFrames, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        camera.position.lerpVectors(zoomStartPos, defaultCameraPos, eased);
        controls.target.set(0, 0, 0);
        if (t >= 1) {
          zoomFitActive = false;
        }
      }

      controls.update();
      renderer.render(scene, camera);

      const cfg = strapConfigs[currentStrap];
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.currentStrap = currentStrap;
      window.__3D_STATE__.strapColor = cfg.color;
      window.__3D_STATE__.strapMetalness = cfg.metalness;
      window.__3D_STATE__.strapRoughness = cfg.roughness;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.modelRotationY = watchRoot.rotation.y;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.price = cfg.price;
      window.__3D_STATE__.screenshotMode = screenshotMode;
      window.__3D_STATE__.strapChangeCount = strapChangeCount;
      window.__3D_STATE__.zoomFitActive = zoomFitActive;
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
