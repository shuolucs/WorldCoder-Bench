<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            transition: background 0.3s ease;
        }
        body.screenshot-mode {
            background: #ffffff;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        body.screenshot-mode #ui-layer {
            opacity: 0;
        }
        #title {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #left-panel {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: rgba(0, 0, 0, 0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .swatch:hover {
            transform: scale(1.1);
        }
        .swatch.active {
            border-color: #FFD700;
        }
        #strap_label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            text-align: center;
        }
        #price_display {
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
        }
        #bottom-panel {
            position: absolute;
            bottom: 40px;
            right: 40px;
            pointer-events: auto;
            display: flex;
            gap: 15px;
        }
        button {
            padding: 12px 24px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        button:active {
            transform: scale(0.95);
        }
        button.active-toggle {
            background: rgba(255, 215, 0, 0.2);
            border-color: #FFD700;
            color: #FFD700;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="title">WATCH CONFIGURATOR</div>
        
        <div id="left-panel">
            <div class="swatch active" id="swatch_leather_brown" style="background: #8B4513;" title="Brown Leather"></div>
            <div class="swatch" id="swatch_leather_black" style="background: #1a1a1a;" title="Black Leather"></div>
            <div class="swatch" id="swatch_metal_silver" style="background: #C0C0C0;" title="Silver Metal"></div>
            <div class="swatch" id="swatch_metal_gold" style="background: #FFD700;" title="Gold Metal"></div>
            <div class="swatch" id="swatch_rubber_sport" style="background: #2d3436;" title="Sport Rubber"></div>
            
            <div id="strap_label">Brown Leather</div>
            <div id="price_display">$149</div>
        </div>

        <div id="bottom-panel">
            <button id="btn_rotate">Rotate</button>
            <button id="btn_zoom_fit">Zoom Fit</button>
            <button id="btn_screenshot">Screenshot Mode</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Configuration Data ---
        const strapConfigs = {
            'leather_brown': { color: 0x8B4513, roughness: 0.8, metalness: 0.1, name: 'Brown Leather', price: 149 },
            'leather_black': { color: 0x1a1a1a, roughness: 0.7, metalness: 0.1, name: 'Black Leather', price: 159 },
            'metal_silver':  { color: 0xC0C0C0, roughness: 0.3, metalness: 0.9, name: 'Silver Metal', price: 299 },
            'metal_gold':    { color: 0xFFD700, roughness: 0.3, metalness: 0.9, name: 'Gold Metal', price: 499 },
            'rubber_sport':  { color: 0x2d3436, roughness: 0.9, metalness: 0.0, name: 'Sport Rubber', price: 89 }
        };

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentStrap: 'leather_brown',
            strapColor: strapConfigs['leather_brown'].color,
            strapMetalness: strapConfigs['leather_brown'].metalness,
            strapRoughness: strapConfigs['leather_brown'].roughness,
            autoRotate: false,
            modelRotationY: 0,
            cameraDistance: 5,
            price: strapConfigs['leather_brown'].price,
            screenshotMode: false,
            strapChangeCount: 0,
            zoomFitActive: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.4;
        controls.minDistance = 3;
        controls.maxDistance = 8;
        controls.target.set(0, 0, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffd700, 0.5);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // --- Group for Rotation ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);

        // --- Procedural Straps ---
        const strapMaterial = new THREE.MeshStandardMaterial({
            color: strapConfigs['leather_brown'].color,
            roughness: strapConfigs['leather_brown'].roughness,
            metalness: strapConfigs['leather_brown'].metalness
        });

        const strapGeometry = new THREE.BoxGeometry(0.6, 0.08, 1.4);
        
        const topStrap = new THREE.Mesh(strapGeometry, strapMaterial);
        topStrap.position.set(0, 0, -1.2);
        watchGroup.add(topStrap);

        const bottomStrap = new THREE.Mesh(strapGeometry, strapMaterial);
        bottomStrap.position.set(0, 0, 1.2);
        watchGroup.add(bottomStrap);

        // --- Model Loading ---
        const loader = new GLTFLoader();
        loader.load('ABeautifulGame.glb', (gltf) => {
            const model = gltf.scene;
            
            const box = new THREE.Box3().setFromObject(model);
            const sphere = box.getBoundingSphere(new THREE.Sphere());
            
            const scale = 1 / sphere.radius; 
            model.scale.setScalar(scale);
            
            model.position.sub(sphere.center.clone().multiplyScalar(scale));
            
            watchGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading model:', error);
        });

        // --- UI Interactions ---
        const strapLabel = document.getElementById('strap_label');
        const priceDisplay = document.getElementById('price_display');
        const swatches = document.querySelectorAll('.swatch');

        swatches.forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                const key = e.target.id.replace('swatch_', '');
                const config = strapConfigs[key];

                strapMaterial.color.setHex(config.color);
                strapMaterial.roughness = config.roughness;
                strapMaterial.metalness = config.metalness;

                swatches.forEach(s => s.classList.remove('active'));
                e.target.classList.add('active');

                strapLabel.innerText = config.name;
                priceDisplay.innerText = `$${config.price}`;

                window.__3D_STATE__.currentStrap = key;
                window.__3D_STATE__.strapColor = config.color;
                window.__3D_STATE__.strapMetalness = config.metalness;
                window.__3D_STATE__.strapRoughness = config.roughness;
                window.__3D_STATE__.price = config.price;
                window.__3D_STATE__.strapChangeCount++;
            });
        });

        const btnRotate = document.getElementById('btn_rotate');
        btnRotate.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            btnRotate.classList.toggle('active-toggle', window.__3D_STATE__.autoRotate);
        });

        const btnScreenshot = document.getElementById('btn_screenshot');
        btnScreenshot.addEventListener('click', () => {
            const isScreenshot = document.body.classList.toggle('screenshot-mode');
            window.__3D_STATE__.screenshotMode = isScreenshot;
            btnScreenshot.classList.toggle('active-toggle', isScreenshot);
        });

        // Zoom Fit Animation Variables
        let zoomFrame = 0;
        const zoomDuration = 30;
        const startCamPos = new THREE.Vector3();
        const endCamPos = new THREE.Vector3(0, 2, 5);
        const startTarget = new THREE.Vector3();
        const endTarget = new THREE.Vector3(0, 0, 0);

        document.getElementById('btn_zoom_fit').addEventListener('click', () => {
            if (window.__3D_STATE__.zoomFitActive) return;
            startCamPos.copy(camera.position);
            startTarget.copy(controls.target);
            zoomFrame = 0;
            window.__3D_STATE__.zoomFitActive = true;
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.autoRotate) {
                watchGroup.rotation.y += 0.00873; 
            }

            if (window.__3D_STATE__.zoomFitActive) {
                zoomFrame++;
                let t = zoomFrame / zoomDuration;
                t = t * (2 - t); 
                
                camera.position.lerpVectors(startCamPos, endCamPos, t);
                controls.target.lerpVectors(startTarget, endTarget, t);
                
                if (zoomFrame >= zoomDuration) {
                    window.__3D_STATE__.zoomFitActive = false;
                }
            }

            controls.update();

            window.__3D_STATE__.modelRotationY = watchGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
