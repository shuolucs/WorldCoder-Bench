<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Configurator</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
}

canvas {
    display: block;
}

#ui-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#ui-container > * {
    pointer-events: auto;
}

#title-bar {
    position: absolute;
    top: 20px;
    left: 0;
    width: 100%;
    text-align: center;
    color: white;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 6px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

#strap-panel {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    background: rgba(0,0,0,0.4);
    padding: 20px 15px;
    border-radius: 25px;
    backdrop-filter: blur(10px);
}

#strap-panel .swatch {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}

#strap-panel .swatch:hover {
    transform: scale(1.15);
}

#strap-panel .swatch.active {
    border-color: #FFD700;
    box-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
}

#strap_label {
    color: white;
    font-size: 11px;
    text-align: center;
    margin-top: 5px;
    letter-spacing: 1px;
    max-width: 80px;
    line-height: 1.3;
}

#controls-panel {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
}

#controls-panel button {
    background: rgba(0,0,0,0.4);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 1px;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    white-space: nowrap;
}

#controls-panel button:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.4);
}

#controls-panel button.active {
    background: rgba(255, 215, 0, 0.2);
    border-color: #FFD700;
    color: #FFD700;
}

#price_display {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 36px;
    font-weight: 200;
    letter-spacing: 3px;
    text-shadow: 0 2px 15px rgba(0,0,0,0.5);
}

#price_display span {
    font-size: 20px;
    vertical-align: super;
    margin-right: 2px;
}

#loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
    letter-spacing: 4px;
    z-index: 100;
    transition: opacity 0.5s ease;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 2px solid rgba(255,255,255,0.1);
    border-top-color: #FFD700;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 15px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    LOADING...
</div>

<div id="ui-container">
    <div id="title-bar">WATCH CONFIGURATOR</div>

    <div id="strap-panel">
        <div class="swatch active" id="swatch_leather_brown" style="background-color: #8B4513;" title="Brown Leather"></div>
        <div class="swatch" id="swatch_leather_black" style="background-color: #1a1a1a;" title="Black Leather"></div>
        <div class="swatch" id="swatch_metal_silver" style="background-color: #C0C0C0;" title="Silver Metal"></div>
        <div class="swatch" id="swatch_metal_gold" style="background-color: #FFD700;" title="Gold Metal"></div>
        <div class="swatch" id="swatch_rubber_sport" style="background-color: #2d3436;" title="Sport Rubber"></div>
        <div id="strap_label">Brown Leather</div>
    </div>

    <div id="controls-panel">
        <button id="btn_rotate">⟳ ROTATE</button>
        <button id="btn_zoom_fit">⊞ ZOOM FIT</button>
        <button id="btn_screenshot">📷 SCREENSHOT</button>
    </div>

    <div id="price_display"><span>$</span>149</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

// Strap configurations
const strapConfigs = {
    leather_brown: { color: 0x8B4513, roughness: 0.8, metalness: 0.1, name: 'Brown Leather', price: 149 },
    leather_black: { color: 0x1a1a1a, roughness: 0.7, metalness: 0.1, name: 'Black Leather', price: 159 },
    metal_silver: { color: 0xC0C0C0, roughness: 0.3, metalness: 0.9, name: 'Silver Metal', price: 299 },
    metal_gold: { color: 0xFFD700, roughness: 0.3, metalness: 0.9, name: 'Gold Metal', price: 499 },
    rubber_sport: { color: 0x2d3436, roughness: 0.9, metalness: 0.0, name: 'Sport Rubber', price: 89 }
};

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    currentStrap: 'leather_brown',
    strapColor: 0x8B4513,
    strapMetalness: 0.1,
    strapRoughness: 0.8,
    autoRotate: false,
    modelRotationY: 0,
    cameraDistance: 5,
    price: 149,
    screenshotMode: false,
    strapChangeCount: 0,
    zoomFitActive: false
};

// Scene
const scene = new THREE.Scene();

// Background gradient
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.insertBefore(renderer.domElement, document.body.firstChild);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.4;
controls.minDistance = 3;
controls.maxDistance = 8;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0xffd700, 0.5);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// Model group (for rotation)
const modelGroup = new THREE.Group();
scene.add(modelGroup);

// Strap meshes
let topStrap, bottomStrap;
const strapMaterial = new THREE.MeshStandardMaterial({
    color: strapConfigs.leather_brown.color,
    roughness: strapConfigs.leather_brown.roughness,
    metalness: strapConfigs.leather_brown.metalness,
    envMapIntensity: 1.0
});

function createStraps(modelBounds) {
    // Create strap geometry using rounded box
    // Straps positioned relative to the model
    const strapWidth = 0.35;
    const strapLength = 1.2;
    const strapThickness = 0.08;
    const strapRadius = 0.03;

    const topStrapGeom = new RoundedBoxGeometry(strapWidth, strapLength, strapThickness, 4, strapRadius);
    const bottomStrapGeom = new RoundedBoxGeometry(strapWidth, strapLength, strapThickness, 4, strapRadius);

    topStrap = new THREE.Mesh(topStrapGeom, strapMaterial);
    bottomStrap = new THREE.Mesh(bottomStrapGeom, strapMaterial);

    // Position straps above and below the model
    const yOffset = modelBounds ? modelBounds.y : 0.6;
    topStrap.position.set(0, yOffset + 0.6, 0);
    bottomStrap.position.set(0, -(yOffset + 0.6), 0);

    // Slight curve effect via rotation
    topStrap.castShadow = true;
    bottomStrap.castShadow = true;

    modelGroup.add(topStrap);
    modelGroup.add(bottomStrap);
}

// Floor / ground plane for shadow
const groundGeom = new THREE.CircleGeometry(5, 64);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.9,
    metalness: 0.0,
    transparent: true,
    opacity: 0.5
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.5;
ground.receiveShadow = true;
scene.add(ground);

// Load model
const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/ABeautifulGame.glb',
    (gltf) => {
        const model = gltf.scene;

        // Calculate bounding sphere
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // Center the model
        model.position.sub(center);

        // Scale to fit within 2-unit bounding sphere
        const maxDim = Math.max(size.x, size.y, size.z);
        const sphere = new THREE.Sphere();
        box.getBoundingSphere(sphere);
        const scaleFactor = 2 / sphere.radius;
        model.scale.setScalar(scaleFactor);

        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        modelGroup.add(model);

        // Recalculate bounds after scaling
        const scaledBox = new THREE.Box3().setFromObject(model);
        const scaledSize = scaledBox.getSize(new THREE.Vector3());

        createStraps({ y: scaledSize.y / 2 });

        window.__3D_STATE__.modelLoaded = true;

        // Hide loading overlay
        const overlay = document.getElementById('loading-overlay');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 500);
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.error('Error loading model:', error);
        // Create a placeholder if model fails to load
        const placeholderGeom = new THREE.CylinderGeometry(0.6, 0.6, 0.3, 32);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x333344, metalness: 0.8, roughness: 0.2 });
        const placeholder = new THREE.Mesh(placeholderGeom, placeholderMat);
        placeholder.castShadow = true;
        modelGroup.add(placeholder);

        createStraps({ y: 0.15 });

        window.__3D_STATE__.modelLoaded = true;
        const overlay = document.getElementById('loading-overlay');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 500);
    }
);

// Strap change function
function changeStrap(strapKey) {
    const config = strapConfigs[strapKey];
    if (!config) return;

    strapMaterial.color.setHex(config.color);
    strapMaterial.roughness = config.roughness;
    strapMaterial.metalness = config.metalness;
    strapMaterial.needsUpdate = true;

    // Update UI
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    const activeSwatch = document.getElementById('swatch_' + strapKey);
    if (activeSwatch) activeSwatch.classList.add('active');

    document.getElementById('strap_label').textContent = config.name;
    document.getElementById('price_display').innerHTML = '<span>$</span>' + config.price;

    // Update state
    window.__3D_STATE__.currentStrap = strapKey;
    window.__3D_STATE__.strapColor = config.color;
    window.__3D_STATE__.strapMetalness = config.metalness;
    window.__3D_STATE__.strapRoughness = config.roughness;
    window.__3D_STATE__.price = config.price;
    window.__3D_STATE__.strapChangeCount++;
}

// Swatch click handlers
Object.keys(strapConfigs).forEach(key => {
    const swatch = document.getElementById('swatch_' + key);
    if (swatch) {
        swatch.addEventListener('click', () => changeStrap(key));
    }
});

// Rotate button
const btnRotate = document.getElementById('btn_rotate');
btnRotate.addEventListener('click', () => {
    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
    btnRotate.classList.toggle('active', window.__3D_STATE__.autoRotate);
});

// Zoom Fit button
let zoomFitFrame = 0;
let zoomFitStartPos = new THREE.Vector3();
const defaultCamPos = new THREE.Vector3(0, 2, 5);

const btnZoomFit = document.getElementById('btn_zoom_fit');
btnZoomFit.addEventListener('click', () => {
    if (window.__3D_STATE__.zoomFitActive) return;
    window.__3D_STATE__.zoomFitActive = true;
    zoomFitFrame = 0;
    zoomFitStartPos.copy(camera.position);
});

// Screenshot button
const btnScreenshot = document.getElementById('btn_screenshot');
let whiteBackground = null;

btnScreenshot.addEventListener('click', () => {
    window.__3D_STATE__.screenshotMode = !window.__3D_STATE__.screenshotMode;

    const uiContainer = document.getElementById('ui-container');

    if (window.__3D_STATE__.screenshotMode) {
        uiContainer.style.display = 'none';
        scene.background = new THREE.Color(0xffffff);
    } else {
        uiContainer.style.display = 'block';
        scene.background = bgTexture;
    }
});

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Easing function
function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    // Auto rotation
    if (window.__3D_STATE__.autoRotate) {
        modelGroup.rotation.y += 0.00873; // ~0.5 degrees per frame
    }
    window.__3D_STATE__.modelRotationY = modelGroup.rotation.y;

    // Zoom fit animation
    if (window.__3D_STATE__.zoomFitActive) {
        zoomFitFrame++;
        const t = easeInOutCubic(Math.min(zoomFitFrame / 30, 1));
        camera.position.lerpVectors(zoomFitStartPos, defaultCamPos, t);

        if (zoomFitFrame >= 30) {
            window.__3D_STATE__.zoomFitActive = false;
            camera.position.copy(defaultCamPos);
        }
    }

    // Update camera distance
    window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
