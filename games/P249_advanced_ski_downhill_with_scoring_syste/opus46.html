<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ski Downhill Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
}

#score {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#combo {
    position: absolute;
    top: 55px;
    left: 20px;
    color: #ffd700;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#speed {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#distance {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
}

#boostIndicator {
    position: absolute;
    top: 90px;
    left: 20px;
    color: #ffff00;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    display: none;
}

#startButton {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 32px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #1e90ff, #00bfff);
    border: 3px solid #fff;
    border-radius: 15px;
    cursor: pointer;
    pointer-events: all;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 20;
}

#startButton:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}

#gameOverOverlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 30;
    pointer-events: all;
}

#gameOverOverlay h1 {
    color: #fff;
    font-size: 64px;
    margin-bottom: 20px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
}

#gameOverOverlay .final-score {
    color: #ffd700;
    font-size: 36px;
    margin-bottom: 10px;
}

#gameOverOverlay .stats {
    color: #ccc;
    font-size: 20px;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.6;
}

#restartButton {
    padding: 15px 40px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #ff4500, #ff6347);
    border: 3px solid #fff;
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 5px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s;
}

#restartButton:hover {
    transform: scale(1.05);
}

#pauseText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 72px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    display: none;
    z-index: 25;
    pointer-events: none;
}

#instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score">Score: 0</div>
    <div id="combo">Combo: 1x</div>
    <div id="speed">Speed: 0</div>
    <div id="distance">Distance: 500m remaining</div>
    <div id="boostIndicator">🚀 BOOST!</div>
    <div id="instructions">← → Arrow Keys to Steer | P to Pause</div>
</div>

<button id="startButton">🎿 Start Game</button>

<div id="gameOverOverlay">
    <h1>🏁 Game Over!</h1>
    <div class="final-score" id="finalScore">Final Score: 0</div>
    <div class="stats" id="finalStats"></div>
    <button id="restartButton">🔄 Restart</button>
</div>

<div id="pauseText">⏸ PAUSED</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gameStarted: false,
    gameOver: false,
    paused: false,
    score: 0,
    speed: 0,
    combo: 1,
    distance: 0,
    skierX: 0,
    skierZ: 0,
    gatesPassed: 0,
    obstaclesHit: 0,
    boostsCollected: 0,
    boosted: false,
    modelLoaded: false,
    obstacleCount: 0,
    gateCount: 0
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0xc0c8e0, 50, 300);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 5, 10);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 500;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x8888ff, 0.4);
scene.add(ambientLight);

// Slope angle
const slopeAngle = 15 * Math.PI / 180;

// Snow slope - we create multiple segments for a long slope
const slopeGroup = new THREE.Group();
scene.add(slopeGroup);

function createSlope() {
    const slopeGeom = new THREE.PlaneGeometry(30, 500, 30, 500);
    const slopeMat = new THREE.MeshStandardMaterial({
        color: 0xf0f0ff,
        roughness: 0.8,
        metalness: 0.1
    });
    const slope = new THREE.Mesh(slopeGeom, slopeMat);
    slope.receiveShadow = true;
    slope.rotation.x = -Math.PI / 2 + slopeAngle;
    slope.position.set(0, -1, -220);
    slopeGroup.add(slope);

    // Additional slope behind
    const slope2 = new THREE.Mesh(slopeGeom.clone(), slopeMat.clone());
    slope2.receiveShadow = true;
    slope2.rotation.x = -Math.PI / 2 + slopeAngle;
    slope2.position.set(0, -1 - 500 * Math.sin(slopeAngle), -220 - 500 * Math.cos(slopeAngle));
    slopeGroup.add(slope2);

    // Side snow banks
    for (let side = -1; side <= 1; side += 2) {
        for (let i = 0; i < 50; i++) {
            const bankGeom = new THREE.BoxGeometry(
                1 + Math.random() * 2,
                0.5 + Math.random() * 1.5,
                3 + Math.random() * 5
            );
            const bankMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f0 });
            const bank = new THREE.Mesh(bankGeom, bankMat);
            const zPos = -i * 20 + Math.random() * 10;
            bank.position.set(
                side * (14 + Math.random() * 3),
                -0.5 + zPos * Math.sin(slopeAngle) * (-1),
                zPos
            );
            bank.castShadow = true;
            bank.receiveShadow = true;
            slopeGroup.add(bank);
        }
    }

    // Trees on sides
    for (let i = 0; i < 80; i++) {
        const side = Math.random() > 0.5 ? 1 : -1;
        const treeGroup = new THREE.Group();
        
        const trunkGeom = new THREE.CylinderGeometry(0.15, 0.2, 2, 6);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x4a3520 });
        const trunk = new THREE.Mesh(trunkGeom, trunkMat);
        trunk.position.y = 1;
        trunk.castShadow = true;
        treeGroup.add(trunk);

        for (let j = 0; j < 3; j++) {
            const coneGeom = new THREE.ConeGeometry(1.2 - j * 0.3, 1.5, 6);
            const coneMat = new THREE.MeshStandardMaterial({ color: 0x1a5c1a });
            const cone = new THREE.Mesh(coneGeom, coneMat);
            cone.position.y = 2 + j * 1;
            cone.castShadow = true;
            treeGroup.add(cone);
        }

        const zPos = -i * 12 + Math.random() * 8;
        treeGroup.position.set(
            side * (15 + Math.random() * 8),
            -0.5 + zPos * Math.sin(slopeAngle) * (-1),
            zPos
        );
        slopeGroup.add(treeGroup);
    }
}

createSlope();

// Skier
let skier = null;
let skierBBox = new THREE.Box3();
const skierSize = new THREE.Vector3(1, 1, 1);

// Create a fallback skier (simple geometry)
function createFallbackSkier() {
    const group = new THREE.Group();
    
    // Body
    const bodyGeom = new THREE.CapsuleGeometry(0.3, 0.8, 4, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2244aa });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.8;
    body.castShadow = true;
    group.add(body);

    // Head
    const headGeom = new THREE.SphereGeometry(0.25, 8, 8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc99 });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.y = 1.6;
    head.castShadow = true;
    group.add(head);

    // Helmet
    const helmetGeom = new THREE.SphereGeometry(0.28, 8, 8, 0, Math.PI * 2, 0, Math.PI / 2);
    const helmetMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const helmet = new THREE.Mesh(helmetGeom, helmetMat);
    helmet.position.y = 1.65;
    helmet.castShadow = true;
    group.add(helmet);

    // Skis
    for (let side = -1; side <= 1; side += 2) {
        const skiGeom = new THREE.BoxGeometry(0.12, 0.05, 1.8);
        const skiMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const ski = new THREE.Mesh(skiGeom, skiMat);
        ski.position.set(side * 0.2, 0.025, 0);
        ski.castShadow = true;
        group.add(ski);
    }

    // Poles
    for (let side = -1; side <= 1; side += 2) {
        const poleGeom = new THREE.CylinderGeometry(0.02, 0.02, 1.2, 4);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const pole = new THREE.Mesh(poleGeom, poleMat);
        pole.position.set(side * 0.5, 0.6, 0);
        pole.rotation.z = side * 0.3;
        pole.castShadow = true;
        group.add(pole);
    }

    return group;
}

// Try loading GLTF model, fallback to simple geometry
const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/SheenChair.glb',
    (gltf) => {
        skier = gltf.scene;
        skier.scale.set(0.5, 0.5, 0.5);
        skier.position.set(0, 0.5, 0);
        skier.castShadow = true;
        skier.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        scene.add(skier);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load SheenChair.glb, using fallback skier model', error);
        skier = createFallbackSkier();
        skier.position.set(0, 0.5, 0);
        scene.add(skier);
        state.modelLoaded = true;
    }
);

// Obstacles
const obstacles = [];
const gates = [];
const boostRamps = [];
const particles = [];

function generateObstacles() {
    // Clear existing
    obstacles.forEach(o => scene.remove(o.mesh));
    gates.forEach(g => { scene.remove(g.pole1); scene.remove(g.pole2); if(g.bar) scene.remove(g.bar); });
    boostRamps.forEach(b => scene.remove(b.mesh));
    obstacles.length = 0;
    gates.length = 0;
    boostRamps.length = 0;

    // Generate obstacles
    for (let i = 0; i < 25; i++) {
        const z = -(i + 1) * 20 + (Math.random() - 0.5) * 10;
        const x = (Math.random() - 0.5) * 20; // [-10, 10]
        
        const geom = new THREE.BoxGeometry(1, 1, 1);
        const mat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.5 });
        const mesh = new THREE.Mesh(geom, mat);
        
        const yOffset = -z * Math.sin(slopeAngle);
        mesh.position.set(x, yOffset + 0.5, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);
        
        obstacles.push({
            mesh,
            bbox: new THREE.Box3().setFromObject(mesh),
            hit: false
        });
    }
    state.obstacleCount = obstacles.length;

    // Generate gates
    for (let i = 0; i < 18; i++) {
        const z = -(i + 1) * 25 - 10;
        const xOffset = (Math.random() - 0.5) * 4;
        const gateWidth = 6;
        
        const poleGeom = new THREE.CylinderGeometry(0.2, 0.2, 3, 8);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
        
        const yOffset = -z * Math.sin(slopeAngle);
        
        const pole1 = new THREE.Mesh(poleGeom, poleMat);
        pole1.position.set(xOffset - gateWidth / 2, yOffset + 1.5, z);
        pole1.castShadow = true;
        scene.add(pole1);
        
        const pole2 = new THREE.Mesh(poleGeom, poleMat.clone());
        pole2.position.set(xOffset + gateWidth / 2, yOffset + 1.5, z);
        pole2.castShadow = true;
        scene.add(pole2);

        // Bar connecting poles
        const barGeom = new THREE.BoxGeometry(gateWidth, 0.15, 0.15);
        const barMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400 });
        const bar = new THREE.Mesh(barGeom, barMat);
        bar.position.set(xOffset, yOffset + 3, z);
        scene.add(bar);
        
        gates.push({
            pole1,
            pole2,
            bar,
            z,
            xLeft: xOffset - gateWidth / 2,
            xRight: xOffset + gateWidth / 2,
            passed: false
        });
    }
    state.gateCount = gates.length;

    // Generate boost ramps
    for (let i = 0; i < 5; i++) {
        const z = -(i + 1) * 90 - 30;
        const x = (Math.random() - 0.5) * 16;
        
        const geom = new THREE.BoxGeometry(2, 0.3, 2);
        const mat = new THREE.MeshStandardMaterial({
            color: 0xffff00,
            emissive: 0x444400,
            roughness: 0.3,
            metalness: 0.5
        });
        const mesh = new THREE.Mesh(geom, mat);
        
        const yOffset = -z * Math.sin(slopeAngle);
        mesh.position.set(x, yOffset + 0.15, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        // Arrow indicator on ramp
        const arrowGeom = new THREE.ConeGeometry(0.4, 0.6, 4);
        const arrowMat = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0x442200 });
        const arrow = new THREE.Mesh(arrowGeom, arrowMat);
        arrow.position.set(x, yOffset + 0.6, z);
        arrow.rotation.x = Math.PI;
        scene.add(arrow);
        
        boostRamps.push({
            mesh,
            arrow,
            bbox: new THREE.Box3().setFromObject(mesh),
            hit: false
        });
    }
}

generateObstacles();

// Snow particles
const snowGeom = new THREE.BufferGeometry();
const snowCount = 2000;
const snowPositions = new Float32Array(snowCount * 3);
for (let i = 0; i < snowCount; i++) {
    snowPositions[i * 3] = (Math.random() - 0.5) * 60;
    snowPositions[i * 3 + 1] = Math.random() * 30;
    snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 100;
}
snowGeom.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
const snowParticles = new THREE.Points(snowGeom, snowMat);
scene.add(snowParticles);

// Game variables
let baseSpeed = 0.3;
let currentSpeed = 0;
let maxSpeed = 1.2;
let lateralSpeed = 0.15;
let totalDistance = 0;
let lastDistanceScore = 0;
let boosted = false;
let boostTimer = 0;
let boostEndTime = 0;

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === 'p' || e.key === 'P') {
        if (state.gameStarted && !state.gameOver) {
            state.paused = !state.paused;
            document.getElementById('pauseText').style.display = state.paused ? 'block' : 'none';
        }
    }
});
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// UI Elements
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const speedEl = document.getElementById('speed');
const distanceEl = document.getElementById('distance');
const boostEl = document.getElementById('boostIndicator');
const startBtn = document.getElementById('startButton');
const gameOverOverlay = document.getElementById('gameOverOverlay');
const restartBtn = document.getElementById('restartButton');
const finalScoreEl = document.getElementById('finalScore');
const finalStatsEl = document.getElementById('finalStats');

startBtn.addEventListener('click', () => {
    startGame();
});

restartBtn.addEventListener('click', () => {
    restartGame();
});

function startGame() {
    state.gameStarted = true;
    state.gameOver = false;
    state.paused = false;
    state.score = 0;
    state.speed = baseSpeed;
    state.combo = 1;
    state.distance = 0;
    state.gatesPassed = 0;
    state.obstaclesHit = 0;
    state.boostsCollected = 0;
    state.boosted = false;
    
    currentSpeed = baseSpeed;
    totalDistance = 0;
    lastDistanceScore = 0;
    boosted = false;
    boostTimer = 0;
    
    startBtn.style.display = 'none';
    gameOverOverlay.style.display = 'none';
    document.getElementById('pauseText').style.display = 'none';
    
    if (skier) {
        skier.position.set(0, 0.5, 0);
    }

    // Reset obstacles and gates
    obstacles.forEach(o => o.hit = false);
    gates.forEach(g => g.passed = false);
    boostRamps.forEach(b => b.hit = false);
}

function restartGame() {
    // Remove old objects
    obstacles.forEach(o => scene.remove(o.mesh));
    gates.forEach(g => { scene.remove(g.pole1); scene.remove(g.pole2); if(g.bar) scene.remove(g.bar); });
    boostRamps.forEach(b => { scene.remove(b.mesh); if(b.arrow) scene.remove(b.arrow); });
    
    generateObstacles();
    startGame();
}

function endGame() {
    state.gameOver = true;
    finalScoreEl.textContent = `Final Score: ${state.score}`;
    finalStatsEl.innerHTML = `
        Gates Passed: ${state.gatesPassed}<br>
        Obstacles Hit: ${state.obstaclesHit}<br>
        Boosts Collected: ${state.boostsCollected}<br>
        Max Combo: ${state.combo}x<br>
        Distance: 500m
    `;
    gameOverOverlay.style.display = 'flex';
}

// Collision particle effect
function spawnCollisionParticles(position, color) {
    for (let i = 0; i < 10; i++) {
        const geom = new THREE.SphereGeometry(0.08, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color });
        const p = new THREE.Mesh(geom, mat);
        p.position.copy(position);
        p.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 0.3,
            Math.random() * 0.3,
            (Math.random() - 0.5) * 0.3
        );
        p.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    
    if (!state.gameStarted || state.paused || state.gameOver || !skier) {
        // Still render but don't update game logic
        // Animate snow even when not playing
        const snowPos = snowParticles.geometry.attributes.position.array;
        for (let i = 0; i < snowCount; i++) {
            snowPos[i * 3 + 1] -= 0.02;
            if (snowPos[i * 3 + 1] < -2) snowPos[i * 3 + 1] = 30;
        }
        snowParticles.geometry.attributes.position.needsUpdate = true;
        
        if (skier && !state.gameStarted) {
            camera.position.set(skier.position.x, skier.position.y + 5, skier.position.z + 10);
            camera.lookAt(skier.position.x, skier.position.y, skier.position.z);
        }
        
        renderer.render(scene, camera);
        return;
    }
    
    // Speed management
    if (!boosted) {
        currentSpeed = Math.min(currentSpeed + 0.002, maxSpeed);
    }
    
    // Boost timer
    if (boosted) {
        boostTimer -= delta;
        if (boostTimer <= 0) {
            boosted = false;
            currentSpeed = Math.min(currentSpeed / 1.5, maxSpeed);
            state.boosted = false;
            boostEl.style.display = 'none';
        }
    }
    
    const effectiveSpeed = currentSpeed;
    
    // Move skier forward (negative Z)
    const moveZ = -effectiveSpeed;
    const moveY = effectiveSpeed * Math.sin(slopeAngle);
    
    skier.position.z += moveZ;
    skier.position.y -= moveY;
    
    totalDistance += effectiveSpeed;
    state.distance = totalDistance;
    
    // Lateral movement
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
        skier.position.x -= lateralSpeed;
        skier.rotation.y = 0.2;
    } else if (keys['ArrowRight'] || keys['d'] || keys['D']) {
        skier.position.x += lateralSpeed;
        skier.rotation.y = -0.2;
    } else {
        skier.rotation.y *= 0.9;
    }
    
    // Bound X
    skier.position.x = Math.max(-12, Math.min(12, skier.position.x));
    
    state.skierX = skier.position.x;
    state.skierZ = skier.position.z;
    state.speed = currentSpeed;
    
    // Update skier bounding box
    skierBBox.setFromCenterAndSize(
        skier.position,
        skierSize
    );
    
    // Collision detection - Obstacles
    for (const obs of obstacles) {
        if (obs.hit) continue;
        
        obs.bbox.setFromObject(obs.mesh);
        
        if (skierBBox.intersectsBox(obs.bbox)) {
            obs.hit = true;
            state.score = Math.max(0, state.score - 50);
            state.combo = 1;
            currentSpeed = Math.max(baseSpeed, currentSpeed * 0.7);
            state.obstaclesHit++;
            
            spawnCollisionParticles(obs.mesh.position.clone(), 0xff0000);
            
            // Flash obstacle
            obs.mesh.material.emissive = new THREE.Color(0xff0000);
            setTimeout(() => {
                if (obs.mesh.material) obs.mesh.material.emissive = new THREE.Color(0x000000);
            }, 200);
        }
    }
    
    // Collision detection - Gates
    for (const gate of gates) {
        if (gate.passed) continue;
        
        if (skier.position.z <= gate.z) {
            gate.passed = true;
            
            if (skier.position.x >= gate.xLeft && skier.position.x <= gate.xRight) {
                // Passed through gate
                const points = 100 * state.combo;
                state.score += points;
                state.gatesPassed++;
                state.combo = Math.min(4, state.combo + 1);
                
                spawnCollisionParticles(
                    new THREE.Vector3(skier.position.x, skier.position.y + 1, gate.z),
                    0x00ff00
                );
                
                // Flash gate green
                gate.pole1.material.emissive = new THREE.Color(0x00ff00);
                gate.pole2.material.emissive = new THREE.Color(0x00ff00);
                setTimeout(() => {
                    gate.pole1.material.emissive = new THREE.Color(0x004400);
                    gate.pole2.material.emissive = new THREE.Color(0x004400);
                }, 300);
            }
        }
    }
    
    // Collision detection - Boost ramps
    for (const boost of boostRamps) {
        if (boost.hit) continue;
        
        boost.bbox.setFromObject(boost.mesh);
        
        if (skierBBox.intersectsBox(boost.bbox)) {
            boost.hit = true;
            state.score += 25;
            state.boostsCollected++;
            
            boosted = true;
            boostTimer = 3;
            currentSpeed = Math.min(currentSpeed * 1.5, maxSpeed * 1.5);
            state.boosted = true;
            boostEl.style.display = 'block';
            
            spawnCollisionParticles(boost.mesh.position.clone(), 0xffff00);
            
            boost.mesh.material.emissive = new THREE.Color(0xffff00);
            setTimeout(() => {
                if (boost.mesh.material) boost.mesh.material.emissive = new THREE.Color(0x444400);
            }, 300);
        }
    }
    
    // Distance scoring
    const distanceCheckpoints = Math.floor(totalDistance / 50);
    const lastCheckpoints = Math.floor(lastDistanceScore / 50);
    if (distanceCheckpoints > lastCheckpoints) {
        state.score += (distanceCheckpoints - lastCheckpoints) * 10;
    }
    lastDistanceScore = totalDistance;
    
    // Check game end
    if (totalDistance >= 500) {
        endGame();
    }
    
    // Camera follow
    const cameraTarget = new THREE.Vector3(
        skier.position.x,
        skier.position.y + 5,
        skier.position.z + 10
    );
    camera.position.lerp(cameraTarget, 0.1);
    camera.lookAt(skier.position.x, skier.position.y, skier.position.z - 5);
    
    // Move snow particles with camera
    snowParticles.position.x = skier.position.x;
    snowParticles.position.z = skier.position.z;
    snowParticles.position.y = skier.position.y;
    
    const snowPos = snowParticles.geometry.attributes.position.array;
    for (let i = 0; i < snowCount; i++) {
        snowPos[i * 3 + 1] -= 0.03;
        snowPos[i * 3] += (Math.random() - 0.5) * 0.02;
        if (snowPos[i * 3 + 1] < -2) {
            snowPos[i * 3 + 1] = 30;
            snowPos[i * 3] = (Math.random() - 0.5) * 60;
            snowPos[i * 3 + 2] = (Math.random() - 0.5) * 100;
        }
    }
    snowParticles.geometry.attributes.position.needsUpdate = true;
    
    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.add(p.velocity);
        p.velocity.y -= 0.01;
        p.life -= 0.03;
        p.scale.setScalar(p.life);
        if (p.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }
    
    // Animate boost ramp arrows
    boostRamps.forEach(b => {
        if (b.arrow && !b.hit) {
            b.arrow.position.y = b.mesh.position.y + 0.6 + Math.sin(Date.now() * 0.005) * 0.3;
            b.arrow.rotation.y += 0.05;
        }
    });
    
    // Update HUD
    scoreEl.textContent = `Score: ${state.score}`;
    comboEl.textContent = `Combo: ${state.combo}x`;
    comboEl.style.color = state.combo > 1 ? '#ff4444' : '#ffd700';
    if (state.combo >= 3) comboEl.style.color = '#ff00ff';
    if (state.combo >= 4) comboEl.style.color = '#00ffff';
    
    speedEl.textContent = `Speed: ${(currentSpeed * 100).toFixed(0)} km/h`;
    if (boosted) speedEl.style.color = '#ffff00';
    else speedEl.style.color = '#fff';
    
    const remaining = Math.max(0, 500 - totalDistance);
    distanceEl.textContent = `Distance: ${remaining.toFixed(0)}m remaining`;
    
    // Update state
    state.score = Math.max(0, state.score);
    
    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
