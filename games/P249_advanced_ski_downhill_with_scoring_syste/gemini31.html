<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Ski Downhill</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            color: #1a1a1a;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            z-index: 10;
        }
        .hud-left { display: flex; flex-direction: column; }
        .hud-center { text-align: center; }
        .hud-right { text-align: right; }
        #combo { font-size: 18px; color: #d32f2f; }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            color: white;
        }
        h1 { font-size: 48px; margin-bottom: 10px; text-shadow: 2px 2px 4px #000; }
        p { font-size: 24px; margin-bottom: 30px; }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: 2px solid #fff;
            border-radius: 8px;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:hover { background: #45a049; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        #pauseText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            color: white;
            font-weight: bold;
            text-shadow: 3px 3px 6px #000;
            display: none;
            pointer-events: none;
            z-index: 15;
            letter-spacing: 5px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div class="hud-left">
            <div id="scoreDisplay">Score: 0</div>
            <div id="comboDisplay">Combo: 1x</div>
        </div>
        <div class="hud-center">
            <div id="distanceDisplay">Dist: 500m</div>
        </div>
        <div class="hud-right">
            <div id="speedDisplay">Speed: 0.00</div>
        </div>
    </div>

    <div id="startOverlay" class="overlay">
        <h1>Ski Downhill</h1>
        <p>Use Left/Right Arrows to steer. 'P' to pause.</p>
        <button id="startButton">Start Game</button>
    </div>

    <div id="gameOverOverlay" class="overlay" style="display: none;">
        <h1>Game Over</h1>
        <p id="finalScoreText">Final Score: 0</p>
        <button id="restartButton">Restart</button>
    </div>

    <div id="pauseText">PAUSED</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            gameOver: false,
            paused: false,
            score: 0,
            speed: 0.3,
            combo: 1,
            distance: 0,
            skierX: 0,
            skierZ: 0,
            gatesPassed: 0,
            obstaclesHit: 0,
            boostsCollected: 0,
            boosted: false,
            modelLoaded: false,
            obstacleCount: 0,
            gateCount: 0
        };
        const state = window.__3D_STATE__;

        // --- Game Constants & Variables ---
        const MAX_DISTANCE = 500;
        const BASE_SPEED = 0.3;
        const MAX_SPEED = 1.2;
        const ACCELERATION = 0.002;
        const STEER_SPEED = 0.15;
        const BOUND_X = 12;
        
        let scene, camera, renderer;
        let worldGroup, skierGroup, skierModel;
        let cameraTarget;
        let obstacles = [], gates = [], boosts = [];
        let lastTime = 0;
        let lastDistanceScore = 0;
        let invulnTime = 0;
        let boostEndTime = 0;

        const keys = { ArrowLeft: false, ArrowRight: false };

        // --- DOM Elements ---
        const ui = {
            score: document.getElementById('scoreDisplay'),
            combo: document.getElementById('comboDisplay'),
            distance: document.getElementById('distanceDisplay'),
            speed: document.getElementById('speedDisplay'),
            startOverlay: document.getElementById('startOverlay'),
            startButton: document.getElementById('startButton'),
            gameOverOverlay: document.getElementById('gameOverOverlay'),
            finalScoreText: document.getElementById('finalScoreText'),
            restartButton: document.getElementById('restartButton'),
            pauseText: document.getElementById('pauseText')
        };

        init();
        animate(0);

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0xc0c8e0, 50, 300);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x8888ff, 0.4);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
            dirLight.position.set(50, 100, 50);
            scene.add(dirLight);

            // World Group (Tilted for downhill effect)
            worldGroup = new THREE.Group();
            worldGroup.rotation.x = -15 * Math.PI / 180;
            scene.add(worldGroup);

            // Slope
            const slopeGeom = new THREE.PlaneGeometry(30, 1200);
            const slopeMat = new THREE.MeshStandardMaterial({ color: 0xf0f0ff, roughness: 0.8 });
            const slope = new THREE.Mesh(slopeGeom, slopeMat);
            slope.rotation.x = -Math.PI / 2;
            slope.position.z = -500; // Center it ahead
            worldGroup.add(slope);

            // Skier Setup
            skierGroup = new THREE.Group();
            skierGroup.position.set(0, 0.5, 0);
            worldGroup.add(skierGroup);

            // Camera Target (attached to skier)
            cameraTarget = new THREE.Object3D();
            cameraTarget.position.set(0, 5, 10);
            skierGroup.add(cameraTarget);

            // Load Model
            const loader = new GLTFLoader();
            const modelUrl = 'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models@master/2.0/SheenChair/glTF-Binary/SheenChair.glb';
            
            // Placeholder while loading
            const placeholderGeom = new THREE.BoxGeometry(1, 1, 1);
            const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x3366ff });
            skierModel = new THREE.Mesh(placeholderGeom, placeholderMat);
            skierGroup.add(skierModel);

            loader.load(modelUrl, (gltf) => {
                skierGroup.remove(skierModel);
                skierModel = gltf.scene;
                skierModel.scale.set(0.5, 0.5, 0.5);
                
                // Center model
                const box = new THREE.Box3().setFromObject(skierModel);
                const center = box.getCenter(new THREE.Vector3());
                skierModel.position.sub(center);
                skierModel.position.y += (box.max.y - box.min.y) / 2 * 0.5;
                
                skierGroup.add(skierModel);
                state.modelLoaded = true;
            }, undefined, (err) => {
                console.warn("Failed to load model, using placeholder.", err);
            });

            buildTrack();

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            window.addEventListener('keyup', onKeyUp);
            
            ui.startButton.addEventListener('click', startGame);
            ui.restartButton.addEventListener('click', restartGame);
        }

        function buildTrack() {
            // Clear existing
            obstacles.forEach(o => worldGroup.remove(o));
            gates.forEach(g => { worldGroup.remove(g.meshL); worldGroup.remove(g.meshR); });
            boosts.forEach(b => worldGroup.remove(b));
            obstacles = []; gates = []; boosts = [];

            // Generate Obstacles
            const obsGeom = new THREE.BoxGeometry(1, 1, 1);
            const obsMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            for (let z = -20; z >= -MAX_DISTANCE - 50; z -= 20) {
                const obs = new THREE.Mesh(obsGeom, obsMat);
                obs.position.set((Math.random() - 0.5) * 20, 0.5, z + (Math.random() * 5 - 2.5));
                worldGroup.add(obs);
                obstacles.push(obs);
            }

            // Generate Gates
            const poleGeom = new THREE.CylinderGeometry(0.2, 0.2, 3);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            for (let z = -25; z >= -MAX_DISTANCE - 50; z -= 25) {
                const leftX = -3 + (Math.random() * 4 - 2);
                const rightX = 3 + (Math.random() * 4 - 2);

                const poleL = new THREE.Mesh(poleGeom, poleMat);
                poleL.position.set(leftX, 1.5, z);
                worldGroup.add(poleL);

                const poleR = new THREE.Mesh(poleGeom, poleMat);
                poleR.position.set(rightX, 1.5, z);
                worldGroup.add(poleR);

                gates.push({ z: z, leftX: leftX, rightX: rightX, passed: false, meshL: poleL, meshR: poleR });
            }

            // Generate Boosts
            const boostGeom = new THREE.BoxGeometry(2, 0.3, 2);
            const boostMat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
            for (let i = 0; i < 5; i++) {
                const b = new THREE.Mesh(boostGeom, boostMat);
                b.position.set((Math.random() - 0.5) * 20, 0.15, -50 - Math.random() * (MAX_DISTANCE - 50));
                worldGroup.add(b);
                boosts.push(b);
            }

            state.obstacleCount = obstacles.length;
            state.gateCount = gates.length;
        }

        function startGame() {
            ui.startOverlay.style.display = 'none';
            state.gameStarted = true;
            state.speed = BASE_SPEED;
            lastTime = performance.now();
        }

        function restartGame() {
            ui.gameOverOverlay.style.display = 'none';
            state.gameOver = false;
            state.score = 0;
            state.speed = BASE_SPEED;
            state.combo = 1;
            state.distance = 0;
            state.gatesPassed = 0;
            state.obstaclesHit = 0;
            state.boostsCollected = 0;
            state.boosted = false;
            
            skierGroup.position.set(0, 0.5, 0);
            lastDistanceScore = 0;
            invulnTime = 0;
            boostEndTime = 0;
            
            buildTrack();
            lastTime = performance.now();
        }

        function togglePause() {
            if (!state.gameStarted || state.gameOver) return;
            state.paused = !state.paused;
            ui.pauseText.style.display = state.paused ? 'block' : 'none';
            if (!state.paused) lastTime = performance.now();
        }

        function onKeyDown(e) {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'KeyP') togglePause();
        }

        function onKeyUp(e) {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function updateGame(dt) {
            const now = performance.now();

            // Speed & Boost Logic
            state.speed = Math.min(MAX_SPEED, state.speed + ACCELERATION);
            let currentSpeed = state.speed;
            
            if (state.boosted) {
                if (now > boostEndTime) {
                    state.boosted = false;
                } else {
                    currentSpeed *= 1.5;
                }
            }

            // Movement
            skierGroup.position.z -= currentSpeed;
            state.distance = -skierGroup.position.z;

            if (keys.ArrowLeft) skierGroup.position.x -= STEER_SPEED;
            if (keys.ArrowRight) skierGroup.position.x += STEER_SPEED;
            skierGroup.position.x = Math.max(-BOUND_X, Math.min(BOUND_X, skierGroup.position.x));

            // Distance Scoring
            if (state.distance - lastDistanceScore >= 50) {
                state.score += 10;
                lastDistanceScore += 50;
            }

            checkCollisions(now);

            // Game Over Check
            if (state.distance >= MAX_DISTANCE) {
                state.gameOver = true;
                ui.finalScoreText.innerText = `Final Score: ${state.score}`;
                ui.gameOverOverlay.style.display = 'flex';
            }
        }

        function checkCollisions(now) {
            const sx = skierGroup.position.x;
            const sz = skierGroup.position.z;
            const sMinX = sx - 0.5, sMaxX = sx + 0.5;
            const sMinZ = sz - 0.5, sMaxZ = sz + 0.5;

            // Obstacles
            if (now > invulnTime) {
                for (let obs of obstacles) {
                    const ox = obs.position.x;
                    const oz = obs.position.z;
                    if (sMinX <= ox + 0.5 && sMaxX >= ox - 0.5 && sMinZ <= oz + 0.5 && sMaxZ >= oz - 0.5) {
                        state.score -= 50;
                        state.speed = Math.max(BASE_SPEED, state.speed * 0.7);
                        state.combo = 1;
                        state.obstaclesHit++;
                        invulnTime = now + 1000;
                        
                        // Flash effect
                        if (skierModel.isMesh) skierModel.material.emissive.setHex(0xff0000);
                        else skierModel.traverse(c => { if(c.isMesh) c.material.emissive?.setHex(0xff0000); });
                        
                        setTimeout(() => {
                            if (skierModel.isMesh) skierModel.material.emissive.setHex(0x000000);
                            else skierModel.traverse(c => { if(c.isMesh) c.material.emissive?.setHex(0x000000); });
                        }, 300);
                        break;
                    }
                }
            }

            // Boosts
            for (let i = boosts.length - 1; i >= 0; i--) {
                const b = boosts[i];
                const bx = b.position.x;
                const bz = b.position.z;
                if (sMinX <= bx + 1 && sMaxX >= bx - 1 && sMinZ <= bz + 1 && sMaxZ >= bz - 1) {
                    state.score += 25;
                    state.boostsCollected++;
                    state.boosted = true;
                    boostEndTime = now + 3000;
                    worldGroup.remove(b);
                    boosts.splice(i, 1);
                }
            }

            // Gates
            for (let gate of gates) {
                if (!gate.passed && sz <= gate.z) {
                    gate.passed = true;
                    if (sx > gate.leftX && sx < gate.rightX) {
                        state.score += 100 * state.combo;
                        state.combo = Math.min(4, state.combo + 1);
                        state.gatesPassed++;
                    }
                }
            }
        }

        function updateUI() {
            ui.score.innerText = `Score: ${state.score}`;
            ui.combo.innerText = `Combo: ${state.combo}x`;
            ui.combo.style.color = state.combo > 1 ? '#ffeb3b' : '#d32f2f';
            
            const distRemain = Math.max(0, MAX_DISTANCE - Math.floor(state.distance));
            ui.distance.innerText = `Dist: ${distRemain}m`;
            
            const displaySpeed = state.boosted ? state.speed * 1.5 : state.speed;
            ui.speed.innerText = `Speed: ${(displaySpeed * 100).toFixed(0)}`;
        }

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = time - lastTime;
            
            if (state.gameStarted && !state.gameOver && !state.paused) {
                updateGame(dt);
                lastTime = time;
            }

            // Camera Follow
            const targetPos = new THREE.Vector3();
            cameraTarget.getWorldPosition(targetPos);
            camera.position.lerp(targetPos, 0.1);

            const lookAtPos = new THREE.Vector3();
            skierGroup.getWorldPosition(lookAtPos);
            camera.lookAt(lookAtPos);

            renderer.render(scene, camera);

            if (state.gameStarted) {
                updateUI();
                // Sync state
                state.skierX = skierGroup.position.x;
                state.skierZ = skierGroup.position.z;
            }
        }
    </script>
</body>
</html>
