<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Cell Division (Mitosis)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            position: absolute;
            font-size: 16px;
            text-shadow: 1px 1px 2px #000000;
            font-weight: bold;
        }
        #p1Phase {
            top: 20px;
            left: 20px;
            color: #44dd88;
        }
        #p2Phase {
            top: 60px;
            right: 20px;
            color: #dd4488;
        }
        #cellCount {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: 18px;
        }
        .interactive-ui {
            position: absolute;
            pointer-events: auto;
        }
        #resetBtn {
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background-color: #333366;
            color: white;
            border: 1px solid #555588;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        #resetBtn:hover {
            background-color: #444488;
        }
        #speedControl {
            bottom: 30px;
            right: 20px;
            color: #ffffff;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        #controls-info {
            position: absolute;
            bottom: 30px;
            left: 20px;
            color: #8888aa;
            font-size: 12px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div id="p1Phase" class="hud-text">Player 1 Phase: interphase</div>
    
    <button id="resetBtn" class="interactive-ui">Reset All</button>
    <div id="p2Phase" class="hud-text">Player 2 Phase: interphase</div>
    
    <div id="cellCount" class="hud-text">Total Cells: 2</div>
    
    <div id="speedControl" class="interactive-ui hud-text">
        <label for="speedSlider">Animation Speed</label>
        <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1">
    </div>

    <div id="controls-info" class="hud-text">
        P1: [A]/[D] Move | [Q] Advance Phase<br>
        P2: [←]/[→] Move | [P] Advance Phase
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
    // --- State Management ---
    window.__3D_STATE__ = {
        player1Phase: 'interphase',
        player2Phase: 'interphase',
        player1CellCount: 1,
        player2CellCount: 1,
        totalCellCount: 2,
        player1Position: { x: -6, y: 0, z: 0 },
        player2Position: { x: 6, y: 0, z: 0 },
        animationSpeed: 1,
        isAnimating: false,
        phaseHistory: []
    };

    const phaseNames = ['interphase', 'prophase', 'metaphase', 'anaphase', 'telophase', 'complete'];

    function updateGlobalState() {
        window.__3D_STATE__.player1Phase = phaseNames[p1.currentPhase];
        window.__3D_STATE__.player2Phase = phaseNames[p2.currentPhase];
        window.__3D_STATE__.player1CellCount = p1.currentPhase === 5 ? 2 : 1;
        window.__3D_STATE__.player2CellCount = p2.currentPhase === 5 ? 2 : 1;
        window.__3D_STATE__.totalCellCount = window.__3D_STATE__.player1CellCount + window.__3D_STATE__.player2CellCount;
        window.__3D_STATE__.player1Position = { x: p1.group.position.x, y: p1.group.position.y, z: p1.group.position.z };
        window.__3D_STATE__.player2Position = { x: p2.group.position.x, y: p2.group.position.y, z: p2.group.position.z };
        window.__3D_STATE__.isAnimating = p1.isTransitioning || p2.isTransitioning;

        // Update DOM
        document.getElementById('p1Phase').innerText = `Player 1 Phase: ${window.__3D_STATE__.player1Phase}`;
        document.getElementById('p2Phase').innerText = `Player 2 Phase: ${window.__3D_STATE__.player2Phase}`;
        document.getElementById('cellCount').innerText = `Total Cells: ${window.__3D_STATE__.totalCellCount}`;
    }

    function logPhaseChange(player, phaseName) {
        window.__3D_STATE__.phaseHistory.push(`${player}:${phaseName}`);
    }

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404080, 0.4);
    scene.add(ambientLight);

    const light1 = new THREE.PointLight(0x00ffaa, 1.0, 100);
    light1.position.set(-10, 10, 10);
    scene.add(light1);

    const light2 = new THREE.PointLight(0xff88cc, 1.0, 100);
    light2.position.set(10, -10, 10);
    scene.add(light2);

    // Boundary
    const boundaryGeo = new THREE.RingGeometry(19.9, 20, 64);
    const boundaryMat = new THREE.MeshBasicMaterial({ color: 0x444466, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
    const boundary = new THREE.Mesh(boundaryGeo, boundaryMat);
    scene.add(boundary);

    // Grid (Subtle)
    const gridHelper = new THREE.GridHelper(40, 40, 0x222244, 0x111122);
    gridHelper.rotation.x = Math.PI / 2;
    gridHelper.position.z = -0.1;
    scene.add(gridHelper);

    // --- Cell Class ---
    class CellController {
        constructor(playerId, startX, color, nucleusColor) {
            this.playerId = playerId;
            this.startX = startX;
            this.baseColor = new THREE.Color(color);
            this.baseNucColor = new THREE.Color(nucleusColor);
            this.brightNucColor = this.baseNucColor.clone().lerp(new THREE.Color(0xffffff), 0.5);

            this.group = new THREE.Group();
            this.group.position.set(startX, 0, 0);
            scene.add(this.group);

            this.currentPhase = 0; // 0: inter, 1: pro, 2: meta, 3: ana, 4: telo, 5: complete
            this.targetPhase = 0;
            this.isTransitioning = false;
            this.transitionProgress = 0;

            this.baseScale = new THREE.Vector3(1, 1, 1);
            this.daughterBaseScale = 0.1;

            this.buildMeshes();
            this.setupPositions();
        }

        buildMeshes() {
            // Main Cell
            const cellGeo = new THREE.SphereGeometry(2, 32, 32);
            this.cellMat = new THREE.MeshPhongMaterial({ color: this.baseColor, transparent: true, opacity: 0.7, shininess: 80 });
            this.cellMesh = new THREE.Mesh(cellGeo, this.cellMat);
            this.group.add(this.cellMesh);

            // Nucleus
            const nucGeo = new THREE.SphereGeometry(0.8, 16, 16);
            this.nucMat = new THREE.MeshPhongMaterial({ color: this.baseNucColor, transparent: true, opacity: 1.0 });
            this.nucleusMesh = new THREE.Mesh(nucGeo, this.nucMat);
            this.group.add(this.nucleusMesh);

            // Chromosomes
            this.chromosomes = [];
            const chromoGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
            for (let i = 0; i < 4; i++) {
                const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
                const mesh = new THREE.Mesh(chromoGeo, mat);
                this.chromosomes.push(mesh);
                this.group.add(mesh);
            }

            // Equator
            const eqGeo = new THREE.TorusGeometry(1.9, 0.03, 8, 32);
            this.eqMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
            this.equator = new THREE.Mesh(eqGeo, this.eqMat);
            this.equator.rotation.x = Math.PI / 2;
            this.equator.rotation.y = Math.PI / 2;
            this.group.add(this.equator);

            // Daughter Cells
            this.daughterGroup = new THREE.Group();
            this.daughterGroup.visible = false;
            this.group.add(this.daughterGroup);

            const dCellGeo = new THREE.SphereGeometry(1.4, 32, 32);
            const dNucGeo = new THREE.SphereGeometry(0.5, 16, 16);
            
            this.d1Mat = new THREE.MeshPhongMaterial({ color: this.baseColor, transparent: true, opacity: 0 });
            this.d1NucMat = new THREE.MeshPhongMaterial({ color: this.baseNucColor, transparent: true, opacity: 0 });
            this.d1 = new THREE.Group();
            this.d1.add(new THREE.Mesh(dCellGeo, this.d1Mat));
            this.d1.add(new THREE.Mesh(dNucGeo, this.d1NucMat));
            
            this.d2Mat = new THREE.MeshPhongMaterial({ color: this.baseColor, transparent: true, opacity: 0 });
            this.d2NucMat = new THREE.MeshPhongMaterial({ color: this.baseNucColor, transparent: true, opacity: 0 });
            this.d2 = new THREE.Group();
            this.d2.add(new THREE.Mesh(dCellGeo, this.d2Mat));
            this.d2.add(new THREE.Mesh(dNucGeo, this.d2NucMat));

            this.daughterGroup.add(this.d1);
            this.daughterGroup.add(this.d2);
        }

        setupPositions() {
            this.prophasePos = [];
            this.prophaseRot = [];
            for (let i = 0; i < 4; i++) {
                this.prophasePos.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 0.8,
                    (Math.random() - 0.5) * 0.8,
                    (Math.random() - 0.5) * 0.8
                ));
                this.prophaseRot.push((Math.random() - 0.5) * Math.PI);
            }

            this.metaphasePos = [
                new THREE.Vector3(0, -0.6, 0),
                new THREE.Vector3(0, -0.2, 0),
                new THREE.Vector3(0, 0.2, 0),
                new THREE.Vector3(0, 0.6, 0)
            ];

            this.anaphasePos = [
                new THREE.Vector3(-0.8, -0.4, 0),
                new THREE.Vector3(-0.8, 0.4, 0),
                new THREE.Vector3(0.8, -0.4, 0),
                new THREE.Vector3(0.8, 0.4, 0)
            ];
        }

        advance() {
            if (this.isTransitioning || this.currentPhase >= 5) return;
            
            this.targetPhase = this.currentPhase + 1;
            this.isTransitioning = true;
            this.transitionProgress = 0;
            
            logPhaseChange(`P${this.playerId}`, phaseNames[this.targetPhase]);
            updateGlobalState();
        }

        move(dx) {
            this.group.position.x += dx;
            this.group.position.x = Math.max(-15, Math.min(15, this.group.position.x));
        }

        reset() {
            this.currentPhase = 0;
            this.targetPhase = 0;
            this.isTransitioning = false;
            this.transitionProgress = 0;
            this.group.position.set(this.startX, 0, 0);

            this.baseScale.set(1, 1, 1);
            this.daughterBaseScale = 0.1;

            this.cellMat.opacity = 0.7;
            this.nucMat.opacity = 1.0;
            this.nucMat.color.copy(this.baseNucColor);
            this.nucleusMesh.scale.setScalar(1);

            this.chromosomes.forEach(c => {
                c.material.opacity = 0;
                c.position.set(0,0,0);
                c.rotation.z = 0;
            });

            this.eqMat.opacity = 0;
            this.daughterGroup.visible = false;
            
            this.d1.position.set(0,0,0);
            this.d2.position.set(0,0,0);
            this.d1Mat.opacity = 0;
            this.d2Mat.opacity = 0;
            this.d1NucMat.opacity = 0;
            this.d2NucMat.opacity = 0;

            this.setupPositions();
            updateGlobalState();
        }

        update(delta, time) {
            // Pulsing
            const pulse = 1.0 + Math.sin(time * Math.PI) * 0.05;
            this.cellMesh.scale.set(this.baseScale.x * pulse, this.baseScale.y * pulse, this.baseScale.z * pulse);
            
            if (this.daughterGroup.visible) {
                this.d1.scale.setScalar(this.daughterBaseScale * pulse);
                this.d2.scale.setScalar(this.daughterBaseScale * pulse);
            }

            // Transitions
            if (this.isTransitioning) {
                const speed = window.__3D_STATE__.animationSpeed;
                const duration = this.targetPhase === 4 ? 3.0 : 2.0; // Telophase is 3s, others 2s
                
                this.transitionProgress += (delta * speed) / duration;
                let t = Math.min(this.transitionProgress, 1.0);
                const easeT = t * t * (3 - 2 * t); // Smoothstep

                if (this.targetPhase === 1) { // Prophase
                    this.nucleusMesh.scale.setScalar(THREE.MathUtils.lerp(1, 1.3, easeT));
                    this.nucMat.color.copy(this.baseNucColor).lerp(this.brightNucColor, easeT);
                    this.chromosomes.forEach((c, i) => {
                        c.material.opacity = easeT;
                        c.position.copy(this.prophasePos[i]);
                        c.rotation.z = this.prophaseRot[i];
                    });
                } 
                else if (this.targetPhase === 2) { // Metaphase
                    this.chromosomes.forEach((c, i) => {
                        c.position.lerpVectors(this.prophasePos[i], this.metaphasePos[i], easeT);
                        c.rotation.z = THREE.MathUtils.lerp(this.prophaseRot[i], 0, easeT);
                    });
                    this.eqMat.opacity = easeT;
                } 
                else if (this.targetPhase === 3) { // Anaphase
                    this.baseScale.set(
                        THREE.MathUtils.lerp(1, 1.5, easeT),
                        THREE.MathUtils.lerp(1, 0.8, easeT),
                        THREE.MathUtils.lerp(1, 0.8, easeT)
                    );
                    this.eqMat.opacity = 1 - easeT;
                    this.chromosomes.forEach((c, i) => {
                        c.position.lerpVectors(this.metaphasePos[i], this.anaphasePos[i], easeT);
                    });
                } 
                else if (this.targetPhase === 4) { // Telophase -> Complete
                    this.cellMat.opacity = THREE.MathUtils.lerp(0.7, 0, easeT);
                    this.nucMat.opacity = THREE.MathUtils.lerp(1, 0, easeT);
                    this.chromosomes.forEach(c => c.material.opacity = 1 - easeT);

                    this.daughterGroup.visible = true;
                    this.d1.position.x = THREE.MathUtils.lerp(0, -1.5, easeT);
                    this.d2.position.x = THREE.MathUtils.lerp(0, 1.5, easeT);

                    this.daughterBaseScale = THREE.MathUtils.lerp(0.1, 1.0, easeT);

                    this.d1Mat.opacity = THREE.MathUtils.lerp(0, 0.7, easeT);
                    this.d2Mat.opacity = THREE.MathUtils.lerp(0, 0.7, easeT);
                    this.d1NucMat.opacity = THREE.MathUtils.lerp(0, 1.0, easeT);
                    this.d2NucMat.opacity = THREE.MathUtils.lerp(0, 1.0, easeT);
                }

                if (t >= 1.0) {
                    this.isTransitioning = false;
                    this.currentPhase = this.targetPhase;
                    if (this.currentPhase === 4) {
                        this.currentPhase = 5; // Auto complete after telophase
                    }
                    updateGlobalState();
                }
            }
        }
    }

    const p1 = new CellController(1, -6, 0x44dd88, 0x226644);
    const p2 = new CellController(2, 6, 0xdd4488, 0x662244);

    // --- Input Handling ---
    const keys = {};
    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'KeyQ') p1.advance();
        if (e.code === 'KeyP') p2.advance();
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
    });
    window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    // --- UI Events ---
    document.getElementById('resetBtn').addEventListener('click', () => {
        p1.reset();
        p2.reset();
        window.__3D_STATE__.phaseHistory = [];
    });

    document.getElementById('speedSlider').addEventListener('input', (e) => {
        window.__3D_STATE__.animationSpeed = parseFloat(e.target.value);
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // --- Animation Loop ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();
        const time = clock.getElapsedTime();

        // Movement
        const moveSpeed = 0.1; // per frame as requested, though delta-based is better. Using fixed approx for simplicity
        if (keys['KeyA']) p1.move(-moveSpeed);
        if (keys['KeyD']) p1.move(moveSpeed);
        if (keys['ArrowLeft']) p2.move(-moveSpeed);
        if (keys['ArrowRight']) p2.move(moveSpeed);

        p1.update(delta, time);
        p2.update(delta, time);

        // Continuous state update for positions
        window.__3D_STATE__.player1Position.x = p1.group.position.x;
        window.__3D_STATE__.player2Position.x = p2.group.position.x;

        renderer.render(scene, camera);
    }

    // Init
    updateGlobalState();
    animate();

</script>
</body>
</html>
