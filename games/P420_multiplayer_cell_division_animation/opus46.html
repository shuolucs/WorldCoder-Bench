<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Division (Mitosis) - Two Player</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0a0a2e;
    font-family: monospace;
}
canvas { display: block; }
#p1Phase {
    position: absolute;
    top: 15px;
    left: 15px;
    font-family: monospace;
    font-size: 16px;
    color: #44dd88;
    text-shadow: 0 0 8px rgba(68,221,136,0.6);
    user-select: none;
}
#p2Phase {
    position: absolute;
    top: 55px;
    right: 15px;
    font-family: monospace;
    font-size: 16px;
    color: #dd4488;
    text-shadow: 0 0 8px rgba(221,68,136,0.6);
    user-select: none;
}
#cellCount {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 16px;
    color: #ffffff;
    text-shadow: 0 0 8px rgba(255,255,255,0.5);
    user-select: none;
}
#resetBtn {
    position: absolute;
    top: 15px;
    right: 15px;
    font-family: monospace;
    font-size: 14px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    cursor: pointer;
    user-select: none;
}
#resetBtn:hover {
    background: rgba(255,255,255,0.2);
}
#speedControl {
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 14px;
    color: #aaa;
    text-shadow: 0 0 4px rgba(170,170,170,0.4);
    user-select: none;
    display: flex;
    align-items: center;
    gap: 10px;
}
#speedSlider {
    width: 120px;
    cursor: pointer;
}
#p1Controls {
    position: absolute;
    top: 40px;
    left: 15px;
    font-family: monospace;
    font-size: 12px;
    color: rgba(68,221,136,0.5);
    user-select: none;
}
#p2Controls {
    position: absolute;
    top: 80px;
    right: 15px;
    font-family: monospace;
    font-size: 12px;
    color: rgba(221,68,136,0.5);
    text-align: right;
    user-select: none;
}
</style>
</head>
<body>
<div id="p1Phase">Player 1 Phase: Interphase</div>
<div id="p1Controls">[Q] Next Phase | [A/D] Move</div>
<button id="resetBtn">Reset All</button>
<div id="p2Phase">Player 2 Phase: Interphase</div>
<div id="p2Controls">[P] Next Phase | [←/→] Move</div>
<div id="cellCount">Total Cells: 2</div>
<div id="speedControl">
    <span>Animation Speed:</span>
    <input type="range" id="speedSlider" min="0.5" max="3" step="0.5" value="1">
    <span id="speedVal">1x</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404080, 0.4);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0x00ffaa, 1.0, 50);
    pointLight1.position.set(-10, 10, 10);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xff88cc, 1.0, 50);
    pointLight2.position.set(10, -10, 10);
    scene.add(pointLight2);

    // Circular boundary
    const boundaryGeom = new THREE.RingGeometry(19.5, 20, 128);
    const boundaryMat = new THREE.MeshBasicMaterial({ color: 0x223355, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
    const boundary = new THREE.Mesh(boundaryGeom, boundaryMat);
    boundary.position.z = -1;
    scene.add(boundary);

    // Grid dots
    for (let x = -18; x <= 18; x += 3) {
        for (let y = -18; y <= 18; y += 3) {
            if (Math.sqrt(x*x + y*y) < 19) {
                const dotGeom = new THREE.CircleGeometry(0.05, 8);
                const dotMat = new THREE.MeshBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.3 });
                const dot = new THREE.Mesh(dotGeom, dotMat);
                dot.position.set(x, y, -0.5);
                scene.add(dot);
            }
        }
    }

    // ==================== STATE ====================
    const PHASES = ['interphase', 'prophase', 'metaphase', 'anaphase', 'telophase', 'complete'];

    window.__3D_STATE__ = {
        player1Phase: 'interphase',
        player2Phase: 'interphase',
        player1CellCount: 1,
        player2CellCount: 1,
        totalCellCount: 2,
        player1Position: { x: -6, y: 0, z: 0 },
        player2Position: { x: 6, y: 0, z: 0 },
        animationSpeed: 1,
        isAnimating: false,
        phaseHistory: []
    };

    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; keys[e.key] = false; });

    // ==================== CELL CLASS ====================
    class Cell {
        constructor(color, nucleusColor, startX, playerName) {
            this.playerName = playerName;
            this.color = color;
            this.nucleusColor = nucleusColor;
            this.startX = startX;
            this.phaseIndex = 0;
            this.isTransitioning = false;
            this.transitionTime = 0;
            this.transitionDuration = 0;
            this.cellCount = 1;
            this.group = new THREE.Group();
            this.group.position.set(startX, 0, 0);
            this.daughterCells = [];

            // Main cell membrane
            const cellGeom = new THREE.SphereGeometry(2, 32, 32);
            this.cellMat = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0.7,
                shininess: 80,
                side: THREE.DoubleSide
            });
            this.cellMesh = new THREE.Mesh(cellGeom, this.cellMat);
            this.group.add(this.cellMesh);

            // Nucleus
            const nucGeom = new THREE.SphereGeometry(0.8, 24, 24);
            this.nucMat = new THREE.MeshPhongMaterial({ color: nucleusColor, shininess: 60 });
            this.nucleusMesh = new THREE.Mesh(nucGeom, this.nucMat);
            this.group.add(this.nucleusMesh);

            // Chromosomes (hidden initially)
            this.chromosomes = [];
            for (let i = 0; i < 4; i++) {
                const chromGeom = new THREE.BoxGeometry(0.1, 0.5, 0.1);
                const chromMat = new THREE.MeshPhongMaterial({
                    color: playerName === 'P1' ? 0xaaffcc : 0xffaacc,
                    emissive: playerName === 'P1' ? 0x225533 : 0x552233
                });
                const chrom = new THREE.Mesh(chromGeom, chromMat);
                chrom.visible = false;
                this.group.add(chrom);
                this.chromosomes.push(chrom);
            }

            // Chromosome copies for anaphase split
            this.chromosomeCopies = [];
            for (let i = 0; i < 4; i++) {
                const chromGeom = new THREE.BoxGeometry(0.1, 0.4, 0.1);
                const chromMat = new THREE.MeshPhongMaterial({
                    color: playerName === 'P1' ? 0xaaffcc : 0xffaacc,
                    emissive: playerName === 'P1' ? 0x225533 : 0x552233
                });
                const chrom = new THREE.Mesh(chromGeom, chromMat);
                chrom.visible = false;
                this.group.add(chrom);
                this.chromosomeCopies.push(chrom);
            }

            // Equator ring (metaphase)
            const torusGeom = new THREE.TorusGeometry(1.5, 0.03, 8, 32);
            this.equatorMat = new THREE.MeshBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0
            });
            this.equatorRing = new THREE.Mesh(torusGeom, this.equatorMat);
            this.equatorRing.rotation.y = Math.PI / 2;
            this.group.add(this.equatorRing);

            // Pinch connector for telophase
            const connGeom = new THREE.CylinderGeometry(0.3, 0.3, 2, 16);
            this.connMat = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0
            });
            this.connector = new THREE.Mesh(connGeom, this.connMat);
            this.connector.rotation.z = Math.PI / 2;
            this.group.add(this.connector);

            // Second cell half for telophase
            const cell2Geom = new THREE.SphereGeometry(2, 32, 32);
            this.cell2Mat = new THREE.MeshPhongMaterial({
                color: color,
                transparent: true,
                opacity: 0
            });
            this.cell2Mesh = new THREE.Mesh(cell2Geom, this.cell2Mat);
            this.cell2Mesh.visible = false;
            this.group.add(this.cell2Mesh);

            // Second nucleus
            const nuc2Geom = new THREE.SphereGeometry(0.6, 24, 24);
            this.nuc2Mat = new THREE.MeshPhongMaterial({ color: nucleusColor });
            this.nucleus2Mesh = new THREE.Mesh(nuc2Geom, this.nuc2Mat);
            this.nucleus2Mesh.visible = false;
            this.group.add(this.nucleus2Mesh);

            scene.add(this.group);
        }

        getCurrentPhase() {
            return PHASES[this.phaseIndex];
        }

        advancePhase() {
            if (this.isTransitioning) return;
            if (this.phaseIndex >= PHASES.length - 1) return;

            this.phaseIndex++;
            this.isTransitioning = true;
            this.transitionTime = 0;

            const phase = this.getCurrentPhase();
            if (phase === 'prophase') this.transitionDuration = 2;
            else if (phase === 'metaphase') this.transitionDuration = 2;
            else if (phase === 'anaphase') this.transitionDuration = 2;
            else if (phase === 'telophase') this.transitionDuration = 3;
            else if (phase === 'complete') {
                this.transitionDuration = 0.01;
            }

            window.__3D_STATE__.phaseHistory.push(this.playerName + ':' + phase);
        }

        move(dx) {
            const newX = this.group.position.x + dx;
            if (newX >= -15 && newX <= 15) {
                this.group.position.x = newX;
            }
            this.updateStatePosition();
        }

        updateStatePosition() {
            const pos = this.group.position;
            if (this.playerName === 'P1') {
                window.__3D_STATE__.player1Position = { x: pos.x, y: pos.y, z: pos.z };
            } else {
                window.__3D_STATE__.player2Position = { x: pos.x, y: pos.y, z: pos.z };
            }
        }

        update(dt, time, speed) {
            const effectiveDt = dt * speed;
            const phase = this.getCurrentPhase();

            // Pulsing animation
            const pulse = 1.0 + 0.05 * Math.sin(time * Math.PI);

            if (this.isTransitioning) {
                this.transitionTime += effectiveDt;
                const t = Math.min(this.transitionTime / this.transitionDuration, 1);

                if (phase === 'prophase') {
                    this.updateProphase(t, pulse);
                } else if (phase === 'metaphase') {
                    this.updateMetaphase(t, pulse);
                } else if (phase === 'anaphase') {
                    this.updateAnaphase(t, pulse);
                } else if (phase === 'telophase') {
                    this.updateTelophase(t, pulse);
                } else if (phase === 'complete') {
                    this.finalizeComplete();
                }

                if (t >= 1) {
                    this.isTransitioning = false;
                    if (phase === 'complete') {
                        this.cellCount = 2;
                        if (this.playerName === 'P1') window.__3D_STATE__.player1CellCount = 2;
                        else window.__3D_STATE__.player2CellCount = 2;
                        window.__3D_STATE__.totalCellCount = window.__3D_STATE__.player1CellCount + window.__3D_STATE__.player2CellCount;
                    }
                }
            } else {
                // Idle animations per phase
                if (phase === 'interphase') {
                    this.cellMesh.scale.setScalar(pulse);
                    this.nucleusMesh.scale.setScalar(pulse);
                } else if (phase === 'prophase') {
                    this.cellMesh.scale.setScalar(pulse);
                    this.nucleusMesh.scale.setScalar(1.3 * pulse);
                    this.updateChromosomeIdle(time);
                } else if (phase === 'metaphase') {
                    this.cellMesh.scale.setScalar(pulse);
                    this.updateChromosomeIdle(time);
                } else if (phase === 'anaphase') {
                    const sp = pulse;
                    this.cellMesh.scale.set(1.5 * sp, 0.8 * sp, 0.8 * sp);
                } else if (phase === 'telophase') {
                    // Idle at end of telophase
                    this.updateTelophaseIdle(pulse);
                } else if (phase === 'complete') {
                    this.updateCompleteIdle(pulse);
                }
            }

            // Clamp position
            this.group.position.x = Math.max(-15, Math.min(15, this.group.position.x));
            this.group.position.y = Math.max(-10, Math.min(10, this.group.position.y));
            this.updateStatePosition();
        }

        updateProphase(t, pulse) {
            // Nucleus grows
            const nucScale = 1 + 0.3 * t;
            this.nucleusMesh.scale.setScalar(nucScale * pulse);

            // Brighten nucleus
            const brightFactor = t;
            if (this.playerName === 'P1') {
                this.nucMat.color.setHex(lerpColor(0x226644, 0x44ff88, brightFactor));
                this.nucMat.emissive = new THREE.Color(lerpColor(0x000000, 0x114422, brightFactor));
            } else {
                this.nucMat.color.setHex(lerpColor(0x662244, 0xff44aa, brightFactor));
                this.nucMat.emissive = new THREE.Color(lerpColor(0x000000, 0x441122, brightFactor));
            }

            // Show chromosomes gradually
            for (let i = 0; i < 4; i++) {
                const showT = i / 4;
                if (t > showT) {
                    this.chromosomes[i].visible = true;
                    const angle = (i / 4) * Math.PI * 2;
                    const r = 0.4;
                    this.chromosomes[i].position.set(
                        Math.cos(angle) * r * 0.3,
                        Math.sin(angle) * r,
                        0
                    );
                    this.chromosomes[i].rotation.z = angle + Math.sin(t * 3) * 0.2;
                }
            }

            this.cellMesh.scale.setScalar(pulse);
        }

        updateMetaphase(t, pulse) {
            // Equator ring appears
            this.equatorMat.opacity = t * 0.6;

            // Chromosomes align to center
            for (let i = 0; i < 4; i++) {
                const targetY = ((i - 1.5) / 3) * 1.2;
                const currentPos = this.chromosomes[i].position;
                this.chromosomes[i].position.set(
                    THREE.MathUtils.lerp(currentPos.x, 0, t),
                    THREE.MathUtils.lerp(currentPos.y, targetY, t),
                    0
                );
                this.chromosomes[i].rotation.z = THREE.MathUtils.lerp(this.chromosomes[i].rotation.z, 0, t);
            }

            this.cellMesh.scale.setScalar(pulse);
            this.nucleusMesh.scale.setScalar(THREE.MathUtils.lerp(1.3, 0.5, t) * pulse);
            this.nucMat.opacity = THREE.MathUtils.lerp(1, 0.3, t);
        }

        updateAnaphase(t, pulse) {
            // Cell elongates
            const scX = THREE.MathUtils.lerp(1, 1.5, t);
            const scY = THREE.MathUtils.lerp(1, 0.8, t);
            this.cellMesh.scale.set(scX * pulse, scY * pulse, scY * pulse);

            // Hide nucleus
            this.nucleusMesh.visible = t < 0.5;

            // Equator fades
            this.equatorMat.opacity = 0.6 * (1 - t);

            // Chromosomes split
            for (let i = 0; i < 4; i++) {
                const targetY = ((i - 1.5) / 3) * 0.8;
                // Original set moves left
                this.chromosomes[i].position.set(
                    THREE.MathUtils.lerp(0, -1.2, t),
                    targetY,
                    0
                );
                this.chromosomes[i].visible = true;

                // Copy set moves right
                this.chromosomeCopies[i].visible = true;
                this.chromosomeCopies[i].position.set(
                    THREE.MathUtils.lerp(0, 1.2, t),
                    targetY,
                    0
                );
            }
        }

        updateTelophase(t, pulse) {
            // Phase 1 (0-0.5): pinch in middle
            // Phase 2 (0.5-1): split apart
            if (t < 0.5) {
                const pt = t * 2; // 0 to 1
                // Cell pinches
                const scX = THREE.MathUtils.lerp(1.5, 1.8, pt);
                const scY = THREE.MathUtils.lerp(0.8, 0.6, pt);
                this.cellMesh.scale.set(scX * pulse, scY * pulse, scY * pulse);

                // Show connector
                this.connector.visible = true;
                this.connMat.opacity = 0.7 * pt;
                const connScale = THREE.MathUtils.lerp(1, 0.3, pt);
                this.connector.scale.set(connScale, 1, connScale);

                // Move chromosomes further
                for (let i = 0; i < 4; i++) {
                    const targetY = ((i - 1.5) / 3) * 0.6;
                    this.chromosomes[i].position.x = THREE.MathUtils.lerp(-1.2, -1.5, pt);
                    this.chromosomes[i].position.y = targetY;
                    this.chromosomeCopies[i].position.x = THREE.MathUtils.lerp(1.2, 1.5, pt);
                    this.chromosomeCopies[i].position.y = targetY;
                }
            } else {
                const pt = (t - 0.5) * 2; // 0 to 1

                // Original cell shrinks and moves left
                const radius1 = THREE.MathUtils.lerp(2, 1.4, pt);
                const s1 = (radius1 / 2);
                this.cellMesh.scale.set(s1 * pulse, s1 * pulse, s1 * pulse);
                this.cellMesh.position.x = THREE.MathUtils.lerp(0, -1.5, pt);

                // Show second cell
                this.cell2Mesh.visible = true;
                this.cell2Mat.opacity = THREE.MathUtils.lerp(0, 0.7, pt);
                const s2 = (radius1 / 2);
                this.cell2Mesh.scale.set(s2 * pulse, s2 * pulse, s2 * pulse);
                this.cell2Mesh.position.x = THREE.MathUtils.lerp(0, 1.5, pt);

                // Connector shrinks and fades
                this.connMat.opacity = 0.7 * (1 - pt);
                this.connector.scale.set(0.3 * (1 - pt), 1 - pt * 0.5, 0.3 * (1 - pt));

                // New nuclei appear
                this.nucleusMesh.visible = true;
                this.nucleusMesh.scale.setScalar(0.5 * pt * pulse);
                this.nucleusMesh.position.x = THREE.MathUtils.lerp(0, -1.5, pt);

                this.nucleus2Mesh.visible = true;
                this.nuc2Mat.opacity = pt;
                this.nucleus2Mesh.scale.setScalar(0.5 * pt * pulse);
                this.nucleus2Mesh.position.x = THREE.MathUtils.lerp(0, 1.5, pt);

                // Reset nucleus color
                if (this.playerName === 'P1') {
                    this.nucMat.color.setHex(0x226644);
                    this.nucMat.emissive = new THREE.Color(0x000000);
                } else {
                    this.nucMat.color.setHex(0x662244);
                    this.nucMat.emissive = new THREE.Color(0x000000);
                }
                this.nucMat.opacity = pt;

                // Hide chromosomes gradually
                for (let i = 0; i < 4; i++) {
                    this.chromosomes[i].visible = pt < 0.7;
                    this.chromosomeCopies[i].visible = pt < 0.7;
                    this.chromosomes[i].position.x = THREE.MathUtils.lerp(-1.5, -1.5, pt);
                    this.chromosomeCopies[i].position.x = THREE.MathUtils.lerp(1.5, 1.5, pt);
                }
            }
        }

        finalizeComplete() {
            // Clean up - ensure final state
            this.connector.visible = false;
            this.equatorMat.opacity = 0;
            for (let i = 0; i < 4; i++) {
                this.chromosomes[i].visible = false;
                this.chromosomeCopies[i].visible = false;
            }

            // Two daughter cells
            this.cellMesh.scale.set(0.7, 0.7, 0.7);
            this.cellMesh.position.x = -1.5;
            this.cellMat.opacity = 0.7;

            this.cell2Mesh.visible = true;
            this.cell2Mat.opacity = 0.7;
            this.cell2Mesh.scale.set(0.7, 0.7, 0.7);
            this.cell2Mesh.position.x = 1.5;

            this.nucleusMesh.visible = true;
            this.nucleusMesh.scale.setScalar(0.5);
            this.nucleusMesh.position.x = -1.5;
            this.nucMat.opacity = 1;

            this.nucleus2Mesh.visible = true;
            this.nucleus2Mesh.scale.setScalar(0.5);
            this.nucleus2Mesh.position.x = 1.5;
            this.nuc2Mat.opacity = 1;
        }

        updateChromosomeIdle(time) {
            for (let i = 0; i < 4; i++) {
                if (this.chromosomes[i].visible) {
                    this.chromosomes[i].rotation.z += Math.sin(time * 2 + i) * 0.002;
                }
            }
        }

        updateTelophaseIdle(pulse) {
            this.cellMesh.scale.set(0.7 * pulse, 0.7 * pulse, 0.7 * pulse);
            this.cell2Mesh.scale.set(0.7 * pulse, 0.7 * pulse, 0.7 * pulse);
            this.nucleusMesh.scale.setScalar(0.5 * pulse);
            this.nucleus2Mesh.scale.setScalar(0.5 * pulse);
        }

        updateCompleteIdle(pulse) {
            this.cellMesh.scale.set(0.7 * pulse, 0.7 * pulse, 0.7 * pulse);
            this.cell2Mesh.scale.set(0.7 * pulse, 0.7 * pulse, 0.7 * pulse);
            this.nucleusMesh.scale.setScalar(0.5 * pulse);
            this.nucleus2Mesh.scale.setScalar(0.5 * pulse);
        }

        reset() {
            this.phaseIndex = 0;
            this.isTransitioning = false;
            this.transitionTime = 0;
            this.cellCount = 1;

            this.group.position.set(this.startX, 0, 0);

            // Reset cell mesh
            this.cellMesh.scale.set(1, 1, 1);
            this.cellMesh.position.set(0, 0, 0);
            this.cellMat.opacity = 0.7;

            // Reset nucleus
            this.nucleusMesh.visible = true;
            this.nucleusMesh.scale.setScalar(1);
            this.nucleusMesh.position.set(0, 0, 0);
            this.nucMat.opacity = 1;
            if (this.playerName === 'P1') {
                this.nucMat.color.setHex(0x226644);
            } else {
                this.nucMat.color.setHex(0x662244);
            }
            this.nucMat.emissive = new THREE.Color(0x000000);

            // Hide chromosomes
            for (let i = 0; i < 4; i++) {
                this.chromosomes[i].visible = false;
                this.chromosomes[i].position.set(0, 0, 0);
                this.chromosomeCopies[i].visible = false;
                this.chromosomeCopies[i].position.set(0, 0, 0);
            }

            // Hide equator
            this.equatorMat.opacity = 0;

            // Hide connector
            this.connector.visible = false;
            this.connMat.opacity = 0;
            this.connector.scale.set(1, 1, 1);

            // Hide second cell
            this.cell2Mesh.visible = false;
            this.cell2Mat.opacity = 0;
            this.cell2Mesh.scale.set(1, 1, 1);
            this.cell2Mesh.position.set(0, 0, 0);

            // Hide second nucleus
            this.nucleus2Mesh.visible = false;
            this.nucleus2Mesh.scale.setScalar(1);
            this.nucleus2Mesh.position.set(0, 0, 0);

            this.updateStatePosition();
        }
    }

    function lerpColor(c1, c2, t) {
        const r1 = (c1 >> 16) & 0xff, g1 = (c1 >> 8) & 0xff, b1 = c1 & 0xff;
        const r2 = (c2 >> 16) & 0xff, g2 = (c2 >> 8) & 0xff, b2 = c2 & 0xff;
        const r = Math.round(r1 + (r2 - r1) * t);
        const g = Math.round(g1 + (g2 - g1) * t);
        const b = Math.round(b1 + (b2 - b1) * t);
        return (r << 16) | (g << 8) | b;
    }

    // ==================== CREATE CELLS ====================
    const player1Cell = new Cell(0x44dd88, 0x226644, -6, 'P1');
    const player2Cell = new Cell(0xdd4488, 0x662244, 6, 'P2');

    // ==================== UI ====================
    const p1PhaseEl = document.getElementById('p1Phase');
    const p2PhaseEl = document.getElementById('p2Phase');
    const cellCountEl = document.getElementById('cellCount');
    const speedSlider = document.getElementById('speedSlider');
    const speedVal = document.getElementById('speedVal');
    const resetBtn = document.getElementById('resetBtn');

    speedSlider.addEventListener('input', () => {
        window.__3D_STATE__.animationSpeed = parseFloat(speedSlider.value);
        speedVal.textContent = speedSlider.value + 'x';
    });

    resetBtn.addEventListener('click', () => {
        player1Cell.reset();
        player2Cell.reset();
        window.__3D_STATE__.player1Phase = 'interphase';
        window.__3D_STATE__.player2Phase = 'interphase';
        window.__3D_STATE__.player1CellCount = 1;
        window.__3D_STATE__.player2CellCount = 1;
        window.__3D_STATE__.totalCellCount = 2;
        window.__3D_STATE__.phaseHistory = [];
        updateUI();
    });

    function updateUI() {
        const p1Phase = player1Cell.getCurrentPhase();
        const p2Phase = player2Cell.getCurrentPhase();
        p1PhaseEl.textContent = 'Player 1 Phase: ' + capitalize(p1Phase);
        p2PhaseEl.textContent = 'Player 2 Phase: ' + capitalize(p2Phase);
        window.__3D_STATE__.player1Phase = p1Phase;
        window.__3D_STATE__.player2Phase = p2Phase;
        window.__3D_STATE__.totalCellCount = window.__3D_STATE__.player1CellCount + window.__3D_STATE__.player2CellCount;
        cellCountEl.textContent = 'Total Cells: ' + window.__3D_STATE__.totalCellCount;
        window.__3D_STATE__.isAnimating = player1Cell.isTransitioning || player2Cell.isTransitioning;
    }

    function capitalize(s) {
        return s.charAt(0).toUpperCase() + s.slice(1);
    }

    // ==================== INPUT HANDLING ====================
    const keyPressed = {};
    window.addEventListener('keydown', (e) => {
        const k = e.key;
        if (!keyPressed[k]) {
            keyPressed[k] = true;
            if (k === 'q' || k === 'Q') {
                player1Cell.advancePhase();
            }
            if (k === 'p' || k === 'P') {
                player2Cell.advancePhase();
            }
        }
    });
    window.addEventListener('keyup', (e) => {
        keyPressed[e.key] = false;
    });

    // ==================== ANIMATION LOOP ====================
    let lastTime = 0;
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const dt = clock.getDelta();
        const time = clock.getElapsedTime();
        const speed = window.__3D_STATE__.animationSpeed;

        // Movement
        if (keys['a'] || keys['A']) player1Cell.move(-0.1);
        if (keys['d'] || keys['D']) player1Cell.move(0.1);
        if (keys['ArrowLeft']) player2Cell.move(-0.1);
        if (keys['ArrowRight']) player2Cell.move(0.1);

        // Update cells
        player1Cell.update(dt, time, speed);
        player2Cell.update(dt, time, speed);

        updateUI();

        renderer.render(scene, camera);
    }

    // ==================== RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
})();
</script>
</body>
</html>
