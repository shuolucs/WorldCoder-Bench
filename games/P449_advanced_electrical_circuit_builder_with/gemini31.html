<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Circuit Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(30, 30, 30, 0.85);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(5px);
            pointer-events: auto;
        }
        #scoreDisplay {
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
        }
        #infoPanel {
            top: 20px;
            right: 20px;
            width: 250px;
            min-height: 100px;
        }
        #infoPanel h3 {
            margin: 0 0 10px 0;
            color: #ffcc00;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        #infoPanel p {
            margin: 5px 0;
            font-size: 14px;
            color: #ccc;
        }
        #bottomBar {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: transparent;
            border: none;
            padding: 0;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            font-weight: bold;
        }
        button:hover {
            background: #444;
            border-color: #777;
        }
        #simulateBtn {
            background: #0066cc;
            border-color: #0088ff;
        }
        #simulateBtn:hover {
            background: #0088ff;
        }
        #resetBtn {
            background: #cc0000;
            border-color: #ff0000;
        }
        #resetBtn:hover {
            background: #ff3333;
        }
        #notification {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            font-weight: bold;
            padding: 15px 30px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .notify-success { background: rgba(0, 150, 0, 0.8); color: white; }
        .notify-error { background: rgba(200, 0, 0, 0.8); color: white; }
        .notify-info { background: rgba(0, 100, 200, 0.8); color: white; }
        
        #controlsHelp {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="scoreDisplay" class="ui-panel">Score: 0</div>
    
    <div id="infoPanel" class="ui-panel">
        <h3>Component Info</h3>
        <div id="infoContent">
            <p>Select a component to view details.</p>
        </div>
    </div>
    
    <div id="bottomBar" class="ui-panel">
        <button id="simulateBtn">Simulate</button>
        <button id="resetBtn">Reset</button>
    </div>
    
    <div id="notification"></div>
    
    <div id="controlsHelp">
        Click & Drag: Move | R: Rotate | Del: Return to start | C: Clear all
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 0,
            selectedComponent: null,
            components: {},
            connections: [],
            circuitValid: false,
            totalResistance: 0,
            current: 0,
            ledLit: false,
            fishLoaded: false,
            fishGlowing: false,
            simulationCount: 0,
            componentCount: 11,
            parallelCircuit: false
        };

        const state = window.__3D_STATE__;
        const scoredConnections = new Set();
        let awardedSeries = false;
        let awardedParallel = false;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // Workspace Grid
        const planeGeo = new THREE.PlaneGeometry(20, 20);
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.8 });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        scene.add(plane);

        const gridHelper = new THREE.GridHelper(20, 10, 0x004400, 0x004400);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Easter Egg (Fish) ---
        let fishModel = null;
        const loader = new GLTFLoader();
        loader.load('._BarramundiFish.glb', (gltf) => {
            fishModel = gltf.scene;
            fishModel.position.set(8, 0.5, 8);
            fishModel.scale.set(2, 2, 2);
            
            // Ensure materials can emit light
            fishModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    if (child.material) {
                        child.material = child.material.clone();
                    }
                }
            });
            
            scene.add(fishModel);
            state.fishLoaded = true;
        }, undefined, (error) => {
            console.warn("Fish model not found, skipping easter egg.", error);
        });

        // --- Components ---
        const interactableMeshes = [];
        const componentsData = {};

        function createComponent(name, type, geometry, color, startPos, props) {
            const material = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.5,
                emissive: 0x000000,
                emissiveIntensity: 0.5
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(startPos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            mesh.userData = {
                name: name,
                type: type,
                startPos: startPos.clone(),
                ...props
            };
            
            scene.add(mesh);
            interactableMeshes.push(mesh);
            componentsData[name] = mesh;
            
            updateStateComponent(mesh);
            return mesh;
        }

        // Battery
        createComponent('Battery', 'Power', new THREE.BoxGeometry(1, 0.5, 0.5), 0xdddd00, new THREE.Vector3(-6, 0.25, 0), { voltage: 9, label: 'Battery 9V' });
        
        // Resistors
        const resGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 16);
        resGeo.rotateZ(Math.PI / 2);
        createComponent('R1', 'Resistor', resGeo, 0x8b4513, new THREE.Vector3(-6, 0.25, 3), { resistance: 100, label: 'Resistor 100Ω' });
        createComponent('R2', 'Resistor', resGeo, 0x8b4513, new THREE.Vector3(-6, 0.25, -3), { resistance: 200, label: 'Resistor 200Ω' });
        
        // LED
        createComponent('LED', 'Output', new THREE.SphereGeometry(0.3, 16, 16), 0xaa0000, new THREE.Vector3(-6, 0.25, 6), { forwardVoltage: 2, label: 'Red LED' });
        
        // Wires
        const wireGeo = new THREE.CylinderGeometry(0.05, 0.05, 2, 8);
        wireGeo.rotateZ(Math.PI / 2);
        for (let i = 1; i <= 6; i++) {
            createComponent(`Wire${i}`, 'Wire', wireGeo, 0x0055ff, new THREE.Vector3(-6, 0.1 + (i*0.1), -6), { resistance: 0, label: 'Wire Segment' });
        }

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        
        let selectedMesh = null;
        let isDragging = false;
        let hoveredMesh = null;

        function updateStateComponent(mesh) {
            state.components[mesh.userData.name] = {
                position: { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z },
                gridX: Math.round(mesh.position.x / 2) * 2,
                gridZ: Math.round(mesh.position.z / 2) * 2,
                connected: false // Updated during connection check
            };
        }

        function updateScore(points) {
            state.score = Math.min(100, Math.max(0, state.score + points));
            document.getElementById('scoreDisplay').innerText = `Score: ${state.score}`;
        }

        function showNotification(msg, type) {
            const notif = document.getElementById('notification');
            notif.innerText = msg;
            notif.className = `notify-${type}`;
            notif.style.opacity = 1;
            setTimeout(() => { notif.style.opacity = 0; }, 3000);
        }

        function updateInfoPanel() {
            const content = document.getElementById('infoContent');
            if (!selectedMesh) {
                content.innerHTML = '<p>Select a component to view details.</p>';
                state.selectedComponent = null;
                return;
            }
            
            const ud = selectedMesh.userData;
            state.selectedComponent = ud.name;
            let html = `<p><strong>Name:</strong> ${ud.name}</p>
                        <p><strong>Type:</strong> ${ud.type}</p>`;
            
            if (ud.voltage) html += `<p><strong>Voltage:</strong> ${ud.voltage}V</p>`;
            if (ud.resistance !== undefined) html += `<p><strong>Resistance:</strong> ${ud.resistance}Ω</p>`;
            if (ud.forwardVoltage) html += `<p><strong>Fwd Voltage:</strong> ${ud.forwardVoltage}V</p>`;
            
            html += `<p><strong>Pos:</strong> (${Math.round(selectedMesh.position.x)}, ${Math.round(selectedMesh.position.z)})</p>`;
            
            if (state.circuitValid && state.simulationCount > 0) {
                if (ud.type === 'Resistor') {
                    const vDrop = (state.current * ud.resistance).toFixed(2);
                    html += `<p style="color:#00ffcc"><strong>V Drop:</strong> ${vDrop}V</p>`;
                } else if (ud.type === 'Power') {
                    html += `<p style="color:#00ffcc"><strong>Current:</strong> ${(state.current*1000).toFixed(1)}mA</p>`;
                }
            }
            
            content.innerHTML = html;
        }

        function checkConnections() {
            state.connections = [];
            const newConnections = [];
            
            for (let i = 0; i < interactableMeshes.length; i++) {
                for (let j = i + 1; j < interactableMeshes.length; j++) {
                    const m1 = interactableMeshes[i];
                    const m2 = interactableMeshes[j];
                    
                    // Distance between centers
                    const dist = m1.position.distanceTo(m2.position);
                    
                    // If within 2.5 units, consider connected (adjacent grid cells)
                    if (dist < 2.5) {
                        state.connections.push([m1.userData.name, m2.userData.name]);
                        
                        // Score for new connections
                        const pairId = [m1.userData.name, m2.userData.name].sort().join('-');
                        if (!scoredConnections.has(pairId)) {
                            scoredConnections.add(pairId);
                            newConnections.push(pairId);
                        }
                    }
                }
            }
            
            if (newConnections.length > 0) {
                updateScore(newConnections.length * 10);
                showNotification(`+${newConnections.length * 10} Connection Made!`, 'info');
            }
        }

        // Mouse Events
        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            if (isDragging && selectedMesh) {
                const intersect = new THREE.Vector3();
                raycaster.ray.intersectPlane(dragPlane, intersect);
                if (intersect) {
                    // Smooth drag
                    selectedMesh.position.x = intersect.x;
                    selectedMesh.position.z = intersect.z;
                }
            } else {
                // Hover effect
                const intersects = raycaster.intersectObjects(interactableMeshes);
                if (intersects.length > 0) {
                    if (hoveredMesh !== intersects[0].object) {
                        if (hoveredMesh && hoveredMesh !== selectedMesh && hoveredMesh.userData.name !== 'LED') {
                            hoveredMesh.material.emissive.setHex(0x000000);
                        }
                        hoveredMesh = intersects[0].object;
                        if (hoveredMesh !== selectedMesh) {
                            hoveredMesh.material.emissive.setHex(hoveredMesh.material.color.getHex());
                        }
                    }
                } else {
                    if (hoveredMesh && hoveredMesh !== selectedMesh && hoveredMesh.userData.name !== 'LED') {
                        hoveredMesh.material.emissive.setHex(0x000000);
                    }
                    hoveredMesh = null;
                }
            }
        });

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON') return; // Ignore UI clicks
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                controls.enabled = false;
                isDragging = true;
                
                if (selectedMesh && selectedMesh !== intersects[0].object) {
                    // Deselect previous
                    if (selectedMesh.userData.name !== 'LED' || !state.ledLit) {
                        selectedMesh.material.emissive.setHex(0x000000);
                    }
                }
                
                selectedMesh = intersects[0].object;
                selectedMesh.material.emissive.setHex(0xffffff); // White outline for selection
                updateInfoPanel();
            } else {
                if (selectedMesh) {
                    if (selectedMesh.userData.name !== 'LED' || !state.ledLit) {
                        selectedMesh.material.emissive.setHex(0x000000);
                    }
                    selectedMesh = null;
                    updateInfoPanel();
                }
            }
        });

        window.addEventListener('pointerup', () => {
            controls.enabled = true;
            if (isDragging && selectedMesh) {
                isDragging = false;
                // Snap to grid
                selectedMesh.position.x = Math.round(selectedMesh.position.x / 2) * 2;
                selectedMesh.position.z = Math.round(selectedMesh.position.z / 2) * 2;
                
                // Keep Y based on start pos
                selectedMesh.position.y = selectedMesh.userData.startPos.y;
                
                updateStateComponent(selectedMesh);
                checkConnections();
                updateInfoPanel();
            }
        });

        // Keyboard Events
        window.addEventListener('keydown', (e) => {
            if (!selectedMesh) return;

            if (e.key.toLowerCase() === 'r') {
                selectedMesh.rotation.y += Math.PI / 2;
                checkConnections();
            } else if (e.key === 'Delete' || e.key === 'Backspace') {
                selectedMesh.position.copy(selectedMesh.userData.startPos);
                selectedMesh.rotation.set(0, selectedMesh.userData.type === 'Resistor' || selectedMesh.userData.type === 'Wire' ? 0 : 0, selectedMesh.userData.type === 'Resistor' || selectedMesh.userData.type === 'Wire' ? Math.PI/2 : 0);
                updateStateComponent(selectedMesh);
                checkConnections();
                
                if (selectedMesh.userData.name !== 'LED' || !state.ledLit) {
                    selectedMesh.material.emissive.setHex(0x000000);
                }
                selectedMesh = null;
                updateInfoPanel();
            } else if (e.key.toLowerCase() === 'c') {
                resetAll();
            }
        });

        // --- Circuit Simulation Logic ---
        function buildGraph() {
            const adj = {};
            interactableMeshes.forEach(m => adj[m.userData.name] = []);
            
            state.connections.forEach(([a, b]) => {
                adj[a].push(b);
                adj[b].push(a);
            });
            return adj;
        }

        function findCycles(adj, startNode) {
            const cycles = [];
            const visited = new Set();
            
            function dfs(current, path) {
                visited.add(current);
                path.push(current);
                
                for (let neighbor of adj[current]) {
                    if (neighbor === startNode && path.length > 2) {
                        // Found a cycle
                        cycles.push([...path]);
                    } else if (!visited.has(neighbor)) {
                        dfs(neighbor, [...path]);
                    }
                }
                visited.delete(current); // Backtrack
            }
            
            dfs(startNode, []);
            
            // Deduplicate cycles (ignoring direction)
            const uniqueCycles = [];
            const seen = new Set();
            cycles.forEach(c => {
                const sorted = [...c].sort().join(',');
                if (!seen.has(sorted)) {
                    seen.add(sorted);
                    uniqueCycles.push(c);
                }
            });
            
            return uniqueCycles;
        }

        document.getElementById('simulateBtn').addEventListener('click', () => {
            state.simulationCount++;
            const adj = buildGraph();
            const cycles = findCycles(adj, 'Battery');
            
            const ledMesh = componentsData['LED'];
            
            if (cycles.length === 0) {
                showNotification("Open Circuit", "error");
                updateScore(-5);
                state.circuitValid = false;
                state.totalResistance = 0;
                state.current = 0;
                state.ledLit = false;
                ledMesh.material.emissive.setHex(0x000000);
                updateInfoPanel();
                return;
            }

            state.circuitValid = true;
            let hasR1 = false, hasR2 = false, hasLED = false;
            
            // Analyze components in cycles
            const componentsInCircuit = new Set();
            cycles.forEach(cycle => {
                cycle.forEach(node => componentsInCircuit.add(node));
            });

            hasR1 = componentsInCircuit.has('R1');
            hasR2 = componentsInCircuit.has('R2');
            hasLED = componentsInCircuit.has('LED');

            // Determine topology
            state.parallelCircuit = cycles.length > 1 && hasR1 && hasR2;
            
            // Calculate Resistance
            let rTotal = 0;
            if (state.parallelCircuit) {
                rTotal = 1 / (1/100 + 1/200); // R1 || R2
            } else {
                if (hasR1) rTotal += 100;
                if (hasR2) rTotal += 200;
            }
            
            // Prevent division by zero if no resistors (short circuit)
            if (rTotal === 0) rTotal = 0.1; 
            
            state.totalResistance = rTotal;
            
            // Calculate Current
            const vNet = 9 - (hasLED ? 2 : 0);
            state.current = Math.max(0, vNet / rTotal);
            
            // LED Logic
            if (hasLED && state.current > 0.01) {
                state.ledLit = true;
                ledMesh.material.emissive.setHex(0xff0000);
                ledMesh.material.emissiveIntensity = 1;
            } else {
                state.ledLit = false;
                if (selectedMesh !== ledMesh) {
                    ledMesh.material.emissive.setHex(0x000000);
                }
            }

            // Scoring
            let msg = "Circuit Complete!";
            let pts = 0;
            
            if (state.parallelCircuit && !awardedParallel) {
                pts += 30;
                awardedParallel = true;
                msg = "Parallel Circuit Complete!";
            } else if (!state.parallelCircuit && !awardedSeries) {
                pts += 20;
                awardedSeries = true;
                msg = "Series Circuit Complete!";
            }
            
            if (state.ledLit) {
                pts += 10; // Bonus
                msg += " LED Lit!";
            }
            
            if (pts > 0) {
                updateScore(pts);
                showNotification(`+${pts} ${msg}`, "success");
            } else {
                showNotification("Simulation Run", "info");
            }
            
            updateInfoPanel();
        });

        function resetAll() {
            interactableMeshes.forEach(mesh => {
                mesh.position.copy(mesh.userData.startPos);
                if (mesh.userData.type === 'Resistor' || mesh.userData.type === 'Wire') {
                    mesh.rotation.set(0, 0, Math.PI/2);
                } else {
                    mesh.rotation.set(0,0,0);
                }
                mesh.material.emissive.setHex(0x000000);
                updateStateComponent(mesh);
            });
            
            state.score = 0;
            state.connections = [];
            state.circuitValid = false;
            state.totalResistance = 0;
            state.current = 0;
            state.ledLit = false;
            state.simulationCount = 0;
            state.parallelCircuit = false;
            state.fishGlowing = false;
            
            scoredConnections.clear();
            awardedSeries = false;
            awardedParallel = false;
            selectedMesh = null;
            
            if (fishModel) {
                fishModel.traverse(c => {
                    if (c.isMesh && c.material) {
                        c.material.emissive.setHex(0x000000);
                        c.material.emissiveIntensity = 0;
                    }
                });
            }
            
            document.getElementById('scoreDisplay').innerText = `Score: 0`;
            updateInfoPanel();
            showNotification("Reset Complete", "info");
        }

        document.getElementById('resetBtn').addEventListener('click', resetAll);

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            controls.update();

            // Easter Egg Animation
            if (fishModel) {
                fishModel.rotation.y += 0.5 * delta;
                
                if (state.score >= 50 && !state.fishGlowing) {
                    state.fishGlowing = true;
                    fishModel.traverse((child) => {
                        if (child.isMesh && child.material) {
                            child.material.emissive.setHex(0xffff00);
                            child.material.emissiveIntensity = 1.0;
                        }
                    });
                    showNotification("Mascot Awakened!", "success");
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
