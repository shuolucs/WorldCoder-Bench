<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Circuit Builder Education Tool</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #scoreDisplay {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      z-index: 10;
      min-width: 120px;
    }

    #infoPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 260px;
      min-height: 120px;
      padding: 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      z-index: 10;
      line-height: 1.45;
    }

    #notification {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 20px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      z-index: 12;
      font-size: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      text-align: center;
      min-width: 240px;
    }

    #buttonBar {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    button {
      background: #222;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #333;
    }

    .small {
      opacity: 0.85;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="scoreDisplay">Score: 0</div>

  <div id="infoPanel">
    <strong>Component Info</strong><br />
    None selected
  </div>

  <div id="notification"></div>

  <div id="buttonBar">
    <button id="simulateBtn">Simulate</button>
    <button id="resetBtn">Reset</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const infoPanel = document.getElementById('infoPanel');
    const notification = document.getElementById('notification');
    const simulateBtn = document.getElementById('simulateBtn');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 10, 5);
    scene.add(dir);

    const boardGeo = new THREE.PlaneGeometry(20, 20);
    const boardMat = new THREE.MeshStandardMaterial({
      color: 0x2a2a2a,
      side: THREE.DoubleSide,
      roughness: 0.9,
      metalness: 0.05
    });
    const board = new THREE.Mesh(boardGeo, boardMat);
    board.rotation.x = -Math.PI / 2;
    board.position.y = 0;
    scene.add(board);

    function createGridLines(size = 20, step = 2, color = 0x004400) {
      const half = size / 2;
      const points = [];
      for (let i = -half; i <= half; i += step) {
        points.push(new THREE.Vector3(-half, 0.01, i), new THREE.Vector3(half, 0.01, i));
        points.push(new THREE.Vector3(i, 0.01, -half), new THREE.Vector3(i, 0.01, half));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 });
      return new THREE.LineSegments(geometry, material);
    }
    scene.add(createGridLines());

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const dragPoint = new THREE.Vector3();

    let hoveredComponent = null;
    let selectedComponent = null;
    let isDragging = false;
    let dragOffset = new THREE.Vector3();

    let fish = null;
    let fishMaterials = [];
    let fishLoaded = false;
    let fishGlowing = false;

    const clock = new THREE.Clock();

    const components = {};
    const componentMeshes = [];
    const connectionsSet = new Set();
    const rewardedConnections = new Set();

    const defaultPositions = {
      Battery: { x: -6, y: 0.25, z: 0 },
      R1: { x: -6, y: 0.25, z: 3 },
      R2: { x: -6, y: 0.25, z: -3 },
      LED: { x: -6, y: 0.25, z: 6 },
      Wire1: { x: -6, y: 0.1, z: -6 },
      Wire2: { x: -6, y: 0.1, z: -6 },
      Wire3: { x: -6, y: 0.1, z: -6 },
      Wire4: { x: -6, y: 0.1, z: -6 },
      Wire5: { x: -6, y: 0.1, z: -6 },
      Wire6: { x: -6, y: 0.1, z: -6 },
    };

    let score = 0;
    let circuitValid = false;
    let totalResistance = 0;
    let current = 0;
    let ledLit = false;
    let simulationCount = 0;
    let parallelCircuit = false;

    const componentCount = 11;

    function clampScore() {
      score = Math.max(0, Math.min(100, score));
    }

    function updateScoreDisplay() {
      scoreDisplay.textContent = `Score: ${score}`;
    }

    function showNotification(msg, duration = 1800) {
      notification.innerHTML = msg;
      notification.style.opacity = '1';
      clearTimeout(showNotification._t);
      showNotification._t = setTimeout(() => {
        notification.style.opacity = '0';
      }, duration);
    }

    function updateInfoPanel() {
      if (!selectedComponent) {
        infoPanel.innerHTML = `<strong>Component Info</strong><br />None selected`;
        return;
      }
      const c = components[selectedComponent.userData.name];
      let extra = '';
      if (c.type === 'battery') extra = `Voltage: ${c.voltage}V`;
      if (c.type === 'resistor') extra = `Resistance: ${c.resistance}Ω`;
      if (c.type === 'led') extra = `Forward Voltage: ${c.forwardVoltage}V`;
      if (c.type === 'wire') extra = `Conductor segment`;
      infoPanel.innerHTML = `
        <strong>Component Info</strong><br />
        Name: ${c.name}<br />
        Type: ${c.type}<br />
        ${extra}<br />
        Grid: (${c.gridX}, ${c.gridZ})<br />
        Connected: ${c.connected ? 'Yes' : 'No'}<br />
        Rotation Y: ${(THREE.MathUtils.radToDeg(c.group.rotation.y) % 360 + 360) % 360}°
        <div class="small" style="margin-top:8px;">
          Sim Current: ${current.toFixed(3)} A<br />
          Total Resistance: ${totalResistance.toFixed(2)} Ω<br />
          Circuit Valid: ${circuitValid ? 'Yes' : 'No'}
        </div>
      `;
    }

    function snapToGrid(v) {
      return Math.round(v / 2) * 2;
    }

    function setEmissiveOnMesh(mesh, color, intensity) {
      mesh.traverse(obj => {
        if (obj.isMesh && obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(mat => {
            if ('emissive' in mat) {
              mat.emissive.set(color);
              mat.emissiveIntensity = intensity;
            }
          });
        }
      });
    }

    function createComponent(name, type, mesh, startPos, data = {}) {
      const group = new THREE.Group();
      group.name = name;
      group.userData = { name, type, isComponent: true };
      group.add(mesh);
      group.position.set(startPos.x, startPos.y, startPos.z);

      scene.add(group);

      components[name] = {
        name,
        type,
        group,
        mesh,
        startPosition: new THREE.Vector3(startPos.x, startPos.y, startPos.z),
        connected: false,
        gridX: snapToGrid(startPos.x),
        gridZ: snapToGrid(startPos.z),
        ...data
      };

      componentMeshes.push(group);
      return group;
    }

    function addLabel(text, y = 0.7) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'white';
      ctx.font = '24px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, 128, 32);

      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(2.6, 0.65, 1);
      sprite.position.set(0, y, 0);
      return sprite;
    }

    function buildComponents() {
      const batteryMesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x000000, emissiveIntensity: 0 })
      );
      const battery = createComponent('Battery', 'battery', batteryMesh, defaultPositions.Battery, { voltage: 9 });
      battery.add(addLabel('Battery 9V'));

      const resistorMat = new THREE.MeshStandardMaterial({ color: 0x8b4513, emissive: 0x000000, emissiveIntensity: 0 });
      const resistorGeo = new THREE.CylinderGeometry(0.2, 0.2, 1, 24);

      const r1Mesh = new THREE.Mesh(resistorGeo, resistorMat.clone());
      r1Mesh.rotation.z = Math.PI / 2;
      createComponent('R1', 'resistor', r1Mesh, defaultPositions.R1, { resistance: 100 });

      const r2Mesh = new THREE.Mesh(resistorGeo, resistorMat.clone());
      r2Mesh.rotation.z = Math.PI / 2;
      createComponent('R2', 'resistor', r2Mesh, defaultPositions.R2, { resistance: 200 });

      const ledMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 24, 24),
        new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x220000, emissiveIntensity: 0.15 })
      );
      createComponent('LED', 'led', ledMesh, defaultPositions.LED, { forwardVoltage: 2 });

      for (let i = 1; i <= 6; i++) {
        const wireMesh = new THREE.Mesh(
          new THREE.CylinderGeometry(0.05, 0.05, 2, 16),
          new THREE.MeshStandardMaterial({ color: 0x2266ff, emissive: 0x000000, emissiveIntensity: 0 })
        );
        wireMesh.rotation.z = Math.PI / 2;
        createComponent(`Wire${i}`, 'wire', wireMesh, defaultPositions[`Wire${i}`], {});
      }
    }

    buildComponents();

    const loader = new GLTFLoader();
    loader.load(
      '._BarramundiFish.glb',
      (gltf) => {
        fish = gltf.scene;
        fish.position.set(8, 0.5, 8);
        fish.scale.set(2, 2, 2);
        fish.traverse(obj => {
          if (obj.isMesh && obj.material) {
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(mat => {
              if ('emissive' in mat) {
                mat.emissive = mat.emissive || new THREE.Color(0x000000);
                mat.emissiveIntensity = 0;
              }
              fishMaterials.push(mat);
            });
          }
        });
        scene.add(fish);
        fishLoaded = true;
        update3DState();
      },
      undefined,
      () => {
        fishLoaded = false;
        update3DState();
      }
    );

    function clearHighlights() {
      Object.values(components).forEach(c => {
        if (selectedComponent && c.group === selectedComponent) {
          setEmissiveOnMesh(c.group, 0xffffff, 0.8);
        } else if (hoveredComponent && c.group === hoveredComponent) {
          setEmissiveOnMesh(c.group, 0x00ffff, 0.55);
        } else if (c.type === 'led' && ledLit) {
          setEmissiveOnMesh(c.group, 0xff0000, 1.2);
        } else {
          if (c.type === 'led') {
            setEmissiveOnMesh(c.group, 0x220000, 0.15);
          } else {
            setEmissiveOnMesh(c.group, 0x000000, 0);
          }
        }
      });
    }

    function componentDistance(a, b) {
      return a.group.position.clone().setY(0).distanceTo(b.group.position.clone().setY(0));
    }

    function keyForPair(a, b) {
      return [a, b].sort().join('|');
    }

    function rebuildConnections() {
      connectionsSet.clear();
      Object.values(components).forEach(c => c.connected = false);

      const names = Object.keys(components);
      for (let i = 0; i < names.length; i++) {
        for (let j = i + 1; j < names.length; j++) {
          const a = components[names[i]];
          const b = components[names[j]];
          const dist = componentDistance(a, b);
          if (dist > 0.1 && dist <= 2.5) {
            const key = keyForPair(a.name, b.name);
            connectionsSet.add(key);
            a.connected = true;
            b.connected = true;

            if (!rewardedConnections.has(key)) {
              score += 10;
              rewardedConnections.add(key);
            }
          }
        }
      }

      clampScore();
      updateScoreDisplay();
      updateInfoPanel();
      update3DState();
    }

    function getAdjacency() {
      const adj = {};
      Object.keys(components).forEach(name => adj[name] = []);
      for (const pair of connectionsSet) {
        const [a, b] = pair.split('|');
        adj[a].push(b);
        adj[b].push(a);
      }
      return adj;
    }

    function pathExists(adj, start, end, visited = new Set()) {
      if (start === end) return true;
      visited.add(start);
      for (const next of (adj[start] || [])) {
        if (!visited.has(next)) {
          if (pathExists(adj, next, end, visited)) return true;
        }
      }
      return false;
    }

    function detectSeriesAndParallel(adj) {
      const batteryNeighbors = adj.Battery || [];
      const wireNames = Object.keys(components).filter(n => components[n].type === 'wire');

      let batteryHasWire = batteryNeighbors.some(n => wireNames.includes(n));
      let ledConnected = (adj.LED || []).length > 0;
      let r1Connected = (adj.R1 || []).length > 0;

      let series = batteryHasWire && ledConnected && r1Connected && pathExists(adj, 'Battery', 'LED') && pathExists(adj, 'LED', 'Battery');
      let parallel = false;

      const sameBatteryLinked = pathExists(adj, 'Battery', 'R1') && pathExists(adj, 'Battery', 'R2') && pathExists(adj, 'R1', 'LED') && pathExists(adj, 'R2', 'LED');

      const r1Pos = components.R1.group.position;
      const r2Pos = components.R2.group.position;
      const sameColumnOrRow = Math.abs(r1Pos.x - r2Pos.x) < 0.5 || Math.abs(r1Pos.z - r2Pos.z) < 0.5;

      if (series && sameBatteryLinked && sameColumnOrRow && (adj.R2 || []).length > 0) {
        parallel = true;
      }

      return { series, parallel };
    }

    function resetLEDGlow() {
      ledLit = false;
      const led = components.LED;
      setEmissiveOnMesh(led.group, 0x220000, 0.15);
    }

    function runSimulation() {
      simulationCount++;
      rebuildConnections();

      const adj = getAdjacency();
      const { series, parallel } = detectSeriesAndParallel(adj);

      circuitValid = false;
      totalResistance = 0;
      current = 0;
      parallelCircuit = parallel;
      resetLEDGlow();

      const batteryConnected = (adj.Battery || []).length >= 2 || ((adj.Battery || []).length >= 1 && series);
      const loopExists = pathExists(adj, 'Battery', 'LED') && pathExists(adj, 'LED', 'Battery') && batteryConnected;

      if (!loopExists || !series) {
        circuitValid = false;
        totalResistance = 0;
        current = 0;
        score -= 5;
        clampScore();
        updateScoreDisplay();
        updateInfoPanel();
        showNotification('Open Circuit');
        update3DState();
        return;
      }

      circuitValid = true;

      const batteryVoltage = components.Battery.voltage;
      let equivalentResistance = components.R1.resistance;

      if (parallel) {
        equivalentResistance = 1 / ((1 / components.R1.resistance) + (1 / components.R2.resistance));
      }

      totalResistance = equivalentResistance;
      current = batteryVoltage / totalResistance;

      const ledInCircuit = pathExists(adj, 'Battery', 'LED');
      if (ledInCircuit && current > 0.01) {
        ledLit = true;
        setEmissiveOnMesh(components.LED.group, 0xff0000, 1.4);
      }

      let message = '';
      if (parallel) {
        score += 30;
        message = 'Parallel Circuit Complete!';
      } else {
        score += 20;
        message = 'Series Circuit Complete!';
      }

      if (ledLit) {
        score += 10;
      }

      clampScore();
      updateScoreDisplay();

      const vR1 = current * components.R1.resistance;
      const vR2 = parallel ? current * equivalentResistance : 0;
      const vLED = ledInCircuit ? components.LED.forwardVoltage : 0;

      showNotification(
        `${message}<br><span class="small">I = ${current.toFixed(3)} A | Vbattery = ${batteryVoltage}V | VR1 = ${vR1.toFixed(2)}V ${parallel ? `| VR2(eq) = ${vR2.toFixed(2)}V` : ''} | VLED ≈ ${vLED.toFixed(2)}V</span>`,
        2800
      );

      updateInfoPanel();
      update3DState();
    }

    function resetPositionsOnly() {
      Object.keys(components).forEach(name => {
        const c = components[name];
        const p = defaultPositions[name];
        c.group.position.set(p.x, p.y, p.z);
        c.group.rotation.set(0, 0, 0);
        c.gridX = snapToGrid(p.x);
        c.gridZ = snapToGrid(p.z);
        c.connected = false;
      });
      connectionsSet.clear();
      rewardedConnections.clear();
      circuitValid = false;
      totalResistance = 0;
      current = 0;
      parallelCircuit = false;
      resetLEDGlow();
      selectedComponent = null;
      hoveredComponent = null;
      clearHighlights();
      updateInfoPanel();
      update3DState();
    }

    function resetAll() {
      resetPositionsOnly();
      score = 0;
      simulationCount = 0;
      clampScore();
      updateScoreDisplay();
      showNotification('Reset Complete');
      update3DState();
    }

    function update3DState() {
      window.__3D_STATE__ = {
        score,
        selectedComponent: selectedComponent ? selectedComponent.userData.name : null,
        components: Object.fromEntries(
          Object.entries(components).map(([name, c]) => [
            name,
            {
              position: {
                x: c.group.position.x,
                y: c.group.position.y,
                z: c.group.position.z
              },
              connected: c.connected,
              gridX: c.gridX,
              gridZ: c.gridZ
            }
          ])
        ),
        connections: Array.from(connectionsSet).map(pair => pair.split('|')),
        circuitValid,
        totalResistance,
        current,
        ledLit,
        fishLoaded,
        fishGlowing,
        simulationCount,
        componentCount,
        parallelCircuit
      };
    }

    function updateHovered(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(componentMeshes, true);

      let found = null;
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isComponent) obj = obj.parent;
        if (obj && obj.userData.isComponent) found = obj;
      }

      hoveredComponent = found;
      clearHighlights();
    }

    renderer.domElement.addEventListener('mousemove', (event) => {
      updateHovered(event);

      if (!isDragging || !selectedComponent) return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
        const target = dragPoint.clone().sub(dragOffset);
        selectedComponent.position.x = THREE.MathUtils.clamp(target.x, -10, 10);
        selectedComponent.position.z = THREE.MathUtils.clamp(target.z, -10, 10);

        const data = components[selectedComponent.userData.name];
        data.gridX = snapToGrid(selectedComponent.position.x);
        data.gridZ = snapToGrid(selectedComponent.position.z);
      }
      updateInfoPanel();
      update3DState();
    });

    renderer.domElement.addEventListener('mousedown', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects(componentMeshes, true);
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isComponent) obj = obj.parent;
        if (obj && obj.userData.isComponent) {
          selectedComponent = obj;
          controls.enabled = false;
          isDragging = true;

          if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
            dragOffset.copy(dragPoint).sub(selectedComponent.position);
          }

          clearHighlights();
          updateInfoPanel();
          update3DState();
          return;
        }
      }

      selectedComponent = null;
      clearHighlights();
      updateInfoPanel();
      update3DState();
    });

    renderer.domElement.addEventListener('mouseup', () => {
      if (selectedComponent) {
        selectedComponent.position.x = snapToGrid(selectedComponent.position.x);
        selectedComponent.position.z = snapToGrid(selectedComponent.position.z);

        const data = components[selectedComponent.userData.name];
        data.gridX = selectedComponent.position.x;
        data.gridZ = selectedComponent.position.z;

        rebuildConnections();
      }
      isDragging = false;
      controls.enabled = true;
      update3DState();
    });

    window.addEventListener('keydown', (event) => {
      if (!selectedComponent) {
        if (event.key.toLowerCase() === 'c') {
          connectionsSet.clear();
          rewardedConnections.clear();
          Object.values(components).forEach(c => c.connected = false);
          circuitValid = false;
          totalResistance = 0;
          current = 0;
          parallelCircuit = false;
          resetLEDGlow();
          updateInfoPanel();
          update3DState();
          showNotification('Connections Cleared');
        }
        return;
      }

      const data = components[selectedComponent.userData.name];

      if (event.key.toLowerCase() === 'r') {
        selectedComponent.rotation.y += Math.PI / 2;
        updateInfoPanel();
      }

      if (event.key === 'Delete') {
        const p = data.startPosition;
        selectedComponent.position.copy(p);
        selectedComponent.rotation.set(0, 0, 0);
        data.gridX = snapToGrid(p.x);
        data.gridZ = snapToGrid(p.z);
        rebuildConnections();
        showNotification(`${data.name} reset`);
      }

      if (event.key.toLowerCase() === 'c') {
        connectionsSet.clear();
        rewardedConnections.clear();
        Object.values(components).forEach(c => c.connected = false);
        circuitValid = false;
        totalResistance = 0;
        current = 0;
        parallelCircuit = false;
        resetLEDGlow();
        updateInfoPanel();
        update3DState();
        showNotification('Connections Cleared');
      }

      clearHighlights();
      update3DState();
    });

    simulateBtn.addEventListener('click', runSimulation);
    resetBtn.addEventListener('click', resetAll);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetAll();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (fish) {
        fish.rotation.y += 0.5 * dt;
      }

      if (fishLoaded && score >= 50 && fish && !fishGlowing) {
        fishGlowing = true;
        fish.traverse(obj => {
          if (obj.isMesh && obj.material) {
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(mat => {
              if ('emissive' in mat) {
                mat.emissive.set(0xffff00);
                mat.emissiveIntensity = 1.0;
              }
            });
          }
        });
        update3DState();
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
