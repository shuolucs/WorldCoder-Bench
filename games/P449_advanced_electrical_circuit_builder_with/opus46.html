<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circuit Builder Education Tool</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
canvas { display: block; }

#scoreDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.75);
    padding: 15px 25px;
    border-radius: 10px;
    font-size: 24px;
    font-weight: bold;
    border: 1px solid rgba(0,255,0,0.3);
    z-index: 10;
}

#infoPanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.75);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    min-width: 220px;
    border: 1px solid rgba(0,150,255,0.3);
    z-index: 10;
}
#infoPanel h3 { margin-bottom: 8px; color: #00aaff; }
#infoPanel .info-row { margin: 4px 0; color: #ccc; }
#infoPanel .info-value { color: #fff; font-weight: bold; }

#notification {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.85);
    padding: 20px 40px;
    border-radius: 12px;
    font-size: 20px;
    font-weight: bold;
    text-align: center;
    display: none;
    z-index: 20;
    border: 2px solid #00ff00;
    transition: opacity 0.3s;
}
#notification.error { border-color: #ff4444; }
#notification.success { border-color: #00ff00; }

#buttonBar {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
}
#buttonBar button {
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}
#simulateBtn {
    background: linear-gradient(135deg, #00aa00, #008800);
    color: white;
}
#simulateBtn:hover { background: linear-gradient(135deg, #00cc00, #00aa00); transform: scale(1.05); }
#resetBtn {
    background: linear-gradient(135deg, #aa0000, #880000);
    color: white;
}
#resetBtn:hover { background: linear-gradient(135deg, #cc0000, #aa0000); transform: scale(1.05); }

#instructions {
    position: absolute;
    bottom: 80px;
    left: 20px;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 12px;
    color: #aaa;
    z-index: 10;
}
#instructions kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 11px;
}

#circuitInfo {
    position: absolute;
    top: 200px;
    right: 20px;
    background: rgba(0,0,0,0.75);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 13px;
    min-width: 220px;
    border: 1px solid rgba(255,200,0,0.3);
    z-index: 10;
}
#circuitInfo h3 { margin-bottom: 8px; color: #ffcc00; }
</style>
</head>
<body>

<div id="scoreDisplay">Score: 0</div>

<div id="infoPanel">
    <h3>Component Info</h3>
    <div class="info-row">Select a component</div>
</div>

<div id="circuitInfo">
    <h3>Circuit Status</h3>
    <div id="circuitStatus">No simulation run yet</div>
</div>

<div id="notification"></div>

<div id="buttonBar">
    <button id="simulateBtn">⚡ Simulate</button>
    <button id="resetBtn">🔄 Reset</button>
</div>

<div id="instructions">
    <strong>Controls:</strong> 
    <kbd>Click</kbd> Select | <kbd>Drag</kbd> Move | <kbd>R</kbd> Rotate | <kbd>Delete</kbd> Remove | <kbd>C</kbd> Clear All
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ============ STATE MANAGEMENT ============
window.__3D_STATE__ = {
    score: 0,
    selectedComponent: null,
    components: {},
    connections: [],
    circuitValid: false,
    totalResistance: 0,
    current: 0,
    ledLit: false,
    fishLoaded: false,
    fishGlowing: false,
    simulationCount: 0,
    componentCount: 11,
    parallelCircuit: false
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.Fog(0x111111, 25, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 5;
controls.maxDistance = 30;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// ============ GRID WORKSPACE ============
const gridPlane = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 20),
    new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9, metalness: 0.1 })
);
gridPlane.rotation.x = -Math.PI / 2;
gridPlane.receiveShadow = true;
scene.add(gridPlane);

// Grid lines
const gridLinesMaterial = new THREE.LineBasicMaterial({ color: 0x004400, transparent: true, opacity: 0.6 });
const gridLinesGeometry = new THREE.BufferGeometry();
const gridPoints = [];
for (let i = -10; i <= 10; i += 2) {
    gridPoints.push(-10, 0.01, i, 10, 0.01, i);
    gridPoints.push(i, 0.01, -10, i, 0.01, 10);
}
gridLinesGeometry.setAttribute('position', new THREE.Float32BufferAttribute(gridPoints, 3));
const gridLines = new THREE.LineSegments(gridLinesGeometry, gridLinesMaterial);
scene.add(gridLines);

// ============ COMPONENT DEFINITIONS ============
const componentMeshes = {};
const componentData = {};
const componentLabels = {};
const draggableObjects = [];
let selectedMesh = null;
let isDragging = false;
let dragOffset = new THREE.Vector3();

const initialPositions = {};

function snapToGrid(value) {
    return Math.round(value / 2) * 2;
}

function createLabel(text) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(text, 128, 40);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(2, 0.5, 1);
    return sprite;
}

function createBattery() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.4, metalness: 0.3 })
    );
    body.castShadow = true;
    group.add(body);

    // Positive terminal
    const posTerminal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8),
        new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    posTerminal.position.set(0.5, 0.3, 0);
    group.add(posTerminal);

    // Negative terminal
    const negTerminal = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.08, 0.15, 8),
        new THREE.MeshStandardMaterial({ color: 0x0000ff })
    );
    negTerminal.position.set(-0.5, 0.3, 0);
    group.add(negTerminal);

    const label = createLabel('Battery 9V');
    label.position.set(0, 0.8, 0);
    group.add(label);

    group.position.set(-6, 0.25, 0);
    group.userData = { type: 'Battery', name: 'Battery', voltage: 9, resistance: 0 };
    return group;
}

function createResistor(name, resistance, color) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 1, 12),
        new THREE.MeshStandardMaterial({ color: color || 0x8B4513, roughness: 0.6, metalness: 0.2 })
    );
    body.rotation.z = Math.PI / 2;
    body.castShadow = true;
    group.add(body);

    // Color bands
    const bandColors = [0xff0000, 0x000000, 0x8B4513];
    for (let i = 0; i < 3; i++) {
        const band = new THREE.Mesh(
            new THREE.CylinderGeometry(0.22, 0.22, 0.05, 12),
            new THREE.MeshStandardMaterial({ color: bandColors[i] })
        );
        band.rotation.z = Math.PI / 2;
        band.position.x = -0.3 + i * 0.3;
        group.add(band);
    }

    // Leads
    const leadMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
    const lead1 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3, 6), leadMat);
    lead1.rotation.z = Math.PI / 2;
    lead1.position.x = 0.65;
    group.add(lead1);
    const lead2 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.3, 6), leadMat);
    lead2.rotation.z = Math.PI / 2;
    lead2.position.x = -0.65;
    group.add(lead2);

    const label = createLabel(name + ' ' + resistance + 'Ω');
    label.position.set(0, 0.7, 0);
    group.add(label);

    group.userData = { type: 'Resistor', name: name, resistance: resistance, voltage: 0 };
    return group;
}

function createLED() {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 16),
        new THREE.MeshStandardMaterial({ 
            color: 0xff0000, 
            roughness: 0.2, 
            metalness: 0.1, 
            transparent: true, 
            opacity: 0.8,
            emissive: 0x000000,
            emissiveIntensity: 0
        })
    );
    body.castShadow = true;
    group.add(body);

    // Flat bottom
    const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 0.25, 0.1, 16),
        new THREE.MeshStandardMaterial({ color: 0xcc0000 })
    );
    base.position.y = -0.25;
    group.add(base);

    // Leads
    const leadMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
    const lead1 = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.4, 6), leadMat);
    lead1.position.set(0.1, -0.45, 0);
    group.add(lead1);
    const lead2 = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.02, 0.3, 6), leadMat);
    lead2.position.set(-0.1, -0.4, 0);
    group.add(lead2);

    const label = createLabel('LED 2V');
    label.position.set(0, 0.8, 0);
    group.add(label);

    group.position.set(-6, 0.25, 6);
    group.userData = { type: 'LED', name: 'LED', forwardVoltage: 2, resistance: 0 };
    return group;
}

function createWire(index) {
    const group = new THREE.Group();
    const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, 2, 8),
        new THREE.MeshStandardMaterial({ color: 0x0066ff, roughness: 0.3, metalness: 0.6 })
    );
    body.rotation.z = Math.PI / 2;
    body.castShadow = true;
    group.add(body);

    // End caps
    const capMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8 });
    const cap1 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), capMat);
    cap1.position.x = 1;
    group.add(cap1);
    const cap2 = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), capMat);
    cap2.position.x = -1;
    group.add(cap2);

    group.userData = { type: 'Wire', name: 'Wire' + (index + 1), resistance: 0, voltage: 0 };
    return group;
}

// Create all components
const battery = createBattery();
battery.position.set(-6, 0.25, 0);
scene.add(battery);
componentMeshes['Battery'] = battery;
draggableObjects.push(battery);

const r1 = createResistor('R1', 100);
r1.position.set(-6, 0.25, 3);
scene.add(r1);
componentMeshes['R1'] = r1;
draggableObjects.push(r1);

const r2 = createResistor('R2', 200, 0x6B3410);
r2.position.set(-6, 0.25, -3);
scene.add(r2);
componentMeshes['R2'] = r2;
draggableObjects.push(r2);

const led = createLED();
led.position.set(-6, 0.25, 6);
scene.add(led);
componentMeshes['LED'] = led;
draggableObjects.push(led);

for (let i = 0; i < 6; i++) {
    const wire = createWire(i);
    wire.position.set(-6, 0.1 + i * 0.15, -6);
    scene.add(wire);
    componentMeshes['Wire' + (i + 1)] = wire;
    draggableObjects.push(wire);
}

// Store initial positions
for (const [name, mesh] of Object.entries(componentMeshes)) {
    initialPositions[name] = mesh.position.clone();
}

// Initialize state components
function updateStateComponents() {
    state.components = {};
    for (const [name, mesh] of Object.entries(componentMeshes)) {
        const gx = snapToGrid(mesh.position.x);
        const gz = snapToGrid(mesh.position.z);
        state.components[name] = {
            position: { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z },
            connected: false,
            gridX: gx,
            gridZ: gz
        };
    }
    state.componentCount = Object.keys(componentMeshes).length;
}
updateStateComponents();

// ============ FISH EASTER EGG ============
let fishModel = null;
const loader = new THREE.GLTFLoader();
loader.load('._BarramundiFish.glb', 
    (gltf) => {
        fishModel = gltf.scene;
        fishModel.position.set(8, 0.5, 8);
        fishModel.scale.set(2, 2, 2);
        scene.add(fishModel);
        state.fishLoaded = true;
        console.log('Fish model loaded successfully');
    },
    undefined,
    (error) => {
        console.log('Fish model not found, creating placeholder fish');
        // Create a placeholder fish
        const fishGroup = new THREE.Group();
        
        // Body
        const bodyGeom = new THREE.SphereGeometry(0.5, 16, 12);
        bodyGeom.scale(1.5, 0.6, 0.8);
        const fishMat = new THREE.MeshStandardMaterial({ 
            color: 0x4488aa, roughness: 0.3, metalness: 0.4,
            emissive: 0x000000, emissiveIntensity: 0
        });
        const fishBody = new THREE.Mesh(bodyGeom, fishMat);
        fishGroup.add(fishBody);

        // Tail
        const tailGeom = new THREE.ConeGeometry(0.4, 0.8, 4);
        const tail = new THREE.Mesh(tailGeom, fishMat);
        tail.rotation.z = Math.PI / 2;
        tail.position.x = -1.0;
        fishGroup.add(tail);

        // Eye
        const eyeGeom = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const eye1 = new THREE.Mesh(eyeGeom, eyeMat);
        eye1.position.set(0.5, 0.15, 0.35);
        fishGroup.add(eye1);
        const eye2 = new THREE.Mesh(eyeGeom, eyeMat);
        eye2.position.set(0.5, 0.15, -0.35);
        fishGroup.add(eye2);

        // Pupil
        const pupilGeom = new THREE.SphereGeometry(0.04, 8, 8);
        const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        const pupil1 = new THREE.Mesh(pupilGeom, pupilMat);
        pupil1.position.set(0.56, 0.15, 0.37);
        fishGroup.add(pupil1);
        const pupil2 = new THREE.Mesh(pupilGeom, pupilMat);
        pupil2.position.set(0.56, 0.15, -0.37);
        fishGroup.add(pupil2);

        // Fin
        const finGeom = new THREE.ConeGeometry(0.25, 0.5, 4);
        const fin = new THREE.Mesh(finGeom, fishMat);
        fin.position.set(0, 0.4, 0);
        fishGroup.add(fin);

        fishGroup.position.set(8, 0.5, 8);
        fishGroup.scale.set(2, 2, 2);
        scene.add(fishGroup);
        fishModel = fishGroup;
        state.fishLoaded = true;
    }
);

// ============ CONNECTION LINES ============
const connectionLines = [];

function drawConnections() {
    // Remove old lines
    connectionLines.forEach(line => scene.remove(line));
    connectionLines.length = 0;

    for (const conn of state.connections) {
        const meshA = componentMeshes[conn[0]];
        const meshB = componentMeshes[conn[1]];
        if (meshA && meshB) {
            const points = [meshA.position.clone(), meshB.position.clone()];
            points[0].y = 0.05;
            points[1].y = 0.05;
            const geom = new THREE.BufferGeometry().setFromPoints(points);
            const mat = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
            const line = new THREE.Line(geom, mat);
            scene.add(line);
            connectionLines.push(line);
        }
    }
}

// ============ CONNECTION DETECTION ============
function detectConnections() {
    const prevConnectionCount = state.connections.length;
    state.connections = [];

    const names = Object.keys(componentMeshes);
    for (let i = 0; i < names.length; i++) {
        for (let j = i + 1; j < names.length; j++) {
            const a = componentMeshes[names[i]];
            const b = componentMeshes[names[j]];
            // Check if on initial stacking position - skip those
            const aInit = initialPositions[names[i]];
            const bInit = initialPositions[names[j]];
            const aAtInit = a.position.distanceTo(aInit) < 0.1;
            const bAtInit = b.position.distanceTo(bInit) < 0.1;
            if (aAtInit && bAtInit) continue;

            const dist = a.position.distanceTo(b.position);
            if (dist > 0.01 && dist <= 2.5) {
                state.connections.push([names[i], names[j]]);
            }
        }
    }

    // Score for new connections
    if (state.connections.length > prevConnectionCount) {
        const newConns = state.connections.length - prevConnectionCount;
        addScore(newConns * 10);
    }

    // Update connected state
    const connectedSet = new Set();
    state.connections.forEach(c => { connectedSet.add(c[0]); connectedSet.add(c[1]); });
    for (const name of Object.keys(state.components)) {
        state.components[name].connected = connectedSet.has(name);
    }

    drawConnections();
}

// ============ CIRCUIT EVALUATION ============
function buildAdjacencyList() {
    const adj = {};
    for (const name of Object.keys(componentMeshes)) {
        adj[name] = [];
    }
    for (const [a, b] of state.connections) {
        if (!adj[a]) adj[a] = [];
        if (!adj[b]) adj[b] = [];
        adj[a].push(b);
        adj[b].push(a);
    }
    return adj;
}

function findPaths(adj, start, end, visited = new Set()) {
    if (start === end && visited.size > 0) return [[]];
    visited.add(start);
    const paths = [];
    for (const neighbor of (adj[start] || [])) {
        if (neighbor === end && visited.size > 1) {
            paths.push([neighbor]);
        } else if (!visited.has(neighbor)) {
            const subPaths = findPaths(adj, neighbor, end, new Set(visited));
            for (const sp of subPaths) {
                paths.push([neighbor, ...sp]);
            }
        }
    }
    return paths;
}

function evaluateCircuit() {
    state.simulationCount++;
    const adj = buildAdjacencyList();

    // Find if there's a complete loop through Battery
    const paths = findPaths(adj, 'Battery', 'Battery');

    if (paths.length === 0) {
        state.circuitValid = false;
        state.totalResistance = 0;
        state.current = 0;
        state.ledLit = false;
        state.parallelCircuit = false;
        addScore(-5);
        showNotification('⚠️ Open Circuit - No complete loop found!', 'error');
        updateCircuitInfo();
        return;
    }

    state.circuitValid = true;

    // Analyze paths for components
    let hasLED = false;
    let hasR1 = false;
    let hasR2 = false;
    let allPathComponents = new Set();

    for (const path of paths) {
        for (const node of path) {
            allPathComponents.add(node);
            if (node === 'LED') hasLED = true;
            if (node === 'R1') hasR1 = true;
            if (node === 'R2') hasR2 = true;
        }
    }

    // Check for parallel circuit (R1 and R2 both in separate paths)
    let r1Paths = 0, r2Paths = 0;
    for (const path of paths) {
        const pathHasR1 = path.includes('R1');
        const pathHasR2 = path.includes('R2');
        if (pathHasR1 && !pathHasR2) r1Paths++;
        if (pathHasR2 && !pathHasR1) r2Paths++;
    }
    state.parallelCircuit = (r1Paths > 0 && r2Paths > 0);

    // Calculate resistance
    let totalR = 0;
    if (state.parallelCircuit && hasR1 && hasR2) {
        // Parallel R1 and R2
        const r1Val = 100;
        const r2Val = 200;
        const parallelR = (r1Val * r2Val) / (r1Val + r2Val);
        totalR = parallelR;
        addScore(30);
    } else if (hasR1 && hasR2) {
        // Series
        totalR = 100 + 200;
    } else if (hasR1) {
        totalR = 100;
    } else if (hasR2) {
        totalR = 200;
    }

    // Add LED forward voltage effect (treat as resistance equivalent)
    let effectiveVoltage = 9; // Battery voltage
    if (hasLED) {
        effectiveVoltage -= 2; // LED forward voltage drop
    }

    if (totalR === 0) totalR = 1; // Prevent division by zero (short circuit)

    state.totalResistance = totalR;
    state.current = effectiveVoltage / totalR;

    // Check LED
    if (hasLED && state.current > 0.01) {
        state.ledLit = true;
        // Make LED glow
        const ledMesh = componentMeshes['LED'];
        ledMesh.traverse(child => {
            if (child.isMesh && child.material.color && child.material.color.getHex() === 0xff0000) {
                child.material.emissive.setHex(0xff0000);
                child.material.emissiveIntensity = 1.5;
            }
        });
        // Add point light at LED
        let ledLight = scene.getObjectByName('ledLight');
        if (!ledLight) {
            ledLight = new THREE.PointLight(0xff0000, 2, 5);
            ledLight.name = 'ledLight';
            scene.add(ledLight);
        }
        ledLight.position.copy(ledMesh.position);
        ledLight.position.y += 0.5;
        addScore(10);
    } else {
        state.ledLit = false;
        turnOffLED();
    }

    // Scoring
    if (paths.length > 0) {
        // Check for valid series circuit
        const seriesPath = paths.find(p => {
            const hasB = true; // starts from battery
            const hasW = p.some(n => n.startsWith('Wire'));
            const hasR = p.includes('R1');
            const hasL = p.includes('LED');
            return hasW && hasR && hasL;
        });
        if (seriesPath) {
            addScore(20);
        }
    }

    showNotification('⚡ Circuit Complete! Current: ' + (state.current * 1000).toFixed(1) + ' mA', 'success');
    updateCircuitInfo();
}

function turnOffLED() {
    const ledMesh = componentMeshes['LED'];
    ledMesh.traverse(child => {
        if (child.isMesh && child.material.emissive) {
            child.material.emissive.setHex(0x000000);
            child.material.emissiveIntensity = 0;
        }
    });
    const ledLight = scene.getObjectByName('ledLight');
    if (ledLight) scene.remove(ledLight);
}

// ============ SCORING ============
function addScore(points) {
    state.score = Math.max(0, Math.min(100, state.score + points));
    document.getElementById('scoreDisplay').textContent = 'Score: ' + state.score;

    // Fish glow check
    if (state.score >= 50 && fishModel && !state.fishGlowing) {
        state.fishGlowing = true;
        fishModel.traverse(child => {
            if (child.isMesh) {
                child.material.emissive = new THREE.Color(0xffff00);
                child.material.emissiveIntensity = 1.0;
            }
        });
        showNotification('🐟 The fish is glowing! You\'re doing great!', 'success');
    }
}

// ============ UI UPDATES ============
function showNotification(msg, type) {
    const el = document.getElementById('notification');
    el.textContent = msg;
    el.className = type || '';
    el.style.display = 'block';
    setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function updateInfoPanel() {
    const panel = document.getElementById('infoPanel');
    if (!state.selectedComponent) {
        panel.innerHTML = '<h3>Component Info</h3><div class="info-row">Select a component</div>';
        return;
    }
    const mesh = componentMeshes[state.selectedComponent];
    const ud = mesh.userData;
    let html = '<h3>' + ud.name + '</h3>';
    html += '<div class="info-row">Type: <span class="info-value">' + ud.type + '</span></div>';
    html += '<div class="info-row">Position: <span class="info-value">(' + 
        snapToGrid(mesh.position.x) + ', ' + snapToGrid(mesh.position.z) + ')</span></div>';
    if (ud.voltage) html += '<div class="info-row">Voltage: <span class="info-value">' + ud.voltage + 'V</span></div>';
    if (ud.resistance) html += '<div class="info-row">Resistance: <span class="info-value">' + ud.resistance + 'Ω</span></div>';
    if (ud.forwardVoltage) html += '<div class="info-row">Fwd Voltage: <span class="info-value">' + ud.forwardVoltage + 'V</span></div>';

    const comp = state.components[state.selectedComponent];
    if (comp) {
        html += '<div class="info-row">Connected: <span class="info-value">' + (comp.connected ? '✅ Yes' : '❌ No') + '</span></div>';
    }
    panel.innerHTML = html;
}

function updateCircuitInfo() {
    const el = document.getElementById('circuitStatus');
    let html = '';
    html += '<div class="info-row">Valid: <span style="color:' + (state.circuitValid ? '#0f0' : '#f44') + '">' + 
        (state.circuitValid ? '✅ Yes' : '❌ No') + '</span></div>';
    html += '<div class="info-row">Resistance: ' + state.totalResistance.toFixed(1) + ' Ω</div>';
    html += '<div class="info-row">Current: ' + (state.current * 1000).toFixed(2) + ' mA</div>';
    html += '<div class="info-row">Voltage: 9V</div>';
    if (state.circuitValid && state.totalResistance > 0) {
        // Voltage drops
        const vBattery = 9;
        const vLED = state.ledLit ? 2 : 0;
        const vResistors = vBattery - vLED;
        html += '<div class="info-row" style="margin-top:8px;color:#ffcc00">Voltage Drops:</div>';
        if (state.ledLit) html += '<div class="info-row">  LED: 2.0V</div>';
        if (state.parallelCircuit) {
            html += '<div class="info-row">  R1||R2: ' + vResistors.toFixed(1) + 'V</div>';
        } else {
            // Check which resistors are in circuit
            const adj = buildAdjacencyList();
            const paths = findPaths(adj, 'Battery', 'Battery');
            let r1In = false, r2In = false;
            paths.forEach(p => { if (p.includes('R1')) r1In = true; if (p.includes('R2')) r2In = true; });
            if (r1In) {
                const vR1 = state.current * 100;
                html += '<div class="info-row">  R1: ' + vR1.toFixed(2) + 'V</div>';
            }
            if (r2In) {
                const vR2 = state.current * 200;
                html += '<div class="info-row">  R2: ' + vR2.toFixed(2) + 'V</div>';
            }
        }
    }
    html += '<div class="info-row" style="margin-top:8px">Connections: ' + state.connections.length + '</div>';
    html += '<div class="info-row">Parallel: ' + (state.parallelCircuit ? '✅' : '❌') + '</div>';
    html += '<div class="info-row">LED Lit: ' + (state.ledLit ? '💡 Yes' : '❌ No') + '</div>';
    html += '<div class="info-row">Simulations: ' + state.simulationCount + '</div>';
    el.innerHTML = html;
}

// ============ INTERACTION ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
let hoveredMesh = null;

function getIntersectedComponent(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    // Check all draggable objects
    for (const obj of draggableObjects) {
        const intersects = raycaster.intersectObject(obj, true);
        if (intersects.length > 0) {
            return obj;
        }
    }
    return null;
}

function getPlaneIntersection(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const target = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, target);
    return target;
}

function selectComponent(mesh) {
    // Deselect previous
    if (selectedMesh) {
        selectedMesh.traverse(child => {
            if (child.isMesh && child.material.emissive) {
                // Only reset if not LED that's lit
                if (!(state.ledLit && selectedMesh.userData.name === 'LED' && child.material.color.getHex() === 0xff0000)) {
                    child.material.emissive.setHex(0x000000);
                    child.material.emissiveIntensity = 0;
                }
            }
        });
    }

    selectedMesh = mesh;
    if (mesh) {
        state.selectedComponent = mesh.userData.name;
        mesh.traverse(child => {
            if (child.isMesh) {
                child.material.emissive = new THREE.Color(0xffffff);
                child.material.emissiveIntensity = 0.3;
            }
        });
    } else {
        state.selectedComponent = null;
    }
    updateInfoPanel();
}

function setHover(mesh) {
    if (hoveredMesh && hoveredMesh !== selectedMesh) {
        hoveredMesh.traverse(child => {
            if (child.isMesh && child.material.emissive) {
                if (!(state.ledLit && hoveredMesh.userData.name === 'LED')) {
                    child.material.emissive.setHex(0x000000);
                    child.material.emissiveIntensity = 0;
                }
            }
        });
    }
    hoveredMesh = mesh;
    if (mesh && mesh !== selectedMesh) {
        mesh.traverse(child => {
            if (child.isMesh) {
                child.material.emissive = new THREE.Color(0x444444);
                child.material.emissiveIntensity = 0.5;
            }
        });
    }
    renderer.domElement.style.cursor = mesh ? 'pointer' : 'default';
}

// Mouse events
renderer.domElement.addEventListener('mousedown', (event) => {
    if (event.button !== 0) return;
    const comp = getIntersectedComponent(event);
    if (comp) {
        selectComponent(comp);
        isDragging = true;
        controls.enabled = false;
        const intersection = getPlaneIntersection(event);
        if (intersection) {
            dragOffset.copy(comp.position).sub(intersection);
            dragOffset.y = 0;
        }
    } else {
        selectComponent(null);
    }
});

renderer.domElement.addEventListener('mousemove', (event) => {
    if (isDragging && selectedMesh) {
        const intersection = getPlaneIntersection(event);
        if (intersection) {
            selectedMesh.position.x = intersection.x + dragOffset.x;
            selectedMesh.position.z = intersection.z + dragOffset.z;
            // Keep Y
            selectedMesh.position.y = selectedMesh.userData.type === 'Wire' ? 0.1 : 0.25;
            // Clamp to grid bounds
            selectedMesh.position.x = Math.max(-10, Math.min(10, selectedMesh.position.x));
            selectedMesh.position.z = Math.max(-10, Math.min(10, selectedMesh.position.z));
        }
    } else {
        const comp = getIntersectedComponent(event);
        setHover(comp);
    }
});

renderer.domElement.addEventListener('mouseup', (event) => {
    if (isDragging && selectedMesh) {
        // Snap to grid
        selectedMesh.position.x = snapToGrid(selectedMesh.position.x);
        selectedMesh.position.z = snapToGrid(selectedMesh.position.z);

        updateStateComponents();
        detectConnections();
        updateInfoPanel();
    }
    isDragging = false;
    controls.enabled = true;
});

// Keyboard events
document.addEventListener('keydown', (event) => {
    if (event.key === 'r' || event.key === 'R') {
        if (selectedMesh) {
            selectedMesh.rotation.y += Math.PI / 2;
        }
    }
    if (event.key === 'Delete' || event.key === 'Backspace') {
        if (selectedMesh) {
            const name = selectedMesh.userData.name;
            const initPos = initialPositions[name];
            if (initPos) {
                selectedMesh.position.copy(initPos);
                selectedMesh.rotation.y = 0;
            }
            // Remove connections involving this component
            state.connections = state.connections.filter(c => c[0] !== name && c[1] !== name);
            updateStateComponents();
            drawConnections();
            updateInfoPanel();
            updateCircuitInfo();
        }
    }
    if (event.key === 'c' || event.key === 'C') {
        resetPositions();
    }
});

// Button events
document.getElementById('simulateBtn').addEventListener('click', () => {
    detectConnections();
    evaluateCircuit();
});

document.getElementById('resetBtn').addEventListener('click', () => {
    resetAll();
});

function resetPositions() {
    for (const [name, mesh] of Object.entries(componentMeshes)) {
        const initPos = initialPositions[name];
        if (initPos) {
            mesh.position.copy(initPos);
            mesh.rotation.y = 0;
        }
    }
    state.connections = [];
    state.circuitValid = false;
    state.totalResistance = 0;
    state.current = 0;
    state.ledLit = false;
    state.parallelCircuit = false;
    turnOffLED();
    drawConnections();
    updateStateComponents();
    updateInfoPanel();
    updateCircuitInfo();
    selectComponent(null);
    showNotification('🔄 All positions and connections cleared', '');
}

function resetAll() {
    resetPositions();
    state.score = 0;
    state.simulationCount = 0;
    state.fishGlowing = false;
    document.getElementById('scoreDisplay').textContent = 'Score: 0';

    // Reset fish glow
    if (fishModel) {
        fishModel.traverse(child => {
            if (child.isMesh) {
                child.material.emissive = new THREE.Color(0x000000);
                child.material.emissiveIntensity = 0;
            }
        });
    }

    showNotification('🔄 Everything reset!', '');
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Rotate fish
    if (fishModel) {
        fishModel.rotation.y += 0.5 * delta;
    }

    // Pulse LED if lit
    if (state.ledLit) {
        const ledMesh = componentMeshes['LED'];
        const pulse = 0.8 + Math.sin(clock.elapsedTime * 4) * 0.5;
        ledMesh.traverse(child => {
            if (child.isMesh && child.material.color && child.material.color.getHex() === 0xff0000) {
                child.material.emissiveIntensity = pulse;
            }
        });
    }

    // Pulse fish glow
    if (state.fishGlowing && fishModel) {
        const fishPulse = 0.5 + Math.sin(clock.elapsedTime * 2) * 0.5;
        fishModel.traverse(child => {
            if (child.isMesh) {
                child.material.emissiveIntensity = fishPulse;
            }
        });
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial circuit info update
updateCircuitInfo();
</script>
</body>
</html>
