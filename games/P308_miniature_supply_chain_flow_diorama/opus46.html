<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Supply Chain Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #hud-stats {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.75);
    color: #e0e0e0;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .btn-group {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  .btn-group button {
    background: rgba(20,20,40,0.85);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    min-width: 120px;
  }

  .btn-group button:hover {
    background: rgba(40,40,80,0.9);
    border-color: rgba(255,255,255,0.3);
  }

  #info-panel {
    position: absolute;
    bottom: 15px;
    right: 15px;
    background: rgba(0,0,0,0.8);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 13px;
    min-width: 200px;
    display: none;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  #info-panel h3 {
    margin-bottom: 8px;
    color: #fff;
    font-size: 15px;
  }

  #info-panel p {
    margin: 4px 0;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="hud-stats">Spawned: 0 | In-Transit: 0 | Delivered: 0</div>

<div class="btn-group">
  <button id="btn-play">Play</button>
  <button id="btn-speed">Speed: 1x</button>
  <button id="btn-heatmap">Heatmap: OFF</button>
</div>

<div id="info-panel">
  <h3 id="info-name"></h3>
  <p id="info-detail1"></p>
  <p id="info-detail2"></p>
  <p id="info-detail3"></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

// ============ STATE ============
window.__3D_STATE__ = {
  running: false,
  speedMultiplier: 1,
  totalSpawned: 0,
  totalInTransit: 0,
  totalDelivered: 0,
  selectedBuilding: null,
  cameraPreset: 1,
  heatmapEnabled: false,
  warehouseThroughput: [0, 0],
  parcelCount: 0,
  elapsedTime: 0
};

const STATE = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 50);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 18);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Subtle hemisphere light for better ambient
const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x362d1b, 0.2);
scene.add(hemiLight);

// ============ TABLE ============
const tableGeo = new THREE.BoxGeometry(30, 0.5, 20);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8, metalness: 0.1 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.set(0, -0.25, 0);
table.receiveShadow = true;
scene.add(table);

// Table edge trim
const edgeGeo = new THREE.BoxGeometry(30.2, 0.6, 20.2);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x6B4F12, roughness: 0.9 });
const tableEdge = new THREE.Mesh(edgeGeo, edgeMat);
tableEdge.position.set(0, -0.35, 0);
tableEdge.receiveShadow = true;
scene.add(tableEdge);

// ============ BUILDINGS ============
const buildings = [];
const buildingMeshes = [];

function createFactory(x, y, z, name) {
  const group = new THREE.Group();
  group.position.set(x, y, z);

  const bodyGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333, roughness: 0.6, metalness: 0.2 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Chimney 1
  const chimGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.7, 8);
  const chimMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.7 });
  const chim1 = new THREE.Mesh(chimGeo, chimMat);
  chim1.position.set(-0.3, 1.1, 0);
  chim1.castShadow = true;
  group.add(chim1);

  // Chimney 2
  const chim2 = new THREE.Mesh(chimGeo, chimMat);
  chim2.position.set(0.3, 1.1, 0);
  chim2.castShadow = true;
  group.add(chim2);

  // Roof detail
  const roofGeo = new THREE.BoxGeometry(1.6, 0.08, 1.6);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x992222, roughness: 0.7 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = 0.79;
  group.add(roof);

  // Door
  const doorGeo = new THREE.BoxGeometry(0.4, 0.6, 0.05);
  const doorMat = new THREE.MeshStandardMaterial({ color: 0x663333 });
  const door = new THREE.Mesh(doorGeo, doorMat);
  door.position.set(0, -0.45, 0.78);
  group.add(door);

  scene.add(group);

  const info = {
    name: name,
    type: 'factory',
    group: group,
    mesh: body,
    material: bodyMat,
    originalColor: 0xcc3333,
    position: new THREE.Vector3(x, y, z),
    spawned: 0
  };
  buildings.push(info);
  buildingMeshes.push(body);
  body.userData.buildingIndex = buildings.length - 1;
  return info;
}

function createWarehouse(x, y, z, name, index) {
  const group = new THREE.Group();
  group.position.set(x, y, z);

  const bodyGeo = new THREE.BoxGeometry(2, 1.2, 1.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xddaa22, roughness: 0.6, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Roof
  const roofGeo = new THREE.BoxGeometry(2.1, 0.08, 1.6);
  const roofMat = new THREE.MeshStandardMaterial({ color: 0xbb8811, roughness: 0.7 });
  const roof = new THREE.Mesh(roofGeo, roofMat);
  roof.position.y = 0.64;
  group.add(roof);

  // Loading dock
  const dockGeo = new THREE.BoxGeometry(0.5, 0.8, 0.1);
  const dockMat = new THREE.MeshStandardMaterial({ color: 0x887722 });
  const dock = new THREE.Mesh(dockGeo, dockMat);
  dock.position.set(0, -0.2, 0.8);
  group.add(dock);

  scene.add(group);

  const info = {
    name: name,
    type: 'warehouse',
    group: group,
    mesh: body,
    material: bodyMat,
    originalColor: 0xddaa22,
    position: new THREE.Vector3(x, y, z),
    warehouseIndex: index,
    throughput: 0,
    currentParcels: 0
  };
  buildings.push(info);
  buildingMeshes.push(body);
  body.userData.buildingIndex = buildings.length - 1;
  return info;
}

function createStore(x, y, z, name) {
  const group = new THREE.Group();
  group.position.set(x, y, z);

  const bodyGeo = new THREE.BoxGeometry(1, 1, 1);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x33aa55, roughness: 0.6, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Awning
  const awningGeo = new THREE.BoxGeometry(1.2, 0.05, 0.3);
  const awningMat = new THREE.MeshStandardMaterial({ color: 0x228844 });
  const awning = new THREE.Mesh(awningGeo, awningMat);
  awning.position.set(0, 0.3, 0.6);
  group.add(awning);

  // Sign
  const signGeo = new THREE.BoxGeometry(0.6, 0.2, 0.05);
  const signMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x33aa55, emissiveIntensity: 0.3 });
  const sign = new THREE.Mesh(signGeo, signMat);
  sign.position.set(0, 0.35, 0.53);
  group.add(sign);

  scene.add(group);

  const info = {
    name: name,
    type: 'store',
    group: group,
    mesh: body,
    material: bodyMat,
    originalColor: 0x33aa55,
    position: new THREE.Vector3(x, y, z),
    received: 0
  };
  buildings.push(info);
  buildingMeshes.push(body);
  body.userData.buildingIndex = buildings.length - 1;
  return info;
}

// Create buildings
const factory1 = createFactory(-10, 0.75, -5, 'Factory A');
const factory2 = createFactory(-10, 0.75, 5, 'Factory B');
const warehouse1 = createWarehouse(0, 0.6, -4, 'Warehouse 1', 0);
const warehouse2 = createWarehouse(0, 0.6, 4, 'Warehouse 2', 1);
const store1 = createStore(10, 0.5, -6, 'Store Alpha');
const store2 = createStore(10, 0.5, 0, 'Store Beta');
const store3 = createStore(10, 0.5, 6, 'Store Gamma');

const factories = [factory1, factory2];
const warehouses = [warehouse1, warehouse2];
const stores = [store1, store2, store3];

// ============ PATHS ============
const paths = [];

function createPath(from, to) {
  const start = from.position.clone();
  const end = to.position.clone();
  start.y = 0.05;
  end.y = 0.05;

  const direction = end.clone().sub(start);
  const length = direction.length();
  const center = start.clone().add(end).clone().multiplyScalar(0.5);

  const pathGeo = new THREE.BoxGeometry(length, 0.05, 0.2);
  const pathMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
  const pathMesh = new THREE.Mesh(pathGeo, pathMat);
  pathMesh.position.copy(center);
  pathMesh.receiveShadow = true;

  const angle = Math.atan2(direction.z, direction.x);
  pathMesh.rotation.y = -angle;

  scene.add(pathMesh);

  paths.push({
    from: from,
    to: to,
    start: start,
    end: end,
    length: length,
    mesh: pathMesh
  });

  return { start, end, length };
}

// Factory -> Warehouse paths
const f1w1 = createPath(factory1, warehouse1);
const f1w2 = createPath(factory1, warehouse2);
const f2w1 = createPath(factory2, warehouse1);
const f2w2 = createPath(factory2, warehouse2);

// Warehouse -> Store paths
const w1s1 = createPath(warehouse1, store1);
const w1s2 = createPath(warehouse1, store2);
const w1s3 = createPath(warehouse1, store3);
const w2s1 = createPath(warehouse2, store1);
const w2s2 = createPath(warehouse2, store2);
const w2s3 = createPath(warehouse2, store3);

// Route definitions
const factoryToWarehouseRoutes = [
  { from: factory1, to: warehouse1, path: f1w1 },
  { from: factory1, to: warehouse2, path: f1w2 },
  { from: factory2, to: warehouse1, path: f2w1 },
  { from: factory2, to: warehouse2, path: f2w2 },
];

const warehouseToStoreRoutes = [
  { from: warehouse1, to: store1, path: w1s1 },
  { from: warehouse1, to: store2, path: w1s2 },
  { from: warehouse1, to: store3, path: w1s3 },
  { from: warehouse2, to: store1, path: w2s1 },
  { from: warehouse2, to: store2, path: w2s2 },
  { from: warehouse2, to: store3, path: w2s3 },
];

// ============ PARCELS ============
const parcels = [];
const parcelGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
const parcelMat = new THREE.MeshStandardMaterial({ color: 0x2266CC, roughness: 0.4, metalness: 0.3 });

const PARCEL_SPEED = 3; // units/sec

function spawnParcel(factory) {
  // Pick a random warehouse
  const warehouseIdx = Math.floor(Math.random() * warehouses.length);
  const warehouse = warehouses[warehouseIdx];

  // Find the route
  const route = factoryToWarehouseRoutes.find(r => r.from === factory && r.to === warehouse);

  const mesh = new THREE.Mesh(parcelGeo, parcelMat.clone());
  mesh.position.copy(route.path.start);
  mesh.position.y = 0.25;
  mesh.castShadow = true;
  scene.add(mesh);

  const parcel = {
    mesh: mesh,
    phase: 'toWarehouse', // 'toWarehouse', 'atWarehouse', 'toStore', 'done'
    progress: 0,
    start: route.path.start.clone(),
    end: route.path.end.clone(),
    pathLength: route.path.length,
    warehouse: warehouse,
    warehouseIndex: warehouseIdx,
    waitTime: 0,
    store: null,
    storeRoute: null
  };

  parcels.push(parcel);
  STATE.totalSpawned++;
  STATE.totalInTransit++;
  factory.spawned++;
  updateParcelCount();
}

function updateParcelCount() {
  STATE.parcelCount = parcels.length;
}

// Spawn timers
const spawnTimers = [0, 0];
const SPAWN_INTERVAL = 2; // seconds

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedBuildingInfo = null;

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(buildingMeshes);

  // Deselect previous
  if (selectedBuildingInfo) {
    selectedBuildingInfo.material.emissive.setHex(0x000000);
    selectedBuildingInfo.material.emissiveIntensity = 0;
    selectedBuildingInfo = null;
    STATE.selectedBuilding = null;
  }

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const idx = hit.userData.buildingIndex;
    if (idx !== undefined) {
      const info = buildings[idx];
      info.material.emissive.setHex(0xffff00);
      info.material.emissiveIntensity = 0.4;
      selectedBuildingInfo = info;
      STATE.selectedBuilding = info.name;
      showInfoPanel(info);
    }
  } else {
    hideInfoPanel();
  }
}

function showInfoPanel(info) {
  const panel = document.getElementById('info-panel');
  const nameEl = document.getElementById('info-name');
  const d1 = document.getElementById('info-detail1');
  const d2 = document.getElementById('info-detail2');
  const d3 = document.getElementById('info-detail3');

  nameEl.textContent = info.name;

  if (info.type === 'factory') {
    d1.textContent = 'Type: Factory';
    d2.textContent = 'Parcels Spawned: ' + info.spawned;
    d3.textContent = 'Status: ' + (STATE.running ? 'Active' : 'Idle');
  } else if (info.type === 'warehouse') {
    d1.textContent = 'Type: Warehouse';
    d2.textContent = 'Throughput: ' + STATE.warehouseThroughput[info.warehouseIndex];
    d3.textContent = 'Parcels Waiting: ' + info.currentParcels;
  } else if (info.type === 'store') {
    d1.textContent = 'Type: Retail Store';
    d2.textContent = 'Parcels Received: ' + info.received;
    d3.textContent = 'Status: ' + (STATE.running ? 'Open' : 'Closed');
  }

  panel.style.display = 'block';
}

function hideInfoPanel() {
  document.getElementById('info-panel').style.display = 'none';
}

renderer.domElement.addEventListener('click', onMouseClick);

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (key === 'r') {
    resetSimulation();
  } else if (key === '1') {
    setCameraPreset(1);
  } else if (key === '2') {
    setCameraPreset(2);
  } else if (key === '3') {
    setCameraPreset(3);
  }
});

function setCameraPreset(preset) {
  STATE.cameraPreset = preset;
  if (preset === 1) {
    animateCamera(new THREE.Vector3(0, 12, 18), new THREE.Vector3(0, 0, 0));
  } else if (preset === 2) {
    animateCamera(new THREE.Vector3(0, 20, 0.1), new THREE.Vector3(0, 0, 0));
  } else if (preset === 3) {
    animateCamera(new THREE.Vector3(25, 5, 0), new THREE.Vector3(0, 0, 0));
  }
}

let cameraAnimating = false;
let cameraAnimStart = null;
let cameraAnimDuration = 600;
let cameraStartPos = new THREE.Vector3();
let cameraEndPos = new THREE.Vector3();
let cameraStartLookAt = new THREE.Vector3();
let cameraEndLookAt = new THREE.Vector3();

function animateCamera(targetPos, targetLookAt) {
  cameraStartPos.copy(camera.position);
  cameraEndPos.copy(targetPos);
  cameraStartLookAt.set(0, 0, 0); // simplify
  cameraEndLookAt.copy(targetLookAt);
  cameraAnimStart = performance.now();
  cameraAnimating = true;
}

function updateCameraAnimation(now) {
  if (!cameraAnimating) return;
  const elapsed = now - cameraAnimStart;
  let t = Math.min(elapsed / cameraAnimDuration, 1);
  // Ease out cubic
  t = 1 - Math.pow(1 - t, 3);

  camera.position.lerpVectors(cameraStartPos, cameraEndPos, t);
  const lookAt = new THREE.Vector3().lerpVectors(cameraStartLookAt, cameraEndLookAt, t);
  camera.lookAt(lookAt);

  if (t >= 1) {
    cameraAnimating = false;
  }
}

// ============ BUTTONS ============
document.getElementById('btn-play').addEventListener('click', () => {
  STATE.running = !STATE.running;
  document.getElementById('btn-play').textContent = STATE.running ? 'Pause' : 'Play';
});

document.getElementById('btn-speed').addEventListener('click', () => {
  if (STATE.speedMultiplier === 1) STATE.speedMultiplier = 2;
  else if (STATE.speedMultiplier === 2) STATE.speedMultiplier = 3;
  else STATE.speedMultiplier = 1;
  document.getElementById('btn-speed').textContent = 'Speed: ' + STATE.speedMultiplier + 'x';
});

document.getElementById('btn-heatmap').addEventListener('click', () => {
  STATE.heatmapEnabled = !STATE.heatmapEnabled;
  document.getElementById('btn-heatmap').textContent = 'Heatmap: ' + (STATE.heatmapEnabled ? 'ON' : 'OFF');
  if (!STATE.heatmapEnabled) {
    // Reset warehouse colors
    warehouses.forEach(w => {
      w.material.color.setHex(w.originalColor);
      w.material.emissive.setHex(selectedBuildingInfo === w ? 0xffff00 : 0x000000);
    });
  }
});

function resetSimulation() {
  STATE.running = false;
  STATE.totalSpawned = 0;
  STATE.totalInTransit = 0;
  STATE.totalDelivered = 0;
  STATE.elapsedTime = 0;
  STATE.warehouseThroughput = [0, 0];
  STATE.parcelCount = 0;

  document.getElementById('btn-play').textContent = 'Play';

  // Remove all parcels
  for (const p of parcels) {
    scene.remove(p.mesh);
    if (p.mesh.material) p.mesh.material.dispose();
  }
  parcels.length = 0;

  // Reset building stats
  factories.forEach(f => f.spawned = 0);
  warehouses.forEach(w => { w.throughput = 0; w.currentParcels = 0; });
  stores.forEach(s => s.received = 0);

  spawnTimers[0] = 0;
  spawnTimers[1] = 0;

  // Deselect
  if (selectedBuildingInfo) {
    selectedBuildingInfo.material.emissive.setHex(0x000000);
    selectedBuildingInfo.material.emissiveIntensity = 0;
    selectedBuildingInfo = null;
    STATE.selectedBuilding = null;
  }
  hideInfoPanel();

  updateHUD();
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('hud-stats').textContent =
    'Spawned: ' + STATE.totalSpawned + ' | In-Transit: ' + STATE.totalInTransit + ' | Delivered: ' + STATE.totalDelivered;
}

// ============ HEATMAP ============
function updateHeatmap() {
  if (!STATE.heatmapEnabled) return;

  const maxThroughput = Math.max(1, Math.max(...STATE.warehouseThroughput));

  warehouses.forEach((w, i) => {
    const t = STATE.warehouseThroughput[i] / maxThroughput;
    // Yellow (0xddaa22) -> Orange -> Red
    const r = 0.87 + t * 0.13;
    const g = 0.67 * (1 - t * 0.8);
    const b = 0.13 * (1 - t);
    if (selectedBuildingInfo !== w) {
      w.material.color.setRGB(r, g, b);
      w.material.emissive.setRGB(t * 0.3, 0, 0);
      w.material.emissiveIntensity = t * 0.5;
    }
  });
}

// ============ GROUND PLANE DECORATION ============
// Add some small decorative elements on the table
function addDecorations() {
  // Small label plates near buildings
  const labelGeo = new THREE.BoxGeometry(1.5, 0.02, 0.4);
  const labelMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5 });

  // Ground grid lines (subtle)
  const gridMat = new THREE.MeshStandardMaterial({ color: 0x7a5f12, roughness: 0.9 });
  for (let x = -14; x <= 14; x += 2) {
    const lineGeo = new THREE.BoxGeometry(0.02, 0.01, 19);
    const line = new THREE.Mesh(lineGeo, gridMat);
    line.position.set(x, 0.01, 0);
    scene.add(line);
  }
  for (let z = -9; z <= 9; z += 2) {
    const lineGeo = new THREE.BoxGeometry(29, 0.01, 0.02);
    const line = new THREE.Mesh(lineGeo, gridMat);
    line.position.set(0, 0.01, z);
    scene.add(line);
  }
}
addDecorations();

// ============ ANIMATION LOOP ============
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);

  const rawDelta = (now - lastTime) / 1000;
  lastTime = now;
  const delta = Math.min(rawDelta, 0.1); // cap delta

  updateCameraAnimation(now);

  if (STATE.running) {
    const dt = delta * STATE.speedMultiplier;
    STATE.elapsedTime += dt;

    // Spawn parcels
    for (let i = 0; i < factories.length; i++) {
      spawnTimers[i] += dt;
      if (spawnTimers[i] >= SPAWN_INTERVAL) {
        spawnTimers[i] -= SPAWN_INTERVAL;
        spawnParcel(factories[i]);
      }
    }

    // Update parcels
    const toRemove = [];
    for (let i = 0; i < parcels.length; i++) {
      const p = parcels[i];

      if (p.phase === 'toWarehouse') {
        const moveAmount = (PARCEL_SPEED * dt) / p.pathLength;
        p.progress += moveAmount;

        if (p.progress >= 1) {
          p.progress = 1;
          p.phase = 'atWarehouse';
          p.waitTime = 0;
          p.warehouse.currentParcels++;
        }

        const pos = new THREE.Vector3().lerpVectors(p.start, p.end, Math.min(p.progress, 1));
        p.mesh.position.set(pos.x, 0.25, pos.z);

        // Slight bobbing
        p.mesh.position.y = 0.25 + Math.sin(p.progress * Math.PI * 4) * 0.05;

      } else if (p.phase === 'atWarehouse') {
        p.waitTime += dt;
        // Small bounce at warehouse
        p.mesh.position.y = 0.25 + Math.abs(Math.sin(p.waitTime * 5)) * 0.1;

        if (p.waitTime >= 1) {
          p.phase = 'toStore';
          p.progress = 0;
          p.warehouse.currentParcels--;

          // Update throughput
          STATE.warehouseThroughput[p.warehouseIndex]++;
          p.warehouse.throughput++;

          // Pick random store
          const storeIdx = Math.floor(Math.random() * stores.length);
          p.store = stores[storeIdx];

          // Find route
          const route = warehouseToStoreRoutes.find(r => r.from === p.warehouse && r.to === p.store);
          p.start = route.path.start.clone();
          p.end = route.path.end.clone();
          p.pathLength = route.path.length;
        }

      } else if (p.phase === 'toStore') {
        const moveAmount = (PARCEL_SPEED * dt) / p.pathLength;
        p.progress += moveAmount;

        if (p.progress >= 1) {
          p.phase = 'done';
          STATE.totalDelivered++;
          STATE.totalInTransit--;
          p.store.received++;
          toRemove.push(i);
        }

        const pos = new THREE.Vector3().lerpVectors(p.start, p.end, Math.min(p.progress, 1));
        p.mesh.position.set(pos.x, 0.25, pos.z);
        p.mesh.position.y = 0.25 + Math.sin(p.progress * Math.PI * 4) * 0.05;
      }

      // Rotate parcel for visual interest
      p.mesh.rotation.y += dt * 2;
    }

    // Remove delivered parcels (reverse order)
    for (let i = toRemove.length - 1; i >= 0; i--) {
      const idx = toRemove[i];
      const p = parcels[idx];
      scene.remove(p.mesh);
      if (p.mesh.material) p.mesh.material.dispose();
      parcels.splice(idx, 1);
    }

    updateParcelCount();
    updateHUD();
    updateHeatmap();

    // Update info panel if something is selected
    if (selectedBuildingInfo) {
      showInfoPanel(selectedBuildingInfo);
    }
  }

  // Animate chimneys (smoke effect via slight scale pulse on factories)
  if (STATE.running) {
    factories.forEach((f, i) => {
      const t = now * 0.001 + i;
      f.group.children.forEach((child, ci) => {
        if (ci === 1 || ci === 2) { // chimneys
          child.scale.y = 1 + Math.sin(t * 3 + ci) * 0.1;
        }
      });
    });
  }

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateHUD();
requestAnimationFrame(animate);

})();
</script>
</body>
</html>
