<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurora Borealis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000005; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(5, 5, 20, 0.75);
    border: 1px solid rgba(100, 200, 150, 0.3);
    border-radius: 8px;
    padding: 15px 20px;
    color: #b0e0c0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    backdrop-filter: blur(5px);
    min-width: 200px;
    z-index: 10;
  }
  #hud h3 {
    margin-bottom: 10px;
    color: #60ff90;
    font-size: 16px;
    text-shadow: 0 0 10px rgba(96, 255, 144, 0.5);
  }
  #hud span {
    display: block;
    margin-bottom: 6px;
    line-height: 1.4;
  }
  #hud .btn-row {
    margin-top: 12px;
    display: flex;
    gap: 8px;
  }
  #hud button {
    padding: 6px 14px;
    background: rgba(50, 150, 100, 0.3);
    border: 1px solid rgba(100, 200, 150, 0.5);
    color: #b0e0c0;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    transition: all 0.2s;
  }
  #hud button:hover {
    background: rgba(50, 150, 100, 0.5);
    color: #ffffff;
  }
  #controls-help {
    position: absolute;
    bottom: 15px;
    left: 15px;
    background: rgba(5, 5, 20, 0.6);
    border: 1px solid rgba(100, 200, 150, 0.2);
    border-radius: 8px;
    padding: 10px 15px;
    color: rgba(176, 224, 192, 0.6);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.6;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🌌 Aurora Borealis</h3>
  <span id="intensity-label">Intensity: 70%</span>
  <span id="color-label">Color: Green-Cyan</span>
  <span id="speed-label">Speed: 1.0x</span>
  <span id="layer-label">Layers: 1</span>
  <div class="btn-row">
    <button id="btn-pause">Pause</button>
    <button id="btn-reset">Reset</button>
  </div>
</div>

<div id="controls-help">
  ↑↓ Intensity &nbsp;|&nbsp; C Color &nbsp;|&nbsp; +/- Speed &nbsp;|&nbsp; L Layers<br>
  W/S Camera &nbsp;|&nbsp; G Ground &nbsp;|&nbsp; H Hide Aurora
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Vertex Shader
const auroraVertexShader = `
  uniform float uTime;
  varying vec2 vUv;
  varying float vElevation;
  varying vec3 vPosition;

  void main() {
    vUv = uv;
    vec3 pos = position;

    // Layered sine wave displacement for curtain effect
    pos.x += sin(pos.y * 2.0 + uTime * 0.5) * 0.5;
    pos.z += cos(pos.x * 1.5 + uTime * 0.3) * 0.3;

    // Additional subtle wave layers
    pos.x += sin(pos.y * 3.5 + uTime * 0.7) * 0.2;
    pos.z += sin(pos.y * 1.2 + uTime * 0.4) * 0.15;
    pos.y += cos(pos.x * 0.8 + uTime * 0.2) * 0.1;

    vElevation = pos.y;
    vPosition = pos;

    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
  }
`;

// Fragment Shader
const auroraFragmentShader = `
  uniform float uTime;
  uniform float uIntensity;
  uniform int uColorMode;
  uniform float uLayerOffset;
  varying vec2 vUv;
  varying float vElevation;
  varying vec3 vPosition;

  // Simplex-like noise
  float hash(vec2 p) {
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
  }

  float noise(vec2 p) {
    vec2 i = floor(p);
    vec2 f = fract(p);
    f = f * f * (3.0 - 2.0 * f);
    float a = hash(i);
    float b = hash(i + vec2(1.0, 0.0));
    float c = hash(i + vec2(0.0, 1.0));
    float d = hash(i + vec2(1.0, 1.0));
    return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
  }

  float fbm(vec2 p) {
    float value = 0.0;
    float amplitude = 0.5;
    for (int i = 0; i < 5; i++) {
      value += amplitude * noise(p);
      p *= 2.0;
      amplitude *= 0.5;
    }
    return value;
  }

  void main() {
    vec2 uv = vUv;

    // Create flowing noise pattern
    float n1 = fbm(uv * 3.0 + vec2(uTime * 0.1 + uLayerOffset, uTime * 0.05));
    float n2 = fbm(uv * 5.0 - vec2(uTime * 0.08, uTime * 0.12 + uLayerOffset));
    float n3 = fbm(uv * 2.0 + vec2(uTime * 0.15 + uLayerOffset * 0.5, -uTime * 0.07));

    float pattern = n1 * 0.5 + n2 * 0.3 + n3 * 0.2;

    // Color palettes
    vec3 color1, color2, color3;

    if (uColorMode == 0) {
      // Green-Cyan
      color1 = vec3(0.1, 0.8, 0.3);
      color2 = vec3(0.1, 0.6, 0.9);
      color3 = vec3(0.5, 0.1, 0.8);
    } else if (uColorMode == 1) {
      // Red-Orange
      color1 = vec3(0.9, 0.2, 0.1);
      color2 = vec3(1.0, 0.6, 0.1);
      color3 = vec3(0.8, 0.1, 0.4);
    } else {
      // Purple-Blue
      color1 = vec3(0.5, 0.1, 0.8);
      color2 = vec3(0.1, 0.2, 0.9);
      color3 = vec3(0.2, 0.5, 1.0);
    }

    // Mix colors based on UV and time
    float t1 = sin(uv.x * 3.14159 + uTime * 0.3) * 0.5 + 0.5;
    float t2 = cos(uv.y * 2.0 + uTime * 0.2) * 0.5 + 0.5;

    vec3 color = mix(color1, color2, t1);
    color = mix(color, color3, t2 * 0.4);
    color *= pattern;

    // Vertical fade - stronger in middle, fade at top and bottom
    float verticalFade = smoothstep(0.0, 0.3, uv.y) * smoothstep(1.0, 0.6, uv.y);
    verticalFade = pow(verticalFade, 0.8);

    // Horizontal fade at edges
    float horizontalFade = smoothstep(0.0, 0.15, uv.x) * smoothstep(1.0, 0.85, uv.x);

    // Combine
    float alpha = verticalFade * horizontalFade * pattern * uIntensity * 1.5;

    // Add shimmer
    float shimmer = sin(uv.x * 20.0 + uTime * 2.0) * 0.05 + 
                    sin(uv.y * 15.0 - uTime * 1.5) * 0.05;
    alpha += shimmer * uIntensity;

    alpha = clamp(alpha, 0.0, 1.0);

    // Boost color brightness
    color *= uIntensity * 1.8;

    // Add glow
    color += color * pow(verticalFade, 2.0) * 0.3;

    gl_FragColor = vec4(color, alpha);
  }
`;

// Initialize scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 8);
camera.lookAt(0, 3, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(100, 100);
const groundMaterial = new THREE.MeshBasicMaterial({ color: 0x0a0a15, side: THREE.FrontSide });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -2;
scene.add(ground);

// Starfield
const starCount = 500;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  // Random positions in hemisphere above y=0, radius 50
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI * 0.5; // hemisphere (0 to PI/2)
  const r = 20 + Math.random() * 30; // radius between 20 and 50

  starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.cos(phi); // always positive (above y=0)
  starPositions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
}

const starGeometry = new THREE.BufferGeometry();
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, sizeAttenuation: true });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Aurora curtain creation function
function createAuroraCurtain(zOffset, layerOffset) {
  const geometry = new THREE.PlaneGeometry(20, 8, 128, 64);
  const material = new THREE.ShaderMaterial({
    vertexShader: auroraVertexShader,
    fragmentShader: auroraFragmentShader,
    uniforms: {
      uTime: { value: 0.0 },
      uIntensity: { value: 0.7 },
      uColorMode: { value: 0 },
      uLayerOffset: { value: layerOffset }
    },
    transparent: true,
    blending: THREE.AdditiveBlending,
    side: THREE.DoubleSide,
    depthWrite: false
  });

  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(0, 4, -5 + zOffset);
  return mesh;
}

// Aurora layers management
let auroraLayers = [];

function setupAuroraLayers(count) {
  // Remove existing layers
  auroraLayers.forEach(layer => scene.remove(layer));
  auroraLayers = [];

  for (let i = 0; i < count; i++) {
    const zOffset = i * 1.5;
    const layerOffset = i * 2.5;
    const curtain = createAuroraCurtain(zOffset, layerOffset);
    scene.add(curtain);
    auroraLayers.push(curtain);
  }
}

// Initial aurora setup
setupAuroraLayers(1);

// State management
const colorModeNames = ['Green-Cyan', 'Red-Orange', 'Purple-Blue'];

window.__3D_STATE__ = {
  animating: true,
  elapsedTime: 0,
  intensity: 0.7,
  colorMode: 0,
  cameraY: 2,
  cameraZ: 8,
  curtainVisible: true,
  starCount: 500,
  groundVisible: true,
  speedMultiplier: 1.0,
  layerCount: 1
};

const state = window.__3D_STATE__;

// UI update function
function updateUI() {
  document.getElementById('intensity-label').textContent = 
    `Intensity: ${Math.round(state.intensity * 100)}%`;
  document.getElementById('color-label').textContent = 
    `Color: ${colorModeNames[state.colorMode]}`;
  document.getElementById('speed-label').textContent = 
    `Speed: ${state.speedMultiplier.toFixed(2)}x`;
  document.getElementById('layer-label').textContent = 
    `Layers: ${state.layerCount}`;
}

// Button handlers
document.getElementById('btn-pause').addEventListener('click', () => {
  state.animating = !state.animating;
  document.getElementById('btn-pause').textContent = state.animating ? 'Pause' : 'Resume';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  state.animating = true;
  state.elapsedTime = 0;
  state.intensity = 0.7;
  state.colorMode = 0;
  state.cameraY = 2;
  state.cameraZ = 8;
  state.curtainVisible = true;
  state.groundVisible = true;
  state.speedMultiplier = 1.0;
  state.layerCount = 1;

  camera.position.set(0, state.cameraY, state.cameraZ);
  camera.lookAt(0, 3, 0);

  ground.visible = true;
  setupAuroraLayers(1);

  document.getElementById('btn-pause').textContent = 'Pause';
  updateUI();
});

// Keyboard interactions
document.addEventListener('keydown', (e) => {
  switch (e.key) {
    case 'ArrowUp':
      e.preventDefault();
      state.intensity = Math.min(1.0, Math.round((state.intensity + 0.1) * 10) / 10);
      break;
    case 'ArrowDown':
      e.preventDefault();
      state.intensity = Math.max(0.0, Math.round((state.intensity - 0.1) * 10) / 10);
      break;
    case 'c':
    case 'C':
      state.colorMode = (state.colorMode + 1) % 3;
      break;
    case 'g':
    case 'G':
      state.groundVisible = !state.groundVisible;
      ground.visible = state.groundVisible;
      break;
    case 'h':
    case 'H':
      state.curtainVisible = !state.curtainVisible;
      auroraLayers.forEach(layer => layer.visible = state.curtainVisible);
      break;
    case '+':
    case '=':
      state.speedMultiplier = Math.min(4.0, Math.round((state.speedMultiplier + 0.25) * 100) / 100);
      break;
    case '-':
    case '_':
      state.speedMultiplier = Math.max(0.25, Math.round((state.speedMultiplier - 0.25) * 100) / 100);
      break;
    case 'l':
    case 'L':
      state.layerCount = state.layerCount >= 3 ? 1 : state.layerCount + 1;
      setupAuroraLayers(state.layerCount);
      auroraLayers.forEach(layer => layer.visible = state.curtainVisible);
      break;
    case 'w':
    case 'W':
      state.cameraZ = Math.max(2, state.cameraZ - 0.5);
      break;
    case 's':
    case 'S':
      state.cameraZ = Math.min(15, state.cameraZ + 0.5);
      break;
  }
  updateUI();
});

// Animation loop
const clock = new THREE.Clock();
let previousTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const elapsedClock = clock.getElapsedTime();
  const deltaTime = elapsedClock - previousTime;
  previousTime = elapsedClock;

  if (state.animating) {
    state.elapsedTime += deltaTime * state.speedMultiplier;

    // Rotate starfield
    stars.rotation.y += 0.0001 * state.speedMultiplier;
  }

  // Update camera
  camera.position.y = state.cameraY;
  camera.position.z = state.cameraZ;
  camera.lookAt(0, 3, 0);

  // Update aurora uniforms
  auroraLayers.forEach(layer => {
    layer.material.uniforms.uTime.value = state.elapsedTime;
    layer.material.uniforms.uIntensity.value = state.intensity;
    layer.material.uniforms.uColorMode.value = state.colorMode;
  });

  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial UI update
updateUI();

// Start animation
animate();
</script>
</body>
</html>
