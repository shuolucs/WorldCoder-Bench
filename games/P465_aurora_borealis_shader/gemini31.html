<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Aurora Borealis</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000005;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 20, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            pointer-events: auto;
            min-width: 200px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .hud-row {
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            flex: 1;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .instructions {
            margin-top: 15px;
            font-size: 11px;
            color: #aaa;
            line-height: 1.4;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 10px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="hud-row"><span id="intensity-label">Intensity: 70%</span></div>
        <div class="hud-row"><span id="color-label">Color: Green-Cyan</span></div>
        <div class="hud-row"><span id="speed-label">Speed: 1.0x</span></div>
        <div class="hud-row"><span id="layer-label">Layers: 1</span></div>
        <div class="controls">
            <button id="btn-pause">Pause</button>
            <button id="btn-reset">Reset</button>
        </div>
        <div class="instructions">
            <b>Controls:</b><br>
            &uarr; / &darr; : Adjust Intensity<br>
            C : Cycle Color Mode<br>
            L : Cycle Layers (1-3)<br>
            + / - : Adjust Speed<br>
            W / S : Move Camera Z<br>
            G : Toggle Ground<br>
            H : Toggle Aurora
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- State Management ---
        const defaultState = {
            animating: true,
            elapsedTime: 0,
            intensity: 0.7,
            colorMode: 0,
            cameraY: 2,
            cameraZ: 8,
            curtainVisible: true,
            starCount: 500,
            groundVisible: true,
            speedMultiplier: 1.0,
            layerCount: 1
        };

        window.__3D_STATE__ = { ...defaultState };
        const state = window.__3D_STATE__;

        const colorModeNames = ["Green-Cyan", "Red-Orange", "Purple-Blue"];

        // --- UI Elements ---
        const elIntensity = document.getElementById('intensity-label');
        const elColor = document.getElementById('color-label');
        const elSpeed = document.getElementById('speed-label');
        const elLayer = document.getElementById('layer-label');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');

        function updateUI() {
            elIntensity.innerText = `Intensity: ${(state.intensity * 100).toFixed(0)}%`;
            elColor.innerText = `Color: ${colorModeNames[state.colorMode]}`;
            elSpeed.innerText = `Speed: ${state.speedMultiplier.toFixed(2)}x`;
            elLayer.innerText = `Layers: ${state.layerCount}`;
            btnPause.innerText = state.animating ? "Pause" : "Resume";
        }

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, state.cameraY, state.cameraZ);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshBasicMaterial({ color: 0x0a0a15 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -2;
        scene.add(ground);

        // --- Starfield ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(state.starCount * 3);
        for (let i = 0; i < state.starCount; i++) {
            let x, y, z, r;
            do {
                x = (Math.random() - 0.5) * 2;
                y = Math.random(); // Hemisphere above y=0
                z = (Math.random() - 0.5) * 2;
                r = Math.sqrt(x * x + y * y + z * z);
            } while (r > 1.0 || r === 0);
            
            starPos[i * 3] = (x / r) * 50;
            starPos[i * 3 + 1] = (y / r) * 50;
            starPos[i * 3 + 2] = (z / r) * 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
        const starfield = new THREE.Points(starGeo, starMat);
        scene.add(starfield);

        // --- Aurora Shaders ---
        const auroraVertexShader = `
            uniform float uTime;
            varying vec2 vUv;
            
            void main() {
                vUv = uv;
                vec3 pos = position;
                
                // Displacement formula from requirements
                pos.x += sin(pos.y * 2.0 + uTime * 0.5) * 0.5;
                pos.z += cos(pos.x * 1.5 + uTime * 0.3) * 0.3;
                
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const auroraFragmentShader = `
            uniform float uTime;
            uniform float uIntensity;
            uniform int uColorMode;
            uniform float uLayerOffset;
            
            varying vec2 vUv;
            
            void main() {
                vec3 c1, c2, c3;
                
                if (uColorMode == 0) { // Green-Cyan
                    c1 = vec3(0.1, 0.8, 0.3);
                    c2 = vec3(0.1, 0.6, 0.9);
                    c3 = vec3(0.5, 0.1, 0.8);
                } else if (uColorMode == 1) { // Red-Orange
                    c1 = vec3(0.9, 0.2, 0.1);
                    c2 = vec3(0.8, 0.5, 0.1);
                    c3 = vec3(0.6, 0.1, 0.4);
                } else { // Purple-Blue
                    c1 = vec3(0.4, 0.1, 0.8);
                    c2 = vec3(0.1, 0.2, 0.9);
                    c3 = vec3(0.8, 0.1, 0.5);
                }
                
                // Mix colors based on UV and time, offset by layer
                float mix1 = sin(vUv.x * 4.0 + uTime * 0.3 + uLayerOffset) * 0.5 + 0.5;
                float mix2 = cos(vUv.y * 3.0 - uTime * 0.2 + uLayerOffset * 2.0) * 0.5 + 0.5;
                
                vec3 color = mix(c1, c2, mix1);
                color = mix(color, c3, mix2);
                
                // Alpha fading at edges
                float alpha = smoothstep(0.0, 0.2, vUv.y) * smoothstep(1.0, 0.6, vUv.y);
                alpha *= smoothstep(0.0, 0.1, vUv.x) * smoothstep(1.0, 0.9, vUv.x);
                
                // Vertical striations
                float streaks = sin(vUv.x * 80.0 + uTime + uLayerOffset * 10.0) * 0.5 + 0.5;
                alpha *= mix(0.4, 1.0, streaks);
                
                gl_FragColor = vec4(color * uIntensity, alpha * uIntensity);
            }
        `;

        // --- Aurora Curtain Management ---
        const auroraGroup = new THREE.Group();
        scene.add(auroraGroup);
        
        const auroraGeo = new THREE.PlaneGeometry(20, 8, 128, 64);
        let auroraMaterials = [];

        function buildAuroraLayers() {
            // Clear existing
            while(auroraGroup.children.length > 0){ 
                auroraGroup.remove(auroraGroup.children[0]); 
            }
            auroraMaterials = [];

            for (let i = 0; i < state.layerCount; i++) {
                const mat = new THREE.ShaderMaterial({
                    vertexShader: auroraVertexShader,
                    fragmentShader: auroraFragmentShader,
                    uniforms: {
                        uTime: { value: state.elapsedTime },
                        uIntensity: { value: state.intensity },
                        uColorMode: { value: state.colorMode },
                        uLayerOffset: { value: i * 2.5 } // Slight color/pattern variation
                    },
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    side: THREE.DoubleSide,
                    depthWrite: false
                });
                
                auroraMaterials.push(mat);
                const mesh = new THREE.Mesh(auroraGeo, mat);
                
                // Base position (0, 4, -5), offset Z per layer
                mesh.position.set(0, 4, -5 + (i * 1.5));
                auroraGroup.add(mesh);
            }
        }

        buildAuroraLayers();

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        btnPause.addEventListener('click', () => {
            state.animating = !state.animating;
            updateUI();
        });

        btnReset.addEventListener('click', () => {
            Object.assign(state, defaultState);
            buildAuroraLayers();
            updateUI();
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key;
            
            if (key === 'ArrowUp') {
                state.intensity = Math.min(1.0, state.intensity + 0.1);
            } else if (key === 'ArrowDown') {
                state.intensity = Math.max(0.0, state.intensity - 0.1);
            } else if (key === 'c' || key === 'C') {
                state.colorMode = (state.colorMode + 1) % 3;
            } else if (key === 'g' || key === 'G') {
                state.groundVisible = !state.groundVisible;
            } else if (key === 'h' || key === 'H') {
                state.curtainVisible = !state.curtainVisible;
            } else if (key === '+' || key === '=') {
                state.speedMultiplier = Math.min(4.0, state.speedMultiplier + 0.25);
            } else if (key === '-' || key === '_') {
                state.speedMultiplier = Math.max(0.25, state.speedMultiplier - 0.25);
            } else if (key === 'l' || key === 'L') {
                state.layerCount = state.layerCount >= 3 ? 1 : state.layerCount + 1;
                buildAuroraLayers();
            } else if (key === 'w' || key === 'W') {
                state.cameraZ = Math.max(2.0, state.cameraZ - 0.5);
            } else if (key === 's' || key === 'S') {
                state.cameraZ = Math.min(15.0, state.cameraZ + 0.5);
            }
            
            updateUI();
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (state.animating) {
                state.elapsedTime += delta * state.speedMultiplier;
            }

            // Update Uniforms
            auroraMaterials.forEach(mat => {
                mat.uniforms.uTime.value = state.elapsedTime;
                mat.uniforms.uIntensity.value = state.intensity;
                mat.uniforms.uColorMode.value = state.colorMode;
            });

            // Update Visibility
            ground.visible = state.groundVisible;
            auroraGroup.visible = state.curtainVisible;

            // Update Camera
            camera.position.y = state.cameraY;
            camera.position.z += (state.cameraZ - camera.position.z) * 0.1; // Smooth transition
            camera.lookAt(0, 2, 0); // Keep looking slightly up

            // Rotate Starfield
            if (state.animating) {
                starfield.rotation.y += 0.0001 * state.speedMultiplier;
            }

            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
