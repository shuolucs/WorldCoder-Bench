<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aurora Borealis - Three.js</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000005;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      padding: 12px 14px;
      background: rgba(10, 10, 20, 0.65);
      color: #e8f6ff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      min-width: 180px;
      backdrop-filter: blur(4px);
    }

    #hud .row {
      margin-bottom: 8px;
    }

    #hud span {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
    }

    #hud button {
      margin-right: 8px;
      margin-top: 4px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
    }

    #hud button:hover {
      background: rgba(255,255,255,0.16);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="row"><span id="intensity-label">Intensity: 70%</span></div>
    <div class="row"><span id="color-label">Color: Green-Cyan</span></div>
    <div class="row"><span id="speed-label">Speed: 1.0x</span></div>
    <div class="row"><span id="layer-label">Layers: 1</span></div>
    <div class="row">
      <button id="btn-pause">Pause</button>
      <button id="btn-reset">Reset</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000005);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const defaults = {
      animating: true,
      elapsedTime: 0,
      intensity: 0.7,
      colorMode: 0,
      cameraY: 2,
      cameraZ: 8,
      curtainVisible: true,
      starCount: 500,
      groundVisible: true,
      speedMultiplier: 1.0,
      layerCount: 1
    };

    window.__3D_STATE__ = { ...defaults };

    const colorNames = [
      'Green-Cyan',
      'Red-Orange',
      'Purple-Blue'
    ];

    const hud = {
      intensity: document.getElementById('intensity-label'),
      color: document.getElementById('color-label'),
      speed: document.getElementById('speed-label'),
      layer: document.getElementById('layer-label'),
      pause: document.getElementById('btn-pause'),
      reset: document.getElementById('btn-reset')
    };

    function updateHUD() {
      hud.intensity.textContent = `Intensity: ${Math.round(window.__3D_STATE__.intensity * 100)}%`;
      hud.color.textContent = `Color: ${colorNames[window.__3D_STATE__.colorMode]}`;
      hud.speed.textContent = `Speed: ${window.__3D_STATE__.speedMultiplier.toFixed(2).replace(/\.00$/, '.0').replace(/(\.\d)0$/, '$1')}x`;
      hud.layer.textContent = `Layers: ${window.__3D_STATE__.layerCount}`;
      hud.pause.textContent = window.__3D_STATE__.animating ? 'Pause' : 'Resume';
    }

    const ambient = new THREE.AmbientLight(0x223344, 0.25);
    scene.add(ambient);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({
        color: 0x0a0a15,
        roughness: 1.0,
        metalness: 0.0
      })
    );
    ground.rotation.x = -Math.PI * 0.5;
    ground.position.y = -2;
    scene.add(ground);

    function createStarfield(count = 500, radius = 50) {
      const positions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * (Math.PI * 0.5);
        const r = Math.random() * radius;

        const x = r * Math.cos(theta) * Math.sin(phi);
        const y = Math.abs(r * Math.cos(phi));
        const z = r * Math.sin(theta) * Math.sin(phi);

        positions[i * 3 + 0] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.1,
        sizeAttenuation: true
      });

      return new THREE.Points(geometry, material);
    }

    const stars = createStarfield(defaults.starCount, 50);
    scene.add(stars);

    const auroraGeometry = new THREE.PlaneGeometry(20, 8, 128, 64);

    const vertexShader = `
      uniform float uTime;
      varying vec2 vUv;
      varying float vGlow;

      void main() {
        vUv = uv;
        vec3 pos = position;

        pos.x += sin(pos.y * 2.0 + uTime * 0.5) * 0.5;
        pos.z += cos(pos.x * 1.5 + uTime * 0.3) * 0.3;

        float secondaryWave = sin(pos.y * 4.0 - uTime * 0.8 + pos.x * 0.5) * 0.18;
        float ripple = cos(pos.x * 3.0 + uTime * 0.9) * 0.12 * smoothstep(0.0, 1.0, uv.y);
        pos.z += secondaryWave + ripple;

        vGlow = smoothstep(0.0, 1.0, uv.y);

        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `;

    const fragmentShader = `
      uniform float uTime;
      uniform float uIntensity;
      uniform int uColorMode;
      uniform vec3 uTint;

      varying vec2 vUv;
      varying float vGlow;

      vec3 paletteA(float t) {
        vec3 green = vec3(0.1, 0.8, 0.3);
        vec3 cyan = vec3(0.1, 0.6, 0.9);
        vec3 purple = vec3(0.5, 0.1, 0.8);

        vec3 c1 = mix(green, cyan, smoothstep(0.0, 1.0, t));
        vec3 c2 = mix(cyan, purple, smoothstep(0.0, 1.0, t));
        return mix(c1, c2, 0.35 + 0.25 * sin(uTime * 0.4 + t * 6.2831));
      }

      vec3 paletteB(float t) {
        vec3 red = vec3(0.95, 0.2, 0.2);
        vec3 orange = vec3(1.0, 0.45, 0.08);
        vec3 gold = vec3(1.0, 0.75, 0.2);

        vec3 c1 = mix(red, orange, smoothstep(0.0, 1.0, t));
        return mix(c1, gold, 0.4 + 0.3 * sin(uTime * 0.5 + t * 5.0));
      }

      vec3 paletteC(float t) {
        vec3 purple = vec3(0.5, 0.1, 0.8);
        vec3 blue = vec3(0.15, 0.35, 0.95);
        vec3 violet = vec3(0.7, 0.3, 1.0);

        vec3 c1 = mix(purple, blue, smoothstep(0.0, 1.0, t));
        return mix(c1, violet, 0.45 + 0.25 * cos(uTime * 0.45 + t * 4.0));
      }

      void main() {
        float wave = sin(vUv.x * 8.0 + uTime * 0.7) * 0.5 + 0.5;
        float band = smoothstep(0.0, 0.25, vUv.y) * (1.0 - smoothstep(0.7, 1.0, vUv.y));
        float shimmer = 0.65 + 0.35 * sin((vUv.y * 12.0) - uTime * 1.2 + vUv.x * 3.0);
        float t = clamp(vUv.y * 0.7 + wave * 0.3, 0.0, 1.0);

        vec3 color;
        if (uColorMode == 0) {
          color = paletteA(t);
        } else if (uColorMode == 1) {
          color = paletteB(t);
        } else {
          color = paletteC(t);
        }

        color *= uTint;
        float alpha = band * shimmer * vGlow * uIntensity * 0.85;

        gl_FragColor = vec4(color * (uIntensity * 1.4), alpha);
      }
    `;

    const auroraGroup = new THREE.Group();
    scene.add(auroraGroup);

    let auroraMeshes = [];

    function tintForLayer(index) {
      if (index === 0) return new THREE.Vector3(1.0, 1.0, 1.0);
      if (index === 1) return new THREE.Vector3(0.9, 1.0, 1.08);
      return new THREE.Vector3(1.08, 0.92, 1.0);
    }

    function createAuroraMaterial(layerIndex = 0) {
      return new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: window.__3D_STATE__.elapsedTime },
          uIntensity: { value: window.__3D_STATE__.intensity },
          uColorMode: { value: window.__3D_STATE__.colorMode },
          uTint: { value: tintForLayer(layerIndex) }
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      });
    }

    function rebuildAuroraLayers() {
      while (auroraGroup.children.length > 0) {
        const child = auroraGroup.children.pop();
        auroraGroup.remove(child);
        if (child.material) child.material.dispose();
      }

      auroraMeshes = [];

      for (let i = 0; i < window.__3D_STATE__.layerCount; i++) {
        const material = createAuroraMaterial(i);
        const mesh = new THREE.Mesh(auroraGeometry, material);
        mesh.position.set(0, 4, -5 + i * 1.5);
        mesh.visible = window.__3D_STATE__.curtainVisible;

        if (i > 0) {
          mesh.scale.set(1.02 + i * 0.02, 1.0 + i * 0.01, 1.0);
          mesh.rotation.y = (i % 2 === 0 ? 1 : -1) * 0.03 * i;
        }

        auroraGroup.add(mesh);
        auroraMeshes.push(mesh);
      }
    }

    rebuildAuroraLayers();

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function applyStateToScene() {
      camera.position.y = window.__3D_STATE__.cameraY;
      camera.position.z = window.__3D_STATE__.cameraZ;
      camera.lookAt(0, 0, 0);

      ground.visible = window.__3D_STATE__.groundVisible;
      auroraMeshes.forEach(mesh => {
        mesh.visible = window.__3D_STATE__.curtainVisible;
      });

      updateHUD();
    }

    function resetState() {
      Object.assign(window.__3D_STATE__, defaults);
      rebuildAuroraLayers();
      applyStateToScene();
    }

    hud.pause.addEventListener('click', () => {
      window.__3D_STATE__.animating = !window.__3D_STATE__.animating;
      updateHUD();
    });

    hud.reset.addEventListener('click', () => {
      resetState();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key;

      if (key === 'ArrowUp') {
        window.__3D_STATE__.intensity = clamp(window.__3D_STATE__.intensity + 0.1, 0.0, 1.0);
      } else if (key === 'ArrowDown') {
        window.__3D_STATE__.intensity = clamp(window.__3D_STATE__.intensity - 0.1, 0.0, 1.0);
      } else if (key === 'c' || key === 'C') {
        window.__3D_STATE__.colorMode = (window.__3D_STATE__.colorMode + 1) % 3;
      } else if (key === 'g' || key === 'G') {
        window.__3D_STATE__.groundVisible = !window.__3D_STATE__.groundVisible;
      } else if (key === 'h' || key === 'H') {
        window.__3D_STATE__.curtainVisible = !window.__3D_STATE__.curtainVisible;
      } else if (key === '+' || key === '=') {
        window.__3D_STATE__.speedMultiplier = clamp(window.__3D_STATE__.speedMultiplier + 0.25, 0.25, 4.0);
      } else if (key === '-' || key === '_') {
        window.__3D_STATE__.speedMultiplier = clamp(window.__3D_STATE__.speedMultiplier - 0.25, 0.25, 4.0);
      } else if (key === 'l' || key === 'L') {
        window.__3D_STATE__.layerCount = window.__3D_STATE__.layerCount % 3 + 1;
        rebuildAuroraLayers();
      } else if (key === 'w' || key === 'W') {
        window.__3D_STATE__.cameraZ = clamp(window.__3D_STATE__.cameraZ - 0.5, 2, 15);
      } else if (key === 's' || key === 'S') {
        window.__3D_STATE__.cameraZ = clamp(window.__3D_STATE__.cameraZ + 0.5, 2, 15);
      }

      applyStateToScene();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const deltaTime = clock.getDelta();

      if (window.__3D_STATE__.animating) {
        window.__3D_STATE__.elapsedTime += deltaTime * window.__3D_STATE__.speedMultiplier;
      }

      auroraMeshes.forEach((mesh, index) => {
        mesh.material.uniforms.uTime.value = window.__3D_STATE__.elapsedTime + index * 0.4;
        mesh.material.uniforms.uIntensity.value = window.__3D_STATE__.intensity;
        mesh.material.uniforms.uColorMode.value = window.__3D_STATE__.colorMode;
      });

      stars.rotation.y += 0.0001 * window.__3D_STATE__.speedMultiplier;

      ground.visible = window.__3D_STATE__.groundVisible;
      auroraMeshes.forEach(mesh => {
        mesh.visible = window.__3D_STATE__.curtainVisible;
      });

      camera.position.y = window.__3D_STATE__.cameraY;
      camera.position.z = window.__3D_STATE__.cameraZ;
      camera.lookAt(0, 0, 0);

      window.__3D_STATE__.starCount = defaults.starCount;

      updateHUD();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyStateToScene();
    updateHUD();
    animate();
  </script>
</body>
</html>
