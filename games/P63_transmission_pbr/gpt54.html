<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js MeshPhysicalMaterial 玻璃场景</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 300px;
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(20, 20, 28, 0.78);
      color: #fff;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    #panel h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      margin-bottom: 10px;
    }

    .row label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #d9e2ff;
    }

    .row select,
    .row input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }

    .value {
      float: right;
      color: #9fd3ff;
      font-size: 12px;
    }

    #hint {
      margin-top: 8px;
      font-size: 12px;
      color: #c7c7c7;
      line-height: 1.5;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="panel">
      <h2>玻璃材质控制</h2>

      <div class="row">
        <label for="objectSelect">选择物体</label>
        <select id="objectSelect">
          <option value="GlassSphere">GlassSphere</option>
          <option value="GlassTorus">GlassTorus</option>
          <option value="GlassIcosahedron">GlassIcosahedron</option>
          <option value="GlassKnot">GlassKnot</option>
          <option value="GlassCylinder">GlassCylinder</option>
        </select>
      </div>

      <div class="row">
        <label for="transmissionSlider">
          Transmission
          <span class="value" id="transmissionValue"></span>
        </label>
        <input id="transmissionSlider" type="range" min="0" max="1" step="0.01" />
      </div>

      <div class="row">
        <label for="iorSlider">
          IOR
          <span class="value" id="iorValue"></span>
        </label>
        <input id="iorSlider" type="range" min="1" max="2.5" step="0.01" />
      </div>

      <div class="row">
        <label for="thicknessSlider">
          Thickness
          <span class="value" id="thicknessValue"></span>
        </label>
        <input id="thicknessSlider" type="range" min="0" max="5" step="0.01" />
      </div>

      <div class="row">
        <label for="roughnessSlider">
          Roughness
          <span class="value" id="roughnessValue"></span>
        </label>
        <input id="roughnessSlider" type="range" min="0" max="1" step="0.01" />
      </div>

      <div id="hint">
        鼠标拖拽可旋转视角，滚轮缩放。<br>
        下拉选择当前编辑的玻璃物体，并实时调节其透射、折射率、厚度与粗糙度。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    const app = document.getElementById('app');

    const objectSelect = document.getElementById('objectSelect');
    const transmissionSlider = document.getElementById('transmissionSlider');
    const iorSlider = document.getElementById('iorSlider');
    const thicknessSlider = document.getElementById('thicknessSlider');
    const roughnessSlider = document.getElementById('roughnessSlider');

    const transmissionValue = document.getElementById('transmissionValue');
    const iorValue = document.getElementById('iorValue');
    const thicknessValue = document.getElementById('thicknessValue');
    const roughnessValue = document.getElementById('roughnessValue');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101216);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3.2, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.2, 0);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envRT = pmremGenerator.fromScene(new RoomEnvironment(renderer), 0.04);
    scene.environment = envRT.texture;

    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 6);
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({
        color: 0x2b2f36,
        roughness: 0.92,
        metalness: 0.02
      })
    );
    floor.rotation.x = -Math.PI * 0.5;
    floor.position.y = -1.2;
    scene.add(floor);

    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 16),
      new THREE.MeshStandardMaterial({
        color: 0x1a2230,
        roughness: 0.85,
        metalness: 0.03
      })
    );
    backWall.position.set(0, 6, -8);
    scene.add(backWall);

    function createGlassMaterial(color, transmission, ior, thickness, roughness) {
      return new THREE.MeshPhysicalMaterial({
        color,
        metalness: 0.02,
        roughness,
        transmission,
        ior,
        thickness,
        transparent: true,
        opacity: 1,
        envMapIntensity: 1.2,
        clearcoat: 0.15,
        clearcoatRoughness: 0.05
      });
    }

    const glassObjects = [];

    function addGlassObject(name, geometry, position, color, params) {
      const material = createGlassMaterial(
        color,
        params.transmission,
        params.ior,
        params.thickness,
        params.roughness
      );

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(position);
      mesh.userData.name = name;
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      scene.add(mesh);
      glassObjects.push(mesh);
      return mesh;
    }

    addGlassObject(
      'GlassSphere',
      new THREE.SphereGeometry(1.05, 64, 64),
      new THREE.Vector3(-4.5, 0.2, 0),
      0xbfe8ff,
      { transmission: 0.98, ior: 1.50, thickness: 1.2, roughness: 0.03 }
    );

    addGlassObject(
      'GlassTorus',
      new THREE.TorusGeometry(0.9, 0.34, 32, 100),
      new THREE.Vector3(-2.1, 0.3, 0),
      0xd7c2ff,
      { transmission: 0.95, ior: 1.35, thickness: 1.8, roughness: 0.08 }
    );

    addGlassObject(
      'GlassIcosahedron',
      new THREE.IcosahedronGeometry(1.0, 0),
      new THREE.Vector3(0.3, 0.25, 0),
      0xc8ffd8,
      { transmission: 0.92, ior: 1.60, thickness: 2.4, roughness: 0.12 }
    );

    addGlassObject(
      'GlassKnot',
      new THREE.TorusKnotGeometry(0.72, 0.24, 180, 24),
      new THREE.Vector3(2.8, 0.45, 0),
      0xffd2de,
      { transmission: 0.97, ior: 1.45, thickness: 1.6, roughness: 0.05 }
    );

    addGlassObject(
      'GlassCylinder',
      new THREE.CylinderGeometry(0.75, 0.75, 2.1, 48, 1),
      new THREE.Vector3(5.0, 0.2, 0),
      0xffefbf,
      { transmission: 0.94, ior: 1.25, thickness: 3.0, roughness: 0.18 }
    );

    const objectMap = new Map();
    glassObjects.forEach(obj => objectMap.set(obj.userData.name, obj));

    function getSelectedObject() {
      return objectMap.get(objectSelect.value);
    }

    function setHighlight(selectedName) {
      glassObjects.forEach(obj => {
        const isSelected = obj.userData.name === selectedName;
        obj.scale.setScalar(isSelected ? 1.08 : 1.0);
        obj.material.emissive = new THREE.Color(isSelected ? 0x111111 : 0x000000);
        obj.material.emissiveIntensity = isSelected ? 0.15 : 0.0;
      });
    }

    function updateUIFromSelected() {
      const obj = getSelectedObject();
      if (!obj) return;

      transmissionSlider.value = obj.material.transmission;
      iorSlider.value = obj.material.ior;
      thicknessSlider.value = obj.material.thickness;
      roughnessSlider.value = obj.material.roughness;

      transmissionValue.textContent = Number(obj.material.transmission).toFixed(2);
      iorValue.textContent = Number(obj.material.ior).toFixed(2);
      thicknessValue.textContent = Number(obj.material.thickness).toFixed(2);
      roughnessValue.textContent = Number(obj.material.roughness).toFixed(2);

      setHighlight(obj.userData.name);
      updateGlobalState();
    }

    function applySliderValues() {
      const obj = getSelectedObject();
      if (!obj) return;

      obj.material.transmission = parseFloat(transmissionSlider.value);
      obj.material.ior = parseFloat(iorSlider.value);
      obj.material.thickness = parseFloat(thicknessSlider.value);
      obj.material.roughness = parseFloat(roughnessSlider.value);
      obj.material.needsUpdate = true;

      transmissionValue.textContent = Number(obj.material.transmission).toFixed(2);
      iorValue.textContent = Number(obj.material.ior).toFixed(2);
      thicknessValue.textContent = Number(obj.material.thickness).toFixed(2);
      roughnessValue.textContent = Number(obj.material.roughness).toFixed(2);

      updateGlobalState();
    }

    function updateGlobalState() {
      const obj = getSelectedObject();
      window.__3D_STATE__ = {
        selectedObject: obj ? obj.userData.name : '',
        transmission: obj ? obj.material.transmission : 0,
        ior: obj ? obj.material.ior : 0,
        thickness: obj ? obj.material.thickness : 0,
        roughness: obj ? obj.material.roughness : 0,
        objectCount: 5
      };
    }

    objectSelect.addEventListener('change', updateUIFromSelected);
    transmissionSlider.addEventListener('input', applySliderValues);
    iorSlider.addEventListener('input', applySliderValues);
    thicknessSlider.addEventListener('input', applySliderValues);
    roughnessSlider.addEventListener('input', applySliderValues);

    objectSelect.value = 'GlassSphere';
    updateUIFromSelected();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      glassObjects[0].rotation.y = t * 0.45;
      glassObjects[1].rotation.x = t * 0.35;
      glassObjects[1].rotation.y = t * 0.55;
      glassObjects[2].rotation.y = t * 0.4;
      glassObjects[2].rotation.z = t * 0.25;
      glassObjects[3].rotation.x = t * 0.6;
      glassObjects[3].rotation.y = t * 0.3;
      glassObjects[4].rotation.y = t * 0.4;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.addEventListener('beforeunload', () => {
      envRT.dispose();
      pmremGenerator.dispose();
      renderer.dispose();
    });
  </script>
</body>
</html>
