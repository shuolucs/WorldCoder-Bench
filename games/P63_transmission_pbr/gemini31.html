<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Glass Materials</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.8);
            color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 300px;
            backdrop-filter: blur(5px);
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        select, input[type="range"] {
            width: 100%;
            box-sizing: border-box;
        }
        select {
            padding: 5px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }
        .value-display {
            font-family: monospace;
            color: #aaa;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="objectSelect">Selected Object</label>
            <select id="objectSelect"></select>
        </div>
        <div class="control-group">
            <label for="transmissionSlider">Transmission <span id="transVal" class="value-display">1.00</span></label>
            <input type="range" id="transmissionSlider" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="control-group">
            <label for="iorSlider">IOR (Index of Refraction) <span id="iorVal" class="value-display">1.50</span></label>
            <input type="range" id="iorSlider" min="1" max="2.33" step="0.01" value="1.5">
        </div>
        <div class="control-group">
            <label for="thicknessSlider">Thickness <span id="thickVal" class="value-display">2.0</span></label>
            <input type="range" id="thicknessSlider" min="0" max="10" step="0.1" value="2">
        </div>
        <div class="control-group">
            <label for="roughnessSlider">Roughness <span id="roughVal" class="value-display">0.05</span></label>
            <input type="range" id="roughnessSlider" min="0" max="1" step="0.01" value="0.05">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // Initialize State
        window.__3D_STATE__ = {
            selectedObject: '',
            transmission: 1.0,
            ior: 1.5,
            thickness: 2.0,
            roughness: 0.05,
            objectCount: 5
        };

        // Scene Setup
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Environment & Lighting
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        const envTexture = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
        scene.environment = envTexture;
        scene.background = envTexture; // Set background to environment to clearly see refraction

        // Objects Setup
        const objects = [];
        const geometries = [
            new THREE.SphereGeometry(1, 64, 64),
            new THREE.TorusGeometry(0.8, 0.3, 32, 100),
            new THREE.IcosahedronGeometry(1, 0),
            new THREE.CylinderGeometry(0.8, 0.8, 2, 32),
            new THREE.TorusKnotGeometry(0.6, 0.25, 128, 32)
        ];
        const names = ["Sphere", "Torus", "Icosahedron", "Cylinder", "TorusKnot"];
        const positions = [
            [-5, 0, 0], [-2.5, 0, 0], [0, 0, 0], [2.5, 0, 0], [5, 0, 0]
        ];

        const baseMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.0,
            roughness: 0.05,
            transmission: 1.0,
            ior: 1.5,
            thickness: 2.0,
            transparent: true,
            side: THREE.DoubleSide
        });

        for (let i = 0; i < 5; i++) {
            const material = baseMaterial.clone();
            const mesh = new THREE.Mesh(geometries[i], material);
            mesh.position.fromArray(positions[i]);
            mesh.userData.name = names[i];
            scene.add(mesh);
            objects.push(mesh);
        }

        // UI Elements
        const select = document.getElementById('objectSelect');
        const transSlider = document.getElementById('transmissionSlider');
        const iorSlider = document.getElementById('iorSlider');
        const thickSlider = document.getElementById('thicknessSlider');
        const roughSlider = document.getElementById('roughnessSlider');
        
        const transVal = document.getElementById('transVal');
        const iorVal = document.getElementById('iorVal');
        const thickVal = document.getElementById('thickVal');
        const roughVal = document.getElementById('roughVal');

        let currentObject = objects[0];

        // Populate Select
        names.forEach(name => {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            select.appendChild(option);
        });

        // Update UI and State from Object
        function updateUI() {
            const mat = currentObject.material;
            
            transSlider.value = mat.transmission;
            iorSlider.value = mat.ior;
            thickSlider.value = mat.thickness;
            roughSlider.value = mat.roughness;

            transVal.textContent = mat.transmission.toFixed(2);
            iorVal.textContent = mat.ior.toFixed(2);
            thickVal.textContent = mat.thickness.toFixed(1);
            roughVal.textContent = mat.roughness.toFixed(2);

            window.__3D_STATE__.selectedObject = currentObject.userData.name;
            window.__3D_STATE__.transmission = mat.transmission;
            window.__3D_STATE__.ior = mat.ior;
            window.__3D_STATE__.thickness = mat.thickness;
            window.__3D_STATE__.roughness = mat.roughness;
        }

        // Event Listeners
        select.addEventListener('change', (e) => {
            currentObject = objects.find(o => o.userData.name === e.target.value);
            updateUI();
        });

        function bindSlider(slider, display, prop) {
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                currentObject.material[prop] = val;
                display.textContent = prop === 'thickness' ? val.toFixed(1) : val.toFixed(2);
                window.__3D_STATE__[prop] = val;
            });
        }

        bindSlider(transSlider, transVal, 'transmission');
        bindSlider(iorSlider, iorVal, 'ior');
        bindSlider(thickSlider, thickVal, 'thickness');
        bindSlider(roughSlider, roughVal, 'roughness');

        // Initial UI Update
        updateUI();

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Subtle rotation for better refraction visualization
            objects.forEach((obj, index) => {
                obj.rotation.y += delta * 0.2 * (index % 2 === 0 ? 1 : -1);
                obj.rotation.x += delta * 0.1;
                obj.position.y = Math.sin(time * 2 + index) * 0.2;
            });

            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
