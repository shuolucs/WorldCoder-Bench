<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sunglasses Try-On</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.7);
            padding: 20px;
            border-radius: 12px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            width: 250px;
        }
        #scale-display {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 25, 0.7);
            padding: 8px 20px;
            border-radius: 20px;
            z-index: 10;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
            letter-spacing: 1px;
        }
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: 0 0 250px rgba(0,0,0,0.95) inset;
            z-index: 5;
            pointer-events: none;
            display: none;
        }
        .screenshot-mode #ui-panel, 
        .screenshot-mode #scale-display {
            display: none;
        }
        .screenshot-mode .vignette {
            display: block;
        }
        button {
            padding: 10px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .slider-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            color: #ccc;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .instructions {
            font-size: 0.8em;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.4;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="vignette"></div>
    
    <div id="ui-panel">
        <button id="tryOnBtn">Try On</button>
        <button id="styleBtn">Style: Classic</button>
        
        <div class="slider-container">
            <div class="slider-header">
                <span>Lens Tint</span>
                <span id="tintLabel">50%</span>
            </div>
            <input type="range" id="tintSlider" min="0" max="100" value="50">
        </div>
        
        <button id="screenshotBtn">📷 Screenshot Mode</button>

        <div class="instructions">
            <strong>Controls:</strong><br>
            [S] Cycle Styles<br>
            [+] / [-] Adjust Size<br>
            [R] Toggle Spin<br>
            Drag to rotate camera
        </div>
    </div>

    <div id="scale-display">Scale: 100%</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            isWorn: false,
            currentStyleIndex: 0,
            currentStyleName: 'Classic',
            lensOpacity: 0.55,
            sunglassesScale: 1.0,
            isSpinning: false,
            screenshotMode: false,
            sunglassesPosition: { x: 0, y: 1.6, z: 0.5 },
            frameColor: '#000000',
            lensColor: '#222222',
            animating: false
        };
        const state = window.__3D_STATE__;

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0); // Transparent to show CSS gradient
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1.5, 0);
        // Limit vertical rotation between -30° and 30° from horizontal
        controls.minPolarAngle = Math.PI / 2 - Math.PI / 6;
        controls.maxPolarAngle = Math.PI / 2 + Math.PI / 6;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
        keyLight.position.set(3, 4, 2);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
        fillLight.position.set(-2, 1, -1);
        scene.add(fillLight);

        // Load GLTF Model (Lamp)
        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/IridescenceLamp.glb',
            (gltf) => {
                const lamp = gltf.scene;
                lamp.position.set(-1.5, 0, -0.5);
                lamp.scale.setScalar(0.8);
                scene.add(lamp);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load lamp model, continuing without it.', error);
                state.modelLoaded = true;
            }
        );

        // Procedural Face Mannequin
        const headGeo = new THREE.SphereGeometry(0.4, 64, 64);
        const headMat = new THREE.MeshStandardMaterial({ 
            color: 0xe8beac,
            roughness: 0.6,
            metalness: 0.1
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.set(0, 1.5, 0);
        head.scale.set(1, 1.2, 1);
        scene.add(head);

        // Procedural Sunglasses
        const sunglassesGroup = new THREE.Group();
        
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.3, metalness: 0.8 });
        const lensMat = new THREE.MeshPhysicalMaterial({ 
            color: 0x222222, 
            transparent: true, 
            opacity: state.lensOpacity,
            roughness: 0.05,
            metalness: 0.5,
            clearcoat: 1.0,
            clearcoatRoughness: 0.1
        });

        // Frames
        const frameGeo = new THREE.TorusGeometry(0.15, 0.015, 16, 64);
        const leftFrame = new THREE.Mesh(frameGeo, frameMat);
        leftFrame.position.set(-0.16, 0, 0);
        const rightFrame = new THREE.Mesh(frameGeo, frameMat);
        rightFrame.position.set(0.16, 0, 0);

        // Bridge
        const bridgeGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.08, 16);
        const bridge = new THREE.Mesh(bridgeGeo, frameMat);
        bridge.rotation.z = Math.PI / 2;
        bridge.position.set(0, 0, 0);

        // Arms
        const armGeo = new THREE.BoxGeometry(0.015, 0.015, 0.3);
        const leftArm = new THREE.Mesh(armGeo, frameMat);
        leftArm.position.set(-0.31, 0, -0.15);
        const rightArm = new THREE.Mesh(armGeo, frameMat);
        rightArm.position.set(0.31, 0, -0.15);

        // Lenses
        const lensGeo = new THREE.CircleGeometry(0.14, 32);
        const leftLens = new THREE.Mesh(lensGeo, lensMat);
        leftLens.position.set(-0.16, 0, 0.005);
        const rightLens = new THREE.Mesh(lensGeo, lensMat);
        rightLens.position.set(0.16, 0, 0.005);

        sunglassesGroup.add(leftFrame, rightFrame, bridge, leftArm, rightArm, leftLens, rightLens);
        
        const floatPos = new THREE.Vector3(0, 1.6, 0.5);
        const wornPos = new THREE.Vector3(0, 1.65, 0.38);
        sunglassesGroup.position.copy(floatPos);
        scene.add(sunglassesGroup);

        // Styles
        const styles = [
            { name: 'Classic', frame: 0x000000, lens: 0x222222 },
            { name: 'Aviator', frame: 0xffd700, lens: 0x2e8b57 },
            { name: 'Sport', frame: 0xff0000, lens: 0xff8c00 },
            { name: 'Retro', frame: 0x8b4513, lens: 0xffbf00 },
            { name: 'Cyber', frame: 0xc0c0c0, lens: 0x00bfff }
        ];

        function applyStyle(index) {
            const style = styles[index];
            frameMat.color.setHex(style.frame);
            lensMat.color.setHex(style.lens);
            
            state.currentStyleIndex = index;
            state.currentStyleName = style.name;
            state.frameColor = '#' + style.frame.toString(16).padStart(6, '0');
            state.lensColor = '#' + style.lens.toString(16).padStart(6, '0');
            
            document.getElementById('styleBtn').innerText = `Style: ${style.name}`;
        }

        // Animation Variables
        let animStartPos = new THREE.Vector3();
        let animEndPos = new THREE.Vector3();
        let animStartTime = 0;
        const animDuration = 500;

        // Interactions
        document.getElementById('tryOnBtn').addEventListener('click', () => {
            if (state.animating) return;
            state.isWorn = !state.isWorn;
            state.animating = true;
            animStartTime = performance.now();
            animStartPos.copy(sunglassesGroup.position);
            animEndPos.copy(state.isWorn ? wornPos : floatPos);
            
            document.getElementById('tryOnBtn').innerText = state.isWorn ? 'Remove' : 'Try On';
            
            if (state.isWorn) {
                sunglassesGroup.rotation.y = 0; // Reset rotation when wearing
            }
        });

        document.getElementById('styleBtn').addEventListener('click', () => {
            applyStyle((state.currentStyleIndex + 1) % styles.length);
        });

        const tintSlider = document.getElementById('tintSlider');
        const tintLabel = document.getElementById('tintLabel');
        tintSlider.addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            const opacity = 0.2 + (val / 100) * 0.7; // Map 0-100 to 0.2-0.9
            lensMat.opacity = opacity;
            state.lensOpacity = opacity;
            tintLabel.innerText = `${val}%`;
        });

        document.getElementById('screenshotBtn').addEventListener('click', () => {
            state.screenshotMode = !state.screenshotMode;
            document.body.classList.toggle('screenshot-mode', state.screenshotMode);
        });

        function updateScale(newScale) {
            state.sunglassesScale = Math.max(0.5, Math.min(1.5, newScale));
            sunglassesGroup.scale.setScalar(state.sunglassesScale);
            document.getElementById('scale-display').innerText = `Scale: ${Math.round(state.sunglassesScale * 100)}%`;
        }

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 's') {
                applyStyle((state.currentStyleIndex + 1) % styles.length);
            } else if (key === '+' || key === '=') {
                updateScale(state.sunglassesScale + 0.1);
            } else if (key === '-') {
                updateScale(state.sunglassesScale - 0.1);
            } else if (key === 'r') {
                state.isSpinning = !state.isSpinning;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        applyStyle(0);

        // Animation Loop
        function animate(time) {
            requestAnimationFrame(animate);

            controls.update();

            // Handle Try-On Animation
            if (state.animating) {
                let t = (time - animStartTime) / animDuration;
                if (t >= 1) {
                    t = 1;
                    state.animating = false;
                }
                // Ease in out cubic
                const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
                sunglassesGroup.position.lerpVectors(animStartPos, animEndPos, ease);
            } 
            // Handle Spinning
            else if (state.isSpinning && !state.isWorn) {
                sunglassesGroup.rotation.y += 0.02;
            }

            // Update State Position
            state.sunglassesPosition.x = sunglassesGroup.position.x;
            state.sunglassesPosition.y = sunglassesGroup.position.y;
            state.sunglassesPosition.z = sunglassesGroup.position.z;

            renderer.render(scene, camera);
        }

        animate(performance.now());
    </script>
</body>
</html>
