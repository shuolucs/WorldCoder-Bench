<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sunglasses Try-On</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 5;
    }

    #panel {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(10, 12, 20, 0.65);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px;
      min-width: 240px;
      backdrop-filter: blur(8px);
      color: #fff;
      pointer-events: auto;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    #panel .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #panel .row:last-child {
      margin-bottom: 0;
    }

    button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.14);
    }

    #styleBtn {
      min-width: 120px;
      text-align: center;
    }

    label {
      font-size: 13px;
      opacity: 0.92;
    }

    input[type="range"] {
      width: 140px;
      cursor: pointer;
    }

    #scaleDisplay {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 14px;
      letter-spacing: 0.3px;
      pointer-events: none;
      z-index: 5;
    }

    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 4;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0) 45%,
          rgba(0,0,0,0.15) 62%,
          rgba(0,0,0,0.35) 78%,
          rgba(0,0,0,0.58) 100%);
    }

    .screenshot-mode #panel,
    .screenshot-mode #scaleDisplay {
      display: none;
    }

    .screenshot-mode #vignette {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="vignette"></div>

    <div id="ui">
      <div id="panel">
        <div class="row">
          <button id="tryOnBtn">Try On</button>
          <button id="styleBtn">Classic</button>
          <button id="screenshotBtn" title="Screenshot Mode">📷</button>
        </div>
        <div class="row">
          <label for="tintSlider" id="tintLabel">Tint: 50%</label>
          <input id="tintSlider" type="range" min="0" max="100" value="50" />
        </div>
      </div>

      <div id="scaleDisplay">Scale: 100%</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const tryOnBtn = document.getElementById("tryOnBtn");
    const styleBtn = document.getElementById("styleBtn");
    const tintSlider = document.getElementById("tintSlider");
    const tintLabel = document.getElementById("tintLabel");
    const screenshotBtn = document.getElementById("screenshotBtn");
    const scaleDisplay = document.getElementById("scaleDisplay");

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    // Gradient background plane with shader
    const bgScene = new THREE.Scene();
    const bgCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    const bgMaterial = new THREE.ShaderMaterial({
      depthWrite: false,
      depthTest: false,
      uniforms: {
        topColor: { value: new THREE.Color("#1a1a2e") },
        bottomColor: { value: new THREE.Color("#16213e") }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = vec4(position.xy, 0.0, 1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        void main() {
          vec3 color = mix(bottomColor, topColor, vUv.y);
          gl_FragColor = vec4(color, 1.0);
        }
      `
    });
    const bgQuad = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), bgMaterial);
    bgScene.add(bgQuad);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);
    controls.minPolarAngle = THREE.MathUtils.degToRad(60);
    controls.maxPolarAngle = THREE.MathUtils.degToRad(120);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
    keyLight.position.set(3, 4, 2);
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
    fillLight.position.set(-2, 1, -1);
    scene.add(fillLight);

    // Simple shelf/table
    const table = new THREE.Mesh(
      new THREE.BoxGeometry(3.5, 0.08, 1.6),
      new THREE.MeshStandardMaterial({ color: "#3b2f2f", roughness: 0.85, metalness: 0.08 })
    );
    table.position.set(0, 0.75, -0.55);
    scene.add(table);

    const tableLeg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, 0.7, 16),
      new THREE.MeshStandardMaterial({ color: "#2a2222", roughness: 0.9 })
    );
    tableLeg.position.set(0, 0.39, -0.55);
    scene.add(tableLeg);

    // Floor
    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.MeshStandardMaterial({ color: "#202738", roughness: 1.0, metalness: 0.0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    // Load decorative GLB
    const gltfLoader = new GLTFLoader();
    let lampLoaded = false;
    gltfLoader.load(
      "IridescenceLamp.glb",
      (gltf) => {
        const lamp = gltf.scene;
        lamp.position.set(-1.5, 0, -0.5);
        lamp.scale.set(0.8, 0.8, 0.8);
        scene.add(lamp);
        lampLoaded = true;
      },
      undefined,
      () => {
        lampLoaded = false;
      }
    );

    // Mannequin head
    const mannequin = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 32, 32),
      new THREE.MeshStandardMaterial({
        color: "#e8beac",
        roughness: 0.9,
        metalness: 0.05
      })
    );
    mannequin.scale.set(1, 1.2, 1);
    mannequin.position.set(0, 1.5, 0);
    scene.add(mannequin);

    // Neck
    const neck = new THREE.Mesh(
      new THREE.CylinderGeometry(0.12, 0.14, 0.25, 20),
      new THREE.MeshStandardMaterial({
        color: "#d9ad99",
        roughness: 0.95
      })
    );
    neck.position.set(0, 1.0, 0);
    scene.add(neck);

    // Sunglasses
    const sunglassesGroup = new THREE.Group();
    sunglassesGroup.name = "sunglassesGroup";
    scene.add(sunglassesGroup);

    const frameMat = new THREE.MeshStandardMaterial({
      color: "#111111",
      roughness: 0.35,
      metalness: 0.45
    });

    const lensMat = new THREE.MeshStandardMaterial({
      color: "#444444",
      roughness: 0.1,
      metalness: 0.2,
      transparent: true,
      opacity: 0.55,
      side: THREE.DoubleSide
    });

    const leftFrame = new THREE.Mesh(
      new THREE.TorusGeometry(0.15, 0.015, 16, 64),
      frameMat
    );
    leftFrame.position.set(-0.18, 0, 0);

    const rightFrame = new THREE.Mesh(
      new THREE.TorusGeometry(0.15, 0.015, 16, 64),
      frameMat
    );
    rightFrame.position.set(0.18, 0, 0);

    const bridge = new THREE.Mesh(
      new THREE.CylinderGeometry(0.012, 0.012, 0.08, 16),
      frameMat
    );
    bridge.rotation.z = Math.PI / 2;
    bridge.position.set(0, 0.02, 0);

    const leftArm = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.015, 0.38),
      frameMat
    );
    leftArm.position.set(-0.32, 0.03, -0.16);
    leftArm.rotation.x = THREE.MathUtils.degToRad(-8);
    leftArm.rotation.y = THREE.MathUtils.degToRad(8);

    const rightArm = new THREE.Mesh(
      new THREE.BoxGeometry(0.04, 0.015, 0.38),
      frameMat
    );
    rightArm.position.set(0.32, 0.03, -0.16);
    rightArm.rotation.x = THREE.MathUtils.degToRad(-8);
    rightArm.rotation.y = THREE.MathUtils.degToRad(-8);

    const leftLens = new THREE.Mesh(
      new THREE.CircleGeometry(0.14, 48),
      lensMat
    );
    leftLens.position.set(-0.18, 0, 0);
    leftLens.rotation.y = Math.PI;

    const rightLens = new THREE.Mesh(
      new THREE.CircleGeometry(0.14, 48),
      lensMat
    );
    rightLens.position.set(0.18, 0, 0);
    rightLens.rotation.y = Math.PI;

    sunglassesGroup.add(leftFrame, rightFrame, bridge, leftArm, rightArm, leftLens, rightLens);
    sunglassesGroup.position.set(0, 1.6, 0.5);

    const frameMeshes = [leftFrame, rightFrame, bridge, leftArm, rightArm];
    const lensMeshes = [leftLens, rightLens];

    const styles = [
      { name: "Classic", frame: "#111111", lens: "#444444", opacity: 0.55 },
      { name: "Aviator", frame: "#d4af37", lens: "#4f6f52", opacity: 0.5 },
      { name: "Sport", frame: "#c62828", lens: "#ff8c42", opacity: 0.6 },
      { name: "Retro", frame: "#6b4423", lens: "#c88719", opacity: 0.58 },
      { name: "Cyber", frame: "#c0c7d1", lens: "#4da3ff", opacity: 0.45 }
    ];

    const state = {
      modelLoaded: false,
      isWorn: false,
      currentStyleIndex: 0,
      currentStyleName: styles[0].name,
      lensOpacity: styles[0].opacity,
      sunglassesScale: 1.0,
      isSpinning: false,
      screenshotMode: false,
      sunglassesPosition: { x: 0, y: 1.6, z: 0.5 },
      frameColor: styles[0].frame,
      lensColor: styles[0].lens,
      animating: false
    };

    window.__3D_STATE__ = state;

    const floatingPos = new THREE.Vector3(0, 1.6, 0.5);
    const wornPos = new THREE.Vector3(0, 1.65, 0.38);

    let animStart = 0;
    let animFrom = floatingPos.clone();
    let animTo = wornPos.clone();

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function applyStyle(index) {
      state.currentStyleIndex = index % styles.length;
      const style = styles[state.currentStyleIndex];

      frameMeshes.forEach(m => m.material.color.set(style.frame));
      lensMeshes.forEach(m => {
        m.material.color.set(style.lens);
        m.material.opacity = state.lensOpacity;
        m.material.needsUpdate = true;
      });

      state.currentStyleName = style.name;
      state.frameColor = style.frame;
      state.lensColor = style.lens;

      styleBtn.textContent = style.name;
    }

    function setLensOpacityFromSliderValue(sliderValue) {
      const opacity = THREE.MathUtils.lerp(0.2, 0.9, sliderValue / 100);
      state.lensOpacity = Number(opacity.toFixed(3));
      lensMeshes.forEach(m => {
        m.material.opacity = state.lensOpacity;
        m.material.needsUpdate = true;
      });
      tintLabel.textContent = `Tint: ${sliderValue}%`;
    }

    function setStyleAndDefaultOpacity(index) {
      state.currentStyleIndex = index % styles.length;
      const style = styles[state.currentStyleIndex];
      state.lensOpacity = style.opacity;
      const sliderValue = Math.round(((style.opacity - 0.2) / 0.7) * 100);
      tintSlider.value = sliderValue;
      tintLabel.textContent = `Tint: ${sliderValue}%`;
      applyStyle(state.currentStyleIndex);
      lensMeshes.forEach(m => {
        m.material.opacity = state.lensOpacity;
      });
    }

    function updateScaleDisplay() {
      scaleDisplay.textContent = `Scale: ${Math.round(state.sunglassesScale * 100)}%`;
    }

    function toggleTryOn() {
      if (state.animating) return;
      state.isWorn = !state.isWorn;
      tryOnBtn.textContent = state.isWorn ? "Remove" : "Try On";
      animFrom = sunglassesGroup.position.clone();
      animTo = (state.isWorn ? wornPos : floatingPos).clone();
      animStart = performance.now();
      state.animating = true;
      if (state.isWorn) state.isSpinning = false;
    }

    function cycleStyle() {
      const next = (state.currentStyleIndex + 1) % styles.length;
      setStyleAndDefaultOpacity(next);
    }

    function toggleScreenshotMode() {
      state.screenshotMode = !state.screenshotMode;
      app.classList.toggle("screenshot-mode", state.screenshotMode);
    }

    tryOnBtn.addEventListener("click", toggleTryOn);
    styleBtn.addEventListener("click", cycleStyle);
    screenshotBtn.addEventListener("click", toggleScreenshotMode);

    tintSlider.addEventListener("input", (e) => {
      setLensOpacityFromSliderValue(Number(e.target.value));
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (key === "s" || key === "S") {
        cycleStyle();
      }

      if (key === "+" || key === "=") {
        state.sunglassesScale = Math.min(1.5, +(state.sunglassesScale + 0.1).toFixed(2));
        sunglassesGroup.scale.setScalar(state.sunglassesScale);
        updateScaleDisplay();
      }

      if (key === "-") {
        state.sunglassesScale = Math.max(0.5, +(state.sunglassesScale - 0.1).toFixed(2));
        sunglassesGroup.scale.setScalar(state.sunglassesScale);
        updateScaleDisplay();
      }

      if (key === "r" || key === "R") {
        if (!state.isWorn) {
          state.isSpinning = !state.isSpinning;
        }
      }
    });

    setStyleAndDefaultOpacity(0);
    updateScaleDisplay();

    function updateAnimation(time) {
      if (!state.animating) return;

      const elapsed = time - animStart;
      const duration = 500;
      const t = Math.min(elapsed / duration, 1);
      const k = easeInOutCubic(t);

      sunglassesGroup.position.lerpVectors(animFrom, animTo, k);

      if (t >= 1) {
        state.animating = false;
        sunglassesGroup.position.copy(animTo);
      }
    }

    function updateState() {
      state.modelLoaded = lampLoaded;
      state.currentStyleName = styles[state.currentStyleIndex].name;
      state.sunglassesPosition = {
        x: Number(sunglassesGroup.position.x.toFixed(3)),
        y: Number(sunglassesGroup.position.y.toFixed(3)),
        z: Number(sunglassesGroup.position.z.toFixed(3))
      };
      state.frameColor = "#" + frameMeshes[0].material.color.getHexString();
      state.lensColor = "#" + lensMeshes[0].material.color.getHexString();
      state.lensOpacity = Number(lensMeshes[0].material.opacity.toFixed(3));
      state.sunglassesScale = Number(sunglassesGroup.scale.x.toFixed(2));
      state.isWorn = !!state.isWorn;
      state.animating = !!state.animating;
      state.isSpinning = !!state.isSpinning;
      state.screenshotMode = !!state.screenshotMode;
      window.__3D_STATE__ = state;
    }

    function animate(time) {
      requestAnimationFrame(animate);

      controls.update();
      updateAnimation(time);

      if (state.isSpinning && !state.isWorn) {
        sunglassesGroup.rotation.y += 0.02;
      }

      updateState();

      renderer.autoClear = true;
      renderer.render(bgScene, bgCamera);
      renderer.autoClear = false;
      renderer.render(scene, camera);
      renderer.autoClear = true;
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
