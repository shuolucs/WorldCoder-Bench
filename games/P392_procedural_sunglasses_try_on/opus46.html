<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sunglasses Try-On Experience</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#ui-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    color: white;
    z-index: 10;
    min-width: 220px;
    transition: opacity 0.3s;
}

#ui-panel h3 {
    margin-bottom: 15px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(255, 255, 255, 0.6);
}

.btn {
    display: block;
    width: 100%;
    padding: 10px 16px;
    margin-bottom: 10px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
}

.btn:hover {
    background: rgba(255, 255, 255, 0.18);
    border-color: rgba(255, 255, 255, 0.4);
}

.btn:active {
    transform: scale(0.97);
}

.slider-container {
    margin-bottom: 10px;
}

.slider-container label {
    display: block;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    margin-bottom: 6px;
}

#tintSlider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.15);
    outline: none;
}

#tintSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #6c63ff;
    cursor: pointer;
    border: 2px solid white;
}

#tintSlider::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #6c63ff;
    cursor: pointer;
    border: 2px solid white;
}

#scale-display {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.6);
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 10;
    background: rgba(10, 10, 30, 0.5);
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: opacity 0.3s;
}

#vignette-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}

#vignette-overlay.active {
    opacity: 1;
}

.screenshot-icon {
    font-size: 18px;
}

#keyboard-hints {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.35);
    font-size: 11px;
    z-index: 10;
    text-align: center;
    transition: opacity 0.3s;
}

#keyboard-hints span {
    margin: 0 8px;
}

#keyboard-hints kbd {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid rgba(255,255,255,0.2);
}
</style>
</head>
<body>

<div id="ui-panel">
    <h3>🕶️ Sunglasses</h3>
    <button id="tryOnBtn" class="btn">Try On</button>
    <button id="styleBtn" class="btn">Style: Classic</button>
    <div class="slider-container">
        <label>Lens Tint: <span id="tintValue">50%</span></label>
        <input type="range" id="tintSlider" min="0" max="100" value="50">
    </div>
    <button id="screenshotBtn" class="btn"><span class="screenshot-icon">📷</span> Screenshot</button>
</div>

<div id="scale-display">Scale: 100%</div>

<div id="keyboard-hints">
    <span><kbd>S</kbd> Style</span>
    <span><kbd>+/-</kbd> Size</span>
    <span><kbd>R</kbd> Spin</span>
</div>

<div id="vignette-overlay"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
    modelLoaded: false,
    isWorn: false,
    currentStyleIndex: 0,
    currentStyleName: 'Classic',
    lensOpacity: 0.55,
    sunglassesScale: 1.0,
    isSpinning: false,
    screenshotMode: false,
    sunglassesPosition: { x: 0, y: 1.6, z: 0.5 },
    frameColor: '#111111',
    lensColor: '#333333',
    animating: false
};

window.__3D_STATE__ = state;

// ============ STYLE PRESETS ============
const styles = [
    { name: 'Classic', frameColor: '#111111', lensColor: '#333333', lensOpacity: 0.7 },
    { name: 'Aviator', frameColor: '#c9a84c', lensColor: '#2d5a27', lensOpacity: 0.6 },
    { name: 'Sport', frameColor: '#cc2222', lensColor: '#ff6600', lensOpacity: 0.5 },
    { name: 'Retro', frameColor: '#8b5e3c', lensColor: '#d4a030', lensOpacity: 0.55 },
    { name: 'Cyber', frameColor: '#c0c0c0', lensColor: '#2266ff', lensOpacity: 0.65 }
];

// ============ SCENE SETUP ============
const scene = new THREE.Scene();

// Gradient background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
bgCtx.fillStyle = gradient;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 1.2, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = Math.PI / 2 - THREE.MathUtils.degToRad(30);
controls.maxPolarAngle = Math.PI / 2 + THREE.MathUtils.degToRad(30);
controls.target.set(0, 1.2, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
keyLight.position.set(3, 4, 2);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0xaabbff, 0.3);
fillLight.position.set(-2, 1, -1);
scene.add(fillLight);

// ============ FLOOR / TABLE ============
const tableGeo = new THREE.BoxGeometry(4, 0.08, 2);
const tableMat = new THREE.MeshStandardMaterial({ color: '#2a2a3e', roughness: 0.3, metalness: 0.1 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.set(0, 0, 0);
scene.add(table);

// ============ MANNEQUIN HEAD ============
const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
const headMat = new THREE.MeshStandardMaterial({ color: '#e8beac', roughness: 0.6, metalness: 0.0 });
const head = new THREE.Mesh(headGeo, headMat);
head.scale.set(1, 1.2, 1);
head.position.set(0, 1.5, 0);
scene.add(head);

// Neck
const neckGeo = new THREE.CylinderGeometry(0.15, 0.18, 0.4, 16);
const neck = new THREE.Mesh(neckGeo, headMat);
neck.position.set(0, 0.98, 0);
scene.add(neck);

// Nose hint
const noseGeo = new THREE.SphereGeometry(0.06, 16, 16);
const nose = new THREE.Mesh(noseGeo, headMat);
nose.position.set(0, 1.48, 0.38);
scene.add(nose);

// Ears
const earGeo = new THREE.SphereGeometry(0.08, 12, 12);
const earL = new THREE.Mesh(earGeo, headMat);
earL.position.set(-0.38, 1.55, 0);
earL.scale.set(0.5, 1, 0.7);
scene.add(earL);
const earR = new THREE.Mesh(earGeo.clone(), headMat);
earR.position.set(0.38, 1.55, 0);
earR.scale.set(0.5, 1, 0.7);
scene.add(earR);

// ============ PROCEDURAL SUNGLASSES ============
const sunglassesGroup = new THREE.Group();

let frameMaterial = new THREE.MeshStandardMaterial({ color: '#111111', roughness: 0.3, metalness: 0.6 });
let lensMaterial = new THREE.MeshStandardMaterial({
    color: '#333333',
    transparent: true,
    opacity: 0.55,
    roughness: 0.1,
    metalness: 0.8,
    side: THREE.DoubleSide
});

// Left lens frame
const lensFrameGeo = new THREE.TorusGeometry(0.15, 0.015, 16, 32);
const leftFrame = new THREE.Mesh(lensFrameGeo, frameMaterial);
leftFrame.position.set(-0.17, 0, 0);
sunglassesGroup.add(leftFrame);

// Right lens frame
const rightFrame = new THREE.Mesh(lensFrameGeo.clone(), frameMaterial);
rightFrame.position.set(0.17, 0, 0);
sunglassesGroup.add(rightFrame);

// Bridge
const bridgeGeo = new THREE.CylinderGeometry(0.012, 0.012, 0.08, 8);
const bridge = new THREE.Mesh(bridgeGeo, frameMaterial);
bridge.rotation.z = Math.PI / 2;
bridge.position.set(0, 0.05, 0);
sunglassesGroup.add(bridge);

// Lower bridge
const lowerBridgeGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.06, 8);
const lowerBridge = new THREE.Mesh(lowerBridgeGeo, frameMaterial);
lowerBridge.rotation.z = Math.PI / 2;
lowerBridge.position.set(0, -0.02, 0);
sunglassesGroup.add(lowerBridge);

// Left temple (arm)
const templeGeo = new THREE.BoxGeometry(0.015, 0.012, 0.55);
const leftTemple = new THREE.Mesh(templeGeo, frameMaterial);
leftTemple.position.set(-0.32, 0.02, -0.26);
sunglassesGroup.add(leftTemple);

// Right temple (arm)
const rightTemple = new THREE.Mesh(templeGeo.clone(), frameMaterial);
rightTemple.position.set(0.32, 0.02, -0.26);
sunglassesGroup.add(rightTemple);

// Temple tips (curved down)
const tipGeo = new THREE.BoxGeometry(0.013, 0.08, 0.015);
const leftTip = new THREE.Mesh(tipGeo, frameMaterial);
leftTip.position.set(-0.32, -0.02, -0.51);
sunglassesGroup.add(leftTip);

const rightTip = new THREE.Mesh(tipGeo.clone(), frameMaterial);
rightTip.position.set(0.32, -0.02, -0.51);
sunglassesGroup.add(rightTip);

// Left lens
const lensGeo = new THREE.CircleGeometry(0.14, 32);
const leftLens = new THREE.Mesh(lensGeo, lensMaterial);
leftLens.position.set(-0.17, 0, 0.001);
sunglassesGroup.add(leftLens);

// Right lens
const rightLens = new THREE.Mesh(lensGeo.clone(), lensMaterial);
rightLens.position.set(0.17, 0, 0.001);
sunglassesGroup.add(rightLens);

// Initial position
sunglassesGroup.position.set(0, 1.6, 0.5);
scene.add(sunglassesGroup);

// ============ LOAD GLTF MODEL ============
const loader = new GLTFLoader();
loader.load(
    'IridescenceLamp.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(-1.5, 0, -0.5);
        model.scale.set(0.8, 0.8, 0.8);
        scene.add(model);
        state.modelLoaded = true;
        console.log('IridescenceLamp.glb loaded successfully');
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.warn('Could not load IridescenceLamp.glb:', error.message);
        // Create a decorative lamp placeholder
        const lampGroup = new THREE.Group();

        const baseGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.1, 16);
        const lampMat = new THREE.MeshStandardMaterial({ color: '#6644aa', roughness: 0.2, metalness: 0.8 });
        const base = new THREE.Mesh(baseGeo, lampMat);
        lampGroup.add(base);

        const stemGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.6, 8);
        const stem = new THREE.Mesh(stemGeo, lampMat);
        stem.position.y = 0.35;
        lampGroup.add(stem);

        const shadeGeo = new THREE.ConeGeometry(0.25, 0.3, 16, 1, true);
        const shadeMat = new THREE.MeshStandardMaterial({
            color: '#aa88ff',
            roughness: 0.3,
            metalness: 0.5,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.7
        });
        const shade = new THREE.Mesh(shadeGeo, shadeMat);
        shade.position.y = 0.65;
        shade.rotation.x = Math.PI;
        lampGroup.add(shade);

        // Glowing bulb
        const bulbGeo = new THREE.SphereGeometry(0.06, 16, 16);
        const bulbMat = new THREE.MeshStandardMaterial({ color: '#ffeeaa', emissive: '#ffcc44', emissiveIntensity: 2 });
        const bulb = new THREE.Mesh(bulbGeo, bulbMat);
        bulb.position.y = 0.55;
        lampGroup.add(bulb);

        const lampLight = new THREE.PointLight('#ffcc44', 0.5, 3);
        lampLight.position.y = 0.55;
        lampGroup.add(lampLight);

        lampGroup.position.set(-1.5, 0, -0.5);
        lampGroup.scale.set(0.8, 0.8, 0.8);
        scene.add(lampGroup);
        state.modelLoaded = true;
    }
);

// ============ ANIMATION STATE ============
let animationProgress = 0;
let animationStart = null;
let animationFrom = new THREE.Vector3();
let animationTo = new THREE.Vector3();
const FLOAT_POS = new THREE.Vector3(0, 1.6, 0.5);
const WORN_POS = new THREE.Vector3(0, 1.65, 0.38);
const ANIM_DURATION = 500;

// ============ STYLE APPLICATION ============
function applyStyle(index) {
    const style = styles[index];
    state.currentStyleIndex = index;
    state.currentStyleName = style.name;
    state.frameColor = style.frameColor;
    state.lensColor = style.lensColor;

    frameMaterial.color.set(style.frameColor);
    lensMaterial.color.set(style.lensColor);

    // Update tint slider to match style default
    const sliderVal = Math.round(((style.lensOpacity - 0.2) / 0.7) * 100);
    document.getElementById('tintSlider').value = sliderVal;
    lensMaterial.opacity = style.lensOpacity;
    state.lensOpacity = style.lensOpacity;
    document.getElementById('tintValue').textContent = sliderVal + '%';

    document.getElementById('styleBtn').textContent = 'Style: ' + style.name;
}

// ============ TRY-ON ANIMATION ============
function startTryOnAnimation() {
    if (state.animating) return;
    state.animating = true;

    if (state.isSpinning) {
        state.isSpinning = false;
        sunglassesGroup.rotation.y = 0;
    }

    if (!state.isWorn) {
        animationFrom.copy(sunglassesGroup.position);
        animationTo.copy(WORN_POS);
    } else {
        animationFrom.copy(sunglassesGroup.position);
        animationTo.copy(FLOAT_POS);
    }

    animationStart = performance.now();
}

function updateAnimation(now) {
    if (!state.animating) return;

    const elapsed = now - animationStart;
    let t = Math.min(elapsed / ANIM_DURATION, 1);

    // Ease in-out cubic
    t = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

    sunglassesGroup.position.lerpVectors(animationFrom, animationTo, t);

    if (elapsed >= ANIM_DURATION) {
        state.animating = false;
        state.isWorn = !state.isWorn;
        sunglassesGroup.position.copy(animationTo);
        document.getElementById('tryOnBtn').textContent = state.isWorn ? 'Remove' : 'Try On';
    }
}

// ============ UI EVENT HANDLERS ============
document.getElementById('tryOnBtn').addEventListener('click', () => {
    startTryOnAnimation();
});

document.getElementById('styleBtn').addEventListener('click', () => {
    cycleStyle();
});

function cycleStyle() {
    const nextIndex = (state.currentStyleIndex + 1) % styles.length;
    applyStyle(nextIndex);
}

document.getElementById('tintSlider').addEventListener('input', (e) => {
    const val = parseInt(e.target.value);
    const opacity = 0.2 + (val / 100) * 0.7;
    lensMaterial.opacity = opacity;
    state.lensOpacity = opacity;
    document.getElementById('tintValue').textContent = val + '%';
});

document.getElementById('screenshotBtn').addEventListener('click', () => {
    state.screenshotMode = !state.screenshotMode;
    const uiPanel = document.getElementById('ui-panel');
    const scaleDisplay = document.getElementById('scale-display');
    const hints = document.getElementById('keyboard-hints');
    const vignette = document.getElementById('vignette-overlay');

    if (state.screenshotMode) {
        uiPanel.style.opacity = '0';
        uiPanel.style.pointerEvents = 'none';
        scaleDisplay.style.opacity = '0';
        hints.style.opacity = '0';
        vignette.classList.add('active');
    } else {
        uiPanel.style.opacity = '1';
        uiPanel.style.pointerEvents = 'auto';
        scaleDisplay.style.opacity = '1';
        hints.style.opacity = '1';
        vignette.classList.remove('active');
    }
});

// Keyboard events
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 's') {
        cycleStyle();
    } else if (key === '+' || key === '=') {
        state.sunglassesScale = Math.min(1.5, state.sunglassesScale + 0.1);
        sunglassesGroup.scale.setScalar(state.sunglassesScale);
    } else if (key === '-') {
        state.sunglassesScale = Math.max(0.5, state.sunglassesScale - 0.1);
        sunglassesGroup.scale.setScalar(state.sunglassesScale);
    } else if (key === 'r') {
        if (!state.isWorn && !state.animating) {
            state.isSpinning = !state.isSpinning;
            if (!state.isSpinning) {
                sunglassesGroup.rotation.y = 0;
            }
        }
    }
});

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
function animate(now) {
    requestAnimationFrame(animate);

    // Update animation
    updateAnimation(now);

    // Spinning
    if (state.isSpinning && !state.isWorn && !state.animating) {
        sunglassesGroup.rotation.y += 0.02;
    }

    // Update controls
    controls.update();

    // Update state
    state.sunglassesPosition = {
        x: parseFloat(sunglassesGroup.position.x.toFixed(3)),
        y: parseFloat(sunglassesGroup.position.y.toFixed(3)),
        z: parseFloat(sunglassesGroup.position.z.toFixed(3))
    };

    // Update scale display
    const scalePercent = Math.round(state.sunglassesScale * 100);
    document.getElementById('scale-display').textContent = 'Scale: ' + scalePercent + '%';

    renderer.render(scene, camera);
}

// Initialize
applyStyle(0);
animate(performance.now());

</script>
</body>
</html>
