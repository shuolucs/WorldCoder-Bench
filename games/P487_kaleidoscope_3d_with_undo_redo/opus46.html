<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kaleidoscope</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #controlPanel {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    padding: 15px;
    color: #fff;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 220px;
  }
  #controlPanel button {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #fff;
    padding: 8px 12px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }
  #controlPanel button:hover {
    background: rgba(255, 255, 255, 0.25);
  }
  #controlPanel button:active {
    background: rgba(255, 255, 255, 0.4);
  }
  .btn-row {
    display: flex;
    gap: 6px;
  }
  .btn-row button {
    flex: 1;
  }
  #statusDisplay {
    font-size: 12px;
    color: #aaa;
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 8px;
    margin-top: 4px;
  }
  .section-label {
    font-size: 11px;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #undoRedoRow button {
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="controlPanel">
  <div class="section-label">Segments</div>
  <div class="btn-row">
    <button id="btnRemoveSegments">-Segments</button>
    <button id="btnAddSegments">+Segments</button>
  </div>
  <div class="section-label">Radius</div>
  <div class="btn-row">
    <button id="btnDecreaseRadius">-Radius</button>
    <button id="btnIncreaseRadius">+Radius</button>
  </div>
  <div class="section-label">Scale</div>
  <div class="btn-row">
    <button id="btnDecreaseScale">-Scale</button>
    <button id="btnIncreaseScale">+Scale</button>
  </div>
  <div class="btn-row">
    <button id="btnToggleMirror">Toggle Mirror</button>
    <button id="btnToggleRotation">Pause/Play</button>
  </div>
  <div class="btn-row" id="undoRedoRow">
    <button id="btnUndo">Undo</button>
    <button id="btnRedo">Redo</button>
  </div>
  <span id="statusDisplay">Loading model...</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 5, 5);
scene.add(directionalLight);

// --- State ---
let segments = 6;
let radius = 2.0;
let scale = 0.5;
let mirrorMode = false;
let rotationActive = true;
let rotationSpeed = 0.01;

let history = [];
let historyIndex = -1;

let originalModel = null;
let modelLoaded = false;
const kaleidoscopeGroup = new THREE.Group();
scene.add(kaleidoscopeGroup);

// --- Global State ---
window.__3D_STATE__ = {
  segments: segments,
  radius: radius,
  scale: scale,
  mirrorMode: mirrorMode,
  rotationActive: rotationActive,
  currentRotationY: 0,
  historyLength: 0,
  historyIndex: -1,
  cloneCount: 0,
  modelLoaded: false,
  canUndo: false,
  canRedo: false
};

function updateGlobalState() {
  window.__3D_STATE__.segments = segments;
  window.__3D_STATE__.radius = Math.round(radius * 10) / 10;
  window.__3D_STATE__.scale = Math.round(scale * 10) / 10;
  window.__3D_STATE__.mirrorMode = mirrorMode;
  window.__3D_STATE__.rotationActive = rotationActive;
  window.__3D_STATE__.currentRotationY = kaleidoscopeGroup.rotation.y;
  window.__3D_STATE__.historyLength = history.length;
  window.__3D_STATE__.historyIndex = historyIndex;
  window.__3D_STATE__.cloneCount = kaleidoscopeGroup.children.length;
  window.__3D_STATE__.modelLoaded = modelLoaded;
  window.__3D_STATE__.canUndo = historyIndex > 0;
  window.__3D_STATE__.canRedo = historyIndex < history.length - 1;
}

function updateStatusDisplay() {
  const statusEl = document.getElementById('statusDisplay');
  const mirrorStr = mirrorMode ? 'ON' : 'OFF';
  const rotStr = rotationActive ? 'Playing' : 'Paused';
  statusEl.textContent = `Segments: ${segments} | Radius: ${radius.toFixed(1)} | Scale: ${scale.toFixed(1)} | Mirror: ${mirrorStr}\nRotation: ${rotStr} | History: ${historyIndex + 1}/${history.length}`;
}

// --- History ---
function pushState() {
  // Discard future history if we're not at the end
  if (historyIndex < history.length - 1) {
    history = history.slice(0, historyIndex + 1);
  }
  history.push({
    segments: segments,
    radius: Math.round(radius * 10) / 10,
    scale: Math.round(scale * 10) / 10,
    mirrorMode: mirrorMode
  });
  historyIndex = history.length - 1;
}

function applyState(state) {
  segments = state.segments;
  radius = state.radius;
  scale = state.scale;
  mirrorMode = state.mirrorMode;
  rebuildKaleidoscope();
  updateStatusDisplay();
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    applyState(history[historyIndex]);
  }
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    applyState(history[historyIndex]);
  }
}

function resetToInitial() {
  segments = 6;
  radius = 2.0;
  scale = 0.5;
  mirrorMode = false;
  history = [];
  historyIndex = -1;
  pushState();
  rebuildKaleidoscope();
  updateStatusDisplay();
}

// --- Kaleidoscope ---
function rebuildKaleidoscope() {
  // Remove all existing clones
  while (kaleidoscopeGroup.children.length > 0) {
    const child = kaleidoscopeGroup.children[0];
    kaleidoscopeGroup.remove(child);
    // Dispose cloned geometries/materials
    child.traverse((node) => {
      if (node.isMesh) {
        if (node.geometry) node.geometry.dispose();
        if (node.material) {
          if (Array.isArray(node.material)) {
            node.material.forEach(m => m.dispose());
          } else {
            node.material.dispose();
          }
        }
      }
    });
  }

  if (!originalModel) return;

  for (let i = 0; i < segments; i++) {
    const clone = originalModel.clone();
    
    // Deep clone materials to avoid shared state issues
    clone.traverse((node) => {
      if (node.isMesh) {
        if (Array.isArray(node.material)) {
          node.material = node.material.map(m => m.clone());
        } else {
          node.material = node.material.clone();
        }
      }
    });

    const angle = (2 * Math.PI / segments) * i;
    
    // Position at radius distance
    clone.position.x = radius * Math.cos(angle);
    clone.position.z = radius * Math.sin(angle);
    clone.position.y = 0;

    // Rotate to face outward/create pattern
    clone.rotation.y = angle;

    // Apply scale
    const s = scale;
    if (mirrorMode && i % 2 === 1) {
      clone.scale.set(-s, s, s);
    } else {
      clone.scale.set(s, s, s);
    }

    kaleidoscopeGroup.add(clone);
  }
}

// --- Load Model ---
const loader = new GLTFLoader();
loader.load(
  'DamagedHelmet.glb',
  (gltf) => {
    originalModel = gltf.scene;
    modelLoaded = true;
    
    // Push initial state
    pushState();
    rebuildKaleidoscope();
    updateStatusDisplay();
  },
  (progress) => {
    const pct = progress.total > 0 ? Math.round((progress.loaded / progress.total) * 100) : 0;
    document.getElementById('statusDisplay').textContent = `Loading model... ${pct}%`;
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('statusDisplay').textContent = 'Error loading model. Make sure DamagedHelmet.glb is in the same directory.';
  }
);

// --- Parameter Change Helpers ---
function changeParam(paramName, delta, min, max) {
  let value;
  switch (paramName) {
    case 'segments':
      value = Math.min(max, Math.max(min, segments + delta));
      if (value === segments) return;
      segments = value;
      break;
    case 'radius':
      value = Math.round((radius + delta) * 10) / 10;
      value = Math.min(max, Math.max(min, value));
      if (value === Math.round(radius * 10) / 10) return;
      radius = value;
      break;
    case 'scale':
      value = Math.round((scale + delta) * 10) / 10;
      value = Math.min(max, Math.max(min, value));
      if (value === Math.round(scale * 10) / 10) return;
      scale = value;
      break;
  }
  pushState();
  rebuildKaleidoscope();
  updateStatusDisplay();
}

function toggleMirror() {
  mirrorMode = !mirrorMode;
  pushState();
  rebuildKaleidoscope();
  updateStatusDisplay();
}

function toggleRotation() {
  rotationActive = !rotationActive;
  updateStatusDisplay();
}

// --- Button Event Listeners ---
document.getElementById('btnAddSegments').addEventListener('click', () => changeParam('segments', 1, 2, 12));
document.getElementById('btnRemoveSegments').addEventListener('click', () => changeParam('segments', -1, 2, 12));
document.getElementById('btnIncreaseRadius').addEventListener('click', () => changeParam('radius', 0.5, 0.5, 5.0));
document.getElementById('btnDecreaseRadius').addEventListener('click', () => changeParam('radius', -0.5, 0.5, 5.0));
document.getElementById('btnIncreaseScale').addEventListener('click', () => changeParam('scale', 0.1, 0.1, 2.0));
document.getElementById('btnDecreaseScale').addEventListener('click', () => changeParam('scale', -0.1, 0.1, 2.0));
document.getElementById('btnToggleMirror').addEventListener('click', toggleMirror);
document.getElementById('btnToggleRotation').addEventListener('click', toggleRotation);
document.getElementById('btnUndo').addEventListener('click', undo);
document.getElementById('btnRedo').addEventListener('click', redo);

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  // Don't trigger if user is typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

  switch (e.key.toLowerCase()) {
    case 'z':
      if (!e.ctrlKey && !e.metaKey) {
        undo();
      }
      break;
    case 'y':
      if (!e.ctrlKey && !e.metaKey) {
        redo();
      }
      break;
    case 'r':
      if (!e.ctrlKey && !e.metaKey) {
        resetToInitial();
      }
      break;
    case ' ':
      e.preventDefault();
      toggleRotation();
      break;
  }
});

// --- Window Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);

  if (rotationActive) {
    kaleidoscopeGroup.rotation.y += rotationSpeed;
  }

  // Update each clone's individual rotation for visual interest
  kaleidoscopeGroup.children.forEach((child, i) => {
    child.rotation.x = Math.sin(Date.now() * 0.001 + i) * 0.3;
    child.rotation.z = Math.cos(Date.now() * 0.0008 + i * 0.5) * 0.2;
  });

  updateGlobalState();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
