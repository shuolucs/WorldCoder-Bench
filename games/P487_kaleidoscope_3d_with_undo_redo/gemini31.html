<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Kaleidoscope</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            font-family: sans-serif;
        }
        #controlPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            z-index: 10;
            max-width: 300px;
        }
        button {
            margin: 3px;
            padding: 6px 10px;
            cursor: pointer;
            background: #444;
            color: #fff;
            border: 1px solid #666;
            border-radius: 4px;
        }
        button:hover {
            background: #666;
        }
        button:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            border-color: #333;
        }
        #statusDisplay {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.5;
            color: #aaa;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="controlPanel">
        <button id="btnAddSegments">+Segments</button>
        <button id="btnRemoveSegments">-Segments</button>
        <button id="btnIncreaseRadius">+Radius</button>
        <button id="btnDecreaseRadius">-Radius</button>
        <button id="btnIncreaseScale">+Scale</button>
        <button id="btnDecreaseScale">-Scale</button>
        <button id="btnToggleMirror">Toggle Mirror</button>
        <button id="btnToggleRotation">Pause/Play</button>
        <button id="btnUndo">Undo</button>
        <button id="btnRedo">Redo</button>
        <span id="statusDisplay"></span>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // --- State & Variables ---
        let state = {
            segments: 6,
            radius: 2.0,
            scale: 0.5,
            mirrorMode: false
        };
        
        let rotationActive = true;
        let history = [];
        let historyIndex = -1;
        
        let baseModel = null;
        let modelLoaded = false;
        const kaleidoscopeGroup = new THREE.Group();
        scene.add(kaleidoscopeGroup);

        window.__3D_STATE__ = {};

        // --- Load Model ---
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb';
        
        loader.load(modelUrl, (gltf) => {
            baseModel = gltf.scene;
            modelLoaded = true;
            rebuildKaleidoscope();
        });

        // --- Undo/Redo System ---
        function pushState() {
            // Discard future history if we are making a new change after undoing
            history = history.slice(0, historyIndex + 1);
            history.push({ ...state });
            historyIndex++;
            updateUI();
            rebuildKaleidoscope();
        }

        function undo() {
            if (historyIndex > 0) {
                historyIndex--;
                state = { ...history[historyIndex] };
                updateUI();
                rebuildKaleidoscope();
            }
        }

        function redo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                state = { ...history[historyIndex] };
                updateUI();
                rebuildKaleidoscope();
            }
        }

        function reset() {
            state = { segments: 6, radius: 2.0, scale: 0.5, mirrorMode: false };
            history = [];
            historyIndex = -1;
            pushState();
        }

        // --- Rebuild Logic ---
        function rebuildKaleidoscope() {
            if (!baseModel) return;

            // Clear existing clones
            while (kaleidoscopeGroup.children.length > 0) {
                kaleidoscopeGroup.remove(kaleidoscopeGroup.children[0]);
            }

            for (let i = 0; i < state.segments; i++) {
                const clone = baseModel.clone();
                const angle = (2 * Math.PI / state.segments) * i;
                
                clone.position.set(
                    state.radius * Math.cos(angle), 
                    0, 
                    state.radius * Math.sin(angle)
                );
                
                clone.rotation.y = angle;

                if (state.mirrorMode && i % 2 !== 0) {
                    clone.scale.set(-state.scale, state.scale, state.scale);
                } else {
                    clone.scale.set(state.scale, state.scale, state.scale);
                }

                kaleidoscopeGroup.add(clone);
            }
        }

        // --- UI Updates ---
        function updateUI() {
            const status = document.getElementById('statusDisplay');
            status.innerText = `Segments: ${state.segments} | Radius: ${state.radius.toFixed(1)} | Scale: ${state.scale.toFixed(1)} | Mirror: ${state.mirrorMode ? 'ON' : 'OFF'}`;
            
            document.getElementById('btnUndo').disabled = historyIndex <= 0;
            document.getElementById('btnRedo').disabled = historyIndex >= history.length - 1;
        }

        // --- DOM Event Listeners ---
        document.getElementById('btnAddSegments').addEventListener('click', () => {
            if (state.segments < 12) { state.segments++; pushState(); }
        });
        document.getElementById('btnRemoveSegments').addEventListener('click', () => {
            if (state.segments > 2) { state.segments--; pushState(); }
        });
        document.getElementById('btnIncreaseRadius').addEventListener('click', () => {
            let r = Math.round((state.radius + 0.5) * 10) / 10;
            if (r <= 5.0) { state.radius = r; pushState(); }
        });
        document.getElementById('btnDecreaseRadius').addEventListener('click', () => {
            let r = Math.round((state.radius - 0.5) * 10) / 10;
            if (r >= 0.5) { state.radius = r; pushState(); }
        });
        document.getElementById('btnIncreaseScale').addEventListener('click', () => {
            let s = Math.round((state.scale + 0.1) * 10) / 10;
            if (s <= 2.0) { state.scale = s; pushState(); }
        });
        document.getElementById('btnDecreaseScale').addEventListener('click', () => {
            let s = Math.round((state.scale - 0.1) * 10) / 10;
            if (s >= 0.1) { state.scale = s; pushState(); }
        });
        document.getElementById('btnToggleMirror').addEventListener('click', () => {
            state.mirrorMode = !state.mirrorMode; pushState();
        });
        document.getElementById('btnToggleRotation').addEventListener('click', () => {
            rotationActive = !rotationActive;
        });
        document.getElementById('btnUndo').addEventListener('click', undo);
        document.getElementById('btnRedo').addEventListener('click', redo);

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            // Ignore if modifiers are pressed
            if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey) return;

            if (e.key === 'z') {
                undo();
            } else if (e.key === 'y') {
                redo();
            } else if (e.key === 'r') {
                reset();
            } else if (e.key === ' ') {
                rotationActive = !rotationActive;
                e.preventDefault(); // Prevent page scroll
            }
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        reset();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (rotationActive) {
                kaleidoscopeGroup.rotation.y += 0.01;
            }

            // Update global state object every frame
            window.__3D_STATE__ = {
                segments: state.segments,
                radius: state.radius,
                scale: Math.round(state.scale * 10) / 10,
                mirrorMode: state.mirrorMode,
                rotationActive: rotationActive,
                currentRotationY: kaleidoscopeGroup.rotation.y,
                historyLength: history.length,
                historyIndex: historyIndex,
                cloneCount: kaleidoscopeGroup.children.length,
                modelLoaded: modelLoaded,
                canUndo: historyIndex > 0,
                canRedo: historyIndex < history.length - 1
            };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
