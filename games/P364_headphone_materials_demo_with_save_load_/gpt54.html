<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Headphone Materials Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    .panel {
      position: absolute;
      background: rgba(20, 20, 35, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      z-index: 10;
    }

    #material-panel {
      top: 16px;
      left: 16px;
      width: 200px;
    }

    #state-panel {
      top: 16px;
      right: 16px;
      width: 160px;
    }

    .panel h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      font-weight: 700;
      color: #d8e1ff;
      letter-spacing: 0.4px;
    }

    button {
      width: 100%;
      margin: 6px 0;
      padding: 10px 12px;
      background: #2d2d44;
      color: #fff;
      border: 2px solid transparent;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: #3a3a56;
    }

    button.active {
      border: 2px solid #00ff88;
      box-shadow: 0 0 12px rgba(0,255,136,0.25);
    }

    #hud-info {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 35, 0.85);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      z-index: 10;
      white-space: nowrap;
    }

    #hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      background: rgba(20, 20, 35, 0.75);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: #c7cbe0;
      z-index: 10;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="material-panel" class="panel">
      <h3>Materials</h3>
      <button id="btn-default">Default</button>
      <button id="btn-matte_black">Matte Black</button>
      <button id="btn-glossy_white">Glossy White</button>
      <button id="btn-brushed_metal">Brushed Metal</button>
      <button id="btn-rose_gold">Rose Gold</button>
      <button id="btn-rotate">Rotation: ON</button>
    </div>

    <div id="state-panel" class="panel">
      <h3>State</h3>
      <button id="btn-save">Save State</button>
      <button id="btn-load">Load State</button>
    </div>

    <div id="hud-info">Material: default | Rotation: ON</div>
    <div id="hint">
      Keys: 1-5 materials, R rotate, S save, L load
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 0.15, 0.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(2, 3, 2);
    scene.add(directionalLight);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.15, 0.015, 48),
      new THREE.MeshStandardMaterial({
        color: '#2d2d44',
        roughness: 0.85,
        metalness: 0.15
      })
    );
    platform.position.set(0, -0.11, 0);
    scene.add(platform);

    const materialPresets = {
      default: null,
      matte_black: new THREE.MeshStandardMaterial({
        color: '#1a1a1a',
        roughness: 0.9,
        metalness: 0.1
      }),
      glossy_white: new THREE.MeshStandardMaterial({
        color: '#f0f0f0',
        roughness: 0.1,
        metalness: 0.3
      }),
      brushed_metal: new THREE.MeshStandardMaterial({
        color: '#8899aa',
        roughness: 0.4,
        metalness: 0.9
      }),
      rose_gold: new THREE.MeshStandardMaterial({
        color: '#b76e79',
        roughness: 0.3,
        metalness: 0.8
      })
    };

    const materialOrder = ['default', 'matte_black', 'glossy_white', 'brushed_metal', 'rose_gold'];

    let model = null;
    const originalMaterials = new Map();

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentMaterial: 'default',
      autoRotate: true,
      modelRotationY: 0,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      stateSaved: false,
      stateLoaded: false,
      lastSaveTime: 0,
      lastLoadTime: 0,
      materialHistory: ['default'],
      meshCount: 0
    };

    const hudInfo = document.getElementById('hud-info');
    const rotateBtn = document.getElementById('btn-rotate');

    function updateHUD() {
      hudInfo.textContent = `Material: ${window.__3D_STATE__.currentMaterial} | Rotation: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
      rotateBtn.textContent = `Rotation: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
    }

    function updateActiveMaterialButton() {
      materialOrder.forEach(name => {
        const btn = document.getElementById(`btn-${name}`);
        if (btn) btn.classList.toggle('active', window.__3D_STATE__.currentMaterial === name);
      });
    }

    function applyMaterialPreset(name, pushHistory = true) {
      if (!model) return;
      if (!materialOrder.includes(name)) return;

      model.traverse((child) => {
        if (child.isMesh) {
          if (name === 'default') {
            const original = originalMaterials.get(child.uuid);
            if (original) child.material = original;
          } else {
            child.material = materialPresets[name];
          }
          child.castShadow = false;
          child.receiveShadow = false;
        }
      });

      window.__3D_STATE__.currentMaterial = name;
      if (pushHistory) {
        window.__3D_STATE__.materialHistory.push(name);
      }
      updateActiveMaterialButton();
      updateHUD();
    }

    function saveState() {
      const state = {
        currentMaterial: window.__3D_STATE__.currentMaterial,
        autoRotate: window.__3D_STATE__.autoRotate,
        modelRotationY: model ? model.rotation.y : 0,
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        }
      };

      localStorage.setItem('headphone_demo_state', JSON.stringify(state));
      window.__3D_STATE__.stateSaved = true;
      window.__3D_STATE__.lastSaveTime = Date.now();
    }

    function loadState() {
      const raw = localStorage.getItem('headphone_demo_state');
      if (!raw) return;

      try {
        const state = JSON.parse(raw);

        if (typeof state.autoRotate === 'boolean') {
          window.__3D_STATE__.autoRotate = state.autoRotate;
        }

        if (state.cameraPosition) {
          camera.position.set(
            state.cameraPosition.x ?? camera.position.x,
            state.cameraPosition.y ?? camera.position.y,
            state.cameraPosition.z ?? camera.position.z
          );
        }

        if (model && typeof state.modelRotationY === 'number') {
          model.rotation.y = state.modelRotationY;
        }

        if (state.currentMaterial && materialOrder.includes(state.currentMaterial) && model) {
          applyMaterialPreset(state.currentMaterial, true);
        }

        controls.update();
        window.__3D_STATE__.stateLoaded = true;
        window.__3D_STATE__.lastLoadTime = Date.now();
        updateHUD();
        updateActiveMaterialButton();
      } catch (e) {
        console.warn('Failed to load saved state:', e);
      }
    }

    document.getElementById('btn-default').addEventListener('click', () => applyMaterialPreset('default'));
    document.getElementById('btn-matte_black').addEventListener('click', () => applyMaterialPreset('matte_black'));
    document.getElementById('btn-glossy_white').addEventListener('click', () => applyMaterialPreset('glossy_white'));
    document.getElementById('btn-brushed_metal').addEventListener('click', () => applyMaterialPreset('brushed_metal'));
    document.getElementById('btn-rose_gold').addEventListener('click', () => applyMaterialPreset('rose_gold'));

    document.getElementById('btn-rotate').addEventListener('click', () => {
      window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      updateHUD();
    });

    document.getElementById('btn-save').addEventListener('click', saveState);
    document.getElementById('btn-load').addEventListener('click', loadState);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === '1') applyMaterialPreset('default');
      if (key === '2') applyMaterialPreset('matte_black');
      if (key === '3') applyMaterialPreset('glossy_white');
      if (key === '4') applyMaterialPreset('brushed_metal');
      if (key === '5') applyMaterialPreset('rose_gold');

      if (key === 'r') {
        window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
        updateHUD();
      }

      if (key === 's') saveState();
      if (key === 'l') loadState();
    });

    const loader = new GLTFLoader();
    loader.load(
      'Avocado.glb',
      (gltf) => {
        model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const scaleFactor = 8 / maxDim * 0.1;
        model.scale.setScalar(scaleFactor);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const scaledSize = scaledBox.getSize(new THREE.Vector3());
        const scaledCenter = scaledBox.getCenter(new THREE.Vector3());

        model.position.x -= scaledCenter.x;
        model.position.y -= scaledCenter.y;
        model.position.z -= scaledCenter.z;

        model.position.y += (scaledSize.y * 0.5) - 0.10;

        let meshCount = 0;
        model.traverse((child) => {
          if (child.isMesh) {
            meshCount++;
            originalMaterials.set(child.uuid, child.material);
          }
        });

        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.meshCount = meshCount;

        scene.add(model);
        applyMaterialPreset('default', false);
      },
      undefined,
      (error) => {
        console.error('Error loading Avocado.glb:', error);
      }
    );

    function animate() {
      requestAnimationFrame(animate);

      if (model && window.__3D_STATE__.autoRotate) {
        model.rotation.y += 0.01;
      }

      controls.update();

      window.__3D_STATE__.modelRotationY = model ? model.rotation.y : 0;
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };

      renderer.render(scene, camera);
    }

    updateHUD();
    updateActiveMaterialButton();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
