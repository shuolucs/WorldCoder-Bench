<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Headphone Materials Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  .panel {
    position: fixed;
    background: rgba(20, 20, 40, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .panel-title {
    color: #aaa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
  }

  #material-panel {
    top: 20px;
    left: 20px;
  }

  #material-panel .mat-btn {
    display: block;
    width: 180px;
    padding: 10px 14px;
    margin-bottom: 6px;
    background: rgba(255, 255, 255, 0.05);
    color: #ccc;
    border: 2px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    text-align: left;
    transition: all 0.2s ease;
  }

  #material-panel .mat-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
  }

  #material-panel .mat-btn.active {
    border-color: #00ff88;
    color: #00ff88;
    background: rgba(0, 255, 136, 0.08);
  }

  .mat-btn .color-dot {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.2);
  }

  #action-panel {
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .action-btn {
    padding: 10px 20px;
    background: rgba(255, 255, 255, 0.08);
    color: #ccc;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s ease;
    min-width: 140px;
    text-align: center;
  }

  .action-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #fff;
  }

  #btn-save { }
  #btn-save:hover { border-color: #4488ff; color: #4488ff; }
  #btn-load { }
  #btn-load:hover { border-color: #ff8844; color: #ff8844; }
  #btn-rotate { }
  #btn-rotate.active { border-color: #00ff88; color: #00ff88; background: rgba(0,255,136,0.08); }

  #hud-info {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 40, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 20px;
    padding: 10px 24px;
    color: #aaa;
    font-size: 13px;
    letter-spacing: 0.5px;
    backdrop-filter: blur(10px);
    z-index: 10;
    white-space: nowrap;
  }

  .shortcut-hint {
    color: #555;
    font-size: 10px;
    margin-top: 2px;
  }
</style>
</head>
<body>

<div id="material-panel" class="panel">
  <div class="panel-title">Materials</div>
  <button id="btn-default" class="mat-btn active" data-material="default">
    <span class="color-dot" style="background: #7a8a5a;"></span>Default
    <div class="shortcut-hint">Press 1</div>
  </button>
  <button id="btn-matte_black" class="mat-btn" data-material="matte_black">
    <span class="color-dot" style="background: #1a1a1a;"></span>Matte Black
    <div class="shortcut-hint">Press 2</div>
  </button>
  <button id="btn-glossy_white" class="mat-btn" data-material="glossy_white">
    <span class="color-dot" style="background: #f0f0f0;"></span>Glossy White
    <div class="shortcut-hint">Press 3</div>
  </button>
  <button id="btn-brushed_metal" class="mat-btn" data-material="brushed_metal">
    <span class="color-dot" style="background: #8899aa;"></span>Brushed Metal
    <div class="shortcut-hint">Press 4</div>
  </button>
  <button id="btn-rose_gold" class="mat-btn" data-material="rose_gold">
    <span class="color-dot" style="background: #b76e79;"></span>Rose Gold
    <div class="shortcut-hint">Press 5</div>
  </button>
</div>

<div id="action-panel" class="panel">
  <div class="panel-title">Actions</div>
  <button id="btn-save" class="action-btn">💾 Save State <span class="shortcut-hint" style="display:inline">(S)</span></button>
  <button id="btn-load" class="action-btn">📂 Load State <span class="shortcut-hint" style="display:inline">(L)</span></button>
  <button id="btn-rotate" class="action-btn active">🔄 Rotation: ON <span class="shortcut-hint" style="display:inline">(R)</span></button>
</div>

<div id="hud-info">Material: default | Rotation: ON</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State management
window.__3D_STATE__ = {
  modelLoaded: false,
  currentMaterial: 'default',
  autoRotate: true,
  modelRotationY: 0,
  cameraPosition: { x: 0, y: 0.15, z: 0.5 },
  stateSaved: false,
  stateLoaded: false,
  lastSaveTime: 0,
  lastLoadTime: 0,
  materialHistory: ['default'],
  meshCount: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0.15, 0.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(2, 3, 2);
scene.add(directionalLight);

// Add a subtle fill light from the opposite side
const fillLight = new THREE.DirectionalLight(0x4466aa, 0.3);
fillLight.position.set(-2, 1, -2);
scene.add(fillLight);

// Ground platform
const platformGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.005, 64);
const platformMaterial = new THREE.MeshStandardMaterial({
  color: 0x2d2d44,
  roughness: 0.8,
  metalness: 0.2
});
const platform = new THREE.Mesh(platformGeometry, platformMaterial);
platform.position.y = -0.002;
scene.add(platform);

// Material presets
const materialPresets = {
  matte_black: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 }),
  glossy_white: new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.1, metalness: 0.3 }),
  brushed_metal: new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.4, metalness: 0.9 }),
  rose_gold: new THREE.MeshStandardMaterial({ color: 0xb76e79, roughness: 0.3, metalness: 0.8 })
};

let model = null;
const originalMaterials = new Map();

// Load model
const loader = new GLTFLoader();
loader.load(
  'Avocado.glb',
  (gltf) => {
    model = gltf.scene;
    model.scale.set(8, 8, 8);

    // Center the model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    model.position.sub(center);
    model.position.y += (box.max.y - box.min.y) / 2 * 0;

    // Recalculate after centering
    const box2 = new THREE.Box3().setFromObject(model);
    const bottomY = box2.min.y;
    model.position.y -= bottomY;

    // Store original materials and count meshes
    let meshCount = 0;
    model.traverse((child) => {
      if (child.isMesh) {
        originalMaterials.set(child.uuid, child.material.clone());
        meshCount++;
      }
    });

    window.__3D_STATE__.meshCount = meshCount;
    window.__3D_STATE__.modelLoaded = true;

    scene.add(model);
  },
  undefined,
  (error) => {
    console.error('Error loading model:', error);
  }
);

// Apply material
function applyMaterial(presetName) {
  if (!model) return;

  const prevMaterial = window.__3D_STATE__.currentMaterial;
  window.__3D_STATE__.currentMaterial = presetName;

  if (presetName !== prevMaterial) {
    window.__3D_STATE__.materialHistory.push(presetName);
  }

  model.traverse((child) => {
    if (child.isMesh) {
      if (presetName === 'default') {
        const orig = originalMaterials.get(child.uuid);
        if (orig) {
          child.material = orig.clone();
        }
      } else {
        child.material = materialPresets[presetName].clone();
      }
    }
  });

  // Update UI
  document.querySelectorAll('.mat-btn').forEach(btn => btn.classList.remove('active'));
  const activeBtn = document.getElementById('btn-' + presetName);
  if (activeBtn) activeBtn.classList.add('active');

  updateHUD();
}

// Toggle rotation
function toggleRotation() {
  window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
  const btn = document.getElementById('btn-rotate');
  if (window.__3D_STATE__.autoRotate) {
    btn.textContent = '🔄 Rotation: ON ';
    btn.classList.add('active');
  } else {
    btn.textContent = '🔄 Rotation: OFF ';
    btn.classList.remove('active');
  }
  updateHUD();
}

// Save state
function saveState() {
  const state = {
    currentMaterial: window.__3D_STATE__.currentMaterial,
    autoRotate: window.__3D_STATE__.autoRotate,
    modelRotationY: model ? model.rotation.y : 0,
    cameraPosition: {
      x: camera.position.x,
      y: camera.position.y,
      z: camera.position.z
    }
  };
  localStorage.setItem('headphone_demo_state', JSON.stringify(state));
  window.__3D_STATE__.stateSaved = true;
  window.__3D_STATE__.lastSaveTime = Date.now();
}

// Load state
function loadState() {
  const data = localStorage.getItem('headphone_demo_state');
  if (!data) return;

  try {
    const state = JSON.parse(data);

    // Restore material
    if (state.currentMaterial) {
      applyMaterial(state.currentMaterial);
    }

    // Restore rotation toggle
    if (typeof state.autoRotate === 'boolean') {
      window.__3D_STATE__.autoRotate = state.autoRotate;
      const btn = document.getElementById('btn-rotate');
      if (window.__3D_STATE__.autoRotate) {
        btn.textContent = '🔄 Rotation: ON ';
        btn.classList.add('active');
      } else {
        btn.textContent = '🔄 Rotation: OFF ';
        btn.classList.remove('active');
      }
    }

    // Restore model rotation
    if (model && typeof state.modelRotationY === 'number') {
      model.rotation.y = state.modelRotationY;
      window.__3D_STATE__.modelRotationY = state.modelRotationY;
    }

    // Restore camera position
    if (state.cameraPosition) {
      camera.position.set(state.cameraPosition.x, state.cameraPosition.y, state.cameraPosition.z);
      controls.update();
    }

    window.__3D_STATE__.stateLoaded = true;
    window.__3D_STATE__.lastLoadTime = Date.now();
    updateHUD();
  } catch (e) {
    console.error('Error loading state:', e);
  }
}

// Update HUD
function updateHUD() {
  const hud = document.getElementById('hud-info');
  const matName = window.__3D_STATE__.currentMaterial;
  const rotStatus = window.__3D_STATE__.autoRotate ? 'ON' : 'OFF';
  hud.textContent = `Material: ${matName} | Rotation: ${rotStatus}`;
}

// Button event listeners
document.querySelectorAll('.mat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mat = btn.dataset.material;
    applyMaterial(mat);
  });
});

document.getElementById('btn-save').addEventListener('click', saveState);
document.getElementById('btn-load').addEventListener('click', loadState);
document.getElementById('btn-rotate').addEventListener('click', toggleRotation);

// Keyboard shortcuts
const materialKeys = {
  '1': 'default',
  '2': 'matte_black',
  '3': 'glossy_white',
  '4': 'brushed_metal',
  '5': 'rose_gold'
};

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();

  if (materialKeys[key]) {
    applyMaterial(materialKeys[key]);
  } else if (key === 'r') {
    toggleRotation();
  } else if (key === 's') {
    saveState();
  } else if (key === 'l') {
    loadState();
  }
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  if (model && window.__3D_STATE__.autoRotate) {
    model.rotation.y += 0.01;
  }

  // Update state every frame
  if (model) {
    window.__3D_STATE__.modelRotationY = model.rotation.y;
  }
  window.__3D_STATE__.cameraPosition = {
    x: camera.position.x,
    y: camera.position.y,
    z: camera.position.z
  };

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
