<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Headphone Material Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(20, 20, 35, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }
        #material-panel {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #control-panel {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        button {
            background: #2d2d44;
            color: white;
            border: 2px solid transparent;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
            text-align: left;
        }
        button:hover {
            background: #3d3d5c;
        }
        button.active {
            border: 2px solid #00ff88;
            background: #2a3a3a;
        }
        #hud-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            letter-spacing: 0.5px;
            pointer-events: none;
        }
        .shortcut-hint {
            font-size: 10px;
            color: #888;
            float: right;
            margin-top: 2px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="material-panel" class="panel">
        <h3>Materials</h3>
        <button id="btn-default" class="active">Default <span class="shortcut-hint">1</span></button>
        <button id="btn-matte_black">Matte Black <span class="shortcut-hint">2</span></button>
        <button id="btn-glossy_white">Glossy White <span class="shortcut-hint">3</span></button>
        <button id="btn-brushed_metal">Brushed Metal <span class="shortcut-hint">4</span></button>
        <button id="btn-rose_gold">Rose Gold <span class="shortcut-hint">5</span></button>
    </div>

    <div id="control-panel" class="panel">
        <h3>Controls</h3>
        <button id="btn-rotate">Toggle Rotation <span class="shortcut-hint">R</span></button>
        <div style="height: 10px;"></div>
        <button id="btn-save">Save State <span class="shortcut-hint">S</span></button>
        <button id="btn-load">Load State <span class="shortcut-hint">L</span></button>
    </div>

    <div id="hud-info">Material: default | Rotation: ON</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // Initialize State
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentMaterial: 'default',
            autoRotate: true,
            modelRotationY: 0,
            cameraPosition: { x: 0, y: 0.15, z: 0.5 },
            stateSaved: false,
            stateLoaded: false,
            lastSaveTime: null,
            lastLoadTime: null,
            materialHistory: ['default'],
            meshCount: 0
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 10);
        camera.position.set(0, 0.15, 0.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(2, 3, 2);
        scene.add(directionalLight);

        // Ground Platform
        const platformGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.005, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44, roughness: 0.8, metalness: 0.2 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.0025;
        scene.add(platform);

        // Materials Definition
        const customMaterials = {
            matte_black: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 }),
            glossy_white: new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.1, metalness: 0.3 }),
            brushed_metal: new THREE.MeshStandardMaterial({ color: 0x8899aa, roughness: 0.4, metalness: 0.9 }),
            rose_gold: new THREE.MeshStandardMaterial({ color: 0xb76e79, roughness: 0.3, metalness: 0.8 })
        };

        let modelWrapper = new THREE.Group();
        scene.add(modelWrapper);
        const originalMaterials = new Map();

        // Load Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            model.position.x = -center.x;
            model.position.y = -box.min.y; // Rest on platform
            model.position.z = -center.z;

            modelWrapper.add(model);
            modelWrapper.scale.set(8, 8, 8);

            let count = 0;
            modelWrapper.traverse((child) => {
                if (child.isMesh) {
                    count++;
                    originalMaterials.set(child, child.material);
                }
            });

            window.__3D_STATE__.meshCount = count;
            window.__3D_STATE__.modelLoaded = true;
        });

        // UI Elements
        const hudInfo = document.getElementById('hud-info');
        const materialButtons = {
            'default': document.getElementById('btn-default'),
            'matte_black': document.getElementById('btn-matte_black'),
            'glossy_white': document.getElementById('btn-glossy_white'),
            'brushed_metal': document.getElementById('btn-brushed_metal'),
            'rose_gold': document.getElementById('btn-rose_gold')
        };
        const btnRotate = document.getElementById('btn-rotate');
        const btnSave = document.getElementById('btn-save');
        const btnLoad = document.getElementById('btn-load');

        // Functions
        function updateHUD() {
            const rotStatus = window.__3D_STATE__.autoRotate ? 'ON' : 'OFF';
            hudInfo.textContent = `Material: ${window.__3D_STATE__.currentMaterial} | Rotation: ${rotStatus}`;
            
            Object.keys(materialButtons).forEach(key => {
                if (key === window.__3D_STATE__.currentMaterial) {
                    materialButtons[key].classList.add('active');
                } else {
                    materialButtons[key].classList.remove('active');
                }
            });
        }

        function applyMaterial(preset) {
            if (!window.__3D_STATE__.modelLoaded) return;
            
            window.__3D_STATE__.currentMaterial = preset;
            if (window.__3D_STATE__.materialHistory[window.__3D_STATE__.materialHistory.length - 1] !== preset) {
                window.__3D_STATE__.materialHistory.push(preset);
            }

            modelWrapper.traverse((child) => {
                if (child.isMesh) {
                    if (preset === 'default') {
                        child.material = originalMaterials.get(child);
                    } else {
                        child.material = customMaterials[preset];
                    }
                }
            });
            updateHUD();
        }

        function toggleRotation() {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            updateHUD();
        }

        function saveState() {
            const state = {
                currentMaterial: window.__3D_STATE__.currentMaterial,
                autoRotate: window.__3D_STATE__.autoRotate,
                modelRotationY: modelWrapper.rotation.y,
                cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z }
            };
            localStorage.setItem('headphone_demo_state', JSON.stringify(state));
            
            window.__3D_STATE__.stateSaved = true;
            window.__3D_STATE__.lastSaveTime = Date.now();
            
            const originalText = btnSave.innerHTML;
            btnSave.innerHTML = 'Saved! ✓';
            setTimeout(() => btnSave.innerHTML = originalText, 1000);
        }

        function loadState() {
            const saved = localStorage.getItem('headphone_demo_state');
            if (saved) {
                const state = JSON.parse(saved);
                
                applyMaterial(state.currentMaterial);
                window.__3D_STATE__.autoRotate = state.autoRotate;
                modelWrapper.rotation.y = state.modelRotationY;
                camera.position.set(state.cameraPosition.x, state.cameraPosition.y, state.cameraPosition.z);
                controls.update();
                
                window.__3D_STATE__.stateLoaded = true;
                window.__3D_STATE__.lastLoadTime = Date.now();
                updateHUD();

                const originalText = btnLoad.innerHTML;
                btnLoad.innerHTML = 'Loaded! ✓';
                setTimeout(() => btnLoad.innerHTML = originalText, 1000);
            }
        }

        // Event Listeners
        Object.keys(materialButtons).forEach(preset => {
            materialButtons[preset].addEventListener('click', () => applyMaterial(preset));
        });

        btnRotate.addEventListener('click', toggleRotation);
        btnSave.addEventListener('click', saveState);
        btnLoad.addEventListener('click', loadState);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === '1') applyMaterial('default');
            if (key === '2') applyMaterial('matte_black');
            if (key === '3') applyMaterial('glossy_white');
            if (key === '4') applyMaterial('brushed_metal');
            if (key === '5') applyMaterial('rose_gold');
            if (key === 'r') toggleRotation();
            if (key === 's') saveState();
            if (key === 'l') loadState();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.modelLoaded && window.__3D_STATE__.autoRotate) {
                modelWrapper.rotation.y += 0.01;
            }

            // Update state every frame
            window.__3D_STATE__.modelRotationY = modelWrapper.rotation.y;
            window.__3D_STATE__.cameraPosition = { 
                x: camera.position.x, 
                y: camera.position.y, 
                z: camera.position.z 
            };

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
