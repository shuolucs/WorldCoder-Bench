<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Abstract Particle Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            padding: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            pointer-events: none;
            z-index: 10;
            line-height: 1.5;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hud">
        <div>Score: <span id="hud-score">0</span></div>
        <div>Combo: <span id="hud-combo">1x</span></div>
        <div>Bursts: <span id="hud-bursts">0</span></div>
        <div>Particles: <span id="hud-particles">500</span></div>
        <div>Mode: <span id="hud-colormode">rainbow</span></div>
    </div>

    <script>
        // State Management
        const state = {
            score: 0,
            combo: 1,
            totalBursts: 0,
            baseParticleCount: 500,
            burstParticleCount: 0,
            totalParticleCount: 500,
            gravityEnabled: true,
            colorMode: 'rainbow',
            paused: false,
            rotationSpeed: 0.002,
            gravityWellPosition: { x: 0, y: 0, z: 0 },
            frameCount: 0
        };
        window.__3D_STATE__ = state;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Utility: Random point in sphere
        function randomSpherePoint(radius) {
            const u = Math.random();
            const v = Math.random();
            const theta = 2 * Math.PI * u;
            const phi = Math.acos(2 * v - 1);
            const r = Math.cbrt(Math.random()) * radius;
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            return new THREE.Vector3(x, y, z);
        }

        // Base Particles
        const baseGeo = new THREE.BufferGeometry();
        const basePos = new Float32Array(state.baseParticleCount * 3);
        const baseColors = new Float32Array(state.baseParticleCount * 3);
        const baseLife = new Float32Array(state.baseParticleCount);
        const baseHues = new Float32Array(state.baseParticleCount);

        function initBaseParticles() {
            for (let i = 0; i < state.baseParticleCount; i++) {
                const p = randomSpherePoint(20);
                basePos[i * 3] = p.x;
                basePos[i * 3 + 1] = p.y;
                basePos[i * 3 + 2] = p.z;
                
                baseLife[i] = Math.random(); // Random initial life
                baseHues[i] = Math.random();
                
                const color = new THREE.Color();
                if (state.colorMode === 'rainbow') color.setHSL(baseHues[i], 1.0, 0.5);
                else if (state.colorMode === 'monochrome') color.setRGB(1, 1, 1);
                else color.setRGB(1, baseLife[i], 0);

                baseColors[i * 3] = color.r;
                baseColors[i * 3 + 1] = color.g;
                baseColors[i * 3 + 2] = color.b;
            }
            baseGeo.setAttribute('position', new THREE.BufferAttribute(basePos, 3));
            baseGeo.setAttribute('color', new THREE.BufferAttribute(baseColors, 3));
        }

        initBaseParticles();

        const baseMat = new THREE.PointsMaterial({
            size: 0.6,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        const basePoints = new THREE.Points(baseGeo, baseMat);
        scene.add(basePoints);

        // Interaction Setup
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const zPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const targetVec = new THREE.Vector3();
        const bursts = [];
        let lastClickTime = 0;

        // Mouse Move
        window.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(zPlane, targetVec);
            state.gravityWellPosition.x = targetVec.x;
            state.gravityWellPosition.y = targetVec.y;
            state.gravityWellPosition.z = targetVec.z;
        });

        // Click
        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(zPlane, targetVec);

            const now = performance.now();
            if (now - lastClickTime <= 2000) {
                state.combo = Math.min(10, state.combo + 1);
            } else {
                state.combo = 1;
            }
            lastClickTime = now;
            
            state.score += 1 * state.combo;
            state.totalBursts++;

            spawnBurst(targetVec.x, targetVec.y, targetVec.z);
        });

        // Spawn Burst
        function spawnBurst(x, y, z) {
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(50 * 3);
            const cols = new Float32Array(50 * 3);
            const vels = [];

            const c = new THREE.Color();
            for (let i = 0; i < 50; i++) {
                pos[i * 3] = x;
                pos[i * 3 + 1] = y;
                pos[i * 3 + 2] = z;

                if (state.colorMode === 'rainbow') c.setHSL(Math.random(), 1, 0.5);
                else if (state.colorMode === 'monochrome') c.setRGB(1, 1, 1);
                else c.setRGB(1, 1, 0); // Start yellow for fire

                cols[i * 3] = c.r;
                cols[i * 3 + 1] = c.g;
                cols[i * 3 + 2] = c.b;

                const v = randomSpherePoint(1).normalize().multiplyScalar(Math.random() * 0.4 + 0.1);
                vels.push(v);
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));

            const mat = new THREE.PointsMaterial({
                size: 0.5,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                transparent: true,
                opacity: 1.0
            });

            const points = new THREE.Points(geo, mat);
            scene.add(points);
            bursts.push({ points, vels, life: 1.0 });
        }

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'g') {
                state.gravityEnabled = !state.gravityEnabled;
            } else if (key === ' ') {
                state.paused = !state.paused;
            } else if (key === 'c') {
                const modes = ['rainbow', 'monochrome', 'fire'];
                state.colorMode = modes[(modes.indexOf(state.colorMode) + 1) % modes.length];
                updateAllColors();
            } else if (key === 'r') {
                state.score = 0;
                state.combo = 1;
                state.totalBursts = 0;
                lastClickTime = 0;
                
                bursts.forEach(b => {
                    scene.remove(b.points);
                    b.points.geometry.dispose();
                    b.points.material.dispose();
                });
                bursts.length = 0;
                
                initBaseParticles();
                baseGeo.attributes.position.needsUpdate = true;
                baseGeo.attributes.color.needsUpdate = true;
            }
        });

        function updateAllColors() {
            const colors = baseGeo.attributes.color.array;
            const c = new THREE.Color();
            for (let i = 0; i < state.baseParticleCount; i++) {
                if (state.colorMode === 'rainbow') c.setHSL(baseHues[i], 1, 0.5);
                else if (state.colorMode === 'monochrome') c.setRGB(1, 1, 1);
                else c.setRGB(1, baseLife[i], 0);
                
                colors[i * 3] = c.r;
                colors[i * 3 + 1] = c.g;
                colors[i * 3 + 2] = c.b;
            }
            baseGeo.attributes.color.needsUpdate = true;

            bursts.forEach(b => {
                const bCols = b.points.geometry.attributes.color.array;
                for (let i = 0; i < 50; i++) {
                    if (state.colorMode === 'rainbow') c.setHSL(Math.random(), 1, 0.5);
                    else if (state.colorMode === 'monochrome') c.setRGB(1, 1, 1);
                    else c.setRGB(1, b.life, 0);
                    
                    bCols[i * 3] = c.r;
                    bCols[i * 3 + 1] = c.g;
                    bCols[i * 3 + 2] = c.b;
                }
                b.points.geometry.attributes.color.needsUpdate = true;
            });
        }

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        let lastTime = performance.now();
        let timeElapsed = 0;

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;

            // Combo Reset Logic
            if (now - lastClickTime > 2000 && state.combo > 1) {
                state.combo = 1;
            }

            if (!state.paused) {
                state.frameCount++;
                timeElapsed += delta * 0.001;

                // Orbit
                basePoints.rotation.y += state.rotationSpeed;

                const positions = baseGeo.attributes.position.array;
                const colors = baseGeo.attributes.color.array;
                
                const gwWorld = new THREE.Vector3(state.gravityWellPosition.x, state.gravityWellPosition.y, state.gravityWellPosition.z);
                const gwLocal = gwWorld.clone();
                basePoints.worldToLocal(gwLocal);

                const c = new THREE.Color();

                for (let i = 0; i < state.baseParticleCount; i++) {
                    // Life & Respawn
                    baseLife[i] -= 0.001;
                    if (baseLife[i] <= 0) {
                        baseLife[i] = 1.0;
                        const p = randomSpherePoint(20);
                        positions[i * 3] = p.x;
                        positions[i * 3 + 1] = p.y;
                        positions[i * 3 + 2] = p.z;
                        baseHues[i] = Math.random();
                        
                        if (state.colorMode === 'rainbow') {
                            c.setHSL(baseHues[i], 1, 0.5);
                            colors[i * 3] = c.r; colors[i * 3 + 1] = c.g; colors[i * 3 + 2] = c.b;
                        }
                    }

                    // Sine Wave Oscillation
                    positions[i * 3 + 1] += Math.sin(timeElapsed * 2 + i * 0.1) * 0.02;

                    // Gravity Well
                    if (state.gravityEnabled) {
                        const p = new THREE.Vector3(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                        const dist = p.distanceTo(gwLocal);
                        if (dist < 10 && dist > 0.1) {
                            const force = 1 / dist;
                            const dir = new THREE.Vector3().subVectors(gwLocal, p).normalize();
                            p.add(dir.multiplyScalar(force * 0.05));
                            positions[i * 3] = p.x;
                            positions[i * 3 + 1] = p.y;
                            positions[i * 3 + 2] = p.z;
                        }
                    }

                    // Fire Mode Color Update
                    if (state.colorMode === 'fire') {
                        c.setRGB(1, baseLife[i], 0);
                        colors[i * 3] = c.r;
                        colors[i * 3 + 1] = c.g;
                        colors[i * 3 + 2] = c.b;
                    }
                }

                baseGeo.attributes.position.needsUpdate = true;
                if (state.colorMode === 'fire' || state.colorMode === 'rainbow') {
                    baseGeo.attributes.color.needsUpdate = true;
                }

                // Burst Particles Update
                let activeBurstCount = 0;
                for (let i = bursts.length - 1; i >= 0; i--) {
                    const b = bursts[i];
                    b.life -= delta / 2000; // Fade over 2 seconds

                    if (b.life <= 0) {
                        scene.remove(b.points);
                        b.points.geometry.dispose();
                        b.points.material.dispose();
                        bursts.splice(i, 1);
                    } else {
                        b.points.material.opacity = b.life;
                        const bPos = b.points.geometry.attributes.position.array;
                        const bCols = b.points.geometry.attributes.color.array;
                        
                        for (let j = 0; j < 50; j++) {
                            bPos[j * 3] += b.vels[j].x;
                            bPos[j * 3 + 1] += b.vels[j].y;
                            bPos[j * 3 + 2] += b.vels[j].z;

                            if (state.colorMode === 'fire') {
                                c.setRGB(1, b.life, 0);
                                bCols[j * 3] = c.r;
                                bCols[j * 3 + 1] = c.g;
                                bCols[j * 3 + 2] = c.b;
                            }
                        }
                        b.points.geometry.attributes.position.needsUpdate = true;
                        if (state.colorMode === 'fire') b.points.geometry.attributes.color.needsUpdate = true;
                        activeBurstCount += 50;
                    }
                }
                state.burstParticleCount = activeBurstCount;
                state.totalParticleCount = state.baseParticleCount + state.burstParticleCount;
            }

            // Update HUD
            document.getElementById('hud-score').innerText = state.score;
            document.getElementById('hud-combo').innerText = state.combo + 'x';
            document.getElementById('hud-bursts').innerText = state.totalBursts;
            document.getElementById('hud-particles').innerText = state.totalParticleCount;
            document.getElementById('hud-colormode').innerText = state.colorMode;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
