<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 2D Wave Interference</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            text-align: right;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #scoreDisplay {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffaa00;
        }
        .hud-text {
            font-size: 16px;
            margin-bottom: 5px;
        }
        #pauseIndicator {
            color: #ff4444;
            font-weight: bold;
            font-size: 20px;
            margin-top: 10px;
            display: none;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0; }
            100% { opacity: 1; }
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        #clearBtn {
            pointer-events: auto;
            margin-top: 10px;
            padding: 8px 16px;
            background: rgba(34, 68, 170, 0.8);
            color: white;
            border: 1px solid #88aaff;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #clearBtn:hover {
            background: rgba(51, 102, 204, 0.9);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div id="scoreDisplay">Score: 0</div>
        <div id="comboDisplay" class="hud-text">Combo: 1x</div>
        <div id="sourceCount" class="hud-text">Sources: 0/5</div>
        <div id="centerDisplacement" class="hud-text">Center Δ: 0.00</div>
        <button id="clearBtn">Clear Waves</button>
        <div id="pauseIndicator">PAUSED</div>
    </div>

    <div id="controls-help">
        <strong>Controls:</strong><br>
        Left Click: Place Wave Source<br>
        F / D: Increase/Decrease Frequency of last source<br>
        A: Increase Amplitude of last source<br>
        R: Reset All (Waves & Score)<br>
        P: Toggle Pause
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 0,
            combo: 1,
            sourceCount: 0,
            paused: false,
            centerDisplacement: 0,
            lastSourceFrequency: 0,
            lastSourceAmplitude: 0,
            totalVertices: 201 * 201,
            amberLoaded: false,
            amberEmissiveIntensity: 0,
            maxSourcesReached: false,
            elapsedTime: 0,
            wavesCleared: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Amber Model ---
        const amberGroup = new THREE.Group();
        amberGroup.position.set(0, 8, 0);
        amberGroup.scale.set(3, 3, 3);
        scene.add(amberGroup);

        // Fallback geometry while loading or if fails
        const fallbackGeo = new THREE.DodecahedronGeometry(1);
        const fallbackMat = new THREE.MeshStandardMaterial({ 
            color: 0xffaa00, 
            emissive: 0xff8800, 
            emissiveIntensity: 0,
            transparent: true,
            opacity: 0.9,
            roughness: 0.2,
            metalness: 0.1
        });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        amberGroup.add(fallbackMesh);

        const gltfLoader = new GLTFLoader();
        gltfLoader.load('MosquitoInAmber.glb', (gltf) => {
            amberGroup.clear();
            const model = gltf.scene;
            
            // Ensure materials support emissive
            model.traverse((child) => {
                if (child.isMesh) {
                    const oldMat = child.material;
                    child.material = new THREE.MeshStandardMaterial({
                        color: oldMat.color || 0xffaa00,
                        map: oldMat.map,
                        emissive: new THREE.Color(0xff8800),
                        emissiveIntensity: 0,
                        transparent: oldMat.transparent,
                        opacity: oldMat.opacity,
                        roughness: oldMat.roughness || 0.2,
                        metalness: oldMat.metalness || 0.1
                    });
                }
            });
            
            amberGroup.add(model);
            window.__3D_STATE__.amberLoaded = true;
        }, undefined, (error) => {
            console.warn('Could not load MosquitoInAmber.glb, using fallback.', error);
            window.__3D_STATE__.amberLoaded = true;
        });

        // --- Water Surface ---
        const segments = 200;
        const waterGeo = new THREE.PlaneGeometry(40, 40, segments, segments);
        waterGeo.rotateX(-Math.PI / 2);

        const colors = new Float32Array((segments + 1) * (segments + 1) * 3);
        for (let i = 0; i < colors.length; i += 3) {
            colors[i] = 0.133;     // R: 0x22
            colors[i + 1] = 0.267; // G: 0x44
            colors[i + 2] = 0.667; // B: 0xaa
        }
        waterGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const waterMat = new THREE.MeshPhongMaterial({
            color: 0xffffff, // Base color multiplied by vertex colors
            transparent: true,
            opacity: 0.7,
            side: THREE.DoubleSide,
            shininess: 100,
            vertexColors: true
        });
        const waterMesh = new THREE.Mesh(waterGeo, waterMat);
        scene.add(waterMesh);

        // --- Wave Physics ---
        const waves = [];
        const MAX_WAVES = 5;
        const WAVELENGTH = 2.0;
        const K = (2 * Math.PI) / WAVELENGTH;
        const DAMPING = 0.05;

        const pulses = [];

        function calculateDisplacementAt(x, z) {
            let disp = 0;
            for (let i = 0; i < waves.length; i++) {
                const w = waves[i];
                const dx = x - w.x;
                const dz = z - w.z;
                const r = Math.sqrt(dx * dx + dz * dz);
                const omega = 2 * Math.PI * w.freq;
                disp += w.amp * Math.sin(K * r - omega * w.time + w.phase) * Math.exp(-DAMPING * r);
            }
            return disp;
        }

        function createPulse(x, z) {
            const geo = new THREE.RingGeometry(0.1, 0.3, 32);
            geo.rotateX(-Math.PI / 2);
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0xffffff, 
                transparent: true, 
                opacity: 1, 
                side: THREE.DoubleSide,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 0.1, z);
            scene.add(mesh);
            pulses.push({ mesh, age: 0 });
        }

        function addWave(x, z) {
            if (waves.length >= MAX_WAVES) return;

            const oldCenterDisp = Math.abs(calculateDisplacementAt(0, 0));

            const markerGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.set(x, 0, z);
            scene.add(marker);

            const freq = 1.5;
            const amp = 0.8;
            const wave = { x, z, freq, amp, phase: 0, time: 0, marker };
            waves.push(wave);

            createPulse(x, z);

            const newCenterDisp = Math.abs(calculateDisplacementAt(0, 0));

            if (newCenterDisp > oldCenterDisp) {
                window.__3D_STATE__.combo = Math.min(5, window.__3D_STATE__.combo + 1);
            } else {
                window.__3D_STATE__.combo = 1;
            }

            const scoreAdd = Math.round(newCenterDisp * 100) * window.__3D_STATE__.combo;
            window.__3D_STATE__.score += scoreAdd;

            window.__3D_STATE__.lastSourceFrequency = freq;
            window.__3D_STATE__.lastSourceAmplitude = amp;
            window.__3D_STATE__.wavesCleared = false;
            
            updateHUD();
        }

        function clearWaves(resetScore) {
            for (let i = 0; i < waves.length; i++) {
                scene.remove(waves[i].marker);
            }
            waves.length = 0;
            
            if (resetScore) {
                window.__3D_STATE__.score = 0;
                window.__3D_STATE__.combo = 1;
            }
            
            window.__3D_STATE__.lastSourceFrequency = 0;
            window.__3D_STATE__.lastSourceAmplitude = 0;
            window.__3D_STATE__.wavesCleared = true;
            updateHUD();
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            if (window.__3D_STATE__.paused) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(waterMesh);

            if (intersects.length > 0) {
                addWave(intersects[0].point.x, intersects[0].point.z);
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            const lastWave = waves[waves.length - 1];

            if (key === 'f' && lastWave) {
                lastWave.freq = Math.min(3.0, lastWave.freq + 0.25);
                window.__3D_STATE__.lastSourceFrequency = lastWave.freq;
            } else if (key === 'd' && lastWave) {
                lastWave.freq = Math.max(0.5, lastWave.freq - 0.25);
                window.__3D_STATE__.lastSourceFrequency = lastWave.freq;
            } else if (key === 'a' && lastWave) {
                lastWave.amp = Math.min(1.0, lastWave.amp + 0.1);
                window.__3D_STATE__.lastSourceAmplitude = lastWave.amp;
            } else if (key === 'r') {
                clearWaves(true);
            } else if (key === 'p') {
                window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
                document.getElementById('pauseIndicator').style.display = window.__3D_STATE__.paused ? 'block' : 'none';
            }
            updateHUD();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            clearWaves(false);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        function updateHUD() {
            window.__3D_STATE__.sourceCount = waves.length;
            window.__3D_STATE__.maxSourcesReached = waves.length >= MAX_WAVES;

            document.getElementById('scoreDisplay').innerText = `Score: ${window.__3D_STATE__.score}`;
            document.getElementById('comboDisplay').innerText = `Combo: ${window.__3D_STATE__.combo}x`;
            document.getElementById('sourceCount').innerText = `Sources: ${waves.length}/5`;
            document.getElementById('centerDisplacement').innerText = `Center Δ: ${window.__3D_STATE__.centerDisplacement.toFixed(2)}`;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const baseColor = new THREE.Color(0x2244aa);
        const posColor = new THREE.Color(0xaaaaff);
        const negColor = new THREE.Color(0x000022);

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (!window.__3D_STATE__.paused) {
                window.__3D_STATE__.elapsedTime += dt;

                // Update Waves
                for (let i = waves.length - 1; i >= 0; i--) {
                    const w = waves[i];
                    w.time += dt;
                    w.amp -= 0.98 * dt; // Amplitude reduces by 0.98 each second

                    if (w.amp < 0.01) {
                        scene.remove(w.marker);
                        waves.splice(i, 1);
                        updateHUD();
                    }
                }

                // Update Pulses
                for (let i = pulses.length - 1; i >= 0; i--) {
                    const p = pulses[i];
                    p.age += dt;
                    p.mesh.scale.setScalar(1 + p.age * 8);
                    p.mesh.material.opacity = Math.max(0, 1 - p.age * 2);
                    if (p.age > 0.5) {
                        scene.remove(p.mesh);
                        pulses.splice(i, 1);
                    }
                }

                // Update Water Vertices
                const positions = waterGeo.attributes.position;
                const colorAttr = waterGeo.attributes.color;
                let centerDisp = 0;

                for (let i = 0; i < positions.count; i++) {
                    const x = positions.getX(i);
                    const z = positions.getZ(i);
                    const y = calculateDisplacementAt(x, z);
                    
                    positions.setY(i, y);

                    // Track center displacement (approximate origin)
                    if (Math.abs(x) < 0.1 && Math.abs(z) < 0.1) {
                        centerDisp = y;
                    }

                    // Vertex Colors
                    let c = baseColor.clone();
                    if (y > 0) {
                        c.lerp(posColor, Math.min(y / 1.0, 1));
                    } else {
                        c.lerp(negColor, Math.min(-y / 1.0, 1));
                    }
                    colorAttr.setXYZ(i, c.r, c.g, c.b);
                }

                positions.needsUpdate = true;
                colorAttr.needsUpdate = true;
                waterGeo.computeVertexNormals();

                window.__3D_STATE__.centerDisplacement = centerDisp;
                document.getElementById('centerDisplacement').innerText = `Center Δ: ${centerDisp.toFixed(2)}`;
            }

            // Amber Animation
            amberGroup.rotation.y += 0.005;
            
            const targetIntensity = Math.min(window.__3D_STATE__.score / 500, 2.0);
            window.__3D_STATE__.amberEmissiveIntensity = targetIntensity;

            amberGroup.traverse((child) => {
                if (child.isMesh && child.material.emissive) {
                    child.material.emissiveIntensity = targetIntensity;
                }
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize HUD and start loop
        updateHUD();
        animate();
    </script>
</body>
</html>
