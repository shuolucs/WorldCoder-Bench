<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Interference Pattern</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas { display: block; }
#hud {
    position: absolute;
    top: 20px;
    right: 20px;
    text-align: right;
    user-select: none;
    pointer-events: none;
}
#scoreDisplay {
    color: white;
    font-size: 24px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
#comboDisplay {
    color: #ffcc00;
    font-size: 20px;
    margin-top: 5px;
    text-shadow: 0 0 10px rgba(255,204,0,0.5);
}
#sourceCount {
    color: #88ccff;
    font-size: 16px;
    margin-top: 5px;
}
#centerDisplacement {
    color: #aaffaa;
    font-size: 16px;
    margin-top: 5px;
}
#pauseIndicator {
    color: #ff4444;
    font-size: 32px;
    font-weight: bold;
    margin-top: 15px;
    text-shadow: 0 0 20px rgba(255,0,0,0.7);
    display: none;
}
#clearBtn {
    position: absolute;
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    font-size: 16px;
    background: rgba(255, 50, 50, 0.7);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}
#clearBtn:hover {
    background: rgba(255, 50, 50, 1.0);
}
#instructions {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    line-height: 1.6;
    user-select: none;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="comboDisplay">Combo: 1x</div>
    <div id="sourceCount">Sources: 0/5</div>
    <div id="centerDisplacement">Center Δ: 0.00</div>
    <div id="pauseIndicator">PAUSED</div>
</div>

<button id="clearBtn">Clear Waves</button>

<div id="instructions">
    Left Click: Place wave source<br>
    F/D: Increase/Decrease frequency<br>
    A: Increase amplitude<br>
    R: Reset all<br>
    P: Pause/Resume
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 25, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 20, 10);
scene.add(directionalLight);

// State
let score = 0;
let combo = 1;
let paused = false;
let simulationTime = 0;
let wavesCleared = false;
let amberLoaded = false;
let amberModel = null;
let amberMaterials = [];
let currentAmberEmissiveIntensity = 0;

const waveSources = [];
const sourceMarkers = [];
const pulseRings = [];

// Water surface
const planeSegments = 200;
const planeSize = 40;
const geometry = new THREE.PlaneGeometry(planeSize, planeSize, planeSegments, planeSegments);
geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array((planeSegments + 1) * (planeSegments + 1) * 3), 3));

const waterMaterial = new THREE.MeshPhongMaterial({
    color: 0x2244aa,
    transparent: true,
    opacity: 0.7,
    side: THREE.DoubleSide,
    shininess: 100,
    vertexColors: true,
});

const waterMesh = new THREE.Mesh(geometry, waterMaterial);
waterMesh.rotation.x = -Math.PI / 2;
waterMesh.position.y = 0;
scene.add(waterMesh);

const totalVertices = (planeSegments + 1) * (planeSegments + 1);

// Raycaster for click detection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const clickPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

// Load amber model
const loader = new GLTFLoader();
loader.load(
    'MosquitoInAmber.glb',
    (gltf) => {
        amberModel = gltf.scene;
        amberModel.position.set(0, 8, 0);
        amberModel.scale.set(3, 3, 3);
        scene.add(amberModel);
        amberLoaded = true;

        amberModel.traverse((child) => {
            if (child.isMesh && child.material) {
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach((mat) => {
                    mat.emissive = new THREE.Color(0xff8800);
                    mat.emissiveIntensity = 0;
                    amberMaterials.push(mat);
                });
            }
        });
    },
    undefined,
    (error) => {
        console.warn('Could not load MosquitoInAmber.glb:', error);
        // Create a placeholder amber
        const amberGeo = new THREE.DodecahedronGeometry(1.5, 1);
        const amberMat = new THREE.MeshPhongMaterial({
            color: 0xcc8800,
            transparent: true,
            opacity: 0.8,
            emissive: new THREE.Color(0xff8800),
            emissiveIntensity: 0,
            shininess: 150,
        });
        amberMaterials.push(amberMat);
        amberModel = new THREE.Mesh(amberGeo, amberMat);
        amberModel.position.set(0, 8, 0);
        amberModel.scale.set(3, 3, 3);
        scene.add(amberModel);
        amberLoaded = true;
    }
);

// Wave physics constants
const wavelength = 2.0;
const k = (2 * Math.PI) / wavelength;
const damping = 0.05;

function calculateDisplacementAtPoint(px, pz, time) {
    let total = 0;
    for (let i = 0; i < waveSources.length; i++) {
        const src = waveSources[i];
        const dx = px - src.x;
        const dz = pz - src.z;
        const r = Math.sqrt(dx * dx + dz * dz);
        const omega = 2 * Math.PI * src.frequency;
        total += src.amplitude * Math.sin(k * r - omega * time + src.phase) * Math.exp(-damping * r);
    }
    return total;
}

function updateWaterSurface(time) {
    const positions = geometry.attributes.position.array;
    const colors = geometry.attributes.color.array;
    const halfSize = planeSize / 2;
    const step = planeSize / planeSegments;

    for (let i = 0; i <= planeSegments; i++) {
        for (let j = 0; j <= planeSegments; j++) {
            const idx = i * (planeSegments + 1) + j;
            const px = -halfSize + j * step;
            const pz = -halfSize + i * step;

            let displacement = 0;
            for (let s = 0; s < waveSources.length; s++) {
                const src = waveSources[s];
                const dx = px - src.x;
                const dz = pz - src.z;
                const r = Math.sqrt(dx * dx + dz * dz);
                const omega = 2 * Math.PI * src.frequency;
                displacement += src.amplitude * Math.sin(k * r - omega * time + src.phase) * Math.exp(-damping * r);
            }

            // The plane is rotated, so Y in plane space becomes Y in world space after rotation
            // In PlaneGeometry, vertices are (x, y, z) where z=0 initially
            // After rotation.x = -PI/2, the plane's local Y maps to world Z and local Z maps to world -Y
            // But we modify the Z component of the unrotated plane to create displacement
            positions[idx * 3 + 2] = displacement;

            // Color based on displacement
            const t = Math.max(0, Math.min(1, (displacement + 1.5) / 3.0));
            const r2 = 0.05 + t * 0.95;
            const g = 0.1 + t * 0.9;
            const b = 0.3 + t * 0.7;
            colors[idx * 3] = r2;
            colors[idx * 3 + 1] = g;
            colors[idx * 3 + 2] = b;
        }
    }

    geometry.attributes.position.needsUpdate = true;
    geometry.attributes.color.needsUpdate = true;
    geometry.computeVertexNormals();
}

function addWaveSource(x, z) {
    if (waveSources.length >= 5) return;

    const prevDisplacement = Math.abs(calculateDisplacementAtPoint(0, 0, simulationTime));

    const source = {
        x: x,
        z: z,
        frequency: 1.5,
        amplitude: 0.8,
        phase: 0,
        creationTime: simulationTime,
    };
    waveSources.push(source);
    wavesCleared = false;

    // Create marker sphere
    const markerGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const markerMat = new THREE.MeshBasicMaterial({
        color: 0xffff00,
        emissive: 0xffff00,
    });
    // Use MeshStandardMaterial for emissive
    const markerMat2 = new THREE.MeshStandardMaterial({
        color: 0xffff00,
        emissive: 0xffff00,
        emissiveIntensity: 2.0,
    });
    const marker = new THREE.Mesh(markerGeo, markerMat2);
    marker.position.set(x, 0.3, z);
    scene.add(marker);
    sourceMarkers.push(marker);

    // Create pulse ring
    createPulseRing(x, z);

    // Calculate score
    const newDisplacement = Math.abs(calculateDisplacementAtPoint(0, 0, simulationTime));

    if (newDisplacement > prevDisplacement && waveSources.length > 1) {
        combo = Math.min(combo + 1, 5);
    } else if (newDisplacement < prevDisplacement && waveSources.length > 1) {
        combo = 1;
    }

    const scoreAdd = Math.round(newDisplacement * 100) * combo;
    score += scoreAdd;

    updateHUD();
}

function createPulseRing(x, z) {
    const ringGeo = new THREE.RingGeometry(0.1, 0.3, 32);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x44aaff,
        transparent: true,
        opacity: 1.0,
        side: THREE.DoubleSide,
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(x, 0.1, z);
    scene.add(ring);
    pulseRings.push({
        mesh: ring,
        age: 0,
        maxAge: 1.5,
    });
}

function updatePulseRings(dt) {
    for (let i = pulseRings.length - 1; i >= 0; i--) {
        const ring = pulseRings[i];
        ring.age += dt;
        const progress = ring.age / ring.maxAge;
        const scale = 1 + progress * 15;
        ring.mesh.scale.set(scale, scale, scale);
        ring.mesh.material.opacity = 1.0 - progress;

        if (ring.age >= ring.maxAge) {
            scene.remove(ring.mesh);
            ring.mesh.geometry.dispose();
            ring.mesh.material.dispose();
            pulseRings.splice(i, 1);
        }
    }
}

function decayWaveSources(dt) {
    for (let i = waveSources.length - 1; i >= 0; i--) {
        waveSources[i].amplitude *= Math.pow(0.98, dt);
        if (waveSources[i].amplitude < 0.01) {
            waveSources.splice(i, 1);
            if (sourceMarkers[i]) {
                scene.remove(sourceMarkers[i]);
                sourceMarkers[i].geometry.dispose();
                sourceMarkers[i].material.dispose();
                sourceMarkers.splice(i, 1);
            }
        }
    }
}

function clearWaves() {
    while (waveSources.length > 0) {
        waveSources.pop();
    }
    while (sourceMarkers.length > 0) {
        const m = sourceMarkers.pop();
        scene.remove(m);
        m.geometry.dispose();
        m.material.dispose();
    }
    wavesCleared = true;
}

function updateHUD() {
    document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
    document.getElementById('comboDisplay').textContent = `Combo: ${combo}x`;
    document.getElementById('sourceCount').textContent = `Sources: ${waveSources.length}/5`;
    document.getElementById('pauseIndicator').style.display = paused ? 'block' : 'none';

    const centerDisp = calculateDisplacementAtPoint(0, 0, simulationTime);
    document.getElementById('centerDisplacement').textContent = `Center Δ: ${centerDisp.toFixed(2)}`;
}

function updateAmberEmissive() {
    currentAmberEmissiveIntensity = Math.min(score / 500, 2.0);
    amberMaterials.forEach((mat) => {
        mat.emissiveIntensity = currentAmberEmissiveIntensity;
    });
}

// Event listeners
renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const intersectPoint = new THREE.Vector3();
    const hit = raycaster.ray.intersectPlane(clickPlane, intersectPoint);

    if (hit) {
        const halfSize = planeSize / 2;
        if (intersectPoint.x >= -halfSize && intersectPoint.x <= halfSize &&
            intersectPoint.z >= -halfSize && intersectPoint.z <= halfSize) {
            addWaveSource(intersectPoint.x, intersectPoint.z);
        }
    }
});

document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'f') {
        if (waveSources.length > 0) {
            const last = waveSources[waveSources.length - 1];
            last.frequency = Math.min(last.frequency + 0.25, 3.0);
            updateHUD();
        }
    } else if (key === 'd') {
        if (waveSources.length > 0) {
            const last = waveSources[waveSources.length - 1];
            last.frequency = Math.max(last.frequency - 0.25, 0.5);
            updateHUD();
        }
    } else if (key === 'a') {
        if (waveSources.length > 0) {
            const last = waveSources[waveSources.length - 1];
            last.amplitude = Math.min(last.amplitude + 0.1, 1.0);
            updateHUD();
        }
    } else if (key === 'r') {
        clearWaves();
        score = 0;
        combo = 1;
        wavesCleared = true;
        updateHUD();
    } else if (key === 'p') {
        paused = !paused;
        updateHUD();
    }
});

document.getElementById('clearBtn').addEventListener('click', () => {
    clearWaves();
    updateHUD();
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// State management
window.__3D_STATE__ = {};

function updateState() {
    const lastSrc = waveSources.length > 0 ? waveSources[waveSources.length - 1] : null;
    const centerDisp = calculateDisplacementAtPoint(0, 0, simulationTime);

    window.__3D_STATE__.score = score;
    window.__3D_STATE__.combo = combo;
    window.__3D_STATE__.sourceCount = waveSources.length;
    window.__3D_STATE__.paused = paused;
    window.__3D_STATE__.centerDisplacement = centerDisp;
    window.__3D_STATE__.lastSourceFrequency = lastSrc ? lastSrc.frequency : 0;
    window.__3D_STATE__.lastSourceAmplitude = lastSrc ? lastSrc.amplitude : 0;
    window.__3D_STATE__.totalVertices = totalVertices;
    window.__3D_STATE__.amberLoaded = amberLoaded;
    window.__3D_STATE__.amberEmissiveIntensity = currentAmberEmissiveIntensity;
    window.__3D_STATE__.maxSourcesReached = waveSources.length >= 5;
    window.__3D_STATE__.elapsedTime = simulationTime;
    window.__3D_STATE__.wavesCleared = wavesCleared;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();

    if (!paused) {
        simulationTime += dt;
        decayWaveSources(dt);
        updateWaterSurface(simulationTime);
        updatePulseRings(dt);
    }

    // Rotate amber
    if (amberModel) {
        amberModel.rotation.y += 0.005;
        updateAmberEmissive();
    }

    // Update marker positions to float on water
    for (let i = 0; i < sourceMarkers.length; i++) {
        if (i < waveSources.length) {
            const disp = calculateDisplacementAtPoint(waveSources[i].x, waveSources[i].z, simulationTime);
            sourceMarkers[i].position.y = disp + 0.3;
            // Pulsing glow
            const pulse = 1.5 + 0.5 * Math.sin(simulationTime * 5);
            sourceMarkers[i].material.emissiveIntensity = pulse;
        }
    }

    controls.update();
    updateHUD();
    updateState();

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
