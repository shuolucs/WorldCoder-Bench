<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Billiards with Robot Referee</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 220px;
      user-select: none;
    }

    #hud div {
      margin: 6px 0;
    }

    #btn-slowmo {
      margin-top: 8px;
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: #2b7cff;
      color: white;
      font-weight: bold;
    }

    #btn-slowmo.active {
      background: #ff8c2b;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Player: <span id="hud-player">1</span></div>
    <div>Collisions: <span id="hud-collisions">0</span></div>
    <div>Status: <span id="hud-moving">Stopped</span></div>
    <button id="btn-slowmo">Slow Motion</button>
  </div>

  <div id="info">
    Drag from the cue ball to shoot. Press <b>R</b> to reset. Press <b>1</b> or <b>2</b> to switch player.
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // -----------------------
    // Basic Scene Setup
    // -----------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252b);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 12, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // -----------------------
    // Lights
    // -----------------------
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(0, 8, 0);
    pointLight.castShadow = true;
    pointLight.shadow.mapSize.set(1024, 1024);
    scene.add(pointLight);

    // -----------------------
    // Table
    // -----------------------
    const TABLE_LENGTH = 12;
    const TABLE_WIDTH = 6;
    const BALL_RADIUS = 0.3;
    const RAIL_HEIGHT = 0.3;
    const INNER_X_MIN = -5.7;
    const INNER_X_MAX = 5.7;
    const INNER_Z_MIN = -2.7;
    const INNER_Z_MAX = 2.7;

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    // Felt
    const feltGeom = new THREE.BoxGeometry(TABLE_LENGTH, 0.2, TABLE_WIDTH);
    const feltMat = new THREE.MeshStandardMaterial({ color: 0x156b2f });
    const feltMesh = new THREE.Mesh(feltGeom, feltMat);
    feltMesh.position.y = -0.1;
    feltMesh.receiveShadow = true;
    tableGroup.add(feltMesh);

    // Rails
    const woodMat = new THREE.MeshStandardMaterial({
      color: 0x6b3e1f,
      roughness: 0.7,
      metalness: 0.1
    });

    const railThickness = 0.3;
    const topRail = new THREE.Mesh(
      new THREE.BoxGeometry(TABLE_LENGTH + 2 * railThickness, RAIL_HEIGHT, railThickness),
      woodMat
    );
    topRail.position.set(0, RAIL_HEIGHT / 2, TABLE_WIDTH / 2 + railThickness / 2);
    topRail.castShadow = true;
    topRail.receiveShadow = true;
    tableGroup.add(topRail);

    const bottomRail = topRail.clone();
    bottomRail.position.z = -(TABLE_WIDTH / 2 + railThickness / 2);
    tableGroup.add(bottomRail);

    const leftRail = new THREE.Mesh(
      new THREE.BoxGeometry(railThickness, RAIL_HEIGHT, TABLE_WIDTH),
      woodMat
    );
    leftRail.position.set(-(TABLE_LENGTH / 2 + railThickness / 2), RAIL_HEIGHT / 2, 0);
    leftRail.castShadow = true;
    leftRail.receiveShadow = true;
    tableGroup.add(leftRail);

    const rightRail = leftRail.clone();
    rightRail.position.x = (TABLE_LENGTH / 2 + railThickness / 2);
    tableGroup.add(rightRail);

    // -----------------------
    // Balls
    // -----------------------
    const ballMaterialProps = {
      metalness: 0.3,
      roughness: 0.4
    };

    const initialBallData = [
      { color: 0xffffff, pos: new THREE.Vector3(-4, BALL_RADIUS, 0) },   // cue
      { color: 0xff3333, pos: new THREE.Vector3(2, BALL_RADIUS, 0) },     // red
      { color: 0x3366ff, pos: new THREE.Vector3(3, BALL_RADIUS, 1) },     // blue
      { color: 0xffdd33, pos: new THREE.Vector3(3, BALL_RADIUS, -1) }     // yellow
    ];

    const balls = [];
    const ballGeom = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);

    for (let i = 0; i < initialBallData.length; i++) {
      const data = initialBallData[i];
      const mat = new THREE.MeshStandardMaterial({
        color: data.color,
        ...ballMaterialProps
      });

      const mesh = new THREE.Mesh(ballGeom, mat);
      mesh.position.copy(data.pos);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      balls.push({
        mesh,
        radius: BALL_RADIUS,
        mass: 1.0,
        velocity: new THREE.Vector2(0, 0), // x, z
        initialPosition: data.pos.clone(),
        index: i
      });
    }

    // -----------------------
    // Robot Referee
    // -----------------------
    const loader = new GLTFLoader();
    let robot = null;
    let robotLoaded = false;
    let robotRotating = false;

    loader.load(
      'robot.glb',
      (gltf) => {
        robot = gltf.scene;
        robot.position.set(0, 0, -4);
        robot.scale.set(0.5, 0.5, 0.5);
        scene.add(robot);
        robotLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load robot.glb', err);
      }
    );

    // -----------------------
    // HUD / State
    // -----------------------
    const hudPlayer = document.getElementById('hud-player');
    const hudCollisions = document.getElementById('hud-collisions');
    const hudMoving = document.getElementById('hud-moving');
    const btnSlowmo = document.getElementById('btn-slowmo');

    let activePlayer = 1;
    let totalCollisions = 0;
    let wallBounces = 0;
    let slowMotion = false;
    let resetCount = 0;

    window.__3D_STATE__ = {
      ballPositions: [],
      ballVelocities: [],
      totalCollisions: 0,
      wallBounces: 0,
      activePlayer: 1,
      ballsMoving: false,
      slowMotion: false,
      resetCount: 0,
      robotLoaded: false,
      totalKineticEnergy: 0,
      robotRotating: false
    };

    function updateHUD(ballsMoving) {
      hudPlayer.textContent = activePlayer;
      hudCollisions.textContent = totalCollisions;
      hudMoving.textContent = ballsMoving ? 'Moving' : 'Stopped';
      btnSlowmo.classList.toggle('active', slowMotion);
    }

    function updateGlobalState(ballsMoving) {
      const totalKineticEnergy = balls.reduce((sum, ball) => {
        const v2 = ball.velocity.lengthSq();
        return sum + 0.5 * ball.mass * v2;
      }, 0);

      window.__3D_STATE__ = {
        ballPositions: balls.map(ball => ({
          x: ball.mesh.position.x,
          z: ball.mesh.position.z
        })),
        ballVelocities: balls.map(ball => ({
          vx: ball.velocity.x,
          vz: ball.velocity.y
        })),
        totalCollisions,
        wallBounces,
        activePlayer,
        ballsMoving,
        slowMotion,
        resetCount,
        robotLoaded,
        totalKineticEnergy,
        robotRotating
      };
    }

    // -----------------------
    // Interactions
    // -----------------------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const dragPoint = new THREE.Vector3();
    let isDraggingCue = false;
    let dragStart = null;

    function getMouseNDC(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function intersectTablePlane(event) {
      getMouseNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const hit = new THREE.Vector3();
      const ok = raycaster.ray.intersectPlane(dragPlane, hit);
      return ok ? hit : null;
    }

    renderer.domElement.addEventListener('mousedown', (event) => {
      getMouseNDC(event);
      raycaster.setFromCamera(mouse, camera);

      const cueBall = balls[0].mesh;
      const intersects = raycaster.intersectObject(cueBall);

      const anyBallMoving = balls.some(ball => ball.velocity.length() >= 0.01);
      if (intersects.length > 0 && !anyBallMoving) {
        const hit = intersectTablePlane(event);
        if (hit) {
          isDraggingCue = true;
          dragStart = hit.clone();
        }
      }
    });

    window.addEventListener('mouseup', (event) => {
      if (!isDraggingCue) return;
      isDraggingCue = false;

      const hit = intersectTablePlane(event);
      if (!hit) return;

      const cueBall = balls[0];
      const ballPos2D = new THREE.Vector2(cueBall.mesh.position.x, cueBall.mesh.position.z);
      const release2D = new THREE.Vector2(hit.x, hit.z);

      // Direction vector from release point to ball
      const shot = ballPos2D.clone().sub(release2D);
      let power = shot.length();
      if (power > 0) {
        power = Math.min(power, 8.0);
        shot.normalize().multiplyScalar(power);
        cueBall.velocity.copy(shot);
      }

      dragStart = null;
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key.toLowerCase();

      if (key === 'r') {
        resetBalls();
        resetCount++;
      } else if (key === '1') {
        activePlayer = 1;
      } else if (key === '2') {
        activePlayer = 2;
      }
    });

    btnSlowmo.addEventListener('click', () => {
      slowMotion = !slowMotion;
    });

    function resetBalls() {
      for (const ball of balls) {
        ball.mesh.position.copy(ball.initialPosition);
        ball.velocity.set(0, 0);
      }
    }

    // -----------------------
    // Physics
    // -----------------------
    function handleWallCollisions(ball) {
      const p = ball.mesh.position;
      const r = ball.radius;

      if (p.x - r < INNER_X_MIN) {
        p.x = INNER_X_MIN + r;
        ball.velocity.x *= -1;
        wallBounces++;
      } else if (p.x + r > INNER_X_MAX) {
        p.x = INNER_X_MAX - r;
        ball.velocity.x *= -1;
        wallBounces++;
      }

      if (p.z - r < INNER_Z_MIN) {
        p.z = INNER_Z_MIN + r;
        ball.velocity.y *= -1;
        wallBounces++;
      } else if (p.z + r > INNER_Z_MAX) {
        p.z = INNER_Z_MAX - r;
        ball.velocity.y *= -1;
        wallBounces++;
      }
    }

    function resolveBallCollision(ballA, ballB) {
      const posA = new THREE.Vector2(ballA.mesh.position.x, ballA.mesh.position.z);
      const posB = new THREE.Vector2(ballB.mesh.position.x, ballB.mesh.position.z);

      const delta = posB.clone().sub(posA);
      const dist = delta.length();
      const minDist = ballA.radius + ballB.radius;

      if (dist === 0 || dist >= minDist) return;

      const normal = delta.clone().normalize();
      const tangent = new THREE.Vector2(-normal.y, normal.x);

      const vA = ballA.velocity.clone();
      const vB = ballB.velocity.clone();

      const vA_n = normal.dot(vA);
      const vA_t = tangent.dot(vA);
      const vB_n = normal.dot(vB);
      const vB_t = tangent.dot(vB);

      // Equal masses -> swap normal components
      const vA_n_after = vB_n;
      const vB_n_after = vA_n;

      const vA_after = tangent.clone().multiplyScalar(vA_t).add(
        normal.clone().multiplyScalar(vA_n_after)
      );
      const vB_after = tangent.clone().multiplyScalar(vB_t).add(
        normal.clone().multiplyScalar(vB_n_after)
      );

      ballA.velocity.copy(vA_after);
      ballB.velocity.copy(vB_after);

      // Positional correction to prevent overlap
      const overlap = minDist - dist;
      const correction = normal.clone().multiplyScalar(overlap / 2 + 0.0001);

      ballA.mesh.position.x -= correction.x;
      ballA.mesh.position.z -= correction.y;
      ballB.mesh.position.x += correction.x;
      ballB.mesh.position.z += correction.y;

      totalCollisions++;
    }

    // -----------------------
    // Animation Loop
    // -----------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.033);
      const timeScale = slowMotion ? 0.25 : 1.0;
      const scaledDt = dt * timeScale;

      // Update movement
      for (const ball of balls) {
        ball.mesh.position.x += ball.velocity.x * scaledDt;
        ball.mesh.position.z += ball.velocity.y * scaledDt;

        // Friction each frame
        ball.velocity.multiplyScalar(0.995);

        // Stop threshold
        if (ball.velocity.length() < 0.01) {
          ball.velocity.set(0, 0);
        }

        handleWallCollisions(ball);

        // Simple rolling illusion
        const speed = ball.velocity.length();
        if (speed > 0) {
          ball.mesh.rotation.z += ball.velocity.x * 0.05;
          ball.mesh.rotation.x -= ball.velocity.y * 0.05;
        }
      }

      // Ball-ball collisions
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          resolveBallCollision(balls[i], balls[j]);
        }
      }

      const ballsMoving = balls.some(ball => ball.velocity.length() >= 0.01);

      // Robot rotates when any ball is moving
      robotRotating = ballsMoving && !!robot;
      if (robot && robotRotating) {
        robot.rotation.y += 0.5 * scaledDt;
      }

      updateHUD(ballsMoving);
      updateGlobalState(ballsMoving);

      renderer.render(scene, camera);
    }

    animate();

    // -----------------------
    // Resize
    // -----------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
