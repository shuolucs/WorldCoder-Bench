<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Billiards</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            min-width: 200px;
        }
        .hud-row {
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .hud-value {
            font-weight: bold;
            color: #4da6ff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            color: #ccc;
            font-size: 12px;
            pointer-events: none;
        }
        button {
            pointer-events: auto;
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        button.active {
            background: #4da6ff;
            color: #000;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-row"><span>Active Player:</span> <span id="hud-player" class="hud-value">1</span></div>
        <div class="hud-row"><span>Collisions:</span> <span id="hud-collisions" class="hud-value">0</span></div>
        <div class="hud-row"><span>Status:</span> <span id="hud-moving" class="hud-value">Stopped</span></div>
        <button id="btn-slowmo">Slow Motion: OFF</button>
    </div>

    <div id="controls">
        <strong>Controls:</strong><br>
        - Click & Drag Cue Ball (White) to shoot<br>
        - Press 'R' to reset balls<br>
        - Press '1' or '2' to switch player
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballPositions: [],
            ballVelocities: [],
            totalCollisions: 0,
            wallBounces: 0,
            activePlayer: 1,
            ballsMoving: false,
            slowMotion: false,
            resetCount: 0,
            robotLoaded: false,
            totalKineticEnergy: 0,
            robotRotating: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(0, 8, 0);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 2048;
        pointLight.shadow.mapSize.height = 2048;
        pointLight.shadow.camera.near = 0.5;
        pointLight.shadow.camera.far = 20;
        scene.add(pointLight);

        // --- Table & Rails ---
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x1a8c27, roughness: 0.8, metalness: 0.1 });
        const tableGeo = new THREE.BoxGeometry(12, 0.2, 6);
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = -0.1; // Surface at y=0
        table.receiveShadow = true;
        scene.add(table);

        const railMat = new THREE.MeshStandardMaterial({ color: 0x5c3a21, roughness: 0.9, metalness: 0.0 });
        const rails = new THREE.Group();
        
        const railN = new THREE.Mesh(new THREE.BoxGeometry(12.6, 0.3, 0.3), railMat);
        railN.position.set(0, 0.15, -3.15);
        railN.castShadow = true; railN.receiveShadow = true;
        rails.add(railN);

        const railS = new THREE.Mesh(new THREE.BoxGeometry(12.6, 0.3, 0.3), railMat);
        railS.position.set(0, 0.15, 3.15);
        railS.castShadow = true; railS.receiveShadow = true;
        rails.add(railS);

        const railE = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 6), railMat);
        railE.position.set(6.15, 0.15, 0);
        railE.castShadow = true; railE.receiveShadow = true;
        rails.add(railE);

        const railW = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 6), railMat);
        railW.position.set(-6.15, 0.15, 0);
        railW.castShadow = true; railW.receiveShadow = true;
        rails.add(railW);

        scene.add(rails);

        // --- Balls ---
        const ballRadius = 0.3;
        const ballMass = 1.0;
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        
        const ballData = [
            { id: 0, color: 0xffffff, pos: new THREE.Vector3(-4, ballRadius, 0) }, // Cue
            { id: 1, color: 0xcc0000, pos: new THREE.Vector3(2, ballRadius, 0) },  // Red
            { id: 2, color: 0x0000cc, pos: new THREE.Vector3(3, ballRadius, 1) },  // Blue
            { id: 3, color: 0xcccc00, pos: new THREE.Vector3(3, ballRadius, -1) }  // Yellow
        ];

        const balls = [];
        const initialPositions = [];

        ballData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: data.color, 
                metalness: 0.3, 
                roughness: 0.4 
            });
            const mesh = new THREE.Mesh(ballGeo, mat);
            mesh.position.copy(data.pos);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            balls.push({
                id: data.id,
                mesh: mesh,
                pos: data.pos.clone(),
                vel: new THREE.Vector3(0, 0, 0),
                mass: ballMass,
                radius: ballRadius
            });
            initialPositions.push(data.pos.clone());
        });

        // --- Robot Referee ---
        let robotModel = null;
        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            robotModel = gltf.scene;
            robotModel.position.set(0, 0, -4);
            robotModel.scale.set(0.5, 0.5, 0.5);
            robotModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(robotModel);
            window.__3D_STATE__.robotLoaded = true;
        }, undefined, (error) => {
            // Fallback if robot.glb is not found
            const fallbackGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.5, 16);
            const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
            robotModel = new THREE.Mesh(fallbackGeo, fallbackMat);
            robotModel.position.set(0, 0.75, -4);
            robotModel.castShadow = true;
            scene.add(robotModel);
            window.__3D_STATE__.robotLoaded = true;
        });

        // --- Interaction (Aiming) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -ballRadius);
        
        let isDragging = false;
        const aimLineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.5, transparent: true });
        const aimLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const aimLine = new THREE.Line(aimLineGeo, aimLineMat);
        aimLine.visible = false;
        scene.add(aimLine);

        function getIntersectPoint(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(dragPlane, target)) {
                return target;
            }
            return null;
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObject(balls[0].mesh);
            if (intersects.length > 0 && !window.__3D_STATE__.ballsMoving) {
                isDragging = true;
                aimLine.visible = true;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const pt = getIntersectPoint(e);
            if (pt) {
                aimLine.geometry.setFromPoints([balls[0].pos, pt]);
            }
        });

        window.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            aimLine.visible = false;
            
            const pt = getIntersectPoint(e);
            if (pt) {
                const dir = new THREE.Vector3().subVectors(balls[0].pos, pt);
                dir.y = 0;
                const mag = dir.length();
                if (mag > 0.1) {
                    const speed = Math.min(mag * 2.5, 8.0);
                    dir.normalize();
                    balls[0].vel.copy(dir).multiplyScalar(speed);
                }
            }
        });

        // --- Keyboard & UI Controls ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                balls.forEach((b, i) => {
                    b.pos.copy(initialPositions[i]);
                    b.vel.set(0, 0, 0);
                });
                window.__3D_STATE__.resetCount++;
            } else if (e.key === '1') {
                window.__3D_STATE__.activePlayer = 1;
            } else if (e.key === '2') {
                window.__3D_STATE__.activePlayer = 2;
            }
        });

        const btnSlowMo = document.getElementById('btn-slowmo');
        btnSlowMo.addEventListener('click', () => {
            window.__3D_STATE__.slowMotion = !window.__3D_STATE__.slowMotion;
            if (window.__3D_STATE__.slowMotion) {
                btnSlowMo.innerText = 'Slow Motion: ON';
                btnSlowMo.classList.add('active');
            } else {
                btnSlowMo.innerText = 'Slow Motion: OFF';
                btnSlowMo.classList.remove('active');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics Engine ---
        const fixedDt = 1 / 60;
        
        function physicsStep(dt) {
            let moving = false;
            let ke = 0;

            // Move & Friction
            balls.forEach(b => {
                if (b.vel.lengthSq() > 0) {
                    b.pos.addScaledVector(b.vel, dt);
                    b.vel.multiplyScalar(0.995); // Friction per frame/step
                    
                    if (b.vel.length() < 0.01) {
                        b.vel.set(0, 0, 0);
                    } else {
                        moving = true;
                    }
                }
                ke += 0.5 * b.mass * b.vel.lengthSq();
            });

            window.__3D_STATE__.ballsMoving = moving;
            window.__3D_STATE__.totalKineticEnergy = ke;

            // Wall Collisions
            const boundX = 5.7;
            const boundZ = 2.7;
            
            balls.forEach(b => {
                if (b.pos.x < -boundX) { b.pos.x = -boundX; b.vel.x *= -1; window.__3D_STATE__.wallBounces++; }
                if (b.pos.x > boundX) { b.pos.x = boundX; b.vel.x *= -1; window.__3D_STATE__.wallBounces++; }
                if (b.pos.z < -boundZ) { b.pos.z = -boundZ; b.vel.z *= -1; window.__3D_STATE__.wallBounces++; }
                if (b.pos.z > boundZ) { b.pos.z = boundZ; b.vel.z *= -1; window.__3D_STATE__.wallBounces++; }
            });

            // Ball-Ball Collisions
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    
                    const dx = b2.pos.x - b1.pos.x;
                    const dz = b2.pos.z - b1.pos.z;
                    const distSq = dx * dx + dz * dz;
                    const radiusSum = b1.radius + b2.radius;

                    if (distSq < radiusSum * radiusSum) {
                        let dist = Math.sqrt(distSq);
                        if (dist === 0) { dx = 1; dist = 1; }
                        
                        const nx = dx / dist;
                        const nz = dz / dist;

                        // Resolve overlap
                        const overlap = radiusSum - dist;
                        b1.pos.x -= nx * overlap * 0.5;
                        b1.pos.z -= nz * overlap * 0.5;
                        b2.pos.x += nx * overlap * 0.5;
                        b2.pos.z += nz * overlap * 0.5;

                        // Calculate relative velocity
                        const dvx = b1.vel.x - b2.vel.x;
                        const dvz = b1.vel.z - b2.vel.z;
                        const velAlongNormal = dvx * nx + dvz * nz;

                        // Do not resolve if velocities are separating
                        if (velAlongNormal > 0) {
                            // Perfectly elastic collision for equal masses
                            b1.vel.x -= velAlongNormal * nx;
                            b1.vel.z -= velAlongNormal * nz;
                            b2.vel.x += velAlongNormal * nx;
                            b2.vel.z += velAlongNormal * nz;
                            
                            window.__3D_STATE__.totalCollisions++;
                        }
                    }
                }
            }
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let accumulator = 0;

        function updateUI() {
            document.getElementById('hud-player').innerText = window.__3D_STATE__.activePlayer;
            document.getElementById('hud-collisions').innerText = window.__3D_STATE__.totalCollisions;
            
            const statusEl = document.getElementById('hud-moving');
            if (window.__3D_STATE__.ballsMoving) {
                statusEl.innerText = 'Moving';
                statusEl.style.color = '#ff4d4d';
            } else {
                statusEl.innerText = 'Stopped';
                statusEl.style.color = '#4da6ff';
            }
        }

        function updateState() {
            window.__3D_STATE__.ballPositions = balls.map(b => ({ x: b.pos.x, z: b.pos.z }));
            window.__3D_STATE__.ballVelocities = balls.map(b => ({ vx: b.vel.x, vz: b.vel.z }));
            window.__3D_STATE__.robotRotating = window.__3D_STATE__.ballsMoving;
        }

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const timeScale = window.__3D_STATE__.slowMotion ? 0.25 : 1.0;
            
            accumulator += dt * timeScale;
            let steps = 0;
            while (accumulator >= fixedDt && steps < 10) {
                physicsStep(fixedDt);
                accumulator -= fixedDt;
                steps++;
            }

            // Sync meshes
            balls.forEach(b => {
                b.mesh.position.copy(b.pos);
                // Simple roll rotation effect
                if (b.vel.lengthSq() > 0) {
                    const axis = new THREE.Vector3(-b.vel.z, 0, b.vel.x).normalize();
                    const angle = (b.vel.length() * dt * timeScale) / b.radius;
                    b.mesh.rotateOnWorldAxis(axis, angle);
                }
            });

            // Robot Animation
            if (window.__3D_STATE__.ballsMoving && robotModel) {
                robotModel.rotation.y += 0.5 * dt * timeScale;
            }

            updateState();
            updateUI();

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
