<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 简易 3D 化学实验台</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #dfe8f3;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.92);
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      min-width: 280px;
      line-height: 1.6;
      font-size: 14px;
    }

    #ui h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    #ui .row {
      margin: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    #ui .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef3f8;
      border: 1px solid #d6dde8;
      font-size: 12px;
    }

    #tip {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(20, 24, 32, 0.82);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 320px;
      line-height: 1.5;
    }

    #legend {
      margin-top: 6px;
      font-size: 12px;
      color: #444;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <h3>3D 化学实验台</h3>
    <div class="row">
      <label for="heatToggle">加热开关</label>
      <input id="heatToggle" type="checkbox" />
      <span class="badge">本生灯控制</span>
    </div>
    <div class="row">
      <strong>温度：</strong>
      <span id="temperature">25</span><span>°C</span>
    </div>
    <div class="row">
      <strong>当前结果：</strong>
      <span id="resultText">未反应</span>
    </div>
    <div id="legend">
      <div><span class="dot" style="background:#d83a3a;"></span>酸</div>
      <div><span class="dot" style="background:#3a6fd8;"></span>碱</div>
      <div><span class="dot" style="background:#f2d23b;"></span>指示剂</div>
    </div>
  </div>

  <div id="tip">
    鼠标左键拖动视角，右键平移，滚轮缩放。<br>
    拖拽三种试剂球到烧杯上方区域即可倒入。<br>
    酸 + 碱会中和并出现气泡；加入指示剂会影响最终视觉颜色。<br>
    打开加热开关可提升反应强度并升高温度。
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe8f3);
    scene.fog = new THREE.Fog(0xdfe8f3, 18, 38);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(8, 7, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.4, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.minDistance = 5;
    controls.maxDistance = 22;

    const ambient = new THREE.AmbientLight(0xffffff, 1.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(8, 12, 6);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    const labLight = new THREE.PointLight(0xffd39a, 0.0, 10, 2);
    labLight.position.set(2.8, 1.7, -0.4);
    scene.add(labLight);

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableTop = new THREE.Mesh(
      new THREE.BoxGeometry(16, 0.5, 8),
      new THREE.MeshStandardMaterial({ color: 0x7a5a43, roughness: 0.85 })
    );
    tableTop.position.y = 0.9;
    tableTop.receiveShadow = true;
    tableGroup.add(tableTop);

    const legGeo = new THREE.BoxGeometry(0.45, 2.0, 0.45);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x654836, roughness: 0.9 });
    const legPositions = [
      [-7.3, -0.1, -3.5], [7.3, -0.1, -3.5], [-7.3, -0.1, 3.5], [7.3, -0.1, 3.5]
    ];
    legPositions.forEach(p => {
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(...p);
      leg.castShadow = true;
      leg.receiveShadow = true;
      tableGroup.add(leg);
    });

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0xcfd8e3, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.1;
    floor.receiveShadow = true;
    scene.add(floor);

    const glassMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.28,
      roughness: 0.05,
      transmission: 0.95,
      thickness: 0.08
    });

    const liquidMat = new THREE.MeshStandardMaterial({
      color: 0xd83a3a,
      transparent: true,
      opacity: 0.85,
      emissive: 0x111111
    });

    const apparatusInfo = [];

    function registerApparatus(name, obj) {
      const v = new THREE.Vector3();
      obj.getWorldPosition(v);
      apparatusInfo.push({ name, obj });
      return v;
    }

    function createBeaker() {
      const group = new THREE.Group();
      group.name = 'beaker';

      const outer = new THREE.Mesh(
        new THREE.CylinderGeometry(1.0, 1.0, 2.2, 48, 1, true),
        glassMaterial
      );
      outer.position.y = 2.0;
      outer.castShadow = true;
      group.add(outer);

      const bottom = new THREE.Mesh(
        new THREE.CylinderGeometry(1.0, 1.0, 0.08, 48),
        glassMaterial
      );
      bottom.position.y = 0.94;
      group.add(bottom);

      const lip = new THREE.Mesh(
        new THREE.TorusGeometry(1.0, 0.03, 12, 40),
        new THREE.MeshStandardMaterial({ color: 0xdfe8ff, metalness: 0.2, roughness: 0.3, transparent: true, opacity: 0.65 })
      );
      lip.rotation.x = Math.PI / 2;
      lip.position.y = 3.1;
      group.add(lip);

      const liquid = new THREE.Mesh(
        new THREE.CylinderGeometry(0.9, 0.9, 1.0, 40),
        liquidMat.clone()
      );
      liquid.position.y = 1.45;
      liquid.scale.y = 0.55;
      group.add(liquid);

      const marker = new THREE.Mesh(
        new THREE.CylinderGeometry(0.95, 0.95, 2.3, 24),
        new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, visible: false })
      );
      marker.position.y = 2.0;
      group.add(marker);

      group.userData.liquid = liquid;
      group.userData.dropZone = marker;
      return group;
    }

    function createFlask() {
      const group = new THREE.Group();
      group.name = 'flask';

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.25, 1.15, 2.3, 40, 1, true),
        glassMaterial
      );
      body.position.y = 1.7;
      group.add(body);

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.22, 1.5, 28, 1, true),
        glassMaterial
      );
      neck.position.y = 3.45;
      group.add(neck);

      const bottom = new THREE.Mesh(
        new THREE.CylinderGeometry(1.08, 1.08, 0.08, 40),
        glassMaterial
      );
      bottom.position.y = 0.58;
      group.add(bottom);

      const flaskLiquid = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.85, 1.0, 32),
        new THREE.MeshStandardMaterial({ color: 0x8fd3ff, transparent: true, opacity: 0.75 })
      );
      flaskLiquid.position.y = 1.25;
      group.add(flaskLiquid);

      return group;
    }

    function createBunsenBurner() {
      const group = new THREE.Group();
      group.name = 'bunsenBurner';

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.55, 0.65, 0.2, 32),
        new THREE.MeshStandardMaterial({ color: 0x4b4f57, metalness: 0.6, roughness: 0.4 })
      );
      base.position.y = 1.0;
      base.castShadow = true;
      group.add(base);

      const tube = new THREE.Mesh(
        new THREE.CylinderGeometry(0.13, 0.13, 1.0, 20),
        new THREE.MeshStandardMaterial({ color: 0x70757f, metalness: 0.7, roughness: 0.35 })
      );
      tube.position.y = 1.6;
      tube.castShadow = true;
      group.add(tube);

      const nozzle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.18, 0.16, 0.18, 20),
        new THREE.MeshStandardMaterial({ color: 0x8b8f97, metalness: 0.7, roughness: 0.3 })
      );
      nozzle.position.y = 2.15;
      group.add(nozzle);

      const flameGroup = new THREE.Group();
      const flameOuter = new THREE.Mesh(
        new THREE.ConeGeometry(0.22, 0.7, 20),
        new THREE.MeshBasicMaterial({ color: 0xff9c2f, transparent: true, opacity: 0.85 })
      );
      flameOuter.position.y = 2.55;

      const flameInner = new THREE.Mesh(
        new THREE.ConeGeometry(0.11, 0.45, 20),
        new THREE.MeshBasicMaterial({ color: 0x66d0ff, transparent: true, opacity: 0.95 })
      );
      flameInner.position.y = 2.45;

      flameGroup.add(flameOuter, flameInner);
      flameGroup.visible = false;
      group.add(flameGroup);
      group.userData.flameGroup = flameGroup;

      return group;
    }

    function createTestTubeRack() {
      const group = new THREE.Group();
      group.name = 'testTubeRack';

      const woodMat = new THREE.MeshStandardMaterial({ color: 0x8c6748, roughness: 0.85 });
      const base = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.15, 1.0), woodMat);
      base.position.y = 1.0;
      group.add(base);

      const upper = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.15, 1.0), woodMat);
      upper.position.y = 2.0;
      group.add(upper);

      const sideGeo = new THREE.BoxGeometry(0.15, 1.1, 1.0);
      const side1 = new THREE.Mesh(sideGeo, woodMat);
      side1.position.set(-1.17, 1.5, 0);
      const side2 = side1.clone();
      side2.position.x = 1.17;
      group.add(side1, side2);

      for (let i = 0; i < 4; i++) {
        const tube = new THREE.Mesh(
          new THREE.CylinderGeometry(0.12, 0.12, 1.5, 20, 1, true),
          glassMaterial
        );
        tube.position.set(-0.75 + i * 0.5, 1.65, 0);
        group.add(tube);

        const cap = new THREE.Mesh(
          new THREE.CylinderGeometry(0.105, 0.105, 0.55, 18),
          new THREE.MeshStandardMaterial({
            color: i % 2 === 0 ? 0xf2b84b : 0x7fd3ff,
            transparent: true,
            opacity: 0.75
          })
        );
        cap.position.set(-0.75 + i * 0.5, 1.2, 0);
        group.add(cap);
      }

      return group;
    }

    const beaker = createBeaker();
    beaker.position.set(0, 0, 0.6);
    scene.add(beaker);

    const flask = createFlask();
    flask.position.set(-3.3, 0, -0.2);
    scene.add(flask);

    const burner = createBunsenBurner();
    burner.position.set(2.8, 0, -0.4);
    scene.add(burner);

    const rack = createTestTubeRack();
    rack.position.set(4.9, 0, 1.2);
    scene.add(rack);

    registerApparatus('beaker', beaker);
    registerApparatus('flask', flask);
    registerApparatus('bunsenBurner', burner);
    registerApparatus('testTubeRack', rack);

    const dragItems = [];
    const dragPlane = new THREE.Plane();
    const planeIntersect = new THREE.Vector3();
    const offset = new THREE.Vector3();
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let selected = null;
    let isDraggingChemical = false;

    function createChemical(id, color, position) {
      const group = new THREE.Group();
      group.name = id;
      group.userData.chemicalId = id;
      group.userData.used = false;
      group.userData.home = position.clone();

      const bottle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.23, 0.27, 0.8, 24),
        new THREE.MeshStandardMaterial({ color, roughness: 0.35, metalness: 0.05 })
      );
      bottle.castShadow = true;
      bottle.position.y = 1.35;

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.09, 0.18, 16),
        new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.5 })
      );
      neck.position.y = 1.83;

      const cap = new THREE.Mesh(
        new THREE.CylinderGeometry(0.11, 0.11, 0.08, 16),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      cap.position.y = 1.96;

      const label = new THREE.Mesh(
        new THREE.BoxGeometry(0.26, 0.18, 0.02),
        new THREE.MeshStandardMaterial({ color: 0xffffff })
      );
      label.position.set(0, 1.35, 0.27);

      group.add(bottle, neck, cap, label);
      group.position.copy(position);
      scene.add(group);
      dragItems.push(group);
      return group;
    }

    const acid = createChemical('acid', 0xd83a3a, new THREE.Vector3(-5.5, 0, 2.2));
    const base = createChemical('base', 0x3a6fd8, new THREE.Vector3(-4.3, 0, 2.2));
    const indicator = createChemical('indicator', 0xf2d23b, new THREE.Vector3(-3.1, 0, 2.2));

    const bubbleCount = 120;
    const bubblePositions = new Float32Array(bubbleCount * 3);
    const bubbleVel = [];
    for (let i = 0; i < bubbleCount; i++) {
      bubblePositions[i * 3 + 0] = (Math.random() - 0.5) * 1.3;
      bubblePositions[i * 3 + 1] = 1.0 + Math.random() * 1.6;
      bubblePositions[i * 3 + 2] = (Math.random() - 0.5) * 1.3;
      bubbleVel.push(0.006 + Math.random() * 0.018);
    }

    const bubbleGeo = new THREE.BufferGeometry();
    bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePositions, 3));
    const bubbleMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.08,
      transparent: true,
      opacity: 0.0,
      depthWrite: false
    });
    const bubbles = new THREE.Points(bubbleGeo, bubbleMat);
    bubbles.position.copy(beaker.position);
    scene.add(bubbles);

    const heatToggle = document.getElementById('heatToggle');
    const temperatureEl = document.getElementById('temperature');
    const resultText = document.getElementById('resultText');

    let heatOn = false;
    let temperature = 25;
    let chemicalsInBeaker = new Set();
    let mixedResult = null;
    let reactionComplete = false;
    let reactionProgress = 0;

    function updateLiquidColor() {
      let color = 0xd83a3a;

      if (chemicalsInBeaker.has('acid') && chemicalsInBeaker.has('base')) {
        mixedResult = 'neutral';
        color = chemicalsInBeaker.has('indicator') ? 0x7d4dff : 0x9b59ff;
      } else if (chemicalsInBeaker.has('acid')) {
        mixedResult = 'acidic';
        color = chemicalsInBeaker.has('indicator') ? 0xff884d : 0xd83a3a;
      } else if (chemicalsInBeaker.has('base')) {
        mixedResult = 'basic';
        color = chemicalsInBeaker.has('indicator') ? 0x35d46a : 0x3a6fd8;
      } else if (chemicalsInBeaker.has('indicator')) {
        mixedResult = null;
        color = 0xf2d23b;
      } else {
        mixedResult = null;
        color = 0xd83a3a;
      }

      beaker.userData.liquid.material.color.setHex(color);
      beaker.userData.liquid.material.emissive.setHex(color).multiplyScalar(0.12);

      if (mixedResult === 'neutral') {
        resultText.textContent = chemicalsInBeaker.has('indicator') ? '中性（指示剂已参与）' : '中性';
      } else if (mixedResult === 'acidic') {
        resultText.textContent = '酸性';
      } else if (mixedResult === 'basic') {
        resultText.textContent = '碱性';
      } else {
        resultText.textContent = '未反应';
      }
    }

    function tryDropIntoBeaker(obj) {
      const beakerWorld = new THREE.Vector3();
      beaker.getWorldPosition(beakerWorld);

      const dx = obj.position.x - beakerWorld.x;
      const dz = obj.position.z - beakerWorld.z;
      const within = Math.sqrt(dx * dx + dz * dz) < 1.0 && obj.position.y > 1.2;

      if (within && !obj.userData.used) {
        obj.userData.used = true;
        obj.visible = false;
        chemicalsInBeaker.add(obj.userData.chemicalId);
        updateLiquidColor();

        if (chemicalsInBeaker.has('acid') && chemicalsInBeaker.has('base')) {
          reactionComplete = true;
          reactionProgress = 0.01;
        }
      } else if (!obj.userData.used) {
        obj.position.copy(obj.userData.home);
      }
    }

    function setMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      setMouse(event);
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(dragItems, true);

      if (intersects.length > 0) {
        let root = intersects[0].object;
        while (root.parent && !dragItems.includes(root)) root = root.parent;
        if (dragItems.includes(root) && !root.userData.used) {
          selected = root;
          isDraggingChemical = true;
          controls.enabled = false;

          dragPlane.set(new THREE.Vector3(0, 1, 0), 0);
          if (raycaster.ray.intersectPlane(dragPlane, planeIntersect)) {
            offset.copy(planeIntersect).sub(selected.position);
          }
        }
      }
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!selected) return;
      setMouse(event);
      raycaster.setFromCamera(mouse, camera);
      if (raycaster.ray.intersectPlane(dragPlane, planeIntersect)) {
        selected.position.copy(planeIntersect.sub(offset));
        selected.position.y = 0;
      }
    });

    renderer.domElement.addEventListener('pointerup', () => {
      if (selected) {
        selected.position.y = 1.4;
        tryDropIntoBeaker(selected);
      }
      selected = null;
      if (isDraggingChemical) {
        controls.enabled = true;
        isDraggingChemical = false;
      }
    });

    heatToggle.addEventListener('change', () => {
      heatOn = heatToggle.checked;
      burner.userData.flameGroup.visible = heatOn;
      labLight.intensity = heatOn ? 1.6 : 0.0;
    });

    const clock = new THREE.Clock();

    function updateReaction(dt, elapsed) {
      const flame = burner.userData.flameGroup;
      if (heatOn && flame.visible) {
        flame.children[0].scale.y = 0.9 + Math.sin(elapsed * 18) * 0.12;
        flame.children[1].scale.y = 0.9 + Math.cos(elapsed * 22) * 0.08;
      }

      const targetTemp = heatOn ? 95 : 25;
      temperature += (targetTemp - temperature) * dt * (heatOn ? 0.9 : 0.7);
      temperatureEl.textContent = temperature.toFixed(0);

      const pos = bubbleGeo.attributes.position.array;
      let bubbleOpacity = 0.0;

      if (reactionComplete) {
        const speedBoost = heatOn ? 2.2 : 1.0;
        reactionProgress += dt * 0.45 * speedBoost;
        bubbleOpacity = Math.min(0.9, 0.25 + reactionProgress * 0.9 + (heatOn ? 0.25 : 0.0));

        for (let i = 0; i < bubbleCount; i++) {
          pos[i * 3 + 1] += bubbleVel[i] * speedBoost;
          pos[i * 3 + 0] += Math.sin(elapsed * 2 + i) * 0.0008;
          pos[i * 3 + 2] += Math.cos(elapsed * 2.5 + i) * 0.0008;

          if (pos[i * 3 + 1] > 2.95) {
            pos[i * 3 + 1] = 1.02;
            pos[i * 3 + 0] = (Math.random() - 0.5) * 1.2;
            pos[i * 3 + 2] = (Math.random() - 0.5) * 1.2;
          }
        }

        beaker.userData.liquid.scale.y = 0.55 + Math.sin(elapsed * 8) * 0.02 * speedBoost;
      } else {
        for (let i = 0; i < bubbleCount; i++) {
          pos[i * 3 + 1] = 1.0 + (i % 10) * 0.16;
        }
        if (chemicalsInBeaker.has('indicator')) {
          bubbleOpacity = 0.08;
        }
        beaker.userData.liquid.scale.y += (0.55 - beaker.userData.liquid.scale.y) * dt * 4;
      }

      bubbleMat.opacity += (bubbleOpacity - bubbleMat.opacity) * dt * 4;
      bubbleGeo.attributes.position.needsUpdate = true;
    }

    function updateState() {
      const apparatus = apparatusInfo.map(item => {
        const p = new THREE.Vector3();
        item.obj.getWorldPosition(p);
        return {
          name: item.name,
          x: Number(p.x.toFixed(3)),
          y: Number(p.y.toFixed(3)),
          z: Number(p.z.toFixed(3))
        };
      });

      window.__3D_STATE__ = {
        chemicals: Array.from(chemicalsInBeaker),
        mixedResult,
        temperature: Number(temperature.toFixed(2)),
        heatOn,
        apparatus,
        reactionComplete
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);
      const elapsed = clock.elapsedTime;

      updateReaction(dt, elapsed);
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    updateLiquidColor();
    updateState();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
