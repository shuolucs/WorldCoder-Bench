<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Chemistry Lab</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 16px; left: 16px; z-index: 10;
    background: rgba(10,10,30,0.85); border: 1px solid rgba(100,200,255,0.3);
    border-radius: 12px; padding: 16px 20px; color: #e0e0e0;
    backdrop-filter: blur(8px); min-width: 220px;
  }
  #ui h2 { font-size: 16px; margin-bottom: 10px; color: #7fdbff; letter-spacing: 1px; }
  #ui .row { display: flex; align-items: center; justify-content: space-between; margin: 8px 0; }
  #ui label { font-size: 13px; }
  #heatToggle {
    padding: 6px 18px; border: none; border-radius: 6px; cursor: pointer;
    font-weight: bold; font-size: 13px; transition: all 0.3s;
    background: #ff4444; color: white;
  }
  #heatToggle.on { background: #44ff88; color: #111; }
  #temperature {
    font-size: 22px; font-weight: bold; color: #ffaa44;
    text-shadow: 0 0 10px rgba(255,170,68,0.5);
  }
  #status { font-size: 12px; color: #aaa; margin-top: 8px; line-height: 1.6; }
  #mixResult { color: #ff88ff; font-weight: bold; }
  #instructions {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(10,10,30,0.8); border: 1px solid rgba(100,200,255,0.2);
    border-radius: 8px; padding: 10px 20px; color: #aaa; font-size: 12px;
    z-index: 10; text-align: center;
  }
  #chemLabels {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  }
  .chem-label {
    position: absolute; padding: 3px 8px; border-radius: 4px;
    font-size: 11px; font-weight: bold; color: white;
    pointer-events: none; white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <h2>⚗️ Chemistry Lab</h2>
  <div class="row">
    <label>Temperature:</label>
    <span id="temperature">25°C</span>
  </div>
  <div class="row">
    <label>Bunsen Burner:</label>
    <button id="heatToggle" onclick="toggleHeat()">OFF</button>
  </div>
  <div id="status">
    <div>Chemicals: <span id="chemList">none</span></div>
    <div>Reaction: <span id="mixResult">—</span></div>
  </div>
</div>
<div id="chemLabels"></div>
<div id="instructions">
  🖱️ Drag colored bottles (Red=Acid, Blue=Base, Yellow=Indicator) into the beaker to mix • Scroll to zoom • Right-click to pan
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 6, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1.5, 0);
controls.maxPolarAngle = Math.PI * 0.48;
controls.minDistance = 3;
controls.maxDistance = 20;

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
mainLight.position.set(5, 10, 5);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 30;
mainLight.shadow.camera.left = -10;
mainLight.shadow.camera.right = 10;
mainLight.shadow.camera.top = 10;
mainLight.shadow.camera.bottom = -10;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0xffaa44, 0, 8);
pointLight.position.set(1.5, 1.5, 0);
scene.add(pointLight);

// ============ MATERIALS ============
const tableMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.4, metalness: 0.1 });
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff, transparent: true, opacity: 0.25, roughness: 0.05,
  metalness: 0, transmission: 0.8, thickness: 0.5, ior: 1.5
});
const metalMat = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.3, metalness: 0.8 });
const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x444455, roughness: 0.4, metalness: 0.9 });
const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7, metalness: 0.0 });

// ============ FLOOR ============
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Grid
const grid = new THREE.GridHelper(30, 30, 0x333355, 0x222244);
grid.position.y = 0.01;
scene.add(grid);

// ============ TABLE ============
const tableGroup = new THREE.Group();
const tableTopGeo = new THREE.BoxGeometry(8, 0.15, 4);
const tableTop = new THREE.Mesh(tableTopGeo, tableMat);
tableTop.position.y = 1.0;
tableTop.castShadow = true;
tableTop.receiveShadow = true;
tableGroup.add(tableTop);

// Table legs
const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.0, 8);
const legPositions = [[-3.5, 0.5, -1.5], [3.5, 0.5, -1.5], [-3.5, 0.5, 1.5], [3.5, 0.5, 1.5]];
legPositions.forEach(p => {
  const leg = new THREE.Mesh(legGeo, metalMat);
  leg.position.set(...p);
  leg.castShadow = true;
  tableGroup.add(leg);
});
scene.add(tableGroup);

const TABLE_Y = 1.075;

// ============ APPARATUS TRACKING ============
const apparatusData = [];

// ============ BEAKER (at center-left of table) ============
function createBeaker(x, z) {
  const group = new THREE.Group();
  group.position.set(x, TABLE_Y, z);

  // Body - lathe
  const beakerPts = [];
  beakerPts.push(new THREE.Vector2(0, 0));
  beakerPts.push(new THREE.Vector2(0.55, 0));
  beakerPts.push(new THREE.Vector2(0.55, 0.02));
  beakerPts.push(new THREE.Vector2(0.5, 0.02));
  beakerPts.push(new THREE.Vector2(0.5, 1.2));
  beakerPts.push(new THREE.Vector2(0.58, 1.25));
  beakerPts.push(new THREE.Vector2(0.58, 1.3));
  beakerPts.push(new THREE.Vector2(0.55, 1.3));
  beakerPts.push(new THREE.Vector2(0.48, 1.25));
  beakerPts.push(new THREE.Vector2(0.48, 0.05));
  beakerPts.push(new THREE.Vector2(0, 0.05));

  const beakerGeo = new THREE.LatheGeometry(beakerPts, 32);
  const beaker = new THREE.Mesh(beakerGeo, glassMat);
  beaker.castShadow = true;
  group.add(beaker);

  // Graduation marks
  for (let i = 1; i <= 4; i++) {
    const markGeo = new THREE.RingGeometry(0.49, 0.5, 32, 1, 0, Math.PI * 0.3);
    const markMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
    const mark = new THREE.Mesh(markGeo, markMat);
    mark.position.y = i * 0.25;
    mark.rotation.y = Math.PI * 0.1;
    group.add(mark);
  }

  scene.add(group);
  apparatusData.push({ name: 'Beaker', group, x, z });
  return group;
}

// ============ ERLENMEYER FLASK ============
function createFlask(x, z) {
  const group = new THREE.Group();
  group.position.set(x, TABLE_Y, z);

  const pts = [];
  pts.push(new THREE.Vector2(0, 0));
  pts.push(new THREE.Vector2(0.6, 0));
  pts.push(new THREE.Vector2(0.6, 0.03));
  pts.push(new THREE.Vector2(0.55, 0.03));
  for (let i = 0; i <= 10; i++) {
    const t = i / 10;
    const r = 0.55 * (1 - t * 0.7);
    const y = 0.03 + t * 0.9;
    pts.push(new THREE.Vector2(r, y));
  }
  pts.push(new THREE.Vector2(0.15, 0.95));
  pts.push(new THREE.Vector2(0.15, 1.3));
  pts.push(new THREE.Vector2(0.18, 1.32));
  pts.push(new THREE.Vector2(0.18, 1.35));
  pts.push(new THREE.Vector2(0.13, 1.35));
  pts.push(new THREE.Vector2(0.13, 0.93));
  for (let i = 10; i >= 0; i--) {
    const t = i / 10;
    const r = 0.53 * (1 - t * 0.7);
    const y = 0.05 + t * 0.88;
    pts.push(new THREE.Vector2(r, y));
  }
  pts.push(new THREE.Vector2(0, 0.05));

  const flaskGeo = new THREE.LatheGeometry(pts, 32);
  const flask = new THREE.Mesh(flaskGeo, glassMat);
  flask.castShadow = true;
  group.add(flask);

  scene.add(group);
  apparatusData.push({ name: 'Erlenmeyer Flask', group, x, z });
  return group;
}

// ============ BUNSEN BURNER ============
function createBunsenBurner(x, z) {
  const group = new THREE.Group();
  group.position.set(x, TABLE_Y, z);

  // Base
  const baseGeo = new THREE.CylinderGeometry(0.4, 0.45, 0.08, 16);
  const base = new THREE.Mesh(baseGeo, darkMetalMat);
  base.position.y = 0.04;
  base.castShadow = true;
  group.add(base);

  // Tube
  const tubeGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.8, 12);
  const tube = new THREE.Mesh(tubeGeo, metalMat);
  tube.position.y = 0.48;
  tube.castShadow = true;
  group.add(tube);

  // Air hole ring
  const ringGeo = new THREE.TorusGeometry(0.12, 0.02, 8, 16);
  const ring = new THREE.Mesh(ringGeo, darkMetalMat);
  ring.position.y = 0.25;
  ring.rotation.x = Math.PI / 2;
  group.add(ring);

  // Top opening
  const topGeo = new THREE.CylinderGeometry(0.1, 0.08, 0.05, 12);
  const top = new THREE.Mesh(topGeo, darkMetalMat);
  top.position.y = 0.9;
  group.add(top);

  // Gas tube
  const curvePoints = [
    new THREE.Vector3(0.12, 0.1, 0),
    new THREE.Vector3(0.4, 0.08, 0),
    new THREE.Vector3(0.6, 0.05, 0.2),
    new THREE.Vector3(0.8, 0.03, 0.5)
  ];
  const curve = new THREE.CatmullRomCurve3(curvePoints);
  const tubePathGeo = new THREE.TubeGeometry(curve, 20, 0.02, 8, false);
  const tubePath = new THREE.Mesh(tubePathGeo, new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.5 }));
  group.add(tubePath);

  scene.add(group);
  apparatusData.push({ name: 'Bunsen Burner', group, x, z });
  return group;
}

// ============ TEST TUBE RACK ============
function createTestTubeRack(x, z) {
  const group = new THREE.Group();
  group.position.set(x, TABLE_Y, z);

  // Base board
  const baseGeo = new THREE.BoxGeometry(1.2, 0.06, 0.4);
  const base = new THREE.Mesh(baseGeo, woodMat);
  base.position.y = 0.03;
  base.castShadow = true;
  group.add(base);

  // Vertical supports
  const supportGeo = new THREE.BoxGeometry(0.06, 0.7, 0.06);
  [[-0.55, 0.35, -0.15], [-0.55, 0.35, 0.15], [0.55, 0.35, -0.15], [0.55, 0.35, 0.15]].forEach(p => {
    const s = new THREE.Mesh(supportGeo, woodMat);
    s.position.set(...p);
    s.castShadow = true;
    group.add(s);
  });

  // Top bar with holes
  const topBarGeo = new THREE.BoxGeometry(1.2, 0.05, 0.4);
  const topBar = new THREE.Mesh(topBarGeo, woodMat);
  topBar.position.y = 0.7;
  topBar.castShadow = true;
  group.add(topBar);

  // Middle bar
  const midBar = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.04, 0.35), woodMat);
  midBar.position.y = 0.4;
  group.add(midBar);

  // Test tubes
  const tubeColors = [0x88ccff, 0xff8888, 0x88ff88, 0xffff88, 0xff88ff];
  const tubeLiquidMats = tubeColors.map(c => new THREE.MeshPhysicalMaterial({
    color: c, transparent: true, opacity: 0.6, roughness: 0.1, metalness: 0
  }));

  for (let i = 0; i < 5; i++) {
    const tx = -0.4 + i * 0.2;

    // Glass tube
    const tubePts = [];
    tubePts.push(new THREE.Vector2(0, -0.02));
    for (let j = 0; j <= 5; j++) {
      const angle = (Math.PI / 2) * (j / 5);
      tubePts.push(new THREE.Vector2(Math.sin(angle) * 0.06, -Math.cos(angle) * 0.06));
    }
    tubePts.push(new THREE.Vector2(0.06, 0.5));
    tubePts.push(new THREE.Vector2(0.07, 0.52));
    tubePts.push(new THREE.Vector2(0.07, 0.54));
    tubePts.push(new THREE.Vector2(0.05, 0.54));
    tubePts.push(new THREE.Vector2(0.05, 0.5));
    tubePts.push(new THREE.Vector2(0.04, 0.5));
    for (let j = 5; j >= 0; j--) {
      const angle = (Math.PI / 2) * (j / 5);
      tubePts.push(new THREE.Vector2(Math.sin(angle) * 0.04, -Math.cos(angle) * 0.04 + 0.02));
    }

    const tubeGeo = new THREE.LatheGeometry(tubePts, 12);
    const testTube = new THREE.Mesh(tubeGeo, glassMat.clone());
    testTube.position.set(tx, 0.2, 0);
    group.add(testTube);

    // Liquid inside
    const liqGeo = new THREE.CylinderGeometry(0.035, 0.035, 0.2 + Math.random() * 0.15, 8);
    const liq = new THREE.Mesh(liqGeo, tubeLiquidMats[i]);
    liq.position.set(tx, 0.25, 0);
    group.add(liq);
  }

  scene.add(group);
  apparatusData.push({ name: 'Test Tube Rack', group, x, z });
  return group;
}

// ============ CREATE APPARATUS ============
const beakerGroup = createBeaker(-1.0, 0);
const flaskGroup = createFlask(1.5, -0.5);
const burnerGroup = createBunsenBurner(0, 0.8);
const rackGroup = createTestTubeRack(3.0, 0);

// ============ CHEMICAL BOTTLES (draggable) ============
const chemicals = [];
const chemicalsInBeaker = new Set();
const draggableObjects = [];

function createChemicalBottle(x, z, color, name, id) {
  const group = new THREE.Group();
  group.position.set(x, TABLE_Y, z);
  group.userData = { chemId: id, chemName: name, chemColor: color, inBeaker: false, originalPos: new THREE.Vector3(x, TABLE_Y, z) };

  // Bottle body
  const bodyGeo = new THREE.CylinderGeometry(0.15, 0.18, 0.5, 12);
  const bodyMat = new THREE.MeshPhysicalMaterial({
    color: color, transparent: true, opacity: 0.7, roughness: 0.1, metalness: 0.1
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.25;
  body.castShadow = true;
  group.add(body);

  // Liquid inside
  const liqGeo = new THREE.CylinderGeometry(0.13, 0.16, 0.4, 12);
  const liqMat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.8 });
  const liq = new THREE.Mesh(liqGeo, liqMat);
  liq.position.y = 0.22;
  group.add(liq);

  // Neck
  const neckGeo = new THREE.CylinderGeometry(0.07, 0.1, 0.15, 12);
  const neck = new THREE.Mesh(neckGeo, bodyMat);
  neck.position.y = 0.575;
  group.add(neck);

  // Cap
  const capGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.06, 12);
  const capMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5 });
  const cap = new THREE.Mesh(capGeo, capMat);
  cap.position.y = 0.68;
  group.add(cap);

  // Label
  const labelGeo = new THREE.PlaneGeometry(0.2, 0.15);
  const canvas = document.createElement('canvas');
  canvas.width = 128; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'white';
  ctx.fillRect(0, 0, 128, 64);
  ctx.fillStyle = '#' + color.toString(16).padStart(6, '0');
  ctx.fillRect(2, 2, 124, 60);
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(name, 64, 40);
  const labelTex = new THREE.CanvasTexture(canvas);
  const labelMat = new THREE.MeshBasicMaterial({ map: labelTex });
  const label = new THREE.Mesh(labelGeo, labelMat);
  label.position.set(0, 0.25, 0.181);
  group.add(label);

  scene.add(group);
  chemicals.push(group);

  // Add all meshes to draggable list
  group.traverse(child => {
    if (child.isMesh) {
      child.userData.parentGroup = group;
      draggableObjects.push(child);
    }
  });

  return group;
}

const acidBottle = createChemicalBottle(-2.5, -0.8, 0xff3333, 'HCl', 'acid');
const baseBottle = createChemicalBottle(-2.5, 0, 0x3366ff, 'NaOH', 'base');
const indicatorBottle = createChemicalBottle(-2.5, 0.8, 0xffcc00, 'Indicator', 'indicator');

// ============ BEAKER LIQUID ============
const beakerLiquidGeo = new THREE.CylinderGeometry(0.46, 0.46, 0.01, 32);
const beakerLiquidMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff, transparent: true, opacity: 0, roughness: 0.05, metalness: 0
});
const beakerLiquid = new THREE.Mesh(beakerLiquidGeo, beakerLiquidMat);
beakerLiquid.position.set(-1.0, TABLE_Y + 0.5, 0);
scene.add(beakerLiquid);

// ============ FLAME EFFECT ============
const flameGroup = new THREE.Group();
flameGroup.position.set(0, TABLE_Y + 0.92, 0.8);
flameGroup.visible = false;
scene.add(flameGroup);

// Inner flame
const flameInnerGeo = new THREE.ConeGeometry(0.04, 0.25, 8);
const flameInnerMat = new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.9 });
const flameInner = new THREE.Mesh(flameInnerGeo, flameInnerMat);
flameInner.position.y = 0.125;
flameGroup.add(flameInner);

// Outer flame
const flameOuterGeo = new THREE.ConeGeometry(0.07, 0.4, 8);
const flameOuterMat = new THREE.MeshBasicMaterial({ color: 0xff8844, transparent: true, opacity: 0.5 });
const flameOuter = new THREE.Mesh(flameOuterGeo, flameOuterMat);
flameOuter.position.y = 0.2;
flameGroup.add(flameOuter);

// ============ BUBBLE PARTICLES ============
const MAX_BUBBLES = 200;
const bubbleGeo = new THREE.BufferGeometry();
const bubblePositions = new Float32Array(MAX_BUBBLES * 3);
const bubbleSizes = new Float32Array(MAX_BUBBLES);
const bubbleVelocities = new Float32Array(MAX_BUBBLES * 3);
const bubbleLifetimes = new Float32Array(MAX_BUBBLES);
const bubbleActive = new Uint8Array(MAX_BUBBLES);

for (let i = 0; i < MAX_BUBBLES; i++) {
  bubblePositions[i * 3] = 0;
  bubblePositions[i * 3 + 1] = -10;
  bubblePositions[i * 3 + 2] = 0;
  bubbleSizes[i] = 0;
  bubbleLifetimes[i] = 0;
  bubbleActive[i] = 0;
}

bubbleGeo.setAttribute('position', new THREE.BufferAttribute(bubblePositions, 3));
bubbleGeo.setAttribute('size', new THREE.BufferAttribute(bubbleSizes, 1));

const bubbleVertShader = `
  attribute float size;
  varying float vAlpha;
  void main() {
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = size * (200.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
    vAlpha = size / 8.0;
  }
`;
const bubbleFragShader = `
  uniform vec3 color;
  varying float vAlpha;
  void main() {
    float d = length(gl_PointCoord - vec2(0.5));
    if (d > 0.5) discard;
    float alpha = smoothstep(0.5, 0.2, d) * vAlpha;
    gl_FragColor = vec4(color, alpha * 0.7);
  }
`;

const bubbleMat = new THREE.ShaderMaterial({
  uniforms: { color: { value: new THREE.Color(0xffffff) } },
  vertexShader: bubbleVertShader,
  fragmentShader: bubbleFragShader,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending
});

const bubbleSystem = new THREE.Points(bubbleGeo, bubbleMat);
scene.add(bubbleSystem);

function spawnBubble() {
  for (let i = 0; i < MAX_BUBBLES; i++) {
    if (!bubbleActive[i]) {
      const bx = -1.0 + (Math.random() - 0.5) * 0.7;
      const bz = 0 + (Math.random() - 0.5) * 0.7;
      bubblePositions[i * 3] = bx;
      bubblePositions[i * 3 + 1] = TABLE_Y + 0.15;
      bubblePositions[i * 3 + 2] = bz;
      bubbleVelocities[i * 3] = (Math.random() - 0.5) * 0.3;
      bubbleVelocities[i * 3 + 1] = 1.0 + Math.random() * 2.0;
      bubbleVelocities[i * 3 + 2] = (Math.random() - 0.5) * 0.3;
      bubbleSizes[i] = 2 + Math.random() * 4;
      bubbleLifetimes[i] = 1.0;
      bubbleActive[i] = 1;
      return;
    }
  }
}

// ============ STATE ============
let heatOn = false;
let temperature = 25;
let reactionComplete = false;
let mixedResult = null;
let bubbleIntensity = 0;
let liquidLevel = 0;

window.__3D_STATE__ = {
  chemicals: [],
  mixedResult: null,
  temperature: 25,
  heatOn: false,
  apparatus: [],
  reactionComplete: false
};

// ============ HEAT TOGGLE ============
window.toggleHeat = function() {
  heatOn = !heatOn;
  const btn = document.getElementById('heatToggle');
  btn.textContent = heatOn ? 'ON' : 'OFF';
  btn.className = heatOn ? 'on' : '';
  flameGroup.visible = heatOn;
  if (heatOn) {
    pointLight.intensity = 2;
  } else {
    pointLight.intensity = 0;
  }
};

// ============ DRAG LOGIC ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -TABLE_Y - 0.3);
let dragging = null;
let dragOffset = new THREE.Vector3();

function getMousePos(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (e.button !== 0) return;
  getMousePos(e);
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(draggableObjects);
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const parentGroup = hit.userData.parentGroup;
    if (parentGroup && parentGroup.userData.chemId && !parentGroup.userData.inBeaker) {
      dragging = parentGroup;
      controls.enabled = false;

      const intersectPoint = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, intersectPoint);
      dragOffset.copy(dragging.position).sub(intersectPoint);
    }
  }
});

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!dragging) return;
  getMousePos(e);
  raycaster.setFromCamera(mouse, camera);
  const intersectPoint = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, intersectPoint);
  if (intersectPoint) {
    dragging.position.copy(intersectPoint.add(dragOffset));
    dragging.position.y = TABLE_Y;
  }
});

renderer.domElement.addEventListener('pointerup', () => {
  if (dragging) {
    // Check if near beaker
    const beakerPos = new THREE.Vector3(-1.0, TABLE_Y, 0);
    const dist = dragging.position.distanceTo(beakerPos);
    if (dist < 1.0) {
      // Drop into beaker
      addChemicalToBeaker(dragging);
    } else {
      // Return to original position
      const orig = dragging.userData.originalPos;
      dragging.position.copy(orig);
    }
    dragging = null;
    controls.enabled = true;
  }
});

function addChemicalToBeaker(chemGroup) {
  const id = chemGroup.userData.chemId;
  if (chemicalsInBeaker.has(id)) {
    chemGroup.position.copy(chemGroup.userData.originalPos);
    return;
  }

  chemicalsInBeaker.add(id);
  chemGroup.userData.inBeaker = true;

  // Animate bottle pouring - move above beaker then hide
  const targetPos = new THREE.Vector3(-1.0, TABLE_Y + 1.5, 0);
  chemGroup.position.copy(targetPos);
  chemGroup.rotation.z = Math.PI * 0.6;

  setTimeout(() => {
    chemGroup.visible = false;
    chemGroup.position.copy(chemGroup.userData.originalPos);
    chemGroup.rotation.z = 0;
  }, 800);

  updateMixture();
}

function updateMixture() {
  const hasAcid = chemicalsInBeaker.has('acid');
  const hasBase = chemicalsInBeaker.has('base');
  const hasIndicator = chemicalsInBeaker.has('indicator');

  liquidLevel = chemicalsInBeaker.size * 0.2;
  beakerLiquid.scale.y = Math.max(1, liquidLevel * 30);
  beakerLiquid.position.y = TABLE_Y + 0.1 + liquidLevel * 0.8;
  beakerLiquidMat.opacity = Math.min(0.7, chemicalsInBeaker.size * 0.25);

  if (hasAcid && hasBase) {
    mixedResult = 'neutral';
    reactionComplete = true;
    if (hasIndicator) {
      beakerLiquidMat.color.setHex(0x44ff88); // green with indicator
    } else {
      beakerLiquidMat.color.setHex(0xaa44ff); // purple neutral
    }
    bubbleIntensity = 1.0;
    bubbleMat.uniforms.color.value.setHex(0xffffff);
  } else if (hasAcid && hasIndicator) {
    mixedResult = 'acidic';
    beakerLiquidMat.color.setHex(0xff6644); // orange-red
    bubbleIntensity = 0.3;
  } else if (hasBase && hasIndicator) {
    mixedResult = 'basic';
    beakerLiquidMat.color.setHex(0x4466ff); // deep blue
    bubbleIntensity = 0.3;
  } else if (hasAcid) {
    mixedResult = 'acidic';
    beakerLiquidMat.color.setHex(0xff4444);
    bubbleIntensity = 0.2;
  } else if (hasBase) {
    mixedResult = 'basic';
    beakerLiquidMat.color.setHex(0x4488ff);
    bubbleIntensity = 0.2;
  } else if (hasIndicator) {
    mixedResult = null;
    beakerLiquidMat.color.setHex(0xffcc00);
    bubbleIntensity = 0.1;
  }
}

// ============ ANIMATION ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.getElapsedTime();

  controls.update();

  // Temperature
  if (heatOn) {
    temperature = Math.min(200, temperature + dt * (reactionComplete ? 15 : 8));
  } else {
    temperature = Math.max(25, temperature - dt * 5);
  }

  // Flame animation
  if (flameGroup.visible) {
    flameInner.scale.set(
      0.8 + Math.sin(time * 15) * 0.2,
      0.9 + Math.sin(time * 12) * 0.15,
      0.8 + Math.cos(time * 13) * 0.2
    );
    flameOuter.scale.set(
      0.85 + Math.sin(time * 10) * 0.15,
      0.85 + Math.cos(time * 11) * 0.2,
      0.85 + Math.sin(time * 9) * 0.15
    );
    pointLight.intensity = 1.5 + Math.sin(time * 20) * 0.5;
  }

  // Bubble particles
  const effectiveIntensity = bubbleIntensity * (heatOn ? 3.0 : 1.0);
  if (effectiveIntensity > 0 && chemicalsInBeaker.size > 0) {
    const spawnRate = effectiveIntensity * 30;
    const spawnCount = Math.floor(spawnRate * dt + Math.random());
    for (let s = 0; s < spawnCount; s++) {
      spawnBubble();
    }
  }

  // Update bubbles
  for (let i = 0; i < MAX_BUBBLES; i++) {
    if (bubbleActive[i]) {
      bubbleLifetimes[i] -= dt * (heatOn ? 1.5 : 0.8);
      if (bubbleLifetimes[i] <= 0) {
        bubbleActive[i] = 0;
        bubblePositions[i * 3 + 1] = -10;
        bubbleSizes[i] = 0;
      } else {
        bubblePositions[i * 3] += bubbleVelocities[i * 3] * dt;
        bubblePositions[i * 3 + 1] += bubbleVelocities[i * 3 + 1] * dt;
        bubblePositions[i * 3 + 2] += bubbleVelocities[i * 3 + 2] * dt;
        bubbleSizes[i] *= (1 - dt * 0.5);
      }
    }
  }
  bubbleGeo.attributes.position.needsUpdate = true;
  bubbleGeo.attributes.size.needsUpdate = true;

  // Liquid wobble
  if (chemicalsInBeaker.size > 0) {
    beakerLiquid.position.y = TABLE_Y + 0.1 + liquidLevel * 0.8 + Math.sin(time * 3) * 0.005 * (heatOn ? 3 : 1);
  }

  // Update DOM
  document.getElementById('temperature').textContent = Math.round(temperature) + '°C';
  document.getElementById('chemList').textContent = chemicalsInBeaker.size > 0 ? [...chemicalsInBeaker].join(', ') : 'none';
  document.getElementById('mixResult').textContent = mixedResult || '—';

  // Update state
  window.__3D_STATE__ = {
    chemicals: [...chemicalsInBeaker],
    mixedResult: mixedResult,
    temperature: Math.round(temperature),
    heatOn: heatOn,
    apparatus: apparatusData.map(a => ({
      name: a.name,
      x: parseFloat(a.group.position.x.toFixed(2)),
      y: parseFloat(a.group.position.y.toFixed(2)),
      z: parseFloat(a.group.position.z.toFixed(2))
    })),
    reactionComplete: reactionComplete
  };

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
