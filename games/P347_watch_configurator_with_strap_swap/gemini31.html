<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        h1 {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            margin: 0;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .panel {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px 15px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #strap-panel { left: 30px; }
        #case-panel { right: 30px; }
        
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .color-btn:hover { transform: scale(1.1); }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        
        .color-btn::after {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            white-space: nowrap;
            text-transform: capitalize;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #strap-panel .color-btn::after {
            content: attr(data-strap);
            left: calc(100% + 15px);
        }
        #case-panel .color-btn::after {
            content: attr(data-case);
            right: calc(100% + 15px);
        }
        .color-btn:hover::after { opacity: 1; }

        #bottom-bar {
            position: absolute;
            bottom: 30px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        #price-display {
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        #add-to-cart-btn {
            background: white;
            color: #1a1a2e;
            border: none;
        }
        #add-to-cart-btn:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255,255,255,0.2);
        }
        #add-to-cart-btn.flash {
            background: #4CAF50 !important;
            color: white !important;
        }
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 30px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <h1>Watch Configurator</h1>
        
        <div id="strap-panel" class="panel pointer-events-auto">
            <!-- Buttons generated by JS -->
        </div>
        
        <div id="case-panel" class="panel pointer-events-auto">
            <!-- Buttons generated by JS -->
        </div>

        <div id="controls-panel" class="pointer-events-auto">
            <button id="rotation-toggle" class="btn">Toggle Rotation</button>
        </div>

        <div id="bottom-bar" class="pointer-events-auto">
            <div id="price-display">$650</div>
            <button id="add-to-cart-btn" class="btn">Add to Cart</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- CONFIGURATION ---
        const BASE_PRICE = 500;
        
        const STRAPS = {
            leather: { color: 0x8B4513, hexStr: '#8B4513', roughness: 0.8, metalness: 0.0, price: 50 },
            metal: { color: 0xC0C0C0, hexStr: '#C0C0C0', roughness: 0.2, metalness: 0.9, price: 120 },
            rubber: { color: 0x1a1a1a, hexStr: '#1a1a1a', roughness: 0.9, metalness: 0.0, price: 30 },
            nato: { color: 0x2d5a27, hexStr: '#2d5a27', roughness: 0.7, metalness: 0.0, price: 40 },
            ceramic: { color: 0xf0f0f0, hexStr: '#f0f0f0', roughness: 0.3, metalness: 0.3, price: 90 }
        };

        const CASES = {
            gold: { color: 0xFFD700, hexStr: '#FFD700', metalness: 1.0, roughness: 0.1, price: 200 },
            silver: { color: 0xC0C0C0, hexStr: '#C0C0C0', metalness: 1.0, roughness: 0.15, price: 100 },
            rosegold: { color: 0xB76E79, hexStr: '#B76E79', metalness: 1.0, roughness: 0.1, price: 150 }
        };

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            currentStrap: 'leather',
            currentCase: 'silver',
            totalPrice: BASE_PRICE + STRAPS['leather'].price + CASES['silver'].price,
            autoRotate: true,
            cartItems: 0,
            modelLoaded: false,
            strapColor: STRAPS['leather'].hexStr,
            caseColor: CASES['silver'].hexStr,
            cameraDistance: 6,
            watchVisible: true
        };

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = window.__3D_STATE__.autoRotate;
        controls.autoRotateSpeed = 2.0;
        controls.minDistance = 4;
        controls.maxDistance = 10;
        controls.target.set(0, 0, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.6);
        pointLight.position.set(-3, 3, 3);
        scene.add(pointLight);

        // --- PROCEDURAL WATCH MODEL ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);

        // Materials
        const caseMaterial = new THREE.MeshStandardMaterial({
            color: CASES[window.__3D_STATE__.currentCase].color,
            metalness: CASES[window.__3D_STATE__.currentCase].metalness,
            roughness: CASES[window.__3D_STATE__.currentCase].roughness
        });

        const strapMaterial = new THREE.MeshStandardMaterial({
            color: STRAPS[window.__3D_STATE__.currentStrap].color,
            metalness: STRAPS[window.__3D_STATE__.currentStrap].metalness,
            roughness: STRAPS[window.__3D_STATE__.currentStrap].roughness
        });

        // Case
        const caseGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.4, 64);
        const watchCase = new THREE.Mesh(caseGeo, caseMaterial);
        watchCase.castShadow = true;
        watchCase.receiveShadow = true;
        watchGroup.add(watchCase);

        // Face
        const faceGeo = new THREE.CircleGeometry(1.1, 64);
        const faceMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.1 });
        const watchFace = new THREE.Mesh(faceGeo, faceMat);
        watchFace.rotation.x = -Math.PI / 2;
        watchFace.position.y = 0.201; // Slightly above case
        watchFace.receiveShadow = true;
        watchGroup.add(watchFace);

        // Markers
        const markerGeo = new THREE.SphereGeometry(0.05, 16, 16);
        const markerMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
        for (let i = 0; i < 12; i++) {
            const angle = (i / 12) * Math.PI * 2;
            const marker = new THREE.Mesh(markerGeo, markerMat);
            marker.position.set(Math.sin(angle) * 0.9, 0.22, Math.cos(angle) * 0.9);
            marker.castShadow = true;
            watchGroup.add(marker);
        }

        // Crown
        const crownGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2, 32);
        const watchCrown = new THREE.Mesh(crownGeo, caseMaterial);
        watchCrown.rotation.z = Math.PI / 2;
        watchCrown.position.set(1.3, 0, 0);
        watchCrown.castShadow = true;
        watchGroup.add(watchCrown);

        // Straps Group (for animation)
        const strapGroup = new THREE.Group();
        watchGroup.add(strapGroup);

        const strapGeo = new THREE.BoxGeometry(0.8, 2.5, 0.15);
        
        const topStrap = new THREE.Mesh(strapGeo, strapMaterial);
        topStrap.position.set(0, 0, -1.8);
        topStrap.rotation.x = Math.PI / 2;
        topStrap.castShadow = true;
        topStrap.receiveShadow = true;
        strapGroup.add(topStrap);

        const bottomStrap = new THREE.Mesh(strapGeo, strapMaterial);
        bottomStrap.position.set(0, 0, 1.8);
        bottomStrap.rotation.x = Math.PI / 2;
        bottomStrap.castShadow = true;
        bottomStrap.receiveShadow = true;
        strapGroup.add(bottomStrap);

        // --- EXTERNAL MODEL (FERRARI) ---
        // Pedestal
        const pedestalGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.5, 32);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
        const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        pedestal.position.set(3.5, -1.25, 0);
        pedestal.receiveShadow = true;
        pedestal.castShadow = true;
        scene.add(pedestal);

        // Load GLTF
        const loader = new GLTFLoader();
        loader.load(
            'ferrari.glb',
            (gltf) => {
                const model = gltf.scene;
                model.position.set(3.5, -1, 0);
                model.scale.set(0.5, 0.5, 0.5);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load ferrari.glb. This is expected if the file is not present locally.', error);
            }
        );

        // --- UI GENERATION & LOGIC ---
        const strapPanel = document.getElementById('strap-panel');
        const casePanel = document.getElementById('case-panel');
        const priceDisplay = document.getElementById('price-display');

        function updatePrice() {
            const total = BASE_PRICE + STRAPS[window.__3D_STATE__.currentStrap].price + CASES[window.__3D_STATE__.currentCase].price;
            window.__3D_STATE__.totalPrice = total;
            priceDisplay.textContent = `$${total}`;
        }

        // Animation state
        let strapAnimation = null;

        function applyStrapMaterial(strapKey) {
            const config = STRAPS[strapKey];
            strapMaterial.color.setHex(config.color);
            strapMaterial.roughness = config.roughness;
            strapMaterial.metalness = config.metalness;
            window.__3D_STATE__.currentStrap = strapKey;
            window.__3D_STATE__.strapColor = config.hexStr;
            updatePrice();
        }

        // Generate Strap Buttons
        Object.keys(STRAPS).forEach(key => {
            const btn = document.createElement('div');
            btn.className = `color-btn strap-btn ${key === window.__3D_STATE__.currentStrap ? 'active' : ''}`;
            btn.style.backgroundColor = STRAPS[key].hexStr;
            btn.setAttribute('data-strap', key);
            
            btn.addEventListener('click', () => {
                if (window.__3D_STATE__.currentStrap === key || strapAnimation) return;
                
                // Update UI
                document.querySelectorAll('.strap-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Start Animation
                const startTime = performance.now();
                const duration = 300;
                const halfDuration = duration / 2;

                strapAnimation = (currentTime) => {
                    const elapsed = currentTime - startTime;
                    if (elapsed < halfDuration) {
                        const progress = elapsed / halfDuration;
                        strapGroup.scale.z = 1 - progress * 0.99; // Scale along Z (length of straps)
                    } else if (elapsed < duration) {
                        if (!strapAnimation.swapped) {
                            applyStrapMaterial(key);
                            strapAnimation.swapped = true;
                        }
                        const progress = (elapsed - halfDuration) / halfDuration;
                        strapGroup.scale.z = 0.01 + progress * 0.99;
                    } else {
                        strapGroup.scale.z = 1;
                        strapAnimation = null;
                    }
                };
            });
            strapPanel.appendChild(btn);
        });

        // Generate Case Buttons
        Object.keys(CASES).forEach(key => {
            const btn = document.createElement('div');
            btn.className = `color-btn case-btn ${key === window.__3D_STATE__.currentCase ? 'active' : ''}`;
            btn.style.backgroundColor = CASES[key].hexStr;
            btn.setAttribute('data-case', key);
            
            btn.addEventListener('click', () => {
                if (window.__3D_STATE__.currentCase === key) return;
                
                // Update UI
                document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Update Material & State
                const config = CASES[key];
                caseMaterial.color.setHex(config.color);
                caseMaterial.roughness = config.roughness;
                caseMaterial.metalness = config.metalness;
                
                window.__3D_STATE__.currentCase = key;
                window.__3D_STATE__.caseColor = config.hexStr;
                updatePrice();
            });
            casePanel.appendChild(btn);
        });

        // Add to Cart
        const addToCartBtn = document.getElementById('add-to-cart-btn');
        addToCartBtn.addEventListener('click', () => {
            window.__3D_STATE__.cartItems++;
            addToCartBtn.classList.add('flash');
            addToCartBtn.textContent = 'Added!';
            setTimeout(() => {
                addToCartBtn.classList.remove('flash');
                addToCartBtn.textContent = 'Add to Cart';
            }, 500);
        });

        // Rotation Toggle
        const rotationToggleBtn = document.getElementById('rotation-toggle');
        rotationToggleBtn.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            controls.autoRotate = window.__3D_STATE__.autoRotate;
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        function animate(time) {
            requestAnimationFrame(animate);

            controls.update();

            if (strapAnimation) {
                strapAnimation(time);
            }

            // Update dynamic state
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        // Initialize price display
        updatePrice();
        animate(performance.now());

    </script>
</body>
</html>
