<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Configurator</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
}

canvas {
    display: block;
}

#title {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    z-index: 10;
}

#strap-panel {
    position: absolute;
    left: 30px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 10;
}

#strap-panel .panel-label {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 5px;
    text-align: center;
}

.strap-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    outline: none;
}

.strap-btn:hover {
    transform: scale(1.15);
    border-color: rgba(255,255,255,0.6);
}

.strap-btn.active {
    border: 3px solid white;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

.strap-btn .tooltip {
    position: absolute;
    left: 55px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
}

.strap-btn:hover .tooltip {
    opacity: 1;
}

#case-panel {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 15px;
    z-index: 10;
}

#case-panel .panel-label {
    color: rgba(255,255,255,0.6);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 5px;
    text-align: center;
}

.case-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    outline: none;
}

.case-btn:hover {
    transform: scale(1.15);
    border-color: rgba(255,255,255,0.6);
}

.case-btn.active {
    border: 3px solid white;
    box-shadow: 0 0 15px rgba(255,255,255,0.3);
}

.case-btn .tooltip {
    position: absolute;
    right: 55px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.8);
    color: white;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
}

.case-btn:hover .tooltip {
    opacity: 1;
}

#price-display {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 36px;
    font-weight: 200;
    letter-spacing: 2px;
    z-index: 10;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
}

#price-display .label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 5px;
    text-align: center;
}

#add-to-cart-btn {
    position: absolute;
    bottom: 30px;
    right: 30px;
    padding: 12px 30px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 4px;
    z-index: 10;
    outline: none;
}

#add-to-cart-btn:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.6);
}

#add-to-cart-btn.flash {
    background: rgba(76, 175, 80, 0.7);
    border-color: #4CAF50;
}

#rotation-toggle {
    position: absolute;
    bottom: 30px;
    left: 30px;
    width: 44px;
    height: 44px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: all 0.3s ease;
    border-radius: 50%;
    z-index: 10;
    outline: none;
    display: flex;
    align-items: center;
    justify-content: center;
}

#rotation-toggle:hover {
    background: rgba(255,255,255,0.2);
}

#rotation-toggle.paused {
    border-color: rgba(255,100,100,0.5);
}
</style>
</head>
<body>

<div id="title">Watch Configurator</div>

<div id="strap-panel">
    <div class="panel-label">Strap</div>
    <button class="strap-btn active" data-strap="leather" style="background-color: #8B4513;">
        <span class="tooltip">Leather</span>
    </button>
    <button class="strap-btn" data-strap="metal" style="background-color: #C0C0C0;">
        <span class="tooltip">Metal</span>
    </button>
    <button class="strap-btn" data-strap="rubber" style="background-color: #1a1a1a;">
        <span class="tooltip">Rubber</span>
    </button>
    <button class="strap-btn" data-strap="nato" style="background-color: #2d5a27;">
        <span class="tooltip">NATO</span>
    </button>
    <button class="strap-btn" data-strap="ceramic" style="background-color: #f0f0f0;">
        <span class="tooltip">Ceramic</span>
    </button>
</div>

<div id="case-panel">
    <div class="panel-label">Case</div>
    <button class="case-btn" data-case="gold" style="background-color: #FFD700;">
        <span class="tooltip">Gold</span>
    </button>
    <button class="case-btn active" data-case="silver" style="background-color: #C0C0C0;">
        <span class="tooltip">Silver</span>
    </button>
    <button class="case-btn" data-case="rosegold" style="background-color: #B76E79;">
        <span class="tooltip">Rose Gold</span>
    </button>
</div>

<div id="price-display">
    <div class="label">Total Price</div>
    <div id="price-value">$650</div>
</div>

<button id="add-to-cart-btn">Add to Cart</button>

<button id="rotation-toggle" title="Toggle Auto-Rotate">⟳</button>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Configuration data
const strapConfigs = {
    leather: { color: '#8B4513', roughness: 0.8, metalness: 0.0, price: 50 },
    metal:   { color: '#C0C0C0', roughness: 0.2, metalness: 0.9, price: 120 },
    rubber:  { color: '#1a1a1a', roughness: 0.9, metalness: 0.0, price: 30 },
    nato:    { color: '#2d5a27', roughness: 0.7, metalness: 0.0, price: 40 },
    ceramic: { color: '#f0f0f0', roughness: 0.3, metalness: 0.3, price: 90 }
};

const caseConfigs = {
    gold:     { color: '#FFD700', metalness: 1.0, roughness: 0.1, price: 200 },
    silver:   { color: '#C0C0C0', metalness: 1.0, roughness: 0.15, price: 100 },
    rosegold: { color: '#B76E79', metalness: 1.0, roughness: 0.1, price: 150 }
};

const BASE_PRICE = 500;

// State
window.__3D_STATE__ = {
    currentStrap: 'leather',
    currentCase: 'silver',
    totalPrice: 650,
    autoRotate: true,
    cartItems: 0,
    modelLoaded: false,
    strapColor: '#8B4513',
    caseColor: '#C0C0C0',
    cameraDistance: 6,
    watchVisible: true
};

// Scene setup
const scene = new THREE.Scene();

// Background gradient
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 0.6);
pointLight.position.set(-3, 3, 3);
scene.add(pointLight);

// Environment map for reflections
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x333344);
const envLight1 = new THREE.PointLight(0xffffff, 50, 20);
envLight1.position.set(5, 5, 5);
envScene.add(envLight1);
const envLight2 = new THREE.PointLight(0xaabbff, 30, 20);
envLight2.position.set(-5, 3, -5);
envScene.add(envLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 2.0;
controls.minDistance = 4;
controls.maxDistance = 10;
controls.target.set(0, 0, 0);

// Watch group
const watchGroup = new THREE.Group();
scene.add(watchGroup);

// Watch case
const caseGeometry = new THREE.CylinderGeometry(1.2, 1.2, 0.4, 64);
const caseMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(caseConfigs.silver.color),
    metalness: caseConfigs.silver.metalness,
    roughness: caseConfigs.silver.roughness,
    envMapIntensity: 1.0
});
const watchCase = new THREE.Mesh(caseGeometry, caseMaterial);
watchCase.castShadow = true;
watchCase.receiveShadow = true;
watchGroup.add(watchCase);

// Watch bezel (ring around the case)
const bezelGeometry = new THREE.TorusGeometry(1.2, 0.06, 16, 64);
const bezelMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(caseConfigs.silver.color).multiplyScalar(0.8),
    metalness: 1.0,
    roughness: 0.1
});
const bezel = new THREE.Mesh(bezelGeometry, bezelMaterial);
bezel.rotation.x = Math.PI / 2;
bezel.position.y = 0.2;
watchGroup.add(bezel);

// Watch face
const faceGeometry = new THREE.CircleGeometry(1.1, 64);
const faceMaterial = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.3,
    metalness: 0.0,
    side: THREE.DoubleSide
});
const watchFace = new THREE.Mesh(faceGeometry, faceMaterial);
watchFace.rotation.x = -Math.PI / 2;
watchFace.position.y = 0.201;
watchGroup.add(watchFace);

// Hour markers
const markerGroup = new THREE.Group();
for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const markerGeom = new THREE.SphereGeometry(0.05, 16, 16);
    const markerMat = new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.5,
        roughness: 0.3
    });
    const marker = new THREE.Mesh(markerGeom, markerMat);
    marker.position.set(
        Math.cos(angle) * 0.9,
        0.22,
        Math.sin(angle) * 0.9
    );
    markerGroup.add(marker);
}
watchGroup.add(markerGroup);

// Watch hands
const hourHandGeom = new THREE.BoxGeometry(0.04, 0.02, 0.5);
const hourHandMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
const hourHand = new THREE.Mesh(hourHandGeom, hourHandMat);
hourHand.position.set(0, 0.23, -0.15);
watchGroup.add(hourHand);

const minuteHandGeom = new THREE.BoxGeometry(0.03, 0.02, 0.7);
const minuteHandMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
const minuteHand = new THREE.Mesh(minuteHandGeom, minuteHandMat);
minuteHand.position.set(0.2, 0.24, 0);
minuteHand.rotation.y = Math.PI / 2;
watchGroup.add(minuteHand);

const secondHandGeom = new THREE.BoxGeometry(0.015, 0.015, 0.8);
const secondHandMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.5, roughness: 0.3 });
const secondHand = new THREE.Mesh(secondHandGeom, secondHandMat);
secondHand.position.set(0, 0.25, 0);
watchGroup.add(secondHand);

const centerPinGeom = new THREE.CylinderGeometry(0.04, 0.04, 0.08, 16);
const centerPinMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 1.0, roughness: 0.1 });
const centerPin = new THREE.Mesh(centerPinGeom, centerPinMat);
centerPin.position.y = 0.24;
watchGroup.add(centerPin);

// Watch crown
const crownGeometry = new THREE.CylinderGeometry(0.1, 0.1, 0.25, 32);
const crownMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(caseConfigs.silver.color),
    metalness: 1.0,
    roughness: 0.15
});
const crown = new THREE.Mesh(crownGeometry, crownMaterial);
crown.rotation.z = Math.PI / 2;
crown.position.set(1.4, 0, 0);
watchGroup.add(crown);

// Straps
const strapTopGeom = new THREE.BoxGeometry(0.8, 2.5, 0.15);
const strapBottomGeom = new THREE.BoxGeometry(0.8, 2.5, 0.15);

const strapMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color(strapConfigs.leather.color),
    roughness: strapConfigs.leather.roughness,
    metalness: strapConfigs.leather.metalness
});

const strapTop = new THREE.Mesh(strapTopGeom, strapMaterial.clone());
strapTop.position.set(0, 0, -1.45);
strapTop.rotation.x = Math.PI / 2;
strapTop.castShadow = true;
watchGroup.add(strapTop);

const strapBottom = new THREE.Mesh(strapBottomGeom, strapMaterial.clone());
strapBottom.position.set(0, 0, 1.45);
strapBottom.rotation.x = Math.PI / 2;
strapBottom.castShadow = true;
watchGroup.add(strapBottom);

// Floor / platform
const platformGeom = new THREE.CylinderGeometry(2.5, 2.5, 0.1, 64);
const platformMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.5,
    metalness: 0.3
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -1.5;
platform.receiveShadow = true;
scene.add(platform);

// Ferrari pedestal
const pedestalGeom = new THREE.CylinderGeometry(0.6, 0.7, 0.8, 32);
const pedestalMat = new THREE.MeshStandardMaterial({
    color: 0x222233,
    roughness: 0.4,
    metalness: 0.5
});
const pedestal = new THREE.Mesh(pedestalGeom, pedestalMat);
pedestal.position.set(3.5, -1.1, 0);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Load Ferrari GLB
const loader = new GLTFLoader();
loader.load('ferrari.glb', (gltf) => {
    const model = gltf.scene;
    model.position.set(3.5, -1, 0);
    model.scale.set(0.5, 0.5, 0.5);
    model.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
    scene.add(model);
    window.__3D_STATE__.modelLoaded = true;
}, undefined, (error) => {
    console.warn('Could not load ferrari.glb:', error);
    // Create a placeholder emblem
    const emblemGeom = new THREE.TorusKnotGeometry(0.3, 0.08, 64, 16);
    const emblemMat = new THREE.MeshStandardMaterial({
        color: 0xff0000,
        metalness: 0.8,
        roughness: 0.2
    });
    const emblem = new THREE.Mesh(emblemGeom, emblemMat);
    emblem.position.set(3.5, -0.4, 0);
    emblem.scale.set(0.5, 0.5, 0.5);
    scene.add(emblem);
    window.__3D_STATE__.modelLoaded = false;
});

// Animation helpers
let strapAnimating = false;
let strapAnimStart = 0;
let strapAnimPhase = 'shrink'; // 'shrink' or 'grow'
let pendingStrapConfig = null;

function animateStrapSwap(strapName) {
    if (strapAnimating) return;
    pendingStrapConfig = strapConfigs[strapName];
    strapAnimating = true;
    strapAnimStart = performance.now();
    strapAnimPhase = 'shrink';
}

function updateStrapAnimation(now) {
    if (!strapAnimating) return;
    const elapsed = now - strapAnimStart;
    const halfDuration = 150; // 150ms each phase

    if (strapAnimPhase === 'shrink') {
        const t = Math.min(elapsed / halfDuration, 1);
        const scale = 1 - t;
        strapTop.scale.set(1, scale, 1);
        strapBottom.scale.set(1, scale, 1);
        if (t >= 1) {
            // Apply new material
            const cfg = pendingStrapConfig;
            const newColor = new THREE.Color(cfg.color);
            strapTop.material.color.copy(newColor);
            strapTop.material.roughness = cfg.roughness;
            strapTop.material.metalness = cfg.metalness;
            strapTop.material.needsUpdate = true;
            strapBottom.material.color.copy(newColor);
            strapBottom.material.roughness = cfg.roughness;
            strapBottom.material.metalness = cfg.metalness;
            strapBottom.material.needsUpdate = true;
            strapAnimPhase = 'grow';
            strapAnimStart = now;
        }
    } else if (strapAnimPhase === 'grow') {
        const t = Math.min(elapsed / halfDuration, 1);
        const scale = t;
        strapTop.scale.set(1, scale, 1);
        strapBottom.scale.set(1, scale, 1);
        if (t >= 1) {
            strapTop.scale.set(1, 1, 1);
            strapBottom.scale.set(1, 1, 1);
            strapAnimating = false;
        }
    }
}

// Price update
function updatePrice() {
    const strapPrice = strapConfigs[window.__3D_STATE__.currentStrap].price;
    const casePrice = caseConfigs[window.__3D_STATE__.currentCase].price;
    const total = BASE_PRICE + strapPrice + casePrice;
    window.__3D_STATE__.totalPrice = total;
    document.getElementById('price-value').textContent = '$' + total;
}

// UI Event handlers
document.querySelectorAll('.strap-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const strapName = btn.getAttribute('data-strap');
        if (strapName === window.__3D_STATE__.currentStrap) return;

        window.__3D_STATE__.currentStrap = strapName;
        window.__3D_STATE__.strapColor = strapConfigs[strapName].color;

        document.querySelectorAll('.strap-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        animateStrapSwap(strapName);
        updatePrice();
    });
});

document.querySelectorAll('.case-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const caseName = btn.getAttribute('data-case');
        if (caseName === window.__3D_STATE__.currentCase) return;

        window.__3D_STATE__.currentCase = caseName;
        window.__3D_STATE__.caseColor = caseConfigs[caseName].color;

        document.querySelectorAll('.case-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const cfg = caseConfigs[caseName];
        const newColor = new THREE.Color(cfg.color);
        caseMaterial.color.copy(newColor);
        caseMaterial.metalness = cfg.metalness;
        caseMaterial.roughness = cfg.roughness;
        caseMaterial.needsUpdate = true;

        crownMaterial.color.copy(newColor);
        crownMaterial.needsUpdate = true;

        bezelMaterial.color.copy(newColor.clone().multiplyScalar(0.8));
        bezelMaterial.needsUpdate = true;

        updatePrice();
    });
});

document.getElementById('add-to-cart-btn').addEventListener('click', () => {
    window.__3D_STATE__.cartItems++;
    const btn = document.getElementById('add-to-cart-btn');
    btn.classList.add('flash');
    btn.textContent = `Added! (${window.__3D_STATE__.cartItems})`;
    setTimeout(() => {
        btn.classList.remove('flash');
        btn.textContent = 'Add to Cart';
    }, 800);
});

document.getElementById('rotation-toggle').addEventListener('click', () => {
    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
    controls.autoRotate = window.__3D_STATE__.autoRotate;
    const btn = document.getElementById('rotation-toggle');
    if (window.__3D_STATE__.autoRotate) {
        btn.classList.remove('paused');
        btn.textContent = '⟳';
    } else {
        btn.classList.add('paused');
        btn.textContent = '⏸';
    }
});

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate(time) {
    requestAnimationFrame(animate);

    controls.update();

    // Update strap animation
    updateStrapAnimation(time);

    // Animate watch hands based on real time
    const now = new Date();
    const seconds = now.getSeconds() + now.getMilliseconds() / 1000;
    const minutes = now.getMinutes() + seconds / 60;
    const hours = now.getHours() % 12 + minutes / 60;

    secondHand.rotation.y = -(seconds / 60) * Math.PI * 2;
    minuteHand.rotation.y = -(minutes / 60) * Math.PI * 2;
    hourHand.rotation.y = -(hours / 12) * Math.PI * 2;

    // Update state
    const dist = camera.position.distanceTo(controls.target);
    window.__3D_STATE__.cameraDistance = Math.round(dist * 100) / 100;
    window.__3D_STATE__.watchVisible = watchGroup.visible;

    renderer.render(scene, camera);
}

animate(0);
</script>
</body>
</html>
