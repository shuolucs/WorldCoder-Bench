<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Configurator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #scene-container {
      width: 100%;
      height: 100%;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
      z-index: 10;
      pointer-events: none;
    }

    .panel {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 14px;
      z-index: 10;
    }

    #strap-panel {
      left: 24px;
    }

    #case-panel {
      right: 24px;
    }

    .config-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      outline: none;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.15);
    }

    .config-btn:hover {
      transform: scale(1.08);
    }

    .config-btn.active {
      border-color: #ffffff;
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
    }

    #price-display {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 20px;
      z-index: 10;
      min-width: 120px;
      text-align: center;
    }

    #add-to-cart-btn,
    #rotation-toggle {
      position: absolute;
      z-index: 10;
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(6px);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    #add-to-cart-btn:hover,
    #rotation-toggle:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.18);
    }

    #add-to-cart-btn {
      bottom: 24px;
      right: 24px;
    }

    #rotation-toggle {
      bottom: 24px;
      left: 24px;
    }

    .flash-green {
      background: #28a745 !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>

    <div id="title">Watch Configurator</div>

    <div id="strap-panel" class="panel">
      <button class="config-btn strap-btn active" data-strap="leather" title="Leather" style="background:#8B4513;"></button>
      <button class="config-btn strap-btn" data-strap="metal" title="Metal" style="background:#C0C0C0;"></button>
      <button class="config-btn strap-btn" data-strap="rubber" title="Rubber" style="background:#1a1a1a;"></button>
      <button class="config-btn strap-btn" data-strap="nato" title="NATO" style="background:#2d5a27;"></button>
      <button class="config-btn strap-btn" data-strap="ceramic" title="Ceramic" style="background:#f0f0f0;"></button>
    </div>

    <div id="case-panel" class="panel">
      <button class="config-btn case-btn" data-case="gold" title="Gold" style="background:#FFD700;"></button>
      <button class="config-btn case-btn active" data-case="silver" title="Silver" style="background:#C0C0C0;"></button>
      <button class="config-btn case-btn" data-case="rosegold" title="Rose Gold" style="background:#B76E79;"></button>
    </div>

    <div id="price-display">$650</div>
    <button id="rotation-toggle">Auto-Rotate: On</button>
    <button id="add-to-cart-btn">Add to Cart</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('scene-container');
    const priceDisplay = document.getElementById('price-display');
    const addToCartBtn = document.getElementById('add-to-cart-btn');
    const rotationToggleBtn = document.getElementById('rotation-toggle');
    const strapButtons = document.querySelectorAll('.strap-btn');
    const caseButtons = document.querySelectorAll('.case-btn');

    const STRAP_OPTIONS = {
      leather: { color: '#8B4513', roughness: 0.8, metalness: 0.0, price: 50 },
      metal:   { color: '#C0C0C0', roughness: 0.2, metalness: 0.9, price: 120 },
      rubber:  { color: '#1a1a1a', roughness: 0.9, metalness: 0.0, price: 30 },
      nato:    { color: '#2d5a27', roughness: 0.7, metalness: 0.0, price: 40 },
      ceramic: { color: '#f0f0f0', roughness: 0.3, metalness: 0.3, price: 90 }
    };

    const CASE_OPTIONS = {
      gold:     { color: '#FFD700', metalness: 1.0, roughness: 0.1, price: 200 },
      silver:   { color: '#C0C0C0', metalness: 1.0, roughness: 0.15, price: 100 },
      rosegold: { color: '#B76E79', metalness: 1.0, roughness: 0.1, price: 150 }
    };

    const BASE_PRICE = 500;

    window.__3D_STATE__ = {
      currentStrap: 'leather',
      currentCase: 'silver',
      totalPrice: 650,
      autoRotate: true,
      cartItems: 0,
      modelLoaded: false,
      strapColor: STRAP_OPTIONS.leather.color,
      caseColor: CASE_OPTIONS.silver.color,
      cameraDistance: 0,
      watchVisible: true
    };

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;
    controls.minDistance = 4;
    controls.maxDistance = 10;
    controls.target.set(0, 0, 0);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.6);
    pointLight.position.set(-3, 3, 3);
    scene.add(pointLight);

    const watchGroup = new THREE.Group();
    scene.add(watchGroup);

    const currentCaseConfig = CASE_OPTIONS[window.__3D_STATE__.currentCase];
    const currentStrapConfig = STRAP_OPTIONS[window.__3D_STATE__.currentStrap];

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: currentCaseConfig.color,
      metalness: currentCaseConfig.metalness,
      roughness: currentCaseConfig.roughness
    });

    const faceMaterial = new THREE.MeshStandardMaterial({
      color: '#ffffff',
      roughness: 0.8,
      metalness: 0.05
    });

    let strapMaterial = new THREE.MeshStandardMaterial({
      color: currentStrapConfig.color,
      roughness: currentStrapConfig.roughness,
      metalness: currentStrapConfig.metalness
    });

    const caseGeometry = new THREE.CylinderGeometry(1.2, 1.2, 0.4, 64);
    const watchCase = new THREE.Mesh(caseGeometry, caseMaterial);
    watchCase.rotation.x = Math.PI / 2;
    watchCase.position.set(0, 0, 0);
    watchGroup.add(watchCase);

    const faceGeometry = new THREE.CircleGeometry(1.1, 64);
    const watchFace = new THREE.Mesh(faceGeometry, faceMaterial);
    watchFace.position.set(0, 0, 0.205);
    watchGroup.add(watchFace);

    const crownGeometry = new THREE.CylinderGeometry(0.12, 0.12, 0.25, 24);
    const watchCrown = new THREE.Mesh(crownGeometry, caseMaterial);
    watchCrown.rotation.z = Math.PI / 2;
    watchCrown.position.set(1.4, 0, 0);
    watchGroup.add(watchCrown);

    const markerGeometry = new THREE.SphereGeometry(0.05, 16, 16);
    const markerMaterial = new THREE.MeshStandardMaterial({
      color: '#222222',
      roughness: 0.5,
      metalness: 0.1
    });

    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const marker = new THREE.Mesh(markerGeometry, markerMaterial);
      marker.position.set(
        Math.cos(angle) * 0.92,
        Math.sin(angle) * 0.92,
        0.23
      );
      watchGroup.add(marker);
    }

    const strapGroup = new THREE.Group();
    watchGroup.add(strapGroup);

    const strapGeometry = new THREE.BoxGeometry(0.8, 2.5, 0.15);

    const topStrap = new THREE.Mesh(strapGeometry, strapMaterial);
    topStrap.position.set(0, 2.05, 0);
    strapGroup.add(topStrap);

    const bottomStrap = new THREE.Mesh(strapGeometry, strapMaterial);
    bottomStrap.position.set(0, -2.05, 0);
    strapGroup.add(bottomStrap);

    const pedestalGeometry = new THREE.CylinderGeometry(0.45, 0.55, 0.35, 32);
    const pedestalMaterial = new THREE.MeshStandardMaterial({
      color: '#555555',
      roughness: 0.5,
      metalness: 0.6
    });
    const pedestal = new THREE.Mesh(pedestalGeometry, pedestalMaterial);
    pedestal.rotation.x = 0;
    pedestal.position.set(3.5, -1.35, 0);
    scene.add(pedestal);

    const loader = new GLTFLoader();
    loader.load(
      'ferrari.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(3.5, -1, 0);
        model.scale.set(0.5, 0.5, 0.5);
        scene.add(model);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load ferrari.glb:', error);
      }
    );

    function updatePrice() {
      const strapPrice = STRAP_OPTIONS[window.__3D_STATE__.currentStrap].price;
      const casePrice = CASE_OPTIONS[window.__3D_STATE__.currentCase].price;
      const total = BASE_PRICE + strapPrice + casePrice;
      window.__3D_STATE__.totalPrice = total;
      priceDisplay.textContent = `$${total}`;
    }

    function setActiveButton(buttons, activeButton) {
      buttons.forEach(btn => btn.classList.remove('active'));
      activeButton.classList.add('active');
    }

    function animateStrapSwap(newConfig) {
      const duration = 300;
      const half = duration / 2;
      const start = performance.now();

      function step(now) {
        const elapsed = now - start;

        if (elapsed < half) {
          const t = 1 - (elapsed / half);
          strapGroup.scale.y = Math.max(0.01, t);
        } else if (elapsed < duration) {
          if (strapGroup.userData.materialUpdated !== true) {
            strapMaterial.dispose();
            strapMaterial = new THREE.MeshStandardMaterial({
              color: newConfig.color,
              roughness: newConfig.roughness,
              metalness: newConfig.metalness
            });
            topStrap.material = strapMaterial;
            bottomStrap.material = strapMaterial;
            strapGroup.userData.materialUpdated = true;
          }
          const t = (elapsed - half) / half;
          strapGroup.scale.y = Math.max(0.01, t);
        } else {
          strapGroup.scale.y = 1;
          strapGroup.userData.materialUpdated = false;
          return;
        }

        requestAnimationFrame(step);
      }

      strapGroup.userData.materialUpdated = false;
      requestAnimationFrame(step);
    }

    function updateCaseMaterial(caseKey) {
      const config = CASE_OPTIONS[caseKey];
      caseMaterial.color.set(config.color);
      caseMaterial.metalness = config.metalness;
      caseMaterial.roughness = config.roughness;
      window.__3D_STATE__.caseColor = config.color;
    }

    strapButtons.forEach(button => {
      button.addEventListener('click', () => {
        const strapKey = button.dataset.strap;
        const config = STRAP_OPTIONS[strapKey];

        window.__3D_STATE__.currentStrap = strapKey;
        window.__3D_STATE__.strapColor = config.color;

        animateStrapSwap(config);
        setActiveButton(strapButtons, button);
        updatePrice();
      });
    });

    caseButtons.forEach(button => {
      button.addEventListener('click', () => {
        const caseKey = button.dataset.case;

        window.__3D_STATE__.currentCase = caseKey;
        updateCaseMaterial(caseKey);
        setActiveButton(caseButtons, button);
        updatePrice();
      });
    });

    addToCartBtn.addEventListener('click', () => {
      window.__3D_STATE__.cartItems += 1;
      addToCartBtn.classList.add('flash-green');
      setTimeout(() => addToCartBtn.classList.remove('flash-green'), 250);
    });

    rotationToggleBtn.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      window.__3D_STATE__.autoRotate = controls.autoRotate;
      rotationToggleBtn.textContent = `Auto-Rotate: ${controls.autoRotate ? 'On' : 'Off'}`;
    });

    renderer.domElement.addEventListener('wheel', () => {
      window.__3D_STATE__.cameraDistance = camera.position.length();
    });

    updatePrice();
    updateCaseMaterial(window.__3D_STATE__.currentCase);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.watchVisible = watchGroup.parent === scene || scene.children.includes(watchGroup);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
