<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Archery Game</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #87ceeb;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
      min-width: 220px;
      line-height: 1.45;
    }

    #controls {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 14px;
      border-radius: 8px;
      z-index: 100;
      min-width: 240px;
      font-size: 14px;
    }

    #controls h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      margin-bottom: 4px;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    .value {
      float: right;
      color: #ffd54f;
    }

    #help {
      position: fixed;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 100;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Score: <span id="hud-score">0</span></div>
    <div>Last Shot: <span id="hud-lastshot">--</span></div>
    <div>Shots Fired: <span id="hud-shots">0</span></div>
    <div>Draw Strength: <span id="hud-draw">0%</span></div>
    <div>Wind: <span id="hud-wind">2.0 m/s @ 90°</span></div>
    <div>Frame Count: <span id="hud-framecount">0</span></div>
    <div>Paused: <span id="hud-paused">No</span></div>
  </div>

  <div id="controls">
    <h3>Archery Controls</h3>

    <div class="control-group">
      <label for="slider-angle">
        Launch Angle <span class="value" id="value-angle">5°</span>
      </label>
      <input id="slider-angle" type="range" min="-20" max="45" step="1" value="5" />
    </div>

    <div class="control-group">
      <label for="slider-windspeed">
        Wind Speed <span class="value" id="value-windspeed">2.0 m/s</span>
      </label>
      <input id="slider-windspeed" type="range" min="0" max="15" step="0.5" value="2" />
    </div>

    <div class="control-group">
      <label for="slider-winddir">
        Wind Direction <span class="value" id="value-winddir">90°</span>
      </label>
      <input id="slider-winddir" type="range" min="0" max="360" step="5" value="90" />
    </div>

    <div class="control-group">
      <label for="slider-distance">
        Target Distance <span class="value" id="value-distance">30 m</span>
      </label>
      <input id="slider-distance" type="range" min="10" max="60" step="1" value="30" />
    </div>
  </div>

  <div id="help">
    <strong>Controls</strong><br>
    Hold <b>Space</b>: draw bow<br>
    Release <b>Space</b>: fire<br>
    <b>R</b>: reset<br>
    <b>P</b>: pause/unpause<br>
    <b>↑ / ↓</b>: adjust launch angle
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ------------------------------------------------------------
    // Basic setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(-5, 3, 0);
    camera.lookAt(30, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ------------------------------------------------------------
    // Gradient sky near horizon using a large inside sphere
    // ------------------------------------------------------------
    const skyGeo = new THREE.SphereGeometry(180, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      uniforms: {
        topColor: { value: new THREE.Color(0x87ceeb) },
        bottomColor: { value: new THREE.Color(0xffffff) },
        offset: { value: 10 },
        exponent: { value: 0.8 }
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * viewMatrix * worldPosition;
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition + offset).y * 0.5 + 0.5;
          float f = pow(max(h, 0.0), exponent);
          gl_FragColor = vec4(mix(bottomColor, topColor, f), 1.0);
        }
      `
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // ------------------------------------------------------------
    // Lighting
    // ------------------------------------------------------------
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -60;
    dirLight.shadow.camera.right = 60;
    dirLight.shadow.camera.top = 60;
    dirLight.shadow.camera.bottom = -60;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 100;
    scene.add(dirLight);

    // ------------------------------------------------------------
    // Controls
    // ------------------------------------------------------------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(30, 2, 0);
    controls.maxPolarAngle = Math.PI / 2 - 0.05;

    // ------------------------------------------------------------
    // Ground
    // ------------------------------------------------------------
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(100, 100),
      new THREE.MeshStandardMaterial({ color: 0x558b2f })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // ------------------------------------------------------------
    // Bow
    // ------------------------------------------------------------
    const bowGroup = new THREE.Group();
    scene.add(bowGroup);

    const bowHeight = 1.8;
    const bowHalf = bowHeight / 2;
    const bowNock = new THREE.Vector3(0, 1.4, 0);

    let bowCurvePointsBase = [
      new THREE.Vector3(0, bowNock.y + bowHalf * 0.95, 0),
      new THREE.Vector3(0.15, bowNock.y + bowHalf * 0.45, 0),
      new THREE.Vector3(0.22, bowNock.y, 0),
      new THREE.Vector3(0.15, bowNock.y - bowHalf * 0.45, 0),
      new THREE.Vector3(0, bowNock.y - bowHalf * 0.95, 0)
    ];

    let bowCurve = new THREE.CatmullRomCurve3(bowCurvePointsBase);
    let bowLineGeom = new THREE.BufferGeometry().setFromPoints(bowCurve.getPoints(40));
    const bowLineMat = new THREE.LineBasicMaterial({ color: 0x5d4037 });
    const bowLine = new THREE.Line(bowLineGeom, bowLineMat);
    bowGroup.add(bowLine);

    let stringGeom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, bowNock.y + bowHalf * 0.95, 0),
      bowNock.clone(),
      new THREE.Vector3(0, bowNock.y - bowHalf * 0.95, 0)
    ]);
    const stringMat = new THREE.LineBasicMaterial({ color: 0xe0e0e0 });
    const bowString = new THREE.Line(stringGeom, stringMat);
    bowGroup.add(bowString);

    // Simple bow handle
    const grip = new THREE.Mesh(
      new THREE.CylinderGeometry(0.025, 0.03, 0.25, 8),
      new THREE.MeshStandardMaterial({ color: 0x4e342e })
    );
    grip.rotation.z = Math.PI / 2;
    grip.position.copy(bowNock);
    grip.castShadow = true;
    bowGroup.add(grip);

    // ------------------------------------------------------------
    // Arrow creation
    // ------------------------------------------------------------
    function createArrowMesh() {
      const group = new THREE.Group();

      const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63 });
      const tipMat = new THREE.MeshStandardMaterial({ color: 0xbdbdbd, metalness: 0.6, roughness: 0.3 });
      const finMat = new THREE.MeshStandardMaterial({ color: 0xf44336, side: THREE.DoubleSide });

      // Shaft oriented along +X
      const shaft = new THREE.Mesh(
        new THREE.CylinderGeometry(0.01, 0.01, 0.8, 10),
        shaftMat
      );
      shaft.rotation.z = -Math.PI / 2;
      shaft.castShadow = true;
      shaft.receiveShadow = true;
      group.add(shaft);

      // Tip
      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.02, 0.08, 10),
        tipMat
      );
      tip.rotation.z = -Math.PI / 2;
      tip.position.x = 0.44;
      tip.castShadow = true;
      group.add(tip);

      // Tail/fletching
      const finShape = new THREE.Shape();
      finShape.moveTo(0, 0);
      finShape.lineTo(0.09, 0.02);
      finShape.lineTo(0.09, -0.02);
      finShape.lineTo(0, 0);

      const finGeom = new THREE.ShapeGeometry(finShape);

      for (let i = 0; i < 3; i++) {
        const fin = new THREE.Mesh(finGeom, finMat);
        fin.position.x = -0.34;
        fin.rotation.x = (i / 3) * Math.PI * 2;
        fin.rotation.y = Math.PI / 2;
        fin.castShadow = true;
        group.add(fin);
      }

      group.userData.length = 0.8;
      return group;
    }

    // Preview arrow on string
    const previewArrow = createArrowMesh();
    scene.add(previewArrow);

    // ------------------------------------------------------------
    // Target
    // ------------------------------------------------------------
    const targetGroup = new THREE.Group();
    scene.add(targetGroup);

    const textureLoader = new THREE.TextureLoader();
    const boardTexture = textureLoader.load(
      'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/textures/brick_diffuse.jpg'
    );
    boardTexture.wrapS = boardTexture.wrapT = THREE.RepeatWrapping;
    boardTexture.repeat.set(1, 1);

    const targetBoard = new THREE.Mesh(
      new THREE.PlaneGeometry(3.4, 3.4),
      new THREE.MeshStandardMaterial({ map: boardTexture })
    );
    targetBoard.castShadow = true;
    targetBoard.receiveShadow = true;
    targetGroup.add(targetBoard);

    function createRing(radius, color, zOffset) {
      const geom = new THREE.CircleGeometry(radius, 64);
      const mat = new THREE.MeshStandardMaterial({
        color,
        side: THREE.DoubleSide
      });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.rotation.y = Math.PI / 2;
      mesh.position.x = zOffset;
      return mesh;
    }

    // Layer larger to smaller, facing -x
    const ringWhite = createRing(1.5, 0xeeeeee, 0.03);
    const ringBlack = createRing(1.1, 0x212121, 0.031);
    const ringBlue = createRing(0.7, 0x2196f3, 0.032);
    const ringRed  = createRing(0.4, 0xf44336, 0.033);
    const ringGold = createRing(0.15, 0xffd700, 0.034);

    targetGroup.add(ringWhite, ringBlack, ringBlue, ringRed, ringGold);

    const targetStandMat = new THREE.MeshStandardMaterial({ color: 0x6d4c41 });
    const stand1 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.6, 10), targetStandMat);
    stand1.position.set(-0.2, -1.3, -0.7);
    stand1.castShadow = true;
    targetGroup.add(stand1);

    const stand2 = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.6, 10), targetStandMat);
    stand2.position.set(-0.2, -1.3, 0.7);
    stand2.castShadow = true;
    targetGroup.add(stand2);

    const brace = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 1.5), targetStandMat);
    brace.position.set(-0.15, -0.1, 0);
    brace.castShadow = true;
    targetGroup.add(brace);

    function setTargetDistance(distance) {
      targetGroup.position.set(distance, 2, 0);
      controls.target.set(distance, 2, 0);
    }
    setTargetDistance(30);

    // ------------------------------------------------------------
    // UI elements
    // ------------------------------------------------------------
    const sliderAngle = document.getElementById('slider-angle');
    const sliderWindSpeed = document.getElementById('slider-windspeed');
    const sliderWindDir = document.getElementById('slider-winddir');
    const sliderDistance = document.getElementById('slider-distance');

    const valueAngle = document.getElementById('value-angle');
    const valueWindSpeed = document.getElementById('value-windspeed');
    const valueWindDir = document.getElementById('value-winddir');
    const valueDistance = document.getElementById('value-distance');

    const hudScore = document.getElementById('hud-score');
    const hudLastShot = document.getElementById('hud-lastshot');
    const hudShots = document.getElementById('hud-shots');
    const hudDraw = document.getElementById('hud-draw');
    const hudWind = document.getElementById('hud-wind');
    const hudFrameCount = document.getElementById('hud-framecount');
    const hudPaused = document.getElementById('hud-paused');

    function dispatchInput(el) {
      el.dispatchEvent(new Event('input', { bubbles: true }));
    }

    // ------------------------------------------------------------
    // Game state
    // ------------------------------------------------------------
    const GRAVITY = -9.81;
    const CD_ARROW = 0.04;
    const A_ARROW = 0.0003;
    const RHO = 1.225;
    const ARROW_MASS = 0.03;
    const FIXED_DT = 1 / 60;
    const SUBSTEPS = 2;
    const MAX_ARROWS = 20;

    let frameCount = 0;
    let isPaused = false;
    let totalScore = 0;
    let shotsFired = 0;
    let lastShotScore = -1;

    let isDrawing = false;
    let drawStartTime = 0;
    let drawStrength = 0;

    let arrowInFlight = false;
    let activeArrow = null;
    let activeArrowState = {
      position: new THREE.Vector3(0, bowNock.y, 0),
      velocity: new THREE.Vector3(0, 0, 0),
      stuck: false
    };
    let lastArrowPosition = new THREE.Vector3(0, bowNock.y, 0);
    let lastArrowVelocity = new THREE.Vector3(0, 0, 0);

    const shots = [];
    const arrowObjects = [];

    const state = {
      launchAngle: parseFloat(sliderAngle.value),
      windSpeed: parseFloat(sliderWindSpeed.value),
      windDirection: parseFloat(sliderWindDir.value),
      targetDistance: parseFloat(sliderDistance.value)
    };

    // ------------------------------------------------------------
    // Score rings
    // ------------------------------------------------------------
    function scoreFromRadius(r) {
      if (r <= 0.15) return 10;
      if (r <= 0.4) return 8;
      if (r <= 0.7) return 6;
      if (r <= 1.1) return 4;
      if (r <= 1.5) return 2;
      return 0;
    }

    // ------------------------------------------------------------
    // Bow visual update
    // ------------------------------------------------------------
    function updateBowVisuals() {
      const t = drawStrength;
      const topY = bowNock.y + bowHalf * 0.95;
      const botY = bowNock.y - bowHalf * 0.95;
      const flex = 0.08 * t;
      const stringPull = 0.65 * t;

      const pts = [
        new THREE.Vector3(0, topY, 0),
        new THREE.Vector3(0.15 - flex, bowNock.y + bowHalf * 0.45, 0),
        new THREE.Vector3(0.22 - flex * 2.4, bowNock.y, 0),
        new THREE.Vector3(0.15 - flex, bowNock.y - bowHalf * 0.45, 0),
        new THREE.Vector3(0, botY, 0)
      ];
      bowCurve = new THREE.CatmullRomCurve3(pts);
      bowLine.geometry.dispose();
      bowLine.geometry = new THREE.BufferGeometry().setFromPoints(bowCurve.getPoints(40));

      const stringPts = [
        new THREE.Vector3(0, topY, 0),
        new THREE.Vector3(-stringPull, bowNock.y, 0),
        new THREE.Vector3(0, botY, 0)
      ];
      bowString.geometry.dispose();
      bowString.geometry = new THREE.BufferGeometry().setFromPoints(stringPts);

      previewArrow.visible = !arrowInFlight;
      if (!arrowInFlight) {
        previewArrow.position.set(-stringPull + 0.1, bowNock.y, 0);
        const angleRad = THREE.MathUtils.degToRad(state.launchAngle);
        previewArrow.rotation.set(0, 0, angleRad);
      }
    }

    // ------------------------------------------------------------
    // Input bindings
    // ------------------------------------------------------------
    sliderAngle.addEventListener('input', () => {
      state.launchAngle = parseFloat(sliderAngle.value);
      valueAngle.textContent = `${state.launchAngle}°`;
    });

    sliderWindSpeed.addEventListener('input', () => {
      state.windSpeed = parseFloat(sliderWindSpeed.value);
      valueWindSpeed.textContent = `${state.windSpeed.toFixed(1)} m/s`;
    });

    sliderWindDir.addEventListener('input', () => {
      state.windDirection = parseFloat(sliderWindDir.value);
      valueWindDir.textContent = `${state.windDirection}°`;
    });

    sliderDistance.addEventListener('input', () => {
      state.targetDistance = parseFloat(sliderDistance.value);
      valueDistance.textContent = `${state.targetDistance} m`;
      setTargetDistance(state.targetDistance);
    });

    dispatchInput(sliderAngle);
    dispatchInput(sliderWindSpeed);
    dispatchInput(sliderWindDir);
    dispatchInput(sliderDistance);

    // ------------------------------------------------------------
    // Arrow management
    // ------------------------------------------------------------
    function removeOldestArrowIfNeeded() {
      while (arrowObjects.length > MAX_ARROWS) {
        const old = arrowObjects.shift();
        scene.remove(old.mesh);
      }
    }

    function resetGame() {
      totalScore = 0;
      shotsFired = 0;
      lastShotScore = -1;
      arrowInFlight = false;
      activeArrow = null;
      activeArrowState.position.set(0, bowNock.y, 0);
      activeArrowState.velocity.set(0, 0, 0);
      lastArrowPosition.copy(activeArrowState.position);
      lastArrowVelocity.copy(activeArrowState.velocity);
      isDrawing = false;
      drawStrength = 0;

      for (const a of arrowObjects) scene.remove(a.mesh);
      arrowObjects.length = 0;
      shots.length = 0;
    }

    function fireArrow() {
      if (arrowInFlight) return;
      if (drawStrength <= 0.01) return;

      const mesh = createArrowMesh();
      scene.add(mesh);

      const angleRad = THREE.MathUtils.degToRad(state.launchAngle);
      const speed = drawStrength * 40.0;
      const nockX = -0.65 * drawStrength;
      const spawnPos = new THREE.Vector3(nockX + 0.1, bowNock.y, 0);

      const velocity = new THREE.Vector3(
        speed * Math.cos(angleRad),
        speed * Math.sin(angleRad),
        0
      );

      mesh.position.copy(spawnPos);
      mesh.lookAt(spawnPos.clone().add(velocity));

      activeArrow = {
        mesh,
        score: null
      };

      activeArrowState = {
        position: spawnPos.clone(),
        velocity: velocity.clone(),
        stuck: false
      };

      lastArrowPosition.copy(spawnPos);
      lastArrowVelocity.copy(velocity);
      arrowInFlight = true;
      shotsFired += 1;
    }

    function finalizeArrowImpact(score, impactPos, stuckNormal = new THREE.Vector3(-1, 0, 0)) {
      arrowInFlight = false;
      activeArrowState.stuck = true;
      lastShotScore = score;
      totalScore += score;

      const shotRecord = {
        launchAngle: state.launchAngle,
        drawStrength: drawStrength,
        impactPosition: {
          x: impactPos.x,
          y: impactPos.y,
          z: impactPos.z
        },
        score
      };
      shots.push(shotRecord);

      if (activeArrow) {
        const mesh = activeArrow.mesh;
        mesh.position.copy(impactPos);

        const dir = stuckNormal.clone().normalize().multiplyScalar(-1);
        mesh.lookAt(impactPos.clone().add(dir));

        arrowObjects.push({
          mesh,
          impactPosition: impactPos.clone(),
          score
        });
        removeOldestArrowIfNeeded();
      }

      activeArrow = null;
      lastArrowPosition.copy(impactPos);
      lastArrowVelocity.set(0, 0, 0);
    }

    // ------------------------------------------------------------
    // Physics
    // ------------------------------------------------------------
    function computeAcceleration(velocity) {
      const speed = velocity.length();

      const windRad = THREE.MathUtils.degToRad(state.windDirection);
      const windAccel = new THREE.Vector3(
        state.windSpeed * Math.cos(windRad),
        0,
        state.windSpeed * Math.sin(windRad)
      );

      const accel = new THREE.Vector3(0, GRAVITY, 0).add(windAccel);

      if (speed > 1e-6) {
        const dragForceMag = 0.5 * CD_ARROW * A_ARROW * RHO * speed * speed;
        const dragAccelMag = dragForceMag / ARROW_MASS;
        const dragAccel = velocity.clone().normalize().multiplyScalar(-dragAccelMag);
        accel.add(dragAccel);
      }

      return accel;
    }

    function updateArrowPhysics(dt) {
      if (!arrowInFlight || !activeArrow) return;

      for (let s = 0; s < SUBSTEPS; s++) {
        const subDt = dt / SUBSTEPS;
        const prevPos = activeArrowState.position.clone();

        const accel = computeAcceleration(activeArrowState.velocity);
        activeArrowState.velocity.addScaledVector(accel, subDt);
        activeArrowState.position.addScaledVector(activeArrowState.velocity, subDt);

        const pos = activeArrowState.position;
        const vel = activeArrowState.velocity;

        // Ground hit by tip
        const arrowLength = 0.8;
        const tipOffset = vel.lengthSq() > 1e-8
          ? vel.clone().normalize().multiplyScalar(arrowLength * 0.5)
          : new THREE.Vector3(arrowLength * 0.5, 0, 0);

        const tipPos = pos.clone().add(tipOffset);

        if (tipPos.y <= 0) {
          const corrected = pos.clone();
          corrected.y = Math.max(0.02, corrected.y);
          finalizeArrowImpact(0, corrected, new THREE.Vector3(0, 1, 0));
          return;
        }

        // Target plane hit at x = targetDistance
        const targetX = state.targetDistance;
        const currTipX = tipPos.x;
        const prevTipPos = prevPos.clone().add(
          activeArrowState.velocity.lengthSq() > 1e-8
            ? activeArrowState.velocity.clone().normalize().multiplyScalar(arrowLength * 0.5)
            : new THREE.Vector3(arrowLength * 0.5, 0, 0)
        );
        const prevTipX = prevTipPos.x;

        if ((prevTipX <= targetX && currTipX >= targetX) || Math.abs(currTipX - targetX) < 0.02) {
          const denom = (currTipX - prevTipX);
          let alpha = 0;
          if (Math.abs(denom) > 1e-8) {
            alpha = (targetX - prevTipX) / denom;
            alpha = THREE.MathUtils.clamp(alpha, 0, 1);
          }

          const hitY = THREE.MathUtils.lerp(prevTipPos.y, tipPos.y, alpha);
          const hitZ = THREE.MathUtils.lerp(prevTipPos.z, tipPos.z, alpha);
          const dy = hitY - 2;
          const dz = hitZ - 0;
          const r = Math.sqrt(dy * dy + dz * dz);
          const score = scoreFromRadius(r);

          const impactPos = new THREE.Vector3(targetX - 0.25, hitY, hitZ);
          finalizeArrowImpact(score, impactPos, new THREE.Vector3(-1, 0, 0));
          return;
        }

        activeArrow.mesh.position.copy(pos);
        if (vel.lengthSq() > 1e-8) {
          activeArrow.mesh.lookAt(pos.clone().add(vel));
        }

        lastArrowPosition.copy(pos);
        lastArrowVelocity.copy(vel);
      }
    }

    // ------------------------------------------------------------
    // Keyboard controls
    // ------------------------------------------------------------
    const keyState = {
      space: false
    };

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!keyState.space && !arrowInFlight) {
          keyState.space = true;
          isDrawing = true;
          drawStartTime = performance.now();
        }
      }

      if (e.code === 'KeyR') {
        resetGame();
      }

      if (e.code === 'KeyP') {
        isPaused = !isPaused;
      }

      if (e.code === 'ArrowUp') {
        e.preventDefault();
        sliderAngle.value = String(Math.min(parseFloat(sliderAngle.max), parseFloat(sliderAngle.value) + 1));
        dispatchInput(sliderAngle);
      }

      if (e.code === 'ArrowDown') {
        e.preventDefault();
        sliderAngle.value = String(Math.max(parseFloat(sliderAngle.min), parseFloat(sliderAngle.value) - 1));
        dispatchInput(sliderAngle);
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (keyState.space) {
          keyState.space = false;
          if (isDrawing && !arrowInFlight) {
            fireArrow();
          }
          isDrawing = false;
          drawStrength = 0;
        }
      }
    });

    // ------------------------------------------------------------
    // HUD/state
    // ------------------------------------------------------------
    function updateHUD() {
      hudScore.textContent = String(totalScore);
      hudLastShot.textContent = lastShotScore >= 0 ? String(lastShotScore) : '--';
      hudShots.textContent = String(shotsFired);
      hudDraw.textContent = `${Math.round(drawStrength * 100)}%`;
      hudWind.textContent = `${state.windSpeed.toFixed(1)} m/s @ ${state.windDirection}°`;
      hudFrameCount.textContent = String(frameCount);
      hudPaused.textContent = isPaused ? 'Yes' : 'No';
    }

    function safeNum(n) {
      return Number.isFinite(n) ? n : 0;
    }

    function updateGlobalState() {
      const p = arrowInFlight ? activeArrowState.position : lastArrowPosition;
      const v = arrowInFlight ? activeArrowState.velocity : lastArrowVelocity;

      const values = [p.x, p.y, p.z, v.x, v.y, v.z, drawStrength, state.launchAngle, state.windSpeed, state.windDirection, state.targetDistance];
      const isValid = values.every(Number.isFinite);

      window.__3D_STATE__ = {
        frameCount: frameCount,
        isPaused: isPaused,
        totalScore: totalScore,
        shotsFired: shotsFired,
        lastShotScore: lastShotScore,
        drawStrength: safeNum(drawStrength),
        isDrawing: isDrawing,
        arrowInFlight: arrowInFlight,
        launchAngle: safeNum(state.launchAngle),
        windSpeed: safeNum(state.windSpeed),
        windDirection: safeNum(state.windDirection),
        targetDistance: safeNum(state.targetDistance),
        arrowPosition: {
          x: safeNum(p.x),
          y: safeNum(p.y),
          z: safeNum(p.z)
        },
        arrowVelocity: {
          x: safeNum(v.x),
          y: safeNum(v.y),
          z: safeNum(v.z)
        },
        isValid: isValid
      };
    }

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ------------------------------------------------------------
    // Animation loop
    // ------------------------------------------------------------
    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);
      frameCount++;

      const realDt = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;

      if (isDrawing && !arrowInFlight && !isPaused) {
        const elapsed = (now - drawStartTime) / 1000;
        drawStrength = THREE.MathUtils.clamp(elapsed / 2.0, 0, 1);
      }

      updateBowVisuals();

      if (!isPaused) {
        const steps = Math.max(1, Math.round(realDt / FIXED_DT));
        const simDt = realDt / steps;
        for (let i = 0; i < steps; i++) {
          updateArrowPhysics(simDt);
        }
      }

      controls.update();

      // Keep camera from going below ground
      if (camera.position.y < 0.2) {
        camera.position.y = 0.2;
      }

      updateHUD();
      updateGlobalState();
      renderer.render(scene, camera);
    }

    updateBowVisuals();
    updateHUD();
    updateGlobalState();
    animate(performance.now());
  </script>
</body>
</html>
