<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Archery Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 14px;
            border-radius: 8px;
            z-index: 100;
            min-width: 240px;
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        .control-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 12px;
        }
        .control-group input[type="range"] {
            width: 100%;
        }
        .value-display {
            float: right;
            font-weight: bold;
            color: #4caf50;
        }
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            padding: 10px;
            border-radius: 6px;
            z-index: 100;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.4;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="hud">
        <div>Score: <span id="hud-score">0</span></div>
        <div>Last Shot: <span id="hud-lastshot">--</span></div>
        <div>Shots Fired: <span id="hud-shots">0</span></div>
        <div>Draw Strength: <span id="hud-draw">0%</span></div>
        <div>Wind: <span id="hud-wind">2.0 m/s @ 90°</span></div>
        <div>Frame: <span id="hud-framecount">0</span></div>
        <div>Paused: <span id="hud-paused">No</span></div>
    </div>

    <div class="instructions">
        <b>Controls:</b><br>
        Hold SPACE: Draw Bow<br>
        Release SPACE: Fire<br>
        Up/Down: Adjust Angle<br>
        P: Pause Physics<br>
        R: Reset Game<br>
        Mouse: Orbit Camera
    </div>

    <div id="controls">
        <div class="control-group">
            <label>Launch Angle (deg) <span class="value-display" id="val-angle">5</span></label>
            <input type="range" id="slider-angle" min="-20" max="45" value="5" step="1">
        </div>
        <div class="control-group">
            <label>Wind Speed (m/s) <span class="value-display" id="val-windspeed">2.0</span></label>
            <input type="range" id="slider-windspeed" min="0" max="15" value="2" step="0.5">
        </div>
        <div class="control-group">
            <label>Wind Direction (deg) <span class="value-display" id="val-winddir">90</span></label>
            <input type="range" id="slider-winddir" min="0" max="360" value="90" step="5">
        </div>
        <div class="control-group">
            <label>Target Distance (m) <span class="value-display" id="val-distance">30</span></label>
            <input type="range" id="slider-distance" min="10" max="60" value="30" step="1">
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State ---
        window.__3D_STATE__ = {
            frameCount: 0,
            isPaused: false,
            totalScore: 0,
            shotsFired: 0,
            lastShotScore: -1,
            drawStrength: 0,
            isDrawing: false,
            arrowInFlight: false,
            launchAngle: 5,
            windSpeed: 2,
            windDirection: 90,
            targetDistance: 30,
            arrowPosition: { x: 0, y: 2, z: 0 },
            arrowVelocity: { x: 0, y: 0, z: 0 },
            isValid: true
        };

        let drawStartTime = 0;
        let flyingArrow = null;
        let currentArrow = null;
        let firedArrows = [];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.Fog(0xffffff, 20, 150); // Simulates horizon gradient

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(-5, 3, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(30, 2, 0);
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 70;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(200, 200);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x558b2f, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Target ---
        const targetGroup = new THREE.Group();
        targetGroup.position.set(window.__3D_STATE__.targetDistance, 2, 0);
        scene.add(targetGroup);

        // Backboard
        const texLoader = new THREE.TextureLoader();
        const brickTex = texLoader.load('https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/textures/brick_diffuse.jpg');
        const boardGeo = new THREE.PlaneGeometry(2, 2);
        const boardMat = new THREE.MeshStandardMaterial({ map: brickTex });
        const board = new THREE.Mesh(boardGeo, boardMat);
        board.position.set(0.01, 0, 0);
        board.rotation.y = -Math.PI / 2;
        board.castShadow = true;
        board.receiveShadow = true;
        targetGroup.add(board);

        // Rings
        const ringData = [
            { r: 1.5, color: 0xeeeeee, xOffset: 0.000 },
            { r: 1.1, color: 0x212121, xOffset: -0.001 },
            { r: 0.7, color: 0x2196f3, xOffset: -0.002 },
            { r: 0.4, color: 0xf44336, xOffset: -0.003 },
            { r: 0.15, color: 0xffd700, xOffset: -0.004 }
        ];

        ringData.forEach(data => {
            const geo = new THREE.CircleGeometry(data.r, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.9 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.y = -Math.PI / 2;
            mesh.position.set(data.xOffset, 0, 0);
            mesh.receiveShadow = true;
            targetGroup.add(mesh);
        });

        // --- Bow ---
        const bowGroup = new THREE.Group();
        bowGroup.position.set(0, 2, 0);
        scene.add(bowGroup);

        let bowMesh;
        const stringMat = new THREE.LineBasicMaterial({ color: 0xeeeeee });
        const stringGeo = new THREE.BufferGeometry();
        const stringLine = new THREE.Line(stringGeo, stringMat);
        bowGroup.add(stringLine);

        function updateBow() {
            const ds = window.__3D_STATE__.drawStrength;
            
            // Bow Limbs
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(0.1 - 0.1 * ds, 0.5, 0),
                new THREE.Vector3(0, 0, 0), // Grip
                new THREE.Vector3(0.1 - 0.1 * ds, -0.5, 0),
                new THREE.Vector3(0, -1, 0)
            ]);

            if (bowMesh) {
                bowMesh.geometry.dispose();
                bowGroup.remove(bowMesh);
            }
            const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.02, 8, false);
            const bowMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.7 });
            bowMesh = new THREE.Mesh(tubeGeo, bowMat);
            bowMesh.castShadow = true;
            bowGroup.add(bowMesh);

            // Bow String
            const nockX = -ds * 0.8;
            const stringPoints = [
                new THREE.Vector3(0, 1, 0),
                new THREE.Vector3(nockX, 0, 0),
                new THREE.Vector3(0, -1, 0)
            ];
            stringLine.geometry.setFromPoints(stringPoints);

            // Update current arrow position if drawing
            if (currentArrow) {
                // Origin of arrow is its tip. 
                // Shaft is 0.8, tip is 0.1. Total length 0.9.
                // If nock is at nockX, tip is at nockX + 0.9.
                currentArrow.position.set(nockX + 0.9, 0, 0);
            }
        }

        function updateBowRotation() {
            bowGroup.rotation.z = window.__3D_STATE__.launchAngle * Math.PI / 180;
        }

        // --- Arrow ---
        function createArrowMesh() {
            const group = new THREE.Group();

            // Shaft (length 0.8)
            const shaftGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.8, 8);
            shaftGeo.rotateZ(-Math.PI / 2);
            shaftGeo.translate(-0.5, 0, 0); // Center of shaft is at -0.5 from tip
            const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8d6e63 });
            const shaft = new THREE.Mesh(shaftGeo, shaftMat);
            shaft.castShadow = true;
            group.add(shaft);

            // Tip (length 0.1)
            const tipGeo = new THREE.ConeGeometry(0.02, 0.1, 8);
            tipGeo.rotateZ(-Math.PI / 2);
            tipGeo.translate(-0.05, 0, 0); // Base at -0.1, tip at 0
            const tipMat = new THREE.MeshStandardMaterial({ color: 0xbdbdbd });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.castShadow = true;
            group.add(tip);

            // Fletching
            const finGeo = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                -0.9, 0.01, 0,
                -0.9, 0.05, 0,
                -0.8, 0.01, 0
            ]);
            finGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            const finMat = new THREE.MeshBasicMaterial({ color: 0xf44336, side: THREE.DoubleSide });
            for(let i=0; i<3; i++) {
                const fin = new THREE.Mesh(finGeo, finMat);
                fin.rotation.x = (i * 2 * Math.PI) / 3;
                group.add(fin);
            }
            return group;
        }

        function prepareNewArrow() {
            if (!currentArrow) {
                currentArrow = createArrowMesh();
                bowGroup.add(currentArrow);
            }
            updateBow();
        }

        // Initialize
        updateBowRotation();
        prepareNewArrow();

        // --- Physics & Logic ---
        const dt = 1/60;
        const dt_sub = dt / 2;
        const mass = 0.02; // kg
        const rho = 1.225; // air density
        const Cd = 0.04; // drag coefficient
        const A = 0.0003; // cross-sectional area

        const arrowPosVec = new THREE.Vector3();
        const arrowVelVec = new THREE.Vector3();

        function fireArrow() {
            const state = window.__3D_STATE__;
            if (state.drawStrength === 0) return;

            state.arrowInFlight = true;
            state.shotsFired++;
            flyingArrow = currentArrow;
            currentArrow = null;

            // Move arrow from bowGroup to scene
            bowGroup.remove(flyingArrow);
            scene.add(flyingArrow);

            // Calculate world position and velocity
            const angleRad = state.launchAngle * Math.PI / 180;
            const nockX = -state.drawStrength * 0.8;
            
            // Local tip position
            const localPos = new THREE.Vector3(nockX + 0.9, 0, 0);
            
            // Convert to world space
            arrowPosVec.copy(localPos).applyMatrix4(bowGroup.matrixWorld);
            state.arrowPosition = { x: arrowPosVec.x, y: arrowPosVec.y, z: arrowPosVec.z };

            const v0 = state.drawStrength * 40;
            arrowVelVec.set(v0 * Math.cos(angleRad), v0 * Math.sin(angleRad), 0);
            state.arrowVelocity = { x: arrowVelVec.x, y: arrowVelVec.y, z: arrowVelVec.z };

            state.drawStrength = 0;
            updateBow();
        }

        function resetGame() {
            firedArrows.forEach(a => scene.remove(a));
            firedArrows = [];
            window.__3D_STATE__.totalScore = 0;
            window.__3D_STATE__.shotsFired = 0;
            window.__3D_STATE__.lastShotScore = -1;
            
            if (flyingArrow) {
                scene.remove(flyingArrow);
                flyingArrow = null;
                window.__3D_STATE__.arrowInFlight = false;
            }
            
            window.__3D_STATE__.isDrawing = false;
            window.__3D_STATE__.drawStrength = 0;
            prepareNewArrow();
        }

        // --- Controls & Events ---
        function updateSliderValue(id, valId, stateKey, callback) {
            const slider = document.getElementById(id);
            const display = document.getElementById(valId);
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                display.innerText = val;
                window.__3D_STATE__[stateKey] = val;
                if (callback) callback(val);
            });
        }

        updateSliderValue('slider-angle', 'val-angle', 'launchAngle', updateBowRotation);
        updateSliderValue('slider-windspeed', 'val-windspeed', 'windSpeed');
        updateSliderValue('slider-winddir', 'val-winddir', 'windDirection');
        updateSliderValue('slider-distance', 'val-distance', 'targetDistance', (val) => {
            targetGroup.position.x = val;
        });

        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            if (e.code === 'Space' && !state.isDrawing && !state.arrowInFlight) {
                state.isDrawing = true;
                drawStartTime = performance.now();
            }
            if (e.code === 'KeyR') resetGame();
            if (e.code === 'KeyP') state.isPaused = !state.isPaused;
            if (e.code === 'ArrowUp') {
                state.launchAngle = Math.min(45, state.launchAngle + 1);
                document.getElementById('slider-angle').value = state.launchAngle;
                document.getElementById('val-angle').innerText = state.launchAngle;
                updateBowRotation();
            }
            if (e.code === 'ArrowDown') {
                state.launchAngle = Math.max(-20, state.launchAngle - 1);
                document.getElementById('slider-angle').value = state.launchAngle;
                document.getElementById('val-angle').innerText = state.launchAngle;
                updateBowRotation();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space' && window.__3D_STATE__.isDrawing) {
                window.__3D_STATE__.isDrawing = false;
                fireArrow();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        function updateHUD() {
            const state = window.__3D_STATE__;
            document.getElementById('hud-score').innerText = state.totalScore;
            document.getElementById('hud-lastshot').innerText = state.lastShotScore === -1 ? '--' : state.lastShotScore;
            document.getElementById('hud-shots').innerText = state.shotsFired;
            document.getElementById('hud-draw').innerText = Math.round(state.drawStrength * 100) + '%';
            document.getElementById('hud-wind').innerText = `${state.windSpeed.toFixed(1)} m/s @ ${state.windDirection}°`;
            document.getElementById('hud-framecount').innerText = state.frameCount;
            document.getElementById('hud-paused').innerText = state.isPaused ? 'Yes' : 'No';
        }

        function animate() {
            requestAnimationFrame(animate);
            const state = window.__3D_STATE__;
            state.frameCount++;

            controls.update();

            if (!state.isPaused) {
                // Handle Drawing
                if (state.isDrawing) {
                    const elapsed = performance.now() - drawStartTime;
                    state.drawStrength = Math.min(1.0, elapsed / 2000);
                    updateBow();
                }

                // Handle Physics
                if (state.arrowInFlight && flyingArrow) {
                    for (let i = 0; i < 2; i++) {
                        // Wind Vector: 0 deg = headwind from +x, 90 deg = crosswind from +z
                        const windRad = state.windDirection * Math.PI / 180;
                        const vWind = new THREE.Vector3(
                            -state.windSpeed * Math.cos(windRad), 
                            0, 
                            -state.windSpeed * Math.sin(windRad)
                        );

                        const vRel = new THREE.Vector3().subVectors(arrowVelVec, vWind);
                        const speedRel = vRel.length();

                        // Drag Force
                        const fDragMag = 0.5 * rho * Cd * A * speedRel * speedRel;
                        const fDrag = vRel.clone().normalize().multiplyScalar(-fDragMag);

                        // Acceleration
                        const acc = fDrag.divideScalar(mass);
                        acc.y -= 9.81; // Gravity

                        // Integrate
                        arrowVelVec.add(acc.multiplyScalar(dt_sub));
                        const nextPos = arrowPosVec.clone().add(arrowVelVec.clone().multiplyScalar(dt_sub));

                        let hit = false;

                        // Ground Collision
                        if (nextPos.y <= 0) {
                            const t = arrowPosVec.y / (arrowPosVec.y - nextPos.y);
                            nextPos.lerpVectors(arrowPosVec, nextPos, t);
                            hit = true;
                            state.lastShotScore = 0;
                        }

                        // Target Collision
                        if (!hit && arrowPosVec.x < state.targetDistance && nextPos.x >= state.targetDistance) {
                            const t = (state.targetDistance - arrowPosVec.x) / (nextPos.x - arrowPosVec.x);
                            nextPos.lerpVectors(arrowPosVec, nextPos, t);
                            hit = true;
                            
                            // Calculate Score
                            const dist = Math.sqrt(Math.pow(nextPos.y - 2, 2) + Math.pow(nextPos.z, 2));
                            if (dist <= 0.15) state.lastShotScore = 10;
                            else if (dist <= 0.4) state.lastShotScore = 8;
                            else if (dist <= 0.7) state.lastShotScore = 6;
                            else if (dist <= 1.1) state.lastShotScore = 4;
                            else if (dist <= 1.5) state.lastShotScore = 2;
                            else state.lastShotScore = 0;

                            state.totalScore += state.lastShotScore;
                        }

                        arrowPosVec.copy(nextPos);

                        if (hit) {
                            state.arrowInFlight = false;
                            flyingArrow.position.copy(arrowPosVec);
                            
                            firedArrows.push(flyingArrow);
                            if (firedArrows.length > 20) {
                                const old = firedArrows.shift();
                                scene.remove(old);
                            }
                            
                            flyingArrow = null;
                            prepareNewArrow();
                            break;
                        }
                    }

                    // Update visual position and rotation
                    if (state.arrowInFlight && flyingArrow) {
                        flyingArrow.position.copy(arrowPosVec);
                        // Spin stabilization visual: look along velocity vector
                        flyingArrow.lookAt(arrowPosVec.clone().add(arrowVelVec));
                    }
                }
            }

            // Update State Object
            state.arrowPosition = { x: arrowPosVec.x, y: arrowPosVec.y, z: arrowPosVec.z };
            state.arrowVelocity = { x: arrowVelVec.x, y: arrowVelVec.y, z: arrowVelVec.z };
            state.isValid = !isNaN(arrowPosVec.x) && !isNaN(arrowVelVec.x);

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
