<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js Archery Game</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }

#hud {
  position: fixed;
  top: 10px;
  left: 10px;
  background: rgba(0,0,0,0.6);
  color: #0f0;
  font-family: monospace;
  padding: 10px;
  border-radius: 6px;
  z-index: 100;
  pointer-events: none;
  font-size: 14px;
  line-height: 1.6;
}

#controls {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  padding: 14px;
  border-radius: 8px;
  z-index: 100;
  min-width: 240px;
  color: #fff;
  font-family: monospace;
  font-size: 13px;
}

#controls label {
  display: block;
  margin-bottom: 2px;
  margin-top: 8px;
}

#controls input[type="range"] {
  width: 100%;
  margin-bottom: 2px;
}

#controls .val {
  text-align: right;
  font-size: 12px;
  color: #aaa;
}

#draw-bar-container {
  position: fixed;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 20px;
  background: rgba(0,0,0,0.5);
  border-radius: 10px;
  z-index: 100;
  overflow: hidden;
}

#draw-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #4caf50, #ff9800, #f44336);
  border-radius: 10px;
  transition: width 0.05s;
}

#instructions {
  position: fixed;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.6);
  color: #ccc;
  font-family: monospace;
  padding: 8px 12px;
  border-radius: 6px;
  z-index: 100;
  font-size: 12px;
  line-height: 1.5;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
  <div>Score: <span id="hud-score">0</span></div>
  <div>Last Shot: <span id="hud-lastshot">--</span></div>
  <div>Shots Fired: <span id="hud-shots">0</span></div>
  <div>Draw: <span id="hud-draw">0%</span></div>
  <div>Wind: <span id="hud-wind">2.0 m/s @ 90°</span></div>
  <div>Frame: <span id="hud-framecount">0</span></div>
  <div>Paused: <span id="hud-paused">No</span></div>
</div>

<div id="instructions">
  [SPACE] Hold to draw, release to fire<br>
  [R] Reset  [P] Pause<br>
  [↑/↓] Adjust angle
</div>

<div id="controls">
  <label>Launch Angle (<span id="val-angle">5</span>°)</label>
  <input type="range" id="slider-angle" min="-20" max="45" value="5" step="1">

  <label>Wind Speed (<span id="val-windspeed">2.0</span> m/s)</label>
  <input type="range" id="slider-windspeed" min="0" max="15" value="2" step="0.5">

  <label>Wind Direction (<span id="val-winddir">90</span>°)</label>
  <input type="range" id="slider-winddir" min="0" max="360" value="90" step="5">

  <label>Target Distance (<span id="val-distance">30</span> m)</label>
  <input type="range" id="slider-distance" min="10" max="60" value="30" step="1">
</div>

<div id="draw-bar-container">
  <div id="draw-bar"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ GLOBALS ============
let frameCount = 0;
let isPaused = false;
let totalScore = 0;
let shotsFired = 0;
let lastShotScore = -1;
let drawStrength = 0;
let isDrawing = false;
let arrowInFlight = false;
let launchAngle = 5;
let windSpeed = 2;
let windDirection = 90;
let targetDistance = 30;

let arrowPosition = { x: 0, y: 0, z: 0 };
let arrowVelocity = { x: 0, y: 0, z: 0 };

const MAX_ARROWS = 20;
const DRAW_TIME = 2.0;
const MAX_VELOCITY = 40;
const GRAVITY = -9.81;
const CD = 0.04;
const A_ARROW = 0.0003;
const RHO = 1.225;

let embeddedArrows = [];
let currentArrow = null;
let currentArrowVel = new THREE.Vector3();
let drawStartTime = 0;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.Fog(0x87ceeb, 60, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(-5, 3, 0);
camera.lookAt(30, 2, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2 - 0.02;
controls.target.set(15, 2, 0);
controls.update();

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 80;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Sky gradient - hemisphere light for extra realism
const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x558b2f, 0.3);
scene.add(hemiLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x558b2f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ============ BOW ============
const bowGroup = new THREE.Group();
bowGroup.position.set(0, 2, 0);
scene.add(bowGroup);

// Bow limb curve
function createBowCurve(flex = 0) {
  const points = [];
  const segments = 20;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const angle = (t - 0.5) * Math.PI * 0.9;
    const y = Math.sin(angle) * 0.8;
    const baseX = Math.cos(angle) * 0.15;
    const flexAmount = flex * Math.cos(angle) * 0.1;
    points.push(new THREE.Vector3(baseX + flexAmount, y, 0));
  }
  return points;
}

let bowCurvePoints = createBowCurve(0);
const bowCurve = new THREE.CatmullRomCurve3(bowCurvePoints);
const bowGeo = new THREE.TubeGeometry(bowCurve, 20, 0.015, 8, false);
const bowMat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });
const bowMesh = new THREE.Mesh(bowGeo, bowMat);
bowMesh.castShadow = true;
bowGroup.add(bowMesh);

// Bowstring
const stringMat = new THREE.LineBasicMaterial({ color: 0xeeeeee, linewidth: 2 });
let stringGeo = new THREE.BufferGeometry();
const stringTopY = 0.8 * Math.sin(0.45 * Math.PI);
const stringBotY = 0.8 * Math.sin(-0.45 * Math.PI);
const stringTopX = 0.15 * Math.cos(0.45 * Math.PI);
const stringBotX = 0.15 * Math.cos(-0.45 * Math.PI);

function createStringGeometry(pullBack = 0) {
  const top = new THREE.Vector3(stringTopX, stringTopY, 0);
  const mid = new THREE.Vector3(-pullBack, 0, 0);
  const bot = new THREE.Vector3(stringBotX, stringBotY, 0);
  const pts = [top, mid, bot];
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  return geo;
}

stringGeo = createStringGeometry(0);
const bowString = new THREE.Line(stringGeo, stringMat);
bowGroup.add(bowString);

// Nocking point
const nockPoint = new THREE.Vector3(0, 0, 0);

function updateBow(draw) {
  // Update bow limb flex
  const newPoints = createBowCurve(draw);
  const newCurve = new THREE.CatmullRomCurve3(newPoints);
  const newBowGeo = new THREE.TubeGeometry(newCurve, 20, 0.015, 8, false);
  bowMesh.geometry.dispose();
  bowMesh.geometry = newBowGeo;

  // Update string
  const pullBack = draw * 0.4;
  const newStringGeo = createStringGeometry(pullBack);
  bowString.geometry.dispose();
  bowString.geometry = newStringGeo;

  nockPoint.set(-pullBack, 0, 0);
}

// ============ ARROW CREATION ============
function createArrow() {
  const arrowGroup = new THREE.Group();

  // Shaft
  const shaftGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.8, 8);
  const shaftMat = new THREE.MeshLambertMaterial({ color: 0x8d6e63 });
  const shaft = new THREE.Mesh(shaftGeo, shaftMat);
  shaft.rotation.z = Math.PI / 2;
  shaft.castShadow = true;
  arrowGroup.add(shaft);

  // Arrowhead (cone)
  const tipGeo = new THREE.ConeGeometry(0.02, 0.06, 8);
  const tipMat = new THREE.MeshLambertMaterial({ color: 0xbdbdbd });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.rotation.z = -Math.PI / 2;
  tip.position.set(0.43, 0, 0);
  tip.castShadow = true;
  arrowGroup.add(tip);

  // Fletching (3 fins)
  const finGeo = new THREE.BufferGeometry();
  const finVerts = new Float32Array([
    0, 0, 0,
    -0.08, 0.03, 0,
    -0.08, 0, 0
  ]);
  finGeo.setAttribute('position', new THREE.BufferAttribute(finVerts, 3));
  finGeo.computeVertexNormals();
  const finMat = new THREE.MeshLambertMaterial({ color: 0xf44336, side: THREE.DoubleSide });

  for (let i = 0; i < 3; i++) {
    const fin = new THREE.Mesh(finGeo, finMat);
    fin.position.set(-0.35, 0, 0);
    fin.rotation.x = (i / 3) * Math.PI * 2;
    arrowGroup.add(fin);
  }

  return arrowGroup;
}

// Arrow on bow (visible during draw)
let arrowOnBow = createArrow();
arrowOnBow.visible = false;
bowGroup.add(arrowOnBow);

// ============ TARGET ============
const targetGroup = new THREE.Group();
scene.add(targetGroup);

function createTarget() {
  // Clear old target
  while (targetGroup.children.length > 0) {
    const child = targetGroup.children[0];
    targetGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }

  // Backing board with texture
  const textureLoader = new THREE.TextureLoader();
  const brickTexture = textureLoader.load('https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/textures/brick_diffuse.jpg');
  const boardGeo = new THREE.PlaneGeometry(3.2, 3.2);
  const boardMat = new THREE.MeshLambertMaterial({ map: brickTexture, side: THREE.DoubleSide });
  const board = new THREE.Mesh(boardGeo, boardMat);
  board.rotation.y = Math.PI / 2;
  board.position.x = 0.02;
  board.receiveShadow = true;
  targetGroup.add(board);

  // Support legs
  const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 2.5, 8);
  const legMat = new THREE.MeshLambertMaterial({ color: 0x5d4037 });
  const leg1 = new THREE.Mesh(legGeo, legMat);
  leg1.position.set(0.1, -1.25, -0.8);
  leg1.rotation.x = 0.15;
  leg1.castShadow = true;
  targetGroup.add(leg1);
  const leg2 = new THREE.Mesh(legGeo, legMat);
  leg2.position.set(0.1, -1.25, 0.8);
  leg2.rotation.x = -0.15;
  leg2.castShadow = true;
  targetGroup.add(leg2);

  // Target rings (from outer to inner so inner paints over outer)
  const rings = [
    { innerR: 0, outerR: 1.5, color: 0xeeeeee },
    { innerR: 0, outerR: 1.1, color: 0x212121 },
    { innerR: 0, outerR: 0.7, color: 0x2196f3 },
    { innerR: 0, outerR: 0.4, color: 0xf44336 },
    { innerR: 0, outerR: 0.15, color: 0xffd700 },
  ];

  rings.forEach((ring, i) => {
    const ringGeo = new THREE.RingGeometry(ring.innerR, ring.outerR, 64);
    const ringMat = new THREE.MeshLambertMaterial({ color: ring.color, side: THREE.DoubleSide });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.y = Math.PI / 2;
    ringMesh.position.x = -0.001 * (i + 1);
    targetGroup.add(ringMesh);
  });

  targetGroup.position.set(targetDistance, 2, 0);
}

createTarget();

// ============ WIND INDICATOR ============
const windArrowGroup = new THREE.Group();
scene.add(windArrowGroup);

function updateWindIndicator() {
  while (windArrowGroup.children.length > 0) {
    const c = windArrowGroup.children[0];
    windArrowGroup.remove(c);
    if (c.geometry) c.geometry.dispose();
    if (c.material) c.material.dispose();
  }

  if (windSpeed <= 0) return;

  const windRad = windDirection * Math.PI / 180;
  const wx = Math.cos(windRad);
  const wz = Math.sin(windRad);

  // Wind flag at bow position
  const flagPoleGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 6);
  const flagPoleMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
  const flagPole = new THREE.Mesh(flagPoleGeo, flagPoleMat);
  flagPole.position.set(0, 3.5, 1.5);
  windArrowGroup.add(flagPole);

  // Flag ribbon
  const ribbonGeo = new THREE.PlaneGeometry(0.5 * (windSpeed / 15 + 0.3), 0.2);
  const ribbonMat = new THREE.MeshLambertMaterial({ color: 0xff5722, side: THREE.DoubleSide });
  const ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
  ribbon.position.set(wx * 0.3, 4.1, 1.5 + wz * 0.3);
  ribbon.lookAt(ribbon.position.x + wx, ribbon.position.y, ribbon.position.z + wz);
  windArrowGroup.add(ribbon);
}
updateWindIndicator();

// ============ TRAJECTORY LINE (preview) ============
const trajectoryMat = new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 0.3, gapSize: 0.15, opacity: 0.5, transparent: true });
let trajectoryLine = null;

function updateTrajectoryPreview() {
  if (trajectoryLine) {
    scene.remove(trajectoryLine);
    trajectoryLine.geometry.dispose();
    trajectoryLine = null;
  }

  if (arrowInFlight) return;

  const angleRad = launchAngle * Math.PI / 180;
  const v0 = MAX_VELOCITY * 0.3; // preview at 30% draw
  const vx = v0 * Math.cos(angleRad);
  const vy = v0 * Math.sin(angleRad);

  const points = [];
  let px = 0, py = 2, pz = 0;
  let pvx = vx, pvy = vy, pvz = 0;
  const dt = 0.05;

  for (let i = 0; i < 100; i++) {
    points.push(new THREE.Vector3(px, py, pz));
    pvy += GRAVITY * dt;
    px += pvx * dt;
    py += pvy * dt;
    pz += pvz * dt;
    if (py < 0) break;
    if (px > targetDistance + 5) break;
  }

  const geo = new THREE.BufferGeometry().setFromPoints(points);
  trajectoryLine = new THREE.Line(geo, trajectoryMat);
  trajectoryLine.computeLineDistances();
  scene.add(trajectoryLine);
}
updateTrajectoryPreview();

// ============ SCORING ============
function computeScore(impactY, impactZ) {
  const dy = impactY - 2; // target center y=2
  const dz = impactZ - 0; // target center z=0
  const dist = Math.sqrt(dy * dy + dz * dz);

  if (dist <= 0.15) return 10;
  if (dist <= 0.4) return 8;
  if (dist <= 0.7) return 6;
  if (dist <= 1.1) return 4;
  if (dist <= 1.5) return 2;
  return 0;
}

// ============ FIRE ARROW ============
function fireArrow() {
  if (arrowInFlight) return;
  if (drawStrength <= 0.01) return;

  arrowOnBow.visible = false;

  const arrow = createArrow();
  scene.add(arrow);

  const bowWorldPos = new THREE.Vector3();
  bowGroup.getWorldPosition(bowWorldPos);
  const nockWorld = nockPoint.clone();
  bowGroup.localToWorld(nockWorld);

  arrow.position.copy(nockWorld);

  const angleRad = launchAngle * Math.PI / 180;
  const v0 = drawStrength * MAX_VELOCITY;
  currentArrowVel.set(
    v0 * Math.cos(angleRad),
    v0 * Math.sin(angleRad),
    0
  );

  currentArrow = arrow;
  arrowInFlight = true;
  shotsFired++;

  arrowPosition = { x: arrow.position.x, y: arrow.position.y, z: arrow.position.z };
  arrowVelocity = { x: currentArrowVel.x, y: currentArrowVel.y, z: currentArrowVel.z };

  drawStrength = 0;
  updateBow(0);
}

// ============ PHYSICS STEP ============
function physicsStep(dt) {
  if (!arrowInFlight || !currentArrow) return;

  const subSteps = 2;
  const subDt = dt / subSteps;

  for (let s = 0; s < subSteps; s++) {
    const vel = currentArrowVel;
    const speed = vel.length();

    // Gravity
    let ay = GRAVITY;
    let ax = 0;
    let az = 0;

    // Wind
    const windRad = windDirection * Math.PI / 180;
    const windAx = windSpeed * Math.cos(windRad);
    const windAz = windSpeed * Math.sin(windRad);
    ax += windAx * 0.5; // wind force scaled
    az += windAz * 0.5;

    // Air drag
    if (speed > 0.01) {
      const dragForce = 0.5 * CD * A_ARROW * RHO * speed * speed;
      const dragAccel = dragForce / 0.025; // arrow mass ~25g
      ax -= (vel.x / speed) * dragAccel;
      ay -= (vel.y / speed) * dragAccel;
      az -= (vel.z / speed) * dragAccel;
    }

    // Euler integration
    vel.x += ax * subDt;
    vel.y += ay * subDt;
    vel.z += az * subDt;

    currentArrow.position.x += vel.x * subDt;
    currentArrow.position.y += vel.y * subDt;
    currentArrow.position.z += vel.z * subDt;

    // Align arrow with velocity
    if (speed > 0.1) {
      const lookTarget = currentArrow.position.clone().add(vel.clone().normalize());
      currentArrow.lookAt(lookTarget);
      currentArrow.rotateY(Math.PI / 2);
    }

    // Check ground collision
    if (currentArrow.position.y <= 0.01) {
      currentArrow.position.y = 0.01;
      arrowInFlight = false;
      lastShotScore = 0;
      embedArrow(currentArrow);
      break;
    }

    // Check target collision (plane at x = targetDistance)
    if (currentArrow.position.x >= targetDistance - 0.05 && currentArrow.position.x <= targetDistance + 0.1) {
      const dy = currentArrow.position.y - targetGroup.position.y;
      const dz = currentArrow.position.z - targetGroup.position.z;
      const distFromCenter = Math.sqrt(dy * dy + dz * dz);

      if (distFromCenter <= 1.6) {
        // Hit target area
        currentArrow.position.x = targetDistance - 0.03;
        const score = computeScore(currentArrow.position.y, currentArrow.position.z);
        lastShotScore = score;
        totalScore += score;
        arrowInFlight = false;
        embedArrow(currentArrow);
        break;
      }
    }

    // Arrow went too far or too low
    if (currentArrow.position.x > targetDistance + 20 || currentArrow.position.y < -1) {
      arrowInFlight = false;
      lastShotScore = 0;
      embedArrow(currentArrow);
      break;
    }
  }

  arrowPosition = { x: currentArrow.position.x, y: currentArrow.position.y, z: currentArrow.position.z };
  arrowVelocity = { x: currentArrowVel.x, y: currentArrowVel.y, z: currentArrowVel.z };
}

function embedArrow(arrow) {
  embeddedArrows.push(arrow);
  if (embeddedArrows.length > MAX_ARROWS) {
    const old = embeddedArrows.shift();
    scene.remove(old);
    old.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  }
  currentArrow = null;
}

// ============ INPUT ============
const keys = {};

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!keys['Space'] && !arrowInFlight) {
      keys['Space'] = true;
      isDrawing = true;
      drawStartTime = performance.now() / 1000;
      arrowOnBow.visible = true;
    }
  }
  if (e.code === 'KeyR') {
    resetGame();
  }
  if (e.code === 'KeyP') {
    isPaused = !isPaused;
  }
  if (e.code === 'ArrowUp') {
    e.preventDefault();
    const slider = document.getElementById('slider-angle');
    const newVal = Math.min(45, launchAngle + 1);
    slider.value = newVal;
    slider.dispatchEvent(new Event('input'));
  }
  if (e.code === 'ArrowDown') {
    e.preventDefault();
    const slider = document.getElementById('slider-angle');
    const newVal = Math.max(-20, launchAngle - 1);
    slider.value = newVal;
    slider.dispatchEvent(new Event('input'));
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    keys['Space'] = false;
    if (isDrawing) {
      isDrawing = false;
      fireArrow();
    }
  }
});

// ============ SLIDERS ============
document.getElementById('slider-angle').addEventListener('input', (e) => {
  launchAngle = parseFloat(e.target.value);
  document.getElementById('val-angle').textContent = launchAngle;
  updateTrajectoryPreview();
});

document.getElementById('slider-windspeed').addEventListener('input', (e) => {
  windSpeed = parseFloat(e.target.value);
  document.getElementById('val-windspeed').textContent = windSpeed.toFixed(1);
  updateWindIndicator();
});

document.getElementById('slider-winddir').addEventListener('input', (e) => {
  windDirection = parseFloat(e.target.value);
  document.getElementById('val-winddir').textContent = windDirection;
  updateWindIndicator();
});

document.getElementById('slider-distance').addEventListener('input', (e) => {
  targetDistance = parseFloat(e.target.value);
  document.getElementById('val-distance').textContent = targetDistance;
  targetGroup.position.x = targetDistance;
  updateTrajectoryPreview();
});

// ============ RESET ============
function resetGame() {
  // Remove all embedded arrows
  embeddedArrows.forEach(a => {
    scene.remove(a);
    a.traverse(c => { if (c.geometry) c.geometry.dispose(); if (c.material) c.material.dispose(); });
  });
  embeddedArrows = [];

  if (currentArrow) {
    scene.remove(currentArrow);
    currentArrow = null;
  }

  totalScore = 0;
  shotsFired = 0;
  lastShotScore = -1;
  drawStrength = 0;
  isDrawing = false;
  arrowInFlight = false;
  keys['Space'] = false;
  arrowOnBow.visible = false;
  updateBow(0);
  arrowPosition = { x: 0, y: 0, z: 0 };
  arrowVelocity = { x: 0, y: 0, z: 0 };
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('hud-score').textContent = totalScore;
  document.getElementById('hud-lastshot').textContent = lastShotScore >= 0 ? lastShotScore : '--';
  document.getElementById('hud-shots').textContent = shotsFired;
  document.getElementById('hud-draw').textContent = Math.round(drawStrength * 100) + '%';
  document.getElementById('hud-wind').textContent = `${windSpeed.toFixed(1)} m/s @ ${windDirection}°`;
  document.getElementById('hud-framecount').textContent = frameCount;
  document.getElementById('hud-paused').textContent = isPaused ? 'Yes' : 'No';

  document.getElementById('draw-bar').style.width = (drawStrength * 100) + '%';
}

// ============ STATE ============
function isValidNumber(v) {
  return typeof v === 'number' && isFinite(v) && !isNaN(v);
}

function updateState() {
  const isValid = isValidNumber(arrowPosition.x) && isValidNumber(arrowPosition.y) && isValidNumber(arrowPosition.z) &&
                  isValidNumber(arrowVelocity.x) && isValidNumber(arrowVelocity.y) && isValidNumber(arrowVelocity.z) &&
                  isValidNumber(totalScore) && isValidNumber(drawStrength);

  window.__3D_STATE__ = {
    frameCount,
    isPaused,
    totalScore,
    shotsFired,
    lastShotScore,
    drawStrength,
    isDrawing,
    arrowInFlight,
    launchAngle,
    windSpeed,
    windDirection,
    targetDistance,
    arrowPosition: { ...arrowPosition },
    arrowVelocity: { ...arrowVelocity },
    isValid
  };
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  frameCount++;

  controls.update();

  if (!isPaused) {
    // Drawing
    if (isDrawing) {
      const now = performance.now() / 1000;
      const elapsed = now - drawStartTime;
      drawStrength = Math.min(1.0, elapsed / DRAW_TIME);
      updateBow(drawStrength);

      // Position arrow on bow
      if (arrowOnBow.visible) {
        arrowOnBow.position.copy(nockPoint);
        arrowOnBow.position.x += 0.4; // offset so tip points forward
      }
    }

    // Physics
    if (arrowInFlight) {
      physicsStep(1 / 60);
    }

    if (!arrowInFlight && !isDrawing) {
      updateTrajectoryPreview();
    }
  }

  updateHUD();
  updateState();

  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT STATE ============
updateState();
animate();

</script>
</body>
