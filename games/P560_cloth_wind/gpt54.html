<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Cloth Simulation - Mass Spring</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #223344;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 260px;
      backdrop-filter: blur(4px);
    }
    #ui label {
      display: block;
      margin: 8px 0 4px;
      font-size: 14px;
    }
    #ui input[type="range"] {
      width: 100%;
    }
    #hud {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.5;
      border-top: 1px solid rgba(255,255,255,0.2);
      padding-top: 8px;
    }
    #help {
      margin-top: 8px;
      font-size: 12px;
      color: #d7e3ea;
      line-height: 1.4;
    }
    canvas { display: block; }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <label for="slider-wind">Wind Strength: <span id="wind-val">5.0</span></label>
    <input id="slider-wind" type="range" min="0" max="20" step="0.5" value="5" />

    <label for="slider-stiffness">Structural Stiffness: <span id="stiffness-val">200</span></label>
    <input id="slider-stiffness" type="range" min="50" max="500" step="10" value="200" />

    <div id="hud">
      <div>Particles: <span id="hud-particles">625</span></div>
      <div>Wind: <span id="hud-wind">5.0</span></div>
      <div>Stiffness: <span id="hud-stiffness">200</span></div>
      <div>Sphere pos: <span id="hud-sphere">0.0, 4.0, 3.0</span></div>
      <div>Max stretch: <span id="hud-stretch">1.000</span></div>
      <div>Paused: <span id="hud-paused">Playing</span></div>
    </div>

    <div id="help">
      WASD: move sphere on XZ<br>
      Q / E: move sphere up/down<br>
      R: reset cloth<br>
      Space: pause/play<br>
      C: toggle sphere visibility
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---------- Scene ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x223344);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x445566, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    // Floor
    const floorGeo = new THREE.PlaneGeometry(20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x445544 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // Rod
    const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 7, 24);
    const rodMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.35 });
    const rod = new THREE.Mesh(rodGeo, rodMat);
    rod.rotation.z = Math.PI / 2;
    rod.position.set(0, 8, 0);
    rod.castShadow = true;
    rod.receiveShadow = true;
    scene.add(rod);

    // Sphere collider
    const sphereRadius = 1.0;
    const sphereGeo = new THREE.SphereGeometry(sphereRadius, 32, 32);
    const sphereMat = new THREE.MeshStandardMaterial({
      color: 0xff4444,
      transparent: true,
      opacity: 0.55,
      roughness: 0.35,
      metalness: 0.05
    });
    const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
    sphereMesh.position.set(0, 4, 3);
    sphereMesh.castShadow = true;
    sphereMesh.receiveShadow = true;
    scene.add(sphereMesh);

    // ---------- Texture ----------
    const textureLoader = new THREE.TextureLoader();
    const clothNormalMap = textureLoader.load(
      'https://threejs.org/examples/textures/disturb.jpg',
      tex => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(3, 3);
      }
    );

    // ---------- Cloth Setup ----------
    const SEG_X = 24;
    const SEG_Y = 24;
    const COLS = SEG_X + 1; // 25
    const ROWS = SEG_Y + 1; // 25
    const PARTICLE_COUNT = COLS * ROWS; // 625

    const clothWidth = 6;
    const clothHeight = 6;
    const topY = 8;
    const leftX = -clothWidth / 2;
    const dx = clothWidth / SEG_X;   // 0.25
    const dy = clothHeight / SEG_Y;  // 0.25

    const particleMass = 0.05;
    const gravity = new THREE.Vector3(0, -9.81, 0);
    const dragCoeff = 0.02;
    const springDamping = 2.0;

    let structuralK = 200;
    const shearK = 100;
    const bendK = 50;

    const dt = 0.005;
    const substeps = 8;
    const verletDampingFactor = 0.01;

    let windStrength = 5;
    let paused = false;
    let frameCount = 0;
    let maxStretchRatio = 1.0;

    const tempVecA = new THREE.Vector3();
    const tempVecB = new THREE.Vector3();
    const tempVecC = new THREE.Vector3();
    const tempVecD = new THREE.Vector3();
    const tempNormal = new THREE.Vector3();

    function indexOf(x, y) {
      return y * COLS + x;
    }

    const pinnedIndices = new Set();
    for (let x = 0; x < COLS; x += 3) {
      pinnedIndices.add(indexOf(x, 0)); // top row
    }

    class Particle {
      constructor(position, pinned = false) {
        this.position = position.clone();
        this.oldPosition = position.clone();
        this.acceleration = new THREE.Vector3();
        this.velocity = new THREE.Vector3();
        this.mass = particleMass;
        this.invMass = pinned ? 0 : 1 / particleMass;
        this.pinned = pinned;
        this.pinPosition = position.clone();
      }
    }

    const particles = [];
    const springs = [];
    const particleNormals = Array.from({ length: PARTICLE_COUNT }, () => new THREE.Vector3());

    function createParticleGrid() {
      particles.length = 0;
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const px = leftX + x * dx;
          const py = topY - y * dy;
          const pz = 0;
          const idx = indexOf(x, y);
          particles.push(new Particle(new THREE.Vector3(px, py, pz), pinnedIndices.has(idx)));
        }
      }
    }

    function addSpring(a, b, rest, k, type) {
      springs.push({ a, b, rest, k, type });
    }

    function createSprings() {
      springs.length = 0;

      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const i = indexOf(x, y);

          // Structural
          if (x + 1 < COLS) addSpring(i, indexOf(x + 1, y), dx, structuralK, 'struct');
          if (y + 1 < ROWS) addSpring(i, indexOf(x, y + 1), dy, structuralK, 'struct');

          // Shear
          if (x + 1 < COLS && y + 1 < ROWS) addSpring(i, indexOf(x + 1, y + 1), Math.sqrt(dx * dx + dy * dy), shearK, 'shear');
          if (x - 1 >= 0 && y + 1 < ROWS) addSpring(i, indexOf(x - 1, y + 1), Math.sqrt(dx * dx + dy * dy), shearK, 'shear');

          // Bending
          if (x + 2 < COLS) addSpring(i, indexOf(x + 2, y), dx * 2, bendK, 'bend');
          if (y + 2 < ROWS) addSpring(i, indexOf(x, y + 2), dy * 2, bendK, 'bend');
        }
      }
    }

    createParticleGrid();
    createSprings();

    // ---------- Cloth Geometry ----------
    const clothGeometry = new THREE.PlaneGeometry(clothWidth, clothHeight, SEG_X, SEG_Y);
    const clothPos = clothGeometry.attributes.position;
    const clothUV = clothGeometry.attributes.uv;

    // Remap geometry into our top-anchored world layout
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        const i = indexOf(x, y);
        clothPos.setXYZ(i, leftX + x * dx, topY - y * dy, 0);
        clothUV.setXY(i, x / SEG_X, 1 - y / SEG_Y);
      }
    }
    clothGeometry.computeVertexNormals();

    const clothMaterial = new THREE.MeshStandardMaterial({
      color: 0x4488cc,
      side: THREE.DoubleSide,
      roughness: 0.8,
      metalness: 0.0,
      normalMap: clothNormalMap,
      normalScale: new THREE.Vector2(0.15, 0.15)
    });

    // Different back color via onBeforeCompile
    clothMaterial.onBeforeCompile = (shader) => {
      shader.fragmentShader = shader.fragmentShader.replace(
        '#include <color_fragment>',
        `
        #include <color_fragment>
        if (!gl_FrontFacing) {
          diffuseColor.rgb *= vec3(${(0xcc / 255).toFixed(4)}, ${(0x88 / 255).toFixed(4)}, ${(0x44 / 255).toFixed(4)});
        }
        `
      );
    };

    const clothMesh = new THREE.Mesh(clothGeometry, clothMaterial);
    clothMesh.castShadow = true;
    clothMesh.receiveShadow = true;
    scene.add(clothMesh);

    // ---------- Controls / UI ----------
    const sliderWind = document.getElementById('slider-wind');
    const sliderStiffness = document.getElementById('slider-stiffness');
    const windVal = document.getElementById('wind-val');
    const stiffnessVal = document.getElementById('stiffness-val');

    const hudParticles = document.getElementById('hud-particles');
    const hudWind = document.getElementById('hud-wind');
    const hudStiffness = document.getElementById('hud-stiffness');
    const hudSphere = document.getElementById('hud-sphere');
    const hudStretch = document.getElementById('hud-stretch');
    const hudPaused = document.getElementById('hud-paused');

    sliderWind.addEventListener('input', () => {
      windStrength = parseFloat(sliderWind.value);
      windVal.textContent = windStrength.toFixed(1);
    });

    sliderStiffness.addEventListener('input', () => {
      structuralK = parseFloat(sliderStiffness.value);
      stiffnessVal.textContent = String(structuralK);
      for (const s of springs) {
        if (s.type === 'struct') s.k = structuralK;
      }
    });

    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;

      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
      }
      if (e.code === 'KeyR') {
        resetCloth();
      }
      if (e.code === 'KeyC') {
        sphereMesh.visible = !sphereMesh.visible;
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    function resetCloth() {
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const i = indexOf(x, y);
          const px = leftX + x * dx;
          const py = topY - y * dy;
          const pz = 0;
          const p = particles[i];
          p.position.set(px, py, pz);
          p.oldPosition.set(px, py, pz);
          p.acceleration.set(0, 0, 0);
          p.velocity.set(0, 0, 0);
          if (p.pinned) p.pinPosition.set(px, py, pz);
        }
      }
      maxStretchRatio = 1.0;
      updateClothGeometry();
    }

    // ---------- Physics ----------
    function computeParticleNormals() {
      for (let i = 0; i < PARTICLE_COUNT; i++) particleNormals[i].set(0, 0, 0);

      for (let y = 0; y < SEG_Y; y++) {
        for (let x = 0; x < SEG_X; x++) {
          const i0 = indexOf(x, y);
          const i1 = indexOf(x + 1, y);
          const i2 = indexOf(x, y + 1);
          const i3 = indexOf(x + 1, y + 1);

          const p0 = particles[i0].position;
          const p1 = particles[i1].position;
          const p2 = particles[i2].position;
          const p3 = particles[i3].position;

          // tri 1: p0, p2, p1
          tempVecA.subVectors(p2, p0);
          tempVecB.subVectors(p1, p0);
          tempNormal.crossVectors(tempVecA, tempVecB);
          particleNormals[i0].add(tempNormal);
          particleNormals[i2].add(tempNormal);
          particleNormals[i1].add(tempNormal);

          // tri 2: p1, p2, p3
          tempVecA.subVectors(p2, p1);
          tempVecB.subVectors(p3, p1);
          tempNormal.crossVectors(tempVecA, tempVecB);
          particleNormals[i1].add(tempNormal);
          particleNormals[i2].add(tempNormal);
          particleNormals[i3].add(tempNormal);
        }
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        if (particleNormals[i].lengthSq() > 1e-12) particleNormals[i].normalize();
        else particleNormals[i].set(0, 0, 1);
      }
    }

    function applyForces(timeSec) {
      computeParticleNormals();

      const windOsc = 1 + 0.3 * Math.sin(timeSec * 2);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = particles[i];
        p.acceleration.copy(gravity);

        if (!p.pinned) {
          // Wind
          const n = particleNormals[i];
          const windForce = tempVecC.copy(n).multiplyScalar(windStrength * windOsc);
          p.acceleration.addScaledVector(windForce, p.invMass);

          // Drag
          p.acceleration.addScaledVector(p.velocity, -dragCoeff * p.invMass);
        }
      }

      maxStretchRatio = 1.0;

      for (const s of springs) {
        const pa = particles[s.a];
        const pb = particles[s.b];

        tempVecA.subVectors(pb.position, pa.position);
        const len = tempVecA.length();
        if (len < 1e-8) continue;

        const dir = tempVecA.multiplyScalar(1 / len);
        const stretch = len - s.rest;
        const relVel = tempVecB.subVectors(pb.velocity, pa.velocity);
        const dampTerm = springDamping * relVel.dot(dir);
        const forceMag = s.k * stretch + dampTerm;
        const force = tempVecC.copy(dir).multiplyScalar(forceMag);

        if (!pa.pinned) pa.acceleration.addScaledVector(force, pa.invMass);
        if (!pb.pinned) pb.acceleration.addScaledVector(force, -pb.invMass);

        const ratio = len / s.rest;
        if (ratio > maxStretchRatio) maxStretchRatio = ratio;
      }
    }

    function verletIntegrate() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = particles[i];
        if (p.pinned) {
          p.position.copy(p.pinPosition);
          p.oldPosition.copy(p.pinPosition);
          p.velocity.set(0, 0, 0);
          continue;
        }

        const current = tempVecA.copy(p.position);
        const velApprox = tempVecB.subVectors(p.position, p.oldPosition).multiplyScalar(1 - verletDampingFactor);
        p.position.add(velApprox).addScaledVector(p.acceleration, dt * dt);
        p.oldPosition.copy(current);
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = particles[i];
        if (p.pinned) continue;
        p.velocity.subVectors(p.position, p.oldPosition).multiplyScalar(1 / dt);
      }
    }

    function enforceConstraints() {
      // Stretch clamp
      for (const s of springs) {
        const pa = particles[s.a];
        const pb = particles[s.b];

        tempVecA.subVectors(pb.position, pa.position);
        const len = tempVecA.length();
        const maxLen = s.rest * 1.5;
        if (len <= maxLen || len < 1e-8) continue;

        const correction = (len - maxLen) / len;
        tempVecB.copy(tempVecA).multiplyScalar(0.5 * correction);

        if (!pa.pinned && !pb.pinned) {
          pa.position.add(tempVecB);
          pb.position.sub(tempVecB);
        } else if (pa.pinned && !pb.pinned) {
          pb.position.sub(tempVecA.multiplyScalar(correction));
        } else if (!pa.pinned && pb.pinned) {
          pa.position.add(tempVecA.multiplyScalar(correction));
        }
      }

      // Sphere collision
      const collisionEps = 0.05;
      const targetRadius = sphereRadius + collisionEps;
      const center = sphereMesh.position;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = particles[i];
        if (p.pinned) continue;

        tempVecA.subVectors(p.position, center);
        let dist = tempVecA.length();

        if (dist < targetRadius) {
          if (dist < 1e-8) {
            tempVecA.set(0, 1, 0);
            dist = 1e-8;
          } else {
            tempVecA.multiplyScalar(1 / dist);
          }
          p.position.copy(center).addScaledVector(tempVecA, targetRadius);
        }

        // floor safety
        if (p.position.y < 0.02) p.position.y = 0.02;
      }

      // repin exact positions
      for (const idx of pinnedIndices) {
        const p = particles[idx];
        p.position.copy(p.pinPosition);
        p.oldPosition.copy(p.pinPosition);
      }
    }

    function simulate(timeSec) {
      for (let s = 0; s < substeps; s++) {
        applyForces(timeSec + s * dt);
        verletIntegrate();
        enforceConstraints();
      }
    }

    // ---------- Geometry Update ----------
    function updateClothGeometry() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = particles[i].position;
        clothPos.setXYZ(i, p.x, p.y, p.z);
      }
      clothPos.needsUpdate = true;
      clothGeometry.computeVertexNormals();
    }

    // ---------- Sphere Movement ----------
    function moveSphere(deltaSec) {
      const speed = 3.0;
      if (keys['KeyW']) sphereMesh.position.z -= speed * deltaSec;
      if (keys['KeyS']) sphereMesh.position.z += speed * deltaSec;
      if (keys['KeyA']) sphereMesh.position.x -= speed * deltaSec;
      if (keys['KeyD']) sphereMesh.position.x += speed * deltaSec;
      if (keys['KeyQ']) sphereMesh.position.y += speed * deltaSec;
      if (keys['KeyE']) sphereMesh.position.y -= speed * deltaSec;

      sphereMesh.position.y = Math.max(0.5, Math.min(10, sphereMesh.position.y));
      sphereMesh.position.x = Math.max(-8, Math.min(8, sphereMesh.position.x));
      sphereMesh.position.z = Math.max(-8, Math.min(8, sphereMesh.position.z));
    }

    // ---------- HUD / State ----------
    function updateHUD() {
      hudParticles.textContent = String(PARTICLE_COUNT);
      hudWind.textContent = windStrength.toFixed(1);
      hudStiffness.textContent = String(Math.round(structuralK));
      hudSphere.textContent = `${sphereMesh.position.x.toFixed(1)}, ${sphereMesh.position.y.toFixed(1)}, ${sphereMesh.position.z.toFixed(1)}`;
      hudStretch.textContent = maxStretchRatio.toFixed(3);
      hudPaused.textContent = paused ? 'Paused' : 'Playing';

      windVal.textContent = windStrength.toFixed(1);
      stiffnessVal.textContent = String(Math.round(structuralK));
    }

    function updateState() {
      let clothValid = true;
      let avgY = 0;
      for (const p of particles) {
        if (!Number.isFinite(p.position.x) || !Number.isFinite(p.position.y) || !Number.isFinite(p.position.z)) {
          clothValid = false;
        }
        avgY += p.position.y;
      }
      avgY /= particles.length;

      window.__3D_STATE__ = {
        particleCount: PARTICLE_COUNT,
        windStrength,
        stiffness: structuralK,
        spherePosition: {
          x: sphereMesh.position.x,
          y: sphereMesh.position.y,
          z: sphereMesh.position.z
        },
        maxStretchRatio: Number(maxStretchRatio.toFixed(4)),
        isPaused: paused,
        sphereVisible: sphereMesh.visible,
        frameCount,
        clothValid,
        avgY: Number(avgY.toFixed(3)),
        pinnedCount: 9
      };
    }

    // ---------- Resize ----------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------- Init ----------
    resetCloth();
    updateHUD();
    updateState();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const elapsed = clock.getElapsedTime();
      const delta = Math.min(clock.getDelta(), 0.033);

      moveSphere(delta);

      if (!paused) {
        simulate(elapsed);
        updateClothGeometry();
      }

      updateHUD();
      updateState(); // update every frame before rendering

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
