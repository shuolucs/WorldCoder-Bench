<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Whack-a-Mole</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 20px;
      user-select: none;
    }

    #startButton {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      padding: 16px 28px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background: #ffcc33;
      color: #222;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    #startButton:hover {
      background: #ffd84d;
    }

    #gameOverOverlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      min-width: 280px;
      text-align: center;
      color: white;
      background: rgba(0, 0, 0, 0.75);
      padding: 28px 36px;
      border-radius: 14px;
      font-size: 32px;
      display: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud">Score: 0 | Time: 30s | Combo: x0</div>
  <button id="startButton">Start Game</button>
  <div id="gameOverOverlay">Game Over! Score: 0</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x2e8b57 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.position.y = 0;
    scene.add(ground);

    const holePositions = [];
    const holes = [];
    const spacing = 2.5;
    const coords = [-2.5, 0, 2.5];

    for (let row = 0; row < 3; row++) {
      for (let col = 0; col < 3; col++) {
        const x = coords[col];
        const z = coords[row];
        holePositions.push(new THREE.Vector3(x, 0.075, z));

        const hole = new THREE.Mesh(
          new THREE.CylinderGeometry(0.6, 0.6, 0.15, 32),
          new THREE.MeshStandardMaterial({ color: 0x6b3e26 })
        );
        hole.position.set(x, 0.075, z);
        hole.receiveShadow = true;
        hole.castShadow = true;
        scene.add(hole);
        holes.push(hole);
      }
    }

    const hud = document.getElementById('hud');
    const startButton = document.getElementById('startButton');
    const gameOverOverlay = document.getElementById('gameOverOverlay');

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    let phase = 'waiting';
    let score = 0;
    let timeLeft = 30;
    let molesWhacked = 0;
    let misses = 0;
    let currentCombo = 0;
    let maxCombo = 0;
    let totalPops = 0;
    let gameStarted = false;
    let modelLoaded = false;

    let moleTemplate = null;
    const moles = [];
    const clickableMoleRoots = [];
    const particleBursts = [];

    let gameStartTime = 0;
    let lastSpawnTime = 0;

    const HIDDEN_Y = -1.5;
    const UP_Y = 0.5;
    const MOVE_DURATION = 0.3;
    const STAY_UP_DURATION = 1.5;
    const MAX_ACTIVE_MOLES = 2;
    const SPAWN_INTERVAL = 1.2;

    function initState() {
      window.__3D_STATE__ = {
        phase: 'waiting',
        score: 0,
        timeLeft: 30,
        molesWhacked: 0,
        misses: 0,
        currentCombo: 0,
        maxCombo: 0,
        activeMoles: 0,
        totalPops: 0,
        molePositions: Array.from({ length: 9 }, () => ({ x: 0, y: HIDDEN_Y, z: 0 })),
        particlesActive: 0,
        gameStarted: false,
        modelLoaded: false
      };
    }

    initState();

    function updateHUD() {
      hud.textContent = `Score: ${score} | Time: ${timeLeft}s | Combo: x${currentCombo}`;
    }

    function updateState() {
      window.__3D_STATE__.phase = phase;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.timeLeft = timeLeft;
      window.__3D_STATE__.molesWhacked = molesWhacked;
      window.__3D_STATE__.misses = misses;
      window.__3D_STATE__.currentCombo = currentCombo;
      window.__3D_STATE__.maxCombo = maxCombo;
      window.__3D_STATE__.activeMoles = moles.filter(m => m.visibleUp).length;
      window.__3D_STATE__.totalPops = totalPops;
      window.__3D_STATE__.particlesActive = particleBursts.length;
      window.__3D_STATE__.gameStarted = gameStarted;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.molePositions = moles.map(m => {
        const p = new THREE.Vector3();
        m.root.getWorldPosition(p);
        return { x: p.x, y: p.y, z: p.z };
      });
    }

    function setMoleMaterialColor(root, color) {
      root.traverse(child => {
        if (child.isMesh && child.material) {
          if (!child.userData.originalMaterial) {
            child.userData.originalMaterial = child.material.clone();
          }
          child.material = child.material.clone();
          child.material.color.set(color);
        }
      });
    }

    function restoreMoleMaterial(root) {
      root.traverse(child => {
        if (child.isMesh && child.userData.originalMaterial) {
          child.material.dispose?.();
          child.material = child.userData.originalMaterial.clone();
        }
      });
    }

    function createParticleBurst(position) {
      const group = new THREE.Group();
      const particles = [];
      const geometry = new THREE.SphereGeometry(0.08, 8, 8);

      for (let i = 0; i < 8; i++) {
        const material = new THREE.MeshStandardMaterial({
          color: 0xffff00,
          transparent: true,
          opacity: 1
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.copy(position);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        scene.add(mesh);

        const angle = (i / 8) * Math.PI * 2;
        const velocity = new THREE.Vector3(
          Math.cos(angle) * (1.5 + Math.random() * 0.8),
          1.0 + Math.random() * 1.2,
          Math.sin(angle) * (1.5 + Math.random() * 0.8)
        );

        particles.push({ mesh, velocity });
      }

      particleBursts.push({
        particles,
        age: 0,
        duration: 0.5
      });
    }

    function animateMoleTo(mole, targetY, duration, onComplete = null) {
      mole.animating = true;
      mole.startY = mole.root.position.y;
      mole.targetY = targetY;
      mole.moveDuration = duration;
      mole.moveElapsed = 0;
      mole.onMoveComplete = onComplete;
    }

    function popUpMole(index) {
      const mole = moles[index];
      if (!mole || mole.visibleUp || mole.animating || phase !== 'playing') return;

      mole.wasHit = false;
      mole.visibleUp = true;
      mole.upTimer = 0;
      totalPops++;
      animateMoleTo(mole, UP_Y, MOVE_DURATION);
    }

    function sendMoleDown(mole, wasHit = false) {
      if (!mole || (!mole.visibleUp && !mole.animating)) return;

      const shouldCountMiss = !wasHit && mole.visibleUp && !mole.wasHit;
      if (shouldCountMiss) {
        misses++;
        currentCombo = 0;
      }

      mole.visibleUp = false;
      mole.wasHit = wasHit || mole.wasHit;
      mole.upTimer = 0;

      animateMoleTo(mole, HIDDEN_Y, MOVE_DURATION, () => {
        mole.wasHit = false;
      });
    }

    function whackMole(mole) {
      if (phase !== 'playing') return;
      if (!mole.visibleUp) return;

      mole.wasHit = true;
      currentCombo += 1;
      maxCombo = Math.max(maxCombo, currentCombo);

      const points = currentCombo * 10;
      score += points;
      molesWhacked++;

      const worldPos = new THREE.Vector3();
      mole.root.getWorldPosition(worldPos);

      setMoleMaterialColor(mole.root, 0xff3333);
      setTimeout(() => restoreMoleMaterial(mole.root), 200);

      createParticleBurst(worldPos);
      sendMoleDown(mole, true);
    }

    function trySpawnMole(elapsedGameTime) {
      if (elapsedGameTime - lastSpawnTime < SPAWN_INTERVAL) return;
      lastSpawnTime = elapsedGameTime;

      const activeCount = moles.filter(m => m.visibleUp).length;
      if (activeCount >= MAX_ACTIVE_MOLES) return;

      const available = moles
        .map((m, i) => ({ m, i }))
        .filter(({ m }) => !m.visibleUp && !m.animating);

      if (available.length === 0) return;

      const pick = available[Math.floor(Math.random() * available.length)];
      popUpMole(pick.i);
    }

    function startGame() {
      gameStarted = true;
      phase = 'playing';
      score = 0;
      misses = 0;
      molesWhacked = 0;
      currentCombo = 0;
      maxCombo = 0;
      totalPops = 0;
      timeLeft = 30;
      gameStartTime = performance.now() / 1000;
      lastSpawnTime = -SPAWN_INTERVAL;

      gameOverOverlay.style.display = 'none';
      startButton.style.display = 'none';

      moles.forEach(mole => {
        mole.root.position.y = HIDDEN_Y;
        mole.visibleUp = false;
        mole.animating = false;
        mole.wasHit = false;
        mole.upTimer = 0;
      });

      particleBursts.forEach(burst => {
        burst.particles.forEach(p => {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
        });
      });
      particleBursts.length = 0;

      updateHUD();
      updateState();
    }

    function endGame() {
      phase = 'gameover';
      gameOverOverlay.textContent = `Game Over! Score: ${score}`;
      gameOverOverlay.style.display = 'block';
    }

    startButton.addEventListener('click', () => {
      if (!modelLoaded) return;
      startGame();
    });

    window.addEventListener('pointerdown', (event) => {
      if (phase !== 'playing') return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(clickableMoleRoots, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isMoleRoot) obj = obj.parent;
        if (obj && obj.userData.isMoleRoot) {
          const mole = moles[obj.userData.holeIndex];
          if (mole && mole.visibleUp) {
            whackMole(mole);
          }
        }
      }
    });

    function updateMoles(delta) {
      for (const mole of moles) {
        if (mole.animating) {
          mole.moveElapsed += delta;
          const t = Math.min(mole.moveElapsed / mole.moveDuration, 1);
          const eased = t * (2 - t);
          mole.root.position.y = THREE.MathUtils.lerp(mole.startY, mole.targetY, eased);

          if (t >= 1) {
            mole.root.position.y = mole.targetY;
            mole.animating = false;
            if (mole.onMoveComplete) {
              const cb = mole.onMoveComplete;
              mole.onMoveComplete = null;
              cb();
            }
          }
        }

        if (mole.visibleUp && !mole.animating) {
          mole.upTimer += delta;
          if (mole.upTimer >= STAY_UP_DURATION) {
            sendMoleDown(mole, false);
          }
        }
      }
    }

    function updateParticles(delta) {
      for (let i = particleBursts.length - 1; i >= 0; i--) {
        const burst = particleBursts[i];
        burst.age += delta;
        const t = burst.age / burst.duration;

        burst.particles.forEach(p => {
          p.velocity.y -= 4 * delta;
          p.mesh.position.addScaledVector(p.velocity, delta);
          p.mesh.material.opacity = Math.max(0, 1 - t);
        });

        if (burst.age >= burst.duration) {
          burst.particles.forEach(p => {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
          });
          particleBursts.splice(i, 1);
        }
      }
    }

    const loader = new GLTFLoader();
    loader.load(
      '._BrainStem.glb',
      (gltf) => {
        moleTemplate = gltf.scene;
        moleTemplate.scale.set(0.4, 0.4, 0.4);

        for (let i = 0; i < 9; i++) {
          const clone = moleTemplate.clone(true);
          clone.position.set(holePositions[i].x, HIDDEN_Y, holePositions[i].z);
          clone.userData.holeIndex = i;
          clone.userData.isMoleRoot = true;

          clone.traverse(child => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) {
                child.material = child.material.clone();
                child.userData.originalMaterial = child.material.clone();
              }
            }
          });

          scene.add(clone);
          clickableMoleRoots.push(clone);

          moles.push({
            root: clone,
            visibleUp: false,
            animating: false,
            wasHit: false,
            upTimer: 0,
            startY: HIDDEN_Y,
            targetY: HIDDEN_Y,
            moveElapsed: 0,
            moveDuration: MOVE_DURATION,
            onMoveComplete: null
          });
        }

        modelLoaded = true;
        updateState();
      },
      undefined,
      (error) => {
        console.error('Failed to load model:', error);

        // Fallback placeholder moles if model fails
        for (let i = 0; i < 9; i++) {
          const clone = new THREE.Mesh(
            new THREE.SphereGeometry(0.45, 24, 24),
            new THREE.MeshStandardMaterial({ color: 0x8888ff })
          );
          clone.position.set(holePositions[i].x, HIDDEN_Y, holePositions[i].z);
          clone.castShadow = true;
          clone.receiveShadow = true;
          clone.userData.holeIndex = i;
          clone.userData.isMoleRoot = true;
          clone.userData.originalMaterial = clone.material.clone();

          scene.add(clone);
          clickableMoleRoots.push(clone);

          moles.push({
            root: clone,
            visibleUp: false,
            animating: false,
            wasHit: false,
            upTimer: 0,
            startY: HIDDEN_Y,
            targetY: HIDDEN_Y,
            moveElapsed: 0,
            moveDuration: MOVE_DURATION,
            onMoveComplete: null
          });
        }

        modelLoaded = true;
        updateState();
      }
    );

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);

      if (phase === 'playing') {
        const now = performance.now() / 1000;
        const elapsed = now - gameStartTime;
        const remaining = Math.max(0, 30 - Math.floor(elapsed));
        timeLeft = remaining;

        trySpawnMole(elapsed);

        if (elapsed >= 30) {
          timeLeft = 0;
          endGame();
        }
      }

      updateMoles(delta);
      updateParticles(delta);
      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
