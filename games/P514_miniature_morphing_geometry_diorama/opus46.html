<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphing Geometry Diorama</title>
<style>
body { margin: 0; overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    font-family: monospace;
    font-size: 14px;
    padding: 10px;
    border-radius: 5px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 100;
}
</style>
</head>
<body>
<div id="hud"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
let cameraAngle = 0;
const cameraRadius = 6;
const cameraHeight = 3;
updateCameraPosition();

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Platform
const platformGeom = new THREE.CylinderGeometry(3, 3, 0.2, 64);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x3a2518, roughness: 0.8, metalness: 0.1 });
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.set(0, 0, 0);
platform.receiveShadow = true;
scene.add(platform);

// Geometry definitions
const originalColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff];
const blueTheme = [0x1144aa, 0x2255bb, 0x3366cc, 0x4477dd, 0x5588ee];
const orangeTheme = [0xff6600, 0xff7711, 0xff8822, 0xff9933, 0xffaa44];
const themes = [originalColors, blueTheme, orangeTheme];

const angles = [0, 72, 144, 216, 288];
const circleRadius = 1.8;
const platformTop = 0.1; // top of platform

const geometries = [];
const geometryMeshes = [];
const pedestals = [];
const basePositions = [];

// Create geometries
const geoCreators = [
    () => new THREE.IcosahedronGeometry(0.3),
    () => new THREE.OctahedronGeometry(0.3),
    () => new THREE.DodecahedronGeometry(0.3),
    () => new THREE.TetrahedronGeometry(0.3),
    () => new THREE.TorusGeometry(0.2, 0.08, 16, 32),
];

for (let i = 0; i < 5; i++) {
    const angleRad = THREE.MathUtils.degToRad(angles[i]);
    const x = Math.sin(angleRad) * circleRadius;
    const z = Math.cos(angleRad) * circleRadius;

    // Pedestal
    const pedGeom = new THREE.CylinderGeometry(0.15, 0.15, 0.4, 32);
    const pedMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5 });
    const pedestal = new THREE.Mesh(pedGeom, pedMat);
    pedestal.position.set(x, platformTop + 0.2, z);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    scene.add(pedestal);
    pedestals.push(pedestal);

    // Geometry mesh
    const geo = geoCreators[i]();
    const mat = new THREE.MeshStandardMaterial({ color: originalColors[i], roughness: 0.4, metalness: 0.3 });
    const mesh = new THREE.Mesh(geo, mat);
    const baseY = platformTop + 0.4 + 0.15;
    mesh.position.set(x, baseY, z);
    mesh.castShadow = true;
    scene.add(mesh);
    geometryMeshes.push(mesh);
    basePositions.push(new THREE.Vector3(x, baseY, z));
}

// Fish
let fishModel = null;
let fishModelLoaded = false;
let fishVisible = true;
let fishJumping = false;
let fishJumpStartTime = 0;
const fishGroup = new THREE.Group();
scene.add(fishGroup);

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BarramundiFish/glTF-Binary/BarramundiFish.glb',
    (gltf) => {
        fishModel = gltf.scene;
        // Compute bounding box to scale
        const box = new THREE.Box3().setFromObject(fishModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 1.5 / maxDim;
        fishModel.scale.set(scale, scale, scale);
        fishModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        fishGroup.add(fishModel);
        fishModelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load fish model:', error);
        // Create a placeholder fish
        const fishGeo = new THREE.ConeGeometry(0.15, 0.8, 8);
        fishGeo.rotateZ(-Math.PI / 2);
        const fishMat = new THREE.MeshStandardMaterial({ color: 0x44aaff });
        fishModel = new THREE.Mesh(fishGeo, fishMat);
        fishModel.castShadow = true;
        fishGroup.add(fishModel);
        fishModelLoaded = true;
    }
);

// State
let morphMode = 0;
const morphModeNames = ['idle', 'pulse', 'spin'];
let themeIndex = 0;
let selectedGeometry = -1;
let hiddenGeometries = [false, false, false, false, false];
const clock = new THREE.Clock();

// State object
window.__3D_STATE__ = {
    morphMode: 0,
    morphModeName: 'idle',
    themeIndex: 0,
    selectedGeometry: -1,
    fishVisible: true,
    fishJumping: false,
    fishPositionX: 0,
    fishPositionY: 1.5,
    fishPositionZ: 0,
    hiddenCount: 0,
    cameraAngleDeg: 0,
    geometryScales: [1, 1, 1, 1, 1],
    geometryVisible: [true, true, true, true, true],
    platformExists: true,
    elapsedTime: 0,
    geometryColors: [...originalColors],
    fishModelLoaded: false,
};

function updateCameraPosition() {
    const angleRad = THREE.MathUtils.degToRad(cameraAngle);
    camera.position.set(
        Math.sin(angleRad) * cameraRadius,
        cameraHeight,
        Math.cos(angleRad) * cameraRadius
    );
    camera.lookAt(0, 0, 0);
}

// Key handling
document.addEventListener('keydown', (e) => {
    switch (e.key) {
        case 'm':
        case 'M':
            morphMode = (morphMode + 1) % 3;
            // Reset positions when switching modes
            for (let i = 0; i < 5; i++) {
                geometryMeshes[i].position.copy(basePositions[i]);
                geometryMeshes[i].scale.set(1, 1, 1);
                geometryMeshes[i].rotation.set(0, 0, 0);
            }
            break;
        case 'f':
        case 'F':
            fishVisible = !fishVisible;
            fishGroup.visible = fishVisible;
            break;
        case 'j':
        case 'J':
            if (!fishJumping) {
                fishJumping = true;
                fishJumpStartTime = clock.getElapsedTime();
            }
            break;
        case 'c':
        case 'C':
            themeIndex = (themeIndex + 1) % 3;
            applyTheme();
            break;
        case '1':
        case '2':
        case '3':
        case '4':
        case '5': {
            const idx = parseInt(e.key) - 1;
            if (selectedGeometry === idx) {
                deselectGeometry(idx);
                selectedGeometry = -1;
            } else {
                if (selectedGeometry >= 0) deselectGeometry(selectedGeometry);
                selectedGeometry = idx;
                selectGeometry(idx);
            }
            break;
        }
        case 'Delete':
        case 'Backspace':
            if (selectedGeometry >= 0) {
                hiddenGeometries[selectedGeometry] = true;
                geometryMeshes[selectedGeometry].visible = false;
                deselectGeometry(selectedGeometry);
                selectedGeometry = -1;
            }
            e.preventDefault();
            break;
        case 'r':
        case 'R':
            for (let i = 0; i < 5; i++) {
                hiddenGeometries[i] = false;
                geometryMeshes[i].visible = true;
            }
            break;
        case 'ArrowLeft':
            cameraAngle -= 15;
            updateCameraPosition();
            e.preventDefault();
            break;
        case 'ArrowRight':
            cameraAngle += 15;
            updateCameraPosition();
            e.preventDefault();
            break;
    }
});

function selectGeometry(idx) {
    const mat = geometryMeshes[idx].material;
    mat.emissive = new THREE.Color(0xffffff);
    mat.emissiveIntensity = 0.3;
}

function deselectGeometry(idx) {
    const mat = geometryMeshes[idx].material;
    mat.emissive = new THREE.Color(0x000000);
    mat.emissiveIntensity = 0;
}

function applyTheme() {
    const colors = themes[themeIndex];
    for (let i = 0; i < 5; i++) {
        geometryMeshes[i].material.color.setHex(colors[i]);
    }
}

// HUD
const hudEl = document.getElementById('hud');

function updateHUD() {
    const hiddenCount = hiddenGeometries.filter(h => h).length;
    hudEl.innerHTML = `Morph Mode: ${morphModeNames[morphMode]}
Theme: ${themeIndex}
Selected: ${selectedGeometry}
Fish Visible: ${fishVisible}
Hidden: ${hiddenCount}
Camera Angle: ${((cameraAngle % 360) + 360) % 360}°`;
}

// Animation
function animate() {
    requestAnimationFrame(animate);
    const elapsed = clock.getElapsedTime();

    // Morph modes
    for (let i = 0; i < 5; i++) {
        const mesh = geometryMeshes[i];
        const base = basePositions[i];

        switch (morphMode) {
            case 0: // idle - bob up and down
                mesh.position.x = base.x;
                mesh.position.y = base.y + Math.sin(elapsed * Math.PI * 2 / 2) * 0.1;
                mesh.position.z = base.z;
                mesh.scale.set(1, 1, 1);
                break;
            case 1: // pulse - scale between 0.8 and 1.4
            {
                const s = 0.8 + (0.6 * (Math.sin(elapsed * Math.PI * 2 / 1.5) * 0.5 + 0.5));
                mesh.scale.set(s, s, s);
                mesh.position.copy(base);
                break;
            }
            case 2: // spin + orbit
            {
                mesh.rotation.y += 2 * (1 / 60); // approximate dt
                const orbitAngle = elapsed * Math.PI * 2 / 3;
                mesh.position.x = base.x + Math.cos(orbitAngle) * 0.1;
                mesh.position.y = base.y;
                mesh.position.z = base.z + Math.sin(orbitAngle) * 0.1;
                mesh.scale.set(1, 1, 1);
                break;
            }
        }
    }

    // Fish orbit
    const fishOrbitAngle = elapsed * Math.PI * 2 / 8;
    const fishOrbitRadius = 1.0;
    let fishBaseY = 1.5;

    // Fish jump
    if (fishJumping) {
        const jumpElapsed = elapsed - fishJumpStartTime;
        if (jumpElapsed < 0.3) {
            fishBaseY += (jumpElapsed / 0.3) * 1.0;
        } else if (jumpElapsed < 0.6) {
            fishBaseY += (1.0 - ((jumpElapsed - 0.3) / 0.3)) * 1.0;
        } else {
            fishJumping = false;
        }
    }

    fishGroup.position.set(
        Math.sin(fishOrbitAngle) * fishOrbitRadius,
        fishBaseY,
        Math.cos(fishOrbitAngle) * fishOrbitRadius
    );

    // Face direction of travel (tangent)
    fishGroup.rotation.y = fishOrbitAngle + Math.PI;

    // Update state
    const hiddenCount = hiddenGeometries.filter(h => h).length;
    const state = window.__3D_STATE__;
    state.morphMode = morphMode;
    state.morphModeName = morphModeNames[morphMode];
    state.themeIndex = themeIndex;
    state.selectedGeometry = selectedGeometry;
    state.fishVisible = fishVisible;
    state.fishJumping = fishJumping;
    state.fishPositionX = fishGroup.position.x;
    state.fishPositionY = fishGroup.position.y;
    state.fishPositionZ = fishGroup.position.z;
    state.hiddenCount = hiddenCount;
    state.cameraAngleDeg = ((cameraAngle % 360) + 360) % 360;
    state.geometryScales = geometryMeshes.map(m => m.scale.x);
    state.geometryVisible = geometryMeshes.map((m, i) => !hiddenGeometries[i]);
    state.platformExists = true;
    state.elapsedTime = elapsed;
    state.geometryColors = geometryMeshes.map(m => m.material.color.getHex());
    state.fishModelLoaded = fishModelLoaded;

    updateHUD();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
