<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Morphing Geometry Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: monospace;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      white-space: pre;
      font-size: 14px;
      line-height: 1.4;
      pointer-events: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1f);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    let cameraAngleDeg = 0;
    const cameraRadius = 6;
    const cameraHeight = 3;
    function updateCameraPosition() {
      const rad = THREE.MathUtils.degToRad(cameraAngleDeg);
      camera.position.set(Math.sin(rad) * cameraRadius, cameraHeight, Math.cos(rad) * cameraRadius);
      camera.lookAt(0, 0, 0);
    }
    updateCameraPosition();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    const platformGeometry = new THREE.CylinderGeometry(3, 3, 0.2, 64);
    const platformMaterial = new THREE.MeshStandardMaterial({
      color: 0x3a2518,
      roughness: 0.85,
      metalness: 0.1
    });
    const platform = new THREE.Mesh(platformGeometry, platformMaterial);
    platform.position.set(0, 0, 0);
    platform.receiveShadow = true;
    platform.castShadow = true;
    scene.add(platform);

    const platformTopY = 0.1;

    const themeColors = [
      [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff],
      [0x1144aa, 0x2255bb, 0x3366cc, 0x4477dd, 0x5588ee],
      [0xff6600, 0xff7711, 0xff8822, 0xff9933, 0xffaa44]
    ];

    const shapeDefs = [
      { type: 'icosahedron', angleDeg: 0, color: 0xff4444 },
      { type: 'octahedron', angleDeg: 72, color: 0x44ff44 },
      { type: 'dodecahedron', angleDeg: 144, color: 0x4444ff },
      { type: 'tetrahedron', angleDeg: 216, color: 0xffff44 },
      { type: 'torus', angleDeg: 288, color: 0xff44ff }
    ];

    function createGeometryByType(type) {
      switch (type) {
        case 'icosahedron': return new THREE.IcosahedronGeometry(0.3, 0);
        case 'octahedron': return new THREE.OctahedronGeometry(0.3, 0);
        case 'dodecahedron': return new THREE.DodecahedronGeometry(0.3, 0);
        case 'tetrahedron': return new THREE.TetrahedronGeometry(0.3, 0);
        case 'torus': return new THREE.TorusGeometry(0.2, 0.08, 16, 48);
        default: return new THREE.BoxGeometry(0.3, 0.3, 0.3);
      }
    }

    const pedestals = [];
    const geometryMeshes = [];
    const pedestalRadius = 1.8;
    const pedestalHeight = 0.4;
    const pedestalTopY = platformTopY + pedestalHeight;

    for (let i = 0; i < shapeDefs.length; i++) {
      const def = shapeDefs[i];
      const angle = THREE.MathUtils.degToRad(def.angleDeg);
      const baseX = Math.sin(angle) * pedestalRadius;
      const baseZ = Math.cos(angle) * pedestalRadius;

      const pedestalGroup = new THREE.Group();
      pedestalGroup.position.set(baseX, 0, baseZ);
      scene.add(pedestalGroup);

      const pedestalMesh = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, pedestalHeight, 24),
        new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.7, metalness: 0.2 })
      );
      pedestalMesh.position.y = platformTopY + pedestalHeight / 2;
      pedestalMesh.castShadow = true;
      pedestalMesh.receiveShadow = true;
      pedestalGroup.add(pedestalMesh);

      const geomMesh = new THREE.Mesh(
        createGeometryByType(def.type),
        new THREE.MeshStandardMaterial({
          color: def.color,
          roughness: 0.45,
          metalness: 0.25,
          emissive: 0x000000,
          emissiveIntensity: 0
        })
      );
      geomMesh.position.y = pedestalTopY + 0.15;
      geomMesh.castShadow = true;
      geomMesh.receiveShadow = true;
      pedestalGroup.add(geomMesh);

      pedestals.push({
        group: pedestalGroup,
        baseX,
        baseZ,
        angle
      });
      geometryMeshes.push(geomMesh);
    }

    let fishModel = null;
    let fishModelLoaded = false;
    let fishVisible = true;
    let fishJumping = false;
    let jumpStartTime = 0;
    const jumpDuration = 0.6;
    const loader = new GLTFLoader();

    loader.load(
      'BarramundiFish.glb',
      (gltf) => {
        fishModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(fishModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetLength = 1.5;
        const scale = targetLength / maxDim;
        fishModel.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(fishModel);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        fishModel.position.sub(center);

        fishModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(fishModel);
        fishModelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load BarramundiFish.glb:', err);
      }
    );

    const hud = document.getElementById('hud');

    let morphMode = 0;
    const morphModeNames = ['idle', 'pulse', 'spin'];
    let themeIndex = 0;
    let selectedGeometry = -1;

    function applyTheme() {
      const colors = themeColors[themeIndex];
      geometryMeshes.forEach((mesh, i) => {
        mesh.material.color.setHex(colors[i]);
      });
    }

    function updateSelectionHighlight() {
      geometryMeshes.forEach((mesh, i) => {
        if (selectedGeometry === i && mesh.visible) {
          mesh.material.emissive.setHex(0xffffff);
          mesh.material.emissiveIntensity = 0.3;
        } else {
          mesh.material.emissive.setHex(0x000000);
          mesh.material.emissiveIntensity = 0;
        }
      });
    }

    applyTheme();
    updateSelectionHighlight();

    function getHiddenCount() {
      return geometryMeshes.filter(m => !m.visible).length;
    }

    window.__3D_STATE__ = {
      morphMode: 0,
      morphModeName: 'idle',
      themeIndex: 0,
      selectedGeometry: -1,
      fishVisible: true,
      fishJumping: false,
      fishPositionX: 0,
      fishPositionY: 0,
      fishPositionZ: 0,
      hiddenCount: 0,
      cameraAngleDeg: cameraAngleDeg,
      geometryScales: [1, 1, 1, 1, 1],
      geometryVisible: [true, true, true, true, true],
      platformExists: true,
      elapsedTime: 0,
      geometryColors: themeColors[0].slice(),
      fishModelLoaded: false
    };

    window.addEventListener('keydown', (e) => {
      const key = e.key;

      if (key === 'm' || key === 'M') {
        morphMode = (morphMode + 1) % 3;
      } else if (key === 'c' || key === 'C') {
        themeIndex = (themeIndex + 1) % 3;
        applyTheme();
        updateSelectionHighlight();
      } else if (key === 'f' || key === 'F') {
        fishVisible = !fishVisible;
        if (fishModel) fishModel.visible = fishVisible;
      } else if (key === 'j' || key === 'J') {
        if (!fishJumping) {
          fishJumping = true;
          jumpStartTime = performance.now() * 0.001;
        }
      } else if (key >= '1' && key <= '5') {
        const idx = parseInt(key, 10) - 1;
        selectedGeometry = (selectedGeometry === idx) ? -1 : idx;
        updateSelectionHighlight();
      } else if (key === 'Delete' || key === 'Backspace') {
        if (selectedGeometry >= 0 && selectedGeometry < geometryMeshes.length) {
          geometryMeshes[selectedGeometry].visible = false;
          if (selectedGeometry !== -1) {
            updateSelectionHighlight();
          }
        }
      } else if (key === 'r' || key === 'R') {
        geometryMeshes.forEach(mesh => mesh.visible = true);
        updateSelectionHighlight();
      } else if (key === 'ArrowLeft') {
        cameraAngleDeg -= 15;
        updateCameraPosition();
      } else if (key === 'ArrowRight') {
        cameraAngleDeg += 15;
        updateCameraPosition();
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      geometryMeshes.forEach((mesh, i) => {
        const baseY = pedestalTopY + 0.15;
        const pedestal = pedestals[i];

        mesh.position.x = 0;
        mesh.position.z = 0;
        mesh.position.y = baseY;
        mesh.scale.setScalar(1);

        if (morphMode === 0) {
          mesh.position.y = baseY + Math.sin(elapsed * Math.PI) * 0.1;
        } else if (morphMode === 1) {
          const s = 1.1 + Math.sin(elapsed * (Math.PI * 2 / 1.5)) * 0.3;
          mesh.scale.setScalar(s);
        } else if (morphMode === 2) {
          mesh.rotation.y += 2 * clock.getDelta();
        }
      });

      if (morphMode === 2) {
        const orbitPhase = elapsed * (Math.PI * 2 / 3);
        geometryMeshes.forEach((mesh, i) => {
          mesh.position.x = Math.cos(orbitPhase + i * 0.7) * 0.1;
          mesh.position.z = Math.sin(orbitPhase + i * 0.7) * 0.1;
        });
      }

      if (fishModelLoaded && fishModel) {
        const fishT = elapsed * (Math.PI * 2 / 8);
        const fishRadius = 1.0;
        const baseX = Math.cos(fishT) * fishRadius;
        const baseZ = Math.sin(fishT) * fishRadius;
        const baseY = 1.5;

        let jumpOffset = 0;
        if (fishJumping) {
          const t = elapsed - jumpStartTime;
          if (t >= jumpDuration) {
            fishJumping = false;
            jumpOffset = 0;
          } else if (t <= 0.3) {
            jumpOffset = (t / 0.3) * 1.0;
          } else {
            jumpOffset = (1 - ((t - 0.3) / 0.3)) * 1.0;
          }
        }

        fishModel.position.set(baseX, baseY + jumpOffset, baseZ);

        const tangent = new THREE.Vector3(-Math.sin(fishT), 0, Math.cos(fishT)).normalize();
        fishModel.rotation.y = Math.atan2(tangent.x, tangent.z);

        fishModel.visible = fishVisible;
      }

      updateCameraPosition();

      const scales = geometryMeshes.map(m => m.scale.x);
      const visibility = geometryMeshes.map(m => m.visible);
      const colors = geometryMeshes.map(m => m.material.color.getHex());

      let fishX = 0, fishY = 0, fishZ = 0;
      if (fishModel) {
        const wp = new THREE.Vector3();
        fishModel.getWorldPosition(wp);
        fishX = wp.x;
        fishY = wp.y;
        fishZ = wp.z;
      }

      window.__3D_STATE__.morphMode = morphMode;
      window.__3D_STATE__.morphModeName = morphModeNames[morphMode];
      window.__3D_STATE__.themeIndex = themeIndex;
      window.__3D_STATE__.selectedGeometry = selectedGeometry;
      window.__3D_STATE__.fishVisible = fishVisible;
      window.__3D_STATE__.fishJumping = fishJumping;
      window.__3D_STATE__.fishPositionX = fishX;
      window.__3D_STATE__.fishPositionY = fishY;
      window.__3D_STATE__.fishPositionZ = fishZ;
      window.__3D_STATE__.hiddenCount = getHiddenCount();
      window.__3D_STATE__.cameraAngleDeg = cameraAngleDeg;
      window.__3D_STATE__.geometryScales = scales;
      window.__3D_STATE__.geometryVisible = visibility;
      window.__3D_STATE__.platformExists = !!platform;
      window.__3D_STATE__.elapsedTime = elapsed;
      window.__3D_STATE__.geometryColors = colors;
      window.__3D_STATE__.fishModelLoaded = fishModelLoaded;

      hud.textContent =
`Morph Mode: ${morphModeNames[morphMode]}
Theme Index: ${themeIndex}
Selected Geometry: ${selectedGeometry}
Fish Visible: ${fishVisible}
Hidden Geometries: ${getHiddenCount()}
Camera Angle: ${cameraAngleDeg.toFixed(1)}°`;

      renderer.render(scene, camera);
    }

    // Use a stable delta once per frame
    let lastTime = performance.now() * 0.001;
    function stableAnimate() {
      requestAnimationFrame(stableAnimate);

      const now = performance.now() * 0.001;
      const delta = now - lastTime;
      lastTime = now;
      const elapsed = clock.getElapsedTime();

      geometryMeshes.forEach((mesh) => {
        const baseY = pedestalTopY + 0.15;
        mesh.position.x = 0;
        mesh.position.z = 0;
        mesh.position.y = baseY;
        mesh.scale.setScalar(1);

        if (morphMode === 0) {
          mesh.position.y = baseY + Math.sin(elapsed * (Math.PI * 2 / 2.0)) * 0.1;
        } else if (morphMode === 1) {
          const s = 1.1 + Math.sin(elapsed * (Math.PI * 2 / 1.5)) * 0.3;
          mesh.scale.setScalar(s);
        } else if (morphMode === 2) {
          mesh.rotation.y += 2 * delta;
        }
      });

      if (morphMode === 2) {
        const orbitPhase = elapsed * (Math.PI * 2 / 3.0);
        geometryMeshes.forEach((mesh, i) => {
          mesh.position.x = Math.cos(orbitPhase + i * 0.7) * 0.1;
          mesh.position.z = Math.sin(orbitPhase + i * 0.7) * 0.1;
        });
      }

      if (fishModelLoaded && fishModel) {
        const fishT = elapsed * (Math.PI * 2 / 8.0);
        const fishRadius = 1.0;
        const baseX = Math.cos(fishT) * fishRadius;
        const baseZ = Math.sin(fishT) * fishRadius;
        const baseY = 1.5;

        let jumpOffset = 0;
        if (fishJumping) {
          const t = elapsed - jumpStartTime;
          if (t >= 0.6) {
            fishJumping = false;
          } else if (t < 0.3) {
            jumpOffset = (t / 0.3) * 1.0;
          } else {
            jumpOffset = (1.0 - (t - 0.3) / 0.3) * 1.0;
          }
        }

        fishModel.position.set(baseX, baseY + jumpOffset, baseZ);

        const tangent = new THREE.Vector3(-Math.sin(fishT), 0, Math.cos(fishT)).normalize();
        fishModel.rotation.y = Math.atan2(tangent.x, tangent.z);
        fishModel.visible = fishVisible;
      }

      updateCameraPosition();

      const scales = geometryMeshes.map(m => m.scale.x);
      const visibility = geometryMeshes.map(m => m.visible);
      const colors = geometryMeshes.map(m => m.material.color.getHex());

      let fishX = 0, fishY = 0, fishZ = 0;
      if (fishModel) {
        const wp = new THREE.Vector3();
        fishModel.getWorldPosition(wp);
        fishX = wp.x;
        fishY = wp.y;
        fishZ = wp.z;
      }

      window.__3D_STATE__ = {
        morphMode,
        morphModeName: morphModeNames[morphMode],
        themeIndex,
        selectedGeometry,
        fishVisible,
        fishJumping,
        fishPositionX: fishX,
        fishPositionY: fishY,
        fishPositionZ: fishZ,
        hiddenCount: getHiddenCount(),
        cameraAngleDeg,
        geometryScales: scales,
        geometryVisible: visibility,
        platformExists: !!platform,
        elapsedTime: elapsed,
        geometryColors: colors,
        fishModelLoaded
      };

      hud.textContent =
`Morph Mode: ${morphModeNames[morphMode]}
Theme Index: ${themeIndex}
Selected Geometry: ${selectedGeometry}
Fish Visible: ${fishVisible}
Hidden Geometries: ${getHiddenCount()}
Camera Angle: ${cameraAngleDeg.toFixed(1)}°`;

      renderer.render(scene, camera);
    }

    stableAnimate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
