<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Golf Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}

#stroke-counter {
  position: absolute;
  top: 15px; left: 15px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

#par-label {
  position: absolute;
  top: 15px; right: 15px;
  color: white;
  font-size: 20px;
  font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

#reset-btn {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: all;
  background: rgba(255,255,255,0.9);
  border: 2px solid #555;
  border-radius: 5px;
  padding: 6px 16px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  color: #333;
}
#reset-btn:hover { background: #fff; }

#power-bar-container {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 20px;
  border: 2px solid white;
  border-radius: 4px;
  background: rgba(0,0,0,0.5);
  overflow: hidden;
}

#power-bar-fill {
  width: 0%;
  height: 100%;
  transition: none;
  border-radius: 2px;
}

#power-label {
  position: absolute;
  bottom: 55px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 14px;
  font-weight: bold;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

#aim-label {
  position: absolute;
  bottom: 75px;
  left: 50%;
  transform: translateX(-50%);
  color: #ccc;
  font-size: 12px;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

#success-overlay {
  display: none;
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  pointer-events: all;
}

#success-overlay.show {
  display: flex;
}

#success-text {
  color: #FFD700;
  font-size: 48px;
  font-weight: bold;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
  margin-bottom: 20px;
}

#play-again-btn {
  background: #FFD700;
  border: none;
  border-radius: 8px;
  padding: 12px 32px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  color: #333;
}
#play-again-btn:hover { background: #ffec80; }

#instructions {
  position: absolute;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.7);
  font-size: 11px;
  text-align: center;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="hud">
  <div id="stroke-counter">Stroke: 0</div>
  <div id="par-label">Par: 2</div>
  <button id="reset-btn">Reset Ball</button>
  <div id="aim-label">← → to aim</div>
  <div id="instructions">Arrow Keys: Aim | Hold Space: Power | Release: Shoot</div>
  <div id="power-label">Power: 0%</div>
  <div id="power-bar-container">
    <div id="power-bar-fill"></div>
  </div>
  <div id="success-overlay">
    <div id="success-text">Hole in 1!</div>
    <button id="play-again-btn">Play Again</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  ballPosition: { x: 0, y: 0.15, z: 4.5 },
  ballSpeed: 0,
  ballMoving: false,
  aimAngle: 0,
  power: 0,
  strokeCount: 0,
  holeSunk: false,
  lanternLoaded: false,
  gamePhase: 'aiming'
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Fairway
const fairwayGeo = new THREE.PlaneGeometry(4, 12);
const fairwayMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e });
const fairway = new THREE.Mesh(fairwayGeo, fairwayMat);
fairway.rotation.x = -Math.PI / 2;
fairway.position.y = 0;
fairway.receiveShadow = true;
scene.add(fairway);

// Tabletop under fairway
const tableGeo = new THREE.BoxGeometry(6, 0.3, 14);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = -0.15;
table.receiveShadow = true;
table.castShadow = true;
scene.add(table);

// Borders
const borderColor = 0x8B4513;
const borderMat = new THREE.MeshStandardMaterial({ color: borderColor });

function createBorder(w, h, d, x, y, z) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mesh = new THREE.Mesh(geo, borderMat);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Left border
createBorder(0.15, 0.3, 12, -2.075, 0.15, 0);
// Right border
createBorder(0.15, 0.3, 12, 2.075, 0.15, 0);
// Far border (negative Z)
createBorder(4.3, 0.3, 0.15, 0, 0.15, -6.075);
// Near border (positive Z)
createBorder(4.3, 0.3, 0.15, 0, 0.15, 6.075);

// Border collision bounds (inner edges)
const borderLeft = -2.0 + 0.15;
const borderRight = 2.0 - 0.15;
const borderFar = -6.0 + 0.15;
const borderNear = 6.0 - 0.15;

// Hole
const holeGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 32);
const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const hole = new THREE.Mesh(holeGeo, holeMat);
hole.position.set(0, 0.01, -4.5);
scene.add(hole);

// Flag
const flagGroup = new THREE.Group();
flagGroup.position.set(0, 0, -4.5);

const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
const poleGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.5, 8);
const pole = new THREE.Mesh(poleGeo, poleMat);
pole.position.y = 0.75;
pole.castShadow = true;
flagGroup.add(pole);

const flagShape = new THREE.Shape();
flagShape.moveTo(0, 0);
flagShape.lineTo(0.5, -0.15);
flagShape.lineTo(0, -0.3);
flagShape.closePath();
const flagGeo = new THREE.ShapeGeometry(flagShape);
const flagMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
const flag = new THREE.Mesh(flagGeo, flagMat);
flag.position.set(0.02, 1.5, 0);
flag.castShadow = true;
flagGroup.add(flag);

scene.add(flagGroup);

// Obstacle bumpers
const bumperMat = new THREE.MeshStandardMaterial({ color: 0xA0522D });

const bumper1Geo = new THREE.BoxGeometry(1.5, 0.4, 0.3);
const bumper1 = new THREE.Mesh(bumper1Geo, bumperMat);
bumper1.position.set(-0.8, 0.15, -1.5);
bumper1.rotation.y = THREE.MathUtils.degToRad(20);
bumper1.castShadow = true;
bumper1.receiveShadow = true;
scene.add(bumper1);

const bumper2Geo = new THREE.BoxGeometry(1.5, 0.4, 0.3);
const bumper2 = new THREE.Mesh(bumper2Geo, bumperMat);
bumper2.position.set(1.0, 0.15, -2.8);
bumper2.rotation.y = THREE.MathUtils.degToRad(-15);
bumper2.castShadow = true;
bumper2.receiveShadow = true;
scene.add(bumper2);

const bumpers = [bumper1, bumper2];

// Golf ball
const ballGeo = new THREE.SphereGeometry(0.15, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.set(0, 0.15, 4.5);
ball.castShadow = true;
scene.add(ball);

// Aim line
const aimLineMat = new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 0.15, gapSize: 0.1, linewidth: 2 });
const aimLineGeo = new THREE.BufferGeometry();
const aimLine = new THREE.Line(aimLineGeo, aimLineMat);
scene.add(aimLine);

// Load Lantern
const loader = new GLTFLoader();
loader.load('Lantern.glb', (gltf) => {
  const lantern = gltf.scene;
  lantern.position.set(2.5, 0, 1.0);
  lantern.scale.set(0.5, 0.5, 0.5);
  lantern.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  scene.add(lantern);
  state.lanternLoaded = true;
}, undefined, (error) => {
  console.warn('Could not load Lantern.glb:', error);
  // Create a placeholder lantern
  const lanternGroup = new THREE.Group();
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const baseGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.3, 8);
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.15;
  base.castShadow = true;
  lanternGroup.add(base);

  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, transparent: true, opacity: 0.7 });
  const bodyGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.5, 8);
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.55;
  body.castShadow = true;
  lanternGroup.add(body);

  const topMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const topGeo = new THREE.ConeGeometry(0.18, 0.2, 8);
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.y = 0.9;
  top.castShadow = true;
  lanternGroup.add(top);

  lanternGroup.position.set(2.5, 0, 1.0);
  lanternGroup.scale.set(0.5, 0.5, 0.5);
  scene.add(lanternGroup);
  state.lanternLoaded = false;
});

// Game variables
let aimAngle = 0; // degrees, 0 = toward -Z
let power = 0;
let charging = false;
let chargeStartTime = 0;
let ballVelocity = new THREE.Vector3(0, 0, 0);
let strokeCount = 0;
let holeSunk = false;
let gamePhase = 'aiming'; // 'aiming', 'charging', 'rolling', 'sunk'

const TEE_POSITION = new THREE.Vector3(0, 0.15, 4.5);
const HOLE_POSITION = new THREE.Vector3(0, 0.01, -4.5);
const MAX_SPEED = 8;
const FRICTION = 0.98;
const STOP_THRESHOLD = 0.05;
const HOLE_RADIUS = 0.3;
const BALL_RADIUS = 0.15;

// UI elements
const strokeEl = document.getElementById('stroke-counter');
const powerFill = document.getElementById('power-bar-fill');
const powerLabel = document.getElementById('power-label');
const successOverlay = document.getElementById('success-overlay');
const successText = document.getElementById('success-text');
const playAgainBtn = document.getElementById('play-again-btn');
const resetBtn = document.getElementById('reset-btn');
const aimLabel = document.getElementById('aim-label');

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'ArrowLeft' && gamePhase === 'aiming') {
    aimAngle -= 5;
  }
  if (e.code === 'ArrowRight' && gamePhase === 'aiming') {
    aimAngle += 5;
  }
  if (e.code === 'Space' && gamePhase === 'aiming') {
    e.preventDefault();
    gamePhase = 'charging';
    charging = true;
    chargeStartTime = performance.now();
    power = 0;
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.code] = false;

  if (e.code === 'Space' && gamePhase === 'charging') {
    e.preventDefault();
    // Fire!
    charging = false;
    gamePhase = 'rolling';
    strokeCount++;
    strokeEl.textContent = `Stroke: ${strokeCount}`;

    const angleRad = THREE.MathUtils.degToRad(aimAngle);
    const speed = (power / 100) * MAX_SPEED;
    ballVelocity.set(
      Math.sin(angleRad) * speed * -1,
      0,
      Math.cos(angleRad) * speed * -1
    );
    // Aim toward -Z when angle=0, so direction is -Z
    // Actually let's reconsider: angle 0 = toward -Z (toward hole)
    // sin(0)=0, cos(0)=1, so velocity = (0, 0, -1*speed) ✓

    power = 0;
  }
});

// Reset button
resetBtn.addEventListener('click', () => {
  if (gamePhase === 'sunk') return;
  ball.position.copy(TEE_POSITION);
  ballVelocity.set(0, 0, 0);
  gamePhase = 'aiming';
  power = 0;
  charging = false;
  aimAngle = 0;
});

// Play again
playAgainBtn.addEventListener('click', () => {
  ball.position.copy(TEE_POSITION);
  ballVelocity.set(0, 0, 0);
  strokeCount = 0;
  holeSunk = false;
  gamePhase = 'aiming';
  power = 0;
  charging = false;
  aimAngle = 0;
  strokeEl.textContent = 'Stroke: 0';
  successOverlay.classList.remove('show');
});

// Update aim line
function updateAimLine() {
  if (gamePhase === 'aiming' || gamePhase === 'charging') {
    const angleRad = THREE.MathUtils.degToRad(aimAngle);
    const dir = new THREE.Vector3(-Math.sin(angleRad), 0, -Math.cos(angleRad));
    const start = ball.position.clone();
    start.y = 0.05;
    const end = start.clone().add(dir.multiplyScalar(3));

    const points = [start, end];
    aimLineGeo.setFromPoints(points);
    aimLine.computeLineDistances();
    aimLine.visible = true;
  } else {
    aimLine.visible = false;
  }
}

// OBB collision for bumpers
function checkBumperCollision(ballPos, bumper) {
  // Transform ball position into bumper's local space
  const localPos = bumper.worldToLocal(ballPos.clone());
  // Bumper half-sizes
  const hx = 0.75; // 1.5/2
  const hz = 0.15; // 0.3/2

  // Find closest point on bumper box to ball (in local space, XZ only)
  const closestX = Math.max(-hx, Math.min(hx, localPos.x));
  const closestZ = Math.max(-hz, Math.min(hz, localPos.z));

  const dx = localPos.x - closestX;
  const dz = localPos.z - closestZ;
  const dist = Math.sqrt(dx * dx + dz * dz);

  if (dist < BALL_RADIUS) {
    // Collision! Compute normal in local space
    let normalLocal;
    if (dist === 0) {
      // Ball center is inside bumper
      normalLocal = new THREE.Vector3(0, 0, localPos.z > 0 ? 1 : -1);
    } else {
      normalLocal = new THREE.Vector3(dx / dist, 0, dz / dist);
    }

    // Transform normal to world space
    const normalWorld = normalLocal.clone().applyQuaternion(bumper.quaternion).normalize();

    // Reflect velocity
    const dot = ballVelocity.dot(normalWorld);
    if (dot < 0) {
      ballVelocity.sub(normalWorld.multiplyScalar(2 * dot));
      ballVelocity.multiplyScalar(0.85); // energy loss

      // Push ball out
      const overlap = BALL_RADIUS - dist;
      const pushDir = normalLocal.clone().normalize();
      const pushWorld = pushDir.applyQuaternion(bumper.quaternion);
      ball.position.add(pushWorld.multiplyScalar(overlap + 0.01));
    }
    return true;
  }
  return false;
}

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  // Charging
  if (gamePhase === 'charging' && charging) {
    const elapsed = (performance.now() - chargeStartTime) / 1000;
    power = Math.min(100, (elapsed / 2) * 100);
  }

  // Ball physics
  if (gamePhase === 'rolling') {
    // Move ball
    ball.position.add(ballVelocity.clone().multiplyScalar(delta));
    ball.position.y = 0.15;

    // Friction
    ballVelocity.multiplyScalar(Math.pow(FRICTION, delta * 60));

    // Border collisions
    if (ball.position.x - BALL_RADIUS < -2.0) {
      ball.position.x = -2.0 + BALL_RADIUS;
      ballVelocity.x = Math.abs(ballVelocity.x) * 0.8;
    }
    if (ball.position.x + BALL_RADIUS > 2.0) {
      ball.position.x = 2.0 - BALL_RADIUS;
      ballVelocity.x = -Math.abs(ballVelocity.x) * 0.8;
    }
    if (ball.position.z - BALL_RADIUS < -6.0) {
      ball.position.z = -6.0 + BALL_RADIUS;
      ballVelocity.z = Math.abs(ballVelocity.z) * 0.8;
    }
    if (ball.position.z + BALL_RADIUS > 6.0) {
      ball.position.z = 6.0 - BALL_RADIUS;
      ballVelocity.z = -Math.abs(ballVelocity.z) * 0.8;
    }

    // Bumper collisions
    for (const bumper of bumpers) {
      checkBumperCollision(ball.position, bumper);
    }

    // Speed check
    const speed = ballVelocity.length();

    // Hole detection
    const distToHole = new THREE.Vector2(
      ball.position.x - HOLE_POSITION.x,
      ball.position.z - HOLE_POSITION.z
    ).length();

    if (distToHole < HOLE_RADIUS && speed < 1.0) {
      // Sunk!
      holeSunk = true;
      gamePhase = 'sunk';
      ballVelocity.set(0, 0, 0);
      ball.position.set(HOLE_POSITION.x, 0.05, HOLE_POSITION.z);

      successText.textContent = `Hole in ${strokeCount}!`;
      successOverlay.classList.add('show');
    }

    if (speed < STOP_THRESHOLD && gamePhase === 'rolling') {
      ballVelocity.set(0, 0, 0);
      gamePhase = 'aiming';
    }
  }

  // Rotate ball visually when moving
  if (gamePhase === 'rolling') {
    const speed = ballVelocity.length();
    if (speed > 0.01) {
      const axis = new THREE.Vector3(-ballVelocity.z, 0, ballVelocity.x).normalize();
      const rotAmount = speed * delta / BALL_RADIUS;
      ball.rotateOnWorldAxis(axis, rotAmount);
    }
  }

  // Flag wave animation
  const time = performance.now() * 0.003;
  flag.rotation.y = Math.sin(time) * 0.1;

  // Update aim line
  updateAimLine();

  // Update UI
  const powerPercent = Math.round(power);
  powerFill.style.width = `${powerPercent}%`;

  // Power bar color gradient: green to yellow to red
  const r = Math.min(255, Math.round(powerPercent * 2.55));
  const g = Math.min(255, Math.round((100 - powerPercent) * 2.55));
  powerFill.style.background = `rgb(${r}, ${g}, 0)`;

  powerLabel.textContent = `Power: ${powerPercent}%`;
  aimLabel.textContent = `Aim: ${aimAngle}°`;

  // Update state
  state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
  state.ballSpeed = ballVelocity.length();
  state.ballMoving = gamePhase === 'rolling';
  state.aimAngle = aimAngle;
  state.power = power;
  state.strokeCount = strokeCount;
  state.holeSunk = holeSunk;
  state.gamePhase = gamePhase;

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
