<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Golf Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            background-color: #87CEEB;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            pointer-events: none;
        }
        .hud-text {
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 8px;
        }
        #reset-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            padding: 8px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #ff8c00;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #reset-btn:hover {
            background-color: #ff6500;
        }
        .hud-bottom {
            display: flex;
            justify-content: center;
            padding-bottom: 30px;
        }
        #power-container {
            width: 200px;
            height: 20px;
            border: 3px solid white;
            border-radius: 10px;
            background: rgba(0,0,0,0.6);
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #power-bar {
            width: 0%;
            height: 100%;
            background: #00ff00;
        }
        #win-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #win-message {
            font-size: 64px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
            margin-bottom: 30px;
        }
        #play-again-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #2d8a4e;
            border: 3px solid white;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
            transition: transform 0.1s, background-color 0.2s;
        }
        #play-again-btn:hover {
            background-color: #1e6b38;
            transform: scale(1.05);
        }
        #play-again-btn:active {
            transform: scale(0.95);
        }
        #controls-hint {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            opacity: 0.8;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div class="hud-top">
            <div id="stroke-counter" class="hud-text">Stroke: 0</div>
            <button id="reset-btn">Reset Ball</button>
            <div id="par-label" class="hud-text">Par: 2</div>
        </div>
        <div id="controls-hint">Left/Right Arrows to Aim | Hold Space to Power | Release to Shoot</div>
        <div class="hud-bottom">
            <div id="power-container">
                <div id="power-bar"></div>
            </div>
        </div>
    </div>

    <div id="win-overlay">
        <div id="win-message">Hole in 1!</div>
        <button id="play-again-btn">Play Again</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ballPosition: { x: 0, y: 0.15, z: 4.5 },
            ballSpeed: 0,
            ballMoving: false,
            aimAngle: 0,
            power: 0,
            strokeCount: 0,
            holeSunk: false,
            lanternLoaded: false,
            gamePhase: 'aiming' // aiming, charging, rolling, sunk
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#87CEEB');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -8;
        dirLight.shadow.camera.right = 8;
        dirLight.shadow.camera.top = 8;
        dirLight.shadow.camera.bottom = -8;
        scene.add(dirLight);

        // --- Golf Course ---
        const colliders = [];

        // Fairway
        const fairwayGeo = new THREE.PlaneGeometry(4, 12);
        const fairwayMat = new THREE.MeshStandardMaterial({ color: 0x2d8a4e, roughness: 0.8 });
        const fairway = new THREE.Mesh(fairwayGeo, fairwayMat);
        fairway.rotation.x = -Math.PI / 2;
        fairway.receiveShadow = true;
        scene.add(fairway);

        // Borders
        const borderMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
        const borderData = [
            { pos: [0, 0.15, -6.15], size: [4.6, 0.3, 0.3] }, // Top
            { pos: [0, 0.15, 6.15], size: [4.6, 0.3, 0.3] },  // Bottom
            { pos: [-2.15, 0.15, 0], size: [0.3, 0.3, 12] },  // Left
            { pos: [2.15, 0.15, 0], size: [0.3, 0.3, 12] }    // Right
        ];

        borderData.forEach(data => {
            const geo = new THREE.BoxGeometry(data.size[0], data.size[1], data.size[2]);
            const mesh = new THREE.Mesh(geo, borderMat);
            mesh.position.set(data.pos[0], data.pos[1], data.pos[2]);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            colliders.push(mesh);
        });

        // Hole
        const holePos = new THREE.Vector3(0, 0.01, -4.5);
        const holeGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 32);
        const holeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const hole = new THREE.Mesh(holeGeo, holeMat);
        hole.position.copy(holePos);
        scene.add(hole);

        // Flag
        const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
        const pole = new THREE.Mesh(poleGeo, poleMat);
        pole.position.set(holePos.x, 0.75, holePos.z);
        pole.castShadow = true;
        scene.add(pole);

        const flagShape = new THREE.Shape();
        flagShape.moveTo(0, 0);
        flagShape.lineTo(0.5, 0.25);
        flagShape.lineTo(0, 0.5);
        flagShape.lineTo(0, 0);
        const flagGeo = new THREE.ShapeGeometry(flagShape);
        const flagMat = new THREE.MeshStandardMaterial({ color: 0xff0000, side: THREE.DoubleSide });
        const flag = new THREE.Mesh(flagGeo, flagMat);
        flag.position.set(holePos.x, 1.0, holePos.z);
        flag.castShadow = true;
        scene.add(flag);

        // Obstacles
        const obsMat = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.7 });
        const obsData = [
            { pos: [-0.8, 0.15, -1.5], rot: 20 * Math.PI / 180, size: [1.5, 0.4, 0.3] },
            { pos: [1.0, 0.15, -2.8], rot: -15 * Math.PI / 180, size: [1.5, 0.4, 0.3] }
        ];

        obsData.forEach(data => {
            const geo = new THREE.BoxGeometry(data.size[0], data.size[1], data.size[2]);
            const mesh = new THREE.Mesh(geo, obsMat);
            mesh.position.set(data.pos[0], data.pos[1], data.pos[2]);
            mesh.rotation.y = data.rot;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            colliders.push(mesh);
        });

        // --- 3D Asset (Lantern) ---
        const loader = new GLTFLoader();
        loader.load('Lantern.glb', (gltf) => {
            const lantern = gltf.scene;
            lantern.position.set(2.5, 0, 1.0);
            lantern.scale.set(0.5, 0.5, 0.5);
            lantern.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(lantern);
            window.__3D_STATE__.lanternLoaded = true;
        }, undefined, (error) => {
            console.warn('Lantern.glb could not be loaded. Ensure the file exists in the same directory.', error);
        });

        // --- Golf Ball ---
        const ballRadius = 0.15;
        const teePos = new THREE.Vector3(0, ballRadius, 4.5);
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.2, metalness: 0.1 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.copy(teePos);
        ball.castShadow = true;
        scene.add(ball);

        let velocity = new THREE.Vector3(0, 0, 0);

        // --- Aim Line ---
        const aimLineMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.2, gapSize: 0.1, linewidth: 2 });
        const aimLineGeo = new THREE.BufferGeometry();
        const aimLinePositions = new Float32Array(6);
        aimLineGeo.setAttribute('position', new THREE.BufferAttribute(aimLinePositions, 3));
        const aimLine = new THREE.Line(aimLineGeo, aimLineMat);
        scene.add(aimLine);

        // --- Input Handling ---
        const keys = { ArrowLeft: false, ArrowRight: false, Space: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') {
                if (window.__3D_STATE__.gamePhase === 'aiming') window.__3D_STATE__.aimAngle -= 5;
            }
            if (e.code === 'ArrowRight') {
                if (window.__3D_STATE__.gamePhase === 'aiming') window.__3D_STATE__.aimAngle += 5;
            }
            if (e.code === 'Space' && !e.repeat) {
                if (window.__3D_STATE__.gamePhase === 'aiming') {
                    window.__3D_STATE__.gamePhase = 'charging';
                    window.__3D_STATE__.power = 0;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                if (window.__3D_STATE__.gamePhase === 'charging') {
                    shoot();
                }
            }
        });

        // --- UI Elements ---
        const strokeCounterEl = document.getElementById('stroke-counter');
        const powerBarEl = document.getElementById('power-bar');
        const winOverlayEl = document.getElementById('win-overlay');
        const winMessageEl = document.getElementById('win-message');
        
        document.getElementById('reset-btn').addEventListener('click', resetBall);
        document.getElementById('play-again-btn').addEventListener('click', resetGame);

        // --- Game Logic ---
        function shoot() {
            window.__3D_STATE__.gamePhase = 'rolling';
            window.__3D_STATE__.strokeCount++;
            strokeCounterEl.innerText = `Stroke: ${window.__3D_STATE__.strokeCount}`;

            const angleRad = window.__3D_STATE__.aimAngle * Math.PI / 180;
            const dir = new THREE.Vector3(Math.sin(angleRad), 0, -Math.cos(angleRad)).normalize();

            // Max speed ~8 units/sec. Assuming ~60fps, max velocity per frame is 8/60 = 0.133
            const maxVelPerFrame = 8 / 60;
            const speed = (window.__3D_STATE__.power / 100) * maxVelPerFrame;
            velocity.copy(dir).multiplyScalar(speed);
        }

        function resetBall() {
            ball.position.copy(teePos);
            velocity.set(0, 0, 0);
            window.__3D_STATE__.gamePhase = 'aiming';
            window.__3D_STATE__.power = 0;
            window.__3D_STATE__.aimAngle = 0;
            window.__3D_STATE__.holeSunk = false;
            updatePowerBarUI();
        }

        function resetGame() {
            resetBall();
            window.__3D_STATE__.strokeCount = 0;
            strokeCounterEl.innerText = `Stroke: 0`;
            winOverlayEl.style.display = 'none';
        }

        function updatePowerBarUI() {
            const p = window.__3D_STATE__.power;
            powerBarEl.style.width = `${p}%`;
            const r = Math.floor((p / 100) * 255);
            const g = Math.floor((1 - p / 100) * 255);
            powerBarEl.style.background = `rgb(${r}, ${g}, 0)`;
        }

        function handleCollisions() {
            const nextPos = ball.position.clone().add(velocity);
            
            for (let mesh of colliders) {
                mesh.updateMatrixWorld();
                // Transform ball position to mesh's local space
                const localPos = mesh.worldToLocal(nextPos.clone());
                mesh.geometry.computeBoundingBox();
                const box = mesh.geometry.boundingBox;

                // Find closest point on the AABB in local space
                const closest = new THREE.Vector3().copy(localPos).clamp(box.min, box.max);
                const distance = localPos.distanceTo(closest);

                if (distance < ballRadius) {
                    // Collision detected
                    let localNormal = localPos.clone().sub(closest).normalize();
                    
                    // If center of ball is inside the box, push out along shortest axis
                    if (localNormal.lengthSq() === 0) {
                        const distToMinX = Math.abs(localPos.x - box.min.x);
                        const distToMaxX = Math.abs(localPos.x - box.max.x);
                        const distToMinZ = Math.abs(localPos.z - box.min.z);
                        const distToMaxZ = Math.abs(localPos.z - box.max.z);
                        const min = Math.min(distToMinX, distToMaxX, distToMinZ, distToMaxZ);
                        if (min === distToMinX) localNormal.set(-1, 0, 0);
                        else if (min === distToMaxX) localNormal.set(1, 0, 0);
                        else if (min === distToMinZ) localNormal.set(0, 0, -1);
                        else localNormal.set(0, 0, 1);
                    }

                    // Transform normal back to world space
                    const worldNormal = localNormal.transformDirection(mesh.matrixWorld).normalize();
                    worldNormal.y = 0; // Keep it strictly horizontal
                    worldNormal.normalize();

                    // Reflect velocity
                    const dot = velocity.dot(worldNormal);
                    if (dot < 0) {
                        velocity.sub(worldNormal.multiplyScalar(2 * dot));
                        velocity.multiplyScalar(0.9); // Slight energy loss on bounce
                    }

                    // Positional correction to prevent sinking into geometry
                    const penetration = ballRadius - distance;
                    ball.position.add(worldNormal.multiplyScalar(penetration));
                    nextPos.copy(ball.position); // Update for subsequent checks
                }
            }
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            const state = window.__3D_STATE__;

            if (state.gamePhase === 'charging') {
                // 0 to 100 over 2 seconds -> 50 units per second
                state.power += 50 * delta;
                if (state.power > 100) state.power = 100;
                updatePowerBarUI();
            }

            if (state.gamePhase === 'rolling') {
                ball.position.add(velocity);
                ball.position.y = ballRadius; // Force stay on fairway

                handleCollisions();

                // Friction: 0.98 multiplier per frame (approximate fixed timestep logic)
                velocity.multiplyScalar(0.98);

                const speedUnitsPerSec = velocity.length() * 60;

                // Hole Detection
                const distToHole = ball.position.distanceTo(new THREE.Vector3(holePos.x, ballRadius, holePos.z));
                if (distToHole < 0.3 && speedUnitsPerSec < 1.0) {
                    state.gamePhase = 'sunk';
                    state.holeSunk = true;
                    velocity.set(0, 0, 0);
                    ball.position.set(holePos.x, 0.05, holePos.z); // Drop in hole
                    
                    winMessageEl.innerText = `Hole in ${state.strokeCount}!`;
                    winOverlayEl.style.display = 'flex';
                }

                // Stop condition
                if (speedUnitsPerSec < 0.05 && state.gamePhase !== 'sunk') {
                    velocity.set(0, 0, 0);
                    state.gamePhase = 'aiming';
                    state.power = 0;
                    updatePowerBarUI();
                }
            }

            // Update Aim Line
            if (state.gamePhase === 'aiming' || state.gamePhase === 'charging') {
                aimLine.visible = true;
                const angleRad = state.aimAngle * Math.PI / 180;
                const dir = new THREE.Vector3(Math.sin(angleRad), 0, -Math.cos(angleRad)).normalize();
                const endPoint = ball.position.clone().add(dir.multiplyScalar(3));
                
                const positions = aimLine.geometry.attributes.position.array;
                positions[0] = ball.position.x; positions[1] = ball.position.y; positions[2] = ball.position.z;
                positions[3] = endPoint.x; positions[4] = endPoint.y; positions[5] = endPoint.z;
                aimLine.geometry.attributes.position.needsUpdate = true;
                aimLine.computeLineDistances();
            } else {
                aimLine.visible = false;
            }

            // Update State Object
            state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
            state.ballSpeed = velocity.length() * 60;
            state.ballMoving = velocity.length() > 0;

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
