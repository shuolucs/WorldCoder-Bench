<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mini Golf Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      font-weight: bold;
    }

    #stroke {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 22px;
    }

    #par {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 22px;
    }

    #resetBall {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.9);
      color: #222;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    #powerContainer {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      text-align: center;
      pointer-events: none;
    }

    #powerLabel {
      margin-bottom: 8px;
      font-size: 16px;
    }

    #powerBar {
      width: 200px;
      height: 20px;
      border: 2px solid white;
      background: rgba(0,0,0,0.2);
      box-sizing: border-box;
    }

    #powerFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00cc66, #ffcc00, #ff3333);
    }

    #overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      pointer-events: auto;
    }

    #overlayContent {
      background: rgba(255,255,255,0.95);
      color: #222;
      padding: 28px 36px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      min-width: 260px;
    }

    #message {
      font-size: 32px;
      margin-bottom: 18px;
      font-weight: bold;
    }

    #playAgain {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2d8a4e;
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    #instructions {
      position: absolute;
      left: 16px;
      bottom: 16px;
      max-width: 320px;
      color: white;
      font-size: 14px;
      line-height: 1.4;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div id="stroke">Stroke: 0</div>
    <div id="par">Par: 2</div>
    <button id="resetBall">Reset Ball</button>

    <div id="powerContainer">
      <div id="powerLabel">Power</div>
      <div id="powerBar">
        <div id="powerFill"></div>
      </div>
    </div>

    <div id="instructions">
      Left/Right: Aim<br/>
      Hold Space: Charge power<br/>
      Release Space: Shoot
    </div>
  </div>

  <div id="overlay">
    <div id="overlayContent">
      <div id="message">Hole in 0!</div>
      <button id="playAgain">Play Again</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#87CEEB');

    // Camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.left = -10;
    directionalLight.shadow.camera.right = 10;
    directionalLight.shadow.camera.top = 10;
    directionalLight.shadow.camera.bottom = -10;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 30;
    scene.add(directionalLight);

    // Ground/table base
    const tableGeo = new THREE.BoxGeometry(8, 0.8, 16);
    const tableMat = new THREE.MeshStandardMaterial({ color: 0xc8a97e });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.position.set(0, -0.45, 0);
    table.receiveShadow = true;
    table.castShadow = true;
    scene.add(table);

    // Fairway
    const fairwayWidth = 4;
    const fairwayLength = 12;
    const borderHeight = 0.3;
    const borderThickness = 0.2;
    const ballRadius = 0.15;

    const fairwayGeo = new THREE.PlaneGeometry(fairwayWidth, fairwayLength);
    const fairwayMat = new THREE.MeshStandardMaterial({ color: '#2d8a4e' });
    const fairway = new THREE.Mesh(fairwayGeo, fairwayMat);
    fairway.rotation.x = -Math.PI / 2;
    fairway.position.y = 0;
    fairway.receiveShadow = true;
    scene.add(fairway);

    // Borders
    const woodMat = new THREE.MeshStandardMaterial({ color: '#8B4513' });

    function makeBorder(w, h, d, x, y, z) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), woodMat);
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    const topBorder = makeBorder(fairwayWidth + borderThickness * 2, borderHeight, borderThickness, 0, borderHeight / 2, -fairwayLength / 2);
    const bottomBorder = makeBorder(fairwayWidth + borderThickness * 2, borderHeight, borderThickness, 0, borderHeight / 2, fairwayLength / 2);
    const leftBorder = makeBorder(borderThickness, borderHeight, fairwayLength, -fairwayWidth / 2, borderHeight / 2, 0);
    const rightBorder = makeBorder(borderThickness, borderHeight, fairwayLength, fairwayWidth / 2, borderHeight / 2, 0);

    // Hole
    const holePosition = new THREE.Vector3(0, 0.01, -4.5);
    const holeGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 24);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const hole = new THREE.Mesh(holeGeo, holeMat);
    hole.position.copy(holePosition);
    hole.receiveShadow = true;
    scene.add(hole);

    // Flag
    const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 12);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(holePosition.x, 0.75, holePosition.z);
    pole.castShadow = true;
    scene.add(pole);

    const flagShape = new THREE.Shape();
    flagShape.moveTo(0, 0);
    flagShape.lineTo(0.45, 0.15);
    flagShape.lineTo(0, 0.3);
    flagShape.lineTo(0, 0);

    const flagGeo = new THREE.ShapeGeometry(flagShape);
    const flagMat = new THREE.MeshStandardMaterial({ color: 0xff2222, side: THREE.DoubleSide });
    const flag = new THREE.Mesh(flagGeo, flagMat);
    flag.position.set(holePosition.x + 0.02, 1.35, holePosition.z);
    flag.castShadow = true;
    scene.add(flag);

    // Obstacles
    const obstacleMat = new THREE.MeshStandardMaterial({ color: '#A0522D' });
    const obstacles = [];

    function createObstacle(x, y, z, rotationDeg) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1.5, 0.4, 0.3),
        obstacleMat
      );
      mesh.position.set(x, y, z);
      mesh.rotation.y = THREE.MathUtils.degToRad(rotationDeg);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const halfSize = new THREE.Vector3(0.75, 0.2, 0.15);
      obstacles.push({ mesh, halfSize });
      return mesh;
    }

    createObstacle(-0.8, 0.15, -1.5, 20);
    createObstacle(1.0, 0.15, -2.8, -15);

    // Decorative lantern load
    let lanternLoaded = false;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'Lantern.glb',
      (gltf) => {
        const lantern = gltf.scene;
        lantern.position.set(2.5, 0, 1.0);
        lantern.scale.set(0.5, 0.5, 0.5);
        lantern.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(lantern);
        lanternLoaded = true;
      },
      undefined,
      () => {
        lanternLoaded = false;
        // fallback decorative placeholder
        const placeholder = new THREE.Mesh(
          new THREE.CylinderGeometry(0.2, 0.25, 0.8, 16),
          new THREE.MeshStandardMaterial({ color: 0x666666, emissive: 0x222200 })
        );
        placeholder.position.set(2.5, 0.4, 1.0);
        placeholder.castShadow = true;
        placeholder.receiveShadow = true;
        scene.add(placeholder);
      }
    );

    // Ball
    const teePosition = new THREE.Vector3(0, ballRadius, 4.5);
    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    ball.position.copy(teePosition);
    ball.castShadow = true;
    ball.receiveShadow = true;
    scene.add(ball);

    // Aim line
    let aimAngle = 0; // degrees, 0 = -Z
    const aimPoints = [new THREE.Vector3(), new THREE.Vector3()];
    const aimGeo = new THREE.BufferGeometry().setFromPoints(aimPoints);
    const aimMat = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.25,
      gapSize: 0.15
    });
    const aimLine = new THREE.Line(aimGeo, aimMat);
    scene.add(aimLine);

    function getAimDirection() {
      const rad = THREE.MathUtils.degToRad(aimAngle);
      return new THREE.Vector3(Math.sin(rad), 0, -Math.cos(rad)).normalize();
    }

    function updateAimLine() {
      const dir = getAimDirection();
      const start = ball.position.clone();
      start.y = ballRadius + 0.02;
      const end = start.clone().add(dir.multiplyScalar(3.0));
      aimGeo.setFromPoints([start, end]);
      aimLine.computeLineDistances();
      aimLine.visible = !ballMoving && !holeSunk;
    }

    // UI
    const strokeEl = document.getElementById('stroke');
    const powerFillEl = document.getElementById('powerFill');
    const overlayEl = document.getElementById('overlay');
    const messageEl = document.getElementById('message');
    const playAgainBtn = document.getElementById('playAgain');
    const resetBallBtn = document.getElementById('resetBall');

    // Game state
    let strokeCount = 0;
    let power = 0;
    let charging = false;
    let chargeStartTime = 0;
    let ballMoving = false;
    let holeSunk = false;
    let velocity = new THREE.Vector3(0, 0, 0);
    let gamePhase = 'aiming';

    // Exposed state
    window.__3D_STATE__ = {
      ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
      ballSpeed: 0,
      ballMoving: false,
      aimAngle: 0,
      power: 0,
      strokeCount: 0,
      holeSunk: false,
      lanternLoaded: false,
      gamePhase: 'aiming'
    };

    // Physics helpers
    const fairwayMinX = -fairwayWidth / 2 + ballRadius + borderThickness / 2;
    const fairwayMaxX = fairwayWidth / 2 - ballRadius - borderThickness / 2;
    const fairwayMinZ = -fairwayLength / 2 + ballRadius + borderThickness / 2;
    const fairwayMaxZ = fairwayLength / 2 - ballRadius - borderThickness / 2;

    function reflectBallFromBorders() {
      if (ball.position.x <= fairwayMinX) {
        ball.position.x = fairwayMinX;
        velocity.x *= -1;
      } else if (ball.position.x >= fairwayMaxX) {
        ball.position.x = fairwayMaxX;
        velocity.x *= -1;
      }

      if (ball.position.z <= fairwayMinZ) {
        ball.position.z = fairwayMinZ;
        velocity.z *= -1;
      } else if (ball.position.z >= fairwayMaxZ) {
        ball.position.z = fairwayMaxZ;
        velocity.z *= -1;
      }
    }

    function collideBallWithObstacle(obstacle) {
      const mesh = obstacle.mesh;
      const localBall = ball.position.clone();
      mesh.worldToLocal(localBall);

      const halfX = obstacle.halfSize.x;
      const halfZ = obstacle.halfSize.z;

      const closestX = THREE.MathUtils.clamp(localBall.x, -halfX, halfX);
      const closestZ = THREE.MathUtils.clamp(localBall.z, -halfZ, halfZ);

      const dx = localBall.x - closestX;
      const dz = localBall.z - closestZ;
      const distSq = dx * dx + dz * dz;

      if (distSq <= ballRadius * ballRadius) {
        const overlapX = ballRadius - Math.abs(localBall.x - closestX);
        const overlapZ = ballRadius - Math.abs(localBall.z - closestZ);

        const localVel = velocity.clone();
        mesh.worldToLocal(localVel.add(mesh.getWorldPosition(new THREE.Vector3())));
        const meshPos = mesh.getWorldPosition(new THREE.Vector3());
        localVel.sub(mesh.worldToLocal(meshPos.clone()));

        if (overlapX < overlapZ) {
          if (localBall.x > 0) localBall.x += overlapX;
          else localBall.x -= overlapX;
          localVel.x *= -1;
        } else {
          if (localBall.z > 0) localBall.z += overlapZ;
          else localBall.z -= overlapZ;
          localVel.z *= -1;
        }

        mesh.localToWorld(localBall);
        ball.position.x = localBall.x;
        ball.position.z = localBall.z;

        const originWorld = mesh.getWorldPosition(new THREE.Vector3());
        const velWorldEnd = localVel.clone();
        mesh.localToWorld(velWorldEnd);
        velocity.copy(velWorldEnd.sub(originWorld));
      }
    }

    function resetBallPosition() {
      ball.position.copy(teePosition);
      ball.position.y = ballRadius;
      velocity.set(0, 0, 0);
      ballMoving = false;
      charging = false;
      power = 0;
      if (!holeSunk) gamePhase = 'aiming';
      updatePowerBar();
      updateAimLine();
    }

    function fullReset() {
      strokeCount = 0;
      holeSunk = false;
      overlayEl.style.display = 'none';
      aimAngle = 0;
      gamePhase = 'aiming';
      strokeEl.textContent = `Stroke: ${strokeCount}`;
      resetBallPosition();
    }

    function sinkBall() {
      holeSunk = true;
      ballMoving = false;
      velocity.set(0, 0, 0);
      power = 0;
      gamePhase = 'sunk';
      ball.position.set(holePosition.x, ballRadius * 0.3, holePosition.z);
      messageEl.textContent = `Hole in ${strokeCount}!`;
      overlayEl.style.display = 'flex';
      updatePowerBar();
      updateAimLine();
    }

    function updatePowerBar() {
      powerFillEl.style.width = `${power}%`;
    }

    // Input
    const keys = new Set();

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'Space') {
        e.preventDefault();
      }

      if (holeSunk) return;

      if ((gamePhase === 'aiming' || gamePhase === 'charging') && !ballMoving) {
        if (e.code === 'ArrowLeft' && !charging) {
          aimAngle -= 5;
          updateAimLine();
        } else if (e.code === 'ArrowRight' && !charging) {
          aimAngle += 5;
          updateAimLine();
        } else if (e.code === 'Space' && !keys.has('Space')) {
          charging = true;
          chargeStartTime = performance.now();
          gamePhase = 'charging';
        }
      }

      keys.add(e.code);
    });

    window.addEventListener('keyup', (e) => {
      keys.delete(e.code);

      if (holeSunk) return;

      if (e.code === 'Space' && charging && !ballMoving) {
        charging = false;
        if (power > 0) {
          const dir = getAimDirection();
          const speed = (power / 100) * 8.0;
          velocity.copy(dir.multiplyScalar(speed));
          ballMoving = true;
          strokeCount += 1;
          strokeEl.textContent = `Stroke: ${strokeCount}`;
          gamePhase = 'rolling';
        } else {
          gamePhase = 'aiming';
        }
      }
    });

    resetBallBtn.addEventListener('click', () => {
      if (holeSunk) return;
      resetBallPosition();
    });

    playAgainBtn.addEventListener('click', () => {
      fullReset();
    });

    // Clock
    const clock = new THREE.Clock();

    // Animation
    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (charging && !ballMoving && !holeSunk) {
        const elapsed = (performance.now() - chargeStartTime) / 1000;
        power = Math.min(100, (elapsed / 2) * 100);
        updatePowerBar();
      }

      if (ballMoving && !holeSunk) {
        ball.position.addScaledVector(velocity, delta);
        ball.position.y = ballRadius;

        reflectBallFromBorders();

        for (const obstacle of obstacles) {
          collideBallWithObstacle(obstacle);
        }

        velocity.multiplyScalar(0.98);

        const speed = velocity.length();

        const holeCenterXZ = new THREE.Vector2(holePosition.x, holePosition.z);
        const ballXZ = new THREE.Vector2(ball.position.x, ball.position.z);
        const distToHole = ballXZ.distanceTo(holeCenterXZ);

        if (distToHole <= 0.3 && speed < 1.0) {
          sinkBall();
        } else if (speed < 0.05) {
          velocity.set(0, 0, 0);
          ballMoving = false;
          power = 0;
          gamePhase = 'aiming';
          updatePowerBar();
        }
      }

      updateAimLine();

      window.__3D_STATE__ = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballSpeed: velocity.length(),
        ballMoving,
        aimAngle,
        power,
        strokeCount,
        holeSunk,
        lanternLoaded,
        gamePhase
      };

      renderer.render(scene, camera);
    }

    updateAimLine();
    updatePowerBar();
    animate();

    // Resize
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
