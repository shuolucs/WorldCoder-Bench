<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Fortress Cannon Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 280px;
      background: rgba(20, 20, 20, 0.78);
      color: white;
      padding: 12px;
      border-radius: 8px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control {
      margin-bottom: 10px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      padding: 8px 10px;
      border-radius: 6px;
      background: #d8d8d8;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #f0f0f0;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 12px;
      font: 14px monospace;
      z-index: 10;
      border-radius: 8px;
      line-height: 1.5;
      min-width: 220px;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background: rgba(0,0,0,0.45);
      color: white;
      padding: 8px 10px;
      font: 12px monospace;
      border-radius: 6px;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hud-angle">Angle: 0°</div>
    <div id="hud-elevation">Elevation: 45°</div>
    <div id="hud-power">Power: 25 m/s</div>
    <div id="hud-shots">Shots: 0</div>
    <div id="hud-score">Score: 0</div>
    <div id="hud-boxes">Boxes: 15</div>
  </div>

  <div id="ui">
    <h3>Fortress Cannon Controls</h3>

    <div class="control">
      <label for="slider-angle"><span>Angle</span><span id="val-angle">0°</span></label>
      <input id="slider-angle" type="range" min="-60" max="60" step="1" value="0" />
    </div>

    <div class="control">
      <label for="slider-elevation"><span>Elevation</span><span id="val-elevation">45°</span></label>
      <input id="slider-elevation" type="range" min="10" max="80" step="1" value="45" />
    </div>

    <div class="control">
      <label for="slider-power"><span>Power (m/s)</span><span id="val-power">25</span></label>
      <input id="slider-power" type="range" min="10" max="50" step="1" value="25" />
    </div>

    <div class="buttons">
      <button id="btn-fire">Fire</button>
      <button id="btn-rebuild">Rebuild</button>
      <button id="btn-reset">Reset</button>
    </div>
  </div>

  <div id="help">Space: Fire &nbsp; | &nbsp; P: Pause</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 3, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, -10);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -40;
    dirLight.shadow.camera.right = 40;
    dirLight.shadow.camera.top = 40;
    dirLight.shadow.camera.bottom = -40;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 100;
    scene.add(dirLight);

    const textureLoader = new THREE.TextureLoader();

    const groundMat = new THREE.MeshStandardMaterial({ color: 0x557733 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const fortressGroup = new THREE.Group();
    scene.add(fortressGroup);

    const brickTexture = textureLoader.load('./brick_diffuse.jpg');
    brickTexture.wrapS = THREE.RepeatWrapping;
    brickTexture.wrapT = THREE.RepeatWrapping;
    brickTexture.repeat.set(4, 2);

    const wallMat = new THREE.MeshStandardMaterial({
      map: brickTexture,
      color: 0xffffff,
      roughness: 0.9,
      metalness: 0.05
    });

    const wall = new THREE.Mesh(
      new THREE.BoxGeometry(8, 4, 1),
      wallMat
    );
    wall.position.set(0, 2, 10);
    wall.castShadow = true;
    wall.receiveShadow = true;
    fortressGroup.add(wall);

    for (let i = 0; i < 4; i++) {
      const cren = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.5, 1),
        wallMat
      );
      cren.position.set(-3.5 + i * 2, 4.25, 10);
      cren.castShadow = true;
      cren.receiveShadow = true;
      fortressGroup.add(cren);
    }

    const cannonGroup = new THREE.Group();
    cannonGroup.position.set(0, 4.5, 10);
    scene.add(cannonGroup);

    const cannonYawPivot = new THREE.Group();
    cannonGroup.add(cannonYawPivot);

    const cannonPitchPivot = new THREE.Group();
    cannonYawPivot.add(cannonPitchPivot);

    const base = new THREE.Mesh(
      new THREE.SphereGeometry(0.3, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.8, roughness: 0.3 })
    );
    base.castShadow = true;
    cannonYawPivot.add(base);

    const barrelMat = new THREE.MeshStandardMaterial({
      color: 0x333333,
      metalness: 0.8,
      roughness: 0.2
    });

    const barrel = new THREE.Mesh(
      new THREE.CylinderGeometry(0.1, 0.15, 2, 24),
      barrelMat
    );
    barrel.rotation.z = -Math.PI / 2;
    barrel.position.x = 1.0;
    barrel.castShadow = true;
    barrel.receiveShadow = true;
    cannonPitchPivot.add(barrel);

    const muzzleLocal = new THREE.Vector3(2.0, 0, 0);

    const trajectoryMaterial = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.4,
      gapSize: 0.25,
      transparent: true,
      opacity: 0.85
    });
    const trajectoryGeometry = new THREE.BufferGeometry();
    const trajectoryLine = new THREE.Line(trajectoryGeometry, trajectoryMaterial);
    scene.add(trajectoryLine);

    const ballGeometry = new THREE.SphereGeometry(0.2, 20, 20);
    const ballMaterial = new THREE.MeshStandardMaterial({
      color: 0x222222,
      metalness: 0.9,
      roughness: 0.25
    });

    const crateTexture = textureLoader.load('./crate.gif');
    const crateMat = new THREE.MeshStandardMaterial({
      map: crateTexture,
      color: 0xffffff,
      roughness: 0.8,
      metalness: 0.05
    });

    const boxes = [];
    const boxGroup = new THREE.Group();
    scene.add(boxGroup);

    const cannonballs = [];
    const dustEffects = [];

    const boxSize = 1;
    const gravity = -9.81;
    const dt = 1 / 60;
    const dragCoeff = 0.01;
    const cannonballMass = 1.0;
    const maxBalls = 5;

    let shotsFired = 0;
    let frameCount = 0;
    let isPaused = false;

    const sliderAngle = document.getElementById('slider-angle');
    const sliderElevation = document.getElementById('slider-elevation');
    const sliderPower = document.getElementById('slider-power');

    const valAngle = document.getElementById('val-angle');
    const valElevation = document.getElementById('val-elevation');
    const valPower = document.getElementById('val-power');

    const hudAngle = document.getElementById('hud-angle');
    const hudElevation = document.getElementById('hud-elevation');
    const hudPower = document.getElementById('hud-power');
    const hudShots = document.getElementById('hud-shots');
    const hudScore = document.getElementById('hud-score');
    const hudBoxes = document.getElementById('hud-boxes');

    function updateControlLabels() {
      valAngle.textContent = `${sliderAngle.value}°`;
      valElevation.textContent = `${sliderElevation.value}°`;
      valPower.textContent = `${sliderPower.value}`;
    }

    function updateCannonTransform() {
      const yaw = THREE.MathUtils.degToRad(parseFloat(sliderAngle.value));
      const elevation = THREE.MathUtils.degToRad(parseFloat(sliderElevation.value));
      cannonYawPivot.rotation.y = yaw;
      cannonPitchPivot.rotation.z = elevation;
    }

    function getMuzzleWorldPosition() {
      return cannonPitchPivot.localToWorld(muzzleLocal.clone());
    }

    function getLaunchDirection() {
      const yaw = THREE.MathUtils.degToRad(parseFloat(sliderAngle.value));
      const elevation = THREE.MathUtils.degToRad(parseFloat(sliderElevation.value));
      const dir = new THREE.Vector3(
        -Math.cos(elevation) * Math.sin(yaw),
        Math.sin(elevation),
        -Math.cos(elevation) * Math.cos(yaw)
      );
      return dir.normalize();
    }

    function updateTrajectoryPreview() {
      const origin = getMuzzleWorldPosition();
      const power = parseFloat(sliderPower.value);
      const velocity = getLaunchDirection().multiplyScalar(power);

      const points = [];
      let pos = origin.clone();
      let vel = velocity.clone();

      for (let i = 0; i < 80; i++) {
        points.push(pos.clone());
        const speed = vel.length();
        const drag = vel.clone().multiplyScalar(-dragCoeff * speed);
        const acc = new THREE.Vector3(drag.x, gravity + drag.y, drag.z);
        vel.add(acc.multiplyScalar(dt));
        pos = pos.clone().add(vel.clone().multiplyScalar(dt));
        if (pos.y <= 0.2) {
          points.push(new THREE.Vector3(pos.x, 0.2, pos.z));
          break;
        }
      }

      trajectoryGeometry.setFromPoints(points);
      trajectoryLine.computeLineDistances();
    }

    function makeTrailLine() {
      const geometry = new THREE.BufferGeometry();
      const material = new THREE.LineBasicMaterial({
        color: 0xffffaa,
        transparent: true,
        opacity: 0.6
      });
      return new THREE.Line(geometry, material);
    }

    function createDustEffect(position) {
      const particles = [];
      for (let i = 0; i < 10; i++) {
        const p = new THREE.Mesh(
          new THREE.SphereGeometry(0.06, 8, 8),
          new THREE.MeshStandardMaterial({
            color: 0xc2b280,
            transparent: true,
            opacity: 0.8
          })
        );
        p.position.copy(position);
        p.position.y = 0.1;
        p.castShadow = false;
        p.receiveShadow = false;
        scene.add(p);

        const angle = Math.random() * Math.PI * 2;
        const speed = 1 + Math.random() * 2;
        const vy = 0.5 + Math.random() * 1.2;

        particles.push({
          mesh: p,
          velocity: new THREE.Vector3(Math.cos(angle) * speed, vy, Math.sin(angle) * speed)
        });
      }

      dustEffects.push({
        particles,
        age: 0,
        lifetime: 1
      });
    }

    function createCannonball() {
      if (cannonballs.length >= maxBalls) {
        const old = cannonballs.shift();
        scene.remove(old.mesh);
        scene.remove(old.trail);
      }

      const mesh = new THREE.Mesh(ballGeometry, ballMaterial);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const pos = getMuzzleWorldPosition();
      const vel = getLaunchDirection().multiplyScalar(parseFloat(sliderPower.value));

      mesh.position.copy(pos);
      scene.add(mesh);

      const trail = makeTrailLine();
      scene.add(trail);

      cannonballs.push({
        mesh,
        velocity: vel,
        active: true,
        trailPositions: [pos.clone()],
        trail
      });

      shotsFired++;
    }

    function fire() {
      if (!isPaused) createCannonball();
    }

    function createBox(x, y, z) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        crateMat
      );
      mesh.position.set(x, y, z);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      boxGroup.add(mesh);

      boxes.push({
        mesh,
        position: mesh.position,
        velocity: new THREE.Vector3(),
        angularVelocity: new THREE.Vector3(
          (Math.random() - 0.5) * 0.3,
          (Math.random() - 0.5) * 0.3,
          (Math.random() - 0.5) * 0.3
        ),
        mass: 2,
        size: 1,
        originalPosition: new THREE.Vector3(x, y, z),
        displaced: false
      });
    }

    function rebuildBoxes() {
      while (boxes.length) {
        const b = boxes.pop();
        boxGroup.remove(b.mesh);
      }

      const rows = [5, 4, 3, 2, 1];
      const z = -15;

      for (let r = 0; r < rows.length; r++) {
        const count = rows[r];
        const y = 0.5 + r * 1.0;
        const startX = -((count - 1) * 0.5);
        for (let i = 0; i < count; i++) {
          const x = startX + i * 1.0;
          createBox(x, y, z);
        }
      }
    }

    function resetEverything() {
      sliderAngle.value = 0;
      sliderElevation.value = 45;
      sliderPower.value = 25;
      updateControlLabels();
      updateCannonTransform();

      for (const ball of cannonballs) {
        scene.remove(ball.mesh);
        scene.remove(ball.trail);
      }
      cannonballs.length = 0;

      for (const fx of dustEffects) {
        for (const p of fx.particles) scene.remove(p.mesh);
      }
      dustEffects.length = 0;

      shotsFired = 0;
      rebuildBoxes();
    }

    function sphereAABBIntersect(center, radius, boxPos, boxHalf = 0.5) {
      const cx = Math.max(boxPos.x - boxHalf, Math.min(center.x, boxPos.x + boxHalf));
      const cy = Math.max(boxPos.y - boxHalf, Math.min(center.y, boxPos.y + boxHalf));
      const cz = Math.max(boxPos.z - boxHalf, Math.min(center.z, boxPos.z + boxHalf));
      const dx = center.x - cx;
      const dy = center.y - cy;
      const dz = center.z - cz;
      return (dx * dx + dy * dy + dz * dz) <= radius * radius;
    }

    function boxesOverlap(a, b) {
      return Math.abs(a.position.x - b.position.x) < 1 &&
             Math.abs(a.position.y - b.position.y) < 1 &&
             Math.abs(a.position.z - b.position.z) < 1;
    }

    function updateBoxesPhysics() {
      for (const box of boxes) {
        box.velocity.y += gravity * dt;
        box.position.add(box.velocity.clone().multiplyScalar(dt));

        box.mesh.rotation.x += box.angularVelocity.x * dt;
        box.mesh.rotation.y += box.angularVelocity.y * dt;
        box.mesh.rotation.z += box.angularVelocity.z * dt;

        box.velocity.multiplyScalar(0.995);
        box.angularVelocity.multiplyScalar(0.995);

        if (box.position.y < 0.5) {
          box.position.y = 0.5;
          if (box.velocity.y < 0) box.velocity.y = 0;
          box.velocity.x *= 0.96;
          box.velocity.z *= 0.96;
        }
      }

      for (let i = 0; i < boxes.length; i++) {
        for (let j = 0; j < boxes.length; j++) {
          if (i === j) continue;
          const a = boxes[i];
          const b = boxes[j];

          if (boxesOverlap(a, b)) {
            const dx = a.position.x - b.position.x;
            const dy = a.position.y - b.position.y;
            const dz = a.position.z - b.position.z;

            const overlapX = 1 - Math.abs(dx);
            const overlapY = 1 - Math.abs(dy);
            const overlapZ = 1 - Math.abs(dz);

            if (overlapY <= overlapX && overlapY <= overlapZ) {
              if (dy > 0) {
                a.position.y = b.position.y + 1;
                if (a.velocity.y < 0) a.velocity.y = 0;
              }
            } else if (overlapX <= overlapZ) {
              const dir = dx >= 0 ? 1 : -1;
              a.position.x = b.position.x + dir * 1.0;
              a.velocity.x *= -0.1;

              if (a.velocity.length() > 0.5) {
                b.velocity.add(a.velocity.clone().multiplyScalar(0.5));
              }
            } else {
              const dir = dz >= 0 ? 1 : -1;
              a.position.z = b.position.z + dir * 1.0;
              a.velocity.z *= -0.1;

              if (a.velocity.length() > 0.5) {
                b.velocity.add(a.velocity.clone().multiplyScalar(0.5));
              }
            }
          }
        }
      }

      for (let i = boxes.length - 1; i >= 0; i--) {
        const box = boxes[i];
        if (!box.displaced && box.position.distanceTo(box.originalPosition) > 1.0) {
          box.displaced = true;
        }
        if (box.position.y < -5) {
          boxGroup.remove(box.mesh);
          boxes.splice(i, 1);
        }
      }
    }

    function updateCannonballs() {
      for (let i = cannonballs.length - 1; i >= 0; i--) {
        const ball = cannonballs[i];
        if (!ball.active) continue;

        const v = ball.velocity.clone();
        const speed = v.length();
        const drag = v.clone().multiplyScalar(-dragCoeff * speed);
        const acc = new THREE.Vector3(drag.x, gravity + drag.y, drag.z);

        ball.velocity.add(acc.multiplyScalar(dt));
        ball.mesh.position.add(ball.velocity.clone().multiplyScalar(dt));

        for (const box of boxes) {
          if (sphereAABBIntersect(ball.mesh.position, 0.2, box.position, 0.5)) {
            const impulse = ball.velocity.clone().multiplyScalar(cannonballMass * 0.8 / box.mass);
            box.velocity.add(impulse);
            box.angularVelocity.add(new THREE.Vector3(
              (Math.random() - 0.5) * 6,
              (Math.random() - 0.5) * 6,
              (Math.random() - 0.5) * 6
            ));
            ball.velocity.multiplyScalar(0.3);
            break;
          }
        }

        ball.trailPositions.push(ball.mesh.position.clone());
        if (ball.trailPositions.length > 30) ball.trailPositions.shift();
        ball.trail.geometry.setFromPoints(ball.trailPositions);

        if (ball.mesh.position.y <= 0.2) {
          ball.mesh.position.y = 0.2;
          ball.active = false;
          createDustEffect(ball.mesh.position.clone());
          scene.remove(ball.mesh);
          scene.remove(ball.trail);
          cannonballs.splice(i, 1);
          continue;
        }

        if (ball.mesh.position.length() > 300) {
          scene.remove(ball.mesh);
          scene.remove(ball.trail);
          cannonballs.splice(i, 1);
        }
      }
    }

    function updateDustEffects() {
      for (let i = dustEffects.length - 1; i >= 0; i--) {
        const fx = dustEffects[i];
        fx.age += dt;
        const t = fx.age / fx.lifetime;

        for (const p of fx.particles) {
          p.velocity.y += gravity * 0.35 * dt;
          p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
          p.mesh.material.opacity = Math.max(0, 0.8 * (1 - t));
        }

        if (fx.age >= fx.lifetime) {
          for (const p of fx.particles) scene.remove(p.mesh);
          dustEffects.splice(i, 1);
        }
      }
    }

    function getDestructionScore() {
      return boxes.filter(b => b.displaced).length;
    }

    function updateHUD() {
      const angle = parseFloat(sliderAngle.value);
      const elevation = parseFloat(sliderElevation.value);
      const power = parseFloat(sliderPower.value);
      const score = getDestructionScore();

      hudAngle.textContent = `Angle: ${angle}°`;
      hudElevation.textContent = `Elevation: ${elevation}°`;
      hudPower.textContent = `Power: ${power} m/s`;
      hudShots.textContent = `Shots: ${shotsFired}`;
      hudScore.textContent = `Score: ${score}`;
      hudBoxes.textContent = `Boxes: ${boxes.length}`;
    }

    function updateState() {
      const cannonAngle = parseFloat(sliderAngle.value);
      const cannonElevation = parseFloat(sliderElevation.value);
      const power = parseFloat(sliderPower.value);
      const boxesRemaining = boxes.length;
      const activeBalls = cannonballs.length;
      const boxesDisplaced = getDestructionScore();

      const cannonValid =
        Number.isFinite(cannonAngle) &&
        Number.isFinite(cannonElevation) &&
        Number.isFinite(power) &&
        boxesRemaining >= 0 &&
        activeBalls >= 0 &&
        activeBalls <= 5;

      window.__3D_STATE__ = {
        frameCount,
        cannonAngle,
        cannonElevation,
        power,
        shotsFired,
        activeBalls,
        boxesRemaining,
        boxesDisplaced,
        destructionScore: boxesDisplaced,
        boxes: boxes.map(b => ({
          x: b.position.x,
          y: b.position.y,
          z: b.position.z,
          vx: b.velocity.x,
          vy: b.velocity.y,
          vz: b.velocity.z
        })),
        cannonValid,
        isPaused
      };
    }

    sliderAngle.addEventListener('input', () => {
      updateControlLabels();
      updateCannonTransform();
    });
    sliderElevation.addEventListener('input', () => {
      updateControlLabels();
      updateCannonTransform();
    });
    sliderPower.addEventListener('input', updateControlLabels);

    document.getElementById('btn-fire').addEventListener('click', fire);
    document.getElementById('btn-rebuild').addEventListener('click', rebuildBoxes);
    document.getElementById('btn-reset').addEventListener('click', resetEverything);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        fire();
      }
      if (e.key.toLowerCase() === 'p') {
        isPaused = !isPaused;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateControlLabels();
    updateCannonTransform();
    rebuildBoxes();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      if (!isPaused) {
        frameCount++;
        updateTrajectoryPreview();
        updateCannonballs();
        updateBoxesPhysics();
        updateDustEffects();
      } else {
        updateTrajectoryPreview();
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
