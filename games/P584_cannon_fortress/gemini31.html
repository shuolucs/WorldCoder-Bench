<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fortress Cannon</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px;
            border-radius: 5px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            min-width: 150px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        input[type=range] {
            width: 120px;
            cursor: pointer;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            font-weight: bold;
            font-family: monospace;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            transition: background 0.2s;
        }
        button:hover {
            background: #666;
        }
        button:active {
            background: #888;
        }
        #btn-fire {
            background: #8b0000;
            border-color: #ff0000;
        }
        #btn-fire:hover {
            background: #aa0000;
        }
        #pause-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            display: none;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div>Angle: <span id="hud-angle">0</span>°</div>
        <div>Elevation: <span id="hud-elevation">45</span>°</div>
        <div>Power: <span id="hud-power">25</span> m/s</div>
        <div>Shots: <span id="hud-shots">0</span></div>
        <div>Score: <span id="hud-score">0</span></div>
        <div>Boxes: <span id="hud-boxes">15</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-angle">Angle</label>
            <input type="range" id="slider-angle" min="-60" max="60" value="0" step="1">
        </div>
        <div class="control-group">
            <label for="slider-elevation">Elevation</label>
            <input type="range" id="slider-elevation" min="10" max="80" value="45" step="1">
        </div>
        <div class="control-group">
            <label for="slider-power">Power (m/s)</label>
            <input type="range" id="slider-power" min="10" max="50" value="25" step="1">
        </div>
        <div class="btn-group">
            <button id="btn-fire">FIRE (Space)</button>
            <button id="btn-rebuild">Rebuild</button>
            <button id="btn-reset">Reset</button>
        </div>
    </div>

    <div id="pause-overlay">PAUSED</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            frameCount: 0,
            cannonAngle: 0,
            cannonElevation: 45,
            power: 25,
            shotsFired: 0,
            activeBalls: 0,
            boxesRemaining: 15,
            boxesDisplaced: 0,
            destructionScore: 0,
            boxes: [],
            cannonValid: true,
            isPaused: false
        };

        // --- DOM Elements ---
        const elAngle = document.getElementById('slider-angle');
        const elElevation = document.getElementById('slider-elevation');
        const elPower = document.getElementById('slider-power');
        const hudAngle = document.getElementById('hud-angle');
        const hudElevation = document.getElementById('hud-elevation');
        const hudPower = document.getElementById('hud-power');
        const hudShots = document.getElementById('hud-shots');
        const hudScore = document.getElementById('hud-score');
        const hudBoxes = document.getElementById('hud-boxes');
        const pauseOverlay = document.getElementById('pause-overlay');

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 3, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 3, -5);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        scene.add(dirLight);

        // --- Textures ---
        const textureLoader = new THREE.TextureLoader();
        const brickTex = textureLoader.load('./brick_diffuse.jpg');
        brickTex.wrapS = THREE.RepeatWrapping;
        brickTex.wrapT = THREE.RepeatWrapping;
        brickTex.repeat.set(4, 2);
        brickTex.colorSpace = THREE.SRGBColorSpace;

        const crateTex = textureLoader.load('./crate.gif');
        crateTex.colorSpace = THREE.SRGBColorSpace;

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x557733, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Fortress Wall ---
        const wallGroup = new THREE.Group();
        wallGroup.position.set(0, 0, 10);
        scene.add(wallGroup);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0xaa7766, map: brickTex, roughness: 0.9 });
        const mainWallGeo = new THREE.BoxGeometry(8, 4, 1);
        const mainWall = new THREE.Mesh(mainWallGeo, wallMat);
        mainWall.position.y = 2;
        mainWall.castShadow = true;
        mainWall.receiveShadow = true;
        wallGroup.add(mainWall);

        // Crenellations
        const crenGeo = new THREE.BoxGeometry(1, 0.5, 1);
        for (let x = -3.5; x <= 3.5; x += 2) {
            const cren = new THREE.Mesh(crenGeo, wallMat);
            cren.position.set(x, 4.25, 0);
            cren.castShadow = true;
            cren.receiveShadow = true;
            wallGroup.add(cren);
        }

        // --- Cannon ---
        const cannonPivot = new THREE.Group();
        cannonPivot.position.set(0, 4.5, 10);
        scene.add(cannonPivot);

        const cannonBaseGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const cannonMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
        const cannonBase = new THREE.Mesh(cannonBaseGeo, cannonMat);
        cannonBase.castShadow = true;
        cannonPivot.add(cannonBase);

        const pitchGroup = new THREE.Group();
        cannonPivot.add(pitchGroup);

        const barrelGeo = new THREE.CylinderGeometry(0.1, 0.15, 2, 16);
        const barrel = new THREE.Mesh(barrelGeo, cannonMat);
        // Rotate cylinder to point along -Z
        barrel.rotation.x = -Math.PI / 2;
        barrel.position.z = -1; // Offset so base is at pivot
        barrel.castShadow = true;
        pitchGroup.add(barrel);

        // --- Trajectory Preview ---
        const trajectoryMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.5, gapSize: 0.2 });
        const trajectoryGeo = new THREE.BufferGeometry();
        const trajectoryLine = new THREE.Line(trajectoryGeo, trajectoryMat);
        scene.add(trajectoryLine);

        // --- Physics Entities ---
        const cannonballs = [];
        const boxes = [];
        const particles = [];
        const MAX_BALLS = 5;
        const dt = 1 / 60;
        const g = -9.81;

        // --- Target (Box Stack) ---
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        const boxMat = new THREE.MeshStandardMaterial({ color: 0xddaa77, map: crateTex, roughness: 0.7 });

        function buildTarget() {
            // Clear existing
            boxes.forEach(b => scene.remove(b.mesh));
            boxes.length = 0;

            const startZ = -15;
            let rows = 5;
            for (let r = 0; r < rows; r++) {
                let numBoxes = rows - r;
                let y = 0.5 + r * 1.0;
                let startX = -(numBoxes - 1) / 2;
                for (let i = 0; i < numBoxes; i++) {
                    let x = startX + i;
                    const mesh = new THREE.Mesh(boxGeo, boxMat);
                    mesh.position.set(x, y, startZ);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);

                    boxes.push({
                        mesh: mesh,
                        pos: new THREE.Vector3(x, y, startZ),
                        vel: new THREE.Vector3(0, 0, 0),
                        originalPos: new THREE.Vector3(x, y, startZ),
                        awake: false,
                        mass: 2
                    });
                }
            }
            updateState();
        }

        // --- Projectile Logic ---
        const ballGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });

        function fireCannon() {
            if (window.__3D_STATE__.isPaused) return;

            // Calculate tip position and direction
            const tipLocal = new THREE.Vector3(0, 0, -2);
            const tipWorld = tipLocal.applyMatrix4(pitchGroup.matrixWorld);
            
            const dir = new THREE.Vector3(0, 0, -1).transformDirection(pitchGroup.matrixWorld).normalize();
            const power = parseFloat(elPower.value);
            const vel = dir.multiplyScalar(power);

            const mesh = new THREE.Mesh(ballGeo, ballMat);
            mesh.position.copy(tipWorld);
            mesh.castShadow = true;
            scene.add(mesh);

            // Trail setup
            const trailGeo = new THREE.BufferGeometry();
            const trailPositions = new Float32Array(30 * 3);
            const trailColors = new Float32Array(30 * 3);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
            const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
            const trailLine = new THREE.Line(trailGeo, trailMat);
            scene.add(trailLine);

            const ball = {
                mesh: mesh,
                pos: tipWorld.clone(),
                vel: vel,
                mass: 5,
                active: true,
                trailPoints: [],
                trailLine: trailLine
            };

            cannonballs.push(ball);
            if (cannonballs.length > MAX_BALLS) {
                const oldBall = cannonballs.shift();
                scene.remove(oldBall.mesh);
                scene.remove(oldBall.trailLine);
                oldBall.trailLine.geometry.dispose();
                oldBall.trailLine.material.dispose();
            }

            window.__3D_STATE__.shotsFired++;
            updateState();
        }

        function spawnDust(pos) {
            const partGeo = new THREE.SphereGeometry(0.05, 4, 4);
            const partMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true });
            for (let i = 0; i < 10; i++) {
                const mesh = new THREE.Mesh(partGeo, partMat.clone());
                mesh.position.copy(pos);
                scene.add(mesh);
                particles.push({
                    mesh: mesh,
                    pos: pos.clone(),
                    vel: new THREE.Vector3(
                        (Math.random() - 0.5) * 5,
                        Math.random() * 5,
                        (Math.random() - 0.5) * 5
                    ),
                    life: 1.0,
                    maxLife: 1.0
                });
            }
        }

        // --- Update Logic ---
        function updateCannon() {
            const yaw = parseFloat(elAngle.value);
            const pitch = parseFloat(elElevation.value);
            
            // Yaw: negative so positive slider turns right
            cannonPivot.rotation.y = THREE.MathUtils.degToRad(-yaw);
            pitchGroup.rotation.x = THREE.MathUtils.degToRad(pitch);

            // Update Trajectory Preview
            const tipLocal = new THREE.Vector3(0, 0, -2);
            const tipWorld = tipLocal.applyMatrix4(pitchGroup.matrixWorld);
            const dir = new THREE.Vector3(0, 0, -1).transformDirection(pitchGroup.matrixWorld).normalize();
            const power = parseFloat(elPower.value);
            
            let p = tipWorld.clone();
            let v = dir.multiplyScalar(power);
            const pts = [p.clone()];
            
            for (let i = 0; i < 150; i++) {
                let speed = v.length();
                let drag = v.clone().multiplyScalar(-0.01 * speed);
                v.y += g * dt;
                v.add(drag.multiplyScalar(dt));
                p.add(v.clone().multiplyScalar(dt));
                pts.push(p.clone());
                if (p.y < 0) break;
            }
            
            trajectoryGeo.setFromPoints(pts);
            trajectoryLine.computeLineDistances();

            // Update HUD
            hudAngle.textContent = yaw;
            hudElevation.textContent = pitch;
            hudPower.textContent = power;
        }

        function updatePhysics() {
            if (window.__3D_STATE__.isPaused) return;

            // 1. Cannonballs
            cannonballs.forEach(ball => {
                if (!ball.active) return;

                let speed = ball.vel.length();
                let drag = ball.vel.clone().multiplyScalar(-0.01 * speed);
                
                ball.vel.y += g * dt;
                ball.vel.add(drag.multiplyScalar(dt));
                ball.pos.add(ball.vel.clone().multiplyScalar(dt));

                // Ground collision
                if (ball.pos.y <= 0.2) {
                    ball.pos.y = 0.2;
                    ball.vel.set(0, 0, 0);
                    ball.active = false;
                    spawnDust(ball.pos);
                }

                ball.mesh.position.copy(ball.pos);

                // Update Trail
                ball.trailPoints.push(ball.pos.clone());
                if (ball.trailPoints.length > 30) ball.trailPoints.shift();
                
                const positions = ball.trailLine.geometry.attributes.position.array;
                const colors = ball.trailLine.geometry.attributes.color.array;
                
                for (let i = 0; i < 30; i++) {
                    let pt = ball.trailPoints[i] || ball.pos;
                    positions[i*3] = pt.x;
                    positions[i*3+1] = pt.y;
                    positions[i*3+2] = pt.z;
                    
                    let alpha = ball.trailPoints.length > i ? (i / ball.trailPoints.length) : 0;
                    colors[i*3] = 0.8 * alpha;
                    colors[i*3+1] = 0.8 * alpha;
                    colors[i*3+2] = 0.8 * alpha;
                }
                ball.trailLine.geometry.attributes.position.needsUpdate = true;
                ball.trailLine.geometry.attributes.color.needsUpdate = true;
            });

            // 2. Ball-Box Collisions
            cannonballs.forEach(ball => {
                if (!ball.active) return;
                boxes.forEach(box => {
                    // Sphere-AABB
                    let cx = Math.max(box.pos.x - 0.5, Math.min(ball.pos.x, box.pos.x + 0.5));
                    let cy = Math.max(box.pos.y - 0.5, Math.min(ball.pos.y, box.pos.y + 0.5));
                    let cz = Math.max(box.pos.z - 0.5, Math.min(ball.pos.z, box.pos.z + 0.5));

                    let distSq = (cx - ball.pos.x)**2 + (cy - ball.pos.y)**2 + (cz - ball.pos.z)**2;
                    if (distSq < 0.04) { // r=0.2, r^2=0.04
                        box.awake = true;
                        
                        let nx = ball.pos.x - cx;
                        let ny = ball.pos.y - cy;
                        let nz = ball.pos.z - cz;
                        let len = Math.sqrt(nx*nx + ny*ny + nz*nz);
                        if (len > 0) { nx/=len; ny/=len; nz/=len; }
                        else { nx=0; ny=1; nz=0; }

                        // Impulse
                        box.vel.add(ball.vel.clone().multiplyScalar((ball.mass / box.mass) * 0.8));

                        // Ball bounce
                        ball.vel.multiplyScalar(0.3);
                        let dot = ball.vel.x*nx + ball.vel.y*ny + ball.vel.z*nz;
                        ball.vel.x -= 2 * dot * nx;
                        ball.vel.y -= 2 * dot * ny;
                        ball.vel.z -= 2 * dot * nz;

                        // Push out
                        let pen = 0.2 - Math.sqrt(distSq);
                        ball.pos.x += nx * pen;
                        ball.pos.y += ny * pen;
                        ball.pos.z += nz * pen;
                    }
                });
            });

            // 3. Box Physics
            for (let i = 0; i < boxes.length; i++) {
                let box = boxes[i];
                if (!box.awake) continue;

                box.vel.y += g * dt;
                box.pos.add(box.vel.clone().multiplyScalar(dt));

                // Ground
                if (box.pos.y < 0.5) {
                    box.pos.y = 0.5;
                    box.vel.y *= -0.3;
                    box.vel.x *= 0.8;
                    box.vel.z *= 0.8;
                    if (box.vel.lengthSq() < 0.05) box.awake = false;
                }

                // Box-Box Collision (simplified iterative resolution)
                for (let j = 0; j < boxes.length; j++) {
                    if (i === j) continue;
                    let other = boxes[j];
                    
                    let dx = box.pos.x - other.pos.x;
                    let dy = box.pos.y - other.pos.y;
                    let dz = box.pos.z - other.pos.z;
                    
                    if (Math.abs(dx) < 1 && Math.abs(dy) < 1 && Math.abs(dz) < 1) {
                        other.awake = true;
                        
                        let ox = 1 - Math.abs(dx);
                        let oy = 1 - Math.abs(dy);
                        let oz = 1 - Math.abs(dz);

                        if (ox < oy && ox < oz) {
                            let sign = Math.sign(dx) || 1;
                            box.pos.x += (ox / 2) * sign;
                            other.pos.x -= (ox / 2) * sign;
                            // Momentum transfer
                            other.vel.x += box.vel.x * 0.5;
                            box.vel.x *= 0.5;
                        } else if (oy < ox && oy < oz) {
                            let sign = Math.sign(dy) || 1;
                            box.pos.y += (oy / 2) * sign;
                            other.pos.y -= (oy / 2) * sign;
                            other.vel.y += box.vel.y * 0.5;
                            box.vel.y *= 0.5;
                        } else {
                            let sign = Math.sign(dz) || 1;
                            box.pos.z += (oz / 2) * sign;
                            other.pos.z -= (oz / 2) * sign;
                            other.vel.z += box.vel.z * 0.5;
                            box.vel.z *= 0.5;
                        }
                    }
                }

                box.mesh.position.copy(box.pos);
                
                // Simple rotation based on velocity for visual effect
                if (box.awake) {
                    box.mesh.rotation.x += box.vel.z * dt * 0.5;
                    box.mesh.rotation.z -= box.vel.x * dt * 0.5;
                }
            }

            // Remove fallen boxes
            for (let i = boxes.length - 1; i >= 0; i--) {
                if (boxes[i].pos.y < -5) {
                    scene.remove(boxes[i].mesh);
                    boxes.splice(i, 1);
                }
            }

            // 4. Particles
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.pos.add(p.vel.clone().multiplyScalar(dt));
                p.life -= dt;
                p.mesh.position.copy(p.pos);
                p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    particles.splice(i, 1);
                }
            }
        }

        function updateState() {
            const state = window.__3D_STATE__;
            state.frameCount++;
            state.cannonAngle = parseFloat(elAngle.value);
            state.cannonElevation = parseFloat(elElevation.value);
            state.power = parseFloat(elPower.value);
            state.activeBalls = cannonballs.length;
            state.boxesRemaining = boxes.length;
            
            let displaced = 0;
            let boxData = [];
            boxes.forEach(b => {
                if (b.pos.distanceTo(b.originalPos) > 1.0) displaced++;
                boxData.push({
                    x: b.pos.x, y: b.pos.y, z: b.pos.z,
                    vx: b.vel.x, vy: b.vel.y, vz: b.vel.z
                });
            });
            
            // Add removed boxes to displaced count
            displaced += (15 - boxes.length);
            
            state.boxesDisplaced = displaced;
            state.destructionScore = displaced;
            state.boxes = boxData;
            
            state.cannonValid = Number.isFinite(state.cannonAngle) && 
                                Number.isFinite(state.cannonElevation) && 
                                state.boxesRemaining >= 0 && 
                                state.activeBalls >= 0 && state.activeBalls <= 5;

            // Update HUD
            hudShots.textContent = state.shotsFired;
            hudScore.textContent = state.destructionScore;
            hudBoxes.textContent = state.boxesRemaining;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            updateCannon();
            updatePhysics();
            controls.update();
            renderer.render(scene, camera);
            
            updateState();
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('btn-fire').addEventListener('click', fireCannon);
        
        document.getElementById('btn-rebuild').addEventListener('click', buildTarget);
        
        document.getElementById('btn-reset').addEventListener('click', () => {
            elAngle.value = 0;
            elElevation.value = 45;
            elPower.value = 25;
            window.__3D_STATE__.shotsFired = 0;
            
            cannonballs.forEach(b => {
                scene.remove(b.mesh);
                scene.remove(b.trailLine);
                b.trailLine.geometry.dispose();
                b.trailLine.material.dispose();
            });
            cannonballs.length = 0;
            
            buildTarget();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                fireCannon();
            }
            if (e.key === 'p' || e.key === 'P') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                pauseOverlay.style.display = window.__3D_STATE__.isPaused ? 'block' : 'none';
            }
        });

        // Init
        buildTarget();
        animate();

    </script>
</body>
</html>
