<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fortress Cannon Game</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: monospace; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px;
    font-size: 14px;
    font-family: monospace;
    border-radius: 8px;
    z-index: 10;
    line-height: 1.6;
}

#controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    color: white;
    padding: 12px 20px;
    font-size: 13px;
    font-family: monospace;
    border-radius: 8px;
    z-index: 10;
    display: flex;
    gap: 20px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
}

#controls label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

#controls input[type="range"] {
    width: 120px;
}

#controls button {
    padding: 8px 16px;
    font-size: 14px;
    font-family: monospace;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    font-weight: bold;
}

#btn-fire { background: #e74c3c; color: white; }
#btn-rebuild { background: #f39c12; color: white; }
#btn-reset { background: #3498db; color: white; }
#btn-fire:hover { background: #c0392b; }
#btn-rebuild:hover { background: #e67e22; }
#btn-reset:hover { background: #2980b9; }
</style>
</head>
<body>

<div id="hud">
    <div>Angle: <span id="hud-angle">0</span>°</div>
    <div>Elevation: <span id="hud-elevation">45</span>°</div>
    <div>Power: <span id="hud-power">25</span> m/s</div>
    <div>Shots: <span id="hud-shots">0</span></div>
    <div>Score: <span id="hud-score">0</span></div>
    <div>Boxes: <span id="hud-boxes">15</span></div>
</div>

<div id="controls">
    <label>
        Angle
        <input type="range" id="slider-angle" min="-60" max="60" step="1" value="0">
    </label>
    <label>
        Elevation
        <input type="range" id="slider-elevation" min="10" max="80" step="1" value="45">
    </label>
    <label>
        Power (m/s)
        <input type="range" id="slider-power" min="10" max="50" step="1" value="25">
    </label>
    <button id="btn-fire">🔥 FIRE (Space)</button>
    <button id="btn-rebuild">🔄 Rebuild</button>
    <button id="btn-reset">⟲ Reset</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 3, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 3, -10);
controls.update();

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -30;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x557733 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Brick texture (procedural fallback)
function createBrickTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(0, 0, 256, 256);
    const brickH = 32;
    const brickW = 64;
    for (let row = 0; row < 8; row++) {
        const offset = (row % 2) * (brickW / 2);
        for (let col = -1; col < 5; col++) {
            const x = col * brickW + offset;
            const y = row * brickH;
            ctx.fillStyle = `rgb(${140 + Math.random()*40}, ${70 + Math.random()*30}, ${30 + Math.random()*20})`;
            ctx.fillRect(x + 1, y + 1, brickW - 2, brickH - 2);
        }
    }
    const tex = new THREE.CanvasTexture(canvas);
    tex.wrapS = THREE.RepeatWrapping;
    tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(4, 2);
    return tex;
}

function createCrateTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#C4A35A';
    ctx.fillRect(0, 0, 128, 128);
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 4;
    ctx.strokeRect(4, 4, 120, 120);
    ctx.beginPath();
    ctx.moveTo(4, 4);
    ctx.lineTo(124, 124);
    ctx.moveTo(124, 4);
    ctx.lineTo(4, 124);
    ctx.stroke();
    ctx.strokeStyle = '#A0822A';
    ctx.lineWidth = 2;
    ctx.strokeRect(20, 20, 88, 88);
    return new THREE.CanvasTexture(canvas);
}

const brickTex = createBrickTexture();
const crateTex = createCrateTexture();

// Try loading real textures, fall back to procedural
const texLoader = new THREE.TextureLoader();
let brickTexture = brickTex;
let crateTexture = crateTex;

try {
    texLoader.load('./brick_diffuse.jpg', (tex) => {
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 2);
        brickTexture = tex;
        wallMesh.material.map = tex;
        wallMesh.material.needsUpdate = true;
    });
} catch(e) {}

try {
    texLoader.load('./crate.gif', (tex) => {
        crateTexture = tex;
        boxes.forEach(b => {
            b.mesh.material.map = tex;
            b.mesh.material.needsUpdate = true;
        });
    });
} catch(e) {}

// Fortress Wall at z=10
const wallGeo = new THREE.BoxGeometry(8, 4, 1);
const wallMat = new THREE.MeshStandardMaterial({ map: brickTexture, roughness: 0.8 });
const wallMesh = new THREE.Mesh(wallGeo, wallMat);
wallMesh.position.set(0, 2, 10);
wallMesh.castShadow = true;
wallMesh.receiveShadow = true;
scene.add(wallMesh);

// Crenellations
const crenelMat = new THREE.MeshStandardMaterial({ map: brickTexture, roughness: 0.8 });
for (let i = -4; i <= 3; i++) {
    if (i % 2 === 0) {
        const cGeo = new THREE.BoxGeometry(1, 0.5, 1);
        const cMesh = new THREE.Mesh(cGeo, crenelMat);
        cMesh.position.set(i + 0.5, 4.25, 10);
        cMesh.castShadow = true;
        cMesh.receiveShadow = true;
        scene.add(cMesh);
    }
}

// Cannon
const cannonGroup = new THREE.Group();
cannonGroup.position.set(0, 4.5, 10);

const cannonBase = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 16, 16),
    new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 })
);
cannonBase.castShadow = true;
cannonGroup.add(cannonBase);

const cannonPivot = new THREE.Group();
cannonGroup.add(cannonPivot);

const barrelGeo = new THREE.CylinderGeometry(0.1, 0.15, 2, 16);
const barrelMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
const barrel = new THREE.Mesh(barrelGeo, barrelMat);
barrel.position.set(0, 0, -1);
barrel.rotation.x = Math.PI / 2;
barrel.castShadow = true;
cannonPivot.add(barrel);

scene.add(cannonGroup);

// Trajectory line
const trajectoryPoints = [];
for (let i = 0; i < 200; i++) trajectoryPoints.push(new THREE.Vector3());
const trajectoryGeo = new THREE.BufferGeometry().setFromPoints(trajectoryPoints);
const trajectoryMat = new THREE.LineDashedMaterial({ color: 0xff4444, dashSize: 0.3, gapSize: 0.15, opacity: 0.6, transparent: true });
const trajectoryLine = new THREE.Line(trajectoryGeo, trajectoryMat);
trajectoryLine.computeLineDistances();
scene.add(trajectoryLine);

// State
let cannonAngle = 0;
let cannonElevation = 45;
let power = 25;
let shotsFired = 0;
let isPaused = false;
let frameCount = 0;

const cannonballs = [];
const boxes = [];
const dustParticles = [];
const MAX_BALLS = 5;
const GRAVITY = -9.81;
const DRAG_COEFF = 0.01;
const dt = 1 / 60;

// Box stack original positions
const boxOriginalPositions = [];
function computeBoxPositions() {
    boxOriginalPositions.length = 0;
    const rows = [5, 4, 3, 2, 1];
    const baseZ = -15;
    for (let row = 0; row < rows.length; row++) {
        const count = rows[row];
        const startX = -(count - 1) / 2;
        for (let i = 0; i < count; i++) {
            boxOriginalPositions.push({
                x: startX + i,
                y: 0.5 + row,
                z: baseZ
            });
        }
    }
}
computeBoxPositions();

function createBoxes() {
    // Remove existing
    boxes.forEach(b => scene.remove(b.mesh));
    boxes.length = 0;

    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const boxMat = new THREE.MeshStandardMaterial({ map: crateTexture, roughness: 0.7 });

    boxOriginalPositions.forEach(pos => {
        const mesh = new THREE.Mesh(boxGeo, boxMat.clone());
        mesh.position.set(pos.x, pos.y, pos.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        scene.add(mesh);

        boxes.push({
            mesh,
            origPos: new THREE.Vector3(pos.x, pos.y, pos.z),
            velocity: new THREE.Vector3(0, 0, 0),
            angularVelocity: new THREE.Vector3(0, 0, 0),
            mass: 2,
            grounded: false
        });
    });
}
createBoxes();

// Get cannon direction
function getCannonDirection() {
    const yawRad = THREE.MathUtils.degToRad(cannonAngle);
    const elevRad = THREE.MathUtils.degToRad(cannonElevation);
    const dir = new THREE.Vector3();
    dir.x = Math.sin(-yawRad) * Math.cos(elevRad);
    dir.y = Math.sin(elevRad);
    dir.z = -Math.cos(yawRad) * Math.cos(elevRad);
    return dir.normalize();
}

function getMuzzlePosition() {
    const dir = getCannonDirection();
    return new THREE.Vector3(
        cannonGroup.position.x + dir.x * 2,
        cannonGroup.position.y + dir.y * 2,
        cannonGroup.position.z + dir.z * 2
    );
}

// Update trajectory preview
function updateTrajectory() {
    const dir = getCannonDirection();
    const muzzle = getMuzzlePosition();
    const vel = dir.clone().multiplyScalar(power);
    const pos = muzzle.clone();
    const positions = trajectoryGeo.attributes.position;
    let count = 0;

    for (let i = 0; i < 200; i++) {
        positions.setXYZ(i, pos.x, pos.y, pos.z);
        count++;

        // Euler step
        const speed = vel.length();
        const dragForce = vel.clone().multiplyScalar(-DRAG_COEFF * speed);
        vel.x += dragForce.x * dt;
        vel.y += (GRAVITY + dragForce.y) * dt;
        vel.z += dragForce.z * dt;
        pos.add(vel.clone().multiplyScalar(dt));

        if (pos.y < 0) break;
    }

    // Zero out remaining points
    for (let i = count; i < 200; i++) {
        const last = count > 0 ? count - 1 : 0;
        positions.setXYZ(i, positions.getX(last), positions.getY(last), positions.getZ(last));
    }

    positions.needsUpdate = true;
    trajectoryLine.geometry.computeBoundingSphere();
    trajectoryLine.computeLineDistances();
}

// Fire cannonball
function fire() {
    if (isPaused) return;

    // Remove oldest if at limit
    while (cannonballs.length >= MAX_BALLS) {
        const old = cannonballs.shift();
        scene.remove(old.mesh);
        if (old.trail) scene.remove(old.trail);
    }

    const dir = getCannonDirection();
    const muzzle = getMuzzlePosition();
    const vel = dir.clone().multiplyScalar(power);

    const ballGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const ballMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.9, roughness: 0.1 });
    const mesh = new THREE.Mesh(ballGeo, ballMat);
    mesh.position.copy(muzzle);
    mesh.castShadow = true;
    scene.add(mesh);

    // Trail
    const trailPositions = [];
    for (let i = 0; i < 30; i++) trailPositions.push(muzzle.clone());
    const trailGeo = new THREE.BufferGeometry().setFromPoints(trailPositions);
    const trailMat = new THREE.LineBasicMaterial({ color: 0x888888, opacity: 0.5, transparent: true });
    const trail = new THREE.Line(trailGeo, trailMat);
    scene.add(trail);

    cannonballs.push({
        mesh,
        velocity: vel,
        trail,
        trailPositions: trailPositions.map(p => p.clone()),
        stopped: false,
        age: 0
    });

    shotsFired++;
}

// Dust effect
function spawnDust(position) {
    for (let i = 0; i < 10; i++) {
        const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.05, 8, 8);
        const mat = new THREE.MeshBasicMaterial({ color: 0xAA9966, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        scene.add(mesh);

        dustParticles.push({
            mesh,
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 3,
                Math.random() * 2 + 1,
                (Math.random() - 0.5) * 3
            ),
            life: 1.0
        });
    }
}

// AABB-Sphere collision
function sphereAABBCollision(spherePos, sphereRadius, boxPos, boxHalf) {
    const dx = Math.max(0, Math.abs(spherePos.x - boxPos.x) - boxHalf.x);
    const dy = Math.max(0, Math.abs(spherePos.y - boxPos.y) - boxHalf.y);
    const dz = Math.max(0, Math.abs(spherePos.z - boxPos.z) - boxHalf.z);
    return (dx * dx + dy * dy + dz * dz) < (sphereRadius * sphereRadius);
}

// Box-Box AABB overlap
function boxBoxOverlap(a, b, halfSize) {
    return Math.abs(a.x - b.x) < halfSize * 2 &&
           Math.abs(a.y - b.y) < halfSize * 2 &&
           Math.abs(a.z - b.z) < halfSize * 2;
}

// Physics update
function updatePhysics() {
    const boxHalf = new THREE.Vector3(0.5, 0.5, 0.5);

    // Update cannonballs
    for (let i = cannonballs.length - 1; i >= 0; i--) {
        const ball = cannonballs[i];
        ball.age += dt;

        if (!ball.stopped) {
            const speed = ball.velocity.length();
            const dragForce = ball.velocity.clone().multiplyScalar(-DRAG_COEFF * speed);
            ball.velocity.x += dragForce.x * dt;
            ball.velocity.y += (GRAVITY + dragForce.y) * dt;
            ball.velocity.z += dragForce.z * dt;

            ball.mesh.position.add(ball.velocity.clone().multiplyScalar(dt));

            // Update trail
            ball.trailPositions.pop();
            ball.trailPositions.unshift(ball.mesh.position.clone());
            const trailAttr = ball.trail.geometry.attributes.position;
            for (let t = 0; t < 30; t++) {
                if (t < ball.trailPositions.length) {
                    trailAttr.setXYZ(t, ball.trailPositions[t].x, ball.trailPositions[t].y, ball.trailPositions[t].z);
                }
            }
            trailAttr.needsUpdate = true;

            // Ground collision
            if (ball.mesh.position.y <= 0.2) {
                ball.mesh.position.y = 0.2;
                ball.stopped = true;
                ball.velocity.set(0, 0, 0);
                spawnDust(ball.mesh.position.clone());
            }

            // Box collision
            for (let j = boxes.length - 1; j >= 0; j--) {
                const box = boxes[j];
                if (sphereAABBCollision(ball.mesh.position, 0.2, box.mesh.position, boxHalf)) {
                    // Transfer momentum
                    const ballMass = 5;
                    const impulse = ball.velocity.clone().multiplyScalar(ballMass * 0.8 / box.mass);
                    box.velocity.add(impulse);

                    // Bounce cannonball
                    ball.velocity.multiplyScalar(-0.3);

                    spawnDust(ball.mesh.position.clone());
                }
            }
        }

        // Remove old stopped balls after 10 seconds
        if (ball.stopped && ball.age > 10) {
            scene.remove(ball.mesh);
            scene.remove(ball.trail);
            cannonballs.splice(i, 1);
        }
    }

    // Update boxes
    for (let i = boxes.length - 1; i >= 0; i--) {
        const box = boxes[i];

        // Apply gravity
        box.velocity.y += GRAVITY * dt;

        // Damping
        box.velocity.multiplyScalar(0.995);

        // Update position
        box.mesh.position.add(box.velocity.clone().multiplyScalar(dt));

        // Apply angular velocity for visual rotation
        box.mesh.rotation.x += box.angularVelocity.x * dt;
        box.mesh.rotation.y += box.angularVelocity.y * dt;
        box.mesh.rotation.z += box.angularVelocity.z * dt;
        box.angularVelocity.multiplyScalar(0.98);

        // Ground collision
        if (box.mesh.position.y < 0.5) {
            box.mesh.position.y = 0.5;
            box.velocity.y = Math.max(0, box.velocity.y * -0.3);
            // Friction
            box.velocity.x *= 0.9;
            box.velocity.z *= 0.9;
        }

        // Remove if fallen below
        if (box.mesh.position.y < -5) {
            scene.remove(box.mesh);
            boxes.splice(i, 1);
            continue;
        }
    }

    // Box-Box collisions
    for (let i = 0; i < boxes.length; i++) {
        for (let j = i + 1; j < boxes.length; j++) {
            const a = boxes[i];
            const b = boxes[j];
            const diff = new THREE.Vector3().subVectors(a.mesh.position, b.mesh.position);
            const absDx = Math.abs(diff.x);
            const absDy = Math.abs(diff.y);
            const absDz = Math.abs(diff.z);

            if (absDx < 1 && absDy < 1 && absDz < 1) {
                // Find minimum overlap axis
                const overlapX = 1 - absDx;
                const overlapY = 1 - absDy;
                const overlapZ = 1 - absDz;

                const minOverlap = Math.min(overlapX, overlapY, overlapZ);

                if (minOverlap === overlapY) {
                    const sign = Math.sign(diff.y) || 1;
                    a.mesh.position.y += sign * overlapY * 0.5;
                    b.mesh.position.y -= sign * overlapY * 0.5;

                    // Momentum transfer
                    const relVel = a.velocity.y - b.velocity.y;
                    if (relVel * sign < 0) {
                        const transfer = relVel * 0.5;
                        a.velocity.y -= transfer * 0.5;
                        b.velocity.y += transfer * 0.5;
                    }
                } else if (minOverlap === overlapX) {
                    const sign = Math.sign(diff.x) || 1;
                    a.mesh.position.x += sign * overlapX * 0.5;
                    b.mesh.position.x -= sign * overlapX * 0.5;

                    // Momentum transfer
                    const avgVx = (a.velocity.x * a.mass + b.velocity.x * b.mass) / (a.mass + b.mass);
                    a.velocity.x = avgVx + (a.velocity.x - avgVx) * -0.3;
                    b.velocity.x = avgVx + (b.velocity.x - avgVx) * -0.3;

                    // Add angular velocity on impact
                    const impactSpeed = Math.abs(a.velocity.x - b.velocity.x);
                    if (impactSpeed > 0.5) {
                        a.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(impactSpeed * 0.5);
                        b.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(impactSpeed * 0.5);
                    }
                } else {
                    const sign = Math.sign(diff.z) || 1;
                    a.mesh.position.z += sign * overlapZ * 0.5;
                    b.mesh.position.z -= sign * overlapZ * 0.5;

                    const avgVz = (a.velocity.z * a.mass + b.velocity.z * b.mass) / (a.mass + b.mass);
                    a.velocity.z = avgVz + (a.velocity.z - avgVz) * -0.3;
                    b.velocity.z = avgVz + (b.velocity.z - avgVz) * -0.3;

                    const impactSpeed = Math.abs(a.velocity.z - b.velocity.z);
                    if (impactSpeed > 0.5) {
                        a.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(impactSpeed * 0.5);
                        b.angularVelocity.set(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(impactSpeed * 0.5);
                    }
                }
            }
        }
    }

    // Update dust particles
    for (let i = dustParticles.length - 1; i >= 0; i--) {
        const p = dustParticles[i];
        p.life -= dt;
        p.velocity.y += GRAVITY * 0.3 * dt;
        p.mesh.position.add(p.velocity.clone().multiplyScalar(dt));
        p.mesh.material.opacity = Math.max(0, p.life);

        if (p.life <= 0) {
            scene.remove(p.mesh);
            dustParticles.splice(i, 1);
        }
    }
}

// Count displaced boxes
function countDisplaced() {
    let count = 0;
    boxes.forEach(b => {
        if (b.mesh.position.distanceTo(b.origPos) > 1) count++;
    });
    return count;
}

// UI elements
const sliderAngle = document.getElementById('slider-angle');
const sliderElevation = document.getElementById('slider-elevation');
const sliderPower = document.getElementById('slider-power');
const btnFire = document.getElementById('btn-fire');
const btnRebuild = document.getElementById('btn-rebuild');
const btnReset = document.getElementById('btn-reset');

sliderAngle.addEventListener('input', () => { cannonAngle = parseFloat(sliderAngle.value); });
sliderElevation.addEventListener('input', () => { cannonElevation = parseFloat(sliderElevation.value); });
sliderPower.addEventListener('input', () => { power = parseFloat(sliderPower.value); });
btnFire.addEventListener('click', fire);
btnRebuild.addEventListener('click', () => { createBoxes(); });
btnReset.addEventListener('click', () => {
    cannonAngle = 0;
    cannonElevation = 45;
    power = 25;
    shotsFired = 0;
    sliderAngle.value = 0;
    sliderElevation.value = 45;
    sliderPower.value = 25;
    cannonballs.forEach(b => { scene.remove(b.mesh); scene.remove(b.trail); });
    cannonballs.length = 0;
    dustParticles.forEach(p => scene.remove(p.mesh));
    dustParticles.length = 0;
    createBoxes();
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        fire();
    }
    if (e.key === 'p' || e.key === 'P') {
        isPaused = !isPaused;
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// State
window.__3D_STATE__ = {};

function updateState() {
    const displaced = countDisplaced();
    const state = {
        frameCount,
        cannonAngle,
        cannonElevation,
        power,
        shotsFired,
        activeBalls: cannonballs.length,
        boxesRemaining: boxes.length,
        boxesDisplaced: displaced,
        destructionScore: displaced,
        boxes: boxes.map(b => ({
            x: b.mesh.position.x,
            y: b.mesh.position.y,
            z: b.mesh.position.z,
            vx: b.velocity.x,
            vy: b.velocity.y,
            vz: b.velocity.z
        })),
        isPaused,
        cannonValid: (
            isFinite(cannonAngle) && isFinite(cannonElevation) && isFinite(power) &&
            boxes.length >= 0 && cannonballs.length >= 0 && cannonballs.length <= 5
        )
    };
    window.__3D_STATE__ = state;
}

// HUD update
function updateHUD() {
    document.getElementById('hud-angle').textContent = cannonAngle;
    document.getElementById('hud-elevation').textContent = cannonElevation;
    document.getElementById('hud-power').textContent = power;
    document.getElementById('hud-shots').textContent = shotsFired;
    document.getElementById('hud-score').textContent = countDisplaced();
    document.getElementById('hud-boxes').textContent = boxes.length;
}

// Update cannon visual
function updateCannon() {
    const yawRad = THREE.MathUtils.degToRad(-cannonAngle);
    const elevRad = THREE.MathUtils.degToRad(cannonElevation);
    cannonPivot.rotation.set(0, 0, 0);
    cannonPivot.rotation.y = yawRad;
    cannonPivot.rotation.x = -elevRad;
}

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    frameCount++;

    if (!isPaused) {
        updateCannon();
        updateTrajectory();
        updatePhysics();
    }

    updateHUD();
    updateState();
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
