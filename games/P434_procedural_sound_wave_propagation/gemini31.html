<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sound Wave Propagation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hudPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(10, 15, 30, 0.85);
            border: 1px solid #334466;
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }
        #hudPanel h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #334466;
            padding-bottom: 5px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .hud-label {
            color: #88aadd;
        }
        .hud-value {
            font-weight: bold;
            font-family: monospace;
        }
        #controlsPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(10, 15, 30, 0.85);
            border: 1px solid #334466;
            border-radius: 8px;
            padding: 15px 25px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .control-label {
            font-size: 12px;
            color: #88aadd;
            text-transform: uppercase;
        }
        button {
            background-color: #1a2a4a;
            color: #fff;
            border: 1px solid #334466;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #2a3a5a;
            border-color: #445577;
        }
        button:active {
            background-color: #0f1a3a;
        }
        input[type="range"] {
            width: 120px;
            cursor: pointer;
        }
        .instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(10, 15, 30, 0.85);
            border: 1px solid #334466;
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            color: #88aadd;
            text-align: right;
            pointer-events: none;
        }
        .key {
            display: inline-block;
            background: #1a2a4a;
            border: 1px solid #334466;
            border-radius: 3px;
            padding: 2px 6px;
            color: #fff;
            margin: 0 2px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="hudPanel">
        <h2>Simulation State</h2>
        <div class="hud-row"><span class="hud-label">Frequency:</span> <span id="freqDisplay" class="hud-value">1.50 Hz</span></div>
        <div class="hud-row"><span class="hud-label">Amplitude:</span> <span id="ampDisplay" class="hud-value">1.00</span></div>
        <div class="hud-row"><span class="hud-label">Time Scale:</span> <span id="speedDisplay" class="hud-value">1.0x</span></div>
        <div class="hud-row"><span class="hud-label">Sim Time:</span> <span id="timeDisplay" class="hud-value">0.00 s</span></div>
        <div class="hud-row"><span class="hud-label">λ (Air):</span> <span id="wavelengthDisplay" class="hud-value">0.67 m</span></div>
        <div class="hud-row"><span class="hud-label">Decay:</span> <span id="decayDisplay" class="hud-value">ON</span></div>
    </div>

    <div class="instructions">
        <div><span class="key">↑</span> <span class="key">↓</span> Adjust Frequency</div>
        <div style="margin-top: 5px;"><span class="key">←</span> <span class="key">→</span> Adjust Amplitude</div>
        <div style="margin-top: 5px;">Left Click + Drag to Rotate</div>
        <div style="margin-top: 5px;">Scroll to Zoom</div>
    </div>

    <div id="controlsPanel">
        <div class="control-group">
            <button id="playPauseBtn">Pause</button>
        </div>
        <div class="control-group">
            <button id="resetBtn">Reset</button>
        </div>
        <div class="control-group">
            <span class="control-label">Sim Speed</span>
            <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group" style="flex-direction: row; gap: 8px;">
            <input type="checkbox" id="decayToggle" checked>
            <label for="decayToggle" class="control-label" style="cursor: pointer;">Enable Decay</label>
        </div>
    </div>

    <script>
        // State Management
        window.__3D_STATE__ = {
            frequency: 1.5,
            amplitude: 1.0,
            timeScale: 1.0,
            simTime: 0,
            isPlaying: true,
            decayEnabled: true,
            wavelengthAir: 0,
            wavelengthWater: 0,
            wavelengthSteel: 0,
            maxParticleDisplacement: 0,
            particleCount: 2500,
            speedAir: 1.0,
            speedWater: 2.5,
            speedSteel: 5.0,
            sourcePosition: { x: -12, y: 2, z: 0 }
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;

        // Lighting
        scene.add(new THREE.AmbientLight(0x334466, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Grid Floor
        const floorGeo = new THREE.PlaneGeometry(40, 40, 40, 40);
        const floorMat = new THREE.MeshBasicMaterial({ color: 0x1a2a3a, wireframe: true });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // Sound Source
        const sourceGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const sourceMat = new THREE.MeshPhongMaterial({ 
            color: 0x00ffff, 
            emissive: 0x00ffff, 
            emissiveIntensity: 0.6 
        });
        const source = new THREE.Mesh(sourceGeo, sourceMat);
        source.position.set(state.sourcePosition.x, state.sourcePosition.y, state.sourcePosition.z);
        scene.add(source);

        // Medium Density Zones
        const createZone = (x, color, opacity) => {
            const geo = new THREE.BoxGeometry(4, 4, 30);
            const mat = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: opacity,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, 2, 0);
            scene.add(mesh);
            return mesh;
        };

        createZone(0, 0x00ff00, 0.1);  // Air
        createZone(6, 0x0066ff, 0.15); // Water
        createZone(12, 0xff3300, 0.1); // Steel

        // Wave Particles (InstancedMesh)
        const particleGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const particleMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        const instancedMesh = new THREE.InstancedMesh(particleGeo, particleMat, state.particleCount);
        instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(instancedMesh);

        // Precalculate particle data (positions and time of flight)
        const particleData = [];
        const dummy = new THREE.Object3D();
        let idx = 0;
        
        const sx = state.sourcePosition.x;
        const sz = state.sourcePosition.z;

        for (let i = 0; i < 50; i++) {
            for (let j = 0; j < 50; j++) {
                const px = -10 + (i / 49) * 30;
                const pz = -15 + (j / 49) * 30;
                
                const dx = px - sx;
                const dz = pz - sz;
                const D = Math.sqrt(dx * dx + dz * dz);
                
                let tof = 0;
                if (dx === 0) {
                    tof = D / state.speedAir;
                } else {
                    // Calculate distance traveled in each zone
                    const getDistInZone = (xStart, xEnd) => {
                        const u1 = Math.max(0, Math.min(1, (xStart - sx) / dx));
                        const u2 = Math.max(0, Math.min(1, (xEnd - sx) / dx));
                        return Math.max(0, (u2 - u1) * D);
                    };

                    const distWater = getDistInZone(4, 8);
                    const distSteel = getDistInZone(10, 14);
                    const distAir = D - distWater - distSteel;

                    tof = (distAir / state.speedAir) + 
                          (distWater / state.speedWater) + 
                          (distSteel / state.speedSteel);
                }

                particleData.push({ x: px, z: pz, D: D, tof: tof });
                
                dummy.position.set(px, 2, pz);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(idx, dummy.matrix);
                instancedMesh.setColorAt(idx, new THREE.Color(0xffffff));
                idx++;
            }
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        instancedMesh.instanceColor.needsUpdate = true;

        // UI Elements
        const freqDisplay = document.getElementById('freqDisplay');
        const ampDisplay = document.getElementById('ampDisplay');
        const speedDisplay = document.getElementById('speedDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const wavelengthDisplay = document.getElementById('wavelengthDisplay');
        const decayDisplay = document.getElementById('decayDisplay');
        
        const playPauseBtn = document.getElementById('playPauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const decayToggle = document.getElementById('decayToggle');

        // Controls Logic
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') state.frequency = Math.min(5.0, state.frequency + 0.25);
            if (e.key === 'ArrowDown') state.frequency = Math.max(0.5, state.frequency - 0.25);
            if (e.key === 'ArrowRight') state.amplitude = Math.min(3.0, state.amplitude + 0.2);
            if (e.key === 'ArrowLeft') state.amplitude = Math.max(0.2, state.amplitude - 0.2);
            updateHUD();
        });

        playPauseBtn.addEventListener('click', () => {
            state.isPlaying = !state.isPlaying;
            playPauseBtn.textContent = state.isPlaying ? 'Pause' : 'Play';
        });

        resetBtn.addEventListener('click', () => {
            state.frequency = 1.5;
            state.amplitude = 1.0;
            state.timeScale = 1.0;
            state.simTime = 0;
            state.isPlaying = true;
            state.decayEnabled = true;
            
            speedSlider.value = 1.0;
            decayToggle.checked = true;
            playPauseBtn.textContent = 'Pause';
            
            updateHUD();
        });

        speedSlider.addEventListener('input', (e) => {
            state.timeScale = parseFloat(e.target.value);
            updateHUD();
        });

        decayToggle.addEventListener('change', (e) => {
            state.decayEnabled = e.target.checked;
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUD() {
            freqDisplay.textContent = state.frequency.toFixed(2) + ' Hz';
            ampDisplay.textContent = state.amplitude.toFixed(2);
            speedDisplay.textContent = state.timeScale.toFixed(1) + 'x';
            timeDisplay.textContent = state.simTime.toFixed(2) + ' s';
            wavelengthDisplay.textContent = state.wavelengthAir.toFixed(2) + ' m';
            decayDisplay.textContent = state.decayEnabled ? 'ON' : 'OFF';
        }

        // Animation Loop
        let lastTime = performance.now();
        const colorPos = new THREE.Color(0xff5500);
        const colorNeg = new THREE.Color(0x0088ff);
        const colorZero = new THREE.Color(0xffffff);
        const tempColor = new THREE.Color();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const delta = (now - lastTime) / 1000;
            lastTime = now;

            if (state.isPlaying) {
                state.simTime += delta * state.timeScale;
            }

            // Update derived state
            state.wavelengthAir = state.speedAir / state.frequency;
            state.wavelengthWater = state.speedWater / state.frequency;
            state.wavelengthSteel = state.speedSteel / state.frequency;

            // Pulse source
            const pulse = 1.0 + 0.1 * Math.sin(2 * Math.PI * state.frequency * state.simTime);
            source.scale.set(pulse, pulse, pulse);

            let maxDisp = 0;
            const amp = state.amplitude || 0.001; // Prevent division by zero

            for (let i = 0; i < state.particleCount; i++) {
                const p = particleData[i];
                
                // Phase calculation based on time of flight
                const phase = 2 * Math.PI * state.frequency * (state.simTime - p.tof);
                
                // Exponential decay
                const decay = state.decayEnabled ? Math.exp(-0.05 * p.D) : 1.0;
                
                // Displacement
                const disp = state.amplitude * Math.sin(phase) * decay;
                
                if (Math.abs(disp) > maxDisp) maxDisp = Math.abs(disp);

                // Update Position
                dummy.position.set(p.x, 2 + disp, p.z);
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);

                // Update Color
                let v = disp / amp;
                v = Math.max(-1, Math.min(1, v)); // Clamp
                
                if (v > 0) {
                    tempColor.copy(colorZero).lerp(colorPos, v);
                } else {
                    tempColor.copy(colorZero).lerp(colorNeg, -v);
                }
                instancedMesh.setColorAt(i, tempColor);
            }

            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;
            
            state.maxParticleDisplacement = maxDisp;

            if (state.isPlaying) {
                updateHUD();
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize HUD and start
        updateHUD();
        animate();

    </script>
</body>
</html>
