<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound Wave Propagation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hudPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 10px;
    padding: 18px 22px;
    color: #c0d8e8;
    font-size: 13px;
    line-height: 1.8;
    min-width: 240px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
  }

  #hudPanel h3 {
    color: #00ffff;
    margin-bottom: 10px;
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(0, 255, 255, 0.2);
    padding-bottom: 8px;
  }

  #hudPanel .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #hudPanel .label { color: #7899aa; }
  #hudPanel .value { color: #00ffff; font-weight: bold; font-family: 'Courier New', monospace; }

  #controlPanel {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 10px;
    padding: 15px 25px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
  }

  #controlPanel button {
    background: rgba(0, 255, 255, 0.15);
    border: 1px solid rgba(0, 255, 255, 0.4);
    color: #00ffff;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: all 0.2s;
  }

  #controlPanel button:hover {
    background: rgba(0, 255, 255, 0.3);
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
  }

  #controlPanel label {
    color: #7899aa;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #controlPanel input[type="range"] {
    width: 100px;
    accent-color: #00ffff;
  }

  #controlPanel input[type="checkbox"] {
    accent-color: #00ffff;
    width: 16px;
    height: 16px;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .control-group span {
    color: #00ffff;
    font-size: 11px;
    font-family: 'Courier New', monospace;
  }

  #instructions {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(10, 15, 30, 0.85);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 10px;
    padding: 15px 18px;
    color: #7899aa;
    font-size: 11px;
    line-height: 1.9;
    backdrop-filter: blur(10px);
  }

  #instructions h4 {
    color: #00ffff;
    margin-bottom: 6px;
    font-size: 12px;
    letter-spacing: 1px;
  }

  #instructions kbd {
    background: rgba(0, 255, 255, 0.15);
    border: 1px solid rgba(0, 255, 255, 0.3);
    border-radius: 3px;
    padding: 1px 6px;
    color: #00ffff;
    font-size: 10px;
  }

  .zone-label {
    position: absolute;
    color: white;
    font-size: 12px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 0 10px currentColor;
  }
</style>
</head>
<body>

<div id="hudPanel">
  <h3>🔊 Wave Monitor</h3>
  <div class="row"><span class="label">Frequency:</span><span class="value" id="freqDisplay">1.50 Hz</span></div>
  <div class="row"><span class="label">Amplitude:</span><span class="value" id="ampDisplay">1.00</span></div>
  <div class="row"><span class="label">Time Scale:</span><span class="value" id="speedDisplay">1.0x</span></div>
  <div class="row"><span class="label">Sim Time:</span><span class="value" id="timeDisplay">0.00 s</span></div>
  <div class="row"><span class="label">λ (Air):</span><span class="value" id="wavelengthDisplay">0.67</span></div>
  <div class="row"><span class="label">Decay:</span><span class="value" id="decayDisplay">ON</span></div>
</div>

<div id="instructions">
  <h4>⌨ Controls</h4>
  <div><kbd>↑</kbd><kbd>↓</kbd> Frequency ±0.25 Hz</div>
  <div><kbd>←</kbd><kbd>→</kbd> Amplitude ±0.2</div>
  <div>Mouse drag to orbit</div>
  <div>Scroll to zoom</div>
</div>

<div id="controlPanel">
  <button id="playPauseBtn">⏸ Pause</button>
  <button id="resetBtn">↺ Reset</button>
  <div class="control-group">
    <label>Speed: <input type="range" id="speedSlider" min="0.1" max="3.0" step="0.1" value="1.0"></label>
    <span id="speedSliderVal">1.0x</span>
  </div>
  <label><input type="checkbox" id="decayToggle" checked> Decay</label>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // --- State ---
  const DEFAULTS = {
    frequency: 1.5,
    amplitude: 1.0,
    timeScale: 1.0,
    isPlaying: true,
    decayEnabled: true
  };

  const SPEED_AIR = 1.0;
  const SPEED_WATER = 2.5;
  const SPEED_STEEL = 5.0;

  const SOURCE_POS = { x: -12, y: 2, z: 0 };

  let frequency = DEFAULTS.frequency;
  let amplitude = DEFAULTS.amplitude;
  let timeScale = DEFAULTS.timeScale;
  let simTime = 0;
  let isPlaying = DEFAULTS.isPlaying;
  let decayEnabled = DEFAULTS.decayEnabled;
  let maxParticleDisplacement = 0;

  // --- Three.js Setup ---
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);
  scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(2, 2, 0);

  // --- Lights ---
  const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  // --- Grid Floor ---
  const gridGeom = new THREE.PlaneGeometry(40, 40, 40, 40);
  const gridMat = new THREE.MeshBasicMaterial({
    color: 0x1a2a3a,
    wireframe: true,
    transparent: true,
    opacity: 0.5
  });
  const gridFloor = new THREE.Mesh(gridGeom, gridMat);
  gridFloor.rotation.x = -Math.PI / 2;
  gridFloor.position.y = 0;
  scene.add(gridFloor);

  // --- Sound Source ---
  const sourceGeom = new THREE.SphereGeometry(0.5, 32, 32);
  const sourceMat = new THREE.MeshPhongMaterial({
    color: 0x00ffff,
    emissive: 0x00ffff,
    emissiveIntensity: 0.5,
    shininess: 100
  });
  const sourceMesh = new THREE.Mesh(sourceGeom, sourceMat);
  sourceMesh.position.set(SOURCE_POS.x, SOURCE_POS.y, SOURCE_POS.z);
  scene.add(sourceMesh);

  // Source glow
  const glowGeom = new THREE.SphereGeometry(0.7, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x00ffff,
    transparent: true,
    opacity: 0.15
  });
  const glowMesh = new THREE.Mesh(glowGeom, glowMat);
  sourceMesh.add(glowMesh);

  // --- Particle Field ---
  const GRID_X = 50;
  const GRID_Z = 50;
  const PARTICLE_COUNT = GRID_X * GRID_Z;
  const X_MIN = -10, X_MAX = 20;
  const Z_MIN = -15, Z_MAX = 15;

  const particles = [];
  const particleGroup = new THREE.Group();

  const particleGeom = new THREE.SphereGeometry(0.08, 6, 6);

  for (let i = 0; i < GRID_X; i++) {
    for (let j = 0; j < GRID_Z; j++) {
      const x = X_MIN + (X_MAX - X_MIN) * (i / (GRID_X - 1));
      const z = Z_MIN + (Z_MAX - Z_MIN) * (j / (GRID_Z - 1));
      const mat = new THREE.MeshPhongMaterial({
        color: 0xffffff,
        emissive: 0x000000,
        emissiveIntensity: 0.3
      });
      const mesh = new THREE.Mesh(particleGeom, mat);
      mesh.position.set(x, 2, z);
      particleGroup.add(mesh);
      particles.push({
        mesh: mesh,
        baseX: x,
        baseY: 2,
        baseZ: z
      });
    }
  }
  scene.add(particleGroup);

  // --- Medium Density Zones ---
  function createZone(x, width, depth, height, color, opacity, label) {
    const geom = new THREE.BoxGeometry(width, height, depth);
    const mat = new THREE.MeshPhongMaterial({
      color: color,
      transparent: true,
      opacity: opacity,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(x, height / 2, 0);
    scene.add(mesh);

    // Wireframe outline
    const wireGeom = new THREE.EdgesGeometry(geom);
    const wireMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.4 });
    const wireframe = new THREE.LineSegments(wireGeom, wireMat);
    mesh.add(wireframe);

    return mesh;
  }

  const zoneAir = createZone(0, 4, 30, 4, 0x00ff00, 0.1, 'Air');
  const zoneWater = createZone(6, 4, 30, 4, 0x0066ff, 0.15, 'Water');
  const zoneSteel = createZone(12, 4, 30, 4, 0xff3300, 0.1, 'Steel');

  // Zone labels using sprites
  function createLabel(text, position, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'transparent';
    ctx.fillRect(0, 0, 256, 64);
    ctx.font = 'bold 28px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.fillText(text, 128, 40);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(position);
    sprite.scale.set(4, 1, 1);
    scene.add(sprite);
    return sprite;
  }

  createLabel('AIR (1x)', new THREE.Vector3(0, 4.8, 0), '#00ff00');
  createLabel('WATER (2.5x)', new THREE.Vector3(6, 4.8, 0), '#4488ff');
  createLabel('STEEL (5x)', new THREE.Vector3(12, 4.8, 0), '#ff5533');

  // Source label
  createLabel('SOURCE', new THREE.Vector3(SOURCE_POS.x, SOURCE_POS.y + 1.5, SOURCE_POS.z), '#00ffff');

  // --- Wave rings (visual effect around source) ---
  const waveRings = [];
  for (let i = 0; i < 5; i++) {
    const ringGeom = new THREE.RingGeometry(0.5 + i * 2, 0.6 + i * 2, 64);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0x00ffff,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(SOURCE_POS.x, SOURCE_POS.y, SOURCE_POS.z);
    scene.add(ring);
    waveRings.push(ring);
  }

  // --- Helper: get wave speed at x position ---
  function getSpeedAtX(x) {
    // Zone boundaries: Air: x in [-2, 2], Water: x in [4, 8], Steel: x in [10, 14]
    if (x >= -2 && x <= 2) return SPEED_AIR;
    if (x >= 4 && x <= 8) return SPEED_WATER;
    if (x >= 10 && x <= 14) return SPEED_STEEL;
    return SPEED_AIR; // default air
  }

  // --- Helper: compute effective phase for a particle considering medium changes ---
  // For simplicity, we compute the accumulated phase along the x-axis from source to particle
  // considering different speeds in different zones
  function computePhase(px, pz, time) {
    const dx = px - SOURCE_POS.x;
    const dz = pz - SOURCE_POS.z;
    const distTotal = Math.sqrt(dx * dx + dz * dz);

    if (distTotal < 0.001) return 0;

    // Direction from source to particle
    const dirX = dx / distTotal;

    // We'll integrate along the line from source to particle
    // Sample the speed along the path
    const steps = 50;
    let accumulatedPhase = 0;

    for (let s = 0; s < steps; s++) {
      const t0 = s / steps;
      const t1 = (s + 1) / steps;
      const segLen = distTotal * (t1 - t0);

      const midT = (t0 + t1) / 2;
      const midX = SOURCE_POS.x + dx * midT;

      const speed = getSpeedAtX(midX);
      const wavelength = speed / frequency;
      const k = (2 * Math.PI) / wavelength;

      accumulatedPhase += k * segLen;
    }

    return accumulatedPhase;
  }

  // --- Color mapping ---
  const colorPos = new THREE.Color();
  const colorNeg = new THREE.Color();
  const colorNeutral = new THREE.Color(0xffffff);

  function getDisplacementColor(disp, maxDisp) {
    const norm = maxDisp > 0.001 ? disp / Math.max(amplitude, 0.5) : 0;
    const clampedNorm = Math.max(-1, Math.min(1, norm));

    if (clampedNorm > 0.01) {
      // Warm: interpolate from white to yellow to red
      const t = clampedNorm;
      const r = 1.0;
      const g = 1.0 - t * 0.6;
      const b = 1.0 - t * 0.9;
      return new THREE.Color(r, g, b);
    } else if (clampedNorm < -0.01) {
      // Cool: interpolate from white to cyan to blue/purple
      const t = -clampedNorm;
      const r = 1.0 - t * 0.8;
      const g = 1.0 - t * 0.4;
      const b = 1.0;
      return new THREE.Color(r, g, b);
    } else {
      return colorNeutral.clone();
    }
  }

  // --- UI Elements ---
  const playPauseBtn = document.getElementById('playPauseBtn');
  const resetBtn = document.getElementById('resetBtn');
  const speedSlider = document.getElementById('speedSlider');
  const decayToggle = document.getElementById('decayToggle');
  const speedSliderVal = document.getElementById('speedSliderVal');

  const freqDisplay = document.getElementById('freqDisplay');
  const ampDisplay = document.getElementById('ampDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const timeDisplay = document.getElementById('timeDisplay');
  const wavelengthDisplay = document.getElementById('wavelengthDisplay');
  const decayDisplay = document.getElementById('decayDisplay');

  playPauseBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    playPauseBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
  });

  resetBtn.addEventListener('click', () => {
    frequency = DEFAULTS.frequency;
    amplitude = DEFAULTS.amplitude;
    timeScale = DEFAULTS.timeScale;
    simTime = 0;
    isPlaying = DEFAULTS.isPlaying;
    decayEnabled = DEFAULTS.decayEnabled;
    speedSlider.value = DEFAULTS.timeScale;
    speedSliderVal.textContent = DEFAULTS.timeScale.toFixed(1) + 'x';
    decayToggle.checked = DEFAULTS.decayEnabled;
    playPauseBtn.textContent = '⏸ Pause';
  });

  speedSlider.addEventListener('input', () => {
    timeScale = parseFloat(speedSlider.value);
    speedSliderVal.textContent = timeScale.toFixed(1) + 'x';
  });

  decayToggle.addEventListener('change', () => {
    decayEnabled = decayToggle.checked;
  });

  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp':
        e.preventDefault();
        frequency = Math.min(5.0, frequency + 0.25);
        break;
      case 'ArrowDown':
        e.preventDefault();
        frequency = Math.max(0.5, frequency - 0.25);
        break;
      case 'ArrowRight':
        e.preventDefault();
        amplitude = Math.min(3.0, parseFloat((amplitude + 0.2).toFixed(1)));
        break;
      case 'ArrowLeft':
        e.preventDefault();
        amplitude = Math.max(0.2, parseFloat((amplitude - 0.2).toFixed(1)));
        break;
    }
  });

  // --- Expose State ---
  window.__3D_STATE__ = {};

  function updateState() {
    const wlAir = SPEED_AIR / frequency;
    const wlWater = SPEED_WATER / frequency;
    const wlSteel = SPEED_STEEL / frequency;

    window.__3D_STATE__ = {
      frequency: isFinite(frequency) ? frequency : DEFAULTS.frequency,
      amplitude: isFinite(amplitude) ? amplitude : DEFAULTS.amplitude,
      timeScale: isFinite(timeScale) ? timeScale : DEFAULTS.timeScale,
      simTime: isFinite(simTime) ? simTime : 0,
      isPlaying: isPlaying,
      decayEnabled: decayEnabled,
      wavelengthAir: isFinite(wlAir) ? wlAir : 0,
      wavelengthWater: isFinite(wlWater) ? wlWater : 0,
      wavelengthSteel: isFinite(wlSteel) ? wlSteel : 0,
      maxParticleDisplacement: isFinite(maxParticleDisplacement) ? maxParticleDisplacement : 0,
      particleCount: PARTICLE_COUNT,
      speedAir: SPEED_AIR,
      speedWater: SPEED_WATER,
      speedSteel: SPEED_STEEL,
      sourcePosition: { x: SOURCE_POS.x, y: SOURCE_POS.y, z: SOURCE_POS.z }
    };
  }

  function updateHUD() {
    const wlAir = SPEED_AIR / frequency;
    freqDisplay.textContent = frequency.toFixed(2) + ' Hz';
    ampDisplay.textContent = amplitude.toFixed(2);
    speedDisplay.textContent = timeScale.toFixed(1) + 'x';
    timeDisplay.textContent = simTime.toFixed(2) + ' s';
    wavelengthDisplay.textContent = wlAir.toFixed(2);
    decayDisplay.textContent = decayEnabled ? 'ON' : 'OFF';
  }

  // --- Animation ---
  let prevTime = performance.now();
  const DECAY_RATE = 0.08;

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    let delta = (now - prevTime) / 1000;
    prevTime = now;

    // Clamp delta to avoid huge jumps
    delta = Math.min(delta, 0.1);

    if (isPlaying) {
      simTime += delta * timeScale;
    }

    // --- Source pulsation ---
    const pulseScale = 1.0 + 0.1 * Math.sin(2 * Math.PI * frequency * simTime);
    sourceMesh.scale.setScalar(pulseScale);

    // Source emissive pulsation
    const emissiveIntensity = 0.3 + 0.3 * (0.5 + 0.5 * Math.sin(2 * Math.PI * frequency * simTime));
    sourceMat.emissiveIntensity = emissiveIntensity;
    glowMat.opacity = 0.1 + 0.1 * (0.5 + 0.5 * Math.sin(2 * Math.PI * frequency * simTime));

    // --- Wave rings ---
    for (let i = 0; i < waveRings.length; i++) {
      const phase = (simTime * frequency - i * 0.2) % 1.0;
      const radius = phase * 10;
      const opacity = Math.max(0, 0.3 * (1 - phase));
      waveRings[i].scale.setScalar(Math.max(0.01, radius));
      waveRings[i].material.opacity = opacity;
    }

    // --- Update particles ---
    let maxDisp = 0;

    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const px = p.baseX;
      const pz = p.baseZ;

      const dx = px - SOURCE_POS.x;
      const dz = pz - SOURCE_POS.z;
      const distTotal = Math.sqrt(dx * dx + dz * dz);

      // Compute accumulated phase considering medium changes along the path
      const phase = computePhase(px, pz, simTime);

      // Decay
      const decay = decayEnabled ? Math.exp(-DECAY_RATE * distTotal) : 1.0;

      // Displacement
      const disp = amplitude * Math.sin(2 * Math.PI * frequency * simTime - phase) * decay;

      const safeDisp = isFinite(disp) ? disp : 0;

      p.mesh.position.y = p.baseY + safeDisp;

      const absDisp = Math.abs(safeDisp);
      if (absDisp > maxDisp) maxDisp = absDisp;

      // Color
      const col = getDisplacementColor(safeDisp, amplitude);
      p.mesh.material.color.copy(col);
      p.mesh.material.emissive.copy(col);
      p.mesh.material.emissiveIntensity = 0.3 * Math.abs(safeDisp) / Math.max(amplitude, 0.1);
    }

    maxParticleDisplacement = isFinite(maxDisp) ? maxDisp : 0;

    // --- Zone pulsation ---
    const zonePulse = 0.5 + 0.5 * Math.sin(simTime * 2);
    zoneAir.material.opacity = 0.08 + 0.04 * zonePulse;
    zoneWater.material.opacity = 0.12 + 0.06 * zonePulse;
    zoneSteel.material.opacity = 0.08 + 0.04 * zonePulse;

    // --- Update state and HUD ---
    updateState();
    updateHUD();

    controls.update();
    renderer.render(scene, camera);
  }

  // --- Resize ---
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // --- Start ---
  updateState();
  animate();
})();
</script>
</body>
</html>
