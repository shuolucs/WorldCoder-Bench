<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound Wave Propagation Visualization</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #uiPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(10, 15, 30, 0.82);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 220px;
    }

    #hudPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(10, 15, 30, 0.82);
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      min-width: 240px;
      line-height: 1.5;
      font-size: 14px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    button, input[type="range"] {
      width: 100%;
      margin-top: 4px;
    }

    button {
      background: #1d3557;
      color: white;
      border: none;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #274c77;
    }

    label {
      font-size: 14px;
    }

    .hint {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="hudPanel">
    <div><strong>Sound Wave HUD</strong></div>
    <div>Frequency: <span id="freqDisplay">1.50</span> Hz</div>
    <div>Amplitude: <span id="ampDisplay">1.00</span></div>
    <div>Wave Speed Multiplier: <span id="speedDisplay">1.00</span>x</div>
    <div>Simulation Time: <span id="timeDisplay">0.00</span> s</div>
    <div>Wavelength (Air): <span id="wavelengthDisplay">0.67</span></div>
    <div>Decay: <span id="decayDisplay">On</span></div>
  </div>

  <div id="uiPanel">
    <div class="control-group">
      <button id="playPauseBtn">Pause</button>
    </div>
    <div class="control-group">
      <button id="resetBtn">Reset</button>
    </div>
    <div class="control-group">
      <label for="speedSlider">Simulation Speed</label>
      <input id="speedSlider" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
      <div><span id="speedSliderValue">1.0</span>x</div>
    </div>
    <div class="control-group">
      <label>
        <input id="decayToggle" type="checkbox" checked />
        Toggle Decay
      </label>
    </div>
    <div class="hint">
      Arrow Keys:<br>
      Up/Down = Frequency<br>
      Left/Right = Amplitude
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(4, 2, 0);

    // Lights
    scene.add(new THREE.AmbientLight(0x334466, 0.4));

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    // Grid floor
    const floorGeo = new THREE.PlaneGeometry(40, 40, 40, 40);
    const floorMat = new THREE.MeshBasicMaterial({
      color: 0x1a2a3a,
      wireframe: true,
      transparent: true,
      opacity: 0.55
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    // Source
    const sourcePosition = new THREE.Vector3(-12, 2, 0);
    const sourceGeo = new THREE.SphereGeometry(0.5, 24, 24);
    const sourceMat = new THREE.MeshStandardMaterial({
      color: 0x00ffff,
      emissive: 0x0088aa,
      emissiveIntensity: 0.8,
      metalness: 0.2,
      roughness: 0.3
    });
    const sourceSphere = new THREE.Mesh(sourceGeo, sourceMat);
    sourceSphere.position.copy(sourcePosition);
    scene.add(sourceSphere);

    // Medium density zones
    const zoneData = [
      { name: "Air", x: 0, color: 0x00ff00, opacity: 0.10, speed: 1.0 },
      { name: "Water", x: 6, color: 0x0066ff, opacity: 0.15, speed: 2.5 },
      { name: "Steel", x: 12, color: 0xff3300, opacity: 0.10, speed: 5.0 }
    ];

    const zoneWidth = 4;
    const zoneHeight = 4;
    const zoneDepth = 30;

    const labelCanvas = document.createElement("canvas");
    const labelCtx = labelCanvas.getContext("2d");

    function makeTextSprite(text, colorHex) {
      labelCanvas.width = 256;
      labelCanvas.height = 64;
      labelCtx.clearRect(0, 0, 256, 64);
      labelCtx.fillStyle = "rgba(0,0,0,0.0)";
      labelCtx.fillRect(0, 0, 256, 64);
      labelCtx.font = "28px Arial";
      labelCtx.textAlign = "center";
      labelCtx.textBaseline = "middle";
      labelCtx.fillStyle = "#" + colorHex.toString(16).padStart(6, "0");
      labelCtx.fillText(text, 128, 32);
      const tex = new THREE.CanvasTexture(labelCanvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(3.5, 0.9, 1);
      return sprite;
    }

    zoneData.forEach(z => {
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(zoneWidth, zoneHeight, zoneDepth),
        new THREE.MeshBasicMaterial({
          color: z.color,
          transparent: true,
          opacity: z.opacity,
          depthWrite: false
        })
      );
      box.position.set(z.x, 2, 0);
      scene.add(box);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(zoneWidth, zoneHeight, zoneDepth)),
        new THREE.LineBasicMaterial({ color: z.color, transparent: true, opacity: 0.5 })
      );
      edges.position.copy(box.position);
      scene.add(edges);

      const label = makeTextSprite(z.name, z.color);
      label.position.set(z.x, 4.8, 0);
      scene.add(label);
    });

    // Wave particle field
    const particleRows = 50;
    const particleCols = 50;
    const particleCount = particleRows * particleCols;
    const xMin = -10, xMax = 20;
    const zMin = -15, zMax = 15;
    const baseY = 2;

    const particleGeo = new THREE.SphereGeometry(0.08, 8, 8);
    const particles = new THREE.InstancedMesh(
      particleGeo,
      new THREE.MeshStandardMaterial({ vertexColors: true, roughness: 0.35, metalness: 0.1 }),
      particleCount
    );
    particles.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

    const colorArray = new Float32Array(particleCount * 3);
    particles.instanceColor = new THREE.InstancedBufferAttribute(colorArray, 3);

    const particleData = [];
    const dummy = new THREE.Object3D();

    let index = 0;
    for (let i = 0; i < particleRows; i++) {
      for (let j = 0; j < particleCols; j++) {
        const x = xMin + (j / (particleCols - 1)) * (xMax - xMin);
        const z = zMin + (i / (particleRows - 1)) * (zMax - zMin);
        const dist = Math.sqrt(
          (x - sourcePosition.x) * (x - sourcePosition.x) +
          (z - sourcePosition.z) * (z - sourcePosition.z)
        );
        particleData.push({ x, z, dist });

        dummy.position.set(x, baseY, z);
        dummy.scale.set(1, 1, 1);
        dummy.updateMatrix();
        particles.setMatrixAt(index, dummy.matrix);

        colorArray[index * 3 + 0] = 1;
        colorArray[index * 3 + 1] = 1;
        colorArray[index * 3 + 2] = 1;
        index++;
      }
    }

    scene.add(particles);

    // State
    const DEFAULTS = {
      frequency: 1.5,
      amplitude: 1.0,
      timeScale: 1.0,
      decayEnabled: true,
      isPlaying: true
    };

    let frequency = DEFAULTS.frequency;
    let amplitude = DEFAULTS.amplitude;
    let timeScale = DEFAULTS.timeScale;
    let decayEnabled = DEFAULTS.decayEnabled;
    let isPlaying = DEFAULTS.isPlaying;
    let simTime = 0;

    const speedAir = 1.0;
    const speedWater = 2.5;
    const speedSteel = 5.0;
    const decayFactor = 0.08;

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function getZoneSpeed(x) {
      if (x >= 10 && x <= 14) return speedSteel;
      if (x >= 4 && x <= 8) return speedWater;
      if (x >= -2 && x <= 2) return speedAir;
      return speedAir;
    }

    function displacementColor(normVal) {
      const c = new THREE.Color();
      const t = THREE.MathUtils.clamp(normVal, -1, 1);

      if (t > 0.05) {
        // white -> yellow -> red
        const warm = new THREE.Color().setHSL(0.08 - 0.08 * t, 1.0, 0.5 + 0.15 * (1 - t));
        c.lerpColors(new THREE.Color(1,1,1), warm, t);
      } else if (t < -0.05) {
        // white -> blue/purple
        const cool = new THREE.Color().setHSL(0.72 + 0.08 * (-t), 1.0, 0.55);
        c.lerpColors(new THREE.Color(1,1,1), cool, -t);
      } else {
        c.setRGB(1, 1, 1);
      }
      return c;
    }

    // UI refs
    const playPauseBtn = document.getElementById("playPauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const speedSlider = document.getElementById("speedSlider");
    const speedSliderValue = document.getElementById("speedSliderValue");
    const decayToggle = document.getElementById("decayToggle");

    const freqDisplay = document.getElementById("freqDisplay");
    const ampDisplay = document.getElementById("ampDisplay");
    const speedDisplay = document.getElementById("speedDisplay");
    const timeDisplay = document.getElementById("timeDisplay");
    const wavelengthDisplay = document.getElementById("wavelengthDisplay");
    const decayDisplay = document.getElementById("decayDisplay");

    function updateHUD() {
      const wavelengthAir = safeNumber(speedAir / frequency, 0);
      const dominantSpeed = safeNumber(getZoneSpeed(sourcePosition.x), 1);

      freqDisplay.textContent = safeNumber(frequency, DEFAULTS.frequency).toFixed(2);
      ampDisplay.textContent = safeNumber(amplitude, DEFAULTS.amplitude).toFixed(2);
      speedDisplay.textContent = safeNumber(dominantSpeed, 1).toFixed(2);
      timeDisplay.textContent = safeNumber(simTime, 0).toFixed(2);
      wavelengthDisplay.textContent = wavelengthAir.toFixed(2);
      decayDisplay.textContent = decayEnabled ? "On" : "Off";

      speedSliderValue.textContent = safeNumber(timeScale, 1).toFixed(1);
      playPauseBtn.textContent = isPlaying ? "Pause" : "Play";
    }

    function resetAll() {
      frequency = DEFAULTS.frequency;
      amplitude = DEFAULTS.amplitude;
      timeScale = DEFAULTS.timeScale;
      decayEnabled = DEFAULTS.decayEnabled;
      isPlaying = true;
      simTime = 0;

      speedSlider.value = String(DEFAULTS.timeScale);
      decayToggle.checked = DEFAULTS.decayEnabled;
      updateHUD();
    }

    playPauseBtn.addEventListener("click", () => {
      isPlaying = !isPlaying;
      updateHUD();
    });

    resetBtn.addEventListener("click", resetAll);

    speedSlider.addEventListener("input", () => {
      timeScale = safeNumber(parseFloat(speedSlider.value), 1.0);
      updateHUD();
    });

    decayToggle.addEventListener("change", () => {
      decayEnabled = !!decayToggle.checked;
      updateHUD();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") {
        frequency = Math.min(5.0, safeNumber(frequency + 0.25, DEFAULTS.frequency));
        e.preventDefault();
      } else if (e.key === "ArrowDown") {
        frequency = Math.max(0.5, safeNumber(frequency - 0.25, DEFAULTS.frequency));
        e.preventDefault();
      } else if (e.key === "ArrowRight") {
        amplitude = Math.min(3.0, safeNumber(amplitude + 0.2, DEFAULTS.amplitude));
        e.preventDefault();
      } else if (e.key === "ArrowLeft") {
        amplitude = Math.max(0.2, safeNumber(amplitude - 0.2, DEFAULTS.amplitude));
        e.preventDefault();
      }
      updateHUD();
    });

    window.__3D_STATE__ = {
      frequency,
      amplitude,
      timeScale,
      simTime,
      isPlaying,
      decayEnabled,
      wavelengthAir: speedAir / frequency,
      wavelengthWater: speedWater / frequency,
      wavelengthSteel: speedSteel / frequency,
      maxParticleDisplacement: 0,
      particleCount,
      speedAir,
      speedWater,
      speedSteel,
      sourcePosition: { x: sourcePosition.x, y: sourcePosition.y, z: sourcePosition.z }
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = safeNumber(clock.getDelta(), 0.016);
      if (isPlaying) {
        simTime = safeNumber(simTime + delta * timeScale, 0);
      }

      const omega = 2 * Math.PI * safeNumber(frequency, DEFAULTS.frequency);
      let maxParticleDisplacement = 0;

      // Pulse source
      const pulse = 1.0 + 0.1 * Math.sin(omega * simTime);
      const pulseSafe = THREE.MathUtils.clamp(safeNumber(pulse, 1), 0.9, 1.1);
      sourceSphere.scale.setScalar(pulseSafe);

      for (let i = 0; i < particleCount; i++) {
        const p = particleData[i];
        const localSpeed = getZoneSpeed(p.x);
        const wavelength = safeNumber(localSpeed / frequency, 0.001);
        const k = safeNumber((2 * Math.PI) / Math.max(wavelength, 0.001), 0);

        const attenuation = decayEnabled ? Math.exp(-decayFactor * p.dist) : 1.0;
        const disp = safeNumber(
          amplitude * Math.sin(omega * simTime - k * p.dist) * attenuation,
          0
        );

        const y = baseY + disp;
        maxParticleDisplacement = Math.max(maxParticleDisplacement, Math.abs(disp));

        dummy.position.set(p.x, y, p.z);
        dummy.scale.set(1, 1, 1);
        dummy.updateMatrix();
        particles.setMatrixAt(i, dummy.matrix);

        const norm = amplitude > 0 ? disp / Math.max(amplitude, 0.0001) : 0;
        const col = displacementColor(safeNumber(norm, 0));
        colorArray[i * 3 + 0] = col.r;
        colorArray[i * 3 + 1] = col.g;
        colorArray[i * 3 + 2] = col.b;
      }

      particles.instanceMatrix.needsUpdate = true;
      particles.instanceColor.needsUpdate = true;

      controls.update();
      updateHUD();

      window.__3D_STATE__.frequency = safeNumber(frequency, DEFAULTS.frequency);
      window.__3D_STATE__.amplitude = safeNumber(amplitude, DEFAULTS.amplitude);
      window.__3D_STATE__.timeScale = safeNumber(timeScale, DEFAULTS.timeScale);
      window.__3D_STATE__.simTime = safeNumber(simTime, 0);
      window.__3D_STATE__.isPlaying = !!isPlaying;
      window.__3D_STATE__.decayEnabled = !!decayEnabled;
      window.__3D_STATE__.wavelengthAir = safeNumber(speedAir / frequency, 0);
      window.__3D_STATE__.wavelengthWater = safeNumber(speedWater / frequency, 0);
      window.__3D_STATE__.wavelengthSteel = safeNumber(speedSteel / frequency, 0);
      window.__3D_STATE__.maxParticleDisplacement = safeNumber(maxParticleDisplacement, 0);
      window.__3D_STATE__.particleCount = particleCount;
      window.__3D_STATE__.speedAir = speedAir;
      window.__3D_STATE__.speedWater = speedWater;
      window.__3D_STATE__.speedSteel = speedSteel;
      window.__3D_STATE__.sourcePosition = {
        x: safeNumber(sourcePosition.x, 0),
        y: safeNumber(sourcePosition.y, 0),
        z: safeNumber(sourcePosition.z, 0)
      };

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    animate();
  </script>
</body>
</html>
