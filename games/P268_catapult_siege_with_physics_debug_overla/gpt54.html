<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Catapult Siege Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 16px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
    }

    #powerBarContainer {
      margin-top: 8px;
      width: 220px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.15);
    }

    #powerBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00ff00, #ffff00, #ff0000);
      transition: width 0.03s linear;
    }

    #debugIndicator {
      position: absolute;
      right: 12px;
      bottom: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 10;
    }

    #help {
      position: absolute;
      top: 12px;
      right: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      z-index: 10;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hudText"></div>
    <div id="powerBarContainer">
      <div id="powerBar"></div>
    </div>
  </div>

  <div id="help">
    SPACE: Charge / Fire<br>
    ↑/↓: Adjust Angle<br>
    R: Reset<br>
    D: Toggle Debug<br>
    Drag Mouse: Orbit Camera
  </div>

  <div id="debugIndicator">Debug: OFF</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(0x87CEEB);
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();

    // Camera
    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 30);
    camera.lookAt(0, 0, 0);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 5, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Debug materials
    const staticDebugMat = new THREE.MeshBasicMaterial({
      color: 0x00ff00,
      wireframe: true
    });
    const dynamicDebugMat = new THREE.MeshBasicMaterial({
      color: 0xff0000,
      wireframe: true
    });

    // Groups
    const catapult = new THREE.Group();
    catapult.name = "catapult";
    scene.add(catapult);

    const castleWall = new THREE.Group();
    castleWall.name = "castleWall";
    scene.add(castleWall);

    const debugGroup = new THREE.Group();
    scene.add(debugGroup);

    // Catapult setup
    const catapultPos = new THREE.Vector3(-20, 0, 0);
    catapult.position.copy(catapultPos);

    const woodMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
    const grayMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
    const boulderMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
    const brickMat = new THREE.MeshLambertMaterial({ color: 0xCC6633 });

    // Base
    const base = new THREE.Mesh(
      new THREE.BoxGeometry(4, 1, 2),
      woodMat
    );
    base.position.set(0, 0.5, 0);
    catapult.add(base);

    // Support
    const support = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 3, 0.5),
      woodMat
    );
    support.position.set(1.5, 2.0, 0);
    catapult.add(support);

    // Arm pivot group
    const armPivot = new THREE.Group();
    armPivot.position.set(1.5, 3.0, 0);
    catapult.add(armPivot);

    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 6, 0.3),
      woodMat
    );
    arm.position.set(0, 3, 0);
    armPivot.add(arm);

    const bucket = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 16, 16),
      grayMat
    );
    bucket.position.set(0, 6, 0);
    armPivot.add(bucket);

    // Boulder
    const boulder = new THREE.Mesh(
      new THREE.SphereGeometry(0.6, 20, 20),
      boulderMat
    );
    scene.add(boulder);

    // Wall bricks
    const bricks = [];
    const brickDebugs = [];
    const wallBaseX = 20;
    const wallBaseY = 1;
    const cols = 5;
    const rows = 3;
    const brickSpacing = 2;

    for (let row = 0; row < rows; row++) {
      for (let col = 0; col < cols; col++) {
        const brick = new THREE.Mesh(
          new THREE.BoxGeometry(2, 2, 2),
          brickMat.clone()
        );

        const x = wallBaseX + col * brickSpacing;
        const y = wallBaseY + row * brickSpacing;
        const z = 0;

        brick.position.set(x, y, z);
        castleWall.add(brick);

        const data = {
          mesh: brick,
          destroyed: false,
          initialPosition: new THREE.Vector3(x, y, z)
        };
        bricks.push(data);
      }
    }

    // Debug duplicates
    function createDebugMesh(sourceMesh, material) {
      const dbg = new THREE.Mesh(sourceMesh.geometry, material);
      dbg.position.copy(sourceMesh.getWorldPosition(new THREE.Vector3()));
      dbg.quaternion.copy(sourceMesh.getWorldQuaternion(new THREE.Quaternion()));
      dbg.scale.copy(sourceMesh.getWorldScale(new THREE.Vector3()));
      debugGroup.add(dbg);
      return dbg;
    }

    const debugObjects = {
      ground: null,
      base: null,
      support: null,
      arm: null,
      bucket: null,
      boulder: null
    };

    debugObjects.ground = new THREE.Mesh(ground.geometry, staticDebugMat);
    debugObjects.ground.rotation.copy(ground.rotation);
    debugObjects.ground.position.copy(ground.position);
    debugGroup.add(debugObjects.ground);

    debugObjects.base = createDebugMesh(base, staticDebugMat);
    debugObjects.support = createDebugMesh(support, staticDebugMat);
    debugObjects.arm = createDebugMesh(arm, dynamicDebugMat);
    debugObjects.bucket = createDebugMesh(bucket, dynamicDebugMat);
    debugObjects.boulder = new THREE.Mesh(boulder.geometry, dynamicDebugMat);
    debugGroup.add(debugObjects.boulder);

    for (const brickData of bricks) {
      const dbg = new THREE.Mesh(brickData.mesh.geometry, staticDebugMat);
      dbg.position.copy(brickData.mesh.position);
      debugGroup.add(dbg);
      brickDebugs.push(dbg);
    }

    debugGroup.visible = false;

    // Velocity vector line
    const velocityPoints = [new THREE.Vector3(), new THREE.Vector3()];
    const velocityGeom = new THREE.BufferGeometry().setFromPoints(velocityPoints);
    const velocityMat = new THREE.LineBasicMaterial({ color: 0xff0000 });
    const velocityLine = new THREE.Line(velocityGeom, velocityMat);
    velocityLine.visible = false;
    scene.add(velocityLine);

    // Game state
    const state = {
      power: 0,
      angle: 45,
      isCharging: false,
      isFiring: false,
      boulderPosition: { x: 0, y: 0, z: 0 },
      boulderVelocity: { x: 0, y: 0, z: 0 },
      bricksDestroyed: 0,
      shotsFired: 0,
      debugMode: false,
      gamePhase: "ready",
      bricks: [],
      armAngle: 45
    };

    window.__3D_STATE__ = state;

    const G = 9.81;
    let launchVelocity = new THREE.Vector3(0, 0, 0);
    let chargeStartTime = 0;
    let armAnimation = {
      active: false,
      t: 0,
      duration: 0.18,
      startDeg: 45,
      endDeg: -20
    };

    function degToRad(d) {
      return d * Math.PI / 180;
    }

    function getBucketWorldPosition() {
      return bucket.getWorldPosition(new THREE.Vector3());
    }

    function setArmAngleVisual(angleDeg) {
      armPivot.rotation.z = degToRad(angleDeg);
      state.armAngle = angleDeg;
    }

    function loadBoulderToBucket() {
      const p = getBucketWorldPosition();
      boulder.position.copy(p);
      launchVelocity.set(0, 0, 0);
      state.boulderPosition = { x: p.x, y: p.y, z: p.z };
      state.boulderVelocity = { x: 0, y: 0, z: 0 };
    }

    function resetWall() {
      bricks.forEach((brickData, i) => {
        brickData.destroyed = false;
        brickData.mesh.visible = true;
        brickData.mesh.position.copy(brickData.initialPosition);
        brickDebugs[i].visible = true;
        brickDebugs[i].position.copy(brickData.initialPosition);
      });
      state.bricksDestroyed = 0;
    }

    function resetGame() {
      state.power = 0;
      state.isCharging = false;
      state.isFiring = false;
      state.gamePhase = "ready";
      armAnimation.active = false;
      setArmAngleVisual(state.angle);
      loadBoulderToBucket();
      resetWall();
      velocityLine.visible = state.debugMode && state.isFiring;
    }

    function fireBoulder() {
      if (state.isFiring) return;

      const angleRad = degToRad(state.angle);
      const speed = state.power * 0.4;

      launchVelocity.x = speed * Math.cos(angleRad);
      launchVelocity.y = speed * Math.sin(angleRad);
      launchVelocity.z = 0;

      state.isFiring = true;
      state.gamePhase = "flying";
      state.shotsFired += 1;

      armAnimation.active = true;
      armAnimation.t = 0;
      armAnimation.startDeg = state.angle;
      armAnimation.endDeg = -20;

      velocityLine.visible = state.debugMode;
    }

    function updateHUD() {
      const hudText = document.getElementById("hudText");
      hudText.innerHTML =
        `Power: ${Math.round(state.power)}%<br>` +
        `Angle: ${Math.round(state.angle)}°<br>` +
        `Bricks Hit: ${state.bricksDestroyed}/15<br>` +
        `Shots Fired: ${state.shotsFired}`;

      document.getElementById("powerBar").style.width = `${state.power}%`;
      document.getElementById("debugIndicator").textContent =
        `Debug: ${state.debugMode ? "ON" : "OFF"}`;
    }

    function syncDebugMeshes() {
      debugObjects.base.position.copy(base.getWorldPosition(new THREE.Vector3()));
      debugObjects.base.quaternion.copy(base.getWorldQuaternion(new THREE.Quaternion()));

      debugObjects.support.position.copy(support.getWorldPosition(new THREE.Vector3()));
      debugObjects.support.quaternion.copy(support.getWorldQuaternion(new THREE.Quaternion()));

      debugObjects.arm.position.copy(arm.getWorldPosition(new THREE.Vector3()));
      debugObjects.arm.quaternion.copy(arm.getWorldQuaternion(new THREE.Quaternion()));

      debugObjects.bucket.position.copy(bucket.getWorldPosition(new THREE.Vector3()));
      debugObjects.bucket.quaternion.copy(bucket.getWorldQuaternion(new THREE.Quaternion()));

      debugObjects.boulder.position.copy(boulder.position);

      bricks.forEach((brickData, i) => {
        brickDebugs[i].position.copy(brickData.mesh.position);
        brickDebugs[i].visible = brickData.mesh.visible;
      });
    }

    function updateVelocityLine() {
      if (!state.debugMode || !state.isFiring) {
        velocityLine.visible = false;
        return;
      }

      velocityLine.visible = true;
      const start = boulder.position.clone();
      const vel = new THREE.Vector3(
        state.boulderVelocity.x,
        state.boulderVelocity.y,
        state.boulderVelocity.z
      );
      const end = start.clone().add(vel.multiplyScalar(0.25));

      velocityGeom.setFromPoints([start, end]);
    }

    function updateStateBricks() {
      state.bricks = bricks.map(b => ({
        intact: !b.destroyed,
        position: {
          x: b.mesh.position.x,
          y: b.mesh.position.y,
          z: b.mesh.position.z
        }
      }));
    }

    // Initial setup
    setArmAngleVisual(state.angle);
    loadBoulderToBucket();
    resetWall();
    updateStateBricks();
    updateHUD();

    // Input
    const keys = {};

    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;

      if (e.code === "Space") {
        e.preventDefault();
        if (!state.isCharging && !state.isFiring) {
          state.isCharging = true;
          state.gamePhase = "charging";
          chargeStartTime = performance.now();
          state.power = 0;
        }
      }

      if (e.code === "ArrowUp") {
        e.preventDefault();
        state.angle = Math.min(80, state.angle + 1);
        if (!state.isFiring && !armAnimation.active) {
          setArmAngleVisual(state.angle);
          loadBoulderToBucket();
        }
      }

      if (e.code === "ArrowDown") {
        e.preventDefault();
        state.angle = Math.max(20, state.angle - 1);
        if (!state.isFiring && !armAnimation.active) {
          setArmAngleVisual(state.angle);
          loadBoulderToBucket();
        }
      }

      if (e.code === "KeyR") {
        resetGame();
      }

      if (e.code === "KeyD") {
        state.debugMode = !state.debugMode;
        debugGroup.visible = state.debugMode;
        velocityLine.visible = state.debugMode && state.isFiring;
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;

      if (e.code === "Space") {
        e.preventDefault();
        if (state.isCharging && !state.isFiring) {
          state.isCharging = false;
          fireBoulder();
        }
      }
    });

    // Animation loop
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      // Charging
      if (state.isCharging) {
        const elapsed = (performance.now() - chargeStartTime) / 1000;
        state.power = Math.min(100, (elapsed / 2) * 100);
      }

      // Arm animation
      if (armAnimation.active) {
        armAnimation.t += dt / armAnimation.duration;
        const t = Math.min(armAnimation.t, 1);
        const current = THREE.MathUtils.lerp(
          armAnimation.startDeg,
          armAnimation.endDeg,
          t
        );
        setArmAngleVisual(current);

        if (t >= 1) {
          armAnimation.active = false;
        }
      } else if (!state.isFiring && !state.isCharging) {
        setArmAngleVisual(state.angle);
      }

      // Keep boulder in bucket if not fired
      if (!state.isFiring) {
        loadBoulderToBucket();
      }

      // Physics update
      if (state.isFiring) {
        boulder.position.x += launchVelocity.x * dt;
        boulder.position.y += launchVelocity.y * dt - 0.5 * G * dt * dt;
        boulder.position.z += launchVelocity.z * dt;
        launchVelocity.y -= G * dt;

        // Ground collision
        if (boulder.position.y <= 0.6) {
          boulder.position.y = 0.6;
          launchVelocity.set(0, 0, 0);
          state.isFiring = false;
          state.gamePhase = "landed";
        }

        // Brick collision
        for (let i = 0; i < bricks.length; i++) {
          const brickData = bricks[i];
          if (brickData.destroyed) continue;

          const dist = boulder.position.distanceTo(brickData.mesh.position);
          if (dist <= 1.5) {
            brickData.destroyed = true;
            brickData.mesh.visible = false;
            brickDebugs[i].visible = false;
            state.bricksDestroyed += 1;
          }
        }
      }

      // Update state object each frame
      state.boulderPosition = {
        x: boulder.position.x,
        y: boulder.position.y,
        z: boulder.position.z
      };

      state.boulderVelocity = {
        x: launchVelocity.x,
        y: launchVelocity.y,
        z: launchVelocity.z
      };

      updateStateBricks();
      updateHUD();
      syncDebugMeshes();
      updateVelocityLine();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
