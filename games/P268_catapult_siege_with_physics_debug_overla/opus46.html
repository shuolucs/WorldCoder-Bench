<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Catapult Siege Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 200px;
    border: 1px solid rgba(255,255,255,0.2);
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
  }

  #hud .label { color: #aaa; }
  #hud .value { color: #0f0; font-weight: bold; }

  #powerBarContainer {
    position: absolute;
    top: 180px;
    left: 15px;
    width: 200px;
    height: 24px;
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.3);
    overflow: hidden;
  }

  #powerBar {
    width: 0%;
    height: 100%;
    background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
    transition: width 0.05s linear;
    border-radius: 10px;
  }

  #debugIndicator {
    position: absolute;
    bottom: 15px;
    right: 15px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.2);
  }

  #controls {
    position: absolute;
    bottom: 15px;
    left: 15px;
    color: #ccc;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Power: </span><span class="value" id="hudPower">0%</span></div>
  <div><span class="label">Angle: </span><span class="value" id="hudAngle">45°</span></div>
  <div><span class="label">Bricks Hit: </span><span class="value" id="hudBricks">0/15</span></div>
  <div><span class="label">Shots Fired: </span><span class="value" id="hudShots">0</span></div>
  <div><span class="label">Phase: </span><span class="value" id="hudPhase">ready</span></div>
</div>

<div id="powerBarContainer">
  <div id="powerBar"></div>
</div>

<div id="debugIndicator">Debug: OFF</div>

<div id="controls">
  SPACE: Charge & Fire | ↑↓: Angle | R: Reset | D: Debug | Mouse: Orbit
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ RENDERER ============
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x87CEEB);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============ SCENE ============
const scene = new THREE.Scene();

// ============ CAMERA ============
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 15, 30);
camera.lookAt(0, 0, 0);

// ============ CONTROLS ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 3, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x404040);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 80;
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x4a8c3f });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ============ CATAPULT ============
const catapultGroup = new THREE.Group();
catapultGroup.name = 'catapult';
catapultGroup.position.set(-20, 0, 0);

// Base
const baseMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
const baseGeo = new THREE.BoxGeometry(4, 1, 2);
const base = new THREE.Mesh(baseGeo, baseMat);
base.position.set(0, 0.5, 0);
base.castShadow = true;
base.receiveShadow = true;
catapultGroup.add(base);

// Support
const supportGeo = new THREE.BoxGeometry(0.5, 3, 0.5);
const support = new THREE.Mesh(supportGeo, baseMat.clone());
support.position.set(1, 2.5, 0);
support.castShadow = true;
catapultGroup.add(support);

// Arm pivot point
const armPivot = new THREE.Group();
armPivot.position.set(1, 3.5, 0);
catapultGroup.add(armPivot);

// Arm
const armGeo = new THREE.BoxGeometry(0.3, 6, 0.3);
const arm = new THREE.Mesh(armGeo, baseMat.clone());
arm.position.set(0, 3, 0); // offset so pivot is at bottom
arm.castShadow = true;
armPivot.add(arm);

// Bucket at tip of arm
const bucketGeo = new THREE.SphereGeometry(0.5, 12, 12);
const bucketMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
const bucket = new THREE.Mesh(bucketGeo, bucketMat);
bucket.position.set(0, 6, 0);
bucket.castShadow = true;
armPivot.add(bucket);

// Set initial arm angle (45 degrees tilted back)
const initialArmAngle = Math.PI / 4; // 45 degrees
armPivot.rotation.z = initialArmAngle;

scene.add(catapultGroup);

// ============ PROJECTILE ============
const boulderGeo = new THREE.SphereGeometry(0.6, 16, 16);
const boulderMat = new THREE.MeshLambertMaterial({ color: 0x666666 });
const boulder = new THREE.Mesh(boulderGeo, boulderMat);
boulder.castShadow = true;
scene.add(boulder);

function getBucketWorldPos() {
  const pos = new THREE.Vector3();
  bucket.getWorldPosition(pos);
  return pos;
}

function resetBoulderToArm() {
  const pos = getBucketWorldPos();
  boulder.position.copy(pos);
  boulder.visible = true;
}

resetBoulderToArm();

// ============ CASTLE WALL ============
const castleWall = new THREE.Group();
castleWall.name = 'castleWall';
castleWall.position.set(20, 0, 0);

const brickMat = new THREE.MeshLambertMaterial({ color: 0xCC6633 });
const brickGeo = new THREE.BoxGeometry(2, 2, 2);

const bricks = [];
const brickMeshes = [];

for (let row = 0; row < 3; row++) {
  for (let col = 0; col < 5; col++) {
    const brick = new THREE.Mesh(brickGeo, brickMat.clone());
    const x = (col - 2) * 2.05;
    const y = 1 + row * 2.05;
    const z = 0;
    brick.position.set(x, y, z);
    brick.castShadow = true;
    brick.receiveShadow = true;
    castleWall.add(brick);
    brickMeshes.push(brick);
    bricks.push({
      intact: true,
      position: { x: 20 + x, y: y, z: z },
      mesh: brick
    });
  }
}

scene.add(castleWall);

// ============ DEBUG OVERLAY ============
const debugGroup = new THREE.Group();
debugGroup.name = 'debugOverlay';
debugGroup.visible = false;
scene.add(debugGroup);

// Debug wireframes for static objects (green)
const debugStaticMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
const debugDynamicMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });

// Ground wireframe
const groundDebug = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), debugStaticMat.clone());
groundDebug.rotation.x = -Math.PI / 2;
groundDebug.position.y = 0.01;
debugGroup.add(groundDebug);

// Base wireframe
const baseDebug = new THREE.Mesh(baseGeo.clone(), debugStaticMat.clone());
baseDebug.position.set(-20, 0.5, 0);
debugGroup.add(baseDebug);

// Support wireframe
const supportDebug = new THREE.Mesh(supportGeo.clone(), debugStaticMat.clone());
supportDebug.position.set(-19, 2.5, 0);
debugGroup.add(supportDebug);

// Brick wireframes
const brickDebugMeshes = [];
for (let i = 0; i < bricks.length; i++) {
  const bd = new THREE.Mesh(brickGeo.clone(), debugStaticMat.clone());
  bd.position.set(bricks[i].position.x, bricks[i].position.y, bricks[i].position.z);
  debugGroup.add(bd);
  brickDebugMeshes.push(bd);
}

// Boulder wireframe (dynamic - red)
const boulderDebug = new THREE.Mesh(boulderGeo.clone(), debugDynamicMat.clone());
debugGroup.add(boulderDebug);

// Arm wireframe (dynamic - red)
const armDebugGeo = new THREE.BoxGeometry(0.3, 6, 0.3);
const armDebug = new THREE.Mesh(armDebugGeo, debugDynamicMat.clone());
debugGroup.add(armDebug);

// Velocity vector arrow
const velocityLineMat = new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 2 });
const velocityLineGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0, 0, 0),
  new THREE.Vector3(1, 0, 0)
]);
const velocityLine = new THREE.Line(velocityLineGeo, velocityLineMat);
velocityLine.visible = false;
debugGroup.add(velocityLine);

// ============ STATE ============
const state = {
  power: 0,
  angle: 45,
  isCharging: false,
  isFiring: false,
  boulderPosition: { x: 0, y: 0, z: 0 },
  boulderVelocity: { x: 0, y: 0, z: 0 },
  bricksDestroyed: 0,
  shotsFired: 0,
  debugMode: false,
  gamePhase: 'ready',
  bricks: bricks.map(b => ({ intact: b.intact, position: { ...b.position } })),
  armAngle: 45
};

window.__3D_STATE__ = state;

// Physics state
let vx = 0, vy = 0, vz = 0;
const gravity = 9.81;
let chargeStartTime = 0;
let isAnimatingArm = false;
let armAnimProgress = 0;
const armAnimDuration = 0.15; // seconds
let boulderActive = false;

// ============ INPUT ============
const keys = {};

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  keys[e.code] = true;

  if (e.code === 'Space') {
    e.preventDefault();
    if (state.gamePhase === 'ready' || state.gamePhase === 'landed') {
      if (state.gamePhase === 'landed') {
        // Reset boulder for next shot
        armPivot.rotation.z = initialArmAngle;
        resetBoulderToArm();
        boulderActive = false;
        state.isFiring = false;
        state.gamePhase = 'ready';
      }
      state.isCharging = true;
      state.gamePhase = 'charging';
      state.power = 0;
      chargeStartTime = performance.now();
    }
  }

  if (e.code === 'ArrowUp') {
    state.angle = Math.min(80, state.angle + 2);
  }
  if (e.code === 'ArrowDown') {
    state.angle = Math.max(20, state.angle - 2);
  }

  if (e.code === 'KeyR') {
    resetGame();
  }

  if (e.code === 'KeyD') {
    state.debugMode = !state.debugMode;
    debugGroup.visible = state.debugMode;
    document.getElementById('debugIndicator').textContent = `Debug: ${state.debugMode ? 'ON' : 'OFF'}`;
    document.getElementById('debugIndicator').style.color = state.debugMode ? '#0f0' : '#fff';
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;

  if (e.code === 'Space' && state.isCharging) {
    e.preventDefault();
    state.isCharging = false;
    fireCatapult();
  }
});

function fireCatapult() {
  if (state.power < 1) {
    state.gamePhase = 'ready';
    state.power = 0;
    return;
  }

  state.gamePhase = 'flying';
  state.isFiring = true;
  state.shotsFired++;
  isAnimatingArm = true;
  armAnimProgress = 0;

  const angleRad = state.angle * Math.PI / 180;
  const speed = state.power * 0.4;
  vx = speed * Math.cos(angleRad);
  vy = speed * Math.sin(angleRad);
  vz = 0;
}

function resetGame() {
  // Reset arm
  armPivot.rotation.z = initialArmAngle;
  isAnimatingArm = false;
  armAnimProgress = 0;

  // Reset boulder
  boulderActive = false;
  resetBoulderToArm();
  vx = 0; vy = 0; vz = 0;

  // Reset bricks
  for (let i = 0; i < bricks.length; i++) {
    bricks[i].intact = true;
    bricks[i].mesh.visible = true;
    if (brickDebugMeshes[i]) brickDebugMeshes[i].visible = true;
  }

  // Reset state
  state.power = 0;
  state.isCharging = false;
  state.isFiring = false;
  state.bricksDestroyed = 0;
  state.shotsFired = 0;
  state.gamePhase = 'ready';
  state.armAngle = 45;
}

// ============ HUD ELEMENTS ============
const hudPower = document.getElementById('hudPower');
const hudAngle = document.getElementById('hudAngle');
const hudBricks = document.getElementById('hudBricks');
const hudShots = document.getElementById('hudShots');
const hudPhase = document.getElementById('hudPhase');
const powerBar = document.getElementById('powerBar');

// ============ ANIMATION LOOP ============
let lastTime = performance.now();

function animate(currentTime) {
  requestAnimationFrame(animate);

  const dt = Math.min((currentTime - lastTime) / 1000, 0.05);
  lastTime = currentTime;

  // Charging
  if (state.isCharging) {
    const elapsed = (currentTime - chargeStartTime) / 1000;
    state.power = Math.min(100, (elapsed / 2) * 100);
  }

  // Arm animation
  if (isAnimatingArm) {
    armAnimProgress += dt;
    const t = Math.min(armAnimProgress / armAnimDuration, 1);
    // Animate from initial angle to -PI/4 (forward swing)
    const targetAngle = -Math.PI / 3;
    armPivot.rotation.z = initialArmAngle + (targetAngle - initialArmAngle) * t;
    state.armAngle = (armPivot.rotation.z * 180) / Math.PI;

    // Keep boulder at bucket tip during animation
    if (!boulderActive) {
      resetBoulderToArm();
    }

    if (t >= 1) {
      isAnimatingArm = false;
      boulderActive = true;
      // Set boulder position to bucket tip
      const pos = getBucketWorldPos();
      boulder.position.copy(pos);
    }
  }

  // Boulder physics
  if (boulderActive && state.gamePhase === 'flying') {
    boulder.position.x += vx * dt;
    boulder.position.y += vy * dt - 0.5 * gravity * dt * dt;
    boulder.position.z += vz * dt;
    vy -= gravity * dt;

    // Ground collision
    if (boulder.position.y <= 0.6) {
      boulder.position.y = 0.6;
      vy = 0;
      vx = 0;
      vz = 0;
      state.gamePhase = 'landed';
      state.isFiring = false;
      boulderActive = false;
    }

    // Brick collision
    for (let i = 0; i < bricks.length; i++) {
      if (!bricks[i].intact) continue;
      const bp = bricks[i].position;
      const dx = boulder.position.x - bp.x;
      const dy = boulder.position.y - bp.y;
      const dz = boulder.position.z - bp.z;
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
      if (dist < 1.5) {
        bricks[i].intact = false;
        bricks[i].mesh.visible = false;
        if (brickDebugMeshes[i]) brickDebugMeshes[i].visible = false;
        state.bricksDestroyed++;
      }
    }
  }

  // If not active and not animating, keep boulder at bucket
  if (!boulderActive && !isAnimatingArm && (state.gamePhase === 'ready' || state.gamePhase === 'charging')) {
    resetBoulderToArm();
  }

  // Update debug overlay
  if (state.debugMode) {
    // Boulder debug
    boulderDebug.position.copy(boulder.position);

    // Arm debug - get world position/rotation
    const armWorldPos = new THREE.Vector3();
    const armWorldQuat = new THREE.Quaternion();
    arm.getWorldPosition(armWorldPos);
    arm.getWorldQuaternion(armWorldQuat);
    armDebug.position.copy(armWorldPos);
    armDebug.quaternion.copy(armWorldQuat);

    // Brick debug visibility
    for (let i = 0; i < bricks.length; i++) {
      if (brickDebugMeshes[i]) {
        brickDebugMeshes[i].visible = bricks[i].intact;
      }
    }

    // Velocity vector
    if (boulderActive && state.gamePhase === 'flying') {
      velocityLine.visible = true;
      const positions = velocityLine.geometry.attributes.position;
      positions.setXYZ(0, boulder.position.x, boulder.position.y, boulder.position.z);
      const scale = 0.3;
      positions.setXYZ(1,
        boulder.position.x + vx * scale,
        boulder.position.y + vy * scale,
        boulder.position.z + vz * scale
      );
      positions.needsUpdate = true;
    } else {
      velocityLine.visible = false;
    }
  }

  // Update state object
  state.boulderPosition = {
    x: boulder.position.x,
    y: boulder.position.y,
    z: boulder.position.z
  };
  state.boulderVelocity = { x: vx, y: vy, z: vz };
  state.bricks = bricks.map(b => ({ intact: b.intact, position: { ...b.position } }));
  state.armAngle = (armPivot.rotation.z * 180) / Math.PI;

  // Update HUD
  hudPower.textContent = `${Math.round(state.power)}%`;
  hudAngle.textContent = `${state.angle}°`;
  hudBricks.textContent = `${state.bricksDestroyed}/15`;
  hudShots.textContent = `${state.shotsFired}`;
  hudPhase.textContent = state.gamePhase;
  powerBar.style.width = `${state.power}%`;

  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate(performance.now());
</script>
</body>
</html>
