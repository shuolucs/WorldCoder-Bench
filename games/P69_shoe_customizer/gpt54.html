<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 程序化简化球鞋</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: rgba(255,255,255,0.92);
      --border: #d9dee7;
      --text: #1f2937;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f7f9fc 0%, #e9eef5 100%);
      color: var(--text);
    }
    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 280px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    #ui h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }
    label {
      font-size: 13px;
    }
    select, input[type="color"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: white;
      font-size: 13px;
    }
    input[type="checkbox"] {
      transform: scale(1.1);
      transform-origin: left center;
    }
    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #5b6472;
      line-height: 1.45;
    }
    canvas { display: block; }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <h2>球鞋区域编辑</h2>

    <div class="row">
      <label for="zoneSelect">区域</label>
      <select id="zoneSelect">
        <option value="sole">sole</option>
        <option value="upper">upper</option>
        <option value="tongue">tongue</option>
        <option value="laces">laces</option>
      </select>
    </div>

    <div class="row">
      <label for="zoneColor">颜色</label>
      <input id="zoneColor" type="color" value="#ffffff" />
    </div>

    <div class="row">
      <label for="zoneMaterial">材质</label>
      <select id="zoneMaterial">
        <option value="standard">standard</option>
        <option value="matte">matte</option>
        <option value="glossy">glossy</option>
      </select>
    </div>

    <div class="row">
      <label for="autoRotate">自动旋转</label>
      <input id="autoRotate" type="checkbox" checked />
    </div>

    <div class="hint">
      鼠标拖拽可旋转，滚轮缩放。<br />
      可分别修改 sole / upper / tongue / laces 的颜色与材质。
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf3f5f8);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(6.2, 4.2, 8.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.2;
    controls.target.set(0, 1.2, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.6));

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.4);
    dir1.position.set(6, 10, 8);
    dir1.castShadow = true;
    dir1.shadow.mapSize.set(1024, 1024);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir2.position.set(-8, 5, -6);
    scene.add(dir2);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(18, 64),
      new THREE.ShadowMaterial({ opacity: 0.14 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.02;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(24, 24, 0xd0d7e2, 0xe5eaf1);
    grid.position.y = 0;
    scene.add(grid);

    const MATERIAL_PRESETS = {
      standard: { roughness: 0.45, metalness: 0.08 },
      matte:    { roughness: 0.92, metalness: 0.02 },
      glossy:   { roughness: 0.14, metalness: 0.18 }
    };

    const zoneOrder = ['sole', 'upper', 'tongue', 'laces'];

    const zoneObjects = {
      sole: [],
      upper: [],
      tongue: [],
      laces: []
    };

    const zoneMeta = {
      sole:   { color: '#f7f7f7', material: 'standard' },
      upper:  { color: '#d7263d', material: 'matte' },
      tongue: { color: '#efefef', material: 'standard' },
      laces:  { color: '#ffffff', material: 'glossy' }
    };

    function createMeshMaterial(color, type) {
      const preset = MATERIAL_PRESETS[type] || MATERIAL_PRESETS.standard;
      return new THREE.MeshStandardMaterial({
        color,
        roughness: preset.roughness,
        metalness: preset.metalness
      });
    }

    function applyMaterialStyle(mesh, color, type) {
      const preset = MATERIAL_PRESETS[type] || MATERIAL_PRESETS.standard;
      mesh.material.color.set(color);
      mesh.material.roughness = preset.roughness;
      mesh.material.metalness = preset.metalness;
      mesh.material.needsUpdate = true;
    }

    function registerZoneMesh(zone, mesh) {
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      zoneObjects[zone].push(mesh);
      return mesh;
    }

    function createRoundedSoleGeometry() {
      const shape = new THREE.Shape();
      shape.moveTo(-2.35, 0.00);
      shape.quadraticCurveTo(-2.55, 0.55, -2.10, 0.95);
      shape.quadraticCurveTo(-1.00, 1.25, 0.30, 1.18);
      shape.quadraticCurveTo(1.55, 1.12, 2.45, 0.70);
      shape.quadraticCurveTo(2.78, 0.55, 2.92, 0.28);
      shape.quadraticCurveTo(3.02, 0.02, 2.78, -0.22);
      shape.quadraticCurveTo(2.08, -0.42, 0.60, -0.40);
      shape.quadraticCurveTo(-0.95, -0.42, -2.10, -0.20);
      shape.quadraticCurveTo(-2.35, -0.12, -2.35, 0.00);

      const extrude = new THREE.ExtrudeGeometry(shape, {
        depth: 1.2,
        bevelEnabled: true,
        bevelSegments: 3,
        steps: 1,
        bevelSize: 0.06,
        bevelThickness: 0.06,
        curveSegments: 24
      });

      extrude.center();
      extrude.rotateX(-Math.PI / 2);
      extrude.scale(1, 0.55, 1.0);
      return extrude;
    }

    function createUpperGeometry() {
      const shape = new THREE.Shape();
      shape.moveTo(-1.95, 0.00);
      shape.quadraticCurveTo(-1.65, 1.10, -0.70, 1.65);
      shape.quadraticCurveTo(0.30, 2.02, 1.35, 1.72);
      shape.quadraticCurveTo(2.15, 1.45, 2.40, 0.85);
      shape.lineTo(2.35, 0.15);
      shape.quadraticCurveTo(1.10, 0.35, -0.20, 0.35);
      shape.quadraticCurveTo(-1.15, 0.30, -1.95, 0.00);

      const extrude = new THREE.ExtrudeGeometry(shape, {
        depth: 0.95,
        bevelEnabled: true,
        bevelSegments: 2,
        steps: 1,
        bevelSize: 0.04,
        bevelThickness: 0.04,
        curveSegments: 20
      });

      extrude.center();
      extrude.rotateX(-Math.PI / 2);
      extrude.scale(0.95, 0.78, 0.9);
      return extrude;
    }

    function createTongueGeometry() {
      const shape = new THREE.Shape();
      shape.moveTo(-0.42, 0.0);
      shape.quadraticCurveTo(-0.52, 0.70, -0.36, 1.30);
      shape.quadraticCurveTo(-0.18, 1.92, 0.00, 2.10);
      shape.quadraticCurveTo(0.18, 1.92, 0.36, 1.30);
      shape.quadraticCurveTo(0.52, 0.70, 0.42, 0.0);
      shape.quadraticCurveTo(0.00, -0.08, -0.42, 0.0);

      const extrude = new THREE.ExtrudeGeometry(shape, {
        depth: 0.28,
        bevelEnabled: true,
        bevelSegments: 2,
        steps: 1,
        bevelSize: 0.03,
        bevelThickness: 0.02,
        curveSegments: 18
      });

      extrude.center();
      extrude.rotateX(-Math.PI / 2);
      return extrude;
    }

    function createLaceTube(radius = 0.045, depth = 0.18) {
      const points = [
        new THREE.Vector2(radius * 0.2, 0),
        new THREE.Vector2(radius, depth * 0.28),
        new THREE.Vector2(radius * 0.9, depth * 0.75),
        new THREE.Vector2(0, depth)
      ];
      const geo = new THREE.LatheGeometry(points, 16, 0, Math.PI * 2);
      geo.rotateZ(Math.PI / 2);
      return geo;
    }

    function buildShoe() {
      const shoe = new THREE.Group();
      shoe.name = 'shoe';

      const soleMat = createMeshMaterial(zoneMeta.sole.color, zoneMeta.sole.material);
      const upperMat = createMeshMaterial(zoneMeta.upper.color, zoneMeta.upper.material);
      const tongueMat = createMeshMaterial(zoneMeta.tongue.color, zoneMeta.tongue.material);
      const lacesMat = createMeshMaterial(zoneMeta.laces.color, zoneMeta.laces.material);

      const sole = registerZoneMesh('sole', new THREE.Mesh(createRoundedSoleGeometry(), soleMat));
      sole.position.set(0, 0.40, 0);
      shoe.add(sole);

      const soleBand = registerZoneMesh(
        'sole',
        new THREE.Mesh(new THREE.BoxGeometry(4.8, 0.18, 1.25), createMeshMaterial(zoneMeta.sole.color, zoneMeta.sole.material))
      );
      soleBand.position.set(0.10, 0.22, 0);
      shoe.add(soleBand);

      const heelBlock = registerZoneMesh(
        'sole',
        new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.30, 1.15), createMeshMaterial(zoneMeta.sole.color, zoneMeta.sole.material))
      );
      heelBlock.position.set(-1.75, 0.18, 0);
      shoe.add(heelBlock);

      const upper = registerZoneMesh('upper', new THREE.Mesh(createUpperGeometry(), upperMat));
      upper.position.set(0.06, 1.10, 0);
      shoe.add(upper);

      const toeBox = registerZoneMesh(
        'upper',
        new THREE.Mesh(new THREE.BoxGeometry(1.45, 0.68, 1.0), createMeshMaterial(zoneMeta.upper.color, zoneMeta.upper.material))
      );
      toeBox.position.set(1.55, 0.95, 0);
      toeBox.rotation.z = -0.1;
      shoe.add(toeBox);

      const collar = registerZoneMesh(
        'upper',
        new THREE.Mesh(new THREE.BoxGeometry(1.15, 0.72, 0.95), createMeshMaterial(zoneMeta.upper.color, zoneMeta.upper.material))
      );
      collar.position.set(-0.75, 1.62, 0);
      collar.rotation.z = 0.22;
      shoe.add(collar);

      const tongue = registerZoneMesh('tongue', new THREE.Mesh(createTongueGeometry(), tongueMat));
      tongue.position.set(-0.05, 1.45, 0);
      tongue.rotation.z = 0.08;
      shoe.add(tongue);

      const laceBaseGeo = new THREE.BoxGeometry(0.82, 0.08, 0.12);
      const laceTubeGeo = createLaceTube(0.045, 0.14);

      for (let i = 0; i < 5; i++) {
        const y = 1.35 + i * 0.18;
        const lace = registerZoneMesh(
          'laces',
          new THREE.Mesh(laceBaseGeo, createMeshMaterial(zoneMeta.laces.color, zoneMeta.laces.material))
        );
        lace.position.set(0.12 - i * 0.02, y, 0);
        lace.rotation.z = 0.08;
        shoe.add(lace);

        const eyeletL = registerZoneMesh(
          'laces',
          new THREE.Mesh(laceTubeGeo, createMeshMaterial(zoneMeta.laces.color, zoneMeta.laces.material))
        );
        eyeletL.position.set(-0.33 - i * 0.02, y, -0.18);
        shoe.add(eyeletL);

        const eyeletR = registerZoneMesh(
          'laces',
          new THREE.Mesh(laceTubeGeo, createMeshMaterial(zoneMeta.laces.color, zoneMeta.laces.material))
        );
        eyeletR.position.set(0.55 - i * 0.02, y, 0.18);
        shoe.add(eyeletR);
      }

      shoe.rotation.y = -0.55;
      shoe.position.y = 0.02;
      return shoe;
    }

    const shoe = buildShoe();
    scene.add(shoe);

    const zoneSelect = document.getElementById('zoneSelect');
    const zoneColor = document.getElementById('zoneColor');
    const zoneMaterial = document.getElementById('zoneMaterial');
    const autoRotateInput = document.getElementById('autoRotate');

    window.__3D_STATE__ = {
      zones: [
        { name: 'sole', color: zoneMeta.sole.color, material: zoneMeta.sole.material },
        { name: 'upper', color: zoneMeta.upper.color, material: zoneMeta.upper.material },
        { name: 'tongue', color: zoneMeta.tongue.color, material: zoneMeta.tongue.material },
        { name: 'laces', color: zoneMeta.laces.color, material: zoneMeta.laces.material }
      ],
      selectedZone: 'sole',
      autoRotate: true
    };

    function syncControlsFromState() {
      const zone = window.__3D_STATE__.selectedZone;
      const entry = window.__3D_STATE__.zones.find(z => z.name === zone);
      zoneSelect.value = zone;
      zoneColor.value = entry.color;
      zoneMaterial.value = entry.material;
      autoRotateInput.checked = window.__3D_STATE__.autoRotate;
      controls.autoRotate = window.__3D_STATE__.autoRotate;
    }

    function updateZoneVisual(zoneName) {
      const entry = window.__3D_STATE__.zones.find(z => z.name === zoneName);
      zoneObjects[zoneName].forEach(mesh => {
        applyMaterialStyle(mesh, entry.color, entry.material);
      });
    }

    function setSelectedZone(zoneName) {
      window.__3D_STATE__.selectedZone = zoneName;
      syncControlsFromState();
    }

    zoneSelect.addEventListener('change', (e) => {
      setSelectedZone(e.target.value);
    });

    zoneColor.addEventListener('input', (e) => {
      const zoneName = window.__3D_STATE__.selectedZone;
      const entry = window.__3D_STATE__.zones.find(z => z.name === zoneName);
      entry.color = e.target.value;
      updateZoneVisual(zoneName);
    });

    zoneMaterial.addEventListener('change', (e) => {
      const zoneName = window.__3D_STATE__.selectedZone;
      const entry = window.__3D_STATE__.zones.find(z => z.name === zoneName);
      entry.material = e.target.value;
      updateZoneVisual(zoneName);
    });

    autoRotateInput.addEventListener('change', (e) => {
      window.__3D_STATE__.autoRotate = e.target.checked;
      controls.autoRotate = e.target.checked;
    });

    syncControlsFromState();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
