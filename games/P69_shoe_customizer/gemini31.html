<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Sneaker</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 12px;
            color: #fff;
            width: 240px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        label {
            font-size: 14px;
            font-weight: 500;
        }
        select, input[type="color"] {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 14px;
            outline: none;
            width: 120px;
            cursor: pointer;
        }
        input[type="color"] {
            padding: 2px 4px;
            height: 32px;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <div class="control-group">
            <label for="zoneSelect">Zone</label>
            <select id="zoneSelect">
                <option value="sole">sole</option>
                <option value="upper">upper</option>
                <option value="tongue">tongue</option>
                <option value="laces">laces</option>
            </select>
        </div>
        <div class="control-group">
            <label for="zoneColor">Color</label>
            <input type="color" id="zoneColor">
        </div>
        <div class="control-group">
            <label for="zoneMaterial">Material</label>
            <select id="zoneMaterial">
                <option value="standard">standard</option>
                <option value="matte">matte</option>
                <option value="glossy">glossy</option>
            </select>
        </div>
        <div class="control-group">
            <label for="autoRotate">Auto Rotate</label>
            <input type="checkbox" id="autoRotate">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            zones: [
                { name: "sole", color: "#ffffff", material: "matte" },
                { name: "upper", color: "#ff3366", material: "standard" },
                { name: "tongue", color: "#222222", material: "standard" },
                { name: "laces", color: "#ffffff", material: "glossy" }
            ],
            selectedZone: "upper",
            autoRotate: true
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x1a1a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
        fillLight.position.set(-10, 10, -10);
        scene.add(fillLight);

        // --- Environment ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0x222222, 
            roughness: 0.8, 
            metalness: 0.2 
        });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Procedural Sneaker Generation ---
        const shoeGroup = new THREE.Group();
        scene.add(shoeGroup);

        const materials = {
            sole: new THREE.MeshStandardMaterial(),
            upper: new THREE.MeshStandardMaterial(),
            tongue: new THREE.MeshStandardMaterial(),
            laces: new THREE.MeshStandardMaterial()
        };

        // 1. Sole
        const soleShape = new THREE.Shape();
        soleShape.moveTo(-4.5, -1.8);
        soleShape.quadraticCurveTo(2, -2.2, 4.5, -1.5);
        soleShape.quadraticCurveTo(5.5, 0, 4.5, 1.5);
        soleShape.quadraticCurveTo(2, 2.2, -4.5, 1.8);
        soleShape.quadraticCurveTo(-5.5, 0, -4.5, -1.8);
        
        const soleExtrudeSettings = { depth: 1, bevelEnabled: true, bevelSegments: 3, steps: 1, bevelSize: 0.2, bevelThickness: 0.2 };
        const soleGeo = new THREE.ExtrudeGeometry(soleShape, soleExtrudeSettings);
        soleGeo.center();
        const soleMesh = new THREE.Mesh(soleGeo, materials.sole);
        soleMesh.rotation.x = Math.PI / 2;
        soleMesh.position.y = 0.6;
        soleMesh.castShadow = true;
        soleMesh.receiveShadow = true;
        shoeGroup.add(soleMesh);

        // 2. Upper
        const upperGroup = new THREE.Group();
        
        // Main Body
        const upperMainGeo = new THREE.BoxGeometry(7.5, 2.8, 3.6);
        const upperMain = new THREE.Mesh(upperMainGeo, materials.upper);
        upperMain.position.set(-1.2, 2.6, 0);
        upperMain.castShadow = true;
        upperGroup.add(upperMain);

        // Toe Box
        const toeGeo = new THREE.CylinderGeometry(1.8, 1.8, 3.6, 32, 1, false, 0, Math.PI);
        const toeMesh = new THREE.Mesh(toeGeo, materials.upper);
        toeMesh.rotation.x = Math.PI / 2;
        toeMesh.rotation.z = -Math.PI / 2;
        toeMesh.position.set(2.55, 1.2, 0);
        toeMesh.castShadow = true;
        upperGroup.add(toeMesh);

        // Heel Collar
        const heelGeo = new THREE.CylinderGeometry(1.8, 1.8, 2.8, 32);
        const heelMesh = new THREE.Mesh(heelGeo, materials.upper);
        heelMesh.position.set(-4.95, 2.6, 0);
        heelMesh.castShadow = true;
        upperGroup.add(heelMesh);

        shoeGroup.add(upperGroup);

        // 3. Tongue
        const tongueGeo = new THREE.BoxGeometry(3, 4.5, 0.3);
        const tongueMesh = new THREE.Mesh(tongueGeo, materials.tongue);
        tongueMesh.position.set(1.2, 3.8, 0);
        tongueMesh.rotation.z = -Math.PI / 5;
        tongueMesh.castShadow = true;
        shoeGroup.add(tongueMesh);

        // 4. Laces
        const lacesGroup = new THREE.Group();
        for (let i = 0; i < 5; i++) {
            const laceGeo = new THREE.CylinderGeometry(0.08, 0.08, 3.8, 8);
            const laceMesh = new THREE.Mesh(laceGeo, materials.laces);
            laceMesh.rotation.x = Math.PI / 2;
            laceMesh.rotation.z = (i % 2 === 0 ? 1 : -1) * 0.15;
            laceMesh.position.set(0.2 + i * 0.6, 3.5 - i * 0.2, 0);
            laceMesh.castShadow = true;
            lacesGroup.add(laceMesh);
        }
        shoeGroup.add(lacesGroup);

        // Center the whole shoe
        shoeGroup.position.x = 0.5;

        // --- Logic & UI Sync ---
        const ui = {
            select: document.getElementById('zoneSelect'),
            color: document.getElementById('zoneColor'),
            material: document.getElementById('zoneMaterial'),
            autoRotate: document.getElementById('autoRotate')
        };

        function applyMaterialProps(mat, type) {
            switch (type) {
                case 'matte':
                    mat.roughness = 0.9;
                    mat.metalness = 0.0;
                    break;
                case 'glossy':
                    mat.roughness = 0.1;
                    mat.metalness = 0.4;
                    break;
                case 'standard':
                default:
                    mat.roughness = 0.5;
                    mat.metalness = 0.1;
                    break;
            }
            mat.needsUpdate = true;
        }

        function update3DFromState() {
            window.__3D_STATE__.zones.forEach(zone => {
                const mat = materials[zone.name];
                if (mat) {
                    mat.color.set(zone.color);
                    applyMaterialProps(mat, zone.material);
                }
            });
            controls.autoRotate = window.__3D_STATE__.autoRotate;
        }

        function syncUIFromState() {
            const state = window.__3D_STATE__;
            ui.select.value = state.selectedZone;
            
            const activeZone = state.zones.find(z => z.name === state.selectedZone);
            if (activeZone) {
                ui.color.value = activeZone.color;
                ui.material.value = activeZone.material;
            }
            
            ui.autoRotate.checked = state.autoRotate;
        }

        // Initial Sync
        update3DFromState();
        syncUIFromState();

        // --- Event Listeners ---
        ui.select.addEventListener('change', (e) => {
            window.__3D_STATE__.selectedZone = e.target.value;
            syncUIFromState();
        });

        ui.color.addEventListener('input', (e) => {
            const state = window.__3D_STATE__;
            const activeZone = state.zones.find(z => z.name === state.selectedZone);
            if (activeZone) {
                activeZone.color = e.target.value;
                materials[state.selectedZone].color.set(e.target.value);
            }
        });

        ui.material.addEventListener('change', (e) => {
            const state = window.__3D_STATE__;
            const activeZone = state.zones.find(z => z.name === state.selectedZone);
            if (activeZone) {
                activeZone.material = e.target.value;
                applyMaterialProps(materials[state.selectedZone], e.target.value);
            }
        });

        ui.autoRotate.addEventListener('change', (e) => {
            window.__3D_STATE__.autoRotate = e.target.checked;
            controls.autoRotate = e.target.checked;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
