<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Shoe Customizer</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #controls {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(15, 15, 35, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 24px;
    color: #e0e0e0;
    width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  
  #controls h2 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-weight: 600;
  }
  
  .control-group {
    margin-bottom: 16px;
  }
  
  .control-group label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #aaa;
    margin-bottom: 6px;
    font-weight: 500;
  }
  
  select, input[type="color"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 14px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  
  select:hover, input[type="color"]:hover {
    border-color: rgba(255,255,255,0.3);
  }
  
  select:focus {
    border-color: #6c63ff;
  }
  
  select option {
    background: #1a1a2e;
    color: #fff;
  }
  
  input[type="color"] {
    height: 44px;
    padding: 4px;
  }
  
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    padding: 10px 12px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    cursor: pointer;
    transition: background 0.2s;
  }
  
  .checkbox-group:hover {
    background: rgba(255,255,255,0.1);
  }
  
  .checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #6c63ff;
    cursor: pointer;
  }
  
  .checkbox-group span {
    font-size: 14px;
    color: #ccc;
    user-select: none;
  }
  
  .divider {
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 18px 0;
  }
  
  #title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #fff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  
  #title h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  
  #title p {
    font-size: 13px;
    color: #888;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div id="title">
  <h1>👟 Shoe Studio</h1>
  <p>Customize your sneaker in 3D</p>
</div>

<div id="controls">
  <h2>🎨 Customize</h2>
  
  <div class="control-group">
    <label for="zoneSelect">Zone</label>
    <select id="zoneSelect">
      <option value="sole">Sole</option>
      <option value="upper">Upper</option>
      <option value="tongue">Tongue</option>
      <option value="laces">Laces</option>
    </select>
  </div>
  
  <div class="control-group">
    <label for="zoneColor">Color</label>
    <input type="color" id="zoneColor" value="#ffffff">
  </div>
  
  <div class="control-group">
    <label for="zoneMaterial">Material</label>
    <select id="zoneMaterial">
      <option value="standard">Standard</option>
      <option value="matte">Matte</option>
      <option value="glossy">Glossy</option>
    </select>
  </div>
  
  <div class="divider"></div>
  
  <div class="checkbox-group" onclick="document.getElementById('autoRotate').click()">
    <input type="checkbox" id="autoRotate" checked>
    <span>Auto Rotate</span>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(4, 3, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;
controls.minDistance = 3;
controls.maxDistance = 12;
controls.target.set(0, 0.5, 0);

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.4);
fillLight.position.set(-3, 4, -3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xff8844, 0.3);
rimLight.position.set(0, 2, -5);
scene.add(rimLight);

// ─── Ground ───
const groundGeo = new THREE.CircleGeometry(8, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x151528, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(16, 32, 0x2a2a4a, 0x1e1e3a);
gridHelper.position.y = 0;
scene.add(gridHelper);

// ─── Material Presets ───
function createMaterial(type, color) {
  const c = new THREE.Color(color);
  switch(type) {
    case 'matte':
      return new THREE.MeshStandardMaterial({ color: c, roughness: 1.0, metalness: 0.0 });
    case 'glossy':
      return new THREE.MeshStandardMaterial({ color: c, roughness: 0.1, metalness: 0.6 });
    case 'standard':
    default:
      return new THREE.MeshStandardMaterial({ color: c, roughness: 0.5, metalness: 0.1 });
  }
}

// ─── Shoe Construction ───
const shoeGroup = new THREE.Group();

// Zone data
const zoneData = {
  sole:   { color: '#333333', material: 'standard', meshes: [] },
  upper:  { color: '#ffffff', material: 'standard', meshes: [] },
  tongue: { color: '#cccccc', material: 'standard', meshes: [] },
  laces:  { color: '#ff4444', material: 'standard', meshes: [] }
};

// ── SOLE ──
function buildSole() {
  const soleShape = new THREE.Shape();
  // Shoe sole outline (top view) - elongated oval
  soleShape.moveTo(-1.4, 0);
  soleShape.bezierCurveTo(-1.4, 0.55, -1.1, 0.75, -0.5, 0.78);
  soleShape.bezierCurveTo(0.0, 0.8, 0.6, 0.75, 1.0, 0.65);
  soleShape.bezierCurveTo(1.3, 0.58, 1.5, 0.4, 1.55, 0.15);
  soleShape.bezierCurveTo(1.58, 0.0, 1.55, -0.15, 1.5, -0.25);
  soleShape.bezierCurveTo(1.3, -0.58, 1.0, -0.65, 0.6, -0.7);
  soleShape.bezierCurveTo(0.0, -0.75, -0.5, -0.78, -1.0, -0.7);
  soleShape.bezierCurveTo(-1.3, -0.6, -1.4, -0.45, -1.4, 0);

  const extrudeSettings = {
    steps: 1,
    depth: 0.25,
    bevelEnabled: true,
    bevelThickness: 0.05,
    bevelSize: 0.05,
    bevelSegments: 3
  };

  const soleGeo = new THREE.ExtrudeGeometry(soleShape, extrudeSettings);
  soleGeo.rotateX(-Math.PI / 2);
  soleGeo.translate(0, 0.05, 0);

  const soleMat = createMaterial(zoneData.sole.material, zoneData.sole.color);
  const soleMesh = new THREE.Mesh(soleGeo, soleMat);
  soleMesh.castShadow = true;
  soleMesh.receiveShadow = true;
  shoeGroup.add(soleMesh);
  zoneData.sole.meshes.push(soleMesh);

  // Midsole - slightly smaller, on top
  const midShape = new THREE.Shape();
  midShape.moveTo(-1.3, 0);
  midShape.bezierCurveTo(-1.3, 0.5, -1.0, 0.68, -0.45, 0.72);
  midShape.bezierCurveTo(0.0, 0.74, 0.55, 0.7, 0.95, 0.6);
  midShape.bezierCurveTo(1.25, 0.52, 1.42, 0.35, 1.45, 0.12);
  midShape.bezierCurveTo(1.48, 0.0, 1.45, -0.12, 1.42, -0.22);
  midShape.bezierCurveTo(1.25, -0.52, 0.95, -0.6, 0.55, -0.65);
  midShape.bezierCurveTo(0.0, -0.7, -0.45, -0.72, -0.95, -0.65);
  midShape.bezierCurveTo(-1.25, -0.55, -1.3, -0.4, -1.3, 0);

  const midSettings = {
    steps: 1,
    depth: 0.15,
    bevelEnabled: true,
    bevelThickness: 0.03,
    bevelSize: 0.03,
    bevelSegments: 2
  };

  const midGeo = new THREE.ExtrudeGeometry(midShape, midSettings);
  midGeo.rotateX(-Math.PI / 2);
  midGeo.translate(0, 0.3, 0);

  const midMesh = new THREE.Mesh(midGeo, soleMat);
  midMesh.castShadow = true;
  shoeGroup.add(midMesh);
  zoneData.sole.meshes.push(midMesh);
}

// ── UPPER ──
function buildUpper() {
  const upperMat = createMaterial(zoneData.upper.material, zoneData.upper.color);

  // Main upper body - use a series of shapes to create the shoe upper
  // Back heel part
  const heelShape = new THREE.Shape();
  heelShape.moveTo(-1.3, 0);
  heelShape.bezierCurveTo(-1.3, 0.48, -1.0, 0.65, -0.4, 0.7);
  heelShape.bezierCurveTo(0.0, 0.72, 0.5, 0.68, 0.9, 0.58);
  heelShape.bezierCurveTo(1.2, 0.5, 1.38, 0.33, 1.42, 0.1);
  heelShape.bezierCurveTo(1.45, 0.0, 1.42, -0.1, 1.38, -0.2);
  heelShape.bezierCurveTo(1.2, -0.5, 0.9, -0.58, 0.5, -0.63);
  heelShape.bezierCurveTo(0.0, -0.68, -0.4, -0.7, -0.9, -0.63);
  heelShape.bezierCurveTo(-1.2, -0.53, -1.3, -0.38, -1.3, 0);

  // Inner hole (opening)
  const holePath = new THREE.Path();
  holePath.moveTo(-0.6, 0);
  holePath.bezierCurveTo(-0.6, 0.22, -0.4, 0.3, -0.1, 0.28);
  holePath.bezierCurveTo(0.2, 0.26, 0.5, 0.2, 0.6, 0.08);
  holePath.bezierCurveTo(0.65, 0.0, 0.6, -0.08, 0.5, -0.15);
  holePath.bezierCurveTo(0.2, -0.26, -0.1, -0.28, -0.4, -0.25);
  holePath.bezierCurveTo(-0.6, -0.2, -0.6, -0.1, -0.6, 0);
  heelShape.holes.push(holePath);

  const upperSettings = {
    steps: 2,
    depth: 0.7,
    bevelEnabled: true,
    bevelThickness: 0.02,
    bevelSize: 0.02,
    bevelSegments: 2
  };

  const upperGeo = new THREE.ExtrudeGeometry(heelShape, upperSettings);
  upperGeo.rotateX(-Math.PI / 2);
  upperGeo.translate(0, 0.45, 0);

  const upperMesh = new THREE.Mesh(upperGeo, upperMat);
  upperMesh.castShadow = true;
  shoeGroup.add(upperMesh);
  zoneData.upper.meshes.push(upperMesh);

  // Toe cap - rounded front
  const toeGeo = new THREE.SphereGeometry(0.45, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2);
  toeGeo.scale(1.0, 0.8, 1.2);
  const toeMesh = new THREE.Mesh(toeGeo, upperMat);
  toeMesh.position.set(1.15, 0.45, 0);
  toeMesh.castShadow = true;
  shoeGroup.add(toeMesh);
  zoneData.upper.meshes.push(toeMesh);

  // Heel counter
  const heelCounterGeo = new THREE.BoxGeometry(0.15, 0.55, 0.9);
  heelCounterGeo.translate(0, 0, 0);
  const heelCounterMesh = new THREE.Mesh(heelCounterGeo, upperMat);
  heelCounterMesh.position.set(-1.32, 0.7, 0);
  heelCounterMesh.castShadow = true;
  shoeGroup.add(heelCounterMesh);
  zoneData.upper.meshes.push(heelCounterMesh);

  // Side panels (left and right)
  for (let side of [-1, 1]) {
    const panelShape = new THREE.Shape();
    panelShape.moveTo(-1.3, 0.45);
    panelShape.lineTo(0.8, 0.45);
    panelShape.bezierCurveTo(1.1, 0.45, 1.3, 0.6, 1.2, 0.8);
    panelShape.lineTo(0.3, 1.1);
    panelShape.lineTo(-0.5, 1.15);
    panelShape.bezierCurveTo(-0.9, 1.1, -1.2, 1.0, -1.3, 0.9);
    panelShape.lineTo(-1.3, 0.45);

    const panelGeo = new THREE.ShapeGeometry(panelShape);
    const panelMesh = new THREE.Mesh(panelGeo, upperMat);
    panelMesh.position.set(0, 0, side * 0.7);
    panelMesh.rotation.y = side > 0 ? 0 : Math.PI;
    panelMesh.castShadow = true;
    shoeGroup.add(panelMesh);
    zoneData.upper.meshes.push(panelMesh);
  }
}

// ── TONGUE ──
function buildTongue() {
  const tongueMat = createMaterial(zoneData.tongue.material, zoneData.tongue.color);

  const tongueShape = new THREE.Shape();
  tongueShape.moveTo(-0.25, 0);
  tongueShape.lineTo(0.25, 0);
  tongueShape.bezierCurveTo(0.3, 0.3, 0.28, 0.6, 0.2, 0.85);
  tongueShape.bezierCurveTo(0.15, 1.0, 0.05, 1.05, 0, 1.08);
  tongueShape.bezierCurveTo(-0.05, 1.05, -0.15, 1.0, -0.2, 0.85);
  tongueShape.bezierCurveTo(-0.28, 0.6, -0.3, 0.3, -0.25, 0);

  const tongueSettings = {
    steps: 1,
    depth: 0.06,
    bevelEnabled: true,
    bevelThickness: 0.02,
    bevelSize: 0.02,
    bevelSegments: 2
  };

  const tongueGeo = new THREE.ExtrudeGeometry(tongueShape, tongueSettings);
  const tongueMesh = new THREE.Mesh(tongueGeo, tongueMat);
  tongueMesh.position.set(0.1, 0.85, -0.03);
  tongueMesh.rotation.x = 0;
  tongueMesh.rotation.z = -0.3;
  tongueMesh.castShadow = true;
  shoeGroup.add(tongueMesh);
  zoneData.tongue.meshes.push(tongueMesh);

  // Tongue padding (thicker top part)
  const padGeo = new THREE.BoxGeometry(0.35, 0.5, 0.08);
  padGeo.translate(0, 0.3, 0);
  const padMesh = new THREE.Mesh(padGeo, tongueMat);
  padMesh.position.set(0.0, 1.1, 0);
  padMesh.rotation.z = -0.3;
  padMesh.castShadow = true;
  shoeGroup.add(padMesh);
  zoneData.tongue.meshes.push(padMesh);
}

// ── LACES ──
function buildLaces() {
  const laceMat = createMaterial(zoneData.laces.material, zoneData.laces.color);

  const laceCount = 5;
  for (let i = 0; i < laceCount; i++) {
    const t = i / (laceCount - 1);
    const x = 0.2 + t * 0.7;
    const y = 0.95 + t * 0.25;

    // Cross lace
    const laceGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.5, 8);
    laceGeo.rotateX(Math.PI / 2);

    const laceMeshL = new THREE.Mesh(laceGeo, laceMat);
    laceMeshL.position.set(x, y, 0);
    laceMeshL.rotation.y = 0.3 * (i % 2 === 0 ? 1 : -1);
    laceMeshL.castShadow = true;
    shoeGroup.add(laceMeshL);
    zoneData.laces.meshes.push(laceMeshL);

    // Eyelet dots on each side
    for (let side of [-1, 1]) {
      const eyeletGeo = new THREE.SphereGeometry(0.03, 8, 8);
      const eyeletMesh = new THREE.Mesh(eyeletGeo, laceMat);
      eyeletMesh.position.set(x, y, side * 0.25);
      eyeletMesh.castShadow = true;
      shoeGroup.add(eyeletMesh);
      zoneData.laces.meshes.push(eyeletMesh);
    }

    // Diagonal lace segments
    if (i < laceCount - 1) {
      const nextX = 0.2 + (i + 1) / (laceCount - 1) * 0.7;
      const nextY = 0.95 + (i + 1) / (laceCount - 1) * 0.25;

      const dx = nextX - x;
      const dy = nextY - y;
      const dz = 0.5;
      const len = Math.sqrt(dx * dx + dy * dy + dz * dz);

      const diagGeo = new THREE.CylinderGeometry(0.012, 0.012, len, 6);
      const diagMesh = new THREE.Mesh(diagGeo, laceMat);
      diagMesh.position.set((x + nextX) / 2, (y + nextY) / 2, 0);

      // Point from one eyelet to opposite side next eyelet
      const dir = new THREE.Vector3(dx, dy, dz).normalize();
      const up = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
      diagMesh.quaternion.copy(quat);
      diagMesh.castShadow = true;
      shoeGroup.add(diagMesh);
      zoneData.laces.meshes.push(diagMesh);

      // Other diagonal
      const diagGeo2 = new THREE.CylinderGeometry(0.012, 0.012, len, 6);
      const diagMesh2 = new THREE.Mesh(diagGeo2, laceMat);
      diagMesh2.position.set((x + nextX) / 2, (y + nextY) / 2, 0);
      const dir2 = new THREE.Vector3(dx, dy, -dz).normalize();
      const quat2 = new THREE.Quaternion().setFromUnitVectors(up, dir2);
      diagMesh2.quaternion.copy(quat2);
      diagMesh2.castShadow = true;
      shoeGroup.add(diagMesh2);
      zoneData.laces.meshes.push(diagMesh2);
    }
  }

  // Lace tips (aglets)
  for (let side of [-1, 1]) {
    const agletGeo = new THREE.CylinderGeometry(0.018, 0.012, 0.12, 8);
    const agletMesh = new THREE.Mesh(agletGeo, laceMat);
    agletMesh.position.set(0.85, 1.15, side * 0.35);
    agletMesh.rotation.x = side * 0.5;
    agletMesh.rotation.z = -0.8;
    agletMesh.castShadow = true;
    shoeGroup.add(agletMesh);
    zoneData.laces.meshes.push(agletMesh);
  }
}

// Build all parts
buildSole();
buildUpper();
buildTongue();
buildLaces();

scene.add(shoeGroup);

// ─── State ───
window.__3D_STATE__ = {
  zones: [
    { name: 'sole', color: zoneData.sole.color, material: zoneData.sole.material },
    { name: 'upper', color: zoneData.upper.color, material: zoneData.upper.material },
    { name: 'tongue', color: zoneData.tongue.color, material: zoneData.tongue.material },
    { name: 'laces', color: zoneData.laces.color, material: zoneData.laces.material }
  ],
  selectedZone: 'sole',
  autoRotate: true
};

function syncState() {
  const state = window.__3D_STATE__;
  state.zones[0] = { name: 'sole', color: zoneData.sole.color, material: zoneData.sole.material };
  state.zones[1] = { name: 'upper', color: zoneData.upper.color, material: zoneData.upper.material };
  state.zones[2] = { name: 'tongue', color: zoneData.tongue.color, material: zoneData.tongue.material };
  state.zones[3] = { name: 'laces', color: zoneData.laces.color, material: zoneData.laces.material };
  state.autoRotate = controls.autoRotate;
}

function updateZoneMaterial(zoneName) {
  const zone = zoneData[zoneName];
  const mat = createMaterial(zone.material, zone.color);
  zone.meshes.forEach(mesh => {
    mesh.material.dispose();
    mesh.material = mat;
  });
}

// ─── UI Controls ───
const zoneSelect = document.getElementById('zoneSelect');
const zoneColor = document.getElementById('zoneColor');
const zoneMaterial = document.getElementById('zoneMaterial');
const autoRotateCheckbox = document.getElementById('autoRotate');

function updateUIFromZone() {
  const zoneName = zoneSelect.value;
  window.__3D_STATE__.selectedZone = zoneName;
  zoneColor.value = zoneData[zoneName].color;
  zoneMaterial.value = zoneData[zoneName].material;
}

zoneSelect.addEventListener('change', () => {
  updateUIFromZone();
  syncState();
});

zoneColor.addEventListener('input', (e) => {
  const zoneName = zoneSelect.value;
  zoneData[zoneName].color = e.target.value;
  updateZoneMaterial(zoneName);
  syncState();
});

zoneMaterial.addEventListener('change', (e) => {
  const zoneName = zoneSelect.value;
  zoneData[zoneName].material = e.target.value;
  updateZoneMaterial(zoneName);
  syncState();
});

autoRotateCheckbox.addEventListener('change', (e) => {
  controls.autoRotate = e.target.checked;
  syncState();
});

// Initialize UI
updateUIFromZone();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation ───
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
