<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kaleidoscope</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; }
canvas { display: block; }
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    font-family: monospace;
    font-size: 14px;
    padding: 12px;
    z-index: 100;
    border-radius: 8px;
    line-height: 1.6;
    min-width: 240px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}
#hud .label { color: #888; }
#hud .value { color: #0f0; }
#hud .paused { color: #f44; }
#hud .playing { color: #0f0; }
.btn-container {
    margin-top: 10px;
    display: flex;
    gap: 8px;
}
.hud-btn {
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    padding: 6px 14px;
    font-family: monospace;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
}
.hud-btn:hover {
    background: rgba(255, 255, 255, 0.25);
}
#controls-help {
    position: fixed;
    bottom: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #888;
    font-family: monospace;
    font-size: 11px;
    padding: 10px;
    z-index: 100;
    border-radius: 8px;
    line-height: 1.5;
    border: 1px solid rgba(255, 255, 255, 0.1);
}
#loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-family: monospace;
    font-size: 18px;
    z-index: 200;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Time: </span><span id="hud-time" class="value">0.00</span></div>
    <div><span class="label">Speed: </span><span id="hud-speed" class="value">1.00x</span></div>
    <div><span class="label">Segments: </span><span id="hud-segments" class="value">6</span></div>
    <div><span class="label">Status: </span><span id="hud-status" class="playing">Playing</span></div>
    <div><span class="label">ColorShift: </span><span id="hud-colorshift" class="value">Off</span></div>
    <div class="btn-container">
        <button id="btn-toggle-pause" class="hud-btn">Play/Pause</button>
        <button id="btn-reset" class="hud-btn">Reset</button>
    </div>
</div>

<div id="controls-help">
    Space: Play/Pause | ↑↓: Speed | J/K: Segments | C: ColorShift | R: Reset
</div>

<div id="loading">Loading model...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
let simulationTime = 0;
let timeSpeed = 1.0;
let isPaused = false;
let segmentCount = 6;
let colorShiftEnabled = false;
let frameCount = 0;
let originalModel = null;
let kaleidoscopeGroup = null;
let segments = [];
let originalMaterials = new Map();

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(5, 10, 5);
dirLight1.castShadow = true;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffd699, 0.5);
dirLight2.position.set(-5, 3, -5);
scene.add(dirLight2);

// --- Ground reference (subtle grid) ---
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.position.y = -2;
scene.add(gridHelper);

// --- Expose state ---
window.__3D_STATE__ = {
    modelLoaded: false,
    simulationTime: 0,
    timeSpeed: 1.0,
    isPaused: false,
    segmentCount: 6,
    groupRotationY: 0,
    colorShiftEnabled: false,
    segmentPositions: [],
    frameCount: 0,
    isReversing: false
};

// --- HUD Elements ---
const hudTime = document.getElementById('hud-time');
const hudSpeed = document.getElementById('hud-speed');
const hudSegments = document.getElementById('hud-segments');
const hudStatus = document.getElementById('hud-status');
const hudColorshift = document.getElementById('hud-colorshift');
const loadingEl = document.getElementById('loading');

function updateHUD() {
    hudTime.textContent = simulationTime.toFixed(2);
    hudSpeed.textContent = timeSpeed.toFixed(2) + 'x';
    hudSegments.textContent = segmentCount;
    
    if (isPaused) {
        hudStatus.textContent = 'Paused';
        hudStatus.className = 'paused';
    } else {
        hudStatus.textContent = 'Playing';
        hudStatus.className = 'playing';
    }
    
    hudColorshift.textContent = colorShiftEnabled ? 'On' : 'Off';
}

// --- Store original materials for color shift restore ---
function storeOriginalMaterials(object) {
    object.traverse((child) => {
        if (child.isMesh && child.material) {
            if (Array.isArray(child.material)) {
                child.material.forEach((mat, idx) => {
                    const key = child.uuid + '_' + idx;
                    if (!originalMaterials.has(key)) {
                        originalMaterials.set(key, mat.color.clone());
                    }
                });
            } else {
                if (!originalMaterials.has(child.uuid)) {
                    originalMaterials.set(child.uuid, child.material.color.clone());
                }
            }
        }
    });
}

function restoreOriginalMaterials(object) {
    object.traverse((child) => {
        if (child.isMesh && child.material) {
            if (Array.isArray(child.material)) {
                child.material.forEach((mat, idx) => {
                    const key = child.uuid + '_' + idx;
                    const orig = originalMaterials.get(key);
                    if (orig) mat.color.copy(orig);
                });
            } else {
                const orig = originalMaterials.get(child.uuid);
                if (orig) child.material.color.copy(orig);
            }
        }
    });
}

// --- Build Kaleidoscope ---
function buildKaleidoscope() {
    if (!originalModel) return;

    // Remove old group
    if (kaleidoscopeGroup) {
        // Restore materials before removing
        segments.forEach(seg => restoreOriginalMaterials(seg));
        scene.remove(kaleidoscopeGroup);
        kaleidoscopeGroup = null;
        segments = [];
        originalMaterials.clear();
    }

    kaleidoscopeGroup = new THREE.Group();
    segments = [];

    // Compute bounding box of original model to center it
    const box = new THREE.Box3().setFromObject(originalModel);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scaleFactor = 3.0 / maxDim; // normalize to reasonable size

    for (let i = 0; i < segmentCount; i++) {
        const clone = originalModel.clone();
        
        // Deep clone materials so each segment can have independent colors
        clone.traverse((child) => {
            if (child.isMesh) {
                if (Array.isArray(child.material)) {
                    child.material = child.material.map(m => m.clone());
                } else {
                    child.material = child.material.clone();
                }
            }
        });

        const segmentGroup = new THREE.Group();
        
        // Center and scale the clone
        clone.position.set(-center.x, -center.y, -center.z);
        clone.scale.setScalar(scaleFactor);
        
        // Offset from center
        const offsetGroup = new THREE.Group();
        offsetGroup.add(clone);
        offsetGroup.position.z = 2.5; // push out from center

        segmentGroup.add(offsetGroup);

        // Rotate around Y axis
        const angle = (i / segmentCount) * Math.PI * 2;
        segmentGroup.rotation.y = angle;

        // Mirror every other segment
        if (i % 2 === 1) {
            offsetGroup.scale.x = -1;
        }

        kaleidoscopeGroup.add(segmentGroup);
        segments.push(segmentGroup);
        
        storeOriginalMaterials(segmentGroup);
    }

    scene.add(kaleidoscopeGroup);
}

// --- Load Model ---
const loader = new GLTFLoader();
loader.load(
    'ABeautifulGame.glb',
    (gltf) => {
        originalModel = gltf.scene;
        window.__3D_STATE__.modelLoaded = true;
        loadingEl.style.display = 'none';
        buildKaleidoscope();
    },
    (progress) => {
        if (progress.total > 0) {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            loadingEl.textContent = `Loading model... ${pct}%`;
        }
    },
    (error) => {
        console.error('Error loading model:', error);
        loadingEl.textContent = 'Error loading model. Make sure ABeautifulGame.glb is in the same directory.';
        loadingEl.style.color = '#f44';
    }
);

// --- Reset Function ---
function resetAll() {
    simulationTime = 0;
    timeSpeed = 1.0;
    isPaused = false;
    colorShiftEnabled = false;
    
    if (segmentCount !== 6) {
        segmentCount = 6;
        buildKaleidoscope();
    } else {
        // Restore colors
        segments.forEach(seg => restoreOriginalMaterials(seg));
    }
}

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            isPaused = !isPaused;
            break;
        case 'ArrowUp':
            e.preventDefault();
            timeSpeed = Math.min(3.0, timeSpeed + 0.25);
            break;
        case 'ArrowDown':
            e.preventDefault();
            timeSpeed = Math.max(-2.0, timeSpeed - 0.25);
            break;
        case 'KeyR':
            resetAll();
            break;
        case 'KeyK':
            if (segmentCount < 12) {
                segmentCount++;
                buildKaleidoscope();
            }
            break;
        case 'KeyJ':
            if (segmentCount > 2) {
                segmentCount--;
                buildKaleidoscope();
            }
            break;
        case 'KeyC':
            colorShiftEnabled = !colorShiftEnabled;
            if (!colorShiftEnabled) {
                segments.forEach(seg => restoreOriginalMaterials(seg));
            }
            break;
    }
});

// --- Button Controls ---
document.getElementById('btn-toggle-pause').addEventListener('click', () => {
    isPaused = !isPaused;
});

document.getElementById('btn-reset').addEventListener('click', () => {
    resetAll();
});

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();
const tempColor = new THREE.Color();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Advance simulation time
    if (!isPaused) {
        simulationTime += delta * timeSpeed;
    }

    // Update kaleidoscope
    if (kaleidoscopeGroup) {
        kaleidoscopeGroup.rotation.y = simulationTime * 0.3;

        const segPositions = [];

        for (let i = 0; i < segments.length; i++) {
            const seg = segments[i];
            const yOffset = Math.sin(simulationTime * 1.5 + i * (Math.PI * 2 / segmentCount)) * 0.5;
            seg.position.y = yOffset;
            segPositions.push({ y: yOffset });

            // Color shift
            if (colorShiftEnabled) {
                const hue = (simulationTime * 0.1 + i / segmentCount) % 1.0;
                seg.traverse((child) => {
                    if (child.isMesh && child.material) {
                        if (Array.isArray(child.material)) {
                            child.material.forEach((mat) => {
                                tempColor.setHSL(hue, 0.7, 0.5);
                                mat.color.copy(tempColor);
                            });
                        } else {
                            tempColor.setHSL(hue, 0.7, 0.5);
                            child.material.color.copy(tempColor);
                        }
                    }
                });
            }
        }

        // Update global state
        window.__3D_STATE__.segmentPositions = segPositions;
        window.__3D_STATE__.groupRotationY = kaleidoscopeGroup.rotation.y;
    }

    // Update state
    frameCount++;
    window.__3D_STATE__.simulationTime = simulationTime;
    window.__3D_STATE__.timeSpeed = timeSpeed;
    window.__3D_STATE__.isPaused = isPaused;
    window.__3D_STATE__.segmentCount = segmentCount;
    window.__3D_STATE__.colorShiftEnabled = colorShiftEnabled;
    window.__3D_STATE__.frameCount = frameCount;
    window.__3D_STATE__.isReversing = timeSpeed < 0;

    updateHUD();
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
