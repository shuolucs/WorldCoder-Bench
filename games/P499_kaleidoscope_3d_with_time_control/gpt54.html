<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js 3D Kaleidoscope</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 100;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px;
      border-radius: 8px;
      line-height: 1.5;
      min-width: 260px;
      user-select: none;
    }

    #hud .buttons {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #hud button {
      font-family: monospace;
      padding: 6px 10px;
      background: #1f1f35;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      cursor: pointer;
    }

    #hud button:hover {
      background: #2c2c48;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(10, 10, 26, 0.75);
      z-index: 90;
      font-family: monospace;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-text">Initializing...</div>
    <div class="buttons">
      <button id="btn-reset">Reset</button>
      <button id="btn-toggle-pause">Play/Pause</button>
    </div>
  </div>

  <div id="loading">Loading ABeautifulGame.glb...</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight1.position.set(5, 10, 5);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight('#ffd699', 0.5);
    dirLight2.position.set(-5, 3, -5);
    scene.add(dirLight2);

    let modelRoot = null;
    let kaleidoscopeGroup = new THREE.Group();
    kaleidoscopeGroup.name = 'kaleidoscopeGroup';
    scene.add(kaleidoscopeGroup);

    let segmentClones = [];

    let simulationTime = 0;
    let timeSpeed = 1.0;
    let isPaused = false;
    let segments = 6;
    let colorShiftEnabled = false;
    let frameCount = 0;
    let modelLoaded = false;

    const clock = new THREE.Clock();

    const hudText = document.getElementById('hud-text');
    const loadingEl = document.getElementById('loading');
    const btnReset = document.getElementById('btn-reset');
    const btnTogglePause = document.getElementById('btn-toggle-pause');

    window.__3D_STATE__ = {
      modelLoaded: false,
      simulationTime: 0,
      timeSpeed: 1.0,
      isPaused: false,
      segmentCount: segments,
      groupRotationY: 0,
      colorShiftEnabled: false,
      segmentPositions: [],
      frameCount: 0,
      isReversing: false
    };

    function cloneModelWithUniqueMaterials(source) {
      const clone = source.clone(true);
      clone.traverse((node) => {
        if (node.isMesh) {
          if (Array.isArray(node.material)) {
            node.material = node.material.map(mat => mat ? mat.clone() : mat);
          } else if (node.material) {
            node.material = node.material.clone();
          }
          node.castShadow = false;
          node.receiveShadow = false;
        }
      });
      return clone;
    }

    function clearKaleidoscope() {
      for (const seg of segmentClones) {
        kaleidoscopeGroup.remove(seg);
      }
      segmentClones = [];
    }

    function rebuildKaleidoscope() {
      clearKaleidoscope();
      if (!modelRoot) return;

      const angleStep = (Math.PI * 2) / segments;

      for (let i = 0; i < segments; i++) {
        const clone = cloneModelWithUniqueMaterials(modelRoot);
        clone.rotation.y = i * angleStep;

        if (i % 2 === 1) {
          clone.scale.x *= -1;
        }

        kaleidoscopeGroup.add(clone);
        segmentClones.push(clone);
      }

      window.__3D_STATE__.segmentCount = segments;
    }

    function resetState() {
      simulationTime = 0;
      timeSpeed = 1.0;
      segments = 6;
      isPaused = false;
      colorShiftEnabled = false;
      if (modelLoaded) rebuildKaleidoscope();
      updateHUD();
    }

    function togglePause() {
      isPaused = !isPaused;
      updateHUD();
    }

    function updateHUD() {
      hudText.innerHTML = `
Time: ${simulationTime.toFixed(2)}<br>
Speed: ${timeSpeed.toFixed(2)}x<br>
Segments: ${segments}<br>
Status: ${isPaused ? 'Paused' : 'Playing'}<br>
ColorShift: ${colorShiftEnabled ? 'On' : 'Off'}
      `.trim();
    }

    btnReset.addEventListener('click', resetState);
    btnTogglePause.addEventListener('click', togglePause);

    window.addEventListener('keydown', (e) => {
      switch (e.code) {
        case 'Space':
          e.preventDefault();
          togglePause();
          break;
        case 'ArrowUp':
          timeSpeed = Math.min(3.0, timeSpeed + 0.25);
          updateHUD();
          break;
        case 'ArrowDown':
          timeSpeed = Math.max(-2.0, timeSpeed - 0.25);
          updateHUD();
          break;
        case 'KeyR':
          resetState();
          break;
        case 'KeyK':
          segments = Math.min(12, segments + 1);
          if (modelLoaded) rebuildKaleidoscope();
          updateHUD();
          break;
        case 'KeyJ':
          segments = Math.max(2, segments - 1);
          if (modelLoaded) rebuildKaleidoscope();
          updateHUD();
          break;
        case 'KeyC':
          colorShiftEnabled = !colorShiftEnabled;
          updateHUD();
          break;
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      'ABeautifulGame.glb',
      (gltf) => {
        modelRoot = gltf.scene;

        const box = new THREE.Box3().setFromObject(modelRoot);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        modelRoot.position.sub(center);

        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 4.0;
        const scale = targetSize / maxDim;
        modelRoot.scale.setScalar(scale);

        modelLoaded = true;
        window.__3D_STATE__.modelLoaded = true;

        rebuildKaleidoscope();
        loadingEl.style.display = 'none';
        updateHUD();
      },
      undefined,
      (err) => {
        console.error('Failed to load ABeautifulGame.glb', err);
        loadingEl.textContent = 'Failed to load ABeautifulGame.glb';
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const effectiveSpeed = isPaused ? 0 : timeSpeed;
      simulationTime += delta * effectiveSpeed;

      if (modelLoaded) {
        kaleidoscopeGroup.rotation.y = simulationTime * 0.3;

        const anglePhaseStep = (Math.PI * 2) / segments;

        for (let i = 0; i < segmentClones.length; i++) {
          const segment = segmentClones[i];
          segment.position.y = Math.sin(simulationTime * 1.5 + i * anglePhaseStep) * 0.5;

          if (colorShiftEnabled) {
            const hue = (simulationTime * 0.1 + i / segments) % 1.0;
            segment.traverse((node) => {
              if (node.isMesh && node.material) {
                if (Array.isArray(node.material)) {
                  node.material.forEach(mat => {
                    if (mat && mat.color) mat.color.setHSL(hue, 0.7, 0.5);
                  });
                } else if (node.material.color) {
                  node.material.color.setHSL(hue, 0.7, 0.5);
                }
              }
            });
          }
        }
      }

      frameCount++;

      const segmentPositions = segmentClones.map(seg => {
        const worldPos = new THREE.Vector3();
        seg.getWorldPosition(worldPos);
        return { y: worldPos.y };
      });

      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.simulationTime = simulationTime;
      window.__3D_STATE__.timeSpeed = timeSpeed;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.segmentCount = segments;
      window.__3D_STATE__.groupRotationY = kaleidoscopeGroup.rotation.y;
      window.__3D_STATE__.colorShiftEnabled = colorShiftEnabled;
      window.__3D_STATE__.segmentPositions = segmentPositions;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.isReversing = timeSpeed < 0;

      updateHUD();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();
  </script>
</body>
</html>
