<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kaleidoscope</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            padding: 12px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            font-family: monospace;
            z-index: 100;
            pointer-events: auto;
        }
        #hud-text {
            margin-bottom: 10px;
            line-height: 1.5;
        }
        button {
            margin-right: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-family: monospace;
            background: #333;
            color: white;
            border: 1px solid #555;
        }
        button:hover {
            background: #555;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="hud-text"></div>
        <button id="btn-reset">Reset</button>
        <button id="btn-toggle-pause">Play/Pause</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Variables
        let simulationTime = 0;
        let timeSpeed = 1.0;
        let isPaused = false;
        let segmentCount = 6;
        let colorShiftEnabled = false;
        let modelLoaded = false;
        let frameCount = 0;

        window.__3D_STATE__ = {
            modelLoaded: false,
            simulationTime: 0,
            timeSpeed: 1.0,
            isPaused: false,
            segmentCount: 6,
            groupRotationY: 0,
            colorShiftEnabled: false,
            segmentPositions: [],
            frameCount: 0,
            isReversing: false
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a1a');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLightWhite = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLightWhite.position.set(5, 10, 5);
        scene.add(dirLightWhite);

        const dirLightWarm = new THREE.DirectionalLight(0xffd699, 0.5);
        dirLightWarm.position.set(-5, 3, -5);
        scene.add(dirLightWarm);

        // Kaleidoscope Group
        const kaleidoscopeGroup = new THREE.Group();
        scene.add(kaleidoscopeGroup);

        let originalModel = null;
        let segments = [];

        // Load Model
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/ABeautifulGame/glTF-Binary/ABeautifulGame.glb';
        
        loader.load(modelUrl, (gltf) => {
            originalModel = gltf.scene;
            modelLoaded = true;
            buildKaleidoscope();
        });

        function buildKaleidoscope() {
            if (!originalModel) return;

            // Clear existing segments
            while (kaleidoscopeGroup.children.length > 0) {
                kaleidoscopeGroup.remove(kaleidoscopeGroup.children[0]);
            }
            segments = [];

            for (let i = 0; i < segmentCount; i++) {
                const clone = originalModel.clone();
                
                // Clone materials to allow independent color shifting and fix normals for mirrored meshes
                clone.traverse((child) => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.material.side = THREE.DoubleSide;
                        if (!child.userData.originalColor && child.material.color) {
                            child.userData.originalColor = child.material.color.clone();
                        }
                    }
                });

                const angle = i * (Math.PI * 2 / segmentCount);
                clone.rotation.y = angle;

                // Mirror every other segment
                if (i % 2 !== 0) {
                    clone.scale.x = -1;
                }

                kaleidoscopeGroup.add(clone);
                segments.push(clone);
            }
        }

        function restoreColors() {
            segments.forEach(segment => {
                segment.traverse((child) => {
                    if (child.isMesh && child.material && child.userData.originalColor) {
                        child.material.color.copy(child.userData.originalColor);
                    }
                });
            });
        }

        function resetState() {
            simulationTime = 0;
            timeSpeed = 1.0;
            segmentCount = 6;
            isPaused = false;
            colorShiftEnabled = false;
            buildKaleidoscope();
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    isPaused = !isPaused;
                    break;
                case 'ArrowUp':
                    timeSpeed = Math.min(3.0, timeSpeed + 0.25);
                    break;
                case 'ArrowDown':
                    timeSpeed = Math.max(-2.0, timeSpeed - 0.25);
                    break;
                case 'KeyR':
                    resetState();
                    break;
                case 'KeyK':
                    segmentCount = Math.min(12, segmentCount + 1);
                    buildKaleidoscope();
                    break;
                case 'KeyJ':
                    segmentCount = Math.max(2, segmentCount - 1);
                    buildKaleidoscope();
                    break;
                case 'KeyC':
                    colorShiftEnabled = !colorShiftEnabled;
                    if (!colorShiftEnabled) restoreColors();
                    break;
            }
        });

        document.getElementById('btn-reset').addEventListener('click', resetState);
        document.getElementById('btn-toggle-pause').addEventListener('click', () => {
            isPaused = !isPaused;
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        const hudText = document.getElementById('hud-text');

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            
            if (!isPaused) {
                simulationTime += delta * timeSpeed;
            }

            kaleidoscopeGroup.rotation.y = simulationTime * 0.3;

            const currentPositions = [];

            segments.forEach((segment, i) => {
                // Oscillation
                const yPos = Math.sin(simulationTime * 1.5 + i * (Math.PI * 2 / segmentCount)) * 0.5;
                segment.position.y = yPos;
                currentPositions.push({ y: yPos });

                // Color Shift
                if (colorShiftEnabled) {
                    const h = (simulationTime * 0.1 + i / segmentCount) % 1.0;
                    segment.traverse((child) => {
                        if (child.isMesh && child.material && child.material.color) {
                            child.material.color.setHSL(h, 0.7, 0.5);
                        }
                    });
                }
            });

            frameCount++;

            // Update HUD
            hudText.innerHTML = `
Time: ${simulationTime.toFixed(2)}
Speed: ${timeSpeed.toFixed(2)}x
Segments: ${segmentCount}
Status: ${isPaused ? 'Paused' : 'Playing'}
ColorShift: ${colorShiftEnabled ? 'On' : 'Off'}
            `.trim().replace(/\n/g, '<br>');

            // Update Global State
            window.__3D_STATE__ = {
                modelLoaded,
                simulationTime,
                timeSpeed,
                isPaused,
                segmentCount,
                groupRotationY: kaleidoscopeGroup.rotation.y,
                colorShiftEnabled,
                segmentPositions: currentPositions,
                frameCount,
                isReversing: timeSpeed < 0
            };

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
