<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            height: 100vh;
            background-color: #16213e;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            z-index: 10;
        }
        h3 {
            margin: 10px 0 5px 0;
            font-size: 16px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }
        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .color-btn:hover {
            transform: scale(1.1);
        }
        .color-btn.active {
            border-color: #ffffff;
        }
        select, input[type="range"], button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
            background-color: #0f3460;
            color: white;
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            cursor: pointer;
        }
        button {
            background-color: #e94560;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #d83a56;
        }
        label {
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        input[type="checkbox"] {
            cursor: pointer;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-panel">
        <h3>Case Color</h3>
        <div class="color-picker">
            <button id="color-blue" class="color-btn active" style="background-color: #3498db;" data-color="#3498db"></button>
            <button id="color-red" class="color-btn" style="background-color: #e74c3c;" data-color="#e74c3c"></button>
            <button id="color-green" class="color-btn" style="background-color: #2ecc71;" data-color="#2ecc71"></button>
            <button id="color-orange" class="color-btn" style="background-color: #f39c12;" data-color="#f39c12"></button>
            <button id="color-purple" class="color-btn" style="background-color: #9b59b6;" data-color="#9b59b6"></button>
        </div>

        <h3>Texture</h3>
        <select id="texture-select">
            <option value="" disabled selected>Select Texture</option>
            <option value="Matte">Matte</option>
            <option value="Glossy">Glossy</option>
            <option value="Metallic">Metallic</option>
        </select>

        <h3>Decoration</h3>
        <label>
            <input type="checkbox" id="toggle-decoration" checked> Show Robot
        </label>
        <label style="flex-direction: column; align-items: flex-start;">
            Scale: <span id="scale-val">0.3</span>
            <input type="range" id="decoration-scale" min="0.1" max="1.0" step="0.1" value="0.3">
        </label>

        <div style="margin-top: 20px;">
            <button id="save-btn">Save Design</button>
            <button id="load-btn">Load Design</button>
            <button id="reset-btn" style="background-color: #555;">Reset</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            caseColor: '#3498db',
            texture: '',
            roughness: 0.4,
            metalness: 0.3,
            decorationVisible: true,
            decorationScale: 0.3,
            savedState: null,
            loadedState: null,
            designCount: 0,
            casePositionY: 0,
            robotLoaded: false
        };

        function updateState(updates) {
            window.__3D_STATE__ = { ...window.__3D_STATE__, ...updates };
        }

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        let isInteracting = false;
        controls.addEventListener('start', () => isInteracting = true);
        controls.addEventListener('end', () => isInteracting = false);

        // Phone Case Model
        const caseGroup = new THREE.Group();
        scene.add(caseGroup);

        const caseGeometry = new THREE.BoxGeometry(1.0, 2.0, 0.15);
        const caseMaterial = new THREE.MeshStandardMaterial({
            color: new THREE.Color(window.__3D_STATE__.caseColor),
            roughness: window.__3D_STATE__.roughness,
            metalness: window.__3D_STATE__.metalness
        });
        const caseMesh = new THREE.Mesh(caseGeometry, caseMaterial);
        caseGroup.add(caseMesh);

        // Decoration Model
        let decorationObject = null;
        const loader = new GLTFLoader();

        function setupDecoration(obj) {
            decorationObject = obj;
            decorationObject.position.set(0, 0, 0.1);
            decorationObject.scale.set(window.__3D_STATE__.decorationScale, window.__3D_STATE__.decorationScale, window.__3D_STATE__.decorationScale);
            decorationObject.visible = window.__3D_STATE__.decorationVisible;
            caseGroup.add(decorationObject);
            updateState({ robotLoaded: true });
        }

        loader.load(
            'robot.glb',
            (gltf) => {
                setupDecoration(gltf.scene);
            },
            undefined,
            (error) => {
                // Fallback
                const fallbackGeo = new THREE.TorusKnotGeometry(0.2, 0.06, 64, 16);
                const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.5, metalness: 0.8 });
                const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                setupDecoration(fallbackMesh);
            }
        );

        // UI Interactions
        const colorBtns = document.querySelectorAll('.color-btn');
        colorBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const colorHex = e.target.getAttribute('data-color');
                caseMaterial.color.set(colorHex);
                updateState({ caseColor: colorHex });
                
                colorBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
            });
        });

        const textureSelect = document.getElementById('texture-select');
        textureSelect.addEventListener('change', (e) => {
            const tex = e.target.value;
            let r = 0.4, m = 0.3;
            if (tex === 'Matte') { r = 0.8; m = 0.1; }
            else if (tex === 'Glossy') { r = 0.2; m = 0.3; }
            else if (tex === 'Metallic') { r = 0.1; m = 0.9; }
            
            caseMaterial.roughness = r;
            caseMaterial.metalness = m;
            updateState({ texture: tex, roughness: r, metalness: m });
        });

        const toggleDecoration = document.getElementById('toggle-decoration');
        toggleDecoration.addEventListener('change', (e) => {
            const isVisible = e.target.checked;
            if (decorationObject) {
                decorationObject.visible = isVisible;
            }
            updateState({ decorationVisible: isVisible });
        });

        const scaleSlider = document.getElementById('decoration-scale');
        const scaleValDisplay = document.getElementById('scale-val');
        scaleSlider.addEventListener('input', (e) => {
            const scale = parseFloat(e.target.value);
            scaleValDisplay.textContent = scale.toFixed(1);
            if (decorationObject) {
                decorationObject.scale.set(scale, scale, scale);
            }
            updateState({ decorationScale: scale });
        });

        // Save / Load / Reset
        document.getElementById('save-btn').addEventListener('click', () => {
            const stateToSave = {
                color: window.__3D_STATE__.caseColor,
                texture: window.__3D_STATE__.texture,
                decorationVisible: window.__3D_STATE__.decorationVisible,
                decorationScale: window.__3D_STATE__.decorationScale
            };
            localStorage.setItem('phoneDesign', JSON.stringify(stateToSave));
            updateState({ 
                savedState: stateToSave, 
                designCount: window.__3D_STATE__.designCount + 1 
            });
            alert('Design Saved!');
        });

        document.getElementById('load-btn').addEventListener('click', () => {
            const saved = localStorage.getItem('phoneDesign');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    applyDesignState(parsed);
                    updateState({ loadedState: parsed });
                } catch (e) {
                    console.error("Failed to parse saved design", e);
                }
            } else {
                alert('No saved design found.');
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            applyDesignState({
                color: '#3498db',
                texture: '',
                decorationVisible: true,
                decorationScale: 0.3
            });
            caseMaterial.roughness = 0.4;
            caseMaterial.metalness = 0.3;
            updateState({ roughness: 0.4, metalness: 0.3 });
            caseGroup.rotation.set(0, 0, 0);
        });

        function applyDesignState(state) {
            // Color
            caseMaterial.color.set(state.color);
            colorBtns.forEach(b => {
                if (b.getAttribute('data-color') === state.color) b.classList.add('active');
                else b.classList.remove('active');
            });
            updateState({ caseColor: state.color });

            // Texture
            textureSelect.value = state.texture;
            if (state.texture) {
                textureSelect.dispatchEvent(new Event('change'));
            } else {
                textureSelect.selectedIndex = 0;
            }

            // Decoration Visibility
            toggleDecoration.checked = state.decorationVisible;
            if (decorationObject) decorationObject.visible = state.decorationVisible;
            updateState({ decorationVisible: state.decorationVisible });

            // Decoration Scale
            scaleSlider.value = state.decorationScale;
            scaleValDisplay.textContent = state.decorationScale.toFixed(1);
            if (decorationObject) decorationObject.scale.set(state.decorationScale, state.decorationScale, state.decorationScale);
            updateState({ decorationScale: state.decorationScale });
        }

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            if (!isInteracting) {
                caseGroup.rotation.y += 0.003;
            }
            
            // Keep state updated with position (though it remains 0 in this setup)
            if (window.__3D_STATE__.casePositionY !== caseGroup.position.y) {
                updateState({ casePositionY: caseGroup.position.y });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
