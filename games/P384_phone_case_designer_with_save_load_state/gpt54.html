<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phone Case Designer</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
    }

    #ui-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      height: 100vh;
      background: #16213e;
      padding: 15px;
      z-index: 10;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    #ui-panel h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .section {
      margin-bottom: 18px;
    }

    .section label.title {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .color-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .color-btn {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid #fff;
      cursor: pointer;
      outline: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .color-btn:hover {
      transform: scale(1.08);
    }

    .color-btn.active {
      box-shadow: 0 0 0 3px rgba(255,255,255,0.25);
    }

    select, input[type="range"], button {
      width: 100%;
      margin-top: 6px;
    }

    select, button, input[type="range"] {
      padding: 8px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    button {
      background: #0f3460;
      color: white;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #1b4f8a;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    #canvas-container {
      position: absolute;
      left: 220px;
      top: 0;
      width: calc(100% - 220px);
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <h2>Phone Case Designer</h2>

    <div class="section">
      <label class="title">Case Color</label>
      <div class="color-row">
        <button id="color-blue" class="color-btn active" style="background:#3498db" data-color="#3498db" aria-label="Blue"></button>
        <button id="color-red" class="color-btn" style="background:#e74c3c" data-color="#e74c3c" aria-label="Red"></button>
        <button id="color-green" class="color-btn" style="background:#2ecc71" data-color="#2ecc71" aria-label="Green"></button>
        <button id="color-orange" class="color-btn" style="background:#f39c12" data-color="#f39c12" aria-label="Orange"></button>
        <button id="color-purple" class="color-btn" style="background:#9b59b6" data-color="#9b59b6" aria-label="Purple"></button>
      </div>
    </div>

    <div class="section">
      <label class="title" for="texture-select">Texture Select</label>
      <select id="texture-select">
        <option value="Matte">Matte</option>
        <option value="Glossy" selected>Glossy</option>
        <option value="Metallic">Metallic</option>
      </select>
    </div>

    <div class="section">
      <label class="title">Decoration Toggle</label>
      <div class="checkbox-row">
        <input type="checkbox" id="toggle-decoration" checked />
        <label for="toggle-decoration">Show Robot Decoration</label>
      </div>
    </div>

    <div class="section">
      <label class="title" for="decoration-scale">Scale Slider</label>
      <input type="range" id="decoration-scale" min="0.1" max="1.0" step="0.1" value="0.3" />
    </div>

    <div class="section">
      <button id="save-btn">Save Design</button>
      <button id="load-btn">Load Design</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('canvas-container');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      45,
      container.clientWidth / container.clientHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = true;
    controls.target.set(0, 0, 0);
    controls.update();

    let isUserInteracting = false;
    controls.addEventListener('start', () => { isUserInteracting = true; });
    controls.addEventListener('end', () => {
      setTimeout(() => { isUserInteracting = false; }, 150);
    });

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const caseGroup = new THREE.Group();
    caseGroup.position.set(0, 0, 0);
    scene.add(caseGroup);

    const texturePresets = {
      Matte: { roughness: 0.8, metalness: 0.1 },
      Glossy: { roughness: 0.2, metalness: 0.3 },
      Metallic: { roughness: 0.1, metalness: 0.9 }
    };

    const defaultState = {
      color: '#3498db',
      texture: 'Glossy',
      decorationVisible: true,
      decorationScale: 0.3
    };

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: defaultState.color,
      roughness: 0.4,
      metalness: 0.3
    });

    const caseGeometry = new THREE.BoxGeometry(1.0, 2.0, 0.15);
    const phoneCase = new THREE.Mesh(caseGeometry, caseMaterial);
    caseGroup.add(phoneCase);

    const invisibleBounds = new THREE.Mesh(
      new THREE.BoxGeometry(1.06, 2.06, 0.20),
      new THREE.MeshBasicMaterial({ visible: false })
    );
    caseGroup.add(invisibleBounds);

    let decoration = null;

    window.__3D_STATE__ = {
      caseColor: defaultState.color,
      texture: defaultState.texture,
      roughness: texturePresets[defaultState.texture].roughness,
      metalness: texturePresets[defaultState.texture].metalness,
      decorationVisible: defaultState.decorationVisible,
      decorationScale: defaultState.decorationScale,
      savedState: null,
      loadedState: null,
      designCount: 0,
      casePositionY: caseGroup.position.y,
      robotLoaded: false
    };

    function update3DState(extra = {}) {
      window.__3D_STATE__ = {
        ...window.__3D_STATE__,
        caseColor: '#' + caseMaterial.color.getHexString(),
        texture: document.getElementById('texture-select').value,
        roughness: caseMaterial.roughness,
        metalness: caseMaterial.metalness,
        decorationVisible: decoration ? decoration.visible : document.getElementById('toggle-decoration').checked,
        decorationScale: decoration ? decoration.scale.x : parseFloat(document.getElementById('decoration-scale').value),
        casePositionY: caseGroup.position.y,
        ...extra
      };
    }

    function setActiveColorButton(hex) {
      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color.toLowerCase() === hex.toLowerCase());
      });
    }

    function applyColor(color) {
      caseMaterial.color.set(color);
      setActiveColorButton(color);
      update3DState();
    }

    function applyTexture(textureName) {
      const preset = texturePresets[textureName];
      if (!preset) return;
      caseMaterial.roughness = preset.roughness;
      caseMaterial.metalness = preset.metalness;
      caseMaterial.needsUpdate = true;
      update3DState();
    }

    function applyDecorationVisibility(visible) {
      if (decoration) decoration.visible = visible;
      update3DState();
    }

    function applyDecorationScale(scale) {
      if (decoration) decoration.scale.set(scale, scale, scale);
      update3DState();
    }

    function addFallbackDecoration() {
      const geometry = new THREE.TorusKnotGeometry(0.2, 0.06, 64, 16);
      const material = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.35,
        metalness: 0.7
      });
      decoration = new THREE.Mesh(geometry, material);
      decoration.position.set(0, 0, 0.1);
      decoration.scale.set(defaultState.decorationScale, defaultState.decorationScale, defaultState.decorationScale);
      caseGroup.add(decoration);
      decoration.visible = document.getElementById('toggle-decoration').checked;
      update3DState({ robotLoaded: true });
    }

    const loader = new GLTFLoader();
    loader.load(
      'robot.glb',
      (gltf) => {
        decoration = gltf.scene;
        decoration.position.set(0, 0, 0.1);
        decoration.scale.set(0.3, 0.3, 0.3);
        caseGroup.add(decoration);
        decoration.visible = document.getElementById('toggle-decoration').checked;
        update3DState({ robotLoaded: true });
      },
      undefined,
      () => {
        addFallbackDecoration();
      }
    );

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        applyColor(btn.dataset.color);
      });
    });

    document.getElementById('texture-select').addEventListener('change', (e) => {
      applyTexture(e.target.value);
    });

    document.getElementById('toggle-decoration').addEventListener('change', (e) => {
      applyDecorationVisibility(e.target.checked);
    });

    document.getElementById('decoration-scale').addEventListener('input', (e) => {
      applyDecorationScale(parseFloat(e.target.value));
    });

    document.getElementById('save-btn').addEventListener('click', () => {
      const state = {
        color: '#' + caseMaterial.color.getHexString(),
        texture: document.getElementById('texture-select').value,
        decorationVisible: document.getElementById('toggle-decoration').checked,
        decorationScale: parseFloat(document.getElementById('decoration-scale').value)
      };
      localStorage.setItem('phoneDesign', JSON.stringify(state));
      update3DState({
        savedState: state,
        designCount: window.__3D_STATE__.designCount + 1
      });
    });

    document.getElementById('load-btn').addEventListener('click', () => {
      const raw = localStorage.getItem('phoneDesign');
      if (!raw) return;
      const state = JSON.parse(raw);

      if (state.color) {
        applyColor(state.color);
      }

      if (state.texture && texturePresets[state.texture]) {
        document.getElementById('texture-select').value = state.texture;
        applyTexture(state.texture);
      }

      if (typeof state.decorationVisible === 'boolean') {
        document.getElementById('toggle-decoration').checked = state.decorationVisible;
        applyDecorationVisibility(state.decorationVisible);
      }

      if (typeof state.decorationScale === 'number') {
        document.getElementById('decoration-scale').value = state.decorationScale;
        applyDecorationScale(state.decorationScale);
      }

      update3DState({ loadedState: state });
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      document.getElementById('texture-select').value = defaultState.texture;
      document.getElementById('toggle-decoration').checked = defaultState.decorationVisible;
      document.getElementById('decoration-scale').value = defaultState.decorationScale;

      applyColor(defaultState.color);
      applyTexture(defaultState.texture);
      applyDecorationVisibility(defaultState.decorationVisible);
      applyDecorationScale(defaultState.decorationScale);

      update3DState({
        savedState: null,
        loadedState: null
      });
    });

    applyColor(defaultState.color);
    applyTexture(defaultState.texture);
    update3DState();

    window.addEventListener('resize', () => {
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      if (!isUserInteracting) {
        caseGroup.rotation.y += 0.003;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
