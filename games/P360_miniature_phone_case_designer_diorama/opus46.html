<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Case Designer Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #2a2a2a; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #hud-top-left {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #fff;
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    padding: 12px 18px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
    line-height: 1.6;
    z-index: 10;
  }
  #hud-top-left .label { color: #aaa; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  #hud-top-left .value { color: #fff; font-weight: bold; font-size: 16px; }
  #color-indicator {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    border: 1px solid rgba(255,255,255,0.3);
  }
  
  #hud-top-right {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #cart-btn {
    background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    color: #fff;
    border: none;
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 15px rgba(238,90,36,0.3);
  }
  #cart-btn:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(238,90,36,0.5); }
  #cart-btn:active { transform: scale(0.95); }
  #cart-badge {
    background: #fff;
    color: #333;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 13px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  
  #hud-bottom {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #888;
    font-size: 12px;
    background: rgba(0,0,0,0.5);
    padding: 8px 16px;
    border-radius: 20px;
    backdrop-filter: blur(5px);
    z-index: 10;
    text-align: center;
    white-space: nowrap;
  }
  #hud-bottom kbd {
    background: rgba(255,255,255,0.15);
    padding: 2px 6px;
    border-radius: 3px;
    font-family: monospace;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="hud-top-left">
  <div class="label">Case Color</div>
  <div class="value"><span id="color-indicator" style="background:#ff4444"></span><span id="color-name">Red</span></div>
  <div class="label" style="margin-top:6px">Material</div>
  <div class="value" id="material-name">Matte</div>
</div>

<div id="hud-top-right">
  <div id="cart-badge">0</div>
  <button id="cart-btn">🛒 Add to Cart</button>
</div>

<div id="hud-bottom">
  Click swatches to customize. <kbd>R</kbd>=Rotate <kbd>L</kbd>=Lamp <kbd>E</kbd>=Explode
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

// State
window.__3D_STATE__ = {
  caseColor: 'red',
  caseColorHex: 0xff4444,
  materialType: 'matte',
  caseRoughness: 1.0,
  caseMetalness: 0.0,
  rotationAngle: 0,
  lampOn: true,
  exploded: false,
  caseYPosition: 0.5,
  cartCount: 0,
  phoneVisible: true,
  swatchCount: 8
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a2a);

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 7);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.minDistance = 3;
controls.maxDistance = 15;
controls.target.set(0, 0.5, 0);

// Floor under workbench
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.15;
floor.receiveShadow = true;
scene.add(floor);

// Workbench
const benchGeo = new THREE.BoxGeometry(8, 0.3, 6);
const benchMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7, metalness: 0.05 });
const workbench = new THREE.Mesh(benchGeo, benchMat);
workbench.position.y = 0;
workbench.receiveShadow = true;
workbench.castShadow = true;
scene.add(workbench);

// Workbench edge detail
const edgeGeo = new THREE.BoxGeometry(8.1, 0.05, 6.1);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x6B5210, roughness: 0.8 });
const edge = new THREE.Mesh(edgeGeo, edgeMat);
edge.position.y = 0.15;
scene.add(edge);

// Workbench legs
for (let i = 0; i < 4; i++) {
  const legGeo = new THREE.BoxGeometry(0.3, 1.0, 0.3);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x6B5210, roughness: 0.8 });
  const leg = new THREE.Mesh(legGeo, legMat);
  const xOff = (i % 2 === 0) ? -3.5 : 3.5;
  const zOff = (i < 2) ? -2.5 : 2.5;
  leg.position.set(xOff, -0.65, zOff);
  leg.castShadow = true;
  scene.add(leg);
}

// Phone + Case assembly group
const phoneAssembly = new THREE.Group();
phoneAssembly.position.set(0, 0, 0);
scene.add(phoneAssembly);

// Phone Model
const phoneGeo = new THREE.BoxGeometry(1.2, 2.4, 0.15);
const phoneMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.3, metalness: 0.5 });
const phone = new THREE.Mesh(phoneGeo, phoneMat);
phone.position.set(0, 0.5, 0);
phone.rotation.x = -Math.PI / 2;
phone.castShadow = true;
phoneAssembly.add(phone);

// Phone screen
const screenGeo = new THREE.PlaneGeometry(1.0, 2.1);
const screenMat = new THREE.MeshStandardMaterial({ color: 0x111133, roughness: 0.1, metalness: 0.8, emissive: 0x0a0a20, emissiveIntensity: 0.3 });
const screen = new THREE.Mesh(screenGeo, screenMat);
screen.position.set(0, 0.58, 0);
screen.rotation.x = -Math.PI / 2;
phoneAssembly.add(screen);

// Phone Case - hollow shell using a slightly larger box
const caseMat = new THREE.MeshStandardMaterial({
  color: 0xff4444,
  roughness: 1.0,
  metalness: 0.0,
  transparent: true,
  opacity: 0.85,
  side: THREE.DoubleSide
});

// Create case as a group of planes forming a shell
const caseGroup = new THREE.Group();
caseGroup.position.set(0, 0.5, 0);

// Case - using a box geometry
const caseOuterGeo = new THREE.BoxGeometry(1.4, 2.6, 0.2);
const caseMesh = new THREE.Mesh(caseOuterGeo, caseMat);
caseMesh.rotation.x = -Math.PI / 2;
caseMesh.castShadow = true;
caseGroup.add(caseMesh);

// Case bumper edges for more detail
const bumperGeoLong = new THREE.BoxGeometry(0.06, 2.6, 0.25);
const bumperGeoShort = new THREE.BoxGeometry(1.4, 0.06, 0.25);
const bumperMat = caseMat;

const bumperL = new THREE.Mesh(bumperGeoLong, caseMat.clone());
bumperL.material.opacity = 0.9;
bumperL.position.set(-0.7, 0, 0);
bumperL.rotation.x = -Math.PI / 2;
caseGroup.add(bumperL);

const bumperR = new THREE.Mesh(bumperGeoLong, caseMat.clone());
bumperR.material.opacity = 0.9;
bumperR.position.set(0.7, 0, 0);
bumperR.rotation.x = -Math.PI / 2;
caseGroup.add(bumperR);

const bumperT = new THREE.Mesh(bumperGeoShort, caseMat.clone());
bumperT.material.opacity = 0.9;
bumperT.position.set(0, 0, -1.3);
bumperT.rotation.x = -Math.PI / 2;
caseGroup.add(bumperT);

const bumperB = new THREE.Mesh(bumperGeoShort, caseMat.clone());
bumperB.material.opacity = 0.9;
bumperB.position.set(0, 0, 1.3);
bumperB.rotation.x = -Math.PI / 2;
caseGroup.add(bumperB);

phoneAssembly.add(caseGroup);

// Color Swatches
const colorData = [
  { name: 'Red', hex: 0xff4444, key: 'red' },
  { name: 'Blue', hex: 0x4444ff, key: 'blue' },
  { name: 'Green', hex: 0x44ff44, key: 'green' },
  { name: 'Yellow', hex: 0xffff44, key: 'yellow' },
  { name: 'Purple', hex: 0xaa44ff, key: 'purple' }
];

const colorSwatches = [];
colorData.forEach((c, i) => {
  const geo = new THREE.SphereGeometry(0.2, 32, 32);
  const mat = new THREE.MeshStandardMaterial({ color: c.hex, roughness: 0.3, metalness: 0.2 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-2 + i * 1, 0.35, 2);
  mesh.castShadow = true;
  mesh.userData = { type: 'color', index: i, ...c };
  scene.add(mesh);
  colorSwatches.push(mesh);
});

// Material Swatches
const materialData = [
  { name: 'Matte', key: 'matte', roughness: 1.0, metalness: 0.0 },
  { name: 'Glossy', key: 'glossy', roughness: 0.1, metalness: 0.3 },
  { name: 'Metallic', key: 'metallic', roughness: 0.3, metalness: 1.0 }
];

const materialSwatches = [];
materialData.forEach((m, i) => {
  const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
  const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: m.roughness, metalness: m.metalness });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(-1 + i * 1, 0.35, -2);
  mesh.castShadow = true;
  mesh.userData = { type: 'material', index: i, ...m };
  scene.add(mesh);
  materialSwatches.push(mesh);
});

// Text sprites for material labels
function createTextSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 48;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 128, 48);
  ctx.font = 'bold 20px Arial';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 64, 24);
  
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(0.8, 0.3, 1);
  return sprite;
}

materialData.forEach((m, i) => {
  const sprite = createTextSprite(m.name);
  sprite.position.set(-1 + i * 1, 0.7, -2);
  scene.add(sprite);
});

// Color swatch labels
colorData.forEach((c, i) => {
  const sprite = createTextSprite(c.name);
  sprite.position.set(-2 + i * 1, 0.7, 2);
  scene.add(sprite);
});

// Desk Lamp
const lampGroup = new THREE.Group();
lampGroup.position.set(3, 0.15, -2);

// Lamp base
const baseGeo = new THREE.CylinderGeometry(0.3, 0.35, 0.1, 16);
const lampMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.4, metalness: 0.8 });
const lampBase = new THREE.Mesh(baseGeo, lampMat);
lampBase.castShadow = true;
lampGroup.add(lampBase);

// Lamp pole
const poleGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
const pole = new THREE.Mesh(poleGeo, lampMat);
pole.position.y = 0.8;
pole.castShadow = true;
lampGroup.add(pole);

// Lamp arm
const armGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.8, 8);
const arm = new THREE.Mesh(armGeo, lampMat);
arm.position.set(-0.3, 1.4, 0);
arm.rotation.z = Math.PI / 4;
arm.castShadow = true;
lampGroup.add(arm);

// Lamp shade (cone)
const shadeGeo = new THREE.ConeGeometry(0.25, 0.3, 16, 1, true);
const shadeMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.5, metalness: 0.6, side: THREE.DoubleSide });
const shade = new THREE.Mesh(shadeGeo, shadeMat);
shade.position.set(-0.55, 1.55, 0);
shade.castShadow = true;
lampGroup.add(shade);

// Lamp bulb
const bulbGeo = new THREE.SphereGeometry(0.08, 16, 16);
const bulbMat = new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffdd88, emissiveIntensity: 1.0 });
const bulb = new THREE.Mesh(bulbGeo, bulbMat);
bulb.position.set(-0.55, 1.45, 0);
lampGroup.add(bulb);

// Lamp point light
const lampLight = new THREE.PointLight(0xffdd88, 0.5, 8);
lampLight.position.set(-0.55, 1.45, 0);
lampLight.castShadow = true;
lampLight.shadow.mapSize.width = 512;
lampLight.shadow.mapSize.height = 512;
lampGroup.add(lampLight);

scene.add(lampGroup);

// Small decorative items on workbench
// Pencil
const pencilGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.8, 6);
const pencilMat = new THREE.MeshStandardMaterial({ color: 0xf4c430, roughness: 0.6 });
const pencil = new THREE.Mesh(pencilGeo, pencilMat);
pencil.position.set(-3, 0.25, -0.5);
pencil.rotation.z = Math.PI / 2;
pencil.rotation.y = 0.3;
pencil.castShadow = true;
scene.add(pencil);

const pencilTipGeo = new THREE.ConeGeometry(0.03, 0.08, 6);
const pencilTipMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
const pencilTip = new THREE.Mesh(pencilTipGeo, pencilTipMat);
pencilTip.position.set(-3.4, 0.25, -0.38);
pencilTip.rotation.z = Math.PI / 2;
pencilTip.rotation.y = 0.3;
scene.add(pencilTip);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

const allClickables = [...colorSwatches, ...materialSwatches];

// Animation state
let rotateAnim = null;
let explodeAnim = null;
let flashAnim = null;

// Swatch hover state
let hoveredSwatch = null;
const originalScales = new Map();
allClickables.forEach(s => originalScales.set(s, s.scale.clone()));

function setCaseColor(colorHex, colorName, colorKey) {
  state.caseColor = colorKey;
  state.caseColorHex = colorHex;
  
  caseMat.color.setHex(colorHex);
  caseGroup.children.forEach(child => {
    if (child.material && child.material !== caseMat) {
      child.material.color.setHex(colorHex);
    }
  });
  
  document.getElementById('color-name').textContent = colorName;
  document.getElementById('color-indicator').style.background = '#' + colorHex.toString(16).padStart(6, '0');
}

function setCaseMaterial(matData) {
  state.materialType = matData.key;
  state.caseRoughness = matData.roughness;
  state.caseMetalness = matData.metalness;
  
  caseMat.roughness = matData.roughness;
  caseMat.metalness = matData.metalness;
  caseGroup.children.forEach(child => {
    if (child.material) {
      child.material.roughness = matData.roughness;
      child.material.metalness = matData.metalness;
    }
  });
  
  document.getElementById('material-name').textContent = matData.name;
}

// Click handler
renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allClickables);
  
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const data = hit.userData;
    
    if (data.type === 'color') {
      setCaseColor(data.hex, data.name, data.key);
      // Bounce animation
      animateBounce(hit);
    } else if (data.type === 'material') {
      setCaseMaterial(data);
      animateBounce(hit);
    }
  }
});

// Mouse move for hover
renderer.domElement.addEventListener('mousemove', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(allClickables);
  
  if (intersects.length > 0) {
    const hit = intersects[0].object;
    if (hoveredSwatch !== hit) {
      if (hoveredSwatch) {
        const orig = originalScales.get(hoveredSwatch);
        hoveredSwatch.scale.copy(orig);
      }
      hoveredSwatch = hit;
      renderer.domElement.style.cursor = 'pointer';
    }
  } else {
    if (hoveredSwatch) {
      const orig = originalScales.get(hoveredSwatch);
      hoveredSwatch.scale.copy(orig);
      hoveredSwatch = null;
    }
    renderer.domElement.style.cursor = 'default';
  }
});

function animateBounce(mesh) {
  const orig = originalScales.get(mesh).clone();
  const startTime = performance.now();
  const duration = 300;
  
  function bounce(time) {
    const t = Math.min((time - startTime) / duration, 1);
    const s = 1 + 0.3 * Math.sin(t * Math.PI);
    mesh.scale.set(orig.x * s, orig.y * s, orig.z * s);
    if (t < 1) requestAnimationFrame(bounce);
    else mesh.scale.copy(orig);
  }
  requestAnimationFrame(bounce);
}

// Keyboard handlers
document.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  
  if (key === 'r' && !rotateAnim) {
    const startAngle = phoneAssembly.rotation.y;
    const endAngle = startAngle + Math.PI / 2;
    const startTime = performance.now();
    const duration = 500;
    
    rotateAnim = { startAngle, endAngle, startTime, duration };
  }
  
  if (key === 'l') {
    state.lampOn = !state.lampOn;
    lampLight.visible = state.lampOn;
    bulbMat.emissiveIntensity = state.lampOn ? 1.0 : 0.0;
    bulbMat.color.setHex(state.lampOn ? 0xffdd88 : 0x333333);
  }
  
  if (key === 'e' && !explodeAnim) {
    state.exploded = !state.exploded;
    const startY = caseGroup.position.y;
    const endY = state.exploded ? 2.0 : 0.5;
    const startTime = performance.now();
    const duration = 300;
    
    explodeAnim = { startY, endY, startTime, duration };
  }
});

// Add to Cart
document.getElementById('cart-btn').addEventListener('click', () => {
  state.cartCount++;
  document.getElementById('cart-badge').textContent = state.cartCount;
  
  // Flash green
  const prevColor = state.caseColorHex;
  const prevName = state.caseColor;
  const prevDisplayName = document.getElementById('color-name').textContent;
  
  caseMat.color.setHex(0x00ff00);
  caseGroup.children.forEach(child => {
    if (child.material) child.material.color.setHex(0x00ff00);
  });
  
  // Badge pop animation
  const badge = document.getElementById('cart-badge');
  badge.style.transform = 'scale(1.4)';
  badge.style.transition = 'transform 0.15s ease-out';
  setTimeout(() => {
    badge.style.transform = 'scale(1)';
  }, 150);
  
  setTimeout(() => {
    caseMat.color.setHex(prevColor);
    caseGroup.children.forEach(child => {
      if (child.material) child.material.color.setHex(prevColor);
    });
  }, 300);
});

// Easing
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const now = performance.now();
  const delta = clock.getDelta();
  
  controls.update();
  
  // Rotate animation
  if (rotateAnim) {
    const t = Math.min((now - rotateAnim.startTime) / rotateAnim.duration, 1);
    const eased = easeInOutCubic(t);
    phoneAssembly.rotation.y = rotateAnim.startAngle + (rotateAnim.endAngle - rotateAnim.startAngle) * eased;
    
    if (t >= 1) {
      state.rotationAngle = (Math.round(THREE.MathUtils.radToDeg(phoneAssembly.rotation.y)) % 360 + 360) % 360;
      rotateAnim = null;
    }
  }
  
  // Explode animation
  if (explodeAnim) {
    const t = Math.min((now - explodeAnim.startTime) / explodeAnim.duration, 1);
    const eased = easeInOutCubic(t);
    caseGroup.position.y = explodeAnim.startY + (explodeAnim.endY - explodeAnim.startY) * eased;
    state.caseYPosition = caseGroup.position.y;
    
    if (t >= 1) {
      explodeAnim = null;
    }
  }
  
  // Hover animation for swatches
  if (hoveredSwatch) {
    const orig = originalScales.get(hoveredSwatch);
    const pulse = 1 + 0.15 * Math.sin(now * 0.005);
    hoveredSwatch.scale.set(orig.x * pulse, orig.y * pulse, orig.z * pulse);
  }
  
  // Gentle phone float
  const floatY = Math.sin(now * 0.001) * 0.02;
  phone.position.y = 0.5 + floatY;
  screen.position.y = 0.58 + floatY;
  if (!explodeAnim && !state.exploded) {
    caseGroup.position.y = 0.5 + floatY;
    state.caseYPosition = caseGroup.position.y;
  }
  
  // Update state
  state.rotationAngle = (Math.round(THREE.MathUtils.radToDeg(phoneAssembly.rotation.y)) % 360 + 360) % 360;
  
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
</body>
</html>
