<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Case Designer Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2a2a2a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #top-left {
            top: 20px;
            left: 20px;
        }
        #top-right {
            top: 20px;
            right: 20px;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #bottom-center {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 14px;
        }
        h2 { margin: 0 0 5px 0; font-size: 18px; }
        p { margin: 0; font-size: 14px; color: #ccc; }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #45a049; }
        .badge {
            background: #ff4444;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-left" class="hud-panel">
            <h2>Current Design</h2>
            <p>Color: <span id="ui-color">Red</span></p>
            <p>Material: <span id="ui-material">Matte</span></p>
        </div>

        <div id="top-right" class="hud-panel">
            <button id="btn-add-cart">Add to Cart</button>
            <div class="badge" id="ui-cart-count">0</div>
        </div>

        <div id="bottom-center" class="hud-panel">
            Click swatches to customize. R=Rotate, L=Lamp, E=Explode
        </div>
    </div>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            caseColor: 'red',
            caseColorHex: 0xff4444,
            materialType: 'matte',
            caseRoughness: 1.0,
            caseMetalness: 0.0,
            rotationAngle: 0,
            lampOn: true,
            exploded: false,
            caseYPosition: 0.5,
            cartCount: 0,
            phoneVisible: true,
            swatchCount: 8
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a2a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 7);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Prevent going below table

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Objects ---
        const interactables = [];

        // 1. Workbench
        const tableGeo = new THREE.BoxGeometry(8, 0.3, 6);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.8 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = 0;
        table.receiveShadow = true;
        scene.add(table);

        // Assembly Group for Rotation
        const phoneAssembly = new THREE.Group();
        scene.add(phoneAssembly);

        // 2. Phone Model
        const phoneGeo = new THREE.BoxGeometry(1.2, 2.4, 0.15);
        const phoneMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.4, metalness: 0.8 });
        const phone = new THREE.Mesh(phoneGeo, phoneMat);
        phone.position.set(0, 0.5, 0);
        phone.rotation.x = -Math.PI / 2; // Lay flat
        phone.castShadow = true;
        phone.receiveShadow = true;
        phoneAssembly.add(phone);

        // 3. Phone Case
        const caseGeo = new THREE.BoxGeometry(1.4, 2.6, 0.2);
        const caseMat = new THREE.MeshStandardMaterial({ 
            color: window.__3D_STATE__.caseColorHex, 
            transparent: true, 
            opacity: 0.85,
            roughness: window.__3D_STATE__.caseRoughness,
            metalness: window.__3D_STATE__.caseMetalness,
            side: THREE.DoubleSide
        });
        const phoneCase = new THREE.Mesh(caseGeo, caseMat);
        phoneCase.position.set(0, 0.5, 0);
        phoneCase.rotation.x = -Math.PI / 2; // Lay flat
        phoneCase.castShadow = true;
        phoneCase.receiveShadow = true;
        phoneAssembly.add(phoneCase);

        // 4. Color Swatches
        const colors = [
            { name: 'red', hex: 0xff4444 },
            { name: 'blue', hex: 0x4444ff },
            { name: 'green', hex: 0x44ff44 },
            { name: 'yellow', hex: 0xffff44 },
            { name: 'purple', hex: 0xaa44ff }
        ];
        const swatchGeo = new THREE.SphereGeometry(0.2, 32, 32);
        
        colors.forEach((c, i) => {
            const mat = new THREE.MeshStandardMaterial({ color: c.hex, roughness: 0.5 });
            const mesh = new THREE.Mesh(swatchGeo, mat);
            mesh.position.set(-2 + i * 1, 0.35, 2);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { type: 'color', name: c.name, hex: c.hex };
            scene.add(mesh);
            interactables.push(mesh);
        });

        // 5. Material Swatches
        const materials = [
            { name: 'Matte', roughness: 1.0, metalness: 0.0 },
            { name: 'Glossy', roughness: 0.1, metalness: 0.3 },
            { name: 'Metallic', roughness: 0.3, metalness: 1.0 }
        ];
        const matSwatchGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, 128, 80);
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture, depthTest: false });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(1, 0.5, 1);
            return sprite;
        }

        materials.forEach((m, i) => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x888888, 
                roughness: m.roughness, 
                metalness: m.metalness 
            });
            const mesh = new THREE.Mesh(matSwatchGeo, mat);
            mesh.position.set(-1 + i * 1, 0.35, -2);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { type: 'material', name: m.name.toLowerCase(), roughness: m.roughness, metalness: m.metalness };
            scene.add(mesh);
            interactables.push(mesh);

            const sprite = createTextSprite(m.name);
            sprite.position.set(mesh.position.x, mesh.position.y + 0.4, mesh.position.z);
            scene.add(sprite);
        });

        // 6. Tiny Lamp
        const lampGroup = new THREE.Group();
        lampGroup.position.set(3, 0.15, -2);
        scene.add(lampGroup);

        const lampBaseGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.1, 16);
        const lampMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.8 });
        const lampBase = new THREE.Mesh(lampBaseGeo, lampMat);
        lampBase.castShadow = true;
        lampGroup.add(lampBase);

        const lampArmGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.2);
        const lampArm = new THREE.Mesh(lampArmGeo, lampMat);
        lampArm.position.set(-0.2, 0.5, 0);
        lampArm.rotation.z = Math.PI / 6;
        lampArm.castShadow = true;
        lampGroup.add(lampArm);

        const lampHeadGeo = new THREE.ConeGeometry(0.25, 0.4, 16);
        const lampHead = new THREE.Mesh(lampHeadGeo, lampMat);
        lampHead.position.set(-0.5, 1.0, 0);
        lampHead.rotation.z = Math.PI / 3;
        lampHead.castShadow = true;
        lampGroup.add(lampHead);

        const pointLight = new THREE.PointLight(0xffdd88, 0.5, 10);
        pointLight.position.set(-0.6, 0.9, 0);
        pointLight.castShadow = true;
        lampGroup.add(pointLight);

        // --- Animation State ---
        const anims = {
            rotation: { active: false, start: 0, end: 0, startTime: 0, duration: 500 },
            explode: { active: false, start: 0.5, end: 0.5, startTime: 0, duration: 300 },
            flash: { active: false, endTime: 0 }
        };

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return; // Ignore UI clicks
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactables);

            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                if (data.type === 'color') {
                    window.__3D_STATE__.caseColor = data.name;
                    window.__3D_STATE__.caseColorHex = data.hex;
                    if (!anims.flash.active) {
                        phoneCase.material.color.setHex(data.hex);
                    }
                } else if (data.type === 'material') {
                    window.__3D_STATE__.materialType = data.name;
                    window.__3D_STATE__.caseRoughness = data.roughness;
                    window.__3D_STATE__.caseMetalness = data.metalness;
                    phoneCase.material.roughness = data.roughness;
                    phoneCase.material.metalness = data.metalness;
                }
                updateUI();
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            const now = performance.now();

            if (key === 'r' && !anims.rotation.active) {
                anims.rotation.active = true;
                anims.rotation.start = phoneAssembly.rotation.y;
                anims.rotation.end = phoneAssembly.rotation.y + Math.PI / 2;
                anims.rotation.startTime = now;
            }
            else if (key === 'l') {
                window.__3D_STATE__.lampOn = !window.__3D_STATE__.lampOn;
                pointLight.intensity = window.__3D_STATE__.lampOn ? 0.5 : 0;
            }
            else if (key === 'e' && !anims.explode.active) {
                window.__3D_STATE__.exploded = !window.__3D_STATE__.exploded;
                anims.explode.active = true;
                anims.explode.start = phoneCase.position.y;
                anims.explode.end = window.__3D_STATE__.exploded ? 2.0 : 0.5;
                anims.explode.startTime = now;
            }
        });

        document.getElementById('btn-add-cart').addEventListener('click', () => {
            window.__3D_STATE__.cartCount++;
            updateUI();
            
            // Flash green
            anims.flash.active = true;
            anims.flash.endTime = performance.now() + 300;
            phoneCase.material.color.setHex(0x00ff00);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI Update ---
        function updateUI() {
            document.getElementById('ui-color').innerText = 
                window.__3D_STATE__.caseColor.charAt(0).toUpperCase() + window.__3D_STATE__.caseColor.slice(1);
            document.getElementById('ui-material').innerText = 
                window.__3D_STATE__.materialType.charAt(0).toUpperCase() + window.__3D_STATE__.materialType.slice(1);
            document.getElementById('ui-cart-count').innerText = window.__3D_STATE__.cartCount;
        }

        // --- Render Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            // Handle Animations
            if (anims.rotation.active) {
                let t = (time - anims.rotation.startTime) / anims.rotation.duration;
                if (t >= 1) { t = 1; anims.rotation.active = false; }
                // Ease in out quad
                let ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                phoneAssembly.rotation.y = anims.rotation.start + (anims.rotation.end - anims.rotation.start) * ease;
                window.__3D_STATE__.rotationAngle = (phoneAssembly.rotation.y * 180 / Math.PI) % 360;
            }

            if (anims.explode.active) {
                let t = (time - anims.explode.startTime) / anims.explode.duration;
                if (t >= 1) { t = 1; anims.explode.active = false; }
                let ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
                phoneCase.position.y = anims.explode.start + (anims.explode.end - anims.explode.start) * ease;
                window.__3D_STATE__.caseYPosition = phoneCase.position.y;
            }

            if (anims.flash.active) {
                if (time > anims.flash.endTime) {
                    anims.flash.active = false;
                    phoneCase.material.color.setHex(window.__3D_STATE__.caseColorHex);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Init
        updateUI();
        animate(performance.now());

    </script>
</body>
</html>
