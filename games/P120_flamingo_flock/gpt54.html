<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Flamingo Boids</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, Helvetica, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 260px;
      line-height: 1.5;
      font-size: 13px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    #controls {
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.15);
      padding-top: 10px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }
    .row label {
      width: 52px;
      flex: 0 0 52px;
    }
    .row input[type="range"] {
      flex: 1;
    }
    .value {
      width: 36px;
      text-align: right;
      color: #8fd3ff;
    }
    #hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      color: #d7e8ff;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>群体中心: <span id="flockCenter">--</span></div>
      <div>平均速度: <span id="avgSpeed">--</span></div>
      <div>分离权重: <span id="sepVal">1.00</span></div>
      <div>对齐权重: <span id="alignVal">1.00</span></div>
      <div>凝聚权重: <span id="cohVal">1.00</span></div>

      <div id="controls">
        <div class="row">
          <label for="sepWeight">分离</label>
          <input id="sepWeight" type="range" min="0" max="2" step="0.01" value="1" />
          <span class="value" id="sepVal2">1.00</span>
        </div>
        <div class="row">
          <label for="alignWeight">对齐</label>
          <input id="alignWeight" type="range" min="0" max="2" step="0.01" value="1" />
          <span class="value" id="alignVal2">1.00</span>
        </div>
        <div class="row">
          <label for="cohWeight">凝聚</label>
          <input id="cohWeight" type="range" min="0" max="2" step="0.01" value="1" />
          <span class="value" id="cohVal2">1.00</span>
        </div>
      </div>
    </div>
    <div id="hint">鼠标移动红色捕食者球体，拖拽可旋转视角</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const flockCenterEl = document.getElementById('flockCenter');
    const avgSpeedEl = document.getElementById('avgSpeed');
    const sepWeightEl = document.getElementById('sepWeight');
    const alignWeightEl = document.getElementById('alignWeight');
    const cohWeightEl = document.getElementById('cohWeight');
    const sepVal = document.getElementById('sepVal');
    const alignVal = document.getElementById('alignVal');
    const cohVal = document.getElementById('cohVal');
    const sepVal2 = document.getElementById('sepVal2');
    const alignVal2 = document.getElementById('alignVal2');
    const cohVal2 = document.getElementById('cohVal2');

    function syncSliderLabels() {
      const s = Number(sepWeightEl.value).toFixed(2);
      const a = Number(alignWeightEl.value).toFixed(2);
      const c = Number(cohWeightEl.value).toFixed(2);
      sepVal.textContent = s;
      alignVal.textContent = a;
      cohVal.textContent = c;
      sepVal2.textContent = s;
      alignVal2.textContent = a;
      cohVal2.textContent = c;
    }
    sepWeightEl.addEventListener('input', syncSliderLabels);
    alignWeightEl.addEventListener('input', syncSliderLabels);
    cohWeightEl.addEventListener('input', syncSliderLabels);
    syncSliderLabels();

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b7e3);
    scene.fog = new THREE.Fog(0x87b7e3, 60, 140);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 18, 42);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 10, 0);
    controls.enableDamping = true;
    controls.minDistance = 15;
    controls.maxDistance = 120;

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x445566, 1.4);
    hemiLight.position.set(0, 50, 0);
    scene.add(hemiLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(20, 40, 10);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(120, 120),
      new THREE.MeshPhongMaterial({ color: 0x5f7d4b, depthWrite: false })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(120, 24, 0xffffff, 0xffffff);
    grid.material.opacity = 0.12;
    grid.material.transparent = true;
    scene.add(grid);

    const boundsMin = new THREE.Vector3(-30, 0, -30);
    const boundsMax = new THREE.Vector3(30, 25, 30);

    const box = new THREE.Box3Helper(new THREE.Box3(boundsMin.clone(), boundsMax.clone()), 0x88c0ff);
    box.material.transparent = true;
    box.material.opacity = 0.2;
    scene.add(box);

    const predator = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0xff3030, emissive: 0x550000 })
    );
    predator.position.set(0, 8, 0);
    scene.add(predator);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -8);
    const hitPoint = new THREE.Vector3();

    window.addEventListener('pointermove', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      if (raycaster.ray.intersectPlane(plane, hitPoint)) {
        predator.position.copy(hitPoint);
        predator.position.x = THREE.MathUtils.clamp(predator.position.x, boundsMin.x, boundsMax.x);
        predator.position.y = 8;
        predator.position.z = THREE.MathUtils.clamp(predator.position.z, boundsMin.z, boundsMax.z);
      }
    });

    class Boid {
      constructor(object, mixer) {
        this.object = object;
        this.mixer = mixer;
        this.position = object.position;
        this.velocity = new THREE.Vector3(
          THREE.MathUtils.randFloatSpread(2),
          THREE.MathUtils.randFloatSpread(1),
          THREE.MathUtils.randFloatSpread(2)
        ).normalize().multiplyScalar(THREE.MathUtils.randFloat(2.5, 4.0));
        this.acceleration = new THREE.Vector3();
      }

      updateTransform() {
        const dir = this.velocity.clone().normalize();
        if (dir.lengthSq() > 0.0001) {
          const yaw = Math.atan2(dir.x, dir.z);
          const pitch = Math.asin(THREE.MathUtils.clamp(dir.y, -1, 1));
          this.object.rotation.set(-pitch * 0.35, yaw, 0);
        }
      }
    }

    const boids = [];
    const mixers = [];
    let modelLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'assets/flamingo.glb',
      (gltf) => {
        const source = gltf.scene;
        source.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            if (child.material) child.material.side = THREE.FrontSide;
          }
        });

        for (let i = 0; i < 15; i++) {
          const clone = source.clone(true);
          const scale = 0.02;
          clone.scale.setScalar(scale);
          clone.position.set(
            THREE.MathUtils.randFloat(-20, 20),
            THREE.MathUtils.randFloat(5, 15),
            THREE.MathUtils.randFloat(-20, 20)
          );

          clone.rotation.y = Math.random() * Math.PI * 2;
          scene.add(clone);

          const mixer = new THREE.AnimationMixer(clone);
          if (gltf.animations && gltf.animations.length > 0) {
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
          }
          mixers.push(mixer);

          const boid = new Boid(clone, mixer);
          boid.updateTransform();
          boids.push(boid);
        }

        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load flamingo model:', err);
      }
    );

    const tmpSep = new THREE.Vector3();
    const tmpAlign = new THREE.Vector3();
    const tmpCoh = new THREE.Vector3();
    const tmpPred = new THREE.Vector3();
    const desired = new THREE.Vector3();
    const flockCenter = new THREE.Vector3();
    const avgVelocity = new THREE.Vector3();

    function steerTowards(currentVelocity, desiredVelocity, maxForce) {
      const steer = desiredVelocity.clone().sub(currentVelocity);
      if (steer.length() > maxForce) steer.setLength(maxForce);
      return steer;
    }

    function updateBoids(dt) {
      const separationWeight = Number(sepWeightEl.value);
      const alignmentWeight = Number(alignWeightEl.value);
      const cohesionWeight = Number(cohWeightEl.value);

      const neighborRadius = 10;
      const separationDist = 3;
      const maxSpeed = 5.0;
      const predatorMaxSpeed = 7.5;
      const maxForce = 2.8 * dt;
      const boundaryForce = 3.2 * dt;
      const predatorRadius = 5;

      flockCenter.set(0, 0, 0);
      avgVelocity.set(0, 0, 0);

      for (const boid of boids) {
        flockCenter.add(boid.position);
        avgVelocity.add(boid.velocity);
      }

      if (boids.length > 0) {
        flockCenter.multiplyScalar(1 / boids.length);
        avgVelocity.multiplyScalar(1 / boids.length);
      }

      for (let i = 0; i < boids.length; i++) {
        const boid = boids[i];

        tmpSep.set(0, 0, 0);
        tmpAlign.set(0, 0, 0);
        tmpCoh.set(0, 0, 0);

        let alignCount = 0;
        let cohCount = 0;
        let sepCount = 0;

        for (let j = 0; j < boids.length; j++) {
          if (i === j) continue;
          const other = boids[j];
          const dist = boid.position.distanceTo(other.position);

          if (dist < neighborRadius) {
            tmpAlign.add(other.velocity);
            tmpCoh.add(other.position);
            alignCount++;
            cohCount++;
          }

          if (dist > 0 && dist < separationDist) {
            desired.copy(boid.position).sub(other.position);
            desired.normalize().divideScalar(Math.max(dist, 0.001));
            tmpSep.add(desired);
            sepCount++;
          }
        }

        boid.acceleration.set(0, 0, 0);

        if (sepCount > 0) {
          tmpSep.multiplyScalar(1 / sepCount);
          if (tmpSep.lengthSq() > 0) {
            tmpSep.setLength(maxSpeed);
            boid.acceleration.add(steerTowards(boid.velocity, tmpSep, maxForce).multiplyScalar(separationWeight));
          }
        }

        if (alignCount > 0) {
          tmpAlign.multiplyScalar(1 / alignCount);
          if (tmpAlign.lengthSq() > 0) {
            tmpAlign.setLength(maxSpeed);
            boid.acceleration.add(steerTowards(boid.velocity, tmpAlign, maxForce).multiplyScalar(alignmentWeight));
          }
        }

        if (cohCount > 0) {
          tmpCoh.multiplyScalar(1 / cohCount).sub(boid.position);
          if (tmpCoh.lengthSq() > 0) {
            tmpCoh.setLength(maxSpeed);
            boid.acceleration.add(steerTowards(boid.velocity, tmpCoh, maxForce).multiplyScalar(cohesionWeight));
          }
        }

        const predatorDist = boid.position.distanceTo(predator.position);
        let speedLimit = maxSpeed;
        if (predatorDist < predatorRadius) {
          tmpPred.copy(boid.position).sub(predator.position);
          if (tmpPred.lengthSq() > 0) {
            tmpPred.normalize().multiplyScalar(predatorMaxSpeed);
            boid.acceleration.add(steerTowards(boid.velocity, tmpPred, maxForce * 2.2).multiplyScalar(2.2));
            speedLimit = predatorMaxSpeed;
          }
        }

        if (boid.position.x < boundsMin.x + 2) boid.acceleration.x += boundaryForce;
        if (boid.position.x > boundsMax.x - 2) boid.acceleration.x -= boundaryForce;
        if (boid.position.y < boundsMin.y + 2) boid.acceleration.y += boundaryForce;
        if (boid.position.y > boundsMax.y - 2) boid.acceleration.y -= boundaryForce;
        if (boid.position.z < boundsMin.z + 2) boid.acceleration.z += boundaryForce;
        if (boid.position.z > boundsMax.z - 2) boid.acceleration.z -= boundaryForce;

        boid.velocity.add(boid.acceleration);
        const limit = speedLimit * dt * 60;
        if (boid.velocity.length() > limit) boid.velocity.setLength(limit);

        boid.position.addScaledVector(boid.velocity, dt);

        boid.position.x = THREE.MathUtils.clamp(boid.position.x, boundsMin.x - 1, boundsMax.x + 1);
        boid.position.y = THREE.MathUtils.clamp(boid.position.y, boundsMin.y + 0.5, boundsMax.y);
        boid.position.z = THREE.MathUtils.clamp(boid.position.z, boundsMin.z - 1, boundsMax.z + 1);

        boid.updateTransform();
      }

      const avgSpeed = boids.length > 0 ? avgVelocity.length() / boids.length : 0;

      flockCenterEl.textContent =
        `x:${flockCenter.x.toFixed(2)} y:${flockCenter.y.toFixed(2)} z:${flockCenter.z.toFixed(2)}`;
      avgSpeedEl.textContent = avgSpeed.toFixed(2);

      window.__3D_STATE__ = {
        modelLoaded,
        boidCount: 15,
        flockCenter: {
          x: Number(flockCenter.x.toFixed(3)),
          y: Number(flockCenter.y.toFixed(3)),
          z: Number(flockCenter.z.toFixed(3))
        },
        avgSpeed: Number(avgSpeed.toFixed(3)),
        separationWeight: Number(separationWeight.toFixed(3)),
        alignmentWeight: Number(alignmentWeight.toFixed(3)),
        cohesionWeight: Number(cohesionWeight.toFixed(3))
      };
    }

    window.__3D_STATE__ = {
      modelLoaded: false,
      boidCount: 15,
      flockCenter: { x: 0, y: 0, z: 0 },
      avgSpeed: 0,
      separationWeight: 1,
      alignmentWeight: 1,
      cohesionWeight: 1
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      for (const mixer of mixers) mixer.update(dt);

      if (modelLoaded) {
        updateBoids(dt);
      } else {
        window.__3D_STATE__ = {
          modelLoaded: false,
          boidCount: 15,
          flockCenter: { x: 0, y: 0, z: 0 },
          avgSpeed: 0,
          separationWeight: Number(sepWeightEl.value),
          alignmentWeight: Number(alignWeightEl.value),
          cohesionWeight: Number(cohWeightEl.value)
        };
      }

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
