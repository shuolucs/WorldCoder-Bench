<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boid Flocking Simulation - Flamingos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 16px 20px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.8;
    min-width: 260px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
  }

  #hud h3 {
    margin-bottom: 8px;
    font-size: 15px;
    color: #ff6b9d;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 6px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 4px 0;
  }

  .slider-row label {
    flex: 0 0 100px;
    color: #ccc;
  }

  .slider-row input[type="range"] {
    flex: 1;
    margin: 0 8px;
    accent-color: #ff6b9d;
  }

  .slider-row .val {
    flex: 0 0 35px;
    text-align: right;
    color: #ff6b9d;
    font-weight: bold;
  }

  .info-line {
    color: #aaa;
  }

  .info-line span {
    color: #fff;
    font-weight: bold;
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff6b9d;
    font-size: 20px;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="loading">Loading flamingos...</div>

<div id="hud">
  <h3>🦩 Boid Flock Simulation</h3>

  <div class="slider-row">
    <label>Separation</label>
    <input type="range" id="sepWeight" min="0" max="2" step="0.01" value="1">
    <span class="val" id="sepVal">1.00</span>
  </div>

  <div class="slider-row">
    <label>Alignment</label>
    <input type="range" id="alignWeight" min="0" max="2" step="0.01" value="1">
    <span class="val" id="alignVal">1.00</span>
  </div>

  <div class="slider-row">
    <label>Cohesion</label>
    <input type="range" id="cohWeight" min="0" max="2" step="0.01" value="1">
    <span class="val" id="cohVal">1.00</span>
  </div>

  <hr style="border-color: rgba(255,255,255,0.1); margin: 8px 0;">

  <div class="info-line">Flock Center: <span id="flockCenter">(0, 0, 0)</span></div>
  <div class="info-line">Avg Speed: <span id="avgSpeed">0.00</span></div>
  <div class="info-line" style="margin-top:4px; color:#f66;">🔴 Red sphere = predator (move mouse)</div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
window.__3D_STATE__ = {
  modelLoaded: false,
  boidCount: 15,
  flockCenter: { x: 0, y: 0, z: 0 },
  avgSpeed: 0,
  separationWeight: 1,
  alignmentWeight: 1,
  cohesionWeight: 1
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 20, 50);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 10, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(20, 40, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -40;
dirLight.shadow.camera.right = 40;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -40;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x556b2f, 0.4);
scene.add(hemiLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(120, 120);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x3a7d44,
  roughness: 0.9,
  metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Water plane
const waterGeo = new THREE.PlaneGeometry(80, 80);
const waterMat = new THREE.MeshStandardMaterial({
  color: 0x4488cc,
  roughness: 0.2,
  metalness: 0.3,
  transparent: true,
  opacity: 0.6
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 0.05;
scene.add(water);

// Boundary visualization (wireframe box)
const boundMin = new THREE.Vector3(-30, 0, -30);
const boundMax = new THREE.Vector3(30, 25, 30);
const boundSize = new THREE.Vector3().subVectors(boundMax, boundMin);
const boundCenter = new THREE.Vector3().addVectors(boundMin, boundMax).multiplyScalar(0.5);
const boundBoxGeo = new THREE.BoxGeometry(boundSize.x, boundSize.y, boundSize.z);
const boundBoxMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.08 });
const boundBox = new THREE.Mesh(boundBoxGeo, boundBoxMat);
boundBox.position.copy(boundCenter);
scene.add(boundBox);

// --- Predator ---
const predatorGeo = new THREE.SphereGeometry(0.5, 16, 16);
const predatorMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x660000, roughness: 0.3 });
const predator = new THREE.Mesh(predatorGeo, predatorMat);
predator.position.set(0, 10, 0);
predator.castShadow = true;
scene.add(predator);

// Predator glow
const glowGeo = new THREE.SphereGeometry(0.8, 16, 16);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.2 });
const glow = new THREE.Mesh(glowGeo, glowMat);
predator.add(glow);

// --- Mouse tracking for predator ---
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const predatorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -10);

window.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

// --- Boid Class ---
class Boid {
  constructor(mesh, mixer, clip) {
    this.mesh = mesh;
    this.mixer = mixer;
    this.action = mixer.clipAction(clip);
    this.action.play();
    // Randomize animation offset
    this.action.time = Math.random() * clip.duration;

    this.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 2,
      (Math.random() - 0.5) * 0.5,
      (Math.random() - 0.5) * 2
    );
    this.acceleration = new THREE.Vector3();
    this.maxSpeed = 8;
    this.maxForce = 5;
  }

  applyForce(force) {
    this.acceleration.add(force);
  }

  separation(boids, weight) {
    const desiredSep = 3;
    const steer = new THREE.Vector3();
    let count = 0;

    for (const other of boids) {
      if (other === this) continue;
      const d = this.mesh.position.distanceTo(other.mesh.position);
      if (d > 0 && d < desiredSep) {
        const diff = new THREE.Vector3().subVectors(this.mesh.position, other.mesh.position);
        diff.normalize();
        diff.divideScalar(d); // Weight by distance
        steer.add(diff);
        count++;
      }
    }

    if (count > 0) {
      steer.divideScalar(count);
      steer.normalize();
      steer.multiplyScalar(this.maxSpeed);
      steer.sub(this.velocity);
      if (steer.length() > this.maxForce) {
        steer.normalize().multiplyScalar(this.maxForce);
      }
    }

    steer.multiplyScalar(weight);
    return steer;
  }

  alignment(boids, weight) {
    const neighborDist = 10;
    const sum = new THREE.Vector3();
    let count = 0;

    for (const other of boids) {
      if (other === this) continue;
      const d = this.mesh.position.distanceTo(other.mesh.position);
      if (d > 0 && d < neighborDist) {
        sum.add(other.velocity);
        count++;
      }
    }

    if (count > 0) {
      sum.divideScalar(count);
      sum.normalize();
      sum.multiplyScalar(this.maxSpeed);
      const steer = new THREE.Vector3().subVectors(sum, this.velocity);
      if (steer.length() > this.maxForce) {
        steer.normalize().multiplyScalar(this.maxForce);
      }
      steer.multiplyScalar(weight);
      return steer;
    }

    return new THREE.Vector3();
  }

  cohesion(boids, weight) {
    const neighborDist = 10;
    const sum = new THREE.Vector3();
    let count = 0;

    for (const other of boids) {
      if (other === this) continue;
      const d = this.mesh.position.distanceTo(other.mesh.position);
      if (d > 0 && d < neighborDist) {
        sum.add(other.mesh.position);
        count++;
      }
    }

    if (count > 0) {
      sum.divideScalar(count);
      const desired = new THREE.Vector3().subVectors(sum, this.mesh.position);
      desired.normalize();
      desired.multiplyScalar(this.maxSpeed);
      const steer = new THREE.Vector3().subVectors(desired, this.velocity);
      if (steer.length() > this.maxForce) {
        steer.normalize().multiplyScalar(this.maxForce);
      }
      steer.multiplyScalar(weight);
      return steer;
    }

    return new THREE.Vector3();
  }

  avoidPredator(predatorPos) {
    const d = this.mesh.position.distanceTo(predatorPos);
    if (d < 5) {
      const flee = new THREE.Vector3().subVectors(this.mesh.position, predatorPos);
      flee.normalize();
      flee.multiplyScalar(this.maxSpeed * 2);
      flee.sub(this.velocity);
      if (flee.length() > this.maxForce * 3) {
        flee.normalize().multiplyScalar(this.maxForce * 3);
      }
      return flee;
    }
    return new THREE.Vector3();
  }

  boundaries() {
    const steer = new THREE.Vector3();
    const margin = 3;
    const turnForce = 8;
    const pos = this.mesh.position;

    if (pos.x < boundMin.x + margin) steer.x += turnForce * (1 - (pos.x - boundMin.x) / margin);
    if (pos.x > boundMax.x - margin) steer.x -= turnForce * (1 - (boundMax.x - pos.x) / margin);
    if (pos.y < boundMin.y + margin) steer.y += turnForce * (1 - (pos.y - boundMin.y) / margin);
    if (pos.y > boundMax.y - margin) steer.y -= turnForce * (1 - (boundMax.y - pos.y) / margin);
    if (pos.z < boundMin.z + margin) steer.z += turnForce * (1 - (pos.z - boundMin.z) / margin);
    if (pos.z > boundMax.z - margin) steer.z -= turnForce * (1 - (boundMax.z - pos.z) / margin);

    // Hard clamp
    if (pos.x < boundMin.x) { pos.x = boundMin.x; this.velocity.x = Math.abs(this.velocity.x); }
    if (pos.x > boundMax.x) { pos.x = boundMax.x; this.velocity.x = -Math.abs(this.velocity.x); }
    if (pos.y < boundMin.y) { pos.y = boundMin.y; this.velocity.y = Math.abs(this.velocity.y); }
    if (pos.y > boundMax.y) { pos.y = boundMax.y; this.velocity.y = -Math.abs(this.velocity.y); }
    if (pos.z < boundMin.z) { pos.z = boundMin.z; this.velocity.z = Math.abs(this.velocity.z); }
    if (pos.z > boundMax.z) { pos.z = boundMax.z; this.velocity.z = -Math.abs(this.velocity.z); }

    return steer;
  }

  update(dt, boids, sepW, alignW, cohW, predatorPos) {
    this.acceleration.set(0, 0, 0);

    // Boid rules
    const sep = this.separation(boids, sepW);
    const ali = this.alignment(boids, alignW);
    const coh = this.cohesion(boids, cohW);
    const avoid = this.avoidPredator(predatorPos);
    const bound = this.boundaries();

    this.applyForce(sep);
    this.applyForce(ali);
    this.applyForce(coh);
    this.applyForce(avoid);
    this.applyForce(bound);

    // Update velocity
    this.velocity.add(this.acceleration.clone().multiplyScalar(dt));

    // Clamp speed
    if (this.velocity.length() > this.maxSpeed) {
      this.velocity.normalize().multiplyScalar(this.maxSpeed);
    }
    // Minimum speed
    if (this.velocity.length() < 2) {
      this.velocity.normalize().multiplyScalar(2);
    }

    // Update position
    this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));

    // Orient mesh to face velocity direction
    if (this.velocity.lengthSq() > 0.01) {
      const lookTarget = new THREE.Vector3().addVectors(this.mesh.position, this.velocity);
      this.mesh.lookAt(lookTarget);
    }

    // Update animation
    this.mixer.update(dt);
  }
}

// --- Load Model & Create Boids ---
const boids = [];
const loader = new GLTFLoader();

loader.load('assets/flamingo.glb', (gltf) => {
  const model = gltf.scene.children[0];
  const clip = gltf.animations[0];

  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  for (let i = 0; i < 15; i++) {
    const clone = model.clone();

    // Clone geometry and material to avoid shared references
    clone.traverse((child) => {
      if (child.isMesh) {
        child.geometry = child.geometry.clone();
        child.material = child.material.clone();
      }
    });

    // Random position in specified range
    clone.position.set(
      THREE.MathUtils.randFloat(-20, 20),
      THREE.MathUtils.randFloat(5, 15),
      THREE.MathUtils.randFloat(-20, 20)
    );

    const scale = 0.04;
    clone.scale.set(scale, scale, scale);

    scene.add(clone);

    const mixer = new THREE.AnimationMixer(clone);
    const boid = new Boid(clone, mixer, clip);
    boids.push(boid);
  }

  window.__3D_STATE__.modelLoaded = true;
  document.getElementById('loading').style.display = 'none';

}, undefined, (error) => {
  console.error('Error loading flamingo model:', error);
  document.getElementById('loading').textContent = 'Error loading model. Check assets/flamingo.glb';
});

// --- Slider Controls ---
const sepSlider = document.getElementById('sepWeight');
const alignSlider = document.getElementById('alignWeight');
const cohSlider = document.getElementById('cohWeight');
const sepValEl = document.getElementById('sepVal');
const alignValEl = document.getElementById('alignVal');
const cohValEl = document.getElementById('cohVal');

sepSlider.addEventListener('input', () => { sepValEl.textContent = parseFloat(sepSlider.value).toFixed(2); });
alignSlider.addEventListener('input', () => { alignValEl.textContent = parseFloat(alignSlider.value).toFixed(2); });
cohSlider.addEventListener('input', () => { cohValEl.textContent = parseFloat(cohSlider.value).toFixed(2); });

// --- HUD Elements ---
const flockCenterEl = document.getElementById('flockCenter');
const avgSpeedEl = document.getElementById('avgSpeed');

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();
const intersectPoint = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  controls.update();

  // Update predator position from mouse
  raycaster.setFromCamera(mouse, camera);
  const ray = raycaster.ray;
  ray.intersectPlane(predatorPlane, intersectPoint);
  if (intersectPoint) {
    predator.position.x = THREE.MathUtils.clamp(intersectPoint.x, -30, 30);
    predator.position.z = THREE.MathUtils.clamp(intersectPoint.z, -30, 30);
    predator.position.y = 10;
  }

  // Predator glow pulse
  const pulse = 0.15 + Math.sin(clock.elapsedTime * 4) * 0.05;
  glowMat.opacity = pulse;

  // Get weights
  const sepW = parseFloat(sepSlider.value);
  const alignW = parseFloat(alignSlider.value);
  const cohW = parseFloat(cohSlider.value);

  // Update boids
  const center = new THREE.Vector3();
  let totalSpeed = 0;

  for (const boid of boids) {
    boid.update(dt, boids, sepW, alignW, cohW, predator.position);
    center.add(boid.mesh.position);
    totalSpeed += boid.velocity.length();
  }

  if (boids.length > 0) {
    center.divideScalar(boids.length);
    totalSpeed /= boids.length;
  }

  // Update HUD
  flockCenterEl.textContent = `(${center.x.toFixed(1)}, ${center.y.toFixed(1)}, ${center.z.toFixed(1)})`;
  avgSpeedEl.textContent = totalSpeed.toFixed(2);

  // Update global state
  window.__3D_STATE__.flockCenter = { x: center.x, y: center.y, z: center.z };
  window.__3D_STATE__.avgSpeed = totalSpeed;
  window.__3D_STATE__.separationWeight = sepW;
  window.__3D_STATE__.alignmentWeight = alignW;
  window.__3D_STATE__.cohesionWeight = cohW;
  window.__3D_STATE__.boidCount = boids.length;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
