<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Golf Putting Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      z-index: 10;
    }

    #strokeCount {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }

    #scoreDisplay {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }

    #powerContainer {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      width: 200px;
      height: 20px;
      border: 2px solid white;
      background: rgba(255,255,255,0.1);
      box-sizing: border-box;
    }

    #powerBar {
      width: 0%;
      height: 100%;
      background: #00ff66;
      transition: width 0.03s linear, background 0.03s linear;
    }

    #messageDisplay {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      font-weight: bold;
      color: #ffe066;
      text-shadow: 0 3px 8px rgba(0,0,0,0.8);
      display: none;
      text-align: center;
      padding: 12px 20px;
      background: rgba(0,0,0,0.35);
      border-radius: 10px;
    }

    #instructions {
      position: absolute;
      left: 16px;
      bottom: 16px;
      font-size: 14px;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      line-height: 1.5;
      max-width: 420px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="strokeCount">Strokes: 0</div>
    <div id="scoreDisplay">Score: 0</div>

    <div id="messageDisplay"></div>

    <div id="powerContainer">
      <div id="powerBar"></div>
    </div>

    <div id="instructions">
      Left/Right: Aim<br>
      Hold Space: Charge power, Release: Putt<br>
      R: Reset ball (counts as stroke)<br>
      N: New game
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls;
    let green, ball, hole, flagPole, flag, aimLine;
    let obstacleModel = null;
    let obstacleBox = new THREE.Box3();
    let obstacleBoxHelper = null;

    const clock = new THREE.Clock();

    const ballRadius = 0.15;
    const teePosition = new THREE.Vector3(0, 0.15, 8);
    const holePosition = new THREE.Vector3(2, 0.01, -10);

    const greenLength = 30;
    const greenWidth = 10;
    const halfLength = greenLength / 2; // z: -15 to 15
    const halfWidth = greenWidth / 2;   // x: -5 to 5

    const velocity = new THREE.Vector2(0, 0); // x, z
    let aimAngle = -Math.PI / 2;
    let isCharging = false;
    let power = 0;
    let chargeStartTime = 0;
    let strokeCount = 0;
    let score = 0;
    let ballSunk = false;
    let modelLoaded = false;
    let wallBounceCount = 0;
    let modelBounceCount = 0;

    const keys = {
      left: false,
      right: false,
      space: false
    };

    const strokeCountEl = document.getElementById('strokeCount');
    const scoreDisplayEl = document.getElementById('scoreDisplay');
    const powerBarEl = document.getElementById('powerBar');
    const messageDisplayEl = document.getElementById('messageDisplay');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87ceeb);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 12, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.enableDamping = true;

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 10, 5);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      scene.add(dirLight);

      createGreen();
      createWalls();
      createBall();
      createHoleAndFlag();
      createAimLine();
      loadObstacleModel();

      setupEvents();
      updateHUD();
      initState();
    }

    function createGreen() {
      const greenGeometry = new THREE.BoxGeometry(greenWidth, 0.2, greenLength);
      const greenMaterial = new THREE.MeshStandardMaterial({ color: 0x2d8a4e });
      green = new THREE.Mesh(greenGeometry, greenMaterial);
      green.receiveShadow = true;
      green.position.set(0, -0.1, 0);
      scene.add(green);
    }

    function createWalls() {
      const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x8b6b3f });

      const wallThickness = 0.2;
      const wallHeight = 0.3;

      const leftWall = new THREE.Mesh(
        new THREE.BoxGeometry(wallThickness, wallHeight, greenLength),
        wallMaterial
      );
      leftWall.position.set(-halfWidth - wallThickness / 2, wallHeight / 2 - 0.1, 0);
      scene.add(leftWall);

      const rightWall = new THREE.Mesh(
        new THREE.BoxGeometry(wallThickness, wallHeight, greenLength),
        wallMaterial
      );
      rightWall.position.set(halfWidth + wallThickness / 2, wallHeight / 2 - 0.1, 0);
      scene.add(rightWall);

      const topWall = new THREE.Mesh(
        new THREE.BoxGeometry(greenWidth + wallThickness * 2, wallHeight, wallThickness),
        wallMaterial
      );
      topWall.position.set(0, wallHeight / 2 - 0.1, -halfLength - wallThickness / 2);
      scene.add(topWall);

      const bottomWall = new THREE.Mesh(
        new THREE.BoxGeometry(greenWidth + wallThickness * 2, wallHeight, wallThickness),
        wallMaterial
      );
      bottomWall.position.set(0, wallHeight / 2 - 0.1, halfLength + wallThickness / 2);
      scene.add(bottomWall);
    }

    function createBall() {
      const geometry = new THREE.SphereGeometry(ballRadius, 32, 32);
      const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
      ball = new THREE.Mesh(geometry, material);
      ball.castShadow = true;
      ball.receiveShadow = true;
      ball.position.copy(teePosition);
      scene.add(ball);
    }

    function createHoleAndFlag() {
      const holeGeometry = new THREE.CylinderGeometry(0.4, 0.4, 0.02, 32);
      const holeMaterial = new THREE.MeshStandardMaterial({ color: 0x111111 });
      hole = new THREE.Mesh(holeGeometry, holeMaterial);
      hole.position.copy(holePosition);
      scene.add(hole);

      const poleGeometry = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 16);
      const poleMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
      flagPole = new THREE.Mesh(poleGeometry, poleMaterial);
      flagPole.position.set(holePosition.x, 0.75, holePosition.z);
      scene.add(flagPole);

      const flagGeometry = new THREE.BufferGeometry();
      const flagVertices = new Float32Array([
        0, 0.2, 0,
        0.5, 0.1, 0,
        0, 0, 0
      ]);
      flagGeometry.setAttribute('position', new THREE.BufferAttribute(flagVertices, 3));
      flagGeometry.computeVertexNormals();

      const flagMaterial = new THREE.MeshStandardMaterial({
        color: 0xff2222,
        side: THREE.DoubleSide
      });
      flag = new THREE.Mesh(flagGeometry, flagMaterial);
      flag.position.set(holePosition.x, 1.35, holePosition.z);
      scene.add(flag);
    }

    function createAimLine() {
      const points = [new THREE.Vector3(), new THREE.Vector3()];
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color: 0xffff00 });
      aimLine = new THREE.Line(geometry, material);
      scene.add(aimLine);
      updateAimLine();
    }

    function updateAimLine() {
      const start = ball.position.clone();
      const dir = new THREE.Vector3(Math.cos(aimAngle), 0, Math.sin(aimAngle));
      const end = start.clone().add(dir.multiplyScalar(3));

      const positions = aimLine.geometry.attributes.position.array;
      positions[0] = start.x;
      positions[1] = start.y + 0.05;
      positions[2] = start.z;
      positions[3] = end.x;
      positions[4] = end.y + 0.05;
      positions[5] = end.z;
      aimLine.geometry.attributes.position.needsUpdate = true;
    }

    function loadObstacleModel() {
      const loader = new GLTFLoader();

      loader.load(
        'ABeautifulGame.glb',
        (gltf) => {
          obstacleModel = gltf.scene;
          obstacleModel.scale.set(0.5, 0.5, 0.5);
          obstacleModel.position.set(0, 0, -5);

          obstacleModel.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          scene.add(obstacleModel);
          updateObstacleBox();
          modelLoaded = true;
        },
        undefined,
        (error) => {
          console.warn('Failed to load ABeautifulGame.glb:', error);
        }
      );
    }

    function updateObstacleBox() {
      if (!obstacleModel) return;
      obstacleBox.setFromObject(obstacleModel);
      obstacleBox.expandByScalar(0.15);
    }

    function setupEvents() {
      window.addEventListener('resize', onWindowResize);

      window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft') keys.left = true;
        if (e.code === 'ArrowRight') keys.right = true;

        if (e.code === 'Space') {
          e.preventDefault();
          if (!keys.space && isBallStopped() && !ballSunk) {
            keys.space = true;
            isCharging = true;
            chargeStartTime = performance.now();
          }
        }

        if (e.code === 'KeyR') {
          resetBall(true);
        }

        if (e.code === 'KeyN') {
          resetGame();
        }
      });

      window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft') keys.left = false;
        if (e.code === 'ArrowRight') keys.right = false;

        if (e.code === 'Space') {
          e.preventDefault();
          if (keys.space) {
            keys.space = false;
            if (isCharging && isBallStopped() && !ballSunk) {
              shootBall();
            }
            isCharging = false;
          }
        }
      });
    }

    function shootBall() {
      const maxPower = 12.0;
      const shotPower = power * maxPower;
      velocity.x = Math.cos(aimAngle) * shotPower;
      velocity.y = Math.sin(aimAngle) * shotPower;
      strokeCount++;
      wallBounceCount = 0;
      modelBounceCount = 0;
      power = 0;
      updatePowerBar();
      updateHUD();
      hideMessage();
    }

    function resetBall(countStroke = false) {
      ball.position.copy(teePosition);
      velocity.set(0, 0);
      ballSunk = false;
      power = 0;
      isCharging = false;
      if (countStroke) strokeCount++;
      wallBounceCount = 0;
      modelBounceCount = 0;
      updatePowerBar();
      updateHUD();
      hideMessage();
      updateAimLine();
    }

    function resetGame() {
      ball.position.copy(teePosition);
      velocity.set(0, 0);
      strokeCount = 0;
      score = 0;
      ballSunk = false;
      power = 0;
      isCharging = false;
      wallBounceCount = 0;
      modelBounceCount = 0;
      updatePowerBar();
      updateHUD();
      hideMessage();
      updateAimLine();
    }

    function updatePowerBar() {
      const pct = Math.max(0, Math.min(1, power));
      powerBarEl.style.width = `${pct * 100}%`;

      let color;
      if (pct < 0.5) {
        color = '#00ff66';
      } else if (pct < 0.8) {
        color = '#ffd400';
      } else {
        color = '#ff3b30';
      }
      powerBarEl.style.background = color;
    }

    function updateHUD() {
      strokeCountEl.textContent = `Strokes: ${strokeCount}`;
      scoreDisplayEl.textContent = `Score: ${score}`;
    }

    function showSinkMessage() {
      if (strokeCount === 1) {
        messageDisplayEl.textContent = 'HOLE IN ONE!';
      } else if (strokeCount <= 3) {
        messageDisplayEl.textContent = 'Nice Putt!';
      } else {
        messageDisplayEl.textContent = `Ball Sunk in ${strokeCount} strokes!`;
      }
      messageDisplayEl.style.display = 'block';
    }

    function hideMessage() {
      messageDisplayEl.style.display = 'none';
    }

    function isBallStopped() {
      return velocity.length() < 0.005;
    }

    function updateBallPhysics() {
      if (ballSunk) return;

      if (!isBallStopped()) {
        ball.position.x += velocity.x * 0.016;
        ball.position.z += velocity.y * 0.016;

        handleWallCollisions();
        handleModelCollision();

        velocity.multiplyScalar(0.985);

        if (velocity.length() < 0.005) {
          velocity.set(0, 0);
        }

        checkHoleSink();
      }
    }

    function handleWallCollisions() {
      const minX = -halfWidth + ballRadius;
      const maxX = halfWidth - ballRadius;
      const minZ = -halfLength + ballRadius;
      const maxZ = halfLength - ballRadius;

      if (ball.position.x < minX) {
        ball.position.x = minX;
        velocity.x = Math.abs(velocity.x) * 0.7;
        wallBounceCount++;
      } else if (ball.position.x > maxX) {
        ball.position.x = maxX;
        velocity.x = -Math.abs(velocity.x) * 0.7;
        wallBounceCount++;
      }

      if (ball.position.z < minZ) {
        ball.position.z = minZ;
        velocity.y = Math.abs(velocity.y) * 0.7;
        wallBounceCount++;
      } else if (ball.position.z > maxZ) {
        ball.position.z = maxZ;
        velocity.y = -Math.abs(velocity.y) * 0.7;
        wallBounceCount++;
      }
    }

    function handleModelCollision() {
      if (!obstacleModel || !modelLoaded) return;

      updateObstacleBox();

      const ballPos = ball.position.clone();
      const closestPoint = new THREE.Vector3(
        THREE.MathUtils.clamp(ballPos.x, obstacleBox.min.x, obstacleBox.max.x),
        THREE.MathUtils.clamp(ballPos.y, obstacleBox.min.y, obstacleBox.max.y),
        THREE.MathUtils.clamp(ballPos.z, obstacleBox.min.z, obstacleBox.max.z)
      );

      const distance = ballPos.distanceTo(closestPoint);

      if (distance < ballRadius) {
        const dxMin = Math.abs(ballPos.x - obstacleBox.min.x);
        const dxMax = Math.abs(obstacleBox.max.x - ballPos.x);
        const dzMin = Math.abs(ballPos.z - obstacleBox.min.z);
        const dzMax = Math.abs(obstacleBox.max.z - ballPos.z);

        const minDist = Math.min(dxMin, dxMax, dzMin, dzMax);

        if (minDist === dxMin) {
          ball.position.x = obstacleBox.min.x - ballRadius;
          velocity.x = -Math.abs(velocity.x) * 0.5;
        } else if (minDist === dxMax) {
          ball.position.x = obstacleBox.max.x + ballRadius;
          velocity.x = Math.abs(velocity.x) * 0.5;
        } else if (minDist === dzMin) {
          ball.position.z = obstacleBox.min.z - ballRadius;
          velocity.y = -Math.abs(velocity.y) * 0.5;
        } else if (minDist === dzMax) {
          ball.position.z = obstacleBox.max.z + ballRadius;
          velocity.y = Math.abs(velocity.y) * 0.5;
        }

        modelBounceCount++;
      }
    }

    function checkHoleSink() {
      const holeCenter = new THREE.Vector2(holePosition.x, holePosition.z);
      const ballCenter = new THREE.Vector2(ball.position.x, ball.position.z);
      const dist = holeCenter.distanceTo(ballCenter);
      const speed = velocity.length();

      if (dist <= 0.5 && speed < 3.0) {
        ballSunk = true;
        ball.position.set(holePosition.x, -0.1, holePosition.z);
        velocity.set(0, 0);
        score++;
        updateHUD();
        showSinkMessage();
      }
    }

    function updateAimAndCharge() {
      if (isBallStopped() && !ballSunk) {
        if (keys.left) aimAngle -= 0.03;
        if (keys.right) aimAngle += 0.03;
        updateAimLine();
        aimLine.visible = true;

        if (isCharging) {
          const elapsed = (performance.now() - chargeStartTime) / 1000;
          power = Math.min(elapsed / 2.0, 1.0);
          updatePowerBar();
        }
      } else {
        aimLine.visible = false;
        if (!isCharging && power !== 0) {
          power = 0;
          updatePowerBar();
        }
      }
    }

    function updateState() {
      const speed = velocity.length();
      let gameState = 'rolling';

      if (ballSunk) gameState = 'sunk';
      else if (isCharging) gameState = 'charging';
      else if (isBallStopped()) gameState = 'aiming';

      window.__3D_STATE__ = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballVelocity: {
          x: velocity.x,
          z: velocity.y
        },
        ballSpeed: speed,
        ballStopped: speed < 0.005,
        ballSunk: ballSunk,
        aimAngle: aimAngle,
        power: power,
        isCharging: isCharging,
        strokeCount: strokeCount,
        score: score,
        modelLoaded: modelLoaded,
        wallBounceCount: wallBounceCount,
        modelBounceCount: modelBounceCount,
        gameState: gameState
      };
    }

    function initState() {
      window.__3D_STATE__ = {
        ballPosition: { x: teePosition.x, y: teePosition.y, z: teePosition.z },
        ballVelocity: { x: 0, z: 0 },
        ballSpeed: 0,
        ballStopped: true,
        ballSunk: false,
        aimAngle: aimAngle,
        power: 0,
        isCharging: false,
        strokeCount: 0,
        score: 0,
        modelLoaded: false,
        wallBounceCount: 0,
        modelBounceCount: 0,
        gameState: 'aiming'
      };
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      controls.update();
      updateAimAndCharge();
      updateBallPhysics();
      updateState();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
