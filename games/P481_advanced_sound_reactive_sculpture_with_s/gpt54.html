<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound Reactive Sculpture</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      color: white;
      font-size: 20px;
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }

    #score-display {
      top: 20px;
      right: 20px;
    }

    #beat-counter {
      top: 50px;
      right: 20px;
    }

    #mode-display {
      top: 20px;
      left: 20px;
    }

    #combo-display {
      top: 50px;
      left: 20px;
    }

    #pause-display {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 15px rgba(255,255,255,0.5);
    }

    #reset-btn {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 11;
      pointer-events: auto;
      font-family: monospace;
      font-size: 20px;
      padding: 8px 18px;
      border: 1px solid white;
      background: rgba(255,255,255,0.08);
      color: white;
      cursor: pointer;
    }

    #reset-btn:hover {
      background: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
  <div id="score-display" class="hud">Score: 0</div>
  <div id="beat-counter" class="hud">Beats: 0</div>
  <div id="mode-display" class="hud">Mode: 1</div>
  <div id="combo-display" class="hud">Combo: 0</div>
  <div id="pause-display" class="hud" style="display:none">PAUSED</div>
  <button id="reset-btn">Reset</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a1a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambient);

    const light1 = new THREE.PointLight("#ff6644", 2.0, 100);
    light1.position.set(10, 10, 10);
    scene.add(light1);

    const light2 = new THREE.PointLight("#4466ff", 2.0, 100);
    light2.position.set(-10, 5, -10);
    scene.add(light2);

    const pillars = [];
    const pillarGroup = new THREE.Group();
    scene.add(pillarGroup);

    const pillarGeometry = new THREE.BoxGeometry(0.3, 1, 0.3);
    const pillarCount = 64;
    const radius = 4;

    for (let i = 0; i < pillarCount; i++) {
      const angle = (i / pillarCount) * Math.PI * 2;
      const ringMod = ((i % 8) - 3.5) * 0.12;
      const r = radius + ringMod;

      const material = new THREE.MeshStandardMaterial({
        color: new THREE.Color("#22aaff"),
        metalness: 0.7,
        roughness: 0.3
      });

      const pillar = new THREE.Mesh(pillarGeometry, material);
      pillar.position.set(Math.cos(angle) * r, 0.5, Math.sin(angle) * r);
      pillar.userData.baseX = pillar.position.x;
      pillar.userData.baseZ = pillar.position.z;
      pillarGroup.add(pillar);
      pillars.push(pillar);
    }

    const icoMaterial = new THREE.MeshBasicMaterial({
      color: "#ff44aa",
      wireframe: true
    });
    const icosahedron = new THREE.Mesh(
      new THREE.IcosahedronGeometry(1.5, 2),
      icoMaterial
    );
    icosahedron.position.y = 7;
    scene.add(icosahedron);

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);

    const frequencyData = new Array(64).fill(0);

    let score = 0;
    let beats = 0;
    let combo = 0;
    let mode = 1;
    let paused = false;
    let avgFrequency = 0;
    let totalParticlesSpawned = 0;

    let elapsedTime = 0;
    let lastTimestamp = 0;

    let previousAvg = 0;
    let flashEndTime = -1;
    let beatWindowEndTime = -1;
    let beatHandled = true;
    let inBeatWindow = false;

    let minPillarScale = 1;
    let maxPillarScale = 1;
    let icosahedronScale = 1;

    const scoreDisplay = document.getElementById("score-display");
    const beatCounter = document.getElementById("beat-counter");
    const modeDisplay = document.getElementById("mode-display");
    const comboDisplay = document.getElementById("combo-display");
    const pauseDisplay = document.getElementById("pause-display");
    const resetBtn = document.getElementById("reset-btn");

    window.__3D_STATE__ = {
      score: 0,
      beats: 0,
      combo: 0,
      mode: 1,
      paused: false,
      avgFrequency: 0,
      pillarCount: 64,
      icosahedronScale: 1,
      totalParticlesSpawned: 0,
      inBeatWindow: false,
      elapsedTime: 0,
      maxPillarScale: 1,
      minPillarScale: 1
    };

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function clamp01(v) {
      return Math.max(0, Math.min(1, safeNumber(v, 0)));
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      beatCounter.textContent = `Beats: ${beats}`;
      modeDisplay.textContent = `Mode: ${mode}`;
      comboDisplay.textContent = `Combo: ${combo}`;
      pauseDisplay.style.display = paused ? "block" : "none";
    }

    function updateState() {
      window.__3D_STATE__.score = safeNumber(score, 0);
      window.__3D_STATE__.beats = safeNumber(beats, 0);
      window.__3D_STATE__.combo = safeNumber(combo, 0);
      window.__3D_STATE__.mode = safeNumber(mode, 1);
      window.__3D_STATE__.paused = !!paused;
      window.__3D_STATE__.avgFrequency = clamp01(avgFrequency);
      window.__3D_STATE__.pillarCount = pillarCount;
      window.__3D_STATE__.icosahedronScale = safeNumber(icosahedronScale, 1);
      window.__3D_STATE__.totalParticlesSpawned = safeNumber(totalParticlesSpawned, 0);
      window.__3D_STATE__.inBeatWindow = !!inBeatWindow;
      window.__3D_STATE__.elapsedTime = safeNumber(elapsedTime, 0);
      window.__3D_STATE__.maxPillarScale = safeNumber(maxPillarScale, 1);
      window.__3D_STATE__.minPillarScale = safeNumber(minPillarScale, 1);
    }

    function spawnBeatParticles() {
      for (let i = 0; i < 30; i++) {
        const material = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(Math.random(), 0.9, 0.7),
          transparent: true,
          opacity: 1
        });

        const particle = new THREE.Mesh(particleGeometry, material);

        const angle = Math.random() * Math.PI * 2;
        const r = Math.random() * 2;
        particle.position.set(
          Math.cos(angle) * r,
          2 + Math.random() * 4,
          Math.sin(angle) * r
        );

        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          Math.random() * 2,
          (Math.random() - 0.5) * 2
        ).normalize();

        const speed = 1 + Math.random() * 3;

        particle.userData.velocity = dir.multiplyScalar(speed);
        particle.userData.life = 1.0;
        particle.userData.maxLife = 1.0;

        particleGroup.add(particle);
        totalParticlesSpawned++;
      }
    }

    function handleBeat(nowTime) {
      beats++;
      flashEndTime = nowTime + 0.1;
      beatWindowEndTime = nowTime + 0.2;
      beatHandled = false;
      inBeatWindow = true;
      spawnBeatParticles();
    }

    function updateFrequencies(time) {
      for (let i = 0; i < frequencyData.length; i++) {
        let v = 0;

        if (mode === 1) {
          v = 0.5 + 0.5 * Math.sin(time * (1 + i * 0.1) + i * 0.5);
        } else if (mode === 2) {
          v = Math.abs(Math.sin(time * 2 + i * 0.3)) * Math.abs(Math.cos(time * 0.5));
        } else if (mode === 3) {
          v = (Math.sin(time * 3 + i) > 0) ? 1.0 : 0.0;
        }

        frequencyData[i] = clamp01(v);
      }
    }

    function updatePillars(nowTime) {
      const lowColor = new THREE.Color("#2244ff");
      const highColor = new THREE.Color("#ff4422");
      const white = new THREE.Color("#ffffff");

      minPillarScale = Infinity;
      maxPillarScale = -Infinity;

      for (let i = 0; i < pillars.length; i++) {
        const pillar = pillars[i];
        const f = clamp01(frequencyData[i]);
        const scaleY = 1 + f * 4;

        pillar.scale.y = scaleY;
        pillar.position.y = 0.5 * scaleY;

        minPillarScale = Math.min(minPillarScale, scaleY);
        maxPillarScale = Math.max(maxPillarScale, scaleY);

        if (nowTime <= flashEndTime) {
          pillar.material.color.copy(white);
        } else {
          pillar.material.color.copy(lowColor).lerp(highColor, f);
        }
      }

      if (!Number.isFinite(minPillarScale)) minPillarScale = 1;
      if (!Number.isFinite(maxPillarScale)) maxPillarScale = 1;
    }

    function updateIcosaheron(delta) {
      icosahedron.rotation.y += 0.5 * delta;
      icosahedronScale = 1 + avgFrequency * 0.5;
      icosahedron.scale.setScalar(safeNumber(icosahedronScale, 1));
    }

    function updateParticles(delta) {
      const toRemove = [];

      particleGroup.children.forEach((particle) => {
        particle.userData.life -= delta;
        particle.position.addScaledVector(particle.userData.velocity, delta);
        particle.material.opacity = Math.max(0, particle.userData.life / particle.userData.maxLife);

        if (particle.userData.life <= 0) {
          toRemove.push(particle);
        }
      });

      toRemove.forEach((p) => {
        particleGroup.remove(p);
        p.material.dispose();
      });
    }

    function processBeatWindow(nowTime) {
      inBeatWindow = nowTime <= beatWindowEndTime;

      if (beatWindowEndTime > 0 && nowTime > beatWindowEndTime && !beatHandled) {
        combo = 0;
        beatHandled = true;
        inBeatWindow = false;
      }
    }

    function resetAll() {
      score = 0;
      beats = 0;
      combo = 0;
      totalParticlesSpawned = 0;
      mode = 1;
      paused = false;
      avgFrequency = 0;
      previousAvg = 0;
      flashEndTime = -1;
      beatWindowEndTime = -1;
      beatHandled = true;
      inBeatWindow = false;
      elapsedTime = 0;
      lastTimestamp = 0;
      minPillarScale = 1;
      maxPillarScale = 1;
      icosahedronScale = 1;
      pauseDisplay.style.display = "none";

      for (let i = 0; i < frequencyData.length; i++) frequencyData[i] = 0;

      while (particleGroup.children.length > 0) {
        const p = particleGroup.children[0];
        particleGroup.remove(p);
        if (p.material) p.material.dispose();
      }

      pillars.forEach((pillar) => {
        pillar.scale.y = 1;
        pillar.position.y = 0.5;
        pillar.material.color.set("#22aaff");
      });

      icosahedron.rotation.set(0, 0, 0);
      icosahedron.scale.setScalar(1);

      updateHUD();
      updateState();
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "p") {
        paused = !paused;
        updateHUD();
        updateState();
        return;
      }

      if (key === "1" || key === "2" || key === "3") {
        mode = parseInt(key, 10);
        updateHUD();
        updateState();
        return;
      }

      if (e.code === "Space") {
        e.preventDefault();

        if (paused) return;

        if (inBeatWindow && !beatHandled) {
          combo += 1;
          const multiplier = Math.max(1, combo);
          score += 10 * multiplier;
          beatHandled = true;
        } else {
          score = Math.max(0, score - 5);
          combo = 0;
        }

        updateHUD();
        updateState();
      }
    });

    resetBtn.addEventListener("click", resetAll);

    function animate(timestamp) {
      requestAnimationFrame(animate);

      const current = safeNumber(timestamp * 0.001, 0);

      if (lastTimestamp === 0) lastTimestamp = current;

      let delta = current - lastTimestamp;
      if (!Number.isFinite(delta) || delta < 0) delta = 0;
      if (delta > 0.1) delta = 0.1;

      if (!paused) {
        elapsedTime += delta;
        updateFrequencies(elapsedTime);

        let sum = 0;
        for (let i = 0; i < frequencyData.length; i++) sum += frequencyData[i];
        avgFrequency = clamp01(sum / frequencyData.length);

        if (previousAvg <= 0.7 && avgFrequency > 0.7) {
          handleBeat(elapsedTime);
        }

        processBeatWindow(elapsedTime);
        updatePillars(elapsedTime);
        updateIcosaheron(delta);
        updateParticles(delta);

        previousAvg = avgFrequency;
      }

      controls.update();
      updateHUD();
      updateState();
      renderer.render(scene, camera);

      lastTimestamp = current;
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    updateHUD();
    updateState();
    animate(0);
  </script>
</body>
</html>
