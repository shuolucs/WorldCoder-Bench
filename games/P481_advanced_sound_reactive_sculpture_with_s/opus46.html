<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound-Reactive Sculpture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; }
  canvas { display: block; }
  
  #hud {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }
  
  #score-display {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-family: monospace;
    font-size: 20px;
  }
  
  #beat-counter {
    position: absolute;
    top: 50px;
    right: 20px;
    color: white;
    font-family: monospace;
    font-size: 20px;
  }
  
  #mode-display {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-family: monospace;
    font-size: 20px;
  }
  
  #combo-display {
    position: absolute;
    top: 50px;
    left: 20px;
    color: white;
    font-family: monospace;
    font-size: 20px;
  }
  
  #pause-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-family: monospace;
    font-size: 48px;
    display: none;
    text-shadow: 0 0 20px rgba(255,255,255,0.5);
  }
  
  #reset-btn {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: all;
    font-family: monospace;
    font-size: 20px;
    padding: 10px 30px;
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    cursor: pointer;
    border-radius: 5px;
    transition: background 0.2s;
  }
  
  #reset-btn:hover {
    background: rgba(255,255,255,0.25);
  }
  
  #instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    font-size: 14px;
    text-align: center;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="score-display">Score: 0</div>
  <div id="beat-counter">Beats: 0</div>
  <div id="mode-display">Mode: 1</div>
  <div id="combo-display">Combo: 0</div>
  <div id="pause-display">PAUSED</div>
  <div id="instructions">SPACE: Hit beats | 1/2/3: Change mode | P: Pause</div>
  <button id="reset-btn">Reset</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  let score = 0;
  let beats = 0;
  let combo = 0;
  let mode = 1;
  let paused = false;
  let avgFrequency = 0;
  let totalParticlesSpawned = 0;
  let inBeatWindow = false;
  let elapsedTime = 0;
  let maxPillarScale = 1;
  let minPillarScale = 1;

  const frequencyData = new Array(64).fill(0.5);
  let prevAvgAboveThreshold = false;
  let beatWindowStart = -1;
  let beatFlashStart = -1;
  let beatWindowHit = false;
  let lastBeatHandled = true;

  // Initialize global state
  window.__3D_STATE__ = {
    score: 0,
    beats: 0,
    combo: 0,
    mode: 1,
    paused: false,
    avgFrequency: 0,
    pillarCount: 64,
    icosahedronScale: 1,
    totalParticlesSpawned: 0,
    inBeatWindow: false,
    elapsedTime: 0,
    maxPillarScale: 1,
    minPillarScale: 1
  };

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 15);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
  scene.add(ambientLight);

  const pointLight1 = new THREE.PointLight(0xff6644, 1, 50);
  pointLight1.position.set(10, 10, 10);
  scene.add(pointLight1);

  const pointLight2 = new THREE.PointLight(0x4466ff, 1, 50);
  pointLight2.position.set(-10, 5, -10);
  scene.add(pointLight2);

  // Ground plane (subtle)
  const groundGeo = new THREE.CircleGeometry(8, 64);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, metalness: 0.5, roughness: 0.8 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -0.01;
  scene.add(ground);

  // Pillars
  const pillars = [];
  const pillarGroup = new THREE.Group();
  const pillarGeometry = new THREE.BoxGeometry(0.3, 1, 0.3);

  for (let i = 0; i < 64; i++) {
    const angle = (i / 64) * Math.PI * 2;
    // 8x8 grid arranged in circular pattern
    const row = Math.floor(i / 8);
    const col = i % 8;
    const radius = 2 + row * 0.35;
    const theta = (col / 8) * Math.PI * 2 + row * 0.1;

    const material = new THREE.MeshStandardMaterial({
      color: 0x22aaff,
      metalness: 0.7,
      roughness: 0.3
    });

    const pillar = new THREE.Mesh(pillarGeometry, material);
    pillar.position.x = Math.cos(theta) * radius;
    pillar.position.z = Math.sin(theta) * radius;
    pillar.position.y = 0.5;

    pillarGroup.add(pillar);
    pillars.push(pillar);
  }
  scene.add(pillarGroup);

  // Icosahedron
  const icoGeometry = new THREE.IcosahedronGeometry(1.5, 2);
  const icoMaterial = new THREE.MeshBasicMaterial({
    color: 0xff44aa,
    wireframe: true
  });
  const icosahedron = new THREE.Mesh(icoGeometry, icoMaterial);
  icosahedron.position.y = 7;
  scene.add(icosahedron);

  // Particles
  const particles = [];
  const particleGeometry = new THREE.SphereGeometry(0.05, 6, 6);

  function spawnParticles() {
    for (let i = 0; i < 30; i++) {
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 1 });
      const particle = new THREE.Mesh(particleGeometry, mat);

      const angle = Math.random() * Math.PI * 2;
      const r = Math.random() * 2;
      particle.position.set(
        Math.cos(angle) * r,
        2 + Math.random() * 4,
        Math.sin(angle) * r
      );

      const speed = 3 + Math.random() * 5;
      const vAngle = Math.random() * Math.PI * 2;
      const vY = (Math.random() - 0.3) * speed;
      particle.userData.velocity = new THREE.Vector3(
        Math.cos(vAngle) * speed * 0.5,
        vY,
        Math.sin(vAngle) * speed * 0.5
      );
      particle.userData.life = 1.0;
      particle.userData.spawnTime = elapsedTime;

      scene.add(particle);
      particles.push(particle);
      totalParticlesSpawned++;
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.userData.life -= dt;

      if (p.userData.life <= 0) {
        scene.remove(p);
        p.geometry && p.geometry.dispose && p.geometry.dispose();
        p.material && p.material.dispose && p.material.dispose();
        particles.splice(i, 1);
        continue;
      }

      p.position.add(p.userData.velocity.clone().multiplyScalar(dt));
      p.userData.velocity.y -= 2 * dt; // gravity
      p.material.opacity = Math.max(0, p.userData.life);
      p.scale.setScalar(p.userData.life);
    }
  }

  // Color helpers
  const colorBlue = new THREE.Color(0x2244ff);
  const colorRed = new THREE.Color(0xff4422);
  const colorWhite = new THREE.Color(0xffffff);
  const tempColor = new THREE.Color();

  // Update frequency data
  function updateFrequencyData(time) {
    for (let i = 0; i < 64; i++) {
      if (mode === 1) {
        frequencyData[i] = 0.5 + 0.5 * Math.sin(time * (1 + i * 0.1) + i * 0.5);
      } else if (mode === 2) {
        frequencyData[i] = Math.abs(Math.sin(time * 2 + i * 0.3)) * Math.abs(Math.cos(time * 0.5));
      } else if (mode === 3) {
        frequencyData[i] = (Math.sin(time * 3 + i) > 0) ? 1.0 : 0.0;
      }
    }
  }

  // DOM elements
  const scoreDisplay = document.getElementById('score-display');
  const beatCounter = document.getElementById('beat-counter');
  const modeDisplay = document.getElementById('mode-display');
  const comboDisplay = document.getElementById('combo-display');
  const pauseDisplay = document.getElementById('pause-display');
  const resetBtn = document.getElementById('reset-btn');

  function updateHUD() {
    scoreDisplay.textContent = 'Score: ' + score;
    beatCounter.textContent = 'Beats: ' + beats;
    modeDisplay.textContent = 'Mode: ' + mode;
    comboDisplay.textContent = 'Combo: ' + combo;
    pauseDisplay.style.display = paused ? 'block' : 'none';
  }

  // Input handling
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space') {
      e.preventDefault();
      if (paused) return;

      if (inBeatWindow && !beatWindowHit) {
        // Successful hit
        beatWindowHit = true;
        combo++;
        score += 10 * Math.max(1, combo);
      } else if (!inBeatWindow) {
        // Pressed outside beat window
        combo = 0;
        score = Math.max(0, score - 5);
      }
      updateHUD();
    }

    if (e.code === 'Digit1' || e.code === 'Numpad1') { mode = 1; updateHUD(); }
    if (e.code === 'Digit2' || e.code === 'Numpad2') { mode = 2; updateHUD(); }
    if (e.code === 'Digit3' || e.code === 'Numpad3') { mode = 3; updateHUD(); }

    if (e.code === 'KeyP') {
      paused = !paused;
      updateHUD();
    }
  });

  resetBtn.addEventListener('click', function() {
    score = 0;
    beats = 0;
    combo = 0;
    totalParticlesSpawned = 0;
    mode = 1;
    paused = false;
    inBeatWindow = false;
    beatWindowStart = -1;
    beatFlashStart = -1;
    beatWindowHit = false;
    prevAvgAboveThreshold = false;
    lastBeatHandled = true;

    // Remove all particles
    for (let i = particles.length - 1; i >= 0; i--) {
      scene.remove(particles[i]);
      particles[i].material.dispose();
    }
    particles.length = 0;

    updateHUD();
  });

  // Resize
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation
  let lastTime = performance.now();
  let realTime = 0;

  function animate(now) {
    requestAnimationFrame(animate);

    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    realTime = now / 1000;

    controls.update();

    if (!paused) {
      elapsedTime += dt;

      // Update frequency data
      updateFrequencyData(elapsedTime);

      // Calculate average
      let sum = 0;
      maxPillarScale = -Infinity;
      minPillarScale = Infinity;

      for (let i = 0; i < 64; i++) {
        sum += frequencyData[i];
      }
      avgFrequency = sum / 64;

      // Beat detection (rising edge above 0.7)
      const currentAbove = avgFrequency > 0.7;
      if (currentAbove && !prevAvgAboveThreshold) {
        // Beat detected!
        beats++;
        beatWindowStart = elapsedTime;
        beatFlashStart = elapsedTime;
        beatWindowHit = false;
        inBeatWindow = true;
        lastBeatHandled = false;

        // Spawn particles
        spawnParticles();
      }
      prevAvgAboveThreshold = currentAbove;

      // Beat window management (200ms)
      if (inBeatWindow && (elapsedTime - beatWindowStart) > 0.2) {
        inBeatWindow = false;
        if (!beatWindowHit && !lastBeatHandled) {
          // Missed the beat
          combo = 0;
          lastBeatHandled = true;
        }
      }

      // Flash timing (100ms)
      const isFlashing = beatFlashStart > 0 && (elapsedTime - beatFlashStart) < 0.1;

      // Update pillars
      for (let i = 0; i < 64; i++) {
        const val = frequencyData[i];
        const yScale = 1 + val * 4;
        pillars[i].scale.y = yScale;
        pillars[i].position.y = yScale * 0.5;

        if (yScale > maxPillarScale) maxPillarScale = yScale;
        if (yScale < minPillarScale) minPillarScale = yScale;

        if (isFlashing) {
          pillars[i].material.color.copy(colorWhite);
        } else {
          tempColor.copy(colorBlue).lerp(colorRed, val);
          pillars[i].material.color.copy(tempColor);
        }

        // Subtle emissive
        pillars[i].material.emissive = pillars[i].material.color.clone().multiplyScalar(0.15);
      }

      // Update icosahedron
      icosahedron.rotation.y += 0.5 * dt;
      const icoScale = 1 + avgFrequency * 0.5;
      icosahedron.scale.setScalar(icoScale);

      // Update particles
      updateParticles(dt);

      // Update HUD
      updateHUD();

      // Update global state
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.beats = beats;
      window.__3D_STATE__.combo = combo;
      window.__3D_STATE__.mode = mode;
      window.__3D_STATE__.paused = paused;
      window.__3D_STATE__.avgFrequency = avgFrequency || 0;
      window.__3D_STATE__.pillarCount = 64;
      window.__3D_STATE__.icosahedronScale = icoScale || 1;
      window.__3D_STATE__.totalParticlesSpawned = totalParticlesSpawned;
      window.__3D_STATE__.inBeatWindow = inBeatWindow;
      window.__3D_STATE__.elapsedTime = elapsedTime || 0;
      window.__3D_STATE__.maxPillarScale = maxPillarScale === -Infinity ? 1 : maxPillarScale;
      window.__3D_STATE__.minPillarScale = minPillarScale === Infinity ? 1 : minPillarScale;
    } else {
      // Even when paused, update state
      window.__3D_STATE__.paused = true;
    }

    renderer.render(scene, camera);
  }

  requestAnimationFrame(animate);
  updateHUD();
})();
</script>
</body>
</html>
