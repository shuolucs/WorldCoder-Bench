<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sound-Reactive Sculpture</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: white;
            font-family: monospace;
            font-size: 20px;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            pointer-events: none;
            z-index: 10;
        }
        .left-panel {
            float: left;
        }
        .right-panel {
            float: right;
            text-align: right;
        }
        #pause-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            font-weight: bold;
            color: #ff44aa;
            display: none;
            pointer-events: none;
            z-index: 10;
            letter-spacing: 5px;
        }
        #reset-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 30px;
            font-size: 20px;
            font-family: monospace;
            cursor: pointer;
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            transition: background 0.2s, color 0.2s;
            z-index: 10;
        }
        #reset-btn:hover {
            background: white;
            color: #0a0a1a;
        }
        div {
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="left-panel">
            <div id="mode-display">Mode: 1</div>
            <div id="combo-display">Combo: 0</div>
        </div>
        <div class="right-panel">
            <div id="score-display">Score: 0</div>
            <div id="beat-counter">Beats: 0</div>
        </div>
    </div>
    <div id="pause-display">PAUSED</div>
    <button id="reset-btn">Reset</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Initialize State
        window.__3D_STATE__ = {
            score: 0,
            beats: 0,
            combo: 0,
            mode: 1,
            paused: false,
            avgFrequency: 0,
            pillarCount: 64,
            icosahedronScale: 1,
            totalParticlesSpawned: 0,
            inBeatWindow: false,
            elapsedTime: 0,
            maxPillarScale: 1,
            minPillarScale: 1
        };

        // Internal variables
        let prevAvgFrequency = 0;
        let beatTime = -999;
        let currentBeatActive = false;
        const frequencyData = new Array(64).fill(0);
        let particles = [];

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xff6644, 1, 100);
        pointLight1.position.set(10, 10, 10);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x4466ff, 1, 100);
        pointLight2.position.set(-10, 5, -10);
        scene.add(pointLight2);

        // Sculpture - Pillars
        const pillars = [];
        const pillarGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
        pillarGeo.translate(0, 0.5, 0); // Scale from bottom

        const colorBlue = new THREE.Color(0x2244ff);
        const colorRed = new THREE.Color(0xff4422);
        const colorWhite = new THREE.Color(0xffffff);

        for (let i = 0; i < 64; i++) {
            const mat = new THREE.MeshStandardMaterial({ 
                color: 0x22aaff, 
                metalness: 0.7, 
                roughness: 0.3 
            });
            const mesh = new THREE.Mesh(pillarGeo, mat);
            
            const angle = (i / 64) * Math.PI * 2;
            const radius = 4;
            mesh.position.set(Math.cos(angle) * radius, 0, Math.sin(angle) * radius);
            
            // Orient pillars to face outward (optional, but looks better)
            mesh.rotation.y = -angle;
            
            scene.add(mesh);
            pillars.push(mesh);
        }

        // Sculpture - Icosahedron
        const icoGeo = new THREE.IcosahedronGeometry(1.5, 2);
        const icoMat = new THREE.MeshBasicMaterial({ 
            color: 0xff44aa, 
            wireframe: true 
        });
        const icosahedron = new THREE.Mesh(icoGeo, icoMat);
        icosahedron.position.y = 7;
        scene.add(icosahedron);

        // Particle System
        const particleGeo = new THREE.SphereGeometry(0.05, 8, 8);
        
        function spawnParticles() {
            for (let i = 0; i < 30; i++) {
                const mat = new THREE.MeshBasicMaterial({ 
                    color: 0xffffff, 
                    transparent: true, 
                    opacity: 1 
                });
                const mesh = new THREE.Mesh(particleGeo, mat);
                
                const r = Math.random() * 2;
                const theta = Math.random() * Math.PI * 2;
                const y = 2 + Math.random() * 4;
                
                mesh.position.set(r * Math.cos(theta), y, r * Math.sin(theta));
                
                const speed = 2 + Math.random() * 3;
                const vx = (Math.random() - 0.5) * speed;
                const vy = (Math.random() - 0.5) * speed;
                const vz = (Math.random() - 0.5) * speed;
                
                scene.add(mesh);
                particles.push({ 
                    mesh: mesh, 
                    velocity: new THREE.Vector3(vx, vy, vz), 
                    life: 1.0 
                });
                
                window.__3D_STATE__.totalParticlesSpawned++;
            }
        }

        // HUD Update
        function updateHUD() {
            document.getElementById('score-display').innerText = `Score: ${window.__3D_STATE__.score}`;
            document.getElementById('beat-counter').innerText = `Beats: ${window.__3D_STATE__.beats}`;
            document.getElementById('mode-display').innerText = `Mode: ${window.__3D_STATE__.mode}`;
            document.getElementById('combo-display').innerText = `Combo: ${window.__3D_STATE__.combo}`;
        }

        // Input Handling
        window.addEventListener('keydown', (e) => {
            if (e.key === '1') {
                window.__3D_STATE__.mode = 1;
                updateHUD();
            }
            if (e.key === '2') {
                window.__3D_STATE__.mode = 2;
                updateHUD();
            }
            if (e.key === '3') {
                window.__3D_STATE__.mode = 3;
                updateHUD();
            }
            if (e.key.toLowerCase() === 'p') {
                window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
                document.getElementById('pause-display').style.display = window.__3D_STATE__.paused ? 'block' : 'none';
            }
            if (e.key === ' ') {
                if (window.__3D_STATE__.paused) return;
                
                const t = window.__3D_STATE__.elapsedTime;
                if (currentBeatActive && (t - beatTime) <= 0.2) {
                    // Successful hit
                    window.__3D_STATE__.combo++;
                    const multiplier = Math.max(1, window.__3D_STATE__.combo);
                    window.__3D_STATE__.score += 10 * multiplier;
                    currentBeatActive = false; // Consume the beat
                } else {
                    // Miss / Bad hit
                    window.__3D_STATE__.score = Math.max(0, window.__3D_STATE__.score - 5);
                    window.__3D_STATE__.combo = 0;
                }
                updateHUD();
            }
        });

        // Reset Button
        document.getElementById('reset-btn').addEventListener('click', () => {
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.beats = 0;
            window.__3D_STATE__.combo = 0;
            window.__3D_STATE__.mode = 1;
            window.__3D_STATE__.paused = false;
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.totalParticlesSpawned = 0;
            
            beatTime = -999;
            currentBeatActive = false;
            prevAvgFrequency = 0;
            
            document.getElementById('pause-display').style.display = 'none';
            
            particles.forEach(p => scene.remove(p.mesh));
            particles = [];
            
            updateHUD();
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();

            if (!window.__3D_STATE__.paused) {
                window.__3D_STATE__.elapsedTime += dt;
                const t = window.__3D_STATE__.elapsedTime;
                const mode = window.__3D_STATE__.mode;

                let sumFreq = 0;
                let maxScale = 0;
                let minScale = 9999;

                // Update Frequency Data and Pillars
                for (let i = 0; i < 64; i++) {
                    if (mode === 1) {
                        frequencyData[i] = 0.5 + 0.5 * Math.sin(t * (1 + i * 0.1) + i * 0.5);
                    } else if (mode === 2) {
                        frequencyData[i] = Math.abs(Math.sin(t * 2 + i * 0.3)) * Math.abs(Math.cos(t * 0.5));
                    } else if (mode === 3) {
                        frequencyData[i] = (Math.sin(t * 3 + i) > 0) ? 1.0 : 0.0;
                    }
                    
                    const freq = frequencyData[i];
                    sumFreq += freq;

                    const scaleY = 1 + freq * 4;
                    pillars[i].scale.y = scaleY;
                    
                    if (scaleY > maxScale) maxScale = scaleY;
                    if (scaleY < minScale) minScale = scaleY;

                    // Color update
                    if (t - beatTime <= 0.1) {
                        pillars[i].material.color.copy(colorWhite);
                    } else {
                        pillars[i].material.color.lerpColors(colorBlue, colorRed, freq);
                    }
                }

                const avgFreq = sumFreq / 64;
                
                // Update State
                window.__3D_STATE__.avgFrequency = avgFreq;
                window.__3D_STATE__.maxPillarScale = maxScale;
                window.__3D_STATE__.minPillarScale = minScale;
                window.__3D_STATE__.inBeatWindow = (t - beatTime <= 0.2);

                // Update Icosahedron
                icosahedron.rotation.y += 0.5 * dt;
                const icoScale = 1 + avgFreq * 0.5;
                icosahedron.scale.set(icoScale, icoScale, icoScale);
                window.__3D_STATE__.icosahedronScale = icoScale;

                // Beat Detection
                if (prevAvgFrequency < 0.7 && avgFreq >= 0.7) {
                    window.__3D_STATE__.beats++;
                    beatTime = t;
                    currentBeatActive = true;
                    spawnParticles();
                    updateHUD();
                }
                prevAvgFrequency = avgFreq;

                // Missed Beat Detection
                if (currentBeatActive && (t - beatTime) > 0.2) {
                    window.__3D_STATE__.combo = 0;
                    currentBeatActive = false;
                    updateHUD();
                }

                // Update Particles
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.life -= dt;
                    if (p.life <= 0) {
                        scene.remove(p.mesh);
                        p.mesh.material.dispose();
                        particles.splice(i, 1);
                    } else {
                        p.mesh.position.addScaledVector(p.velocity, dt);
                        p.mesh.material.opacity = p.life;
                    }
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        updateHUD();
        animate();
    </script>
</body>
</html>
