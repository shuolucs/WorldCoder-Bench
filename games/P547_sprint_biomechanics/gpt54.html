<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Sprint Biomechanics Simulator</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #223344;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 300px;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .row {
      margin-bottom: 10px;
    }

    .row label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .row input[type="range"] {
      width: 100%;
    }

    #hud {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 220px;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px;
      border-radius: 10px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(4px);
    }

    #help {
      position: absolute;
      left: 10px;
      bottom: 10px;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
      font-size: 12px;
      backdrop-filter: blur(4px);
    }

    .blue { color: #66aaff; }
    .red { color: #ff6666; }
    .green { color: #8cff8c; }
  </style>
</head>
<body>
  <div id="ui">
    <h3>Sprint Biomechanics Controls</h3>

    <div class="row">
      <label for="slider-frequency">Stride Frequency: <span id="val-frequency">2.5</span> Hz</label>
      <input id="slider-frequency" type="range" min="0.5" max="5.0" step="0.1" value="2.5" />
    </div>

    <div class="row">
      <label for="slider-hip-amp">Hip Amplitude: <span id="val-hip-amp">0.8</span> rad</label>
      <input id="slider-hip-amp" type="range" min="0.2" max="1.5" step="0.05" value="0.8" />
    </div>

    <div class="row">
      <label for="slider-knee-amp">Knee Amplitude: <span id="val-knee-amp">1.2</span> rad</label>
      <input id="slider-knee-amp" type="range" min="0.5" max="2.0" step="0.1" value="1.2" />
    </div>
  </div>

  <div id="hud">
    <div>Gait phase: <span id="hud-phase">0</span>°</div>
    <div>Stride freq: <span id="hud-freq">2.5</span></div>
    <div>Left hip angle: <span id="hud-lhip">0</span>°</div>
    <div>Right hip angle: <span id="hud-rhip">0</span>°</div>
    <div>Stride length: <span id="hud-stride">0.00</span></div>
    <div>Model loaded: <span id="hud-model">No</span></div>
  </div>

  <div id="help">
    <div><b>Keys</b></div>
    <div>Space = Pause/Play</div>
    <div>R = Reset T-pose</div>
    <div>G = Restart running</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x223344);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(5, 3, 8);
    camera.lookAt(0, 1.2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x556677, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 20, 0x668899, 0x446677);
    grid.position.y = 0;
    scene.add(grid);

    function createTrack() {
      const trackGroup = new THREE.Group();

      const stripMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const laneMat = new THREE.MeshBasicMaterial({ color: 0xffcc33 });

      const lineGeo = new THREE.BoxGeometry(0.04, 0.005, 18);
      const centerStrip1 = new THREE.Mesh(lineGeo, stripMat);
      const centerStrip2 = new THREE.Mesh(lineGeo, stripMat);
      centerStrip1.position.set(-0.8, 0.0025, 0);
      centerStrip2.position.set(0.8, 0.0025, 0);

      const laneGeo = new THREE.BoxGeometry(2.4, 0.004, 18);
      const laneBase = new THREE.Mesh(laneGeo, laneMat);
      laneBase.position.set(0, 0.001, 0);
      laneBase.material.transparent = true;
      laneBase.material.opacity = 0.18;

      trackGroup.add(laneBase, centerStrip1, centerStrip2);
      scene.add(trackGroup);
    }
    createTrack();

    const sliderFreq = document.getElementById('slider-frequency');
    const sliderHipAmp = document.getElementById('slider-hip-amp');
    const sliderKneeAmp = document.getElementById('slider-knee-amp');

    const valFreq = document.getElementById('val-frequency');
    const valHipAmp = document.getElementById('val-hip-amp');
    const valKneeAmp = document.getElementById('val-knee-amp');

    const hudPhase = document.getElementById('hud-phase');
    const hudFreq = document.getElementById('hud-freq');
    const hudLHip = document.getElementById('hud-lhip');
    const hudRHip = document.getElementById('hud-rhip');
    const hudStride = document.getElementById('hud-stride');
    const hudModel = document.getElementById('hud-model');

    const params = {
      stride_frequency: 2.5,
      hip_amplitude: 0.8,
      knee_amplitude: 1.2,
      ankle_amplitude: 0.3,
      arm_amplitude: 0.6
    };

    sliderFreq.addEventListener('input', () => {
      params.stride_frequency = parseFloat(sliderFreq.value);
      valFreq.textContent = params.stride_frequency.toFixed(1);
    });

    sliderHipAmp.addEventListener('input', () => {
      params.hip_amplitude = parseFloat(sliderHipAmp.value);
      valHipAmp.textContent = params.hip_amplitude.toFixed(2);
    });

    sliderKneeAmp.addEventListener('input', () => {
      params.knee_amplitude = parseFloat(sliderKneeAmp.value);
      valKneeAmp.textContent = params.knee_amplitude.toFixed(1);
    });

    let modelRoot = null;
    let skeleton = null;
    let hipsRoot = null;
    let modelLoaded = false;
    let gaitPhase = 0;
    let isPaused = false;
    let frameCount = 0;
    const clock = new THREE.Clock();

    const bones = {
      hips: null,
      spine: null,
      chest: null,
      neck: null,
      head: null,

      leftUpLeg: null,
      leftLeg: null,
      leftFoot: null,
      leftToe: null,

      rightUpLeg: null,
      rightLeg: null,
      rightFoot: null,
      rightToe: null,

      leftShoulder: null,
      leftArm: null,
      leftForeArm: null,
      leftHand: null,

      rightShoulder: null,
      rightArm: null,
      rightForeArm: null,
      rightHand: null
    };

    const initialRotations = new Map();
    const initialPositions = new Map();

    function rememberInitialPose() {
      Object.values(bones).forEach(b => {
        if (b && b.isBone) {
          initialRotations.set(b.uuid, b.rotation.clone());
          initialPositions.set(b.uuid, b.position.clone());
        }
      });
      if (modelRoot) {
        initialPositions.set(modelRoot.uuid, modelRoot.position.clone());
        initialRotations.set(modelRoot.uuid, modelRoot.rotation.clone());
      }
    }

    function resetToInitialPose() {
      Object.values(bones).forEach(b => {
        if (b && initialRotations.has(b.uuid)) {
          b.rotation.copy(initialRotations.get(b.uuid));
        }
        if (b && initialPositions.has(b.uuid)) {
          b.position.copy(initialPositions.get(b.uuid));
        }
      });

      if (modelRoot && initialRotations.has(modelRoot.uuid)) {
        modelRoot.rotation.copy(initialRotations.get(modelRoot.uuid));
      }
      if (modelRoot && initialPositions.has(modelRoot.uuid)) {
        modelRoot.position.copy(initialPositions.get(modelRoot.uuid));
      }

      gaitPhase = 0;
      clearFootTrails();
    }

    function findBoneByIncludes(skinnedMesh, includesList) {
      if (!skinnedMesh || !skinnedMesh.skeleton) return null;
      const lowerIncludes = includesList.map(s => s.toLowerCase());
      for (const bone of skinnedMesh.skeleton.bones) {
        const n = bone.name.toLowerCase();
        if (lowerIncludes.some(k => n.includes(k))) {
          return bone;
        }
      }
      return null;
    }

    function mapBones(skinnedMesh) {
      bones.hips = findBoneByIncludes(skinnedMesh, ['hips', 'pelvis']);
      bones.spine = findBoneByIncludes(skinnedMesh, ['spine']);
      bones.chest = findBoneByIncludes(skinnedMesh, ['chest', 'spine2', 'upperchest']);
      bones.neck = findBoneByIncludes(skinnedMesh, ['neck']);
      bones.head = findBoneByIncludes(skinnedMesh, ['head']);

      bones.leftUpLeg = findBoneByIncludes(skinnedMesh, ['leftupleg', 'thigh_l', 'leftthigh', 'upleg_l']);
      bones.leftLeg = findBoneByIncludes(skinnedMesh, ['leftleg', 'calf_l', 'shin_l', 'leg_l']);
      bones.leftFoot = findBoneByIncludes(skinnedMesh, ['leftfoot', 'foot_l']);
      bones.leftToe = findBoneByIncludes(skinnedMesh, ['lefttoe', 'toebase_l', 'toe_l']);

      bones.rightUpLeg = findBoneByIncludes(skinnedMesh, ['rightupleg', 'thigh_r', 'rightthigh', 'upleg_r']);
      bones.rightLeg = findBoneByIncludes(skinnedMesh, ['rightleg', 'calf_r', 'shin_r', 'leg_r']);
      bones.rightFoot = findBoneByIncludes(skinnedMesh, ['rightfoot', 'foot_r']);
      bones.rightToe = findBoneByIncludes(skinnedMesh, ['righttoe', 'toebase_r', 'toe_r']);

      bones.leftShoulder = findBoneByIncludes(skinnedMesh, ['leftshoulder', 'clavicle_l']);
      bones.leftArm = findBoneByIncludes(skinnedMesh, ['leftarm', 'upperarm_l', 'arm_l']);
      bones.leftForeArm = findBoneByIncludes(skinnedMesh, ['leftforearm', 'lowerarm_l', 'forearm_l']);
      bones.leftHand = findBoneByIncludes(skinnedMesh, ['lefthand', 'hand_l']);

      bones.rightShoulder = findBoneByIncludes(skinnedMesh, ['rightshoulder', 'clavicle_r']);
      bones.rightArm = findBoneByIncludes(skinnedMesh, ['rightarm', 'upperarm_r', 'arm_r']);
      bones.rightForeArm = findBoneByIncludes(skinnedMesh, ['rightforearm', 'lowerarm_r', 'forearm_r']);
      bones.rightHand = findBoneByIncludes(skinnedMesh, ['righthand', 'hand_r']);
    }

    const loader = new GLTFLoader();
    loader.load(
      'Xbot.glb',
      (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);

        let skinnedMesh = null;
        modelRoot.traverse((obj) => {
          if (obj.isSkinnedMesh && !skinnedMesh) {
            skinnedMesh = obj;
          }
        });

        if (skinnedMesh) {
          skeleton = skinnedMesh.skeleton;
          mapBones(skinnedMesh);
        }

        const bbox = new THREE.Box3().setFromObject(modelRoot);
        const size = new THREE.Vector3();
        bbox.getSize(size);
        const height = Math.max(size.y, 0.001);
        const scale = 1.8 / height;
        modelRoot.scale.setScalar(scale);

        const bbox2 = new THREE.Box3().setFromObject(modelRoot);
        const minY = bbox2.min.y;
        modelRoot.position.set(0, -minY, 0);
        modelRoot.rotation.y = 0;

        hipsRoot = bones.hips || modelRoot;
        rememberInitialPose();
        modelLoaded = true;
        hudModel.textContent = 'Yes';
      },
      undefined,
      (err) => {
        console.error('Failed to load Xbot.glb', err);
      }
    );

    function makeArcLine(color) {
      const geometry = new THREE.BufferGeometry();
      const material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.9 });
      const line = new THREE.Line(geometry, material);
      scene.add(line);
      return line;
    }

    const arcVisuals = {
      leftHip: makeArcLine(0x66aaff),
      rightHip: makeArcLine(0xff6666),
      leftKnee: makeArcLine(0x66aaff),
      rightKnee: makeArcLine(0xff6666),
      leftShoulder: makeArcLine(0x66aaff),
      rightShoulder: makeArcLine(0xff6666),
    };

    function updateArc(line, center, axisA, axisB, radius, angle, colorSign = 1) {
      const segments = 32;
      const pts = [];
      const start = 0;
      const end = angle;
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const a = start + (end - start) * t;
        const p = new THREE.Vector3()
          .copy(center)
          .addScaledVector(axisA, Math.cos(a) * radius)
          .addScaledVector(axisB, Math.sin(a) * radius * colorSign);
        pts.push(p.x, p.y, p.z);
      }
      line.geometry.dispose();
      line.geometry = new THREE.BufferGeometry();
      line.geometry.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
    }

    function boneWorldPosition(bone) {
      const v = new THREE.Vector3();
      if (!bone) return v;
      bone.getWorldPosition(v);
      return v;
    }

    const footTrailLeft = [];
    const footTrailRight = [];
    const leftDots = [];
    const rightDots = [];
    const trailGroup = new THREE.Group();
    scene.add(trailGroup);

    const dotGeo = new THREE.SphereGeometry(0.03, 8, 8);

    function createDot(color) {
      return new THREE.Mesh(dotGeo, new THREE.MeshBasicMaterial({ color }));
    }

    for (let i = 0; i < 30; i++) {
      const dl = createDot(0x66aaff);
      const dr = createDot(0xff6666);
      dl.visible = false;
      dr.visible = false;
      leftDots.push(dl);
      rightDots.push(dr);
      trailGroup.add(dl, dr);
    }

    function clearFootTrails() {
      footTrailLeft.length = 0;
      footTrailRight.length = 0;
      leftDots.forEach(d => d.visible = false);
      rightDots.forEach(d => d.visible = false);
    }

    let trailAccumulator = 0;
    function updateFootTrails(dt) {
      if (!bones.leftFoot || !bones.rightFoot) return;
      trailAccumulator += dt;
      if (trailAccumulator < 0.04) return;
      trailAccumulator = 0;

      const lp = boneWorldPosition(bones.leftFoot);
      const rp = boneWorldPosition(bones.rightFoot);

      footTrailLeft.push(new THREE.Vector3(lp.x, 0.02, lp.z));
      footTrailRight.push(new THREE.Vector3(rp.x, 0.02, rp.z));
      if (footTrailLeft.length > 30) footTrailLeft.shift();
      if (footTrailRight.length > 30) footTrailRight.shift();

      for (let i = 0; i < 30; i++) {
        if (i < footTrailLeft.length) {
          leftDots[i].position.copy(footTrailLeft[i]);
          leftDots[i].visible = true;
          leftDots[i].material.opacity = (i + 1) / 30;
          leftDots[i].material.transparent = true;
        } else {
          leftDots[i].visible = false;
        }

        if (i < footTrailRight.length) {
          rightDots[i].position.copy(footTrailRight[i]);
          rightDots[i].visible = true;
          rightDots[i].material.opacity = (i + 1) / 30;
          rightDots[i].material.transparent = true;
        } else {
          rightDots[i].visible = false;
        }
      }
    }

    function estimateStrideLength() {
      const all = [...footTrailLeft, ...footTrailRight];
      if (all.length < 2) return 0;
      let minZ = Infinity;
      let maxZ = -Infinity;
      for (const p of all) {
        minZ = Math.min(minZ, p.z);
        maxZ = Math.max(maxZ, p.z);
      }
      return Math.max(0, maxZ - minZ);
    }

    function applyRunningPose(phase) {
      if (!modelLoaded) return;

      Object.values(bones).forEach(b => {
        if (b && initialRotations.has(b.uuid)) {
          b.rotation.copy(initialRotations.get(b.uuid));
        }
      });

      const hipL = params.hip_amplitude * Math.sin(phase);
      const hipR = params.hip_amplitude * Math.sin(phase + Math.PI);

      const kneeL = params.knee_amplitude * Math.max(0, Math.sin(phase - 0.5));
      const kneeR = params.knee_amplitude * Math.max(0, Math.sin(phase + Math.PI - 0.5));

      const ankleL = params.ankle_amplitude * Math.sin(phase + 0.3);
      const ankleR = params.ankle_amplitude * Math.sin(phase + Math.PI + 0.3);

      const armL = params.arm_amplitude * Math.sin(phase + Math.PI);
      const armR = params.arm_amplitude * Math.sin(phase);

      const torsoLean = 0.1;
      const torsoLat = 0.05 * Math.sin(2 * phase);

      if (bones.hips) {
        bones.hips.rotation.x += torsoLean;
        bones.hips.rotation.z += torsoLat;
      }
      if (bones.spine) {
        bones.spine.rotation.x += torsoLean * 0.5;
        bones.spine.rotation.z += torsoLat * 0.7;
      }
      if (bones.chest) {
        bones.chest.rotation.z += torsoLat * 0.5;
      }

      if (bones.leftUpLeg) bones.leftUpLeg.rotation.x += hipL;
      if (bones.rightUpLeg) bones.rightUpLeg.rotation.x += hipR;

      if (bones.leftLeg) bones.leftLeg.rotation.x += kneeL;
      if (bones.rightLeg) bones.rightLeg.rotation.x += kneeR;

      if (bones.leftFoot) bones.leftFoot.rotation.x += ankleL - kneeL * 0.15;
      if (bones.rightFoot) bones.rightFoot.rotation.x += ankleR - kneeR * 0.15;

      if (bones.leftArm) bones.leftArm.rotation.x += armL;
      if (bones.rightArm) bones.rightArm.rotation.x += armR;

      if (bones.leftForeArm) bones.leftForeArm.rotation.x += Math.max(0, -armL) * 0.5;
      if (bones.rightForeArm) bones.rightForeArm.rotation.x += Math.max(0, -armR) * 0.5;

      if (bones.leftShoulder) bones.leftShoulder.rotation.z += 0.15;
      if (bones.rightShoulder) bones.rightShoulder.rotation.z -= 0.15;

      if (modelRoot && initialPositions.has(modelRoot.uuid)) {
        const p = initialPositions.get(modelRoot.uuid);
        modelRoot.position.set(p.x, p.y + 0.03 * Math.sin(2 * phase), p.z);
      }

      return { hipL, hipR, kneeL, kneeR, armL, armR };
    }

    function updateArcs(values) {
      if (!values) return;

      const forward = new THREE.Vector3(0, 0, 1);
      const up = new THREE.Vector3(0, 1, 0);
      const right = new THREE.Vector3(1, 0, 0);

      if (bones.leftUpLeg) {
        const c = boneWorldPosition(bones.leftUpLeg);
        updateArc(arcVisuals.leftHip, c, up, forward, 0.25, values.hipL);
      }
      if (bones.rightUpLeg) {
        const c = boneWorldPosition(bones.rightUpLeg);
        updateArc(arcVisuals.rightHip, c, up, forward, 0.25, values.hipR);
      }
      if (bones.leftLeg) {
        const c = boneWorldPosition(bones.leftLeg);
        updateArc(arcVisuals.leftKnee, c, up, forward, 0.18, values.kneeL);
      }
      if (bones.rightLeg) {
        const c = boneWorldPosition(bones.rightLeg);
        updateArc(arcVisuals.rightKnee, c, up, forward, 0.18, values.kneeR);
      }
      if (bones.leftArm) {
        const c = boneWorldPosition(bones.leftArm);
        updateArc(arcVisuals.leftShoulder, c, up, forward, 0.2, values.armL);
      }
      if (bones.rightArm) {
        const c = boneWorldPosition(bones.rightArm);
        updateArc(arcVisuals.rightShoulder, c, up, forward, 0.2, values.armR);
      }
    }

    function bonesAreValid() {
      for (const b of Object.values(bones)) {
        if (!b) continue;
        const r = b.rotation;
        if ([r.x, r.y, r.z].some(v => Number.isNaN(v))) return false;
      }
      return true;
    }

    function round(n, d) {
      const p = Math.pow(10, d);
      return Math.round(n * p) / p;
    }

    window.__3D_STATE__ = {
      gaitPhase: 0,
      strideFrequency: params.stride_frequency,
      hipAmplitude: params.hip_amplitude,
      kneeAmplitude: params.knee_amplitude,
      leftHipAngle: 0,
      rightHipAngle: 0,
      isPaused: false,
      modelLoaded: false,
      frameCount: 0,
      bonesValid: true,
      strideLength: 0
    };

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetToInitialPose();
        isPaused = true;
      } else if (e.key === 'g' || e.key === 'G') {
        gaitPhase = 0;
        clearFootTrails();
        isPaused = false;
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;
      const dt = Math.min(clock.getDelta(), 0.05);

      let currentAngles = { hipL: 0, hipR: 0, kneeL: 0, kneeR: 0, armL: 0, armR: 0 };

      if (modelLoaded && !isPaused) {
        gaitPhase += 2 * Math.PI * params.stride_frequency * dt;
        gaitPhase %= (2 * Math.PI);
      }

      if (modelLoaded && !isPaused) {
        currentAngles = applyRunningPose(gaitPhase) || currentAngles;
      } else if (modelLoaded && isPaused) {
        currentAngles = applyRunningPose(gaitPhase) || currentAngles;
      }

      if (modelLoaded) {
        updateArcs(currentAngles);
        updateFootTrails(dt);
      }

      const strideLength = estimateStrideLength();

      hudPhase.textContent = String(Math.round(THREE.MathUtils.radToDeg(gaitPhase)));
      hudFreq.textContent = params.stride_frequency.toFixed(1);
      hudLHip.textContent = String(Math.round(THREE.MathUtils.radToDeg(currentAngles.hipL || 0)));
      hudRHip.textContent = String(Math.round(THREE.MathUtils.radToDeg(currentAngles.hipR || 0)));
      hudStride.textContent = strideLength.toFixed(2);
      hudModel.textContent = modelLoaded ? 'Yes' : 'No';

      window.__3D_STATE__ = {
        gaitPhase: round(gaitPhase, 3),
        strideFrequency: params.stride_frequency,
        hipAmplitude: params.hip_amplitude,
        kneeAmplitude: params.knee_amplitude,
        leftHipAngle: round(currentAngles.hipL || 0, 3),
        rightHipAngle: round(currentAngles.hipR || 0, 3),
        isPaused: isPaused,
        modelLoaded: modelLoaded,
        frameCount: frameCount,
        bonesValid: bonesAreValid(),
        strideLength: round(strideLength, 2)
      };

      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
