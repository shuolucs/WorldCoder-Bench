<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sprint Biomechanics Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #223344;
            font-family: monospace;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #445566;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #88ccff;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .hud-value {
            font-weight: bold;
            color: #aaffaa;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            border: 1px solid #445566;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .control-group label {
            margin-bottom: 5px;
            font-size: 12px;
            color: #cccccc;
        }
        input[type=range] {
            width: 120px;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            border: 1px solid #445566;
        }
        .key {
            background: #555;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Biomechanics HUD</h2>
        <div class="hud-line">Model Loaded: <span id="hud-model" class="hud-value">No</span></div>
        <div class="hud-line">Gait Phase: <span id="hud-phase" class="hud-value">0</span>&deg;</div>
        <div class="hud-line">Stride Freq: <span id="hud-freq" class="hud-value">2.5</span> Hz</div>
        <div class="hud-line">L Hip Angle: <span id="hud-lhip" class="hud-value" style="color: #88ccff;">0</span>&deg;</div>
        <div class="hud-line">R Hip Angle: <span id="hud-rhip" class="hud-value" style="color: #ff8888;">0</span>&deg;</div>
        <div class="hud-line">Stride Length: <span id="hud-stride" class="hud-value">0.00</span> m</div>
    </div>

    <div id="instructions">
        <div class="hud-line"><span class="key">Space</span> Play / Pause</div>
        <div class="hud-line"><span class="key">R</span> Reset (T-Pose)</div>
        <div class="hud-line"><span class="key">G</span> Restart Running</div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-frequency">Stride Freq (Hz)</label>
            <input type="range" id="slider-frequency" min="0.5" max="5.0" step="0.1" value="2.5">
        </div>
        <div class="control-group">
            <label for="slider-hip-amp">Hip Amplitude</label>
            <input type="range" id="slider-hip-amp" min="0.2" max="1.5" step="0.05" value="0.8">
        </div>
        <div class="control-group">
            <label for="slider-knee-amp">Knee Amplitude</label>
            <input type="range" id="slider-knee-amp" min="0.5" max="2.0" step="0.1" value="1.2">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gaitPhase: 0,
            strideFrequency: 2.5,
            hipAmplitude: 0.8,
            kneeAmplitude: 1.2,
            leftHipAngle: 0,
            rightHipAngle: 0,
            isPaused: false,
            modelLoaded: false,
            frameCount: 0,
            bonesValid: true,
            strideLength: 0
        };

        // --- DOM Elements ---
        const ui = {
            phase: document.getElementById('hud-phase'),
            freq: document.getElementById('hud-freq'),
            lhip: document.getElementById('hud-lhip'),
            rhip: document.getElementById('hud-rhip'),
            stride: document.getElementById('hud-stride'),
            model: document.getElementById('hud-model'),
            sliderFreq: document.getElementById('slider-frequency'),
            sliderHip: document.getElementById('slider-hip-amp'),
            sliderKnee: document.getElementById('slider-knee-amp')
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x223344);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.2, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x556677, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Environment ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x445566, 0x334455);
        scene.add(gridHelper);

        // Running Track
        const trackGroup = new THREE.Group();
        const trackMat = new THREE.MeshBasicMaterial({ color: 0x883333, side: THREE.DoubleSide });
        const trackGeo = new THREE.PlaneGeometry(2.4, 20);
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        track.position.y = 0.01;
        trackGroup.add(track);

        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lineGeo = new THREE.PlaneGeometry(0.05, 20);
        const line1 = new THREE.Mesh(lineGeo, lineMat);
        line1.rotation.x = -Math.PI / 2;
        line1.position.set(-1.1, 0.02, 0);
        const line2 = line1.clone();
        line2.position.set(1.1, 0.02, 0);
        trackGroup.add(line1);
        trackGroup.add(line2);
        scene.add(trackGroup);

        // --- Visualizations Setup ---
        // Foot Trails
        const trailLength = 30;
        const trailPositionsL = new Float32Array(trailLength * 3);
        const trailPositionsR = new Float32Array(trailLength * 3);
        
        const trailGeoL = new THREE.BufferGeometry();
        trailGeoL.setAttribute('position', new THREE.BufferAttribute(trailPositionsL, 3));
        const trailMatL = new THREE.PointsMaterial({ color: 0x88ccff, size: 0.08 });
        const trailPointsL = new THREE.Points(trailGeoL, trailMatL);
        scene.add(trailPointsL);

        const trailGeoR = new THREE.BufferGeometry();
        trailGeoR.setAttribute('position', new THREE.BufferAttribute(trailPositionsR, 3));
        const trailMatR = new THREE.PointsMaterial({ color: 0xff8888, size: 0.08 });
        const trailPointsR = new THREE.Points(trailGeoR, trailMatR);
        scene.add(trailPointsR);

        let trailIndex = 0;
        let trailZHistoryL = [];

        // Joint Arcs
        function createArcMesh(color) {
            const geo = new THREE.BufferGeometry();
            const mat = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            return new THREE.Line(geo, mat);
        }

        const arcs = {
            lHip: createArcMesh(0x88ccff),
            rHip: createArcMesh(0xff8888),
            lKnee: createArcMesh(0x88ccff),
            rKnee: createArcMesh(0xff8888)
        };
        scene.add(arcs.lHip, arcs.rHip, arcs.lKnee, arcs.rKnee);

        function updateArcGeometry(mesh, center, angle, radius, isKnee = false) {
            const points = [];
            const segments = 16;
            // Draw arc in YZ plane. 
            // For hips: 0 is straight down (-Y). Positive angle moves forward (+Z).
            // For knees: 0 is straight down relative to thigh.
            
            // Base vector pointing down
            const baseVec = new THREE.Vector3(0, -1, 0);
            const axis = new THREE.Vector3(1, 0, 0); // Rotate around X

            // Draw line from center down
            points.push(center.clone());
            points.push(center.clone().add(baseVec.clone().multiplyScalar(radius)));
            
            // Draw arc
            for (let i = 0; i <= segments; i++) {
                const t = i / segments;
                const currentAngle = angle * t;
                const vec = baseVec.clone().applyAxisAngle(axis, currentAngle).multiplyScalar(radius);
                points.push(center.clone().add(vec));
            }
            
            // Draw line back to center
            points.push(center.clone());

            mesh.geometry.setFromPoints(points);
        }

        // --- Model Loading ---
        let skeletonBones = {};
        let initialPose = {};
        let initialHipsY = 0;
        const loader = new GLTFLoader();
        
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Xbot.glb', (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            model.traverse((child) => {
                if (child.isBone) {
                    skeletonBones[child.name] = child;
                    initialPose[child.name] = {
                        quaternion: child.quaternion.clone(),
                        position: child.position.clone()
                    };
                }
            });

            if (skeletonBones['mixamorigHips']) {
                initialHipsY = skeletonBones['mixamorigHips'].position.y;
            }

            window.__3D_STATE__.modelLoaded = true;
            ui.model.innerText = 'Yes';
            ui.model.style.color = '#aaffaa';
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            ui.model.innerText = 'Error';
            ui.model.style.color = '#ff8888';
        });

        // --- Controls & Events ---
        ui.sliderFreq.addEventListener('input', (e) => {
            window.__3D_STATE__.strideFrequency = parseFloat(e.target.value);
        });
        ui.sliderHip.addEventListener('input', (e) => {
            window.__3D_STATE__.hipAmplitude = parseFloat(e.target.value);
        });
        ui.sliderKnee.addEventListener('input', (e) => {
            window.__3D_STATE__.kneeAmplitude = parseFloat(e.target.value);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (e.code === 'KeyR') {
                resetPose();
            } else if (e.code === 'KeyG') {
                window.__3D_STATE__.gaitPhase = 0;
                window.__3D_STATE__.isPaused = false;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function resetPose() {
            window.__3D_STATE__.isPaused = true;
            window.__3D_STATE__.gaitPhase = 0;
            
            for (const boneName in skeletonBones) {
                if (initialPose[boneName]) {
                    skeletonBones[boneName].quaternion.copy(initialPose[boneName].quaternion);
                    skeletonBones[boneName].position.copy(initialPose[boneName].position);
                }
            }
            
            // Clear trails
            trailPositionsL.fill(0);
            trailPositionsR.fill(0);
            trailGeoL.attributes.position.needsUpdate = true;
            trailGeoR.attributes.position.needsUpdate = true;
            trailZHistoryL = [];
            window.__3D_STATE__.strideLength = 0;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            const state = window.__3D_STATE__;

            if (state.modelLoaded && !state.isPaused) {
                // Advance phase
                state.gaitPhase += state.strideFrequency * 2 * Math.PI * dt;
                if (state.gaitPhase > 2 * Math.PI) {
                    state.gaitPhase -= 2 * Math.PI;
                }

                const phase = state.gaitPhase;
                const hipAmp = state.hipAmplitude;
                const kneeAmp = state.kneeAmplitude;

                // Calculate Angles
                // Xbot: +X rotation on UpLeg moves leg forward (flexion)
                const lHipAngle = hipAmp * Math.sin(phase);
                const rHipAngle = hipAmp * Math.sin(phase + Math.PI);
                
                // Knees: +X rotation bends knee backward
                const lKneeAngle = kneeAmp * Math.max(0, Math.sin(phase - 0.5));
                const rKneeAngle = kneeAmp * Math.max(0, Math.sin(phase + Math.PI - 0.5));

                // Ankles
                const lAnkleAngle = 0.3 * Math.sin(phase + 0.3);
                const rAnkleAngle = 0.3 * Math.sin(phase + Math.PI + 0.3);

                // Arms: Opposite to legs. Left arm swings with right leg.
                // Xbot: +X rotation on Arm moves it backward.
                // If right leg is forward (rHipAngle > 0), left arm should be forward (angle < 0).
                const lArmAngle = -0.6 * Math.sin(phase + Math.PI); 
                const rArmAngle = -0.6 * Math.sin(phase);

                // Apply Rotations
                if (skeletonBones['mixamorigLeftUpLeg']) {
                    // Legs
                    skeletonBones['mixamorigLeftUpLeg'].rotation.x = lHipAngle;
                    skeletonBones['mixamorigRightUpLeg'].rotation.x = rHipAngle;
                    
                    skeletonBones['mixamorigLeftLeg'].rotation.x = lKneeAngle;
                    skeletonBones['mixamorigRightLeg'].rotation.x = rKneeAngle;

                    skeletonBones['mixamorigLeftFoot'].rotation.x = lAnkleAngle;
                    skeletonBones['mixamorigRightFoot'].rotation.x = rAnkleAngle;

                    // Arms
                    skeletonBones['mixamorigLeftArm'].rotation.x = lArmAngle;
                    skeletonBones['mixamorigRightArm'].rotation.x = rArmAngle;
                    
                    // Elbows (slight constant bend + oscillation)
                    skeletonBones['mixamorigLeftForeArm'].rotation.x = -0.5 + 0.2 * Math.sin(phase + Math.PI);
                    skeletonBones['mixamorigRightForeArm'].rotation.x = -0.5 + 0.2 * Math.sin(phase);

                    // Torso & Bounce
                    skeletonBones['mixamorigSpine'].rotation.x = 0.1; // Forward lean
                    skeletonBones['mixamorigSpine'].rotation.z = 0.05 * Math.sin(2 * phase); // Lateral sway
                    
                    skeletonBones['mixamorigHips'].position.y = initialHipsY + 0.03 * Math.sin(2 * phase);

                    // Update State
                    state.leftHipAngle = lHipAngle;
                    state.rightHipAngle = rHipAngle;
                    
                    // Validate bones
                    state.bonesValid = !isNaN(lHipAngle) && !isNaN(rHipAngle);
                }

                // Update Visualizations (Trails & Arcs)
                if (state.frameCount % 2 === 0 && skeletonBones['mixamorigLeftFoot']) {
                    const posL = new THREE.Vector3();
                    const posR = new THREE.Vector3();
                    skeletonBones['mixamorigLeftFoot'].getWorldPosition(posL);
                    skeletonBones['mixamorigRightFoot'].getWorldPosition(posR);

                    // Shift arrays
                    for (let i = trailLength - 1; i > 0; i--) {
                        trailPositionsL[i * 3] = trailPositionsL[(i - 1) * 3];
                        trailPositionsL[i * 3 + 1] = trailPositionsL[(i - 1) * 3 + 1];
                        trailPositionsL[i * 3 + 2] = trailPositionsL[(i - 1) * 3 + 2];

                        trailPositionsR[i * 3] = trailPositionsR[(i - 1) * 3];
                        trailPositionsR[i * 3 + 1] = trailPositionsR[(i - 1) * 3 + 1];
                        trailPositionsR[i * 3 + 2] = trailPositionsR[(i - 1) * 3 + 2];
                    }

                    // Insert new
                    trailPositionsL[0] = posL.x; trailPositionsL[1] = 0.05; trailPositionsL[2] = posL.z;
                    trailPositionsR[0] = posR.x; trailPositionsR[1] = 0.05; trailPositionsR[2] = posR.z;

                    trailGeoL.attributes.position.needsUpdate = true;
                    trailGeoR.attributes.position.needsUpdate = true;

                    // Estimate stride length from Z travel
                    trailZHistoryL.push(posL.z);
                    if (trailZHistoryL.length > 60) trailZHistoryL.shift();
                    if (trailZHistoryL.length > 10) {
                        const maxZ = Math.max(...trailZHistoryL);
                        const minZ = Math.min(...trailZHistoryL);
                        state.strideLength = maxZ - minZ;
                    }

                    // Update Arcs
                    const hipLPos = new THREE.Vector3();
                    const hipRPos = new THREE.Vector3();
                    const kneeLPos = new THREE.Vector3();
                    const kneeRPos = new THREE.Vector3();

                    skeletonBones['mixamorigLeftUpLeg'].getWorldPosition(hipLPos);
                    skeletonBones['mixamorigRightUpLeg'].getWorldPosition(hipRPos);
                    skeletonBones['mixamorigLeftLeg'].getWorldPosition(kneeLPos);
                    skeletonBones['mixamorigRightLeg'].getWorldPosition(kneeRPos);

                    // Move arcs slightly outward to avoid clipping
                    hipLPos.x += 0.1; hipRPos.x -= 0.1;
                    kneeLPos.x += 0.1; kneeRPos.x -= 0.1;

                    updateArcGeometry(arcs.lHip, hipLPos, lHipAngle, 0.3);
                    updateArcGeometry(arcs.rHip, hipRPos, rHipAngle, 0.3);
                    updateArcGeometry(arcs.lKnee, kneeLPos, lKneeAngle, 0.25, true);
                    updateArcGeometry(arcs.rKnee, kneeRPos, rKneeAngle, 0.25, true);
                }
            }

            // Update HUD
            ui.phase.innerText = Math.round(state.gaitPhase * (180 / Math.PI));
            ui.freq.innerText = state.strideFrequency.toFixed(1);
            ui.lhip.innerText = Math.round(state.leftHipAngle * (180 / Math.PI));
            ui.rhip.innerText = Math.round(state.rightHipAngle * (180 / Math.PI));
            ui.stride.innerText = state.strideLength.toFixed(2);

            // Format state for testing
            state.gaitPhase = parseFloat(state.gaitPhase.toFixed(3));
            state.leftHipAngle = parseFloat(state.leftHipAngle.toFixed(3));
            state.rightHipAngle = parseFloat(state.rightHipAngle.toFixed(3));
            state.strideLength = parseFloat(state.strideLength.toFixed(2));
            state.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
