<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sprint Biomechanics Simulator</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #223344; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.75);
    color: #ddeeff;
    padding: 14px 18px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.7;
    min-width: 220px;
    border: 1px solid rgba(100,150,200,0.3);
}
#hud .title {
    font-size: 15px;
    font-weight: bold;
    color: #88ccff;
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(100,150,200,0.3);
    padding-bottom: 4px;
}
#hud span { color: #aaddff; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.75);
    color: #ddeeff;
    padding: 14px 24px;
    border-radius: 8px;
    font-size: 13px;
    display: flex;
    gap: 24px;
    align-items: center;
    border: 1px solid rgba(100,150,200,0.3);
}
#controls label {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}
#controls input[type="range"] {
    width: 120px;
    accent-color: #88ccff;
}
#controls .val { color: #88ccff; font-weight: bold; font-size: 12px; }

#keys-help {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.75);
    color: #99bbdd;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.8;
    border: 1px solid rgba(100,150,200,0.3);
}
#keys-help kbd {
    background: rgba(100,150,200,0.3);
    padding: 1px 6px;
    border-radius: 3px;
    color: #aaddff;
}
</style>
</head>
<body>

<div id="hud">
    <div class="title">Sprint Biomechanics</div>
    <div>Gait Phase: <span id="hud-phase">0</span>°</div>
    <div>Stride Freq: <span id="hud-freq">2.5</span> Hz</div>
    <div>Left Hip: <span id="hud-lhip">0</span>°</div>
    <div>Right Hip: <span id="hud-rhip">0</span>°</div>
    <div>Stride Length: <span id="hud-stride">0.00</span> m</div>
    <div>Model Loaded: <span id="hud-model">No</span></div>
</div>

<div id="keys-help">
    <kbd>Space</kbd> Pause/Play<br>
    <kbd>R</kbd> Reset (T-pose)<br>
    <kbd>G</kbd> Start Running
</div>

<div id="controls">
    <label>
        Stride Frequency
        <input type="range" id="slider-frequency" min="0.5" max="5.0" step="0.1" value="2.5">
        <span class="val" id="val-freq">2.5 Hz</span>
    </label>
    <label>
        Hip Amplitude
        <input type="range" id="slider-hip-amp" min="0.2" max="1.5" step="0.05" value="0.8">
        <span class="val" id="val-hip">0.80 rad</span>
    </label>
    <label>
        Knee Amplitude
        <input type="range" id="slider-knee-amp" min="0.5" max="2.0" step="0.1" value="1.2">
        <span class="val" id="val-knee">1.2 rad</span>
    </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gaitPhase: 0,
    strideFrequency: 2.5,
    hipAmplitude: 0.8,
    kneeAmplitude: 1.2,
    leftHipAngle: 0,
    rightHipAngle: 0,
    isPaused: false,
    modelLoaded: false,
    frameCount: 0,
    bonesValid: true,
    strideLength: 0
};

let gaitPhase = 0;
let strideFrequency = 2.5;
let hipAmplitude = 0.8;
let kneeAmplitude = 1.2;
let isPaused = false;
let isRunning = true;
let modelLoaded = false;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x223344);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 3, 8);
camera.lookAt(0, 1.2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.2, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x556677, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Grid
const grid = new THREE.GridHelper(20, 20, 0x445566, 0x334455);
scene.add(grid);

// Running track lane lines
function createLaneLine(xPos, color) {
    const geo = new THREE.PlaneGeometry(0.08, 20);
    const mat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(xPos, 0.005, 0);
    return mesh;
}
scene.add(createLaneLine(-1.0, 0xffaa44));
scene.add(createLaneLine(1.0, 0xffaa44));
scene.add(createLaneLine(-0.5, 0xffffff));
scene.add(createLaneLine(0.5, 0xffffff));

// Track surface
const trackGeo = new THREE.PlaneGeometry(2, 20);
const trackMat = new THREE.MeshStandardMaterial({ color: 0x993333, roughness: 0.9 });
const trackMesh = new THREE.Mesh(trackGeo, trackMat);
trackMesh.rotation.x = -Math.PI / 2;
trackMesh.position.set(0, 0.002, 0);
trackMesh.receiveShadow = true;
scene.add(trackMesh);

// Skeleton model references
let skeleton = null;
let skeletonModel = null;
let bones = {};
let initialBoneRotations = {};

// Foot trail
const MAX_TRAIL = 30;
const leftFootTrail = [];
const rightFootTrail = [];

const leftTrailGeo = new THREE.BufferGeometry();
const rightTrailGeo = new THREE.BufferGeometry();
const leftTrailPositions = new Float32Array(MAX_TRAIL * 3);
const rightTrailPositions = new Float32Array(MAX_TRAIL * 3);
leftTrailGeo.setAttribute('position', new THREE.BufferAttribute(leftTrailPositions, 3));
rightTrailGeo.setAttribute('position', new THREE.BufferAttribute(rightTrailPositions, 3));

const leftTrailMat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.05 });
const rightTrailMat = new THREE.PointsMaterial({ color: 0xff4444, size: 0.05 });
const leftTrailPoints = new THREE.Points(leftTrailGeo, leftTrailMat);
const rightTrailPoints = new THREE.Points(rightTrailGeo, rightTrailMat);
scene.add(leftTrailPoints);
scene.add(rightTrailPoints);

// Joint angle arc visualization
const arcGroup = new THREE.Group();
scene.add(arcGroup);

function createArc(color) {
    const points = [];
    const segments = 20;
    for (let i = 0; i <= segments; i++) {
        points.push(new THREE.Vector3(0, 0, 0));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color, linewidth: 2 });
    const line = new THREE.Line(geo, mat);
    return line;
}

const arcs = {
    leftHip: createArc(0x4488ff),
    rightHip: createArc(0xff4444),
    leftKnee: createArc(0x4488ff),
    rightKnee: createArc(0xff4444),
    leftShoulder: createArc(0x4488ff),
    rightShoulder: createArc(0xff4444)
};
Object.values(arcs).forEach(a => arcGroup.add(a));

function updateArc(arcLine, worldPos, angle, radius, axis) {
    const positions = arcLine.geometry.attributes.position;
    const segments = positions.count - 1;
    const startAngle = -Math.abs(angle) / 2;
    const endAngle = Math.abs(angle) / 2;

    for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const a = startAngle + t * (endAngle - startAngle);
        let x = 0, y = 0, z = 0;
        if (axis === 'x') {
            y = Math.cos(a) * radius;
            z = Math.sin(a) * radius;
        } else if (axis === 'z') {
            x = Math.sin(a) * radius;
            y = Math.cos(a) * radius;
        }
        positions.setXYZ(i, worldPos.x + x, worldPos.y + y, worldPos.z + z);
    }
    positions.needsUpdate = true;
}

// Fallback skeleton creation
function createFallbackSkeleton() {
    const group = new THREE.Group();

    const jointMat = new THREE.MeshStandardMaterial({ color: 0xaabbcc });
    const boneMat = new THREE.MeshStandardMaterial({ color: 0x667788 });
    const leftMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const rightMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });

    // Create bone hierarchy
    // Root (hips)
    const hips = new THREE.Group();
    hips.name = 'mixamorigHips';
    hips.position.set(0, 0.95, 0);

    // Spine
    const spine = new THREE.Group();
    spine.name = 'mixamorigSpine';
    spine.position.set(0, 0.1, 0);
    hips.add(spine);

    const spine1 = new THREE.Group();
    spine1.name = 'mixamorigSpine1';
    spine1.position.set(0, 0.15, 0);
    spine.add(spine1);

    const spine2 = new THREE.Group();
    spine2.name = 'mixamorigSpine2';
    spine2.position.set(0, 0.15, 0);
    spine1.add(spine2);

    // Head
    const neck = new THREE.Group();
    neck.name = 'mixamorigNeck';
    neck.position.set(0, 0.15, 0);
    spine2.add(neck);

    const head = new THREE.Group();
    head.name = 'mixamorigHead';
    head.position.set(0, 0.1, 0);
    neck.add(head);

    // Left arm
    const leftShoulder = new THREE.Group();
    leftShoulder.name = 'mixamorigLeftShoulder';
    leftShoulder.position.set(0.05, 0.12, 0);
    spine2.add(leftShoulder);

    const leftArm = new THREE.Group();
    leftArm.name = 'mixamorigLeftArm';
    leftArm.position.set(0.15, 0, 0);
    leftShoulder.add(leftArm);

    const leftForeArm = new THREE.Group();
    leftForeArm.name = 'mixamorigLeftForeArm';
    leftForeArm.position.set(0, -0.28, 0);
    leftArm.add(leftForeArm);

    const leftHand = new THREE.Group();
    leftHand.name = 'mixamorigLeftHand';
    leftHand.position.set(0, -0.25, 0);
    leftForeArm.add(leftHand);

    // Right arm
    const rightShoulder = new THREE.Group();
    rightShoulder.name = 'mixamorigRightShoulder';
    rightShoulder.position.set(-0.05, 0.12, 0);
    spine2.add(rightShoulder);

    const rightArm = new THREE.Group();
    rightArm.name = 'mixamorigRightArm';
    rightArm.position.set(-0.15, 0, 0);
    rightShoulder.add(rightArm);

    const rightForeArm = new THREE.Group();
    rightForeArm.name = 'mixamorigRightForeArm';
    rightForeArm.position.set(0, -0.28, 0);
    rightArm.add(rightForeArm);

    const rightHand = new THREE.Group();
    rightHand.name = 'mixamorigRightHand';
    rightHand.position.set(0, -0.25, 0);
    rightForeArm.add(rightHand);

    // Left leg
    const leftUpLeg = new THREE.Group();
    leftUpLeg.name = 'mixamorigLeftUpLeg';
    leftUpLeg.position.set(0.1, 0, 0);
    hips.add(leftUpLeg);

    const leftLeg = new THREE.Group();
    leftLeg.name = 'mixamorigLeftLeg';
    leftLeg.position.set(0, -0.45, 0);
    leftUpLeg.add(leftLeg);

    const leftFoot = new THREE.Group();
    leftFoot.name = 'mixamorigLeftFoot';
    leftFoot.position.set(0, -0.45, 0);
    leftLeg.add(leftFoot);

    const leftToeBase = new THREE.Group();
    leftToeBase.name = 'mixamorigLeftToeBase';
    leftToeBase.position.set(0, -0.05, 0.12);
    leftFoot.add(leftToeBase);

    // Right leg
    const rightUpLeg = new THREE.Group();
    rightUpLeg.name = 'mixamorigRightUpLeg';
    rightUpLeg.position.set(-0.1, 0, 0);
    hips.add(rightUpLeg);

    const rightLeg = new THREE.Group();
    rightLeg.name = 'mixamorigRightLeg';
    rightLeg.position.set(0, -0.45, 0);
    rightUpLeg.add(rightLeg);

    const rightFoot = new THREE.Group();
    rightFoot.name = 'mixamorigRightFoot';
    rightFoot.position.set(0, -0.45, 0);
    rightLeg.add(rightFoot);

    const rightToeBase = new THREE.Group();
    rightToeBase.name = 'mixamorigRightToeBase';
    rightToeBase.position.set(0, -0.05, 0.12);
    rightFoot.add(rightToeBase);

    group.add(hips);

    // Add visual meshes to joints
    function addJointVisual(node, size, mat) {
        const sphere = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), mat);
        node.add(sphere);
    }

    function addBoneVisual(parent, child, mat, thickness) {
        // We'll add these after the hierarchy is set up
        const cyl = new THREE.Mesh(
            new THREE.CylinderGeometry(thickness, thickness, 1, 6),
            mat
        );
        // Store for later update
        parent.userData.boneVisual = { mesh: cyl, target: child };
        parent.add(cyl);
    }

    // Add joint spheres
    const allNodes = [hips, spine, spine1, spine2, neck, head,
        leftShoulder, leftArm, leftForeArm, leftHand,
        rightShoulder, rightArm, rightForeArm, rightHand,
        leftUpLeg, leftLeg, leftFoot, leftToeBase,
        rightUpLeg, rightLeg, rightFoot, rightToeBase];

    allNodes.forEach(n => {
        let m = jointMat;
        if (n.name.includes('Left')) m = leftMat;
        if (n.name.includes('Right')) m = rightMat;
        addJointVisual(n, 0.025, m);
    });

    // Add bone connections (cylinders between parent-child)
    const connections = [
        [hips, spine], [spine, spine1], [spine1, spine2], [spine2, neck], [neck, head],
        [spine2, leftShoulder], [leftShoulder, leftArm], [leftArm, leftForeArm], [leftForeArm, leftHand],
        [spine2, rightShoulder], [rightShoulder, rightArm], [rightArm, rightForeArm], [rightForeArm, rightHand],
        [hips, leftUpLeg], [leftUpLeg, leftLeg], [leftLeg, leftFoot], [leftFoot, leftToeBase],
        [hips, rightUpLeg], [rightUpLeg, rightLeg], [rightLeg, rightFoot], [rightFoot, rightToeBase]
    ];

    connections.forEach(([p, c]) => {
        const dist = c.position.length();
        if (dist > 0.01) {
            let m = boneMat;
            if (c.name.includes('Left')) m = leftMat;
            if (c.name.includes('Right')) m = rightMat;

            const cyl = new THREE.Mesh(
                new THREE.CylinderGeometry(0.015, 0.015, dist, 6),
                m
            );
            // Position cylinder between parent and child
            const dir = c.position.clone().normalize();
            const mid = c.position.clone().multiplyScalar(0.5);
            cyl.position.copy(mid);

            // Align cylinder
            const up = new THREE.Vector3(0, 1, 0);
            const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
            cyl.quaternion.copy(quat);

            p.add(cyl);
        }
    });

    return group;
}

// Try loading GLB, fallback to procedural skeleton
function initModel() {
    const loader = new GLTFLoader();

    // Try multiple possible URLs for Xbot
    const urls = [
        'Xbot.glb',
        './Xbot.glb',
        'https://threejs.org/examples/models/gltf/Xbot.glb',
        'https://cdn.jsdelivr.net/gh/mrdoob/three.js@dev/examples/models/gltf/Xbot.glb'
    ];

    let tried = 0;

    function tryLoad(url) {
        loader.load(url,
            (gltf) => {
                skeletonModel = gltf.scene;
                // Scale to ~1.8 units
                const box = new THREE.Box3().setFromObject(skeletonModel);
                const height = box.max.y - box.min.y;
                const scale = 1.8 / height;
                skeletonModel.scale.setScalar(scale);
                skeletonModel.position.set(0, 0, 0);
                // Face +Z
                skeletonModel.rotation.y = 0;

                scene.add(skeletonModel);

                // Find bones
                skeletonModel.traverse((child) => {
                    if (child.isBone || child.isSkinnedMesh) {
                        // Store bone references
                    }
                    if (child.isBone) {
                        bones[child.name] = child;
                    }
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                // Store initial rotations
                Object.keys(bones).forEach(name => {
                    initialBoneRotations[name] = bones[name].rotation.clone();
                });

                modelLoaded = true;
                document.getElementById('hud-model').textContent = 'Yes';
                console.log('Model loaded from:', url);
                console.log('Bones found:', Object.keys(bones).join(', '));
            },
            undefined,
            (err) => {
                tried++;
                if (tried < urls.length) {
                    tryLoad(urls[tried]);
                } else {
                    console.log('GLB not found, using fallback skeleton');
                    createFallbackModel();
                }
            }
        );
    }

    tryLoad(urls[0]);
}

function createFallbackModel() {
    skeletonModel = createFallbackSkeleton();
    scene.add(skeletonModel);

    skeletonModel.traverse((child) => {
        if (child.name && child.name.startsWith('mixamorig')) {
            bones[child.name] = child;
        }
    });

    Object.keys(bones).forEach(name => {
        initialBoneRotations[name] = bones[name].rotation.clone();
    });

    modelLoaded = true;
    document.getElementById('hud-model').textContent = 'Yes';
    console.log('Fallback bones:', Object.keys(bones).join(', '));
}

initModel();

// Find bone by partial name match
function findBone(partialName) {
    // Try exact match first
    if (bones[partialName]) return bones[partialName];

    // Try common naming conventions
    const variations = [
        partialName,
        'mixamorig' + partialName,
        'mixamorig:' + partialName,
        'mixamorig_' + partialName
    ];

    for (const v of variations) {
        if (bones[v]) return bones[v];
    }

    // Fuzzy match
    const lower = partialName.toLowerCase();
    for (const name of Object.keys(bones)) {
        if (name.toLowerCase().includes(lower)) return bones[name];
    }
    return null;
}

// Animation
let lastTime = performance.now();
let frameCount = 0;
let trailCounter = 0;

function resetToTPose() {
    isRunning = false;
    gaitPhase = 0;

    Object.keys(bones).forEach(name => {
        if (initialBoneRotations[name]) {
            bones[name].rotation.copy(initialBoneRotations[name]);
        }
    });

    // Reset hips position
    const hips = findBone('Hips');
    if (hips && hips === skeletonModel.children[0]) {
        hips.position.y = 0.95;
    }
}

function startRunning() {
    isRunning = true;
    gaitPhase = 0;
}

function applyRunningAnimation(dt) {
    if (!modelLoaded || !isRunning) return;

    // Advance phase
    gaitPhase += strideFrequency * 2 * Math.PI * dt;
    gaitPhase = gaitPhase % (2 * Math.PI);

    const phase = gaitPhase;
    const PI = Math.PI;

    // Calculate joint angles
    const leftHipAngle = hipAmplitude * Math.sin(phase);
    const rightHipAngle = hipAmplitude * Math.sin(phase + PI);

    const leftKneeAngle = kneeAmplitude * Math.max(0, Math.sin(phase - 0.5));
    const rightKneeAngle = kneeAmplitude * Math.max(0, Math.sin(phase + PI - 0.5));

    const leftAnkleAngle = 0.3 * Math.sin(phase + 0.3);
    const rightAnkleAngle = 0.3 * Math.sin(phase + PI + 0.3);

    // Arms opposite to legs
    const leftArmAngle = 0.6 * Math.sin(phase + PI); // opposite to left leg = same as right leg
    const rightArmAngle = 0.6 * Math.sin(phase); // opposite to right leg = same as left leg

    const leftElbowAngle = 0.4 * Math.max(0, Math.sin(phase + PI - 0.3));
    const rightElbowAngle = 0.4 * Math.max(0, Math.sin(phase - 0.3));

    // Torso
    const torsoLean = 0.1;
    const torsoLateral = 0.05 * Math.sin(2 * phase);

    // Vertical bounce
    const baseY = 0.95;
    const bounceY = baseY + 0.03 * Math.sin(2 * phase);

    // Apply to bones
    const leftUpLeg = findBone('LeftUpLeg');
    const rightUpLeg = findBone('RightUpLeg');
    const leftLeg = findBone('LeftLeg');
    const rightLeg = findBone('RightLeg');
    const leftFoot = findBone('LeftFoot');
    const rightFoot = findBone('RightFoot');
    const leftArm = findBone('LeftArm');
    const rightArm = findBone('RightArm');
    const leftForeArm = findBone('LeftForeArm');
    const rightForeArm = findBone('RightForeArm');
    const spine = findBone('Spine');
    const spine1 = findBone('Spine1');
    const spine2 = findBone('Spine2');
    const hips = findBone('Hips');

    if (leftUpLeg) leftUpLeg.rotation.x = (initialBoneRotations[leftUpLeg.name]?.x || 0) + leftHipAngle;
    if (rightUpLeg) rightUpLeg.rotation.x = (initialBoneRotations[rightUpLeg.name]?.x || 0) + rightHipAngle;

    if (leftLeg) leftLeg.rotation.x = (initialBoneRotations[leftLeg.name]?.x || 0) - leftKneeAngle;
    if (rightLeg) rightLeg.rotation.x = (initialBoneRotations[rightLeg.name]?.x || 0) - rightKneeAngle;

    if (leftFoot) leftFoot.rotation.x = (initialBoneRotations[leftFoot.name]?.x || 0) + leftAnkleAngle;
    if (rightFoot) rightFoot.rotation.x = (initialBoneRotations[rightFoot.name]?.x || 0) + rightAnkleAngle;

    if (leftArm) leftArm.rotation.x = (initialBoneRotations[leftArm.name]?.x || 0) + leftArmAngle;
    if (rightArm) rightArm.rotation.x = (initialBoneRotations[rightArm.name]?.x || 0) + rightArmAngle;

    if (leftForeArm) leftForeArm.rotation.x = (initialBoneRotations[leftForeArm.name]?.x || 0) - leftElbowAngle;
    if (rightForeArm) rightForeArm.rotation.x = (initialBoneRotations[rightForeArm.name]?.x || 0) - rightElbowAngle;

    if (spine) {
        spine.rotation.x = (initialBoneRotations[spine.name]?.x || 0) + torsoLean * 0.3;
        spine.rotation.z = (initialBoneRotations[spine.name]?.z || 0) + torsoLateral * 0.3;
    }
    if (spine1) {
        spine1.rotation.x = (initialBoneRotations[spine1.name]?.x || 0) + torsoLean * 0.3;
        spine1.rotation.z = (initialBoneRotations[spine1.name]?.z || 0) + torsoLateral * 0.3;
    }
    if (spine2) {
        spine2.rotation.x = (initialBoneRotations[spine2.name]?.x || 0) + torsoLean * 0.4;
        spine2.rotation.z = (initialBoneRotations[spine2.name]?.z || 0) + torsoLateral * 0.4;
    }

    if (hips) {
        hips.position.y = bounceY;
        hips.rotation.z = (initialBoneRotations[hips.name]?.z || 0) + torsoLateral;
    }

    // Update foot trails
    trailCounter++;
    if (trailCounter % 3 === 0) {
        const leftFootBone = findBone('LeftFoot') || findBone('LeftToeBase');
        const rightFootBone = findBone('RightFoot') || findBone('RightToeBase');

        if (leftFootBone) {
            const wp = new THREE.Vector3();
            leftFootBone.getWorldPosition(wp);
            leftFootTrail.push(new THREE.Vector3(wp.x, 0.01, wp.z));
            if (leftFootTrail.length > MAX_TRAIL) leftFootTrail.shift();
        }
        if (rightFootBone) {
            const wp = new THREE.Vector3();
            rightFootBone.getWorldPosition(wp);
            rightFootTrail.push(new THREE.Vector3(wp.x, 0.01, wp.z));
            if (rightFootTrail.length > MAX_TRAIL) rightFootTrail.shift();
        }
    }

    // Update trail geometry
    updateTrailGeometry(leftTrailGeo, leftFootTrail);
    updateTrailGeometry(rightTrailGeo, rightFootTrail);

    // Update arc visualizations
    updateArcVisuals(leftHipAngle, rightHipAngle, leftKneeAngle, rightKneeAngle, leftArmAngle, rightArmAngle);

    // Store current angles for state
    window.__3D_STATE__.leftHipAngle = parseFloat(leftHipAngle.toFixed(3));
    window.__3D_STATE__.rightHipAngle = parseFloat(rightHipAngle.toFixed(3));
}

function updateTrailGeometry(geo, trail) {
    const positions = geo.attributes.position;
    for (let i = 0; i < MAX_TRAIL; i++) {
        if (i < trail.length) {
            positions.setXYZ(i, trail[i].x, trail[i].y, trail[i].z);
        } else {
            positions.setXYZ(i, 0, -10, 0); // hide unused
        }
    }
    positions.needsUpdate = true;
    geo.setDrawRange(0, trail.length);
}

function updateArcVisuals(lHip, rHip, lKnee, rKnee, lArm, rArm) {
    const leftUpLeg = findBone('LeftUpLeg');
    const rightUpLeg = findBone('RightUpLeg');
    const leftLeg = findBone('LeftLeg');
    const rightLeg = findBone('RightLeg');
    const leftArmBone = findBone('LeftArm');
    const rightArmBone = findBone('RightArm');

    const wp = new THREE.Vector3();
    const radius = 0.15;

    if (leftUpLeg) {
        leftUpLeg.getWorldPosition(wp);
        updateArc(arcs.leftHip, wp, lHip, radius, 'x');
    }
    if (rightUpLeg) {
        rightUpLeg.getWorldPosition(wp);
        updateArc(arcs.rightHip, wp, rHip, radius, 'x');
    }
    if (leftLeg) {
        leftLeg.getWorldPosition(wp);
        updateArc(arcs.leftKnee, wp, lKnee, radius * 0.8, 'x');
    }
    if (rightLeg) {
        rightLeg.getWorldPosition(wp);
        updateArc(arcs.rightKnee, wp, rKnee, radius * 0.8, 'x');
    }
    if (leftArmBone) {
        leftArmBone.getWorldPosition(wp);
        updateArc(arcs.leftShoulder, wp, lArm, radius * 0.7, 'x');
    }
    if (rightArmBone) {
        rightArmBone.getWorldPosition(wp);
        updateArc(arcs.rightShoulder, wp, rArm, radius * 0.7, 'x');
    }
}

function calculateStrideLength() {
    if (leftFootTrail.length < 5) return 0;

    // Find distance between consecutive ground contacts
    // Approximate by finding max spread of trail points
    let maxDist = 0;
    for (let i = 1; i < leftFootTrail.length; i++) {
        const d = leftFootTrail[i].distanceTo(leftFootTrail[i - 1]);
        maxDist = Math.max(maxDist, d);
    }

    // Better estimate: total trail distance / number of steps
    let totalDist = 0;
    for (let i = 1; i < leftFootTrail.length; i++) {
        totalDist += leftFootTrail[i].distanceTo(leftFootTrail[i - 1]);
    }

    // Stride length approximation based on hip amplitude and leg length
    const legLength = 0.9; // approximate
    const strideEst = 2 * legLength * Math.sin(hipAmplitude);
    return strideEst;
}

function checkBonesValid() {
    for (const name of Object.keys(bones)) {
        const b = bones[name];
        if (isNaN(b.rotation.x) || isNaN(b.rotation.y) || isNaN(b.rotation.z)) {
            return false;
        }
    }
    return true;
}

// Controls
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    } else if (e.code === 'KeyR') {
        resetToTPose();
    } else if (e.code === 'KeyG') {
        startRunning();
    }
});

const sliderFreq = document.getElementById('slider-frequency');
const sliderHip = document.getElementById('slider-hip-amp');
const sliderKnee = document.getElementById('slider-knee-amp');

sliderFreq.addEventListener('input', () => {
    strideFrequency = parseFloat(sliderFreq.value);
    document.getElementById('val-freq').textContent = strideFrequency.toFixed(1) + ' Hz';
});
sliderHip.addEventListener('input', () => {
    hipAmplitude = parseFloat(sliderHip.value);
    document.getElementById('val-hip').textContent = hipAmplitude.toFixed(2) + ' rad';
});
sliderKnee.addEventListener('input', () => {
    kneeAmplitude = parseFloat(sliderKnee.value);
    document.getElementById('val-knee').textContent = kneeAmplitude.toFixed(1) + ' rad';
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;

    // Clamp dt
    if (dt > 0.1) dt = 0.016;

    if (!isPaused) {
        applyRunningAnimation(dt);
    }

    frameCount++;

    const strideLen = calculateStrideLength();

    // Update HUD
    document.getElementById('hud-phase').textContent = Math.round((gaitPhase * 180) / Math.PI);
    document.getElementById('hud-freq').textContent = strideFrequency.toFixed(1);
    document.getElementById('hud-lhip').textContent = Math.round((window.__3D_STATE__.leftHipAngle * 180) / Math.PI);
    document.getElementById('hud-rhip').textContent = Math.round((window.__3D_STATE__.rightHipAngle * 180) / Math.PI);
    document.getElementById('hud-stride').textContent = strideLen.toFixed(2);
    document.getElementById('hud-model').textContent = modelLoaded ? 'Yes' : 'No';

    // Update state
    window.__3D_STATE__.gaitPhase = parseFloat(gaitPhase.toFixed(3));
    window.__3D_STATE__.strideFrequency = strideFrequency;
    window.__3D_STATE__.hipAmplitude = hipAmplitude;
    window.__3D_STATE__.kneeAmplitude = kneeAmplitude;
    window.__3D_STATE__.isPaused = isPaused;
    window.__3D_STATE__.modelLoaded = modelLoaded;
    window.__3D_STATE__.frameCount = frameCount;
    window.__3D_STATE__.bonesValid = checkBonesValid();
    window.__3D_STATE__.strideLength = parseFloat(strideLen.toFixed(2));

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
