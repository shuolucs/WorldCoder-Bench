<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fishing Scene</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
  canvas { display: block; }
  #ui {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  #ui button {
    padding: 12px 28px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #castBtn {
    background: linear-gradient(135deg, #00b4d8, #0077b6);
    color: white;
    box-shadow: 0 4px 15px rgba(0, 180, 216, 0.4);
  }
  #castBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 180, 216, 0.6); }
  #castBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #reelBtn {
    background: linear-gradient(135deg, #f77f00, #e63946);
    color: white;
    box-shadow: 0 4px 15px rgba(247, 127, 0, 0.4);
  }
  #reelBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(247, 127, 0, 0.6); }
  #reelBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #stats {
    background: rgba(0, 0, 0, 0.7);
    color: white;
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 200px;
  }
  #stats .label { color: #aaa; }
  #stats .value { color: #00ff88; font-weight: bold; }
  #stats .caught { color: #ffd700; font-size: 22px; }
  #biteAlert {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 50, 50, 0.9);
    color: white;
    padding: 20px 40px;
    border-radius: 15px;
    font-size: 24px;
    font-weight: bold;
    display: none;
    animation: pulse 0.5s infinite alternate;
    z-index: 20;
    pointer-events: none;
  }
  @keyframes pulse {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.1); }
  }
</style>
</head>
<body>
<div id="ui">
  <button id="castBtn">🎣 Cast</button>
  <button id="reelBtn">🔄 Reel In</button>
  <div id="stats">
    <div>🐟 <span class="label">Fish Caught:</span> <span class="caught" id="caughtDisplay">0</span></div>
    <div>📏 <span class="label">Line Length:</span> <span class="value" id="lineDisplay">0.0</span></div>
    <div>🎯 <span class="label">Status:</span> <span class="value" id="statusDisplay">Ready</span></div>
  </div>
</div>
<div id="biteAlert">🐟 FISH ON! REEL IN! 🐟</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// STATE
// ============================================================
const state = {
  fishCount: 5,
  caughtCount: 0,
  lineLength: 2.0,
  bobberPos: { x: 0, y: 0, z: 0 },
  isCasting: false,
  isBiting: false
};
window.__3D_STATE__ = state;

// ============================================================
// SCENE SETUP
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(8, 8, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.05;
controls.minDistance = 5;
controls.maxDistance = 40;
controls.target.set(0, 0, 0);

// ============================================================
// LIGHTING
// ============================================================
const ambientLight = new THREE.AmbientLight(0x6688cc, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e0, 1.8);
sunLight.position.set(15, 20, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 60;
sunLight.shadow.camera.left = -20;
sunLight.shadow.camera.right = 20;
sunLight.shadow.camera.top = 20;
sunLight.shadow.camera.bottom = -20;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x3a6b35, 0.4);
scene.add(hemiLight);

// ============================================================
// WATER SURFACE
// ============================================================
const waterSize = 80;
const waterSegments = 80;
const waterGeometry = new THREE.PlaneGeometry(waterSize, waterSize, waterSegments, waterSegments);
const waterMaterial = new THREE.MeshPhongMaterial({
  color: 0x1a6b8a,
  transparent: true,
  opacity: 0.75,
  shininess: 100,
  specular: 0x88ccff,
  side: THREE.DoubleSide,
  flatShading: false
});
const water = new THREE.Mesh(waterGeometry, waterMaterial);
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
water.receiveShadow = true;
scene.add(water);

// Underwater plane for depth illusion
const underwaterGeo = new THREE.PlaneGeometry(waterSize, waterSize);
const underwaterMat = new THREE.MeshPhongMaterial({ color: 0x0a3040, side: THREE.DoubleSide });
const underwater = new THREE.Mesh(underwaterGeo, underwaterMat);
underwater.rotation.x = -Math.PI / 2;
underwater.position.y = -3;
scene.add(underwater);

function animateWater(time) {
  const positions = waterGeometry.attributes.position;
  for (let i = 0; i < positions.count; i++) {
    const x = positions.getX(i);
    const y = positions.getY(i);
    const z = Math.sin(x * 0.3 + time * 1.2) * 0.15 +
              Math.cos(y * 0.25 + time * 0.8) * 0.12 +
              Math.sin((x + y) * 0.15 + time * 0.5) * 0.08;
    positions.setZ(i, z);
  }
  positions.needsUpdate = true;
  waterGeometry.computeVertexNormals();
}

// ============================================================
// SHORE / GROUND
// ============================================================
const shoreGeo = new THREE.CylinderGeometry(3, 4, 1.5, 16);
const shoreMat = new THREE.MeshPhongMaterial({ color: 0x8B7355 });
const shore = new THREE.Mesh(shoreGeo, shoreMat);
shore.position.set(-6, -0.3, 6);
shore.castShadow = true;
shore.receiveShadow = true;
scene.add(shore);

// Grass on shore
const grassGeo = new THREE.CylinderGeometry(2.8, 3, 0.3, 16);
const grassMat = new THREE.MeshPhongMaterial({ color: 0x4a8c3f });
const grass = new THREE.Mesh(grassGeo, grassMat);
grass.position.set(-6, 0.5, 6);
scene.add(grass);

// ============================================================
// FISHING ROD
// ============================================================
const rodGroup = new THREE.Group();
rodGroup.position.set(-5, 0.8, 5);

// Rod handle
const handleGeo = new THREE.CylinderGeometry(0.08, 0.1, 1.2, 8);
const handleMat = new THREE.MeshPhongMaterial({ color: 0x4a3520 });
const handle = new THREE.Mesh(handleGeo, handleMat);
handle.position.y = 0.6;
handle.castShadow = true;
rodGroup.add(handle);

// Rod main shaft
const shaftGeo = new THREE.CylinderGeometry(0.03, 0.06, 4.5, 8);
const shaftMat = new THREE.MeshPhongMaterial({ color: 0x2a2a2a, shininess: 80 });
const shaft = new THREE.Mesh(shaftGeo, shaftMat);
shaft.position.y = 3.4;
shaft.rotation.z = Math.PI * 0.08;
shaft.castShadow = true;
rodGroup.add(shaft);

// Rod tip (thin part)
const tipGeo = new THREE.CylinderGeometry(0.01, 0.03, 2.0, 8);
const tipMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
const rodTip = new THREE.Mesh(tipGeo, tipMat);
rodTip.position.y = 6.5;
rodTip.rotation.z = Math.PI * 0.12;
rodTip.castShadow = true;
rodGroup.add(rodTip);

// Guide rings on rod
for (let i = 0; i < 4; i++) {
  const ringGeo = new THREE.TorusGeometry(0.05, 0.01, 8, 12);
  const ringMat = new THREE.MeshPhongMaterial({ color: 0xcccccc, shininess: 100 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.y = 2.0 + i * 1.3;
  ring.rotation.x = Math.PI / 2;
  rodGroup.add(ring);
}

scene.add(rodGroup);

// Get rod tip world position
function getRodTipWorldPos() {
  const pos = new THREE.Vector3();
  rodTip.getWorldPosition(pos);
  // Adjust for the tip end
  pos.y += 1.0;
  pos.x += 0.3;
  return pos;
}

// ============================================================
// BOBBER (FLOAT)
// ============================================================
const bobberGroup = new THREE.Group();

// Main bobber body (red/white)
const bobberTopGeo = new THREE.SphereGeometry(0.15, 12, 12);
const bobberTopMat = new THREE.MeshPhongMaterial({ color: 0xff2222 });
const bobberTop = new THREE.Mesh(bobberTopGeo, bobberTopMat);
bobberTop.position.y = 0.15;
bobberTop.castShadow = true;
bobberGroup.add(bobberTop);

const bobberBottomGeo = new THREE.SphereGeometry(0.12, 12, 12);
const bobberBottomMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
const bobberBottom = new THREE.Mesh(bobberBottomGeo, bobberBottomMat);
bobberBottom.position.y = -0.05;
bobberGroup.add(bobberBottom);

// Bobber stick
const bobberStickGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.4, 6);
const bobberStickMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
const bobberStick = new THREE.Mesh(bobberStickGeo, bobberStickMat);
bobberStick.position.y = 0.35;
bobberGroup.add(bobberStick);

bobberGroup.position.set(-4.5, 0.1, 4.5);
scene.add(bobberGroup);

// ============================================================
// FISHING LINE (catenary)
// ============================================================
const linePointCount = 40;
const lineGeometry = new THREE.BufferGeometry();
const linePositions = new Float32Array(linePointCount * 3);
lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xcccccc, linewidth: 1, transparent: true, opacity: 0.8 });
const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
scene.add(fishingLine);

/**
 * Compute catenary curve between two points.
 * Uses a simple parabolic sag approximation for visual effect.
 */
function updateFishingLine() {
  const tipPos = getRodTipWorldPos();
  const bobPos = bobberGroup.position;
  const positions = lineGeometry.attributes.position;

  const dx = bobPos.x - tipPos.x;
  const dy = bobPos.y - tipPos.y;
  const dz = bobPos.z - tipPos.z;
  const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

  // Sag amount depends on line length vs distance
  const slack = Math.max(0, state.lineLength - dist);
  const sagAmount = slack * 0.5 + dist * 0.05;

  for (let i = 0; i < linePointCount; i++) {
    const t = i / (linePointCount - 1);
    const x = tipPos.x + dx * t;
    const z = tipPos.z + dz * t;
    // Catenary-like sag: parabolic curve with max sag at midpoint
    const sag = -sagAmount * 4 * t * (1 - t);
    const y = tipPos.y + dy * t + sag;

    positions.setXYZ(i, x, y, z);
  }
  positions.needsUpdate = true;

  // Update state line length
  state.lineLength = dist + slack * 0.3;
  if (state.lineLength < 0.5) state.lineLength = 0.5;
}

// ============================================================
// FISH
// ============================================================
const fishData = [
  { color: 0xff6633, tailColor: 0xcc4400, size: [0.5, 0.25, 0.15], radius: 5, speed: 0.6, yOffset: -0.8, phase: 0 },
  { color: 0x33aaff, tailColor: 0x2288cc, size: [0.4, 0.2, 0.12], radius: 4, speed: 0.8, yOffset: -1.0, phase: Math.PI * 0.4 },
  { color: 0xffcc00, tailColor: 0xcc9900, size: [0.55, 0.28, 0.16], radius: 6, speed: 0.5, yOffset: -0.6, phase: Math.PI * 0.8 },
  { color: 0x44dd44, tailColor: 0x22aa22, size: [0.35, 0.18, 0.1], radius: 3.5, speed: 0.9, yOffset: -1.2, phase: Math.PI * 1.2 },
  { color: 0xff66cc, tailColor: 0xcc4499, size: [0.45, 0.22, 0.13], radius: 5.5, speed: 0.7, yOffset: -0.9, phase: Math.PI * 1.6 }
];

const fishes = [];

fishData.forEach((fd, idx) => {
  const fishGroup = new THREE.Group();

  // Body (ellipsoid)
  const bodyGeo = new THREE.SphereGeometry(1, 16, 12);
  const bodyMat = new THREE.MeshPhongMaterial({ color: fd.color, shininess: 60 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.scale.set(fd.size[0], fd.size[1], fd.size[2]);
  body.castShadow = true;
  fishGroup.add(body);

  // Belly (lighter underside)
  const bellyGeo = new THREE.SphereGeometry(0.9, 12, 8, 0, Math.PI * 2, Math.PI * 0.5, Math.PI * 0.5);
  const bellyMat = new THREE.MeshPhongMaterial({ color: 0xffeedd });
  const belly = new THREE.Mesh(bellyGeo, bellyMat);
  belly.scale.set(fd.size[0], fd.size[1] * 0.8, fd.size[2]);
  fishGroup.add(belly);

  // Tail fin
  const tailGeo = new THREE.ConeGeometry(0.15, 0.3, 4);
  const tailMat = new THREE.MeshPhongMaterial({ color: fd.tailColor });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.x = -fd.size[0] * 0.9;
  tail.rotation.z = Math.PI / 2;
  tail.scale.set(1, 1, 0.4);
  fishGroup.add(tail);

  // Dorsal fin
  const dorsalGeo = new THREE.ConeGeometry(0.08, 0.2, 4);
  const dorsalMat = new THREE.MeshPhongMaterial({ color: fd.tailColor });
  const dorsal = new THREE.Mesh(dorsalGeo, dorsalMat);
  dorsal.position.y = fd.size[1] * 0.8;
  dorsal.position.x = -fd.size[0] * 0.1;
  fishGroup.add(dorsal);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.03, 8, 8);
  const eyeMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
  [-1, 1].forEach(side => {
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(fd.size[0] * 0.7, fd.size[1] * 0.3, side * fd.size[2] * 0.9);
    fishGroup.add(eye);
  });

  fishGroup.position.set(
    Math.cos(fd.phase) * fd.radius,
    fd.yOffset,
    Math.sin(fd.phase) * fd.radius
  );

  scene.add(fishGroup);
  fishes.push({
    group: fishGroup,
    tail: tail,
    data: fd,
    caught: false,
    angle: fd.phase
  });
});

function animateFish(time) {
  fishes.forEach((fish, idx) => {
    if (fish.caught) {
      fish.group.visible = false;
      return;
    }
    fish.group.visible = true;

    const fd = fish.data;
    fish.angle += fd.speed * 0.008;

    // Circular path with some wobble
    const wobbleX = Math.sin(time * 1.5 + idx * 2) * 0.5;
    const wobbleZ = Math.cos(time * 1.2 + idx * 3) * 0.5;

    const x = Math.cos(fish.angle) * fd.radius + wobbleX;
    const z = Math.sin(fish.angle) * fd.radius + wobbleZ;
    const y = fd.yOffset + Math.sin(time * 2 + idx) * 0.15;

    fish.group.position.set(x, y, z);

    // Face direction of movement
    const nextX = Math.cos(fish.angle + 0.05) * fd.radius;
    const nextZ = Math.sin(fish.angle + 0.05) * fd.radius;
    fish.group.lookAt(nextX, y, nextZ);

    // Tail wiggle
    fish.tail.rotation.y = Math.sin(time * 8 + idx * 2) * 0.4;
  });
}

// ============================================================
// DECORATIONS
// ============================================================
// Some reeds/cattails on shore
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const rx = -6 + Math.cos(angle) * 2.5;
  const rz = 6 + Math.sin(angle) * 2.5;

  const reedGeo = new THREE.CylinderGeometry(0.02, 0.03, 2 + Math.random(), 6);
  const reedMat = new THREE.MeshPhongMaterial({ color: 0x5a7a3a });
  const reed = new THREE.Mesh(reedGeo, reedMat);
  reed.position.set(rx, 1.5, rz);
  reed.rotation.z = (Math.random() - 0.5) * 0.15;
  scene.add(reed);
}

// Sky dome hint (large sphere)
const skyGeo = new THREE.SphereGeometry(100, 32, 16);
const skyMat = new THREE.MeshBasicMaterial({
  color: 0x87ceeb,
  side: THREE.BackSide
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// Sun
const sunGeo = new THREE.SphereGeometry(2, 16, 16);
const sunMat = new THREE.MeshBasicMaterial({ color: 0xffee88 });
const sun = new THREE.Mesh(sunGeo, sunMat);
sun.position.set(30, 40, 20);
scene.add(sun);

// Clouds
for (let i = 0; i < 5; i++) {
  const cloudGroup = new THREE.Group();
  for (let j = 0; j < 4; j++) {
    const cGeo = new THREE.SphereGeometry(1.5 + Math.random() * 1.5, 8, 8);
    const cMat = new THREE.MeshPhongMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
    const c = new THREE.Mesh(cGeo, cMat);
    c.position.set(j * 2 - 3, Math.random() * 0.5, Math.random() * 1);
    c.scale.y = 0.5;
    cloudGroup.add(c);
  }
  cloudGroup.position.set(-30 + i * 15, 25 + Math.random() * 5, -20 + Math.random() * 10);
  scene.add(cloudGroup);
}

// ============================================================
// SPLASH PARTICLES
// ============================================================
const splashParticles = [];

function createSplash(pos) {
  for (let i = 0; i < 12; i++) {
    const geo = new THREE.SphereGeometry(0.05, 6, 6);
    const mat = new THREE.MeshPhongMaterial({ color: 0x88ccff, transparent: true, opacity: 0.8 });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 3,
      Math.random() * 3 + 1,
      (Math.random() - 0.5) * 3
    );
    scene.add(p);
    splashParticles.push({ mesh: p, vel, life: 1.0 });
  }
}

function updateSplash(dt) {
  for (let i = splashParticles.length - 1; i >= 0; i--) {
    const sp = splashParticles[i];
    sp.vel.y -= 9.8 * dt;
    sp.mesh.position.addScaledVector(sp.vel, dt);
    sp.life -= dt * 2;
    sp.mesh.material.opacity = sp.life * 0.8;
    if (sp.life <= 0) {
      scene.remove(sp.mesh);
      sp.mesh.geometry.dispose();
      sp.mesh.material.dispose();
      splashParticles.splice(i, 1);
    }
  }
}

// ============================================================
// RIPPLE RINGS
// ============================================================
const ripples = [];

function createRipple(pos) {
  const geo = new THREE.RingGeometry(0.1, 0.15, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0xaaddff, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(geo, mat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(pos.x, 0.05, pos.z);
  scene.add(ring);
  ripples.push({ mesh: ring, life: 1.0 });
}

function updateRipples(dt) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.life -= dt * 0.8;
    const scale = 1 + (1 - r.life) * 5;
    r.mesh.scale.set(scale, scale, scale);
    r.mesh.material.opacity = r.life * 0.5;
    if (r.life <= 0) {
      scene.remove(r.mesh);
      r.mesh.geometry.dispose();
      r.mesh.material.dispose();
      ripples.splice(i, 1);
    }
  }
}

// ============================================================
// GAME LOGIC
// ============================================================
let castState = 'idle'; // 'idle', 'casting', 'cast', 'reeling'
let castProgress = 0;
let bobberTarget = new THREE.Vector3(0, 0.1, 0);
let bobberStart = new THREE.Vector3(-4.5, 0.1, 4.5);
let currentLineLength = 2.0;
let maxLineLength = 12.0;
let biteTimer = 0;
let biteCheckInterval = 3 + Math.random() * 4;
let bobberBobTime = 0;

// Bobber initial position near rod
function resetBobber() {
  bobberGroup.position.set(-4.5, 0.1, 4.5);
  currentLineLength = 2.0;
  state.lineLength = 2.0;
}

resetBobber();

// Cast button
document.getElementById('castBtn').addEventListener('click', () => {
  if (castState !== 'idle') return;

  castState = 'casting';
  state.isCasting = true;
  castProgress = 0;

  // Random target in water
  const angle = Math.random() * Math.PI * 1.5 - Math.PI * 0.5;
  const dist = 5 + Math.random() * 6;
  bobberTarget.set(
    Math.cos(angle) * dist,
    0.1,
    Math.sin(angle) * dist
  );
  bobberStart.copy(bobberGroup.position);
  maxLineLength = bobberTarget.distanceTo(getRodTipWorldPos()) + 1;

  document.getElementById('castBtn').disabled = true;
});

// Reel button
document.getElementById('reelBtn').addEventListener('click', () => {
  if (castState === 'idle' || castState === 'casting') return;

  if (state.isBiting) {
    // Caught a fish!
    state.caughtCount++;
    state.isBiting = false;

    // Mark a random uncaught fish as caught
    const uncaught = fishes.filter(f => !f.caught);
    if (uncaught.length > 0) {
      const chosen = uncaught[Math.floor(Math.random() * uncaught.length)];
      chosen.caught = true;
    }

    createSplash(bobberGroup.position.clone());
    document.getElementById('biteAlert').style.display = 'none';
  }

  castState = 'reeling';
  state.isCasting = false;
});

// ============================================================
// BITE LOGIC
// ============================================================
/*
  Bite rules:
  - Only triggers when castState === 'cast' (bobber is in water, not reeling)
  - Random timer between 3-7 seconds after cast
  - When bite triggers, isBiting = true, alert shown
  - If player reels while isBiting, caughtCount++ and a fish is removed
  - If player doesn't reel within 4 seconds, bite is lost
  - Bite resets after catch or timeout
*/
let biteTimeout = 0;
const BITE_DURATION = 4.0; // seconds before fish escapes

function checkBite(dt) {
  if (castState !== 'cast') {
    biteTimer = 0;
    return;
  }

  if (state.isBiting) {
    biteTimeout += dt;
    if (biteTimeout >= BITE_DURATION) {
      // Fish escaped
      state.isBiting = false;
      biteTimeout = 0;
      biteTimer = 0;
      biteCheckInterval = 2 + Math.random() * 3;
      document.getElementById('biteAlert').style.display = 'none';
    }
    return;
  }

  biteTimer += dt;
  if (biteTimer >= biteCheckInterval) {
    const uncaught = fishes.filter(f => !f.caught);
    if (uncaught.length > 0) {
      // Check if any fish is near the bobber
      const bobPos = bobberGroup.position;
      let nearFish = false;
      for (const f of uncaught) {
        const dist = f.group.position.distanceTo(bobPos);
        if (dist < 4) { nearFish = true; break; }
      }

      // 60% chance if fish nearby, 30% otherwise
      const chance = nearFish ? 0.6 : 0.3;
      if (Math.random() < chance) {
        state.isBiting = true;
        biteTimeout = 0;
        document.getElementById('biteAlert').style.display = 'block';
        createRipple(bobPos);
        createSplash(bobPos.clone());
      }
    }
    biteTimer = 0;
    biteCheckInterval = 2 + Math.random() * 3;
  }
}

// ============================================================
// ICG TEST HELPER
// ============================================================
window.__ICG_setBiting__ = function(v) {
  state.isBiting = !!v;
  if (v) {
    biteTimeout = 0;
    document.getElementById('biteAlert').style.display = 'block';
    if (castState === 'idle') {
      // Force cast state so reeling works
      castState = 'cast';
      state.isCasting = false;
    }
  } else {
    document.getElementById('biteAlert').style.display = 'none';
    biteTimeout = 0;
  }
};

// ============================================================
// UPDATE UI
// ============================================================
function updateUI() {
  document.getElementById('caughtDisplay').textContent = state.caughtCount;
  document.getElementById('lineDisplay').textContent = state.lineLength.toFixed(1);

  let statusText = 'Ready';
  if (castState === 'casting') statusText = 'Casting...';
  else if (castState === 'cast' && state.isBiting) statusText = '🐟 BITE!';
  else if (castState === 'cast') statusText = 'Waiting...';
  else if (castState === 'reeling') statusText = 'Reeling in...';
  document.getElementById('statusDisplay').textContent = statusText;

  // Button states
  document.getElementById('castBtn').disabled = castState !== 'idle';
  document.getElementById('reelBtn').disabled = (castState === 'idle' || castState === 'casting');

  // Update state bobber pos
  state.bobberPos.x = bobberGroup.position.x;
  state.bobberPos.y = bobberGroup.position.y;
  state.bobberPos.z = bobberGroup.position.z;
}

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();
let lastRippleTime = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);
  const time = clock.getElapsedTime();

  // Water animation
  animateWater(time);

  // Fish animation
  animateFish(time);

  // Cast animation
  if (castState === 'casting') {
    castProgress += dt * 1.5;
    if (castProgress >= 1) {
      castProgress = 1;
      castState = 'cast';
      state.isCasting = false;
      currentLineLength = maxLineLength;
      createSplash(bobberGroup.position.clone());
      createRipple(bobberGroup.position);
      biteTimer = 0;
      biteCheckInterval = 2 + Math.random() * 3;
    }

    // Arc trajectory for casting
    const t = castProgress;
    const arcHeight = 4 * t * (1 - t) * 5;
    bobberGroup.position.lerpVectors(bobberStart, bobberTarget, t);
    bobberGroup.position.y = 0.1 + arcHeight;
  }

  // Cast state - bobber bobs on water
  if (castState === 'cast') {
    bobberBobTime += dt;
    let bobY = 0.1 + Math.sin(bobberBobTime * 2) * 0.05;

    // If biting, more aggressive bobbing
    if (state.isBiting) {
      bobY += Math.sin(time * 12) * 0.15 - 0.1;
    }

    bobberGroup.position.y = bobY;

    // Periodic ripples
    if (time - lastRippleTime > 2) {
      createRipple(bobberGroup.position);
      lastRippleTime = time;
    }
  }

  // Reeling animation
  if (castState === 'reeling') {
    const tipPos = getRodTipWorldPos();
    const dir = new THREE.Vector3().subVectors(tipPos, bobberGroup.position);
    const dist = dir.length();

    if (dist < 1.5) {
      castState = 'idle';
      resetBobber();
    } else {
      dir.normalize();
      const reelSpeed = 5;
      bobberGroup.position.addScaledVector(dir, reelSpeed * dt);
      bobberGroup.position.y = Math.max(0.05, bobberGroup.position.y - dt * 0.5);
      currentLineLength = Math.max(1, currentLineLength - reelSpeed * dt);
    }
  }

  // Bite check
  checkBite(dt);

  // Update fishing line
  state.lineLength = currentLineLength;
  updateFishingLine();

  // Update particles
  updateSplash(dt);
  updateRipples(dt);

  // Update UI
  updateUI();

  // Controls
  controls.update();

  renderer.render(scene, camera);
}

animate();

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
