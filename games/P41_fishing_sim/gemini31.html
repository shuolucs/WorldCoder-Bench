<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fishing Scene</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: auto;
            z-index: 10;
        }
        button {
            padding: 8px 16px;
            margin-right: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            background-color: #4CAF50;
            color: white;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #score-display {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        #status-display {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="score-display">Caught: <span id="caughtCount">0</span></div>
        <div id="status-display">Status: IDLE</div>
        <button id="castBtn">Cast</button>
        <button id="reelBtn">Reel</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            fishCount: 5,
            caughtCount: 0,
            lineLength: 0,
            bobberPos: { x: 0, y: 0, z: 0 },
            isCasting: false,
            isBiting: false
        };

        let gameState = 'IDLE'; // IDLE, CASTING, WAITING, REELING
        let castProgress = 0;
        let castStartPos = new THREE.Vector3();
        let castTargetPos = new THREE.Vector3();
        let biteTimer = 0;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Prevent going below water
        controls.minDistance = 5;
        controls.maxDistance = 40;
        controls.target.set(0, 0, -5);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- Water ---
        const waterGeo = new THREE.PlaneGeometry(100, 100, 64, 64);
        waterGeo.rotateX(-Math.PI / 2);
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x1ca3ec,
            transparent: true,
            opacity: 0.7,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        scene.add(water);

        // --- Fishes ---
        const fishes = [];
        const fishColors = [0xff9900, 0xff3333, 0x33cc33, 0xcc33cc, 0xffff33];
        const fishGroup = new THREE.Group();
        scene.add(fishGroup);

        for (let i = 0; i < 5; i++) {
            const fishGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const fishMat = new THREE.MeshStandardMaterial({ color: fishColors[i] });
            const fishMesh = new THREE.Mesh(fishGeo, fishMat);
            fishMesh.scale.set(1, 0.5, 0.2); // Ellipsoid shape
            
            fishGroup.add(fishMesh);
            fishes.push({
                mesh: fishMesh,
                angle: Math.random() * Math.PI * 2,
                radius: 3 + Math.random() * 12,
                speed: 0.2 + Math.random() * 0.5,
                depth: -0.5 - Math.random() * 2,
                bobOffset: Math.random() * Math.PI * 2
            });
        }

        // --- Fishing Rod ---
        const rodGroup = new THREE.Group();
        rodGroup.position.set(0, 0, 8);
        scene.add(rodGroup);

        const rodGeo = new THREE.CylinderGeometry(0.02, 0.08, 8, 8);
        rodGeo.translate(0, 4, 0); // Pivot at base
        const rodMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const rod = new THREE.Mesh(rodGeo, rodMat);
        rod.rotation.x = -Math.PI / 3; // Point forward and up
        rodGroup.add(rod);

        const rodTip = new THREE.Object3D();
        rodTip.position.set(0, 8, 0);
        rod.add(rodTip);

        // --- Bobber ---
        const bobberGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const bobberMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const bobber = new THREE.Mesh(bobberGeo, bobberMat);
        scene.add(bobber);

        // --- Fishing Line ---
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
        const lineGeo = new THREE.BufferGeometry();
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // --- UI Logic ---
        const castBtn = document.getElementById('castBtn');
        const reelBtn = document.getElementById('reelBtn');
        const caughtCountSpan = document.getElementById('caughtCount');
        const statusDisplay = document.getElementById('status-display');

        function updateUI() {
            caughtCountSpan.innerText = window.__3D_STATE__.caughtCount;
            statusDisplay.innerText = `Status: ${gameState}${window.__3D_STATE__.isBiting ? ' (BITING!)' : ''}`;
            
            castBtn.disabled = gameState !== 'IDLE';
            reelBtn.disabled = gameState === 'IDLE' || gameState === 'CASTING';
        }

        castBtn.addEventListener('click', () => {
            if (gameState === 'IDLE') {
                gameState = 'CASTING';
                window.__3D_STATE__.isCasting = true;
                window.__3D_STATE__.isBiting = false;
                castProgress = 0;
                
                rodTip.getWorldPosition(castStartPos);
                // Random target on water
                const angle = (Math.random() - 0.5) * Math.PI / 2;
                const distance = 10 + Math.random() * 15;
                castTargetPos.set(
                    Math.sin(angle) * distance,
                    0,
                    rodGroup.position.z - Math.cos(angle) * distance
                );
                updateUI();
            }
        });

        reelBtn.addEventListener('click', () => {
            if (gameState === 'WAITING' || gameState === 'REELING') {
                if (window.__3D_STATE__.isBiting) {
                    window.__3D_STATE__.caughtCount++;
                    window.__3D_STATE__.isBiting = false;
                }
                gameState = 'REELING';
                window.__3D_STATE__.isCasting = false;
                updateUI();
            }
        });

        // --- ICG Helper ---
        window.__ICG_setBiting__ = function(v) {
            window.__3D_STATE__.isBiting = !!v;
            if (v && gameState !== 'WAITING' && gameState !== 'REELING') {
                // Force bobber to water if forced to bite while idle
                gameState = 'WAITING';
                rodTip.getWorldPosition(castStartPos);
                bobber.position.set(castStartPos.x, 0, castStartPos.z - 10);
            }
            updateUI();
        };

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const tipWorldPos = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // 1. Water Animation
            const positions = waterGeo.attributes.position;
            for (let i = 0; i < positions.count; i++) {
                const x = positions.getX(i);
                const y = positions.getY(i);
                // Local Z is world Y due to rotation
                const z = Math.sin(x * 0.5 + time) * 0.1 + Math.cos(y * 0.5 + time) * 0.1;
                positions.setZ(i, z);
            }
            positions.needsUpdate = true;

            // 2. Fish Animation
            fishes.forEach(f => {
                f.angle += f.speed * delta;
                const px = Math.cos(f.angle) * f.radius;
                const pz = Math.sin(f.angle) * f.radius - 5; // Offset center
                const py = f.depth + Math.sin(time * 2 + f.bobOffset) * 0.2;
                
                f.mesh.position.set(px, py, pz);
                
                // Look forward along the circle
                const tx = px - Math.sin(f.angle);
                const tz = pz + Math.cos(f.angle);
                f.mesh.lookAt(tx, py, tz);
            });

            // 3. Bobber & State Logic
            rodTip.getWorldPosition(tipWorldPos);

            if (gameState === 'IDLE') {
                // Hang below rod tip
                bobber.position.copy(tipWorldPos);
                bobber.position.y -= 1;
                window.__3D_STATE__.isCasting = false;
            } 
            else if (gameState === 'CASTING') {
                castProgress += delta * 1.5;
                if (castProgress >= 1) {
                    castProgress = 1;
                    gameState = 'WAITING';
                    window.__3D_STATE__.isCasting = false;
                    biteTimer = time + 2 + Math.random() * 4; // Next bite in 2-6s
                    updateUI();
                }
                // Parabolic arc
                bobber.position.lerpVectors(castStartPos, castTargetPos, castProgress);
                bobber.position.y += Math.sin(castProgress * Math.PI) * 4;
            } 
            else if (gameState === 'WAITING') {
                // Float on water
                bobber.position.y = Math.sin(time * 3) * 0.05;
                
                // Random bite logic
                if (!window.__3D_STATE__.isBiting && time > biteTimer) {
                    window.__3D_STATE__.isBiting = true;
                    updateUI();
                }

                if (window.__3D_STATE__.isBiting) {
                    // Violent bobbing
                    bobber.position.y = -0.1 + Math.sin(time * 25) * 0.15;
                    // Auto escape after some time
                    if (time > biteTimer + 3) {
                        window.__3D_STATE__.isBiting = false;
                        biteTimer = time + 3 + Math.random() * 5;
                        updateUI();
                    }
                }
            } 
            else if (gameState === 'REELING') {
                // Move towards rod base
                const reelTarget = new THREE.Vector3(rodGroup.position.x, 0, rodGroup.position.z);
                const dist = bobber.position.distanceTo(reelTarget);
                
                if (dist < 1) {
                    gameState = 'IDLE';
                    updateUI();
                } else {
                    const dir = new THREE.Vector3().subVectors(reelTarget, bobber.position).normalize();
                    bobber.position.add(dir.multiplyScalar(delta * 10));
                    bobber.position.y = 0; // Skim water
                }
            }

            // 4. Fishing Line Update (Catenary approximation using Bezier)
            const midPoint = new THREE.Vector3().addVectors(tipWorldPos, bobber.position).multiplyScalar(0.5);
            
            // Add slack based on state
            let slack = 0;
            if (gameState === 'WAITING') slack = tipWorldPos.distanceTo(bobber.position) * 0.2;
            else if (gameState === 'IDLE') slack = 0;
            else if (gameState === 'CASTING') slack = Math.sin(castProgress * Math.PI) * 2;
            
            midPoint.y -= slack;

            const curve = new THREE.QuadraticBezierCurve3(tipWorldPos, midPoint, bobber.position);
            const points = curve.getPoints(20);
            lineGeo.setFromPoints(points);

            // Calculate approximate line length
            let length = 0;
            for(let i=0; i<points.length-1; i++) {
                length += points[i].distanceTo(points[i+1]);
            }

            // 5. Update Global State
            window.__3D_STATE__.lineLength = length;
            window.__3D_STATE__.bobberPos = { x: bobber.position.x, y: bobber.position.y, z: bobber.position.z };

            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateUI();
        animate();
    </script>
</body>
</html>
