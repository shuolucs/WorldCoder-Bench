<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 光学棱镜折射与色散模拟</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
    }

    #ui h3 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      margin: 10px 0;
    }

    .row label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .row input[type="range"] {
      width: 100%;
    }

    .row input[type="checkbox"] {
      transform: scale(1.1);
    }

    #readout {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #d6e6ff;
      white-space: pre-line;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #a9b9d8;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <h3>光学棱镜折射与色散</h3>

    <div class="row">
      <label>
        <span>棱镜旋转 prismAngle</span>
        <span id="prismAngleValue">0°</span>
      </label>
      <input id="prismAngle" type="range" min="0" max="60" step="1" value="0" />
    </div>

    <div class="row">
      <label>
        <span>折射率基数 refractiveIndex</span>
        <span id="refractiveIndexValue">1.52</span>
      </label>
      <input id="refractiveIndex" type="range" min="1.3" max="1.8" step="0.01" value="1.52" />
    </div>

    <div class="row">
      <label>
        <span>入射角 lightAngle</span>
        <span id="lightAngleValue">45°</span>
      </label>
      <input id="lightAngle" type="range" min="20" max="70" step="1" value="45" />
    </div>

    <div class="row">
      <label>
        <span>显示法线 showNormals</span>
        <input id="showNormals" type="checkbox" />
      </label>
    </div>

    <div id="readout"></div>
    <div class="hint">拖动鼠标可旋转视角。白光自左向右入射，右侧屏幕显示色散结果。</div>
  </div>

  <canvas id="app"></canvas>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvas = document.getElementById('app');
    const prismAngleInput = document.getElementById('prismAngle');
    const refractiveIndexInput = document.getElementById('refractiveIndex');
    const lightAngleInput = document.getElementById('lightAngle');
    const showNormalsInput = document.getElementById('showNormals');

    const prismAngleValue = document.getElementById('prismAngleValue');
    const refractiveIndexValue = document.getElementById('refractiveIndexValue');
    const lightAngleValue = document.getElementById('lightAngleValue');
    const readout = document.getElementById('readout');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, -8, 6);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0.6);

    scene.add(new THREE.AmbientLight(0xffffff, 1.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
    dirLight.position.set(5, -6, 8);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(30, 30, 0x2a3555, 0x16203c);
    grid.rotation.x = Math.PI / 2;
    grid.position.z = -1.2;
    scene.add(grid);

    const axes = new THREE.AxesHelper(2);
    scene.add(axes);

    const prismGroup = new THREE.Group();
    scene.add(prismGroup);

    const apexDeg = 60;
    const apexRad = THREE.MathUtils.degToRad(apexDeg);
    const sideLen = 4.0;
    const triH = sideLen * Math.cos(apexRad / 2); // 顶点到底边中点的距离
    const halfBase = sideLen * Math.sin(apexRad / 2);

    const A = new THREE.Vector2(-triH / 2, 0);
    const B = new THREE.Vector2(triH / 2, -halfBase);
    const C = new THREE.Vector2(triH / 2, halfBase);

    const prismShape = new THREE.Shape();
    prismShape.moveTo(A.x, A.y);
    prismShape.lineTo(B.x, B.y);
    prismShape.lineTo(C.x, C.y);
    prismShape.closePath();

    const prismGeometry = new THREE.ExtrudeGeometry(prismShape, {
      depth: 2,
      bevelEnabled: false
    });
    prismGeometry.translate(0, 0, -1);

    const prismMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xcfe8ff,
      transmission: 0.9,
      roughness: 0,
      ior: 1.5,
      transparent: true,
      opacity: 0.3,
      metalness: 0,
      thickness: 2,
      side: THREE.DoubleSide
    });

    const prismMesh = new THREE.Mesh(prismGeometry, prismMaterial);
    prismGroup.add(prismMesh);

    const prismEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(prismGeometry),
      new THREE.LineBasicMaterial({ color: 0x9fd3ff, transparent: true, opacity: 0.6 })
    );
    prismGroup.add(prismEdges);

    const screen = new THREE.Mesh(
      new THREE.PlaneGeometry(0.2, 8),
      new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
    );
    screen.position.set(8, 0, 0);
    scene.add(screen);

    const rayGroup = new THREE.Group();
    scene.add(rayGroup);

    const normalGroup = new THREE.Group();
    scene.add(normalGroup);

    const colors = [
      { name: 'Red',    n: 1.510, color: '#FF0000' },
      { name: 'Orange', n: 1.512, color: '#FF7F00' },
      { name: 'Yellow', n: 1.514, color: '#FFFF00' },
      { name: 'Green',  n: 1.517, color: '#00FF00' },
      { name: 'Blue',   n: 1.521, color: '#0000FF' },
      { name: 'Indigo', n: 1.524, color: '#4B0082' },
      { name: 'Violet', n: 1.528, color: '#8B00FF' }
    ];

    const baseReference = 1.52;

    function clearGroup(group) {
      while (group.children.length) {
        const obj = group.children.pop();
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      }
    }

    function cross2(a, b) {
      return a.x * b.y - a.y * b.x;
    }

    function rotateVec2(v, angle) {
      const c = Math.cos(angle);
      const s = Math.sin(angle);
      return new THREE.Vector2(
        v.x * c - v.y * s,
        v.x * s + v.y * c
      );
    }

    function lineRayIntersection2D(rayOrigin, rayDir, p1, p2) {
      const v1 = p1.clone().sub(rayOrigin);
      const e = p2.clone().sub(p1);
      const denom = cross2(rayDir, e);
      if (Math.abs(denom) < 1e-8) return null;

      const t = cross2(v1, e) / denom;
      const u = cross2(v1, rayDir) / denom;

      if (t >= 1e-6 && u >= -1e-6 && u <= 1 + 1e-6) {
        return {
          t,
          u,
          point: rayOrigin.clone().add(rayDir.clone().multiplyScalar(t))
        };
      }
      return null;
    }

    function polygonArea(points) {
      let sum = 0;
      for (let i = 0; i < points.length; i++) {
        const p = points[i];
        const q = points[(i + 1) % points.length];
        sum += p.x * q.y - q.x * p.y;
      }
      return 0.5 * sum;
    }

    function outwardNormalForEdge(p1, p2, ccw = true) {
      const e = p2.clone().sub(p1);
      let n = ccw
        ? new THREE.Vector2(e.y, -e.x)
        : new THREE.Vector2(-e.y, e.x);
      return n.normalize();
    }

    function refract2D(I, N, n1, n2) {
      const i = I.clone().normalize();
      const n = N.clone().normalize();

      const cosi = THREE.MathUtils.clamp(-i.dot(n), -1, 1);
      const eta = n1 / n2;
      const k = 1 - eta * eta * (1 - cosi * cosi);

      if (k < 0) {
        return { tir: true, dir: null, theta1: Math.acos(cosi), theta2: NaN };
      }

      const t = i.clone().multiplyScalar(eta).add(
        n.clone().multiplyScalar(eta * cosi - Math.sqrt(k))
      ).normalize();

      const theta1 = Math.acos(THREE.MathUtils.clamp(cosi, -1, 1));
      const cosTheta2 = THREE.MathUtils.clamp(-t.dot(n), -1, 1);
      const theta2 = Math.acos(cosTheta2);

      return { tir: false, dir: t, theta1, theta2 };
    }

    function addLine(points3, color, dashed = false) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points3);
      let line;
      if (dashed) {
        line = new THREE.Line(
          geometry,
          new THREE.LineDashedMaterial({
            color,
            dashSize: 0.18,
            gapSize: 0.1,
            transparent: true,
            opacity: 0.95
          })
        );
        line.computeLineDistances();
      } else {
        line = new THREE.Line(
          geometry,
          new THREE.LineBasicMaterial({ color })
        );
      }
      rayGroup.add(line);
      return line;
    }

    function addCylinderRay(start, end, color = 0xffffff, radius = 0.02) {
      const dir = end.clone().sub(start);
      const len = dir.length();
      const geometry = new THREE.CylinderGeometry(radius, radius, len, 10);
      const material = new THREE.MeshBasicMaterial({ color });
      const mesh = new THREE.Mesh(geometry, material);
      const mid = start.clone().add(end).multiplyScalar(0.5);
      mesh.position.copy(mid);

      const up = new THREE.Vector3(0, 1, 0);
      const q = new THREE.Quaternion().setFromUnitVectors(up, dir.clone().normalize());
      mesh.quaternion.copy(q);

      rayGroup.add(mesh);
      return mesh;
    }

    function addNormalArrow(origin2, normal2, length = 0.8, color = 0xffff00) {
      const origin = new THREE.Vector3(origin2.x, origin2.y, 0);
      const dir = new THREE.Vector3(normal2.x, normal2.y, 0).normalize();
      const arrow = new THREE.ArrowHelper(dir, origin, length, color, 0.18, 0.1);
      normalGroup.add(arrow);
    }

    function updateScene() {
      clearGroup(rayGroup);
      clearGroup(normalGroup);

      const prismAngleDeg = parseFloat(prismAngleInput.value);
      const refractiveIndexBase = parseFloat(refractiveIndexInput.value);
      const lightAngleDeg = parseFloat(lightAngleInput.value);
      const showNormals = showNormalsInput.checked;

      prismAngleValue.textContent = `${prismAngleDeg}°`;
      refractiveIndexValue.textContent = refractiveIndexBase.toFixed(2);
      lightAngleValue.textContent = `${lightAngleDeg}°`;

      prismGroup.rotation.z = THREE.MathUtils.degToRad(prismAngleDeg);

      const rot = THREE.MathUtils.degToRad(prismAngleDeg);
      const pts = [A, B, C].map(p => rotateVec2(p, rot));
      const ccw = polygonArea(pts) > 0;

      const edges = [
        { name: 'AB', p1: pts[0], p2: pts[1] },
        { name: 'BC', p1: pts[1], p2: pts[2] },
        { name: 'CA', p1: pts[2], p2: pts[0] }
      ];

      for (const edge of edges) {
        edge.normal = outwardNormalForEdge(edge.p1, edge.p2, ccw);
        edge.mid = edge.p1.clone().add(edge.p2).multiplyScalar(0.5);
      }

      let entryEdge = edges[0];
      for (const e of edges) {
        if (e.mid.x < entryEdge.mid.x) entryEdge = e;
      }

      let candidateExitEdges = edges.filter(e => e !== entryEdge);
      candidateExitEdges.sort((a, b) => a.mid.x - b.mid.x);
      let preferredExitEdge = candidateExitEdges[candidateExitEdges.length - 1];

      const N_entry_out = entryEdge.normal.clone();
      const N_entry_into_prism = N_entry_out.clone().multiplyScalar(-1);

      const alpha = THREE.MathUtils.degToRad(lightAngleDeg);
      const incomingDir2 = rotateVec2(N_entry_into_prism, alpha).normalize();

      const rayStart2 = new THREE.Vector2(-10, 0);
      const entryHit = lineRayIntersection2D(rayStart2, incomingDir2, entryEdge.p1, entryEdge.p2);

      const outputAngles = new Array(7).fill(NaN);
      let greenDeviation = NaN;

      if (!entryHit) {
        addLine([
          new THREE.Vector3(rayStart2.x, rayStart2.y, 0),
          new THREE.Vector3(rayStart2.x + incomingDir2.x * 18, rayStart2.y + incomingDir2.y * 18, 0)
        ], 0xffffff);

        window.__3D_STATE__ = {
          prismAngle: prismAngleDeg,
          refractiveIndex: refractiveIndexBase,
          lightAngle: lightAngleDeg,
          showNormals,
          outputAngles,
          totalDeviation: greenDeviation
        };

        readout.textContent = `当前光线未击中棱镜。`;
        return;
      }

      addCylinderRay(
        new THREE.Vector3(rayStart2.x, rayStart2.y, 0),
        new THREE.Vector3(entryHit.point.x, entryHit.point.y, 0),
        0xffffff,
        0.02
      );

      if (showNormals) {
        addNormalArrow(entryHit.point, entryEdge.normal, 0.9, 0xffff00);
      }

      const readLines = [];

      colors.forEach((item, idx) => {
        const scaledN = 1 + (item.n - 1) * ((refractiveIndexBase - 1) / (baseReference - 1));

        const firstRefraction = refract2D(incomingDir2, entryEdge.normal, 1.0, scaledN);

        if (firstRefraction.tir) {
          outputAngles[idx] = NaN;
          readLines.push(`${item.name}: 第一界面全反射`);
          return;
        }

        const insideDir2 = firstRefraction.dir.clone().normalize();

        let secondHit = null;
        let actualExitEdge = null;

        for (const e of edges) {
          if (e === entryEdge) continue;
          const hit = lineRayIntersection2D(
            entryHit.point.clone().add(insideDir2.clone().multiplyScalar(1e-4)),
            insideDir2,
            e.p1,
            e.p2
          );
          if (hit) {
            if (!secondHit || hit.t < secondHit.t) {
              secondHit = hit;
              actualExitEdge = e;
            }
          }
        }

        if (!secondHit) {
          outputAngles[idx] = NaN;
          readLines.push(`${item.name}: 未找到出射面`);
          return;
        }

        if (!actualExitEdge) actualExitEdge = preferredExitEdge;

        if (showNormals) {
          addNormalArrow(secondHit.point, actualExitEdge.normal, 0.9, 0xffff00);
        }

        const secondRefraction = refract2D(insideDir2, actualExitEdge.normal, scaledN, 1.0);

        addLine([
          new THREE.Vector3(entryHit.point.x, entryHit.point.y, 0),
          new THREE.Vector3(secondHit.point.x, secondHit.point.y, 0)
        ], item.color);

        if (secondRefraction.tir) {
          const reflectDir = insideDir2.clone().sub(
            actualExitEdge.normal.clone().multiplyScalar(2 * insideDir2.dot(actualExitEdge.normal))
          ).normalize();

          addLine([
            new THREE.Vector3(secondHit.point.x, secondHit.point.y, 0),
            new THREE.Vector3(
              secondHit.point.x + reflectDir.x * 4,
              secondHit.point.y + reflectDir.y * 4,
              0
            )
          ], item.color, true);

          outputAngles[idx] = NaN;
          readLines.push(`${item.name}: 第二界面全反射`);
          return;
        }

        const outDir2 = secondRefraction.dir.clone().normalize();

        const exitEnd = secondHit.point.clone().add(outDir2.clone().multiplyScalar(14));
        addLine([
          new THREE.Vector3(secondHit.point.x, secondHit.point.y, 0),
          new THREE.Vector3(exitEnd.x, exitEnd.y, 0)
        ], item.color);

        const i1 = firstRefraction.theta1;
        const r1 = firstRefraction.theta2;
        const i2 = secondRefraction.theta1;
        const r2 = secondRefraction.theta2;

        const deviation = i1 - r1 + i2 - r2 + apexRad;
        const deviationDeg = THREE.MathUtils.radToDeg(deviation);
        outputAngles[idx] = deviationDeg;

        if (item.name === 'Green') greenDeviation = deviationDeg;

        readLines.push(`${item.name}: n=${scaledN.toFixed(3)}, 偏折=${deviationDeg.toFixed(2)}°`);
      });

      const screenX = screen.position.x;
      colors.forEach((item, idx) => {
        const scaledN = 1 + (item.n - 1) * ((refractiveIndexBase - 1) / (baseReference - 1));
        const firstRefraction = refract2D(incomingDir2, entryEdge.normal, 1.0, scaledN);
        if (firstRefraction.tir) return;

        const insideDir2 = firstRefraction.dir.clone().normalize();
        let secondHit = null;
        let actualExitEdge = null;

        for (const e of edges) {
          if (e === entryEdge) continue;
          const hit = lineRayIntersection2D(
            entryHit.point.clone().add(insideDir2.clone().multiplyScalar(1e-4)),
            insideDir2,
            e.p1,
            e.p2
          );
          if (hit) {
            if (!secondHit || hit.t < secondHit.t) {
              secondHit = hit;
              actualExitEdge = e;
            }
          }
        }

        if (!secondHit || !actualExitEdge) return;

        const secondRefraction = refract2D(insideDir2, actualExitEdge.normal, scaledN, 1.0);
        if (secondRefraction.tir) return;

        const outDir2 = secondRefraction.dir.clone().normalize();
        if (Math.abs(outDir2.x) < 1e-6) return;

        const t = (screenX - secondHit.point.x) / outDir2.x;
        if (t <= 0) return;

        const hitY = secondHit.point.y + outDir2.y * t;

        const marker = new THREE.Mesh(
          new THREE.PlaneGeometry(0.14, 0.45),
          new THREE.MeshBasicMaterial({
            color: item.color,
            transparent: true,
            opacity: 0.95,
            side: THREE.DoubleSide
          })
        );
        marker.position.set(screenX + 0.011, hitY, 0);
        scene.add(marker);
        rayGroup.add(marker);
      });

      window.__3D_STATE__ = {
        prismAngle: prismAngleDeg,
        refractiveIndex: refractiveIndexBase,
        lightAngle: lightAngleDeg,
        showNormals,
        outputAngles,
        totalDeviation: greenDeviation
      };

      readout.textContent =
        `入射面: ${entryEdge.name}\n` +
        `入射点: (${entryHit.point.x.toFixed(2)}, ${entryHit.point.y.toFixed(2)})\n` +
        `Green 总偏折: ${Number.isFinite(greenDeviation) ? greenDeviation.toFixed(2) + '°' : 'TIR/无出射'}\n\n` +
        readLines.join('\n');
    }

    prismAngleInput.addEventListener('input', updateScene);
    refractiveIndexInput.addEventListener('input', updateScene);
    lightAngleInput.addEventListener('input', updateScene);
    showNormalsInput.addEventListener('change', updateScene);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateScene();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      const prismAngleDeg = parseFloat(prismAngleInput.value);
      const refractiveIndexBase = parseFloat(refractiveIndexInput.value);
      const lightAngleDeg = parseFloat(lightAngleInput.value);
      const showNormals = showNormalsInput.checked;

      const current = window.__3D_STATE__ || {};
      window.__3D_STATE__ = {
        prismAngle: prismAngleDeg,
        refractiveIndex: refractiveIndexBase,
        lightAngle: lightAngleDeg,
        showNormals,
        outputAngles: current.outputAngles || new Array(7).fill(NaN),
        totalDeviation: current.totalDeviation ?? NaN
      };

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
