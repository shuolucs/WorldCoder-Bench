<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 棱镜色散模拟</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.85);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            width: 320px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        label {
            font-size: 14px;
            flex: 1;
        }
        input[type="range"] {
            flex: 1.5;
            margin: 0 10px;
            accent-color: #00a8ff;
        }
        .value-display {
            width: 40px;
            text-align: right;
            font-size: 14px;
            font-family: monospace;
            color: #00a8ff;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #00a8ff;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="control-panel">
        <h2>光学棱镜控制面板</h2>
        
        <div class="control-group">
            <label for="prismAngle">棱镜旋转 (度)</label>
            <input type="range" id="prismAngle" min="0" max="60" step="1" value="0">
            <span class="value-display" id="val-prismAngle">0</span>
        </div>
        
        <div class="control-group">
            <label for="refractiveIndex">折射率基数</label>
            <input type="range" id="refractiveIndex" min="1.3" max="1.8" step="0.01" value="1.52">
            <span class="value-display" id="val-refractiveIndex">1.52</span>
        </div>
        
        <div class="control-group">
            <label for="lightAngle">入射角度 (度)</label>
            <input type="range" id="lightAngle" min="20" max="70" step="1" value="45">
            <span class="value-display" id="val-lightAngle">45</span>
        </div>
        
        <div class="control-group" style="justify-content: flex-start;">
            <input type="checkbox" id="showNormals">
            <label for="showNormals" style="margin-left: 10px; flex: none;">显示法线</label>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 状态初始化 ---
        window.__3D_STATE__ = {
            prismAngle: 0,
            refractiveIndex: 1.52,
            lightAngle: 45,
            showNormals: false,
            outputAngles: [0, 0, 0, 0, 0, 0, 0],
            totalDeviation: 0
        };

        // --- 场景设置 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
        dirLight.position.set(5, 10, 15);
        scene.add(dirLight);

        // --- 棱镜几何体 (等边三角形, 顶角60度) ---
        const sideLength = 6;
        const height = sideLength * Math.sqrt(3) / 2;
        
        // 使三角形质心在原点
        const v0_base = new THREE.Vector2(0, 2 * height / 3); // 顶点
        const v1_base = new THREE.Vector2(-sideLength / 2, -height / 3); // 左下
        const v2_base = new THREE.Vector2(sideLength / 2, -height / 3); // 右下

        const shape = new THREE.Shape();
        shape.moveTo(v0_base.x, v0_base.y);
        shape.lineTo(v1_base.x, v1_base.y);
        shape.lineTo(v2_base.x, v2_base.y);
        shape.lineTo(v0_base.x, v0_base.y);

        const extrudeSettings = {
            depth: 2,
            bevelEnabled: false
        };
        const prismGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        prismGeometry.translate(0, 0, -1); // 居中Z轴

        const prismMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0,
            transmission: 0.9,
            ior: 1.5,
            transparent: true,
            opacity: 0.3,
            side: THREE.DoubleSide
        });

        const prismMesh = new THREE.Mesh(prismGeometry, prismMaterial);
        scene.add(prismMesh);

        // --- 投影屏 ---
        const screenX = 15;
        const screenGeometry = new THREE.PlaneGeometry(10, 20);
        const screenMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
        const screenMesh = new THREE.Mesh(screenGeometry, screenMaterial);
        screenMesh.position.set(screenX, 0, 0);
        screenMesh.rotation.y = -Math.PI / 2;
        scene.add(screenMesh);

        // --- 光线与法线组 ---
        const rayGroup = new THREE.Group();
        scene.add(rayGroup);

        // --- 色散数据 ---
        const spectrum = [
            { name: 'Red',    hex: 0xFF0000, baseN: 1.510 },
            { name: 'Orange', hex: 0xFF7F00, baseN: 1.512 },
            { name: 'Yellow', hex: 0xFFFF00, baseN: 1.514 },
            { name: 'Green',  hex: 0x00FF00, baseN: 1.517 },
            { name: 'Blue',   hex: 0x0000FF, baseN: 1.521 },
            { name: 'Indigo', hex: 0x4B0082, baseN: 1.524 },
            { name: 'Violet', hex: 0x8B00FF, baseN: 1.528 }
        ];

        // --- 数学辅助函数 ---
        // Snell定律折射计算 (二维向量)
        function refract(I, N, n1, n2) {
            const r = n1 / n2;
            const c = -N.dot(I);
            const discriminant = 1.0 - r * r * (1.0 - c * c);
            if (discriminant < 0) return null; // 全反射 (TIR)
            const T = new THREE.Vector2().copy(I).multiplyScalar(r).add(
                new THREE.Vector2().copy(N).multiplyScalar(r * c - Math.sqrt(discriminant))
            );
            return T.normalize();
        }

        // 射线与线段交点
        function intersectRaySegment(origin, dir, p1, p2) {
            const v1 = new THREE.Vector2().subVectors(origin, p1);
            const v2 = new THREE.Vector2().subVectors(p2, p1);
            const v3 = new THREE.Vector2(-dir.y, dir.x);
            const dot = v2.dot(v3);
            if (Math.abs(dot) < 1e-6) return null;
            const t1 = new THREE.Vector2(v2.y, -v2.x).dot(v1) / dot;
            const t2 = v1.dot(v3) / dot;
            if (t1 > 1e-5 && t2 >= 0 && t2 <= 1) {
                // 返回交点和该线段的向外法线 (假设p1->p2是逆时针多边形的边)
                const normal = new THREE.Vector2(v2.y, -v2.x).normalize();
                return { t: t1, point: new THREE.Vector2().copy(origin).addScaledVector(dir, t1), normal: normal };
            }
            return null;
        }

        // 创建线条
        function createLine(p1, p2, color, width = 1) {
            const geo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(p1.x, p1.y, 0),
                new THREE.Vector3(p2.x, p2.y, 0)
            ]);
            const mat = new THREE.LineBasicMaterial({ color: color, linewidth: width });
            return new THREE.Line(geo, mat);
        }

        // --- 核心模拟更新逻辑 ---
        function updateSimulation() {
            // 清除旧射线
            while(rayGroup.children.length > 0){ 
                const child = rayGroup.children[0];
                if(child.geometry) child.geometry.dispose();
                if(child.material) child.material.dispose();
                rayGroup.remove(child); 
            }

            const state = window.__3D_STATE__;
            
            // 1. 更新棱镜旋转
            const angleRad = THREE.MathUtils.degToRad(state.prismAngle);
            prismMesh.rotation.z = angleRad;

            // 2. 计算旋转后的2D顶点
            const cosA = Math.cos(angleRad);
            const sinA = Math.sin(angleRad);
            const rotate2D = (v) => new THREE.Vector2(v.x * cosA - v.y * sinA, v.x * sinA + v.y * cosA);
            
            const v0 = rotate2D(v0_base);
            const v1 = rotate2D(v1_base);
            const v2 = rotate2D(v2_base);

            // 面定义 (逆时针): Face1(左): v0->v1, Face2(下): v1->v2, Face3(右): v2->v0
            const faces = [
                { p1: v0, p2: v1 }, // 入射面
                { p1: v1, p2: v2 },
                { p1: v2, p2: v0 }
            ];

            // 3. 计算入射点和入射方向
            // 入射面法线 (向外)
            const f1_vec = new THREE.Vector2().subVectors(v1, v0);
            const N1 = new THREE.Vector2(f1_vec.y, -f1_vec.x).normalize();
            
            // 入射点 (左侧面中点)
            const P_hit1 = new THREE.Vector2().addVectors(v0, v1).multiplyScalar(0.5);

            // 入射方向 D0: 根据 lightAngle 相对于法线计算
            // 光线从左侧来，所以相对于 -N1 旋转
            const lightAngleRad = THREE.MathUtils.degToRad(state.lightAngle);
            const D0 = new THREE.Vector2().copy(N1).negate().rotateAround(new THREE.Vector2(0,0), lightAngleRad).normalize();

            // 计算光源起点 (x = -10)
            let t_start = (P_hit1.x + 10) / D0.x;
            if (t_start < 0 || !isFinite(t_start)) t_start = 15; // 备用长度
            const P_start = new THREE.Vector2().copy(P_hit1).addScaledVector(D0, -t_start);

            // 绘制入射光 (白色)
            rayGroup.add(createLine(P_start, P_hit1, 0xffffff));

            // 绘制入射面法线
            if (state.showNormals) {
                const arrow = new THREE.ArrowHelper(
                    new THREE.Vector3(N1.x, N1.y, 0),
                    new THREE.Vector3(P_hit1.x, P_hit1.y, 0),
                    2, 0xffff00
                );
                rayGroup.add(arrow);
            }

            // 4. 计算色散
            const baseRefractiveIndex = 1.52;
            const scaleN = state.refractiveIndex / baseRefractiveIndex;

            let greenHit2 = null;
            let greenN2 = null;

            for (let i = 0; i < spectrum.length; i++) {
                const colorData = spectrum[i];
                const n_color = colorData.baseN * scaleN;

                // 第一次折射 (空气 -> 棱镜)
                const T1 = refract(D0, N1, 1.0, n_color);
                if (!T1) continue; // 全反射

                // 寻找内部交点
                let hit2 = null;
                // 检查另外两个面
                for (let j = 1; j <= 2; j++) {
                    const res = intersectRaySegment(P_hit1, T1, faces[j].p1, faces[j].p2);
                    if (res && (!hit2 || res.t < hit2.t)) {
                        hit2 = res;
                    }
                }

                if (hit2) {
                    // 绘制内部光线
                    rayGroup.add(createLine(P_hit1, hit2.point, colorData.hex));

                    // 第二次折射 (棱镜 -> 空气)
                    // hit2.normal 是向外的法线，光线从内部射出，所以入射界面的法线(指向介质1)是 -hit2.normal
                    const N2_inward = new THREE.Vector2().copy(hit2.normal).negate();
                    const T2 = refract(T1, N2_inward, n_color, 1.0);

                    if (T2) {
                        // 计算与屏幕的交点
                        const t_screen = (screenX - hit2.point.x) / T2.x;
                        let P_end;
                        if (t_screen > 0) {
                            P_end = new THREE.Vector2().copy(hit2.point).addScaledVector(T2, t_screen);
                        } else {
                            P_end = new THREE.Vector2().copy(hit2.point).addScaledVector(T2, 15); // 没打中屏幕则画固定长度
                        }

                        // 绘制出射光线
                        rayGroup.add(createLine(hit2.point, P_end, colorData.hex));

                        // 计算偏折角 (入射方向与出射方向的夹角)
                        // 使用点乘求夹角
                        let deviation = Math.acos(THREE.MathUtils.clamp(D0.dot(T2), -1, 1));
                        deviation = THREE.MathUtils.radToDeg(deviation);
                        state.outputAngles[i] = parseFloat(deviation.toFixed(2));

                        // 记录Green光线的数据用于绘制法线和总偏折角
                        if (colorData.name === 'Green') {
                            greenHit2 = hit2.point;
                            greenN2 = hit2.normal;
                            state.totalDeviation = state.outputAngles[i];
                        }
                    } else {
                        state.outputAngles[i] = 0; // TIR
                    }
                }
            }

            // 绘制出射面法线 (仅在Green光线交点处绘制一次以保持整洁)
            if (state.showNormals && greenHit2 && greenN2) {
                const arrow = new THREE.ArrowHelper(
                    new THREE.Vector3(greenN2.x, greenN2.y, 0),
                    new THREE.Vector3(greenHit2.x, greenHit2.y, 0),
                    2, 0xffff00
                );
                rayGroup.add(arrow);
            }
        }

        // --- UI 事件绑定 ---
        const uiElements = ['prismAngle', 'refractiveIndex', 'lightAngle'];
        uiElements.forEach(id => {
            const el = document.getElementById(id);
            const valEl = document.getElementById(`val-${id}`);
            el.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                valEl.textContent = val;
                window.__3D_STATE__[id] = val;
            });
        });

        document.getElementById('showNormals').addEventListener('change', (e) => {
            window.__3D_STATE__.showNormals = e.target.checked;
        });

        // --- 窗口缩放适配 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 动画循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // 每帧更新模拟和状态
            updateSimulation();
            
            renderer.render(scene, camera);
        }

        // 启动
        animate();

    </script>
</body>
</html>
