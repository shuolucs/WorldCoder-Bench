<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prism Dispersion Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #controls {
    position: absolute; top: 15px; left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #ddd;
    width: 300px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  #controls h2 {
    margin-bottom: 15px;
    color: #fff;
    font-size: 16px;
    text-align: center;
    border-bottom: 1px solid rgba(100,100,255,0.3);
    padding-bottom: 10px;
  }
  .control-group {
    margin-bottom: 14px;
  }
  .control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 5px;
    font-size: 13px;
  }
  .control-group label span.val {
    color: #8af;
    font-weight: bold;
    min-width: 40px;
    text-align: right;
  }
  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    background: rgba(100,100,255,0.2);
    border-radius: 3px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #6af;
    cursor: pointer;
  }
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 5px;
  }
  .checkbox-group input { width: 16px; height: 16px; cursor: pointer; }
  #info {
    position: absolute; bottom: 15px; left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 15px;
    color: #ddd;
    font-size: 12px;
    width: 300px;
    backdrop-filter: blur(10px);
  }
  #info h3 { margin-bottom: 8px; color: #fff; font-size: 14px; }
  #info .row { display: flex; justify-content: space-between; margin: 3px 0; }
  #info .color-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="controls">
  <h2>🔬 Prism Dispersion Controls</h2>
  <div class="control-group">
    <label>Prism Rotation (Z): <span class="val" id="prismAngleVal">0°</span></label>
    <input type="range" id="prismAngle" min="0" max="60" step="1" value="0">
  </div>
  <div class="control-group">
    <label>Refractive Index Base: <span class="val" id="refractiveIndexVal">1.52</span></label>
    <input type="range" id="refractiveIndex" min="1.30" max="1.80" step="0.01" value="1.52">
  </div>
  <div class="control-group">
    <label>Light Angle: <span class="val" id="lightAngleVal">45°</span></label>
    <input type="range" id="lightAngle" min="20" max="70" step="1" value="45">
  </div>
  <div class="control-group">
    <div class="checkbox-group">
      <input type="checkbox" id="showNormals">
      <label for="showNormals" style="margin-bottom:0; font-size:13px;">Show Surface Normals</label>
    </div>
  </div>
</div>

<div id="info">
  <h3>📊 Deviation Angles</h3>
  <div id="deviationInfo"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x6666ff, 0.5, 30);
pointLight.position.set(-5, 5, 5);
scene.add(pointLight);

// Spectrum colors
const spectrumColors = [
  { name: 'Red',    baseN: 1.510, color: 0xFF0000, hex: '#FF0000' },
  { name: 'Orange', baseN: 1.512, color: 0xFF7F00, hex: '#FF7F00' },
  { name: 'Yellow', baseN: 1.514, color: 0xFFFF00, hex: '#FFFF00' },
  { name: 'Green',  baseN: 1.517, color: 0x00FF00, hex: '#00FF00' },
  { name: 'Blue',   baseN: 1.521, color: 0x0000FF, hex: '#0000FF' },
  { name: 'Indigo', baseN: 1.524, color: 0x4B0082, hex: '#4B0082' },
  { name: 'Violet', baseN: 1.528, color: 0x8B00FF, hex: '#8B00FF' },
];

// Base refractive index for scaling
const baseRefIndex = 1.52;
const baseMidN = 1.517; // Green

// Prism geometry - equilateral triangle with 60° apex
const prismApexAngle = 60 * Math.PI / 180; // 60 degrees
const sideLen = 3.0;
const h = sideLen * Math.sin(prismApexAngle);
const halfBase = sideLen * Math.cos(prismApexAngle / 2);

// Create triangular cross-section in XY plane
// Apex at top, base at bottom
// For a 60° apex equilateral triangle:
const triH = sideLen * Math.sqrt(3) / 2;
const shape = new THREE.Shape();
// Equilateral triangle centered roughly at origin
// Vertices: top apex, bottom-left, bottom-right
const v0 = new THREE.Vector2(0, triH * 2/3);           // apex (top)
const v1 = new THREE.Vector2(-sideLen/2, -triH * 1/3); // bottom-left
const v2 = new THREE.Vector2(sideLen/2, -triH * 1/3);  // bottom-right

shape.moveTo(v0.x, v0.y);
shape.lineTo(v1.x, v1.y);
shape.lineTo(v2.x, v2.y);
shape.lineTo(v0.x, v0.y);

const extrudeSettings = { depth: 2, bevelEnabled: false };
const prismGeometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
prismGeometry.translate(0, 0, -1); // center along Z

const prismMaterial = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 0.9,
  roughness: 0.0,
  ior: 1.5,
  transparent: true,
  opacity: 0.3,
  side: THREE.DoubleSide,
  thickness: 2.0,
});

const prismMesh = new THREE.Mesh(prismGeometry, prismMaterial);
scene.add(prismMesh);

// Wireframe for prism edges
const wireGeo = new THREE.EdgesGeometry(prismGeometry);
const wireMat = new THREE.LineBasicMaterial({ color: 0x6688ff, transparent: true, opacity: 0.5 });
const wireframe = new THREE.LineSegments(wireGeo, wireMat);
prismMesh.add(wireframe);

// Projection screen
const screenGeo = new THREE.PlaneGeometry(1, 8);
const screenMat = new THREE.MeshStandardMaterial({
  color: 0xeeeeee,
  side: THREE.DoubleSide,
  roughness: 0.8,
});
const screenMesh = new THREE.Mesh(screenGeo, screenMat);
screenMesh.position.set(8, 0, 0);
screenMesh.rotation.y = Math.PI / 2;
scene.add(screenMesh);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.rotation.x = Math.PI / 2;
gridHelper.position.z = -2;
scene.add(gridHelper);

// Groups for dynamic objects
const lightGroup = new THREE.Group();
scene.add(lightGroup);
const normalGroup = new THREE.Group();
scene.add(normalGroup);

// State
window.__3D_STATE__ = {
  prismAngle: 0,
  refractiveIndex: 1.52,
  lightAngle: 45,
  showNormals: false,
  outputAngles: [0,0,0,0,0,0,0],
  totalDeviation: 0,
};

// Helper: create a line between two points
function createRayLine(p1, p2, color, linewidth = 2) {
  const geom = new THREE.BufferGeometry().setFromPoints([p1, p2]);
  const mat = new THREE.LineBasicMaterial({ color, linewidth });
  return new THREE.Line(geom, mat);
}

// Helper: create a cylinder along a ray for the white beam
function createBeamCylinder(p1, p2, radius, color) {
  const dir = new THREE.Vector3().subVectors(p2, p1);
  const len = dir.length();
  const geom = new THREE.CylinderGeometry(radius, radius, len, 8);
  const mat = new THREE.MeshBasicMaterial({ color });
  const mesh = new THREE.Mesh(geom, mat);
  const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
  mesh.position.copy(mid);
  // Align cylinder (default Y-axis) to direction
  const axis = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(axis, dir.normalize());
  mesh.quaternion.copy(quat);
  return mesh;
}

// Helper: create arrow for normal visualization
function createArrow(origin, direction, length, color) {
  const arrow = new THREE.ArrowHelper(direction.normalize(), origin, length, color, 0.15, 0.08);
  return arrow;
}

// Snell's law: returns refracted angle or null if total internal reflection
function snellRefraction(thetaI, n1, n2) {
  const sinThetaR = (n1 / n2) * Math.sin(thetaI);
  if (Math.abs(sinThetaR) > 1.0) return null; // total internal reflection
  return Math.asin(sinThetaR);
}

// Compute scaled refractive index for a color given the base slider value
function getScaledN(baseN, sliderValue) {
  // Scale proportionally: keep the ratio of each color's n to the mid value
  const ratio = baseN / baseMidN;
  return sliderValue * ratio;
}

// Main computation: given prism rotation, light angle, refractive index
function computeRays(prismAngleDeg, lightAngleDeg, refIndexBase, showNorms) {
  // Clear previous
  while (lightGroup.children.length > 0) lightGroup.remove(lightGroup.children[0]);
  while (normalGroup.children.length > 0) normalGroup.remove(normalGroup.children[0]);

  const prismAngleRad = prismAngleDeg * Math.PI / 180;
  const apexAngle = 60 * Math.PI / 180; // prism apex angle

  // Triangle vertices in local coords (XY plane), then rotated by prismAngle around Z
  const localV0 = new THREE.Vector3(v0.x, v0.y, 0); // apex
  const localV1 = new THREE.Vector3(v1.x, v1.y, 0); // bottom-left
  const localV2 = new THREE.Vector3(v2.x, v2.y, 0); // bottom-right

  const rotZ = new THREE.Matrix4().makeRotationZ(prismAngleRad);
  const rv0 = localV0.clone().applyMatrix4(rotZ);
  const rv1 = localV1.clone().applyMatrix4(rotZ);
  const rv2 = localV2.clone().applyMatrix4(rotZ);

  // The three faces of the prism (in 2D cross-section):
  // Face 1 (left): v0 -> v1 (apex to bottom-left) - this is the entry face
  // Face 2 (right): v0 -> v2 (apex to bottom-right) - this is the exit face
  // Face 3 (bottom): v1 -> v2 (bottom-left to bottom-right)

  // Entry face: from rv0 to rv1
  const face1Dir = new THREE.Vector3().subVectors(rv1, rv0).normalize();
  // Outward normal of face1 (pointing left, away from prism interior)
  const face1Normal = new THREE.Vector3(-face1Dir.y, face1Dir.x, 0).normalize();
  // Check that normal points away from prism center
  const prismCenter = new THREE.Vector3().add(rv0).add(rv1).add(rv2).divideScalar(3);
  const face1Mid = new THREE.Vector3().addVectors(rv0, rv1).multiplyScalar(0.5);
  if (new THREE.Vector3().subVectors(face1Mid, prismCenter).dot(face1Normal) < 0) {
    face1Normal.negate();
  }

  // Exit face: from rv0 to rv2
  const face2Dir = new THREE.Vector3().subVectors(rv2, rv0).normalize();
  const face2Normal = new THREE.Vector3(-face2Dir.y, face2Dir.x, 0).normalize();
  const face2Mid = new THREE.Vector3().addVectors(rv0, rv2).multiplyScalar(0.5);
  if (new THREE.Vector3().subVectors(face2Mid, prismCenter).dot(face2Normal) < 0) {
    face2Normal.negate();
  }

  // Incident light direction
  // lightAngleDeg is the angle relative to the entry face normal
  // Light comes from the left, so base direction is +x
  // We define the incident angle as the angle between the incoming ray and the face1 normal
  // The incoming ray direction should make angle lightAngleDeg with face1Normal (inward)
  const inwardNormal1 = face1Normal.clone().negate(); // pointing into prism

  // Incident ray direction: rotate inwardNormal1 by lightAngleDeg
  // Actually, let's think more carefully.
  // The light comes from the left. The angle of incidence is measured from the surface normal.
  // We want the ray to hit the entry face at the specified angle.

  // Light direction: we rotate the inward normal by lightAngleDeg around Z
  const lightAngleRad = lightAngleDeg * Math.PI / 180;
  // Incident direction = rotate face1Normal (outward) by (PI - lightAngleRad) around Z... 
  // Let's be more explicit:
  // The incident ray travels in a direction that makes angle theta_i with the outward normal.
  // If theta_i = 0, light hits perpendicular to the face.
  // The ray direction (toward the face) dotted with inward normal = cos(theta_i)

  // Let's define: incident ray direction d_in such that angle between d_in and inwardNormal1 = lightAngleRad
  // d_in = cos(lightAngleRad) * inwardNormal1 + sin(lightAngleRad) * tangent1
  // where tangent1 is along the face (we choose the direction that makes light go "downward" through prism)
  const tangent1 = face1Dir.clone(); // along the face from v0 to v1
  // We want light to go generally from left to right, so choose tangent direction accordingly
  // Let's pick the tangent that has a positive x-component relative to inward normal rotation
  // Actually, let's pick tangent such that the refracted beam goes toward the exit face
  // For a standard prism setup, we want the tangent component to push the ray "downward" (toward base)
  // tangent1 goes from apex to bottom-left. Let's check if we need to negate.
  // For the standard setup (no rotation), face1 goes from top to bottom-left.
  // The tangent along face1 from v0 to v1 points down-left.
  // We want the light to enter and travel toward the exit face (right side).
  // So we might need -tangent1 to get the component pushing right.
  
  // Let me just pick the tangent that, combined with the inward normal, gives a ray going rightward
  let t1 = tangent1.clone();
  // Test: does inwardNormal1 + t1 have positive x? If not, negate t1
  const testDir = new THREE.Vector3().addVectors(inwardNormal1, t1);
  // Actually let's just try both and pick the one where the ray has a reasonable direction
  // For simplicity, negate tangent if needed to ensure light goes "into" the prism properly
  // The key insight: we want the ray to hit the LEFT face and exit the RIGHT face
  // So the tangent component should push the ray "downward" along the face toward the base
  
  // Let's use a different approach: define the incident ray direction directly
  // The incident ray comes from the left. Its direction in world space:
  // We know the outward normal of face1. The incident angle is lightAngleRad from this normal.
  // The ray direction (toward face) is: -face1Normal rotated by lightAngleRad
  
  // Rotate -face1Normal by lightAngleRad around Z axis (choosing sign to push ray downward)
  const cosA = Math.cos(lightAngleRad);
  const sinA = Math.sin(lightAngleRad);
  
  // Two possible rotations (CW and CCW). Pick the one that sends light "through" the prism.
  const d_in_option1 = new THREE.Vector3(
    inwardNormal1.x * cosA - inwardNormal1.y * sinA,
    inwardNormal1.x * sinA + inwardNormal1.y * cosA,
    0
  ).normalize();
  
  const d_in_option2 = new THREE.Vector3(
    inwardNormal1.x * cosA + inwardNormal1.y * sinA,
    -inwardNormal1.x * sinA + inwardNormal1.y * cosA,
    0
  ).normalize();
  
  // Pick the option where the ray, after entering, would head toward the exit face
  // A simple heuristic: the option that has a larger x-component (going rightward)
  // or more precisely, the one that would intersect face2
  let d_in = d_in_option1.x > d_in_option2.x ? d_in_option1 : d_in_option2;
  // If both have similar x, pick the one going more "downward" (toward base)
  if (Math.abs(d_in_option1.x - d_in_option2.x) < 0.01) {
    d_in = d_in_option1.y < d_in_option2.y ? d_in_option1 : d_in_option2;
  }

  // Find intersection of incident ray with face1
  // Ray: P = origin + t * d_in
  // Face1 is the line segment from rv0 to rv1
  // We need to find where the ray hits this segment
  
  // Ray origin: far left
  const rayOrigin = new THREE.Vector3(-10, 0, 0);
  
  // For the ray to actually hit face1, we need to adjust the ray origin's y position
  // or just find the intersection properly
  
  // Line-line intersection in 2D (z=0 plane)
  // Ray: P = rayOrigin + t * d_in
  // Face1: Q = rv0 + s * (rv1 - rv0), s in [0,1]
  
  function lineLineIntersect2D(p1, d1, p2, d2) {
    // p1 + t*d1 = p2 + s*d2
    // t*d1.x - s*d2.x = p2.x - p1.x
    // t*d1.y - s*d2.y = p2.y - p1.y
    const det = d1.x * (-d2.y) - d1.y * (-d2.x);
    if (Math.abs(det) < 1e-10) return null;
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const t = (dx * (-d2.y) - dy * (-d2.x)) / det;
    const s = (dx * (-d1.y) - dy * (-d1.x)) / det; // Hmm, let me redo this
    // Actually: d1.x * t - d2.x * s = dx
    //           d1.y * t - d2.y * s = dy
    // det = d1.x * (-d2.y) - (-d2.x) * d1.y = -d1.x*d2.y + d2.x*d1.y
    // t = (dx*(-d2.y) - (-d2.x)*dy) / det = (-dx*d2.y + d2.x*dy) / det
    // s = (d1.x*dy - d1.y*dx) / det
    const t_val = (-dx * d2.y + d2.x * dy) / det;
    const s_val = (d1.x * dy - d1.y * dx) / det;
    return { t: t_val, s: s_val };
  }
  
  const face1DirVec = new THREE.Vector3().subVectors(rv1, rv0);
  const isect1 = lineLineIntersect2D(rayOrigin, d_in, rv0, face1DirVec);
  
  if (!isect1 || isect1.t < 0 || isect1.s < 0 || isect1.s > 1) {
    // Try adjusting ray origin y to hit the face
    // Find the midpoint of face1 and aim there
    const target = face1Mid.clone();
    const newDir = new THREE.Vector3().subVectors(target, rayOrigin).normalize();
    // Recalculate actual incidence angle
    const actualAngle = Math.acos(Math.abs(newDir.dot(face1Normal)));
    // Use this direction instead but keep the user's angle for Snell's law
    // Actually, let's just move the ray origin to ensure intersection
  }
  
  // Better approach: compute intersection point on face1, then trace backward for ray origin
  // Place the hit point at the middle of face1, then the incidence angle determines the ray direction
  
  // Let's redefine the approach:
  // 1. The hit point on face1 is at its midpoint (or parameterized)
  // 2. The incident ray comes from the left at angle lightAngleRad to face1Normal
  
  const hitPoint1 = face1Mid.clone();
  
  // Incident direction (toward the face, so opposite to outward normal rotated by angle)
  // d_incident points INTO the prism surface
  // Angle is measured from outward normal
  
  // We need to choose which side of the normal the ray comes from
  // For a prism with apex up and entry face on the left:
  // The outward normal of the left face points to the upper-left
  // Light comes from the left, so it approaches from the direction of the outward normal (roughly)
  
  // Let's define: the incident ray direction (pointing toward the surface) 
  // d_in = -face1Normal rotated by lightAngleRad around Z
  // Choose rotation direction so light goes "through" the prism
  
  const negN1 = face1Normal.clone().negate(); // points into prism
  
  // Rotate negN1 by +lightAngleRad and -lightAngleRad, pick the better one
  function rotateVec2D(v, angle) {
    const c = Math.cos(angle);
    const s = Math.sin(angle);
    return new THREE.Vector3(v.x * c - v.y * s, v.x * s + v.y * c, 0);
  }
  
  const d_in_a = rotateVec2D(negN1, lightAngleRad).normalize();
  const d_in_b = rotateVec2D(negN1, -lightAngleRad).normalize();
  
  // The incoming ray direction (from source to hit point) should be d_in
  // The source is at the left, so the ray direction should have positive x component (going right)
  // and the ray comes FROM the left, so the direction of travel is d_in
  // But actually d_in should point INTO the surface (from outside to inside)
  // The ray travels in direction d_in, hitting the surface
  
  // Pick the option where the refracted ray inside the prism would head toward face2
  // For now, pick the one with larger x component
  d_in = d_in_a;
  // Check: the ray origin is at hitPoint1 - t * d_in for some positive t
  // The origin should be to the left (negative x), so d_in should have positive x
  if (d_in.x < 0) d_in = d_in_b;
  if (d_in.x < 0) {
    // Both negative x? This shouldn't happen for reasonable angles
    d_in = d_in_a.x > d_in_b.x ? d_in_a : d_in_b;
  }
  
  // Verify incidence angle
  const verifyAngle = Math.acos(Math.max(-1, Math.min(1, d_in.clone().negate().dot(face1Normal))));
  
  // Ray origin: trace backward from hitPoint1
  const rayStart = hitPoint1.clone().add(d_in.clone().multiplyScalar(-12));
  
  // Draw incident white beam
  const whiteBeam = createBeamCylinder(
    new THREE.Vector3(rayStart.x, rayStart.y, 0),
    new THREE.Vector3(hitPoint1.x, hitPoint1.y, 0),
    0.03, 0xffffff
  );
  lightGroup.add(whiteBeam);
  
  // Also add a glow line
  const glowLine = createRayLine(
    new THREE.Vector3(rayStart.x, rayStart.y, 0),
    new THREE.Vector3(hitPoint1.x, hitPoint1.y, 0),
    0xffffff
  );
  lightGroup.add(glowLine);

  // Show normals if enabled
  if (showNorms) {
    const arrow1 = createArrow(hitPoint1.clone(), face1Normal.clone(), 1.5, 0xffff00);
    normalGroup.add(arrow1);
    const arrow1b = createArrow(hitPoint1.clone(), face1Normal.clone().negate(), 1.5, 0xffff00);
    normalGroup.add(arrow1b);
  }

  // Now compute refraction for each color
  const outputAngles = [];
  const theta_i1 = lightAngleRad; // angle of incidence at face1

  for (let i = 0; i < spectrumColors.length; i++) {
    const sc = spectrumColors[i];
    const n2 = getScaledN(sc.baseN, refIndexBase);
    const n1 = 1.0; // air

    // Snell's law at face1: n1 * sin(theta_i1) = n2 * sin(theta_r1)
    const theta_r1 = snellRefraction(theta_i1, n1, n2);
    
    if (theta_r1 === null) {
      // Total internal reflection at entry (unusual but possible)
      outputAngles.push(NaN);
      continue;
    }

    // Refracted direction inside prism
    // The refracted ray bends toward the normal (entering denser medium)
    // Refracted direction: rotate inward normal by theta_r1 in the same sense as the incident ray
    
    // Determine the rotation sense: the incident ray is on one side of the normal
    // Cross product of face1Normal and d_in gives the rotation axis direction
    const cross1 = new THREE.Vector3().crossVectors(face1Normal, d_in);
    const rotSign1 = cross1.z > 0 ? 1 : -1;
    
    // Refracted direction inside prism: rotate -face1Normal (inward) by theta_r1
    const d_refracted1 = rotateVec2D(negN1, rotSign1 * theta_r1).normalize();

    // Find intersection of refracted ray with face2 (exit face)
    // Ray: hitPoint1 + t * d_refracted1
    // Face2: rv0 + s * (rv2 - rv0), s in [0,1]
    const face2DirVec = new THREE.Vector3().subVectors(rv2, rv0);
    const isect2 = lineLineIntersect2D(hitPoint1, d_refracted1, rv0, face2DirVec);
    
    let hitPoint2 = null;
    let exitFaceNormal = face2Normal.clone();
    let exitFaceDir = face2Dir.clone();
    
    if (isect2 && isect2.t > 0.01 && isect2.s >= -0.05 && isect2.s <= 1.05) {
      hitPoint2 = hitPoint1.clone().add(d_refracted1.clone().multiplyScalar(isect2.t));
    } else {
      // Try face3 (bottom face): rv1 to rv2
      const face3DirVec = new THREE.Vector3().subVectors(rv2, rv1);
      const face3Dir = face3DirVec.clone().normalize();
      const face3Normal = new THREE.Vector3(-face3Dir.y, face3Dir.x, 0).normalize();
      const face3Mid = new THREE.Vector3().addVectors(rv1, rv2).multiplyScalar(0.5);
      if (new THREE.Vector3().subVectors(face3Mid, prismCenter).dot(face3Normal) < 0) {
        face3Normal.negate();
      }
      
      const isect3 = lineLineIntersect2D(hitPoint1, d_refracted1, rv1, face3DirVec);
      if (isect3 && isect3.t > 0.01 && isect3.s >= -0.05 && isect3.s <= 1.05) {
        hitPoint2 = hitPoint1.clone().add(d_refracted1.clone().multiplyScalar(isect3.t));
        exitFaceNormal = face3Normal;
        exitFaceDir = face3Dir;
      } else {
        outputAngles.push(NaN);
        continue;
      }
    }

    // Draw internal ray (thin colored line)
    const internalLine = createRayLine(
      new THREE.Vector3(hitPoint1.x, hitPoint1.y, 0),
      new THREE.Vector3(hitPoint2.x, hitPoint2.y, 0),
      sc.color
    );
    internalLine.material.transparent = true;
    internalLine.material.opacity = 0.4;
    lightGroup.add(internalLine);

    // Snell's law at face2: n2 * sin(theta_i2) = n1 * sin(theta_r2)
    // Angle of incidence at face2
    const d_in2 = d_refracted1.clone(); // direction of ray hitting face2
    // Incidence angle at face2: angle between d_in2 and inward normal of face2
    const inwardN2 = exitFaceNormal.clone().negate(); // inward normal at exit face... 
    // Actually, the outward normal at the exit face points AWAY from prism interior
    // The incidence angle is between the incoming ray and the outward normal (on the same side)
    // cos(theta_i2) = |d_in2 . (-exitFaceNormal)| = |d_in2 . inward_normal|
    // But we need to be careful about signs
    
    // The ray is traveling in direction d_in2 and hits the exit face from inside
    // The outward normal of the exit face points away from the prism
    // The angle of incidence = angle between (-d_in2) and outward normal... no
    // Standard: angle of incidence = angle between incoming ray direction and the INWARD normal at the point
    // Or equivalently, angle between the reversed ray and the outward normal
    
    // cos(theta_i2) = dot(-d_in2, exitFaceNormal) ... if ray comes from inside
    // Actually the outward normal points OUT of the prism. The ray is going from inside to outside.
    // The angle of incidence is measured from the normal on the side the ray is coming from.
    // The ray is inside, so the relevant normal is the inward-pointing one: -exitFaceNormal
    // theta_i2 = angle between d_in2 and (-exitFaceNormal)
    // cos(theta_i2) = dot(d_in2, -exitFaceNormal) / (|d_in2| * |exitFaceNormal|)
    // But this could be negative if the angle is obtuse, which means we should use the supplement
    
    const cosTheta_i2 = d_in2.dot(exitFaceNormal.clone().negate());
    const theta_i2 = Math.acos(Math.max(-1, Math.min(1, Math.abs(cosTheta_i2))));
    
    // Snell's law: n2 * sin(theta_i2) = n1 * sin(theta_r2)
    const theta_r2 = snellRefraction(theta_i2, n2, n1);
    
    if (theta_r2 === null) {
      // Total internal reflection
      outputAngles.push(NaN);
      // Draw a dashed indication
      const dashMat = new THREE.LineDashedMaterial({ color: sc.color, dashSize: 0.2, gapSize: 0.1 });
      const reflDir = d_in2.clone().reflect(exitFaceNormal);
      const reflEnd = hitPoint2.clone().add(reflDir.multiplyScalar(5));
      const dashGeom = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(hitPoint2.x, hitPoint2.y, 0),
        new THREE.Vector3(reflEnd.x, reflEnd.y, 0)
      ]);
      const dashLine = new THREE.Line(dashGeom, dashMat);
      dashLine.computeLineDistances();
      lightGroup.add(dashLine);
      continue;
    }

    // Refracted direction exiting prism
    const cross2 = new THREE.Vector3().crossVectors(exitFaceNormal, d_in2);
    const rotSign2 = cross2.z > 0 ? -1 : 1; // opposite because going from dense to sparse
    // When exiting (n2 > n1), the ray bends AWAY from the normal
    // The refracted ray on the exit side: rotate exitFaceNormal by theta_r2
    const d_exit = rotateVec2D(exitFaceNormal, rotSign2 * theta_r2).normalize();

    // Verify the exit direction makes sense (should go generally rightward/away from prism)
    // If it doesn't, try the other rotation
    let d_exit_final = d_exit;
    if (d_exit.dot(exitFaceNormal) < 0) {
      d_exit_final = rotateVec2D(exitFaceNormal, -rotSign2 * theta_r2).normalize();
    }

    // Draw exit ray
    const exitEnd = hitPoint2.clone().add(d_exit_final.clone().multiplyScalar(15));
    const exitLine = createRayLine(
      new THREE.Vector3(hitPoint2.x, hitPoint2.y, 0),
      new THREE.Vector3(exitEnd.x, exitEnd.y, 0),
      sc.color
    );
    lightGroup.add(exitLine);

    // Also draw a slightly thicker beam for visibility
    const exitBeam = createBeamCylinder(
      new THREE.Vector3(hitPoint2.x, hitPoint2.y, 0),
      new THREE.Vector3(exitEnd.x, exitEnd.y, 0),
      0.015,
      sc.color
    );
    lightGroup.add(exitBeam);

    // Calculate total deviation angle
    // Deviation = (theta_i1 - theta_r1) + (theta_r2 - theta_i2) + apexAngle
    // Or more precisely: deviation = theta_i1 + theta_r2 - apexAngle
    // Standard formula: D = theta_i1 + theta_r2 - A (where A is the prism angle)
    // Actually the standard formula for minimum deviation:
    // D = (theta_i1 - theta_r1) + (theta_r2 - theta_i2) 
    // But the geometric relation is: theta_r1 + theta_i2 = A (prism angle)
    // So D = theta_i1 + theta_r2 - A
    
    const deviation = theta_i1 + theta_r2 - apexAngle;
    const deviationDeg = deviation * 180 / Math.PI;
    outputAngles.push(deviationDeg);

    // Show normal at exit face
    if (showNorms && i === 3) { // Only show for green (middle) to avoid clutter
      const arrow2 = createArrow(hitPoint2.clone(), exitFaceNormal.clone(), 1.5, 0xffff00);
      normalGroup.add(arrow2);
      const arrow2b = createArrow(hitPoint2.clone(), exitFaceNormal.clone().negate(), 1.5, 0xffff00);
      normalGroup.add(arrow2b);
    }
  }

  // Update screen position to catch the dispersed rays
  // Find where green ray hits x=8
  // Screen is at x=8

  // Update state
  window.__3D_STATE__.prismAngle = prismAngleDeg;
  window.__3D_STATE__.refractiveIndex = refIndexBase;
  window.__3D_STATE__.lightAngle = lightAngleDeg;
  window.__3D_STATE__.showNormals = showNorms;
  window.__3D_STATE__.outputAngles = outputAngles.map(a => isNaN(a) ? 0 : parseFloat(a.toFixed(2)));
  window.__3D_STATE__.totalDeviation = isNaN(outputAngles[3]) ? 0 : parseFloat(outputAngles[3].toFixed(2));

  // Update info panel
  updateInfoPanel(outputAngles);
}

function updateInfoPanel(angles) {
  const container = document.getElementById('deviationInfo');
  let html = '';
  for (let i = 0; i < spectrumColors.length; i++) {
    const sc = spectrumColors[i];
    const angle = angles[i];
    const angleStr = isNaN(angle) ? 'TIR' : angle.toFixed(2) + '°';
    html += `<div class="row">
      <span><span class="color-dot" style="background:${sc.hex}"></span>${sc.name}</span>
      <span style="color:${sc.hex === '#FFFF00' ? '#FFFF88' : sc.hex}">${angleStr}</span>
    </div>`;
  }
  html += `<div class="row" style="margin-top:8px; border-top:1px solid rgba(100,100,255,0.3); padding-top:5px;">
    <span><b>Total Deviation (Green)</b></span>
    <span style="color:#8f8"><b>${isNaN(angles[3]) ? 'TIR' : angles[3].toFixed(2) + '°'}</b></span>
  </div>`;
  container.innerHTML = html;
}

// UI event handlers
const prismAngleSlider = document.getElementById('prismAngle');
const refractiveIndexSlider = document.getElementById('refractiveIndex');
const lightAngleSlider = document.getElementById('lightAngle');
const showNormalsCheckbox = document.getElementById('showNormals');

function getParams() {
  return {
    prismAngle: parseFloat(prismAngleSlider.value),
    refractiveIndex: parseFloat(refractiveIndexSlider.value),
    lightAngle: parseFloat(lightAngleSlider.value),
    showNormals: showNormalsCheckbox.checked,
  };
}

function updateLabels() {
  document.getElementById('prismAngleVal').textContent = prismAngleSlider.value + '°';
  document.getElementById('refractiveIndexVal').textContent = parseFloat(refractiveIndexSlider.value).toFixed(2);
  document.getElementById('lightAngleVal').textContent = lightAngleSlider.value + '°';
}

function update() {
  updateLabels();
  const p = getParams();
  prismMesh.rotation.z = p.prismAngle * Math.PI / 180;
  computeRays(p.prismAngle, p.lightAngle, p.refractiveIndex, p.showNormals);
}

prismAngleSlider.addEventListener('input', update);
refractiveIndexSlider.addEventListener('input', update);
lightAngleSlider.addEventListener('input', update);
showNormalsCheckbox.addEventListener('change', update);

// Add some ambient particles for atmosphere
const particleCount = 200;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 30;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 10;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x4444aa, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Initial computation
update();

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  
  // Subtle particle animation
  particles.rotation.z += 0.0002;
  
  renderer.render(scene, camera);
}
animate();

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
