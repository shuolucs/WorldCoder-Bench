<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sumo Wrestling</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
}

#p1Stats {
    position: absolute;
    top: 10px;
    left: 15px;
    color: #ff3333;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
}

#p2Stats {
    position: absolute;
    top: 10px;
    right: 15px;
    color: #3399ff;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    text-align: right;
}

#roundInfo {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
    text-align: center;
}

#winBanner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFD700;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
    display: none;
    text-align: center;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 15px;
    border: 3px solid #FFD700;
}

#startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(135deg, #ff6b35, #ff2200);
    color: white;
    border: 3px solid #fff;
    border-radius: 10px;
    cursor: pointer;
    pointer-events: all;
    z-index: 20;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: transform 0.1s;
}

#startBtn:hover {
    transform: translate(-50%, -50%) scale(1.05);
}

#pauseOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    display: none;
    background: rgba(0,0,0,0.5);
    padding: 15px 30px;
    border-radius: 10px;
}

.health-bar-container {
    position: absolute;
    width: 60px;
    height: 8px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #fff;
    border-radius: 4px;
    pointer-events: none;
    z-index: 15;
    display: none;
}

.health-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.1s;
}

#p1HealthBar .health-bar-fill { background: #ff3333; }
#p2HealthBar .health-bar-fill { background: #3399ff; }

.stamina-bar-container {
    position: absolute;
    width: 60px;
    height: 5px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #aaa;
    border-radius: 3px;
    pointer-events: none;
    z-index: 15;
    display: none;
}

.stamina-bar-fill {
    height: 100%;
    border-radius: 2px;
    background: #ffcc00;
}
</style>
</head>
<body>

<div id="hud">
    <div id="p1Stats">Player 1 HP: 100 | Stamina: 100</div>
    <div id="p2Stats">Player 2 HP: 100 | Stamina: 100</div>
    <div id="roundInfo">Round: 1 | P1 Wins: 0 | P2 Wins: 0</div>
</div>

<div id="winBanner"></div>
<div id="pauseOverlay">PAUSED</div>
<button id="startBtn">START</button>

<div id="p1HealthBar" class="health-bar-container">
    <div class="health-bar-fill" style="width:100%"></div>
</div>
<div id="p1StaminaBar" class="stamina-bar-container">
    <div class="stamina-bar-fill" style="width:100%"></div>
</div>

<div id="p2HealthBar" class="health-bar-container">
    <div class="health-bar-fill" style="width:100%"></div>
</div>
<div id="p2StaminaBar" class="stamina-bar-container">
    <div class="stamina-bar-fill" style="width:100%"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
    gameStarted: false,
    paused: false,
    round: 1,
    p1: { x: -3, z: 0, vx: 0, vz: 0, health: 100, stamina: 100, wins: 0, charging: false },
    p2: { x: 3, z: 0, vx: 0, vz: 0, health: 100, stamina: 100, wins: 0, charging: false },
    lastCollisionSpeed: 0,
    winner: null,
    ringOutPlayer: null,
    matchActive: false,
    frameCount: 0
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 15, 18);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a5c1a });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Arena (dohyo)
const arenaGeom = new THREE.CylinderGeometry(8, 8, 0.3, 64);
const arenaMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C });
const arena = new THREE.Mesh(arenaGeom, arenaMat);
arena.position.y = 0.15;
arena.receiveShadow = true;
arena.castShadow = false;
scene.add(arena);

// Red border ring
const torusGeom = new THREE.TorusGeometry(8, 0.15, 16, 64);
const torusMat = new THREE.MeshStandardMaterial({ color: 0xcc0000 });
const torus = new THREE.Mesh(torusGeom, torusMat);
torus.rotation.x = -Math.PI / 2;
torus.position.y = 0.32;
scene.add(torus);

// Inner circle line
const innerCircleGeom = new THREE.TorusGeometry(6, 0.08, 8, 64);
const innerCircleMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const innerCircle = new THREE.Mesh(innerCircleGeom, innerCircleMat);
innerCircle.rotation.x = -Math.PI / 2;
innerCircle.position.y = 0.31;
scene.add(innerCircle);

// Create fallback player models (boxes that look like sumo vehicles)
function createFallbackPlayer(color) {
    const group = new THREE.Group();

    // Body
    const bodyGeom = new THREE.BoxGeometry(1.5, 0.6, 1.0);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.3,
        metalness: 0.6,
        roughness: 0.3
    });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.3;
    body.castShadow = true;
    group.add(body);

    // Top/cabin
    const topGeom = new THREE.BoxGeometry(0.8, 0.4, 0.8);
    const topMat = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.2,
        metalness: 0.7,
        roughness: 0.2
    });
    const top = new THREE.Mesh(topGeom, topMat);
    top.position.y = 0.8;
    top.position.x = -0.1;
    top.castShadow = true;
    group.add(top);

    // Front bumper
    const bumperGeom = new THREE.BoxGeometry(0.2, 0.3, 1.1);
    const bumperMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
    const bumper = new THREE.Mesh(bumperGeom, bumperMat);
    bumper.position.set(0.85, 0.2, 0);
    group.add(bumper);

    // Wheels
    const wheelGeom = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
    const wheelPositions = [
        [0.5, 0.1, 0.55], [0.5, 0.1, -0.55],
        [-0.5, 0.1, 0.55], [-0.5, 0.1, -0.55]
    ];
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeom, wheelMat);
        wheel.position.set(...pos);
        wheel.rotation.x = Math.PI / 2;
        group.add(wheel);
    });

    // Headlights
    const lightGeom = new THREE.SphereGeometry(0.08, 8, 8);
    const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 1 });
    [-0.3, 0.3].forEach(z => {
        const headlight = new THREE.Mesh(lightGeom, lightMat);
        headlight.position.set(0.76, 0.35, z);
        group.add(headlight);
    });

    return group;
}

let player1Model = null;
let player2Model = null;
let modelsLoaded = false;

// Try loading GLTF model, fallback to boxes
const loader = new GLTFLoader();

function applyTint(model, color) {
    model.traverse((child) => {
        if (child.isMesh && child.material) {
            const mat = child.material.clone();
            mat.emissive = new THREE.Color(color);
            mat.emissiveIntensity = 0.3;
            child.material = mat;
            child.castShadow = true;
        }
    });
}

function setupPlayers(p1, p2) {
    player1Model = p1;
    player2Model = p2;

    player1Model.position.set(-3, 0.3, 0);
    player1Model.rotation.y = 0; // facing +X

    player2Model.position.set(3, 0.3, 0);
    player2Model.rotation.y = Math.PI; // facing -X

    scene.add(player1Model);
    scene.add(player2Model);
    modelsLoaded = true;
}

// Try to load the GLB file
loader.load(
    '._ferrari.glb',
    (gltf) => {
        const model1 = gltf.scene;
        // Calculate bounding box to scale properly
        const box = new THREE.Box3().setFromObject(model1);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 1.5 / maxDim;
        model1.scale.setScalar(scaleFactor);

        applyTint(model1, 0xff0000);

        const model2 = model1.clone();
        applyTint(model2, 0x0066ff);

        setupPlayers(model1, model2);
    },
    undefined,
    (error) => {
        console.log('GLB load failed, using fallback models:', error);
        const p1 = createFallbackPlayer(0xff2222);
        const p2 = createFallbackPlayer(0x2266ff);
        setupPlayers(p1, p2);
    }
);

// If model doesn't load within 2 seconds, use fallback
setTimeout(() => {
    if (!modelsLoaded) {
        console.log('Timeout: using fallback models');
        const p1 = createFallbackPlayer(0xff2222);
        const p2 = createFallbackPlayer(0x2266ff);
        setupPlayers(p1, p2);
    }
}, 2000);

// Particle effects
const particles = [];
function createCollisionParticles(x, z) {
    for (let i = 0; i < 8; i++) {
        const geom = new THREE.SphereGeometry(0.05, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.set(x, 0.5, z);
        const vx = (Math.random() - 0.5) * 0.3;
        const vy = Math.random() * 0.2 + 0.1;
        const vz = (Math.random() - 0.5) * 0.3;
        scene.add(mesh);
        particles.push({ mesh, vx, vy, vz, life: 30 });
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.x += p.vx;
        p.mesh.position.y += p.vy;
        p.mesh.position.z += p.vz;
        p.vy -= 0.01;
        p.life--;
        p.mesh.material.opacity = p.life / 30;
        p.mesh.material.transparent = true;
        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
        }
    }
}

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;
    if (e.key.toLowerCase() === 'r') resetMatch();
    if (e.key.toLowerCase() === 'p') togglePause();
});
window.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = false;
    keys[e.key.toLowerCase()] = false;
});

// UI elements
const p1StatsEl = document.getElementById('p1Stats');
const p2StatsEl = document.getElementById('p2Stats');
const roundInfoEl = document.getElementById('roundInfo');
const winBannerEl = document.getElementById('winBanner');
const startBtn = document.getElementById('startBtn');
const pauseOverlay = document.getElementById('pauseOverlay');

const p1HealthBarContainer = document.getElementById('p1HealthBar');
const p1HealthBarFill = p1HealthBarContainer.querySelector('.health-bar-fill');
const p1StaminaBarContainer = document.getElementById('p1StaminaBar');
const p1StaminaBarFill = p1StaminaBarContainer.querySelector('.stamina-bar-fill');

const p2HealthBarContainer = document.getElementById('p2HealthBar');
const p2HealthBarFill = p2HealthBarContainer.querySelector('.health-bar-fill');
const p2StaminaBarContainer = document.getElementById('p2StaminaBar');
const p2StaminaBarFill = p2StaminaBarContainer.querySelector('.stamina-bar-fill');

startBtn.addEventListener('click', () => {
    state.gameStarted = true;
    state.matchActive = true;
    startBtn.style.display = 'none';
});

function togglePause() {
    if (!state.gameStarted) return;
    state.paused = !state.paused;
    pauseOverlay.style.display = state.paused ? 'block' : 'none';
}

let winTimer = 0;

function resetMatch() {
    state.p1.x = -3; state.p1.z = 0; state.p1.vx = 0; state.p1.vz = 0;
    state.p1.health = 100; state.p1.stamina = 100; state.p1.charging = false;
    state.p2.x = 3; state.p2.z = 0; state.p2.vx = 0; state.p2.vz = 0;
    state.p2.health = 100; state.p2.stamina = 100; state.p2.charging = false;
    state.winner = null;
    state.ringOutPlayer = null;
    state.matchActive = true;
    state.lastCollisionSpeed = 0;
    winBannerEl.style.display = 'none';
    winTimer = 0;

    if (player1Model) {
        player1Model.position.set(-3, 0.3, 0);
        player1Model.rotation.y = 0;
    }
    if (player2Model) {
        player2Model.position.set(3, 0.3, 0);
        player2Model.rotation.y = Math.PI;
    }
}

function declareWinner(winner, ringOut) {
    state.winner = winner;
    state.matchActive = false;
    if (ringOut) state.ringOutPlayer = winner === 1 ? 2 : 1;

    if (winner === 1) state.p1.wins++;
    else state.p2.wins++;

    const reason = ringOut ? ' (Ring Out!)' : ' (KO!)';
    winBannerEl.textContent = `PLAYER ${winner} WINS!${reason}`;
    winBannerEl.style.display = 'block';
    winTimer = 180; // 3 seconds at 60fps
}

function safeNum(v) {
    return (typeof v === 'number' && !isNaN(v)) ? v : 0;
}

function updateHealthBars() {
    if (!player1Model || !player2Model) return;

    // Project 3D positions to 2D screen
    const p1Pos = new THREE.Vector3(state.p1.x, 1.5, state.p1.z);
    const p2Pos = new THREE.Vector3(state.p2.x, 1.5, state.p2.z);

    p1Pos.project(camera);
    p2Pos.project(camera);

    const w = window.innerWidth;
    const h = window.innerHeight;

    const p1x = (p1Pos.x * 0.5 + 0.5) * w;
    const p1y = (-p1Pos.y * 0.5 + 0.5) * h;
    const p2x = (p2Pos.x * 0.5 + 0.5) * w;
    const p2y = (-p2Pos.y * 0.5 + 0.5) * h;

    p1HealthBarContainer.style.display = 'block';
    p1HealthBarContainer.style.left = (p1x - 30) + 'px';
    p1HealthBarContainer.style.top = (p1y - 20) + 'px';
    p1HealthBarFill.style.width = Math.max(0, state.p1.health) + '%';

    p1StaminaBarContainer.style.display = 'block';
    p1StaminaBarContainer.style.left = (p1x - 30) + 'px';
    p1StaminaBarContainer.style.top = (p1y - 10) + 'px';
    p1StaminaBarFill.style.width = Math.max(0, state.p1.stamina) + '%';

    p2HealthBarContainer.style.display = 'block';
    p2HealthBarContainer.style.left = (p2x - 30) + 'px';
    p2HealthBarContainer.style.top = (p2y - 20) + 'px';
    p2HealthBarFill.style.width = Math.max(0, state.p2.health) + '%';

    p2StaminaBarContainer.style.display = 'block';
    p2StaminaBarContainer.style.left = (p2x - 30) + 'px';
    p2StaminaBarContainer.style.top = (p2y - 10) + 'px';
    p2StaminaBarFill.style.width = Math.max(0, state.p2.stamina) + '%';
}

// Game loop
function animate() {
    requestAnimationFrame(animate);
    state.frameCount++;

    if (state.gameStarted && !state.paused && state.matchActive && modelsLoaded) {
        // Player 1 controls (WASD + Shift)
        const p1Charging = keys['shift'] || keys['ShiftLeft'] || keys['ShiftRight'];
        state.p1.charging = p1Charging;
        let p1Force = 0.15;
        if (p1Charging && state.p1.stamina > 0) {
            p1Force = 0.30;
            state.p1.stamina = Math.max(0, state.p1.stamina - 2);
        }

        if (keys['w']) state.p1.vz -= p1Force;
        if (keys['s']) state.p1.vz += p1Force;
        if (keys['a']) state.p1.vx -= p1Force;
        if (keys['d']) state.p1.vx += p1Force;

        // Player 2 controls (Arrows + Space)
        const p2Charging = keys[' '] || keys['Space'];
        state.p2.charging = p2Charging;
        let p2Force = 0.15;
        if (p2Charging && state.p2.stamina > 0) {
            p2Force = 0.30;
            state.p2.stamina = Math.max(0, state.p2.stamina - 2);
        }

        if (keys['arrowup']) state.p2.vz -= p2Force;
        if (keys['arrowdown']) state.p2.vz += p2Force;
        if (keys['arrowleft']) state.p2.vx -= p2Force;
        if (keys['arrowright']) state.p2.vx += p2Force;

        // Stamina regen
        if (!p1Charging) state.p1.stamina = Math.min(100, state.p1.stamina + 0.5);
        if (!p2Charging) state.p2.stamina = Math.min(100, state.p2.stamina + 0.5);

        // Friction
        state.p1.vx *= 0.95;
        state.p1.vz *= 0.95;
        state.p2.vx *= 0.95;
        state.p2.vz *= 0.95;

        // Clamp velocities
        const maxSpeed = 2.0;
        const p1Speed = Math.sqrt(state.p1.vx * state.p1.vx + state.p1.vz * state.p1.vz);
        if (p1Speed > maxSpeed) {
            state.p1.vx = (state.p1.vx / p1Speed) * maxSpeed;
            state.p1.vz = (state.p1.vz / p1Speed) * maxSpeed;
        }
        const p2Speed = Math.sqrt(state.p2.vx * state.p2.vx + state.p2.vz * state.p2.vz);
        if (p2Speed > maxSpeed) {
            state.p2.vx = (state.p2.vx / p2Speed) * maxSpeed;
            state.p2.vz = (state.p2.vz / p2Speed) * maxSpeed;
        }

        // Collision detection
        const dx = state.p2.x - state.p1.x;
        const dz = state.p2.z - state.p1.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 2.0 && dist > 0.001) {
            const nx = dx / dist;
            const nz = dz / dist;

            // Relative velocity
            const relVx = state.p1.vx - state.p2.vx;
            const relVz = state.p1.vz - state.p2.vz;
            const relSpeed = Math.sqrt(relVx * relVx + relVz * relVz);
            state.lastCollisionSpeed = safeNum(relSpeed);

            // Dot product of relative velocity and collision normal
            const relDotN = relVx * nx + relVz * nz;

            if (relDotN > 0) {
                // Elastic collision response
                state.p1.vx -= relDotN * nx;
                state.p1.vz -= relDotN * nz;
                state.p2.vx += relDotN * nx;
                state.p2.vz += relDotN * nz;
            }

            // Push apart
            const overlap = 2.0 - dist;
            state.p1.x -= nx * overlap * 0.5;
            state.p1.z -= nz * overlap * 0.5;
            state.p2.x += nx * overlap * 0.5;
            state.p2.z += nz * overlap * 0.5;

            // Damage
            const damage = relSpeed * 5;
            state.p1.health -= damage;
            state.p2.health -= damage;

            // Particles
            const cx = (state.p1.x + state.p2.x) / 2;
            const cz = (state.p1.z + state.p2.z) / 2;
            if (relSpeed > 0.3) createCollisionParticles(cx, cz);
        }

        // Apply velocity
        state.p1.x += state.p1.vx;
        state.p1.z += state.p1.vz;
        state.p2.x += state.p2.vx;
        state.p2.z += state.p2.vz;

        // Ring-out check
        const p1Dist = Math.sqrt(state.p1.x * state.p1.x + state.p1.z * state.p1.z);
        const p2Dist = Math.sqrt(state.p2.x * state.p2.x + state.p2.z * state.p2.z);

        if (p1Dist > 8.0) {
            declareWinner(2, true);
        } else if (p2Dist > 8.0) {
            declareWinner(1, true);
        }

        // Health check
        if (state.matchActive) {
            if (state.p1.health <= 0 && state.p2.health <= 0) {
                // Both KO - whoever has more health wins, or P2 wins by default
                declareWinner(state.p1.health >= state.p2.health ? 1 : 2, false);
            } else if (state.p1.health <= 0) {
                declareWinner(2, false);
            } else if (state.p2.health <= 0) {
                declareWinner(1, false);
            }
        }

        // Update model positions
        if (player1Model) {
            player1Model.position.x = state.p1.x;
            player1Model.position.z = state.p1.z;
            // Face movement direction
            if (Math.abs(state.p1.vx) > 0.01 || Math.abs(state.p1.vz) > 0.01) {
                player1Model.rotation.y = Math.atan2(-state.p1.vz, state.p1.vx) - Math.PI / 2;
            }
        }
        if (player2Model) {
            player2Model.position.x = state.p2.x;
            player2Model.position.z = state.p2.z;
            if (Math.abs(state.p2.vx) > 0.01 || Math.abs(state.p2.vz) > 0.01) {
                player2Model.rotation.y = Math.atan2(-state.p2.vz, state.p2.vx) - Math.PI / 2;
            }
        }
    }

    // Win timer
    if (winTimer > 0) {
        winTimer--;
        if (winTimer === 0) {
            state.round++;
            resetMatch();
        }
    }

    // Sanitize state
    state.p1.x = safeNum(state.p1.x);
    state.p1.z = safeNum(state.p1.z);
    state.p1.vx = safeNum(state.p1.vx);
    state.p1.vz = safeNum(state.p1.vz);
    state.p1.health = safeNum(state.p1.health);
    state.p1.stamina = safeNum(state.p1.stamina);
    state.p2.x = safeNum(state.p2.x);
    state.p2.z = safeNum(state.p2.z);
    state.p2.vx = safeNum(state.p2.vx);
    state.p2.vz = safeNum(state.p2.vz);
    state.p2.health = safeNum(state.p2.health);
    state.p2.stamina = safeNum(state.p2.stamina);
    state.lastCollisionSpeed = safeNum(state.lastCollisionSpeed);
    state.frameCount = safeNum(state.frameCount);

    // Update particles
    updateParticles();

    // Update UI
    p1StatsEl.textContent = `Player 1 HP: ${Math.max(0, Math.round(state.p1.health))} | Stamina: ${Math.round(state.p1.stamina)}`;
    p2StatsEl.textContent = `Player 2 HP: ${Math.max(0, Math.round(state.p2.health))} | Stamina: ${Math.round(state.p2.stamina)}`;
    roundInfoEl.textContent = `Round: ${state.round} | P1 Wins: ${state.p1.wins} | P2 Wins: ${state.p2.wins}`;

    updateHealthBars();

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
