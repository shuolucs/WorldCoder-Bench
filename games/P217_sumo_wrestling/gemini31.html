<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sumo Wrestling</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            top: 10px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
        #p1-hud {
            left: 20px;
            color: #ff4444;
        }
        #p2-hud {
            right: 20px;
            color: #4444ff;
            text-align: right;
        }
        #center-hud {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
        }
        #banner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            font-weight: bold;
            color: gold;
            text-shadow: 3px 3px 5px black;
            display: none;
            pointer-events: none;
            text-align: center;
            z-index: 10;
        }
        #startBtn {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 30px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: 3px solid white;
            border-radius: 10px;
            cursor: pointer;
            z-index: 20;
        }
        #startBtn:hover {
            background-color: #45a049;
        }
        .health-bar-container {
            position: absolute;
            width: 100px;
            height: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid white;
            transform: translate(-50%, -50%);
            pointer-events: none;
            display: none;
        }
        .health-bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.1s;
        }
        #p1-hb-fill { background-color: red; }
        #p2-hb-fill { background-color: blue; }
        #pause-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            color: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            z-index: 15;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="p1-hud" class="hud">Player 1 HP: 100 | Stamina: 100</div>
    <div id="p2-hud" class="hud">Player 2 HP: 100 | Stamina: 100</div>
    <div id="center-hud" class="hud">Round: 1<br>P1 Wins: 0 | P2 Wins: 0</div>
    
    <div id="banner">PLAYER 1 WINS!</div>
    <button id="startBtn">START MATCH</button>
    <div id="pause-overlay">PAUSED</div>

    <div id="p1-hb" class="health-bar-container"><div id="p1-hb-fill" class="health-bar-fill"></div></div>
    <div id="p2-hb" class="health-bar-container"><div id="p2-hb-fill" class="health-bar-fill"></div></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            paused: false,
            round: 1,
            p1: { x: -3, z: 0, vx: 0, vz: 0, health: 100, stamina: 100, wins: 0, charging: false },
            p2: { x: 3, z: 0, vx: 0, vz: 0, health: 100, stamina: 100, wins: 0, charging: false },
            lastCollisionSpeed: 0,
            winner: null,
            ringOutPlayer: null,
            matchActive: false,
            frameCount: 0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 18);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x006400 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Arena (Dohyo)
        const arenaRadius = 8;
        const arenaGeo = new THREE.CylinderGeometry(arenaRadius, arenaRadius, 0.3, 64);
        const arenaMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C });
        const arena = new THREE.Mesh(arenaGeo, arenaMat);
        arena.position.y = 0.15;
        arena.receiveShadow = true;
        scene.add(arena);

        // Border Ring
        const ringGeo = new THREE.TorusGeometry(arenaRadius, 0.15, 16, 100);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        ring.position.y = 0.3;
        scene.add(ring);

        // --- Players Setup ---
        const players = {
            1: { mesh: null, state: state.p1, startPos: new THREE.Vector3(-3, 0.3, 0), startRot: Math.PI / 2 },
            2: { mesh: null, state: state.p2, startPos: new THREE.Vector3(3, 0.3, 0), startRot: -Math.PI / 2 }
        };

        // Fallback geometry in case GLTF fails
        function createFallbackMesh(color) {
            const geo = new THREE.BoxGeometry(1.5, 0.8, 3);
            const mat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.2 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            return mesh;
        }

        function setupPlayerMesh(mesh, playerNum) {
            // Calculate bounding box to scale to ~1.5 units wide
            const box = new THREE.Box3().setFromObject(mesh);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.z);
            const scale = 1.5 / maxDim;
            mesh.scale.setScalar(scale);

            // Apply emissive tint
            const tintColor = playerNum === 1 ? 0xff0000 : 0x0000ff;
            mesh.traverse((child) => {
                if (child.isMesh) {
                    child.material = child.material.clone();
                    child.material.emissive.setHex(tintColor);
                    child.material.emissiveIntensity = 0.4;
                    child.castShadow = true;
                }
            });

            // Center geometry
            const center = box.getCenter(new THREE.Vector3());
            mesh.position.sub(center.multiplyScalar(scale));
            
            const wrapper = new THREE.Group();
            wrapper.add(mesh);
            wrapper.position.copy(players[playerNum].startPos);
            wrapper.rotation.y = players[playerNum].startRot;
            scene.add(wrapper);
            players[playerNum].mesh = wrapper;
        }

        const loader = new GLTFLoader();
        loader.load('._ferrari.glb', (gltf) => {
            setupPlayerMesh(gltf.scene, 1);
            
            loader.load('._ferrari.glb', (gltf2) => {
                setupPlayerMesh(gltf2.scene, 2);
            }, undefined, () => {
                // Fallback for P2 if clone/second load fails
                setupPlayerMesh(createFallbackMesh(0x0000ff), 2);
            });
        }, undefined, (error) => {
            console.warn("Could not load ._ferrari.glb, using fallback boxes.", error);
            setupPlayerMesh(createFallbackMesh(0xff0000), 1);
            setupPlayerMesh(createFallbackMesh(0x0000ff), 2);
        });

        // --- Input Handling ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'KeyR') resetMatch();
            if (e.code === 'KeyP') togglePause();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            state.gameStarted = true;
            state.matchActive = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('p1-hb').style.display = 'block';
            document.getElementById('p2-hb').style.display = 'block';
        });

        function togglePause() {
            if (!state.gameStarted || !state.matchActive) return;
            state.paused = !state.paused;
            document.getElementById('pause-overlay').style.display = state.paused ? 'flex' : 'none';
        }

        function resetMatch() {
            state.p1.health = 100; state.p1.stamina = 100; state.p1.vx = 0; state.p1.vz = 0;
            state.p2.health = 100; state.p2.stamina = 100; state.p2.vx = 0; state.p2.vz = 0;
            state.p1.x = players[1].startPos.x; state.p1.z = players[1].startPos.z;
            state.p2.x = players[2].startPos.x; state.p2.z = players[2].startPos.z;
            
            if (players[1].mesh) {
                players[1].mesh.position.set(state.p1.x, players[1].startPos.y, state.p1.z);
                players[1].mesh.rotation.y = players[1].startRot;
            }
            if (players[2].mesh) {
                players[2].mesh.position.set(state.p2.x, players[2].startPos.y, state.p2.z);
                players[2].mesh.rotation.y = players[2].startRot;
            }

            state.winner = null;
            state.ringOutPlayer = null;
            state.lastCollisionSpeed = 0;
            state.matchActive = state.gameStarted;
            document.getElementById('banner').style.display = 'none';
            updateUI();
        }

        function handleWin(winnerNum, isRingOut = false) {
            if (!state.matchActive) return;
            state.matchActive = false;
            state.winner = winnerNum;
            if (winnerNum === 1) state.p1.wins++;
            if (winnerNum === 2) state.p2.wins++;
            
            const banner = document.getElementById('banner');
            banner.innerHTML = `PLAYER ${winnerNum} WINS!` + (isRingOut ? "<br><span style='font-size:30px'>RING OUT!</span>" : "");
            banner.style.color = winnerNum === 1 ? '#ff4444' : '#4444ff';
            banner.style.display = 'block';

            setTimeout(() => {
                state.round++;
                resetMatch();
            }, 3000);
        }

        // --- Game Loop ---
        function updatePhysics() {
            if (!state.matchActive || state.paused) return;

            // P1 Controls
            let p1ForceX = 0, p1ForceZ = 0;
            if (keys['KeyW']) p1ForceZ -= 1;
            if (keys['KeyS']) p1ForceZ += 1;
            if (keys['KeyA']) p1ForceX -= 1;
            if (keys['KeyD']) p1ForceX += 1;

            let p1ForceMag = 0.15;
            state.p1.charging = false;
            if (keys['ShiftLeft'] || keys['ShiftRight']) {
                if (state.p1.stamina > 0 && (p1ForceX !== 0 || p1ForceZ !== 0)) {
                    p1ForceMag = 0.30;
                    state.p1.stamina = Math.max(0, state.p1.stamina - 2);
                    state.p1.charging = true;
                }
            }
            if (!state.p1.charging) state.p1.stamina = Math.min(100, state.p1.stamina + 0.5);

            if (p1ForceX !== 0 || p1ForceZ !== 0) {
                const len = Math.sqrt(p1ForceX*p1ForceX + p1ForceZ*p1ForceZ);
                state.p1.vx += (p1ForceX / len) * p1ForceMag;
                state.p1.vz += (p1ForceZ / len) * p1ForceMag;
            }

            // P2 Controls
            let p2ForceX = 0, p2ForceZ = 0;
            if (keys['ArrowUp']) p2ForceZ -= 1;
            if (keys['ArrowDown']) p2ForceZ += 1;
            if (keys['ArrowLeft']) p2ForceX -= 1;
            if (keys['ArrowRight']) p2ForceX += 1;

            let p2ForceMag = 0.15;
            state.p2.charging = false;
            if (keys['Space']) {
                if (state.p2.stamina > 0 && (p2ForceX !== 0 || p2ForceZ !== 0)) {
                    p2ForceMag = 0.30;
                    state.p2.stamina = Math.max(0, state.p2.stamina - 2);
                    state.p2.charging = true;
                }
            }
            if (!state.p2.charging) state.p2.stamina = Math.min(100, state.p2.stamina + 0.5);

            if (p2ForceX !== 0 || p2ForceZ !== 0) {
                const len = Math.sqrt(p2ForceX*p2ForceX + p2ForceZ*p2ForceZ);
                state.p2.vx += (p2ForceX / len) * p2ForceMag;
                state.p2.vz += (p2ForceZ / len) * p2ForceMag;
            }

            // Apply Friction
            state.p1.vx *= 0.95; state.p1.vz *= 0.95;
            state.p2.vx *= 0.95; state.p2.vz *= 0.95;

            // Update Positions
            state.p1.x += state.p1.vx; state.p1.z += state.p1.vz;
            state.p2.x += state.p2.vx; state.p2.z += state.p2.vz;

            // Collision Detection
            const dx = state.p2.x - state.p1.x;
            const dz = state.p2.z - state.p1.z;
            const dist = Math.sqrt(dx*dx + dz*dz);

            if (dist < 2.0 && dist > 0.001) {
                // Normal vector
                const nx = dx / dist;
                const nz = dz / dist;

                // Relative velocity
                const rvx = state.p2.vx - state.p1.vx;
                const rvz = state.p2.vz - state.p1.vz;
                const velAlongNormal = rvx * nx + rvz * nz;

                // Only resolve if moving towards each other
                if (velAlongNormal < 0) {
                    const restitution = 0.5; // Elasticity
                    const impulse = -(1 + restitution) * velAlongNormal / 2; // mass = 1 for both

                    state.p1.vx -= impulse * nx;
                    state.p1.vz -= impulse * nz;
                    state.p2.vx += impulse * nx;
                    state.p2.vz += impulse * nz;

                    // Damage
                    const speed = Math.abs(velAlongNormal);
                    state.lastCollisionSpeed = speed;
                    const damage = speed * 5;
                    state.p1.health = Math.max(0, state.p1.health - damage);
                    state.p2.health = Math.max(0, state.p2.health - damage);
                }

                // Positional correction to prevent sticking
                const overlap = 2.0 - dist;
                state.p1.x -= nx * overlap / 2;
                state.p1.z -= nz * overlap / 2;
                state.p2.x += nx * overlap / 2;
                state.p2.z += nz * overlap / 2;
            }

            // Update Meshes
            if (players[1].mesh) {
                players[1].mesh.position.set(state.p1.x, players[1].startPos.y, state.p1.z);
                if (Math.abs(state.p1.vx) > 0.01 || Math.abs(state.p1.vz) > 0.01) {
                    players[1].mesh.rotation.y = Math.atan2(state.p1.vx, state.p1.vz);
                }
            }
            if (players[2].mesh) {
                players[2].mesh.position.set(state.p2.x, players[2].startPos.y, state.p2.z);
                if (Math.abs(state.p2.vx) > 0.01 || Math.abs(state.p2.vz) > 0.01) {
                    players[2].mesh.rotation.y = Math.atan2(state.p2.vx, state.p2.vz);
                }
            }

            // Win Conditions
            if (state.p1.health <= 0 && state.p2.health <= 0) {
                handleWin(state.p1.health > state.p2.health ? 1 : 2); // Edge case tie breaker
            } else if (state.p1.health <= 0) {
                handleWin(2);
            } else if (state.p2.health <= 0) {
                handleWin(1);
            }

            // Ring Out
            const p1DistOrigin = Math.sqrt(state.p1.x*state.p1.x + state.p1.z*state.p1.z);
            const p2DistOrigin = Math.sqrt(state.p2.x*state.p2.x + state.p2.z*state.p2.z);

            if (p1DistOrigin > arenaRadius) {
                state.ringOutPlayer = 1;
                handleWin(2, true);
            } else if (p2DistOrigin > arenaRadius) {
                state.ringOutPlayer = 2;
                handleWin(1, true);
            }
        }

        function updateUI() {
            document.getElementById('p1-hud').innerText = `Player 1 HP: ${Math.ceil(state.p1.health)} | Stamina: ${Math.floor(state.p1.stamina)}`;
            document.getElementById('p2-hud').innerText = `Player 2 HP: ${Math.ceil(state.p2.health)} | Stamina: ${Math.floor(state.p2.stamina)}`;
            document.getElementById('center-hud').innerHTML = `Round: ${state.round}<br>P1 Wins: ${state.p1.wins} | P2 Wins: ${state.p2.wins}`;

            document.getElementById('p1-hb-fill').style.width = `${state.p1.health}%`;
            document.getElementById('p2-hb-fill').style.width = `${state.p2.health}%`;

            // Project 3D pos to 2D screen for health bars
            const updateHBPos = (playerNum, hbId) => {
                if (!players[playerNum].mesh || !state.gameStarted) return;
                const pos = players[playerNum].mesh.position.clone();
                pos.y += 2.5; // Offset above car
                pos.project(camera);
                
                const x = (pos.x * .5 + .5) * window.innerWidth;
                const y = (pos.y * -.5 + .5) * window.innerHeight;
                
                const hb = document.getElementById(hbId);
                if (pos.z < 1) { // Behind camera check
                    hb.style.left = `${x}px`;
                    hb.style.top = `${y}px`;
                    hb.style.display = 'block';
                } else {
                    hb.style.display = 'none';
                }
            };

            if(state.matchActive) {
                updateHBPos(1, 'p1-hb');
                updateHBPos(2, 'p2-hb');
            } else {
                document.getElementById('p1-hb').style.display = 'none';
                document.getElementById('p2-hb').style.display = 'none';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            state.frameCount++;
            
            updatePhysics();
            updateUI();
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
