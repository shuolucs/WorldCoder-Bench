<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Abstract Particle Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
            border-bottom-right-radius: 8px;
            transition: opacity 0.3s;
        }
        .hud-line {
            margin: 5px 0;
        }
        .label {
            color: #aaa;
        }
        .value {
            font-weight: bold;
            color: #fff;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="hud-line"><span class="label">Mode: </span><span id="mode-display" class="value">fountain</span></div>
        <div class="hud-line"><span class="label">Particles: </span><span id="particle-count" class="value">0</span></div>
        <div class="hud-line"><span class="label">Bursts: </span><span id="burst-count" class="value">0</span></div>
        <div class="hud-line"><span class="label">Color Scheme: </span><span id="color-scheme" class="value">0</span></div>
        <div class="hud-line"><span class="label">State: </span><span id="pause-state" class="value">PLAYING</span></div>
        <div class="hud-line"><span class="label">FPS: </span><span id="fps-display" class="value">0</span></div>
        <div class="hud-line" style="margin-top: 10px; font-size: 0.8em; color: #888;">
            [1,2,3] Modes | [Space] Pause | [Click] Burst<br>
            [R] Reset | [C] Colors | [H] Toggle HUD
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            duckLoaded: false,
            particleCount: 0,
            mode: 'fountain',
            paused: false,
            burstCount: 0,
            colorScheme: 0,
            duckRotationY: 0,
            hudVisible: true,
            totalParticlesSpawned: 0,
            elapsedTime: 0,
            frameCount: 0
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 10, 5);
        scene.add(pointLight);

        // --- Load Duck Model ---
        window.__duck__ = null;
        const loader = new GLTFLoader();
        // Using a reliable raw github link for the standard glTF sample duck
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb', (gltf) => {
            const duck = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(duck);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            duck.position.x += (duck.position.x - center.x);
            duck.position.y += (duck.position.y - center.y);
            duck.position.z += (duck.position.z - center.z);
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.0 / maxDim;
            duck.scale.setScalar(scale);
            
            scene.add(duck);
            window.__duck__ = duck;
            state.duckLoaded = true;
        });

        // --- Particle System ---
        const BASE_PARTICLES = 2000;
        const BURST_CAPACITY = 2000; // Allow up to 10 simultaneous bursts
        const TOTAL_PARTICLES = BASE_PARTICLES + BURST_CAPACITY;

        const palettes = [
            [0xff00ff, 0x00ffff, 0xffd700, 0x00ff00], // Magenta, Cyan, Gold, Lime
            [0xff0000, 0xffa500, 0xffff00, 0xffffff], // Red, Orange, Yellow, White
            [0x0000ff, 0x800080, 0xffc0cb, 0xffffff]  // Blue, Purple, Pink, White
        ];

        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(TOTAL_PARTICLES * 3);
        const colors = new Float32Array(TOTAL_PARTICLES * 3);
        const sizes = new Float32Array(TOTAL_PARTICLES);
        const alphas = new Float32Array(TOTAL_PARTICLES);

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
        geometry.setAttribute('alpha', new THREE.BufferAttribute(alphas, 1));

        // Custom Shader Material for particles
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 }
            },
            vertexShader: `
                attribute float size;
                attribute float alpha;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vColor = color;
                    vAlpha = alpha;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vec2 xy = gl_PointCoord.xy - vec2(0.5);
                    float ll = length(xy);
                    if(ll > 0.5) discard;
                    // Soft edge
                    float a = vAlpha * smoothstep(0.5, 0.1, ll);
                    gl_FragColor = vec4(vColor, a);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Particle Data (JS side)
        const pData = [];
        for (let i = 0; i < TOTAL_PARTICLES; i++) {
            pData.push({
                vel: new THREE.Vector3(),
                life: 0,
                maxLife: 1,
                active: false,
                isBase: i < BASE_PARTICLES
            });
        }

        function spawnParticle(index, centerPos = new THREE.Vector3(0,0,0)) {
            const p = pData[index];
            p.active = true;
            p.maxLife = 2 + Math.random() * 3;
            p.life = p.maxLife;

            // Position: random in sphere r=1.5
            const r = 1.5 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            
            positions[index * 3] = centerPos.x + r * Math.sin(phi) * Math.cos(theta);
            positions[index * 3 + 1] = centerPos.y + r * Math.sin(phi) * Math.sin(theta);
            positions[index * 3 + 2] = centerPos.z + r * Math.cos(phi);

            // Velocity based on mode
            if (state.mode === 'fountain') {
                p.vel.set(
                    (Math.random() - 0.5) * 1.5,
                    3 + Math.random() * 4,
                    (Math.random() - 0.5) * 1.5
                );
            } else if (state.mode === 'vortex') {
                const angle = Math.atan2(positions[index*3+2], positions[index*3]);
                const speed = 2 + Math.random() * 2;
                p.vel.set(
                    -Math.sin(angle) * speed + (Math.random()-0.5),
                    (Math.random() - 0.5) * 2,
                    Math.cos(angle) * speed + (Math.random()-0.5)
                );
            } else if (state.mode === 'explosion') {
                const dir = new THREE.Vector3(
                    positions[index*3] - centerPos.x,
                    positions[index*3+1] - centerPos.y,
                    positions[index*3+2] - centerPos.z
                ).normalize();
                const speed = 3 + Math.random() * 5;
                p.vel.copy(dir).multiplyScalar(speed);
            }

            // Color
            const palette = palettes[state.colorScheme];
            const colorHex = palette[Math.floor(Math.random() * palette.length)];
            const c = new THREE.Color(colorHex);
            colors[index * 3] = c.r;
            colors[index * 3 + 1] = c.g;
            colors[index * 3 + 2] = c.b;

            sizes[index] = 0.5 + Math.random() * 1.5;
            alphas[index] = 1.0;

            state.totalParticlesSpawned++;
        }

        // Initial spawn for base particles
        for (let i = 0; i < BASE_PARTICLES; i++) {
            spawnParticle(i);
            // Randomize initial life so they don't all die at once
            pData[i].life = Math.random() * pData[i].maxLife; 
        }

        // --- Interactions ---
        let targetDuckRotationY = 0;
        let mouseX = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            targetDuckRotationY = -mouseX * Math.PI;
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': state.mode = 'fountain'; break;
                case '2': state.mode = 'vortex'; break;
                case '3': state.mode = 'explosion'; break;
                case ' ': 
                    state.paused = !state.paused; 
                    document.getElementById('pause-state').innerText = state.paused ? 'PAUSED' : 'PLAYING';
                    break;
                case 'r':
                    state.mode = 'fountain';
                    state.burstCount = 0;
                    for(let i=0; i<TOTAL_PARTICLES; i++) {
                        if (pData[i].isBase) {
                            spawnParticle(i);
                        } else {
                            pData[i].active = false;
                            alphas[i] = 0;
                        }
                    }
                    geometry.attributes.position.needsUpdate = true;
                    geometry.attributes.alpha.needsUpdate = true;
                    break;
                case 'c':
                    state.colorScheme = (state.colorScheme + 1) % palettes.length;
                    break;
                case 'h':
                    state.hudVisible = !state.hudVisible;
                    document.getElementById('hud').style.opacity = state.hudVisible ? '1' : '0';
                    break;
            }
        });

        window.addEventListener('click', () => {
            state.burstCount++;
            
            // Random position near duck
            const burstCenter = new THREE.Vector3(
                (Math.random() - 0.5) * 3,
                (Math.random() - 0.5) * 3,
                (Math.random() - 0.5) * 3
            );

            let spawned = 0;
            for (let i = BASE_PARTICLES; i < TOTAL_PARTICLES && spawned < 200; i++) {
                if (!pData[i].active) {
                    spawnParticle(i, burstCenter);
                    spawned++;
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let lastTime = performance.now();
        let frames = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            state.frameCount++;

            // FPS Calculation
            const now = performance.now();
            frames++;
            if (now >= lastTime + 1000) {
                document.getElementById('fps-display').innerText = Math.round((frames * 1000) / (now - lastTime));
                frames = 0;
                lastTime = now;
            }

            // Duck Rotation
            if (window.__duck__) {
                window.__duck__.rotation.y += (targetDuckRotationY - window.__duck__.rotation.y) * 0.05;
                state.duckRotationY = window.__duck__.rotation.y;
            }

            if (!state.paused) {
                state.elapsedTime += dt;
                let activeCount = 0;

                for (let i = 0; i < TOTAL_PARTICLES; i++) {
                    const p = pData[i];
                    if (!p.active) continue;

                    p.life -= dt;

                    if (p.life <= 0) {
                        if (p.isBase) {
                            spawnParticle(i); // Respawn base
                        } else {
                            p.active = false; // Kill burst
                            alphas[i] = 0;
                        }
                        continue;
                    }

                    activeCount++;

                    // Apply forces based on mode
                    if (state.mode === 'fountain') {
                        p.vel.y -= 4 * dt; // Gravity
                    } else if (state.mode === 'vortex') {
                        // Spiral force
                        const px = positions[i*3];
                        const pz = positions[i*3+2];
                        p.vel.x += -pz * dt * 2;
                        p.vel.z += px * dt * 2;
                        // Pull to center slightly
                        p.vel.x -= px * dt * 0.5;
                        p.vel.z -= pz * dt * 0.5;
                    }

                    // Update position
                    positions[i * 3] += p.vel.x * dt;
                    positions[i * 3 + 1] += p.vel.y * dt;
                    positions[i * 3 + 2] += p.vel.z * dt;

                    // Fade out
                    alphas[i] = Math.max(0, p.life / p.maxLife);
                }

                state.particleCount = activeCount;

                geometry.attributes.position.needsUpdate = true;
                geometry.attributes.color.needsUpdate = true;
                geometry.attributes.size.needsUpdate = true;
                geometry.attributes.alpha.needsUpdate = true;
            }

            // Update HUD DOM
            if (state.hudVisible) {
                document.getElementById('mode-display').innerText = state.mode;
                document.getElementById('particle-count').innerText = state.particleCount;
                document.getElementById('burst-count').innerText = state.burstCount;
                document.getElementById('color-scheme').innerText = state.colorScheme;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
