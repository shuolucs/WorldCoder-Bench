<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Audio Spectrum Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #333;
            line-height: 1.5;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #222;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            transition: background 0.2s;
        }
        button:hover {
            background: #444;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid #333;
            text-align: right;
            line-height: 1.5;
            font-size: 12px;
            color: #aaa;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        Mode: <span id="hud-mode">bars</span><br>
        Gain: <span id="hud-gain">1.00</span>x<br>
        Status: <span id="hud-playing">Playing</span><br>
        Particles: <span id="hud-particles">ON</span> (<span id="hud-pcount">0</span>)
    </div>

    <div id="controls">
        <button id="gain-down">Gain -</button>
        <button id="gain-up">Gain +</button>
    </div>

    <div id="instructions">
        [1, 2, 3] Change Mode<br>
        [SPACE] Play/Pause Sim<br>
        [P] Toggle Particles<br>
        [R] Reset Camera<br>
        Drag to Rotate | Scroll to Zoom
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State ---
        const state = {
            mode: 'bars',
            playing: true,
            gain: 1.0,
            particlesEnabled: true,
            activeParticleCount: 0,
            barCount: 32,
            maxBarHeight: 1,
            avgBarHeight: 1,
            cameraDistance: 0,
            frameCount: 0,
            barPositions: [],
            timeElapsed: 0
        };
        window.__3D_STATE__ = state;

        let simTime = 0;
        const clock = new THREE.Clock();

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 60);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 40, 20);
        scene.add(dirLight);

        // --- Audio Spectrum Bars ---
        const bars = [];
        const barGeometry = new THREE.BoxGeometry(1.2, 1, 1.2);
        
        for (let i = 0; i < state.barCount; i++) {
            const material = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const bar = new THREE.Mesh(barGeometry, material);
            
            // Initial position (bars mode)
            bar.position.x = (i - (state.barCount - 1) / 2) * 2;
            bar.position.y = 0.5;
            bar.position.z = 0;
            
            scene.add(bar);
            bars.push(bar);
            state.barPositions.push({ x: bar.position.x, y: bar.position.y, z: bar.position.z });
        }

        // --- Particle System ---
        const maxParticles = 2000;
        const particleGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(maxParticles * 3);
        
        // Initialize offscreen
        for (let i = 0; i < maxParticles * 3; i++) {
            particlePositions[i] = 9999;
        }
        
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.3,
            color: 0x88ccff,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        
        const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleSystem);

        const particlesData = [];
        for (let i = 0; i < maxParticles; i++) {
            particlesData.push({
                active: false,
                x: 9999, y: 9999, z: 9999,
                vx: 0, vy: 0, vz: 0,
                life: 0
            });
        }

        // --- Controls & Events ---
        const resetCamera = () => {
            camera.position.set(0, 30, 60);
            controls.target.set(0, 0, 0);
        };

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': state.mode = 'bars'; break;
                case '2': state.mode = 'circular'; break;
                case '3': state.mode = 'wave'; break;
                case ' ': 
                    state.playing = !state.playing; 
                    e.preventDefault();
                    break;
                case 'p': state.particlesEnabled = !state.particlesEnabled; break;
                case 'r': resetCamera(); break;
            }
        });

        document.getElementById('gain-up').addEventListener('click', () => {
            state.gain = Math.min(3.0, state.gain + 0.25);
        });
        
        document.getElementById('gain-down').addEventListener('click', () => {
            state.gain = Math.max(0.25, state.gain - 0.25);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- DOM Elements for HUD ---
        const elMode = document.getElementById('hud-mode');
        const elGain = document.getElementById('hud-gain');
        const elPlaying = document.getElementById('hud-playing');
        const elParticles = document.getElementById('hud-particles');
        const elPCount = document.getElementById('hud-pcount');

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            state.timeElapsed += delta;
            state.frameCount++;
            
            if (state.playing) {
                simTime += delta;
            }

            let totalHeight = 0;
            let currentMaxHeight = 0;

            // Update Bars
            for (let i = 0; i < state.barCount; i++) {
                const bar = bars[i];
                
                // Calculate simulated frequency value
                let rawValue = Math.sin(simTime * (1 + i * 0.15)) * 0.5 + 0.5;
                rawValue += Math.cos(simTime * 0.7 + i * 0.3) * 0.3;
                
                // Clamp and apply gain
                let value = Math.max(0, Math.min(1, rawValue));
                value = Math.max(0, Math.min(1, value * state.gain));
                
                // Scale and Position Y
                const targetHeight = 1 + value * 25;
                bar.scale.y += (targetHeight - bar.scale.y) * 0.2; // Smooth scaling
                bar.position.y = bar.scale.y / 2;
                
                totalHeight += bar.scale.y;
                if (bar.scale.y > currentMaxHeight) currentMaxHeight = bar.scale.y;

                // Color mapping (Blue to Red)
                const hue = (1 - value) * 0.65;
                bar.material.color.setHSL(hue, 1.0, 0.5);

                // Target positions based on mode
                let tx = 0, tz = 0, targetRy = 0;
                
                if (state.mode === 'bars') {
                    tx = (i - (state.barCount - 1) / 2) * 2;
                    tz = 0;
                } else if (state.mode === 'circular') {
                    const angle = (i / state.barCount) * Math.PI * 2;
                    tx = Math.cos(angle) * 20;
                    tz = Math.sin(angle) * 20;
                    targetRy = -angle;
                } else if (state.mode === 'wave') {
                    tx = (i - (state.barCount - 1) / 2) * 2;
                    tz = Math.sin(i * 0.5 + simTime) * 5;
                }

                // Lerp position and rotation
                bar.position.x += (tx - bar.position.x) * 0.1;
                bar.position.z += (tz - bar.position.z) * 0.1;
                
                // Simple rotation lerp (handles basic transitions well enough)
                bar.rotation.y += (targetRy - bar.rotation.y) * 0.1;

                // Update state positions
                state.barPositions[i].x = bar.position.x;
                state.barPositions[i].y = bar.position.y;
                state.barPositions[i].z = bar.position.z;
            }

            state.avgBarHeight = totalHeight / state.barCount;
            state.maxBarHeight = currentMaxHeight;

            // Update Particles
            state.activeParticleCount = 0;
            const positions = particleGeometry.attributes.position.array;

            // Spawn new particles
            if (state.particlesEnabled && state.playing) {
                // Spawn rate based on average height
                const spawnCount = Math.floor(state.avgBarHeight / 2); 
                for (let k = 0; k < spawnCount; k++) {
                    const barIdx = Math.floor(Math.random() * state.barCount);
                    const bar = bars[barIdx];
                    
                    // Only spawn if bar is somewhat active
                    if (bar.scale.y > 3) {
                        const pIdx = particlesData.findIndex(p => !p.active);
                        if (pIdx !== -1) {
                            const p = particlesData[pIdx];
                            p.active = true;
                            p.x = bar.position.x + (Math.random() - 0.5) * 1.2;
                            p.y = bar.scale.y;
                            p.z = bar.position.z + (Math.random() - 0.5) * 1.2;
                            p.vx = (Math.random() - 0.5) * 0.05;
                            p.vy = 0.1 + Math.random() * 0.4;
                            p.vz = (Math.random() - 0.5) * 0.05;
                            p.life = 1.5 + Math.random() * 1.0; // ~2 seconds
                        }
                    }
                }
            }

            // Move and age particles
            for (let i = 0; i < maxParticles; i++) {
                const p = particlesData[i];
                if (p.active) {
                    p.life -= delta;
                    if (p.life <= 0 || !state.particlesEnabled) {
                        p.active = false;
                        positions[i * 3] = 9999;
                        positions[i * 3 + 1] = 9999;
                        positions[i * 3 + 2] = 9999;
                    } else {
                        p.x += p.vx;
                        p.y += p.vy;
                        p.z += p.vz;
                        positions[i * 3] = p.x;
                        positions[i * 3 + 1] = p.y;
                        positions[i * 3 + 2] = p.z;
                        state.activeParticleCount++;
                    }
                }
            }
            particleGeometry.attributes.position.needsUpdate = true;

            // Update State & HUD
            state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            
            elMode.textContent = state.mode;
            elGain.textContent = state.gain.toFixed(2);
            elPlaying.textContent = state.playing ? 'Playing' : 'Paused';
            elPlaying.style.color = state.playing ? '#00ff00' : '#ffaa00';
            elParticles.textContent = state.particlesEnabled ? 'ON' : 'OFF';
            elPCount.textContent = state.activeParticleCount;

            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        animate();
    </script>
</body>
</html>
