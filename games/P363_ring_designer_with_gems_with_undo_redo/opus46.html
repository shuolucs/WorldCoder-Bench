<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(10,10,30,0.95) 0%, rgba(10,10,30,0.8) 100%);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,215,0,0.3);
    z-index: 100;
    flex-wrap: wrap;
}

.hud-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

.hud-label {
    color: #ccc;
    font-size: 13px;
    white-space: nowrap;
}

.hud-label span {
    color: #FFD700;
    font-weight: bold;
}

.gem-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.2s ease;
    outline: none;
}

.gem-btn:hover {
    transform: scale(1.15);
}

.gem-btn.active {
    border-color: #FFD700;
    box-shadow: 0 0 12px rgba(255,215,0,0.6);
}

#btn-ruby { background: radial-gradient(circle at 30% 30%, #ff4444, #E31B23, #8b0000); }
#btn-emerald { background: radial-gradient(circle at 30% 30%, #7dff7d, #50C878, #006400); }
#btn-diamond { background: radial-gradient(circle at 30% 30%, #ffffff, #B9F2FF, #6699cc); }

.action-btn {
    padding: 6px 14px;
    border: 1px solid rgba(255,215,0,0.4);
    background: rgba(255,215,0,0.1);
    color: #FFD700;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s ease;
    outline: none;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.action-btn:hover:not(.disabled) {
    background: rgba(255,215,0,0.25);
    border-color: #FFD700;
}

.action-btn.disabled {
    opacity: 0.4;
    cursor: default;
}

#btn-clear {
    border-color: rgba(255,80,80,0.4);
    background: rgba(255,80,80,0.1);
    color: #ff6666;
}

#btn-clear:hover {
    background: rgba(255,80,80,0.25);
    border-color: #ff6666;
}

.separator {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.15);
}

#current-gem-type {
    color: #FFD700;
    font-weight: bold;
    font-size: 13px;
    text-transform: capitalize;
}

#info-bar {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    z-index: 100;
    text-align: center;
}
</style>
</head>
<body>

<div id="hud">
    <div class="hud-group">
        <div class="hud-label">Gems: <span id="gem-count">0</span></div>
    </div>
    <div class="separator"></div>
    <div class="hud-group">
        <div class="hud-label">Type:</div>
        <button class="gem-btn active" id="btn-ruby" title="Ruby"></button>
        <button class="gem-btn" id="btn-emerald" title="Emerald"></button>
        <button class="gem-btn" id="btn-diamond" title="Diamond"></button>
        <div class="hud-label" id="current-gem-type">Ruby</div>
    </div>
    <div class="separator"></div>
    <div class="hud-group">
        <button class="action-btn disabled" id="btn-undo">⟲ Undo</button>
        <button class="action-btn disabled" id="btn-redo">⟳ Redo</button>
        <button class="action-btn" id="btn-clear">✕ Clear All</button>
    </div>
</div>

<div id="info-bar">Click on the ring to place gems · Ctrl+Z Undo · Ctrl+Y Redo · Scroll to zoom</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gemCount: 0,
    currentGemType: 'ruby',
    undoStackSize: 0,
    redoStackSize: 0,
    lastAction: 'none',
    ringLoaded: false,
    nefertitiLoaded: false,
    gems: [],
    totalGemsEverPlaced: 0
};

const undoStack = [];
const redoStack = [];
const placedGems = [];
let currentGemType = 'ruby';

const gemConfigs = {
    ruby: { color: 0xE31B23, emissive: 0x330000 },
    emerald: { color: 0x50C878, emissive: 0x003300 },
    diamond: { color: 0xB9F2FF, emissive: 0x111133, opacity: 0.85, transparent: true }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Extra fill light
const fillLight = new THREE.PointLight(0x4466ff, 0.3, 20);
fillLight.position.set(-5, 5, -3);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    metalness: 0.8,
    roughness: 0.3
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Ring (Torus)
const ringGeo = new THREE.TorusGeometry(1.5, 0.15, 32, 64);
const ringMat = new THREE.MeshStandardMaterial({
    color: 0xFFD700,
    metalness: 0.9,
    roughness: 0.1
});
const ringMesh = new THREE.Mesh(ringGeo, ringMat);
ringMesh.position.set(0, 1.5, 0);
ringMesh.castShadow = true;
ringMesh.receiveShadow = true;
scene.add(ringMesh);
window.__3D_STATE__.ringLoaded = true;

// Ring pedestal
const pedestalGeo = new THREE.CylinderGeometry(0.4, 0.5, 0.3, 32);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.7, roughness: 0.3 });
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(0, 0.15, 0);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Ring stand
const standGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.2, 16);
const standMat = new THREE.MeshStandardMaterial({ color: 0x444455, metalness: 0.8, roughness: 0.2 });
const stand = new THREE.Mesh(standGeo, standMat);
stand.position.set(0, 0.9, 0);
stand.castShadow = true;
scene.add(stand);

// Load Nefertiti
const loader = new GLTFLoader();

// Nefertiti pedestal
const nefPedestalGeo = new THREE.CylinderGeometry(0.6, 0.7, 0.5, 32);
const nefPedestal = new THREE.Mesh(nefPedestalGeo, pedestalMat.clone());
nefPedestal.position.set(-3.5, 0.25, -1);
nefPedestal.castShadow = true;
nefPedestal.receiveShadow = true;
scene.add(nefPedestal);

loader.load(
    'Nefertiti.glb',
    (gltf) => {
        const model = gltf.scene;
        // Calculate bounding box to scale properly
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        model.scale.set(scale, scale, scale);

        // Recalculate after scaling
        const box2 = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        box2.getCenter(center);

        model.position.set(-3.5 - center.x * 1, 0.5 - box2.min.y, -1 - center.z * 1);
        model.position.x = -3.5;
        model.position.z = -1;
        model.position.y = 0.5 - box2.min.y / scale * scale;

        // Reposition properly
        const box3 = new THREE.Box3().setFromObject(model);
        model.position.y = 0.5 - box3.min.y + model.position.y;
        const box4 = new THREE.Box3().setFromObject(model);
        model.position.y = 0.5 + (model.position.y - box4.min.y);

        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        scene.add(model);
        window.__3D_STATE__.nefertitiLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load Nefertiti.glb:', error);
        // Create a placeholder bust
        const bustGroup = new THREE.Group();

        // Head
        const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const bustMat = new THREE.MeshStandardMaterial({ color: 0xd4a574, metalness: 0.1, roughness: 0.6 });
        const head = new THREE.Mesh(headGeo, bustMat);
        head.position.y = 1.6;
        head.scale.set(1, 1.2, 1);
        bustGroup.add(head);

        // Crown
        const crownGeo = new THREE.CylinderGeometry(0.25, 0.35, 0.6, 32);
        const crownMat = new THREE.MeshStandardMaterial({ color: 0x2244aa, metalness: 0.5, roughness: 0.3 });
        const crown = new THREE.Mesh(crownGeo, crownMat);
        crown.position.y = 2.15;
        bustGroup.add(crown);

        // Neck
        const neckGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.4, 16);
        const neck = new THREE.Mesh(neckGeo, bustMat);
        neck.position.y = 1.15;
        bustGroup.add(neck);

        // Shoulders
        const shoulderGeo = new THREE.CylinderGeometry(0.5, 0.45, 0.5, 32);
        const shoulders = new THREE.Mesh(shoulderGeo, bustMat);
        shoulders.position.y = 0.8;
        bustGroup.add(shoulders);

        bustGroup.position.set(-3.5, 0.5, -1);
        bustGroup.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        scene.add(bustGroup);
        window.__3D_STATE__.nefertitiLoaded = true;
    }
);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Gem creation
function createGem(type, position) {
    const config = gemConfigs[type];
    const geo = new THREE.SphereGeometry(0.12, 16, 16);
    const matProps = {
        color: config.color,
        emissive: config.emissive,
        metalness: 0.1,
        roughness: 0.05,
        clearcoat: 1.0
    };
    if (config.transparent) {
        matProps.transparent = true;
        matProps.opacity = config.opacity;
    }
    const mat = new THREE.MeshPhysicalMaterial(matProps);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);
    mesh.castShadow = true;
    mesh.userData.gemType = type;
    mesh.userData.rotationSpeed = 0.5 + Math.random() * 0.5;
    return mesh;
}

function updateState(action) {
    window.__3D_STATE__.gemCount = placedGems.length;
    window.__3D_STATE__.currentGemType = currentGemType;
    window.__3D_STATE__.undoStackSize = undoStack.length;
    window.__3D_STATE__.redoStackSize = redoStack.length;
    window.__3D_STATE__.lastAction = action;
    window.__3D_STATE__.gems = placedGems.map(g => ({
        type: g.userData.gemType,
        x: g.position.x,
        y: g.position.y,
        z: g.position.z
    }));

    // Update DOM
    document.getElementById('gem-count').textContent = placedGems.length;
    document.getElementById('current-gem-type').textContent = currentGemType.charAt(0).toUpperCase() + currentGemType.slice(1);

    // Update button states
    const undoBtn = document.getElementById('btn-undo');
    const redoBtn = document.getElementById('btn-redo');
    if (undoStack.length === 0) {
        undoBtn.classList.add('disabled');
    } else {
        undoBtn.classList.remove('disabled');
    }
    if (redoStack.length === 0) {
        redoBtn.classList.add('disabled');
    } else {
        redoBtn.classList.remove('disabled');
    }
}

function addGem(type, position, fromRedo = false) {
    const gem = createGem(type, position);
    scene.add(gem);
    placedGems.push(gem);

    const action = { type: 'add', gemType: type, position: position.clone(), mesh: gem };
    undoStack.push(action);
    if (!fromRedo) {
        redoStack.length = 0;
    }

    window.__3D_STATE__.totalGemsEverPlaced++;
    updateState('add');
}

function undo() {
    if (undoStack.length === 0) return;
    const action = undoStack.pop();

    if (action.type === 'add') {
        scene.remove(action.mesh);
        const idx = placedGems.indexOf(action.mesh);
        if (idx > -1) placedGems.splice(idx, 1);
        redoStack.push(action);
    } else if (action.type === 'clear') {
        // Re-add all gems from the clear action
        for (const item of action.gems) {
            scene.add(item.mesh);
            placedGems.push(item.mesh);
        }
        redoStack.push(action);
    }

    updateState('undo');
}

function redo() {
    if (redoStack.length === 0) return;
    const action = redoStack.pop();

    if (action.type === 'add') {
        scene.add(action.mesh);
        placedGems.push(action.mesh);
        undoStack.push(action);
    } else if (action.type === 'clear') {
        for (const item of action.gems) {
            scene.remove(item.mesh);
            const idx = placedGems.indexOf(item.mesh);
            if (idx > -1) placedGems.splice(idx, 1);
        }
        undoStack.push(action);
    }

    updateState('redo');
}

function clearAll() {
    if (placedGems.length === 0) return;

    const clearedGems = [];
    for (const gem of [...placedGems]) {
        clearedGems.push({ mesh: gem, gemType: gem.userData.gemType, position: gem.position.clone() });
        scene.remove(gem);
    }
    placedGems.length = 0;

    const action = { type: 'clear', gems: clearedGems };
    undoStack.push(action);
    redoStack.length = 0;

    updateState('clear');
}

// Event listeners
renderer.domElement.addEventListener('click', (event) => {
    // Ignore if clicking on HUD
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ringMesh);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        addGem(currentGemType, point);
    }
});

// Gem type buttons
document.getElementById('btn-ruby').addEventListener('click', () => {
    currentGemType = 'ruby';
    document.querySelectorAll('.gem-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-ruby').classList.add('active');
    updateState(window.__3D_STATE__.lastAction);
});

document.getElementById('btn-emerald').addEventListener('click', () => {
    currentGemType = 'emerald';
    document.querySelectorAll('.gem-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-emerald').classList.add('active');
    updateState(window.__3D_STATE__.lastAction);
});

document.getElementById('btn-diamond').addEventListener('click', () => {
    currentGemType = 'diamond';
    document.querySelectorAll('.gem-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-diamond').classList.add('active');
    updateState(window.__3D_STATE__.lastAction);
});

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-clear').addEventListener('click', clearAll);

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
    }
    if (e.ctrlKey && e.key === 'y') {
        e.preventDefault();
        redo();
    }
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();

    controls.update();

    // Rotate gems
    for (const gem of placedGems) {
        gem.rotation.y += delta * gem.userData.rotationSpeed;
    }

    // Subtle ring glow effect via emissive pulsing
    const pulse = Math.sin(elapsed * 2) * 0.02 + 0.02;
    ringMat.emissive = new THREE.Color(0xFFD700).multiplyScalar(pulse);

    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state
updateState('none');
</script>
</body>
</html>
