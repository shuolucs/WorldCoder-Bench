<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            display: flex;
            gap: 15px;
            align-items: center;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        .separator {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 5px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 6px;
            background: #2a2a4a;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        button:hover:not(:disabled) {
            background: #3a3a6a;
        }
        button.active {
            border-color: #FFD700;
            background: #3a3a6a;
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #btn-ruby.active { border-color: #E31B23; }
        #btn-emerald.active { border-color: #50C878; }
        #btn-diamond.active { border-color: #B9F2FF; }
        
        .info-text {
            font-size: 14px;
            min-width: 80px;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="info-text" id="gem-count">Gems: 0</div>
        <div class="separator"></div>
        <button id="btn-ruby" class="active">Ruby</button>
        <button id="btn-emerald">Emerald</button>
        <button id="btn-diamond">Diamond</button>
        <div class="info-text" style="font-size: 12px; color: #aaa;">Type: <span id="current-gem-type" style="color: white;">ruby</span></div>
        <div class="separator"></div>
        <button id="btn-undo" disabled>Undo</button>
        <button id="btn-redo" disabled>Redo</button>
        <button id="btn-clear">Clear All</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            gemCount: 0,
            currentGemType: 'ruby',
            undoStackSize: 0,
            redoStackSize: 0,
            lastAction: 'none',
            ringLoaded: false,
            nefertitiLoaded: false,
            gems: [],
            totalGemsEverPlaced: 0
        };

        let currentGemType = 'ruby';
        const undoStack = [];
        const redoStack = [];
        let activeGems = [];

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x0a0a15, 
            roughness: 0.1, 
            metalness: 0.8 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Ring
        const ringGeo = new THREE.TorusGeometry(1.5, 0.15, 32, 64);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0xFFD700, 
            metalness: 0.9, 
            roughness: 0.1 
        });
        const ringMesh = new THREE.Mesh(ringGeo, ringMat);
        ringMesh.position.set(0, 1.5, 0);
        ringMesh.rotation.x = Math.PI / 2;
        ringMesh.castShadow = true;
        ringMesh.receiveShadow = true;
        scene.add(ringMesh);
        
        window.__3D_STATE__.ringLoaded = true;
        updateState('none');

        // Nefertiti Model
        const loader = new GLTFLoader();
        loader.load('Nefertiti.glb', (gltf) => {
            const model = gltf.scene;
            
            // Calculate bounding box to scale to roughly 2 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scaleFactor = 2.0 / size.y;
            
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);
            
            // Recompute box after scaling to adjust position
            const scaledBox = new THREE.Box3().setFromObject(model);
            const center = scaledBox.getCenter(new THREE.Vector3());
            
            model.position.set(-3.5 - center.x, 0 - scaledBox.min.y, -1 - center.z);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(model);
            window.__3D_STATE__.nefertitiLoaded = true;
            updateState('none');
        }, undefined, (error) => {
            console.warn('Nefertiti.glb could not be loaded. Ensure the file exists in the same directory.', error);
        });

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 1.5, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // Gem Definitions
        const gemGeometry = new THREE.SphereGeometry(0.12, 16, 16);
        const gemMaterials = {
            ruby: new THREE.MeshPhysicalMaterial({ 
                color: 0xE31B23, emissive: 0x330000, metalness: 0.1, roughness: 0.05, clearcoat: 1.0 
            }),
            emerald: new THREE.MeshPhysicalMaterial({ 
                color: 0x50C878, emissive: 0x003300, metalness: 0.1, roughness: 0.05, clearcoat: 1.0 
            }),
            diamond: new THREE.MeshPhysicalMaterial({ 
                color: 0xB9F2FF, emissive: 0x111133, metalness: 0.1, roughness: 0.05, clearcoat: 1.0, transparent: true, opacity: 0.85 
            })
        };

        // Interaction & Raycasting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on HUD
            if (event.clientY < 80) return;
            if (event.button !== 0) return; // Only left click

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ringMesh);

            if (intersects.length > 0) {
                placeGem(intersects[0].point);
            }
        });

        function placeGem(position) {
            const gem = new THREE.Mesh(gemGeometry, gemMaterials[currentGemType]);
            gem.position.copy(position);
            gem.castShadow = true;
            gem.receiveShadow = true;
            gem.userData = { type: currentGemType };
            
            scene.add(gem);
            activeGems.push(gem);
            
            undoStack.push({ type: 'add', mesh: gem });
            redoStack.length = 0; // Clear redo stack on new action
            
            window.__3D_STATE__.totalGemsEverPlaced++;
            updateState('add');
        }

        function undo() {
            if (undoStack.length === 0) return;
            const action = undoStack.pop();
            
            if (action.type === 'add') {
                scene.remove(action.mesh);
                activeGems = activeGems.filter(g => g !== action.mesh);
                redoStack.push(action);
            } else if (action.type === 'clear') {
                action.meshes.forEach(m => {
                    scene.add(m);
                    activeGems.push(m);
                });
                redoStack.push(action);
            }
            updateState('undo');
        }

        function redo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            
            if (action.type === 'add') {
                scene.add(action.mesh);
                activeGems.push(action.mesh);
                undoStack.push(action);
            } else if (action.type === 'clear') {
                action.meshes.forEach(m => {
                    scene.remove(m);
                    activeGems = activeGems.filter(g => g !== m);
                });
                undoStack.push(action);
            }
            updateState('redo');
        }

        function clearAll() {
            if (activeGems.length === 0) return;
            
            const action = { type: 'clear', meshes: [...activeGems] };
            activeGems.forEach(m => scene.remove(m));
            activeGems = [];
            
            undoStack.push(action);
            redoStack.length = 0;
            updateState('clear');
        }

        // State & UI Updates
        function updateState(actionType) {
            window.__3D_STATE__.gemCount = activeGems.length;
            window.__3D_STATE__.currentGemType = currentGemType;
            window.__3D_STATE__.undoStackSize = undoStack.length;
            window.__3D_STATE__.redoStackSize = redoStack.length;
            window.__3D_STATE__.lastAction = actionType;
            window.__3D_STATE__.gems = activeGems.map(g => ({
                type: g.userData.type,
                x: g.position.x,
                y: g.position.y,
                z: g.position.z
            }));
            
            updateUI();
        }

        function updateUI() {
            document.getElementById('gem-count').innerText = `Gems: ${window.__3D_STATE__.gemCount}`;
            document.getElementById('current-gem-type').innerText = currentGemType;
            
            document.getElementById('btn-ruby').classList.toggle('active', currentGemType === 'ruby');
            document.getElementById('btn-emerald').classList.toggle('active', currentGemType === 'emerald');
            document.getElementById('btn-diamond').classList.toggle('active', currentGemType === 'diamond');
            
            document.getElementById('btn-undo').disabled = undoStack.length === 0;
            document.getElementById('btn-redo').disabled = redoStack.length === 0;
        }

        // Event Listeners
        document.getElementById('btn-ruby').addEventListener('click', () => { currentGemType = 'ruby'; updateState('none'); });
        document.getElementById('btn-emerald').addEventListener('click', () => { currentGemType = 'emerald'; updateState('none'); });
        document.getElementById('btn-diamond').addEventListener('click', () => { currentGemType = 'diamond'; updateState('none'); });
        
        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);
        document.getElementById('btn-clear').addEventListener('click', clearAll);

        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') {
                    e.preventDefault();
                    undo();
                } else if (e.key === 'y' || (e.shiftKey && e.key === 'Z')) {
                    e.preventDefault();
                    redo();
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            // Subtle rotation animation for gems
            activeGems.forEach(gem => {
                gem.rotation.y += 0.02;
            });
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
