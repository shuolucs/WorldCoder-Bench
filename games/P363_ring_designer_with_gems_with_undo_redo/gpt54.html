<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 16px;
      background: rgba(10, 10, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      color: #f5f5f5;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #hud .label {
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
    }

    .btn {
      appearance: none;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: white;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: rgba(255,255,255,0.14);
      transform: translateY(-1px);
    }

    .btn.active {
      border-color: #ffd700;
      box-shadow: 0 0 0 2px rgba(255,215,0,0.25);
    }

    .btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      pointer-events: none;
    }

    #btn-ruby { color: #ff8088; }
    #btn-emerald { color: #8df0b0; }
    #btn-diamond { color: #dffaff; }

    #hint {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: rgba(255,255,255,0.8);
      background: rgba(10,10,20,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="label" id="gem-count">Gems: 0</div>
    <button class="btn active" id="btn-ruby">Ruby</button>
    <button class="btn" id="btn-emerald">Emerald</button>
    <button class="btn" id="btn-diamond">Diamond</button>
    <button class="btn disabled" id="btn-undo">Undo</button>
    <button class="btn disabled" id="btn-redo">Redo</button>
    <button class="btn" id="btn-clear">Clear All</button>
    <div class="label" id="current-gem-type">Current: ruby</div>
  </div>

  <div id="hint">Click the gold ring to place gems · Ctrl+Z Undo · Ctrl+Y Redo</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    // ---------------------------
    // State Exposure
    // ---------------------------
    window.__3D_STATE__ = {
      gemCount: 0,
      currentGemType: "ruby",
      undoStackSize: 0,
      redoStackSize: 0,
      lastAction: "none",
      ringLoaded: false,
      nefertitiLoaded: false,
      gems: [],
      totalGemsEverPlaced: 0
    };

    // ---------------------------
    // Basic Scene Setup
    // ---------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 6);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // ---------------------------
    // Lights
    // ---------------------------
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    // ---------------------------
    // Ground Plane
    // ---------------------------
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x111111,
      metalness: 0.6,
      roughness: 0.2
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // ---------------------------
    // Ring
    // ---------------------------
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: 0xFFD700,
      metalness: 0.9,
      roughness: 0.1
    });

    const ringGeometry = new THREE.TorusGeometry(1.5, 0.15, 32, 64);
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.position.set(0, 1.5, 0);
    ring.castShadow = true;
    ring.receiveShadow = true;
    scene.add(ring);

    window.__3D_STATE__.ringLoaded = true;

    // ---------------------------
    // Decorative pedestal for bust
    // ---------------------------
    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(0.75, 0.9, 0.5, 32),
      new THREE.MeshStandardMaterial({
        color: 0x4a4a55,
        metalness: 0.35,
        roughness: 0.65
      })
    );
    pedestal.position.set(-3.5, 0.25, -1);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    scene.add(pedestal);

    // ---------------------------
    // Load Nefertiti.glb
    // ---------------------------
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      "Nefertiti.glb",
      (gltf) => {
        const model = gltf.scene;
        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);

        const maxHeight = size.y || 1;
        const targetHeight = 2.0;
        const scale = targetHeight / maxHeight;
        model.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const minY = scaledBox.min.y;
        model.position.set(-3.5, -minY + 0.5, -1);

        scene.add(model);
        window.__3D_STATE__.nefertitiLoaded = true;
        updateState("none");
      },
      undefined,
      (err) => {
        console.warn("Failed to load Nefertiti.glb:", err);
        updateState("none");
      }
    );

    // ---------------------------
    // Controls
    // ---------------------------
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    // ---------------------------
    // Gem Config
    // ---------------------------
    const gemConfigs = {
      ruby: {
        color: 0xE31B23,
        emissive: 0x330000,
        opacity: 1,
        transparent: false
      },
      emerald: {
        color: 0x50C878,
        emissive: 0x003300,
        opacity: 1,
        transparent: false
      },
      diamond: {
        color: 0xB9F2FF,
        emissive: 0x111133,
        opacity: 0.85,
        transparent: true
      }
    };

    let currentGemType = "ruby";
    const gemGeometry = new THREE.SphereGeometry(0.12, 16, 16);
    const gems = [];
    const undoStack = [];
    const redoStack = [];
    let totalGemsEverPlaced = 0;

    // ---------------------------
    // UI
    // ---------------------------
    const gemCountEl = document.getElementById("gem-count");
    const currentGemTypeEl = document.getElementById("current-gem-type");
    const btnRuby = document.getElementById("btn-ruby");
    const btnEmerald = document.getElementById("btn-emerald");
    const btnDiamond = document.getElementById("btn-diamond");
    const btnUndo = document.getElementById("btn-undo");
    const btnRedo = document.getElementById("btn-redo");
    const btnClear = document.getElementById("btn-clear");

    function setActiveGemButton() {
      [btnRuby, btnEmerald, btnDiamond].forEach(btn => btn.classList.remove("active"));
      if (currentGemType === "ruby") btnRuby.classList.add("active");
      if (currentGemType === "emerald") btnEmerald.classList.add("active");
      if (currentGemType === "diamond") btnDiamond.classList.add("active");
      currentGemTypeEl.textContent = `Current: ${currentGemType}`;
    }

    function updateButtons() {
      if (undoStack.length === 0) btnUndo.classList.add("disabled");
      else btnUndo.classList.remove("disabled");

      if (redoStack.length === 0) btnRedo.classList.add("disabled");
      else btnRedo.classList.remove("disabled");
    }

    function updateState(lastAction = "none") {
      gemCountEl.textContent = `Gems: ${gems.length}`;
      setActiveGemButton();
      updateButtons();

      window.__3D_STATE__ = {
        gemCount: gems.length,
        currentGemType,
        undoStackSize: undoStack.length,
        redoStackSize: redoStack.length,
        lastAction,
        ringLoaded: true,
        nefertitiLoaded: window.__3D_STATE__.nefertitiLoaded,
        gems: gems.map(g => ({
          type: g.userData.gemType,
          x: g.position.x,
          y: g.position.y,
          z: g.position.z
        })),
        totalGemsEverPlaced
      };
    }

    // ---------------------------
    // Gem Helpers
    // ---------------------------
    function createGemMesh(type, position) {
      const cfg = gemConfigs[type];
      const material = new THREE.MeshPhysicalMaterial({
        color: cfg.color,
        emissive: cfg.emissive,
        metalness: 0.1,
        roughness: 0.05,
        clearcoat: 1.0,
        transmission: type === "diamond" ? 0.35 : 0.0,
        opacity: cfg.opacity,
        transparent: cfg.transparent
      });

      const gem = new THREE.Mesh(gemGeometry, material);
      gem.position.copy(position);
      gem.castShadow = true;
      gem.receiveShadow = true;
      gem.userData.gemType = type;
      gem.userData.spinOffset = Math.random() * Math.PI * 2;
      return gem;
    }

    function addGemFromAction(action, countTowardsTotal = false) {
      if (!action.meshReference) {
        action.meshReference = createGemMesh(action.gemType, action.position.clone());
      }
      scene.add(action.meshReference);
      gems.push(action.meshReference);

      if (countTowardsTotal) totalGemsEverPlaced++;
    }

    function removeGemMesh(mesh) {
      const idx = gems.indexOf(mesh);
      if (idx !== -1) gems.splice(idx, 1);
      scene.remove(mesh);
    }

    // ---------------------------
    // Placement Interaction
    // ---------------------------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(ring, false);

      if (intersects.length > 0) {
        const hit = intersects[0];
        const placePos = hit.point.clone();

        const action = {
          type: "add",
          gemType: currentGemType,
          position: placePos.clone(),
          meshReference: createGemMesh(currentGemType, placePos)
        };

        addGemFromAction(action, true);
        undoStack.push(action);
        redoStack.length = 0;
        updateState("add");
      }
    }

    renderer.domElement.addEventListener("pointerdown", onPointerDown);

    // ---------------------------
    // Undo / Redo / Clear
    // ---------------------------
    function undoAction() {
      if (undoStack.length === 0) return;

      const action = undoStack.pop();

      if (action.type === "add") {
        removeGemMesh(action.meshReference);
        redoStack.push(action);
      } else if (action.type === "clear") {
        action.actions.forEach(a => addGemFromAction(a, false));
        redoStack.push(action);
      }

      updateState("undo");
    }

    function redoAction() {
      if (redoStack.length === 0) return;

      const action = redoStack.pop();

      if (action.type === "add") {
        addGemFromAction(action, false);
        undoStack.push(action);
      } else if (action.type === "clear") {
        action.actions.forEach(a => removeGemMesh(a.meshReference));
        undoStack.push(action);
      }

      updateState("redo");
    }

    function clearAllGems() {
      if (gems.length === 0) return;

      const actions = gems.map(mesh => ({
        type: "add",
        gemType: mesh.userData.gemType,
        position: mesh.position.clone(),
        meshReference: mesh
      }));

      while (gems.length > 0) {
        scene.remove(gems.pop());
      }

      undoStack.push({
        type: "clear",
        actions
      });
      redoStack.length = 0;
      updateState("clear");
    }

    // ---------------------------
    // Button Events
    // ---------------------------
    btnRuby.addEventListener("click", () => {
      currentGemType = "ruby";
      updateState("none");
    });

    btnEmerald.addEventListener("click", () => {
      currentGemType = "emerald";
      updateState("none");
    });

    btnDiamond.addEventListener("click", () => {
      currentGemType = "diamond";
      updateState("none");
    });

    btnUndo.addEventListener("click", undoAction);
    btnRedo.addEventListener("click", redoAction);
    btnClear.addEventListener("click", clearAllGems);

    // ---------------------------
    // Keyboard Shortcuts
    // ---------------------------
    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (event.ctrlKey && key === "z") {
        event.preventDefault();
        undoAction();
      }
      if (event.ctrlKey && key === "y") {
        event.preventDefault();
        redoAction();
      }
    });

    // ---------------------------
    // Resize
    // ---------------------------
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ---------------------------
    // Animation Loop
    // ---------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      gems.forEach((gem, i) => {
        gem.rotation.y = elapsed * 0.7 + (gem.userData.spinOffset || i);
      });

      controls.update();
      renderer.render(scene, camera);
    }

    updateState("none");
    animate();
  </script>
</body>
</html>
