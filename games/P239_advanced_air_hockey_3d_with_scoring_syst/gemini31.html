<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Air Hockey</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .score-board {
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.5);
            padding: 20px;
            pointer-events: none;
        }
        #score-ai {
            color: #ffaa00;
        }
        #score-player {
            color: #00aaff;
        }
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
        }
        .center-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid white;
            color: white;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover {
            background: white;
            color: black;
            box-shadow: 0 0 15px white;
        }
        #pauseBtn {
            padding: 10px 20px;
            font-size: 18px;
        }
        #gameOverMsg {
            display: none;
            font-size: 64px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="ui-layer">
            <div class="score-board" id="score-ai">AI: 0</div>
            <div class="score-board" id="score-player">Player: 0</div>
        </div>
        
        <div class="controls">
            <button id="pauseBtn" style="display: none;">Pause</button>
        </div>

        <div class="center-screen" id="startScreen">
            <button id="startBtn">Start Game</button>
        </div>

        <div class="center-screen" id="gameOverMsg">
            <div id="winnerText">Player Wins!</div>
            <button id="restartBtn">Play Again</button>
        </div>

        <div class="instructions">
            Mouse to move paddle | 'R' to reset
        </div>
    </div>

    <!-- Import Three.js as ES module -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            playerScore: 0,
            aiScore: 0,
            puckPosition: { x: 0, y: 0.3, z: 0 },
            puckVelocity: { x: 0, z: 0 },
            playerPaddlePosition: { x: 0, y: 0.3, z: 3 },
            aiPaddlePosition: { x: 0, y: 0.3, z: -3 },
            gameStarted: false,
            gamePaused: false,
            gameOver: false,
            winner: null,
            lanternLeftLoaded: false,
            lanternRightLoaded: false,
            puckSpeed: 0,
            lastGoalScorer: null,
            lanternLeft: null,
            lanternRight: null
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.2, 50);
        pointLight.position.set(0, 8, 0);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 2048;
        pointLight.shadow.mapSize.height = 2048;
        scene.add(pointLight);

        // --- Materials ---
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x118833, roughness: 0.2, metalness: 0.1 });
        const borderMat = new THREE.MeshStandardMaterial({ color: 0x0a4411, roughness: 0.5 });
        const lineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
        const puckMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.1, metalness: 0.3 });
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x00aaff, roughness: 0.2, metalness: 0.2 });
        const aiMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.2, metalness: 0.2 });

        // --- Geometry ---
        // Table
        const tableGeo = new THREE.BoxGeometry(12, 0.3, 8);
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = 0;
        table.receiveShadow = true;
        scene.add(table);

        // Center Line
        const lineGeo = new THREE.PlaneGeometry(12, 0.05);
        const centerLine = new THREE.Mesh(lineGeo, lineMat);
        centerLine.rotation.x = -Math.PI / 2;
        centerLine.position.y = 0.16;
        scene.add(centerLine);

        // Borders
        const borderGroup = new THREE.Group();
        const createBorder = (w, h, d, x, y, z) => {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), borderMat);
            mesh.position.set(x, y, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            borderGroup.add(mesh);
        };

        const bh = 0.6; // border height
        const by = 0.15; // border y pos
        const bw = 0.3; // border thickness

        // Left & Right
        createBorder(bw, bh, 8 + bw*2, -6.15, by, 0);
        createBorder(bw, bh, 8 + bw*2, 6.15, by, 0);
        
        // Top & Bottom (with goal gaps |x| < 1.5)
        // Width of solid part = (12 - 3) / 2 = 4.5. Center of solid part = 1.5 + 4.5/2 = 3.75
        createBorder(4.5, bh, bw, -3.75, by, -4.15); // Top Left
        createBorder(4.5, bh, bw, 3.75, by, -4.15);  // Top Right
        createBorder(4.5, bh, bw, -3.75, by, 4.15);  // Bottom Left
        createBorder(4.5, bh, bw, 3.75, by, 4.15);   // Bottom Right
        
        scene.add(borderGroup);

        // Goal Indicators (Visual only)
        const goalGeo = new THREE.PlaneGeometry(3, 0.2);
        const goalMatAI = new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3 });
        const goalMatPlayer = new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.3 });
        
        const goalAI = new THREE.Mesh(goalGeo, goalMatAI);
        goalAI.rotation.x = -Math.PI / 2;
        goalAI.position.set(0, 0.16, -3.9);
        scene.add(goalAI);

        const goalPlayer = new THREE.Mesh(goalGeo, goalMatPlayer);
        goalPlayer.rotation.x = -Math.PI / 2;
        goalPlayer.position.set(0, 0.16, 3.9);
        scene.add(goalPlayer);

        // Puck
        const puckGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.15, 32);
        const puck = new THREE.Mesh(puckGeo, puckMat);
        puck.position.set(0, 0.3, 0);
        puck.castShadow = true;
        scene.add(puck);

        // Paddles
        const paddleGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 32);
        const playerPaddle = new THREE.Mesh(paddleGeo, playerMat);
        playerPaddle.position.set(0, 0.3, 3);
        playerPaddle.castShadow = true;
        scene.add(playerPaddle);

        const aiPaddle = new THREE.Mesh(paddleGeo, aiMat);
        aiPaddle.position.set(0, 0.3, -3);
        aiPaddle.castShadow = true;
        scene.add(aiPaddle);

        // --- Load Models ---
        const loader = new GLTFLoader();
        const lanternUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb';
        
        loader.load(lanternUrl, (gltf) => {
            const lantern1 = gltf.scene;
            lantern1.scale.set(0.5, 0.5, 0.5);
            lantern1.position.set(-4, 0.15, 0);
            
            // Add point light inside lantern
            const lLight1 = new THREE.PointLight(0xffaa00, 0.5, 3);
            lLight1.position.set(0, 1, 0);
            lantern1.add(lLight1);
            
            scene.add(lantern1);
            state.lanternLeft = lantern1;
            state.lanternLeftLoaded = true;

            const lantern2 = lantern1.clone();
            lantern2.position.set(4, 0.15, 0);
            scene.add(lantern2);
            state.lanternRight = lantern2;
            state.lanternRightLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading lantern model:', error);
        });

        // --- Physics & Logic Variables ---
        let puckVx = 0;
        let puckVz = 0;
        const friction = 0.998;
        const maxSpeed = 0.3;
        
        let playerLastPos = new THREE.Vector3();
        let playerVel = new THREE.Vector3();
        let aiLastPos = new THREE.Vector3();
        let aiVel = new THREE.Vector3();

        let resetTimer = 0;
        const WIN_SCORE = 7;

        // --- Input Handling ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.3); // Plane at y=0.3
        const targetPos = new THREE.Vector3();

        window.addEventListener('mousemove', (event) => {
            if (!state.gameStarted || state.gamePaused || state.gameOver) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(plane, targetPos);

            if (targetPos) {
                // Constrain player paddle
                let px = Math.max(-5.5, Math.min(5.5, targetPos.x));
                let pz = Math.max(0.5, Math.min(3.5, targetPos.z)); // Player half
                
                playerPaddle.position.x = px;
                playerPaddle.position.z = pz;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                resetGame(true);
            }
        });

        // --- UI Elements ---
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const startScreen = document.getElementById('startScreen');
        const gameOverMsg = document.getElementById('gameOverMsg');
        const winnerText = document.getElementById('winnerText');
        const scorePlayerEl = document.getElementById('score-player');
        const scoreAiEl = document.getElementById('score-ai');

        startBtn.addEventListener('click', () => {
            state.gameStarted = true;
            startScreen.style.display = 'none';
            pauseBtn.style.display = 'block';
            launchPuck();
        });

        pauseBtn.addEventListener('click', () => {
            state.gamePaused = !state.gamePaused;
            pauseBtn.innerText = state.gamePaused ? 'Resume' : 'Pause';
        });

        restartBtn.addEventListener('click', () => {
            resetGame(true);
            gameOverMsg.style.display = 'none';
            state.gameStarted = true;
            launchPuck();
        });

        // --- Game Logic Functions ---
        function launchPuck() {
            const angle = (Math.random() * Math.PI / 2) - (Math.PI / 4) + (Math.random() > 0.5 ? 0 : Math.PI);
            const speed = 0.15;
            puckVx = Math.sin(angle) * speed;
            puckVz = Math.cos(angle) * speed;
            
            // If someone scored, launch towards them
            if (state.lastGoalScorer === 'player') {
                puckVz = Math.abs(puckVz);
            } else if (state.lastGoalScorer === 'ai') {
                puckVz = -Math.abs(puckVz);
            }
        }

        function resetGame(fullReset = false) {
            puck.position.set(0, 0.3, 0);
            puckVx = 0;
            puckVz = 0;
            playerPaddle.position.set(0, 0.3, 3);
            aiPaddle.position.set(0, 0.3, -3);
            
            if (fullReset) {
                state.playerScore = 0;
                state.aiScore = 0;
                state.gameOver = false;
                state.winner = null;
                state.lastGoalScorer = null;
                updateScores();
            }
        }

        function updateScores() {
            scorePlayerEl.innerText = `Player: ${state.playerScore}`;
            scoreAiEl.innerText = `AI: ${state.aiScore}`;
            
            if (state.playerScore >= WIN_SCORE || state.aiScore >= WIN_SCORE) {
                state.gameOver = true;
                state.winner = state.playerScore >= WIN_SCORE ? 'player' : 'ai';
                winnerText.innerText = state.winner === 'player' ? 'Player Wins!' : 'AI Wins!';
                winnerText.style.color = state.winner === 'player' ? '#00aaff' : '#ffaa00';
                gameOverMsg.style.display = 'flex';
                pauseBtn.style.display = 'none';
            }
        }

        function handleGoal(scorer) {
            if (scorer === 'player') state.playerScore++;
            else state.aiScore++;
            
            state.lastGoalScorer = scorer;
            updateScores();
            
            if (!state.gameOver) {
                resetTimer = 60; // ~1 second at 60fps
                puck.position.set(0, 0.3, 0);
                puckVx = 0;
                puckVz = 0;
            }
        }

        function checkPaddleCollision(paddle, pVel) {
            const dx = puck.position.x - paddle.position.x;
            const dz = puck.position.z - paddle.position.z;
            const dist = Math.sqrt(dx*dx + dz*dz);
            const minDist = 0.3 + 0.5; // puck radius + paddle radius

            if (dist < minDist) {
                // Normalize
                const nx = dx / dist;
                const nz = dz / dist;

                // Separate
                puck.position.x = paddle.position.x + nx * minDist;
                puck.position.z = paddle.position.z + nz * minDist;

                // Relative velocity
                const rvx = puckVx - pVel.x;
                const rvz = puckVz - pVel.z;

                // Dot product
                const dot = rvx * nx + rvz * nz;

                // If moving towards each other
                if (dot < 0) {
                    // Reflect
                    puckVx = puckVx - 2 * dot * nx;
                    puckVz = puckVz - 2 * dot * nz;

                    // Transfer paddle velocity
                    puckVx += pVel.x * 0.2;
                    puckVz += pVel.z * 0.2;
                }
            }
        }

        function sanitizeNumber(val) {
            return isNaN(val) ? 0 : val;
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (state.gameStarted && !state.gamePaused && !state.gameOver) {
                
                // Calculate paddle velocities
                playerVel.subVectors(playerPaddle.position, playerLastPos);
                aiVel.subVectors(aiPaddle.position, aiLastPos);
                playerLastPos.copy(playerPaddle.position);
                aiLastPos.copy(aiPaddle.position);

                if (resetTimer > 0) {
                    resetTimer--;
                    if (resetTimer === 0) launchPuck();
                } else {
                    // --- AI Logic ---
                    const targetX = puck.position.x;
                    aiPaddle.position.x += (targetX - aiPaddle.position.x) * 0.04;
                    
                    let targetZ = -3;
                    if (puck.position.z < 0) {
                        targetZ = Math.max(-3.5, puck.position.z - 0.8);
                    }
                    aiPaddle.position.z += (targetZ - aiPaddle.position.z) * 0.04;

                    // Constrain AI
                    aiPaddle.position.x = Math.max(-5.5, Math.min(5.5, aiPaddle.position.x));
                    aiPaddle.position.z = Math.max(-3.5, Math.min(-0.5, aiPaddle.position.z));

                    // --- Puck Physics ---
                    puckVx *= friction;
                    puckVz *= friction;

                    // Speed cap
                    let speed = Math.sqrt(puckVx*puckVx + puckVz*puckVz);
                    if (speed > maxSpeed) {
                        puckVx = (puckVx / speed) * maxSpeed;
                        puckVz = (puckVz / speed) * maxSpeed;
                    }

                    // NaN check
                    puckVx = sanitizeNumber(puckVx);
                    puckVz = sanitizeNumber(puckVz);

                    puck.position.x += puckVx;
                    puck.position.z += puckVz;

                    // --- Wall Collisions ---
                    // Left/Right
                    if (puck.position.x > 5.7) {
                        puck.position.x = 5.7;
                        puckVx *= -1;
                    } else if (puck.position.x < -5.7) {
                        puck.position.x = -5.7;
                        puckVx *= -1;
                    }

                    // Top/Bottom & Goals
                    if (puck.position.z > 3.7) {
                        if (Math.abs(puck.position.x) < 1.5) {
                            if (puck.position.z > 4.3) handleGoal('ai');
                        } else {
                            puck.position.z = 3.7;
                            puckVz *= -1;
                        }
                    } else if (puck.position.z < -3.7) {
                        if (Math.abs(puck.position.x) < 1.5) {
                            if (puck.position.z < -4.3) handleGoal('player');
                        } else {
                            puck.position.z = -3.7;
                            puckVz *= -1;
                        }
                    }

                    // --- Paddle Collisions ---
                    checkPaddleCollision(playerPaddle, playerVel);
                    checkPaddleCollision(aiPaddle, aiVel);
                }
            }

            // --- Update State Object ---
            state.puckPosition.x = puck.position.x;
            state.puckPosition.y = puck.position.y;
            state.puckPosition.z = puck.position.z;
            state.puckVelocity.x = puckVx;
            state.puckVelocity.z = puckVz;
            state.playerPaddlePosition.x = playerPaddle.position.x;
            state.playerPaddlePosition.y = playerPaddle.position.y;
            state.playerPaddlePosition.z = playerPaddle.position.z;
            state.aiPaddlePosition.x = aiPaddle.position.x;
            state.aiPaddlePosition.y = aiPaddle.position.y;
            state.aiPaddlePosition.z = aiPaddle.position.z;
            state.puckSpeed = Math.sqrt(puckVx*puckVx + puckVz*puckVz);

            // Lantern animation
            if (state.lanternLeftLoaded && state.lanternLeft) {
                state.lanternLeft.rotation.y += 0.01;
            }
            if (state.lanternRightLoaded && state.lanternRight) {
                state.lanternRight.rotation.y -= 0.01;
            }

            renderer.render(scene, camera);
        }

        // Start loop
        animate();

    </script>
</body>
</html>
