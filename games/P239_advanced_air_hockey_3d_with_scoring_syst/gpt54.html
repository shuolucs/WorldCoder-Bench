<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Air Hockey - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b0f14;
      font-family: Arial, Helvetica, sans-serif;
    }

    #gameContainer {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      display: block;
    }

    .score {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 0 16px rgba(0,0,0,0.6);
      user-select: none;
      z-index: 10;
      pointer-events: none;
    }

    #aiScore {
      top: 18px;
    }

    #playerScore {
      bottom: 18px;
    }

    #startBtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 14px 28px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      background: #1e88e5;
      color: white;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    #startBtn:hover {
      background: #1565c0;
    }

    #pauseBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ffb300;
      color: #111;
      cursor: pointer;
      z-index: 20;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    #pauseBtn:hover {
      background: #ffa000;
    }

    #gameOverMsg {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 24px rgba(255,255,255,0.15);
      z-index: 25;
      display: none;
      text-align: center;
      pointer-events: none;
    }

    #hint {
      position: absolute;
      left: 50%;
      bottom: 70px;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="gameContainer">
    <div id="aiScore" class="score">AI: 0</div>
    <div id="playerScore" class="score">Player: 0</div>
    <button id="startBtn">Start Game</button>
    <button id="pauseBtn">Pause</button>
    <div id="gameOverMsg"></div>
    <div id="hint">Move mouse over the table to control the blue paddle. Press R to reset.</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('gameContainer');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const playerScoreEl = document.getElementById('playerScore');
    const aiScoreEl = document.getElementById('aiScore');
    const gameOverMsg = document.getElementById('gameOverMsg');

    const TABLE_WIDTH = 12;
    const TABLE_DEPTH = 8;
    const HALF_W = TABLE_WIDTH / 2; // 6
    const HALF_D = TABLE_DEPTH / 2; // 4
    const GOAL_HALF_WIDTH = 1.5;
    const PADDLE_RADIUS = 0.5;
    const PUCK_RADIUS = 0.3;
    const TABLE_Y = 0.15;
    const OBJECT_Y = 0.3;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1220);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 12, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.2);
    pointLight.position.set(0, 8, 0);
    scene.add(pointLight);

    // Optional subtle ground/background
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshPhongMaterial({ color: 0x111111, side: THREE.DoubleSide })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.02;
    scene.add(floor);

    // Table
    const table = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.3, 8),
      new THREE.MeshPhongMaterial({ color: 0x1f8f3d })
    );
    table.position.set(0, TABLE_Y, 0);
    scene.add(table);

    // Border / rim
    const rimMaterial = new THREE.MeshPhongMaterial({ color: 0x0f4f20 });
    const rimHeight = 0.3;
    const rimThickness = 0.25;
    const rimY = 0.3;

    const leftRim = new THREE.Mesh(
      new THREE.BoxGeometry(rimThickness, rimHeight, TABLE_DEPTH + rimThickness * 2),
      rimMaterial
    );
    leftRim.position.set(-HALF_W - rimThickness / 2, rimY, 0);

    const rightRim = leftRim.clone();
    rightRim.position.x = HALF_W + rimThickness / 2;

    const topLeftRim = new THREE.Mesh(
      new THREE.BoxGeometry((HALF_W - GOAL_HALF_WIDTH), rimHeight, rimThickness),
      rimMaterial
    );
    topLeftRim.position.set(-(GOAL_HALF_WIDTH + (HALF_W - GOAL_HALF_WIDTH) / 2), rimY, HALF_D + rimThickness / 2);

    const topRightRim = topLeftRim.clone();
    topRightRim.position.x = (GOAL_HALF_WIDTH + (HALF_W - GOAL_HALF_WIDTH) / 2);

    const bottomLeftRim = topLeftRim.clone();
    bottomLeftRim.position.z = -HALF_D - rimThickness / 2;

    const bottomRightRim = topRightRim.clone();
    bottomRightRim.position.z = -HALF_D - rimThickness / 2;

    scene.add(leftRim, rightRim, topLeftRim, topRightRim, bottomLeftRim, bottomRightRim);

    // Center line
    const centerLine = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 0.08),
      new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide })
    );
    centerLine.rotation.x = -Math.PI / 2;
    centerLine.position.set(0, 0.301, 0);
    scene.add(centerLine);

    // Goal guides
    const goalGuideMat = new THREE.MeshBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.15,
      side: THREE.DoubleSide
    });

    const goalGuideTop = new THREE.Mesh(
      new THREE.PlaneGeometry(GOAL_HALF_WIDTH * 2, 0.25),
      goalGuideMat
    );
    goalGuideTop.rotation.x = -Math.PI / 2;
    goalGuideTop.position.set(0, 0.302, HALF_D - 0.01);
    scene.add(goalGuideTop);

    const goalGuideBottom = goalGuideTop.clone();
    goalGuideBottom.position.z = -HALF_D + 0.01;
    scene.add(goalGuideBottom);

    // Puck
    const puck = new THREE.Mesh(
      new THREE.CylinderGeometry(PUCK_RADIUS, PUCK_RADIUS, 0.15, 32),
      new THREE.MeshPhongMaterial({ color: 0xff2d2d })
    );
    puck.position.set(0, OBJECT_Y, 0);
    scene.add(puck);

    // Player paddle
    const playerPaddle = new THREE.Mesh(
      new THREE.CylinderGeometry(PADDLE_RADIUS, PADDLE_RADIUS, 0.2, 32),
      new THREE.MeshPhongMaterial({ color: 0x2979ff })
    );
    playerPaddle.position.set(0, OBJECT_Y, 3);
    scene.add(playerPaddle);

    // AI paddle
    const aiPaddle = new THREE.Mesh(
      new THREE.CylinderGeometry(PADDLE_RADIUS, PADDLE_RADIUS, 0.2, 32),
      new THREE.MeshPhongMaterial({ color: 0xff9800 })
    );
    aiPaddle.position.set(0, OBJECT_Y, -3);
    scene.add(aiPaddle);

    // State
    window.__3D_STATE__ = {
      playerScore: 0,
      aiScore: 0,
      puckPosition: { x: 0, y: OBJECT_Y, z: 0 },
      puckVelocity: { x: 0, z: 0 },
      playerPaddlePosition: { x: 0, y: OBJECT_Y, z: 3 },
      aiPaddlePosition: { x: 0, y: OBJECT_Y, z: -3 },
      gameStarted: false,
      gamePaused: false,
      gameOver: false,
      winner: null,
      lanternLeftLoaded: false,
      lanternRightLoaded: false,
      puckSpeed: 0,
      lastGoalScorer: null,
      lanternLeft: null,
      lanternRight: null
    };

    let puckVelocity = new THREE.Vector2(0, 0); // x, z
    let lastPlayerPos = playerPaddle.position.clone();
    let lastAIPos = aiPaddle.position.clone();
    let playerMoveVel = new THREE.Vector2(0, 0);
    let aiMoveVel = new THREE.Vector2(0, 0);
    let goalDelayTimeout = null;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -OBJECT_Y);

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function sanitizeVector3(v) {
      v.x = safeNumber(v.x);
      v.y = safeNumber(v.y, OBJECT_Y);
      v.z = safeNumber(v.z);
      return v;
    }

    function sanitizeVelocity(v) {
      v.x = safeNumber(v.x);
      v.y = safeNumber(v.y);
      return v;
    }

    function updateHUD() {
      playerScoreEl.textContent = `Player: ${window.__3D_STATE__.playerScore}`;
      aiScoreEl.textContent = `AI: ${window.__3D_STATE__.aiScore}`;
      pauseBtn.textContent = window.__3D_STATE__.gamePaused ? 'Resume' : 'Pause';
    }

    function update3DState() {
      sanitizeVector3(puck.position);
      sanitizeVector3(playerPaddle.position);
      sanitizeVector3(aiPaddle.position);
      sanitizeVelocity(puckVelocity);

      window.__3D_STATE__.puckPosition = {
        x: puck.position.x,
        y: puck.position.y,
        z: puck.position.z
      };
      window.__3D_STATE__.puckVelocity = {
        x: puckVelocity.x,
        z: puckVelocity.y
      };
      window.__3D_STATE__.playerPaddlePosition = {
        x: playerPaddle.position.x,
        y: playerPaddle.position.y,
        z: playerPaddle.position.z
      };
      window.__3D_STATE__.aiPaddlePosition = {
        x: aiPaddle.position.x,
        y: aiPaddle.position.y,
        z: aiPaddle.position.z
      };
      window.__3D_STATE__.puckSpeed = Math.sqrt(puckVelocity.x * puckVelocity.x + puckVelocity.y * puckVelocity.y);
    }

    function randomLaunch(directionToward) {
      const angleSpread = 0.9;
      const baseSpeed = 0.16 + Math.random() * 0.05;
      const angle = (Math.random() - 0.5) * angleSpread;
      const zSign = directionToward === 'player' ? 1 : -1;
      puckVelocity.x = Math.sin(angle) * baseSpeed;
      puckVelocity.y = Math.cos(angle) * baseSpeed * zSign;
      capPuckSpeed();
    }

    function capPuckSpeed() {
      const speed = Math.sqrt(puckVelocity.x * puckVelocity.x + puckVelocity.y * puckVelocity.y);
      if (!Number.isFinite(speed) || speed <= 0) {
        puckVelocity.set(0, 0);
        return;
      }
      if (speed > 0.3) {
        const scale = 0.3 / speed;
        puckVelocity.multiplyScalar(scale);
      }
    }

    function resetPuck() {
      puck.position.set(0, OBJECT_Y, 0);
      puckVelocity.set(0, 0);
    }

    function resetPaddles() {
      playerPaddle.position.set(0, OBJECT_Y, 3);
      aiPaddle.position.set(0, OBJECT_Y, -3);
      lastPlayerPos.copy(playerPaddle.position);
      lastAIPos.copy(aiPaddle.position);
      playerMoveVel.set(0, 0);
      aiMoveVel.set(0, 0);
    }

    function fullReset() {
      if (goalDelayTimeout) {
        clearTimeout(goalDelayTimeout);
        goalDelayTimeout = null;
      }
      window.__3D_STATE__.playerScore = 0;
      window.__3D_STATE__.aiScore = 0;
      window.__3D_STATE__.gameStarted = false;
      window.__3D_STATE__.gamePaused = false;
      window.__3D_STATE__.gameOver = false;
      window.__3D_STATE__.winner = null;
      window.__3D_STATE__.lastGoalScorer = null;
      resetPuck();
      resetPaddles();
      gameOverMsg.style.display = 'none';
      startBtn.style.display = 'block';
      updateHUD();
      update3DState();
    }

    function startGame() {
      if (goalDelayTimeout) {
        clearTimeout(goalDelayTimeout);
        goalDelayTimeout = null;
      }
      window.__3D_STATE__.gameStarted = true;
      window.__3D_STATE__.gamePaused = false;
      window.__3D_STATE__.gameOver = false;
      gameOverMsg.style.display = 'none';
      startBtn.style.display = 'none';
      if (Math.abs(puckVelocity.x) < 1e-6 && Math.abs(puckVelocity.y) < 1e-6) {
        randomLaunch(Math.random() > 0.5 ? 'player' : 'ai');
      }
      updateHUD();
    }

    function handleGoal(scorer) {
      if (window.__3D_STATE__.gameOver) return;

      if (scorer === 'player') {
        window.__3D_STATE__.playerScore += 1;
      } else {
        window.__3D_STATE__.aiScore += 1;
      }

      window.__3D_STATE__.lastGoalScorer = scorer;
      updateHUD();

      if (window.__3D_STATE__.playerScore >= 7 || window.__3D_STATE__.aiScore >= 7) {
        window.__3D_STATE__.gameOver = true;
        window.__3D_STATE__.gameStarted = false;
        window.__3D_STATE__.winner = window.__3D_STATE__.playerScore >= 7 ? 'player' : 'ai';
        puckVelocity.set(0, 0);
        const winnerText = window.__3D_STATE__.winner === 'player' ? 'Player Wins!' : 'AI Wins!';
        gameOverMsg.textContent = `Game Over - ${winnerText}`;
        gameOverMsg.style.display = 'block';
        startBtn.style.display = 'block';
        startBtn.textContent = 'Restart Game';
        return;
      }

      resetPuck();
      window.__3D_STATE__.gameStarted = false;
      startBtn.style.display = 'none';

      goalDelayTimeout = setTimeout(() => {
        if (!window.__3D_STATE__.gameOver) {
          window.__3D_STATE__.gameStarted = true;
          randomLaunch(scorer);
        }
      }, 1000);
    }

    function paddlePuckCollision(paddle, paddleVel2) {
      const dx = puck.position.x - paddle.position.x;
      const dz = puck.position.z - paddle.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);

      if (dist < 0.8 && dist > 0) {
        const nx = dx / dist;
        const nz = dz / dist;

        const vDotN = puckVelocity.x * nx + puckVelocity.y * nz;
        puckVelocity.x = puckVelocity.x - 2 * vDotN * nx;
        puckVelocity.y = puckVelocity.y - 2 * vDotN * nz;

        puckVelocity.x += paddleVel2.x * 0.2;
        puckVelocity.y += paddleVel2.y * 0.2;

        puck.position.x = paddle.position.x + nx * 0.81;
        puck.position.z = paddle.position.z + nz * 0.81;

        capPuckSpeed();
      } else if (dist === 0) {
        puck.position.z += 0.01;
      }
    }

    function updatePlayerFromMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersect = new THREE.Vector3();
      const hit = raycaster.ray.intersectPlane(tablePlane, intersect);

      if (hit) {
        intersect.x = safeNumber(intersect.x);
        intersect.z = safeNumber(intersect.z);

        playerPaddle.position.x = clamp(intersect.x, -5.5, 5.5);
        playerPaddle.position.z = clamp(intersect.z, 0.4, 3.5);
        playerPaddle.position.y = OBJECT_Y;
      }
    }

    renderer.domElement.addEventListener('mousemove', updatePlayerFromMouse);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        startBtn.textContent = 'Start Game';
        fullReset();
      }
    });

    startBtn.addEventListener('click', () => {
      if (window.__3D_STATE__.gameOver) {
        startBtn.textContent = 'Start Game';
        fullReset();
      }
      startGame();
    });

    pauseBtn.addEventListener('click', () => {
      if (window.__3D_STATE__.gameOver) return;
      window.__3D_STATE__.gamePaused = !window.__3D_STATE__.gamePaused;
      updateHUD();
    });

    // Decorative lanterns
    const loader = new GLTFLoader();
    const lanternURL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Lantern/glTF-Binary/Lantern.glb';

    loader.load(
      lanternURL,
      (gltf) => {
        const baseLantern = gltf.scene;
        baseLantern.scale.setScalar(0.5);

        const left = baseLantern.clone(true);
        left.position.set(-4, 0, 0);
        scene.add(left);

        const right = baseLantern.clone(true);
        right.position.set(4, 0, 0);
        scene.add(right);

        window.__3D_STATE__.lanternLeft = left;
        window.__3D_STATE__.lanternRight = right;
        window.__3D_STATE__.lanternLeftLoaded = true;
        window.__3D_STATE__.lanternRightLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Lantern model failed to load:', err);
        window.__3D_STATE__.lanternLeftLoaded = false;
        window.__3D_STATE__.lanternRightLoaded = false;
      }
    );

    function updateAI() {
      const targetX = clamp(puck.position.x, -5.5, 5.5);
      aiPaddle.position.x += (targetX - aiPaddle.position.x) * 0.04;

      let targetZ = -3;
      if (puck.position.z < 0) {
        targetZ = clamp(-3 + (puck.position.z + 2) * 0.25, -3.5, -0.5);
      }
      aiPaddle.position.z += (targetZ - aiPaddle.position.z) * 0.04;

      aiPaddle.position.x = clamp(aiPaddle.position.x, -5.5, 5.5);
      aiPaddle.position.z = clamp(aiPaddle.position.z, -3.5, -0.4);
      aiPaddle.position.y = OBJECT_Y;
    }

    function physicsStep() {
      puckVelocity.multiplyScalar(0.998);
      capPuckSpeed();

      puck.position.x += puckVelocity.x;
      puck.position.z += puckVelocity.y;

      sanitizeVector3(puck.position);
      sanitizeVelocity(puckVelocity);

      // Left/right walls
      if (puck.position.x - PUCK_RADIUS <= -HALF_W) {
        puck.position.x = -HALF_W + PUCK_RADIUS;
        puckVelocity.x *= -1;
      } else if (puck.position.x + PUCK_RADIUS >= HALF_W) {
        puck.position.x = HALF_W - PUCK_RADIUS;
        puckVelocity.x *= -1;
      }

      // Top/bottom walls except goals
      const inGoalX = Math.abs(puck.position.x) < GOAL_HALF_WIDTH;

      if (puck.position.z + PUCK_RADIUS >= HALF_D) {
        if (!inGoalX) {
          puck.position.z = HALF_D - PUCK_RADIUS;
          puckVelocity.y *= -1;
        }
      } else if (puck.position.z - PUCK_RADIUS <= -HALF_D) {
        if (!inGoalX) {
          puck.position.z = -HALF_D + PUCK_RADIUS;
          puckVelocity.y *= -1;
        }
      }

      paddlePuckCollision(playerPaddle, playerMoveVel);
      paddlePuckCollision(aiPaddle, aiMoveVel);

      capPuckSpeed();

      // Scoring
      if (puck.position.z > HALF_D && Math.abs(puck.position.x) < GOAL_HALF_WIDTH) {
        handleGoal('ai');
      } else if (puck.position.z < -HALF_D && Math.abs(puck.position.x) < GOAL_HALF_WIDTH) {
        handleGoal('player');
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      // Decorative motion if lanterns exist
      if (window.__3D_STATE__.lanternLeft) {
        window.__3D_STATE__.lanternLeft.rotation.y += 0.002;
      }
      if (window.__3D_STATE__.lanternRight) {
        window.__3D_STATE__.lanternRight.rotation.y -= 0.002;
      }

      playerPaddle.position.y = OBJECT_Y;
      aiPaddle.position.y = OBJECT_Y;
      puck.position.y = OBJECT_Y;

      sanitizeVector3(playerPaddle.position);
      sanitizeVector3(aiPaddle.position);
      sanitizeVector3(puck.position);

      updateAI();

      playerMoveVel.set(
        playerPaddle.position.x - lastPlayerPos.x,
        playerPaddle.position.z - lastPlayerPos.z
      );
      aiMoveVel.set(
        aiPaddle.position.x - lastAIPos.x,
        aiPaddle.position.z - lastAIPos.z
      );

      if (window.__3D_STATE__.gameStarted && !window.__3D_STATE__.gamePaused && !window.__3D_STATE__.gameOver) {
        physicsStep();
      }

      lastPlayerPos.copy(playerPaddle.position);
      lastAIPos.copy(aiPaddle.position);

      update3DState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    update3DState();
    animate();
  </script>
</body>
</html>
