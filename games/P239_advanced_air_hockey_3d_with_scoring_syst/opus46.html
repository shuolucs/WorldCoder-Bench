<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Air Hockey</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}
#aiScore {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff8800;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,136,0,0.8), 2px 2px 4px rgba(0,0,0,0.8);
}
#playerScore {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #4488ff;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(68,136,255,0.8), 2px 2px 4px rgba(0,0,0,0.8);
}
#aiLabel {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff8800;
    font-size: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
#playerLabel {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: #4488ff;
    font-size: 18px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}
#startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 28px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #00aa44, #008833);
    border: 3px solid #00ff66;
    border-radius: 15px;
    cursor: pointer;
    pointer-events: all;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    box-shadow: 0 0 20px rgba(0,255,100,0.3);
    transition: all 0.2s;
}
#startBtn:hover {
    background: linear-gradient(135deg, #00cc55, #00aa44);
    box-shadow: 0 0 30px rgba(0,255,100,0.5);
    transform: translate(-50%, -50%) scale(1.05);
}
#pauseBtn {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 10px 25px;
    font-size: 18px;
    font-weight: bold;
    color: #fff;
    background: rgba(100,100,100,0.7);
    border: 2px solid #aaa;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.2s;
}
#pauseBtn:hover {
    background: rgba(150,150,150,0.8);
}
#gameOverMsg {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 52px;
    font-weight: bold;
    text-align: center;
    text-shadow: 0 0 20px rgba(255,255,255,0.5), 2px 2px 6px rgba(0,0,0,0.8);
    pointer-events: none;
}
#goalFlash {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffff00;
    font-size: 64px;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(255,255,0,0.8);
    pointer-events: none;
    animation: flashAnim 1s ease-out forwards;
}
@keyframes flashAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
}
</style>
</head>
<body>

<div id="hud">
    <div id="aiScore">0</div>
    <div id="aiLabel">AI</div>
    <div id="playerScore">0</div>
    <div id="playerLabel">Player</div>
    <button id="startBtn">Start Game</button>
    <button id="pauseBtn">Pause</button>
    <div id="gameOverMsg"></div>
    <div id="goalFlash">GOAL!</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
window.__3D_STATE__ = {
    playerScore: 0,
    aiScore: 0,
    puckPosition: { x: 0, y: 0.3, z: 0 },
    puckVelocity: { x: 0, z: 0 },
    playerPaddlePosition: { x: 0, y: 0.3, z: 3 },
    aiPaddlePosition: { x: 0, y: 0.3, z: -3 },
    gameStarted: false,
    gamePaused: false,
    gameOver: false,
    winner: null,
    lanternLeftLoaded: false,
    lanternRightLoaded: false,
    lanternLeft: null,
    lanternRight: null,
    puckSpeed: 0,
    lastGoalScorer: null
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.2, 30);
pointLight.position.set(0, 8, 0);
pointLight.castShadow = true;
pointLight.shadow.mapSize.width = 1024;
pointLight.shadow.mapSize.height = 1024;
scene.add(pointLight);

// Additional accent lights
const blueLight = new THREE.PointLight(0x4488ff, 0.4, 15);
blueLight.position.set(0, 3, 5);
scene.add(blueLight);

const orangeLight = new THREE.PointLight(0xff8800, 0.4, 15);
orangeLight.position.set(0, 3, -5);
scene.add(orangeLight);

// ============ TABLE ============
// Main table surface
const tableGeom = new THREE.BoxGeometry(12, 0.3, 8);
const tableMat = new THREE.MeshStandardMaterial({
    color: 0x1a6b30,
    roughness: 0.3,
    metalness: 0.1
});
const table = new THREE.Mesh(tableGeom, tableMat);
table.position.set(0, 0, 0);
table.receiveShadow = true;
scene.add(table);

// Table border/rim
const rimMat = new THREE.MeshStandardMaterial({
    color: 0x3d2b1f,
    roughness: 0.5,
    metalness: 0.3
});

// Left wall
const leftWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 8), rimMat);
leftWall.position.set(-6.15, 0.15, 0);
leftWall.castShadow = true;
scene.add(leftWall);

// Right wall
const rightWall = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, 8), rimMat);
rightWall.position.set(6.15, 0.15, 0);
rightWall.castShadow = true;
scene.add(rightWall);

// Top wall (z = -4) - two segments with goal gap
const topWallLeft = new THREE.Mesh(new THREE.BoxGeometry(3.15, 0.3, 0.3), rimMat);
topWallLeft.position.set(-4.425, 0.15, -4.15);
topWallLeft.castShadow = true;
scene.add(topWallLeft);

const topWallRight = new THREE.Mesh(new THREE.BoxGeometry(3.15, 0.3, 0.3), rimMat);
topWallRight.position.set(4.425, 0.15, -4.15);
topWallRight.castShadow = true;
scene.add(topWallRight);

// Bottom wall (z = +4) - two segments with goal gap
const botWallLeft = new THREE.Mesh(new THREE.BoxGeometry(3.15, 0.3, 0.3), rimMat);
botWallLeft.position.set(-4.425, 0.15, 4.15);
botWallLeft.castShadow = true;
scene.add(botWallLeft);

const botWallRight = new THREE.Mesh(new THREE.BoxGeometry(3.15, 0.3, 0.3), rimMat);
botWallRight.position.set(4.425, 0.15, 4.15);
botWallRight.castShadow = true;
scene.add(botWallRight);

// Goal areas - visual markers
const goalMat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    emissive: 0x330000,
    transparent: true,
    opacity: 0.3
});
const goalTop = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.5), goalMat);
goalTop.rotation.x = -Math.PI / 2;
goalTop.position.set(0, 0.16, -4.25);
scene.add(goalTop);

const goalBot = new THREE.Mesh(new THREE.PlaneGeometry(3, 0.5), goalMat);
goalBot.rotation.x = -Math.PI / 2;
goalBot.position.set(0, 0.16, 4.25);
scene.add(goalBot);

// Center line
const centerLine = new THREE.Mesh(
    new THREE.PlaneGeometry(12, 0.05),
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 })
);
centerLine.rotation.x = -Math.PI / 2;
centerLine.position.set(0, 0.16, 0);
scene.add(centerLine);

// Center circle
const centerCircleGeom = new THREE.RingGeometry(0.95, 1.05, 64);
const centerCircle = new THREE.Mesh(
    centerCircleGeom,
    new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333, side: THREE.DoubleSide })
);
centerCircle.rotation.x = -Math.PI / 2;
centerCircle.position.set(0, 0.16, 0);
scene.add(centerCircle);

// ============ PUCK ============
const puckGeom = new THREE.CylinderGeometry(0.3, 0.3, 0.15, 32);
const puckMat = new THREE.MeshStandardMaterial({
    color: 0xff2222,
    emissive: 0x440000,
    roughness: 0.2,
    metalness: 0.8
});
const puck = new THREE.Mesh(puckGeom, puckMat);
puck.position.set(0, 0.3, 0);
puck.castShadow = true;
scene.add(puck);

// Puck glow
const puckGlow = new THREE.PointLight(0xff2222, 0.3, 3);
puckGlow.position.set(0, 0.5, 0);
puck.add(puckGlow);

// ============ PADDLES ============
const playerPaddleGeom = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 32);
const playerPaddleMat = new THREE.MeshStandardMaterial({
    color: 0x2266ff,
    emissive: 0x112244,
    roughness: 0.2,
    metalness: 0.6
});
const playerPaddle = new THREE.Mesh(playerPaddleGeom, playerPaddleMat);
playerPaddle.position.set(0, 0.3, 3);
playerPaddle.castShadow = true;
scene.add(playerPaddle);

// Player paddle handle
const handleGeom = new THREE.CylinderGeometry(0.15, 0.15, 0.3, 16);
const handleMat = new THREE.MeshStandardMaterial({ color: 0x1144cc, roughness: 0.3, metalness: 0.5 });
const playerHandle = new THREE.Mesh(handleGeom, handleMat);
playerHandle.position.y = 0.2;
playerPaddle.add(playerHandle);

const aiPaddleGeom = new THREE.CylinderGeometry(0.5, 0.5, 0.2, 32);
const aiPaddleMat = new THREE.MeshStandardMaterial({
    color: 0xff8800,
    emissive: 0x442200,
    roughness: 0.2,
    metalness: 0.6
});
const aiPaddle = new THREE.Mesh(aiPaddleGeom, aiPaddleMat);
aiPaddle.position.set(0, 0.3, -3);
aiPaddle.castShadow = true;
scene.add(aiPaddle);

const aiHandle = new THREE.Mesh(handleGeom, new THREE.MeshStandardMaterial({ color: 0xcc6600, roughness: 0.3, metalness: 0.5 }));
aiHandle.position.y = 0.2;
aiPaddle.add(aiHandle);

// ============ LANTERNS ============
const loader = new GLTFLoader();
const lanternURL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Lantern/glTF-Binary/Lantern.glb';

loader.load(lanternURL, (gltf) => {
    const lanternLeft = gltf.scene.clone();
    lanternLeft.scale.set(0.5, 0.5, 0.5);
    lanternLeft.position.set(-4, 0, 0);
    scene.add(lanternLeft);
    state.lanternLeft = lanternLeft;
    state.lanternLeftLoaded = true;

    const lanternRight = gltf.scene.clone();
    lanternRight.scale.set(0.5, 0.5, 0.5);
    lanternRight.position.set(4, 0, 0);
    scene.add(lanternRight);
    state.lanternRight = lanternRight;
    state.lanternRightLoaded = true;
}, undefined, (error) => {
    console.warn('Could not load Lantern.glb, placing placeholder markers:', error);
    // Fallback decorative markers
    const markerGeom = new THREE.ConeGeometry(0.3, 1.5, 8);
    const markerMatL = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0x664400 });
    const markerMatR = new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0x664400 });

    const markerLeft = new THREE.Mesh(markerGeom, markerMatL);
    markerLeft.position.set(-4, 0.75, 0);
    scene.add(markerLeft);
    state.lanternLeft = markerLeft;
    state.lanternLeftLoaded = true;

    const markerRight = new THREE.Mesh(markerGeom, markerMatR);
    markerRight.position.set(4, 0.75, 0);
    scene.add(markerRight);
    state.lanternRight = markerRight;
    state.lanternRightLoaded = true;
});

// ============ FLOOR ============
const floorGeom = new THREE.PlaneGeometry(50, 50);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.16;
floor.receiveShadow = true;
scene.add(floor);

// ============ GAME VARIABLES ============
let puckVx = 0, puckVz = 0;
let prevPlayerX = 0, prevPlayerZ = 3;
let goalDelay = false;
let goalDelayTimer = 0;
const FRICTION = 0.998;
const MAX_SPEED = 0.3;
const WIN_SCORE = 7;

// Mouse tracking
const mouse = new THREE.Vector2();
const raycaster = new THREE.Raycaster();
const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -0.3);

// ============ DOM ELEMENTS ============
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const playerScoreEl = document.getElementById('playerScore');
const aiScoreEl = document.getElementById('aiScore');
const gameOverMsg = document.getElementById('gameOverMsg');
const goalFlash = document.getElementById('goalFlash');

startBtn.addEventListener('click', () => {
    startGame();
});

pauseBtn.addEventListener('click', () => {
    if (!state.gameStarted || state.gameOver) return;
    state.gamePaused = !state.gamePaused;
    pauseBtn.textContent = state.gamePaused ? 'Resume' : 'Pause';
});

function startGame() {
    state.playerScore = 0;
    state.aiScore = 0;
    state.gameStarted = true;
    state.gamePaused = false;
    state.gameOver = false;
    state.winner = null;
    state.lastGoalScorer = null;
    goalDelay = false;

    puck.position.set(0, 0.3, 0);
    playerPaddle.position.set(0, 0.3, 3);
    aiPaddle.position.set(0, 0.3, -3);

    const angle = Math.random() * Math.PI * 2;
    puckVx = Math.cos(angle) * 0.1;
    puckVz = Math.sin(angle) * 0.1;

    updateScoreDisplay();
    startBtn.style.display = 'none';
    gameOverMsg.style.display = 'none';
    pauseBtn.textContent = 'Pause';
}

function resetPuck(towardScorer) {
    puck.position.set(0, 0.3, 0);
    puckVx = 0;
    puckVz = 0;
    goalDelay = true;
    goalDelayTimer = 60; // ~1 second at 60fps

    // Show goal flash
    goalFlash.style.display = 'block';
    goalFlash.style.animation = 'none';
    goalFlash.offsetHeight; // trigger reflow
    goalFlash.style.animation = 'flashAnim 1s ease-out forwards';
    setTimeout(() => { goalFlash.style.display = 'none'; }, 1000);
}

function launchPuckAfterGoal() {
    const angle = (Math.random() - 0.5) * Math.PI * 0.5;
    const speed = 0.1;
    if (state.lastGoalScorer === 'player') {
        // Launch toward AI (negative z)
        puckVx = Math.sin(angle) * speed;
        puckVz = -Math.cos(angle) * speed;
    } else {
        // Launch toward player (positive z)
        puckVx = Math.sin(angle) * speed;
        puckVz = Math.cos(angle) * speed;
    }
}

function updateScoreDisplay() {
    playerScoreEl.textContent = state.playerScore;
    aiScoreEl.textContent = state.aiScore;
}

function showGameOver(winner) {
    state.gameOver = true;
    state.winner = winner;
    gameOverMsg.style.display = 'block';
    if (winner === 'player') {
        gameOverMsg.innerHTML = '🎉 YOU WIN! 🎉<br><span style="font-size:24px">Press R or click Start to play again</span>';
        gameOverMsg.style.color = '#4488ff';
    } else {
        gameOverMsg.innerHTML = '😔 AI WINS 😔<br><span style="font-size:24px">Press R or click Start to play again</span>';
        gameOverMsg.style.color = '#ff8800';
    }
    startBtn.style.display = 'block';
    startBtn.textContent = 'Play Again';
}

// ============ INPUT ============
window.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

window.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        state.playerScore = 0;
        state.aiScore = 0;
        state.gameStarted = false;
        state.gamePaused = false;
        state.gameOver = false;
        state.winner = null;
        state.lastGoalScorer = null;
        goalDelay = false;

        puck.position.set(0, 0.3, 0);
        puckVx = 0;
        puckVz = 0;
        playerPaddle.position.set(0, 0.3, 3);
        aiPaddle.position.set(0, 0.3, -3);

        updateScoreDisplay();
        startBtn.style.display = 'block';
        startBtn.textContent = 'Start Game';
        gameOverMsg.style.display = 'none';
        pauseBtn.textContent = 'Pause';
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ HELPER FUNCTIONS ============
function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
}

function safeNum(val, fallback) {
    return (isNaN(val) || !isFinite(val)) ? fallback : val;
}

// ============ GAME LOOP ============
function animate() {
    requestAnimationFrame(animate);

    if (state.gameStarted && !state.gamePaused && !state.gameOver) {
        // --- Goal delay ---
        if (goalDelay) {
            goalDelayTimer--;
            if (goalDelayTimer <= 0) {
                goalDelay = false;
                launchPuckAfterGoal();
            }
        }

        // --- Player paddle movement via raycasting ---
        raycaster.setFromCamera(mouse, camera);
        const intersectPoint = new THREE.Vector3();
        const hit = raycaster.ray.intersectPlane(tablePlane, intersectPoint);
        if (hit) {
            const targetX = clamp(safeNum(intersectPoint.x, playerPaddle.position.x), -5.5, 5.5);
            const targetZ = clamp(safeNum(intersectPoint.z, playerPaddle.position.z), 0.5, 3.8);
            playerPaddle.position.x = targetX;
            playerPaddle.position.z = targetZ;
        }

        const playerDx = playerPaddle.position.x - prevPlayerX;
        const playerDz = playerPaddle.position.z - prevPlayerZ;
        prevPlayerX = playerPaddle.position.x;
        prevPlayerZ = playerPaddle.position.z;

        // --- AI paddle ---
        const aiTargetX = clamp(puck.position.x, -5.5, 5.5);
        aiPaddle.position.x += (aiTargetX - aiPaddle.position.x) * 0.04;

        if (puck.position.z < 0) {
            const aiTargetZ = clamp(puck.position.z - 0.5, -3.8, -0.5);
            aiPaddle.position.z += (aiTargetZ - aiPaddle.position.z) * 0.03;
        } else {
            aiPaddle.position.z += (-3 - aiPaddle.position.z) * 0.02;
        }
        aiPaddle.position.z = clamp(aiPaddle.position.z, -3.8, -0.5);

        if (!goalDelay) {
            // --- Puck physics ---
            puckVx *= FRICTION;
            puckVz *= FRICTION;

            // Cap speed
            const speed = Math.sqrt(puckVx * puckVx + puckVz * puckVz);
            if (speed > MAX_SPEED) {
                puckVx = (puckVx / speed) * MAX_SPEED;
                puckVz = (puckVz / speed) * MAX_SPEED;
            }

            // Stop very slow movement
            if (speed < 0.001) {
                puckVx = 0;
                puckVz = 0;
            }

            puck.position.x += safeNum(puckVx, 0);
            puck.position.z += safeNum(puckVz, 0);

            // --- Wall collisions ---
            // Left/right walls
            if (puck.position.x < -5.7) {
                puck.position.x = -5.7;
                puckVx = Math.abs(puckVx);
            }
            if (puck.position.x > 5.7) {
                puck.position.x = 5.7;
                puckVx = -Math.abs(puckVx);
            }

            // Top/bottom walls (with goal gaps)
            const inGoalX = Math.abs(puck.position.x) < 1.5;

            if (puck.position.z < -4 && !inGoalX) {
                puck.position.z = -4;
                puckVz = Math.abs(puckVz);
            }
            if (puck.position.z > 4 && !inGoalX) {
                puck.position.z = 4;
                puckVz = -Math.abs(puckVz);
            }

            // --- Goal detection ---
            if (puck.position.z > 4 && inGoalX) {
                // AI scores
                state.aiScore++;
                state.lastGoalScorer = 'ai';
                updateScoreDisplay();
                if (state.aiScore >= WIN_SCORE) {
                    showGameOver('ai');
                } else {
                    resetPuck('ai');
                }
            }
            if (puck.position.z < -4 && inGoalX) {
                // Player scores
                state.playerScore++;
                state.lastGoalScorer = 'player';
                updateScoreDisplay();
                if (state.playerScore >= WIN_SCORE) {
                    showGameOver('player');
                } else {
                    resetPuck('player');
                }
            }

            // --- Paddle-puck collisions ---
            // Player paddle
            const dxP = puck.position.x - playerPaddle.position.x;
            const dzP = puck.position.z - playerPaddle.position.z;
            const distP = Math.sqrt(dxP * dxP + dzP * dzP);
            if (distP < 0.8 && distP > 0.001) {
                const nx = dxP / distP;
                const nz = dzP / distP;
                // Reflect
                const dot = puckVx * nx + puckVz * nz;
                puckVx = puckVx - 2 * dot * nx;
                puckVz = puckVz - 2 * dot * nz;
                // Add paddle velocity transfer
                puckVx += playerDx * 0.2;
                puckVz += playerDz * 0.2;
                // Separate
                puck.position.x = playerPaddle.position.x + nx * 0.81;
                puck.position.z = playerPaddle.position.z + nz * 0.81;
                // Ensure minimum speed after hit
                const postSpeed = Math.sqrt(puckVx * puckVx + puckVz * puckVz);
                if (postSpeed < 0.05) {
                    puckVx = nx * 0.05;
                    puckVz = nz * 0.05;
                }
            }

            // AI paddle
            const dxA = puck.position.x - aiPaddle.position.x;
            const dzA = puck.position.z - aiPaddle.position.z;
            const distA = Math.sqrt(dxA * dxA + dzA * dzA);
            if (distA < 0.8 && distA > 0.001) {
                const nx = dxA / distA;
                const nz = dzA / distA;
                const dot = puckVx * nx + puckVz * nz;
                puckVx = puckVx - 2 * dot * nx;
                puckVz = puckVz - 2 * dot * nz;
                // AI paddle velocity transfer
                const aiDx = (aiTargetX - aiPaddle.position.x) * 0.04;
                puckVx += aiDx * 0.2;
                puckVz += 0.02; // slight push toward player
                // Separate
                puck.position.x = aiPaddle.position.x + nx * 0.81;
                puck.position.z = aiPaddle.position.z + nz * 0.81;
                const postSpeed = Math.sqrt(puckVx * puckVx + puckVz * puckVz);
                if (postSpeed < 0.05) {
                    puckVx = nx * 0.05;
                    puckVz = nz * 0.05;
                }
            }
        }

        // Sanitize all positions
        puck.position.x = safeNum(puck.position.x, 0);
        puck.position.z = safeNum(puck.position.z, 0);
        puck.position.y = 0.3;
        playerPaddle.position.y = 0.3;
        aiPaddle.position.y = 0.3;
        puckVx = safeNum(puckVx, 0);
        puckVz = safeNum(puckVz, 0);
    }

    // Puck rotation visual
    if (state.gameStarted && !state.gamePaused) {
        puck.rotation.y += puckVx * 2;
    }

    // Puck trail glow intensity based on speed
    const currentSpeed = Math.sqrt(puckVx * puckVx + puckVz * puckVz);
    puckGlow.intensity = 0.3 + currentSpeed * 5;

    // ============ UPDATE STATE ============
    state.puckPosition = { x: puck.position.x, y: puck.position.y, z: puck.position.z };
    state.puckVelocity = { x: puckVx, z: puckVz };
    state.playerPaddlePosition = { x: playerPaddle.position.x, y: playerPaddle.position.y, z: playerPaddle.position.z };
    state.aiPaddlePosition = { x: aiPaddle.position.x, y: aiPaddle.position.y, z: aiPaddle.position.z };
    state.puckSpeed = currentSpeed;

    renderer.render(scene, camera);
}

animate();
</script>
