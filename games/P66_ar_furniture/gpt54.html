<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 俯视角 AR 家具预览</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #e9ecef;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 260px;
      padding: 14px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    #ui h2 {
      margin: 0 0 12px;
      font-size: 16px;
    }

    .section {
      margin-bottom: 14px;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #333;
      font-weight: 600;
    }

    #furnitureCatalog {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    #furnitureCatalog button,
    #removeBtn {
      padding: 10px 8px;
      border: 1px solid #cfd4da;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.18s ease;
      font-size: 14px;
    }

    #furnitureCatalog button:hover,
    #removeBtn:hover {
      background: #f3f6f9;
    }

    #furnitureCatalog button.active {
      background: #1f6feb;
      color: white;
      border-color: #1f6feb;
    }

    .sliderRow {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    .valueText {
      font-size: 12px;
      color: #555;
    }

    #status {
      font-size: 12px;
      color: #444;
      line-height: 1.5;
      background: #f8f9fa;
      border-radius: 8px;
      padding: 8px;
      border: 1px solid #e2e6ea;
    }

    #hint {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      z-index: 10;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>AR 家具预览</h2>

      <div class="section">
        <span class="label">家具目录</span>
        <div id="furnitureCatalog">
          <button data-type="chair">chair 椅</button>
          <button data-type="table">table 桌</button>
          <button data-type="lamp">lamp 灯</button>
          <button data-type="rug">rug 地毯</button>
        </div>
      </div>

      <div class="section">
        <span class="label">缩放</span>
        <div class="sliderRow">
          <input id="scaleSlider" type="range" min="0.5" max="2.0" step="0.05" value="1">
          <div class="valueText">当前：<span id="scaleValue">1.00</span></div>
        </div>
      </div>

      <div class="section">
        <span class="label">旋转</span>
        <div class="sliderRow">
          <input id="rotateSlider" type="range" min="0" max="360" step="1" value="0">
          <div class="valueText">当前：<span id="rotateValue">0°</span></div>
        </div>
      </div>

      <div class="section">
        <button id="removeBtn">删除当前选中</button>
      </div>

      <div id="status"></div>
    </div>

    <div id="hint">左键点击地面放置；点击家具选中；右键/拖动可旋转视角</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const catalog = document.getElementById('furnitureCatalog');
    const scaleSlider = document.getElementById('scaleSlider');
    const rotateSlider = document.getElementById('rotateSlider');
    const removeBtn = document.getElementById('removeBtn');
    const scaleValue = document.getElementById('scaleValue');
    const rotateValue = document.getElementById('rotateValue');
    const status = document.getElementById('status');

    let currentType = '';
    let selectedItem = null;
    const placedItems = [];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf2f4f7);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(6.5, 8.5, 6.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI * 0.48;
    controls.minDistance = 5;
    controls.maxDistance = 20;

    const ambient = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
    dirLight.position.set(4, 8, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(10, 20, 0xb8bec6, 0xd7dce2);
    grid.position.y = 0.001;
    scene.add(grid);

    const groundMat = new THREE.MeshStandardMaterial({
      color: 0xe6e8eb,
      roughness: 0.95,
      metalness: 0.02
    });
    const groundGeo = new THREE.PlaneGeometry(10, 10);
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.userData.isGround = true;
    scene.add(ground);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const selectableRoots = [];

    function makeMat(color) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.7,
        metalness: 0.1
      });
    }

    function setFurnitureMetadata(root, type) {
      root.userData.type = type;
      root.userData.isFurnitureRoot = true;
      root.traverse((child) => {
        if (child.isMesh) {
          child.userData.type = type;
          child.userData.root = root;
          child.userData.originalEmissive = child.material.emissive ? child.material.emissive.clone() : null;
        }
      });
    }

    function createChair() {
      const g = new THREE.Group();

      const seat = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.12, 0.7),
        makeMat(0x8b5e3c)
      );
      seat.position.y = 0.45;
      g.add(seat);

      const back = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.7, 0.12),
        makeMat(0x9a6a45)
      );
      back.position.set(0, 0.8, -0.29);
      g.add(back);

      const legGeo = new THREE.BoxGeometry(0.1, 0.45, 0.1);
      const legMat = makeMat(0x444444);
      const legPos = [
        [-0.27, 0.225, -0.27],
        [ 0.27, 0.225, -0.27],
        [-0.27, 0.225,  0.27],
        [ 0.27, 0.225,  0.27],
      ];
      legPos.forEach(([x,y,z]) => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x,y,z);
        g.add(leg);
      });

      setFurnitureMetadata(g, 'chair');
      return g;
    }

    function createTable() {
      const g = new THREE.Group();

      const top = new THREE.Mesh(
        new THREE.BoxGeometry(1.4, 0.12, 0.9),
        makeMat(0xc49a6c)
      );
      top.position.y = 0.75;
      g.add(top);

      const legGeo = new THREE.BoxGeometry(0.12, 0.75, 0.12);
      const legMat = makeMat(0x555555);
      const legPos = [
        [-0.58, 0.375, -0.33],
        [ 0.58, 0.375, -0.33],
        [-0.58, 0.375,  0.33],
        [ 0.58, 0.375,  0.33],
      ];
      legPos.forEach(([x,y,z]) => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x,y,z);
        g.add(leg);
      });

      setFurnitureMetadata(g, 'table');
      return g;
    }

    function createLamp() {
      const g = new THREE.Group();

      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(0.22, 0.26, 0.08, 24),
        makeMat(0x666666)
      );
      base.position.y = 0.04;
      g.add(base);

      const pole = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 1.0, 16),
        makeMat(0x888888)
      );
      pole.position.y = 0.58;
      g.add(pole);

      const shade = new THREE.Mesh(
        new THREE.ConeGeometry(0.28, 0.38, 24, 1, true),
        makeMat(0xf2e7b9)
      );
      shade.position.y = 1.28;
      shade.rotation.x = Math.PI;
      g.add(shade);

      const bulb = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        new THREE.MeshStandardMaterial({
          color: 0xfff4c7,
          emissive: 0x332200,
          roughness: 0.4,
          metalness: 0.0
        })
      );
      bulb.position.y = 1.12;
      g.add(bulb);

      setFurnitureMetadata(g, 'lamp');
      return g;
    }

    function createRug() {
      const g = new THREE.Group();

      const rug = new THREE.Mesh(
        new THREE.BoxGeometry(1.8, 0.03, 1.2),
        makeMat(0x4f7cac)
      );
      rug.position.y = 0.015;
      g.add(rug);

      const stripe1 = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 0.01, 0.12),
        makeMat(0xd9e2ec)
      );
      stripe1.position.set(0, 0.036, -0.25);
      g.add(stripe1);

      const stripe2 = stripe1.clone();
      stripe2.position.z = 0.25;
      g.add(stripe2);

      setFurnitureMetadata(g, 'rug');
      return g;
    }

    function createFurniture(type) {
      switch (type) {
        case 'chair': return createChair();
        case 'table': return createTable();
        case 'lamp': return createLamp();
        case 'rug': return createRug();
        default: return null;
      }
    }

    function clearHighlight(item) {
      if (!item) return;
      item.traverse((child) => {
        if (child.isMesh && child.material && child.material.emissive) {
          child.material.emissive.setHex(0x000000);
        }
      });
    }

    function applyHighlight(item) {
      if (!item) return;
      item.traverse((child) => {
        if (child.isMesh && child.material && child.material.emissive) {
          child.material.emissive.setHex(0x2244aa);
        }
      });
    }

    function selectItem(item) {
      if (selectedItem === item) {
        updateUIFromSelection();
        update3DState();
        return;
      }
      clearHighlight(selectedItem);
      selectedItem = item || null;
      applyHighlight(selectedItem);
      updateUIFromSelection();
      update3DState();
    }

    function updateUIFromSelection() {
      if (selectedItem) {
        const s = selectedItem.scale.x;
        const deg = THREE.MathUtils.radToDeg(selectedItem.rotation.y);
        scaleSlider.value = s.toFixed(2);
        rotateSlider.value = ((deg % 360) + 360) % 360;
      }
      scaleValue.textContent = Number(scaleSlider.value).toFixed(2);
      rotateValue.textContent = `${Math.round(Number(rotateSlider.value))}°`;
      updateStatus();
    }

    function updateStatus() {
      const selectedIndex = selectedItem ? placedItems.indexOf(selectedItem) : null;
      status.innerHTML = `
        已选目录：<b>${currentType || '无'}</b><br>
        已放置数量：<b>${placedItems.length}</b><br>
        当前选中索引：<b>${selectedIndex !== -1 ? (selectedIndex ?? 'null') : 'null'}</b><br>
        当前选中类型：<b>${selectedItem?.userData?.type || '无'}</b>
      `;
    }

    function update3DState() {
      const selectedIndexRaw = selectedItem ? placedItems.indexOf(selectedItem) : null;
      const selectedIndex = selectedIndexRaw !== -1 ? selectedIndexRaw : null;

      window.__3D_STATE__ = {
        placedCount: placedItems.length,
        selectedIndex,
        currentType,
        scale: selectedItem ? Number(selectedItem.scale.x.toFixed(2)) : Number(scaleSlider.value),
        rotation: selectedItem
          ? Number((((THREE.MathUtils.radToDeg(selectedItem.rotation.y) % 360) + 360) % 360).toFixed(2))
          : Number(rotateSlider.value),
        items: placedItems.map((item) => ({
          type: item.userData.type,
          x: Number(item.position.x.toFixed(3)),
          y: Number(item.position.y.toFixed(3)),
          z: Number(item.position.z.toFixed(3)),
          scale: Number(item.scale.x.toFixed(2)),
          rotation: Number((((THREE.MathUtils.radToDeg(item.rotation.y) % 360) + 360) % 360).toFixed(2))
        }))
      };
    }

    function placeFurniture(type, point) {
      const item = createFurniture(type);
      if (!item) return;

      item.position.set(point.x, 0, point.z);
      scene.add(item);
      placedItems.push(item);
      selectableRoots.push(item);

      selectItem(item);
      update3DState();
    }

    function removeSelected() {
      if (!selectedItem) {
        update3DState();
        return;
      }

      const idx = placedItems.indexOf(selectedItem);
      if (idx >= 0) placedItems.splice(idx, 1);

      const selectableIdx = selectableRoots.indexOf(selectedItem);
      if (selectableIdx >= 0) selectableRoots.splice(selectableIdx, 1);

      scene.remove(selectedItem);
      clearHighlight(selectedItem);
      selectedItem.traverse((child) => {
        if (child.isMesh) {
          child.geometry?.dispose?.();
          if (Array.isArray(child.material)) {
            child.material.forEach(m => m.dispose?.());
          } else {
            child.material?.dispose?.();
          }
        }
      });

      selectedItem = null;
      updateUIFromSelection();
      update3DState();
    }

    catalog.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentType = btn.dataset.type;
        catalog.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateStatus();
        update3DState();
      });
    });

    scaleSlider.addEventListener('input', () => {
      scaleValue.textContent = Number(scaleSlider.value).toFixed(2);
      if (selectedItem) {
        const s = Number(scaleSlider.value);
        selectedItem.scale.setScalar(s);
      }
      update3DState();
    });

    rotateSlider.addEventListener('input', () => {
      rotateValue.textContent = `${Math.round(Number(rotateSlider.value))}°`;
      if (selectedItem) {
        selectedItem.rotation.y = THREE.MathUtils.degToRad(Number(rotateSlider.value));
      }
      update3DState();
    });

    removeBtn.addEventListener('click', removeSelected);

    function getIntersections(event, objects, recursive = true) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(objects, recursive);
    }

    let pointerDown = { x: 0, y: 0 };
    renderer.domElement.addEventListener('pointerdown', (e) => {
      pointerDown.x = e.clientX;
      pointerDown.y = e.clientY;
    });

    renderer.domElement.addEventListener('click', (event) => {
      const moved = Math.hypot(event.clientX - pointerDown.x, event.clientY - pointerDown.y);
      if (moved > 4) return;

      const furnitureHits = getIntersections(event, selectableRoots, true);
      if (furnitureHits.length > 0) {
        const root = furnitureHits[0].object.userData.root || furnitureHits[0].object;
        selectItem(root);
        return;
      }

      const groundHits = getIntersections(event, [ground], false);
      if (groundHits.length > 0) {
        const p = groundHits[0].point;

        if (currentType) {
          placeFurniture(currentType, p);
        } else {
          selectItem(null);
        }
      } else {
        selectItem(null);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    updateUIFromSelection();
    update3DState();
    animate();
  </script>
</body>
</html>
