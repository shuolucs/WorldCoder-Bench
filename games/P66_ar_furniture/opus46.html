<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Furniture Preview</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #ui-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #furnitureCatalog {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(15, 15, 35, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    pointer-events: all;
    z-index: 20;
    min-width: 180px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #furnitureCatalog h3 {
    color: #e0e0ff;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .catalog-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    margin-bottom: 6px;
    background: rgba(255,255,255,0.04);
    border: 2px solid transparent;
    border-radius: 10px;
    color: #b0b0d0;
    cursor: pointer;
    transition: all 0.25s ease;
    font-size: 14px;
    font-weight: 500;
  }

  .catalog-item:hover {
    background: rgba(255,255,255,0.08);
    color: #fff;
    transform: translateX(4px);
  }

  .catalog-item.active {
    border-color: #6c63ff;
    background: rgba(108, 99, 255, 0.15);
    color: #fff;
    box-shadow: 0 0 20px rgba(108, 99, 255, 0.2);
  }

  .catalog-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  #controlPanel {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 15, 35, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 18px 28px;
    pointer-events: all;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .control-group label {
    color: #8888aa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .control-group .value-display {
    color: #e0e0ff;
    font-size: 13px;
    font-weight: 600;
    min-width: 40px;
    text-align: center;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.1);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #6c63ff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(108, 99, 255, 0.5);
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  #removeBtn {
    padding: 10px 22px;
    background: linear-gradient(135deg, #ff4757, #ff6b81);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    transition: all 0.25s ease;
    box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
  }

  #removeBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 71, 87, 0.5);
  }

  #removeBtn:active {
    transform: translateY(0);
  }

  #statusBar {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(15, 15, 35, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 20px;
    pointer-events: none;
    z-index: 20;
    color: #b0b0d0;
    font-size: 12px;
    line-height: 1.8;
    min-width: 160px;
  }

  #statusBar .status-value {
    color: #e0e0ff;
    font-weight: 600;
  }

  #instructions {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.3);
    font-size: 16px;
    pointer-events: none;
    z-index: 5;
    text-align: center;
    transition: opacity 0.5s;
  }
</style>
</head>
<body>

<div id="furnitureCatalog">
  <h3>📦 Furniture</h3>
  <div class="catalog-item" data-type="chair">
    <div class="catalog-icon" style="background:rgba(108,99,255,0.2);">🪑</div>
    <span>Chair</span>
  </div>
  <div class="catalog-item" data-type="table">
    <div class="catalog-icon" style="background:rgba(255,165,0,0.2);">🪵</div>
    <span>Table</span>
  </div>
  <div class="catalog-item" data-type="lamp">
    <div class="catalog-icon" style="background:rgba(255,255,0,0.2);">💡</div>
    <span>Lamp</span>
  </div>
  <div class="catalog-item" data-type="rug">
    <div class="catalog-icon" style="background:rgba(255,100,100,0.2);">🟫</div>
    <span>Rug</span>
  </div>
</div>

<div id="controlPanel">
  <div class="control-group">
    <label>Scale</label>
    <input type="range" id="scaleSlider" min="0.5" max="2.0" step="0.05" value="1.0">
    <div class="value-display" id="scaleValue">1.00</div>
  </div>
  <div class="control-group">
    <label>Rotate</label>
    <input type="range" id="rotateSlider" min="0" max="360" step="1" value="0">
    <div class="value-display" id="rotateValue">0°</div>
  </div>
  <button id="removeBtn">🗑 Remove</button>
</div>

<div id="statusBar">
  <div>Items: <span class="status-value" id="statusCount">0</span></div>
  <div>Selected: <span class="status-value" id="statusSelected">None</span></div>
  <div>Type: <span class="status-value" id="statusType">chair</span></div>
</div>

<div id="instructions">Select a furniture type, then click on the floor to place it</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ───
const placedItems = [];
let selectedIndex = null;
let currentType = 'chair';

window.__3D_STATE__ = {
  placedCount: 0,
  selectedIndex: null,
  currentType: 'chair',
  scale: 1.0,
  rotation: 0,
  items: []
};

function updateState() {
  window.__3D_STATE__.placedCount = placedItems.length;
  window.__3D_STATE__.selectedIndex = selectedIndex;
  window.__3D_STATE__.currentType = currentType;
  window.__3D_STATE__.scale = parseFloat(document.getElementById('scaleSlider').value);
  window.__3D_STATE__.rotation = parseFloat(document.getElementById('rotateSlider').value);
  window.__3D_STATE__.items = placedItems.map(item => ({
    type: item.userData.type,
    x: parseFloat(item.position.x.toFixed(3)),
    y: parseFloat(item.position.y.toFixed(3)),
    z: parseFloat(item.position.z.toFixed(3)),
    scale: parseFloat(item.scale.x.toFixed(3)),
    rotation: parseFloat((item.rotation.y * 180 / Math.PI).toFixed(1))
  }));

  document.getElementById('statusCount').textContent = placedItems.length;
  document.getElementById('statusSelected').textContent = selectedIndex !== null ? `#${selectedIndex}` : 'None';
  document.getElementById('statusType').textContent = currentType;
}

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.04);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 10, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.target.set(0, 0, 0);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xfff0dd, 1.5);
dirLight.position.set(8, 15, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 12;
dirLight.shadow.camera.bottom = -12;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x6666aa, 0x333322, 0.4);
scene.add(hemiLight);

const pointLight = new THREE.PointLight(0x6c63ff, 0.5, 20);
pointLight.position.set(-3, 5, -3);
scene.add(pointLight);

// ─── Ground ───
const groundSize = 10;
const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x2a2a3e,
  roughness: 0.85,
  metalness: 0.05
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
ground.userData.isGround = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(groundSize, 20, 0x3a3a5e, 0x2e2e48);
gridHelper.position.y = 0.005;
scene.add(gridHelper);

// Ground border
const borderGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(groundSize, groundSize));
const borderMat = new THREE.LineBasicMaterial({ color: 0x6c63ff, transparent: true, opacity: 0.4 });
const border = new THREE.LineSegments(borderGeo, borderMat);
border.rotation.x = -Math.PI / 2;
border.position.y = 0.01;
scene.add(border);

// ─── Furniture Creators ───
function createChair() {
  const group = new THREE.Group();
  group.userData.type = 'chair';

  const woodColor = 0x8B6914;
  const cushionColor = 0x6c63ff;

  // Seat
  const seatGeo = new THREE.BoxGeometry(0.5, 0.05, 0.5);
  const seatMat = new THREE.MeshStandardMaterial({ color: woodColor, roughness: 0.6 });
  const seat = new THREE.Mesh(seatGeo, seatMat);
  seat.position.y = 0.5;
  seat.castShadow = true;
  group.add(seat);

  // Cushion
  const cushionGeo = new THREE.BoxGeometry(0.44, 0.06, 0.44);
  const cushionMat = new THREE.MeshStandardMaterial({ color: cushionColor, roughness: 0.8 });
  const cushion = new THREE.Mesh(cushionGeo, cushionMat);
  cushion.position.y = 0.555;
  cushion.castShadow = true;
  group.add(cushion);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.5, 8);
  const legMat = new THREE.MeshStandardMaterial({ color: woodColor, roughness: 0.5 });
  const legPositions = [
    [-0.2, 0.25, -0.2], [0.2, 0.25, -0.2],
    [-0.2, 0.25, 0.2], [0.2, 0.25, 0.2]
  ];
  legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    group.add(leg);
  });

  // Backrest
  const backGeo = new THREE.BoxGeometry(0.5, 0.5, 0.05);
  const backMat = new THREE.MeshStandardMaterial({ color: woodColor, roughness: 0.6 });
  const back = new THREE.Mesh(backGeo, backMat);
  back.position.set(0, 0.775, -0.225);
  back.castShadow = true;
  group.add(back);

  // Back legs extended
  const backLegGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.55, 8);
  [-0.2, 0.2].forEach(x => {
    const bleg = new THREE.Mesh(backLegGeo, legMat);
    bleg.position.set(x, 0.8, -0.2);
    bleg.castShadow = true;
    group.add(bleg);
  });

  return group;
}

function createTable() {
  const group = new THREE.Group();
  group.userData.type = 'table';

  const woodColor = 0xa0784a;

  // Tabletop
  const topGeo = new THREE.BoxGeometry(1.2, 0.06, 0.7);
  const topMat = new THREE.MeshStandardMaterial({ color: woodColor, roughness: 0.5, metalness: 0.05 });
  const top = new THREE.Mesh(topGeo, topMat);
  top.position.y = 0.75;
  top.castShadow = true;
  top.receiveShadow = true;
  group.add(top);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.06, 0.72, 0.06);
  const legMat = new THREE.MeshStandardMaterial({ color: 0x8a6840, roughness: 0.6 });
  const legPositions = [
    [-0.54, 0.36, -0.29], [0.54, 0.36, -0.29],
    [-0.54, 0.36, 0.29], [0.54, 0.36, 0.29]
  ];
  legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    group.add(leg);
  });

  // Cross support
  const crossGeo = new THREE.BoxGeometry(1.0, 0.04, 0.04);
  const cross = new THREE.Mesh(crossGeo, legMat);
  cross.position.set(0, 0.2, 0);
  group.add(cross);

  return group;
}

function createLamp() {
  const group = new THREE.Group();
  group.userData.type = 'lamp';

  // Base
  const baseGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.06, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.3, metalness: 0.7 });
  const base = new THREE.Mesh(baseGeo, baseMat);
  base.position.y = 0.03;
  base.castShadow = true;
  group.add(base);

  // Pole
  const poleGeo = new THREE.CylinderGeometry(0.025, 0.03, 1.0, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x555566, roughness: 0.3, metalness: 0.6 });
  const pole = new THREE.Mesh(poleGeo, poleMat);
  pole.position.y = 0.56;
  pole.castShadow = true;
  group.add(pole);

  // Shade
  const shadeGeo = new THREE.ConeGeometry(0.25, 0.3, 16, 1, true);
  const shadeMat = new THREE.MeshStandardMaterial({
    color: 0xffeecc,
    roughness: 0.8,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.85
  });
  const shade = new THREE.Mesh(shadeGeo, shadeMat);
  shade.position.y = 1.15;
  shade.castShadow = true;
  group.add(shade);

  // Bulb glow
  const bulbGeo = new THREE.SphereGeometry(0.06, 12, 12);
  const bulbMat = new THREE.MeshStandardMaterial({
    color: 0xffffaa,
    emissive: 0xffdd66,
    emissiveIntensity: 2.0
  });
  const bulb = new THREE.Mesh(bulbGeo, bulbMat);
  bulb.position.y = 1.05;
  group.add(bulb);

  // Point light for the lamp
  const lampLight = new THREE.PointLight(0xffdd88, 0.6, 4);
  lampLight.position.y = 1.1;
  group.add(lampLight);

  return group;
}

function createRug() {
  const group = new THREE.Group();
  group.userData.type = 'rug';

  // Main rug body
  const rugGeo = new THREE.BoxGeometry(1.5, 0.02, 1.0);
  const rugMat = new THREE.MeshStandardMaterial({ color: 0xcc4444, roughness: 0.95 });
  const rug = new THREE.Mesh(rugGeo, rugMat);
  rug.position.y = 0.01;
  rug.receiveShadow = true;
  group.add(rug);

  // Border
  const borderGeo = new THREE.BoxGeometry(1.4, 0.025, 0.9);
  const borderMat = new THREE.MeshStandardMaterial({ color: 0xdd8844, roughness: 0.9 });
  const borderMesh = new THREE.Mesh(borderGeo, borderMat);
  borderMesh.position.y = 0.015;
  group.add(borderMesh);

  // Inner pattern
  const innerGeo = new THREE.BoxGeometry(1.0, 0.028, 0.6);
  const innerMat = new THREE.MeshStandardMaterial({ color: 0x882222, roughness: 0.9 });
  const inner = new THREE.Mesh(innerGeo, innerMat);
  inner.position.y = 0.018;
  group.add(inner);

  // Center diamond
  const diamondGeo = new THREE.BoxGeometry(0.3, 0.03, 0.3);
  const diamondMat = new THREE.MeshStandardMaterial({ color: 0xddaa44, roughness: 0.85 });
  const diamond = new THREE.Mesh(diamondGeo, diamondMat);
  diamond.position.y = 0.02;
  diamond.rotation.y = Math.PI / 4;
  group.add(diamond);

  return group;
}

const furnitureCreators = {
  chair: createChair,
  table: createTable,
  lamp: createLamp,
  rug: createRug
};

// ─── Selection Highlight ───
let highlightOutlines = [];

function clearHighlight() {
  highlightOutlines.forEach(obj => {
    if (obj.parent) obj.parent.remove(obj);
    obj.geometry?.dispose();
    obj.material?.dispose();
  });
  highlightOutlines = [];
}

function highlightItem(group) {
  clearHighlight();
  group.traverse(child => {
    if (child.isMesh) {
      const edges = new THREE.EdgesGeometry(child.geometry, 30);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({
        color: 0x00ff88,
        linewidth: 2,
        transparent: true,
        opacity: 0.8
      }));
      line.position.copy(child.position);
      line.rotation.copy(child.rotation);
      line.scale.copy(child.scale);
      line.userData.isHighlight = true;
      group.add(line);
      highlightOutlines.push(line);
    }
  });
}

function selectItem(index) {
  clearHighlight();
  if (index !== null && index >= 0 && index < placedItems.length) {
    selectedIndex = index;
    const item = placedItems[index];
    highlightItem(item);

    const scaleSlider = document.getElementById('scaleSlider');
    const rotateSlider = document.getElementById('rotateSlider');
    scaleSlider.value = item.scale.x;
    rotateSlider.value = (item.rotation.y * 180 / Math.PI + 360) % 360;
    document.getElementById('scaleValue').textContent = parseFloat(scaleSlider.value).toFixed(2);
    document.getElementById('rotateValue').textContent = Math.round(parseFloat(rotateSlider.value)) + '°';
  } else {
    selectedIndex = null;
  }
  updateState();
}

function deselectAll() {
  clearHighlight();
  selectedIndex = null;
  updateState();
}

// ─── Raycaster ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getIntersections(event) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  return raycaster.intersectObjects(scene.children, true);
}

let pointerDownPos = new THREE.Vector2();
let pointerDownTime = 0;

renderer.domElement.addEventListener('pointerdown', (e) => {
  pointerDownPos.set(e.clientX, e.clientY);
  pointerDownTime = Date.now();
});

renderer.domElement.addEventListener('pointerup', (e) => {
  const dx = e.clientX - pointerDownPos.x;
  const dy = e.clientY - pointerDownPos.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const elapsed = Date.now() - pointerDownTime;

  // Only treat as click if minimal movement and short duration
  if (dist > 5 || elapsed > 300) return;

  const intersections = getIntersections(e);
  if (intersections.length === 0) {
    deselectAll();
    return;
  }

  // Check if clicked on a placed furniture item
  let clickedItemIndex = null;
  for (const inter of intersections) {
    let obj = inter.object;
    while (obj) {
      if (obj.userData.isHighlight) {
        // Ignore highlight lines
        break;
      }
      const idx = placedItems.indexOf(obj);
      if (idx !== -1) {
        clickedItemIndex = idx;
        break;
      }
      obj = obj.parent;
    }
    if (clickedItemIndex !== null) break;
  }

  if (clickedItemIndex !== null) {
    selectItem(clickedItemIndex);
    return;
  }

  // Check if clicked on ground to place furniture
  for (const inter of intersections) {
    let obj = inter.object;
    if (obj.userData.isGround || obj === ground) {
      const point = inter.point;
      // Clamp to ground bounds
      const half = groundSize / 2;
      const px = Math.max(-half, Math.min(half, point.x));
      const pz = Math.max(-half, Math.min(half, point.z));

      if (currentType && furnitureCreators[currentType]) {
        const furniture = furnitureCreators[currentType]();
        furniture.position.set(px, 0, pz);
        furniture.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });
        scene.add(furniture);
        placedItems.push(furniture);

        // Hide instructions
        const instr = document.getElementById('instructions');
        if (instr) instr.style.opacity = '0';

        // Auto-select the newly placed item
        selectItem(placedItems.length - 1);
      }
      return;
    }
  }

  deselectAll();
});

// ─── Catalog ───
const catalogItems = document.querySelectorAll('.catalog-item');
catalogItems.forEach(item => {
  item.addEventListener('click', () => {
    catalogItems.forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    currentType = item.dataset.type;
    updateState();
  });
});
// Set initial active
catalogItems[0].classList.add('active');

// ─── Controls ───
const scaleSlider = document.getElementById('scaleSlider');
const rotateSlider = document.getElementById('rotateSlider');
const removeBtn = document.getElementById('removeBtn');

scaleSlider.addEventListener('input', () => {
  const val = parseFloat(scaleSlider.value);
  document.getElementById('scaleValue').textContent = val.toFixed(2);
  if (selectedIndex !== null && placedItems[selectedIndex]) {
    const item = placedItems[selectedIndex];
    item.scale.setScalar(val);
    // Re-highlight
    highlightItem(item);
  }
  updateState();
});

rotateSlider.addEventListener('input', () => {
  const val = parseFloat(rotateSlider.value);
  document.getElementById('rotateValue').textContent = Math.round(val) + '°';
  if (selectedIndex !== null && placedItems[selectedIndex]) {
    const item = placedItems[selectedIndex];
    item.rotation.y = val * Math.PI / 180;
  }
  updateState();
});

removeBtn.addEventListener('click', () => {
  if (selectedIndex !== null && placedItems[selectedIndex]) {
    const item = placedItems[selectedIndex];
    clearHighlight();
    scene.remove(item);
    // Dispose
    item.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => m.dispose());
        } else {
          child.material.dispose();
        }
      }
    });
    placedItems.splice(selectedIndex, 1);
    selectedIndex = null;
    updateState();
  }
});

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animate ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  controls.update();

  // Subtle highlight animation
  highlightOutlines.forEach(line => {
    if (line.material) {
      line.material.opacity = 0.5 + 0.4 * Math.sin(t * 4);
    }
  });

  renderer.render(scene, camera);
}

animate();
updateState();
</script>
</body>
</html>
