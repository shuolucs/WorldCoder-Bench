<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Fishing Mini-Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    font-family: 'Segoe UI', Arial, sans-serif;
  }
  #p1score {
    position: absolute;
    top: 15px; left: 15px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
  }
  #p2score {
    position: absolute;
    top: 15px; right: 15px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
  }
  #fishcount {
    position: absolute;
    top: 15px; left: 50%;
    transform: translateX(-50%);
    color: #ffdd00;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  #gameover {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: #ffdd00;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,0,0,0.9);
    display: none;
  }
  #resetBtn {
    position: absolute;
    bottom: 25px; left: 50%;
    transform: translateX(-50%);
    pointer-events: all;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: 2px solid #fff;
    padding: 10px 30px;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #resetBtn:hover {
    background: rgba(255,255,255,0.2);
  }
  #controls {
    position: absolute;
    bottom: 70px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="p1score">Player 1 Score: 0</div>
  <div id="p2score">Player 2 Score: 0</div>
  <div id="fishcount">Fish Remaining: 6</div>
  <div id="gameover">All Fish Caught!</div>
  <div id="controls">P1: WASD + SPACE | P2: Arrows + ENTER</div>
  <button id="resetBtn">Reset Game</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {

// --- State ---
window.__3D_STATE__ = {
  player1Score: 0,
  player2Score: 0,
  fishRemaining: 6,
  player1Casting: false,
  player2Casting: false,
  player1BoatX: -8,
  player1BoatZ: 0,
  player2BoatX: 8,
  player2BoatZ: 0,
  gameActive: true
};

const state = window.__3D_STATE__;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a3a5c);
scene.fog = new THREE.Fog(0x1a3a5c, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// --- Water ---
const waterGeo = new THREE.PlaneGeometry(60, 60, 32, 32);
const waterMat = new THREE.MeshStandardMaterial({
  color: 0x2288cc,
  opacity: 0.7,
  transparent: true,
  side: THREE.DoubleSide,
  metalness: 0.1,
  roughness: 0.6
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
water.receiveShadow = true;
scene.add(water);

// Underwater floor
const floorGeo = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a5533, side: THREE.DoubleSide });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -5;
scene.add(floor);

// --- Boat Creation ---
function createBoat(x, z, color) {
  const group = new THREE.Group();

  // Hull
  const hullGeo = new THREE.BoxGeometry(3, 1, 1.5);
  const hullMat = new THREE.MeshStandardMaterial({ color: color || 0x8B4513 });
  const hull = new THREE.Mesh(hullGeo, hullMat);
  hull.castShadow = true;
  group.add(hull);

  // Fishing rod
  const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 4, 8);
  const rodMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
  const rod = new THREE.Mesh(rodGeo, rodMat);
  rod.position.set(0.8, 2.2, 0);
  rod.rotation.z = -0.3;
  group.add(rod);

  // Rod tip marker (invisible, used for casting position)
  const tipMarker = new THREE.Object3D();
  tipMarker.position.set(1.4, 4.1, 0);
  group.add(tipMarker);
  group.userData.tipMarker = tipMarker;

  group.position.set(x, 0.5, z);
  scene.add(group);
  return group;
}

let boat1 = createBoat(-8, 0, 0x8B4513);
let boat2 = createBoat(8, 0, 0x6B3410);

// --- Fish ---
let fishes = [];

function createFish() {
  const geo = new THREE.SphereGeometry(0.5, 12, 8);
  const mat = new THREE.MeshStandardMaterial({ color: 0xFF6600 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.set(1, 0.4, 0.5);

  const x = (Math.random() - 0.5) * 40;
  const z = (Math.random() - 0.5) * 40;
  const y = -1 - Math.random() * 2;
  mesh.position.set(x, y, z);

  // Tail
  const tailGeo = new THREE.ConeGeometry(0.25, 0.5, 4);
  const tailMat = new THREE.MeshStandardMaterial({ color: 0xFF8800 });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.rotation.z = Math.PI / 2;
  tail.position.x = -0.6;
  mesh.add(tail);

  scene.add(mesh);

  const dirAngle = Math.random() * Math.PI * 2;
  return {
    mesh: mesh,
    dirX: Math.cos(dirAngle) * 0.02,
    dirZ: Math.sin(dirAngle) * 0.02,
    changeTimer: 2 + Math.random(),
    alive: true
  };
}

function spawnAllFish() {
  for (let i = 0; i < 6; i++) {
    fishes.push(createFish());
  }
}
spawnAllFish();

// --- Casting ---
let castObjects = { p1: null, p2: null };
let castTimers = { p1: 0, p2: 0 };
let castAnimations = { p1: null, p2: null };
let castPositions = { p1: null, p2: null };

function castLine(player) {
  const isP1 = player === 1;
  const key = isP1 ? 'p1' : 'p2';
  const boat = isP1 ? boat1 : boat2;

  if (isP1 && state.player1Casting) return;
  if (!isP1 && state.player2Casting) return;
  if (!state.gameActive) return;

  // Get rod tip world position
  const tipWorld = new THREE.Vector3();
  boat.userData.tipMarker.getWorldPosition(tipWorld);

  // Create bobber
  const bobberGeo = new THREE.SphereGeometry(0.2, 8, 8);
  const bobberMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x888800 });
  const bobber = new THREE.Mesh(bobberGeo, bobberMat);
  bobber.position.copy(tipWorld);
  scene.add(bobber);

  // Create line
  const lineGeo = new THREE.BufferGeometry().setFromPoints([tipWorld.clone(), tipWorld.clone()]);
  const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
  const line = new THREE.Line(lineGeo, lineMat);
  scene.add(line);

  castObjects[key] = { bobber, line };

  const startY = tipWorld.y;
  const endY = -2;
  const startTime = performance.now();
  const dropDuration = 500; // 0.5 seconds

  if (isP1) state.player1Casting = true;
  else state.player2Casting = true;

  castAnimations[key] = {
    startY, endY, startTime, dropDuration,
    tipWorld: tipWorld.clone(),
    dropped: false
  };

  castPositions[key] = { x: tipWorld.x, z: tipWorld.z };
  castTimers[key] = 3.0;
}

// --- Input ---
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    castLine(1);
  }
  if (e.code === 'Enter') {
    e.preventDefault();
    castLine(2);
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// --- Reset ---
document.getElementById('resetBtn').addEventListener('click', resetGame);

function resetGame() {
  // Remove fish
  fishes.forEach(f => { if (f.mesh.parent) scene.remove(f.mesh); });
  fishes = [];

  // Remove cast objects
  ['p1', 'p2'].forEach(key => {
    if (castObjects[key]) {
      if (castObjects[key].bobber.parent) scene.remove(castObjects[key].bobber);
      if (castObjects[key].line.parent) scene.remove(castObjects[key].line);
      castObjects[key] = null;
    }
    castTimers[key] = 0;
    castAnimations[key] = null;
    castPositions[key] = null;
  });

  // Reset boats
  boat1.position.set(-8, 0.5, 0);
  boat2.position.set(8, 0.5, 0);

  // Reset state
  state.player1Score = 0;
  state.player2Score = 0;
  state.fishRemaining = 6;
  state.player1Casting = false;
  state.player2Casting = false;
  state.player1BoatX = -8;
  state.player1BoatZ = 0;
  state.player2BoatX = 8;
  state.player2BoatZ = 0;
  state.gameActive = true;

  // Respawn fish
  spawnAllFish();

  document.getElementById('gameover').style.display = 'none';
  updateHUD();
}

function updateHUD() {
  document.getElementById('p1score').textContent = 'Player 1 Score: ' + state.player1Score;
  document.getElementById('p2score').textContent = 'Player 2 Score: ' + state.player2Score;
  document.getElementById('fishcount').textContent = 'Fish Remaining: ' + state.fishRemaining;
}

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  const now = performance.now();

  // Water animation
  water.position.y = Math.sin(elapsed * 1.5) * 0.1;

  // Boat movement
  const speed = 0.15;

  // Player 1: WASD
  if (keys['KeyW']) boat1.position.z -= speed;
  if (keys['KeyS']) boat1.position.z += speed;
  if (keys['KeyA']) boat1.position.x -= speed;
  if (keys['KeyD']) boat1.position.x += speed;

  // Player 2: Arrows
  if (keys['ArrowUp']) boat2.position.z -= speed;
  if (keys['ArrowDown']) boat2.position.z += speed;
  if (keys['ArrowLeft']) boat2.position.x -= speed;
  if (keys['ArrowRight']) boat2.position.x += speed;

  // Clamp boats
  boat1.position.x = Math.max(-25, Math.min(25, boat1.position.x));
  boat1.position.z = Math.max(-25, Math.min(25, boat1.position.z));
  boat2.position.x = Math.max(-25, Math.min(25, boat2.position.x));
  boat2.position.z = Math.max(-25, Math.min(25, boat2.position.z));

  // Fish movement
  fishes.forEach(fish => {
    if (!fish.alive) return;

    fish.mesh.position.x += fish.dirX;
    fish.mesh.position.z += fish.dirZ;

    // Face movement direction
    fish.mesh.rotation.y = Math.atan2(fish.dirX, fish.dirZ);

    // Clamp fish
    if (fish.mesh.position.x < -25 || fish.mesh.position.x > 25) fish.dirX *= -1;
    if (fish.mesh.position.z < -25 || fish.mesh.position.z > 25) fish.dirZ *= -1;
    fish.mesh.position.x = Math.max(-25, Math.min(25, fish.mesh.position.x));
    fish.mesh.position.z = Math.max(-25, Math.min(25, fish.mesh.position.z));

    // Change direction timer
    fish.changeTimer -= delta;
    if (fish.changeTimer <= 0) {
      const angle = Math.random() * Math.PI * 2;
      fish.dirX = Math.cos(angle) * 0.02;
      fish.dirZ = Math.sin(angle) * 0.02;
      fish.changeTimer = 2 + Math.random();
    }

    // Gentle bobbing
    fish.mesh.position.y = -1 - Math.abs(Math.sin(elapsed + fish.mesh.position.x)) * 1.5;
  });

  // Cast animations and timers
  ['p1', 'p2'].forEach(key => {
    const isP1 = key === 'p1';
    const boat = isP1 ? boat1 : boat2;

    if (castAnimations[key]) {
      const anim = castAnimations[key];
      const t = Math.min((now - anim.startTime) / anim.dropDuration, 1);
      const currentY = anim.startY + (anim.endY - anim.startY) * t;

      if (castObjects[key]) {
        castObjects[key].bobber.position.y = currentY;

        // Update line
        const tipWorld = new THREE.Vector3();
        boat.userData.tipMarker.getWorldPosition(tipWorld);
        const positions = castObjects[key].line.geometry.attributes.position;
        positions.setXYZ(0, tipWorld.x, tipWorld.y, tipWorld.z);
        positions.setXYZ(1, castObjects[key].bobber.position.x, castObjects[key].bobber.position.y, castObjects[key].bobber.position.z);
        positions.needsUpdate = true;
      }

      if (t >= 1 && !anim.dropped) {
        anim.dropped = true;
        // Check for fish catch
        checkCatch(key);
      }
    }

    if (castTimers[key] > 0) {
      castTimers[key] -= delta;

      // Keep updating line to follow boat
      if (castObjects[key] && castAnimations[key] && castAnimations[key].dropped) {
        const tipWorld = new THREE.Vector3();
        boat.userData.tipMarker.getWorldPosition(tipWorld);
        const positions = castObjects[key].line.geometry.attributes.position;
        positions.setXYZ(0, tipWorld.x, tipWorld.y, tipWorld.z);
        positions.needsUpdate = true;

        // Continuously check for fish while line is active
        checkCatch(key);
      }

      if (castTimers[key] <= 0) {
        // Remove cast objects
        if (castObjects[key]) {
          scene.remove(castObjects[key].bobber);
          scene.remove(castObjects[key].line);
          castObjects[key] = null;
        }
        castAnimations[key] = null;
        castPositions[key] = null;
        if (isP1) state.player1Casting = false;
        else state.player2Casting = false;
      }
    }
  });

  // Update state
  state.player1BoatX = boat1.position.x;
  state.player1BoatZ = boat1.position.z;
  state.player2BoatX = boat2.position.x;
  state.player2BoatZ = boat2.position.z;
  state.fishRemaining = fishes.filter(f => f.alive).length;
  state.gameActive = state.fishRemaining > 0;

  if (!state.gameActive) {
    document.getElementById('gameover').style.display = 'block';
  }

  updateHUD();
  renderer.render(scene, camera);
}

function checkCatch(key) {
  if (!castObjects[key]) return;

  const bobberPos = castObjects[key].bobber.position;

  fishes.forEach(fish => {
    if (!fish.alive) return;

    const dx = fish.mesh.position.x - bobberPos.x;
    const dz = fish.mesh.position.z - bobberPos.z;
    const distXZ = Math.sqrt(dx * dx + dz * dz);

    if (distXZ < 3.0) {
      fish.alive = false;
      scene.remove(fish.mesh);

      if (key === 'p1') {
        state.player1Score++;
      } else {
        state.player2Score++;
      }
    }
  });
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();

})();
</script>
</body>
</html>
