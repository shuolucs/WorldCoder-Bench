<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Multiplayer Fishing Mini-Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
      z-index: 10;
    }

    .panel {
      position: absolute;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.45);
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
    }

    #p1Score {
      top: 12px;
      left: 12px;
    }

    #p2Score {
      top: 12px;
      right: 12px;
    }

    #fishRemaining {
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd54a;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 20px;
      font-weight: bold;
    }

    #instructions {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      max-width: 340px;
    }

    #resetBtn {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      pointer-events: auto;
      z-index: 20;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: #ffffff;
      color: #222;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    #resetBtn:hover {
      background: #f0f0f0;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="p1Score" class="panel">Player 1 Score: 0</div>
    <div id="p2Score" class="panel">Player 2 Score: 0</div>
    <div id="fishRemaining">Fish Remaining: 6</div>
    <div id="instructions">
      <div><strong>Player 1</strong>: WASD move, SPACE cast</div>
      <div><strong>Player 2</strong>: Arrow Keys move, ENTER cast</div>
    </div>
  </div>

  <button id="resetBtn">Reset Game</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 15, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Water
    const waterGeometry = new THREE.PlaneGeometry(60, 60, 1, 1);
    const waterMaterial = new THREE.MeshStandardMaterial({
      color: 0x2288cc,
      transparent: true,
      opacity: 0.7,
      side: THREE.DoubleSide
    });
    const water = new THREE.Mesh(waterGeometry, waterMaterial);
    water.rotation.x = -Math.PI / 2;
    water.position.y = 0;
    scene.add(water);

    // Subtle ground below water for visibility
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(60, 60),
      new THREE.MeshStandardMaterial({ color: 0x1f4d2a })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -4;
    scene.add(floor);

    // Boat creation
    function createBoat(x, z) {
      const group = new THREE.Group();

      const boatBody = new THREE.Mesh(
        new THREE.BoxGeometry(3, 1, 1.5),
        new THREE.MeshStandardMaterial({ color: 0x8B4513 })
      );
      boatBody.position.set(0, 0.5, 0);
      group.add(boatBody);

      const rod = new THREE.Mesh(
        new THREE.CylinderGeometry(0.05, 0.05, 4, 8),
        new THREE.MeshStandardMaterial({ color: 0x333333 })
      );
      rod.position.set(0.8, 2.4, -0.4);
      rod.rotation.z = Math.PI / 10;
      rod.rotation.x = -Math.PI / 10;
      group.add(rod);

      group.position.set(x, 0, z);
      scene.add(group);

      return { group, boatBody, rod };
    }

    const player1 = createBoat(-8, 0);
    const player2 = createBoat(8, 0);

    function getRodTipWorldPosition(player) {
      const localTip = new THREE.Vector3(0, 2, 0);
      return player.rod.localToWorld(localTip.clone());
    }

    // Fish
    const fishGeometry = new THREE.SphereGeometry(0.45, 16, 12);
    const fishMaterial = new THREE.MeshStandardMaterial({ color: 0xFF6600 });

    const fishes = [];

    function randomRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    function spawnFish() {
      const fish = new THREE.Mesh(fishGeometry, fishMaterial.clone());
      fish.scale.set(1, 0.4, 0.5);
      fish.position.set(
        randomRange(-20, 20),
        randomRange(-3, -1),
        randomRange(-20, 20)
      );

      fish.userData = {
        direction: new THREE.Vector3(
          randomRange(-1, 1),
          0,
          randomRange(-1, 1)
        ).normalize(),
        speed: randomRange(0.01, 0.03),
        nextTurnTime: performance.now() + randomRange(2000, 3000)
      };

      scene.add(fish);
      fishes.push(fish);
    }

    function clearFish() {
      for (const fish of fishes) scene.remove(fish);
      fishes.length = 0;
    }

    function spawnAllFish() {
      clearFish();
      for (let i = 0; i < 6; i++) spawnFish();
    }

    spawnAllFish();

    // Cast markers
    function createBobber() {
      const bobber = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffff00 })
      );
      bobber.visible = false;
      scene.add(bobber);
      return bobber;
    }

    const bobber1 = createBobber();
    const bobber2 = createBobber();

    const castState = {
      p1: {
        active: false,
        dropping: false,
        startTime: 0,
        dropDuration: 500,
        activeDuration: 3000,
        startPos: new THREE.Vector3(),
        endPos: new THREE.Vector3(),
        catchChecked: false,
        bobber: bobber1
      },
      p2: {
        active: false,
        dropping: false,
        startTime: 0,
        dropDuration: 500,
        activeDuration: 3000,
        startPos: new THREE.Vector3(),
        endPos: new THREE.Vector3(),
        catchChecked: false,
        bobber: bobber2
      }
    };

    // Input
    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;

      if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
        e.preventDefault();
      }

      if (e.code === "Space") {
        e.preventDefault();
        startCast("p1", player1);
      }

      if (e.code === "Enter") {
        startCast("p2", player2);
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    function startCast(playerKey, playerObj) {
      const state = castState[playerKey];
      if (state.active || fishes.length === 0) return;

      const tip = getRodTipWorldPosition(playerObj);
      state.active = true;
      state.dropping = true;
      state.startTime = performance.now();
      state.catchChecked = false;
      state.startPos.copy(tip);
      state.endPos.copy(tip);
      state.endPos.y = -2;

      state.bobber.visible = true;
      state.bobber.position.copy(state.startPos);
    }

    function tryCatchFish(playerKey) {
      const state = castState[playerKey];
      if (state.catchChecked) return;

      const castX = state.endPos.x;
      const castZ = state.endPos.z;

      for (let i = fishes.length - 1; i >= 0; i--) {
        const fish = fishes[i];
        const dx = fish.position.x - castX;
        const dz = fish.position.z - castZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist <= 3.0) {
          scene.remove(fish);
          fishes.splice(i, 1);

          if (playerKey === "p1") {
            window.__3D_STATE__.player1Score++;
          } else {
            window.__3D_STATE__.player2Score++;
          }

          break;
        }
      }

      state.catchChecked = true;
    }

    function updateCast(playerKey, now) {
      const state = castState[playerKey];
      if (!state.active) return;

      const elapsed = now - state.startTime;

      if (elapsed <= state.dropDuration) {
        const t = elapsed / state.dropDuration;
        state.bobber.position.lerpVectors(state.startPos, state.endPos, t);
      } else {
        state.dropping = false;
        state.bobber.position.copy(state.endPos);
        tryCatchFish(playerKey);
      }

      if (elapsed >= state.activeDuration) {
        state.active = false;
        state.dropping = false;
        state.bobber.visible = false;
      }
    }

    function movePlayers() {
      const speed = 0.15;

      // Player 1
      if (keys["KeyW"]) player1.group.position.z -= speed;
      if (keys["KeyS"]) player1.group.position.z += speed;
      if (keys["KeyA"]) player1.group.position.x -= speed;
      if (keys["KeyD"]) player1.group.position.x += speed;

      // Player 2
      if (keys["ArrowUp"]) player2.group.position.z -= speed;
      if (keys["ArrowDown"]) player2.group.position.z += speed;
      if (keys["ArrowLeft"]) player2.group.position.x -= speed;
      if (keys["ArrowRight"]) player2.group.position.x += speed;

      // Clamp
      player1.group.position.x = THREE.MathUtils.clamp(player1.group.position.x, -25, 25);
      player1.group.position.z = THREE.MathUtils.clamp(player1.group.position.z, -25, 25);
      player2.group.position.x = THREE.MathUtils.clamp(player2.group.position.x, -25, 25);
      player2.group.position.z = THREE.MathUtils.clamp(player2.group.position.z, -25, 25);
    }

    function updateFish(now) {
      for (const fish of fishes) {
        if (now >= fish.userData.nextTurnTime) {
          fish.userData.direction.set(
            randomRange(-1, 1),
            0,
            randomRange(-1, 1)
          ).normalize();
          fish.userData.nextTurnTime = now + randomRange(2000, 3000);
        }

        fish.position.addScaledVector(fish.userData.direction, fish.userData.speed);

        // Bounds bounce
        if (fish.position.x < -20 || fish.position.x > 20) {
          fish.userData.direction.x *= -1;
          fish.position.x = THREE.MathUtils.clamp(fish.position.x, -20, 20);
        }
        if (fish.position.z < -20 || fish.position.z > 20) {
          fish.userData.direction.z *= -1;
          fish.position.z = THREE.MathUtils.clamp(fish.position.z, -20, 20);
        }

        fish.rotation.y = Math.atan2(fish.userData.direction.x, fish.userData.direction.z);
      }
    }

    // HUD/state
    const p1ScoreEl = document.getElementById("p1Score");
    const p2ScoreEl = document.getElementById("p2Score");
    const fishRemainingEl = document.getElementById("fishRemaining");
    const resetBtn = document.getElementById("resetBtn");

    window.__3D_STATE__ = {
      player1Score: 0,
      player2Score: 0,
      fishRemaining: 6,
      player1Casting: false,
      player2Casting: false,
      player1BoatX: -8,
      player1BoatZ: 0,
      player2BoatX: 8,
      player2BoatZ: 0,
      gameActive: true
    };

    function updateHUD() {
      p1ScoreEl.textContent = `Player 1 Score: ${window.__3D_STATE__.player1Score}`;
      p2ScoreEl.textContent = `Player 2 Score: ${window.__3D_STATE__.player2Score}`;
      fishRemainingEl.textContent = `Fish Remaining: ${window.__3D_STATE__.fishRemaining}`;
    }

    function resetGame() {
      window.__3D_STATE__.player1Score = 0;
      window.__3D_STATE__.player2Score = 0;

      player1.group.position.set(-8, 0, 0);
      player2.group.position.set(8, 0, 0);

      castState.p1.active = false;
      castState.p1.dropping = false;
      castState.p1.bobber.visible = false;

      castState.p2.active = false;
      castState.p2.dropping = false;
      castState.p2.bobber.visible = false;

      spawnAllFish();
      updateState();
      updateHUD();
    }

    resetBtn.addEventListener("click", resetGame);

    function updateState() {
      window.__3D_STATE__.fishRemaining = fishes.length;
      window.__3D_STATE__.player1Casting = castState.p1.active;
      window.__3D_STATE__.player2Casting = castState.p2.active;
      window.__3D_STATE__.player1BoatX = player1.group.position.x;
      window.__3D_STATE__.player1BoatZ = player1.group.position.z;
      window.__3D_STATE__.player2BoatX = player2.group.position.x;
      window.__3D_STATE__.player2BoatZ = player2.group.position.z;
      window.__3D_STATE__.gameActive = fishes.length > 0;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      // Water oscillation
      water.position.y = Math.sin(now * 0.0015) * 0.1;

      movePlayers();
      updateFish(now);
      updateCast("p1", now);
      updateCast("p2", now);
      updateState();
      updateHUD();

      renderer.render(scene, camera);
    }

    updateHUD();
    requestAnimationFrame(animate);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
