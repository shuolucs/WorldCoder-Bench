<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Fishing Mini-Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        #p1-score {
            top: 20px;
            left: 20px;
        }
        #p2-score {
            top: 20px;
            right: 20px;
        }
        #fish-count {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
        }
        #reset-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #reset-btn:hover {
            background-color: #45a049;
        }
        #reset-btn:active {
            transform: translateX(-50%) translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="p1-score" class="hud-panel">Player 1 Score: 0</div>
        <div id="p2-score" class="hud-panel">Player 2 Score: 0</div>
        <div id="fish-count" class="hud-panel">Fish Remaining: 6</div>
        <button id="reset-btn">Reset Game</button>
    </div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            player1Score: 0,
            player2Score: 0,
            fishRemaining: 6,
            player1Casting: false,
            player2Casting: false,
            player1BoatX: -8,
            player1BoatZ: 0,
            player2BoatX: 8,
            player2BoatZ: 0,
            gameActive: true
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Water
        const waterGeo = new THREE.PlaneGeometry(60, 60, 32, 32);
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x2288cc,
            transparent: true,
            opacity: 0.7,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        scene.add(water);

        // --- Game Objects ---
        
        // Boats
        function createBoat(startX, isPlayer2) {
            const group = new THREE.Group();
            
            // Hull
            const hullGeo = new THREE.BoxGeometry(3, 1, 1.5);
            const hullMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const hull = new THREE.Mesh(hullGeo, hullMat);
            group.add(hull);

            // Rod
            const rodPivot = new THREE.Group();
            rodPivot.position.set(1.5, 0.5, 0); // Front top of hull
            
            const rodGeo = new THREE.CylinderGeometry(0.05, 0.05, 4);
            rodGeo.translate(0, 2, 0); // Move origin to base
            const rodMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
            const rod = new THREE.Mesh(rodGeo, rodMat);
            rod.rotation.z = -Math.PI / 6; // Angle forward
            
            const tip = new THREE.Object3D();
            tip.position.set(0, 4, 0);
            rod.add(tip);
            
            rodPivot.add(rod);
            group.add(rodPivot);

            group.position.set(startX, 0.5, 0);
            
            if (isPlayer2) {
                group.rotation.y = Math.PI; // Face center
            }
            
            scene.add(group);
            return { group, tip };
        }

        const p1 = createBoat(-8, false);
        const p2 = createBoat(8, true);

        // Casting setup
        const bobberGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const bobberMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0x444400 });
        
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });

        function createCastData(boat) {
            const mesh = new THREE.Mesh(bobberGeo, bobberMat);
            mesh.visible = false;
            scene.add(mesh);

            const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
            const line = new THREE.Line(lineGeo, lineMat);
            line.visible = false;
            scene.add(line);

            return {
                state: 0, // 0: idle, 1: dropping, 2: waiting
                timer: 0,
                mesh: mesh,
                line: line,
                tip: boat.tip,
                castX: 0,
                castZ: 0,
                startY: 0
            };
        }

        const castP1 = createCastData(p1);
        const castP2 = createCastData(p2);

        // Fish
        let fishes = [];
        const fishGeo = new THREE.SphereGeometry(1, 16, 16);
        const fishMat = new THREE.MeshStandardMaterial({ color: 0xFF6600 });

        function spawnFish() {
            fishes.forEach(f => scene.remove(f.mesh));
            fishes = [];
            for (let i = 0; i < 6; i++) {
                const mesh = new THREE.Mesh(fishGeo, fishMat);
                mesh.scale.set(1, 0.4, 0.5);
                mesh.position.set(
                    (Math.random() - 0.5) * 40,
                    -1 - Math.random() * 2,
                    (Math.random() - 0.5) * 40
                );
                scene.add(mesh);
                
                const angle = Math.random() * Math.PI * 2;
                fishes.push({
                    mesh: mesh,
                    vx: Math.cos(angle) * 2,
                    vz: Math.sin(angle) * 2,
                    timer: 2 + Math.random()
                });
                mesh.rotation.y = -angle;
            }
            window.__3D_STATE__.fishRemaining = 6;
            updateUI();
        }

        // --- Input Handling ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            // Prevent default scrolling for space and arrows
            if(['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- Game Logic ---
        function updateUI() {
            document.getElementById('p1-score').innerText = `Player 1 Score: ${window.__3D_STATE__.player1Score}`;
            document.getElementById('p2-score').innerText = `Player 2 Score: ${window.__3D_STATE__.player2Score}`;
            document.getElementById('fish-count').innerText = `Fish Remaining: ${window.__3D_STATE__.fishRemaining}`;
            window.__3D_STATE__.gameActive = window.__3D_STATE__.fishRemaining > 0;
        }

        document.getElementById('reset-btn').addEventListener('click', () => {
            window.__3D_STATE__.player1Score = 0;
            window.__3D_STATE__.player2Score = 0;
            p1.group.position.set(-8, 0.5, 0);
            p2.group.position.set(8, 0.5, 0);
            
            castP1.state = 0; castP1.mesh.visible = false; castP1.line.visible = false;
            castP2.state = 0; castP2.mesh.visible = false; castP2.line.visible = false;
            
            spawnFish();
        });

        function handleCastInput(code, data) {
            if (keys[code] && data.state === 0) {
                data.state = 1;
                data.timer = 0;
                data.mesh.visible = true;
                data.line.visible = true;
                
                const tipPos = new THREE.Vector3();
                data.tip.getWorldPosition(tipPos);
                
                data.castX = tipPos.x;
                data.castZ = tipPos.z;
                data.startY = tipPos.y;
                
                data.mesh.position.set(data.castX, data.startY, data.castZ);
                keys[code] = false; // Consume key press
            }
        }

        function updateCast(data, delta, playerNum) {
            if (data.state > 0) {
                // Update line geometry
                const tipPos = new THREE.Vector3();
                data.tip.getWorldPosition(tipPos);
                const positions = data.line.geometry.attributes.position.array;
                positions[0] = tipPos.x; positions[1] = tipPos.y; positions[2] = tipPos.z;
                positions[3] = data.mesh.position.x; positions[4] = data.mesh.position.y; positions[5] = data.mesh.position.z;
                data.line.geometry.attributes.position.needsUpdate = true;
            }

            if (data.state === 1) {
                data.timer += delta;
                const progress = Math.min(data.timer / 0.5, 1);
                data.mesh.position.y = THREE.MathUtils.lerp(data.startY, -2, progress);
                
                if (progress === 1) {
                    data.state = 2;
                    data.timer = 0;
                }
            } else if (data.state === 2) {
                data.timer += delta;
                
                // Check catch
                for (let i = fishes.length - 1; i >= 0; i--) {
                    const f = fishes[i];
                    const dx = f.mesh.position.x - data.mesh.position.x;
                    const dz = f.mesh.position.z - data.mesh.position.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    
                    if (dist < 3.0) {
                        scene.remove(f.mesh);
                        fishes.splice(i, 1);
                        if (playerNum === 1) window.__3D_STATE__.player1Score++;
                        else window.__3D_STATE__.player2Score++;
                        window.__3D_STATE__.fishRemaining--;
                        updateUI();
                    }
                }

                if (data.timer >= 3.0) {
                    data.state = 0;
                    data.mesh.visible = false;
                    data.line.visible = false;
                }
            }
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();
        spawnFish();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Water animation
            water.position.y = Math.sin(time * 2) * 0.1;

            // Boat Movement (0.15 per frame as requested)
            const speed = 0.15;
            
            if (keys['KeyW']) p1.group.position.z -= speed;
            if (keys['KeyS']) p1.group.position.z += speed;
            if (keys['KeyA']) p1.group.position.x -= speed;
            if (keys['KeyD']) p1.group.position.x += speed;

            if (keys['ArrowUp']) p2.group.position.z -= speed;
            if (keys['ArrowDown']) p2.group.position.z += speed;
            if (keys['ArrowLeft']) p2.group.position.x -= speed;
            if (keys['ArrowRight']) p2.group.position.x += speed;

            // Clamp boats
            p1.group.position.x = THREE.MathUtils.clamp(p1.group.position.x, -25, 25);
            p1.group.position.z = THREE.MathUtils.clamp(p1.group.position.z, -25, 25);
            p2.group.position.x = THREE.MathUtils.clamp(p2.group.position.x, -25, 25);
            p2.group.position.z = THREE.MathUtils.clamp(p2.group.position.z, -25, 25);

            // Casting
            handleCastInput('Space', castP1);
            handleCastInput('Enter', castP2);
            
            updateCast(castP1, delta, 1);
            updateCast(castP2, delta, 2);

            // Fish Movement
            fishes.forEach(f => {
                f.timer -= delta;
                if (f.timer <= 0) {
                    const angle = Math.random() * Math.PI * 2;
                    const fishSpeed = 2;
                    f.vx = Math.cos(angle) * fishSpeed;
                    f.vz = Math.sin(angle) * fishSpeed;
                    f.timer = 2 + Math.random();
                    f.mesh.rotation.y = -angle;
                }
                
                f.mesh.position.x += f.vx * delta;
                f.mesh.position.z += f.vz * delta;

                // Bounce off bounds
                if (f.mesh.position.x < -20 || f.mesh.position.x > 20) {
                    f.vx *= -1;
                    f.mesh.position.x = THREE.MathUtils.clamp(f.mesh.position.x, -20, 20);
                    f.mesh.rotation.y = Math.atan2(-f.vz, f.vx);
                }
                if (f.mesh.position.z < -20 || f.mesh.position.z > 20) {
                    f.vz *= -1;
                    f.mesh.position.z = THREE.MathUtils.clamp(f.mesh.position.z, -20, 20);
                    f.mesh.rotation.y = Math.atan2(-f.vz, f.vx);
                }
            });

            // Update Global State
            window.__3D_STATE__.player1BoatX = p1.group.position.x;
            window.__3D_STATE__.player1BoatZ = p1.group.position.z;
            window.__3D_STATE__.player2BoatX = p2.group.position.x;
            window.__3D_STATE__.player2BoatZ = p2.group.position.z;
            window.__3D_STATE__.player1Casting = castP1.state > 0;
            window.__3D_STATE__.player2Casting = castP2.state > 0;

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
