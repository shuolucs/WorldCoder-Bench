<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Stock OHLC Dashboard</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(30, 30, 30, 0.8);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
        }
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            margin: 0;
            font-size: 1.2rem;
            color: #00d2ff;
        }
        #controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            background: #0078d7;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #005a9e;
        }
        #timeDisplay {
            font-family: monospace;
            font-size: 1.1rem;
        }
        #stockDetail {
            align-self: flex-end;
            min-width: 250px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
        }
        .detail-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .up { color: #00ff00; }
        .down { color: #ff0000; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="header" class="panel">
            <h1>3D Market Overview</h1>
            <div id="controls">
                <span id="timeDisplay">Time: 0</span>
                <button id="playPause">Play</button>
            </div>
        </div>
        <div id="stockDetail" class="panel">
            <div style="color: #aaa; text-align: center; padding: 20px 0;">Click a bar to view details</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            stockCount: 10,
            timePoints: 100,
            currentTime: 0,
            selectedStock: null,
            animating: false
        };

        // --- Data Generation ---
        const stocksData = [];
        const generateData = () => {
            for (let i = 0; i < window.__3D_STATE__.stockCount; i++) {
                let currentPrice = 50 + Math.random() * 100;
                const history = [];
                for (let t = 0; t < window.__3D_STATE__.timePoints; t++) {
                    const open = currentPrice;
                    const change = (Math.random() - 0.5) * 10;
                    const close = Math.max(1, open + change);
                    const high = Math.max(open, close) + Math.random() * 5;
                    const low = Math.max(0.1, Math.min(open, close) - Math.random() * 5);
                    
                    history.push({ time: t, open, high, low, close });
                    currentPrice = close;
                }
                stocksData.push({
                    id: i,
                    name: `STOCK-${String.fromCharCode(65 + i)}${i}`,
                    history: history
                });
            }
        };
        generateData();

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x111111, 0.002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(100, 200, 50);
        scene.add(dirLight);

        // --- Visualization Constants ---
        const spacingX = 3; // Time spacing
        const spacingZ = 12; // Stock spacing
        const barWidth = 2;
        const barDepth = 6;
        const heightScale = 0.5;

        // Center camera
        const centerX = (window.__3D_STATE__.timePoints * spacingX) / 2;
        const centerZ = (window.__3D_STATE__.stockCount * spacingZ) / 2;
        camera.position.set(centerX - 100, 150, centerZ + 150);
        controls.target.set(centerX, 0, centerZ);

        // Grid Helper
        const gridHelper = new THREE.GridHelper(Math.max(centerX, centerZ) * 3, 50, 0x444444, 0x222222);
        gridHelper.position.set(centerX, 0, centerZ);
        scene.add(gridHelper);

        // --- Instanced Mesh for Bars ---
        const totalInstances = window.__3D_STATE__.stockCount * window.__3D_STATE__.timePoints;
        const geometry = new THREE.BoxGeometry(barWidth, 1, barDepth);
        // Shift geometry so origin is at bottom
        geometry.translate(0, 0.5, 0); 
        
        const material = new THREE.MeshPhongMaterial({ 
            color: 0xffffff,
            shininess: 30
        });
        
        const instancedMesh = new THREE.InstancedMesh(geometry, material, totalInstances);
        
        const dummy = new THREE.Object3D();
        const colorGreen = new THREE.Color(0x00ff00); // Up
        const colorRed = new THREE.Color(0xff0000);   // Down

        let instanceIdx = 0;
        for (let s = 0; s < window.__3D_STATE__.stockCount; s++) {
            for (let t = 0; t < window.__3D_STATE__.timePoints; t++) {
                const data = stocksData[s].history[t];
                
                const x = t * spacingX;
                const z = s * spacingZ;
                const y = 0;
                const h = data.close * heightScale;

                dummy.position.set(x, y, z);
                dummy.scale.set(1, h, 1);
                dummy.updateMatrix();
                
                instancedMesh.setMatrixAt(instanceIdx, dummy.matrix);
                
                // Color based on Open vs Close
                if (data.close >= data.open) {
                    instancedMesh.setColorAt(instanceIdx, colorGreen);
                } else {
                    instancedMesh.setColorAt(instanceIdx, colorRed);
                }
                
                instanceIdx++;
            }
        }
        instancedMesh.instanceMatrix.needsUpdate = true;
        if (instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate = true;
        scene.add(instancedMesh);

        // --- Time Indicator ---
        const indicatorGeo = new THREE.BoxGeometry(spacingX, 200, window.__3D_STATE__.stockCount * spacingZ);
        indicatorGeo.translate(0, 100, 0);
        const indicatorMat = new THREE.MeshBasicMaterial({
            color: 0x00d2ff,
            transparent: true,
            opacity: 0.15,
            depthWrite: false,
            side: THREE.DoubleSide
        });
        const timeIndicator = new THREE.Mesh(indicatorGeo, indicatorMat);
        timeIndicator.position.z = centerZ - spacingZ/2;
        scene.add(timeIndicator);

        // --- Interaction (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if(event.target.tagName === 'BUTTON') return; // Ignore UI clicks

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(instancedMesh);

            if (intersects.length > 0) {
                const instanceId = intersects[0].instanceId;
                const stockIdx = Math.floor(instanceId / window.__3D_STATE__.timePoints);
                const timeIdx = instanceId % window.__3D_STATE__.timePoints;
                
                const stock = stocksData[stockIdx];
                const data = stock.history[timeIdx];
                
                window.__3D_STATE__.selectedStock = stock.name;
                updateDetailPanel(stock.name, data);
            }
        });

        // --- UI Updates ---
        const timeDisplay = document.getElementById('timeDisplay');
        const playPauseBtn = document.getElementById('playPause');
        const detailPanel = document.getElementById('stockDetail');

        playPauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.animating = !window.__3D_STATE__.animating;
            playPauseBtn.textContent = window.__3D_STATE__.animating ? 'Pause' : 'Play';
        });

        function updateDetailPanel(stockName, data) {
            const isUp = data.close >= data.open;
            const colorClass = isUp ? 'up' : 'down';
            const arrow = isUp ? '▲' : '▼';

            detailPanel.innerHTML = `
                <h2 style="margin:0 0 10px 0; color:#fff;">${stockName}</h2>
                <div class="detail-row"><span>Time:</span> <span>T+${data.time}</span></div>
                <div class="detail-row"><span>Open:</span> <span>${data.open.toFixed(2)}</span></div>
                <div class="detail-row"><span>High:</span> <span>${data.high.toFixed(2)}</span></div>
                <div class="detail-row"><span>Low:</span> <span>${data.low.toFixed(2)}</span></div>
                <div class="detail-row"><span>Close:</span> <strong class="${colorClass}">${data.close.toFixed(2)} ${arrow}</strong></div>
            `;
        }

        function updateTimeVisuals() {
            const t = window.__3D_STATE__.currentTime;
            timeDisplay.textContent = `Time: ${t}`;
            timeIndicator.position.x = t * spacingX;
        }

        // --- Animation Loop ---
        let lastTime = 0;
        const animationSpeed = 100; // ms per time step

        function animate(timestamp) {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.animating) {
                if (timestamp - lastTime > animationSpeed) {
                    window.__3D_STATE__.currentTime++;
                    if (window.__3D_STATE__.currentTime >= window.__3D_STATE__.timePoints) {
                        window.__3D_STATE__.currentTime = 0;
                    }
                    updateTimeVisuals();
                    lastTime = timestamp;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Init visuals
        updateTimeVisuals();
        animate(0);

    </script>
</body>
</html>
