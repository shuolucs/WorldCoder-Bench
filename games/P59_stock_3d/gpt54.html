<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 股票 OHLC 柱状看板</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0b1020;
      color: #e6eefc;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 360px;
    }

    .panel {
      background: rgba(8, 14, 28, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #1d4ed8;
    }

    #stockDetail {
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-line;
    }

    #legend {
      font-size: 13px;
      opacity: 0.9;
    }

    #timeInfo {
      font-size: 14px;
      font-weight: bold;
      color: #93c5fd;
    }

    #hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(8, 14, 28, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
    }

    canvas {
      display: block;
    }
  </style>

  <!-- 必须严格遵守的 Three.js 引入方式 -->
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <div class="panel">
        <div class="row">
          <button id="playPause">暂停</button>
          <span id="timeInfo">当前时间点: 0</span>
        </div>
      </div>

      <div class="panel" id="legend">
        <div><strong>3D 股票 OHLC 柱状看板（模拟数据）</strong></div>
        <div>共 10 只股票，每只 100 个时间点。</div>
        <div>柱高 = 收盘价，颜色 = 涨跌（绿涨红跌）。</div>
        <div>点击柱体可查看对应股票详情。</div>
      </div>

      <div class="panel">
        <div id="stockDetail">未选择股票</div>
      </div>
    </div>

    <div id="hint">鼠标左键旋转 / 滚轮缩放 / 右键平移</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const STOCK_COUNT = 10;
    const TIME_POINTS = 100;
    const STOCK_NAMES = ['AAA', 'BBB', 'CCC', 'DDD', 'EEE', 'FFF', 'GGG', 'HHH', 'III', 'JJJ'];

    const playPauseBtn = document.getElementById('playPause');
    const stockDetailEl = document.getElementById('stockDetail');
    const timeInfoEl = document.getElementById('timeInfo');

    const app = document.getElementById('app');

    // 全局状态暴露（必须）
    window.__3D_STATE__ = {
      stockCount: STOCK_COUNT,
      timePoints: TIME_POINTS,
      currentTime: 0,
      selectedStock: null,
      animating: true
    };

    // -----------------------------
    // 1. 模拟 OHLC 数据生成
    // -----------------------------
    function generateOHLCData() {
      const stocks = [];

      for (let s = 0; s < STOCK_COUNT; s++) {
        const series = [];
        let prevClose = 40 + Math.random() * 80;

        for (let t = 0; t < TIME_POINTS; t++) {
          const open = prevClose;
          const drift = (Math.random() - 0.5) * 6;
          const close = Math.max(5, open + drift);
          const high = Math.max(open, close) + Math.random() * 3.5;
          const low = Math.max(1, Math.min(open, close) - Math.random() * 3.5);

          series.push({
            time: t,
            open: Number(open.toFixed(2)),
            high: Number(high.toFixed(2)),
            low: Number(low.toFixed(2)),
            close: Number(close.toFixed(2))
          });

          prevClose = close;
        }

        stocks.push({
          symbol: STOCK_NAMES[s] || `STOCK_${s + 1}`,
          data: series
        });
      }

      return stocks;
    }

    const stockData = generateOHLCData();

    // -----------------------------
    // 2. Three.js 基础场景
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(60, 80, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(35, 20, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.4));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
    dirLight.position.set(50, 100, 80);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0x88aaff, 0.6);
    dirLight2.position.set(-50, 40, -80);
    scene.add(dirLight2);

    const grid = new THREE.GridHelper(220, 22, 0x334155, 0x1e293b);
    grid.position.y = 0;
    scene.add(grid);

    // 坐标辅助
    const axes = new THREE.AxesHelper(20);
    scene.add(axes);

    // -----------------------------
    // 3. 柱体看板构建
    // -----------------------------
    const barsGroup = new THREE.Group();
    scene.add(barsGroup);

    const labelGroup = new THREE.Group();
    scene.add(labelGroup);

    const barWidth = 0.7;
    const barDepth = 1.8;
    const timeSpacing = 1.2;
    const stockSpacing = 4.2;
    const priceScale = 0.35;

    const upMaterial = new THREE.MeshStandardMaterial({
      color: 0x22c55e,
      emissive: 0x0a2c16,
      roughness: 0.35,
      metalness: 0.15
    });

    const downMaterial = new THREE.MeshStandardMaterial({
      color: 0xef4444,
      emissive: 0x2a0d0d,
      roughness: 0.35,
      metalness: 0.15
    });

    const selectedMaterial = new THREE.MeshStandardMaterial({
      color: 0xfacc15,
      emissive: 0x5a4500,
      roughness: 0.25,
      metalness: 0.2
    });

    const barGeometry = new THREE.BoxGeometry(barWidth, 1, barDepth);

    const barMeshes = [];

    function createTextSprite(text, color = '#cbd5e1') {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = 'bold 28px Arial';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;

      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true
      });

      const sprite = new THREE.Sprite(material);
      sprite.scale.set(8, 2, 1);
      return sprite;
    }

    for (let s = 0; s < STOCK_COUNT; s++) {
      const z = (s - (STOCK_COUNT - 1) / 2) * stockSpacing;

      const label = createTextSprite(stockData[s].symbol);
      label.position.set(-6, 2, z);
      labelGroup.add(label);

      const stockBars = [];

      for (let t = 0; t < TIME_POINTS; t++) {
        const point = stockData[s].data[t];
        const isUp = point.close >= point.open;
        const mesh = new THREE.Mesh(barGeometry, isUp ? upMaterial : downMaterial);

        const h = Math.max(0.2, point.close * priceScale);
        const x = t * timeSpacing;
        mesh.position.set(x, h / 2, z);
        mesh.scale.y = h;

        mesh.userData = {
          stockIndex: s,
          stockSymbol: stockData[s].symbol,
          timeIndex: t
        };

        barsGroup.add(mesh);
        stockBars.push(mesh);
      }

      barMeshes.push(stockBars);
    }

    // -----------------------------
    // 4. 时间高亮板
    // -----------------------------
    const markerGeometry = new THREE.BoxGeometry(0.9, 0.2, STOCK_COUNT * stockSpacing + 4);
    const markerMaterial = new THREE.MeshBasicMaterial({
      color: 0x60a5fa,
      transparent: true,
      opacity: 0.28
    });
    const timeMarker = new THREE.Mesh(markerGeometry, markerMaterial);
    timeMarker.position.set(0, 0.12, 0);
    scene.add(timeMarker);

    // -----------------------------
    // 5. 点击选择
    // -----------------------------
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let selectedRef = null;

    function updateStockDetail(stockIndex, timeIndex) {
      const stock = stockData[stockIndex];
      const d = stock.data[timeIndex];
      stockDetailEl.textContent =
        `股票: ${stock.symbol}
时间点: ${timeIndex}
Open: ${d.open}
High: ${d.high}
Low: ${d.low}
Close: ${d.close}`;
    }

    function applySelection(mesh) {
      if (selectedRef) {
        const { stockIndex, timeIndex } = selectedRef.userData;
        const oldPoint = stockData[stockIndex].data[timeIndex];
        selectedRef.material = oldPoint.close >= oldPoint.open ? upMaterial : downMaterial;
      }

      selectedRef = mesh;

      if (selectedRef) {
        selectedRef.material = selectedMaterial;
        const { stockIndex, stockSymbol, timeIndex } = selectedRef.userData;
        window.__3D_STATE__.selectedStock = stockSymbol;
        updateStockDetail(stockIndex, timeIndex);
      } else {
        window.__3D_STATE__.selectedStock = null;
        stockDetailEl.textContent = '未选择股票';
      }
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(barsGroup.children, false);

      if (intersects.length > 0) {
        applySelection(intersects[0].object);
      }
    });

    // -----------------------------
    // 6. 动画时间推进
    // -----------------------------
    function setCurrentTime(t) {
      const currentTime = ((t % TIME_POINTS) + TIME_POINTS) % TIME_POINTS;
      window.__3D_STATE__.currentTime = currentTime;
      timeInfoEl.textContent = `当前时间点: ${currentTime}`;
      timeMarker.position.x = currentTime * timeSpacing;

      // 只强调当前时间对应的柱体
      for (let s = 0; s < STOCK_COUNT; s++) {
        for (let tt = 0; tt < TIME_POINTS; tt++) {
          const mesh = barMeshes[s][tt];
          const point = stockData[s].data[tt];
          const isSelected = selectedRef === mesh;
          const baseMaterial = point.close >= point.open ? upMaterial : downMaterial;

          mesh.material = isSelected ? selectedMaterial : baseMaterial;
          mesh.scale.x = tt === currentTime ? 1.35 : 1.0;
          mesh.scale.z = tt === currentTime ? 1.15 : 1.0;
        }
      }
    }

    playPauseBtn.addEventListener('click', () => {
      window.__3D_STATE__.animating = !window.__3D_STATE__.animating;
      playPauseBtn.textContent = window.__3D_STATE__.animating ? '暂停' : '播放';
    });

    let lastStepTime = 0;
    const stepInterval = 300;

    function animate(now = 0) {
      requestAnimationFrame(animate);

      if (window.__3D_STATE__.animating && now - lastStepTime > stepInterval) {
        setCurrentTime(window.__3D_STATE__.currentTime + 1);
        lastStepTime = now;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    setCurrentTime(0);
    animate();

    // -----------------------------
    // 7. 自适应
    // -----------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // 初始详情展示当前时间第一个股票
    updateStockDetail(0, 0);
  </script>
</body>
</html>
