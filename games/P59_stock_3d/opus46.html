<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Stock OHLC Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a1a; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
  #container { width: 100vw; height: 100vh; }
  
  #ui-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 10;
  }
  
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    background: linear-gradient(180deg, rgba(10,10,26,0.95) 0%, rgba(10,10,26,0.7) 80%, transparent 100%);
    pointer-events: auto;
  }
  
  #top-bar h1 {
    font-size: 20px;
    font-weight: 600;
    background: linear-gradient(90deg, #00d4ff, #7b61ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  
  #controls {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  #playPause {
    pointer-events: auto;
    background: linear-gradient(135deg, #7b61ff, #00d4ff);
    border: none;
    color: white;
    padding: 8px 20px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 0.5px;
  }
  #playPause:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(123,97,255,0.4); }
  
  #time-display {
    font-size: 14px;
    color: #aaa;
    font-variant-numeric: tabular-nums;
  }
  
  #time-slider-container {
    padding: 0 24px 0;
    pointer-events: auto;
    background: linear-gradient(180deg, transparent 0%, rgba(10,10,26,0.3) 100%);
  }
  
  #timeSlider {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #1a1a3a;
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #7b61ff, #00d4ff);
    box-shadow: 0 0 10px rgba(123,97,255,0.5);
    cursor: pointer;
  }
  
  #stockDetail {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(15, 15, 35, 0.92);
    border: 1px solid rgba(123, 97, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    min-width: 280px;
    pointer-events: auto;
    z-index: 10;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    transition: all 0.3s;
  }
  
  #stockDetail.hidden { opacity: 0; transform: translateY(10px); pointer-events: none; }
  
  #stockDetail h3 {
    font-size: 16px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(123,97,255,0.2);
  }
  
  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }
  .detail-label { color: #888; }
  .detail-value { font-weight: 600; font-variant-numeric: tabular-nums; }
  .price-up { color: #00e676; }
  .price-down { color: #ff5252; }
  
  #legend {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: rgba(15, 15, 35, 0.85);
    border: 1px solid rgba(123, 97, 255, 0.2);
    border-radius: 10px;
    padding: 14px 18px;
    pointer-events: auto;
    z-index: 10;
    backdrop-filter: blur(10px);
    font-size: 12px;
  }
  #legend h4 { margin-bottom: 8px; color: #aaa; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin: 4px 0; }
  .legend-color { width: 14px; height: 14px; border-radius: 3px; }
  
  #tooltip {
    position: absolute;
    background: rgba(15, 15, 35, 0.95);
    border: 1px solid rgba(123, 97, 255, 0.4);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 12px;
    pointer-events: none;
    z-index: 20;
    display: none;
    white-space: nowrap;
    backdrop-filter: blur(10px);
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="container"></div>

<div id="ui-overlay">
  <div id="top-bar">
    <h1>📊 3D Stock OHLC Dashboard</h1>
    <div id="controls">
      <span id="time-display">Day: 0 / 99</span>
      <button id="playPause">⏸ Pause</button>
    </div>
  </div>
  <div id="time-slider-container">
    <input type="range" id="timeSlider" min="0" max="99" value="0">
  </div>
</div>

<div id="stockDetail" class="hidden">
  <h3 id="detailTitle">Select a stock bar</h3>
  <div id="detailContent"></div>
</div>

<div id="legend">
  <h4>Legend</h4>
  <div class="legend-item"><div class="legend-color" style="background:#00e676;"></div><span>Price Up (Close &gt; Open)</span></div>
  <div class="legend-item"><div class="legend-color" style="background:#ff5252;"></div><span>Price Down (Close &lt; Open)</span></div>
  <div class="legend-item"><div class="legend-color" style="background:#ffab40;"></div><span>Selected</span></div>
</div>

<div id="tooltip"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
window.__3D_STATE__ = {
  stockCount: 10,
  timePoints: 100,
  currentTime: 0,
  selectedStock: null,
  animating: true
};

// ============ STOCK DATA GENERATION ============
const stockNames = ['AAPL', 'GOOGL', 'MSFT', 'AMZN', 'TSLA', 'NVDA', 'META', 'NFLX', 'AMD', 'INTC'];
const stockColors = ['#4fc3f7', '#81c784', '#e57373', '#ffb74d', '#ba68c8', '#4db6ac', '#f06292', '#aed581', '#ff8a65', '#90a4ae'];

function generateOHLC(stockIndex) {
  const data = [];
  let basePrice = 50 + Math.random() * 200;
  const volatility = 0.02 + Math.random() * 0.04;
  const drift = (Math.random() - 0.5) * 0.002;
  
  for (let t = 0; t < 100; t++) {
    const change = basePrice * (drift + volatility * (Math.random() - 0.5) * 2);
    const open = basePrice;
    const close = basePrice + change;
    const high = Math.max(open, close) + Math.abs(change) * Math.random() * 0.5;
    const low = Math.min(open, close) - Math.abs(change) * Math.random() * 0.5;
    
    data.push({
      open: Math.max(1, open),
      high: Math.max(1, high),
      low: Math.max(0.5, low),
      close: Math.max(1, close),
      volume: Math.floor(1000000 + Math.random() * 5000000)
    });
    
    basePrice = Math.max(5, close);
  }
  return data;
}

const allStockData = [];
for (let i = 0; i < 10; i++) {
  allStockData.push({
    name: stockNames[i],
    color: stockColors[i],
    ohlc: generateOHLC(i)
  });
}

// Find global price range for normalization
let globalMin = Infinity, globalMax = -Infinity;
for (const stock of allStockData) {
  for (const d of stock.ohlc) {
    globalMin = Math.min(globalMin, d.low);
    globalMax = Math.max(globalMax, d.high);
  }
}
const priceRange = globalMax - globalMin;

// ============ THREE.JS SETUP ============
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.006);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(55, 40, 55);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(25, 10, 12);
controls.minDistance = 15;
controls.maxDistance = 150;
controls.maxPolarAngle = Math.PI * 0.48;

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(40, 60, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x7b61ff, 0.6, 100);
pointLight1.position.set(-10, 30, -10);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x00d4ff, 0.4, 100);
pointLight2.position.set(60, 25, 30);
scene.add(pointLight2);

// ============ GROUND / GRID ============
const groundGeo = new THREE.PlaneGeometry(120, 60);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0d0d25,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.set(25, -0.05, 12);
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(120, 60, 0x1a1a4a, 0x111133);
gridHelper.position.set(25, 0, 12);
scene.add(gridHelper);

// ============ BAR GEOMETRY & MATERIALS ============
const barWidth = 0.6;
const barDepth = 1.8;
const spacing = 5.0;
const timeSpacing = 0; // bars update in place per time

// Materials cache
const upMaterial = new THREE.MeshStandardMaterial({
  color: 0x00e676,
  roughness: 0.3,
  metalness: 0.5,
  emissive: 0x003d1a,
  emissiveIntensity: 0.3
});

const downMaterial = new THREE.MeshStandardMaterial({
  color: 0xff5252,
  roughness: 0.3,
  metalness: 0.5,
  emissive: 0x3d0000,
  emissiveIntensity: 0.3
});

const selectedMaterial = new THREE.MeshStandardMaterial({
  color: 0xffab40,
  roughness: 0.2,
  metalness: 0.7,
  emissive: 0x553300,
  emissiveIntensity: 0.5
});

// Wick materials
const upWickMat = new THREE.MeshBasicMaterial({ color: 0x00e676 });
const downWickMat = new THREE.MeshBasicMaterial({ color: 0xff5252 });
const selectedWickMat = new THREE.MeshBasicMaterial({ color: 0xffab40 });

// ============ CREATE BARS ============
const barMeshes = []; // [stockIndex] = { body, wick, stockIndex }
const barGroup = new THREE.Group();
scene.add(barGroup);

const bodyGeometry = new THREE.BoxGeometry(1, 1, 1);
const wickGeometry = new THREE.BoxGeometry(0.08, 1, 0.08);

for (let s = 0; s < 10; s++) {
  const body = new THREE.Mesh(bodyGeometry, upMaterial.clone());
  body.castShadow = true;
  body.receiveShadow = true;
  body.userData = { stockIndex: s };
  
  const wick = new THREE.Mesh(wickGeometry, upWickMat.clone());
  wick.userData = { stockIndex: s };
  
  barGroup.add(body);
  barGroup.add(wick);
  
  barMeshes.push({ body, wick, stockIndex: s });
}

// ============ STOCK LABELS ============
function createTextSprite(text, color) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = color || '#ffffff';
  ctx.font = 'bold 36px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 32);
  
  const texture = new THREE.CanvasTexture(canvas);
  texture.minFilter = THREE.LinearFilter;
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.scale.set(5, 1.25, 1);
  return sprite;
}

const labelSprites = [];
for (let s = 0; s < 10; s++) {
  const sprite = createTextSprite(stockNames[s], stockColors[s]);
  sprite.position.set(-4, 1, s * spacing);
  scene.add(sprite);
  labelSprites.push(sprite);
}

// ============ PRICE AXIS LABELS ============
const priceSteps = 5;
for (let i = 0; i <= priceSteps; i++) {
  const price = globalMin + (priceRange * i / priceSteps);
  const y = (i / priceSteps) * 25;
  const sprite = createTextSprite('$' + price.toFixed(0), '#666688');
  sprite.position.set(-8, y, -3);
  sprite.scale.set(4, 1, 1);
  scene.add(sprite);
  
  // Horizontal reference line
  const lineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-2, y, -2),
    new THREE.Vector3(55, y, -2)
  ]);
  const lineMat = new THREE.LineBasicMaterial({ color: 0x1a1a3a, transparent: true, opacity: 0.5 });
  scene.add(new THREE.Line(lineGeo, lineMat));
}

// ============ MINI CHART (sparkline bars for history) ============
// Show last N time points as mini bars behind the main bar
const historyCount = 20;
const historyBars = []; // [stockIndex][histIndex] = { body, wick }
const historyGroup = new THREE.Group();
scene.add(historyGroup);

const histBodyGeo = new THREE.BoxGeometry(1, 1, 1);
const histWickGeo = new THREE.BoxGeometry(0.04, 1, 0.04);

for (let s = 0; s < 10; s++) {
  historyBars[s] = [];
  for (let h = 0; h < historyCount; h++) {
    const hBody = new THREE.Mesh(histBodyGeo, upMaterial.clone());
    hBody.castShadow = false;
    hBody.receiveShadow = false;
    hBody.userData = { stockIndex: s, histIndex: h };
    
    const hWick = new THREE.Mesh(histWickGeo, upWickMat.clone());
    
    historyGroup.add(hBody);
    historyGroup.add(hWick);
    
    historyBars[s].push({ body: hBody, wick: hWick });
  }
}

// ============ UPDATE BARS ============
function normalizePrice(price) {
  return ((price - globalMin) / priceRange) * 25;
}

function updateBars(timeIndex, animate = true) {
  const state = window.__3D_STATE__;
  
  for (let s = 0; s < 10; s++) {
    const d = allStockData[s].ohlc[timeIndex];
    const isUp = d.close >= d.open;
    const isSelected = state.selectedStock === s;
    
    // Body
    const bodyBottom = normalizePrice(Math.min(d.open, d.close));
    const bodyTop = normalizePrice(Math.max(d.open, d.close));
    const bodyHeight = Math.max(bodyTop - bodyBottom, 0.05);
    const bodyY = bodyBottom + bodyHeight / 2;
    
    const bar = barMeshes[s];
    const xPos = 2;
    const zPos = s * spacing;
    
    bar.body.scale.set(barWidth * 2, bodyHeight, barDepth);
    bar.body.position.set(xPos, bodyY, zPos);
    
    // Wick
    const wickBottom = normalizePrice(d.low);
    const wickTop = normalizePrice(d.high);
    const wickHeight = Math.max(wickTop - wickBottom, 0.05);
    const wickY = wickBottom + wickHeight / 2;
    
    bar.wick.scale.set(1, wickHeight, 1);
    bar.wick.position.set(xPos, wickY, zPos);
    
    // Material
    if (isSelected) {
      bar.body.material = selectedMaterial;
      bar.wick.material = selectedWickMat;
    } else if (isUp) {
      bar.body.material = upMaterial;
      bar.wick.material = upWickMat;
    } else {
      bar.body.material = downMaterial;
      bar.wick.material = downWickMat;
    }
    
    // History bars
    for (let h = 0; h < historyCount; h++) {
      const histTime = timeIndex - (historyCount - h);
      const hBar = historyBars[s][h];
      
      if (histTime < 0) {
        hBar.body.visible = false;
        hBar.wick.visible = false;
        continue;
      }
      
      hBar.body.visible = true;
      hBar.wick.visible = true;
      
      const hd = allStockData[s].ohlc[histTime];
      const hIsUp = hd.close >= hd.open;
      
      const hBodyBottom = normalizePrice(Math.min(hd.open, hd.close));
      const hBodyTop = normalizePrice(Math.max(hd.open, hd.close));
      const hBodyHeight = Math.max(hBodyTop - hBodyBottom, 0.03);
      const hBodyY = hBodyBottom + hBodyHeight / 2;
      
      const hXPos = 2 + (h - historyCount) * 1.8;
      
      const opacity = 0.15 + (h / historyCount) * 0.4;
      
      hBar.body.scale.set(barWidth * 1.2, hBodyHeight, barDepth * 0.6);
      hBar.body.position.set(hXPos, hBodyY, zPos);
      
      const hWickBottom = normalizePrice(hd.low);
      const hWickTop = normalizePrice(hd.high);
      const hWickHeight = Math.max(hWickTop - hWickBottom, 0.03);
      const hWickY = hWickBottom + hWickHeight / 2;
      
      hBar.wick.scale.set(1, hWickHeight, 1);
      hBar.wick.position.set(hXPos, hWickY, zPos);
      
      // Color with opacity
      if (hIsUp) {
        hBar.body.material = new THREE.MeshStandardMaterial({
          color: 0x00e676, transparent: true, opacity, roughness: 0.5, metalness: 0.3
        });
        hBar.wick.material = new THREE.MeshBasicMaterial({
          color: 0x00e676, transparent: true, opacity: opacity * 0.7
        });
      } else {
        hBar.body.material = new THREE.MeshStandardMaterial({
          color: 0xff5252, transparent: true, opacity, roughness: 0.5, metalness: 0.3
        });
        hBar.wick.material = new THREE.MeshBasicMaterial({
          color: 0xff5252, transparent: true, opacity: opacity * 0.7
        });
      }
    }
  }
}

// ============ RAYCASTING / CLICK ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function onMouseMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const bodies = barMeshes.map(b => b.body);
  const intersects = raycaster.intersectObjects(bodies);
  
  if (intersects.length > 0) {
    const si = intersects[0].object.userData.stockIndex;
    const d = allStockData[si].ohlc[window.__3D_STATE__.currentTime];
    const isUp = d.close >= d.open;
    
    tooltip.style.display = 'block';
    tooltip.style.left = (event.clientX + 15) + 'px';
    tooltip.style.top = (event.clientY - 10) + 'px';
    tooltip.innerHTML = `<strong style="color:${stockColors[si]}">${stockNames[si]}</strong> | Close: <span class="${isUp ? 'price-up' : 'price-down'}">$${d.close.toFixed(2)}</span>`;
    document.body.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    document.body.style.cursor = 'default';
  }
}

function onClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const allBodies = [...barMeshes.map(b => b.body)];
  // Also check history bars
  for (let s = 0; s < 10; s++) {
    for (let h = 0; h < historyCount; h++) {
      allBodies.push(historyBars[s][h].body);
    }
  }
  const intersects = raycaster.intersectObjects(allBodies);
  
  const state = window.__3D_STATE__;
  
  if (intersects.length > 0) {
    const si = intersects[0].object.userData.stockIndex;
    
    if (state.selectedStock === si) {
      state.selectedStock = null;
      document.getElementById('stockDetail').classList.add('hidden');
    } else {
      state.selectedStock = si;
      updateDetailPanel(si);
    }
    updateBars(state.currentTime);
  } else {
    state.selectedStock = null;
    document.getElementById('stockDetail').classList.add('hidden');
    updateBars(state.currentTime);
  }
}

function updateDetailPanel(stockIndex) {
  const state = window.__3D_STATE__;
  const stock = allStockData[stockIndex];
  const d = stock.ohlc[state.currentTime];
  const isUp = d.close >= d.open;
  const change = d.close - d.open;
  const changePct = (change / d.open * 100);
  
  const prevClose = state.currentTime > 0 ? stock.ohlc[state.currentTime - 1].close : d.open;
  const dayChange = d.close - prevClose;
  const dayChangePct = (dayChange / prevClose * 100);
  
  const panel = document.getElementById('stockDetail');
  panel.classList.remove('hidden');
  
  document.getElementById('detailTitle').innerHTML = 
    `<span style="color:${stockColors[stockIndex]}">${stock.name}</span> — Day ${state.currentTime}`;
  
  const cls = isUp ? 'price-up' : 'price-down';
  
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-row"><span class="detail-label">Open</span><span class="detail-value">$${d.open.toFixed(2)}</span></div>
    <div class="detail-row"><span class="detail-label">High</span><span class="detail-value">$${d.high.toFixed(2)}</span></div>
    <div class="detail-row"><span class="detail-label">Low</span><span class="detail-value">$${d.low.toFixed(2)}</span></div>
    <div class="detail-row"><span class="detail-label">Close</span><span class="detail-value ${cls}">$${d.close.toFixed(2)}</span></div>
    <div class="detail-row"><span class="detail-label">Change</span><span class="detail-value ${cls}">${change >= 0 ? '+' : ''}${change.toFixed(2)} (${changePct >= 0 ? '+' : ''}${changePct.toFixed(2)}%)</span></div>
    <div class="detail-row"><span class="detail-label">Day Δ</span><span class="detail-value ${dayChange >= 0 ? 'price-up' : 'price-down'}">${dayChange >= 0 ? '+' : ''}${dayChange.toFixed(2)} (${dayChangePct >= 0 ? '+' : ''}${dayChangePct.toFixed(2)}%)</span></div>
    <div class="detail-row"><span class="detail-label">Volume</span><span class="detail-value">${(d.volume / 1000000).toFixed(2)}M</span></div>
    <div class="detail-row"><span class="detail-label">Range</span><span class="detail-value">$${d.low.toFixed(2)} — $${d.high.toFixed(2)}</span></div>
  `;
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

// ============ PLAY/PAUSE & SLIDER ============
const playPauseBtn = document.getElementById('playPause');
const timeSlider = document.getElementById('timeSlider');
const timeDisplay = document.getElementById('time-display');

playPauseBtn.addEventListener('click', () => {
  const state = window.__3D_STATE__;
  state.animating = !state.animating;
  playPauseBtn.textContent = state.animating ? '⏸ Pause' : '▶ Play';
});

timeSlider.addEventListener('input', (e) => {
  const state = window.__3D_STATE__;
  state.currentTime = parseInt(e.target.value);
  updateBars(state.currentTime);
  timeDisplay.textContent = `Day: ${state.currentTime} / 99`;
  
  if (state.selectedStock !== null) {
    updateDetailPanel(state.selectedStock);
  }
});

// ============ PARTICLES (ambient) ============
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 120;
  particlePositions[i * 3 + 1] = Math.random() * 40;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x7b61ff,
  size: 0.08,
  transparent: true,
  opacity: 0.4,
  sizeAttenuation: true
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ ANIMATION LOOP ============
let lastTimeUpdate = 0;
const timeInterval = 150; // ms per time step
let clock = new THREE.Clock();

updateBars(0);

function animate() {
  requestAnimationFrame(animate);
  
  const state = window.__3D_STATE__;
  const elapsed = clock.getElapsedTime() * 1000;
  
  // Auto advance time
  if (state.animating && elapsed - lastTimeUpdate > timeInterval) {
    lastTimeUpdate = elapsed;
    state.currentTime = (state.currentTime + 1) % 100;
    timeSlider.value = state.currentTime;
    timeDisplay.textContent = `Day: ${state.currentTime} / 99`;
    updateBars(state.currentTime);
    
    if (state.selectedStock !== null) {
      updateDetailPanel(state.selectedStock);
    }
  }
  
  // Animate particles
  const positions = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += Math.sin(elapsed * 0.001 + i) * 0.003;
  }
  particleGeo.attributes.position.needsUpdate = true;
  
  // Subtle light animation
  pointLight1.position.x = -10 + Math.sin(elapsed * 0.0005) * 10;
  pointLight2.position.z = 30 + Math.cos(elapsed * 0.0003) * 15;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
