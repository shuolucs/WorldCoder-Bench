<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cell Division (Mitosis)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(10, 10, 46, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        #phaseDisplay {
            font-size: 2rem;
            font-weight: bold;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #phaseCounter {
            font-size: 1.2rem;
            color: #aaccff;
        }
        #controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        button:active {
            background: rgba(255, 255, 255, 0.3);
        }
        #bottom-bar {
            display: flex;
            justify-content: center;
        }
        #infoPanel {
            max-width: 600px;
            text-align: center;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        #instructions {
            position: absolute;
            right: 20px;
            bottom: 20px;
            font-size: 0.8rem;
            color: #8899aa;
            text-align: right;
            pointer-events: none;
        }
        .label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            pointer-events: none;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            display: none;
            transition: opacity 0.2s;
        }
        .label::after {
            content: '';
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.6) transparent transparent transparent;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="labels-container">
        <div class="label" id="label-nucleus">Nucleus</div>
        <div class="label" id="label-membrane">Cell Membrane</div>
        <div class="label" id="label-chromosomes">Chromosomes</div>
    </div>

    <div id="ui-layer">
        <div id="top-bar">
            <div>
                <h1 id="phaseDisplay">Interphase</h1>
                <div id="controls">
                    <button id="prevPhaseBtn">Previous</button>
                    <button id="nextPhaseBtn">Next Phase</button>
                    <button id="resetBtn">Reset</button>
                    <button id="toggleLabelsBtn">Toggle Labels</button>
                </div>
            </div>
            <div class="panel">
                <div id="phaseCounter">Phase 1/5</div>
            </div>
        </div>
        
        <div id="bottom-bar">
            <div class="panel" id="infoPanel">
                The cell is at rest, preparing for division. The nucleus is intact, and DNA is replicated but not yet condensed into distinct chromosomes.
            </div>
        </div>
    </div>

    <div id="instructions">
        Click cell to highlight<br>
        [Space] Pause/Resume<br>
        [R] Toggle Robot
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xaaccff, 1.5);
        pointLight.position.set(5, 10, 5);
        scene.add(pointLight);

        // --- MATERIALS ---
        const cellColor = 0x44cc88;
        const nucleusColor = 0x8844cc;
        const chromoColor = 0xff4444;
        const membraneColor = 0x66ffaa;

        const cellMat = new THREE.MeshPhongMaterial({ color: cellColor, transparent: true, opacity: 0.6, shininess: 80, depthWrite: false });
        const nucleusMat = new THREE.MeshPhongMaterial({ color: nucleusColor, transparent: true, opacity: 0.8, shininess: 50 });
        const chromoMat = new THREE.MeshPhongMaterial({ color: chromoColor, shininess: 30 });
        const membraneMat = new THREE.MeshBasicMaterial({ color: membraneColor, wireframe: true, transparent: true, opacity: 0.4 });

        // --- CELL MODEL ---
        const mainCellGroup = new THREE.Group();
        scene.add(mainCellGroup);

        const cellGeo = new THREE.SphereGeometry(2, 32, 32);
        const parentCellMesh = new THREE.Mesh(cellGeo, cellMat);
        
        const membraneGeo = new THREE.SphereGeometry(2.05, 16, 16);
        const membraneMesh = new THREE.Mesh(membraneGeo, membraneMat);
        
        const nucleusGeo = new THREE.SphereGeometry(0.7, 32, 32);
        const nucleusMesh = new THREE.Mesh(nucleusGeo, nucleusMat);
        
        mainCellGroup.add(parentCellMesh, membraneMesh, nucleusMesh);

        const chromosomes = [];
        const chromoGeo = new THREE.BoxGeometry(0.05, 0.3, 0.05);
        for (let i = 0; i < 8; i++) {
            const mesh = new THREE.Mesh(chromoGeo, chromoMat);
            chromosomes.push(mesh);
            mainCellGroup.add(mesh);
            if (i >= 4) mesh.visible = false;
        }

        // --- DAUGHTER CELLS (TELOPHASE) ---
        const daughterCellsGroup = new THREE.Group();
        scene.add(daughterCellsGroup);
        daughterCellsGroup.visible = false;

        const dCellMat = cellMat.clone(); dCellMat.opacity = 0;
        const dMembraneMat = membraneMat.clone(); dMembraneMat.opacity = 0;
        const dNucleusMat = nucleusMat.clone(); dNucleusMat.opacity = 0;

        function createDaughterCell(yPos) {
            const group = new THREE.Group();
            const cell = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), dCellMat);
            const mem = new THREE.Mesh(new THREE.SphereGeometry(1.55, 16, 16), dMembraneMat);
            const nuc = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), dNucleusMat);
            group.add(cell, mem, nuc);
            group.position.y = yPos;
            return { group, cell, mem, nuc };
        }

        const daughter1 = createDaughterCell(2.5);
        const daughter2 = createDaughterCell(-2.5);
        daughterCellsGroup.add(daughter1.group, daughter2.group);

        // --- ROBOT OBSERVER ---
        let robot = null;
        let robotLoaded = false;
        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            robot = gltf.scene;
            robot.scale.setScalar(0.5);
            scene.add(robot);
            robotLoaded = true;
        }, undefined, (error) => {
            console.warn("Robot asset not found, proceeding without it.", error);
        });

        // --- STATE & PHASES ---
        const PHASES = [
            { name: "INTERPHASE", desc: "The cell is at rest, preparing for division. The nucleus is intact, and DNA is replicated but not yet condensed into distinct chromosomes." },
            { name: "PROPHASE", desc: "The nuclear envelope begins to dissolve. Chromatin condenses into visible, distinct chromosomes, each consisting of two sister chromatids." },
            { name: "METAPHASE", desc: "Chromosomes align at the cell's equator (metaphase plate). Spindle fibers attach to the centromeres of the chromosomes." },
            { name: "ANAPHASE", desc: "Sister chromatids are pulled apart toward opposite poles of the cell. The cell begins to elongate." },
            { name: "TELOPHASE", desc: "Chromosomes reach the poles. New nuclear envelopes form around each set. The cell pinches in the middle (cytokinesis) to form two daughter cells." }
        ];

        let currentPhaseIdx = 0;
        let startPhaseIdx = 0;
        let transitionProgress = 1; // 1 = idle, <1 = animating
        const TRANSITION_TIME = 1.5;
        let isPaused = false;
        let labelsVisible = false;
        let cellHighlighted = false;
        let robotAngle = 0;

        // Animation Targets
        let startNucOp = 0.8, targetNucOp = 0.8;
        let startCellScale = new THREE.Vector3(1,1,1), targetCellScale = new THREE.Vector3(1,1,1);
        let startMainOp = 0.6, targetMainOp = 0.6;
        let startMemOp = 0.4, targetMemOp = 0.4;
        let startDOp = 0, targetDOp = 0;
        let startDNucOp = 0, targetDNucOp = 0;
        
        const startChromo = Array(8).fill(null).map(() => ({ pos: new THREE.Vector3(), quat: new THREE.Quaternion() }));
        const targetChromo = Array(8).fill(null).map(() => ({ pos: new THREE.Vector3(), quat: new THREE.Quaternion() }));

        // Initialize chromosome positions for Interphase
        function randomizeChromosomes(phase, targetsArray) {
            for (let i = 0; i < 8; i++) {
                let p = new THREE.Vector3();
                let e = new THREE.Euler();
                if (phase === 0) {
                    if (i < 4) {
                        p.set((Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6);
                        e.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                    }
                } else if (phase === 1) {
                    p.set((Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2, (Math.random()-0.5)*1.2);
                    e.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                } else if (phase === 2) {
                    const x = (i - 3.5) * 0.25;
                    p.set(x, (Math.random()-0.5)*0.1, (Math.random()-0.5)*0.2);
                    e.set(0, 0, Math.PI/2 + (Math.random()-0.5)*0.2);
                } else if (phase === 3) {
                    const x = ((i%4) - 1.5) * 0.25;
                    const y = i < 4 ? 1.2 : -1.2;
                    p.set(x, y, (Math.random()-0.5)*0.1);
                    e.set(0, 0, Math.PI/2);
                } else if (phase === 4) {
                    const x = ((i%4) - 1.5) * 0.2;
                    const y = i < 4 ? 2.5 : -2.5;
                    p.set(x + (Math.random()-0.5)*0.2, y + (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.2);
                    e.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                }
                targetsArray[i].pos.copy(p);
                targetsArray[i].quat.setFromEuler(e);
            }
        }

        randomizeChromosomes(0, targetChromo);
        for(let i=0; i<8; i++) {
            chromosomes[i].position.copy(targetChromo[i].pos);
            chromosomes[i].quaternion.copy(targetChromo[i].quat);
        }

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function setPhase(idx) {
            if (idx < 0 || idx > 4 || idx === currentPhaseIdx) return;
            
            startPhaseIdx = currentPhaseIdx;
            currentPhaseIdx = idx;
            transitionProgress = 0;

            // Save current state as start
            startNucOp = nucleusMat.opacity;
            startCellScale.copy(mainCellGroup.scale);
            startMainOp = cellMat.opacity;
            startMemOp = membraneMat.opacity;
            startDOp = dCellMat.opacity;
            startDNucOp = dNucleusMat.opacity;

            for(let i=0; i<8; i++) {
                startChromo[i].pos.copy(chromosomes[i].position);
                startChromo[i].quat.copy(chromosomes[i].quaternion);
            }

            // Set targets based on new phase
            targetNucOp = (idx >= 1 && idx <= 3) ? 0.1 : 0.8;
            
            if (idx === 3) {
                targetCellScale.set(0.8, 1.4, 0.8);
            } else if (idx === 4) {
                targetCellScale.set(0.5, 1.8, 0.5); // Stretch before disappearing
            } else {
                targetCellScale.set(1, 1, 1);
            }

            if (idx === 4) {
                targetMainOp = 0;
                targetMemOp = 0;
                targetDOp = 0.6;
                targetDNucOp = 0.8;
                daughterCellsGroup.visible = true;
            } else {
                targetMainOp = 0.6;
                targetMemOp = 0.4;
                targetDOp = 0;
                targetDNucOp = 0;
            }

            randomizeChromosomes(idx, targetChromo);

            // Visibility logic for chromosomes 4-7
            if (idx > 0) {
                for(let i=4; i<8; i++) chromosomes[i].visible = true;
            }

            updateUI();
        }

        // --- UI & INTERACTIONS ---
        const phaseDisplay = document.getElementById('phaseDisplay');
        const phaseCounter = document.getElementById('phaseCounter');
        const infoPanel = document.getElementById('infoPanel');
        const nextBtn = document.getElementById('nextPhaseBtn');
        const prevBtn = document.getElementById('prevPhaseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');

        function updateUI() {
            phaseDisplay.innerText = PHASES[currentPhaseIdx].name;
            phaseCounter.innerText = `Phase ${currentPhaseIdx + 1}/5`;
            infoPanel.innerText = PHASES[currentPhaseIdx].desc;
            
            nextBtn.disabled = currentPhaseIdx === 4;
            prevBtn.disabled = currentPhaseIdx === 0;
            nextBtn.style.opacity = currentPhaseIdx === 4 ? 0.5 : 1;
            prevBtn.style.opacity = currentPhaseIdx === 0 ? 0.5 : 1;
        }
        updateUI();

        nextBtn.addEventListener('click', () => setPhase(currentPhaseIdx + 1));
        prevBtn.addEventListener('click', () => setPhase(currentPhaseIdx - 1));
        resetBtn.addEventListener('click', () => setPhase(0));
        
        toggleLabelsBtn.addEventListener('click', () => {
            labelsVisible = !labelsVisible;
            document.querySelectorAll('.label').forEach(el => el.style.display = labelsVisible ? 'block' : 'none');
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') isPaused = !isPaused;
            if (e.code === 'KeyR' && robot) robot.visible = !robot.visible;
        });

        // Raycaster for highlighting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if(event.target.tagName === 'BUTTON') return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects([parentCellMesh, daughter1.cell, daughter2.cell]);
            if (intersects.length > 0) {
                cellHighlighted = !cellHighlighted;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- LABELS UPDATE ---
        const lblNucleus = document.getElementById('label-nucleus');
        const lblMembrane = document.getElementById('label-membrane');
        const lblChromosomes = document.getElementById('label-chromosomes');
        const tempV = new THREE.Vector3();

        function updateLabels() {
            if (!labelsVisible) return;

            // Nucleus
            if (currentPhaseIdx < 4) {
                tempV.setFromMatrixPosition(nucleusMesh.matrixWorld);
            } else {
                tempV.setFromMatrixPosition(daughter1.nuc.matrixWorld);
            }
            tempV.project(camera);
            lblNucleus.style.left = `${(tempV.x * .5 + .5) * window.innerWidth}px`;
            lblNucleus.style.top = `${(tempV.y * -.5 + .5) * window.innerHeight - 30}px`;
            lblNucleus.style.opacity = (currentPhaseIdx >= 1 && currentPhaseIdx <= 3) ? 0.2 : 1;

            // Membrane
            if (currentPhaseIdx < 4) {
                tempV.set(2.05, 0, 0).applyMatrix4(mainCellGroup.matrixWorld);
            } else {
                tempV.set(1.55, 0, 0).applyMatrix4(daughter1.group.matrixWorld);
            }
            tempV.project(camera);
            lblMembrane.style.left = `${(tempV.x * .5 + .5) * window.innerWidth}px`;
            lblMembrane.style.top = `${(tempV.y * -.5 + .5) * window.innerHeight}px`;

            // Chromosomes
            tempV.setFromMatrixPosition(chromosomes[0].matrixWorld);
            tempV.project(camera);
            lblChromosomes.style.left = `${(tempV.x * .5 + .5) * window.innerWidth}px`;
            lblChromosomes.style.top = `${(tempV.y * -.5 + .5) * window.innerHeight + 30}px`;
        }

        // --- STATE EXPORT ---
        window.__3D_STATE__ = {
            currentPhase: 0, phaseName: "", chromosomeCount: 4, nucleusOpacity: 0.8,
            cellScaleY: 1, cellScaleX: 1, robotVisible: false, robotAngle: 0,
            animationPaused: false, labelsVisible: false, daughterCellsVisible: false,
            cellHighlighted: false, robotLoaded: false, phaseAnimating: false
        };

        // --- RENDER LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // Handle Transitions
            if (transitionProgress < 1 && !isPaused) {
                transitionProgress += delta / TRANSITION_TIME;
                if (transitionProgress > 1) transitionProgress = 1;

                const t = easeInOutCubic(transitionProgress);

                nucleusMat.opacity = THREE.MathUtils.lerp(startNucOp, targetNucOp, t);
                mainCellGroup.scale.lerpVectors(startCellScale, targetCellScale, t);
                
                cellMat.opacity = THREE.MathUtils.lerp(startMainOp, targetMainOp, t);
                membraneMat.opacity = THREE.MathUtils.lerp(startMemOp, targetMemOp, t);
                
                dCellMat.opacity = THREE.MathUtils.lerp(startDOp, targetDOp, t);
                dMembraneMat.opacity = THREE.MathUtils.lerp(startDOp, targetDOp, t); // use same target
                dNucleusMat.opacity = THREE.MathUtils.lerp(startDNucOp, targetDNucOp, t);

                for(let i=0; i<8; i++) {
                    chromosomes[i].position.lerpVectors(startChromo[i].pos, targetChromo[i].pos, t);
                    chromosomes[i].quaternion.slerpQuaternions(startChromo[i].quat, targetChromo[i].quat, t);

                    // Scale animation for chromosomes 4-7
                    if (currentPhaseIdx === 0 && i >= 4) {
                        chromosomes[i].scale.setScalar(THREE.MathUtils.lerp(1, 0, t));
                    } else if (startPhaseIdx === 0 && currentPhaseIdx > 0 && i >= 4) {
                        chromosomes[i].scale.setScalar(THREE.MathUtils.lerp(0, 1, t));
                    } else {
                        chromosomes[i].scale.setScalar(1);
                    }
                }

                if (transitionProgress === 1) {
                    if (currentPhaseIdx === 0) {
                        for(let i=4; i<8; i++) chromosomes[i].visible = false;
                    }
                    if (currentPhaseIdx !== 4) {
                        daughterCellsGroup.visible = false;
                    }
                }
            }

            // Robot Animation
            if (robot && robot.visible && !isPaused) {
                robotAngle += (Math.PI * 2 / 20) * delta;
                robot.position.x = Math.cos(robotAngle) * 6;
                robot.position.z = Math.sin(robotAngle) * 6;
                robot.lookAt(0, 0, 0);
                // Slight bobbing
                robot.position.y = 2 + Math.sin(time * 2) * 0.2;
            }

            // Highlight Pulse
            if (cellHighlighted) {
                const pulse = (Math.sin(time * 5) + 1) / 2;
                cellMat.emissive.setHex(0x226644);
                cellMat.emissiveIntensity = pulse;
                dCellMat.emissive.setHex(0x226644);
                dCellMat.emissiveIntensity = pulse;
            } else {
                cellMat.emissive.setHex(0x000000);
                dCellMat.emissive.setHex(0x000000);
            }

            updateLabels();

            // Update Global State
            window.__3D_STATE__.currentPhase = currentPhaseIdx || 0;
            window.__3D_STATE__.phaseName = PHASES[currentPhaseIdx].name || "";
            window.__3D_STATE__.chromosomeCount = currentPhaseIdx === 0 ? 4 : 8;
            window.__3D_STATE__.nucleusOpacity = nucleusMat.opacity || 0;
            window.__3D_STATE__.cellScaleY = mainCellGroup.scale.y || 1;
            window.__3D_STATE__.cellScaleX = mainCellGroup.scale.x || 1;
            window.__3D_STATE__.robotVisible = robot ? robot.visible : false;
            window.__3D_STATE__.robotAngle = robotAngle || 0;
            window.__3D_STATE__.animationPaused = isPaused || false;
            window.__3D_STATE__.labelsVisible = labelsVisible || false;
            window.__3D_STATE__.daughterCellsVisible = daughterCellsGroup.visible || false;
            window.__3D_STATE__.cellHighlighted = cellHighlighted || false;
            window.__3D_STATE__.robotLoaded = robotLoaded || false;
            window.__3D_STATE__.phaseAnimating = transitionProgress < 1;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
