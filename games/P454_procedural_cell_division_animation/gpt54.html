<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mitosis Educational Scene</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }

    #phaseDisplay {
      top: 16px;
      left: 16px;
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 10px rgba(255,255,255,0.35);
    }

    #phaseCounter {
      top: 20px;
      right: 16px;
      font-size: 20px;
      color: white;
      text-shadow: 0 0 10px rgba(255,255,255,0.35);
    }

    #infoPanel {
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: min(760px, calc(100vw - 32px));
      padding: 14px 16px;
      background: rgba(8, 12, 28, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 15px;
      line-height: 1.45;
      color: #eef6ff;
      text-align: center;
      pointer-events: none;
      box-shadow: 0 0 18px rgba(0,0,0,0.35);
    }

    #controls {
      position: absolute;
      z-index: 11;
      left: 16px;
      top: 70px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: rgba(20, 26, 48, 0.7);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(4px);
      transition: background 0.2s ease, transform 0.15s ease;
    }

    button:hover {
      background: rgba(35, 42, 72, 0.85);
      transform: translateY(-1px);
    }

    .label {
      position: absolute;
      z-index: 9;
      color: #ffffff;
      font-size: 13px;
      background: rgba(10, 15, 35, 0.65);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 4px 8px;
      border-radius: 6px;
      pointer-events: none;
      white-space: nowrap;
      transform: translate(-50%, -50%);
      text-shadow: 0 0 8px rgba(255,255,255,0.25);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="phaseDisplay" class="hud">INTERPHASE</div>
    <div id="phaseCounter" class="hud">Phase 1/5</div>

    <div id="controls">
      <button id="nextPhaseBtn">Next Phase</button>
      <button id="resetBtn">Reset</button>
      <button id="toggleLabelsBtn">Toggle Labels</button>
    </div>

    <div id="infoPanel" class="hud"></div>

    <div id="labelCell" class="label">Parent Cell</div>
    <div id="labelNucleus" class="label">Nucleus</div>
    <div id="labelChromosomes" class="label">Chromosomes</div>
    <div id="labelRobot" class="label">Nano-Robot Observer</div>
    <div id="labelDaughterA" class="label">Daughter Cell A</div>
    <div id="labelDaughterB" class="label">Daughter Cell B</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const PHASES = ['INTERPHASE', 'PROPHASE', 'METAPHASE', 'ANAPHASE', 'TELOPHASE'];
    const PHASE_INFO = {
      INTERPHASE: 'During interphase, the cell is not yet dividing. The nucleus remains intact, and the genetic material is contained within it while the cell carries out normal functions and prepares for mitosis.',
      PROPHASE: 'In prophase, the nucleus begins to dissolve and chromosomes condense, becoming more visible. The duplicated chromosomes spread outward as the cell prepares to organize them for separation.',
      METAPHASE: 'During metaphase, chromosomes align along the cell’s equatorial plane. This arrangement helps ensure that each future daughter cell receives an equal set of genetic material.',
      ANAPHASE: 'In anaphase, chromosome groups move toward opposite poles of the cell. The cell also elongates, helping separate the duplicated genetic material into two distinct regions.',
      TELOPHASE: 'In telophase, two new nuclei form and the parent cell completes its division into two daughter cells. Each daughter cell receives its own nucleus and a full set of chromosomes.'
    };

    const app = document.getElementById('app');
    const phaseDisplay = document.getElementById('phaseDisplay');
    const phaseCounter = document.getElementById('phaseCounter');
    const infoPanel = document.getElementById('infoPanel');

    const nextPhaseBtn = document.getElementById('nextPhaseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const toggleLabelsBtn = document.getElementById('toggleLabelsBtn');

    const labelCell = document.getElementById('labelCell');
    const labelNucleus = document.getElementById('labelNucleus');
    const labelChromosomes = document.getElementById('labelChromosomes');
    const labelRobot = document.getElementById('labelRobot');
    const labelDaughterA = document.getElementById('labelDaughterA');
    const labelDaughterB = document.getElementById('labelDaughterB');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xaaccff, 1.5, 100);
    pointLight.position.set(5, 10, 5);
    scene.add(pointLight);

    const root = new THREE.Group();
    scene.add(root);

    const parentCellGroup = new THREE.Group();
    root.add(parentCellGroup);

    const cellMaterial = new THREE.MeshPhongMaterial({
      color: 0x44cc88,
      transparent: true,
      opacity: 0.6,
      shininess: 80,
      emissive: 0x000000
    });
    const cellGeometry = new THREE.SphereGeometry(2, 48, 48);
    const parentCell = new THREE.Mesh(cellGeometry, cellMaterial);
    parentCellGroup.add(parentCell);

    const membrane = new THREE.Mesh(
      new THREE.SphereGeometry(2.05, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0x66ffaa,
        wireframe: true,
        transparent: true,
        opacity: 0.65
      })
    );
    parentCellGroup.add(membrane);

    const nucleusMaterial = new THREE.MeshPhongMaterial({
      color: 0x8844cc,
      transparent: true,
      opacity: 0.8,
      emissive: 0x120018
    });
    const nucleus = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 32, 32),
      nucleusMaterial
    );
    parentCellGroup.add(nucleus);

    const chromosomesGroup = new THREE.Group();
    parentCellGroup.add(chromosomesGroup);

    const chromosomeGeometry = new THREE.BoxGeometry(0.05, 0.3, 0.05);

    const daughterGroup = new THREE.Group();
    scene.add(daughterGroup);
    daughterGroup.visible = false;

    const daughterCellMatA = new THREE.MeshPhongMaterial({
      color: 0x44cc88,
      transparent: true,
      opacity: 0.6
    });
    const daughterCellMatB = daughterCellMatA.clone();

    const daughterNucleusMatA = new THREE.MeshPhongMaterial({
      color: 0x8844cc,
      transparent: true,
      opacity: 0.8
    });
    const daughterNucleusMatB = daughterNucleusMatA.clone();

    const daughterA = new THREE.Group();
    const daughterB = new THREE.Group();
    daughterGroup.add(daughterA, daughterB);

    const daughterCellA = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), daughterCellMatA);
    const daughterCellB = new THREE.Mesh(new THREE.SphereGeometry(1.5, 32, 32), daughterCellMatB);
    daughterA.add(daughterCellA);
    daughterB.add(daughterCellB);

    const daughterMemA = new THREE.Mesh(
      new THREE.SphereGeometry(1.55, 24, 24),
      new THREE.MeshBasicMaterial({ color: 0x66ffaa, wireframe: true, transparent: true, opacity: 0.65 })
    );
    const daughterMemB = daughterMemA.clone();
    daughterA.add(daughterMemA);
    daughterB.add(daughterMemB);

    const daughterNucleusA = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), daughterNucleusMatA);
    const daughterNucleusB = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), daughterNucleusMatB);
    daughterA.add(daughterNucleusA);
    daughterB.add(daughterNucleusB);

    const daughterChromosomesA = new THREE.Group();
    const daughterChromosomesB = new THREE.Group();
    daughterA.add(daughterChromosomesA);
    daughterB.add(daughterChromosomesB);

    function createChromosome(color = 0xff4444) {
      const mat = new THREE.MeshPhongMaterial({ color });
      const mesh = new THREE.Mesh(chromosomeGeometry, mat);
      return mesh;
    }

    let chromosomes = [];
    function rebuildChromosomes(count) {
      chromosomes.forEach(c => chromosomesGroup.remove(c));
      chromosomes = [];
      for (let i = 0; i < count; i++) {
        const c = createChromosome();
        chromosomesGroup.add(c);
        chromosomes.push(c);
      }
    }

    function populateDaughterChromosomes(group) {
      while (group.children.length) group.remove(group.children[0]);
      for (let i = 0; i < 4; i++) {
        const c = createChromosome(0xff6666);
        const angle = (i / 4) * Math.PI * 2;
        c.position.set(Math.cos(angle) * 0.25, (i % 2 === 0 ? 0.12 : -0.12), Math.sin(angle) * 0.25);
        c.rotation.z = angle * 0.7;
        group.add(c);
      }
    }
    populateDaughterChromosomes(daughterChromosomesA);
    populateDaughterChromosomes(daughterChromosomesB);

    daughterA.position.set(0, 2.5, 0);
    daughterB.position.set(0, -2.5, 0);

    rebuildChromosomes(4);

    const chromosomeTargets = [];
    function setChromosomeTargetsInterphase() {
      chromosomeTargets.length = 0;
      const positions = [
        new THREE.Vector3(-0.18, 0.12, 0.1),
        new THREE.Vector3(0.16, -0.08, -0.06),
        new THREE.Vector3(-0.05, -0.18, 0.12),
        new THREE.Vector3(0.12, 0.18, -0.1)
      ];
      chromosomes.forEach((c, i) => {
        chromosomeTargets.push({
          position: positions[i % positions.length].clone(),
          rotation: new THREE.Euler(0, 0, (i - 1.5) * 0.5)
        });
      });
    }

    function setChromosomeTargetsProphase() {
      chromosomeTargets.length = 0;
      const spread = [
        [-0.8,  0.5,  0.2],
        [ 0.7,  0.2, -0.3],
        [-0.5, -0.6,  0.4],
        [ 0.5, -0.3, -0.5],
        [-0.2,  0.7, -0.2],
        [ 0.2, -0.7,  0.3],
        [-0.9, -0.1, -0.1],
        [ 0.9,  0.1,  0.1]
      ];
      chromosomes.forEach((c, i) => {
        chromosomeTargets.push({
          position: new THREE.Vector3(...spread[i % spread.length]),
          rotation: new THREE.Euler(0, 0, (i * 0.8) % Math.PI)
        });
      });
    }

    function setChromosomeTargetsMetaphase() {
      chromosomeTargets.length = 0;
      const startX = -1.05;
      const step = 0.3;
      chromosomes.forEach((c, i) => {
        chromosomeTargets.push({
          position: new THREE.Vector3(startX + i * step, 0, 0),
          rotation: new THREE.Euler(0, 0, Math.PI / 2)
        });
      });
    }

    function setChromosomeTargetsAnaphase() {
      chromosomeTargets.length = 0;
      chromosomes.forEach((c, i) => {
        const sideIndex = i % 4;
        const x = -0.6 + sideIndex * 0.4;
        const y = i < 4 ? 1.2 : -1.2;
        const z = (i % 2 === 0 ? 0.15 : -0.15);
        chromosomeTargets.push({
          position: new THREE.Vector3(x, y, z),
          rotation: new THREE.Euler(0, 0, Math.PI / 2 + (i < 4 ? 0.2 : -0.2))
        });
      });
    }

    function applyChromosomeTargets(alpha = 1) {
      chromosomes.forEach((c, i) => {
        const t = chromosomeTargets[i];
        if (!t) return;
        c.position.lerp(t.position, alpha);
        c.rotation.x += (t.rotation.x - c.rotation.x) * alpha;
        c.rotation.y += (t.rotation.y - c.rotation.y) * alpha;
        c.rotation.z += (t.rotation.z - c.rotation.z) * alpha;
      });
    }

    setChromosomeTargetsInterphase();
    applyChromosomeTargets(1);

    const robotGroup = new THREE.Group();
    scene.add(robotGroup);
    let robotModel = null;

    const loader = new GLTFLoader();
    loader.load(
      'robot.glb',
      (gltf) => {
        robotModel = gltf.scene;
        robotModel.scale.setScalar(0.5);
        robotGroup.add(robotModel);
        state.robotLoaded = true;
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.6, 0.8, 0.4),
          new THREE.MeshStandardMaterial({ color: 0xaadfff, metalness: 0.4, roughness: 0.4 })
        );
        const eye = new THREE.Mesh(
          new THREE.SphereGeometry(0.08, 16, 16),
          new THREE.MeshBasicMaterial({ color: 0x66ccff })
        );
        eye.position.set(0, 0.12, 0.22);
        fallback.add(eye);
        robotModel = fallback;
        robotGroup.add(robotModel);
        state.robotLoaded = false;
      }
    );

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const state = {
      currentPhase: 0,
      phaseName: 'INTERPHASE',
      chromosomeCount: 4,
      nucleusOpacity: 0.8,
      cellScaleY: 1,
      cellScaleX: 1,
      robotVisible: true,
      robotAngle: 0,
      animationPaused: false,
      labelsVisible: true,
      daughterCellsVisible: false,
      cellHighlighted: false,
      robotLoaded: false,
      phaseAnimating: false
    };

    window.__3D_STATE__ = state;

    let currentTransition = null;
    let highlightPulse = 0;

    function clamp01(v) {
      return Math.max(0, Math.min(1, Number.isFinite(v) ? v : 0));
    }

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function easeInOut(t) {
      t = clamp01(t);
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function updateHUD() {
      phaseDisplay.textContent = PHASES[state.currentPhase];
      phaseCounter.textContent = `Phase ${state.currentPhase + 1}/5`;
      infoPanel.textContent = PHASE_INFO[PHASES[state.currentPhase]];
    }

    function setLabelsVisible(visible) {
      const display = visible ? 'block' : 'none';
      [labelCell, labelNucleus, labelChromosomes, labelRobot, labelDaughterA, labelDaughterB].forEach(el => {
        el.style.display = display;
      });
      state.labelsVisible = visible;
    }

    function projectLabel(el, object3D, offsetY = 0) {
      if (!state.labelsVisible || !object3D || !object3D.visible) {
        el.style.display = 'none';
        return;
      }
      const pos = new THREE.Vector3();
      object3D.getWorldPosition(pos);
      pos.y += offsetY;
      pos.project(camera);

      if (pos.z > 1) {
        el.style.display = 'none';
        return;
      }

      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
      el.style.display = 'block';
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
    }

    function resetSceneState() {
      parentCellGroup.visible = true;
      parentCell.visible = true;
      membrane.visible = true;
      nucleus.visible = true;
      daughterGroup.visible = false;

      parentCell.scale.set(1, 1, 1);
      membrane.scale.set(1, 1, 1);
      nucleus.scale.set(1, 1, 1);

      parentCell.position.set(0, 0, 0);
      membrane.position.set(0, 0, 0);
      nucleus.position.set(0, 0, 0);

      cellMaterial.opacity = 0.6;
      nucleusMaterial.opacity = 0.8;
      membrane.material.opacity = 0.65;

      daughterA.position.set(0, 2.5, 0);
      daughterB.position.set(0, -2.5, 0);

      rebuildChromosomes(4);
      setChromosomeTargetsInterphase();
      applyChromosomeTargets(1);

      chromosomes.forEach(c => c.visible = true);
      state.chromosomeCount = 4;
      state.currentPhase = 0;
      state.phaseName = 'INTERPHASE';
      state.phaseAnimating = false;
      currentTransition = null;
      highlightPulse = 0;
      state.cellHighlighted = false;
      cellMaterial.emissive.setHex(0x000000);

      updateHUD();
    }

    function startTransition(targetPhase) {
      if (state.phaseAnimating) return;
      if (targetPhase < 0 || targetPhase > 4) return;

      const fromPhase = state.currentPhase;
      const duration = 1.5;

      if (targetPhase === fromPhase) return;

      if (targetPhase === 1 && chromosomes.length < 8) {
        rebuildChromosomes(8);
        setChromosomeTargetsInterphase();
        applyChromosomeTargets(1);
      }

      const snapshot = {
        nucleusOpacity: safeNum(nucleusMaterial.opacity, 0.8),
        cellScaleX: safeNum(parentCellGroup.scale.x, 1),
        cellScaleY: safeNum(parentCellGroup.scale.y, 1),
        cellScaleZ: safeNum(parentCellGroup.scale.z, 1),
        chromosomePositions: chromosomes.map(c => c.position.clone()),
        chromosomeRotations: chromosomes.map(c => new THREE.Euler(c.rotation.x, c.rotation.y, c.rotation.z)),
        cellVisible: parentCellGroup.visible,
        daughterVisible: daughterGroup.visible,
        daughterAY: daughterA.position.y,
        daughterBY: daughterB.position.y,
        cellOpacity: cellMaterial.opacity
      };

      if (targetPhase === 1) {
        setChromosomeTargetsProphase();
      } else if (targetPhase === 2) {
        if (chromosomes.length < 8) rebuildChromosomes(8);
        setChromosomeTargetsMetaphase();
      } else if (targetPhase === 3) {
        if (chromosomes.length < 8) rebuildChromosomes(8);
        setChromosomeTargetsAnaphase();
      }

      const target = {
        nucleusOpacity: targetPhase === 0 ? 0.8 : (targetPhase === 1 ? 0.1 : (targetPhase >= 2 ? 0.0 : 0.8)),
        cellScaleX: targetPhase === 3 ? 0.8 : 1,
        cellScaleY: targetPhase === 3 ? 1.4 : 1,
        cellScaleZ: 1,
        daughterVisible: targetPhase === 4,
        cellVisible: targetPhase !== 4,
        daughterAY: targetPhase === 4 ? 2.5 : 2.5,
        daughterBY: targetPhase === 4 ? -2.5 : -2.5,
        cellOpacity: targetPhase === 4 ? 0.0 : 0.6
      };

      currentTransition = {
        fromPhase,
        toPhase: targetPhase,
        elapsed: 0,
        duration,
        snapshot,
        target
      };
      state.phaseAnimating = true;
    }

    function finishPhase(phase) {
      state.currentPhase = phase;
      state.phaseName = PHASES[phase];

      if (phase === 0) {
        resetSceneState();
        return;
      }

      if (phase === 1) {
        nucleusMaterial.opacity = 0.1;
        if (chromosomes.length !== 8) rebuildChromosomes(8);
        setChromosomeTargetsProphase();
        applyChromosomeTargets(1);
        parentCellGroup.scale.set(1, 1, 1);
        daughterGroup.visible = false;
      }

      if (phase === 2) {
        nucleusMaterial.opacity = 0.0;
        if (chromosomes.length !== 8) rebuildChromosomes(8);
        setChromosomeTargetsMetaphase();
        applyChromosomeTargets(1);
        parentCellGroup.scale.set(1, 1, 1);
        daughterGroup.visible = false;
      }

      if (phase === 3) {
        nucleusMaterial.opacity = 0.0;
        if (chromosomes.length !== 8) rebuildChromosomes(8);
        setChromosomeTargetsAnaphase();
        applyChromosomeTargets(1);
        parentCellGroup.scale.set(0.8, 1.4, 1);
        daughterGroup.visible = false;
      }

      if (phase === 4) {
        parentCellGroup.visible = false;
        daughterGroup.visible = true;
        daughterA.position.y = 2.5;
        daughterB.position.y = -2.5;
      }

      state.chromosomeCount = phase === 0 ? 4 : (phase === 4 ? 8 : 8);
      state.phaseAnimating = false;
      currentTransition = null;
      updateHUD();
    }

    function advancePhase() {
      if (state.currentPhase >= 4 || state.phaseAnimating) return;
      startTransition(state.currentPhase + 1);
    }

    nextPhaseBtn.addEventListener('click', advancePhase);
    resetBtn.addEventListener('click', () => {
      resetSceneState();
    });
    toggleLabelsBtn.addEventListener('click', () => {
      setLabelsVisible(!state.labelsVisible);
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.animationPaused = !state.animationPaused;
      }
      if (e.key.toLowerCase() === 'r') {
        state.robotVisible = !state.robotVisible;
        robotGroup.visible = state.robotVisible;
      }
    });

    renderer.domElement.addEventListener('click', (e) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObjects([parentCell, membrane, daughterCellA, daughterCellB], true);
      if (intersects.length > 0) {
        state.cellHighlighted = true;
        highlightPulse = 1.0;
      }
    });

    const clock = new THREE.Clock();

    function animateTransition(dt) {
      if (!currentTransition || state.animationPaused) return;

      currentTransition.elapsed += dt;
      const t = clamp01(currentTransition.elapsed / currentTransition.duration);
      const k = easeInOut(t);

      const s = currentTransition.snapshot;
      const trg = currentTransition.target;

      nucleusMaterial.opacity = THREE.MathUtils.lerp(s.nucleusOpacity, trg.nucleusOpacity, k);
      cellMaterial.opacity = THREE.MathUtils.lerp(s.cellOpacity, trg.cellOpacity, k);

      parentCellGroup.scale.x = THREE.MathUtils.lerp(s.cellScaleX, trg.cellScaleX, k);
      parentCellGroup.scale.y = THREE.MathUtils.lerp(s.cellScaleY, trg.cellScaleY, k);
      parentCellGroup.scale.z = THREE.MathUtils.lerp(s.cellScaleZ, trg.cellScaleZ, k);

      membrane.scale.copy(parentCellGroup.scale);
      parentCell.scale.copy(parentCellGroup.scale);
      nucleus.scale.copy(parentCellGroup.scale);

      if (currentTransition.toPhase >= 1 && currentTransition.toPhase <= 3) {
        chromosomes.forEach((c, i) => {
          const startPos = s.chromosomePositions[i] || new THREE.Vector3();
          const startRot = s.chromosomeRotations[i] || new THREE.Euler();
          const targetDef = chromosomeTargets[i] || { position: new THREE.Vector3(), rotation: new THREE.Euler() };
          c.position.lerpVectors(startPos, targetDef.position, k);
          c.rotation.x = THREE.MathUtils.lerp(startRot.x, targetDef.rotation.x, k);
          c.rotation.y = THREE.MathUtils.lerp(startRot.y, targetDef.rotation.y, k);
          c.rotation.z = THREE.MathUtils.lerp(startRot.z, targetDef.rotation.z, k);
        });
      }

      if (currentTransition.toPhase === 4) {
        parentCellGroup.visible = true;
        daughterGroup.visible = true;
        parentCell.visible = true;
        membrane.visible = true;
        nucleus.visible = false;

        const pinch = 1 - 0.35 * Math.sin(Math.PI * k);
        parentCell.scale.set(1.0 * pinch, 1.0, 1.0 * pinch);
        membrane.scale.set(1.02 * pinch, 1.0, 1.02 * pinch);

        daughterCellA.scale.setScalar(0.7 + 0.3 * k);
        daughterCellB.scale.setScalar(0.7 + 0.3 * k);
        daughterMemA.scale.setScalar(0.7 + 0.3 * k);
        daughterMemB.scale.setScalar(0.7 + 0.3 * k);

        daughterA.position.y = THREE.MathUtils.lerp(1.2, 2.5, k);
        daughterB.position.y = THREE.MathUtils.lerp(-1.2, -2.5, k);
      }

      if (t >= 1) {
        finishPhase(currentTransition.toPhase);
      }
    }

    function updateRobot(elapsedTime) {
      if (!state.animationPaused) {
        state.robotAngle = safeNum((elapsedTime / 20) * Math.PI * 2, 0);
      }
      const angle = safeNum(state.robotAngle, 0);
      const radius = 6;
      robotGroup.position.set(Math.cos(angle) * radius, 2, Math.sin(angle) * radius);
      robotGroup.lookAt(0, 0, 0);
      robotGroup.visible = state.robotVisible;
    }

    function updateHighlight(dt) {
      if (!state.cellHighlighted) {
        cellMaterial.emissive.setHex(0x000000);
        return;
      }

      highlightPulse -= dt * 0.45;
      const pulse = Math.max(0, highlightPulse);
      const glow = 0.15 + 0.25 * Math.sin((1 - pulse) * 22) * pulse + 0.18 * pulse;
      const value = Math.max(0, glow);
      cellMaterial.emissive = new THREE.Color(value * 0.2, value * 0.8, value * 0.5);

      if (highlightPulse <= 0) {
        state.cellHighlighted = false;
        cellMaterial.emissive.setHex(0x000000);
      }
    }

    function updateLabels() {
      projectLabel(labelCell, parentCellGroup, 2.5);
      projectLabel(labelNucleus, nucleus, 1.0);

      if (chromosomes.length > 0) {
        const centroid = new THREE.Vector3();
        let count = 0;
        chromosomes.forEach(c => {
          if (c.visible) {
            const wp = new THREE.Vector3();
            c.getWorldPosition(wp);
            centroid.add(wp);
            count++;
          }
        });
        if (count > 0) {
          centroid.divideScalar(count);
          const dummy = new THREE.Object3D();
          dummy.position.copy(centroid);
          scene.add(dummy);
          projectLabel(labelChromosomes, dummy, 0.6);
          scene.remove(dummy);
        } else {
          labelChromosomes.style.display = 'none';
        }
      }

      projectLabel(labelRobot, robotGroup, 1.2);

      if (daughterGroup.visible) {
        projectLabel(labelDaughterA, daughterA, 1.8);
        projectLabel(labelDaughterB, daughterB, 1.8);
      } else {
        labelDaughterA.style.display = 'none';
        labelDaughterB.style.display = 'none';
      }

      if (!state.labelsVisible) {
        [labelCell, labelNucleus, labelChromosomes, labelRobot, labelDaughterA, labelDaughterB].forEach(l => l.style.display = 'none');
      }
    }

    function syncState() {
      state.phaseName = PHASES[Math.max(0, Math.min(4, state.currentPhase))];
      state.chromosomeCount = safeNum(
        state.currentPhase === 0 ? 4 : (state.currentPhase === 4 ? 8 : chromosomes.length),
        0
      );
      state.nucleusOpacity = safeNum(nucleusMaterial.opacity, 0);
      state.cellScaleY = safeNum(parentCellGroup.scale.y, 1);
      state.cellScaleX = safeNum(parentCellGroup.scale.x, 1);
      state.robotVisible = !!robotGroup.visible;
      state.robotAngle = safeNum(state.robotAngle, 0);
      state.animationPaused = !!state.animationPaused;
      state.labelsVisible = !!state.labelsVisible;
      state.daughterCellsVisible = !!daughterGroup.visible;
      state.cellHighlighted = !!state.cellHighlighted;
      state.robotLoaded = !!state.robotLoaded;
      state.phaseAnimating = !!state.phaseAnimating;

      window.__3D_STATE__ = {
        currentPhase: safeNum(state.currentPhase, 0),
        phaseName: String(state.phaseName || 'INTERPHASE'),
        chromosomeCount: safeNum(state.chromosomeCount, 0),
        nucleusOpacity: safeNum(state.nucleusOpacity, 0),
        cellScaleY: safeNum(state.cellScaleY, 1),
        cellScaleX: safeNum(state.cellScaleX, 1),
        robotVisible: !!state.robotVisible,
        robotAngle: safeNum(state.robotAngle, 0),
        animationPaused: !!state.animationPaused,
        labelsVisible: !!state.labelsVisible,
        daughterCellsVisible: !!state.daughterCellsVisible,
        cellHighlighted: !!state.cellHighlighted,
        robotLoaded: !!state.robotLoaded,
        phaseAnimating: !!state.phaseAnimating
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = safeNum(clock.getDelta(), 0.016);
      const elapsedTime = safeNum(clock.elapsedTime, 0);

      controls.update();

      updateRobot(elapsedTime);
      animateTransition(dt);
      updateHighlight(dt);
      updateLabels();
      syncState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    setLabelsVisible(true);
    resetSceneState();
    robotGroup.position.set(5, 2, 3);
    robotGroup.lookAt(0, 0, 0);
    animate();
  </script>
</body>
</html>
