<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cell Division (Mitosis) - Educational Scene</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#phaseDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ffffff;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
    z-index: 10;
}

#phaseCounter {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #aaccff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(100, 200, 255, 0.5);
    z-index: 10;
}

#infoPanel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 200, 255, 0.3);
    border-radius: 12px;
    padding: 15px 25px;
    color: #ccddff;
    font-size: 14px;
    max-width: 600px;
    text-align: center;
    line-height: 1.5;
    z-index: 10;
    backdrop-filter: blur(5px);
}

#controls {
    position: absolute;
    top: 70px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
}

#controls button {
    background: rgba(10, 10, 46, 0.8);
    border: 1px solid rgba(100, 200, 255, 0.4);
    border-radius: 8px;
    color: #ffffff;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
}

#controls button:hover {
    background: rgba(50, 80, 150, 0.8);
    border-color: rgba(100, 200, 255, 0.8);
    box-shadow: 0 0 15px rgba(100, 200, 255, 0.3);
}

#controls button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
}

.label-3d {
    position: absolute;
    color: #ffffff;
    font-size: 11px;
    background: rgba(10, 10, 46, 0.7);
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid rgba(100, 255, 170, 0.4);
    pointer-events: none;
    white-space: nowrap;
    z-index: 5;
    transition: opacity 0.3s;
}

#pauseIndicator {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255, 255, 255, 0.7);
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
    z-index: 20;
    display: none;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="phaseDisplay">INTERPHASE</div>
<div id="phaseCounter">Phase 1/5</div>

<div id="controls">
    <button id="nextPhaseBtn">Next Phase ▶</button>
    <button id="resetBtn">Reset ↺</button>
    <button id="toggleLabelsBtn">Toggle Labels</button>
</div>

<div id="infoPanel">
    <strong>Interphase:</strong> The cell is in its normal state, carrying out regular functions. The nucleus is intact and chromosomes are loosely organized as chromatin within the nuclear envelope. The cell prepares for division by replicating its DNA.
</div>

<div id="pauseIndicator">⏸ PAUSED</div>

<div id="labelContainer"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Phase info
const PHASE_NAMES = ['INTERPHASE', 'PROPHASE', 'METAPHASE', 'ANAPHASE', 'TELOPHASE'];
const PHASE_INFO = [
    '<strong>Interphase:</strong> The cell is in its normal state, carrying out regular functions. The nucleus is intact and chromosomes are loosely organized as chromatin within the nuclear envelope. The cell prepares for division by replicating its DNA.',
    '<strong>Prophase:</strong> The nuclear envelope begins to dissolve and chromosomes condense, becoming visible. Each chromosome has been duplicated, resulting in 8 chromatids. The chromosomes begin to spread within the cell.',
    '<strong>Metaphase:</strong> Chromosomes align along the cell\'s equator, forming the metaphase plate. Spindle fibers attach to the centromeres of each chromosome, preparing to pull them apart.',
    '<strong>Anaphase:</strong> Sister chromatids are pulled to opposite poles of the cell by spindle fibers. The cell begins to elongate as the two sets of chromosomes move apart. This ensures each daughter cell will receive an equal set.',
    '<strong>Telophase:</strong> The cell pinches in the middle through cytokinesis, forming two daughter cells. New nuclear envelopes form around each set of chromosomes, and the chromosomes begin to decondense.'
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xaaccff, 1.5, 50);
pointLight.position.set(5, 10, 5);
pointLight.castShadow = true;
scene.add(pointLight);

// Add subtle environment particles
const particleGeometry = new THREE.BufferGeometry();
const particleCount = 500;
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount * 3; i++) {
    particlePositions[i] = (Math.random() - 0.5) * 30;
}
particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({ color: 0x4466aa, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Cell model
const cellGroup = new THREE.Group();
scene.add(cellGroup);

// Parent cell
const cellGeometry = new THREE.SphereGeometry(2, 64, 64);
const cellMaterial = new THREE.MeshPhongMaterial({
    color: 0x44cc88,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide,
    shininess: 80,
    specular: 0x226644
});
const parentCell = new THREE.Mesh(cellGeometry, cellMaterial);
cellGroup.add(parentCell);

// Cell membrane wireframe
const membraneGeometry = new THREE.SphereGeometry(2.05, 32, 32);
const membraneMaterial = new THREE.MeshBasicMaterial({
    color: 0x66ffaa,
    wireframe: true,
    transparent: true,
    opacity: 0.3
});
const cellMembrane = new THREE.Mesh(membraneGeometry, membraneMaterial);
cellGroup.add(cellMembrane);

// Nucleus
const nucleusGeometry = new THREE.SphereGeometry(0.7, 32, 32);
const nucleusMaterial = new THREE.MeshPhongMaterial({
    color: 0x8844cc,
    transparent: true,
    opacity: 0.8,
    shininess: 100,
    specular: 0x6622aa
});
const nucleus = new THREE.Mesh(nucleusGeometry, nucleusMaterial);
cellGroup.add(nucleus);

// Chromosomes
const chromosomes = [];
const chromosomeGeometry = new THREE.BoxGeometry(0.05, 0.3, 0.05);

function createChromosome(position) {
    const mat = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x441111 });
    const mesh = new THREE.Mesh(chromosomeGeometry, mat);
    mesh.position.copy(position);
    mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
    return mesh;
}

const initialChromosomePositions = [
    new THREE.Vector3(0.15, 0.1, 0.1),
    new THREE.Vector3(-0.15, -0.1, 0.1),
    new THREE.Vector3(0.1, 0.15, -0.1),
    new THREE.Vector3(-0.1, -0.15, -0.1)
];

for (let i = 0; i < 4; i++) {
    const chr = createChromosome(initialChromosomePositions[i]);
    chromosomes.push(chr);
    cellGroup.add(chr);
}

// Extra chromosomes for prophase (initially invisible)
const extraChromosomes = [];
const extraPositions = [
    new THREE.Vector3(0.2, 0.05, -0.15),
    new THREE.Vector3(-0.2, 0.05, 0.15),
    new THREE.Vector3(0.05, -0.2, 0.1),
    new THREE.Vector3(-0.05, 0.2, -0.1)
];

for (let i = 0; i < 4; i++) {
    const chr = createChromosome(extraPositions[i]);
    chr.visible = false;
    extraChromosomes.push(chr);
    cellGroup.add(chr);
}

// Daughter cells (initially invisible)
const daughterCellGroup1 = new THREE.Group();
const daughterCellGroup2 = new THREE.Group();
daughterCellGroup1.visible = false;
daughterCellGroup2.visible = false;
scene.add(daughterCellGroup1);
scene.add(daughterCellGroup2);

function createDaughterCell(group, yPos) {
    const cellGeo = new THREE.SphereGeometry(1.5, 48, 48);
    const cellMat = new THREE.MeshPhongMaterial({
        color: 0x44cc88, transparent: true, opacity: 0.6,
        side: THREE.DoubleSide, shininess: 80, specular: 0x226644
    });
    const cell = new THREE.Mesh(cellGeo, cellMat);
    group.add(cell);

    const memGeo = new THREE.SphereGeometry(1.55, 24, 24);
    const memMat = new THREE.MeshBasicMaterial({ color: 0x66ffaa, wireframe: true, transparent: true, opacity: 0.3 });
    group.add(new THREE.Mesh(memGeo, memMat));

    const nucGeo = new THREE.SphereGeometry(0.5, 24, 24);
    const nucMat = new THREE.MeshPhongMaterial({ color: 0x8844cc, transparent: true, opacity: 0.8, shininess: 100 });
    group.add(new THREE.Mesh(nucGeo, nucMat));

    for (let i = 0; i < 4; i++) {
        const chrMat = new THREE.MeshPhongMaterial({ color: 0xff4444, emissive: 0x441111 });
        const chr = new THREE.Mesh(chromosomeGeometry, chrMat);
        chr.position.set((Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3, (Math.random() - 0.5) * 0.3);
        chr.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
        group.add(chr);
    }

    group.position.y = yPos;
}

createDaughterCell(daughterCellGroup1, 2.5);
createDaughterCell(daughterCellGroup2, -2.5);

// Robot observer
let robotModel = null;
let robotLoaded = false;
let robotAngle = 0;

const loader = new GLTFLoader();
loader.load('robot.glb',
    (gltf) => {
        robotModel = gltf.scene;
        robotModel.scale.set(0.5, 0.5, 0.5);
        robotModel.position.set(5, 2, 3);
        scene.add(robotModel);
        robotLoaded = true;
        console.log('Robot model loaded successfully');
    },
    (progress) => {
        console.log('Loading robot:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load robot.glb, creating placeholder:', error);
        // Create a placeholder robot
        const robotGroup = new THREE.Group();

        // Body
        const bodyGeo = new THREE.BoxGeometry(0.6, 0.8, 0.4);
        const bodyMat = new THREE.MeshPhongMaterial({ color: 0x8899aa, metalness: 0.8 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        robotGroup.add(body);

        // Head
        const headGeo = new THREE.BoxGeometry(0.5, 0.4, 0.35);
        const headMat = new THREE.MeshPhongMaterial({ color: 0xaabbcc });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 0.6;
        robotGroup.add(head);

        // Eyes
        const eyeGeo = new THREE.SphereGeometry(0.06, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
        eye1.position.set(-0.12, 0.65, 0.18);
        robotGroup.add(eye1);
        const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
        eye2.position.set(0.12, 0.65, 0.18);
        robotGroup.add(eye2);

        // Antenna
        const antGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.3);
        const antMat = new THREE.MeshPhongMaterial({ color: 0xccddee });
        const antenna = new THREE.Mesh(antGeo, antMat);
        antenna.position.y = 0.95;
        robotGroup.add(antenna);

        const tipGeo = new THREE.SphereGeometry(0.05, 16, 16);
        const tipMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
        const tip = new THREE.Mesh(tipGeo, tipMat);
        tip.position.y = 1.1;
        robotGroup.add(tip);

        // Arms
        const armGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
        const armMat = new THREE.MeshPhongMaterial({ color: 0x778899 });
        const arm1 = new THREE.Mesh(armGeo, armMat);
        arm1.position.set(-0.45, -0.05, 0);
        robotGroup.add(arm1);
        const arm2 = new THREE.Mesh(armGeo, armMat);
        arm2.position.set(0.45, -0.05, 0);
        robotGroup.add(arm2);

        robotGroup.scale.set(0.5, 0.5, 0.5);
        robotGroup.position.set(5, 2, 3);
        scene.add(robotGroup);
        robotModel = robotGroup;
        robotLoaded = true;
    }
);

// State
let currentPhase = 0;
let animationPaused = false;
let labelsVisible = true;
let robotVisible = true;
let cellHighlighted = false;
let highlightTime = 0;
let phaseAnimating = false;
let animationProgress = 0;
let animationDuration = 1.5;
let animationStartTime = 0;
let daughterCellsVisible = false;

// Stored states for interpolation
let phaseStartState = {};
let phaseEndState = {};

// Labels
const labelContainer = document.getElementById('labelContainer');
const labels = [];

function createLabel(text, object, offset = new THREE.Vector3(0, 0, 0)) {
    const div = document.createElement('div');
    div.className = 'label-3d';
    div.textContent = text;
    labelContainer.appendChild(div);
    labels.push({ element: div, object, offset, text });
    return div;
}

const labelCell = createLabel('Parent Cell', parentCell, new THREE.Vector3(0, 2.5, 0));
const labelNucleus = createLabel('Nucleus', nucleus, new THREE.Vector3(0, 1.0, 0));
const labelMembrane = createLabel('Cell Membrane', cellMembrane, new THREE.Vector3(2.2, 0, 0));
const labelChromosome = createLabel('Chromosomes', chromosomes[0], new THREE.Vector3(0.5, 0, 0));

function updateLabels() {
    labels.forEach(label => {
        if (!labelsVisible || !label.object.visible) {
            label.element.style.display = 'none';
            return;
        }

        const worldPos = new THREE.Vector3();
        label.object.getWorldPosition(worldPos);
        worldPos.add(label.offset);

        const screenPos = worldPos.clone().project(camera);
        const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

        if (screenPos.z > 1) {
            label.element.style.display = 'none';
        } else {
            label.element.style.display = 'block';
            label.element.style.left = x + 'px';
            label.element.style.top = y + 'px';
        }
    });
}

// Phase transition functions
function getPhaseTargets(phase) {
    const targets = {
        nucleusOpacity: 0.8,
        cellScaleX: 1,
        cellScaleY: 1,
        cellScaleZ: 1,
        cellVisible: true,
        chromosomePositions: [],
        extraChromosomesVisible: false,
        extraChromosomePositions: [],
        daughterCellsVisible: false
    };

    switch (phase) {
        case 0: // INTERPHASE
            targets.nucleusOpacity = 0.8;
            targets.chromosomePositions = initialChromosomePositions.map(p => p.clone());
            break;

        case 1: // PROPHASE
            targets.nucleusOpacity = 0.1;
            targets.extraChromosomesVisible = true;
            // Spread chromosomes within cell
            targets.chromosomePositions = [
                new THREE.Vector3(0.5, 0.3, 0.3),
                new THREE.Vector3(-0.5, -0.3, 0.3),
                new THREE.Vector3(0.3, 0.5, -0.3),
                new THREE.Vector3(-0.3, -0.5, -0.3)
            ];
            targets.extraChromosomePositions = [
                new THREE.Vector3(0.6, 0.1, -0.4),
                new THREE.Vector3(-0.6, 0.1, 0.4),
                new THREE.Vector3(0.1, -0.6, 0.3),
                new THREE.Vector3(-0.1, 0.6, -0.3)
            ];
            break;

        case 2: // METAPHASE
            targets.nucleusOpacity = 0.1;
            targets.extraChromosomesVisible = true;
            // Align along equator (y=0, spread along x)
            targets.chromosomePositions = [
                new THREE.Vector3(-0.6, 0, 0),
                new THREE.Vector3(-0.2, 0, 0),
                new THREE.Vector3(0.2, 0, 0),
                new THREE.Vector3(0.6, 0, 0)
            ];
            targets.extraChromosomePositions = [
                new THREE.Vector3(-0.6, 0, 0.15),
                new THREE.Vector3(-0.2, 0, 0.15),
                new THREE.Vector3(0.2, 0, 0.15),
                new THREE.Vector3(0.6, 0, 0.15)
            ];
            break;

        case 3: // ANAPHASE
            targets.nucleusOpacity = 0.05;
            targets.extraChromosomesVisible = true;
            targets.cellScaleY = 1.4;
            targets.cellScaleX = 0.8;
            targets.cellScaleZ = 0.8;
            // Group 1 moves to +y, group 2 to -y
            targets.chromosomePositions = [
                new THREE.Vector3(-0.3, 1.2, 0),
                new THREE.Vector3(0.0, 1.2, 0.15),
                new THREE.Vector3(0.3, 1.2, 0),
                new THREE.Vector3(0.0, 1.2, -0.15)
            ];
            targets.extraChromosomePositions = [
                new THREE.Vector3(-0.3, -1.2, 0),
                new THREE.Vector3(0.0, -1.2, 0.15),
                new THREE.Vector3(0.3, -1.2, 0),
                new THREE.Vector3(0.0, -1.2, -0.15)
            ];
            break;

        case 4: // TELOPHASE
            targets.nucleusOpacity = 0.0;
            targets.cellVisible = false;
            targets.daughterCellsVisible = true;
            targets.cellScaleY = 1.6;
            targets.cellScaleX = 0.5;
            targets.cellScaleZ = 0.5;
            targets.chromosomePositions = [
                new THREE.Vector3(-0.15, 2.5, 0.1),
                new THREE.Vector3(0.15, 2.5, -0.1),
                new THREE.Vector3(0.1, 2.5, 0.15),
                new THREE.Vector3(-0.1, 2.5, -0.15)
            ];
            targets.extraChromosomePositions = [
                new THREE.Vector3(-0.15, -2.5, 0.1),
                new THREE.Vector3(0.15, -2.5, -0.1),
                new THREE.Vector3(0.1, -2.5, 0.15),
                new THREE.Vector3(-0.1, -2.5, -0.15)
            ];
            break;
    }

    return targets;
}

function captureCurrentState() {
    return {
        nucleusOpacity: nucleusMaterial.opacity,
        cellScaleX: cellGroup.scale.x,
        cellScaleY: cellGroup.scale.y,
        cellScaleZ: cellGroup.scale.z,
        cellVisible: parentCell.visible,
        chromosomePositions: chromosomes.map(c => c.position.clone()),
        extraChromosomesVisible: extraChromosomes[0].visible,
        extraChromosomePositions: extraChromosomes.map(c => c.position.clone()),
        daughterCellsVisible: daughterCellGroup1.visible
    };
}

function lerp(a, b, t) {
    return a + (b - a) * t;
}

function lerpVec3(a, b, t) {
    return new THREE.Vector3(
        lerp(a.x, b.x, t),
        lerp(a.y, b.y, t),
        lerp(a.z, b.z, t)
    );
}

function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function applyPhaseState(startState, endState, t) {
    const et = easeInOutCubic(t);

    nucleusMaterial.opacity = lerp(startState.nucleusOpacity, endState.nucleusOpacity, et);
    cellGroup.scale.x = lerp(startState.cellScaleX, endState.cellScaleX, et);
    cellGroup.scale.y = lerp(startState.cellScaleY, endState.cellScaleY, et);
    cellGroup.scale.z = lerp(startState.cellScaleZ, endState.cellScaleZ, et);

    // Chromosomes
    for (let i = 0; i < 4; i++) {
        if (startState.chromosomePositions[i] && endState.chromosomePositions[i]) {
            chromosomes[i].position.copy(lerpVec3(startState.chromosomePositions[i], endState.chromosomePositions[i], et));
        }
    }

    // Extra chromosomes
    if (endState.extraChromosomesVisible && !startState.extraChromosomesVisible) {
        if (et > 0.1) {
            extraChromosomes.forEach(c => c.visible = true);
        }
    } else if (!endState.extraChromosomesVisible) {
        extraChromosomes.forEach(c => c.visible = false);
    } else {
        extraChromosomes.forEach(c => c.visible = true);
    }

    for (let i = 0; i < 4; i++) {
        if (startState.extraChromosomePositions[i] && endState.extraChromosomePositions[i]) {
            extraChromosomes[i].position.copy(lerpVec3(startState.extraChromosomePositions[i], endState.extraChromosomePositions[i], et));
        } else if (endState.extraChromosomePositions[i]) {
            extraChromosomes[i].position.copy(endState.extraChromosomePositions[i]);
        }
    }

    // Daughter cells & parent cell visibility
    if (endState.daughterCellsVisible) {
        if (et > 0.5) {
            daughterCellGroup1.visible = true;
            daughterCellGroup2.visible = true;
            daughterCellsVisible = true;

            const dt = (et - 0.5) * 2;
            const scale = lerp(0, 1, dt);
            daughterCellGroup1.scale.set(scale, scale, scale);
            daughterCellGroup2.scale.set(scale, scale, scale);
        }
        if (et > 0.7) {
            parentCell.material.opacity = lerp(0.6, 0, (et - 0.7) / 0.3);
            cellMembrane.material.opacity = lerp(0.3, 0, (et - 0.7) / 0.3);
            chromosomes.forEach(c => c.visible = false);
            extraChromosomes.forEach(c => c.visible = false);
        }
    } else {
        parentCell.material.opacity = 0.6;
        cellMembrane.material.opacity = 0.3;
        daughterCellGroup1.visible = false;
        daughterCellGroup2.visible = false;
        daughterCellsVisible = false;
    }
}

function startPhaseTransition(targetPhase) {
    if (phaseAnimating) return;
    if (targetPhase > 4) return;

    phaseStartState = captureCurrentState();
    phaseEndState = getPhaseTargets(targetPhase);
    currentPhase = targetPhase;
    phaseAnimating = true;
    animationProgress = 0;
    animationStartTime = performance.now() / 1000;

    document.getElementById('phaseDisplay').textContent = PHASE_NAMES[currentPhase];
    document.getElementById('phaseCounter').textContent = `Phase ${currentPhase + 1}/5`;
    document.getElementById('infoPanel').innerHTML = PHASE_INFO[currentPhase];
}

function resetToInterphase() {
    phaseAnimating = false;
    animationPaused = false;
    currentPhase = 0;
    animationProgress = 0;
    cellHighlighted = false;

    // Reset cell
    nucleusMaterial.opacity = 0.8;
    cellGroup.scale.set(1, 1, 1);
    parentCell.visible = true;
    parentCell.material.opacity = 0.6;
    parentCell.material.emissive.set(0x000000);
    cellMembrane.material.opacity = 0.3;
    nucleus.visible = true;

    // Reset chromosomes
    for (let i = 0; i < 4; i++) {
        chromosomes[i].position.copy(initialChromosomePositions[i]);
        chromosomes[i].visible = true;
    }

    // Hide extra chromosomes
    extraChromosomes.forEach((c, i) => {
        c.visible = false;
        c.position.copy(extraPositions[i]);
    });

    // Hide daughter cells
    daughterCellGroup1.visible = false;
    daughterCellGroup2.visible = false;
    daughterCellsVisible = false;

    document.getElementById('phaseDisplay').textContent = 'INTERPHASE';
    document.getElementById('phaseCounter').textContent = 'Phase 1/5';
    document.getElementById('infoPanel').innerHTML = PHASE_INFO[0];
    document.getElementById('pauseIndicator').style.display = 'none';
    document.getElementById('nextPhaseBtn').disabled = false;
}

// Event listeners
document.getElementById('nextPhaseBtn').addEventListener('click', () => {
    if (currentPhase < 4 && !phaseAnimating) {
        startPhaseTransition(currentPhase + 1);
    }
});

document.getElementById('resetBtn').addEventListener('click', resetToInterphase);

document.getElementById('toggleLabelsBtn').addEventListener('click', () => {
    labelsVisible = !labelsVisible;
    labels.forEach(l => {
        l.element.style.display = labelsVisible ? 'block' : 'none';
    });
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        animationPaused = !animationPaused;
        document.getElementById('pauseIndicator').style.display = animationPaused ? 'block' : 'none';
    }
    if (e.code === 'KeyR') {
        robotVisible = !robotVisible;
        if (robotModel) robotModel.visible = robotVisible;
    }
});

// Raycaster for click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const clickTargets = [parentCell];
    if (daughterCellGroup1.visible) {
        daughterCellGroup1.traverse(c => { if (c.isMesh) clickTargets.push(c); });
    }
    if (daughterCellGroup2.visible) {
        daughterCellGroup2.traverse(c => { if (c.isMesh) clickTargets.push(c); });
    }

    const intersects = raycaster.intersectObjects(clickTargets);
    if (intersects.length > 0) {
        cellHighlighted = !cellHighlighted;
        highlightTime = 0;
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// State management
window.__3D_STATE__ = {
    currentPhase: 0,
    phaseName: 'INTERPHASE',
    chromosomeCount: 4,
    nucleusOpacity: 0.8,
    cellScaleY: 1,
    cellScaleX: 1,
    robotVisible: true,
    robotAngle: 0,
    animationPaused: false,
    labelsVisible: true,
    daughterCellsVisible: false,
    cellHighlighted: false,
    robotLoaded: false,
    phaseAnimating: false
};

function updateState() {
    let chrCount = 0;
    chromosomes.forEach(c => { if (c.visible) chrCount++; });
    extraChromosomes.forEach(c => { if (c.visible) chrCount++; });

    const s = window.__3D_STATE__;
    s.currentPhase = currentPhase || 0;
    s.phaseName = PHASE_NAMES[currentPhase] || 'INTERPHASE';
    s.chromosomeCount = chrCount || 0;
    s.nucleusOpacity = parseFloat((nucleusMaterial.opacity || 0).toFixed(4));
    s.cellScaleY = parseFloat((cellGroup.scale.y || 1).toFixed(4));
    s.cellScaleX = parseFloat((cellGroup.scale.x || 1).toFixed(4));
    s.robotVisible = !!robotVisible;
    s.robotAngle = parseFloat((robotAngle || 0).toFixed(4));
    s.animationPaused = !!animationPaused;
    s.labelsVisible = !!labelsVisible;
    s.daughterCellsVisible = !!daughterCellsVisible;
    s.cellHighlighted = !!cellHighlighted;
    s.robotLoaded = !!robotLoaded;
    s.phaseAnimating = !!phaseAnimating;

    // Ensure no NaN
    for (const key in s) {
        if (typeof s[key] === 'number' && isNaN(s[key])) {
            s[key] = 0;
        }
    }
}

// Animation loop
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();
    const delta = time - lastTime;
    lastTime = time;

    controls.update();

    // Robot orbit
    if (robotModel && robotVisible && !animationPaused) {
        const orbitSpeed = (2 * Math.PI) / 20; // one revolution per 20 seconds
        robotAngle += orbitSpeed * delta;
        if (robotAngle > Math.PI * 2) robotAngle -= Math.PI * 2;

        robotModel.position.x = Math.cos(robotAngle) * 6;
        robotModel.position.z = Math.sin(robotAngle) * 6;
        robotModel.position.y = 2 + Math.sin(time * 0.5) * 0.3;
        robotModel.lookAt(0, 0, 0);
    }

    // Phase animation
    if (phaseAnimating && !animationPaused) {
        animationProgress += delta / animationDuration;
        if (animationProgress >= 1) {
            animationProgress = 1;
            phaseAnimating = false;
            if (currentPhase >= 4) {
                document.getElementById('nextPhaseBtn').disabled = true;
            }
        }
        applyPhaseState(phaseStartState, phaseEndState, animationProgress);
    }

    // Cell highlight glow
    if (cellHighlighted) {
        highlightTime += delta;
        const glow = Math.sin(highlightTime * 4) * 0.5 + 0.5;
        parentCell.material.emissive.setRGB(glow * 0.2, glow * 0.4, glow * 0.2);

        if (daughterCellGroup1.visible) {
            daughterCellGroup1.children.forEach(c => {
                if (c.material && c.material.emissive) {
                    c.material.emissive.setRGB(glow * 0.2, glow * 0.4, glow * 0.2);
                }
            });
        }
        if (daughterCellGroup2.visible) {
            daughterCellGroup2.children.forEach(c => {
                if (c.material && c.material.emissive) {
                    c.material.emissive.setRGB(glow * 0.2, glow * 0.4, glow * 0.2);
                }
            });
        }
    } else {
        parentCell.material.emissive.set(0x000000);
        [daughterCellGroup1, daughterCellGroup2].forEach(g => {
            g.children.forEach(c => {
                if (c.material && c.material.emissive) c.material.emissive.set(0x000000);
            });
        });
    }

    // Subtle cell animation (breathing)
    if (!phaseAnimating && currentPhase < 4) {
        const breathe = Math.sin(time * 1.5) * 0.02;
        cellGroup.scale.x = (cellGroup.scale.x > 0.9 ? cellGroup.scale.x : 1) + breathe;
        cellGroup.scale.z = (cellGroup.scale.z > 0.9 ? cellGroup.scale.z : 1) + breathe;
    }

    // Daughter cell gentle bob
    if (daughterCellGroup1.visible) {
        daughterCellGroup1.position.y = 2.5 + Math.sin(time * 1.2) * 0.05;
        daughterCellGroup2.position.y = -2.5 + Math.sin(time * 1.2 + Math.PI) * 0.05;
    }

    // Chromosome subtle rotation
    if (!animationPaused) {
        chromosomes.forEach((c, i) => {
            if (c.visible) c.rotation.y += delta * 0.3 * (i % 2 === 0 ? 1 : -1);
        });
        extraChromosomes.forEach((c, i) => {
            if (c.visible) c.rotation.y += delta * 0.3 * (i % 2 === 0 ? -1 : 1);
        });
    }

    // Particles drift
    if (!animationPaused) {
        particles.rotation.y += delta * 0.01;
        particles.rotation.x += delta * 0.005;
    }

    // Update labels
    updateLabels();

    // Update state
    updateState();

    renderer.render(scene, camera);
}

animate();
</script>
