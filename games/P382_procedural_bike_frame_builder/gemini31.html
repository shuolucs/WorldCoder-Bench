<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural 3D Bike Frame Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ecf0f1;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 240px;
            height: 100%;
            background: rgba(15, 15, 25, 0.85);
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        h2 {
            margin-top: 0;
            font-size: 18px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .control-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            color: #bdc3c7;
            font-weight: bold;
        }
        .val-display {
            float: right;
            color: #3498db;
            font-weight: normal;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        select {
            width: 100%;
            padding: 6px;
            background: #2c3e50;
            color: white;
            border: 1px solid #34495e;
            border-radius: 4px;
            cursor: pointer;
        }
        .color-picker {
            display: flex;
            gap: 8px;
            margin-top: 5px;
        }
        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s;
        }
        .color-btn:hover {
            transform: scale(1.1);
            border-color: #fff;
        }
        .color-btn.active {
            border-color: #fff;
        }
        .info-box {
            background: #2c3e50;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 18px;
            font-size: 13px;
        }
        #wheelbaseDisplay {
            font-size: 16px;
            font-weight: bold;
            color: #f1c40f;
            display: block;
            margin-top: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #2980b9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #3498db;
        }
        #resetBtn {
            background: #c0392b;
        }
        #resetBtn:hover {
            background: #e74c3c;
        }
        .instructions {
            font-size: 11px;
            color: #7f8c8d;
            margin-top: 20px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-panel">
    <h2>Bike Builder</h2>
    
    <div class="control-group">
        <label>Frame Size</label>
        <select id="frameSizeSelect">
            <option value="Small">Small</option>
            <option value="Medium" selected>Medium</option>
            <option value="Large">Large</option>
        </select>
    </div>

    <div class="control-group">
        <label>Top Tube Length <span class="val-display" id="topTubeVal">0.55</span></label>
        <input type="range" id="topTubeSlider" min="0.45" max="0.65" step="0.01" value="0.55">
    </div>

    <div class="control-group">
        <label>Seat Tube Angle <span class="val-display" id="seatAngleVal">73&deg;</span></label>
        <input type="range" id="seatAngleSlider" min="68" max="78" step="0.5" value="73">
    </div>

    <div class="control-group">
        <label>Head Tube Angle <span class="val-display" id="headAngleVal">71&deg;</span></label>
        <input type="range" id="headAngleSlider" min="68" max="75" step="0.5" value="71">
    </div>

    <div class="control-group">
        <label>Frame Color</label>
        <div class="color-picker">
            <div class="color-btn active" id="colorRed" style="background-color: #c0392b;" data-color="#c0392b"></div>
            <div class="color-btn" id="colorBlue" style="background-color: #2980b9;" data-color="#2980b9"></div>
            <div class="color-btn" id="colorGreen" style="background-color: #27ae60;" data-color="#27ae60"></div>
            <div class="color-btn" id="colorBlack" style="background-color: #2c3e50;" data-color="#2c3e50"></div>
            <div class="color-btn" id="colorWhite" style="background-color: #ecf0f1;" data-color="#ecf0f1"></div>
        </div>
    </div>

    <div class="info-box">
        <label>Wheelbase</label>
        <span id="wheelbaseDisplay">0.0 mm</span>
    </div>

    <button id="exportBtn">Export Design</button>
    <button id="resetBtn">Reset Defaults</button>

    <div class="instructions">
        <strong>Controls:</strong><br>
        Left Click: Rotate<br>
        Right Click: Pan<br>
        Scroll: Zoom<br>
        'R' Key: Toggle Auto-Rotation<br>
        'W' Key: Toggle Wireframe<br>
        Double-Click: Highlight Tube
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
    // Initialize State
    window.__3D_STATE__ = {
        frameSize: 'Medium',
        topTubeLength: 0.55,
        seatAngle: 73,
        headAngle: 71,
        frameColor: '#c0392b',
        wheelbase: 0,
        isRotating: false,
        isWireframe: false,
        exportCount: 0,
        exported: false,
        lastHighlightedTube: null,
        tubeCount: 0,
        wheelCount: 0,
        jointPositions: {},
        frameScale: 1.0,
        resetCount: 0
    };

    const state = window.__3D_STATE__;

    // Scene Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 3.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 0.5, 0);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 20;
    dirLight.shadow.camera.left = -3;
    dirLight.shadow.camera.right = 3;
    dirLight.shadow.camera.top = 3;
    dirLight.shadow.camera.bottom = -3;
    scene.add(dirLight);

    // Ground
    const gridHelper = new THREE.GridHelper(10, 10, 0x888888, 0x444444);
    gridHelper.position.y = 0;
    scene.add(gridHelper);

    const planeGeo = new THREE.PlaneGeometry(10, 10);
    const planeMat = new THREE.ShadowMaterial({ opacity: 0.4 });
    const plane = new THREE.Mesh(planeGeo, planeMat);
    plane.rotation.x = -Math.PI / 2;
    plane.receiveShadow = true;
    scene.add(plane);

    // Materials
    const frameMaterial = new THREE.MeshStandardMaterial({
        color: new THREE.Color(state.frameColor),
        roughness: 0.3,
        metalness: 0.8,
        wireframe: state.isWireframe
    });

    const wheelMaterial = new THREE.MeshStandardMaterial({
        color: 0x333333,
        roughness: 0.8,
        metalness: 0.2
    });

    const highlightMaterial = new THREE.MeshStandardMaterial({
        color: 0xffff00,
        emissive: 0xffff00,
        emissiveIntensity: 0.6,
        roughness: 0.3,
        metalness: 0.8
    });

    // Groups
    const bikeGroup = new THREE.Group();
    scene.add(bikeGroup);

    const frameGroup = new THREE.Group();
    bikeGroup.add(frameGroup);

    const wheelsGroup = new THREE.Group();
    bikeGroup.add(wheelsGroup);

    // Geometry Generation
    function calculateJoints() {
        const L_st = 0.50;
        const L_tt = state.topTubeLength;
        const L_ht = 0.15;
        const L_cs = 0.42;
        const forkLength = 0.38;
        const wheelRadius = 0.34;

        const seatAngleRad = state.seatAngle * Math.PI / 180;
        const headAngleRad = state.headAngle * Math.PI / 180;

        // Local coordinates (BB at origin)
        let bb = new THREE.Vector3(0, 0, 0);
        let seatTop = new THREE.Vector3(-L_st * Math.cos(seatAngleRad), L_st * Math.sin(seatAngleRad), 0);
        let headTop = new THREE.Vector3(seatTop.x + L_tt, seatTop.y, 0);
        let headBottom = new THREE.Vector3(headTop.x + L_ht * Math.cos(headAngleRad), headTop.y - L_ht * Math.sin(headAngleRad), 0);
        let rearDrop = new THREE.Vector3(-L_cs, 0, 0);
        let frontDrop = new THREE.Vector3(headBottom.x + forkLength * Math.cos(headAngleRad), headBottom.y - forkLength * Math.sin(headAngleRad), 0);

        // Leveling the bike so both dropouts are horizontal
        let v = new THREE.Vector3().subVectors(frontDrop, rearDrop);
        let angle = Math.atan2(v.y, v.x);

        const rotatePoint = (p) => {
            let translated = new THREE.Vector3().subVectors(p, rearDrop);
            let rotated = new THREE.Vector3(
                translated.x * Math.cos(-angle) - translated.y * Math.sin(-angle),
                translated.x * Math.sin(-angle) + translated.y * Math.cos(-angle),
                translated.z
            );
            return rotated.add(rearDrop);
        };

        bb = rotatePoint(bb);
        seatTop = rotatePoint(seatTop);
        headTop = rotatePoint(headTop);
        headBottom = rotatePoint(headBottom);
        frontDrop = rotatePoint(frontDrop);

        // Translate so dropouts are at y = wheelRadius and centered on X
        let centerX = (frontDrop.x + rearDrop.x) / 2;
        let offsetY = wheelRadius - rearDrop.y;

        const translatePoint = (p) => {
            return new THREE.Vector3(p.x - centerX, p.y + offsetY, p.z);
        };

        return {
            bb: translatePoint(bb),
            seatTop: translatePoint(seatTop),
            headTop: translatePoint(headTop),
            headBottom: translatePoint(headBottom),
            rearDrop: translatePoint(rearDrop),
            frontDrop: translatePoint(frontDrop)
        };
    }

    function createTube(name, p1, p2, radius, mat, offsetZ1 = 0, offsetZ2 = 0) {
        let start = new THREE.Vector3(p1.x, p1.y, p1.z + offsetZ1);
        let end = new THREE.Vector3(p2.x, p2.y, p2.z + offsetZ2);
        let distance = start.distanceTo(end);

        let geo = new THREE.CylinderGeometry(radius, radius, distance, 16);
        let mesh = new THREE.Mesh(geo, mat);
        mesh.name = name;
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        let mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
        mesh.position.copy(mid);

        let direction = new THREE.Vector3().subVectors(end, start).normalize();
        let axis = new THREE.Vector3(0, 1, 0);
        mesh.quaternion.setFromUnitVectors(axis, direction);

        frameGroup.add(mesh);
        return mesh;
    }

    function buildBike() {
        // Clear existing
        while(frameGroup.children.length > 0){ 
            let child = frameGroup.children[0];
            frameGroup.remove(child); 
            child.geometry.dispose();
        }
        while(wheelsGroup.children.length > 0){ 
            let child = wheelsGroup.children[0];
            wheelsGroup.remove(child); 
            child.geometry.dispose();
        }

        const joints = calculateJoints();
        const r = 0.015;

        // Frame Tubes
        createTube('HeadTube', joints.headTop, joints.headBottom, r * 1.2, frameMaterial);
        createTube('TopTube', joints.seatTop, joints.headTop, r, frameMaterial);
        createTube('DownTube', joints.bb, joints.headBottom, r * 1.1, frameMaterial);
        createTube('SeatTube', joints.bb, joints.seatTop, r, frameMaterial);
        
        // Stays
        createTube('ChainStayLeft', joints.bb, joints.rearDrop, r * 0.8, frameMaterial, 0.04, 0.06);
        createTube('ChainStayRight', joints.bb, joints.rearDrop, r * 0.8, frameMaterial, -0.04, -0.06);
        createTube('SeatStayLeft', joints.seatTop, joints.rearDrop, r * 0.7, frameMaterial, 0.02, 0.06);
        createTube('SeatStayRight', joints.seatTop, joints.rearDrop, r * 0.7, frameMaterial, -0.02, -0.06);

        // Fork (added for visual completeness)
        createTube('ForkLeft', joints.headBottom, joints.frontDrop, r * 0.9, frameMaterial, 0.05, 0.05);
        createTube('ForkRight', joints.headBottom, joints.frontDrop, r * 0.9, frameMaterial, -0.05, -0.05);

        // Wheels
        const wheelGeo = new THREE.TorusGeometry(0.34, 0.015, 16, 64);
        
        let rearWheel = new THREE.Mesh(wheelGeo, wheelMaterial);
        rearWheel.position.copy(joints.rearDrop);
        rearWheel.castShadow = true;
        wheelsGroup.add(rearWheel);

        let frontWheel = new THREE.Mesh(wheelGeo, wheelMaterial);
        frontWheel.position.copy(joints.frontDrop);
        frontWheel.castShadow = true;
        wheelsGroup.add(frontWheel);

        // Apply Scale
        const scaleMap = { 'Small': 0.85, 'Medium': 1.0, 'Large': 1.15 };
        state.frameScale = scaleMap[state.frameSize];
        bikeGroup.scale.setScalar(state.frameScale);

        // Update State
        state.wheelbase = parseFloat((joints.frontDrop.distanceTo(joints.rearDrop) * 1000).toFixed(1));
        state.jointPositions = {
            headTop: joints.headTop,
            headBottom: joints.headBottom,
            seatTop: joints.seatTop,
            bottomBracket: joints.bb,
            rearDropout: joints.rearDrop
        };
        state.tubeCount = frameGroup.children.length;
        state.wheelCount = wheelsGroup.children.length;

        // Update UI
        document.getElementById('wheelbaseDisplay').innerText = state.wheelbase + ' mm';
    }

    // UI Event Listeners
    document.getElementById('frameSizeSelect').addEventListener('change', (e) => {
        state.frameSize = e.target.value;
        buildBike();
    });

    document.getElementById('topTubeSlider').addEventListener('input', (e) => {
        state.topTubeLength = parseFloat(e.target.value);
        document.getElementById('topTubeVal').innerText = state.topTubeLength.toFixed(2);
        buildBike();
    });

    document.getElementById('seatAngleSlider').addEventListener('input', (e) => {
        state.seatAngle = parseFloat(e.target.value);
        document.getElementById('seatAngleVal').innerHTML = state.seatAngle + '&deg;';
        buildBike();
    });

    document.getElementById('headAngleSlider').addEventListener('input', (e) => {
        state.headAngle = parseFloat(e.target.value);
        document.getElementById('headAngleVal').innerHTML = state.headAngle + '&deg;';
        buildBike();
    });

    document.querySelectorAll('.color-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            state.frameColor = e.target.getAttribute('data-color');
            frameMaterial.color.set(state.frameColor);
        });
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
        state.exported = true;
        state.exportCount++;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
        state.frameSize = 'Medium';
        state.topTubeLength = 0.55;
        state.seatAngle = 73;
        state.headAngle = 71;
        state.frameColor = '#c0392b';
        state.isRotating = false;
        state.isWireframe = false;
        state.resetCount++;
        
        document.getElementById('frameSizeSelect').value = 'Medium';
        document.getElementById('topTubeSlider').value = 0.55;
        document.getElementById('seatAngleSlider').value = 73;
        document.getElementById('headAngleSlider').value = 71;
        document.getElementById('topTubeVal').innerText = '0.55';
        document.getElementById('seatAngleVal').innerHTML = '73&deg;';
        document.getElementById('headAngleVal').innerHTML = '71&deg;';
        
        document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('colorRed').classList.add('active');
        
        frameMaterial.color.set('#c0392b');
        frameMaterial.wireframe = false;
        bikeGroup.rotation.y = 0;
        
        buildBike();
    });

    // Keyboard Interactions
    window.addEventListener('keydown', (e) => {
        if (e.key.toLowerCase() === 'r') {
            state.isRotating = !state.isRotating;
        }
        if (e.key.toLowerCase() === 'w') {
            state.isWireframe = !state.isWireframe;
            frameMaterial.wireframe = state.isWireframe;
        }
    });

    // Double Click Highlight
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let highlightedMesh = null;
    let highlightTimeout = null;

    window.addEventListener('dblclick', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(frameGroup.children);
        
        if (intersects.length > 0) {
            const mesh = intersects[0].object;
            
            if (highlightedMesh) {
                highlightedMesh.material = frameMaterial;
                clearTimeout(highlightTimeout);
            }
            
            highlightedMesh = mesh;
            mesh.material = highlightMaterial;
            state.lastHighlightedTube = mesh.name;
            
            highlightTimeout = setTimeout(() => {
                if(highlightedMesh === mesh) {
                    mesh.material = frameMaterial;
                    highlightedMesh = null;
                    state.lastHighlightedTube = null;
                }
            }, 2000);
        }
    });

    // Window Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initial Build
    buildBike();

    // Animation Loop
    let lastTime = performance.now();
    function animate() {
        requestAnimationFrame(animate);
        
        const now = performance.now();
        const dt = (now - lastTime) / 1000;
        lastTime = now;

        if (state.isRotating) {
            bikeGroup.rotation.y += 0.5 * dt;
        }

        controls.update();
        renderer.render(scene, camera);
    }
    
    animate();
</script>
</body>
</html>
