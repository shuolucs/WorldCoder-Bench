<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural 3D Bike Frame Builder</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
    }

    #uiPanel {
      position: absolute;
      top: 0;
      left: 0;
      width: 240px;
      height: 100%;
      padding: 16px;
      box-sizing: border-box;
      background: rgba(15, 15, 25, 0.82);
      color: #fff;
      z-index: 10;
      overflow-y: auto;
      backdrop-filter: blur(6px);
    }

    #uiPanel h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .value-label {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 4px;
    }

    input[type="range"], select, button {
      width: 100%;
      box-sizing: border-box;
    }

    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #ffffff55;
      cursor: pointer;
      padding: 0;
      outline: none;
    }

    .color-btn.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px #ffffff33;
    }

    .text-display {
      font-size: 14px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .button-row button,
    #exportBtn,
    #resetBtn {
      background: #2f3b52;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .button-row button:hover,
    #exportBtn:hover,
    #resetBtn:hover {
      background: #44506a;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <h2>Bike Frame Builder</h2>

    <div class="control-group">
      <label for="frameSizeSelect">Frame Size</label>
      <select id="frameSizeSelect">
        <option value="Small">Small</option>
        <option value="Medium" selected>Medium</option>
        <option value="Large">Large</option>
      </select>
    </div>

    <div class="control-group">
      <label for="topTubeSlider">Top Tube Length</label>
      <input id="topTubeSlider" type="range" min="0.45" max="0.65" step="0.01" value="0.55" />
      <div id="topTubeValue" class="value-label">0.55 m</div>
    </div>

    <div class="control-group">
      <label for="seatAngleSlider">Seat Tube Angle</label>
      <input id="seatAngleSlider" type="range" min="68" max="78" step="0.5" value="73" />
      <div id="seatAngleValue" class="value-label">73°</div>
    </div>

    <div class="control-group">
      <label for="headAngleSlider">Head Tube Angle</label>
      <input id="headAngleSlider" type="range" min="68" max="75" step="0.5" value="71" />
      <div id="headAngleValue" class="value-label">71°</div>
    </div>

    <div class="control-group">
      <label>Frame Color</label>
      <div class="color-row">
        <button id="colorRed" class="color-btn active" style="background:#c0392b" data-color="#c0392b" title="Red"></button>
        <button id="colorBlue" class="color-btn" style="background:#2980b9" data-color="#2980b9" title="Blue"></button>
        <button id="colorGreen" class="color-btn" style="background:#27ae60" data-color="#27ae60" title="Green"></button>
        <button id="colorBlack" class="color-btn" style="background:#2c3e50" data-color="#2c3e50" title="Black"></button>
        <button id="colorWhite" class="color-btn" style="background:#ecf0f1" data-color="#ecf0f1" title="White"></button>
      </div>
    </div>

    <div class="control-group">
      <label>Wheelbase</label>
      <div id="wheelbaseDisplay" class="text-display">0.0 mm</div>
    </div>

    <div class="control-group button-row">
      <button id="exportBtn">Export</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.2, 3.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.6, 0);
    controls.enableDamping = true;

    const grid = new THREE.GridHelper(10, 10, 0x888888, 0x888888);
    grid.position.y = 0;
    scene.add(grid);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 8, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    const bikeGroup = new THREE.Group();
    scene.add(bikeGroup);

    const tubeRadius = 0.015;
    const frameMaterial = new THREE.MeshStandardMaterial({
      color: '#c0392b',
      roughness: 0.3,
      metalness: 0.8,
      emissive: 0x000000,
      wireframe: false
    });

    const wheelMaterial = new THREE.MeshStandardMaterial({
      color: '#333333',
      roughness: 0.6,
      metalness: 0.2
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const tubeMeshes = {};
    const wheelMeshes = {};

    const defaults = {
      frameSize: 'Medium',
      topTubeLength: 0.55,
      seatAngle: 73,
      headAngle: 71,
      frameColor: '#c0392b'
    };

    const scaleMap = {
      Small: 0.85,
      Medium: 1.0,
      Large: 1.15
    };

    window.__3D_STATE__ = {
      frameSize: 'Medium',
      topTubeLength: 0.55,
      seatAngle: 73,
      headAngle: 71,
      frameColor: '#c0392b',
      wheelbase: 0.0,
      isRotating: false,
      isWireframe: false,
      exportCount: 0,
      exported: false,
      lastHighlightedTube: null,
      tubeCount: 8,
      wheelCount: 2,
      jointPositions: {
        headTop: { x: 0, y: 0, z: 0 },
        headBottom: { x: 0, y: 0, z: 0 },
        seatTop: { x: 0, y: 0, z: 0 },
        bottomBracket: { x: 0, y: 0, z: 0 },
        rearDropout: { x: 0, y: 0, z: 0 }
      },
      frameScale: 1.0,
      resetCount: 0
    };

    function safeNum(v, fallback = 0) {
      const n = Number(v);
      return Number.isFinite(n) ? n : fallback;
    }

    function toPlain(v) {
      return {
        x: safeNum(v.x),
        y: safeNum(v.y),
        z: safeNum(v.z)
      };
    }

    function createTube(name) {
      const geo = new THREE.CylinderGeometry(tubeRadius, tubeRadius, 1, 20);
      const mesh = new THREE.Mesh(geo, frameMaterial.clone());
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.tubeName = name;
      bikeGroup.add(mesh);
      tubeMeshes[name] = mesh;
    }

    function createWheel(name) {
      const geo = new THREE.TorusGeometry(0.34, 0.015, 20, 64);
      const mesh = new THREE.Mesh(geo, wheelMaterial);
      mesh.rotation.y = Math.PI / 2;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      bikeGroup.add(mesh);
      wheelMeshes[name] = mesh;
    }

    [
      'headTube',
      'topTube',
      'downTube',
      'seatTube',
      'chainStayLeft',
      'chainStayRight',
      'seatStayLeft',
      'seatStayRight'
    ].forEach(createTube);

    createWheel('frontWheel');
    createWheel('rearWheel');

    function setTubeBetween(mesh, start, end) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = Math.max(dir.length(), 0.0001);
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

      mesh.position.copy(mid);
      mesh.scale.set(1, len, 1);
      mesh.quaternion.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        dir.clone().normalize()
      );
    }

    function updateColorButtons(activeHex) {
      document.querySelectorAll('.color-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.color.toLowerCase() === activeHex.toLowerCase());
      });
    }

    function updateUILabels() {
      document.getElementById('topTubeValue').textContent = `${safeNum(window.__3D_STATE__.topTubeLength).toFixed(2)} m`;
      document.getElementById('seatAngleValue').textContent = `${safeNum(window.__3D_STATE__.seatAngle).toFixed(1).replace('.0','')}°`;
      document.getElementById('headAngleValue').textContent = `${safeNum(window.__3D_STATE__.headAngle).toFixed(1).replace('.0','')}°`;
      document.getElementById('wheelbaseDisplay').textContent = `${safeNum(window.__3D_STATE__.wheelbase).toFixed(1)} mm`;
    }

    function updateStateGeometry(joints, wheelbaseMm, frameScale) {
      window.__3D_STATE__.jointPositions = {
        headTop: toPlain(joints.headTop),
        headBottom: toPlain(joints.headBottom),
        seatTop: toPlain(joints.seatTop),
        bottomBracket: toPlain(joints.bottomBracket),
        rearDropout: toPlain(joints.rearDropout)
      };
      window.__3D_STATE__.wheelbase = safeNum(wheelbaseMm);
      window.__3D_STATE__.frameScale = safeNum(frameScale, 1);
    }

    function rebuildBike() {
      const frameSize = document.getElementById('frameSizeSelect').value;
      const frameScale = safeNum(scaleMap[frameSize], 1.0);
      const topTubeLength = safeNum(document.getElementById('topTubeSlider').value, defaults.topTubeLength);
      const seatAngleDeg = safeNum(document.getElementById('seatAngleSlider').value, defaults.seatAngle);
      const headAngleDeg = safeNum(document.getElementById('headAngleSlider').value, defaults.headAngle);

      window.__3D_STATE__.frameSize = frameSize;
      window.__3D_STATE__.topTubeLength = topTubeLength;
      window.__3D_STATE__.seatAngle = seatAngleDeg;
      window.__3D_STATE__.headAngle = headAngleDeg;

      const topTubeLen = topTubeLength * frameScale;
      const headTubeLen = 0.15 * frameScale;
      const downTubeLenTarget = 0.65 * frameScale;
      const seatTubeLen = 0.50 * frameScale;
      const chainStayLen = 0.42 * frameScale;
      const seatStayLen = 0.45 * frameScale;

      const seatAngle = THREE.MathUtils.degToRad(seatAngleDeg);
      const headAngle = THREE.MathUtils.degToRad(headAngleDeg);

      const bottomBracket = new THREE.Vector3(0, 0.33 * frameScale, 0);

      const seatTop = new THREE.Vector3(
        Math.cos(seatAngle) * seatTubeLen,
        bottomBracket.y + Math.sin(seatAngle) * seatTubeLen,
        0
      );

      const headTop = new THREE.Vector3(
        seatTop.x + topTubeLen,
        seatTop.y,
        0
      );

      const headDir = new THREE.Vector3(-Math.cos(headAngle), -Math.sin(headAngle), 0).normalize();
      const headBottom = headTop.clone().add(headDir.clone().multiplyScalar(headTubeLen));

      const rearDropoutBaseY = 0.34 * frameScale;
      let rearDx = Math.sqrt(Math.max(chainStayLen * chainStayLen - Math.pow(rearDropoutBaseY - bottomBracket.y, 2), 0.0001));
      let rearDropout = new THREE.Vector3(bottomBracket.x - rearDx, rearDropoutBaseY, 0);

      const seatStayDist = seatTop.distanceTo(rearDropout);
      if (Math.abs(seatStayDist - seatStayLen) > 0.02) {
        const dy = rearDropoutBaseY - seatTop.y;
        const possibleDx = Math.sqrt(Math.max(seatStayLen * seatStayLen - dy * dy, 0.0001));
        rearDropout.x = seatTop.x - possibleDx;
      }

      const frontWheelCenter = headBottom.clone();
      const rearWheelCenter = rearDropout.clone();

      const leftOffset = 0.03 * frameScale;
      const rightOffset = -0.03 * frameScale;

      setTubeBetween(tubeMeshes.headTube, headBottom, headTop);
      setTubeBetween(tubeMeshes.topTube, headTop, seatTop);
      setTubeBetween(tubeMeshes.downTube, headBottom, bottomBracket);
      setTubeBetween(tubeMeshes.seatTube, bottomBracket, seatTop);

      setTubeBetween(
        tubeMeshes.chainStayLeft,
        bottomBracket.clone().add(new THREE.Vector3(0, 0, leftOffset)),
        rearDropout.clone().add(new THREE.Vector3(0, 0, leftOffset))
      );
      setTubeBetween(
        tubeMeshes.chainStayRight,
        bottomBracket.clone().add(new THREE.Vector3(0, 0, rightOffset)),
        rearDropout.clone().add(new THREE.Vector3(0, 0, rightOffset))
      );
      setTubeBetween(
        tubeMeshes.seatStayLeft,
        seatTop.clone().add(new THREE.Vector3(0, 0, leftOffset)),
        rearDropout.clone().add(new THREE.Vector3(0, 0, leftOffset))
      );
      setTubeBetween(
        tubeMeshes.seatStayRight,
        seatTop.clone().add(new THREE.Vector3(0, 0, rightOffset)),
        rearDropout.clone().add(new THREE.Vector3(0, 0, rightOffset))
      );

      wheelMeshes.frontWheel.position.copy(frontWheelCenter);
      wheelMeshes.rearWheel.position.copy(rearWheelCenter);

      const wheelbaseMm = safeNum(frontWheelCenter.distanceTo(rearWheelCenter) * 1000);

      updateStateGeometry(
        { headTop, headBottom, seatTop, bottomBracket, rearDropout },
        Math.round(wheelbaseMm * 10) / 10,
        frameScale
      );

      updateUILabels();
    }

    function updateFrameColor(hex) {
      const safeHex = hex || '#c0392b';
      Object.values(tubeMeshes).forEach(mesh => {
        mesh.material.color.set(safeHex);
      });
      window.__3D_STATE__.frameColor = safeHex;
      updateColorButtons(safeHex);
    }

    function updateWireframeState() {
      Object.values(tubeMeshes).forEach(mesh => {
        mesh.material.wireframe = !!window.__3D_STATE__.isWireframe;
      });
    }

    function resetControls() {
      document.getElementById('frameSizeSelect').value = defaults.frameSize;
      document.getElementById('topTubeSlider').value = defaults.topTubeLength;
      document.getElementById('seatAngleSlider').value = defaults.seatAngle;
      document.getElementById('headAngleSlider').value = defaults.headAngle;

      window.__3D_STATE__.frameSize = defaults.frameSize;
      window.__3D_STATE__.topTubeLength = defaults.topTubeLength;
      window.__3D_STATE__.seatAngle = defaults.seatAngle;
      window.__3D_STATE__.headAngle = defaults.headAngle;
      window.__3D_STATE__.frameColor = defaults.frameColor;
      window.__3D_STATE__.resetCount = safeNum(window.__3D_STATE__.resetCount) + 1;

      updateFrameColor(defaults.frameColor);
      rebuildBike();
    }

    document.getElementById('frameSizeSelect').addEventListener('change', rebuildBike);
    document.getElementById('topTubeSlider').addEventListener('input', rebuildBike);
    document.getElementById('seatAngleSlider').addEventListener('input', rebuildBike);
    document.getElementById('headAngleSlider').addEventListener('input', rebuildBike);

    document.querySelectorAll('.color-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        updateFrameColor(btn.dataset.color);
      });
    });

    document.getElementById('exportBtn').addEventListener('click', () => {
      window.__3D_STATE__.exported = true;
      window.__3D_STATE__.exportCount = safeNum(window.__3D_STATE__.exportCount) + 1;
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      resetControls();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
      }
      if (e.key === 'w' || e.key === 'W') {
        window.__3D_STATE__.isWireframe = !window.__3D_STATE__.isWireframe;
        updateWireframeState();
      }
    });

    function highlightTube(mesh) {
      if (!mesh || !mesh.material) return;
      const originalEmissive = mesh.material.emissive.clone();
      mesh.material.emissive.set('#ffff00');
      const tubeName = mesh.userData.tubeName || null;
      window.__3D_STATE__.lastHighlightedTube = tubeName;

      setTimeout(() => {
        if (mesh.material) mesh.material.emissive.copy(originalEmissive);
      }, 2000);
    }

    renderer.domElement.addEventListener('dblclick', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(Object.values(tubeMeshes), false);
      if (intersects.length > 0) {
        highlightTube(intersects[0].object);
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      if (window.__3D_STATE__.isRotating) {
        bikeGroup.rotation.y += 0.5 * dt;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    rebuildBike();
    updateFrameColor(defaults.frameColor);
    updateWireframeState();
    updateUILabels();
    animate();
  </script>
</body>
</html>
