<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bouncing Balls Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
  }
  #hud span { font-weight: bold; color: #4fc3f7; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  🎱 Balls: <span id="ballCount">0</span><br>
  💥 Collisions: <span id="collisionCount">0</span>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Constants ---
const GRAVITY = 15;
const RESTITUTION = 0.75;
const BALL_RADIUS = 0.5;
const BOX_SIZE = 20;
const HALF_BOX = BOX_SIZE / 2;
const MAX_BALLS = 30;
const TRAIL_LENGTH = 20;

// --- State ---
let collisionCount = 0;
const balls = [];

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(22, 18, 22);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 10;
controls.maxDistance = 60;
controls.target.set(0, 3, 0);

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(15, 25, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 60;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const pointLight1 = new THREE.PointLight(0x4488ff, 2, 40);
pointLight1.position.set(-8, 12, -8);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4488, 2, 40);
pointLight2.position.set(8, 12, 8);
scene.add(pointLight2);

// --- Ground ---
const groundGeom = new THREE.PlaneGeometry(BOX_SIZE, BOX_SIZE);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222233,
  roughness: 0.3,
  metalness: 0.5,
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(BOX_SIZE, 20, 0x333355, 0x222244);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Transparent Walls ---
function createWall(width, height, position, rotation) {
  const geom = new THREE.PlaneGeometry(width, height);
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0x4488cc,
    transparent: true,
    opacity: 0.08,
    roughness: 0.1,
    metalness: 0.1,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.copy(position);
  if (rotation) mesh.rotation.copy(rotation);
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Edge lines
  const edgesGeom = new THREE.EdgesGeometry(geom);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x4488cc, transparent: true, opacity: 0.3 });
  const edges = new THREE.LineSegments(edgesGeom, edgesMat);
  edges.position.copy(position);
  if (rotation) edges.rotation.copy(rotation);
  scene.add(edges);
}

const wallHeight = 15;
createWall(BOX_SIZE, wallHeight, new THREE.Vector3(0, wallHeight / 2, -HALF_BOX), new THREE.Euler(0, 0, 0));
createWall(BOX_SIZE, wallHeight, new THREE.Vector3(0, wallHeight / 2, HALF_BOX), new THREE.Euler(0, 0, 0));
createWall(BOX_SIZE, wallHeight, new THREE.Vector3(-HALF_BOX, wallHeight / 2, 0), new THREE.Euler(0, Math.PI / 2, 0));
createWall(BOX_SIZE, wallHeight, new THREE.Vector3(HALF_BOX, wallHeight / 2, 0), new THREE.Euler(0, Math.PI / 2, 0));

// --- Ball Colors ---
const ballColors = [
  0xff4444, 0x44ff44, 0x4488ff, 0xffaa00, 0xff44ff,
  0x44ffff, 0xffff44, 0xff8844, 0x88ff44, 0x8844ff,
  0xff4488, 0x44ff88, 0x4444ff, 0xffaa44, 0xaa44ff,
];

// --- Trail System ---
function createTrail(color) {
  const positions = new Float32Array(TRAIL_LENGTH * 3);
  const colors = new Float32Array(TRAIL_LENGTH * 3);
  const baseColor = new THREE.Color(color);

  for (let i = 0; i < TRAIL_LENGTH; i++) {
    const alpha = 1.0 - i / TRAIL_LENGTH;
    colors[i * 3] = baseColor.r * alpha;
    colors[i * 3 + 1] = baseColor.g * alpha;
    colors[i * 3 + 2] = baseColor.b * alpha;
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    opacity: 0.6,
    linewidth: 1,
  });

  const line = new THREE.Line(geometry, material);
  scene.add(line);

  return {
    line,
    positions: [],
    update(pos) {
      this.positions.unshift(pos.clone());
      if (this.positions.length > TRAIL_LENGTH) {
        this.positions.length = TRAIL_LENGTH;
      }
      const attr = line.geometry.getAttribute('position');
      for (let i = 0; i < TRAIL_LENGTH; i++) {
        if (i < this.positions.length) {
          attr.array[i * 3] = this.positions[i].x;
          attr.array[i * 3 + 1] = this.positions[i].y;
          attr.array[i * 3 + 2] = this.positions[i].z;
        } else {
          const last = this.positions[this.positions.length - 1] || pos;
          attr.array[i * 3] = last.x;
          attr.array[i * 3 + 1] = last.y;
          attr.array[i * 3 + 2] = last.z;
        }
      }
      attr.needsUpdate = true;
      line.geometry.setDrawRange(0, this.positions.length);
    },
    dispose() {
      scene.remove(line);
      line.geometry.dispose();
      line.material.dispose();
    }
  };
}

// --- Create Ball ---
function createBall(x, y, z, vx, vy, vz, colorIndex) {
  if (balls.length >= MAX_BALLS) return null;

  const color = ballColors[colorIndex % ballColors.length];
  const geometry = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.2,
    metalness: 0.6,
    emissive: new THREE.Color(color).multiplyScalar(0.15),
  });
  const mesh = new THREE.Mesh(geometry, material);
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  // Glow
  const glowGeom = new THREE.SphereGeometry(BALL_RADIUS * 1.3, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.1,
    side: THREE.BackSide,
  });
  const glow = new THREE.Mesh(glowGeom, glowMat);
  mesh.add(glow);

  const trail = createTrail(color);

  const ball = {
    mesh,
    velocity: new THREE.Vector3(vx, vy, vz),
    trail,
    color,
  };

  balls.push(ball);
  return ball;
}

// --- Initialize 5 balls ---
for (let i = 0; i < 5; i++) {
  const x = (Math.random() - 0.5) * (BOX_SIZE - 4);
  const y = 3 + Math.random() * 5;
  const z = (Math.random() - 0.5) * (BOX_SIZE - 4);
  const vx = (Math.random() - 0.5) * 10;
  const vy = (Math.random() - 0.5) * 5;
  const vz = (Math.random() - 0.5) * 10;
  createBall(x, y, z, vx, vy, vz, i);
}

// --- Click to add ball ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const groundPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

renderer.domElement.addEventListener('click', (event) => {
  if (balls.length >= MAX_BALLS) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersectPoint = new THREE.Vector3();
  raycaster.ray.intersectPlane(groundPlane, intersectPoint);

  if (intersectPoint) {
    let px = Math.max(-HALF_BOX + BALL_RADIUS, Math.min(HALF_BOX - BALL_RADIUS, intersectPoint.x));
    let pz = Math.max(-HALF_BOX + BALL_RADIUS, Math.min(HALF_BOX - BALL_RADIUS, intersectPoint.z));
    const vx = (Math.random() - 0.5) * 6;
    const vy = Math.random() * 3;
    const vz = (Math.random() - 0.5) * 6;
    createBall(px, 5, pz, vx, vy, vz, balls.length);
  }
});

// --- Physics ---
function updatePhysics(dt) {
  // Cap dt to avoid instability
  dt = Math.min(dt, 1 / 30);

  const subSteps = 4;
  const subDt = dt / subSteps;

  for (let step = 0; step < subSteps; step++) {
    // Apply gravity and integrate
    for (const ball of balls) {
      ball.velocity.y -= GRAVITY * subDt;
      ball.mesh.position.x += ball.velocity.x * subDt;
      ball.mesh.position.y += ball.velocity.y * subDt;
      ball.mesh.position.z += ball.velocity.z * subDt;
    }

    // Wall collisions
    for (const ball of balls) {
      const pos = ball.mesh.position;
      const vel = ball.velocity;

      // Ground (y = 0)
      if (pos.y - BALL_RADIUS < 0) {
        pos.y = BALL_RADIUS;
        vel.y = Math.abs(vel.y) * RESTITUTION;
        collisionCount++;
      }

      // Ceiling (y = wallHeight) - optional, keep balls in box
      if (pos.y + BALL_RADIUS > wallHeight) {
        pos.y = wallHeight - BALL_RADIUS;
        vel.y = -Math.abs(vel.y) * RESTITUTION;
        collisionCount++;
      }

      // X walls
      if (pos.x - BALL_RADIUS < -HALF_BOX) {
        pos.x = -HALF_BOX + BALL_RADIUS;
        vel.x = Math.abs(vel.x) * RESTITUTION;
        collisionCount++;
      }
      if (pos.x + BALL_RADIUS > HALF_BOX) {
        pos.x = HALF_BOX - BALL_RADIUS;
        vel.x = -Math.abs(vel.x) * RESTITUTION;
        collisionCount++;
      }

      // Z walls
      if (pos.z - BALL_RADIUS < -HALF_BOX) {
        pos.z = -HALF_BOX + BALL_RADIUS;
        vel.z = Math.abs(vel.z) * RESTITUTION;
        collisionCount++;
      }
      if (pos.z + BALL_RADIUS > HALF_BOX) {
        pos.z = HALF_BOX - BALL_RADIUS;
        vel.z = -Math.abs(vel.z) * RESTITUTION;
        collisionCount++;
      }
    }

    // Ball-ball collisions
    for (let i = 0; i < balls.length; i++) {
      for (let j = i + 1; j < balls.length; j++) {
        const a = balls[i];
        const b = balls[j];
        const diff = new THREE.Vector3().subVectors(b.mesh.position, a.mesh.position);
        const dist = diff.length();
        const minDist = BALL_RADIUS * 2;

        if (dist < minDist && dist > 0.001) {
          // Separate balls
          const normal = diff.clone().normalize();
          const overlap = minDist - dist;
          a.mesh.position.addScaledVector(normal, -overlap / 2);
          b.mesh.position.addScaledVector(normal, overlap / 2);

          // Equal mass elastic collision: exchange normal velocity components
          const relVel = new THREE.Vector3().subVectors(a.velocity, b.velocity);
          const relVelNormal = relVel.dot(normal);

          // Only resolve if balls are approaching
          if (relVelNormal > 0) {
            a.velocity.addScaledVector(normal, -relVelNormal);
            b.velocity.addScaledVector(normal, relVelNormal);
            collisionCount++;
          }
        }
      }
    }
  }
}

// --- HUD ---
const ballCountEl = document.getElementById('ballCount');
const collisionCountEl = document.getElementById('collisionCount');

function updateHUD() {
  ballCountEl.textContent = balls.length;
  collisionCountEl.textContent = collisionCount;
}

// --- Expose State ---
function updateState() {
  let totalKE = 0;
  const ballsData = balls.map(b => {
    const v2 = b.velocity.lengthSq();
    totalKE += 0.5 * v2;
    return {
      x: b.mesh.position.x,
      y: b.mesh.position.y,
      z: b.mesh.position.z,
      vx: b.velocity.x,
      vy: b.velocity.y,
      vz: b.velocity.z,
    };
  });

  window.__3D_STATE__ = {
    ballCount: balls.length,
    collisionCount: collisionCount,
    balls: ballsData,
    totalKineticEnergy: totalKE,
  };
}

// --- Animation Loop ---
const clock = new THREE.Clock();
let trailCounter = 0;

function animate() {
  requestAnimationFrame(animate);

  const dt = clock.getDelta();

  updatePhysics(dt);

  // Update trails every 2 frames for performance
  trailCounter++;
  if (trailCounter % 2 === 0) {
    for (const ball of balls) {
      ball.trail.update(ball.mesh.position);
    }
  }

  // Rotate balls based on velocity for visual effect
  for (const ball of balls) {
    const speed = ball.velocity.length();
    if (speed > 0.1) {
      const axis = new THREE.Vector3(-ball.velocity.z, 0, ball.velocity.x).normalize();
      ball.mesh.rotateOnWorldAxis(axis, speed * dt * 2);
    }
  }

  controls.update();
  updateHUD();
  updateState();

  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Start ---
animate();
</script>
</body>
</html>
