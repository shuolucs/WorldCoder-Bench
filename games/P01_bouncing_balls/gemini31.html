<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bouncing Balls Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 16px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        span.val {
            color: #00ffcc;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>Balls: <span id="ballCount" class="val">0</span> / 30</div>
        <div>Collisions: <span id="collisionCount" class="val">0</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration ---
        const CONFIG = {
            boxSize: 20,
            boxHeight: 20,
            ballRadius: 0.5,
            gravity: 15,
            restitution: 0.75,
            maxBalls: 30,
            trailLength: 15
        };

        // --- Global State ---
        let collisionCount = 0;
        const balls = [];

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 10, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 30, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Environment (Box) ---
        const floorGeo = new THREE.PlaneGeometry(CONFIG.boxSize, CONFIG.boxSize);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        const wallGeo = new THREE.PlaneGeometry(CONFIG.boxSize, CONFIG.boxHeight);
        const wallMat = new THREE.MeshStandardMaterial({ 
            color: 0x88ccff, 
            transparent: true, 
            opacity: 0.15, 
            side: THREE.DoubleSide,
            depthWrite: false
        });

        const walls = [];
        const halfSize = CONFIG.boxSize / 2;
        const halfHeight = CONFIG.boxHeight / 2;

        const wallTransforms = [
            { pos: [0, halfHeight, -halfSize], rot: [0, 0, 0] },
            { pos: [0, halfHeight, halfSize], rot: [0, 0, 0] },
            { pos: [-halfSize, halfHeight, 0], rot: [0, Math.PI / 2, 0] },
            { pos: [halfSize, halfHeight, 0], rot: [0, Math.PI / 2, 0] }
        ];

        wallTransforms.forEach(t => {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(...t.pos);
            wall.rotation.set(...t.rot);
            scene.add(wall);
            walls.push(wall);
        });

        // --- Ball Management ---
        const sphereGeo = new THREE.SphereGeometry(CONFIG.ballRadius, 32, 32);

        function createBall(position, velocity) {
            if (balls.length >= CONFIG.maxBalls) return;

            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
            const mesh = new THREE.Mesh(sphereGeo, material);
            mesh.position.copy(position);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            // Trail
            const trailGeo = new THREE.BufferGeometry();
            const trailPositions = new Float32Array(CONFIG.trailLength * 3);
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            const trailMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.6 });
            const trail = new THREE.Line(trailGeo, trailMat);
            scene.add(trail);

            balls.push({
                mesh,
                velocity,
                trail,
                history: Array(CONFIG.trailLength).fill(position.clone())
            });
        }

        // Initial 5 balls
        for (let i = 0; i < 5; i++) {
            const pos = new THREE.Vector3(
                (Math.random() - 0.5) * (CONFIG.boxSize - 2),
                Math.random() * 10 + 5,
                (Math.random() - 0.5) * (CONFIG.boxSize - 2)
            );
            const vel = new THREE.Vector3(
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10
            );
            createBall(pos, vel);
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.button !== 0) return; // Only left click
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(floor);

            if (intersects.length > 0) {
                const pt = intersects[0].point;
                createBall(
                    new THREE.Vector3(pt.x, pt.y + 5, pt.z),
                    new THREE.Vector3((Math.random()-0.5)*2, 0, (Math.random()-0.5)*2)
                );
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Animation ---
        const clock = new THREE.Clock();
        const elBallCount = document.getElementById('ballCount');
        const elCollisionCount = document.getElementById('collisionCount');

        function updatePhysics(dt) {
            const r = CONFIG.ballRadius;
            const limit = halfSize - r;
            const ceiling = CONFIG.boxHeight - r;

            // 1. Apply gravity and update positions
            for (const ball of balls) {
                ball.velocity.y -= CONFIG.gravity * dt;
                ball.mesh.position.addScaledVector(ball.velocity, dt);
            }

            // 2. Wall collisions
            for (const ball of balls) {
                const p = ball.mesh.position;
                const v = ball.velocity;
                let hitWall = false;

                if (p.y < r) { p.y = r; v.y *= -CONFIG.restitution; hitWall = true; }
                else if (p.y > ceiling) { p.y = ceiling; v.y *= -CONFIG.restitution; hitWall = true; }

                if (p.x < -limit) { p.x = -limit; v.x *= -CONFIG.restitution; hitWall = true; }
                else if (p.x > limit) { p.x = limit; v.x *= -CONFIG.restitution; hitWall = true; }

                if (p.z < -limit) { p.z = -limit; v.z *= -CONFIG.restitution; hitWall = true; }
                else if (p.z > limit) { p.z = limit; v.z *= -CONFIG.restitution; hitWall = true; }

                if (hitWall) collisionCount++;
            }

            // 3. Ball-Ball collisions
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];
                    const p1 = b1.mesh.position;
                    const p2 = b2.mesh.position;

                    const distSq = p1.distanceToSquared(p2);
                    const minDist = r * 2;

                    if (distSq < minDist * minDist) {
                        collisionCount++;
                        const dist = Math.sqrt(distSq);
                        const n = new THREE.Vector3().subVectors(p1, p2).normalize();
                        
                        // Position correction to prevent sinking
                        const overlap = minDist - dist;
                        const correction = n.clone().multiplyScalar(overlap / 2);
                        p1.add(correction);
                        p2.sub(correction);

                        // Velocity response (Elastic collision, equal mass)
                        const v1 = b1.velocity;
                        const v2 = b2.velocity;
                        const vRel = new THREE.Vector3().subVectors(v1, v2);
                        const vRelN = vRel.dot(n);

                        if (vRelN < 0) {
                            const jImpulse = -(1 + CONFIG.restitution) * vRelN / 2;
                            const impulse = n.multiplyScalar(jImpulse);
                            v1.add(impulse);
                            v2.sub(impulse);
                        }
                    }
                }
            }

            // 4. Update Trails
            for (const ball of balls) {
                ball.history.unshift(ball.mesh.position.clone());
                if (ball.history.length > CONFIG.trailLength) {
                    ball.history.pop();
                }
                
                const positions = ball.trail.geometry.attributes.position.array;
                for (let i = 0; i < CONFIG.trailLength; i++) {
                    const pt = ball.history[i] || ball.history[ball.history.length - 1];
                    positions[i * 3] = pt.x;
                    positions[i * 3 + 1] = pt.y;
                    positions[i * 3 + 2] = pt.z;
                }
                ball.trail.geometry.attributes.position.needsUpdate = true;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Cap dt to prevent tunneling on lag spikes
            const dt = Math.min(clock.getDelta(), 0.05);
            
            updatePhysics(dt);
            controls.update();
            renderer.render(scene, camera);

            // Update HUD
            elBallCount.innerText = balls.length;
            elCollisionCount.innerText = collisionCount;

            // Expose State
            let totalKineticEnergy = 0;
            const ballsState = balls.map(b => {
                const vSq = b.velocity.lengthSq();
                totalKineticEnergy += 0.5 * 1 * vSq; // mass = 1
                return {
                    x: b.mesh.position.x, y: b.mesh.position.y, z: b.mesh.position.z,
                    vx: b.velocity.x, vy: b.velocity.y, vz: b.velocity.z
                };
            });

            window.__3D_STATE__ = {
                ballCount: balls.length,
                collisionCount: collisionCount,
                balls: ballsState,
                totalKineticEnergy: totalKineticEnergy
            };
        }

        animate();
    </script>
</body>
</html>
