<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Rope Swing Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #88bbdd;
            font-family: monospace;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #aaddff;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .controls-line {
            margin: 5px 0;
            font-size: 12px;
            color: #ccc;
        }
        .slider-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
        }
        input[type=range] {
            width: 120px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="panel" id="hud">
            <h2>Simulation HUD</h2>
            <div class="hud-line">Tension: <span id="hud-tension">0.000</span></div>
            <div class="hud-line">Angle: <span id="hud-angle">0</span>&deg;</div>
            <div class="hud-line">Char Y: <span id="hud-char-y">0.00</span></div>
            <div class="hud-line">Attached: <span id="hud-attached">Yes</span></div>
            <div class="hud-line">Speed: <span id="hud-speed">0.00</span></div>
            <div class="hud-line">Model Loaded: <span id="hud-model">No</span></div>
            
            <div class="slider-container">
                <div class="slider-row">
                    <label for="slider-rope-length">Length</label>
                    <input type="range" id="slider-rope-length" min="2" max="8" step="0.5" value="5">
                </div>
                <div class="slider-row">
                    <label for="slider-damping">Damping</label>
                    <input type="range" id="slider-damping" min="0.9" max="1.0" step="0.005" value="0.99">
                </div>
            </div>
        </div>
        <div class="panel">
            <h2>Controls</h2>
            <div class="controls-line">[S] Start Swing</div>
            <div class="controls-line">[K] Kick Boost</div>
            <div class="controls-line">[L] Let Go</div>
            <div class="controls-line">[R] Reset</div>
            <div class="controls-line">[Space] Pause/Play</div>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State ---
        window.__3D_STATE__ = {
            maxTension: 0,
            swingAngle: 0,
            characterY: 0,
            isAttached: true,
            characterSpeed: 0,
            modelLoaded: false,
            ropeLength: 5,
            damping: 0.99,
            isPaused: false,
            frameCount: 0,
            ropeValid: true,
            segmentCount: 20
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x88bbdd);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(8, 6, 12);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 4, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x668877, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 8);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x44aa44, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Tree ---
        const treeGroup = new THREE.Group();
        
        // Trunk
        const trunkGeo = new THREE.CylinderGeometry(0.3, 0.3, 6, 16);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x664422 });
        const trunk = new THREE.Mesh(trunkGeo, trunkMat);
        trunk.position.y = 3;
        trunk.castShadow = true;
        trunk.receiveShadow = true;
        treeGroup.add(trunk);

        // Branch (from 0,6,0 to 3,7,0)
        const branchLength = Math.sqrt(3*3 + 1*1);
        const branchGeo = new THREE.CylinderGeometry(0.15, 0.15, branchLength, 12);
        const branch = new THREE.Mesh(branchGeo, trunkMat);
        branch.position.set(1.5, 6.5, 0);
        branch.rotation.z = -Math.atan2(1, 3);
        branch.castShadow = true;
        treeGroup.add(branch);

        // Foliage
        const leavesMat = new THREE.MeshStandardMaterial({ color: 0x338833 });
        const coneGeo = new THREE.ConeGeometry(2, 3, 16);
        const cone1 = new THREE.Mesh(coneGeo, leavesMat); cone1.position.set(0, 6.5, 0);
        const cone2 = new THREE.Mesh(coneGeo, leavesMat); cone2.position.set(-1.2, 5.5, 1.2);
        const cone3 = new THREE.Mesh(coneGeo, leavesMat); cone3.position.set(1.2, 5.5, -1.2);
        cone1.castShadow = true; cone2.castShadow = true; cone3.castShadow = true;
        treeGroup.add(cone1, cone2, cone3);
        
        scene.add(treeGroup);

        // --- Rope (Verlet Chain) ---
        const anchorPoint = new THREE.Vector3(3, 7, 0);
        const numSegments = 20;
        let ropeLength = 5;
        let segmentLength = ropeLength / numSegments;
        let damping = 0.99;
        const dt = 1/60;
        const gravity = new THREE.Vector3(0, -9.8, 0);
        
        const points = [];
        for (let i = 0; i <= numSegments; i++) {
            points.push({
                pos: new THREE.Vector3(anchorPoint.x, anchorPoint.y - i * segmentLength, anchorPoint.z),
                oldPos: new THREE.Vector3(anchorPoint.x, anchorPoint.y - i * segmentLength, anchorPoint.z)
            });
        }

        const ropeMat = new THREE.MeshStandardMaterial({ color: 0x886644, roughness: 0.9 });
        let ropeMesh = new THREE.Mesh(new THREE.BufferGeometry(), ropeMat);
        ropeMesh.castShadow = true;
        scene.add(ropeMesh);

        function updateRopeGeometry() {
            if (ropeMesh.geometry) ropeMesh.geometry.dispose();
            const curvePoints = points.map(p => p.pos);
            const curve = new THREE.CatmullRomCurve3(curvePoints);
            ropeMesh.geometry = new THREE.TubeGeometry(curve, numSegments * 2, 0.03, 8, false);
        }
        updateRopeGeometry();

        // --- Character ---
        const characterGroup = new THREE.Group();
        scene.add(characterGroup);
        let mixer = null;
        const clock = new THREE.Clock();
        
        let charPos = new THREE.Vector3();
        let charVelocity = new THREE.Vector3();
        let isAttached = true;

        const loader = new GLTFLoader();
        loader.load('soldier.glb', (gltf) => {
            const model = gltf.scene;
            
            // Scale to 1 unit tall
            const box = new THREE.Box3().setFromObject(model);
            const height = box.max.y - box.min.y;
            model.scale.setScalar(1.0 / height);
            
            // Shift down so hands (approx y=0.8 relative to height) are at origin
            model.position.y = -0.8;
            
            model.traverse(c => {
                if (c.isMesh) {
                    c.castShadow = true;
                    c.receiveShadow = true;
                }
            });
            
            characterGroup.add(model);
            window.__3D_STATE__.modelLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                mixer.clipAction(gltf.animations[0]).play();
            }
        }, undefined, (err) => {
            // Fallback procedural character
            const mat = new THREE.MeshStandardMaterial({ color: 0x224488 });
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
            
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.2), mat);
            body.position.y = -0.5;
            
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.15), skinMat);
            head.position.y = -0.1;
            
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), mat);
            armL.position.set(-0.25, -0.3, 0);
            armL.rotation.z = Math.PI / 6;
            
            const armR = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.5), mat);
            armR.position.set(0.25, -0.3, 0);
            armR.rotation.z = -Math.PI / 6;
            
            const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5), mat);
            legL.position.set(-0.1, -0.9, 0);
            
            const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5), mat);
            legR.position.set(0.1, -0.9, 0);

            [body, head, armL, armR, legL, legR].forEach(m => {
                m.castShadow = true;
                characterGroup.add(m);
            });
            
            window.__3D_STATE__.modelLoaded = false;
        });

        // --- Physics & Simulation ---
        let maxTension = 0;

        function simulate() {
            if (window.__3D_STATE__.isPaused) return;

            // Verlet Integration
            for (let i = 1; i <= numSegments; i++) {
                const p = points[i];
                const vel = new THREE.Vector3().subVectors(p.pos, p.oldPos);
                p.oldPos.copy(p.pos);
                p.pos.add(vel.multiplyScalar(damping)).add(gravity.clone().multiplyScalar(dt * dt));
            }

            maxTension = 0;

            // Distance Constraints (10 iterations)
            for (let iter = 0; iter < 10; iter++) {
                for (let i = 0; i < numSegments; i++) {
                    const p1 = points[i];
                    const p2 = points[i+1];
                    const delta = new THREE.Vector3().subVectors(p2.pos, p1.pos);
                    const dist = delta.length();
                    
                    if (dist > 0) {
                        const diff = dist - segmentLength;
                        const tension = Math.abs(diff) / segmentLength;
                        if (tension > maxTension) maxTension = tension;

                        // Stiffness 0.8
                        const correction = delta.normalize().multiplyScalar(diff * 0.5 * 0.8);
                        
                        if (i !== 0) p1.pos.add(correction);
                        p2.pos.sub(correction);
                    }
                }
                points[0].pos.copy(anchorPoint); // Pin anchor
            }

            // Character Logic
            if (isAttached) {
                const lastPoint = points[numSegments];
                charPos.copy(lastPoint.pos);
                characterGroup.position.copy(charPos);
                
                charVelocity.subVectors(lastPoint.pos, lastPoint.oldPos).divideScalar(dt);

                // Face swing direction
                if (charVelocity.lengthSq() > 0.1) {
                    const lookDir = charVelocity.clone().setY(0).normalize();
                    if (lookDir.lengthSq() > 0.01) {
                        characterGroup.rotation.y = Math.atan2(lookDir.x, lookDir.z);
                    }
                }
            } else {
                // Projectile motion
                charVelocity.add(gravity.clone().multiplyScalar(dt));
                charPos.add(charVelocity.clone().multiplyScalar(dt));
                
                // Ground collision
                if (charPos.y < 0.5) {
                    charPos.y = 0.5;
                    charVelocity.set(0, 0, 0);
                }
                characterGroup.position.copy(charPos);
            }

            // Update Rope Visuals
            updateRopeGeometry();
            const brown = new THREE.Color(0x886644);
            const red = new THREE.Color(0xff4444);
            const lerpFactor = Math.min(maxTension * 5, 1.0);
            ropeMesh.material.color.lerpColors(brown, red, lerpFactor);
        }

        // --- Controls ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 's' && isAttached) {
                // Start swing: push forward
                const vel = new THREE.Vector3(0, 0, -8);
                points[numSegments].oldPos.copy(points[numSegments].pos).sub(vel.multiplyScalar(dt));
            } else if (key === 'k' && isAttached) {
                // Kick boost
                const vel = new THREE.Vector3().subVectors(points[numSegments].pos, points[numSegments].oldPos).divideScalar(dt);
                if (vel.length() > 0.1) {
                    const boost = vel.normalize().multiplyScalar(3 * dt);
                    points[numSegments].oldPos.sub(boost);
                } else {
                    points[numSegments].oldPos.z += 3 * dt;
                }
            } else if (key === 'l' && isAttached) {
                isAttached = false;
            } else if (key === 'r') {
                isAttached = true;
                segmentLength = ropeLength / numSegments;
                for (let i = 0; i <= numSegments; i++) {
                    points[i].pos.set(anchorPoint.x, anchorPoint.y - i * segmentLength, anchorPoint.z);
                    points[i].oldPos.copy(points[i].pos);
                }
                charVelocity.set(0, 0, 0);
            } else if (key === ' ') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            }
        });

        document.getElementById('slider-rope-length').addEventListener('input', (e) => {
            ropeLength = parseFloat(e.target.value);
            segmentLength = ropeLength / numSegments;
            window.__3D_STATE__.ropeLength = ropeLength;
        });

        document.getElementById('slider-damping').addEventListener('input', (e) => {
            damping = parseFloat(e.target.value);
            window.__3D_STATE__.damping = damping;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (mixer && !window.__3D_STATE__.isPaused) mixer.update(delta);

            simulate();

            // Update State & HUD
            window.__3D_STATE__.frameCount++;
            
            const dx = points[numSegments].pos.x - anchorPoint.x;
            const dz = points[numSegments].pos.z - anchorPoint.z;
            const dy = anchorPoint.y - points[numSegments].pos.y;
            const horizontalDist = Math.sqrt(dx*dx + dz*dz);
            const swingAngle = Math.atan2(horizontalDist, dy) * (180 / Math.PI);

            let ropeValid = true;
            for (let p of points) {
                if (isNaN(p.pos.x) || isNaN(p.pos.y) || isNaN(p.pos.z)) {
                    ropeValid = false; break;
                }
            }

            window.__3D_STATE__.maxTension = Number(maxTension.toFixed(4));
            window.__3D_STATE__.swingAngle = Number(swingAngle.toFixed(1));
            window.__3D_STATE__.characterY = Number(charPos.y.toFixed(3));
            window.__3D_STATE__.isAttached = isAttached;
            window.__3D_STATE__.characterSpeed = Number(charVelocity.length().toFixed(3));
            window.__3D_STATE__.ropeValid = ropeValid;

            document.getElementById('hud-tension').innerText = window.__3D_STATE__.maxTension.toFixed(3);
            document.getElementById('hud-angle').innerText = Math.round(window.__3D_STATE__.swingAngle);
            document.getElementById('hud-char-y').innerText = window.__3D_STATE__.characterY.toFixed(2);
            document.getElementById('hud-attached').innerText = isAttached ? 'Yes' : 'No';
            document.getElementById('hud-speed').innerText = window.__3D_STATE__.characterSpeed.toFixed(2);
            document.getElementById('hud-model').innerText = window.__3D_STATE__.modelLoaded ? 'Yes' : 'No';

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
