<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Rope Swing Verlet Simulation</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #88bbdd;
    }
    #app {
      width: 100%;
      height: 100%;
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      min-width: 220px;
      z-index: 10;
    }
    #controls-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.85);
      color: #111;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
      min-width: 230px;
    }
    #controls-panel label {
      display: block;
      margin-bottom: 10px;
    }
    #controls-panel input[type="range"] {
      width: 100%;
    }
    .small {
      font-size: 12px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="hud">
    <div><strong>Rope Swing HUD</strong></div>
    <div>Tension: <span id="hud-tension">0.000</span></div>
    <div>Swing angle: <span id="hud-angle">0</span></div>
    <div>Character Y: <span id="hud-char-y">0.00</span></div>
    <div>Attached: <span id="hud-attached">Yes</span></div>
    <div>Speed: <span id="hud-speed">0.00</span></div>
    <div>Model loaded: <span id="hud-model">No</span></div>
  </div>

  <div id="controls-panel">
    <label>
      Rope Length: <span id="rope-length-value">5.0</span>
      <input id="slider-rope-length" type="range" min="2" max="8" step="0.5" value="5" />
    </label>
    <label>
      Damping: <span id="damping-value">0.990</span>
      <input id="slider-damping" type="range" min="0.9" max="1.0" step="0.005" value="0.99" />
    </label>
    <div><strong>Keys</strong></div>
    <div class="small">S: start swing</div>
    <div class="small">K: kick boost</div>
    <div class="small">L: let go</div>
    <div class="small">R: reset</div>
    <div class="small">Space: pause/play</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ------------------------------------------------------------
    // Basic setup
    // ------------------------------------------------------------
    const canvas = document.getElementById('app');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x88bbdd);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(8, 6, 12);
    camera.lookAt(0, 4, 0);

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4, 0);
    controls.enableDamping = true;

    // ------------------------------------------------------------
    // Lights
    // ------------------------------------------------------------
    const ambient = new THREE.AmbientLight(0x668877, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    // ------------------------------------------------------------
    // Ground
    // ------------------------------------------------------------
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ color: 0x44aa44 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    ground.position.y = 0;
    scene.add(ground);

    // ------------------------------------------------------------
    // Tree
    // ------------------------------------------------------------
    const treeGroup = new THREE.Group();
    treeGroup.position.set(0, 0, 0);
    scene.add(treeGroup);

    const trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.3, 0.35, 6, 16),
      new THREE.MeshStandardMaterial({ color: 0x664422 })
    );
    trunk.position.set(0, 3, 0);
    trunk.castShadow = true;
    trunk.receiveShadow = true;
    treeGroup.add(trunk);

    const branchStart = new THREE.Vector3(0, 6, 0);
    const branchEnd = new THREE.Vector3(3, 7, 0);
    const branchDir = new THREE.Vector3().subVectors(branchEnd, branchStart);
    const branchLen = branchDir.length();
    const branchMid = new THREE.Vector3().addVectors(branchStart, branchEnd).multiplyScalar(0.5);

    const branch = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.15, branchLen, 12),
      new THREE.MeshStandardMaterial({ color: 0x664422 })
    );
    branch.position.copy(branchMid);
    branch.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), branchDir.clone().normalize());
    branch.castShadow = true;
    branch.receiveShadow = true;
    treeGroup.add(branch);

    const foliageMaterial = new THREE.MeshStandardMaterial({ color: 0x338833 });
    const foliage1 = new THREE.Mesh(new THREE.ConeGeometry(2, 3, 16), foliageMaterial);
    const foliage2 = new THREE.Mesh(new THREE.ConeGeometry(1.7, 2.7, 16), foliageMaterial);
    const foliage3 = new THREE.Mesh(new THREE.ConeGeometry(1.4, 2.4, 16), foliageMaterial);
    foliage1.position.set(0, 7.0, 0);
    foliage2.position.set(-0.7, 6.5, 0.6);
    foliage3.position.set(0.8, 6.7, -0.5);
    [foliage1, foliage2, foliage3].forEach(f => {
      f.castShadow = true;
      f.receiveShadow = true;
      treeGroup.add(f);
    });

    // ------------------------------------------------------------
    // Rope / simulation state
    // ------------------------------------------------------------
    const SEGMENTS = 20;
    const DT = 1 / 60;
    const CONSTRAINT_ITERS = 10;
    const STIFFNESS = 0.8;
    const gravity = new THREE.Vector3(0, -9.81, 0);
    const anchor = branchEnd.clone();

    let ropeLength = 5.0;
    let segmentLength = ropeLength / SEGMENTS;
    let damping = 0.99;
    let paused = false;
    let frameCount = 0;

    const ropePoints = [];
    let ropeSpheres = [];
    let ropeLinkCylinders = [];
    let ropeTube = null;
    let ropeTubeMaterial = new THREE.MeshStandardMaterial({ color: 0x886644 });
    const ropeGroup = new THREE.Group();
    scene.add(ropeGroup);

    function createPoint(pos) {
      return {
        pos: pos.clone(),
        old: pos.clone(),
        pinned: false
      };
    }

    function initRope() {
      while (ropeGroup.children.length > 0) {
        const c = ropeGroup.children.pop();
        if (c.geometry) c.geometry.dispose();
        if (c.material) {
          if (Array.isArray(c.material)) c.material.forEach(m => m.dispose());
          else c.material.dispose();
        }
      }
      ropeSpheres = [];
      ropeLinkCylinders = [];
      ropePoints.length = 0;

      segmentLength = ropeLength / SEGMENTS;

      for (let i = 0; i <= SEGMENTS; i++) {
        const p = anchor.clone().add(new THREE.Vector3(0, -segmentLength * i, 0));
        const pt = createPoint(p);
        if (i === 0) pt.pinned = true;
        ropePoints.push(pt);
      }

      const sphereGeo = new THREE.SphereGeometry(0.03, 8, 8);
      const sphereMat = new THREE.MeshStandardMaterial({ color: 0x886644 });

      for (let i = 0; i <= SEGMENTS; i++) {
        const s = new THREE.Mesh(sphereGeo, sphereMat);
        s.castShadow = true;
        s.receiveShadow = true;
        ropeGroup.add(s);
        ropeSpheres.push(s);
      }

      const cylGeo = new THREE.CylinderGeometry(0.015, 0.015, 1, 6);
      const cylMat = new THREE.MeshStandardMaterial({ color: 0x886644 });

      for (let i = 0; i < SEGMENTS; i++) {
        const c = new THREE.Mesh(cylGeo, cylMat);
        c.castShadow = true;
        c.receiveShadow = true;
        ropeGroup.add(c);
        ropeLinkCylinders.push(c);
      }

      rebuildTube();
      updateRopeVisuals();
    }

    function rebuildTube() {
      if (ropeTube) {
        ropeGroup.remove(ropeTube);
        ropeTube.geometry.dispose();
        ropeTube.material.dispose();
      }
      const curve = new THREE.CatmullRomCurve3(ropePoints.map(p => p.pos.clone()));
      const tubularSegments = Math.max(60, SEGMENTS * 6);
      const geom = new THREE.TubeGeometry(curve, tubularSegments, 0.03, 8, false);
      ropeTubeMaterial = new THREE.MeshStandardMaterial({ color: 0x886644 });
      ropeTube = new THREE.Mesh(geom, ropeTubeMaterial);
      ropeTube.castShadow = true;
      ropeTube.receiveShadow = true;
      ropeGroup.add(ropeTube);
    }

    function updateTubeColor(maxTension) {
      const low = new THREE.Color(0x886644);
      const high = new THREE.Color(0xff4444);
      const t = THREE.MathUtils.clamp(maxTension * 10.0, 0, 1);
      ropeTubeMaterial.color.copy(low).lerp(high, t);
    }

    function updateRopeVisuals() {
      for (let i = 0; i <= SEGMENTS; i++) {
        ropeSpheres[i].position.copy(ropePoints[i].pos);
      }

      for (let i = 0; i < SEGMENTS; i++) {
        const a = ropePoints[i].pos;
        const b = ropePoints[i + 1].pos;
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        const dir = new THREE.Vector3().subVectors(b, a);
        const len = dir.length();

        const c = ropeLinkCylinders[i];
        c.position.copy(mid);
        c.scale.set(1, len, 1);
        c.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      }

      const curve = new THREE.CatmullRomCurve3(ropePoints.map(p => p.pos.clone()));
      const newGeom = new THREE.TubeGeometry(curve, Math.max(60, SEGMENTS * 6), 0.03, 8, false);
      ropeTube.geometry.dispose();
      ropeTube.geometry = newGeom;
    }

    function simulateRope() {
      for (let i = 1; i <= SEGMENTS; i++) {
        const p = ropePoints[i];
        const current = p.pos.clone();
        const vel = p.pos.clone().sub(p.old).multiplyScalar(damping);
        p.pos.add(vel).add(gravity.clone().multiplyScalar(DT * DT));

        if (p.pos.y < 0.03) p.pos.y = 0.03;

        p.old.copy(current);
      }

      ropePoints[0].pos.copy(anchor);
      ropePoints[0].old.copy(anchor);

      for (let iter = 0; iter < CONSTRAINT_ITERS; iter++) {
        ropePoints[0].pos.copy(anchor);

        for (let i = 0; i < SEGMENTS; i++) {
          const p1 = ropePoints[i];
          const p2 = ropePoints[i + 1];
          const delta = new THREE.Vector3().subVectors(p2.pos, p1.pos);
          let dist = delta.length();
          if (dist === 0) dist = 1e-8;
          const diff = (dist - segmentLength) / dist;
          const correction = delta.multiplyScalar(0.5 * STIFFNESS * diff);

          if (!p1.pinned && !p2.pinned) {
            p1.pos.add(correction);
            p2.pos.sub(correction);
          } else if (p1.pinned && !p2.pinned) {
            p2.pos.sub(delta.clone().multiplyScalar(STIFFNESS * diff));
          } else if (!p1.pinned && p2.pinned) {
            p1.pos.add(delta.clone().multiplyScalar(STIFFNESS * diff));
          }

          if (!p1.pinned && p1.pos.y < 0.03) p1.pos.y = 0.03;
          if (!p2.pinned && p2.pos.y < 0.03) p2.pos.y = 0.03;
        }
      }

      ropePoints[0].pos.copy(anchor);
    }

    function ropeMaxTension() {
      let maxT = 0;
      for (let i = 0; i < SEGMENTS; i++) {
        const len = ropePoints[i].pos.distanceTo(ropePoints[i + 1].pos);
        const tension = Math.abs(len - segmentLength) / segmentLength;
        if (tension > maxT) maxT = tension;
      }
      return maxT;
    }

    function ropeValid() {
      for (const p of ropePoints) {
        if (!Number.isFinite(p.pos.x) || !Number.isFinite(p.pos.y) || !Number.isFinite(p.pos.z)) return false;
      }
      return true;
    }

    // ------------------------------------------------------------
    // Character
    // ------------------------------------------------------------
    const characterRoot = new THREE.Group();
    scene.add(characterRoot);

    let characterVisual = null;
    let mixer = null;
    let modelLoaded = false;

    const fallbackChar = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.22, 0.8, 6, 12),
      new THREE.MeshStandardMaterial({ color: 0x3355aa })
    );
    fallbackChar.castShadow = true;
    fallbackChar.receiveShadow = true;
    characterRoot.add(fallbackChar);

    const handOffset = new THREE.Vector3(0, -0.5, 0); // root below hands
    let attached = true;
    let startedSwing = false;

    let freeVelocity = new THREE.Vector3(0, 0, 0);
    let prevCharacterPos = new THREE.Vector3();
    let characterSpeed = 0;

    function setCharacterRootFromAttachment() {
      const attachPos = ropePoints[SEGMENTS].pos.clone();
      characterRoot.position.copy(attachPos.clone().sub(handOffset));
    }

    function orientCharacterFacingMotion(velocityVec) {
      const v = velocityVec.clone();
      v.y = 0;
      if (v.lengthSq() > 1e-6) {
        const yaw = Math.atan2(v.x, v.z);
        characterRoot.rotation.set(0, yaw, 0);
      }
    }

    setCharacterRootFromAttachment();
    prevCharacterPos.copy(characterRoot.position);

    const loader = new GLTFLoader();
    loader.load(
      'soldier.glb',
      (gltf) => {
        if (characterVisual) characterRoot.remove(characterVisual);

        characterVisual = gltf.scene;
        const box = new THREE.Box3().setFromObject(characterVisual);
        const size = new THREE.Vector3();
        box.getSize(size);
        const height = Math.max(size.y, 0.001);
        const scale = 1.0 / height;
        characterVisual.scale.setScalar(scale);

        box.setFromObject(characterVisual);
        const center = new THREE.Vector3();
        box.getCenter(center);

        characterVisual.position.sub(center);
        characterVisual.position.y += 0.5;

        characterVisual.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        fallbackChar.visible = false;
        characterRoot.add(characterVisual);
        modelLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(characterVisual);
          const idleAction = mixer.clipAction(gltf.animations[0]);
          idleAction.play();
        }
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    function getAttachmentVelocity() {
      const p = ropePoints[SEGMENTS].pos.clone();
      const po = ropePoints[SEGMENTS].old.clone();
      return p.sub(po).multiplyScalar(1 / DT);
    }

    function startSwing() {
      if (!attached) return;
      ropePoints[SEGMENTS].old.sub(new THREE.Vector3(0, 0, -8).multiplyScalar(DT));
      startedSwing = true;
    }

    function kickSwing() {
      if (!attached) return;
      const bottom = ropePoints[SEGMENTS].pos.clone();
      const radial = bottom.clone().sub(anchor).normalize();
      const vel = getAttachmentVelocity();
      let tangent = vel.clone().sub(radial.clone().multiplyScalar(vel.dot(radial)));

      if (tangent.lengthSq() < 1e-8) {
        tangent = new THREE.Vector3(0, 0, -1);
      } else {
        tangent.normalize();
      }

      const boost = tangent.multiplyScalar(3);
      ropePoints[SEGMENTS].old.sub(boost.clone().multiplyScalar(DT));
    }

    function letGo() {
      if (!attached) return;
      attached = false;
      const attachPos = ropePoints[SEGMENTS].pos.clone();
      const attachVel = getAttachmentVelocity();

      characterRoot.position.copy(attachPos.clone().sub(handOffset));
      freeVelocity.copy(attachVel);
      prevCharacterPos.copy(characterRoot.position);
    }

    function resetSimulation() {
      attached = true;
      startedSwing = false;
      freeVelocity.set(0, 0, 0);
      initRope();
      setCharacterRootFromAttachment();
      prevCharacterPos.copy(characterRoot.position);
      characterRoot.rotation.set(0, 0, 0);
    }

    // ------------------------------------------------------------
    // UI
    // ------------------------------------------------------------
    const hudTension = document.getElementById('hud-tension');
    const hudAngle = document.getElementById('hud-angle');
    const hudCharY = document.getElementById('hud-char-y');
    const hudAttached = document.getElementById('hud-attached');
    const hudSpeed = document.getElementById('hud-speed');
    const hudModel = document.getElementById('hud-model');

    const ropeSlider = document.getElementById('slider-rope-length');
    const dampingSlider = document.getElementById('slider-damping');
    const ropeLengthValue = document.getElementById('rope-length-value');
    const dampingValue = document.getElementById('damping-value');

    ropeSlider.addEventListener('input', () => {
      ropeLength = parseFloat(ropeSlider.value);
      ropeLengthValue.textContent = ropeLength.toFixed(1);
      resetSimulation();
    });

    dampingSlider.addEventListener('input', () => {
      damping = parseFloat(dampingSlider.value);
      dampingValue.textContent = damping.toFixed(3);
    });

    ropeLengthValue.textContent = ropeLength.toFixed(1);
    dampingValue.textContent = damping.toFixed(3);

    // ------------------------------------------------------------
    // Input
    // ------------------------------------------------------------
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
      }
      if (e.key === 's' || e.key === 'S') startSwing();
      if (e.key === 'k' || e.key === 'K') kickSwing();
      if (e.key === 'l' || e.key === 'L') letGo();
      if (e.key === 'r' || e.key === 'R') resetSimulation();
    });

    // ------------------------------------------------------------
    // State exposure
    // ------------------------------------------------------------
    window.__3D_STATE__ = {
      maxTension: 0,
      swingAngle: 0,
      characterY: 0,
      isAttached: true,
      characterSpeed: 0,
      modelLoaded: false,
      ropeLength: ropeLength,
      damping: damping,
      isPaused: paused,
      frameCount: frameCount,
      ropeValid: true,
      segmentCount: SEGMENTS
    };

    function updateState(maxTension, swingAngleDeg, charY) {
      window.__3D_STATE__ = {
        maxTension: Number(maxTension.toFixed(4)),
        swingAngle: Number(swingAngleDeg.toFixed(1)),
        characterY: Number(charY.toFixed(3)),
        isAttached: attached,
        characterSpeed: Number(characterSpeed.toFixed(3)),
        modelLoaded: modelLoaded,
        ropeLength: ropeLength,
        damping: damping,
        isPaused: paused,
        frameCount: frameCount,
        ropeValid: ropeValid(),
        segmentCount: SEGMENTS
      };
    }

    // ------------------------------------------------------------
    // Init
    // ------------------------------------------------------------
    initRope();

    // ------------------------------------------------------------
    // Animation loop
    // ------------------------------------------------------------
    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      controls.update();

      if (!paused) {
        if (attached) {
          simulateRope();
          setCharacterRootFromAttachment();

          const attachVel = getAttachmentVelocity();
          characterSpeed = attachVel.length();
          orientCharacterFacingMotion(attachVel);

          prevCharacterPos.copy(characterRoot.position);
        } else {
          freeVelocity.add(gravity.clone().multiplyScalar(DT));
          characterRoot.position.add(freeVelocity.clone().multiplyScalar(DT));

          if (characterRoot.position.y < 0.5) {
            characterRoot.position.y = 0.5;
            freeVelocity.set(0, 0, 0);
          }

          characterSpeed = freeVelocity.length();
          orientCharacterFacingMotion(freeVelocity);
          prevCharacterPos.copy(characterRoot.position);
        }

        if (mixer) mixer.update(DT);

        updateRopeVisuals();
      }

      const maxTension = ropeMaxTension();
      updateTubeColor(maxTension);

      const ropeVector = ropePoints[SEGMENTS].pos.clone().sub(anchor);
      const vertical = new THREE.Vector3(0, -1, 0);
      let swingAngle = 0;
      if (ropeVector.lengthSq() > 1e-8) {
        swingAngle = THREE.MathUtils.radToDeg(ropeVector.angleTo(vertical));
      }

      const charY = characterRoot.position.y;

      hudTension.textContent = maxTension.toFixed(3);
      hudAngle.textContent = Math.round(swingAngle).toString();
      hudCharY.textContent = charY.toFixed(2);
      hudAttached.textContent = attached ? 'Yes' : 'No';
      hudSpeed.textContent = characterSpeed.toFixed(2);
      hudModel.textContent = modelLoaded ? 'Yes' : 'No';

      updateState(maxTension, swingAngle, charY);

      renderer.render(scene, camera);
    }
    animate();

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
