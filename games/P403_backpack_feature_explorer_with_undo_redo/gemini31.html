<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backpack Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #title-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            margin: 0;
            font-size: 24px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .ui-container {
            position: absolute;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        #top-left {
            top: 20px;
            left: 20px;
        }
        #top-right {
            top: 20px;
            right: 20px;
        }
        button {
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: bold;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: background 0.2s, transform 0.1s;
        }
        button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
        }
        button:active:not(:disabled) {
            transform: scale(0.95);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .color-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            padding: 0;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        #info-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translate(-50%, 0);
            background: rgba(15, 15, 25, 0.85);
            color: white;
            padding: 20px 30px;
            border-radius: 8px;
            text-align: center;
            min-width: 250px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            pointer-events: none;
        }
        #info-panel.hidden {
            transform: translate(-50%, 50px);
            opacity: 0;
        }
        #info-panel h2 {
            margin: 0 0 8px 0;
            font-size: 20px;
            color: #fff;
        }
        #info-panel p {
            margin: 0;
            font-size: 14px;
            color: #ccc;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <h1 id="title-text">Backpack Explorer</h1>
    
    <div id="top-left" class="ui-container">
        <button id="btn-undo" disabled>Undo</button>
        <button id="btn-redo" disabled>Redo</button>
        <button id="btn-spin">Spin: OFF</button>
    </div>
    
    <div id="top-right" class="ui-container">
        <button id="color-navy" class="color-swatch" style="background: #1a237e;" data-color="#1a237e"></button>
        <button id="color-forest" class="color-swatch" style="background: #1b5e20;" data-color="#1b5e20"></button>
        <button id="color-crimson" class="color-swatch" style="background: #b71c1c;" data-color="#b71c1c"></button>
        <button id="color-charcoal" class="color-swatch" style="background: #424242;" data-color="#424242"></button>
    </div>

    <div id="info-panel" class="hidden">
        <h2 id="info-title">Feature Name</h2>
        <p id="info-desc">Feature description goes here.</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        const state = {
            modelLoaded: false,
            currentColor: '#1a237e',
            selectedFeature: null,
            featureName: '',
            spinEnabled: false
        };

        window.__3D_STATE__ = {
            modelLoaded: false,
            currentColor: state.currentColor,
            selectedFeature: null,
            featureName: '',
            historyLength: 0,
            redoLength: 0,
            spinEnabled: false,
            hotspotCount: 5,
            undoDisabled: true,
            redoDisabled: true,
            modelRotationY: 0,
            infoPanelVisible: false
        };

        // --- Undo/Redo System ---
        class Command {
            execute() {}
            undo() {}
        }

        class ColorCommand extends Command {
            constructor(newColor) {
                super();
                this.newColor = newColor;
                this.oldColor = state.currentColor;
            }
            execute() { applyColor(this.newColor); }
            undo() { applyColor(this.oldColor); }
        }

        class FeatureCommand extends Command {
            constructor(newFeatureId) {
                super();
                this.newFeatureId = newFeatureId;
                this.oldFeatureId = state.selectedFeature;
            }
            execute() { applyFeature(this.newFeatureId); }
            undo() { applyFeature(this.oldFeatureId); }
        }

        const history = [];
        const redoStack = [];
        const MAX_HISTORY = 20;

        function executeCommand(cmd) {
            cmd.execute();
            history.push(cmd);
            if (history.length > MAX_HISTORY) history.shift();
            redoStack.length = 0;
            updateUI();
        }

        function undo() {
            if (history.length === 0) return;
            const cmd = history.pop();
            cmd.undo();
            redoStack.push(cmd);
            updateUI();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const cmd = redoStack.pop();
            cmd.execute();
            history.push(cmd);
            updateUI();
        }

        function updateUI() {
            document.getElementById('btn-undo').disabled = history.length === 0;
            document.getElementById('btn-redo').disabled = redoStack.length === 0;
        }

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // Ground Plane
        const groundGeom = new THREE.CircleGeometry(3, 32);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Model Group (holds model and hotspots)
        const modelGroup = new THREE.Group();
        scene.add(modelGroup);

        let mainMesh = null;

        // Load Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2 / maxDim;

            model.position.sub(center);
            model.scale.setScalar(scale);

            // Find mesh to apply colors
            model.traverse((child) => {
                if (child.isMesh) {
                    mainMesh = child;
                    mainMesh.material = mainMesh.material.clone();
                    mainMesh.material.color.set(state.currentColor);
                }
            });

            modelGroup.add(model);
            state.modelLoaded = true;
        });

        // Hotspots
        const hotspotsData = [
            { id: 1, name: 'Padded Straps', desc: 'Ergonomic support for heavy loads.', pos: [0.5, 1.5, 0.3], color: 0xff4444 },
            { id: 2, name: 'Main Compartment', desc: 'Spacious 30L capacity.', pos: [0, 1.0, 0.5], color: 0x44ff44 },
            { id: 3, name: 'Side Pocket', desc: 'Quick access for essentials.', pos: [-0.7, 0.8, 0.2], color: 0x4444ff },
            { id: 4, name: 'Laptop Sleeve', desc: 'Fits up to 15-inch laptops.', pos: [0, 1.2, -0.4], color: 0xffff44 },
            { id: 5, name: 'Water Bottle Holder', desc: 'Stretch mesh pocket.', pos: [0.7, 0.6, 0.3], color: 0x44ffff }
        ];

        const hotspots = [];
        const hotspotGeom = new THREE.SphereGeometry(0.08, 32, 32);

        hotspotsData.forEach(data => {
            const mat = new THREE.MeshBasicMaterial({ color: data.color });
            const mesh = new THREE.Mesh(hotspotGeom, mat);
            mesh.position.set(...data.pos);
            mesh.userData = data;
            modelGroup.add(mesh);
            hotspots.push(mesh);
        });

        // --- Application Logic ---
        function applyColor(hex) {
            state.currentColor = hex;
            if (mainMesh) {
                mainMesh.material.color.set(hex);
            }
        }

        let rotationTween = null;

        function applyFeature(featureId) {
            state.selectedFeature = featureId;
            const panel = document.getElementById('info-panel');

            if (featureId === null) {
                state.featureName = '';
                panel.classList.add('hidden');
                rotationTween = null;
            } else {
                const data = hotspotsData.find(h => h.id === featureId);
                state.featureName = data.name;
                document.getElementById('info-title').innerText = data.name;
                document.getElementById('info-desc').innerText = data.desc;
                panel.classList.remove('hidden');

                // Calculate rotation to face camera (+Z axis)
                const hx = data.pos[0];
                const hz = data.pos[2];
                const targetAngle = Math.atan2(hx, hz);
                
                let currentY = modelGroup.rotation.y % (2 * Math.PI);
                if (currentY > Math.PI) currentY -= 2 * Math.PI;
                if (currentY < -Math.PI) currentY += 2 * Math.PI;

                let diff = -targetAngle - currentY;
                while (diff < -Math.PI) diff += 2 * Math.PI;
                while (diff > Math.PI) diff -= 2 * Math.PI;

                rotationTween = {
                    start: modelGroup.rotation.y,
                    end: modelGroup.rotation.y + diff,
                    startTime: performance.now(),
                    duration: 500
                };
            }
        }

        // --- Event Listeners ---
        
        // Color Swatches
        document.querySelectorAll('.color-swatch').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const color = e.target.getAttribute('data-color');
                if (color !== state.currentColor) {
                    executeCommand(new ColorCommand(color));
                }
            });
        });

        // Undo / Redo Buttons
        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);

        // Keyboard Shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey || e.metaKey) {
                if (e.key === 'z') {
                    e.preventDefault();
                    undo();
                } else if (e.key === 'y') {
                    e.preventDefault();
                    redo();
                }
            }
        });

        // Spin Toggle
        const btnSpin = document.getElementById('btn-spin');
        btnSpin.addEventListener('click', () => {
            state.spinEnabled = !state.spinEnabled;
            btnSpin.innerText = `Spin: ${state.spinEnabled ? 'ON' : 'OFF'}`;
        });

        // Raycasting for Hotspots
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.closest('#info-panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(hotspots);
            
            if (intersects.length > 0) {
                const clickedId = intersects[0].object.userData.id;
                if (state.selectedFeature !== clickedId) {
                    executeCommand(new FeatureCommand(clickedId));
                }
            } else if (state.selectedFeature !== null) {
                executeCommand(new FeatureCommand(null));
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = performance.now();

            // Update Hotspots
            hotspots.forEach(h => {
                if (state.selectedFeature === h.userData.id) {
                    h.scale.setScalar(1.5);
                } else {
                    const s = 1.0 + 0.2 * Math.sin(time * 0.005);
                    h.scale.setScalar(s);
                }
            });

            // Update Rotation
            if (rotationTween) {
                const elapsed = time - rotationTween.startTime;
                const t = Math.min(elapsed / rotationTween.duration, 1.0);
                const easeT = 1 - Math.pow(1 - t, 3); // cubic ease out
                modelGroup.rotation.y = rotationTween.start + (rotationTween.end - rotationTween.start) * easeT;
                if (t >= 1.0) rotationTween = null;
            } else if (state.spinEnabled) {
                modelGroup.rotation.y += 0.5 * delta;
            }

            controls.update();
            renderer.render(scene, camera);

            // Update Global State
            window.__3D_STATE__.modelLoaded = state.modelLoaded;
            window.__3D_STATE__.currentColor = state.currentColor;
            window.__3D_STATE__.selectedFeature = state.selectedFeature;
            window.__3D_STATE__.featureName = state.featureName;
            window.__3D_STATE__.historyLength = history.length;
            window.__3D_STATE__.redoLength = redoStack.length;
            window.__3D_STATE__.spinEnabled = state.spinEnabled;
            window.__3D_STATE__.undoDisabled = history.length === 0;
            window.__3D_STATE__.redoDisabled = redoStack.length === 0;
            window.__3D_STATE__.modelRotationY = modelGroup.rotation.y;
            window.__3D_STATE__.infoPanelVisible = state.selectedFeature !== null;
        }

        animate();
    </script>
</body>
</html>
