<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backpack Feature Explorer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
}

canvas {
    display: block;
}

#title-text {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 10;
}

#controls-left {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
}

#controls-left button {
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    border: none;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    transition: all 0.2s ease;
}

#controls-left button:hover:not(:disabled) {
    background: rgba(255,255,255,0.3);
}

#controls-left button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
}

#btn-spin {
    background: rgba(255,255,255,0.15) !important;
}

#btn-spin.active {
    background: rgba(100, 200, 255, 0.4) !important;
    box-shadow: 0 0 10px rgba(100, 200, 255, 0.3);
}

#color-swatches {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
}

.color-swatch {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid rgba(255,255,255,0.3);
    transition: all 0.2s ease;
    padding: 0;
}

.color-swatch:hover {
    transform: scale(1.15);
    border-color: rgba(255,255,255,0.8);
}

.color-swatch.active {
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.5);
}

#info-panel {
    position: absolute;
    bottom: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(15px);
    color: #fff;
    padding: 20px 40px;
    border-radius: 12px 12px 0 0;
    text-align: center;
    transition: bottom 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
    min-width: 300px;
}

#info-panel.visible {
    bottom: 0;
}

#info-panel h3 {
    font-size: 18px;
    margin-bottom: 6px;
    color: #64ffda;
}

#info-panel p {
    font-size: 14px;
    color: #ccc;
    line-height: 1.4;
}

#loading-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: #fff;
    font-size: 20px;
    transition: opacity 0.5s ease;
}

#loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="loading-overlay">Loading 3D Model...</div>

<div id="title-text">Backpack Explorer</div>

<div id="controls-left">
    <button id="btn-undo" disabled>↩ Undo</button>
    <button id="btn-redo" disabled>↪ Redo</button>
    <button id="btn-spin">🔄 Spin</button>
</div>

<div id="color-swatches">
    <button class="color-swatch active" id="color-navy" style="background-color: #1a237e;" title="Navy"></button>
    <button class="color-swatch" id="color-forest" style="background-color: #1b5e20;" title="Forest"></button>
    <button class="color-swatch" id="color-crimson" style="background-color: #b71c1c;" title="Crimson"></button>
    <button class="color-swatch" id="color-charcoal" style="background-color: #424242;" title="Charcoal"></button>
</div>

<div id="info-panel">
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 7);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Ground plane
const groundGeometry = new THREE.CircleGeometry(3, 64);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// State
let modelLoaded = false;
let currentColor = '#1a237e';
let selectedFeature = null;
let featureName = '';
let spinEnabled = false;
let modelGroup = new THREE.Group();
scene.add(modelGroup);

let modelMaterials = [];
let modelObject = null;

// History
let historyStack = [];
let redoStack = [];
const MAX_HISTORY = 20;

// Hotspot data
const hotspotsData = [
    { name: 'Padded Straps', position: new THREE.Vector3(0.5, 1.5, 0.3), color: 0xff4444, description: 'Ergonomically designed padded straps distribute weight evenly across your shoulders for all-day comfort.' },
    { name: 'Main Compartment', position: new THREE.Vector3(0, 1.0, 0.5), color: 0x44ff44, description: 'Spacious 30L main compartment with internal organizer pockets for books, clothes, and gear.' },
    { name: 'Side Pocket', position: new THREE.Vector3(-0.7, 0.8, 0.2), color: 0x4444ff, description: 'Quick-access side pocket with secure zipper, perfect for snacks, chargers, or small accessories.' },
    { name: 'Laptop Sleeve', position: new THREE.Vector3(0, 1.2, -0.4), color: 0xffff44, description: 'Padded laptop sleeve fits up to 15.6" laptops with soft fleece lining for scratch protection.' },
    { name: 'Water Bottle Holder', position: new THREE.Vector3(0.7, 0.6, 0.3), color: 0x44ffff, description: 'Elastic mesh water bottle holder accommodates bottles up to 32oz with secure grip.' }
];

const hotspotMeshes = [];

// Create hotspots
hotspotsData.forEach((data, index) => {
    const geometry = new THREE.SphereGeometry(0.08, 16, 16);
    const material = new THREE.MeshStandardMaterial({
        color: data.color,
        emissive: data.color,
        emissiveIntensity: 0.5,
        roughness: 0.3,
        metalness: 0.1
    });
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(data.position);
    mesh.userData = { hotspotIndex: index + 1, name: data.name, description: data.description };
    scene.add(mesh);
    hotspotMeshes.push(mesh);
});

// Load model
const loader = new GLTFLoader();
loader.load(
    'Duck.glb',
    (gltf) => {
        const model = gltf.scene;
        
        // Compute bounding box and scale
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);
        
        // Center model
        const boxAfter = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        boxAfter.getCenter(center);
        model.position.sub(center);
        model.position.y -= boxAfter.min.y - center.y; // Place on ground
        
        // Recalculate to ensure it's on ground
        const boxFinal = new THREE.Box3().setFromObject(model);
        model.position.y -= boxFinal.min.y;
        
        modelGroup.add(model);
        modelObject = model;
        
        // Collect materials
        model.traverse((child) => {
            if (child.isMesh && child.material) {
                const mats = Array.isArray(child.material) ? child.material : [child.material];
                mats.forEach(m => {
                    if (!modelMaterials.includes(m)) {
                        modelMaterials.push(m);
                    }
                });
            }
        });
        
        // Apply default color
        applyColor(currentColor);
        
        modelLoaded = true;
        document.getElementById('loading-overlay').classList.add('hidden');
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loading-overlay').textContent = 'Error loading model. Please ensure Duck.glb is available.';
    }
);

// Apply color to model
function applyColor(hexColor) {
    const color = new THREE.Color(hexColor);
    modelMaterials.forEach(mat => {
        mat.color.copy(color);
    });
    currentColor = hexColor;
    
    // Update swatch active state
    document.querySelectorAll('.color-swatch').forEach(btn => btn.classList.remove('active'));
    const colorMap = {
        '#1a237e': 'color-navy',
        '#1b5e20': 'color-forest',
        '#b71c1c': 'color-crimson',
        '#424242': 'color-charcoal'
    };
    const activeId = colorMap[hexColor];
    if (activeId) {
        document.getElementById(activeId).classList.add('active');
    }
}

// Feature selection
let rotationTween = null;

function selectFeature(index) {
    // index is 1-5, or null to deselect
    // Reset all hotspots
    hotspotMeshes.forEach((mesh, i) => {
        mesh.userData.selected = false;
    });
    
    if (index !== null && index >= 1 && index <= 5) {
        const hotspot = hotspotMeshes[index - 1];
        hotspot.userData.selected = true;
        selectedFeature = index;
        featureName = hotspot.userData.name;
        
        // Show info panel
        document.getElementById('info-title').textContent = hotspot.userData.name;
        document.getElementById('info-desc').textContent = hotspot.userData.description;
        document.getElementById('info-panel').classList.add('visible');
        
        // Rotate model to face hotspot toward camera
        const hotspotPos = hotspot.position.clone();
        const cameraPos = camera.position.clone();
        
        // Calculate target rotation
        const dirToCamera = new THREE.Vector3(cameraPos.x, 0, cameraPos.z).normalize();
        const hotspotDir = new THREE.Vector3(hotspotPos.x, 0, hotspotPos.z).normalize();
        
        if (hotspotDir.length() > 0.01) {
            const angle = Math.atan2(dirToCamera.x, dirToCamera.z) - Math.atan2(hotspotDir.x, hotspotDir.z);
            startRotationTween(modelGroup.rotation.y, modelGroup.rotation.y + angle, 500);
        }
    } else {
        selectedFeature = null;
        featureName = '';
        document.getElementById('info-panel').classList.remove('visible');
    }
}

let tweenStart = null;
let tweenFrom = 0;
let tweenTo = 0;
let tweenDuration = 0;
let tweenActive = false;

function startRotationTween(from, to, duration) {
    tweenFrom = from;
    tweenTo = to;
    tweenDuration = duration;
    tweenStart = performance.now();
    tweenActive = true;
}

// Undo/Redo
function pushAction(action) {
    historyStack.push(action);
    if (historyStack.length > MAX_HISTORY) {
        historyStack.shift();
    }
    redoStack = [];
    updateButtons();
}

function undo() {
    if (historyStack.length === 0) return;
    const action = historyStack.pop();
    redoStack.push(action);
    
    if (action.type === 'color') {
        applyColor(action.prevColor);
    } else if (action.type === 'feature') {
        selectFeature(action.prevFeature);
    }
    
    updateButtons();
}

function redo() {
    if (redoStack.length === 0) return;
    const action = redoStack.pop();
    historyStack.push(action);
    
    if (action.type === 'color') {
        applyColor(action.newColor);
    } else if (action.type === 'feature') {
        selectFeature(action.newFeature);
    }
    
    updateButtons();
}

function updateButtons() {
    const undoBtn = document.getElementById('btn-undo');
    const redoBtn = document.getElementById('btn-redo');
    undoBtn.disabled = historyStack.length === 0;
    redoBtn.disabled = redoStack.length === 0;
}

// Event listeners
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);

document.getElementById('btn-spin').addEventListener('click', () => {
    spinEnabled = !spinEnabled;
    document.getElementById('btn-spin').classList.toggle('active', spinEnabled);
});

// Color swatches
const colorButtons = [
    { id: 'color-navy', color: '#1a237e' },
    { id: 'color-forest', color: '#1b5e20' },
    { id: 'color-crimson', color: '#b71c1c' },
    { id: 'color-charcoal', color: '#424242' }
];

colorButtons.forEach(({ id, color }) => {
    document.getElementById(id).addEventListener('click', () => {
        if (currentColor === color) return;
        const prevColor = currentColor;
        pushAction({ type: 'color', prevColor, newColor: color });
        applyColor(color);
    });
});

// Raycasting for hotspot clicks
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(hotspotMeshes);
    
    if (intersects.length > 0) {
        const hitMesh = intersects[0].object;
        const newFeature = hitMesh.userData.hotspotIndex;
        const prevFeature = selectedFeature;
        
        if (newFeature !== prevFeature) {
            pushAction({ type: 'feature', prevFeature, newFeature });
            selectFeature(newFeature);
        }
    }
});

// Keyboard shortcuts
document.addEventListener('keydown', (event) => {
    if (event.ctrlKey && event.key === 'z') {
        event.preventDefault();
        undo();
    } else if (event.ctrlKey && event.key === 'y') {
        event.preventDefault();
        redo();
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// State object
window.__3D_STATE__ = {};

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const time = clock.getElapsedTime();
    const delta = clock.getDelta();
    
    // Hotspot pulsing
    hotspotMeshes.forEach((mesh, i) => {
        if (mesh.userData.selected) {
            mesh.scale.setScalar(1.5);
        } else {
            const pulse = 0.8 + 0.4 * (0.5 + 0.5 * Math.sin(time * 3 + i * 1.2));
            mesh.scale.setScalar(pulse);
        }
    });
    
    // Rotation tween
    if (tweenActive) {
        const elapsed = performance.now() - tweenStart;
        const t = Math.min(elapsed / tweenDuration, 1);
        // Ease in-out
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        modelGroup.rotation.y = tweenFrom + (tweenTo - tweenFrom) * eased;
        if (t >= 1) {
            tweenActive = false;
        }
    }
    
    // Auto spin
    if (spinEnabled && !tweenActive) {
        modelGroup.rotation.y += 0.5 * (1 / 60); // Approximate per frame at 60fps
    }
    
    controls.update();
    renderer.render(scene, camera);
    
    // Update state
    const undoBtn = document.getElementById('btn-undo');
    const redoBtn = document.getElementById('btn-redo');
    const infoPanel = document.getElementById('info-panel');
    
    window.__3D_STATE__ = {
        modelLoaded: modelLoaded,
        currentColor: currentColor,
        selectedFeature: selectedFeature,
        featureName: featureName,
        historyLength: historyStack.length,
        redoLength: redoStack.length,
        spinEnabled: spinEnabled,
        hotspotCount: hotspotMeshes.length,
        undoDisabled: undoBtn.disabled,
        redoDisabled: redoBtn.disabled,
        modelRotationY: modelGroup.rotation.y,
        infoPanelVisible: infoPanel.classList.contains('visible')
    };
}

animate();
</script>
</body>
</html>
