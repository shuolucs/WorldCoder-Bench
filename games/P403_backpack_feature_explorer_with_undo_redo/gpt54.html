<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backpack Explorer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #title-text {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .ui-panel {
      position: absolute;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #controls-left {
      top: 16px;
      left: 16px;
    }

    #controls-right {
      top: 16px;
      right: 16px;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      border: none;
      font-size: 14px;
      font-weight: 600;
      background: rgba(255,255,255,0.12);
      color: white;
      transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.2);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .swatch {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      padding: 0;
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    #color-navy { background: #1a237e; }
    #color-forest { background: #1b5e20; }
    #color-crimson { background: #b71c1c; }
    #color-charcoal { background: #424242; }

    #info-panel {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(120%);
      min-width: 320px;
      max-width: 520px;
      padding: 16px 20px;
      border-radius: 12px;
      background: rgba(10, 10, 20, 0.82);
      color: white;
      z-index: 15;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      transition: transform 0.35s ease, opacity 0.35s ease;
      opacity: 0;
      pointer-events: none;
    }

    #info-panel.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    #info-title {
      margin: 0 0 6px;
      font-size: 20px;
      font-weight: 700;
    }

    #info-desc {
      margin: 0;
      line-height: 1.4;
      color: rgba(255,255,255,0.9);
    }
  </style>
</head>
<body>
  <div id="title-text">Backpack Explorer</div>

  <div id="controls-left" class="ui-panel">
    <button id="btn-undo" disabled>Undo</button>
    <button id="btn-redo" disabled>Redo</button>
    <button id="btn-spin">Spin</button>
  </div>

  <div id="controls-right" class="ui-panel">
    <button id="color-navy" class="swatch" title="Navy"></button>
    <button id="color-forest" class="swatch" title="Forest"></button>
    <button id="color-crimson" class="swatch" title="Crimson"></button>
    <button id="color-charcoal" class="swatch" title="Charcoal"></button>
  </div>

  <div id="info-panel">
    <h3 id="info-title"></h3>
    <p id="info-desc"></p>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 7);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 48),
      new THREE.MeshStandardMaterial({
        color: 0x666666,
        transparent: true,
        opacity: 0.35,
        roughness: 1
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const productRoot = new THREE.Group();
    scene.add(productRoot);

    let model = null;
    let modelLoaded = false;
    let modelMaterials = [];
    let spinEnabled = false;
    let currentColor = '#1a237e';
    let selectedFeature = null;

    const historyStack = [];
    const redoStack = [];
    const MAX_HISTORY = 20;

    const infoPanel = document.getElementById('info-panel');
    const infoTitle = document.getElementById('info-title');
    const infoDesc = document.getElementById('info-desc');
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnSpin = document.getElementById('btn-spin');

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    const featureData = [
      {
        index: 1,
        name: 'Padded Straps',
        description: 'Ergonomic padded shoulder straps help distribute weight and improve comfort during long wear.',
        position: new THREE.Vector3(0.5, 1.5, 0.3),
        color: '#ff4444'
      },
      {
        index: 2,
        name: 'Main Compartment',
        description: 'A spacious central compartment offers room for books, clothing, and daily essentials.',
        position: new THREE.Vector3(0, 1.0, 0.5),
        color: '#44ff44'
      },
      {
        index: 3,
        name: 'Side Pocket',
        description: 'A quick-access side pocket keeps smaller accessories within easy reach.',
        position: new THREE.Vector3(-0.7, 0.8, 0.2),
        color: '#4444ff'
      },
      {
        index: 4,
        name: 'Laptop Sleeve',
        description: 'A dedicated padded sleeve protects your laptop and keeps it securely organized.',
        position: new THREE.Vector3(0, 1.2, -0.4),
        color: '#ffff44'
      },
      {
        index: 5,
        name: 'Water Bottle Holder',
        description: 'An external holder stores your bottle conveniently for hydration on the go.',
        position: new THREE.Vector3(0.7, 0.6, 0.3),
        color: '#44ffff'
      }
    ];

    const hotspots = [];

    featureData.forEach((feature) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 24, 24),
        new THREE.MeshStandardMaterial({
          color: new THREE.Color(feature.color),
          emissive: new THREE.Color(feature.color),
          emissiveIntensity: 0.35
        })
      );
      mesh.position.copy(feature.position);
      mesh.userData.feature = feature;
      scene.add(mesh);
      hotspots.push(mesh);
    });

    const rotationAnim = {
      active: false,
      start: 0,
      from: 0,
      to: 0,
      duration: 0.5
    };

    function normalizeHex(hex) {
      const c = new THREE.Color(hex);
      return '#' + c.getHexString();
    }

    function updateButtons() {
      btnUndo.disabled = historyStack.length === 0;
      btnRedo.disabled = redoStack.length === 0;
      btnSpin.textContent = spinEnabled ? 'Spin: ON' : 'Spin';
    }

    function pushHistory(action) {
      historyStack.push(action);
      if (historyStack.length > MAX_HISTORY) historyStack.shift();
      redoStack.length = 0;
      updateButtons();
    }

    function showInfo(feature) {
      if (!feature) {
        infoTitle.textContent = '';
        infoDesc.textContent = '';
        infoPanel.classList.remove('visible');
        return;
      }
      infoTitle.textContent = feature.name;
      infoDesc.textContent = feature.description;
      infoPanel.classList.add('visible');
    }

    function applyColor(hex) {
      currentColor = normalizeHex(hex);
      modelMaterials.forEach((mat) => {
        if (mat && mat.color) {
          mat.color.set(currentColor);
          mat.needsUpdate = true;
        }
      });
    }

    function rotateModelToFeature(feature) {
      if (!feature) return;

      const targetVec = feature.position.clone();
      const desiredY = Math.atan2(targetVec.x, targetVec.z);

      rotationAnim.active = true;
      rotationAnim.start = performance.now() / 1000;
      rotationAnim.from = productRoot.rotation.y;
      rotationAnim.to = desiredY;
    }

    function setSelectedFeature(index, rotate = true) {
      selectedFeature = index;

      hotspots.forEach((hotspot) => {
        const isSelected = hotspot.userData.feature.index === index;
        hotspot.userData.selected = isSelected;
        if (isSelected) {
          hotspot.scale.setScalar(1.5);
          showInfo(hotspot.userData.feature);
          if (rotate) rotateModelToFeature(hotspot.userData.feature);
        }
      });

      if (index === null) {
        hotspots.forEach((h) => {
          h.userData.selected = false;
          h.scale.setScalar(1);
        });
        showInfo(null);
      }
    }

    function performColorChange(newColor, record = true) {
      const normalized = normalizeHex(newColor);
      if (normalized === currentColor) return;

      const prevColor = currentColor;
      applyColor(normalized);

      if (record) {
        pushHistory({
          type: 'color',
          prevColor,
          newColor: normalized
        });
      }
    }

    function performFeatureSelection(newIndex, record = true) {
      if (newIndex === selectedFeature) return;

      const prevFeature = selectedFeature;
      setSelectedFeature(newIndex, true);

      if (record) {
        pushHistory({
          type: 'feature',
          prevFeature,
          newFeature: newIndex
        });
      }
    }

    function undoAction() {
      if (historyStack.length === 0) return;
      const action = historyStack.pop();

      if (action.type === 'color') {
        applyColor(action.prevColor);
      } else if (action.type === 'feature') {
        setSelectedFeature(action.prevFeature, true);
      }

      redoStack.push(action);
      updateButtons();
    }

    function redoAction() {
      if (redoStack.length === 0) return;
      const action = redoStack.pop();

      if (action.type === 'color') {
        applyColor(action.newColor);
      } else if (action.type === 'feature') {
        setSelectedFeature(action.newFeature, true);
      }

      historyStack.push(action);
      updateButtons();
    }

    document.getElementById('color-navy').addEventListener('click', () => performColorChange('#1a237e'));
    document.getElementById('color-forest').addEventListener('click', () => performColorChange('#1b5e20'));
    document.getElementById('color-crimson').addEventListener('click', () => performColorChange('#b71c1c'));
    document.getElementById('color-charcoal').addEventListener('click', () => performColorChange('#424242'));

    btnUndo.addEventListener('click', undoAction);
    btnRedo.addEventListener('click', redoAction);
    btnSpin.addEventListener('click', () => {
      spinEnabled = !spinEnabled;
      updateButtons();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (e.ctrlKey && key === 'z') {
        e.preventDefault();
        undoAction();
      } else if (e.ctrlKey && key === 'y') {
        e.preventDefault();
        redoAction();
      }
    });

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersections = raycaster.intersectObjects(hotspots, false);

      if (intersections.length > 0) {
        const feature = intersections[0].object.userData.feature;
        performFeatureSelection(feature.index);
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      'Duck.glb',
      (gltf) => {
        model = gltf.scene;
        productRoot.add(model);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);

        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 2;
        const scale = targetSize / maxDim;
        model.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(model);
        const minY = box2.min.y;
        model.position.y -= minY;

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            if (child.material) {
              if (Array.isArray(child.material)) {
                child.material = child.material.map((m) => {
                  const cloned = m.clone();
                  modelMaterials.push(cloned);
                  return cloned;
                });
              } else {
                child.material = child.material.clone();
                modelMaterials.push(child.material);
              }
            }
          }
        });

        applyColor(currentColor);
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load Duck.glb', err);
      }
    );

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentColor: currentColor,
      selectedFeature: null,
      featureName: '',
      historyLength: 0,
      redoLength: 0,
      spinEnabled: false,
      hotspotCount: hotspots.length,
      undoDisabled: true,
      redoDisabled: true,
      modelRotationY: 0,
      infoPanelVisible: false
    };

    function updateState() {
      const selected = featureData.find(f => f.index === selectedFeature) || null;
      window.__3D_STATE__ = {
        modelLoaded,
        currentColor,
        selectedFeature,
        featureName: selected ? selected.name : '',
        historyLength: historyStack.length,
        redoLength: redoStack.length,
        spinEnabled,
        hotspotCount: hotspots.length,
        undoDisabled: btnUndo.disabled,
        redoDisabled: btnRedo.disabled,
        modelRotationY: productRoot.rotation.y,
        infoPanelVisible: infoPanel.classList.contains('visible')
      };
    }

    updateButtons();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();

      hotspots.forEach((hotspot) => {
        if (hotspot.userData.selected) {
          hotspot.scale.setScalar(1.5);
        } else {
          const pulse = 1 + 0.2 * Math.sin(elapsed * 3.0);
          hotspot.scale.setScalar(pulse);
        }
      });

      if (rotationAnim.active) {
        const now = performance.now() / 1000;
        const t = Math.min((now - rotationAnim.start) / rotationAnim.duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        productRoot.rotation.y = THREE.MathUtils.lerp(rotationAnim.from, rotationAnim.to, eased);
        if (t >= 1) rotationAnim.active = false;
      } else if (spinEnabled) {
        productRoot.rotation.y += 0.5 * delta;
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
