<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Crystal Growth Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #334466;
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            pointer-events: none;
        }
        .player-card {
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 6px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
        }
        .player-card.active {
            border-color: #fff;
            box-shadow: 0 0 10px currentColor;
            background: rgba(255,255,255,0.1);
        }
        .player-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .color-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .stats {
            font-size: 0.85em;
            color: #aaa;
            display: flex;
            justify-content: space-between;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #8899aa;
            font-size: 0.8em;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
        #system-info {
            position: absolute;
            top: 20px;
            right: 20px;
            text-align: right;
            color: #8899aa;
            font-size: 0.9em;
            pointer-events: none;
        }
        .info-row { margin-bottom: 5px; }
        .val { color: #fff; font-weight: bold; }
        #reset-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #ff2244;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.2s;
            pointer-events: auto;
        }
        #reset-btn:hover { background: #ff5577; }
        
        /* Player Themes */
        #p1-card { color: #ff2244; }
        #p1-card .color-indicator { background: #ff2244; box-shadow: 0 0 5px #ff2244; }
        #p2-card { color: #2244ff; }
        #p2-card .color-indicator { background: #2244ff; box-shadow: 0 0 5px #2244ff; }
        #p3-card { color: #22ff44; }
        #p3-card .color-indicator { background: #22ff44; box-shadow: 0 0 5px #22ff44; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div id="p1-card" class="player-card active">
            <div class="player-header">
                <span><span class="color-indicator"></span>Player 1</span>
                <span id="p1-score">0 pts</span>
            </div>
            <div class="stats">
                <span>Crystals: <span id="p1-crystals">0</span></span>
            </div>
        </div>
        <div id="p2-card" class="player-card">
            <div class="player-header">
                <span><span class="color-indicator"></span>Player 2</span>
                <span id="p2-score">0 pts</span>
            </div>
            <div class="stats">
                <span>Crystals: <span id="p2-crystals">0</span></span>
            </div>
        </div>
        <div id="p3-card" class="player-card">
            <div class="player-header">
                <span><span class="color-indicator"></span>Player 3</span>
                <span id="p3-score">0 pts</span>
            </div>
            <div class="stats">
                <span>Crystals: <span id="p3-crystals">0</span></span>
            </div>
        </div>
    </div>

    <div id="system-info">
        <div class="info-row">Temp: <span id="ui-temp" class="val">WARM</span></div>
        <div class="info-row">Gen: <span id="ui-gen" class="val">0</span></div>
        <div class="info-row">Total: <span id="ui-total" class="val">0</span></div>
        <div class="info-row" id="ui-status" style="color: #ffaa22; display: none;">PAUSED</div>
    </div>

    <div id="controls-help">
        <strong>Click</strong>: Place Crystal | <strong>G</strong>: Growth Pulse | <strong>1,2,3</strong>: Switch Player<br>
        <strong>R</strong>: Toggle Rotation | <strong>T</strong>: Cycle Temp | <strong>Space</strong>: Wave | <strong>P</strong>: Pause
    </div>

    <button id="reset-btn">Reset Simulation</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            totalCrystals: 0,
            activePlayer: 1,
            player1Score: 0, player2Score: 0, player3Score: 0,
            player1Crystals: 0, player2Crystals: 0, player3Crystals: 0,
            currentGeneration: 0,
            temperature: 'warm',
            temperatureMultiplier: 1.0,
            rotationEnabled: false,
            isPaused: false,
            waveActive: false,
            lastGrowthCount: 0,
            seedPosition: {x: 0, y: 0, z: 0}
        };

        const state = window.__3D_STATE__;

        const players = {
            1: { color: 0xff2244, theme: 'red' },
            2: { color: 0x2244ff, theme: 'blue' },
            3: { color: 0x22ff44, theme: 'green' }
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 + 0.1; // Allow slightly below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x334466, 0.3);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xff8844, 500, 50);
        warmLight.position.set(10, 10, 10);
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x4488ff, 400, 50);
        coolLight.position.set(-10, 8, -10);
        scene.add(coolLight);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x112233, 
            transparent: true, 
            opacity: 0.3,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        // --- Crystal System ---
        const crystals = [];
        const intersectables = [ground];
        
        // Geometry: Pivot at base
        const crystalGeo = new THREE.ConeGeometry(0.5, 2, 6);
        crystalGeo.translate(0, 1, 0); 

        const crystalMaterials = {};
        for (let p in players) {
            crystalMaterials[p] = new THREE.MeshPhysicalMaterial({
                color: players[p].color,
                metalness: 0.3,
                roughness: 0.1,
                transmission: 0.3,
                transparent: true,
                opacity: 0.7,
                thickness: 0.5,
                emissive: players[p].color,
                emissiveIntensity: p == state.activePlayer ? 0.4 : 0.0
            });
        }

        // --- Load Seed Model ---
        const loader = new GLTFLoader();
        let seedModel = null;
        
        // Using a reliable raw github url for the three.js example model
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb', (gltf) => {
            seedModel = gltf.scene;
            seedModel.scale.set(0.5, 0.5, 0.5);
            
            // Make model look like a crystal nucleus
            seedModel.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshPhysicalMaterial({
                        color: 0x88aaff,
                        metalness: 0.5,
                        roughness: 0.2,
                        transmission: 0.5,
                        transparent: true,
                        opacity: 0.8,
                        emissive: 0x224466,
                        emissiveIntensity: 0.5
                    });
                    intersectables.push(child);
                    child.userData.isSeed = true;
                }
            });
            
            mainGroup.add(seedModel);
            state.modelLoaded = true;
        }, undefined, (error) => {
            console.error("Failed to load model, using fallback sphere.", error);
            // Fallback if network fails
            const fallbackGeo = new THREE.IcosahedronGeometry(1.5, 1);
            const fallbackMat = new THREE.MeshPhysicalMaterial({
                color: 0x88aaff, metalness: 0.5, roughness: 0.2, transmission: 0.5, transparent: true, opacity: 0.8
            });
            seedModel = new THREE.Mesh(fallbackGeo, fallbackMat);
            seedModel.userData.isSeed = true;
            intersectables.push(seedModel);
            mainGroup.add(seedModel);
            state.modelLoaded = true;
        });

        // --- Core Functions ---
        function updateUI() {
            document.getElementById('p1-score').innerText = `${state.player1Score} pts`;
            document.getElementById('p2-score').innerText = `${state.player2Score} pts`;
            document.getElementById('p3-score').innerText = `${state.player3Score} pts`;
            
            document.getElementById('p1-crystals').innerText = state.player1Crystals;
            document.getElementById('p2-crystals').innerText = state.player2Crystals;
            document.getElementById('p3-crystals').innerText = state.player3Crystals;

            document.querySelectorAll('.player-card').forEach(el => el.classList.remove('active'));
            document.getElementById(`p${state.activePlayer}-card`).classList.add('active');

            document.getElementById('ui-temp').innerText = state.temperature.toUpperCase();
            document.getElementById('ui-gen').innerText = state.currentGeneration;
            document.getElementById('ui-total').innerText = state.totalCrystals;
            
            document.getElementById('ui-status').style.display = state.isPaused ? 'block' : 'none';
        }

        function updateEmissive() {
            crystals.forEach(c => {
                c.mesh.material.emissiveIntensity = (c.player === state.activePlayer) ? 0.4 : 0.0;
            });
        }

        function addCrystal(position, normal, parentGen, isPulse = false) {
            if (state.isPaused) return;

            const player = state.activePlayer;
            const gen = parentGen + 1;
            if (gen > state.currentGeneration) state.currentGeneration = gen;

            const mesh = new THREE.Mesh(crystalGeo, crystalMaterials[player]);
            
            // Position and Orientation
            mesh.position.copy(position);
            const up = new THREE.Vector3(0, 1, 0);
            if (normal) {
                mesh.quaternion.setFromUnitVectors(up, normal);
                // Add slight random tilt
                mesh.rotateX((Math.random() - 0.5) * 0.5);
                mesh.rotateZ((Math.random() - 0.5) * 0.5);
            }

            // Scale
            const baseSize = (0.1 + Math.random() * 1.4) * state.temperatureMultiplier;
            // Decrease size slightly based on generation
            const finalSize = Math.max(0.1, baseSize * Math.pow(0.9, gen));
            
            mesh.scale.set(0.01, 0.01, 0.01); // Start small for animation
            
            mesh.userData = { generation: gen, player: player, baseScale: finalSize };
            
            mainGroup.add(mesh);
            intersectables.push(mesh);
            
            const crystalData = { mesh, player, generation: gen, baseScale: finalSize };
            crystals.push(crystalData);

            // Animation
            new TWEEN.Tween(mesh.scale)
                .to({ x: finalSize * 0.5, y: finalSize, z: finalSize * 0.5 }, 300)
                .easing(TWEEN.Easing.Back.Out)
                .start();

            // State Updates
            state.totalCrystals++;
            state[`player${player}Crystals`]++;
            const points = isPulse ? 5 : 10;
            state[`player${player}Score`] += points;
            
            updateUI();
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.button !== 0 || state.isPaused) return; // Left click only
            
            // Don't raycast if clicking UI
            if(event.target.tagName === 'BUTTON' || event.target.closest('#hud')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(intersectables, false);

            if (intersects.length > 0) {
                const hit = intersects[0];
                let parentGen = -1; // Ground is -1, so first crystal is gen 0
                
                if (hit.object.userData.isSeed) {
                    parentGen = -1;
                } else if (hit.object.userData.generation !== undefined) {
                    parentGen = hit.object.userData.generation;
                }

                addCrystal(hit.point, hit.face ? hit.face.normal : new THREE.Vector3(0,1,0), parentGen, false);
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();

            if (key === '1' || key === '2' || key === '3') {
                state.activePlayer = parseInt(key);
                updateUI();
                updateEmissive();
            }
            
            if (key === 'p') {
                state.isPaused = !state.isPaused;
                updateUI();
            }

            if (state.isPaused) return;

            if (key === 'g') {
                // Growth Pulse
                const count = 3 + Math.floor(Math.random() * 3); // 3 to 5
                state.lastGrowthCount = count;
                
                for (let i = 0; i < count; i++) {
                    let parentObj, parentGen, pos, normal;
                    
                    if (crystals.length > 0 && Math.random() > 0.2) {
                        // Branch from existing crystal
                        const parent = crystals[Math.floor(Math.random() * crystals.length)];
                        parentObj = parent.mesh;
                        parentGen = parent.generation;
                        
                        // Approximate a point on the cone
                        const heightOffset = Math.random() * parent.baseScale;
                        pos = parentObj.position.clone().add(
                            new THREE.Vector3(0, heightOffset, 0).applyQuaternion(parentObj.quaternion)
                        );
                        // Random outward normal
                        normal = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
                    } else if (seedModel) {
                        // Branch from seed
                        parentGen = -1;
                        // Random point around center
                        const radius = 0.5 + Math.random() * 0.5;
                        const theta = Math.random() * Math.PI * 2;
                        const phi = Math.acos((Math.random() * 2) - 1);
                        pos = new THREE.Vector3(
                            radius * Math.sin(phi) * Math.cos(theta),
                            Math.abs(radius * Math.cos(phi)), // Keep mostly above ground
                            radius * Math.sin(phi) * Math.sin(theta)
                        );
                        normal = pos.clone().normalize();
                    } else {
                        continue;
                    }
                    
                    setTimeout(() => addCrystal(pos, normal, parentGen, true), i * 100);
                }
            }

            if (key === 'r') {
                state.rotationEnabled = !state.rotationEnabled;
            }

            if (key === 't') {
                const temps = ['cold', 'warm', 'hot'];
                let idx = temps.indexOf(state.temperature);
                state.temperature = temps[(idx + 1) % temps.length];
                
                if (state.temperature === 'cold') {
                    state.temperatureMultiplier = 0.5;
                    ambientLight.color.setHex(0x112255);
                    warmLight.color.setHex(0x88aaff);
                    coolLight.color.setHex(0x2244ff);
                } else if (state.temperature === 'warm') {
                    state.temperatureMultiplier = 1.0;
                    ambientLight.color.setHex(0x334466);
                    warmLight.color.setHex(0xff8844);
                    coolLight.color.setHex(0x4488ff);
                } else {
                    state.temperatureMultiplier = 1.5;
                    ambientLight.color.setHex(0x552211);
                    warmLight.color.setHex(0xff4422);
                    coolLight.color.setHex(0xff8844);
                }
                updateUI();
            }

            if (key === ' ' && !state.waveActive && crystals.length > 0) {
                // Crystallization Wave
                state.waveActive = true;
                let maxDelay = 0;

                crystals.forEach(c => {
                    const dist = c.mesh.position.distanceTo(new THREE.Vector3(0,0,0));
                    const delay = dist * 100; // 100ms per unit distance
                    if (delay > maxDelay) maxDelay = delay;

                    const bs = c.baseScale;
                    
                    new TWEEN.Tween(c.mesh.scale)
                        .to({ x: bs * 0.6, y: bs * 1.2, z: bs * 0.6 }, 200)
                        .delay(delay)
                        .easing(TWEEN.Easing.Quadratic.Out)
                        .yoyo(true)
                        .repeat(1)
                        .start();
                });

                setTimeout(() => { state.waveActive = false; }, maxDelay + 400);
            }
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            // Remove meshes
            crystals.forEach(c => {
                mainGroup.remove(c.mesh);
                const index = intersectables.indexOf(c.mesh);
                if (index > -1) intersectables.splice(index, 1);
                c.mesh.geometry.dispose();
            });
            
            crystals.length = 0;
            
            // Reset State
            state.totalCrystals = 0;
            state.player1Score = 0; state.player2Score = 0; state.player3Score = 0;
            state.player1Crystals = 0; state.player2Crystals = 0; state.player3Crystals = 0;
            state.currentGeneration = 0;
            
            mainGroup.rotation.set(0,0,0);
            
            updateUI();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            if (!state.isPaused) {
                TWEEN.update();
                
                if (state.rotationEnabled) {
                    mainGroup.rotation.y += 0.2 * delta;
                }
                
                // Subtle floating for seed
                if (seedModel) {
                    seedModel.position.y = Math.sin(clock.getElapsedTime() * 2) * 0.05;
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        updateUI();
        animate();
    </script>
</body>
</html>
