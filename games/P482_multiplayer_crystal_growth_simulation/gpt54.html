<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Crystal Growth Simulation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #e8f0ff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      min-width: 250px;
      padding: 12px 14px;
      background: rgba(10, 14, 26, 0.72);
      border: 1px solid rgba(140, 170, 255, 0.25);
      border-radius: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #hud h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
    }

    .player {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 8px 0;
      padding: 8px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: 0.2s ease;
      background: rgba(255,255,255,0.03);
    }

    .player.active {
      border-color: rgba(255,255,255,0.6);
      box-shadow: 0 0 12px rgba(255,255,255,0.2), 0 0 24px currentColor;
      transform: translateX(2px);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 10px currentColor;
      flex: 0 0 14px;
    }

    .meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 13px;
    }

    #status {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
      font-size: 12px;
      line-height: 1.5;
      color: #bfd0ff;
    }

    #controls {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    button {
      appearance: none;
      border: 1px solid rgba(170, 200, 255, 0.35);
      background: rgba(18, 26, 48, 0.8);
      color: #eef4ff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
      backdrop-filter: blur(6px);
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      border-color: rgba(170, 200, 255, 0.6);
    }

    #help {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      max-width: 460px;
      padding: 10px 12px;
      background: rgba(10, 14, 26, 0.6);
      border: 1px solid rgba(140, 170, 255, 0.2);
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      color: #b9c9f6;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <h2>Crystal Growth HUD</h2>
    <div id="players"></div>
    <div id="status"></div>
  </div>

  <div id="controls">
    <button id="resetBtn">Reset</button>
  </div>

  <div id="help">
    Click: place shard |
    1/2/3: switch player |
    G: growth pulse |
    R: rotate |
    T: temperature |
    Space: wave |
    P: pause
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const container = document.getElementById("app");
    const playersEl = document.getElementById("players");
    const statusEl = document.getElementById("status");
    const resetBtn = document.getElementById("resetBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);
    scene.fog = new THREE.FogExp2(0x0a0a1a, 0.035);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.shadowMap.enabled = true;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1.5, 0);

    const ambient = new THREE.AmbientLight(0x334466, 0.3);
    scene.add(ambient);

    const warmLight = new THREE.PointLight(0xff8844, 2.2, 50);
    warmLight.position.set(10, 10, 10);
    scene.add(warmLight);

    const coolLight = new THREE.PointLight(0x4488ff, 2.2, 50);
    coolLight.position.set(-10, 8, -10);
    scene.add(coolLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshPhysicalMaterial({
        color: 0x112233,
        transparent: true,
        opacity: 0.3,
        roughness: 0.9,
        metalness: 0.05,
        transmission: 0.05,
        side: THREE.DoubleSide
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const crystalRoot = new THREE.Group();
    scene.add(crystalRoot);

    const seedGroup = new THREE.Group();
    seedGroup.position.set(0, 0, 0);
    scene.add(seedGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const gemPalette = [
      0xff2244, // ruby
      0x2244ff, // sapphire
      0x22ff44, // emerald
      0xaa22ff, // amethyst
      0xffaa22, // topaz
      0xeeeeff  // diamond
    ];

    const players = [
      { id: 1, name: "Player1", color: 0xff3355, score: 0, crystals: 0 },
      { id: 2, name: "Player2", color: 0x3388ff, score: 0, crystals: 0 },
      { id: 3, name: "Player3", color: 0x33ff88, score: 0, crystals: 0 }
    ];

    const temperatureModes = [
      { name: "cold", multiplier: 0.5, ambient: 0x223366, warm: 0x6699ff, cool: 0x66ccff },
      { name: "warm", multiplier: 1.0, ambient: 0x334466, warm: 0xff8844, cool: 0x4488ff },
      { name: "hot", multiplier: 1.5, ambient: 0x553333, warm: 0xff5533, cool: 0xaa4466 }
    ];

    let activePlayer = 1;
    let temperatureIndex = 1;
    let rotationEnabled = false;
    let isPaused = false;
    let waveActive = false;
    let currentGeneration = 0;
    let lastGrowthCount = 0;
    let modelLoaded = false;
    let seedModel = null;

    const crystals = [];
    const spawnAnimations = [];
    const waveAnimations = [];

    window.__3D_STATE__ = {
      modelLoaded: false,
      totalCrystals: 0,
      activePlayer: 1,
      player1Score: 0,
      player2Score: 0,
      player3Score: 0,
      player1Crystals: 0,
      player2Crystals: 0,
      player3Crystals: 0,
      currentGeneration: 0,
      temperature: "warm",
      temperatureMultiplier: 1.0,
      rotationEnabled: false,
      isPaused: false,
      waveActive: false,
      lastGrowthCount: 0,
      seedPosition: { x: 0, y: 0, z: 0 }
    };

    function syncState() {
      const t = temperatureModes[temperatureIndex];
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.totalCrystals = crystals.length;
      window.__3D_STATE__.activePlayer = activePlayer;
      window.__3D_STATE__.player1Score = players[0].score;
      window.__3D_STATE__.player2Score = players[1].score;
      window.__3D_STATE__.player3Score = players[2].score;
      window.__3D_STATE__.player1Crystals = players[0].crystals;
      window.__3D_STATE__.player2Crystals = players[1].crystals;
      window.__3D_STATE__.player3Crystals = players[2].crystals;
      window.__3D_STATE__.currentGeneration = currentGeneration;
      window.__3D_STATE__.temperature = t.name;
      window.__3D_STATE__.temperatureMultiplier = t.multiplier;
      window.__3D_STATE__.rotationEnabled = rotationEnabled;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.waveActive = waveActive;
      window.__3D_STATE__.lastGrowthCount = lastGrowthCount;
    }

    function updateHUD() {
      playersEl.innerHTML = players.map(p => {
        const active = p.id === activePlayer ? "active" : "";
        const color = "#" + new THREE.Color(p.color).getHexString();
        return `
          <div class="player ${active}" style="color:${color}">
            <div class="swatch" style="background:${color}; color:${color}"></div>
            <div class="meta">
              <div><strong>${p.name}</strong></div>
              <div>Score: ${p.score}</div>
              <div>Crystals: ${p.crystals}</div>
            </div>
          </div>
        `;
      }).join("");

      const temp = temperatureModes[temperatureIndex];
      statusEl.innerHTML = `
        Active Player: <strong>${players[activePlayer - 1].name}</strong><br>
        Temperature: <strong>${temp.name}</strong> (${temp.multiplier.toFixed(1)}x size)<br>
        Total Crystals: <strong>${crystals.length}</strong><br>
        Highest Generation: <strong>${currentGeneration}</strong><br>
        Rotation: <strong>${rotationEnabled ? "On" : "Off"}</strong> |
        Paused: <strong>${isPaused ? "Yes" : "No"}</strong> |
        Wave: <strong>${waveActive ? "Active" : "Idle"}</strong><br>
        Model Loaded: <strong>${modelLoaded ? "Yes" : "No"}</strong> |
        Last Growth Count: <strong>${lastGrowthCount}</strong>
      `;
      syncState();
    }

    function applyTemperatureTint() {
      const temp = temperatureModes[temperatureIndex];
      ambient.color.setHex(temp.ambient);
      warmLight.color.setHex(temp.warm);
      coolLight.color.setHex(temp.cool);
      scene.fog.color.lerp(new THREE.Color(temp.name === "cold" ? 0x08111f : temp.name === "hot" ? 0x1a0808 : 0x0a0a1a), 1);
      updateHUD();
    }

    function randomGemColor() {
      return gemPalette[Math.floor(Math.random() * gemPalette.length)];
    }

    function getActivePlayer() {
      return players[activePlayer - 1];
    }

    function findParentCrystalNear(point) {
      if (crystals.length === 0) return null;
      let nearest = null;
      let minDist = Infinity;
      for (const c of crystals) {
        const d = c.mesh.position.distanceTo(point);
        if (d < minDist) {
          minDist = d;
          nearest = c;
        }
      }
      return nearest;
    }

    function getRandomAttachTarget(playerId = null) {
      const pool = playerId
        ? crystals.filter(c => c.playerId === playerId)
        : crystals.slice();

      if (pool.length > 0) {
        return pool[Math.floor(Math.random() * pool.length)];
      }
      return null;
    }

    function createShardGeometry(size) {
      if (Math.random() < 0.5) {
        return new THREE.ConeGeometry(size * 0.35, size, 5 + Math.floor(Math.random() * 3), 1);
      }
      const radiusTop = size * (0.03 + Math.random() * 0.07);
      const radiusBottom = size * (0.18 + Math.random() * 0.12);
      const height = size;
      return new THREE.CylinderGeometry(radiusTop, radiusBottom, height, 5 + Math.floor(Math.random() * 4), 1);
    }

    function createShard({
      position,
      normal,
      playerId,
      generation,
      color,
      size,
      scoreValue
    }) {
      const player = players[playerId - 1];
      const finalSize = size * temperatureModes[temperatureIndex].multiplier;
      const geometry = createShardGeometry(finalSize);

      const isActive = playerId === activePlayer;
      const material = new THREE.MeshPhysicalMaterial({
        color: color,
        transparent: true,
        opacity: 0.7,
        roughness: 0.1,
        metalness: 0.3,
        transmission: 0.3,
        clearcoat: 0.8,
        clearcoatRoughness: 0.15,
        emissive: isActive ? new THREE.Color(player.color).multiplyScalar(0.18) : new THREE.Color(0x000000),
        emissiveIntensity: isActive ? 0.8 : 0.15
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      const dir = normal.clone().normalize();
      const baseOffset = finalSize * 0.45;
      mesh.position.copy(position).add(dir.multiplyScalar(baseOffset));

      const up = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(up, normal.clone().normalize());

      mesh.rotation.z += (Math.random() - 0.5) * 0.9;
      mesh.rotation.y += Math.random() * Math.PI * 2;
      mesh.scale.setScalar(0.001);

      crystalRoot.add(mesh);

      const shard = {
        mesh,
        playerId,
        generation,
        color,
        size: finalSize,
        baseScale: new THREE.Vector3(1, 1, 1),
        attachNormal: normal.clone(),
        pulseOffset: Math.random() * Math.PI * 2
      };

      crystals.push(shard);
      player.crystals += 1;
      player.score += scoreValue;
      currentGeneration = Math.max(currentGeneration, generation);

      spawnAnimations.push({
        mesh,
        duration: 0.3,
        elapsed: 0
      });

      updateCrystalGlow();
      updateHUD();
      return shard;
    }

    function placeCrystalAt(point, hitObject) {
      const player = getActivePlayer();

      let parent = null;
      let generation = 0;
      let normal = new THREE.Vector3(0, 1, 0);
      let position = point.clone();

      if (hitObject && hitObject.userData && hitObject.userData.isCrystal) {
        parent = hitObject.userData.crystalRef;
      } else {
        parent = findParentCrystalNear(point);
      }

      if (parent) {
        generation = parent.generation + 1;
        normal = point.clone().sub(parent.mesh.position).normalize();
        if (normal.lengthSq() < 0.001) {
          normal.set(
            (Math.random() - 0.5),
            Math.random(),
            (Math.random() - 0.5)
          ).normalize();
        }
        position = parent.mesh.position.clone().add(normal.clone().multiplyScalar(parent.size * 0.55));
      } else if (modelLoaded) {
        generation = 0;
        normal = point.clone().sub(seedGroup.position).normalize();
        if (normal.lengthSq() < 0.001) normal.set(0, 1, 0);
        position = seedGroup.position.clone().add(normal.clone().multiplyScalar(0.9));
      }

      const color = player.color;
      const size = THREE.MathUtils.randFloat(0.1, 1.5);
      const shard = createShard({
        position,
        normal,
        playerId: player.id,
        generation,
        color,
        size,
        scoreValue: 10
      });
      shard.mesh.userData.isCrystal = true;
      shard.mesh.userData.crystalRef = shard;
    }

    function autoGrowthPulse() {
      if (isPaused) return;
      const player = getActivePlayer();
      const count = 3 + Math.floor(Math.random() * 3);
      lastGrowthCount = count;

      for (let i = 0; i < count; i++) {
        const target = getRandomAttachTarget(player.id) || getRandomAttachTarget() || null;

        let basePosition, generation;
        if (target) {
          const dir = new THREE.Vector3(
            (Math.random() - 0.5),
            Math.random(),
            (Math.random() - 0.3)
          ).normalize();
          basePosition = target.mesh.position.clone().add(dir.clone().multiplyScalar(target.size * 0.6));
          generation = target.generation + 1;
          const color = player.color;
          const size = THREE.MathUtils.randFloat(0.1, 1.5);
          const shard = createShard({
            position: basePosition,
            normal: dir,
            playerId: player.id,
            generation,
            color,
            size,
            scoreValue: 5
          });
          shard.mesh.userData.isCrystal = true;
          shard.mesh.userData.crystalRef = shard;
        } else {
          const dir = new THREE.Vector3(
            (Math.random() - 0.5),
            Math.random() * 1.2,
            (Math.random() - 0.5)
          ).normalize();
          basePosition = seedGroup.position.clone().add(dir.clone().multiplyScalar(0.8));
          generation = 0;
          const shard = createShard({
            position: basePosition,
            normal: dir,
            playerId: player.id,
            generation,
            color: player.color,
            size: THREE.MathUtils.randFloat(0.1, 1.5),
            scoreValue: 5
          });
          shard.mesh.userData.isCrystal = true;
          shard.mesh.userData.crystalRef = shard;
        }
      }

      updateHUD();
    }

    function updateCrystalGlow() {
      for (const c of crystals) {
        const isActive = c.playerId === activePlayer;
        c.mesh.material.emissive.setHex(isActive ? players[c.playerId - 1].color : 0x000000);
        c.mesh.material.emissiveIntensity = isActive ? 0.8 : 0.1;
      }
    }

    function triggerWave() {
      if (waveActive || crystals.length === 0) return;
      waveActive = true;
      window.__3D_STATE__.waveActive = true;

      const maxDist = Math.max(...crystals.map(c => c.mesh.position.length()), 0.001);
      waveAnimations.length = 0;

      for (const crystal of crystals) {
        const dist = crystal.mesh.position.length();
        const delay = (dist / maxDist) * 0.8;
        waveAnimations.push({
          crystal,
          delay,
          duration: 0.6,
          elapsed: 0,
          started: false
        });
      }

      updateHUD();
    }

    function resetSimulation() {
      for (const crystal of crystals) {
        crystalRoot.remove(crystal.mesh);
        crystal.mesh.geometry.dispose();
        crystal.mesh.material.dispose();
      }
      crystals.length = 0;
      spawnAnimations.length = 0;
      waveAnimations.length = 0;
      currentGeneration = 0;
      lastGrowthCount = 0;
      waveActive = false;

      players.forEach(p => {
        p.score = 0;
        p.crystals = 0;
      });

      updateHUD();
    }

    renderer.domElement.addEventListener("pointerdown", (event) => {
      if (isPaused) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const targets = [ground, seedGroup, ...crystals.map(c => c.mesh)];
      const hits = raycaster.intersectObjects(targets, true);

      if (hits.length > 0) {
        const hit = hits[0];
        placeCrystalAt(hit.point, hit.object);
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.code === "Digit1") {
        activePlayer = 1;
        updateCrystalGlow();
        updateHUD();
      } else if (e.code === "Digit2") {
        activePlayer = 2;
        updateCrystalGlow();
        updateHUD();
      } else if (e.code === "Digit3") {
        activePlayer = 3;
        updateCrystalGlow();
        updateHUD();
      } else if (e.code === "KeyG") {
        autoGrowthPulse();
      } else if (e.code === "KeyR") {
        rotationEnabled = !rotationEnabled;
        updateHUD();
      } else if (e.code === "KeyT") {
        temperatureIndex = (temperatureIndex + 1) % temperatureModes.length;
        applyTemperatureTint();
      } else if (e.code === "Space") {
        e.preventDefault();
        triggerWave();
      } else if (e.code === "KeyP") {
        isPaused = !isPaused;
        updateHUD();
      }
    });

    resetBtn.addEventListener("click", resetSimulation);

    const loader = new GLTFLoader();
    loader.load(
      "facecap.glb",
      (gltf) => {
        seedModel = gltf.scene;
        seedModel.scale.setScalar(0.5);
        seedModel.position.set(0, 0, 0);

        seedModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              obj.material = obj.material.clone();
              if ("transparent" in obj.material) obj.material.transparent = true;
            }
          }
        });

        seedGroup.add(seedModel);
        modelLoaded = true;
        updateHUD();
      },
      undefined,
      (err) => {
        console.warn("Could not load facecap.glb:", err);
        const fallback = new THREE.Mesh(
          new THREE.IcosahedronGeometry(1.1, 1),
          new THREE.MeshPhysicalMaterial({
            color: 0xccccff,
            roughness: 0.25,
            metalness: 0.15,
            transmission: 0.15,
            transparent: true,
            opacity: 0.9
          })
        );
        fallback.position.set(0, 1.0, 0);
        seedGroup.add(fallback);
        modelLoaded = false;
        updateHUD();
      }
    );

    function updateSpawnAnimations(dt) {
      for (let i = spawnAnimations.length - 1; i >= 0; i--) {
        const anim = spawnAnimations[i];
        anim.elapsed += dt;
        const t = Math.min(anim.elapsed / anim.duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        anim.mesh.scale.setScalar(eased);
        if (t >= 1) {
          spawnAnimations.splice(i, 1);
        }
      }
    }

    function updateWaveAnimations(dt) {
      if (waveAnimations.length === 0) {
        if (waveActive) {
          waveActive = false;
          window.__3D_STATE__.waveActive = false;
          updateHUD();
        }
        return;
      }

      let activeCount = 0;

      for (let i = waveAnimations.length - 1; i >= 0; i--) {
        const anim = waveAnimations[i];
        anim.elapsed += dt;

        if (anim.elapsed < anim.delay) {
          activeCount++;
          continue;
        }

        const local = (anim.elapsed - anim.delay) / anim.duration;
        if (local <= 1) {
          const pulse = 1 + Math.sin(local * Math.PI) * 0.2;
          anim.crystal.mesh.scale.setScalar(pulse);
          activeCount++;
        } else {
          anim.crystal.mesh.scale.setScalar(1);
          waveAnimations.splice(i, 1);
        }
      }

      if (activeCount === 0) {
        waveActive = false;
        window.__3D_STATE__.waveActive = false;
        updateHUD();
      }
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();

      controls.update();

      if (!isPaused) {
        if (rotationEnabled) {
          crystalRoot.rotation.y += dt * 0.35;
          seedGroup.rotation.y += dt * 0.2;
        }

        updateSpawnAnimations(dt);
        updateWaveAnimations(dt);

        for (const c of crystals) {
          if (!waveActive && !spawnAnimations.find(a => a.mesh === c.mesh)) {
            c.mesh.scale.setScalar(1 + Math.sin(performance.now() * 0.0015 + c.pulseOffset) * 0.015);
          }
        }
      }

      renderer.render(scene, camera);
      syncState();
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyTemperatureTint();
    updateHUD();
    animate();
  </script>
</body>
</html>
