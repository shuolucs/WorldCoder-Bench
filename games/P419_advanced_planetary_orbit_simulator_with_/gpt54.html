<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planetary Orbit Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #hud div {
      margin: 6px 0;
      font-size: 16px;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      background: #1f1f1f;
      color: white;
      border: 1px solid #555;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #333;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.4;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score-display">Score: 0</div>
    <div id="scan-display">Planets Scanned: 0/4</div>
    <div id="time-display">Time: 0s</div>

    <div id="controls">
      <button id="pause-btn">Pause</button>
      <button id="reset-btn">Reset</button>
      <button id="toggle-orbits-btn">Toggle Orbits</button>
      <button id="speed-btn">Speed: 1x</button>
    </div>

    <div id="help">
      W/S: forward/back<br />
      A/D: rotate<br />
      Q/E: up/down
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 40, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
    const sunMaterial = new THREE.MeshStandardMaterial({
      color: 0xffff00,
      emissive: 0xffcc00,
      emissiveIntensity: 1.5
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    sun.position.set(0, 0, 0);
    scene.add(sun);

    const sunLight = new THREE.PointLight(0xffffff, 2, 500);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    // Starfield background: 500 small white spheres
    const starGeometry = new THREE.SphereGeometry(0.12, 6, 6);
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const starfield = new THREE.Group();
    for (let i = 0; i < 500; i++) {
      const star = new THREE.Mesh(starGeometry, starMaterial);
      const radius = 80 + Math.random() * 220;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      star.position.set(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
      starfield.add(star);
    }
    scene.add(starfield);

    const orbitGroup = new THREE.Group();
    scene.add(orbitGroup);

    function createOrbitRing(radius, color = 0x666666) {
      const curve = new THREE.EllipseCurve(
        0, 0,
        radius, radius,
        0, Math.PI * 2,
        false,
        0
      );
      const points = curve.getPoints(128).map(p => new THREE.Vector3(p.x, 0, p.y));
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color });
      const line = new THREE.LineLoop(geometry, material);
      line.rotation.x = 0;
      return line;
    }

    const planetDefs = {
      mercury: { radius: 0.4, color: 0xff0000, orbitRadius: 8, speed: 0.02, points: 10, angle: 0.1 },
      venus:   { radius: 0.6, color: 0xffa500, orbitRadius: 13, speed: 0.015, points: 20, angle: 1.2 },
      earth:   { radius: 0.7, color: 0x2255ff, orbitRadius: 18, speed: 0.01, points: 30, angle: 2.1 },
      mars:    { radius: 0.5, color: 0xcc4422, orbitRadius: 24, speed: 0.007, points: 40, angle: 2.9 }
    };

    const planets = {};

    for (const [name, def] of Object.entries(planetDefs)) {
      const geo = new THREE.SphereGeometry(def.radius, 24, 24);
      const mat = new THREE.MeshStandardMaterial({ color: def.color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(
        def.orbitRadius * Math.cos(def.angle),
        0,
        def.orbitRadius * Math.sin(def.angle)
      );
      scene.add(mesh);

      const orbitRing = createOrbitRing(def.orbitRadius);
      orbitGroup.add(orbitRing);

      planets[name] = {
        ...def,
        mesh,
        orbitRing
      };
    }

    let spacecraft = null;
    let modelLoaded = false;
    const spacecraftInitialPosition = new THREE.Vector3(5, 2, 0);

    function createFallbackSpacecraft() {
      const geo = new THREE.ConeGeometry(0.5, 1.5, 16);
      const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
      const cone = new THREE.Mesh(geo, mat);
      cone.rotation.z = Math.PI / 2;
      cone.position.copy(spacecraftInitialPosition);
      scene.add(cone);
      spacecraft = cone;
      modelLoaded = false;
    }

    const loader = new GLTFLoader();
    loader.load(
      '._ferrari.glb',
      (gltf) => {
        spacecraft = gltf.scene;
        spacecraft.scale.set(0.8, 0.8, 0.8);
        spacecraft.position.copy(spacecraftInitialPosition);
        spacecraft.rotation.y = 0;
        scene.add(spacecraft);
        modelLoaded = true;
      },
      undefined,
      () => {
        createFallbackSpacecraft();
      }
    );

    // HUD
    const scoreDisplay = document.getElementById('score-display');
    const scanDisplay = document.getElementById('scan-display');
    const timeDisplay = document.getElementById('time-display');
    const pauseBtn = document.getElementById('pause-btn');
    const resetBtn = document.getElementById('reset-btn');
    const toggleOrbitsBtn = document.getElementById('toggle-orbits-btn');
    const speedBtn = document.getElementById('speed-btn');

    // State
    let score = 0;
    let planetsScanned = 0;
    let bonusAwarded = false;
    let isPaused = false;
    let orbitsVisible = true;
    let speedMultiplier = 1;
    let elapsedTime = 0;
    let startTime = performance.now();

    const scannedPlanets = {
      mercury: false,
      venus: false,
      earth: false,
      mars: false
    };

    const keys = {
      KeyW: false,
      KeyS: false,
      KeyA: false,
      KeyD: false,
      KeyQ: false,
      KeyE: false
    };

    window.__3D_STATE__ = {
      score: 0,
      planetsScanned: 0,
      scannedPlanets: { mercury: false, venus: false, earth: false, mars: false },
      elapsedTime: 0,
      isPaused: false,
      orbitsVisible: true,
      speedMultiplier: 1,
      spacecraftPosition: { x: 5, y: 2, z: 0 },
      planetPositions: {
        mercury: { x: 0, y: 0, z: 0 },
        venus: { x: 0, y: 0, z: 0 },
        earth: { x: 0, y: 0, z: 0 },
        mars: { x: 0, y: 0, z: 0 }
      },
      bonusAwarded: false,
      modelLoaded: false
    };

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      scanDisplay.textContent = `Planets Scanned: ${planetsScanned}/4`;
      timeDisplay.textContent = `Time: ${elapsedTime}s`;
      pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
      speedBtn.textContent = `Speed: ${speedMultiplier}x`;
    }

    function resetSimulation() {
      score = 0;
      planetsScanned = 0;
      bonusAwarded = false;
      elapsedTime = 0;
      startTime = performance.now();

      for (const key of Object.keys(scannedPlanets)) {
        scannedPlanets[key] = false;
      }

      for (const [name, def] of Object.entries(planetDefs)) {
        planets[name].angle = def.angle;
        planets[name].mesh.position.set(
          def.orbitRadius * Math.cos(def.angle),
          0,
          def.orbitRadius * Math.sin(def.angle)
        );
      }

      if (spacecraft) {
        spacecraft.position.copy(spacecraftInitialPosition);
        spacecraft.rotation.set(0, 0, 0);
        if (spacecraft.geometry && spacecraft.geometry.type === 'ConeGeometry') {
          spacecraft.rotation.z = Math.PI / 2;
        }
      }

      updateHUD();
      updateState();
    }

    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      if (!isPaused) {
        startTime = performance.now() - elapsedTime * 1000;
      }
      updateHUD();
    });

    resetBtn.addEventListener('click', () => {
      resetSimulation();
    });

    toggleOrbitsBtn.addEventListener('click', () => {
      orbitsVisible = !orbitsVisible;
      orbitGroup.visible = orbitsVisible;
      updateState();
    });

    speedBtn.addEventListener('click', () => {
      if (speedMultiplier === 1) speedMultiplier = 2;
      else if (speedMultiplier === 2) speedMultiplier = 4;
      else speedMultiplier = 1;
      updateHUD();
      updateState();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code in keys) keys[e.code] = true;
    });

    window.addEventListener('keyup', (e) => {
      if (e.code in keys) keys[e.code] = false;
    });

    function moveSpacecraft() {
      if (!spacecraft || isPaused) return;

      const moveSpeed = 0.3;
      const rotateSpeed = 0.05;
      const verticalSpeed = 0.2;

      if (keys.KeyA) spacecraft.rotation.y += rotateSpeed;
      if (keys.KeyD) spacecraft.rotation.y -= rotateSpeed;

      const forward = new THREE.Vector3(0, 0, 1);
      forward.applyEuler(spacecraft.rotation).normalize();

      if (keys.KeyW) spacecraft.position.addScaledVector(forward, moveSpeed);
      if (keys.KeyS) spacecraft.position.addScaledVector(forward, -moveSpeed);

      if (keys.KeyQ) spacecraft.position.y += verticalSpeed;
      if (keys.KeyE) spacecraft.position.y -= verticalSpeed;

      spacecraft.position.y = THREE.MathUtils.clamp(spacecraft.position.y, -10, 20);
    }

    function scanPlanets() {
      if (!spacecraft) return;

      for (const [name, planet] of Object.entries(planets)) {
        if (scannedPlanets[name]) continue;

        const dist = spacecraft.position.distanceTo(planet.mesh.position);
        if (safeNumber(dist, 9999) <= 2.5) {
          scannedPlanets[name] = true;
          planetsScanned += 1;
          score += planet.points;

          if (planetsScanned === 4 && elapsedTime <= 60 && !bonusAwarded) {
            score += 50;
            bonusAwarded = true;
          }

          updateHUD();
        }
      }
    }

    function updatePlanets() {
      if (isPaused) return;

      for (const planet of Object.values(planets)) {
        planet.angle += planet.speed * speedMultiplier;
        planet.mesh.position.x = planet.orbitRadius * Math.cos(planet.angle);
        planet.mesh.position.z = planet.orbitRadius * Math.sin(planet.angle);
        planet.mesh.position.y = 0;
      }
    }

    function updateTimer() {
      if (!isPaused) {
        elapsedTime = Math.max(0, Math.floor((performance.now() - startTime) / 1000));
      }
    }

    function updateState() {
      const spacecraftPos = spacecraft
        ? spacecraft.position
        : spacecraftInitialPosition;

      window.__3D_STATE__ = {
        score: safeNumber(score, 0),
        planetsScanned: safeNumber(planetsScanned, 0),
        scannedPlanets: {
          mercury: !!scannedPlanets.mercury,
          venus: !!scannedPlanets.venus,
          earth: !!scannedPlanets.earth,
          mars: !!scannedPlanets.mars
        },
        elapsedTime: safeNumber(elapsedTime, 0),
        isPaused: !!isPaused,
        orbitsVisible: !!orbitsVisible,
        speedMultiplier: safeNumber(speedMultiplier, 1),
        spacecraftPosition: {
          x: safeNumber(spacecraftPos.x, 0),
          y: safeNumber(spacecraftPos.y, 0),
          z: safeNumber(spacecraftPos.z, 0)
        },
        planetPositions: {
          mercury: {
            x: safeNumber(planets.mercury.mesh.position.x, 0),
            y: safeNumber(planets.mercury.mesh.position.y, 0),
            z: safeNumber(planets.mercury.mesh.position.z, 0)
          },
          venus: {
            x: safeNumber(planets.venus.mesh.position.x, 0),
            y: safeNumber(planets.venus.mesh.position.y, 0),
            z: safeNumber(planets.venus.mesh.position.z, 0)
          },
          earth: {
            x: safeNumber(planets.earth.mesh.position.x, 0),
            y: safeNumber(planets.earth.mesh.position.y, 0),
            z: safeNumber(planets.earth.mesh.position.z, 0)
          },
          mars: {
            x: safeNumber(planets.mars.mesh.position.x, 0),
            y: safeNumber(planets.mars.mesh.position.y, 0),
            z: safeNumber(planets.mars.mesh.position.z, 0)
          }
        },
        bonusAwarded: !!bonusAwarded,
        modelLoaded: !!modelLoaded
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      updateTimer();
      updatePlanets();
      moveSpacecraft();
      scanPlanets();
      updateHUD();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    orbitGroup.visible = true;
    updateHUD();
    updateState();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Ensure fallback exists if model load hangs too long
    setTimeout(() => {
      if (!spacecraft) {
        createFallbackSpacecraft();
        updateState();
      }
    }, 4000);
  </script>
</body>
</html>
