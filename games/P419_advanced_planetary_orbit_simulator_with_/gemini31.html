<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetary Orbit Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            z-index: 10;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #ffd700;
        }
        .hud-stat {
            font-size: 16px;
            margin-bottom: 5px;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button {
            background: #333;
            color: white;
            border: 1px solid #666;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        #instructions {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
        }
        .key {
            background: #eee;
            color: #000;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: bold;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h2>Mission Status</h2>
        <div id="score-display" class="hud-stat">Score: 0</div>
        <div id="scan-display" class="hud-stat">Planets Scanned: 0/4</div>
        <div id="time-display" class="hud-stat">Time: 0s</div>
    </div>

    <div id="instructions">
        <div style="margin-bottom: 5px; color: #aaa;">Controls:</div>
        <div><span class="key">W</span> / <span class="key">S</span> : Forward / Backward</div>
        <div><span class="key">A</span> / <span class="key">D</span> : Rotate Left / Right</div>
        <div><span class="key">Q</span> / <span class="key">E</span> : Move Up / Down</div>
        <div style="margin-top: 10px; color: #aaa;">Goal: Fly near planets to scan them!</div>
    </div>

    <div id="controls">
        <button id="pause-btn">Pause</button>
        <button id="reset-btn">Reset</button>
        <button id="toggle-orbits-btn">Toggle Orbits</button>
        <button id="speed-btn">Speed: 1x</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 0,
            planetsScanned: 0,
            scannedPlanets: { mercury: false, venus: false, earth: false, mars: false },
            elapsedTime: 0,
            isPaused: false,
            orbitsVisible: true,
            speedMultiplier: 1,
            spacecraftPosition: { x: 5, y: 2, z: 0 },
            planetPositions: {
                mercury: { x: 0, y: 0, z: 0 },
                venus: { x: 0, y: 0, z: 0 },
                earth: { x: 0, y: 0, z: 0 },
                mars: { x: 0, y: 0, z: 0 }
            },
            bonusAwarded: false,
            modelLoaded: false
        };

        const state = window.__3D_STATE__;
        let accumulatedTime = 0;
        let lastTime = performance.now();

        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('score-display');
        const scanDisplay = document.getElementById('scan-display');
        const timeDisplay = document.getElementById('time-display');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const toggleOrbitsBtn = document.getElementById('toggle-orbits-btn');
        const speedBtn = document.getElementById('speed-btn');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 2, 100);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // --- Starfield ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 500;
        const posArray = new Float32Array(starsCount * 3);
        for(let i = 0; i < starsCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 200;
        }
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const starsMaterial = new THREE.PointsMaterial({ size: 0.5, color: 0xffffff });
        const starMesh = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starMesh);

        // --- Sun ---
        const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
        const sunMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xffff00, 
            emissive: 0xffff00,
            emissiveIntensity: 1
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        scene.add(sun);

        // --- Planets ---
        const planetsData = [
            { id: 'mercury', radius: 0.4, color: 0xff0000, orbitRadius: 8, speed: 0.02, points: 10 },
            { id: 'venus', radius: 0.6, color: 0xffa500, orbitRadius: 13, speed: 0.015, points: 20 },
            { id: 'earth', radius: 0.7, color: 0x0000ff, orbitRadius: 18, speed: 0.01, points: 30 },
            { id: 'mars', radius: 0.5, color: 0xcc4422, orbitRadius: 24, speed: 0.007, points: 40 }
        ];

        const planets = {};
        const orbitRings = [];

        planetsData.forEach(data => {
            // Planet Mesh
            const geo = new THREE.SphereGeometry(data.radius, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            
            // Orbit Ring
            const ringGeo = new THREE.BufferGeometry();
            const ringPoints = [];
            for (let i = 0; i <= 64; i++) {
                const theta = (i / 64) * Math.PI * 2;
                ringPoints.push(new THREE.Vector3(Math.cos(theta) * data.orbitRadius, 0, Math.sin(theta) * data.orbitRadius));
            }
            ringGeo.setFromPoints(ringPoints);
            const ringMat = new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.5 });
            const ring = new THREE.Line(ringGeo, ringMat);
            scene.add(ring);
            orbitRings.push(ring);

            planets[data.id] = {
                mesh: mesh,
                data: data,
                angle: Math.random() * Math.PI * 2 // Random initial position
            };
        });

        // --- Spacecraft ---
        let spacecraft = new THREE.Group();
        scene.add(spacecraft);
        
        const initialSpacecraftPos = new THREE.Vector3(5, 2, 0);
        spacecraft.position.copy(initialSpacecraftPos);

        const createFallbackSpacecraft = () => {
            const geo = new THREE.ConeGeometry(0.5, 1.5, 16);
            geo.rotateX(Math.PI / 2); // Point along local Z
            const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
            const mesh = new THREE.Mesh(geo, mat);
            spacecraft.add(mesh);
            state.modelLoaded = false;
        };

        const loader = new GLTFLoader();
        loader.load(
            '._ferrari.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.8, 0.8, 0.8);
                spacecraft.add(model);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Could not load Ferrari model, using fallback.", error);
                createFallbackSpacecraft();
            }
        );

        // --- Input Handling ---
        const keys = { w: false, a: false, s: false, d: false, q: false, e: false };
        
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        // --- UI Event Listeners ---
        pauseBtn.addEventListener('click', () => {
            state.isPaused = !state.isPaused;
            pauseBtn.textContent = state.isPaused ? 'Resume' : 'Pause';
            pauseBtn.style.background = state.isPaused ? '#880000' : '#333';
        });

        resetBtn.addEventListener('click', () => {
            state.score = 0;
            state.planetsScanned = 0;
            state.scannedPlanets = { mercury: false, venus: false, earth: false, mars: false };
            accumulatedTime = 0;
            state.elapsedTime = 0;
            state.bonusAwarded = false;
            
            spacecraft.position.copy(initialSpacecraftPos);
            spacecraft.rotation.set(0, 0, 0);
            
            Object.values(planets).forEach(p => {
                p.angle = Math.random() * Math.PI * 2;
                p.mesh.material.emissive.setHex(0x000000); // Reset scan highlight
            });
            
            updateHUD();
        });

        toggleOrbitsBtn.addEventListener('click', () => {
            state.orbitsVisible = !state.orbitsVisible;
            orbitRings.forEach(ring => ring.visible = state.orbitsVisible);
        });

        speedBtn.addEventListener('click', () => {
            if (state.speedMultiplier === 1) state.speedMultiplier = 2;
            else if (state.speedMultiplier === 2) state.speedMultiplier = 4;
            else state.speedMultiplier = 1;
            speedBtn.textContent = `Speed: ${state.speedMultiplier}x`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Logic ---
        function updateHUD() {
            scoreDisplay.textContent = `Score: ${state.score}`;
            scanDisplay.textContent = `Planets Scanned: ${state.planetsScanned}/4`;
            timeDisplay.textContent = `Time: ${state.elapsedTime}s`;
        }

        function handleMovement() {
            if (state.isPaused) return;

            const moveSpeed = 0.3;
            const rotSpeed = 0.05;
            const vertSpeed = 0.2;

            if (keys.w) spacecraft.translateZ(-moveSpeed);
            if (keys.s) spacecraft.translateZ(moveSpeed);
            if (keys.a) spacecraft.rotateY(rotSpeed);
            if (keys.d) spacecraft.rotateY(-rotSpeed);
            if (keys.q) spacecraft.position.y += vertSpeed;
            if (keys.e) spacecraft.position.y -= vertSpeed;

            // Clamp Y
            spacecraft.position.y = Math.max(-10, Math.min(20, spacecraft.position.y));
            
            // Update state
            state.spacecraftPosition.x = spacecraft.position.x || 0;
            state.spacecraftPosition.y = spacecraft.position.y || 0;
            state.spacecraftPosition.z = spacecraft.position.z || 0;
        }

        function updatePlanets() {
            if (!state.isPaused) {
                Object.keys(planets).forEach(id => {
                    const p = planets[id];
                    p.angle += p.data.speed * state.speedMultiplier;
                    p.mesh.position.x = Math.cos(p.angle) * p.data.orbitRadius;
                    p.mesh.position.z = Math.sin(p.angle) * p.data.orbitRadius;
                    
                    // Update state
                    state.planetPositions[id].x = p.mesh.position.x || 0;
                    state.planetPositions[id].y = p.mesh.position.y || 0;
                    state.planetPositions[id].z = p.mesh.position.z || 0;

                    // Collision / Scanning
                    if (!state.scannedPlanets[id]) {
                        const dist = spacecraft.position.distanceTo(p.mesh.position);
                        if (dist < 2.5) {
                            state.scannedPlanets[id] = true;
                            state.planetsScanned++;
                            state.score += p.data.points;
                            
                            // Visual feedback
                            p.mesh.material.emissive.setHex(0x333333);
                            
                            // Check Bonus
                            if (state.planetsScanned === 4 && state.elapsedTime <= 60 && !state.bonusAwarded) {
                                state.score += 50;
                                state.bonusAwarded = true;
                            }
                            updateHUD();
                        }
                    }
                });
            }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = (now - lastTime) / 1000;
            lastTime = now;

            if (!state.isPaused) {
                accumulatedTime += dt;
                const newElapsed = Math.floor(accumulatedTime);
                if (newElapsed !== state.elapsedTime) {
                    state.elapsedTime = newElapsed;
                    updateHUD();
                }
            }

            handleMovement();
            updatePlanets();
            controls.update();
            renderer.render(scene, camera);
        }

        // Init
        updateHUD();
        animate();
    </script>
</body>
</html>
