<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planetary Orbit Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #fff;
    z-index: 100;
    background: rgba(0, 0, 0, 0.7);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    min-width: 220px;
}

#hud h2 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #ffcc00;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255, 204, 0, 0.3);
    padding-bottom: 8px;
}

.stat {
    font-size: 15px;
    margin: 8px 0;
    display: flex;
    justify-content: space-between;
}

.stat-label { color: #aaa; }
.stat-value { color: #fff; font-weight: bold; }

#score-display .stat-value { color: #ffcc00; font-size: 18px; }

#controls {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

#controls button {
    padding: 10px 18px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
    min-width: 140px;
}

#controls button:hover {
    background: rgba(255, 255, 255, 0.15);
    border-color: rgba(255, 255, 255, 0.4);
}

#controls button:active {
    transform: scale(0.97);
}

#scan-notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 28px;
    font-weight: bold;
    text-align: center;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 20px rgba(255, 204, 0, 0.8);
}

#instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
    z-index: 100;
    text-align: center;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px 20px;
    border-radius: 8px;
}

#bonus-banner {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ffcc00;
    font-size: 36px;
    font-weight: bold;
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    text-shadow: 0 0 30px rgba(255, 204, 0, 0.9);
}
</style>
</head>
<body>

<div id="hud">
    <h2>🚀 Space Scanner</h2>
    <div class="stat" id="score-display">
        <span class="stat-label">Score:</span>
        <span class="stat-value">0</span>
    </div>
    <div class="stat" id="scan-display">
        <span class="stat-label">Planets Scanned:</span>
        <span class="stat-value">0/4</span>
    </div>
    <div class="stat" id="time-display">
        <span class="stat-label">Time:</span>
        <span class="stat-value">0s</span>
    </div>
</div>

<div id="controls">
    <button id="pause-btn">⏸ Pause</button>
    <button id="reset-btn">🔄 Reset</button>
    <button id="toggle-orbits-btn">👁 Toggle Orbits</button>
    <button id="speed-btn">⚡ Speed: 1x</button>
</div>

<div id="scan-notification"></div>
<div id="bonus-banner"></div>

<div id="instructions">
    W/S: Forward/Back &nbsp;|&nbsp; A/D: Rotate &nbsp;|&nbsp; Q/E: Up/Down &nbsp;|&nbsp; Fly near planets to scan them!
</div>

<script src="https://unpkg.com/three@0.157.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.157.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.157.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// Initialize global state
window.__3D_STATE__ = {
    score: 0,
    planetsScanned: 0,
    scannedPlanets: { mercury: false, venus: false, earth: false, mars: false },
    elapsedTime: 0,
    isPaused: false,
    orbitsVisible: true,
    speedMultiplier: 1,
    spacecraftPosition: { x: 5, y: 2, z: 0 },
    planetPositions: {
        mercury: { x: 8, y: 0, z: 0 },
        venus: { x: 13, y: 0, z: 0 },
        earth: { x: 18, y: 0, z: 0 },
        mars: { x: 24, y: 0, z: 0 }
    },
    bonusAwarded: false,
    modelLoaded: false
};

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 40, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 10;
controls.maxDistance = 100;

// Ambient light
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

// Starfield
const starGroup = new THREE.Group();
const starGeometry = new THREE.SphereGeometry(0.15, 4, 4);
const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
for (let i = 0; i < 500; i++) {
    const star = new THREE.Mesh(starGeometry, starMaterial);
    const radius = 80 + Math.random() * 150;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;
    star.position.set(
        radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.sin(phi) * Math.sin(theta),
        radius * Math.cos(phi)
    );
    starGroup.add(star);
}
scene.add(starGroup);

// Sun
const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
const sunMaterial = new THREE.MeshBasicMaterial({
    color: 0xffdd00,
    emissive: 0xffdd00
});
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
scene.add(sun);

// Sun glow
const glowGeometry = new THREE.SphereGeometry(3.5, 32, 32);
const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    transparent: true,
    opacity: 0.2
});
const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(sunGlow);

// Point light at sun
const sunLight = new THREE.PointLight(0xffffff, 2, 200);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

// Planet definitions
const planetDefs = [
    { name: 'mercury', radius: 0.4, color: 0xff3333, orbitRadius: 8, speed: 0.02, points: 10 },
    { name: 'venus', radius: 0.6, color: 0xff8800, orbitRadius: 13, speed: 0.015, points: 20 },
    { name: 'earth', radius: 0.7, color: 0x3366ff, orbitRadius: 18, speed: 0.01, points: 30 },
    { name: 'mars', radius: 0.5, color: 0xcc4422, orbitRadius: 24, speed: 0.007, points: 40 }
];

const planets = [];
const orbitRings = [];

planetDefs.forEach(def => {
    // Planet mesh
    const geo = new THREE.SphereGeometry(def.radius, 24, 24);
    const mat = new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: 0.6,
        metalness: 0.2
    });
    const mesh = new THREE.Mesh(geo, mat);
    scene.add(mesh);

    // Orbit ring
    const ringGeo = new THREE.TorusGeometry(def.orbitRadius, 0.03, 8, 128);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x444466,
        transparent: true,
        opacity: 0.4
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    scene.add(ring);
    orbitRings.push(ring);

    planets.push({
        ...def,
        mesh: mesh,
        ring: ring,
        angle: Math.random() * Math.PI * 2,
        scanned: false
    });
});

// Spacecraft
let spacecraft = null;
let spacecraftRotation = 0;
const initialSpacecraftPos = new THREE.Vector3(5, 2, 0);

function createFallbackSpacecraft() {
    const group = new THREE.Group();

    // Main body - cone
    const bodyGeo = new THREE.ConeGeometry(0.5, 1.5, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00cc44, metalness: 0.5, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.x = Math.PI / 2;
    group.add(body);

    // Engine glow
    const engineGeo = new THREE.SphereGeometry(0.25, 8, 8);
    const engineMat = new THREE.MeshBasicMaterial({ color: 0x00ffaa, transparent: true, opacity: 0.7 });
    const engine = new THREE.Mesh(engineGeo, engineMat);
    engine.position.z = 0.75;
    group.add(engine);

    group.position.copy(initialSpacecraftPos);
    scene.add(group);
    spacecraft = group;
    window.__3D_STATE__.modelLoaded = false;
}

// Try loading Ferrari model
const loader = new THREE.GLTFLoader();
try {
    loader.load(
        '._ferrari.glb',
        (gltf) => {
            spacecraft = gltf.scene;
            spacecraft.scale.set(0.8, 0.8, 0.8);
            spacecraft.position.copy(initialSpacecraftPos);
            scene.add(spacecraft);
            window.__3D_STATE__.modelLoaded = true;
        },
        undefined,
        (error) => {
            console.log('Ferrari model not found, using fallback spacecraft');
            createFallbackSpacecraft();
        }
    );
} catch (e) {
    createFallbackSpacecraft();
}

// If model hasn't loaded after 2 seconds, use fallback
setTimeout(() => {
    if (!spacecraft) {
        createFallbackSpacecraft();
    }
}, 2000);

// Input handling
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// UI elements
const scoreDisplay = document.querySelector('#score-display .stat-value');
const scanDisplay = document.querySelector('#scan-display .stat-value');
const timeDisplay = document.querySelector('#time-display .stat-value');
const pauseBtn = document.getElementById('pause-btn');
const resetBtn = document.getElementById('reset-btn');
const toggleOrbitsBtn = document.getElementById('toggle-orbits-btn');
const speedBtn = document.getElementById('speed-btn');
const scanNotification = document.getElementById('scan-notification');
const bonusBanner = document.getElementById('bonus-banner');

// Game state
let score = 0;
let planetsScannedCount = 0;
let startTime = Date.now();
let isPaused = false;
let orbitsVisible = true;
let speedMultiplier = 1;
const speedOptions = [1, 2, 4];
let speedIndex = 0;
let bonusAwarded = false;
let pausedTimeAccumulated = 0;
let pauseStartTime = 0;

function showNotification(text, color = '#ffcc00') {
    scanNotification.textContent = text;
    scanNotification.style.color = color;
    scanNotification.style.opacity = '1';
    setTimeout(() => { scanNotification.style.opacity = '0'; }, 2000);
}

function showBonus() {
    bonusBanner.textContent = '🌟 BONUS +50! All planets scanned! 🌟';
    bonusBanner.style.opacity = '1';
    setTimeout(() => { bonusBanner.style.opacity = '0'; }, 3000);
}

// Button handlers
pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    if (isPaused) {
        pauseBtn.textContent = '▶ Resume';
        pauseStartTime = Date.now();
    } else {
        pauseBtn.textContent = '⏸ Pause';
        pausedTimeAccumulated += Date.now() - pauseStartTime;
    }
    window.__3D_STATE__.isPaused = isPaused;
});

resetBtn.addEventListener('click', () => {
    score = 0;
    planetsScannedCount = 0;
    bonusAwarded = false;
    startTime = Date.now();
    pausedTimeAccumulated = 0;
    if (isPaused) {
        isPaused = false;
        pauseBtn.textContent = '⏸ Pause';
    }

    planets.forEach(p => {
        p.scanned = false;
        p.angle = Math.random() * Math.PI * 2;
    });

    if (spacecraft) {
        spacecraft.position.copy(initialSpacecraftPos);
        spacecraft.rotation.set(0, 0, 0);
    }
    spacecraftRotation = 0;

    window.__3D_STATE__.score = 0;
    window.__3D_STATE__.planetsScanned = 0;
    window.__3D_STATE__.scannedPlanets = { mercury: false, venus: false, earth: false, mars: false };
    window.__3D_STATE__.elapsedTime = 0;
    window.__3D_STATE__.isPaused = false;
    window.__3D_STATE__.bonusAwarded = false;

    updateHUD(0);
});

toggleOrbitsBtn.addEventListener('click', () => {
    orbitsVisible = !orbitsVisible;
    orbitRings.forEach(r => { r.visible = orbitsVisible; });
    window.__3D_STATE__.orbitsVisible = orbitsVisible;
});

speedBtn.addEventListener('click', () => {
    speedIndex = (speedIndex + 1) % speedOptions.length;
    speedMultiplier = speedOptions[speedIndex];
    speedBtn.textContent = `⚡ Speed: ${speedMultiplier}x`;
    window.__3D_STATE__.speedMultiplier = speedMultiplier;
});

function updateHUD(elapsed) {
    scoreDisplay.textContent = score;
    scanDisplay.textContent = `${planetsScannedCount}/4`;
    timeDisplay.textContent = `${elapsed}s`;
}

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const elapsed = Math.floor((Date.now() - startTime - pausedTimeAccumulated) / 1000);
    const safeElapsed = Math.max(0, elapsed);

    if (!isPaused) {
        // Update planet positions
        planets.forEach(p => {
            p.angle += p.speed * speedMultiplier;
            const px = p.orbitRadius * Math.cos(p.angle);
            const pz = p.orbitRadius * Math.sin(p.angle);
            p.mesh.position.set(px, 0, pz);

            // Update state
            window.__3D_STATE__.planetPositions[p.name] = {
                x: parseFloat(px.toFixed(4)),
                y: 0,
                z: parseFloat(pz.toFixed(4))
            };
        });

        // Spacecraft controls
        if (spacecraft) {
            const moveSpeed = 0.3;
            const rotSpeed = 0.05;
            const vertSpeed = 0.2;

            if (keys['a']) {
                spacecraftRotation += rotSpeed;
                spacecraft.rotation.y = spacecraftRotation;
            }
            if (keys['d']) {
                spacecraftRotation -= rotSpeed;
                spacecraft.rotation.y = spacecraftRotation;
            }

            const forward = new THREE.Vector3(-Math.sin(spacecraftRotation), 0, -Math.cos(spacecraftRotation));

            if (keys['w']) {
                spacecraft.position.addScaledVector(forward, moveSpeed);
            }
            if (keys['s']) {
                spacecraft.position.addScaledVector(forward, -moveSpeed);
            }
            if (keys['q']) {
                spacecraft.position.y += vertSpeed;
            }
            if (keys['e']) {
                spacecraft.position.y -= vertSpeed;
            }

            // Clamp Y
            spacecraft.position.y = Math.max(-10, Math.min(20, spacecraft.position.y));

            // Update state
            window.__3D_STATE__.spacecraftPosition = {
                x: parseFloat(spacecraft.position.x.toFixed(4)),
                y: parseFloat(spacecraft.position.y.toFixed(4)),
                z: parseFloat(spacecraft.position.z.toFixed(4))
            };

            // Check scanning
            planets.forEach(p => {
                if (!p.scanned) {
                    const dist = spacecraft.position.distanceTo(p.mesh.position);
                    if (dist < 2.5) {
                        p.scanned = true;
                        score += p.points;
                        planetsScannedCount++;
                        window.__3D_STATE__.scannedPlanets[p.name] = true;
                        window.__3D_STATE__.score = score;
                        window.__3D_STATE__.planetsScanned = planetsScannedCount;

                        showNotification(`🔬 ${p.name.charAt(0).toUpperCase() + p.name.slice(1)} scanned! +${p.points} points`);

                        // Bonus check
                        if (planetsScannedCount === 4 && !bonusAwarded && safeElapsed <= 60) {
                            bonusAwarded = true;
                            score += 50;
                            window.__3D_STATE__.score = score;
                            window.__3D_STATE__.bonusAwarded = true;
                            showBonus();
                        }
                    }
                }
            });
        }
    }

    // Sun glow animation
    sunGlow.scale.setScalar(1 + 0.05 * Math.sin(Date.now() * 0.003));

    // Planet rotation
    planets.forEach(p => {
        p.mesh.rotation.y += 0.01;
    });

    // Update HUD
    window.__3D_STATE__.elapsedTime = safeElapsed;
    updateHUD(safeElapsed);

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
