<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Terrain Generation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
        }
        #hud-container {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }
        .control-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            font-size: 14px;
        }
        input[type="text"] {
            width: 80px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 2px 5px;
        }
        input[type="range"] {
            width: 120px;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 4px;
        }
        button:hover {
            background: #45a049;
        }
        .hud-item {
            font-size: 13px;
            margin-bottom: 5px;
        }
        .hud-item:last-child {
            margin-bottom: 0;
        }
        .hud-value {
            font-weight: bold;
            color: #4CAF50;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="seedInput">种子:</label>
            <input type="text" id="seedInput" value="threejs">
            <button id="regenBtn">重新生成</button>
        </div>
        <div class="control-group">
            <label for="heightSlider">高度缩放:</label>
            <input type="range" id="heightSlider" min="1" max="30" step="0.1" value="15">
        </div>
        <div class="control-group">
            <label for="waterSlider">水位:</label>
            <input type="range" id="waterSlider" min="-5" max="10" step="0.1" value="0">
        </div>
    </div>

    <div id="hud-container">
        <div class="hud-item">顶点数: <span id="vertexCount" class="hud-value">0</span></div>
        <div class="hud-item">最大高度: <span id="maxHeight" class="hud-value">0.00</span></div>
        <div class="hud-item">最小高度: <span id="minHeight" class="hud-value">0.00</span></div>
        <div class="hud-item">当前水位: <span id="waterLevel" class="hud-value">0.00</span></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 状态初始化 ---
        window.__3D_STATE__ = {
            vertexCount: 0,
            maxHeight: 0,
            minHeight: 0,
            waterLevel: 0,
            heightScale: 15,
            seed: "threejs",
            terrainCenter: { x: 0, y: 0, z: 0 }
        };

        // --- Simplex Noise 实现 ---
        class SimplexNoise {
            constructor(seedStr) {
                let seed = 0;
                for(let i = 0; i < seedStr.length; i++) {
                    seed = ((seed << 5) - seed) + seedStr.charCodeAt(i);
                    seed |= 0;
                }
                let a = seed;
                const rand = () => {
                    let t = a += 0x6D2B79F5;
                    t = Math.imul(t ^ t >>> 15, t | 1);
                    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                    return ((t ^ t >>> 14) >>> 0) / 4294967296;
                };

                this.p = new Uint8Array(256);
                for (let i = 0; i < 256; i++) this.p[i] = i;
                for (let i = 255; i > 0; i--) {
                    const r = Math.floor(rand() * (i + 1));
                    const temp = this.p[i];
                    this.p[i] = this.p[r];
                    this.p[r] = temp;
                }
                this.perm = new Uint8Array(512);
                this.permMod12 = new Uint8Array(512);
                for (let i = 0; i < 512; i++) {
                    this.perm[i] = this.p[i & 255];
                    this.permMod12[i] = (this.perm[i] % 12);
                }
            }

            noise2D(xin, yin) {
                const F2 = 0.5 * (Math.sqrt(3.0) - 1.0);
                const G2 = (3.0 - Math.sqrt(3.0)) / 6.0;
                let n0, n1, n2;
                const s = (xin + yin) * F2;
                const i = Math.floor(xin + s);
                const j = Math.floor(yin + s);
                const t = (i + j) * G2;
                const X0 = i - t;
                const Y0 = j - t;
                const x0 = xin - X0;
                const y0 = yin - Y0;
                let i1, j1;
                if (x0 > y0) { i1 = 1; j1 = 0; } else { i1 = 0; j1 = 1; }
                const x1 = x0 - i1 + G2;
                const y1 = y0 - j1 + G2;
                const x2 = x0 - 1.0 + 2.0 * G2;
                const y2 = y0 - 1.0 + 2.0 * G2;
                const ii = i & 255;
                const jj = j & 255;
                const gi0 = this.permMod12[ii + this.perm[jj]];
                const gi1 = this.permMod12[ii + i1 + this.perm[jj + j1]];
                const gi2 = this.permMod12[ii + 1 + this.perm[jj + 1]];
                let t0 = 0.5 - x0 * x0 - y0 * y0;
                if (t0 < 0) n0 = 0.0;
                else {
                    t0 *= t0;
                    n0 = t0 * t0 * this.gradP(gi0, x0, y0);
                }
                let t1 = 0.5 - x1 * x1 - y1 * y1;
                if (t1 < 0) n1 = 0.0;
                else {
                    t1 *= t1;
                    n1 = t1 * t1 * this.gradP(gi1, x1, y1);
                }
                let t2 = 0.5 - x2 * x2 - y2 * y2;
                if (t2 < 0) n2 = 0.0;
                else {
                    t2 *= t2;
                    n2 = t2 * t2 * this.gradP(gi2, x2, y2);
                }
                return 70.0 * (n0 + n1 + n2);
            }

            gradP(hash, x, y) {
                const h = hash & 7;
                const u = h < 4 ? x : y;
                const v = h < 4 ? y : x;
                return ((h & 1) ? -u : u) + ((h & 2) ? -2.0 * v : 2.0 * v);
            }
        }

        // --- Three.js 场景初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.006);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 80, 120);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.01;

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(100, 150, 50);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 400;
        dirLight.shadow.camera.left = -120;
        dirLight.shadow.camera.right = 120;
        dirLight.shadow.camera.top = 120;
        dirLight.shadow.camera.bottom = -120;
        scene.add(dirLight);

        // --- 水面 ---
        const waterGeometry = new THREE.PlaneGeometry(200, 200);
        waterGeometry.rotateX(-Math.PI / 2);
        const waterMaterial = new THREE.MeshStandardMaterial({
            color: 0x1e90ff,
            transparent: true,
            opacity: 0.6,
            roughness: 0.1,
            metalness: 0.1,
            depthWrite: false
        });
        const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
        waterMesh.receiveShadow = true;
        scene.add(waterMesh);

        // --- 地形生成逻辑 ---
        let terrainMesh = null;

        function generateTerrain() {
            if (terrainMesh) {
                scene.remove(terrainMesh);
                terrainMesh.geometry.dispose();
                terrainMesh.material.dispose();
            }

            const seed = document.getElementById('seedInput').value;
            const heightScale = parseFloat(document.getElementById('heightSlider').value);
            
            window.__3D_STATE__.seed = seed;
            window.__3D_STATE__.heightScale = heightScale;

            const simplex = new SimplexNoise(seed);
            const geometry = new THREE.PlaneGeometry(200, 200, 128, 128);
            geometry.rotateX(-Math.PI / 2);

            const positions = geometry.attributes.position.array;
            const colors = [];
            let minH = Infinity;
            let maxH = -Infinity;

            for (let i = 0; i < positions.length; i += 3) {
                const x = positions[i];
                const z = positions[i + 2];

                // 2 Octaves
                let elevation = 0;
                let frequency = 0.015;
                let amplitude = 1.0;
                let maxAmplitude = 0;

                for (let o = 0; o < 2; o++) {
                    elevation += simplex.noise2D(x * frequency, z * frequency) * amplitude;
                    maxAmplitude += amplitude;
                    frequency *= 2.0;
                    amplitude *= 0.5;
                }

                elevation = (elevation / maxAmplitude) * heightScale;
                positions[i + 1] = elevation;

                if (elevation < minH) minH = elevation;
                if (elevation > maxH) maxH = elevation;

                // 顶点着色
                const color = new THREE.Color();
                if (elevation < 0) {
                    color.setHex(0x1e90ff); // 深水 蓝色
                } else if (elevation < 2) {
                    color.setHex(0xffd700); // 沙滩 黄色
                } else if (elevation < 8) {
                    color.setHex(0x228b22); // 草地 绿色
                } else if (elevation < 15) {
                    color.setHex(0x808080); // 岩石 灰色
                } else {
                    color.setHex(0xffffff); // 雪 白色
                }
                colors.push(color.r, color.g, color.b);
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({
                vertexColors: true,
                roughness: 0.8,
                metalness: 0.05
            });

            terrainMesh = new THREE.Mesh(geometry, material);
            terrainMesh.castShadow = true;
            terrainMesh.receiveShadow = true;
            scene.add(terrainMesh);

            window.__3D_STATE__.vertexCount = positions.length / 3;
            window.__3D_STATE__.minHeight = minH;
            window.__3D_STATE__.maxHeight = maxH;
            window.__3D_STATE__.terrainCenter = { x: 0, y: 0, z: 0 };
        }

        // --- UI 交互与更新 ---
        function updateWaterLevel() {
            const level = parseFloat(document.getElementById('waterSlider').value);
            waterMesh.position.y = level;
            window.__3D_STATE__.waterLevel = level;
        }

        function updateHUD() {
            document.getElementById('vertexCount').innerText = window.__3D_STATE__.vertexCount;
            document.getElementById('maxHeight').innerText = window.__3D_STATE__.maxHeight.toFixed(2);
            document.getElementById('minHeight').innerText = window.__3D_STATE__.minHeight.toFixed(2);
            document.getElementById('waterLevel').innerText = window.__3D_STATE__.waterLevel.toFixed(2);
        }

        document.getElementById('regenBtn').addEventListener('click', generateTerrain);
        document.getElementById('heightSlider').addEventListener('input', generateTerrain);
        document.getElementById('waterSlider').addEventListener('input', updateWaterLevel);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 初始化执行 ---
        generateTerrain();
        updateWaterLevel();

        // --- 渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            updateHUD();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
