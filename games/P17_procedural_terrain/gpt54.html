<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 程序化地形生成（噪声 + 水面）</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87a9c4;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      max-width: calc(100vw - 24px);
      background: rgba(15, 23, 32, 0.78);
      color: #eef6ff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 14px 12px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
    }

    .panel h1 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin: 8px 0;
    }

    .row label {
      min-width: 78px;
      font-size: 13px;
      color: #dce8f5;
    }

    .row input[type="text"] {
      flex: 1;
      min-width: 0;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      outline: none;
      background: rgba(255,255,255,0.09);
      color: #fff;
    }

    .row input[type="range"] {
      flex: 1;
    }

    .row button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #4ea1ff;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    .row button:hover {
      background: #78b7ff;
    }

    .value {
      width: 42px;
      text-align: right;
      font-size: 12px;
      color: #b8d8ff;
    }

    .hud {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 12px;
      font-size: 12px;
    }

    .hud div {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #c8d8ea;
      line-height: 1.5;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div class="panel">
      <h1>程序化地形生成</h1>

      <div class="row">
        <label for="seedInput">种子</label>
        <input id="seedInput" type="text" value="terrain-001" />
        <button id="regenBtn">重新生成</button>
      </div>

      <div class="row">
        <label for="heightSlider">高度缩放</label>
        <input id="heightSlider" type="range" min="1" max="30" step="1" value="15" />
        <div class="value" id="heightValue">15</div>
      </div>

      <div class="row">
        <label for="waterSlider">水位</label>
        <input id="waterSlider" type="range" min="-5" max="10" step="0.1" value="0" />
        <div class="value" id="waterValue">0.0</div>
      </div>

      <div class="hud">
        <div>顶点数：<span id="vertexCount">0</span></div>
        <div>最大高度：<span id="maxHeight">0</span></div>
        <div>最小高度：<span id="minHeight">0</span></div>
        <div>当前水位：<span id="waterLevel">0</span></div>
      </div>

      <div class="hint">
        鼠标左键旋转，滚轮缩放，右键平移。修改种子或参数后点击“重新生成”。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const seedInput = document.getElementById('seedInput');
    const regenBtn = document.getElementById('regenBtn');
    const heightSlider = document.getElementById('heightSlider');
    const waterSlider = document.getElementById('waterSlider');
    const heightValue = document.getElementById('heightValue');
    const waterValue = document.getElementById('waterValue');

    const vertexCountEl = document.getElementById('vertexCount');
    const maxHeightEl = document.getElementById('maxHeight');
    const minHeightEl = document.getElementById('minHeight');
    const waterLevelEl = document.getElementById('waterLevel');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x9fc3dd);
    scene.fog = new THREE.Fog(0x9fc3dd, 120, 280);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(120, 90, 120);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 10, 0);
    controls.minDistance = 25;
    controls.maxDistance = 350;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.35);
    dirLight.position.set(80, 120, 60);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -160;
    dirLight.shadow.camera.right = 160;
    dirLight.shadow.camera.top = 160;
    dirLight.shadow.camera.bottom = -160;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 350;
    dirLight.shadow.bias = -0.0008;
    scene.add(dirLight);

    const hemi = new THREE.HemisphereLight(0xbfdfff, 0x5b6a52, 0.45);
    scene.add(hemi);

    const groundShadow = new THREE.Mesh(
      new THREE.PlaneGeometry(500, 500),
      new THREE.ShadowMaterial({ opacity: 0.12 })
    );
    groundShadow.rotation.x = -Math.PI / 2;
    groundShadow.position.y = -0.02;
    groundShadow.receiveShadow = true;
    scene.add(groundShadow);

    let terrainMesh = null;
    let waterMesh = null;

    const TERRAIN_SIZE = 200;
    const TERRAIN_SEGMENTS = 128;

    function hashStringToInt(str) {
      let h = 2166136261 >>> 0;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      let a = seed >>> 0;
      return function () {
        a |= 0;
        a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    class PerlinNoise {
      constructor(seedValue) {
        const seed = typeof seedValue === 'number' ? seedValue : hashStringToInt(String(seedValue));
        const rand = mulberry32(seed);
        const p = new Uint8Array(256);
        for (let i = 0; i < 256; i++) p[i] = i;
        for (let i = 255; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          const temp = p[i];
          p[i] = p[j];
          p[j] = temp;
        }
        this.perm = new Uint8Array(512);
        for (let i = 0; i < 512; i++) {
          this.perm[i] = p[i & 255];
        }
      }

      fade(t) {
        return t * t * t * (t * (t * 6 - 15) + 10);
      }

      lerp(a, b, t) {
        return a + t * (b - a);
      }

      grad(hash, x, y) {
        const h = hash & 7;
        const u = h < 4 ? x : y;
        const v = h < 4 ? y : x;
        return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
      }

      noise2D(x, y) {
        const X = Math.floor(x) & 255;
        const Y = Math.floor(y) & 255;

        const xf = x - Math.floor(x);
        const yf = y - Math.floor(y);

        const u = this.fade(xf);
        const v = this.fade(yf);

        const aa = this.perm[X + this.perm[Y]];
        const ab = this.perm[X + this.perm[Y + 1]];
        const ba = this.perm[X + 1 + this.perm[Y]];
        const bb = this.perm[X + 1 + this.perm[Y + 1]];

        const x1 = this.lerp(
          this.grad(aa, xf, yf),
          this.grad(ba, xf - 1, yf),
          u
        );
        const x2 = this.lerp(
          this.grad(ab, xf, yf - 1),
          this.grad(bb, xf - 1, yf - 1),
          u
        );

        return this.lerp(x1, x2, v);
      }
    }

    function createWater() {
      const geometry = new THREE.PlaneGeometry(TERRAIN_SIZE, TERRAIN_SIZE, 1, 1);
      const material = new THREE.MeshPhysicalMaterial({
        color: 0x3e8edc,
        transparent: true,
        opacity: 0.5,
        roughness: 0.18,
        metalness: 0.02,
        transmission: 0.0,
        clearcoat: 0.2,
        side: THREE.DoubleSide
      });

      waterMesh = new THREE.Mesh(geometry, material);
      waterMesh.rotation.x = -Math.PI / 2;
      waterMesh.position.y = parseFloat(waterSlider.value);
      waterMesh.receiveShadow = true;
      scene.add(waterMesh);
    }

    function getTerrainColor(h) {
      if (h < 0) return new THREE.Color(0x1f5fbf);
      if (h < 2) return new THREE.Color(0xd9c27a);
      if (h < 8) return new THREE.Color(0x4e8f45);
      if (h < 15) return new THREE.Color(0x7a7a7a);
      return new THREE.Color(0xf4f7fb);
    }

    function buildTerrain() {
      if (terrainMesh) {
        scene.remove(terrainMesh);
        terrainMesh.geometry.dispose();
        terrainMesh.material.dispose();
      }

      const seed = seedInput.value.trim() || 'terrain-001';
      const heightScale = parseFloat(heightSlider.value);
      const noise = new PerlinNoise(seed);

      const geometry = new THREE.PlaneGeometry(
        TERRAIN_SIZE,
        TERRAIN_SIZE,
        TERRAIN_SEGMENTS,
        TERRAIN_SEGMENTS
      );
      geometry.rotateX(-Math.PI / 2);

      const pos = geometry.attributes.position;
      const colors = [];
      let minHeight = Infinity;
      let maxHeight = -Infinity;

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);

        const n1 = noise.noise2D(x * 0.035, z * 0.035);
        const n2 = noise.noise2D(x * 0.08 + 100.5, z * 0.08 + 100.5);

        const combined = n1 * 0.7 + n2 * 0.3;
        let y = combined * heightScale;

        const distance = Math.sqrt(x * x + z * z) / (TERRAIN_SIZE * 0.75);
        const falloff = Math.max(0, 1 - distance * distance * 0.45);
        y *= falloff;

        pos.setY(i, y);
        if (y < minHeight) minHeight = y;
        if (y > maxHeight) maxHeight = y;

        const c = getTerrainColor(y);
        colors.push(c.r, c.g, c.b);
      }

      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geometry.computeVertexNormals();
      geometry.computeBoundingBox();
      geometry.computeBoundingSphere();

      const material = new THREE.MeshStandardMaterial({
        vertexColors: true,
        roughness: 0.95,
        metalness: 0.02,
        flatShading: false
      });

      terrainMesh = new THREE.Mesh(geometry, material);
      terrainMesh.castShadow = true;
      terrainMesh.receiveShadow = true;
      scene.add(terrainMesh);

      const vertexCount = pos.count;

      vertexCountEl.textContent = String(vertexCount);
      maxHeightEl.textContent = maxHeight.toFixed(2);
      minHeightEl.textContent = minHeight.toFixed(2);
      waterLevelEl.textContent = parseFloat(waterSlider.value).toFixed(1);

      update3DState(vertexCount, maxHeight, minHeight);
    }

    function updateWater() {
      const wl = parseFloat(waterSlider.value);
      waterMesh.position.y = wl;
      waterValue.textContent = wl.toFixed(1);
      waterLevelEl.textContent = wl.toFixed(1);
    }

    function update3DState(vertexCountOverride, maxHeightOverride, minHeightOverride) {
      let vertexCount = vertexCountOverride ?? 0;
      let maxHeight = maxHeightOverride ?? 0;
      let minHeight = minHeightOverride ?? 0;
      let center = { x: 0, y: 0, z: 0 };

      if (terrainMesh) {
        const pos = terrainMesh.geometry.attributes.position;
        vertexCount = pos.count;

        if (vertexCountOverride == null || maxHeightOverride == null || minHeightOverride == null) {
          let min = Infinity;
          let max = -Infinity;
          for (let i = 0; i < pos.count; i++) {
            const y = pos.getY(i);
            if (y < min) min = y;
            if (y > max) max = y;
          }
          minHeight = min;
          maxHeight = max;
        }

        const worldPos = new THREE.Vector3();
        terrainMesh.getWorldPosition(worldPos);
        center = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
      }

      window.__3D_STATE__ = {
        vertexCount: Math.floor(vertexCount),
        maxHeight: Number(maxHeight),
        minHeight: Number(minHeight),
        waterLevel: parseFloat(waterSlider.value),
        heightScale: parseFloat(heightSlider.value),
        seed: seedInput.value,
        terrainCenter: center
      };
    }

    createWater();
    buildTerrain();
    updateWater();
    heightValue.textContent = heightSlider.value;

    regenBtn.addEventListener('click', () => {
      buildTerrain();
    });

    heightSlider.addEventListener('input', () => {
      heightValue.textContent = heightSlider.value;
    });

    waterSlider.addEventListener('input', () => {
      updateWater();
    });

    seedInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') buildTerrain();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      if (waterMesh) {
        waterMesh.material.color.setHSL(0.57, 0.62, 0.47 + Math.sin(t * 0.6) * 0.02);
      }

      controls.update();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
