<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PBR Material Editor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            color: #fff;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        #hud span {
            font-weight: bold;
            color: #4da6ff;
        }
        #editor {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
            width: 250px;
            box-sizing: border-box;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 12px;
            color: #ccc;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        input[type="color"] {
            width: 100%;
            height: 30px;
            border: none;
            padding: 0;
            cursor: pointer;
            background: none;
        }
        .env-buttons {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }
        .env-buttons button {
            flex: 1;
            padding: 8px 0;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        .env-buttons button:hover {
            background: #555;
        }
        .env-buttons button.active {
            background: #4da6ff;
            border-color: #4da6ff;
            color: #000;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="hud">
        <div>Environment: <span id="envName">Studio</span></div>
        <div>Roughness: <span id="roughnessVal">1.00</span></div>
        <div>Metalness: <span id="metalnessVal">1.00</span></div>
    </div>

    <div id="editor">
        <div class="control-group">
            <label for="roughness">Roughness (0 - 1)</label>
            <input type="range" id="roughness" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="control-group">
            <label for="metalness">Metalness (0 - 1)</label>
            <input type="range" id="metalness" min="0" max="1" step="0.01" value="1">
        </div>
        <div class="control-group">
            <label for="normalScale">Normal Scale (0 - 2)</label>
            <input type="range" id="normalScale" min="0" max="2" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label for="emissive">Emissive Intensity (0 - 3)</label>
            <input type="range" id="emissive" min="0" max="3" step="0.1" value="1">
        </div>
        <div class="control-group">
            <label for="baseColor">Base Color</label>
            <input type="color" id="baseColor" value="#ffffff">
        </div>
        <div class="control-group">
            <label>Environment Presets</label>
            <div class="env-buttons">
                <button id="btn-studio" class="active">Studio</button>
                <button id="btn-outdoor">Outdoor</button>
                <button id="btn-night">Night</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // State Initialization
        window.__3D_STATE__ = {
            modelLoaded: false,
            roughness: 1.0,
            metalness: 1.0,
            normalScale: 1.0,
            emissiveIntensity: 1.0,
            envMap: 'Studio'
        };

        // Scene Setup
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // PMREM & Environments
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        pmremGenerator.compileEquirectangularShader();

        let envTextures = {};

        function generateEnvironments() {
            // Studio
            envTextures['Studio'] = pmremGenerator.fromScene(new RoomEnvironment()).texture;

            // Outdoor
            const outdoorScene = new THREE.Scene();
            outdoorScene.background = new THREE.Color(0x87CEEB);
            const sun = new THREE.DirectionalLight(0xffffff, 3);
            sun.position.set(1, 1, 1);
            outdoorScene.add(sun);
            outdoorScene.add(new THREE.AmbientLight(0x404040, 1.5));
            const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshBasicMaterial({color: 0x3b5e2b}));
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -1;
            outdoorScene.add(ground);
            envTextures['Outdoor'] = pmremGenerator.fromScene(outdoorScene).texture;

            // Night
            const nightScene = new THREE.Scene();
            nightScene.background = new THREE.Color(0x050510);
            const moon = new THREE.DirectionalLight(0x8888ff, 0.5);
            moon.position.set(-1, 1, -1);
            nightScene.add(moon);
            const pointLight = new THREE.PointLight(0xffaa00, 5, 10);
            pointLight.position.set(2, 0, 2);
            nightScene.add(pointLight);
            envTextures['Night'] = pmremGenerator.fromScene(nightScene).texture;
        }

        generateEnvironments();

        function setEnvironment(name) {
            scene.environment = envTextures[name];
            
            if (name === 'Studio') scene.background = new THREE.Color(0x222222);
            else if (name === 'Outdoor') scene.background = new THREE.Color(0x87CEEB);
            else if (name === 'Night') scene.background = new THREE.Color(0x050510);

            document.getElementById('envName').innerText = name;
            window.__3D_STATE__.envMap = name;

            document.querySelectorAll('.env-buttons button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${name.toLowerCase()}`).classList.add('active');
        }

        setEnvironment('Studio');

        // Model Loading
        let targetMaterial = null;
        const loader = new GLTFLoader();
        
        loader.load('assets/DamagedHelmet.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center model
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            scene.add(model);

            // Find material
            model.traverse((child) => {
                if (child.isMesh && child.material) {
                    targetMaterial = child.material;
                    
                    // Apply initial UI values to material
                    targetMaterial.roughness = parseFloat(document.getElementById('roughness').value);
                    targetMaterial.metalness = parseFloat(document.getElementById('metalness').value);
                    const ns = parseFloat(document.getElementById('normalScale').value);
                    if(targetMaterial.normalScale) targetMaterial.normalScale.set(ns, ns);
                    targetMaterial.emissiveIntensity = parseFloat(document.getElementById('emissive').value);
                    targetMaterial.color.set(document.getElementById('baseColor').value);
                }
            });

            window.__3D_STATE__.modelLoaded = true;
        });

        // UI Event Listeners
        const elRoughness = document.getElementById('roughness');
        const elMetalness = document.getElementById('metalness');
        const elNormalScale = document.getElementById('normalScale');
        const elEmissive = document.getElementById('emissive');
        const elBaseColor = document.getElementById('baseColor');
        
        const hudRoughness = document.getElementById('roughnessVal');
        const hudMetalness = document.getElementById('metalnessVal');

        elRoughness.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (targetMaterial) targetMaterial.roughness = val;
            hudRoughness.innerText = val.toFixed(2);
        });

        elMetalness.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (targetMaterial) targetMaterial.metalness = val;
            hudMetalness.innerText = val.toFixed(2);
        });

        elNormalScale.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (targetMaterial && targetMaterial.normalScale) targetMaterial.normalScale.set(val, val);
        });

        elEmissive.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            if (targetMaterial) targetMaterial.emissiveIntensity = val;
        });

        elBaseColor.addEventListener('input', (e) => {
            if (targetMaterial) targetMaterial.color.set(e.target.value);
        });

        document.getElementById('btn-studio').addEventListener('click', () => setEnvironment('Studio'));
        document.getElementById('btn-outdoor').addEventListener('click', () => setEnvironment('Outdoor'));
        document.getElementById('btn-night').addEventListener('click', () => setEnvironment('Night'));

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);

            // Update State
            window.__3D_STATE__.roughness = parseFloat(elRoughness.value);
            window.__3D_STATE__.metalness = parseFloat(elMetalness.value);
            window.__3D_STATE__.normalScale = parseFloat(elNormalScale.value);
            window.__3D_STATE__.emissiveIntensity = parseFloat(elEmissive.value);
        }

        animate();
    </script>
</body>
</html>
