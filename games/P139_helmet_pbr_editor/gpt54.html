<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js PBR 材质编辑器 - DamagedHelmet</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      min-width: 220px;
      line-height: 1.7;
      font-size: 14px;
    }

    .panel {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      width: 300px;
      background: rgba(0, 0, 0, 0.55);
      padding: 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .control {
      margin-bottom: 12px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .control input[type="color"] {
      width: 100%;
      height: 36px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .env-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .env-buttons button {
      flex: 1;
      min-width: 80px;
      padding: 8px 10px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .env-buttons button:hover {
      background: rgba(255,255,255,0.16);
    }

    .env-buttons button.active {
      background: #4c8bf5;
      border-color: #4c8bf5;
    }

    .loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 15;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div class="hud">
      <div>环境：<span id="envName">Studio</span></div>
      <div>Roughness：<span id="roughnessVal">0.50</span></div>
      <div>Metalness：<span id="metalnessVal">1.00</span></div>
    </div>

    <div class="panel">
      <h2>PBR 材质编辑器</h2>

      <div class="control">
        <label for="roughness">
          <span>Roughness</span>
          <span id="roughnessText">0.50</span>
        </label>
        <input id="roughness" type="range" min="0" max="1" step="0.01" value="0.5" />
      </div>

      <div class="control">
        <label for="metalness">
          <span>Metalness</span>
          <span id="metalnessText">1.00</span>
        </label>
        <input id="metalness" type="range" min="0" max="1" step="0.01" value="1" />
      </div>

      <div class="control">
        <label for="normalScale">
          <span>Normal Scale</span>
          <span id="normalScaleText">1.00</span>
        </label>
        <input id="normalScale" type="range" min="0" max="2" step="0.1" value="1" />
      </div>

      <div class="control">
        <label for="emissive">
          <span>Emissive Intensity</span>
          <span id="emissiveText">0.00</span>
        </label>
        <input id="emissive" type="range" min="0" max="3" step="0.1" value="0" />
      </div>

      <div class="control">
        <label for="baseColor">
          <span>基础颜色</span>
        </label>
        <input id="baseColor" type="color" value="#ffffff" />
      </div>

      <div class="control">
        <label>环境预设</label>
        <div class="env-buttons">
          <button id="envStudio" class="active" data-env="Studio">Studio</button>
          <button id="envOutdoor" data-env="Outdoor">Outdoor</button>
          <button id="envNight" data-env="Night">Night</button>
        </div>
      </div>
    </div>

    <div class="loading" id="loading">正在加载 DamagedHelmet...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const roughnessEl = document.getElementById('roughness');
    const metalnessEl = document.getElementById('metalness');
    const normalScaleEl = document.getElementById('normalScale');
    const emissiveEl = document.getElementById('emissive');
    const baseColorEl = document.getElementById('baseColor');

    const roughnessValEl = document.getElementById('roughnessVal');
    const metalnessValEl = document.getElementById('metalnessVal');
    const envNameEl = document.getElementById('envName');

    const roughnessText = document.getElementById('roughnessText');
    const metalnessText = document.getElementById('metalnessText');
    const normalScaleText = document.getElementById('normalScaleText');
    const emissiveText = document.getElementById('emissiveText');

    const loadingEl = document.getElementById('loading');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(1.8, 1.2, 2.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(4, 6, 4);
    scene.add(dirLight);

    const hemiLight = new THREE.HemisphereLight(0xbfdfff, 0x443322, 0.35);
    scene.add(hemiLight);

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();

    let helmetRoot = null;
    let helmetMaterials = [];
    let currentEnvName = 'Studio';

    const envButtons = {
      Studio: document.getElementById('envStudio'),
      Outdoor: document.getElementById('envOutdoor'),
      Night: document.getElementById('envNight')
    };

    function createEnvironmentPreset(name) {
      const envScene = new THREE.Scene();

      if (name === 'Studio') {
        envScene.background = new THREE.Color(0x20242a);

        const a = new THREE.AmbientLight(0xffffff, 0.4);
        envScene.add(a);

        const l1 = new THREE.DirectionalLight(0xffffff, 3.0);
        l1.position.set(5, 8, 6);
        envScene.add(l1);

        const l2 = new THREE.DirectionalLight(0xfff2dd, 2.0);
        l2.position.set(-6, 3, 2);
        envScene.add(l2);

        const l3 = new THREE.DirectionalLight(0xddeeff, 1.5);
        l3.position.set(0, -2, -6);
        envScene.add(l3);
      } else if (name === 'Outdoor') {
        envScene.background = new THREE.Color(0x87b9ff);

        const hemi = new THREE.HemisphereLight(0xbfe3ff, 0x5a6b3a, 1.6);
        envScene.add(hemi);

        const sun = new THREE.DirectionalLight(0xfff4d6, 3.5);
        sun.position.set(8, 10, 4);
        envScene.add(sun);

        const bounce = new THREE.DirectionalLight(0x9ecbff, 1.2);
        bounce.position.set(-5, 2, -7);
        envScene.add(bounce);
      } else if (name === 'Night') {
        envScene.background = new THREE.Color(0x08111f);

        const hemi = new THREE.HemisphereLight(0x335577, 0x080808, 0.5);
        envScene.add(hemi);

        const moon = new THREE.DirectionalLight(0x9bbcff, 2.2);
        moon.position.set(-4, 7, 3);
        envScene.add(moon);

        const rim = new THREE.DirectionalLight(0x66ccff, 1.2);
        rim.position.set(5, 1, -6);
        envScene.add(rim);

        const warm = new THREE.DirectionalLight(0xff8844, 0.4);
        warm.position.set(0, -2, 4);
        envScene.add(warm);
      }

      const rt = pmremGenerator.fromScene(envScene, 0.04);
      return rt.texture;
    }

    const envMaps = {
      Studio: createEnvironmentPreset('Studio'),
      Outdoor: createEnvironmentPreset('Outdoor'),
      Night: createEnvironmentPreset('Night')
    };

    function setEnvironment(name) {
      currentEnvName = name;
      scene.environment = envMaps[name];
      envNameEl.textContent = name;

      Object.values(envButtons).forEach(btn => btn.classList.remove('active'));
      envButtons[name].classList.add('active');

      applyMaterialParams();
    }

    function centerModel(object) {
      const box = new THREE.Box3().setFromObject(object);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      object.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.6 / maxDim;
      object.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(object);
      const center2 = box2.getCenter(new THREE.Vector3());
      const minY = box2.min.y;

      object.position.x -= center2.x;
      object.position.y -= minY;
      object.position.z -= center2.z;

      controls.target.set(0, size.y * scale * 0.35, 0);
      controls.update();
    }

    function applyMaterialParams() {
      const roughness = parseFloat(roughnessEl.value);
      const metalness = parseFloat(metalnessEl.value);
      const normalScale = parseFloat(normalScaleEl.value);
      const emissiveIntensity = parseFloat(emissiveEl.value);
      const baseColor = new THREE.Color(baseColorEl.value);

      roughnessValEl.textContent = roughness.toFixed(2);
      metalnessValEl.textContent = metalness.toFixed(2);

      roughnessText.textContent = roughness.toFixed(2);
      metalnessText.textContent = metalness.toFixed(2);
      normalScaleText.textContent = normalScale.toFixed(2);
      emissiveText.textContent = emissiveIntensity.toFixed(2);

      helmetMaterials.forEach((material) => {
        if (!material || !material.isMeshStandardMaterial) return;

        material.roughness = roughness;
        material.metalness = metalness;
        material.color.copy(baseColor);
        material.emissive.set(baseColor).multiplyScalar(0.15);
        material.emissiveIntensity = emissiveIntensity;

        if (material.normalScale) {
          material.normalScale.set(normalScale, normalScale);
        }

        material.envMapIntensity = 1.0;
        material.needsUpdate = true;
      });
    }

    [roughnessEl, metalnessEl, normalScaleEl, emissiveEl, baseColorEl].forEach((el) => {
      el.addEventListener('input', applyMaterialParams);
    });

    Object.entries(envButtons).forEach(([name, button]) => {
      button.addEventListener('click', () => setEnvironment(name));
    });

    const loader = new GLTFLoader();
    loader.load(
      'assets/DamagedHelmet.glb',
      (gltf) => {
        helmetRoot = gltf.scene;
        centerModel(helmetRoot);

        helmetRoot.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;

            if (Array.isArray(child.material)) {
              child.material.forEach((mat) => {
                if (mat && mat.isMeshStandardMaterial) helmetMaterials.push(mat);
              });
            } else if (child.material && child.material.isMeshStandardMaterial) {
              helmetMaterials.push(child.material);
            }
          }
        });

        scene.add(helmetRoot);
        setEnvironment('Studio');
        applyMaterialParams();
        loadingEl.style.display = 'none';
      },
      undefined,
      (error) => {
        console.error('模型加载失败：', error);
        loadingEl.textContent = '模型加载失败，请检查 assets/DamagedHelmet.glb 路径';
      }
    );

    window.__3D_STATE__ = {
      modelLoaded: false,
      roughness: parseFloat(roughnessEl.value),
      metalness: parseFloat(metalnessEl.value),
      normalScale: parseFloat(normalScaleEl.value),
      emissiveIntensity: parseFloat(emissiveEl.value),
      envMap: currentEnvName
    };

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      window.__3D_STATE__ = {
        modelLoaded: !!helmetRoot,
        roughness: parseFloat(roughnessEl.value),
        metalness: parseFloat(metalnessEl.value),
        normalScale: parseFloat(normalScaleEl.value),
        emissiveIntensity: parseFloat(emissiveEl.value),
        envMap: currentEnvName
      };

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
