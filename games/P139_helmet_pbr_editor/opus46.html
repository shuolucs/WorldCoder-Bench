<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBR Material Editor - DamagedHelmet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #panel {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 320px;
    background: rgba(15, 15, 35, 0.92);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 24px;
    color: #e0e0e0;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  #panel h2 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    color: #fff;
    text-align: center;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #667eea, #764ba2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .control-group {
    margin-bottom: 16px;
  }

  .control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #aaa;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .control-group label span {
    color: #667eea;
    font-weight: 600;
    font-size: 14px;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #2a2a4a, #3a3a6a);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea, #764ba2);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
    transition: transform 0.15s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
  }

  .color-group {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .color-group label {
    margin-bottom: 0;
    flex: 1;
  }

  input[type="color"] {
    -webkit-appearance: none;
    width: 48px;
    height: 32px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    padding: 2px;
  }

  input[type="color"]::-webkit-color-swatch-wrapper {
    padding: 0;
  }

  input[type="color"]::-webkit-color-swatch {
    border: none;
    border-radius: 5px;
  }

  .env-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }

  .env-section h3 {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .env-buttons {
    display: flex;
    gap: 8px;
  }

  .env-btn {
    flex: 1;
    padding: 10px 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.03);
    color: #ccc;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.25s;
  }

  .env-btn:hover {
    background: rgba(102, 126, 234, 0.15);
    border-color: rgba(102, 126, 234, 0.3);
  }

  .env-btn.active {
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
    border-color: #667eea;
    color: #fff;
    box-shadow: 0 2px 12px rgba(102, 126, 234, 0.2);
  }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(15, 15, 35, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 16px 20px;
    color: #e0e0e0;
    font-size: 14px;
    line-height: 1.8;
    min-width: 200px;
  }

  #hud .hud-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #667eea;
    margin-bottom: 8px;
    font-weight: 700;
  }

  #hud .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  #hud .hud-label {
    color: #888;
    font-size: 13px;
  }

  #hud .hud-value {
    color: #fff;
    font-weight: 600;
    font-size: 13px;
  }

  .loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(102, 126, 234, 0.2);
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
</div>

<div id="hud">
  <div class="hud-title">Status</div>
  <div class="hud-row">
    <span class="hud-label">Environment</span>
    <span class="hud-value" id="envName">Studio</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Roughness</span>
    <span class="hud-value" id="roughnessVal">1.00</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">Metalness</span>
    <span class="hud-value" id="metalnessVal">1.00</span>
  </div>
</div>

<div id="panel">
  <h2>PBR Material Editor</h2>

  <div class="control-group">
    <label>Roughness <span id="roughnessDisplay">1.00</span></label>
    <input type="range" id="roughness" min="0" max="1" step="0.01" value="1">
  </div>

  <div class="control-group">
    <label>Metalness <span id="metalnessDisplay">1.00</span></label>
    <input type="range" id="metalness" min="0" max="1" step="0.01" value="1">
  </div>

  <div class="control-group">
    <label>Normal Scale <span id="normalScaleDisplay">1.0</span></label>
    <input type="range" id="normalScale" min="0" max="2" step="0.1" value="1">
  </div>

  <div class="control-group">
    <label>Emissive Intensity <span id="emissiveDisplay">1.0</span></label>
    <input type="range" id="emissive" min="0" max="3" step="0.1" value="1">
  </div>

  <div class="control-group color-group">
    <label>Base Color</label>
    <input type="color" id="baseColor" value="#ffffff">
  </div>

  <div class="env-section">
    <h3>Environment Preset</h3>
    <div class="env-buttons">
      <button class="env-btn active" data-env="Studio">Studio</button>
      <button class="env-btn" data-env="Outdoor">Outdoor</button>
      <button class="env-btn" data-env="Night">Night</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Initialize state
window.__3D_STATE__ = {
  modelLoaded: false,
  roughness: 1,
  metalness: 1,
  normalScale: 1,
  emissiveIntensity: 1,
  envMap: 'Studio'
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 1.5;
controls.maxDistance = 8;

// PMREMGenerator
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Environment presets - procedurally generated
function createEnvironmentTexture(preset) {
  const canvas = document.createElement('canvas');
  canvas.width = 1024;
  canvas.height = 512;
  const ctx = canvas.getContext('2d');

  if (preset === 'Studio') {
    // Neutral studio with soft gradients
    const grad = ctx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#404060');
    grad.addColorStop(0.3, '#606080');
    grad.addColorStop(0.5, '#808090');
    grad.addColorStop(0.7, '#505060');
    grad.addColorStop(1, '#303040');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1024, 512);

    // Add some bright spots for reflections
    for (let i = 0; i < 6; i++) {
      const x = 100 + i * 160;
      const y = 120 + Math.sin(i * 1.2) * 60;
      const radGrad = ctx.createRadialGradient(x, y, 0, x, y, 80);
      radGrad.addColorStop(0, 'rgba(255, 255, 240, 0.8)');
      radGrad.addColorStop(0.3, 'rgba(220, 220, 230, 0.4)');
      radGrad.addColorStop(1, 'rgba(128, 128, 140, 0)');
      ctx.fillStyle = radGrad;
      ctx.fillRect(x - 80, y - 80, 160, 160);
    }

    // Bottom fill light
    const bottomGrad = ctx.createRadialGradient(512, 480, 0, 512, 480, 300);
    bottomGrad.addColorStop(0, 'rgba(180, 180, 200, 0.5)');
    bottomGrad.addColorStop(1, 'rgba(60, 60, 80, 0)');
    ctx.fillStyle = bottomGrad;
    ctx.fillRect(0, 300, 1024, 212);

  } else if (preset === 'Outdoor') {
    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, 512);
    skyGrad.addColorStop(0, '#1a3a6a');
    skyGrad.addColorStop(0.15, '#3a7acc');
    skyGrad.addColorStop(0.35, '#6ab4ee');
    skyGrad.addColorStop(0.5, '#a0d4f0');
    skyGrad.addColorStop(0.55, '#90c060');
    skyGrad.addColorStop(0.6, '#608030');
    skyGrad.addColorStop(1, '#405020');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, 1024, 512);

    // Sun
    const sunX = 300, sunY = 80;
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 120);
    sunGrad.addColorStop(0, 'rgba(255, 255, 220, 1)');
    sunGrad.addColorStop(0.1, 'rgba(255, 240, 180, 0.9)');
    sunGrad.addColorStop(0.4, 'rgba(255, 200, 100, 0.3)');
    sunGrad.addColorStop(1, 'rgba(100, 180, 240, 0)');
    ctx.fillStyle = sunGrad;
    ctx.fillRect(sunX - 120, sunY - 120, 240, 240);

    // Clouds
    for (let i = 0; i < 5; i++) {
      const cx = 150 + i * 200;
      const cy = 100 + Math.random() * 80;
      const cloudGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 60 + Math.random() * 40);
      cloudGrad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
      cloudGrad.addColorStop(1, 'rgba(200, 220, 240, 0)');
      ctx.fillStyle = cloudGrad;
      ctx.fillRect(cx - 80, cy - 40, 160, 80);
    }

  } else if (preset === 'Night') {
    // Dark sky
    const nightGrad = ctx.createLinearGradient(0, 0, 0, 512);
    nightGrad.addColorStop(0, '#050510');
    nightGrad.addColorStop(0.3, '#0a0a20');
    nightGrad.addColorStop(0.5, '#101030');
    nightGrad.addColorStop(0.55, '#0a0a15');
    nightGrad.addColorStop(1, '#050508');
    ctx.fillStyle = nightGrad;
    ctx.fillRect(0, 0, 1024, 512);

    // Stars
    for (let i = 0; i < 200; i++) {
      const sx = Math.random() * 1024;
      const sy = Math.random() * 256;
      const brightness = Math.random();
      const size = 0.5 + Math.random() * 1.5;
      ctx.fillStyle = `rgba(${200 + brightness * 55}, ${200 + brightness * 55}, ${220 + brightness * 35}, ${0.3 + brightness * 0.7})`;
      ctx.beginPath();
      ctx.arc(sx, sy, size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Moon
    const moonX = 700, moonY = 80;
    const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, 80);
    moonGrad.addColorStop(0, 'rgba(200, 210, 255, 0.8)');
    moonGrad.addColorStop(0.15, 'rgba(150, 170, 220, 0.5)');
    moonGrad.addColorStop(0.5, 'rgba(80, 90, 150, 0.15)');
    moonGrad.addColorStop(1, 'rgba(10, 10, 30, 0)');
    ctx.fillStyle = moonGrad;
    ctx.fillRect(moonX - 80, moonY - 80, 160, 160);

    // Subtle blue rim light
    const rimGrad = ctx.createRadialGradient(200, 250, 0, 200, 250, 200);
    rimGrad.addColorStop(0, 'rgba(40, 60, 120, 0.3)');
    rimGrad.addColorStop(1, 'rgba(10, 10, 30, 0)');
    ctx.fillStyle = rimGrad;
    ctx.fillRect(0, 50, 400, 400);
  }

  const texture = new THREE.CanvasTexture(canvas);
  texture.mapping = THREE.EquirectangularReflectionMapping;
  return texture;
}

let currentEnvName = 'Studio';
let currentEnvMap = null;

function setEnvironment(name) {
  currentEnvName = name;
  const texture = createEnvironmentTexture(name);
  const envMap = pmremGenerator.fromEquirectangular(texture).texture;
  texture.dispose();

  if (currentEnvMap) {
    currentEnvMap.dispose();
  }
  currentEnvMap = envMap;

  scene.environment = envMap;
  scene.background = new THREE.Color(
    name === 'Studio' ? 0x1a1a2e :
    name === 'Outdoor' ? 0x87CEEB :
    0x050510
  );

  // Update materials
  if (helmetMaterials.length > 0) {
    helmetMaterials.forEach(mat => {
      mat.envMap = envMap;
      mat.needsUpdate = true;
    });
  }

  // Update HUD
  document.getElementById('envName').textContent = name;

  // Update buttons
  document.querySelectorAll('.env-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.env === name);
  });

  window.__3D_STATE__.envMap = name;
}

// Model loading
const loader = new GLTFLoader();
let helmetMaterials = [];
let helmetModel = null;

loader.load('assets/DamagedHelmet.glb', (gltf) => {
  helmetModel = gltf.scene;

  // Center model
  const box = new THREE.Box3().setFromObject(helmetModel);
  const center = box.getCenter(new THREE.Vector3());
  helmetModel.position.sub(center);

  // Collect materials
  helmetModel.traverse((child) => {
    if (child.isMesh && child.material) {
      if (Array.isArray(child.material)) {
        helmetMaterials.push(...child.material);
      } else {
        helmetMaterials.push(child.material);
      }
    }
  });

  scene.add(helmetModel);

  // Set initial environment
  setEnvironment('Studio');

  window.__3D_STATE__.modelLoaded = true;

  // Hide loading overlay
  document.getElementById('loadingOverlay').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('loadingOverlay').style.display = 'none';
  }, 500);

}, undefined, (error) => {
  console.error('Error loading model:', error);
  document.getElementById('loadingOverlay').innerHTML = '<div style="color:#ff6b6b;font-family:sans-serif;text-align:center;"><p>Failed to load model</p><p style="font-size:12px;color:#888;">Check that assets/DamagedHelmet.glb exists</p></div>';
});

// UI Controls
const roughnessSlider = document.getElementById('roughness');
const metalnessSlider = document.getElementById('metalness');
const normalScaleSlider = document.getElementById('normalScale');
const emissiveSlider = document.getElementById('emissive');
const baseColorPicker = document.getElementById('baseColor');

function updateMaterials() {
  const roughness = parseFloat(roughnessSlider.value);
  const metalness = parseFloat(metalnessSlider.value);
  const normalScale = parseFloat(normalScaleSlider.value);
  const emissiveIntensity = parseFloat(emissiveSlider.value);
  const baseColor = new THREE.Color(baseColorPicker.value);

  helmetMaterials.forEach(mat => {
    if (mat.isMeshStandardMaterial || mat.isMeshPhysicalMaterial) {
      mat.roughness = roughness;
      mat.metalness = metalness;
      if (mat.normalScale) {
        mat.normalScale.set(normalScale, normalScale);
      }
      mat.emissiveIntensity = emissiveIntensity;
      mat.color.copy(baseColor);
      mat.needsUpdate = true;
    }
  });

  // Update displays
  document.getElementById('roughnessDisplay').textContent = roughness.toFixed(2);
  document.getElementById('metalnessDisplay').textContent = metalness.toFixed(2);
  document.getElementById('normalScaleDisplay').textContent = normalScale.toFixed(1);
  document.getElementById('emissiveDisplay').textContent = emissiveIntensity.toFixed(1);

  // Update HUD
  document.getElementById('roughnessVal').textContent = roughness.toFixed(2);
  document.getElementById('metalnessVal').textContent = metalness.toFixed(2);

  // Update state
  window.__3D_STATE__.roughness = roughness;
  window.__3D_STATE__.metalness = metalness;
  window.__3D_STATE__.normalScale = normalScale;
  window.__3D_STATE__.emissiveIntensity = emissiveIntensity;
}

roughnessSlider.addEventListener('input', updateMaterials);
metalnessSlider.addEventListener('input', updateMaterials);
normalScaleSlider.addEventListener('input', updateMaterials);
emissiveSlider.addEventListener('input', updateMaterials);
baseColorPicker.addEventListener('input', updateMaterials);

// Environment buttons
document.querySelectorAll('.env-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    setEnvironment(btn.dataset.env);
  });
});

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Update state every frame
  window.__3D_STATE__ = {
    modelLoaded: helmetModel !== null,
    roughness: parseFloat(roughnessSlider.value),
    metalness: parseFloat(metalnessSlider.value),
    normalScale: parseFloat(normalScaleSlider.value),
    emissiveIntensity: parseFloat(emissiveSlider.value),
    envMap: currentEnvName
  };

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
