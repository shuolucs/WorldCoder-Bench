<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js CSS3D 元素周期表</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000511;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 12px 14px;
      background: rgba(8, 14, 30, 0.72);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 10px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #ui label {
      font-size: 13px;
      color: rgba(255,255,255,0.85);
    }

    #layoutMode,
    #searchInput {
      height: 34px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      outline: none;
      padding: 0 10px;
    }

    #layoutMode option {
      color: #000;
    }

    #searchInput {
      width: 220px;
    }

    #hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.75);
      background: rgba(8, 14, 30, 0.62);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      backdrop-filter: blur(8px);
      pointer-events: none;
    }

    .element {
      width: 120px;
      height: 160px;
      position: relative;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      box-shadow: 0 0 16px rgba(255,255,255,0.08), inset 0 0 20px rgba(255,255,255,0.05);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.25s ease, transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      overflow: hidden;
    }

    .element:hover {
      transform: scale(1.04);
      box-shadow: 0 0 24px rgba(255,255,255,0.18), inset 0 0 26px rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.85);
    }

    .element.selected {
      border-color: #ffffff;
      box-shadow: 0 0 28px rgba(255,255,255,0.28), 0 0 40px rgba(255,255,255,0.18);
    }

    .number {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.88);
      letter-spacing: 0.5px;
    }

    .symbol {
      position: absolute;
      top: 44px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(255,255,255,0.18);
      letter-spacing: 0.5px;
    }

    .name {
      position: absolute;
      top: 94px;
      left: 8px;
      width: calc(100% - 16px);
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.92);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mass {
      position: absolute;
      bottom: 10px;
      left: 8px;
      width: calc(100% - 16px);
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.82);
    }

    #elementInfo {
      position: fixed;
      top: 50%;
      right: 24px;
      transform: translateY(-50%);
      width: 320px;
      max-width: calc(100vw - 32px);
      z-index: 30;
      padding: 18px 18px 16px;
      background: rgba(10, 16, 36, 0.9);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(14px);
      display: none;
    }

    #elementInfo.visible {
      display: block;
    }

    #elementInfo .close-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
    }

    #elementInfo .close-btn:hover {
      background: rgba(255,255,255,0.18);
    }

    #infoHeader {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    #infoSymbol {
      width: 58px;
      height: 58px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 26px;
      font-weight: 700;
      border: 1px solid rgba(255,255,255,0.35);
      color: #fff;
      flex-shrink: 0;
    }

    #infoTitle {
      min-width: 0;
    }

    #infoName {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    #infoMeta {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: rgba(255,255,255,0.68);
    }

    .info-value {
      color: #fff;
      text-align: right;
      word-break: break-word;
    }
  </style>

  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",

<body>
  <div id="app"></div>

  <div id="ui">
    <label for="layoutMode">布局</label>
    <select id="layoutMode">
      <option value="table">table</option>
      <option value="helix">helix</option>
      <option value="sphere">sphere</option>
      <option value="grid">grid</option>
    </select>

    <label for="searchInput">搜索</label>
    <input id="searchInput" type="text" placeholder="输入元素名称或符号" />
  </div>

  <div id="elementInfo">
    <button class="close-btn" id="closeInfo">×</button>
    <div id="infoHeader">
      <div id="infoSymbol"></div>
      <div id="infoTitle">
        <div id="infoName"></div>
        <div id="infoMeta"></div>
      </div>
    </div>
    <div class="info-row"><div class="info-label">原子序数</div><div class="info-value" id="infoZ"></div></div>
    <div class="info-row"><div class="info-label">符号</div><div class="info-value" id="infoSymbolText"></div></div>
    <div class="info-row"><div class="info-label">名称</div><div class="info-value" id="infoNameText"></div></div>
    <div class="info-row"><div class="info-label">原子质量</div><div class="info-value" id="infoMass"></div></div>
    <div class="info-row"><div class="info-label">分类</div><div class="info-value" id="infoCategory"></div></div>
    <div class="info-row"><div class="info-label">同分类元素数量</div><div class="info-value" id="infoCategoryCount"></div></div>
  </div>

  <div id="hint">鼠标左键旋转 / 滚轮缩放 / 右键平移<br/>点击元素查看详情</div>

      'alkali-metal': 'alkaliMetal',

      'transition-metal': 'transitionMetal',
      'post-transition-metal': 'postTransitionMetal',
      'metalloid': 'metalloid',

      alkalineEarth: 0,

      metalloid: 0,
      nonmetal: 0,
      nobleGas: 0,
      lanthanide: 0,
      actinide: 0

      categoryCount[STATE_CATEGORY_KEYS[el.category]]++;
    });

    const container = document.getElementById('app');
    const layoutMode = document.getElementById('layoutMode');
    const searchInput = document.getElementById('searchInput');
    const infoPanel = document.getElementById('elementInfo');
    const closeInfo = document.getElementById('closeInfo');

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
    camera.position.set(0, 0, 3000);

    const renderer = new CSS3DRenderer();
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0';
    container.appendChild(renderer.domElement);

    const controls = new TrackballControls(camera, renderer.domElement);
    controls.rotateSpeed = 4.0;
    controls.minDistance = 500;
    controls.maxDistance = 6000;
    controls.panSpeed = 0.8;

    const objects = [];
    const targets = {
      table: [],
      helix: [],
      sphere: [],
      grid: []
    };

    let currentLayout = 'table';
    let selectedElement = null;
    let filteredCount = ELEMENTS.length;

    function hexToRgba(hex, alpha = 0.55) {
      const h = hex.replace('#', '');
      const bigint = parseInt(h, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function createCard(elementData) {
      const div = document.createElement('div');
      div.className = 'element';
      div.style.background = hexToRgba(CATEGORY_COLORS[elementData.category], 0.5);

      const number = document.createElement('div');
      number.className = 'number';
      number.textContent = elementData.Z;

      const symbol = document.createElement('div');
      symbol.className = 'symbol';
      symbol.textContent = elementData.symbol;

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = elementData.name;

      const mass = document.createElement('div');
      mass.className = 'mass';
      mass.textContent = elementData.mass;

      div.append(number, symbol, name, mass);

      const object = new CSS3DObject(div);
      object.position.x = Math.random() * 4000 - 2000;
      object.position.y = Math.random() * 4000 - 2000;
      object.position.z = Math.random() * 4000 - 2000;
      object.userData = { element: elementData, dom: div };
      scene.add(object);

      div.addEventListener('click', (e) => {
        e.stopPropagation();
        if (selectedElement && selectedElement.symbol === elementData.symbol) {
          hideInfo();
        } else {
          showInfo(elementData, div);
        }
      });

      objects.push(object);
    }

    function buildObjects() {
      ELEMENTS.forEach(createCard);
    }

    function buildTableTargets() {
      const colSpacing = 140;
      const rowSpacing = 180;
      const offsetX = 17 * colSpacing / 2;
      const offsetY = 8 * rowSpacing / 2;

      ELEMENTS.forEach(el => {
        const obj = new THREE.Object3D();
        const col = el.group;
        const row = el.period;
        obj.position.x = (col - 1) * colSpacing - offsetX;
        obj.position.y = -(row - 1) * rowSpacing + offsetY;
        obj.position.z = 0;
        targets.table.push(obj);
      });
    }

    function buildHelixTargets() {
      const look = new THREE.Vector3();
      const total = ELEMENTS.length;
      const maxTheta = Math.PI * 12;

      for (let i = 0; i < total; i++) {
        const t = i / (total - 1);
        const theta = t * maxTheta;
        const obj = new THREE.Object3D();
        obj.position.set(
          900 * Math.sin(theta),
          -theta * 8 + 450,
          900 * Math.cos(theta)
        );

        look.set(obj.position.x * 2, obj.position.y, obj.position.z * 2);
        obj.lookAt(look);
        targets.helix.push(obj);
      }
    }

    function buildSphereTargets() {
      const total = ELEMENTS.length;
      const radius = 800;
      const center = new THREE.Vector3(0, 0, 0);

      for (let i = 0; i < total; i++) {
        const obj = new THREE.Object3D();
        const y = 1 - (i / (total - 1)) * 2;
        const r = Math.sqrt(1 - y * y);
        const theta = Math.PI * (3 - Math.sqrt(5)) * i;
        const x = Math.cos(theta) * r;
        const z = Math.sin(theta) * r;

        obj.position.set(x * radius, y * radius, z * radius);
        obj.lookAt(center);
        targets.sphere.push(obj);
      }
    }

    function buildGridTargets() {
      const cols = 12;
      const spacingX = 170;
      const spacingY = 200;
      const total = ELEMENTS.length;

      for (let i = 0; i < total; i++) {
        const obj = new THREE.Object3D();
        const col = i % cols;
        const row = Math.floor(i / cols);
        const rows = Math.ceil(total / cols);

        obj.position.x = (col - (cols - 1) / 2) * spacingX;
        obj.position.y = ((rows - 1) / 2 - row) * spacingY;
        obj.position.z = 0;
        targets.grid.push(obj);
      }
    }

    function easeInOutCubic(k) {
      return k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2;
    }

    function transform(targetSet, duration = 1000) {
      TWEEN.removeAll();

      objects.forEach((object, i) => {
        const target = targetSet[i];

        new TWEEN.Tween(object.position)
          .to({
            x: target.position.x,
            y: target.position.y,
            z: target.position.z
          }, duration)
          .easing(easeInOutCubic)
          .start();

        new TWEEN.Tween(object.rotation)
          .to({
            x: target.rotation.x,
            y: target.rotation.y,
            z: target.rotation.z
          }, duration)
          .easing(easeInOutCubic)
          .start();
      });
    }

    function showInfo(el, dom) {
      if (selectedElement && selectedElement.symbol === el.symbol) {
        hideInfo();
        return;
      }

      document.querySelectorAll('.element.selected').forEach(node => node.classList.remove('selected'));
      dom.classList.add('selected');

      selectedElement = el;

      document.getElementById('infoSymbol').textContent = el.symbol;
      document.getElementById('infoSymbol').style.background = hexToRgba(CATEGORY_COLORS[el.category], 0.6);
      document.getElementById('infoName').textContent = el.name;
      document.getElementById('infoMeta').textContent = `#${el.Z} · ${el.category}`;
      document.getElementById('infoZ').textContent = el.Z;
      document.getElementById('infoSymbolText').textContent = el.symbol;
      document.getElementById('infoNameText').textContent = el.name;
      document.getElementById('infoMass').textContent = el.mass;
      document.getElementById('infoCategory').textContent = el.category;
      document.getElementById('infoCategoryCount').textContent = categoryCount[STATE_CATEGORY_KEYS[el.category]];

      infoPanel.classList.add('visible');
    }

    function hideInfo() {
      selectedElement = null;
      document.querySelectorAll('.element.selected').forEach(node => node.classList.remove('selected'));
      infoPanel.classList.remove('visible');
    }

    function applyFilter(query) {
      const q = query.trim().toLowerCase();
      let count = 0;

      objects.forEach(obj => {
        const el = obj.userData.element;
        const match = !q || el.name.toLowerCase().includes(q) || el.symbol.toLowerCase().includes(q);
        obj.userData.dom.style.opacity = match ? '1' : '0.1';
        if (match) count++;
      });

      filteredCount = count;
    }

    function updateState() {
      window.__3D_STATE__ = {
        elementCount: objects.length,
        layout: currentLayout,
        selectedElement: selectedElement ? selectedElement.symbol : null,
        filteredCount,
        categoryCount: { ...categoryCount }
      };
    }

    layoutMode.addEventListener('change', () => {
      currentLayout = layoutMode.value;
      transform(targets[currentLayout], 1000);
    });

    searchInput.addEventListener('input', (e) => {
      applyFilter(e.target.value);
    });

    closeInfo.addEventListener('click', hideInfo);
    document.addEventListener('click', (e) => {
      if (infoPanel.classList.contains('visible') && !infoPanel.contains(e.target)) {
        hideInfo();
      }
    });

    window.addEventListener('resize', onWindowResize);

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      controls.handleResize();
    }

    buildObjects();
    buildTableTargets();
    buildHelixTargets();
    buildSphereTargets();
    buildGridTargets();
    transform(targets.table, 1000);
    applyFilter('');

    function animate(time) {
      requestAnimationFrame(animate);
      TWEEN.update(time);
      controls.update();
      renderer.render(scene, camera);
      updateState();
    }

    animate();
  </script>
</body>
</html>
