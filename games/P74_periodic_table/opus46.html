<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #000511; font-family: 'Helvetica Neue', Arial, sans-serif; color: #fff; }

  #container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

  #controls {
    position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 10px; align-items: center;
    background: rgba(0,5,17,0.85); padding: 10px 20px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15); backdrop-filter: blur(10px);
  }
  #controls button {
    padding: 8px 18px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08);
    color: #fff; border-radius: 4px; cursor: pointer; font-size: 13px; transition: all 0.3s;
    text-transform: uppercase; letter-spacing: 1px;
  }
  #controls button:hover { background: rgba(255,255,255,0.2); }
  #controls button.active { background: rgba(80,160,255,0.4); border-color: rgba(80,160,255,0.8); }

  #searchInput {
    padding: 8px 14px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08);
    color: #fff; border-radius: 4px; font-size: 13px; outline: none; width: 160px;
  }
  #searchInput::placeholder { color: rgba(255,255,255,0.4); }

  .element-card {
    width: 120px; height: 160px; border: 1px solid rgba(255,255,255,0.4);
    border-radius: 4px; padding: 8px; cursor: pointer; position: relative;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: border-color 0.3s, box-shadow 0.3s;
    user-select: none;
  }
  .element-card:hover {
    border-color: rgba(255,255,255,0.9);
    box-shadow: 0 0 20px rgba(255,255,255,0.2);
  }
  .element-card .number {
    position: absolute; top: 6px; left: 8px; font-size: 11px; opacity: 0.8;
  }
  .element-card .symbol {
    font-size: 36px; font-weight: bold; line-height: 1.2; margin-top: 8px;
  }
  .element-card .name {
    font-size: 13px; margin-top: 4px; opacity: 0.9;
  }
  .element-card .mass {
    font-size: 11px; position: absolute; bottom: 6px; opacity: 0.7;
  }

  #elementInfo {
    display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 200; background: rgba(10,15,30,0.95); border: 1px solid rgba(255,255,255,0.3);
    border-radius: 12px; padding: 30px 40px; min-width: 320px;
    backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  #elementInfo .close-btn {
    position: absolute; top: 10px; right: 15px; cursor: pointer; font-size: 22px;
    color: rgba(255,255,255,0.6); background: none; border: none;
  }
  #elementInfo .close-btn:hover { color: #fff; }
  #elementInfo .info-symbol { font-size: 56px; font-weight: bold; text-align: center; margin-bottom: 5px; }
  #elementInfo .info-name { font-size: 22px; text-align: center; margin-bottom: 15px; opacity: 0.9; }
  #elementInfo .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
  #elementInfo .info-row span:first-child { opacity: 0.6; }

  #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 150; display: none; }
</style>
<script type="importmap">
{

    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",

</script>

  <input type="text" id="searchInput" placeholder="Search element...">

  <button id="btn-sphere" data-layout="sphere">Sphere</button>
  <button id="btn-grid" data-layout="grid">Grid</button>
</div>

<div id="overlay"></div>
<div id="elementInfo">

  'metalloid': '#CCCC99',

let filteredCount = 118;

const targets = { table: [], helix: [], sphere: [], grid: [] };

// ─── Helper: hex to rgba ───
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─── Create CSS3DObjects ───
elements.forEach((el, i) => {
  const div = document.createElement('div');
  div.className = 'element-card';
  const color = categoryColors[el.category] || '#888';
  div.style.backgroundColor = hexToRgba(color, 0.25);
  div.style.borderColor = hexToRgba(color, 0.6);

  div.innerHTML = `
    <div class="number">${el.Z}</div>
    <div class="symbol" style="color:${color}">${el.symbol}</div>
    <div class="name">${el.name}</div>
    <div class="mass">${el.mass}</div>
  `;

  div.addEventListener('click', () => {
    if (selectedElement === el.symbol) {
      hideInfo();
    } else {
      showInfo(el);
    }
  });

  const obj = new CSS3DObject(div);
  obj.position.x = Math.random() * 4000 - 2000;
  obj.position.y = Math.random() * 4000 - 2000;
  obj.position.z = Math.random() * 4000 - 2000;
  scene.add(obj);
  objects.push(obj);
  obj.userData = el;
});

// ─── Compute Targets ───

// TABLE
elements.forEach((el, i) => {
  const obj = new THREE.Object3D();
  obj.position.x = (el.col - 9.5) * 140;
  obj.position.y = -(el.row - 5.5) * 180;
  obj.position.z = 0;
  targets.table.push(obj);
});

// HELIX
elements.forEach((el, i) => {
  const theta = i * 0.322 + Math.PI;
  const obj = new THREE.Object3D();
  obj.position.x = 900 * Math.sin(theta);
  obj.position.y = -(i * 8) + 450;
  obj.position.z = 900 * Math.cos(theta);
  const v = new THREE.Vector3();
  v.copy(obj.position);
  v.x *= 2; v.z *= 2;
  obj.lookAt(v);
  targets.helix.push(obj);
});

// SPHERE (Fibonacci)
elements.forEach((el, i) => {
  const phi = Math.acos(-1 + (2 * i) / 118);
  const theta = Math.sqrt(118 * Math.PI) * phi;
  const obj = new THREE.Object3D();
  obj.position.x = 800 * Math.cos(theta) * Math.sin(phi);
  obj.position.y = 800 * Math.sin(theta) * Math.sin(phi);
  obj.position.z = 800 * Math.cos(phi);
  obj.lookAt(new THREE.Vector3(0, 0, 0));
  targets.sphere.push(obj);
});

// GRID
elements.forEach((el, i) => {
  const cols = 12;
  const col = i % cols;
  const row = Math.floor(i / cols);
  const obj = new THREE.Object3D();
  obj.position.x = (col - (cols - 1) / 2) * 170;
  obj.position.y = -(row - 4.5) * 200;
  obj.position.z = 0;
  targets.grid.push(obj);
});

// ─── Transform ───
function transform(targetArray, duration = 1000) {
  TWEEN.removeAll();
  objects.forEach((obj, i) => {
    const target = targetArray[i];

    new TWEEN.Tween(obj.position)
      .to({ x: target.position.x, y: target.position.y, z: target.position.z }, duration)
      .easing(TWEEN.Easing.Exponential.InOut)
      .start();

    new TWEEN.Tween(obj.rotation)
      .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, duration)
      .easing(TWEEN.Easing.Exponential.InOut)
      .start();
  });

  new TWEEN.Tween({})
    .to({}, duration * 2)
    .onUpdate(render)
    .start();
}

// ─── Layout Buttons ───
const buttons = document.querySelectorAll('#controls button');
buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    const layout = btn.dataset.layout;
    if (layout === currentLayout) return;
    currentLayout = layout;
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    transform(targets[layout]);
  });
});

// ─── Search ───
const searchInput = document.getElementById('searchInput');
searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  filteredCount = 0;
  objects.forEach((obj, i) => {
    const el = elements[i];
    const match = !query ||
      el.symbol.toLowerCase().includes(query) ||
      el.name.toLowerCase().includes(query);
    obj.element.style.opacity = match ? '1' : '0.1';
    if (match) filteredCount++;
  });
  render();
});

// ─── Info Panel ───
function showInfo(el) {
  selectedElement = el.symbol;
  const color = categoryColors[el.category] || '#888';
  document.getElementById('infoSymbol').textContent = el.symbol;
  document.getElementById('infoSymbol').style.color = color;
  document.getElementById('infoName').textContent = el.name;
  document.getElementById('infoZ').textContent = el.Z;
  document.getElementById('infoMass').textContent = el.mass;
  document.getElementById('infoCategory').textContent = categoryLabels[el.category] || el.category;
  document.getElementById('infoCatCount').textContent = categoryCounts[el.category];
  document.getElementById('elementInfo').style.display = 'block';
  document.getElementById('overlay').style.display = 'block';
}

function hideInfo() {
  selectedElement = null;
  document.getElementById('elementInfo').style.display = 'none';
  document.getElementById('overlay').style.display = 'none';
}

document.getElementById('closeInfo').addEventListener('click', hideInfo);
document.getElementById('overlay').addEventListener('click', hideInfo);

// ─── Render ───
function render() {
  renderer.render(scene, camera);
}

// ─── Animate ───
function animate() {
  requestAnimationFrame(animate);
  TWEEN.update();
  controls.update();

  // Update state
  window.__3D_STATE__ = {
    elementCount: objects.length,
    layout: currentLayout,
    selectedElement: selectedElement,
    filteredCount: filteredCount,
    categoryCount: {
      alkaliMetal: categoryCounts['alkali-metal'] || 0,
      alkalineEarth: categoryCounts['alkaline-earth'] || 0,
      transitionMetal: categoryCounts['transition-metal'] || 0,
      postTransitionMetal: categoryCounts['post-transition-metal'] || 0,
      metalloid: categoryCounts['metalloid'] || 0,
      nonmetal: categoryCounts['nonmetal'] || 0,
      nobleGas: categoryCounts['noble-gas'] || 0,
      lanthanide: categoryCounts['lanthanide'] || 0,
      actinide: categoryCounts['actinide'] || 0
    }
  };

  render();
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  render();
});

// ─── Init ───
transform(targets.table, 2000);
animate();

</script>
</body>
</html>
