<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Periodic Table</title>
    <style>
        body {
            margin: 0;
            background-color: #000511;
            color: #fff;
            font-family: Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .controls {
            pointer-events: auto;
            display: inline-block;
            background: rgba(0, 20, 50, 0.8);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
        }

        button, select, input {
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            border: 1px solid rgba(0, 255, 255, 0.5);
            padding: 8px 15px;
            margin: 0 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        button:hover, select:hover, input:focus {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        input::placeholder {
            color: rgba(0, 255, 255, 0.5);
        }

        .element {
            width: 120px;
            height: 160px;
            box-shadow: 0px 0px 12px rgba(0, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
            position: absolute;
        }

        .element:hover {
            box-shadow: 0px 0px 20px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .element .number {
            position: absolute;
            top: 5px;
            left: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: bold;
        }

        .element .symbol {
            position: absolute;
            top: 40px;
            left: 0px;
            right: 0px;
            font-size: 36px;
            font-weight: bold;
            color: rgba(255, 255, 255, 1);
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .element .name {
            position: absolute;
            top: 95px;
            left: 0px;
            right: 0px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.9);
        }

        .element .mass {
            position: absolute;
            bottom: 10px;
            left: 0px;
            right: 0px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        #elementInfo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            background: rgba(0, 15, 30, 0.95);
            border: 2px solid #0ff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
            z-index: 20;
            display: none;
            backdrop-filter: blur(5px);
        }

        #elementInfo h2 {
            margin: 0 0 15px 0;
            color: #fff;
            text-align: center;
            font-size: 32px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            padding-bottom: 10px;
        }

        #elementInfo p {
            margin: 10px 0;
            font-size: 16px;
            line-height: 1.5;
        }

        #elementInfo .label {
            color: #0ff;
            font-weight: bold;
            display: inline-block;
            width: 100px;
        }

        #closeInfo {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            box-shadow: none;
        }
        #closeInfo:hover {
            color: #0ff;
            background: none;
            box-shadow: none;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tweenjs/tween.js@18.6.4/dist/tween.umd.js"></script>
</head>
<body>

    <div id="container"></div>

    <div id="ui-container">
        <div class="controls">
            <select id="layoutMode">
                <option value="table">Table Layout</option>
                <option value="helix">Helix Layout</option>
                <option value="sphere">Sphere Layout</option>
                <option value="grid">Grid Layout</option>
            </select>
            <input type="text" id="searchInput" placeholder="Search element...">
        </div>
    </div>

    <div id="elementInfo">
        <button id="closeInfo">×</button>
        <h2 id="infoSymbol"></h2>
        <p><span class="label">Name:</span> <span id="infoName"></span></p>
        <p><span class="label">Atomic No:</span> <span id="infoZ"></span></p>
        <p><span class="label">Atomic Mass:</span> <span id="infoMass"></span></p>
        <p><span class="label">Category:</span> <span id="infoCategory"></span></p>
        <p><span class="label">In Category:</span> <span id="infoCatCount"></span> elements</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
        import { TrackballControls } from 'three/addons/controls/TrackballControls.js';

        // Element Data: [Z, Symbol, Name, Mass, Category, Col, Row]
        const elementsData = [
            [1,"H","Hydrogen",1.008,"nonmetal",1,1],[2,"He","Helium",4.0026,"noble-gas",18,1],
            [3,"Li","Lithium",6.94,"alkali-metal",1,2],[4,"Be","Beryllium",9.0122,"alkaline-earth",2,2],[5,"B","Boron",10.81,"metalloid",13,2],[6,"C","Carbon",12.011,"nonmetal",14,2],[7,"N","Nitrogen",14.007,"nonmetal",15,2],[8,"O","Oxygen",15.999,"nonmetal",16,2],[9,"F","Fluorine",18.998,"nonmetal",17,2],[10,"Ne","Neon",20.180,"noble-gas",18,2],
            [11,"Na","Sodium",22.990,"alkali-metal",1,3],[12,"Mg","Magnesium",24.305,"alkaline-earth",2,3],[13,"Al","Aluminum",26.982,"post-transition-metal",13,3],[14,"Si","Silicon",28.085,"metalloid",14,3],[15,"P","Phosphorus",30.974,"nonmetal",15,3],[16,"S","Sulfur",32.06,"nonmetal",16,3],[17,"Cl","Chlorine",35.45,"nonmetal",17,3],[18,"Ar","Argon",39.95,"noble-gas",18,3],
            [19,"K","Potassium",39.098,"alkali-metal",1,4],[20,"Ca","Calcium",40.078,"alkaline-earth",2,4],[21,"Sc","Scandium",44.956,"transition-metal",3,4],[22,"Ti","Titanium",47.867,"transition-metal",4,4],[23,"V","Vanadium",50.942,"transition-metal",5,4],[24,"Cr","Chromium",51.996,"transition-metal",6,4],[25,"Mn","Manganese",54.938,"transition-metal",7,4],[26,"Fe","Iron",55.845,"transition-metal",8,4],[27,"Co","Cobalt",58.933,"transition-metal",9,4],[28,"Ni","Nickel",58.693,"transition-metal",10,4],[29,"Cu","Copper",63.546,"transition-metal",11,4],[30,"Zn","Zinc",65.38,"transition-metal",12,4],[31,"Ga","Gallium",69.723,"post-transition-metal",13,4],[32,"Ge","Germanium",72.630,"metalloid",14,4],[33,"As","Arsenic",74.922,"metalloid",15,4],[34,"Se","Selenium",78.971,"nonmetal",16,4],[35,"Br","Bromine",79.904,"nonmetal",17,4],[36,"Kr","Krypton",83.798,"noble-gas",18,4],
            [37,"Rb","Rubidium",85.468,"alkali-metal",1,5],[38,"Sr","Strontium",87.62,"alkaline-earth",2,5],[39,"Y","Yttrium",88.906,"transition-metal",3,5],[40,"Zr","Zirconium",91.224,"transition-metal",4,5],[41,"Nb","Niobium",92.906,"transition-metal",5,5],[42,"Mo","Molybdenum",95.95,"transition-metal",6,5],[43,"Tc","Technetium",98,"transition-metal",7,5],[44,"Ru","Ruthenium",101.07,"transition-metal",8,5],[45,"Rh","Rhodium",102.91,"transition-metal",9,5],[46,"Pd","Palladium",106.42,"transition-metal",10,5],[47,"Ag","Silver",107.87,"transition-metal",11,5],[48,"Cd","Cadmium",112.41,"transition-metal",12,5],[49,"In","Indium",114.82,"post-transition-metal",13,5],[50,"Sn","Tin",118.71,"post-transition-metal",14,5],[51,"Sb","Antimony",121.76,"metalloid",15,5],[52,"Te","Tellurium",127.60,"metalloid",16,5],[53,"I","Iodine",126.90,"nonmetal",17,5],[54,"Xe","Xenon",131.29,"noble-gas",18,5],
            [55,"Cs","Cesium",132.91,"alkali-metal",1,6],[56,"Ba","Barium",137.33,"alkaline-earth",2,6],
            [57,"La","Lanthanum",138.91,"lanthanide",4,9],[58,"Ce","Cerium",140.12,"lanthanide",5,9],[59,"Pr","Praseodymium",140.91,"lanthanide",6,9],[60,"Nd","Neodymium",144.24,"lanthanide",7,9],[61,"Pm","Promethium",145,"lanthanide",8,9],[62,"Sm","Samarium",150.36,"lanthanide",9,9],[63,"Eu","Europium",151.96,"lanthanide",10,9],[64,"Gd","Gadolinium",157.25,"lanthanide",11,9],[65,"Tb","Terbium",158.93,"lanthanide",12,9],[66,"Dy","Dysprosium",162.50,"lanthanide",13,9],[67,"Ho","Holmium",164.93,"lanthanide",14,9],[68,"Er","Erbium",167.26,"lanthanide",15,9],[69,"Tm","Thulium",168.93,"lanthanide",16,9],[70,"Yb","Ytterbium",173.05,"lanthanide",17,9],[71,"Lu","Lutetium",174.97,"lanthanide",18,9],
            [72,"Hf","Hafnium",178.49,"transition-metal",4,6],[73,"Ta","Tantalum",180.95,"transition-metal",5,6],[74,"W","Tungsten",183.84,"transition-metal",6,6],[75,"Re","Rhenium",186.21,"transition-metal",7,6],[76,"Os","Osmium",190.23,"transition-metal",8,6],[77,"Ir","Iridium",192.22,"transition-metal",9,6],[78,"Pt","Platinum",195.08,"transition-metal",10,6],[79,"Au","Gold",196.97,"transition-metal",11,6],[80,"Hg","Mercury",200.59,"transition-metal",12,6],[81,"Tl","Thallium",204.38,"post-transition-metal",13,6],[82,"Pb","Lead",207.2,"post-transition-metal",14,6],[83,"Bi","Bismuth",208.98,"post-transition-metal",15,6],[84,"Po","Polonium",209,"post-transition-metal",16,6],[85,"At","Astatine",210,"metalloid",17,6],[86,"Rn","Radon",222,"noble-gas",18,6],
            [87,"Fr","Francium",223,"alkali-metal",1,7],[88,"Ra","Radium",226,"alkaline-earth",2,7],
            [89,"Ac","Actinium",227,"actinide",4,10],[90,"Th","Thorium",232.04,"actinide",5,10],[91,"Pa","Protactinium",231.04,"actinide",6,10],[92,"U","Uranium",238.03,"actinide",7,10],[93,"Np","Neptunium",237,"actinide",8,10],[94,"Pu","Plutonium",244,"actinide",9,10],[95,"Am","Americium",243,"actinide",10,10],[96,"Cm","Curium",247,"actinide",11,10],[97,"Bk","Berkelium",247,"actinide",12,10],[98,"Cf","Californium",251,"actinide",13,10],[99,"Es","Einsteinium",252,"actinide",14,10],[100,"Fm","Fermium",257,"actinide",15,10],[101,"Md","Mendelevium",258,"actinide",16,10],[102,"No","Nobelium",259,"actinide",17,10],[103,"Lr","Lawrencium",262,"actinide",18,10],
            [104,"Rf","Rutherfordium",267,"transition-metal",4,7],[105,"Db","Dubnium",268,"transition-metal",5,7],[106,"Sg","Seaborgium",269,"transition-metal",6,7],[107,"Bh","Bohrium",270,"transition-metal",7,7],[108,"Hs","Hassium",277,"transition-metal",8,7],[109,"Mt","Meitnerium",278,"unknown",9,7],[110,"Ds","Darmstadtium",281,"unknown",10,7],[111,"Rg","Roentgenium",282,"unknown",11,7],[112,"Cn","Copernicium",285,"transition-metal",12,7],[113,"Nh","Nihonium",286,"unknown",13,7],[114,"Fl","Flerovium",289,"post-transition-metal",14,7],[115,"Mc","Moscovium",290,"unknown",15,7],[116,"Lv","Livermorium",293,"unknown",16,7],[117,"Ts","Tennessine",294,"unknown",17,7],[118,"Og","Oganesson",294,"unknown",18,7]
        ];

        const categoryColors = {
            'alkali-metal': 'rgba(255, 102, 102, 0.75)',
            'alkaline-earth': 'rgba(255, 222, 173, 0.75)',
            'transition-metal': 'rgba(255, 192, 192, 0.75)',
            'post-transition-metal': 'rgba(204, 204, 204, 0.75)',
            'metalloid': 'rgba(204, 204, 153, 0.75)',
            'nonmetal': 'rgba(160, 255, 160, 0.75)',
            'noble-gas': 'rgba(192, 255, 255, 0.75)',
            'lanthanide': 'rgba(255, 191, 255, 0.75)',
            'actinide': 'rgba(255, 153, 204, 0.75)',
            'unknown': 'rgba(200, 200, 200, 0.75)'
        };

        // State Management
        window.__3D_STATE__ = {
            elementCount: elementsData.length,
            layout: 'table',
            selectedElement: null,
            filteredCount: elementsData.length,
            categoryCount: {
                alkaliMetal: 0, alkalineEarth: 0, transitionMetal: 0, postTransitionMetal: 0,
                metalloid: 0, nonmetal: 0, nobleGas: 0, lanthanide: 0, actinide: 0, unknown: 0
            }
        };

        // Calculate category counts
        elementsData.forEach(el => {
            const cat = el[4];
            const key = cat.replace(/-([a-z])/g, g => g[1].toUpperCase());
            if(window.__3D_STATE__.categoryCount[key] !== undefined) {
                window.__3D_STATE__.categoryCount[key]++;
            }
        });

        let camera, scene, renderer, controls;
        const objects = [];
        const targets = { table: [], sphere: [], helix: [], grid: [] };

        init();
        animate();

        function init() {
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.z = 3000;

            scene = new THREE.Scene();

            // Create Elements
            for (let i = 0; i < elementsData.length; i++) {
                const item = elementsData[i];
                const [z, symbol, name, mass, category, col, row] = item;

                const element = document.createElement('div');
                element.className = 'element';
                element.style.backgroundColor = categoryColors[category] || categoryColors['unknown'];
                
                const number = document.createElement('div');
                number.className = 'number';
                number.textContent = z;
                element.appendChild(number);

                const symbolEl = document.createElement('div');
                symbolEl.className = 'symbol';
                symbolEl.textContent = symbol;
                element.appendChild(symbolEl);

                const nameEl = document.createElement('div');
                nameEl.className = 'name';
                nameEl.textContent = name;
                element.appendChild(nameEl);

                const massEl = document.createElement('div');
                massEl.className = 'mass';
                massEl.textContent = mass;
                element.appendChild(massEl);

                // Interaction
                element.addEventListener('click', () => showElementInfo(item));

                // Store data for filtering
                element.dataset.symbol = symbol.toLowerCase();
                element.dataset.name = name.toLowerCase();

                const objectCSS = new CSS3DObject(element);
                // Initial random position
                objectCSS.position.x = Math.random() * 4000 - 2000;
                objectCSS.position.y = Math.random() * 4000 - 2000;
                objectCSS.position.z = Math.random() * 4000 - 2000;
                scene.add(objectCSS);
                objects.push(objectCSS);

                // Table Layout Target
                const objectTable = new THREE.Object3D();
                objectTable.position.x = (col * 140) - 1330;
                objectTable.position.y = -(row * 180) + 990;
                targets.table.push(objectTable);
            }

            // Sphere Layout Targets
            const vector = new THREE.Vector3();
            for (let i = 0, l = objects.length; i < l; i++) {
                const phi = Math.acos(-1 + (2 * i) / l);
                const theta = Math.sqrt(l * Math.PI) * phi;
                const objectSphere = new THREE.Object3D();
                objectSphere.position.setFromSphericalCoords(800, phi, theta);
                vector.copy(objectSphere.position).multiplyScalar(2);
                objectSphere.lookAt(vector);
                targets.sphere.push(objectSphere);
            }

            // Helix Layout Targets
            for (let i = 0, l = objects.length; i < l; i++) {
                const theta = i * 0.175 + Math.PI;
                const y = -(i * 8) + 450;
                const objectHelix = new THREE.Object3D();
                objectHelix.position.setFromCylindricalCoords(900, theta, y);
                vector.x = objectHelix.position.x * 2;
                vector.y = objectHelix.position.y;
                vector.z = objectHelix.position.z * 2;
                objectHelix.lookAt(vector);
                targets.helix.push(objectHelix);
            }

            // Grid Layout Targets
            for (let i = 0; i < objects.length; i++) {
                const objectGrid = new THREE.Object3D();
                objectGrid.position.x = ((i % 12) * 170) - 935;
                objectGrid.position.y = -(Math.floor(i / 12) * 200) + 900;
                objectGrid.position.z = 0;
                targets.grid.push(objectGrid);
            }

            // Renderer
            renderer = new CSS3DRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // Controls
            controls = new TrackballControls(camera, renderer.domElement);
            controls.minDistance = 500;
            controls.maxDistance = 6000;
            controls.rotateSpeed = 2.0;

            // Events
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('layoutMode').addEventListener('change', (e) => {
                const mode = e.target.value;
                window.__3D_STATE__.layout = mode;
                transform(targets[mode], 1000);
            });

            document.getElementById('searchInput').addEventListener('input', handleSearch);
            document.getElementById('closeInfo').addEventListener('click', hideElementInfo);

            // Initial Transform
            transform(targets.table, 2000);
        }

        function transform(targets, duration) {
            TWEEN.removeAll();
            for (let i = 0; i < objects.length; i++) {
                const object = objects[i];
                const target = targets[i];

                new TWEEN.Tween(object.position)
                    .to({ x: target.position.x, y: target.position.y, z: target.position.z }, Math.random() * duration + duration)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();

                new TWEEN.Tween(object.rotation)
                    .to({ x: target.rotation.x, y: target.rotation.y, z: target.rotation.z }, Math.random() * duration + duration)
                    .easing(TWEEN.Easing.Exponential.InOut)
                    .start();
            }
            new TWEEN.Tween(this)
                .to({}, duration * 2)
                .onUpdate(render)
                .start();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            render();
        }

        function animate() {
            requestAnimationFrame(animate);
            TWEEN.update();
            controls.update();
            // window.__3D_STATE__ is updated reactively on events
        }

        function render() {
            renderer.render(scene, camera);
        }

        function showElementInfo(item) {
            const [z, symbol, name, mass, category] = item;
            document.getElementById('infoSymbol').textContent = symbol;
            document.getElementById('infoName').textContent = name;
            document.getElementById('infoZ').textContent = z;
            document.getElementById('infoMass').textContent = mass;
            document.getElementById('infoCategory').textContent = category;
            
            const catKey = category.replace(/-([a-z])/g, g => g[1].toUpperCase());
            document.getElementById('infoCatCount').textContent = window.__3D_STATE__.categoryCount[catKey] || 0;
            
            document.getElementById('elementInfo').style.display = 'block';
            window.__3D_STATE__.selectedElement = symbol;
        }

        function hideElementInfo() {
            document.getElementById('elementInfo').style.display = 'none';
            window.__3D_STATE__.selectedElement = null;
        }

        function handleSearch(e) {
            const term = e.target.value.toLowerCase();
            let visibleCount = 0;
            
            objects.forEach(obj => {
                const el = obj.element;
                const match = el.dataset.symbol.includes(term) || el.dataset.name.includes(term);
                if (match || term === '') {
                    el.style.opacity = '1';
                    visibleCount++;
                } else {
                    el.style.opacity = '0.1';
                }
            });
            
            window.__3D_STATE__.filteredCount = visibleCount;
        }
    </script>
</body>
</html>
