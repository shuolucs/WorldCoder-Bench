<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Jenga Tower Demolition</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(0,0,0,0.7); color: #e0e0e0; padding: 16px 20px;
    border-radius: 12px; font-size: 14px; line-height: 2;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
    min-width: 200px;
  }
  #hud .title { font-size: 16px; font-weight: bold; color: #ffd700; margin-bottom: 6px; }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; float: right; }
  #resetBtn {
    position: fixed; top: 16px; right: 16px; z-index: 10;
    background: linear-gradient(135deg, #e74c3c, #c0392b); color: white;
    border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer;
    font-size: 15px; font-weight: bold; letter-spacing: 1px;
    box-shadow: 0 4px 15px rgba(231,76,60,0.4);
    transition: all 0.2s;
  }
  #resetBtn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(231,76,60,0.6); }
  #resetBtn:active { transform: translateY(0); }
  #instructions {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); z-index: 10;
    background: rgba(0,0,0,0.6); color: #ccc; padding: 10px 20px;
    border-radius: 8px; font-size: 13px; text-align: center;
    backdrop-filter: blur(8px);
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="hud">
  <div class="title">🏗️ Tower Status</div>
  <div><span class="label">Static Blocks:</span><span class="value" id="staticCount">30</span></div>
  <div><span class="label">Dynamic Blocks:</span><span class="value" id="dynamicCount">0</span></div>
  <div><span class="label">Fallen Blocks:</span><span class="value" id="fallenCount">0</span></div>
  <div><span class="label">Balls Fired:</span><span class="value" id="ballCount">0</span></div>
</div>
<button id="resetBtn">🔄 RESET</button>
<div id="instructions">Click anywhere to shoot a ball at the tower • Drag to orbit</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(15, 12, 15);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 4, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2 - 0.05;
controls.update();

// --- Lighting ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(10, 20, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-8, 10, -8);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0xff6600, 0.5, 30);
pointLight.position.set(0, 15, 0);
scene.add(pointLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x556655,
  roughness: 0.9,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(30, 30, 0x334433, 0x2a3a2a);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Block Materials ---
const blockColors = [0xd4a056, 0x8b6914]; // tan / brown alternating
const blockMaterials = blockColors.map(c => new THREE.MeshStandardMaterial({
  color: c, roughness: 0.7, metalness: 0.05
}));

// --- Block Data ---
const BLOCK_W = 3, BLOCK_H = 1, BLOCK_D = 1;
const GRAVITY = 9.8;
const RESTITUTION = 0.3;
const FRICTION = 0.5;
const BALL_SPEED = 15;
const BALL_RADIUS = 0.5;
const BALL_MASS = 2.0;
const BLOCK_MASS = 1.0;
const MAX_BALLS = 10;

let blocks = [];
let balls = [];
let totalBallsFired = 0;

// --- Create Blocks ---
const blockGeo = new THREE.BoxGeometry(BLOCK_W, BLOCK_H, BLOCK_D);

function createTower() {
  // Remove old blocks
  blocks.forEach(b => scene.remove(b.mesh));
  blocks = [];

  for (let layer = 0; layer < 10; layer++) {
    const isOddLayer = (layer % 2 === 0); // layer 0 = first layer = odd (1st)
    const matIndex = layer % 2;
    const y = layer * BLOCK_H + BLOCK_H / 2;

    for (let i = 0; i < 3; i++) {
      const mesh = new THREE.Mesh(blockGeo, blockMaterials[matIndex].clone());
      mesh.castShadow = true;
      mesh.receiveShadow = true;

      let x, z;
      if (isOddLayer) {
        // Along X axis: blocks side by side along Z
        x = 0;
        z = (i - 1) * BLOCK_D;
      } else {
        // Along Z axis: blocks side by side along X, rotated 90°
        x = (i - 1) * BLOCK_D;
        z = 0;
        mesh.rotation.y = Math.PI / 2;
      }

      mesh.position.set(x, y, z);
      scene.add(mesh);

      blocks.push({
        mesh: mesh,
        layer: layer,
        vx: 0, vy: 0, vz: 0,
        angVx: 0, angVy: 0, angVz: 0,
        isKinematic: true,
        initPos: new THREE.Vector3(x, y, z),
        initRotY: mesh.rotation.y,
        halfExtents: isOddLayer
          ? new THREE.Vector3(BLOCK_W / 2, BLOCK_H / 2, BLOCK_D / 2)
          : new THREE.Vector3(BLOCK_D / 2, BLOCK_H / 2, BLOCK_W / 2)
      });
    }
  }
}

createTower();

// --- Ball Material ---
const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 20, 20);
const ballMat = new THREE.MeshStandardMaterial({
  color: 0xff2222, roughness: 0.3, metalness: 0.6, emissive: 0x440000
});

// --- Shooting ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isPointerDown = false;
let pointerDownPos = new THREE.Vector2();

renderer.domElement.addEventListener('pointerdown', (e) => {
  isPointerDown = true;
  pointerDownPos.set(e.clientX, e.clientY);
});

renderer.domElement.addEventListener('pointerup', (e) => {
  if (!isPointerDown) return;
  isPointerDown = false;
  const dx = e.clientX - pointerDownPos.x;
  const dy = e.clientY - pointerDownPos.y;
  if (Math.sqrt(dx * dx + dy * dy) > 5) return; // was a drag

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const dir = raycaster.ray.direction.clone().normalize();
  const origin = camera.position.clone();

  const mesh = new THREE.Mesh(ballGeo, ballMat.clone());
  mesh.castShadow = true;
  mesh.position.copy(origin);
  scene.add(mesh);

  const ball = {
    mesh: mesh,
    vx: dir.x * BALL_SPEED,
    vy: dir.y * BALL_SPEED,
    vz: dir.z * BALL_SPEED,
    radius: BALL_RADIUS
  };

  balls.push(ball);
  totalBallsFired++;

  if (balls.length > MAX_BALLS) {
    const old = balls.shift();
    scene.remove(old.mesh);
  }
});

// --- Reset ---
document.getElementById('resetBtn').addEventListener('click', () => {
  balls.forEach(b => scene.remove(b.mesh));
  balls = [];
  totalBallsFired = 0;

  blocks.forEach(b => {
    b.mesh.position.copy(b.initPos);
    b.mesh.rotation.set(0, b.initRotY, 0);
    b.vx = b.vy = b.vz = 0;
    b.angVx = b.angVy = b.angVz = 0;
    b.isKinematic = true;
    b.mesh.material.emissive = new THREE.Color(0x000000);
  });
});

// --- AABB Helpers ---
function getBlockAABB(block) {
  // Compute world-space AABB from the mesh
  const p = block.mesh.position;
  const he = block.halfExtents;
  // For rotated blocks, we need to account for rotation
  // Use a simple approach: compute rotated corners and find AABB
  const ry = block.mesh.rotation.y;
  const cosR = Math.cos(ry);
  const sinR = Math.sin(ry);

  // The half extents in local space
  const lx = he.x, ly = he.y, lz = he.z;

  // Rotated half extents (only Y rotation)
  const whx = Math.abs(cosR * lx) + Math.abs(sinR * lz);
  const why = ly;
  const whz = Math.abs(sinR * lx) + Math.abs(cosR * lz);

  return {
    minX: p.x - whx, maxX: p.x + whx,
    minY: p.y - why, maxY: p.y + why,
    minZ: p.z - whz, maxZ: p.z + whz,
    hx: whx, hy: why, hz: whz
  };
}

function sphereAABBCollision(ball, aabb) {
  const bx = ball.mesh.position.x;
  const by = ball.mesh.position.y;
  const bz = ball.mesh.position.z;
  const r = ball.radius;

  const closestX = Math.max(aabb.minX, Math.min(bx, aabb.maxX));
  const closestY = Math.max(aabb.minY, Math.min(by, aabb.maxY));
  const closestZ = Math.max(aabb.minZ, Math.min(bz, aabb.maxZ));

  const dx = bx - closestX;
  const dy = by - closestY;
  const dz = bz - closestZ;
  const distSq = dx * dx + dy * dy + dz * dz;

  if (distSq < r * r) {
    const dist = Math.sqrt(distSq) || 0.001;
    return {
      nx: dx / dist,
      ny: dy / dist,
      nz: dz / dist,
      penetration: r - dist
    };
  }
  return null;
}

function aabbAABBCollision(a, b) {
  const overlapX = Math.min(a.maxX, b.maxX) - Math.max(a.minX, b.minX);
  const overlapY = Math.min(a.maxY, b.maxY) - Math.max(a.minY, b.minY);
  const overlapZ = Math.min(a.maxZ, b.maxZ) - Math.max(a.minZ, b.minZ);

  if (overlapX > 0 && overlapY > 0 && overlapZ > 0) {
    // Find minimum penetration axis
    const centerAx = (a.minX + a.maxX) / 2;
    const centerAy = (a.minY + a.maxY) / 2;
    const centerAz = (a.minZ + a.maxZ) / 2;
    const centerBx = (b.minX + b.maxX) / 2;
    const centerBy = (b.minY + b.maxY) / 2;
    const centerBz = (b.minZ + b.maxZ) / 2;

    let nx = 0, ny = 0, nz = 0, pen = 0;
    if (overlapX <= overlapY && overlapX <= overlapZ) {
      pen = overlapX;
      nx = centerAx > centerBx ? 1 : -1;
    } else if (overlapY <= overlapX && overlapY <= overlapZ) {
      pen = overlapY;
      ny = centerAy > centerBy ? 1 : -1;
    } else {
      pen = overlapZ;
      nz = centerAz > centerBz ? 1 : -1;
    }
    return { nx, ny, nz, penetration: pen };
  }
  return null;
}

// --- Activate blocks above ---
function activateBlockAndAbove(hitBlock) {
  const hitY = hitBlock.mesh.position.y;
  blocks.forEach(b => {
    if (b.isKinematic && b.mesh.position.y >= hitY - 0.1) {
      b.isKinematic = false;
      b.mesh.material.emissive = new THREE.Color(0x110500);
    }
  });
}

// --- Physics Step ---
const clock = new THREE.Clock();

function physicsStep(dt) {
  if (dt > 0.05) dt = 0.05; // clamp

  const substeps = 3;
  const subDt = dt / substeps;

  for (let s = 0; s < substeps; s++) {
    // Apply gravity to balls
    balls.forEach(ball => {
      ball.vy -= GRAVITY * subDt;
      ball.mesh.position.x += ball.vx * subDt;
      ball.mesh.position.y += ball.vy * subDt;
      ball.mesh.position.z += ball.vz * subDt;
    });

    // Apply gravity and move dynamic blocks
    blocks.forEach(block => {
      if (block.isKinematic) return;
      block.vy -= GRAVITY * subDt;
      block.mesh.position.x += block.vx * subDt;
      block.mesh.position.y += block.vy * subDt;
      block.mesh.position.z += block.vz * subDt;

      // Simple rotation
      block.mesh.rotation.x += block.angVx * subDt;
      block.mesh.rotation.z += block.angVz * subDt;

      // Damping
      block.vx *= 0.999;
      block.vz *= 0.999;
      block.angVx *= 0.98;
      block.angVz *= 0.98;
    });

    // Ball vs Ground
    balls.forEach(ball => {
      if (ball.mesh.position.y < ball.radius) {
        ball.mesh.position.y = ball.radius;
        ball.vy = -ball.vy * RESTITUTION;
        ball.vx *= (1 - FRICTION * 0.1);
        ball.vz *= (1 - FRICTION * 0.1);
      }
    });

    // Ball vs Block
    balls.forEach(ball => {
      blocks.forEach(block => {
        const aabb = getBlockAABB(block);
        const col = sphereAABBCollision(ball, aabb);
        if (!col) return;

        if (block.isKinematic) {
          activateBlockAndAbove(block);
        }

        // Separate
        ball.mesh.position.x += col.nx * col.penetration * 0.5;
        ball.mesh.position.y += col.ny * col.penetration * 0.5;
        ball.mesh.position.z += col.nz * col.penetration * 0.5;

        if (!block.isKinematic) {
          block.mesh.position.x -= col.nx * col.penetration * 0.5;
          block.mesh.position.y -= col.ny * col.penetration * 0.5;
          block.mesh.position.z -= col.nz * col.penetration * 0.5;
        }

        // Relative velocity
        const bvx = block.isKinematic ? 0 : block.vx;
        const bvy = block.isKinematic ? 0 : block.vy;
        const bvz = block.isKinematic ? 0 : block.vz;

        const relVx = ball.vx - bvx;
        const relVy = ball.vy - bvy;
        const relVz = ball.vz - bvz;

        const relVn = relVx * col.nx + relVy * col.ny + relVz * col.nz;
        if (relVn > 0) return; // separating

        const e = RESTITUTION;
        const invMassBall = 1 / BALL_MASS;
        const invMassBlock = block.isKinematic ? 0 : (1 / BLOCK_MASS);
        const j = -(1 + e) * relVn / (invMassBall + invMassBlock);

        ball.vx += j * invMassBall * col.nx;
        ball.vy += j * invMassBall * col.ny;
        ball.vz += j * invMassBall * col.nz;

        if (!block.isKinematic) {
          block.vx -= j * invMassBlock * col.nx;
          block.vy -= j * invMassBlock * col.ny;
          block.vz -= j * invMassBlock * col.nz;

          // Add some angular velocity based on hit offset
          const offX = ball.mesh.position.x - block.mesh.position.x;
          const offY = ball.mesh.position.y - block.mesh.position.y;
          const offZ = ball.mesh.position.z - block.mesh.position.z;
          block.angVx += (col.ny * offZ - col.nz * offY) * j * 0.3;
          block.angVz += (col.nx * offY - col.ny * offX) * j * 0.3;
        }

        // Friction
        const tangVx = relVx - relVn * col.nx;
        const tangVy = relVy - relVn * col.ny;
        const tangVz = relVz - relVn * col.nz;
        const tangLen = Math.sqrt(tangVx * tangVx + tangVy * tangVy + tangVz * tangVz);
        if (tangLen > 0.001) {
          const frictionImpulse = Math.min(FRICTION * Math.abs(j), tangLen * BALL_MASS);
          ball.vx -= (tangVx / tangLen) * frictionImpulse * invMassBall;
          ball.vy -= (tangVy / tangLen) * frictionImpulse * invMassBall;
          ball.vz -= (tangVz / tangLen) * frictionImpulse * invMassBall;
          if (!block.isKinematic) {
            block.vx += (tangVx / tangLen) * frictionImpulse * invMassBlock;
            block.vy += (tangVy / tangLen) * frictionImpulse * invMassBlock;
            block.vz += (tangVz / tangLen) * frictionImpulse * invMassBlock;
          }
        }
      });
    });

    // Block vs Ground (dynamic only)
    blocks.forEach(block => {
      if (block.isKinematic) return;
      const aabb = getBlockAABB(block);
      if (aabb.minY < 0) {
        const pen = -aabb.minY;
        block.mesh.position.y += pen;
        if (block.vy < 0) {
          block.vy = -block.vy * RESTITUTION;
        }
        block.vx *= (1 - FRICTION * 0.2);
        block.vz *= (1 - FRICTION * 0.2);
        block.angVx *= 0.9;
        block.angVz *= 0.9;

        // Stop very slow blocks
        if (Math.abs(block.vy) < 0.1 && pen < 0.05) {
          block.vy = 0;
        }
      }
    });

    // Block vs Block (dynamic only)
    for (let i = 0; i < blocks.length; i++) {
      for (let j = i + 1; j < blocks.length; j++) {
        const a = blocks[i];
        const b = blocks[j];
        if (a.isKinematic && b.isKinematic) continue;

        const aabbA = getBlockAABB(a);
        const aabbB = getBlockAABB(b);
        const col = aabbAABBCollision(aabbA, aabbB);
        if (!col) continue;

        // If one is kinematic and the other dynamic hits it, activate
        if (a.isKinematic && !b.isKinematic) {
          activateBlockAndAbove(a);
        }
        if (b.isKinematic && !a.isKinematic) {
          activateBlockAndAbove(b);
        }

        const invMassA = a.isKinematic ? 0 : (1 / BLOCK_MASS);
        const invMassB = b.isKinematic ? 0 : (1 / BLOCK_MASS);
        const totalInvMass = invMassA + invMassB;
        if (totalInvMass === 0) continue;

        // Separate
        const sepA = invMassA / totalInvMass;
        const sepB = invMassB / totalInvMass;
        a.mesh.position.x += col.nx * col.penetration * sepA;
        a.mesh.position.y += col.ny * col.penetration * sepA;
        a.mesh.position.z += col.nz * col.penetration * sepA;
        b.mesh.position.x -= col.nx * col.penetration * sepB;
        b.mesh.position.y -= col.ny * col.penetration * sepB;
        b.mesh.position.z -= col.nz * col.penetration * sepB;

        // Velocity response
        const avx = a.isKinematic ? 0 : a.vx;
        const avy = a.isKinematic ? 0 : a.vy;
        const avz = a.isKinematic ? 0 : a.vz;
        const bvx = b.isKinematic ? 0 : b.vx;
        const bvy = b.isKinematic ? 0 : b.vy;
        const bvz = b.isKinematic ? 0 : b.vz;

        const relVn = (avx - bvx) * col.nx + (avy - bvy) * col.ny + (avz - bvz) * col.nz;
        if (relVn > 0) continue;

        const impulse = -(1 + RESTITUTION) * relVn / totalInvMass;

        if (!a.isKinematic) {
          a.vx += impulse * invMassA * col.nx;
          a.vy += impulse * invMassA * col.ny;
          a.vz += impulse * invMassA * col.nz;
        }
        if (!b.isKinematic) {
          b.vx -= impulse * invMassB * col.nx;
          b.vy -= impulse * invMassB * col.ny;
          b.vz -= impulse * invMassB * col.nz;
        }

        // Friction for block-block
        const tangVx = (avx - bvx) - relVn * col.nx;
        const tangVy = (avy - bvy) - relVn * col.ny;
        const tangVz = (avz - bvz) - relVn * col.nz;
        const tangLen = Math.sqrt(tangVx * tangVx + tangVy * tangVy + tangVz * tangVz);
        if (tangLen > 0.001) {
          const frictionImpulse = Math.min(FRICTION * Math.abs(impulse), tangLen / totalInvMass);
          if (!a.isKinematic) {
            a.vx -= (tangVx / tangLen) * frictionImpulse * invMassA;
            a.vy -= (tangVy / tangLen) * frictionImpulse * invMassA;
            a.vz -= (tangVz / tangLen) * frictionImpulse * invMassA;
          }
          if (!b.isKinematic) {
            b.vx += (tangVx / tangLen) * frictionImpulse * invMassB;
            b.vy += (tangVy / tangLen) * frictionImpulse * invMassB;
            b.vz += (tangVz / tangLen) * frictionImpulse * invMassB;
          }
        }
      }
    }
  }

  // Remove balls that fall too far
  for (let i = balls.length - 1; i >= 0; i--) {
    if (balls[i].mesh.position.y < -20 || balls[i].mesh.position.length() > 100) {
      scene.remove(balls[i].mesh);
      balls.splice(i, 1);
    }
  }
}

// --- HUD Update ---
function updateHUD() {
  let staticCount = 0, dynamicCount = 0, fallenCount = 0;
  blocks.forEach(b => {
    if (b.isKinematic) {
      staticCount++;
    } else {
      dynamicCount++;
      if (b.mesh.position.y < 0.3) fallenCount++;
    }
  });

  document.getElementById('staticCount').textContent = staticCount;
  document.getElementById('dynamicCount').textContent = dynamicCount;
  document.getElementById('fallenCount').textContent = fallenCount;
  document.getElementById('ballCount').textContent = balls.length;

  // Expose state
  window.__3D_STATE__ = {
    blocks: blocks.map(b => ({
      x: b.mesh.position.x,
      y: b.mesh.position.y,
      z: b.mesh.position.z,
      vx: b.vx, vy: b.vy, vz: b.vz,
      isKinematic: b.isKinematic
    })),
    balls: balls.map(b => ({
      x: b.mesh.position.x,
      y: b.mesh.position.y,
      z: b.mesh.position.z,
      vx: b.vx, vy: b.vy, vz: b.vz
    })),
    staticBlockCount: staticCount,
    dynamicBlockCount: dynamicCount,
    fallenBlockCount: fallenCount,
    ballCount: balls.length,
    towerIntact: staticCount === 30
  };
}

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  physicsStep(dt);
  updateHUD();
  controls.update();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
