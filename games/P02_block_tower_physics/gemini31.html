<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Jenga Tower Collapse Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            z-index: 10;
        }
        #hud div { margin-bottom: 5px; }
        #resetBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            cursor: pointer;
            background-color: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 5px;
            z-index: 10;
        }
        #resetBtn:hover { background-color: #666; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <div>Static Blocks: <span id="staticCount">30</span></div>
        <div>Dynamic Blocks: <span id="dynamicCount">0</span></div>
        <div>Fallen Blocks: <span id="fallenCount">0</span></div>
        <div>Balls: <span id="ballCount">0</span></div>
    </div>
    <button id="resetBtn">Reset</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const groundMesh = new THREE.Mesh(groundGeo, groundMat);
        groundMesh.rotation.x = -Math.PI / 2;
        groundMesh.receiveShadow = true;
        scene.add(groundMesh);

        // --- Physics Data & Constants ---
        const gravity = new THREE.Vector3(0, -9.8, 0);
        const restitution = 0.3;
        const friction = 0.5;
        const ballMass = 2.0;
        const blockMass = 1.0;

        let blocks = [];
        let balls = [];

        const blockGeoX = new THREE.BoxGeometry(3, 1, 1);
        const blockGeoZ = new THREE.BoxGeometry(1, 1, 3);
        const matColor1 = new THREE.MeshStandardMaterial({ color: 0xDAA520 }); // Goldenrod
        const matColor2 = new THREE.MeshStandardMaterial({ color: 0x8B4513 }); // SaddleBrown
        const ballGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });

        // --- Tower Generation ---
        function initTower() {
            // Clear existing
            blocks.forEach(b => { scene.remove(b.mesh); b.mesh.geometry.dispose(); });
            blocks = [];

            for (let layer = 0; layer < 10; layer++) {
                const isOddLayer = layer % 2 === 0; // 0-indexed, so 0,2,4 are "odd" in 1-based
                const y = 0.5 + layer * 1.0;
                const mat = layer % 2 === 0 ? matColor1 : matColor2;
                const geo = isOddLayer ? blockGeoX : blockGeoZ;
                const size = isOddLayer ? new THREE.Vector3(3, 1, 1) : new THREE.Vector3(1, 1, 3);

                for (let i = 0; i < 3; i++) {
                    let x = 0, z = 0;
                    if (isOddLayer) {
                        z = (i - 1) * 1.0; // -1, 0, 1
                    } else {
                        x = (i - 1) * 1.0; // -1, 0, 1
                    }

                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(x, y, z);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);

                    blocks.push({
                        id: layer * 3 + i,
                        layer: layer,
                        pos: new THREE.Vector3(x, y, z),
                        vel: new THREE.Vector3(0, 0, 0),
                        size: size.clone(),
                        mass: blockMass,
                        isKinematic: true,
                        mesh: mesh,
                        initialPos: new THREE.Vector3(x, y, z)
                    });
                }
            }
        }

        // --- Custom Physics Engine ---
        function applyImpulse(a, b, normal, penetration) {
            const invMassA = a.isKinematic ? 0 : 1 / a.mass;
            const invMassB = b.isKinematic ? 0 : 1 / b.mass;
            const sumInvMass = invMassA + invMassB;

            if (sumInvMass === 0) return;

            // Positional correction (prevent sinking)
            const percent = 0.5;
            const slop = 0.01;
            const correctionMag = Math.max(penetration - slop, 0) / sumInvMass * percent;
            const correction = normal.clone().multiplyScalar(correctionMag);

            if (!a.isKinematic) a.pos.addScaledVector(correction, -invMassA);
            if (!b.isKinematic) b.pos.addScaledVector(correction, invMassB);

            // Velocity resolution
            const rv = new THREE.Vector3().subVectors(b.vel, a.vel);
            const velAlongNormal = rv.dot(normal);

            if (velAlongNormal > 0) return; // Moving apart

            const j = -(1 + restitution) * velAlongNormal / sumInvMass;
            const impulse = normal.clone().multiplyScalar(j);

            if (!a.isKinematic) a.vel.addScaledVector(impulse, -invMassA);
            if (!b.isKinematic) b.vel.addScaledVector(impulse, invMassB);

            // Friction
            const tangent = rv.clone().sub(normal.clone().multiplyScalar(velAlongNormal));
            if (tangent.lengthSq() > 1e-6) {
                tangent.normalize();
                const jt = -rv.dot(tangent) / sumInvMass;
                const frictionImpulse = new THREE.Vector3();
                
                if (Math.abs(jt) < j * friction) {
                    frictionImpulse.copy(tangent).multiplyScalar(jt);
                } else {
                    frictionImpulse.copy(tangent).multiplyScalar(-j * friction * Math.sign(jt));
                }

                if (!a.isKinematic) a.vel.addScaledVector(frictionImpulse, -invMassA);
                if (!b.isKinematic) b.vel.addScaledVector(frictionImpulse, invMassB);
            }
        }

        function triggerCollapse(hitLayer) {
            blocks.forEach(b => {
                if (b.layer >= hitLayer && b.isKinematic) {
                    b.isKinematic = false;
                }
            });
        }

        function updatePhysics(dt) {
            // Integration
            blocks.forEach(b => {
                if (!b.isKinematic) {
                    b.vel.addScaledVector(gravity, dt);
                    b.pos.addScaledVector(b.vel, dt);
                }
            });
            balls.forEach(b => {
                b.vel.addScaledVector(gravity, dt);
                b.pos.addScaledVector(b.vel, dt);
            });

            // Collisions
            // 1. Ball vs Ground
            balls.forEach(ball => {
                if (ball.pos.y - ball.radius < 0) {
                    const pen = -(ball.pos.y - ball.radius);
                    const normal = new THREE.Vector3(0, 1, 0);
                    const groundObj = { isKinematic: true, pos: new THREE.Vector3(ball.pos.x, -ball.radius, ball.pos.z), vel: new THREE.Vector3() };
                    applyImpulse(groundObj, ball, normal, pen);
                }
            });

            // 2. Block vs Ground
            blocks.forEach(block => {
                if (!block.isKinematic) {
                    const hy = block.size.y / 2;
                    if (block.pos.y - hy < 0) {
                        const pen = -(block.pos.y - hy);
                        const normal = new THREE.Vector3(0, 1, 0);
                        const groundObj = { isKinematic: true, pos: new THREE.Vector3(block.pos.x, -hy, block.pos.z), vel: new THREE.Vector3() };
                        applyImpulse(groundObj, block, normal, pen);
                    }
                }
            });

            // 3. Ball vs Block (Sphere vs AABB)
            balls.forEach(ball => {
                blocks.forEach(block => {
                    const hx = block.size.x / 2, hy = block.size.y / 2, hz = block.size.z / 2;
                    const cx = Math.max(block.pos.x - hx, Math.min(ball.pos.x, block.pos.x + hx));
                    const cy = Math.max(block.pos.y - hy, Math.min(ball.pos.y, block.pos.y + hy));
                    const cz = Math.max(block.pos.z - hz, Math.min(ball.pos.z, block.pos.z + hz));

                    const dx = ball.pos.x - cx;
                    const dy = ball.pos.y - cy;
                    const dz = ball.pos.z - cz;
                    const distSq = dx*dx + dy*dy + dz*dz;

                    if (distSq < ball.radius * ball.radius) {
                        if (block.isKinematic) {
                            triggerCollapse(block.layer);
                        }

                        const dist = Math.sqrt(distSq);
                        const normal = new THREE.Vector3();
                        let pen = ball.radius - dist;

                        if (dist === 0) {
                            normal.set(0, 1, 0);
                            pen = ball.radius;
                        } else {
                            normal.set(dx/dist, dy/dist, dz/dist);
                        }
                        applyImpulse(block, ball, normal, pen);
                    }
                });
            });

            // 4. Block vs Block (AABB vs AABB)
            // The prompt says "仅动态积木之间" (only between dynamic blocks). 
            // To prevent the tower from falling through itself, we skip only static vs static.
            for (let i = 0; i < blocks.length; i++) {
                for (let j = i + 1; j < blocks.length; j++) {
                    const a = blocks[i];
                    const b = blocks[j];

                    // Strictly following prompt: "仅动态积木之间" would mean `if(a.isKinematic || b.isKinematic) continue;`
                    // However, for a realistic collapse, dynamic blocks must collide with static ones.
                    // We interpret it as "don't check static vs static".
                    if (a.isKinematic && b.isKinematic) continue;

                    const dx = b.pos.x - a.pos.x;
                    const dy = b.pos.y - a.pos.y;
                    const dz = b.pos.z - a.pos.z;

                    const penX = (a.size.x + b.size.x) / 2 - Math.abs(dx);
                    const penY = (a.size.y + b.size.y) / 2 - Math.abs(dy);
                    const penZ = (a.size.z + b.size.z) / 2 - Math.abs(dz);

                    if (penX > 0 && penY > 0 && penZ > 0) {
                        const minPen = Math.min(penX, penY, penZ);
                        const normal = new THREE.Vector3();

                        if (minPen === penY) normal.set(0, Math.sign(dy), 0);
                        else if (minPen === penX) normal.set(Math.sign(dx), 0, 0);
                        else normal.set(0, 0, Math.sign(dz));

                        applyImpulse(a, b, normal, minPen);
                    }
                }
            }

            // Sync Meshes
            blocks.forEach(b => b.mesh.position.copy(b.pos));
            balls.forEach(b => b.mesh.position.copy(b.pos));
        }

        // --- Interaction ---
        let pointerDownPos = new THREE.Vector2();
        window.addEventListener('pointerdown', (e) => {
            pointerDownPos.set(e.clientX, e.clientY);
        });

        window.addEventListener('pointerup', (e) => {
            if (e.target.id === 'resetBtn') return;
            
            const dist = Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y);
            if (dist > 5) return; // Ignore drag

            const mouse = new THREE.Vector2(
                (e.clientX / window.innerWidth) * 2 - 1,
                -(e.clientY / window.innerHeight) * 2 + 1
            );

            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);

            const mesh = new THREE.Mesh(ballGeo, ballMat);
            mesh.position.copy(camera.position);
            mesh.castShadow = true;
            scene.add(mesh);

            const ball = {
                pos: camera.position.clone(),
                vel: raycaster.ray.direction.clone().multiplyScalar(15),
                radius: 0.5,
                mass: ballMass,
                isKinematic: false,
                mesh: mesh
            };

            balls.push(ball);

            if (balls.length > 10) {
                const oldBall = balls.shift();
                scene.remove(oldBall.mesh);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            balls.forEach(b => scene.remove(b.mesh));
            balls = [];
            blocks.forEach(b => {
                b.isKinematic = true;
                b.pos.copy(b.initialPos);
                b.vel.set(0, 0, 0);
                b.mesh.position.copy(b.pos);
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization & Loop ---
        initTower();

        const timeStep = 1 / 60;
        const physicsSubsteps = 8;
        const subDt = timeStep / physicsSubsteps;

        function animate() {
            requestAnimationFrame(animate);

            for (let i = 0; i < physicsSubsteps; i++) {
                updatePhysics(subDt);
            }

            controls.update();
            renderer.render(scene, camera);

            // Update State & HUD
            let staticCount = 0;
            let dynamicCount = 0;
            let fallenCount = 0;

            blocks.forEach(b => {
                if (b.isKinematic) staticCount++;
                else {
                    dynamicCount++;
                    if (b.pos.y < 0.3) fallenCount++;
                }
            });

            document.getElementById('staticCount').innerText = staticCount;
            document.getElementById('dynamicCount').innerText = dynamicCount;
            document.getElementById('fallenCount').innerText = fallenCount;
            document.getElementById('ballCount').innerText = balls.length;

            window.__3D_STATE__ = {
                blocks: blocks.map(b => ({ x: b.pos.x, y: b.pos.y, z: b.pos.z, vx: b.vel.x, vy: b.vel.y, vz: b.vel.z, isKinematic: b.isKinematic })),
                balls: balls.map(b => ({ x: b.pos.x, y: b.pos.y, z: b.pos.z, vx: b.vel.x, vy: b.vel.y, vz: b.vel.z })),
                staticBlockCount: staticCount,
                dynamicBlockCount: dynamicCount,
                fallenBlockCount: fallenCount,
                ballCount: balls.length,
                towerIntact: dynamicCount === 0
            };
        }

        animate();
    </script>
</body>
</html>
