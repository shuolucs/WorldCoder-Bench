<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sneaker Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e0e0e0;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            max-height: 90vh;
            overflow-y: auto;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }
        .section {
            margin-bottom: 20px;
        }
        #variantButtons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            background: #333;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 12px;
        }
        button:hover {
            background: #555;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }
        .hud-item span {
            font-weight: bold;
            color: #4da6ff;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud-panel">
        <div class="hud-item">Variant: <span id="currentVariant">Loading...</span></div>
        <div class="hud-item">Color: <span id="currentColor">#ffffff</span></div>
        <div class="hud-item">Explode: <span id="explodeState">0.0</span></div>
    </div>

    <div id="ui-panel">
        <div class="section">
            <h3>Materials Variants</h3>
            <div id="variantButtons"></div>
        </div>
        <div class="section">
            <h3>Color Adjustment</h3>
            <input type="color" id="colorPicker" value="#ffffff">
        </div>
        <div class="section">
            <h3>Exploded View</h3>
            <button id="explodeBtn">Toggle Explode</button>
            <input type="range" id="explodeSlider" min="0" max="3" step="0.1" value="0">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // Global State
        const state = {
            modelLoaded: false,
            currentVariant: 'None',
            colorHex: '#ffffff',
            explodeDistance: 0,
            partCount: 0
        };
        window.__3D_STATE__ = state;

        let scene, camera, renderer, controls, model, gltfParser;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xe0e0e0);

            // Camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(15, 10, 15);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // Environment & Lighting
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(5, 10, 7.5);
            scene.add(dirLight);

            // Controls
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 5;
            controls.maxDistance = 30;

            // Load Model
            const loader = new GLTFLoader();
            loader.load('assets/MaterialsVariantsShoe.glb', (gltf) => {
                model = gltf.scene;
                gltfParser = gltf.parser;

                // Center and Scale
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 10 / maxDim;
                model.scale.setScalar(scale);
                
                box.setFromObject(model);
                box.getCenter(center);
                model.position.sub(center);

                scene.add(model);

                // Setup Explode Data
                model.updateMatrixWorld(true);
                const modelWorldCenter = new THREE.Vector3(0, 0, 0); 
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        state.partCount++;
                        child.userData.originalPosition = child.position.clone();
                        
                        const childBox = new THREE.Box3().setFromObject(child);
                        const childWorldCenter = childBox.getCenter(new THREE.Vector3());
                        
                        let dirWorld = childWorldCenter.clone().sub(modelWorldCenter);
                        if (dirWorld.lengthSq() < 0.0001) {
                            dirWorld.set(0, 1, 0);
                        } else {
                            dirWorld.normalize();
                        }
                        
                        const inverseParentMatrix = child.parent.matrixWorld.clone().invert();
                        const dirLocal = dirWorld.transformDirection(inverseParentMatrix).normalize();
                        
                        child.userData.explodeDirection = dirLocal;
                    }
                });

                // Setup Variants
                const variantsExt = gltf.userData.gltfExtensions?.['KHR_materials_variants'];
                if (variantsExt && variantsExt.variants) {
                    const btnContainer = document.getElementById('variantButtons');
                    variantsExt.variants.forEach((variant) => {
                        const btn = document.createElement('button');
                        btn.textContent = variant.name;
                        btn.onclick = () => selectVariant(variant.name);
                        btnContainer.appendChild(btn);
                    });
                    
                    if (variantsExt.variants.length > 0) {
                        selectVariant(variantsExt.variants[0].name);
                    }
                }

                state.modelLoaded = true;
            }, undefined, (error) => {
                console.error('Error loading model:', error);
                document.getElementById('currentVariant').textContent = 'Error Loading Model';
            });

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            document.getElementById('colorPicker').addEventListener('input', (e) => {
                state.colorHex = e.target.value;
                applyColor();
            });

            const explodeSlider = document.getElementById('explodeSlider');
            explodeSlider.addEventListener('input', (e) => {
                state.explodeDistance = parseFloat(e.target.value);
                updateExplode();
            });

            document.getElementById('explodeBtn').addEventListener('click', () => {
                if (state.explodeDistance > 0) {
                    explodeSlider.value = 0;
                } else {
                    explodeSlider.value = 3;
                }
                explodeSlider.dispatchEvent(new Event('input'));
            });
        }

        function selectVariant(name) {
            if (!model || !gltfParser) return;
            state.currentVariant = name;
            gltfParser.getDependency('gltfExtension', 'KHR_materials_variants').then((ext) => {
                ext.selectVariant(model, name).then(() => {
                    applyColor();
                });
            });
        }

        function applyColor() {
            if (!model) return;
            const color = new THREE.Color(state.colorHex);
            model.traverse((child) => {
                if (child.isMesh && child.material && child.material.color) {
                    child.material.color.copy(color);
                }
            });
        }

        function updateExplode() {
            if (!model) return;
            const dist = state.explodeDistance;
            model.traverse((child) => {
                if (child.isMesh && child.userData.originalPosition) {
                    child.position.copy(child.userData.originalPosition)
                        .add(child.userData.explodeDirection.clone().multiplyScalar(dist));
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);

            // Update HUD
            document.getElementById('currentVariant').textContent = state.currentVariant;
            document.getElementById('currentColor').textContent = state.colorHex;
            document.getElementById('explodeState').textContent = state.explodeDistance.toFixed(1);

            // Update Global State
            window.__3D_STATE__ = { ...state };
        }
    </script>
</body>
</html>
