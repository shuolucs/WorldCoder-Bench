<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>运动鞋配置器</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  color: #e0e0e0;
  padding: 16px 20px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.8;
  border: 1px solid rgba(255,255,255,0.1);
  min-width: 220px;
  z-index: 10;
}
#hud .label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
#hud .value { color: #fff; font-weight: 600; }

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  z-index: 10;
}

#variantButtons {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
#variantButtons button {
  padding: 8px 18px;
  border: 2px solid rgba(255,255,255,0.2);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  color: #fff;
  border-radius: 25px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
}
#variantButtons button:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.4);
}
#variantButtons button.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-color: transparent;
  box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
}

#bottomControls {
  display: flex;
  align-items: center;
  gap: 16px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  padding: 12px 24px;
  border-radius: 30px;
  border: 1px solid rgba(255,255,255,0.1);
}

#bottomControls label {
  color: #ccc;
  font-size: 13px;
  font-weight: 500;
}

#colorPicker {
  width: 36px;
  height: 36px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  cursor: pointer;
  background: none;
  padding: 0;
  overflow: hidden;
}
#colorPicker::-webkit-color-swatch-wrapper { padding: 2px; }
#colorPicker::-webkit-color-swatch { border-radius: 50%; border: none; }

#explodeBtn {
  padding: 8px 20px;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  border: none;
  color: #fff;
  border-radius: 25px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  transition: all 0.3s ease;
  letter-spacing: 0.5px;
}
#explodeBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
}

#explodeSlider {
  width: 140px;
  -webkit-appearance: none;
  appearance: none;
  height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.2);
  outline: none;
}
#explodeSlider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, #667eea, #764ba2);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #fff;
  font-size: 18px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #667eea;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#resetColorBtn {
  padding: 6px 14px;
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  transition: all 0.3s ease;
}
#resetColorBtn:hover {
  background: rgba(255,255,255,0.25);
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>加载模型中...</span>
</div>

<div id="hud">
  <div><span class="label">变体：</span><span class="value" id="currentVariant">-</span></div>
  <div><span class="label">颜色：</span><span class="value" id="currentColor">#FFFFFF</span></div>
  <div><span class="label">爆炸距离：</span><span class="value" id="explodeState">0.0</span></div>
</div>

<div id="controls">
  <div id="variantButtons"></div>
  <div id="bottomControls">
    <label>颜色</label>
    <input type="color" id="colorPicker" value="#ffffff">
    <button id="resetColorBtn">重置</button>
    <div style="width:1px;height:24px;background:rgba(255,255,255,0.2)"></div>
    <button id="explodeBtn">💥 爆炸</button>
    <input type="range" id="explodeSlider" min="0" max="3" step="0.1" value="0">
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Initialize state
window.__3D_STATE__ = {
  modelLoaded: false,
  currentVariant: '',
  colorHex: '#ffffff',
  explodeDistance: 0,
  partCount: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

// Add subtle gradient background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 512;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const gradient = bgCtx.createRadialGradient(256, 256, 0, 256, 256, 360);
gradient.addColorStop(0, '#2d2d5e');
gradient.addColorStop(1, '#1a1a2e');
bgCtx.fillStyle = gradient;
bgCtx.fillRect(0, 0, 512, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0.3, 0.2, 0.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight1.position.set(5, 5, 5);
dirLight1.castShadow = true;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.5);
dirLight2.position.set(-3, 3, -3);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xff8888, 0.3);
dirLight3.position.set(0, -2, 3);
scene.add(dirLight3);

// Ground plane
const groundGeo = new THREE.CircleGeometry(2, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222244,
  roughness: 0.8,
  metalness: 0.2,
  transparent: true,
  opacity: 0.5
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
scene.add(ground);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 0.15;
controls.maxDistance = 3;
controls.target.set(0, 0.08, 0);
controls.update();

// Data
let model = null;
let meshParts = [];
let originalPositions = [];
let partCenters = [];
let variantNames = [];
let currentVariantIndex = 0;
let currentColor = new THREE.Color(0xffffff);
let explodeDistance = 0;
let originalMaterials = new Map();
let gltfData = null;

// DOM elements
const variantButtonsEl = document.getElementById('variantButtons');
const colorPickerEl = document.getElementById('colorPicker');
const explodeBtnEl = document.getElementById('explodeBtn');
const explodeSliderEl = document.getElementById('explodeSlider');
const currentVariantEl = document.getElementById('currentVariant');
const currentColorEl = document.getElementById('currentColor');
const explodeStateEl = document.getElementById('explodeState');
const loadingEl = document.getElementById('loading');
const resetColorBtn = document.getElementById('resetColorBtn');

// Load model
const loader = new GLTFLoader();
loader.load(
  'assets/MaterialsVariantsShoe.glb',
  (gltf) => {
    gltfData = gltf;
    model = gltf.scene;

    // Center and scale model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 0.3 / maxDim;

    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));
    model.position.y -= (box.min.y * scale);

    scene.add(model);

    // Collect mesh parts
    model.traverse((child) => {
      if (child.isMesh) {
        meshParts.push(child);
        // Store world position as original
        const worldPos = new THREE.Vector3();
        child.getWorldPosition(worldPos);
        originalPositions.push(child.position.clone());

        // Compute center of each part's bounding box
        const partBox = new THREE.Box3().setFromObject(child);
        const partCenter = partBox.getCenter(new THREE.Vector3());
        partCenters.push(partCenter);

        // Store original materials (clone them)
        if (child.material) {
          if (Array.isArray(child.material)) {
            originalMaterials.set(child, child.material.map(m => m.clone()));
          } else {
            originalMaterials.set(child, child.material.clone());
          }
        }
      }
    });

    // Extract variant names from KHR_materials_variants extension
    const parser = gltf.parser;
    const variantsExtension = gltf.userData?.gltfExtensions?.KHR_materials_variants;

    if (variantsExtension && variantsExtension.variants) {
      variantNames = variantsExtension.variants.map(v => v.name);
    }

    // Create variant buttons
    if (variantNames.length > 0) {
      variantNames.forEach((name, index) => {
        const btn = document.createElement('button');
        btn.textContent = name;
        if (index === 0) btn.classList.add('active');
        btn.addEventListener('click', () => {
          switchVariant(index);
          document.querySelectorAll('#variantButtons button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
        variantButtonsEl.appendChild(btn);
      });
      currentVariantEl.textContent = variantNames[0] || 'Default';
      window.__3D_STATE__.currentVariant = variantNames[0] || 'Default';
    } else {
      // No variants found, show default
      const btn = document.createElement('button');
      btn.textContent = 'Default';
      btn.classList.add('active');
      variantButtonsEl.appendChild(btn);
      currentVariantEl.textContent = 'Default';
      window.__3D_STATE__.currentVariant = 'Default';
    }

    window.__3D_STATE__.modelLoaded = true;
    window.__3D_STATE__.partCount = meshParts.length;

    loadingEl.style.display = 'none';

    // Apply first variant
    if (variantNames.length > 0) {
      switchVariant(0);
    }
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    loadingEl.innerHTML = '<span style="color:#f5576c">加载失败，请确保模型文件存在</span>';
  }
);

// Switch material variant using the glTF parser
async function switchVariant(index) {
  if (!gltfData || index < 0 || index >= variantNames.length) return;

  currentVariantIndex = index;
  const variantName = variantNames[index];

  const parser = gltfData.parser;
  const variantsExtension = gltfData.userData?.gltfExtensions?.KHR_materials_variants;

  if (!variantsExtension) return;

  // Traverse all meshes in the scene and apply variant materials
  model.traverse(async (child) => {
    if (!child.isMesh) return;

    const meshVariantDef = child.userData?.gltfExtensions?.KHR_materials_variants;
    if (!meshVariantDef) return;

    const mappings = meshVariantDef.mappings || [];

    for (const mapping of mappings) {
      if (mapping.variants.includes(index)) {
        // Load the material for this variant
        const materialIndex = mapping.material;
        const material = await parser.getDependency('material', materialIndex);
        
        // Ensure proper encoding
        material.needsUpdate = true;
        
        child.material = material;

        // Store as new original material for color overlay
        if (Array.isArray(child.material)) {
          originalMaterials.set(child, child.material.map(m => m.clone()));
        } else {
          originalMaterials.set(child, child.material.clone());
        }

        // Re-apply color tint if not white
        if (currentColor.r !== 1 || currentColor.g !== 1 || currentColor.b !== 1) {
          applyColorToMesh(child);
        }
        break;
      }
    }
  });

  currentVariantEl.textContent = variantName;
  window.__3D_STATE__.currentVariant = variantName;
}

// Apply color tint to a single mesh
function applyColorToMesh(mesh) {
  if (!mesh.material) return;

  const applyToMat = (mat) => {
    if (mat.color) {
      // Get original color
      const origMat = originalMaterials.get(mesh);
      let origColor;
      if (origMat) {
        if (Array.isArray(origMat)) {
          const idx = Array.isArray(mesh.material) ? mesh.material.indexOf(mat) : 0;
          origColor = origMat[idx]?.color || new THREE.Color(1, 1, 1);
        } else {
          origColor = origMat.color || new THREE.Color(1, 1, 1);
        }
      } else {
        origColor = new THREE.Color(1, 1, 1);
      }
      // Multiply blend
      mat.color.copy(origColor).multiply(currentColor);
    }
  };

  if (Array.isArray(mesh.material)) {
    mesh.material.forEach(applyToMat);
  } else {
    applyToMat(mesh.material);
  }
}

// Apply color to all parts
function applyColorToAll() {
  meshParts.forEach(mesh => applyColorToMesh(mesh));
}

// Color picker
colorPickerEl.addEventListener('input', (e) => {
  const hex = e.target.value;
  currentColor.set(hex);
  window.__3D_STATE__.colorHex = hex;
  currentColorEl.textContent = hex.toUpperCase();
  applyColorToAll();
});

// Reset color
resetColorBtn.addEventListener('click', () => {
  currentColor.set(0xffffff);
  colorPickerEl.value = '#ffffff';
  window.__3D_STATE__.colorHex = '#ffffff';
  currentColorEl.textContent = '#FFFFFF';
  applyColorToAll();
});

// Explode view
function updateExplode(distance) {
  explodeDistance = distance;

  if (meshParts.length === 0) return;

  // Compute overall center
  const overallCenter = new THREE.Vector3();
  partCenters.forEach(c => overallCenter.add(c));
  overallCenter.divideScalar(partCenters.length);

  meshParts.forEach((mesh, i) => {
    const origPos = originalPositions[i];
    const center = partCenters[i];

    // Direction from overall center to part center
    const dir = new THREE.Vector3().subVectors(center, overallCenter);
    if (dir.length() < 0.0001) {
      // If part is at center, push it up
      dir.set(0, 1, 0);
    }
    dir.normalize();

    mesh.position.copy(origPos).addScaledVector(dir, distance * 0.1);
  });

  explodeStateEl.textContent = distance.toFixed(1);
  window.__3D_STATE__.explodeDistance = distance;
}

let isExploded = false;
explodeBtnEl.addEventListener('click', () => {
  isExploded = !isExploded;
  const targetValue = isExploded ? 1.5 : 0;
  
  // Animate
  const startValue = parseFloat(explodeSliderEl.value);
  const startTime = performance.now();
  const duration = 500;

  function animateExplode(time) {
    const elapsed = time - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - t, 3); // ease out cubic
    const value = startValue + (targetValue - startValue) * eased;
    
    explodeSliderEl.value = value;
    updateExplode(value);

    if (t < 1) {
      requestAnimationFrame(animateExplode);
    }
  }
  requestAnimationFrame(animateExplode);
});

explodeSliderEl.addEventListener('input', (e) => {
  const value = parseFloat(e.target.value);
  updateExplode(value);
  isExploded = value > 0;
});

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Gentle auto-rotation when not interacting
  if (model && !controls._isDragging) {
    // model.rotation.y += 0.001;
  }

  renderer.render(scene, camera);

  // Update state
  window.__3D_STATE__ = {
    modelLoaded: model !== null,
    currentVariant: currentVariantEl.textContent,
    colorHex: colorPickerEl.value,
    explodeDistance: explodeDistance,
    partCount: meshParts.length
  };
}

animate();
</script>
</body>
</html>
