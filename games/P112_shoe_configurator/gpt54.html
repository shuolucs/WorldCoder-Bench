<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 运动鞋配置器</title>
  <style>
    :root {
      --panel-bg: rgba(18, 18, 22, 0.78);
      --panel-border: rgba(255, 255, 255, 0.12);
      --text: #f4f6f8;
      --muted: #b8c0cc;
      --accent: #4da3ff;
      --accent-2: #7c5cff;
      --btn-bg: rgba(255, 255, 255, 0.08);
      --btn-hover: rgba(255, 255, 255, 0.16);
      --btn-active: linear-gradient(135deg, var(--accent), var(--accent-2));
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #1a2230 0%, #0c0f16 45%, #06080d 100%);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    #hud {
      top: 16px;
      left: 16px;
      min-width: 250px;
      padding: 14px 16px;
      z-index: 10;
    }

    #controlsPanel {
      right: 16px;
      top: 16px;
      width: 320px;
      max-width: calc(100vw - 32px);
      padding: 16px;
      z-index: 10;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 12px;
      letter-spacing: 0.2px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 10px;
      line-height: 1.5;
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .hud-row:last-child {
      border-bottom: 0;
    }

    .hud-label {
      color: var(--muted);
    }

    .hud-value {
      color: var(--text);
      font-weight: 600;
      text-align: right;
      word-break: break-all;
    }

    .section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }

    .section:first-of-type {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .section-label {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--text);
    }

    #variantButtons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .variant-btn, .action-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: var(--btn-bg);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .variant-btn:hover, .action-btn:hover {
      background: var(--btn-hover);
      transform: translateY(-1px);
    }

    .variant-btn.active {
      background: var(--btn-active);
      border-color: transparent;
      box-shadow: 0 6px 16px rgba(77,163,255,0.25);
    }

    .row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="color"] {
      width: 52px;
      height: 36px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .value-badge {
      min-width: 52px;
      text-align: center;
      font-size: 12px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 6px 8px;
    }

    #loading {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 16px;
      z-index: 20;
      font-size: 14px;
    }

    #footerHint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud" class="panel">
      <div class="title">HUD</div>
      <div class="hud-row">
        <div class="hud-label">当前变体</div>
        <div class="hud-value" id="currentVariant">未加载</div>
      </div>
      <div class="hud-row">
        <div class="hud-label">当前颜色</div>
        <div class="hud-value" id="currentColor">#ffffff</div>
      </div>
      <div class="hud-row">
        <div class="hud-label">爆炸状态</div>
        <div class="hud-value" id="explodeState">0.0</div>
      </div>
    </div>

    <div id="controlsPanel" class="panel">
      <div class="title">运动鞋配置器</div>
      <div class="sub">支持材质变体、颜色叠加与爆炸视图。拖拽旋转，滚轮缩放。</div>

      <div class="section">
        <div class="section-label">材质变体</div>
        <div id="variantButtons"></div>
      </div>

      <div class="section">
        <div class="section-label">颜色调整</div>
        <div class="row">
          <input id="colorPicker" type="color" value="#ffffff" />
          <div class="value-badge" id="colorBadge">#ffffff</div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">爆炸视图</div>
        <div class="row" style="margin-bottom: 10px;">
          <button id="explodeBtn" class="action-btn">爆炸 / 复位</button>
          <div class="value-badge" id="explodeValue">0.0</div>
        </div>
        <div class="row">
          <input id="explodeSlider" type="range" min="0" max="3" step="0.1" value="0" />
        </div>
      </div>
    </div>

    <div id="loading" class="panel">模型加载中...</div>
    <div id="footerHint" class="panel">文件：assets/MaterialsVariantsShoe.glb</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const variantButtonsEl = document.getElementById('variantButtons');
    const colorPickerEl = document.getElementById('colorPicker');
    const colorBadgeEl = document.getElementById('colorBadge');
    const explodeBtnEl = document.getElementById('explodeBtn');
    const explodeSliderEl = document.getElementById('explodeSlider');
    const explodeValueEl = document.getElementById('explodeValue');
    const currentVariantEl = document.getElementById('currentVariant');
    const currentColorEl = document.getElementById('currentColor');
    const explodeStateEl = document.getElementById('explodeState');
    const loadingEl = document.getElementById('loading');

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(1.8, 1.1, 2.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.25, 0);
    controls.minDistance = 0.8;
    controls.maxDistance = 6.0;
    controls.update();

    const hemi = new THREE.HemisphereLight(0xffffff, 0x334455, 1.4);
    scene.add(hemi);

    const dir1 = new THREE.DirectionalLight(0xffffff, 1.8);
    dir1.position.set(4, 6, 5);
    dir1.castShadow = true;
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xbfd8ff, 1.0);
    dir2.position.set(-4, 2, -3);
    scene.add(dir2);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.ShadowMaterial({ color: 0x000000, opacity: 0.18 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.65;
    floor.receiveShadow = true;
    scene.add(floor);

    const shoeRoot = new THREE.Group();
    scene.add(shoeRoot);

    const state = {
      modelLoaded: false,
      currentVariant: '默认',
      colorHex: '#ffffff',
      explodeDistance: 0,
      partCount: 0,
      variantNames: [],
      activeVariantIndex: -1,
      variantMappings: [],
      parts: []
    };

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentVariant: state.currentVariant,
      colorHex: state.colorHex,
      explodeDistance: state.explodeDistance,
      partCount: state.partCount
    };

    const tempBox = new THREE.Box3();
    const tempVec = new THREE.Vector3();
    const modelCenter = new THREE.Vector3();

    function hexToNormalizedColor(hex) {
      return new THREE.Color(hex);
    }

    function sanitizeVariantName(name, index) {
      return name || `Variant ${index + 1}`;
    }

    function cloneMaterialWithTint(sourceMat, tintHex) {
      const tint = hexToNormalizedColor(tintHex);
      const cloned = sourceMat.clone();
      if (cloned.color) {
        const base = sourceMat.userData.__baseUntintedColor
          ? sourceMat.userData.__baseUntintedColor.clone()
          : sourceMat.color.clone();
        cloned.userData.__baseUntintedColor = base.clone();
        cloned.color.copy(base).multiply(tint);
      }
      return cloned;
    }

    function applyTintToCurrentMaterials() {
      const tint = hexToNormalizedColor(state.colorHex);
      state.parts.forEach((part) => {
        const currentBaseMaterial = part.currentBaseMaterial || part.mesh.material;
        let nextMaterial = currentBaseMaterial;

        if (Array.isArray(currentBaseMaterial)) {
          nextMaterial = currentBaseMaterial.map((m) => {
            const cloned = m.clone();
            if (cloned.color) {
              const base = m.userData.__baseUntintedColor
                ? m.userData.__baseUntintedColor.clone()
                : m.color.clone();
              cloned.userData.__baseUntintedColor = base.clone();
              cloned.color.copy(base).multiply(tint);
            }
            return cloned;
          });
        } else {
          nextMaterial = cloneMaterialWithTint(currentBaseMaterial, state.colorHex);
        }

        if (part.mesh.material !== nextMaterial) {
          const oldMat = part.mesh.material;
          part.mesh.material = nextMaterial;
          disposeIfOwned(oldMat, part);
        }
      });
    }

    function disposeIfOwned(mat, part) {
      if (!mat) return;
      if (Array.isArray(mat)) {
        mat.forEach((m) => {
          if (m && part.ownedMaterials.has(m)) {
            m.dispose();
            part.ownedMaterials.delete(m);
          }
        });
      } else if (part.ownedMaterials.has(mat)) {
        mat.dispose();
        part.ownedMaterials.delete(mat);
      }
    }

    function registerOwnedMaterial(part, mat) {
      if (Array.isArray(mat)) mat.forEach((m) => part.ownedMaterials.add(m));
      else if (mat) part.ownedMaterials.add(mat);
    }

    function parseVariantsFromGLTF(gltf) {
      const extRoot = gltf.parser.json.extensions || {};
      const khr = extRoot.KHR_materials_variants;
      const variants = (khr && Array.isArray(khr.variants)) ? khr.variants : [];
      state.variantNames = variants.map((v, i) => sanitizeVariantName(v.name, i));

      const mappingsByMesh = new Map();

      gltf.scene.traverse((obj) => {
        if (!obj.isMesh) return;

        const nodeDef = gltf.parser.json.nodes?.[obj.userData?.gltfIndex ?? -1];
        if (!nodeDef || !nodeDef.extensions || !nodeDef.extensions.KHR_materials_variants) return;

        mappingsByMesh.set(obj, nodeDef.extensions.KHR_materials_variants.mappings || []);
      });

      return { variants: state.variantNames, mappingsByMesh };
    }

    function buildNodeIndexMap(root, parserJson) {
      const sceneNodes = [];
      root.traverse((obj) => {
        sceneNodes.push(obj);
      });

      const rootNodes = [];
      root.traverse((obj) => {
        rootNodes.push(obj);
      });

      let idx = 0;
      root.traverse((obj) => {
        obj.userData.gltfIndex = idx++;
      });

      if (parserJson && Array.isArray(parserJson.nodes)) {
        const named = [];
        root.traverse((obj) => named.push(obj));

        for (let i = 0; i < parserJson.nodes.length && i < named.length; i++) {
          named[i].userData.gltfIndex = i;
        }
      }
    }

    function extractVariantMappings(gltf) {
      const parserJson = gltf.parser.json;
      const variantExt = parserJson.extensions?.KHR_materials_variants;
      const variants = variantExt?.variants || [];
      state.variantNames = variants.map((v, i) => sanitizeVariantName(v.name, i));

      const partList = [];

      gltf.scene.traverse((obj) => {
        if (!obj.isMesh) return;

        const nodeIndex = obj.userData.gltfIndex;
        const nodeDef = parserJson.nodes?.[nodeIndex];

        let mappings = [];
        if (nodeDef?.extensions?.KHR_materials_variants?.mappings) {
          mappings = nodeDef.extensions.KHR_materials_variants.mappings;
        } else if (obj.userData?.variants) {
          mappings = obj.userData.variants;
        }

        const defaultMaterial = obj.material;
        if (Array.isArray(defaultMaterial)) {
          defaultMaterial.forEach((m) => {
            if (m && m.color && !m.userData.__baseUntintedColor) {
              m.userData.__baseUntintedColor = m.color.clone();
            }
          });
        } else if (defaultMaterial && defaultMaterial.color && !defaultMaterial.userData.__baseUntintedColor) {
          defaultMaterial.userData.__baseUntintedColor = defaultMaterial.color.clone();
        }

        partList.push({
          mesh: obj,
          nodeIndex,
          mappings,
          defaultMaterial,
          currentBaseMaterial: defaultMaterial,
          originalPosition: obj.position.clone(),
          worldCenter: new THREE.Vector3(),
          explodeDirection: new THREE.Vector3(),
          ownedMaterials: new Set()
        });
      });

      state.parts = partList;
      state.partCount = partList.length;
    }

    async function resolveMaterialByIndex(index) {
      return await new Promise((resolve, reject) => {
        try {
          gltfLoader.parser.getDependency('material', index).then(resolve).catch(reject);
        } catch (e) {
          reject(e);
        }
      });
    }

    async function applyVariantByIndex(index) {
      if (!state.modelLoaded) return;
      state.activeVariantIndex = index;
      state.currentVariant = index >= 0 ? state.variantNames[index] : '默认';

      for (const part of state.parts) {
        let baseMaterial = part.defaultMaterial;

        const mappings = part.mappings || [];
        let chosenMapping = null;
        for (const mapping of mappings) {
          if (Array.isArray(mapping.variants) && mapping.variants.includes(index)) {
            chosenMapping = mapping;
            break;
          }
        }

        if (chosenMapping && typeof chosenMapping.material === 'number') {
          try {
            baseMaterial = await gltfLoader.parser.getDependency('material', chosenMapping.material);
          } catch (e) {
            baseMaterial = part.defaultMaterial;
          }
        }

        if (Array.isArray(baseMaterial)) {
          baseMaterial.forEach((m) => {
            if (m && m.color && !m.userData.__baseUntintedColor) {
              m.userData.__baseUntintedColor = m.color.clone();
            }
          });
        } else if (baseMaterial && baseMaterial.color && !baseMaterial.userData.__baseUntintedColor) {
          baseMaterial.userData.__baseUntintedColor = baseMaterial.color.clone();
        }

        part.currentBaseMaterial = baseMaterial;

        const tintedMaterial = Array.isArray(baseMaterial)
          ? baseMaterial.map((m) => {
              const cloned = m.clone();
              if (cloned.color) {
                const base = m.userData.__baseUntintedColor
                  ? m.userData.__baseUntintedColor.clone()
                  : m.color.clone();
                cloned.userData.__baseUntintedColor = base.clone();
                cloned.color.copy(base).multiply(new THREE.Color(state.colorHex));
              }
              return cloned;
            })
          : cloneMaterialWithTint(baseMaterial, state.colorHex);

        const oldMat = part.mesh.material;
        part.mesh.material = tintedMaterial;
        registerOwnedMaterial(part, tintedMaterial);
        disposeIfOwned(oldMat, part);
      }

      updateVariantButtons();
      updateHUD();
    }

    function updateVariantButtons() {
      [...variantButtonsEl.querySelectorAll('.variant-btn')].forEach((btn, idx) => {
        btn.classList.toggle('active', idx === state.activeVariantIndex);
      });
    }

    function createVariantButtons() {
      variantButtonsEl.innerHTML = '';

      if (!state.variantNames.length) {
        const btn = document.createElement('button');
        btn.className = 'variant-btn active';
        btn.textContent = '默认';
        btn.addEventListener('click', () => {
          state.activeVariantIndex = -1;
          state.currentVariant = '默认';
          state.parts.forEach((part) => {
            part.currentBaseMaterial = part.defaultMaterial;
          });
          applyTintToCurrentMaterials();
          updateVariantButtons();
          updateHUD();
        });
        variantButtonsEl.appendChild(btn);
        return;
      }

      state.variantNames.forEach((name, index) => {
        const btn = document.createElement('button');
        btn.className = 'variant-btn';
        btn.textContent = name;
        btn.addEventListener('click', async () => {
          await applyVariantByIndex(index);
        });
        variantButtonsEl.appendChild(btn);
      });
    }

    function computeExplodeDirections() {
      tempBox.setFromObject(shoeRoot);
      tempBox.getCenter(modelCenter);

      state.parts.forEach((part) => {
        tempBox.setFromObject(part.mesh);
        tempBox.getCenter(part.worldCenter);

        part.explodeDirection.copy(part.worldCenter).sub(modelCenter);
        if (part.explodeDirection.lengthSq() < 1e-6) {
          part.explodeDirection.set(
            (Math.random() - 0.5) * 0.2,
            (Math.random() - 0.5) * 0.2,
            (Math.random() - 0.5) * 0.2 + 1.0
          );
        }
        part.explodeDirection.normalize();
      });
    }

    function updateExplode(distance) {
      state.explodeDistance = Number(distance);
      state.parts.forEach((part) => {
        part.mesh.position.copy(part.originalPosition).addScaledVector(part.explodeDirection, state.explodeDistance);
      });
      explodeSliderEl.value = String(state.explodeDistance);
      explodeValueEl.textContent = state.explodeDistance.toFixed(1);
      updateHUD();
    }

    function updateHUD() {
      currentVariantEl.textContent = state.currentVariant;
      currentColorEl.textContent = state.colorHex;
      explodeStateEl.textContent = state.explodeDistance.toFixed(1);
      colorBadgeEl.textContent = state.colorHex;
    }

    function fitModel(root) {
      tempBox.setFromObject(root);
      const size = tempBox.getSize(new THREE.Vector3());
      const center = tempBox.getCenter(new THREE.Vector3());

      root.position.sub(center);

      const maxAxis = Math.max(size.x, size.y, size.z) || 1;
      const scale = 1.8 / maxAxis;
      root.scale.setScalar(scale);

      tempBox.setFromObject(root);
      const postSize = tempBox.getSize(new THREE.Vector3());
      root.position.y -= tempBox.min.y + postSize.y * 0.08;

      tempBox.setFromObject(root);
      const finalCenter = tempBox.getCenter(new THREE.Vector3());
      controls.target.copy(finalCenter);
      camera.position.set(finalCenter.x + 1.8, finalCenter.y + 1.0, finalCenter.z + 2.3);
      controls.update();
    }

    let gltfLoader = new GLTFLoader();

    async function loadModel() {
      try {
        const gltf = await gltfLoader.loadAsync('assets/MaterialsVariantsShoe.glb');

        buildNodeIndexMap(gltf.scene, gltfLoader.parser?.json || gltf.parser?.json);
        shoeRoot.add(gltf.scene);

        gltf.scene.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              if (Array.isArray(obj.material)) {
                obj.material.forEach((m) => {
                  if (m && 'envMapIntensity' in m) m.envMapIntensity = 1.0;
                  if (m && m.color && !m.userData.__baseUntintedColor) {
                    m.userData.__baseUntintedColor = m.color.clone();
                  }
                });
              } else {
                if ('envMapIntensity' in obj.material) obj.material.envMapIntensity = 1.0;
                if (obj.material.color && !obj.material.userData.__baseUntintedColor) {
                  obj.material.userData.__baseUntintedColor = obj.material.color.clone();
                }
              }
            }
          }
        });

        fitModel(shoeRoot);
        extractVariantMappings(gltf);
        createVariantButtons();
        computeExplodeDirections();

        state.modelLoaded = true;
        state.currentVariant = state.variantNames[0] || '默认';

        if (state.variantNames.length > 0) {
          await applyVariantByIndex(0);
        } else {
          state.parts.forEach((part) => {
            part.currentBaseMaterial = part.defaultMaterial;
          });
          applyTintToCurrentMaterials();
        }

        updateExplode(0);
        updateHUD();
        loadingEl.style.display = 'none';
      } catch (error) {
        console.error(error);
        loadingEl.textContent = '模型加载失败，请检查 assets/MaterialsVariantsShoe.glb';
      }
    }

    colorPickerEl.addEventListener('input', () => {
      state.colorHex = colorPickerEl.value.toLowerCase();
      applyTintToCurrentMaterials();
      updateHUD();
    });

    explodeSliderEl.addEventListener('input', () => {
      updateExplode(parseFloat(explodeSliderEl.value));
    });

    explodeBtnEl.addEventListener('click', () => {
      const current = parseFloat(explodeSliderEl.value);
      if (current > 0) {
        updateExplode(0);
      } else {
        updateExplode(1.2);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      floor.material.opacity = 0.15 + Math.sin(t * 0.6) * 0.015;
      controls.update();
      renderer.render(scene, camera);

      window.__3D_STATE__ = {
        modelLoaded: state.modelLoaded,
        currentVariant: state.currentVariant,
        colorHex: state.colorHex,
        explodeDistance: state.explodeDistance,
        partCount: state.partCount
      };
    }

    loadModel();
    animate();
  </script>
</body>
</html>
