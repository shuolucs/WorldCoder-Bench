<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Archery Target Practice</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#crosshair {
    position: fixed;
    pointer-events: none;
    color: red;
    font-size: 30px;
    font-weight: bold;
    line-height: 30px;
    width: 30px;
    height: 30px;
    text-align: center;
    transform: translate(-50%, -50%);
    z-index: 100;
    user-select: none;
    text-shadow: 0 0 3px rgba(0,0,0,0.5);
}

#hud {
    position: fixed;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 18px;
    z-index: 50;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}
#hud div { margin-bottom: 6px; }

#windDisplay {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 20px;
    z-index: 50;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 8px;
}

#resetBtn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    z-index: 50;
    transition: all 0.2s;
}
#resetBtn:hover { background: linear-gradient(135deg, #c0392b, #a93226); transform: translateX(-50%) scale(1.05); }

#debugOverlay {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 300px;
    background: rgba(0, 0, 0, 0.8);
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 15px;
    border-radius: 8px;
    z-index: 50;
    display: none;
    border: 1px solid #0f0;
}
#debugOverlay h3 {
    color: #0f0;
    margin-bottom: 10px;
    border-bottom: 1px solid #0f0;
    padding-bottom: 5px;
}
#debugOverlay div { margin-bottom: 4px; }

#hitPopup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: gold;
    text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
}

#instructions {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    z-index: 50;
    text-align: center;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}
</style>
</head>
<body>

<div id="crosshair">+</div>

<div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="arrowDisplay">Arrows: 5/5</div>
    <div id="bestShotDisplay">Best Shot: 0 pts</div>
</div>

<div id="windDisplay">Wind: 0.0 →</div>

<div id="debugOverlay">
    <h3>⚙ Physics Debug [D]</h3>
    <div id="dbgVelocity">Velocity: --</div>
    <div id="dbgPosition">Position: --</div>
    <div id="dbgGravity">Gravity/frame: --</div>
    <div id="dbgAngle">Trajectory angle: --</div>
    <div id="dbgFlightTime">Flight time: --</div>
    <div id="dbgHitDist">Last hit dist: --</div>
    <div id="dbgWind">Wind force: --</div>
    <div id="dbgState">State: Idle</div>
</div>

<div id="hitPopup"></div>

<div id="instructions">SPACE to shoot | Move mouse to aim | D for debug | R to reset</div>

<button id="resetBtn">Reset Round</button>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    arrowsRemaining: 5,
    score: 0,
    bestShot: 0,
    arrowInFlight: false,
    currentArrowPos: null,
    currentArrowVel: null,
    lastHitDistance: null,
    lastHitScore: 0,
    debugVisible: false,
    windX: 0,
    totalArrowsFired: 0,
    modelLoaded: false,
    roundNumber: 1
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x87CEEB);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Camera
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 8);
camera.lookAt(0, 2, -20);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Target stand
const standGeo = new THREE.BoxGeometry(0.2, 3, 0.2);
const standMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const standLeft = new THREE.Mesh(standGeo, standMat);
standLeft.position.set(-2.2, 1.5, -15);
standLeft.castShadow = true;
scene.add(standLeft);
const standRight = new THREE.Mesh(standGeo, standMat);
standRight.position.set(2.2, 1.5, -15);
standRight.castShadow = true;
scene.add(standRight);

// Target backing
const backingGeo = new THREE.BoxGeometry(5, 5, 0.3);
const backingMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });
const backing = new THREE.Mesh(backingGeo, backingMat);
backing.position.set(0, 2.5, -15.2);
backing.castShadow = true;
backing.receiveShadow = true;
scene.add(backing);

// Target rings
const targetCenter = new THREE.Vector3(0, 2.5, -15);
const rings = [
    { radius: 2.0, color: 0xFFFFFF, points: 1 },
    { radius: 1.6, color: 0x222222, points: 3 },
    { radius: 1.2, color: 0x0066FF, points: 5 },
    { radius: 0.8, color: 0xFF0000, points: 7 },
    { radius: 0.4, color: 0xFFD700, points: 10 }
];

const targetGroup = new THREE.Group();
targetGroup.position.copy(targetCenter);

rings.forEach((ring, i) => {
    const geo = new THREE.CylinderGeometry(ring.radius, ring.radius, 0.05, 64);
    const mat = new THREE.MeshStandardMaterial({ color: ring.color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = Math.PI / 2;
    mesh.position.z = 0.03 * (i + 1);
    mesh.receiveShadow = true;
    targetGroup.add(mesh);
});
scene.add(targetGroup);

// Load archer model
const loader = new GLTFLoader();
let archerModel = null;

// Create a simple archer placeholder
function createPlaceholderArcher() {
    const group = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.2, 0.25, 0.8, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.2;
    body.castShadow = true;
    group.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.18, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xf5cba7 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 1.78;
    head.castShadow = true;
    group.add(head);
    
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.8, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e });
    const legL = new THREE.Mesh(legGeo, legMat);
    legL.position.set(-0.12, 0.4, 0);
    legL.castShadow = true;
    group.add(legL);
    const legR = new THREE.Mesh(legGeo, legMat);
    legR.position.set(0.12, 0.4, 0);
    legR.castShadow = true;
    group.add(legR);
    
    // Arms
    const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 8);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
    const armL = new THREE.Mesh(armGeo, armMat);
    armL.position.set(-0.35, 1.3, -0.1);
    armL.rotation.x = -0.3;
    armL.rotation.z = 0.5;
    armL.castShadow = true;
    group.add(armL);
    const armR = new THREE.Mesh(armGeo, armMat);
    armR.position.set(0.35, 1.3, -0.1);
    armR.rotation.x = -0.3;
    armR.rotation.z = -0.5;
    armR.castShadow = true;
    group.add(armR);
    
    // Bow
    const bowCurve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, -0.5, 0),
        new THREE.Vector3(0, -0.25, -0.3),
        new THREE.Vector3(0, 0, -0.4),
        new THREE.Vector3(0, 0.25, -0.3),
        new THREE.Vector3(0, 0.5, 0)
    ]);
    const bowGeo = new THREE.TubeGeometry(bowCurve, 20, 0.02, 8, false);
    const bowMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const bow = new THREE.Mesh(bowGeo, bowMat);
    bow.position.set(-0.5, 1.4, -0.3);
    bow.castShadow = true;
    group.add(bow);
    
    // Bowstring
    const stringGeo = new THREE.CylinderGeometry(0.005, 0.005, 1.0, 4);
    const stringMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
    const bowstring = new THREE.Mesh(stringGeo, stringMat);
    bowstring.position.set(-0.5, 1.4, -0.0);
    group.add(bowstring);
    
    group.position.set(0, 0, 6);
    group.rotation.y = Math.PI;
    return group;
}

// Try loading the model, fall back to placeholder
try {
    loader.load(
        'Xbot.glb',
        (gltf) => {
            archerModel = gltf.scene;
            archerModel.position.set(0, 0, 6);
            archerModel.rotation.y = Math.PI;
            
            const box = new THREE.Box3().setFromObject(archerModel);
            const height = box.max.y - box.min.y;
            const targetHeight = 1.5;
            const scaleFactor = targetHeight / height;
            archerModel.scale.setScalar(scaleFactor);
            
            archerModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(archerModel);
            state.modelLoaded = true;
        },
        undefined,
        (error) => {
            console.log('Could not load Xbot.glb, using placeholder archer');
            archerModel = createPlaceholderArcher();
            scene.add(archerModel);
            state.modelLoaded = true;
        }
    );
} catch(e) {
    archerModel = createPlaceholderArcher();
    scene.add(archerModel);
    state.modelLoaded = true;
}

// Fallback timer - if model hasn't loaded in 3 seconds, use placeholder
setTimeout(() => {
    if (!state.modelLoaded) {
        archerModel = createPlaceholderArcher();
        scene.add(archerModel);
        state.modelLoaded = true;
    }
}, 3000);

// Arrow creation
const arrowMeshes = [];
let activeArrow = null;
let arrowVelocity = new THREE.Vector3();
let arrowFlightTime = 0;

function createArrow() {
    const group = new THREE.Group();
    
    // Shaft
    const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
    const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const shaft = new THREE.Mesh(shaftGeo, shaftMat);
    shaft.castShadow = true;
    group.add(shaft);
    
    // Tip
    const tipGeo = new THREE.ConeGeometry(0.06, 0.2, 8);
    const tipMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6 });
    const tip = new THREE.Mesh(tipGeo, tipMat);
    tip.position.y = 0.85;
    tip.castShadow = true;
    group.add(tip);
    
    // Fletching
    const fletchGeo = new THREE.PlaneGeometry(0.1, 0.2);
    const fletchMat = new THREE.MeshStandardMaterial({ color: 0xff4444, side: THREE.DoubleSide });
    for (let i = 0; i < 3; i++) {
        const fletch = new THREE.Mesh(fletchGeo, fletchMat);
        fletch.position.y = -0.6;
        fletch.rotation.y = (i * Math.PI * 2) / 3;
        group.add(fletch);
    }
    
    return group;
}

// Mouse tracking
let mouseX = 0, mouseY = 0;
let mouseNormX = 0, mouseNormY = 0;

document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    mouseNormX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseNormY = -(e.clientY / window.innerHeight - 0.5) * 2;
    
    const crosshair = document.getElementById('crosshair');
    crosshair.style.left = e.clientX + 'px';
    crosshair.style.top = e.clientY + 'px';
});

// Wind system
function generateWind() {
    state.windX = (Math.random() * 4 - 2);
    state.windX = Math.round(state.windX * 10) / 10;
    updateWindDisplay();
}

function updateWindDisplay() {
    const windEl = document.getElementById('windDisplay');
    const absWind = Math.abs(state.windX).toFixed(1);
    const dir = state.windX >= 0 ? '→' : '←';
    const strength = Math.abs(state.windX);
    let label = 'Calm';
    if (strength > 1.5) label = 'Strong';
    else if (strength > 0.8) label = 'Moderate';
    else if (strength > 0.3) label = 'Light';
    windEl.textContent = `Wind: ${absWind} ${dir} (${label})`;
}

generateWind();

// Shooting
function shootArrow() {
    if (state.arrowInFlight || state.arrowsRemaining <= 0) return;
    
    const arrow = createArrow();
    const spawnPos = new THREE.Vector3(0, 2.0, 5.5);
    arrow.position.copy(spawnPos);
    
    // Aim direction based on mouse
    const aimX = mouseNormX * 3.0;
    const aimY = mouseNormY * 2.0 + 0.5; // slight upward bias for arc
    
    const direction = new THREE.Vector3(aimX, aimY, -20).normalize();
    const speed = 30;
    arrowVelocity.copy(direction).multiplyScalar(speed);
    
    // Orient arrow along velocity
    const lookTarget = spawnPos.clone().add(direction);
    arrow.lookAt(lookTarget);
    arrow.rotateX(Math.PI / 2);
    
    scene.add(arrow);
    activeArrow = arrow;
    arrowMeshes.push(arrow);
    arrowFlightTime = 0;
    
    state.arrowInFlight = true;
    state.arrowsRemaining--;
    state.totalArrowsFired++;
    state.currentArrowPos = { x: spawnPos.x, y: spawnPos.y, z: spawnPos.z };
    state.currentArrowVel = { x: arrowVelocity.x, y: arrowVelocity.y, z: arrowVelocity.z };
    
    updateHUD();
}

function checkHit(arrowPos) {
    const dx = arrowPos.x - targetCenter.x;
    const dy = arrowPos.y - targetCenter.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    state.lastHitDistance = Math.round(dist * 100) / 100;
    
    let points = 0;
    if (dist <= 0.4) points = 10;
    else if (dist <= 0.8) points = 7;
    else if (dist <= 1.2) points = 5;
    else if (dist <= 1.6) points = 3;
    else if (dist <= 2.0) points = 1;
    
    state.lastHitScore = points;
    state.score += points;
    if (points > state.bestShot) state.bestShot = points;
    
    // Show hit popup
    showHitPopup(points, dist);
    updateHUD();
}

function showHitPopup(points, dist) {
    const popup = document.getElementById('hitPopup');
    if (points === 10) {
        popup.textContent = '🎯 BULLSEYE! +10';
        popup.style.color = 'gold';
    } else if (points > 0) {
        popup.textContent = `+${points} pts`;
        popup.style.color = points >= 7 ? '#ff4444' : points >= 5 ? '#4488ff' : 'white';
    } else {
        popup.textContent = 'MISS!';
        popup.style.color = '#ff6666';
    }
    popup.style.opacity = '1';
    setTimeout(() => { popup.style.opacity = '0'; }, 1200);
}

// HUD update
function updateHUD() {
    document.getElementById('scoreDisplay').textContent = `Score: ${state.score}`;
    document.getElementById('arrowDisplay').textContent = `Arrows: ${state.arrowsRemaining}/5`;
    document.getElementById('bestShotDisplay').textContent = `Best Shot: ${state.bestShot} pts`;
}

// Debug overlay update
function updateDebug(dt) {
    if (!state.debugVisible) return;
    
    const dbg = document.getElementById('debugOverlay');
    
    if (state.arrowInFlight && activeArrow) {
        const v = arrowVelocity;
        const p = activeArrow.position;
        const speed = v.length();
        const angle = Math.atan2(v.y, -v.z) * (180 / Math.PI);
        const gravPerFrame = (9.81 * dt).toFixed(4);
        
        document.getElementById('dbgVelocity').textContent = `Velocity: (${v.x.toFixed(2)}, ${v.y.toFixed(2)}, ${v.z.toFixed(2)}) |${speed.toFixed(2)}|`;
        document.getElementById('dbgPosition').textContent = `Position: (${p.x.toFixed(2)}, ${p.y.toFixed(2)}, ${p.z.toFixed(2)})`;
        document.getElementById('dbgGravity').textContent = `Gravity/frame: -${gravPerFrame} m/s`;
        document.getElementById('dbgAngle').textContent = `Trajectory angle: ${angle.toFixed(1)}°`;
        document.getElementById('dbgFlightTime').textContent = `Flight time: ${arrowFlightTime.toFixed(3)}s`;
        document.getElementById('dbgState').textContent = `State: IN FLIGHT`;
    } else {
        document.getElementById('dbgVelocity').textContent = `Velocity: --`;
        document.getElementById('dbgPosition').textContent = `Position: --`;
        document.getElementById('dbgGravity').textContent = `Gravity/frame: --`;
        document.getElementById('dbgAngle').textContent = `Trajectory angle: --`;
        document.getElementById('dbgFlightTime').textContent = `Flight time: --`;
        document.getElementById('dbgState').textContent = `State: Idle`;
    }
    
    document.getElementById('dbgHitDist').textContent = `Last hit dist: ${state.lastHitDistance !== null ? state.lastHitDistance.toFixed(3) : '--'}`;
    document.getElementById('dbgWind').textContent = `Wind force: X=${state.windX.toFixed(2)}`;
}

// Reset
function resetRound() {
    state.arrowsRemaining = 5;
    state.score = 0;
    state.bestShot = 0;
    state.arrowInFlight = false;
    state.currentArrowPos = null;
    state.currentArrowVel = null;
    state.lastHitDistance = null;
    state.lastHitScore = 0;
    state.roundNumber++;
    
    activeArrow = null;
    arrowVelocity.set(0, 0, 0);
    arrowFlightTime = 0;
    
    // Remove all arrow meshes
    arrowMeshes.forEach(a => {
        scene.remove(a);
        a.traverse(child => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
        });
    });
    arrowMeshes.length = 0;
    
    generateWind();
    updateHUD();
}

// Event listeners
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        shootArrow();
    }
    if (e.code === 'KeyD') {
        state.debugVisible = !state.debugVisible;
        document.getElementById('debugOverlay').style.display = state.debugVisible ? 'block' : 'none';
    }
    if (e.code === 'KeyR') {
        resetRound();
    }
});

document.getElementById('resetBtn').addEventListener('click', resetRound);

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();
const GRAVITY = 9.81;

function animate() {
    requestAnimationFrame(animate);
    
    const dt = Math.min(clock.getDelta(), 0.05); // clamp delta time
    
    // Update arrow physics
    if (state.arrowInFlight && activeArrow) {
        // Apply gravity
        arrowVelocity.y -= GRAVITY * dt;
        
        // Apply wind
        arrowVelocity.x += state.windX * dt;
        
        // Update position
        activeArrow.position.x += arrowVelocity.x * dt;
        activeArrow.position.y += arrowVelocity.y * dt;
        activeArrow.position.z += arrowVelocity.z * dt;
        
        arrowFlightTime += dt;
        
        // Orient arrow along velocity
        if (arrowVelocity.lengthSq() > 0.01) {
            const lookAhead = activeArrow.position.clone().add(arrowVelocity.clone().normalize());
            const tempGroup = activeArrow;
            tempGroup.lookAt(lookAhead);
            tempGroup.rotateX(Math.PI / 2);
        }
        
        // Update state
        state.currentArrowPos = {
            x: isNaN(activeArrow.position.x) ? 0 : activeArrow.position.x,
            y: isNaN(activeArrow.position.y) ? 0 : activeArrow.position.y,
            z: isNaN(activeArrow.position.z) ? 0 : activeArrow.position.z
        };
        state.currentArrowVel = {
            x: isNaN(arrowVelocity.x) ? 0 : arrowVelocity.x,
            y: isNaN(arrowVelocity.y) ? 0 : arrowVelocity.y,
            z: isNaN(arrowVelocity.z) ? 0 : arrowVelocity.z
        };
        
        // Check if arrow reached target plane
        if (activeArrow.position.z <= -14.8) {
            // Clamp to target plane
            activeArrow.position.z = -14.8;
            checkHit(activeArrow.position);
            
            state.arrowInFlight = false;
            state.currentArrowPos = null;
            state.currentArrowVel = null;
            activeArrow = null;
        }
        
        // Check if arrow hit ground
        if (activeArrow && activeArrow.position.y <= 0.05) {
            activeArrow.position.y = 0.05;
            state.arrowInFlight = false;
            state.lastHitScore = 0;
            state.lastHitDistance = 999;
            state.currentArrowPos = null;
            state.currentArrowVel = null;
            showHitPopup(0, 999);
            activeArrow = null;
            updateHUD();
        }
        
        // Check if arrow went too far or out of bounds
        if (activeArrow && (activeArrow.position.z < -25 || Math.abs(activeArrow.position.x) > 20 || activeArrow.position.y > 30)) {
            state.arrowInFlight = false;
            state.lastHitScore = 0;
            state.lastHitDistance = 999;
            state.currentArrowPos = null;
            state.currentArrowVel = null;
            showHitPopup(0, 999);
            scene.remove(activeArrow);
            const idx = arrowMeshes.indexOf(activeArrow);
            if (idx > -1) arrowMeshes.splice(idx, 1);
            activeArrow = null;
            updateHUD();
        }
    }
    
    updateDebug(dt);
    
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
