<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Archery Target Practice</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #debugOverlay {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            display: none;
            box-sizing: border-box;
        }
        #debugOverlay h3 {
            margin-top: 0;
            margin-bottom: 10px;
            color: #fff;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        #crosshair {
            position: absolute;
            color: red;
            font-size: 30px;
            font-weight: bold;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
            text-shadow: 1px 1px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
        }
        #resetBtn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: 2px solid #fff;
            border-radius: 5px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #resetBtn:hover {
            background-color: #45a049;
        }
        #instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-shadow: 1px 1px 2px black;
            text-align: center;
            pointer-events: none;
            font-size: 16px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="crosshair">+</div>
    
    <div id="hud">
        <div id="scoreDisplay">Score: 0</div>
        <div id="arrowDisplay">Arrows: 5/5</div>
        <div id="bestShotDisplay">Best Shot: 0 pts</div>
        <div id="windDisplay">Wind: 0.0 &rarr;</div>
    </div>

    <div id="debugOverlay"></div>

    <div id="instructions">Aim with Mouse | Press SPACE to Shoot | Press 'D' for Debug</div>
    <button id="resetBtn">Reset Round</button>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            arrowsRemaining: 5,
            score: 0,
            bestShot: 0,
            arrowInFlight: false,
            currentArrowPos: null,
            currentArrowVel: null,
            lastHitDistance: null,
            lastHitScore: 0,
            debugVisible: false,
            windX: 0,
            totalArrowsFired: 0,
            modelLoaded: false,
            roundNumber: 1
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x87CEEB); // Sky blue
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 2, -20);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Target Creation ---
        const targetGroup = new THREE.Group();
        targetGroup.position.set(0, 2.5, -15);
        
        const rings = [
            { radius: 2.0, color: 0xFFFFFF, points: 1 },
            { radius: 1.6, color: 0x222222, points: 3 },
            { radius: 1.2, color: 0x0066FF, points: 5 },
            { radius: 0.8, color: 0xFF0000, points: 7 },
            { radius: 0.4, color: 0xFFD700, points: 10 }
        ];

        rings.forEach((ring, index) => {
            const geo = new THREE.CylinderGeometry(ring.radius, ring.radius, 0.05, 64);
            const mat = new THREE.MeshStandardMaterial({ color: ring.color, roughness: 0.5 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2;
            // Stack slightly in Z to prevent z-fighting. Outermost is furthest back.
            mesh.position.z = index * 0.01; 
            mesh.receiveShadow = true;
            mesh.castShadow = true;
            targetGroup.add(mesh);
        });
        scene.add(targetGroup);

        // Target collision plane Z coordinate (front-most ring)
        const TARGET_Z = -15 + (rings.length - 1) * 0.01;

        // --- Archer Character ---
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Xbot.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(0, 0, 6);
            model.rotation.y = Math.PI; // Face -Z
            // Scale to approx 1.5 units tall
            model.scale.set(0.85, 0.85, 0.85);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load Xbot model, using fallback.", error);
            // Fallback simple character
            const geo = new THREE.CylinderGeometry(0.3, 0.3, 1.5);
            const mat = new THREE.MeshStandardMaterial({color: 0x555555});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, 0.75, 6);
            mesh.castShadow = true;
            scene.add(mesh);
            window.__3D_STATE__.modelLoaded = true;
        });

        // --- Arrow Mechanics ---
        let arrows = [];
        let currentArrow = null;

        function createArrowMesh() {
            const group = new THREE.Group();
            
            // Shaft
            const shaftGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.5, 8);
            const shaftMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const shaft = new THREE.Mesh(shaftGeo, shaftMat);
            shaft.rotation.x = Math.PI / 2;
            shaft.position.z = 0.75; // Center of shaft
            shaft.castShadow = true;
            
            // Tip
            const tipGeo = new THREE.ConeGeometry(0.05, 0.2, 8);
            const tipMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const tip = new THREE.Mesh(tipGeo, tipMat);
            tip.rotation.x = Math.PI / 2;
            tip.position.z = 1.6; // End of shaft + half tip height
            tip.castShadow = true;

            group.add(shaft);
            group.add(tip);
            
            // Adjust group so origin is at the tip, pointing towards +Z locally
            // When we use lookAt, local +Z points to target.
            shaft.position.z = -0.75;
            tip.position.z = 0;
            
            return group;
        }

        class Arrow {
            constructor(pos, vel) {
                this.mesh = createArrowMesh();
                this.mesh.position.copy(pos);
                this.velocity = vel;
                this.active = true;
                this.timeOfFlight = 0;
                
                // Initial rotation
                const lookTarget = this.mesh.position.clone().add(this.velocity);
                this.mesh.lookAt(lookTarget);
                
                scene.add(this.mesh);
            }

            update(dt) {
                if (!this.active) return;

                this.timeOfFlight += dt;
                
                // Apply physics
                this.velocity.y -= 9.81 * dt; // Gravity
                this.velocity.x += window.__3D_STATE__.windX * dt; // Wind acceleration

                const nextPos = this.mesh.position.clone().add(this.velocity.clone().multiplyScalar(dt));

                // Check collision with target plane
                if (this.mesh.position.z > TARGET_Z && nextPos.z <= TARGET_Z) {
                    // Interpolate exact hit position
                    const t = (this.mesh.position.z - TARGET_Z) / (this.mesh.position.z - nextPos.z);
                    const hitPos = new THREE.Vector3().lerpVectors(this.mesh.position, nextPos, t);
                    
                    this.mesh.position.copy(hitPos);
                    this.active = false;
                    this.handleHit(hitPos);
                } 
                // Check collision with ground
                else if (nextPos.y <= 0) {
                    const t = (this.mesh.position.y - 0) / (this.mesh.position.y - nextPos.y);
                    const hitPos = new THREE.Vector3().lerpVectors(this.mesh.position, nextPos, t);
                    this.mesh.position.copy(hitPos);
                    this.active = false;
                    window.__3D_STATE__.arrowInFlight = false;
                    window.__3D_STATE__.lastHitDistance = null;
                    window.__3D_STATE__.lastHitScore = 0;
                }
                else {
                    this.mesh.position.copy(nextPos);
                    // Update rotation to follow trajectory
                    const lookTarget = this.mesh.position.clone().add(this.velocity);
                    this.mesh.lookAt(lookTarget);
                }
            }

            handleHit(pos) {
                // Calculate distance from target center (0, 2.5) in XY plane
                const dx = pos.x - 0;
                const dy = pos.y - 2.5;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                window.__3D_STATE__.lastHitDistance = dist;
                let pts = 0;

                if (dist <= 0.4) pts = 10;
                else if (dist <= 0.8) pts = 7;
                else if (dist <= 1.2) pts = 5;
                else if (dist <= 1.6) pts = 3;
                else if (dist <= 2.0) pts = 1;

                window.__3D_STATE__.lastHitScore = pts;
                window.__3D_STATE__.score += pts;
                if (pts > window.__3D_STATE__.bestShot) {
                    window.__3D_STATE__.bestShot = pts;
                }
                
                window.__3D_STATE__.arrowInFlight = false;
                updateHUD();
            }
        }

        // --- Input & Aiming ---
        let mouseX = 0;
        let mouseY = 0;
        const crosshair = document.getElementById('crosshair');

        document.addEventListener('mousemove', (e) => {
            // Normalized device coordinates [-1, 1]
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            
            // Update crosshair DOM position
            crosshair.style.left = e.clientX + 'px';
            crosshair.style.top = e.clientY + 'px';
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); // Prevent scrolling
                if (window.__3D_STATE__.arrowsRemaining > 0 && !window.__3D_STATE__.arrowInFlight) {
                    shootArrow();
                }
            }
            if (e.code === 'KeyD') {
                window.__3D_STATE__.debugVisible = !window.__3D_STATE__.debugVisible;
                document.getElementById('debugOverlay').style.display = window.__3D_STATE__.debugVisible ? 'block' : 'none';
            }
        });

        function shootArrow() {
            window.__3D_STATE__.arrowsRemaining--;
            window.__3D_STATE__.totalArrowsFired++;
            window.__3D_STATE__.arrowInFlight = true;
            updateHUD();

            const spawnPos = new THREE.Vector3(0, 2.0, 5.5);
            
            // Map mouse to a point on the target plane for aiming
            // Target is at z=-15. Let's say aim area is 10x10 units.
            const aimX = mouseX * 5;
            const aimY = 2.5 + mouseY * 5;
            const aimPoint = new THREE.Vector3(aimX, aimY, TARGET_Z);

            const direction = new THREE.Vector3().subVectors(aimPoint, spawnPos).normalize();
            const initialSpeed = 30;
            const velocity = direction.multiplyScalar(initialSpeed);

            currentArrow = new Arrow(spawnPos, velocity);
            arrows.push(currentArrow);
        }

        // --- Wind System ---
        function setRandomWind() {
            // Wind X between -2 and 2
            window.__3D_STATE__.windX = (Math.random() * 4) - 2;
            updateHUD();
        }
        setRandomWind();

        // --- UI Updates ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const arrowDisplay = document.getElementById('arrowDisplay');
        const bestShotDisplay = document.getElementById('bestShotDisplay');
        const windDisplay = document.getElementById('windDisplay');
        const debugOverlay = document.getElementById('debugOverlay');

        function updateHUD() {
            scoreDisplay.innerText = `Score: ${window.__3D_STATE__.score}`;
            arrowDisplay.innerText = `Arrows: ${window.__3D_STATE__.arrowsRemaining}/5`;
            bestShotDisplay.innerText = `Best Shot: ${window.__3D_STATE__.bestShot} pts`;
            
            const w = window.__3D_STATE__.windX;
            const dir = w > 0 ? '&rarr;' : (w < 0 ? '&larr;' : '');
            windDisplay.innerHTML = `Wind: ${Math.abs(w).toFixed(1)} ${dir}`;
        }

        function updateDebug() {
            if (!window.__3D_STATE__.debugVisible) return;
            
            let html = `<h3>Physics Debug</h3>`;
            
            if (currentArrow && currentArrow.active) {
                const v = currentArrow.velocity;
                const p = currentArrow.mesh.position;
                const speed = v.length();
                // Angle relative to horizontal plane
                const angle = Math.atan2(v.y, Math.sqrt(v.x*v.x + v.z*v.z)) * (180 / Math.PI);
                
                html += `State: In Flight<br>`;
                html += `Vel: x:${v.x.toFixed(2)} y:${v.y.toFixed(2)} z:${v.z.toFixed(2)}<br>`;
                html += `Pos: x:${p.x.toFixed(2)} y:${p.y.toFixed(2)} z:${p.z.toFixed(2)}<br>`;
                html += `Speed: ${speed.toFixed(2)} u/s<br>`;
                html += `Angle: ${angle.toFixed(1)}&deg;<br>`;
                html += `Flight Time: ${currentArrow.timeOfFlight.toFixed(3)}s<br>`;
            } else {
                html += `State: Idle / Landed<br>`;
                html += `Vel: N/A<br>`;
                html += `Pos: N/A<br>`;
            }
            
            html += `<br>Gravity: -9.81 m/s&sup2;<br>`;
            html += `Wind Force (X): ${window.__3D_STATE__.windX.toFixed(2)}<br>`;
            
            const dist = window.__3D_STATE__.lastHitDistance;
            html += `Last Hit Dist: ${dist !== null ? dist.toFixed(3) : 'N/A'}<br>`;
            html += `Last Hit Score: ${window.__3D_STATE__.lastHitScore}<br>`;
            
            debugOverlay.innerHTML = html;
        }

        // --- Reset Logic ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            window.__3D_STATE__.arrowsRemaining = 5;
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.bestShot = 0;
            window.__3D_STATE__.lastHitDistance = null;
            window.__3D_STATE__.lastHitScore = 0;
            window.__3D_STATE__.arrowInFlight = false;
            window.__3D_STATE__.roundNumber++;
            
            setRandomWind();

            // Remove arrow meshes
            arrows.forEach(a => scene.remove(a.mesh));
            arrows = [];
            currentArrow = null;

            updateHUD();
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            // Cap dt to prevent huge jumps if tab is inactive
            const dt = Math.min(clock.getDelta(), 0.1);

            if (currentArrow && currentArrow.active) {
                currentArrow.update(dt);
                
                // Sync state
                window.__3D_STATE__.currentArrowPos = {
                    x: currentArrow.mesh.position.x,
                    y: currentArrow.mesh.position.y,
                    z: currentArrow.mesh.position.z
                };
                window.__3D_STATE__.currentArrowVel = {
                    x: currentArrow.velocity.x,
                    y: currentArrow.velocity.y,
                    z: currentArrow.velocity.z
                };
            } else {
                window.__3D_STATE__.currentArrowPos = null;
                window.__3D_STATE__.currentArrowVel = null;
            }

            updateDebug();
            renderer.render(scene, camera);
        }

        updateHUD();
        animate();
    </script>
</body>
</html>
