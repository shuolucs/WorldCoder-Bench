<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferrari Ring Race</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute; top: 20px; left: 20px;
  background: rgba(0,0,0,0.75); color: #fff;
  padding: 15px 20px; border-radius: 10px;
  font-size: 16px; line-height: 1.8;
  border: 1px solid rgba(255,255,255,0.2);
  min-width: 220px;
  backdrop-filter: blur(5px);
}
#hud .label { color: #aaa; font-size: 13px; }
#hud .value { color: #fff; font-weight: bold; font-size: 18px; }
#hud .speed-val { color: #00ff88; font-size: 24px; }
#hud .lap-val { color: #ffcc00; }
#hud .pos-val { color: #ff6644; }

#checkpoint-msg {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 36px; font-weight: bold; color: #ffcc00;
  text-shadow: 0 0 20px rgba(255,204,0,0.8), 2px 2px 4px #000;
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}

#lap-msg {
  position: absolute; top: 40%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px; font-weight: bold; color: #00ff88;
  text-shadow: 0 0 20px rgba(0,255,136,0.8), 2px 2px 4px #000;
  pointer-events: none; opacity: 0;
  transition: opacity 0.3s;
}

#race-result {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.9); color: #fff;
  padding: 40px 60px; border-radius: 20px;
  text-align: center; display: none;
  border: 2px solid #ffcc00;
}
#race-result h1 { font-size: 48px; margin-bottom: 20px; }
#race-result .win { color: #00ff88; }
#race-result .lose { color: #ff4444; }
#race-result p { font-size: 20px; margin: 8px 0; color: #ccc; }
#race-result .time-val { color: #ffcc00; font-weight: bold; }
#race-result button {
  margin-top: 20px; padding: 12px 40px;
  font-size: 18px; background: #ffcc00; color: #000;
  border: none; border-radius: 8px; cursor: pointer;
  font-weight: bold;
}
#race-result button:hover { background: #ffdd44; }

#countdown {
  position: absolute; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 120px; font-weight: bold; color: #fff;
  text-shadow: 0 0 40px rgba(255,255,255,0.8);
  pointer-events: none; display: none;
}

#minimap {
  position: absolute; bottom: 20px; right: 20px;
  width: 160px; height: 160px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.3);
}
#minimap canvas { border-radius: 50%; }
</style>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  <div><span class="label">SPEED</span><br><span class="value speed-val" id="speed">0</span> <span class="label">km/h</span></div>
  <div style="margin-top:8px"><span class="label">LAP</span> <span class="value lap-val" id="lap">0/3</span></div>
  <div><span class="label">CHECKPOINTS</span> <span class="value" id="checkpoints">0/4</span></div>
  <div><span class="label">POSITION</span> <span class="value pos-val" id="position">--</span></div>
  <div style="margin-top:8px"><span class="label">LAP TIME</span> <span class="value" id="lapTime">0.0</span>s</div>
  <div><span class="label">TOTAL TIME</span> <span class="value" id="totalTime">0.0</span>s</div>
</div>

<div id="checkpoint-msg"></div>
<div id="lap-msg"></div>
<div id="countdown"></div>

<div id="race-result">
  <h1 id="result-title"></h1>
  <p>Your Time: <span class="time-val" id="result-player-time"></span></p>
  <p>AI Time: <span class="time-val" id="result-ai-time"></span></p>
  <p id="result-laps"></p>
  <button onclick="location.reload()">Race Again</button>
</div>

<div id="minimap"><canvas id="minimap-canvas" width="160" height="160"></canvas></div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ GLOBAL STATE ============
window.__3D_STATE__ = {
  modelLoaded: false,
  speed: 0,
  lap: 0,
  totalLaps: 3,
  checkpointsPassed: 0,
  totalCheckpoints: 4,
  position: 1,
  lapTime: 0,
  totalTime: 0,
  raceState: 'loading', // loading, countdown, racing, finished
  aiLap: 0,
  aiCheckpoints: 0,
  playerAngle: 0,
  aiAngle: 0
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 80, 200);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(50, 80, 30);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -80;
dirLight.shadow.camera.right = 80;
dirLight.shadow.camera.top = 80;
dirLight.shadow.camera.bottom = -80;
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 200;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556633, 0.4);
scene.add(hemiLight);

// ============ TRACK PARAMETERS ============
const TRACK_RADIUS = 40;
const TRACK_WIDTH = 8;
const TRACK_HALF_WIDTH = TRACK_WIDTH / 2;

// ============ HELPER: Get position on track ============
function getTrackPosition(angle, offset = 0) {
  const r = TRACK_RADIUS + offset;
  return new THREE.Vector3(
    Math.cos(angle) * r,
    0.01,
    Math.sin(angle) * r
  );
}

function getTrackTangent(angle) {
  return new THREE.Vector3(
    -Math.sin(angle),
    0,
    Math.cos(angle)
  ).normalize();
}

// ============ BUILD TRACK ============
function buildTrack() {
  // Main track surface - ring
  const trackShape = new THREE.Shape();
  const outerR = TRACK_RADIUS + TRACK_HALF_WIDTH;
  const innerR = TRACK_RADIUS - TRACK_HALF_WIDTH;
  
  // Outer circle
  trackShape.absarc(0, 0, outerR, 0, Math.PI * 2, false);
  // Inner circle (hole)
  const holePath = new THREE.Path();
  holePath.absarc(0, 0, innerR, 0, Math.PI * 2, true);
  trackShape.holes.push(holePath);
  
  const trackGeo = new THREE.ShapeGeometry(trackShape, 128);
  const trackMat = new THREE.MeshStandardMaterial({
    color: 0x333333,
    roughness: 0.9,
    metalness: 0.1
  });
  const trackMesh = new THREE.Mesh(trackGeo, trackMat);
  trackMesh.rotation.x = -Math.PI / 2;
  trackMesh.position.y = 0.01;
  trackMesh.receiveShadow = true;
  scene.add(trackMesh);

  // Track center line (dashed)
  const centerLinePoints = [];
  for (let i = 0; i <= 256; i++) {
    const a = (i / 256) * Math.PI * 2;
    centerLinePoints.push(new THREE.Vector3(Math.cos(a) * TRACK_RADIUS, 0.05, Math.sin(a) * TRACK_RADIUS));
  }
  const centerLineGeo = new THREE.BufferGeometry().setFromPoints(centerLinePoints);
  const centerLineMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 1, gapSize: 1 });
  const centerLine = new THREE.Line(centerLineGeo, centerLineMat);
  centerLine.computeLineDistances();
  scene.add(centerLine);

  // Curbs (red-white stripes) on both sides
  buildCurbs(outerR + 0.3, 0.6);
  buildCurbs(innerR - 0.3, 0.6);

  // Grass planes
  // Inner grass (circle)
  const innerGrassGeo = new THREE.CircleGeometry(innerR - 0.8, 64);
  const grassMat = new THREE.MeshStandardMaterial({ color: 0x3a7d2c, roughness: 1 });
  const innerGrass = new THREE.Mesh(innerGrassGeo, grassMat);
  innerGrass.rotation.x = -Math.PI / 2;
  innerGrass.position.y = 0;
  innerGrass.receiveShadow = true;
  scene.add(innerGrass);

  // Outer grass (large plane with hole)
  const outerGrassGeo = new THREE.PlaneGeometry(200, 200);
  const outerGrass = new THREE.Mesh(outerGrassGeo, grassMat.clone());
  outerGrass.rotation.x = -Math.PI / 2;
  outerGrass.position.y = -0.01;
  outerGrass.receiveShadow = true;
  scene.add(outerGrass);

  // Start/finish line
  buildStartLine();

  // Checkpoints
  buildCheckpoints();

  // Some decorations
  buildDecorations();
}

function buildCurbs(radius, width) {
  const segments = 128;
  const curbSegments = 32; // number of red-white pairs
  
  for (let i = 0; i < curbSegments * 2; i++) {
    const startAngle = (i / (curbSegments * 2)) * Math.PI * 2;
    const endAngle = ((i + 1) / (curbSegments * 2)) * Math.PI * 2;
    
    const shape = new THREE.Shape();
    const innerCurbR = radius - width / 2;
    const outerCurbR = radius + width / 2;
    
    const steps = 4;
    // Build arc segment
    shape.moveTo(Math.cos(startAngle) * innerCurbR, Math.sin(startAngle) * innerCurbR);
    for (let s = 0; s <= steps; s++) {
      const a = startAngle + (s / steps) * (endAngle - startAngle);
      shape.lineTo(Math.cos(a) * outerCurbR, Math.sin(a) * outerCurbR);
    }
    for (let s = steps; s >= 0; s--) {
      const a = startAngle + (s / steps) * (endAngle - startAngle);
      shape.lineTo(Math.cos(a) * innerCurbR, Math.sin(a) * innerCurbR);
    }
    
    const geo = new THREE.ShapeGeometry(shape);
    const color = i % 2 === 0 ? 0xff0000 : 0xffffff;
    const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.8 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.y = 0.02;
    scene.add(mesh);
  }
}

function buildStartLine() {
  // Black-white checkered start/finish line
  const startAngle = 0;
  const lineWidth = 2;
  const squares = 8;
  
  for (let row = 0; row < 2; row++) {
    for (let col = 0; col < squares; col++) {
      const r = TRACK_RADIUS - TRACK_HALF_WIDTH + (col / squares) * TRACK_WIDTH;
      const rNext = TRACK_RADIUS - TRACK_HALF_WIDTH + ((col + 1) / squares) * TRACK_WIDTH;
      const aStart = startAngle - (lineWidth / 2) / TRACK_RADIUS + (row * (lineWidth / 2) / TRACK_RADIUS);
      const aEnd = aStart + (lineWidth / 2) / TRACK_RADIUS;
      
      const color = (row + col) % 2 === 0 ? 0x000000 : 0xffffff;
      
      const shape = new THREE.Shape();
      shape.moveTo(Math.cos(aStart) * r, Math.sin(aStart) * r);
      shape.lineTo(Math.cos(aStart) * rNext, Math.sin(aStart) * rNext);
      shape.lineTo(Math.cos(aEnd) * rNext, Math.sin(aEnd) * rNext);
      shape.lineTo(Math.cos(aEnd) * r, Math.sin(aEnd) * r);
      shape.closePath();
      
      const geo = new THREE.ShapeGeometry(shape);
      const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.5 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.y = 0.03;
      scene.add(mesh);
    }
  }
  
  // Start/finish arch
  const archGeo = new THREE.TorusGeometry(TRACK_HALF_WIDTH + 0.5, 0.15, 8, 16, Math.PI);
  const archMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const arch = new THREE.Mesh(archGeo, archMat);
  arch.position.set(TRACK_RADIUS, TRACK_HALF_WIDTH + 0.5, 0);
  arch.rotation.y = Math.PI / 2;
  arch.rotation.x = 0;
  // Rotate to stand upright across track
  arch.rotation.set(0, 0, 0);
  arch.position.set(TRACK_RADIUS, 0, 0);
  
  // Use a simpler approach: two poles and a bar
  const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 5, 8);
  const poleMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  
  const pole1 = new THREE.Mesh(poleGeo, poleMat);
  pole1.position.set(TRACK_RADIUS + TRACK_HALF_WIDTH + 0.5, 2.5, 0);
  scene.add(pole1);
  
  const pole2 = new THREE.Mesh(poleGeo, poleMat);
  pole2.position.set(TRACK_RADIUS - TRACK_HALF_WIDTH - 0.5, 2.5, 0);
  scene.add(pole2);
  
  const barGeo = new THREE.BoxGeometry(TRACK_WIDTH + 2, 0.3, 0.3);
  const barMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const bar = new THREE.Mesh(barGeo, barMat);
  bar.position.set(TRACK_RADIUS, 5, 0);
  scene.add(bar);
  
  // "START/FINISH" banner
  const bannerGeo = new THREE.PlaneGeometry(TRACK_WIDTH, 1.2);
  const bannerCanvas = document.createElement('canvas');
  bannerCanvas.width = 512;
  bannerCanvas.height = 64;
  const bctx = bannerCanvas.getContext('2d');
  // Checkered pattern
  for (let x = 0; x < 512; x += 32) {
    for (let y = 0; y < 64; y += 32) {
      bctx.fillStyle = ((x / 32 + y / 32) % 2 === 0) ? '#000' : '#fff';
      bctx.fillRect(x, y, 32, 32);
    }
  }
  bctx.fillStyle = '#ff0000';
  bctx.font = 'bold 40px Arial';
  bctx.textAlign = 'center';
  bctx.fillText('START / FINISH', 256, 45);
  const bannerTex = new THREE.CanvasTexture(bannerCanvas);
  const bannerMat2 = new THREE.MeshStandardMaterial({ map: bannerTex, side: THREE.DoubleSide });
  const banner = new THREE.Mesh(bannerGeo, bannerMat2);
  banner.position.set(TRACK_RADIUS, 4.2, 0);
  scene.add(banner);
}

// ============ CHECKPOINTS ============
const checkpointAngles = [Math.PI / 2, Math.PI, Math.PI * 3 / 2, Math.PI * 2]; // 90°, 180°, 270°, 360°(=0°)
const checkpointColors = [0xffff00, 0x4488ff, 0x00ff44, 0xaa44ff]; // yellow, blue, green, purple
const checkpointArches = [];
const checkpointGlowMeshes = [];

function buildCheckpoints() {
  for (let i = 0; i < 4; i++) {
    const angle = checkpointAngles[i];
    const pos = getTrackPosition(angle);
    const tangent = getTrackTangent(angle);
    
    const group = new THREE.Group();
    
    // Two poles
    const poleGeo = new THREE.CylinderGeometry(0.12, 0.12, 4.5, 8);
    const poleMat = new THREE.MeshStandardMaterial({ color: checkpointColors[i] });
    
    const normal = new THREE.Vector3(-tangent.z, 0, tangent.x); // perpendicular to tangent on track
    
    const pole1 = new THREE.Mesh(poleGeo, poleMat);
    pole1.position.copy(pos).add(normal.clone().multiplyScalar(TRACK_HALF_WIDTH + 0.3));
    pole1.position.y = 2.25;
    scene.add(pole1);
    
    const pole2 = new THREE.Mesh(poleGeo, poleMat);
    pole2.position.copy(pos).add(normal.clone().multiplyScalar(-TRACK_HALF_WIDTH - 0.3));
    pole2.position.y = 2.25;
    scene.add(pole2);
    
    // Arch (torus arc)
    const archGeo = new THREE.TorusGeometry(TRACK_HALF_WIDTH + 0.3, 0.12, 8, 24, Math.PI);
    const archMat = new THREE.MeshStandardMaterial({
      color: checkpointColors[i],
      transparent: true,
      opacity: 0.8,
      emissive: checkpointColors[i],
      emissiveIntensity: 0.3
    });
    const archMesh = new THREE.Mesh(archGeo, archMat);
    archMesh.position.copy(pos);
    archMesh.position.y = 4.5;
    
    // Orient arch perpendicular to track
    archMesh.lookAt(pos.clone().add(tangent));
    archMesh.rotateX(Math.PI / 2);
    
    scene.add(archMesh);
    checkpointArches.push(archMesh);
    
    // Glow plane
    const glowGeo = new THREE.PlaneGeometry(TRACK_WIDTH + 1, 5);
    const glowMat = new THREE.MeshBasicMaterial({
      color: checkpointColors[i],
      transparent: true,
      opacity: 0.1,
      side: THREE.DoubleSide
    });
    const glowMesh = new THREE.Mesh(glowGeo, glowMat);
    glowMesh.position.copy(pos);
    glowMesh.position.y = 2.5;
    glowMesh.lookAt(pos.clone().add(tangent));
    scene.add(glowMesh);
    checkpointGlowMeshes.push(glowMesh);
    
    // Checkpoint number
    const numCanvas = document.createElement('canvas');
    numCanvas.width = 128;
    numCanvas.height = 128;
    const nctx = numCanvas.getContext('2d');
    nctx.fillStyle = '#000';
    nctx.font = 'bold 80px Arial';
    nctx.textAlign = 'center';
    nctx.textBaseline = 'middle';
    nctx.fillText(`${i + 1}`, 64, 64);
    const numTex = new THREE.CanvasTexture(numCanvas);
    const numGeo = new THREE.PlaneGeometry(1.5, 1.5);
    const numMat = new THREE.MeshBasicMaterial({ map: numTex, transparent: true, side: THREE.DoubleSide });
    const numMesh = new THREE.Mesh(numGeo, numMat);
    numMesh.position.copy(pos);
    numMesh.position.y = 5.5;
    numMesh.lookAt(new THREE.Vector3(0, 5.5, 0));
    scene.add(numMesh);
  }
}

function buildDecorations() {
  // Trees around the track
  const treePositions = [];
  for (let i = 0; i < 30; i++) {
    const angle = (i / 30) * Math.PI * 2;
    const r = TRACK_RADIUS + TRACK_HALF_WIDTH + 5 + Math.random() * 15;
    treePositions.push({ x: Math.cos(angle) * r, z: Math.sin(angle) * r });
  }
  for (let i = 0; i < 15; i++) {
    const angle = (i / 15) * Math.PI * 2;
    const r = TRACK_RADIUS - TRACK_HALF_WIDTH - 5 - Math.random() * 10;
    if (r > 3) treePositions.push({ x: Math.cos(angle) * r, z: Math.sin(angle) * r });
  }
  
  treePositions.forEach(p => {
    const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 2, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(p.x, 1, p.z);
    trunk.castShadow = true;
    scene.add(trunk);
    
    const leavesGeo = new THREE.SphereGeometry(1 + Math.random() * 0.5, 8, 6);
    const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2d6b1e + Math.floor(Math.random() * 0x111111) });
    const leaves = new THREE.Mesh(leavesGeo, leavesMat);
    leaves.position.set(p.x, 2.8 + Math.random() * 0.5, p.z);
    leaves.castShadow = true;
    scene.add(leaves);
  });
}

// ============ PLAYER CAR ============
let playerCar = null;
let playerAngle = 0; // angle on the circular track
let playerOffset = 0; // lateral offset from center
let playerSpeed = 0;
let playerHeading = Math.PI / 2; // direction the car faces (world angle)
let playerPos = new THREE.Vector3(TRACK_RADIUS, 0.2, 0);

// ============ AI CAR ============
let aiAngle = 0;
let aiSpeed = 10;
let aiSpeedTarget = 10;
let aiSpeedChangeTimer = 0;
const aiCar = new THREE.Group();

function createAICar() {
  // Body
  const bodyGeo = new THREE.BoxGeometry(1.8, 0.6, 3.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  body.castShadow = true;
  aiCar.add(body);
  
  // Cabin
  const cabinGeo = new THREE.BoxGeometry(1.4, 0.5, 1.5);
  const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 });
  const cabin = new THREE.Mesh(cabinGeo, cabinMat);
  cabin.position.set(0, 1.05, -0.3);
  aiCar.add(cabin);
  
  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.2, 12);
  const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const wheelPositions = [
    [-0.9, 0.25, 1.2], [0.9, 0.25, 1.2],
    [-0.9, 0.25, -1.2], [0.9, 0.25, -1.2]
  ];
  wheelPositions.forEach(p => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.position.set(...p);
    wheel.rotation.z = Math.PI / 2;
    aiCar.add(wheel);
  });
  
  // Number "AI" on top
  const numCanvas = document.createElement('canvas');
  numCanvas.width = 128;
  numCanvas.height = 64;
  const nctx = numCanvas.getContext('2d');
  nctx.fillStyle = '#fff';
  nctx.font = 'bold 40px Arial';
  nctx.textAlign = 'center';
  nctx.fillText('AI', 64, 45);
  const numTex = new THREE.CanvasTexture(numCanvas);
  const numGeo = new THREE.PlaneGeometry(1, 0.5);
  const numMat = new THREE.MeshBasicMaterial({ map: numTex, transparent: true });
  const numMesh = new THREE.Mesh(numGeo, numMat);
  numMesh.position.set(0, 1.35, -0.3);
  numMesh.rotation.x = -Math.PI / 2;
  aiCar.add(numMesh);
  
  scene.add(aiCar);
  
  // Position AI at start
  aiAngle = -0.05; // slightly behind player
  updateAIPosition();
}

function updateAIPosition() {
  const pos = getTrackPosition(aiAngle);
  const tangent = getTrackTangent(aiAngle);
  aiCar.position.set(pos.x, 0.01, pos.z);
  aiCar.lookAt(pos.x + tangent.x, 0.01, pos.z + tangent.z);
}

// ============ LOAD PLAYER CAR ============
const loader = new GLTFLoader();
loader.load('assets/ferrari.glb', (gltf) => {
  playerCar = gltf.scene;
  
  // Calculate bounding box and scale
  const box = new THREE.Box3().setFromObject(playerCar);
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale = 3.5 / maxDim;
  playerCar.scale.setScalar(scale);
  
  // Center the model
  const center = box.getCenter(new THREE.Vector3());
  playerCar.position.sub(center.multiplyScalar(scale));
  
  playerCar.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  
  // Wrap in group for easier positioning
  const carGroup = new THREE.Group();
  carGroup.add(playerCar);
  playerCar = carGroup;
  
  playerCar.position.set(TRACK_RADIUS, 0.2, 0);
  playerCar.rotation.y = Math.PI / 2;
  scene.add(playerCar);
  
  window.__3D_STATE__.modelLoaded = true;
  
  startCountdown();
}, undefined, (err) => {
  console.error('Failed to load ferrari.glb, using fallback box car', err);
  // Fallback: create a box car
  playerCar = new THREE.Group();
  const bodyGeo = new THREE.BoxGeometry(1.8, 0.6, 3.5);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.6, roughness: 0.3 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.5;
  body.castShadow = true;
  playerCar.add(body);
  
  const cabinGeo = new THREE.BoxGeometry(1.4, 0.5, 1.5);
  const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const cabin = new THREE.Mesh(cabinGeo, cabinMat);
  cabin.position.set(0, 1.05, -0.3);
  playerCar.add(cabin);
  
  playerCar.position.set(TRACK_RADIUS, 0.2, 0);
  playerCar.rotation.y = Math.PI / 2;
  scene.add(playerCar);
  
  window.__3D_STATE__.modelLoaded = true;
  startCountdown();
});

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// ============ RACE STATE ============
let raceState = 'loading';
let raceStartTime = 0;
let lapStartTime = 0;
let currentLap = 0;
let checkpointsPassed = 0;
let checkpointFlags = [false, false, false, false];

let aiLap = 0;
let aiCheckpointsPassed = 0;
let aiCheckpointFlags = [false, false, false, false];
let aiFinished = false;
let aiFinishTime = 0;

let playerFinished = false;
let playerFinishTime = 0;

let totalRaceTime = 0;
let currentLapTime = 0;
let lapTimes = [];

// ============ COUNTDOWN ============
function startCountdown() {
  raceState = 'countdown';
  window.__3D_STATE__.raceState = 'countdown';
  const countdownEl = document.getElementById('countdown');
  countdownEl.style.display = 'block';
  
  let count = 3;
  countdownEl.textContent = count;
  countdownEl.style.color = '#ff4444';
  
  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      countdownEl.textContent = count;
      countdownEl.style.color = count === 2 ? '#ffcc00' : '#ff4444';
    } else if (count === 0) {
      countdownEl.textContent = 'GO!';
      countdownEl.style.color = '#00ff88';
    } else {
      countdownEl.style.display = 'none';
      clearInterval(interval);
      startRace();
    }
  }, 1000);
}

function startRace() {
  raceState = 'racing';
  window.__3D_STATE__.raceState = 'racing';
  raceStartTime = performance.now() / 1000;
  lapStartTime = raceStartTime;
  currentLap = 1;
  checkpointsPassed = 0;
  checkpointFlags = [false, false, false, false];
  aiLap = 1;
  aiCheckpointsPassed = 0;
  aiCheckpointFlags = [false, false, false, false];
}

// ============ CHECKPOINT DETECTION ============
function normalizeAngle(a) {
  while (a < 0) a += Math.PI * 2;
  while (a >= Math.PI * 2) a -= Math.PI * 2;
  return a;
}

function checkPlayerCheckpoints() {
  if (raceState !== 'racing' || playerFinished) return;
  
  const pAngle = normalizeAngle(playerAngle);
  
  for (let i = 0; i < 4; i++) {
    if (checkpointFlags[i]) continue;
    
    // Check if previous checkpoints are passed (must be in order)
    if (i > 0 && !checkpointFlags[i - 1]) continue;
    
    const cpAngle = normalizeAngle(checkpointAngles[i]);
    let diff = Math.abs(pAngle - cpAngle);
    if (diff > Math.PI) diff = Math.PI * 2 - diff;
    
    if (diff < 0.15) {
      checkpointFlags[i] = true;
      checkpointsPassed++;
      
      // Flash checkpoint
      flashCheckpoint(i);
      showCheckpointMsg(`Checkpoint ${checkpointsPassed}/4`);
      
      break;
    }
  }
  
  // Check lap completion (crossing start/finish at angle ~0 or ~2PI)
  if (checkpointFlags.every(f => f)) {
    const pAngle2 = normalizeAngle(playerAngle);
    // Near angle 0 (start/finish)
    if (pAngle2 < 0.15 || pAngle2 > Math.PI * 2 - 0.15) {
      completeLap();
    }
  }
}

function completeLap() {
  const now = performance.now() / 1000;
  const lapTime = now - lapStartTime;
  lapTimes.push(lapTime);
  
  showLapMsg(`Lap ${currentLap} Complete: ${lapTime.toFixed(1)}s`);
  
  if (currentLap >= 3) {
    playerFinished = true;
    playerFinishTime = now - raceStartTime;
    if (aiFinished) {
      endRace();
    }
  } else {
    currentLap++;
    lapStartTime = now;
    checkpointsPassed = 0;
    checkpointFlags = [false, false, false, false];
  }
}

function checkAICheckpoints() {
  if (raceState !== 'racing' || aiFinished) return;
  
  const aAngle = normalizeAngle(aiAngle);
  
  for (let i = 0; i < 4; i++) {
    if (aiCheckpointFlags[i]) continue;
    if (i > 0 && !aiCheckpointFlags[i - 1]) continue;
    
    const cpAngle = normalizeAngle(checkpointAngles[i]);
    let diff = Math.abs(aAngle - cpAngle);
    if (diff > Math.PI) diff = Math.PI * 2 - diff;
    
    if (diff < 0.15) {
      aiCheckpointFlags[i] = true;
      aiCheckpointsPassed++;
      break;
    }
  }
  
  if (aiCheckpointFlags.every(f => f)) {
    const aAngle2 = normalizeAngle(aiAngle);
    if (aAngle2 < 0.15 || aAngle2 > Math.PI * 2 - 0.15) {
      if (aiLap >= 3) {
        aiFinished = true;
        aiFinishTime = performance.now() / 1000 - raceStartTime;
        if (playerFinished) {
          endRace();
        }
      } else {
        aiLap++;
        aiCheckpointsPassed = 0;
        aiCheckpointFlags = [false, false, false, false];
      }
    }
  }
}

function endRace() {
  raceState = 'finished';
  window.__3D_STATE__.raceState = 'finished';
  
  const resultEl = document.getElementById('race-result');
  const titleEl = document.getElementById('result-title');
  const playerTimeEl = document.getElementById('result-player-time');
  const aiTimeEl = document.getElementById('result-ai-time');
  const lapsEl = document.getElementById('result-laps');
  
  if (playerFinishTime <= aiFinishTime) {
    titleEl.textContent = '🏆 你赢了！';
    titleEl.className = 'win';
  } else {
    titleEl.textContent = '💨 AI 获胜！';
    titleEl.className = 'lose';
  }
  
  playerTimeEl.textContent = playerFinishTime.toFixed(1) + 's';
  aiTimeEl.textContent = aiFinishTime.toFixed(1) + 's';
  
  let lapsText = 'Lap Times: ';
  lapTimes.forEach((t, i) => { lapsText += `L${i + 1}: ${t.toFixed(1)}s  `; });
  lapsEl.textContent = lapsText;
  
  resultEl.style.display = 'block';
}

// ============ UI HELPERS ============
let checkpointMsgTimeout = null;
function showCheckpointMsg(text) {
  const el = document.getElementById('checkpoint-msg');
  el.textContent = text;
  el.style.opacity = 1;
  if (checkpointMsgTimeout) clearTimeout(checkpointMsgTimeout);
  checkpointMsgTimeout = setTimeout(() => { el.style.opacity = 0; }, 1500);
}

let lapMsgTimeout = null;
function showLapMsg(text) {
  const el = document.getElementById('lap-msg');
  el.textContent = text;
  el.style.opacity = 1;
  if (lapMsgTimeout) clearTimeout(lapMsgTimeout);
  lapMsgTimeout = setTimeout(() => { el.style.opacity = 0; }, 2500);
}

function flashCheckpoint(index) {
  const arch = checkpointArches[index];
  const glow = checkpointGlowMeshes[index];
  if (!arch || !glow) return;
  
  let flashCount = 0;
  const flashInterval = setInterval(() => {
    arch.material.emissiveIntensity = flashCount % 2 === 0 ? 2 : 0.3;
    glow.material.opacity = flashCount % 2 === 0 ? 0.4 : 0.1;
    flashCount++;
    if (flashCount > 6) {
      clearInterval(flashInterval);
      arch.material.emissiveIntensity = 0.3;
      glow.material.opacity = 0.1;
    }
  }, 100);
}

// ============ UPDATE HUD ============
function updateHUD() {
  const speedKmh = Math.abs(playerSpeed) * 3.6;
  document.getElementById('speed').textContent = Math.round(speedKmh);
  document.getElementById('lap').textContent = `${Math.min(currentLap, 3)}/3`;
  document.getElementById('checkpoints').textContent = `${checkpointsPassed}/4`;
  
  // Position
  const playerProgress = (currentLap - 1) * 4 + checkpointsPassed + normalizeAngle(playerAngle) / (Math.PI * 2);
  const aiProgress = (aiLap - 1) * 4 + aiCheckpointsPassed + normalizeAngle(aiAngle) / (Math.PI * 2);
  const pos = playerProgress >= aiProgress ? 1 : 2;
  document.getElementById('position').textContent = pos === 1 ? '1st' : '2nd';
  
  const now = performance.now() / 1000;
  if (raceState === 'racing') {
    currentLapTime = now - lapStartTime;
    totalRaceTime = now - raceStartTime;
  }
  document.getElementById('lapTime').textContent = currentLapTime.toFixed(1);
  document.getElementById('totalTime').textContent = totalRaceTime.toFixed(1);
  
  // Update global state
  window.__3D_STATE__.speed = playerSpeed;
  window.__3D_STATE__.lap = currentLap;
  window.__3D_STATE__.checkpointsPassed = checkpointsPassed;
  window.__3D_STATE__.position = pos;
  window.__3D_STATE__.lapTime = currentLapTime;
  window.__3D_STATE__.totalTime = totalRaceTime;
  window.__3D_STATE__.aiLap = aiLap;
  window.__3D_STATE__.aiCheckpoints = aiCheckpointsPassed;
  window.__3D_STATE__.playerAngle = playerAngle;
  window.__3D_STATE__.aiAngle = aiAngle;
}

// ============ MINIMAP ============
const minimapCanvas = document.getElementById('minimap-canvas');
const mctx = minimapCanvas.getContext('2d');

function drawMinimap() {
  const w = 160, h = 160;
  const cx = w / 2, cy = h / 2;
  const scale = 1.3;
  
  mctx.clearRect(0, 0, w, h);
  
  // Track
  mctx.strokeStyle = '#555';
  mctx.lineWidth = 8;
  mctx.beginPath();
  mctx.arc(cx, cy, TRACK_RADIUS / scale, 0, Math.PI * 2);
  mctx.stroke();
  
  // Checkpoints
  for (let i = 0; i < 4; i++) {
    const a = checkpointAngles[i];
    const x = cx + Math.cos(a) * TRACK_RADIUS / scale;
    const y = cy + Math.sin(a) * TRACK_RADIUS / scale;
    mctx.fillStyle = checkpointFlags[i] ? '#00ff88' : `#${checkpointColors[i].toString(16).padStart(6, '0')}`;
    mctx.beginPath();
    mctx.arc(x, y, 3, 0, Math.PI * 2);
    mctx.fill();
  }
  
  // Player
  const px = cx + Math.cos(playerAngle) * TRACK_RADIUS / scale;
  const py = cy + Math.sin(playerAngle) * TRACK_RADIUS / scale;
  mctx.fillStyle = '#ffcc00';
  mctx.beginPath();
  mctx.arc(px, py, 5, 0, Math.PI * 2);
  mctx.fill();
  mctx.strokeStyle = '#000';
  mctx.lineWidth = 1;
  mctx.stroke();
  
  // AI
  const ax = cx + Math.cos(aiAngle) * TRACK_RADIUS / scale;
  const ay = cy + Math.sin(aiAngle) * TRACK_RADIUS / scale;
  mctx.fillStyle = '#ff0000';
  mctx.beginPath();
  mctx.arc(ax, ay, 5, 0, Math.PI * 2);
  mctx.fill();
  mctx.strokeStyle = '#000';
  mctx.lineWidth = 1;
  mctx.stroke();
  
  // Start line
  const sx = cx + Math.cos(0) * TRACK_RADIUS / scale;
  const sy = cy + Math.sin(0) * TRACK_RADIUS / scale;
  mctx.fillStyle = '#fff';
  mctx.fillRect(sx - 2, sy - 6, 4, 12);
}

// ============ GAME LOOP ============
const clock = new THREE.Clock();
let cameraOffset = new THREE.Vector3(0, 6, -10);

function updatePlayer(dt) {
  if (raceState !== 'racing' || playerFinished) return;
  
  // Acceleration
  if (keys['w'] || keys['arrowup']) {
    playerSpeed += 12 * dt;
    if (playerSpeed > 15) playerSpeed = 15;
  } else if (keys['s'] || keys['arrowdown']) {
    playerSpeed -= 15 * dt;
    if (playerSpeed < -3) playerSpeed = -3;
  } else {
    // Natural deceleration
    playerSpeed *= Math.pow(0.98, dt * 60);
    if (Math.abs(playerSpeed) < 0.1) playerSpeed = 0;
  }
  
  // Steering
  const steerFactor = 1.5 * (1 - Math.abs(playerSpeed) / 20); // more agile at low speed
  const steerSpeed = Math.max(0.5, steerFactor) * 2;
  
  if (keys['a'] || keys['arrowleft']) {
    playerHeading += steerSpeed * dt * Math.sign(Math.max(playerSpeed, 0.5));
  }
  if (keys['d'] || keys['arrowright']) {
    playerHeading -= steerSpeed * dt * Math.sign(Math.max(playerSpeed, 0.5));
  }
  
  // Move player
  const moveX = Math.sin(playerHeading) * playerSpeed * dt;
  const moveZ = Math.cos(playerHeading) * playerSpeed * dt;
  
  playerPos.x += moveX;
  playerPos.z += moveZ;
  
  // Calculate distance from track center
  const distFromCenter = Math.sqrt(playerPos.x * playerPos.x + playerPos.z * playerPos.z);
  const distFromTrack = Math.abs(distFromCenter - TRACK_RADIUS);
  
  // Off-track penalty (grass friction)
  if (distFromTrack > TRACK_HALF_WIDTH) {
    playerSpeed *= Math.pow(0.95, dt * 60);
    // Push back towards track
    const pushStrength = 0.5 * dt;
    const toCenter = new THREE.Vector3(-playerPos.x, 0, -playerPos.z).normalize();
    if (distFromCenter > TRACK_RADIUS) {
      playerPos.add(toCenter.multiplyScalar(pushStrength * playerSpeed));
    } else {
      playerPos.sub(toCenter.multiplyScalar(pushStrength * playerSpeed));
    }
  }
  
  // Update player angle on track
  playerAngle = Math.atan2(playerPos.z, playerPos.x);
  if (playerAngle < 0) playerAngle += Math.PI * 2;
  
  // Update car position and rotation
  if (playerCar) {
    playerCar.position.set(playerPos.x, 0.2, playerPos.z);
    playerCar.rotation.y = playerHeading;
  }
}

function updateAI(dt) {
  if (raceState !== 'racing' || aiFinished) return;
  
  // Random speed variation
  aiSpeedChangeTimer -= dt;
  if (aiSpeedChangeTimer <= 0) {
    aiSpeedTarget = 8 + Math.random() * 4; // 8-12 m/s
    aiSpeedChangeTimer = 1 + Math.random() * 2;
  }
  
  aiSpeed += (aiSpeedTarget - aiSpeed) * dt * 2;
  
  // Move AI along track
  const angularSpeed = aiSpeed / TRACK_RADIUS;
  aiAngle += angularSpeed * dt;
  
  if (aiAngle >= Math.PI * 2) {
    aiAngle -= Math.PI * 2;
  }
  
  updateAIPosition();
  checkAICheckpoints();
}

function updateCamera() {
  if (!playerCar) return;
  
  const targetPos = playerCar.position.clone();
  
  // Camera behind the car
  const behindDist = 10;
  const heightDist = 5;
  const camTarget = new THREE.Vector3(
    targetPos.x - Math.sin(playerHeading) * behindDist,
    targetPos.y + heightDist,
    targetPos.z - Math.cos(playerHeading) * behindDist
  );
  
  camera.position.lerp(camTarget, 0.05);
  
  const lookTarget = new THREE.Vector3(
    targetPos.x + Math.sin(playerHeading) * 5,
    targetPos.y + 1,
    targetPos.z + Math.cos(playerHeading) * 5
  );
  
  camera.lookAt(lookTarget);
}

function animate() {
  requestAnimationFrame(animate);
  
  const dt = Math.min(clock.getDelta(), 0.05);
  
  updatePlayer(dt);
  updateAI(dt);
  checkPlayerCheckpoints();
  updateCamera();
  updateHUD();
  drawMinimap();
  
  // Check if both finished
  if (raceState === 'racing') {
    if (playerFinished && !aiFinished) {
      // Wait for AI or timeout
    }
    if (aiFinished && !playerFinished) {
      // AI finished first, player still racing
    }
    if (playerFinished && aiFinished) {
      endRace();
    }
  }
  
  renderer.render(scene, camera);
}

// ============ INIT ============
buildTrack();
createAICar();

// Initial camera position
camera.position.set(TRACK_RADIUS + 15, 10, 15);
camera.lookAt(TRACK_RADIUS, 0, 0);

// Player initial heading (tangent to track at angle 0, going counter-clockwise... actually going in +angle direction)
playerHeading = Math.PI / 2; // facing +Z direction initially
playerPos.set(TRACK_RADIUS, 0.2, 0);

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
