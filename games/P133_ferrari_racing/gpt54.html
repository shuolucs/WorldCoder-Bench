<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 法拉利环形赛道竞速</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #87CEEB;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,0.38);
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 15px;
      min-width: 220px;
      backdrop-filter: blur(4px);
    }

    #hud b {
      display: inline-block;
      width: 110px;
      color: #ffd966;
    }

    #message {
      position: absolute;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      color: white;
      font-size: 32px;
      font-weight: bold;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }

    #result {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      background: rgba(0,0,0,0.55);
    }

    #resultCard {
      background: rgba(20,20,20,0.92);
      color: white;
      padding: 24px 30px;
      border-radius: 14px;
      min-width: 320px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    #resultCard h1 {
      margin: 0 0 12px;
      font-size: 34px;
    }

    #resultCard p {
      margin: 8px 0;
      font-size: 18px;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      color: white;
      background: linear-gradient(#87CEEB, #6ab7e7);
      font-size: 24px;
      font-weight: bold;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="loading">正在加载法拉利赛车模型...</div>

  <div id="hud">
    <div><b>速度</b><span id="speed">0 km/h</span></div>
    <div><b>圈数</b><span id="lap">1/3</span></div>
    <div><b>检查点</b><span id="checkpoints">0/4</span></div>
    <div><b>排名</b><span id="position">2nd</span></div>
    <div><b>当前圈用时</b><span id="lapTime">0.0 s</span></div>
    <div><b>总用时</b><span id="totalTime">0.0 s</span></div>
  </div>

  <div id="message"></div>

  <div id="result">
    <div id="resultCard">
      <h1 id="resultTitle">比赛结束</h1>
      <p id="resultRank"></p>
      <p id="resultTime"></p>
      <p id="resultDetail"></p>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // =========================
    // 全局状态暴露
    // =========================
    window.__3D_STATE__ = {
      modelLoaded: false,
      speed: 0,
      lap: 1,
      totalLaps: 3,
      checkpointsPassed: 0,
      totalCheckpoints: 4,
      position: 2,
      lapTime: 0,
      totalTime: 0,
      raceState: 'loading',
      aiLap: 1,
      aiCheckpoints: 0,
      playerAngle: 0,
      aiAngle: 0
    };

    // =========================
    // 基础场景
    // =========================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 12, -18);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // 可选调试控制器
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.target.set(0, 0, 0);

    // 灯光
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
    dirLight.position.set(50, 80, 30);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -150;
    dirLight.shadow.camera.right = 150;
    dirLight.shadow.camera.top = 150;
    dirLight.shadow.camera.bottom = -150;
    scene.add(dirLight);

    // =========================
    // HUD
    // =========================
    const speedEl = document.getElementById('speed');
    const lapEl = document.getElementById('lap');
    const checkpointsEl = document.getElementById('checkpoints');
    const positionEl = document.getElementById('position');
    const lapTimeEl = document.getElementById('lapTime');
    const totalTimeEl = document.getElementById('totalTime');
    const messageEl = document.getElementById('message');
    const loadingEl = document.getElementById('loading');
    const resultEl = document.getElementById('result');
    const resultTitleEl = document.getElementById('resultTitle');
    const resultRankEl = document.getElementById('resultRank');
    const resultTimeEl = document.getElementById('resultTime');
    const resultDetailEl = document.getElementById('resultDetail');

    function showMessage(text, duration = 1200) {
      messageEl.textContent = text;
      messageEl.style.opacity = '1';
      clearTimeout(showMessage._timer);
      showMessage._timer = setTimeout(() => {
        messageEl.style.opacity = '0';
      }, duration);
    }

    // =========================
    // 赛道参数
    // =========================
    const TRACK_RADIUS = 40;
    const TRACK_WIDTH = 8;
    const INNER_RADIUS = TRACK_RADIUS - TRACK_WIDTH / 2;
    const OUTER_RADIUS = TRACK_RADIUS + TRACK_WIDTH / 2;
    const TOTAL_LAPS = 3;
    const TOTAL_CHECKPOINTS = 4;
    const START_ANGLE = -Math.PI / 2; // 起点在下方，朝 +X 方向切线前进

    // =========================
    // 环境：草地、赛道、路缘石、起终点、检查点
    // =========================
    function createGrass() {
      const grassMat = new THREE.MeshStandardMaterial({ color: 0x4f8f3a });

      const outer = new THREE.Mesh(
        new THREE.CircleGeometry(120, 128),
        grassMat
      );
      outer.rotation.x = -Math.PI / 2;
      outer.receiveShadow = true;
      scene.add(outer);

      const inner = new THREE.Mesh(
        new THREE.CircleGeometry(INNER_RADIUS - 0.2, 128),
        grassMat
      );
      inner.rotation.x = -Math.PI / 2;
      inner.position.y = 0.02;
      inner.receiveShadow = true;
      scene.add(inner);
    }

    function createTrack() {
      const shape = new THREE.Shape();
      shape.absarc(0, 0, OUTER_RADIUS, 0, Math.PI * 2, false);
      const hole = new THREE.Path();
      hole.absarc(0, 0, INNER_RADIUS, 0, Math.PI * 2, true);
      shape.holes.push(hole);

      const geo = new THREE.ShapeGeometry(shape, 128);
      const mat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.95, metalness: 0.02 });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.receiveShadow = true;
      scene.add(mesh);
    }

    function createKerb(radius, y, offsetColor = 0) {
      const group = new THREE.Group();
      const segments = 96;
      const arcLen = (Math.PI * 2 * radius) / segments;
      const boxDepth = 1.1;
      const boxHeight = 0.18;

      for (let i = 0; i < segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;

        const color = ((i + offsetColor) % 2 === 0) ? 0xffffff : 0xdd2222;
        const piece = new THREE.Mesh(
          new THREE.BoxGeometry(arcLen * 0.98, boxHeight, boxDepth),
          new THREE.MeshStandardMaterial({ color })
        );
        piece.position.set(x, y, z);
        piece.rotation.y = -angle;
        piece.castShadow = true;
        piece.receiveShadow = true;
        group.add(piece);
      }
      scene.add(group);
      return group;
    }

    function createStartFinishLine() {
      const group = new THREE.Group();
      const stripeCount = 10;
      const stripeWidth = TRACK_WIDTH / stripeCount;
      const lineDepth = 1.6;

      for (let i = 0; i < stripeCount; i++) {
        const color = i % 2 === 0 ? 0xffffff : 0x111111;
        const stripe = new THREE.Mesh(
          new THREE.BoxGeometry(stripeWidth, 0.03, lineDepth),
          new THREE.MeshStandardMaterial({ color })
        );

        const radial = INNER_RADIUS + stripeWidth * (i + 0.5);
        const x = Math.cos(START_ANGLE) * radial;
        const z = Math.sin(START_ANGLE) * radial;
        const tangentX = -Math.sin(START_ANGLE);
        const tangentZ = Math.cos(START_ANGLE);

        stripe.position.set(
          x,
          0.05,
          z
        );
        stripe.rotation.y = Math.atan2(tangentX, tangentZ);
        stripe.receiveShadow = true;
        group.add(stripe);
      }

      scene.add(group);
    }

    const checkpointColors = [0xffff00, 0x3399ff, 0x33ff66, 0xaa44ff];
    const checkpointAngles = [
      START_ANGLE,
      START_ANGLE + Math.PI / 2,
      START_ANGLE + Math.PI,
      START_ANGLE + 3 * Math.PI / 2
    ];

    const checkpointGroups = [];
    const checkpointFlashTimers = [0, 0, 0, 0];

    function createCheckpoint(angle, color, index) {
      const group = new THREE.Group();
      const radius = TRACK_RADIUS;
      const x = Math.cos(angle) * radius;
      const z = Math.sin(angle) * radius;

      const tangent = new THREE.Vector3(-Math.sin(angle), 0, Math.cos(angle)).normalize();
      const radial = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize();

      const archMat = new THREE.MeshStandardMaterial({
        color,
        transparent: true,
        opacity: 0.45,
        emissive: new THREE.Color(color),
        emissiveIntensity: 0.2
      });

      const postGeo = new THREE.BoxGeometry(0.4, 4, 0.4);
      const topGeo = new THREE.BoxGeometry(TRACK_WIDTH + 1.2, 0.4, 0.4);

      const leftPost = new THREE.Mesh(postGeo, archMat);
      const rightPost = new THREE.Mesh(postGeo, archMat);
      const topBar = new THREE.Mesh(topGeo, archMat);

      leftPost.position.set(-radial.x * (TRACK_WIDTH / 2), 2, -radial.z * (TRACK_WIDTH / 2));
      rightPost.position.set(radial.x * (TRACK_WIDTH / 2), 2, radial.z * (TRACK_WIDTH / 2));
      topBar.position.set(0, 4, 0);

      group.add(leftPost, rightPost, topBar);

      group.position.set(x, 0, z);
      group.rotation.y = Math.atan2(tangent.x, tangent.z);
      scene.add(group);

      checkpointGroups[index] = group;
    }

    createGrass();
    createTrack();
    createKerb(INNER_RADIUS, 0.08, 0);
    createKerb(OUTER_RADIUS, 0.08, 1);
    createStartFinishLine();
    checkpointAngles.forEach((a, i) => createCheckpoint(a, checkpointColors[i], i));

    // =========================
    // 车辆
    // =========================
    let playerCar = null;
    const player = {
      angle: START_ANGLE,
      speed: 0,
      laneOffset: 0,
      yaw: 0,
      checkpointIndex: 0,
      lapsCompleted: 0,
      lapTime: 0,
      totalTime: 0,
      finished: false,
      finishTime: null
    };

    const aiCar = new THREE.Mesh(
      new THREE.BoxGeometry(2.6, 1.2, 4.8),
      new THREE.MeshStandardMaterial({ color: 0xff0000 })
    );
    aiCar.castShadow = true;
    aiCar.receiveShadow = true;
    scene.add(aiCar);

    const ai = {
      angle: START_ANGLE - 0.18,
      speed: 9.5,
      laneOffset: 0.8,
      checkpointIndex: 0,
      lapsCompleted: 0,
      totalTime: 0,
      lapTime: 0,
      finished: false,
      finishTime: null,
      speedTimer: 0,
      targetSpeed: 10.2
    };

    // =========================
    // 模型加载
    // =========================
    const loader = new GLTFLoader();
    loader.load(
      'assets/ferrari.glb',
      (gltf) => {
        playerCar = gltf.scene;
        playerCar.scale.setScalar(1.4);
        playerCar.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(playerCar);
        updateCarTransform(playerCar, player.angle, player.laneOffset, true);
        loadingEl.style.display = 'none';
        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.raceState = 'running';
      },
      undefined,
      (err) => {
        console.error('模型加载失败:', err);
        // 回退模型
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(2.4, 1.1, 4.6),
          new THREE.MeshStandardMaterial({ color: 0xffff00 })
        );
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        playerCar = fallback;
        scene.add(playerCar);
        updateCarTransform(playerCar, player.angle, player.laneOffset, true);
        loadingEl.style.display = 'none';
        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.raceState = 'running';
      }
    );

    // =========================
    // 输入
    // =========================
    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    // =========================
    // 工具
    // =========================
    function normalizeAngle(a) {
      while (a <= -Math.PI) a += Math.PI * 2;
      while (a > Math.PI) a -= Math.PI * 2;
      return a;
    }

    function wrapAnglePositive(a) {
      let v = a % (Math.PI * 2);
      if (v < 0) v += Math.PI * 2;
      return v;
    }

    function angularDeltaForward(prev, curr) {
      let d = curr - prev;
      if (d < 0) d += Math.PI * 2;
      return d;
    }

    function getTrackPosition(angle, laneOffset = 0) {
      const radius = TRACK_RADIUS + laneOffset;
      return new THREE.Vector3(
        Math.cos(angle) * radius,
        0.55,
        Math.sin(angle) * radius
      );
    }

    function updateCarTransform(car, angle, laneOffset = 0, isPlayer = false) {
      const pos = getTrackPosition(angle, laneOffset);
      car.position.copy(pos);

      const tangent = new THREE.Vector3(-Math.sin(angle), 0, Math.cos(angle)).normalize();
      const yaw = Math.atan2(tangent.x, tangent.z);

      if (isPlayer && car !== null) {
        car.rotation.y = yaw;
      } else {
        car.rotation.y = yaw;
      }
    }

    function flashCheckpoint(index) {
      checkpointFlashTimers[index] = 0.35;
    }

    function progressScore(lapsCompleted, checkpointIndex, angle) {
      return lapsCompleted * TOTAL_CHECKPOINTS + checkpointIndex + wrapAnglePositive(angle) / (Math.PI * 2);
    }

    function ordinal(n) {
      return n === 1 ? '1st' : '2nd';
    }

    // =========================
    // 比赛逻辑
    // =========================
    let raceFinished = false;

    function updateCheckpointsAndLaps(racer, isPlayer) {
      const nextIndex = racer.checkpointIndex;
      const cpAngle = checkpointAngles[nextIndex];
      const diff = Math.abs(normalizeAngle(racer.angle - cpAngle));

      if (diff < 0.11) {
        racer.checkpointIndex++;
        if (isPlayer) {
          flashCheckpoint(nextIndex);
          showMessage(`Checkpoint ${racer.checkpointIndex}/${TOTAL_CHECKPOINTS}`, 900);
        }

        if (racer.checkpointIndex >= TOTAL_CHECKPOINTS) {
          racer.checkpointIndex = 0;
          racer.lapsCompleted++;

          if (isPlayer) {
            showMessage(`完成第 ${racer.lapsCompleted} 圈，用时 ${racer.lapTime.toFixed(1)} s`, 1600);
            racer.lapTime = 0;
          } else {
            racer.lapTime = 0;
          }

          if (racer.lapsCompleted >= TOTAL_LAPS) {
            racer.finished = true;
            racer.finishTime = racer.totalTime;
          }
        }
      }
    }

    function updatePlayer(dt) {
      if (!playerCar || raceFinished) return;

      if (!player.finished) {
        player.totalTime += dt;
        player.lapTime += dt;
      }

      if (keys['w']) player.speed += 10 * dt;
      if (keys['s']) player.speed -= 14 * dt;

      player.speed = Math.min(15, Math.max(-3, player.speed));

      if (!keys['w']) {
        player.speed *= Math.pow(0.98, dt * 60);
      }

      const turnFactor = THREE.MathUtils.clamp(1.6 - Math.abs(player.speed) / 15, 0.45, 1.6);
      const steerStrength = 1.8 * turnFactor;

      if (keys['a']) player.laneOffset -= steerStrength * dt * 6;
      if (keys['d']) player.laneOffset += steerStrength * dt * 6;

      // 回正趋势
      if (!keys['a'] && !keys['d']) {
        player.laneOffset = THREE.MathUtils.lerp(player.laneOffset, 0, 0.04);
      }

      const maxLane = TRACK_WIDTH * 0.65;
      if (player.laneOffset < -maxLane || player.laneOffset > maxLane) {
        player.speed *= Math.pow(0.92, dt * 60);
      }

      player.laneOffset = THREE.MathUtils.clamp(player.laneOffset, -TRACK_WIDTH, TRACK_WIDTH);

      const effectiveRadius = Math.max(5, TRACK_RADIUS + player.laneOffset);
      player.angle += (player.speed / effectiveRadius) * dt;

      updateCarTransform(playerCar, player.angle, player.laneOffset, true);
      updateCheckpointsAndLaps(player, true);
    }

    function updateAI(dt) {
      if (raceFinished) return;

      if (!ai.finished) {
        ai.totalTime += dt;
        ai.lapTime += dt;
      }

      ai.speedTimer -= dt;
      if (ai.speedTimer <= 0) {
        ai.speedTimer = 1 + Math.random() * 1.2;
        ai.targetSpeed = 8 + Math.random() * 4;
      }
      ai.speed = THREE.MathUtils.lerp(ai.speed, ai.targetSpeed, dt * 1.2);

      // 小幅随机摆动但保持平滑
      ai.laneOffset = Math.sin(ai.totalTime * 0.7) * 0.6;

      const effectiveRadius = TRACK_RADIUS + ai.laneOffset;
      ai.angle += (ai.speed / effectiveRadius) * dt;

      updateCarTransform(aiCar, ai.angle, ai.laneOffset, false);
      updateCheckpointsAndLaps(ai, false);
    }

    function updateCheckpointVisuals(dt) {
      for (let i = 0; i < checkpointGroups.length; i++) {
        if (!checkpointGroups[i]) continue;
        checkpointFlashTimers[i] = Math.max(0, checkpointFlashTimers[i] - dt);

        const flashing = checkpointFlashTimers[i] > 0;
        checkpointGroups[i].traverse((obj) => {
          if (obj.material) {
            obj.material.opacity = flashing ? 0.9 : 0.45;
            obj.material.emissiveIntensity = flashing ? 1.6 : 0.2;
          }
        });
      }
    }

    function updateCamera(dt) {
      if (!playerCar) return;

      const angle = player.angle;
      const tangent = new THREE.Vector3(-Math.sin(angle), 0, Math.cos(angle)).normalize();
      const radial = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize();
      const carPos = getTrackPosition(angle, player.laneOffset);

      const desiredPos = carPos.clone()
        .add(tangent.clone().multiplyScalar(-10))
        .add(radial.clone().multiplyScalar(2.5))
        .add(new THREE.Vector3(0, 5.5, 0));

      camera.position.lerp(desiredPos, 1 - Math.pow(0.001, dt));
      const target = carPos.clone().add(new THREE.Vector3(0, 2, 0));
      camera.lookAt(target);
    }

    function updateRaceState() {
      const playerProg = progressScore(player.lapsCompleted, player.checkpointIndex, player.angle);
      const aiProg = progressScore(ai.lapsCompleted, ai.checkpointIndex, ai.angle);
      const playerPosition = playerProg >= aiProg ? 1 : 2;

      speedEl.textContent = `${Math.max(0, player.speed * 3.6).toFixed(0)} km/h`;
      lapEl.textContent = `${Math.min(player.lapsCompleted + 1, TOTAL_LAPS)}/${TOTAL_LAPS}`;
      checkpointsEl.textContent = `${player.checkpointIndex}/${TOTAL_CHECKPOINTS}`;
      positionEl.textContent = ordinal(playerPosition);
      lapTimeEl.textContent = `${player.lapTime.toFixed(1)} s`;
      totalTimeEl.textContent = `${player.totalTime.toFixed(1)} s`;

      if (!raceFinished && (player.finished || ai.finished)) {
        raceFinished = true;

        const playerWon = player.finished && (!ai.finished || player.finishTime <= ai.finishTime);
        window.__3D_STATE__.raceState = 'finished';

        resultEl.style.display = 'flex';
        resultTitleEl.textContent = playerWon ? '你赢了！' : 'AI 获胜！';
        resultRankEl.textContent = `最终排名：${playerWon ? '1st' : '2nd'}`;
        resultTimeEl.textContent = `你的总用时：${player.totalTime.toFixed(1)} s`;
        resultDetailEl.textContent = ai.finished
          ? `AI 总用时：${ai.totalTime.toFixed(1)} s`
          : 'AI 尚未完成比赛';
      }

      window.__3D_STATE__.speed = player.speed;
      window.__3D_STATE__.lap = Math.min(player.lapsCompleted + 1, TOTAL_LAPS);
      window.__3D_STATE__.totalLaps = TOTAL_LAPS;
      window.__3D_STATE__.checkpointsPassed = player.checkpointIndex;
      window.__3D_STATE__.totalCheckpoints = TOTAL_CHECKPOINTS;
      window.__3D_STATE__.position = playerPosition;
      window.__3D_STATE__.lapTime = player.lapTime;
      window.__3D_STATE__.totalTime = player.totalTime;
      window.__3D_STATE__.aiLap = Math.min(ai.lapsCompleted + 1, TOTAL_LAPS);
      window.__3D_STATE__.aiCheckpoints = ai.checkpointIndex;
      window.__3D_STATE__.playerAngle = player.angle;
      window.__3D_STATE__.aiAngle = ai.angle;
    }

    // =========================
    // 初始化车辆位置
    // =========================
    updateCarTransform(aiCar, ai.angle, ai.laneOffset, false);

    // =========================
    // 循环
    // =========================
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      if (window.__3D_STATE__.modelLoaded) {
        updatePlayer(dt);
      }

      updateAI(dt);
      updateCheckpointVisuals(dt);
      updateCamera(dt);
      updateRaceState();

      renderer.render(scene, camera);
    }

    animate();

    // =========================
    // 自适应
    // =========================
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
