<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法拉利环形赛道竞速</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .hud-item {
            margin-bottom: 8px;
            font-size: 18px;
            font-weight: bold;
        }
        .hud-value {
            color: #ffcc00;
        }
        #hint-container {
            position: absolute;
            top: 30%;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        #hint {
            display: none;
            font-size: 36px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff0000, 2px 2px 4px #000;
            animation: pulse 0.5s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); opacity: 0.8; }
            to { transform: scale(1.1); opacity: 1; }
        }
        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        #game-over h1 {
            font-size: 64px;
            margin-bottom: 20px;
            color: #ffcc00;
        }
        #game-over p {
            font-size: 24px;
            margin: 10px 0;
        }
        #loading {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="game-container">
        <div id="loading">加载模型中...</div>
        <div id="hud" style="display: none;">
            <div class="hud-item">速度: <span id="speed" class="hud-value">0</span> km/h</div>
            <div class="hud-item">圈数: <span id="lap" class="hud-value">1/3</span></div>
            <div class="hud-item">检查点: <span id="checkpoints" class="hud-value">0/4</span></div>
            <div class="hud-item">排名: <span id="position" class="hud-value">1st</span></div>
            <div class="hud-item">当前圈时: <span id="lapTime" class="hud-value">0.0</span> s</div>
            <div class="hud-item">总用时: <span id="totalTime" class="hud-value">0.0</span> s</div>
        </div>
        <div id="hint-container">
            <div id="hint">Checkpoint 1/4</div>
        </div>
        <div id="game-over">
            <h1 id="go-title">比赛结束</h1>
            <p id="go-result"></p>
            <p id="go-time"></p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- 全局状态 ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            speed: 0,
            lap: 1,
            totalLaps: 3,
            checkpointsPassed: 0,
            totalCheckpoints: 0,
            position: 1,
            lapTime: 0,
            totalTime: 0,
            raceState: 'WAITING', // WAITING, RACING, FINISHED
            aiLap: 1,
            aiCheckpoints: 0,
            playerAngle: 0,
            aiAngle: 0
        };

        // --- 场景设置 ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 150);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 60;
        dirLight.shadow.camera.bottom = -60;
        dirLight.shadow.camera.left = -60;
        dirLight.shadow.camera.right = 60;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- 赛道构建 ---
        const TRACK_RADIUS = 40;
        const TRACK_WIDTH = 8;
        const INNER_RADIUS = TRACK_RADIUS - TRACK_WIDTH / 2;
        const OUTER_RADIUS = TRACK_RADIUS + TRACK_WIDTH / 2;

        // 沥青赛道
        const trackGeo = new THREE.RingGeometry(INNER_RADIUS, OUTER_RADIUS, 128);
        trackGeo.rotateX(-Math.PI / 2);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.receiveShadow = true;
        scene.add(track);

        // 草地
        const grassGeo = new THREE.PlaneGeometry(300, 300);
        grassGeo.rotateX(-Math.PI / 2);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x3b7a33, roughness: 1 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.position.y = -0.05;
        grass.receiveShadow = true;
        scene.add(grass);

        // 路缘石 (红白相间)
        const curbSegments = 120;
        for (let i = 0; i < curbSegments; i++) {
            const angle = (i / curbSegments) * Math.PI * 2;
            const color = i % 2 === 0 ? 0xff0000 : 0xffffff;
            const mat = new THREE.MeshStandardMaterial({ color });
            
            // 内侧
            const innerCurb = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 0.6), mat);
            innerCurb.position.set((INNER_RADIUS - 0.3) * Math.cos(angle), 0.05, (INNER_RADIUS - 0.3) * Math.sin(angle));
            innerCurb.rotation.y = -angle;
            innerCurb.receiveShadow = true;
            scene.add(innerCurb);

            // 外侧
            const outerCurb = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.2, 0.6), mat);
            outerCurb.position.set((OUTER_RADIUS + 0.3) * Math.cos(angle), 0.05, (OUTER_RADIUS + 0.3) * Math.sin(angle));
            outerCurb.rotation.y = -angle;
            outerCurb.receiveShadow = true;
            scene.add(outerCurb);
        }

        // 起终点线 (棋盘格)
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'white'; ctx.fillRect(0, 0, 256, 256);
        ctx.fillStyle = 'black';
        for (let i = 0; i < 8; i++) {
            for (let j = 0; j < 8; j++) {
                if ((i + j) % 2 === 0) ctx.fillRect(i * 32, j * 32, 32, 32);
            }
        }
        const checkerTex = new THREE.CanvasTexture(canvas);
        checkerTex.wrapS = THREE.RepeatWrapping;
        checkerTex.wrapT = THREE.RepeatWrapping;
        checkerTex.repeat.set(2, 8);
        const startLineGeo = new THREE.PlaneGeometry(TRACK_WIDTH, 2);
        startLineGeo.rotateX(-Math.PI / 2);
        const startLineMat = new THREE.MeshBasicMaterial({ map: checkerTex });
        const startLine = new THREE.Mesh(startLineGeo, startLineMat);
        startLine.position.set(TRACK_RADIUS, 0.02, 0);
        scene.add(startLine);

        // 检查点拱门
        const cpColors = [0xffff00, 0x0088ff, 0x00ff00, 0x800080];
        const cpAngles = [Math.PI / 2, Math.PI, Math.PI * 1.5, 0];
        const cpMaterials = [];

        for (let i = 0; i < 4; i++) {
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: cpColors[i], transparent: true, opacity: 0.3, side: THREE.DoubleSide });
            cpMaterials.push(mat);

            const pillarGeo = new THREE.BoxGeometry(0.5, 6, 0.5);
            const topGeo = new THREE.BoxGeometry(TRACK_WIDTH + 2, 0.5, 0.5);
            
            const p1 = new THREE.Mesh(pillarGeo, mat); p1.position.set(-(TRACK_WIDTH/2 + 0.5), 3, 0);
            const p2 = new THREE.Mesh(pillarGeo, mat); p2.position.set((TRACK_WIDTH/2 + 0.5), 3, 0);
            const top = new THREE.Mesh(topGeo, mat); top.position.set(0, 6, 0);
            
            group.add(p1, p2, top);
            group.position.set(TRACK_RADIUS * Math.cos(cpAngles[i]), 0, TRACK_RADIUS * Math.sin(cpAngles[i]));
            group.rotation.y = -cpAngles[i] + Math.PI / 2;
            scene.add(group);
        }

        // --- 玩家赛车 ---
        const playerGroup = new THREE.Group();
        scene.add(playerGroup);
        
        // 初始位置：起点线前，面向赛道切线方向 (+Z)
        let playerPos = new THREE.Vector3(TRACK_RADIUS, 0, -2);
        let playerHeading = Math.PI / 2; 
        let playerSpeed = 0;
        let playerTotalAngle = 0;
        let playerLastAngle = 0;

        // 占位模型 (加载失败或加载中显示)
        const placeholderGeo = new THREE.BoxGeometry(2, 1, 4);
        const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.y = 0.5;
        playerGroup.add(placeholder);

        // 加载 GLB
        const loader = new GLTFLoader();
        loader.load('assets/ferrari.glb', (gltf) => {
            const model = gltf.scene;
            // 假设模型需要缩放和调整朝向
            model.scale.set(1, 1, 1); 
            
            // 自动计算包围盒并调整中心和贴地
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            
            // 归一化大小到约 4 米长
            const scale = 4 / size.z;
            model.scale.setScalar(scale);
            
            model.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
            
            // 移除占位符，添加真实模型
            playerGroup.remove(placeholder);
            
            const wrapper = new THREE.Group();
            wrapper.add(model);
            // 确保模型面向 +Z (如果原模型不是)
            // wrapper.rotation.y = Math.PI; // 根据实际模型可能需要调整
            
            playerGroup.add(wrapper);
            
            // 开启阴影
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            window.__3D_STATE__.raceState = 'RACING';
            lastTime = performance.now();
            
        }, undefined, (error) => {
            console.error('模型加载失败，使用占位方块继续', error);
            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            window.__3D_STATE__.raceState = 'RACING';
            lastTime = performance.now();
        });

        // --- AI 对手 ---
        const aiGroup = new THREE.Group();
        const aiGeo = new THREE.BoxGeometry(1.8, 1, 3.8);
        const aiMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const aiMesh = new THREE.Mesh(aiGeo, aiMat);
        aiMesh.position.y = 0.5;
        aiMesh.castShadow = true;
        aiGroup.add(aiMesh);
        scene.add(aiGroup);

        let aiTotalAngle = -0.1; // 稍微落后一点起步
        let aiSpeed = 0;
        let aiTargetSpeed = 10;

        // --- 控制输入 ---
        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false;
        });

        // --- 游戏逻辑变量 ---
        const MAX_SPEED = 15;
        const MIN_SPEED = -3;
        const ACCELERATION = 8;
        const BRAKING = 12;
        const FRICTION = 0.98;
        const GRASS_FRICTION = 0.92;
        
        let lastTime = 0;
        let hintTimer = 0;
        let raceStartTime = 0;
        let currentLapStartTime = 0;

        // --- 更新函数 ---
        function updatePhysics(dt) {
            if (window.__3D_STATE__.raceState !== 'RACING') return;

            // --- 玩家物理 ---
            let currentFriction = FRICTION;
            
            // 离道检测
            const distFromCenter = Math.sqrt(playerPos.x * playerPos.x + playerPos.z * playerPos.z);
            if (distFromCenter < INNER_RADIUS || distFromCenter > OUTER_RADIUS) {
                currentFriction = GRASS_FRICTION;
            }

            // 加速/刹车
            if (keys.w) {
                playerSpeed += ACCELERATION * dt;
            } else if (keys.s) {
                playerSpeed -= BRAKING * dt;
            } else {
                // 自然减速
                playerSpeed *= Math.pow(currentFriction, dt * 60);
            }

            // 限制速度
            playerSpeed = THREE.MathUtils.clamp(playerSpeed, MIN_SPEED, MAX_SPEED);
            if (Math.abs(playerSpeed) < 0.1 && !keys.w && !keys.s) playerSpeed = 0;

            // 转向 (速度越快，转向越慢)
            if (Math.abs(playerSpeed) > 0.5) {
                const turnRate = 1.5 / (1 + Math.abs(playerSpeed) * 0.05);
                const turnDir = playerSpeed > 0 ? 1 : -1;
                if (keys.a) playerHeading += turnRate * dt * turnDir;
                if (keys.d) playerHeading -= turnRate * dt * turnDir;
            }

            // 更新位置
            playerPos.x += Math.cos(playerHeading) * playerSpeed * dt;
            playerPos.z += Math.sin(playerHeading) * playerSpeed * dt;

            playerGroup.position.copy(playerPos);
            // 使模型朝向运动方向
            const targetLook = playerPos.clone().add(new THREE.Vector3(Math.cos(playerHeading), 0, Math.sin(playerHeading)));
            playerGroup.lookAt(targetLook);

            // --- 玩家进度计算 ---
            let currentAngle = Math.atan2(playerPos.z, playerPos.x);
            if (currentAngle < 0) currentAngle += Math.PI * 2;
            
            if (playerSpeed !== 0) {
                let deltaAngle = currentAngle - playerLastAngle;
                if (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                if (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
                
                // 只有向前开才增加进度，防止倒车刷圈
                if (deltaAngle > 0 || playerTotalAngle > 0) {
                    playerTotalAngle += deltaAngle;
                }
            }
            playerLastAngle = currentAngle;
            window.__3D_STATE__.playerAngle = playerTotalAngle;

            // 检查点逻辑 (每 PI/2 一个检查点)
            const expectedTotalCPs = Math.floor(playerTotalAngle / (Math.PI / 2));
            if (expectedTotalCPs > window.__3D_STATE__.totalCheckpoints) {
                window.__3D_STATE__.totalCheckpoints = expectedTotalCPs;
                let cpIndex = expectedTotalCPs % 4;
                
                // 闪烁特效
                let matIndex = cpIndex === 0 ? 3 : cpIndex - 1;
                cpMaterials[matIndex].opacity = 0.8;
                
                // HUD 提示
                const hintEl = document.getElementById('hint');
                if (cpIndex === 0) {
                    hintEl.innerText = `Lap ${window.__3D_STATE__.lap} Complete!`;
                    window.__3D_STATE__.lap++;
                    window.__3D_STATE__.lapTime = window.__3D_STATE__.totalTime - currentLapStartTime;
                    currentLapStartTime = window.__3D_STATE__.totalTime;
                    
                    if (window.__3D_STATE__.lap > window.__3D_STATE__.totalLaps) {
                        endGame(true);
                    }
                } else {
                    hintEl.innerText = `Checkpoint ${cpIndex}/4`;
                }
                hintEl.style.display = 'block';
                hintTimer = 1.5;
            }
            window.__3D_STATE__.checkpointsPassed = window.__3D_STATE__.totalCheckpoints % 4;

            // --- AI 物理与逻辑 ---
            // 随机波动速度
            if (Math.random() < 0.02) aiTargetSpeed = 8 + Math.random() * 4;
            aiSpeed += (aiTargetSpeed - aiSpeed) * 2 * dt;
            
            const aiAngularSpeed = aiSpeed / TRACK_RADIUS;
            aiTotalAngle += aiAngularSpeed * dt;
            window.__3D_STATE__.aiAngle = aiTotalAngle;

            aiGroup.position.x = TRACK_RADIUS * Math.cos(aiTotalAngle);
            aiGroup.position.z = TRACK_RADIUS * Math.sin(aiTotalAngle);
            aiGroup.rotation.y = -aiTotalAngle + Math.PI; // 面向切线

            const aiTotalCPs = Math.floor(aiTotalAngle / (Math.PI / 2));
            window.__3D_STATE__.aiCheckpoints = aiTotalCPs % 4;
            window.__3D_STATE__.aiLap = Math.floor(aiTotalCPs / 4) + 1;

            if (window.__3D_STATE__.aiLap > window.__3D_STATE__.totalLaps && window.__3D_STATE__.raceState === 'RACING') {
                endGame(false);
            }

            // --- 排名计算 ---
            if (playerTotalAngle >= aiTotalAngle) {
                window.__3D_STATE__.position = 1;
            } else {
                window.__3D_STATE__.position = 2;
            }

            // --- 时间更新 ---
            window.__3D_STATE__.totalTime += dt;
            window.__3D_STATE__.lapTime = window.__3D_STATE__.totalTime - currentLapStartTime;

            // --- 摄像机跟随 ---
            const camOffset = new THREE.Vector3(-Math.cos(playerHeading) * 10, 4, -Math.sin(playerHeading) * 10);
            const targetCamPos = playerPos.clone().add(camOffset);
            camera.position.lerp(targetCamPos, 5 * dt);
            camera.lookAt(playerPos.clone().add(new THREE.Vector3(0, 1, 0)));
        }

        function updateHUD(dt) {
            if (window.__3D_STATE__.raceState !== 'RACING') return;

            window.__3D_STATE__.speed = Math.abs(Math.round(playerSpeed * 3.6)); // m/s to km/h

            document.getElementById('speed').innerText = window.__3D_STATE__.speed;
            document.getElementById('lap').innerText = `${Math.min(window.__3D_STATE__.lap, 3)}/3`;
            document.getElementById('checkpoints').innerText = `${window.__3D_STATE__.checkpointsPassed}/4`;
            document.getElementById('position').innerText = window.__3D_STATE__.position === 1 ? '1st' : '2nd';
            document.getElementById('lapTime').innerText = window.__3D_STATE__.lapTime.toFixed(1);
            document.getElementById('totalTime').innerText = window.__3D_STATE__.totalTime.toFixed(1);

            // 提示文字消失逻辑
            if (hintTimer > 0) {
                hintTimer -= dt;
                if (hintTimer <= 0) {
                    document.getElementById('hint').style.display = 'none';
                }
            }

            // 材质透明度恢复
            cpMaterials.forEach(mat => {
                if (mat.opacity > 0.3) {
                    mat.opacity -= dt * 0.5;
                }
            });
        }

        function endGame(playerWon) {
            window.__3D_STATE__.raceState = 'FINISHED';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('hint').style.display = 'none';
            
            const goScreen = document.getElementById('game-over');
            goScreen.style.display = 'flex';
            
            document.getElementById('go-title').innerText = playerWon ? "你赢了！" : "AI 获胜！";
            document.getElementById('go-title').style.color = playerWon ? "#00ff00" : "#ff0000";
            document.getElementById('go-result').innerText = `最终排名: ${window.__3D_STATE__.position === 1 ? '1st' : '2nd'}`;
            document.getElementById('go-time').innerText = `总用时: ${window.__3D_STATE__.totalTime.toFixed(1)} 秒`;
        }

        // --- 主循环 ---
        function animate(time) {
            requestAnimationFrame(animate);

            const dt = (time - lastTime) / 1000 || 0;
            lastTime = time;

            // 限制最大 dt 防止卡顿时物理穿透
            const safeDt = Math.min(dt, 0.1);

            if (window.__3D_STATE__.modelLoaded) {
                updatePhysics(safeDt);
                updateHUD(safeDt);
            }

            renderer.render(scene, camera);
        }

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 启动循环
        requestAnimationFrame(animate);

    </script>
</body>
</html>
