<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Parkour Runner with Undo/Redo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
    }

    #controls {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      background: white;
      color: #222;
    }

    button:hover {
      background: #f0f0f0;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      background: rgba(0,0,0,0.2);
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="stats">Platform: -1/19 | Moves: 0 | Undos: 0 | Redos: 0</div>
    <div id="controls">
      <button id="undoBtn">Undo (Z)</button>
      <button id="redoBtn">Redo (Y)</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>
  <div id="loading">Loading model...</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer;
    let runner = null;
    let platforms = [];
    let clock = new THREE.Clock();

    const runnerHalfHeight = 0.5;
    const gravity = 25;
    const keys = {};

    let velocity = new THREE.Vector3(0, 0, 0);
    let grounded = false;
    let currentPlatform = -1;
    let lastLandedPlatform = -1;

    let moveCount = 0;
    let undoCount = 0;
    let redoCount = 0;
    let fallen = false;
    let modelLoaded = false;

    let undoStack = [];
    let redoStack = [];

    const statsEl = document.getElementById("stats");
    const loadingEl = document.getElementById("loading");

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color("#87CEEB");

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(10, 20, 10);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      scene.add(dirLight);

      createPlatforms();
      loadRunner();

      window.addEventListener("resize", onResize);

      window.addEventListener("keydown", (e) => {
        const key = e.key.toLowerCase();
        keys[key] = true;

        if (key === "z") {
          performUndo();
        } else if (key === "y") {
          performRedo();
        } else if (e.code === "Space") {
          e.preventDefault();
          if (runner && grounded) {
            velocity.y = 10;
            grounded = false;
            currentPlatform = -1;
          }
        }
      });

      window.addEventListener("keyup", (e) => {
        keys[e.key.toLowerCase()] = false;
      });

      document.getElementById("undoBtn").addEventListener("click", performUndo);
      document.getElementById("redoBtn").addEventListener("click", performRedo);
      document.getElementById("resetBtn").addEventListener("click", resetGame);

      updateHUD();
      updateExposedState();
    }

    function createPlatforms() {
      const geometry = new THREE.BoxGeometry(3, 0.5, 3);
      const material = new THREE.MeshStandardMaterial({ color: "#44aa44" });

      for (let i = 0; i < 20; i++) {
        const platform = new THREE.Mesh(geometry, material);
        platform.position.set(
          i * 4,
          Math.sin(i * 0.5) * 2,
          Math.cos(i * 0.3) * 3
        );
        platform.castShadow = true;
        platform.receiveShadow = true;
        scene.add(platform);
        platforms.push(platform);
      }
    }

    function loadRunner() {
      const loader = new GLTFLoader();
      loader.load(
        "MosquitoInAmber.glb",
        (gltf) => {
          runner = gltf.scene;
          runner.scale.set(0.5, 0.5, 0.5);

          runner.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
            }
          });

          scene.add(runner);
          placeRunnerOnPlatform(0);
          currentPlatform = 0;
          lastLandedPlatform = 0;
          grounded = true;
          modelLoaded = true;

          saveSnapshot();
          updateHUD();
          updateExposedState();
          loadingEl.style.display = "none";
        },
        undefined,
        (err) => {
          console.error("Failed to load MosquitoInAmber.glb:", err);

          const fallback = new THREE.Mesh(
            new THREE.BoxGeometry(1, 1, 1),
            new THREE.MeshStandardMaterial({ color: 0xff5533 })
          );
          fallback.castShadow = true;
          fallback.receiveShadow = true;
          runner = fallback;
          scene.add(runner);

          placeRunnerOnPlatform(0);
          currentPlatform = 0;
          lastLandedPlatform = 0;
          grounded = true;
          modelLoaded = false;

          saveSnapshot();
          updateHUD();
          updateExposedState();
          loadingEl.textContent = "Model failed to load. Using fallback cube.";
          setTimeout(() => loadingEl.style.display = "none", 1500);
        }
      );
    }

    function placeRunnerOnPlatform(index) {
      const p = platforms[index];
      if (!p || !runner) return;
      runner.position.set(
        p.position.x,
        p.position.y + 0.25 + runnerHalfHeight,
        p.position.z
      );
      velocity.set(0, 0, 0);
      grounded = true;
      currentPlatform = index;
    }

    function getSnapshot() {
      if (!runner) return null;
      return {
        position: {
          x: runner.position.x,
          y: runner.position.y,
          z: runner.position.z
        },
        velocity: {
          x: velocity.x,
          y: velocity.y,
          z: velocity.z
        },
        currentPlatform,
        moveCount
      };
    }

    function applySnapshot(snapshot) {
      if (!runner || !snapshot) return;
      runner.position.set(
        snapshot.position.x,
        snapshot.position.y,
        snapshot.position.z
      );
      velocity.set(
        snapshot.velocity.x,
        snapshot.velocity.y,
        snapshot.velocity.z
      );
      currentPlatform = snapshot.currentPlatform;
      moveCount = snapshot.moveCount;
      grounded = currentPlatform !== -1;
      lastLandedPlatform = currentPlatform;
      fallen = false;
      updateHUD();
      updateExposedState();
    }

    function saveSnapshot() {
      const snap = getSnapshot();
      if (snap) undoStack.push(snap);
    }

    function performUndo() {
      if (!runner || undoStack.length === 0) return;

      const current = getSnapshot();
      const snapshot = undoStack.pop();
      if (current) redoStack.push(current);

      applySnapshot(snapshot);
      undoCount++;
      fallen = false;
      updateHUD();
    }

    function performRedo() {
      if (!runner || redoStack.length === 0) return;

      const current = getSnapshot();
      const snapshot = redoStack.pop();
      if (current) undoStack.push(current);

      applySnapshot(snapshot);
      redoCount++;
      fallen = false;
      updateHUD();
    }

    function resetGame() {
      if (!runner) return;
      placeRunnerOnPlatform(0);
      currentPlatform = 0;
      lastLandedPlatform = 0;
      moveCount = 0;
      undoCount = 0;
      redoCount = 0;
      fallen = false;
      grounded = true;
      velocity.set(0, 0, 0);
      undoStack = [];
      redoStack = [];
      saveSnapshot();
      updateHUD();
      updateExposedState();
    }

    function handleMovement(dt) {
      if (!runner) return;

      let moveX = 0;
      let moveZ = 0;

      if (keys["a"] || keys["arrowleft"]) moveZ -= 6;
      if (keys["d"] || keys["arrowright"]) moveZ += 6;
      if (keys["w"] || keys["arrowup"]) moveX += 8;
      if (keys["s"] || keys["arrowdown"]) moveX -= 4;

      velocity.x = moveX;
      velocity.z = moveZ;

      velocity.y -= gravity * dt;

      runner.position.x += velocity.x * dt;
      runner.position.y += velocity.y * dt;
      runner.position.z += velocity.z * dt;

      grounded = false;
      let detectedPlatform = -1;

      for (let i = 0; i < platforms.length; i++) {
        const p = platforms[i];
        const withinX = Math.abs(runner.position.x - p.position.x) <= 1.5;
        const withinZ = Math.abs(runner.position.z - p.position.z) <= 1.5;
        const platformTop = p.position.y + 0.25 + runnerHalfHeight;

        if (withinX && withinZ && runner.position.y <= platformTop && velocity.y <= 0) {
          runner.position.y = platformTop;
          velocity.y = 0;
          grounded = true;
          detectedPlatform = i;
          break;
        }
      }

      currentPlatform = detectedPlatform;

      if (grounded && currentPlatform !== -1 && currentPlatform !== lastLandedPlatform) {
        moveCount++;
        saveSnapshot();
        redoStack = [];
        lastLandedPlatform = currentPlatform;
      }

      if (!grounded && currentPlatform === -1) {
        // airborne
      }

      if (runner.position.y < -10) {
        fallen = true;
        if (undoStack.length > 0) {
          performUndo();
        } else {
          resetGame();
        }
      }
    }

    function updateCamera() {
      if (!runner) return;
      const targetPos = new THREE.Vector3(
        runner.position.x,
        runner.position.y + 8,
        runner.position.z + 15
      );
      camera.position.lerp(targetPos, 0.05);
      camera.lookAt(runner.position.x, runner.position.y, runner.position.z);
    }

    function updateHUD() {
      statsEl.textContent =
        `Platform: ${currentPlatform}/19 | Moves: ${moveCount} | Undos: ${undoCount} | Redos: ${redoCount}`;
    }

    function updateExposedState() {
      const elapsed = clock.getElapsedTime();
      window.__3D_STATE__ = {
        runnerX: runner ? +runner.position.x.toFixed(2) : 0,
        runnerY: runner ? +runner.position.y.toFixed(2) : 0,
        runnerZ: runner ? +runner.position.z.toFixed(2) : 0,
        velocityY: +velocity.y.toFixed(2),
        grounded,
        currentPlatform,
        moveCount,
        undoCount,
        redoCount,
        undoStackSize: undoStack.length,
        redoStackSize: redoStack.length,
        platformCount: 20,
        modelLoaded,
        fallen,
        gameTime: +elapsed.toFixed(2)
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      if (runner) {
        handleMovement(dt);
        updateCamera();
      }

      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
