<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parkour Runner - Undo/Redo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    background: rgba(0,0,0,0.6);
    padding: 12px 16px;
    border-radius: 8px;
    pointer-events: none;
    text-shadow: 1px 1px 2px #000;
    line-height: 1.6;
}
#controls {
    position: absolute;
    top: 10px;
    right: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
#controls button {
    padding: 10px 20px;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    border: 2px solid #fff;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    min-width: 120px;
}
#undoBtn {
    background: #e67e22;
    color: #fff;
}
#undoBtn:hover { background: #d35400; }
#redoBtn {
    background: #3498db;
    color: #fff;
}
#redoBtn:hover { background: #2980b9; }
#resetBtn {
    background: #e74c3c;
    color: #fff;
}
#resetBtn:hover { background: #c0392b; }
#instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: rgba(0,0,0,0.6);
    padding: 10px 16px;
    border-radius: 8px;
    text-align: center;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    Platform: 0/19 | Moves: 0 | Undos: 0 | Redos: 0
</div>

<div id="controls">
    <button id="undoBtn">Undo (Z)</button>
    <button id="redoBtn">Redo (Y)</button>
    <button id="resetBtn">Reset</button>
</div>

<div id="instructions">
    WASD / Arrow Keys: Move | Space: Jump | Z: Undo | Y: Redo
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// Fog for atmosphere
scene.fog = new THREE.Fog(0x87CEEB, 50, 120);

// Platforms
const platforms = [];
const platformData = [];
const platformGeometry = new THREE.BoxGeometry(3, 0.5, 3);

for (let i = 0; i < 20; i++) {
    const x = i * 4;
    const y = Math.sin(i * 0.5) * 2;
    const z = Math.cos(i * 0.3) * 3;

    const material = new THREE.MeshStandardMaterial({
        color: 0x44aa44,
        roughness: 0.7,
        metalness: 0.1
    });

    // Add number label effect via slight color variation
    if (i === 0) material.color.set(0x66cc66);
    if (i === 19) material.color.set(0xffcc00);

    const platform = new THREE.Mesh(platformGeometry, material);
    platform.position.set(x, y, z);
    platform.castShadow = true;
    platform.receiveShadow = true;
    scene.add(platform);

    platforms.push(platform);
    platformData.push({ x, y, z });

    // Add edge glow
    const edges = new THREE.EdgesGeometry(platformGeometry);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x88ff88, transparent: true, opacity: 0.5 });
    const line = new THREE.LineSegments(edges, lineMat);
    line.position.copy(platform.position);
    scene.add(line);

    // Platform number indicator
    const indicatorGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const indicatorMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 0.5
    });
    const indicator = new THREE.Mesh(indicatorGeo, indicatorMat);
    indicator.position.set(x, y + 0.5, z);
    scene.add(indicator);
}

// Runner state
let runner = null;
let modelLoaded = false;
const runnerHalfHeight = 0.5;

const state = {
    position: { x: platformData[0].x, y: platformData[0].y + 0.25 + runnerHalfHeight, z: platformData[0].z },
    velocity: { x: 0, y: 0, z: 0 },
    grounded: true,
    currentPlatform: 0,
    moveCount: 0,
    undoCount: 0,
    redoCount: 0,
    fallen: false
};

const undoStack = [];
const redoStack = [];

let gameTime = 0;

// Placeholder runner (used before model loads)
const placeholderGeo = new THREE.CapsuleGeometry(0.3, 0.6, 8, 16);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xff8800, emissive: 0xff4400, emissiveIntensity: 0.3 });
const placeholderMesh = new THREE.Mesh(placeholderGeo, placeholderMat);
placeholderMesh.castShadow = true;
placeholderMesh.position.set(state.position.x, state.position.y, state.position.z);
scene.add(placeholderMesh);
runner = placeholderMesh;

// Load GLB model
const loader = new GLTFLoader();
loader.load(
    'MosquitoInAmber.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5);
        model.castShadow = true;
        model.receiveShadow = true;
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        model.position.set(state.position.x, state.position.y, state.position.z);
        scene.add(model);
        scene.remove(placeholderMesh);
        runner = model;
        modelLoaded = true;
        console.log('Model loaded successfully');
    },
    (progress) => {
        console.log('Loading:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load MosquitoInAmber.glb, using placeholder:', error.message);
        modelLoaded = false;
    }
);

// Input handling
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') e.preventDefault();
    if (e.code === 'KeyZ') performUndo();
    if (e.code === 'KeyY') performRedo();
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// Snapshot functions
function createSnapshot() {
    return {
        position: { ...state.position },
        velocity: { x: 0, y: 0, z: 0 },
        currentPlatform: state.currentPlatform,
        moveCount: state.moveCount
    };
}

function applySnapshot(snapshot) {
    state.position.x = snapshot.position.x;
    state.position.y = snapshot.position.y;
    state.position.z = snapshot.position.z;
    state.velocity.x = snapshot.velocity.x;
    state.velocity.y = snapshot.velocity.y;
    state.velocity.z = snapshot.velocity.z;
    state.currentPlatform = snapshot.currentPlatform;
    state.moveCount = snapshot.moveCount;
    state.grounded = true;
    state.fallen = false;
}

function performUndo() {
    if (undoStack.length === 0) return;
    const currentSnap = createSnapshot();
    redoStack.push(currentSnap);
    const prevSnap = undoStack.pop();
    applySnapshot(prevSnap);
    state.undoCount++;
}

function performRedo() {
    if (redoStack.length === 0) return;
    const currentSnap = createSnapshot();
    undoStack.push(currentSnap);
    const nextSnap = redoStack.pop();
    applySnapshot(nextSnap);
    state.redoCount++;
}

function resetGame() {
    state.position.x = platformData[0].x;
    state.position.y = platformData[0].y + 0.25 + runnerHalfHeight;
    state.position.z = platformData[0].z;
    state.velocity.x = 0;
    state.velocity.y = 0;
    state.velocity.z = 0;
    state.grounded = true;
    state.currentPlatform = 0;
    state.moveCount = 0;
    state.undoCount = 0;
    state.redoCount = 0;
    state.fallen = false;
    undoStack.length = 0;
    redoStack.length = 0;
}

// Button handlers
document.getElementById('undoBtn').addEventListener('click', performUndo);
document.getElementById('redoBtn').addEventListener('click', performRedo);
document.getElementById('resetBtn').addEventListener('click', resetGame);

// Save initial state
undoStack.push(createSnapshot());

// HUD
const hudEl = document.getElementById('hud');

function updateHUD() {
    hudEl.innerHTML = `Platform: ${state.currentPlatform}/19 | Moves: ${state.moveCount}<br>Undos: ${state.undoCount} | Redos: ${state.redoCount}<br>Undo Stack: ${undoStack.length} | Redo Stack: ${redoStack.length}`;
}

// Expose global state
window.__3D_STATE__ = {};

function updateGlobalState() {
    window.__3D_STATE__ = {
        runnerX: parseFloat(state.position.x.toFixed(2)),
        runnerY: parseFloat(state.position.y.toFixed(2)),
        runnerZ: parseFloat(state.position.z.toFixed(2)),
        velocityY: parseFloat(state.velocity.y.toFixed(2)),
        grounded: state.grounded,
        currentPlatform: state.currentPlatform,
        moveCount: state.moveCount,
        undoCount: state.undoCount,
        redoCount: state.redoCount,
        undoStackSize: undoStack.length,
        redoStackSize: redoStack.length,
        platformCount: 20,
        modelLoaded: modelLoaded,
        fallen: state.fallen,
        gameTime: parseFloat(gameTime.toFixed(2))
    };
}

// Platform collision check
function checkPlatformCollision() {
    let landedPlatform = -1;

    for (let i = 0; i < platformData.length; i++) {
        const p = platformData[i];
        const dx = Math.abs(state.position.x - p.x);
        const dz = Math.abs(state.position.z - p.z);
        const platformTop = p.y + 0.25;

        if (dx <= 1.5 && dz <= 1.5) {
            // Check if runner is at or below platform top + half height, and was above
            if (state.position.y <= platformTop + runnerHalfHeight && state.position.y >= platformTop - 0.5) {
                if (state.velocity.y <= 0) {
                    state.position.y = platformTop + runnerHalfHeight;
                    state.velocity.y = 0;
                    state.grounded = true;
                    landedPlatform = i;
                    break;
                }
            }
        }
    }

    if (landedPlatform >= 0 && landedPlatform !== state.currentPlatform) {
        const prevPlatform = state.currentPlatform;
        // Save snapshot before changing platform
        undoStack.push(createSnapshot());
        state.currentPlatform = landedPlatform;
        state.moveCount++;
        // Clear redo stack on new move
        redoStack.length = 0;
    } else if (landedPlatform >= 0) {
        state.currentPlatform = landedPlatform;
    }

    if (landedPlatform < 0) {
        state.grounded = false;
    }
}

// Particle system for landing effects
const particleGeometry = new THREE.BufferGeometry();
const particleCount = 50;
const particlePositions = new Float32Array(particleCount * 3);
const particleVelocities = [];
const particleMaterial = new THREE.PointsMaterial({
    color: 0x88ff88,
    size: 0.15,
    transparent: true,
    opacity: 0.8
});
particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);
let particleLife = 0;

function spawnParticles(x, y, z) {
    particleLife = 1.0;
    for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = x + (Math.random() - 0.5) * 2;
        particlePositions[i * 3 + 1] = y;
        particlePositions[i * 3 + 2] = z + (Math.random() - 0.5) * 2;
        particleVelocities[i] = {
            x: (Math.random() - 0.5) * 4,
            y: Math.random() * 5 + 2,
            z: (Math.random() - 0.5) * 4
        };
    }
    particleGeometry.attributes.position.needsUpdate = true;
}

// Animation loop
const clock = new THREE.Clock();
let prevGrounded = true;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05);
    gameTime += dt;

    // Input
    let moveX = 0;
    let moveZ = 0;

    if (keys['KeyA'] || keys['ArrowLeft']) moveZ = -6;
    if (keys['KeyD'] || keys['ArrowRight']) moveZ = 6;
    if (keys['KeyW'] || keys['ArrowUp']) moveX = 8;
    if (keys['KeyS'] || keys['ArrowDown']) moveX = -4;
    if ((keys['Space']) && state.grounded) {
        state.velocity.y = 10;
        state.grounded = false;
    }

    // Apply movement
    state.velocity.x = moveX;
    state.velocity.z = moveZ;

    // Gravity
    if (!state.grounded) {
        state.velocity.y -= 25 * dt;
    }

    // Update position
    state.position.x += state.velocity.x * dt;
    state.position.y += state.velocity.y * dt;
    state.position.z += state.velocity.z * dt;

    // Check collision
    const wasGrounded = state.grounded;
    checkPlatformCollision();

    // Landing particles
    if (!wasGrounded && state.grounded) {
        spawnParticles(state.position.x, state.position.y - runnerHalfHeight, state.position.z);
    }

    // Fall detection
    if (state.position.y < -10) {
        state.fallen = true;
        performUndo();
    }

    // Update runner mesh
    if (runner) {
        runner.position.set(state.position.x, state.position.y, state.position.z);

        // Slight rotation based on movement
        if (moveX !== 0 || moveZ !== 0) {
            const targetRotY = Math.atan2(moveZ, moveX);
            runner.rotation.y += (targetRotY - runner.rotation.y) * 0.1;
        }

        // Bob animation when grounded
        if (state.grounded && (moveX !== 0 || moveZ !== 0)) {
            runner.position.y += Math.sin(gameTime * 10) * 0.05;
        }
    }

    // Camera follow
    const camTargetX = state.position.x;
    const camTargetY = state.position.y + 8;
    const camTargetZ = state.position.z + 15;

    camera.position.x += (camTargetX - camera.position.x) * 0.05;
    camera.position.y += (camTargetY - camera.position.y) * 0.05;
    camera.position.z += (camTargetZ - camera.position.z) * 0.05;

    camera.lookAt(state.position.x, state.position.y, state.position.z);

    // Update directional light to follow
    dirLight.position.set(state.position.x + 10, 20, state.position.z + 10);
    dirLight.target.position.set(state.position.x, state.position.y, state.position.z);
    dirLight.target.updateMatrixWorld();

    // Update particles
    if (particleLife > 0) {
        particleLife -= dt * 2;
        particleMaterial.opacity = Math.max(0, particleLife);
        for (let i = 0; i < particleCount; i++) {
            if (particleVelocities[i]) {
                particlePositions[i * 3] += particleVelocities[i].x * dt;
                particlePositions[i * 3 + 1] += particleVelocities[i].y * dt;
                particlePositions[i * 3 + 2] += particleVelocities[i].z * dt;
                particleVelocities[i].y -= 9.8 * dt;
            }
        }
        particleGeometry.attributes.position.needsUpdate = true;
    }

    // Animate platform indicators
    platforms.forEach((p, i) => {
        if (i === state.currentPlatform) {
            p.material.emissive = new THREE.Color(0x224422);
            p.material.emissiveIntensity = 0.3 + Math.sin(gameTime * 4) * 0.2;
        } else {
            p.material.emissive = new THREE.Color(0x000000);
            p.material.emissiveIntensity = 0;
        }
    });

    updateHUD();
    updateGlobalState();

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
