<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Wave Interference Pattern</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    line-height: 1.8;
    pointer-events: none;
    z-index: 100;
    min-width: 280px;
  }
  #hud .label { color: #888; }
  #hud .value { color: #0ff; }
  #hud .paused-indicator { color: #ff4444; font-weight: bold; }
  #hud .title {
    font-size: 16px;
    color: #0ff;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
    margin-bottom: 5px;
  }
  #controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 10px 15px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    line-height: 1.6;
    pointer-events: none;
    z-index: 100;
  }
  #controls-help kbd {
    background: rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 3px;
    color: #fff;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="title">🌊 Wave Interference Simulator</div>
  <div><span class="label">Time:       </span><span class="value" id="hud-time">0.000</span></div>
  <div><span class="label">Frequency:  </span><span class="value" id="hud-frequency">1.00</span> <span class="label">Hz</span></div>
  <div><span class="label">Wavelength: </span><span class="value" id="hud-wavelength">8.00</span></div>
  <div><span class="label">Amplitude:  </span><span class="value" id="hud-amplitude">2.00</span></div>
  <div><span class="label">Time Scale: </span><span class="value" id="hud-timescale">1.00</span><span class="label">x</span></div>
  <div><span class="label">Status:     </span><span id="hud-paused" class="value">▶ Playing</span></div>
</div>

<div id="controls-help">
  <kbd>SPACE</kbd> Pause/Play &nbsp; <kbd>R</kbd> Reset<br>
  <kbd>↑↓</kbd> Frequency ±0.1 &nbsp; <kbd>←→</kbd> Time Scale ±0.25<br>
  <kbd>W/S</kbd> Wavelength ±1.0 &nbsp; <kbd>A/D</kbd> Amplitude ±0.5
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 40, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 30, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// --- Wave Parameters ---
let amplitude = 2.0;
let wavelength = 8.0;
let frequency = 1.0;
let simTime = 0;
let timeScale = 1.0;
let paused = false;
let previousTimeScale = 1.0;
let frameCount = 0;
let storkLoaded = false;

const DEFAULTS = { amplitude: 2.0, wavelength: 8.0, frequency: 1.0, timeScale: 1.0 };

const sourceAPos = new THREE.Vector3(-12, 0, 0);
const sourceBPos = new THREE.Vector3(12, 0, 0);

// --- Source Markers ---
const sourceMat = new THREE.MeshPhongMaterial({ color: 0xff2222, emissive: 0xff0000, emissiveIntensity: 0.5 });
const sourceGeo = new THREE.SphereGeometry(0.5, 16, 16);

const sourceAMesh = new THREE.Mesh(sourceGeo, sourceMat);
sourceAMesh.position.copy(sourceAPos);
sourceAMesh.position.y = 0.5;
scene.add(sourceAMesh);

const sourceBMesh = new THREE.Mesh(sourceGeo, sourceMat);
sourceBMesh.position.copy(sourceBPos);
sourceBMesh.position.y = 0.5;
scene.add(sourceBMesh);

// --- Wave Plane ---
const planeSegW = 200;
const planeSegH = 200;
const planeGeo = new THREE.PlaneGeometry(60, 60, planeSegW, planeSegH);
planeGeo.rotateX(-Math.PI / 2);

const vertexCount = planeGeo.attributes.position.count;
const colors = new Float32Array(vertexCount * 3);
planeGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const planeMat = new THREE.MeshPhongMaterial({
  vertexColors: true,
  shininess: 80,
  transparent: true,
  opacity: 0.85,
  side: THREE.DoubleSide,
  specular: 0x444444
});

const planeMesh = new THREE.Mesh(planeGeo, planeMat);
scene.add(planeMesh);

// --- Grid helper for visual reference ---
const gridHelper = new THREE.GridHelper(60, 30, 0x222244, 0x111133);
gridHelper.position.y = -3;
scene.add(gridHelper);

// --- Load Stork ---
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Stork.glb',
  (gltf) => {
    const stork = gltf.scene;
    stork.scale.set(2, 2, 2);
    stork.position.set(20, 8, -20);
    scene.add(stork);
    storkLoaded = true;

    // If there's an animation, play it
    if (gltf.animations && gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(stork);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
      window.__storkMixer = mixer;
    }
  },
  undefined,
  (error) => {
    console.warn('Could not load stork.glb:', error);
    // Create a simple placeholder bird shape
    const birdGroup = new THREE.Group();
    const bodyGeo = new THREE.ConeGeometry(0.5, 2, 8);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.z = Math.PI / 2;
    birdGroup.add(body);

    const wingGeo = new THREE.PlaneGeometry(3, 0.8);
    const wingMat = new THREE.MeshPhongMaterial({ color: 0xdddddd, side: THREE.DoubleSide });
    const wing1 = new THREE.Mesh(wingGeo, wingMat);
    wing1.position.y = 0.3;
    wing1.rotation.x = 0.2;
    birdGroup.add(wing1);

    birdGroup.scale.set(2, 2, 2);
    birdGroup.position.set(20, 8, -20);
    scene.add(birdGroup);
    storkLoaded = true;
  }
);

// --- State ---
window.__3D_STATE__ = {
  simTime: 0,
  frequency: frequency,
  wavelength: wavelength,
  amplitude: amplitude,
  timeScale: timeScale,
  paused: false,
  sourceA: { x: sourceAPos.x, y: sourceAPos.y, z: sourceAPos.z },
  sourceB: { x: sourceBPos.x, y: sourceBPos.y, z: sourceBPos.z },
  maxDisplacement: 0,
  minDisplacement: 0,
  vertexCount: vertexCount,
  storkLoaded: false,
  frameCount: 0,
  waveEnergy: 0
};

// --- HUD Elements ---
const hudTime = document.getElementById('hud-time');
const hudFreq = document.getElementById('hud-frequency');
const hudWave = document.getElementById('hud-wavelength');
const hudAmp = document.getElementById('hud-amplitude');
const hudScale = document.getElementById('hud-timescale');
const hudPaused = document.getElementById('hud-paused');

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      if (paused) {
        paused = false;
        timeScale = previousTimeScale > 0 ? previousTimeScale : 1.0;
      } else {
        previousTimeScale = timeScale > 0 ? timeScale : 1.0;
        paused = true;
        timeScale = 0;
      }
      break;
    case 'ArrowUp':
      e.preventDefault();
      frequency = Math.min(3.0, Math.round((frequency + 0.1) * 10) / 10);
      break;
    case 'ArrowDown':
      e.preventDefault();
      frequency = Math.max(0.1, Math.round((frequency - 0.1) * 10) / 10);
      break;
    case 'ArrowRight':
      e.preventDefault();
      timeScale = Math.min(3.0, Math.round((timeScale + 0.25) * 100) / 100);
      if (timeScale > 0) {
        paused = false;
        previousTimeScale = timeScale;
      }
      break;
    case 'ArrowLeft':
      e.preventDefault();
      timeScale = Math.max(0.0, Math.round((timeScale - 0.25) * 100) / 100);
      if (timeScale === 0) {
        paused = true;
      } else {
        paused = false;
        previousTimeScale = timeScale;
      }
      break;
    case 'KeyR':
      simTime = 0;
      amplitude = DEFAULTS.amplitude;
      wavelength = DEFAULTS.wavelength;
      frequency = DEFAULTS.frequency;
      timeScale = DEFAULTS.timeScale;
      paused = false;
      previousTimeScale = DEFAULTS.timeScale;
      break;
    case 'KeyW':
      wavelength = Math.min(20.0, wavelength + 1.0);
      break;
    case 'KeyS':
      wavelength = Math.max(2.0, wavelength - 1.0);
      break;
    case 'KeyA':
      amplitude = Math.min(5.0, Math.round((amplitude + 0.5) * 10) / 10);
      break;
    case 'KeyD':
      amplitude = Math.max(0.5, Math.round((amplitude - 0.5) * 10) / 10);
      break;
  }
});

// --- Wave Computation ---
function updateWaves() {
  const positions = planeGeo.attributes.position.array;
  const colorsArr = planeGeo.attributes.color.array;

  const k = (2 * Math.PI) / wavelength;
  const omega = 2 * Math.PI * frequency;

  let maxDisp = -Infinity;
  let minDisp = Infinity;
  let waveEnergy = 0;

  for (let i = 0; i < vertexCount; i++) {
    const ix = i * 3;
    const iy = i * 3 + 1;
    const iz = i * 3 + 2;

    const vx = positions[ix];
    const vz = positions[iz];

    // Distance from source A
    const dxA = vx - sourceAPos.x;
    const dzA = vz - sourceAPos.z;
    const rA = Math.sqrt(dxA * dxA + dzA * dzA);
    const dampA = Math.max(Math.sqrt(rA), 0.5);
    const yA = amplitude * Math.sin(k * rA - omega * simTime) / dampA;

    // Distance from source B
    const dxB = vx - sourceBPos.x;
    const dzB = vz - sourceBPos.z;
    const rB = Math.sqrt(dxB * dxB + dzB * dzB);
    const dampB = Math.max(Math.sqrt(rB), 0.5);
    const yB = amplitude * Math.sin(k * rB - omega * simTime) / dampB;

    let y = yA + yB;

    // Clamp to prevent extreme values
    y = Math.max(-10, Math.min(10, y));

    // NaN check
    if (isNaN(y) || !isFinite(y)) y = 0;

    positions[iy] = y;

    if (y > maxDisp) maxDisp = y;
    if (y < minDisp) minDisp = y;
    waveEnergy += y * y;

    // Color based on displacement
    let r, g, b;
    if (y < -0.5) {
      // Trough: blue
      const t = Math.min(1.0, Math.max(0.0, (-y - 0.5) / 2.0));
      r = 0.1 * (1 - t) + 0.0 * t;
      g = 0.3 * (1 - t) + 0.1 * t;
      b = 0.6 * (1 - t) + 1.0 * t;
    } else if (y > 0.5) {
      // Crest: red
      const t = Math.min(1.0, Math.max(0.0, (y - 0.5) / 2.0));
      r = 0.6 * (1 - t) + 1.0 * t;
      g = 0.3 * (1 - t) + 0.15 * t;
      b = 0.1 * (1 - t) + 0.0 * t;
    } else {
      // Near zero: white-ish with smooth interpolation
      const t = (y + 0.5) / 1.0; // 0 at y=-0.5, 1 at y=0.5
      // Interpolate from slight blue to white to slight red
      if (t < 0.5) {
        const s = t / 0.5;
        r = 0.1 + 0.8 * s;
        g = 0.3 + 0.6 * s;
        b = 0.6 + 0.3 * s;
      } else {
        const s = (t - 0.5) / 0.5;
        r = 0.9 + 0.0 * s;
        g = 0.9 - 0.6 * s;
        b = 0.9 - 0.8 * s;
      }
    }

    colorsArr[ix] = r;
    colorsArr[ix + 1] = g;
    colorsArr[ix + 2] = b;
  }

  planeGeo.attributes.position.needsUpdate = true;
  planeGeo.attributes.color.needsUpdate = true;
  planeGeo.computeVertexNormals();

  return { maxDisp, minDisp, waveEnergy };
}

// --- Update Source Marker Positions ---
function updateSourceMarkers() {
  // Make source markers bob slightly
  sourceAMesh.position.y = 0.5 + Math.sin(simTime * 2 * Math.PI * frequency) * 0.3;
  sourceBMesh.position.y = 0.5 + Math.sin(simTime * 2 * Math.PI * frequency) * 0.3;

  // Pulse glow
  const pulse = 0.3 + 0.2 * Math.sin(simTime * 4);
  sourceMat.emissiveIntensity = pulse;
}

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const deltaTime = clock.getDelta();

  // Clamp delta to avoid huge jumps
  const clampedDelta = Math.min(deltaTime, 0.1);

  if (!paused && timeScale > 0) {
    simTime += clampedDelta * timeScale;
  }

  // Update waves
  const { maxDisp, minDisp, waveEnergy } = updateWaves();

  // Update source markers
  updateSourceMarkers();

  // Update stork mixer if exists
  if (window.__storkMixer) {
    window.__storkMixer.update(clampedDelta);
  }

  // Update HUD
  hudTime.textContent = simTime.toFixed(3);
  hudFreq.textContent = frequency.toFixed(2);
  hudWave.textContent = wavelength.toFixed(2);
  hudAmp.textContent = amplitude.toFixed(2);
  hudScale.textContent = timeScale.toFixed(2);
  hudPaused.textContent = paused ? '⏸ Paused' : '▶ Playing';
  hudPaused.style.color = paused ? '#ff4444' : '#44ff44';

  // Update state
  const state = window.__3D_STATE__;
  state.simTime = simTime;
  state.frequency = frequency;
  state.wavelength = wavelength;
  state.amplitude = amplitude;
  state.timeScale = timeScale;
  state.paused = paused;
  state.sourceA = { x: sourceAPos.x, y: sourceAPos.y, z: sourceAPos.z };
  state.sourceB = { x: sourceBPos.x, y: sourceBPos.y, z: sourceBPos.z };
  state.maxDisplacement = isFinite(maxDisp) ? maxDisp : 0;
  state.minDisplacement = isFinite(minDisp) ? minDisp : 0;
  state.vertexCount = vertexCount;
  state.storkLoaded = storkLoaded;
  state.frameCount = frameCount;
  state.waveEnergy = isFinite(waveEnergy) ? waveEnergy : 0;

  frameCount++;

  controls.update();
  renderer.render(scene, camera);
}

// --- Resize Handler ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
