<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Wave Interference with Stork</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-line;
      user-select: none;
      z-index: 10;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #d0d8ff;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.45;
      z-index: 10;
      max-width: 420px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Time: <span id="hud-time">0.00</span></div>
    <div>Frequency: <span id="hud-frequency">1.00</span></div>
    <div>Wavelength: <span id="hud-wavelength">8.00</span></div>
    <div>Amplitude: <span id="hud-amplitude">2.00</span></div>
    <div>Time Scale: <span id="hud-timescale">1.00</span></div>
    <div>Paused: <span id="hud-paused">false</span></div>
  </div>

  <div id="help">
    SPACE: Pause/Play |
    ↑/↓: Frequency |
    ←/→: Time Scale |
    W/S: Wavelength |
    A/D: Amplitude |
    R: Reset
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 40, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 30, 10);
    scene.add(directionalLight);

    const sourceA = new THREE.Vector3(-12, 0, 0);
    const sourceB = new THREE.Vector3(12, 0, 0);

    const sourceMarkerGeometry = new THREE.SphereGeometry(0.5, 24, 24);
    const sourceMarkerMaterial = new THREE.MeshPhongMaterial({ color: 0xff3333 });

    const sourceMarkerA = new THREE.Mesh(sourceMarkerGeometry, sourceMarkerMaterial);
    sourceMarkerA.position.copy(sourceA);
    sourceMarkerA.position.y = 0.2;
    scene.add(sourceMarkerA);

    const sourceMarkerB = new THREE.Mesh(sourceMarkerGeometry, sourceMarkerMaterial);
    sourceMarkerB.position.copy(sourceB);
    sourceMarkerB.position.y = 0.2;
    scene.add(sourceMarkerB);

    const planeGeometry = new THREE.PlaneGeometry(60, 60, 200, 200);
    planeGeometry.rotateX(-Math.PI / 2);

    const positionAttr = planeGeometry.attributes.position;
    const vertexCount = positionAttr.count;

    const basePositions = new Float32Array(positionAttr.array.length);
    basePositions.set(positionAttr.array);

    const colors = new Float32Array(vertexCount * 3);
    planeGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const planeMaterial = new THREE.MeshPhongMaterial({
      vertexColors: true,
      shininess: 80,
      transparent: true,
      opacity: 0.85,
      side: THREE.DoubleSide
    });

    const waveMesh = new THREE.Mesh(planeGeometry, planeMaterial);
    scene.add(waveMesh);

    const poolBorder = new THREE.Mesh(
      new THREE.RingGeometry(31, 33, 64),
      new THREE.MeshPhongMaterial({
        color: 0x222244,
        shininess: 50,
        side: THREE.DoubleSide
      })
    );
    poolBorder.rotation.x = -Math.PI / 2;
    poolBorder.position.y = -0.15;
    scene.add(poolBorder);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(90, 96),
      new THREE.MeshPhongMaterial({
        color: 0x101018,
        shininess: 10,
        side: THREE.DoubleSide
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2.5;
    scene.add(ground);

    let storkLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "stork.glb",
      (gltf) => {
        const stork = gltf.scene;
        stork.scale.set(2, 2, 2);
        stork.position.set(20, 8, -20);
        scene.add(stork);
        storkLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load stork.glb:", err);
      }
    );

    const hudTime = document.getElementById("hud-time");
    const hudFrequency = document.getElementById("hud-frequency");
    const hudWavelength = document.getElementById("hud-wavelength");
    const hudAmplitude = document.getElementById("hud-amplitude");
    const hudTimescale = document.getElementById("hud-timescale");
    const hudPaused = document.getElementById("hud-paused");

    const defaults = {
      amplitude: 2.0,
      wavelength: 8.0,
      frequency: 1.0,
      timeScale: 1.0
    };

    let simTime = 0;
    let amplitude = defaults.amplitude;
    let wavelength = defaults.wavelength;
    let frequency = defaults.frequency;
    let timeScale = defaults.timeScale;
    let paused = false;
    let previousTimeScale = 1.0;
    let frameCount = 0;

    const clock = new THREE.Clock();

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function smoothstep(edge0, edge1, x) {
      const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
      return t * t * (3 - 2 * t);
    }

    function updateWave() {
      const positions = planeGeometry.attributes.position.array;
      const colorArray = planeGeometry.attributes.color.array;

      const safeAmplitude = clamp(safeNumber(amplitude, defaults.amplitude), 0.5, 5.0);
      const safeWavelength = clamp(safeNumber(wavelength, defaults.wavelength), 2.0, 20.0);
      const safeFrequency = clamp(safeNumber(frequency, defaults.frequency), 0.1, 3.0);
      const safeTime = safeNumber(simTime, 0);

      amplitude = safeAmplitude;
      wavelength = safeWavelength;
      frequency = safeFrequency;
      simTime = safeTime;

      const k = (2 * Math.PI) / safeWavelength;
      const omega = 2 * Math.PI * safeFrequency;

      let maxDisplacement = -Infinity;
      let minDisplacement = Infinity;
      let waveEnergy = 0;

      for (let i = 0; i < vertexCount; i++) {
        const i3 = i * 3;
        const x = basePositions[i3];
        const z = basePositions[i3 + 2];

        const dxA = x - sourceA.x;
        const dzA = z - sourceA.z;
        const rA = Math.sqrt(dxA * dxA + dzA * dzA);

        const dxB = x - sourceB.x;
        const dzB = z - sourceB.z;
        const rB = Math.sqrt(dxB * dxB + dzB * dzB);

        const denomA = Math.max(Math.sqrt(rA), 0.5);
        const denomB = Math.max(Math.sqrt(rB), 0.5);

        let yA = safeAmplitude * Math.sin(k * rA - omega * safeTime) / denomA;
        let yB = safeAmplitude * Math.sin(k * rB - omega * safeTime) / denomB;

        yA = safeNumber(yA, 0);
        yB = safeNumber(yB, 0);

        let y = yA + yB;
        y = clamp(safeNumber(y, 0), -10, 10);

        positions[i3 + 1] = y;

        if (y > maxDisplacement) maxDisplacement = y;
        if (y < minDisplacement) minDisplacement = y;
        waveEnergy += y * y;

        const blue = new THREE.Color(0x1e5bff);
        const white = new THREE.Color(0xffffff);
        const red = new THREE.Color(0xff3b2f);
        const finalColor = new THREE.Color();

        if (y < -0.5) {
          const t = smoothstep(-10, -0.5, y);
          finalColor.lerpColors(blue, white, t);
        } else if (y > 0.5) {
          const t = smoothstep(0.5, 10, y);
          finalColor.lerpColors(white, red, t);
        } else {
          const t = smoothstep(-0.5, 0.5, y);
          finalColor.lerpColors(blue, red, t);
          finalColor.lerp(white, 0.85);
        }

        colorArray[i3] = safeNumber(finalColor.r, 1);
        colorArray[i3 + 1] = safeNumber(finalColor.g, 1);
        colorArray[i3 + 2] = safeNumber(finalColor.b, 1);
      }

      planeGeometry.attributes.position.needsUpdate = true;
      planeGeometry.attributes.color.needsUpdate = true;
      planeGeometry.computeVertexNormals();

      window.__3D_STATE__ = {
        simTime: safeNumber(simTime, 0),
        frequency: safeNumber(frequency, defaults.frequency),
        wavelength: safeNumber(wavelength, defaults.wavelength),
        amplitude: safeNumber(amplitude, defaults.amplitude),
        timeScale: safeNumber(timeScale, defaults.timeScale),
        paused: !!paused,
        sourceA: { x: sourceA.x, y: sourceA.y, z: sourceA.z },
        sourceB: { x: sourceB.x, y: sourceB.y, z: sourceB.z },
        maxDisplacement: safeNumber(maxDisplacement, 0),
        minDisplacement: safeNumber(minDisplacement, 0),
        vertexCount,
        storkLoaded,
        frameCount,
        waveEnergy: safeNumber(waveEnergy, 0)
      };
    }

    function updateHUD() {
      hudTime.textContent = safeNumber(simTime, 0).toFixed(2);
      hudFrequency.textContent = safeNumber(frequency, 0).toFixed(2);
      hudWavelength.textContent = safeNumber(wavelength, 0).toFixed(2);
      hudAmplitude.textContent = safeNumber(amplitude, 0).toFixed(2);
      hudTimescale.textContent = safeNumber(timeScale, 0).toFixed(2);
      hudPaused.textContent = String(paused);
    }

    function resetAll() {
      simTime = 0;
      amplitude = defaults.amplitude;
      wavelength = defaults.wavelength;
      frequency = defaults.frequency;
      timeScale = defaults.timeScale;
      previousTimeScale = defaults.timeScale;
      paused = false;
    }

    window.addEventListener("keydown", (event) => {
      const key = event.key;

      if (
        key === " " ||
        key === "ArrowUp" ||
        key === "ArrowDown" ||
        key === "ArrowLeft" ||
        key === "ArrowRight"
      ) {
        event.preventDefault();
      }

      switch (key) {
        case " ":
          if (paused || timeScale === 0) {
            timeScale = previousTimeScale > 0 ? previousTimeScale : 1.0;
            paused = false;
          } else {
            previousTimeScale = timeScale;
            timeScale = 0;
            paused = true;
          }
          break;

        case "ArrowUp":
          frequency = clamp(frequency + 0.1, 0.1, 3.0);
          break;

        case "ArrowDown":
          frequency = clamp(frequency - 0.1, 0.1, 3.0);
          break;

        case "ArrowRight":
          timeScale = clamp(timeScale + 0.25, 0.0, 3.0);
          if (timeScale > 0) {
            previousTimeScale = timeScale;
            paused = false;
          } else {
            paused = true;
          }
          break;

        case "ArrowLeft":
          timeScale = clamp(timeScale - 0.25, 0.0, 3.0);
          if (timeScale > 0) {
            previousTimeScale = timeScale;
            paused = false;
          } else {
            paused = true;
          }
          break;

        case "r":
        case "R":
          resetAll();
          break;

        case "w":
        case "W":
          wavelength = clamp(wavelength + 1.0, 2.0, 20.0);
          break;

        case "s":
        case "S":
          wavelength = clamp(wavelength - 1.0, 2.0, 20.0);
          break;

        case "a":
        case "A":
          amplitude = clamp(amplitude + 0.5, 0.5, 5.0);
          break;

        case "d":
        case "D":
          amplitude = clamp(amplitude - 0.5, 0.5, 5.0);
          break;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      simTime: 0,
      frequency,
      wavelength,
      amplitude,
      timeScale,
      paused,
      sourceA: { x: sourceA.x, y: sourceA.y, z: sourceA.z },
      sourceB: { x: sourceB.x, y: sourceB.y, z: sourceB.z },
      maxDisplacement: 0,
      minDisplacement: 0,
      vertexCount,
      storkLoaded: false,
      frameCount: 0,
      waveEnergy: 0
    };

    updateWave();
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);

      const deltaTime = safeNumber(clock.getDelta(), 0.016);

      paused = timeScale === 0 ? true : paused;
      if (!paused) {
        simTime += deltaTime * safeNumber(timeScale, 1.0);
        simTime = safeNumber(simTime, 0);
      }

      updateWave();
      updateHUD();

      controls.update();
      renderer.render(scene, camera);

      frameCount++;
    }

    animate();
  </script>
</body>
</html>
