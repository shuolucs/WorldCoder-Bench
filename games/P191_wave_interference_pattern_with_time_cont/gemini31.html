<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wave Interference Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(10, 10, 26, 0.7);
            color: #ffffff;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            border: 1px solid #333;
        }
        .hud-line {
            margin: 5px 0;
        }
        .controls-help {
            margin-top: 15px;
            font-size: 0.85em;
            color: #aaa;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div class="hud-line">Time: <span id="hud-time">0.00</span>s</div>
        <div class="hud-line">Frequency: <span id="hud-frequency">1.0</span> Hz</div>
        <div class="hud-line">Wavelength: <span id="hud-wavelength">8.0</span></div>
        <div class="hud-line">Amplitude: <span id="hud-amplitude">2.0</span></div>
        <div class="hud-line">Time Scale: <span id="hud-timescale">1.00</span>x</div>
        <div class="hud-line">Status: <span id="hud-paused">Playing</span></div>
        
        <div class="controls-help">
            [SPACE] Play/Pause<br>
            [UP/DOWN] Frequency &plusmn;0.1<br>
            [LEFT/RIGHT] Speed &plusmn;0.25<br>
            [W/S] Wavelength &plusmn;1.0<br>
            [A/D] Amplitude &plusmn;0.5<br>
            [R] Reset
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            simTime: 0,
            frequency: 1.0,
            wavelength: 8.0,
            amplitude: 2.0,
            timeScale: 1.0,
            paused: false,
            sourceA: { x: -12, y: 0, z: 0 },
            sourceB: { x: 12, y: 0, z: 0 },
            maxDisplacement: 0,
            minDisplacement: 0,
            vertexCount: 0,
            storkLoaded: false,
            frameCount: 0,
            waveEnergy: 0,
            _prevTimeScale: 1.0
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 50);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 30, 10);
        scene.add(directionalLight);

        // Stork Model
        const loader = new GLTFLoader();
        loader.load('https://unpkg.com/three@0.160.0/examples/models/gltf/Stork.glb', (gltf) => {
            const stork = gltf.scene;
            stork.scale.set(2, 2, 2);
            stork.position.set(20, 8, -20);
            scene.add(stork);
            state.storkLoaded = true;
        });

        // Wave Surface
        const planeGeometry = new THREE.PlaneGeometry(60, 60, 200, 200);
        planeGeometry.rotateX(-Math.PI / 2);
        state.vertexCount = planeGeometry.attributes.position.count;

        // Add color attribute
        const colors = new Float32Array(state.vertexCount * 3);
        planeGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const planeMaterial = new THREE.MeshPhongMaterial({
            vertexColors: true,
            shininess: 80,
            transparent: true,
            opacity: 0.85,
            side: THREE.DoubleSide
        });

        const wavePlane = new THREE.Mesh(planeGeometry, planeMaterial);
        scene.add(wavePlane);

        // Wave Sources Visualization
        const sourceGeometry = new THREE.SphereGeometry(0.5, 16, 16);
        const sourceMaterial = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        
        const sourceMeshA = new THREE.Mesh(sourceGeometry, sourceMaterial);
        sourceMeshA.position.set(state.sourceA.x, state.sourceA.y, state.sourceA.z);
        scene.add(sourceMeshA);

        const sourceMeshB = new THREE.Mesh(sourceGeometry, sourceMaterial);
        sourceMeshB.position.set(state.sourceB.x, state.sourceB.y, state.sourceB.z);
        scene.add(sourceMeshB);

        // DOM Elements
        const elTime = document.getElementById('hud-time');
        const elFreq = document.getElementById('hud-frequency');
        const elWave = document.getElementById('hud-wavelength');
        const elAmp = document.getElementById('hud-amplitude');
        const elScale = document.getElementById('hud-timescale');
        const elPaused = document.getElementById('hud-paused');

        // Keyboard Controls
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'Space':
                    state.paused = !state.paused;
                    if (state.paused) {
                        state._prevTimeScale = state.timeScale;
                        state.timeScale = 0;
                    } else {
                        state.timeScale = state._prevTimeScale > 0 ? state._prevTimeScale : 1.0;
                    }
                    break;
                case 'ArrowUp':
                    state.frequency = Math.min(3.0, state.frequency + 0.1);
                    break;
                case 'ArrowDown':
                    state.frequency = Math.max(0.1, state.frequency - 0.1);
                    break;
                case 'ArrowRight':
                    state.timeScale = Math.min(3.0, state.timeScale + 0.25);
                    if (state.timeScale > 0) state.paused = false;
                    break;
                case 'ArrowLeft':
                    state.timeScale = Math.max(0.0, state.timeScale - 0.25);
                    if (state.timeScale === 0) state.paused = true;
                    break;
                case 'KeyR':
                    state.simTime = 0;
                    state.frequency = 1.0;
                    state.wavelength = 8.0;
                    state.amplitude = 2.0;
                    state.timeScale = 1.0;
                    state.paused = false;
                    break;
                case 'KeyW':
                    state.wavelength = Math.min(20.0, state.wavelength + 1.0);
                    break;
                case 'KeyS':
                    state.wavelength = Math.max(2.0, state.wavelength - 1.0);
                    break;
                case 'KeyA':
                    state.amplitude = Math.min(5.0, state.amplitude + 0.5);
                    break;
                case 'KeyD':
                    state.amplitude = Math.max(0.5, state.amplitude - 0.5);
                    break;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();
        const colorBlue = new THREE.Color(0x0000ff);
        const colorWhite = new THREE.Color(0xffffff);
        const colorRed = new THREE.Color(0xff0000);
        const tempColor = new THREE.Color();

        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = clock.getDelta();
            
            if (!state.paused) {
                state.simTime += deltaTime * state.timeScale;
            }

            // Update Wave Physics
            const posAttr = planeGeometry.attributes.position;
            const colAttr = planeGeometry.attributes.color;
            
            const k = 2 * Math.PI / state.wavelength;
            const omega = 2 * Math.PI * state.frequency;
            const A = state.amplitude;
            const t = state.simTime;

            let maxD = -Infinity;
            let minD = Infinity;
            let energy = 0;

            for (let i = 0; i < posAttr.count; i++) {
                // Plane is rotated, so local X is world X, local Y is world -Z, local Z is world Y
                const x = posAttr.getX(i);
                const z = -posAttr.getY(i); // Original local Y corresponds to world -Z

                const dxA = x - state.sourceA.x;
                const dzA = z - state.sourceA.z;
                const rA = Math.sqrt(dxA * dxA + dzA * dzA);

                const dxB = x - state.sourceB.x;
                const dzB = z - state.sourceB.z;
                const rB = Math.sqrt(dxB * dxB + dzB * dzB);

                const yA = A * Math.sin(k * rA - omega * t) / Math.max(Math.sqrt(rA), 0.5);
                const yB = A * Math.sin(k * rB - omega * t) / Math.max(Math.sqrt(rB), 0.5);

                let displacement = yA + yB;
                if (isNaN(displacement)) displacement = 0;

                // Update local Z (which is world Y due to rotation)
                posAttr.setZ(i, displacement);

                maxD = Math.max(maxD, displacement);
                minD = Math.min(minD, displacement);
                energy += displacement * displacement;

                // Color mapping
                if (displacement < -0.5) {
                    const factor = Math.min(1, (-displacement - 0.5) / 2.0);
                    tempColor.lerpColors(colorWhite, colorBlue, factor);
                } else if (displacement > 0.5) {
                    const factor = Math.min(1, (displacement - 0.5) / 2.0);
                    tempColor.lerpColors(colorWhite, colorRed, factor);
                } else {
                    tempColor.copy(colorWhite);
                }
                colAttr.setXYZ(i, tempColor.r, tempColor.g, tempColor.b);
            }

            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            planeGeometry.computeVertexNormals();

            // Update State
            state.maxDisplacement = maxD;
            state.minDisplacement = minD;
            state.waveEnergy = energy;
            state.frameCount++;

            // Update HUD
            elTime.textContent = state.simTime.toFixed(2);
            elFreq.textContent = state.frequency.toFixed(1);
            elWave.textContent = state.wavelength.toFixed(1);
            elAmp.textContent = state.amplitude.toFixed(1);
            elScale.textContent = state.timeScale.toFixed(2);
            elPaused.textContent = state.paused ? "Paused" : "Playing";
            elPaused.style.color = state.paused ? "#ff5555" : "#55ff55";

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
