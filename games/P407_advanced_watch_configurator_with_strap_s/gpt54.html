<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Watch Configurator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      min-width: 260px;
      padding: 14px 16px;
      background: rgba(10, 12, 20, 0.6);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #hud .label {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.75;
      margin-top: 8px;
    }

    #hud .value {
      font-size: 18px;
      font-weight: 700;
      margin-top: 2px;
    }

    #scoreWrap {
      margin-top: 12px;
      transform-origin: left center;
      transition: transform 0.18s ease;
    }

    #scoreLabel {
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.75;
    }

    #scoreValue {
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
      margin-top: 6px;
    }

    #triedValue {
      font-size: 16px;
      font-weight: 700;
    }

    #buttonBar {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      width: min(100%, 980px);
      padding: 0 16px;
      z-index: 10;
    }

    .ctrl-btn {
      border: none;
      outline: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
      backdrop-filter: blur(8px);
    }

    .ctrl-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 10px 22px rgba(0,0,0,0.35);
    }

    .ctrl-btn:active {
      transform: translateY(0);
    }

    #help {
      position: absolute;
      right: 16px;
      top: 16px;
      padding: 10px 12px;
      background: rgba(10, 12, 20, 0.45);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      font-size: 12px;
      line-height: 1.5;
      opacity: 0.9;
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    @media (max-width: 700px) {
      #hud {
        min-width: 220px;
      }
      #scoreValue {
        font-size: 30px;
      }
      .ctrl-btn {
        font-size: 13px;
        padding: 10px 14px;
      }
      #help {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="label">Current Strap</div>
      <div class="value" id="strapName">Leather Classic</div>

      <div class="label">Current Dial</div>
      <div class="value" id="dialName">Midnight Blue</div>

      <div id="scoreWrap">
        <div id="scoreLabel">Style Score</div>
        <div id="scoreValue">0</div>
      </div>

      <div class="label">Configurations Tried</div>
      <div class="value" id="triedValue">0/20</div>
    </div>

    <div id="help">
      <strong>Keyboard</strong><br />
      ←/→ Strap<br />
      ↑/↓ Dial<br />
      R Toggle Rotate<br />
      Space Reset
    </div>

    <div id="buttonBar">
      <button class="ctrl-btn" id="btn-prev-strap">Prev Strap</button>
      <button class="ctrl-btn" id="btn-next-strap">Next Strap</button>
      <button class="ctrl-btn" id="btn-prev-dial">Prev Dial</button>
      <button class="ctrl-btn" id="btn-next-dial">Next Dial</button>
      <button class="ctrl-btn" id="btn-toggle-rotate">Toggle Rotate</button>
      <button class="ctrl-btn" id="btn-reset">Reset</button>
      <button class="ctrl-btn" id="btn-zoom-fit">Zoom Fit</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.getElementById("app").appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 2;
    controls.maxDistance = 10;
    controls.target.set(0, 0.5, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    warmLight.position.set(5, 5, 5);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
    coolLight.position.set(-3, 3, -3);
    scene.add(coolLight);

    // Environment map with generated cubemap rendered through PMREMGenerator
    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    const envScene = new THREE.Scene();

    const envGeo = new THREE.BoxGeometry(10, 10, 10);
    const envMaterials = [
      new THREE.MeshBasicMaterial({ color: 0x334466, side: THREE.BackSide }),
      new THREE.MeshBasicMaterial({ color: 0x223355, side: THREE.BackSide }),
      new THREE.MeshBasicMaterial({ color: 0x3a4d6b, side: THREE.BackSide }),
      new THREE.MeshBasicMaterial({ color: 0x1a2438, side: THREE.BackSide }),
      new THREE.MeshBasicMaterial({ color: 0x2a3550, side: THREE.BackSide }),
      new THREE.MeshBasicMaterial({ color: 0x425777, side: THREE.BackSide })
    ];
    const envBox = new THREE.Mesh(envGeo, envMaterials);
    envScene.add(envBox);

    const envKey = new THREE.DirectionalLight(0xffffff, 1.6);
    envKey.position.set(2, 3, 4);
    envScene.add(envKey);

    const envFill = new THREE.DirectionalLight(0x88aaff, 0.8);
    envFill.position.set(-3, 1, -2);
    envScene.add(envFill);

    const envRT = pmremGenerator.fromScene(envScene, 0.04);
    scene.environment = envRT.texture;

    const rootGroup = new THREE.Group();
    scene.add(rootGroup);

    const watchGroup = new THREE.Group();
    rootGroup.add(watchGroup);

    const strapGroup = new THREE.Group();
    rootGroup.add(strapGroup);

    const strapOptions = [
      { name: "Leather Classic", color: 0x8B4513, roughness: 0.9, metalness: 0.0 },
      { name: "Steel Band",      color: 0xC0C0C0, roughness: 0.2, metalness: 1.0 },
      { name: "Rubber Sport",    color: 0x222222, roughness: 0.7, metalness: 0.0 },
      { name: "Gold Luxury",     color: 0xFFD700, roughness: 0.3, metalness: 0.9 },
      { name: "NATO Fabric",     color: 0x556B2F, roughness: 0.95, metalness: 0.0 }
    ];

    const dialOptions = [
      { name: "Midnight Blue", color: 0x191970 },
      { name: "Onyx Black",    color: 0x0a0a0a },
      { name: "Pearl White",   color: 0xFAF0E6 },
      { name: "Racing Red",    color: 0x8B0000 }
    ];

    const state = {
      strapIndex: 0,
      dialIndex: 0,
      autoRotate: true,
      modelLoaded: false,
      frameCount: 0,
      modelRotationY: 0,
      styleScore: 0,
      configsTried: 0
    };

    const triedConfigs = new Set();

    const strapNameEl = document.getElementById("strapName");
    const dialNameEl = document.getElementById("dialName");
    const scoreValueEl = document.getElementById("scoreValue");
    const triedValueEl = document.getElementById("triedValue");
    const scoreWrapEl = document.getElementById("scoreWrap");

    let scorePulseFrames = 0;
    let strapTransitionFrame = 0;
    let zoomFitActive = false;
    let zoomFitT = 0;
    let zoomFitStartPos = new THREE.Vector3();
    let zoomFitStartTarget = new THREE.Vector3();
    const zoomFitEndPos = new THREE.Vector3(0, 2, 5);
    const zoomFitEndTarget = new THREE.Vector3(0, 0.5, 0);

    const strapGeometry = new THREE.BoxGeometry(0.3, 0.08, 0.15);
    const strapSegments = [];

    function createStrapSegments() {
      for (let i = 0; i < 8; i++) {
        const topMat = new THREE.MeshStandardMaterial();
        const botMat = new THREE.MeshStandardMaterial();

        const topSeg = new THREE.Mesh(strapGeometry, topMat);
        const botSeg = new THREE.Mesh(strapGeometry, botMat);

        topSeg.castShadow = false;
        botSeg.castShadow = false;

        strapGroup.add(topSeg);
        strapGroup.add(botSeg);

        strapSegments.push({
          top: topSeg,
          bottom: botSeg
        });
      }
      layoutStrapSegments();
      applyStrapMaterial();
    }

    function layoutStrapSegments() {
      const topBaseY = 0.8;
      const bottomBaseY = -0.8;
      const zStart = 0.18;
      const zStep = 0.16;

      for (let i = 0; i < 8; i++) {
        const z = zStart + i * zStep;
        const curve = i * 0.035;
        const rot = i * 0.08;

        const top = strapSegments[i].top;
        top.position.set(0, topBaseY + curve, z);
        top.rotation.x = -rot;

        const bottom = strapSegments[i].bottom;
        bottom.position.set(0, bottomBaseY - curve, -z);
        bottom.rotation.x = rot;
      }
    }

    function applyStrapMaterial() {
      const opt = strapOptions[state.strapIndex];
      strapSegments.forEach(seg => {
        [seg.top.material, seg.bottom.material].forEach(mat => {
          mat.color.setHex(opt.color);
          mat.roughness = opt.roughness;
          mat.metalness = opt.metalness;
          mat.envMapIntensity = 1.2;
          mat.needsUpdate = true;
        });
      });
    }

    function animateStrapSwap() {
      strapTransitionFrame = 15;
    }

    let watchModel = null;
    const dialMaterials = [];

    const loader = new GLTFLoader();
    loader.load(
      "TextureTransformMultiTest.glb",
      (gltf) => {
        watchModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(watchModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const radius = size.length() * 0.5 || 1;
        const scale = 2 / radius;

        watchModel.position.sub(center);
        watchModel.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(watchModel);
        const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
        watchModel.position.sub(scaledCenter);

        watchModel.position.set(0, 0.5, 0);

        watchModel.traverse((child) => {
          if (child.isMesh) {
            child.material = child.material.clone();
            child.material.envMapIntensity = 1.4;
            child.material.needsUpdate = true;
            dialMaterials.push(child.material);
          }
        });

        watchGroup.add(watchModel);
        applyDialMaterial();
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("GLB load failed:", err);

        const fallback = new THREE.Group();

        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.8, 0.8, 0.22, 64),
          new THREE.MeshStandardMaterial({
            color: 0x888888,
            roughness: 0.35,
            metalness: 0.8,
            envMapIntensity: 1.4
          })
        );
        body.rotation.x = Math.PI / 2;

        const face = new THREE.Mesh(
          new THREE.CylinderGeometry(0.62, 0.62, 0.04, 64),
          new THREE.MeshStandardMaterial({
            color: 0x191970,
            emissive: 0x191970,
            emissiveIntensity: 0.25,
            roughness: 0.5,
            metalness: 0.2,
            envMapIntensity: 1.2
          })
        );
        face.rotation.x = Math.PI / 2;
        face.position.z = 0.1;

        fallback.add(body, face);
        fallback.position.set(0, 0.5, 0);
        watchModel = fallback;
        dialMaterials.push(face.material, body.material);
        watchGroup.add(watchModel);
        applyDialMaterial();
        state.modelLoaded = true;
      }
    );

    function applyDialMaterial() {
      const dial = dialOptions[state.dialIndex];
      dialMaterials.forEach((mat, i) => {
        if (mat.color) {
          if (i === 0) {
            mat.color.setHex(dial.color);
          } else {
            const c = new THREE.Color(dial.color);
            const mixed = c.clone().lerp(new THREE.Color(0x888888), 0.55);
            mat.color.copy(mixed);
          }
        }
        if ("emissive" in mat) {
          mat.emissive.setHex(dial.color);
          mat.emissiveIntensity = 0.18;
        }
        mat.needsUpdate = true;
      });
    }

    function computeScore() {
      let score = (state.strapIndex * 17 + state.dialIndex * 23 + 10) % 101;
      if (state.strapIndex === 3 && state.dialIndex === 0) score = Math.min(100, score + 25);
      if (state.strapIndex === 1 && state.dialIndex === 2) score = Math.min(100, score + 20);
      return score;
    }

    function updateTriedConfigs() {
      const key = `${state.strapIndex}-${state.dialIndex}`;
      if (!triedConfigs.has(key)) {
        triedConfigs.add(key);
      }
      state.configsTried = triedConfigs.size;
    }

    function updateHUD(scoreChanged = false) {
      strapNameEl.textContent = strapOptions[state.strapIndex].name;
      dialNameEl.textContent = dialOptions[state.dialIndex].name;

      const newScore = computeScore();
      if (newScore !== state.styleScore || scoreChanged) {
        scorePulseFrames = 10;
      }
      state.styleScore = newScore;

      scoreValueEl.textContent = `${state.styleScore}`;
      if (state.styleScore < 30) {
        scoreValueEl.style.color = "#ff5c5c";
      } else if (state.styleScore <= 70) {
        scoreValueEl.style.color = "#ffd95c";
      } else {
        scoreValueEl.style.color = "#64f0a8";
      }

      updateTriedConfigs();
      triedValueEl.textContent = `${state.configsTried}/20`;
    }

    function refreshConfiguration(triggerStrapAnim = false) {
      applyStrapMaterial();
      applyDialMaterial();
      if (triggerStrapAnim) animateStrapSwap();
      updateHUD(true);
    }

    function cycleStrap(dir) {
      state.strapIndex = (state.strapIndex + dir + strapOptions.length) % strapOptions.length;
      refreshConfiguration(true);
    }

    function cycleDial(dir) {
      state.dialIndex = (state.dialIndex + dir + dialOptions.length) % dialOptions.length;
      refreshConfiguration(false);
    }

    function resetConfiguration() {
      state.strapIndex = 0;
      state.dialIndex = 0;
      state.autoRotate = true;
      refreshConfiguration(true);
    }

    function startZoomFit() {
      zoomFitActive = true;
      zoomFitT = 0;
      zoomFitStartPos.copy(camera.position);
      zoomFitStartTarget.copy(controls.target);
    }

    createStrapSegments();
    updateHUD(true);

    document.getElementById("btn-prev-strap").addEventListener("click", () => cycleStrap(-1));
    document.getElementById("btn-next-strap").addEventListener("click", () => cycleStrap(1));
    document.getElementById("btn-prev-dial").addEventListener("click", () => cycleDial(-1));
    document.getElementById("btn-next-dial").addEventListener("click", () => cycleDial(1));
    document.getElementById("btn-toggle-rotate").addEventListener("click", () => {
      state.autoRotate = !state.autoRotate;
    });
    document.getElementById("btn-reset").addEventListener("click", () => resetConfiguration());
    document.getElementById("btn-zoom-fit").addEventListener("click", () => startZoomFit());

    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowLeft") {
        e.preventDefault();
        cycleStrap(-1);
      } else if (e.code === "ArrowRight") {
        e.preventDefault();
        cycleStrap(1);
      } else if (e.code === "ArrowUp") {
        e.preventDefault();
        cycleDial(1);
      } else if (e.code === "ArrowDown") {
        e.preventDefault();
        cycleDial(-1);
      } else if (e.code === "KeyR") {
        state.autoRotate = !state.autoRotate;
      } else if (e.code === "Space") {
        e.preventDefault();
        resetConfiguration();
      }
    });

    window.__3D_STATE__ = {
      strapIndex: 0,
      strapName: strapOptions[0].name,
      dialIndex: 0,
      dialName: dialOptions[0].name,
      styleScore: 0,
      configsTried: 0,
      autoRotate: true,
      modelLoaded: false,
      cameraDistance: camera.position.length(),
      modelRotationY: 0,
      strapColor: strapOptions[0].color,
      dialColor: dialOptions[0].color,
      strapMetalness: strapOptions[0].metalness,
      strapRoughness: strapOptions[0].roughness,
      frameCount: 0
    };

    function updateStrapTransition() {
      if (strapTransitionFrame <= 0) {
        strapSegments.forEach(seg => {
          seg.top.scale.set(1, 1, 1);
          seg.bottom.scale.set(1, 1, 1);
        });
        return;
      }

      const elapsed = 15 - strapTransitionFrame;
      let s;
      if (elapsed < 7) {
        s = Math.max(0.001, 1 - elapsed / 7);
      } else {
        s = Math.min(1, (elapsed - 7) / 8);
      }

      strapSegments.forEach(seg => {
        seg.top.scale.set(1, s, 1);
        seg.bottom.scale.set(1, s, 1);
      });

      strapTransitionFrame--;
    }

    function updateScorePulse() {
      if (scorePulseFrames > 0) {
        const t = scorePulseFrames / 10;
        const scale = 1 + 0.16 * Math.sin((1 - t) * Math.PI);
        scoreWrapEl.style.transform = `scale(${scale})`;
        scorePulseFrames--;
      } else {
        scoreWrapEl.style.transform = "scale(1)";
      }
    }

    function updateZoomFit() {
      if (!zoomFitActive) return;
      zoomFitT += 0.06;
      const t = Math.min(1, zoomFitT);
      const eased = 1 - Math.pow(1 - t, 3);

      camera.position.lerpVectors(zoomFitStartPos, zoomFitEndPos, eased);
      controls.target.lerpVectors(zoomFitStartTarget, zoomFitEndTarget, eased);

      if (t >= 1) zoomFitActive = false;
    }

    function animate() {
      requestAnimationFrame(animate);

      state.frameCount++;

      updateZoomFit();

      if (watchModel && state.autoRotate) {
        watchGroup.rotation.y += 0.005;
      }

      state.modelRotationY = watchGroup.rotation.y;

      updateStrapTransition();
      updateScorePulse();
      controls.update();

      window.__3D_STATE__.strapIndex = state.strapIndex;
      window.__3D_STATE__.strapName = strapOptions[state.strapIndex].name;
      window.__3D_STATE__.dialIndex = state.dialIndex;
      window.__3D_STATE__.dialName = dialOptions[state.dialIndex].name;
      window.__3D_STATE__.styleScore = state.styleScore;
      window.__3D_STATE__.configsTried = state.configsTried;
      window.__3D_STATE__.autoRotate = state.autoRotate;
      window.__3D_STATE__.modelLoaded = state.modelLoaded;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.modelRotationY = state.modelRotationY;
      window.__3D_STATE__.strapColor = strapOptions[state.strapIndex].color;
      window.__3D_STATE__.dialColor = dialOptions[state.dialIndex].color;
      window.__3D_STATE__.strapMetalness = strapOptions[state.strapIndex].metalness;
      window.__3D_STATE__.strapRoughness = strapOptions[state.strapIndex].roughness;
      window.__3D_STATE__.frameCount = state.frameCount;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
