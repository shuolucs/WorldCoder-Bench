<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced 3D Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(15, 15, 25, 0.8);
            padding: 20px;
            border-radius: 12px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
            pointer-events: none;
            min-width: 200px;
        }
        .hud-row {
            margin-bottom: 10px;
            font-size: 14px;
            color: #aaa;
        }
        .hud-value {
            color: #fff;
            font-weight: bold;
            font-size: 16px;
            display: block;
            margin-top: 4px;
        }
        #score-container {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        #style-score {
            font-size: 36px;
            font-weight: 900;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: inline-block;
        }
        .score.red { color: #ff4757; }
        .score.yellow { color: #ffa502; }
        .score.green { color: #2ed573; }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(15, 15, 25, 0.8);
            padding: 15px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            outline: none;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .divider {
            width: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 5px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-row">Strap<span class="hud-value" id="strap-name"></span></div>
        <div class="hud-row">Dial<span class="hud-value" id="dial-name"></span></div>
        <div id="score-container">
            <div class="hud-row">Style Score<span class="hud-value score" id="style-score">0</span></div>
        </div>
        <div class="hud-row" style="margin-top: 15px;">Configs Tried<span class="hud-value" id="configs-tried">0/20</span></div>
    </div>

    <div id="controls">
        <button id="btn-prev-strap">Prev Strap</button>
        <button id="btn-next-strap">Next Strap</button>
        <div class="divider"></div>
        <button id="btn-prev-dial">Prev Dial</button>
        <button id="btn-next-dial">Next Dial</button>
        <div class="divider"></div>
        <button id="btn-toggle-rotate">Toggle Rotate</button>
        <button id="btn-zoom-fit">Zoom Fit</button>
        <button id="btn-reset">Reset</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // --- State ---
        const state = {
            strapIndex: 0,
            dialIndex: 0,
            autoRotate: true,
            triedCombos: new Set(),
            strapAnimFrame: 0,
            targetCameraPos: null,
            targetControlsPos: null
        };

        window.__3D_STATE__ = {
            strapIndex: 0, strapName: '', dialIndex: 0, dialName: '',
            styleScore: 0, configsTried: 0, autoRotate: true,
            modelLoaded: false, cameraDistance: 0, modelRotationY: 0,
            strapColor: 0, dialColor: 0, strapMetalness: 0, strapRoughness: 0,
            frameCount: 0
        };

        const strapOptions = [
            { name: 'Leather Classic', color: 0x8B4513, roughness: 0.9, metalness: 0.0 },
            { name: 'Steel Band', color: 0xC0C0C0, roughness: 0.2, metalness: 1.0 },
            { name: 'Rubber Sport', color: 0x222222, roughness: 0.7, metalness: 0.0 },
            { name: 'Gold Luxury', color: 0xFFD700, roughness: 0.3, metalness: 0.9 },
            { name: 'NATO Fabric', color: 0x556B2F, roughness: 0.95, metalness: 0.0 }
        ];

        const dialOptions = [
            { name: 'Midnight Blue', color: 0x191970 },
            { name: 'Onyx Black', color: 0x0a0a0a },
            { name: 'Pearl White', color: 0xFAF0E6 },
            { name: 'Racing Red', color: 0x8B0000 }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();

        // Gradient Background
        const canvas = document.createElement('canvas');
        canvas.width = 2; canvas.height = 2;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 2);
        gradient.addColorStop(0, '#1a1a2e');
        gradient.addColorStop(1, '#16213e');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 2, 2);
        scene.background = new THREE.CanvasTexture(canvas);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 2;
        controls.maxDistance = 10;
        controls.target.set(0, 0, 0);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        
        const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        warmLight.position.set(5, 5, 5);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
        coolLight.position.set(-3, 3, -3);
        scene.add(coolLight);

        // Environment
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // --- 3D Model & Straps ---
        const watchGroup = new THREE.Group();
        watchGroup.position.set(0, 0.5, 0);
        scene.add(watchGroup);

        let loadedModel = null;

        // Procedural Straps
        const strapMaterial = new THREE.MeshStandardMaterial({
            color: strapOptions[0].color,
            roughness: strapOptions[0].roughness,
            metalness: strapOptions[0].metalness
        });
        const strapSegments = [];
        const segGeo = new THREE.BoxGeometry(0.3, 0.08, 0.15);

        // Top Strap
        for (let i = 0; i < 8; i++) {
            const mesh = new THREE.Mesh(segGeo, strapMaterial);
            const t = i / 7;
            mesh.position.set(0, 0.8 + t * 0.15, -t * 0.8);
            mesh.rotation.x = t * Math.PI * 0.25;
            watchGroup.add(mesh);
            strapSegments.push(mesh);
        }
        // Bottom Strap
        for (let i = 0; i < 8; i++) {
            const mesh = new THREE.Mesh(segGeo, strapMaterial);
            const t = i / 7;
            mesh.position.set(0, -0.8 - t * 0.15, -t * 0.8);
            mesh.rotation.x = -t * Math.PI * 0.25;
            watchGroup.add(mesh);
            strapSegments.push(mesh);
        }

        // Load Model
        const loader = new GLTFLoader();
        loader.load('TextureTransformMultiTest.glb', (gltf) => {
            setupLoadedModel(gltf.scene);
        }, undefined, (error) => {
            // Fallback procedural watch body if file not found
            const fallbackGeo = new THREE.CylinderGeometry(0.7, 0.7, 0.3, 32);
            const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.8, roughness: 0.2 });
            const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
            fallbackMesh.rotation.x = Math.PI / 2;
            setupLoadedModel(fallbackMesh);
        });

        function setupLoadedModel(model) {
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.0 / maxDim;
            
            model.position.sub(center);
            
            const wrapper = new THREE.Group();
            wrapper.add(model);
            wrapper.scale.setScalar(scale);
            
            loadedModel = wrapper;
            watchGroup.add(loadedModel);
            window.__3D_STATE__.modelLoaded = true;
            applyDialColor();
        }

        function applyDialColor() {
            if (!loadedModel) return;
            const color = new THREE.Color(dialOptions[state.dialIndex].color);
            loadedModel.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (Array.isArray(child.material)) {
                        child.material.forEach(m => updateMat(m, color));
                    } else {
                        updateMat(child.material, color);
                    }
                }
            });
        }

        function updateMat(mat, color) {
            if (mat.color) mat.color.copy(color);
            if (mat.emissive) {
                mat.emissive.copy(color).multiplyScalar(0.3);
            }
            mat.needsUpdate = true;
        }

        // --- Logic & UI ---
        function updateLogic() {
            state.triedCombos.add(`${state.strapIndex}-${state.dialIndex}`);
            
            let baseScore = (state.strapIndex * 17 + state.dialIndex * 23 + 10) % 101;
            if (state.strapIndex === 3 && state.dialIndex === 0) baseScore += 25;
            if (state.strapIndex === 1 && state.dialIndex === 2) baseScore += 20;
            baseScore = Math.min(100, baseScore);

            const scoreEl = document.getElementById('style-score');
            scoreEl.innerText = baseScore;
            scoreEl.className = 'hud-value score ' + (baseScore < 30 ? 'red' : (baseScore <= 70 ? 'yellow' : 'green'));
            
            document.getElementById('strap-name').innerText = strapOptions[state.strapIndex].name;
            document.getElementById('dial-name').innerText = dialOptions[state.dialIndex].name;
            document.getElementById('configs-tried').innerText = `${state.triedCombos.size}/20`;

            // Pulse animation
            scoreEl.style.transform = 'scale(1.4)';
            setTimeout(() => scoreEl.style.transform = 'scale(1)', 150);

            // Update global state
            window.__3D_STATE__.strapIndex = state.strapIndex;
            window.__3D_STATE__.strapName = strapOptions[state.strapIndex].name;
            window.__3D_STATE__.dialIndex = state.dialIndex;
            window.__3D_STATE__.dialName = dialOptions[state.dialIndex].name;
            window.__3D_STATE__.styleScore = baseScore;
            window.__3D_STATE__.configsTried = state.triedCombos.size;
            window.__3D_STATE__.strapColor = strapOptions[state.strapIndex].color;
            window.__3D_STATE__.dialColor = dialOptions[state.dialIndex].color;
            window.__3D_STATE__.strapMetalness = strapOptions[state.strapIndex].metalness;
            window.__3D_STATE__.strapRoughness = strapOptions[state.strapIndex].roughness;
        }

        function changeStrap(dir) {
            state.strapIndex = (state.strapIndex + dir + 5) % 5;
            state.strapAnimFrame = 15;
            updateLogic();
        }

        function changeDial(dir) {
            state.dialIndex = (state.dialIndex + dir + 4) % 4;
            applyDialColor();
            updateLogic();
        }

        function resetConfig() {
            state.strapIndex = 0;
            state.dialIndex = 0;
            state.strapAnimFrame = 15;
            applyDialColor();
            updateLogic();
        }

        function toggleRotate() {
            state.autoRotate = !state.autoRotate;
        }

        function zoomFit() {
            state.targetCameraPos = new THREE.Vector3(0, 2, 5);
            state.targetControlsPos = new THREE.Vector3(0, 0, 0);
        }

        // --- Event Listeners ---
        document.getElementById('btn-prev-strap').addEventListener('click', () => changeStrap(-1));
        document.getElementById('btn-next-strap').addEventListener('click', () => changeStrap(1));
        document.getElementById('btn-prev-dial').addEventListener('click', () => changeDial(-1));
        document.getElementById('btn-next-dial').addEventListener('click', () => changeDial(1));
        document.getElementById('btn-toggle-rotate').addEventListener('click', toggleRotate);
        document.getElementById('btn-reset').addEventListener('click', resetConfig);
        document.getElementById('btn-zoom-fit').addEventListener('click', zoomFit);

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') changeStrap(-1);
            if (e.key === 'ArrowRight') changeStrap(1);
            if (e.key === 'ArrowUp') changeDial(-1);
            if (e.key === 'ArrowDown') changeDial(1);
            if (e.key.toLowerCase() === 'r') toggleRotate();
            if (e.key === ' ') { e.preventDefault(); resetConfig(); }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize UI
        updateLogic();

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            window.__3D_STATE__.frameCount++;

            if (state.autoRotate) {
                watchGroup.rotation.y += 0.005;
            }

            // Strap Animation
            if (state.strapAnimFrame > 0) {
                state.strapAnimFrame--;
                let scale = 1;
                if (state.strapAnimFrame > 7) {
                    scale = (state.strapAnimFrame - 7) / 8;
                } else {
                    scale = (7 - state.strapAnimFrame) / 7;
                    if (state.strapAnimFrame === 7) {
                        const opt = strapOptions[state.strapIndex];
                        strapMaterial.color.setHex(opt.color);
                        strapMaterial.roughness = opt.roughness;
                        strapMaterial.metalness = opt.metalness;
                    }
                }
                const s = Math.max(0.001, scale);
                strapSegments.forEach(mesh => mesh.scale.setScalar(s));
            }

            // Camera Animation
            if (state.targetCameraPos) {
                camera.position.lerp(state.targetCameraPos, 0.05);
                controls.target.lerp(state.targetControlsPos, 0.05);
                if (camera.position.distanceTo(state.targetCameraPos) < 0.01) {
                    state.targetCameraPos = null;
                }
            }

            controls.update();

            // Update per-frame state
            window.__3D_STATE__.autoRotate = state.autoRotate;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));
            window.__3D_STATE__.modelRotationY = watchGroup.rotation.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
