<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cloth Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(0, 0, 0, 0.75);
  color: #e0e0e0;
  padding: 16px 20px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.8;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  min-width: 240px;
}

#hud h3 {
  margin-bottom: 8px;
  color: #64ffda;
  font-size: 15px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding-bottom: 6px;
}

#hud .label { color: #90a4ae; }
#hud .value { color: #ffffff; font-weight: 600; }

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.75);
  color: #e0e0e0;
  padding: 16px 24px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  gap: 20px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
}

#controls label {
  font-size: 13px;
  color: #90a4ae;
}

#windSlider {
  width: 180px;
  accent-color: #64ffda;
  cursor: pointer;
}

#windValue {
  color: #64ffda;
  font-weight: 600;
  min-width: 30px;
  text-align: right;
}

#resetBtn {
  background: #64ffda;
  color: #1a1a2e;
  border: none;
  padding: 8px 20px;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: all 0.2s;
}

#resetBtn:hover {
  background: #a7ffeb;
  transform: scale(1.05);
}
</style>
</head>
<body>

<div id="hud">
  <h3>🧵 Cloth Simulation</h3>
  <div><span class="label">Nodes: </span><span class="value" id="nodeCount">625</span></div>
  <div><span class="label">Springs: </span><span class="value" id="springCount">0</span></div>
  <div><span class="label">Avg Stretch: </span><span class="value" id="avgStretch">0.000</span></div>
  <div><span class="label">Max Stretch: </span><span class="value" id="maxStretch">0.000</span></div>
  <div><span class="label">Broken Springs: </span><span class="value" id="brokenCount">0</span></div>
  <div><span class="label">Sim Time: </span><span class="value" id="simTime">0.00s</span></div>
</div>

<div id="controls">
  <label>🌬 Wind Strength:</label>
  <input type="range" id="windSlider" min="0" max="20" value="5" step="0.1">
  <span id="windValue">5.0</span>
  <button id="resetBtn">Reset</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ CONFIG ============
const GRID_W = 25;
const GRID_H = 25;
const REST_LENGTH = 0.2;
const DAMPING = 0.99;
const DT = 0.016;
const SUB_STEPS = 3;
const CONSTRAINT_ITERS = 15;
const GRAVITY = new THREE.Vector3(0, -9.81, 0);
const SPHERE_CENTER = new THREE.Vector3(2.4, 1.5, 0);
const SPHERE_RADIUS = 1.0;
const BREAK_FACTOR = 1.5;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(2.4, 4, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2.4, 2.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x6688cc, 0.4);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 40, 0x333355, 0x222244);
gridHelper.position.y = 0;
scene.add(gridHelper);

// Collision sphere
const sphereGeo = new THREE.SphereGeometry(SPHERE_RADIUS, 32, 32);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0xff4444,
  transparent: true,
  opacity: 0.35,
  roughness: 0.3,
  metalness: 0.1
});
const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
sphereMesh.position.copy(SPHERE_CENTER);
sphereMesh.castShadow = true;
scene.add(sphereMesh);

// Sphere wireframe
const sphereWire = new THREE.Mesh(
  new THREE.SphereGeometry(SPHERE_RADIUS * 1.002, 32, 32),
  new THREE.MeshBasicMaterial({ color: 0xff6666, wireframe: true, transparent: true, opacity: 0.15 })
);
sphereWire.position.copy(SPHERE_CENTER);
scene.add(sphereWire);

// Pin markers
const pinGeo = new THREE.SphereGeometry(0.08, 16, 16);
const pinMat = new THREE.MeshStandardMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 0.5 });
const pin1Mesh = new THREE.Mesh(pinGeo, pinMat);
const pin2Mesh = new THREE.Mesh(pinGeo, pinMat);
pin1Mesh.position.set(0, 5, 0);
pin2Mesh.position.set(4.8, 5, 0);
scene.add(pin1Mesh);
scene.add(pin2Mesh);

// Support rods (visual)
const rodGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.5, 8);
const rodMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
const rod1 = new THREE.Mesh(rodGeo, rodMat);
rod1.position.set(0, 5.25, 0);
scene.add(rod1);
const rod2 = new THREE.Mesh(rodGeo, rodMat);
rod2.position.set(4.8, 5.25, 0);
scene.add(rod2);

// ============ CLOTH PHYSICS ============
class ClothSimulation {
  constructor() {
    this.init();
  }

  init() {
    this.positions = new Float64Array(GRID_W * GRID_H * 3);
    this.prevPositions = new Float64Array(GRID_W * GRID_H * 3);
    this.pinned = new Uint8Array(GRID_W * GRID_H);
    this.springs = [];
    this.brokenSprings = 0;
    this.simTime = 0;

    // Initialize positions
    for (let j = 0; j < GRID_H; j++) {
      for (let i = 0; i < GRID_W; i++) {
        const idx = (j * GRID_W + i) * 3;
        this.positions[idx] = i * REST_LENGTH;
        this.positions[idx + 1] = 5;
        this.positions[idx + 2] = j * REST_LENGTH;
        this.prevPositions[idx] = this.positions[idx];
        this.prevPositions[idx + 1] = this.positions[idx + 1];
        this.prevPositions[idx + 2] = this.positions[idx + 2];
      }
    }

    // Pin top-left (0,0) and top-right (24,0)
    this.pinned[0] = 1;
    this.pinned[GRID_W - 1] = 1;

    // Create springs
    this.springs = [];
    this.brokenSprings = 0;

    for (let j = 0; j < GRID_H; j++) {
      for (let i = 0; i < GRID_W; i++) {
        const idx = j * GRID_W + i;

        // Structural springs
        if (i < GRID_W - 1) {
          this.springs.push({ a: idx, b: idx + 1, rest: REST_LENGTH, broken: false });
        }
        if (j < GRID_H - 1) {
          this.springs.push({ a: idx, b: idx + GRID_W, rest: REST_LENGTH, broken: false });
        }

        // Shear springs
        if (i < GRID_W - 1 && j < GRID_H - 1) {
          this.springs.push({ a: idx, b: idx + GRID_W + 1, rest: REST_LENGTH * Math.SQRT2, broken: false });
        }
        if (i > 0 && j < GRID_H - 1) {
          this.springs.push({ a: idx, b: idx + GRID_W - 1, rest: REST_LENGTH * Math.SQRT2, broken: false });
        }

        // Bending springs
        if (i < GRID_W - 2) {
          this.springs.push({ a: idx, b: idx + 2, rest: REST_LENGTH * 2, broken: false });
        }
        if (j < GRID_H - 2) {
          this.springs.push({ a: idx, b: idx + GRID_W * 2, rest: REST_LENGTH * 2, broken: false });
        }
      }
    }
  }

  step(windStrength, time) {
    const subDt = DT / SUB_STEPS;

    for (let s = 0; s < SUB_STEPS; s++) {
      // Wind force
      const windZ = windStrength * Math.sin(time * 0.5 + s * subDt * 0.5);
      const windX = windStrength * 0.3 * Math.sin(time * 0.7 + 1.5);
      const accX = GRAVITY.x + windX * 0.1;
      const accY = GRAVITY.y;
      const accZ = GRAVITY.z + windZ;

      const dt2 = subDt * subDt;

      // Verlet integration
      for (let i = 0; i < GRID_W * GRID_H; i++) {
        if (this.pinned[i]) continue;

        const idx = i * 3;
        const px = this.positions[idx];
        const py = this.positions[idx + 1];
        const pz = this.positions[idx + 2];

        const ppx = this.prevPositions[idx];
        const ppy = this.prevPositions[idx + 1];
        const ppz = this.prevPositions[idx + 2];

        // Add some turbulence based on position
        const turbX = Math.sin(px * 2.0 + time * 3.0) * windStrength * 0.02;
        const turbY = Math.cos(pz * 1.5 + time * 2.5) * windStrength * 0.01;
        const turbZ = Math.sin(py * 1.8 + time * 2.0) * windStrength * 0.02;

        const newX = px + (px - ppx) * DAMPING + (accX + turbX) * dt2;
        const newY = py + (py - ppy) * DAMPING + (accY + turbY) * dt2;
        const newZ = pz + (pz - ppz) * DAMPING + (accZ + turbZ) * dt2;

        this.prevPositions[idx] = px;
        this.prevPositions[idx + 1] = py;
        this.prevPositions[idx + 2] = pz;

        this.positions[idx] = newX;
        this.positions[idx + 1] = newY;
        this.positions[idx + 2] = newZ;
      }

      // Constraint solving
      for (let iter = 0; iter < CONSTRAINT_ITERS; iter++) {
        for (let si = 0; si < this.springs.length; si++) {
          const spring = this.springs[si];
          if (spring.broken) continue;

          const ai = spring.a * 3;
          const bi = spring.b * 3;

          const dx = this.positions[bi] - this.positions[ai];
          const dy = this.positions[bi + 1] - this.positions[ai + 1];
          const dz = this.positions[bi + 2] - this.positions[ai + 2];

          const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

          if (dist < 1e-8) continue;

          // Check for breaking
          if (dist > spring.rest * BREAK_FACTOR) {
            spring.broken = true;
            this.brokenSprings++;
            continue;
          }

          const diff = (dist - spring.rest) / dist * 0.5;

          const corrX = dx * diff;
          const corrY = dy * diff;
          const corrZ = dz * diff;

          const pinnedA = this.pinned[spring.a];
          const pinnedB = this.pinned[spring.b];

          if (!pinnedA && !pinnedB) {
            this.positions[ai] += corrX;
            this.positions[ai + 1] += corrY;
            this.positions[ai + 2] += corrZ;
            this.positions[bi] -= corrX;
            this.positions[bi + 1] -= corrY;
            this.positions[bi + 2] -= corrZ;
          } else if (!pinnedA) {
            this.positions[ai] += corrX * 2;
            this.positions[ai + 1] += corrY * 2;
            this.positions[ai + 2] += corrZ * 2;
          } else if (!pinnedB) {
            this.positions[bi] -= corrX * 2;
            this.positions[bi + 1] -= corrY * 2;
            this.positions[bi + 2] -= corrZ * 2;
          }
        }
      }

      // Sphere collision
      for (let i = 0; i < GRID_W * GRID_H; i++) {
        const idx = i * 3;
        if (this.pinned[i]) continue;

        const dx = this.positions[idx] - SPHERE_CENTER.x;
        const dy = this.positions[idx + 1] - SPHERE_CENTER.y;
        const dz = this.positions[idx + 2] - SPHERE_CENTER.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (dist < SPHERE_RADIUS + 0.02) {
          const n = 1.0 / dist;
          const pushDist = SPHERE_RADIUS + 0.02;
          this.positions[idx] = SPHERE_CENTER.x + dx * n * pushDist;
          this.positions[idx + 1] = SPHERE_CENTER.y + dy * n * pushDist;
          this.positions[idx + 2] = SPHERE_CENTER.z + dz * n * pushDist;
        }

        // Ground collision
        if (this.positions[idx + 1] < 0.01) {
          this.positions[idx + 1] = 0.01;
        }
      }
    }

    this.simTime += DT;
  }

  getStats() {
    let totalStretch = 0;
    let maxStretch = 0;
    let activeCount = 0;

    for (let i = 0; i < this.springs.length; i++) {
      const spring = this.springs[i];
      if (spring.broken) continue;

      const ai = spring.a * 3;
      const bi = spring.b * 3;
      const dx = this.positions[bi] - this.positions[ai];
      const dy = this.positions[bi + 1] - this.positions[ai + 1];
      const dz = this.positions[bi + 2] - this.positions[ai + 2];
      const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

      const stretch = Math.abs(dist / spring.rest - 1);
      totalStretch += stretch;
      if (stretch > maxStretch) maxStretch = stretch;
      activeCount++;
    }

    const avgStretch = activeCount > 0 ? totalStretch / activeCount : 0;

    // Center of mass
    let cx = 0, cy = 0, cz = 0;
    let lowestY = Infinity;
    const total = GRID_W * GRID_H;
    for (let i = 0; i < total; i++) {
      const idx = i * 3;
      cx += this.positions[idx];
      cy += this.positions[idx + 1];
      cz += this.positions[idx + 2];
      if (this.positions[idx + 1] < lowestY) lowestY = this.positions[idx + 1];
    }
    cx /= total;
    cy /= total;
    cz /= total;

    // Sampled nodes
    const nodes = [];
    for (let i = 0; i < total; i += 5) {
      const idx = i * 3;
      nodes.push({
        x: this.positions[idx],
        y: this.positions[idx + 1],
        z: this.positions[idx + 2]
      });
    }

    return {
      avgStretch,
      maxStretch,
      centerOfMass: { x: cx, y: cy, z: cz },
      lowestY,
      nodes,
      springCount: this.springs.length,
      brokenSprings: this.brokenSprings
    };
  }
}

// ============ CLOTH MESH ============
const clothGeo = new THREE.PlaneGeometry(
  (GRID_W - 1) * REST_LENGTH,
  (GRID_H - 1) * REST_LENGTH,
  GRID_W - 1,
  GRID_H - 1
);

const clothMatFront = new THREE.MeshStandardMaterial({
  color: 0xf5f5f5,
  side: THREE.FrontSide,
  roughness: 0.7,
  metalness: 0.0,
});

const clothMatBack = new THREE.MeshStandardMaterial({
  color: 0xaaaaaa,
  side: THREE.BackSide,
  roughness: 0.8,
  metalness: 0.0,
});

const clothMeshFront = new THREE.Mesh(clothGeo, clothMatFront);
clothMeshFront.castShadow = true;
clothMeshFront.receiveShadow = true;
scene.add(clothMeshFront);

const clothGeoBack = clothGeo.clone();
const clothMeshBack = new THREE.Mesh(clothGeoBack, clothMatBack);
scene.add(clothMeshBack);

// ============ SIMULATION ============
let cloth = new ClothSimulation();
let windStrength = 5;
let globalTime = 0;

const windSlider = document.getElementById('windSlider');
const windValueEl = document.getElementById('windValue');
const resetBtn = document.getElementById('resetBtn');

windSlider.addEventListener('input', () => {
  windStrength = parseFloat(windSlider.value);
  windValueEl.textContent = windStrength.toFixed(1);
});

resetBtn.addEventListener('click', () => {
  cloth.init();
  globalTime = 0;
});

function updateClothMesh() {
  const posAttr = clothGeo.attributes.position;
  const posAttrBack = clothGeoBack.attributes.position;

  // PlaneGeometry vertices are in XY plane, we need to map from our XZ simulation
  // PlaneGeometry(w, h, segW, segH) creates vertices row by row from top-left
  for (let j = 0; j < GRID_H; j++) {
    for (let i = 0; i < GRID_W; i++) {
      const simIdx = (j * GRID_W + i) * 3;
      const geoIdx = j * GRID_W + i;

      posAttr.setXYZ(geoIdx,
        cloth.positions[simIdx],
        cloth.positions[simIdx + 1],
        cloth.positions[simIdx + 2]
      );
      posAttrBack.setXYZ(geoIdx,
        cloth.positions[simIdx],
        cloth.positions[simIdx + 1],
        cloth.positions[simIdx + 2]
      );
    }
  }

  posAttr.needsUpdate = true;
  posAttrBack.needsUpdate = true;
  clothGeo.computeVertexNormals();
  clothGeoBack.computeVertexNormals();
}

function updateHUD(stats) {
  document.getElementById('nodeCount').textContent = GRID_W * GRID_H;
  document.getElementById('springCount').textContent = stats.springCount;
  document.getElementById('avgStretch').textContent = stats.avgStretch.toFixed(4);
  document.getElementById('maxStretch').textContent = stats.maxStretch.toFixed(4);
  document.getElementById('brokenCount').textContent = stats.brokenSprings;
  document.getElementById('simTime').textContent = cloth.simTime.toFixed(2) + 's';

  // Update pin positions
  pin1Mesh.position.set(
    cloth.positions[0],
    cloth.positions[1],
    cloth.positions[2]
  );
  const pinIdx2 = (GRID_W - 1) * 3;
  pin2Mesh.position.set(
    cloth.positions[pinIdx2],
    cloth.positions[pinIdx2 + 1],
    cloth.positions[pinIdx2 + 2]
  );
}

function updateState(stats) {
  window.__3D_STATE__ = {
    nodeCount: GRID_W * GRID_H,
    pinned: [
      { x: cloth.positions[0], y: cloth.positions[1], z: cloth.positions[2] },
      {
        x: cloth.positions[(GRID_W - 1) * 3],
        y: cloth.positions[(GRID_W - 1) * 3 + 1],
        z: cloth.positions[(GRID_W - 1) * 3 + 2]
      }
    ],
    avgStretch: stats.avgStretch,
    maxStretch: stats.maxStretch,
    simTime: cloth.simTime,
    windStrength: windStrength,
    centerOfMass: stats.centerOfMass,
    lowestY: stats.lowestY,
    nodes: stats.nodes,
    springCount: stats.springCount,
    brokenSprings: stats.brokenSprings
  };
}

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  globalTime += DT;
  cloth.step(windStrength, globalTime);

  updateClothMesh();

  const stats = cloth.getStats();
  updateHUD(stats);
  updateState(stats);

  controls.update();
  renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
