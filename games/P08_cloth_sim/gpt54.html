<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 布料仿真</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 250px;
      backdrop-filter: blur(4px);
      line-height: 1.55;
      font-size: 14px;
    }

    #hud .title {
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 15px;
    }

    #controls {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.15);
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 4px 0;
    }

    .row label {
      white-space: nowrap;
    }

    input[type="range"] {
      width: 120px;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 6px 10px;
      background: #2f7cf6;
      color: white;
      font-size: 13px;
    }

    button:hover {
      background: #2269d6;
    }

    #hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <div class="title">3D 布料仿真</div>
    <div>质点数: <span id="nodeCount">0</span></div>
    <div>平均拉伸率: <span id="avgStretch">0</span></div>
    <div>最大拉伸率: <span id="maxStretch">0</span></div>
    <div>模拟时间: <span id="simTime">0</span> s</div>

    <div id="controls">
      <div class="row">
        <label for="windSlider">风力</label>
        <input id="windSlider" type="range" min="0" max="20" step="0.1" value="5" />
        <span id="windValue">5.0</span>
      </div>
      <div class="row">
        <button id="resetBtn">重置</button>
      </div>
    </div>
  </div>

  <div id="hint">鼠标拖拽旋转，滚轮缩放</div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const container = document.getElementById('app');

    const nodeCountEl = document.getElementById('nodeCount');
    const avgStretchEl = document.getElementById('avgStretch');
    const maxStretchEl = document.getElementById('maxStretch');
    const simTimeEl = document.getElementById('simTime');
    const windSlider = document.getElementById('windSlider');
    const windValue = document.getElementById('windValue');
    const resetBtn = document.getElementById('resetBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1b1e24);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(2.8, 4.0, 9.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(2.4, 2.6, 0.2);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.3);
    dirLight.position.set(5, 8, 6);
    scene.add(dirLight);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
    dirLight2.position.set(-5, 4, -6);
    scene.add(dirLight2);

    const grid = new THREE.GridHelper(14, 28, 0x555555, 0x333333);
    grid.position.y = 0;
    scene.add(grid);

    const axes = new THREE.AxesHelper(1.2);
    axes.position.set(0, 0.01, 0);
    scene.add(axes);

    const clothConfig = {
      cols: 25,
      rows: 25,
      restLength: 0.2,
      damping: 0.99,
      dt: 0.016,
      substeps: 3,
      iterations: 15,
      gravity: new THREE.Vector3(0, -9.81, 0),
      tearFactor: 1.5,
    };

    const clothWidth = (clothConfig.cols - 1) * clothConfig.restLength;   // 4.8
    const clothHeight = (clothConfig.rows - 1) * clothConfig.restLength;  // 4.8

    const sphereCollider = {
      center: new THREE.Vector3(2.4, 1.5, 0),
      radius: 1.0,
    };

    let simTime = 0;
    let windStrength = parseFloat(windSlider.value);

    windValue.textContent = windStrength.toFixed(1);

    const sphereMesh = new THREE.Mesh(
      new THREE.SphereGeometry(sphereCollider.radius, 32, 24),
      new THREE.MeshStandardMaterial({
        color: 0xff4444,
        transparent: true,
        opacity: 0.45,
        roughness: 0.5,
        metalness: 0.0,
      })
    );
    sphereMesh.position.copy(sphereCollider.center);
    scene.add(sphereMesh);

    const pinMarkerGeom = new THREE.SphereGeometry(0.08, 16, 12);
    const pinMarkerMat = new THREE.MeshStandardMaterial({ color: 0xffdd33, emissive: 0x665500 });

    const leftPinMarker = new THREE.Mesh(pinMarkerGeom, pinMarkerMat);
    const rightPinMarker = new THREE.Mesh(pinMarkerGeom, pinMarkerMat);
    scene.add(leftPinMarker, rightPinMarker);

    const nodeRadius = 0.001;

    let nodes = [];
    let springs = [];

    const geometry = new THREE.PlaneGeometry(
      clothWidth,
      clothHeight,
      clothConfig.cols - 1,
      clothConfig.rows - 1
    );
    geometry.rotateX(-Math.PI / 2);

    const frontMaterial = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      side: THREE.FrontSide,
      roughness: 0.85,
      metalness: 0.02,
    });

    const backMaterial = new THREE.MeshStandardMaterial({
      color: 0xd0d0d0,
      side: THREE.BackSide,
      roughness: 0.9,
      metalness: 0.0,
    });

    const clothMeshFront = new THREE.Mesh(geometry, frontMaterial);
    const clothMeshBack = new THREE.Mesh(geometry, backMaterial);
    scene.add(clothMeshFront);
    scene.add(clothMeshBack);

    const tempVecA = new THREE.Vector3();
    const tempVecB = new THREE.Vector3();
    const tempVecC = new THREE.Vector3();
    const tempDir = new THREE.Vector3();

    function indexOf(x, y) {
      return y * clothConfig.cols + x;
    }

    function createNode(x, y, z, pinned = false) {
      const pos = new THREE.Vector3(x, y, z);
      return {
        pos: pos.clone(),
        prev: pos.clone(),
        acc: new THREE.Vector3(),
        pinned,
        pinPos: pos.clone(),
      };
    }

    function addSpring(a, b, restLength, type) {
      springs.push({
        a,
        b,
        restLength,
        type,
        broken: false,
      });
    }

    function resetSimulation() {
      nodes = [];
      springs = [];
      simTime = 0;

      for (let y = 0; y < clothConfig.rows; y++) {
        for (let x = 0; x < clothConfig.cols; x++) {
          const px = x * clothConfig.restLength;
          const py = 5;
          const pz = y * clothConfig.restLength;
          const pinned = (x === 0 && y === 0) || (x === clothConfig.cols - 1 && y === 0);
          nodes.push(createNode(px, py, pz, pinned));
        }
      }

      for (let y = 0; y < clothConfig.rows; y++) {
        for (let x = 0; x < clothConfig.cols; x++) {
          const i = indexOf(x, y);

          if (x + 1 < clothConfig.cols) {
            addSpring(i, indexOf(x + 1, y), clothConfig.restLength, 'structural');
          }
          if (y + 1 < clothConfig.rows) {
            addSpring(i, indexOf(x, y + 1), clothConfig.restLength, 'structural');
          }

          if (x + 1 < clothConfig.cols && y + 1 < clothConfig.rows) {
            addSpring(i, indexOf(x + 1, y + 1), clothConfig.restLength * Math.SQRT2, 'shear');
          }
          if (x - 1 >= 0 && y + 1 < clothConfig.rows) {
            addSpring(i, indexOf(x - 1, y + 1), clothConfig.restLength * Math.SQRT2, 'shear');
          }

          if (x + 2 < clothConfig.cols) {
            addSpring(i, indexOf(x + 2, y), clothConfig.restLength * 2, 'bending');
          }
          if (y + 2 < clothConfig.rows) {
            addSpring(i, indexOf(x, y + 2), clothConfig.restLength * 2, 'bending');
          }
        }
      }

      updateGeometryFromNodes();
      updatePinMarkers();
      updateHUD(0, 0);
      updateState(0, 0);
    }

    function applyExternalForces(stepTime) {
      const windZ = windStrength * Math.sin(stepTime * 0.5);

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        n.acc.copy(clothConfig.gravity);

        if (!n.pinned) {
          n.acc.z += windZ;
        }
      }
    }

    function verletIntegrate(subDt) {
      const dt2 = subDt * subDt;

      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];

        if (n.pinned) {
          n.pos.copy(n.pinPos);
          n.prev.copy(n.pinPos);
          n.acc.set(0, 0, 0);
          continue;
        }

        tempVecA.copy(n.pos);
        tempVecB.copy(n.pos).sub(n.prev).multiplyScalar(clothConfig.damping);
        tempVecC.copy(n.acc).multiplyScalar(dt2);

        n.pos.add(tempVecB).add(tempVecC);
        n.prev.copy(tempVecA);
        n.acc.set(0, 0, 0);
      }
    }

    function satisfyConstraints() {
      for (let iter = 0; iter < clothConfig.iterations; iter++) {
        for (let i = 0; i < springs.length; i++) {
          const s = springs[i];
          if (s.broken) continue;

          const p1 = nodes[s.a];
          const p2 = nodes[s.b];

          tempDir.copy(p2.pos).sub(p1.pos);
          const dist = tempDir.length();

          if (dist < 1e-8) continue;

          if (dist > s.restLength * clothConfig.tearFactor) {
            s.broken = true;
            continue;
          }

          const diff = (dist - s.restLength) / dist;
          const corrX = tempDir.x * diff * 0.5;
          const corrY = tempDir.y * diff * 0.5;
          const corrZ = tempDir.z * diff * 0.5;

          if (!p1.pinned && !p2.pinned) {
            p1.pos.x += corrX;
            p1.pos.y += corrY;
            p1.pos.z += corrZ;

            p2.pos.x -= corrX;
            p2.pos.y -= corrY;
            p2.pos.z -= corrZ;
          } else if (p1.pinned && !p2.pinned) {
            p2.pos.x -= corrX * 2;
            p2.pos.y -= corrY * 2;
            p2.pos.z -= corrZ * 2;
          } else if (!p1.pinned && p2.pinned) {
            p1.pos.x += corrX * 2;
            p1.pos.y += corrY * 2;
            p1.pos.z += corrZ * 2;
          }
        }

        for (let i = 0; i < nodes.length; i++) {
          const n = nodes[i];

          if (n.pinned) {
            n.pos.copy(n.pinPos);
            continue;
          }

          tempVecA.copy(n.pos).sub(sphereCollider.center);
          const len = tempVecA.length();

          if (len < sphereCollider.radius) {
            if (len < 1e-8) {
              tempVecA.set(0, 1, 0);
            } else {
              tempVecA.multiplyScalar(1 / len);
            }
            n.pos.copy(sphereCollider.center).addScaledVector(tempVecA, sphereCollider.radius);
          }
        }
      }
    }

    function updateGeometryFromNodes() {
      const posAttr = geometry.attributes.position;
      for (let y = 0; y < clothConfig.rows; y++) {
        for (let x = 0; x < clothConfig.cols; x++) {
          const node = nodes[indexOf(x, y)];
          const i = indexOf(x, y);
          posAttr.setXYZ(i, node.pos.x, node.pos.y, node.pos.z);
        }
      }
      posAttr.needsUpdate = true;
      geometry.computeVertexNormals();
    }

    function updatePinMarkers() {
      const left = nodes[indexOf(0, 0)].pinPos;
      const right = nodes[indexOf(clothConfig.cols - 1, 0)].pinPos;
      leftPinMarker.position.copy(left);
      rightPinMarker.position.copy(right);
    }

    function computeStats() {
      let totalStretch = 0;
      let maxStretch = 0;
      let activeSpringCount = 0;
      let brokenSprings = 0;

      let cx = 0, cy = 0, cz = 0;
      let lowestY = Infinity;

      for (let i = 0; i < springs.length; i++) {
        const s = springs[i];
        if (s.broken) {
          brokenSprings++;
          continue;
        }

        const p1 = nodes[s.a].pos;
        const p2 = nodes[s.b].pos;
        const len = p1.distanceTo(p2);
        const stretch = Math.abs(len / s.restLength - 1);

        totalStretch += stretch;
        if (stretch > maxStretch) maxStretch = stretch;
        activeSpringCount++;
      }

      for (let i = 0; i < nodes.length; i++) {
        const p = nodes[i].pos;
        cx += p.x;
        cy += p.y;
        cz += p.z;
        if (p.y < lowestY) lowestY = p.y;
      }

      const centerOfMass = {
        x: cx / nodes.length,
        y: cy / nodes.length,
        z: cz / nodes.length,
      };

      return {
        avgStretch: activeSpringCount > 0 ? totalStretch / activeSpringCount : 0,
        maxStretch,
        centerOfMass,
        lowestY,
        springCount: springs.length,
        brokenSprings,
      };
    }

    function updateHUD(avgStretch, maxStretch) {
      nodeCountEl.textContent = String(nodes.length);
      avgStretchEl.textContent = avgStretch.toFixed(4);
      maxStretchEl.textContent = maxStretch.toFixed(4);
      simTimeEl.textContent = simTime.toFixed(2);
    }

    function updateState(avgStretch, maxStretch) {
      const stats = computeStats();

      const sampledNodes = [];
      for (let i = 0; i < nodes.length; i += 5) {
        const p = nodes[i].pos;
        sampledNodes.push({ x: p.x, y: p.y, z: p.z });
      }

      window.__3D_STATE__ = {
        nodeCount: nodes.length,
        pinned: [
          { x: nodes[indexOf(0, 0)].pinPos.x, y: nodes[indexOf(0, 0)].pinPos.y, z: nodes[indexOf(0, 0)].pinPos.z },
          { x: nodes[indexOf(clothConfig.cols - 1, 0)].pinPos.x, y: nodes[indexOf(clothConfig.cols - 1, 0)].pinPos.y, z: nodes[indexOf(clothConfig.cols - 1, 0)].pinPos.z },
        ],
        avgStretch,
        maxStretch,
        simTime,
        windStrength,
        centerOfMass: stats.centerOfMass,
        lowestY: stats.lowestY,
        nodes: sampledNodes,
        springCount: stats.springCount,
        brokenSprings: stats.brokenSprings,
      };
    }

    function stepSimulation() {
      const subDt = clothConfig.dt / clothConfig.substeps;

      for (let step = 0; step < clothConfig.substeps; step++) {
        applyExternalForces(simTime);
        verletIntegrate(subDt);
        satisfyConstraints();
        simTime += subDt;
      }

      updateGeometryFromNodes();

      const stats = computeStats();
      updateHUD(stats.avgStretch, stats.maxStretch);
      updateState(stats.avgStretch, stats.maxStretch);
    }

    windSlider.addEventListener('input', () => {
      windStrength = parseFloat(windSlider.value);
      windValue.textContent = windStrength.toFixed(1);
    });

    resetBtn.addEventListener('click', () => {
      windStrength = parseFloat(windSlider.value);
      resetSimulation();
    });

    resetSimulation();

    function animate() {
      requestAnimationFrame(animate);
      stepSimulation();
      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
