<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#control-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    backdrop-filter: blur(10px);
    min-width: 200px;
    z-index: 10;
}

#control-panel h3 {
    margin-bottom: 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aab;
}

#control-panel select {
    width: 100%;
    padding: 8px 10px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 13px;
    cursor: pointer;
}

#control-panel select option {
    background: #1a1a2e;
    color: #fff;
}

#control-panel button, #time-panel button, #material-panel button {
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 6px;
    color: #ffd700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.3s;
}

#control-panel button:hover, #time-panel button:hover, #material-panel button:hover {
    background: linear-gradient(135deg, rgba(255,215,0,0.4), rgba(255,215,0,0.15));
    border-color: rgba(255,215,0,0.6);
}

#time-panel {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    backdrop-filter: blur(10px);
    min-width: 350px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
}

#time-panel h3 {
    margin-bottom: 4px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aab;
}

#time-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.15);
    outline: none;
    cursor: pointer;
}

#time-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #ffd700;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255,215,0,0.5);
}

#time-panel .btn-row {
    display: flex;
    gap: 8px;
    width: 100%;
}

#time-panel .btn-row button {
    flex: 1;
    margin-bottom: 0;
}

#time-panel .speed-label {
    font-size: 12px;
    color: #aab;
}

#material-panel {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    backdrop-filter: blur(10px);
    min-width: 140px;
    z-index: 10;
}

#material-panel h3 {
    margin-bottom: 12px;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aab;
}

#material-panel button {
    display: flex;
    align-items: center;
    gap: 8px;
}

.color-swatch {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.3);
    display: inline-block;
    flex-shrink: 0;
}

#hud-info {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 10px;
    padding: 15px 20px;
    color: #ddd;
    font-size: 12px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    z-index: 10;
    min-width: 180px;
}

#hud-info .label {
    color: #888;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#hud-info .value {
    color: #ffd700;
    font-weight: bold;
}

.active-material {
    background: linear-gradient(135deg, rgba(255,215,0,0.5), rgba(255,215,0,0.2)) !important;
    border-color: rgba(255,215,0,0.8) !important;
}
</style>
</head>
<body>

<div id="control-panel">
    <h3>💎 Gem Controls</h3>
    <select id="gem-select">
        <option value="diamond">💎 Diamond</option>
        <option value="ruby">❤️ Ruby</option>
        <option value="emerald">💚 Emerald</option>
        <option value="sapphire">💙 Sapphire</option>
        <option value="amethyst">💜 Amethyst</option>
        <option value="topaz">🧡 Topaz</option>
    </select>
    <button id="btn-add-gem">Add Gem</button>
    <button id="btn-remove-gem">Remove Last Gem</button>
    <button id="btn-clear-gems">Clear All</button>
</div>

<div id="time-panel">
    <h3>⏱ Time Control</h3>
    <input type="range" id="time-slider" min="0" max="100" value="50">
    <span class="speed-label">Speed: <span id="speed-display">1.00x</span></span>
    <div class="btn-row">
        <button id="btn-pause">Pause</button>
        <button id="btn-reset-time">Reset Time</button>
    </div>
</div>

<div id="material-panel">
    <h3>🔧 Material</h3>
    <button id="btn-gold" class="active-material"><span class="color-swatch" style="background:#FFD700;"></span> Gold</button>
    <button id="btn-silver"><span class="color-swatch" style="background:#C0C0C0;"></span> Silver</button>
    <button id="btn-rose-gold"><span class="color-swatch" style="background:#B76E79;"></span> Rose Gold</button>
    <button id="btn-platinum"><span class="color-swatch" style="background:#E5E4E2;"></span> Platinum</button>
</div>

<div id="hud-info">
    <div><span class="label">Gems:</span> <span class="value" id="hud-gems">0 / 6</span></div>
    <div><span class="label">Material:</span> <span class="value" id="hud-material">Gold</span></div>
    <div><span class="label">Speed:</span> <span class="value" id="hud-speed">1.00x</span></div>
    <div><span class="label">Time:</span> <span class="value" id="hud-time">0.00s</span></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    gemCount: 0,
    gems: [],
    ringMaterial: 'gold',
    ringColor: 0xFFD700,
    ringRotating: true,
    timeSpeed: 1.0,
    isPaused: false,
    elapsedTime: 0,
    helmetLoaded: false,
    ringRotationY: 0,
    gemPulseIntensity: 0,
    selectedGemType: 'diamond',
    maxGems: 6
};
window.__3D_STATE__ = state;

const gemColors = {
    diamond: 0xffffff,
    ruby: 0xff0040,
    emerald: 0x00ff80,
    sapphire: 0x0040ff,
    amethyst: 0x9900ff,
    topaz: 0xffaa00
};

const materialPresets = {
    gold: { color: 0xFFD700, metalness: 0.95, roughness: 0.05 },
    silver: { color: 0xC0C0C0, metalness: 0.9, roughness: 0.1 },
    'rose-gold': { color: 0xB76E79, metalness: 0.92, roughness: 0.08 },
    platinum: { color: 0xE5E4E2, metalness: 0.98, roughness: 0.03 }
};

const materialNames = {
    gold: 'Gold',
    silver: 'Silver',
    'rose-gold': 'Rose Gold',
    platinum: 'Platinum'
};

// --- Scene Setup ---
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xff88cc, 0.8);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// --- Environment map for reflections ---
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
envScene.background = new THREE.Color(0x333355);
const envLight1 = new THREE.DirectionalLight(0xffffff, 2);
envLight1.position.set(5, 5, 5);
envScene.add(envLight1);
const envLight2 = new THREE.DirectionalLight(0x8888ff, 1);
envLight2.position.set(-5, 3, -5);
envScene.add(envLight2);
const envMap = pmremGenerator.fromScene(envScene, 0.04).texture;
scene.environment = envMap;

// --- Ring ---
const ringGeometry = new THREE.TorusGeometry(1.0, 0.15, 32, 100);
const ringMaterial = new THREE.MeshStandardMaterial({
    color: 0xFFD700,
    metalness: 0.95,
    roughness: 0.05,
    envMap: envMap,
    envMapIntensity: 1.5
});
const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
ringMesh.position.y = 0;
scene.add(ringMesh);

// --- Ring group for gems ---
const ringGroup = new THREE.Group();
ringGroup.add(ringMesh);
scene.add(ringGroup);

// Actually, let's restructure: ring and gems rotate together
scene.remove(ringMesh);
scene.remove(ringGroup);
const ringParent = new THREE.Group();
ringParent.add(ringMesh);
scene.add(ringParent);

// --- Gem slots ---
const gemMeshes = [];
const gemSlots = 6;

function getGemPosition(slotIndex) {
    // Evenly spaced around the top half of the torus
    // Top half: angles from -PI/2 to PI/2 (front top)
    // We distribute gems in the top half
    const startAngle = -Math.PI / 3;
    const endAngle = Math.PI / 3;
    const angle = gemSlots === 1 ? 0 : startAngle + (endAngle - startAngle) * slotIndex / (gemSlots - 1);
    
    const torusRadius = 1.0;
    const tubeRadius = 0.15;
    
    const x = torusRadius * Math.cos(angle);
    const y = (tubeRadius + 0.12) ;
    const z = torusRadius * Math.sin(angle);
    
    return new THREE.Vector3(x, y, z);
}

function createGem(type) {
    const color = gemColors[type];
    const gemGeometry = new THREE.OctahedronGeometry(0.12, 0);
    const gemMaterial = new THREE.MeshPhysicalMaterial({
        color: color,
        transmission: 0.9,
        thickness: 0.5,
        roughness: 0,
        ior: 2.4,
        emissive: new THREE.Color(color),
        emissiveIntensity: 0,
        envMap: envMap,
        envMapIntensity: 2.0,
        transparent: true,
        opacity: 0.95
    });
    const gem = new THREE.Mesh(gemGeometry, gemMaterial);
    gem.userData.type = type;
    gem.userData.baseColor = new THREE.Color(color);
    return gem;
}

function addGem(type) {
    if (state.gemCount >= state.maxGems) return;
    
    const slotIndex = state.gemCount;
    const gem = createGem(type);
    const pos = getGemPosition(slotIndex);
    gem.position.copy(pos);
    gem.userData.slotIndex = slotIndex;
    
    ringMesh.add(gem);
    gemMeshes.push(gem);
    
    state.gemCount = gemMeshes.length;
    state.gems = gemMeshes.map(g => ({ type: g.userData.type, slotIndex: g.userData.slotIndex }));
    
    repositionGems();
    updateHUD();
}

function removeLastGem() {
    if (gemMeshes.length === 0) return;
    const gem = gemMeshes.pop();
    ringMesh.remove(gem);
    gem.geometry.dispose();
    gem.material.dispose();
    
    state.gemCount = gemMeshes.length;
    state.gems = gemMeshes.map(g => ({ type: g.userData.type, slotIndex: g.userData.slotIndex }));
    
    repositionGems();
    updateHUD();
}

function clearGems() {
    while (gemMeshes.length > 0) {
        const gem = gemMeshes.pop();
        ringMesh.remove(gem);
        gem.geometry.dispose();
        gem.material.dispose();
    }
    state.gemCount = 0;
    state.gems = [];
    updateHUD();
}

function repositionGems() {
    const count = gemMeshes.length;
    for (let i = 0; i < count; i++) {
        const gem = gemMeshes[i];
        gem.userData.slotIndex = i;
        
        // Distribute evenly around top half
        let angle;
        if (count === 1) {
            angle = 0;
        } else {
            const startAngle = -Math.PI / 3;
            const endAngle = Math.PI / 3;
            angle = startAngle + (endAngle - startAngle) * i / (count - 1);
        }
        
        const torusRadius = 1.0;
        const tubeRadius = 0.15;
        
        const x = torusRadius * Math.cos(angle);
        const y = tubeRadius + 0.10;
        const z = torusRadius * Math.sin(angle);
        
        gem.position.set(x, y, z);
    }
    state.gems = gemMeshes.map(g => ({ type: g.userData.type, slotIndex: g.userData.slotIndex }));
}

// --- Helmet ---
let helmetModel = null;
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
    (gltf) => {
        helmetModel = gltf.scene;
        helmetModel.scale.set(0.3, 0.3, 0.3);
        helmetModel.position.set(3, 0, 0);
        scene.add(helmetModel);
        state.helmetLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load DamagedHelmet.glb:', error);
    }
);

// --- Ring Material Switching ---
function setRingMaterial(name) {
    const preset = materialPresets[name];
    if (!preset) return;
    
    ringMaterial.color.setHex(preset.color);
    ringMaterial.metalness = preset.metalness;
    ringMaterial.roughness = preset.roughness;
    ringMaterial.needsUpdate = true;
    
    state.ringMaterial = name;
    state.ringColor = preset.color;
    
    // Update active button
    document.querySelectorAll('#material-panel button').forEach(btn => btn.classList.remove('active-material'));
    const btnId = 'btn-' + name;
    const btn = document.getElementById(btnId);
    if (btn) btn.classList.add('active-material');
    
    updateHUD();
}

// --- HUD ---
function updateHUD() {
    document.getElementById('hud-gems').textContent = `${state.gemCount} / ${state.maxGems}`;
    document.getElementById('hud-material').textContent = materialNames[state.ringMaterial] || state.ringMaterial;
    document.getElementById('hud-speed').textContent = state.isPaused ? 'Paused' : `${state.timeSpeed.toFixed(2)}x`;
    document.getElementById('hud-time').textContent = `${state.elapsedTime.toFixed(2)}s`;
}

// --- UI Event Listeners ---
const gemSelect = document.getElementById('gem-select');
gemSelect.addEventListener('change', () => {
    state.selectedGemType = gemSelect.value;
});

document.getElementById('btn-add-gem').addEventListener('click', () => {
    addGem(gemSelect.value);
});

document.getElementById('btn-remove-gem').addEventListener('click', () => {
    removeLastGem();
});

document.getElementById('btn-clear-gems').addEventListener('click', () => {
    clearGems();
});

const timeSlider = document.getElementById('time-slider');
const speedDisplay = document.getElementById('speed-display');
timeSlider.addEventListener('input', () => {
    state.timeSpeed = parseFloat(timeSlider.value) / 50.0;
    speedDisplay.textContent = `${state.timeSpeed.toFixed(2)}x`;
    updateHUD();
});

const btnPause = document.getElementById('btn-pause');
btnPause.addEventListener('click', () => {
    state.isPaused = !state.isPaused;
    btnPause.textContent = state.isPaused ? 'Resume' : 'Pause';
    updateHUD();
});

document.getElementById('btn-reset-time').addEventListener('click', () => {
    state.elapsedTime = 0;
    updateHUD();
});

document.getElementById('btn-gold').addEventListener('click', () => setRingMaterial('gold'));
document.getElementById('btn-silver').addEventListener('click', () => setRingMaterial('silver'));
document.getElementById('btn-rose-gold').addEventListener('click', () => setRingMaterial('rose-gold'));
document.getElementById('btn-platinum').addEventListener('click', () => setRingMaterial('platinum'));

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
    // Don't trigger if typing in an input
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    
    const key = e.key.toLowerCase();
    
    if (key === 'r') {
        state.ringRotating = !state.ringRotating;
    } else if (key === 'g') {
        const options = gemSelect.options;
        let idx = gemSelect.selectedIndex;
        idx = (idx + 1) % options.length;
        gemSelect.selectedIndex = idx;
        state.selectedGemType = gemSelect.value;
    } else if (key === ' ') {
        e.preventDefault();
        state.isPaused = !state.isPaused;
        btnPause.textContent = state.isPaused ? 'Resume' : 'Pause';
        updateHUD();
    } else if (key === '1') {
        setRingMaterial('gold');
    } else if (key === '2') {
        setRingMaterial('silver');
    } else if (key === '3') {
        setRingMaterial('rose-gold');
    } else if (key === '4') {
        setRingMaterial('platinum');
    }
});

// --- Animation ---
const clock = new THREE.Clock();
let previousTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    
    // Time control
    let effectiveDelta = 0;
    if (!state.isPaused) {
        effectiveDelta = delta * state.timeSpeed;
        state.elapsedTime += effectiveDelta;
    }
    
    // Ring rotation
    if (state.ringRotating && !state.isPaused) {
        ringParent.rotation.y += 0.5 * effectiveDelta;
    }
    state.ringRotationY = ringParent.rotation.y;
    
    // Gem pulsing
    const pulseIntensity = (Math.sin(state.elapsedTime * 3.0) * 0.5 + 0.5) * 0.5; // 0 to 0.5
    state.gemPulseIntensity = pulseIntensity;
    
    for (const gem of gemMeshes) {
        gem.material.emissiveIntensity = pulseIntensity;
        gem.rotation.y = state.elapsedTime * 2.0;
    }
    
    // Helmet rotation
    if (helmetModel) {
        helmetModel.rotation.y += 0.3 * effectiveDelta;
    }
    
    // Update HUD time
    if (!state.isPaused && effectiveDelta > 0) {
        document.getElementById('hud-time').textContent = `${state.elapsedTime.toFixed(2)}s`;
    }
    
    controls.update();
    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Init ---
updateHUD();
animate();
</script>
</body>
</html>
