<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(15, 15, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #control-panel {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 200px;
        }
        #time-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        #material-panel {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 150px;
        }
        #hud-info {
            bottom: 20px;
            left: 20px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            pointer-events: none;
            background: transparent;
            border: none;
            box-shadow: none;
            backdrop-filter: none;
            text-shadow: 1px 1px 2px #000;
        }
        button, select {
            background: #2a2a4a;
            color: white;
            border: 1px solid #4a4a6a;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }
        button:hover, select:hover {
            background: #3a3a5a;
        }
        button:active {
            background: #1a1a3a;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        input[type=range] {
            width: 150px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="control-panel" class="panel">
        <h3>Gem Controls</h3>
        <select id="gem-select">
            <option value="diamond">Diamond</option>
            <option value="ruby">Ruby</option>
            <option value="emerald">Emerald</option>
            <option value="sapphire">Sapphire</option>
            <option value="amethyst">Amethyst</option>
            <option value="topaz">Topaz</option>
        </select>
        <button id="btn-add-gem">Add Gem</button>
        <button id="btn-remove-gem">Remove Last Gem</button>
        <button id="btn-clear-gems">Clear All</button>
    </div>

    <div id="time-panel" class="panel">
        <button id="btn-pause">Pause</button>
        <div class="slider-container">
            <label for="time-slider" style="font-size: 12px;">Speed</label>
            <input type="range" id="time-slider" min="0" max="100" value="50">
        </div>
        <button id="btn-reset-time">Reset Time</button>
    </div>

    <div id="material-panel" class="panel">
        <h3>Ring Material</h3>
        <button id="btn-gold">Gold</button>
        <button id="btn-silver">Silver</button>
        <button id="btn-rose-gold">Rose Gold</button>
        <button id="btn-platinum">Platinum</button>
    </div>

    <div id="hud-info" class="panel">
        <div id="hud-gems">Gems: 0/6</div>
        <div id="hud-mat">Material: Gold</div>
        <div id="hud-speed">Speed: 1.00x</div>
        <div id="hud-time">Time: 0.00s</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gemCount: 0,
            gems: [],
            ringMaterial: 'gold',
            ringColor: 0xFFD700,
            ringRotating: true,
            timeSpeed: 1.0,
            isPaused: false,
            elapsedTime: 0,
            helmetLoaded: false,
            ringRotationY: 0,
            gemPulseIntensity: 0,
            selectedGemType: 'diamond',
            maxGems: 6
        };

        const state = window.__3D_STATE__;

        // --- Constants ---
        const GEM_COLORS = {
            'diamond': 0xffffff,
            'ruby': 0xff0040,
            'emerald': 0x00ff80,
            'sapphire': 0x0040ff,
            'amethyst': 0x9900ff,
            'topaz': 0xffaa00
        };

        const RING_MATERIALS = {
            'gold': { color: 0xFFD700, metalness: 0.95, roughness: 0.05, id: 'gold' },
            'silver': { color: 0xC0C0C0, metalness: 0.9, roughness: 0.1, id: 'silver' },
            'rose-gold': { color: 0xB76E79, metalness: 0.92, roughness: 0.08, id: 'rose-gold' },
            'platinum': { color: 0xE5E4E2, metalness: 0.98, roughness: 0.03, id: 'platinum' }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        // Background handled by CSS, set clear color to transparent
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xff88cc, 0.8);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // --- Objects ---
        // Ring Group (holds ring and gems)
        const ringGroup = new THREE.Group();
        scene.add(ringGroup);

        // Ring Band
        const ringGeometry = new THREE.TorusGeometry(1.0, 0.15, 32, 100);
        const ringMaterial = new THREE.MeshStandardMaterial({
            color: RING_MATERIALS['gold'].color,
            metalness: RING_MATERIALS['gold'].metalness,
            roughness: RING_MATERIALS['gold'].roughness
        });
        const ringMesh = new THREE.Mesh(ringGeometry, ringMaterial);
        ringMesh.rotation.x = Math.PI / 2; // Lay flat so top is Y+
        ringGroup.add(ringMesh);

        // Helmet
        let helmetMesh = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            (gltf) => {
                helmetMesh = gltf.scene;
                helmetMesh.scale.set(0.3, 0.3, 0.3);
                helmetMesh.position.set(3, 0, 0);
                scene.add(helmetMesh);
                state.helmetLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading helmet:', error)
        );

        // Gems Array (stores mesh references)
        const gemMeshes = [];
        const gemGeometry = new THREE.OctahedronGeometry(0.12, 0);

        // --- Logic Functions ---
        function getGemPosition(index) {
            // 6 slots evenly spaced on top half. 
            // Angles from PI/6 to 5PI/6 (30 to 150 degrees)
            const startAngle = Math.PI / 6;
            const endAngle = 5 * Math.PI / 6;
            const range = endAngle - startAngle;
            const step = range / 5; // 5 intervals for 6 gems
            const angle = startAngle + index * step;
            
            const radius = 1.0 + 0.15; // Torus radius + tube radius
            
            // Since ring is rotated Math.PI/2 on X, its local XY plane is world XZ plane.
            // We want gems on the "top" half relative to the ring's local space.
            // Local X = cos(angle)*r, Local Y = sin(angle)*r, Local Z = 0
            return new THREE.Vector3(
                Math.cos(angle) * radius,
                Math.sin(angle) * radius,
                0
            );
        }

        function addGem() {
            if (gemMeshes.length >= state.maxGems) return;
            
            const type = state.selectedGemType;
            const colorHex = GEM_COLORS[type];
            
            const material = new THREE.MeshPhysicalMaterial({
                color: colorHex,
                emissive: colorHex,
                emissiveIntensity: 0,
                transmission: 0.9,
                thickness: 0.5,
                roughness: 0,
                ior: 2.4
            });

            const gem = new THREE.Mesh(gemGeometry, material);
            const slotIndex = gemMeshes.length;
            
            const pos = getGemPosition(slotIndex);
            gem.position.copy(pos);
            
            // Orient gem to point outward
            gem.lookAt(new THREE.Vector3(0,0,0));
            
            ringMesh.add(gem); // Add to ringMesh so it rotates with it
            gemMeshes.push(gem);
            
            state.gems.push({ type: type, slotIndex: slotIndex });
            state.gemCount = gemMeshes.length;
            updateHUD();
        }

        function removeGem() {
            if (gemMeshes.length === 0) return;
            const gem = gemMeshes.pop();
            ringMesh.remove(gem);
            gem.material.dispose();
            
            state.gems.pop();
            state.gemCount = gemMeshes.length;
            updateHUD();
        }

        function clearGems() {
            while(gemMeshes.length > 0) {
                removeGem();
            }
        }

        function setRingMaterial(matId) {
            const matDef = RING_MATERIALS[matId];
            if (!matDef) return;
            
            ringMaterial.color.setHex(matDef.color);
            ringMaterial.metalness = matDef.metalness;
            ringMaterial.roughness = matDef.roughness;
            
            state.ringMaterial = matId;
            state.ringColor = matDef.color;
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('hud-gems').innerText = `Gems: ${state.gemCount}/${state.maxGems}`;
            
            const matName = state.ringMaterial.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            document.getElementById('hud-mat').innerText = `Material: ${matName}`;
            
            document.getElementById('hud-speed').innerText = `Speed: ${state.timeSpeed.toFixed(2)}x`;
            document.getElementById('hud-time').innerText = `Time: ${state.elapsedTime.toFixed(2)}s`;
        }

        // --- DOM Event Listeners ---
        document.getElementById('gem-select').addEventListener('change', (e) => {
            state.selectedGemType = e.target.value;
        });

        document.getElementById('btn-add-gem').addEventListener('click', addGem);
        document.getElementById('btn-remove-gem').addEventListener('click', removeGem);
        document.getElementById('btn-clear-gems').addEventListener('click', clearGems);

        document.getElementById('time-slider').addEventListener('input', (e) => {
            state.timeSpeed = parseInt(e.target.value) / 50;
            updateHUD();
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            state.isPaused = !state.isPaused;
            e.target.innerText = state.isPaused ? 'Resume' : 'Pause';
        });

        document.getElementById('btn-reset-time').addEventListener('click', () => {
            state.elapsedTime = 0;
            updateHUD();
        });

        document.getElementById('btn-gold').addEventListener('click', () => setRingMaterial('gold'));
        document.getElementById('btn-silver').addEventListener('click', () => setRingMaterial('silver'));
        document.getElementById('btn-rose-gold').addEventListener('click', () => setRingMaterial('rose-gold'));
        document.getElementById('btn-platinum').addEventListener('click', () => setRingMaterial('platinum'));

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                state.ringRotating = !state.ringRotating;
            } else if (key === 'g') {
                const select = document.getElementById('gem-select');
                select.selectedIndex = (select.selectedIndex + 1) % select.options.length;
                state.selectedGemType = select.value;
            } else if (key === ' ') {
                e.preventDefault(); // Prevent scrolling
                document.getElementById('btn-pause').click();
            } else if (key === '1') {
                setRingMaterial('gold');
            } else if (key === '2') {
                setRingMaterial('silver');
            } else if (key === '3') {
                setRingMaterial('rose-gold');
            } else if (key === '4') {
                setRingMaterial('platinum');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let ringRotationAccumulator = 0;

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const effectiveDt = state.isPaused ? 0 : dt * state.timeSpeed;
            
            if (!state.isPaused) {
                state.elapsedTime += effectiveDt;
            }

            // Ring Rotation
            if (state.ringRotating) {
                ringRotationAccumulator += effectiveDt * 0.5;
            }
            ringGroup.rotation.y = ringRotationAccumulator;
            state.ringRotationY = ringGroup.rotation.y;

            // Helmet Rotation
            if (helmetMesh) {
                helmetMesh.rotation.y = state.elapsedTime * 0.5;
            }

            // Gem Pulsing
            state.gemPulseIntensity = (Math.sin(state.elapsedTime * 3) + 1) / 2 * 0.5;
            gemMeshes.forEach(gem => {
                gem.material.emissiveIntensity = state.gemPulseIntensity;
            });

            controls.update();
            updateHUD();
            renderer.render(scene, camera);
        }

        // Initialize
        updateHUD();
        animate();

    </script>
</body>
</html>
