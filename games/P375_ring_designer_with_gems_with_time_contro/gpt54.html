<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      background: rgba(10, 12, 20, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #control-panel {
      top: 16px;
      left: 16px;
      width: 220px;
    }

    #material-panel {
      top: 16px;
      right: 16px;
      width: 180px;
    }

    #time-panel {
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: 320px;
    }

    #hud-info {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      min-width: 260px;
      background: rgba(10, 12, 20, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .panel h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #ffdca8;
    }

    .panel label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #d8d8e8;
    }

    select, button, input[type="range"] {
      width: 100%;
      margin: 6px 0;
      box-sizing: border-box;
    }

    button, select {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: rgba(255,255,255,0.14);
    }

    .material-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #bfc7e6;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div id="control-panel" class="panel">
    <h3>Gem Controls</h3>
    <label for="gem-select">Gem Type</label>
    <select id="gem-select">
      <option value="diamond">Diamond</option>
      <option value="ruby">Ruby</option>
      <option value="emerald">Emerald</option>
      <option value="sapphire">Sapphire</option>
      <option value="amethyst">Amethyst</option>
      <option value="topaz">Topaz</option>
    </select>
    <button id="btn-add-gem">Add Gem</button>
    <button id="btn-remove-gem">Remove Last Gem</button>
    <button id="btn-clear-gems">Clear All</button>
    <div class="hint">Keys: G cycle gem, R toggle rotation</div>
  </div>

  <div id="material-panel" class="panel">
    <h3>Ring Material</h3>
    <div class="material-grid">
      <button id="btn-gold">Gold</button>
      <button id="btn-silver">Silver</button>
      <button id="btn-rose-gold">Rose Gold</button>
      <button id="btn-platinum">Platinum</button>
    </div>
    <div class="hint">Keys: 1-4 switch materials</div>
  </div>

  <div id="time-panel" class="panel">
    <h3>Time Controls</h3>
    <label for="time-slider">Animation Speed</label>
    <input id="time-slider" type="range" min="0" max="100" value="50" />
    <button id="btn-pause">Pause</button>
    <button id="btn-reset-time">Reset Time</button>
    <div class="hint">Space = Pause/Resume</div>
  </div>

  <div id="hud-info"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xff88cc, 0.8);
    pointLight.position.set(-3, 3, -3);
    scene.add(pointLight);

    const ringMaterials = {
      gold:      { color: 0xFFD700, metalness: 0.95, roughness: 0.05, label: 'gold' },
      silver:    { color: 0xC0C0C0, metalness: 0.90, roughness: 0.10, label: 'silver' },
      'rose-gold': { color: 0xB76E79, metalness: 0.92, roughness: 0.08, label: 'rose-gold' },
      platinum:  { color: 0xE5E4E2, metalness: 0.98, roughness: 0.03, label: 'platinum' }
    };

    const gemTypes = {
      diamond:  { color: '#ffffff' },
      ruby:     { color: '#ff0040' },
      emerald:  { color: '#00ff80' },
      sapphire: { color: '#0040ff' },
      amethyst: { color: '#9900ff' },
      topaz:    { color: '#ffaa00' }
    };

    const state = {
      gemCount: 0,
      gems: [],
      ringMaterial: 'gold',
      ringColor: 0xFFD700,
      ringRotating: true,
      timeSpeed: 1.0,
      isPaused: false,
      elapsedTime: 0,
      helmetLoaded: false,
      ringRotationY: 0,
      gemPulseIntensity: 0,
      selectedGemType: 'diamond',
      maxGems: 6
    };

    window.__3D_STATE__ = state;

    const hud = document.getElementById('hud-info');
    const gemSelect = document.getElementById('gem-select');
    const btnAddGem = document.getElementById('btn-add-gem');
    const btnRemoveGem = document.getElementById('btn-remove-gem');
    const btnClearGems = document.getElementById('btn-clear-gems');
    const timeSlider = document.getElementById('time-slider');
    const btnPause = document.getElementById('btn-pause');
    const btnResetTime = document.getElementById('btn-reset-time');

    const ringGeometry = new THREE.TorusGeometry(1.0, 0.15, 32, 100);
    const ringMaterial = new THREE.MeshStandardMaterial({
      color: ringMaterials.gold.color,
      metalness: ringMaterials.gold.metalness,
      roughness: ringMaterials.gold.roughness
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.position.y = 0;
    scene.add(ring);

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);
    ringGroup.add(ring);

    const gemGroup = new THREE.Group();
    ringGroup.add(gemGroup);

    const gemGeometry = new THREE.OctahedronGeometry(0.12, 0);

    function createGem(type, slotIndex) {
      const conf = gemTypes[type];
      const color = new THREE.Color(conf.color);
      const material = new THREE.MeshPhysicalMaterial({
        color,
        emissive: color.clone(),
        emissiveIntensity: 0,
        transmission: 0.9,
        thickness: 0.5,
        roughness: 0,
        ior: 2.4,
        transparent: true,
        opacity: 1.0
      });

      const gem = new THREE.Mesh(gemGeometry, material);

      const t = slotIndex / (state.maxGems - 1);
      const angle = Math.PI - t * Math.PI; // top half from left to right
      const radius = 1.0;
      const outward = radius + 0.02;
      const tubeHeight = 0.15;

      gem.position.set(
        Math.cos(angle) * outward,
        Math.sin(angle) * outward + tubeHeight * 0.35,
        0
      );

      gem.lookAt(0, 0, 0);
      gem.rotateX(Math.PI / 4);

      gem.userData = { type, slotIndex };
      return gem;
    }

    function rebuildGems() {
      while (gemGroup.children.length) {
        const child = gemGroup.children.pop();
        gemGroup.remove(child);
        if (child.material) child.material.dispose();
      }

      state.gems.forEach((g, i) => {
        g.slotIndex = i;
        const gem = createGem(g.type, i);
        gemGroup.add(gem);
      });

      state.gemCount = state.gems.length;
    }

    function addGem(type) {
      if (state.gems.length >= state.maxGems) return;
      state.gems.push({ type, slotIndex: state.gems.length });
      rebuildGems();
    }

    function removeLastGem() {
      if (state.gems.length === 0) return;
      state.gems.pop();
      rebuildGems();
    }

    function clearGems() {
      state.gems = [];
      rebuildGems();
    }

    function setRingMaterial(name) {
      const mat = ringMaterials[name];
      if (!mat) return;
      ringMaterial.color.setHex(mat.color);
      ringMaterial.metalness = mat.metalness;
      ringMaterial.roughness = mat.roughness;
      state.ringMaterial = name;
      state.ringColor = mat.color;
    }

    function togglePause() {
      state.isPaused = !state.isPaused;
      btnPause.textContent = state.isPaused ? 'Resume' : 'Pause';
    }

    btnAddGem.addEventListener('click', () => addGem(gemSelect.value));
    btnRemoveGem.addEventListener('click', removeLastGem);
    btnClearGems.addEventListener('click', clearGems);

    gemSelect.addEventListener('change', () => {
      state.selectedGemType = gemSelect.value;
    });

    timeSlider.addEventListener('input', () => {
      state.timeSpeed = Number(timeSlider.value) / 50;
    });

    btnPause.addEventListener('click', togglePause);

    btnResetTime.addEventListener('click', () => {
      state.elapsedTime = 0;
    });

    document.getElementById('btn-gold').addEventListener('click', () => setRingMaterial('gold'));
    document.getElementById('btn-silver').addEventListener('click', () => setRingMaterial('silver'));
    document.getElementById('btn-rose-gold').addEventListener('click', () => setRingMaterial('rose-gold'));
    document.getElementById('btn-platinum').addEventListener('click', () => setRingMaterial('platinum'));

    const loader = new GLTFLoader();
    let helmet = null;

    loader.load(
      'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        helmet = gltf.scene;
        helmet.scale.set(0.3, 0.3, 0.3);
        helmet.position.set(3, 0, 0);
        scene.add(helmet);
        state.helmetLoaded = true;
      },
      undefined,
      () => {
        state.helmetLoaded = false;
      }
    );

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        state.ringRotating = !state.ringRotating;
      } else if (e.code === 'KeyG') {
        const options = [...gemSelect.options];
        const current = options.findIndex(o => o.value === gemSelect.value);
        const next = (current + 1) % options.length;
        gemSelect.selectedIndex = next;
        state.selectedGemType = gemSelect.value;
      } else if (e.code === 'Space') {
        e.preventDefault();
        togglePause();
      } else if (e.code === 'Digit1') {
        setRingMaterial('gold');
      } else if (e.code === 'Digit2') {
        setRingMaterial('silver');
      } else if (e.code === 'Digit3') {
        setRingMaterial('rose-gold');
      } else if (e.code === 'Digit4') {
        setRingMaterial('platinum');
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    state.timeSpeed = Number(timeSlider.value) / 50;
    state.selectedGemType = gemSelect.value;
    setRingMaterial('gold');

    const clock = new THREE.Clock();

    function updateHUD() {
      hud.textContent =
`Gems: ${state.gemCount}/${state.maxGems}
Material: ${state.ringMaterial}
Time Speed: ${state.timeSpeed.toFixed(2)}x
Elapsed Time: ${state.elapsedTime.toFixed(2)}s
Ring Rotating: ${state.ringRotating ? 'Yes' : 'No'}
Helmet Loaded: ${state.helmetLoaded ? 'Yes' : 'No'}`;
    }

    function animate() {
      requestAnimationFrame(animate);

      const rawDelta = clock.getDelta();
      const speed = state.timeSpeed;
      const effectiveDelta = state.isPaused ? 0 : rawDelta * speed;

      if (!state.isPaused) {
        state.elapsedTime += effectiveDelta;
      }

      if (state.ringRotating) {
        ringGroup.rotation.y += effectiveDelta * 0.6;
      }

      if (helmet) {
        helmet.rotation.y = state.elapsedTime * 0.35;
      }

      const pulse = (Math.sin(state.elapsedTime * 3.0) * 0.5 + 0.5) * 0.5;
      state.gemPulseIntensity = pulse;

      gemGroup.children.forEach((gem, index) => {
        gem.material.emissiveIntensity = pulse;
        gem.rotation.y = state.elapsedTime * (0.8 + index * 0.03);
      });

      controls.update();

      state.gemCount = state.gems.length;
      state.ringRotationY = ringGroup.rotation.y;
      state.selectedGemType = gemSelect.value;

      updateHUD();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
