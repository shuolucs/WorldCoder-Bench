<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Audio Spectrum Visualizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#control-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10, 10, 30, 0.9);
    border-top: 1px solid rgba(100, 140, 255, 0.3);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    z-index: 100;
    backdrop-filter: blur(10px);
}

#control-panel button {
    background: rgba(60, 80, 180, 0.6);
    color: #ccd;
    border: 1px solid rgba(100, 140, 255, 0.4);
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    min-width: 80px;
}

#control-panel button:hover {
    background: rgba(80, 100, 220, 0.8);
    color: #fff;
    border-color: rgba(140, 180, 255, 0.7);
}

#control-panel button:active {
    transform: scale(0.96);
}

.slider-container {
    display: flex;
    align-items: center;
    gap: 8px;
}

#slider-speed {
    width: 120px;
    accent-color: #6688ff;
    cursor: pointer;
}

#speed-label, #time-display {
    color: #aab;
    font-size: 14px;
    font-family: 'Courier New', monospace;
    min-width: 60px;
}

#time-display {
    color: #88aaff;
    font-weight: bold;
    font-size: 16px;
    min-width: 100px;
}

#hud {
    position: fixed;
    top: 15px;
    right: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 140, 255, 0.25);
    border-radius: 10px;
    padding: 15px 20px;
    z-index: 100;
    backdrop-filter: blur(10px);
    min-width: 200px;
}

#hud h3 {
    color: #6688ff;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    padding-bottom: 6px;
}

.hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 6px 0;
}

.hud-label {
    color: #778;
    font-size: 12px;
}

.hud-value {
    color: #cce;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
}

#keyboard-hint {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 140, 255, 0.25);
    border-radius: 10px;
    padding: 15px 20px;
    z-index: 100;
    backdrop-filter: blur(10px);
}

#keyboard-hint h3 {
    color: #6688ff;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    padding-bottom: 6px;
}

.key-row {
    color: #778;
    font-size: 11px;
    margin: 4px 0;
}

.key-row kbd {
    background: rgba(60, 80, 180, 0.4);
    color: #aab;
    padding: 2px 6px;
    border-radius: 3px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    border: 1px solid rgba(100, 140, 255, 0.3);
}

#loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #0a0a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    transition: opacity 0.5s;
}

#loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
}

.loader {
    color: #6688ff;
    font-size: 18px;
    letter-spacing: 3px;
}
</style>
</head>
<body>

<div id="loading-overlay">
    <div class="loader">LOADING VISUALIZER...</div>
</div>

<div id="hud">
    <h3>Spectrum HUD</h3>
    <div class="hud-row">
        <span class="hud-label">Avg Amplitude</span>
        <span class="hud-value" id="hud-avg-amp">0.00</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Peak Band</span>
        <span class="hud-value" id="hud-peak-band">0</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Total Bars</span>
        <span class="hud-value" id="hud-bar-count">256</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">State</span>
        <span class="hud-value" id="hud-state">playing</span>
    </div>
</div>

<div id="keyboard-hint">
    <h3>Controls</h3>
    <div class="key-row"><kbd>Space</kbd> Play / Pause</div>
    <div class="key-row"><kbd>R</kbd> Rewind</div>
    <div class="key-row"><kbd>X</kbd> Reset</div>
    <div class="key-row"><kbd>↑</kbd> Speed Up</div>
    <div class="key-row"><kbd>↓</kbd> Speed Down</div>
</div>

<div id="control-panel">
    <button id="btn-play-pause">Pause</button>
    <button id="btn-rewind">Rewind</button>
    <button id="btn-reset">Reset</button>
    <div class="slider-container">
        <span style="color:#778;font-size:12px;">Speed:</span>
        <input type="range" id="slider-speed" min="0.25" max="3.0" step="0.25" value="1.0">
        <span id="speed-label">1.0x</span>
    </div>
    <span id="time-display">T: 0.0s</span>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const GRID_SIZE = 16;
const BAR_WIDTH = 0.4;
const BAR_DEPTH = 0.4;
const BAR_SPACING = 0.6;
const MIN_HEIGHT = 0.1;
const MAX_HEIGHT = 5.0;

let playbackState = 'playing';
let simTime = 0;
let speed = 1.0;
let lastUpdateTime = 0;
const UPDATE_INTERVAL = 0.2; // 200ms
let timeSinceLastUpdate = 0;

// Spectrum history: [timeSlice][band] - timeSlice 0 = front (newest)
let spectrumHistory = [];
for (let t = 0; t < GRID_SIZE; t++) {
    spectrumHistory.push(new Float32Array(GRID_SIZE).fill(MIN_HEIGHT));
}

// Bar meshes: bars[z][x]
let bars = [];
let barTargetHeights = [];
for (let z = 0; z < GRID_SIZE; z++) {
    barTargetHeights.push(new Float32Array(GRID_SIZE).fill(MIN_HEIGHT));
}

let storkModel = null;
let storkLoaded = false;
let avgAmplitude = 0;
let peakBand = 0;
let maxBarHeight = MIN_HEIGHT;

// Expose state
window.__3D_STATE__ = {
    playbackState: 'playing',
    simTime: 0,
    speed: 1.0,
    avgAmplitude: 0,
    peakBand: 0,
    barCount: 256,
    storkPosition: { x: 0, y: 7, z: 0 },
    storkLoaded: false,
    frontRowHeights: new Array(16).fill(MIN_HEIGHT),
    maxBarHeight: MIN_HEIGHT,
    gridSize: 16,
    isInitialized: false
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 7);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 1024;
directionalLight.shadow.mapSize.height = 1024;
scene.add(directionalLight);

// Extra point lights for atmosphere
const pointLight1 = new THREE.PointLight(0x4466ff, 0.5, 30);
pointLight1.position.set(-8, 5, -8);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff4466, 0.3, 30);
pointLight2.position.set(8, 5, 8);
scene.add(pointLight2);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// --- Ground plane ---
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a1a,
    roughness: 0.9,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.05;
ground.receiveShadow = true;
scene.add(ground);

// --- Grid helper ---
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.position.y = -0.04;
scene.add(gridHelper);

// --- Create Bars ---
const gridOffset = (GRID_SIZE - 1) * BAR_SPACING / 2;

function getBarColor(height) {
    const t = Math.min(height / MAX_HEIGHT, 1.0);
    const hue = t * 0.7;
    const color = new THREE.Color();
    color.setHSL(hue, 1.0, 0.5);
    return color;
}

for (let z = 0; z < GRID_SIZE; z++) {
    bars[z] = [];
    for (let x = 0; x < GRID_SIZE; x++) {
        const geometry = new THREE.BoxGeometry(BAR_WIDTH, 1, BAR_DEPTH);
        // Shift geometry so bottom is at y=0
        geometry.translate(0, 0.5, 0);

        const material = new THREE.MeshStandardMaterial({
            color: getBarColor(MIN_HEIGHT),
            roughness: 0.3,
            metalness: 0.6,
            emissive: new THREE.Color(0x000000),
            emissiveIntensity: 0.3
        });

        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.x = x * BAR_SPACING - gridOffset;
        mesh.position.z = z * BAR_SPACING - gridOffset;
        mesh.position.y = 0;
        mesh.scale.y = MIN_HEIGHT;
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        scene.add(mesh);
        bars[z][x] = mesh;
    }
}

// --- Spectrum Generation ---
function generateSpectrum(time) {
    const spectrum = new Float32Array(GRID_SIZE);
    for (let i = 0; i < GRID_SIZE; i++) {
        let value = Math.abs(Math.sin(time * (0.5 + i * 0.3)) * Math.cos(time * 0.2 + i)) * 3 +
                    Math.sin(time * 0.1 + i * 0.5) * 2;
        value = Math.max(MIN_HEIGHT, Math.min(MAX_HEIGHT, value));
        spectrum[i] = value;
    }
    return spectrum;
}

// --- Load Stork Model ---
const loader = new GLTFLoader();

// Try to load the stork model, but create a placeholder if it fails
function createStorkPlaceholder() {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.3, 0.8, 8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.2 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.z = Math.PI / 6;
    group.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.set(0.3, 0.6, 0);
    group.add(head);

    // Beak
    const beakGeo = new THREE.ConeGeometry(0.08, 0.5, 8);
    const beakMat = new THREE.MeshStandardMaterial({ color: 0xff6633, roughness: 0.3 });
    const beak = new THREE.Mesh(beakGeo, beakMat);
    beak.position.set(0.6, 0.6, 0);
    beak.rotation.z = -Math.PI / 2;
    group.add(beak);

    // Legs
    const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 1.0, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.5 });
    const leg1 = new THREE.Mesh(legGeo, legMat);
    leg1.position.set(-0.1, -0.8, 0.1);
    group.add(leg1);
    const leg2 = new THREE.Mesh(legGeo, legMat);
    leg2.position.set(-0.1, -0.8, -0.1);
    group.add(leg2);

    // Wings
    const wingGeo = new THREE.BoxGeometry(0.05, 0.3, 0.8);
    const wingMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4 });
    const wing1 = new THREE.Mesh(wingGeo, wingMat);
    wing1.position.set(-0.1, 0.15, 0.5);
    wing1.rotation.x = 0.2;
    group.add(wing1);
    const wing2 = new THREE.Mesh(wingGeo, wingMat);
    wing2.position.set(-0.1, 0.15, -0.5);
    wing2.rotation.x = -0.2;
    group.add(wing2);

    group.scale.set(1.5, 1.5, 1.5);
    return group;
}

try {
    loader.load(
        '._stork.glb',
        (gltf) => {
            storkModel = gltf.scene;
            // Calculate bounding box to scale appropriately
            const box = new THREE.Box3().setFromObject(storkModel);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scaleFactor = 2.0 / maxDim;
            storkModel.scale.set(scaleFactor, scaleFactor, scaleFactor);

            // Center the model
            const center = box.getCenter(new THREE.Vector3());
            storkModel.position.set(
                -center.x * scaleFactor,
                7 - center.y * scaleFactor,
                -center.z * scaleFactor
            );

            storkModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(storkModel);
            storkLoaded = true;
            window.__3D_STATE__.storkLoaded = true;
        },
        undefined,
        (error) => {
            console.warn('Could not load stork.glb, using placeholder:', error);
            storkModel = createStorkPlaceholder();
            storkModel.position.set(0, 7, 0);
            scene.add(storkModel);
            storkLoaded = true;
            window.__3D_STATE__.storkLoaded = true;
        }
    );
} catch (e) {
    console.warn('GLTFLoader error, using placeholder');
    storkModel = createStorkPlaceholder();
    storkModel.position.set(0, 7, 0);
    scene.add(storkModel);
    storkLoaded = true;
    window.__3D_STATE__.storkLoaded = true;
}

// Fallback: if model hasn't loaded after 3 seconds, use placeholder
setTimeout(() => {
    if (!storkLoaded) {
        storkModel = createStorkPlaceholder();
        storkModel.position.set(0, 7, 0);
        scene.add(storkModel);
        storkLoaded = true;
        window.__3D_STATE__.storkLoaded = true;
    }
}, 3000);

// --- UI References ---
const btnPlayPause = document.getElementById('btn-play-pause');
const btnRewind = document.getElementById('btn-rewind');
const btnReset = document.getElementById('btn-reset');
const sliderSpeed = document.getElementById('slider-speed');
const speedLabel = document.getElementById('speed-label');
const timeDisplay = document.getElementById('time-display');
const hudAvgAmp = document.getElementById('hud-avg-amp');
const hudPeakBand = document.getElementById('hud-peak-band');
const hudBarCount = document.getElementById('hud-bar-count');
const hudState = document.getElementById('hud-state');
const loadingOverlay = document.getElementById('loading-overlay');

// --- UI Event Handlers ---
btnPlayPause.addEventListener('click', () => {
    if (playbackState === 'playing') {
        playbackState = 'paused';
        btnPlayPause.textContent = 'Play';
    } else {
        playbackState = 'playing';
        btnPlayPause.textContent = 'Pause';
    }
});

btnRewind.addEventListener('click', () => {
    playbackState = 'rewinding';
    btnPlayPause.textContent = 'Play';
});

btnReset.addEventListener('click', () => {
    resetSimulation();
});

sliderSpeed.addEventListener('input', () => {
    speed = parseFloat(sliderSpeed.value);
    speedLabel.textContent = speed.toFixed(2) + 'x';
});

function resetSimulation() {
    simTime = 0;
    playbackState = 'playing';
    btnPlayPause.textContent = 'Pause';
    timeSinceLastUpdate = 0;

    for (let t = 0; t < GRID_SIZE; t++) {
        spectrumHistory[t].fill(MIN_HEIGHT);
        barTargetHeights[t].fill(MIN_HEIGHT);
    }

    for (let z = 0; z < GRID_SIZE; z++) {
        for (let x = 0; x < GRID_SIZE; x++) {
            bars[z][x].scale.y = MIN_HEIGHT;
            const color = getBarColor(MIN_HEIGHT);
            bars[z][x].material.color.copy(color);
            bars[z][x].material.emissive.copy(color).multiplyScalar(0.3);
        }
    }
}

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
    // Don't handle if user is interacting with slider
    if (e.target === sliderSpeed) return;

    switch (e.code) {
        case 'Space':
            e.preventDefault();
            btnPlayPause.click();
            break;
        case 'KeyR':
            btnRewind.click();
            break;
        case 'KeyX':
            resetSimulation();
            break;
        case 'ArrowUp':
            e.preventDefault();
            speed = Math.min(3.0, speed + 0.25);
            sliderSpeed.value = speed;
            speedLabel.textContent = speed.toFixed(2) + 'x';
            break;
        case 'ArrowDown':
            e.preventDefault();
            speed = Math.max(0.25, speed - 0.25);
            sliderSpeed.value = speed;
            speedLabel.textContent = speed.toFixed(2) + 'x';
            break;
    }
});

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Rewind history buffer ---
let rewindHistoryBuffer = [];
const MAX_REWIND_HISTORY = 500;

// --- Animation Loop ---
const clock = new THREE.Clock();
let frameCount = 0;

function animate() {
    requestAnimationFrame(animate);

    const deltaTime = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    frameCount++;

    // Hide loading overlay after first frame
    if (frameCount === 2) {
        loadingOverlay.classList.add('hidden');
        window.__3D_STATE__.isInitialized = true;
    }

    // Update simTime based on state
    if (playbackState === 'playing') {
        simTime += deltaTime * speed;
        timeSinceLastUpdate += deltaTime * speed;

        // Store history for rewind
        if (timeSinceLastUpdate >= UPDATE_INTERVAL) {
            timeSinceLastUpdate -= UPDATE_INTERVAL;

            // Generate new spectrum and shift
            const newSpectrum = generateSpectrum(simTime);

            // Store for rewind
            rewindHistoryBuffer.push(newSpectrum.slice());
            if (rewindHistoryBuffer.length > MAX_REWIND_HISTORY) {
                rewindHistoryBuffer.shift();
            }

            // Shift history back
            for (let t = GRID_SIZE - 1; t > 0; t--) {
                spectrumHistory[t].set(spectrumHistory[t - 1]);
            }
            spectrumHistory[0].set(newSpectrum);

            // Update target heights
            for (let z = 0; z < GRID_SIZE; z++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    barTargetHeights[z][x] = spectrumHistory[z][x];
                }
            }
        }
    } else if (playbackState === 'rewinding') {
        simTime = Math.max(0, simTime - deltaTime * speed * 2);
        timeSinceLastUpdate += deltaTime * speed * 2;

        if (timeSinceLastUpdate >= UPDATE_INTERVAL) {
            timeSinceLastUpdate -= UPDATE_INTERVAL;

            if (rewindHistoryBuffer.length > 0) {
                // Shift history forward (reverse)
                for (let t = 0; t < GRID_SIZE - 1; t++) {
                    spectrumHistory[t].set(spectrumHistory[t + 1]);
                }
                const restored = rewindHistoryBuffer.pop();
                if (restored) {
                    spectrumHistory[GRID_SIZE - 1].set(restored);
                } else {
                    spectrumHistory[GRID_SIZE - 1].fill(MIN_HEIGHT);
                }
            } else {
                // No more history, shift forward with empty
                for (let t = 0; t < GRID_SIZE - 1; t++) {
                    spectrumHistory[t].set(spectrumHistory[t + 1]);
                }
                spectrumHistory[GRID_SIZE - 1].fill(MIN_HEIGHT);
            }

            for (let z = 0; z < GRID_SIZE; z++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    barTargetHeights[z][x] = spectrumHistory[z][x];
                }
            }
        }

        if (simTime <= 0) {
            playbackState = 'paused';
            btnPlayPause.textContent = 'Play';
        }
    }

    // Lerp bar heights and update colors
    maxBarHeight = MIN_HEIGHT;
    for (let z = 0; z < GRID_SIZE; z++) {
        for (let x = 0; x < GRID_SIZE; x++) {
            const bar = bars[z][x];
            const target = barTargetHeights[z][x];
            const current = bar.scale.y;
            const newHeight = current + (target - current) * 0.1;
            bar.scale.y = newHeight;

            if (newHeight > maxBarHeight) maxBarHeight = newHeight;

            const color = getBarColor(newHeight);
            bar.material.color.copy(color);
            bar.material.emissive.copy(color).multiplyScalar(0.3);
        }
    }

    // Calculate front row stats
    let sum = 0;
    let peak = 0;
    let peakIdx = 0;
    const frontRow = [];
    for (let x = 0; x < GRID_SIZE; x++) {
        const h = bars[0][x].scale.y;
        frontRow.push(h);
        sum += h;
        if (h > peak) {
            peak = h;
            peakIdx = x;
        }
    }
    avgAmplitude = sum / GRID_SIZE;
    peakBand = peakIdx;

    // Update stork
    if (storkModel) {
        storkModel.rotation.y += 0.5 * deltaTime;
        const targetY = 7 + avgAmplitude * 0.5;
        storkModel.position.y += (targetY - storkModel.position.y) * 0.05;
        storkModel.position.x = Math.sin(elapsed * 0.3) * 0.5;
        storkModel.position.z = Math.cos(elapsed * 0.3) * 0.5;

        // Wing flap effect for placeholder
        storkModel.children.forEach((child, i) => {
            if (i >= 4 && child.isMesh) {
                child.rotation.x = Math.sin(elapsed * 3 + i) * 0.3;
            }
        });
    }

    // Animate point lights
    pointLight1.position.x = Math.sin(elapsed * 0.5) * 10;
    pointLight1.position.z = Math.cos(elapsed * 0.5) * 10;
    pointLight1.intensity = 0.3 + avgAmplitude * 0.1;

    pointLight2.position.x = Math.cos(elapsed * 0.3) * 10;
    pointLight2.position.z = Math.sin(elapsed * 0.3) * 10;
    pointLight2.intensity = 0.2 + avgAmplitude * 0.08;

    // Update HUD
    hudAvgAmp.textContent = avgAmplitude.toFixed(2);
    hudPeakBand.textContent = peakBand.toString();
    hudBarCount.textContent = '256';
    hudState.textContent = playbackState;
    timeDisplay.textContent = 'T: ' + simTime.toFixed(1) + 's';

    // Update global state
    const state = window.__3D_STATE__;
    state.playbackState = playbackState;
    state.simTime = simTime;
    state.speed = speed;
    state.avgAmplitude = avgAmplitude;
    state.peakBand = peakBand;
    state.barCount = 256;
    state.frontRowHeights = frontRow;
    state.maxBarHeight = maxBarHeight;
    state.gridSize = GRID_SIZE;

    if (storkModel) {
        state.storkPosition = {
            x: storkModel.position.x,
            y: storkModel.position.y,
            z: storkModel.position.z
        };
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
