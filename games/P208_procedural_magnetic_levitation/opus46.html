<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Levitation - Stork</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #1a1a2e;
    font-family: monospace;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    padding: 15px;
    font-family: monospace;
    font-size: 14px;
    line-height: 1.8;
    border-radius: 8px;
    border: 1px solid rgba(0, 204, 255, 0.3);
  }
  #controls {
    position: absolute;
    top: 220px;
    left: 15px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #controls button {
    padding: 10px 16px;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    background: rgba(0, 100, 200, 0.6);
    color: #fff;
    border: 1px solid rgba(0, 204, 255, 0.5);
    border-radius: 5px;
    transition: background 0.2s;
  }
  #controls button:hover {
    background: rgba(0, 140, 255, 0.8);
  }
  #instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(0, 0, 0, 0.6);
    color: rgba(255, 255, 255, 0.7);
    padding: 10px 20px;
    font-family: monospace;
    font-size: 12px;
    border-radius: 5px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-height">Height: 2.50</div>
  <div id="hud-velocity">Velocity: 0.00</div>
  <div id="hud-field">Field Strength (k): 60</div>
  <div id="hud-gravity">Gravity: ON</div>
  <div id="hud-magnet">Magnetic Force: ON</div>
</div>

<div id="controls">
  <button id="btn-increase">Increase Field Strength</button>
  <button id="btn-decrease">Decrease Field Strength</button>
</div>

<div id="instructions">
  W: Push Up | S: Push Down | R: Reset | G: Toggle Gravity | M: Toggle Magnetic Force
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Physics state
let storkY = 2.5;
let velocity = 0;
let k = 60.0;
const mass = 1.0;
const g = 9.81;
let gravityEnabled = true;
let magnetEnabled = true;
let netForce = 0;
let frameCount = 0;
let modelLoaded = false;

// State
window.__3D_STATE__ = {
  storkY: storkY,
  velocity: velocity,
  fieldStrength: k,
  gravityEnabled: gravityEnabled,
  magnetEnabled: magnetEnabled,
  netForce: 0,
  equilibriumHeight: Math.pow(k / g, 0.5),
  isStable: true,
  modelLoaded: false,
  frameCount: 0
};

// Magnetic Base Platform
const baseGeometry = new THREE.CylinderGeometry(2.5, 2.5, 0.3, 64);
const baseMaterial = new THREE.MeshStandardMaterial({
  color: 0x2244aa,
  metalness: 0.8,
  roughness: 0.2,
  emissive: 0x0066ff,
  emissiveIntensity: 0.3
});
const baseMesh = new THREE.Mesh(baseGeometry, baseMaterial);
baseMesh.position.y = 0;
baseMesh.receiveShadow = true;
scene.add(baseMesh);

// Add ring glow on base
const ringGeometry = new THREE.TorusGeometry(2.2, 0.05, 16, 64);
const ringMaterial = new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0.6 });
const ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.16;
scene.add(ring);

// Stork group (placeholder until model loads)
const storkGroup = new THREE.Group();
storkGroup.position.y = storkY;
scene.add(storkGroup);

// Create a placeholder stork (geometric bird shape)
function createPlaceholderStork() {
  const group = new THREE.Group();

  // Body
  const bodyGeom = new THREE.CapsuleGeometry(0.2, 0.6, 8, 16);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.rotation.z = Math.PI / 2;
  body.position.y = 0;
  group.add(body);

  // Head
  const headGeom = new THREE.SphereGeometry(0.15, 16, 16);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  const head = new THREE.Mesh(headGeom, headMat);
  head.position.set(0.45, 0.2, 0);
  group.add(head);

  // Neck
  const neckGeom = new THREE.CylinderGeometry(0.05, 0.08, 0.35, 8);
  const neckMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  const neck = new THREE.Mesh(neckGeom, neckMat);
  neck.position.set(0.38, 0.1, 0);
  neck.rotation.z = -0.5;
  group.add(neck);

  // Beak
  const beakGeom = new THREE.ConeGeometry(0.04, 0.3, 8);
  const beakMat = new THREE.MeshStandardMaterial({ color: 0xff4400, roughness: 0.3 });
  const beak = new THREE.Mesh(beakGeom, beakMat);
  beak.position.set(0.62, 0.2, 0);
  beak.rotation.z = -Math.PI / 2;
  group.add(beak);

  // Wings
  const wingGeom = new THREE.BoxGeometry(0.4, 0.03, 0.8);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
  const wingL = new THREE.Mesh(wingGeom, wingMat);
  wingL.position.set(-0.05, 0.1, 0);
  group.add(wingL);

  // Legs
  const legGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.5, 8);
  const legMat = new THREE.MeshStandardMaterial({ color: 0xff3300, roughness: 0.4 });
  const legL = new THREE.Mesh(legGeom, legMat);
  legL.position.set(-0.1, -0.45, 0.08);
  group.add(legL);
  const legR = new THREE.Mesh(legGeom, legMat);
  legR.position.set(-0.1, -0.45, -0.08);
  group.add(legR);

  // Tail
  const tailGeom = new THREE.ConeGeometry(0.1, 0.3, 8);
  const tailMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.5 });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.position.set(-0.5, 0.05, 0);
  tail.rotation.z = Math.PI / 2;
  group.add(tail);

  group.scale.set(2, 2, 2);
  return group;
}

// Try loading GLTF, fallback to placeholder
const loader = new GLTFLoader();
let storkModel = null;

function addPlaceholder() {
  storkModel = createPlaceholderStork();
  storkGroup.add(storkModel);
  modelLoaded = true;
  window.__3D_STATE__.modelLoaded = true;
}

try {
  loader.load(
    '._stork.glb',
    (gltf) => {
      storkModel = gltf.scene;
      // Calculate bounding box to scale
      const box = new THREE.Box3().setFromObject(storkModel);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.5 / maxDim;
      storkModel.scale.set(scale, scale, scale);
      // Center it
      const center = new THREE.Vector3();
      box.getCenter(center);
      storkModel.position.sub(center.multiplyScalar(scale));
      storkGroup.add(storkModel);
      modelLoaded = true;
      window.__3D_STATE__.modelLoaded = true;
    },
    undefined,
    (error) => {
      console.warn('Could not load stork model, using placeholder:', error);
      addPlaceholder();
    }
  );
} catch (e) {
  addPlaceholder();
}

// Fallback timeout
setTimeout(() => {
  if (!modelLoaded) {
    addPlaceholder();
  }
}, 2000);

// Magnetic Field Lines
const fieldLines = [];
const fieldLineMaterials = [];
const numLines = 8;

for (let i = 0; i < numLines; i++) {
  const angle = (i / numLines) * Math.PI * 2;
  const baseRadius = 1.8;

  const points = [];
  const numPoints = 30;
  for (let j = 0; j < numPoints; j++) {
    const t = j / (numPoints - 1);
    const r = baseRadius * (1 - t * 0.6) * (1 + 0.3 * Math.sin(t * Math.PI));
    const x = Math.cos(angle) * r;
    const z = Math.sin(angle) * r;
    const y = t * 2.5 + 0.15;
    points.push(new THREE.Vector3(x, y, z));
  }

  const curve = new THREE.CatmullRomCurve3(points);
  const curvePoints = curve.getPoints(50);
  const geometry = new THREE.BufferGeometry().setFromPoints(curvePoints);
  const material = new THREE.LineBasicMaterial({
    color: 0x00ccff,
    transparent: true,
    opacity: 0.5
  });
  const line = new THREE.Line(geometry, material);
  scene.add(line);
  fieldLines.push({ line, angle, baseRadius, originalPoints: points.map(p => p.clone()) });
  fieldLineMaterials.push(material);
}

// Force Arrows
const gravityArrowDir = new THREE.Vector3(0, -1, 0);
const magnetArrowDir = new THREE.Vector3(0, 1, 0);

const gravityArrow = new THREE.ArrowHelper(gravityArrowDir, new THREE.Vector3(0, 0, 0), 1, 0xff3333, 0.15, 0.1);
const magnetArrow = new THREE.ArrowHelper(magnetArrowDir, new THREE.Vector3(0, 0, 0), 1, 0x3399ff, 0.15, 0.1);

storkGroup.add(gravityArrow);
storkGroup.add(magnetArrow);

// Particle system for magnetic effect
const particleCount = 200;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleVelocities = [];

for (let i = 0; i < particleCount; i++) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 0.5 + Math.random() * 2;
  particlePositions[i * 3] = Math.cos(angle) * radius;
  particlePositions[i * 3 + 1] = Math.random() * 3 + 0.2;
  particlePositions[i * 3 + 2] = Math.sin(angle) * radius;
  particleVelocities.push({
    angle: angle,
    radius: radius,
    speed: 0.3 + Math.random() * 0.7,
    ySpeed: 0.5 + Math.random() * 1.0,
    phase: Math.random() * Math.PI * 2
  });
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({
  color: 0x00ccff,
  size: 0.04,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Floor grid
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.position.y = -0.15;
scene.add(gridHelper);

// HUD elements
const hudHeight = document.getElementById('hud-height');
const hudVelocity = document.getElementById('hud-velocity');
const hudField = document.getElementById('hud-field');
const hudGravity = document.getElementById('hud-gravity');
const hudMagnet = document.getElementById('hud-magnet');

// Button handlers
document.getElementById('btn-increase').addEventListener('click', () => {
  k = Math.min(120, k + 10);
});
document.getElementById('btn-decrease').addEventListener('click', () => {
  k = Math.max(10, k - 10);
});

// Key handlers
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'w') {
    velocity += 3.0;
  } else if (key === 's') {
    velocity -= 3.0;
  } else if (key === 'r') {
    storkY = 2.5;
    velocity = 0;
  } else if (key === 'g') {
    gravityEnabled = !gravityEnabled;
  } else if (key === 'm') {
    magnetEnabled = !magnetEnabled;
  }
});

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  let dt = clock.getDelta();
  if (dt > 0.016) dt = 0.016;
  // Use a fixed dt for stability since getDelta after getElapsedTime can be 0
  dt = 0.016;

  frameCount++;

  // Physics
  const distance = Math.max(storkY, 0.1); // distance from base
  let Fg = 0;
  let Fm = 0;

  if (gravityEnabled) {
    Fg = -mass * g;
  }
  if (magnetEnabled) {
    Fm = k / (distance * distance);
  }

  netForce = Fg + Fm;
  const acceleration = netForce / mass;

  velocity += acceleration * dt;
  velocity *= 0.95; // damping
  storkY += velocity * dt;

  // Clamp
  if (storkY < 0.5) {
    storkY = 0.5;
    velocity = Math.max(velocity, 0);
  }
  if (storkY > 6.0) {
    storkY = 6.0;
    velocity = Math.min(velocity, 0);
  }

  // Update stork position
  storkGroup.position.y = storkY;

  // Gentle rotation
  storkGroup.rotation.y = Math.sin(time * 0.5) * 0.1;

  // Base emissive pulsing
  baseMaterial.emissiveIntensity = 0.3 + Math.sin(time * 2) * 0.3;

  // Ring pulsing
  ringMaterial.opacity = 0.4 + Math.sin(time * 3) * 0.3;
  ring.scale.set(
    1 + Math.sin(time * 2) * 0.05,
    1 + Math.sin(time * 2) * 0.05,
    1 + Math.sin(time * 2) * 0.05
  );

  // Update force arrows
  const gravForceLen = Math.abs(Fg) / g;
  const magForceLen = Fm / g;

  gravityArrow.setLength(Math.max(0.2, gravForceLen * 0.5), 0.15, 0.1);
  gravityArrow.position.set(0.8, 0, 0);
  gravityArrow.visible = gravityEnabled;

  magnetArrow.setLength(Math.max(0.2, magForceLen * 0.5), 0.15, 0.1);
  magnetArrow.position.set(-0.8, 0, 0);
  magnetArrow.visible = magnetEnabled;

  // Update field lines
  for (let i = 0; i < fieldLines.length; i++) {
    const fl = fieldLines[i];
    const positions = fl.line.geometry.attributes.position;
    const angle = fl.angle;
    const baseRadius = fl.baseRadius;
    const numPts = 51; // getPoints(50) gives 51 points

    for (let j = 0; j < numPts; j++) {
      const t = j / (numPts - 1);
      const waveOffset = Math.sin(time * 2 + t * Math.PI * 2 + i) * 0.15;
      const r = baseRadius * (1 - t * 0.6) * (1 + 0.3 * Math.sin(t * Math.PI)) + waveOffset;
      const x = Math.cos(angle + Math.sin(time * 0.5) * 0.05) * r;
      const z = Math.sin(angle + Math.sin(time * 0.5) * 0.05) * r;
      const y = t * storkY + 0.15 + Math.sin(time * 3 + t * 4) * 0.05;

      positions.setXYZ(j, x, y, z);
    }
    positions.needsUpdate = true;

    // Adjust opacity based on magnetic state
    fieldLineMaterials[i].opacity = magnetEnabled ? (0.3 + Math.sin(time * 2 + i) * 0.2) : 0.05;
  }

  // Update particles
  const pPositions = particles.geometry.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    const pv = particleVelocities[i];
    const currentAngle = pv.angle + time * pv.speed;
    const r = pv.radius + Math.sin(time * 2 + pv.phase) * 0.2;
    const yPos = ((time * pv.ySpeed + pv.phase) % (storkY + 0.5)) + 0.15;

    pPositions.setXYZ(
      i,
      Math.cos(currentAngle) * r,
      yPos,
      Math.sin(currentAngle) * r
    );
  }
  pPositions.needsUpdate = true;
  particleMaterial.opacity = magnetEnabled ? 0.5 : 0.05;

  // Update HUD
  hudHeight.textContent = `Height: ${storkY.toFixed(2)}`;
  hudVelocity.textContent = `Velocity: ${velocity.toFixed(2)}`;
  hudField.textContent = `Field Strength (k): ${k.toFixed(0)}`;
  hudGravity.textContent = `Gravity: ${gravityEnabled ? 'ON' : 'OFF'}`;
  hudMagnet.textContent = `Magnetic Force: ${magnetEnabled ? 'ON' : 'OFF'}`;

  // Update state
  const eqHeight = (gravityEnabled && magnetEnabled) ? Math.pow(k / g, 0.5) : 0;
  window.__3D_STATE__ = {
    storkY: storkY,
    velocity: velocity,
    fieldStrength: k,
    gravityEnabled: gravityEnabled,
    magnetEnabled: magnetEnabled,
    netForce: netForce,
    equilibriumHeight: eqHeight,
    isStable: Math.abs(velocity) < 0.05,
    modelLoaded: modelLoaded,
    frameCount: frameCount
  };

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
