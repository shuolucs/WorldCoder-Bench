<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Levitation Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
        }
        #hud p {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            top: 160px;
            left: 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        button {
            padding: 8px 12px;
            background-color: #2244aa;
            color: white;
            border: 1px solid #0066ff;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0066ff;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
            font-size: 12px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <p id="hud-height">Height: 0.00</p>
        <p id="hud-velocity">Velocity: 0.00</p>
        <p id="hud-k">Field Strength (k): 60</p>
        <p id="hud-gravity">Gravity: ON</p>
        <p id="hud-magnet">Magnetic Force: ON</p>
    </div>
    <div id="controls">
        <button id="btn-inc">Increase Field Strength</button>
        <button id="btn-dec">Decrease Field Strength</button>
    </div>
    <div id="instructions">
        Controls: [W] Up Impulse | [S] Down Impulse | [R] Reset | [G] Toggle Gravity | [M] Toggle Magnet
    </div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            storkY: 2.5,
            velocity: 0,
            fieldStrength: 60.0,
            gravityEnabled: true,
            magnetEnabled: true,
            netForce: 0,
            equilibriumHeight: 0,
            isStable: false,
            modelLoaded: false,
            frameCount: 0
        };

        const state = window.__3D_STATE__;
        const mass = 1.0;
        const g = 9.81;

        // --- Scene Setup ---
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // --- Lights ---
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambLight);

        // --- Objects ---
        // 1. Magnetic Base Platform
        const baseGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.3, 32);
        const baseMat = new THREE.MeshStandardMaterial({
            color: 0x2244aa,
            metalness: 0.8,
            roughness: 0.2,
            emissive: 0x0066ff,
            emissiveIntensity: 0
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = 0;
        scene.add(base);

        // 2. Stork Model Container
        const storkGroup = new THREE.Group();
        storkGroup.position.y = state.storkY;
        scene.add(storkGroup);

        const loader = new GLTFLoader();
        loader.load('._stork.glb', (gltf) => {
            const model = gltf.scene;
            
            // Scale to roughly 1.5 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 1.5 / size.y;
            model.scale.setScalar(scale);
            
            // Center model
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            
            storkGroup.add(model);
            state.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load '._stork.glb', using fallback mesh.", error);
            // Fallback mesh if file not found
            const fbGeo = new THREE.ConeGeometry(0.5, 1.5, 16);
            const fbMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
            const fbMesh = new THREE.Mesh(fbGeo, fbMat);
            fbMesh.position.y = 0;
            storkGroup.add(fbMesh);
            state.modelLoaded = true;
        });

        // 3. Magnetic Field Lines
        const fieldLines = [];
        const numLines = 8;
        for (let i = 0; i < numLines; i++) {
            const angle = (i / numLines) * Math.PI * 2;
            const points = [];
            for (let j = 0; j <= 10; j++) points.push(new THREE.Vector3());
            
            const curve = new THREE.CatmullRomCurve3(points);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
            const lineMat = new THREE.LineBasicMaterial({ 
                color: 0x00ccff, 
                transparent: true, 
                opacity: 0.5 
            });
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
            
            fieldLines.push({ line, curve, points, angle, radius: 2.0 });
        }

        // 4. Force Arrows
        const arrowGravity = new THREE.ArrowHelper(new THREE.Vector3(0, -1, 0), new THREE.Vector3(), 1, 0xff0000);
        const arrowMagnet = new THREE.ArrowHelper(new THREE.Vector3(0, 1, 0), new THREE.Vector3(), 1, 0x00ccff);
        scene.add(arrowGravity);
        scene.add(arrowMagnet);

        // --- User Interactions ---
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'w': state.velocity += 3.0; break;
                case 's': state.velocity -= 3.0; break;
                case 'r': 
                    state.storkY = 2.5; 
                    state.velocity = 0; 
                    break;
                case 'g': state.gravityEnabled = !state.gravityEnabled; break;
                case 'm': state.magnetEnabled = !state.magnetEnabled; break;
            }
        });

        document.getElementById('btn-inc').addEventListener('click', () => {
            state.fieldStrength = Math.min(120, state.fieldStrength + 10);
        });
        
        document.getElementById('btn-dec').addEventListener('click', () => {
            state.fieldStrength = Math.max(10, state.fieldStrength - 10);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- DOM Elements for HUD ---
        const hudHeight = document.getElementById('hud-height');
        const hudVel = document.getElementById('hud-velocity');
        const hudK = document.getElementById('hud-k');
        const hudGrav = document.getElementById('hud-gravity');
        const hudMag = document.getElementById('hud-magnet');

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            let dt = clock.getDelta();
            if (dt > 0.016) dt = 0.016; // Cap dt

            state.frameCount++;

            // Physics Simulation
            const Fg = state.gravityEnabled ? -mass * g : 0;
            const Fm = state.magnetEnabled ? state.fieldStrength / (state.storkY * state.storkY) : 0;
            
            state.netForce = Fg + Fm;
            
            // Euler integration
            state.velocity += (state.netForce / mass) * dt;
            state.velocity *= 0.95; // Damping
            state.storkY += state.velocity * dt;

            // Clamp position
            if (state.storkY < 0.5) {
                state.storkY = 0.5;
                state.velocity = 0;
            } else if (state.storkY > 6.0) {
                state.storkY = 6.0;
                state.velocity = 0;
            }

            state.isStable = Math.abs(state.velocity) < 0.05;
            state.equilibriumHeight = (state.gravityEnabled && state.magnetEnabled) 
                ? Math.pow(state.fieldStrength / g, 0.5) 
                : 0;

            // Update Objects
            storkGroup.position.y = state.storkY;

            // Base Emissive Pulse
            baseMat.emissiveIntensity = Math.max(0, Math.sin(time * 2) * 0.3);

            // Update Field Lines
            fieldLines.forEach((fl, index) => {
                for (let j = 0; j <= 10; j++) {
                    const t = j / 10;
                    
                    // Base circle
                    const bx = Math.cos(fl.angle) * fl.radius * (1 - t);
                    const bz = Math.sin(fl.angle) * fl.radius * (1 - t);
                    
                    // Target (stork center)
                    const tx = 0, tz = 0;
                    
                    let x = bx + (tx - bx) * t;
                    let z = bz + (tz - bz) * t;
                    let y = t * state.storkY;

                    // Sine wave animation
                    if (state.magnetEnabled) {
                        const wave = Math.sin(time * 3 + j * 0.5 + index) * 0.2 * Math.sin(t * Math.PI);
                        x += Math.cos(fl.angle + Math.PI/2) * wave;
                        z += Math.sin(fl.angle + Math.PI/2) * wave;
                    }

                    fl.points[j].set(x, y, z);
                }
                fl.curve.points = fl.points;
                fl.line.geometry.setFromPoints(fl.curve.getPoints(50));
                fl.line.visible = state.magnetEnabled;
            });

            // Update Arrows
            arrowGravity.position.set(0.6, state.storkY, 0);
            arrowMagnet.position.set(-0.6, state.storkY, 0);
            
            arrowGravity.setLength(Math.max(0.1, Math.abs(Fg) * 0.15));
            arrowMagnet.setLength(Math.max(0.1, Math.abs(Fm) * 0.15));
            
            arrowGravity.visible = state.gravityEnabled;
            arrowMagnet.visible = state.magnetEnabled;

            // Update HUD
            hudHeight.innerText = `Height: ${state.storkY.toFixed(2)}`;
            hudVel.innerText = `Velocity: ${state.velocity.toFixed(2)}`;
            hudK.innerText = `Field Strength (k): ${state.fieldStrength.toFixed(0)}`;
            hudGrav.innerText = `Gravity: ${state.gravityEnabled ? 'ON' : 'OFF'}`;
            hudMag.innerText = `Magnetic Force: ${state.magnetEnabled ? 'ON' : 'OFF'}`;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
