<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magnetic Levitation Stork - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 8px;
      min-width: 220px;
      line-height: 1.5;
    }

    #controls {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    button {
      padding: 10px 12px;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid #66aaff;
      border-radius: 6px;
      background: #16325f;
      color: white;
    }

    button:hover {
      background: #224a88;
    }

    #hint {
      margin-top: 10px;
      font-size: 12px;
      opacity: 0.9;
    }
  </style>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="hud">
    <div id="hudText">
      Height: 0.00<br />
      Velocity: 0.00<br />
      Field Strength (k): 60<br />
      Gravity: ON<br />
      Magnetic Force: ON
    </div>

    <div id="controls">
      <button id="incField">Increase Field Strength</button>
      <button id="decField">Decrease Field Strength</button>
    </div>

    <div id="hint">
      Keys: W/S impulse, R reset, G gravity toggle, M magnet toggle
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 4, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambLight);

    const clock = new THREE.Clock();

    // Base platform
    const baseMaterial = new THREE.MeshStandardMaterial({
      color: "#2244aa",
      metalness: 0.8,
      roughness: 0.2,
      emissive: new THREE.Color("#0066ff"),
      emissiveIntensity: 0.2
    });

    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(2.5, 2.5, 0.3, 64),
      baseMaterial
    );
    base.position.y = 0;
    scene.add(base);

    // Optional subtle top glow ring
    const ring = new THREE.Mesh(
      new THREE.TorusGeometry(1.9, 0.04, 12, 64),
      new THREE.MeshBasicMaterial({
        color: "#00aaff",
        transparent: true,
        opacity: 0.5
      })
    );
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.18;
    scene.add(ring);

    // Physics
    const mass = 1.0;
    const g = 9.81;
    let k = 60.0;
    let velocity = 0.0;
    let gravityEnabled = true;
    let magnetEnabled = true;
    let netForce = 0.0;
    const equilibriumDefault = 2.5;

    // Stork container
    const storkGroup = new THREE.Group();
    storkGroup.position.set(0, equilibriumDefault, 0);
    scene.add(storkGroup);

    // Fallback placeholder until model loads
    const fallbackStork = new THREE.Mesh(
      new THREE.ConeGeometry(0.35, 1.5, 24),
      new THREE.MeshStandardMaterial({
        color: "#dddddd",
        metalness: 0.1,
        roughness: 0.8
      })
    );
    fallbackStork.position.y = 0.75;
    storkGroup.add(fallbackStork);

    let modelLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      "._stork.glb",
      (gltf) => {
        const model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);

        const currentHeight = Math.max(size.y, 0.0001);
        const targetHeight = 1.5;
        const scale = targetHeight / currentHeight;
        model.scale.setScalar(scale);

        const boxScaled = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        const scaledSize = new THREE.Vector3();
        boxScaled.getCenter(center);
        boxScaled.getSize(scaledSize);

        model.position.x -= center.x;
        model.position.z -= center.z;
        model.position.y -= boxScaled.min.y;

        storkGroup.remove(fallbackStork);
        storkGroup.add(model);
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load ._stork.glb, using fallback placeholder.", err);
      }
    );

    // Force arrows
    const gravityArrow = new THREE.ArrowHelper(
      new THREE.Vector3(0, -1, 0),
      new THREE.Vector3(0.9, 0.8, 0),
      1.0,
      0xff3333,
      0.2,
      0.12
    );
    storkGroup.add(gravityArrow);

    const magneticArrow = new THREE.ArrowHelper(
      new THREE.Vector3(0, 1, 0),
      new THREE.Vector3(-0.9, 0.2, 0),
      1.0,
      0x3399ff,
      0.2,
      0.12
    );
    storkGroup.add(magneticArrow);

    // Magnetic field lines
    const fieldLines = [];
    const fieldLineCount = 8;
    const pointsPerLine = 24;

    for (let i = 0; i < fieldLineCount; i++) {
      const angle = (i / fieldLineCount) * Math.PI * 2;
      const lineGeom = new THREE.BufferGeometry();
      const positions = new Float32Array(pointsPerLine * 3);
      lineGeom.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const lineMat = new THREE.LineBasicMaterial({
        color: 0x00ccff,
        transparent: true,
        opacity: 0.5
      });

      const line = new THREE.Line(lineGeom, lineMat);
      scene.add(line);

      fieldLines.push({
        line,
        angle,
        positions
      });
    }

    function updateFieldLines(time) {
      const storkY = storkGroup.position.y;

      for (const data of fieldLines) {
        const { line, angle, positions } = data;
        const pts = [];

        const startRadius = 1.3;
        const topRadius = 0.45;

        for (let i = 0; i < pointsPerLine; i++) {
          const t = i / (pointsPerLine - 1);
          const y = 0.15 + t * (storkY - 0.15);

          const outward = Math.sin(t * Math.PI) * 0.9;
          const wave = Math.sin(time * 2.2 + t * 8 + angle * 2.0) * 0.08;
          const twist = Math.cos(time * 1.7 + t * 6 + angle) * 0.05;

          const radius = THREE.MathUtils.lerp(startRadius, topRadius, t) + outward * 0.35 + wave;

          const x = Math.cos(angle + twist) * radius;
          const z = Math.sin(angle + twist) * radius;

          pts.push(new THREE.Vector3(x, y, z));
        }

        const curve = new THREE.CatmullRomCurve3(pts);
        const sampled = curve.getPoints(pointsPerLine - 1);

        for (let i = 0; i < sampled.length; i++) {
          positions[i * 3 + 0] = sampled[i].x;
          positions[i * 3 + 1] = sampled[i].y;
          positions[i * 3 + 2] = sampled[i].z;
        }

        line.geometry.attributes.position.needsUpdate = true;
      }
    }

    // Ground shadow-ish disc
    const shadowDisc = new THREE.Mesh(
      new THREE.CircleGeometry(1.1, 32),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.18
      })
    );
    shadowDisc.rotation.x = -Math.PI / 2;
    shadowDisc.position.y = 0.151;
    scene.add(shadowDisc);

    const hudText = document.getElementById("hudText");
    const incBtn = document.getElementById("incField");
    const decBtn = document.getElementById("decField");

    incBtn.addEventListener("click", () => {
      k = Math.min(120, k + 10);
    });

    decBtn.addEventListener("click", () => {
      k = Math.max(10, k - 10);
    });

    window.__3D_STATE__ = {
      storkY: storkGroup.position.y,
      velocity: velocity,
      fieldStrength: k,
      gravityEnabled: gravityEnabled,
      magnetEnabled: magnetEnabled,
      netForce: netForce,
      equilibriumHeight: Math.pow(k / 9.81, 0.5),
      isStable: Math.abs(velocity) < 0.05,
      modelLoaded: modelLoaded,
      frameCount: 0
    };

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "w") velocity += 3.0;
      if (key === "s") velocity -= 3.0;
      if (key === "r") {
        storkGroup.position.y = equilibriumDefault;
        velocity = 0;
      }
      if (key === "g") gravityEnabled = !gravityEnabled;
      if (key === "m") magnetEnabled = !magnetEnabled;
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updatePhysics(dt) {
      dt = Math.min(dt, 0.016);

      const y = storkGroup.position.y;
      const distance = Math.max(y, 0.2);

      const Fg = gravityEnabled ? -mass * g : 0.0;
      const Fm = magnetEnabled ? (k / (distance * distance)) : 0.0;

      netForce = Fg + Fm;
      const acceleration = netForce / mass;

      velocity += acceleration * dt;
      velocity *= 0.95;
      storkGroup.position.y += velocity * dt;

      storkGroup.position.y = THREE.MathUtils.clamp(storkGroup.position.y, 0.5, 6.0);

      if (storkGroup.position.y <= 0.5 && velocity < 0) velocity = 0;
      if (storkGroup.position.y >= 6.0 && velocity > 0) velocity = 0;
    }

    function updateArrows() {
      const gravityLen = gravityEnabled ? 0.9 : 0.15;
      const magneticLen = magnetEnabled ? 0.9 : 0.15;

      gravityArrow.setLength(gravityLen, 0.2, 0.12);
      magneticArrow.setLength(magneticLen, 0.2, 0.12);
    }

    function updateHUD() {
      hudText.innerHTML = `
        Height: ${storkGroup.position.y.toFixed(2)}<br />
        Velocity: ${velocity.toFixed(2)}<br />
        Field Strength (k): ${k.toFixed(0)}<br />
        Gravity: ${gravityEnabled ? "ON" : "OFF"}<br />
        Magnetic Force: ${magnetEnabled ? "ON" : "OFF"}
      `;
    }

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const dt = clock.getDelta();

      updatePhysics(dt);
      updateFieldLines(elapsed);
      updateArrows();

      baseMaterial.emissiveIntensity = 0.2 + ((Math.sin(elapsed * 2) * 0.3 + 0.3) * 0.5);
      ring.material.opacity = 0.25 + (Math.sin(elapsed * 2) * 0.15 + 0.15);

      shadowDisc.scale.setScalar(THREE.MathUtils.clamp(1.8 - storkGroup.position.y * 0.18, 0.7, 1.4));

      controls.update();
      updateHUD();

      window.__3D_STATE__.storkY = storkGroup.position.y;
      window.__3D_STATE__.velocity = velocity;
      window.__3D_STATE__.fieldStrength = k;
      window.__3D_STATE__.gravityEnabled = gravityEnabled;
      window.__3D_STATE__.magnetEnabled = magnetEnabled;
      window.__3D_STATE__.netForce = netForce;
      window.__3D_STATE__.equilibriumHeight = Math.pow(k / 9.81, 0.5);
      window.__3D_STATE__.isStable = Math.abs(velocity) < 0.05;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.frameCount += 1;

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
