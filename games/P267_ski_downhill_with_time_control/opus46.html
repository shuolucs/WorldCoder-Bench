<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ski Downhill Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
}

#hud-top-left {
    position: absolute;
    top: 20px; left: 20px;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    font-size: 18px;
    line-height: 1.6;
}

#hud-top-right {
    position: absolute;
    top: 20px; right: 20px;
    text-align: right;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

#slowmo-label {
    font-size: 16px;
    margin-bottom: 6px;
}

#slowmo-bar-bg {
    width: 200px;
    height: 24px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 12px;
    overflow: hidden;
}

#slowmo-bar-fill {
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, #ff4444, #ffaa00, #44ff44);
    border-radius: 10px;
    transition: width 0.1s;
}

#slowmo-status {
    font-size: 13px;
    margin-top: 4px;
    color: #aaf;
}

#hud-bottom-center {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
}

#start-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    pointer-events: all;
}

#start-overlay h1 {
    color: #fff;
    font-size: 48px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
}

#start-overlay p {
    color: #ccc;
    font-size: 16px;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
}

#start-btn {
    padding: 16px 60px;
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    background: linear-gradient(135deg, #2196F3, #1565C0);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    pointer-events: all;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

#start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

#results-overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 25;
    pointer-events: all;
}

#results-overlay h1 {
    color: #FFD700;
    font-size: 42px;
    margin-bottom: 20px;
}

#results-overlay .result-line {
    color: #fff;
    font-size: 22px;
    margin: 6px 0;
}

#results-overlay .penalty-line {
    color: #ff6666;
    font-size: 18px;
    margin: 4px 0;
}

#penalty-flash {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff4444;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
}

#slowmo-indicator {
    position: absolute;
    top: 50%;
    right: 30px;
    transform: translateY(-50%);
    color: #88ccff;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 15px rgba(100,180,255,0.8);
    opacity: 0;
    transition: opacity 0.3s;
}
</style>
</head>
<body>

<div id="hud">
    <div id="hud-top-left">
        <div id="hud-time">Time: 0.0s</div>
        <div id="hud-speed">Speed: 0.0 m/s</div>
        <div id="hud-gates">Gates: 0/12</div>
    </div>
    <div id="hud-top-right">
        <div id="slowmo-label">SlowMo Energy</div>
        <div id="slowmo-bar-bg">
            <div id="slowmo-bar-fill"></div>
        </div>
        <div id="slowmo-status">Press SPACE to activate</div>
    </div>
    <div id="hud-bottom-center" id="boost-display">Boost: READY</div>
    <div id="penalty-flash"></div>
    <div id="slowmo-indicator">⏳ SLOW MOTION</div>
</div>

<div id="start-overlay">
    <h1>⛷️ Ski Downhill</h1>
    <p>Steer: Arrow Keys / A,D<br>Slow Motion: SPACE<br>Speed Boost: SHIFT<br>Pass through gates, avoid rocks!</p>
    <button id="start-btn">Start</button>
</div>

<div id="results-overlay">
    <h1>🏁 Run Complete!</h1>
    <div class="result-line" id="result-time"></div>
    <div class="result-line" id="result-raw-time"></div>
    <div class="result-line" id="result-gates"></div>
    <div class="penalty-line" id="result-penalties"></div>
    <div class="penalty-line" id="result-collisions"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    gameStarted: false,
    gameFinished: false,
    elapsedTime: 0,
    rawTime: 0,
    speed: 0,
    skierX: 0,
    skierZ: 0,
    gatesPassed: 0,
    gatesMissed: 0,
    collisions: 0,
    slowMotionActive: false,
    slowMotionEnergy: 100,
    boostActive: false,
    boostCooldown: 0,
    timeScale: 1.0,
    totalPenalty: 0,
    modelLoaded: false
};
window.__3D_STATE__ = state;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 60, 120);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -30;
dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30;
dirLight.shadow.camera.bottom = -100;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0x88aacc, 0.4);
scene.add(ambLight);

// Slope
const slopeAngle = Math.PI * 15 / 180; // 15 degrees
const slopeGeo = new THREE.PlaneGeometry(20, 200, 20, 40);
const slopeMat = new THREE.MeshStandardMaterial({
    color: 0xF0F8FF,
    roughness: 0.8,
    metalness: 0.0
});
const slope = new THREE.Mesh(slopeGeo, slopeMat);
slope.receiveShadow = true;
slope.rotation.x = -Math.PI / 2 + slopeAngle;
slope.position.set(0, -Math.sin(slopeAngle) * 50, -100 + Math.cos(slopeAngle) * 0);
// Adjust slope position so skier starts at top
slope.position.set(0, -2, -50);
scene.add(slope);

// Add some vertex displacement for snow texture
const slopePositions = slopeGeo.attributes.position;
for (let i = 0; i < slopePositions.count; i++) {
    const z = slopePositions.getZ(i);
    slopePositions.setZ(i, z + (Math.random() - 0.5) * 0.15);
}
slopeGeo.computeVertexNormals();

// Helper: get Y on slope for a given Z
function getSlopeY(z) {
    return -z * Math.tan(slopeAngle) + 0.5;
}

// Gates
const gates = [];
const gateStates = []; // { passed: bool, missed: bool }
const numGates = 12;
const gateStartZ = -5;
const gateEndZ = -85;
const gateSpacing = (gateEndZ - gateStartZ) / (numGates - 1);

for (let i = 0; i < numGates; i++) {
    const gz = gateStartZ + i * gateSpacing;
    const gx = (Math.random() * 8 - 4); // between -4 and 4
    const poleHeight = 2.5;
    const poleRadius = 0.08;
    const separation = 4;

    const poleGeo = new THREE.CylinderGeometry(poleRadius, poleRadius, poleHeight, 8);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0xff2222, roughness: 0.5 });

    const leftPole = new THREE.Mesh(poleGeo, poleMat);
    const rightPole = new THREE.Mesh(poleGeo, poleMat);

    const sy = getSlopeY(gz);
    leftPole.position.set(gx - separation / 2, sy + poleHeight / 2 - 0.5, gz);
    rightPole.position.set(gx + separation / 2, sy + poleHeight / 2 - 0.5, gz);

    leftPole.castShadow = true;
    rightPole.castShadow = true;

    scene.add(leftPole);
    scene.add(rightPole);

    // Add a small flag/banner between poles
    const bannerGeo = new THREE.PlaneGeometry(separation - 0.3, 0.4);
    const bannerMat = new THREE.MeshStandardMaterial({
        color: i % 2 === 0 ? 0xff4444 : 0x4444ff,
        side: THREE.DoubleSide,
        transparent: true,
        opacity: 0.7
    });
    const banner = new THREE.Mesh(bannerGeo, bannerMat);
    banner.position.set(gx, sy + poleHeight - 0.7, gz);
    scene.add(banner);

    gates.push({
        z: gz,
        leftX: gx - separation / 2,
        rightX: gx + separation / 2,
        centerX: gx
    });
    gateStates.push({ passed: false, missed: false });
}

// Rocks
const rocks = [];
const rockCollided = [];
const numRocks = 6;

for (let i = 0; i < numRocks; i++) {
    const rz = gateStartZ + Math.random() * (gateEndZ - gateStartZ);
    const rx = (Math.random() * 12 - 6);
    const rRadius = 0.4 + Math.random() * 0.3;

    const rockGeo = new THREE.SphereGeometry(rRadius, 8, 6);
    // Deform rock
    const rockPos = rockGeo.attributes.position;
    for (let j = 0; j < rockPos.count; j++) {
        rockPos.setX(j, rockPos.getX(j) + (Math.random() - 0.5) * 0.15);
        rockPos.setY(j, rockPos.getY(j) + (Math.random() - 0.5) * 0.15);
        rockPos.setZ(j, rockPos.getZ(j) + (Math.random() - 0.5) * 0.15);
    }
    rockGeo.computeVertexNormals();

    const rockMat = new THREE.MeshStandardMaterial({
        color: 0x8B7355,
        roughness: 0.9,
        metalness: 0.1
    });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    const ry = getSlopeY(rz);
    rock.position.set(rx, ry - 0.1, rz);
    rock.castShadow = true;
    rock.receiveShadow = true;
    scene.add(rock);

    rocks.push({ mesh: rock, x: rx, z: rz, radius: rRadius });
    rockCollided.push(false);
}

// Trees (decoration)
for (let i = 0; i < 30; i++) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const tx = side * (9 + Math.random() * 5);
    const tz = -Math.random() * 100;
    const ty = getSlopeY(tz);

    const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 2, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.set(tx, ty + 0.5, tz);
    trunk.castShadow = true;
    scene.add(trunk);

    const foliageGeo = new THREE.ConeGeometry(1.2, 3, 8);
    const foliageMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27 });
    const foliage = new THREE.Mesh(foliageGeo, foliageMat);
    foliage.position.set(tx, ty + 3, tz);
    foliage.castShadow = true;
    scene.add(foliage);

    // Snow on tree
    const snowGeo = new THREE.ConeGeometry(1.3, 0.5, 8);
    const snowMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const snow = new THREE.Mesh(snowGeo, snowMat);
    snow.position.set(tx, ty + 4.2, tz);
    scene.add(snow);
}

// Skier placeholder (before model loads)
const skierGroup = new THREE.Group();
skierGroup.position.set(0, getSlopeY(0), 0);
scene.add(skierGroup);

// Placeholder box
const placeholderGeo = new THREE.BoxGeometry(0.4, 1.2, 0.3);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x3366ff });
const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
placeholder.position.y = 0.6;
placeholder.castShadow = true;
skierGroup.add(placeholder);

// Load GLTF model
let mixer = null;
const loader = new GLTFLoader();
loader.load('BrainStem.glb', (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.5, 0.5, 0.5);
    model.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
    skierGroup.add(model);
    skierGroup.remove(placeholder);

    // Play animations
    if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach((clip) => {
            const action = mixer.clipAction(clip);
            action.play();
        });
    }

    state.modelLoaded = true;
    console.log('BrainStem.glb loaded successfully');
}, undefined, (error) => {
    console.warn('Could not load BrainStem.glb, using placeholder:', error);
    state.modelLoaded = false;
});

// Particle system for snow
const snowParticleCount = 500;
const snowGeo2 = new THREE.BufferGeometry();
const snowPositions = new Float32Array(snowParticleCount * 3);
for (let i = 0; i < snowParticleCount; i++) {
    snowPositions[i * 3] = (Math.random() - 0.5) * 40;
    snowPositions[i * 3 + 1] = Math.random() * 20;
    snowPositions[i * 3 + 2] = Math.random() * -100;
}
snowGeo2.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat2 = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.7 });
const snowParticles = new THREE.Points(snowGeo2, snowMat2);
scene.add(snowParticles);

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        if (state.gameStarted && !state.gameFinished) {
            toggleSlowMotion();
        }
    }
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
        e.preventDefault();
        if (state.gameStarted && !state.gameFinished) {
            activateBoost();
        }
    }
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

function toggleSlowMotion() {
    if (!state.slowMotionActive && state.slowMotionEnergy > 0) {
        state.slowMotionActive = true;
        state.timeScale = 0.3;
    } else {
        state.slowMotionActive = false;
        state.timeScale = 1.0;
    }
}

let boostTimer = 0;
let boostCooldownTimer = 0;

function activateBoost() {
    if (state.boostCooldown <= 0 && !state.boostActive) {
        state.boostActive = true;
        boostTimer = 2.0;
        boostCooldownTimer = 5.0;
    }
}

// Start button
document.getElementById('start-btn').addEventListener('click', () => {
    state.gameStarted = true;
    document.getElementById('start-overlay').style.display = 'none';
});

// HUD elements
const hudTime = document.getElementById('hud-time');
const hudSpeed = document.getElementById('hud-speed');
const hudGates = document.getElementById('hud-gates');
const slowmoFill = document.getElementById('slowmo-bar-fill');
const slowmoStatus = document.getElementById('slowmo-status');
const boostDisplay = document.getElementById('hud-bottom-center');
const penaltyFlash = document.getElementById('penalty-flash');
const slowmoIndicator = document.getElementById('slowmo-indicator');

function showPenalty(text) {
    penaltyFlash.textContent = text;
    penaltyFlash.style.opacity = '1';
    setTimeout(() => { penaltyFlash.style.opacity = '0'; }, 1500);
}

// Game variables
let skierZ = 0;
let skierX = 0;
let currentSpeed = 0;
const baseSpeed = 2;
const maxSpeed = 15;
const lateralSpeed = 6;

const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const realDelta = clock.getDelta();

    if (!state.gameStarted || state.gameFinished) {
        // Still render
        renderer.render(scene, camera);

        // Animate snow particles
        updateSnowParticles(realDelta);
        return;
    }

    // Time scale
    const gameDelta = realDelta * state.timeScale;

    // Update raw time
    state.rawTime += gameDelta;

    // Slow motion energy
    if (state.slowMotionActive) {
        state.slowMotionEnergy -= 20 * realDelta; // drain based on real time
        if (state.slowMotionEnergy <= 0) {
            state.slowMotionEnergy = 0;
            state.slowMotionActive = false;
            state.timeScale = 1.0;
        }
    } else {
        state.slowMotionEnergy = Math.min(100, state.slowMotionEnergy + 5 * realDelta);
    }

    // Boost
    if (state.boostActive) {
        boostTimer -= gameDelta;
        if (boostTimer <= 0) {
            state.boostActive = false;
            boostTimer = 0;
        }
    }
    if (boostCooldownTimer > 0) {
        boostCooldownTimer -= realDelta;
        if (boostCooldownTimer < 0) boostCooldownTimer = 0;
    }
    state.boostCooldown = boostCooldownTimer;

    // Speed calculation
    currentSpeed = Math.min(baseSpeed + state.rawTime * 0.5, maxSpeed);
    if (state.boostActive) {
        currentSpeed *= 1.8;
    }
    state.speed = currentSpeed;

    // Movement
    skierZ -= currentSpeed * gameDelta;

    // Lateral movement
    if (keys['ArrowLeft'] || keys['KeyA']) {
        skierX -= lateralSpeed * gameDelta;
    }
    if (keys['ArrowRight'] || keys['KeyD']) {
        skierX += lateralSpeed * gameDelta;
    }
    skierX = Math.max(-8, Math.min(8, skierX));

    state.skierX = skierX;
    state.skierZ = skierZ;

    // Update skier position
    const sy = getSlopeY(skierZ);
    skierGroup.position.set(skierX, sy, skierZ);

    // Slight tilt based on lateral movement
    let targetRotY = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) targetRotY = 0.2;
    if (keys['ArrowRight'] || keys['KeyD']) targetRotY = -0.2;
    skierGroup.rotation.y = THREE.MathUtils.lerp(skierGroup.rotation.y, targetRotY, 0.1);
    skierGroup.rotation.x = -slopeAngle * 0.5;

    // Animation mixer
    if (mixer) {
        mixer.update(gameDelta);
    }

    // Gate checking
    for (let i = 0; i < gates.length; i++) {
        if (gateStates[i].passed || gateStates[i].missed) continue;

        const gate = gates[i];
        if (skierZ <= gate.z) {
            // Check if passed through
            if (skierX >= gate.leftX && skierX <= gate.rightX) {
                gateStates[i].passed = true;
                state.gatesPassed++;
            } else {
                gateStates[i].missed = true;
                state.gatesMissed++;
                state.totalPenalty += 5;
                showPenalty('+5s GATE MISSED!');
            }
        }
    }

    // Rock collision
    for (let i = 0; i < rocks.length; i++) {
        if (rockCollided[i]) continue;
        const rock = rocks[i];
        const dx = skierX - rock.x;
        const dz = skierZ - rock.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < 1.0) {
            rockCollided[i] = true;
            state.collisions++;
            state.totalPenalty += 3;
            showPenalty('+3s ROCK HIT!');
            // Flash rock
            rock.mesh.material.color.setHex(0xff0000);
            setTimeout(() => { rock.mesh.material.color.setHex(0x8B7355); }, 500);
        }
    }

    // Elapsed time
    state.elapsedTime = state.rawTime + state.totalPenalty;

    // Camera follow
    const camTargetX = skierX * 0.8;
    const camTargetY = sy + 8;
    const camTargetZ = skierZ + 15;
    camera.position.lerp(new THREE.Vector3(camTargetX, camTargetY, camTargetZ), 0.05);
    camera.lookAt(skierGroup.position.x, skierGroup.position.y + 1, skierGroup.position.z - 5);

    // Snow particles follow camera
    updateSnowParticles(realDelta);

    // Update HUD
    hudTime.textContent = `Time: ${state.elapsedTime.toFixed(1)}s`;
    hudSpeed.textContent = `Speed: ${state.speed.toFixed(1)} m/s`;
    hudGates.textContent = `Gates: ${state.gatesPassed}/12`;

    slowmoFill.style.width = `${state.slowMotionEnergy}%`;
    if (state.slowMotionActive) {
        slowmoStatus.textContent = 'ACTIVE - Press SPACE to deactivate';
        slowmoIndicator.style.opacity = '1';
    } else {
        slowmoStatus.textContent = 'Press SPACE to activate';
        slowmoIndicator.style.opacity = '0';
    }

    if (state.boostActive) {
        boostDisplay.textContent = `Boost: ACTIVE`;
        boostDisplay.style.color = '#ffdd44';
    } else if (state.boostCooldown > 0) {
        boostDisplay.textContent = `Boost: ${state.boostCooldown.toFixed(1)}s`;
        boostDisplay.style.color = '#ff8888';
    } else {
        boostDisplay.textContent = 'Boost: READY';
        boostDisplay.style.color = '#44ff44';
    }

    // Check finish
    if (skierZ <= -90) {
        finishGame();
    }

    renderer.render(scene, camera);
}

function updateSnowParticles(dt) {
    const positions = snowGeo2.attributes.position.array;
    for (let i = 0; i < snowParticleCount; i++) {
        positions[i * 3 + 1] -= dt * 2;
        positions[i * 3] += Math.sin(Date.now() * 0.001 + i) * dt * 0.3;

        if (positions[i * 3 + 1] < -2) {
            positions[i * 3] = camera.position.x + (Math.random() - 0.5) * 40;
            positions[i * 3 + 1] = camera.position.y + 10 + Math.random() * 10;
            positions[i * 3 + 2] = camera.position.z - Math.random() * 50;
        }
    }
    snowGeo2.attributes.position.needsUpdate = true;
}

function finishGame() {
    state.gameFinished = true;

    const resultsOverlay = document.getElementById('results-overlay');
    resultsOverlay.style.display = 'flex';

    document.getElementById('result-time').textContent = `Final Time: ${state.elapsedTime.toFixed(1)}s`;
    document.getElementById('result-raw-time').textContent = `Raw Time: ${state.rawTime.toFixed(1)}s`;
    document.getElementById('result-gates').textContent = `Gates Passed: ${state.gatesPassed}/12`;
    document.getElementById('result-penalties').textContent = `Gate Penalties: ${state.gatesMissed * 5}s (${state.gatesMissed} missed)`;
    document.getElementById('result-collisions').textContent = `Collision Penalties: ${state.collisions * 3}s (${state.collisions} hits)`;
}

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
