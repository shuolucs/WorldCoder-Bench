<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ski Downhill</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #87CEEB;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-panel {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        #stats {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        #energy-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }
        #energy-bar-bg {
            width: 200px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid white;
            border-radius: 10px;
            overflow: hidden;
        }
        #energy-bar-fill {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s linear, background-color 0.1s linear;
        }
        #bottom-hud {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        #boost-status {
            font-size: 24px;
            letter-spacing: 2px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            pointer-events: auto;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background 0.2s;
        }
        button:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        button:disabled {
            background: #888;
            cursor: not-allowed;
            transform: none;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px black;
        }
        .results-text {
            font-size: 24px;
            margin: 10px 0;
        }
        .controls-info {
            margin-top: 30px;
            font-size: 18px;
            text-align: center;
            color: #ddd;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="top-hud">
            <div id="stats" class="hud-panel">
                <div id="time-display">Time: 0.0s</div>
                <div id="speed-display">Speed: 0.0 m/s</div>
                <div id="gates-display">Gates: 0/12</div>
            </div>
            <div id="energy-container" class="hud-panel">
                <div>SlowMo Energy</div>
                <div id="energy-bar-bg">
                    <div id="energy-bar-fill"></div>
                </div>
            </div>
        </div>
        <div id="bottom-hud">
            <div id="boost-status" class="hud-panel">Boost: READY</div>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>Downhill Skiing</h1>
        <button id="start-btn" disabled>Loading Model...</button>
        <div class="controls-info">
            <p><b>Left/Right Arrows or A/D</b> - Steer</p>
            <p><b>SPACE</b> - Toggle Slow Motion</p>
            <p><b>SHIFT</b> - Speed Boost</p>
        </div>
    </div>

    <div id="results-screen" class="overlay hidden">
        <h1>Run Complete!</h1>
        <div class="results-text" id="res-time">Final Time: 0.0s</div>
        <div class="results-text" id="res-gates">Gates Passed: 0/12</div>
        <div class="results-text" id="res-penalties">Penalties: 0s</div>
        <button id="restart-btn" style="margin-top: 20px;">Play Again</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            gameFinished: false,
            elapsedTime: 0,
            rawTime: 0,
            speed: 0,
            skierX: 0,
            skierZ: 0,
            gatesPassed: 0,
            gatesMissed: 0,
            collisions: 0,
            slowMotionActive: false,
            slowMotionEnergy: 100,
            boostActive: false,
            boostCooldown: 0,
            timeScale: 1.0,
            totalPenalty: 0,
            modelLoaded: false
        };
        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const timeDisplay = document.getElementById('time-display');
        const speedDisplay = document.getElementById('speed-display');
        const gatesDisplay = document.getElementById('gates-display');
        const energyBarFill = document.getElementById('energy-bar-fill');
        const boostStatus = document.getElementById('boost-status');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const resultsScreen = document.getElementById('results-screen');
        const restartBtn = document.getElementById('restart-btn');

        // --- Three.js Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        scene.add(dirLight);

        // --- Scene Construction ---
        const slopeGroup = new THREE.Group();
        slopeGroup.rotation.x = 15 * Math.PI / 180; // Tilt downward along X axis
        scene.add(slopeGroup);

        // Slope Plane
        const planeGeo = new THREE.PlaneGeometry(20, 200, 20, 40);
        const planeMat = new THREE.MeshStandardMaterial({ 
            color: 0xF0F8FF, 
            roughness: 0.9,
            metalness: 0.1
        });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.z = -90; // Center so it goes from Z=10 to Z=-190
        plane.receiveShadow = true;
        slopeGroup.add(plane);

        // Game Objects Arrays
        const gates = [];
        const rocks = [];
        let skierModel = null;
        let mixer = null;

        // Generate Gates
        const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 2);
        const poleMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        for (let i = 0; i < 12; i++) {
            const z = -5 - i * (85 / 11); // Spread from -5 to -90
            const x = (Math.random() - 0.5) * 8; // -4 to 4
            
            const poleL = new THREE.Mesh(poleGeo, poleMat.clone());
            poleL.position.set(x - 2, 1, z);
            poleL.castShadow = true;
            
            const poleR = new THREE.Mesh(poleGeo, poleMat.clone());
            poleR.position.set(x + 2, 1, z);
            poleR.castShadow = true;
            
            slopeGroup.add(poleL, poleR);
            gates.push({ x, z, passed: false, missed: false, poleL, poleR });
        }

        // Generate Rocks
        const rockGeo = new THREE.SphereGeometry(0.5, 8, 8);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 1.0 });
        for (let i = 0; i < 6; i++) {
            const z = -10 - Math.random() * 75;
            const x = (Math.random() - 0.5) * 16; // -8 to 8
            
            const rock = new THREE.Mesh(rockGeo, rockMat.clone());
            rock.position.set(x, 0.25, z);
            rock.scale.y = 0.7; // Flatten slightly
            rock.castShadow = true;
            
            slopeGroup.add(rock);
            rocks.push({ x, z, hit: false, mesh: rock });
        }

        // Load Skier Model
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BrainStem/glTF-Binary/BrainStem.glb',
            (gltf) => {
                skierModel = gltf.scene;
                skierModel.scale.set(0.5, 0.5, 0.5);
                skierModel.position.set(0, 0.5, 0);
                
                skierModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                slopeGroup.add(skierModel);

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(skierModel);
                    mixer.clipAction(gltf.animations[0]).play();
                }

                state.modelLoaded = true;
                startBtn.innerText = "Start Game";
                startBtn.disabled = false;
            },
            undefined,
            (error) => {
                console.error('Error loading model:', error);
                startBtn.innerText = "Error Loading Model";
            }
        );

        // --- Input Handling ---
        const keys = { ArrowLeft: false, ArrowRight: false, a: false, d: false };
        let boostTimer = 0;

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            
            if (e.code === 'Space' && state.gameStarted && !state.gameFinished) {
                if (state.slowMotionEnergy > 0) {
                    state.slowMotionActive = !state.slowMotionActive;
                    state.timeScale = state.slowMotionActive ? 0.3 : 1.0;
                }
            }
            
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') {
                if (state.gameStarted && !state.gameFinished && state.boostCooldown <= 0 && !state.boostActive) {
                    state.boostActive = true;
                    boostTimer = 2.0;
                    state.boostCooldown = 5.0;
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // --- Game Logic & Loop ---
        const clock = new THREE.Clock();
        const skierWorldPos = new THREE.Vector3();

        function resetGame() {
            state.gameStarted = true;
            state.gameFinished = false;
            state.elapsedTime = 0;
            state.rawTime = 0;
            state.speed = 0;
            state.gatesPassed = 0;
            state.gatesMissed = 0;
            state.collisions = 0;
            state.slowMotionActive = false;
            state.slowMotionEnergy = 100;
            state.boostActive = false;
            state.boostCooldown = 0;
            state.timeScale = 1.0;
            state.totalPenalty = 0;
            boostTimer = 0;

            if (skierModel) {
                skierModel.position.set(0, 0.5, 0);
            }

            gates.forEach(g => {
                g.passed = false;
                g.missed = false;
                g.poleL.material.color.setHex(0xff0000);
                g.poleR.material.color.setHex(0xff0000);
            });

            rocks.forEach(r => {
                r.hit = false;
                r.mesh.material.color.setHex(0x8B4513);
            });

            startScreen.classList.add('hidden');
            resultsScreen.classList.add('hidden');
            clock.start();
        }

        startBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', resetGame);

        function updateUI() {
            timeDisplay.innerText = `Time: ${state.elapsedTime.toFixed(1)}s`;
            speedDisplay.innerText = `Speed: ${state.speed.toFixed(1)} m/s`;
            gatesDisplay.innerText = `Gates: ${state.gatesPassed}/12`;

            // Energy Bar
            energyBarFill.style.width = `${state.slowMotionEnergy}%`;
            const r = Math.floor(255 * (100 - state.slowMotionEnergy) / 100);
            const g = Math.floor(255 * state.slowMotionEnergy / 100);
            energyBarFill.style.backgroundColor = `rgb(${r}, ${g}, 0)`;

            // Boost Status
            if (state.boostActive) {
                boostStatus.innerText = `Boost: ACTIVE (${boostTimer.toFixed(1)}s)`;
                boostStatus.style.color = '#ffff00';
            } else if (state.boostCooldown > 0) {
                boostStatus.innerText = `Boost: ${state.boostCooldown.toFixed(1)}s`;
                boostStatus.style.color = '#ffaa00';
            } else {
                boostStatus.innerText = 'Boost: READY';
                boostStatus.style.color = '#00ff00';
            }
        }

        function showResults() {
            document.getElementById('res-time').innerText = `Final Time: ${state.elapsedTime.toFixed(2)}s`;
            document.getElementById('res-gates').innerText = `Gates Passed: ${state.gatesPassed}/12`;
            document.getElementById('res-penalties').innerText = `Penalties: ${state.totalPenalty}s (${state.collisions} rocks, ${state.gatesMissed} missed gates)`;
            resultsScreen.classList.remove('hidden');
        }

        function animate() {
            requestAnimationFrame(animate);

            const realDelta = clock.getDelta();
            const scaledDelta = realDelta * state.timeScale;

            if (mixer) mixer.update(scaledDelta);

            if (state.gameStarted && !state.gameFinished && skierModel) {
                // Time Control Logic
                if (state.slowMotionActive) {
                    state.slowMotionEnergy -= 20 * realDelta;
                    if (state.slowMotionEnergy <= 0) {
                        state.slowMotionEnergy = 0;
                        state.slowMotionActive = false;
                        state.timeScale = 1.0;
                    }
                } else {
                    state.slowMotionEnergy += 5 * realDelta;
                    if (state.slowMotionEnergy > 100) state.slowMotionEnergy = 100;
                }

                // Boost Logic
                if (state.boostActive) {
                    boostTimer -= realDelta;
                    if (boostTimer <= 0) {
                        state.boostActive = false;
                    }
                }
                if (state.boostCooldown > 0) {
                    state.boostCooldown -= realDelta;
                    if (state.boostCooldown < 0) state.boostCooldown = 0;
                }

                // Physics & Movement
                state.rawTime += realDelta;
                state.elapsedTime = state.rawTime + state.totalPenalty;

                const baseSpeed = Math.min(2 + state.rawTime * 0.5, 15);
                state.speed = baseSpeed * (state.boostActive ? 1.8 : 1.0);

                skierModel.position.z -= state.speed * scaledDelta;

                if (keys.ArrowLeft || keys.a) skierModel.position.x -= 6 * scaledDelta;
                if (keys.ArrowRight || keys.d) skierModel.position.x += 6 * scaledDelta;
                
                skierModel.position.x = Math.max(-8, Math.min(8, skierModel.position.x));

                state.skierX = skierModel.position.x;
                state.skierZ = skierModel.position.z;

                // Collisions (Rocks)
                rocks.forEach(rock => {
                    if (!rock.hit) {
                        const dx = skierModel.position.x - rock.x;
                        const dz = skierModel.position.z - rock.z;
                        if (Math.sqrt(dx*dx + dz*dz) < 1.0) {
                            rock.hit = true;
                            state.collisions++;
                            state.totalPenalty += 3;
                            rock.mesh.material.color.setHex(0xff0000);
                        }
                    }
                });

                // Gates
                gates.forEach(gate => {
                    if (!gate.passed && !gate.missed) {
                        if (skierModel.position.z < gate.z) {
                            if (Math.abs(skierModel.position.x - gate.x) <= 2.0) {
                                gate.passed = true;
                                state.gatesPassed++;
                                gate.poleL.material.color.setHex(0x00ff00);
                                gate.poleR.material.color.setHex(0x00ff00);
                            } else {
                                gate.missed = true;
                                state.gatesMissed++;
                                state.totalPenalty += 5;
                                gate.poleL.material.color.setHex(0x555555);
                                gate.poleR.material.color.setHex(0x555555);
                            }
                        }
                    }
                });

                // End Condition
                if (skierModel.position.z <= -90) {
                    state.gameFinished = true;
                    showResults();
                }

                updateUI();
            }

            // Camera Follow
            if (skierModel) {
                skierModel.getWorldPosition(skierWorldPos);
                camera.position.x = skierWorldPos.x;
                camera.position.y = skierWorldPos.y + 8;
                camera.position.z = skierWorldPos.z + 15;
                camera.lookAt(skierWorldPos);
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
