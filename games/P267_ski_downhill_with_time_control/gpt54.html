<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ski Downhill - Time Control</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87CEEB;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
    }

    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 20px;
      line-height: 1.5;
    }

    #energyWrap {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 240px;
      text-align: right;
      font-size: 18px;
    }

    #energyOuter {
      margin-top: 8px;
      width: 240px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.25);
      border-radius: 10px;
      overflow: hidden;
      box-sizing: border-box;
    }

    #energyInner {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #ff3333, #ffcc33, #33cc66);
      transform-origin: left center;
    }

    #boostStatus {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
    }

    #startOverlay, #resultsOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.45);
      pointer-events: auto;
    }

    #resultsOverlay {
      display: none;
    }

    .panel {
      background: rgba(20, 30, 40, 0.88);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 24px 28px;
      text-align: center;
      color: white;
      min-width: 300px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    .panel h1, .panel h2 {
      margin: 0 0 12px;
    }

    .panel p {
      margin: 8px 0;
      opacity: 0.95;
    }

    button {
      margin-top: 16px;
      padding: 12px 24px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #2e8bff;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #1f75e8;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="info">
      <div id="timeText">Time: 0.0s</div>
      <div id="speedText">Speed: 0.0 m/s</div>
      <div id="gatesText">Gates: 0/12</div>
    </div>

    <div id="energyWrap">
      <div>SlowMo Energy</div>
      <div id="energyOuter">
        <div id="energyInner"></div>
      </div>
    </div>

    <div id="boostStatus">Boost: READY</div>
  </div>

  <div id="startOverlay">
    <div class="panel">
      <h1>Ski Downhill</h1>
      <p>Arrow Keys / A,D to steer</p>
      <p>SPACE = Slow Motion</p>
      <p>SHIFT = Speed Boost</p>
      <button id="startButton">Start</button>
    </div>
  </div>

  <div id="resultsOverlay">
    <div class="panel">
      <h2>Run Complete</h2>
      <p id="finalTime">Final Time: 0.0s</p>
      <p id="finalGates">Gates Passed: 0/12</p>
      <p id="finalPenalties">Penalties: 0.0s</p>
      <button onclick="location.reload()">Restart</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 20, 10);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambLight);

    const slopeAngle = THREE.MathUtils.degToRad(15);
    const slopeLength = 200;
    const slopeWidth = 20;

    const slopeGeom = new THREE.PlaneGeometry(slopeWidth, slopeLength, 20, 40);
    slopeGeom.rotateX(-Math.PI / 2);
    slopeGeom.rotateX(-slopeAngle);

    const slopeMat = new THREE.MeshStandardMaterial({
      color: 0xF0F8FF,
      roughness: 0.9,
      metalness: 0.0
    });

    const slope = new THREE.Mesh(slopeGeom, slopeMat);
    slope.receiveShadow = true;
    slope.position.set(0, 0, -45);
    scene.add(slope);

    function getSlopeHeightAtZ(z) {
      return Math.tan(slopeAngle) * (-z);
    }

    function getSurfaceY(z, extra = 0.5) {
      return getSlopeHeightAtZ(z) + extra;
    }

    const skierRoot = new THREE.Group();
    scene.add(skierRoot);

    let skierModel = null;
    let mixer = null;

    const fallbackSkier = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.35, 1.2, 4, 8),
      new THREE.MeshStandardMaterial({ color: 0x3366ff })
    );
    fallbackSkier.castShadow = true;
    fallbackSkier.visible = false;
    skierRoot.add(fallbackSkier);

    skierRoot.position.set(0, getSurfaceY(0, 0.6), 0);

    const loader = new GLTFLoader();
    loader.load(
      'BrainStem.glb',
      (gltf) => {
        skierModel = gltf.scene;
        skierModel.scale.set(0.5, 0.5, 0.5);
        skierModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        skierRoot.add(skierModel);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(skierModel);
          gltf.animations.forEach((clip) => {
            mixer.clipAction(clip).play();
          });
        }

        state.modelLoaded = true;
      },
      undefined,
      () => {
        fallbackSkier.visible = true;
        state.modelLoaded = false;
      }
    );

    const gates = [];
    const gateGroup = new THREE.Group();
    scene.add(gateGroup);

    const poleGeom = new THREE.CylinderGeometry(0.08, 0.08, 2.2, 8);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0xcc2222 });

    for (let i = 0; i < 12; i++) {
      const z = -8 - i * 7.2;
      const centerX = THREE.MathUtils.randFloat(-4, 4);

      const leftX = centerX - 2;
      const rightX = centerX + 2;

      const gate = {
        z,
        centerX,
        leftX,
        rightX,
        passed: false,
        success: false
      };

      const leftPole = new THREE.Mesh(poleGeom, poleMat);
      leftPole.castShadow = true;
      leftPole.position.set(leftX, getSurfaceY(z, 1.1), z);

      const rightPole = new THREE.Mesh(poleGeom, poleMat);
      rightPole.castShadow = true;
      rightPole.position.set(rightX, getSurfaceY(z, 1.1), z);

      gate.leftPole = leftPole;
      gate.rightPole = rightPole;

      gateGroup.add(leftPole, rightPole);
      gates.push(gate);
    }

    const rocks = [];
    const rockGroup = new THREE.Group();
    scene.add(rockGroup);

    const rockGeom = new THREE.SphereGeometry(0.5, 16, 16);
    const rockMat = new THREE.MeshStandardMaterial({ color: 0x7a5a3a, roughness: 1 });

    for (let i = 0; i < 6; i++) {
      const z = THREE.MathUtils.randFloat(-15, -82);
      const x = THREE.MathUtils.randFloat(-6, 6);

      const rock = new THREE.Mesh(rockGeom, rockMat);
      rock.castShadow = true;
      rock.receiveShadow = true;
      rock.position.set(x, getSurfaceY(z, 0.35), z);

      const rockData = {
        mesh: rock,
        hit: false,
        radius: 1.0
      };

      rocks.push(rockData);
      rockGroup.add(rock);
    }

    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;

      if (e.code === 'Space') {
        e.preventDefault();
        if (state.gameStarted && !state.gameFinished && state.slowMotionEnergy > 0) {
          state.slowMotionActive = !state.slowMotionActive;
          if (!state.slowMotionActive) state.timeScale = 1.0;
        }
      }

      if ((e.key === 'Shift' || e.key === 'ShiftLeft' || e.key === 'ShiftRight') && state.gameStarted && !state.gameFinished) {
        activateBoost();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
    });

    const startButton = document.getElementById('startButton');
    const startOverlay = document.getElementById('startOverlay');
    const resultsOverlay = document.getElementById('resultsOverlay');

    startButton.addEventListener('click', () => {
      state.gameStarted = true;
      startOverlay.style.display = 'none';
    });

    const timeText = document.getElementById('timeText');
    const speedText = document.getElementById('speedText');
    const gatesText = document.getElementById('gatesText');
    const energyInner = document.getElementById('energyInner');
    const boostStatus = document.getElementById('boostStatus');

    const finalTime = document.getElementById('finalTime');
    const finalGates = document.getElementById('finalGates');
    const finalPenalties = document.getElementById('finalPenalties');

    const state = {
      gameStarted: false,
      gameFinished: false,
      elapsedTime: 0,
      rawTime: 0,
      speed: 0,
      skierX: 0,
      skierZ: 0,
      gatesPassed: 0,
      gatesMissed: 0,
      collisions: 0,
      slowMotionActive: false,
      slowMotionEnergy: 100,
      boostActive: false,
      boostCooldown: 0,
      timeScale: 1.0,
      totalPenalty: 0,
      modelLoaded: false
    };

    window.__3D_STATE__ = state;

    const baseSpeed = 2;
    const maxSpeed = 15;
    const lateralSpeed = 6;
    const boostDuration = 2;
    const boostCooldownTime = 5;

    let boostTimer = 0;
    let previousSkierZ = skierRoot.position.z;

    function activateBoost() {
      if (state.boostCooldown <= 0 && !state.boostActive) {
        state.boostActive = true;
        boostTimer = boostDuration;
        state.boostCooldown = boostCooldownTime;
      }
    }

    function updateHUD() {
      timeText.textContent = `Time: ${state.elapsedTime.toFixed(1)}s`;
      speedText.textContent = `Speed: ${state.speed.toFixed(1)} m/s`;
      gatesText.textContent = `Gates: ${state.gatesPassed}/12`;

      const pct = Math.max(0, Math.min(100, state.slowMotionEnergy));
      energyInner.style.width = pct + '%';

      const hue = (pct / 100) * 120;
      energyInner.style.background = `linear-gradient(90deg, hsl(${Math.max(0, hue - 30)}, 85%, 50%), hsl(${hue}, 75%, 45%), hsl(${Math.min(120, hue + 20)}, 65%, 45%))`;

      if (state.boostActive) {
        boostStatus.textContent = 'Boost: ACTIVE';
      } else if (state.boostCooldown > 0) {
        boostStatus.textContent = `Boost: ${state.boostCooldown.toFixed(1)}s`;
      } else {
        boostStatus.textContent = 'Boost: READY';
      }
    }

    function finishGame() {
      state.gameFinished = true;
      state.slowMotionActive = false;
      state.timeScale = 1.0;

      finalTime.textContent = `Final Time: ${state.elapsedTime.toFixed(1)}s`;
      finalGates.textContent = `Gates Passed: ${state.gatesPassed}/12`;
      finalPenalties.textContent = `Penalties: ${state.totalPenalty.toFixed(1)}s`;

      resultsOverlay.style.display = 'flex';
    }

    function updateCamera() {
      const targetPos = new THREE.Vector3(
        skierRoot.position.x,
        skierRoot.position.y + 2.5,
        skierRoot.position.z + 10
      );

      camera.position.lerp(targetPos, 0.08);
      camera.lookAt(
        skierRoot.position.x,
        skierRoot.position.y + 1.0,
        skierRoot.position.z - 8
      );
    }

    function updateGates() {
      for (const gate of gates) {
        if (!gate.passed && previousSkierZ > gate.z && skierRoot.position.z <= gate.z) {
          gate.passed = true;
          if (skierRoot.position.x >= gate.leftX && skierRoot.position.x <= gate.rightX) {
            gate.success = true;
            state.gatesPassed++;
          } else {
            state.gatesMissed++;
            state.totalPenalty += 5;
          }
        }
      }
    }

    function updateCollisions() {
      for (const rock of rocks) {
        if (rock.hit) continue;

        const dx = skierRoot.position.x - rock.mesh.position.x;
        const dz = skierRoot.position.z - rock.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.0) {
          rock.hit = true;
          rock.mesh.material = rock.mesh.material.clone();
          rock.mesh.material.color.set(0xaa2222);
          state.collisions++;
          state.totalPenalty += 3;
        }
      }
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const realDt = Math.min(clock.getDelta(), 0.05);

      if (state.gameStarted && !state.gameFinished) {
        if (state.slowMotionActive && state.slowMotionEnergy > 0) {
          state.timeScale = 0.3;
          state.slowMotionEnergy -= 20 * realDt;
          if (state.slowMotionEnergy <= 0) {
            state.slowMotionEnergy = 0;
            state.slowMotionActive = false;
            state.timeScale = 1.0;
          }
        } else {
          state.slowMotionActive = false;
          state.timeScale = 1.0;
          state.slowMotionEnergy += 5 * realDt;
          if (state.slowMotionEnergy > 100) state.slowMotionEnergy = 100;
        }

        if (state.boostCooldown > 0) {
          state.boostCooldown -= realDt;
          if (state.boostCooldown < 0) state.boostCooldown = 0;
        }

        if (state.boostActive) {
          boostTimer -= realDt;
          if (boostTimer <= 0) {
            state.boostActive = false;
            boostTimer = 0;
          }
        }

        const dt = realDt * state.timeScale;

        state.rawTime += dt;

        let currentSpeed = Math.min(baseSpeed + state.rawTime * 0.5, maxSpeed);
        if (state.boostActive) currentSpeed *= 1.8;
        state.speed = currentSpeed;

        let steer = 0;
        if (keys['arrowleft'] || keys['a']) steer -= 1;
        if (keys['arrowright'] || keys['d']) steer += 1;

        skierRoot.position.x += steer * lateralSpeed * dt;
        skierRoot.position.x = THREE.MathUtils.clamp(skierRoot.position.x, -8, 8);

        previousSkierZ = skierRoot.position.z;
        skierRoot.position.z -= currentSpeed * dt;
        skierRoot.position.y = getSurfaceY(skierRoot.position.z, 0.6);

        skierRoot.rotation.set(0, 0, 0);
        skierRoot.rotation.z = -steer * 0.2;
        skierRoot.rotation.x = -0.15;

        updateGates();
        updateCollisions();

        state.elapsedTime = state.rawTime + state.totalPenalty;
        state.skierX = skierRoot.position.x;
        state.skierZ = skierRoot.position.z;

        if (skierRoot.position.z <= -90) {
          for (const gate of gates) {
            if (!gate.passed) {
              gate.passed = true;
              state.gatesMissed++;
              state.totalPenalty += 5;
            }
          }
          state.elapsedTime = state.rawTime + state.totalPenalty;
          finishGame();
        }
      }

      if (mixer) {
        mixer.update(realDt * state.timeScale);
      }

      updateHUD();
      updateCamera();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
