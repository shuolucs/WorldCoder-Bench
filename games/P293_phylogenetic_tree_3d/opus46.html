<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a1a; }
canvas { display: block; }

#infoPanel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 10px;
    padding: 16px 20px;
    color: #ccd;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 100;
}
#infoPanel h3 { color: #4488ff; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
#infoPanel .info-row { margin: 4px 0; font-size: 13px; }
#infoPanel .info-label { color: #889; }
#infoPanel .info-value { color: #eef; font-weight: bold; }

#statsPanel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 10px;
    padding: 16px 20px;
    color: #ccd;
    min-width: 220px;
    backdrop-filter: blur(10px);
    z-index: 100;
}
#statsPanel h3 { color: #ff8844; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
#statsPanel .stat-row { margin: 4px 0; font-size: 13px; }
#statsPanel .stat-label { color: #889; }
#statsPanel .stat-value { color: #eef; font-weight: bold; }

#controls {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    align-items: center;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(68, 136, 255, 0.4);
    border-radius: 10px;
    padding: 12px 20px;
    backdrop-filter: blur(10px);
    z-index: 100;
}
#controls label { color: #aab; font-size: 13px; }
#controls input[type="range"] {
    width: 120px;
    accent-color: #4488ff;
}
#controls button {
    background: rgba(68, 136, 255, 0.2);
    border: 1px solid rgba(68, 136, 255, 0.5);
    color: #ccd;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
}
#controls button:hover {
    background: rgba(68, 136, 255, 0.4);
    color: #fff;
}
#controls button.active {
    background: rgba(68, 136, 255, 0.5);
    border-color: #4488ff;
    color: #fff;
}

#helpText {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(150, 150, 180, 0.6);
    font-size: 11px;
    z-index: 100;
    text-align: center;
}
</style>
</head>
<body>

<div id="infoPanel">
    <h3>Node Info</h3>
    <div class="info-row"><span class="info-label">ID: </span><span class="info-value" id="infoId">None</span></div>
    <div class="info-row"><span class="info-label">Depth: </span><span class="info-value" id="infoDepth">-</span></div>
    <div class="info-row"><span class="info-label">Children: </span><span class="info-value" id="infoChildren">-</span></div>
    <div class="info-row"><span class="info-label">Is Leaf: </span><span class="info-value" id="infoLeaf">-</span></div>
</div>

<div id="statsPanel">
    <h3>Tree Stats</h3>
    <div class="stat-row"><span class="stat-label">Visible Nodes: </span><span class="stat-value" id="statVisible">15</span></div>
    <div class="stat-row"><span class="stat-label">Depth Filter: </span><span class="stat-value" id="statDepth">3</span></div>
    <div class="stat-row"><span class="stat-label">Rotation: </span><span class="stat-value" id="statRotation">OFF</span></div>
    <div class="stat-row"><span class="stat-label">Tree State: </span><span class="stat-value" id="statTreeState">expanded</span></div>
    <div class="stat-row"><span class="stat-label">Color Mode: </span><span class="stat-value" id="statColorMode">depth</span></div>
</div>

<div id="controls">
    <label>Depth: <input type="range" id="depthSlider" min="0" max="3" value="3" step="1"></label>
    <span id="depthValue" style="color:#4488ff;font-size:13px;min-width:16px;">3</span>
    <button id="rotateBtn">Rotate: OFF</button>
    <button id="colorModeBtn">Color: Depth</button>
</div>

<div id="helpText">Space: Expand/Collapse | T: Top View | F: Front View | Click: Select Node</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x222244);
scene.add(gridHelper);

// Tree group
const treeGroup = new THREE.Group();
scene.add(treeGroup);

// Depth colors
const depthColors = {
    0: 0xff4444,
    1: 0xff8844,
    2: 0x44aa88,
    3: 0x4488ff
};

// Tree structure definition
const treeData = {
    root: { id: 'root', depth: 0, children: ['n1a', 'n1b'], parent: null },
    n1a: { id: 'n1a', depth: 1, children: ['n2a', 'n2b'], parent: 'root' },
    n1b: { id: 'n1b', depth: 1, children: ['n2c', 'n2d'], parent: 'root' },
    n2a: { id: 'n2a', depth: 2, children: ['n3a', 'n3b'], parent: 'n1a' },
    n2b: { id: 'n2b', depth: 2, children: ['n3c', 'n3d'], parent: 'n1a' },
    n2c: { id: 'n2c', depth: 2, children: ['n3e', 'n3f'], parent: 'n1b' },
    n2d: { id: 'n2d', depth: 2, children: ['n3g', 'n3h'], parent: 'n1b' },
    n3a: { id: 'n3a', depth: 3, children: [], parent: 'n2a' },
    n3b: { id: 'n3b', depth: 3, children: [], parent: 'n2a' },
    n3c: { id: 'n3c', depth: 3, children: [], parent: 'n2b' },
    n3d: { id: 'n3d', depth: 3, children: [], parent: 'n2b' },
    n3e: { id: 'n3e', depth: 3, children: [], parent: 'n2c' },
    n3f: { id: 'n3f', depth: 3, children: [], parent: 'n2c' },
    n3g: { id: 'n3g', depth: 3, children: [], parent: 'n2d' },
    n3h: { id: 'n3h', depth: 3, children: [], parent: 'n2d' }
};

// Calculate positions
function calculatePositions() {
    const positions = {};
    positions['root'] = new THREE.Vector3(0, 0, 0);

    // Depth 1: 2 nodes spread at angles
    const d1Angles = [-Math.PI / 4, Math.PI / 4];
    const d1Radius = 2;
    ['n1a', 'n1b'].forEach((id, i) => {
        positions[id] = new THREE.Vector3(
            Math.sin(d1Angles[i]) * d1Radius,
            3,
            Math.cos(d1Angles[i]) * d1Radius
        );
    });

    // Depth 2: 4 nodes
    const d2Spread = 1.5;
    const d2Configs = [
        { id: 'n2a', parent: 'n1a', offset: new THREE.Vector3(-d2Spread, 0, -d2Spread) },
        { id: 'n2b', parent: 'n1a', offset: new THREE.Vector3(d2Spread, 0, -d2Spread) },
        { id: 'n2c', parent: 'n1b', offset: new THREE.Vector3(-d2Spread, 0, d2Spread) },
        { id: 'n2d', parent: 'n1b', offset: new THREE.Vector3(d2Spread, 0, d2Spread) }
    ];
    d2Configs.forEach(cfg => {
        const parentPos = positions[cfg.parent];
        positions[cfg.id] = new THREE.Vector3(
            parentPos.x + cfg.offset.x,
            6,
            parentPos.z + cfg.offset.z
        );
    });

    // Depth 3: 8 nodes
    const d3Spread = 0.8;
    const d3Configs = [
        { id: 'n3a', parent: 'n2a', offset: new THREE.Vector3(-d3Spread, 0, -d3Spread) },
        { id: 'n3b', parent: 'n2a', offset: new THREE.Vector3(d3Spread, 0, -d3Spread) },
        { id: 'n3c', parent: 'n2b', offset: new THREE.Vector3(-d3Spread, 0, d3Spread) },
        { id: 'n3d', parent: 'n2b', offset: new THREE.Vector3(d3Spread, 0, d3Spread) },
        { id: 'n3e', parent: 'n2c', offset: new THREE.Vector3(-d3Spread, 0, -d3Spread) },
        { id: 'n3f', parent: 'n2c', offset: new THREE.Vector3(d3Spread, 0, -d3Spread) },
        { id: 'n3g', parent: 'n2d', offset: new THREE.Vector3(-d3Spread, 0, d3Spread) },
        { id: 'n3h', parent: 'n2d', offset: new THREE.Vector3(d3Spread, 0, d3Spread) }
    ];
    d3Configs.forEach(cfg => {
        const parentPos = positions[cfg.parent];
        positions[cfg.id] = new THREE.Vector3(
            parentPos.x + cfg.offset.x,
            9,
            parentPos.z + cfg.offset.z
        );
    });

    return positions;
}

const originalPositions = calculatePositions();
const nodeMeshes = {};
const branchMeshes = {};
const branchLines = {};

// Create node spheres
const sphereGeom = new THREE.SphereGeometry(0.3, 24, 24);

Object.keys(treeData).forEach(id => {
    const node = treeData[id];
    const material = new THREE.MeshStandardMaterial({
        color: depthColors[node.depth],
        emissive: 0x000000,
        emissiveIntensity: 0.5,
        roughness: 0.3,
        metalness: 0.5
    });
    const mesh = new THREE.Mesh(sphereGeom, material);
    const pos = originalPositions[id];
    mesh.position.copy(pos);
    mesh.userData = { nodeId: id, depth: node.depth, originalY: pos.y };
    nodeMeshes[id] = mesh;
    treeGroup.add(mesh);
});

// Create branches (lines connecting parent to child)
function createBranch(parentId, childId) {
    const key = `${parentId}-${childId}`;
    const parentPos = originalPositions[parentId];
    const childPos = originalPositions[childId];

    const material = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.6,
        linewidth: 1
    });

    const geometry = new THREE.BufferGeometry().setFromPoints([
        parentPos.clone(),
        childPos.clone()
    ]);

    const line = new THREE.Line(geometry, material);
    line.userData = { parentId, childId, key };
    branchLines[key] = line;
    treeGroup.add(line);
}

// Create all branches
Object.keys(treeData).forEach(id => {
    const node = treeData[id];
    node.children.forEach(childId => {
        createBranch(id, childId);
    });
});

// Robot model
let robotModel = null;
let robotLoaded = false;

const loader = new GLTFLoader();
try {
    loader.load('robot.glb',
        (gltf) => {
            robotModel = gltf.scene;
            robotModel.scale.set(0.3, 0.3, 0.3);
            const n3dPos = originalPositions['n3d'];
            robotModel.position.copy(n3dPos);
            robotModel.position.y += 0.5;
            treeGroup.add(robotModel);
            robotLoaded = true;
        },
        undefined,
        (error) => {
            console.log('Robot model not found, creating placeholder');
            createPlaceholderRobot();
        }
    );
} catch (e) {
    createPlaceholderRobot();
}

function createPlaceholderRobot() {
    const group = new THREE.Group();

    // Body
    const bodyGeom = new THREE.BoxGeometry(0.4, 0.5, 0.3);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x888899, metalness: 0.8, roughness: 0.2 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.25;
    group.add(body);

    // Head
    const headGeom = new THREE.BoxGeometry(0.3, 0.3, 0.25);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xaaaabb, metalness: 0.8, roughness: 0.2 });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.y = 0.65;
    group.add(head);

    // Eyes
    const eyeGeom = new THREE.SphereGeometry(0.04, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 });
    const leftEye = new THREE.Mesh(eyeGeom, eyeMat);
    leftEye.position.set(-0.08, 0.68, 0.13);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeom, eyeMat);
    rightEye.position.set(0.08, 0.68, 0.13);
    group.add(rightEye);

    // Antenna
    const antGeom = new THREE.CylinderGeometry(0.02, 0.02, 0.2, 8);
    const antMat = new THREE.MeshStandardMaterial({ color: 0xccccdd });
    const antenna = new THREE.Mesh(antGeom, antMat);
    antenna.position.y = 0.9;
    group.add(antenna);

    const tipGeom = new THREE.SphereGeometry(0.05, 8, 8);
    const tipMat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0xff4444, emissiveIntensity: 0.5 });
    const tip = new THREE.Mesh(tipGeom, tipMat);
    tip.position.y = 1.0;
    group.add(tip);

    group.scale.set(0.3, 0.3, 0.3);
    const n3dPos = originalPositions['n3d'];
    group.position.copy(n3dPos);
    group.position.y += 0.5;

    robotModel = group;
    treeGroup.add(robotModel);
    robotLoaded = true;
}

// State
let selectedNode = null;
let depthFilter = 3;
let autoRotate = false;
let rotationAngle = 0;
let treeState = 'expanded';
let colorMode = 'depth';
let robotRotation = 0;
let highlightedPath = [];
let animationStartTime = 0;
let animationDuration = 1000;
let animatingFrom = {};
let animatingTo = {};

// State object
window.__3D_STATE__ = {
    totalNodes: 15,
    visibleNodes: 15,
    selectedNode: null,
    selectedDepth: -1,
    depthFilter: 3,
    autoRotate: false,
    rotationAngle: 0,
    treeState: 'expanded',
    colorMode: 'depth',
    robotLoaded: false,
    robotRotation: 0,
    cameraY: 5.0,
    highlightedPath: [],
    nodePositions: {}
};

// UI elements
const depthSlider = document.getElementById('depthSlider');
const depthValue = document.getElementById('depthValue');
const rotateBtn = document.getElementById('rotateBtn');
const colorModeBtn = document.getElementById('colorModeBtn');

// Depth slider
depthSlider.addEventListener('input', (e) => {
    depthFilter = parseInt(e.target.value);
    depthValue.textContent = depthFilter;
    applyDepthFilter();
});

// Rotate button
rotateBtn.addEventListener('click', () => {
    autoRotate = !autoRotate;
    rotateBtn.textContent = `Rotate: ${autoRotate ? 'ON' : 'OFF'}`;
    rotateBtn.classList.toggle('active', autoRotate);
});

// Color mode button
colorModeBtn.addEventListener('click', () => {
    colorMode = colorMode === 'depth' ? 'uniform' : 'depth';
    colorModeBtn.textContent = `Color: ${colorMode === 'depth' ? 'Depth' : 'Uniform'}`;
    applyColorMode();
});

function applyDepthFilter() {
    Object.keys(treeData).forEach(id => {
        const node = treeData[id];
        const mesh = nodeMeshes[id];
        mesh.visible = node.depth <= depthFilter;
    });

    Object.keys(branchLines).forEach(key => {
        const line = branchLines[key];
        const childNode = treeData[line.userData.childId];
        line.visible = childNode.depth <= depthFilter;
    });
}

function applyColorMode() {
    Object.keys(treeData).forEach(id => {
        const node = treeData[id];
        const mesh = nodeMeshes[id];
        if (selectedNode === id) return; // Don't change selected node color
        if (colorMode === 'depth') {
            mesh.material.color.setHex(depthColors[node.depth]);
        } else {
            mesh.material.color.setHex(0xaa44ff);
        }
    });
}

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const meshArray = Object.values(nodeMeshes);
    const intersects = raycaster.intersectObjects(meshArray);

    if (intersects.length > 0) {
        const hit = intersects[0].object;
        selectNode(hit.userData.nodeId);
    }
});

function selectNode(nodeId) {
    // Deselect previous
    if (selectedNode && nodeMeshes[selectedNode]) {
        const prevMesh = nodeMeshes[selectedNode];
        prevMesh.material.emissive.setHex(0x000000);
        if (colorMode === 'depth') {
            prevMesh.material.color.setHex(depthColors[treeData[selectedNode].depth]);
        } else {
            prevMesh.material.color.setHex(0xaa44ff);
        }
    }

    // Clear previous path highlight
    clearPathHighlight();

    selectedNode = nodeId;
    const mesh = nodeMeshes[nodeId];
    mesh.material.emissive.setHex(0xffff00);
    mesh.material.emissiveIntensity = 0.5;

    const node = treeData[nodeId];

    // Update info panel
    document.getElementById('infoId').textContent = nodeId;
    document.getElementById('infoDepth').textContent = node.depth;
    document.getElementById('infoChildren').textContent = node.children.length;
    document.getElementById('infoLeaf').textContent = node.children.length === 0 ? 'Yes' : 'No';

    // Highlight path if leaf
    if (node.children.length === 0) {
        highlightPath(nodeId);
    } else {
        highlightedPath = [];
    }
}

function clearPathHighlight() {
    Object.keys(branchLines).forEach(key => {
        const line = branchLines[key];
        line.material.color.setHex(0xffffff);
        line.material.opacity = 0.6;
    });
    highlightedPath = [];
}

function highlightPath(leafId) {
    const path = [];
    let current = leafId;
    while (current) {
        path.unshift(current);
        current = treeData[current].parent;
    }
    highlightedPath = path;

    // Highlight branches along the path
    for (let i = 0; i < path.length - 1; i++) {
        const key = `${path[i]}-${path[i + 1]}`;
        if (branchLines[key]) {
            branchLines[key].material.color.setHex(0x00ff88);
            branchLines[key].material.opacity = 1.0;
        }
    }
}

// Keyboard events
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        toggleExpandCollapse();
    } else if (e.code === 'KeyT') {
        camera.position.set(0, 20, 0);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        controls.update();
    } else if (e.code === 'KeyF') {
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        controls.update();
    }
});

function toggleExpandCollapse() {
    if (treeState === 'animating') return;

    const targetState = treeState === 'expanded' ? 'collapsed' : 'expanded';
    treeState = 'animating';
    animationStartTime = performance.now();
    animatingFrom = {};
    animatingTo = {};

    Object.keys(nodeMeshes).forEach(id => {
        const mesh = nodeMeshes[id];
        animatingFrom[id] = mesh.position.y;
        if (targetState === 'collapsed') {
            animatingTo[id] = 0;
        } else {
            animatingTo[id] = originalPositions[id].y;
        }
    });

    // Store target state for when animation completes
    animatingFrom._targetState = targetState;
}

function updateAnimation(now) {
    if (treeState !== 'animating') return;

    const elapsed = now - animationStartTime;
    const t = Math.min(elapsed / animationDuration, 1);
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; // easeInOutQuad

    Object.keys(nodeMeshes).forEach(id => {
        const mesh = nodeMeshes[id];
        const from = animatingFrom[id];
        const to = animatingTo[id];
        mesh.position.y = from + (to - from) * eased;
    });

    // Update branch positions
    updateBranchPositions();

    // Update robot position
    if (robotModel) {
        const n3dMesh = nodeMeshes['n3d'];
        robotModel.position.x = n3dMesh.position.x;
        robotModel.position.y = n3dMesh.position.y + 0.5;
        robotModel.position.z = n3dMesh.position.z;
    }

    if (t >= 1) {
        treeState = animatingFrom._targetState;
    }
}

function updateBranchPositions() {
    Object.keys(branchLines).forEach(key => {
        const line = branchLines[key];
        const parentMesh = nodeMeshes[line.userData.parentId];
        const childMesh = nodeMeshes[line.userData.childId];

        const positions = line.geometry.attributes.position;
        positions.setXYZ(0, parentMesh.position.x, parentMesh.position.y, parentMesh.position.z);
        positions.setXYZ(1, childMesh.position.x, childMesh.position.y, childMesh.position.z);
        positions.needsUpdate = true;
    });
}

// Update state
function updateState() {
    let visibleCount = 0;
    const nodePositions = {};

    Object.keys(nodeMeshes).forEach(id => {
        const mesh = nodeMeshes[id];
        if (mesh.visible) visibleCount++;

        // Get world position
        const worldPos = new THREE.Vector3();
        mesh.getWorldPosition(worldPos);
        nodePositions[id] = {
            x: Math.round(worldPos.x * 100) / 100,
            y: Math.round(worldPos.y * 100) / 100,
            z: Math.round(worldPos.z * 100) / 100
        };
    });

    window.__3D_STATE__ = {
        totalNodes: 15,
        visibleNodes: visibleCount,
        selectedNode: selectedNode,
        selectedDepth: selectedNode ? treeData[selectedNode].depth : -1,
        depthFilter: depthFilter,
        autoRotate: autoRotate,
        rotationAngle: Math.round(rotationAngle * 1000) / 1000,
        treeState: treeState,
        colorMode: colorMode,
        robotLoaded: robotLoaded,
        robotRotation: Math.round(robotRotation * 1000) / 1000,
        cameraY: Math.round(camera.position.y * 10) / 10,
        highlightedPath: [...highlightedPath],
        nodePositions: nodePositions
    };

    // Update stats panel
    document.getElementById('statVisible').textContent = visibleCount;
    document.getElementById('statDepth').textContent = depthFilter;
    document.getElementById('statRotation').textContent = autoRotate ? 'ON' : 'OFF';
    document.getElementById('statTreeState').textContent = treeState;
    document.getElementById('statColorMode').textContent = colorMode;
}

// Add some particle effects for ambiance
function createParticles() {
    const particleCount = 200;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);

    for (let i = 0; i < particleCount; i++) {
        positions[i * 3] = (Math.random() - 0.5) * 30;
        positions[i * 3 + 1] = Math.random() * 15;
        positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

    const material = new THREE.PointsMaterial({
        color: 0x4488ff,
        size: 0.05,
        transparent: true,
        opacity: 0.4
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);
    return particles;
}

const particles = createParticles();

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const now = performance.now();

    // Auto rotation
    if (autoRotate) {
        rotationAngle += 0.3 * delta;
        treeGroup.rotation.y = rotationAngle;
    }

    // Robot rotation
    if (robotModel) {
        robotRotation += 0.5 * delta;
        robotModel.rotation.y = robotRotation;
    }

    // Animation
    updateAnimation(now);

    // Particles subtle movement
    if (particles) {
        particles.rotation.y += 0.02 * delta;
    }

    // Pulse effect on selected node
    if (selectedNode && nodeMeshes[selectedNode]) {
        const mesh = nodeMeshes[selectedNode];
        const pulse = (Math.sin(now * 0.005) + 1) * 0.25 + 0.25;
        mesh.material.emissiveIntensity = pulse;
    }

    controls.update();
    updateState();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
