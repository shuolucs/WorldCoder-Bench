<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        canvas {
            display: block;
        }
        #statsPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #222244;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            min-width: 200px;
        }
        #infoPanel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #222244;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
            min-width: 200px;
            text-align: right;
        }
        #controlsPanel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid #222244;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        button {
            background: #222244;
            color: white;
            border: 1px solid #444488;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #444488;
        }
        input[type=range] {
            cursor: pointer;
        }
        .panel-title {
            font-weight: bold;
            color: #88aaff;
            margin-bottom: 8px;
            border-bottom: 1px solid #222244;
            padding-bottom: 4px;
        }
        .highlight {
            color: #ffff00;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="statsPanel"></div>
    <div id="infoPanel">
        <div class="panel-title">Node Info</div>
        <div id="nodeDetails">Select a node</div>
    </div>
    <div id="controlsPanel">
        <label for="depthSlider">Depth Filter:</label>
        <input type="range" id="depthSlider" min="0" max="3" value="3">
        <button id="rotateBtn">Toggle Rotation</button>
        <button id="colorModeBtn">Toggle Color Mode</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            totalNodes: 15,
            visibleNodes: 15,
            selectedNode: null,
            selectedDepth: -1,
            depthFilter: 3,
            autoRotate: false,
            rotationAngle: 0,
            treeState: 'expanded',
            colorMode: 'depth',
            robotLoaded: false,
            robotRotation: 0,
            cameraY: 5.0,
            highlightedPath: [],
            nodePositions: {}
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a1a');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x222244);
        scene.add(gridHelper);

        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        // --- Tree Data & Materials ---
        const depthColors = {
            0: 0xff4444,
            1: 0xff8844,
            2: 0x44aa88,
            3: 0x4488ff
        };
        const uniformColor = 0xaa44ff;

        const nodeData = [
            { id: 'root', depth: 0, parent: null, a: 0, r: 0 },
            { id: 'n1a', depth: 1, parent: 'root', a: Math.PI/2, r: 3 },
            { id: 'n1b', depth: 1, parent: 'root', a: -Math.PI/2, r: 3 },
            { id: 'n2a', depth: 2, parent: 'n1a', a: Math.PI/4, r: 6 },
            { id: 'n2b', depth: 2, parent: 'n1a', a: 3*Math.PI/4, r: 6 },
            { id: 'n2c', depth: 2, parent: 'n1b', a: -Math.PI/4, r: 6 },
            { id: 'n2d', depth: 2, parent: 'n1b', a: -3*Math.PI/4, r: 6 },
            { id: 'n3a', depth: 3, parent: 'n2a', a: Math.PI/8, r: 9 },
            { id: 'n3b', depth: 3, parent: 'n2a', a: 3*Math.PI/8, r: 9 },
            { id: 'n3c', depth: 3, parent: 'n2b', a: 5*Math.PI/8, r: 9 },
            { id: 'n3d', depth: 3, parent: 'n2b', a: 7*Math.PI/8, r: 9 },
            { id: 'n3e', depth: 3, parent: 'n2c', a: -Math.PI/8, r: 9 },
            { id: 'n3f', depth: 3, parent: 'n2c', a: -3*Math.PI/8, r: 9 },
            { id: 'n3g', depth: 3, parent: 'n2d', a: -5*Math.PI/8, r: 9 },
            { id: 'n3h', depth: 3, parent: 'n2d', a: -7*Math.PI/8, r: 9 },
        ];

        const nodes = {};
        const cylinders = {};
        const nodeMeshes = [];

        const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const cylGeo = new THREE.CylinderGeometry(1, 1, 1, 8);
        
        const normalLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        const highlightLineMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 1.0 });

        // Build Tree
        nodeData.forEach(data => {
            const x = Math.cos(data.a) * data.r;
            const z = Math.sin(data.a) * data.r;
            const y = data.depth * 3;

            const material = new THREE.MeshStandardMaterial({ 
                color: depthColors[data.depth],
                emissive: 0x000000
            });

            const mesh = new THREE.Mesh(sphereGeo, material);
            mesh.position.set(x, y, z);
            mesh.userData = { id: data.id, depth: data.depth, isLeaf: data.depth === 3 };
            
            treeGroup.add(mesh);
            nodeMeshes.push(mesh);

            nodes[data.id] = { ...data, mesh, children: [] };
            if (data.parent) {
                nodes[data.parent].children.push(data.id);
            }
        });

        // Build Connections
        Object.values(nodes).forEach(node => {
            if (node.parent) {
                const cyl = new THREE.Mesh(cylGeo, normalLineMat);
                cyl.userData = { isHighlighted: false };
                treeGroup.add(cyl);
                cylinders[node.id] = cyl;
            }
        });

        function updateAllCylinders() {
            Object.values(nodes).forEach(node => {
                if (node.parent) {
                    const parentNode = nodes[node.parent];
                    const cyl = cylinders[node.id];
                    const start = parentNode.mesh.position;
                    const end = node.mesh.position;
                    const dist = start.distanceTo(end);
                    
                    cyl.position.copy(start).add(end).divideScalar(2);
                    
                    if (dist > 0.001) {
                        cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), end.clone().sub(start).normalize());
                    }
                    
                    const radius = cyl.userData.isHighlighted ? 0.15 : 0.05;
                    cyl.scale.set(radius, dist, radius);
                }
            });
        }
        updateAllCylinders();

        // --- Robot Model ---
        let robotMesh = null;
        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            robotMesh = gltf.scene;
            robotMesh.scale.set(0.3, 0.3, 0.3);
            nodes['n3d'].mesh.add(robotMesh);
            state.robotLoaded = true;
        }, undefined, (error) => {
            console.log("Robot model not loaded (expected if file missing locally).");
        });

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateColors() {
            Object.values(nodes).forEach(node => {
                if (state.colorMode === 'depth') {
                    node.mesh.material.color.setHex(depthColors[node.depth]);
                } else {
                    node.mesh.material.color.setHex(uniformColor);
                }
                if (state.selectedNode === node.id) {
                    node.mesh.material.emissive.setHex(0xffff00);
                } else {
                    node.mesh.material.emissive.setHex(0x000000);
                }
            });
        }

        function highlightPath(leafId) {
            // Reset
            Object.values(cylinders).forEach(cyl => {
                cyl.material = normalLineMat;
                cyl.userData.isHighlighted = false;
            });
            state.highlightedPath = [];

            if (leafId && nodes[leafId].depth === 3) {
                let curr = nodes[leafId];
                state.highlightedPath.push(curr.id);
                while (curr.parent) {
                    state.highlightedPath.push(curr.parent);
                    const cyl = cylinders[curr.id];
                    cyl.material = highlightLineMat;
                    cyl.userData.isHighlighted = true;
                    curr = nodes[curr.parent];
                }
            }
            updateAllCylinders();
        }

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const visibleMeshes = nodeMeshes.filter(m => m.visible);
            const intersects = raycaster.intersectObjects(visibleMeshes);

            if (intersects.length > 0) {
                const selectedId = intersects[0].object.userData.id;
                state.selectedNode = selectedId;
                state.selectedDepth = nodes[selectedId].depth;
                
                updateColors();
                highlightPath(selectedId);
                updateInfoPanel();
            }
        });

        document.getElementById('depthSlider').addEventListener('input', (e) => {
            state.depthFilter = parseInt(e.target.value);
            let visibleCount = 0;
            
            Object.values(nodes).forEach(node => {
                const isVisible = node.depth <= state.depthFilter;
                node.mesh.visible = isVisible;
                if (isVisible) visibleCount++;
                
                if (node.parent) {
                    cylinders[node.id].visible = isVisible;
                }
            });
            state.visibleNodes = visibleCount;
        });

        document.getElementById('rotateBtn').addEventListener('click', () => {
            state.autoRotate = !state.autoRotate;
        });

        document.getElementById('colorModeBtn').addEventListener('click', () => {
            state.colorMode = state.colorMode === 'depth' ? 'uniform' : 'depth';
            updateColors();
        });

        // Animation State
        let isAnimating = false;
        let animProgress = 0;
        let targetTreeState = 'expanded';

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !isAnimating) {
                isAnimating = true;
                animProgress = 0;
                targetTreeState = state.treeState === 'expanded' ? 'collapsed' : 'expanded';
                state.treeState = 'animating';
            } else if (e.code === 'KeyT') {
                camera.position.set(0, 20, 0);
                controls.target.set(0, 0, 0);
            } else if (e.code === 'KeyF') {
                camera.position.set(0, 5, 15);
                controls.target.set(0, 0, 0);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI Updates ---
        function updateInfoPanel() {
            const panel = document.getElementById('nodeDetails');
            if (state.selectedNode) {
                const node = nodes[state.selectedNode];
                panel.innerHTML = `
                    ID: <span class="highlight">${node.id}</span><br>
                    Depth: ${node.depth}<br>
                    Children: ${node.children.length}<br>
                    Is Leaf: ${node.depth === 3 ? 'Yes' : 'No'}
                `;
            } else {
                panel.innerHTML = "Select a node";
            }
        }

        function updateStatsPanel() {
            const panel = document.getElementById('statsPanel');
            panel.innerHTML = `
                <div class="panel-title">Tree Stats</div>
                Visible Nodes: ${state.visibleNodes} / ${state.totalNodes}<br>
                Depth Filter: ${state.depthFilter}<br>
                Auto Rotation: <span class="${state.autoRotate ? 'highlight' : ''}">${state.autoRotate ? 'ON' : 'OFF'}</span><br>
                Tree State: ${state.treeState}<br>
                Color Mode: ${state.colorMode}
            `;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (state.autoRotate) {
                treeGroup.rotation.y += 0.3 * delta;
                state.rotationAngle = treeGroup.rotation.y;
            }

            if (robotMesh) {
                robotMesh.rotation.y += 0.5 * delta;
                state.robotRotation = robotMesh.rotation.y;
            }

            if (isAnimating) {
                animProgress += delta; // 1 second duration
                if (animProgress >= 1) {
                    animProgress = 1;
                    isAnimating = false;
                    state.treeState = targetTreeState;
                }

                const t = targetTreeState === 'expanded' ? animProgress : 1 - animProgress;
                // easeInOutCubic
                const easeT = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

                Object.values(nodes).forEach(node => {
                    const targetY = node.depth * 3;
                    node.mesh.position.y = targetY * easeT;
                });
                updateAllCylinders();
            }

            controls.update();

            // Update State Object
            state.cameraY = Math.round(camera.position.y * 10) / 10;
            Object.values(nodes).forEach(node => {
                state.nodePositions[node.id] = {
                    x: Math.round(node.mesh.position.x * 100) / 100,
                    y: Math.round(node.mesh.position.y * 100) / 100,
                    z: Math.round(node.mesh.position.z * 100) / 100
                };
            });

            updateStatsPanel();
            renderer.render(scene, camera);
        }

        updateStatsPanel();
        animate();
    </script>
</body>
</html>
