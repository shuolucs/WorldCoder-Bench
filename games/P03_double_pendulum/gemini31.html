<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Double Pendulum Chaotic Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(20, 20, 20, 0.85);
            padding: 15px;
            border: 1px solid #444;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        .hud-item { margin: 5px 0; }
        .hud-value { font-weight: bold; color: #00ffcc; }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            padding: 15px 25px;
            border: 1px solid #444;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        button:hover { background: #555; }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] { cursor: pointer; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-item">θ1 (rad): <span id="theta1" class="hud-value">0.000</span></div>
        <div class="hud-item">θ2 (rad): <span id="theta2" class="hud-value">0.000</span></div>
        <div class="hud-item">ω1 (rad/s): <span id="omega1" class="hud-value">0.000</span></div>
        <div class="hud-item">ω2 (rad/s): <span id="omega2" class="hud-value">0.000</span></div>
        <div class="hud-item">Energy (J): <span id="energy" class="hud-value">0.000</span></div>
        <div class="hud-item">Time (s): <span id="simTime" class="hud-value">0.000</span></div>
    </div>

    <div id="controls">
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
        <button id="perturbBtn">Perturb (+0.001 rad)</button>
        <div class="slider-container">
            <label for="speedSlider">Speed:</label>
            <input type="range" id="speedSlider" min="0.1" max="5.0" step="0.1" value="1.0">
            <span id="speedValue">1.0x</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Physics Parameters ---
        const L1 = 2.0;
        const L2 = 1.5;
        const m1 = 1.0;
        const m2 = 1.0;
        const g = 9.81;
        const dt = 0.005;

        // --- State Variables ---
        const initialTh1 = 2 * Math.PI / 3;
        const initialTh2 = Math.PI / 2;
        let th1 = initialTh1;
        let th2 = initialTh2;
        let om1 = 0;
        let om2 = 0;
        let simTime = 0;
        let isPaused = false;
        let speedMultiplier = 1.0;

        // --- DOM Elements ---
        const elTheta1 = document.getElementById('theta1');
        const elTheta2 = document.getElementById('theta2');
        const elOmega1 = document.getElementById('omega1');
        const elOmega2 = document.getElementById('omega2');
        const elEnergy = document.getElementById('energy');
        const elSimTime = document.getElementById('simTime');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const perturbBtn = document.getElementById('perturbBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(4, 2, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(4, 2, 0);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- 3D Objects (Left Side) ---
        const pivotPos = new THREE.Vector3(0, 5, 0);
        
        const pivotGeo = new THREE.SphereGeometry(0.1, 16, 16);
        const pivotMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const pivotMesh = new THREE.Mesh(pivotGeo, pivotMat);
        pivotMesh.position.copy(pivotPos);
        scene.add(pivotMesh);

        const rod1Geo = new THREE.CylinderGeometry(0.05, 0.05, L1, 16);
        rod1Geo.translate(0, -L1 / 2, 0);
        const rod1Mat = new THREE.MeshStandardMaterial({ color: 0xffff00 });
        const rod1Mesh = new THREE.Mesh(rod1Geo, rod1Mat);
        rod1Mesh.position.copy(pivotPos);
        scene.add(rod1Mesh);

        const mass1Geo = new THREE.SphereGeometry(0.2, 32, 32);
        const mass1Mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const mass1Mesh = new THREE.Mesh(mass1Geo, mass1Mat);
        scene.add(mass1Mesh);

        const rod2Geo = new THREE.CylinderGeometry(0.05, 0.05, L2, 16);
        rod2Geo.translate(0, -L2 / 2, 0);
        const rod2Mat = new THREE.MeshStandardMaterial({ color: 0x00ffff });
        const rod2Mesh = new THREE.Mesh(rod2Geo, rod2Mat);
        scene.add(rod2Mesh);

        const mass2Geo = new THREE.SphereGeometry(0.2, 32, 32);
        const mass2Mat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const mass2Mesh = new THREE.Mesh(mass2Geo, mass2Mat);
        scene.add(mass2Mesh);

        // --- Trajectory Line ---
        const maxTrail = 2000;
        const trailPositions = new Float32Array(maxTrail * 3);
        const trailColors = new Float32Array(maxTrail * 3);
        
        for (let i = 0; i < maxTrail; i++) {
            const t = 1.0 - (i / maxTrail);
            trailColors[i * 3] = 0;
            trailColors[i * 3 + 1] = t;
            trailColors[i * 3 + 2] = t;
        }

        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
        const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.8 });
        const trailLine = new THREE.Line(trailGeo, trailMat);
        scene.add(trailLine);

        // --- Phase Space (Right Side) ---
        const phaseGroup = new THREE.Group();
        phaseGroup.position.set(8, 2, 0);
        scene.add(phaseGroup);

        // Canvas Texture for Phase Space Background
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 512;
        const ctx = canvas.getContext('2d');
        
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, 512, 512);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 256); ctx.lineTo(512, 256); // X axis
        ctx.moveTo(256, 0); ctx.lineTo(256, 512); // Y axis
        ctx.stroke();
        
        ctx.fillStyle = '#fff';
        ctx.font = '20px Courier New';
        ctx.fillText('θ2', 480, 245);
        ctx.fillText('ω2', 265, 25);
        ctx.fillText('-π', 10, 245);
        ctx.fillText('π', 480, 280);
        ctx.fillText('10', 265, 20);
        ctx.fillText('-10', 265, 500);

        const phaseTex = new THREE.CanvasTexture(canvas);
        const phasePlaneGeo = new THREE.PlaneGeometry(10, 10);
        const phasePlaneMat = new THREE.MeshBasicMaterial({ map: phaseTex, side: THREE.DoubleSide });
        const phasePlane = new THREE.Mesh(phasePlaneGeo, phasePlaneMat);
        phaseGroup.add(phasePlane);

        // Phase Space Points
        const maxPhase = 5000;
        const phasePositions = new Float32Array(maxPhase * 3);
        const phaseGeo = new THREE.BufferGeometry();
        phaseGeo.setAttribute('position', new THREE.BufferAttribute(phasePositions, 3));
        const phaseMat = new THREE.PointsMaterial({ color: 0xff00ff, size: 0.06, sizeAttenuation: true });
        const phasePoints = new THREE.Points(phaseGeo, phaseMat);
        phaseGroup.add(phasePoints);

        // --- Physics Engine (RK4) ---
        function getDerivatives(t1, t2, w1, w2) {
            const delta = t1 - t2;
            const den1 = 2 * m1 + m2 - m2 * Math.cos(2 * delta);
            const den2 = den1;

            const num1 = -g * (2 * m1 + m2) * Math.sin(t1) 
                         - m2 * g * Math.sin(t1 - 2 * t2) 
                         - 2 * Math.sin(delta) * m2 * (w2 * w2 * L2 + w1 * w1 * L1 * Math.cos(delta));
            const a1 = num1 / (L1 * den1);

            const num2 = 2 * Math.sin(delta) * (w1 * w1 * L1 * (m1 + m2) 
                         + g * (m1 + m2) * Math.cos(t1) 
                         + w2 * w2 * L2 * m2 * Math.cos(delta));
            const a2 = num2 / (L2 * den2);

            return [w1, w2, a1, a2];
        }

        function stepPhysics() {
            const k1 = getDerivatives(th1, th2, om1, om2);
            const k2 = getDerivatives(th1 + k1[0]*dt/2, th2 + k1[1]*dt/2, om1 + k1[2]*dt/2, om2 + k1[3]*dt/2);
            const k3 = getDerivatives(th1 + k2[0]*dt/2, th2 + k2[1]*dt/2, om1 + k2[2]*dt/2, om2 + k2[3]*dt/2);
            const k4 = getDerivatives(th1 + k3[0]*dt, th2 + k3[1]*dt, om1 + k3[2]*dt, om2 + k3[3]*dt);

            th1 += (k1[0] + 2*k2[0] + 2*k3[0] + k4[0]) * dt / 6;
            th2 += (k1[1] + 2*k2[1] + 2*k3[1] + k4[1]) * dt / 6;
            om1 += (k1[2] + 2*k2[2] + 2*k3[2] + k4[2]) * dt / 6;
            om2 += (k1[3] + 2*k2[3] + 2*k3[3] + k4[3]) * dt / 6;

            simTime += dt;
        }

        function calculateEnergy() {
            const T = 0.5 * m1 * Math.pow(L1 * om1, 2) + 
                      0.5 * m2 * (Math.pow(L1 * om1, 2) + Math.pow(L2 * om2, 2) + 2 * L1 * L2 * om1 * om2 * Math.cos(th1 - th2));
            const V = -(m1 + m2) * g * L1 * Math.cos(th1) - m2 * g * L2 * Math.cos(th2);
            return T + V;
        }

        function wrapAngle(angle) {
            let a = angle % (2 * Math.PI);
            if (a > Math.PI) a -= 2 * Math.PI;
            if (a < -Math.PI) a += 2 * Math.PI;
            return a;
        }

        // --- Update Functions ---
        function updateVisuals() {
            rod1Mesh.rotation.z = th1;
            
            mass1Mesh.position.set(
                pivotPos.x + L1 * Math.sin(th1),
                pivotPos.y - L1 * Math.cos(th1),
                0
            );

            rod2Mesh.position.copy(mass1Mesh.position);
            rod2Mesh.rotation.z = th2;

            mass2Mesh.position.set(
                mass1Mesh.position.x + L2 * Math.sin(th2),
                mass1Mesh.position.y - L2 * Math.cos(th2),
                0
            );
        }

        function updateBuffers() {
            // Update Trail
            trailPositions.copyWithin(3, 0, (maxTrail - 1) * 3);
            trailPositions[0] = mass2Mesh.position.x;
            trailPositions[1] = mass2Mesh.position.y;
            trailPositions[2] = mass2Mesh.position.z;
            trailGeo.attributes.position.needsUpdate = true;

            // Update Phase Space
            phasePositions.copyWithin(3, 0, (maxPhase - 1) * 3);
            const wTh2 = wrapAngle(th2);
            phasePositions[0] = (wTh2 / Math.PI) * 5; // Map [-PI, PI] to [-5, 5]
            phasePositions[1] = (om2 / 10) * 5;       // Map [-10, 10] to [-5, 5]
            phasePositions[2] = 0.01;                 // Slightly in front of plane
            phaseGeo.attributes.position.needsUpdate = true;
        }

        function clearBuffers() {
            updateVisuals();
            for (let i = 0; i < maxTrail; i++) {
                trailPositions[i*3] = mass2Mesh.position.x;
                trailPositions[i*3+1] = mass2Mesh.position.y;
                trailPositions[i*3+2] = mass2Mesh.position.z;
            }
            trailGeo.attributes.position.needsUpdate = true;

            const wTh2 = wrapAngle(th2);
            const px = (wTh2 / Math.PI) * 5;
            const py = (om2 / 10) * 5;
            for (let i = 0; i < maxPhase; i++) {
                phasePositions[i*3] = px;
                phasePositions[i*3+1] = py;
                phasePositions[i*3+2] = 0.01;
            }
            phaseGeo.attributes.position.needsUpdate = true;
        }

        function updateHUD() {
            elTheta1.innerText = th1.toFixed(3);
            elTheta2.innerText = th2.toFixed(3);
            elOmega1.innerText = om1.toFixed(3);
            elOmega2.innerText = om2.toFixed(3);
            elEnergy.innerText = calculateEnergy().toFixed(4);
            elSimTime.innerText = simTime.toFixed(2);
        }

        function updateGlobalState() {
            window.__3D_STATE__ = {
                theta1: th1,
                theta2: th2,
                omega1: om1,
                omega2: om2,
                mass1Pos: { x: mass1Mesh.position.x, y: mass1Mesh.position.y, z: mass1Mesh.position.z },
                mass2Pos: { x: mass2Mesh.position.x, y: mass2Mesh.position.y, z: mass2Mesh.position.z },
                totalEnergy: calculateEnergy(),
                simTime: simTime,
                isPaused: isPaused,
                speedMultiplier: speedMultiplier,
                trailLength: maxTrail
            };
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let draggedMass = null;
        let wasPausedBeforeDrag = false;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects([mass1Mesh, mass2Mesh]);
            if (intersects.length > 0) {
                draggedMass = intersects[0].object;
                controls.enabled = false;
                wasPausedBeforeDrag = isPaused;
                isPaused = true;
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!draggedMass) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);

            if (draggedMass === mass1Mesh) {
                th1 = Math.atan2(target.x - pivotPos.x, -(target.y - pivotPos.y));
                om1 = 0; om2 = 0;
            } else if (draggedMass === mass2Mesh) {
                th2 = Math.atan2(target.x - mass1Mesh.position.x, -(target.y - mass1Mesh.position.y));
                om1 = 0; om2 = 0;
            }
            
            updateVisuals();
            clearBuffers();
            updateHUD();
        });

        window.addEventListener('pointerup', () => {
            if (draggedMass) {
                draggedMass = null;
                controls.enabled = true;
                isPaused = wasPausedBeforeDrag;
            }
        });

        // --- UI Controls ---
        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? 'Play' : 'Pause';
        });

        resetBtn.addEventListener('click', () => {
            th1 = initialTh1;
            th2 = initialTh2;
            om1 = 0;
            om2 = 0;
            simTime = 0;
            clearBuffers();
        });

        perturbBtn.addEventListener('click', () => {
            th1 += 0.001;
            om1 = 0;
            om2 = 0;
            simTime = 0;
            clearBuffers();
        });

        speedSlider.addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            speedValue.innerText = speedMultiplier.toFixed(1) + 'x';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        let lastTime = performance.now();
        let accumulator = 0;

        clearBuffers(); // Init buffers

        function animate() {
            requestAnimationFrame(animate);
            
            const now = performance.now();
            let frameTime = (now - lastTime) / 1000;
            lastTime = now;

            if (frameTime > 0.1) frameTime = 0.1; // Prevent spiral of death

            if (!isPaused && !draggedMass) {
                accumulator += frameTime * speedMultiplier;
                
                while (accumulator >= dt) {
                    stepPhysics();
                    accumulator -= dt;
                    updateBuffers();
                }
            }

            updateVisuals();
            updateHUD();
            updateGlobalState();

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
