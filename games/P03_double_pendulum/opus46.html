<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Double Pendulum - Chaos Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: absolute; top: 15px; left: 15px;
  background: rgba(0,0,0,0.8); color: #0f0; padding: 15px 20px;
  border-radius: 8px; font-size: 14px; line-height: 1.8;
  border: 1px solid rgba(0,255,0,0.3);
  pointer-events: none;
  min-width: 260px;
}
#hud .title { color: #0ff; font-size: 16px; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 5px; }
#hud .label { color: #888; }
#hud .value { color: #0f0; font-weight: bold; }
#hud .energy-label { color: #ff0; }

#controls {
  position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); padding: 15px 25px;
  border-radius: 10px; display: flex; align-items: center; gap: 15px;
  border: 1px solid rgba(255,255,255,0.2);
}
#controls button {
  background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3);
  padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 13px;
  font-family: 'Courier New', monospace; transition: all 0.2s;
}
#controls button:hover { background: rgba(255,255,255,0.25); border-color: #0ff; color: #0ff; }
#controls label { color: #aaa; font-size: 13px; }
#controls input[type="range"] {
  width: 120px; accent-color: #0ff;
}
#controls .speed-val { color: #0ff; font-size: 13px; min-width: 35px; }

#instructions {
  position: absolute; top: 15px; right: 15px;
  background: rgba(0,0,0,0.8); color: #aaa; padding: 12px 16px;
  border-radius: 8px; font-size: 12px; line-height: 1.7;
  border: 1px solid rgba(255,255,255,0.15);
  max-width: 220px;
}
#instructions .key { color: #0ff; }
</style>
</head>
<body>

<div id="hud">
  <div class="title">⚡ Double Pendulum</div>
  <span class="label">θ₁ = </span><span class="value" id="theta1">0.000</span> rad<br>
  <span class="label">θ₂ = </span><span class="value" id="theta2">0.000</span> rad<br>
  <span class="label">ω₁ = </span><span class="value" id="omega1">0.000</span> rad/s<br>
  <span class="label">ω₂ = </span><span class="value" id="omega2">0.000</span> rad/s<br>
  <span class="energy-label">E  = </span><span class="value" id="energy">0.000</span> J<br>
  <span class="label">Time = </span><span class="value" id="simTime">0.000</span> s
</div>

<div id="instructions">
  <span class="key">Drag</span> masses to set angles<br>
  <span class="key">Scroll</span> to zoom<br>
  <span class="key">Right-drag</span> to pan<br>
  <span class="key">Perturb</span> for chaos demo
</div>

<div id="controls">
  <button id="pauseBtn">⏸ Pause</button>
  <button id="resetBtn">↺ Reset</button>
  <button id="perturbBtn">🔀 Perturb +0.001</button>
  <label>Speed:</label>
  <input type="range" id="speedSlider" min="0.1" max="5.0" step="0.1" value="1.0">
  <span class="speed-val" id="speedVal">1.0x</span>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== Physics Constants =====
const L1 = 2.0, L2 = 1.5, m1 = 1.0, m2 = 1.0, g = 9.81;
const RK4_DT = 0.005;
const PIVOT = new THREE.Vector3(-4, 5, 0);

// ===== State =====
let theta1 = 2 * Math.PI / 3;
let theta2 = Math.PI / 2;
let omega1 = 0, omega2 = 0;
let simTime = 0;
let isPaused = false;
let speedMultiplier = 1.0;
let isDragging = false;
let dragTarget = null;

const INITIAL_THETA1 = 2 * Math.PI / 3;
const INITIAL_THETA2 = Math.PI / 2;

// ===== Three.js Setup =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(2, 5, 15);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(2, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ===== Lighting =====
scene.add(new THREE.AmbientLight(0x404060, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
scene.add(dirLight);
const pointLight = new THREE.PointLight(0x4488ff, 0.8, 30);
pointLight.position.set(-4, 8, 3);
scene.add(pointLight);

// ===== Grid & Reference =====
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.position.y = -2;
scene.add(gridHelper);

// ===== Pendulum Objects =====
// Pivot
const pivotGeo = new THREE.SphereGeometry(0.15, 16, 16);
const pivotMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.5 });
const pivotMesh = new THREE.Mesh(pivotGeo, pivotMat);
pivotMesh.position.copy(PIVOT);
scene.add(pivotMesh);

// Pivot mount
const mountGeo = new THREE.BoxGeometry(1.0, 0.15, 0.5);
const mountMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7 });
const mountMesh = new THREE.Mesh(mountGeo, mountMat);
mountMesh.position.set(PIVOT.x, PIVOT.y + 0.1, PIVOT.z);
scene.add(mountMesh);

// Rod 1
const rod1Geo = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
const rod1Mat = new THREE.MeshStandardMaterial({ color: 0xffdd00, metalness: 0.3, roughness: 0.6 });
const rod1Mesh = new THREE.Mesh(rod1Geo, rod1Mat);
scene.add(rod1Mesh);

// Rod 2
const rod2Geo = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
const rod2Mat = new THREE.MeshStandardMaterial({ color: 0x00dddd, metalness: 0.3, roughness: 0.6 });
const rod2Mesh = new THREE.Mesh(rod2Geo, rod2Mat);
scene.add(rod2Mesh);

// Mass 1
const mass1Geo = new THREE.SphereGeometry(0.2, 24, 24);
const mass1Mat = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.4, roughness: 0.3, emissive: 0x330000 });
const mass1Mesh = new THREE.Mesh(mass1Geo, mass1Mat);
scene.add(mass1Mesh);

// Mass 2
const mass2Geo = new THREE.SphereGeometry(0.2, 24, 24);
const mass2Mat = new THREE.MeshStandardMaterial({ color: 0x3366ff, metalness: 0.4, roughness: 0.3, emissive: 0x000033 });
const mass2Mesh = new THREE.Mesh(mass2Geo, mass2Mat);
scene.add(mass2Mesh);

// ===== Trail for mass2 =====
const MAX_TRAIL = 2000;
const trailPositions = new Float32Array(MAX_TRAIL * 3);
const trailColors = new Float32Array(MAX_TRAIL * 3);
const trailGeometry = new THREE.BufferGeometry();
trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeometry.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
const trailMaterial = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.9 });
const trailLine = new THREE.Line(trailGeometry, trailMaterial);
scene.add(trailLine);
let trailCount = 0;
let trailIndex = 0;

function addTrailPoint(pos) {
  const idx = trailIndex % MAX_TRAIL;
  trailPositions[idx * 3] = pos.x;
  trailPositions[idx * 3 + 1] = pos.y;
  trailPositions[idx * 3 + 2] = pos.z;
  trailIndex++;
  trailCount = Math.min(trailCount + 1, MAX_TRAIL);
  updateTrailColors();
}

function updateTrailColors() {
  const total = trailCount;
  for (let i = 0; i < total; i++) {
    const age = i / total;
    const realIdx = (trailIndex - total + i + MAX_TRAIL * 10) % MAX_TRAIL;
    // Gradient from dark purple to bright cyan
    trailColors[realIdx * 3] = age * 0.2;
    trailColors[realIdx * 3 + 1] = age * 0.8 + 0.2 * (1 - age);
    trailColors[realIdx * 3 + 2] = age * 1.0;
  }
  trailGeometry.attributes.color.needsUpdate = true;
  trailGeometry.attributes.position.needsUpdate = true;
  // Reorder for drawing
  rebuildTrailDrawOrder();
}

function rebuildTrailDrawOrder() {
  if (trailCount === 0) {
    trailGeometry.setDrawRange(0, 0);
    return;
  }
  // We need to draw in order. Use setIndex or just reorder positions.
  // For simplicity, let's use a separate ordered array approach
  const total = trailCount;
  const orderedPos = new Float32Array(total * 3);
  const orderedCol = new Float32Array(total * 3);
  for (let i = 0; i < total; i++) {
    const realIdx = (trailIndex - total + i + MAX_TRAIL * 10) % MAX_TRAIL;
    orderedPos[i * 3] = trailPositions[realIdx * 3];
    orderedPos[i * 3 + 1] = trailPositions[realIdx * 3 + 1];
    orderedPos[i * 3 + 2] = trailPositions[realIdx * 3 + 2];
    const age = i / total;
    orderedCol[i * 3] = age * 0.3;
    orderedCol[i * 3 + 1] = age * 0.8 + 0.2 * (1 - age);
    orderedCol[i * 3 + 2] = age * 1.0;
  }
  trailGeometry.setAttribute('position', new THREE.BufferAttribute(orderedPos, 3));
  trailGeometry.setAttribute('color', new THREE.BufferAttribute(orderedCol, 3));
  trailGeometry.setDrawRange(0, total);
}

function clearTrail() {
  trailCount = 0;
  trailIndex = 0;
  trailGeometry.setDrawRange(0, 0);
}

// ===== Phase Space =====
const PHASE_CENTER = new THREE.Vector3(8, 3, 0);
const PHASE_WIDTH = 6;
const PHASE_HEIGHT = 6;
const PHASE_THETA_RANGE = Math.PI; // -π to π
const PHASE_OMEGA_RANGE = 10; // -10 to 10

// Background plane
const planeBg = new THREE.PlaneGeometry(PHASE_WIDTH + 0.5, PHASE_HEIGHT + 0.5);
const planeBgMat = new THREE.MeshBasicMaterial({ color: 0x0a0a2a, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
const planeBgMesh = new THREE.Mesh(planeBg, planeBgMat);
planeBgMesh.position.copy(PHASE_CENTER);
scene.add(planeBgMesh);

// Border
const borderGeo = new THREE.EdgesGeometry(new THREE.PlaneGeometry(PHASE_WIDTH + 0.5, PHASE_HEIGHT + 0.5));
const borderMat = new THREE.LineBasicMaterial({ color: 0x444488 });
const borderLine = new THREE.LineSegments(borderGeo, borderMat);
borderLine.position.copy(PHASE_CENTER);
scene.add(borderLine);

// Axes on phase plane
function createPhaseAxes() {
  const axesMat = new THREE.LineBasicMaterial({ color: 0x666699 });
  
  // Horizontal axis (θ2)
  const hPts = [
    new THREE.Vector3(PHASE_CENTER.x - PHASE_WIDTH / 2, PHASE_CENTER.y, PHASE_CENTER.z + 0.01),
    new THREE.Vector3(PHASE_CENTER.x + PHASE_WIDTH / 2, PHASE_CENTER.y, PHASE_CENTER.z + 0.01)
  ];
  const hGeo = new THREE.BufferGeometry().setFromPoints(hPts);
  scene.add(new THREE.Line(hGeo, axesMat));

  // Vertical axis (ω2)
  const vPts = [
    new THREE.Vector3(PHASE_CENTER.x, PHASE_CENTER.y - PHASE_HEIGHT / 2, PHASE_CENTER.z + 0.01),
    new THREE.Vector3(PHASE_CENTER.x, PHASE_CENTER.y + PHASE_HEIGHT / 2, PHASE_CENTER.z + 0.01)
  ];
  const vGeo = new THREE.BufferGeometry().setFromPoints(vPts);
  scene.add(new THREE.Line(vGeo, axesMat));

  // Tick marks and labels
  const tickMat = new THREE.LineBasicMaterial({ color: 0x555577 });
  
  // θ2 ticks: -π, -π/2, 0, π/2, π
  const thetaTicks = [
    { val: -Math.PI, label: '-π' },
    { val: -Math.PI / 2, label: '-π/2' },
    { val: 0, label: '0' },
    { val: Math.PI / 2, label: 'π/2' },
    { val: Math.PI, label: 'π' }
  ];
  
  thetaTicks.forEach(t => {
    const x = PHASE_CENTER.x + (t.val / PHASE_THETA_RANGE) * (PHASE_WIDTH / 2);
    const pts = [
      new THREE.Vector3(x, PHASE_CENTER.y - 0.1, PHASE_CENTER.z + 0.01),
      new THREE.Vector3(x, PHASE_CENTER.y + 0.1, PHASE_CENTER.z + 0.01)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.Line(geo, tickMat));
    
    // Label using sprite
    const sprite = makeTextSprite(t.label, { fontSize: 28, color: '#8888bb' });
    sprite.position.set(x, PHASE_CENTER.y - 0.35, PHASE_CENTER.z + 0.02);
    sprite.scale.set(0.5, 0.25, 1);
    scene.add(sprite);
  });

  // ω2 ticks
  const omegaTicks = [-10, -5, 0, 5, 10];
  omegaTicks.forEach(val => {
    const y = PHASE_CENTER.y + (val / PHASE_OMEGA_RANGE) * (PHASE_HEIGHT / 2);
    const pts = [
      new THREE.Vector3(PHASE_CENTER.x - 0.1, y, PHASE_CENTER.z + 0.01),
      new THREE.Vector3(PHASE_CENTER.x + 0.1, y, PHASE_CENTER.z + 0.01)
    ];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    scene.add(new THREE.Line(geo, tickMat));
    
    if (val !== 0) {
      const sprite = makeTextSprite(val.toString(), { fontSize: 28, color: '#8888bb' });
      sprite.position.set(PHASE_CENTER.x - 0.4, y, PHASE_CENTER.z + 0.02);
      sprite.scale.set(0.45, 0.22, 1);
      scene.add(sprite);
    }
  });

  // Axis labels
  const labelTheta = makeTextSprite('θ₂', { fontSize: 36, color: '#aaaaff' });
  labelTheta.position.set(PHASE_CENTER.x + PHASE_WIDTH / 2 + 0.4, PHASE_CENTER.y - 0.35, PHASE_CENTER.z + 0.02);
  labelTheta.scale.set(0.5, 0.25, 1);
  scene.add(labelTheta);

  const labelOmega = makeTextSprite('ω₂', { fontSize: 36, color: '#aaaaff' });
  labelOmega.position.set(PHASE_CENTER.x - 0.45, PHASE_CENTER.y + PHASE_HEIGHT / 2 + 0.3, PHASE_CENTER.z + 0.02);
  labelOmega.scale.set(0.5, 0.25, 1);
  scene.add(labelOmega);

  // Title
  const titleSprite = makeTextSprite('Phase Space (θ₂, ω₂)', { fontSize: 32, color: '#00ccff' });
  titleSprite.position.set(PHASE_CENTER.x, PHASE_CENTER.y + PHASE_HEIGHT / 2 + 0.6, PHASE_CENTER.z + 0.02);
  titleSprite.scale.set(1.4, 0.35, 1);
  scene.add(titleSprite);

  // Grid lines
  const gridMat = new THREE.LineBasicMaterial({ color: 0x222244, transparent: true, opacity: 0.5 });
  for (let i = -2; i <= 2; i++) {
    if (i === 0) continue;
    const x = PHASE_CENTER.x + (i * Math.PI / 2 / PHASE_THETA_RANGE) * (PHASE_WIDTH / 2);
    const pts = [
      new THREE.Vector3(x, PHASE_CENTER.y - PHASE_HEIGHT / 2, PHASE_CENTER.z + 0.005),
      new THREE.Vector3(x, PHASE_CENTER.y + PHASE_HEIGHT / 2, PHASE_CENTER.z + 0.005)
    ];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }
  for (let val = -5; val <= 5; val += 5) {
    if (val === 0) continue;
    const y = PHASE_CENTER.y + (val / PHASE_OMEGA_RANGE) * (PHASE_HEIGHT / 2);
    const pts = [
      new THREE.Vector3(PHASE_CENTER.x - PHASE_WIDTH / 2, y, PHASE_CENTER.z + 0.005),
      new THREE.Vector3(PHASE_CENTER.x + PHASE_WIDTH / 2, y, PHASE_CENTER.z + 0.005)
    ];
    scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), gridMat));
  }
}

function makeTextSprite(text, opts = {}) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 128;
  ctx.fillStyle = opts.color || '#ffffff';
  ctx.font = `${opts.fontSize || 32}px Courier New`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 64);
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  return new THREE.Sprite(mat);
}

createPhaseAxes();

// Phase space points
const MAX_PHASE = 5000;
const phasePositions = new Float32Array(MAX_PHASE * 3);
const phaseColors = new Float32Array(MAX_PHASE * 3);
const phaseGeo = new THREE.BufferGeometry();
phaseGeo.setAttribute('position', new THREE.BufferAttribute(phasePositions, 3));
phaseGeo.setAttribute('color', new THREE.BufferAttribute(phaseColors, 3));
const phaseMat = new THREE.PointsMaterial({ size: 2, sizeAttenuation: false, vertexColors: true, transparent: true, opacity: 0.9, depthTest: false });
const phasePoints = new THREE.Points(phaseGeo, phaseMat);
scene.add(phasePoints);
let phaseCount = 0;
let phaseIndex = 0;

function addPhasePoint(t2, w2) {
  // Wrap theta2 to [-π, π]
  let t2w = ((t2 + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI;
  const x = PHASE_CENTER.x + (t2w / PHASE_THETA_RANGE) * (PHASE_WIDTH / 2);
  const y = PHASE_CENTER.y + (Math.max(-PHASE_OMEGA_RANGE, Math.min(PHASE_OMEGA_RANGE, w2)) / PHASE_OMEGA_RANGE) * (PHASE_HEIGHT / 2);
  const z = PHASE_CENTER.z + 0.03;
  
  const idx = phaseIndex % MAX_PHASE;
  phasePositions[idx * 3] = x;
  phasePositions[idx * 3 + 1] = y;
  phasePositions[idx * 3 + 2] = z;
  
  phaseIndex++;
  phaseCount = Math.min(phaseCount + 1, MAX_PHASE);
  rebuildPhaseDrawOrder();
}

function rebuildPhaseDrawOrder() {
  const total = phaseCount;
  const orderedPos = new Float32Array(total * 3);
  const orderedCol = new Float32Array(total * 3);
  for (let i = 0; i < total; i++) {
    const realIdx = (phaseIndex - total + i + MAX_PHASE * 10) % MAX_PHASE;
    orderedPos[i * 3] = phasePositions[realIdx * 3];
    orderedPos[i * 3 + 1] = phasePositions[realIdx * 3 + 1];
    orderedPos[i * 3 + 2] = phasePositions[realIdx * 3 + 2];
    const age = i / total;
    // HSL-like gradient: old=dark magenta, new=bright yellow-green
    orderedCol[i * 3] = 0.5 * (1 - age) + age * 0.2;
    orderedCol[i * 3 + 1] = age * 1.0;
    orderedCol[i * 3 + 2] = 0.8 * (1 - age) + age * 0.3;
  }
  phaseGeo.setAttribute('position', new THREE.BufferAttribute(orderedPos, 3));
  phaseGeo.setAttribute('color', new THREE.BufferAttribute(orderedCol, 3));
  phaseGeo.setDrawRange(0, total);
}

function clearPhase() {
  phaseCount = 0;
  phaseIndex = 0;
  phaseGeo.setDrawRange(0, 0);
}

// ===== Physics: RK4 =====
function derivatives(state) {
  const [t1, w1, t2, w2] = state;
  const dt12 = t1 - t2;
  const sinDt = Math.sin(dt12);
  const cosDt = Math.cos(dt12);
  const den = 2 * m1 + m2 - m2 * Math.cos(2 * t1 - 2 * t2);

  const alpha1 = (
    -g * (2 * m1 + m2) * Math.sin(t1)
    - m2 * g * Math.sin(t1 - 2 * t2)
    - 2 * sinDt * m2 * (w2 * w2 * L2 + w1 * w1 * L1 * cosDt)
  ) / (L1 * den);

  const alpha2 = (
    2 * sinDt * (
      w1 * w1 * L1 * (m1 + m2)
      + g * (m1 + m2) * Math.cos(t1)
      + w2 * w2 * L2 * m2 * cosDt
    )
  ) / (L2 * den);

  return [w1, alpha1, w2, alpha2];
}

function rk4Step(state, dt) {
  const k1 = derivatives(state);
  const s2 = state.map((v, i) => v + 0.5 * dt * k1[i]);
  const k2 = derivatives(s2);
  const s3 = state.map((v, i) => v + 0.5 * dt * k2[i]);
  const k3 = derivatives(s3);
  const s4 = state.map((v, i) => v + dt * k3[i]);
  const k4 = derivatives(s4);
  return state.map((v, i) => v + (dt / 6) * (k1[i] + 2 * k2[i] + 2 * k3[i] + k4[i]));
}

function computeEnergy(t1, w1, t2, w2) {
  const T = 0.5 * m1 * (L1 * w1) ** 2
    + 0.5 * m2 * ((L1 * w1) ** 2 + (L2 * w2) ** 2 + 2 * L1 * L2 * w1 * w2 * Math.cos(t1 - t2));
  const V = -(m1 + m2) * g * L1 * Math.cos(t1) - m2 * g * L2 * Math.cos(t2);
  return T + V;
}

// ===== Position Calculations =====
function getMass1Pos() {
  return new THREE.Vector3(
    PIVOT.x + L1 * Math.sin(theta1),
    PIVOT.y - L1 * Math.cos(theta1),
    PIVOT.z
  );
}

function getMass2Pos() {
  const m1p = getMass1Pos();
  return new THREE.Vector3(
    m1p.x + L2 * Math.sin(theta2),
    m1p.y - L2 * Math.cos(theta2),
    m1p.z
  );
}

function updateRod(mesh, from, to, length) {
  const mid = new THREE.Vector3().addVectors(from, to).multiplyScalar(0.5);
  mesh.position.copy(mid);
  const dir = new THREE.Vector3().subVectors(to, from).normalize();
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, dir);
  mesh.quaternion.copy(quat);
  mesh.scale.set(1, from.distanceTo(to), 1);
}

function updatePendulumVisuals() {
  const m1Pos = getMass1Pos();
  const m2Pos = getMass2Pos();
  
  mass1Mesh.position.copy(m1Pos);
  mass2Mesh.position.copy(m2Pos);
  
  updateRod(rod1Mesh, PIVOT, m1Pos, L1);
  updateRod(rod2Mesh, m1Pos, m2Pos, L2);
}

// ===== Dragging =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);

function onPointerDown(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  
  const intersects = raycaster.intersectObjects([mass1Mesh, mass2Mesh]);
  if (intersects.length > 0) {
    isDragging = true;
    dragTarget = intersects[0].object === mass1Mesh ? 'mass1' : 'mass2';
    controls.enabled = false;
    e.preventDefault();
  }
}

function onPointerMove(e) {
  if (!isDragging) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  
  const intersection = new THREE.Vector3();
  raycaster.ray.intersectPlane(dragPlane, intersection);
  
  if (intersection) {
    if (dragTarget === 'mass1') {
      const dx = intersection.x - PIVOT.x;
      const dy = intersection.y - PIVOT.y;
      theta1 = Math.atan2(dx, -dy);
      omega1 = 0;
      omega2 = 0;
    } else {
      const m1Pos = getMass1Pos();
      const dx = intersection.x - m1Pos.x;
      const dy = intersection.y - m1Pos.y;
      theta2 = Math.atan2(dx, -dy);
      omega1 = 0;
      omega2 = 0;
    }
    updatePendulumVisuals();
  }
}

function onPointerUp() {
  if (isDragging) {
    isDragging = false;
    controls.enabled = true;
    clearTrail();
    clearPhase();
    simTime = 0;
  }
}

// ===== UI Controls =====
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const perturbBtn = document.getElementById('perturbBtn');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');

pauseBtn.addEventListener('click', () => {
  isPaused = !isPaused;
  pauseBtn.textContent = isPaused ? '▶ Play' : '⏸ Pause';
});

resetBtn.addEventListener('click', () => {
  theta1 = INITIAL_THETA1;
  theta2 = INITIAL_THETA2;
  omega1 = 0;
  omega2 = 0;
  simTime = 0;
  clearTrail();
  clearPhase();
  updatePendulumVisuals();
});

perturbBtn.addEventListener('click', () => {
  theta1 = INITIAL_THETA1 + 0.001;
  theta2 = INITIAL_THETA2;
  omega1 = 0;
  omega2 = 0;
  simTime = 0;
  clearTrail();
  clearPhase();
  updatePendulumVisuals();
});

speedSlider.addEventListener('input', () => {
  speedMultiplier = parseFloat(speedSlider.value);
  speedVal.textContent = speedMultiplier.toFixed(1) + 'x';
});

// ===== HUD Update =====
function updateHUD() {
  document.getElementById('theta1').textContent = theta1.toFixed(3);
  document.getElementById('theta2').textContent = theta2.toFixed(3);
  document.getElementById('omega1').textContent = omega1.toFixed(3);
  document.getElementById('omega2').textContent = omega2.toFixed(3);
  document.getElementById('energy').textContent = computeEnergy(theta1, omega1, theta2, omega2).toFixed(3);
  document.getElementById('simTime').textContent = simTime.toFixed(3);
}

// ===== State Exposure =====
window.__3D_STATE__ = {};

function updateGlobalState() {
  const m1Pos = getMass1Pos();
  const m2Pos = getMass2Pos();
  window.__3D_STATE__ = {
    theta1, theta2, omega1, omega2,
    mass1Pos: { x: m1Pos.x, y: m1Pos.y, z: m1Pos.z },
    mass2Pos: { x: m2Pos.x, y: m2Pos.y, z: m2Pos.z },
    totalEnergy: computeEnergy(theta1, omega1, theta2, omega2),
    simTime,
    isPaused,
    speedMultiplier,
    trailLength: trailCount
  };
}

// ===== Animation Loop =====
let lastTime = null;
let frameCounter = 0;

function animate(timestamp) {
  requestAnimationFrame(animate);
  
  if (lastTime === null) lastTime = timestamp;
  let realDt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  
  // Clamp to avoid spiral of death
  realDt = Math.min(realDt, 0.05);
  
  if (!isPaused && !isDragging) {
    const simDt = realDt * speedMultiplier;
    const steps = Math.round(simDt / RK4_DT);
    
    for (let i = 0; i < steps; i++) {
      const state = rk4Step([theta1, omega1, theta2, omega2], RK4_DT);
      theta1 = state[0];
      omega1 = state[1];
      theta2 = state[2];
      omega2 = state[3];
      simTime += RK4_DT;
    }
    
    // Add trail/phase points every few frames to avoid overload
    frameCounter++;
    if (frameCounter % 1 === 0) {
      addTrailPoint(getMass2Pos());
      addPhasePoint(theta2, omega2);
    }
  }
  
  updatePendulumVisuals();
  updateHUD();
  updateGlobalState();
  
  controls.update();
  renderer.render(scene, camera);
}

// ===== Window Resize =====
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== Init =====
updatePendulumVisuals();
requestAnimationFrame(animate);

</script>
</body>
