<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gravitational Lensing Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            z-index: 10;
            min-width: 200px;
        }
        #hud div { margin-bottom: 5px; }
        #hud span { color: #00ffcc; font-weight: bold; }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            z-index: 10;
        }
        .control-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 300px;
        }
        .control-group label {
            font-size: 12px;
            width: 120px;
        }
        input[type=range] {
            width: 150px;
            cursor: pointer;
        }
        
        #instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            z-index: 10;
            text-align: right;
            font-size: 12px;
            line-height: 1.5;
        }
        .key { color: #ffaa00; font-weight: bold; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div>Einstein Radius: <span id="hud-er">0.150</span></div>
        <div>Lens Position: <span id="hud-pos">0.0, 0.0</span></div>
        <div>Lens Mass (r): <span id="hud-mass">1.5</span></div>
        <div>Chromatic: <span id="hud-chromatic">0.010</span></div>
        <div>Bloom: <span id="hud-bloom">ON</span></div>
        <div>FPS: <span id="hud-fps">0</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-einstein-radius">Einstein Radius</label>
            <input type="range" id="slider-einstein-radius" min="0.05" max="0.4" step="0.01" value="0.15">
        </div>
        <div class="control-group">
            <label for="slider-lens-mass">Lens Mass</label>
            <input type="range" id="slider-lens-mass" min="0.5" max="5" step="0.1" value="1.5">
        </div>
        <div class="control-group">
            <label for="slider-chromatic">Chromatic Aberration</label>
            <input type="range" id="slider-chromatic" min="0" max="0.05" step="0.005" value="0.01">
        </div>
    </div>

    <div id="instructions">
        <div>Drag massive object to move</div>
        <div>Scroll to zoom, drag background to rotate</div>
        <div>Press <span class="key">R</span> to reset position</div>
        <div>Press <span class="key">B</span> to toggle bloom</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            einsteinRadius: 0.15,
            lensPosition: { x: 0, y: 0 },
            lensRadius: 1.5,
            chromaticStrength: 0.01,
            bloomEnabled: true,
            frameCount: 0,
            fps: 0,
            shaderValid: true,
            lensValid: true
        };
        const state = window.__3D_STATE__;

        // --- Core Setup ---
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 20);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 80;

        // We use two scenes: 
        // sceneBg for the background (stars, galaxy) which gets lensed.
        // sceneFg for the lens itself (black hole, accretion disk) which sits on top.
        const sceneBg = new THREE.Scene();
        const sceneFg = new THREE.Scene();

        // --- Texture Generators ---
        function createStarfieldTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Random white stars
            ctx.fillStyle = '#ffffff';
            for (let i = 0; i < 3000; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const s = Math.random() * 2 + 0.5;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Colored stars
            const colors = ['#88ccff', '#ffaa88', '#ffffaa'];
            for (let i = 0; i < 50; i++) {
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const s = Math.random() * 3 + 1.5;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2);
                ctx.fill();
            }
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createGalaxyTexture() {
            const canvas = document.createElement('canvas');
            const size = 1024;
            canvas.width = size; canvas.height = size;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            
            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const dx = (x - size/2) / (size/2);
                    const dy = (y - size/2) / (size/2);
                    const r = Math.sqrt(dx*dx + dy*dy);
                    
                    if (r > 1) continue;
                    
                    const theta = Math.atan2(dy, dx);
                    
                    // Spiral logic: polar angle + log(radius)*2 mod PI < threshold
                    let val = (theta + Math.log(r + 0.01) * 3) % Math.PI;
                    if (val < 0) val += Math.PI;
                    
                    const spiralIntensity = val < 1.2 ? 1.0 : 0.1;
                    const coreGlow = Math.exp(-r * 6);
                    const armGlow = Math.exp(-r * 3) * spiralIntensity;
                    
                    let intensity = coreGlow * 0.7 + armGlow * 0.6;
                    
                    // Procedural noise (simulating 'disturb.jpg')
                    const noise = (Math.sin(x * 0.1) * Math.cos(y * 0.1) + Math.random()) * 0.1;
                    intensity += noise;
                    intensity = Math.max(0, Math.min(1, intensity));
                    
                    const idx = (y * size + x) * 4;
                    // Colors: Purple -> Blue -> White
                    imgData.data[idx] = intensity * 180 + coreGlow * 75;     // R
                    imgData.data[idx+1] = intensity * 120 + coreGlow * 135;  // G
                    imgData.data[idx+2] = intensity * 255;                   // B
                    imgData.data[idx+3] = intensity * 255;                   // A
                }
            }
            ctx.putImageData(imgData, 0, 0);
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function createAccretionDiskTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            const grad = ctx.createLinearGradient(0, 0, 0, 256);
            grad.addColorStop(0, 'rgba(255, 255, 255, 1.0)'); // Inner: White hot
            grad.addColorStop(0.15, 'rgba(255, 255, 150, 0.9)');
            grad.addColorStop(0.4, 'rgba(255, 100, 0, 0.7)'); // Mid: Orange
            grad.addColorStop(0.8, 'rgba(100, 0, 0, 0.3)');   // Outer: Dark red
            grad.addColorStop(1, 'rgba(0, 0, 0, 0.0)');       // Edge: Transparent
            
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 1, 256);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        // --- Scene Background (Lensed Objects) ---
        const starfieldGeo = new THREE.SphereGeometry(100, 32, 32);
        const starfieldMat = new THREE.MeshBasicMaterial({
            map: createStarfieldTexture(),
            side: THREE.BackSide
        });
        const starfield = new THREE.Mesh(starfieldGeo, starfieldMat);
        sceneBg.add(starfield);

        const galaxyGeo = new THREE.PlaneGeometry(40, 40);
        const galaxyMat = new THREE.MeshBasicMaterial({
            map: createGalaxyTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const galaxy = new THREE.Mesh(galaxyGeo, galaxyMat);
        galaxy.position.set(0, 0, -50);
        sceneBg.add(galaxy);

        // --- Scene Foreground (Lens Object) ---
        const lensGroup = new THREE.Group();
        sceneFg.add(lensGroup);

        // Dark Sphere (Black Hole) with Fresnel Glow
        const sphereGeo = new THREE.SphereGeometry(1.5, 32, 32);
        const sphereMat = new THREE.ShaderMaterial({
            uniforms: {
                baseColor: { value: new THREE.Color(0x050505) },
                glowColor: { value: new THREE.Color(0x333333) }
            },
            vertexShader: `
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vViewPosition = -mvPosition.xyz;
                    vNormal = normalize(normalMatrix * normal);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 baseColor;
                uniform vec3 glowColor;
                varying vec3 vNormal;
                varying vec3 vViewPosition;
                void main() {
                    vec3 normal = normalize(vNormal);
                    vec3 viewDir = normalize(vViewPosition);
                    float fresnel = dot(normal, viewDir);
                    fresnel = clamp(1.0 - fresnel, 0.0, 1.0);
                    fresnel = pow(fresnel, 3.0);
                    vec3 finalColor = mix(baseColor, glowColor, fresnel);
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `
        });
        const lensSphere = new THREE.Mesh(sphereGeo, sphereMat);
        lensGroup.add(lensSphere);

        // Accretion Disk
        const diskGeo = new THREE.RingGeometry(2, 5, 64);
        const diskMat = new THREE.MeshBasicMaterial({
            map: createAccretionDiskTexture(),
            transparent: true,
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const disk = new THREE.Mesh(diskGeo, diskMat);
        disk.rotation.x = Math.PI / 2 - (15 * Math.PI / 180); // Tilted 15 degrees
        lensGroup.add(disk);

        // --- Post-Processing (Gravitational Lensing) ---
        const LensingShader = {
            uniforms: {
                "tDiffuse": { value: null },
                "lensPos": { value: new THREE.Vector2(0.5, 0.5) },
                "einsteinRadius": { value: state.einsteinRadius },
                "chromaticAberration": { value: state.chromaticStrength },
                "aspect": { value: window.innerWidth / window.innerHeight }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec2 lensPos;
                uniform float einsteinRadius;
                uniform float chromaticAberration;
                uniform float aspect;
                varying vec2 vUv;

                void main() {
                    vec2 uv = vUv;
                    vec2 delta = uv - lensPos;
                    delta.x *= aspect; // Correct for screen aspect ratio

                    float theta = length(delta);

                    if (theta == 0.0) {
                        gl_FragColor = texture2D(tDiffuse, uv);
                        return;
                    }

                    vec2 dir = delta / theta;

                    // Chromatic aberration: slightly different Einstein radii for RGB
                    float eR_R = einsteinRadius + chromaticAberration;
                    float eR_G = einsteinRadius;
                    float eR_B = einsteinRadius - chromaticAberration;

                    // Deflection angle: alpha = theta_E^2 / theta
                    float alphaR = (eR_R * eR_R) / theta;
                    float alphaG = (eR_G * eR_G) / theta;
                    float alphaB = (eR_B * eR_B) / theta;

                    // Sample background closer to the lens center
                    vec2 uvR = uv - dir * alphaR / vec2(aspect, 1.0);
                    vec2 uvG = uv - dir * alphaG / vec2(aspect, 1.0);
                    vec2 uvB = uv - dir * alphaB / vec2(aspect, 1.0);

                    float r = texture2D(tDiffuse, uvR).r;
                    float g = texture2D(tDiffuse, uvG).g;
                    float b = texture2D(tDiffuse, uvB).b;

                    // Brightness amplification: A = theta_E / abs(theta^2 - theta_E^2)
                    float amp = einsteinRadius / (abs(theta * theta - einsteinRadius * einsteinRadius) + 0.005);
                    amp = clamp(amp, 1.0, 4.0); // Clamp to avoid blowout

                    gl_FragColor = vec4(r * amp, g * amp, b * amp, 1.0);
                }
            `
        };

        const composer = new EffectComposer(renderer);
        
        // 1. Render Background
        const renderPassBg = new RenderPass(sceneBg, camera);
        composer.addPass(renderPassBg);
        
        // 2. Apply Lensing to Background
        const lensingPass = new ShaderPass(LensingShader);
        composer.addPass(lensingPass);
        
        // 3. Render Foreground (Lens) on top without clearing
        const renderPassFg = new RenderPass(sceneFg, camera);
        renderPassFg.clear = false;
        composer.addPass(renderPassFg);
        
        // 4. Apply Bloom
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.2;
        bloomPass.radius = 0.5;
        composer.addPass(bloomPass);

        // --- Interaction & Controls ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        let isDragging = false;

        window.addEventListener('pointerdown', (e) => {
            if (e.target !== renderer.domElement) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(lensSphere);
            
            if (intersects.length > 0) {
                isDragging = true;
                controls.enabled = false;
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);
            
            if (target) {
                lensGroup.position.copy(target);
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            controls.enabled = true;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            lensingPass.uniforms.aspect.value = window.innerWidth / window.innerHeight;
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                lensGroup.position.set(0, 0, 0);
            }
            if (e.key.toLowerCase() === 'b') {
                state.bloomEnabled = !state.bloomEnabled;
                bloomPass.enabled = state.bloomEnabled;
            }
        });

        // UI Sliders
        document.getElementById('slider-einstein-radius').addEventListener('input', (e) => {
            state.einsteinRadius = parseFloat(e.target.value);
            lensingPass.uniforms.einsteinRadius.value = state.einsteinRadius;
        });

        document.getElementById('slider-lens-mass').addEventListener('input', (e) => {
            state.lensRadius = parseFloat(e.target.value);
            const scale = state.lensRadius / 1.5; // 1.5 is base radius
            lensGroup.scale.set(scale, scale, scale);
        });

        document.getElementById('slider-chromatic').addEventListener('input', (e) => {
            state.chromaticStrength = parseFloat(e.target.value);
            lensingPass.uniforms.chromaticAberration.value = state.chromaticStrength;
        });

        // --- Animation Loop ---
        let lastTime = performance.now();
        let frames = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const time = performance.now();
            frames++;
            if (time - lastTime >= 1000) {
                state.fps = frames;
                frames = 0;
                lastTime = time;
            }
            state.frameCount++;

            controls.update();

            // Rotate background slightly for dynamic feel
            galaxy.rotation.z += 0.0005;

            // Calculate lens position in screen space (UV) for the shader
            const screenPos = lensGroup.position.clone().project(camera);
            const uvX = (screenPos.x + 1) / 2;
            const uvY = (screenPos.y + 1) / 2;
            lensingPass.uniforms.lensPos.value.set(uvX, uvY);

            // Update State Object
            state.lensPosition.x = parseFloat(lensGroup.position.x.toFixed(2));
            state.lensPosition.y = parseFloat(lensGroup.position.y.toFixed(2));
            state.lensValid = !isNaN(state.lensPosition.x) && !isNaN(state.lensPosition.y);

            // Update HUD
            document.getElementById('hud-er').innerText = state.einsteinRadius.toFixed(3);
            document.getElementById('hud-pos').innerText = `${state.lensPosition.x.toFixed(1)}, ${state.lensPosition.y.toFixed(1)}`;
            document.getElementById('hud-mass').innerText = state.lensRadius.toFixed(1);
            document.getElementById('hud-chromatic').innerText = state.chromaticStrength.toFixed(3);
            document.getElementById('hud-bloom').innerText = state.bloomEnabled ? 'ON' : 'OFF';
            document.getElementById('hud-fps').innerText = state.fps;

            // Render via composer
            composer.render();
        }

        animate();
    </script>
</body>
</html>
