<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Gravitational Lensing - Three.js</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.18);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      min-width: 280px;
    }
    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 600;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
      font-size: 13px;
    }
    .row input[type="range"] {
      width: 100%;
    }
    #hud {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-line;
    }
    #help {
      position: absolute;
      right: 14px;
      bottom: 14px;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.14);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      color: #ddd;
    }
    .value {
      color: #9bd3ff;
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h3>Gravitational Lensing Controls</h3>
      <div class="row">
        <label for="slider-einstein-radius">Einstein Radius</label>
        <input id="slider-einstein-radius" type="range" min="0.05" max="0.4" step="0.01" value="0.15" />
      </div>
      <div class="row">
        <label for="slider-lens-mass">Lens Mass Radius</label>
        <input id="slider-lens-mass" type="range" min="0.5" max="5" step="0.1" value="1.5" />
      </div>
      <div class="row">
        <label for="slider-chromatic">Chromatic Aberration</label>
        <input id="slider-chromatic" type="range" min="0" max="0.05" step="0.005" value="0.01" />
      </div>

      <div id="hud">
        Einstein radius: <span id="hud-er" class="value">0.150</span><br>
        Lens position: <span id="hud-pos" class="value">0.0, 0.0</span><br>
        Bloom: <span id="hud-bloom" class="value">ON</span><br>
        Chromatic: <span id="hud-chromatic" class="value">0.010</span><br>
        FPS: <span id="hud-fps" class="value">0</span><br>
        Lens mass: <span id="hud-mass" class="value">1.5</span>
      </div>
    </div>

    <div id="help">
      Drag lens on XY plane<br>
      R = Reset lens<br>
      B = Toggle bloom
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const app = document.getElementById('app');

    const sliderER = document.getElementById('slider-einstein-radius');
    const sliderMass = document.getElementById('slider-lens-mass');
    const sliderChromatic = document.getElementById('slider-chromatic');

    const hudER = document.getElementById('hud-er');
    const hudPos = document.getElementById('hud-pos');
    const hudBloom = document.getElementById('hud-bloom');
    const hudChromatic = document.getElementById('hud-chromatic');
    const hudFPS = document.getElementById('hud-fps');
    const hudMass = document.getElementById('hud-mass');

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 0, 20);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.45);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.7);
    dir.position.set(6, 8, 10);
    scene.add(dir);

    function createStarfieldTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 2048;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = 'black';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < 3000; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const size = 1 + Math.random() * 2;
        const a = 0.5 + Math.random() * 0.5;
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.beginPath();
        ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }

      const colors = [
        [140, 180, 255],
        [255, 120, 120],
        [255, 230, 150]
      ];

      for (let i = 0; i < 50; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = 2 + Math.random() * 3.5;
        const c = colors[(Math.random() * colors.length) | 0];
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * 4);
        g.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},1)`);
        g.addColorStop(0.3, `rgba(${c[0]},${c[1]},${c[2]},0.8)`);
        g.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r * 4, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.wrapS = THREE.RepeatWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      return tex;
    }

    function createDisturbTexture() {
      const size = 512;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const img = ctx.createImageData(size, size);
      const data = img.data;

      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const i = (y * size + x) * 4;
          const nx = x / size - 0.5;
          const ny = y / size - 0.5;
          const r = Math.sqrt(nx * nx + ny * ny);
          const a = Math.atan2(ny, nx);
          const noise =
            0.5 +
            0.25 * Math.sin(18.0 * a + r * 45.0) +
            0.15 * Math.sin((x * 0.11) + (y * 0.07)) +
            0.1 * Math.sin((x * 0.27) - (y * 0.19));

          const v = Math.max(0, Math.min(255, (noise * 255)));
          data[i] = v;
          data[i + 1] = v;
          data[i + 2] = v;
          data[i + 3] = 255;
        }
      }

      ctx.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
      return tex;
    }

    function createGalaxyTexture() {
      const w = 2048;
      const h = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      const ctx = canvas.getContext('2d');

      const img = ctx.createImageData(w, h);
      const data = img.data;

      const cx = w * 0.5;
      const cy = h * 0.5;
      const sx = w * 0.22;
      const sy = h * 0.34;

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const dx = (x - cx) / sx;
          const dy = (y - cy) / sy;
          const r = Math.sqrt(dx * dx + dy * dy) + 1e-6;
          const ang = Math.atan2(dy, dx);

          let core = Math.exp(-r * r * 2.3);
          let halo = Math.exp(-r * 1.25) * 0.5;

          const armsBase = (ang + Math.log(r + 0.08) * 2.0);
          const armWave = Math.abs(((armsBase % Math.PI) + Math.PI) % Math.PI - Math.PI * 0.5);
          const armMask = Math.max(0.0, 1.0 - armWave / 0.22);
          const arms = Math.pow(armMask, 3.0) * Math.exp(-r * 1.4) * 1.2;

          const dust = 0.5 + 0.25 * Math.sin(x * 0.028 + y * 0.011) + 0.25 * Math.sin(x * 0.013 - y * 0.021);
          const b = Math.min(1.0, core * 1.35 + halo + arms * dust);

          let rr = 90 + 100 * b;
          let gg = 60 + 130 * b;
          let bb = 140 + 110 * b;

          rr += 50 * halo;
          gg += 40 * core;
          bb += 80 * arms;

          if (r < 0.18) {
            rr = gg = bb = 255;
          }

          const i = (y * w + x) * 4;
          data[i] = Math.min(255, rr);
          data[i + 1] = Math.min(255, gg);
          data[i + 2] = Math.min(255, bb);
          data[i + 3] = Math.min(255, b * 255);
        }
      }

      ctx.putImageData(img, 0, 0);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const starfieldTexture = createStarfieldTexture();
    const galaxyTexture = createGalaxyTexture();
    const disturbTexture = createDisturbTexture();

    const skyGeo = new THREE.SphereGeometry(100, 64, 32);
    const skyMat = new THREE.MeshBasicMaterial({
      map: starfieldTexture,
      side: THREE.BackSide
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    const galaxyMat = new THREE.ShaderMaterial({
      uniforms: {
        galaxyMap: { value: galaxyTexture },
        disturbMap: { value: disturbTexture },
        time: { value: 0 }
      },
      transparent: true,
      depthWrite: false,
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          vec4 mv = modelViewMatrix * vec4(position, 1.0);
          gl_Position = projectionMatrix * mv;
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform sampler2D galaxyMap;
        uniform sampler2D disturbMap;
        uniform float time;

        void main() {
          vec2 dUv = vUv * 2.0 + vec2(time * 0.01, -time * 0.007);
          vec2 d = texture2D(disturbMap, dUv).rg * 2.0 - 1.0;
          vec2 uv = vUv + d * 0.03;

          vec4 base = texture2D(galaxyMap, uv);
          vec4 detail = texture2D(disturbMap, vUv * 4.0 - vec2(time * 0.004, time * 0.003));

          vec3 col = base.rgb * (0.92 + detail.r * 0.16);
          float alpha = base.a * 0.98;

          gl_FragColor = vec4(col, alpha);
        }
      `
    });

    const galaxyPlane = new THREE.Mesh(new THREE.PlaneGeometry(40, 20, 1, 1), galaxyMat);
    galaxyPlane.position.set(0, 0, -50);
    scene.add(galaxyPlane);

    const lensGeo = new THREE.SphereGeometry(parseFloat(sliderMass.value), 64, 64);
    const lensMat = new THREE.ShaderMaterial({
      uniforms: {
        cameraPos: { value: new THREE.Vector3() },
        glowColor: { value: new THREE.Color(0x66bbff) }
      },
      vertexShader: `
        varying vec3 vNormalW;
        varying vec3 vWorldPos;
        void main() {
          vec4 worldPos = modelMatrix * vec4(position, 1.0);
          vWorldPos = worldPos.xyz;
          vNormalW = normalize(mat3(modelMatrix) * normal);
          gl_Position = projectionMatrix * viewMatrix * worldPos;
        }
      `,
      fragmentShader: `
        varying vec3 vNormalW;
        varying vec3 vWorldPos;
        uniform vec3 cameraPos;
        uniform vec3 glowColor;

        void main() {
          vec3 V = normalize(cameraPos - vWorldPos);
          float fresnel = pow(1.0 - max(dot(normalize(vNormalW), V), 0.0), 3.5);
          vec3 base = vec3(0.07);
          vec3 col = base + glowColor * fresnel * 0.28;
          gl_FragColor = vec4(col, 1.0);
        }
      `
    });
    const lensSphere = new THREE.Mesh(lensGeo, lensMat);
    lensSphere.position.set(0, 0, 0);
    scene.add(lensSphere);

    function createAccretionDiskTexture() {
      const size = 1024;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size / 2;
      const cy = size / 2;

      ctx.clearRect(0, 0, size, size);

      for (let i = 0; i < 220; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = size * (0.20 + Math.random() * 0.27);
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;
        const streak = 25 + Math.random() * 65;
        const grad = ctx.createRadialGradient(x, y, 0, x, y, streak);
        grad.addColorStop(0.0, 'rgba(255,255,240,0.9)');
        grad.addColorStop(0.25, 'rgba(255,210,120,0.7)');
        grad.addColorStop(0.6, 'rgba(255,110,40,0.25)');
        grad.addColorStop(1.0, 'rgba(255,80,20,0.0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, streak, 0, Math.PI * 2);
        ctx.fill();
      }

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const diskTexture = createAccretionDiskTexture();
    const diskMat = new THREE.ShaderMaterial({
      uniforms: {
        map: { value: diskTexture },
        time: { value: 0 }
      },
      transparent: true,
      side: THREE.DoubleSide,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
        }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform sampler2D map;
        uniform float time;

        void main() {
          vec2 p = vUv - 0.5;
          float r = length(p) * 2.0;
          float ang = atan(p.y, p.x);
          vec2 uv = vec2(
            fract(vUv.x + time * 0.03 + 0.03 * sin(ang * 6.0)),
            vUv.y
          );

          vec4 tex = texture2D(map, uv);

          float ring = smoothstep(1.0, 0.78, r) * smoothstep(0.38, 0.48, r);
          vec3 inner = vec3(1.0, 0.96, 0.9);
          vec3 mid = vec3(1.0, 0.65, 0.25);
          vec3 outer = vec3(0.9, 0.2, 0.08);

          vec3 grad = mix(inner, mid, smoothstep(0.38, 0.62, r));
          grad = mix(grad, outer, smoothstep(0.62, 1.0, r));

          float flicker = 0.85 + 0.15 * sin(ang * 18.0 + time * 4.0);
          vec3 col = grad * tex.rgb * ring * flicker * 2.0;

          gl_FragColor = vec4(col, tex.a * ring);
        }
      `
    });

    const diskGeo = new THREE.RingGeometry(2, 5, 128, 8);
    const accretionDisk = new THREE.Mesh(diskGeo, diskMat);
    accretionDisk.rotation.x = THREE.MathUtils.degToRad(15);
    scene.add(accretionDisk);

    const renderPass = new RenderPass(scene, camera);

    const lensingShader = {
      uniforms: {
        tDiffuse: { value: null },
        lensCenter: { value: new THREE.Vector2(0.5, 0.5) },
        einsteinRadius: { value: parseFloat(sliderER.value) },
        chromaticStrength: { value: parseFloat(sliderChromatic.value) },
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform vec2 lensCenter;
        uniform float einsteinRadius;
        uniform float chromaticStrength;
        uniform vec2 resolution;
        varying vec2 vUv;

        vec2 deflectUV(vec2 uv, float thetaE) {
          vec2 delta = uv - lensCenter;
          float theta = length(delta) + 1e-6;
          vec2 dir = delta / theta;
          float alpha = (thetaE * thetaE) / theta;
          return uv + dir * alpha;
        }

        vec3 sampleLensed(vec2 uv) {
          float c = chromaticStrength;

          vec2 delta = uv - lensCenter;
          float theta = length(delta) + 1e-6;

          vec2 uvR = deflectUV(uv, einsteinRadius + c);
          vec2 uvG = deflectUV(uv, einsteinRadius);
          vec2 uvB = deflectUV(uv, max(0.001, einsteinRadius - c));

          float r = texture2D(tDiffuse, uvR).r;
          float g = texture2D(tDiffuse, uvG).g;
          float b = texture2D(tDiffuse, uvB).b;

          float denom = abs(theta * theta - einsteinRadius * einsteinRadius);
          float amp = einsteinRadius / max(denom, 0.0025);
          amp = clamp(amp, 1.0, 8.0);

          vec3 col = vec3(r, g, b) * amp;

          float ringGlow = exp(-abs(theta - einsteinRadius) * 45.0) * 0.8;
          col += vec3(0.25, 0.35, 0.65) * ringGlow * chromaticStrength * 18.0;

          return col;
        }

        void main() {
          vec2 uv = vUv;
          vec3 col = sampleLensed(uv);

          float centerCut = smoothstep(0.0, 0.04, distance(uv, lensCenter));
          col *= centerCut;

          gl_FragColor = vec4(col, 1.0);
        }
      `
    };

    const lensPass = new ShaderPass(lensingShader);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.25,
      0.5,
      0.15
    );

    const composer = new EffectComposer(renderer);
    composer.addPass(renderPass);
    composer.addPass(lensPass);
    composer.addPass(bloomPass);

    let bloomEnabled = true;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const dragPoint = new THREE.Vector3();
    const dragOffset = new THREE.Vector3();
    let dragging = false;

    function setMouseFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function updateLensCenterUniform() {
      const p = lensSphere.position.clone().project(camera);
      const uvx = p.x * 0.5 + 0.5;
      const uvy = p.y * 0.5 + 0.5;
      lensPass.uniforms.lensCenter.value.set(uvx, uvy);
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      setMouseFromEvent(event);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(lensSphere, false);
      if (hits.length > 0) {
        dragging = true;
        controls.enabled = false;
        raycaster.ray.intersectPlane(dragPlane, dragPoint);
        dragOffset.copy(lensSphere.position).sub(dragPoint);
      }
    });

    window.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      setMouseFromEvent(event);
      raycaster.setFromCamera(mouse, camera);
      if (raycaster.ray.intersectPlane(dragPlane, dragPoint)) {
        lensSphere.position.copy(dragPoint.clone().add(dragOffset));
        accretionDisk.position.copy(lensSphere.position);
      }
    });

    window.addEventListener('pointerup', () => {
      dragging = false;
      controls.enabled = true;
    });

    sliderER.addEventListener('input', () => {
      lensPass.uniforms.einsteinRadius.value = parseFloat(sliderER.value);
    });

    sliderChromatic.addEventListener('input', () => {
      lensPass.uniforms.chromaticStrength.value = parseFloat(sliderChromatic.value);
    });

    sliderMass.addEventListener('input', () => {
      const r = parseFloat(sliderMass.value);
      lensSphere.geometry.dispose();
      lensSphere.geometry = new THREE.SphereGeometry(r, 64, 64);
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        lensSphere.position.set(0, 0, 0);
        accretionDisk.position.copy(lensSphere.position);
      }
      if (e.key === 'b' || e.key === 'B') {
        bloomEnabled = !bloomEnabled;
        bloomPass.enabled = bloomEnabled;
      }
    });

    let frameCount = 0;
    let fps = 0;
    let lastFpsTime = performance.now();
    let fpsFrames = 0;

    window.__3D_STATE__ = {
      einsteinRadius: 0.15,
      lensPosition: { x: 0, y: 0 },
      lensRadius: 1.5,
      chromaticStrength: 0.01,
      bloomEnabled: true,
      frameCount: 0,
      fps: 0,
      shaderValid: true,
      lensValid: true
    };

    function round(n, d) {
      return Number(n.toFixed(d));
    }

    function updateHUD() {
      const er = lensPass.uniforms.einsteinRadius.value;
      const ch = lensPass.uniforms.chromaticStrength.value;
      const mass = parseFloat(sliderMass.value);
      hudER.textContent = er.toFixed(3);
      hudPos.textContent = `${lensSphere.position.x.toFixed(1)}, ${lensSphere.position.y.toFixed(1)}`;
      hudBloom.textContent = bloomEnabled ? 'ON' : 'OFF';
      hudChromatic.textContent = ch.toFixed(3);
      hudFPS.textContent = `${fps}`;
      hudMass.textContent = mass.toFixed(1);
    }

    function updateState() {
      const shaderValid = !!composer && !!lensPass && !!renderPass;
      const lensValid = Number.isFinite(lensSphere.position.x) && Number.isFinite(lensSphere.position.y);

      window.__3D_STATE__ = {
        einsteinRadius: round(lensPass.uniforms.einsteinRadius.value, 3),
        lensPosition: {
          x: round(lensSphere.position.x, 2),
          y: round(lensSphere.position.y, 2)
        },
        lensRadius: parseFloat(sliderMass.value),
        chromaticStrength: round(lensPass.uniforms.chromaticStrength.value, 3),
        bloomEnabled,
        frameCount,
        fps: Math.round(fps),
        shaderValid,
        lensValid
      };
    }

    function resize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      lensPass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
      bloomPass.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', resize);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      controls.update();

      galaxyPlane.lookAt(camera.position);

      lensMat.uniforms.cameraPos.value.copy(camera.position);
      galaxyMat.uniforms.time.value = t;
      diskMat.uniforms.time.value = t * 0.6;

      accretionDisk.position.copy(lensSphere.position);

      updateLensCenterUniform();

      fpsFrames++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        fps = (fpsFrames * 1000) / (now - lastFpsTime);
        fpsFrames = 0;
        lastFpsTime = now;
      }

      frameCount++;

      updateHUD();
      updateState();

      if (bloomEnabled) {
        bloomPass.enabled = true;
      } else {
        bloomPass.enabled = false;
      }

      composer.render();
    }

    resize();
    animate();
  </script>
</body>
</html>
