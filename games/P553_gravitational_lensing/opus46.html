<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravitational Lensing Visualization</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }

#controls {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(100,150,255,0.3);
    border-radius: 8px;
    padding: 15px;
    color: #aaccff;
    font-size: 12px;
    z-index: 10;
    min-width: 280px;
}

#controls label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

#controls input[type="range"] {
    width: 140px;
    accent-color: #6699ff;
}

#hud {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(100,150,255,0.3);
    border-radius: 8px;
    padding: 15px;
    color: #aaccff;
    font-size: 13px;
    z-index: 10;
    min-width: 220px;
    line-height: 1.8;
}

#hud span {
    color: #ffffff;
    font-weight: bold;
}

#instructions {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(100,150,255,0.3);
    border-radius: 8px;
    padding: 12px;
    color: #7799cc;
    font-size: 11px;
    z-index: 10;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="instructions">
    <strong style="color:#aaccff">Controls:</strong><br>
    🖱️ Drag lens sphere to move<br>
    🔄 Right-click + drag to orbit<br>
    ⌨️ R - Reset lens position<br>
    ⌨️ B - Toggle bloom
</div>

<div id="hud">
    <div>Einstein Radius: <span id="hud-er">0.150</span></div>
    <div>Lens Position: <span id="hud-pos">(0.0, 0.0)</span></div>
    <div>Bloom: <span id="hud-bloom">ON</span></div>
    <div>Chromatic: <span id="hud-chromatic">0.010</span></div>
    <div>FPS: <span id="hud-fps">60</span></div>
    <div>Lens Mass: <span id="hud-mass">1.5</span></div>
</div>

<div id="controls">
    <label>
        Einstein Radius:
        <input type="range" id="slider-einstein-radius" min="0.05" max="0.4" step="0.01" value="0.15">
    </label>
    <label>
        Lens Mass (size):
        <input type="range" id="slider-lens-mass" min="0.5" max="5" step="0.1" value="1.5">
    </label>
    <label>
        Chromatic Aberration:
        <input type="range" id="slider-chromatic" min="0" max="0.05" step="0.005" value="0.01">
    </label>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// State
window.__3D_STATE__ = {
    einsteinRadius: 0.150,
    lensPosition: { x: 0, y: 0 },
    lensRadius: 1.5,
    chromaticStrength: 0.01,
    bloomEnabled: true,
    frameCount: 0,
    fps: 60,
    shaderValid: false,
    lensValid: true
};

let einsteinRadius = 0.15;
let lensRadius = 1.5;
let chromaticStrength = 0.01;
let bloomEnabled = true;
let frameCount = 0;
let lastTime = performance.now();
let fps = 60;
let fpsFrames = 0;
let fpsTime = performance.now();

// Scene setup
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 0, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.mouseButtons = {
    LEFT: null,
    MIDDLE: THREE.MOUSE.DOLLY,
    RIGHT: THREE.MOUSE.ROTATE
};

// Generate starfield texture
function generateStarfieldTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 2048;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, 2048, 1024);

    // 3000 random white dots
    for (let i = 0; i < 3000; i++) {
        const x = Math.random() * 2048;
        const y = Math.random() * 1024;
        const size = 1 + Math.random() * 2;
        const brightness = 150 + Math.floor(Math.random() * 105);
        ctx.fillStyle = `rgb(${brightness},${brightness},${brightness})`;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
    }

    // 50 colored stars
    const colors = ['#6688ff', '#ff6644', '#ffee44', '#88aaff', '#ff8866'];
    for (let i = 0; i < 50; i++) {
        const x = Math.random() * 2048;
        const y = Math.random() * 1024;
        const size = 2 + Math.random() * 2;
        const color = colors[Math.floor(Math.random() * colors.length)];
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();

        // Glow
        const grad = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
        grad.addColorStop(0, color + '88');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, size * 3, 0, Math.PI * 2);
        ctx.fill();
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.mapping = THREE.EquirectangularReflectionMapping;
    return texture;
}

// Starfield sphere
const starfieldTexture = generateStarfieldTexture();
const starSphereGeo = new THREE.SphereGeometry(100, 64, 32);
const starSphereMat = new THREE.MeshBasicMaterial({
    map: starfieldTexture,
    side: THREE.BackSide
});
const starSphere = new THREE.Mesh(starSphereGeo, starSphereMat);
scene.add(starSphere);

// Generate galaxy texture
function generateGalaxyTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 1024;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#000005';
    ctx.fillRect(0, 0, 1024, 512);

    const cx = 512;
    const cy = 256;

    // Central glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 200);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.1, 'rgba(200,200,255,0.7)');
    grad.addColorStop(0.3, 'rgba(100,100,200,0.4)');
    grad.addColorStop(0.6, 'rgba(80,40,120,0.2)');
    grad.addColorStop(1, 'rgba(0,0,20,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 250, 120, 0, 0, Math.PI * 2);
    ctx.fill();

    // Spiral arms
    const imageData = ctx.getImageData(0, 0, 1024, 512);
    const data = imageData.data;

    for (let y = 0; y < 512; y++) {
        for (let x = 0; x < 1024; x++) {
            const dx = (x - cx) / 250;
            const dy = (y - cy) / 120;
            const r = Math.sqrt(dx * dx + dy * dy);
            const theta = Math.atan2(dy, dx);

            if (r > 0.05 && r < 1.2) {
                // Spiral pattern
                const spiralAngle = theta + Math.log(r + 0.1) * 2.5;
                const arm1 = Math.sin(spiralAngle * 2) * 0.5 + 0.5;
                const arm2 = Math.sin(spiralAngle * 2 + Math.PI) * 0.5 + 0.5;
                const armStrength = Math.max(arm1, arm2);

                const threshold = 0.65;
                if (armStrength > threshold) {
                    const brightness = (armStrength - threshold) / (1 - threshold);
                    const falloff = Math.exp(-r * 2);
                    const intensity = brightness * falloff * 0.8;

                    const idx = (y * 1024 + x) * 4;
                    // Purple to blue to white
                    const colorR = Math.min(255, data[idx] + intensity * (150 + r * 100));
                    const colorG = Math.min(255, data[idx + 1] + intensity * (100 + (1 - r) * 155));
                    const colorB = Math.min(255, data[idx + 2] + intensity * (200 + (1 - r) * 55));

                    data[idx] = colorR;
                    data[idx + 1] = colorG;
                    data[idx + 2] = colorB;
                }

                // Add some noise/stars in arms
                if (Math.random() < 0.002 * (1 - r) && armStrength > 0.5) {
                    const idx = (y * 1024 + x) * 4;
                    const starBright = 150 + Math.random() * 105;
                    data[idx] = Math.min(255, data[idx] + starBright);
                    data[idx + 1] = Math.min(255, data[idx + 1] + starBright);
                    data[idx + 2] = Math.min(255, data[idx + 2] + starBright);
                }
            }
        }
    }

    ctx.putImageData(imageData, 0, 0);

    // Additional central bright core
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 40);
    coreGrad.addColorStop(0, 'rgba(255,255,240,0.8)');
    coreGrad.addColorStop(0.5, 'rgba(200,180,255,0.3)');
    coreGrad.addColorStop(1, 'rgba(100,80,200,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 50, 25, 0, 0, Math.PI * 2);
    ctx.fill();

    return new THREE.CanvasTexture(canvas);
}

const galaxyTexture = generateGalaxyTexture();
const galaxyGeo = new THREE.PlaneGeometry(40, 20);
const galaxyMat = new THREE.MeshBasicMaterial({
    map: galaxyTexture,
    transparent: true,
    opacity: 0.9,
    side: THREE.DoubleSide
});
const galaxyPlane = new THREE.Mesh(galaxyGeo, galaxyMat);
galaxyPlane.position.set(0, 0, -50);
scene.add(galaxyPlane);

// Additional background galaxies
for (let i = 0; i < 5; i++) {
    const smallGalaxy = new THREE.Mesh(
        new THREE.PlaneGeometry(8 + Math.random() * 12, 4 + Math.random() * 6),
        new THREE.MeshBasicMaterial({
            map: galaxyTexture,
            transparent: true,
            opacity: 0.3 + Math.random() * 0.3,
            side: THREE.DoubleSide
        })
    );
    smallGalaxy.position.set(
        (Math.random() - 0.5) * 80,
        (Math.random() - 0.5) * 40,
        -60 - Math.random() * 30
    );
    smallGalaxy.rotation.z = Math.random() * Math.PI;
    scene.add(smallGalaxy);
}

// Massive object (lens) with Fresnel shader
const fresnelVertexShader = `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    void main() {
        vNormal = normalize(normalMatrix * normal);
        vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
        vViewDir = normalize(-mvPos.xyz);
        gl_Position = projectionMatrix * mvPos;
    }
`;

const fresnelFragmentShader = `
    varying vec3 vNormal;
    varying vec3 vViewDir;
    void main() {
        float fresnel = 1.0 - dot(vNormal, vViewDir);
        fresnel = pow(fresnel, 3.0);
        vec3 baseColor = vec3(0.02, 0.02, 0.04);
        vec3 edgeColor = vec3(0.2, 0.4, 0.8);
        vec3 color = mix(baseColor, edgeColor, fresnel);
        gl_FragColor = vec4(color, 1.0);
    }
`;

const lensSphereGeo = new THREE.SphereGeometry(1, 64, 64);
const lensSphereMat = new THREE.ShaderMaterial({
    vertexShader: fresnelVertexShader,
    fragmentShader: fresnelFragmentShader
});
const lensSphere = new THREE.Mesh(lensSphereGeo, lensSphereMat);
lensSphere.position.set(0, 0, 0);
scene.add(lensSphere);

// Accretion disk
function createAccretionDisk() {
    const diskGeo = new THREE.RingGeometry(2, 5, 128, 8);
    
    // Color the vertices
    const colors = [];
    const positions = diskGeo.attributes.position;
    for (let i = 0; i < positions.count; i++) {
        const x = positions.getX(i);
        const y = positions.getY(i);
        const dist = Math.sqrt(x * x + y * y);
        const t = (dist - 2) / 3; // 0 at inner, 1 at outer
        
        // White-hot center to red-orange edge
        const r = 1.0;
        const g = Math.max(0, 1.0 - t * 1.2);
        const b = Math.max(0, 1.0 - t * 2.0);
        colors.push(r, g, b);
    }
    diskGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

    const diskMat = new THREE.MeshBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        side: THREE.DoubleSide,
        blending: THREE.AdditiveBlending
    });

    const disk = new THREE.Mesh(diskGeo, diskMat);
    disk.rotation.x = Math.PI * 0.5 - 0.26; // ~15 degrees from camera plane
    return disk;
}

const accretionDisk = createAccretionDisk();
lensSphere.add(accretionDisk);

// Gravitational Lensing Shader
const GravitationalLensingShader = {
    uniforms: {
        tDiffuse: { value: null },
        lensCenter: { value: new THREE.Vector2(0.5, 0.5) },
        einsteinRadius: { value: 0.15 },
        chromaticStrength: { value: 0.01 },
        resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
        lensScreenRadius: { value: 0.05 }
    },
    vertexShader: `
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    `,
    fragmentShader: `
        uniform sampler2D tDiffuse;
        uniform vec2 lensCenter;
        uniform float einsteinRadius;
        uniform float chromaticStrength;
        uniform vec2 resolution;
        uniform float lensScreenRadius;
        varying vec2 vUv;

        vec2 lensDistort(vec2 uv, float er) {
            vec2 diff = uv - lensCenter;
            // Correct for aspect ratio
            float aspect = resolution.x / resolution.y;
            diff.x *= aspect;
            
            float dist = length(diff);
            
            if (dist < 0.001) return uv;
            
            vec2 dir = normalize(diff);
            
            // Gravitational lensing: deflection = er^2 / dist
            float deflection = er * er / dist;
            
            // New position: the source position that maps to this observed position
            vec2 newDiff = dir * (dist + deflection);
            newDiff.x /= aspect;
            
            return lensCenter + newDiff;
        }

        void main() {
            vec2 diff = vUv - lensCenter;
            float aspect = resolution.x / resolution.y;
            diff.x *= aspect;
            float dist = length(diff);
            
            // Einstein radius effects
            float er = einsteinRadius;
            
            // Amplification factor near Einstein ring
            float amplification = 1.0;
            if (dist > 0.001) {
                float denom = abs(dist * dist - er * er);
                denom = max(denom, 0.002);
                amplification = (dist / denom) * er * 0.5;
                amplification = clamp(amplification, 1.0, 8.0);
            }
            
            // Mask the lens sphere itself (darken center)
            float lensMask = smoothstep(lensScreenRadius * 0.8, lensScreenRadius * 1.2, dist);
            
            // Chromatic aberration - different ER for each channel
            float erR = er * (1.0 + chromaticStrength * 5.0);
            float erG = er;
            float erB = er * (1.0 - chromaticStrength * 5.0);
            
            vec2 uvR = lensDistort(vUv, erR);
            vec2 uvG = lensDistort(vUv, erG);
            vec2 uvB = lensDistort(vUv, erB);
            
            // Clamp UVs
            uvR = clamp(uvR, 0.0, 1.0);
            uvG = clamp(uvG, 0.0, 1.0);
            uvB = clamp(uvB, 0.0, 1.0);
            
            float r = texture2D(tDiffuse, uvR).r;
            float g = texture2D(tDiffuse, uvG).g;
            float b = texture2D(tDiffuse, uvB).b;
            
            vec3 color = vec3(r, g, b);
            
            // Apply amplification (brightness near Einstein ring)
            color *= amplification;
            
            // Apply lens mask
            color *= lensMask;
            
            // Add subtle ring glow
            float ringDist = abs(dist - er);
            float ringGlow = exp(-ringDist * ringDist / (0.002 * er)) * 0.3;
            color += vec3(0.3, 0.5, 1.0) * ringGlow;
            
            gl_FragColor = vec4(color, 1.0);
        }
    `
};

// Post-processing
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const lensingPass = new ShaderPass(GravitationalLensingShader);
composer.addPass(lensingPass);

const bloomPass = new UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    0.8, // strength
    0.4, // radius
    0.85 // threshold
);
composer.addPass(bloomPass);

let shaderValid = true;

// Raycaster for dragging
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let isDragging = false;
let dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
let dragOffset = new THREE.Vector3();

function onMouseDown(event) {
    if (event.button !== 0) return; // Only left click
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(lensSphere);
    
    if (intersects.length > 0) {
        isDragging = true;
        controls.enabled = false;
        
        // Calculate drag plane through lens position, facing camera
        const cameraDir = new THREE.Vector3();
        camera.getWorldDirection(cameraDir);
        dragPlane.setFromNormalAndCoplanarPoint(cameraDir.negate(), lensSphere.position);
        
        const intersection = new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane, intersection);
        dragOffset.subVectors(lensSphere.position, intersection);
    }
}

function onMouseMove(event) {
    if (!isDragging) return;
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(dragPlane, intersection);
    
    if (intersection) {
        lensSphere.position.copy(intersection.add(dragOffset));
        lensSphere.position.z = 0; // Keep on z=0 plane
    }
}

function onMouseUp(event) {
    if (event.button !== 0) return;
    isDragging = false;
    controls.enabled = true;
}

window.addEventListener('mousedown', onMouseDown);
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('mouseup', onMouseUp);

// Keyboard controls
window.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        lensSphere.position.set(0, 0, 0);
    }
    if (e.key === 'b' || e.key === 'B') {
        bloomEnabled = !bloomEnabled;
        bloomPass.enabled = bloomEnabled;
    }
});

// Sliders
const sliderER = document.getElementById('slider-einstein-radius');
const sliderMass = document.getElementById('slider-lens-mass');
const sliderChromatic = document.getElementById('slider-chromatic');

sliderER.addEventListener('input', (e) => {
    einsteinRadius = parseFloat(e.target.value);
});

sliderMass.addEventListener('input', (e) => {
    lensRadius = parseFloat(e.target.value);
    lensSphere.scale.setScalar(lensRadius / 1.5);
});

sliderChromatic.addEventListener('input', (e) => {
    chromaticStrength = parseFloat(e.target.value);
});

// HUD elements
const hudER = document.getElementById('hud-er');
const hudPos = document.getElementById('hud-pos');
const hudBloom = document.getElementById('hud-bloom');
const hudChromatic = document.getElementById('hud-chromatic');
const hudFPS = document.getElementById('hud-fps');
const hudMass = document.getElementById('hud-mass');

// Project lens position to screen space
function getLensScreenPosition() {
    const pos = lensSphere.position.clone();
    pos.project(camera);
    return new THREE.Vector2(
        (pos.x + 1) * 0.5,
        (pos.y + 1) * 0.5
    );
}

function getLensScreenRadius() {
    // Approximate screen radius of the lens sphere
    const pos = lensSphere.position.clone();
    const edge = lensSphere.position.clone();
    edge.x += lensRadius;
    
    pos.project(camera);
    edge.project(camera);
    
    const aspect = window.innerWidth / window.innerHeight;
    return Math.abs((edge.x - pos.x) * 0.5) * aspect;
}

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    lensingPass.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    frameCount++;
    fpsFrames++;
    
    if (now - fpsTime >= 1000) {
        fps = Math.round(fpsFrames * 1000 / (now - fpsTime));
        fpsFrames = 0;
        fpsTime = now;
    }
    
    controls.update();
    
    // Slowly rotate accretion disk
    accretionDisk.rotation.z += 0.002;
    
    // Update lensing shader uniforms
    const screenPos = getLensScreenPosition();
    lensingPass.uniforms.lensCenter.value.copy(screenPos);
    lensingPass.uniforms.einsteinRadius.value = einsteinRadius;
    lensingPass.uniforms.chromaticStrength.value = chromaticStrength;
    lensingPass.uniforms.lensScreenRadius.value = getLensScreenRadius();
    
    // Validate lens position
    const lensValid = !isNaN(lensSphere.position.x) && !isNaN(lensSphere.position.y);
    
    // Update HUD
    hudER.textContent = einsteinRadius.toFixed(3);
    hudPos.textContent = `(${lensSphere.position.x.toFixed(1)}, ${lensSphere.position.y.toFixed(1)})`;
    hudBloom.textContent = bloomEnabled ? 'ON' : 'OFF';
    hudChromatic.textContent = chromaticStrength.toFixed(3);
    hudFPS.textContent = fps;
    hudMass.textContent = lensRadius.toFixed(1);
    
    // Update state
    window.__3D_STATE__ = {
        einsteinRadius: parseFloat(einsteinRadius.toFixed(3)),
        lensPosition: {
            x: parseFloat(lensSphere.position.x.toFixed(2)),
            y: parseFloat(lensSphere.position.y.toFixed(2))
        },
        lensRadius: lensRadius,
        chromaticStrength: chromaticStrength,
        bloomEnabled: bloomEnabled,
        frameCount: frameCount,
        fps: fps,
        shaderValid: shaderValid,
        lensValid: lensValid
    };
    
    // Render
    composer.render();
}

animate();
</script>
</body>
</html>
