<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Gyroscope Precession Simulator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }
    canvas { display: block; }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.45;
      min-width: 220px;
      user-select: none;
      pointer-events: none;
    }

    #instructions {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      white-space: nowrap;
      user-select: none;
    }

    .label {
      color: #bfc7ff;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <div id="instructions">
    <b>Controls:</b>
    Space = Pause/Resume |
    ↑ = Spin +5 |
    ↓ = Spin -5 |
    R = Reset |
    T = Cycle Tilt |
    Click Rotor = Toggle Trail
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(4, 3, 4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: "#888888", side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(20, 20, 0x444444, 0x666666);
    grid.position.y = 0.001;
    scene.add(grid);

    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(0.15, 0.15, 0.2, 24),
      new THREE.MeshStandardMaterial({ color: "#333333" })
    );
    pedestal.position.set(0, 0.1, 0);
    scene.add(pedestal);

    // --- Gyroscope hierarchy ---
    // pivotGroup rotates around Y for precession
    // tiltGroup tilts from vertical toward +x
    // spinGroup spins rotor/ring around local axle
    const pivotGroup = new THREE.Group();
    scene.add(pivotGroup);

    const tiltGroup = new THREE.Group();
    pivotGroup.add(tiltGroup);

    const spinGroup = new THREE.Group();
    tiltGroup.add(spinGroup);

    // Axle aligned with local Y-axis, pivot at local origin, bottom at pivot
    const axleMat = new THREE.MeshStandardMaterial({ color: "#C0C0C0", metalness: 0.8, roughness: 0.25 });
    const rotorMat = new THREE.MeshStandardMaterial({ color: "#FFD700", metalness: 0.9, roughness: 0.25 });
    const ringMat = new THREE.MeshStandardMaterial({ color: "#4488FF", metalness: 0.5, roughness: 0.35 });

    const axleLength = 2.5;
    const halfAxle = axleLength / 2; // 1.25
    const comDistance = 0.625; // requested
    const rotorRadius = 1.0;

    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, axleLength, 8),
      axleMat
    );
    axle.position.y = halfAxle;
    spinGroup.add(axle);

    const rotor = new THREE.Mesh(
      new THREE.CylinderGeometry(1.0, 1.0, 0.1, 32),
      rotorMat
    );
    // default cylinder axis is Y, rotate so disc axis aligns with axle/local Y spin axis? Actually disc should spin about axle.
    // Cylinder disc naturally has symmetry axis along Y, which matches axle axis, so no extra rotation needed.
    rotor.position.y = comDistance;
    spinGroup.add(rotor);

    const supportRing = new THREE.Mesh(
      new THREE.TorusGeometry(1.1, 0.04, 8, 32),
      ringMat
    );
    // Torus default hole axis along Z; rotate to make ring plane perpendicular to axle (Y-axis), i.e. ring lies in XZ plane.
    supportRing.rotation.x = Math.PI / 2;
    supportRing.position.y = comDistance;
    spinGroup.add(supportRing);

    // Small marker on rotor edge to visualize spin
    const marker = new THREE.Mesh(
      new THREE.BoxGeometry(0.08, 0.08, 0.22),
      new THREE.MeshStandardMaterial({ color: "#ff5533" })
    );
    marker.position.set(rotorRadius, comDistance, 0);
    spinGroup.add(marker);

    // Trail line: dashed circle on ground plane
    const trailRadius = Math.sin(THREE.MathUtils.degToRad(45)) * axleLength; // enough visible default path
    const circlePts = [];
    for (let i = 0; i <= 256; i++) {
      const a = (i / 256) * Math.PI * 2;
      circlePts.push(new THREE.Vector3(Math.cos(a) * trailRadius, 0.02, Math.sin(a) * trailRadius));
    }
    const trailGeo = new THREE.BufferGeometry().setFromPoints(circlePts);
    const trailMat = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.2,
      gapSize: 0.1,
      transparent: true,
      opacity: 0.75
    });
    const trailLine = new THREE.Line(trailGeo, trailMat);
    trailLine.computeLineDistances();
    trailLine.visible = false;
    scene.add(trailLine);

    // --- Physics / State ---
    const MASS = 2.0;
    const G = 9.81;
    const D = 0.625;
    const I = 0.5 * MASS * rotorRadius * rotorRadius; // = 1.0

    const tiltPresets = [15, 25, 35, 45];
    let tiltPresetIndex = 1;

    let spinSpeed = 30.0;
    let precessionRate = 0.0;
    let precessionAngle = 0.0; // radians
    let rotorRotation = 0.0;   // radians
    let isPaused = false;
    let isToppled = false;
    let elapsedTime = 0.0;
    let trailVisible = false;

    let baseTiltDeg = tiltPresets[tiltPresetIndex];
    let currentTiltDeg = baseTiltDeg;
    let nutationOffsetDeg = 0.0;

    let toppleProgress = 0.0;
    let toppleStartTiltDeg = baseTiltDeg;

    function resetSimulation() {
      spinSpeed = 30.0;
      precessionRate = 0.0;
      precessionAngle = 0.0;
      rotorRotation = 0.0;
      isPaused = false;
      isToppled = false;
      elapsedTime = 0.0;
      toppleProgress = 0.0;
      baseTiltDeg = tiltPresets[tiltPresetIndex];
      currentTiltDeg = baseTiltDeg;
      nutationOffsetDeg = 0.0;
      toppleStartTiltDeg = baseTiltDeg;
      updateTransforms();
    }

    function cycleTilt() {
      tiltPresetIndex = (tiltPresetIndex + 1) % tiltPresets.length;
      baseTiltDeg = tiltPresets[tiltPresetIndex];
      currentTiltDeg = baseTiltDeg;
      precessionAngle = 0.0;
      if (!isToppled) {
        toppleProgress = 0.0;
        toppleStartTiltDeg = baseTiltDeg;
      }
      updateTransforms();
    }

    function computePrecessionRate() {
      if (spinSpeed <= 0) return 0;
      return (MASS * G * D) / (I * spinSpeed);
    }

    function updateTransforms() {
      pivotGroup.rotation.y = precessionAngle;
      tiltGroup.rotation.z = -THREE.MathUtils.degToRad(currentTiltDeg);
      spinGroup.rotation.y = rotorRotation;
    }

    const hud = document.getElementById("hud");

    function updateHUD() {
      const status = isToppled ? "Toppled" : (isPaused ? "Paused" : "Spinning");
      hud.innerHTML = `
        <div><span class="label">Spin Speed:</span> ${spinSpeed.toFixed(1)} rad/s</div>
        <div><span class="label">Precession Rate:</span> ${precessionRate.toFixed(3)} rad/s</div>
        <div><span class="label">Tilt Angle:</span> ${currentTiltDeg.toFixed(1)}°</div>
        <div><span class="label">Precession Angle:</span> ${THREE.MathUtils.radToDeg(precessionAngle).toFixed(1)}°</div>
        <div><span class="label">Status:</span> ${status}</div>
      `;
    }

    function updateGlobalState() {
      window.__3D_STATE__ = {
        spinSpeed,
        precessionRate,
        tiltAngle: currentTiltDeg,
        precessionAngle: THREE.MathUtils.radToDeg(precessionAngle),
        isPaused,
        isToppled,
        trailVisible,
        elapsedTime,
        tiltPresetIndex,
        rotorRotation,
        nutationOffset: nutationOffsetDeg
      };
    }

    updateGlobalState();
    updateHUD();

    // --- Interaction ---
    window.addEventListener("keydown", (e) => {
      switch (e.code) {
        case "Space":
          e.preventDefault();
          isPaused = !isPaused;
          break;
        case "ArrowUp":
          e.preventDefault();
          spinSpeed = Math.min(60, spinSpeed + 5);
          if (spinSpeed > 0 && isToppled) {
            // allow resumed spin, but keep toppled state unless reset
          }
          break;
        case "ArrowDown":
          e.preventDefault();
          spinSpeed = Math.max(0, spinSpeed - 5);
          break;
        case "KeyR":
          resetSimulation();
          break;
        case "KeyT":
          cycleTilt();
          break;
      }
      updateHUD();
      updateGlobalState();
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(rotor, false);
      if (hits.length > 0) {
        trailVisible = !trailVisible;
        trailLine.visible = trailVisible;
        updateGlobalState();
      }
    });

    // --- Animation ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.05);

      if (!isPaused) {
        elapsedTime += dt;

        // spin decay
        if (spinSpeed > 0) {
          spinSpeed = Math.max(0, spinSpeed - 0.5 * dt);
        }

        // topple logic
        if (spinSpeed <= 0 && !isToppled) {
          isToppled = true;
          toppleProgress = 0;
          toppleStartTiltDeg = currentTiltDeg;
        }

        // precession
        precessionRate = computePrecessionRate();
        precessionAngle += precessionRate * dt;

        // nutation / tilt
        if (!isToppled) {
          nutationOffsetDeg = 2.0 * Math.sin(2 * Math.PI * 3.0 * elapsedTime);
          currentTiltDeg = baseTiltDeg + nutationOffsetDeg;
        } else {
          toppleProgress = Math.min(2.0, toppleProgress + dt);
          const alpha = toppleProgress / 2.0;
          const toppleTilt = THREE.MathUtils.lerp(toppleStartTiltDeg, 90, alpha);
          nutationOffsetDeg = 0.0;
          currentTiltDeg = toppleTilt;
        }

        // rotor spin
        rotorRotation += spinSpeed * dt;

        updateTransforms();
      } else {
        precessionRate = computePrecessionRate();
      }

      controls.update();
      updateHUD();
      updateGlobalState();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
