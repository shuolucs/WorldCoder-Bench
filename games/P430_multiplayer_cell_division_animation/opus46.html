<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Division (Mitosis) - 3D Educational Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#ui-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}

#phase-label {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 24px;
    color: white;
    text-shadow: 0 0 10px rgba(68, 204, 136, 0.8);
    letter-spacing: 3px;
    font-weight: bold;
}

#progress-container {
    position: absolute;
    top: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    overflow: hidden;
}

#progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #44cc88, #88ffcc);
    border-radius: 4px;
    transition: width 0.1s;
}

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    align-items: center;
    pointer-events: all;
}

#controls button {
    padding: 10px 24px;
    border: 1px solid rgba(68, 204, 136, 0.5);
    background: rgba(10, 10, 46, 0.8);
    color: #44cc88;
    font-size: 14px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.3s;
    font-weight: bold;
    letter-spacing: 1px;
}

#controls button:hover {
    background: rgba(68, 204, 136, 0.2);
    border-color: #44cc88;
    box-shadow: 0 0 15px rgba(68, 204, 136, 0.3);
}

#speed-container {
    display: flex;
    align-items: center;
    gap: 8px;
    color: #88ffcc;
    font-size: 13px;
}

#slider-speed {
    width: 100px;
    accent-color: #44cc88;
    pointer-events: all;
}

#p1-score {
    position: absolute;
    bottom: 80px;
    left: 30px;
    color: #ff8844;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(255, 136, 68, 0.5);
}

#p2-score {
    position: absolute;
    bottom: 80px;
    right: 30px;
    color: #4488ff;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 8px rgba(68, 136, 255, 0.5);
}

#info-panel {
    position: absolute;
    top: 90px;
    left: 20px;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    line-height: 1.8;
    max-width: 220px;
}

#player-controls-info {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    text-align: center;
}

.phase-description {
    position: absolute;
    top: 90px;
    right: 20px;
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    max-width: 250px;
    line-height: 1.6;
    text-align: right;
}
</style>
</head>
<body>

<div id="ui-overlay">
    <div id="phase-label">INTERPHASE</div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <div id="controls">
        <button id="btn-play-pause">▶ PLAY</button>
        <button id="btn-reset">↺ RESET</button>
        <div id="speed-container">
            <label for="slider-speed">Speed:</label>
            <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="speed-value">1.0x</span>
        </div>
    </div>
    <div id="p1-score">P1 (WASD/Space): 0</div>
    <div id="p2-score">P2 (Arrows/Enter): 0</div>
    <div id="player-controls-info">P1: WASD + Space | P2: Arrow Keys + Enter</div>
    <div class="phase-description" id="phase-desc"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Phase descriptions
const PHASE_DESCRIPTIONS = {
    'INTERPHASE': 'The cell grows and prepares for division. DNA is replicated. Chromosomes are loosely organized.',
    'PROPHASE': 'Chromosomes condense and become visible. The nuclear envelope begins to break down. Chromosomes duplicate.',
    'METAPHASE': 'Chromosomes align along the cell equator (metaphase plate). Spindle fibers attach to chromosomes.',
    'ANAPHASE': 'Sister chromatids separate and move to opposite poles of the cell. The cell begins to elongate.',
    'TELOPHASE': 'Nuclear envelopes reform around each set of chromosomes. The cell pinches in the middle.',
    'CYTOKINESIS': 'The cell physically divides into two daughter cells, each with a complete set of chromosomes.',
    'COMPLETE': 'Division complete! Two daughter cells formed. Players can now control their cells. Press action key to divide again!'
};

const PHASES = ['INTERPHASE', 'PROPHASE', 'METAPHASE', 'ANAPHASE', 'TELOPHASE', 'CYTOKINESIS', 'COMPLETE'];
const PHASE_DURATION = 3.0;

// State
window.__3D_STATE__ = {
    currentPhase: 'INTERPHASE',
    phaseIndex: 0,
    isPlaying: false,
    speedMultiplier: 1.0,
    phaseProgress: 0,
    chromosomeCount: 4,
    parentCellScale: { x: 1, y: 1, z: 1 },
    daughterCellsExist: false,
    daughterCellPositions: null,
    p1Score: 0,
    p2Score: 0,
    p1CellPosition: null,
    p2CellPosition: null,
    modelLoaded: false,
    totalCells: 1,
    animationTime: 0,
    boundaryEnforced: true
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 30;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(5, 10, 5);
dirLight1.castShadow = true;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x4466ff, 0.3);
dirLight2.position.set(-3, -5, -3);
scene.add(dirLight2);

// Grid helper for microscope feel
const gridHelper = new THREE.GridHelper(20, 40, 0x112244, 0x0a1133);
scene.add(gridHelper);

// Microscope circle overlay effect
const ringGeo = new THREE.RingGeometry(9, 12, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x050520, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -0.5;
scene.add(ring);

// Load GLB model
const gltfLoader = new GLTFLoader();
let specimenModel = null;

gltfLoader.load(
    'MosquitoInAmber.glb',
    (gltf) => {
        specimenModel = gltf.scene;
        specimenModel.position.set(-6, 0, -4);
        specimenModel.scale.set(0.5, 0.5, 0.5);
        scene.add(specimenModel);
        state.modelLoaded = true;

        // Add a label
        const labelSprite = createTextSprite('Preserved Specimen', 0.5);
        labelSprite.position.set(-6, 2, -4);
        scene.add(labelSprite);
    },
    undefined,
    (error) => {
        console.warn('Could not load MosquitoInAmber.glb:', error);
        // Create placeholder
        const placeholderGeo = new THREE.DodecahedronGeometry(0.8, 0);
        const placeholderMat = new THREE.MeshPhongMaterial({ color: 0xcc8833, transparent: true, opacity: 0.7 });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.set(-6, 0.8, -4);
        scene.add(placeholder);

        const amberGeo = new THREE.SphereGeometry(1.2, 16, 16);
        const amberMat = new THREE.MeshPhongMaterial({ color: 0xffaa33, transparent: true, opacity: 0.3 });
        const amber = new THREE.Mesh(amberGeo, amberMat);
        amber.position.set(-6, 0.8, -4);
        scene.add(amber);

        const labelSprite = createTextSprite('Preserved Specimen\n(Model Placeholder)', 0.5);
        labelSprite.position.set(-6, 2.5, -4);
        scene.add(labelSprite);

        state.modelLoaded = true;
    }
);

function createTextSprite(text, scale) {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 512, 128);
    ctx.font = 'bold 28px Segoe UI';
    ctx.fillStyle = '#88ffcc';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const lines = text.split('\n');
    lines.forEach((line, i) => {
        ctx.fillText(line, 256, 50 + i * 35);
    });
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(4 * scale, 1 * scale, 1);
    return sprite;
}

// Cell materials
const cellMaterial = new THREE.MeshPhongMaterial({
    color: 0x44cc88,
    transparent: true,
    opacity: 0.6,
    shininess: 80,
    side: THREE.DoubleSide
});

const chromosomeMaterial = new THREE.MeshPhongMaterial({
    color: 0xff4444,
    emissive: 0x441111,
    shininess: 60
});

const nucleusMaterial = new THREE.MeshPhongMaterial({
    color: 0x88aaff,
    transparent: true,
    opacity: 0.3,
    shininess: 100
});

// Cell class
class Cell {
    constructor(position, isParent = false) {
        this.group = new THREE.Group();
        this.group.position.copy(position);
        this.isParent = isParent;
        this.isDividing = false;
        this.divisionPhaseIndex = 0;
        this.divisionPhaseTime = 0;
        this.chromosomes = [];
        this.chromosomeTargets = [];
        this.nucleusEnvelopes = [];
        this.pinchTorus = null;

        // Cell membrane
        const cellGeo = new THREE.SphereGeometry(isParent ? 1.5 : 1.0, 32, 32);
        this.cellMesh = new THREE.Mesh(cellGeo, cellMaterial.clone());
        this.group.add(this.cellMesh);

        // Inner glow
        const glowGeo = new THREE.SphereGeometry(isParent ? 1.4 : 0.9, 16, 16);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x44cc88,
            transparent: true,
            opacity: 0.1,
            side: THREE.BackSide
        });
        this.glowMesh = new THREE.Mesh(glowGeo, glowMat);
        this.group.add(this.glowMesh);

        // Create initial chromosomes
        this.createChromosomes(4, isParent ? 1.0 : 0.6);

        scene.add(this.group);
    }

    createChromosomes(count, spread) {
        // Remove existing
        this.chromosomes.forEach(c => this.group.remove(c));
        this.chromosomes = [];
        this.chromosomeTargets = [];

        for (let i = 0; i < count; i++) {
            const chromGeo = new THREE.SphereGeometry(0.15, 12, 12);
            const chrom = new THREE.Mesh(chromGeo, chromosomeMaterial.clone());
            chrom.position.set(
                (Math.random() - 0.5) * spread,
                (Math.random() - 0.5) * spread,
                (Math.random() - 0.5) * spread
            );
            this.chromosomes.push(chrom);
            this.chromosomeTargets.push(chrom.position.clone());
            this.group.add(chrom);
        }
    }

    setChromosomeTargets(targets) {
        this.chromosomeTargets = targets;
    }

    updateChromosomes(dt) {
        for (let i = 0; i < this.chromosomes.length; i++) {
            if (this.chromosomeTargets[i]) {
                this.chromosomes[i].position.lerp(this.chromosomeTargets[i], dt * 3);
            }
        }
    }

    dispose() {
        scene.remove(this.group);
        if (this.pinchTorus) {
            this.group.remove(this.pinchTorus);
        }
        this.nucleusEnvelopes.forEach(n => this.group.remove(n));
    }
}

// Main simulation
let parentCell = null;
let daughterCells = [];
let playerCells = [null, null]; // [p1, p2]
let allCells = []; // Track all cells for counting
let phaseTime = 0;
let totalTime = 0;
let divisionComplete = false;

// Additional division cells (from player actions)
let activeDivisions = [];

const keys = {};

function init() {
    // Clear everything
    if (parentCell) parentCell.dispose();
    daughterCells.forEach(c => c.dispose());
    allCells.forEach(c => { if (c !== parentCell && !daughterCells.includes(c)) c.dispose(); });
    activeDivisions.forEach(d => {
        if (d.parentCell) d.parentCell.dispose();
        d.daughters.forEach(dc => dc.dispose());
    });

    parentCell = new Cell(new THREE.Vector3(0, 1, 0), true);
    daughterCells = [];
    playerCells = [null, null];
    allCells = [parentCell];
    activeDivisions = [];
    phaseTime = 0;
    totalTime = 0;
    divisionComplete = false;

    state.currentPhase = 'INTERPHASE';
    state.phaseIndex = 0;
    state.phaseProgress = 0;
    state.chromosomeCount = 4;
    state.parentCellScale = { x: 1, y: 1, z: 1 };
    state.daughterCellsExist = false;
    state.daughterCellPositions = null;
    state.p1Score = 0;
    state.p2Score = 0;
    state.p1CellPosition = null;
    state.p2CellPosition = null;
    state.totalCells = 1;
    state.animationTime = 0;

    updateUI();
}

function updateUI() {
    document.getElementById('phase-label').textContent = state.currentPhase;
    document.getElementById('progress-bar').style.width = state.phaseProgress + '%';
    document.getElementById('p1-score').textContent = `P1 (WASD/Space): ${state.p1Score}`;
    document.getElementById('p2-score').textContent = `P2 (Arrows/Enter): ${state.p2Score}`;
    document.getElementById('phase-desc').textContent = PHASE_DESCRIPTIONS[state.currentPhase] || '';
}

function setPhase(index) {
    state.phaseIndex = index;
    state.currentPhase = PHASES[index];
    phaseTime = 0;

    if (parentCell && index < 6) {
        applyPhaseSetup(parentCell, index);
    }
}

function applyPhaseSetup(cell, phaseIdx) {
    switch (phaseIdx) {
        case 0: // INTERPHASE
            cell.createChromosomes(4, 1.0);
            state.chromosomeCount = 4;
            break;
        case 1: // PROPHASE
            cell.createChromosomes(8, 0.6);
            state.chromosomeCount = 8;
            // Move toward center
            const prophaseTargets = [];
            for (let i = 0; i < 8; i++) {
                prophaseTargets.push(new THREE.Vector3(
                    (Math.random() - 0.5) * 0.4,
                    (Math.random() - 0.5) * 0.4,
                    (Math.random() - 0.5) * 0.4
                ));
            }
            cell.setChromosomeTargets(prophaseTargets);
            break;
        case 2: // METAPHASE
            const metaTargets = [];
            for (let i = 0; i < cell.chromosomes.length; i++) {
                metaTargets.push(new THREE.Vector3(
                    0,
                    (i / cell.chromosomes.length - 0.5) * 1.5,
                    ((i % 2) - 0.5) * 0.5
                ));
            }
            cell.setChromosomeTargets(metaTargets);
            break;
        case 3: // ANAPHASE
            const anaTargets = [];
            for (let i = 0; i < cell.chromosomes.length; i++) {
                const side = i < 4 ? -1.0 : 1.0;
                const idx = i % 4;
                anaTargets.push(new THREE.Vector3(
                    side,
                    (idx / 4 - 0.5) * 0.8,
                    ((idx % 2) - 0.5) * 0.3
                ));
            }
            cell.setChromosomeTargets(anaTargets);
            break;
        case 4: // TELOPHASE
            // Add pinch torus
            if (!cell.pinchTorus) {
                const torusGeo = new THREE.TorusGeometry(0.8, 0.08, 8, 32);
                const torusMat = new THREE.MeshPhongMaterial({ color: 0x88ffaa, transparent: true, opacity: 0.6 });
                cell.pinchTorus = new THREE.Mesh(torusGeo, torusMat);
                cell.pinchTorus.rotation.y = Math.PI / 2;
                cell.group.add(cell.pinchTorus);
            }
            // Nuclear envelopes
            cell.nucleusEnvelopes.forEach(n => cell.group.remove(n));
            cell.nucleusEnvelopes = [];
            [-1.0, 1.0].forEach(side => {
                const envGeo = new THREE.SphereGeometry(0.6, 16, 16);
                const envMesh = new THREE.Mesh(envGeo, nucleusMaterial.clone());
                envMesh.position.set(side, 0, 0);
                cell.group.add(envMesh);
                cell.nucleusEnvelopes.push(envMesh);
            });
            break;
    }
}

function updatePhaseAnimation(dt) {
    if (!parentCell || divisionComplete) return;

    const t = phaseTime / PHASE_DURATION; // 0 to 1

    switch (state.phaseIndex) {
        case 0: // INTERPHASE
            parentCell.cellMesh.scale.set(1, 1, 1);
            // Gentle pulsing
            const pulse = 1.0 + Math.sin(totalTime * 2) * 0.03;
            parentCell.cellMesh.scale.multiplyScalar(pulse);
            parentCell.glowMesh.scale.copy(parentCell.cellMesh.scale);
            // Chromosomes drift
            parentCell.chromosomes.forEach((c, i) => {
                c.position.x += Math.sin(totalTime + i) * dt * 0.1;
                c.position.y += Math.cos(totalTime + i * 1.5) * dt * 0.1;
                c.position.z += Math.sin(totalTime * 0.7 + i * 2) * dt * 0.1;
                // Keep inside cell
                const maxR = 1.0;
                if (c.position.length() > maxR) {
                    c.position.normalize().multiplyScalar(maxR);
                }
            });
            state.parentCellScale = { x: pulse, y: pulse, z: pulse };
            break;

        case 1: // PROPHASE
            const prophaseScale = 1.0 + t * 0.1;
            parentCell.cellMesh.scale.set(prophaseScale, prophaseScale, prophaseScale);
            parentCell.glowMesh.scale.copy(parentCell.cellMesh.scale);
            parentCell.updateChromosomes(dt);
            // Chromosomes glow more
            parentCell.chromosomes.forEach(c => {
                c.material.emissive.setHex(0x661111);
                c.material.emissiveIntensity = 0.5 + t * 0.5;
            });
            state.parentCellScale = { x: prophaseScale, y: prophaseScale, z: prophaseScale };
            break;

        case 2: // METAPHASE
            const metaScale = 1.1 + t * 0.05;
            parentCell.cellMesh.scale.set(metaScale, metaScale, metaScale);
            parentCell.glowMesh.scale.copy(parentCell.cellMesh.scale);
            parentCell.updateChromosomes(dt);
            state.parentCellScale = { x: metaScale, y: metaScale, z: metaScale };
            break;

        case 3: // ANAPHASE
            const scaleX = 1.15 + t * 0.35;
            const scaleY = 1.15 - t * 0.3;
            const scaleZ = 1.15 - t * 0.15;
            parentCell.cellMesh.scale.set(scaleX, scaleY, scaleZ);
            parentCell.glowMesh.scale.copy(parentCell.cellMesh.scale);
            parentCell.updateChromosomes(dt);
            state.parentCellScale = { x: scaleX, y: scaleY, z: scaleZ };
            break;

        case 4: // TELOPHASE
            const teloScaleX = 1.5 + t * 0.2;
            const teloScaleY = 0.85 - t * 0.15;
            parentCell.cellMesh.scale.set(teloScaleX, teloScaleY, teloScaleY);
            parentCell.glowMesh.scale.copy(parentCell.cellMesh.scale);
            // Pinch gets tighter
            if (parentCell.pinchTorus) {
                const pinchScale = 1.0 - t * 0.4;
                parentCell.pinchTorus.scale.set(pinchScale, 1, pinchScale);
                parentCell.pinchTorus.material.opacity = 0.3 + t * 0.5;
            }
            parentCell.updateChromosomes(dt);
            state.parentCellScale = { x: teloScaleX, y: teloScaleY, z: teloScaleY };
            break;

        case 5: // CYTOKINESIS
            // Split into two daughter cells
            const separation = t * 2.5;
            parentCell.cellMesh.material.opacity = 0.6 * (1 - t);
            parentCell.glowMesh.material.opacity = 0.1 * (1 - t);

            if (parentCell.pinchTorus) {
                parentCell.pinchTorus.material.opacity = (1 - t) * 0.8;
            }
            parentCell.nucleusEnvelopes.forEach(n => {
                n.material.opacity = 0.3 * (1 - t);
            });

            // Create daughter cells at the right moment
            if (t > 0.3 && daughterCells.length === 0) {
                const basePos = parentCell.group.position.clone();

                const d1 = new Cell(new THREE.Vector3(basePos.x - 1.5, basePos.y, basePos.z), false);
                const d2 = new Cell(new THREE.Vector3(basePos.x + 1.5, basePos.y, basePos.z), false);
                d1.cellMesh.material.color.setHex(0xff8844);
                d1.glowMesh.material.color.setHex(0xff8844);
                d2.cellMesh.material.color.setHex(0x4488ff);
                d2.glowMesh.material.color.setHex(0x4488ff);

                daughterCells.push(d1, d2);
                allCells.push(d1, d2);
            }

            if (daughterCells.length === 2) {
                const basePos = parentCell.group.position.clone();
                daughterCells[0].group.position.x = basePos.x - separation;
                daughterCells[1].group.position.x = basePos.x + separation;

                // Scale up daughter cells
                const dScale = Math.min(t * 2, 1.0);
                daughterCells.forEach(d => {
                    d.cellMesh.scale.setScalar(dScale);
                    d.glowMesh.scale.setScalar(dScale);
                    d.cellMesh.material.opacity = 0.6 * dScale;
                });
            }

            // Hide parent chromosomes
            parentCell.chromosomes.forEach(c => {
                c.material.opacity = 1 - t;
                c.material.transparent = true;
            });

            state.parentCellScale = { x: 1, y: 1, z: 1 };
            break;
    }
}

function completePhase() {
    if (state.phaseIndex === 5) {
        // CYTOKINESIS complete
        divisionComplete = true;
        state.currentPhase = 'COMPLETE';
        state.phaseIndex = 6;
        state.daughterCellsExist = true;

        // Remove parent cell visuals
        if (parentCell) {
            parentCell.cellMesh.visible = false;
            parentCell.glowMesh.visible = false;
            parentCell.chromosomes.forEach(c => c.visible = false);
            if (parentCell.pinchTorus) parentCell.pinchTorus.visible = false;
            parentCell.nucleusEnvelopes.forEach(n => n.visible = false);
        }

        // Assign player cells
        if (daughterCells.length === 2) {
            playerCells[0] = daughterCells[0];
            playerCells[1] = daughterCells[1];

            state.p1CellPosition = {
                x: daughterCells[0].group.position.x,
                y: daughterCells[0].group.position.y,
                z: daughterCells[0].group.position.z
            };
            state.p2CellPosition = {
                x: daughterCells[1].group.position.x,
                y: daughterCells[1].group.position.y,
                z: daughterCells[1].group.position.z
            };

            state.daughterCellPositions = [
                { ...state.p1CellPosition },
                { ...state.p2CellPosition }
            ];
        }

        state.totalCells = allCells.filter(c => c.cellMesh.visible !== false).length;
    } else if (state.phaseIndex < 5) {
        setPhase(state.phaseIndex + 1);
    }
}

function handlePlayerMovement(dt) {
    const speed = 4.0 * dt;
    const bounds = 8;

    // Player 1 - WASD
    if (playerCells[0]) {
        const p1 = playerCells[0].group.position;
        if (keys['KeyW'] || keys['w']) p1.z -= speed;
        if (keys['KeyS'] || keys['s']) p1.z += speed;
        if (keys['KeyA'] || keys['a']) p1.x -= speed;
        if (keys['KeyD'] || keys['d']) p1.x += speed;

        if (state.boundaryEnforced) {
            p1.x = Math.max(-bounds, Math.min(bounds, p1.x));
            p1.z = Math.max(-bounds, Math.min(bounds, p1.z));
        }

        state.p1CellPosition = { x: p1.x, y: p1.y, z: p1.z };
    }

    // Player 2 - Arrow keys
    if (playerCells[1]) {
        const p2 = playerCells[1].group.position;
        if (keys['ArrowUp']) p2.z -= speed;
        if (keys['ArrowDown']) p2.z += speed;
        if (keys['ArrowLeft']) p2.x -= speed;
        if (keys['ArrowRight']) p2.x += speed;

        if (state.boundaryEnforced) {
            p2.x = Math.max(-bounds, Math.min(bounds, p2.x));
            p2.z = Math.max(-bounds, Math.min(bounds, p2.z));
        }

        state.p2CellPosition = { x: p2.x, y: p2.y, z: p2.z };
    }
}

// Player action: trigger division of their cell
function triggerPlayerDivision(playerIndex) {
    const cell = playerCells[playerIndex];
    if (!cell || cell.isDividing) return;

    cell.isDividing = true;

    if (playerIndex === 0) state.p1Score++;
    else state.p2Score++;

    // Simple division animation
    const division = {
        playerIndex,
        parentCell: cell,
        time: 0,
        duration: 2.0,
        daughters: [],
        startPos: cell.group.position.clone(),
        complete: false
    };

    activeDivisions.push(division);
}

function updateActiveDivisions(dt) {
    for (let i = activeDivisions.length - 1; i >= 0; i--) {
        const div = activeDivisions[i];
        div.time += dt * state.speedMultiplier;
        const t = Math.min(div.time / div.duration, 1.0);

        if (t < 0.5) {
            // Elongate
            const elongate = 1.0 + t * 1.0;
            const squish = 1.0 - t * 0.3;
            div.parentCell.cellMesh.scale.set(elongate, squish, squish);
            div.parentCell.glowMesh.scale.copy(div.parentCell.cellMesh.scale);
        } else if (t >= 0.5 && div.daughters.length === 0) {
            // Create daughters
            const pos = div.startPos;
            const color1 = div.playerIndex === 0 ? 0xff8844 : 0x4488ff;
            const color2 = div.playerIndex === 0 ? 0xffaa66 : 0x66aaff;

            const d1 = new Cell(new THREE.Vector3(pos.x - 0.5, pos.y, pos.z), false);
            const d2 = new Cell(new THREE.Vector3(pos.x + 0.5, pos.y, pos.z), false);
            d1.cellMesh.material.color.setHex(color1);
            d1.glowMesh.material.color.setHex(color1);
            d2.cellMesh.material.color.setHex(color2);
            d2.glowMesh.material.color.setHex(color2);

            div.daughters.push(d1, d2);
            allCells.push(d1, d2);

            // Hide parent
            div.parentCell.cellMesh.visible = false;
            div.parentCell.glowMesh.visible = false;
            div.parentCell.chromosomes.forEach(c => c.visible = false);
        }

        if (div.daughters.length === 2 && t >= 0.5) {
            const sepT = (t - 0.5) * 2;
            const sep = sepT * 1.5;
            div.daughters[0].group.position.x = div.startPos.x - sep;
            div.daughters[1].group.position.x = div.startPos.x + sep;

            const dScale = Math.min(sepT * 2, 1.0);
            div.daughters.forEach(d => {
                d.cellMesh.scale.setScalar(dScale);
                d.glowMesh.scale.setScalar(dScale);
                d.cellMesh.material.opacity = 0.6 * dScale;
            });
        }

        if (t >= 1.0 && !div.complete) {
            div.complete = true;
            div.parentCell.isDividing = false;

            // Assign one daughter as the new player cell
            if (div.daughters.length === 2) {
                playerCells[div.playerIndex] = div.daughters[0];
                // The other daughter just stays
            }

            state.totalCells = allCells.filter(c => c.cellMesh.visible !== false).length;
            activeDivisions.splice(i, 1);
        }
    }
}

// Input handling
document.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    keys[e.key] = true;

    if (e.code === 'Space' && divisionComplete) {
        e.preventDefault();
        triggerPlayerDivision(0);
    }
    if (e.code === 'Enter' && divisionComplete) {
        e.preventDefault();
        triggerPlayerDivision(1);
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    keys[e.key] = false;
});

// UI buttons
document.getElementById('btn-play-pause').addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    document.getElementById('btn-play-pause').textContent = state.isPlaying ? '⏸ PAUSE' : '▶ PLAY';
});

document.getElementById('btn-reset').addEventListener('click', () => {
    state.isPlaying = false;
    document.getElementById('btn-play-pause').textContent = '▶ PLAY';
    init();
});

document.getElementById('slider-speed').addEventListener('input', (e) => {
    state.speedMultiplier = parseFloat(e.target.value);
    document.getElementById('speed-value').textContent = state.speedMultiplier.toFixed(1) + 'x';
});

// Particle system for ambiance
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);

for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 20;
    particlePositions[i * 3 + 1] = Math.random() * 10;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
    particleSizes[i] = Math.random() * 3 + 1;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

const particleMat = new THREE.PointsMaterial({
    color: 0x44cc88,
    size: 0.05,
    transparent: true,
    opacity: 0.3,
    blending: THREE.AdditiveBlending
});

const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Spindle fibers (visible during metaphase/anaphase)
const spindleGroup = new THREE.Group();
scene.add(spindleGroup);

function updateSpindleFibers() {
    // Clear existing
    while (spindleGroup.children.length > 0) {
        spindleGroup.remove(spindleGroup.children[0]);
    }

    if (!parentCell || divisionComplete) return;

    if (state.phaseIndex >= 2 && state.phaseIndex <= 4) {
        const fiberMat = new THREE.LineBasicMaterial({
            color: 0x88ffcc,
            transparent: true,
            opacity: 0.3
        });

        parentCell.chromosomes.forEach(chrom => {
            const worldPos = new THREE.Vector3();
            chrom.getWorldPosition(worldPos);

            // Draw fiber to poles
            [-2.5, 2.5].forEach(poleX => {
                const polePos = parentCell.group.position.clone();
                polePos.x += poleX;

                const points = [worldPos, polePos];
                const geo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(geo, fiberMat);
                spindleGroup.add(line);
            });
        });
    }
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    totalTime += dt;
    state.animationTime = totalTime;

    // Update particles
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += dt * 0.1;
        if (positions[i * 3 + 1] > 10) positions[i * 3 + 1] = 0;
    }
    particles.geometry.attributes.position.needsUpdate = true;
    particles.rotation.y += dt * 0.02;

    // Rotate specimen model
    if (specimenModel) {
        specimenModel.rotation.y += dt * 0.3;
    }

    if (state.isPlaying && !divisionComplete) {
        const scaledDt = dt * state.speedMultiplier;
        phaseTime += scaledDt;

        state.phaseProgress = Math.min((phaseTime / PHASE_DURATION) * 100, 100);

        updatePhaseAnimation(scaledDt);
        updateSpindleFibers();

        if (phaseTime >= PHASE_DURATION) {
            completePhase();
        }
    }

    // Player movement (always active after division)
    if (divisionComplete) {
        handlePlayerMovement(dt);
        updateActiveDivisions(dt);

        // Gentle bobbing for player cells
        playerCells.forEach((cell, idx) => {
            if (cell && cell.cellMesh.visible !== false) {
                cell.group.position.y = 1 + Math.sin(totalTime * 2 + idx * Math.PI) * 0.1;
                // Gentle rotation
                cell.chromosomes.forEach((c, i) => {
                    c.position.x += Math.sin(totalTime * 1.5 + i) * dt * 0.05;
                    c.position.y += Math.cos(totalTime * 1.5 + i * 1.3) * dt * 0.05;
                    c.position.z += Math.sin(totalTime + i * 2.1) * dt * 0.05;
                    const maxR = 0.5;
                    if (c.position.length() > maxR) c.position.normalize().multiplyScalar(maxR);
                });
            }
        });
    }

    // Update state
    state.totalCells = allCells.filter(c => c.cellMesh.visible !== false).length;
    if (state.daughterCellsExist && daughterCells.length === 2) {
        state.daughterCellPositions = daughterCells.map(d => ({
            x: d.group.position.x,
            y: d.group.position.y,
            z: d.group.position.z
        }));
    }

    updateUI();
    controls.update();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize and start
init();
animate();

</script>
</body>
</html>
