<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cell Division (Mitosis) Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel {
            background: rgba(10, 10, 46, 0.7);
            border: 1px solid #44cc88;
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px;
        }
        #phase-container {
            text-align: center;
            flex-grow: 1;
        }
        #phase-label {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ffffff;
            text-shadow: 0 0 10px #44cc88;
        }
        #controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 200px;
        }
        #scores {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 200px;
            text-align: right;
        }
        .score-box {
            font-size: 18px;
        }
        .score-val {
            font-size: 24px;
            font-weight: bold;
            color: #ff4444;
        }
        #p1-score-box .score-val { color: #44cc88; }
        #p2-score-box .score-val { color: #4488ff; }
        
        button {
            background: #44cc88;
            color: #0a0a2e;
            border: none;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #55dd99; }
        
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 12px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        
        #bottom-bar {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        #progress-container {
            width: 60%;
            height: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid #44cc88;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #44cc88;
            transition: width 0.1s linear;
        }
        #instructions {
            font-size: 12px;
            color: #aaaaaa;
            text-align: center;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: white;
            font-family: monospace;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div id="top-bar">
            <div id="controls" class="panel">
                <button id="btn-play-pause">Pause</button>
                <button id="btn-reset">Reset Simulation</button>
                <div class="slider-container">
                    <label for="slider-speed">Speed: <span id="speed-val">1.0</span>x</label>
                    <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
                </div>
            </div>
            
            <div id="phase-container">
                <div id="phase-label">INTERPHASE</div>
            </div>
            
            <div id="scores" class="panel">
                <div id="p1-score-box" class="score-box">
                    P1 Score: <span id="p1-score" class="score-val">0</span>
                </div>
                <div id="p2-score-box" class="score-box">
                    P2 Score: <span id="p2-score" class="score-val">0</span>
                </div>
            </div>
        </div>

        <div id="bottom-bar">
            <div id="progress-container">
                <div id="progress-bar"></div>
            </div>
            <div id="instructions">
                Multiplayer unlocks after first division.<br>
                P1: <span class="key">WASD</span> to move, <span class="key">Space</span> to divide. | 
                P2: <span class="key">Arrows</span> to move, <span class="key">Enter</span> to divide.
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            currentPhase: 'INTERPHASE',
            phaseIndex: 0,
            isPlaying: true,
            speedMultiplier: 1.0,
            phaseProgress: 0,
            chromosomeCount: 4,
            parentCellScale: {x: 1, y: 1, z: 1},
            daughterCellsExist: false,
            daughterCellPositions: null,
            p1Score: 0,
            p2Score: 0,
            p1CellPosition: null,
            p2CellPosition: null,
            modelLoaded: false,
            totalCells: 1,
            animationTime: 0,
            boundaryEnforced: true
        };

        const PHASE_NAMES = ['INTERPHASE', 'PROPHASE', 'METAPHASE', 'ANAPHASE', 'TELOPHASE', 'CYTOKINESIS', 'COMPLETE'];
        const PHASE_DURATION = 3.0;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLightTop = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLightTop.position.set(0, 10, 5);
        scene.add(dirLightTop);

        const dirLightBottom = new THREE.DirectionalLight(0x4488ff, 0.3);
        dirLightBottom.position.set(0, -10, -5);
        scene.add(dirLightBottom);

        // Grid helper for reference
        const gridHelper = new THREE.GridHelper(20, 20, 0x44cc88, 0x224433);
        gridHelper.position.y = -2;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- MODEL LOADING ---
        const loader = new GLTFLoader();
        loader.load('MosquitoInAmber.glb', (gltf) => {
            const model = gltf.scene;
            model.position.set(-6, 0, -4);
            model.scale.set(0.5, 0.5, 0.5);
            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.log('MosquitoInAmber.glb not found. Proceeding without reference model.');
        });

        // --- CELL CLASS ---
        class Cell {
            constructor(position, radius, isMain, playerNum = 0) {
                this.group = new THREE.Group();
                this.group.position.copy(position);
                scene.add(this.group);

                this.radius = radius;
                this.isMain = isMain;
                this.playerNum = playerNum;

                // Materials
                this.membraneMat = new THREE.MeshPhongMaterial({ 
                    color: 0x44cc88, 
                    transparent: true, 
                    opacity: 0.6, 
                    shininess: 100,
                    side: THREE.DoubleSide
                });
                if (playerNum === 2) this.membraneMat.color.setHex(0x4488ff);

                this.chromMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
                this.envMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.4 });

                // Main Membrane
                this.mesh = new THREE.Mesh(new THREE.SphereGeometry(radius, 32, 32), this.membraneMat);
                this.group.add(this.mesh);

                // Chromosomes
                this.chromosomes = [];
                this.createChromosomes(4);

                // Telophase Pinch
                this.pinch = new THREE.Mesh(new THREE.TorusGeometry(radius * 0.9, 0.1, 16, 32), this.membraneMat);
                this.pinch.rotation.y = Math.PI / 2;
                this.pinch.visible = false;
                this.group.add(this.pinch);

                // Nuclear Envelopes
                this.envLeft = new THREE.Mesh(new THREE.SphereGeometry(radius * 0.4, 16, 16), this.envMat);
                this.envRight = this.envLeft.clone();
                this.envLeft.visible = false;
                this.envRight.visible = false;
                this.group.add(this.envLeft);
                this.group.add(this.envRight);

                // Cytokinesis Daughters (Visual only)
                this.d1 = null;
                this.d2 = null;

                // State
                this.phaseIndex = 0;
                this.timer = 0;
                this.isDividing = isMain;
                this.randomOffsets = Array(8).fill(0).map(() => new THREE.Vector3((Math.random()-0.5), (Math.random()-0.5), (Math.random()-0.5)));
            }

            createChromosomes(count) {
                this.chromosomes.forEach(c => this.group.remove(c));
                this.chromosomes = [];
                const geo = new THREE.SphereGeometry(0.15, 16, 16);
                for(let i=0; i<count; i++) {
                    const c = new THREE.Mesh(geo, this.chromMat);
                    this.chromosomes.push(c);
                    this.group.add(c);
                }
            }

            startDivision() {
                if (!this.isDividing && this.phaseIndex === 0) {
                    this.isDividing = true;
                    this.timer = 0;
                }
            }

            update(dt, speed) {
                if (!this.isDividing) {
                    this.wobbleChromosomes(dt * speed);
                    return;
                }

                if (this.phaseIndex >= 6) return;

                this.timer += dt * speed;
                let progress = this.timer / PHASE_DURATION;

                if (progress >= 1.0) {
                    this.timer = 0;
                    this.phaseIndex++;
                    progress = 0;
                    this.onPhaseStart(this.phaseIndex);
                }

                this.animatePhase(this.phaseIndex, progress);
            }

            onPhaseStart(phase) {
                if (phase === 1) {
                    this.createChromosomes(8);
                } else if (phase === 4) {
                    this.pinch.visible = true;
                    this.envLeft.visible = true;
                    this.envRight.visible = true;
                } else if (phase === 5) {
                    this.mesh.visible = false;
                    this.pinch.visible = false;
                    this.envLeft.visible = false;
                    this.envRight.visible = false;
                    this.chromosomes.forEach(c => c.visible = false);
                    this.spawnVisualDaughters();
                } else if (phase === 6) {
                    if (this.isMain) {
                        initMultiplayer(this);
                    } else {
                        this.resetToInterphase();
                    }
                }
            }

            spawnVisualDaughters() {
                const geo = new THREE.SphereGeometry(this.radius * 0.66, 32, 32);
                this.d1 = new THREE.Mesh(geo, this.membraneMat);
                this.d2 = new THREE.Mesh(geo, this.membraneMat);
                this.d1.position.x = -1.0;
                this.d2.position.x = 1.0;
                this.group.add(this.d1);
                this.group.add(this.d2);

                const cGeo = new THREE.SphereGeometry(0.15, 16, 16);
                for(let i=0; i<4; i++) {
                    let c1 = new THREE.Mesh(cGeo, this.chromMat);
                    c1.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
                    this.d1.add(c1);
                    let c2 = new THREE.Mesh(cGeo, this.chromMat);
                    c2.position.set((Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5, (Math.random()-0.5)*0.5);
                    this.d2.add(c2);
                }
            }

            resetToInterphase() {
                this.phaseIndex = 0;
                this.timer = 0;
                this.isDividing = false;
                this.mesh.visible = true;
                this.mesh.scale.set(1,1,1);
                this.createChromosomes(4);
                if (this.d1) { this.group.remove(this.d1); this.d1 = null; }
                if (this.d2) { this.group.remove(this.d2); this.d2 = null; }
            }

            wobbleChromosomes(dt) {
                this.chromosomes.forEach((c, i) => {
                    const target = this.randomOffsets[i];
                    c.position.lerp(target, dt * 0.5);
                    if (c.position.distanceTo(target) < 0.1) {
                        target.set((Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8, (Math.random()-0.5)*0.8);
                    }
                });
            }

            animatePhase(phase, t) {
                const easeInOut = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                if (phase === 0) {
                    this.wobbleChromosomes(0.016);
                } else if (phase === 1) {
                    let s = 1.0 + 0.1 * easeInOut;
                    this.mesh.scale.set(s, s, s);
                    this.chromosomes.forEach(c => c.position.lerp(new THREE.Vector3(0,0,0), 0.05));
                } else if (phase === 2) {
                    let s = 1.1 + 0.05 * easeInOut;
                    this.mesh.scale.set(s, s, s);
                    this.chromosomes.forEach((c, i) => {
                        let angle = (i / 8) * Math.PI * 2;
                        let target = new THREE.Vector3(0, Math.cos(angle)*0.7, Math.sin(angle)*0.7);
                        c.position.lerp(target, 0.1);
                    });
                } else if (phase === 3) {
                    let sx = 1.15 + (1.5 - 1.15) * easeInOut;
                    let sy = 1.15 + (0.85 - 1.15) * easeInOut;
                    this.mesh.scale.set(sx, sy, sy);
                    this.chromosomes.forEach((c, i) => {
                        let dir = i < 4 ? -1 : 1;
                        let target = new THREE.Vector3(dir * 1.0, c.position.y, c.position.z);
                        c.position.lerp(target, 0.1);
                    });
                } else if (phase === 4) {
                    let pinchScale = 1.0 - 0.9 * easeInOut;
                    this.pinch.scale.set(pinchScale, pinchScale, pinchScale);
                    this.envLeft.position.set(-1.0, 0, 0);
                    this.envRight.position.set(1.0, 0, 0);
                    this.envLeft.scale.set(easeInOut, easeInOut, easeInOut);
                    this.envRight.scale.set(easeInOut, easeInOut, easeInOut);
                } else if (phase === 5) {
                    if (this.d1 && this.d2) {
                        let targetX = this.isMain ? 2.5 : 1.5;
                        this.d1.position.x = -1.0 - (targetX - 1.0) * easeInOut;
                        this.d2.position.x = 1.0 + (targetX - 1.0) * easeInOut;
                    }
                }
            }

            destroy() {
                scene.remove(this.group);
            }
        }

        // --- SIMULATION STATE ---
        let mainCell = new Cell(new THREE.Vector3(0,0,0), 1.5, true);
        let p1Cell = null;
        let p2Cell = null;

        function initMultiplayer(oldMainCell) {
            oldMainCell.destroy();
            mainCell = null;
            p1Cell = new Cell(new THREE.Vector3(-2.5, 0, 0), 1.0, false, 1);
            p2Cell = new Cell(new THREE.Vector3(2.5, 0, 0), 1.0, false, 2);
            window.__3D_STATE__.daughterCellsExist = true;
        }

        function resetSimulation() {
            if (mainCell) mainCell.destroy();
            if (p1Cell) p1Cell.destroy();
            if (p2Cell) p2Cell.destroy();
            
            mainCell = new Cell(new THREE.Vector3(0,0,0), 1.5, true);
            p1Cell = null;
            p2Cell = null;
            
            window.__3D_STATE__.p1Score = 0;
            window.__3D_STATE__.p2Score = 0;
            window.__3D_STATE__.animationTime = 0;
            window.__3D_STATE__.daughterCellsExist = false;
            window.__3D_STATE__.phaseIndex = 0;
            window.__3D_STATE__.currentPhase = 'INTERPHASE';
            
            document.getElementById('p1-score').innerText = '0';
            document.getElementById('p2-score').innerText = '0';
        }

        // --- INPUT HANDLING ---
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            
            if (window.__3D_STATE__.daughterCellsExist) {
                if (e.code === 'Space' && p1Cell && !p1Cell.isDividing) {
                    p1Cell.startDivision();
                    window.__3D_STATE__.p1Score++;
                    document.getElementById('p1-score').innerText = window.__3D_STATE__.p1Score;
                }
                if (e.code === 'Enter' && p2Cell && !p2Cell.isDividing) {
                    p2Cell.startDivision();
                    window.__3D_STATE__.p2Score++;
                    document.getElementById('p2-score').innerText = window.__3D_STATE__.p2Score;
                }
            }
        });
        window.addEventListener('keyup', (e) => { keys[e.key] = false; });

        function handleMovement(dt) {
            if (!window.__3D_STATE__.daughterCellsExist) return;
            const speed = 5 * dt;
            
            if (p1Cell) {
                if (keys['w']) p1Cell.group.position.z -= speed;
                if (keys['s']) p1Cell.group.position.z += speed;
                if (keys['a']) p1Cell.group.position.x -= speed;
                if (keys['d']) p1Cell.group.position.x += speed;
                p1Cell.group.position.x = THREE.MathUtils.clamp(p1Cell.group.position.x, -8, 8);
                p1Cell.group.position.z = THREE.MathUtils.clamp(p1Cell.group.position.z, -8, 8);
            }
            
            if (p2Cell) {
                if (keys['ArrowUp']) p2Cell.group.position.z -= speed;
                if (keys['ArrowDown']) p2Cell.group.position.z += speed;
                if (keys['ArrowLeft']) p2Cell.group.position.x -= speed;
                if (keys['ArrowRight']) p2Cell.group.position.x += speed;
                p2Cell.group.position.x = THREE.MathUtils.clamp(p2Cell.group.position.x, -8, 8);
                p2Cell.group.position.z = THREE.MathUtils.clamp(p2Cell.group.position.z, -8, 8);
            }
        }

        // --- UI BINDINGS ---
        document.getElementById('btn-play-pause').addEventListener('click', (e) => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            e.target.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
        });

        document.getElementById('btn-reset').addEventListener('click', resetSimulation);

        document.getElementById('slider-speed').addEventListener('input', (e) => {
            window.__3D_STATE__.speedMultiplier = parseFloat(e.target.value);
            document.getElementById('speed-val').innerText = window.__3D_STATE__.speedMultiplier.toFixed(1);
        });

        // --- RENDER LOOP ---
        const clock = new THREE.Clock();

        function updateStateAndUI() {
            let activeCell = mainCell;
            if (!activeCell && p1Cell && p1Cell.isDividing) activeCell = p1Cell;
            if (!activeCell && p2Cell && p2Cell.isDividing) activeCell = p2Cell;

            if (activeCell) {
                window.__3D_STATE__.phaseIndex = activeCell.phaseIndex;
                window.__3D_STATE__.currentPhase = PHASE_NAMES[activeCell.phaseIndex] || 'COMPLETE';
                window.__3D_STATE__.phaseProgress = (activeCell.timer / PHASE_DURATION) * 100;
                window.__3D_STATE__.chromosomeCount = activeCell.chromosomes.length;
                if (activeCell === mainCell) {
                    window.__3D_STATE__.parentCellScale = {x: activeCell.mesh.scale.x, y: activeCell.mesh.scale.y, z: activeCell.mesh.scale.z};
                }
            } else if (window.__3D_STATE__.daughterCellsExist) {
                window.__3D_STATE__.phaseIndex = 0;
                window.__3D_STATE__.currentPhase = 'INTERPHASE (READY)';
                window.__3D_STATE__.phaseProgress = 0;
            }

            if (p1Cell && p2Cell) {
                window.__3D_STATE__.daughterCellPositions = [
                    {x: p1Cell.group.position.x, y: p1Cell.group.position.y, z: p1Cell.group.position.z},
                    {x: p2Cell.group.position.x, y: p2Cell.group.position.y, z: p2Cell.group.position.z}
                ];
                window.__3D_STATE__.p1CellPosition = window.__3D_STATE__.daughterCellPositions[0];
                window.__3D_STATE__.p2CellPosition = window.__3D_STATE__.daughterCellPositions[1];
                window.__3D_STATE__.totalCells = 2;
            } else {
                window.__3D_STATE__.totalCells = 1;
            }

            // Update DOM
            document.getElementById('phase-label').innerText = window.__3D_STATE__.currentPhase;
            document.getElementById('progress-bar').style.width = `${Math.min(100, window.__3D_STATE__.phaseProgress)}%`;
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            
            if (window.__3D_STATE__.isPlaying) {
                window.__3D_STATE__.animationTime += dt;
                const speed = window.__3D_STATE__.speedMultiplier;
                
                if (mainCell) mainCell.update(dt, speed);
                if (p1Cell) p1Cell.update(dt, speed);
                if (p2Cell) p2Cell.update(dt, speed);
                
                handleMovement(dt);
            }
            
            updateStateAndUI();
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
