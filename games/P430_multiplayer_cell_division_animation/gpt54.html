<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Mitosis Educational Animation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
    }

    #phase-label {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(0,0,0,0.8);
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 14px;
      left: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.08);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      pointer-events: auto;
    }

    button, input[type="range"] {
      pointer-events: auto;
    }

    button {
      background: #1f3b6d;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #295291;
    }

    label {
      font-size: 14px;
    }

    #scores {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255,255,255,0.08);
      padding: 10px 12px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      pointer-events: none;
      min-width: 150px;
    }

    #progress-container {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      width: min(600px, 80vw);
      height: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.2);
      pointer-events: none;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #44cc88, #88aaff);
      transition: width 0.05s linear;
    }

    #help {
      position: absolute;
      left: 14px;
      bottom: 14px;
      background: rgba(255,255,255,0.08);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      max-width: 360px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="phase-label">INTERPHASE</div>

    <div id="controls">
      <button id="btn-play-pause">Pause</button>
      <button id="btn-reset">Reset</button>
      <label>
        Speed
        <input id="slider-speed" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
      </label>
    </div>

    <div id="scores">
      <div id="p1-score">Player 1 Score: 0</div>
      <div id="p2-score">Player 2 Score: 0</div>
    </div>

    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>

    <div id="help">
      <strong>Controls</strong><br />
      Orbit: mouse drag<br />
      After cytokinesis:<br />
      P1 Move: WASD, Divide: Space<br />
      P2 Move: Arrow Keys, Divide: Enter
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const PHASES = [
      "INTERPHASE",
      "PROPHASE",
      "METAPHASE",
      "ANAPHASE",
      "TELOPHASE",
      "CYTOKINESIS",
      "COMPLETE"
    ];
    const PHASE_DURATION = 3.0;
    const BOUNDS = 8;

    const phaseLabel = document.getElementById("phase-label");
    const playPauseBtn = document.getElementById("btn-play-pause");
    const resetBtn = document.getElementById("btn-reset");
    const speedSlider = document.getElementById("slider-speed");
    const progressBar = document.getElementById("progress-bar");
    const p1ScoreEl = document.getElementById("p1-score");
    const p2ScoreEl = document.getElementById("p2-score");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLightTop = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLightTop.position.set(0, 8, 4);
    scene.add(dirLightTop);

    const dirLightBottom = new THREE.DirectionalLight(0x6699ff, 0.3);
    dirLightBottom.position.set(0, -6, -3);
    scene.add(dirLightBottom);

    const grid = new THREE.GridHelper(20, 20, 0x224466, 0x112244);
    grid.position.y = -2.5;
    grid.material.transparent = true;
    grid.material.opacity = 0.15;
    scene.add(grid);

    const root = new THREE.Group();
    scene.add(root);

    const cellMaterial = new THREE.MeshPhongMaterial({
      color: 0x44cc88,
      transparent: true,
      opacity: 0.6,
      shininess: 80,
      side: THREE.DoubleSide
    });

    const chromosomeMaterial = new THREE.MeshPhongMaterial({
      color: 0xff4444,
      emissive: 0x440000,
      shininess: 100
    });

    const nucleusMaterial = new THREE.MeshPhongMaterial({
      color: 0x99ddff,
      transparent: true,
      opacity: 0.22,
      side: THREE.DoubleSide
    });

    const daughterMaterial1 = new THREE.MeshPhongMaterial({
      color: 0x44cc88,
      transparent: true,
      opacity: 0.6
    });

    const daughterMaterial2 = new THREE.MeshPhongMaterial({
      color: 0x66aaff,
      transparent: true,
      opacity: 0.6
    });

    const parentCell = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 48, 48),
      cellMaterial
    );
    root.add(parentCell);

    const pinchTorus = new THREE.Mesh(
      new THREE.TorusGeometry(0.7, 0.05, 16, 64),
      new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.0
      })
    );
    pinchTorus.rotation.y = Math.PI / 2;
    root.add(pinchTorus);

    const nucleusLeft = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), nucleusMaterial);
    const nucleusRight = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), nucleusMaterial);
    nucleusLeft.visible = false;
    nucleusRight.visible = false;
    root.add(nucleusLeft, nucleusRight);

    let chromosomes = [];
    let chromosomeTargets = [];
    let interphaseTargets = [];
    let metaphaseTargets = [];
    let anaphaseTargets = [];

    function randomInsideSphere(radius = 0.9) {
      const u = Math.random();
      const v = Math.random();
      const theta = u * Math.PI * 2;
      const phi = Math.acos(2 * v - 1);
      const r = Math.cbrt(Math.random()) * radius;
      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
    }

    function createChromosome(position = new THREE.Vector3()) {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 20, 20),
        chromosomeMaterial.clone()
      );
      mesh.position.copy(position);
      root.add(mesh);
      return mesh;
    }

    function setChromosomeCount(count) {
      while (chromosomes.length < count) {
        const c = createChromosome(new THREE.Vector3(0, 0, 0));
        chromosomes.push(c);
      }
      while (chromosomes.length > count) {
        const c = chromosomes.pop();
        root.remove(c);
        c.geometry.dispose();
        c.material.dispose();
      }
      rebuildTargets();
    }

    function rebuildTargets() {
      interphaseTargets = [];
      metaphaseTargets = [];
      anaphaseTargets = [];

      for (let i = 0; i < chromosomes.length; i++) {
        interphaseTargets.push(randomInsideSphere(1.0));
      }

      const metaSpacing = 0.3;
      const startY = -((chromosomes.length - 1) * metaSpacing) / 2;
      for (let i = 0; i < chromosomes.length; i++) {
        metaphaseTargets.push(new THREE.Vector3(
          0,
          startY + i * metaSpacing,
          (i % 2 === 0 ? -0.18 : 0.18)
        ));
      }

      const half = Math.floor(chromosomes.length / 2);
      const groupSpacing = 0.28;
      const start1 = -((half - 1) * groupSpacing) / 2;
      const start2 = -((chromosomes.length - half - 1) * groupSpacing) / 2;

      for (let i = 0; i < chromosomes.length; i++) {
        if (i < half) {
          anaphaseTargets.push(new THREE.Vector3(
            -1.0,
            start1 + i * groupSpacing,
            (i % 2 === 0 ? -0.2 : 0.2)
          ));
        } else {
          const j = i - half;
          anaphaseTargets.push(new THREE.Vector3(
            1.0,
            start2 + j * groupSpacing,
            (i % 2 === 0 ? -0.2 : 0.2)
          ));
        }
      }
    }

    const daughterGroup = new THREE.Group();
    scene.add(daughterGroup);

    function createDaughterCell(colorMaterial, xPos) {
      const group = new THREE.Group();

      const membrane = new THREE.Mesh(
        new THREE.SphereGeometry(1.0, 40, 40),
        colorMaterial
      );
      group.add(membrane);

      const chromos = [];
      for (let i = 0; i < 4; i++) {
        const c = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 16, 16),
          chromosomeMaterial.clone()
        );
        c.position.copy(randomInsideSphere(0.45));
        group.add(c);
        chromos.push(c);
      }

      group.position.set(xPos, 0, 0);
      daughterGroup.add(group);

      return {
        group,
        membrane,
        chromosomes: chromos,
        dividing: false,
        phaseIndex: 0,
        phaseTime: 0,
        targets: {
          interphase: chromos.map(() => randomInsideSphere(0.45)),
          metaphase: [],
          anaphase: []
        }
      };
    }

    let daughterCells = [null, null];

    function resetDaughterCells() {
      while (daughterGroup.children.length) {
        const obj = daughterGroup.children.pop();
        daughterGroup.remove(obj);
        obj.traverse((child) => {
          if (child.geometry) child.geometry.dispose?.();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose?.());
            else child.material.dispose?.();
          }
        });
      }
      daughterCells = [null, null];
    }

    function prepareDaughterDivisionTargets(cellObj) {
      const count = cellObj.chromosomes.length;
      const spacing = 0.18;
      cellObj.targets.metaphase = [];
      cellObj.targets.anaphase = [];

      const startY = -((count - 1) * spacing) / 2;
      for (let i = 0; i < count; i++) {
        cellObj.targets.metaphase.push(new THREE.Vector3(0, startY + i * spacing, (i % 2 ? 0.1 : -0.1)));
      }

      const half = Math.floor(count / 2);
      const startA = -((half - 1) * spacing) / 2;
      const startB = -((count - half - 1) * spacing) / 2;
      for (let i = 0; i < count; i++) {
        if (i < half) {
          cellObj.targets.anaphase.push(new THREE.Vector3(-0.45, startA + i * spacing, (i % 2 ? 0.08 : -0.08)));
        } else {
          const j = i - half;
          cellObj.targets.anaphase.push(new THREE.Vector3(0.45, startB + j * spacing, (i % 2 ? 0.08 : -0.08)));
        }
      }
    }

    let specimenLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "MosquitoInAmber.glb",
      (gltf) => {
        const model = gltf.scene;
        model.position.set(-6, 0, -4);
        model.scale.setScalar(0.5);
        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });
        scene.add(model);
        specimenLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load MosquitoInAmber.glb:", err);
      }
    );

    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;

      if (e.code === "Space") {
        e.preventDefault();
        triggerPlayerDivision(1);
      }
      if (e.code === "Enter") {
        triggerPlayerDivision(2);
      }
    });
    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    playPauseBtn.addEventListener("click", () => {
      state.isPlaying = !state.isPlaying;
      playPauseBtn.textContent = state.isPlaying ? "Pause" : "Play";
      syncState();
    });

    resetBtn.addEventListener("click", () => {
      resetSimulation();
    });

    speedSlider.addEventListener("input", () => {
      state.speedMultiplier = parseFloat(speedSlider.value);
      syncState();
    });

    const state = {
      currentPhase: "INTERPHASE",
      phaseIndex: 0,
      isPlaying: true,
      speedMultiplier: 1.0,
      phaseProgress: 0,
      chromosomeCount: 4,
      parentCellScale: { x: 1, y: 1, z: 1 },
      daughterCellsExist: false,
      daughterCellPositions: null,
      p1Score: 0,
      p2Score: 0,
      p1CellPosition: null,
      p2CellPosition: null,
      modelLoaded: false,
      totalCells: 1,
      animationTime: 0,
      boundaryEnforced: false
    };

    window.__3D_STATE__ = state;

    let phaseElapsed = 0;
    let clock = new THREE.Clock();

    function syncState() {
      state.currentPhase = PHASES[state.phaseIndex] || "COMPLETE";
      state.phaseProgress = state.phaseIndex < 6 ? (phaseElapsed / PHASE_DURATION) * 100 : 100;
      state.chromosomeCount = chromosomes.length + daughterCells.reduce((sum, dc) => sum + (dc ? dc.chromosomes.length : 0), 0);
      state.parentCellScale = {
        x: parentCell.scale.x,
        y: parentCell.scale.y,
        z: parentCell.scale.z
      };
      state.daughterCellsExist = !!(daughterCells[0] && daughterCells[1]);
      state.daughterCellPositions = state.daughterCellsExist
        ? daughterCells.map(dc => ({
            x: dc.group.position.x,
            y: dc.group.position.y,
            z: dc.group.position.z
          }))
        : null;
      state.p1CellPosition = daughterCells[0]
        ? {
            x: daughterCells[0].group.position.x,
            y: daughterCells[0].group.position.y,
            z: daughterCells[0].group.position.z
          }
        : null;
      state.p2CellPosition = daughterCells[1]
        ? {
            x: daughterCells[1].group.position.x,
            y: daughterCells[1].group.position.y,
            z: daughterCells[1].group.position.z
          }
        : null;
      state.modelLoaded = specimenLoaded;
      state.totalCells = 1 + daughterCells.filter(Boolean).length;
      state.animationTime = elapsedGlobal;
      state.boundaryEnforced = state.daughterCellsExist;

      phaseLabel.textContent = state.currentPhase;
      progressBar.style.width = `${Math.max(0, Math.min(100, state.phaseProgress))}%`;
      p1ScoreEl.textContent = `Player 1 Score: ${state.p1Score}`;
      p2ScoreEl.textContent = `Player 2 Score: ${state.p2Score}`;
    }

    function resetSimulation() {
      phaseElapsed = 0;
      state.phaseIndex = 0;
      state.isPlaying = true;
      playPauseBtn.textContent = "Pause";

      parentCell.visible = true;
      parentCell.scale.set(1, 1, 1);
      parentCell.position.set(0, 0, 0);

      pinchTorus.visible = true;
      pinchTorus.material.opacity = 0.0;

      nucleusLeft.visible = false;
      nucleusRight.visible = false;

      setChromosomeCount(4);
      chromosomes.forEach((c, i) => {
        c.position.copy(randomInsideSphere(0.8));
      });

      resetDaughterCells();

      state.daughterCellsExist = false;
      state.boundaryEnforced = false;
      syncState();
    }

    function lerpVec(mesh, target, alpha) {
      mesh.position.lerp(target, alpha);
    }

    function updateMainMitosis(dt) {
      const phaseName = PHASES[state.phaseIndex];
      const t = Math.min(1, phaseElapsed / PHASE_DURATION);

      pinchTorus.material.opacity = 0.0;
      nucleusLeft.visible = false;
      nucleusRight.visible = false;
      parentCell.visible = true;

      if (phaseName === "INTERPHASE") {
        parentCell.scale.setScalar(1.0);
        chromosomes.forEach((c, i) => {
          lerpVec(c, interphaseTargets[i], 0.05 + dt * 1.5);
        });
      }

      if (phaseName === "PROPHASE") {
        if (chromosomes.length < 8) {
          const current = chromosomes.length;
          setChromosomeCount(8);
          for (let i = current; i < chromosomes.length; i++) {
            chromosomes[i].position.set(
              (Math.random() - 0.5) * 0.1,
              (Math.random() - 0.5) * 0.1,
              (Math.random() - 0.5) * 0.1
            );
          }
        }
        const s = THREE.MathUtils.lerp(1.0, 1.1, t);
        parentCell.scale.set(s, s, s);
        chromosomes.forEach((c) => {
          lerpVec(c, new THREE.Vector3(0, 0, 0), 0.04 + dt * 1.8);
        });
      }

      if (phaseName === "METAPHASE") {
        const s = THREE.MathUtils.lerp(1.1, 1.15, t);
        parentCell.scale.set(s, s, s);
        chromosomes.forEach((c, i) => {
          lerpVec(c, metaphaseTargets[i], 0.05 + dt * 2.0);
        });
      }

      if (phaseName === "ANAPHASE") {
        parentCell.scale.set(
          THREE.MathUtils.lerp(1.15, 1.5, t),
          THREE.MathUtils.lerp(1.15, 0.85, t),
          THREE.MathUtils.lerp(1.15, 0.95, t)
        );
        chromosomes.forEach((c, i) => {
          lerpVec(c, anaphaseTargets[i], 0.05 + dt * 2.0);
        });
      }

      if (phaseName === "TELOPHASE") {
        parentCell.scale.set(1.5, 0.85, 0.95);
        chromosomes.forEach((c, i) => {
          lerpVec(c, anaphaseTargets[i], 0.04 + dt * 1.5);
        });

        pinchTorus.material.opacity = 0.25 + 0.5 * t;
        pinchTorus.scale.set(
          1.0,
          THREE.MathUtils.lerp(1.0, 0.7, t),
          THREE.MathUtils.lerp(1.0, 0.7, t)
        );

        nucleusLeft.visible = true;
        nucleusRight.visible = true;
        nucleusLeft.position.set(-1.0, 0, 0);
        nucleusRight.position.set(1.0, 0, 0);
        nucleusLeft.scale.setScalar(THREE.MathUtils.lerp(0.6, 1.0, t));
        nucleusRight.scale.setScalar(THREE.MathUtils.lerp(0.6, 1.0, t));
      }

      if (phaseName === "CYTOKINESIS") {
        const split = t;
        parentCell.scale.set(
          THREE.MathUtils.lerp(1.5, 0.2, split),
          THREE.MathUtils.lerp(0.85, 0.2, split),
          THREE.MathUtils.lerp(0.95, 0.2, split)
        );
        parentCell.material.opacity = THREE.MathUtils.lerp(0.6, 0.0, split);
        pinchTorus.material.opacity = THREE.MathUtils.lerp(0.75, 0.0, split);
        nucleusLeft.visible = false;
        nucleusRight.visible = false;

        chromosomes.forEach((c, i) => {
          lerpVec(c, anaphaseTargets[i], 0.04 + dt * 1.2);
          c.material.opacity = THREE.MathUtils.lerp(1.0, 0.0, split);
          c.material.transparent = true;
        });

        if (!daughterCells[0] && t > 0.25) {
          daughterCells[0] = createDaughterCell(daughterMaterial1.clone(), -1.0);
          daughterCells[1] = createDaughterCell(daughterMaterial2.clone(), 1.0);
          prepareDaughterDivisionTargets(daughterCells[0]);
          prepareDaughterDivisionTargets(daughterCells[1]);
        }

        if (daughterCells[0] && daughterCells[1]) {
          daughterCells[0].group.position.x = THREE.MathUtils.lerp(-1.0, -2.5, split);
          daughterCells[1].group.position.x = THREE.MathUtils.lerp(1.0, 2.5, split);
        }
      }

      if (phaseName !== "CYTOKINESIS") {
        parentCell.material.opacity = 0.6;
        chromosomes.forEach(c => {
          c.material.opacity = 1.0;
          c.material.transparent = false;
        });
      }
    }

    function finalizeComplete() {
      parentCell.visible = false;
      root.visible = false;
      if (!daughterCells[0] || !daughterCells[1]) {
        daughterCells[0] = createDaughterCell(daughterMaterial1.clone(), -2.5);
        daughterCells[1] = createDaughterCell(daughterMaterial2.clone(), 2.5);
        prepareDaughterDivisionTargets(daughterCells[0]);
        prepareDaughterDivisionTargets(daughterCells[1]);
      }
    }

    function updateSinglePlayerCell(cellObj, dt) {
      if (!cellObj || !cellObj.dividing) return;

      cellObj.phaseTime += dt * state.speedMultiplier;
      let localT = Math.min(1, cellObj.phaseTime / PHASE_DURATION);

      if (cellObj.phaseIndex === 0) {
        cellObj.membrane.scale.setScalar(1.0);
        cellObj.chromosomes.forEach((c, i) => c.position.lerp(cellObj.targets.interphase[i], 0.05 + dt));
      } else if (cellObj.phaseIndex === 1) {
        cellObj.membrane.scale.setScalar(1.1);
        cellObj.chromosomes.forEach((c) => c.position.lerp(new THREE.Vector3(0,0,0), 0.05 + dt));
      } else if (cellObj.phaseIndex === 2) {
        cellObj.membrane.scale.setScalar(1.15);
        cellObj.chromosomes.forEach((c, i) => c.position.lerp(cellObj.targets.metaphase[i], 0.06 + dt));
      } else if (cellObj.phaseIndex === 3) {
        cellObj.membrane.scale.set(1.3, 0.85, 0.85);
        cellObj.chromosomes.forEach((c, i) => c.position.lerp(cellObj.targets.anaphase[i], 0.06 + dt));
      } else if (cellObj.phaseIndex === 4) {
        cellObj.membrane.scale.set(1.25, 0.8, 0.8);
      } else if (cellObj.phaseIndex === 5) {
        cellObj.membrane.scale.set(
          THREE.MathUtils.lerp(1.25, 1.0, localT),
          THREE.MathUtils.lerp(0.8, 1.0, localT),
          THREE.MathUtils.lerp(0.8, 1.0, localT)
        );
      }

      if (cellObj.phaseTime >= PHASE_DURATION) {
        cellObj.phaseTime = 0;
        cellObj.phaseIndex++;
        if (cellObj.phaseIndex > 5) {
          cellObj.phaseIndex = 0;
          cellObj.dividing = false;
          cellObj.membrane.scale.setScalar(1.0);
          cellObj.targets.interphase = cellObj.chromosomes.map(() => randomInsideSphere(0.45));
        }
      }
    }

    function triggerPlayerDivision(playerNumber) {
      if (state.currentPhase !== "COMPLETE") return;
      const idx = playerNumber === 1 ? 0 : 1;
      const cellObj = daughterCells[idx];
      if (!cellObj || cellObj.dividing) return;

      cellObj.dividing = true;
      cellObj.phaseIndex = 0;
      cellObj.phaseTime = 0;
      cellObj.targets.interphase = cellObj.chromosomes.map(() => randomInsideSphere(0.45));
      prepareDaughterDivisionTargets(cellObj);

      if (playerNumber === 1) state.p1Score += 1;
      else state.p2Score += 1;

      syncState();
    }

    function updatePlayerMovement(dt) {
      if (state.currentPhase !== "COMPLETE") return;
      const speed = 3.0;

      if (daughterCells[0]) {
        if (keys["KeyW"]) daughterCells[0].group.position.z -= speed * dt;
        if (keys["KeyS"]) daughterCells[0].group.position.z += speed * dt;
        if (keys["KeyA"]) daughterCells[0].group.position.x -= speed * dt;
        if (keys["KeyD"]) daughterCells[0].group.position.x += speed * dt;
      }

      if (daughterCells[1]) {
        if (keys["ArrowUp"]) daughterCells[1].group.position.z -= speed * dt;
        if (keys["ArrowDown"]) daughterCells[1].group.position.z += speed * dt;
        if (keys["ArrowLeft"]) daughterCells[1].group.position.x -= speed * dt;
        if (keys["ArrowRight"]) daughterCells[1].group.position.x += speed * dt;
      }

      [daughterCells[0], daughterCells[1]].forEach(dc => {
        if (!dc) return;
        dc.group.position.x = THREE.MathUtils.clamp(dc.group.position.x, -BOUNDS, BOUNDS);
        dc.group.position.z = THREE.MathUtils.clamp(dc.group.position.z, -BOUNDS, BOUNDS);
      });
    }

    let elapsedGlobal = 0;

    function advancePhase(dt) {
      if (!state.isPlaying || state.currentPhase === "COMPLETE") return;

      phaseElapsed += dt * state.speedMultiplier;

      if (phaseElapsed >= PHASE_DURATION) {
        phaseElapsed = 0;
        state.phaseIndex++;
        if (state.phaseIndex >= 6) {
          state.phaseIndex = 6;
          finalizeComplete();
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();
      if (state.isPlaying) elapsedGlobal += dt * state.speedMultiplier;

      controls.update();

      root.visible = state.currentPhase !== "COMPLETE";

      if (state.isPlaying) {
        updateMainMitosis(dt);
        advancePhase(dt);
        updatePlayerMovement(dt);
        updateSinglePlayerCell(daughterCells[0], dt);
        updateSinglePlayerCell(daughterCells[1], dt);
      }

      syncState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetSimulation();
    animate();
  </script>
</body>
</html>
