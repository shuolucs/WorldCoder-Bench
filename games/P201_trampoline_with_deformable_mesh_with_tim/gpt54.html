<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Trampoline Bounce Simulation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      padding: 10px;
      background: rgba(0,0,0,0.6);
      line-height: 1.5;
      z-index: 10;
      min-width: 240px;
      border-radius: 6px;
    }

    #info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #ddd;
      font-size: 12px;
      background: rgba(0,0,0,0.4);
      padding: 8px 10px;
      border-radius: 6px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Time Scale: <span id="timeScaleDisplay">1.00</span></div>
    <div>Character Y: <span id="charYDisplay">6.00</span></div>
    <div>Velocity: <span id="velocityDisplay">0.00</span></div>
    <div>Bounces: <span id="bounceCountDisplay">0</span></div>
    <div>Status: <span id="pauseStatus">RUNNING</span></div>
    <div>Max Deformation: <span id="maxDeformDisplay">0.00</span></div>
  </div>

  <div id="info">
    ArrowUp/ArrowDown: timeScale &nbsp; | &nbsp; Space: pause &nbsp; | &nbsp; R: reset &nbsp; | &nbsp; W: wireframe
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    const grid = new THREE.GridHelper(30, 30, 0x666666, 0x333333);
    grid.position.y = 0;
    scene.add(grid);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.ShadowMaterial({ opacity: 0.15 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    // Trampoline frame
    const frameMaterial = new THREE.MeshStandardMaterial({
      color: 0x444444,
      metalness: 0.8,
      roughness: 0.3
    });

    const frame = new THREE.Mesh(
      new THREE.TorusGeometry(4, 0.3, 24, 64),
      frameMaterial
    );
    frame.position.y = 1;
    frame.rotation.x = Math.PI / 2;
    frame.castShadow = true;
    frame.receiveShadow = true;
    scene.add(frame);

    // Legs
    const legGeometry = new THREE.CylinderGeometry(0.15, 0.15, 1, 16);
    const legPositions = [
      [4, 0.5, 0],
      [-4, 0.5, 0],
      [0, 0.5, 4],
      [0, 0.5, -4]
    ];

    legPositions.forEach((p) => {
      const leg = new THREE.Mesh(legGeometry, frameMaterial);
      leg.position.set(p[0], p[1], p[2]);
      leg.castShadow = true;
      leg.receiveShadow = true;
      scene.add(leg);
    });

    // Deformable trampoline surface
    let trampolineGeometry = new THREE.PlaneGeometry(8, 8, 32, 32).toNonIndexed();
    trampolineGeometry.rotateX(-Math.PI / 2);

    const trampolineMaterial = new THREE.MeshPhongMaterial({
      color: "#4488ff",
      side: THREE.DoubleSide,
      wireframe: false,
      shininess: 80
    });

    const trampolineMesh = new THREE.Mesh(trampolineGeometry, trampolineMaterial);
    trampolineMesh.position.y = 1;
    trampolineMesh.receiveShadow = true;
    trampolineMesh.castShadow = true;
    scene.add(trampolineMesh);

    const positionAttr = trampolineGeometry.attributes.position;
    const originalPositions = new Float32Array(positionAttr.array.length);
    originalPositions.set(positionAttr.array);

    // Character/model
    let character = null;
    let mixer = null;
    let modelLoaded = false;
    const loader = new GLTFLoader();

    // Physics/state
    let characterVelocity = 0;
    let bounceCount = 0;
    let timeScale = 1.0;
    let previousTimeScale = 1.0;
    let isPaused = false;
    let elapsedTime = 0;
    let characterMinY = 6;
    let springForceCurrent = 0;
    let prevVelocity = 0;
    let wireframeOn = false;
    let simulationStarted = false;

    const trampolineSurfaceY = 1.0;
    const gravity = -9.81;
    const springConstant = 45;
    const dampingFactor = 0.02;
    const contactRadius = 3.0;

    // HUD refs
    const timeScaleDisplay = document.getElementById("timeScaleDisplay");
    const charYDisplay = document.getElementById("charYDisplay");
    const velocityDisplay = document.getElementById("velocityDisplay");
    const bounceCountDisplay = document.getElementById("bounceCountDisplay");
    const pauseStatus = document.getElementById("pauseStatus");
    const maxDeformDisplay = document.getElementById("maxDeformDisplay");

    // State exposure
    window.__3D_STATE__ = {
      characterY: 6,
      characterVelocity: 0,
      bounceCount: 0,
      timeScale: 1,
      isPaused: false,
      maxDeformation: 0,
      wireframeOn: false,
      modelLoaded: false,
      trampolineVertexCount: positionAttr.count,
      elapsedTime: 0,
      characterMinY: 6,
      springForce: 0
    };

    // Optional particles
    const particles = [];
    function spawnImpactParticles(position, strength = 0.4) {
      const count = 12;
      for (let i = 0; i < count; i++) {
        const particle = new THREE.Mesh(
          new THREE.SphereGeometry(0.05, 8, 8),
          new THREE.MeshBasicMaterial({ color: 0xaad4ff })
        );
        particle.position.copy(position);
        particle.position.y = trampolineSurfaceY + 0.1;

        particle.userData.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * strength * 3,
          Math.random() * strength * 2 + 0.1,
          (Math.random() - 0.5) * strength * 3
        );
        particle.userData.life = 0.6 + Math.random() * 0.4;
        scene.add(particle);
        particles.push(particle);
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= dt;
        p.userData.velocity.y += gravity * 0.35 * dt;
        p.position.addScaledVector(p.userData.velocity, dt);
        p.material.opacity = Math.max(0, p.userData.life);
        p.material.transparent = true;

        if (p.userData.life <= 0) {
          scene.remove(p);
          p.geometry.dispose();
          p.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function computeModelScaleToHeight(root, targetHeight = 1.5) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      const currentHeight = size.y > 0 ? size.y : 1;
      return targetHeight / currentHeight;
    }

    function resetTrampoline() {
      const arr = positionAttr.array;
      for (let i = 0; i < arr.length; i++) {
        arr[i] = originalPositions[i];
      }
      positionAttr.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();
    }

    function resetSimulation() {
      characterVelocity = 0;
      bounceCount = 0;
      timeScale = 1.0;
      previousTimeScale = 1.0;
      isPaused = false;
      elapsedTime = 0;
      springForceCurrent = 0;
      prevVelocity = 0;
      characterMinY = 6;

      resetTrampoline();

      if (character) {
        character.position.set(0, 6, 0);
      }

      particles.forEach(p => {
        scene.remove(p);
        p.geometry.dispose();
        p.material.dispose();
      });
      particles.length = 0;
    }

    function getCharacterXZ() {
      if (!character) return new THREE.Vector2(0, 0);
      return new THREE.Vector2(character.position.x, character.position.z);
    }

    function updateTrampolineAndPhysics(dtScaled) {
      if (!character) return;

      const arr = positionAttr.array;
      const charXZ = getCharacterXZ();
      let maxDeformation = 0;
      let inContact = false;
      let totalSpring = 0;

      // Gravity
      characterVelocity += gravity * dtScaled;
      characterVelocity *= (1 - dampingFactor);
      characterVelocity = safeNumber(characterVelocity, 0);

      // Integrate position
      character.position.y += characterVelocity * dtScaled;
      character.position.y = safeNumber(character.position.y, 6);

      // Contact / penetration
      if (character.position.y <= trampolineSurfaceY) {
        inContact = true;
        const penetrationDepth = Math.max(0, trampolineSurfaceY - character.position.y);

        for (let i = 0; i < positionAttr.count; i++) {
          const ix = i * 3;
          const x = originalPositions[ix] + trampolineMesh.position.x;
          const z = originalPositions[ix + 2] + trampolineMesh.position.z;

          const dx = x - charXZ.x;
          const dz = z - charXZ.y;
          const dist = Math.sqrt(dx * dx + dz * dz);

          let deform = 0;
          if (dist < contactRadius) {
            deform = Math.max(0, (contactRadius - dist) / contactRadius) * penetrationDepth * 0.8;
          }

          arr[ix + 1] = originalPositions[ix + 1] - deform;
          if (deform > maxDeformation) maxDeformation = deform;
        }

        totalSpring = springConstant * maxDeformation;
        springForceCurrent = safeNumber(totalSpring, 0);

        characterVelocity += springForceCurrent * dtScaled;
        characterVelocity = safeNumber(characterVelocity, 0);

        if (character.position.y < trampolineSurfaceY - maxDeformation * 0.9) {
          character.position.y = trampolineSurfaceY - maxDeformation * 0.9;
        }

      } else {
        springForceCurrent = 0;

        for (let i = 0; i < arr.length; i += 3) {
          arr[i + 1] = THREE.MathUtils.lerp(arr[i + 1], originalPositions[i + 1], 0.1);
          const d = Math.abs(originalPositions[i + 1] - arr[i + 1]);
          if (d > maxDeformation) maxDeformation = d;
        }
      }

      // Continue restoring slight residual deformation even after contact
      if (inContact) {
        for (let i = 0; i < arr.length; i += 3) {
          const currentOffset = originalPositions[i + 1] - arr[i + 1];
          if (currentOffset < 0.00001) arr[i + 1] = originalPositions[i + 1];
        }
      }

      positionAttr.needsUpdate = true;
      trampolineGeometry.computeVertexNormals();

      // Bounce count
      const nearSurface = Math.abs(character.position.y - trampolineSurfaceY) < 1.5;
      if (prevVelocity < 0 && characterVelocity > 0 && nearSurface) {
        bounceCount++;
        spawnImpactParticles(character.position.clone(), Math.min(0.7, Math.abs(prevVelocity) * 0.06));
      }
      prevVelocity = characterVelocity;

      // Clamp bottom
      if (character.position.y < -1) {
        character.position.y = -1;
        if (characterVelocity < 0) characterVelocity = 0;
      }

      character.position.y = safeNumber(character.position.y, 6);
      characterVelocity = safeNumber(characterVelocity, 0);
      springForceCurrent = safeNumber(springForceCurrent, 0);
      characterMinY = Math.min(characterMinY, character.position.y);

      return maxDeformation;
    }

    function updateHUD(maxDeformation = 0) {
      const charY = character ? character.position.y : 6;
      timeScaleDisplay.textContent = timeScale.toFixed(2);
      charYDisplay.textContent = safeNumber(charY, 0).toFixed(2);
      velocityDisplay.textContent = safeNumber(characterVelocity, 0).toFixed(2);
      bounceCountDisplay.textContent = bounceCount;
      pauseStatus.textContent = isPaused ? "PAUSED" : "RUNNING";
      maxDeformDisplay.textContent = safeNumber(maxDeformation, 0).toFixed(2);
    }

    function updateState(maxDeformation = 0) {
      const charY = character ? character.position.y : 6;
      window.__3D_STATE__.characterY = safeNumber(charY, 6);
      window.__3D_STATE__.characterVelocity = safeNumber(characterVelocity, 0);
      window.__3D_STATE__.bounceCount = bounceCount;
      window.__3D_STATE__.timeScale = timeScale;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.maxDeformation = safeNumber(maxDeformation, 0);
      window.__3D_STATE__.wireframeOn = wireframeOn;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.trampolineVertexCount = positionAttr.count;
      window.__3D_STATE__.elapsedTime = safeNumber(elapsedTime, 0);
      window.__3D_STATE__.characterMinY = safeNumber(characterMinY, 6);
      window.__3D_STATE__.springForce = safeNumber(springForceCurrent, 0);
    }

    // Load model
    loader.load(
      "./._BrainStem.glb",
      (gltf) => {
        character = gltf.scene;
        const scale = computeModelScaleToHeight(character, 1.5);
        character.scale.setScalar(scale);
        character.position.set(0, 6, 0);

        character.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(character);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(character);
          gltf.animations.forEach((clip) => {
            mixer.clipAction(clip).play();
          });
        }

        modelLoaded = true;
        simulationStarted = true;
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error("Failed to load GLTF model:", err);

        // Fallback character so simulation still works
        const fallback = new THREE.Mesh(
          new THREE.SphereGeometry(0.75, 32, 32),
          new THREE.MeshStandardMaterial({ color: 0xff88aa, roughness: 0.5, metalness: 0.1 })
        );
        fallback.position.set(0, 6, 0);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        character = fallback;
        scene.add(character);

        modelLoaded = false;
        simulationStarted = true;
      }
    );

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      if (e.code === "ArrowUp") {
        if (!isPaused) {
          timeScale = Math.min(3.0, timeScale + 0.25);
          previousTimeScale = timeScale > 0 ? timeScale : previousTimeScale;
        } else {
          previousTimeScale = Math.min(3.0, previousTimeScale + 0.25);
        }
      } else if (e.code === "ArrowDown") {
        if (!isPaused) {
          timeScale = Math.max(0.0, timeScale - 0.25);
          previousTimeScale = timeScale > 0 ? timeScale : previousTimeScale;
          if (timeScale === 0) isPaused = true;
        } else {
          previousTimeScale = Math.max(0.0, previousTimeScale - 0.25);
        }
      } else if (e.code === "Space") {
        e.preventDefault();
        if (!isPaused) {
          previousTimeScale = timeScale > 0 ? timeScale : 1.0;
          timeScale = 0.0;
          isPaused = true;
        } else {
          timeScale = previousTimeScale > 0 ? previousTimeScale : 1.0;
          isPaused = false;
        }
      } else if (e.key === "r" || e.key === "R") {
        resetSimulation();
      } else if (e.key === "w" || e.key === "W") {
        wireframeOn = !wireframeOn;
        trampolineMaterial.wireframe = wireframeOn;
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      let maxDeformation = 0;

      controls.update();

      if (simulationStarted) {
        const effectiveTimeScale = safeNumber(timeScale, 0);
        isPaused = effectiveTimeScale === 0;

        const dtScaled = dt * effectiveTimeScale;

        if (mixer && dtScaled > 0) {
          mixer.update(dtScaled);
        }

        if (dtScaled > 0) {
          elapsedTime += dtScaled;
          maxDeformation = updateTrampolineAndPhysics(dtScaled) || 0;
        } else {
          // when paused, trampoline should still gently restore visually
          const arr = positionAttr.array;
          for (let i = 0; i < arr.length; i += 3) {
            arr[i + 1] = THREE.MathUtils.lerp(arr[i + 1], originalPositions[i + 1], 0.02);
            const d = Math.abs(originalPositions[i + 1] - arr[i + 1]);
            if (d > maxDeformation) maxDeformation = d;
          }
          positionAttr.needsUpdate = true;
          trampolineGeometry.computeVertexNormals();
        }

        updateParticles(dt);
      }

      updateHUD(maxDeformation);
      updateState(maxDeformation);

      renderer.render(scene, camera);
    }

    updateHUD(0);
    updateState(0);
    animate();
  </script>
</body>
</html>
