<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trampoline Bounce Simulation</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: white;
    font-family: monospace;
    font-size: 14px;
    padding: 10px;
    background: rgba(0,0,0,0.6);
    border-radius: 5px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 10;
  }
  #controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #aaa;
    font-family: monospace;
    font-size: 12px;
    padding: 8px;
    background: rgba(0,0,0,0.5);
    border-radius: 5px;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Time Scale: <span id="timeScaleDisplay">1.00</span></div>
  <div>Char Y: <span id="charYDisplay">6.00</span></div>
  <div>Velocity: <span id="velocityDisplay">0.00</span></div>
  <div>Bounces: <span id="bounceCountDisplay">0</span></div>
  <div>Status: <span id="pauseStatus">RUNNING</span></div>
  <div>Max Deform: <span id="maxDeformDisplay">0.00</span></div>
</div>

<div id="controls-help">
  ↑/↓: Time Scale | Space: Pause | R: Reset | W: Wireframe
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  characterY: 6.0,
  characterVelocity: 0.0,
  bounceCount: 0,
  timeScale: 1.0,
  isPaused: false,
  maxDeformation: 0.0,
  wireframeOn: false,
  modelLoaded: false,
  trampolineVertexCount: 0,
  elapsedTime: 0.0,
  characterMinY: 6.0,
  springForce: 0.0
};
window.__3D_STATE__ = state;

let previousTimeScale = 1.0;
let characterVelocity = 0.0;
let characterY = 6.0;
let bounceCount = 0;
let prevVelocity = 0.0;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// --- Ground ---
const gridHelper = new THREE.GridHelper(30, 30, 0x444466, 0x333355);
scene.add(gridHelper);

const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshPhongMaterial({ color: 0x222244, transparent: true, opacity: 0.5 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0.01;
ground.receiveShadow = true;
scene.add(ground);

// --- Trampoline Frame ---
const frameGeo = new THREE.TorusGeometry(4, 0.3, 16, 48);
const frameMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.3 });
const frame = new THREE.Mesh(frameGeo, frameMat);
frame.rotation.x = -Math.PI / 2;
frame.position.y = 1;
frame.castShadow = true;
frame.receiveShadow = true;
scene.add(frame);

// --- Trampoline Legs ---
const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 1, 8);
const legMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7, roughness: 0.4 });
const legPositions = [
  [4, 0.5, 0],
  [-4, 0.5, 0],
  [0, 0.5, 4],
  [0, 0.5, -4]
];
legPositions.forEach(pos => {
  const leg = new THREE.Mesh(legGeo, legMat);
  leg.position.set(pos[0], pos[1], pos[2]);
  leg.castShadow = true;
  scene.add(leg);
});

// --- Deformable Trampoline Surface ---
const trampolineGeo = new THREE.PlaneGeometry(8, 8, 32, 32);
const nonIndexedGeo = trampolineGeo.toNonIndexed();
const trampolineMat = new THREE.MeshPhongMaterial({
  color: 0x4488ff,
  side: THREE.DoubleSide,
  wireframe: false,
  transparent: true,
  opacity: 0.85,
  shininess: 60
});
const trampolineMesh = new THREE.Mesh(nonIndexedGeo, trampolineMat);
trampolineMesh.rotation.x = -Math.PI / 2;
trampolineMesh.position.y = 1;
trampolineMesh.receiveShadow = true;
scene.add(trampolineMesh);

// Store original vertex positions (in local space, the plane is XY before rotation)
const posAttr = trampolineMesh.geometry.getAttribute('position');
const vertexCount = posAttr.count;
state.trampolineVertexCount = vertexCount;

const originalPositions = new Float32Array(vertexCount * 3);
for (let i = 0; i < vertexCount * 3; i++) {
  originalPositions[i] = posAttr.array[i];
}

// --- Character (fallback sphere if GLTF fails) ---
let characterGroup = new THREE.Group();
characterGroup.position.set(0, 6, 0);
scene.add(characterGroup);

// Fallback character
const fallbackGeo = new THREE.SphereGeometry(0.4, 16, 16);
const fallbackMat = new THREE.MeshPhongMaterial({ color: 0xff6644 });
const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
fallbackMesh.castShadow = true;
characterGroup.add(fallbackMesh);

let mixer = null;
let gltfModel = null;

// Try loading GLTF
const loader = new GLTFLoader();
const modelUrls = [
  'https://threejs.org/examples/models/gltf/BrainStem/BrainStem.glb',
  'https://raw.githubusercontent.com/mrdoob/three.js/dev/examples/models/gltf/BrainStem/BrainStem.glb'
];

function tryLoadModel(urls, index) {
  if (index >= urls.length) {
    console.warn('Could not load GLTF model, using fallback sphere');
    state.modelLoaded = true;
    return;
  }
  loader.load(
    urls[index],
    (gltf) => {
      gltfModel = gltf.scene;
      // Calculate bounding box to scale
      const box = new THREE.Box3().setFromObject(gltfModel);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.5 / maxDim;
      gltfModel.scale.set(scale, scale, scale);

      // Center the model
      const center = new THREE.Vector3();
      box.getCenter(center);
      gltfModel.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);

      gltfModel.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });

      characterGroup.remove(fallbackMesh);
      characterGroup.add(gltfModel);

      // Setup animations
      if (gltf.animations && gltf.animations.length > 0) {
        mixer = new THREE.AnimationMixer(gltfModel);
        gltf.animations.forEach((clip) => {
          mixer.clipAction(clip).play();
        });
      }

      state.modelLoaded = true;
      console.log('GLTF model loaded successfully');
    },
    undefined,
    (error) => {
      console.warn('Failed to load from', urls[index], error);
      tryLoadModel(urls, index + 1);
    }
  );
}

tryLoadModel(modelUrls, 0);

// After a timeout, ensure modelLoaded is true
setTimeout(() => { state.modelLoaded = true; }, 5000);

// --- Particles ---
const particles = [];
const particleGeo = new THREE.SphereGeometry(0.05, 6, 6);
const particleMat = new THREE.MeshBasicMaterial({ color: 0x88ccff });

function spawnParticles(x, y, z) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const p = new THREE.Mesh(particleGeo, particleMat.clone());
    p.position.set(x, y, z);
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    const vy = 2 + Math.random() * 3;
    p.userData = {
      vx: Math.cos(angle) * speed,
      vy: vy,
      vz: Math.sin(angle) * speed,
      life: 1.0
    };
    scene.add(p);
    particles.push(p);
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    const ud = p.userData;
    ud.life -= dt * 2;
    if (ud.life <= 0) {
      scene.remove(p);
      particles.splice(i, 1);
      continue;
    }
    p.position.x += ud.vx * dt;
    p.position.y += ud.vy * dt;
    p.position.z += ud.vz * dt;
    ud.vy -= 9.81 * dt;
    p.material.opacity = ud.life;
    p.material.transparent = true;
    p.scale.setScalar(ud.life);
  }
}

// --- Keyboard Controls ---
document.addEventListener('keydown', (e) => {
  switch (e.code) {
    case 'ArrowUp':
      e.preventDefault();
      state.timeScale = Math.min(3.0, state.timeScale + 0.25);
      if (!state.isPaused) previousTimeScale = state.timeScale;
      break;
    case 'ArrowDown':
      e.preventDefault();
      state.timeScale = Math.max(0.0, state.timeScale - 0.25);
      if (!state.isPaused) previousTimeScale = state.timeScale;
      break;
    case 'Space':
      e.preventDefault();
      if (!state.isPaused) {
        previousTimeScale = state.timeScale;
        state.timeScale = 0;
        state.isPaused = true;
      } else {
        state.timeScale = previousTimeScale || 1.0;
        state.isPaused = false;
      }
      break;
    case 'KeyR':
      resetSimulation();
      break;
    case 'KeyW':
      state.wireframeOn = !state.wireframeOn;
      trampolineMat.wireframe = state.wireframeOn;
      break;
  }
});

function resetSimulation() {
  characterY = 6.0;
  characterVelocity = 0.0;
  bounceCount = 0;
  prevVelocity = 0.0;
  state.timeScale = 1.0;
  state.isPaused = false;
  state.elapsedTime = 0.0;
  state.characterMinY = 6.0;
  state.springForce = 0.0;
  state.maxDeformation = 0.0;
  previousTimeScale = 1.0;
  characterGroup.position.set(0, 6, 0);

  // Reset trampoline vertices
  for (let i = 0; i < vertexCount; i++) {
    posAttr.array[i * 3] = originalPositions[i * 3];
    posAttr.array[i * 3 + 1] = originalPositions[i * 3 + 1];
    posAttr.array[i * 3 + 2] = originalPositions[i * 3 + 2];
  }
  posAttr.needsUpdate = true;
  trampolineMesh.geometry.computeVertexNormals();

  // Remove particles
  particles.forEach(p => scene.remove(p));
  particles.length = 0;
}

// --- HUD Update ---
function updateHUD() {
  document.getElementById('timeScaleDisplay').textContent = state.timeScale.toFixed(2);
  document.getElementById('charYDisplay').textContent = state.characterY.toFixed(2);
  document.getElementById('velocityDisplay').textContent = state.characterVelocity.toFixed(2);
  document.getElementById('bounceCountDisplay').textContent = state.bounceCount;
  document.getElementById('pauseStatus').textContent = state.isPaused ? 'PAUSED' : 'RUNNING';
  document.getElementById('maxDeformDisplay').textContent = state.maxDeformation.toFixed(2);
}

// --- Animation Loop ---
const clock = new THREE.Clock();
const SPRING_CONSTANT = 45;
const DAMPING = 0.02;
const TRAMPOLINE_Y = 1.0;

function safeNum(v, fallback = 0) {
  return (isNaN(v) || !isFinite(v)) ? fallback : v;
}

function animate() {
  requestAnimationFrame(animate);

  let rawDt = clock.getDelta();
  rawDt = Math.min(rawDt, 0.05); // clamp to avoid huge jumps

  const dt = rawDt * state.timeScale;

  if (mixer && dt > 0) {
    mixer.update(dt);
  }

  // Physics
  if (dt > 0) {
    state.elapsedTime += dt;

    const gravity = -9.81;
    let springForce = 0;
    let maxDeform = 0;
    let isOnTrampoline = false;

    // Check if character is at or below trampoline surface
    const penetrationDepth = TRAMPOLINE_Y - characterY;

    if (penetrationDepth > 0) {
      isOnTrampoline = true;

      // Deform trampoline vertices
      // The trampoline mesh is rotated -90 deg on X, so local XY maps to world XZ, and local Z maps to world Y (inverted by rotation)
      // Actually, after rotation, local X -> world X, local Y -> world Z, and the "up" direction (normal) is world Y
      // We need to push vertices "down" in world space, which means adjusting the Z component in local space (since rotation maps local Z to world -Y... let me think more carefully)
      
      // The plane is created in XY plane, then rotated -PI/2 around X.
      // Local (x, y, 0) -> World (x, 0, -y) + position offset (0, 1, 0)
      // So world position of vertex (lx, ly, lz) = (lx, -lz + 1, -ly) ... approximately
      // To push a vertex "down" in world Y, we need to increase lz (since world Y = 1 - lz for the plane at y=1)
      // Actually let's be more precise:
      // Rotation matrix for -PI/2 around X: y' = z, z' = -y (in terms of where they go)
      // No: Rx(-PI/2) transforms (x,y,z) to (x, z, -y)
      // So local (lx, ly, lz) -> world (lx, lz, -ly) + (0, 1, 0) = (lx, lz+1, -ly)
      // For the original plane at z=0: world = (lx, 0+1, -ly) = (lx, 1, -ly) ✓
      // To push down in world Y: decrease (lz + 1), so decrease lz.
      // So we set lz = -deformation (negative to push down in world Y)

      const charWorldX = characterGroup.position.x;
      const charWorldZ = characterGroup.position.z;

      for (let i = 0; i < vertexCount; i++) {
        const lx = originalPositions[i * 3];
        const ly = originalPositions[i * 3 + 1];
        // World position of this vertex: (lx, 1, -ly)
        const wx = lx;
        const wz = -ly;

        const dx = wx - charWorldX;
        const dz = wz - charWorldZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 3.0) {
          const factor = Math.max(0, (3.0 - dist) / 3.0);
          const deformation = factor * penetrationDepth * 0.8;
          // Push down: decrease lz
          posAttr.array[i * 3 + 2] = originalPositions[i * 3 + 2] - deformation;

          if (deformation > maxDeform) maxDeform = deformation;
        } else {
          // Lerp back to original
          const currentLz = posAttr.array[i * 3 + 2];
          const origLz = originalPositions[i * 3 + 2];
          posAttr.array[i * 3 + 2] = currentLz + (origLz - currentLz) * 0.1;
        }
      }

      posAttr.needsUpdate = true;
      trampolineMesh.geometry.computeVertexNormals();

      // Spring force
      springForce = SPRING_CONSTANT * penetrationDepth;
      characterVelocity += springForce * dt;

    } else {
      // Not on trampoline - lerp vertices back
      let anyChanged = false;
      for (let i = 0; i < vertexCount; i++) {
        const currentLz = posAttr.array[i * 3 + 2];
        const origLz = originalPositions[i * 3 + 2];
        if (Math.abs(currentLz - origLz) > 0.001) {
          posAttr.array[i * 3 + 2] = currentLz + (origLz - currentLz) * 0.1;
          const deform = Math.abs(posAttr.array[i * 3 + 2] - origLz);
          if (deform > maxDeform) maxDeform = deform;
          anyChanged = true;
        }
      }
      if (anyChanged) {
        posAttr.needsUpdate = true;
        trampolineMesh.geometry.computeVertexNormals();
      }
    }

    // Gravity
    characterVelocity += gravity * dt;

    // Damping
    characterVelocity *= (1.0 - DAMPING);

    // Update position
    characterY += characterVelocity * dt;

    // Clamp
    characterY = Math.max(-1, characterY);
    if (characterY <= -1 && characterVelocity < 0) {
      characterVelocity = 0;
    }

    // Bounce detection
    if (prevVelocity < 0 && characterVelocity > 0 && characterY <= TRAMPOLINE_Y + 0.5) {
      bounceCount++;
      spawnParticles(characterGroup.position.x, TRAMPOLINE_Y, characterGroup.position.z);
    }
    prevVelocity = characterVelocity;

    // Sanitize
    characterY = safeNum(characterY, 6);
    characterVelocity = safeNum(characterVelocity, 0);

    // Update character position
    characterGroup.position.y = characterY;

    // Track min Y
    if (characterY < state.characterMinY) {
      state.characterMinY = characterY;
    }

    // Update state
    state.characterY = characterY;
    state.characterVelocity = characterVelocity;
    state.bounceCount = bounceCount;
    state.maxDeformation = maxDeform;
    state.springForce = springForce;

    // Update particles
    updateParticles(dt);
  }

  controls.update();
  updateHUD();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
