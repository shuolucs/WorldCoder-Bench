<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulley System Diorama</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    canvas { display: block; }
    
    #controls {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 15px;
        align-items: center;
        background: rgba(0,0,0,0.7);
        padding: 15px 25px;
        border-radius: 12px;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
    }
    
    #controls button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
    }
    
    #releaseBtn {
        background: linear-gradient(135deg, #4CAF50, #45a049);
        color: white;
    }
    #releaseBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 4px 15px rgba(76,175,80,0.4); }
    #releaseBtn:disabled { background: #555; cursor: not-allowed; opacity: 0.6; }
    
    #resetBtn {
        background: linear-gradient(135deg, #ff6b6b, #ee5a24);
        color: white;
    }
    #resetBtn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(255,107,107,0.4); }
    
    .slider-group {
        display: flex;
        flex-direction: column;
        align-items: center;
        color: white;
        font-size: 12px;
    }
    
    .slider-group label {
        margin-bottom: 4px;
        font-weight: 600;
    }
    
    .slider-group input[type="range"] {
        width: 100px;
        accent-color: #DAA520;
    }
    
    .slider-group .value {
        margin-top: 2px;
        color: #DAA520;
        font-weight: bold;
    }
    
    #hud {
        position: absolute;
        top: 20px;
        left: 20px;
        background: rgba(0,0,0,0.75);
        color: #e0e0e0;
        padding: 18px 22px;
        border-radius: 12px;
        font-size: 13px;
        line-height: 1.8;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.1);
        min-width: 260px;
    }
    
    #hud .title {
        font-size: 16px;
        font-weight: 700;
        color: #DAA520;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(218,165,32,0.3);
        padding-bottom: 6px;
    }
    
    #hud .row {
        display: flex;
        justify-content: space-between;
    }
    
    #hud .label { color: #aaa; }
    #hud .value { color: #fff; font-weight: 600; }
    #hud .status-idle { color: #888; }
    #hud .status-running { color: #4CAF50; }
    #hud .status-paused { color: #FFC107; }
    #hud .status-stopped { color: #f44336; }
    
    #instructions {
        position: absolute;
        top: 20px;
        right: 20px;
        background: rgba(0,0,0,0.6);
        color: #aaa;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 11px;
        line-height: 1.7;
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255,255,255,0.05);
    }
    #instructions strong { color: #DAA520; }
</style>
</head>
<body>

<div id="hud">
    <div class="title">⚙ Atwood Machine</div>
    <div class="row"><span class="label">Status:</span><span class="value" id="hudStatus">idle</span></div>
    <div class="row"><span class="label">Time:</span><span class="value" id="hudTime">0.000 s</span></div>
    <div class="row"><span class="label">Velocity:</span><span class="value" id="hudVelocity">0.000 m/s</span></div>
    <div class="row"><span class="label">Acceleration:</span><span class="value" id="hudAccel">0.000 m/s²</span></div>
    <div class="row"><span class="label">Weight A (y):</span><span class="value" id="hudWeightA">2.000</span></div>
    <div class="row"><span class="label">Weight B (y):</span><span class="value" id="hudWeightB">2.000</span></div>
    <div class="row"><span class="label">Mass A:</span><span class="value" id="hudMassA">3.0 kg</span></div>
    <div class="row"><span class="label">Mass B:</span><span class="value" id="hudMassB">5.0 kg</span></div>
    <div class="row"><span class="label">KE:</span><span class="value" id="hudKE">0.000 J</span></div>
    <div class="row"><span class="label">PE:</span><span class="value" id="hudPE">0.000 J</span></div>
    <div class="row"><span class="label">Total E:</span><span class="value" id="hudTE">0.000 J</span></div>
</div>

<div id="instructions">
    <strong>P</strong> — Pause / Resume<br>
    <strong>Click Car</strong> — Honk!<br>
    Adjust masses when paused
</div>

<div id="controls">
    <button id="releaseBtn">▶ Release Weights</button>
    <button id="resetBtn">↺ Reset</button>
    <div class="slider-group">
        <label>Mass A (red)</label>
        <input type="range" id="massSliderA" min="1" max="9" step="0.5" value="3">
        <span class="value" id="massAVal">3.0 kg</span>
    </div>
    <div class="slider-group">
        <label>Mass B (blue)</label>
        <input type="range" id="massSliderB" min="1" max="9" step="0.5" value="5">
        <span class="value" id="massBVal">5.0 kg</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2.5, 0);
controls.update();

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x362d1b, 0.3);
scene.add(hemiLight);

// ============ FLOOR ============
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
floor.receiveShadow = true;
scene.add(floor);

// ============ TABLE ============
const tableGeo = new THREE.BoxGeometry(12, 0.3, 8);
const tableMat = new THREE.MeshStandardMaterial({ 
    color: 0x8B4513, 
    roughness: 0.7, 
    metalness: 0.05 
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = 0;
table.castShadow = true;
table.receiveShadow = true;
scene.add(table);

// Table legs
const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 8);
const legMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, roughness: 0.8 });
const legPositions = [[-5, -1, -3], [5, -1, -3], [-5, -1, 3], [5, -1, 3]];
legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    scene.add(leg);
});

// ============ PULLEY FRAME ============
const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 6, 16);
const postMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.4, metalness: 0.6 });

const postLeft = new THREE.Mesh(postGeo, postMat);
postLeft.position.set(-2, 3.15, 0);
postLeft.castShadow = true;
scene.add(postLeft);

const postRight = new THREE.Mesh(postGeo, postMat);
postRight.position.set(2, 3.15, 0);
postRight.castShadow = true;
scene.add(postRight);

// Horizontal beam
const beamGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 16);
const beam = new THREE.Mesh(beamGeo, postMat);
beam.position.set(0, 6.15, 0);
beam.rotation.z = Math.PI / 2;
beam.castShadow = true;
scene.add(beam);

// Small brackets at beam-post connections
const bracketGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
const bracketMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.7 });
const bracketL = new THREE.Mesh(bracketGeo, bracketMat);
bracketL.position.set(-2, 6.15, 0);
scene.add(bracketL);
const bracketR = new THREE.Mesh(bracketGeo, bracketMat);
bracketR.position.set(2, 6.15, 0);
scene.add(bracketR);

// ============ PULLEY WHEEL ============
const pulleyGeo = new THREE.TorusGeometry(0.4, 0.08, 16, 32);
const pulleyMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.3, metalness: 0.8 });
const pulleyWheel = new THREE.Mesh(pulleyGeo, pulleyMat);
pulleyWheel.position.set(0, 6.15, 0);
pulleyWheel.rotation.y = Math.PI / 2;
pulleyWheel.castShadow = true;
scene.add(pulleyWheel);

// Pulley axle
const axleGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 8);
const axleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
const axle = new THREE.Mesh(axleGeo, axleMat);
axle.position.set(0, 6.15, 0);
axle.rotation.x = Math.PI / 2;
scene.add(axle);

// ============ WEIGHTS ============
const weightAGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
const weightAMat = new THREE.MeshStandardMaterial({ color: 0xCC3333, roughness: 0.5, metalness: 0.3 });
const weightA = new THREE.Mesh(weightAGeo, weightAMat);
weightA.position.set(-2, 2.0, 0);
weightA.castShadow = true;
scene.add(weightA);

// Label on weight A
const weightALabel = createTextSprite('A', '#CC3333');
weightALabel.position.set(0, 0.5, 0);
weightA.add(weightALabel);

const weightBGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
const weightBMat = new THREE.MeshStandardMaterial({ color: 0x3333CC, roughness: 0.5, metalness: 0.3 });
const weightB = new THREE.Mesh(weightBGeo, weightBMat);
weightB.position.set(2, 2.0, 0);
weightB.castShadow = true;
scene.add(weightB);

const weightBLabel = createTextSprite('B', '#3333CC');
weightBLabel.position.set(0, 0.6, 0);
weightB.add(weightBLabel);

function createTextSprite(text, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'white';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 32, 32);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(0.4, 0.4, 0.4);
    return sprite;
}

// ============ ROPES ============
// Left rope: from weight A top to pulley top-left
// Right rope: from weight B top to pulley top-right
const ropeMat = new THREE.MeshStandardMaterial({ color: 0xCCBB88, roughness: 0.9 });

// We'll create ropes as thin cylinders and update them each frame
const ropeLeftGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
const ropeLeft = new THREE.Mesh(ropeLeftGeo, ropeMat);
scene.add(ropeLeft);

const ropeRightGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
const ropeRight = new THREE.Mesh(ropeRightGeo, ropeMat);
scene.add(ropeRight);

// Rope over pulley (small arc)
const ropeArcGeo = new THREE.TorusGeometry(0.4, 0.025, 8, 16, Math.PI);
const ropeArcMat = new THREE.MeshStandardMaterial({ color: 0xCCBB88, roughness: 0.9 });
const ropeArc = new THREE.Mesh(ropeArcGeo, ropeArcMat);
ropeArc.position.set(0, 6.15, 0);
ropeArc.rotation.y = Math.PI / 2;
ropeArc.rotation.z = Math.PI;
scene.add(ropeArc);

function updateRopes(ayPos, byPos) {
    const pulleyY = 6.15;
    const pulleyRadius = 0.4;
    
    // Left rope: from weightA top to left side of pulley
    const leftTopX = -2;
    const leftTopY = pulleyY - 0; // tangent point approximately at side
    const leftBottomY = ayPos + 0.3; // top of weight A
    const leftLen = leftTopY - leftBottomY;
    
    ropeLeft.scale.y = Math.max(leftLen, 0.01);
    ropeLeft.position.set(leftTopX, leftBottomY + leftLen / 2, 0);
    
    // Right rope
    const rightTopX = 2;
    const rightTopY = pulleyY;
    const rightBottomY = byPos + 0.4; // top of weight B
    const rightLen = rightTopY - rightBottomY;
    
    ropeRight.scale.y = Math.max(rightLen, 0.01);
    ropeRight.position.set(rightTopX, rightBottomY + rightLen / 2, 0);
}

// ============ DECORATIVE ELEMENTS ============
// Small crate on table
const crateGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
const crateMat = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.8 });
const crate = new THREE.Mesh(crateGeo, crateMat);
crate.position.set(-4, 0.55, 2);
crate.rotation.y = 0.3;
crate.castShadow = true;
scene.add(crate);

// Small sphere (ball) on table
const ballGeo = new THREE.SphereGeometry(0.25, 16, 16);
const ballMat = new THREE.MeshStandardMaterial({ color: 0x22AA44, roughness: 0.4, metalness: 0.2 });
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.set(-3, 0.4, -2);
ball.castShadow = true;
scene.add(ball);

// ============ LOAD TOY CAR ============
let toyCarModel = null;
let toyCarMeshes = [];
const gltfLoader = new GLTFLoader();

gltfLoader.load(
    'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/ToyCar.glb',
    (gltf) => {
        toyCarModel = gltf.scene;
        toyCarModel.scale.set(0.5, 0.5, 0.5);
        toyCarModel.position.set(4, 0.15, 2);
        toyCarModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                toyCarMeshes.push(child);
            }
        });
        scene.add(toyCarModel);
        state.carLoaded = true;
        console.log('ToyCar loaded successfully');
    },
    (progress) => {
        // loading progress
    },
    (error) => {
        console.warn('Could not load ToyCar.glb:', error);
        // Create a placeholder car
        const carBody = new THREE.Mesh(
            new THREE.BoxGeometry(1.5, 0.4, 0.7),
            new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.3, metalness: 0.5 })
        );
        carBody.position.set(4, 0.55, 2);
        carBody.castShadow = true;
        scene.add(carBody);
        
        const carTop = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 0.3, 0.6),
            new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.3, metalness: 0.5 })
        );
        carTop.position.set(0, 0.35, 0);
        carBody.add(carTop);
        
        toyCarModel = carBody;
        toyCarMeshes = [carBody, carTop];
        state.carLoaded = true;
    }
);

// ============ PHYSICS STATE ============
const g = 9.81;
let massA = 3.0;
let massB = 5.0;
let simTime = 0;
let velocity = 0;
let displacement = 0;
let simStatus = 'idle'; // idle, running, paused, stopped
let isPaused = false;
let initialWeightAY = 2.0;
let initialWeightBY = 2.0;
let initialEnergyTotal = 0;
let pulleyAngle = 0;

// Rope length constant
const pulleyY = 6.15;
const initialRopeLength = (pulleyY - initialWeightAY - 0.3) + (pulleyY - initialWeightBY - 0.4) + Math.PI * 0.4;

function computeAcceleration() {
    return (massB - massA) * g / (massA + massB);
}

function computeEnergies(ay, by, v) {
    const ke = 0.5 * (massA + massB) * v * v;
    const pe = (massA * ay + massB * by) * g;
    return { ke, pe, total: ke + pe };
}

// ============ GLOBAL STATE ============
const state = {
    simStatus: 'idle',
    simTime: 0,
    weightA_y: 2.0,
    weightB_y: 2.0,
    velocity: 0,
    acceleration: 0,
    massA: 3.0,
    massB: 5.0,
    pulleyAngle: 0,
    carLoaded: false,
    carHonked: false,
    ropeLength: initialRopeLength,
    energyKinetic: 0,
    energyPotential: 0,
    energyTotal: 0,
    initialEnergyTotal: 0,
    isPaused: false
};
window.__3D_STATE__ = state;

// ============ UI ELEMENTS ============
const releaseBtn = document.getElementById('releaseBtn');
const resetBtn = document.getElementById('resetBtn');
const massSliderA = document.getElementById('massSliderA');
const massSliderB = document.getElementById('massSliderB');
const massAValEl = document.getElementById('massAVal');
const massBValEl = document.getElementById('massBVal');

releaseBtn.addEventListener('click', () => {
    if (simStatus === 'idle') {
        simStatus = 'running';
        isPaused = false;
        simTime = 0;
        velocity = 0;
        displacement = 0;
        const energies = computeEnergies(weightA.position.y, weightB.position.y, 0);
        initialEnergyTotal = energies.total;
        state.initialEnergyTotal = initialEnergyTotal;
        releaseBtn.disabled = true;
    }
});

resetBtn.addEventListener('click', () => {
    simStatus = 'idle';
    isPaused = false;
    simTime = 0;
    velocity = 0;
    displacement = 0;
    pulleyAngle = 0;
    weightA.position.y = 2.0;
    weightB.position.y = 2.0;
    pulleyWheel.rotation.x = 0;
    releaseBtn.disabled = false;
    initialEnergyTotal = 0;
});

massSliderA.addEventListener('input', (e) => {
    if (simStatus === 'idle' || simStatus === 'stopped') {
        massA = parseFloat(e.target.value);
        massAValEl.textContent = massA.toFixed(1) + ' kg';
    } else {
        e.target.value = massA;
    }
});

massSliderB.addEventListener('input', (e) => {
    if (simStatus === 'idle' || simStatus === 'stopped') {
        massB = parseFloat(e.target.value);
        massBValEl.textContent = massB.toFixed(1) + ' kg';
    } else {
        e.target.value = massB;
    }
});

// Keyboard P for pause/resume
document.addEventListener('keydown', (e) => {
    if (e.key === 'p' || e.key === 'P') {
        if (simStatus === 'running') {
            simStatus = 'paused';
            isPaused = true;
        } else if (simStatus === 'paused') {
            simStatus = 'running';
            isPaused = false;
        }
    }
});

// ============ CAR CLICK (HONK) ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let audioCtx = null;

renderer.domElement.addEventListener('click', (event) => {
    if (!toyCarModel) return;
    
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    const intersects = raycaster.intersectObjects(toyCarMeshes, true);
    if (intersects.length > 0) {
        honkCar();
    }
});

function honkCar() {
    state.carHonked = true;
    
    // Play beep
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.frequency.value = 440;
    osc.type = 'sine';
    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.2);
    
    // Flash emissive white
    const originalEmissives = [];
    toyCarMeshes.forEach(mesh => {
        if (mesh.material) {
            const mat = mesh.material;
            originalEmissives.push({ mesh, emissive: mat.emissive ? mat.emissive.clone() : null });
            if (mat.emissive) {
                mat.emissive.set(0xffffff);
                mat.emissiveIntensity = 1.0;
            }
        }
    });
    
    setTimeout(() => {
        originalEmissives.forEach(({ mesh, emissive }) => {
            if (mesh.material && mesh.material.emissive && emissive) {
                mesh.material.emissive.copy(emissive);
                mesh.material.emissiveIntensity = 0;
            }
        });
    }, 300);
}

// ============ HUD UPDATE ============
function updateHUD() {
    const statusEl = document.getElementById('hudStatus');
    statusEl.textContent = simStatus;
    statusEl.className = 'value status-' + simStatus;
    
    document.getElementById('hudTime').textContent = simTime.toFixed(3) + ' s';
    document.getElementById('hudVelocity').textContent = velocity.toFixed(3) + ' m/s';
    document.getElementById('hudAccel').textContent = computeAcceleration().toFixed(3) + ' m/s²';
    document.getElementById('hudWeightA').textContent = weightA.position.y.toFixed(3);
    document.getElementById('hudWeightB').textContent = weightB.position.y.toFixed(3);
    document.getElementById('hudMassA').textContent = massA.toFixed(1) + ' kg';
    document.getElementById('hudMassB').textContent = massB.toFixed(1) + ' kg';
    
    const energies = computeEnergies(weightA.position.y, weightB.position.y, velocity);
    document.getElementById('hudKE').textContent = energies.ke.toFixed(3) + ' J';
    document.getElementById('hudPE').textContent = energies.pe.toFixed(3) + ' J';
    document.getElementById('hudTE').textContent = energies.total.toFixed(3) + ' J';
}

// ============ UPDATE STATE ============
function updateState() {
    const acc = computeAcceleration();
    const energies = computeEnergies(weightA.position.y, weightB.position.y, velocity);
    
    state.simStatus = simStatus;
    state.simTime = simTime;
    state.weightA_y = weightA.position.y;
    state.weightB_y = weightB.position.y;
    state.velocity = velocity;
    state.acceleration = acc;
    state.massA = massA;
    state.massB = massB;
    state.pulleyAngle = pulleyAngle;
    state.ropeLength = initialRopeLength;
    state.energyKinetic = energies.ke;
    state.energyPotential = energies.pe;
    state.energyTotal = energies.total;
    state.isPaused = isPaused;
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const dt = clock.getDelta();
    
    // Physics update
    if (simStatus === 'running' && !isPaused) {
        const acc = computeAcceleration();
        
        simTime += dt;
        
        // Using kinematic equations with accumulated velocity for smooth simulation
        velocity += acc * dt;
        displacement += velocity * dt;
        
        // Weight A goes up (if B is heavier), Weight B goes down
        // displacement is positive when B moves down
        let newAY = initialWeightAY + displacement; // A goes up
        let newBY = initialWeightBY - displacement; // B goes down
        
        // Clamp
        let stopped = false;
        if (newBY <= 0.55) { // table surface + half height of weight B
            newBY = 0.55;
            newAY = initialWeightAY + (initialWeightBY - newBY);
            stopped = true;
        }
        if (newAY >= 5.5) {
            newAY = 5.5;
            newBY = initialWeightBY - (newAY - initialWeightAY);
            stopped = true;
        }
        
        weightA.position.y = newAY;
        weightB.position.y = newBY;
        
        // Pulley rotation
        const pulleyRadius = 0.4;
        pulleyAngle = displacement / pulleyRadius;
        pulleyWheel.rotation.x = pulleyAngle;
        
        if (stopped) {
            simStatus = 'stopped';
            velocity = 0;
        }
    }
    
    // Update ropes
    updateRopes(weightA.position.y, weightB.position.y);
    
    // Slight weight sway when idle (decorative)
    if (simStatus === 'idle') {
        const t = clock.elapsedTime;
        weightA.rotation.z = Math.sin(t * 0.5) * 0.02;
        weightB.rotation.z = Math.sin(t * 0.5 + 1) * 0.02;
    }
    
    // Update HUD and state
    updateHUD();
    updateState();
    
    controls.update();
    renderer.render(scene, camera);
}

// Initial rope update
updateRopes(2.0, 2.0);

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
