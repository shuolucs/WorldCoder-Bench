<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Pulley System Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        #hud {
            background: rgba(0, 0, 0, 0.75);
            color: #00ffcc;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #00ffcc;
            font-size: 14px;
            line-height: 1.6;
            min-width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            pointer-events: auto;
            height: fit-content;
        }
        #hud span {
            color: #ffffff;
        }
        #controls {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            height: fit-content;
            min-width: 200px;
        }
        button {
            background: #3333cc;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #4444ff;
        }
        button:disabled {
            background: #888;
            cursor: not-allowed;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .slider-group label {
            font-size: 14px;
            font-weight: bold;
            color: #333;
        }
        input[type=range] {
            width: 100%;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="hud">
            <b>System Status:</b> <span id="hud-status">IDLE</span><br>
            <b>Time:</b> <span id="hud-time">0.00</span> s<br>
            <b>Velocity:</b> <span id="hud-vel">0.00</span> m/s<br>
            <b>Weight A Y:</b> <span id="hud-ya">2.00</span> m<br>
            <b>Weight B Y:</b> <span id="hud-yb">2.00</span> m<br>
            <b>Mass A:</b> <span id="hud-ma">3.0</span> kg<br>
            <b>Mass B:</b> <span id="hud-mb">5.0</span> kg<br>
        </div>

        <div id="controls">
            <button id="releaseBtn">Release Weights</button>
            <button id="resetBtn">Reset</button>
            
            <div class="slider-group">
                <label for="massSliderA">Mass A (Red): <span id="valA">3.0</span> kg</label>
                <input type="range" id="massSliderA" min="1" max="9" step="0.5" value="3">
            </div>
            
            <div class="slider-group">
                <label for="massSliderB">Mass B (Blue): <span id="valB">5.0</span> kg</label>
                <input type="range" id="massSliderB" min="1" max="9" step="0.5" value="5">
            </div>
        </div>
    </div>

    <div class="instructions">
        Press 'P' to Pause/Resume | Click the Toy Car to Honk
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            simStatus: 'idle',
            simTime: 0,
            weightA_y: 2.0,
            weightB_y: 2.0,
            velocity: 0,
            acceleration: 0,
            massA: 3,
            massB: 5,
            pulleyAngle: 0,
            carLoaded: false,
            carHonked: false,
            ropeLength: 9.25, // 4 + 4 + pi*0.4
            energyKinetic: 0,
            energyPotential: 0,
            energyTotal: 0,
            initialEnergyTotal: 0,
            isPaused: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 3, 0);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Diorama Objects ---
        // Table
        const tableGeo = new THREE.BoxGeometry(12, 0.3, 8);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.y = 0; // Center at 0, top surface is at 0.15
        table.receiveShadow = true;
        scene.add(table);

        // Pulley Frame
        const postGeo = new THREE.CylinderGeometry(0.15, 0.15, 6, 16);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.5, roughness: 0.5 });
        
        const post1 = new THREE.Mesh(postGeo, frameMat);
        post1.position.set(-2, 3.15, 0); // Resting on table
        post1.castShadow = true;
        post1.receiveShadow = true;
        scene.add(post1);

        const post2 = new THREE.Mesh(postGeo, frameMat);
        post2.position.set(2, 3.15, 0);
        post2.castShadow = true;
        post2.receiveShadow = true;
        scene.add(post2);

        const beamGeo = new THREE.CylinderGeometry(0.1, 0.1, 4.3, 16);
        const beam = new THREE.Mesh(beamGeo, frameMat);
        beam.rotation.z = Math.PI / 2;
        beam.position.set(0, 6, 0);
        beam.castShadow = true;
        beam.receiveShadow = true;
        scene.add(beam);

        // Pulley Wheel
        const pulleyGeo = new THREE.TorusGeometry(0.4, 0.08, 16, 32);
        const pulleyMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.8, roughness: 0.2 });
        const pulley = new THREE.Mesh(pulleyGeo, pulleyMat);
        pulley.position.set(0, 6, 0);
        pulley.castShadow = true;
        scene.add(pulley);

        // Spokes for visual rotation
        const spokeGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.8);
        const spoke1 = new THREE.Mesh(spokeGeo, frameMat);
        const spoke2 = new THREE.Mesh(spokeGeo, frameMat);
        spoke2.rotation.z = Math.PI / 2;
        pulley.add(spoke1);
        pulley.add(spoke2);

        // Weights
        const weightAGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const weightAMat = new THREE.MeshStandardMaterial({ color: 0xCC3333 });
        const weightA = new THREE.Mesh(weightAGeo, weightAMat);
        weightA.position.set(-0.4, 2.0, 0);
        weightA.castShadow = true;
        weightA.receiveShadow = true;
        scene.add(weightA);

        const weightBGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const weightBMat = new THREE.MeshStandardMaterial({ color: 0x3333CC });
        const weightB = new THREE.Mesh(weightBGeo, weightBMat);
        weightB.position.set(0.4, 2.0, 0);
        weightB.castShadow = true;
        weightB.receiveShadow = true;
        scene.add(weightB);

        // Ropes
        const ropeGeoBase = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
        ropeGeoBase.translate(0, 0.5, 0); // Base at 0, grows upwards
        const ropeMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
        
        const ropeA = new THREE.Mesh(ropeGeoBase, ropeMat);
        ropeA.position.set(-0.4, 2.0, 0);
        ropeA.scale.y = 4.0; // 6.0 - 2.0
        ropeA.castShadow = true;
        scene.add(ropeA);

        const ropeB = new THREE.Mesh(ropeGeoBase, ropeMat);
        ropeB.position.set(0.4, 2.0, 0);
        ropeB.scale.y = 4.0;
        ropeB.castShadow = true;
        scene.add(ropeB);

        // Top rope arc over pulley
        const arcGeo = new THREE.TorusGeometry(0.4, 0.02, 8, 16, Math.PI);
        const arc = new THREE.Mesh(arcGeo, ropeMat);
        arc.position.set(0, 6, 0);
        scene.add(arc);

        // --- Load ToyCar ---
        const carGroup = new THREE.Group();
        carGroup.position.set(4, 0.15, 2);
        scene.add(carGroup);

        const loader = new GLTFLoader();
        loader.load(
            'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/ToyCar.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5);
                
                // Adjust height so it sits on table
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                model.position.y = size.y / 2;

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Ensure material has emissive property for flashing
                        if (!child.material.emissive) {
                            child.material.emissive = new THREE.Color(0x000000);
                        }
                    }
                });
                carGroup.add(model);
                window.__3D_STATE__.carLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Could not load ToyCar.glb, creating fallback.", error);
                // Fallback Car
                const bodyGeo = new THREE.BoxGeometry(1.2, 0.4, 0.6);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x228822 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.3;
                body.castShadow = true;
                
                const topGeo = new THREE.BoxGeometry(0.6, 0.3, 0.5);
                const topMat = new THREE.MeshStandardMaterial({ color: 0xdddddd });
                const top = new THREE.Mesh(topGeo, topMat);
                top.position.set(-0.1, 0.65, 0);
                top.castShadow = true;

                carGroup.add(body);
                carGroup.add(top);
                window.__3D_STATE__.carLoaded = true;
            }
        );

        // --- Physics & Logic ---
        const g = 9.81;
        let isRunning = false;
        let isPaused = false;
        let simTime = 0;

        const releaseBtn = document.getElementById('releaseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const sliderA = document.getElementById('massSliderA');
        const sliderB = document.getElementById('massSliderB');
        const valA = document.getElementById('valA');
        const valB = document.getElementById('valB');

        sliderA.addEventListener('input', (e) => {
            valA.textContent = parseFloat(e.target.value).toFixed(1);
            window.__3D_STATE__.massA = parseFloat(e.target.value);
            updateEnergies();
        });

        sliderB.addEventListener('input', (e) => {
            valB.textContent = parseFloat(e.target.value).toFixed(1);
            window.__3D_STATE__.massB = parseFloat(e.target.value);
            updateEnergies();
        });

        releaseBtn.addEventListener('click', () => {
            isRunning = true;
            isPaused = false;
            window.__3D_STATE__.simStatus = 'running';
            releaseBtn.disabled = true;
            sliderA.disabled = true;
            sliderB.disabled = true;
            
            // Capture initial energy
            updateEnergies();
            window.__3D_STATE__.initialEnergyTotal = window.__3D_STATE__.energyTotal;
        });

        resetBtn.addEventListener('click', () => {
            isRunning = false;
            isPaused = false;
            simTime = 0;
            
            weightA.position.y = 2.0;
            weightB.position.y = 2.0;
            ropeA.position.y = 2.0;
            ropeA.scale.y = 4.0;
            ropeB.position.y = 2.0;
            ropeB.scale.y = 4.0;
            pulley.rotation.z = 0;

            window.__3D_STATE__.simStatus = 'idle';
            window.__3D_STATE__.simTime = 0;
            window.__3D_STATE__.velocity = 0;
            window.__3D_STATE__.weightA_y = 2.0;
            window.__3D_STATE__.weightB_y = 2.0;
            window.__3D_STATE__.pulleyAngle = 0;

            releaseBtn.disabled = false;
            sliderA.disabled = false;
            sliderB.disabled = false;
            
            updateEnergies();
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'p') {
                if (window.__3D_STATE__.simStatus === 'running' || window.__3D_STATE__.simStatus === 'paused') {
                    isPaused = !isPaused;
                    window.__3D_STATE__.simStatus = isPaused ? 'paused' : 'running';
                    window.__3D_STATE__.isPaused = isPaused;
                }
            }
        });

        // --- Interaction: Car Click ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function honk() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, ctx.currentTime);
            
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            setTimeout(() => {
                osc.stop();
                ctx.close();
            }, 200);
        }

        window.addEventListener('click', (e) => {
            // Ignore UI clicks
            if (e.target.closest('#ui-layer')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(carGroup, true);

            if (intersects.length > 0) {
                honk();
                window.__3D_STATE__.carHonked = true;

                // Flash emissive
                const originalEmissives = new Map();
                carGroup.traverse((child) => {
                    if (child.isMesh && child.material) {
                        // Handle multi-materials
                        const mats = Array.isArray(child.material) ? child.material : [child.material];
                        mats.forEach(mat => {
                            if (mat.emissive) {
                                originalEmissives.set(mat, mat.emissive.clone());
                                mat.emissive.setHex(0xffffff);
                            }
                        });
                    }
                });

                setTimeout(() => {
                    carGroup.traverse((child) => {
                        if (child.isMesh && child.material) {
                            const mats = Array.isArray(child.material) ? child.material : [child.material];
                            mats.forEach(mat => {
                                if (originalEmissives.has(mat)) {
                                    mat.emissive.copy(originalEmissives.get(mat));
                                }
                            });
                        }
                    });
                }, 300);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateEnergies() {
            const mA = window.__3D_STATE__.massA;
            const mB = window.__3D_STATE__.massB;
            const v = window.__3D_STATE__.velocity;
            const yA = weightA.position.y;
            const yB = weightB.position.y;
            
            const ke = 0.5 * (mA + mB) * v * v;
            const pe = (mA * yA + mB * yB) * g;
            
            window.__3D_STATE__.energyKinetic = ke;
            window.__3D_STATE__.energyPotential = pe;
            window.__3D_STATE__.energyTotal = ke + pe;
        }

        function updateHUD() {
            const s = window.__3D_STATE__;
            document.getElementById('hud-status').textContent = s.simStatus.toUpperCase();
            document.getElementById('hud-time').textContent = s.simTime.toFixed(2);
            document.getElementById('hud-vel').textContent = s.velocity.toFixed(2);
            document.getElementById('hud-ya').textContent = s.weightA_y.toFixed(2);
            document.getElementById('hud-yb').textContent = s.weightB_y.toFixed(2);
            document.getElementById('hud-ma').textContent = s.massA.toFixed(1);
            document.getElementById('hud-mb').textContent = s.massB.toFixed(1);
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();

            if (isRunning && !isPaused) {
                const mA = window.__3D_STATE__.massA;
                const mB = window.__3D_STATE__.massB;
                
                // a = (m2 - m1) * g / (m1 + m2)
                const a = ((mB - mA) / (mA + mB)) * g;
                window.__3D_STATE__.acceleration = a;

                simTime += dt;
                const v = a * simTime;
                const dy = 0.5 * a * simTime * simTime;

                let newYA = 2.0 + dy;
                let newYB = 2.0 - dy;

                // Limits
                const tableY = 0.15;
                const beamY = 6.0;
                const halfA = 0.3;
                const halfB = 0.4;
                
                const minYB = tableY + halfB; // 0.55
                const maxYA = beamY - halfA;  // 5.7
                const minYA = tableY + halfA; // 0.45
                const maxYB = beamY - halfB;  // 5.6

                let hitLimit = false;

                if (newYB <= minYB) { newYB = minYB; newYA = 2.0 + (2.0 - minYB); hitLimit = true; }
                if (newYA >= maxYA) { newYA = maxYA; newYB = 2.0 - (maxYA - 2.0); hitLimit = true; }
                if (newYA <= minYA) { newYA = minYA; newYB = 2.0 + (2.0 - minYA); hitLimit = true; }
                if (newYB >= maxYB) { newYB = maxYB; newYA = 2.0 - (maxYB - 2.0); hitLimit = true; }

                if (hitLimit) {
                    isRunning = false;
                    window.__3D_STATE__.simStatus = 'stopped';
                    window.__3D_STATE__.velocity = 0;
                } else {
                    window.__3D_STATE__.velocity = Math.abs(v);
                }

                // Apply positions
                weightA.position.y = newYA;
                weightB.position.y = newYB;

                // Update ropes
                ropeA.position.y = newYA;
                ropeA.scale.y = beamY - newYA;
                
                ropeB.position.y = newYB;
                ropeB.scale.y = beamY - newYB;

                // Update pulley rotation (arc length s = r * theta => theta = s / r)
                // dy is positive when B moves down. Pulley should rotate clockwise (negative Z)
                pulley.rotation.z = -dy / 0.4;

                // Update State
                window.__3D_STATE__.simTime = simTime;
                window.__3D_STATE__.weightA_y = newYA;
                window.__3D_STATE__.weightB_y = newYB;
                window.__3D_STATE__.pulleyAngle = pulley.rotation.z;
            }

            updateEnergies();
            updateHUD();

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize energies
        updateEnergies();
        window.__3D_STATE__.initialEnergyTotal = window.__3D_STATE__.energyTotal;

        animate();
    </script>
</body>
</html>
