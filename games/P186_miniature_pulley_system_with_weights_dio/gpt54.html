<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Pulley Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1c1c1c;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(255,255,255,0.92);
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
      min-width: 220px;
    }

    #ui label {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      color: #222;
    }

    #ui button, #ui input {
      margin-top: 6px;
      width: 100%;
      box-sizing: border-box;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,0.6);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
      min-width: 240px;
      white-space: pre-line;
    }

    .valueRow {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>

  <div id="ui">
    <button id="releaseBtn">Release Weights</button>
    <button id="resetBtn">Reset</button>

    <label for="massSliderA">Mass Slider A</label>
    <input id="massSliderA" type="range" min="1" max="9" step="0.5" value="3" />
    <div class="valueRow"><span>Weight A Mass</span><span id="massAVal">3.0 kg</span></div>

    <label for="massSliderB">Mass Slider B</label>
    <input id="massSliderB" type="range" min="1" max="9" step="0.5" value="5" />
    <div class="valueRow"><span>Weight B Mass</span><span id="massBVal">5.0 kg</span></div>

    <div style="margin-top:10px;font-size:12px;color:#333;">
      Press <b>P</b> to pause/resume after release.<br />
      Click the toy car to honk.
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xbfd1e5);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2.2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const tableTopY = 0;
    const tableThickness = 0.3;

    const table = new THREE.Mesh(
      new THREE.BoxGeometry(12, 0.3, 8),
      new THREE.MeshStandardMaterial({ color: '#8B4513', roughness: 0.8, metalness: 0.1 })
    );
    table.position.set(0, tableTopY, 0);
    table.receiveShadow = true;
    table.castShadow = true;
    scene.add(table);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0x999999, roughness: 1 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2;
    floor.receiveShadow = true;
    scene.add(floor);

    const postMat = new THREE.MeshStandardMaterial({ color: '#555555', roughness: 0.6, metalness: 0.35 });
    const beamMat = postMat;
    const pulleyMat = new THREE.MeshStandardMaterial({ color: '#DAA520', roughness: 0.35, metalness: 0.85 });
    const ropeMat = new THREE.MeshStandardMaterial({ color: 0xf0e0b0, roughness: 0.9, metalness: 0.0 });

    function makeCylinder(radiusTop, radiusBottom, height, material) {
      const m = new THREE.Mesh(new THREE.CylinderGeometry(radiusTop, radiusBottom, height, 24), material);
      m.castShadow = true;
      m.receiveShadow = true;
      return m;
    }

    const leftPost = makeCylinder(0.15, 0.15, 6, postMat);
    leftPost.position.set(-2, 3, 0);
    scene.add(leftPost);

    const rightPost = makeCylinder(0.15, 0.15, 6, postMat);
    rightPost.position.set(2, 3, 0);
    scene.add(rightPost);

    const beam = makeCylinder(0.1, 0.1, 4, beamMat);
    beam.rotation.z = Math.PI / 2;
    beam.position.set(0, 6, 0);
    scene.add(beam);

    const pulleyWheel = new THREE.Mesh(
      new THREE.TorusGeometry(0.4, 0.08, 16, 48),
      pulleyMat
    );
    pulleyWheel.position.set(0, 6, 0);
    pulleyWheel.castShadow = true;
    pulleyWheel.receiveShadow = true;
    scene.add(pulleyWheel);

    const pulleyHub = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.08, 0.25, 24),
      new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.5, metalness: 0.7 })
    );
    pulleyHub.rotation.z = Math.PI / 2;
    pulleyHub.position.copy(pulleyWheel.position);
    pulleyHub.castShadow = true;
    scene.add(pulleyHub);

    const weightAGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
    const weightBGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);

    const weightAMat = new THREE.MeshStandardMaterial({ color: '#CC3333', roughness: 0.6, metalness: 0.1 });
    const weightBMat = new THREE.MeshStandardMaterial({ color: '#3333CC', roughness: 0.6, metalness: 0.1 });

    const weightA = new THREE.Mesh(weightAGeo, weightAMat);
    const weightB = new THREE.Mesh(weightBGeo, weightBMat);
    weightA.castShadow = weightA.receiveShadow = true;
    weightB.castShadow = weightB.receiveShadow = true;
    scene.add(weightA, weightB);

    const ropeRadius = 0.03;
    const leftRope = new THREE.Mesh(
      new THREE.CylinderGeometry(ropeRadius, ropeRadius, 1, 10),
      ropeMat
    );
    const rightRope = new THREE.Mesh(
      new THREE.CylinderGeometry(ropeRadius, ropeRadius, 1, 10),
      ropeMat
    );
    leftRope.castShadow = leftRope.receiveShadow = true;
    rightRope.castShadow = rightRope.receiveShadow = true;
    scene.add(leftRope, rightRope);

    const arcPoints = [];
    const pulleyRopeRadius = 0.42;
    for (let i = 0; i <= 32; i++) {
      const t = Math.PI - (i / 32) * Math.PI;
      arcPoints.push(new THREE.Vector3(
        Math.cos(t) * pulleyRopeRadius,
        6 + Math.sin(t) * pulleyRopeRadius,
        0
      ));
    }
    const arcGeo = new THREE.BufferGeometry().setFromPoints(arcPoints);
    const arcLine = new THREE.Line(
      arcGeo,
      new THREE.LineBasicMaterial({ color: 0xf0e0b0 })
    );
    scene.add(arcLine);

    const leftX = -pulleyRopeRadius;
    const rightX = pulleyRopeRadius;
    const startY = 2.0;
    const maxAY = 5.5;
    const minBY = 0.3;
    const pulleyRadiusForRotation = 0.4;

    weightA.position.set(leftX, startY, 0);
    weightB.position.set(rightX, startY, 0);

    function updateRopes() {
      const topLeftY = 6;
      const topRightY = 6;

      const leftLen = Math.max(0.01, topLeftY - weightA.position.y);
      leftRope.scale.set(1, leftLen, 1);
      leftRope.position.set(leftX, weightA.position.y + leftLen / 2, 0);

      const rightLen = Math.max(0.01, topRightY - weightB.position.y);
      rightRope.scale.set(1, rightLen, 1);
      rightRope.position.set(rightX, weightB.position.y + rightLen / 2, 0);
    }
    updateRopes();

    const releaseBtn = document.getElementById('releaseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const massSliderA = document.getElementById('massSliderA');
    const massSliderB = document.getElementById('massSliderB');
    const massAVal = document.getElementById('massAVal');
    const massBVal = document.getElementById('massBVal');
    const hud = document.getElementById('hud');

    const g = 9.81;

    const state = {
      simStatus: 'idle',
      simTime: 0,
      weightA_y: startY,
      weightB_y: startY,
      velocity: 0,
      acceleration: 0,
      massA: parseFloat(massSliderA.value),
      massB: parseFloat(massSliderB.value),
      pulleyAngle: 0,
      carLoaded: false,
      carHonked: false,
      ropeLength: 0,
      energyKinetic: 0,
      energyPotential: 0,
      energyTotal: 0,
      initialEnergyTotal: 0,
      isPaused: false
    };

    window.__3D_STATE__ = state;

    function computeRopeLength() {
      return (6 - weightA.position.y) + (6 - weightB.position.y) + Math.PI * pulleyRopeRadius;
    }

    function computeAcceleration() {
      return ((state.massB - state.massA) * g) / (state.massA + state.massB);
    }

    function updateEnergies() {
      state.energyKinetic = 0.5 * (state.massA + state.massB) * state.velocity * state.velocity;
      state.energyPotential = (state.massA * state.weightA_y + state.massB * state.weightB_y) * g;
      state.energyTotal = state.energyKinetic + state.energyPotential;
      state.ropeLength = computeRopeLength();
    }

    function syncStateFromScene() {
      state.weightA_y = weightA.position.y;
      state.weightB_y = weightB.position.y;
      updateEnergies();
    }

    function updateHUD() {
      hud.textContent =
`Time: ${state.simTime.toFixed(2)} s
Velocity: ${state.velocity.toFixed(2)} m/s
Weight A Y: ${state.weightA_y.toFixed(2)}
Weight B Y: ${state.weightB_y.toFixed(2)}
Mass A: ${state.massA.toFixed(1)} kg
Mass B: ${state.massB.toFixed(1)} kg
Acceleration: ${state.acceleration.toFixed(2)} m/s²
Pulley Angle: ${state.pulleyAngle.toFixed(2)} rad
Rope Length: ${state.ropeLength.toFixed(3)}
KE: ${state.energyKinetic.toFixed(2)} J
PE: ${state.energyPotential.toFixed(2)} J
Total E: ${state.energyTotal.toFixed(2)} J
Initial E: ${state.initialEnergyTotal.toFixed(2)} J
Car Loaded: ${state.carLoaded}
Status: ${state.simStatus}`;
    }

    function resetSimulation() {
      state.simStatus = 'idle';
      state.simTime = 0;
      state.velocity = 0;
      state.acceleration = computeAcceleration();
      state.pulleyAngle = 0;
      state.initialEnergyTotal = 0;
      state.isPaused = false;

      weightA.position.y = startY;
      weightB.position.y = startY;
      pulleyWheel.rotation.z = 0;
      updateRopes();
      syncStateFromScene();
      releaseBtn.disabled = false;
      updateHUD();
    }

    massSliderA.addEventListener('input', () => {
      if (state.simStatus === 'idle' || state.simStatus === 'paused' || state.simStatus === 'stopped') {
        state.massA = parseFloat(massSliderA.value);
        state.acceleration = computeAcceleration();
        massAVal.textContent = `${state.massA.toFixed(1)} kg`;
        syncStateFromScene();
        updateHUD();
      } else {
        massSliderA.value = state.massA;
      }
    });

    massSliderB.addEventListener('input', () => {
      if (state.simStatus === 'idle' || state.simStatus === 'paused' || state.simStatus === 'stopped') {
        state.massB = parseFloat(massSliderB.value);
        state.acceleration = computeAcceleration();
        massBVal.textContent = `${state.massB.toFixed(1)} kg`;
        syncStateFromScene();
        updateHUD();
      } else {
        massSliderB.value = state.massB;
      }
    });

    releaseBtn.addEventListener('click', () => {
      if (state.simStatus === 'idle' || state.simStatus === 'stopped') {
        state.massA = parseFloat(massSliderA.value);
        state.massB = parseFloat(massSliderB.value);
        state.acceleration = computeAcceleration();
        state.simStatus = 'running';
        state.isPaused = false;
        state.simTime = 0;
        state.velocity = 0;
        syncStateFromScene();
        state.initialEnergyTotal = state.energyTotal;
        releaseBtn.disabled = true;
        updateHUD();
      }
    });

    resetBtn.addEventListener('click', () => {
      resetSimulation();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'p') {
        if (releaseBtn.disabled && state.simStatus !== 'stopped' && state.simStatus !== 'idle') {
          if (state.simStatus === 'running') {
            state.simStatus = 'paused';
            state.isPaused = true;
          } else if (state.simStatus === 'paused') {
            state.simStatus = 'running';
            state.isPaused = false;
          }
          updateHUD();
        }
      }
    });

    let carRoot = null;
    const carClickable = [];
    const carOriginalMaterials = new Map();

    const loader = new GLTFLoader();
    loader.load(
      'ToyCar.glb',
      (gltf) => {
        carRoot = gltf.scene;
        carRoot.scale.setScalar(0.5);
        carRoot.position.set(4, 0.15, 2);
        carRoot.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            carClickable.push(obj);
            if (obj.material) {
              obj.material = obj.material.clone();
              if (!('emissive' in obj.material)) {
                obj.material.emissive = new THREE.Color(0x000000);
              }
              if (typeof obj.material.emissiveIntensity === 'undefined') {
                obj.material.emissiveIntensity = 1;
              }
              carOriginalMaterials.set(obj, {
                emissive: obj.material.emissive ? obj.material.emissive.clone() : new THREE.Color(0x000000),
                emissiveIntensity: obj.material.emissiveIntensity ?? 1
              });
            }
          }
        });
        scene.add(carRoot);
        state.carLoaded = true;
        updateHUD();
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.8, 0.35, 0.45),
          new THREE.MeshStandardMaterial({ color: 0x22aa22, roughness: 0.5, metalness: 0.2 })
        );
        fallback.position.set(4, 0.35, 2);
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        scene.add(fallback);
      }
    );

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let audioCtx = null;

    function honkCar() {
      state.carHonked = true;
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.value = 440;
      gain.gain.value = 0.06;
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);

      if (carRoot) {
        const flashed = [];
        carRoot.traverse((obj) => {
          if (obj.isMesh && obj.material && 'emissive' in obj.material) {
            obj.material.emissive.set(0xffffff);
            obj.material.emissiveIntensity = 1.5;
            flashed.push(obj);
          }
        });
        setTimeout(() => {
          flashed.forEach((obj) => {
            const orig = carOriginalMaterials.get(obj);
            if (orig && obj.material) {
              obj.material.emissive.copy(orig.emissive);
              obj.material.emissiveIntensity = orig.emissiveIntensity;
            }
          });
        }, 300);
      }
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);

      const hits = raycaster.intersectObjects(carClickable, true);
      if (hits.length > 0) {
        honkCar();
      }
    });

    const clock = new THREE.Clock();

    state.acceleration = computeAcceleration();
    syncStateFromScene();
    state.initialEnergyTotal = state.energyTotal;
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      if (state.simStatus === 'running') {
        state.simTime += dt;
        state.acceleration = computeAcceleration();

        const displacement = 0.5 * state.acceleration * state.simTime * state.simTime;
        const velocity = state.acceleration * state.simTime;

        let newAY = startY + displacement;
        let newBY = startY - displacement;
        let stopped = false;

        if (newBY <= minBY) {
          newBY = minBY;
          newAY = startY + (startY - minBY);
          stopped = true;
        }

        if (newAY >= maxAY) {
          newAY = maxAY;
          newBY = startY - (maxAY - startY);
          stopped = true;
        }

        const deltaDispA = newAY - weightA.position.y;

        weightA.position.y = newAY;
        weightB.position.y = newBY;

        state.velocity = stopped ? 0 : Math.abs(velocity);

        state.pulleyAngle += deltaDispA / pulleyRadiusForRotation;
        pulleyWheel.rotation.z = state.pulleyAngle;

        updateRopes();
        syncStateFromScene();

        if (stopped) {
          state.simStatus = 'stopped';
          state.isPaused = false;
        }
      } else {
        syncStateFromScene();
      }

      controls.update();
      updateHUD();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
