<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Trampoline Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #fff;
    padding: 18px 22px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 240px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
}

#hud-panel h2 {
    margin-bottom: 8px;
    font-size: 18px;
    color: #87CEEB;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
}

.stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.stat-label { color: #aaa; }
.stat-value { color: #fff; font-weight: bold; }

#difficulty-display {
    color: #4CAF50;
    font-weight: bold;
    font-size: 16px;
}

.btn-group {
    display: flex;
    gap: 6px;
    margin-top: 12px;
}

.btn-group button {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 12px;
    transition: all 0.2s;
    color: #fff;
}

.btn-group button:hover {
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

#btn-easy { background: #4CAF50; }
#btn-medium { background: #FF9800; }
#btn-hard { background: #f44336; }
#btn-reset { background: #2196F3; margin-top: 6px; width: 100%; padding: 8px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 13px; color: #fff; transition: all 0.2s; }
#btn-reset:hover { background: #1976D2; transform: translateY(-1px); }

.controls-hint {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid rgba(255,255,255,0.15);
    font-size: 11px;
    color: #888;
    line-height: 1.6;
}

.controls-hint kbd {
    background: rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 11px;
}
</style>
</head>
<body>

<div id="hud-panel">
    <h2>🎪 Trampoline Sim</h2>
    <div class="stat-row">
        <span class="stat-label">Difficulty:</span>
        <span class="stat-value" id="difficulty-display">Easy</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Bounces:</span>
        <span class="stat-value" id="bounce-count">0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Height:</span>
        <span class="stat-value" id="height-display">6.0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Max Height:</span>
        <span class="stat-value" id="max-height-display">6.0</span>
    </div>
    <div class="stat-row">
        <span class="stat-label">Velocity Y:</span>
        <span class="stat-value" id="velocity-display">0.0</span>
    </div>
    <div class="btn-group">
        <button id="btn-easy">Easy (1)</button>
        <button id="btn-medium">Medium (2)</button>
        <button id="btn-hard">Hard (3)</button>
    </div>
    <button id="btn-reset">↺ Reset</button>
    <div class="controls-hint">
        <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
        <kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Difficulty
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ============ GLOBAL STATE ============
window.__3D_STATE__ = {
    characterY: 6,
    characterVelY: 0,
    bounceCount: 0,
    difficulty: 1,
    maxHeight: 6,
    restitution: 0.95,
    gravity: 7.0,
    meshDeformed: false,
    characterOnTrampoline: true,
    characterX: 0,
    characterZ: 0,
    animationPlaying: false,
    safeZoneRadius: 4.5,
    fallen: false
};

// ============ DIFFICULTY SETTINGS ============
const DIFFICULTIES = {
    1: { name: 'Easy', restitution: 0.95, maxDeformation: 0.8, gravity: 7.0, safeZoneRadius: 4.5, color: '#4CAF50' },
    2: { name: 'Medium', restitution: 0.85, maxDeformation: 1.2, gravity: 9.81, safeZoneRadius: 3.5, color: '#FF9800' },
    3: { name: 'Hard', restitution: 0.70, maxDeformation: 1.8, gravity: 14.0, safeZoneRadius: 2.5, color: '#f44336' }
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 3, 0);

// ============ LIGHTS ============
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshPhongMaterial({ color: 0x44AA44 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ TRAMPOLINE ============
const TRAMPOLINE_Y = 2;

// Frame
const frameGeo = new THREE.TorusGeometry(5, 0.3, 16, 64);
const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.3 });
const frame = new THREE.Mesh(frameGeo, frameMat);
frame.rotation.x = -Math.PI / 2;
frame.position.y = TRAMPOLINE_Y;
frame.castShadow = true;
frame.receiveShadow = true;
scene.add(frame);

// Deformable surface
const surfaceGeo = new THREE.CircleGeometry(4.8, 64, 32);
const surfaceMat = new THREE.MeshPhongMaterial({
    color: 0x2244AA,
    side: THREE.DoubleSide,
    shininess: 60,
    transparent: true,
    opacity: 0.9
});
const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
surface.rotation.x = -Math.PI / 2;
surface.position.y = TRAMPOLINE_Y;
surface.receiveShadow = true;
scene.add(surface);

// Wireframe overlay
const wireframeMat = new THREE.MeshBasicMaterial({
    color: 0x4466CC,
    wireframe: true,
    transparent: true,
    opacity: 0.3
});
const wireframe = new THREE.Mesh(surfaceGeo.clone(), wireframeMat);
wireframe.rotation.x = -Math.PI / 2;
wireframe.position.y = TRAMPOLINE_Y + 0.01;
scene.add(wireframe);

// Store original vertex positions
const origPositions = new Float32Array(surfaceGeo.attributes.position.array);
const origWirePositions = new Float32Array(wireframe.geometry.attributes.position.array);

// Legs
const legPositions = [
    [5, 0], [0, 5], [-5, 0], [0, -5]
];
legPositions.forEach(([x, z]) => {
    const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 12);
    const legMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(x, TRAMPOLINE_Y - 1, z);
    leg.castShadow = true;
    scene.add(leg);
});

// ============ CHARACTER (Fallback box if GLB fails) ============
let character = null;
let mixer = null;
let glbLoaded = false;

// Create fallback box character
function createFallbackCharacter() {
    const group = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xFF6B35 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
    const eyeMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.2, 0.1, 0.41);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.2, 0.1, 0.41);
    group.add(rightEye);

    // Pupils
    const pupilGeo = new THREE.SphereGeometry(0.05, 8, 8);
    const pupilMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
    const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
    leftPupil.position.set(-0.2, 0.1, 0.48);
    group.add(leftPupil);
    const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
    rightPupil.position.set(0.2, 0.1, 0.48);
    group.add(rightPupil);

    // Smile
    const smileGeo = new THREE.TorusGeometry(0.15, 0.03, 8, 16, Math.PI);
    const smileMat = new THREE.MeshPhongMaterial({ color: 0x000000 });
    const smile = new THREE.Mesh(smileGeo, smileMat);
    smile.position.set(0, -0.15, 0.41);
    smile.rotation.z = Math.PI;
    group.add(smile);

    return group;
}

// Try loading GLB, fallback to box
const loader = new THREE.GLTFLoader();
try {
    loader.load(
        'https://threejs.org/examples/models/gltf/BoxAnimated.glb',
        (gltf) => {
            character = gltf.scene;
            character.scale.set(0.8, 0.8, 0.8);
            character.position.set(0, 6, 0);
            character.castShadow = true;
            character.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                }
            });
            scene.add(character);
            glbLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(character);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
                window.__3D_STATE__.animationPlaying = true;
            }
        },
        undefined,
        (error) => {
            console.warn('GLB load failed, using fallback character:', error);
            character = createFallbackCharacter();
            character.position.set(0, 6, 0);
            scene.add(character);
        }
    );
} catch (e) {
    console.warn('GLTFLoader error, using fallback:', e);
    character = createFallbackCharacter();
    character.position.set(0, 6, 0);
    scene.add(character);
}

// If character not loaded after timeout, use fallback
setTimeout(() => {
    if (!character) {
        character = createFallbackCharacter();
        character.position.set(0, 6, 0);
        scene.add(character);
    }
}, 3000);

// ============ PHYSICS STATE ============
let charVelY = 0;
let charVelX = 0;
let charVelZ = 0;
let charPosX = 0;
let charPosY = 6;
let charPosZ = 0;
let bounceCount = 0;
let maxHeight = 6;
let currentDifficulty = 1;
let fallen = false;
let fallenTimer = 0;

// Deformation state
let deformationActive = false;
let deformationTime = 0;
let deformationDuration = 0.5;
let deformationImpactX = 0;
let deformationImpactZ = 0;
let deformationDepth = 0;
let springBackPhase = false;
let springBackTime = 0;

// Input
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// ============ DIFFICULTY FUNCTIONS ============
function setDifficulty(level) {
    currentDifficulty = level;
    const d = DIFFICULTIES[level];
    window.__3D_STATE__.difficulty = level;
    window.__3D_STATE__.restitution = d.restitution;
    window.__3D_STATE__.gravity = d.gravity;
    window.__3D_STATE__.safeZoneRadius = d.safeZoneRadius;

    document.getElementById('difficulty-display').textContent = d.name;
    document.getElementById('difficulty-display').style.color = d.color;

    // Highlight active button
    document.getElementById('btn-easy').style.outline = level === 1 ? '2px solid white' : 'none';
    document.getElementById('btn-medium').style.outline = level === 2 ? '2px solid white' : 'none';
    document.getElementById('btn-hard').style.outline = level === 3 ? '2px solid white' : 'none';
}

function resetCharacter() {
    charPosX = 0;
    charPosY = 6;
    charPosZ = 0;
    charVelX = 0;
    charVelY = 0;
    charVelZ = 0;
    bounceCount = 0;
    maxHeight = 6;
    fallen = false;
    fallenTimer = 0;
    resetDeformation();
    if (character) {
        character.position.set(0, 6, 0);
        character.visible = true;
    }
}

function resetDeformation() {
    const posAttr = surfaceGeo.attributes.position;
    const wireAttr = wireframe.geometry.attributes.position;
    for (let i = 0; i < posAttr.count; i++) {
        posAttr.setXYZ(i, origPositions[i * 3], origPositions[i * 3 + 1], origPositions[i * 3 + 2]);
        wireAttr.setXYZ(i, origWirePositions[i * 3], origWirePositions[i * 3 + 1], origWirePositions[i * 3 + 2]);
    }
    posAttr.needsUpdate = true;
    wireAttr.needsUpdate = true;
    deformationActive = false;
    springBackPhase = false;
    window.__3D_STATE__.meshDeformed = false;
}

// ============ DEFORMATION ============
function deformTrampoline(impactX, impactZ, depth, factor) {
    // factor: 0 = no deformation, 1 = full deformation
    const posAttr = surfaceGeo.attributes.position;
    const wireAttr = wireframe.geometry.attributes.position;
    const radius = 2.0;

    for (let i = 0; i < posAttr.count; i++) {
        const ox = origPositions[i * 3];
        const oy = origPositions[i * 3 + 1];
        const oz = origPositions[i * 3 + 2];

        // CircleGeometry is in XY plane, rotated to XZ via mesh rotation
        // In local space, x and y are the planar coords, z is up (but mesh is rotated)
        // Since we rotate the mesh -PI/2 around X, local Y becomes world Z, local Z becomes world -Y
        // Actually for CircleGeometry: vertices are in XY plane. After rotation.x = -PI/2:
        // local X -> world X, local Y -> world Z, local Z -> world Y (negated)
        // So the "up" displacement in world Y corresponds to local Z

        const worldX = ox;
        const worldZ = oy; // local Y -> world Z after rotation

        const dx = worldX - impactX;
        const dz = worldZ - impactZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < radius) {
            const gaussian = Math.exp(-(dist * dist) / (2 * 0.8 * 0.8));
            const displacement = -depth * gaussian * factor;
            // Displace in local Z (which is world Y after rotation)
            posAttr.setZ(i, oz + displacement);
            wireAttr.setZ(i, origWirePositions[i * 3 + 2] + displacement);
        } else {
            posAttr.setZ(i, oz);
            wireAttr.setZ(i, origWirePositions[i * 3 + 2]);
        }
    }

    posAttr.needsUpdate = true;
    wireAttr.needsUpdate = true;
    surfaceGeo.computeVertexNormals();
}

// ============ BUTTONS ============
document.getElementById('btn-easy').addEventListener('click', () => setDifficulty(1));
document.getElementById('btn-medium').addEventListener('click', () => setDifficulty(2));
document.getElementById('btn-hard').addEventListener('click', () => setDifficulty(3));
document.getElementById('btn-reset').addEventListener('click', resetCharacter);

// Key shortcuts for difficulty
window.addEventListener('keydown', (e) => {
    if (e.key === '1') setDifficulty(1);
    if (e.key === '2') setDifficulty(2);
    if (e.key === '3') setDifficulty(3);
});

// Initialize difficulty
setDifficulty(1);

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = Math.min(clock.getDelta(), 0.05); // Cap delta time

    if (!character) {
        controls.update();
        renderer.render(scene, camera);
        return;
    }

    const diff = DIFFICULTIES[currentDifficulty];

    // ---- Input ----
    const moveSpeed = 3.0;
    if (keys['a'] || keys['arrowleft']) charVelX = -moveSpeed;
    else if (keys['d'] || keys['arrowright']) charVelX = moveSpeed;
    else charVelX = 0;

    if (keys['w'] || keys['arrowup']) charVelZ = -moveSpeed;
    else if (keys['s'] || keys['arrowdown']) charVelZ = moveSpeed;
    else charVelZ = 0;

    // ---- Fallen state ----
    if (fallen) {
        fallenTimer += dt;
        charVelY -= diff.gravity * dt;
        charPosY += charVelY * dt;
        charPosX += charVelX * dt;
        charPosZ += charVelZ * dt;

        character.position.set(charPosX, charPosY, charPosZ);

        if (fallenTimer >= 2.0) {
            resetCharacter();
        }
    } else {
        // ---- Gravity ----
        charVelY -= diff.gravity * dt;

        // ---- Update position ----
        charPosX += charVelX * dt;
        charPosZ += charVelZ * dt;
        charPosY += charVelY * dt;

        // Ensure no NaN
        if (isNaN(charPosY)) charPosY = 6;
        if (isNaN(charVelY)) charVelY = 0;
        if (isNaN(charPosX)) charPosX = 0;
        if (isNaN(charPosZ)) charPosZ = 0;

        // ---- Check if on trampoline ----
        const distFromCenter = Math.sqrt(charPosX * charPosX + charPosZ * charPosZ);
        const onTrampoline = distFromCenter <= diff.safeZoneRadius;
        window.__3D_STATE__.characterOnTrampoline = onTrampoline;

        // ---- Collision with trampoline ----
        if (charPosY <= TRAMPOLINE_Y + 0.4 && charVelY < 0) {
            if (onTrampoline) {
                // Bounce!
                const impactSpeed = Math.abs(charVelY);
                charPosY = TRAMPOLINE_Y + 0.4;
                charVelY = impactSpeed * diff.restitution;
                bounceCount++;

                // Start deformation
                deformationActive = true;
                springBackPhase = false;
                deformationTime = 0;
                deformationImpactX = charPosX;
                deformationImpactZ = charPosZ;
                deformationDepth = Math.min(diff.maxDeformation, impactSpeed * 0.15);

                // Squash animation for fallback character
                if (!glbLoaded && character) {
                    character.scale.set(1.2, 0.5, 1.2);
                }
            } else {
                // Fell off!
                fallen = true;
                fallenTimer = 0;
                window.__3D_STATE__.fallen = true;
            }
        }

        // Ground collision (if somehow below ground)
        if (charPosY < -10) {
            resetCharacter();
        }

        // ---- Update character position ----
        character.position.set(charPosX, charPosY, charPosZ);

        // Squash/stretch animation for fallback
        if (!glbLoaded && character) {
            const targetScaleY = charVelY < -3 ? 1.3 : (charVelY > 3 ? 0.7 : 1.0);
            const targetScaleXZ = charVelY < -3 ? 0.8 : (charVelY > 3 ? 1.2 : 1.0);
            character.scale.x += (targetScaleXZ * 0.8 - character.scale.x) * 5 * dt;
            character.scale.y += (targetScaleY * 0.8 - character.scale.y) * 5 * dt;
            character.scale.z += (targetScaleXZ * 0.8 - character.scale.z) * 5 * dt;
        }

        // Rotation based on movement
        if (!glbLoaded && character) {
            character.rotation.z += charVelX * dt * 0.5;
            character.rotation.x -= charVelZ * dt * 0.5;
        }

        // ---- Max height ----
        if (charPosY > maxHeight) maxHeight = charPosY;
    }

    // ---- Trampoline deformation animation ----
    if (deformationActive) {
        if (!springBackPhase) {
            // Quick deform down (0.1 seconds)
            deformationTime += dt;
            const t = Math.min(deformationTime / 0.1, 1.0);
            deformTrampoline(deformationImpactX, deformationImpactZ, deformationDepth, t);
            window.__3D_STATE__.meshDeformed = true;

            if (t >= 1.0) {
                springBackPhase = true;
                springBackTime = 0;
            }
        } else {
            // Spring back (0.5 seconds)
            springBackTime += dt;
            const t = Math.min(springBackTime / deformationDuration, 1.0);
            const eased = 1.0 - t * t; // Ease out
            deformTrampoline(deformationImpactX, deformationImpactZ, deformationDepth, eased);

            if (t >= 1.0) {
                resetDeformation();
            }
        }
    }

    // ---- Animation mixer ----
    if (mixer) {
        mixer.update(dt);
    }

    // ---- Update HUD ----
    document.getElementById('bounce-count').textContent = bounceCount;
    document.getElementById('height-display').textContent = Math.max(0, charPosY).toFixed(1);
    document.getElementById('max-height-display').textContent = maxHeight.toFixed(1);
    document.getElementById('velocity-display').textContent = charVelY.toFixed(1);

    // ---- Update global state ----
    window.__3D_STATE__.characterY = charPosY;
    window.__3D_STATE__.characterVelY = charVelY;
    window.__3D_STATE__.bounceCount = bounceCount;
    window.__3D_STATE__.maxHeight = maxHeight;
    window.__3D_STATE__.characterX = charPosX;
    window.__3D_STATE__.characterZ = charPosZ;
    window.__3D_STATE__.fallen = fallen;
    window.__3D_STATE__.animationPlaying = mixer !== null;

    // ---- Render ----
    controls.update();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ADD DECORATIVE ELEMENTS ============
// Safe zone indicator ring
function createSafeZoneRing() {
    const ringGeo = new THREE.RingGeometry(0, 4.5, 64);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0x00ff00,
        transparent: true,
        opacity: 0.08,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = TRAMPOLINE_Y + 0.02;
    scene.add(ring);
    return ring;
}

const safeZoneRing = createSafeZoneRing();

// Update safe zone ring with difficulty
const origSetDifficulty = setDifficulty;
setDifficulty = function(level) {
    origSetDifficulty(level);
    const d = DIFFICULTIES[level];
    safeZoneRing.geometry.dispose();
    safeZoneRing.geometry = new THREE.RingGeometry(0, d.safeZoneRadius, 64);
};

// Re-init
setDifficulty(1);

// Add some ambient particles / dust
const particleCount = 100;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 30;
    particlePositions[i * 3 + 1] = Math.random() * 15;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 30;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Shadow under character
const shadowGeo = new THREE.CircleGeometry(0.5, 16);
const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
const charShadow = new THREE.Mesh(shadowGeo, shadowMat);
charShadow.rotation.x = -Math.PI / 2;
scene.add(charShadow);

// Update shadow in animation loop - we'll patch it
const origAnimate = animate;

function animateWithShadow() {
    // Update shadow position
    if (character) {
        charShadow.position.set(charPosX, TRAMPOLINE_Y + 0.03, charPosZ);
        const heightAbove = Math.max(0, charPosY - TRAMPOLINE_Y);
        const shadowScale = Math.max(0.3, 1.0 - heightAbove * 0.05);
        charShadow.scale.set(shadowScale, shadowScale, shadowScale);
        shadowMat.opacity = Math.max(0.05, 0.3 - heightAbove * 0.02);
    }
}

// Wrap the animate function
const _origAnimateRef = animate;
function wrappedAnimate() {
    requestAnimationFrame(wrappedAnimate);

    const dt = Math.min(clock.getDelta(), 0.05);

    if (!character) {
        controls.update();
        renderer.render(scene, camera);
        return;
    }

    const diff = DIFFICULTIES[currentDifficulty];

    // Input
    const moveSpeed = 3.0;
    if (keys['a'] || keys['arrowleft']) charVelX = -moveSpeed;
    else if (keys['d'] || keys['arrowright']) charVelX = moveSpeed;
    else charVelX = 0;

    if (keys['w'] || keys['arrowup']) charVelZ = -moveSpeed;
    else if (keys['s'] || keys['arrowdown']) charVelZ = moveSpeed;
    else charVelZ = 0;

    if (fallen) {
        fallenTimer += dt;
        charVelY -= diff.gravity * dt;
        charPosY += charVelY * dt;
        charPosX += charVelX * dt;
        charPosZ += charVelZ * dt;
        character.position.set(charPosX, charPosY, charPosZ);
        if (fallenTimer >= 2.0) resetCharacter();
    } else {
        charVelY -= diff.gravity * dt;
        charPosX += charVelX * dt;
        charPosZ += charVelZ * dt;
        charPosY += charVelY * dt;

        if (isNaN(charPosY)) charPosY = 6;
        if (isNaN(charVelY)) charVelY = 0;
        if (isNaN(charPosX)) charPosX = 0;
        if (isNaN(charPosZ)) charPosZ = 0;

        const distFromCenter = Math.sqrt(charPosX * charPosX + charPosZ * charPosZ);
        const onTrampoline = distFromCenter <= diff.safeZoneRadius;
        window.__3D_STATE__.characterOnTrampoline = onTrampoline;

        if (charPosY <= TRAMPOLINE_Y + 0.4 && charVelY < 0) {
            if (onTrampoline) {
                const impactSpeed = Math.abs(charVelY);
                charPosY = TRAMPOLINE_Y + 0.4;
                charVelY = impactSpeed * diff.restitution;
                bounceCount++;

                deformationActive = true;
                springBackPhase = false;
                deformationTime = 0;
                deformationImpactX = charPosX;
                deformationImpactZ = charPosZ;
                deformationDepth = Math.min(diff.maxDeformation, impactSpeed * 0.15);

                if (!glbLoaded && character) {
                    character.scale.set(1.2, 0.5, 1.2);
                }
            } else {
                fallen = true;
                fallenTimer = 0;
                window.__3D_STATE__.fallen = true;
            }
        }

        if (charPosY < -10) resetCharacter();

        character.position.set(charPosX, charPosY, charPosZ);

        if (!glbLoaded && character) {
            const targetScaleY = charVelY < -3 ? 1.3 : (charVelY > 3 ? 0.7 : 1.0);
            const targetScaleXZ = charVelY < -3 ? 0.8 : (charVelY > 3 ? 1.2 : 1.0);
            character.scale.x += (targetScaleXZ * 0.8 - character.scale.x) * 5 * dt;
            character.scale.y += (targetScaleY * 0.8 - character.scale.y) * 5 * dt;
            character.scale.z += (targetScaleXZ * 0.8 - character.scale.z) * 5 * dt;
            character.rotation.z += charVelX * dt * 0.5;
            character.rotation.x -= charVelZ * dt * 0.5;
        }

        if (charPosY > maxHeight) maxHeight = charPosY;
    }

    // Deformation
    if (deformationActive) {
        if (!springBackPhase) {
            deformationTime += dt;
            const t = Math.min(deformationTime / 0.1, 1.0);
            deformTrampoline(deformationImpactX, deformationImpactZ, deformationDepth, t);
            window.__3D_STATE__.meshDeformed = true;
            if (t >= 1.0) { springBackPhase = true; springBackTime = 0; }
        } else {
            springBackTime += dt;
            const t = Math.min(springBackTime / deformationDuration, 1.0);
            const eased = 1.0 - t * t;
            deformTrampoline(deformationImpactX, deformationImpactZ, deformationDepth, eased);
            if (t >= 1.0) resetDeformation();
        }
    }

    if (mixer) mixer.update(dt);

    // Shadow
    charShadow.position.set(charPosX, TRAMPOLINE_Y + 0.03, charPosZ);
    const heightAbove = Math.max(0, charPosY - TRAMPOLINE_Y);
    const shadowScale = Math.max(0.3, 1.0 - heightAbove * 0.05);
    charShadow.scale.set(shadowScale, shadowScale, shadowScale);
    shadowMat.opacity = Math.max(0.05, 0.3 - heightAbove * 0.02);

    // HUD
    document.getElementById('bounce-count').textContent = bounceCount;
    document.getElementById('height-display').textContent = Math.max(0, charPosY).toFixed(1);
    document.getElementById('max-height-display').textContent = maxHeight.toFixed(1);
    document.getElementById('velocity-display').textContent = charVelY.toFixed(1);

    // State
    window.__3D_STATE__.characterY = charPosY;
    window.__3D_STATE__.characterVelY = charVelY;
    window.__3D_STATE__.bounceCount = bounceCount;
    window.__3D_STATE__.maxHeight = maxHeight;
    window.__3D_STATE__.characterX = charPosX;
    window.__3D_STATE__.characterZ = charPosZ;
    window.__3D_STATE__.fallen = fallen;
    window.__3D_STATE__.animationPlaying = mixer !== null;

    controls.update();
    renderer.render(scene, camera);
}

// Start the correct loop
wrappedAnimate();
</script>
