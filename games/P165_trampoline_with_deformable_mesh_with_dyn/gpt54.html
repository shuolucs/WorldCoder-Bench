<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D Trampoline Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 14px;
      border-radius: 10px;
      min-width: 240px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.25);
      user-select: none;
    }

    #hud-panel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #hud-panel .stat {
      margin: 6px 0;
      font-size: 14px;
    }

    #hud-panel .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    #hud-panel button {
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease, opacity 0.2s ease;
    }

    #hud-panel button:hover {
      opacity: 0.9;
    }

    #hud-panel button:active {
      transform: scale(0.97);
    }

    #btn-easy { background: #4CAF50; color: white; }
    #btn-medium { background: #FF9800; color: white; }
    #btn-hard { background: #F44336; color: white; }
    #btn-reset { background: #2196F3; color: white; }

    #hint {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.75);
      color: #111;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <h3>Trampoline HUD</h3>
    <div class="stat">Difficulty: <span id="difficulty-display">Easy</span></div>
    <div class="stat">Bounce Count: <span id="bounce-count">0</span></div>
    <div class="stat">Current Height: <span id="height-display">0.0</span></div>
    <div class="stat">Max Height: <span id="max-height-display">0.0</span></div>
    <div class="stat">Velocity Y: <span id="velocity-display">0.0</span></div>

    <div class="buttons">
      <button id="btn-easy">Easy (1)</button>
      <button id="btn-medium">Medium (2)</button>
      <button id="btn-hard">Hard (3)</button>
      <button id="btn-reset">Reset</button>
    </div>
  </div>

  <div id="hint">
    Move: W/A/S/D &nbsp;|&nbsp; Difficulty: 1/2/3 &nbsp;|&nbsp; Mouse: Orbit camera
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>

  <script>
    (() => {
      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      document.body.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 2, 0);
      controls.enableDamping = true;

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      // Ground
      const groundGeo = new THREE.PlaneGeometry(40, 40);
      const groundMat = new THREE.MeshPhongMaterial({ color: 0x44AA44 });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);

      // Trampoline group
      const trampolineGroup = new THREE.Group();
      scene.add(trampolineGroup);

      const trampolineY = 2;
      const frameRadius = 5;
      const surfaceRadius = 4.8;

      // Frame
      const frameGeo = new THREE.TorusGeometry(frameRadius, 0.3, 24, 100);
      const frameMat = new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.8,
        roughness: 0.3
      });
      const frame = new THREE.Mesh(frameGeo, frameMat);
      frame.rotation.x = Math.PI / 2;
      frame.position.y = trampolineY;
      trampolineGroup.add(frame);

      // Surface
      const surfaceGeo = new THREE.CircleGeometry(surfaceRadius, 64, 0, Math.PI * 2);
      // rebuild with more internal detail via rings-like tesselation approximation:
      // CircleGeometry already has radial subdivisions through segments only;
      // to make deformation clearer, we use a dense plane-like radial geometry effect
      // by increasing segment count and relying on center fan structure.

      const originalPositions = new Float32Array(surfaceGeo.attributes.position.array.length);
      originalPositions.set(surfaceGeo.attributes.position.array);

      const surfaceMat = new THREE.MeshPhongMaterial({
        color: 0x2244AA,
        side: THREE.DoubleSide,
        shininess: 80
      });
      const trampolineSurface = new THREE.Mesh(surfaceGeo, surfaceMat);
      trampolineSurface.rotation.x = -Math.PI / 2;
      trampolineSurface.position.y = trampolineY;
      trampolineGroup.add(trampolineSurface);

      const wireframe = new THREE.LineSegments(
        new THREE.WireframeGeometry(surfaceGeo),
        new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.45 })
      );
      wireframe.rotation.x = -Math.PI / 2;
      wireframe.position.y = trampolineY + 0.002;
      trampolineGroup.add(wireframe);

      // Legs
      const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 16);
      const legMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
      const legPositions = [
        [ frameRadius - 0.4, 1, 0 ],
        [ -(frameRadius - 0.4), 1, 0 ],
        [ 0, 1, frameRadius - 0.4 ],
        [ 0, 1, -(frameRadius - 0.4) ]
      ];
      legPositions.forEach(([x, y, z]) => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(x, y, z);
        trampolineGroup.add(leg);
      });

      // Difficulty settings
      const DIFFICULTIES = {
        1: { name: "Easy", restitution: 0.95, maxDeformation: 0.8, gravity: 7.0, safeZoneRadius: 4.5 },
        2: { name: "Medium", restitution: 0.85, maxDeformation: 1.2, gravity: 9.81, safeZoneRadius: 3.5 },
        3: { name: "Hard", restitution: 0.70, maxDeformation: 1.8, gravity: 14.0, safeZoneRadius: 2.5 }
      };

      let difficulty = 1;

      // Character
      const startPosition = new THREE.Vector3(0, 6, 0);
      let character = null;
      let mixer = null;
      let animationPlaying = false;

      const fallbackCharacter = new THREE.Mesh(
        new THREE.BoxGeometry(1, 1, 1),
        new THREE.MeshPhongMaterial({ color: 0xffaa00 })
      );
      fallbackCharacter.visible = false;
      scene.add(fallbackCharacter);

      const loader = new THREE.GLTFLoader();
      loader.load(
        'BoxAnimated.glb',
        (gltf) => {
          character = gltf.scene;
          character.scale.set(0.8, 0.8, 0.8);
          character.position.copy(startPosition);
          scene.add(character);

          if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(character);
            gltf.animations.forEach((clip) => {
              mixer.clipAction(clip).play();
            });
            animationPlaying = true;
          }
        },
        undefined,
        () => {
          character = fallbackCharacter;
          fallbackCharacter.visible = true;
          fallbackCharacter.position.copy(startPosition);
          animationPlaying = false;
        }
      );

      const keys = { w: false, a: false, s: false, d: false };

      const physics = {
        position: startPosition.clone(),
        velocity: new THREE.Vector3(0, 0, 0),
        bounceCount: 0,
        maxHeight: startPosition.y,
        fallen: false,
        resetTimer: 0
      };

      const deformation = {
        active: false,
        timer: 0,
        duration: 0.5,
        impactPoint: new THREE.Vector2(0, 0),
        depth: 0
      };

      const clock = new THREE.Clock();

      const hud = {
        difficulty: document.getElementById('difficulty-display'),
        bounceCount: document.getElementById('bounce-count'),
        height: document.getElementById('height-display'),
        maxHeight: document.getElementById('max-height-display'),
        velocity: document.getElementById('velocity-display')
      };

      function currentSettings() {
        return DIFFICULTIES[difficulty];
      }

      function safeNumber(n, fallback = 0) {
        return Number.isFinite(n) ? n : fallback;
      }

      function resetCharacter(fullResetBounce = true) {
        physics.position.copy(startPosition);
        physics.velocity.set(0, 0, 0);
        physics.fallen = false;
        physics.resetTimer = 0;
        if (fullResetBounce) physics.bounceCount = 0;
        physics.maxHeight = startPosition.y;
        clearDeformation();
        syncCharacterTransform();
      }

      function syncCharacterTransform() {
        if (!character) return;
        character.position.set(
          safeNumber(physics.position.x),
          safeNumber(physics.position.y),
          safeNumber(physics.position.z)
        );
      }

      function setDifficulty(level) {
        if (!DIFFICULTIES[level]) return;
        difficulty = level;
        updateHUD();
      }

      function updateHUD() {
        const settings = currentSettings();
        hud.difficulty.textContent = settings.name;
        hud.bounceCount.textContent = String(physics.bounceCount);
        hud.height.textContent = safeNumber(physics.position.y).toFixed(1);
        hud.maxHeight.textContent = safeNumber(physics.maxHeight).toFixed(1);
        hud.velocity.textContent = safeNumber(physics.velocity.y).toFixed(1);
      }

      function clearDeformation() {
        deformation.active = false;
        deformation.timer = 0;
        deformation.depth = 0;

        const pos = surfaceGeo.attributes.position.array;
        for (let i = 0; i < pos.length; i++) {
          pos[i] = originalPositions[i];
        }
        surfaceGeo.attributes.position.needsUpdate = true;
        surfaceGeo.computeVertexNormals();
        wireframe.geometry.dispose();
        wireframe.geometry = new THREE.WireframeGeometry(surfaceGeo);
      }

      function applyDeformation(impactX, impactZ, depth) {
        deformation.active = true;
        deformation.timer = 0;
        deformation.impactPoint.set(impactX, impactZ);
        deformation.depth = Math.max(0, safeNumber(depth));

        updateDeformationMesh(1.0);
      }

      function updateDeformationMesh(strengthFactor) {
        const pos = surfaceGeo.attributes.position.array;
        const radius = 2.0;
        const sigma = radius * 0.55;

        for (let i = 0; i < pos.length; i += 3) {
          const ox = originalPositions[i];
          const oy = originalPositions[i + 1];
          const oz = originalPositions[i + 2];

          const dx = ox - deformation.impactPoint.x;
          const dz = oz - deformation.impactPoint.y;
          const dist = Math.sqrt(dx * dx + dz * dz);

          let offset = 0;
          if (dist <= radius) {
            const gaussian = Math.exp(-(dist * dist) / (2 * sigma * sigma));
            offset = deformation.depth * gaussian * strengthFactor;
          }

          pos[i] = ox;
          pos[i + 1] = oy;
          pos[i + 2] = oz - offset; // local +z becomes world -y due to rotation
        }

        surfaceGeo.attributes.position.needsUpdate = true;
        surfaceGeo.computeVertexNormals();

        wireframe.geometry.dispose();
        wireframe.geometry = new THREE.WireframeGeometry(surfaceGeo);
      }

      function handleKeyboard(dt) {
        const moveSpeed = 3;
        let moveX = 0;
        let moveZ = 0;

        if (keys.a) moveX -= 1;
        if (keys.d) moveX += 1;
        if (keys.w) moveZ -= 1;
        if (keys.s) moveZ += 1;

        const len = Math.hypot(moveX, moveZ);
        if (len > 0) {
          moveX /= len;
          moveZ /= len;
          physics.position.x += moveX * moveSpeed * dt;
          physics.position.z += moveZ * moveSpeed * dt;
        }
      }

      function updatePhysics(dt) {
        const settings = currentSettings();

        if (physics.fallen) {
          physics.resetTimer += dt;
          physics.velocity.y -= settings.gravity * dt;
          physics.position.addScaledVector(physics.velocity, dt);

          if (physics.resetTimer >= 2.0) {
            resetCharacter(false);
          }
          return;
        }

        handleKeyboard(dt);

        physics.velocity.y -= settings.gravity * dt;
        physics.position.y += physics.velocity.y * dt;

        physics.maxHeight = Math.max(physics.maxHeight, physics.position.y);

        const horizontalDist = Math.hypot(physics.position.x, physics.position.z);
        const onTrampoline = horizontalDist <= surfaceRadius;
        const inSafeZone = horizontalDist <= settings.safeZoneRadius;

        if (onTrampoline && physics.position.y <= trampolineY) {
          const impactForce = Math.abs(physics.velocity.y);
          const depth = Math.min(
            settings.maxDeformation,
            Math.max(0.18, impactForce * 0.08 * settings.maxDeformation)
          );

          physics.position.y = trampolineY - depth * 0.15;
          physics.velocity.y = Math.abs(physics.velocity.y) * settings.restitution;

          if (!Number.isFinite(physics.velocity.y)) physics.velocity.y = 0;

          physics.bounceCount++;
          applyDeformation(physics.position.x, physics.position.z, depth);

          if (!inSafeZone) {
            // still bounces if on surface, but edge is riskier visually by using smaller safe zone in state
          }
        } else if (!onTrampoline && physics.position.y <= trampolineY - 0.1) {
          physics.fallen = true;
          physics.resetTimer = 0;
        }

        if (physics.position.y < -20 || !Number.isFinite(physics.position.y)) {
          resetCharacter(false);
        }
      }

      function updateDeformation(dt) {
        if (!deformation.active) return;

        deformation.timer += dt;
        const t = deformation.timer / deformation.duration;

        if (t >= 1) {
          clearDeformation();
          return;
        }

        const strength = 1 - t;
        updateDeformationMesh(strength);
      }

      function updateState() {
        const settings = currentSettings();
        const characterOnTrampoline = Math.hypot(physics.position.x, physics.position.z) <= surfaceRadius;

        window.__3D_STATE__ = {
          characterY: safeNumber(physics.position.y),
          characterVelY: safeNumber(physics.velocity.y),
          bounceCount: Math.max(0, physics.bounceCount | 0),
          difficulty: difficulty,
          maxHeight: safeNumber(physics.maxHeight),
          restitution: safeNumber(settings.restitution),
          gravity: safeNumber(settings.gravity),
          meshDeformed: !!deformation.active,
          characterOnTrampoline: !!characterOnTrampoline,
          characterX: safeNumber(physics.position.x),
          characterZ: safeNumber(physics.position.z),
          animationPlaying: !!animationPlaying,
          safeZoneRadius: safeNumber(settings.safeZoneRadius),
          fallen: !!physics.fallen
        };
      }

      document.getElementById('btn-easy').addEventListener('click', () => setDifficulty(1));
      document.getElementById('btn-medium').addEventListener('click', () => setDifficulty(2));
      document.getElementById('btn-hard').addEventListener('click', () => setDifficulty(3));
      document.getElementById('btn-reset').addEventListener('click', () => resetCharacter(true));

      window.addEventListener('keydown', (e) => {
        const k = e.key.toLowerCase();
        if (k === 'w') keys.w = true;
        if (k === 'a') keys.a = true;
        if (k === 's') keys.s = true;
        if (k === 'd') keys.d = true;

        if (k === '1') setDifficulty(1);
        if (k === '2') setDifficulty(2);
        if (k === '3') setDifficulty(3);
      });

      window.addEventListener('keyup', (e) => {
        const k = e.key.toLowerCase();
        if (k === 'w') keys.w = false;
        if (k === 'a') keys.a = false;
        if (k === 's') keys.s = false;
        if (k === 'd') keys.d = false;
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateHUD();
      updateState();

      function animate() {
        requestAnimationFrame(animate);

        const dt = Math.min(clock.getDelta(), 0.033);

        if (mixer) mixer.update(dt);

        updatePhysics(dt);
        updateDeformation(dt);
        syncCharacterTransform();
        updateHUD();
        updateState();

        controls.update();
        renderer.render(scene, camera);
      }

      resetCharacter(true);
      animate();
    })();
  </script>
</body>
</html>
