<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Trampoline Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: sans-serif;
        }
        #hud-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
            user-select: none;
        }
        #hud-panel h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            transition: background 0.2s;
        }
        button:hover {
            background: #666;
        }
        #btn-easy { border-bottom: 3px solid #4CAF50; }
        #btn-medium { border-bottom: 3px solid #FFC107; }
        #btn-hard { border-bottom: 3px solid #F44336; }
        #btn-reset { border-bottom: 3px solid #2196F3; margin-left: 20px; }
        .instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            pointer-events: none;
            text-align: right;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.module.min.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.152.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud-panel">
        <h2>Trampoline Stats</h2>
        <div class="stat-row"><span>Difficulty:</span> <span id="difficulty-display">Medium</span></div>
        <div class="stat-row"><span>Bounces:</span> <span id="bounce-count">0</span></div>
        <div class="stat-row"><span>Height:</span> <span id="height-display">6.0</span></div>
        <div class="stat-row"><span>Max Height:</span> <span id="max-height-display">6.0</span></div>
        <div class="stat-row"><span>Velocity Y:</span> <span id="velocity-display">0.0</span></div>
    </div>

    <div class="instructions">
        WASD to move<br>
        1, 2, 3 to change difficulty
    </div>

    <div class="controls">
        <button id="btn-easy">Easy (1)</button>
        <button id="btn-medium">Medium (2)</button>
        <button id="btn-hard">Hard (3)</button>
        <button id="btn-reset">Reset</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            characterY: 6,
            characterVelY: 0,
            bounceCount: 0,
            difficulty: 2,
            maxHeight: 6,
            restitution: 0.85,
            gravity: 9.81,
            meshDeformed: false,
            characterOnTrampoline: true,
            characterX: 0,
            characterZ: 0,
            animationPlaying: false,
            safeZoneRadius: 3.5,
            fallen: false,
            maxDeformation: 1.2
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 2, 0);

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(40, 40);
        const groundMat = new THREE.MeshPhongMaterial({ color: 0x44AA44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        // --- Trampoline Construction ---
        const trampolineGroup = new THREE.Group();
        trampolineGroup.position.y = 2;
        scene.add(trampolineGroup);

        // Frame
        const frameGeo = new THREE.TorusGeometry(5, 0.3, 16, 64);
        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.6, roughness: 0.4 });
        const frame = new THREE.Mesh(frameGeo, frameMat);
        frame.rotation.x = -Math.PI / 2;
        trampolineGroup.add(frame);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.15, 0.15, 2, 16);
        const legMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
        const legPositions = [
            [4.8, -1, 0], [-4.8, -1, 0], [0, -1, 4.8], [0, -1, -4.8]
        ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(pos[0], pos[1], pos[2]);
            trampolineGroup.add(leg);
        });

        // Surface (Deformable)
        const surfaceGeo = new THREE.RingGeometry(0, 4.8, 64, 32);
        surfaceGeo.rotateX(-Math.PI / 2); // Flat on XZ plane
        
        const surfaceMat = new THREE.MeshPhongMaterial({ 
            color: 0x2244AA, 
            side: THREE.DoubleSide,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });
        const surfaceMesh = new THREE.Mesh(surfaceGeo, surfaceMat);
        
        const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 });
        const wireMesh = new THREE.Mesh(surfaceGeo, wireMat);
        surfaceMesh.add(wireMesh);
        
        trampolineGroup.add(surfaceMesh);

        // Deformation Data
        const posAttr = surfaceGeo.attributes.position;
        const origPositions = new Float32Array(posAttr.array);
        const targetPositions = new Float32Array(posAttr.array);
        let deformationTimer = 0;

        // --- Character ---
        let character;
        let mixer;
        const charPos = new THREE.Vector3(0, 6, 0);
        const charVel = new THREE.Vector3(0, 0, 0);
        const moveSpeed = 3;

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb', (gltf) => {
            character = gltf.scene;
            character.scale.set(0.8, 0.8, 0.8);
            character.position.copy(charPos);
            scene.add(character);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(character);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
                state.animationPlaying = true;
            }
        });

        // --- Input Handling ---
        const keys = { w: false, a: false, s: false, d: false };
        
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true;
            if (k === '1') setDifficulty(1);
            if (k === '2') setDifficulty(2);
            if (k === '3') setDifficulty(3);
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = false;
        });

        // --- Difficulty System ---
        function setDifficulty(level) {
            state.difficulty = level;
            if (level === 1) {
                state.restitution = 0.95; state.maxDeformation = 0.8; state.gravity = 7.0; state.safeZoneRadius = 4.5;
            } else if (level === 2) {
                state.restitution = 0.85; state.maxDeformation = 1.2; state.gravity = 9.81; state.safeZoneRadius = 3.5;
            } else if (level === 3) {
                state.restitution = 0.70; state.maxDeformation = 1.8; state.gravity = 14.0; state.safeZoneRadius = 2.5;
            }
            updateHUD();
        }

        document.getElementById('btn-easy').addEventListener('click', () => setDifficulty(1));
        document.getElementById('btn-medium').addEventListener('click', () => setDifficulty(2));
        document.getElementById('btn-hard').addEventListener('click', () => setDifficulty(3));
        
        document.getElementById('btn-reset').addEventListener('click', resetCharacter);

        function resetCharacter() {
            charPos.set(0, 6, 0);
            charVel.set(0, 0, 0);
            state.bounceCount = 0;
            state.maxHeight = 6;
            state.fallen = false;
            if (character) character.position.copy(charPos);
            updateHUD();
        }

        // --- Physics & Deformation Logic ---
        function applyDeformation(x, z, impactVel) {
            state.meshDeformed = true;
            deformationTimer = 0.5; // seconds to spring back
            
            const depth = Math.min(impactVel * 0.15, state.maxDeformation);
            
            for (let i = 0; i < posAttr.count; i++) {
                const vx = origPositions[i * 3];
                const vz = origPositions[i * 3 + 2];
                
                const dx = vx - x;
                const dz = vz - z;
                const distSq = dx * dx + dz * dz;
                
                if (distSq < 4.0) { // radius 2.0 -> sq 4.0
                    const falloff = Math.exp(-distSq / 1.0);
                    targetPositions[i * 3 + 1] = origPositions[i * 3 + 1] - depth * falloff;
                } else {
                    targetPositions[i * 3 + 1] = origPositions[i * 3 + 1];
                }
            }
        }

        function updateDeformation(dt) {
            if (!state.meshDeformed) return;

            let allSettled = true;
            for (let i = 0; i < posAttr.count; i++) {
                // Decay target back to original
                targetPositions[i * 3 + 1] += (origPositions[i * 3 + 1] - targetPositions[i * 3 + 1]) * (dt * 4);
                
                // Move actual vertex to target
                const currentY = posAttr.array[i * 3 + 1];
                const newY = currentY + (targetPositions[i * 3 + 1] - currentY) * (dt * 15);
                posAttr.array[i * 3 + 1] = newY;

                if (Math.abs(newY - origPositions[i * 3 + 1]) > 0.005) {
                    allSettled = false;
                }
            }
            
            posAttr.needsUpdate = true;
            surfaceGeo.computeVertexNormals();

            deformationTimer -= dt;
            if (allSettled && deformationTimer <= 0) {
                state.meshDeformed = false;
                for (let i = 0; i < posAttr.count; i++) {
                    posAttr.array[i * 3 + 1] = origPositions[i * 3 + 1];
                }
                posAttr.needsUpdate = true;
            }
        }

        // --- HUD Update ---
        const diffDisplay = document.getElementById('difficulty-display');
        const bounceDisplay = document.getElementById('bounce-count');
        const heightDisplay = document.getElementById('height-display');
        const maxDisplay = document.getElementById('max-height-display');
        const velDisplay = document.getElementById('velocity-display');

        function updateHUD() {
            diffDisplay.innerText = ['Easy', 'Medium', 'Hard'][state.difficulty - 1];
            bounceDisplay.innerText = state.bounceCount;
            heightDisplay.innerText = state.characterY.toFixed(1);
            maxDisplay.innerText = state.maxHeight.toFixed(1);
            velDisplay.innerText = state.characterVelY.toFixed(1);
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent physics explosions

            if (mixer) mixer.update(dt);
            controls.update();

            if (character) {
                if (!state.fallen) {
                    // Horizontal Movement
                    const moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
                    const moveZ = (keys.s ? 1 : 0) - (keys.w ? 1 : 0);
                    charVel.x = moveX * moveSpeed;
                    charVel.z = moveZ * moveSpeed;

                    // Gravity
                    charVel.y -= state.gravity * dt;

                    // Update Position
                    charPos.x += charVel.x * dt;
                    charPos.y += charVel.y * dt;
                    charPos.z += charVel.z * dt;

                    const distFromCenter = Math.sqrt(charPos.x * charPos.x + charPos.z * charPos.z);
                    state.characterOnTrampoline = distFromCenter <= 4.8;

                    // Collision with Trampoline (Y=2)
                    if (charPos.y <= 2.0 && charVel.y < 0) {
                        if (distFromCenter <= 4.8) {
                            // Bounce
                            charPos.y = 2.0;
                            applyDeformation(charPos.x, charPos.z, Math.abs(charVel.y));
                            
                            charVel.y = Math.abs(charVel.y) * state.restitution;
                            if (charVel.y < 2.0) charVel.y = 2.0; // Minimum bounce
                            
                            state.bounceCount++;
                        } else {
                            // Fall off
                            state.fallen = true;
                            setTimeout(resetCharacter, 2000);
                        }
                    }

                    if (charPos.y > state.maxHeight) state.maxHeight = charPos.y;

                } else {
                    // Fallen state physics
                    charVel.y -= state.gravity * dt;
                    charPos.y += charVel.y * dt;
                    if (charPos.y < 0) {
                        charPos.y = 0;
                        charVel.y = 0;
                    }
                }

                character.position.copy(charPos);
                
                // Update State
                state.characterY = charPos.y;
                state.characterVelY = charVel.y;
                state.characterX = charPos.x;
                state.characterZ = charPos.z;
            }

            updateDeformation(dt);
            updateHUD();

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        setDifficulty(2);
        animate();

    </script>
</body>
</html>
