<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Projectile Motion Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            box-sizing: border-box;
            pointer-events: auto;
        }
        #hud-panel {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        #controls-panel {
            top: 20px;
            right: 20px;
            min-width: 250px;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .control-group input[type="range"] {
            width: 100%;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 12px;
            margin-right: 5px;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #45a049;
        }
        #btn-reset {
            background: #f44336;
        }
        #btn-reset:hover {
            background: #da190b;
        }
        #btn-toggle-drag {
            background: #2196F3;
        }
        #btn-toggle-drag:hover {
            background: #0b7dda;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud-panel" class="panel">
        <div class="hud-line">Velocity: <span id="hud-velocity">0.00</span> m/s</div>
        <div class="hud-line">Height: <span id="hud-height">0.00</span> m</div>
        <div class="hud-line">Time: <span id="hud-time">0.00</span> s</div>
        <div class="hud-line">Distance: <span id="hud-distance">0.00</span> m</div>
        <div class="hud-line">Drag: <span id="hud-drag-status">ON</span></div>
    </div>

    <div id="controls-panel" class="panel">
        <div class="control-group">
            <label>Angle: <span id="label-angle">45</span>°</label>
            <input type="range" id="slider-angle" min="10" max="80" value="45">
        </div>
        <div class="control-group">
            <label>Speed: <span id="label-speed">25</span> m/s</label>
            <input type="range" id="slider-speed" min="5" max="50" value="25">
        </div>
        <div>
            <button id="btn-launch">Launch</button>
            <button id="btn-reset">Reset</button>
            <button id="btn-toggle-drag">Toggle Drag</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            launched: false,
            landed: false,
            time: 0,
            projectileX: -40,
            projectileY: 0.5,
            ghostX: -40,
            ghostY: 0.5,
            velocity: 0,
            dragEnabled: true,
            launchAngle: 45,
            launchSpeed: 25,
            landingX: null,
            ghostLandingX: null,
            trailCount: 0,
            initialKE: 0,
            currentKE: 0,
            currentPE: 0
        };

        // --- Physics Constants ---
        const g = 9.81;
        const mass = 1.0;
        const radius = 0.5;
        const Cd = 0.47;
        const rho = 1.225;
        const A = Math.PI * radius * radius;
        const dt = 1 / 60;
        const startPos = new THREE.Vector3(-40, 0.5, 0);

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue background

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 50;
        dirLight.shadow.camera.bottom = -50;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        scene.add(dirLight);

        // --- Objects ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid
        const gridHelper = new THREE.GridHelper(100, 20, 0x000000, 0x000000);
        gridHelper.position.y = 0.01;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // Launch Pad
        const padGeo = new THREE.CylinderGeometry(1, 1, 0.3, 32);
        const padMat = new THREE.MeshPhongMaterial({ color: 0xFFFF00 });
        const pad = new THREE.Mesh(padGeo, padMat);
        pad.position.set(-40, 0.15, 0);
        pad.castShadow = true;
        pad.receiveShadow = true;
        scene.add(pad);

        // Target Ring
        const targetGeo = new THREE.TorusGeometry(2, 0.2, 16, 100);
        const targetMat = new THREE.MeshPhongMaterial({ color: 0x0000FF, wireframe: true });
        const target = new THREE.Mesh(targetGeo, targetMat);
        target.position.set(20, 5, 0);
        target.rotation.y = Math.PI / 2; // Face the projectile
        scene.add(target);

        // Main Projectile
        const projGeo = new THREE.SphereGeometry(radius, 32, 32);
        const projMat = new THREE.MeshPhongMaterial({ color: 0xFF0000 });
        const projectile = new THREE.Mesh(projGeo, projMat);
        projectile.position.copy(startPos);
        projectile.castShadow = true;
        scene.add(projectile);

        // Ghost Projectile
        const ghostMat = new THREE.MeshPhongMaterial({ color: 0x00FF00, transparent: true, opacity: 0.3 });
        const ghost = new THREE.Mesh(projGeo, ghostMat);
        ghost.position.copy(startPos);
        scene.add(ghost);

        // --- Simulation Variables ---
        let pos = new THREE.Vector3().copy(startPos);
        let vel = new THREE.Vector3();
        let ghostPos = new THREE.Vector3().copy(startPos);
        let ghostVel = new THREE.Vector3();
        
        let trails = [];
        let landingMarks = [];
        let frameCount = 0;
        let ghostLanded = false;

        // --- UI Elements ---
        const elVelocity = document.getElementById('hud-velocity');
        const elHeight = document.getElementById('hud-height');
        const elTime = document.getElementById('hud-time');
        const elDistance = document.getElementById('hud-distance');
        const elDragStatus = document.getElementById('hud-drag-status');
        
        const sliderAngle = document.getElementById('slider-angle');
        const labelAngle = document.getElementById('label-angle');
        const sliderSpeed = document.getElementById('slider-speed');
        const labelSpeed = document.getElementById('label-speed');

        // --- Functions ---
        function clearTrailsAndMarks() {
            trails.forEach(t => scene.remove(t));
            trails = [];
            landingMarks.forEach(m => scene.remove(m));
            landingMarks = [];
            window.__3D_STATE__.trailCount = 0;
        }

        function addLandingMark(position, color) {
            const ringGeo = new THREE.RingGeometry(0.5, 0.8, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = -Math.PI / 2;
            ring.position.set(position.x, 0.02, position.z);
            scene.add(ring);
            landingMarks.push(ring);
        }

        function resetSimulation() {
            window.__3D_STATE__.launched = false;
            window.__3D_STATE__.landed = false;
            window.__3D_STATE__.time = 0;
            window.__3D_STATE__.landingX = null;
            window.__3D_STATE__.ghostLandingX = null;
            ghostLanded = false;
            frameCount = 0;

            pos.copy(startPos);
            vel.set(0, 0, 0);
            ghostPos.copy(startPos);
            ghostVel.set(0, 0, 0);

            projectile.position.copy(pos);
            ghost.position.copy(ghostPos);

            clearTrailsAndMarks();
            updateState();
            updateHUD();
        }

        function launch() {
            resetSimulation();
            
            const angleRad = window.__3D_STATE__.launchAngle * Math.PI / 180;
            const speed = window.__3D_STATE__.launchSpeed;
            
            const vx = speed * Math.cos(angleRad);
            const vy = speed * Math.sin(angleRad);
            
            vel.set(vx, vy, 0);
            ghostVel.set(vx, vy, 0);
            
            window.__3D_STATE__.launched = true;
            window.__3D_STATE__.initialKE = 0.5 * mass * speed * speed;
        }

        function updateState() {
            const state = window.__3D_STATE__;
            state.projectileX = pos.x;
            state.projectileY = pos.y;
            state.ghostX = ghostPos.x;
            state.ghostY = ghostPos.y;
            state.velocity = vel.length();
            
            const speed = vel.length();
            state.currentKE = 0.5 * mass * speed * speed;
            state.currentPE = mass * g * Math.max(0, pos.y - 0.5);
        }

        function updateHUD() {
            const state = window.__3D_STATE__;
            elVelocity.textContent = state.velocity.toFixed(2);
            elHeight.textContent = Math.max(0, state.projectileY - 0.5).toFixed(2);
            elTime.textContent = state.time.toFixed(2);
            elDistance.textContent = Math.max(0, state.projectileX - startPos.x).toFixed(2);
            elDragStatus.textContent = state.dragEnabled ? "ON" : "OFF";
        }

        // --- Event Listeners ---
        document.getElementById('btn-launch').addEventListener('click', launch);
        
        document.getElementById('btn-reset').addEventListener('click', resetSimulation);
        
        document.getElementById('btn-toggle-drag').addEventListener('click', () => {
            window.__3D_STATE__.dragEnabled = !window.__3D_STATE__.dragEnabled;
            updateHUD();
        });

        sliderAngle.addEventListener('input', (e) => {
            window.__3D_STATE__.launchAngle = parseFloat(e.target.value);
            labelAngle.textContent = e.target.value;
        });

        sliderSpeed.addEventListener('input', (e) => {
            window.__3D_STATE__.launchSpeed = parseFloat(e.target.value);
            labelSpeed.textContent = e.target.value;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;

            if (state.launched) {
                // Main Projectile Physics
                if (!state.landed) {
                    let forceY = -g * mass;
                    let forceX = 0;

                    if (state.dragEnabled) {
                        const speed = vel.length();
                        if (speed > 0) {
                            const dragMag = 0.5 * Cd * rho * A * speed * speed;
                            const dragDir = vel.clone().normalize().multiplyScalar(-1);
                            forceX += dragDir.x * dragMag;
                            forceY += dragDir.y * dragMag;
                        }
                    }

                    const ax = forceX / mass;
                    const ay = forceY / mass;

                    vel.x += ax * dt;
                    vel.y += ay * dt;

                    pos.x += vel.x * dt;
                    pos.y += vel.y * dt;

                    if (pos.y <= 0.5) {
                        pos.y = 0.5;
                        state.landed = true;
                        state.landingX = pos.x;
                        vel.set(0,0,0);
                        addLandingMark(pos, 0xFF0000);
                    }

                    projectile.position.copy(pos);

                    // Trail
                    frameCount++;
                    if (frameCount % 5 === 0) {
                        const trailGeo = new THREE.SphereGeometry(0.05, 8, 8);
                        const trailMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
                        const trail = new THREE.Mesh(trailGeo, trailMat);
                        trail.position.copy(pos);
                        scene.add(trail);
                        trails.push(trail);
                        state.trailCount++;
                    }
                }

                // Ghost Projectile Physics (No Drag)
                if (!ghostLanded) {
                    ghostVel.y += (-g) * dt;
                    
                    ghostPos.x += ghostVel.x * dt;
                    ghostPos.y += ghostVel.y * dt;

                    if (ghostPos.y <= 0.5) {
                        ghostPos.y = 0.5;
                        ghostLanded = true;
                        state.ghostLandingX = ghostPos.x;
                        ghostVel.set(0,0,0);
                    }
                    ghost.position.copy(ghostPos);
                }

                if (!state.landed || !ghostLanded) {
                    state.time += dt;
                }
            }

            updateState();
            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        updateState();
        updateHUD();
        animate();
    </script>
</body>
</html>
