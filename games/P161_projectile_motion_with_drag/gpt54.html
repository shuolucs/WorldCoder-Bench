<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Projectile Motion with Air Drag</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 240px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.5;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 6px 10px;
      border: none;
      border-radius: 5px;
      background: #2d7ef7;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #4a92f8;
    }

    input[type="range"] {
      width: 140px;
    }

    .label-value {
      font-weight: bold;
      color: #ffd966;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Velocity: <span id="hud-velocity">0.00</span> m/s</div>
    <div>Height: <span id="hud-height">0.50</span> m</div>
    <div>Time: <span id="hud-time">0.00</span> s</div>
    <div>Distance: <span id="hud-distance">0.00</span> m</div>
    <div>Drag: <span id="hud-drag-status">ON</span></div>

    <div id="controls">
      <div class="row">
        <button id="btn-launch">Launch</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-toggle-drag">Toggle Drag</button>
      </div>

      <div class="row">
        <label for="slider-angle">Angle:</label>
        <input id="slider-angle" type="range" min="10" max="80" value="45" />
        <span id="label-angle" class="label-value">45°</span>
      </div>

      <div class="row">
        <label for="slider-speed">Speed:</label>
        <input id="slider-speed" type="range" min="5" max="50" value="25" />
        <span id="label-speed" class="label-value">25 m/s</span>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    // Scene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101820);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 15, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 3, 0);
    controls.enableDamping = true;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    // Ground plane
    const groundGeo = new THREE.PlaneGeometry(100, 100);
    const groundMat = new THREE.MeshLambertMaterial({ color: 0x2f8f2f });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Grid lines every 5 units
    const gridGroup = new THREE.Group();
    const gridMat = new THREE.LineBasicMaterial({ color: 0x355e35, transparent: true, opacity: 0.8 });

    for (let i = -50; i <= 50; i += 5) {
      const points1 = [
        new THREE.Vector3(i, 0.01, -50),
        new THREE.Vector3(i, 0.01, 50)
      ];
      const points2 = [
        new THREE.Vector3(-50, 0.01, i),
        new THREE.Vector3(50, 0.01, i)
      ];

      const geo1 = new THREE.BufferGeometry().setFromPoints(points1);
      const geo2 = new THREE.BufferGeometry().setFromPoints(points2);

      gridGroup.add(new THREE.Line(geo1, gridMat));
      gridGroup.add(new THREE.Line(geo2, gridMat));
    }
    scene.add(gridGroup);

    // Launch pad
    const padGeo = new THREE.CylinderGeometry(1, 1, 0.3, 32);
    const padMat = new THREE.MeshPhongMaterial({ color: 0xffd700 });
    const launchPad = new THREE.Mesh(padGeo, padMat);
    launchPad.position.set(-40, 0.15, 0);
    scene.add(launchPad);

    // Projectile
    const projectileRadius = 0.5;
    const startPos = new THREE.Vector3(-40, 0.5, 0);

    const projectileGeo = new THREE.SphereGeometry(projectileRadius, 32, 32);
    const projectileMat = new THREE.MeshPhongMaterial({ color: 0xff3333 });
    const projectile = new THREE.Mesh(projectileGeo, projectileMat);
    projectile.position.copy(startPos);
    scene.add(projectile);

    // Ghost projectile
    const ghostMat = new THREE.MeshPhongMaterial({
      color: 0x00ff66,
      transparent: true,
      opacity: 0.3
    });
    const ghostProjectile = new THREE.Mesh(projectileGeo, ghostMat);
    ghostProjectile.position.copy(startPos);
    scene.add(ghostProjectile);

    // Target ring
    const ringGeo = new THREE.TorusGeometry(2, 0.2, 16, 64);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0x3399ff, wireframe: true });
    const targetRing = new THREE.Mesh(ringGeo, ringMat);
    targetRing.position.set(20, 5, 0);
    targetRing.rotation.y = Math.PI / 2;
    scene.add(targetRing);

    // Physics constants
    const g = 9.81;
    const Cd = 0.47;
    const rho = 1.225;
    const A = Math.PI * projectileRadius * projectileRadius;
    const mass = 1.0;
    const fixedDt = 1 / 60;

    // UI
    const hudVelocity = document.getElementById('hud-velocity');
    const hudHeight = document.getElementById('hud-height');
    const hudTime = document.getElementById('hud-time');
    const hudDistance = document.getElementById('hud-distance');
    const hudDragStatus = document.getElementById('hud-drag-status');

    const btnLaunch = document.getElementById('btn-launch');
    const btnReset = document.getElementById('btn-reset');
    const btnToggleDrag = document.getElementById('btn-toggle-drag');

    const sliderAngle = document.getElementById('slider-angle');
    const sliderSpeed = document.getElementById('slider-speed');
    const labelAngle = document.getElementById('label-angle');
    const labelSpeed = document.getElementById('label-speed');

    // State
    let dragEnabled = true;
    let launched = false;
    let landed = false;
    let ghostLanded = false;
    let elapsedTime = 0;
    let accumulator = 0;
    let lastFrameTime = performance.now();

    let velocity = new THREE.Vector3(0, 0, 0);
    let ghostVelocity = new THREE.Vector3(0, 0, 0);

    let frameCounter = 0;
    let trailMarkers = [];
    let landingMarker = null;
    let ghostLandingMarker = null;
    let landingX = null;
    let ghostLandingX = null;
    let initialKE = 0;
    let currentKE = 0;
    let currentPE = mass * g * startPos.y;

    function updateSliderLabels() {
      labelAngle.textContent = `${sliderAngle.value}°`;
      labelSpeed.textContent = `${sliderSpeed.value} m/s`;
    }

    sliderAngle.addEventListener('input', () => {
      updateSliderLabels();
    });

    sliderSpeed.addEventListener('input', () => {
      updateSliderLabels();
    });

    function clearTrails() {
      for (const marker of trailMarkers) {
        scene.remove(marker);
        if (marker.geometry) marker.geometry.dispose();
        if (marker.material) marker.material.dispose();
      }
      trailMarkers = [];
    }

    function removeMarker(obj) {
      if (!obj) return;
      scene.remove(obj);
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) obj.material.dispose();
    }

    function createLandingMarker(x, z, color) {
      const geo = new THREE.RingGeometry(0.35, 0.6, 32);
      const mat = new THREE.MeshBasicMaterial({
        color,
        side: THREE.DoubleSide
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = -Math.PI / 2;
      ring.position.set(x, 0.02, z);
      scene.add(ring);
      return ring;
    }

    function resetSimulation() {
      launched = false;
      landed = false;
      ghostLanded = false;
      elapsedTime = 0;
      accumulator = 0;
      frameCounter = 0;

      velocity.set(0, 0, 0);
      ghostVelocity.set(0, 0, 0);

      projectile.position.copy(startPos);
      ghostProjectile.position.copy(startPos);

      clearTrails();

      removeMarker(landingMarker);
      removeMarker(ghostLandingMarker);
      landingMarker = null;
      ghostLandingMarker = null;
      landingX = null;
      ghostLandingX = null;

      initialKE = 0;
      currentKE = 0;
      currentPE = mass * g * projectile.position.y;

      updateHUD();
      update3DState();
    }

    function launchProjectile() {
      resetSimulation();

      const angleDeg = parseFloat(sliderAngle.value);
      const speed = parseFloat(sliderSpeed.value);
      const angleRad = THREE.MathUtils.degToRad(angleDeg);

      const vx = speed * Math.cos(angleRad);
      const vy = speed * Math.sin(angleRad);

      velocity.set(vx, vy, 0);
      ghostVelocity.set(vx, vy, 0);

      launched = true;
      landed = false;
      ghostLanded = false;

      initialKE = 0.5 * mass * speed * speed;
      currentKE = initialKE;
      currentPE = mass * g * projectile.position.y;

      updateHUD();
      update3DState();
    }

    btnLaunch.addEventListener('click', launchProjectile);
    btnReset.addEventListener('click', resetSimulation);

    btnToggleDrag.addEventListener('click', () => {
      dragEnabled = !dragEnabled;
      updateHUD();
      update3DState();
    });

    function computeAcceleration(v, useDrag) {
      const accel = new THREE.Vector3(0, -g, 0);

      if (useDrag) {
        const speed = v.length();
        if (speed > 1e-8) {
          const dragFactor = -0.5 * Cd * rho * A / mass;
          const dragAccel = v.clone().multiplyScalar(dragFactor * speed);
          accel.add(dragAccel);
        }
      }

      return accel;
    }

    function stepProjectile(obj, vel, useDragFlag) {
      if (obj === projectile && landed) return;
      if (obj === ghostProjectile && ghostLanded) return;

      const accel = computeAcceleration(vel, useDragFlag);

      // Semi-implicit Euler
      vel.addScaledVector(accel, fixedDt);
      obj.position.addScaledVector(vel, fixedDt);

      if (obj.position.y <= projectileRadius) {
        obj.position.y = projectileRadius;
        vel.set(0, 0, 0);

        if (obj === projectile && !landed) {
          landed = true;
          landingX = obj.position.x;
          landingMarker = createLandingMarker(obj.position.x, obj.position.z, 0xff3333);
        }

        if (obj === ghostProjectile && !ghostLanded) {
          ghostLanded = true;
          ghostLandingX = obj.position.x;
          ghostLandingMarker = createLandingMarker(obj.position.x, obj.position.z, 0x00ff66);
        }
      }
    }

    function addTrailMarker(position) {
      const geo = new THREE.SphereGeometry(0.05, 8, 8);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const marker = new THREE.Mesh(geo, mat);
      marker.position.copy(position);
      scene.add(marker);
      trailMarkers.push(marker);
    }

    function updateHUD() {
      const speedMag = velocity.length();
      const height = projectile.position.y;
      const horizontalDistance = projectile.position.x - startPos.x;

      hudVelocity.textContent = speedMag.toFixed(2);
      hudHeight.textContent = height.toFixed(2);
      hudTime.textContent = elapsedTime.toFixed(2);
      hudDistance.textContent = horizontalDistance.toFixed(2);
      hudDragStatus.textContent = dragEnabled ? 'ON' : 'OFF';
    }

    window.__3D_STATE__ = {
      launched: false,
      landed: false,
      time: 0,
      projectileX: startPos.x,
      projectileY: startPos.y,
      ghostX: startPos.x,
      ghostY: startPos.y,
      velocity: 0,
      dragEnabled: true,
      launchAngle: parseFloat(sliderAngle.value),
      launchSpeed: parseFloat(sliderSpeed.value),
      landingX: null,
      ghostLandingX: null,
      trailCount: 0,
      initialKE: 0,
      currentKE: 0,
      currentPE: mass * g * startPos.y
    };

    function update3DState() {
      window.__3D_STATE__.launched = launched;
      window.__3D_STATE__.landed = landed;
      window.__3D_STATE__.time = launched ? elapsedTime : 0;
      window.__3D_STATE__.projectileX = projectile.position.x;
      window.__3D_STATE__.projectileY = projectile.position.y;
      window.__3D_STATE__.ghostX = ghostProjectile.position.x;
      window.__3D_STATE__.ghostY = ghostProjectile.position.y;
      window.__3D_STATE__.velocity = velocity.length();
      window.__3D_STATE__.dragEnabled = dragEnabled;
      window.__3D_STATE__.launchAngle = parseFloat(sliderAngle.value);
      window.__3D_STATE__.launchSpeed = parseFloat(sliderSpeed.value);
      window.__3D_STATE__.landingX = landingX;
      window.__3D_STATE__.ghostLandingX = ghostLandingX;
      window.__3D_STATE__.trailCount = trailMarkers.length;
      window.__3D_STATE__.initialKE = initialKE;
      window.__3D_STATE__.currentKE = currentKE;
      window.__3D_STATE__.currentPE = currentPE;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const deltaSec = Math.min((now - lastFrameTime) / 1000, 0.05);
      lastFrameTime = now;
      accumulator += deltaSec;

      while (accumulator >= fixedDt) {
        if (launched) {
          if (!landed || !ghostLanded) {
            elapsedTime += fixedDt;
          }

          stepProjectile(projectile, velocity, dragEnabled);
          stepProjectile(ghostProjectile, ghostVelocity, false);

          frameCounter++;
          if (!landed && frameCounter % 5 === 0) {
            addTrailMarker(projectile.position);
          }

          currentKE = 0.5 * mass * velocity.lengthSq();
          currentPE = mass * g * Math.max(projectile.position.y, 0);
        } else {
          currentKE = 0.5 * mass * velocity.lengthSq();
          currentPE = mass * g * Math.max(projectile.position.y, 0);
        }

        accumulator -= fixedDt;
      }

      updateHUD();
      update3DState();

      controls.update();
      renderer.render(scene, camera);
    }

    updateSliderLabels();
    resetSimulation();
    requestAnimationFrame((t) => {
      lastFrameTime = t;
      animate(t);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
