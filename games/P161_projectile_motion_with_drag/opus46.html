<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Projectile Motion with Air Drag</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 18px 22px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 260px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
  }
  #hud .title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
    margin-bottom: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 6px;
  }
  #hud .row { display: flex; justify-content: space-between; }
  #hud .label { color: #aaa; }
  #hud .value { color: #4fc3f7; font-weight: bold; }
  #hud .drag-on { color: #66bb6a; }
  #hud .drag-off { color: #ef5350; }

  #controls {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 16px 24px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
  }
  #controls button {
    padding: 8px 18px;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  #controls button:hover { transform: scale(1.05); }
  #btn-launch { background: #4caf50; color: #fff; }
  #btn-launch:hover { background: #66bb6a; }
  #btn-reset { background: #f44336; color: #fff; }
  #btn-reset:hover { background: #ef5350; }
  #btn-toggle-drag { background: #2196f3; color: #fff; }
  #btn-toggle-drag:hover { background: #42a5f5; }

  .slider-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .slider-group label {
    font-size: 12px;
    color: #aaa;
  }
  .slider-group input[type="range"] {
    width: 120px;
    accent-color: #4fc3f7;
  }
</style>
</head>
<body>

<div id="hud">
  <div class="title">📊 Projectile Telemetry</div>
  <div class="row"><span class="label">Velocity:</span><span class="value" id="hud-velocity">0.00 m/s</span></div>
  <div class="row"><span class="label">Height:</span><span class="value" id="hud-height">0.00 m</span></div>
  <div class="row"><span class="label">Time:</span><span class="value" id="hud-time">0.00 s</span></div>
  <div class="row"><span class="label">Distance:</span><span class="value" id="hud-distance">0.00 m</span></div>
  <div class="row"><span class="label">Drag:</span><span class="value drag-on" id="hud-drag-status">ON</span></div>
  <div class="row"><span class="label">KE:</span><span class="value" id="hud-ke">0.00 J</span></div>
  <div class="row"><span class="label">PE:</span><span class="value" id="hud-pe">0.00 J</span></div>
</div>

<div id="controls">
  <button id="btn-launch">🚀 Launch</button>
  <button id="btn-reset">🔄 Reset</button>
  <button id="btn-toggle-drag">💨 Toggle Drag</button>
  <div class="slider-group">
    <label id="label-angle">Angle: 45°</label>
    <input type="range" id="slider-angle" min="10" max="80" value="45">
  </div>
  <div class="slider-group">
    <label id="label-speed">Speed: 25 m/s</label>
    <input type="range" id="slider-speed" min="5" max="50" value="25">
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // ============ SCENE SETUP ============
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 60, 120);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 15, 40);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 100;
  dirLight.shadow.camera.left = -50;
  dirLight.shadow.camera.right = 50;
  dirLight.shadow.camera.top = 50;
  dirLight.shadow.camera.bottom = -50;
  scene.add(dirLight);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 5, 0);

  // ============ GROUND ============
  const groundGeo = new THREE.PlaneGeometry(100, 100);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid lines
  const gridGroup = new THREE.Group();
  const gridMat = new THREE.LineBasicMaterial({ color: 0x3a7a33, transparent: true, opacity: 0.5 });
  for (let i = -50; i <= 50; i += 5) {
    const pts1 = [new THREE.Vector3(i, 0.01, -50), new THREE.Vector3(i, 0.01, 50)];
    const geo1 = new THREE.BufferGeometry().setFromPoints(pts1);
    gridGroup.add(new THREE.Line(geo1, gridMat));

    const pts2 = [new THREE.Vector3(-50, 0.01, i), new THREE.Vector3(50, 0.01, i)];
    const geo2 = new THREE.BufferGeometry().setFromPoints(pts2);
    gridGroup.add(new THREE.Line(geo2, gridMat));
  }
  scene.add(gridGroup);

  // ============ LAUNCH PAD ============
  const padGeo = new THREE.CylinderGeometry(1, 1, 0.3, 32);
  const padMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.5, roughness: 0.3 });
  const launchPad = new THREE.Mesh(padGeo, padMat);
  launchPad.position.set(-40, 0.15, 0);
  launchPad.castShadow = true;
  scene.add(launchPad);

  // ============ PROJECTILE ============
  const projGeo = new THREE.SphereGeometry(0.5, 32, 32);
  const projMat = new THREE.MeshStandardMaterial({ color: 0xff2222, metalness: 0.4, roughness: 0.3 });
  const projectile = new THREE.Mesh(projGeo, projMat);
  projectile.position.set(-40, 0.5, 0);
  projectile.castShadow = true;
  scene.add(projectile);

  // ============ GHOST PROJECTILE ============
  const ghostGeo = new THREE.SphereGeometry(0.5, 32, 32);
  const ghostMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent: true, opacity: 0.3 });
  const ghost = new THREE.Mesh(ghostGeo, ghostMat);
  ghost.position.set(-40, 0.5, 0);
  scene.add(ghost);

  // ============ TARGET RING ============
  const targetGeo = new THREE.TorusGeometry(2, 0.2, 16, 48);
  const targetMat = new THREE.MeshStandardMaterial({ color: 0x2196f3, wireframe: true });
  const target = new THREE.Mesh(targetGeo, targetMat);
  target.position.set(20, 5, 0);
  target.rotation.y = Math.PI / 2;
  scene.add(target);

  // Pulsing animation for target
  let targetPulse = 0;

  // ============ TRAIL STORAGE ============
  const trailMarkers = [];
  const ghostTrailMarkers = [];

  function clearTrails() {
    trailMarkers.forEach(m => scene.remove(m));
    trailMarkers.length = 0;
    ghostTrailMarkers.forEach(m => scene.remove(m));
    ghostTrailMarkers.length = 0;
  }

  // Landing ring storage
  let landingRing = null;
  let ghostLandingRing = null;

  function clearLandingRings() {
    if (landingRing) { scene.remove(landingRing); landingRing = null; }
    if (ghostLandingRing) { scene.remove(ghostLandingRing); ghostLandingRing = null; }
  }

  // ============ PHYSICS CONSTANTS ============
  const g = 9.81;
  const Cd = 0.47;
  const rho = 1.225;
  const radius = 0.5;
  const A = Math.PI * radius * radius;
  const mass = 1.0;
  const dt = 1 / 60;

  // ============ STATE ============
  let launched = false;
  let landed = false;
  let ghostLanded = false;
  let dragEnabled = true;
  let launchAngle = 45;
  let launchSpeed = 25;
  let simTime = 0;
  let frameCount = 0;

  // Projectile state
  let px = -40, py = 0.5, pz = 0;
  let vx = 0, vy = 0, vz = 0;
  const startX = -40;

  // Ghost state
  let gx = -40, gy = 0.5, gz = 0;
  let gvx = 0, gvy = 0, gvz = 0;

  let landingX = null;
  let ghostLandingX = null;
  let initialKE = 0;
  let trailCount = 0;

  // ============ GLOBAL STATE ============
  window.__3D_STATE__ = {
    launched: false,
    landed: false,
    time: 0,
    projectileX: -40,
    projectileY: 0.5,
    ghostX: -40,
    ghostY: 0.5,
    velocity: 0,
    dragEnabled: true,
    launchAngle: 45,
    launchSpeed: 25,
    landingX: null,
    ghostLandingX: null,
    trailCount: 0,
    initialKE: 0,
    currentKE: 0,
    currentPE: 0
  };

  function updateGlobalState() {
    const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
    const ke = 0.5 * mass * speed * speed;
    const pe = mass * g * Math.max(0, py - 0.5);

    window.__3D_STATE__.launched = launched;
    window.__3D_STATE__.landed = landed;
    window.__3D_STATE__.time = simTime;
    window.__3D_STATE__.projectileX = px;
    window.__3D_STATE__.projectileY = py;
    window.__3D_STATE__.ghostX = gx;
    window.__3D_STATE__.ghostY = gy;
    window.__3D_STATE__.velocity = speed;
    window.__3D_STATE__.dragEnabled = dragEnabled;
    window.__3D_STATE__.launchAngle = launchAngle;
    window.__3D_STATE__.launchSpeed = launchSpeed;
    window.__3D_STATE__.landingX = landingX;
    window.__3D_STATE__.ghostLandingX = ghostLandingX;
    window.__3D_STATE__.trailCount = trailCount;
    window.__3D_STATE__.initialKE = initialKE;
    window.__3D_STATE__.currentKE = ke;
    window.__3D_STATE__.currentPE = pe;
  }

  // ============ HUD UPDATE ============
  const hudVelocity = document.getElementById('hud-velocity');
  const hudHeight = document.getElementById('hud-height');
  const hudTime = document.getElementById('hud-time');
  const hudDistance = document.getElementById('hud-distance');
  const hudDragStatus = document.getElementById('hud-drag-status');
  const hudKE = document.getElementById('hud-ke');
  const hudPE = document.getElementById('hud-pe');

  function updateHUD() {
    const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
    const height = Math.max(0, py - 0.5);
    const dist = px - startX;
    const ke = 0.5 * mass * speed * speed;
    const pe = mass * g * height;

    hudVelocity.textContent = speed.toFixed(2) + ' m/s';
    hudHeight.textContent = height.toFixed(2) + ' m';
    hudTime.textContent = simTime.toFixed(2) + ' s';
    hudDistance.textContent = dist.toFixed(2) + ' m';
    hudDragStatus.textContent = dragEnabled ? 'ON' : 'OFF';
    hudDragStatus.className = 'value ' + (dragEnabled ? 'drag-on' : 'drag-off');
    hudKE.textContent = ke.toFixed(2) + ' J';
    hudPE.textContent = pe.toFixed(2) + ' J';
  }

  // ============ CONTROLS ============
  const btnLaunch = document.getElementById('btn-launch');
  const btnReset = document.getElementById('btn-reset');
  const btnToggleDrag = document.getElementById('btn-toggle-drag');
  const sliderAngle = document.getElementById('slider-angle');
  const sliderSpeed = document.getElementById('slider-speed');
  const labelAngle = document.getElementById('label-angle');
  const labelSpeed = document.getElementById('label-speed');

  sliderAngle.addEventListener('input', function() {
    launchAngle = parseInt(this.value);
    labelAngle.textContent = 'Angle: ' + launchAngle + '°';
  });

  sliderSpeed.addEventListener('input', function() {
    launchSpeed = parseInt(this.value);
    labelSpeed.textContent = 'Speed: ' + launchSpeed + ' m/s';
  });

  btnLaunch.addEventListener('click', function() {
    if (launched && !landed) return; // Already in flight

    // Reset if needed
    resetState();

    const angleRad = launchAngle * Math.PI / 180;
    vx = launchSpeed * Math.cos(angleRad);
    vy = launchSpeed * Math.sin(angleRad);
    vz = 0;

    gvx = launchSpeed * Math.cos(angleRad);
    gvy = launchSpeed * Math.sin(angleRad);
    gvz = 0;

    initialKE = 0.5 * mass * launchSpeed * launchSpeed;
    launched = true;
    landed = false;
    ghostLanded = false;
  });

  btnReset.addEventListener('click', function() {
    resetState();
  });

  btnToggleDrag.addEventListener('click', function() {
    dragEnabled = !dragEnabled;
  });

  function resetState() {
    launched = false;
    landed = false;
    ghostLanded = false;
    simTime = 0;
    frameCount = 0;

    px = -40; py = 0.5; pz = 0;
    vx = 0; vy = 0; vz = 0;

    gx = -40; gy = 0.5; gz = 0;
    gvx = 0; gvy = 0; gvz = 0;

    landingX = null;
    ghostLandingX = null;
    trailCount = 0;
    initialKE = 0;

    projectile.position.set(px, py, pz);
    ghost.position.set(gx, gy, gz);

    clearTrails();
    clearLandingRings();
  }

  // ============ PHYSICS STEP ============
  function physicsStep() {
    if (!launched) return;

    simTime += dt;
    frameCount++;

    // Main projectile
    if (!landed) {
      // Compute drag force on main projectile
      let ax = 0, ay = -g, az = 0;

      if (dragEnabled) {
        const speed = Math.sqrt(vx * vx + vy * vy + vz * vz);
        if (speed > 0.001) {
          const dragMag = 0.5 * Cd * rho * A * speed * speed;
          ax += (-dragMag * vx / speed) / mass;
          ay += (-dragMag * vy / speed) / mass;
          az += (-dragMag * vz / speed) / mass;
        }
      }

      // Semi-implicit Euler: update velocity first, then position
      vx += ax * dt;
      vy += ay * dt;
      vz += az * dt;

      px += vx * dt;
      py += vy * dt;
      pz += vz * dt;

      // Ground collision
      if (py <= 0.5) {
        py = 0.5;
        vy = 0;
        vx = 0;
        vz = 0;
        landed = true;
        landingX = px;

        // Create landing ring
        const ringGeo = new THREE.TorusGeometry(1, 0.1, 8, 32);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        landingRing = new THREE.Mesh(ringGeo, ringMat);
        landingRing.position.set(px, 0.05, pz);
        landingRing.rotation.x = -Math.PI / 2;
        scene.add(landingRing);
      }

      projectile.position.set(px, py, pz);

      // Trail markers every 5 frames
      if (frameCount % 5 === 0 && !landed) {
        const markerGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.set(px, py, pz);
        scene.add(marker);
        trailMarkers.push(marker);
        trailCount = trailMarkers.length;
      }
    }

    // Ghost projectile (no drag, always ideal ballistic)
    if (!ghostLanded) {
      let gax = 0, gay = -g, gaz = 0;

      // Semi-implicit Euler
      gvx += gax * dt;
      gvy += gay * dt;
      gvz += gaz * dt;

      gx += gvx * dt;
      gy += gvy * dt;
      gz += gvz * dt;

      if (gy <= 0.5) {
        gy = 0.5;
        gvy = 0;
        gvx = 0;
        gvz = 0;
        ghostLanded = true;
        ghostLandingX = gx;

        // Create ghost landing ring
        const ringGeo = new THREE.TorusGeometry(1, 0.1, 8, 32);
        const ringMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
        ghostLandingRing = new THREE.Mesh(ringGeo, ringMat);
        ghostLandingRing.position.set(gx, 0.05, gz);
        ghostLandingRing.rotation.x = -Math.PI / 2;
        scene.add(ghostLandingRing);
      }

      ghost.position.set(gx, gy, gz);

      // Ghost trail
      if (frameCount % 5 === 0 && !ghostLanded) {
        const markerGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 });
        const marker = new THREE.Mesh(markerGeo, markerMat);
        marker.position.set(gx, gy, gz);
        scene.add(marker);
        ghostTrailMarkers.push(marker);
      }
    }
  }

  // ============ ANIMATION LOOP ============
  function animate() {
    requestAnimationFrame(animate);

    physicsStep();

    // Target pulse animation
    targetPulse += 0.03;
    const scale = 1 + 0.1 * Math.sin(targetPulse);
    target.scale.set(scale, scale, scale);

    // Rotate target slightly
    target.rotation.z += 0.005;

    controls.update();
    updateHUD();
    updateGlobalState();

    renderer.render(scene, camera);
  }

  // ============ RESIZE ============
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ============ SKYBOX-LIKE BACKGROUND ============
  // Add some distant reference objects
  // Distance markers along X axis
  for (let x = -40; x <= 50; x += 10) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.font = '20px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(x + 'm', 32, 24);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.6 });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(x, 0.1, -3);
    sprite.scale.set(3, 1.5, 1);
    scene.add(sprite);
  }

  // Start
  updateGlobalState();
  animate();
})();
</script>
</body>
</html>
