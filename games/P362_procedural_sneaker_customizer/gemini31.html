<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Sneaker Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #customizer-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 20px;
            border-radius: 12px;
            width: 260px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h2 {
            margin-top: 0;
            font-size: 1.2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        input[type="color"] {
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            padding: 0;
        }
        .section-title {
            font-size: 0.9rem;
            color: #aaa;
            margin: 15px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .preset-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        button {
            background: #3a3a5a;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            flex: 1;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        button:hover {
            background: #4a4a7a;
        }
        .action-btn {
            width: 100%;
            margin-bottom: 8px;
            background: #2a5a8a;
            font-weight: bold;
        }
        .action-btn:hover {
            background: #3a6a9a;
        }
        .instructions {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            margin-top: 15px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="customizer-panel">
        <h2>Sneaker Studio</h2>
        
        <div class="section-title">Colors</div>
        <div class="control-group">
            <label for="sole-color">Sole</label>
            <input type="color" id="sole-color" value="#222222">
        </div>
        <div class="control-group">
            <label for="upper-color">Upper</label>
            <input type="color" id="upper-color" value="#ffffff">
        </div>
        <div class="control-group">
            <label for="tongue-color">Tongue</label>
            <input type="color" id="tongue-color" value="#ff4444">
        </div>
        <div class="control-group">
            <label for="heel-color">Heel Tab</label>
            <input type="color" id="heel-color" value="#4444ff">
        </div>

        <div class="section-title">Presets</div>
        <div class="preset-row">
            <button id="preset-classic">Classic</button>
            <button id="preset-neon">Neon</button>
            <button id="preset-earth">Earth</button>
        </div>

        <div class="section-title">Controls</div>
        <button id="toggle-mascot" class="action-btn">Hide Mascot</button>
        <button id="explode-btn" class="action-btn">Toggle Explode View</button>

        <div class="instructions">
            Drag to rotate | Scroll to zoom<br>
            Space: Auto-rotate | R: Reset rotation
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State
        window.__3D_STATE__ = {
            soleColor: '#222222',
            upperColor: '#ffffff',
            tongueColor: '#ff4444',
            heelColor: '#4444ff',
            currentPreset: 'custom',
            autoRotate: true,
            rotationY: 0,
            mascotVisible: true,
            mascotY: 2.0,
            exploded: false,
            partsCount: 4,
            platformRadius: 2,
            cameraDistance: 5
        };

        // Scene Setup
        const scene = new THREE.Scene();
        
        // Gradient Background
        const canvas = document.createElement('canvas');
        canvas.width = 2;
        canvas.height = 2;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 2);
        gradient.addColorStop(0, '#1a1a2e');
        gradient.addColorStop(1, '#16213e');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 2, 2);
        scene.background = new THREE.CanvasTexture(canvas);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.5, 0);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 8, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.5);
        pointLight.position.set(-3, 3, -3);
        scene.add(pointLight);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x333333, 
            metalness: 0.8, 
            roughness: 0.2 
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        scene.add(platform);

        // Sneaker Materials
        const materials = {
            sole: new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 }),
            upper: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 }),
            tongue: new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.6 }),
            heel: new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.4 })
        };

        // Sneaker Geometry & Construction
        const sneakerGroup = new THREE.Group();
        sneakerGroup.position.y = 0.5;

        // Base positions
        const pos = {
            sole: new THREE.Vector3(0, 0, 0),
            upper: new THREE.Vector3(0, 0.25, 0),
            tongue: new THREE.Vector3(0.4, 0.4, 0),
            heel: new THREE.Vector3(-0.5, 0.25, 0)
        };

        const sole = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.15, 0.5), materials.sole);
        sole.position.copy(pos.sole);
        sneakerGroup.add(sole);

        const upper = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.35, 0.45), materials.upper);
        upper.position.copy(pos.upper);
        sneakerGroup.add(upper);

        const tongue = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.4, 0.3), materials.tongue);
        tongue.position.copy(pos.tongue);
        tongue.rotation.z = -0.2; // Tilt forward
        sneakerGroup.add(tongue);

        const heel = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.2, 0.4), materials.heel);
        heel.position.copy(pos.heel);
        sneakerGroup.add(heel);

        scene.add(sneakerGroup);

        // Mascot
        let mascotModel = null;
        const loader = new GLTFLoader();
        loader.load('._BarramundiFish.glb', (gltf) => {
            mascotModel = gltf.scene;
            mascotModel.scale.setScalar(0.4);
            mascotModel.position.set(0, 2.0, 0);
            scene.add(mascotModel);
        }, undefined, (error) => {
            console.warn('Mascot model could not be loaded. Proceeding without it.', error);
        });

        // Explode Animation State
        let explodeProgress = 0;

        // UI Interactions
        const updateColors = (soleC, upperC, tongueC, heelC, presetName) => {
            materials.sole.color.set(soleC);
            materials.upper.color.set(upperC);
            materials.tongue.color.set(tongueC);
            materials.heel.color.set(heelC);
            
            document.getElementById('sole-color').value = soleC;
            document.getElementById('upper-color').value = upperC;
            document.getElementById('tongue-color').value = tongueC;
            document.getElementById('heel-color').value = heelC;

            window.__3D_STATE__.currentPreset = presetName;
        };

        document.getElementById('sole-color').addEventListener('input', (e) => updateColors(e.target.value, materials.upper.color.getHexString(), materials.tongue.color.getHexString(), materials.heel.color.getHexString(), 'custom'));
        document.getElementById('upper-color').addEventListener('input', (e) => updateColors('#'+materials.sole.color.getHexString(), e.target.value, '#'+materials.tongue.color.getHexString(), '#'+materials.heel.color.getHexString(), 'custom'));
        document.getElementById('tongue-color').addEventListener('input', (e) => updateColors('#'+materials.sole.color.getHexString(), '#'+materials.upper.color.getHexString(), e.target.value, '#'+materials.heel.color.getHexString(), 'custom'));
        document.getElementById('heel-color').addEventListener('input', (e) => updateColors('#'+materials.sole.color.getHexString(), '#'+materials.upper.color.getHexString(), '#'+materials.tongue.color.getHexString(), e.target.value, 'custom'));

        document.getElementById('preset-classic').addEventListener('click', () => updateColors('#222222', '#ffffff', '#cc0000', '#000080', 'classic'));
        document.getElementById('preset-neon').addEventListener('click', () => updateColors('#00ff00', '#ff00ff', '#00ffff', '#ffff00', 'neon'));
        document.getElementById('preset-earth').addEventListener('click', () => updateColors('#4a3728', '#8b7355', '#6b8e23', '#a0522d', 'earth'));

        document.getElementById('toggle-mascot').addEventListener('click', (e) => {
            window.__3D_STATE__.mascotVisible = !window.__3D_STATE__.mascotVisible;
            if (mascotModel) mascotModel.visible = window.__3D_STATE__.mascotVisible;
            e.target.innerText = window.__3D_STATE__.mascotVisible ? 'Hide Mascot' : 'Show Mascot';
        });

        document.getElementById('explode-btn').addEventListener('click', () => {
            window.__3D_STATE__.exploded = !window.__3D_STATE__.exploded;
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            }
            if (e.code === 'KeyR') {
                sneakerGroup.rotation.y = 0;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();

            // Auto-rotate
            if (window.__3D_STATE__.autoRotate) {
                sneakerGroup.rotation.y += 0.005;
            }

            // Mascot Bobbing
            let currentMascotY = 2.0;
            if (mascotModel && window.__3D_STATE__.mascotVisible) {
                currentMascotY = 2.0 + Math.sin(time * Math.PI) * 0.15;
                mascotModel.position.y = currentMascotY;
            }

            // Explode Logic (30 frames ~ 0.5s at 60fps)
            const targetProgress = window.__3D_STATE__.exploded ? 1 : 0;
            if (explodeProgress !== targetProgress) {
                explodeProgress += (window.__3D_STATE__.exploded ? 1 : -1) * (1/30);
                explodeProgress = THREE.MathUtils.clamp(explodeProgress, 0, 1);

                // Interpolate positions
                sole.position.y = THREE.MathUtils.lerp(pos.sole.y, pos.sole.y - 0.3, explodeProgress);
                
                tongue.position.y = THREE.MathUtils.lerp(pos.tongue.y, pos.tongue.y + 0.3, explodeProgress);
                tongue.position.x = THREE.MathUtils.lerp(pos.tongue.x, pos.tongue.x + 0.3, explodeProgress);
                
                heel.position.y = THREE.MathUtils.lerp(pos.heel.y, pos.heel.y + 0.2, explodeProgress);
                heel.position.x = THREE.MathUtils.lerp(pos.heel.x, pos.heel.x - 0.3, explodeProgress);
            }

            controls.update();

            // Update State Object
            window.__3D_STATE__.soleColor = '#' + materials.sole.color.getHexString();
            window.__3D_STATE__.upperColor = '#' + materials.upper.color.getHexString();
            window.__3D_STATE__.tongueColor = '#' + materials.tongue.color.getHexString();
            window.__3D_STATE__.heelColor = '#' + materials.heel.color.getHexString();
            window.__3D_STATE__.rotationY = sneakerGroup.rotation.y;
            window.__3D_STATE__.mascotY = currentMascotY;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
