<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Customizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #customizer-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    width: 240px;
    z-index: 100;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  #customizer-panel h2 {
    font-size: 16px;
    margin-bottom: 15px;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aab;
  }

  .color-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .color-row label {
    font-size: 13px;
    color: #ccd;
  }

  .color-row input[type="color"] {
    width: 40px;
    height: 28px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    padding: 0;
  }

  .divider {
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 15px 0;
  }

  .preset-section h3, .controls-section h3 {
    font-size: 12px;
    color: #889;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .preset-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .preset-buttons button, .control-btn {
    flex: 1;
    min-width: 60px;
    padding: 8px 6px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    color: #dde;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .preset-buttons button:hover, .control-btn:hover {
    background: rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.3);
  }

  .preset-buttons button.active {
    background: rgba(100,100,255,0.3);
    border-color: rgba(100,100,255,0.6);
  }

  .control-btn {
    display: block;
    width: 100%;
    margin-bottom: 8px;
  }

  .hint {
    font-size: 10px;
    color: #667;
    text-align: center;
    margin-top: 10px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="customizer-panel">
  <h2>🎨 Customize</h2>

  <div class="color-row">
    <label for="sole-color">Sole</label>
    <input type="color" id="sole-color" value="#222222">
  </div>
  <div class="color-row">
    <label for="upper-color">Upper</label>
    <input type="color" id="upper-color" value="#ffffff">
  </div>
  <div class="color-row">
    <label for="tongue-color">Tongue</label>
    <input type="color" id="tongue-color" value="#ff4444">
  </div>
  <div class="color-row">
    <label for="heel-color">Heel</label>
    <input type="color" id="heel-color" value="#4444ff">
  </div>

  <div class="divider"></div>

  <div class="preset-section">
    <h3>Presets</h3>
    <div class="preset-buttons">
      <button id="preset-classic">Classic</button>
      <button id="preset-neon">Neon</button>
      <button id="preset-earth">Earth</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="controls-section">
    <h3>Controls</h3>
    <button class="control-btn" id="toggle-mascot">Hide Mascot</button>
    <button class="control-btn" id="explode-btn">Explode View</button>
  </div>

  <div class="hint">
    SPACE: toggle rotation<br>
    R: reset rotation
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// State
window.__3D_STATE__ = {
  soleColor: '#222222',
  upperColor: '#ffffff',
  tongueColor: '#ff4444',
  heelColor: '#4444ff',
  currentPreset: 'custom',
  autoRotate: true,
  rotationY: 0,
  mascotVisible: true,
  mascotY: 2.0,
  exploded: false,
  partsCount: 4,
  platformRadius: 2,
  cameraDistance: 5
};

// Scene setup
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.8, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xffffff, 0.5);
pointLight.position.set(-3, 3, -3);
scene.add(pointLight);

// Platform
const platformGeo = new THREE.CylinderGeometry(2, 2, 0.1, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x111118,
  metalness: 0.9,
  roughness: 0.3
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
scene.add(platform);

// Sneaker parts
const soleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.1 });
const upperMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5, metalness: 0.0 });
const tongueMat = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.6, metalness: 0.0 });
const heelMat = new THREE.MeshStandardMaterial({ color: 0x4444ff, roughness: 0.5, metalness: 0.1 });

// Sole
const soleGeo = new THREE.BoxGeometry(1.2, 0.15, 0.5);
const soleMesh = new THREE.Mesh(soleGeo, soleMat);
soleMesh.position.y = 0;
soleMesh.castShadow = true;

// Upper
const upperGeo = new THREE.BoxGeometry(1.0, 0.35, 0.45);
const upperMesh = new THREE.Mesh(upperGeo, upperMat);
upperMesh.position.y = 0.25;
upperMesh.castShadow = true;

// Tongue
const tongueGeo = new THREE.BoxGeometry(0.2, 0.4, 0.3);
const tongueMesh = new THREE.Mesh(tongueGeo, tongueMat);
tongueMesh.position.set(0.45, 0.4, 0);
tongueMesh.rotation.z = -0.3;
tongueMesh.castShadow = true;

// Heel tab
const heelGeo = new THREE.BoxGeometry(0.15, 0.2, 0.4);
const heelMesh = new THREE.Mesh(heelGeo, heelMat);
heelMesh.position.set(-0.55, 0.35, 0);
heelMesh.castShadow = true;

// Sneaker group
const sneakerGroup = new THREE.Group();
sneakerGroup.add(soleMesh);
sneakerGroup.add(upperMesh);
sneakerGroup.add(tongueMesh);
sneakerGroup.add(heelMesh);
sneakerGroup.position.y = 0.5;
scene.add(sneakerGroup);

// Default (rest) positions for parts
const defaultPositions = {
  sole: soleMesh.position.clone(),
  upper: upperMesh.position.clone(),
  tongue: tongueMesh.position.clone(),
  heel: heelMesh.position.clone()
};

// Exploded positions
const explodedPositions = {
  sole: defaultPositions.sole.clone().add(new THREE.Vector3(0, -0.3, 0)),
  upper: defaultPositions.upper.clone(),
  tongue: defaultPositions.tongue.clone().add(new THREE.Vector3(0.3, 0.3, 0)),
  heel: defaultPositions.heel.clone().add(new THREE.Vector3(-0.3, 0.2, 0))
};

// Mascot
let mascotModel = null;
let mascotVisible = true;

const loader = new THREE.GLTFLoader();
loader.load(
  'BarramundiFish.glb',
  (gltf) => {
    mascotModel = gltf.scene;
    // Compute bounding box to scale properly
    const box = new THREE.Box3().setFromObject(mascotModel);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 0.4 / maxDim;
    mascotModel.scale.setScalar(scale);
    mascotModel.position.set(0, 2.0, 0);
    mascotModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(mascotModel);
  },
  undefined,
  (error) => {
    console.warn('Could not load fish GLB, creating placeholder:', error);
    // Create a simple fish placeholder
    const fishGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.SphereGeometry(0.15, 16, 12);
    bodyGeo.scale(1.5, 0.8, 0.6);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2288aa, metalness: 0.3, roughness: 0.4 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    fishGroup.add(body);

    // Tail
    const tailGeo = new THREE.ConeGeometry(0.1, 0.2, 8);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0x1166aa, metalness: 0.3, roughness: 0.5 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.x = -0.25;
    tail.rotation.z = Math.PI / 2;
    fishGroup.add(tail);

    // Eye
    const eyeGeo = new THREE.SphereGeometry(0.025, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x333333 });
    const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
    eye1.position.set(0.12, 0.04, 0.08);
    fishGroup.add(eye1);
    const eye2 = eye1.clone();
    eye2.position.z = -0.08;
    fishGroup.add(eye2);

    // Dorsal fin
    const finGeo = new THREE.BoxGeometry(0.15, 0.08, 0.02);
    const finMat = new THREE.MeshStandardMaterial({ color: 0x33aacc, metalness: 0.2, roughness: 0.5 });
    const dorsalFin = new THREE.Mesh(finGeo, finMat);
    dorsalFin.position.set(0, 0.12, 0);
    dorsalFin.rotation.z = 0.2;
    fishGroup.add(dorsalFin);

    fishGroup.position.set(0, 2.0, 0);
    mascotModel = fishGroup;
    scene.add(mascotModel);
  }
);

// Color pickers
const soleColorInput = document.getElementById('sole-color');
const upperColorInput = document.getElementById('upper-color');
const tongueColorInput = document.getElementById('tongue-color');
const heelColorInput = document.getElementById('heel-color');

function setColors(sole, upper, tongue, heel) {
  soleMat.color.set(sole);
  upperMat.color.set(upper);
  tongueMat.color.set(tongue);
  heelMat.color.set(heel);
  soleColorInput.value = sole;
  upperColorInput.value = upper;
  tongueColorInput.value = tongue;
  heelColorInput.value = heel;
  window.__3D_STATE__.soleColor = sole;
  window.__3D_STATE__.upperColor = upper;
  window.__3D_STATE__.tongueColor = tongue;
  window.__3D_STATE__.heelColor = heel;
}

soleColorInput.addEventListener('input', (e) => {
  soleMat.color.set(e.target.value);
  window.__3D_STATE__.soleColor = e.target.value;
  window.__3D_STATE__.currentPreset = 'custom';
  updatePresetButtons('custom');
});
upperColorInput.addEventListener('input', (e) => {
  upperMat.color.set(e.target.value);
  window.__3D_STATE__.upperColor = e.target.value;
  window.__3D_STATE__.currentPreset = 'custom';
  updatePresetButtons('custom');
});
tongueColorInput.addEventListener('input', (e) => {
  tongueMat.color.set(e.target.value);
  window.__3D_STATE__.tongueColor = e.target.value;
  window.__3D_STATE__.currentPreset = 'custom';
  updatePresetButtons('custom');
});
heelColorInput.addEventListener('input', (e) => {
  heelMat.color.set(e.target.value);
  window.__3D_STATE__.heelColor = e.target.value;
  window.__3D_STATE__.currentPreset = 'custom';
  updatePresetButtons('custom');
});

// Preset buttons
function updatePresetButtons(active) {
  document.getElementById('preset-classic').classList.toggle('active', active === 'classic');
  document.getElementById('preset-neon').classList.toggle('active', active === 'neon');
  document.getElementById('preset-earth').classList.toggle('active', active === 'earth');
}

document.getElementById('preset-classic').addEventListener('click', () => {
  setColors('#222222', '#ffffff', '#cc0000', '#000080');
  window.__3D_STATE__.currentPreset = 'classic';
  updatePresetButtons('classic');
});

document.getElementById('preset-neon').addEventListener('click', () => {
  setColors('#00ff00', '#ff00ff', '#00ffff', '#ffff00');
  window.__3D_STATE__.currentPreset = 'neon';
  updatePresetButtons('neon');
});

document.getElementById('preset-earth').addEventListener('click', () => {
  setColors('#4a3728', '#8b7355', '#6b8e23', '#a0522d');
  window.__3D_STATE__.currentPreset = 'earth';
  updatePresetButtons('earth');
});

// Toggle mascot
const toggleMascotBtn = document.getElementById('toggle-mascot');
toggleMascotBtn.addEventListener('click', () => {
  mascotVisible = !mascotVisible;
  if (mascotModel) mascotModel.visible = mascotVisible;
  toggleMascotBtn.textContent = mascotVisible ? 'Hide Mascot' : 'Show Mascot';
  window.__3D_STATE__.mascotVisible = mascotVisible;
});

// Explode view
let exploded = false;
let explodeProgress = 0; // 0 = normal, 1 = exploded
let explodeTarget = 0;
const explodeFrames = 30;

document.getElementById('explode-btn').addEventListener('click', () => {
  exploded = !exploded;
  explodeTarget = exploded ? 1 : 0;
  document.getElementById('explode-btn').textContent = exploded ? 'Collapse View' : 'Explode View';
  window.__3D_STATE__.exploded = exploded;
});

// Keyboard controls
let autoRotate = true;

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    autoRotate = !autoRotate;
    window.__3D_STATE__.autoRotate = autoRotate;
  }
  if (e.code === 'KeyR') {
    sneakerGroup.rotation.y = 0;
    window.__3D_STATE__.rotationY = 0;
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const elapsed = clock.getElapsedTime();

  // Auto-rotate sneaker
  if (autoRotate) {
    sneakerGroup.rotation.y += 0.005;
  }

  // Explode animation
  const explodeStep = 1 / explodeFrames;
  if (explodeProgress < explodeTarget) {
    explodeProgress = Math.min(explodeProgress + explodeStep, 1);
  } else if (explodeProgress > explodeTarget) {
    explodeProgress = Math.max(explodeProgress - explodeStep, 0);
  }

  // Lerp part positions
  const t = explodeProgress;
  soleMesh.position.lerpVectors(defaultPositions.sole, explodedPositions.sole, t);
  upperMesh.position.lerpVectors(defaultPositions.upper, explodedPositions.upper, t);
  tongueMesh.position.lerpVectors(defaultPositions.tongue, explodedPositions.tongue, t);
  heelMesh.position.lerpVectors(defaultPositions.heel, explodedPositions.heel, t);

  // Mascot bobbing
  if (mascotModel) {
    const bobY = 2.0 + Math.sin(elapsed * Math.PI) * 0.15; // period ~2 seconds
    mascotModel.position.y = bobY;
    mascotModel.rotation.y = elapsed * 0.5;
    window.__3D_STATE__.mascotY = bobY;
  }

  // Update controls
  controls.update();

  // Update state
  window.__3D_STATE__.rotationY = sneakerGroup.rotation.y;
  window.__3D_STATE__.autoRotate = autoRotate;
  window.__3D_STATE__.cameraDistance = camera.position.length();
  window.__3D_STATE__.soleColor = '#' + soleMat.color.getHexString();
  window.__3D_STATE__.upperColor = '#' + upperMat.color.getHexString();
  window.__3D_STATE__.tongueColor = '#' + tongueMat.color.getHexString();
  window.__3D_STATE__.heelColor = '#' + heelMat.color.getHexString();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
