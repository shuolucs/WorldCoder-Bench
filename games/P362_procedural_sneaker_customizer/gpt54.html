<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Sneaker Customizer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 100%);
    }

    canvas {
      display: block;
    }

    #customizer-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 260px;
      padding: 14px;
      background: rgba(10, 10, 20, 0.72);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #customizer-panel h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    .control-row label {
      font-size: 14px;
      flex: 1;
    }

    .control-row input[type="color"] {
      width: 64px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      background: #2f80ed;
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #1366d6;
    }

    button:active {
      transform: scale(0.98);
    }

    .hint {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.4;
      color: rgba(255,255,255,0.8);
    }
  </style>
</head>
<body>
  <div id="customizer-panel">
    <h2>Sneaker Customizer</h2>

    <div class="control-row">
      <label for="sole-color">Sole</label>
      <input id="sole-color" type="color" value="#222222" />
    </div>
    <div class="control-row">
      <label for="upper-color">Upper</label>
      <input id="upper-color" type="color" value="#ffffff" />
    </div>
    <div class="control-row">
      <label for="tongue-color">Tongue</label>
      <input id="tongue-color" type="color" value="#ff4444" />
    </div>
    <div class="control-row">
      <label for="heel-color">Heel Tab</label>
      <input id="heel-color" type="color" value="#4444ff" />
    </div>

    <div class="button-group">
      <button id="preset-classic">Classic</button>
      <button id="preset-neon">Neon</button>
      <button id="preset-earth">Earth</button>
      <button id="toggle-mascot">Hide Mascot</button>
      <button id="explode-btn">Toggle Exploded View</button>
    </div>

    <div class="hint">
      Space: toggle auto-rotation<br />
      R: reset sneaker rotation
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2;
    bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(1, '#16213e');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, 2, 512);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.8, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 8, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.5);
    pointLight.position.set(-3, 3, -3);
    scene.add(pointLight);

    const platformRadius = 2;
    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(platformRadius, platformRadius, 0.1, 64),
      new THREE.MeshStandardMaterial({
        color: 0x1f1f28,
        metalness: 0.8,
        roughness: 0.3
      })
    );
    platform.position.y = 0;
    scene.add(platform);

    const sneakerGroup = new THREE.Group();
    sneakerGroup.name = 'sneakerGroup';
    sneakerGroup.position.set(0, 0.5, 0);
    scene.add(sneakerGroup);

    const soleMaterial = new THREE.MeshStandardMaterial({
      color: '#222222',
      roughness: 0.6,
      metalness: 0.15
    });
    const upperMaterial = new THREE.MeshStandardMaterial({
      color: '#ffffff',
      roughness: 0.8,
      metalness: 0.05
    });
    const tongueMaterial = new THREE.MeshStandardMaterial({
      color: '#ff4444',
      roughness: 0.75,
      metalness: 0.05
    });
    const heelMaterial = new THREE.MeshStandardMaterial({
      color: '#4444ff',
      roughness: 0.7,
      metalness: 0.05
    });

    const sole = new THREE.Mesh(
      new THREE.BoxGeometry(1.2, 0.15, 0.5),
      soleMaterial
    );
    sole.name = 'sole';

    const upper = new THREE.Mesh(
      new THREE.BoxGeometry(1.0, 0.35, 0.45),
      upperMaterial
    );
    upper.name = 'upper';
    upper.position.y = 0.25;

    const tongue = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 0.4, 0.3),
      tongueMaterial
    );
    tongue.name = 'tongue';
    tongue.position.set(0.35, 0.42, 0);
    tongue.rotation.z = THREE.MathUtils.degToRad(-12);

    const heelTab = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, 0.2, 0.4),
      heelMaterial
    );
    heelTab.name = 'heel_tab';
    heelTab.position.set(-0.52, 0.3, 0);

    sneakerGroup.add(sole, upper, tongue, heelTab);

    const basePositions = {
      sole: new THREE.Vector3(0, 0, 0),
      upper: new THREE.Vector3(0, 0.25, 0),
      tongue: new THREE.Vector3(0.35, 0.42, 0),
      heel: new THREE.Vector3(-0.52, 0.3, 0)
    };

    const explodedPositions = {
      sole: new THREE.Vector3(0, -0.3, 0),
      upper: new THREE.Vector3(0, 0.25, 0),
      tongue: new THREE.Vector3(0.35, 0.72, 0.3),
      heel: new THREE.Vector3(-0.82, 0.5, 0)
    };

    let exploded = false;
    let explodeProgress = 0;
    let explodeStart = 0;
    let explodeTarget = 0;
    let explodeAnimating = false;
    const explodeFrames = 30;
    const explodeStep = 1 / explodeFrames;

    let autoRotate = true;
    let currentPreset = 'custom';

    const loader = new GLTFLoader();
    let mascot = null;
    let mascotVisible = true;
    const mascotBasePosition = new THREE.Vector3(0, 2.0, 0);

    loader.load(
      '._BarramundiFish.glb',
      (gltf) => {
        mascot = gltf.scene;

        const box = new THREE.Box3().setFromObject(mascot);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 0.4;
        const scale = targetSize / maxDim;
        mascot.scale.setScalar(scale);

        mascot.position.copy(mascotBasePosition);
        mascot.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });

        scene.add(mascot);
      },
      undefined,
      (err) => {
        console.warn('Failed to load mascot GLB:', err);
      }
    );

    const soleInput = document.getElementById('sole-color');
    const upperInput = document.getElementById('upper-color');
    const tongueInput = document.getElementById('tongue-color');
    const heelInput = document.getElementById('heel-color');

    const toggleMascotBtn = document.getElementById('toggle-mascot');
    const explodeBtn = document.getElementById('explode-btn');

    function setMaterialColor(material, value) {
      material.color.set(value);
    }

    function syncInputsToMaterials() {
      setMaterialColor(soleMaterial, soleInput.value);
      setMaterialColor(upperMaterial, upperInput.value);
      setMaterialColor(tongueMaterial, tongueInput.value);
      setMaterialColor(heelMaterial, heelInput.value);
    }

    function markCustom() {
      currentPreset = 'custom';
    }

    soleInput.addEventListener('input', () => {
      setMaterialColor(soleMaterial, soleInput.value);
      markCustom();
    });

    upperInput.addEventListener('input', () => {
      setMaterialColor(upperMaterial, upperInput.value);
      markCustom();
    });

    tongueInput.addEventListener('input', () => {
      setMaterialColor(tongueMaterial, tongueInput.value);
      markCustom();
    });

    heelInput.addEventListener('input', () => {
      setMaterialColor(heelMaterial, heelInput.value);
      markCustom();
    });

    const presets = {
      classic: {
        sole: '#222222',
        upper: '#ffffff',
        tongue: '#cc0000',
        heel: '#000080'
      },
      neon: {
        sole: '#00ff00',
        upper: '#ff00ff',
        tongue: '#00ffff',
        heel: '#ffff00'
      },
      earth: {
        sole: '#4a3728',
        upper: '#8b7355',
        tongue: '#6b8e23',
        heel: '#a0522d'
      }
    };

    function applyPreset(name) {
      const p = presets[name];
      soleInput.value = p.sole;
      upperInput.value = p.upper;
      tongueInput.value = p.tongue;
      heelInput.value = p.heel;
      syncInputsToMaterials();
      currentPreset = name;
    }

    document.getElementById('preset-classic').addEventListener('click', () => applyPreset('classic'));
    document.getElementById('preset-neon').addEventListener('click', () => applyPreset('neon'));
    document.getElementById('preset-earth').addEventListener('click', () => applyPreset('earth'));

    function updateMascotButtonLabel() {
      toggleMascotBtn.textContent = mascotVisible ? 'Hide Mascot' : 'Show Mascot';
    }

    toggleMascotBtn.addEventListener('click', () => {
      mascotVisible = !mascotVisible;
      if (mascot) mascot.visible = mascotVisible;
      updateMascotButtonLabel();
    });

    explodeBtn.addEventListener('click', () => {
      exploded = !exploded;
      explodeStart = explodeProgress;
      explodeTarget = exploded ? 1 : 0;
      explodeAnimating = true;
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        autoRotate = !autoRotate;
      }
      if (e.key === 'r' || e.key === 'R') {
        sneakerGroup.rotation.y = 0;
      }
    });

    function updateExplodePositions() {
      sole.position.lerpVectors(basePositions.sole, explodedPositions.sole, explodeProgress);
      upper.position.lerpVectors(basePositions.upper, explodedPositions.upper, explodeProgress);
      tongue.position.lerpVectors(basePositions.tongue, explodedPositions.tongue, explodeProgress);
      heelTab.position.lerpVectors(basePositions.heel, explodedPositions.heel, explodeProgress);
    }

    window.__3D_STATE__ = {
      soleColor: soleInput.value,
      upperColor: upperInput.value,
      tongueColor: tongueInput.value,
      heelColor: heelInput.value,
      currentPreset,
      autoRotate,
      rotationY: sneakerGroup.rotation.y,
      mascotVisible,
      mascotY: mascotBasePosition.y,
      exploded,
      partsCount: 4,
      platformRadius,
      cameraDistance: camera.position.length()
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      if (autoRotate) {
        sneakerGroup.rotation.y += 0.005;
      }

      if (explodeAnimating) {
        if (explodeTarget > explodeStart) {
          explodeProgress = Math.min(explodeProgress + explodeStep, explodeTarget);
        } else {
          explodeProgress = Math.max(explodeProgress - explodeStep, explodeTarget);
        }

        if (explodeProgress === explodeTarget) {
          explodeAnimating = false;
        }
      }

      updateExplodePositions();

      if (mascot) {
        const bob = Math.sin((elapsed * Math.PI * 2) / 2.0) * 0.15;
        mascot.position.set(
          mascotBasePosition.x,
          mascotBasePosition.y + bob,
          mascotBasePosition.z
        );
        mascot.visible = mascotVisible;
        mascot.rotation.y += 0.01;
      }

      controls.update();

      window.__3D_STATE__.soleColor = soleMaterial.color.getHexString().padStart(6, '0');
      window.__3D_STATE__.soleColor = '#' + window.__3D_STATE__.soleColor;
      window.__3D_STATE__.upperColor = '#' + upperMaterial.color.getHexString().padStart(6, '0');
      window.__3D_STATE__.tongueColor = '#' + tongueMaterial.color.getHexString().padStart(6, '0');
      window.__3D_STATE__.heelColor = '#' + heelMaterial.color.getHexString().padStart(6, '0');
      window.__3D_STATE__.currentPreset = currentPreset;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.rotationY = sneakerGroup.rotation.y;
      window.__3D_STATE__.mascotVisible = mascotVisible;
      window.__3D_STATE__.mascotY = mascot ? mascot.position.y : mascotBasePosition.y;
      window.__3D_STATE__.exploded = exploded;
      window.__3D_STATE__.partsCount = 4;
      window.__3D_STATE__.platformRadius = platformRadius;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

      renderer.render(scene, camera);
    }

    updateExplodePositions();
    updateMascotButtonLabel();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
