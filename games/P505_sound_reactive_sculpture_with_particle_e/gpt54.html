<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sound-Reactive Sculpture</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: fixed;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      letter-spacing: 0.5px;
      z-index: 10;
      user-select: none;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    #hud-status {
      top: 16px;
      left: 16px;
    }

    #color-mode-display {
      top: 16px;
      right: 16px;
      text-transform: uppercase;
    }

    #beat-counter {
      bottom: 16px;
      left: 16px;
    }

    #intensity-display {
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <div id="hud-status" class="hud">PLAYING</div>
  <div id="color-mode-display" class="hud">SPECTRUM</div>
  <div id="beat-counter" class="hud">Beats: 0</div>
  <div id="intensity-display" class="hud">Intensity: 1.0</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    // -----------------------------
    // Global State
    // -----------------------------
    window.__3D_STATE__ = {
      isPlaying: true,
      colorMode: "spectrum",
      beatCount: 0,
      intensity: 1.0,
      burstActive: false,
      particleCount: 2000,
      avgParticleDistance: 0,
      modelRotationY: 0,
      modelScaleY: 1,
      frequencies: new Array(8).fill(0),
      modelLoaded: false,
      frameCount: 0
    };

    // -----------------------------
    // Scene Setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a1a");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 6);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight("#4444ff", 0.3);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight("#ff44ff", 1.5);
    pointLight.position.set(3, 5, 3);
    scene.add(pointLight);

    // -----------------------------
    // HUD
    // -----------------------------
    const hudStatus = document.getElementById("hud-status");
    const colorModeDisplay = document.getElementById("color-mode-display");
    const beatCounter = document.getElementById("beat-counter");
    const intensityDisplay = document.getElementById("intensity-display");

    function updateHUD() {
      hudStatus.textContent = window.__3D_STATE__.isPlaying ? "PLAYING" : "PAUSED";
      colorModeDisplay.textContent = window.__3D_STATE__.colorMode.toUpperCase();
      beatCounter.textContent = `Beats: ${window.__3D_STATE__.beatCount}`;
      intensityDisplay.textContent = `Intensity: ${window.__3D_STATE__.intensity.toFixed(1)}`;
    }

    // -----------------------------
    // Model Loading
    // -----------------------------
    let xbotRoot = null;
    const loader = new GLTFLoader();

    loader.load(
      "Xbot.glb",
      (gltf) => {
        xbotRoot = gltf.scene;

        const glossyMaterial = new THREE.MeshStandardMaterial({
          color: new THREE.Color("#8844ff"),
          metalness: 0.9,
          roughness: 0.1
        });

        xbotRoot.traverse((child) => {
          if (child.isMesh) {
            child.material = glossyMaterial;
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(xbotRoot);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        xbotRoot.position.sub(center);

        const height = size.y || 1;
        const targetHeight = 3;
        const scale = targetHeight / height;
        xbotRoot.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(xbotRoot);
        const center2 = new THREE.Vector3();
        box2.getCenter(center2);
        xbotRoot.position.x -= center2.x;
        xbotRoot.position.z -= center2.z;

        scene.add(xbotRoot);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load Xbot.glb:", err);
      }
    );

    // -----------------------------
    // Particle System
    // -----------------------------
    const PARTICLE_COUNT = 2000;
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.05,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const particleSeeds = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particleSeeds.push({
        theta: Math.random() * Math.PI * 2,
        phi: Math.random() * Math.PI * 2,
        speed: 0.3 + Math.random() * 1.2,
        tubeOffset: (Math.random() - 0.5) * 0.7,
        verticalJitter: (Math.random() - 0.5) * 0.25
      });
    }

    function frequencyToSpectrumColor(freq) {
      const hue = (1 - freq) * 0.66;
      const color = new THREE.Color();
      color.setHSL(hue, 1.0, 0.55);
      return color;
    }

    function updateParticles(time) {
      const state = window.__3D_STATE__;
      const pos = particleGeometry.attributes.position.array;
      const col = particleGeometry.attributes.color.array;

      let totalDistance = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const seed = particleSeeds[i];
        const bandIndex = i % 8;
        const freq = state.frequencies[bandIndex] || 0;

        const orbitAngle = seed.theta + time * 0.25 * seed.speed;
        const ringAngle = seed.phi + time * 0.5 * seed.speed;

        const majorRadius = 2.5 + freq * 1.5 * state.intensity;
        const minorRadius = 0.55 + 0.15 * Math.sin(time + i * 0.01) + seed.tubeOffset;

        const x =
          (majorRadius + minorRadius * Math.cos(ringAngle)) * Math.cos(orbitAngle);
        const z =
          (majorRadius + minorRadius * Math.cos(ringAngle)) * Math.sin(orbitAngle);
        const y =
          minorRadius * Math.sin(ringAngle) +
          seed.verticalJitter +
          0.2 * Math.sin(time * 0.8 + i * 0.02);

        pos[i * 3 + 0] = x;
        pos[i * 3 + 1] = y + 1.0;
        pos[i * 3 + 2] = z;

        const dist = Math.sqrt(x * x + (y + 1.0) * (y + 1.0) + z * z);
        totalDistance += dist;

        let color;
        if (state.colorMode === "monochrome") {
          color = new THREE.Color("#ffffff");
        } else if (state.colorMode === "neon") {
          const hue = (time * 0.15 + i / PARTICLE_COUNT) % 1;
          color = new THREE.Color().setHSL(hue, 1.0, 0.6);
        } else {
          color = frequencyToSpectrumColor(freq);
        }

        col[i * 3 + 0] = color.r;
        col[i * 3 + 1] = color.g;
        col[i * 3 + 2] = color.b;
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.color.needsUpdate = true;

      state.avgParticleDistance = totalDistance / PARTICLE_COUNT;
    }

    // -----------------------------
    // Audio Simulation
    // -----------------------------
    let frozenFrequencies = new Array(8).fill(0);
    let lastBeatFrame = -999;
    let burstFramesRemaining = 0;

    function updateFrequencies(time) {
      const state = window.__3D_STATE__;

      if (state.isPlaying) {
        for (let i = 0; i < 8; i++) {
          state.frequencies[i] = 0.5 + 0.5 * Math.sin(time * (1.0 + i * 0.3));
        }

        if (burstFramesRemaining > 0) {
          state.burstActive = true;
          for (let i = 0; i < 8; i++) {
            state.frequencies[i] = Math.min(1.0, state.frequencies[i] * 2.0);
          }
          burstFramesRemaining--;
        } else {
          state.burstActive = false;
        }

        frozenFrequencies = [...state.frequencies];
      } else {
        state.frequencies = [...frozenFrequencies];
      }

      const avg =
        state.frequencies.reduce((sum, v) => sum + v, 0) / state.frequencies.length;

      if (state.isPlaying && avg > 0.75 && state.frameCount - lastBeatFrame > 15) {
        state.beatCount++;
        lastBeatFrame = state.frameCount;
      }
    }

    // -----------------------------
    // Controls
    // -----------------------------
    const colorModes = ["spectrum", "monochrome", "neon"];

    function resetScene() {
      const state = window.__3D_STATE__;
      state.isPlaying = true;
      state.colorMode = "spectrum";
      state.beatCount = 0;
      state.burstActive = false;
      burstFramesRemaining = 0;
      if (xbotRoot) {
        xbotRoot.rotation.y = 0;
        xbotRoot.scale.y = xbotRoot.scale.x;
      }
      state.modelRotationY = 0;
      state.modelScaleY = 1;
    }

    window.addEventListener("keydown", (e) => {
      const state = window.__3D_STATE__;

      if (e.code === "Space") {
        e.preventDefault();
        state.isPlaying = !state.isPlaying;
        if (!state.isPlaying) {
          frozenFrequencies = [...state.frequencies];
        }
      }

      if (e.code === "KeyC") {
        const currentIndex = colorModes.indexOf(state.colorMode);
        state.colorMode = colorModes[(currentIndex + 1) % colorModes.length];
      }

      if (e.code === "KeyR") {
        resetScene();
      }

      if (e.code === "KeyB") {
        state.burstActive = true;
        burstFramesRemaining = 30;
      }

      if (e.code === "ArrowUp") {
        state.intensity = Math.min(2.0, +(state.intensity + 0.1).toFixed(1));
      }

      if (e.code === "ArrowDown") {
        state.intensity = Math.max(0.1, +(state.intensity - 0.1).toFixed(1));
      }

      updateHUD();
    });

    // -----------------------------
    // Resize
    // -----------------------------
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -----------------------------
    // Animation
    // -----------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const state = window.__3D_STATE__;
      state.frameCount++;

      updateFrequencies(elapsed);
      updateParticles(elapsed);

      if (xbotRoot) {
        const bassAvg = (state.frequencies[0] + state.frequencies[1]) * 0.5;
        const baseUniformScale = xbotRoot.scale.x;
        const scaleYFactor = 1.0 + bassAvg * 0.3;

        if (state.isPlaying) {
          xbotRoot.rotation.y += 0.005;
        }

        xbotRoot.scale.y = baseUniformScale * scaleYFactor;

        state.modelRotationY = xbotRoot.rotation.y;
        state.modelScaleY = scaleYFactor;
      } else {
        state.modelRotationY = 0;
        state.modelScaleY = 1;
      }

      state.particleCount = PARTICLE_COUNT;

      updateHUD();
      controls.update();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();
  </script>
</body>
</html>
