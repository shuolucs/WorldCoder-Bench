<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound-Reactive Sculpture</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; }
canvas { display: block; }

.hud {
    position: fixed;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 16px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 6px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 100;
    pointer-events: none;
    user-select: none;
}

#hud-status {
    position: fixed;
    top: 20px;
    left: 20px;
}

#color-mode-display {
    position: fixed;
    top: 20px;
    right: 20px;
}

#beat-counter {
    position: fixed;
    bottom: 20px;
    left: 20px;
}

#intensity-display {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
}

#frequency-bars {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 60px;
    padding: 8px 12px;
}

.freq-bar {
    width: 16px;
    background: linear-gradient(to top, #0044ff, #ff4400);
    border-radius: 2px;
    transition: height 0.05s ease;
    min-height: 2px;
}

#controls-hint {
    position: fixed;
    top: 60px;
    left: 20px;
    font-size: 11px;
    opacity: 0.6;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud-status" class="hud">▶ PLAYING</div>
<div id="color-mode-display" class="hud">Mode: spectrum</div>
<div id="beat-counter" class="hud">Beats: 0</div>
<div id="intensity-display" class="hud">Intensity: 1.0</div>

<div id="frequency-bars" class="hud">
    <div class="freq-bar" id="bar-0"></div>
    <div class="freq-bar" id="bar-1"></div>
    <div class="freq-bar" id="bar-2"></div>
    <div class="freq-bar" id="bar-3"></div>
    <div class="freq-bar" id="bar-4"></div>
    <div class="freq-bar" id="bar-5"></div>
    <div class="freq-bar" id="bar-6"></div>
    <div class="freq-bar" id="bar-7"></div>
</div>

<div id="controls-hint" class="hud">
    SPACE: Play/Pause<br>
    C: Color Mode<br>
    R: Reset<br>
    B: Burst<br>
    ↑↓: Intensity
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Initialize state
window.__3D_STATE__ = {
    isPlaying: true,
    colorMode: 'spectrum',
    beatCount: 0,
    intensity: 1.0,
    burstActive: false,
    particleCount: 2000,
    avgParticleDistance: 0,
    modelRotationY: 0,
    modelScaleY: 1.0,
    frequencies: [0, 0, 0, 0, 0, 0, 0, 0],
    modelLoaded: false,
    frameCount: 0
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.08);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x4444ff, 0.3);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff44ff, 1.5, 20);
pointLight.position.set(3, 5, 3);
scene.add(pointLight);

const pointLight2 = new THREE.PointLight(0x4444ff, 0.8, 15);
pointLight2.position.set(-3, 3, -3);
scene.add(pointLight2);

// Ground reflection plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a1a,
    metalness: 0.9,
    roughness: 0.3,
    transparent: true,
    opacity: 0.5
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
scene.add(ground);

// Model
let xbotModel = null;
const modelMaterial = new THREE.MeshStandardMaterial({
    color: 0x8844ff,
    metalness: 0.9,
    roughness: 0.1,
    emissive: 0x220044,
    emissiveIntensity: 0.2
});

const loader = new GLTFLoader();
loader.load(
    'Xbot.glb',
    (gltf) => {
        xbotModel = gltf.scene;
        
        // Calculate bounding box to scale properly
        const box = new THREE.Box3().setFromObject(xbotModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const center = new THREE.Vector3();
        box.getCenter(center);
        
        const targetHeight = 3;
        const scaleFactor = targetHeight / size.y;
        xbotModel.scale.setScalar(scaleFactor);
        
        // Recalculate after scaling
        box.setFromObject(xbotModel);
        box.getCenter(center);
        xbotModel.position.y = -box.min.y;
        xbotModel.position.x = -center.x;
        xbotModel.position.z = -center.z;
        
        // Apply material to all meshes
        xbotModel.traverse((child) => {
            if (child.isMesh) {
                child.material = modelMaterial.clone();
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        
        scene.add(xbotModel);
        state.modelLoaded = true;
        console.log('Xbot model loaded successfully');
    },
    (progress) => {
        console.log('Loading model...', Math.round((progress.loaded / progress.total) * 100) + '%');
    },
    (error) => {
        console.warn('Could not load Xbot.glb, creating placeholder:', error);
        createPlaceholderModel();
    }
);

function createPlaceholderModel() {
    xbotModel = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.3, 1.0, 8, 16);
    const body = new THREE.Mesh(bodyGeo, modelMaterial.clone());
    body.position.y = 1.5;
    xbotModel.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const head = new THREE.Mesh(headGeo, modelMaterial.clone());
    head.position.y = 2.35;
    xbotModel.add(head);
    
    // Arms
    const armGeo = new THREE.CapsuleGeometry(0.1, 0.7, 4, 8);
    const leftArm = new THREE.Mesh(armGeo, modelMaterial.clone());
    leftArm.position.set(-0.5, 1.6, 0);
    leftArm.rotation.z = 0.3;
    xbotModel.add(leftArm);
    
    const rightArm = new THREE.Mesh(armGeo, modelMaterial.clone());
    rightArm.position.set(0.5, 1.6, 0);
    rightArm.rotation.z = -0.3;
    xbotModel.add(rightArm);
    
    // Legs
    const legGeo = new THREE.CapsuleGeometry(0.12, 0.8, 4, 8);
    const leftLeg = new THREE.Mesh(legGeo, modelMaterial.clone());
    leftLeg.position.set(-0.2, 0.5, 0);
    xbotModel.add(leftLeg);
    
    const rightLeg = new THREE.Mesh(legGeo, modelMaterial.clone());
    rightLeg.position.set(0.2, 0.5, 0);
    xbotModel.add(rightLeg);
    
    scene.add(xbotModel);
    state.modelLoaded = true;
}

// Particle System
const PARTICLE_COUNT = 2000;
const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const sizes = new Float32Array(PARTICLE_COUNT);
const particleAngles = new Float32Array(PARTICLE_COUNT);
const particleTubeAngles = new Float32Array(PARTICLE_COUNT);
const particlePhases = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
    particleAngles[i] = Math.random() * Math.PI * 2;
    particleTubeAngles[i] = Math.random() * Math.PI * 2;
    particlePhases[i] = Math.random() * Math.PI * 2;
    
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
    
    colors[i * 3] = 1;
    colors[i * 3 + 1] = 1;
    colors[i * 3 + 2] = 1;
    
    sizes[i] = 2 + Math.random() * 3;
}

particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

// Create circular particle texture
const canvas = document.createElement('canvas');
canvas.width = 64;
canvas.height = 64;
const ctx = canvas.getContext('2d');
const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
gradient.addColorStop(0, 'rgba(255,255,255,1)');
gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
gradient.addColorStop(0.7, 'rgba(255,255,255,0.2)');
gradient.addColorStop(1, 'rgba(255,255,255,0)');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 64, 64);
const particleTexture = new THREE.CanvasTexture(canvas);

const particleMaterial = new THREE.PointsMaterial({
    size: 0.06,
    vertexColors: true,
    transparent: true,
    opacity: 0.85,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    map: particleTexture,
    sizeAttenuation: true
});

const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Burst state
let burstFramesRemaining = 0;

// Color modes
const colorModes = ['spectrum', 'monochrome', 'neon'];
let colorModeIndex = 0;

// Frozen time for pause
let simulationTime = 0;

// HUD elements
const hudStatus = document.getElementById('hud-status');
const colorModeDisplay = document.getElementById('color-mode-display');
const beatCounter = document.getElementById('beat-counter');
const intensityDisplay = document.getElementById('intensity-display');

function updateHUD() {
    hudStatus.textContent = state.isPlaying ? '▶ PLAYING' : '⏸ PAUSED';
    hudStatus.style.borderColor = state.isPlaying ? 'rgba(0, 255, 100, 0.3)' : 'rgba(255, 100, 0, 0.3)';
    colorModeDisplay.textContent = `Mode: ${state.colorMode}`;
    beatCounter.textContent = `Beats: ${state.beatCount}`;
    intensityDisplay.textContent = `Intensity: ${state.intensity.toFixed(1)}`;
    
    // Update frequency bars
    for (let i = 0; i < 8; i++) {
        const bar = document.getElementById(`bar-${i}`);
        if (bar) {
            const height = Math.max(2, state.frequencies[i] * 50);
            bar.style.height = `${height}px`;
            
            const hue = (i / 7) * 240;
            bar.style.background = `hsl(${240 - hue}, 100%, 60%)`;
        }
    }
}

// Keyboard controls
document.addEventListener('keydown', (e) => {
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            state.isPlaying = !state.isPlaying;
            break;
        case 'KeyC':
            colorModeIndex = (colorModeIndex + 1) % colorModes.length;
            state.colorMode = colorModes[colorModeIndex];
            break;
        case 'KeyR':
            state.modelRotationY = 0;
            state.beatCount = 0;
            state.colorMode = 'spectrum';
            colorModeIndex = 0;
            state.isPlaying = true;
            state.intensity = 1.0;
            state.burstActive = false;
            burstFramesRemaining = 0;
            simulationTime = 0;
            if (xbotModel) {
                xbotModel.rotation.y = 0;
            }
            break;
        case 'KeyB':
            state.burstActive = true;
            burstFramesRemaining = 30;
            break;
        case 'ArrowUp':
            e.preventDefault();
            state.intensity = Math.min(2.0, state.intensity + 0.1);
            break;
        case 'ArrowDown':
            e.preventDefault();
            state.intensity = Math.max(0.1, state.intensity - 0.1);
            break;
    }
    updateHUD();
});

// Previous beat state for edge detection
let prevBeatState = false;

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    
    if (state.isPlaying) {
        simulationTime += delta;
    }
    
    state.frameCount++;
    
    // Simulate audio frequencies
    if (state.isPlaying) {
        for (let i = 0; i < 8; i++) {
            state.frequencies[i] = 0.5 + 0.5 * Math.sin(simulationTime * (1.0 + i * 0.3));
        }
    }
    
    // Apply burst effect
    let effectiveFrequencies = [...state.frequencies];
    if (burstFramesRemaining > 0) {
        burstFramesRemaining--;
        for (let i = 0; i < 8; i++) {
            effectiveFrequencies[i] = Math.min(1.0, state.frequencies[i] * 2.0);
        }
        if (burstFramesRemaining <= 0) {
            state.burstActive = false;
        }
    } else {
        state.burstActive = false;
    }
    
    // Beat detection
    const avgFreq = effectiveFrequencies.reduce((a, b) => a + b, 0) / 8;
    const beatDetected = avgFreq > 0.75;
    if (beatDetected && !prevBeatState) {
        state.beatCount++;
    }
    prevBeatState = beatDetected;
    
    // Update model
    if (xbotModel) {
        // Rotation
        if (state.isPlaying) {
            state.modelRotationY += 0.005;
        }
        xbotModel.rotation.y = state.modelRotationY;
        
        // Scale based on bass
        const bassAvg = (effectiveFrequencies[0] + effectiveFrequencies[1]) / 2;
        state.modelScaleY = 1.0 + bassAvg * 0.3;
        xbotModel.scale.y = xbotModel.scale.x * state.modelScaleY;
        
        // Emissive pulse on beat
        const emissiveIntensity = beatDetected ? 0.6 : 0.2;
        xbotModel.traverse((child) => {
            if (child.isMesh && child.material) {
                child.material.emissiveIntensity = emissiveIntensity;
            }
        });
    }
    
    // Update particles
    const posAttr = particleGeometry.getAttribute('position');
    const colAttr = particleGeometry.getAttribute('color');
    let totalDistance = 0;
    
    const baseRadius = 2.5;
    const tubeRadius = 0.6;
    const intensityMult = state.intensity;
    
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const band = i % 8;
        const freq = effectiveFrequencies[band] * intensityMult;
        
        // Toroidal motion
        const angle = particleAngles[i] + simulationTime * (0.3 + band * 0.05);
        const tubeAngle = particleTubeAngles[i] + simulationTime * (0.5 + band * 0.1);
        const phase = particlePhases[i];
        
        // Frequency modulation on radius
        const freqMod = freq * 1.5;
        const r = baseRadius + freqMod + tubeRadius * Math.cos(tubeAngle + phase);
        const y = tubeRadius * Math.sin(tubeAngle + phase) + 1.5;
        
        // Add some vertical spread based on frequency
        const verticalSpread = Math.sin(angle * 3 + simulationTime) * freq * 0.5;
        
        const px = r * Math.cos(angle);
        const py = y + verticalSpread;
        const pz = r * Math.sin(angle);
        
        posAttr.setXYZ(i, px, py, pz);
        
        const dist = Math.sqrt(px * px + py * py + pz * pz);
        totalDistance += dist;
        
        // Color based on mode
        let cr, cg, cb;
        
        if (state.colorMode === 'spectrum') {
            // Blue (low freq) to Red (high freq)
            const t = band / 7;
            const hue = (1 - t) * 240; // 240 = blue, 0 = red
            const color = new THREE.Color();
            color.setHSL(hue / 360, 1.0, 0.4 + freq * 0.3);
            cr = color.r;
            cg = color.g;
            cb = color.b;
        } else if (state.colorMode === 'monochrome') {
            const brightness = 0.5 + freq * 0.5;
            cr = brightness;
            cg = brightness;
            cb = brightness;
        } else if (state.colorMode === 'neon') {
            const hue = (simulationTime * 0.2 + i / PARTICLE_COUNT) % 1.0;
            const color = new THREE.Color();
            color.setHSL(hue, 1.0, 0.4 + freq * 0.3);
            cr = color.r;
            cg = color.g;
            cb = color.b;
        }
        
        colAttr.setXYZ(i, cr, cg, cb);
    }
    
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;
    
    state.avgParticleDistance = totalDistance / PARTICLE_COUNT;
    
    // Animate point light
    pointLight.intensity = 1.5 + avgFreq * 2.0;
    pointLight.position.x = Math.sin(elapsed * 0.5) * 3;
    pointLight.position.z = Math.cos(elapsed * 0.5) * 3;
    
    pointLight2.intensity = 0.8 + effectiveFrequencies[4] * 1.5;
    
    // Particle size pulse on beat
    particleMaterial.size = beatDetected ? 0.09 : 0.06;
    
    controls.update();
    renderer.render(scene, camera);
    
    // Update HUD periodically
    if (state.frameCount % 3 === 0) {
        updateHUD();
    }
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
updateHUD();
animate();
</script>
</body>
</html>
