<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapier 3D Physics - Stack & Shoot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: fixed; top: 16px; left: 16px; z-index: 10;
    background: rgba(0,0,0,0.7); color: #fff; padding: 16px 20px;
    border-radius: 10px; font-size: 14px; line-height: 1.8;
    backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
    min-width: 200px;
  }
  #hud span { color: #4fc3f7; font-weight: bold; }
  #resetBtn {
    margin-top: 10px; padding: 8px 20px; cursor: pointer;
    background: linear-gradient(135deg, #e53935, #ff7043);
    color: #fff; border: none; border-radius: 6px; font-size: 14px;
    font-weight: bold; transition: all 0.2s;
  }
  #resetBtn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(229,57,53,0.4); }
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    pointer-events: none; z-index: 5; font-size: 24px; color: rgba(255,255,255,0.5);
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="hud">
  <div>📦 Boxes: <span id="boxCount">10</span></div>
  <div>💥 Fallen: <span id="fallenCount">0</span></div>
  <div>🎱 Spheres: <span id="sphereCount">0</span></div>
  <div>⚡ FPS: <span id="fps">0</span></div>
  <button id="resetBtn">🔄 Reset</button>
</div>
<div id="crosshair">+</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Load Rapier
const RAPIER_MODULE = await import('https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/rapier.js');
const RAPIER = RAPIER_MODULE.default || RAPIER_MODULE;
await RAPIER.init();

// ---- Three.js Setup ----
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(8, 8, 14);
camera.lookAt(0, 5, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// ---- Lights ----
const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x4fc3f7, 0.8, 30);
pointLight.position.set(-5, 12, 5);
scene.add(pointLight);

// ---- Ground Visual ----
const groundGeo = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x2c3e50,
  roughness: 0.8,
  metalness: 0.2
});
const groundMesh = new THREE.Mesh(groundGeo, groundMat);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);

// Grid helper
const grid = new THREE.GridHelper(100, 100, 0x3a506b, 0x2c3e50);
grid.position.y = 0.01;
scene.add(grid);

// ---- Rapier World ----
const gravity = { x: 0.0, y: -9.81, z: 0.0 };
let world = new RAPIER.World(gravity);

// Ground rigid body
const groundBodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(0, 0, 0);
const groundBody = world.createRigidBody(groundBodyDesc);
const groundColliderDesc = RAPIER.ColliderDesc.cuboid(50, 0.1, 50).setRestitution(0.3).setFriction(0.8);
world.createCollider(groundColliderDesc, groundBody);

// ---- Box colors ----
const boxColors = [
  0xe53935, 0xff9800, 0xfdd835, 0x43a047, 0x1e88e5,
  0x8e24aa, 0xf06292, 0x00acc1, 0xff7043, 0x7cb342
];

// ---- State tracking ----
let boxes = [];       // { mesh, body, initialX, initialZ }
let spheres = [];     // { mesh, body }
const BOX_SIZE = 1;
const SPHERE_RADIUS = 0.3;
const FALLEN_Y_THRESHOLD = -2;
const FALLEN_OFFSET_THRESHOLD = 3.0;
const FALLEN_ROTATION_THRESHOLD = 0.5; // radians from upright

// ---- Create boxes ----
function createBoxes() {
  const boxGeo = new THREE.BoxGeometry(BOX_SIZE, BOX_SIZE, BOX_SIZE);

  for (let i = 0; i < 10; i++) {
    const color = boxColors[i % boxColors.length];
    const mat = new THREE.MeshStandardMaterial({
      color: color,
      roughness: 0.4,
      metalness: 0.3
    });
    const mesh = new THREE.Mesh(boxGeo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    const y = 0.5 + i * 1.0;
    const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
      .setTranslation(0, y, 0)
      .setLinearDamping(0.1)
      .setAngularDamping(0.1);
    const body = world.createRigidBody(bodyDesc);

    const colliderDesc = RAPIER.ColliderDesc.cuboid(BOX_SIZE / 2, BOX_SIZE / 2, BOX_SIZE / 2)
      .setMass(1.0)
      .setRestitution(0.2)
      .setFriction(0.7);
    world.createCollider(colliderDesc, body);

    boxes.push({ mesh, body, initialX: 0, initialZ: 0 });
  }
}

function clearBoxes() {
  for (const box of boxes) {
    scene.remove(box.mesh);
    box.mesh.geometry.dispose();
    if (box.mesh.material.dispose) box.mesh.material.dispose();
    world.removeRigidBody(box.body);
  }
  boxes = [];
}

function clearSpheres() {
  for (const sphere of spheres) {
    scene.remove(sphere.mesh);
    sphere.mesh.geometry.dispose();
    if (sphere.mesh.material.dispose) sphere.mesh.material.dispose();
    world.removeRigidBody(sphere.body);
  }
  spheres = [];
}

function resetScene() {
  clearBoxes();
  clearSpheres();
  createBoxes();
}

createBoxes();

// ---- Shooting ----
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const sphereGeo = new THREE.SphereGeometry(SPHERE_RADIUS, 16, 16);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0x4fc3f7,
  roughness: 0.2,
  metalness: 0.8,
  emissive: 0x1565c0,
  emissiveIntensity: 0.3
});

function shootSphere(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const direction = raycaster.ray.direction.clone().normalize();
  const origin = camera.position.clone();

  const mesh = new THREE.Mesh(sphereGeo, sphereMat.clone());
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);

  const bodyDesc = RAPIER.RigidBodyDesc.dynamic()
    .setTranslation(origin.x, origin.y, origin.z)
    .setLinvel(direction.x * 20, direction.y * 20, direction.z * 20)
    .setLinearDamping(0.05)
    .setCcdEnabled(true);
  const body = world.createRigidBody(bodyDesc);

  const colliderDesc = RAPIER.ColliderDesc.ball(SPHERE_RADIUS)
    .setMass(5.0)
    .setRestitution(0.5)
    .setFriction(0.5);
  world.createCollider(colliderDesc, body);

  spheres.push({ mesh, body });

  // Remove old spheres if too many
  if (spheres.length > 50) {
    const old = spheres.shift();
    scene.remove(old.mesh);
    old.mesh.geometry.dispose();
    old.mesh.material.dispose();
    world.removeRigidBody(old.body);
  }
}

renderer.domElement.addEventListener('click', (e) => {
  shootSphere(e);
});

// ---- Reset button ----
document.getElementById('resetBtn').addEventListener('click', () => {
  resetScene();
});

// ---- HUD elements ----
const boxCountEl = document.getElementById('boxCount');
const fallenCountEl = document.getElementById('fallenCount');
const sphereCountEl = document.getElementById('sphereCount');
const fpsEl = document.getElementById('fps');

// ---- State ----
window.__3D_STATE__ = {
  boxCount: 10,
  fallenCount: 0,
  boxes: [],
  sphereCount: 0,
  fps: 0
};

// ---- FPS tracking ----
let frameCount = 0;
let lastFpsTime = performance.now();
let currentFps = 0;

// ---- Fallen detection ----
function countFallen() {
  let fallen = 0;
  for (const box of boxes) {
    const pos = box.body.translation();
    const rot = box.body.rotation();

    // Check if below ground
    if (pos.y < FALLEN_Y_THRESHOLD) {
      fallen++;
      continue;
    }

    // Check horizontal offset from original stack position
    const dx = pos.x - box.initialX;
    const dz = pos.z - box.initialZ;
    const horizontalDist = Math.sqrt(dx * dx + dz * dz);
    if (horizontalDist > FALLEN_OFFSET_THRESHOLD) {
      fallen++;
      continue;
    }

    // Check rotation - if box is significantly tilted
    // Convert quaternion to check how far from upright
    // The up vector (0,1,0) transformed by the quaternion
    const qx = rot.x, qy = rot.y, qz = rot.z, qw = rot.w;
    // Transform (0,1,0) by quaternion
    const upX = 2 * (qx * qy - qw * qz);
    const upY = 1 - 2 * (qx * qx + qz * qz);
    const upZ = 2 * (qy * qz + qw * qx);
    // Dot product with world up (0,1,0)
    const dotUp = upY;
    // If dot product is less than cos(threshold), it's tilted
    if (dotUp < Math.cos(FALLEN_ROTATION_THRESHOLD)) {
      fallen++;
      continue;
    }
  }
  return fallen;
}

// ---- Remove spheres that fall too far ----
function cleanupSpheres() {
  for (let i = spheres.length - 1; i >= 0; i--) {
    const pos = spheres[i].body.translation();
    if (pos.y < -20) {
      scene.remove(spheres[i].mesh);
      spheres[i].mesh.geometry.dispose();
      spheres[i].mesh.material.dispose();
      world.removeRigidBody(spheres[i].body);
      spheres.splice(i, 1);
    }
  }
}

// ---- Animation loop ----
function animate() {
  requestAnimationFrame(animate);

  // Step physics
  world.step();

  // Sync boxes
  for (const box of boxes) {
    const pos = box.body.translation();
    const rot = box.body.rotation();
    box.mesh.position.set(pos.x, pos.y, pos.z);
    box.mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);
  }

  // Sync spheres
  for (const sphere of spheres) {
    const pos = sphere.body.translation();
    const rot = sphere.body.rotation();
    sphere.mesh.position.set(pos.x, pos.y, pos.z);
    sphere.mesh.quaternion.set(rot.x, rot.y, rot.z, rot.w);
  }

  // Cleanup
  cleanupSpheres();

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
  }

  // Fallen count
  const fallenCount = countFallen();

  // Update HUD
  boxCountEl.textContent = boxes.length;
  fallenCountEl.textContent = fallenCount;
  sphereCountEl.textContent = spheres.length;
  fpsEl.textContent = currentFps;

  // Update global state
  window.__3D_STATE__ = {
    boxCount: boxes.length,
    fallenCount: fallenCount,
    boxes: boxes.map(b => {
      const p = b.body.translation();
      return { x: p.x, y: p.y, z: p.z };
    }),
    sphereCount: spheres.length,
    fps: currentFps
  };

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
