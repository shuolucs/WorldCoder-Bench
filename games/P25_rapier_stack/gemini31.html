<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js + Rapier 3D Physics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.5;
        }
        #resetBtn {
            pointer-events: auto;
            margin-top: 10px;
            padding: 8px 12px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        #resetBtn:hover {
            background: #ff6b81;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>

    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/rapier.js"></script>
</head>
<body>
    <div id="hud">
        <div>Box Count: <span id="boxCount">10</span></div>
        <div>Fallen Count: <span id="fallenCount">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
        <button id="resetBtn">Reset</button>
    </div>
    <div id="crosshair"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // State
        window.__3D_STATE__ = {
            boxCount: 10,
            fallenCount: 0,
            boxes: [],
            sphereCount: 0,
            fps: 0
        };

        let scene, camera, renderer, controls;
        let world;
        let boxes = [];
        let spheres = [];
        
        // FPS calculation
        let frames = 0;
        let prevTime = performance.now();

        // DOM Elements
        const boxCountEl = document.getElementById('boxCount');
        const fallenCountEl = document.getElementById('fallenCount');
        const fpsEl = document.getElementById('fps');
        const resetBtn = document.getElementById('resetBtn');

        async function init() {
            // 1. Initialize Rapier
            await RAPIER.init();
            const gravity = { x: 0.0, y: -9.81, z: 0.0 };
            world = new RAPIER.World(gravity);

            // 2. Initialize Three.js
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 20);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 5, 0);
            controls.update();

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 2);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            dirLight.shadow.camera.top = 15;
            dirLight.shadow.camera.bottom = -15;
            dirLight.shadow.camera.left = -15;
            dirLight.shadow.camera.right = 15;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 3. Create Scene Objects
            createGround();
            createStack();

            // 4. Events
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('pointerdown', onPointerDown);
            resetBtn.addEventListener('click', resetScene);

            // 5. Start Loop
            animate();
        }

        function createGround() {
            // Three.js
            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshStandardMaterial({ color: 0x555555, depthWrite: true });
            const groundMesh = new THREE.Mesh(groundGeo, groundMat);
            groundMesh.rotation.x = -Math.PI / 2;
            groundMesh.receiveShadow = true;
            scene.add(groundMesh);

            // Rapier
            const groundBodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(0, 0, 0);
            const groundBody = world.createRigidBody(groundBodyDesc);
            const groundColliderDesc = RAPIER.ColliderDesc.halfspace({ x: 0.0, y: 1.0, z: 0.0 });
            world.createCollider(groundColliderDesc, groundBody);
            
            // Grid Helper
            const grid = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);
        }

        function createStack() {
            const boxGeo = new THREE.BoxGeometry(1, 1, 1);
            const boxMat = new THREE.MeshStandardMaterial({ 
                color: 0xf1c40f,
                roughness: 0.4,
                metalness: 0.1
            });

            for (let i = 0; i < 10; i++) {
                const yPos = 0.5 + i * 1.0;

                // Three.js
                const mesh = new THREE.Mesh(boxGeo, boxMat);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);

                // Rapier
                const bodyDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(0, yPos, 0);
                const body = world.createRigidBody(bodyDesc);
                const colliderDesc = RAPIER.ColliderDesc.cuboid(0.5, 0.5, 0.5).setMass(1.0);
                world.createCollider(colliderDesc, body);

                boxes.push({ mesh, body, origY: yPos });
            }
        }

        function onPointerDown(event) {
            // Ignore UI clicks
            if (event.target.tagName.toLowerCase() === 'button') return;
            if (event.button !== 0) return; // Only left click

            // Raycast from center of screen (crosshair)
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            const shootDir = raycaster.ray.direction.clone().normalize();
            const shootPos = camera.position.clone().add(shootDir.clone().multiplyScalar(2)); // Spawn slightly ahead of camera

            // Create Sphere
            const radius = 0.4;
            const sphereGeo = new THREE.SphereGeometry(radius, 32, 32);
            const sphereMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.2, metalness: 0.8 });
            const mesh = new THREE.Mesh(sphereGeo, sphereMat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);

            // Rapier Physics
            const bodyDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(shootPos.x, shootPos.y, shootPos.z);
            const velocity = shootDir.multiplyScalar(20); // 20 m/s
            bodyDesc.setLinvel(velocity.x, velocity.y, velocity.z);
            
            const body = world.createRigidBody(bodyDesc);
            const colliderDesc = RAPIER.ColliderDesc.ball(radius).setMass(5.0);
            world.createCollider(colliderDesc, body);

            spheres.push({ mesh, body });
        }

        function resetScene() {
            // Remove Boxes
            boxes.forEach(b => {
                scene.remove(b.mesh);
                b.mesh.geometry.dispose();
                world.removeRigidBody(b.body);
            });
            boxes = [];

            // Remove Spheres
            spheres.forEach(s => {
                scene.remove(s.mesh);
                s.mesh.geometry.dispose();
                world.removeRigidBody(s.body);
            });
            spheres = [];

            // Recreate
            createStack();
            
            // Reset State
            window.__3D_STATE__.fallenCount = 0;
            fallenCountEl.innerText = '0';
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Step Physics
            world.step();

            // Sync Boxes & Calculate Fallen
            let currentFallen = 0;
            const boxStates = [];

            boxes.forEach(b => {
                const pos = b.body.translation();
                const rot = b.body.rotation();
                
                b.mesh.position.copy(pos);
                b.mesh.quaternion.copy(rot);

                boxStates.push({ x: pos.x, y: pos.y, z: pos.z });

                // Fallen logic: moved horizontally > 0.8 or dropped vertically > 0.2 from original slot
                const horizontalDist = Math.hypot(pos.x, pos.z);
                if (horizontalDist > 0.8 || pos.y < b.origY - 0.2) {
                    currentFallen++;
                }
            });

            // Sync Spheres
            spheres.forEach(s => {
                const pos = s.body.translation();
                const rot = s.body.rotation();
                s.mesh.position.copy(pos);
                s.mesh.quaternion.copy(rot);
            });

            // FPS Calculation
            frames++;
            const time = performance.now();
            if (time >= prevTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (time - prevTime));
                fpsEl.innerText = window.__3D_STATE__.fps;
                frames = 0;
                prevTime = time;
            }

            // Update State & HUD
            window.__3D_STATE__.boxCount = boxes.length;
            window.__3D_STATE__.fallenCount = currentFallen;
            window.__3D_STATE__.boxes = boxStates;
            window.__3D_STATE__.sphereCount = spheres.length;

            boxCountEl.innerText = window.__3D_STATE__.boxCount;
            fallenCountEl.innerText = window.__3D_STATE__.fallenCount;

            renderer.render(scene, camera);
        }

        // Start
        init();
    </script>
</body>
</html>
