<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js + Rapier 刚体堆叠与鼠标射击</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.8;
      font-size: 14px;
      min-width: 220px;
      user-select: none;
    }

    #hud button {
      margin-top: 8px;
      padding: 6px 10px;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      background: #2f7cf6;
      color: white;
      font-size: 14px;
    }

    #hud button:hover {
      background: #5292f7;
    }

    #tip {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      color: #ddd;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>盒子数量: <span id="boxCount">10</span></div>
    <div>倒塌/离堆数量: <span id="fallenCount">0</span></div>
    <div>FPS: <span id="fps">0</span></div>
    <button id="resetBtn">重置</button>
  </div>

  <div id="tip">操作：拖拽旋转视角，滚轮缩放，鼠标点击场景发射球体</div>
  <canvas id="app"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@dimforge/rapier3d-compat@0.14.0/rapier.js"></script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    await RAPIER.init();

    const canvas = document.getElementById("app");
    const boxCountEl = document.getElementById("boxCount");
    const fallenCountEl = document.getElementById("fallenCount");
    const fpsEl = document.getElementById("fps");
    const resetBtn = document.getElementById("resetBtn");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(8, 8, 14);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 4.5, 0);
    controls.enableDamping = true;
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(8, 14, 10);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(40, 40, 0x666666, 0x333333);
    scene.add(grid);

    let world = new RAPIER.World({ x: 0, y: -9.81, z: 0 });

    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x3a3a3a });
    const boxMaterial = new THREE.MeshStandardMaterial({ color: 0x4ea1ff });
    const sphereMaterial = new THREE.MeshStandardMaterial({ color: 0xff7a3d });

    const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
    const sphereGeometry = new THREE.SphereGeometry(0.25, 24, 24);
    const groundGeometry = new THREE.BoxGeometry(40, 1, 40);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let groundBody = null;
    let groundMesh = null;

    let boxes = [];
    let spheres = [];

    let fps = 0;
    let frames = 0;
    let fpsAccum = 0;
    let lastTime = performance.now();

    const FIXED_TIME_STEP = 1 / 60;

    function createGround() {
      const bodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(0, -0.5, 0);
      groundBody = world.createRigidBody(bodyDesc);

      const colliderDesc = RAPIER.ColliderDesc.cuboid(20, 0.5, 20)
        .setRestitution(0.1)
        .setFriction(0.9);
      world.createCollider(colliderDesc, groundBody);

      groundMesh = new THREE.Mesh(groundGeometry, groundMaterial);
      groundMesh.position.set(0, -0.5, 0);
      groundMesh.receiveShadow = true;
      scene.add(groundMesh);
    }

    function createBox(x, y, z) {
      const rbDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(x, y, z);
      const body = world.createRigidBody(rbDesc);

      const colliderDesc = RAPIER.ColliderDesc.cuboid(0.5, 0.5, 0.5)
        .setDensity(1.0)
        .setRestitution(0.05)
        .setFriction(0.8);
      world.createCollider(colliderDesc, body);

      const mesh = new THREE.Mesh(boxGeometry, boxMaterial);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      boxes.push({ body, mesh, initialX: x, initialY: y, initialZ: z });
    }

    function createBoxStack() {
      for (let i = 0; i < 10; i++) {
        createBox(0, 0.5 + i, 0);
      }
    }

    function createSphere(origin, direction) {
      const radius = 0.25;
      const mass = 5.0;
      const density = mass / ((4 / 3) * Math.PI * radius * radius * radius);

      const spawnPos = origin.clone().add(direction.clone().multiplyScalar(1.0));

      const rbDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(
        spawnPos.x,
        spawnPos.y,
        spawnPos.z
      );
      const body = world.createRigidBody(rbDesc);

      const colliderDesc = RAPIER.ColliderDesc.ball(radius)
        .setDensity(density)
        .setRestitution(0.2)
        .setFriction(0.7);
      world.createCollider(colliderDesc, body);

      body.setLinvel(
        {
          x: direction.x * 20,
          y: direction.y * 20,
          z: direction.z * 20
        },
        true
      );

      const mesh = new THREE.Mesh(sphereGeometry, sphereMaterial);
      scene.add(mesh);

      spheres.push({ body, mesh, radius });
    }

    function syncMeshes() {
      for (const item of boxes) {
        const t = item.body.translation();
        const r = item.body.rotation();
        item.mesh.position.set(t.x, t.y, t.z);
        item.mesh.quaternion.set(r.x, r.y, r.z, r.w);
      }

      for (const item of spheres) {
        const t = item.body.translation();
        const r = item.body.rotation();
        item.mesh.position.set(t.x, t.y, t.z);
        item.mesh.quaternion.set(r.x, r.y, r.z, r.w);
      }
    }

    function cleanupSpheres() {
      const alive = [];
      for (const item of spheres) {
        const t = item.body.translation();
        const outOfBounds =
          t.y < -10 || Math.abs(t.x) > 60 || Math.abs(t.z) > 60 || t.y > 60;

        if (outOfBounds) {
          scene.remove(item.mesh);
          world.removeRigidBody(item.body);
        } else {
          alive.push(item);
        }
      }
      spheres = alive;
    }

    function computeFallenCount() {
      let count = 0;
      for (const item of boxes) {
        const p = item.body.translation();
        const horizontalOffset = Math.hypot(p.x, p.z);
        const isFallen = p.y < 0.3 || horizontalOffset > 1.2;
        if (isFallen) count++;
      }
      return count;
    }

    function updateHUDAndState() {
      const fallenCount = computeFallenCount();
      const boxPositions = boxes.map(item => {
        const p = item.body.translation();
        return { x: p.x, y: p.y, z: p.z };
      });

      boxCountEl.textContent = String(boxes.length);
      fallenCountEl.textContent = String(fallenCount);
      fpsEl.textContent = String(fps.toFixed(1));

      window.__3D_STATE__ = {
        boxCount: boxes.length,
        fallenCount,
        boxes: boxPositions,
        sphereCount: spheres.length,
        fps: Number(fps.toFixed(1))
      };
    }

    function clearDynamics() {
      for (const item of boxes) {
        scene.remove(item.mesh);
        world.removeRigidBody(item.body);
      }
      boxes = [];

      for (const item of spheres) {
        scene.remove(item.mesh);
        world.removeRigidBody(item.body);
      }
      spheres = [];
    }

    function resetScene() {
      clearDynamics();
      createBoxStack();
      updateHUDAndState();
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const intersects = raycaster.intersectObject(groundMesh, false);

      let targetPoint;
      if (intersects.length > 0) {
        targetPoint = intersects[0].point.clone();
      } else {
        targetPoint = raycaster.ray.origin.clone().add(
          raycaster.ray.direction.clone().multiplyScalar(30)
        );
      }

      const origin = camera.position.clone();
      const direction = targetPoint.clone().sub(origin).normalize();

      createSphere(origin, direction);
    }

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now();
      const deltaSec = (now - lastTime) / 1000;
      lastTime = now;

      fpsAccum += deltaSec;
      frames++;
      if (fpsAccum >= 0.5) {
        fps = frames / fpsAccum;
        frames = 0;
        fpsAccum = 0;
      }

      world.timestep = FIXED_TIME_STEP;
      world.step();

      syncMeshes();
      cleanupSpheres();
      controls.update();
      updateHUDAndState();

      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    createGround();
    createBoxStack();
    updateHUDAndState();
    animate();

    window.addEventListener("resize", onResize);
    renderer.domElement.addEventListener("pointerdown", onPointerDown);
    resetBtn.addEventListener("click", resetScene);
  </script>
</body>
</html>
