<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Basketball Free Throw Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#scoreDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #FFD700;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#shotsDisplay {
    position: absolute;
    top: 20px;
    right: 20px;
    color: #FFFFFF;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#powerBar {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 30px;
    background: rgba(0,0,0,0.6);
    border: 2px solid #FFF;
    border-radius: 15px;
    overflow: hidden;
}

#powerFill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00FF00, #FFFF00, #FF0000);
    border-radius: 13px;
    transition: width 0.05s;
}

#angleDisplay {
    position: absolute;
    bottom: 85px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFFFFF;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#aimDisplay {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #FFFFFF;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#statusText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #FFFFFF;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s;
}

#instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    text-align: center;
}
</style>
</head>
<body>

<div id="scoreDisplay">Score: 0</div>
<div id="shotsDisplay">Shots: 0</div>
<div id="powerBar"><div id="powerFill"></div></div>
<div id="angleDisplay">Angle: 45°</div>
<div id="aimDisplay">Aim: 0.0</div>
<div id="statusText">Hold SPACE to charge</div>
<div id="instructions">SPACE: Charge Power | ↑↓: Angle | ←→: Aim | ENTER: Launch | R: Reset</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State Management
window.__3D_STATE__ = {
    phase: 'idle',
    power: 0,
    angle: 45,
    aimX: 0,
    score: 0,
    shots: 0,
    ballPosition: { x: 0, y: 3, z: 10 },
    ballVelocity: { x: 0, y: 0, z: 0 },
    isCharging: false,
    particleCount: 0,
    fishLoaded: false,
    fishCelebrating: false,
    ballSpeed: 0,
    lastShotResult: 'none'
};

window.__fishModel = null;

const state = window.__3D_STATE__;

// Scene Setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 5, -8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 20, 10);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -20;
directionalLight.shadow.camera.right = 20;
directionalLight.shadow.camera.top = 20;
directionalLight.shadow.camera.bottom = -20;
scene.add(directionalLight);

// Additional lights for atmosphere
const pointLight1 = new THREE.PointLight(0xFF6600, 0.5, 30);
pointLight1.position.set(-5, 12, -5);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0x0066FF, 0.3, 30);
pointLight2.position.set(5, 12, -5);
scene.add(pointLight2);

// Court Floor
const courtGeometry = new THREE.PlaneGeometry(40, 40);
const courtMaterial = new THREE.MeshStandardMaterial({
    color: 0x8B6914,
    roughness: 0.8,
    metalness: 0.1
});
const court = new THREE.Mesh(courtGeometry, courtMaterial);
court.rotation.x = -Math.PI / 2;
court.position.y = 0;
court.receiveShadow = true;
scene.add(court);

// Court lines
const lineGeometry = new THREE.PlaneGeometry(12, 0.05);
const lineMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.5 });

const freethrowLine = new THREE.Mesh(lineGeometry, lineMaterial);
freethrowLine.rotation.x = -Math.PI / 2;
freethrowLine.position.set(0, 0.01, 4);
scene.add(freethrowLine);

// Free throw circle
const circleGeometry = new THREE.RingGeometry(2.9, 3.0, 64);
const circleMaterial = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, side: THREE.DoubleSide });
const ftCircle = new THREE.Mesh(circleGeometry, circleMaterial);
ftCircle.rotation.x = -Math.PI / 2;
ftCircle.position.set(0, 0.01, 4);
scene.add(ftCircle);

// Lane lines
const laneLineGeo = new THREE.PlaneGeometry(0.05, 12);
const laneLine1 = new THREE.Mesh(laneLineGeo, lineMaterial);
laneLine1.rotation.x = -Math.PI / 2;
laneLine1.position.set(-3, 0.01, -2);
scene.add(laneLine1);

const laneLine2 = new THREE.Mesh(laneLineGeo, lineMaterial);
laneLine2.rotation.x = -Math.PI / 2;
laneLine2.position.set(3, 0.01, -2);
scene.add(laneLine2);

// Backboard
const backboardGeometry = new THREE.BoxGeometry(2.5, 2, 0.1);
const backboardMaterial = new THREE.MeshStandardMaterial({
    color: 0xFFFFFF,
    roughness: 0.3,
    metalness: 0.1,
    transparent: true,
    opacity: 0.85
});
const backboard = new THREE.Mesh(backboardGeometry, backboardMaterial);
backboard.position.set(0, 9, -8.5);
backboard.castShadow = true;
backboard.receiveShadow = true;
scene.add(backboard);

// Backboard outline
const bbOutlineGeo = new THREE.BoxGeometry(2.6, 2.1, 0.08);
const bbOutlineMat = new THREE.MeshStandardMaterial({ color: 0xFF4400, roughness: 0.5 });
const bbOutline = new THREE.Mesh(bbOutlineGeo, bbOutlineMat);
bbOutline.position.set(0, 9, -8.52);
scene.add(bbOutline);

// Small square on backboard
const smallSquareGeo = new THREE.BoxGeometry(0.8, 0.6, 0.12);
const smallSquareMat = new THREE.MeshStandardMaterial({ color: 0xFF4400, roughness: 0.5 });
const smallSquare = new THREE.Mesh(smallSquareGeo, smallSquareMat);
smallSquare.position.set(0, 8.7, -8.48);
scene.add(smallSquare);

// Hoop (Torus)
const hoopGeometry = new THREE.TorusGeometry(0.6, 0.08, 16, 32);
const hoopMaterial = new THREE.MeshStandardMaterial({
    color: 0xFF6600,
    roughness: 0.3,
    metalness: 0.8
});
const hoop = new THREE.Mesh(hoopGeometry, hoopMaterial);
hoop.position.set(0, 8, -8);
hoop.rotation.x = Math.PI / 2;
hoop.castShadow = true;
scene.add(hoop);

// Net (simplified with lines)
const netGroup = new THREE.Group();
const netSegments = 12;
const netDepth = 1.0;
for (let i = 0; i < netSegments; i++) {
    const angle = (i / netSegments) * Math.PI * 2;
    const topX = Math.cos(angle) * 0.55;
    const topZ = Math.sin(angle) * 0.55;
    const bottomX = Math.cos(angle) * 0.25;
    const bottomZ = Math.sin(angle) * 0.25;

    const points = [];
    for (let j = 0; j <= 4; j++) {
        const t = j / 4;
        const wobble = Math.sin(t * Math.PI * 2 + i) * 0.05;
        points.push(new THREE.Vector3(
            THREE.MathUtils.lerp(topX, bottomX, t) + wobble,
            -t * netDepth,
            THREE.MathUtils.lerp(topZ, bottomZ, t) + wobble
        ));
    }
    const netLineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const netLine = new THREE.Line(netLineGeo, new THREE.LineBasicMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.7 }));
    netGroup.add(netLine);
}
netGroup.position.set(0, 8, -8);
scene.add(netGroup);

// Pole
const poleGeometry = new THREE.CylinderGeometry(0.08, 0.08, 10, 16);
const poleMaterial = new THREE.MeshStandardMaterial({
    color: 0x888888,
    roughness: 0.4,
    metalness: 0.6
});
const pole = new THREE.Mesh(poleGeometry, poleMaterial);
pole.position.set(0, 5, -8.7);
pole.castShadow = true;
scene.add(pole);

// Pole support arm
const armGeo = new THREE.CylinderGeometry(0.05, 0.05, 1.0, 8);
const arm = new THREE.Mesh(armGeo, poleMaterial);
arm.rotation.z = Math.PI / 2;
arm.position.set(0, 8, -8.35);
scene.add(arm);

// Basketball
const ballStartPos = new THREE.Vector3(0, 3, 10);
const ballGeometry = new THREE.SphereGeometry(0.35, 32, 32);

// Create basketball texture with canvas
const ballCanvas = document.createElement('canvas');
ballCanvas.width = 256;
ballCanvas.height = 256;
const ctx = ballCanvas.getContext('2d');

// Base orange
ctx.fillStyle = '#E87020';
ctx.fillRect(0, 0, 256, 256);

// Add some noise/texture
for (let i = 0; i < 5000; i++) {
    const x = Math.random() * 256;
    const y = Math.random() * 256;
    ctx.fillStyle = `rgba(${180 + Math.random() * 40}, ${80 + Math.random() * 30}, ${10 + Math.random() * 20}, 0.3)`;
    ctx.fillRect(x, y, 2, 2);
}

// Dark lines
ctx.strokeStyle = '#3a1a00';
ctx.lineWidth = 3;

// Horizontal line
ctx.beginPath();
ctx.moveTo(0, 128);
ctx.lineTo(256, 128);
ctx.stroke();

// Vertical line
ctx.beginPath();
ctx.moveTo(128, 0);
ctx.lineTo(128, 256);
ctx.stroke();

// Curved lines
ctx.beginPath();
ctx.arc(128, 128, 80, 0, Math.PI * 2);
ctx.stroke();

ctx.beginPath();
ctx.arc(0, 128, 90, -Math.PI / 2, Math.PI / 2);
ctx.stroke();

ctx.beginPath();
ctx.arc(256, 128, 90, Math.PI / 2, Math.PI * 1.5);
ctx.stroke();

const ballTexture = new THREE.CanvasTexture(ballCanvas);
const ballMaterial = new THREE.MeshStandardMaterial({
    map: ballTexture,
    roughness: 0.6,
    metalness: 0.1,
    bumpMap: ballTexture,
    bumpScale: 0.02
});

const ball = new THREE.Mesh(ballGeometry, ballMaterial);
ball.position.copy(ballStartPos);
ball.castShadow = true;
scene.add(ball);

// Ball shadow indicator on ground
const shadowIndicatorGeo = new THREE.CircleGeometry(0.3, 32);
const shadowIndicatorMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 });
const shadowIndicator = new THREE.Mesh(shadowIndicatorGeo, shadowIndicatorMat);
shadowIndicator.rotation.x = -Math.PI / 2;
shadowIndicator.position.set(0, 0.02, 10);
scene.add(shadowIndicator);

// Aim arrow indicator
const arrowGroup = new THREE.Group();
const arrowBodyGeo = new THREE.CylinderGeometry(0.03, 0.03, 2, 8);
const arrowMat = new THREE.MeshBasicMaterial({ color: 0x00FF00, transparent: true, opacity: 0.6 });
const arrowBody = new THREE.Mesh(arrowBodyGeo, arrowMat);
arrowBody.position.y = 1;
arrowGroup.add(arrowBody);

const arrowHeadGeo = new THREE.ConeGeometry(0.1, 0.3, 8);
const arrowHead = new THREE.Mesh(arrowHeadGeo, arrowMat);
arrowHead.position.y = 2.15;
arrowGroup.add(arrowHead);

arrowGroup.position.copy(ballStartPos);
scene.add(arrowGroup);

// Ball velocity
let ballVelocity = new THREE.Vector3(0, 0, 0);
let ballActive = false;
let hasScored = false;
let hasBounced = false;

// Particle Systems
const particles = [];

function createScoreParticles(position) {
    const count = 100;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const velocities = [];
    const lifetimes = [];

    for (let i = 0; i < count; i++) {
        positions[i * 3] = position.x;
        positions[i * 3 + 1] = position.y;
        positions[i * 3 + 2] = position.z;

        // Gold/yellow colors
        colors[i * 3] = 1.0;
        colors[i * 3 + 1] = 0.7 + Math.random() * 0.3;
        colors[i * 3 + 2] = Math.random() * 0.3;

        sizes[i] = 0.1 + Math.random() * 0.2;

        velocities.push(new THREE.Vector3(
            (Math.random() - 0.5) * 8,
            Math.random() * 6 + 2,
            (Math.random() - 0.5) * 8
        ));
        lifetimes.push(2.0);
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const material = new THREE.PointsMaterial({
        size: 0.15,
        vertexColors: true,
        transparent: true,
        opacity: 1.0,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    particles.push({
        points,
        velocities,
        lifetimes,
        maxLifetime: 2.0,
        age: 0,
        count
    });
}

function createLaunchParticles(position) {
    const count = 20;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    const velocities = [];
    const lifetimes = [];

    for (let i = 0; i < count; i++) {
        positions[i * 3] = position.x + (Math.random() - 0.5) * 0.3;
        positions[i * 3 + 1] = position.y + (Math.random() - 0.5) * 0.3;
        positions[i * 3 + 2] = position.z + (Math.random() - 0.5) * 0.3;

        colors[i * 3] = 1.0;
        colors[i * 3 + 1] = 1.0;
        colors[i * 3 + 2] = 1.0;

        sizes[i] = 0.1 + Math.random() * 0.15;

        velocities.push(new THREE.Vector3(
            (Math.random() - 0.5) * 2,
            Math.random() * 2,
            (Math.random() - 0.5) * 2
        ));
        lifetimes.push(0.5);
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

    const material = new THREE.PointsMaterial({
        size: 0.12,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        sizeAttenuation: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const points = new THREE.Points(geometry, material);
    scene.add(points);

    particles.push({
        points,
        velocities,
        lifetimes,
        maxLifetime: 0.5,
        age: 0,
        count
    });
}

function updateParticles(dt) {
    let activeCount = 0;
    for (let p = particles.length - 1; p >= 0; p--) {
        const particle = particles[p];
        particle.age += dt;

        if (particle.age >= particle.maxLifetime) {
            scene.remove(particle.points);
            particle.points.geometry.dispose();
            particle.points.material.dispose();
            particles.splice(p, 1);
            continue;
        }

        const positions = particle.points.geometry.attributes.position.array;
        for (let i = 0; i < particle.count; i++) {
            particle.velocities[i].y -= 9.81 * dt;
            positions[i * 3] += particle.velocities[i].x * dt;
            positions[i * 3 + 1] += particle.velocities[i].y * dt;
            positions[i * 3 + 2] += particle.velocities[i].z * dt;
        }
        particle.points.geometry.attributes.position.needsUpdate = true;

        const lifeRatio = 1.0 - (particle.age / particle.maxLifetime);
        particle.points.material.opacity = lifeRatio;

        activeCount += particle.count;
    }
    state.particleCount = activeCount;
}

// Fish Model Loading
const loader = new GLTFLoader();
let fishModel = null;
let fishMixer = null;
let fishCelebrateTimer = 0;
let fishOriginalY = 10.5;

loader.load(
    'BarramundiFish.glb',
    (gltf) => {
        fishModel = gltf.scene;
        fishModel.scale.set(2, 2, 2);
        fishModel.position.set(4, fishOriginalY, -8.5);
        fishModel.castShadow = true;
        fishModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        scene.add(fishModel);
        window.__fishModel = fishModel;
        state.fishLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
            fishMixer = new THREE.AnimationMixer(fishModel);
            const action = fishMixer.clipAction(gltf.animations[0]);
            action.play();
        }

        console.log('Fish model loaded successfully!');
    },
    (progress) => {
        console.log('Loading fish model...', (progress.loaded / progress.total * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load BarramundiFish.glb, creating placeholder:', error);
        // Create a placeholder fish
        const fishGroup = new THREE.Group();

        // Body
        const bodyGeo = new THREE.SphereGeometry(0.5, 16, 12);
        bodyGeo.scale(1.5, 0.6, 0.4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488AA, roughness: 0.3, metalness: 0.5 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        fishGroup.add(body);

        // Tail
        const tailGeo = new THREE.ConeGeometry(0.3, 0.5, 4);
        const tailMat = new THREE.MeshStandardMaterial({ color: 0x3377AA, roughness: 0.3, metalness: 0.5 });
        const tail = new THREE.Mesh(tailGeo, tailMat);
        tail.position.x = -0.8;
        tail.rotation.z = Math.PI / 2;
        fishGroup.add(tail);

        // Eye
        const eyeGeo = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xFFFFFF });
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(0.5, 0.15, 0.25);
        fishGroup.add(eye);

        const pupilGeo = new THREE.SphereGeometry(0.04, 8, 8);
        const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const pupil = new THREE.Mesh(pupilGeo, pupilMat);
        pupil.position.set(0.55, 0.15, 0.28);
        fishGroup.add(pupil);

        // Trophy base
        const baseGeo = new THREE.CylinderGeometry(0.4, 0.5, 0.3, 16);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.2, metalness: 0.8 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.y = -0.5;
        fishGroup.add(base);

        fishGroup.scale.set(2, 2, 2);
        fishGroup.position.set(4, fishOriginalY, -8.5);
        scene.add(fishGroup);

        fishModel = fishGroup;
        window.__fishModel = fishModel;
        state.fishLoaded = true;
    }
);

// Fish celebration
function startFishCelebration() {
    fishCelebrateTimer = 2.0;
    state.fishCelebrating = true;
}

function updateFishCelebration(dt) {
    if (fishCelebrateTimer > 0 && fishModel) {
        fishCelebrateTimer -= dt;
        fishModel.rotation.y += dt * 8;
        fishModel.position.y = fishOriginalY + Math.sin(fishCelebrateTimer * 8) * 0.5;

        if (fishCelebrateTimer <= 0) {
            fishCelebrateTimer = 0;
            state.fishCelebrating = false;
            fishModel.rotation.y = 0;
            fishModel.position.y = fishOriginalY;
        }
    }
}

// Skybox-like background elements
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 500;
const starsPositions = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount; i++) {
    starsPositions[i * 3] = (Math.random() - 0.5) * 80;
    starsPositions[i * 3 + 1] = Math.random() * 30 + 10;
    starsPositions[i * 3 + 2] = (Math.random() - 0.5) * 80 - 10;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xFFFFFF, size: 0.1, sizeAttenuation: true });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// Input handling
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    e.preventDefault();
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
    e.preventDefault();
});

// Charging
let chargeStartTime = 0;

// UI Elements
const scoreDisplay = document.getElementById('scoreDisplay');
const shotsDisplay = document.getElementById('shotsDisplay');
const powerFill = document.getElementById('powerFill');
const angleDisplay = document.getElementById('angleDisplay');
const aimDisplay = document.getElementById('aimDisplay');
const statusText = document.getElementById('statusText');

function updateUI() {
    scoreDisplay.textContent = `Score: ${state.score}`;
    shotsDisplay.textContent = `Shots: ${state.shots}`;
    powerFill.style.width = `${(state.power / 20) * 100}%`;
    angleDisplay.textContent = `Angle: ${Math.round(state.angle)}°`;
    aimDisplay.textContent = `Aim: ${state.aimX.toFixed(1)}`;
}

function setStatus(text) {
    statusText.textContent = text;
}

function resetBall() {
    ball.position.copy(ballStartPos);
    ballVelocity.set(0, 0, 0);
    ballActive = false;
    hasScored = false;
    hasBounced = false;
    state.power = 0;
    state.angle = 45;
    state.aimX = 0;
    state.phase = 'idle';
    state.isCharging = false;
    state.ballPosition = { x: ballStartPos.x, y: ballStartPos.y, z: ballStartPos.z };
    state.ballVelocity = { x: 0, y: 0, z: 0 };
    state.ballSpeed = 0;
    arrowGroup.visible = true;
    arrowGroup.position.copy(ballStartPos);
    setStatus('Hold SPACE to charge');
    updateUI();
}

function launchBall() {
    const angleRad = THREE.MathUtils.degToRad(state.angle);
    const power = state.power;

    ballVelocity.set(
        state.aimX * 0.8,
        power * Math.sin(angleRad),
        -power * Math.cos(angleRad)
    );

    ballActive = true;
    hasScored = false;
    state.phase = 'flying';
    state.shots++;
    state.lastShotResult = 'none';
    arrowGroup.visible = false;

    createLaunchParticles(ball.position.clone());
    setStatus('');
    updateUI();
}

// Update arrow direction
function updateArrow() {
    if (!arrowGroup.visible) return;
    const angleRad = THREE.MathUtils.degToRad(state.angle);
    arrowGroup.position.copy(ball.position);
    arrowGroup.rotation.x = -(Math.PI / 2 - angleRad);
    arrowGroup.rotation.y = Math.atan2(state.aimX * 0.8, -1);

    // Color based on power
    const powerRatio = state.power / 20;
    const r = powerRatio;
    const g = 1 - powerRatio;
    arrowGroup.children.forEach(child => {
        child.material.color.setRGB(r, g, 0);
    });
}

// Hoop collision detection
const hoopCenter = new THREE.Vector3(0, 8, -8);

function checkHoopScore() {
    const dx = ball.position.x - hoopCenter.x;
    const dz = ball.position.z - hoopCenter.z;
    const horizontalDist = Math.sqrt(dx * dx + dz * dz);
    const verticalDist = Math.abs(ball.position.y - hoopCenter.y);

    if (horizontalDist < 0.6 && verticalDist < 0.3 && ballVelocity.y < 0) {
        return true;
    }
    return false;
}

function checkBackboardCollision() {
    // Backboard at z=-8.5, x from -1.25 to 1.25, y from 8 to 10
    if (ball.position.z <= -8.15 && ball.position.z >= -8.85 &&
        ball.position.x >= -1.25 && ball.position.x <= 1.25 &&
        ball.position.y >= 8 && ball.position.y <= 10) {
        return true;
    }
    return false;
}

function checkPoleCollision() {
    // Pole at x=0, z=-8.7, radius 0.08
    const dx = ball.position.x;
    const dz = ball.position.z - (-8.7);
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 0.43 && ball.position.y < 10 && ball.position.y > 0) {
        return true;
    }
    return false;
}

// Rim bounce
function checkRimCollision() {
    const dx = ball.position.x - hoopCenter.x;
    const dz = ball.position.z - hoopCenter.z;
    const horizontalDist = Math.sqrt(dx * dx + dz * dz);
    const verticalDist = Math.abs(ball.position.y - hoopCenter.y);

    // Check if ball hits the rim (torus)
    if (horizontalDist > 0.4 && horizontalDist < 0.85 && verticalDist < 0.35) {
        return true;
    }
    return false;
}

// Physics update
const gravity = -9.81;
const fixedDt = 1 / 60;

function updatePhysics() {
    if (!ballActive) return;

    // Apply gravity
    ballVelocity.y += gravity * fixedDt;

    // Update position
    ball.position.x += ballVelocity.x * fixedDt;
    ball.position.y += ballVelocity.y * fixedDt;
    ball.position.z += ballVelocity.z * fixedDt;

    // Ball rotation
    ball.rotation.x += ballVelocity.z * fixedDt * 2;
    ball.rotation.z -= ballVelocity.x * fixedDt * 2;

    // Shadow indicator
    shadowIndicator.position.x = ball.position.x;
    shadowIndicator.position.z = ball.position.z;
    const shadowScale = Math.max(0.1, 1.0 - ball.position.y * 0.05);
    shadowIndicator.scale.set(shadowScale, shadowScale, shadowScale);
    shadowIndicator.material.opacity = Math.max(0.05, 0.3 - ball.position.y * 0.02);

    // Check score
    if (!hasScored && checkHoopScore()) {
        hasScored = true;
        state.score++;
        state.phase = 'scored';
        state.lastShotResult = 'score';
        setStatus('🏀 SCORE! 🏀');
        createScoreParticles(hoopCenter.clone());
        startFishCelebration();
        updateUI();

        setTimeout(() => {
            setStatus('Press R to reset');
        }, 1500);
    }

    // Rim collision
    if (checkRimCollision() && !hasScored) {
        const dx = ball.position.x - hoopCenter.x;
        const dz = ball.position.z - hoopCenter.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        const nx = dx / dist;
        const nz = dz / dist;

        // Reflect velocity off rim
        const dot = ballVelocity.x * nx + ballVelocity.z * nz;
        ballVelocity.x -= 1.5 * dot * nx;
        ballVelocity.z -= 1.5 * dot * nz;
        ballVelocity.x *= 0.6;
        ballVelocity.z *= 0.6;
        ballVelocity.y *= 0.7;

        // Push ball away from rim
        ball.position.x = hoopCenter.x + nx * 0.9;
        ball.position.z = hoopCenter.z + nz * 0.9;
    }

    // Backboard collision
    if (checkBackboardCollision()) {
        ballVelocity.z *= -0.5;
        ball.position.z = -8.1;
        ballVelocity.x *= 0.8;
    }

    // Pole collision
    if (checkPoleCollision()) {
        const dx = ball.position.x;
        const dz = ball.position.z - (-8.7);
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0) {
            const nx = dx / dist;
            const nz = dz / dist;
            const dot = ballVelocity.x * nx + ballVelocity.z * nz;
            ballVelocity.x -= 2 * dot * nx;
            ballVelocity.z -= 2 * dot * nz;
            ballVelocity.x *= 0.5;
            ballVelocity.z *= 0.5;
            ball.position.x = nx * 0.5;
            ball.position.z = -8.7 + nz * 0.5;
        }
    }

    // Floor collision
    if (ball.position.y <= 0.35) {
        ball.position.y = 0.35;
        ballVelocity.y *= -0.4;
        ballVelocity.x *= 0.8;
        ballVelocity.z *= 0.8;
        hasBounced = true;
    }

    // Update state
    state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
    state.ballVelocity = { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z };
    state.ballSpeed = ballVelocity.length();

    // Check if ball stopped
    if (hasBounced && ballVelocity.length() < 0.1 && ball.position.y <= 0.4) {
        ballActive = false;
        if (!hasScored) {
            state.phase = 'missed';
            state.lastShotResult = 'miss';
            setStatus('Miss! Press R to reset');
        }
    }

    // Out of bounds check
    if (ball.position.y < -5 || Math.abs(ball.position.x) > 25 || Math.abs(ball.position.z) > 25) {
        ballActive = false;
        if (!hasScored) {
            state.phase = 'missed';
            state.lastShotResult = 'miss';
            setStatus('Miss! Press R to reset');
        }
    }
}

// Input processing
function processInput() {
    // Charging
    if (state.phase === 'idle' || state.phase === 'charging') {
        if (keys['Space']) {
            if (!state.isCharging) {
                state.isCharging = true;
                state.phase = 'charging';
                chargeStartTime = performance.now();
            }
            const elapsed = (performance.now() - chargeStartTime) / 1000;
            state.power = Math.min(20, (elapsed / 2) * 20);
            setStatus(`Charging... Power: ${state.power.toFixed(1)}`);
            updateUI();
        } else if (state.isCharging) {
            state.isCharging = false;
            state.phase = 'aiming';
            setStatus('Use ↑↓ for angle, ←→ for aim');
        }
    }

    // Aiming
    if (state.phase === 'aiming' || state.phase === 'ready') {
        if (keys['ArrowUp']) {
            state.angle = Math.min(75, state.angle + 0.5);
        }
        if (keys['ArrowDown']) {
            state.angle = Math.max(30, state.angle - 0.5);
        }
        if (keys['ArrowLeft']) {
            state.aimX = Math.max(-3, state.aimX - 0.05);
        }
        if (keys['ArrowRight']) {
            state.aimX = Math.min(3, state.aimX + 0.05);
        }

        state.phase = 'aiming';
        updateUI();

        if (keys['Enter']) {
            state.phase = 'ready';
            launchBall();
        }
    }

    // Reset
    if (keys['KeyR'] && (state.phase === 'scored' || state.phase === 'missed' || state.phase === 'flying')) {
        resetBall();
    }
}

// Gentle idle fish animation
let fishIdleTime = 0;

// Animation loop
const clock = new THREE.Clock();
let accumulator = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    accumulator += dt;

    // Process input every frame
    processInput();

    // Fixed timestep physics
    while (accumulator >= fixedDt) {
        updatePhysics();
        accumulator -= fixedDt;
    }

    // Update particles
    updateParticles(dt);

    // Update arrow
    updateArrow();

    // Update fish
    if (fishMixer) {
        fishMixer.update(dt);
    }
    updateFishCelebration(dt);

    // Idle fish animation
    if (fishModel && !state.fishCelebrating) {
        fishIdleTime += dt;
        fishModel.rotation.y = Math.sin(fishIdleTime * 0.5) * 0.2;
        fishModel.position.y = fishOriginalY + Math.sin(fishIdleTime * 1.5) * 0.1;
    }

    // Camera slight follow when ball is flying
    if (ballActive) {
        const targetX = ball.position.x * 0.15;
        const targetY = 5 + (ball.position.y - 3) * 0.1;
        camera.position.x += (targetX - camera.position.x) * 0.02;
        camera.position.y += (targetY - camera.position.y) * 0.02;
        camera.lookAt(
            ball.position.x * 0.3,
            Math.max(5, ball.position.y * 0.5),
            -8
        );
    } else {
        camera.position.x += (0 - camera.position.x) * 0.02;
        camera.position.y += (5 - camera.position.y) * 0.02;
        camera.lookAt(0, 5, -8);
    }

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
resetBall();
animate();

console.log('Basketball Free Throw Game loaded!');
console.log('Controls: SPACE=charge, ↑↓=angle, ←→=aim, ENTER=launch, R=reset');
</script>
