<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Basketball Free Throw Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 1px 3px rgba(0,0,0,0.7);
    }

    #scoreDisplay {
      top: 16px;
      left: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    #shotsDisplay {
      top: 16px;
      right: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    #statusText {
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 30px;
      font-weight: bold;
      text-align: center;
      min-width: 300px;
    }

    #controlsPanel {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 360px;
      text-align: center;
      pointer-events: none;
    }

    #powerBar {
      width: 360px;
      height: 24px;
      border: 2px solid white;
      background: rgba(255,255,255,0.12);
      margin: 0 auto 12px auto;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    #powerFill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #34d399, #fbbf24, #ef4444);
      transition: width 0.05s linear;
    }

    #angleDisplay, #aimDisplay {
      font-size: 22px;
      margin-top: 6px;
    }

    #helpText {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      font-size: 14px;
      color: #ddd;
      max-width: 420px;
      line-height: 1.4;
      pointer-events: none;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="scoreDisplay" class="hud">Score: 0</div>
  <div id="shotsDisplay" class="hud">Shots: 0</div>
  <div id="statusText" class="hud">Hold SPACE to charge</div>

  <div id="controlsPanel">
    <div id="powerBar"><div id="powerFill"></div></div>
    <div id="angleDisplay">Angle: 45°</div>
    <div id="aimDisplay">Aim: 0.0</div>
  </div>

  <div id="helpText">
    SPACE: hold to charge power<br>
    UP/DOWN: adjust angle<br>
    LEFT/RIGHT: adjust aim<br>
    ENTER: launch<br>
    R: reset ball
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 7, -8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 80;
    scene.add(dirLight);

    // Court floor
    const floorGeo = new THREE.PlaneGeometry(60, 60);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x7c5a2b });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // Paint a subtle green zone
    const courtZoneGeo = new THREE.CircleGeometry(8, 64);
    const courtZoneMat = new THREE.MeshStandardMaterial({
      color: 0x2f6f3e,
      transparent: true,
      opacity: 0.75
    });
    const courtZone = new THREE.Mesh(courtZoneGeo, courtZoneMat);
    courtZone.rotation.x = -Math.PI / 2;
    courtZone.position.set(0, 0.01, 2);
    courtZone.receiveShadow = true;
    scene.add(courtZone);

    // Hoop
    const hoopCenter = new THREE.Vector3(0, 8, -8);

    const hoopGeo = new THREE.TorusGeometry(0.6, 0.08, 16, 64);
    const hoopMat = new THREE.MeshStandardMaterial({ color: 0xff7a00 });
    const hoop = new THREE.Mesh(hoopGeo, hoopMat);
    hoop.position.copy(hoopCenter);
    hoop.rotation.x = Math.PI / 2;
    hoop.castShadow = true;
    scene.add(hoop);

    // Backboard
    const backboardGeo = new THREE.BoxGeometry(2.5, 2, 0.1);
    const backboardMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const backboard = new THREE.Mesh(backboardGeo, backboardMat);
    backboard.position.set(0, 9, -8.5);
    backboard.castShadow = true;
    backboard.receiveShadow = true;
    scene.add(backboard);

    // Pole
    const poleGeo = new THREE.CylinderGeometry(0.12, 0.18, 9, 20);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(0, 4.5, -9.1);
    pole.castShadow = true;
    pole.receiveShadow = true;
    scene.add(pole);

    // Support arm
    const supportGeo = new THREE.BoxGeometry(0.12, 0.12, 1.2);
    const support = new THREE.Mesh(
      supportGeo,
      new THREE.MeshStandardMaterial({ color: 0x999999 })
    );
    support.position.set(0, 9, -8.95);
    support.castShadow = true;
    scene.add(support);

    // Basketball texture via canvas
    function createBasketballTexture() {
      const size = 512;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#d96b1d";
      ctx.fillRect(0, 0, size, size);

      ctx.strokeStyle = "#2b1a10";
      ctx.lineWidth = 14;

      // Center vertical
      ctx.beginPath();
      ctx.moveTo(size / 2, 0);
      ctx.lineTo(size / 2, size);
      ctx.stroke();

      // Center horizontal
      ctx.beginPath();
      ctx.moveTo(0, size / 2);
      ctx.lineTo(size, size / 2);
      ctx.stroke();

      // Curved lines
      ctx.beginPath();
      ctx.arc(-80, size / 2, size / 2 + 30, -Math.PI / 2, Math.PI / 2);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(size + 80, size / 2, size / 2 + 30, Math.PI / 2, -Math.PI / 2);
      ctx.stroke();

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // Ball
    const ballRadius = 0.35;
    const ballStart = new THREE.Vector3(0, 3, 10);
    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
    const ballMat = new THREE.MeshStandardMaterial({
      map: createBasketballTexture(),
      roughness: 0.8
    });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    ball.position.copy(ballStart);
    ball.castShadow = true;
    ball.receiveShadow = true;
    scene.add(ball);

    // Simple shooting guide marker
    const targetMarker = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 16, 16),
      new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x114444 })
    );
    targetMarker.position.set(0, 8, -8);
    scene.add(targetMarker);

    // Fish trophy model
    window.__fishModel = null;
    let fishBaseY = 10.5;
    let fishCelebrateTimer = 0;

    const loader = new GLTFLoader();
    loader.load(
      "BarramundiFish.glb",
      (gltf) => {
        const fish = gltf.scene;
        fish.scale.set(2, 2, 2);
        fish.position.set(4, 10.5, -8.5);
        fish.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(fish);
        window.__fishModel = fish;
        state.fishLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Could not load BarramundiFish.glb", err);
      }
    );

    // HUD
    const scoreDisplay = document.getElementById("scoreDisplay");
    const shotsDisplay = document.getElementById("shotsDisplay");
    const powerFill = document.getElementById("powerFill");
    const angleDisplay = document.getElementById("angleDisplay");
    const aimDisplay = document.getElementById("aimDisplay");
    const statusText = document.getElementById("statusText");

    // State
    const state = {
      phase: "idle",
      power: 0,
      angle: 45,
      aimX: 0,
      score: 0,
      shots: 0,
      ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
      ballVelocity: { x: 0, y: 0, z: 0 },
      isCharging: false,
      particleCount: 0,
      fishLoaded: false,
      fishCelebrating: false,
      ballSpeed: 0,
      lastShotResult: "none"
    };
    window.__3D_STATE__ = state;

    const gravity = -9.81;
    const fixedDt = 1 / 60;
    let accumulator = 0;
    let lastTime = performance.now();

    const ballVelocity = new THREE.Vector3(0, 0, 0);
    let scoredThisShot = false;
    let boardHitCooldown = 0;
    let chargeStartTime = 0;

    // Particle systems
    const particleSystems = [];

    function createParticleTexture(color = "#ffffff") {
      const c = document.createElement("canvas");
      c.width = 64;
      c.height = 64;
      const ctx = c.getContext("2d");
      const gradient = ctx.createRadialGradient(32, 32, 4, 32, 32, 28);
      gradient.addColorStop(0, color);
      gradient.addColorStop(0.5, color);
      gradient.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 64, 64);
      const tex = new THREE.CanvasTexture(c);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const goldTexture = createParticleTexture("#ffd54a");
    const whiteTexture = createParticleTexture("#ffffff");

    function emitParticles(type, position, count) {
      const positions = new Float32Array(count * 3);
      const velocities = [];
      const lifetimes = new Float32Array(count);
      const ages = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        positions[i * 3 + 0] = position.x;
        positions[i * 3 + 1] = position.y;
        positions[i * 3 + 2] = position.z;

        let vx, vy, vz;
        if (type === "score") {
          vx = (Math.random() - 0.5) * 8;
          vy = Math.random() * 6 + 1;
          vz = (Math.random() - 0.5) * 8;
          lifetimes[i] = 2.0;
        } else {
          vx = (Math.random() - 0.5) * 1.8;
          vy = Math.random() * 1.5 + 0.3;
          vz = (Math.random() - 0.5) * 1.8;
          lifetimes[i] = 0.5;
        }

        velocities.push(new THREE.Vector3(vx, vy, vz));
        ages[i] = 0;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        map: type === "score" ? goldTexture : whiteTexture,
        color: type === "score" ? 0xffdd55 : 0xffffff,
        size: type === "score" ? 0.28 : 0.18,
        transparent: true,
        opacity: 1,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });

      const points = new THREE.Points(geometry, material);
      scene.add(points);

      particleSystems.push({
        type,
        points,
        geometry,
        material,
        positions,
        velocities,
        lifetimes,
        ages,
        count,
        alive: true
      });
    }

    function updateParticles(dt) {
      let total = 0;

      for (let p = particleSystems.length - 1; p >= 0; p--) {
        const sys = particleSystems[p];
        if (!sys.alive) continue;

        let living = 0;

        for (let i = 0; i < sys.count; i++) {
          if (sys.ages[i] >= sys.lifetimes[i]) continue;

          sys.ages[i] += dt;
          if (sys.ages[i] >= sys.lifetimes[i]) continue;

          sys.velocities[i].y += gravity * 0.35 * dt;

          sys.positions[i * 3 + 0] += sys.velocities[i].x * dt;
          sys.positions[i * 3 + 1] += sys.velocities[i].y * dt;
          sys.positions[i * 3 + 2] += sys.velocities[i].z * dt;

          living++;
        }

        sys.geometry.attributes.position.needsUpdate = true;

        let maxLife = 0;
        let avgAge = 0;
        for (let i = 0; i < sys.count; i++) {
          maxLife = Math.max(maxLife, sys.lifetimes[i]);
          avgAge += Math.min(sys.ages[i], sys.lifetimes[i]);
        }
        avgAge /= sys.count;
        sys.material.opacity = Math.max(0, 1 - avgAge / maxLife);

        total += living;

        if (living === 0) {
          scene.remove(sys.points);
          sys.geometry.dispose();
          sys.material.dispose();
          sys.alive = false;
          particleSystems.splice(p, 1);
        }
      }

      state.particleCount = total;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${state.score}`;
      shotsDisplay.textContent = `Shots: ${state.shots}`;
      powerFill.style.width = `${(state.power / 20) * 100}%`;
      angleDisplay.textContent = `Angle: ${Math.round(state.angle)}°`;
      aimDisplay.textContent = `Aim: ${state.aimX.toFixed(1)}`;
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function resetBall(fullStatus = true) {
      ball.position.copy(ballStart);
      ballVelocity.set(0, 0, 0);
      scoredThisShot = false;
      boardHitCooldown = 0;
      state.ballVelocity = { x: 0, y: 0, z: 0 };
      state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
      state.ballSpeed = 0;
      state.power = 0;
      state.isCharging = false;
      state.phase = "idle";
      if (fullStatus) setStatus("Hold SPACE to charge");
      updateHUD();
    }

    function launchBall() {
      if (state.phase !== "ready") return;

      const angleRad = THREE.MathUtils.degToRad(state.angle);
      ballVelocity.x = state.aimX;
      ballVelocity.y = state.power * Math.sin(angleRad);
      ballVelocity.z = -state.power * Math.cos(angleRad);

      state.shots++;
      state.phase = "flying";
      state.lastShotResult = "none";
      setStatus("Ball in flight...");
      emitParticles("launch", ballStart, 20);
      updateHUD();
    }

    function registerScore() {
      if (scoredThisShot) return;
      scoredThisShot = true;
      state.score++;
      state.phase = "scored";
      state.lastShotResult = "score";
      setStatus("SCORE!");
      emitParticles("score", hoopCenter, 100);

      fishCelebrateTimer = 2.0;
      state.fishCelebrating = true;
      updateHUD();
    }

    function registerMiss() {
      if (state.phase === "scored" || state.phase === "missed") return;
      state.phase = "missed";
      state.lastShotResult = "miss";
      setStatus("Miss! Press R to reset");
    }

    function updateBallPhysics(dt) {
      if (state.phase !== "flying" && state.phase !== "scored") return;

      if (boardHitCooldown > 0) boardHitCooldown -= dt;

      ballVelocity.y += gravity * dt;
      ball.position.x += ballVelocity.x * dt;
      ball.position.y += ballVelocity.y * dt;
      ball.position.z += ballVelocity.z * dt;

      // Backboard collision
      const bbMinX = backboard.position.x - 1.25;
      const bbMaxX = backboard.position.x + 1.25;
      const bbMinY = backboard.position.y - 1.0;
      const bbMaxY = backboard.position.y + 1.0;
      const bbMinZ = backboard.position.z - 0.05 - ballRadius;
      const bbMaxZ = backboard.position.z + 0.05 + ballRadius;

      const inBoardBounds =
        ball.position.x >= bbMinX &&
        ball.position.x <= bbMaxX &&
        ball.position.y >= bbMinY &&
        ball.position.y <= bbMaxY &&
        ball.position.z >= bbMinZ &&
        ball.position.z <= bbMaxZ;

      if (inBoardBounds && boardHitCooldown <= 0) {
        ballVelocity.z *= -0.5;
        if (ball.position.z < backboard.position.z) {
          ball.position.z = bbMinZ - 0.01;
        } else {
          ball.position.z = bbMaxZ + 0.01;
        }
        boardHitCooldown = 0.1;
      }

      // Floor collision
      if (ball.position.y <= ballRadius) {
        ball.position.y = ballRadius;
        if (Math.abs(ballVelocity.y) > 0.05) {
          ballVelocity.y *= -0.4;
          ballVelocity.x *= 0.8;
          ballVelocity.z *= 0.8;
        }
      }

      // Score detection:
      // if ball passes through torus center region
      const dx = ball.position.x - hoopCenter.x;
      const dz = ball.position.z - hoopCenter.z;
      const horizDist = Math.sqrt(dx * dx + dz * dz);
      const verticalDist = Math.abs(ball.position.y - hoopCenter.y);

      if (
        !scoredThisShot &&
        horizDist <= 0.6 &&
        verticalDist <= 0.3 &&
        ballVelocity.y < 0
      ) {
        registerScore();
      }

      const speed = ballVelocity.length();

      // Stop condition
      if (ball.position.y <= ballRadius + 0.001 && speed < 0.1) {
        ballVelocity.set(0, 0, 0);
        if (!scoredThisShot) registerMiss();
      }

      // Out of bounds miss
      if (
        !scoredThisShot &&
        (ball.position.z < -20 || Math.abs(ball.position.x) > 20 || ball.position.y < -5)
      ) {
        registerMiss();
      }

      state.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      state.ballVelocity = {
        x: ballVelocity.x,
        y: ballVelocity.y,
        z: ballVelocity.z
      };
      state.ballSpeed = speed;
    }

    function updateFish(dt, elapsed) {
      if (!window.__fishModel) return;

      if (fishCelebrateTimer > 0) {
        fishCelebrateTimer -= dt;
        window.__fishModel.rotation.y += dt * 8;
        window.__fishModel.position.y = fishBaseY + Math.abs(Math.sin(elapsed * 10)) * 0.8;

        if (fishCelebrateTimer <= 0) {
          state.fishCelebrating = false;
          window.__fishModel.position.y = fishBaseY;
        }
      }
    }

    // Keyboard input
    const keys = {};

    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;

      if (e.code === "Space") {
        e.preventDefault();
        if (state.phase === "idle" || state.phase === "charging") {
          if (!state.isCharging) {
            state.phase = "charging";
            state.isCharging = true;
            chargeStartTime = performance.now();
            setStatus("Charging power...");
          }
        }
      }

      if ((state.phase === "aiming" || state.phase === "ready" || state.phase === "idle")) {
        if (e.code === "ArrowUp") {
          state.angle = Math.min(75, state.angle + 1);
          if (state.phase === "idle") state.phase = "aiming";
          setStatus("Use UP/DOWN for angle");
        }
        if (e.code === "ArrowDown") {
          state.angle = Math.max(30, state.angle - 1);
          if (state.phase === "idle") state.phase = "aiming";
          setStatus("Use UP/DOWN for angle");
        }
        if (e.code === "ArrowLeft") {
          state.aimX = Math.max(-3, state.aimX - 0.1);
          if (state.phase === "idle") state.phase = "aiming";
          setStatus("Adjust aim and angle");
        }
        if (e.code === "ArrowRight") {
          state.aimX = Math.min(3, state.aimX + 0.1);
          if (state.phase === "idle") state.phase = "aiming";
          setStatus("Adjust aim and angle");
        }

        if (state.power > 0 && (state.phase === "aiming" || state.phase === "ready")) {
          state.phase = "ready";
          setStatus("Press ENTER to launch");
        }
      }

      if (e.code === "Enter") {
        launchBall();
      }

      if (e.code === "KeyR") {
        resetBall(true);
      }

      updateHUD();
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;

      if (e.code === "Space" && state.isCharging) {
        state.isCharging = false;
        state.phase = "aiming";
        setStatus("Use UP/DOWN for angle");
        updateHUD();
      }
    });

    // Visual aim marker
    function updateTargetMarker() {
      targetMarker.position.set(
        state.aimX,
        8 + Math.tan(THREE.MathUtils.degToRad(state.angle - 45)) * 2,
        -8
      );
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const dtSec = Math.min(0.05, (now - lastTime) / 1000);
      lastTime = now;
      accumulator += dtSec;

      if (state.isCharging) {
        const elapsedCharge = (performance.now() - chargeStartTime) / 1000;
        state.power = Math.min(20, (elapsedCharge / 2) * 20);
        setStatus("Charging power...");
      }

      while (accumulator >= fixedDt) {
        updateBallPhysics(fixedDt);
        updateParticles(fixedDt);
        updateFish(fixedDt, now / 1000);
        accumulator -= fixedDt;
      }

      updateTargetMarker();

      state.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      state.ballVelocity = {
        x: ballVelocity.x,
        y: ballVelocity.y,
        z: ballVelocity.z
      };
      state.ballSpeed = ballVelocity.length();

      updateHUD();
      renderer.render(scene, camera);
    }

    resetBall(false);
    setStatus("Hold SPACE to charge");
    updateHUD();
    requestAnimationFrame(animate);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
