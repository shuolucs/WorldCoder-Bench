<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mystical Crystal Garden</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud-left, #hud-right, #hud-bottom {
      position: absolute;
      z-index: 10;
      padding: 10px 14px;
      background: rgba(10, 10, 25, 0.35);
      border: 1px solid rgba(180, 120, 255, 0.2);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 20px rgba(120, 80, 255, 0.15);
      font-size: 14px;
      user-select: none;
    }

    #hud-left {
      top: 12px;
      left: 12px;
    }

    #hud-right {
      top: 12px;
      right: 12px;
      text-align: right;
    }

    #hud-bottom {
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="hud-left">Crystals: 0/12 | Mature: 0 | Harvested: 0</div>
  <div id="hud-right">Growth: ON | Speed: 1x | Resonance: OFF</div>
  <div id="hud-bottom">Click ground to plant | G:Growth | R:Resonate | H:Harvest | F:Fox Move | C:Clear | T:Speed | SPACE:Ring</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, clock;
    let ground;
    let fox, foxMixer = null, foxActions = {}, activeFoxAction = 'idle';
    let foxMoveTarget = null, foxMoveStart = null, foxMoveEnd = null, foxMoveDuration = 1.0;
    let ambientLight, pointLight1, pointLight2;
    let raycaster, mouse;
    let crystalIdCounter = 0;
    let colorIndex = 0;

    const crystals = [];
    const particles = [];

    const MAX_CRYSTALS = 12;
    const COLOR_CYCLE = ['#00ffff', '#ff00ff', '#ffff00', '#00ff88', '#ff4488', '#8844ff'];

    let growthEnabled = true;
    let timeSpeed = 1;
    let resonanceActive = false;
    let harvestCount = 0;
    let totalGrowthCycles = 0;
    let ringPlanted = false;

    const hudLeft = document.getElementById('hud-left');
    const hudRight = document.getElementById('hud-right');

    window.__3D_STATE__ = {
      crystalCount: 0,
      matureCount: 0,
      harvestCount: 0,
      growthEnabled: true,
      timeSpeed: 1,
      resonanceActive: false,
      foxPosition: { x: 0, y: 0, z: 5 },
      foxAnimationPlaying: 'idle',
      tallestCrystalHeight: 0,
      crystalColors: [],
      lastHarvestParticles: 0,
      totalGrowthCycles: 0,
      crystalPhases: [],
      ringPlanted: false
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();

      clock = new THREE.Clock();

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      document.body.appendChild(renderer.domElement);

      createGradientBackground();
      createGround();
      createLights();
      createAtmosphere();
      loadFox();

      controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 2, 0);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      window.addEventListener('resize', onWindowResize);
      renderer.domElement.addEventListener('click', onMouseClick);
      window.addEventListener('keydown', onKeyDown);
    }

    function createGradientBackground() {
      const canvas = document.createElement('canvas');
      canvas.width = 2;
      canvas.height = 512;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createLinearGradient(0, 0, 0, 512);
      gradient.addColorStop(0, '#1a0033');
      gradient.addColorStop(1, '#000000');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 2, 512);

      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      scene.background = texture;
    }

    function createGround() {
      const groundGroup = new THREE.Group();

      const planeGeo = new THREE.PlaneGeometry(30, 30);
      const planeMat = new THREE.MeshPhysicalMaterial({
        color: 0x090912,
        roughness: 0.25,
        metalness: 0.6,
        reflectivity: 0.5,
        clearcoat: 0.3,
        clearcoatRoughness: 0.2
      });

      ground = new THREE.Mesh(planeGeo, planeMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      ground.receiveShadow = true;
      ground.userData.isGround = true;
      groundGroup.add(ground);

      const grid = new THREE.GridHelper(30, 30, 0x6633aa, 0x332255);
      grid.position.y = 0.01;
      grid.material.transparent = true;
      grid.material.opacity = 0.25;
      groundGroup.add(grid);

      scene.add(groundGroup);
    }

    function createLights() {
      ambientLight = new THREE.AmbientLight('#4444ff', 0.3);
      scene.add(ambientLight);

      pointLight1 = new THREE.PointLight('#ffffff', 1.0, 100);
      pointLight1.position.set(5, 10, 5);
      scene.add(pointLight1);

      pointLight2 = new THREE.PointLight('#ff44ff', 0.6, 100);
      pointLight2.position.set(-5, 8, -3);
      scene.add(pointLight2);
    }

    function createAtmosphere() {
      const glowGeo = new THREE.SphereGeometry(0.08, 10, 10);
      for (let i = 0; i < 70; i++) {
        const glowMat = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(0.75 + Math.random() * 0.2, 0.8, 0.6),
          transparent: true,
          opacity: 0.15 + Math.random() * 0.2
        });
        const orb = new THREE.Mesh(glowGeo, glowMat);
        orb.position.set(
          (Math.random() - 0.5) * 26,
          0.4 + Math.random() * 8,
          (Math.random() - 0.5) * 26
        );
        scene.add(orb);
      }
    }

    function loadFox() {
      const loader = new GLTFLoader();
      loader.load(
        'Fox.glb',
        (gltf) => {
          fox = gltf.scene;
          fox.scale.setScalar(0.05);
          fox.position.set(0, 0, 5);
          fox.rotation.y = Math.PI;
          scene.add(fox);

          if (gltf.animations && gltf.animations.length > 0) {
            foxMixer = new THREE.AnimationMixer(fox);

            gltf.animations.forEach((clip, i) => {
              const name = clip.name.toLowerCase();
              const action = foxMixer.clipAction(clip);
              if (i === 0 || name.includes('idle')) foxActions.idle = action;
              if (i === 1 || name.includes('walk')) foxActions.walk = action;
              if (i === 2 || name.includes('run')) foxActions.run = action;
            });

            if (!foxActions.idle && gltf.animations[0]) foxActions.idle = foxMixer.clipAction(gltf.animations[0]);
            if (!foxActions.walk && gltf.animations[1]) foxActions.walk = foxMixer.clipAction(gltf.animations[1]);
            if (!foxActions.run && gltf.animations[2]) foxActions.run = foxMixer.clipAction(gltf.animations[2]);

            playFoxAnimation('idle');
          }
        },
        undefined,
        (err) => {
          console.warn('Failed to load Fox.glb:', err);
          const placeholder = new THREE.Mesh(
            new THREE.ConeGeometry(0.5, 1.2, 6),
            new THREE.MeshStandardMaterial({ color: 0xff8844, emissive: 0x441100 })
          );
          placeholder.position.set(0, 0.6, 5);
          placeholder.rotation.y = Math.PI;
          fox = placeholder;
          scene.add(fox);
        }
      );
    }

    function playFoxAnimation(name) {
      if (!foxMixer || !foxActions[name]) {
        activeFoxAction = name;
        return;
      }

      const next = foxActions[name];
      Object.values(foxActions).forEach(action => {
        if (action !== next) action.fadeOut(0.25);
      });
      next.reset().fadeIn(0.25).play();
      activeFoxAction = name;
    }

    function createCrystalMesh(colorHex, segments) {
      const group = new THREE.Group();

      const bodyGeo = new THREE.CylinderGeometry(1, 1, 1, segments, 1);
      const tipGeo = new THREE.ConeGeometry(1.05, 0.8, segments, 1);

      const material = new THREE.MeshPhysicalMaterial({
        color: colorHex,
        emissive: new THREE.Color(colorHex),
        emissiveIntensity: 0.15,
        transmission: 0.5,
        roughness: 0.1,
        metalness: 0.2,
        transparent: true,
        opacity: 0.95,
        thickness: 0.7,
        ior: 1.3
      });

      const body = new THREE.Mesh(bodyGeo, material);
      body.position.y = 0.5;
      group.add(body);

      const tip = new THREE.Mesh(tipGeo, material);
      tip.position.y = 1.4;
      group.add(tip);

      group.userData.material = material;
      return group;
    }

    function plantCrystal(x, z, delayGrow = true) {
      if (crystals.length >= MAX_CRYSTALS) return null;

      const color = COLOR_CYCLE[colorIndex % COLOR_CYCLE.length];
      colorIndex++;

      const segments = 5 + Math.floor(Math.random() * 4);
      const mesh = createCrystalMesh(color, segments);
      mesh.position.set(x, 0, z);

      const crystal = {
        id: crystalIdCounter++,
        position: { x, y: 0, z },
        height: 0.1,
        baseRadius: 0.15,
        color,
        growthRate: 0.02,
        growthPhase: 'seed',
        segments,
        mesh,
        plantedAt: performance.now(),
        growStartDelay: delayGrow ? 500 : 0
      };

      updateCrystalMesh(crystal);
      scene.add(mesh);
      crystals.push(crystal);

      return crystal;
    }

    function updateCrystalMesh(crystal) {
      const h = Math.max(crystal.height, 0.01);
      const r = Math.max(crystal.baseRadius, 0.01);

      crystal.mesh.scale.set(r, h, r);
      crystal.mesh.position.set(crystal.position.x, 0, crystal.position.z);

      const mat = crystal.mesh.userData.material;
      if (mat) {
        mat.emissive.set(crystal.color);
      }
    }

    function onMouseClick(event) {
      if (crystals.length >= MAX_CRYSTALS) return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(ground);

      if (intersects.length > 0) {
        const p = intersects[0].point;
        plantCrystal(p.x, p.z, true);
      }
    }

    function onKeyDown(event) {
      const key = event.code;

      if (key === 'KeyG') {
        growthEnabled = !growthEnabled;
      }

      if (key === 'KeyR') {
        resonanceActive = !resonanceActive;
        if (resonanceActive) {
          crystals.forEach(c => {
            if (c.height >= 3.0) c.growthPhase = 'resonating';
          });
          if (foxActions.run) playFoxAnimation('run');
          else if (foxActions.walk) playFoxAnimation('walk');
        } else {
          crystals.forEach(c => {
            if (c.growthPhase === 'resonating') c.growthPhase = 'mature';
          });
          playFoxAnimation('idle');
        }
      }

      if (key === 'KeyH') {
        harvestTallestMatureCrystal();
      }

      if (key === 'KeyF') {
        moveFoxToNearestCrystal();
      }

      if (key === 'KeyC') {
        clearCrystals();
      }

      if (key === 'KeyT') {
        timeSpeed = timeSpeed === 1 ? 3 : 1;
      }

      if (key === 'Space') {
        event.preventDefault();
        spawnCrystalRing();
      }
    }

    function harvestTallestMatureCrystal() {
      const matureCrystals = crystals.filter(c => c.growthPhase === 'mature' || c.growthPhase === 'resonating');
      if (matureCrystals.length === 0) return;

      let tallest = matureCrystals[0];
      for (const c of matureCrystals) {
        if (c.height > tallest.height) tallest = c;
      }

      scene.remove(tallest.mesh);
      const idx = crystals.findIndex(c => c.id === tallest.id);
      if (idx !== -1) crystals.splice(idx, 1);

      harvestCount++;
      createParticleBurst(new THREE.Vector3(tallest.position.x, tallest.height * 0.8, tallest.position.z), tallest.color);
    }

    function createParticleBurst(position, colorHex) {
      for (let i = 0; i < 20; i++) {
        const geo = new THREE.SphereGeometry(0.08, 8, 8);
        const mat = new THREE.MeshBasicMaterial({
          color: colorHex,
          transparent: true,
          opacity: 1
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        scene.add(mesh);

        const dir = new THREE.Vector3(
          (Math.random() - 0.5) * 2,
          Math.random() * 1.8,
          (Math.random() - 0.5) * 2
        ).normalize().multiplyScalar(0.05 + Math.random() * 0.12);

        particles.push({
          mesh,
          velocity: dir,
          life: 1.0,
          maxLife: 1.0
        });
      }
    }

    function moveFoxToNearestCrystal() {
      if (!fox || crystals.length === 0) return;

      let nearest = crystals[0];
      let nearestDist = fox.position.distanceTo(new THREE.Vector3(nearest.position.x, 0, nearest.position.z));

      for (const crystal of crystals) {
        const d = fox.position.distanceTo(new THREE.Vector3(crystal.position.x, 0, crystal.position.z));
        if (d < nearestDist) {
          nearest = crystal;
          nearestDist = d;
        }
      }

      foxMoveStart = fox.position.clone();
      foxMoveTarget = new THREE.Vector3(nearest.position.x, fox.position.y, nearest.position.z + 1.2);
      foxMoveEnd = foxMoveTarget.clone();

      const lookTarget = new THREE.Vector3(nearest.position.x, fox.position.y, nearest.position.z);
      fox.lookAt(lookTarget);

      if (resonanceActive) {
        if (foxActions.run) playFoxAnimation('run');
        else if (foxActions.walk) playFoxAnimation('walk');
      } else {
        if (foxActions.walk) playFoxAnimation('walk');
      }
    }

    function clearCrystals() {
      crystals.forEach(c => scene.remove(c.mesh));
      crystals.length = 0;
    }

    function spawnCrystalRing() {
      ringPlanted = true;
      const radius = 4;
      for (let i = 0; i < 6; i++) {
        if (crystals.length >= MAX_CRYSTALS) break;
        const angle = (i / 6) * Math.PI * 2;
        const x = Math.cos(angle) * radius;
        const z = Math.sin(angle) * radius;
        plantCrystal(x, z, false);
      }
    }

    function updateCrystals(elapsedTime) {
      if (!growthEnabled) return;

      totalGrowthCycles++;

      const now = performance.now();

      crystals.forEach(crystal => {
        if (crystal.growthPhase === 'seed') {
          if (now - crystal.plantedAt >= crystal.growStartDelay) {
            crystal.growthPhase = 'growing';
          }
        }

        if (crystal.growthPhase === 'growing') {
          crystal.height += crystal.growthRate * timeSpeed;
          crystal.baseRadius += 0.003 * timeSpeed;

          if (crystal.height >= 3.0) {
            crystal.height = 3.0;
            crystal.growthPhase = resonanceActive ? 'resonating' : 'mature';
          }
          updateCrystalMesh(crystal);
        }

        const mat = crystal.mesh.userData.material;
        if (mat) {
          if (crystal.growthPhase === 'seed') {
            mat.emissiveIntensity = 0.08;
          } else if (crystal.growthPhase === 'growing') {
            mat.emissiveIntensity = 0.15;
          } else if (crystal.growthPhase === 'mature') {
            mat.emissiveIntensity = 0.25;
          } else if (crystal.growthPhase === 'resonating') {
            mat.emissiveIntensity = 0.35 + Math.sin(elapsedTime * Math.PI * 4) * 0.5;
          }
        }
      });
    }

    function updateParticles(delta) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta;
        p.mesh.position.addScaledVector(p.velocity, delta * 8);
        p.velocity.y -= delta * 0.2;
        p.mesh.material.opacity = Math.max(p.life / p.maxLife, 0);

        if (p.life <= 0) {
          scene.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          particles.splice(i, 1);
        }
      }
    }

    function updateFox(delta) {
      if (foxMixer) foxMixer.update(delta);

      if (fox && foxMoveStart && foxMoveEnd) {
        foxMoveDuration -= delta;
        const t = 1 - Math.max(foxMoveDuration, 0) / 1.0;
        fox.position.lerpVectors(foxMoveStart, foxMoveEnd, THREE.MathUtils.smoothstep(t, 0, 1));

        if (t >= 1) {
          foxMoveStart = null;
          foxMoveEnd = null;
          foxMoveDuration = 1.0;
          if (resonanceActive) {
            if (foxActions.run) playFoxAnimation('run');
            else if (foxActions.walk) playFoxAnimation('walk');
          } else {
            playFoxAnimation('idle');
          }
        }
      }
    }

    function updateHUD() {
      const matureCount = crystals.filter(c => c.growthPhase === 'mature' || c.growthPhase === 'resonating').length;
      hudLeft.textContent = `Crystals: ${crystals.length}/${MAX_CRYSTALS} | Mature: ${matureCount} | Harvested: ${harvestCount}`;
      hudRight.textContent = `Growth: ${growthEnabled ? 'ON' : 'OFF'} | Speed: ${timeSpeed}x | Resonance: ${resonanceActive ? 'ON' : 'OFF'}`;
    }

    function syncState() {
      const matureCount = crystals.filter(c => c.growthPhase === 'mature' || c.growthPhase === 'resonating').length;
      const tallest = crystals.length ? Math.max(...crystals.map(c => c.height)) : 0;

      window.__3D_STATE__ = {
        crystalCount: crystals.length,
        matureCount,
        harvestCount,
        growthEnabled,
        timeSpeed,
        resonanceActive,
        foxPosition: fox
          ? { x: fox.position.x, y: fox.position.y, z: fox.position.z }
          : { x: 0, y: 0, z: 5 },
        foxAnimationPlaying: activeFoxAction,
        tallestCrystalHeight: tallest,
        crystalColors: crystals.map(c => c.color),
        lastHarvestParticles: particles.length,
        totalGrowthCycles,
        crystalPhases: crystals.map(c => c.growthPhase),
        ringPlanted
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      controls.update();
      updateCrystals(elapsed);
      updateParticles(delta);
      updateFox(delta);
      updateHUD();
      syncState();

      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
