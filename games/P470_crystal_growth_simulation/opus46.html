<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crystal Garden - Fox Guardian</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud-top-left {
    position: absolute; top: 15px; left: 15px;
    color: #00ffff; font-size: 14px;
    background: rgba(0,0,0,0.7); padding: 10px 15px;
    border: 1px solid rgba(0,255,255,0.3); border-radius: 8px;
    text-shadow: 0 0 10px rgba(0,255,255,0.5);
    pointer-events: none;
}
#hud-top-right {
    position: absolute; top: 15px; right: 15px;
    color: #ff44ff; font-size: 14px;
    background: rgba(0,0,0,0.7); padding: 10px 15px;
    border: 1px solid rgba(255,68,255,0.3); border-radius: 8px;
    text-shadow: 0 0 10px rgba(255,68,255,0.5);
    text-align: right;
    pointer-events: none;
}
#hud-bottom {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    color: #aaaacc; font-size: 12px;
    background: rgba(0,0,0,0.7); padding: 8px 20px;
    border: 1px solid rgba(170,170,204,0.3); border-radius: 8px;
    text-align: center; white-space: nowrap;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud-top-left">Crystals: 0/12 | Mature: 0 | Harvested: 0</div>
<div id="hud-top-right">Growth: ON | Speed: 1x | Resonance: OFF</div>
<div id="hud-bottom">Click ground to plant | G:Growth | R:Resonate | H:Harvest | F:Fox Move | C:Clear | T:Speed | SPACE:Ring</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
    crystalCount: 0,
    matureCount: 0,
    harvestCount: 0,
    growthEnabled: true,
    timeSpeed: 1,
    resonanceActive: false,
    foxPosition: { x: 0, y: 0, z: 5 },
    foxAnimationPlaying: 'idle',
    tallestCrystalHeight: 0,
    crystalColors: [],
    lastHarvestParticles: 0,
    totalGrowthCycles: 0,
    crystalPhases: [],
    ringPlanted: false
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1, 0);

// ============ BACKGROUND ============
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const gradient = bgCtx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#000000');
gradient.addColorStop(0.5, '#0a0015');
gradient.addColorStop(1, '#1a0033');
bgCtx.fillStyle = gradient;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
bgTexture.mapping = THREE.EquirectangularReflectionMapping;
scene.background = bgTexture;

// ============ GROUND ============
const groundGeom = new THREE.PlaneGeometry(30, 30, 30, 30);
const groundCanvas = document.createElement('canvas');
groundCanvas.width = 512;
groundCanvas.height = 512;
const gCtx = groundCanvas.getContext('2d');
gCtx.fillStyle = '#0a0a15';
gCtx.fillRect(0, 0, 512, 512);
gCtx.strokeStyle = 'rgba(100, 60, 180, 0.15)';
gCtx.lineWidth = 1;
for (let i = 0; i <= 30; i++) {
    const p = (i / 30) * 512;
    gCtx.beginPath(); gCtx.moveTo(p, 0); gCtx.lineTo(p, 512); gCtx.stroke();
    gCtx.beginPath(); gCtx.moveTo(0, p); gCtx.lineTo(512, p); gCtx.stroke();
}
const groundTex = new THREE.CanvasTexture(groundCanvas);
groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
const groundMat = new THREE.MeshStandardMaterial({
    map: groundTex,
    roughness: 0.3,
    metalness: 0.7,
    color: 0x111122,
    envMapIntensity: 0.5
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x4444ff, 0.3);
scene.add(ambientLight);

const pointLight1 = new THREE.PointLight(0xffffff, 1.0, 50);
pointLight1.position.set(5, 10, 5);
pointLight1.castShadow = true;
pointLight1.shadow.mapSize.set(1024, 1024);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff44ff, 0.6, 40);
pointLight2.position.set(-5, 8, -3);
scene.add(pointLight2);

// ============ FOX ============
let foxModel = null;
let foxMixer = null;
let foxAnimations = [];
let foxCurrentAction = null;
let foxTargetPos = null;
let foxLerpStart = null;
let foxLerpTime = 0;
let foxLerpDuration = 1.0;

const loader = new GLTFLoader();
loader.load(
    'https://threejs.org/examples/models/gltf/Fox.glb',
    (gltf) => {
        foxModel = gltf.scene;
        foxModel.scale.set(0.05, 0.05, 0.05);
        foxModel.position.set(0, 0, 5);
        foxModel.rotation.y = Math.PI;
        foxModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(foxModel);

        foxMixer = new THREE.AnimationMixer(foxModel);
        foxAnimations = gltf.animations;
        if (foxAnimations.length > 0) {
            foxCurrentAction = foxMixer.clipAction(foxAnimations[0]);
            foxCurrentAction.play();
            window.__3D_STATE__.foxAnimationPlaying = 'idle';
        }
    },
    undefined,
    (error) => {
        console.warn('Fox model failed to load:', error);
        // Create placeholder fox
        const foxGroup = new THREE.Group();
        const bodyGeom = new THREE.ConeGeometry(0.3, 0.8, 4);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0x331100 });
        const body = new THREE.Mesh(bodyGeom, bodyMat);
        body.rotation.z = Math.PI / 2;
        body.position.y = 0.5;
        foxGroup.add(body);

        const headGeom = new THREE.SphereGeometry(0.25, 8, 8);
        const head = new THREE.Mesh(headGeom, bodyMat);
        head.position.set(0, 0.7, -0.4);
        foxGroup.add(head);

        const earGeom = new THREE.ConeGeometry(0.08, 0.2, 3);
        const ear1 = new THREE.Mesh(earGeom, bodyMat);
        ear1.position.set(-0.12, 0.95, -0.4);
        foxGroup.add(ear1);
        const ear2 = new THREE.Mesh(earGeom, bodyMat);
        ear2.position.set(0.12, 0.95, -0.4);
        foxGroup.add(ear2);

        foxGroup.position.set(0, 0, 5);
        foxGroup.rotation.y = Math.PI;
        foxModel = foxGroup;
        scene.add(foxGroup);
    }
);

function playFoxAnimation(name) {
    if (!foxMixer || foxAnimations.length === 0) return;
    let clipIndex = 0;
    if (name === 'walk' && foxAnimations.length > 1) clipIndex = 1;
    if (name === 'run' && foxAnimations.length > 2) clipIndex = 2;
    else if (name === 'run' && foxAnimations.length > 1) clipIndex = 1;

    const newAction = foxMixer.clipAction(foxAnimations[clipIndex]);
    if (foxCurrentAction && foxCurrentAction !== newAction) {
        foxCurrentAction.fadeOut(0.3);
        newAction.reset().fadeIn(0.3).play();
    } else if (!foxCurrentAction) {
        newAction.play();
    }
    foxCurrentAction = newAction;
    window.__3D_STATE__.foxAnimationPlaying = name;
}

// ============ CRYSTAL SYSTEM ============
const crystals = [];
const crystalColors = ['#00ffff', '#ff00ff', '#ffff00', '#00ff88', '#ff4488', '#8844ff'];
let colorIndex = 0;
let crystalIdCounter = 0;
const MAX_CRYSTALS = 12;

function createCrystalMesh(crystal) {
    const group = new THREE.Group();

    const color = new THREE.Color(crystal.color);

    // Main crystal body
    const bodyGeom = new THREE.CylinderGeometry(
        crystal.baseRadius * 0.6,
        crystal.baseRadius,
        1, // unit height, scaled later
        crystal.segments,
        1
    );
    const bodyMat = new THREE.MeshPhysicalMaterial({
        color: color,
        transmission: 0.5,
        roughness: 0.1,
        metalness: 0.2,
        emissive: color,
        emissiveIntensity: 0.1,
        transparent: true,
        opacity: 0.85,
        thickness: 0.5,
        clearcoat: 1.0,
        clearcoatRoughness: 0.1,
        side: THREE.DoubleSide
    });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = 0.5;
    body.castShadow = true;
    group.add(body);

    // Crystal tip
    const tipGeom = new THREE.ConeGeometry(
        crystal.baseRadius * 0.6,
        0.4,
        crystal.segments,
        1
    );
    const tipMat = bodyMat.clone();
    tipMat.emissiveIntensity = 0.2;
    const tip = new THREE.Mesh(tipGeom, tipMat);
    tip.position.y = 1.2;
    tip.castShadow = true;
    group.add(tip);

    // Inner glow
    const glowGeom = new THREE.SphereGeometry(crystal.baseRadius * 0.3, 8, 8);
    const glowMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.3
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    glow.position.y = 0.5;
    group.add(glow);

    // Small secondary crystals
    for (let i = 0; i < 3; i++) {
        const angle = (i / 3) * Math.PI * 2 + Math.random() * 0.5;
        const dist = crystal.baseRadius * 0.8;
        const smallGeom = new THREE.CylinderGeometry(
            crystal.baseRadius * 0.15,
            crystal.baseRadius * 0.25,
            0.5,
            crystal.segments,
            1
        );
        const smallMat = bodyMat.clone();
        const small = new THREE.Mesh(smallGeom, smallMat);
        small.position.set(
            Math.cos(angle) * dist,
            0.25,
            Math.sin(angle) * dist
        );
        small.rotation.z = (Math.random() - 0.5) * 0.3;
        small.rotation.x = (Math.random() - 0.5) * 0.3;
        group.add(small);
    }

    group.position.set(crystal.position.x, crystal.position.y, crystal.position.z);
    group.scale.set(1, crystal.height / 3.0, 1);

    crystal.mesh = group;
    crystal.bodyMat = bodyMat;
    crystal.tipMat = tipMat;
    crystal.glowMat = glowMat;

    return group;
}

function plantCrystal(x, z) {
    if (crystals.length >= MAX_CRYSTALS) return;

    const crystal = {
        id: crystalIdCounter++,
        position: { x, y: 0, z },
        height: 0.1,
        baseRadius: 0.15,
        color: crystalColors[colorIndex % crystalColors.length],
        growthRate: 0.02,
        growthPhase: 'seed',
        segments: Math.floor(Math.random() * 4) + 5,
        seedTime: performance.now(),
        mesh: null,
        bodyMat: null,
        tipMat: null,
        glowMat: null
    };

    colorIndex++;
    const mesh = createCrystalMesh(crystal);
    scene.add(mesh);
    crystals.push(crystal);

    // Transition to growing after 0.5s
    setTimeout(() => {
        if (crystal.growthPhase === 'seed') {
            crystal.growthPhase = 'growing';
        }
    }, 500);
}

// ============ PARTICLES ============
let harvestParticles = [];

function createHarvestBurst(position, color) {
    const particles = [];
    for (let i = 0; i < 20; i++) {
        const geom = new THREE.SphereGeometry(0.05, 4, 4);
        const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color(color),
            transparent: true,
            opacity: 1.0
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.copy(new THREE.Vector3(position.x, position.y + 1.5, position.z));

        const velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 8,
            Math.random() * 5 + 2,
            (Math.random() - 0.5) * 8
        );

        scene.add(mesh);
        particles.push({
            mesh,
            mat,
            velocity,
            life: 1.0,
            decay: 1.0 // per second
        });
    }
    harvestParticles = harvestParticles.concat(particles);
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(ground);

    if (intersects.length > 0) {
        const point = intersects[0].point;
        plantCrystal(point.x, point.z);
    }
});

// ============ KEYBOARD ============
let growthEnabled = true;
let timeSpeed = 1;
let resonanceActive = false;
let harvestCount = 0;
let ringPlanted = false;

document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'g') {
        growthEnabled = !growthEnabled;
        window.__3D_STATE__.growthEnabled = growthEnabled;
    }

    if (key === 'r') {
        resonanceActive = !resonanceActive;
        window.__3D_STATE__.resonanceActive = resonanceActive;
        if (resonanceActive) {
            crystals.forEach(c => {
                if (c.growthPhase === 'mature') c.growthPhase = 'resonating';
            });
            playFoxAnimation('run');
        } else {
            crystals.forEach(c => {
                if (c.growthPhase === 'resonating') c.growthPhase = 'mature';
            });
            playFoxAnimation('idle');
        }
    }

    if (key === 'h') {
        // Harvest tallest mature crystal
        let tallest = null;
        let tallestIdx = -1;
        crystals.forEach((c, i) => {
            if ((c.growthPhase === 'mature' || c.growthPhase === 'resonating') && (!tallest || c.height > tallest.height)) {
                tallest = c;
                tallestIdx = i;
            }
        });
        if (tallest && tallestIdx >= 0) {
            createHarvestBurst(tallest.position, tallest.color);
            scene.remove(tallest.mesh);
            crystals.splice(tallestIdx, 1);
            harvestCount++;
        }
    }

    if (key === 'f') {
        if (foxModel && crystals.length > 0) {
            // Find nearest crystal to fox
            let nearest = null;
            let nearestDist = Infinity;
            const foxPos = foxModel.position;
            crystals.forEach(c => {
                const dx = c.position.x - foxPos.x;
                const dz = c.position.z - foxPos.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < nearestDist) {
                    nearestDist = dist;
                    nearest = c;
                }
            });
            if (nearest) {
                foxTargetPos = new THREE.Vector3(nearest.position.x, 0, nearest.position.z + 1);
                foxLerpStart = foxModel.position.clone();
                foxLerpTime = 0;
                foxLerpDuration = 1.0;
                playFoxAnimation('walk');

                // Face toward crystal
                const dir = new THREE.Vector3(
                    nearest.position.x - foxModel.position.x,
                    0,
                    nearest.position.z - foxModel.position.z
                ).normalize();
                foxModel.rotation.y = Math.atan2(dir.x, dir.z);
            }
        }
    }

    if (key === 'c') {
        crystals.forEach(c => scene.remove(c.mesh));
        crystals.length = 0;
    }

    if (key === 't') {
        timeSpeed = timeSpeed === 1 ? 3 : 1;
        window.__3D_STATE__.timeSpeed = timeSpeed;
    }

    if (key === ' ') {
        event.preventDefault();
        // Crystal ring
        for (let i = 0; i < 6; i++) {
            if (crystals.length >= MAX_CRYSTALS) break;
            const angle = (i / 6) * Math.PI * 2;
            const x = Math.cos(angle) * 4;
            const z = Math.sin(angle) * 4;
            plantCrystal(x, z);
        }
        ringPlanted = true;
        window.__3D_STATE__.ringPlanted = true;
    }
});

// ============ FLOATING PARTICLES (ambient) ============
const ambientParticles = [];
for (let i = 0; i < 50; i++) {
    const geom = new THREE.SphereGeometry(0.02, 4, 4);
    const mat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(Math.random() * 0.3 + 0.5, 1, 0.7),
        transparent: true,
        opacity: 0.5
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(
        (Math.random() - 0.5) * 20,
        Math.random() * 5 + 0.5,
        (Math.random() - 0.5) * 20
    );
    scene.add(mesh);
    ambientParticles.push({
        mesh,
        speed: Math.random() * 0.5 + 0.2,
        offset: Math.random() * Math.PI * 2,
        baseY: mesh.position.y
    });
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    // Update controls
    controls.update();

    // Update fox mixer
    if (foxMixer) {
        foxMixer.update(delta);
    }

    // Fox lerp movement
    if (foxModel && foxTargetPos) {
        foxLerpTime += delta;
        const t = Math.min(foxLerpTime / foxLerpDuration, 1.0);
        const eased = t * t * (3 - 2 * t); // smoothstep
        foxModel.position.lerpVectors(foxLerpStart, foxTargetPos, eased);
        if (t >= 1.0) {
            foxTargetPos = null;
            playFoxAnimation(resonanceActive ? 'run' : 'idle');
        }
    }

    // Update fox state
    if (foxModel) {
        window.__3D_STATE__.foxPosition = {
            x: foxModel.position.x,
            y: foxModel.position.y,
            z: foxModel.position.z
        };
    }

    // Crystal growth
    if (growthEnabled) {
        window.__3D_STATE__.totalGrowthCycles++;
        crystals.forEach(crystal => {
            if (crystal.growthPhase === 'growing') {
                crystal.height += crystal.growthRate * timeSpeed;
                crystal.baseRadius += 0.003 * timeSpeed;

                if (crystal.height >= 3.0) {
                    crystal.height = 3.0;
                    crystal.growthPhase = resonanceActive ? 'resonating' : 'mature';
                }

                // Update mesh scale
                if (crystal.mesh) {
                    crystal.mesh.scale.set(
                        1 + (crystal.baseRadius - 0.15) * 2,
                        crystal.height / 3.0,
                        1 + (crystal.baseRadius - 0.15) * 2
                    );
                }
            }
        });
    }

    // Resonance effect
    if (resonanceActive) {
        crystals.forEach(crystal => {
            if (crystal.growthPhase === 'resonating' || crystal.growthPhase === 'mature') {
                if (crystal.growthPhase === 'mature') crystal.growthPhase = 'resonating';
                const intensity = 0.1 + Math.sin(time * 2 * Math.PI * 2) * 0.5 * 0.5 + 0.25;
                if (crystal.bodyMat) crystal.bodyMat.emissiveIntensity = Math.max(0, intensity);
                if (crystal.tipMat) crystal.tipMat.emissiveIntensity = Math.max(0, intensity * 1.5);
                if (crystal.glowMat) crystal.glowMat.opacity = 0.3 + Math.sin(time * 4 * Math.PI) * 0.2;
            }
        });
    } else {
        crystals.forEach(crystal => {
            if (crystal.growthPhase === 'resonating') crystal.growthPhase = 'mature';
            if (crystal.bodyMat) crystal.bodyMat.emissiveIntensity = 0.1;
            if (crystal.tipMat) crystal.tipMat.emissiveIntensity = 0.2;
        });
    }

    // Update harvest particles
    const toRemove = [];
    harvestParticles.forEach((p, i) => {
        p.life -= p.decay * delta;
        p.velocity.y -= 9.8 * delta;
        p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
        p.mat.opacity = Math.max(0, p.life);
        if (p.life <= 0) {
            scene.remove(p.mesh);
            toRemove.push(i);
        }
    });
    for (let i = toRemove.length - 1; i >= 0; i--) {
        harvestParticles.splice(toRemove[i], 1);
    }

    // Ambient particles
    ambientParticles.forEach(p => {
        p.mesh.position.y = p.baseY + Math.sin(time * p.speed + p.offset) * 0.5;
        p.mesh.position.x += Math.sin(time * 0.3 + p.offset) * 0.002;
        p.mesh.position.z += Math.cos(time * 0.3 + p.offset) * 0.002;
    });

    // Subtle crystal rotation/shimmer
    crystals.forEach(crystal => {
        if (crystal.mesh) {
            crystal.mesh.rotation.y += delta * 0.1;
        }
    });

    // ============ SYNC STATE ============
    let matureCount = 0;
    let tallestHeight = 0;
    const activeColors = [];
    const phases = [];

    crystals.forEach(c => {
        if (c.growthPhase === 'mature' || c.growthPhase === 'resonating') matureCount++;
        if (c.height > tallestHeight) tallestHeight = c.height;
        activeColors.push(c.color);
        phases.push(c.growthPhase);
    });

    window.__3D_STATE__.crystalCount = crystals.length;
    window.__3D_STATE__.matureCount = matureCount;
    window.__3D_STATE__.harvestCount = harvestCount;
    window.__3D_STATE__.growthEnabled = growthEnabled;
    window.__3D_STATE__.timeSpeed = timeSpeed;
    window.__3D_STATE__.resonanceActive = resonanceActive;
    window.__3D_STATE__.tallestCrystalHeight = tallestHeight;
    window.__3D_STATE__.crystalColors = activeColors;
    window.__3D_STATE__.lastHarvestParticles = harvestParticles.length;
    window.__3D_STATE__.crystalPhases = phases;
    window.__3D_STATE__.ringPlanted = ringPlanted;

    // ============ UPDATE HUD ============
    document.getElementById('hud-top-left').textContent =
        `Crystals: ${crystals.length}/12 | Mature: ${matureCount} | Harvested: ${harvestCount}`;
    document.getElementById('hud-top-right').textContent =
        `Growth: ${growthEnabled ? 'ON' : 'OFF'} | Speed: ${timeSpeed}x | Resonance: ${resonanceActive ? 'ON' : 'OFF'}`;

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
