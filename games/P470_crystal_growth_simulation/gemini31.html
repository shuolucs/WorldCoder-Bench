<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystical Crystal Garden</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(10, 0, 20, 0.7);
            border: 1px solid rgba(100, 50, 255, 0.3);
            border-radius: 8px;
            padding: 15px;
            color: #e0d0ff;
            text-shadow: 0 0 5px rgba(200, 150, 255, 0.5);
            pointer-events: none;
            backdrop-filter: blur(4px);
        }
        #top-left {
            top: 20px;
            left: 20px;
        }
        #top-right {
            top: 20px;
            right: 20px;
            text-align: right;
        }
        #bottom-center {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 14px;
            white-space: nowrap;
        }
        .highlight {
            color: #fff;
            font-weight: bold;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="top-left" class="ui-panel">
        <div>Crystals: <span id="ui-count" class="highlight">0</span>/12</div>
        <div>Mature: <span id="ui-mature" class="highlight">0</span></div>
        <div>Harvested: <span id="ui-harvested" class="highlight">0</span></div>
    </div>

    <div id="top-right" class="ui-panel">
        <div>Growth: <span id="ui-growth" class="highlight">ON</span></div>
        <div>Speed: <span id="ui-speed" class="highlight">1x</span></div>
        <div>Resonance: <span id="ui-resonance" class="highlight">OFF</span></div>
    </div>

    <div id="bottom-center" class="ui-panel">
        Click ground to plant | <span class="highlight">G</span>:Growth | <span class="highlight">R</span>:Resonate | <span class="highlight">H</span>:Harvest | <span class="highlight">F</span>:Fox Move | <span class="highlight">C</span>:Clear | <span class="highlight">T</span>:Speed | <span class="highlight">SPACE</span>:Ring
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            crystalCount: 0,
            matureCount: 0,
            harvestCount: 0,
            growthEnabled: true,
            timeSpeed: 1,
            resonanceActive: false,
            foxPosition: { x: 0, y: 0, z: 5 },
            foxAnimationPlaying: 'none',
            tallestCrystalHeight: 0,
            crystalColors: [],
            lastHarvestParticles: 0,
            totalGrowthCycles: 0,
            crystalPhases: [],
            ringPlanted: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        // Gradient Skybox
        const canvas = document.createElement('canvas');
        canvas.width = 2; canvas.height = 2;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 2);
        gradient.addColorStop(0, '#1a0033');
        gradient.addColorStop(1, '#000000');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 2, 2);
        scene.background = new THREE.CanvasTexture(canvas);
        scene.fog = new THREE.FogExp2('#0a001a', 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.05; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x4444ff, 0.3);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xffffff, 1.0, 50);
        pointLight1.position.set(5, 10, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xff44ff, 0.6, 50);
        pointLight2.position.set(-5, 8, -3);
        scene.add(pointLight2);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.2, 
            metalness: 0.8 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(30, 30, 0x330066, 0x220044);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Fox Model ---
        let fox, mixer;
        const foxActions = {};
        const gltfLoader = new GLTFLoader();
        
        gltfLoader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', (gltf) => {
            fox = gltf.scene;
            fox.scale.set(0.05, 0.05, 0.05);
            fox.position.set(0, 0, 5);
            fox.rotation.y = Math.PI;
            
            // Adjust materials for darker scene
            fox.traverse((child) => {
                if (child.isMesh) {
                    child.material.envMapIntensity = 0.5;
                }
            });

            scene.add(fox);

            mixer = new THREE.AnimationMixer(fox);
            if (gltf.animations.length > 0) {
                foxActions.idle = mixer.clipAction(gltf.animations[0]); // Survey
                foxActions.walk = mixer.clipAction(gltf.animations[1]); // Walk
                foxActions.run = mixer.clipAction(gltf.animations[2]);  // Run
                
                foxActions.idle.play();
                window.__3D_STATE__.foxAnimationPlaying = 'idle';
            }
        });

        // --- Crystal System ---
        const MAX_CRYSTALS = 12;
        const CRYSTAL_COLORS = ['#00ffff', '#ff00ff', '#ffff00', '#00ff88', '#ff4488', '#8844ff'];
        let colorIndex = 0;
        let crystals = [];
        let crystalIdCounter = 0;

        // Base geometry for crystals (cone-like cylinder)
        // Translated so origin is at the bottom
        const crystalGeo = new THREE.CylinderGeometry(0.02, 1, 1, 6);
        crystalGeo.translate(0, 0.5, 0);

        function createCrystal(position) {
            if (crystals.length >= MAX_CRYSTALS) return;

            const colorHex = CRYSTAL_COLORS[colorIndex];
            colorIndex = (colorIndex + 1) % CRYSTAL_COLORS.length;

            const material = new THREE.MeshPhysicalMaterial({
                color: new THREE.Color(colorHex),
                emissive: new THREE.Color(colorHex),
                emissiveIntensity: 0.2,
                transmission: 0.5,
                opacity: 1,
                transparent: true,
                roughness: 0.1,
                metalness: 0.2,
                ior: 1.5,
                thickness: 0.5
            });

            const mesh = new THREE.Mesh(crystalGeo, material);
            mesh.position.copy(position);
            mesh.position.y = 0;
            
            // Random rotation around Y
            mesh.rotation.y = Math.random() * Math.PI * 2;
            
            // Initial scale (seed)
            mesh.scale.set(0.15, 0.1, 0.15);
            scene.add(mesh);

            const crystal = {
                id: crystalIdCounter++,
                mesh: mesh,
                position: { x: position.x, y: 0, z: position.z },
                height: 0.1,
                baseRadius: 0.15,
                color: colorHex,
                growthRate: 0.02,
                phase: 'seed',
                age: 0,
                segments: 6
            };

            crystals.push(crystal);
            updateUI();
        }

        // --- Particles System ---
        let particles = [];
        const particleGeo = new THREE.SphereGeometry(0.1, 4, 4);

        function spawnHarvestParticles(position, colorHex, height) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: new THREE.Color(colorHex), 
                transparent: true, 
                opacity: 1 
            });
            
            for (let i = 0; i < 20; i++) {
                const pMesh = new THREE.Mesh(particleGeo, mat);
                pMesh.position.copy(position);
                pMesh.position.y += height / 2; // Spawn around middle
                scene.add(pMesh);
                
                particles.push({
                    mesh: pMesh,
                    velocity: new THREE.Vector3(
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 8 + 2,
                        (Math.random() - 0.5) * 8
                    ),
                    life: 1.0
                });
            }
            window.__3D_STATE__.lastHarvestParticles = 20;
        }

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                createCrystal(intersects[0].point);
            }
        });

        let foxMoveTarget = null;
        let foxMoveStart = null;
        let foxMoveProgress = 0;

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();

            if (key === 'g') {
                window.__3D_STATE__.growthEnabled = !window.__3D_STATE__.growthEnabled;
                document.getElementById('ui-growth').innerText = window.__3D_STATE__.growthEnabled ? 'ON' : 'OFF';
            } 
            else if (key === 'r') {
                window.__3D_STATE__.resonanceActive = !window.__3D_STATE__.resonanceActive;
                document.getElementById('ui-resonance').innerText = window.__3D_STATE__.resonanceActive ? 'ON' : 'OFF';
                
                // Update Fox Animation
                if (fox && foxActions.idle && foxActions.run && !foxMoveTarget) {
                    if (window.__3D_STATE__.resonanceActive) {
                        foxActions.idle.stop();
                        if(foxActions.walk) foxActions.walk.stop();
                        foxActions.run.play();
                        window.__3D_STATE__.foxAnimationPlaying = 'run';
                    } else {
                        foxActions.run.stop();
                        if(foxActions.walk) foxActions.walk.stop();
                        foxActions.idle.play();
                        window.__3D_STATE__.foxAnimationPlaying = 'idle';
                    }
                }

                // Update crystal phases
                crystals.forEach(c => {
                    if (c.phase === 'mature' && window.__3D_STATE__.resonanceActive) {
                        c.phase = 'resonating';
                    } else if (c.phase === 'resonating' && !window.__3D_STATE__.resonanceActive) {
                        c.phase = 'mature';
                        c.mesh.material.emissiveIntensity = 0.2; // Reset
                    }
                });
            }
            else if (key === 'h') {
                let tallest = null;
                let tallestIdx = -1;
                
                for (let i = 0; i < crystals.length; i++) {
                    const c = crystals[i];
                    if (c.phase === 'mature' || c.phase === 'resonating') {
                        if (!tallest || c.height > tallest.height) {
                            tallest = c;
                            tallestIdx = i;
                        }
                    }
                }

                if (tallest) {
                    spawnHarvestParticles(tallest.mesh.position, tallest.color, tallest.height);
                    scene.remove(tallest.mesh);
                    tallest.mesh.material.dispose();
                    crystals.splice(tallestIdx, 1);
                    window.__3D_STATE__.harvestCount++;
                    updateUI();
                }
            }
            else if (key === 'f') {
                if (crystals.length > 0 && fox && !foxMoveTarget) {
                    let nearest = crystals[0];
                    let minDist = fox.position.distanceTo(nearest.mesh.position);
                    
                    for (let i = 1; i < crystals.length; i++) {
                        let d = fox.position.distanceTo(crystals[i].mesh.position);
                        if (d < minDist) {
                            minDist = d;
                            nearest = crystals[i];
                        }
                    }

                    foxMoveStart = fox.position.clone();
                    const dir = new THREE.Vector3().subVectors(fox.position, nearest.mesh.position).normalize();
                    // Target position slightly away from crystal
                    foxMoveTarget = nearest.mesh.position.clone().add(dir.multiplyScalar(1.5));
                    foxMoveTarget.y = 0;
                    foxMoveProgress = 0;
                    
                    fox.lookAt(nearest.mesh.position);

                    if (foxActions.walk && foxActions.idle && foxActions.run) {
                        foxActions.idle.stop();
                        foxActions.run.stop();
                        foxActions.walk.play();
                        window.__3D_STATE__.foxAnimationPlaying = 'walk';
                    }
                }
            }
            else if (key === 'c') {
                crystals.forEach(c => {
                    scene.remove(c.mesh);
                    c.mesh.material.dispose();
                });
                crystals = [];
                updateUI();
            }
            else if (key === 't') {
                window.__3D_STATE__.timeSpeed = window.__3D_STATE__.timeSpeed === 1 ? 3 : 1;
                document.getElementById('ui-speed').innerText = window.__3D_STATE__.timeSpeed + 'x';
            }
            else if (event.code === 'Space') {
                const radius = 4;
                const count = 6;
                for (let i = 0; i < count; i++) {
                    if (crystals.length >= MAX_CRYSTALS) break;
                    const angle = (i / count) * Math.PI * 2;
                    const x = Math.cos(angle) * radius;
                    const z = Math.sin(angle) * radius;
                    createCrystal(new THREE.Vector3(x, 0, z));
                }
                window.__3D_STATE__.ringPlanted = true;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateUI() {
            document.getElementById('ui-count').innerText = crystals.length;
            let mature = crystals.filter(c => c.phase === 'mature' || c.phase === 'resonating').length;
            document.getElementById('ui-mature').innerText = mature;
            document.getElementById('ui-harvested').innerText = window.__3D_STATE__.harvestCount;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let resonanceTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const timeSpeed = window.__3D_STATE__.timeSpeed;
            const activeDelta = delta * timeSpeed;

            controls.update();

            if (mixer) mixer.update(delta); // Fox animation runs at normal speed

            // Fox Movement
            if (foxMoveTarget && fox) {
                foxMoveProgress += delta; // Move takes 1 second real time
                if (foxMoveProgress >= 1) {
                    fox.position.copy(foxMoveTarget);
                    foxMoveTarget = null;
                    
                    // Revert animation
                    if (foxActions.walk) foxActions.walk.stop();
                    if (window.__3D_STATE__.resonanceActive && foxActions.run) {
                        foxActions.run.play();
                        window.__3D_STATE__.foxAnimationPlaying = 'run';
                    } else if (foxActions.idle) {
                        foxActions.idle.play();
                        window.__3D_STATE__.foxAnimationPlaying = 'idle';
                    }
                } else {
                    fox.position.lerpVectors(foxMoveStart, foxMoveTarget, foxMoveProgress);
                }
            }

            // Crystal Logic
            let maxH = 0;
            let matureC = 0;
            let colorsArr = [];
            let phasesArr = [];

            if (window.__3D_STATE__.growthEnabled) {
                window.__3D_STATE__.totalGrowthCycles++;
            }

            if (window.__3D_STATE__.resonanceActive) {
                resonanceTime += delta;
            }

            for (let i = 0; i < crystals.length; i++) {
                const c = crystals[i];
                
                if (window.__3D_STATE__.growthEnabled) {
                    c.age += activeDelta;

                    if (c.phase === 'seed' && c.age > 0.5) {
                        c.phase = 'growing';
                    }

                    if (c.phase === 'growing') {
                        c.height += c.growthRate * timeSpeed;
                        c.baseRadius += 0.003 * timeSpeed;
                        
                        if (c.height >= 3.0) {
                            c.height = 3.0;
                            c.phase = window.__3D_STATE__.resonanceActive ? 'resonating' : 'mature';
                        }
                        
                        c.mesh.scale.set(c.baseRadius, c.height, c.baseRadius);
                    }
                }

                if (c.phase === 'resonating') {
                    // Oscillation: sin wave, amplitude 0.5, freq 2Hz -> 4*PI
                    const intensity = 0.2 + (Math.sin(resonanceTime * Math.PI * 4) * 0.5 + 0.5) * 0.5;
                    c.mesh.material.emissiveIntensity = intensity;
                }

                if (c.height > maxH) maxH = c.height;
                if (c.phase === 'mature' || c.phase === 'resonating') matureC++;
                
                colorsArr.push(c.color);
                phasesArr.push(c.phase);
            }

            // Particles Logic
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta;
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    p.mesh.position.addScaledVector(p.velocity, delta);
                    p.mesh.scale.setScalar(p.life);
                    p.mesh.material.opacity = p.life;
                }
            }

            // Update State Object
            window.__3D_STATE__.crystalCount = crystals.length;
            window.__3D_STATE__.matureCount = matureC;
            if (fox) {
                window.__3D_STATE__.foxPosition = { x: fox.position.x, y: fox.position.y, z: fox.position.z };
            }
            window.__3D_STATE__.tallestCrystalHeight = maxH;
            window.__3D_STATE__.crystalColors = colorsArr;
            window.__3D_STATE__.crystalPhases = phasesArr;
            window.__3D_STATE__.lastHarvestParticles = particles.length;

            // Sync UI counts if changed
            if (document.getElementById('ui-mature').innerText != matureC) {
                document.getElementById('ui-mature').innerText = matureC;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
