<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a2e; }
canvas { display: block; }

#quizPanel {
  position: fixed; top: 10px; left: 10px; z-index: 100;
  background: rgba(10,10,46,0.92); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; padding: 16px; width: 320px; color: #fff;
  backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
#quizPanel h3 { margin-bottom: 8px; font-size: 16px; color: #da77f2; }
#quizPanel .quiz-info { display: flex; gap: 12px; margin-bottom: 8px; font-size: 13px; }
#quizPanel .quiz-info span { background: rgba(255,255,255,0.08); padding: 3px 8px; border-radius: 6px; }
#quizPanel #questionText { font-size: 14px; margin: 10px 0; min-height: 36px; line-height: 1.4; }
#quizPanel .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
#quizPanel .answer-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  color: #fff; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 13px;
  transition: all 0.2s;
}
#quizPanel .answer-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
#quizPanel .answer-btn.correct { background: rgba(105,219,124,0.4); border-color: #69db7c; }
#quizPanel .answer-btn.wrong { background: rgba(255,107,107,0.4); border-color: #ff6b6b; }
#quizPanel .answer-btn:disabled { cursor: default; opacity: 0.7; }
#startQuizBtn {
  background: linear-gradient(135deg, #da77f2, #74c0fc); border: none; color: #fff;
  padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
  width: 100%; margin-top: 8px; transition: transform 0.2s;
}
#startQuizBtn:hover { transform: scale(1.03); }
#timerBar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin: 8px 0; }
#timerFill { height: 100%; background: linear-gradient(90deg, #69db7c, #ffd43b, #ff6b6b); border-radius: 2px; transition: width 0.3s; width: 100%; }

#infoPanel {
  position: fixed; top: 50%; right: 10px; transform: translateY(-50%); z-index: 100;
  background: rgba(10,10,46,0.92); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px; padding: 20px; width: 280px; color: #fff;
  backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  display: none;
}
#infoPanel h2 { font-size: 28px; margin-bottom: 4px; }
#infoPanel .info-number { font-size: 14px; color: #aaa; }
#infoPanel .info-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 13px; }
#infoPanel .info-label { color: #aaa; }
#infoPanel .info-value { font-weight: 600; }
#infoPanel .category-badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-top: 8px; }

#filterBar {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); z-index: 100;
  display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;
  background: rgba(10,10,46,0.85); padding: 8px 12px; border-radius: 12px;
  backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
}
.filter-btn {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: #ccc; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px;
  transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.3); }

#hud {
  position: fixed; top: 10px; right: 10px; z-index: 100; text-align: right; color: #fff;
}
#hudScore { font-size: 32px; font-weight: 700; text-shadow: 0 0 20px rgba(218,119,242,0.5); }
#hudStreak { font-size: 18px; color: #ffd43b; }

#rotationBadge {
  position: fixed; bottom: 60px; right: 10px; z-index: 100;
  background: rgba(10,10,46,0.85); color: #74c0fc; padding: 5px 12px;
  border-radius: 8px; font-size: 12px; border: 1px solid rgba(116,192,252,0.3);
  display: none;
}
</style>
</head>
<body>

<div id="quizPanel">
  <h3>🧪 Periodic Table Quiz</h3>
  <div class="quiz-info">
    <span id="diffDisplay">Difficulty: 1</span>
    <span id="scoreDisplay">Score: 0</span>
    <span id="streakDisplay">Streak: 0</span>
  </div>
  <div id="timerBar"><div id="timerFill"></div></div>
  <div id="questionCounter" style="font-size:12px;color:#aaa;margin-bottom:4px;"></div>
  <div id="questionText">Click "Start Quiz" to begin!</div>
  <div class="answers" id="answersContainer" style="display:none;">
    <button class="answer-btn" id="ans0"></button>
    <button class="answer-btn" id="ans1"></button>
    <button class="answer-btn" id="ans2"></button>
    <button class="answer-btn" id="ans3"></button>
  </div>
  <button id="startQuizBtn">Start Quiz</button>
</div>

<div id="infoPanel">
  <div class="info-number" id="infoNumber"></div>
  <h2 id="infoSymbol"></h2>
  <div id="infoName" style="font-size:16px;margin-bottom:12px;color:#ccc;"></div>
  <div class="info-row"><span class="info-label">Atomic Mass</span><span class="info-value" id="infoMass"></span></div>
  <div class="info-row"><span class="info-label">Category</span><span class="info-value" id="infoCategory"></span></div>
  <div class="info-row"><span class="info-label">Electronegativity</span><span class="info-value" id="infoEN"></span></div>
  <div id="infoCategoryBadge"></div>
</div>

<div id="filterBar"></div>

<div id="hud">
  <div id="hudScore">0</div>
  <div id="hudStreak"></div>
</div>

<div id="rotationBadge">🔄 Auto-Rotate: ON</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

const ELEMENTS = [
  {number:1,symbol:"H",name:"Hydrogen",atomicMass:1.008,category:"nonmetal",group:1,period:1,electronegativity:2.20},
  {number:2,symbol:"He",name:"Helium",atomicMass:4.003,category:"noble gas",group:18,period:1,electronegativity:0},
  {number:3,symbol:"Li",name:"Lithium",atomicMass:6.941,category:"alkali metal",group:1,period:2,electronegativity:0.98},
  {number:4,symbol:"Be",name:"Beryllium",atomicMass:9.012,category:"alkaline earth",group:2,period:2,electronegativity:1.57},
  {number:5,symbol:"B",name:"Boron",atomicMass:10.81,category:"metalloid",group:13,period:2,electronegativity:2.04},
  {number:6,symbol:"C",name:"Carbon",atomicMass:12.011,category:"nonmetal",group:14,period:2,electronegativity:2.55},
  {number:7,symbol:"N",name:"Nitrogen",atomicMass:14.007,category:"nonmetal",group:15,period:2,electronegativity:3.04},
  {number:8,symbol:"O",name:"Oxygen",atomicMass:15.999,category:"nonmetal",group:16,period:2,electronegativity:3.44},
  {number:9,symbol:"F",name:"Fluorine",atomicMass:18.998,category:"halogen",group:17,period:2,electronegativity:3.98},
  {number:10,symbol:"Ne",name:"Neon",atomicMass:20.180,category:"noble gas",group:18,period:2,electronegativity:0},
  {number:11,symbol:"Na",name:"Sodium",atomicMass:22.990,category:"alkali metal",group:1,period:3,electronegativity:0.93},
  {number:12,symbol:"Mg",name:"Magnesium",atomicMass:24.305,category:"alkaline earth",group:2,period:3,electronegativity:1.31},
  {number:13,symbol:"Al",name:"Aluminium",atomicMass:26.982,category:"post-transition",group:13,period:3,electronegativity:1.61},
  {number:14,symbol:"Si",name:"Silicon",atomicMass:28.086,category:"metalloid",group:14,period:3,electronegativity:1.90},
  {number:15,symbol:"P",name:"Phosphorus",atomicMass:30.974,category:"nonmetal",group:15,period:3,electronegativity:2.19},
  {number:16,symbol:"S",name:"Sulfur",atomicMass:32.065,category:"nonmetal",group:16,period:3,electronegativity:2.58},
  {number:17,symbol:"Cl",name:"Chlorine",atomicMass:35.453,category:"halogen",group:17,period:3,electronegativity:3.16},
  {number:18,symbol:"Ar",name:"Argon",atomicMass:39.948,category:"noble gas",group:18,period:3,electronegativity:0},
  {number:19,symbol:"K",name:"Potassium",atomicMass:39.098,category:"alkali metal",group:1,period:4,electronegativity:0.82},
  {number:20,symbol:"Ca",name:"Calcium",atomicMass:40.078,category:"alkaline earth",group:2,period:4,electronegativity:1.00},
  {number:21,symbol:"Sc",name:"Scandium",atomicMass:44.956,category:"transition metal",group:3,period:4,electronegativity:1.36},
  {number:22,symbol:"Ti",name:"Titanium",atomicMass:47.867,category:"transition metal",group:4,period:4,electronegativity:1.54},
  {number:23,symbol:"V",name:"Vanadium",atomicMass:50.942,category:"transition metal",group:5,period:4,electronegativity:1.63},
  {number:24,symbol:"Cr",name:"Chromium",atomicMass:51.996,category:"transition metal",group:6,period:4,electronegativity:1.66},
  {number:25,symbol:"Mn",name:"Manganese",atomicMass:54.938,category:"transition metal",group:7,period:4,electronegativity:1.55},
  {number:26,symbol:"Fe",name:"Iron",atomicMass:55.845,category:"transition metal",group:8,period:4,electronegativity:1.83},
  {number:27,symbol:"Co",name:"Cobalt",atomicMass:58.933,category:"transition metal",group:9,period:4,electronegativity:1.88},
  {number:28,symbol:"Ni",name:"Nickel",atomicMass:58.693,category:"transition metal",group:10,period:4,electronegativity:1.91},
  {number:29,symbol:"Cu",name:"Copper",atomicMass:63.546,category:"transition metal",group:11,period:4,electronegativity:1.90},
  {number:30,symbol:"Zn",name:"Zinc",atomicMass:65.380,category:"transition metal",group:12,period:4,electronegativity:1.65},
  {number:31,symbol:"Ga",name:"Gallium",atomicMass:69.723,category:"post-transition",group:13,period:4,electronegativity:1.81},
  {number:32,symbol:"Ge",name:"Germanium",atomicMass:72.640,category:"metalloid",group:14,period:4,electronegativity:2.01},
  {number:33,symbol:"As",name:"Arsenic",atomicMass:74.922,category:"metalloid",group:15,period:4,electronegativity:2.18},
  {number:34,symbol:"Se",name:"Selenium",atomicMass:78.960,category:"nonmetal",group:16,period:4,electronegativity:2.55},
  {number:35,symbol:"Br",name:"Bromine",atomicMass:79.904,category:"halogen",group:17,period:4,electronegativity:2.96},
  {number:36,symbol:"Kr",name:"Krypton",atomicMass:83.798,category:"noble gas",group:18,period:4,electronegativity:3.00}
];

const CATEGORY_COLORS = {
  "alkali metal": 0xff6b6b,
  "alkaline earth": 0xffa94d,
  "transition metal": 0x74c0fc,
  "metalloid": 0xa9e34b,
  "nonmetal": 0x69db7c,
  "noble gas": 0xda77f2,
  "halogen": 0xffd43b,
  "other metal": 0x868e96,
  "post-transition": 0x20c997
};

const CATEGORY_LABELS = {
  "alkali metal": "Alkali",
  "alkaline earth": "Alkaline Earth",
  "transition metal": "Transition",
  "metalloid": "Metalloid",
  "nonmetal": "Nonmetal",
  "noble gas": "Noble Gas",
  "halogen": "Halogen",
  "other metal": "Other Metal",
  "post-transition": "Post-Transition"
};

const FILTER_CATEGORIES = ['All','Alkali','Alkaline Earth','Transition','Nonmetal','Noble Gas','Halogen','Metalloid','Other Metal'];
const FILTER_MAP = {
  'All': null,
  'Alkali': 'alkali metal',
  'Alkaline Earth': 'alkaline earth',
  'Transition': 'transition metal',
  'Nonmetal': 'nonmetal',
  'Noble Gas': 'noble gas',
  'Halogen': 'halogen',
  'Metalloid': 'metalloid',
  'Other Metal': 'post-transition'
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 5, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.minDistance = 10;
controls.maxDistance = 60;
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);
const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(10, 15, 10);
scene.add(dirLight1);
const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight2.position.set(-10, 10, -10);
scene.add(dirLight2);

// Table group
const tableGroup = new THREE.Group();
scene.add(tableGroup);

// Element meshes
const elementMeshes = [];
const meshToElement = new Map();
const elementToMesh = new Map();

function createTextTexture(symbol, bgColor) {
  const canvas = document.createElement('canvas');
  canvas.width = 128;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  
  const r = (bgColor >> 16) & 255;
  const g = (bgColor >> 8) & 255;
  const b = bgColor & 255;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(0, 0, 128, 128);
  
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px Segoe UI, Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(symbol, 64, 64);
  
  const texture = new THREE.CanvasTexture(canvas);
  texture.needsUpdate = true;
  return texture;
}

function getGridPosition(element) {
  const spacing = 1.1;
  let col = element.group - 1;
  let row = element.period - 1;
  
  const x = (col - 8.5) * spacing;
  const y = (2 - row) * spacing;
  return { x, y, z: 0 };
}

ELEMENTS.forEach(el => {
  const color = CATEGORY_COLORS[el.category] || 0x888888;
  const frontTexture = createTextTexture(el.symbol, color);
  
  const materials = [
    new THREE.MeshStandardMaterial({ color: color, metalness: 0.1, roughness: 0.6 }),
    new THREE.MeshStandardMaterial({ color: color, metalness: 0.1, roughness: 0.6 }),
    new THREE.MeshStandardMaterial({ color: color, metalness: 0.1, roughness: 0.6 }),
    new THREE.MeshStandardMaterial({ color: color, metalness: 0.1, roughness: 0.6 }),
    new THREE.MeshStandardMaterial({ map: frontTexture, metalness: 0.1, roughness: 0.6 }),
    new THREE.MeshStandardMaterial({ color: color, metalness: 0.1, roughness: 0.6 })
  ];
  
  const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.3);
  const mesh = new THREE.Mesh(geometry, materials);
  
  const pos = getGridPosition(el);
  mesh.position.set(pos.x, pos.y, pos.z);
  
  mesh.userData = { element: el, originalColor: color, originalScale: 1 };
  tableGroup.add(mesh);
  elementMeshes.push(mesh);
  meshToElement.set(mesh, el);
  elementToMesh.set(el.number, mesh);
});

// Highlight ring for quiz
const ringGeometry = new THREE.RingGeometry(0.55, 0.65, 32);
const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xffd43b, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
const highlightRing = new THREE.Mesh(ringGeometry, ringMaterial);
highlightRing.visible = false;
tableGroup.add(highlightRing);

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// State
let selectedMesh = null;
let hoveredMesh = null;
let autoRotate = false;
let activeFilter = 'All';

// Quiz state
let quizActive = false;
let quizDifficulty = 1;
let quizScore = 0;
let quizStreak = 0;
let quizQuestionNumber = 0;
let quizTotalQuestions = 10;
let quizTimeRemaining = 15;
let quizCorrectCount = 0;
let quizWrongCount = 0;
let lastAnswerCorrect = null;
let difficultyChanges = 0;
let consecutiveCorrect = 0;
let consecutiveWrong = 0;
let currentQuestion = null;
let timerInterval = null;
let questionAnswered = false;

// Global state
window.__3D_STATE__ = {
  selectedElement: null,
  quizActive: false,
  quizDifficulty: 1,
  quizScore: 0,
  quizStreak: 0,
  quizQuestionNumber: 0,
  quizTotalQuestions: 10,
  quizTimeRemaining: 15,
  quizCorrectCount: 0,
  quizWrongCount: 0,
  activeFilter: 'All',
  visibleElementCount: 36,
  autoRotate: false,
  elementsLoaded: 36,
  cameraDistance: 30,
  lastAnswerCorrect: null,
  difficultyChanges: 0
};

function updateState() {
  const s = window.__3D_STATE__;
  s.quizActive = quizActive;
  s.quizDifficulty = quizDifficulty;
  s.quizScore = quizScore;
  s.quizStreak = quizStreak;
  s.quizQuestionNumber = quizQuestionNumber;
  s.quizTotalQuestions = quizTotalQuestions;
  s.quizTimeRemaining = quizTimeRemaining;
  s.quizCorrectCount = quizCorrectCount;
  s.quizWrongCount = quizWrongCount;
  s.activeFilter = activeFilter;
  s.autoRotate = autoRotate;
  s.lastAnswerCorrect = lastAnswerCorrect;
  s.difficultyChanges = difficultyChanges;
  s.cameraDistance = camera.position.length();
  
  let visCount = 0;
  elementMeshes.forEach(m => {
    if (m.material[0].opacity > 0.5) visCount++;
  });
  s.visibleElementCount = visCount;
}

// Info panel
function showInfoPanel(el) {
  const panel = document.getElementById('infoPanel');
  document.getElementById('infoNumber').textContent = `#${el.number}`;
  document.getElementById('infoSymbol').textContent = el.symbol;
  document.getElementById('infoName').textContent = el.name;
  document.getElementById('infoMass').textContent = el.atomicMass.toFixed(3);
  document.getElementById('infoCategory').textContent = CATEGORY_LABELS[el.category] || el.category;
  document.getElementById('infoEN').textContent = el.electronegativity || 'N/A';
  
  const color = CATEGORY_COLORS[el.category];
  const hex = '#' + color.toString(16).padStart(6, '0');
  document.getElementById('infoCategoryBadge').innerHTML = `<span class="category-badge" style="background:${hex}33;color:${hex};border:1px solid ${hex}">${CATEGORY_LABELS[el.category] || el.category}</span>`;
  
  panel.style.display = 'block';
  window.__3D_STATE__.selectedElement = {
    number: el.number, symbol: el.symbol, name: el.name,
    atomicMass: el.atomicMass, category: el.category
  };
}

function hideInfoPanel() {
  document.getElementById('infoPanel').style.display = 'none';
  window.__3D_STATE__.selectedElement = null;
}

function selectElement(mesh) {
  if (selectedMesh && selectedMesh !== mesh) {
    deselectElement(selectedMesh);
  }
  if (mesh) {
    selectedMesh = mesh;
    const el = mesh.userData.element;
    showInfoPanel(el);
    animateScale(mesh, 1.3);
    mesh.material.forEach(m => { m.emissiveIntensity = 0.3; m.emissive = new THREE.Color(0xffffff); });
  }
}

function deselectElement(mesh) {
  if (mesh) {
    animateScale(mesh, mesh.userData.originalScale || 1);
    mesh.material.forEach(m => { m.emissiveIntensity = 0; });
    if (selectedMesh === mesh) {
      selectedMesh = null;
      hideInfoPanel();
    }
  }
}

function animateScale(mesh, target) {
  const start = { x: mesh.scale.x, y: mesh.scale.y, z: mesh.scale.z };
  const startTime = performance.now();
  const duration = 200;
  function tick() {
    const t = Math.min((performance.now() - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    mesh.scale.setScalar(start.x + (target - start.x) * ease);
    if (t < 1) requestAnimationFrame(tick);
  }
  tick();
}

// Click handler
renderer.domElement.addEventListener('click', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);
  
  if (intersects.length > 0) {
    selectElement(intersects[0].object);
  } else {
    if (selectedMesh) deselectElement(selectedMesh);
  }
});

// Hover handler
renderer.domElement.addEventListener('mousemove', (e) => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(elementMeshes);
  
  if (hoveredMesh && hoveredMesh !== selectedMesh) {
    hoveredMesh.material.forEach(m => { m.emissiveIntensity = 0; });
  }
  
  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    if (mesh !== selectedMesh) {
      mesh.material.forEach(m => { m.emissiveIntensity = 0.15; m.emissive = new THREE.Color(0xffffff); });
    }
    hoveredMesh = mesh;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    hoveredMesh = null;
    renderer.domElement.style.cursor = 'default';
  }
});

// Filter bar
const filterBar = document.getElementById('filterBar');
FILTER_CATEGORIES.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'All' ? ' active' : '');
  btn.textContent = cat;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    applyFilter(cat);
  });
  filterBar.appendChild(btn);
});

function applyFilter(filterName) {
  activeFilter = filterName;
  const targetCategory = FILTER_MAP[filterName];
  
  elementMeshes.forEach(mesh => {
    const el = mesh.userData.element;
    const match = !targetCategory || el.category === targetCategory;
    
    mesh.material.forEach(m => {
      m.transparent = true;
      m.opacity = match ? 1.0 : 0.15;
    });
    
    const targetScale = match ? 1.0 : 0.5;
    mesh.userData.originalScale = targetScale;
    if (mesh !== selectedMesh) {
      animateScale(mesh, targetScale);
    }
    mesh.userData.filterMatch = match;
  });
  
  updateState();
}

// Rotation
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    autoRotate = !autoRotate;
    const badge = document.getElementById('rotationBadge');
    badge.style.display = autoRotate ? 'block' : 'none';
    badge.textContent = autoRotate ? '🔄 Auto-Rotate: ON' : '🔄 Auto-Rotate: OFF';
    updateState();
  }
});

// Quiz system
const startBtn = document.getElementById('startQuizBtn');
const questionText = document.getElementById('questionText');
const answersContainer = document.getElementById('answersContainer');
const answerBtns = [document.getElementById('ans0'), document.getElementById('ans1'), document.getElementById('ans2'), document.getElementById('ans3')];

startBtn.addEventListener('click', startQuiz);

function startQuiz() {
  quizActive = true;
  quizScore = 0;
  quizStreak = 0;
  quizQuestionNumber = 0;
  quizCorrectCount = 0;
  quizWrongCount = 0;
  quizDifficulty = 1;
  consecutiveCorrect = 0;
  consecutiveWrong = 0;
  lastAnswerCorrect = null;
  difficultyChanges = 0;
  
  startBtn.style.display = 'none';
  answersContainer.style.display = 'grid';
  
  updateQuizUI();
  nextQuestion();
}

function endQuiz() {
  quizActive = false;
  if (timerInterval) clearInterval(timerInterval);
  
  questionText.textContent = `Quiz Complete! Score: ${quizScore} | Correct: ${quizCorrectCount}/${quizTotalQuestions}`;
  answersContainer.style.display = 'none';
  startBtn.style.display = 'block';
  startBtn.textContent = 'Play Again';
  highlightRing.visible = false;
  
  updateState();
}

function nextQuestion() {
  if (quizQuestionNumber >= quizTotalQuestions) {
    endQuiz();
    return;
  }
  
  quizQuestionNumber++;
  questionAnswered = false;
  
  // Generate question based on difficulty
  let qType;
  if (quizDifficulty === 5) {
    qType = Math.floor(Math.random() * 4) + 1;
  } else {
    qType = quizDifficulty;
  }
  
  const targetEl = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
  let question = '';
  let answers = [];
  let correctIndex = 0;
  
  if (qType === 1) {
    question = `What is the symbol for ${targetEl.name}?`;
    answers = [targetEl.symbol];
    const others = ELEMENTS.filter(e => e.symbol !== targetEl.symbol);
    shuffle(others);
    for (let i = 0; i < 3 && i < others.length; i++) answers.push(others[i].symbol);
    shuffle(answers);
    correctIndex = answers.indexOf(targetEl.symbol);
  } else if (qType === 2) {
    question = `What category does ${targetEl.symbol} belong to?`;
    const correctCat = CATEGORY_LABELS[targetEl.category] || targetEl.category;
    const allCats = [...new Set(ELEMENTS.map(e => CATEGORY_LABELS[e.category] || e.category))];
    answers = [correctCat];
    const otherCats = allCats.filter(c => c !== correctCat);
    shuffle(otherCats);
    for (let i = 0; i < 3 && i < otherCats.length; i++) answers.push(otherCats[i]);
    shuffle(answers);
    correctIndex = answers.indexOf(correctCat);
  } else if (qType === 3) {
    question = `What is the atomic mass of ${targetEl.symbol}?`;
    const correct = targetEl.atomicMass.toFixed(3);
    answers = [correct];
    for (let i = 0; i < 3; i++) {
      const offset = (Math.random() * 10 - 5);
      let val = targetEl.atomicMass + offset;
      if (val < 1) val = targetEl.atomicMass + Math.abs(offset);
      answers.push(val.toFixed(3));
    }
    shuffle(answers);
    correctIndex = answers.indexOf(correct);
  } else if (qType === 4) {
    const enElements = ELEMENTS.filter(e => e.electronegativity > 0);
    const tEl = enElements[Math.floor(Math.random() * enElements.length)];
    question = `Which element has electronegativity closest to ${tEl.electronegativity.toFixed(2)}?`;
    
    const sorted = [...enElements].sort((a, b) => 
      Math.abs(a.electronegativity - tEl.electronegativity) - Math.abs(b.electronegativity - tEl.electronegativity)
    );
    
    answers = [sorted[0].symbol];
    const others = sorted.slice(1).filter(e => e.symbol !== sorted[0].symbol);
    shuffle(others);
    for (let i = 0; i < 3 && i < others.length; i++) answers.push(others[i].symbol);
    shuffle(answers);
    correctIndex = answers.indexOf(sorted[0].symbol);
    
    // Override targetEl for highlighting
    currentQuestion = { question, answers, correctIndex, targetElement: tEl, qType };
    showQuestion(currentQuestion);
    return;
  }
  
  currentQuestion = { question, answers, correctIndex, targetElement: targetEl, qType };
  showQuestion(currentQuestion);
}

function showQuestion(q) {
  questionText.textContent = q.question;
  document.getElementById('questionCounter').textContent = `Question ${quizQuestionNumber}/${quizTotalQuestions}`;
  
  answerBtns.forEach((btn, i) => {
    btn.textContent = q.answers[i] || '';
    btn.className = 'answer-btn';
    btn.disabled = false;
    btn.onclick = () => handleAnswer(i);
  });
  
  // Highlight element
  const mesh = elementToMesh.get(q.targetElement.number);
  if (mesh) {
    highlightRing.position.copy(mesh.position);
    highlightRing.position.z += 0.2;
    highlightRing.visible = true;
  }
  
  // Start timer
  const timeLimit = quizDifficulty === 5 ? 10 : 15;
  quizTimeRemaining = timeLimit;
  if (timerInterval) clearInterval(timerInterval);
  
  document.getElementById('timerFill').style.width = '100%';
  
  timerInterval = setInterval(() => {
    quizTimeRemaining -= 0.1;
    const pct = Math.max(0, (quizTimeRemaining / timeLimit) * 100);
    document.getElementById('timerFill').style.width = pct + '%';
    
    if (quizTimeRemaining <= 0) {
      clearInterval(timerInterval);
      if (!questionAnswered) handleAnswer(-1); // timeout
    }
    updateState();
  }, 100);
  
  updateQuizUI();
  updateState();
}

function handleAnswer(index) {
  if (questionAnswered) return;
  questionAnswered = true;
  if (timerInterval) clearInterval(timerInterval);
  
  const correct = index === currentQuestion.correctIndex;
  lastAnswerCorrect = correct;
  
  answerBtns.forEach(b => b.disabled = true);
  
  if (correct) {
    if (index >= 0) answerBtns[index].classList.add('correct');
    quizScore += quizDifficulty * 10;
    quizStreak++;
    quizCorrectCount++;
    consecutiveCorrect++;
    consecutiveWrong = 0;
    
    flashElement(currentQuestion.targetElement.number, 0x69db7c);
    
    if (consecutiveCorrect >= 3 && quizDifficulty < 5) {
      quizDifficulty++;
      consecutiveCorrect = 0;
      difficultyChanges++;
    }
  } else {
    if (index >= 0) answerBtns[index].classList.add('wrong');
    answerBtns[currentQuestion.correctIndex].classList.add('correct');
    quizStreak = 0;
    quizWrongCount++;
    consecutiveWrong++;
    consecutiveCorrect = 0;
    
    flashElement(currentQuestion.targetElement.number, 0xff6b6b);
    
    if (consecutiveWrong >= 2 && quizDifficulty > 1) {
      quizDifficulty--;
      consecutiveWrong = 0;
      difficultyChanges++;
    }
  }
  
  updateQuizUI();
  updateHUD();
  updateState();
  
  setTimeout(() => {
    highlightRing.visible = false;
    resetElementFlash(currentQuestion.targetElement.number);
    nextQuestion();
  }, 1500);
}

function flashElement(number, color) {
  const mesh = elementToMesh.get(number);
  if (mesh) {
    mesh.material.forEach(m => {
      m.emissive = new THREE.Color(color);
      m.emissiveIntensity = 0.6;
    });
  }
}

function resetElementFlash(number) {
  const mesh = elementToMesh.get(number);
  if (mesh && mesh !== selectedMesh) {
    mesh.material.forEach(m => {
      m.emissiveIntensity = 0;
    });
  }
}

function updateQuizUI() {
  document.getElementById('diffDisplay').textContent = `Diff: ${quizDifficulty}`;
  document.getElementById('scoreDisplay').textContent = `Score: ${quizScore}`;
  document.getElementById('streakDisplay').textContent = `Streak: ${quizStreak}`;
}

function updateHUD() {
  document.getElementById('hudScore').textContent = quizScore;
  const streakEl = document.getElementById('hudStreak');
  if (quizStreak >= 3) {
    streakEl.textContent = `🔥 ${quizStreak} streak!`;
  } else if (quizStreak > 0) {
    streakEl.textContent = `${quizStreak} streak`;
  } else {
    streakEl.textContent = '';
  }
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// Animation loop
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  
  if (autoRotate) {
    tableGroup.rotation.y += 0.3 * delta;
  }
  
  // Pulse highlight ring
  if (highlightRing.visible) {
    highlightRing.material.opacity = 0.5 + 0.3 * Math.sin(time * 4);
    highlightRing.scale.setScalar(1 + 0.05 * Math.sin(time * 3));
  }
  
  // Pulse matching filter elements
  if (activeFilter !== 'All') {
    elementMeshes.forEach(mesh => {
      if (mesh.userData.filterMatch && mesh !== selectedMesh) {
        const s = mesh.userData.originalScale + 0.03 * Math.sin(time * 2 + mesh.userData.element.number);
        mesh.scale.setScalar(s);
      }
    });
  }
  
  controls.update();
  updateState();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

})();
</script>
