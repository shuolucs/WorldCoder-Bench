<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Periodic Table Quiz</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .ui {
      position: absolute;
      z-index: 10;
      backdrop-filter: blur(6px);
      background: rgba(10, 10, 46, 0.7);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }

    #quizPanel {
      top: 14px;
      left: 14px;
      width: 340px;
      padding: 14px;
    }

    #quizPanel h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }

    #quizStats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
      font-size: 14px;
      margin-bottom: 10px;
    }

    #questionText {
      min-height: 52px;
      font-size: 16px;
      line-height: 1.35;
      margin: 10px 0 12px;
      color: #eef;
    }

    #answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .answerBtn, #startQuizBtn, .filterBtn {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      background: rgba(255,255,255,0.12);
      color: white;
      transition: 0.2s ease;
      font-weight: 600;
    }

    .answerBtn:hover, #startQuizBtn:hover, .filterBtn:hover {
      background: rgba(255,255,255,0.22);
      transform: translateY(-1px);
    }

    .answerBtn:disabled, #startQuizBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #startQuizBtn {
      width: 100%;
      margin-top: 12px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }

    #infoPanel {
      top: 14px;
      right: 14px;
      width: 280px;
      padding: 14px;
      min-height: 220px;
    }

    #infoPanel h3 {
      margin: 0 0 10px;
      font-size: 22px;
    }

    #infoContent {
      font-size: 15px;
      line-height: 1.6;
      color: #eef;
    }

    #hud {
      position: absolute;
      top: 14px;
      right: 310px;
      z-index: 11;
      text-align: right;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(10, 10, 46, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
    }

    #hudScore {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
    }

    #hudStreak {
      font-size: 16px;
      color: #ffd43b;
      margin-top: 4px;
    }

    #filterBar {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-width: 90vw;
      justify-content: center;
      padding: 10px 12px;
    }

    .filterBtn.active {
      background: rgba(255,255,255,0.3);
      outline: 2px solid rgba(255,255,255,0.25);
    }

    #rotationBadge {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 10;
      padding: 8px 12px;
      font-weight: 700;
      color: #fff;
    }

    .correct {
      background: rgba(34, 197, 94, 0.65) !important;
    }

    .wrong {
      background: rgba(239, 68, 68, 0.7) !important;
    }

    .muted {
      color: #bcc3d8;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="quizPanel" class="ui">
      <h2>Periodic Quiz</h2>
      <div id="quizStats">
        <div>Difficulty: <strong id="difficultyDisplay">Easy (1)</strong></div>
        <div>Question: <strong id="questionCounter">0/10</strong></div>
        <div>Score: <strong id="scoreDisplay">0</strong></div>
        <div>Streak: <strong id="streakDisplay">0</strong></div>
        <div>Timer: <strong id="timerDisplay">--</strong></div>
        <div>Status: <strong id="quizStatus">Idle</strong></div>
      </div>
      <div id="questionText">Press “Start Quiz” to begin.</div>
      <div id="answers">
        <button class="answerBtn" disabled>A</button>
        <button class="answerBtn" disabled>B</button>
        <button class="answerBtn" disabled>C</button>
        <button class="answerBtn" disabled>D</button>
      </div>
      <button id="startQuizBtn">Start Quiz</button>
    </div>

    <div id="hud">
      <div id="hudScore">Score: 0</div>
      <div id="hudStreak">Streak: 0</div>
    </div>

    <div id="infoPanel" class="ui">
      <h3>Element Info</h3>
      <div id="infoContent" class="muted">Click an element to view details.</div>
    </div>

    <div id="filterBar" class="ui">
      <button class="filterBtn active" data-filter="All">All</button>
      <button class="filterBtn" data-filter="alkali metal">Alkali</button>
      <button class="filterBtn" data-filter="alkaline earth metal">Alkaline Earth</button>
      <button class="filterBtn" data-filter="transition metal">Transition</button>
      <button class="filterBtn" data-filter="nonmetal">Nonmetal</button>
      <button class="filterBtn" data-filter="noble gas">Noble Gas</button>
      <button class="filterBtn" data-filter="halogen">Halogen</button>
      <button class="filterBtn" data-filter="metalloid">Metalloid</button>
      <button class="filterBtn" data-filter="other metal">Other Metal</button>
    </div>

    <div id="rotationBadge" class="ui">Rotation: OFF (press R)</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const CATEGORY_COLORS = {
      "alkali metal": "#ff6b6b",
      "alkaline earth metal": "#ffa94d",
      "transition metal": "#74c0fc",
      "metalloid": "#a9e34b",
      "nonmetal": "#69db7c",
      "noble gas": "#da77f2",
      "halogen": "#ffd43b",
      "other metal": "#868e96",
      "post-transition": "#20c997"
    };

    const elements = [
      { number: 1, symbol: "H",  name: "Hydrogen", atomicMass: 1.008,  category: "nonmetal", group: 1,  period: 1, electronegativity: 2.20 },
      { number: 2, symbol: "He", name: "Helium", atomicMass: 4.0026, category: "noble gas", group: 18, period: 1, electronegativity: null },
      { number: 3, symbol: "Li", name: "Lithium", atomicMass: 6.94, category: "alkali metal", group: 1, period: 2, electronegativity: 0.98 },
      { number: 4, symbol: "Be", name: "Beryllium", atomicMass: 9.0122, category: "alkaline earth metal", group: 2, period: 2, electronegativity: 1.57 },
      { number: 5, symbol: "B", name: "Boron", atomicMass: 10.81, category: "metalloid", group: 13, period: 2, electronegativity: 2.04 },
      { number: 6, symbol: "C", name: "Carbon", atomicMass: 12.011, category: "nonmetal", group: 14, period: 2, electronegativity: 2.55 },
      { number: 7, symbol: "N", name: "Nitrogen", atomicMass: 14.007, category: "nonmetal", group: 15, period: 2, electronegativity: 3.04 },
      { number: 8, symbol: "O", name: "Oxygen", atomicMass: 15.999, category: "nonmetal", group: 16, period: 2, electronegativity: 3.44 },
      { number: 9, symbol: "F", name: "Fluorine", atomicMass: 18.998, category: "halogen", group: 17, period: 2, electronegativity: 3.98 },
      { number: 10, symbol: "Ne", name: "Neon", atomicMass: 20.180, category: "noble gas", group: 18, period: 2, electronegativity: null },
      { number: 11, symbol: "Na", name: "Sodium", atomicMass: 22.990, category: "alkali metal", group: 1, period: 3, electronegativity: 0.93 },
      { number: 12, symbol: "Mg", name: "Magnesium", atomicMass: 24.305, category: "alkaline earth metal", group: 2, period: 3, electronegativity: 1.31 },
      { number: 13, symbol: "Al", name: "Aluminum", atomicMass: 26.982, category: "other metal", group: 13, period: 3, electronegativity: 1.61 },
      { number: 14, symbol: "Si", name: "Silicon", atomicMass: 28.085, category: "metalloid", group: 14, period: 3, electronegativity: 1.90 },
      { number: 15, symbol: "P", name: "Phosphorus", atomicMass: 30.974, category: "nonmetal", group: 15, period: 3, electronegativity: 2.19 },
      { number: 16, symbol: "S", name: "Sulfur", atomicMass: 32.06, category: "nonmetal", group: 16, period: 3, electronegativity: 2.58 },
      { number: 17, symbol: "Cl", name: "Chlorine", atomicMass: 35.45, category: "halogen", group: 17, period: 3, electronegativity: 3.16 },
      { number: 18, symbol: "Ar", name: "Argon", atomicMass: 39.948, category: "noble gas", group: 18, period: 3, electronegativity: null },
      { number: 19, symbol: "K", name: "Potassium", atomicMass: 39.098, category: "alkali metal", group: 1, period: 4, electronegativity: 0.82 },
      { number: 20, symbol: "Ca", name: "Calcium", atomicMass: 40.078, category: "alkaline earth metal", group: 2, period: 4, electronegativity: 1.00 },
      { number: 21, symbol: "Sc", name: "Scandium", atomicMass: 44.956, category: "transition metal", group: 3, period: 4, electronegativity: 1.36 },
      { number: 22, symbol: "Ti", name: "Titanium", atomicMass: 47.867, category: "transition metal", group: 4, period: 4, electronegativity: 1.54 },
      { number: 23, symbol: "V", name: "Vanadium", atomicMass: 50.942, category: "transition metal", group: 5, period: 4, electronegativity: 1.63 },
      { number: 24, symbol: "Cr", name: "Chromium", atomicMass: 51.996, category: "transition metal", group: 6, period: 4, electronegativity: 1.66 },
      { number: 25, symbol: "Mn", name: "Manganese", atomicMass: 54.938, category: "transition metal", group: 7, period: 4, electronegativity: 1.55 },
      { number: 26, symbol: "Fe", name: "Iron", atomicMass: 55.845, category: "transition metal", group: 8, period: 4, electronegativity: 1.83 },
      { number: 27, symbol: "Co", name: "Cobalt", atomicMass: 58.933, category: "transition metal", group: 9, period: 4, electronegativity: 1.88 },
      { number: 28, symbol: "Ni", name: "Nickel", atomicMass: 58.693, category: "transition metal", group: 10, period: 4, electronegativity: 1.91 },
      { number: 29, symbol: "Cu", name: "Copper", atomicMass: 63.546, category: "transition metal", group: 11, period: 4, electronegativity: 1.90 },
      { number: 30, symbol: "Zn", name: "Zinc", atomicMass: 65.38, category: "transition metal", group: 12, period: 4, electronegativity: 1.65 },
      { number: 31, symbol: "Ga", name: "Gallium", atomicMass: 69.723, category: "other metal", group: 13, period: 4, electronegativity: 1.81 },
      { number: 32, symbol: "Ge", name: "Germanium", atomicMass: 72.630, category: "metalloid", group: 14, period: 4, electronegativity: 2.01 },
      { number: 33, symbol: "As", name: "Arsenic", atomicMass: 74.922, category: "metalloid", group: 15, period: 4, electronegativity: 2.18 },
      { number: 34, symbol: "Se", name: "Selenium", atomicMass: 78.971, category: "nonmetal", group: 16, period: 4, electronegativity: 2.55 },
      { number: 35, symbol: "Br", name: "Bromine", atomicMass: 79.904, category: "halogen", group: 17, period: 4, electronegativity: 2.96 },
      { number: 36, symbol: "Kr", name: "Krypton", atomicMass: 83.798, category: "noble gas", group: 18, period: 4, electronegativity: 3.00 }
    ];

    const app = document.getElementById("app");
    const infoContent = document.getElementById("infoContent");
    const difficultyDisplay = document.getElementById("difficultyDisplay");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const streakDisplay = document.getElementById("streakDisplay");
    const timerDisplay = document.getElementById("timerDisplay");
    const questionText = document.getElementById("questionText");
    const answerButtons = [...document.querySelectorAll(".answerBtn")];
    const startQuizBtn = document.getElementById("startQuizBtn");
    const questionCounter = document.getElementById("questionCounter");
    const quizStatus = document.getElementById("quizStatus");
    const hudScore = document.getElementById("hudScore");
    const hudStreak = document.getElementById("hudStreak");
    const rotationBadge = document.getElementById("rotationBadge");
    const filterButtons = [...document.querySelectorAll(".filterBtn")];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a2e");

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 10;
    controls.maxDistance = 60;

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const d1 = new THREE.DirectionalLight(0xffffff, 0.8);
    d1.position.set(10, 15, 10);
    scene.add(d1);

    const d2 = new THREE.DirectionalLight(0xffffff, 0.4);
    d2.position.set(-10, 10, -10);
    scene.add(d2);

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const boxGeo = new THREE.BoxGeometry(0.9, 0.9, 0.3);
    const interactiveMeshes = [];
    const elementMeshes = new Map();

    let hovered = null;
    let selected = null;
    let autoRotate = false;
    let activeQuestion = null;
    let questionTimeout = null;
    let timerInterval = null;
    let questionRing = null;
    let quizLocked = false;
    let filterPulseTime = 0;

    const quiz = {
      active: false,
      difficulty: 1,
      score: 0,
      streak: 0,
      questionNumber: 0,
      totalQuestions: 10,
      timeRemaining: 0,
      correctCount: 0,
      wrongCount: 0,
      consecutiveCorrect: 0,
      consecutiveWrong: 0,
      lastAnswerCorrect: null,
      difficultyChanges: 0
    };

    window.__3D_STATE__ = {
      selectedElement: null,
      quizActive: false,
      quizDifficulty: 1,
      quizScore: 0,
      quizStreak: 0,
      quizQuestionNumber: 0,
      quizTotalQuestions: 10,
      quizTimeRemaining: 0,
      quizCorrectCount: 0,
      quizWrongCount: 0,
      activeFilter: "All",
      visibleElementCount: elements.length,
      autoRotate: false,
      elementsLoaded: elements.length,
      cameraDistance: camera.position.length(),
      lastAnswerCorrect: null,
      difficultyChanges: 0
    };

    function updateState() {
      window.__3D_STATE__.selectedElement = selected
        ? {
            number: selected.userData.element.number,
            symbol: selected.userData.element.symbol,
            name: selected.userData.element.name,
            atomicMass: selected.userData.element.atomicMass,
            category: selected.userData.element.category
          }
        : null;

      window.__3D_STATE__.quizActive = quiz.active;
      window.__3D_STATE__.quizDifficulty = quiz.difficulty;
      window.__3D_STATE__.quizScore = quiz.score;
      window.__3D_STATE__.quizStreak = quiz.streak;
      window.__3D_STATE__.quizQuestionNumber = quiz.questionNumber;
      window.__3D_STATE__.quizTotalQuestions = quiz.totalQuestions;
      window.__3D_STATE__.quizTimeRemaining = quiz.timeRemaining;
      window.__3D_STATE__.quizCorrectCount = quiz.correctCount;
      window.__3D_STATE__.quizWrongCount = quiz.wrongCount;
      window.__3D_STATE__.activeFilter = currentFilter;
      window.__3D_STATE__.visibleElementCount = [...elementMeshes.values()].filter(m => m.userData.fullVisible).length;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.elementsLoaded = elements.length;
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.lastAnswerCorrect = quiz.lastAnswerCorrect;
      window.__3D_STATE__.difficultyChanges = quiz.difficultyChanges;
    }

    function difficultyName(level) {
      return ["Easy", "Medium", "Hard", "Expert", "Master"][level - 1];
    }

    function updateHUD() {
      difficultyDisplay.textContent = `${difficultyName(quiz.difficulty)} (${quiz.difficulty})`;
      scoreDisplay.textContent = quiz.score;
      streakDisplay.textContent = quiz.streak;
      timerDisplay.textContent = quiz.active ? `${quiz.timeRemaining}s` : "--";
      questionCounter.textContent = `${quiz.questionNumber}/${quiz.totalQuestions}`;
      hudScore.textContent = `Score: ${quiz.score}`;
      hudStreak.textContent = quiz.streak >= 3 ? `Streak: ${quiz.streak} 🔥` : `Streak: ${quiz.streak}`;
      rotationBadge.textContent = `Rotation: ${autoRotate ? "ON" : "OFF"} (press R)`;
      updateState();
    }

    function createTextTexture(symbol) {
      const canvas = document.createElement("canvas");
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,255,255,0)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "white";
      ctx.font = "bold 24px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(symbol, canvas.width / 2, canvas.height / 2);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    }

    function makeElementMesh(el) {
      const color = CATEGORY_COLORS[el.category] || "#888";
      const faceMaterial = new THREE.MeshStandardMaterial({
        color,
        metalness: 0.15,
        roughness: 0.6,
        emissive: new THREE.Color(color).multiplyScalar(0.0),
        transparent: true,
        opacity: 1
      });

      const textMaterial = new THREE.MeshStandardMaterial({
        map: createTextTexture(el.symbol),
        color,
        emissive: 0x000000,
        metalness: 0.1,
        roughness: 0.65,
        transparent: true
      });

      const materials = [
        faceMaterial,
        faceMaterial,
        faceMaterial,
        faceMaterial,
        textMaterial,
        faceMaterial
      ];

      const mesh = new THREE.Mesh(boxGeo, materials);
      mesh.userData.element = el;
      mesh.userData.baseScale = 1;
      mesh.userData.targetScale = 1;
      mesh.userData.hover = false;
      mesh.userData.selected = false;
      mesh.userData.flashColor = null;
      mesh.userData.flashUntil = 0;
      mesh.userData.fullVisible = true;

      const x = (el.group - 9.5) * 1.25;
      const y = (2.5 - el.period) * 1.35;
      mesh.position.set(x, y, 0);

      tableGroup.add(mesh);
      interactiveMeshes.push(mesh);
      elementMeshes.set(el.symbol, mesh);
    }

    elements.forEach(makeElementMesh);

    function setInfoPanel(el) {
      if (!el) {
        infoContent.innerHTML = `<span class="muted">Click an element to view details.</span>`;
        return;
      }
      infoContent.innerHTML = `
        <div><strong>Atomic Number:</strong> ${el.number}</div>
        <div><strong>Symbol:</strong> ${el.symbol}</div>
        <div><strong>Name:</strong> ${el.name}</div>
        <div><strong>Atomic Mass:</strong> ${el.atomicMass}</div>
        <div><strong>Category:</strong> ${el.category}</div>
        <div><strong>Electronegativity:</strong> ${el.electronegativity ?? "N/A"}</div>
      `;
    }

    function selectElement(mesh) {
      if (selected === mesh) return;
      if (selected) {
        selected.userData.selected = false;
        selected.userData.targetScale = selected.userData.fullVisible ? 1 : 0.5;
      }
      selected = mesh;
      if (selected) {
        selected.userData.selected = true;
        selected.userData.targetScale = 1.3;
        setInfoPanel(selected.userData.element);
      } else {
        setInfoPanel(null);
      }
      updateState();
    }

    function setHover(mesh) {
      if (hovered && hovered !== mesh) hovered.userData.hover = false;
      hovered = mesh;
      if (hovered) hovered.userData.hover = true;
    }

    function flashElement(mesh, colorHex, duration = 600) {
      mesh.userData.flashColor = new THREE.Color(colorHex);
      mesh.userData.flashUntil = performance.now() + duration;
    }

    function createQuestionRing() {
      const geo = new THREE.RingGeometry(0.7, 0.9, 48);
      const mat = new THREE.MeshBasicMaterial({
        color: 0xffeb3b,
        transparent: true,
        opacity: 0.9,
        side: THREE.DoubleSide
      });
      const ring = new THREE.Mesh(geo, mat);
      ring.rotation.x = -Math.PI / 2;
      ring.visible = false;
      scene.add(ring);
      return ring;
    }

    questionRing = createQuestionRing();

    function focusQuestionElement(symbol) {
      const mesh = elementMeshes.get(symbol);
      if (!mesh) {
        questionRing.visible = false;
        return;
      }
      questionRing.visible = true;
      questionRing.position.set(mesh.position.x, mesh.position.y - 0.62, mesh.position.z);
      questionRing.userData.targetMesh = mesh;
    }

    function clearQuestionRing() {
      questionRing.visible = false;
      questionRing.userData.targetMesh = null;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomElement(predicate = () => true) {
      const pool = elements.filter(predicate);
      return pool[Math.floor(Math.random() * pool.length)];
    }

    function sampleWrongElements(correct, count) {
      return shuffle(elements.filter(e => e.symbol !== correct.symbol)).slice(0, count);
    }

    function makeLevel1Question() {
      const el = randomElement();
      const wrong = sampleWrongElements(el, 3).map(e => e.symbol);
      const answers = shuffle([el.symbol, ...wrong]);
      return {
        prompt: `What is the symbol for ${el.name}?`,
        answers,
        correct: el.symbol,
        targetSymbol: el.symbol,
        type: 1
      };
    }

    function makeLevel2Question() {
      const el = randomElement();
      const categories = [...new Set(elements.map(e => e.category))];
      const wrong = shuffle(categories.filter(c => c !== el.category)).slice(0, 3);
      const answers = shuffle([el.category, ...wrong]);
      return {
        prompt: `What category does ${el.symbol} belong to?`,
        answers,
        correct: el.category,
        targetSymbol: el.symbol,
        type: 2
      };
    }

    function makeLevel3Question() {
      const el = randomElement();
      const correctMass = Number(el.atomicMass.toFixed(3));
      const choices = new Set([correctMass.toFixed(3)]);
      while (choices.size < 4) {
        const delta = (Math.random() * 20 - 10);
        const candidate = Math.max(0.1, el.atomicMass + delta);
        choices.add(candidate.toFixed(3));
      }
      const answers = shuffle([...choices]);
      return {
        prompt: `What is the atomic mass of ${el.symbol}?`,
        answers,
        correct: correctMass.toFixed(3),
        targetSymbol: el.symbol,
        type: 3
      };
    }

    function makeLevel4Question() {
      const valid = elements.filter(e => e.electronegativity !== null);
      const el = valid[Math.floor(Math.random() * valid.length)];
      const wrong = shuffle(valid.filter(e => e.symbol !== el.symbol)).slice(0, 3).map(e => e.name);
      const answers = shuffle([el.name, ...wrong]);
      return {
        prompt: `Which element has electronegativity closest to ${el.electronegativity}?`,
        answers,
        correct: el.name,
        targetSymbol: el.symbol,
        type: 4
      };
    }

    function generateQuestion() {
      let level = quiz.difficulty;
      let chosenType = level;
      if (level === 5) {
        chosenType = Math.floor(Math.random() * 4) + 1;
      }
      switch (chosenType) {
        case 1: return makeLevel1Question();
        case 2: return makeLevel2Question();
        case 3: return makeLevel3Question();
        case 4: return makeLevel4Question();
        default: return makeLevel1Question();
      }
    }

    function clearTimers() {
      if (questionTimeout) clearTimeout(questionTimeout);
      if (timerInterval) clearInterval(timerInterval);
      questionTimeout = null;
      timerInterval = null;
    }

    function enableAnswers(enabled) {
      answerButtons.forEach(btn => btn.disabled = !enabled);
    }

    function renderQuestion() {
      if (!quiz.active) return;

      if (quiz.questionNumber >= quiz.totalQuestions) {
        endQuiz();
        return;
      }

      quiz.questionNumber++;
      quizLocked = false;
      activeQuestion = generateQuestion();
      quiz.timeRemaining = quiz.difficulty === 5 ? 10 : 15;

      questionText.textContent = activeQuestion.prompt;
      quizStatus.textContent = "Active";

      answerButtons.forEach((btn, i) => {
        btn.textContent = activeQuestion.answers[i];
        btn.classList.remove("correct", "wrong");
      });

      focusQuestionElement(activeQuestion.targetSymbol);
      enableAnswers(true);
      updateHUD();

      timerInterval = setInterval(() => {
        quiz.timeRemaining--;
        if (quiz.timeRemaining <= 0) {
          quiz.timeRemaining = 0;
          updateHUD();
          handleAnswer(null, true);
        }
        updateHUD();
      }, 1000);
    }

    function adjustDifficulty(correct) {
      const old = quiz.difficulty;
      if (correct) {
        quiz.consecutiveCorrect++;
        quiz.consecutiveWrong = 0;
        if (quiz.consecutiveCorrect >= 3 && quiz.difficulty < 5) {
          quiz.difficulty++;
          quiz.consecutiveCorrect = 0;
        }
      } else {
        quiz.consecutiveWrong++;
        quiz.consecutiveCorrect = 0;
        if (quiz.consecutiveWrong >= 2 && quiz.difficulty > 1) {
          quiz.difficulty--;
          quiz.consecutiveWrong = 0;
        }
      }
      if (old !== quiz.difficulty) quiz.difficultyChanges++;
    }

    function handleAnswer(answer, timedOut = false) {
      if (!quiz.active || quizLocked) return;
      quizLocked = true;
      clearTimers();
      enableAnswers(false);

      const isCorrect = answer === activeQuestion.correct;
      quiz.lastAnswerCorrect = isCorrect;

      const targetMesh = elementMeshes.get(activeQuestion.targetSymbol);

      if (isCorrect) {
        quiz.score += quiz.difficulty * 10;
        quiz.streak++;
        quiz.correctCount++;
        flashElement(targetMesh, 0x22c55e, 800);
        quizStatus.textContent = "Correct";
      } else {
        quiz.streak = 0;
        quiz.wrongCount++;
        flashElement(targetMesh, 0xef4444, 800);
        quizStatus.textContent = timedOut ? "Time's Up" : "Wrong";
      }

      adjustDifficulty(isCorrect);

      answerButtons.forEach(btn => {
        if (btn.textContent === activeQuestion.correct) btn.classList.add("correct");
        else if (btn.textContent === answer && !isCorrect) btn.classList.add("wrong");
      });

      if (!isCorrect) {
        const correctMesh = elementMeshes.get(activeQuestion.targetSymbol);
        if (correctMesh) flashElement(correctMesh, 0x22c55e, 1500);
      }

      updateHUD();

      questionTimeout = setTimeout(() => {
        if (quiz.questionNumber >= quiz.totalQuestions) {
          endQuiz();
        } else {
          renderQuestion();
        }
      }, 1500);
    }

    function startQuiz() {
      clearTimers();
      quiz.active = true;
      quiz.difficulty = 1;
      quiz.score = 0;
      quiz.streak = 0;
      quiz.questionNumber = 0;
      quiz.correctCount = 0;
      quiz.wrongCount = 0;
      quiz.consecutiveCorrect = 0;
      quiz.consecutiveWrong = 0;
      quiz.lastAnswerCorrect = null;
      quiz.difficultyChanges = 0;
      startQuizBtn.disabled = true;
      startQuizBtn.textContent = "Quiz Running...";
      renderQuestion();
      updateHUD();
    }

    function endQuiz() {
      clearTimers();
      quiz.active = false;
      activeQuestion = null;
      clearQuestionRing();
      enableAnswers(false);
      questionText.textContent = `Quiz finished! Final score: ${quiz.score}`;
      quizStatus.textContent = "Finished";
      timerDisplay.textContent = "--";
      startQuizBtn.disabled = false;
      startQuizBtn.textContent = "Start Quiz";
      updateHUD();
    }

    startQuizBtn.addEventListener("click", startQuiz);

    answerButtons.forEach(btn => {
      btn.addEventListener("click", () => handleAnswer(btn.textContent, false));
    });

    let currentFilter = "All";

    function applyFilter(filter) {
      currentFilter = filter;
      filterButtons.forEach(b => b.classList.toggle("active", b.dataset.filter === filter));

      elementMeshes.forEach(mesh => {
        const match = filter === "All" || mesh.userData.element.category === filter;
        mesh.userData.fullVisible = match || filter === "All";
        mesh.userData.targetScale = mesh.userData.selected ? 1.3 : (match || filter === "All" ? 1 : 0.5);

        mesh.material.forEach(mat => {
          mat.transparent = true;
          mat.opacity = match || filter === "All" ? 1 : 0.15;
        });
      });

      updateState();
    }

    filterButtons.forEach(btn => {
      btn.addEventListener("click", () => applyFilter(btn.dataset.filter));
    });

    window.addEventListener("keydown", e => {
      if (e.key.toLowerCase() === "r") {
        autoRotate = !autoRotate;
        updateHUD();
      }
    });

    function onPointerMove(e) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function onClick() {
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(interactiveMeshes);
      if (hits.length) {
        selectElement(hits[0].object);
      } else {
        selectElement(null);
      }
    }

    renderer.domElement.addEventListener("pointermove", onPointerMove);
    renderer.domElement.addEventListener("click", onClick);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateState();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();
      filterPulseTime += delta;

      controls.update();

      if (autoRotate) {
        tableGroup.rotation.y += 0.3 * delta;
      }

      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(interactiveMeshes);
      setHover(hits.length ? hits[0].object : null);

      elementMeshes.forEach(mesh => {
        const baseColor = new THREE.Color(CATEGORY_COLORS[mesh.userData.element.category] || "#888");
        const now = performance.now();

        let targetScale = mesh.userData.targetScale || 1;

        if (currentFilter !== "All" && mesh.userData.element.category === currentFilter && !mesh.userData.selected) {
          targetScale *= 1 + Math.sin(elapsed * 2.2) * 0.04;
        }

        mesh.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.12);

        mesh.material.forEach((mat, idx) => {
          let emissiveIntensity = 0;

          if (mesh.userData.hover) emissiveIntensity += 0.18;
          if (mesh.userData.selected) emissiveIntensity += 0.35;

          if (mesh.userData.flashColor && now < mesh.userData.flashUntil) {
            mat.emissive.copy(mesh.userData.flashColor);
            return;
          } else {
            mesh.userData.flashColor = null;
          }

          mat.emissive.copy(baseColor).multiplyScalar(emissiveIntensity);
          if (idx === 4) {
            mat.emissive.setRGB(emissiveIntensity, emissiveIntensity, emissiveIntensity);
          }
        });
      });

      if (questionRing.visible && questionRing.userData.targetMesh) {
        const m = questionRing.userData.targetMesh;
        questionRing.position.set(m.position.x, m.position.y - 0.62, m.position.z);
        const s = 1 + Math.sin(elapsed * 5) * 0.12;
        questionRing.scale.set(s, s, s);
        questionRing.material.opacity = 0.65 + Math.sin(elapsed * 5) * 0.25;
      }

      window.__3D_STATE__.cameraDistance = camera.position.length();
      renderer.render(scene, camera);
    }

    setInfoPanel(null);
    updateHUD();
    animate();
  </script>
</body>
