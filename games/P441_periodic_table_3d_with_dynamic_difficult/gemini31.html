<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Periodic Table & Quiz</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        .panel {
            position: absolute;
            background: rgba(15, 15, 40, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(5px);
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }
        #infoPanel {
            top: 20px;
            right: -300px;
            width: 250px;
            opacity: 0;
        }
        #infoPanel.active {
            right: 20px;
            opacity: 1;
        }
        #infoPanel h2 { margin: 0 0 10px 0; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .info-label { color: #aaa; }
        
        #quizPanel {
            top: 20px;
            left: 20px;
            width: 300px;
        }
        #quizHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        #quizStats { font-size: 12px; color: #aaa; display: flex; gap: 10px; }
        #questionText { font-size: 16px; font-weight: bold; margin-bottom: 15px; min-height: 40px; }
        .answer-btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            text-align: left;
        }
        .answer-btn:hover:not(:disabled) { background: rgba(255,255,255,0.2); }
        .answer-btn:disabled { cursor: default; }
        .answer-btn.correct { background: rgba(40, 167, 69, 0.6); border-color: #28a745; }
        .answer-btn.wrong { background: rgba(220, 53, 69, 0.6); border-color: #dc3545; }
        
        #startQuizBtn {
            width: 100%;
            padding: 12px;
            background: #4dabf7;
            border: none;
            color: #000;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        #startQuizBtn:hover { background: #3bc9db; }
        
        #timerBarContainer {
            width: 100%;
            height: 4px;
            background: #333;
            margin-bottom: 10px;
            border-radius: 2px;
            overflow: hidden;
            display: none;
        }
        #timerBar {
            height: 100%;
            width: 100%;
            background: #fcc419;
            transition: width 0.1s linear, background-color 0.3s;
        }
        
        #filterBar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            width: 90%;
        }
        .filter-btn {
            background: rgba(15, 15, 40, 0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: #ccc;
            padding: 6px 12px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: rgba(255,255,255,0.2);
            color: white;
            border-color: white;
        }
        
        #hud {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9;
            text-align: right;
            pointer-events: none;
        }
        #scoreDisplay { font-size: 32px; font-weight: bold; color: #fcc419; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        #streakDisplay { font-size: 18px; color: #ff6b6b; }
        
        #rotationBadge {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10;
            border: 1px solid #555;
        }
        
        .hidden { display: none !important; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div id="scoreDisplay">0</div>
        <div id="streakDisplay">Streak: 0</div>
    </div>

    <div id="infoPanel" class="panel">
        <h2 id="infoSymbol">Symbol</h2>
        <div class="info-row"><span class="info-label">Name:</span> <span id="infoName">-</span></div>
        <div class="info-row"><span class="info-label">Atomic Number:</span> <span id="infoNumber">-</span></div>
        <div class="info-row"><span class="info-label">Atomic Mass:</span> <span id="infoMass">-</span></div>
        <div class="info-row"><span class="info-label">Category:</span> <span id="infoCategory">-</span></div>
        <div class="info-row"><span class="info-label">Electronegativity:</span> <span id="infoEn">-</span></div>
    </div>

    <div id="quizPanel" class="panel">
        <div id="quizHeader">
            <strong style="font-size: 18px;">Quiz Mode</strong>
            <span id="diffBadge" style="background: #4dabf7; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold;">Lvl 1</span>
        </div>
        <div id="quizStats">
            <span id="qCount">Q: 0/10</span>
        </div>
        <hr style="border-color: #333; margin: 10px 0;">
        
        <div id="quizContent" class="hidden">
            <div id="timerBarContainer"><div id="timerBar"></div></div>
            <div id="questionText">Question goes here?</div>
            <div id="answersContainer">
                <button class="answer-btn" data-index="0">Answer 1</button>
                <button class="answer-btn" data-index="1">Answer 2</button>
                <button class="answer-btn" data-index="2">Answer 3</button>
                <button class="answer-btn" data-index="3">Answer 4</button>
            </div>
        </div>
        
        <button id="startQuizBtn">Start Quiz</button>
    </div>

    <div id="filterBar">
        <button class="filter-btn active" data-cat="All">All</button>
        <button class="filter-btn" data-cat="Alkali Metal">Alkali</button>
        <button class="filter-btn" data-cat="Alkaline Earth Metal">Alkaline Earth</button>
        <button class="filter-btn" data-cat="Transition Metal">Transition</button>
        <button class="filter-btn" data-cat="Nonmetal">Nonmetal</button>
        <button class="filter-btn" data-cat="Noble Gas">Noble Gas</button>
        <button class="filter-btn" data-cat="Halogen">Halogen</button>
        <button class="filter-btn" data-cat="Metalloid">Metalloid</button>
        <button class="filter-btn" data-cat="Post-transition Metal">Other Metal</button>
    </div>

    <div id="rotationBadge">Auto-Rotate [R]: OFF</div>

    <script>
        // State Management
        window.__3D_STATE__ = {
            selectedElement: null,
            quizActive: false,
            quizDifficulty: 1,
            quizScore: 0,
            quizStreak: 0,
            quizQuestionNumber: 0,
            quizTotalQuestions: 10,
            quizTimeRemaining: 0,
            quizCorrectCount: 0,
            quizWrongCount: 0,
            activeFilter: 'All',
            visibleElementCount: 36,
            autoRotate: false,
            elementsLoaded: 0,
            cameraDistance: 30,
            lastAnswerCorrect: null,
            difficultyChanges: 0
        };

        const state = window.__3D_STATE__;

        // Element Data (First 36)
        const elementsData = [
            { n: 1, s: 'H', name: 'Hydrogen', m: 1.008, c: 'Nonmetal', g: 1, p: 1, en: 2.20 },
            { n: 2, s: 'He', name: 'Helium', m: 4.0026, c: 'Noble Gas', g: 18, p: 1, en: null },
            { n: 3, s: 'Li', name: 'Lithium', m: 6.94, c: 'Alkali Metal', g: 1, p: 2, en: 0.98 },
            { n: 4, s: 'Be', name: 'Beryllium', m: 9.0122, c: 'Alkaline Earth Metal', g: 2, p: 2, en: 1.57 },
            { n: 5, s: 'B', name: 'Boron', m: 10.81, c: 'Metalloid', g: 13, p: 2, en: 2.04 },
            { n: 6, s: 'C', name: 'Carbon', m: 12.011, c: 'Nonmetal', g: 14, p: 2, en: 2.55 },
            { n: 7, s: 'N', name: 'Nitrogen', m: 14.007, c: 'Nonmetal', g: 15, p: 2, en: 3.04 },
            { n: 8, s: 'O', name: 'Oxygen', m: 15.999, c: 'Nonmetal', g: 16, p: 2, en: 3.44 },
            { n: 9, s: 'F', name: 'Fluorine', m: 18.998, c: 'Halogen', g: 17, p: 2, en: 3.98 },
            { n: 10, s: 'Ne', name: 'Neon', m: 20.180, c: 'Noble Gas', g: 18, p: 2, en: null },
            { n: 11, s: 'Na', name: 'Sodium', m: 22.990, c: 'Alkali Metal', g: 1, p: 3, en: 0.93 },
            { n: 12, s: 'Mg', name: 'Magnesium', m: 24.305, c: 'Alkaline Earth Metal', g: 2, p: 3, en: 1.31 },
            { n: 13, s: 'Al', name: 'Aluminum', m: 26.982, c: 'Post-transition Metal', g: 13, p: 3, en: 1.61 },
            { n: 14, s: 'Si', name: 'Silicon', m: 28.085, c: 'Metalloid', g: 14, p: 3, en: 1.90 },
            { n: 15, s: 'P', name: 'Phosphorus', m: 30.974, c: 'Nonmetal', g: 15, p: 3, en: 2.19 },
            { n: 16, s: 'S', name: 'Sulfur', m: 32.06, c: 'Nonmetal', g: 16, p: 3, en: 2.58 },
            { n: 17, s: 'Cl', name: 'Chlorine', m: 35.45, c: 'Halogen', g: 17, p: 3, en: 3.16 },
            { n: 18, s: 'Ar', name: 'Argon', m: 39.95, c: 'Noble Gas', g: 18, p: 3, en: null },
            { n: 19, s: 'K', name: 'Potassium', m: 39.098, c: 'Alkali Metal', g: 1, p: 4, en: 0.82 },
            { n: 20, s: 'Ca', name: 'Calcium', m: 40.078, c: 'Alkaline Earth Metal', g: 2, p: 4, en: 1.00 },
            { n: 21, s: 'Sc', name: 'Scandium', m: 44.956, c: 'Transition Metal', g: 3, p: 4, en: 1.36 },
            { n: 22, s: 'Ti', name: 'Titanium', m: 47.867, c: 'Transition Metal', g: 4, p: 4, en: 1.54 },
            { n: 23, s: 'V', name: 'Vanadium', m: 50.942, c: 'Transition Metal', g: 5, p: 4, en: 1.63 },
            { n: 24, s: 'Cr', name: 'Chromium', m: 51.996, c: 'Transition Metal', g: 6, p: 4, en: 1.66 },
            { n: 25, s: 'Mn', name: 'Manganese', m: 54.938, c: 'Transition Metal', g: 7, p: 4, en: 1.55 },
            { n: 26, s: 'Fe', name: 'Iron', m: 55.845, c: 'Transition Metal', g: 8, p: 4, en: 1.83 },
            { n: 27, s: 'Co', name: 'Cobalt', m: 58.933, c: 'Transition Metal', g: 9, p: 4, en: 1.88 },
            { n: 28, s: 'Ni', name: 'Nickel', m: 58.693, c: 'Transition Metal', g: 10, p: 4, en: 1.91 },
            { n: 29, s: 'Cu', name: 'Copper', m: 63.546, c: 'Transition Metal', g: 11, p: 4, en: 1.90 },
            { n: 30, s: 'Zn', name: 'Zinc', m: 65.38, c: 'Transition Metal', g: 12, p: 4, en: 1.65 },
            { n: 31, s: 'Ga', name: 'Gallium', m: 69.723, c: 'Post-transition Metal', g: 13, p: 4, en: 1.81 },
            { n: 32, s: 'Ge', name: 'Germanium', m: 72.630, c: 'Metalloid', g: 14, p: 4, en: 2.01 },
            { n: 33, s: 'As', name: 'Arsenic', m: 74.922, c: 'Metalloid', g: 15, p: 4, en: 2.18 },
            { n: 34, s: 'Se', name: 'Selenium', m: 78.971, c: 'Nonmetal', g: 16, p: 4, en: 2.55 },
            { n: 35, s: 'Br', name: 'Bromine', m: 79.904, c: 'Halogen', g: 17, p: 4, en: 2.96 },
            { n: 36, s: 'Kr', name: 'Krypton', m: 83.798, c: 'Noble Gas', g: 18, p: 4, en: 3.00 }
        ];

        const categoryColors = {
            'Alkali Metal': '#ff6b6b',
            'Alkaline Earth Metal': '#ffa94d',
            'Transition Metal': '#74c0fc',
            'Metalloid': '#a9e34b',
            'Nonmetal': '#69db7c',
            'Noble Gas': '#da77f2',
            'Halogen': '#ffd43b',
            'Post-transition Metal': '#20c997'
        };

        // Three.js Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0a0a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 10;
        controls.maxDistance = 60;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(10, 15, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight2.position.set(-10, 10, -10);
        scene.add(dirLight2);

        // Texture Generator
        function createSymbolTexture(symbol, bgColor) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, 128, 128);
            
            ctx.fillStyle = 'white';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(symbol, 64, 64);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        // Build Periodic Table
        const tableGroup = new THREE.Group();
        const elementMeshes = [];
        const boxGeo = new THREE.BoxGeometry(0.9, 0.9, 0.3);

        elementsData.forEach(el => {
            const color = categoryColors[el.c] || '#868e96';
            const texture = createSymbolTexture(el.s, color);
            
            const matFront = new THREE.MeshStandardMaterial({ map: texture, roughness: 0.3, metalness: 0.2 });
            const matSide = new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.2 });
            const materials = [matSide, matSide, matSide, matSide, matFront, matSide];

            const mesh = new THREE.Mesh(boxGeo, materials);
            
            // Position based on group and period
            mesh.position.x = (el.g - 9.5) * 1.05;
            mesh.position.y = (4 - el.p) * 1.05;
            
            mesh.userData = {
                ...el,
                baseColor: new THREE.Color(color),
                targetScale: 1,
                targetOpacity: 1,
                isPulsing: false,
                flashColor: null,
                flashTimer: 0
            };

            // Enable transparency for filtering
            materials.forEach(m => {
                m.transparent = true;
                m.opacity = 1;
            });

            tableGroup.add(mesh);
            elementMeshes.push(mesh);
            state.elementsLoaded++;
        });

        // Center the table slightly
        tableGroup.position.y = 1;
        scene.add(tableGroup);

        // Quiz Highlight Ring
        const ringGeo = new THREE.TorusGeometry(0.7, 0.05, 16, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });
        const highlightRing = new THREE.Mesh(ringGeo, ringMat);
        highlightRing.visible = false;
        scene.add(highlightRing);

        // Interaction
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMesh = null;
        let selectedMesh = null;

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onClick() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tableGroup.children);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                
                // Deselect previous
                if (selectedMesh && selectedMesh !== mesh) {
                    selectedMesh.userData.targetScale = state.activeFilter === 'All' || selectedMesh.userData.c === state.activeFilter ? 1 : 0.5;
                    selectedMesh.material.forEach(m => m.emissive.setHex(0x000000));
                }

                // Select new
                selectedMesh = mesh;
                selectedMesh.userData.targetScale = 1.3;
                
                // Update State
                state.selectedElement = {
                    number: mesh.userData.n,
                    symbol: mesh.userData.s,
                    name: mesh.userData.name,
                    atomicMass: mesh.userData.m,
                    category: mesh.userData.c
                };

                // Update UI
                document.getElementById('infoSymbol').innerText = mesh.userData.s;
                document.getElementById('infoName').innerText = mesh.userData.name;
                document.getElementById('infoNumber').innerText = mesh.userData.n;
                document.getElementById('infoMass').innerText = mesh.userData.m.toFixed(3);
                document.getElementById('infoCategory').innerText = mesh.userData.c;
                document.getElementById('infoEn').innerText = mesh.userData.en ? mesh.userData.en.toFixed(2) : 'N/A';
                document.getElementById('infoPanel').classList.add('active');

            } else {
                // Clicked empty space
                if (selectedMesh) {
                    selectedMesh.userData.targetScale = state.activeFilter === 'All' || selectedMesh.userData.c === state.activeFilter ? 1 : 0.5;
                    selectedMesh.material.forEach(m => m.emissive.setHex(0x000000));
                    selectedMesh = null;
                    state.selectedElement = null;
                    document.getElementById('infoPanel').classList.remove('active');
                }
            }
        }

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('click', onClick);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Keyboard Rotation Toggle
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                state.autoRotate = !state.autoRotate;
                document.getElementById('rotationBadge').innerText = `Auto-Rotate [R]: ${state.autoRotate ? 'ON' : 'OFF'}`;
            }
        });

        // Filtering Logic
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                
                const cat = e.target.getAttribute('data-cat');
                state.activeFilter = cat;
                state.visibleElementCount = 0;

                elementMeshes.forEach(mesh => {
                    if (cat === 'All' || mesh.userData.c === cat) {
                        mesh.userData.targetOpacity = 1;
                        mesh.userData.targetScale = mesh === selectedMesh ? 1.3 : 1;
                        mesh.userData.isPulsing = cat !== 'All';
                        state.visibleElementCount++;
                    } else {
                        mesh.userData.targetOpacity = 0.15;
                        mesh.userData.targetScale = 0.5;
                        mesh.userData.isPulsing = false;
                    }
                });
            });
        });

        // Quiz System
        let quizTimerInterval;
        let currentCorrectIndex = -1;
        let currentTargetMesh = null;
        let consecutiveCorrect = 0;
        let consecutiveWrong = 0;
        let isWaitingForNext = false;

        const startBtn = document.getElementById('startQuizBtn');
        const quizContent = document.getElementById('quizContent');
        const timerBarContainer = document.getElementById('timerBarContainer');
        const timerBar = document.getElementById('timerBar');
        const answerBtns = document.querySelectorAll('.answer-btn');

        startBtn.addEventListener('click', startQuiz);

        function startQuiz() {
            state.quizActive = true;
            state.quizScore = 0;
            state.quizStreak = 0;
            state.quizDifficulty = 1;
            state.quizQuestionNumber = 0;
            state.quizCorrectCount = 0;
            state.quizWrongCount = 0;
            consecutiveCorrect = 0;
            consecutiveWrong = 0;
            
            startBtn.classList.add('hidden');
            quizContent.classList.remove('hidden');
            timerBarContainer.style.display = 'block';
            
            updateHUD();
            nextQuestion();
        }

        function nextQuestion() {
            if (state.quizQuestionNumber >= state.quizTotalQuestions) {
                endQuiz();
                return;
            }

            isWaitingForNext = false;
            state.quizQuestionNumber++;
            document.getElementById('qCount').innerText = `Q: ${state.quizQuestionNumber}/${state.quizTotalQuestions}`;
            document.getElementById('diffBadge').innerText = `Lvl ${state.quizDifficulty}`;
            
            // Reset buttons
            answerBtns.forEach(btn => {
                btn.className = 'answer-btn';
                btn.disabled = false;
            });

            generateQuestionData();
        }

        function generateQuestionData() {
            let diff = state.quizDifficulty;
            let timeLimit = diff === 5 ? 10 : 15;
            
            // If level 5, pick random type 1-4
            let qType = diff === 5 ? Math.floor(Math.random() * 4) + 1 : diff;
            
            let target = elementsData[Math.floor(Math.random() * elementsData.length)];
            let qText = "";
            let answers = [];

            if (qType === 1) {
                qText = `What is the symbol for ${target.name}?`;
                answers.push(target.s);
                while(answers.length < 4) {
                    let rand = elementsData[Math.floor(Math.random() * elementsData.length)].s;
                    if(!answers.includes(rand)) answers.push(rand);
                }
            } else if (qType === 2) {
                qText = `What category does ${target.s} belong to?`;
                answers.push(target.c);
                const cats = Object.keys(categoryColors);
                while(answers.length < 4) {
                    let rand = cats[Math.floor(Math.random() * cats.length)];
                    if(!answers.includes(rand)) answers.push(rand);
                }
            } else if (qType === 3) {
                qText = `What is the atomic mass of ${target.s}?`;
                answers.push(target.m.toFixed(2));
                while(answers.length < 4) {
                    let offset = (Math.random() * 20 - 10);
                    let dist = (target.m + offset).toFixed(2);
                    if(dist > 0 && !answers.includes(dist)) answers.push(dist);
                }
            } else if (qType === 4) {
                let enElements = elementsData.filter(e => e.en !== null);
                target = enElements[Math.floor(Math.random() * enElements.length)];
                qText = `Which element has electronegativity closest to ${target.en.toFixed(2)}?`;
                answers.push(target.name);
                while(answers.length < 4) {
                    let rand = enElements[Math.floor(Math.random() * enElements.length)].name;
                    if(!answers.includes(rand)) answers.push(rand);
                }
            }

            document.getElementById('questionText').innerText = qText;

            // Shuffle
            let shuffled = answers.map(a => ({val: a, sort: Math.random()})).sort((a,b)=>a.sort-b.sort).map(a=>a.val);
            currentCorrectIndex = shuffled.indexOf(answers[0]);

            answerBtns.forEach((btn, i) => {
                btn.innerText = shuffled[i];
                btn.onclick = () => handleAnswer(i);
            });

            // Highlight Target in 3D
            currentTargetMesh = elementMeshes.find(m => m.userData.n === target.n);
            highlightRing.visible = true;

            startTimer(timeLimit);
        }

        function startTimer(seconds) {
            clearInterval(quizTimerInterval);
            state.quizTimeRemaining = seconds;
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#fcc419';
            
            let totalTime = seconds;
            
            quizTimerInterval = setInterval(() => {
                state.quizTimeRemaining -= 0.1;
                let pct = (state.quizTimeRemaining / totalTime) * 100;
                timerBar.style.width = `${pct}%`;
                
                if (pct < 30) timerBar.style.backgroundColor = '#dc3545';
                
                if (state.quizTimeRemaining <= 0) {
                    clearInterval(quizTimerInterval);
                    handleAnswer(-1); // Timeout
                }
            }, 100);
        }

        function handleAnswer(selectedIndex) {
            if (isWaitingForNext) return;
            isWaitingForNext = true;
            clearInterval(quizTimerInterval);
            
            answerBtns.forEach(btn => btn.disabled = true);
            
            const isCorrect = selectedIndex === currentCorrectIndex;
            state.lastAnswerCorrect = isCorrect;

            if (isCorrect) {
                answerBtns[selectedIndex].classList.add('correct');
                state.quizScore += state.quizDifficulty * 10;
                state.quizStreak++;
                state.quizCorrectCount++;
                consecutiveCorrect++;
                consecutiveWrong = 0;
                
                if (currentTargetMesh) {
                    currentTargetMesh.userData.flashColor = 0x00ff00;
                    currentTargetMesh.userData.flashTimer = 1.0;
                }

                // Difficulty Up
                if (consecutiveCorrect >= 3 && state.quizDifficulty < 5) {
                    state.quizDifficulty++;
                    consecutiveCorrect = 0;
                    state.difficultyChanges++;
                }
            } else {
                if (selectedIndex >= 0) answerBtns[selectedIndex].classList.add('wrong');
                answerBtns[currentCorrectIndex].classList.add('correct');
                
                state.quizStreak = 0;
                state.quizWrongCount++;
                consecutiveWrong++;
                consecutiveCorrect = 0;

                if (currentTargetMesh) {
                    currentTargetMesh.userData.flashColor = 0xff0000;
                    currentTargetMesh.userData.flashTimer = 1.5;
                }

                // Difficulty Down
                if (consecutiveWrong >= 2 && state.quizDifficulty > 1) {
                    state.quizDifficulty--;
                    consecutiveWrong = 0;
                    state.difficultyChanges++;
                }
            }

            updateHUD();
            setTimeout(nextQuestion, 1500);
        }

        function endQuiz() {
            state.quizActive = false;
            highlightRing.visible = false;
            document.getElementById('questionText').innerText = `Quiz Complete! Score: ${state.quizScore}`;
            timerBarContainer.style.display = 'none';
            answerBtns.forEach(btn => { btn.style.display = 'none'; });
            
            setTimeout(() => {
                startBtn.classList.remove('hidden');
                startBtn.innerText = 'Play Again';
                quizContent.classList.add('hidden');
                answerBtns.forEach(btn => { btn.style.display = 'block'; });
            }, 3000);
        }

        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = state.quizScore;
            let streakText = `Streak: ${state.quizStreak}`;
            if (state.quizStreak >= 3) streakText += ' 🔥';
            document.getElementById('streakDisplay').innerText = streakText;
        }

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();
            state.cameraDistance = camera.position.distanceTo(scene.position);

            // Auto Rotation
            if (state.autoRotate) {
                tableGroup.rotation.y += 0.3 * delta;
            }

            // Raycasting Hover
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tableGroup.children);
            
            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredMesh !== object) {
                    if (hoveredMesh && hoveredMesh !== selectedMesh && hoveredMesh.userData.flashTimer <= 0) {
                        hoveredMesh.material.forEach(m => m.emissive.setHex(0x000000));
                    }
                    hoveredMesh = object;
                    if (hoveredMesh !== selectedMesh && hoveredMesh.userData.flashTimer <= 0) {
                        hoveredMesh.material.forEach(m => m.emissive.setHex(0x333333));
                    }
                }
            } else {
                if (hoveredMesh && hoveredMesh !== selectedMesh && hoveredMesh.userData.flashTimer <= 0) {
                    hoveredMesh.material.forEach(m => m.emissive.setHex(0x000000));
                }
                hoveredMesh = null;
            }

            // Mesh Updates (Scale, Opacity, Pulse, Flash)
            elementMeshes.forEach(mesh => {
                // Lerp Scale
                mesh.scale.lerp(new THREE.Vector3(mesh.userData.targetScale, mesh.userData.targetScale, mesh.userData.targetScale), 0.1);
                
                // Lerp Opacity
                mesh.material.forEach(m => {
                    m.opacity += (mesh.userData.targetOpacity - m.opacity) * 0.1;
                });

                // Filter Pulse
                if (mesh.userData.isPulsing && mesh !== selectedMesh) {
                    const pulseScale = 1 + Math.sin(time * 3) * 0.05;
                    mesh.scale.set(pulseScale, pulseScale, pulseScale);
                }

                // Selected Glow
                if (mesh === selectedMesh && mesh.userData.flashTimer <= 0) {
                    const glow = 0.2 + Math.sin(time * 5) * 0.1;
                    mesh.material.forEach(m => m.emissive.setHSL(0, 0, glow));
                }

                // Quiz Flash
                if (mesh.userData.flashTimer > 0) {
                    mesh.userData.flashTimer -= delta;
                    mesh.material.forEach(m => m.emissive.setHex(mesh.userData.flashColor));
                    if (mesh.userData.flashTimer <= 0) {
                        mesh.material.forEach(m => m.emissive.setHex(0x000000));
                    }
                }
            });

            // Quiz Highlight Ring Update
            if (state.quizActive && highlightRing.visible && currentTargetMesh) {
                // Get world position of target mesh
                const worldPos = new THREE.Vector3();
                currentTargetMesh.getWorldPosition(worldPos);
                highlightRing.position.copy(worldPos);
                
                // Make ring face camera
                highlightRing.quaternion.copy(camera.quaternion);
                
                // Pulse ring
                const s = 1.2 + Math.sin(time * 8) * 0.2;
                highlightRing.scale.set(s, s, s);
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
