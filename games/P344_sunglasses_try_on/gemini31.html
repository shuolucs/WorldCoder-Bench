<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sunglasses Try-On Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            color: #333;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .interactive {
            pointer-events: auto;
        }
        #titleBar {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .side-panels {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            flex-grow: 1;
        }
        .left-panel, .right-panel {
            width: 150px;
        }
        h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            text-transform: uppercase;
            color: #555;
        }
        button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: #e0e0e0;
        }
        button.active {
            background: #333;
            color: #fff;
            border-color: #333;
        }
        .bottom-bar {
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #priceDisplay {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
        }
        #btn_cart {
            background: #27ae60;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            position: relative;
        }
        #btn_cart:hover {
            background: #2ecc71;
        }
        #cartBadge {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #e74c3c;
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        #uvInfoPanel {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(41, 128, 185, 0.9);
            color: white;
            padding: 15px;
            border-radius: 8px;
            display: none;
            text-align: center;
            width: 300px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="ui-layer">
        <div id="titleBar" class="interactive">Sunglasses Try-On</div>
        
        <div id="uvInfoPanel" class="interactive">
            <h4>UV Protection Info</h4>
            <p>All our lenses offer 100% UVA/UVB protection, keeping your eyes safe from harmful rays.</p>
        </div>

        <div class="side-panels">
            <div class="panel left-panel interactive">
                <h3>Lens Style</h3>
                <button id="btn_classic" class="active">Classic</button>
                <button id="btn_aviator">Aviator</button>
                <button id="btn_sport">Sport</button>
                <button id="btn_fashion">Fashion</button>
                <button id="btn_clear">Clear</button>
            </div>

            <div class="panel right-panel interactive">
                <h3>Frame Color</h3>
                <button id="btn_black" class="active">Black</button>
                <button id="btn_gold">Gold</button>
                <button id="btn_silver">Silver</button>
                <button id="btn_tortoise">Tortoise</button>
            </div>
        </div>

        <div class="bottom-bar interactive">
            <div class="control-group">
                <label for="sizeSlider">Size:</label>
                <input type="range" id="sizeSlider" min="0.5" max="2.0" step="0.1" value="1.0">
            </div>
            
            <div class="control-group">
                <button id="btn_uv_toggle">Toggle UV Info</button>
                <button id="btn_animate">Toggle Animation</button>
                <button id="btn_reset">Reset</button>
            </div>

            <div class="control-group">
                <div id="priceDisplay">$49.99</div>
                <button id="btn_cart">
                    Add to Cart
                    <span id="cartBadge">0</span>
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            lensStyle: 'classic',
            frameColor: 'black',
            sunglassesScale: 1.0,
            price: 49.99,
            cartCount: 0,
            uvPanelVisible: false,
            isAnimating: false,
            sunglassesRotationY: 0,
            modelLoaded: false,
            cameraDistance: 5,
            frameColorHex: '#111111',
            lensOpacity: 0.8,
            selectedCount: 0
        };

        // --- CONFIGURATION DATA ---
        const BASE_PRICE = 49.99;
        
        const LENS_STYLES = {
            'classic': { color: 0x111111, opacity: 0.8, metalness: 0.1, priceAdd: 0 },
            'aviator': { color: 0x2d5a27, opacity: 0.7, metalness: 0.2, priceAdd: 10 },
            'sport':   { color: 0xff6600, opacity: 0.6, metalness: 0.9, priceAdd: 20 },
            'fashion': { color: 0x8b00ff, opacity: 0.65, metalness: 0.1, priceAdd: 15 },
            'clear':   { color: 0xffffff, opacity: 0.2, metalness: 0.0, priceAdd: 0 }
        };

        const FRAME_COLORS = {
            'black':    { hex: '#111111', color: 0x111111, priceAdd: 0 },
            'gold':     { hex: '#ffd700', color: 0xffd700, priceAdd: 30 },
            'silver':   { hex: '#c0c0c0', color: 0xc0c0c0, priceAdd: 15 },
            'tortoise': { hex: '#8b4513', color: 0x8b4513, priceAdd: 10 }
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.5;
        controls.target.set(0, 1, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- GROUND ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, depthWrite: false });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.5;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- LOAD PLACEHOLDER MODEL ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
            function (gltf) {
                const model = gltf.scene;
                
                // Center model
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.x += (model.position.x - center.x);
                model.position.z += (model.position.z - center.z);
                // Adjust Y to sit on ground
                model.position.y = -0.5; 

                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                window.__3D_STATE__.modelLoaded = true;
            },
            undefined,
            function (error) {
                console.error('Error loading model:', error);
            }
        );

        // --- PROCEDURAL SUNGLASSES ---
        const sunglassesGroup = new THREE.Group();
        sunglassesGroup.position.set(0, 2.5, 0);

        const lensMaterial = new THREE.MeshPhysicalMaterial({
            color: LENS_STYLES['classic'].color,
            transparent: true,
            opacity: LENS_STYLES['classic'].opacity,
            metalness: LENS_STYLES['classic'].metalness,
            roughness: 0.1,
            transmission: 0.5,
            thickness: 0.1
        });

        const frameMaterial = new THREE.MeshStandardMaterial({
            color: FRAME_COLORS['black'].color,
            roughness: 0.4,
            metalness: 0.2
        });

        // Lenses (Torus)
        const lensGeo = new THREE.TorusGeometry(0.3, 0.05, 16, 50);
        const leftLens = new THREE.Mesh(lensGeo, lensMaterial);
        leftLens.position.set(-0.4, 0, 0);
        leftLens.castShadow = true;
        
        const rightLens = new THREE.Mesh(lensGeo, lensMaterial);
        rightLens.position.set(0.4, 0, 0);
        rightLens.castShadow = true;

        // Bridge (Cylinder)
        const bridgeGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.2, 8);
        const bridge = new THREE.Mesh(bridgeGeo, frameMaterial);
        bridge.rotation.z = Math.PI / 2;
        bridge.castShadow = true;

        // Temple Arms (Boxes)
        const armGeo = new THREE.BoxGeometry(0.05, 0.05, 1.0);
        const leftArm = new THREE.Mesh(armGeo, frameMaterial);
        leftArm.position.set(-0.7, 0, -0.5);
        leftArm.castShadow = true;

        const rightArm = new THREE.Mesh(armGeo, frameMaterial);
        rightArm.position.set(0.7, 0, -0.5);
        rightArm.castShadow = true;

        sunglassesGroup.add(leftLens);
        sunglassesGroup.add(rightLens);
        sunglassesGroup.add(bridge);
        sunglassesGroup.add(leftArm);
        sunglassesGroup.add(rightArm);

        scene.add(sunglassesGroup);

        // --- LOGIC & UI UPDATES ---
        function updatePrice() {
            const state = window.__3D_STATE__;
            const lensPrice = LENS_STYLES[state.lensStyle].priceAdd;
            const framePrice = FRAME_COLORS[state.frameColor].priceAdd;
            
            let calcPrice = (BASE_PRICE + lensPrice + framePrice) * state.sunglassesScale;
            state.price = parseFloat(calcPrice.toFixed(2));
            
            document.getElementById('priceDisplay').innerText = `$${state.price.toFixed(2)}`;
        }

        function updateActiveButtons(groupPrefix, activeId) {
            const buttons = document.querySelectorAll(`[id^="${groupPrefix}"]`);
            buttons.forEach(btn => btn.classList.remove('active'));
            document.getElementById(activeId).classList.add('active');
        }

        function setLensStyle(style) {
            const config = LENS_STYLES[style];
            lensMaterial.color.setHex(config.color);
            lensMaterial.opacity = config.opacity;
            lensMaterial.metalness = config.metalness;
            
            window.__3D_STATE__.lensStyle = style;
            window.__3D_STATE__.lensOpacity = config.opacity;
            window.__3D_STATE__.selectedCount++;
            
            updateActiveButtons('btn_', `btn_${style}`);
            updatePrice();
        }

        function setFrameColor(color) {
            const config = FRAME_COLORS[color];
            frameMaterial.color.setHex(config.color);
            
            window.__3D_STATE__.frameColor = color;
            window.__3D_STATE__.frameColorHex = config.hex;
            window.__3D_STATE__.selectedCount++;
            
            updateActiveButtons('btn_', `btn_${color}`);
            updatePrice();
        }

        function setScale(val) {
            const scale = parseFloat(val);
            sunglassesGroup.scale.set(scale, scale, scale);
            
            window.__3D_STATE__.sunglassesScale = scale;
            window.__3D_STATE__.selectedCount++;
            
            updatePrice();
        }

        // --- EVENT LISTENERS ---
        // Lens Buttons
        Object.keys(LENS_STYLES).forEach(style => {
            document.getElementById(`btn_${style}`).addEventListener('click', () => setLensStyle(style));
        });

        // Frame Buttons
        Object.keys(FRAME_COLORS).forEach(color => {
            document.getElementById(`btn_${color}`).addEventListener('click', () => setFrameColor(color));
        });

        // Size Slider
        const sizeSlider = document.getElementById('sizeSlider');
        sizeSlider.addEventListener('input', (e) => setScale(e.target.value));

        // UV Toggle
        document.getElementById('btn_uv_toggle').addEventListener('click', () => {
            const panel = document.getElementById('uvInfoPanel');
            const isHidden = panel.style.display === 'none' || panel.style.display === '';
            panel.style.display = isHidden ? 'block' : 'none';
            window.__3D_STATE__.uvPanelVisible = isHidden;
        });

        // Animation Toggle
        document.getElementById('btn_animate').addEventListener('click', () => {
            window.__3D_STATE__.isAnimating = !window.__3D_STATE__.isAnimating;
            document.getElementById('btn_animate').classList.toggle('active');
        });

        // Add to Cart
        document.getElementById('btn_cart').addEventListener('click', () => {
            window.__3D_STATE__.cartCount++;
            document.getElementById('cartBadge').innerText = window.__3D_STATE__.cartCount;
        });

        // Reset
        document.getElementById('btn_reset').addEventListener('click', () => {
            setLensStyle('classic');
            setFrameColor('black');
            
            sizeSlider.value = 1.0;
            setScale(1.0);
            
            sunglassesGroup.rotation.y = 0;
            window.__3D_STATE__.isAnimating = false;
            document.getElementById('btn_animate').classList.remove('active');
            
            window.__3D_STATE__.selectedCount = 0;
        });

        // Window Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (window.__3D_STATE__.isAnimating) {
                sunglassesGroup.rotation.y += 0.02;
            }
            
            // Update State continuously
            window.__3D_STATE__.sunglassesRotationY = sunglassesGroup.rotation.y;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        updatePrice();
        animate();

    </script>
</body>
</html>
