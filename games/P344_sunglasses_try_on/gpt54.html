<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sunglasses Try-On</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #titleBar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(255,255,255,0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: bold;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    }

    #leftPanel, #rightPanel, #bottomPanel, #topRightPanel {
      position: absolute;
      background: rgba(255,255,255,0.92);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      z-index: 10;
    }

    #leftPanel {
      top: 80px;
      left: 16px;
      width: 180px;
    }

    #rightPanel {
      top: 80px;
      right: 16px;
      width: 180px;
    }

    #topRightPanel {
      top: 80px;
      right: 220px;
      width: 220px;
    }

    #bottomPanel {
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: 460px;
      max-width: calc(100vw - 32px);
    }

    .panelTitle {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }

    .btn {
      width: 100%;
      margin: 6px 0;
      padding: 10px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: #e8e8e8;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: #dcdcdc;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn.active {
      outline: 2px solid #333;
      background: #d0d0d0;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0;
      flex-wrap: wrap;
    }

    label {
      font-size: 14px;
      color: #333;
    }

    #sizeSlider {
      flex: 1;
    }

    #priceDisplay {
      font-size: 20px;
      font-weight: bold;
      color: #1f4d2e;
      margin-top: 8px;
    }

    #uvInfoPanel {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #f8fbff;
      border: 1px solid #cfe3ff;
      font-size: 13px;
      color: #24415c;
      line-height: 1.4;
    }

    #btn_cart {
      background: #2f7ef7;
      color: white;
      font-weight: bold;
    }

    #btn_cart:hover {
      background: #216de0;
    }

    #cartContainer {
      position: absolute;
      top: 12px;
      right: 16px;
      z-index: 12;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #cartIcon {
      background: #222;
      color: white;
      border-radius: 20px;
      padding: 8px 12px;
      font-size: 14px;
    }

    #cartBadge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 22px;
      height: 22px;
      border-radius: 11px;
      background: #ff3b30;
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 0 6px;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="titleBar">Sunglasses Try-On</div>

    <div id="cartContainer">
      <div id="cartIcon">Cart</div>
      <div id="cartBadge">0</div>
    </div>

    <div id="leftPanel">
      <div class="panelTitle">Lens Styles</div>
      <button class="btn active" id="btn_classic">Classic</button>
      <button class="btn" id="btn_aviator">Aviator</button>
      <button class="btn" id="btn_sport">Sport</button>
      <button class="btn" id="btn_fashion">Fashion</button>
      <button class="btn" id="btn_clear">Clear</button>
    </div>

    <div id="rightPanel">
      <div class="panelTitle">Frame Colors</div>
      <button class="btn active" id="btn_black">Black</button>
      <button class="btn" id="btn_gold">Gold</button>
      <button class="btn" id="btn_silver">Silver</button>
      <button class="btn" id="btn_tortoise">Tortoise</button>
    </div>

    <div id="topRightPanel">
      <div class="panelTitle">Extras</div>
      <button class="btn" id="btn_uv_toggle">Toggle UV Protection Info</button>
      <button class="btn" id="btn_animate">Start/Stop Animation</button>
      <button class="btn" id="btn_reset">Reset</button>
      <div id="uvInfoPanel">
        UV400-style protection helps reduce exposure to harmful UVA and UVB rays.
        Lens tint affects visible light transmission, but UV protection depends on coating/material properties.
      </div>
    </div>

    <div id="bottomPanel">
      <div class="row">
        <label for="sizeSlider">Size</label>
        <input id="sizeSlider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
        <span id="sizeValue">1.0x</span>
      </div>
      <div class="row">
        <button class="btn" id="btn_cart" style="flex:1;">Add to Cart</button>
      </div>
      <div id="priceDisplay">$49.99</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#f0f0f0");

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 7);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(1024, 1024);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0xd9d9d9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    scene.add(ground);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.5;

    const lensStyles = {
      classic: { color: "#111111", opacity: 0.8, metalness: 0.1, roughness: 0.2 },
      aviator: { color: "#2d5a27", opacity: 0.7, metalness: 0.2, roughness: 0.15 },
      sport: { color: "#ff6600", opacity: 0.6, metalness: 0.9, roughness: 0.05 },
      fashion: { color: "#8b00ff", opacity: 0.65, metalness: 0.2, roughness: 0.12 },
      clear: { color: "#ffffff", opacity: 0.2, metalness: 0.0, roughness: 0.05 }
    };

    const frameColors = {
      black: "#111111",
      gold: "#ffd700",
      silver: "#c0c0c0",
      tortoise: "#8b4513"
    };

    const state = {
      lensStyle: "classic",
      frameColor: "black",
      sunglassesScale: 1.0,
      price: 49.99,
      cartCount: 0,
      uvPanelVisible: false,
      isAnimating: false,
      sunglassesRotationY: 0,
      modelLoaded: false,
      cameraDistance: camera.position.length(),
      frameColorHex: frameColors.black,
      lensOpacity: lensStyles.classic.opacity,
      selectedCount: 0
    };

    window.__3D_STATE__ = state;

    let loadedModel = null;
    const modelRoot = new THREE.Group();
    scene.add(modelRoot);

    const sunglassesGroup = new THREE.Group();
    sunglassesGroup.position.set(0, 2.5, 0);
    scene.add(sunglassesGroup);

    const frameMaterial = new THREE.MeshStandardMaterial({
      color: frameColors.black,
      metalness: 0.6,
      roughness: 0.35
    });

    const lensMaterial = new THREE.MeshStandardMaterial({
      color: lensStyles.classic.color,
      transparent: true,
      opacity: lensStyles.classic.opacity,
      metalness: lensStyles.classic.metalness,
      roughness: lensStyles.classic.roughness,
      side: THREE.DoubleSide
    });

    const leftLens = new THREE.Mesh(
      new THREE.TorusGeometry(0.3, 0.05, 16, 64),
      lensMaterial
    );
    leftLens.position.set(-0.42, 0, 0);
    leftLens.castShadow = true;

    const rightLens = new THREE.Mesh(
      new THREE.TorusGeometry(0.3, 0.05, 16, 64),
      lensMaterial
    );
    rightLens.position.set(0.42, 0, 0);
    rightLens.castShadow = true;

    const bridge = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.03, 0.22, 16),
      frameMaterial
    );
    bridge.rotation.z = Math.PI / 2;
    bridge.castShadow = true;

    const topBar = new THREE.Mesh(
      new THREE.CylinderGeometry(0.02, 0.02, 1.0, 16),
      frameMaterial
    );
    topBar.rotation.z = Math.PI / 2;
    topBar.position.y = 0.18;
    topBar.castShadow = true;

    const leftArm = new THREE.Mesh(
      new THREE.BoxGeometry(0.65, 0.04, 0.04),
      frameMaterial
    );
    leftArm.position.set(-0.86, 0.05, -0.15);
    leftArm.rotation.y = 0.45;
    leftArm.castShadow = true;

    const rightArm = new THREE.Mesh(
      new THREE.BoxGeometry(0.65, 0.04, 0.04),
      frameMaterial
    );
    rightArm.position.set(0.86, 0.05, -0.15);
    rightArm.rotation.y = -0.45;
    rightArm.castShadow = true;

    sunglassesGroup.add(leftLens, rightLens, bridge, topBar, leftArm, rightArm);

    const loader = new GLTFLoader();
    loader.load(
      "CesiumMilkTruck.glb",
      (gltf) => {
        loadedModel = gltf.scene;
        loadedModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        const box = new THREE.Box3().setFromObject(loadedModel);
        const center = new THREE.Vector3();
        box.getCenter(center);
        loadedModel.position.sub(center);

        loadedModel.scale.setScalar(1.0);
        modelRoot.add(loadedModel);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load CesiumMilkTruck.glb", err);
      }
    );

    function setActiveButton(groupIds, activeId) {
      groupIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle("active", id === activeId);
      });
    }

    function calculatePrice() {
      let price = 49.99;

      if (state.lensStyle === "sport") price += 20;
      if (state.lensStyle === "fashion") price += 15;
      if (state.lensStyle === "aviator") price += 10;

      if (state.frameColor === "gold") price += 30;
      if (state.frameColor === "silver") price += 15;
      if (state.frameColor === "tortoise") price += 10;

      price *= state.sunglassesScale;
      state.price = Number(price.toFixed(2));
      document.getElementById("priceDisplay").textContent = `$${state.price.toFixed(2)}`;
    }

    function applyLensStyle(styleName, countChange = true) {
      const style = lensStyles[styleName];
      if (!style) return;

      state.lensStyle = styleName;
      lensMaterial.color.set(style.color);
      lensMaterial.opacity = style.opacity;
      lensMaterial.metalness = style.metalness ?? 0.1;
      lensMaterial.roughness = style.roughness ?? 0.2;
      lensMaterial.needsUpdate = true;

      state.lensOpacity = style.opacity;
      setActiveButton(
        ["btn_classic", "btn_aviator", "btn_sport", "btn_fashion", "btn_clear"],
        `btn_${styleName}`
      );

      if (countChange) state.selectedCount++;
      calculatePrice();
    }

    function applyFrameColor(colorName, countChange = true) {
      const hex = frameColors[colorName];
      if (!hex) return;

      state.frameColor = colorName;
      state.frameColorHex = hex;
      frameMaterial.color.set(hex);

      setActiveButton(
        ["btn_black", "btn_gold", "btn_silver", "btn_tortoise"],
        `btn_${colorName}`
      );

      if (countChange) state.selectedCount++;
      calculatePrice();
    }

    function applySize(size, countChange = true) {
      const numericSize = Number(size);
      state.sunglassesScale = numericSize;
      sunglassesGroup.scale.setScalar(numericSize);
      document.getElementById("sizeSlider").value = numericSize.toFixed(1);
      document.getElementById("sizeValue").textContent = `${numericSize.toFixed(1)}x`;

      if (countChange) state.selectedCount++;
      calculatePrice();
    }

    function resetAll() {
      state.selectedCount = 0;
      state.isAnimating = false;
      state.uvPanelVisible = false;
      sunglassesGroup.rotation.y = 0;
      state.sunglassesRotationY = 0;

      applyLensStyle("classic", false);
      applyFrameColor("black", false);
      applySize(1.0, false);

      document.getElementById("uvInfoPanel").style.display = "none";
    }

    document.getElementById("btn_classic").addEventListener("click", () => applyLensStyle("classic"));
    document.getElementById("btn_aviator").addEventListener("click", () => applyLensStyle("aviator"));
    document.getElementById("btn_sport").addEventListener("click", () => applyLensStyle("sport"));
    document.getElementById("btn_fashion").addEventListener("click", () => applyLensStyle("fashion"));
    document.getElementById("btn_clear").addEventListener("click", () => applyLensStyle("clear"));

    document.getElementById("btn_black").addEventListener("click", () => applyFrameColor("black"));
    document.getElementById("btn_gold").addEventListener("click", () => applyFrameColor("gold"));
    document.getElementById("btn_silver").addEventListener("click", () => applyFrameColor("silver"));
    document.getElementById("btn_tortoise").addEventListener("click", () => applyFrameColor("tortoise"));

    document.getElementById("sizeSlider").addEventListener("input", (e) => {
      applySize(e.target.value);
    });

    document.getElementById("btn_uv_toggle").addEventListener("click", () => {
      state.uvPanelVisible = !state.uvPanelVisible;
      document.getElementById("uvInfoPanel").style.display = state.uvPanelVisible ? "block" : "none";
      state.selectedCount++;
    });

    document.getElementById("btn_reset").addEventListener("click", resetAll);

    document.getElementById("btn_cart").addEventListener("click", () => {
      state.cartCount++;
      document.getElementById("cartBadge").textContent = state.cartCount;
    });

    document.getElementById("btn_animate").addEventListener("click", () => {
      state.isAnimating = !state.isAnimating;
      state.selectedCount++;
    });

    function updateStateContinuously() {
      state.sunglassesRotationY = sunglassesGroup.rotation.y;
      state.cameraDistance = Number(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)).toFixed(3));
      state.frameColorHex = `#${frameMaterial.color.getHexString()}`;
      state.lensOpacity = lensMaterial.opacity;
    }

    function animate() {
      requestAnimationFrame(animate);

      if (state.isAnimating) {
        sunglassesGroup.rotation.y += 0.02;
      }

      controls.update();
      updateStateContinuously();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    calculatePrice();
    updateStateContinuously();
    animate();
  </script>
</body>
</html>
