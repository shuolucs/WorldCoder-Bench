<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cell Division (Mitosis) 3D Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
        }
        #phase-label {
            font-size: 24px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border-radius: 8px;
            letter-spacing: 1px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #phase-counter {
            font-size: 16px;
            margin-top: 8px;
            text-shadow: 1px 1px 2px black;
        }
        #control-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            flex-wrap: wrap;
            justify-content: center;
        }
        button {
            background-color: #44cc88;
            color: #0a0a2e;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        button:hover:not(:disabled) {
            background-color: #55ee99;
            transform: translateY(-2px);
        }
        button:active:not(:disabled) {
            transform: translateY(0);
        }
        button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }
        #btn-play { background-color: #4444ff; color: white; }
        #btn-play:hover:not(:disabled) { background-color: #6666ff; }
        #btn-reset { background-color: #ff4444; color: white; }
        #btn-reset:hover:not(:disabled) { background-color: #ff6666; }
        #btn-save, #btn-load { background-color: #ffaa00; color: #0a0a2e; }
        #btn-save:hover:not(:disabled), #btn-load:hover:not(:disabled) { background-color: #ffcc33; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div id="phase-label">Interphase</div>
        <div id="phase-counter">Phase 1/7</div>
    </div>

    <div id="control-panel">
        <button id="btn-prev">Previous Phase</button>
        <button id="btn-next">Next Phase</button>
        <button id="btn-play">Play All</button>
        <button id="btn-save">Save State</button>
        <button id="btn-load">Load State</button>
        <button id="btn-reset">Reset</button>
    </div>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // --- Materials ---
        const membraneMat = new THREE.MeshPhongMaterial({ color: 0x44cc88, transparent: true, opacity: 0.4, shininess: 100 });
        const nucleusMat = new THREE.MeshPhongMaterial({ color: 0x8844cc, transparent: true, opacity: 1.0 });
        const torusMat = new THREE.MeshBasicMaterial({ color: 0x88ffaa, transparent: true, opacity: 1.0 });
        
        const dMembraneMat = new THREE.MeshPhongMaterial({ color: 0x44cc88, transparent: true, opacity: 0, shininess: 100 });
        const dNucleusMat = new THREE.MeshPhongMaterial({ color: 0x8844cc, transparent: true, opacity: 0 });
        const dTorusMat = new THREE.MeshBasicMaterial({ color: 0x88ffaa, transparent: true, opacity: 0 });

        const chrColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44];
        const chrMaterials = chrColors.map(c => new THREE.MeshPhongMaterial({ color: c }));

        // --- Objects ---
        // Parent Cell
        const parentCell = new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), membraneMat);
        scene.add(parentCell);

        const parentNucleus = new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), nucleusMat);
        scene.add(parentNucleus);

        const parentTorus = new THREE.Mesh(new THREE.TorusGeometry(2.1, 0.03, 16, 100), torusMat);
        scene.add(parentTorus);

        // Chromosomes
        const chromosomes = [];
        const initialChrPos = [];
        for (let i = 0; i < 4; i++) {
            const chr = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), chrMaterials[i]);
            // Random position inside nucleus (radius 0.7)
            const r = Math.random() * 0.4;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const pos = new THREE.Vector3(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
            chr.position.copy(pos);
            initialChrPos.push(pos.clone());
            scene.add(chr);
            chromosomes.push(chr);
        }

        // Spindle Apparatus
        const spindleGeo = new THREE.BufferGeometry();
        const spindleMat = new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0 });
        const spindleLines = new THREE.LineSegments(spindleGeo, spindleMat);
        spindleLines.visible = false;
        scene.add(spindleLines);

        // Telophase New Nuclei
        const newNucleus1 = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), nucleusMat.clone());
        const newNucleus2 = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), nucleusMat.clone());
        newNucleus1.position.y = 1.5;
        newNucleus2.position.y = -1.5;
        newNucleus1.visible = false;
        newNucleus2.visible = false;
        scene.add(newNucleus1);
        scene.add(newNucleus2);

        // Daughter Cells
        function createDaughterCell() {
            const group = new THREE.Group();
            group.add(new THREE.Mesh(new THREE.SphereGeometry(2, 32, 32), dMembraneMat));
            group.add(new THREE.Mesh(new THREE.SphereGeometry(0.7, 32, 32), dNucleusMat));
            group.add(new THREE.Mesh(new THREE.TorusGeometry(2.1, 0.03, 16, 100), dTorusMat));
            
            // Add static chromosomes to daughter cells for visual completeness
            for(let i=0; i<4; i++) {
                const c = new THREE.Mesh(new THREE.SphereGeometry(0.15, 16, 16), chrMaterials[i]);
                c.position.set(Math.random()*0.4-0.2, Math.random()*0.4-0.2, Math.random()*0.4-0.2);
                group.add(c);
            }
            
            group.visible = false;
            return group;
        }
        const daughterCell1 = createDaughterCell();
        const daughterCell2 = createDaughterCell();
        scene.add(daughterCell1);
        scene.add(daughterCell2);

        // --- State Management ---
        const phaseNames = ['Interphase', 'Prophase', 'Metaphase', 'Anaphase', 'Telophase', 'Cytokinesis', 'Complete'];
        let currentPhase = 0;
        let isAnimating = false;
        let isAutoPlaying = false;
        let animationProgress = 0;
        let autoPlayTimeout = null;
        let lastTime = 0;

        function getPhaseState(phase) {
            const state = {
                pScaleX: 1, pScaleY: 1, pScaleZ: 1,
                pOpacity: 0.4, pTorusOpacity: 1.0,
                nucOpacity: 1.0,
                c0: initialChrPos[0].clone(),
                c1: initialChrPos[1].clone(),
                c2: initialChrPos[2].clone(),
                c3: initialChrPos[3].clone(),
                spindleOp: 0,
                newNucOp: 0, newNucScale: 0.1,
                dY: 0, dScale: 0.1, dOp: 0
            };

            switch(phase) {
                case 0: // Interphase
                    break;
                case 1: // Prophase
                    state.nucOpacity = 0.1;
                    state.c0.set(-0.2, 0.3, 0.1);
                    state.c1.set(0.2, 0.1, -0.1);
                    state.c2.set(-0.2, -0.1, 0.1);
                    state.c3.set(0.2, -0.3, -0.1);
                    break;
                case 2: // Metaphase
                    state.nucOpacity = 0;
                    state.c0.set(0, 0.6, 0);
                    state.c1.set(0, 0.2, 0);
                    state.c2.set(0, -0.2, 0);
                    state.c3.set(0, -0.6, 0);
                    state.spindleOp = 1;
                    break;
                case 3: // Anaphase
                    state.nucOpacity = 0;
                    state.pScaleX = 0.9; state.pScaleY = 1.2; state.pScaleZ = 0.9;
                    state.c0.set(-0.2, 1.2, 0);
                    state.c1.set(0.2, 1.2, 0);
                    state.c2.set(-0.2, -1.2, 0);
                    state.c3.set(0.2, -1.2, 0);
                    state.spindleOp = 1;
                    break;
                case 4: // Telophase
                    state.nucOpacity = 0;
                    state.pScaleX = 0.6; state.pScaleY = 1.5; state.pScaleZ = 0.6;
                    state.c0.set(-0.1, 1.5, 0);
                    state.c1.set(0.1, 1.5, 0);
                    state.c2.set(-0.1, -1.5, 0);
                    state.c3.set(0.1, -1.5, 0);
                    state.spindleOp = 0;
                    state.newNucOp = 1;
                    state.newNucScale = 1;
                    break;
                case 5: // Cytokinesis
                    state.nucOpacity = 0;
                    state.pScaleX = 0.1; state.pScaleY = 2.0; state.pScaleZ = 0.1;
                    state.pOpacity = 0; state.pTorusOpacity = 0;
                    state.c0.set(-0.1, 2.5, 0);
                    state.c1.set(0.1, 2.5, 0);
                    state.c2.set(-0.1, -2.5, 0);
                    state.c3.set(0.1, -2.5, 0);
                    state.spindleOp = 0;
                    state.newNucOp = 0;
                    state.dY = 2.5;
                    state.dScale = 0.8;
                    state.dOp = 1;
                    break;
                case 6: // Complete
                    state.nucOpacity = 0;
                    state.pScaleX = 0.1; state.pScaleY = 2.0; state.pScaleZ = 0.1;
                    state.pOpacity = 0; state.pTorusOpacity = 0;
                    state.spindleOp = 0;
                    state.newNucOp = 0;
                    state.dY = 3.0;
                    state.dScale = 1.0;
                    state.dOp = 1;
                    break;
            }
            return state;
        }

        function cloneState(state) {
            const clone = {};
            for (let key in state) {
                clone[key] = state[key] instanceof THREE.Vector3 ? state[key].clone() : state[key];
            }
            return clone;
        }

        let currentState = getPhaseState(0);
        let startState = cloneState(currentState);
        let targetState = cloneState(currentState);

        function updateSpindleGeometry(state) {
            if (state.spindleOp <= 0.01) {
                spindleLines.visible = false;
                return;
            }
            spindleLines.visible = true;
            spindleLines.material.opacity = state.spindleOp;

            const positions = [];
            const topPole = new THREE.Vector3(0, 2 * state.pScaleY, 0);
            const bottomPole = new THREE.Vector3(0, -2 * state.pScaleY, 0);
            const chrs = [state.c0, state.c1, state.c2, state.c3];

            for(let i=0; i<4; i++) {
                positions.push(topPole.x, topPole.y, topPole.z);
                positions.push(chrs[i].x, chrs[i].y, chrs[i].z);
                positions.push(bottomPole.x, bottomPole.y, bottomPole.z);
                positions.push(chrs[i].x, chrs[i].y, chrs[i].z);
            }
            spindleLines.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        }

        function applyStateToScene(state) {
            parentCell.scale.set(state.pScaleX, state.pScaleY, state.pScaleZ);
            parentTorus.scale.set(state.pScaleX, state.pScaleY, state.pScaleZ);
            
            parentCell.material.opacity = state.pOpacity;
            parentCell.visible = state.pOpacity > 0.01;
            
            parentTorus.material.opacity = state.pTorusOpacity;
            parentTorus.visible = state.pTorusOpacity > 0.01;

            parentNucleus.material.opacity = state.nucOpacity;
            parentNucleus.visible = state.nucOpacity > 0.01;

            chromosomes[0].position.copy(state.c0);
            chromosomes[1].position.copy(state.c1);
            chromosomes[2].position.copy(state.c2);
            chromosomes[3].position.copy(state.c3);
            
            const chrVisible = state.pOpacity > 0.01;
            chromosomes.forEach(c => c.visible = chrVisible);

            updateSpindleGeometry(state);

            newNucleus1.material.opacity = state.newNucOp;
            newNucleus2.material.opacity = state.newNucOp;
            newNucleus1.scale.setScalar(Math.max(0.001, state.newNucScale));
            newNucleus2.scale.setScalar(Math.max(0.001, state.newNucScale));
            newNucleus1.visible = state.newNucOp > 0.01;
            newNucleus2.visible = state.newNucOp > 0.01;

            daughterCell1.position.y = state.dY;
            daughterCell2.position.y = -state.dY;
            daughterCell1.scale.setScalar(Math.max(0.001, state.dScale));
            daughterCell2.scale.setScalar(Math.max(0.001, state.dScale));

            dMembraneMat.opacity = state.dOp * 0.4;
            dNucleusMat.opacity = state.dOp;
            dTorusMat.opacity = state.dOp;

            const dVisible = state.dOp > 0.01;
            daughterCell1.visible = dVisible;
            daughterCell2.visible = dVisible;
        }

        function lerpState(start, end, t) {
            // easeInOutQuad
            const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            const result = {};
            for (let key in start) {
                if (start[key] instanceof THREE.Vector3) {
                    result[key] = new THREE.Vector3().lerpVectors(start[key], end[key], e);
                } else {
                    result[key] = start[key] + (end[key] - start[key]) * e;
                }
            }
            return result;
        }

        function updateGlobalState() {
            window.__3D_STATE__ = {
                currentPhase: currentPhase,
                phaseName: phaseNames[currentPhase],
                isAnimating: isAnimating,
                isAutoPlaying: isAutoPlaying,
                chromosomePositions: chromosomes.map(c => ({x: c.position.x, y: c.position.y, z: c.position.z})),
                nucleusOpacity: parentNucleus.material.opacity,
                cellScaleX: parentCell.scale.x,
                cellScaleY: parentCell.scale.y,
                spindleVisible: spindleLines.visible,
                daughterCellsVisible: daughterCell1.visible,
                savedStateExists: !!localStorage.getItem('cellDivisionState'),
                cameraPosition: {x: camera.position.x, y: camera.position.y, z: camera.position.z}
            };
        }

        function updateUI() {
            document.getElementById('phase-label').innerText = phaseNames[currentPhase];
            document.getElementById('phase-counter').innerText = `Phase ${currentPhase + 1}/7`;

            document.getElementById('btn-prev').disabled = currentPhase === 0 || isAnimating;
            document.getElementById('btn-next').disabled = currentPhase === 6 || isAnimating;
            document.getElementById('btn-play').disabled = isAnimating || isAutoPlaying || currentPhase === 6;
            document.getElementById('btn-reset').disabled = isAnimating;
            document.getElementById('btn-save').disabled = isAnimating;
            document.getElementById('btn-load').disabled = isAnimating || !localStorage.getItem('cellDivisionState');

            document.getElementById('btn-play').innerText = isAutoPlaying ? "Playing..." : "Play All";
        }

        function goToPhase(index, instant = false) {
            currentPhase = index;
            targetState = getPhaseState(index);
            
            if (instant) {
                currentState = cloneState(targetState);
                applyStateToScene(currentState);
                isAnimating = false;
                updateUI();
            } else {
                startState = cloneState(currentState);
                animationProgress = 0;
                isAnimating = true;
                updateUI();
            }
        }

        function stopAutoPlay() {
            isAutoPlaying = false;
            clearTimeout(autoPlayTimeout);
            updateUI();
        }

        function handleNext() {
            stopAutoPlay();
            if (currentPhase < 6 && !isAnimating) goToPhase(currentPhase + 1);
        }

        function handlePrev() {
            stopAutoPlay();
            if (currentPhase > 0 && !isAnimating) goToPhase(currentPhase - 1);
        }

        function handleReset() {
            stopAutoPlay();
            if (!isAnimating) goToPhase(0);
        }

        function handlePlay() {
            if (currentPhase === 6) goToPhase(0, true);
            isAutoPlaying = true;
            updateUI();
            if (!isAnimating && currentPhase < 6) {
                goToPhase(currentPhase + 1);
            }
        }

        function handleSave() {
            const state = {
                phase: currentPhase,
                camera: { x: camera.position.x, y: camera.position.y, z: camera.position.z }
            };
            localStorage.setItem('cellDivisionState', JSON.stringify(state));
            updateUI();
        }

        function handleLoad() {
            const saved = localStorage.getItem('cellDivisionState');
            if (saved) {
                const state = JSON.parse(saved);
                camera.position.set(state.camera.x, state.camera.y, state.camera.z);
                controls.update();
                stopAutoPlay();
                goToPhase(state.phase, true);
            }
        }

        // --- Event Listeners ---
        document.getElementById('btn-next').addEventListener('click', handleNext);
        document.getElementById('btn-prev').addEventListener('click', handlePrev);
        document.getElementById('btn-reset').addEventListener('click', handleReset);
        document.getElementById('btn-play').addEventListener('click', handlePlay);
        document.getElementById('btn-save').addEventListener('click', handleSave);
        document.getElementById('btn-load').addEventListener('click', handleLoad);

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'n') handleNext();
            if (key === 'p') handlePrev();
            if (key === 'r') handleReset();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        applyStateToScene(currentState);
        updateUI();
        updateGlobalState();

        function animate(time) {
            requestAnimationFrame(animate);
            
            const deltaTime = (time - lastTime) / 1000;
            lastTime = time;

            if (isAnimating && deltaTime < 0.1) { // Prevent huge jumps if tab is inactive
                animationProgress += deltaTime / 1.5; // 1.5 seconds duration
                
                if (animationProgress >= 1.0) {
                    animationProgress = 1.0;
                    currentState = cloneState(targetState);
                    applyStateToScene(currentState);
                    isAnimating = false;
                    updateUI();

                    if (isAutoPlaying) {
                        if (currentPhase < 6) {
                            autoPlayTimeout = setTimeout(() => {
                                if (isAutoPlaying) goToPhase(currentPhase + 1);
                            }, 2000);
                        } else {
                            stopAutoPlay();
                        }
                    }
                } else {
                    currentState = lerpState(startState, targetState, animationProgress);
                    applyStateToScene(currentState);
                }
            }

            controls.update();
            renderer.render(scene, camera);
            updateGlobalState();
        }

        requestAnimationFrame((time) => {
            lastTime = time;
            animate(time);
        });

    </script>
</body>
</html>
