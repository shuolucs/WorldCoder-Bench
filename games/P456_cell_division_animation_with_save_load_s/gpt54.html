<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Cell Division (Mitosis) - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    #phase-label {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 24px;
      padding: 10px 18px;
      background: rgba(0,0,0,0.45);
      border-radius: 10px;
      z-index: 10;
      user-select: none;
    }

    #phase-counter {
      position: absolute;
      top: 62px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 18px;
      padding: 6px 14px;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      z-index: 10;
      user-select: none;
    }

    #control-panel {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 12px 16px;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      z-index: 10;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      background: #1f2a5a;
      color: white;
      cursor: pointer;
    }

    button:hover:not(:disabled) {
      background: #30408a;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div id="phase-label">Interphase</div>
  <div id="phase-counter">Phase 1/7</div>

  <div id="control-panel">
    <button id="btn-prev">Previous Phase</button>
    <button id="btn-next">Next Phase</button>
    <button id="btn-play">Play All</button>
    <button id="btn-save">Save State</button>
    <button id="btn-load">Load State</button>
    <button id="btn-reset">Reset</button>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    // -----------------------------
    // Basic Setup
    // -----------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // -----------------------------
    // UI Elements
    // -----------------------------
    const phaseLabel = document.getElementById("phase-label");
    const phaseCounter = document.getElementById("phase-counter");
    const btnNext = document.getElementById("btn-next");
    const btnPrev = document.getElementById("btn-prev");
    const btnPlay = document.getElementById("btn-play");
    const btnSave = document.getElementById("btn-save");
    const btnLoad = document.getElementById("btn-load");
    const btnReset = document.getElementById("btn-reset");

    // -----------------------------
    // Constants / Helpers
    // -----------------------------
    const PHASES = [
      "Interphase",
      "Prophase",
      "Metaphase",
      "Anaphase",
      "Telophase",
      "Cytokinesis",
      "Complete"
    ];

    const chromosomeColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44];

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function vecLerp(a, b, t) {
      return {
        x: lerp(safeNumber(a.x), safeNumber(b.x), t),
        y: lerp(safeNumber(a.y), safeNumber(b.y), t),
        z: lerp(safeNumber(a.z), safeNumber(b.z), t)
      };
    }

    function clamp01(v) {
      return Math.max(0, Math.min(1, v));
    }

    function easeInOut(t) {
      t = clamp01(t);
      return t * t * (3 - 2 * t);
    }

    // -----------------------------
    // Main Cell Objects
    // -----------------------------
    const cellGroup = new THREE.Group();
    scene.add(cellGroup);

    const membraneGeom = new THREE.SphereGeometry(2, 48, 48);
    const membraneMat = new THREE.MeshPhongMaterial({
      color: 0x44cc88,
      transparent: true,
      opacity: 0.4,
      side: THREE.DoubleSide
    });
    const membrane = new THREE.Mesh(membraneGeom, membraneMat);
    cellGroup.add(membrane);

    const wallGeom = new THREE.TorusGeometry(2.1, 0.03, 12, 100);
    const wallMat = new THREE.MeshBasicMaterial({ color: 0x88ffaa });
    const wall = new THREE.Mesh(wallGeom, wallMat);
    wall.rotation.x = Math.PI / 2;
    cellGroup.add(wall);

    const nucleusGeom = new THREE.SphereGeometry(0.7, 32, 32);
    const nucleusMat = new THREE.MeshPhongMaterial({
      color: 0x8844cc,
      transparent: true,
      opacity: 1.0
    });
    const nucleus = new THREE.Mesh(nucleusGeom, nucleusMat);
    cellGroup.add(nucleus);

    // Chromosomes
    const chromosomeGeom = new THREE.SphereGeometry(0.15, 20, 20);
    const chromosomes = [];
    const initialChromosomePositions = [
      { x: -0.9, y: 0.7, z: 0.3 },
      { x:  0.8, y: 0.2, z: -0.5 },
      { x: -0.4, y: -0.8, z: 0.6 },
      { x:  0.7, y: -0.5, z: -0.2 }
    ];

    for (let i = 0; i < 4; i++) {
      const mat = new THREE.MeshPhongMaterial({ color: chromosomeColors[i] });
      const mesh = new THREE.Mesh(chromosomeGeom, mat);
      mesh.position.set(
        initialChromosomePositions[i].x,
        initialChromosomePositions[i].y,
        initialChromosomePositions[i].z
      );
      chromosomes.push(mesh);
      cellGroup.add(mesh);
    }

    // Daughter nuclei
    const daughterNucleusGeom = new THREE.SphereGeometry(0.45, 24, 24);
    const daughterNucleusMat1 = new THREE.MeshPhongMaterial({
      color: 0x8844cc,
      transparent: true,
      opacity: 0
    });
    const daughterNucleusMat2 = daughterNucleusMat1.clone();

    const daughterNucleus1 = new THREE.Mesh(daughterNucleusGeom, daughterNucleusMat1);
    const daughterNucleus2 = new THREE.Mesh(daughterNucleusGeom, daughterNucleusMat2);
    daughterNucleus1.position.set(0, 1.5, 0);
    daughterNucleus2.position.set(0, -1.5, 0);
    daughterNucleus1.visible = false;
    daughterNucleus2.visible = false;
    cellGroup.add(daughterNucleus1, daughterNucleus2);

    // Daughter cells
    function createDaughterCell(y) {
      const g = new THREE.Group();

      const mem = new THREE.Mesh(
        new THREE.SphereGeometry(1.4, 36, 36),
        new THREE.MeshPhongMaterial({
          color: 0x44cc88,
          transparent: true,
          opacity: 0.4
        })
      );

      const out = new THREE.Mesh(
        new THREE.TorusGeometry(1.47, 0.025, 10, 80),
        new THREE.MeshBasicMaterial({ color: 0x88ffaa })
      );
      out.rotation.x = Math.PI / 2;

      const nuc = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 24, 24),
        new THREE.MeshPhongMaterial({
          color: 0x8844cc,
          transparent: true,
          opacity: 1
        })
      );

      g.add(mem, out, nuc);
      g.position.set(0, y, 0);
      g.visible = false;

      return { group: g, membrane: mem, outline: out, nucleus: nuc };
    }

    const daughterCellTop = createDaughterCell(2.5);
    const daughterCellBottom = createDaughterCell(-2.5);
    scene.add(daughterCellTop.group, daughterCellBottom.group);

    // -----------------------------
    // Spindle Apparatus
    // -----------------------------
    const spindleMaterial = new THREE.LineBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 1 });
    const spindleGeometry = new THREE.BufferGeometry();
    const spindlePositions = new Float32Array(4 * 2 * 3); // 4 chromosomes * 2 endpoints * xyz
    spindleGeometry.setAttribute("position", new THREE.BufferAttribute(spindlePositions, 3));
    const spindleLines = new THREE.LineSegments(spindleGeometry, spindleMaterial);
    spindleLines.visible = false;
    scene.add(spindleLines);

    function updateSpindleGeometry(chromosomePosArray) {
      const arr = spindleGeometry.attributes.position.array;
      const topPole = { x: 0, y: 2, z: 0 };
      const bottomPole = { x: 0, y: -2, z: 0 };

      for (let i = 0; i < 4; i++) {
        const c = chromosomePosArray[i];
        const pole = c.y >= 0 ? topPole : bottomPole;
        const idx = i * 6;
        arr[idx + 0] = safeNumber(pole.x);
        arr[idx + 1] = safeNumber(pole.y);
        arr[idx + 2] = safeNumber(pole.z);
        arr[idx + 3] = safeNumber(c.x);
        arr[idx + 4] = safeNumber(c.y);
        arr[idx + 5] = safeNumber(c.z);
      }

      spindleGeometry.attributes.position.needsUpdate = true;
    }

    // -----------------------------
    // Phase State Definitions
    // -----------------------------
    function getPhaseState(index) {
      const states = [
        // S0 Interphase
        {
          nucleusOpacity: 1.0,
          nucleusVisible: true,
          chromosomePositions: [
            { x: -0.9, y: 0.7, z: 0.3 },
            { x:  0.8, y: 0.2, z: -0.5 },
            { x: -0.4, y: -0.8, z: 0.6 },
            { x:  0.7, y: -0.5, z: -0.2 }
          ],
          cellScaleX: 1.0,
          cellScaleY: 1.0,
          membraneOpacity: 0.4,
          wallOpacity: 1.0,
          spindleVisible: false,
          spindleOpacity: 0.0,
          daughterNucleiVisible: false,
          daughterNucleiOpacity: 0.0,
          daughterCellsVisible: false,
          daughterCellsOpacity: 0.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        },
        // S1 Prophase
        {
          nucleusOpacity: 0.1,
          nucleusVisible: true,
          chromosomePositions: [
            { x: -0.2, y:  0.7, z:  0.1 },
            { x:  0.2, y:  0.2, z: -0.1 },
            { x: -0.15, y: -0.3, z: 0.05 },
            { x:  0.15, y: -0.8, z: -0.05 }
          ],
          cellScaleX: 1.0,
          cellScaleY: 1.0,
          membraneOpacity: 0.4,
          wallOpacity: 1.0,
          spindleVisible: false,
          spindleOpacity: 0.0,
          daughterNucleiVisible: false,
          daughterNucleiOpacity: 0.0,
          daughterCellsVisible: false,
          daughterCellsOpacity: 0.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        },
        // S2 Metaphase
        {
          nucleusOpacity: 0.0,
          nucleusVisible: true,
          chromosomePositions: [
            { x: 0.0, y:  0.9, z:  0.2 },
            { x: 0.0, y:  0.3, z: -0.2 },
            { x: 0.0, y: -0.3, z:  0.2 },
            { x: 0.0, y: -0.9, z: -0.2 }
          ],
          cellScaleX: 1.0,
          cellScaleY: 1.0,
          membraneOpacity: 0.4,
          wallOpacity: 1.0,
          spindleVisible: true,
          spindleOpacity: 1.0,
          daughterNucleiVisible: false,
          daughterNucleiOpacity: 0.0,
          daughterCellsVisible: false,
          daughterCellsOpacity: 0.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        },
        // S3 Anaphase
        {
          nucleusOpacity: 0.0,
          nucleusVisible: false,
          chromosomePositions: [
            { x: -0.2, y:  1.6, z:  0.2 },
            { x:  0.2, y:  1.2, z: -0.2 },
            { x: -0.2, y: -1.2, z:  0.2 },
            { x:  0.2, y: -1.6, z: -0.2 }
          ],
          cellScaleX: 1.0,
          cellScaleY: 1.0,
          membraneOpacity: 0.4,
          wallOpacity: 1.0,
          spindleVisible: true,
          spindleOpacity: 1.0,
          daughterNucleiVisible: false,
          daughterNucleiOpacity: 0.0,
          daughterCellsVisible: false,
          daughterCellsOpacity: 0.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        },
        // S4 Telophase
        {
          nucleusOpacity: 0.0,
          nucleusVisible: false,
          chromosomePositions: [
            { x: -0.2, y:  1.5, z:  0.2 },
            { x:  0.2, y:  1.5, z: -0.2 },
            { x: -0.2, y: -1.5, z:  0.2 },
            { x:  0.2, y: -1.5, z: -0.2 }
          ],
          cellScaleX: 0.6,
          cellScaleY: 1.5,
          membraneOpacity: 0.4,
          wallOpacity: 1.0,
          spindleVisible: true,
          spindleOpacity: 0.4,
          daughterNucleiVisible: true,
          daughterNucleiOpacity: 1.0,
          daughterCellsVisible: false,
          daughterCellsOpacity: 0.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        },
        // S5 Cytokinesis
        {
          nucleusOpacity: 0.0,
          nucleusVisible: false,
          chromosomePositions: [
            { x: -0.1, y:  2.3, z:  0.1 },
            { x:  0.1, y:  2.7, z: -0.1 },
            { x: -0.1, y: -2.7, z:  0.1 },
            { x:  0.1, y: -2.3, z: -0.1 }
          ],
          cellScaleX: 0.25,
          cellScaleY: 1.8,
          membraneOpacity: 0.0,
          wallOpacity: 0.0,
          spindleVisible: false,
          spindleOpacity: 0.0,
          daughterNucleiVisible: false,
          daughterNucleiOpacity: 0.0,
          daughterCellsVisible: true,
          daughterCellsOpacity: 1.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        },
        // S6 Complete
        {
          nucleusOpacity: 0.0,
          nucleusVisible: false,
          chromosomePositions: [
            { x: -0.1, y:  2.3, z:  0.1 },
            { x:  0.1, y:  2.7, z: -0.1 },
            { x: -0.1, y: -2.7, z:  0.1 },
            { x:  0.1, y: -2.3, z: -0.1 }
          ],
          cellScaleX: 0.0,
          cellScaleY: 0.0,
          membraneOpacity: 0.0,
          wallOpacity: 0.0,
          spindleVisible: false,
          spindleOpacity: 0.0,
          daughterNucleiVisible: false,
          daughterNucleiOpacity: 0.0,
          daughterCellsVisible: true,
          daughterCellsOpacity: 1.0,
          daughterCellTopY: 2.5,
          daughterCellBottomY: -2.5
        }
      ];

      return states[Math.max(0, Math.min(6, index))];
    }

    // -----------------------------
    // Runtime Animation State
    // -----------------------------
    let currentPhase = 0;
    let isAnimating = false;
    let isAutoPlaying = false;
    let autoPlayTimeout = null;

    let transition = {
      active: false,
      fromPhase: 0,
      toPhase: 0,
      elapsed: 0,
      duration: 1.5,
      fromState: getPhaseState(0),
      toState: getPhaseState(0)
    };

    function applyStateInstant(state) {
      // Parent cell
      membrane.material.opacity = safeNumber(state.membraneOpacity, 0.4);
      wall.material.opacity = safeNumber(state.wallOpacity, 1.0);

      membrane.scale.set(
        Math.max(0.0001, safeNumber(state.cellScaleX, 1.0)),
        Math.max(0.0001, safeNumber(state.cellScaleY, 1.0)),
        1
      );
      wall.scale.set(
        Math.max(0.0001, safeNumber(state.cellScaleX, 1.0)),
        Math.max(0.0001, safeNumber(state.cellScaleY, 1.0)),
        1
      );

      nucleus.visible = !!state.nucleusVisible;
      nucleus.material.opacity = safeNumber(state.nucleusOpacity, 0);

      for (let i = 0; i < 4; i++) {
        const p = state.chromosomePositions[i];
        chromosomes[i].position.set(
          safeNumber(p.x),
          safeNumber(p.y),
          safeNumber(p.z)
        );
      }

      spindleLines.visible = !!state.spindleVisible;
      spindleMaterial.opacity = safeNumber(state.spindleOpacity, 0);
      updateSpindleGeometry(state.chromosomePositions);

      daughterNucleus1.visible = !!state.daughterNucleiVisible;
      daughterNucleus2.visible = !!state.daughterNucleiVisible;
      daughterNucleus1.material.opacity = safeNumber(state.daughterNucleiOpacity, 0);
      daughterNucleus2.material.opacity = safeNumber(state.daughterNucleiOpacity, 0);

      daughterCellTop.group.visible = !!state.daughterCellsVisible;
      daughterCellBottom.group.visible = !!state.daughterCellsVisible;

      daughterCellTop.group.position.y = safeNumber(state.daughterCellTopY, 2.5);
      daughterCellBottom.group.position.y = safeNumber(state.daughterCellBottomY, -2.5);

      daughterCellTop.membrane.material.opacity = safeNumber(state.daughterCellsOpacity, 0.4);
      daughterCellBottom.membrane.material.opacity = safeNumber(state.daughterCellsOpacity, 0.4);
      daughterCellTop.outline.material.opacity = safeNumber(state.daughterCellsOpacity, 1.0);
      daughterCellBottom.outline.material.opacity = safeNumber(state.daughterCellsOpacity, 1.0);
      daughterCellTop.nucleus.material.opacity = safeNumber(state.daughterCellsOpacity, 1.0);
      daughterCellBottom.nucleus.material.opacity = safeNumber(state.daughterCellsOpacity, 1.0);

      updateHUD();
      updateButtons();
    }

    function beginTransition(targetPhase) {
      if (isAnimating) return;
      if (targetPhase < 0 || targetPhase > 6 || targetPhase === currentPhase) return;

      transition.active = true;
      transition.fromPhase = currentPhase;
      transition.toPhase = targetPhase;
      transition.elapsed = 0;
      transition.duration = 1.5;
      transition.fromState = getPhaseState(currentPhase);
      transition.toState = getPhaseState(targetPhase);

      isAnimating = true;
      updateButtons();
    }

    function finishTransition() {
      currentPhase = transition.toPhase;
      transition.active = false;
      isAnimating = false;
      applyStateInstant(getPhaseState(currentPhase));
      updateButtons();
      scheduleAutoPlayIfNeeded();
    }

    function updateTransition(delta) {
      if (!transition.active) return;

      transition.elapsed += delta;
      const tRaw = transition.duration <= 0 ? 1 : transition.elapsed / transition.duration;
      const t = easeInOut(tRaw);

      const a = transition.fromState;
      const b = transition.toState;

      membrane.material.opacity = lerp(safeNumber(a.membraneOpacity, 0.4), safeNumber(b.membraneOpacity, 0.4), t);
      wall.material.opacity = lerp(safeNumber(a.wallOpacity, 1.0), safeNumber(b.wallOpacity, 1.0), t);

      const sX = Math.max(0.0001, lerp(safeNumber(a.cellScaleX, 1.0), safeNumber(b.cellScaleX, 1.0), t));
      const sY = Math.max(0.0001, lerp(safeNumber(a.cellScaleY, 1.0), safeNumber(b.cellScaleY, 1.0), t));
      membrane.scale.set(sX, sY, 1);
      wall.scale.set(sX, sY, 1);

      nucleus.visible = a.nucleusVisible || b.nucleusVisible;
      nucleus.material.opacity = lerp(safeNumber(a.nucleusOpacity, 0), safeNumber(b.nucleusOpacity, 0), t);

      const currentChromosomePositions = [];
      for (let i = 0; i < 4; i++) {
        const p = vecLerp(a.chromosomePositions[i], b.chromosomePositions[i], t);
        chromosomes[i].position.set(p.x, p.y, p.z);
        currentChromosomePositions.push(p);
      }

      const spindleOpacity = lerp(safeNumber(a.spindleOpacity, 0), safeNumber(b.spindleOpacity, 0), t);
      spindleMaterial.opacity = spindleOpacity;
      spindleLines.visible = spindleOpacity > 0.01 || a.spindleVisible || b.spindleVisible;
      updateSpindleGeometry(currentChromosomePositions);

      const dnOpacity = lerp(safeNumber(a.daughterNucleiOpacity, 0), safeNumber(b.daughterNucleiOpacity, 0), t);
      daughterNucleus1.visible = dnOpacity > 0.01 || a.daughterNucleiVisible || b.daughterNucleiVisible;
      daughterNucleus2.visible = dnOpacity > 0.01 || a.daughterNucleiVisible || b.daughterNucleiVisible;
      daughterNucleus1.material.opacity = dnOpacity;
      daughterNucleus2.material.opacity = dnOpacity;

      const dcOpacity = lerp(safeNumber(a.daughterCellsOpacity, 0), safeNumber(b.daughterCellsOpacity, 0), t);
      daughterCellTop.group.visible = dcOpacity > 0.01 || a.daughterCellsVisible || b.daughterCellsVisible;
      daughterCellBottom.group.visible = dcOpacity > 0.01 || a.daughterCellsVisible || b.daughterCellsVisible;

      daughterCellTop.group.position.y = lerp(safeNumber(a.daughterCellTopY, 2.5), safeNumber(b.daughterCellTopY, 2.5), t);
      daughterCellBottom.group.position.y = lerp(safeNumber(a.daughterCellBottomY, -2.5), safeNumber(b.daughterCellBottomY, -2.5), t);

      daughterCellTop.membrane.material.opacity = dcOpacity * 0.4;
      daughterCellBottom.membrane.material.opacity = dcOpacity * 0.4;
      daughterCellTop.outline.material.opacity = dcOpacity;
      daughterCellBottom.outline.material.opacity = dcOpacity;
      daughterCellTop.nucleus.material.opacity = dcOpacity;
      daughterCellBottom.nucleus.material.opacity = dcOpacity;

      if (tRaw >= 1) {
        finishTransition();
      }
    }

    // -----------------------------
    // HUD / Buttons
    // -----------------------------
    function displayedPhaseIndex() {
      return isAnimating ? transition.toPhase : currentPhase;
    }

    function updateHUD() {
      const idx = displayedPhaseIndex();
      phaseLabel.textContent = PHASES[idx];
      phaseCounter.textContent = `Phase ${idx + 1}/7`;
    }

    function updateButtons() {
      const savedStateExists = !!localStorage.getItem("cellDivisionState");

      btnPrev.disabled = isAnimating || currentPhase <= 0;
      btnNext.disabled = isAnimating || currentPhase >= 6;
      btnLoad.disabled = !savedStateExists || isAnimating;
      btnSave.disabled = false;
      btnReset.disabled = isAnimating && currentPhase === 0;
      btnPlay.disabled = isAnimating || isAutoPlaying;
    }

    // -----------------------------
    // Controls / Actions
    // -----------------------------
    function nextPhase() {
      if (currentPhase < 6 && !isAnimating) beginTransition(currentPhase + 1);
    }

    function prevPhase() {
      if (currentPhase > 0 && !isAnimating) beginTransition(currentPhase - 1);
    }

    function resetScene() {
      clearAutoPlay();
      currentPhase = 0;
      isAnimating = false;
      transition.active = false;
      applyStateInstant(getPhaseState(0));
      updateHUD();
      updateButtons();
    }

    function saveState() {
      const data = {
        currentPhase,
        cameraPosition: {
          x: safeNumber(camera.position.x),
          y: safeNumber(camera.position.y),
          z: safeNumber(camera.position.z)
        }
      };
      localStorage.setItem("cellDivisionState", JSON.stringify(data));
      updateButtons();
    }

    function loadState() {
      if (isAnimating) return;
      const raw = localStorage.getItem("cellDivisionState");
      if (!raw) return;
      try {
        const data = JSON.parse(raw);
        const phase = Math.max(0, Math.min(6, parseInt(data.currentPhase)));
        currentPhase = Number.isFinite(phase) ? phase : 0;
        transition.active = false;
        isAnimating = false;
        isAutoPlaying = false;

        if (data.cameraPosition) {
          camera.position.set(
            safeNumber(data.cameraPosition.x, 0),
            safeNumber(data.cameraPosition.y, 0),
            safeNumber(data.cameraPosition.z, 12)
          );
        }

        applyStateInstant(getPhaseState(currentPhase));
        updateHUD();
        updateButtons();
      } catch (e) {
        console.warn("Failed to load saved state:", e);
      }
    }

    function clearAutoPlay() {
      isAutoPlaying = false;
      if (autoPlayTimeout) {
        clearTimeout(autoPlayTimeout);
        autoPlayTimeout = null;
      }
      updateButtons();
    }

    function playAll() {
      if (isAnimating || isAutoPlaying) return;
      if (currentPhase >= 6) {
        currentPhase = 0;
        applyStateInstant(getPhaseState(0));
      }
      isAutoPlaying = true;
      updateButtons();
      scheduleAutoPlayIfNeeded();
    }

    function scheduleAutoPlayIfNeeded() {
      if (!isAutoPlaying || isAnimating) return;

      if (currentPhase >= 6) {
        isAutoPlaying = false;
        updateButtons();
        return;
      }

      if (autoPlayTimeout) clearTimeout(autoPlayTimeout);
      autoPlayTimeout = setTimeout(() => {
        if (isAutoPlaying && !isAnimating && currentPhase < 6) {
          beginTransition(currentPhase + 1);
        }
      }, 2000);
    }

    // -----------------------------
    // Events
    // -----------------------------
    btnNext.addEventListener("click", nextPhase);
    btnPrev.addEventListener("click", prevPhase);
    btnPlay.addEventListener("click", playAll);
    btnSave.addEventListener("click", saveState);
    btnLoad.addEventListener("click", loadState);
    btnReset.addEventListener("click", resetScene);

    window.addEventListener("keydown", (e) => {
      const k = e.key.toLowerCase();
      if (k === "n") nextPhase();
      else if (k === "p") prevPhase();
      else if (k === "r") resetScene();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -----------------------------
    // Public State
    // -----------------------------
    window.__3D_STATE__ = {
      currentPhase: 0,
      phaseName: PHASES[0],
      isAnimating: false,
      isAutoPlaying: false,
      chromosomePositions: initialChromosomePositions.map(p => ({ ...p })),
      nucleusOpacity: 1,
      cellScaleX: 1,
      cellScaleY: 1,
      spindleVisible: false,
      daughterCellsVisible: false,
      savedStateExists: !!localStorage.getItem("cellDivisionState"),
      cameraPosition: { x: 0, y: 0, z: 12 }
    };

    function update3DState() {
      window.__3D_STATE__.currentPhase = currentPhase;
      window.__3D_STATE__.phaseName = PHASES[currentPhase];
      window.__3D_STATE__.isAnimating = isAnimating;
      window.__3D_STATE__.isAutoPlaying = isAutoPlaying;
      window.__3D_STATE__.chromosomePositions = chromosomes.map(c => ({
        x: safeNumber(c.position.x),
        y: safeNumber(c.position.y),
        z: safeNumber(c.position.z)
      }));
      window.__3D_STATE__.nucleusOpacity = safeNumber(nucleus.material.opacity);
      window.__3D_STATE__.cellScaleX = safeNumber(membrane.scale.x);
      window.__3D_STATE__.cellScaleY = safeNumber(membrane.scale.y);
      window.__3D_STATE__.spindleVisible = spindleLines.visible && spindleMaterial.opacity > 0.01;
      window.__3D_STATE__.daughterCellsVisible = daughterCellTop.group.visible || daughterCellBottom.group.visible;
      window.__3D_STATE__.savedStateExists = !!localStorage.getItem("cellDivisionState");
      window.__3D_STATE__.cameraPosition = {
        x: safeNumber(camera.position.x),
        y: safeNumber(camera.position.y),
        z: safeNumber(camera.position.z)
      };
    }

    // -----------------------------
    // Init
    // -----------------------------
    applyStateInstant(getPhaseState(0));
    updateHUD();
    updateButtons();

    // -----------------------------
    // Render Loop
    // -----------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);

      updateTransition(delta);
      controls.update();

      updateHUD();
      updateButtons();
      update3DState();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
