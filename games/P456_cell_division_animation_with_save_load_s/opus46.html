<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Division - Mitosis 3D Animation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: Arial, sans-serif; }
canvas { display: block; }

#phase-label {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 24px;
    font-weight: bold;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 30px;
    border-radius: 8px;
    text-align: center;
    z-index: 10;
}

#phase-counter {
    position: absolute;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #aaaacc;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.5);
    padding: 5px 20px;
    border-radius: 5px;
    text-align: center;
    z-index: 10;
}

#control-panel {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
}

#control-panel button {
    padding: 10px 20px;
    font-size: 14px;
    font-weight: bold;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #44cc88;
    color: #0a0a2e;
    transition: all 0.2s;
}

#control-panel button:hover:not(:disabled) {
    background: #66eebb;
    transform: scale(1.05);
}

#control-panel button:disabled {
    background: #555566;
    color: #888899;
    cursor: not-allowed;
    transform: none;
}

#control-panel button:active:not(:disabled) {
    transform: scale(0.95);
}

#info-panel {
    position: absolute;
    top: 110px;
    left: 50%;
    transform: translateX(-50%);
    color: #ccccee;
    font-size: 13px;
    background: rgba(0, 0, 0, 0.5);
    padding: 8px 20px;
    border-radius: 5px;
    text-align: center;
    z-index: 10;
    max-width: 500px;
}
</style>
</head>
<body>

<div id="phase-label">Interphase</div>
<div id="phase-counter">Phase 1/7</div>
<div id="info-panel">The cell is at rest. DNA is replicated and the cell prepares for division.</div>

<div id="control-panel">
    <button id="btn-prev">⏮ Previous</button>
    <button id="btn-next">Next ⏭</button>
    <button id="btn-play">▶ Play All</button>
    <button id="btn-reset">↺ Reset</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-load">📂 Load</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
    // Phase definitions
    const PHASE_NAMES = ['Interphase', 'Prophase', 'Metaphase', 'Anaphase', 'Telophase', 'Cytokinesis', 'Complete'];
    const PHASE_DESCRIPTIONS = [
        'The cell is at rest. DNA is replicated and the cell prepares for division.',
        'Chromosomes condense and move toward the center. The nuclear envelope begins to break down.',
        'Chromosomes align at the cell\'s equator. Spindle fibers attach to chromosomes.',
        'Sister chromatids separate and move to opposite poles of the cell.',
        'New nuclear envelopes form around each set of chromosomes. The cell elongates.',
        'The cell membrane pinches inward, dividing the cell into two daughter cells.',
        'Mitosis is complete! Two identical daughter cells have been formed.'
    ];

    const CHROMOSOME_COLORS = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44];

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // ---- Cell Model ----

    // Cell membrane
    const cellGeometry = new THREE.SphereGeometry(2, 32, 32);
    const cellMaterial = new THREE.MeshPhongMaterial({
        color: 0x44cc88,
        transparent: true,
        opacity: 0.4,
        side: THREE.DoubleSide,
        depthWrite: false
    });
    const cellMembrane = new THREE.Mesh(cellGeometry, cellMaterial);
    scene.add(cellMembrane);

    // Cell wall outline (torus)
    const torusGeometry = new THREE.TorusGeometry(2.1, 0.03, 16, 64);
    const torusMaterial = new THREE.MeshBasicMaterial({ color: 0x88ffaa });
    const cellWall = new THREE.Mesh(torusGeometry, torusMaterial);
    scene.add(cellWall);

    // Nucleus
    const nucleusGeometry = new THREE.SphereGeometry(0.7, 24, 24);
    const nucleusMaterial = new THREE.MeshPhongMaterial({
        color: 0x8844cc,
        transparent: true,
        opacity: 1.0
    });
    const nucleus = new THREE.Mesh(nucleusGeometry, nucleusMaterial);
    scene.add(nucleus);

    // Chromosomes
    const chromosomes = [];
    const initialChromosomePositions = [
        { x: 0.3, y: 0.4, z: 0.1 },
        { x: -0.4, y: -0.2, z: 0.3 },
        { x: 0.1, y: -0.4, z: -0.3 },
        { x: -0.2, y: 0.3, z: -0.2 }
    ];

    for (let i = 0; i < 4; i++) {
        const chromGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const chromMat = new THREE.MeshPhongMaterial({ color: CHROMOSOME_COLORS[i] });
        const chrom = new THREE.Mesh(chromGeo, chromMat);
        chrom.position.set(initialChromosomePositions[i].x, initialChromosomePositions[i].y, initialChromosomePositions[i].z);
        scene.add(chrom);
        chromosomes.push(chrom);
    }

    // Spindle fibers
    const spindleGroup = new THREE.Group();
    spindleGroup.visible = false;
    scene.add(spindleGroup);

    function createSpindleFibers(chromosomePositions) {
        while (spindleGroup.children.length > 0) {
            spindleGroup.remove(spindleGroup.children[0]);
        }
        const spindleMaterial = new THREE.LineBasicMaterial({ color: 0xffaa00, linewidth: 1 });
        for (let i = 0; i < 4; i++) {
            const points = [];
            points.push(new THREE.Vector3(0, 2, 0));
            points.push(new THREE.Vector3(chromosomePositions[i].x, chromosomePositions[i].y, chromosomePositions[i].z));
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, spindleMaterial);
            spindleGroup.add(line);

            const points2 = [];
            points2.push(new THREE.Vector3(0, -2, 0));
            points2.push(new THREE.Vector3(chromosomePositions[i].x, chromosomePositions[i].y, chromosomePositions[i].z));
            const geometry2 = new THREE.BufferGeometry().setFromPoints(points2);
            const line2 = new THREE.Line(geometry2, spindleMaterial);
            spindleGroup.add(line2);
        }
    }

    // Daughter nuclei
    const daughterNucleus1Geo = new THREE.SphereGeometry(0.5, 24, 24);
    const daughterNucleus1Mat = new THREE.MeshPhongMaterial({ color: 0x8844cc, transparent: true, opacity: 0 });
    const daughterNucleus1 = new THREE.Mesh(daughterNucleus1Geo, daughterNucleus1Mat);
    daughterNucleus1.position.set(0, 1.5, 0);
    scene.add(daughterNucleus1);

    const daughterNucleus2Geo = new THREE.SphereGeometry(0.5, 24, 24);
    const daughterNucleus2Mat = new THREE.MeshPhongMaterial({ color: 0x8844cc, transparent: true, opacity: 0 });
    const daughterNucleus2 = new THREE.Mesh(daughterNucleus2Geo, daughterNucleus2Mat);
    daughterNucleus2.position.set(0, -1.5, 0);
    scene.add(daughterNucleus2);

    // Daughter cells
    const daughterCell1Geo = new THREE.SphereGeometry(1.3, 32, 32);
    const daughterCell1Mat = new THREE.MeshPhongMaterial({ color: 0x44cc88, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
    const daughterCell1 = new THREE.Mesh(daughterCell1Geo, daughterCell1Mat);
    daughterCell1.position.set(0, 2.5, 0);
    scene.add(daughterCell1);

    const daughterCell2Geo = new THREE.SphereGeometry(1.3, 32, 32);
    const daughterCell2Mat = new THREE.MeshPhongMaterial({ color: 0x44cc88, transparent: true, opacity: 0, side: THREE.DoubleSide, depthWrite: false });
    const daughterCell2 = new THREE.Mesh(daughterCell2Geo, daughterCell2Mat);
    daughterCell2.position.set(0, -2.5, 0);
    scene.add(daughterCell2);

    // Daughter cell wall outlines
    const dTorus1Geo = new THREE.TorusGeometry(1.4, 0.03, 16, 64);
    const dTorus1Mat = new THREE.MeshBasicMaterial({ color: 0x88ffaa, transparent: true, opacity: 0 });
    const dTorus1 = new THREE.Mesh(dTorus1Geo, dTorus1Mat);
    dTorus1.position.set(0, 2.5, 0);
    scene.add(dTorus1);

    const dTorus2Geo = new THREE.TorusGeometry(1.4, 0.03, 16, 64);
    const dTorus2Mat = new THREE.MeshBasicMaterial({ color: 0x88ffaa, transparent: true, opacity: 0 });
    const dTorus2 = new THREE.Mesh(dTorus2Geo, dTorus2Mat);
    dTorus2.position.set(0, -2.5, 0);
    scene.add(dTorus2);

    // Add some floating particles for ambiance
    const particlesGeo = new THREE.BufferGeometry();
    const particleCount = 200;
    const particlePositions = new Float32Array(particleCount * 3);
    for (let i = 0; i < particleCount * 3; i++) {
        particlePositions[i] = (Math.random() - 0.5) * 20;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particlesMat = new THREE.PointsMaterial({ color: 0x6666aa, size: 0.05, transparent: true, opacity: 0.5 });
    const particles = new THREE.Points(particlesGeo, particlesMat);
    scene.add(particles);

    // ---- State Management ----
    let currentPhase = 0;
    let isAnimating = false;
    let isAutoPlaying = false;
    let animationProgress = 0;
    let animationDirection = 1; // 1 = forward, -1 = backward
    let targetPhase = 0;
    let autoPlayTimeout = null;

    // Phase target states
    const phaseStates = {
        0: { // Interphase
            chromosomePositions: [
                { x: 0.3, y: 0.4, z: 0.1 },
                { x: -0.4, y: -0.2, z: 0.3 },
                { x: 0.1, y: -0.4, z: -0.3 },
                { x: -0.2, y: 0.3, z: -0.2 }
            ],
            nucleusOpacity: 1.0,
            nucleusScale: 1.0,
            cellScaleX: 1.0,
            cellScaleY: 1.0,
            cellScaleZ: 1.0,
            cellOpacity: 0.4,
            spindleVisible: false,
            daughterNucleiOpacity: 0,
            daughterCellsOpacity: 0,
            torusOpacity: 1.0,
            dTorusOpacity: 0,
            cellMembraneVisible: true,
            torusScaleX: 1.0,
            torusScaleY: 1.0,
        },
        1: { // Prophase
            chromosomePositions: [
                { x: 0.15, y: 0.15, z: 0.05 },
                { x: -0.15, y: -0.1, z: 0.1 },
                { x: 0.05, y: -0.15, z: -0.1 },
                { x: -0.1, y: 0.1, z: -0.05 }
            ],
            nucleusOpacity: 0.1,
            nucleusScale: 0.8,
            cellScaleX: 1.0,
            cellScaleY: 1.0,
            cellScaleZ: 1.0,
            cellOpacity: 0.4,
            spindleVisible: false,
            daughterNucleiOpacity: 0,
            daughterCellsOpacity: 0,
            torusOpacity: 1.0,
            dTorusOpacity: 0,
            cellMembraneVisible: true,
            torusScaleX: 1.0,
            torusScaleY: 1.0,
        },
        2: { // Metaphase
            chromosomePositions: [
                { x: 0, y: 0.3, z: 0.2 },
                { x: 0, y: -0.3, z: 0.2 },
                { x: 0, y: 0.1, z: -0.2 },
                { x: 0, y: -0.1, z: -0.2 }
            ],
            nucleusOpacity: 0.0,
            nucleusScale: 0.5,
            cellScaleX: 1.0,
            cellScaleY: 1.0,
            cellScaleZ: 1.0,
            cellOpacity: 0.4,
            spindleVisible: true,
            daughterNucleiOpacity: 0,
            daughterCellsOpacity: 0,
            torusOpacity: 1.0,
            dTorusOpacity: 0,
            cellMembraneVisible: true,
            torusScaleX: 1.0,
            torusScaleY: 1.0,
        },
        3: { // Anaphase
            chromosomePositions: [
                { x: 0, y: 1.2, z: 0.1 },
                { x: 0, y: 0.9, z: -0.1 },
                { x: 0, y: -1.2, z: 0.1 },
                { x: 0, y: -0.9, z: -0.1 }
            ],
            nucleusOpacity: 0.0,
            nucleusScale: 0.3,
            cellScaleX: 0.9,
            cellScaleY: 1.2,
            cellScaleZ: 0.9,
            cellOpacity: 0.4,
            spindleVisible: true,
            daughterNucleiOpacity: 0,
            daughterCellsOpacity: 0,
            torusOpacity: 1.0,
            dTorusOpacity: 0,
            cellMembraneVisible: true,
            torusScaleX: 0.9,
            torusScaleY: 1.2,
        },
        4: { // Telophase
            chromosomePositions: [
                { x: 0.1, y: 1.5, z: 0.05 },
                { x: -0.1, y: 1.3, z: -0.05 },
                { x: 0.1, y: -1.5, z: 0.05 },
                { x: -0.1, y: -1.3, z: -0.05 }
            ],
            nucleusOpacity: 0.0,
            nucleusScale: 0.1,
            cellScaleX: 0.6,
            cellScaleY: 1.5,
            cellScaleZ: 0.6,
            cellOpacity: 0.35,
            spindleVisible: false,
            daughterNucleiOpacity: 0.8,
            daughterCellsOpacity: 0,
            torusOpacity: 1.0,
            dTorusOpacity: 0,
            cellMembraneVisible: true,
            torusScaleX: 0.6,
            torusScaleY: 1.5,
        },
        5: { // Cytokinesis
            chromosomePositions: [
                { x: 0.1, y: 2.5, z: 0.05 },
                { x: -0.1, y: 2.3, z: -0.05 },
                { x: 0.1, y: -2.5, z: 0.05 },
                { x: -0.1, y: -2.3, z: -0.05 }
            ],
            nucleusOpacity: 0.0,
            nucleusScale: 0.01,
            cellScaleX: 0.01,
            cellScaleY: 0.01,
            cellScaleZ: 0.01,
            cellOpacity: 0.0,
            spindleVisible: false,
            daughterNucleiOpacity: 1.0,
            daughterCellsOpacity: 0.4,
            torusOpacity: 0.0,
            dTorusOpacity: 1.0,
            cellMembraneVisible: false,
            torusScaleX: 0.01,
            torusScaleY: 0.01,
        },
        6: { // Complete
            chromosomePositions: [
                { x: 0.15, y: 2.7, z: 0.05 },
                { x: -0.15, y: 2.3, z: -0.05 },
                { x: 0.15, y: -2.7, z: 0.05 },
                { x: -0.15, y: -2.3, z: -0.05 }
            ],
            nucleusOpacity: 0.0,
            nucleusScale: 0.01,
            cellScaleX: 0.01,
            cellScaleY: 0.01,
            cellScaleZ: 0.01,
            cellOpacity: 0.0,
            spindleVisible: false,
            daughterNucleiOpacity: 1.0,
            daughterCellsOpacity: 0.4,
            torusOpacity: 0.0,
            dTorusOpacity: 1.0,
            cellMembraneVisible: false,
            torusScaleX: 0.01,
            torusScaleY: 0.01,
        }
    };

    // Current animated values
    let animState = JSON.parse(JSON.stringify(phaseStates[0]));

    // ---- Animation System ----
    const ANIMATION_DURATION = 1.5; // seconds
    let animStartTime = 0;
    let fromState = null;
    let toState = null;

    function lerpVal(a, b, t) {
        return a + (b - a) * t;
    }

    function lerpState(from, to, t) {
        t = Math.max(0, Math.min(1, t));
        // Smooth easing
        t = t * t * (3 - 2 * t); // smoothstep

        const result = {};
        result.chromosomePositions = [];
        for (let i = 0; i < 4; i++) {
            result.chromosomePositions.push({
                x: lerpVal(from.chromosomePositions[i].x, to.chromosomePositions[i].x, t),
                y: lerpVal(from.chromosomePositions[i].y, to.chromosomePositions[i].y, t),
                z: lerpVal(from.chromosomePositions[i].z, to.chromosomePositions[i].z, t)
            });
        }
        result.nucleusOpacity = lerpVal(from.nucleusOpacity, to.nucleusOpacity, t);
        result.nucleusScale = lerpVal(from.nucleusScale, to.nucleusScale, t);
        result.cellScaleX = lerpVal(from.cellScaleX, to.cellScaleX, t);
        result.cellScaleY = lerpVal(from.cellScaleY, to.cellScaleY, t);
        result.cellScaleZ = lerpVal(from.cellScaleZ, to.cellScaleZ, t);
        result.cellOpacity = lerpVal(from.cellOpacity, to.cellOpacity, t);
        result.daughterNucleiOpacity = lerpVal(from.daughterNucleiOpacity, to.daughterNucleiOpacity, t);
        result.daughterCellsOpacity = lerpVal(from.daughterCellsOpacity, to.daughterCellsOpacity, t);
        result.torusOpacity = lerpVal(from.torusOpacity, to.torusOpacity, t);
        result.dTorusOpacity = lerpVal(from.dTorusOpacity, to.dTorusOpacity, t);
        result.torusScaleX = lerpVal(from.torusScaleX, to.torusScaleX, t);
        result.torusScaleY = lerpVal(from.torusScaleY, to.torusScaleY, t);

        // Discrete values switch at halfway
        result.spindleVisible = t < 0.5 ? from.spindleVisible : to.spindleVisible;
        result.cellMembraneVisible = t < 0.5 ? from.cellMembraneVisible : to.cellMembraneVisible;

        return result;
    }

    function applyState(state) {
        // Chromosomes
        for (let i = 0; i < 4; i++) {
            chromosomes[i].position.set(state.chromosomePositions[i].x, state.chromosomePositions[i].y, state.chromosomePositions[i].z);
        }

        // Nucleus
        nucleusMaterial.opacity = state.nucleusOpacity;
        const ns = Math.max(0.01, state.nucleusScale);
        nucleus.scale.set(ns, ns, ns);
        nucleus.visible = state.nucleusOpacity > 0.01;

        // Cell membrane
        const csx = Math.max(0.01, state.cellScaleX);
        const csy = Math.max(0.01, state.cellScaleY);
        const csz = Math.max(0.01, state.cellScaleZ);
        cellMembrane.scale.set(csx, csy, csz);
        cellMaterial.opacity = state.cellOpacity;
        cellMembrane.visible = state.cellMembraneVisible || state.cellOpacity > 0.01;

        // Torus
        const tsx = Math.max(0.01, state.torusScaleX);
        const tsy = Math.max(0.01, state.torusScaleY);
        cellWall.scale.set(tsx, tsy, 1);
        torusMaterial.opacity = state.torusOpacity;
        torusMaterial.transparent = true;
        cellWall.visible = state.torusOpacity > 0.01;

        // Spindle
        spindleGroup.visible = state.spindleVisible;
        if (state.spindleVisible) {
            createSpindleFibers(state.chromosomePositions);
        }

        // Daughter nuclei
        daughterNucleus1Mat.opacity = state.daughterNucleiOpacity;
        daughterNucleus2Mat.opacity = state.daughterNucleiOpacity;
        daughterNucleus1.visible = state.daughterNucleiOpacity > 0.01;
        daughterNucleus2.visible = state.daughterNucleiOpacity > 0.01;

        // Daughter cells
        daughterCell1Mat.opacity = state.daughterCellsOpacity;
        daughterCell2Mat.opacity = state.daughterCellsOpacity;
        daughterCell1.visible = state.daughterCellsOpacity > 0.01;
        daughterCell2.visible = state.daughterCellsOpacity > 0.01;

        dTorus1Mat.opacity = state.dTorusOpacity;
        dTorus2Mat.opacity = state.dTorusOpacity;
        dTorus1.visible = state.dTorusOpacity > 0.01;
        dTorus2.visible = state.dTorusOpacity > 0.01;

        animState = JSON.parse(JSON.stringify(state));
    }

    function startTransition(fromPhase, toPhase) {
        if (isAnimating) return;
        isAnimating = true;
        fromState = JSON.parse(JSON.stringify(phaseStates[fromPhase]));
        toState = JSON.parse(JSON.stringify(phaseStates[toPhase]));
        animStartTime = performance.now() / 1000;
        targetPhase = toPhase;
    }

    function goToPhase(phase) {
        if (phase < 0 || phase > 6 || phase === currentPhase || isAnimating) return;
        startTransition(currentPhase, phase);
    }

    function nextPhase() {
        if (currentPhase < 6 && !isAnimating) {
            goToPhase(currentPhase + 1);
        }
    }

    function prevPhase() {
        if (currentPhase > 0 && !isAnimating) {
            goToPhase(currentPhase - 1);
        }
    }

    function resetToInterphase() {
        if (isAnimating) return;
        stopAutoPlay();
        if (currentPhase !== 0) {
            startTransition(currentPhase, 0);
        }
    }

    function stopAutoPlay() {
        isAutoPlaying = false;
        if (autoPlayTimeout) {
            clearTimeout(autoPlayTimeout);
            autoPlayTimeout = null;
        }
    }

    function autoPlayNext() {
        if (!isAutoPlaying) return;
        if (currentPhase < 6 && !isAnimating) {
            nextPhase();
            autoPlayTimeout = setTimeout(autoPlayNext, (ANIMATION_DURATION + 2) * 1000);
        } else if (currentPhase >= 6) {
            stopAutoPlay();
        }
    }

    function playAll() {
        if (isAutoPlaying) {
            stopAutoPlay();
            return;
        }
        if (isAnimating) return;
        if (currentPhase >= 6) {
            // Reset first then play
            currentPhase = 0;
            applyState(phaseStates[0]);
            updateUI();
        }
        isAutoPlaying = true;
        autoPlayNext();
    }

    function saveState() {
        const state = {
            phase: currentPhase,
            cameraPosition: {
                x: camera.position.x,
                y: camera.position.y,
                z: camera.position.z
            },
            cameraTarget: {
                x: controls.target.x,
                y: controls.target.y,
                z: controls.target.z
            }
        };
        localStorage.setItem('cellDivisionState', JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem('cellDivisionState');
        if (!saved) return;
        try {
            const state = JSON.parse(saved);
            stopAutoPlay();
            if (!isAnimating) {
                const targetP = Math.max(0, Math.min(6, state.phase));
                currentPhase = targetP;
                applyState(phaseStates[targetP]);
                if (state.cameraPosition) {
                    camera.position.set(state.cameraPosition.x, state.cameraPosition.y, state.cameraPosition.z);
                }
                if (state.cameraTarget) {
                    controls.target.set(state.cameraTarget.x, state.cameraTarget.y, state.cameraTarget.z);
                }
                updateUI();
            }
        } catch (e) {
            console.error('Failed to load state:', e);
        }
    }

    // ---- UI ----
    const phaseLabelEl = document.getElementById('phase-label');
    const phaseCounterEl = document.getElementById('phase-counter');
    const infoPanelEl = document.getElementById('info-panel');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const btnPlay = document.getElementById('btn-play');
    const btnReset = document.getElementById('btn-reset');
    const btnSave = document.getElementById('btn-save');
    const btnLoad = document.getElementById('btn-load');

    function updateUI() {
        phaseLabelEl.textContent = PHASE_NAMES[currentPhase];
        phaseCounterEl.textContent = `Phase ${currentPhase + 1}/7`;
        infoPanelEl.textContent = PHASE_DESCRIPTIONS[currentPhase];

        btnPrev.disabled = currentPhase <= 0 || isAnimating;
        btnNext.disabled = currentPhase >= 6 || isAnimating;
        btnPlay.textContent = isAutoPlaying ? '⏸ Stop' : '▶ Play All';
    }

    btnNext.addEventListener('click', nextPhase);
    btnPrev.addEventListener('click', prevPhase);
    btnPlay.addEventListener('click', playAll);
    btnReset.addEventListener('click', resetToInterphase);
    btnSave.addEventListener('click', saveState);
    btnLoad.addEventListener('click', loadState);

    document.addEventListener('keydown', (e) => {
        const key = e.key.toLowerCase();
        if (key === 'n') nextPhase();
        else if (key === 'p') prevPhase();
        else if (key === 'r') resetToInterphase();
    });

    // ---- Window State ----
    window.__3D_STATE__ = {};

    function updateGlobalState() {
        const savedExists = localStorage.getItem('cellDivisionState') !== null;
        window.__3D_STATE__ = {
            currentPhase: currentPhase,
            phaseName: PHASE_NAMES[currentPhase],
            isAnimating: isAnimating,
            isAutoPlaying: isAutoPlaying,
            chromosomePositions: chromosomes.map(c => ({ x: c.position.x, y: c.position.y, z: c.position.z })),
            nucleusOpacity: nucleusMaterial.opacity,
            cellScaleX: cellMembrane.scale.x,
            cellScaleY: cellMembrane.scale.y,
            spindleVisible: spindleGroup.visible,
            daughterCellsVisible: daughterCell1.visible || daughterCell2.visible,
            savedStateExists: savedExists,
            cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z }
        };
    }

    // ---- Render Loop ----
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now() / 1000;

        // Handle animation
        if (isAnimating && fromState && toState) {
            const elapsed = now - animStartTime;
            const t = Math.min(1, elapsed / ANIMATION_DURATION);

            const interpolated = lerpState(fromState, toState, t);
            applyState(interpolated);

            if (t >= 1) {
                isAnimating = false;
                currentPhase = targetPhase;
                applyState(phaseStates[currentPhase]);
                fromState = null;
                toState = null;
            }
        }

        // Gentle rotation of particles
        particles.rotation.y += 0.0003;
        particles.rotation.x += 0.0001;

        // Gentle pulsing of chromosomes
        const time = now;
        for (let i = 0; i < chromosomes.length; i++) {
            const scale = 1 + Math.sin(time * 2 + i * 1.5) * 0.1;
            chromosomes[i].scale.set(scale, scale, scale);
        }

        // Gentle pulsing of cell membrane
        if (cellMembrane.visible && !isAnimating) {
            const pulse = 1 + Math.sin(time * 0.8) * 0.01;
            const baseState = phaseStates[currentPhase];
            cellMembrane.scale.set(
                baseState.cellScaleX * pulse,
                baseState.cellScaleY * pulse,
                baseState.cellScaleZ * pulse
            );
        }

        // Daughter cells gentle pulse
        if (daughterCell1.visible && !isAnimating) {
            const pulse = 1 + Math.sin(time * 0.8) * 0.01;
            daughterCell1.scale.set(pulse, pulse, pulse);
            daughterCell2.scale.set(pulse, pulse, pulse);
        }

        controls.update();
        updateUI();
        updateGlobalState();
        renderer.render(scene, camera);
    }

    // Initialize
    applyState(phaseStates[0]);
    updateUI();
    animate();

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
})();
</script>
</body>
</html>
