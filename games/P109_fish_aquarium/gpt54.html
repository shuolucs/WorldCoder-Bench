<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 互动水族馆</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #001133;
      font-family: Arial, Helvetica, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #eaf6ff;
      background: rgba(0, 10, 30, 0.45);
      border: 1px solid rgba(120, 180, 255, 0.35);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.8;
      backdrop-filter: blur(4px);
      pointer-events: none;
      min-width: 180px;
    }

    #tip {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      color: #d8ecff;
      background: rgba(0, 10, 30, 0.35);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      pointer-events: none;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>鱼数量: <span id="fishCount">0</span></div>
      <div>鹳鸟状态: <span id="storkState">perched</span></div>
      <div>俯冲次数: <span id="diveCount">0</span></div>
    </div>
    <div id="tip">操作：拖拽旋转视角，滚轮缩放，点击鹳鸟触发俯冲捕鱼</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    window.__3D_STATE__ = {
      modelLoaded: false,
      fishCount: 0,
      storkState: 'perched',
      diveCount: 0,
      fishPositions: [],
      storkPosition: { x: 0, y: 0, z: 0 }
    };

    const app = document.getElementById('app');
    const fishCountEl = document.getElementById('fishCount');
    const storkStateEl = document.getElementById('storkState');
    const diveCountEl = document.getElementById('diveCount');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x001133);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(18, 10, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, -0.5, 0);
    controls.enableDamping = true;
    controls.minDistance = 8;
    controls.maxDistance = 50;

    const ambient = new THREE.AmbientLight(0x4477bb, 1.8);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
    dirLight.position.set(8, 12, 6);
    scene.add(dirLight);

    const fillLight = new THREE.DirectionalLight(0x88bbff, 0.6);
    fillLight.position.set(-10, 6, -8);
    scene.add(fillLight);

    const aquariumCenter = new THREE.Vector3(0, -1, 0);
    const aquariumSize = new THREE.Vector3(16, 6, 10);
    const half = aquariumSize.clone().multiplyScalar(0.5);

    const tankGeo = new THREE.BoxGeometry(aquariumSize.x, aquariumSize.y, aquariumSize.z);
    const tankMat = new THREE.MeshBasicMaterial({
      color: 0x66bbff,
      wireframe: true,
      transparent: true,
      opacity: 0.4
    });
    const tank = new THREE.Mesh(tankGeo, tankMat);
    tank.position.copy(aquariumCenter);
    scene.add(tank);

    const waterGeo = new THREE.PlaneGeometry(16, 10, 1, 1);
    const waterMat = new THREE.MeshPhongMaterial({
      color: 0x4488ff,
      transparent: true,
      opacity: 0.3,
      side: THREE.DoubleSide
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.rotation.x = -Math.PI / 2;
    water.position.set(0, 2, 0);
    scene.add(water);

    const sandGeo = new THREE.PlaneGeometry(16, 10, 1, 1);
    const sandMat = new THREE.MeshPhongMaterial({
      color: 0xc9a36a,
      side: THREE.DoubleSide
    });
    const sand = new THREE.Mesh(sandGeo, sandMat);
    sand.rotation.x = -Math.PI / 2;
    sand.position.set(0, -4, 0);
    scene.add(sand);

    function createRockCluster(position, scale = 1) {
      const group = new THREE.Group();
      const rockMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.95, metalness: 0.05 });

      const parts = [
        { geo: new THREE.SphereGeometry(1.1, 18, 18), pos: [0, 0.5, 0], scl: [1.4, 1.0, 1.2] },
        { geo: new THREE.SphereGeometry(0.8, 18, 18), pos: [-0.9, 0.2, 0.4], scl: [1.0, 0.8, 0.9] },
        { geo: new THREE.SphereGeometry(0.7, 18, 18), pos: [0.8, 0.1, -0.3], scl: [1.1, 0.9, 1.0] },
        { geo: new THREE.BoxGeometry(1.2, 0.8, 1.0), pos: [0.2, -0.1, 0.2], scl: [1.2, 0.8, 1.3] }
      ];

      parts.forEach(p => {
        const mesh = new THREE.Mesh(p.geo, rockMat);
        mesh.position.set(...p.pos);
        mesh.scale.set(...p.scl);
        mesh.rotation.set(
          Math.random() * 0.4,
          Math.random() * Math.PI,
          Math.random() * 0.3
        );
        group.add(mesh);
      });

      group.position.copy(position);
      group.scale.setScalar(scale);
      scene.add(group);
      return group;
    }

    const storkRock = createRockCluster(new THREE.Vector3(6, 2.2, 0), 1.2);
    createRockCluster(new THREE.Vector3(-5.2, -3.8, -2.5), 0.55);
    createRockCluster(new THREE.Vector3(-1.5, -3.7, 3.0), 0.45);
    createRockCluster(new THREE.Vector3(3.5, -3.75, -3.2), 0.5);

    const loader = new GLTFLoader();
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    let fishTemplate = null;
    let stork = null;
    let storkRoot = null;
    let storkClickable = [];
    let fishList = [];

    const storkPerchPos = new THREE.Vector3(6, 3, 0);
    let storkState = 'perched';
    let diveCount = 0;
    let diveAction = null;
    let selectedFishIndex = -1;

    function updateHUD() {
      const visibleFish = fishList.filter(f => f.visible).length;
      fishCountEl.textContent = visibleFish;
      storkStateEl.textContent = storkState;
      diveCountEl.textContent = diveCount;

      window.__3D_STATE__.fishCount = visibleFish;
      window.__3D_STATE__.storkState = storkState;
      window.__3D_STATE__.diveCount = diveCount;
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function createFishMotionParams() {
      const centerX = rand(-5.5, 5.5);
      const centerY = rand(-2.8, 1.0);
      const centerZ = rand(-3.5, 3.5);

      const amplitudeX = rand(1.4, 2.8);
      const amplitudeY = rand(0.2, 1.0);
      const amplitudeZ = rand(1.0, 2.2);

      const speedX = rand(0.5, 1.0);
      const speedY = rand(0.8, 1.4);
      const speedZ = rand(0.6, 1.2);

      const phaseX = rand(0, Math.PI * 2);
      const phaseY = rand(0, Math.PI * 2);
      const phaseZ = rand(0, Math.PI * 2);

      return {
        centerX, centerY, centerZ,
        amplitudeX, amplitudeY, amplitudeZ,
        speedX, speedY, speedZ,
        phaseX, phaseY, phaseZ
      };
    }

    function clampFishToBounds(params) {
      params.centerX = THREE.MathUtils.clamp(params.centerX, -half.x + params.amplitudeX + 0.5, half.x - params.amplitudeX - 0.5);
      params.centerY = THREE.MathUtils.clamp(params.centerY, -4 + params.amplitudeY + 0.3, 2 - params.amplitudeY - 0.4);
      params.centerZ = THREE.MathUtils.clamp(params.centerZ, -half.z + params.amplitudeZ + 0.5, half.z - params.amplitudeZ - 0.5);
      return params;
    }

    function makeFishInstance(base, index) {
      const fish = base.clone(true);
      fish.scale.set(5, 5, 5);

      const wrapper = new THREE.Group();
      wrapper.add(fish);
      fish.rotation.y = Math.PI;

      scene.add(wrapper);

      const motion = clampFishToBounds(createFishMotionParams());

      const item = {
        group: wrapper,
        model: fish,
        motion,
        visible: true,
        capturedUntil: 0,
        lastPosition: new THREE.Vector3(),
        swimYawOffset: 0,
        bodySwingSeed: rand(0, Math.PI * 2),
        bodySwingAmp: rand(0.08, 0.16),
        index
      };

      fishList.push(item);
      return item;
    }

    function respawnFish(fish) {
      fish.motion = clampFishToBounds(createFishMotionParams());
      fish.visible = true;
      fish.group.visible = true;
      fish.capturedUntil = 0;
    }

    function captureFish(index, now) {
      const fish = fishList[index];
      if (!fish || !fish.visible) return;
      fish.visible = false;
      fish.group.visible = false;
      fish.capturedUntil = now + 3.0;
    }

    function updateFish(time) {
      for (const fish of fishList) {
        if (!fish.visible) {
          if (fish.capturedUntil > 0 && time >= fish.capturedUntil) {
            respawnFish(fish);
          }
          continue;
        }

        const p = fish.motion;
        const x = p.centerX + p.amplitudeX * Math.sin(time * p.speedX + p.phaseX);
        const y = p.centerY + p.amplitudeY * Math.sin(time * p.speedY + p.phaseY);
        const z = p.centerZ + p.amplitudeZ * Math.sin(time * p.speedZ + p.phaseZ);

        const vx = p.amplitudeX * p.speedX * Math.cos(time * p.speedX + p.phaseX);
        const vy = p.amplitudeY * p.speedY * Math.cos(time * p.speedY + p.phaseY);
        const vz = p.amplitudeZ * p.speedZ * Math.cos(time * p.speedZ + p.phaseZ);

        fish.group.position.set(x, y, z);

        const yaw = Math.atan2(vx, vz);
        const horizontalSpeed = Math.sqrt(vx * vx + vz * vz);
        const pitch = -Math.atan2(vy, Math.max(horizontalSpeed, 0.0001)) * 0.35;
        const bodySwing = Math.sin(time * 8 + fish.bodySwingSeed) * fish.bodySwingAmp;

        fish.group.rotation.y = yaw + bodySwing;
        fish.group.rotation.x = pitch;

        fish.lastPosition.set(x, y, z);
      }
    }

    function getVisibleFishPositions() {
      return fishList
        .filter(f => f.visible)
        .map(f => ({
          x: f.group.position.x,
          y: f.group.position.y,
          z: f.group.position.z
        }));
    }

    function findNearestVisibleFish() {
      if (!storkRoot) return -1;
      let minDist = Infinity;
      let nearest = -1;

      for (let i = 0; i < fishList.length; i++) {
        const fish = fishList[i];
        if (!fish.visible) continue;
        const d = storkRoot.position.distanceTo(fish.group.position);
        if (d < minDist) {
          minDist = d;
          nearest = i;
        }
      }
      return nearest;
    }

    function beginDive(time) {
      if (!storkRoot || storkState !== 'perched') return;
      const nearest = findNearestVisibleFish();
      if (nearest === -1) return;

      selectedFishIndex = nearest;
      const targetPos = fishList[nearest].group.position.clone();

      diveAction = {
        phase: 'diving',
        startTime: time,
        duration: 1.5,
        from: storkPerchPos.clone(),
        to: targetPos.clone(),
        returnDuration: 1.5
      };

      storkState = 'diving';
      updateHUD();
    }

    function parabolaPoint(start, end, t, height) {
      const pos = new THREE.Vector3().lerpVectors(start, end, t);
      pos.y += 4 * height * t * (1 - t);
      return pos;
    }

    function updateStorkDive(time) {
      if (!storkRoot || !diveAction) return;

      const action = diveAction;

      if (action.phase === 'diving') {
        const t = THREE.MathUtils.clamp((time - action.startTime) / action.duration, 0, 1);
        const pos = parabolaPoint(action.from, action.to, t, 3.5);
        storkRoot.position.copy(pos);

        const dir = action.to.clone().sub(action.from).normalize();
        storkRoot.rotation.y = Math.atan2(dir.x, dir.z);
        storkRoot.rotation.z = -0.15 * Math.sin(t * Math.PI);

        if (t >= 1) {
          captureFish(selectedFishIndex, time);
          action.phase = 'returning';
          action.startTime = time;
          action.from = storkRoot.position.clone();
          action.to = storkPerchPos.clone();
          storkState = 'returning';
          diveCount += 1;
          updateHUD();
        }
      } else if (action.phase === 'returning') {
        const t = THREE.MathUtils.clamp((time - action.startTime) / action.returnDuration, 0, 1);
        const pos = parabolaPoint(action.from, action.to, t, 3.2);
        storkRoot.position.copy(pos);

        const dir = action.to.clone().sub(action.from).normalize();
        storkRoot.rotation.y = Math.atan2(dir.x, dir.z);
        storkRoot.rotation.z = 0.1 * Math.sin(t * Math.PI);

        if (t >= 1) {
          storkRoot.position.copy(storkPerchPos);
          storkRoot.rotation.set(0, -Math.PI / 2, 0);
          diveAction = null;
          selectedFishIndex = -1;
          storkState = 'perched';
          updateHUD();
        }
      }
    }

    function addStorkFallback() {
      storkRoot = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8 });
      const legMat = new THREE.MeshStandardMaterial({ color: 0xaa5522, roughness: 0.8 });
      const beakMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, roughness: 0.6 });
      const wingMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.8 });

      const body = new THREE.Mesh(new THREE.SphereGeometry(0.9, 20, 20), bodyMat);
      body.scale.set(1.2, 0.9, 1.0);
      storkRoot.add(body);

      const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.16, 1.2, 12), bodyMat);
      neck.position.set(0.65, 0.9, 0);
      neck.rotation.z = -0.4;
      storkRoot.add(neck);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.28, 16, 16), bodyMat);
      head.position.set(1.1, 1.35, 0);
      storkRoot.add(head);

      const beak = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.55, 12), beakMat);
      beak.position.set(1.45, 1.33, 0);
      beak.rotation.z = -Math.PI / 2;
      storkRoot.add(beak);

      const wingL = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.15, 0.5), wingMat);
      wingL.position.set(0, 0.15, 0.55);
      wingL.rotation.x = 0.3;
      storkRoot.add(wingL);

      const wingR = wingL.clone();
      wingR.position.z = -0.55;
      wingR.rotation.x = -0.3;
      storkRoot.add(wingR);

      for (const z of [-0.18, 0.18]) {
        const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.2, 10), legMat);
        leg.position.set(-0.2, -1.0, z);
        storkRoot.add(leg);
      }

      storkRoot.scale.setScalar(0.6);
      storkRoot.position.copy(storkPerchPos);
      storkRoot.rotation.y = -Math.PI / 2;
      scene.add(storkRoot);
      storkClickable = [storkRoot];
    }

    function addFishFallbacks() {
      const fishGroup = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcfd8df, roughness: 0.7, metalness: 0.1 });
      const finMat = new THREE.MeshStandardMaterial({ color: 0x88aacc, roughness: 0.8 });

      const body = new THREE.Mesh(new THREE.SphereGeometry(0.25, 20, 20), bodyMat);
      body.scale.set(1.8, 1.0, 0.8);
      fishGroup.add(body);

      const tail = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.35, 12), finMat);
      tail.position.set(-0.45, 0, 0);
      tail.rotation.z = Math.PI / 2;
      fishGroup.add(tail);

      const finTop = new THREE.Mesh(new THREE.ConeGeometry(0.08, 0.18, 10), finMat);
      finTop.position.set(-0.05, 0.18, 0);
      finTop.rotation.z = Math.PI;
      fishGroup.add(finTop);

      fishTemplate = fishGroup;
      for (let i = 0; i < 8; i++) makeFishInstance(fishTemplate, i);
    }

    const fishPromise = new Promise((resolve) => {
      loader.load(
        'assets/BarramundiFish.glb',
        (gltf) => {
          fishTemplate = gltf.scene;
          for (let i = 0; i < 8; i++) makeFishInstance(fishTemplate, i);
          resolve();
        },
        undefined,
        () => {
          addFishFallbacks();
          resolve();
        }
      );
    });

    const storkPromise = new Promise((resolve) => {
      loader.load(
        'assets/stork.glb',
        (gltf) => {
          stork = gltf.scene;
          storkRoot = new THREE.Group();
          storkRoot.add(stork);
          storkRoot.scale.setScalar(0.02);
          storkRoot.position.copy(storkPerchPos);
          storkRoot.rotation.y = -Math.PI / 2;
          scene.add(storkRoot);

          stork.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.frustumCulled = false;
              storkClickable.push(obj);
            }
          });

          if (storkClickable.length === 0) storkClickable = [storkRoot];
          resolve();
        },
        undefined,
        () => {
          addStorkFallback();
          resolve();
        }
      );
    });

    Promise.all([fishPromise, storkPromise]).then(() => {
      window.__3D_STATE__.modelLoaded = true;
      updateHUD();
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (!storkRoot || storkState !== 'perched') return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(storkClickable, true);

      if (intersects.length > 0) {
        beginDive(clock.getElapsedTime());
      }
    });

    function updateStateExpose() {
      window.__3D_STATE__.fishPositions = fishList
        .filter(f => f.visible)
        .map(f => ({
          x: f.group.position.x,
          y: f.group.position.y,
          z: f.group.position.z
        }));

      if (storkRoot) {
        window.__3D_STATE__.storkPosition = {
          x: storkRoot.position.x,
          y: storkRoot.position.y,
          z: storkRoot.position.z
        };
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const time = clock.getElapsedTime();

      updateFish(time);
      updateStorkDive(time);

      if (storkRoot && storkState === 'perched') {
        storkRoot.position.copy(storkPerchPos);
        storkRoot.rotation.x = 0;
        storkRoot.rotation.z = 0;
      }

      updateHUD();
      updateStateExpose();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
