<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 互动水族馆</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 17, 51, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4488ff;
            pointer-events: none;
            user-select: none;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #4488ff;
        }
        .stat {
            margin: 5px 0;
            font-size: 14px;
        }
        .value {
            font-weight: bold;
            color: #00ffcc;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <h2>水族馆状态</h2>
        <div class="stat">鱼群数量: <span id="fishCount" class="value">0</span></div>
        <div class="stat">鹳鸟状态: <span id="storkState" class="value">perched</span></div>
        <div class="stat">俯冲次数: <span id="diveCount" class="value">0</span></div>
    </div>
    <div id="container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as SkeletonUtils from 'three/addons/utils/SkeletonUtils.js';

        // 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            fishCount: 0,
            storkState: 'perched',
            diveCount: 0,
            fishPositions: [],
            storkPosition: { x: 0, y: 0, z: 0 }
        };

        // 场景、相机、渲染器
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001133);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, -1, 0);

        // 光照
        const ambientLight = new THREE.AmbientLight(0x0044ff, 1.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 2.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // 场景布置
        // 1. 水族箱框架 (16x6x10, 中心 0, -1, 0)
        const tankGeometry = new THREE.BoxGeometry(16, 6, 10);
        const tankMaterial = new THREE.MeshBasicMaterial({ color: 0x0088ff, wireframe: true });
        const tank = new THREE.Mesh(tankGeometry, tankMaterial);
        tank.position.set(0, -1, 0);
        scene.add(tank);

        // 2. 水面 (y=2)
        const waterGeometry = new THREE.PlaneGeometry(16, 10);
        const waterMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x4488ff, 
            transparent: true, 
            opacity: 0.3,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const water = new THREE.Mesh(waterGeometry, waterMaterial);
        water.rotation.x = -Math.PI / 2;
        water.position.y = 2;
        scene.add(water);

        // 3. 岩石 (6, 3, 0)
        const rockGroup = new THREE.Group();
        rockGroup.position.set(6, 3, 0);
        const rockGeo1 = new THREE.DodecahedronGeometry(1.5);
        const rockGeo2 = new THREE.BoxGeometry(2, 1.5, 2);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
        const rock1 = new THREE.Mesh(rockGeo1, rockMat);
        const rock2 = new THREE.Mesh(rockGeo2, rockMat);
        rock2.position.set(-0.5, -0.5, 0.5);
        rock2.rotation.set(0.2, 0.4, 0.1);
        rockGroup.add(rock1);
        rockGroup.add(rock2);
        scene.add(rockGroup);

        // 4. 水底砂石 (y=-4)
        const sandGeometry = new THREE.PlaneGeometry(16, 10);
        const sandMaterial = new THREE.MeshStandardMaterial({ color: 0xc2b280, roughness: 1 });
        const sand = new THREE.Mesh(sandGeometry, sandMaterial);
        sand.rotation.x = -Math.PI / 2;
        sand.position.y = -4;
        scene.add(sand);

        // 装饰石头
        for(let i=0; i<5; i++) {
            const stone = new THREE.Mesh(new THREE.DodecahedronGeometry(Math.random() * 0.5 + 0.2), rockMat);
            stone.position.set(
                (Math.random() - 0.5) * 14,
                -3.8,
                (Math.random() - 0.5) * 8
            );
            scene.add(stone);
        }

        // 逻辑变量
        const fishes = [];
        let storkGroup = new THREE.Group();
        let storkMixer = null;
        let fishMixers = [];
        const clock = new THREE.Clock();

        const storkState = {
            status: 'perched', // perched, diving, returning
            diveStartTime: 0,
            startPos: new THREE.Vector3(),
            targetPos: new THREE.Vector3(),
            targetFish: null,
            perchPos: new THREE.Vector3(6, 4.5, 0)
        };

        // 模型加载
        const loader = new GLTFLoader();
        let modelsLoadedCount = 0;

        function checkLoadComplete() {
            modelsLoadedCount++;
            if (modelsLoadedCount === 2) {
                window.__3D_STATE__.modelLoaded = true;
            }
        }

        // 加载鱼
        loader.load('assets/BarramundiFish.glb', (gltf) => {
            const baseFish = gltf.scene;
            baseFish.scale.set(5, 5, 5);
            
            for (let i = 0; i < 8; i++) {
                const fishClone = SkeletonUtils.clone(baseFish);
                
                // 包装在一个 Group 中以便处理游动朝向和身体摆动
                const wrapper = new THREE.Group();
                wrapper.add(fishClone);
                scene.add(wrapper);

                if (gltf.animations && gltf.animations.length > 0) {
                    const mixer = new THREE.AnimationMixer(fishClone);
                    mixer.clipAction(gltf.animations[0]).play();
                    fishMixers.push(mixer);
                }

                const fishObj = {
                    group: wrapper,
                    model: fishClone,
                    active: true,
                    params: generateFishParams()
                };
                fishes.push(fishObj);
                window.__3D_STATE__.fishCount++;
            }
            checkLoadComplete();
        });

        // 加载鹳鸟
        loader.load('assets/stork.glb', (gltf) => {
            const storkModel = gltf.scene;
            storkModel.scale.set(0.02, 0.02, 0.02);
            
            storkGroup.add(storkModel);
            storkGroup.position.copy(storkState.perchPos);
            storkGroup.rotation.y = -Math.PI / 2; // 面向水池
            scene.add(storkGroup);

            if (gltf.animations && gltf.animations.length > 0) {
                storkMixer = new THREE.AnimationMixer(storkModel);
                storkMixer.clipAction(gltf.animations[0]).play();
            }
            checkLoadComplete();
        });

        function generateFishParams() {
            return {
                cx: (Math.random() - 0.5) * 10,
                cy: (Math.random() - 0.5) * 4 - 1, // -3 to 1
                cz: (Math.random() - 0.5) * 6,
                ax: Math.random() * 2 + 1,
                ay: Math.random() * 0.5 + 0.2,
                az: Math.random() * 2 + 1,
                sx: Math.random() * 0.5 + 0.5,
                sy: Math.random() * 0.5 + 0.5,
                sz: Math.random() * 0.5 + 0.5,
                px: Math.random() * Math.PI * 2,
                py: Math.random() * Math.PI * 2,
                pz: Math.random() * Math.PI * 2
            };
        }

        // 交互：点击鹳鸟
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (storkState.status !== 'perched' || !window.__3D_STATE__.modelLoaded) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(storkGroup, true);

            if (intersects.length > 0) {
                startDive();
            }
        });

        function startDive() {
            // 找最近的鱼
            let closestFish = null;
            let minDistance = Infinity;

            fishes.forEach(fish => {
                if (fish.active) {
                    const dist = storkGroup.position.distanceTo(fish.group.position);
                    if (dist < minDistance) {
                        minDistance = dist;
                        closestFish = fish;
                    }
                }
            });

            if (closestFish) {
                storkState.status = 'diving';
                storkState.diveStartTime = clock.getElapsedTime();
                storkState.startPos.copy(storkGroup.position);
                storkState.targetFish = closestFish;
                window.__3D_STATE__.storkState = 'diving';
            }
        }

        // 动画循环
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // 更新动画混合器
            if (storkMixer) storkMixer.update(delta);
            fishMixers.forEach(m => m.update(delta));

            // 更新鱼群
            const currentFishPositions = [];
            fishes.forEach(fish => {
                if (fish.active) {
                    const p = fish.params;
                    
                    // 计算位置
                    const x = p.cx + p.ax * Math.sin(time * p.sx + p.px);
                    const y = p.cy + p.ay * Math.sin(time * p.sy + p.py);
                    const z = p.cz + p.az * Math.sin(time * p.sz + p.pz);
                    fish.group.position.set(x, y, z);

                    // 计算速度向量用于朝向
                    const vx = p.ax * p.sx * Math.cos(time * p.sx + p.px);
                    const vy = p.ay * p.sy * Math.cos(time * p.sy + p.py);
                    const vz = p.az * p.sz * Math.cos(time * p.sz + p.pz);
                    
                    const targetLook = new THREE.Vector3(x + vx, y + vy, z + vz);
                    fish.group.lookAt(targetLook);

                    // 身体摆动
                    fish.model.rotation.y = Math.sin(time * 10) * 0.15;

                    currentFishPositions.push({ x, y, z });
                }
            });
            window.__3D_STATE__.fishPositions = currentFishPositions;

            // 更新鹳鸟
            if (storkState.status === 'diving') {
                const progress = (time - storkState.diveStartTime) / 1.5;
                
                // 实时更新目标鱼的位置
                if (storkState.targetFish && storkState.targetFish.active) {
                    storkState.targetPos.copy(storkState.targetFish.group.position);
                }

                if (progress >= 1.0) {
                    // 捕获鱼
                    storkGroup.position.copy(storkState.targetPos);
                    if (storkState.targetFish && storkState.targetFish.active) {
                        storkState.targetFish.active = false;
                        storkState.targetFish.group.visible = false;
                        window.__3D_STATE__.fishCount--;
                        
                        // 3秒后重生
                        const caughtFish = storkState.targetFish;
                        setTimeout(() => {
                            caughtFish.params = generateFishParams();
                            caughtFish.active = true;
                            caughtFish.group.visible = true;
                            window.__3D_STATE__.fishCount++;
                        }, 3000);
                    }

                    // 切换到返回状态
                    storkState.status = 'returning';
                    storkState.diveStartTime = time;
                    storkState.startPos.copy(storkGroup.position);
                    window.__3D_STATE__.storkState = 'returning';
                } else {
                    // 抛物线插值
                    const currentPos = new THREE.Vector3().lerpVectors(storkState.startPos, storkState.targetPos, progress);
                    // 稍微向上跃起再冲下
                    currentPos.y += Math.sin(progress * Math.PI) * 1.0; 
                    
                    // 计算朝向
                    const nextProgress = Math.min(progress + 0.01, 1.0);
                    const nextPos = new THREE.Vector3().lerpVectors(storkState.startPos, storkState.targetPos, nextProgress);
                    nextPos.y += Math.sin(nextProgress * Math.PI) * 1.0;
                    
                    storkGroup.position.copy(currentPos);
                    storkGroup.lookAt(nextPos);
                }
            } else if (storkState.status === 'returning') {
                const progress = (time - storkState.diveStartTime) / 1.5;
                
                if (progress >= 1.0) {
                    storkGroup.position.copy(storkState.perchPos);
                    storkGroup.rotation.set(0, -Math.PI / 2, 0);
                    storkState.status = 'perched';
                    window.__3D_STATE__.storkState = 'perched';
                    window.__3D_STATE__.diveCount++;
                } else {
                    const currentPos = new THREE.Vector3().lerpVectors(storkState.startPos, storkState.perchPos, progress);
                    // 向上飞回的抛物线
                    currentPos.y += Math.sin(progress * Math.PI) * 3.0;
                    
                    const nextProgress = Math.min(progress + 0.01, 1.0);
                    const nextPos = new THREE.Vector3().lerpVectors(storkState.startPos, storkState.perchPos, nextProgress);
                    nextPos.y += Math.sin(nextProgress * Math.PI) * 3.0;

                    storkGroup.position.copy(currentPos);
                    storkGroup.lookAt(nextPos);
                }
            }

            window.__3D_STATE__.storkPosition = {
                x: storkGroup.position.x,
                y: storkGroup.position.y,
                z: storkGroup.position.z
            };

            // 更新 HUD
            document.getElementById('fishCount').innerText = window.__3D_STATE__.fishCount;
            document.getElementById('storkState').innerText = window.__3D_STATE__.storkState;
            document.getElementById('diveCount').innerText = window.__3D_STATE__.diveCount;

            renderer.render(scene, camera);
        }

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
