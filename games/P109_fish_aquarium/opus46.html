<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Interactive Aquarium</title>
<style>
  body { margin: 0; overflow: hidden; background: #001133; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #00ccff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 17, 51, 0.8);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid rgba(0, 204, 255, 0.3);
    line-height: 1.8;
    pointer-events: none;
    z-index: 100;
  }
  #hud .label { color: #88bbdd; }
  #hud .value { color: #00ffcc; font-weight: bold; }
  #instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #88bbdd;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: rgba(0, 17, 51, 0.7);
    padding: 8px 16px;
    border-radius: 6px;
    pointer-events: none;
    z-index: 100;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  <div><span class="label">🐟 Fish Count: </span><span class="value" id="fishCount">0</span></div>
  <div><span class="label">🦩 Stork State: </span><span class="value" id="storkState">perched</span></div>
  <div><span class="label">🎯 Dive Count: </span><span class="value" id="diveCount">0</span></div>
</div>
<div id="instructions">Click on the stork to make it dive and catch a fish!</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Global state
window.__3D_STATE__ = {
  modelLoaded: false,
  fishCount: 0,
  storkState: "perched",
  diveCount: 0,
  fishPositions: [],
  storkPosition: { x: 6, y: 3, z: 0 }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x001133);
scene.fog = new THREE.FogExp2(0x001133, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 18);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.minDistance = 5;
controls.maxDistance = 40;

// Lighting
const ambientLight = new THREE.AmbientLight(0x3366aa, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const underwaterLight = new THREE.PointLight(0x0066cc, 0.8, 20);
underwaterLight.position.set(0, -1, 0);
scene.add(underwaterLight);

const topLight = new THREE.PointLight(0x88ccff, 0.5, 30);
topLight.position.set(0, 8, 0);
scene.add(topLight);

// Aquarium wireframe box
const boxGeom = new THREE.BoxGeometry(16, 6, 10);
const boxEdges = new THREE.EdgesGeometry(boxGeom);
const boxLine = new THREE.LineSegments(boxEdges, new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.4 }));
boxLine.position.set(0, -1, 0);
scene.add(boxLine);

// Transparent box faces
const boxFaceMat = new THREE.MeshPhongMaterial({
  color: 0x2244aa,
  transparent: true,
  opacity: 0.05,
  side: THREE.DoubleSide,
  depthWrite: false
});
const boxFaceMesh = new THREE.Mesh(boxGeom, boxFaceMat);
boxFaceMesh.position.set(0, -1, 0);
scene.add(boxFaceMesh);

// Water surface
const waterGeom = new THREE.PlaneGeometry(30, 20, 64, 64);
const waterMat = new THREE.MeshPhongMaterial({
  color: 0x4488ff,
  transparent: true,
  opacity: 0.3,
  side: THREE.DoubleSide,
  shininess: 100,
  depthWrite: false
});
const waterMesh = new THREE.Mesh(waterGeom, waterMat);
waterMesh.rotation.x = -Math.PI / 2;
waterMesh.position.y = 2;
scene.add(waterMesh);

// Sandy bottom
const sandGeom = new THREE.PlaneGeometry(30, 20);
const sandMat = new THREE.MeshPhongMaterial({ color: 0xc2a060, side: THREE.DoubleSide });
const sandMesh = new THREE.Mesh(sandGeom, sandMat);
sandMesh.rotation.x = -Math.PI / 2;
sandMesh.position.y = -4;
sandMesh.receiveShadow = true;
scene.add(sandMesh);

// Decorative stones on the bottom
function createStone(x, y, z, scaleX, scaleY, scaleZ, color) {
  const stoneGeom = new THREE.SphereGeometry(1, 8, 6);
  const stoneMat = new THREE.MeshPhongMaterial({ color: color || 0x666666 });
  const stone = new THREE.Mesh(stoneGeom, stoneMat);
  stone.position.set(x, y, z);
  stone.scale.set(scaleX, scaleY, scaleZ);
  stone.castShadow = true;
  stone.receiveShadow = true;
  scene.add(stone);
  return stone;
}

createStone(-5, -3.5, -2, 1.2, 0.6, 0.8, 0x777766);
createStone(-3, -3.7, 3, 0.8, 0.4, 0.6, 0x888877);
createStone(4, -3.6, -3, 1.0, 0.5, 0.9, 0x666655);
createStone(2, -3.8, 2, 0.6, 0.3, 0.5, 0x999988);
createStone(-6, -3.5, 1, 0.7, 0.4, 0.7, 0x776655);

// Seaweed
function createSeaweed(x, z) {
  const group = new THREE.Group();
  for (let i = 0; i < 3; i++) {
    const geom = new THREE.CylinderGeometry(0.05, 0.08, 1.5 + Math.random(), 6);
    const mat = new THREE.MeshPhongMaterial({ color: 0x228833, transparent: true, opacity: 0.8 });
    const strand = new THREE.Mesh(geom, mat);
    strand.position.set(x + (Math.random() - 0.5) * 0.3, -3.2 + strand.geometry.parameters.height / 2, z + (Math.random() - 0.5) * 0.3);
    strand.rotation.z = (Math.random() - 0.5) * 0.3;
    group.add(strand);
  }
  scene.add(group);
  return group;
}

createSeaweed(-6, -3);
createSeaweed(-4, 2);
createSeaweed(5, -2);
createSeaweed(3, 3);
createSeaweed(-2, -4);

// Rock for stork (at position 6, 3, 0)
const rockGroup = new THREE.Group();
rockGroup.position.set(6, 2, 0);

const rockMat = new THREE.MeshPhongMaterial({ color: 0x888888 });

const rock1 = new THREE.Mesh(new THREE.SphereGeometry(1.2, 8, 6), rockMat);
rock1.scale.set(1.2, 0.7, 1.0);
rock1.position.set(0, 0, 0);
rockGroup.add(rock1);

const rock2 = new THREE.Mesh(new THREE.SphereGeometry(0.8, 7, 5), rockMat);
rock2.scale.set(1.0, 0.6, 0.8);
rock2.position.set(0.5, 0.3, 0.4);
rockGroup.add(rock2);

const rock3 = new THREE.Mesh(new THREE.SphereGeometry(0.6, 6, 5), rockMat);
rock3.scale.set(0.9, 0.5, 0.7);
rock3.position.set(-0.4, 0.2, -0.3);
rockGroup.add(rock3);

const rock4 = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.5, 0.6), rockMat);
rock4.position.set(0.2, 0.5, -0.2);
rock4.rotation.set(0.2, 0.3, 0.1);
rockGroup.add(rock4);

rockGroup.children.forEach(c => { c.castShadow = true; c.receiveShadow = true; });
scene.add(rockGroup);

// Bubbles
const bubbles = [];
function createBubble() {
  const geom = new THREE.SphereGeometry(0.05 + Math.random() * 0.08, 8, 8);
  const mat = new THREE.MeshPhongMaterial({
    color: 0xaaddff,
    transparent: true,
    opacity: 0.4,
    shininess: 100
  });
  const bubble = new THREE.Mesh(geom, mat);
  bubble.position.set(
    (Math.random() - 0.5) * 14,
    -4 + Math.random() * 2,
    (Math.random() - 0.5) * 8
  );
  bubble.userData.speed = 0.5 + Math.random() * 1.0;
  scene.add(bubble);
  bubbles.push(bubble);
}
for (let i = 0; i < 30; i++) createBubble();

// Fish data
const fishObjects = [];
const FISH_COUNT = 8;
const AQUARIUM_BOUNDS = { xMin: -7, xMax: 7, yMin: -3.5, yMax: 1.5, zMin: -4, zMax: 4 };

function generateFishParams() {
  const centerX = (Math.random() - 0.5) * 8;
  const centerY = -1 + (Math.random() - 0.5) * 3;
  const centerZ = (Math.random() - 0.5) * 4;
  return {
    centerX, centerY, centerZ,
    amplitudeX: 2 + Math.random() * 3,
    amplitudeY: 0.5 + Math.random() * 1.5,
    amplitudeZ: 1 + Math.random() * 2,
    speedX: 0.3 + Math.random() * 0.5,
    speedY: 0.4 + Math.random() * 0.4,
    speedZ: 0.3 + Math.random() * 0.4,
    phaseX: Math.random() * Math.PI * 2,
    phaseY: Math.random() * Math.PI * 2,
    phaseZ: Math.random() * Math.PI * 2,
    tailSpeed: 3 + Math.random() * 4,
    tailAmplitude: 0.1 + Math.random() * 0.15
  };
}

function clampFishPosition(x, y, z) {
  return {
    x: THREE.MathUtils.clamp(x, AQUARIUM_BOUNDS.xMin, AQUARIUM_BOUNDS.xMax),
    y: THREE.MathUtils.clamp(y, AQUARIUM_BOUNDS.yMin, AQUARIUM_BOUNDS.yMax),
    z: THREE.MathUtils.clamp(z, AQUARIUM_BOUNDS.zMin, AQUARIUM_BOUNDS.zMax)
  };
}

// Stork data
let storkModel = null;
let storkMixer = null;
const storkRestPosition = new THREE.Vector3(6, 3.5, 0);
let storkState = "perched";
let diveCount = 0;
let diveStartTime = 0;
let diveTargetFish = null;
let diveStartPos = new THREE.Vector3();
let diveTargetPos = new THREE.Vector3();
const DIVE_DURATION = 1.5;
const RETURN_DURATION = 1.5;

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Load models
const loader = new GLTFLoader();
let fishModelLoaded = false;
let storkModelLoaded = false;
let fishTemplate = null;

function checkAllLoaded() {
  if (fishModelLoaded && storkModelLoaded) {
    window.__3D_STATE__.modelLoaded = true;
  }
}

// Load fish model
loader.load('assets/BarramundiFish.glb', (gltf) => {
  fishTemplate = gltf.scene;
  
  for (let i = 0; i < FISH_COUNT; i++) {
    const fishClone = fishTemplate.clone();
    fishClone.scale.set(5, 5, 5);
    fishClone.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    
    const params = generateFishParams();
    const fishData = {
      model: fishClone,
      params: params,
      visible: true,
      captured: false,
      respawnTime: 0,
      prevPosition: new THREE.Vector3()
    };
    
    fishObjects.push(fishData);
    scene.add(fishClone);
  }
  
  fishModelLoaded = true;
  checkAllLoaded();
}, undefined, (error) => {
  console.error('Error loading fish model:', error);
  // Create placeholder fish
  for (let i = 0; i < FISH_COUNT; i++) {
    const fishGeom = new THREE.ConeGeometry(0.3, 1.2, 6);
    const fishMat = new THREE.MeshPhongMaterial({ color: 0xff8844 });
    const fishMesh = new THREE.Mesh(fishGeom, fishMat);
    fishMesh.rotation.z = Math.PI / 2;
    
    const fishGroup = new THREE.Group();
    fishGroup.add(fishMesh);
    
    // Tail
    const tailGeom = new THREE.ConeGeometry(0.25, 0.4, 4);
    const tailMesh = new THREE.Mesh(tailGeom, fishMat);
    tailMesh.position.x = -0.7;
    tailMesh.rotation.z = -Math.PI / 2;
    fishGroup.add(tailMesh);
    
    fishGroup.scale.set(1, 1, 1);
    
    const params = generateFishParams();
    const fishData = {
      model: fishGroup,
      params: params,
      visible: true,
      captured: false,
      respawnTime: 0,
      prevPosition: new THREE.Vector3()
    };
    
    fishObjects.push(fishData);
    scene.add(fishGroup);
  }
  
  fishModelLoaded = true;
  checkAllLoaded();
});

// Load stork model
loader.load('assets/stork.glb', (gltf) => {
  storkModel = gltf.scene;
  storkModel.scale.set(0.02, 0.02, 0.02);
  storkModel.position.copy(storkRestPosition);
  storkModel.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  
  // Setup animation mixer if animations exist
  if (gltf.animations && gltf.animations.length > 0) {
    storkMixer = new THREE.AnimationMixer(storkModel);
    const action = storkMixer.clipAction(gltf.animations[0]);
    action.play();
  }
  
  scene.add(storkModel);
  storkModelLoaded = true;
  checkAllLoaded();
}, undefined, (error) => {
  console.error('Error loading stork model:', error);
  // Create placeholder stork
  const storkGroup = new THREE.Group();
  
  // Body
  const bodyGeom = new THREE.CapsuleGeometry(0.3, 0.8, 4, 8);
  const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.rotation.z = Math.PI / 4;
  storkGroup.add(body);
  
  // Head
  const headGeom = new THREE.SphereGeometry(0.2, 8, 8);
  const head = new THREE.Mesh(headGeom, bodyMat);
  head.position.set(0.4, 0.6, 0);
  storkGroup.add(head);
  
  // Beak
  const beakGeom = new THREE.ConeGeometry(0.06, 0.5, 4);
  const beakMat = new THREE.MeshPhongMaterial({ color: 0xff6600 });
  const beak = new THREE.Mesh(beakGeom, beakMat);
  beak.position.set(0.7, 0.6, 0);
  beak.rotation.z = -Math.PI / 2;
  storkGroup.add(beak);
  
  // Legs
  const legGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.8, 4);
  const legMat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
  const leg1 = new THREE.Mesh(legGeom, legMat);
  leg1.position.set(-0.1, -0.7, 0.1);
  storkGroup.add(leg1);
  const leg2 = new THREE.Mesh(legGeom, legMat);
  leg2.position.set(-0.1, -0.7, -0.1);
  storkGroup.add(leg2);
  
  // Wings
  const wingGeom = new THREE.PlaneGeometry(0.8, 0.3);
  const wingMat = new THREE.MeshPhongMaterial({ color: 0x222222, side: THREE.DoubleSide });
  const wing1 = new THREE.Mesh(wingGeom, wingMat);
  wing1.position.set(0, 0.2, 0.4);
  wing1.rotation.x = 0.2;
  storkGroup.add(wing1);
  const wing2 = new THREE.Mesh(wingGeom, wingMat);
  wing2.position.set(0, 0.2, -0.4);
  wing2.rotation.x = -0.2;
  storkGroup.add(wing2);
  
  storkGroup.position.copy(storkRestPosition);
  storkModel = storkGroup;
  scene.add(storkModel);
  storkModelLoaded = true;
  checkAllLoaded();
});

// Click handler
function onMouseClick(event) {
  if (!storkModel || storkState !== "perched") return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  
  // Check intersection with stork and rock
  const storkObjects = [];
  storkModel.traverse(child => {
    if (child.isMesh) storkObjects.push(child);
  });
  rockGroup.children.forEach(c => storkObjects.push(c));
  
  const intersects = raycaster.intersectObjects(storkObjects, true);
  
  if (intersects.length > 0) {
    startDive();
  }
}

function startDive() {
  // Find visible fish
  const visibleFish = fishObjects.filter(f => f.visible && !f.captured);
  if (visibleFish.length === 0) return;
  
  // Find nearest fish
  let nearestFish = null;
  let nearestDist = Infinity;
  
  for (const fish of visibleFish) {
    const dist = storkModel.position.distanceTo(fish.model.position);
    if (dist < nearestDist) {
      nearestDist = dist;
      nearestFish = fish;
    }
  }
  
  if (!nearestFish) return;
  
  diveTargetFish = nearestFish;
  diveStartPos.copy(storkModel.position);
  diveTargetPos.copy(nearestFish.model.position);
  diveStartTime = performance.now() / 1000;
  storkState = "diving";
  
  window.__3D_STATE__.storkState = "diving";
  document.getElementById('storkState').textContent = "diving";
}

function updateStorkDive(time) {
  if (storkState === "diving") {
    const elapsed = time - diveStartTime;
    const t = Math.min(elapsed / DIVE_DURATION, 1.0);
    
    // Parabolic path (arc upward then down)
    const easeT = t;
    const x = diveStartPos.x + (diveTargetPos.x - diveStartPos.x) * easeT;
    const z = diveStartPos.z + (diveTargetPos.z - diveStartPos.z) * easeT;
    
    // Parabolic arc: goes up first then dives down
    const arcHeight = 3.0;
    const linearY = diveStartPos.y + (diveTargetPos.y - diveStartPos.y) * easeT;
    const arc = arcHeight * 4 * easeT * (1 - easeT);
    const y = linearY + arc;
    
    storkModel.position.set(x, y, z);
    
    // Face direction of movement
    const dir = new THREE.Vector3(diveTargetPos.x - diveStartPos.x, diveTargetPos.y - diveStartPos.y - arcHeight, diveTargetPos.z - diveStartPos.z).normalize();
    if (t < 0.5) {
      storkModel.lookAt(storkModel.position.x + dir.x, storkModel.position.y + 1, storkModel.position.z + dir.z);
    } else {
      storkModel.lookAt(diveTargetPos.x, diveTargetPos.y, diveTargetPos.z);
    }
    
    if (t >= 1.0) {
      // Catch the fish
      if (diveTargetFish && diveTargetFish.visible) {
        diveTargetFish.visible = false;
        diveTargetFish.captured = true;
        diveTargetFish.model.visible = false;
        diveTargetFish.respawnTime = time + 3.0;
      }
      
      // Start return
      storkState = "returning";
      diveStartTime = time;
      diveStartPos.copy(storkModel.position);
      diveCount++;
      
      window.__3D_STATE__.storkState = "returning";
      window.__3D_STATE__.diveCount = diveCount;
      document.getElementById('storkState').textContent = "returning";
      document.getElementById('diveCount').textContent = diveCount;
    }
  } else if (storkState === "returning") {
    const elapsed = time - diveStartTime;
    const t = Math.min(elapsed / RETURN_DURATION, 1.0);
    
    const easeT = t;
    const x = diveStartPos.x + (storkRestPosition.x - diveStartPos.x) * easeT;
    const z = diveStartPos.z + (storkRestPosition.z - diveStartPos.z) * easeT;
    
    const arcHeight = 4.0;
    const linearY = diveStartPos.y + (storkRestPosition.y - diveStartPos.y) * easeT;
    const arc = arcHeight * 4 * easeT * (1 - easeT);
    const y = linearY + arc;
    
    storkModel.position.set(x, y, z);
    
    // Face direction
    storkModel.lookAt(storkRestPosition.x, storkRestPosition.y, storkRestPosition.z);
    
    if (t >= 1.0) {
      storkModel.position.copy(storkRestPosition);
      storkState = "perched";
      diveTargetFish = null;
      
      window.__3D_STATE__.storkState = "perched";
      document.getElementById('storkState').textContent = "perched";
    }
  }
}

window.addEventListener('click', onMouseClick);

// Handle resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();
let prevTime = 0;

function animate() {
  requestAnimationFrame(animate);
  
  const time = clock.getElapsedTime();
  const delta = time - prevTime;
  prevTime = time;
  
  // Update water surface
  const waterPositions = waterMesh.geometry.attributes.position;
  for (let i = 0; i < waterPositions.count; i++) {
    const x = waterPositions.getX(i);
    const z = waterPositions.getZ(i);
    const waveY = Math.sin(x * 0.5 + time * 1.5) * 0.05 + Math.sin(z * 0.7 + time * 1.2) * 0.03;
    waterPositions.setZ(i, waveY);
  }
  waterPositions.needsUpdate = true;
  waterMesh.geometry.computeVertexNormals();
  
  // Update bubbles
  for (const bubble of bubbles) {
    bubble.position.y += bubble.userData.speed * delta;
    bubble.position.x += Math.sin(time * 2 + bubble.position.z) * 0.002;
    if (bubble.position.y > 2) {
      bubble.position.y = -4;
      bubble.position.x = (Math.random() - 0.5) * 14;
      bubble.position.z = (Math.random() - 0.5) * 8;
    }
  }
  
  // Update fish
  let visibleFishCount = 0;
  const fishPositions = [];
  
  for (const fish of fishObjects) {
    // Check respawn
    if (fish.captured && time >= fish.respawnTime) {
      fish.captured = false;
      fish.visible = true;
      fish.model.visible = true;
      fish.params = generateFishParams();
    }
    
    if (!fish.visible) {
      fishPositions.push({ x: 0, y: -100, z: 0 });
      continue;
    }
    
    visibleFishCount++;
    
    const p = fish.params;
    const prevX = fish.model.position.x;
    const prevZ = fish.model.position.z;
    
    let newX = p.centerX + p.amplitudeX * Math.sin(time * p.speedX + p.phaseX);
    let newY = p.centerY + p.amplitudeY * Math.sin(time * p.speedY + p.phaseY);
    let newZ = p.centerZ + p.amplitudeZ * Math.sin(time * p.speedZ + p.phaseZ);
    
    // Clamp to aquarium bounds
    const clamped = clampFishPosition(newX, newY, newZ);
    newX = clamped.x;
    newY = clamped.y;
    newZ = clamped.z;
    
    fish.model.position.set(newX, newY, newZ);
    
    // Face swimming direction
    const dx = newX - prevX;
    const dz = newZ - prevZ;
    if (Math.abs(dx) > 0.001 || Math.abs(dz) > 0.001) {
      const targetAngle = Math.atan2(dx, dz);
      fish.model.rotation.y = targetAngle;
    }
    
    // Tail wagging effect (slight y-rotation oscillation added to base rotation)
    const tailWag = p.tailAmplitude * Math.sin(time * p.tailSpeed);
    fish.model.rotation.y += tailWag;
    
    // Slight body roll
    fish.model.rotation.z = Math.sin(time * p.speedX * 1.5 + p.phaseX) * 0.05;
    
    fishPositions.push({ x: newX, y: newY, z: newZ });
  }
  
  // Update stork
  if (storkModel) {
    if (storkState === "perched") {
      // Idle animation - slight bobbing
      storkModel.position.y = storkRestPosition.y + Math.sin(time * 1.5) * 0.05;
      storkModel.rotation.y = Math.sin(time * 0.5) * 0.1;
    }
    
    updateStorkDive(time);
    
    if (storkMixer) {
      storkMixer.update(delta);
    }
    
    window.__3D_STATE__.storkPosition = {
      x: storkModel.position.x,
      y: storkModel.position.y,
      z: storkModel.position.z
    };
  }
  
  // Update underwater light color pulsing
  underwaterLight.intensity = 0.6 + Math.sin(time * 0.8) * 0.2;
  
  // Update state
  window.__3D_STATE__.fishCount = visibleFishCount;
  window.__3D_STATE__.fishPositions = fishPositions;
  window.__3D_STATE__.storkState = storkState;
  window.__3D_STATE__.diveCount = diveCount;
  
  // Update HUD
  document.getElementById('fishCount').textContent = visibleFishCount;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
