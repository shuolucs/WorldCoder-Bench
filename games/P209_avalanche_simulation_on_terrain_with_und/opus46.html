<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Avalanche Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
position: absolute;
top: 15px;
left: 15px;
color: #e0e0e0;
background: rgba(0, 0, 0, 0.65);
padding: 15px 20px;
border-radius: 10px;
font-size: 14px;
line-height: 1.8;
backdrop-filter: blur(10px);
border: 1px solid rgba(255, 255, 255, 0.1);
min-width: 260px;
}
#hud .label { color: #88ccff; font-weight: 600; }
#hud .value { color: #ffffff; }
#hud .paused-indicator { color: #ffaa00; font-weight: bold; }
#controls {
position: absolute;
top: 15px;
right: 15px;
display: flex;
flex-direction: column;
gap: 10px;
}
#controls button {
padding: 12px 24px;
font-size: 14px;
font-weight: 600;
border: none;
border-radius: 8px;
cursor: pointer;
transition: all 0.3s ease;
text-transform: uppercase;
letter-spacing: 1px;
}
#startBtn {
background: linear-gradient(135deg, #00b4d8, #0077b6);
color: white;
box-shadow: 0 4px 15px rgba(0, 180, 216, 0.3);
}
#startBtn:hover { background: linear-gradient(135deg, #00c4e8, #0087c6); transform: translateY(-2px); }
#startBtn:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
#resetBtn {
background: linear-gradient(135deg, #e63946, #c1121f);
color: white;
box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
}
#resetBtn:hover { background: linear-gradient(135deg, #f64956, #d1222f); transform: translateY(-2px); }
#keyhints {
position: absolute;
bottom: 15px;
left: 15px;
color: #aaa;
background: rgba(0, 0, 0, 0.5);
padding: 10px 15px;
border-radius: 8px;
font-size: 12px;
line-height: 1.6;
backdrop-filter: blur(5px);
}
#keyhints kbd {
background: rgba(255,255,255,0.15);
padding: 2px 6px;
border-radius: 3px;
font-family: monospace;
}
</style>
</head>
<body>

<div id="hud">
<div><span class="label">Time: </span><span class="value" id="hudTime">0.00s</span></div>
<div><span class="label">Active Particles: </span><span class="value" id="hudActive">0 / 200</span></div>
<div><span class="label">Stopped: </span><span class="value" id="hudStopped">0</span></div>
<div><span class="label">Snapshot: </span><span class="value" id="hudSnapshot">-1 / 0</span></div>
<div><span class="label">Status: </span><span class="value" id="hudStatus">Ready</span></div>
<div><span class="label">Horse: </span><span class="value" id="hudHorse">Loading...</span></div>
</div>

<div id="controls">
<button id="startBtn">Start Avalanche</button>
<button id="resetBtn">Reset</button>
</div>

<div id="keyhints">
<kbd>P</kbd> Pause/Resume &nbsp; <kbd>U</kbd> Undo &nbsp; <kbd>R</kbd> Redo
</div>

<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0xc8d8e8, 0.008);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 40, 60);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 50, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 150;
dirLight.shadow.camera.left = -60;
dirLight.shadow.camera.right = 60;
dirLight.shadow.camera.top = 60;
dirLight.shadow.camera.bottom = -60;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0xb1e1ff, 0xb97a20, 0.3);
scene.add(hemiLight);

// --- Terrain ---
const terrainGeo = new THREE.PlaneGeometry(100, 100, 64, 64);
terrainGeo.rotateX(-Math.PI / 2);

const posAttr = terrainGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const z = posAttr.getZ(i);
    // z goes from -50 to 50. Height rises from z=-50 (height=0) to z=50 (height=30)
    const t = (z + 50) / 100; // 0 at z=-50, 1 at z=50
    let height = t * 30;
    // Add some noise for natural look
    height += Math.sin(x * 0.3) * Math.cos(z * 0.2) * 1.5;
    height += Math.sin(x * 0.7 + z * 0.5) * 0.8;
    posAttr.setY(i, height);
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
    color: 0xf0f0f0,
    roughness: 0.9,
    metalness: 0.0,
    flatShading: false,
});

// Add vertex colors for snow effect
const colors = new Float32Array(posAttr.count * 3);
for (let i = 0; i < posAttr.count; i++) {
    const y = posAttr.getY(i);
    const t = y / 30;
    const grey = 0.85 + t * 0.15;
    colors[i * 3] = grey;
    colors[i * 3 + 1] = grey;
    colors[i * 3 + 2] = grey + 0.02;
}
terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
terrainMat.vertexColors = true;

const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// Function to get terrain height at (x, z)
function getTerrainHeight(x, z) {
    const t = (z + 50) / 100;
    let height = t * 30;
    height += Math.sin(x * 0.3) * Math.cos(z * 0.2) * 1.5;
    height += Math.sin(x * 0.7 + z * 0.5) * 0.8;
    return height;
}

// --- Horse Model ---
let horseModel = null;
let horseBBox = new THREE.Box3();
const horsePosition = { x: 5, y: 0, z: 10 };

const loader = new GLTFLoader();
loader.load('._horse.glb',
    (gltf) => {
        horseModel = gltf.scene;
        horseModel.scale.set(3, 3, 3);
        const terrainY = getTerrainHeight(horsePosition.x, horsePosition.z);
        horsePosition.y = terrainY;
        horseModel.position.set(horsePosition.x, terrainY, horsePosition.z);
        horseModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
                // Make it look frozen/icy
                child.material = new THREE.MeshStandardMaterial({
                    color: 0xaaddff,
                    roughness: 0.3,
                    metalness: 0.6,
                    transparent: true,
                    opacity: 0.85,
                });
            }
        });
        scene.add(horseModel);
        horseBBox.setFromObject(horseModel);
        window.__3D_STATE__.horseLoaded = true;
        window.__3D_STATE__.horsePosition = { ...horsePosition };
        document.getElementById('hudHorse').textContent = 'Loaded ✓';
    },
    undefined,
    (error) => {
        console.warn('Could not load horse GLB, creating placeholder:', error);
        // Create a placeholder horse-like shape
        const group = new THREE.Group();

        // Body
        const bodyGeo = new THREE.BoxGeometry(4, 2.5, 2);
        const iceMat = new THREE.MeshStandardMaterial({
            color: 0xaaddff,
            roughness: 0.3,
            metalness: 0.6,
            transparent: true,
            opacity: 0.85,
        });
        const body = new THREE.Mesh(bodyGeo, iceMat);
        body.position.y = 2.5;
        body.castShadow = true;
        group.add(body);

        // Head
        const headGeo = new THREE.BoxGeometry(1.5, 1.5, 1.2);
        const head = new THREE.Mesh(headGeo, iceMat);
        head.position.set(2.5, 3.5, 0);
        head.rotation.z = 0.3;
        head.castShadow = true;
        group.add(head);

        // Neck
        const neckGeo = new THREE.BoxGeometry(1, 2, 1);
        const neck = new THREE.Mesh(neckGeo, iceMat);
        neck.position.set(1.8, 3.2, 0);
        neck.rotation.z = 0.5;
        neck.castShadow = true;
        group.add(neck);

        // Legs
        const legGeo = new THREE.CylinderGeometry(0.2, 0.2, 2, 8);
        const legPositions = [[-1.2, 0.8, 0.6], [-1.2, 0.8, -0.6], [1.2, 0.8, 0.6], [1.2, 0.8, -0.6]];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, iceMat);
            leg.position.set(...pos);
            leg.castShadow = true;
            group.add(leg);
        });

        // Tail
        const tailGeo = new THREE.CylinderGeometry(0.15, 0.05, 2, 8);
        const tail = new THREE.Mesh(tailGeo, iceMat);
        tail.position.set(-2.5, 3, 0);
        tail.rotation.z = -0.8;
        tail.castShadow = true;
        group.add(tail);

        const terrainY = getTerrainHeight(horsePosition.x, horsePosition.z);
        horsePosition.y = terrainY;
        group.position.set(horsePosition.x, terrainY, horsePosition.z);
        group.scale.set(1, 1, 1);

        horseModel = group;
        scene.add(horseModel);
        horseBBox.setFromObject(horseModel);

        window.__3D_STATE__.horseLoaded = true;
        window.__3D_STATE__.horsePosition = { ...horsePosition };
        document.getElementById('hudHorse').textContent = 'Placeholder ✓';
    }
);

// --- Particles ---
const TOTAL_PARTICLES = 200;
const particles = [];
const particleMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    roughness: 0.8,
    metalness: 0.0,
});

const particleGeo = new THREE.SphereGeometry(0.3, 8, 6);

// Also create some varied sizes for visual interest
const particleGeoSmall = new THREE.SphereGeometry(0.2, 6, 4);
const particleGeoLarge = new THREE.SphereGeometry(0.45, 8, 6);

for (let i = 0; i < TOTAL_PARTICLES; i++) {
    let geo = particleGeo;
    const sizeRand = Math.random();
    if (sizeRand < 0.3) geo = particleGeoSmall;
    else if (sizeRand > 0.85) geo = particleGeoLarge;

    const mesh = new THREE.Mesh(geo, particleMat.clone());
    mesh.castShadow = true;
    mesh.visible = false;

    const initX = (Math.random() - 0.5) * 12;
    const initZ = 45 + (Math.random() - 0.5) * 6;
    const initY = getTerrainHeight(initX, initZ) + 0.3 + Math.random() * 2;

    mesh.position.set(initX, initY, initZ);
    scene.add(mesh);

    particles.push({
        mesh: mesh,
        velocity: { x: 0, y: 0, z: 0 },
        active: false,
        stopped: false,
        initialPos: { x: initX, y: initY, z: initZ },
        activationDelay: Math.random() * 2.0, // stagger activation
    });
}

// --- State ---
let simulationStarted = false;
let simulationTime = 0;
let paused = false;
let snapshotHistory = [];
let snapshotIndex = -1;
let undoCount = 0;
let redoCount = 0;
let lastSnapshotTime = -1;

window.__3D_STATE__ = {
    simulationStarted: false,
    simulationTime: 0,
    activeParticles: 0,
    totalParticles: TOTAL_PARTICLES,
    paused: false,
    snapshotIndex: -1,
    totalSnapshots: 0,
    horseLoaded: false,
    horsePosition: { x: 5, y: 0, z: 10 },
    particlesStopped: 0,
    undoCount: 0,
    redoCount: 0,
    canUndo: false,
    canRedo: false,
};

function updateState() {
    const active = particles.filter(p => p.active && !p.stopped).length;
    const stopped = particles.filter(p => p.stopped).length;

    window.__3D_STATE__.simulationStarted = simulationStarted;
    window.__3D_STATE__.simulationTime = simulationTime;
    window.__3D_STATE__.activeParticles = active;
    window.__3D_STATE__.paused = paused;
    window.__3D_STATE__.snapshotIndex = snapshotIndex;
    window.__3D_STATE__.totalSnapshots = snapshotHistory.length;
    window.__3D_STATE__.particlesStopped = stopped;
    window.__3D_STATE__.undoCount = undoCount;
    window.__3D_STATE__.redoCount = redoCount;
    window.__3D_STATE__.canUndo = snapshotIndex > 0;
    window.__3D_STATE__.canRedo = snapshotIndex < snapshotHistory.length - 1;

    // Update HUD
    document.getElementById('hudTime').textContent = simulationTime.toFixed(2) + 's';
    document.getElementById('hudActive').textContent = `${active} / ${TOTAL_PARTICLES}`;
    document.getElementById('hudStopped').textContent = stopped.toString();
    document.getElementById('hudSnapshot').textContent = `${snapshotIndex} / ${snapshotHistory.length}`;

    let status = 'Ready';
    if (simulationStarted && !paused) status = 'Running';
    else if (simulationStarted && paused) status = '⏸ Paused';
    if (simulationStarted && active === 0 && stopped > 0) status = 'Complete';
    document.getElementById('hudStatus').textContent = status;
}

// --- Snapshot System ---
function saveSnapshot() {
    // Remove any snapshots after current index (for redo invalidation after new action)
    if (snapshotIndex < snapshotHistory.length - 1) {
        snapshotHistory = snapshotHistory.slice(0, snapshotIndex + 1);
    }

    const snapshot = {
        time: simulationTime,
        particles: particles.map(p => ({
            position: { x: p.mesh.position.x, y: p.mesh.position.y, z: p.mesh.position.z },
            velocity: { ...p.velocity },
            active: p.active,
            stopped: p.stopped,
            visible: p.mesh.visible,
        })),
    };

    snapshotHistory.push(snapshot);

    // Max 30 snapshots
    if (snapshotHistory.length > 30) {
        snapshotHistory.shift();
    }

    snapshotIndex = snapshotHistory.length - 1;
}

function restoreSnapshot(index) {
    if (index < 0 || index >= snapshotHistory.length) return;

    const snapshot = snapshotHistory[index];
    simulationTime = snapshot.time;

    snapshot.particles.forEach((data, i) => {
        particles[i].mesh.position.set(data.position.x, data.position.y, data.position.z);
        particles[i].velocity = { ...data.velocity };
        particles[i].active = data.active;
        particles[i].stopped = data.stopped;
        particles[i].mesh.visible = data.visible;
    });

    snapshotIndex = index;
}

// --- Physics Update ---
const GRAVITY = -15;
const horseColliderCenter = { x: horsePosition.x, z: horsePosition.z };
const horseColliderHalfW = 2;
const horseColliderHalfD = 2;

function updatePhysics(dt) {
    if (!simulationStarted || paused) return;

    simulationTime += dt;

    // Update horse bounding box position for collision
    const horseY = getTerrainHeight(horsePosition.x, horsePosition.z);

    particles.forEach(p => {
        if (p.stopped) return;

        // Activate particles with delay
        if (!p.active) {
            if (simulationTime >= p.activationDelay) {
                p.active = true;
                p.mesh.visible = true;
            }
            return;
        }

        // Gravity
        p.velocity.y += GRAVITY * dt;

        // Downhill force (slope pushes particles in -z direction)
        const terrainH = getTerrainHeight(p.mesh.position.x, p.mesh.position.z);
        const slopeGradZ = (getTerrainHeight(p.mesh.position.x, p.mesh.position.z + 0.5) -
                           getTerrainHeight(p.mesh.position.x, p.mesh.position.z - 0.5));
        const slopeGradX = (getTerrainHeight(p.mesh.position.x + 0.5, p.mesh.position.z) -
                           getTerrainHeight(p.mesh.position.x - 0.5, p.mesh.position.z));

        // Slope-driven acceleration
        p.velocity.z -= slopeGradZ * 8 * dt;
        p.velocity.x -= slopeGradX * 5 * dt;

        // Random drift
        p.velocity.x += (Math.random() - 0.5) * 3 * dt;

        // Damping
        p.velocity.x *= (1 - 0.5 * dt);
        p.velocity.z *= (1 - 0.3 * dt);

        // Update position
        p.mesh.position.x += p.velocity.x * dt;
        p.mesh.position.y += p.velocity.y * dt;
        p.mesh.position.z += p.velocity.z * dt;

        // Terrain collision
        const currentTerrainH = getTerrainHeight(p.mesh.position.x, p.mesh.position.z);
        if (p.mesh.position.y < currentTerrainH + 0.3) {
            p.mesh.position.y = currentTerrainH + 0.3;
            if (p.velocity.y < 0) {
                p.velocity.y = -p.velocity.y * 0.2; // Bounce with energy loss
            }
        }

        // Horse collision (box collider)
        const dx = p.mesh.position.x - horsePosition.x;
        const dz = p.mesh.position.z - horsePosition.z;
        if (Math.abs(dx) < horseColliderHalfW + 0.3 &&
            Math.abs(dz) < horseColliderHalfD + 0.3 &&
            p.mesh.position.y < horseY + 5) {
            // Push particle away from horse
            if (Math.abs(dx) > Math.abs(dz)) {
                p.velocity.x = Math.sign(dx) * Math.abs(p.velocity.x + 5);
                p.mesh.position.x = horsePosition.x + Math.sign(dx) * (horseColliderHalfW + 0.5);
            } else {
                p.velocity.z = Math.sign(dz) * Math.abs(p.velocity.z + 5);
                p.mesh.position.z = horsePosition.z + Math.sign(dz) * (horseColliderHalfD + 0.5);
            }
            p.velocity.y += 2; // Small upward bounce
        }

        // Boundary checks
        if (p.mesh.position.x > 48) { p.mesh.position.x = 48; p.velocity.x *= -0.5; }
        if (p.mesh.position.x < -48) { p.mesh.position.x = -48; p.velocity.x *= -0.5; }

        // Stop conditions
        if (p.mesh.position.z < -40 || (p.mesh.position.y < currentTerrainH + 0.35 &&
            Math.abs(p.velocity.x) < 0.5 && Math.abs(p.velocity.z) < 0.5 && p.mesh.position.z < 0)) {
            p.stopped = true;
            p.velocity = { x: 0, y: 0, z: 0 };
            p.mesh.position.y = getTerrainHeight(p.mesh.position.x, p.mesh.position.z) + 0.3;
        }
    });

    // Save snapshot every 1 second
    const currentSecond = Math.floor(simulationTime);
    if (currentSecond > lastSnapshotTime) {
        lastSnapshotTime = currentSecond;
        saveSnapshot();
    }
}

// --- Controls ---
document.getElementById('startBtn').addEventListener('click', () => {
    if (!simulationStarted) {
        simulationStarted = true;
        simulationTime = 0;
        lastSnapshotTime = -1;
        document.getElementById('startBtn').disabled = true;
        // Save initial snapshot
        saveSnapshot();
    }
});

document.getElementById('resetBtn').addEventListener('click', () => {
    simulationStarted = false;
    simulationTime = 0;
    paused = false;
    snapshotHistory = [];
    snapshotIndex = -1;
    lastSnapshotTime = -1;
    undoCount = 0;
    redoCount = 0;

    particles.forEach(p => {
        p.mesh.position.set(p.initialPos.x, p.initialPos.y, p.initialPos.z);
        p.velocity = { x: 0, y: 0, z: 0 };
        p.active = false;
        p.stopped = false;
        p.mesh.visible = false;
    });

    document.getElementById('startBtn').disabled = false;
    updateState();
});

document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'p') {
        if (simulationStarted) {
            paused = !paused;
        }
    }

    if (key === 'u') {
        // Undo
        if (snapshotIndex > 0) {
            restoreSnapshot(snapshotIndex - 1);
            undoCount++;
            paused = true; // Pause on undo
        }
    }

    if (key === 'r' && !e.ctrlKey && !e.metaKey) {
        // Redo
        if (snapshotIndex < snapshotHistory.length - 1) {
            restoreSnapshot(snapshotIndex + 1);
            redoCount++;
            paused = true; // Pause on redo
        }
    }
});

// --- Skybox-like background ---
const skyGeo = new THREE.SphereGeometry(200, 32, 32);
const skyMat = new THREE.MeshBasicMaterial({
    color: 0x87CEEB,
    side: THREE.BackSide,
});
const sky = new THREE.Mesh(skyGeo, skyMat);
scene.add(sky);

// Add some distant mountains as backdrop
for (let i = 0; i < 5; i++) {
    const mtnGeo = new THREE.ConeGeometry(15 + Math.random() * 10, 25 + Math.random() * 15, 6);
    const mtnMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(0.7 + Math.random() * 0.2, 0.75 + Math.random() * 0.2, 0.85),
        roughness: 0.9,
        flatShading: true,
    });
    const mtn = new THREE.Mesh(mtnGeo, mtnMat);
    mtn.position.set(-60 + i * 30, 5, -60 + Math.random() * 10);
    scene.add(mtn);
}

// --- Snow particles in air (ambient) ---
const snowGeo = new THREE.BufferGeometry();
const snowCount = 500;
const snowPositions = new Float32Array(snowCount * 3);
for (let i = 0; i < snowCount; i++) {
    snowPositions[i * 3] = (Math.random() - 0.5) * 120;
    snowPositions[i * 3 + 1] = Math.random() * 60;
    snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 120;
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, transparent: true, opacity: 0.6 });
const snowParticles = new THREE.Points(snowGeo, snowMat);
scene.add(snowParticles);

// --- Render Loop ---
let lastTime = performance.now();

function animate(currentTime) {
    requestAnimationFrame(animate);

    const dt = Math.min((currentTime - lastTime) / 1000, 0.05); // Cap dt
    lastTime = currentTime;

    // Animate ambient snow
    const snowPos = snowParticles.geometry.attributes.position;
    for (let i = 0; i < snowCount; i++) {
        snowPos.array[i * 3 + 1] -= 3 * dt;
        snowPos.array[i * 3] += Math.sin(currentTime * 0.001 + i) * 0.02;
        if (snowPos.array[i * 3 + 1] < 0) {
            snowPos.array[i * 3 + 1] = 55 + Math.random() * 5;
        }
    }
    snowPos.needsUpdate = true;

    // Physics
    updatePhysics(dt);

    // Update state
    updateState();

    controls.update();
    renderer.render(scene, camera);
}

requestAnimationFrame(animate);

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
