<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Pulley System</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#ui {
position: absolute;
top: 10px;
left: 10px;
z-index: 10;
display: flex;
flex-direction: column;
gap: 8px;
}
#ui button {
padding: 10px 20px;
font-size: 14px;
cursor: pointer;
border: none;
border-radius: 5px;
color: white;
font-weight: bold;
}
#startBtn { background: #4CAF50; }
#startBtn:hover { background: #45a049; }
#resetBtn { background: #f44336; }
#resetBtn:hover { background: #d32f2f; }
#moveFoxBtn { background: #2196F3; }
#moveFoxBtn:hover { background: #1976D2; }
#hud {
position: absolute;
top: 10px;
right: 10px;
background: rgba(0,0,0,0.7);
color: #0f0;
padding: 15px;
border-radius: 8px;
font-family: 'Courier New', monospace;
font-size: 13px;
line-height: 1.6;
z-index: 10;
min-width: 250px;
}
#hud .label { color: #aaa; }
#hud .value { color: #0f0; }
#instructions {
position: absolute;
bottom: 10px;
left: 50%;
transform: translateX(-50%);
background: rgba(0,0,0,0.7);
color: white;
padding: 10px 20px;
border-radius: 8px;
font-size: 13px;
z-index: 10;
text-align: center;
}
</style>
</head>
<body>

<div id="ui">
<button id="startBtn">Start Simulation</button>
<button id="resetBtn">Reset</button>
<button id="moveFoxBtn">Move Fox</button>
</div>

<div id="hud"></div>

<div id="instructions">
Click a block on the ground to select it (turns yellow), then click a platform to place it. Press Start to simulate.
</div>

<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
platformA_y: 4,
platformB_y: 4,
massA: 3,
massB: 0,
velocity: 0,
acceleration: 0,
simulationRunning: false,
foxOnPlatform: 'A',
blocksOnA: 0,
blocksOnB: 0,
foxLoaded: false,
selectedBlock: null
};

const state = window.__3D_STATE__;
const G = 9.8;
const ROPE_LENGTH = 16;
const PLATFORM_MIN_Y = 1;
const PLATFORM_MAX_Y = 7;
const INITIAL_PLATFORM_Y = 4;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 4, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Frame
const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });

const leftPost = new THREE.Mesh(new THREE.BoxGeometry(0.3, 8, 0.3), woodMat);
leftPost.position.set(-3, 4, 0);
leftPost.castShadow = true;
scene.add(leftPost);

const rightPost = new THREE.Mesh(new THREE.BoxGeometry(0.3, 8, 0.3), woodMat);
rightPost.position.set(3, 4, 0);
rightPost.castShadow = true;
scene.add(rightPost);

const topBeam = new THREE.Mesh(new THREE.BoxGeometry(6.3, 0.3, 0.3), woodMat);
topBeam.position.set(0, 8, 0);
topBeam.castShadow = true;
scene.add(topBeam);

// Pulleys
const pulleyGeo = new THREE.TorusGeometry(0.5, 0.1, 16, 32);
const pulleyMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5 });

const pulleyLeft = new THREE.Mesh(pulleyGeo, pulleyMat);
pulleyLeft.position.set(-1.5, 8, 0);
pulleyLeft.rotation.y = Math.PI / 2;
scene.add(pulleyLeft);

const pulleyRight = new THREE.Mesh(pulleyGeo, pulleyMat);
pulleyRight.position.set(1.5, 8, 0);
pulleyRight.rotation.y = Math.PI / 2;
scene.add(pulleyRight);

// Pulley axle visuals
const axleGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.4, 8);
const axleMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
const axleLeft = new THREE.Mesh(axleGeo, axleMat);
axleLeft.position.set(-1.5, 8, 0);
axleLeft.rotation.x = Math.PI / 2;
scene.add(axleLeft);
const axleRight = new THREE.Mesh(axleGeo, axleMat);
axleRight.position.set(1.5, 8, 0);
axleRight.rotation.x = Math.PI / 2;
scene.add(axleRight);

// Platforms
const platformGeo = new THREE.BoxGeometry(1, 0.1, 1);
const platformMat = new THREE.MeshStandardMaterial({ color: 0xDEB887 });

const platformA = new THREE.Mesh(platformGeo, platformMat);
platformA.position.set(-1.5, INITIAL_PLATFORM_Y, 0);
platformA.castShadow = true;
platformA.userData = { isPlatform: true, id: 'A' };
scene.add(platformA);

const platformB = new THREE.Mesh(platformGeo, platformMat);
platformB.position.set(1.5, INITIAL_PLATFORM_Y, 0);
platformB.castShadow = true;
platformB.userData = { isPlatform: true, id: 'B' };
scene.add(platformB);

// Rope
const ropeMaterial = new THREE.LineBasicMaterial({ color: 0x8B6914, linewidth: 2 });
const ropeGeometry = new THREE.BufferGeometry();
const ropePositions = new Float32Array(5 * 3);
ropeGeometry.setAttribute('position', new THREE.BufferAttribute(ropePositions, 3));
const rope = new THREE.Line(ropeGeometry, ropeMaterial);
scene.add(rope);

function updateRope() {
const posAttr = rope.geometry.getAttribute('position');
// Platform A top -> left pulley
posAttr.setXYZ(0, -1.5, platformA.position.y + 0.05, 0);
posAttr.setXYZ(1, -1.5, 8, 0);
// Left pulley -> right pulley
posAttr.setXYZ(2, -1.5, 8.5, 0);
posAttr.setXYZ(2, 1.5, 8.5, 0);
// Actually let's do 5 points: platformA -> pulleyL top -> pulleyR top -> platformB
posAttr.setXYZ(0, -1.5, platformA.position.y + 0.05, 0);
posAttr.setXYZ(1, -1.5, 8, 0);
posAttr.setXYZ(2, -1.5, 8.55, 0); // over left pulley
posAttr.setXYZ(3, 1.5, 8, 0);
// wait, let me redo with proper path
// rope: platformA top -> up to left pulley bottom -> over left pulley top -> across to right pulley top -> down right pulley bottom -> platformB top
// Simplified: 5 points
posAttr.setXYZ(0, -1.5, platformA.position.y + 0.05, 0);
posAttr.setXYZ(1, -1.5, 8, 0);
posAttr.setXYZ(2, 0, 8.6, 0); // midpoint above
posAttr.setXYZ(3, 1.5, 8, 0);
posAttr.setXYZ(4, 1.5, platformB.position.y + 0.05, 0);
posAttr.needsUpdate = true;
}

// Weight blocks
const blocks = [];
const blockColors = [0xff0000, 0xff0000, 0xff0000, 0x0000ff, 0x0000ff];
const blockMasses = [1, 1, 1, 2, 2];
const blockInitialPositions = [
new THREE.Vector3(-2, 0.2, 2),
new THREE.Vector3(-1, 0.2, 2),
new THREE.Vector3(0, 0.2, 2),
new THREE.Vector3(1, 0.2, 2),
new THREE.Vector3(2, 0.2, 2)
];

for (let i = 0; i < 5; i++) {
const geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
const mat = new THREE.MeshStandardMaterial({ color: blockColors[i] });
const block = new THREE.Mesh(geo, mat);
block.position.copy(blockInitialPositions[i]);
block.castShadow = true;
block.userData = {
isBlock: true,
index: i,
mass: blockMasses[i],
originalColor: blockColors[i],
onPlatform: null, // 'A', 'B', or null
stackIndex: 0
};
scene.add(block);
blocks.push(block);
}

// Fox
let foxModel = null;
let foxMixer = null;
let foxAction = null;

const loader = new GLTFLoader();
loader.load(
'Fox.glb',
(gltf) => {
foxModel = gltf.scene;
foxModel.scale.set(0.02, 0.02, 0.02);
foxModel.position.set(-1.5, platformA.position.y + 0.05, 0);
foxModel.castShadow = true;
scene.add(foxModel);

if (gltf.animations && gltf.animations.length > 0) {
foxMixer = new THREE.AnimationMixer(foxModel);
foxAction = foxMixer.clipAction(gltf.animations[0]);
foxAction.play();
}

state.foxLoaded = true;
console.log('Fox loaded successfully');
},
(progress) => {
console.log('Loading Fox...', (progress.loaded / progress.total * 100).toFixed(1) + '%');
},
(error) => {
console.warn('Could not load Fox.glb:', error);
// Create a placeholder fox
const foxGroup = new THREE.Group();
const bodyGeo = new THREE.BoxGeometry(0.6, 0.4, 0.3);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFF6600 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.2;
foxGroup.add(body);

const headGeo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
const head = new THREE.Mesh(headGeo, bodyMat);
head.position.set(0.35, 0.35, 0);
foxGroup.add(head);

// Ears
const earGeo = new THREE.ConeGeometry(0.06, 0.15, 4);
const ear1 = new THREE.Mesh(earGeo, bodyMat);
ear1.position.set(0.35, 0.55, 0.08);
foxGroup.add(ear1);
const ear2 = new THREE.Mesh(earGeo, bodyMat);
ear2.position.set(0.35, 0.55, -0.08);
foxGroup.add(ear2);

// Tail
const tailGeo = new THREE.CylinderGeometry(0.04, 0.08, 0.4, 8);
const tailMat = new THREE.MeshStandardMaterial({ color: 0xFF8833 });
const tail = new THREE.Mesh(tailGeo, tailMat);
tail.position.set(-0.45, 0.3, 0);
tail.rotation.z = Math.PI / 4;
foxGroup.add(tail);

foxModel = foxGroup;
foxModel.position.set(-1.5, platformA.position.y + 0.05, 0);
scene.add(foxModel);
state.foxLoaded = true;
}
);

// Physics variables
let velocity = 0;
let simulationRunning = false;

// Raycaster for picking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getBlocksOnPlatform(platformId) {
return blocks.filter(b => b.userData.onPlatform === platformId);
}

function getMassOnPlatform(platformId) {
let mass = 0;
if ((platformId === 'A' && state.foxOnPlatform === 'A') ||
(platformId === 'B' && state.foxOnPlatform === 'B')) {
mass += 3; // Fox mass
}
for (const b of blocks) {
if (b.userData.onPlatform === platformId) {
mass += b.userData.mass;
}
}
return mass;
}

function updateBlockPositions() {
// Stack blocks on platforms
const blocksOnA = getBlocksOnPlatform('A');
const blocksOnB = getBlocksOnPlatform('B');

blocksOnA.forEach((b, i) => {
b.position.set(-1.5, platformA.position.y + 0.05 + 0.2 + i * 0.4, 0);
b.userData.stackIndex = i;
});

blocksOnB.forEach((b, i) => {
b.position.set(1.5, platformB.position.y + 0.05 + 0.2 + i * 0.4, 0);
b.userData.stackIndex = i;
});
}

function updateFoxPosition() {
if (!foxModel) return;
const platform = state.foxOnPlatform === 'A' ? platformA : platformB;
const blocksOnPlatform = getBlocksOnPlatform(state.foxOnPlatform);
const stackHeight = blocksOnPlatform.length * 0.4;
foxModel.position.set(
platform.position.x,
platform.position.y + 0.05 + stackHeight,
0
);
}

function updateMasses() {
state.massA = getMassOnPlatform('A');
state.massB = getMassOnPlatform('B');
state.blocksOnA = getBlocksOnPlatform('A').length;
state.blocksOnB = getBlocksOnPlatform('B').length;
}

function placeBlockOnPlatform(blockIndex, platformId) {
const block = blocks[blockIndex];
if (block.userData.onPlatform !== null) return; // Already placed

block.userData.onPlatform = platformId;
block.material.color.setHex(block.userData.originalColor);

updateMasses();
updateBlockPositions();
updateFoxPosition();

state.selectedBlock = null;
}

// Click handling
let selectedBlockIndex = null;

renderer.domElement.addEventListener('click', (event) => {
mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

raycaster.setFromCamera(mouse, camera);

// Check if clicking on blocks on the ground
const groundBlocks = blocks.filter(b => b.userData.onPlatform === null);
const blockIntersects = raycaster.intersectObjects(groundBlocks);

if (blockIntersects.length > 0 && !simulationRunning) {
const clickedBlock = blockIntersects[0].object;
const idx = clickedBlock.userData.index;

// Deselect previous
if (selectedBlockIndex !== null) {
const prevBlock = blocks[selectedBlockIndex];
if (prevBlock.userData.onPlatform === null) {
prevBlock.material.color.setHex(prevBlock.userData.originalColor);
}
}

// Select new
selectedBlockIndex = idx;
state.selectedBlock = idx;
clickedBlock.material.color.setHex(0xFFFF00); // Yellow highlight
return;
}

// Check if clicking on platforms
if (selectedBlockIndex !== null && !simulationRunning) {
const platformIntersects = raycaster.intersectObjects([platformA, platformB]);
if (platformIntersects.length > 0) {
const clickedPlatform = platformIntersects[0].object;
const platformId = clickedPlatform.userData.id;
placeBlockOnPlatform(selectedBlockIndex, platformId);
selectedBlockIndex = null;
return;
}

// Also check clicking near platforms (larger hit area)
const allIntersects = raycaster.intersectObjects(scene.children, true);
for (const hit of allIntersects) {
let obj = hit.object;
while (obj) {
if (obj === platformA) {
placeBlockOnPlatform(selectedBlockIndex, 'A');
selectedBlockIndex = null;
return;
}
if (obj === platformB) {
placeBlockOnPlatform(selectedBlockIndex, 'B');
selectedBlockIndex = null;
return;
}
obj = obj.parent;
}
}
}
});

// Buttons
document.getElementById('startBtn').addEventListener('click', () => {
simulationRunning = true;
state.simulationRunning = true;
// Deselect any block
if (selectedBlockIndex !== null) {
const block = blocks[selectedBlockIndex];
if (block.userData.onPlatform === null) {
block.material.color.setHex(block.userData.originalColor);
}
selectedBlockIndex = null;
state.selectedBlock = null;
}
});

document.getElementById('resetBtn').addEventListener('click', () => {
simulationRunning = false;
state.simulationRunning = false;
velocity = 0;

// Reset platforms
platformA.position.y = INITIAL_PLATFORM_Y;
platformB.position.y = INITIAL_PLATFORM_Y;

// Reset blocks
blocks.forEach((b, i) => {
b.userData.onPlatform = null;
b.userData.stackIndex = 0;
b.position.copy(blockInitialPositions[i]);
b.material.color.setHex(b.userData.originalColor);
});

// Reset fox
state.foxOnPlatform = 'A';
if (foxModel) {
foxModel.position.set(-1.5, INITIAL_PLATFORM_Y + 0.05, 0);
}

selectedBlockIndex = null;
state.selectedBlock = null;

updateMasses();
updateRope();
});

document.getElementById('moveFoxBtn').addEventListener('click', () => {
if (simulationRunning) return;

if (state.foxOnPlatform === 'A') {
state.foxOnPlatform = 'B';
} else {
state.foxOnPlatform = 'A';
}

updateMasses();
updateBlockPositions();
updateFoxPosition();
});

// HUD update
function updateHUD() {
const hud = document.getElementById('hud');
const acc = state.acceleration;
hud.innerHTML = `
<div><span class="label">Mass A:</span> <span class="value">${state.massA.toFixed(1)} kg</span></div>
<div><span class="label">Mass B:</span> <span class="value">${state.massB.toFixed(1)} kg</span></div>
<div><span class="label">Platform A Y:</span> <span class="value">${state.platformA_y.toFixed(3)}</span></div>
<div><span class="label">Platform B Y:</span> <span class="value">${state.platformB_y.toFixed(3)}</span></div>
<div><span class="label">Velocity:</span> <span class="value">${state.velocity.toFixed(4)} m/s</span></div>
<div><span class="label">Acceleration:</span> <span class="value">${acc.toFixed(4)} m/s²</span></div>
<div><span class="label">Simulation:</span> <span class="value" style="color:${state.simulationRunning ? '#0f0' : '#f55'}">${state.simulationRunning ? 'RUNNING' : 'STOPPED'}</span></div>
<div><span class="label">Fox on:</span> <span class="value">Platform ${state.foxOnPlatform}</span></div>
<div><span class="label">Blocks on A:</span> <span class="value">${state.blocksOnA}</span></div>
<div><span class="label">Blocks on B:</span> <span class="value">${state.blocksOnB}</span></div>
<div><span class="label">Fox Loaded:</span> <span class="value">${state.foxLoaded ? 'YES' : 'NO'}</span></div>
<div><span class="label">Selected Block:</span> <span class="value">${state.selectedBlock !== null ? state.selectedBlock : 'None'}</span></div>
`;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
requestAnimationFrame(animate);

let dt = clock.getDelta();
if (dt > 0.016) dt = 0.016;

// Update fox animation
if (foxMixer) {
foxMixer.update(dt);
}

// Physics
updateMasses();

if (simulationRunning) {
const massA = state.massA;
const massB = state.massB;
const totalMass = massA + massB;

let acceleration = 0;
if (totalMass > 0) {
acceleration = (massA - massB) * G / totalMass;
}

velocity += acceleration * dt;
velocity *= 0.98; // Damping

// Move platforms: positive velocity = A goes down, B goes up
let newAy = platformA.position.y - velocity * dt;
let newBy = platformB.position.y + velocity * dt;

// Clamp
if (newAy < PLATFORM_MIN_Y) {
newAy = PLATFORM_MIN_Y;
velocity = 0;
}
if (newAy > PLATFORM_MAX_Y) {
newAy = PLATFORM_MAX_Y;
velocity = 0;
}
if (newBy < PLATFORM_MIN_Y) {
newBy = PLATFORM_MIN_Y;
velocity = 0;
}
if (newBy > PLATFORM_MAX_Y) {
newBy = PLATFORM_MAX_Y;
velocity = 0;
}

platformA.position.y = newAy;
platformB.position.y = newBy;

state.acceleration = acceleration;
state.velocity = velocity;
} else {
state.acceleration = 0;
state.velocity = 0;
velocity = 0;
}

// Update positions
updateBlockPositions();
updateFoxPosition();
updateRope();

// Rotate pulleys based on velocity
if (simulationRunning) {
const rotSpeed = velocity * 2;
pulleyLeft.rotation.z += rotSpeed * dt;
pulleyRight.rotation.z += rotSpeed * dt;
}

// Update state
state.platformA_y = platformA.position.y;
state.platformB_y = platformB.position.y;
state.simulationRunning = simulationRunning;

updateHUD();

controls.update();
renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial updates
updateMasses();
updateRope();
updateHUD();

animate();
</script>
</body>
</html>
