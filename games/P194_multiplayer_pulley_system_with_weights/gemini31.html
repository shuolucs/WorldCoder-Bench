<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Pulley System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #87CEEB;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            pointer-events: auto;
            min-width: 250px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background: #45a049; }
        #resetBtn { background: #f44336; }
        #resetBtn:hover { background: #da190b; }
        #moveFoxBtn { background: #2196F3; }
        #moveFoxBtn:hover { background: #0b7dda; }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .hud-val { font-family: monospace; font-weight: bold; }
        #instructions {
            margin-top: 10px;
            font-size: 12px;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="startBtn" class="btn">Start Simulation</button>
        <button id="resetBtn" class="btn">Reset</button>
        <button id="moveFoxBtn" class="btn">Move Fox</button>
        
        <div id="hud">
            <div class="hud-line"><span>State:</span> <span id="hud-state" class="hud-val">Static</span></div>
            <div class="hud-line"><span>Mass A:</span> <span id="hud-massA" class="hud-val">3</span></div>
            <div class="hud-line"><span>Mass B:</span> <span id="hud-massB" class="hud-val">0</span></div>
            <div class="hud-line"><span>Pos A (y):</span> <span id="hud-posA" class="hud-val">4.00</span></div>
            <div class="hud-line"><span>Pos B (y):</span> <span id="hud-posB" class="hud-val">4.00</span></div>
            <div class="hud-line"><span>Velocity:</span> <span id="hud-vel" class="hud-val">0.00</span></div>
            <div class="hud-line"><span>Accel:</span> <span id="hud-acc" class="hud-val">0.00</span></div>
        </div>

        <div id="instructions">
            Click a block to select (yellow), then click a platform to place it. (Only when static)
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            platformA_y: 4,
            platformB_y: 4,
            massA: 3,
            massB: 0,
            velocity: 0,
            acceleration: 0,
            simulationRunning: false,
            foxOnPlatform: 'A',
            blocksOnA: 0,
            blocksOnB: 0,
            foxLoaded: false,
            selectedBlock: null
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 4, 0);
        controls.update();

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x8B7355 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Pulley System ---
        const woodMat = new THREE.MeshLambertMaterial({ color: 0x8B7355 });
        const metalMat = new THREE.MeshLambertMaterial({ color: 0x888888 });
        const platMat = new THREE.MeshLambertMaterial({ color: 0xDEB887 });

        // Frame
        const postGeo = new THREE.BoxGeometry(0.3, 8, 0.3);
        const postL = new THREE.Mesh(postGeo, woodMat);
        postL.position.set(-3, 4, 0);
        postL.castShadow = true;
        scene.add(postL);

        const postR = new THREE.Mesh(postGeo, woodMat);
        postR.position.set(3, 4, 0);
        postR.castShadow = true;
        scene.add(postR);

        const beamGeo = new THREE.BoxGeometry(6.3, 0.3, 0.3);
        const beam = new THREE.Mesh(beamGeo, woodMat);
        beam.position.set(0, 8, 0);
        beam.castShadow = true;
        scene.add(beam);

        // Pulleys
        const pulleyGeo = new THREE.TorusGeometry(0.5, 0.1, 16, 32);
        const pulleyL = new THREE.Mesh(pulleyGeo, metalMat);
        pulleyL.position.set(-1.5, 8, 0);
        pulleyL.castShadow = true;
        scene.add(pulleyL);

        const pulleyR = new THREE.Mesh(pulleyGeo, metalMat);
        pulleyR.position.set(1.5, 8, 0);
        pulleyR.castShadow = true;
        scene.add(pulleyR);

        // Platforms
        const platGeo = new THREE.BoxGeometry(1, 0.1, 1);
        const platformA = new THREE.Mesh(platGeo, platMat);
        platformA.position.set(-1.5, 4, 0);
        platformA.castShadow = true;
        platformA.receiveShadow = true;
        scene.add(platformA);

        const platformB = new THREE.Mesh(platGeo, platMat);
        platformB.position.set(1.5, 4, 0);
        platformB.castShadow = true;
        platformB.receiveShadow = true;
        scene.add(platformB);

        // Rope
        const ropeMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const ropeGeo = new THREE.BufferGeometry();
        const ropePositions = new Float32Array(4 * 3); // 4 points
        ropeGeo.setAttribute('position', new THREE.BufferAttribute(ropePositions, 3));
        const rope = new THREE.Line(ropeGeo, ropeMat);
        scene.add(rope);

        function updateRope() {
            const pos = rope.geometry.attributes.position.array;
            pos[0] = platformA.position.x; pos[1] = platformA.position.y; pos[2] = 0;
            pos[3] = -1.5; pos[4] = 8.5; pos[5] = 0;
            pos[6] = 1.5; pos[7] = 8.5; pos[8] = 0;
            pos[9] = platformB.position.x; pos[10] = platformB.position.y; pos[11] = 0;
            rope.geometry.attributes.position.needsUpdate = true;
        }
        updateRope();

        // --- Fox Model ---
        let foxMixer, foxModel;
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', (gltf) => {
            foxModel = gltf.scene;
            foxModel.scale.set(0.02, 0.02, 0.02);
            
            foxModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            platformA.add(foxModel);
            foxModel.position.set(0, 0.05, 0); // Sit on platform

            foxMixer = new THREE.AnimationMixer(foxModel);
            if (gltf.animations.length > 0) {
                const action = foxMixer.clipAction(gltf.animations[0]);
                action.play();
            }
            state.foxLoaded = true;
        });

        // --- Weight Blocks ---
        const blocks = [];
        const blockGeo = new THREE.BoxGeometry(0.4, 0.4, 0.4);
        const redMat = new THREE.MeshLambertMaterial({ color: 0xff0000 });
        const blueMat = new THREE.MeshLambertMaterial({ color: 0x0000ff });

        const initialBlockPositions = [
            { x: -2, z: 2, mat: redMat, mass: 1 },
            { x: -1, z: 2, mat: redMat, mass: 1 },
            { x: 0, z: 2, mat: redMat, mass: 1 },
            { x: 1, z: 2, mat: blueMat, mass: 2 },
            { x: 2, z: 2, mat: blueMat, mass: 2 }
        ];

        initialBlockPositions.forEach((data, index) => {
            const mesh = new THREE.Mesh(blockGeo, data.mat.clone());
            mesh.position.set(data.x, 0.2, data.z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            blocks.push({
                id: index,
                mesh: mesh,
                mass: data.mass,
                location: 'ground', // 'ground', 'A', 'B'
                initPos: new THREE.Vector3(data.x, 0.2, data.z)
            });
        });

        function updateMasses() {
            let mA = state.foxOnPlatform === 'A' ? 3 : 0;
            let mB = state.foxOnPlatform === 'B' ? 3 : 0;
            let countA = 0;
            let countB = 0;

            blocks.forEach(b => {
                if (b.location === 'A') { mA += b.mass; countA++; }
                if (b.location === 'B') { mB += b.mass; countB++; }
            });

            state.massA = mA;
            state.massB = mB;
            state.blocksOnA = countA;
            state.blocksOnB = countB;
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (state.simulationRunning) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const blockMeshes = blocks.map(b => b.mesh);
            const interactables = [...blockMeshes, platformA, platformB];
            const intersects = raycaster.intersectObjects(interactables);

            if (intersects.length > 0) {
                const obj = intersects[0].object;

                if (blockMeshes.includes(obj)) {
                    // Select block
                    if (state.selectedBlock !== null) {
                        blocks[state.selectedBlock].mesh.material.emissive.setHex(0x000000);
                    }
                    const blockIndex = blocks.findIndex(b => b.mesh === obj);
                    state.selectedBlock = blockIndex;
                    obj.material.emissive.setHex(0x555500); // Yellow highlight
                } else if (obj === platformA || obj === platformB) {
                    // Move selected block to platform
                    if (state.selectedBlock !== null) {
                        const block = blocks[state.selectedBlock];
                        const targetPlat = obj === platformA ? 'A' : 'B';
                        
                        block.location = targetPlat;
                        obj.add(block.mesh);
                        
                        // Calculate stack height (offset slightly in Z to avoid clipping with Fox)
                        const blocksOnTarget = blocks.filter(b => b.location === targetPlat);
                        const stackIndex = blocksOnTarget.length - 1;
                        block.mesh.position.set(0, 0.05 + 0.2 + (stackIndex * 0.4), 0.2);

                        // Deselect
                        block.mesh.material.emissive.setHex(0x000000);
                        state.selectedBlock = null;
                        updateMasses();
                    }
                }
            } else {
                // Clicked empty space, deselect
                if (state.selectedBlock !== null) {
                    blocks[state.selectedBlock].mesh.material.emissive.setHex(0x000000);
                    state.selectedBlock = null;
                }
            }
        });

        // --- UI Controls ---
        document.getElementById('startBtn').addEventListener('click', () => {
            state.simulationRunning = true;
            if (state.selectedBlock !== null) {
                blocks[state.selectedBlock].mesh.material.emissive.setHex(0x000000);
                state.selectedBlock = null;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            state.simulationRunning = false;
            state.platformA_y = 4;
            state.platformB_y = 4;
            state.velocity = 0;
            state.acceleration = 0;
            
            platformA.position.y = 4;
            platformB.position.y = 4;
            updateRope();

            // Reset Fox
            state.foxOnPlatform = 'A';
            if (foxModel) {
                platformA.add(foxModel);
                foxModel.position.set(0, 0.05, 0);
            }

            // Reset Blocks
            blocks.forEach(b => {
                b.location = 'ground';
                scene.add(b.mesh);
                b.mesh.position.copy(b.initPos);
                b.mesh.material.emissive.setHex(0x000000);
            });
            state.selectedBlock = null;

            updateMasses();
        });

        document.getElementById('moveFoxBtn').addEventListener('click', () => {
            if (state.simulationRunning || !foxModel) return;
            
            if (state.foxOnPlatform === 'A') {
                state.foxOnPlatform = 'B';
                platformB.add(foxModel);
            } else {
                state.foxOnPlatform = 'A';
                platformA.add(foxModel);
            }
            foxModel.position.set(0, 0.05, 0);
            updateMasses();
        });

        // --- HUD Update ---
        function updateHUD() {
            document.getElementById('hud-state').innerText = state.simulationRunning ? 'Running' : 'Static';
            document.getElementById('hud-state').style.color = state.simulationRunning ? '#4CAF50' : '#f44336';
            document.getElementById('hud-massA').innerText = state.massA;
            document.getElementById('hud-massB').innerText = state.massB;
            document.getElementById('hud-posA').innerText = state.platformA_y.toFixed(2);
            document.getElementById('hud-posB').innerText = state.platformB_y.toFixed(2);
            document.getElementById('hud-vel').innerText = state.velocity.toFixed(3);
            document.getElementById('hud-acc').innerText = state.acceleration.toFixed(3);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 0.016) dt = 0.016; // Cap dt

            if (foxMixer) foxMixer.update(dt);

            if (state.simulationRunning) {
                const totalMass = state.massA + state.massB;
                if (totalMass > 0) {
                    // Atwood machine acceleration: a = (m1 - m2)g / (m1 + m2)
                    // Positive acceleration means A goes down
                    state.acceleration = ((state.massA - state.massB) * 9.8) / totalMass;
                    
                    state.velocity += state.acceleration * dt;
                    state.velocity *= 0.98; // Damping

                    state.platformA_y -= state.velocity * dt;

                    // Clamp positions
                    if (state.platformA_y < 1) {
                        state.platformA_y = 1;
                        state.velocity = 0;
                    } else if (state.platformA_y > 7) {
                        state.platformA_y = 7;
                        state.velocity = 0;
                    }

                    state.platformB_y = 8 - state.platformA_y;

                    platformA.position.y = state.platformA_y;
                    platformB.position.y = state.platformB_y;

                    updateRope();
                }
            }

            // Rotate pulleys based on velocity
            if (state.simulationRunning && Math.abs(state.velocity) > 0.001) {
                // v = r * w => w = v / r. r = 0.5
                const angularVel = state.velocity / 0.5;
                pulleyL.rotation.z -= angularVel * dt;
                pulleyR.rotation.z -= angularVel * dt;
            }

            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
