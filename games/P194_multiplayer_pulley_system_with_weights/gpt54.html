<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Multiplayer Pulley System with Weights</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #ffffffdd;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #fff;
    }

    #hud {
      position: absolute;
      top: 56px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      min-width: 250px;
      white-space: pre-line;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(255,255,255,0.85);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="startBtn">Start Simulation</button>
    <button id="resetBtn">Reset</button>
    <button id="moveFoxBtn">Move Fox</button>
  </div>

  <div id="hud"></div>
  <div id="info">
    Click a ground block to select it, then click Platform A or B to place it.<br>
    Placement is disabled while simulation is running.
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, clock;
    let ambientLight, dirLight;
    let ground;

    let platformA, platformB;
    let pulleyLeft, pulleyRight;
    let ropeLine;

    let fox = null;
    let foxMixer = null;
    let foxLoaded = false;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const startBtn = document.getElementById('startBtn');
    const resetBtn = document.getElementById('resetBtn');
    const moveFoxBtn = document.getElementById('moveFoxBtn');
    const hud = document.getElementById('hud');

    const g = 9.8;
    const TOTAL_ROPE_LENGTH = 16;
    const Y_MIN = 1;
    const Y_MAX = 7;
    const PLATFORM_X_A = -1.5;
    const PLATFORM_X_B = 1.5;

    const initialState = {
      platformA_y: 4,
      platformB_y: 4,
      velocity: 0,
      acceleration: 0,
      simulationRunning: false,
      foxOnPlatform: 'A',
      selectedBlock: null
    };

    const state = {
      platformA_y: initialState.platformA_y,
      platformB_y: initialState.platformB_y,
      velocity: initialState.velocity,
      acceleration: initialState.acceleration,
      simulationRunning: initialState.simulationRunning,
      foxOnPlatform: initialState.foxOnPlatform,
      selectedBlock: initialState.selectedBlock
    };

    const blocks = [];
    const PLATFORM_BLOCK_HEIGHT = 0.4;
    const FOX_MASS = 3;

    window.__3D_STATE__ = {
      platformA_y: 4,
      platformB_y: 4,
      massA: 3,
      massB: 0,
      velocity: 0,
      acceleration: 0,
      simulationRunning: false,
      foxOnPlatform: 'A',
      blocksOnA: 0,
      blocksOnB: 0,
      foxLoaded: false,
      selectedBlock: null
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x87CEEB);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 5, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 4, 0);
      controls.enableDamping = true;

      clock = new THREE.Clock();

      ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambientLight);

      dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      createGround();
      createFrameAndPulleys();
      createPlatforms();
      createBlocks();
      createRope();
      loadFox();

      updatePlatformVisuals();
      updateRope();
      updateAllBlockPositions();
      updateFoxPosition();
      updateHUD();
      syncState();

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('pointerdown', onPointerDown);

      startBtn.addEventListener('click', () => {
        state.simulationRunning = true;
      });

      resetBtn.addEventListener('click', resetSystem);

      moveFoxBtn.addEventListener('click', () => {
        if (state.foxOnPlatform === 'A') {
          state.foxOnPlatform = 'B';
        } else {
          state.foxOnPlatform = 'A';
        }
        updateFoxPosition();
        updateHUD();
        syncState();
      });
    }

    function createGround() {
      const geo = new THREE.PlaneGeometry(30, 30);
      const mat = new THREE.MeshPhongMaterial({ color: 0x8B7355 });
      ground = new THREE.Mesh(geo, mat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);
    }

    function createFrameAndPulleys() {
      const woodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
      const postGeo = new THREE.BoxGeometry(0.3, 8, 0.3);
      const beamGeo = new THREE.BoxGeometry(6.3, 0.3, 0.3);

      const leftPost = new THREE.Mesh(postGeo, woodMat);
      leftPost.position.set(-3, 4, 0);
      scene.add(leftPost);

      const rightPost = new THREE.Mesh(postGeo, woodMat);
      rightPost.position.set(3, 4, 0);
      scene.add(rightPost);

      const beam = new THREE.Mesh(beamGeo, woodMat);
      beam.position.set(0, 8, 0);
      scene.add(beam);

      const pulleyMat = new THREE.MeshPhongMaterial({ color: 0x888888 });
      const pulleyGeo = new THREE.TorusGeometry(0.5, 0.1, 16, 32);

      pulleyLeft = new THREE.Mesh(pulleyGeo, pulleyMat);
      pulleyLeft.position.set(-1.5, 8, 0);
      pulleyLeft.rotation.y = Math.PI / 2;
      scene.add(pulleyLeft);

      pulleyRight = new THREE.Mesh(pulleyGeo, pulleyMat);
      pulleyRight.position.set(1.5, 8, 0);
      pulleyRight.rotation.y = Math.PI / 2;
      scene.add(pulleyRight);
    }

    function createPlatforms() {
      const platGeo = new THREE.BoxGeometry(1, 0.1, 1);
      const platMat = new THREE.MeshPhongMaterial({ color: 0xDEB887 });

      platformA = new THREE.Mesh(platGeo, platMat.clone());
      platformA.position.set(PLATFORM_X_A, state.platformA_y, 0);
      platformA.userData.type = 'platform';
      platformA.userData.platform = 'A';
      scene.add(platformA);

      platformB = new THREE.Mesh(platGeo, platMat.clone());
      platformB.position.set(PLATFORM_X_B, state.platformB_y, 0);
      platformB.userData.type = 'platform';
      platformB.userData.platform = 'B';
      scene.add(platformB);
    }

    function createRope() {
      const ropeMat = new THREE.LineBasicMaterial({ color: 0x222222 });
      const points = [
        new THREE.Vector3(),
        new THREE.Vector3(),
        new THREE.Vector3(),
        new THREE.Vector3()
      ];
      const ropeGeo = new THREE.BufferGeometry().setFromPoints(points);
      ropeLine = new THREE.Line(ropeGeo, ropeMat);
      scene.add(ropeLine);
    }

    function updateRope() {
      const pts = [
        new THREE.Vector3(PLATFORM_X_A, state.platformA_y + 0.05, 0),
        new THREE.Vector3(-1.5, 8, 0),
        new THREE.Vector3(1.5, 8, 0),
        new THREE.Vector3(PLATFORM_X_B, state.platformB_y + 0.05, 0)
      ];
      ropeLine.geometry.setFromPoints(pts);
    }

    function createBlocks() {
      const defs = [
        { color: 0xff3333, mass: 1, pos: [-4.5, 0.2, 2.0] },
        { color: 0xff3333, mass: 1, pos: [-3.8, 0.2, 2.0] },
        { color: 0xff3333, mass: 1, pos: [-3.1, 0.2, 2.0] },
        { color: 0x3366ff, mass: 2, pos: [3.1, 0.2, 2.0] },
        { color: 0x3366ff, mass: 2, pos: [3.8, 0.2, 2.0] }
      ];

      const geo = new THREE.BoxGeometry(0.4, 0.4, 0.4);

      defs.forEach((d, i) => {
        const mat = new THREE.MeshPhongMaterial({ color: d.color });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(...d.pos);
        mesh.userData.type = 'block';
        mesh.userData.index = i;
        scene.add(mesh);

        blocks.push({
          mesh,
          mass: d.mass,
          color: d.color,
          initialPos: new THREE.Vector3(...d.pos),
          location: 'ground',
          platform: null
        });
      });
    }

    function loadFox() {
      const loader = new GLTFLoader();
      loader.load(
        'Fox.glb',
        (gltf) => {
          fox = gltf.scene;
          fox.scale.set(0.02, 0.02, 0.02);
          scene.add(fox);

          if (gltf.animations && gltf.animations.length > 0) {
            foxMixer = new THREE.AnimationMixer(fox);
            const action = foxMixer.clipAction(gltf.animations[0]);
            action.play();
          }

          foxLoaded = true;
          updateFoxPosition();
          syncState();
        },
        undefined,
        (err) => {
          console.warn('Fox.glb failed to load:', err);
          foxLoaded = false;
          syncState();
        }
      );
    }

    function computeMasses() {
      let massA = 0;
      let massB = 0;
      let blocksOnA = 0;
      let blocksOnB = 0;

      if (state.foxOnPlatform === 'A') massA += FOX_MASS;
      else massB += FOX_MASS;

      for (const block of blocks) {
        if (block.platform === 'A') {
          massA += block.mass;
          blocksOnA++;
        } else if (block.platform === 'B') {
          massB += block.mass;
          blocksOnB++;
        }
      }

      return { massA, massB, blocksOnA, blocksOnB };
    }

    function updatePhysics(dt) {
      const { massA, massB } = computeMasses();
      const totalMass = massA + massB;

      if (totalMass <= 0) {
        state.acceleration = 0;
        state.velocity = 0;
        return;
      }

      state.acceleration = ((massA - massB) * g) / totalMass;
      state.velocity += state.acceleration * dt;
      state.velocity *= 0.98;

      state.platformA_y -= state.velocity * dt;
      state.platformB_y += state.velocity * dt;

      if (state.platformA_y < Y_MIN) {
        state.platformA_y = Y_MIN;
        state.velocity = 0;
      }
      if (state.platformA_y > Y_MAX) {
        state.platformA_y = Y_MAX;
        state.velocity = 0;
      }

      const derivedB = 8 - state.platformA_y;
      state.platformB_y = THREE.MathUtils.clamp(derivedB, Y_MIN, Y_MAX);

      if (state.platformB_y <= Y_MIN || state.platformB_y >= Y_MAX) {
        state.velocity = 0;
      }

      const impliedRopeLength =
        (8 - state.platformA_y) +
        3 +
        (8 - state.platformB_y);

      const ropeError = TOTAL_ROPE_LENGTH - impliedRopeLength;
      if (Math.abs(ropeError) > 0.0001) {
        state.platformB_y = 8 - state.platformA_y;
      }
    }

    function updatePlatformVisuals() {
      platformA.position.set(PLATFORM_X_A, state.platformA_y, 0);
      platformB.position.set(PLATFORM_X_B, state.platformB_y, 0);
    }

    function getStackedBlockPosition(platformName, stackIndex) {
      const x = platformName === 'A' ? PLATFORM_X_A : PLATFORM_X_B;
      const y = (platformName === 'A' ? state.platformA_y : state.platformB_y) + 0.05 + 0.2 + stackIndex * PLATFORM_BLOCK_HEIGHT;
      const z = 0;
      return new THREE.Vector3(x, y, z);
    }

    function updateAllBlockPositions() {
      const blocksA = blocks.filter(b => b.platform === 'A');
      const blocksB = blocks.filter(b => b.platform === 'B');

      blocksA.forEach((block, i) => {
        const pos = getStackedBlockPosition('A', i);
        block.mesh.position.copy(pos);
      });

      blocksB.forEach((block, i) => {
        const pos = getStackedBlockPosition('B', i);
        block.mesh.position.copy(pos);
      });
    }

    function updateFoxPosition() {
      if (!fox) return;

      const blocksOnCurrent = blocks.filter(b => b.platform === state.foxOnPlatform).length;
      const x = state.foxOnPlatform === 'A' ? PLATFORM_X_A : PLATFORM_X_B;
      const platformY = state.foxOnPlatform === 'A' ? state.platformA_y : state.platformB_y;
      const y = platformY + 0.05 + 0.15 + blocksOnCurrent * PLATFORM_BLOCK_HEIGHT;
      fox.position.set(x, y, 0);

      fox.rotation.y = state.foxOnPlatform === 'A' ? Math.PI / 2 : -Math.PI / 2;
    }

    function onPointerDown(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const clickable = [platformA, platformB, ...blocks.map(b => b.mesh)];
      const intersects = raycaster.intersectObjects(clickable, false);

      if (intersects.length === 0) return;

      const obj = intersects[0].object;

      if (obj.userData.type === 'block') {
        if (state.simulationRunning) return;

        const idx = obj.userData.index;
        const block = blocks[idx];
        if (block.location === 'ground') {
          selectBlock(idx);
        }
        return;
      }

      if (obj.userData.type === 'platform') {
        if (state.simulationRunning) return;
        if (state.selectedBlock === null) return;

        placeSelectedBlockOnPlatform(obj.userData.platform);
      }
    }

    function selectBlock(index) {
      clearBlockHighlights();
      state.selectedBlock = index;
      blocks[index].mesh.material.emissive = new THREE.Color(0xffff00);
      blocks[index].mesh.material.emissiveIntensity = 0.7;
      syncState();
    }

    function clearBlockHighlights() {
      for (const block of blocks) {
        block.mesh.material.emissive = new THREE.Color(0x000000);
        block.mesh.material.emissiveIntensity = 0;
      }
    }

    function placeSelectedBlockOnPlatform(platformName) {
      const idx = state.selectedBlock;
      if (idx === null) return;

      const block = blocks[idx];
      block.location = 'platform';
      block.platform = platformName;

      clearBlockHighlights();
      state.selectedBlock = null;

      updateAllBlockPositions();
      updateFoxPosition();
      updateHUD();
      syncState();
    }

    function resetSystem() {
      state.platformA_y = initialState.platformA_y;
      state.platformB_y = initialState.platformB_y;
      state.velocity = 0;
      state.acceleration = 0;
      state.simulationRunning = false;
      state.foxOnPlatform = 'A';
      state.selectedBlock = null;

      blocks.forEach((block) => {
        block.location = 'ground';
        block.platform = null;
        block.mesh.position.copy(block.initialPos);
      });

      clearBlockHighlights();
      updatePlatformVisuals();
      updateRope();
      updateAllBlockPositions();
      updateFoxPosition();
      updateHUD();
      syncState();
    }

    function updateHUD() {
      const { massA, massB, blocksOnA, blocksOnB } = computeMasses();

      hud.textContent =
        `massA: ${massA.toFixed(2)}
massB: ${massB.toFixed(2)}
platformA_y: ${state.platformA_y.toFixed(3)}
platformB_y: ${state.platformB_y.toFixed(3)}
velocity: ${state.velocity.toFixed(3)}
acceleration: ${state.acceleration.toFixed(3)}
simulationRunning: ${state.simulationRunning}
foxOnPlatform: ${state.foxOnPlatform}
blocksOnA: ${blocksOnA}
blocksOnB: ${blocksOnB}
foxLoaded: ${foxLoaded}
selectedBlock: ${state.selectedBlock === null ? 'null' : state.selectedBlock}`;
    }

    function syncState() {
      const { massA, massB, blocksOnA, blocksOnB } = computeMasses();

      window.__3D_STATE__ = {
        platformA_y: state.platformA_y,
        platformB_y: state.platformB_y,
        massA,
        massB,
        velocity: state.velocity,
        acceleration: state.acceleration,
        simulationRunning: state.simulationRunning,
        foxOnPlatform: state.foxOnPlatform,
        blocksOnA,
        blocksOnB,
        foxLoaded,
        selectedBlock: state.selectedBlock
      };
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.016);

      if (foxMixer) foxMixer.update(dt);

      if (state.simulationRunning) {
        updatePhysics(dt);
      }

      updatePlatformVisuals();
      updateRope();
      updateAllBlockPositions();
      updateFoxPosition();
      updateHUD();
      syncState();

      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
