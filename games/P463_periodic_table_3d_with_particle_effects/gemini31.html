<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Periodic Table & Atom Visualizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            pointer-events: auto;
            background: rgba(20, 20, 40, 0.85);
            border: 1px solid #333366;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        #top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 280px;
            display: none;
        }
        #info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 24px;
            border-bottom: 1px solid #444477;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        #info-panel h2 span.symbol {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
        }
        #info-panel h2 span.z {
            font-size: 16px;
            color: #aaaaaa;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .info-label {
            color: #8888aa;
        }
        .info-value {
            font-weight: bold;
            text-align: right;
        }
        button {
            background: #4dabf7;
            color: #000;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background: #3bc9db;
        }
        select {
            background: #1a1a3a;
            color: #fff;
            border: 1px solid #444477;
            padding: 8px;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #8888aa;
            line-height: 1.6;
        }
        kbd {
            background: #333366;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
        #back-btn {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            width: auto;
            margin-top: 0;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-bar" class="panel">
            <label for="categoryFilter" style="font-size: 14px; color: #8888aa;">Filter:</label>
            <select id="categoryFilter">
                <option value="All">All Categories</option>
                <option value="Alkali Metals">Alkali Metals</option>
                <option value="Alkaline Earth">Alkaline Earth</option>
                <option value="Transition Metals">Transition Metals</option>
                <option value="Metalloids">Metalloids</option>
                <option value="Nonmetals">Nonmetals</option>
                <option value="Noble Gases">Noble Gases</option>
                <option value="Halogens">Halogens</option>
                <option value="Other Metals">Other Metals</option>
            </select>
        </div>

        <button id="back-btn" class="panel">← Back to Table</button>

        <div id="info-panel" class="panel">
            <h2><span class="symbol" id="el-sym">H</span> <span class="z" id="el-z">1</span></h2>
            <div class="info-row"><span class="info-label">Name</span><span class="info-value" id="el-name">Hydrogen</span></div>
            <div class="info-row"><span class="info-label">Atomic Mass</span><span class="info-value" id="el-mass">1.008</span></div>
            <div class="info-row"><span class="info-label">Category</span><span class="info-value" id="el-cat">Nonmetals</span></div>
            <div class="info-row"><span class="info-label">Electron Config</span><span class="info-value" id="el-conf">1</span></div>
            <button id="show-atom-btn">Show Atom</button>
        </div>

        <div id="controls-help" class="panel">
            <strong>Controls:</strong><br>
            <kbd>Left Click</kbd> Select Element / Rotate Camera<br>
            <kbd>Scroll</kbd> Zoom<br>
            <kbd>R</kbd> Reset Camera<br>
            <kbd>T</kbd> Toggle Table Rotation<br>
            <kbd>P</kbd> Toggle Particle Trails (Atom View)<br>
            <kbd>1</kbd>-<kbd>4</kbd> Highlight Shell (Atom View)
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            selectedElement: null,
            viewMode: 'table', // 'table' | 'atom'
            tableRotating: false,
            categoryFilter: 'All',
            visibleElementCount: 36,
            atomData: null,
            electronAnimating: false,
            particleTrailsVisible: true,
            highlightedShell: 0,
            cameraPosition: {x: 0, y: 5, z: 30},
            totalElements: 36,
            frameCount: 0
        };

        // --- Element Data (First 36 Elements) ---
        const elementsData = [
            { z: 1, sym: 'H', name: 'Hydrogen', mass: 1.008, cat: 'Nonmetals', c: 1, r: 1, e: [1], p: 1, n: 0 },
            { z: 2, sym: 'He', name: 'Helium', mass: 4.002, cat: 'Noble Gases', c: 18, r: 1, e: [2], p: 2, n: 2 },
            { z: 3, sym: 'Li', name: 'Lithium', mass: 6.94, cat: 'Alkali Metals', c: 1, r: 2, e: [2, 1], p: 3, n: 4 },
            { z: 4, sym: 'Be', name: 'Beryllium', mass: 9.012, cat: 'Alkaline Earth', c: 2, r: 2, e: [2, 2], p: 4, n: 5 },
            { z: 5, sym: 'B', name: 'Boron', mass: 10.81, cat: 'Metalloids', c: 13, r: 2, e: [2, 3], p: 5, n: 6 },
            { z: 6, sym: 'C', name: 'Carbon', mass: 12.011, cat: 'Nonmetals', c: 14, r: 2, e: [2, 4], p: 6, n: 6 },
            { z: 7, sym: 'N', name: 'Nitrogen', mass: 14.007, cat: 'Nonmetals', c: 15, r: 2, e: [2, 5], p: 7, n: 7 },
            { z: 8, sym: 'O', name: 'Oxygen', mass: 15.999, cat: 'Nonmetals', c: 16, r: 2, e: [2, 6], p: 8, n: 8 },
            { z: 9, sym: 'F', name: 'Fluorine', mass: 18.998, cat: 'Halogens', c: 17, r: 2, e: [2, 7], p: 9, n: 10 },
            { z: 10, sym: 'Ne', name: 'Neon', mass: 20.180, cat: 'Noble Gases', c: 18, r: 2, e: [2, 8], p: 10, n: 10 },
            { z: 11, sym: 'Na', name: 'Sodium', mass: 22.990, cat: 'Alkali Metals', c: 1, r: 3, e: [2, 8, 1], p: 11, n: 12 },
            { z: 12, sym: 'Mg', name: 'Magnesium', mass: 24.305, cat: 'Alkaline Earth', c: 2, r: 3, e: [2, 8, 2], p: 12, n: 12 },
            { z: 13, sym: 'Al', name: 'Aluminum', mass: 26.982, cat: 'Other Metals', c: 13, r: 3, e: [2, 8, 3], p: 13, n: 14 },
            { z: 14, sym: 'Si', name: 'Silicon', mass: 28.085, cat: 'Metalloids', c: 14, r: 3, e: [2, 8, 4], p: 14, n: 14 },
            { z: 15, sym: 'P', name: 'Phosphorus', mass: 30.974, cat: 'Nonmetals', c: 15, r: 3, e: [2, 8, 5], p: 15, n: 16 },
            { z: 16, sym: 'S', name: 'Sulfur', mass: 32.06, cat: 'Nonmetals', c: 16, r: 3, e: [2, 8, 6], p: 16, n: 16 },
            { z: 17, sym: 'Cl', name: 'Chlorine', mass: 35.45, cat: 'Halogens', c: 17, r: 3, e: [2, 8, 7], p: 17, n: 18 },
            { z: 18, sym: 'Ar', name: 'Argon', mass: 39.95, cat: 'Noble Gases', c: 18, r: 3, e: [2, 8, 8], p: 18, n: 22 },
            { z: 19, sym: 'K', name: 'Potassium', mass: 39.098, cat: 'Alkali Metals', c: 1, r: 4, e: [2, 8, 8, 1], p: 19, n: 20 },
            { z: 20, sym: 'Ca', name: 'Calcium', mass: 40.078, cat: 'Alkaline Earth', c: 2, r: 4, e: [2, 8, 8, 2], p: 20, n: 20 },
            { z: 21, sym: 'Sc', name: 'Scandium', mass: 44.956, cat: 'Transition Metals', c: 3, r: 4, e: [2, 8, 9, 2], p: 21, n: 24 },
            { z: 22, sym: 'Ti', name: 'Titanium', mass: 47.867, cat: 'Transition Metals', c: 4, r: 4, e: [2, 8, 10, 2], p: 22, n: 26 },
            { z: 23, sym: 'V', name: 'Vanadium', mass: 50.942, cat: 'Transition Metals', c: 5, r: 4, e: [2, 8, 11, 2], p: 23, n: 28 },
            { z: 24, sym: 'Cr', name: 'Chromium', mass: 51.996, cat: 'Transition Metals', c: 6, r: 4, e: [2, 8, 13, 1], p: 24, n: 28 },
            { z: 25, sym: 'Mn', name: 'Manganese', mass: 54.938, cat: 'Transition Metals', c: 7, r: 4, e: [2, 8, 13, 2], p: 25, n: 30 },
            { z: 26, sym: 'Fe', name: 'Iron', mass: 55.845, cat: 'Transition Metals', c: 8, r: 4, e: [2, 8, 14, 2], p: 26, n: 30 },
            { z: 27, sym: 'Co', name: 'Cobalt', mass: 58.933, cat: 'Transition Metals', c: 9, r: 4, e: [2, 8, 15, 2], p: 27, n: 32 },
            { z: 28, sym: 'Ni', name: 'Nickel', mass: 58.693, cat: 'Transition Metals', c: 10, r: 4, e: [2, 8, 16, 2], p: 28, n: 31 },
            { z: 29, sym: 'Cu', name: 'Copper', mass: 63.546, cat: 'Transition Metals', c: 11, r: 4, e: [2, 8, 18, 1], p: 29, n: 35 },
            { z: 30, sym: 'Zn', name: 'Zinc', mass: 65.38, cat: 'Transition Metals', c: 12, r: 4, e: [2, 8, 18, 2], p: 30, n: 35 },
            { z: 31, sym: 'Ga', name: 'Gallium', mass: 69.723, cat: 'Other Metals', c: 13, r: 4, e: [2, 8, 18, 3], p: 31, n: 39 },
            { z: 32, sym: 'Ge', name: 'Germanium', mass: 72.630, cat: 'Metalloids', c: 14, r: 4, e: [2, 8, 18, 4], p: 32, n: 41 },
            { z: 33, sym: 'As', name: 'Arsenic', mass: 74.922, cat: 'Metalloids', c: 15, r: 4, e: [2, 8, 18, 5], p: 33, n: 42 },
            { z: 34, sym: 'Se', name: 'Selenium', mass: 78.971, cat: 'Nonmetals', c: 16, r: 4, e: [2, 8, 18, 6], p: 34, n: 45 },
            { z: 35, sym: 'Br', name: 'Bromine', mass: 79.904, cat: 'Halogens', c: 17, r: 4, e: [2, 8, 18, 7], p: 35, n: 45 },
            { z: 36, sym: 'Kr', name: 'Krypton', mass: 83.798, cat: 'Noble Gases', c: 18, r: 4, e: [2, 8, 18, 8], p: 36, n: 48 }
        ];

        const categoryColors = {
            'Alkali Metals': 0xff6b6b,
            'Alkaline Earth': 0xffa94d,
            'Transition Metals': 0x74c0fc,
            'Metalloids': 0xa9e34b,
            'Nonmetals': 0x69db7c,
            'Noble Gases': 0xda77f2,
            'Halogens': 0xffd43b,
            'Other Metals': 0x4dabf7
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 30);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(10, 10, 10);
        scene.add(dirLight1);
        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight2.position.set(-10, 5, -10);
        scene.add(dirLight2);

        // --- Periodic Table Generation ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);
        const elementBoxes = [];

        function createSymbolTexture(symbol) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 64px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(symbol, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        const boxGeo = new THREE.BoxGeometry(0.8, 0.8, 0.2);

        elementsData.forEach(data => {
            const texture = createSymbolTexture(data.sym);
            const material = new THREE.MeshStandardMaterial({
                color: categoryColors[data.cat],
                map: texture,
                roughness: 0.4,
                metalness: 0.2
            });
            const mesh = new THREE.Mesh(boxGeo, material);
            
            // Center grid around origin
            mesh.position.x = (data.c - 9.5) * 1.1;
            mesh.position.y = -(data.r - 2.5) * 1.1;
            mesh.position.z = 0;
            
            mesh.userData = data;
            tableGroup.add(mesh);
            elementBoxes.push(mesh);
        });

        // --- Atom Visualization ---
        const atomGroup = new THREE.Group();
        atomGroup.visible = false;
        scene.add(atomGroup);
        
        const trailsGroup = new THREE.Group();
        atomGroup.add(trailsGroup);
        
        let activeElectrons = [];
        const shellRadii = [2, 3.5, 5, 6.5];

        function createAtom(data) {
            // Clear previous
            while(atomGroup.children.length > 1) {
                const child = atomGroup.children[atomGroup.children.length-1];
                if(child !== trailsGroup) atomGroup.remove(child);
            }
            while(trailsGroup.children.length > 0) trailsGroup.remove(trailsGroup.children[0]);
            activeElectrons = [];

            // Nucleus
            const nucleusGroup = new THREE.Group();
            const protonGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const neutronGeo = new THREE.SphereGeometry(0.08, 16, 16);
            const protonMat = new THREE.MeshPhongMaterial({color: 0xff0000});
            const neutronMat = new THREE.MeshPhongMaterial({color: 0x0000ff});

            const setRandomPos = (mesh) => {
                const r = Math.random() * 0.5;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                mesh.position.set(
                    r * Math.sin(phi) * Math.cos(theta),
                    r * Math.sin(phi) * Math.sin(theta),
                    r * Math.cos(phi)
                );
            };

            for(let i=0; i<data.p; i++) {
                const p = new THREE.Mesh(protonGeo, protonMat);
                setRandomPos(p);
                nucleusGroup.add(p);
            }
            for(let i=0; i<data.n; i++) {
                const n = new THREE.Mesh(neutronGeo, neutronMat);
                setRandomPos(n);
                nucleusGroup.add(n);
            }
            atomGroup.add(nucleusGroup);

            // Electrons & Trails
            const electronGeo = new THREE.SphereGeometry(0.06, 16, 16);
            
            data.e.forEach((count, shellIdx) => {
                const radius = shellRadii[shellIdx];
                
                // Trail Ring
                const trailGeo = new THREE.TorusGeometry(radius, 0.015, 8, 64);
                const trailMat = new THREE.MeshBasicMaterial({
                    color: 0x00ff00, 
                    transparent: true, 
                    opacity: 0.3,
                    side: THREE.DoubleSide
                });
                const trail = new THREE.Mesh(trailGeo, trailMat);
                trail.rotation.x = Math.PI / 2;
                trailsGroup.add(trail);

                // Electrons
                for(let i=0; i<count; i++) {
                    const elMat = new THREE.MeshPhongMaterial({
                        color: 0x00ff00, 
                        emissive: 0x00ff00, 
                        emissiveIntensity: 0.5,
                        transparent: true,
                        opacity: 1
                    });
                    const el = new THREE.Mesh(electronGeo, elMat);
                    const angle = (i / count) * Math.PI * 2 + Math.random();
                    
                    el.position.set(Math.cos(angle)*radius, 0, Math.sin(angle)*radius);
                    atomGroup.add(el);
                    
                    activeElectrons.push({
                        mesh: el,
                        shell: shellIdx + 1,
                        angle: angle,
                        radius: radius,
                        speed: 0.04 * (1 / radius)
                    });
                }
            });

            window.__3D_STATE__.atomData = { protons: data.p, neutrons: data.n, electrons: data.z, shells: data.e.length };
            window.__3D_STATE__.electronAnimating = true;
            updateShellHighlight();
        }

        function updateShellHighlight() {
            const target = window.__3D_STATE__.highlightedShell;
            activeElectrons.forEach(el => {
                if (target === 0 || el.shell === target) {
                    el.mesh.material.opacity = 1;
                } else {
                    el.mesh.material.opacity = 0.2;
                }
            });
            trailsGroup.children.forEach((trail, idx) => {
                if (target === 0 || (idx + 1) === target) {
                    trail.material.opacity = 0.3;
                } else {
                    trail.material.opacity = 0.05;
                }
            });
        }

        // --- Interaction & Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('pointerdown', (e) => {
            if (window.__3D_STATE__.viewMode !== 'table') return;
            if (e.target.closest('.panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(elementBoxes);
            if (intersects.length > 0 && intersects[0].object.visible) {
                if (selectedMesh) selectedMesh.material.emissive.setHex(0x000000);
                selectedMesh = intersects[0].object;
                selectedMesh.material.emissive.setHex(0x444444);

                const data = selectedMesh.userData;
                window.__3D_STATE__.selectedElement = {
                    symbol: data.sym, atomicNumber: data.z, name: data.name, category: data.cat
                };
                
                document.getElementById('info-panel').style.display = 'block';
                document.getElementById('el-sym').innerText = data.sym;
                document.getElementById('el-z').innerText = data.z;
                document.getElementById('el-name').innerText = data.name;
                document.getElementById('el-mass').innerText = data.mass;
                document.getElementById('el-cat').innerText = data.cat;
                document.getElementById('el-conf').innerText = data.e.join(', ');
            }
        });

        // --- UI Event Listeners ---
        document.getElementById('categoryFilter').addEventListener('change', (e) => {
            const cat = e.target.value;
            window.__3D_STATE__.categoryFilter = cat;
            let count = 0;
            elementBoxes.forEach(box => {
                if (cat === 'All' || box.userData.cat === cat) {
                    box.visible = true;
                    count++;
                } else {
                    box.visible = false;
                }
            });
            window.__3D_STATE__.visibleElementCount = count;
        });

        document.getElementById('show-atom-btn').addEventListener('click', () => {
            if(!selectedMesh) return;
            window.__3D_STATE__.viewMode = 'atom';
            tableGroup.visible = false;
            atomGroup.visible = true;
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('back-btn').style.display = 'block';
            createAtom(selectedMesh.userData);
            
            // Adjust camera for atom view
            camera.position.set(0, 8, 15);
            controls.target.set(0,0,0);
        });

        document.getElementById('back-btn').addEventListener('click', () => {
            window.__3D_STATE__.viewMode = 'table';
            window.__3D_STATE__.electronAnimating = false;
            tableGroup.visible = true;
            atomGroup.visible = false;
            document.getElementById('top-bar').style.display = 'flex';
            document.getElementById('back-btn').style.display = 'none';
            
            camera.position.set(0, 5, 30);
            controls.target.set(0,0,0);
        });

        // --- Keyboard Interactions ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'r') {
                camera.position.set(0, 5, 30);
                controls.target.set(0,0,0);
            }
            if (key === 't') {
                window.__3D_STATE__.tableRotating = !window.__3D_STATE__.tableRotating;
            }
            if (key === 'p' && window.__3D_STATE__.viewMode === 'atom') {
                window.__3D_STATE__.particleTrailsVisible = !window.__3D_STATE__.particleTrailsVisible;
                trailsGroup.visible = window.__3D_STATE__.particleTrailsVisible;
            }
            if (['1','2','3','4'].includes(key) && window.__3D_STATE__.viewMode === 'atom') {
                const shell = parseInt(key);
                window.__3D_STATE__.highlightedShell = window.__3D_STATE__.highlightedShell === shell ? 0 : shell;
                updateShellHighlight();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            window.__3D_STATE__.frameCount++;
            window.__3D_STATE__.cameraPosition = {x: camera.position.x, y: camera.position.y, z: camera.position.z};

            if (window.__3D_STATE__.viewMode === 'table' && window.__3D_STATE__.tableRotating) {
                tableGroup.rotation.y += 0.005;
            }

            if (window.__3D_STATE__.viewMode === 'atom' && window.__3D_STATE__.electronAnimating) {
                activeElectrons.forEach(elData => {
                    elData.angle -= elData.speed;
                    elData.mesh.position.x = Math.cos(elData.angle) * elData.radius;
                    elData.mesh.position.z = Math.sin(elData.angle) * elData.radius;
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
