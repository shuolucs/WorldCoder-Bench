<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#controls {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
}

#categoryFilter {
    padding: 8px 12px;
    background: rgba(20, 20, 40, 0.9);
    color: #fff;
    border: 1px solid #444;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
}

#infoPanel {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 280px;
    background: rgba(15, 15, 35, 0.95);
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 10px;
    padding: 20px;
    color: #fff;
    z-index: 10;
    display: none;
    backdrop-filter: blur(10px);
}

#infoPanel h2 {
    font-size: 28px;
    margin-bottom: 5px;
    color: #74c0fc;
}

#infoPanel .element-name {
    font-size: 18px;
    color: #aaa;
    margin-bottom: 15px;
}

#infoPanel .info-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 14px;
}

#infoPanel .info-row .label {
    color: #888;
}

#infoPanel .info-row .value {
    color: #ddd;
}

#infoPanel button {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    background: linear-gradient(135deg, #4a6cf7, #6b4cf7);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
}

#infoPanel button:hover {
    background: linear-gradient(135deg, #5b7df8, #7c5df8);
    transform: translateY(-1px);
}

#backBtn {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    background: linear-gradient(135deg, #f74a4a, #f74a8a);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
    z-index: 10;
    display: none;
}

#backBtn:hover {
    background: linear-gradient(135deg, #f85b5b, #f85b9b);
}

#instructions {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    z-index: 10;
    text-align: center;
}
</style>
</head>
<body>

<div id="controls">
    <select id="categoryFilter">
        <option value="All">All Elements</option>
        <option value="Alkali Metals">Alkali Metals</option>
        <option value="Alkaline Earth">Alkaline Earth</option>
        <option value="Transition Metals">Transition Metals</option>
        <option value="Metalloids">Metalloids</option>
        <option value="Nonmetals">Nonmetals</option>
        <option value="Noble Gases">Noble Gases</option>
        <option value="Halogens">Halogens</option>
        <option value="Other Metals">Other Metals</option>
    </select>
</div>

<div id="infoPanel">
    <h2 id="infoSymbol">H</h2>
    <div class="element-name" id="infoName">Hydrogen</div>
    <div class="info-row"><span class="label">Atomic Number</span><span class="value" id="infoNumber">1</span></div>
    <div class="info-row"><span class="label">Atomic Mass</span><span class="value" id="infoMass">1.008</span></div>
    <div class="info-row"><span class="label">Category</span><span class="value" id="infoCategory">Nonmetal</span></div>
    <div class="info-row"><span class="label">Electron Config</span><span class="value" id="infoElectron">1</span></div>
    <button id="showAtomBtn">Show Atom</button>
</div>

<button id="backBtn">← Back to Table</button>

<div id="instructions">
    R: Reset Camera | T: Toggle Rotation | P: Toggle Trails | 1-4: Highlight Shell | Click: Select Element
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// Element Data for first 36 elements
const elements = [
    { symbol: "H", name: "Hydrogen", atomicNumber: 1, atomicMass: 1.008, category: "Nonmetals", electronConfig: [1], protons: 1, neutrons: 0, row: 0, col: 0 },
    { symbol: "He", name: "Helium", atomicNumber: 2, atomicMass: 4.003, category: "Noble Gases", electronConfig: [2], protons: 2, neutrons: 2, row: 0, col: 17 },
    { symbol: "Li", name: "Lithium", atomicNumber: 3, atomicMass: 6.941, category: "Alkali Metals", electronConfig: [2,1], protons: 3, neutrons: 4, row: 1, col: 0 },
    { symbol: "Be", name: "Beryllium", atomicNumber: 4, atomicMass: 9.012, category: "Alkaline Earth", electronConfig: [2,2], protons: 4, neutrons: 5, row: 1, col: 1 },
    { symbol: "B", name: "Boron", atomicNumber: 5, atomicMass: 10.81, category: "Metalloids", electronConfig: [2,3], protons: 5, neutrons: 6, row: 1, col: 12 },
    { symbol: "C", name: "Carbon", atomicNumber: 6, atomicMass: 12.01, category: "Nonmetals", electronConfig: [2,4], protons: 6, neutrons: 6, row: 1, col: 13 },
    { symbol: "N", name: "Nitrogen", atomicNumber: 7, atomicMass: 14.01, category: "Nonmetals", electronConfig: [2,5], protons: 7, neutrons: 7, row: 1, col: 14 },
    { symbol: "O", name: "Oxygen", atomicNumber: 8, atomicMass: 16.00, category: "Nonmetals", electronConfig: [2,6], protons: 8, neutrons: 8, row: 1, col: 15 },
    { symbol: "F", name: "Fluorine", atomicNumber: 9, atomicMass: 19.00, category: "Halogens", electronConfig: [2,7], protons: 9, neutrons: 10, row: 1, col: 16 },
    { symbol: "Ne", name: "Neon", atomicNumber: 10, atomicMass: 20.18, category: "Noble Gases", electronConfig: [2,8], protons: 10, neutrons: 10, row: 1, col: 17 },
    { symbol: "Na", name: "Sodium", atomicNumber: 11, atomicMass: 22.99, category: "Alkali Metals", electronConfig: [2,8,1], protons: 11, neutrons: 12, row: 2, col: 0 },
    { symbol: "Mg", name: "Magnesium", atomicNumber: 12, atomicMass: 24.31, category: "Alkaline Earth", electronConfig: [2,8,2], protons: 12, neutrons: 12, row: 2, col: 1 },
    { symbol: "Al", name: "Aluminium", atomicNumber: 13, atomicMass: 26.98, category: "Other Metals", electronConfig: [2,8,3], protons: 13, neutrons: 14, row: 2, col: 12 },
    { symbol: "Si", name: "Silicon", atomicNumber: 14, atomicMass: 28.09, category: "Metalloids", electronConfig: [2,8,4], protons: 14, neutrons: 14, row: 2, col: 13 },
    { symbol: "P", name: "Phosphorus", atomicNumber: 15, atomicMass: 30.97, category: "Nonmetals", electronConfig: [2,8,5], protons: 15, neutrons: 16, row: 2, col: 14 },
    { symbol: "S", name: "Sulfur", atomicNumber: 16, atomicMass: 32.07, category: "Nonmetals", electronConfig: [2,8,6], protons: 16, neutrons: 16, row: 2, col: 15 },
    { symbol: "Cl", name: "Chlorine", atomicNumber: 17, atomicMass: 35.45, category: "Halogens", electronConfig: [2,8,7], protons: 17, neutrons: 18, row: 2, col: 16 },
    { symbol: "Ar", name: "Argon", atomicNumber: 18, atomicMass: 39.95, category: "Noble Gases", electronConfig: [2,8,8], protons: 18, neutrons: 22, row: 2, col: 17 },
    { symbol: "K", name: "Potassium", atomicNumber: 19, atomicMass: 39.10, category: "Alkali Metals", electronConfig: [2,8,8,1], protons: 19, neutrons: 20, row: 3, col: 0 },
    { symbol: "Ca", name: "Calcium", atomicNumber: 20, atomicMass: 40.08, category: "Alkaline Earth", electronConfig: [2,8,8,2], protons: 20, neutrons: 20, row: 3, col: 1 },
    { symbol: "Sc", name: "Scandium", atomicNumber: 21, atomicMass: 44.96, category: "Transition Metals", electronConfig: [2,8,9,2], protons: 21, neutrons: 24, row: 3, col: 2 },
    { symbol: "Ti", name: "Titanium", atomicNumber: 22, atomicMass: 47.87, category: "Transition Metals", electronConfig: [2,8,10,2], protons: 22, neutrons: 26, row: 3, col: 3 },
    { symbol: "V", name: "Vanadium", atomicNumber: 23, atomicMass: 50.94, category: "Transition Metals", electronConfig: [2,8,11,2], protons: 23, neutrons: 28, row: 3, col: 4 },
    { symbol: "Cr", name: "Chromium", atomicNumber: 24, atomicMass: 52.00, category: "Transition Metals", electronConfig: [2,8,13,1], protons: 24, neutrons: 28, row: 3, col: 5 },
    { symbol: "Mn", name: "Manganese", atomicNumber: 25, atomicMass: 54.94, category: "Transition Metals", electronConfig: [2,8,13,2], protons: 25, neutrons: 30, row: 3, col: 6 },
    { symbol: "Fe", name: "Iron", atomicNumber: 26, atomicMass: 55.85, category: "Transition Metals", electronConfig: [2,8,14,2], protons: 26, neutrons: 30, row: 3, col: 7 },
    { symbol: "Co", name: "Cobalt", atomicNumber: 27, atomicMass: 58.93, category: "Transition Metals", electronConfig: [2,8,15,2], protons: 27, neutrons: 32, row: 3, col: 8 },
    { symbol: "Ni", name: "Nickel", atomicNumber: 28, atomicMass: 58.69, category: "Transition Metals", electronConfig: [2,8,16,2], protons: 28, neutrons: 30, row: 3, col: 9 },
    { symbol: "Cu", name: "Copper", atomicNumber: 29, atomicMass: 63.55, category: "Transition Metals", electronConfig: [2,8,18,1], protons: 29, neutrons: 34, row: 3, col: 10 },
    { symbol: "Zn", name: "Zinc", atomicNumber: 30, atomicMass: 65.38, category: "Transition Metals", electronConfig: [2,8,18,2], protons: 30, neutrons: 35, row: 3, col: 11 },
    { symbol: "Ga", name: "Gallium", atomicNumber: 31, atomicMass: 69.72, category: "Other Metals", electronConfig: [2,8,18,3], protons: 31, neutrons: 38, row: 3, col: 12 },
    { symbol: "Ge", name: "Germanium", atomicNumber: 32, atomicMass: 72.63, category: "Metalloids", electronConfig: [2,8,18,4], protons: 32, neutrons: 41, row: 3, col: 13 },
    { symbol: "As", name: "Arsenic", atomicNumber: 33, atomicMass: 74.92, category: "Metalloids", electronConfig: [2,8,18,5], protons: 33, neutrons: 42, row: 3, col: 14 },
    { symbol: "Se", name: "Selenium", atomicNumber: 34, atomicMass: 78.97, category: "Nonmetals", electronConfig: [2,8,18,6], protons: 34, neutrons: 45, row: 3, col: 15 },
    { symbol: "Br", name: "Bromine", atomicNumber: 35, atomicMass: 79.90, category: "Halogens", electronConfig: [2,8,18,7], protons: 35, neutrons: 45, row: 3, col: 16 },
    { symbol: "Kr", name: "Krypton", atomicNumber: 36, atomicMass: 83.80, category: "Noble Gases", electronConfig: [2,8,18,8], protons: 36, neutrons: 48, row: 3, col: 17 },
];

const categoryColors = {
    "Alkali Metals": '#ff6b6b',
    "Alkaline Earth": '#ffa94d',
    "Transition Metals": '#74c0fc',
    "Metalloids": '#a9e34b',
    "Nonmetals": '#69db7c',
    "Noble Gases": '#da77f2',
    "Halogens": '#ffd43b',
    "Other Metals": '#4dabf7'
};

// State
window.__3D_STATE__ = {
    selectedElement: null,
    viewMode: 'table',
    tableRotating: false,
    categoryFilter: 'All',
    visibleElementCount: 36,
    atomData: null,
    electronAnimating: false,
    particleTrailsVisible: true,
    highlightedShell: 0,
    cameraPosition: { x: 0, y: 5, z: 30 },
    totalElements: 36,
    frameCount: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(10, 10, 10);
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
dirLight2.position.set(-10, 5, -10);
scene.add(dirLight2);

// Groups
const tableGroup = new THREE.Group();
scene.add(tableGroup);

const atomGroup = new THREE.Group();
atomGroup.visible = false;
scene.add(atomGroup);

// Create element texture
function createElementTexture(symbol, atomicNumber, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 128, 128);

    // Darker border
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, 124, 124);

    // Atomic number
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(atomicNumber.toString(), 8, 24);

    // Symbol
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbol, 64, 70);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

// Element meshes
const elementMeshes = [];
const elementDataMap = new Map();

// Table offset to center
const tableOffsetX = -17 * 1.1 / 2;
const tableOffsetY = 3 * 1.1 / 2;

elements.forEach((el) => {
    const color = categoryColors[el.category] || '#888888';
    const texture = createElementTexture(el.symbol, el.atomicNumber, color);

    const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.2);
    const materials = [
        new THREE.MeshPhongMaterial({ color: new THREE.Color(color).multiplyScalar(0.7) }),
        new THREE.MeshPhongMaterial({ color: new THREE.Color(color).multiplyScalar(0.7) }),
        new THREE.MeshPhongMaterial({ color: new THREE.Color(color).multiplyScalar(0.7) }),
        new THREE.MeshPhongMaterial({ color: new THREE.Color(color).multiplyScalar(0.7) }),
        new THREE.MeshPhongMaterial({ map: texture }),
        new THREE.MeshPhongMaterial({ map: texture }),
    ];

    const mesh = new THREE.Mesh(geometry, materials);
    mesh.position.set(
        el.col * 1.1 + tableOffsetX,
        -el.row * 1.1 + tableOffsetY,
        0
    );
    mesh.userData = el;
    tableGroup.add(mesh);
    elementMeshes.push(mesh);
    elementDataMap.set(mesh.id, el);
});

// Raycaster for selection
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;

function onMouseClick(event) {
    if (window.__3D_STATE__.viewMode !== 'table') return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(elementMeshes);

    if (intersects.length > 0) {
        const mesh = intersects[0].object;
        if (!mesh.visible) return;
        selectElement(mesh);
    }
}

function selectElement(mesh) {
    // Deselect previous
    if (selectedMesh) {
        selectedMesh.scale.set(1, 1, 1);
        const prevData = selectedMesh.userData;
        const prevColor = categoryColors[prevData.category];
        selectedMesh.material.forEach((mat, i) => {
            if (i < 4) mat.emissive.setHex(0x000000);
        });
    }

    selectedMesh = mesh;
    const el = mesh.userData;

    // Highlight
    mesh.scale.set(1.15, 1.15, 1.15);
    mesh.material.forEach((mat, i) => {
        if (i < 4) {
            mat.emissive.set(categoryColors[el.category]);
            mat.emissiveIntensity = 0.3;
        }
    });

    // Update state
    window.__3D_STATE__.selectedElement = {
        symbol: el.symbol,
        atomicNumber: el.atomicNumber,
        name: el.name,
        category: el.category
    };

    // Update info panel
    document.getElementById('infoSymbol').textContent = el.symbol;
    document.getElementById('infoName').textContent = el.name;
    document.getElementById('infoNumber').textContent = el.atomicNumber;
    document.getElementById('infoMass').textContent = el.atomicMass;
    document.getElementById('infoCategory').textContent = el.category;
    document.getElementById('infoElectron').textContent = el.electronConfig.join(', ');
    document.getElementById('infoPanel').style.display = 'block';
    document.getElementById('infoSymbol').style.color = categoryColors[el.category];
}

renderer.domElement.addEventListener('click', onMouseClick);

// Show Atom
const electronMeshes = [];
const electronTrails = [];
const shellRadii = [2, 3.5, 5, 6.5];

function showAtom() {
    const el = selectedMesh ? selectedMesh.userData : null;
    if (!el) return;

    window.__3D_STATE__.viewMode = 'atom';
    tableGroup.visible = false;
    atomGroup.visible = true;
    document.getElementById('backBtn').style.display = 'block';
    document.getElementById('infoPanel').style.display = 'none';
    document.getElementById('controls').style.display = 'none';

    // Clear previous atom
    while (atomGroup.children.length > 0) {
        const child = atomGroup.children[0];
        atomGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
    }
    electronMeshes.length = 0;
    electronTrails.length = 0;

    // Nucleus
    const nucleusGroup = new THREE.Group();
    const protonGeo = new THREE.SphereGeometry(0.12, 12, 12);
    const protonMat = new THREE.MeshPhongMaterial({ color: 0xff3333, emissive: 0x441111 });
    const neutronMat = new THREE.MeshPhongMaterial({ color: 0x3333ff, emissive: 0x111144 });

    const totalNucleons = Math.min(el.protons + el.neutrons, 80);
    for (let i = 0; i < Math.min(el.protons, 40); i++) {
        const p = new THREE.Mesh(protonGeo, protonMat);
        const r = 0.5 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        p.position.set(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta),
            r * Math.cos(phi)
        );
        nucleusGroup.add(p);
    }

    for (let i = 0; i < Math.min(el.neutrons, 40); i++) {
        const n = new THREE.Mesh(protonGeo, neutronMat);
        const r = 0.5 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        n.position.set(
            r * Math.sin(phi) * Math.cos(theta),
            r * Math.sin(phi) * Math.sin(theta),
            r * Math.cos(phi)
        );
        nucleusGroup.add(n);
    }

    // Nucleus glow
    const glowGeo = new THREE.SphereGeometry(0.7, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({ color: 0xff6644, transparent: true, opacity: 0.15 });
    nucleusGroup.add(new THREE.Mesh(glowGeo, glowMat));

    atomGroup.add(nucleusGroup);

    // Orbital rings (visual guides)
    el.electronConfig.forEach((count, shellIndex) => {
        if (shellIndex >= 4) return;
        const radius = shellRadii[shellIndex];
        const ringGeo = new THREE.RingGeometry(radius - 0.02, radius + 0.02, 64);
        const ringMat = new THREE.MeshBasicMaterial({
            color: 0x446688,
            transparent: true,
            opacity: 0.2,
            side: THREE.DoubleSide
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI / 2;
        atomGroup.add(ring);
    });

    // Electrons
    const electronGeo = new THREE.SphereGeometry(0.1, 12, 12);

    el.electronConfig.forEach((count, shellIndex) => {
        if (shellIndex >= 4) return;
        const radius = shellRadii[shellIndex];
        const speed = 1 / radius;

        for (let i = 0; i < count; i++) {
            const angle = (i / count) * Math.PI * 2;
            const tiltAngle = (shellIndex * 0.3) + (i * 0.15);

            const electronMat = new THREE.MeshPhongMaterial({
                color: 0x44ff44,
                emissive: 0x22aa22,
                emissiveIntensity: 0.5,
                transparent: true,
                opacity: 1.0
            });

            const electron = new THREE.Mesh(electronGeo, electronMat);
            electron.userData = {
                shellIndex: shellIndex,
                radius: radius,
                speed: speed,
                baseAngle: angle,
                tiltAngle: tiltAngle,
                currentAngle: angle
            };
            atomGroup.add(electron);
            electronMeshes.push(electron);

            // Trail
            const trailCount = 50;
            const trailPositions = new Float32Array(trailCount * 3);
            const trailColors = new Float32Array(trailCount * 4);
            for (let t = 0; t < trailCount; t++) {
                const ta = angle - (t / trailCount) * 0.5;
                const x = radius * Math.cos(ta);
                const z = radius * Math.sin(ta);
                trailPositions[t * 3] = x;
                trailPositions[t * 3 + 1] = 0;
                trailPositions[t * 3 + 2] = z;
                const alpha = 1.0 - (t / trailCount);
                trailColors[t * 4] = 0.3;
                trailColors[t * 4 + 1] = 1.0;
                trailColors[t * 4 + 2] = 0.3;
                trailColors[t * 4 + 3] = alpha * 0.6;
            }

            const trailGeo = new THREE.BufferGeometry();
            trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
            trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 4));

            const trailMat = new THREE.PointsMaterial({
                size: 0.06,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const trail = new THREE.Points(trailGeo, trailMat);
            trail.rotation.x = tiltAngle;
            trail.userData = { shellIndex: shellIndex };
            atomGroup.add(trail);
            electronTrails.push({
                points: trail,
                positions: trailPositions,
                electron: electron,
                trailCount: trailCount,
                radius: radius,
                tiltAngle: tiltAngle
            });
        }
    });

    // Update state
    window.__3D_STATE__.atomData = {
        protons: el.protons,
        neutrons: el.neutrons,
        electrons: el.electronConfig.reduce((a, b) => a + b, 0),
        shells: el.electronConfig.length
    };
    window.__3D_STATE__.electronAnimating = true;
    window.__3D_STATE__.highlightedShell = 0;

    // Reset camera for atom view
    camera.position.set(0, 5, 15);
    controls.target.set(0, 0, 0);
    controls.update();
}

function backToTable() {
    window.__3D_STATE__.viewMode = 'table';
    tableGroup.visible = true;
    atomGroup.visible = false;
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('controls').style.display = 'block';
    window.__3D_STATE__.atomData = null;
    window.__3D_STATE__.electronAnimating = false;

    if (selectedMesh) {
        document.getElementById('infoPanel').style.display = 'block';
    }

    camera.position.set(0, 5, 30);
    controls.target.set(0, 0, 0);
    controls.update();
}

document.getElementById('showAtomBtn').addEventListener('click', showAtom);
document.getElementById('backBtn').addEventListener('click', backToTable);

// Category filter
document.getElementById('categoryFilter').addEventListener('change', (e) => {
    const filter = e.target.value;
    window.__3D_STATE__.categoryFilter = filter;

    let count = 0;
    elementMeshes.forEach(mesh => {
        const el = mesh.userData;
        if (filter === 'All' || el.category === filter) {
            mesh.visible = true;
            count++;
        } else {
            mesh.visible = false;
        }
    });
    window.__3D_STATE__.visibleElementCount = count;
});

// Keyboard
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'r') {
        camera.position.set(0, 5, 30);
        controls.target.set(0, 0, 0);
        controls.update();
    }

    if (key === 't') {
        window.__3D_STATE__.tableRotating = !window.__3D_STATE__.tableRotating;
    }

    if (key === 'p' && window.__3D_STATE__.viewMode === 'atom') {
        window.__3D_STATE__.particleTrailsVisible = !window.__3D_STATE__.particleTrailsVisible;
        electronTrails.forEach(t => {
            t.points.visible = window.__3D_STATE__.particleTrailsVisible;
        });
    }

    if (['1', '2', '3', '4'].includes(key) && window.__3D_STATE__.viewMode === 'atom') {
        const shell = parseInt(key);
        if (window.__3D_STATE__.highlightedShell === shell) {
            window.__3D_STATE__.highlightedShell = 0;
        } else {
            window.__3D_STATE__.highlightedShell = shell;
        }

        const hs = window.__3D_STATE__.highlightedShell;
        electronMeshes.forEach(em => {
            const si = em.userData.shellIndex;
            if (hs === 0) {
                em.material.opacity = 1.0;
            } else {
                em.material.opacity = (si === hs - 1) ? 1.0 : 0.2;
            }
        });
        electronTrails.forEach(t => {
            const si = t.points.userData.shellIndex;
            if (hs === 0) {
                t.points.material.opacity = 1.0;
            } else {
                t.points.material.opacity = (si === hs - 1) ? 1.0 : 0.1;
            }
        });
    }
});

// Animation
function animate() {
    requestAnimationFrame(animate);
    window.__3D_STATE__.frameCount++;

    controls.update();

    // Table rotation
    if (window.__3D_STATE__.tableRotating && window.__3D_STATE__.viewMode === 'table') {
        tableGroup.rotation.y += 0.005;
    }

    // Atom animation
    if (window.__3D_STATE__.viewMode === 'atom' && window.__3D_STATE__.electronAnimating) {
        const time = window.__3D_STATE__.frameCount * 0.02;

        electronMeshes.forEach(electron => {
            const ud = electron.userData;
            ud.currentAngle = ud.baseAngle + time * ud.speed;

            const x = ud.radius * Math.cos(ud.currentAngle);
            const z = ud.radius * Math.sin(ud.currentAngle);

            // Apply tilt
            const cosT = Math.cos(ud.tiltAngle);
            const sinT = Math.sin(ud.tiltAngle);

            electron.position.set(
                x,
                z * sinT,
                z * cosT
            );
        });

        // Update trails
        electronTrails.forEach(trail => {
            const electron = trail.electron;
            const ud = electron.userData;
            const positions = trail.positions;

            for (let t = 0; t < trail.trailCount; t++) {
                const ta = ud.currentAngle - (t / trail.trailCount) * 1.0;
                const x = trail.radius * Math.cos(ta);
                const z = trail.radius * Math.sin(ta);
                positions[t * 3] = x;
                positions[t * 3 + 1] = 0;
                positions[t * 3 + 2] = z;
            }

            trail.points.geometry.attributes.position.needsUpdate = true;
            trail.points.rotation.x = trail.tiltAngle;
        });
    }

    // Hover effect for table elements
    if (window.__3D_STATE__.viewMode === 'table') {
        elementMeshes.forEach(mesh => {
            if (mesh !== selectedMesh && mesh.visible) {
                mesh.position.z = mesh.position.z * 0.9;
            }
        });
    }

    // Update camera position in state
    window.__3D_STATE__.cameraPosition = {
        x: parseFloat(camera.position.x.toFixed(2)),
        y: parseFloat(camera.position.y.toFixed(2)),
        z: parseFloat(camera.position.z.toFixed(2))
    };

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Hover effect
const hoverMouse = new THREE.Vector2();
let hoveredMesh = null;

renderer.domElement.addEventListener('mousemove', (event) => {
    if (window.__3D_STATE__.viewMode !== 'table') return;

    hoverMouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    hoverMouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(hoverMouse, camera);
    const intersects = raycaster.intersectObjects(elementMeshes);

    if (hoveredMesh && hoveredMesh !== selectedMesh) {
        hoveredMesh.position.z = 0;
    }

    if (intersects.length > 0 && intersects[0].object.visible) {
        hoveredMesh = intersects[0].object;
        if (hoveredMesh !== selectedMesh) {
            hoveredMesh.position.z = 0.3;
        }
        renderer.domElement.style.cursor = 'pointer';
    } else {
        hoveredMesh = null;
        renderer.domElement.style.cursor = 'default';
    }
});
</script>
