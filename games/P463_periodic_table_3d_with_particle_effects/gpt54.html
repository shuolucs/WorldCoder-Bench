<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Periodic Table with Atomic Particle Visualizations</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #ui {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 280px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel {
      background: rgba(20, 24, 44, 0.9);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    h2, h3, p {
      margin: 0 0 8px 0;
    }

    .row {
      margin-bottom: 8px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #cfd3ff;
    }

    select, button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #1b2240;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: #25305d;
    }

    #infoContent {
      font-size: 14px;
      line-height: 1.45;
      color: #e8ebff;
    }

    .muted {
      color: #aeb5e8;
      font-size: 12px;
    }

    #backButton {
      display: none;
    }

    #help {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      background: rgba(20, 24, 44, 0.88);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      color: #d7dcff;
      font-size: 13px;
      line-height: 1.45;
      max-width: 340px;
    }

    strong {
      color: #fff;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="panel">
      <div class="row">
        <label for="categoryFilter">Category Filter</label>
        <select id="categoryFilter">
          <option>All</option>
          <option>Alkali Metals</option>
          <option>Alkaline Earth</option>
          <option>Transition Metals</option>
          <option>Metalloids</option>
          <option>Nonmetals</option>
          <option>Noble Gases</option>
          <option>Halogens</option>
          <option>Other Metals</option>
        </select>
      </div>
    </div>

    <div class="panel" id="infoPanel">
      <h3>Element Info</h3>
      <div id="infoContent">Click an element to view details.</div>
      <button id="showAtomButton" style="margin-top:10px;" disabled>Show Atom</button>
      <button id="backButton" style="margin-top:10px;">Back to Table</button>
    </div>
  </div>

  <div id="help">
    <div><strong>Controls</strong></div>
    <div>Mouse: Orbit / Zoom</div>
    <div><strong>R</strong>: Reset camera</div>
    <div><strong>T</strong>: Toggle table rotation</div>
    <div><strong>P</strong>: Toggle particle trails in atom view</div>
    <div><strong>1-4</strong>: Highlight electron shell</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#0a0a1a");

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight1.position.set(10, 10, 10);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.7);
    dirLight2.position.set(-10, 5, -10);
    scene.add(dirLight2);

    const categoryColors = {
      "Alkali Metals": "#ff6b6b",
      "Alkaline Earth": "#ffa94d",
      "Transition Metals": "#74c0fc",
      "Metalloids": "#a9e34b",
      "Nonmetals": "#69db7c",
      "Noble Gases": "#da77f2",
      "Halogens": "#ffd43b",
      "Other Metals": "#4dabf7"
    };

    const elements = [
      {symbol:"H", name:"Hydrogen", atomicNumber:1, atomicMass:"1.008", category:"Nonmetals", electronConfig:[1], protons:1, neutrons:0, group:1, period:1},
      {symbol:"He", name:"Helium", atomicNumber:2, atomicMass:"4.0026", category:"Noble Gases", electronConfig:[2], protons:2, neutrons:2, group:18, period:1},
      {symbol:"Li", name:"Lithium", atomicNumber:3, atomicMass:"6.94", category:"Alkali Metals", electronConfig:[2,1], protons:3, neutrons:4, group:1, period:2},
      {symbol:"Be", name:"Beryllium", atomicNumber:4, atomicMass:"9.0122", category:"Alkaline Earth", electronConfig:[2,2], protons:4, neutrons:5, group:2, period:2},
      {symbol:"B", name:"Boron", atomicNumber:5, atomicMass:"10.81", category:"Metalloids", electronConfig:[2,3], protons:5, neutrons:6, group:13, period:2},
      {symbol:"C", name:"Carbon", atomicNumber:6, atomicMass:"12.011", category:"Nonmetals", electronConfig:[2,4], protons:6, neutrons:6, group:14, period:2},
      {symbol:"N", name:"Nitrogen", atomicNumber:7, atomicMass:"14.007", category:"Nonmetals", electronConfig:[2,5], protons:7, neutrons:7, group:15, period:2},
      {symbol:"O", name:"Oxygen", atomicNumber:8, atomicMass:"15.999", category:"Nonmetals", electronConfig:[2,6], protons:8, neutrons:8, group:16, period:2},
      {symbol:"F", name:"Fluorine", atomicNumber:9, atomicMass:"18.998", category:"Halogens", electronConfig:[2,7], protons:9, neutrons:10, group:17, period:2},
      {symbol:"Ne", name:"Neon", atomicNumber:10, atomicMass:"20.180", category:"Noble Gases", electronConfig:[2,8], protons:10, neutrons:10, group:18, period:2},
      {symbol:"Na", name:"Sodium", atomicNumber:11, atomicMass:"22.990", category:"Alkali Metals", electronConfig:[2,8,1], protons:11, neutrons:12, group:1, period:3},
      {symbol:"Mg", name:"Magnesium", atomicNumber:12, atomicMass:"24.305", category:"Alkaline Earth", electronConfig:[2,8,2], protons:12, neutrons:12, group:2, period:3},
      {symbol:"Al", name:"Aluminium", atomicNumber:13, atomicMass:"26.982", category:"Other Metals", electronConfig:[2,8,3], protons:13, neutrons:14, group:13, period:3},
      {symbol:"Si", name:"Silicon", atomicNumber:14, atomicMass:"28.085", category:"Metalloids", electronConfig:[2,8,4], protons:14, neutrons:14, group:14, period:3},
      {symbol:"P", name:"Phosphorus", atomicNumber:15, atomicMass:"30.974", category:"Nonmetals", electronConfig:[2,8,5], protons:15, neutrons:16, group:15, period:3},
      {symbol:"S", name:"Sulfur", atomicNumber:16, atomicMass:"32.06", category:"Nonmetals", electronConfig:[2,8,6], protons:16, neutrons:16, group:16, period:3},
      {symbol:"Cl", name:"Chlorine", atomicNumber:17, atomicMass:"35.45", category:"Halogens", electronConfig:[2,8,7], protons:17, neutrons:18, group:17, period:3},
      {symbol:"Ar", name:"Argon", atomicNumber:18, atomicMass:"39.948", category:"Noble Gases", electronConfig:[2,8,8], protons:18, neutrons:22, group:18, period:3},
      {symbol:"K", name:"Potassium", atomicNumber:19, atomicMass:"39.098", category:"Alkali Metals", electronConfig:[2,8,8,1], protons:19, neutrons:20, group:1, period:4},
      {symbol:"Ca", name:"Calcium", atomicNumber:20, atomicMass:"40.078", category:"Alkaline Earth", electronConfig:[2,8,8,2], protons:20, neutrons:20, group:2, period:4},
      {symbol:"Sc", name:"Scandium", atomicNumber:21, atomicMass:"44.956", category:"Transition Metals", electronConfig:[2,8,9,2], protons:21, neutrons:24, group:3, period:4},
      {symbol:"Ti", name:"Titanium", atomicNumber:22, atomicMass:"47.867", category:"Transition Metals", electronConfig:[2,8,10,2], protons:22, neutrons:26, group:4, period:4},
      {symbol:"V", name:"Vanadium", atomicNumber:23, atomicMass:"50.942", category:"Transition Metals", electronConfig:[2,8,11,2], protons:23, neutrons:28, group:5, period:4},
      {symbol:"Cr", name:"Chromium", atomicNumber:24, atomicMass:"51.996", category:"Transition Metals", electronConfig:[2,8,13,1], protons:24, neutrons:28, group:6, period:4},
      {symbol:"Mn", name:"Manganese", atomicNumber:25, atomicMass:"54.938", category:"Transition Metals", electronConfig:[2,8,13,2], protons:25, neutrons:30, group:7, period:4},
      {symbol:"Fe", name:"Iron", atomicNumber:26, atomicMass:"55.845", category:"Transition Metals", electronConfig:[2,8,14,2], protons:26, neutrons:30, group:8, period:4},
      {symbol:"Co", name:"Cobalt", atomicNumber:27, atomicMass:"58.933", category:"Transition Metals", electronConfig:[2,8,15,2], protons:27, neutrons:32, group:9, period:4},
      {symbol:"Ni", name:"Nickel", atomicNumber:28, atomicMass:"58.693", category:"Transition Metals", electronConfig:[2,8,16,2], protons:28, neutrons:31, group:10, period:4},
      {symbol:"Cu", name:"Copper", atomicNumber:29, atomicMass:"63.546", category:"Transition Metals", electronConfig:[2,8,18,1], protons:29, neutrons:35, group:11, period:4},
      {symbol:"Zn", name:"Zinc", atomicNumber:30, atomicMass:"65.38", category:"Transition Metals", electronConfig:[2,8,18,2], protons:30, neutrons:35, group:12, period:4},
      {symbol:"Ga", name:"Gallium", atomicNumber:31, atomicMass:"69.723", category:"Other Metals", electronConfig:[2,8,18,3], protons:31, neutrons:39, group:13, period:4},
      {symbol:"Ge", name:"Germanium", atomicNumber:32, atomicMass:"72.630", category:"Metalloids", electronConfig:[2,8,18,4], protons:32, neutrons:41, group:14, period:4},
      {symbol:"As", name:"Arsenic", atomicNumber:33, atomicMass:"74.922", category:"Metalloids", electronConfig:[2,8,18,5], protons:33, neutrons:42, group:15, period:4},
      {symbol:"Se", name:"Selenium", atomicNumber:34, atomicMass:"78.971", category:"Nonmetals", electronConfig:[2,8,18,6], protons:34, neutrons:45, group:16, period:4},
      {symbol:"Br", name:"Bromine", atomicNumber:35, atomicMass:"79.904", category:"Halogens", electronConfig:[2,8,18,7], protons:35, neutrons:45, group:17, period:4},
      {symbol:"Kr", name:"Krypton", atomicNumber:36, atomicMass:"83.798", category:"Noble Gases", electronConfig:[2,8,18,8], protons:36, neutrons:48, group:18, period:4}
    ];

    const shellRadii = [2, 3.5, 5, 6.5];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const tableGroup = new THREE.Group();
    const atomGroup = new THREE.Group();
    atomGroup.visible = false;
    scene.add(tableGroup);
    scene.add(atomGroup);

    const elementMeshes = [];
    let selectedMesh = null;
    let selectedElement = null;

    const infoContent = document.getElementById("infoContent");
    const showAtomButton = document.getElementById("showAtomButton");
    const backButton = document.getElementById("backButton");
    const categoryFilter = document.getElementById("categoryFilter");

    const boxGeometry = new THREE.BoxGeometry(0.8, 0.8, 0.2);

    function createTextTexture(symbol, atomicNumber) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,255,255,0.0)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 100px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(symbol, 128, 120);

      ctx.font = "36px Arial";
      ctx.fillStyle = "#dce3ff";
      ctx.fillText(String(atomicNumber), 128, 190);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function makeElementMesh(el) {
      const color = categoryColors[el.category] || "#ffffff";
      const textTexture = createTextTexture(el.symbol, el.atomicNumber);

      const materials = [
        new THREE.MeshPhongMaterial({ color }),
        new THREE.MeshPhongMaterial({ color }),
        new THREE.MeshPhongMaterial({ color }),
        new THREE.MeshPhongMaterial({ color }),
        new THREE.MeshPhongMaterial({ color: "#111827" }),
        new THREE.MeshPhongMaterial({ map: textTexture, color })
      ];

      const mesh = new THREE.Mesh(boxGeometry, materials);
      mesh.userData.element = el;
      return mesh;
    }

    function buildPeriodicTable() {
      const xSpacing = 1.1;
      const ySpacing = 1.1;
      const maxCols = 18;
      const xOffset = ((maxCols - 1) * xSpacing) / 2;
      const yOffset = ((4 - 1) * ySpacing) / 2;

      elements.forEach(el => {
        const mesh = makeElementMesh(el);
        const x = (el.group - 1) * xSpacing - xOffset;
        const y = yOffset - (el.period - 1) * ySpacing;
        mesh.position.set(x, y, 0);
        tableGroup.add(mesh);
        elementMeshes.push(mesh);
      });
      updateVisibleCount();
    }

    function updateInfoPanel(el) {
      if (!el) {
        infoContent.innerHTML = "Click an element to view details.";
        showAtomButton.disabled = true;
        return;
      }
      infoContent.innerHTML = `
        <p><strong>${el.symbol}</strong> - ${el.name}</p>
        <p><strong>Atomic Number:</strong> ${el.atomicNumber}</p>
        <p><strong>Atomic Mass:</strong> ${el.atomicMass}</p>
        <p><strong>Category:</strong> ${el.category}</p>
        <p><strong>Electron Configuration:</strong> [${el.electronConfig.join(", ")}]</p>
      `;
      showAtomButton.disabled = false;
    }

    function setSelectedMesh(mesh) {
      if (selectedMesh) {
        const mats = Array.isArray(selectedMesh.material) ? selectedMesh.material : [selectedMesh.material];
        mats.forEach(m => {
          if ("emissive" in m) m.emissive.setHex(0x000000);
          if ("emissiveIntensity" in m) m.emissiveIntensity = 0;
        });
      }

      selectedMesh = mesh;
      selectedElement = mesh ? mesh.userData.element : null;

      if (selectedMesh) {
        const mats = Array.isArray(selectedMesh.material) ? selectedMesh.material : [selectedMesh.material];
        mats.forEach(m => {
          if ("emissive" in m) m.emissive.setHex(0xffffff);
          if ("emissiveIntensity" in m) m.emissiveIntensity = 0.35;
        });
      }

      updateInfoPanel(selectedElement);
      updateState();
    }

    function updateVisibleCount() {
      window.__3D_STATE__.visibleElementCount = elementMeshes.filter(m => m.visible).length;
    }

    categoryFilter.addEventListener("change", () => {
      const filter = categoryFilter.value;
      elementMeshes.forEach(mesh => {
        const matches = filter === "All" || mesh.userData.element.category === filter;
        mesh.visible = matches;
      });
      updateVisibleCount();
      window.__3D_STATE__.categoryFilter = filter;
    });

    renderer.domElement.addEventListener("pointerdown", (event) => {
      if (window.__3D_STATE__.viewMode !== "table") return;

      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elementMeshes.filter(m => m.visible), false);

      if (intersects.length > 0) {
        setSelectedMesh(intersects[0].object);
      }
    });

    let electronObjects = [];
    let shellGroups = [];
    let trailObjects = [];
    let shellRingObjects = [];
    let nucleusObjects = [];

    function clearAtom() {
      while (atomGroup.children.length > 0) {
        const child = atomGroup.children.pop();
        if (child.geometry) child.geometry.dispose?.();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose?.());
          else child.material.dispose?.();
        }
      }
      electronObjects = [];
      shellGroups = [];
      trailObjects = [];
      shellRingObjects = [];
      nucleusObjects = [];
    }

    function createAtom(el) {
      clearAtom();

      const protonGeo = new THREE.SphereGeometry(0.12, 16, 16);
      const neutronGeo = new THREE.SphereGeometry(0.12, 16, 16);
      const protonMat = new THREE.MeshPhongMaterial({ color: 0xff4d4d, emissive: 0x550000, emissiveIntensity: 0.4 });
      const neutronMat = new THREE.MeshPhongMaterial({ color: 0x4d79ff, emissive: 0x001155, emissiveIntensity: 0.4 });

      for (let i = 0; i < el.protons; i++) {
        const p = new THREE.Mesh(protonGeo, protonMat.clone());
        const r = 0.5 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        p.position.set(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
        atomGroup.add(p);
        nucleusObjects.push(p);
      }

      for (let i = 0; i < el.neutrons; i++) {
        const n = new THREE.Mesh(neutronGeo, neutronMat.clone());
        const r = 0.5 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        n.position.set(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
        atomGroup.add(n);
        nucleusObjects.push(n);
      }

      const electronGeo = new THREE.SphereGeometry(0.08, 16, 16);

      el.electronConfig.forEach((count, shellIndex) => {
        const radius = shellRadii[shellIndex];
        const shellGroup = new THREE.Group();
        atomGroup.add(shellGroup);
        shellGroups.push(shellGroup);

        const ringGeo = new THREE.BufferGeometry();
        const ringPoints = [];
        const segments = 128;
        for (let i = 0; i <= segments; i++) {
          const a = (i / segments) * Math.PI * 2;
          ringPoints.push(radius * Math.cos(a), 0, radius * Math.sin(a));
        }
        ringGeo.setAttribute("position", new THREE.Float32BufferAttribute(ringPoints, 3));
        const ringMat = new THREE.LineBasicMaterial({
          color: 0x66ffcc,
          transparent: true,
          opacity: 0.35
        });
        const ring = new THREE.Line(ringGeo, ringMat);
        atomGroup.add(ring);
        shellRingObjects.push({ object: ring, shell: shellIndex + 1 });

        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2 + Math.random() * 0.2;
          const electronMat = new THREE.MeshPhongMaterial({
            color: 0x66ff88,
            emissive: 0x22ff66,
            emissiveIntensity: 0.8,
            transparent: true,
            opacity: 1
          });
          const electron = new THREE.Mesh(electronGeo, electronMat);
          electron.position.set(radius * Math.cos(angle), 0, radius * Math.sin(angle));
          shellGroup.add(electron);

          const trailGeo = new THREE.BufferGeometry();
          const trailPts = [];
          const trailSegments = 64;
          for (let j = 0; j <= trailSegments; j++) {
            const aa = (j / trailSegments) * Math.PI * 2;
            trailPts.push(radius * Math.cos(aa), 0, radius * Math.sin(aa));
          }
          trailGeo.setAttribute("position", new THREE.Float32BufferAttribute(trailPts, 3));
          const trailMat = new THREE.LineBasicMaterial({
            color: 0x55ffcc,
            transparent: true,
            opacity: 0.18
          });
          const trail = new THREE.LineLoop(trailGeo, trailMat);
          atomGroup.add(trail);

          const tiltPivot = new THREE.Group();
          tiltPivot.rotation.x = shellIndex * 0.35 + i * 0.05;
          tiltPivot.rotation.z = shellIndex * 0.22 + i * 0.11;

          atomGroup.remove(shellGroup);
          tiltPivot.add(shellGroup);
          atomGroup.add(tiltPivot);

          electronObjects.push({
            mesh: electron,
            shellGroup: shellGroup,
            tiltPivot,
            shell: shellIndex + 1,
            radius,
            angle,
            speed: 0.02 / radius,
            offset: angle
          });

          trailObjects.push({ object: trail, shell: shellIndex + 1 });
        }
      });

      window.__3D_STATE__.atomData = {
        protons: el.protons,
        neutrons: el.neutrons,
        electrons: el.electronConfig.reduce((a, b) => a + b, 0),
        shells: el.electronConfig.length
      };
      window.__3D_STATE__.electronAnimating = true;
    }

    function applyShellHighlight(shellNumber) {
      electronObjects.forEach(e => {
        const opacity = shellNumber === 0 || e.shell === shellNumber ? 1 : 0.2;
        e.mesh.material.opacity = opacity;
        e.mesh.material.transparent = true;
      });

      shellRingObjects.forEach(r => {
        r.object.material.opacity = shellNumber === 0 || r.shell === shellNumber ? 0.35 : 0.08;
      });

      trailObjects.forEach(t => {
        const visible = window.__3D_STATE__.particleTrailsVisible;
        t.object.visible = visible;
        t.object.material.opacity =
          shellNumber === 0 || t.shell === shellNumber
            ? (visible ? 0.18 : 0)
            : (visible ? 0.04 : 0);
      });

      window.__3D_STATE__.highlightedShell = shellNumber;
    }

    function showAtomView() {
      if (!selectedElement) return;
      tableGroup.visible = false;
      atomGroup.visible = true;
      createAtom(selectedElement);
      showAtomButton.style.display = "none";
      backButton.style.display = "block";
      window.__3D_STATE__.viewMode = "atom";
      applyShellHighlight(window.__3D_STATE__.highlightedShell);
      updateState();
    }

    function showTableView() {
      atomGroup.visible = false;
      tableGroup.visible = true;
      clearAtom();
      showAtomButton.style.display = "block";
      backButton.style.display = "none";
      window.__3D_STATE__.viewMode = "table";
      window.__3D_STATE__.atomData = null;
      window.__3D_STATE__.electronAnimating = false;
      updateState();
    }

    showAtomButton.addEventListener("click", showAtomView);
    backButton.addEventListener("click", showTableView);

    window.__3D_STATE__ = {
      selectedElement: null,
      viewMode: "table",
      tableRotating: false,
      categoryFilter: "All",
      visibleElementCount: 0,
      atomData: null,
      electronAnimating: false,
      particleTrailsVisible: true,
      highlightedShell: 0,
      cameraPosition: { x: camera.position.x, y: camera.position.y, z: camera.position.z },
      totalElements: 36,
      frameCount: 0
    };

    function updateState() {
      window.__3D_STATE__.selectedElement = selectedElement
        ? {
            symbol: selectedElement.symbol,
            atomicNumber: selectedElement.atomicNumber,
            name: selectedElement.name,
            category: selectedElement.category
          }
        : null;
      window.__3D_STATE__.cameraPosition = {
        x: camera.position.x,
        y: camera.position.y,
        z: camera.position.z
      };
      updateVisibleCount();
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "r") {
        camera.position.set(0, 5, 30);
        controls.target.set(0, 0, 0);
        controls.update();
      }

      if (key === "t") {
        window.__3D_STATE__.tableRotating = !window.__3D_STATE__.tableRotating;
      }

      if (key === "p" && window.__3D_STATE__.viewMode === "atom") {
        window.__3D_STATE__.particleTrailsVisible = !window.__3D_STATE__.particleTrailsVisible;
        trailObjects.forEach(t => {
          t.object.visible = window.__3D_STATE__.particleTrailsVisible;
        });
        applyShellHighlight(window.__3D_STATE__.highlightedShell);
      }

      if (["1","2","3","4"].includes(e.key)) {
        const shellNum = parseInt(e.key, 10);
        window.__3D_STATE__.highlightedShell =
          window.__3D_STATE__.highlightedShell === shellNum ? 0 : shellNum;
        if (window.__3D_STATE__.viewMode === "atom") {
          applyShellHighlight(window.__3D_STATE__.highlightedShell);
        }
      }
    });

    buildPeriodicTable();
    updateState();

    function animate() {
      requestAnimationFrame(animate);
      window.__3D_STATE__.frameCount++;

      if (window.__3D_STATE__.viewMode === "table" && window.__3D_STATE__.tableRotating) {
        tableGroup.rotation.y += 0.005;
      }

      if (window.__3D_STATE__.viewMode === "atom") {
        electronObjects.forEach(e => {
          e.angle += e.speed;
          e.mesh.position.set(
            e.radius * Math.cos(e.angle + e.offset),
            0,
            e.radius * Math.sin(e.angle + e.offset)
          );
          e.shellGroup.rotation.y += e.speed * 0.15;
        });
      }

      window.__3D_STATE__.cameraPosition.x = camera.position.x;
      window.__3D_STATE__.cameraPosition.y = camera.position.y;
      window.__3D_STATE__.cameraPosition.z = camera.position.z;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
