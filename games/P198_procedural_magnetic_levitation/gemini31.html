<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Levitation Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
            color: white;
        }
        canvas {
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 10, 25, 0.8);
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
            pointer-events: auto;
        }
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #infoPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            min-width: 200px;
            line-height: 1.5;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #555;
            padding: 8px;
            cursor: pointer;
            font-family: monospace;
            transition: background 0.2s;
        }
        button:hover {
            background: #3a3a6a;
        }
        input[type=range] {
            vertical-align: middle;
        }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="controls" class="panel">
            <label>Current (A): <input type="range" id="currentSlider" min="0" max="2" step="0.01" value="0"></label>
            <button id="powerButton">Power: OFF</button>
            <button id="addWeightButton">Add Weight (+0.5kg)</button>
            <button id="resetButton">Reset</button>
        </div>
        <div id="infoPanel" class="panel">
            <!-- Populated by JS -->
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Objects ---
        // Ground
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            metalness: 0.5, 
            roughness: 0.8 
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Electromagnet Base
        const baseGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.6, 32);
        const baseMat = new THREE.MeshStandardMaterial({ 
            color: 0xb87333, // Copper/Bronze
            metalness: 0.8, 
            roughness: 0.3 
        });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.set(0, 0.3, 0);
        base.castShadow = true;
        base.receiveShadow = true;
        scene.add(base);

        // Coil Ring
        const coilGeo = new THREE.TorusGeometry(1.0, 0.15, 16, 64);
        const coilMat = new THREE.MeshStandardMaterial({ 
            color: 0x000000,
            emissive: 0x0088ff,
            emissiveIntensity: 0,
            metalness: 0.5,
            roughness: 0.5
        });
        const coil = new THREE.Mesh(coilGeo, coilMat);
        coil.position.set(0, 0.4, 0);
        coil.rotation.x = Math.PI / 2;
        scene.add(coil);

        // Levitating Sphere
        const sphereGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const sphereMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            metalness: 0.9, 
            roughness: 0.1 
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.castShadow = true;
        scene.add(sphere);

        // Magnetic Field Lines
        const fieldLinesGroup = new THREE.Group();
        const numLines = 8;
        const lineMat = new THREE.LineBasicMaterial({ 
            color: 0x0088ff, 
            transparent: true, 
            opacity: 0,
            blending: THREE.AdditiveBlending
        });

        for (let i = 0; i < numLines; i++) {
            const angle = (i / numLines) * Math.PI * 2;
            const points = [];
            
            // Procedural curve points
            points.push(new THREE.Vector3(Math.cos(angle) * 1.0, 0.4, Math.sin(angle) * 1.0)); // Coil
            points.push(new THREE.Vector3(Math.cos(angle) * 1.8, 2.0, Math.sin(angle) * 1.8)); // Bulge out
            points.push(new THREE.Vector3(Math.cos(angle) * 0.8, 4.0, Math.sin(angle) * 0.8)); // Curve in
            points.push(new THREE.Vector3(0, 6.0, 0)); // Top center

            const curve = new THREE.CatmullRomCurve3(points);
            const curvePoints = curve.getPoints(50);
            const lineGeo = new THREE.BufferGeometry().setFromPoints(curvePoints);
            const line = new THREE.Line(lineGeo, lineMat);
            fieldLinesGroup.add(line);
        }
        scene.add(fieldLinesGroup);

        // --- State & Physics ---
        const state = {
            power: false,
            sliderValue: 0,
            mass: 1.0,
            y: 1.1,
            vy: 0,
            frameCount: 0
        };

        const PHYSICS = {
            gravity: 9.81,
            K: 50.0,
            dt: 1 / 60,
            damping: 0.95,
            minY: 1.1,
            maxY: 6.0,
            coilY: 0.4
        };

        // --- UI Elements ---
        const slider = document.getElementById('currentSlider');
        const powerBtn = document.getElementById('powerButton');
        const weightBtn = document.getElementById('addWeightButton');
        const resetBtn = document.getElementById('resetButton');
        const infoPanel = document.getElementById('infoPanel');

        // --- Event Listeners ---
        slider.addEventListener('input', (e) => {
            state.sliderValue = parseFloat(e.target.value);
        });

        powerBtn.addEventListener('click', () => {
            state.power = !state.power;
            powerBtn.innerText = state.power ? 'Power: ON' : 'Power: OFF';
            powerBtn.style.background = state.power ? '#4a8a4a' : '#2a2a4a';
        });

        weightBtn.addEventListener('click', () => {
            state.mass = Math.min(5.0, state.mass + 0.5);
        });

        resetBtn.addEventListener('click', () => {
            state.power = false;
            state.sliderValue = 0;
            state.mass = 1.0;
            state.y = PHYSICS.minY;
            state.vy = 0;
            
            slider.value = 0;
            powerBtn.innerText = 'Power: OFF';
            powerBtn.style.background = '#2a2a4a';
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                state.sliderValue = Math.min(2.0, state.sliderValue + 0.1);
                slider.value = state.sliderValue;
            } else if (e.key === 'ArrowDown') {
                state.sliderValue = Math.max(0.0, state.sliderValue - 0.1);
                slider.value = state.sliderValue;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            state.frameCount++;

            // Physics Step
            const current = state.power ? state.sliderValue : 0;
            const distance = state.y - PHYSICS.coilY;
            
            let fMag = 0;
            if (distance > 0) {
                fMag = (current * PHYSICS.K) / (distance * distance);
            }
            
            const fGrav = PHYSICS.gravity * state.mass;
            let fNet = fMag - fGrav;

            // Normal force from base
            if (state.y <= PHYSICS.minY && fNet < 0) {
                fNet = 0;
                state.vy = 0;
            }

            const acceleration = fNet / state.mass;
            state.vy += acceleration * PHYSICS.dt;
            state.vy *= PHYSICS.damping;
            state.y += state.vy * PHYSICS.dt;

            // Constraints
            if (state.y <= PHYSICS.minY) {
                state.y = PHYSICS.minY;
                if (state.vy < 0) state.vy = 0;
            }
            if (state.y >= PHYSICS.maxY) {
                state.y = PHYSICS.maxY;
                if (state.vy > 0) state.vy = 0;
            }

            // Update Sphere Mesh
            sphere.position.set(0, state.y, 0);

            // Visual Effects
            const time = performance.now() * 0.001;
            
            // Coil Glow
            let targetIntensity = 0;
            if (current > 0) {
                const baseGlow = current * 2.0;
                targetIntensity = baseGlow + Math.sin(time * 10) * 0.2 * baseGlow;
            }
            coilMat.emissiveIntensity = targetIntensity;

            // Field Lines
            fieldLinesGroup.visible = current > 0;
            if (current > 0) {
                fieldLinesGroup.rotation.y += 0.5 * PHYSICS.dt;
                lineMat.opacity = Math.min(1.0, current * 0.8);
            }

            // Update HUD
            infoPanel.innerHTML = `
                Current: ${current.toFixed(2)} A<br>
                Sphere Height: ${state.y.toFixed(2)} m<br>
                Sphere Velocity: ${state.vy.toFixed(2)} m/s<br>
                Mass: ${state.mass.toFixed(2)} kg<br>
                Magnetic Force: ${fMag.toFixed(2)} N<br>
                Net Force: ${fNet.toFixed(2)} N
            `;

            // Export State
            window.__3D_STATE__ = {
                power: state.power,
                current: current,
                sliderValue: state.sliderValue,
                sphereY: state.y,
                sphereVelocity: state.vy,
                mass: state.mass,
                magneticForce: fMag,
                netForce: fNet,
                fieldLinesVisible: fieldLinesGroup.visible,
                coilGlowIntensity: coilMat.emissiveIntensity,
                isEquilibrium: Math.abs(state.vy) < 0.05 && Math.abs(fNet) < 0.5,
                frameCount: state.frameCount
            };

            renderer.render(scene, camera);
        }

        // Initialize sphere position
        sphere.position.set(0, state.y, 0);
        
        animate();
    </script>
</body>
</html>
