<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Magnetic Levitation Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
      color: white;
    }

    #uiPanel, #infoPanel {
      position: absolute;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    #uiPanel {
      top: 12px;
      left: 12px;
      min-width: 260px;
    }

    #infoPanel {
      top: 12px;
      right: 12px;
      min-width: 240px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .row {
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    button {
      width: 100%;
      margin-top: 6px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
    }

    button:hover {
      background: rgba(255,255,255,0.14);
    }

    #massDisplay, #sliderValueDisplay {
      margin-top: 4px;
      color: #cfd8ff;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <div class="row">
      <label for="currentSlider">Current (A)</label>
      <input id="currentSlider" type="range" min="0" max="2" step="0.01" value="0">
      <div id="sliderValueDisplay">Slider Value: 0.00 A</div>
    </div>

    <button id="powerButton">Power: OFF</button>
    <button id="addWeightButton">Add Weight (+0.5 kg)</button>
    <div id="massDisplay">Mass: 1.00 kg</div>
    <button id="resetButton">Reset</button>
  </div>

  <div id="infoPanel"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.159.0/build/three.module.js";

    // ------------------------------------------------------------
    // Basic Scene Setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#1a1a2e");

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 4, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    scene.add(dirLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: 0x2a2f3a,
        metalness: 0.7,
        roughness: 0.5
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    // ------------------------------------------------------------
    // Electromagnet Base
    // ------------------------------------------------------------
    const baseMaterial = new THREE.MeshStandardMaterial({
      color: 0xb87333,
      metalness: 0.9,
      roughness: 0.35
    });

    const base = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 0.6, 48),
      baseMaterial
    );
    base.position.set(0, 0.3, 0);
    base.castShadow = true;
    base.receiveShadow = true;
    scene.add(base);

    // Coil ring
    const coilMaterial = new THREE.MeshStandardMaterial({
      color: 0x5577ff,
      emissive: 0x2277ff,
      emissiveIntensity: 0,
      metalness: 0.8,
      roughness: 0.25
    });

    const coil = new THREE.Mesh(
      new THREE.TorusGeometry(1.0, 0.15, 24, 100),
      coilMaterial
    );
    coil.rotation.x = Math.PI / 2;
    coil.position.set(0, 0.4, 0);
    coil.castShadow = true;
    coil.receiveShadow = true;
    scene.add(coil);

    // Small top cap for visual depth
    const cap = new THREE.Mesh(
      new THREE.CylinderGeometry(1.1, 1.1, 0.12, 48),
      new THREE.MeshStandardMaterial({
        color: 0x4d5566,
        metalness: 0.9,
        roughness: 0.2
      })
    );
    cap.position.set(0, 0.66, 0);
    cap.castShadow = true;
    cap.receiveShadow = true;
    scene.add(cap);

    // ------------------------------------------------------------
    // Levitating Sphere
    // ------------------------------------------------------------
    const sphereInitialY = 1.1;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.5, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0xcfd6df,
        metalness: 0.9,
        roughness: 0.1
      })
    );
    sphere.position.set(0, sphereInitialY, 0);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    // ------------------------------------------------------------
    // Magnetic Field Lines
    // ------------------------------------------------------------
    const fieldLinesGroup = new THREE.Group();
    scene.add(fieldLinesGroup);

    const fieldLineMaterial = new THREE.LineBasicMaterial({
      color: 0x55aaff,
      transparent: true,
      opacity: 0,
      depthWrite: false
    });

    const fieldLines = [];
    const lineCount = 8;

    for (let i = 0; i < lineCount; i++) {
      const angle = (i / lineCount) * Math.PI * 2;
      const r0 = 1.0;
      const x0 = Math.cos(angle) * r0;
      const z0 = Math.sin(angle) * r0;

      const points = [
        new THREE.Vector3(x0, 0.4, z0),
        new THREE.Vector3(x0 * 0.85, 1.2, z0 * 0.85),
        new THREE.Vector3(x0 * 0.55, 2.1, z0 * 0.55),
        new THREE.Vector3(x0 * 0.25, 3.0, z0 * 0.25),
        new THREE.Vector3(0, 3.8, 0)
      ];

      const curve = new THREE.CatmullRomCurve3(points);
      const geometry = new THREE.BufferGeometry().setFromPoints(curve.getPoints(50));
      const line = new THREE.Line(geometry, fieldLineMaterial.clone());
      line.visible = false;
      fieldLinesGroup.add(line);
      fieldLines.push({ line, angleBase: angle });
    }

    // ------------------------------------------------------------
    // UI Elements
    // ------------------------------------------------------------
    const currentSlider = document.getElementById("currentSlider");
    const powerButton = document.getElementById("powerButton");
    const addWeightButton = document.getElementById("addWeightButton");
    const resetButton = document.getElementById("resetButton");
    const infoPanel = document.getElementById("infoPanel");
    const massDisplay = document.getElementById("massDisplay");
    const sliderValueDisplay = document.getElementById("sliderValueDisplay");

    // ------------------------------------------------------------
    // Simulation State
    // ------------------------------------------------------------
    const gravity = 9.81;
    const K = 50.0;
    const coilCenterY = 0.4;
    const minSphereY = 1.1;
    const maxSphereY = 6.0;
    const fixedDt = 1 / 60;

    let powerOn = false;
    let sliderValue = 0;
    let current = 0;
    let mass = 1.0;
    let velocity = 0;
    let magneticForce = 0;
    let netForce = 0;
    let frameCount = 0;

    let accumulator = 0;
    let lastTime = performance.now();

    // Exposed state
    window.__3D_STATE__ = {
      power: powerOn,
      current: current,
      sliderValue: sliderValue,
      sphereY: sphere.position.y,
      sphereVelocity: velocity,
      mass: mass,
      magneticForce: magneticForce,
      netForce: netForce,
      fieldLinesVisible: false,
      coilGlowIntensity: 0,
      isEquilibrium: false,
      frameCount: frameCount
    };

    // ------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------
    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function updateEffectiveCurrent() {
      sliderValue = parseFloat(currentSlider.value);
      current = powerOn ? sliderValue : 0;
      sliderValueDisplay.textContent = `Slider Value: ${sliderValue.toFixed(2)} A`;
      powerButton.textContent = `Power: ${powerOn ? "ON" : "OFF"}`;
      massDisplay.textContent = `Mass: ${mass.toFixed(2)} kg`;
    }

    function resetSimulation() {
      powerOn = false;
      currentSlider.value = 0;
      sliderValue = 0;
      current = 0;
      mass = 1.0;
      velocity = 0;
      magneticForce = 0;
      netForce = 0;
      sphere.position.y = sphereInitialY;
      updateEffectiveCurrent();
    }

    function computeMagneticForce(cur, sphereY) {
      if (cur <= 0) return 0;
      const distance = Math.max(0.2, sphereY - coilCenterY);
      return (cur * K) / (distance * distance);
    }

    function updateFieldLines() {
      const visible = current > 0.001;
      const opacity = clamp(current / 2, 0, 1) * 0.75;

      for (const f of fieldLines) {
        f.line.visible = visible;
        f.line.material.opacity = opacity;
      }

      if (visible) {
        const t = performance.now() * 0.001;
        fieldLinesGroup.rotation.y = t * 0.5;
      }
    }

    function updateCoilGlow() {
      if (current <= 0) {
        coilMaterial.emissiveIntensity = 0;
        return 0;
      }
      const baseGlow = current * 1.5;
      const pulse = 1 + 0.2 * Math.sin(performance.now() * 0.005);
      const intensity = baseGlow * pulse;
      coilMaterial.emissiveIntensity = intensity;
      return intensity;
    }

    function updatePhysics(dt) {
      magneticForce = computeMagneticForce(current, sphere.position.y);
      netForce = magneticForce - gravity * mass;
      const acceleration = netForce / mass;

      velocity += acceleration * dt;
      velocity *= 0.95;
      sphere.position.y += velocity * dt;

      if (sphere.position.y < minSphereY) {
        sphere.position.y = minSphereY;
        if (velocity < 0) velocity = 0;
      }

      if (sphere.position.y > maxSphereY) {
        sphere.position.y = maxSphereY;
        if (velocity > 0) velocity = 0;
      }
    }

    function updateInfoPanel() {
      infoPanel.textContent =
`Current: ${current.toFixed(2)} A
Sphere Height: ${sphere.position.y.toFixed(2)} m
Sphere Velocity: ${velocity.toFixed(2)} m/s
Mass: ${mass.toFixed(2)} kg
Magnetic Force: ${magneticForce.toFixed(2)} N
Net Force: ${netForce.toFixed(2)} N`;
    }

    function updateState(coilGlowIntensity) {
      const isEquilibrium = Math.abs(velocity) < 0.05 && Math.abs(netForce) < 0.5;

      window.__3D_STATE__.power = powerOn;
      window.__3D_STATE__.current = current;
      window.__3D_STATE__.sliderValue = sliderValue;
      window.__3D_STATE__.sphereY = sphere.position.y;
      window.__3D_STATE__.sphereVelocity = velocity;
      window.__3D_STATE__.mass = mass;
      window.__3D_STATE__.magneticForce = magneticForce;
      window.__3D_STATE__.netForce = netForce;
      window.__3D_STATE__.fieldLinesVisible = current > 0.001;
      window.__3D_STATE__.coilGlowIntensity = coilGlowIntensity;
      window.__3D_STATE__.isEquilibrium = isEquilibrium;
      window.__3D_STATE__.frameCount = frameCount;
    }

    // ------------------------------------------------------------
    // Events
    // ------------------------------------------------------------
    currentSlider.addEventListener("input", () => {
      updateEffectiveCurrent();
    });

    powerButton.addEventListener("click", () => {
      powerOn = !powerOn;
      updateEffectiveCurrent();
    });

    addWeightButton.addEventListener("click", () => {
      mass = clamp(mass + 0.5, 1.0, 5.0);
      updateEffectiveCurrent();
    });

    resetButton.addEventListener("click", () => {
      resetSimulation();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") {
        const v = clamp(parseFloat(currentSlider.value) + 0.1, 0, 2);
        currentSlider.value = v.toFixed(2);
        updateEffectiveCurrent();
      } else if (e.key === "ArrowDown") {
        const v = clamp(parseFloat(currentSlider.value) - 0.1, 0, 2);
        currentSlider.value = v.toFixed(2);
        updateEffectiveCurrent();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ------------------------------------------------------------
    // Animation Loop
    // ------------------------------------------------------------
    function animate(now) {
      requestAnimationFrame(animate);
      frameCount++;

      let delta = (now - lastTime) / 1000;
      lastTime = now;
      delta = Math.min(delta, 0.1);
      accumulator += delta;

      while (accumulator >= fixedDt) {
        updatePhysics(fixedDt);
        accumulator -= fixedDt;
      }

      const coilGlowIntensity = updateCoilGlow();
      updateFieldLines();
      updateInfoPanel();
      updateState(coilGlowIntensity);

      renderer.render(scene, camera);
    }

    // Init
    resetSimulation();
    requestAnimationFrame((t) => {
      lastTime = t;
      animate(t);
    });
  </script>
</body>
</html>
