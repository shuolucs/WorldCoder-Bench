<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Levitation Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }

  .ui-panel {
    position: absolute;
    background: rgba(0, 0, 0, 0.7);
    color: #ffffff;
    font-family: monospace;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(100, 100, 255, 0.3);
  }

  #controlPanel {
    top: 15px;
    left: 15px;
    min-width: 220px;
  }

  #controlPanel label {
    display: block;
    margin-bottom: 5px;
    font-size: 13px;
  }

  #controlPanel input[type="range"] {
    width: 100%;
    margin-bottom: 10px;
    accent-color: #4a9eff;
  }

  #controlPanel button {
    display: block;
    width: 100%;
    padding: 8px;
    margin-bottom: 8px;
    background: rgba(74, 158, 255, 0.2);
    color: #ffffff;
    border: 1px solid rgba(74, 158, 255, 0.5);
    border-radius: 4px;
    font-family: monospace;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }

  #controlPanel button:hover {
    background: rgba(74, 158, 255, 0.4);
  }

  #powerButton.on {
    background: rgba(0, 255, 100, 0.3);
    border-color: rgba(0, 255, 100, 0.6);
  }

  #infoPanel {
    top: 15px;
    right: 15px;
    min-width: 240px;
    font-size: 13px;
    line-height: 1.8;
  }

  #infoPanel .label {
    color: #8888cc;
  }

  #infoPanel .value {
    color: #4a9eff;
    float: right;
  }

  .slider-value {
    color: #4a9eff;
    font-weight: bold;
  }
</style>
</head>
<body>

<div id="controlPanel" class="ui-panel">
  <label>Current (A): <span id="sliderDisplay" class="slider-value">0.00</span></label>
  <input type="range" id="currentSlider" min="0" max="2" step="0.01" value="0">
  <button id="powerButton">Power: OFF</button>
  <button id="addWeightButton">Add Weight (+0.5 kg)</button>
  <button id="resetButton">Reset</button>
  <div id="massDisplay" style="font-size: 12px; color: #aaa; margin-top: 5px;">Mass: 1.00 kg</div>
</div>

<div id="infoPanel" class="ui-panel">
  <div><span class="label">Current:</span><span class="value" id="dispCurrent">0.00 A</span></div>
  <div style="clear:both"></div>
  <div><span class="label">Sphere Height:</span><span class="value" id="dispHeight">1.10 m</span></div>
  <div style="clear:both"></div>
  <div><span class="label">Sphere Velocity:</span><span class="value" id="dispVelocity">0.00 m/s</span></div>
  <div style="clear:both"></div>
  <div><span class="label">Mass:</span><span class="value" id="dispMass">1.00 kg</span></div>
  <div style="clear:both"></div>
  <div><span class="label">Magnetic Force:</span><span class="value" id="dispMagForce">0.00 N</span></div>
  <div style="clear:both"></div>
  <div><span class="label">Net Force:</span><span class="value" id="dispNetForce">0.00 N</span></div>
  <div style="clear:both"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
// State
const state = {
  power: false,
  current: 0,
  sliderValue: 0,
  sphereY: 1.1,
  sphereVelocity: 0,
  mass: 1.0,
  magneticForce: 0,
  netForce: 0,
  fieldLinesVisible: false,
  coilGlowIntensity: 0,
  isEquilibrium: false,
  frameCount: 0
};
window.__3D_STATE__ = state;

// Physics constants
const GRAVITY = 9.81;
const K = 50.0;
const DAMPING = 0.95;
const DT = 1 / 60;
const COIL_Y = 0.4;
const MIN_Y = 1.1;
const MAX_Y = 6.0;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 4, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222233,
  metalness: 0.8,
  roughness: 0.4
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Electromagnet base
const baseGeom = new THREE.CylinderGeometry(1.5, 1.5, 0.6, 64);
const baseMat = new THREE.MeshStandardMaterial({
  color: 0xb87333,
  metalness: 0.85,
  roughness: 0.25
});
const base = new THREE.Mesh(baseGeom, baseMat);
base.position.set(0, 0.3, 0);
base.castShadow = true;
base.receiveShadow = true;
scene.add(base);

// Coil ring (torus)
const coilGeom = new THREE.TorusGeometry(1.0, 0.15, 16, 64);
const coilMat = new THREE.MeshStandardMaterial({
  color: 0x4488ff,
  metalness: 0.6,
  roughness: 0.3,
  emissive: 0x0044ff,
  emissiveIntensity: 0
});
const coil = new THREE.Mesh(coilGeom, coilMat);
coil.rotation.x = -Math.PI / 2;
coil.position.set(0, 0.4, 0);
scene.add(coil);

// Add a point light at the coil for glow effect
const coilLight = new THREE.PointLight(0x4488ff, 0, 5);
coilLight.position.set(0, 0.5, 0);
scene.add(coilLight);

// Levitating sphere
const sphereGeom = new THREE.SphereGeometry(0.5, 64, 64);
const sphereMat = new THREE.MeshStandardMaterial({
  color: 0xcccccc,
  metalness: 0.9,
  roughness: 0.1
});
const sphere = new THREE.Mesh(sphereGeom, sphereMat);
sphere.position.set(0, 1.1, 0);
sphere.castShadow = true;
scene.add(sphere);

// Environment map for reflections
const cubeRenderTarget = new THREE.WebGLCubeRenderTarget(256);
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRenderTarget);
sphereMat.envMap = cubeRenderTarget.texture;
sphereMat.envMapIntensity = 0.5;

// Magnetic field lines
const fieldLinesGroup = new THREE.Group();
scene.add(fieldLinesGroup);

const fieldLines = [];
const numFieldLines = 8;

for (let i = 0; i < numFieldLines; i++) {
  const angle = (i / numFieldLines) * Math.PI * 2;
  const lineMat = new THREE.LineBasicMaterial({
    color: 0x4488ff,
    transparent: true,
    opacity: 0
  });

  const points = [];
  const curve = createFieldLineCurve(angle, 2.5);
  const curvePoints = curve.getPoints(50);
  const lineGeom = new THREE.BufferGeometry().setFromPoints(curvePoints);
  const line = new THREE.Line(lineGeom, lineMat);
  fieldLines.push({ line, angle, material: lineMat });
  fieldLinesGroup.add(line);
}

function createFieldLineCurve(angle, sphereHeight) {
  const r = 1.0;
  const points = [];
  const startX = Math.cos(angle) * r;
  const startZ = Math.sin(angle) * r;

  points.push(new THREE.Vector3(startX, COIL_Y, startZ));
  points.push(new THREE.Vector3(startX * 0.8, COIL_Y + (sphereHeight - COIL_Y) * 0.25, startZ * 0.8));
  points.push(new THREE.Vector3(startX * 0.5, COIL_Y + (sphereHeight - COIL_Y) * 0.5, startZ * 0.5));
  points.push(new THREE.Vector3(startX * 0.25, COIL_Y + (sphereHeight - COIL_Y) * 0.75, startZ * 0.25));
  points.push(new THREE.Vector3(0, sphereHeight, 0));
  points.push(new THREE.Vector3(-startX * 0.25, sphereHeight + 0.5, -startZ * 0.25));
  points.push(new THREE.Vector3(-startX * 0.5, sphereHeight + 0.8, -startZ * 0.5));

  const curve = new THREE.CatmullRomCurve3(points);
  return curve;
}

function updateFieldLines(sphereHeight, currentVal) {
  for (let i = 0; i < numFieldLines; i++) {
    const fl = fieldLines[i];
    const curve = createFieldLineCurve(fl.angle, sphereHeight);
    const curvePoints = curve.getPoints(50);
    fl.line.geometry.dispose();
    fl.line.geometry = new THREE.BufferGeometry().setFromPoints(curvePoints);
    fl.material.opacity = Math.min(currentVal * 0.5, 0.8);
  }
}

// UI Elements
const currentSlider = document.getElementById('currentSlider');
const sliderDisplay = document.getElementById('sliderDisplay');
const powerButton = document.getElementById('powerButton');
const addWeightButton = document.getElementById('addWeightButton');
const resetButton = document.getElementById('resetButton');
const massDisplay = document.getElementById('massDisplay');

// Info panel elements
const dispCurrent = document.getElementById('dispCurrent');
const dispHeight = document.getElementById('dispHeight');
const dispVelocity = document.getElementById('dispVelocity');
const dispMass = document.getElementById('dispMass');
const dispMagForce = document.getElementById('dispMagForce');
const dispNetForce = document.getElementById('dispNetForce');

// Event listeners
currentSlider.addEventListener('input', () => {
  state.sliderValue = parseFloat(currentSlider.value);
  sliderDisplay.textContent = state.sliderValue.toFixed(2);
});

powerButton.addEventListener('click', () => {
  state.power = !state.power;
  powerButton.textContent = state.power ? 'Power: ON' : 'Power: OFF';
  if (state.power) {
    powerButton.classList.add('on');
  } else {
    powerButton.classList.remove('on');
  }
});

addWeightButton.addEventListener('click', () => {
  if (state.mass < 5.0) {
    state.mass = Math.min(state.mass + 0.5, 5.0);
    massDisplay.textContent = `Mass: ${state.mass.toFixed(2)} kg`;
  }
});

resetButton.addEventListener('click', () => {
  state.power = false;
  state.mass = 1.0;
  state.sphereY = 1.1;
  state.sphereVelocity = 0;
  state.sliderValue = 0;
  currentSlider.value = 0;
  sliderDisplay.textContent = '0.00';
  powerButton.textContent = 'Power: OFF';
  powerButton.classList.remove('on');
  massDisplay.textContent = 'Mass: 1.00 kg';
  sphere.position.y = 1.1;
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp') {
    state.sliderValue = Math.min(state.sliderValue + 0.1, 2.0);
    currentSlider.value = state.sliderValue;
    sliderDisplay.textContent = state.sliderValue.toFixed(2);
    e.preventDefault();
  } else if (e.key === 'ArrowDown') {
    state.sliderValue = Math.max(state.sliderValue - 0.1, 0);
    currentSlider.value = state.sliderValue;
    sliderDisplay.textContent = state.sliderValue.toFixed(2);
    e.preventDefault();
  }
});

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
let lastTime = performance.now();

function animate(time) {
  requestAnimationFrame(animate);

  state.frameCount++;

  // Effective current
  state.current = state.power ? state.sliderValue : 0;

  // Physics
  const distance = Math.max(state.sphereY - COIL_Y, 0.1);
  state.magneticForce = state.current > 0 ? (state.current * K) / (distance * distance) : 0;
  const gravityForce = GRAVITY * state.mass;
  state.netForce = state.magneticForce - gravityForce;
  const acceleration = state.netForce / state.mass;

  state.sphereVelocity += acceleration * DT;
  state.sphereVelocity *= DAMPING;
  state.sphereY += state.sphereVelocity * DT;

  // Clamp
  if (state.sphereY < MIN_Y) {
    state.sphereY = MIN_Y;
    state.sphereVelocity = Math.max(state.sphereVelocity, 0);
  }
  if (state.sphereY > MAX_Y) {
    state.sphereY = MAX_Y;
    state.sphereVelocity = Math.min(state.sphereVelocity, 0);
  }

  sphere.position.y = state.sphereY;

  // Equilibrium check
  state.isEquilibrium = Math.abs(state.sphereVelocity) < 0.05 && Math.abs(state.netForce) < 0.5;

  // Coil glow
  const baseGlow = state.current * 0.8;
  const pulseModulation = state.power ? (1 + 0.2 * Math.sin(time * 0.005)) : 1;
  state.coilGlowIntensity = baseGlow * pulseModulation;
  coilMat.emissiveIntensity = state.coilGlowIntensity;
  coilLight.intensity = state.coilGlowIntensity * 2;

  // Field lines
  state.fieldLinesVisible = state.current > 0;
  fieldLinesGroup.visible = state.fieldLinesVisible;
  if (state.fieldLinesVisible) {
    updateFieldLines(state.sphereY, state.current);
    fieldLinesGroup.rotation.y += 0.5 * DT;
  }

  // Sphere subtle rotation
  sphere.rotation.y += 0.01;

  // Update env map occasionally
  if (state.frameCount % 30 === 0) {
    sphere.visible = false;
    cubeCamera.position.copy(sphere.position);
    cubeCamera.update(renderer, scene);
    sphere.visible = true;
  }

  // Update HUD
  dispCurrent.textContent = `${state.current.toFixed(2)} A`;
  dispHeight.textContent = `${state.sphereY.toFixed(2)} m`;
  dispVelocity.textContent = `${state.sphereVelocity.toFixed(2)} m/s`;
  dispMass.textContent = `${state.mass.toFixed(2)} kg`;
  dispMagForce.textContent = `${state.magneticForce.toFixed(2)} N`;
  dispNetForce.textContent = `${state.netForce.toFixed(2)} N`;

  controls.update();
  renderer.render(scene, camera);
}

animate(0);
</script>
</body>
</html>
