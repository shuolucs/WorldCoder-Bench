<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Magnetic Field Lines - Bar Magnet</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .hud, #info-panel {
      position: absolute;
      z-index: 10;
      background: rgba(10, 10, 30, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      backdrop-filter: blur(6px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
      color: white;
    }

    .hud {
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      min-width: 760px;
      justify-content: center;
    }

    #info-panel {
      top: 16px;
      right: 16px;
      padding: 14px 16px;
      min-width: 240px;
      line-height: 1.7;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 600;
    }

    button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-1px);
    }

    input[type="range"] {
      width: 140px;
      accent-color: #66aaff;
    }

    .label {
      font-size: 14px;
      opacity: 0.9;
    }

    .value {
      font-weight: 700;
      color: #a8d7ff;
    }

    @media (max-width: 900px) {
      .hud {
        min-width: unset;
        width: calc(100% - 24px);
      }
    }
  </style>
</head>
<body>
  <div id="info-panel">
    <div><strong>Magnetic Moment:</strong> <span id="display-moment">1.00</span></div>
    <div><strong>Field Lines:</strong> <span id="display-lines-count">16</span></div>
    <div><strong>Status:</strong> <span id="display-status">PAUSED</span></div>
    <div style="margin-top:10px; opacity:0.8; font-size:13px;">
      Keys: Space Play/Pause, R Reset, ↑/↓ Speed, F Lines, A Arrows, 1/2/3 Views
    </div>
  </div>

  <div class="hud">
    <div class="control-group">
      <button id="btn-play-pause">Play</button>
    </div>

    <div class="control-group">
      <span class="label">Speed</span>
      <input id="slider-speed" type="range" min="0.1" max="5.0" step="0.1" value="1.0">
      <span class="value" id="speed-value">1.0x</span>
    </div>

    <div class="control-group">
      <button id="btn-reset">Reset</button>
    </div>

    <div class="control-group">
      <span class="label">Time</span>
      <span class="value" id="display-time">0.00 s</span>
    </div>

    <div class="control-group">
      <span class="label">Field Strength</span>
      <input id="slider-strength" type="range" min="0.5" max="3.0" step="0.1" value="1.0">
      <span class="value" id="strength-value">1.0</span>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a2e');

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 20, 0x222244, 0x222244);
    scene.add(grid);

    const magnetGroup = new THREE.Group();
    scene.add(magnetGroup);

    const leftGeom = new THREE.BoxGeometry(1.5, 0.8, 0.8);
    const rightGeom = new THREE.BoxGeometry(1.5, 0.8, 0.8);
    const southMat = new THREE.MeshPhongMaterial({ color: '#3344ff', shininess: 80 });
    const northMat = new THREE.MeshPhongMaterial({ color: '#ff3344', shininess: 80 });

    const southMesh = new THREE.Mesh(leftGeom, southMat);
    southMesh.position.x = -0.75;
    const northMesh = new THREE.Mesh(rightGeom, northMat);
    northMesh.position.x = 0.75;

    magnetGroup.add(southMesh, northMesh);

    function createTextSprite(text, color) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = 'bold 140px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = color;
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 8;
      ctx.strokeText(text, 128, 128);
      ctx.fillText(text, 128, 128);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(0.9, 0.9, 0.9);
      return sprite;
    }

    const northLabel = createTextSprite('N', '#ff8899');
    northLabel.position.set(1.9, 0.8, 0);
    const southLabel = createTextSprite('S', '#8899ff');
    southLabel.position.set(-1.9, 0.8, 0);
    scene.add(northLabel, southLabel);

    const fieldGroup = new THREE.Group();
    const arrowGroup = new THREE.Group();
    scene.add(fieldGroup, arrowGroup);

    let fieldLinesData = [];
    let testCharges = [];
    let frameCount = 0;

    const state = {
      isPlaying: false,
      simulationTime: 0,
      timeScale: 1.0,
      fieldStrength: 1.0,
      fieldLinesVisible: true,
      arrowsVisible: true,
      numFieldLines: 16,
      numTestCharges: 4,
      cameraView: 'perspective'
    };

    function dipoleField(pos, mMag = 1.0) {
      const m = new THREE.Vector3(mMag, 0, 0);
      const r = pos.clone();
      const rLen = r.length();
      if (rLen < 0.25) return new THREE.Vector3(0, 0, 0);
      const rHat = r.clone().normalize();
      const mdotr = m.dot(rHat);
      const term1 = rHat.clone().multiplyScalar(3 * mdotr);
      const B = term1.sub(m).multiplyScalar(1 / Math.pow(rLen, 3));
      return B;
    }

    function createGradientLine(points) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const colors = [];
      for (let i = 0; i < points.length; i++) {
        const t = i / (points.length - 1);
        const c = new THREE.Color().lerpColors(
          new THREE.Color('#ff3344'),
          new THREE.Color('#3344ff'),
          t
        );
        colors.push(c.r, c.g, c.b);
      }
      geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.95
      });
      return new THREE.Line(geometry, material);
    }

    function integrateFieldLine(startPoint, strength) {
      const points = [];
      let p = startPoint.clone();
      points.push(p.clone());

      for (let i = 0; i < 200; i++) {
        const B = dipoleField(p, strength);
        const len = B.length();
        if (len < 1e-5) break;
        const dir = B.normalize();
        p = p.clone().add(dir.multiplyScalar(0.15));
        points.push(p.clone());

        if (p.x < -1.7 && Math.abs(p.y) < 1.2 && Math.abs(p.z) < 1.2) break;
        if (p.length() > 12) break;
      }
      return points;
    }

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      }
    }

    function samplePointOnPolyline(points, t) {
      if (points.length < 2) return points[0]?.clone() || new THREE.Vector3();
      const segLengths = [];
      let total = 0;
      for (let i = 0; i < points.length - 1; i++) {
        const d = points[i].distanceTo(points[i + 1]);
        segLengths.push(d);
        total += d;
      }
      let target = t * total;
      for (let i = 0; i < segLengths.length; i++) {
        if (target <= segLengths[i]) {
          const a = points[i], b = points[i + 1];
          const localT = segLengths[i] === 0 ? 0 : target / segLengths[i];
          return a.clone().lerp(b, localT);
        }
        target -= segLengths[i];
      }
      return points[points.length - 1].clone();
    }

    function sampleTangentOnPolyline(points, t) {
      const p1 = samplePointOnPolyline(points, Math.max(0, t - 0.01));
      const p2 = samplePointOnPolyline(points, Math.min(1, t + 0.01));
      return p2.sub(p1).normalize();
    }

    function generateFieldLines() {
      clearGroup(fieldGroup);
      clearGroup(arrowGroup);
      fieldLinesData = [];

      const startRadius = 0.55;
      const northX = 1.55;

      const starts = [];

      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        starts.push(new THREE.Vector3(northX, Math.cos(a) * startRadius, Math.sin(a) * 0.001));
      }
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        starts.push(new THREE.Vector3(northX, Math.cos(a) * 0.001, Math.sin(a) * startRadius));
      }

      starts.forEach((start) => {
        const points = integrateFieldLine(start, state.fieldStrength);
        if (points.length < 2) return;

        const line = createGradientLine(points);
        fieldGroup.add(line);

        const arrows = [];
        [0.25, 0.5, 0.75].forEach(t => {
          const pos = samplePointOnPolyline(points, t);
          const tangent = sampleTangentOnPolyline(points, t);
          const coneGeom = new THREE.ConeGeometry(0.11, 0.3, 10);
          const coneMat = new THREE.MeshPhongMaterial({
            color: new THREE.Color().lerpColors(
              new THREE.Color('#ff3344'),
              new THREE.Color('#3344ff'),
              t
            ),
            emissive: 0x111111
          });
          const cone = new THREE.Mesh(coneGeom, coneMat);
          cone.position.copy(pos);

          const up = new THREE.Vector3(0, 1, 0);
          cone.quaternion.setFromUnitVectors(up, tangent.clone().normalize());
          arrows.push(cone);
          arrowGroup.add(cone);
        });

        fieldLinesData.push({ points, line, arrows });
      });

      fieldGroup.visible = state.fieldLinesVisible;
      arrowGroup.visible = state.arrowsVisible;

      document.getElementById('display-moment').textContent = state.fieldStrength.toFixed(2);
      document.getElementById('display-lines-count').textContent = fieldLinesData.length.toString();

      initTestCharges();
    }

    function createTrailLine(maxPoints = 30) {
      const positions = new Float32Array(maxPoints * 3);
      const colors = new Float32Array(maxPoints * 3);
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setDrawRange(0, 0);

      const material = new THREE.LineBasicMaterial({
        vertexColors: true,
        transparent: true,
        opacity: 0.7
      });

      const line = new THREE.Line(geometry, material);
      return line;
    }

    function initTestCharges() {
      testCharges.forEach(tc => {
        scene.remove(tc.mesh);
        scene.remove(tc.trail);
        tc.mesh.geometry.dispose();
        tc.mesh.material.dispose();
        tc.trail.geometry.dispose();
        tc.trail.material.dispose();
      });
      testCharges = [];

      const selectedIndices = [0, 4, 8, 12].filter(i => i < fieldLinesData.length);

      selectedIndices.forEach((idx, i) => {
        const geom = new THREE.SphereGeometry(0.15, 20, 20);
        const mat = new THREE.MeshPhongMaterial({
          color: 0xffffaa,
          emissive: 0xffcc66,
          emissiveIntensity: 1.4,
          shininess: 120
        });
        const mesh = new THREE.Mesh(geom, mat);
        const startPos = samplePointOnPolyline(fieldLinesData[idx].points, 0);
        mesh.position.copy(startPos);
        scene.add(mesh);

        const trail = createTrailLine(30);
        scene.add(trail);

        testCharges.push({
          fieldIndex: idx,
          mesh,
          progress: 0,
          trailPositions: [startPos.clone()],
          trail
        });
      });
    }

    function updateTrail(tc) {
      const maxPoints = 30;
      tc.trailPositions.push(tc.mesh.position.clone());
      if (tc.trailPositions.length > maxPoints) tc.trailPositions.shift();

      const posAttr = tc.trail.geometry.attributes.position;
      const colAttr = tc.trail.geometry.attributes.color;

      for (let i = 0; i < tc.trailPositions.length; i++) {
        const p = tc.trailPositions[i];
        posAttr.array[i * 3 + 0] = p.x;
        posAttr.array[i * 3 + 1] = p.y;
        posAttr.array[i * 3 + 2] = p.z;

        const alphaT = i / Math.max(1, tc.trailPositions.length - 1);
        const c = new THREE.Color().lerpColors(
          new THREE.Color(0x444444),
          new THREE.Color(0xffdd88),
          alphaT
        );
        colAttr.array[i * 3 + 0] = c.r;
        colAttr.array[i * 3 + 1] = c.g;
        colAttr.array[i * 3 + 2] = c.b;
      }

      posAttr.needsUpdate = true;
      colAttr.needsUpdate = true;
      tc.trail.geometry.setDrawRange(0, tc.trailPositions.length);
    }

    function resetSimulation() {
      state.simulationTime = 0;
      testCharges.forEach(tc => {
        tc.progress = 0;
        const points = fieldLinesData[tc.fieldIndex]?.points;
        if (!points) return;
        const startPos = samplePointOnPolyline(points, 0);
        tc.mesh.position.copy(startPos);
        tc.trailPositions = [startPos.clone()];
        updateTrail(tc);
      });
      updateHUD();
    }

    function updateHUD() {
      document.getElementById('display-time').textContent = `${state.simulationTime.toFixed(2)} s`;
      document.getElementById('display-status').textContent = state.isPlaying ? 'RUNNING' : 'PAUSED';
      document.getElementById('btn-play-pause').textContent = state.isPlaying ? 'Pause' : 'Play';
      document.getElementById('speed-value').textContent = `${state.timeScale.toFixed(1)}x`;
      document.getElementById('strength-value').textContent = `${state.fieldStrength.toFixed(1)}`;
      document.getElementById('display-moment').textContent = state.fieldStrength.toFixed(2);
      document.getElementById('display-lines-count').textContent = `${fieldLinesData.length}`;
    }

    function setView(view) {
      state.cameraView = view;
      if (view === 'xy') {
        camera.position.set(0, 0, 15);
      } else if (view === 'xz') {
        camera.position.set(0, 15, 0.001);
      } else {
        camera.position.set(0, 5, 12);
      }
      controls.target.set(0, 0, 0);
      controls.update();
    }

    document.getElementById('btn-play-pause').addEventListener('click', () => {
      state.isPlaying = !state.isPlaying;
      updateHUD();
    });

    document.getElementById('btn-reset').addEventListener('click', () => {
      resetSimulation();
    });

    document.getElementById('slider-speed').addEventListener('input', (e) => {
      state.timeScale = parseFloat(e.target.value);
      updateHUD();
    });

    document.getElementById('slider-strength').addEventListener('input', (e) => {
      state.fieldStrength = parseFloat(e.target.value);
      generateFieldLines();
      resetSimulation();
      updateHUD();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        state.isPlaying = !state.isPlaying;
      } else if (e.key.toLowerCase() === 'r') {
        resetSimulation();
      } else if (e.key === 'ArrowUp') {
        state.timeScale = Math.min(5.0, +(state.timeScale + 0.5).toFixed(1));
        document.getElementById('slider-speed').value = state.timeScale;
      } else if (e.key === 'ArrowDown') {
        state.timeScale = Math.max(0.1, +(state.timeScale - 0.5).toFixed(1));
        document.getElementById('slider-speed').value = state.timeScale;
      } else if (e.key.toLowerCase() === 'f') {
        state.fieldLinesVisible = !state.fieldLinesVisible;
        fieldGroup.visible = state.fieldLinesVisible;
      } else if (e.key.toLowerCase() === 'a') {
        state.arrowsVisible = !state.arrowsVisible;
        arrowGroup.visible = state.arrowsVisible;
      } else if (e.key === '1') {
        setView('xy');
      } else if (e.key === '2') {
        setView('xz');
      } else if (e.key === '3') {
        setView('perspective');
      }
      updateHUD();
    });

    const clock = new THREE.Clock();

    function updateStateExport() {
      window.__3D_STATE__ = {
        isPlaying: state.isPlaying,
        simulationTime: state.simulationTime,
        timeScale: state.timeScale,
        fieldStrength: state.fieldStrength,
        fieldLinesVisible: state.fieldLinesVisible,
        arrowsVisible: state.arrowsVisible,
        numFieldLines: 16,
        numTestCharges: 4,
        testChargePositions: testCharges.map(tc => ({
          x: +tc.mesh.position.x.toFixed(3),
          y: +tc.mesh.position.y.toFixed(3),
          z: +tc.mesh.position.z.toFixed(3)
        })),
        cameraPosition: {
          x: +camera.position.x.toFixed(1),
          y: +camera.position.y.toFixed(1),
          z: +camera.position.z.toFixed(1)
        },
        cameraView: state.cameraView,
        magnetPosition: { x: 0, y: 0, z: 0 },
        frameCount
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();
      const scaledDelta = delta * state.timeScale;

      if (state.isPlaying) {
        state.simulationTime += scaledDelta;

        testCharges.forEach((tc, idx) => {
          const speedBase = 0.045 + idx * 0.005;
          tc.progress += scaledDelta * speedBase;

          if (tc.progress > 1) {
            tc.progress = 0;
            tc.trailPositions = [];
          }

          const points = fieldLinesData[tc.fieldIndex]?.points;
          if (!points) return;
          const pos = samplePointOnPolyline(points, tc.progress);
          tc.mesh.position.copy(pos);

          const pulse = 1.2 + 0.4 * Math.sin(state.simulationTime * 4 + idx);
          tc.mesh.material.emissiveIntensity = pulse;

          updateTrail(tc);
        });
      }

      controls.update();
      updateHUD();
      updateStateExport();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    generateFieldLines();
    resetSimulation();
    updateHUD();
    updateStateExport();
    animate();
  </script>
</body>
</html>
