<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Magnetic Field Visualization</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#bottom-hud {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
    z-index: 100;
}

#bottom-hud button {
    background: rgba(100, 100, 255, 0.2);
    border: 1px solid rgba(100, 100, 255, 0.4);
    color: #fff;
    padding: 8px 18px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
}

#bottom-hud button:hover {
    background: rgba(100, 100, 255, 0.4);
    border-color: rgba(150, 150, 255, 0.6);
    transform: translateY(-1px);
}

#bottom-hud button:active {
    transform: translateY(0);
}

.hud-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
}

.hud-label {
    color: rgba(200, 200, 255, 0.7);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.hud-value {
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
}

input[type="range"] {
    -webkit-appearance: none;
    width: 120px;
    height: 4px;
    background: rgba(100, 100, 255, 0.3);
    border-radius: 2px;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #6666ff;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
}

input[type="range"]::-webkit-slider-thumb:hover {
    background: #8888ff;
}

#info-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 16px 20px;
    backdrop-filter: blur(10px);
    z-index: 100;
    min-width: 200px;
}

#info-panel h3 {
    color: rgba(200, 200, 255, 0.9);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.2);
}

.info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.info-row .label {
    color: rgba(200, 200, 255, 0.6);
    font-size: 11px;
}

.info-row .value {
    color: #fff;
    font-size: 13px;
    font-weight: 600;
}

#display-status {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px !important;
}

.status-paused { background: rgba(255, 200, 50, 0.2); color: #ffcc44 !important; }
.status-running { background: rgba(50, 255, 100, 0.2); color: #44ff88 !important; }

#keyboard-help {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 16px 20px;
    backdrop-filter: blur(10px);
    z-index: 100;
    font-size: 11px;
    color: rgba(200, 200, 255, 0.6);
    line-height: 1.8;
}

#keyboard-help h3 {
    color: rgba(200, 200, 255, 0.9);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.2);
}

kbd {
    background: rgba(100, 100, 255, 0.15);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: monospace;
    color: #aaaaff;
    font-size: 11px;
}
</style>
</head>
<body>

<div id="info-panel">
    <h3>Field Info</h3>
    <div class="info-row">
        <span class="label">Magnetic Moment</span>
        <span class="value" id="display-moment">1.00</span>
    </div>
    <div class="info-row">
        <span class="label">Field Lines</span>
        <span class="value" id="display-lines-count">16</span>
    </div>
    <div class="info-row">
        <span class="label">Status</span>
        <span class="value status-paused" id="display-status">PAUSED</span>
    </div>
</div>

<div id="keyboard-help">
    <h3>Controls</h3>
    <kbd>Space</kbd> Play/Pause<br>
    <kbd>R</kbd> Reset<br>
    <kbd>↑</kbd><kbd>↓</kbd> Speed ±0.5<br>
    <kbd>F</kbd> Toggle field lines<br>
    <kbd>A</kbd> Toggle arrows<br>
    <kbd>1</kbd> XY view<br>
    <kbd>2</kbd> XZ view<br>
    <kbd>3</kbd> Perspective view
</div>

<div id="bottom-hud">
    <button id="btn-play-pause">▶ Play</button>
    <div class="hud-group">
        <span class="hud-label">Speed</span>
        <input type="range" id="slider-speed" min="0.1" max="5.0" step="0.1" value="1.0">
        <span class="hud-value" id="speed-value">1.0x</span>
    </div>
    <div class="hud-group">
        <span class="hud-label">Field Strength</span>
        <input type="range" id="slider-strength" min="0.5" max="3.0" step="0.1" value="1.0">
        <span class="hud-value" id="strength-value">1.0</span>
    </div>
    <button id="btn-reset">↺ Reset</button>
    <div class="hud-group">
        <span class="hud-label">Time</span>
        <span class="hud-value" id="display-time">0.00s</span>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
const state = {
    isPlaying: false,
    simulationTime: 0,
    timeScale: 1.0,
    fieldStrength: 1.0,
    fieldLinesVisible: true,
    arrowsVisible: true,
    numFieldLines: 16,
    numTestCharges: 4,
    testChargePositions: [{x:0,y:0,z:0},{x:0,y:0,z:0},{x:0,y:0,z:0},{x:0,y:0,z:0}],
    cameraPosition: {x:0, y:5, z:12},
    cameraView: 'perspective',
    magnetPosition: {x:0, y:0, z:0},
    frameCount: 0
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x222244);
scene.add(gridHelper);

// ============ BAR MAGNET ============
const magnetGroup = new THREE.Group();
scene.add(magnetGroup);

// North pole (right, red)
const northGeo = new THREE.BoxGeometry(1.5, 0.8, 0.8);
const northMat = new THREE.MeshPhongMaterial({ color: 0xff3344, shininess: 80 });
const northMesh = new THREE.Mesh(northGeo, northMat);
northMesh.position.set(0.75, 0, 0);
magnetGroup.add(northMesh);

// South pole (left, blue)
const southGeo = new THREE.BoxGeometry(1.5, 0.8, 0.8);
const southMat = new THREE.MeshPhongMaterial({ color: 0x3344ff, shininess: 80 });
const southMesh = new THREE.Mesh(southGeo, southMat);
southMesh.position.set(-0.75, 0, 0);
magnetGroup.add(southMesh);

// Text labels
function createTextSprite(text, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color;
    ctx.font = 'bold 90px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(0.6, 0.6, 0.6);
    return sprite;
}

const nLabel = createTextSprite('N', '#ffffff');
nLabel.position.set(1.5, 0.7, 0);
magnetGroup.add(nLabel);

const sLabel = createTextSprite('S', '#ffffff');
sLabel.position.set(-1.5, 0.7, 0);
magnetGroup.add(sLabel);

// ============ MAGNETIC FIELD COMPUTATION ============
function magneticField(pos, moment) {
    const r = pos.length();
    if (r < 0.5) {
        // Inside magnet, return direction along moment
        return new THREE.Vector3(moment, 0, 0).multiplyScalar(0.5);
    }
    const r3 = r * r * r;
    const r5 = r3 * r * r;
    const m = new THREE.Vector3(moment, 0, 0);
    const mDotR = m.dot(pos);
    
    // B = (3(m·r)r/r^5 - m/r^3)
    const B = new THREE.Vector3();
    B.copy(pos).multiplyScalar(3 * mDotR / r5);
    B.sub(new THREE.Vector3().copy(m).multiplyScalar(1 / r3));
    return B;
}

// ============ FIELD LINE GENERATION ============
let fieldLinesGroup = new THREE.Group();
scene.add(fieldLinesGroup);

let arrowsGroup = new THREE.Group();
scene.add(arrowsGroup);

let fieldLinePaths = []; // Store computed paths for test charges

function generateFieldLines(momentStrength) {
    // Clear existing
    while (fieldLinesGroup.children.length > 0) {
        const child = fieldLinesGroup.children[0];
        fieldLinesGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
    }
    while (arrowsGroup.children.length > 0) {
        const child = arrowsGroup.children[0];
        arrowsGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
    }
    
    fieldLinePaths = [];
    
    const startAngles = [];
    
    // 8 lines in XY plane
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        startAngles.push({ y: Math.sin(angle), z: 0, cos: Math.cos(angle), plane: 'xy' });
    }
    
    // 8 lines in XZ plane
    for (let i = 0; i < 8; i++) {
        const angle = (i / 8) * Math.PI * 2;
        startAngles.push({ y: 0, z: Math.sin(angle), cos: Math.cos(angle), plane: 'xz' });
    }
    
    const stepSize = 0.15;
    const numSteps = 200;
    
    startAngles.forEach((sa, lineIndex) => {
        // Start from north pole surface
        const startRadius = 0.5;
        const startX = 1.5 + startRadius * Math.abs(sa.cos);
        const startY = startRadius * sa.y;
        const startZ = startRadius * sa.z;
        
        const points = [];
        const pos = new THREE.Vector3(startX, startY, startZ);
        points.push(pos.clone());
        
        let reachedSouth = false;
        
        for (let step = 0; step < numSteps; step++) {
            const B = magneticField(pos, momentStrength);
            const Bmag = B.length();
            if (Bmag < 0.0001) break;
            
            B.normalize().multiplyScalar(stepSize);
            pos.add(B);
            points.push(pos.clone());
            
            // Check if we've reached the south pole region
            if (pos.x < -1.2 && Math.abs(pos.y) < 1.0 && Math.abs(pos.z) < 1.0) {
                reachedSouth = true;
                break;
            }
            
            // Stop if too far
            if (pos.length() > 15) break;
        }
        
        if (points.length < 5) return;
        
        fieldLinePaths.push(points);
        
        // Create colored line
        const curve = new THREE.CatmullRomCurve3(points);
        const curvePoints = curve.getPoints(200);
        
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(curvePoints.length * 3);
        const colors = new Float32Array(curvePoints.length * 3);
        
        const redColor = new THREE.Color(0xff3344);
        const blueColor = new THREE.Color(0x3344ff);
        
        for (let i = 0; i < curvePoints.length; i++) {
            positions[i * 3] = curvePoints[i].x;
            positions[i * 3 + 1] = curvePoints[i].y;
            positions[i * 3 + 2] = curvePoints[i].z;
            
            const t = i / (curvePoints.length - 1);
            const color = new THREE.Color().lerpColors(redColor, blueColor, t);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const material = new THREE.LineBasicMaterial({ vertexColors: true, linewidth: 2, transparent: true, opacity: 0.8 });
        const line = new THREE.Line(geometry, material);
        fieldLinesGroup.add(line);
        
        // Add arrow cones at 25%, 50%, 75%
        [0.25, 0.5, 0.75].forEach(fraction => {
            const idx = Math.floor(fraction * (curvePoints.length - 2));
            const arrowPos = curvePoints[idx];
            const nextPos = curvePoints[Math.min(idx + 1, curvePoints.length - 1)];
            
            const dir = new THREE.Vector3().subVectors(nextPos, arrowPos).normalize();
            
            const t = fraction;
            const arrowColor = new THREE.Color().lerpColors(redColor, blueColor, t);
            
            const coneGeo = new THREE.ConeGeometry(0.08, 0.3, 8);
            const coneMat = new THREE.MeshPhongMaterial({ color: arrowColor, emissive: arrowColor, emissiveIntensity: 0.3 });
            const cone = new THREE.Mesh(coneGeo, coneMat);
            
            cone.position.copy(arrowPos);
            
            // Orient cone along direction
            const up = new THREE.Vector3(0, 1, 0);
            const quaternion = new THREE.Quaternion().setFromUnitVectors(up, dir);
            cone.setRotationFromQuaternion(quaternion);
            
            arrowsGroup.add(cone);
        });
    });
}

generateFieldLines(state.fieldStrength);

// ============ TEST CHARGES ============
const testCharges = [];
const testChargeTrails = [];
const numTestCharges = 4;
const chargeLineIndices = [0, 2, 4, 6]; // Pick 4 field lines from the first 8 (XY plane)

for (let i = 0; i < numTestCharges; i++) {
    // Glowing sphere
    const geo = new THREE.SphereGeometry(0.15, 16, 16);
    const mat = new THREE.MeshPhongMaterial({
        color: 0x44ffaa,
        emissive: 0x44ffaa,
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.9
    });
    const mesh = new THREE.Mesh(geo, mat);
    
    // Add a point light for glow effect
    const glow = new THREE.PointLight(0x44ffaa, 0.5, 3);
    mesh.add(glow);
    
    scene.add(mesh);
    
    testCharges.push({
        mesh: mesh,
        lineIndex: chargeLineIndices[i],
        progress: 0, // 0 to 1
        trailPositions: []
    });
    
    // Trail line
    const trailGeo = new THREE.BufferGeometry();
    const trailPositions = new Float32Array(30 * 3);
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
    const trailColors = new Float32Array(30 * 3);
    trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
    trailGeo.setDrawRange(0, 0);
    
    const trailMat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.6 });
    const trailLine = new THREE.Line(trailGeo, trailMat);
    scene.add(trailLine);
    testChargeTrails.push(trailLine);
}

function getPositionOnFieldLine(lineIndex, progress) {
    if (lineIndex >= fieldLinePaths.length || fieldLinePaths[lineIndex].length < 2) {
        return new THREE.Vector3(1.5, 0, 0);
    }
    const path = fieldLinePaths[lineIndex];
    const t = Math.max(0, Math.min(1, progress));
    const idx = t * (path.length - 1);
    const i0 = Math.floor(idx);
    const i1 = Math.min(i0 + 1, path.length - 1);
    const frac = idx - i0;
    
    return new THREE.Vector3().lerpVectors(path[i0], path[i1], frac);
}

function resetTestCharges() {
    testCharges.forEach((tc, i) => {
        tc.progress = 0;
        tc.trailPositions = [];
        const pos = getPositionOnFieldLine(tc.lineIndex, 0);
        tc.mesh.position.copy(pos);
        
        const trailLine = testChargeTrails[i];
        trailLine.geometry.setDrawRange(0, 0);
    });
}

resetTestCharges();

// ============ UI HANDLERS ============
const btnPlayPause = document.getElementById('btn-play-pause');
const sliderSpeed = document.getElementById('slider-speed');
const sliderStrength = document.getElementById('slider-strength');
const btnReset = document.getElementById('btn-reset');
const displayTime = document.getElementById('display-time');
const displayMoment = document.getElementById('display-moment');
const displayLinesCount = document.getElementById('display-lines-count');
const displayStatus = document.getElementById('display-status');
const speedValue = document.getElementById('speed-value');
const strengthValue = document.getElementById('strength-value');

btnPlayPause.addEventListener('click', () => {
    state.isPlaying = !state.isPlaying;
    updatePlayPauseButton();
});

function updatePlayPauseButton() {
    btnPlayPause.textContent = state.isPlaying ? '⏸ Pause' : '▶ Play';
    displayStatus.textContent = state.isPlaying ? 'RUNNING' : 'PAUSED';
    displayStatus.className = state.isPlaying ? 'value status-running' : 'value status-paused';
}

sliderSpeed.addEventListener('input', () => {
    state.timeScale = parseFloat(sliderSpeed.value);
    speedValue.textContent = state.timeScale.toFixed(1) + 'x';
});

sliderStrength.addEventListener('input', () => {
    state.fieldStrength = parseFloat(sliderStrength.value);
    strengthValue.textContent = state.fieldStrength.toFixed(1);
    displayMoment.textContent = state.fieldStrength.toFixed(2);
    generateFieldLines(state.fieldStrength);
    fieldLinesGroup.visible = state.fieldLinesVisible;
    arrowsGroup.visible = state.arrowsVisible;
    resetTestCharges();
});

btnReset.addEventListener('click', () => {
    state.simulationTime = 0;
    resetTestCharges();
    displayTime.textContent = '0.00s';
});

// ============ KEYBOARD CONTROLS ============
document.addEventListener('keydown', (e) => {
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            state.isPlaying = !state.isPlaying;
            updatePlayPauseButton();
            break;
        case 'KeyR':
            state.simulationTime = 0;
            resetTestCharges();
            displayTime.textContent = '0.00s';
            break;
        case 'ArrowUp':
            e.preventDefault();
            state.timeScale = Math.min(5.0, state.timeScale + 0.5);
            state.timeScale = Math.round(state.timeScale * 10) / 10;
            sliderSpeed.value = state.timeScale;
            speedValue.textContent = state.timeScale.toFixed(1) + 'x';
            break;
        case 'ArrowDown':
            e.preventDefault();
            state.timeScale = Math.max(0.1, state.timeScale - 0.5);
            state.timeScale = Math.round(state.timeScale * 10) / 10;
            sliderSpeed.value = state.timeScale;
            speedValue.textContent = state.timeScale.toFixed(1) + 'x';
            break;
        case 'KeyF':
            state.fieldLinesVisible = !state.fieldLinesVisible;
            fieldLinesGroup.visible = state.fieldLinesVisible;
            break;
        case 'KeyA':
            state.arrowsVisible = !state.arrowsVisible;
            arrowsGroup.visible = state.arrowsVisible;
            break;
        case 'Digit1':
            camera.position.set(0, 0, 15);
            controls.target.set(0, 0, 0);
            controls.update();
            state.cameraView = 'xy';
            break;
        case 'Digit2':
            camera.position.set(0, 15, 0);
            controls.target.set(0, 0, 0);
            controls.update();
            state.cameraView = 'xz';
            break;
        case 'Digit3':
            camera.position.set(0, 5, 12);
            controls.target.set(0, 0, 0);
            controls.update();
            state.cameraView = 'perspective';
            break;
    }
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    
    controls.update();
    
    if (state.isPlaying) {
        const dt = delta * state.timeScale;
        state.simulationTime += dt;
        
        // Update test charges
        testCharges.forEach((tc, i) => {
            tc.progress += dt * 0.08; // Speed of travel along line
            if (tc.progress > 1) tc.progress = 0; // Loop
            
            const pos = getPositionOnFieldLine(tc.lineIndex, tc.progress);
            tc.mesh.position.copy(pos);
            
            // Update trail
            tc.trailPositions.push(pos.clone());
            if (tc.trailPositions.length > 30) {
                tc.trailPositions.shift();
            }
            
            // Update trail geometry
            const trailLine = testChargeTrails[i];
            const posAttr = trailLine.geometry.getAttribute('position');
            const colAttr = trailLine.geometry.getAttribute('color');
            const count = tc.trailPositions.length;
            
            for (let j = 0; j < count; j++) {
                posAttr.array[j * 3] = tc.trailPositions[j].x;
                posAttr.array[j * 3 + 1] = tc.trailPositions[j].y;
                posAttr.array[j * 3 + 2] = tc.trailPositions[j].z;
                
                const opacity = j / count;
                colAttr.array[j * 3] = 0.27 * opacity;
                colAttr.array[j * 3 + 1] = 1.0 * opacity;
                colAttr.array[j * 3 + 2] = 0.67 * opacity;
            }
            
            posAttr.needsUpdate = true;
            colAttr.needsUpdate = true;
            trailLine.geometry.setDrawRange(0, count);
        });
        
        displayTime.textContent = state.simulationTime.toFixed(2) + 's';
    }
    
    // Pulse test charge glow
    const pulse = 0.6 + 0.4 * Math.sin(performance.now() * 0.005);
    testCharges.forEach(tc => {
        tc.mesh.material.emissiveIntensity = pulse;
        if (tc.mesh.children[0]) {
            tc.mesh.children[0].intensity = 0.3 + 0.3 * pulse;
        }
    });
    
    // Update state
    state.testChargePositions = testCharges.map(tc => ({
        x: parseFloat(tc.mesh.position.x.toFixed(3)),
        y: parseFloat(tc.mesh.position.y.toFixed(3)),
        z: parseFloat(tc.mesh.position.z.toFixed(3))
    }));
    
    state.cameraPosition = {
        x: parseFloat(camera.position.x.toFixed(1)),
        y: parseFloat(camera.position.y.toFixed(1)),
        z: parseFloat(camera.position.z.toFixed(1))
    };
    
    state.frameCount++;
    
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
displayLinesCount.textContent = '16';
displayMoment.textContent = '1.00';
updatePlayPauseButton();

animate();
</script>
</body>
