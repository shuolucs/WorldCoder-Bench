<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gas Pressure Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            min-width: 250px;
            border: 1px solid #333;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
        }
        .controls-help {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #444;
            font-size: 0.9em;
            color: #888;
        }
    </style>
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="hud">
        <div class="hud-row"><span class="hud-label">Status:</span> <span id="statusDisplay" class="hud-value">Running</span></div>
        <div class="hud-row"><span class="hud-label">Pressure:</span> <span id="pressureDisplay" class="hud-value">0.00</span></div>
        <div class="hud-row"><span class="hud-label">Temperature:</span> <span id="temperatureDisplay" class="hud-value">0.00</span></div>
        <div class="hud-row"><span class="hud-label">Volume:</span> <span id="volumeDisplay" class="hud-value">0.00</span></div>
        <div class="hud-row"><span class="hud-label">Piston Y:</span> <span id="pistonDisplay" class="hud-value">4.00</span></div>
        <div class="hud-row"><span class="hud-label">Particles:</span> <span id="particleDisplay" class="hud-value">50</span></div>
        <div class="hud-row"><span class="hud-label">Heat Boost:</span> <span id="heatDisplay" class="hud-value">Off</span></div>
        
        <div class="controls-help">
            [↑/↓] Move Piston<br>
            [H] Toggle Heat Boost<br>
            [R] Reset Simulation<br>
            [Click] Pause/Resume
        </div>
    </div>

    <script>
        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // --- Objects ---
        let pistonY = 4;
        const containerSize = 8;
        const halfSize = containerSize / 2;

        // Dynamic Container Visuals
        const contGeo = new THREE.BoxGeometry(containerSize, 1, containerSize);
        const contMat = new THREE.MeshBasicMaterial({ 
            color: 0x4488ff, 
            transparent: true, 
            opacity: 0.15, 
            side: THREE.BackSide,
            depthWrite: false
        });
        const containerMesh = new THREE.Mesh(contGeo, contMat);
        scene.add(containerMesh);

        const edgesGeo = new THREE.EdgesGeometry(contGeo);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0x4488ff });
        const containerEdges = new THREE.LineSegments(edgesGeo, edgesMat);
        scene.add(containerEdges);

        function updateContainerVisual() {
            const height = pistonY - (-halfSize);
            containerMesh.scale.y = height;
            containerMesh.position.y = -halfSize + height / 2;
            containerEdges.scale.y = height;
            containerEdges.position.y = -halfSize + height / 2;
        }

        // Piston
        const pistonGeo = new THREE.BoxGeometry(containerSize, 0.3, containerSize);
        const pistonMat = new THREE.MeshStandardMaterial({ 
            color: 0x888888, 
            metalness: 0.8, 
            roughness: 0.2 
        });
        const piston = new THREE.Mesh(pistonGeo, pistonMat);
        scene.add(piston);

        // Particles
        const numParticles = 50;
        const particleRadius = 0.15;
        const particleMass = 1.0;
        const particles = [];
        const sphereGeo = new THREE.SphereGeometry(particleRadius, 16, 16);

        function initParticles() {
            // Remove existing
            particles.forEach(p => scene.remove(p.mesh));
            particles.length = 0;

            for (let i = 0; i < numParticles; i++) {
                // Warm colors: Hue 0 (red) to 60 (yellow)
                const hue = Math.random() * 60;
                const mat = new THREE.MeshStandardMaterial({ 
                    color: new THREE.Color(`hsl(${hue}, 100%, 50%)`) 
                });
                const mesh = new THREE.Mesh(sphereGeo, mat);

                // Random position within bounds
                const x = (Math.random() - 0.5) * (containerSize - 2 * particleRadius);
                const z = (Math.random() - 0.5) * (containerSize - 2 * particleRadius);
                const y = -halfSize + particleRadius + Math.random() * (pistonY - (-halfSize) - 2 * particleRadius);
                mesh.position.set(x, y, z);
                scene.add(mesh);

                // Random velocity (magnitude 1 to 3 per axis)
                const vx = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? 1 : -1);
                const vy = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? 1 : -1);
                const vz = (Math.random() * 2 + 1) * (Math.random() < 0.5 ? 1 : -1);

                particles.push({
                    mesh: mesh,
                    v: new THREE.Vector3(vx, vy, vz)
                });
            }
        }

        // --- Physics & State Variables ---
        let isPaused = false;
        let heatBoost = false;
        let accumulatedImpulse = 0;
        let pressureTimer = 0;
        let currentPressure = 0;
        let simTime = 0;

        // Initialize State Object
        window.__3D_STATE__ = {
            particleCount: numParticles,
            pistonY: pistonY,
            volume: 0,
            pressure: 0,
            temperature: 0,
            isPaused: false,
            heatBoost: false,
            avgSpeed: 0,
            simTime: 0,
            particlesValid: true,
            allParticlesInBounds: true,
            pistonClamped: true
        };

        // Initial Setup
        updateContainerVisual();
        piston.position.y = pistonY;
        initParticles();

        // --- Interactions ---
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') {
                pistonY = Math.min(7, pistonY + 0.5);
                piston.position.y = pistonY;
                updateContainerVisual();
            } else if (e.key === 'ArrowDown') {
                pistonY = Math.max(2, pistonY - 0.5);
                piston.position.y = pistonY;
                updateContainerVisual();
                
                // Push particles down
                particles.forEach(p => {
                    if (p.mesh.position.y > pistonY - 0.15) {
                        p.mesh.position.y = pistonY - 0.2;
                        if (p.v.y > 0) p.v.y *= -1;
                    }
                });
            } else if (e.key === 'h' || e.key === 'H') {
                heatBoost = !heatBoost;
                const factor = heatBoost ? 1.5 : (1 / 1.5);
                particles.forEach(p => p.v.multiplyScalar(factor));
            } else if (e.key === 'r' || e.key === 'R') {
                pistonY = 4;
                piston.position.y = pistonY;
                updateContainerVisual();
                heatBoost = false;
                accumulatedImpulse = 0;
                pressureTimer = 0;
                currentPressure = 0;
                simTime = 0;
                initParticles();
            }
        });

        renderer.domElement.addEventListener('click', () => {
            isPaused = !isPaused;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // DOM Elements
            const elPressure = document.getElementById('pressureDisplay');
            const elTemp = document.getElementById('temperatureDisplay');
            const elVol = document.getElementById('volumeDisplay');
            const elPiston = document.getElementById('pistonDisplay');
            const elStatus = document.getElementById('statusDisplay');
            const elHeat = document.getElementById('heatDisplay');

            if (!isPaused) {
                simTime += dt;
                pressureTimer += dt;

                let totalKE = 0;
                let speedSum = 0;
                let allInBounds = true;
                let valid = true;

                const limitX = halfSize - particleRadius;
                const limitZ = halfSize - particleRadius;
                const limitYMin = -halfSize + particleRadius;

                particles.forEach(p => {
                    // Move
                    p.mesh.position.addScaledVector(p.v, dt);

                    const pos = p.mesh.position;
                    const v = p.v;
                    const limitYMax = pistonY - particleRadius;

                    if (isNaN(pos.x) || isNaN(v.x)) valid = false;

                    // Collision X
                    if (pos.x > limitX) { pos.x = limitX; v.x = -Math.abs(v.x); accumulatedImpulse += 2 * particleMass * Math.abs(v.x); }
                    else if (pos.x < -limitX) { pos.x = -limitX; v.x = Math.abs(v.x); accumulatedImpulse += 2 * particleMass * Math.abs(v.x); }

                    // Collision Z
                    if (pos.z > limitZ) { pos.z = limitZ; v.z = -Math.abs(v.z); accumulatedImpulse += 2 * particleMass * Math.abs(v.z); }
                    else if (pos.z < -limitZ) { pos.z = -limitZ; v.z = Math.abs(v.z); accumulatedImpulse += 2 * particleMass * Math.abs(v.z); }

                    // Collision Y
                    if (pos.y < limitYMin) { pos.y = limitYMin; v.y = Math.abs(v.y); accumulatedImpulse += 2 * particleMass * Math.abs(v.y); }
                    else if (pos.y > limitYMax) { pos.y = limitYMax; v.y = -Math.abs(v.y); accumulatedImpulse += 2 * particleMass * Math.abs(v.y); }

                    // Kinematics
                    const speedSq = v.lengthSq();
                    const speed = Math.sqrt(speedSq);
                    totalKE += 0.5 * particleMass * speedSq;
                    speedSum += speed;

                    // Bounds check for state
                    if (pos.x > halfSize || pos.x < -halfSize || pos.z > halfSize || pos.z < -halfSize || pos.y < -halfSize || pos.y > pistonY) {
                        allInBounds = false;
                    }
                });

                // Calculate macroscopic properties
                const avgKE = totalKE / numParticles;
                const temperature = (2 / 3) * avgKE;
                const avgSpeed = speedSum / numParticles;
                const height = pistonY - (-halfSize);
                const volume = containerSize * containerSize * height;

                // Pressure calculation every 1 second
                if (pressureTimer >= 1.0) {
                    const floorArea = containerSize * containerSize;
                    const ceilingArea = containerSize * containerSize;
                    const wallsArea = 4 * (containerSize * height);
                    const totalArea = floorArea + ceilingArea + wallsArea;
                    
                    currentPressure = accumulatedImpulse / totalArea;
                    accumulatedImpulse = 0;
                    pressureTimer -= 1.0;
                }

                // Update HUD
                elPressure.innerText = currentPressure.toFixed(2);
                elTemp.innerText = temperature.toFixed(2);
                elVol.innerText = volume.toFixed(2);
                elPiston.innerText = pistonY.toFixed(2);
                elStatus.innerText = 'Running';
                elStatus.style.color = '#4f4';
                elHeat.innerText = heatBoost ? 'On' : 'Off';
                elHeat.style.color = heatBoost ? '#f44' : '#fff';

                // Update Global State
                window.__3D_STATE__ = {
                    particleCount: numParticles,
                    pistonY: pistonY,
                    volume: volume,
                    pressure: currentPressure,
                    temperature: temperature,
                    isPaused: false,
                    heatBoost: heatBoost,
                    avgSpeed: avgSpeed,
                    simTime: simTime,
                    particlesValid: valid,
                    allParticlesInBounds: allInBounds,
                    pistonClamped: pistonY >= 2 && pistonY <= 7
                };

            } else {
                elStatus.innerText = 'Paused';
                elStatus.style.color = '#ff4';
                window.__3D_STATE__.isPaused = true;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
