<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js L-System Nefertiti Growth</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
    }
    #hud, #stats-display, #export-btn {
      position: absolute;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 10px 12px;
      z-index: 10;
      user-select: none;
    }
    #hud {
      top: 12px;
      left: 12px;
      min-width: 170px;
    }
    #export-btn {
      top: 12px;
      right: 12px;
      cursor: pointer;
    }
    #stats-display {
      top: 58px;
      right: 12px;
      min-width: 220px;
      min-height: 40px;
      white-space: pre-line;
    }
  </style>
</head>
<body>
  <div id="hud">Generation: 0/5<br>Segments: 0</div>
  <button id="export-btn">Export Stats</button>
  <div id="stats-display"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: '#0d3b0d' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const hud = document.getElementById('hud');
    const exportBtn = document.getElementById('export-btn');
    const statsDisplay = document.getElementById('stats-display');

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const AXIOM_BASE = 'F';
    const RULES = { F: 'FF+[+F-F-F]-[-F+F+F]' };
    const BRANCH_ANGLE = 25;
    const ANGLE_RAD = THREE.MathUtils.degToRad(BRANCH_ANGLE);
    const SEGMENT_RADIUS = 0.03;
    const SEGMENT_LENGTH = 0.15;
    const MAX_GENERATION = 5;
    const GROWTH_DURATION = 2.0;
    const PLANT_COUNT = 6;
    const SEED_RADIUS = 2.5;

    const seedPositions = [];
    for (let i = 0; i < 6; i++) {
      const deg = i * 60;
      const rad = THREE.MathUtils.degToRad(deg);
      seedPositions.push(new THREE.Vector3(Math.cos(rad) * SEED_RADIUS, 0, Math.sin(rad) * SEED_RADIUS));
    }

    const state = {
      modelLoaded: false,
      generation: 0,
      totalSegments: 0,
      plantCount: 6,
      colorMode: 'green',
      leavesEnabled: false,
      leafCount: 0,
      windEnabled: false,
      lastClickedPlant: -1,
      growthAnimating: false,
      cameraDistance: camera.position.length(),
      axiom: 'F',
      segmentRadius: 0.03,
      branchAngle: 25,
      statsExported: false
    };
    window.__3D_STATE__ = state;

    const plantsRoot = new THREE.Group();
    scene.add(plantsRoot);

    const plantGroups = [];
    const plantData = [];

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function expandLSystem(generation) {
      if (generation === 0) return AXIOM_BASE;
      let current = AXIOM_BASE;
      for (let i = 0; i < generation; i++) {
        let next = '';
        for (const ch of current) next += RULES[ch] || ch;
        current = next;
      }
      return current;
    }

    function countSegmentsInString(str) {
      let count = 0;
      for (const ch of str) if (ch === 'F') count++;
      return count;
    }

    function branchTipIndices(str) {
      const tips = new Set();
      for (let i = 0; i < str.length; i++) {
        if (str[i] !== 'F') continue;
        let isTip = false;
        if (i === str.length - 1) isTip = true;
        else {
          const next = str[i + 1];
          if (next === ']') isTip = true;
        }
        if (isTip) tips.add(i);
      }
      return tips;
    }

    function colorForSegment(index, total, isTipZone) {
      if (state.colorMode === 'autumn') {
        return new THREE.Color(isTipZone ? '#FF6347' : '#8B4513');
      }
      const base = new THREE.Color('#2d5a1e');
      const hsl = {};
      base.getHSL(hsl);
      const variation = (Math.sin(index * 12.9898) * 43758.5453) % 1;
      const offset = ((variation || 0) - 0.5) * 0.08;
      const c = new THREE.Color();
      c.setHSL(hsl.h, THREE.MathUtils.clamp(hsl.s + offset * 0.3, 0, 1), THREE.MathUtils.clamp(hsl.l + offset, 0, 1));
      return c;
    }

    function clearPlants() {
      while (plantsRoot.children.length) {
        const child = plantsRoot.children.pop();
        child.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose();
          if (obj.material) {
            if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
            else obj.material.dispose();
          }
        });
      }
      plantGroups.length = 0;
      plantData.length = 0;
      state.leafCount = 0;
    }

    function createSegmentMesh(color) {
      const geometry = new THREE.CylinderGeometry(SEGMENT_RADIUS, SEGMENT_RADIUS, SEGMENT_LENGTH, 8);
      const material = new THREE.MeshStandardMaterial({
        color,
        emissive: 0x000000,
        roughness: 0.8,
        metalness: 0.05
      });
      return new THREE.Mesh(geometry, material);
    }

    function createLeafMesh() {
      return new THREE.Mesh(
        new THREE.SphereGeometry(0.04, 8, 8),
        new THREE.MeshStandardMaterial({
          color: '#4a7c2f',
          roughness: 0.7,
          metalness: 0.05
        })
      );
    }

    function buildSinglePlant(lstring, seedPos, plantIndex) {
      const plantGroup = new THREE.Group();
      plantGroup.position.copy(seedPos);
      plantGroup.userData.plantIndex = plantIndex;
      plantGroup.userData.isPlantRoot = true;

      const growthGroup = new THREE.Group();
      plantGroup.add(growthGroup);

      const stack = [];
      const tipSet = branchTipIndices(lstring);
      const totalF = countSegmentsInString(lstring);
      let fIndex = 0;

      let pos = new THREE.Vector3(0, 0, 0);
      let quat = new THREE.Quaternion();
      quat.setFromEuler(new THREE.Euler(0, 0, 0));

      const up = new THREE.Vector3(0, 1, 0);
      const segmentMeshes = [];
      const leafMeshes = [];

      for (let i = 0; i < lstring.length; i++) {
        const ch = lstring[i];

        if (ch === 'F') {
          const dir = up.clone().applyQuaternion(quat).normalize();
          const center = pos.clone().add(dir.clone().multiplyScalar(SEGMENT_LENGTH * 0.5));
          const inLast30 = totalF > 0 ? (fIndex >= Math.floor(totalF * 0.7)) : false;
          const color = colorForSegment(fIndex, totalF, inLast30);

          const mesh = createSegmentMesh(color);
          mesh.position.copy(center);
          mesh.quaternion.copy(quat);
          growthGroup.add(mesh);
          segmentMeshes.push(mesh);

          pos.add(dir.multiplyScalar(SEGMENT_LENGTH));

          if (state.leavesEnabled && tipSet.has(i)) {
            const leaf = createLeafMesh();
            leaf.position.copy(pos);
            growthGroup.add(leaf);
            leafMeshes.push(leaf);
          }

          fIndex++;
        } else if (ch === '+') {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), ANGLE_RAD);
          quat.multiply(q);
        } else if (ch === '-') {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), -ANGLE_RAD);
          quat.multiply(q);
        } else if (ch === '[') {
          stack.push({
            pos: pos.clone(),
            quat: quat.clone()
          });
        } else if (ch === ']') {
          const popped = stack.pop();
          if (popped) {
            pos.copy(popped.pos);
            quat.copy(popped.quat);
          }
        }
      }

      plantsRoot.add(plantGroup);
      plantGroups.push(plantGroup);
      plantData.push({
        root: plantGroup,
        growthGroup,
        segments: segmentMeshes,
        leaves: leafMeshes,
        revealCount: state.generation === 0 ? 0 : 0,
        highlightUntil: 0
      });
    }

    function setInitialVisibilityForGrowth() {
      for (const pdata of plantData) {
        pdata.revealCount = 0;
        for (const seg of pdata.segments) seg.visible = false;
        for (const leaf of pdata.leaves) leaf.visible = false;
      }
    }

    let growthStartTime = 0;

    function rebuildPlants() {
      clearPlants();

      const lstring = state.axiom;
      if (state.generation === 0) {
        state.totalSegments = 0;
        updateHUD();
        return;
      }

      for (let i = 0; i < PLANT_COUNT; i++) {
        buildSinglePlant(lstring, seedPositions[i], i);
      }

      setInitialVisibilityForGrowth();
      state.growthAnimating = true;
      growthStartTime = clock.getElapsedTime();

      state.totalSegments = countSegmentsInString(lstring) * PLANT_COUNT;
      state.leafCount = plantData.reduce((sum, p) => sum + p.leaves.length, 0);
      updateHUD();
    }

    function updateGeneration(newGen) {
      state.generation = Math.max(0, Math.min(MAX_GENERATION, newGen));
      state.axiom = expandLSystem(state.generation);
      if (state.generation === 0) {
        clearPlants();
        state.totalSegments = 0;
        state.leafCount = 0;
        state.growthAnimating = false;
      } else {
        rebuildPlants();
      }
      updateHUD();
    }

    function updateHUD() {
      hud.innerHTML = `Generation: ${safeNumber(state.generation, 0)}/5<br>Segments: ${safeNumber(state.totalSegments, 0)}`;
    }

    exportBtn.addEventListener('click', () => {
      const stats = {
        generation: state.generation,
        totalSegmentCount: state.totalSegments,
        colorMode: state.colorMode,
        leavesEnabled: state.leavesEnabled,
        windEnabled: state.windEnabled
      };
      console.log('Export Stats:', stats);
      statsDisplay.textContent =
        `Generation Level: ${state.generation}\n` +
        `Total Segment Count: ${state.totalSegments}\n` +
        `Color Mode: ${state.colorMode}\n` +
        `Leaves: ${state.leavesEnabled ? 'On' : 'Off'}\n` +
        `Wind: ${state.windEnabled ? 'On' : 'Off'}`;
      state.statsExported = true;
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (state.generation < MAX_GENERATION) updateGeneration(state.generation + 1);
      } else if (e.key === 'r' || e.key === 'R') {
        updateGeneration(0);
      } else if (e.key === 'c' || e.key === 'C') {
        state.colorMode = state.colorMode === 'green' ? 'autumn' : 'green';
        updateGeneration(state.generation);
      } else if (e.key === 'l' || e.key === 'L') {
        state.leavesEnabled = !state.leavesEnabled;
        updateGeneration(state.generation);
      } else if (e.key === 'w' || e.key === 'W') {
        state.windEnabled = !state.windEnabled;
      }
    });

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(plantsRoot.children, true);

      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isPlantRoot) obj = obj.parent;
        if (obj && obj.userData.isPlantRoot) {
          const index = safeNumber(obj.userData.plantIndex, -1);
          state.lastClickedPlant = index;
          const pdata = plantData[index];
          if (pdata) {
            pdata.highlightUntil = clock.getElapsedTime() + 1.5;
            pdata.segments.forEach(seg => {
              if (seg.material && seg.material.emissive) seg.material.emissive.set('#ffff00');
            });
          }
        }
      }
    });

    const loader = new GLTFLoader();
    loader.load(
      'Nefertiti.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 0, 0);
        model.scale.setScalar(0.02);

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        if (size.y > 0) {
          const scaleAdjust = 3 / size.y;
          model.scale.multiplyScalar(scaleAdjust);
        }

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            const original = child.material;
            let mat;
            if (original && original.isMeshStandardMaterial) {
              mat = original.clone();
              mat.emissive = new THREE.Color('#3d2b1f');
              mat.emissiveIntensity = 0.3;
            } else {
              mat = new THREE.MeshStandardMaterial({
                color: original && original.color ? original.color : new THREE.Color('#b9a27a'),
                emissive: '#3d2b1f',
                emissiveIntensity: 0.3,
                roughness: 0.7,
                metalness: 0.1
              });
            }
            child.material = mat;
          }
        });

        scene.add(model);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Nefertiti.glb:', err);
        state.modelLoaded = false;
      }
    );

    updateGeneration(0);

    function updateGrowthAnimation(elapsed) {
      if (!state.growthAnimating) return;

      const t = safeNumber((elapsed - growthStartTime) / GROWTH_DURATION, 1);
      const alpha = THREE.MathUtils.clamp(t, 0, 1);

      for (const pdata of plantData) {
        const segCount = pdata.segments.length;
        const targetVisible = Math.floor(segCount * alpha);

        if (targetVisible !== pdata.revealCount) {
          for (let i = pdata.revealCount; i < targetVisible; i++) {
            if (pdata.segments[i]) pdata.segments[i].visible = true;
          }
          pdata.revealCount = targetVisible;
        }

        const visibleSegs = pdata.revealCount;
        for (const leaf of pdata.leaves) leaf.visible = false;

        if (state.leavesEnabled && visibleSegs > 0) {
          for (const leaf of pdata.leaves) {
            if (leaf.position.y <= SEGMENT_LENGTH * visibleSegs + 10) {
              leaf.visible = alpha >= 0.98;
            }
          }
        }
      }

      if (alpha >= 1) {
        state.growthAnimating = false;
        for (const pdata of plantData) {
          pdata.segments.forEach(s => s.visible = true);
          if (state.leavesEnabled) pdata.leaves.forEach(l => l.visible = true);
        }
      }
    }

    function updateHighlights(elapsed) {
      for (const pdata of plantData) {
        const active = elapsed < pdata.highlightUntil;
        if (!active) {
          for (const seg of pdata.segments) {
            if (seg.material && seg.material.emissive) seg.material.emissive.set(0x000000);
          }
        }
      }
    }

    function updateWind(elapsed) {
      for (let i = 0; i < plantData.length; i++) {
        const pdata = plantData[i];
        pdata.root.rotation.z = state.windEnabled ? Math.sin(elapsed * 2) * 0.05 : 0;
      }
    }

    function updateStatePerFrame() {
      state.cameraDistance = safeNumber(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)), 0);
      if (state.generation === 0) {
        state.totalSegments = 0;
        state.axiom = 'F';
      } else {
        const segsPerPlant = countSegmentsInString(state.axiom);
        state.totalSegments = safeNumber(segsPerPlant * PLANT_COUNT, 0);
      }
      state.leafCount = safeNumber(
        plantData.reduce((sum, p) => sum + p.leaves.filter(l => l.parent).length, 0),
        0
      );
      state.modelLoaded = !!state.modelLoaded;
      state.generation = safeNumber(state.generation, 0);
      state.lastClickedPlant = safeNumber(state.lastClickedPlant, -1);
    }

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();

      updateGrowthAnimation(elapsed);
      updateHighlights(elapsed);
      updateWind(elapsed);
      controls.update();
      updateStatePerFrame();
      updateHUD();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
