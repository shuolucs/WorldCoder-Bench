<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L-System Plant Growth around Nefertiti</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    font-family: sans-serif;
    padding: 12px 18px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    z-index: 100;
    pointer-events: none;
}

#export-btn {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    font-family: sans-serif;
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    z-index: 100;
    transition: background 0.2s;
}
#export-btn:hover {
    background: rgba(50, 50, 80, 0.9);
}

#stats-display {
    position: fixed;
    top: 50px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: white;
    font-family: sans-serif;
    padding: 0;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    z-index: 100;
    max-width: 250px;
    pointer-events: none;
}
#stats-display:not(:empty) {
    padding: 12px 16px;
}

#loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 26, 46, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: sans-serif;
    font-size: 18px;
    z-index: 200;
}
</style>
</head>
<body>

<div id="hud">
    <div>Generation: <span id="hud-gen">0</span>/5</div>
    <div>Segments: <span id="hud-seg">0</span></div>
</div>

<button id="export-btn">Export Stats</button>
<div id="stats-display"></div>
<div id="loading-overlay">Loading Nefertiti model...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ STATE ============
const state = {
    modelLoaded: false,
    generation: 0,
    totalSegments: 0,
    plantCount: 6,
    colorMode: 'green',
    leavesEnabled: false,
    leafCount: 0,
    windEnabled: false,
    lastClickedPlant: -1,
    growthAnimating: false,
    cameraDistance: 0,
    axiom: 'F',
    segmentRadius: 0.03,
    branchAngle: 25,
    statsExported: false
};
window.__3D_STATE__ = state;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x0d3b0d });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ NEFERTITI MODEL ============
let nefertitiModel = null;
const loader = new GLTFLoader();

function loadModel() {
    loader.load(
        'Nefertiti.glb',
        (gltf) => {
            nefertitiModel = gltf.scene;
            nefertitiModel.position.set(0, 0, 0);
            nefertitiModel.scale.set(0.02, 0.02, 0.02);

            nefertitiModel.traverse((child) => {
                if (child.isMesh) {
                    if (child.material) {
                        child.material = child.material.clone();
                        child.material.emissive = new THREE.Color(0x3d2b1f);
                        child.material.emissiveIntensity = 0.3;
                    }
                }
            });

            scene.add(nefertitiModel);
            state.modelLoaded = true;
            document.getElementById('loading-overlay').style.display = 'none';
        },
        undefined,
        (error) => {
            console.warn('Could not load Nefertiti.glb:', error);
            // Create placeholder
            const placeholderGeo = new THREE.CylinderGeometry(0.4, 0.5, 3, 16);
            const placeholderMat = new THREE.MeshStandardMaterial({
                color: 0xd4a574,
                emissive: 0x3d2b1f,
                emissiveIntensity: 0.3
            });
            nefertitiModel = new THREE.Mesh(placeholderGeo, placeholderMat);
            nefertitiModel.position.set(0, 1.5, 0);
            scene.add(nefertitiModel);

            // Add a head sphere
            const headGeo = new THREE.SphereGeometry(0.5, 16, 16);
            const headMesh = new THREE.Mesh(headGeo, placeholderMat.clone());
            headMesh.position.set(0, 3.3, 0);
            scene.add(headMesh);

            state.modelLoaded = true;
            document.getElementById('loading-overlay').style.display = 'none';
        }
    );
}
loadModel();

// ============ L-SYSTEM ============
const LSYSTEM_RULES = { 'F': 'FF+[+F-F-F]-[-F+F+F]' };
const ANGLE_DEG = 25;
const ANGLE_RAD = THREE.MathUtils.degToRad(ANGLE_DEG);
const SEG_RADIUS = 0.03;
const SEG_LENGTH = 0.15;

function generateLString(axiom, rules, generations) {
    let current = axiom;
    for (let i = 0; i < generations; i++) {
        let next = '';
        for (const ch of current) {
            next += rules[ch] || ch;
        }
        current = next;
    }
    return current;
}

function countF(str) {
    let count = 0;
    for (const ch of str) {
        if (ch === 'F') count++;
    }
    return count;
}

// ============ PLANT RENDERING ============
const SEED_ANGLES = [0, 60, 120, 180, 240, 300];
const SEED_RADIUS = 2.5;
const plantGroups = [];
const plantSegments = []; // arrays of segment meshes per plant
const plantLeaves = []; // arrays of leaf meshes per plant
let currentLString = 'F';
let allSegmentMeshes = []; // flat list for raycasting
let highlightTimers = {};

// Cylinder geometry (shared, reused)
const segGeometry = new THREE.CylinderGeometry(SEG_RADIUS, SEG_RADIUS, SEG_LENGTH, 6);
segGeometry.translate(0, SEG_LENGTH / 2, 0);

const leafGeometry = new THREE.SphereGeometry(0.04, 6, 6);

function getSegmentColor(index, totalInBranch, colorMode) {
    if (colorMode === 'green') {
        const r = (0x2d + Math.random() * 20 - 10) / 255;
        const g = (0x5a + Math.random() * 20 - 10) / 255;
        const b = (0x1e + Math.random() * 20 - 10) / 255;
        return new THREE.Color(r, g, b);
    } else {
        // autumn mode
        const ratio = totalInBranch > 0 ? index / totalInBranch : 0;
        if (ratio > 0.7) {
            return new THREE.Color(0xFF6347);
        } else {
            return new THREE.Color(0x8B4513);
        }
    }
}

function buildPlantGeometry(lString, plantIndex, colorMode, leavesEnabled) {
    const group = new THREE.Group();
    const segments = [];
    const leaves = [];

    const stack = [];
    let position = new THREE.Vector3(0, 0, 0);
    let direction = new THREE.Euler(0, 0, 0, 'XYZ');
    let quaternion = new THREE.Quaternion();
    quaternion.setFromEuler(new THREE.Euler(0, 0, 0));

    // Track branch depth for coloring
    let fCountInBranch = 0;
    let totalFInBranch = 0;

    // Pre-count F's in current branch context for autumn coloring
    // Simple approach: count consecutive F segments
    const fCount = countF(lString);

    let globalFIndex = 0;

    const pos = new THREE.Vector3(0, 0, 0);
    const quat = new THREE.Quaternion();
    quat.setFromAxisAngle(new THREE.Vector3(0, 0, 1), 0);

    // Use a matrix-based turtle
    const matrixStack = [];
    let currentMatrix = new THREE.Matrix4();
    currentMatrix.identity();

    // Direction: initially up (Y+)
    const upDir = new THREE.Vector3(0, 1, 0);

    for (let i = 0; i < lString.length; i++) {
        const ch = lString[i];

        if (ch === 'F') {
            const color = getSegmentColor(globalFIndex, fCount, colorMode);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(segGeometry, mat);

            mesh.applyMatrix4(currentMatrix);
            mesh.userData.plantIndex = plantIndex;

            group.add(mesh);
            segments.push(mesh);
            globalFIndex++;

            // Move forward
            const moveMatrix = new THREE.Matrix4().makeTranslation(0, SEG_LENGTH, 0);
            currentMatrix.multiply(moveMatrix);

            // Check if this is a leaf position (tip)
            if (leavesEnabled) {
                const nextCh = lString[i + 1];
                if (nextCh === ']' || nextCh === undefined || (nextCh !== 'F' && nextCh !== '+' && nextCh !== '-' && nextCh !== '[')) {
                    // It's a tip
                    const leafMat = new THREE.MeshStandardMaterial({ color: 0x4a7c2f });
                    const leafMesh = new THREE.Mesh(leafGeometry, leafMat);
                    const tipPos = new THREE.Vector3();
                    tipPos.setFromMatrixPosition(currentMatrix);
                    leafMesh.position.copy(tipPos);
                    leafMesh.userData.plantIndex = plantIndex;
                    group.add(leafMesh);
                    leaves.push(leafMesh);
                }
            }
        } else if (ch === '+') {
            const rotMatrix = new THREE.Matrix4().makeRotationZ(ANGLE_RAD);
            currentMatrix.multiply(rotMatrix);
        } else if (ch === '-') {
            const rotMatrix = new THREE.Matrix4().makeRotationZ(-ANGLE_RAD);
            currentMatrix.multiply(rotMatrix);
        } else if (ch === '[') {
            matrixStack.push(currentMatrix.clone());
        } else if (ch === ']') {
            if (matrixStack.length > 0) {
                currentMatrix = matrixStack.pop();
            }
        }
    }

    return { group, segments, leaves };
}

function initPlantGroups() {
    for (let i = 0; i < 6; i++) {
        const angle = THREE.MathUtils.degToRad(SEED_ANGLES[i]);
        const x = Math.cos(angle) * SEED_RADIUS;
        const z = Math.sin(angle) * SEED_RADIUS;

        const container = new THREE.Group();
        container.position.set(x, 0, z);
        container.userData.plantIndex = i;
        container.userData.baseRotZ = 0;

        // Face toward center with some variation
        container.lookAt(0, 0, 0);
        container.rotation.x = 0;
        container.rotation.z = 0;

        scene.add(container);
        plantGroups.push(container);
        plantSegments.push([]);
        plantLeaves.push([]);
    }
}
initPlantGroups();

function clearAllPlants() {
    for (let i = 0; i < 6; i++) {
        // Remove all children from plant group
        while (plantGroups[i].children.length > 0) {
            const child = plantGroups[i].children[0];
            plantGroups[i].remove(child);
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
        }
        plantSegments[i] = [];
        plantLeaves[i] = [];
    }
    allSegmentMeshes = [];
}

let growthAnimationData = null;

function rebuildAllPlants(animated = true) {
    clearAllPlants();

    if (state.generation === 0) {
        currentLString = 'F';
        state.axiom = 'F';
        state.totalSegments = 0;
        state.leafCount = 0;
        updateHUD();
        return;
    }

    currentLString = generateLString('F', LSYSTEM_RULES, state.generation);
    state.axiom = currentLString;

    const fPerPlant = countF(currentLString);
    state.totalSegments = fPerPlant * 6;

    for (let i = 0; i < 6; i++) {
        const result = buildPlantGeometry(currentLString, i, state.colorMode, state.leavesEnabled);
        const plantContent = result.group;

        // Add random Y rotation for variety
        plantContent.rotation.y = Math.random() * Math.PI * 2;

        // Add all children to the plant group
        while (plantContent.children.length > 0) {
            const child = plantContent.children[0];
            plantContent.remove(child);
            plantGroups[i].add(child);

            if (child.geometry === segGeometry) {
                plantSegments[i].push(child);
                allSegmentMeshes.push(child);
            }
        }

        plantSegments[i] = result.segments;
        plantLeaves[i] = result.leaves;

        // Re-add properly
        plantGroups[i].remove(...plantGroups[i].children);
        for (const seg of result.segments) {
            plantGroups[i].add(seg);
            allSegmentMeshes.push(seg);
        }
        for (const leaf of result.leaves) {
            plantGroups[i].add(leaf);
        }
    }

    // Count leaves
    let totalLeaves = 0;
    for (const arr of plantLeaves) totalLeaves += arr.length;
    state.leafCount = totalLeaves;

    if (animated) {
        // Hide all segments and reveal progressively
        for (let i = 0; i < 6; i++) {
            for (const seg of plantSegments[i]) {
                seg.visible = false;
            }
            for (const leaf of plantLeaves[i]) {
                leaf.visible = false;
            }
        }

        const totalToReveal = allSegmentMeshes.length;
        const allLeaves = [];
        for (const arr of plantLeaves) allLeaves.push(...arr);

        growthAnimationData = {
            startTime: performance.now(),
            duration: 2000,
            segments: [...allSegmentMeshes],
            leaves: allLeaves,
            totalSegments: totalToReveal,
            totalLeaves: allLeaves.length,
            revealed: 0,
            leavesRevealed: 0
        };
        state.growthAnimating = true;
    }

    updateHUD();
}

function updateGrowthAnimation() {
    if (!growthAnimationData) return;

    const elapsed = performance.now() - growthAnimationData.startTime;
    const progress = Math.min(elapsed / growthAnimationData.duration, 1);

    const segToShow = Math.floor(progress * growthAnimationData.totalSegments);
    for (let i = growthAnimationData.revealed; i < segToShow && i < growthAnimationData.segments.length; i++) {
        growthAnimationData.segments[i].visible = true;
    }
    growthAnimationData.revealed = segToShow;

    // Show leaves at the end
    if (progress > 0.8) {
        const leafProgress = (progress - 0.8) / 0.2;
        const leavesToShow = Math.floor(leafProgress * growthAnimationData.totalLeaves);
        for (let i = growthAnimationData.leavesRevealed; i < leavesToShow && i < growthAnimationData.leaves.length; i++) {
            growthAnimationData.leaves[i].visible = true;
        }
        growthAnimationData.leavesRevealed = leavesToShow;
    }

    if (progress >= 1) {
        // Ensure all visible
        for (const seg of growthAnimationData.segments) seg.visible = true;
        for (const leaf of growthAnimationData.leaves) leaf.visible = true;
        growthAnimationData = null;
        state.growthAnimating = false;
    }
}

// ============ HUD ============
function updateHUD() {
    document.getElementById('hud-gen').textContent = state.generation;
    document.getElementById('hud-seg').textContent = state.totalSegments;
}

// ============ INTERACTIONS ============
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (e.code === 'Space') {
        e.preventDefault();
        if (state.generation < 5 && !state.growthAnimating) {
            state.generation++;
            rebuildAllPlants(true);
        }
    } else if (key === 'r') {
        state.generation = 0;
        state.growthAnimating = false;
        growthAnimationData = null;
        rebuildAllPlants(false);
    } else if (key === 'c') {
        state.colorMode = state.colorMode === 'green' ? 'autumn' : 'green';
        if (state.generation > 0) {
            rebuildAllPlants(false);
        }
    } else if (key === 'l') {
        state.leavesEnabled = !state.leavesEnabled;
        if (state.generation > 0) {
            rebuildAllPlants(false);
        } else {
            state.leafCount = 0;
        }
    } else if (key === 'w') {
        state.windEnabled = !state.windEnabled;
        if (!state.windEnabled) {
            for (const pg of plantGroups) {
                pg.rotation.z = 0;
            }
        }
    }
});

// Raycasting for click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check intersections with all plant segments
    const allMeshes = [];
    for (let i = 0; i < 6; i++) {
        plantGroups[i].traverse((child) => {
            if (child.isMesh) {
                allMeshes.push(child);
            }
        });
    }

    const intersects = raycaster.intersectObjects(allMeshes, false);
    if (intersects.length > 0) {
        const hit = intersects[0].object;
        const plantIdx = hit.userData.plantIndex;
        if (plantIdx !== undefined && plantIdx >= 0 && plantIdx <= 5) {
            state.lastClickedPlant = plantIdx;
            highlightPlant(plantIdx);
        }
    }
});

function highlightPlant(index) {
    // Clear existing timer
    if (highlightTimers[index]) {
        clearTimeout(highlightTimers[index]);
    }

    const group = plantGroups[index];
    const originalEmissives = [];

    group.traverse((child) => {
        if (child.isMesh && child.material) {
            originalEmissives.push({ mesh: child, emissive: child.material.emissive.clone(), intensity: child.material.emissiveIntensity });
            child.material.emissive.set(0xffff00);
            child.material.emissiveIntensity = 0.6;
        }
    });

    highlightTimers[index] = setTimeout(() => {
        for (const item of originalEmissives) {
            if (item.mesh.material) {
                item.mesh.material.emissive.copy(item.emissive);
                item.mesh.material.emissiveIntensity = item.intensity;
            }
        }
        delete highlightTimers[index];
    }, 1500);
}

// Export Stats button
document.getElementById('export-btn').addEventListener('click', () => {
    state.statsExported = true;
    const statsDiv = document.getElementById('stats-display');
    statsDiv.innerHTML = `
        <div><strong>Generation:</strong> ${state.generation}/5</div>
        <div><strong>Total Segments:</strong> ${state.totalSegments}</div>
        <div><strong>Color Mode:</strong> ${state.colorMode}</div>
        <div><strong>Leaves:</strong> ${state.leavesEnabled ? 'ON' : 'OFF'} (${state.leafCount})</div>
        <div><strong>Wind:</strong> ${state.windEnabled ? 'ON' : 'OFF'}</div>
        <div><strong>Last Clicked Plant:</strong> ${state.lastClickedPlant}</div>
        <div><strong>L-String Length:</strong> ${state.axiom.length}</div>
    `;
    console.log('Stats exported:', { ...state });
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();

    // Wind animation
    if (state.windEnabled) {
        for (const pg of plantGroups) {
            pg.rotation.z = Math.sin(time * 2) * 0.05;
        }
    }

    // Growth animation
    updateGrowthAnimation();

    // Update camera distance
    state.cameraDistance = camera.position.length();

    // Ensure no NaN
    if (isNaN(state.totalSegments)) state.totalSegments = 0;
    if (isNaN(state.generation)) state.generation = 0;
    if (isNaN(state.leafCount)) state.leafCount = 0;
    if (isNaN(state.cameraDistance)) state.cameraDistance = 0;
    if (isNaN(state.lastClickedPlant)) state.lastClickedPlant = -1;

    controls.update();
    renderer.render(scene, camera);
}

animate();
updateHUD();
</script>
</body>
</html>
