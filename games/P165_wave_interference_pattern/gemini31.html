<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wave Interference Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 320px;
            background: rgba(20, 25, 30, 0.85);
            color: #e0e0e0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 10;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #fff;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 8px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #0088ff;
        }
        .hud-stats {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        .hud-stats div {
            display: flex;
            justify-content: space-between;
        }
        .hud-value {
            font-family: monospace;
            color: #4da6ff;
        }
        .instructions {
            font-size: 11px;
            color: #aaa;
            line-height: 1.4;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .key {
            display: inline-block;
            background: #333;
            padding: 1px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h2>Wave Simulation</h2>
        
        <div class="btn-row">
            <button id="btn-play-pause">Play</button>
            <button id="btn-reset">Reset</button>
        </div>

        <div class="control-group">
            <label>Amplitude <span id="val-amplitude">2.0</span></label>
            <input type="range" id="slider-amplitude" min="0.5" max="5.0" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>Wavelength <span id="val-wavelength">8.0</span></label>
            <input type="range" id="slider-wavelength" min="2.0" max="20.0" step="0.5" value="8.0">
        </div>
        <div class="control-group">
            <label>Frequency <span id="val-frequency">1.0</span></label>
            <input type="range" id="slider-frequency" min="0.2" max="3.0" step="0.1" value="1.0">
        </div>

        <div class="hud-stats">
            <div><span>Time:</span> <span id="hud-time" class="hud-value">0.00 s</span></div>
            <div><span>Sources:</span> <span id="hud-sources" class="hud-value">2</span></div>
            <div><span>Obstacle:</span> <span id="hud-obstacle" class="hud-value">ON</span></div>
            <div><span>Color Mode:</span> <span id="hud-colormode" class="hud-value">Solid</span></div>
            <div><span>Max Disp:</span> <span id="hud-max-displacement" class="hud-value">0.000</span></div>
            <div><span>Min Disp:</span> <span id="hud-min-displacement" class="hud-value">0.000</span></div>
        </div>

        <div class="instructions">
            <span class="key">S</span> Toggle Source 2<br>
            <span class="key">O</span> Toggle Obstacle<br>
            <span class="key">1</span> S1 Narrow Spacing<br>
            <span class="key">2</span> S1 Wide Spacing<br>
            <span class="key">C</span> Toggle Color Mode
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            simTime: 0,
            isPaused: true,
            amplitude: 2.0,
            wavelength: 8.0,
            frequency: 1.0,
            source1Pos: { x: -20, y: 0, z: 0 },
            source2Pos: { x: 20, y: 0, z: 0 },
            source2Active: true,
            obstacleActive: true,
            colorMode: 'solid',
            maxDisplacement: 0,
            minDisplacement: 0,
            vertexCount: 256 * 256,
            modelLoaded: false,
            waveEnergy: 0,
            frameCount: 0
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Grid Helper
        const gridHelper = new THREE.GridHelper(80, 20, 0x333333, 0x333333);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // --- Wave Plane ---
        const segments = 256;
        const size = 80;
        const waveGeometry = new THREE.PlaneGeometry(size, size, segments, segments);
        waveGeometry.rotateX(-Math.PI / 2);
        state.vertexCount = waveGeometry.attributes.position.count;

        // Add color attribute for heightmap mode
        const colors = new Float32Array(state.vertexCount * 3);
        waveGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const waveMaterial = new THREE.MeshPhongMaterial({
            color: 0x0066cc,
            side: THREE.DoubleSide,
            shininess: 80,
            wireframe: false,
            vertexColors: false
        });

        const waveMesh = new THREE.Mesh(waveGeometry, waveMaterial);
        scene.add(waveMesh);

        // --- Obstacle Model ---
        const loader = new GLTFLoader();
        const obstacleRadius = 3.0;
        
        // Fallback procedural amber if GLB fails
        const createFallbackAmber = () => {
            const geo = new THREE.SphereGeometry(obstacleRadius, 32, 32);
            const mat = new THREE.MeshPhysicalMaterial({
                color: 0xffaa00,
                transmission: 0.8,
                opacity: 1,
                metalness: 0,
                roughness: 0.1,
                ior: 1.5,
                thickness: 2.0
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(0, 2, 0);
            scene.add(mesh);
            state.modelLoaded = true;
        };

        loader.load(
            'MosquitoInAmber.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Calculate bounding box to scale properly
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 4.0 / maxDim;
                
                model.scale.setScalar(scale);
                
                // Center model
                box.setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.position.y += 2; // Place at y=2

                const wrapper = new THREE.Group();
                wrapper.add(model);
                scene.add(wrapper);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn("Could not load MosquitoInAmber.glb, using fallback sphere.", error);
                createFallbackAmber();
            }
        );

        // --- UI Interactions ---
        const btnPlayPause = document.getElementById('btn-play-pause');
        const btnReset = document.getElementById('btn-reset');
        const sliderAmp = document.getElementById('slider-amplitude');
        const sliderWave = document.getElementById('slider-wavelength');
        const sliderFreq = document.getElementById('slider-frequency');
        
        const valAmp = document.getElementById('val-amplitude');
        const valWave = document.getElementById('val-wavelength');
        const valFreq = document.getElementById('val-frequency');

        const hudTime = document.getElementById('hud-time');
        const hudSources = document.getElementById('hud-sources');
        const hudObstacle = document.getElementById('hud-obstacle');
        const hudColorMode = document.getElementById('hud-colormode');
        const hudMaxDisp = document.getElementById('hud-max-displacement');
        const hudMinDisp = document.getElementById('hud-min-displacement');

        btnPlayPause.addEventListener('click', () => {
            state.isPaused = !state.isPaused;
            btnPlayPause.innerText = state.isPaused ? 'Play' : 'Pause';
        });

        function updateColorMaterial() {
            if (state.colorMode === 'heightmap') {
                waveMaterial.vertexColors = true;
                waveMaterial.color.setHex(0xffffff);
            } else {
                waveMaterial.vertexColors = false;
                waveMaterial.color.setHex(0x0066cc);
            }
            waveMaterial.needsUpdate = true;
        }

        btnReset.addEventListener('click', () => {
            state.simTime = 0;
            state.isPaused = true;
            state.amplitude = 2.0;
            state.wavelength = 8.0;
            state.frequency = 1.0;
            state.source1Pos.x = -20;
            state.source2Active = true;
            state.obstacleActive = true;
            state.colorMode = 'solid';

            btnPlayPause.innerText = 'Play';
            sliderAmp.value = 2.0;
            sliderWave.value = 8.0;
            sliderFreq.value = 1.0;
            valAmp.innerText = '2.0';
            valWave.innerText = '8.0';
            valFreq.innerText = '1.0';

            updateColorMaterial();

            // Flatten mesh
            const positions = waveGeometry.attributes.position.array;
            for (let i = 0; i < state.vertexCount; i++) {
                positions[i * 3 + 1] = 0;
            }
            waveGeometry.attributes.position.needsUpdate = true;
            waveGeometry.computeVertexNormals();

            state.maxDisplacement = 0;
            state.minDisplacement = 0;
            state.waveEnergy = 0;
            updateHUD();
        });

        sliderAmp.addEventListener('input', (e) => {
            state.amplitude = parseFloat(e.target.value);
            valAmp.innerText = state.amplitude.toFixed(1);
        });

        sliderWave.addEventListener('input', (e) => {
            state.wavelength = parseFloat(e.target.value);
            valWave.innerText = state.wavelength.toFixed(1);
        });

        sliderFreq.addEventListener('input', (e) => {
            state.frequency = parseFloat(e.target.value);
            valFreq.innerText = state.frequency.toFixed(1);
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 's') {
                state.source2Active = !state.source2Active;
            } else if (key === 'o') {
                state.obstacleActive = !state.obstacleActive;
            } else if (key === '1') {
                state.source1Pos.x = -10;
            } else if (key === '2') {
                state.source1Pos.x = -20;
            } else if (key === 'c') {
                state.colorMode = state.colorMode === 'solid' ? 'heightmap' : 'solid';
                updateColorMaterial();
            }
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUD() {
            hudTime.innerText = state.simTime.toFixed(2) + ' s';
            hudSources.innerText = state.source2Active ? '2' : '1';
            hudObstacle.innerText = state.obstacleActive ? 'ON' : 'OFF';
            hudColorMode.innerText = state.colorMode === 'solid' ? 'Solid' : 'Height Map';
            hudMaxDisp.innerText = state.maxDisplacement.toFixed(3);
            hudMinDisp.innerText = state.minDisplacement.toFixed(3);
        }

        // --- Physics Logic ---
        function isOccluded(sx, sz, vx, vz, radius) {
            if (!state.obstacleActive) return false;
            
            const dx = vx - sx;
            const dz = vz - sz;
            const px = -sx; // Origin is (0,0), so P = O - S = -S
            const pz = -sz;

            const lenSq = dx * dx + dz * dz;
            if (lenSq === 0) return false;

            const t = (px * dx + pz * dz) / lenSq;
            
            // Closest point is outside the segment between source and vertex
            if (t < 0 || t > 1) return false;

            const cx = sx + t * dx;
            const cz = sz + t * dz;
            
            // Check if closest point is within obstacle radius
            return (cx * cx + cz * cz) < (radius * radius);
        }

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            if (!state.isPaused) {
                state.simTime += delta;
            }

            controls.update();

            // Update Wave Mesh
            if (!state.isPaused || state.simTime === 0) {
                const positions = waveGeometry.attributes.position.array;
                const colorArr = waveGeometry.attributes.color.array;
                const count = state.vertexCount;

                let maxD = -Infinity;
                let minD = Infinity;
                let energy = 0;

                const A = state.amplitude;
                const k = (2 * Math.PI) / state.wavelength;
                const omega = (2 * Math.PI) * state.frequency;
                const t = state.simTime;
                
                const s1x = state.source1Pos.x, s1z = state.source1Pos.z;
                const s2x = state.source2Pos.x, s2z = state.source2Pos.z;
                const s2Active = state.source2Active;
                const cMode = state.colorMode;

                for (let i = 0; i < count; i++) {
                    const idx = i * 3;
                    const x = positions[idx];
                    const z = positions[idx + 2];
                    let y = 0;

                    // Source 1
                    if (!isOccluded(s1x, s1z, x, z, obstacleRadius)) {
                        const dx = x - s1x;
                        const dz = z - s1z;
                        const r = Math.sqrt(dx*dx + dz*dz);
                        y += (A * Math.sin(k * r - omega * t)) / Math.max(1, Math.sqrt(r));
                    }

                    // Source 2
                    if (s2Active && !isOccluded(s2x, s2z, x, z, obstacleRadius)) {
                        const dx = x - s2x;
                        const dz = z - s2z;
                        const r = Math.sqrt(dx*dx + dz*dz);
                        y += (A * Math.sin(k * r - omega * t)) / Math.max(1, Math.sqrt(r));
                    }

                    positions[idx + 1] = y;

                    if (y > maxD) maxD = y;
                    if (y < minD) minD = y;
                    energy += y * y;

                    // Color mapping
                    if (cMode === 'heightmap') {
                        let rCol = 0, gCol = 0, bCol = 0;
                        if (y > 0.1) {
                            const f = Math.min((y - 0.1) / A, 1.0);
                            rCol = f; gCol = 1.0 - f; bCol = 0;
                        } else if (y < -0.1) {
                            const f = Math.min((-y - 0.1) / A, 1.0);
                            rCol = 0; gCol = 1.0 - f; bCol = f;
                        } else {
                            gCol = 1.0;
                        }
                        colorArr[idx] = rCol;
                        colorArr[idx + 1] = gCol;
                        colorArr[idx + 2] = bCol;
                    }
                }

                waveGeometry.attributes.position.needsUpdate = true;
                if (cMode === 'heightmap') {
                    waveGeometry.attributes.color.needsUpdate = true;
                }
                waveGeometry.computeVertexNormals();

                state.maxDisplacement = maxD === -Infinity ? 0 : maxD;
                state.minDisplacement = minD === Infinity ? 0 : minD;
                state.waveEnergy = energy;
            }

            updateHUD();
            renderer.render(scene, camera);
            state.frameCount++;
        }

        // Initialize HUD and start loop
        updateHUD();
        animate();

    </script>
</body>
</html>
