<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wave Interference with Amber Obstacle</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b0f14;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #ui-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      width: 320px;
      background: rgba(10, 10, 18, 0.78);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      box-sizing: border-box;
      backdrop-filter: blur(6px);
    }

    #ui-panel h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      color: #ffd27f;
    }

    .row {
      margin-bottom: 10px;
    }

    .row label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .row input[type="range"] {
      width: 100%;
    }

    .btns {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      flex: 1;
      background: #1f2d3d;
      color: white;
      border: 1px solid #49617b;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #2a3d52;
    }

    .hud {
      font-size: 13px;
      line-height: 1.5;
      color: #d9e4f2;
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 8px;
      margin-top: 8px;
    }

    .hint {
      font-size: 12px;
      color: #b7c5d6;
      margin-top: 8px;
      line-height: 1.4;
    }

    .value {
      color: #ffd27f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="ui-panel">
    <h2>Wave Interference Controls</h2>

    <div class="btns">
      <button id="btn-play-pause">Play</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div class="row">
      <label for="slider-amplitude">Amplitude: <span class="value" id="val-amplitude">2.0</span></label>
      <input id="slider-amplitude" type="range" min="0.5" max="5.0" step="0.1" value="2.0" />
    </div>

    <div class="row">
      <label for="slider-wavelength">Wavelength: <span class="value" id="val-wavelength">8.0</span></label>
      <input id="slider-wavelength" type="range" min="2.0" max="20.0" step="0.5" value="8.0" />
    </div>

    <div class="row">
      <label for="slider-frequency">Frequency: <span class="value" id="val-frequency">1.0</span></label>
      <input id="slider-frequency" type="range" min="0.2" max="3.0" step="0.1" value="1.0" />
    </div>

    <div class="hud">
      <div>Time: <span id="hud-time">0.00</span></div>
      <div id="hud-sources">Sources: 2</div>
      <div id="hud-obstacle">Obstacle: ON</div>
      <div id="hud-colormode">Color Mode: Solid</div>
      <div>Max Displacement: <span id="hud-max-displacement">0.000</span></div>
      <div>Min Displacement: <span id="hud-min-displacement">0.000</span></div>
    </div>

    <div class="hint">
      Keys:<br>
      <b>S</b> toggle Source 2<br>
      <b>O</b> toggle obstacle<br>
      <b>1</b> narrow spacing<br>
      <b>2</b> wide spacing<br>
      <b>C</b> toggle color mode
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const DEFAULTS = {
      amplitude: 2.0,
      wavelength: 8.0,
      frequency: 1.0,
      source1: new THREE.Vector3(-20, 0, 0),
      source2: new THREE.Vector3(20, 0, 0),
      obstacleRadius: 3.0
    };

    const state = {
      simTime: 0,
      isPaused: true,
      amplitude: DEFAULTS.amplitude,
      wavelength: DEFAULTS.wavelength,
      frequency: DEFAULTS.frequency,
      source1Pos: { x: DEFAULTS.source1.x, y: DEFAULTS.source1.y, z: DEFAULTS.source1.z },
      source2Pos: { x: DEFAULTS.source2.x, y: DEFAULTS.source2.y, z: DEFAULTS.source2.z },
      source2Active: true,
      obstacleActive: true,
      colorMode: 'solid',
      maxDisplacement: 0,
      minDisplacement: 0,
      vertexCount: 0,
      modelLoaded: false,
      waveEnergy: 0,
      frameCount: 0
    };

    window.__3D_STATE__ = state;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f14);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );
    camera.position.set(0, 30, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const gridHelper = new THREE.GridHelper(80, 20, 0x333333, 0x333333);
    gridHelper.position.y = -0.5;
    scene.add(gridHelper);

    const planeGeometry = new THREE.PlaneGeometry(80, 80, 256, 256);
    planeGeometry.rotateX(-Math.PI / 2);

    const vertexCount = planeGeometry.attributes.position.count;
    state.vertexCount = vertexCount;

    const originalXZ = new Float32Array(vertexCount * 2);
    const positions = planeGeometry.attributes.position;
    for (let i = 0; i < vertexCount; i++) {
      originalXZ[i * 2] = positions.getX(i);
      originalXZ[i * 2 + 1] = positions.getZ(i);
    }

    const colorArray = new Float32Array(vertexCount * 3);
    for (let i = 0; i < vertexCount; i++) {
      colorArray[i * 3 + 0] = 0.0;
      colorArray[i * 3 + 1] = 0.4;
      colorArray[i * 3 + 2] = 0.8;
    }
    planeGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

    const waveMaterial = new THREE.MeshPhongMaterial({
      color: 0x0066cc,
      wireframe: false,
      side: THREE.DoubleSide,
      shininess: 80,
      vertexColors: false
    });

    const waveMesh = new THREE.Mesh(planeGeometry, waveMaterial);
    waveMesh.position.y = 0;
    scene.add(waveMesh);

    const source1Marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffff66 })
    );
    scene.add(source1Marker);

    const source2Marker = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xff9966 })
    );
    scene.add(source2Marker);

    function updateSourceMarkers() {
      source1Marker.position.set(state.source1Pos.x, 0.8, state.source1Pos.z);
      source2Marker.position.set(state.source2Pos.x, 0.8, state.source2Pos.z);
      source2Marker.visible = state.source2Active;
    }

    updateSourceMarkers();

    const obstacleDisc = new THREE.Mesh(
      new THREE.CylinderGeometry(DEFAULTS.obstacleRadius, DEFAULTS.obstacleRadius, 0.12, 48),
      new THREE.MeshPhongMaterial({
        color: 0xffbf66,
        transparent: true,
        opacity: 0.35
      })
    );
    obstacleDisc.position.set(0, 0.06, 0);
    scene.add(obstacleDisc);

    const amberGroup = new THREE.Group();
    amberGroup.position.set(0, 2, 0);
    scene.add(amberGroup);

    const loader = new GLTFLoader();
    loader.load(
      'MosquitoInAmber.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const targetSize = 4;
        const scale = targetSize / maxDim;
        model.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        scaledBox.getCenter(center);
        model.position.sub(center);

        amberGroup.add(model);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load MosquitoInAmber.glb:', err);
        state.modelLoaded = false;

        const fallback = new THREE.Mesh(
          new THREE.SphereGeometry(2, 24, 24),
          new THREE.MeshPhongMaterial({
            color: 0xcc8844,
            transparent: true,
            opacity: 0.75,
            shininess: 90
          })
        );
        amberGroup.add(fallback);
      }
    );

    const btnPlayPause = document.getElementById('btn-play-pause');
    const btnReset = document.getElementById('btn-reset');
    const sliderAmplitude = document.getElementById('slider-amplitude');
    const sliderWavelength = document.getElementById('slider-wavelength');
    const sliderFrequency = document.getElementById('slider-frequency');
    const valAmplitude = document.getElementById('val-amplitude');
    const valWavelength = document.getElementById('val-wavelength');
    const valFrequency = document.getElementById('val-frequency');
    const hudTime = document.getElementById('hud-time');
    const hudSources = document.getElementById('hud-sources');
    const hudObstacle = document.getElementById('hud-obstacle');
    const hudColorMode = document.getElementById('hud-colormode');
    const hudMax = document.getElementById('hud-max-displacement');
    const hudMin = document.getElementById('hud-min-displacement');

    function refreshUI() {
      btnPlayPause.textContent = state.isPaused ? 'Play' : 'Pause';
      valAmplitude.textContent = Number(state.amplitude).toFixed(1);
      valWavelength.textContent = Number(state.wavelength).toFixed(1);
      valFrequency.textContent = Number(state.frequency).toFixed(1);
      hudTime.textContent = state.simTime.toFixed(2);
      hudSources.textContent = `Sources: ${state.source2Active ? 2 : 1}`;
      hudObstacle.textContent = `Obstacle: ${state.obstacleActive ? 'ON' : 'OFF'}`;
      hudColorMode.textContent = `Color Mode: ${state.colorMode === 'solid' ? 'Solid' : 'Height Map'}`;
      hudMax.textContent = state.maxDisplacement.toFixed(3);
      hudMin.textContent = state.minDisplacement.toFixed(3);
      obstacleDisc.visible = state.obstacleActive;
    }

    function setSolidBlueColors() {
      const colors = planeGeometry.attributes.color.array;
      for (let i = 0; i < vertexCount; i++) {
        colors[i * 3 + 0] = 0.0;
        colors[i * 3 + 1] = 0.4;
        colors[i * 3 + 2] = 0.8;
      }
      planeGeometry.attributes.color.needsUpdate = true;
      waveMaterial.vertexColors = false;
      waveMaterial.color.set(0x0066cc);
    }

    function pointToSegmentDistance2D(px, pz, ax, az, bx, bz) {
      const abx = bx - ax;
      const abz = bz - az;
      const apx = px - ax;
      const apz = pz - az;
      const abLenSq = abx * abx + abz * abz;
      if (abLenSq === 0) {
        const dx = px - ax;
        const dz = pz - az;
        return Math.sqrt(dx * dx + dz * dz);
      }
      let t = (apx * abx + apz * abz) / abLenSq;
      t = Math.max(0, Math.min(1, t));
      const cx = ax + t * abx;
      const cz = az + t * abz;
      const dx = px - cx;
      const dz = pz - cz;
      return Math.sqrt(dx * dx + dz * dz);
    }

    function isOccluded(source, vx, vz) {
      if (!state.obstacleActive) return false;
      const d = pointToSegmentDistance2D(0, 0, source.x, source.z, vx, vz);
      return d < DEFAULTS.obstacleRadius;
    }

    function waveContribution(source, vx, vz, t) {
      const dx = vx - source.x;
      const dz = vz - source.z;
      const r = Math.sqrt(dx * dx + dz * dz);
      const k = (2 * Math.PI) / state.wavelength;
      const omega = 2 * Math.PI * state.frequency;
      return state.amplitude * Math.sin(k * r - omega * t) / Math.max(1, Math.sqrt(r));
    }

    function updateWaveSurface() {
      const pos = planeGeometry.attributes.position;
      const colors = planeGeometry.attributes.color.array;

      let maxY = -Infinity;
      let minY = Infinity;
      let energy = 0;

      for (let i = 0; i < vertexCount; i++) {
        const vx = originalXZ[i * 2];
        const vz = originalXZ[i * 2 + 1];

        let y = 0;

        if (!isOccluded(state.source1Pos, vx, vz)) {
          y += waveContribution(state.source1Pos, vx, vz, state.simTime);
        }

        if (state.source2Active && !isOccluded(state.source2Pos, vx, vz)) {
          y += waveContribution(state.source2Pos, vx, vz, state.simTime);
        }

        pos.setY(i, y);

        if (state.colorMode === 'heightmap') {
          if (y > 0.1) {
            colors[i * 3 + 0] = 1.0;
            colors[i * 3 + 1] = 0.1;
            colors[i * 3 + 2] = 0.1;
          } else if (y < -0.1) {
            colors[i * 3 + 0] = 0.1;
            colors[i * 3 + 1] = 0.2;
            colors[i * 3 + 2] = 1.0;
          } else {
            colors[i * 3 + 0] = 0.1;
            colors[i * 3 + 1] = 1.0;
            colors[i * 3 + 2] = 0.2;
          }
        }

        if (y > maxY) maxY = y;
        if (y < minY) minY = y;
        energy += y * y;
      }

      pos.needsUpdate = true;

      if (state.colorMode === 'heightmap') {
        planeGeometry.attributes.color.needsUpdate = true;
        waveMaterial.vertexColors = true;
      } else {
        waveMaterial.vertexColors = false;
      }

      planeGeometry.computeVertexNormals();

      state.maxDisplacement = Number.isFinite(maxY) ? maxY : 0;
      state.minDisplacement = Number.isFinite(minY) ? minY : 0;
      state.waveEnergy = energy;
    }

    function zeroWaveSurface() {
      const pos = planeGeometry.attributes.position;
      for (let i = 0; i < vertexCount; i++) {
        pos.setY(i, 0);
      }
      pos.needsUpdate = true;
      planeGeometry.computeVertexNormals();
      state.maxDisplacement = 0;
      state.minDisplacement = 0;
      state.waveEnergy = 0;

      if (state.colorMode === 'heightmap') {
        const colors = planeGeometry.attributes.color.array;
        for (let i = 0; i < vertexCount; i++) {
          colors[i * 3 + 0] = 0.1;
          colors[i * 3 + 1] = 1.0;
          colors[i * 3 + 2] = 0.2;
        }
        planeGeometry.attributes.color.needsUpdate = true;
      } else {
        setSolidBlueColors();
      }
    }

    btnPlayPause.addEventListener('click', () => {
      state.isPaused = !state.isPaused;
      refreshUI();
    });

    btnReset.addEventListener('click', () => {
      state.simTime = 0;
      state.isPaused = true;
      state.amplitude = DEFAULTS.amplitude;
      state.wavelength = DEFAULTS.wavelength;
      state.frequency = DEFAULTS.frequency;
      state.source1Pos = { x: DEFAULTS.source1.x, y: DEFAULTS.source1.y, z: DEFAULTS.source1.z };
      state.source2Pos = { x: DEFAULTS.source2.x, y: DEFAULTS.source2.y, z: DEFAULTS.source2.z };
      state.source2Active = true;
      state.obstacleActive = true;
      state.colorMode = 'solid';

      sliderAmplitude.value = state.amplitude;
      sliderWavelength.value = state.wavelength;
      sliderFrequency.value = state.frequency;

      updateSourceMarkers();
      setSolidBlueColors();
      zeroWaveSurface();
      refreshUI();
    });

    sliderAmplitude.addEventListener('input', () => {
      state.amplitude = parseFloat(sliderAmplitude.value);
      refreshUI();
      if (state.isPaused) updateWaveSurface();
    });

    sliderWavelength.addEventListener('input', () => {
      state.wavelength = parseFloat(sliderWavelength.value);
      refreshUI();
      if (state.isPaused) updateWaveSurface();
    });

    sliderFrequency.addEventListener('input', () => {
      state.frequency = parseFloat(sliderFrequency.value);
      refreshUI();
      if (state.isPaused) updateWaveSurface();
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 's') {
        state.source2Active = !state.source2Active;
        updateSourceMarkers();
      } else if (key === 'o') {
        state.obstacleActive = !state.obstacleActive;
      } else if (key === '1') {
        state.source1Pos = { x: -10, y: 0, z: 0 };
        updateSourceMarkers();
      } else if (key === '2') {
        state.source1Pos = { x: -20, y: 0, z: 0 };
        updateSourceMarkers();
      } else if (key === 'c') {
        state.colorMode = state.colorMode === 'solid' ? 'heightmap' : 'solid';
        if (state.colorMode === 'solid') {
          setSolidBlueColors();
        } else {
          waveMaterial.vertexColors = true;
        }
      } else {
        return;
      }

      refreshUI();
      if (state.isPaused) updateWaveSurface();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      state.frameCount++;

      const dt = clock.getDelta();
      if (!state.isPaused) {
        state.simTime += dt;
      }

      updateWaveSurface();
      refreshUI();
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setSolidBlueColors();
    zeroWaveSurface();
    refreshUI();
    animate();
  </script>
</body>
</html>
