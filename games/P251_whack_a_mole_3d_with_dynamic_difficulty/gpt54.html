<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Whack-a-Ferrari</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
    }

    #score {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 24px;
      color: white;
    }

    #timer {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      color: white;
    }

    #level {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 24px;
      color: #ffd54a;
      text-align: right;
    }

    #combo {
      position: absolute;
      top: 48px;
      right: 20px;
      font-size: 20px;
      color: orange;
      text-align: right;
    }

    #centerOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      pointer-events: none;
    }

    #startButton {
      pointer-events: auto;
      padding: 14px 28px;
      font-size: 22px;
      border: none;
      border-radius: 10px;
      background: #e53935;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    #startButton:hover {
      background: #f44336;
    }

    #gameOverText {
      font-size: 34px;
      font-weight: bold;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.6);
      text-align: center;
      display: none;
    }

    #loadingText {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: #ddd;
      font-size: 16px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score">Score: 0</div>
    <div id="timer">Time: 30s</div>
    <div id="level">Level: 1</div>
    <div id="combo">Combo: 0</div>

    <div id="centerOverlay">
      <div id="gameOverText">Game Over! Final Score: 0</div>
      <button id="startButton">Start Game</button>
    </div>

    <div id="loadingText">Loading Ferrari models...</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.5, 0);
    controls.enableDamping = true;
    controls.enabled = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const platformGeometry = new THREE.BoxGeometry(12, 1, 12);
    const platformMaterial = new THREE.MeshStandardMaterial({ color: 0x3fa34d });
    const platform = new THREE.Mesh(platformGeometry, platformMaterial);
    platform.position.set(0, 0, 0);
    platform.receiveShadow = true;
    platform.castShadow = false;
    platform.userData.isPlatform = true;
    scene.add(platform);

    const holePositions = [
      new THREE.Vector3(-3.5, 0.5, -3.5),
      new THREE.Vector3(0, 0.5, -3.5),
      new THREE.Vector3(3.5, 0.5, -3.5),
      new THREE.Vector3(-3.5, 0.5, 0),
      new THREE.Vector3(0, 0.5, 0),
      new THREE.Vector3(3.5, 0.5, 0),
      new THREE.Vector3(-3.5, 0.5, 3.5),
      new THREE.Vector3(0, 0.5, 3.5),
      new THREE.Vector3(3.5, 0.5, 3.5),
    ];

    const holes = [];
    const holeGeometry = new THREE.CylinderGeometry(0.8, 0.8, 0.5, 32);
    const holeMaterial = new THREE.MeshStandardMaterial({ color: 0x3b2413 });

    holePositions.forEach((pos, index) => {
      const hole = new THREE.Mesh(holeGeometry, holeMaterial);
      hole.position.copy(pos);
      hole.receiveShadow = true;
      hole.castShadow = false;
      hole.userData.isHole = true;
      hole.userData.holeIndex = index;
      scene.add(hole);
      holes.push(hole);
    });

    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const levelEl = document.getElementById('level');
    const comboEl = document.getElementById('combo');
    const startButton = document.getElementById('startButton');
    const gameOverText = document.getElementById('gameOverText');
    const loadingText = document.getElementById('loadingText');

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const HIDDEN_Y = -1.0;
    const UP_Y = 1.2;
    const POP_UP_TIME = 0.3;

    let gameState = 'idle';
    let score = 0;
    let totalWhacks = 0;
    let missCount = 0;
    let combo = 0;
    let bestCombo = 0;
    let difficultyLevel = 1;
    let timeRemaining = 30;
    let gameTimerAccumulator = 0;
    let spawnAccumulator = 0;
    let molesSpawned = 0;
    let ferrarisLoaded = false;

    let ferrariTemplate = null;
    const moleObjects = [];
    const moleData = [];

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function getDifficultySettings(level) {
      const lvl = clamp(level, 1, 5);
      const moleVisibleDuration = safeNumber(2.0 - 0.3 * (lvl - 1), 2.0);
      let maxSimultaneousMoles = 2;
      if (lvl >= 5) maxSimultaneousMoles = 4;
      else if (lvl >= 3) maxSimultaneousMoles = 3;

      const spawnInterval = safeNumber(1.5 - ((lvl - 1) * (0.9 / 4)), 1.5);

      return {
        moleVisibleDuration: Math.max(0.2, moleVisibleDuration),
        maxSimultaneousMoles,
        spawnInterval: Math.max(0.2, spawnInterval),
      };
    }

    function easeOutCubic(t) {
      return 1 - Math.pow(1 - t, 3);
    }

    function easeInCubic(t) {
      return t * t * t;
    }

    function updateHUD() {
      scoreEl.textContent = `Score: ${safeNumber(score, 0)}`;
      timerEl.textContent = `Time: ${Math.max(0, Math.ceil(safeNumber(timeRemaining, 0)))}s`;
      levelEl.textContent = `Level: ${difficultyLevel}`;
      comboEl.textContent = `Combo: ${combo}`;
      startButton.textContent = gameState === 'gameover' ? 'Play Again' : 'Start Game';
      gameOverText.style.display = gameState === 'gameover' ? 'block' : 'none';
      if (gameState === 'gameover') {
        gameOverText.textContent = `Game Over! Final Score: ${score}`;
      }
    }

    function getActiveMoleCount() {
      return moleData.filter(m => m.visible).length;
    }

    function updateStateExposure() {
      const settings = getDifficultySettings(difficultyLevel);
      window.__3D_STATE__ = {
        gameState,
        score: safeNumber(score, 0),
        totalWhacks: safeNumber(totalWhacks, 0),
        missCount: safeNumber(missCount, 0),
        combo: safeNumber(combo, 0),
        bestCombo: safeNumber(bestCombo, 0),
        difficultyLevel: safeNumber(difficultyLevel, 1),
        timeRemaining: Math.max(0, Math.ceil(safeNumber(timeRemaining, 0))),
        activeMoles: getActiveMoleCount(),
        maxSimultaneousMoles: settings.maxSimultaneousMoles,
        moleVisibleDuration: Number(settings.moleVisibleDuration.toFixed(1)),
        molesSpawned: safeNumber(molesSpawned, 0),
        ferrarisLoaded,
        holeStates: moleData.length
          ? moleData.map(m => !!m.visible)
          : new Array(9).fill(false),
      };
    }

    function resetMoleState(i) {
      const m = moleData[i];
      if (!m) return;
      m.visible = false;
      m.hit = false;
      m.animating = false;
      m.animationType = null;
      m.animationElapsed = 0;
      m.animationDuration = 0;
      m.stayTimer = 0;
      m.currentY = HIDDEN_Y;
      m.mesh.position.set(m.baseX, HIDDEN_Y, m.baseZ);
      restoreFerrariMaterials(m.mesh);
    }

    function resetGame() {
      gameState = 'idle';
      score = 0;
      totalWhacks = 0;
      missCount = 0;
      combo = 0;
      bestCombo = 0;
      difficultyLevel = 1;
      timeRemaining = 30;
      gameTimerAccumulator = 0;
      spawnAccumulator = 0;
      molesSpawned = 0;

      moleData.forEach((_, i) => resetMoleState(i));

      controls.enabled = true;
      startButton.style.display = 'block';
      updateHUD();
      updateStateExposure();
    }

    function startGame() {
      if (!ferrarisLoaded) return;

      gameState = 'playing';
      score = 0;
      totalWhacks = 0;
      missCount = 0;
      combo = 0;
      bestCombo = 0;
      difficultyLevel = 1;
      timeRemaining = 30;
      gameTimerAccumulator = 0;
      spawnAccumulator = 0;
      molesSpawned = 0;

      moleData.forEach((_, i) => resetMoleState(i));

      controls.enabled = false;
      startButton.style.display = 'none';
      gameOverText.style.display = 'none';

      updateHUD();
      updateStateExposure();
    }

    function endGame() {
      gameState = 'gameover';
      controls.enabled = true;

      moleData.forEach((m, i) => {
        if (m.visible || m.animating) {
          startDescend(i, POP_UP_TIME * 0.5);
        }
      });

      startButton.style.display = 'block';
      updateHUD();
      updateStateExposure();
    }

    function updateDifficulty() {
      const newLevel = clamp(1 + Math.floor(totalWhacks / 5), 1, 5);
      difficultyLevel = newLevel;
      updateHUD();
      updateStateExposure();
    }

    function startPopUp(index) {
      const m = moleData[index];
      if (!m || m.visible || m.animating) return;

      m.visible = false;
      m.hit = false;
      m.animating = true;
      m.animationType = 'up';
      m.animationElapsed = 0;
      m.animationDuration = POP_UP_TIME;
      m.startY = safeNumber(m.mesh.position.y, HIDDEN_Y);
      m.targetY = UP_Y;
      molesSpawned++;
    }

    function startDescend(index, duration = POP_UP_TIME) {
      const m = moleData[index];
      if (!m) return;

      m.animating = true;
      m.animationType = 'down';
      m.animationElapsed = 0;
      m.animationDuration = Math.max(0.05, safeNumber(duration, POP_UP_TIME));
      m.startY = safeNumber(m.mesh.position.y, HIDDEN_Y);
      m.targetY = HIDDEN_Y;
    }

    function trySpawnMole() {
      if (gameState !== 'playing') return;

      const settings = getDifficultySettings(difficultyLevel);
      const activeCount = moleData.filter(m => m.visible || (m.animating && m.animationType === 'up')).length;

      if (activeCount >= settings.maxSimultaneousMoles) return;

      const available = moleData
        .map((m, i) => ({ m, i }))
        .filter(({ m }) => !m.visible && !m.animating);

      if (available.length === 0) return;

      const chosen = available[Math.floor(Math.random() * available.length)];
      startPopUp(chosen.i);
      updateStateExposure();
    }

    function flashFerrariRed(mesh) {
      mesh.traverse((child) => {
        if (child.isMesh && child.material) {
          if (!child.userData.originalEmissive && child.material.emissive) {
            child.userData.originalEmissive = child.material.emissive.clone();
          }
          if (child.material.emissive) {
            child.material.emissive.setHex(0xff0000);
            child.material.emissiveIntensity = 1.5;
          }
        }
      });

      setTimeout(() => restoreFerrariMaterials(mesh), 120);
    }

    function restoreFerrariMaterials(mesh) {
      mesh.traverse((child) => {
        if (child.isMesh && child.material && child.material.emissive) {
          if (child.userData.originalEmissive) {
            child.material.emissive.copy(child.userData.originalEmissive);
          } else {
            child.material.emissive.setHex(0x000000);
          }
          child.material.emissiveIntensity = 1.0;
        }
      });
    }

    function whackMole(index) {
      const m = moleData[index];
      if (!m || !m.visible || m.hit || gameState !== 'playing') return;

      m.hit = true;
      totalWhacks++;
      combo++;
      bestCombo = Math.max(bestCombo, combo);

      updateDifficulty();

      let points = 10 * difficultyLevel;
      if (combo >= 3) points += combo * 5;
      score += points;

      flashFerrariRed(m.mesh);
      startDescend(index, POP_UP_TIME * 0.5);

      updateHUD();
      updateStateExposure();
    }

    function registerMiss() {
      if (gameState !== 'playing') return;
      missCount++;
      combo = 0;
      updateHUD();
      updateStateExposure();
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (gameState !== 'playing') return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const clickableFerrariMeshes = [];
      moleData.forEach((m) => {
        if (m.mesh) {
          m.mesh.traverse((child) => {
            if (child.isMesh) clickableFerrariMeshes.push(child);
          });
        }
      });

      const ferrariHits = raycaster.intersectObjects(clickableFerrariMeshes, false);

      if (ferrariHits.length > 0) {
        let obj = ferrariHits[0].object;
        while (obj && obj.parent && obj.userData.moleIndex === undefined) {
          obj = obj.parent;
        }

        if (obj && obj.userData.moleIndex !== undefined) {
          const idx = obj.userData.moleIndex;
          const mole = moleData[idx];
          if (mole && mole.visible && !mole.hit && mole.mesh.position.y > 0.4) {
            whackMole(idx);
            return;
          }
        }
      }

      const missTargets = [platform, ...holes];
      const missHits = raycaster.intersectObjects(missTargets, false);
      if (missHits.length > 0 || ferrariHits.length === 0) {
        registerMiss();
      }
    });

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.MeshStandardMaterial({ color: 0x6f9f5f })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.51;
    ground.receiveShadow = true;
    scene.add(ground);

    const loader = new GLTFLoader();
    loader.load(
      'ferrari.glb',
      (gltf) => {
        ferrariTemplate = gltf.scene;

        for (let i = 0; i < 9; i++) {
          const clone = ferrariTemplate.clone(true);
          clone.scale.setScalar(0.006);

          const base = holePositions[i];
          clone.position.set(base.x, HIDDEN_Y, base.z);
          clone.rotation.y = Math.PI * (i % 3) * 0.25;

          clone.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) child.material = child.material.clone();
            }
            child.userData.moleIndex = i;
          });

          scene.add(clone);
          moleObjects.push(clone);
          moleData.push({
            mesh: clone,
            baseX: base.x,
            baseZ: base.z,
            visible: false,
            hit: false,
            animating: false,
            animationType: null,
            animationElapsed: 0,
            animationDuration: 0,
            startY: HIDDEN_Y,
            targetY: HIDDEN_Y,
            stayTimer: 0,
            currentY: HIDDEN_Y
          });
        }

        ferrarisLoaded = true;
        loadingText.textContent = 'Ferraris loaded!';
        setTimeout(() => {
          loadingText.style.display = 'none';
        }, 1000);

        updateStateExposure();
      },
      undefined,
      (err) => {
        console.error('Failed to load ferrari.glb:', err);
        loadingText.textContent = 'Failed to load ferrari.glb';
      }
    );

    startButton.addEventListener('click', () => {
      startGame();
    });

    function updateMoles(delta) {
      const settings = getDifficultySettings(difficultyLevel);

      for (let i = 0; i < moleData.length; i++) {
        const m = moleData[i];
        if (!m || !m.mesh) continue;

        if (m.animating) {
          m.animationElapsed += delta;
          const t = clamp(m.animationElapsed / Math.max(0.001, m.animationDuration), 0, 1);

          let eased = t;
          if (m.animationType === 'up') eased = easeOutCubic(t);
          if (m.animationType === 'down') eased = easeInCubic(t);

          const newY = safeNumber(THREE.MathUtils.lerp(m.startY, m.targetY, eased), HIDDEN_Y);
          m.currentY = clamp(newY, HIDDEN_Y, UP_Y);
          m.mesh.position.set(
            clamp(m.baseX, -6, 6),
            m.currentY,
            clamp(m.baseZ, -6, 6)
          );

          if (t >= 1) {
            m.animating = false;

            if (m.animationType === 'up') {
              m.visible = true;
              m.stayTimer = settings.moleVisibleDuration;
              m.mesh.position.y = UP_Y;
            } else if (m.animationType === 'down') {
              m.visible = false;
              m.hit = false;
              m.mesh.position.y = HIDDEN_Y;
              restoreFerrariMaterials(m.mesh);
            }

            m.animationType = null;
          }
        } else if (m.visible) {
          m.stayTimer -= delta;
          if (m.stayTimer <= 0) {
            startDescend(i, POP_UP_TIME);
          }
        }

        if (!Number.isFinite(m.mesh.position.x)) m.mesh.position.x = m.baseX;
        if (!Number.isFinite(m.mesh.position.y)) m.mesh.position.y = HIDDEN_Y;
        if (!Number.isFinite(m.mesh.position.z)) m.mesh.position.z = m.baseZ;
      }
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05);

      if (gameState === 'playing') {
        gameTimerAccumulator += delta;
        spawnAccumulator += delta;

        while (gameTimerAccumulator >= 1.0) {
          gameTimerAccumulator -= 1.0;
          timeRemaining = Math.max(0, timeRemaining - 1);
          if (timeRemaining <= 0) {
            endGame();
            break;
          }
        }

        const settings = getDifficultySettings(difficultyLevel);
        while (spawnAccumulator >= settings.spawnInterval) {
          spawnAccumulator -= settings.spawnInterval;
          trySpawnMole();
        }
      }

      updateMoles(delta);
      controls.update();
      updateHUD();
      updateStateExposure();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetGame();
    animate();
  </script>
</body>
</html>
