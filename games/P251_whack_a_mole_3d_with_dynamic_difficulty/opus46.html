<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Whack-a-Mole - Ferrari Edition</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  pointer-events: none;
  padding: 15px 25px;
}

#scoreText {
  position: absolute;
  top: 15px;
  left: 25px;
  color: white;
  font-size: 24px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#timeText {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  font-size: 28px;
  font-weight: bold;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#levelText {
  position: absolute;
  top: 15px;
  right: 25px;
  color: yellow;
  font-size: 24px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#comboText {
  position: absolute;
  top: 45px;
  right: 25px;
  color: orange;
  font-size: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}

#centerUI {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: auto;
}

#startButton {
  padding: 18px 45px;
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(135deg, #ff4444, #cc0000);
  color: white;
  border: 3px solid #ff6666;
  border-radius: 12px;
  cursor: pointer;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
  box-shadow: 0 4px 15px rgba(255,0,0,0.4);
  transition: all 0.2s;
  pointer-events: auto;
}

#startButton:hover {
  background: linear-gradient(135deg, #ff6666, #ee2222);
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(255,0,0,0.6);
}

#gameOverText {
  color: white;
  font-size: 36px;
  font-weight: bold;
  text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
  margin-bottom: 25px;
  display: none;
}

#loadingText {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: white;
  font-size: 20px;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<div id="hud">
  <div id="scoreText">Score: 0</div>
  <div id="timeText">Time: 30s</div>
  <div id="levelText">Level: 1</div>
  <div id="comboText">Combo: 0</div>
</div>

<div id="centerUI">
  <div id="gameOverText"></div>
  <button id="startButton">Start Game</button>
</div>

<div id="loadingText">Loading Ferrari models...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ============ STATE ============
window.__3D_STATE__ = {
  gameState: 'idle',
  score: 0,
  totalWhacks: 0,
  missCount: 0,
  combo: 0,
  bestCombo: 0,
  difficultyLevel: 1,
  timeRemaining: 30,
  activeMoles: 0,
  maxSimultaneousMoles: 2,
  moleVisibleDuration: 2.0,
  molesSpawned: 0,
  ferrarisLoaded: false,
  holeStates: [false, false, false, false, false, false, false, false, false]
};

const state = window.__3D_STATE__;

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.3);
scene.add(hemiLight);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);
controls.enabled = true;

// ============ PLATFORM ============
const platformGeo = new THREE.BoxGeometry(12, 1, 12);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x4CAF50,
  roughness: 0.8,
  metalness: 0.1
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.set(0, 0, 0);
platform.receiveShadow = true;
scene.add(platform);

// Grass detail - slightly larger plane on top
const grassGeo = new THREE.PlaneGeometry(12, 12);
const grassMat = new THREE.MeshStandardMaterial({
  color: 0x66BB6A,
  roughness: 0.9,
  metalness: 0.0
});
const grass = new THREE.Mesh(grassGeo, grassMat);
grass.rotation.x = -Math.PI / 2;
grass.position.y = 0.501;
grass.receiveShadow = true;
scene.add(grass);

// ============ HOLES ============
const holePositions = [
  [-3.5, 0.5, -3.5], [0, 0.5, -3.5], [3.5, 0.5, -3.5],
  [-3.5, 0.5, 0],    [0, 0.5, 0],    [3.5, 0.5, 0],
  [-3.5, 0.5, 3.5],  [0, 0.5, 3.5],  [3.5, 0.5, 3.5]
];

const holes = [];
const holeMat = new THREE.MeshStandardMaterial({
  color: 0x3E2723,
  roughness: 1.0,
  metalness: 0.0
});

// Hole rim material
const rimMat = new THREE.MeshStandardMaterial({
  color: 0x5D4037,
  roughness: 0.9,
  metalness: 0.1
});

holePositions.forEach((pos, i) => {
  // Hole cylinder (dark inside)
  const holeGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.5, 32);
  const hole = new THREE.Mesh(holeGeo, holeMat);
  hole.position.set(pos[0], pos[1], pos[2]);
  hole.receiveShadow = true;
  scene.add(hole);
  holes.push(hole);

  // Hole rim (torus)
  const rimGeo = new THREE.TorusGeometry(0.85, 0.1, 8, 32);
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.position.set(pos[0], pos[1] + 0.25, pos[2]);
  rim.rotation.x = -Math.PI / 2;
  rim.castShadow = true;
  rim.receiveShadow = true;
  scene.add(rim);
});

// ============ CLIPPING PLANES for holes ============
// We'll use a group approach - each mole is in a group, and we manage visibility by position

// ============ FERRARI LOADING ============
const ferraris = [];
const moleStates = []; // { active, animating, direction, progress, stayTimer, whacked, flashTimer, model, group }

const loader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/libs/draco/');
loader.setDRACOLoader(dracoLoader);

let ferrariTemplate = null;

function initMoleState(index) {
  return {
    active: false,
    animating: false,
    direction: 'none', // 'up', 'down', 'none'
    progress: 0,
    stayTimer: 0,
    whacked: false,
    flashTimer: 0,
    model: null,
    group: null,
    originalMaterials: []
  };
}

for (let i = 0; i < 9; i++) {
  moleStates.push(initMoleState(i));
}

loader.load('ferrari.glb', (gltf) => {
  ferrariTemplate = gltf.scene;

  for (let i = 0; i < 9; i++) {
    const clone = ferrariTemplate.clone();
    clone.scale.set(0.006, 0.006, 0.006);

    // Create a group for clipping management
    const group = new THREE.Group();
    group.position.set(holePositions[i][0], -1.0, holePositions[i][2]);
    group.add(clone);

    // Store original materials for flash effect
    const origMats = [];
    clone.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        origMats.push({ mesh: child, material: child.material.clone() });
      }
    });

    scene.add(group);
    ferraris.push(clone);
    moleStates[i].model = clone;
    moleStates[i].group = group;
    moleStates[i].originalMaterials = origMats;
  }

  state.ferrarisLoaded = true;
  document.getElementById('loadingText').style.display = 'none';
  console.log('All 9 Ferrari clones loaded and ready');
}, (progress) => {
  const pct = progress.total > 0 ? Math.round((progress.loaded / progress.total) * 100) : 0;
  document.getElementById('loadingText').textContent = `Loading Ferrari models... ${pct}%`;
}, (error) => {
  console.error('Error loading ferrari.glb:', error);
  document.getElementById('loadingText').textContent = 'Error loading model. Please ensure ferrari.glb is available.';
});

// ============ RAYCASTER ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  if (state.gameState !== 'playing') return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  // Check against active mole models
  let hitMole = false;
  for (let i = 0; i < 9; i++) {
    if (moleStates[i].active && !moleStates[i].whacked && moleStates[i].group) {
      const intersects = raycaster.intersectObject(moleStates[i].group, true);
      if (intersects.length > 0) {
        whackMole(i);
        hitMole = true;
        break;
      }
    }
  }

  if (!hitMole) {
    // Check if clicked on platform or holes (a miss)
    const allObjects = [platform, grass, ...holes];
    const intersects = raycaster.intersectObjects(allObjects, false);
    if (intersects.length > 0) {
      state.missCount++;
      state.combo = 0;
      updateHUD();
    }
  }
}

renderer.domElement.addEventListener('click', onMouseClick);

// ============ GAME LOGIC ============
let gameTimer = 0;
let spawnTimer = 0;
let lastTime = 0;

function whackMole(index) {
  const ms = moleStates[index];
  if (!ms.active || ms.whacked) return;

  ms.whacked = true;
  state.totalWhacks++;
  state.combo++;

  if (state.combo > state.bestCombo) {
    state.bestCombo = state.combo;
  }

  // Score calculation
  let points = 10 * state.difficultyLevel;
  if (state.combo >= 3) {
    points += state.combo * 5;
  }
  state.score += points;

  // Update difficulty
  const newLevel = Math.min(5, Math.floor(state.totalWhacks / 5) + 1);
  if (newLevel !== state.difficultyLevel) {
    state.difficultyLevel = newLevel;
    updateDifficulty();
  }

  // Flash red
  ms.flashTimer = 0.15;
  ms.model.traverse((child) => {
    if (child.isMesh) {
      const flashMat = child.material.clone();
      flashMat.emissive = new THREE.Color(0xff0000);
      flashMat.emissiveIntensity = 1.0;
      child.material = flashMat;
    }
  });

  // Start descending immediately (faster)
  ms.direction = 'down';
  ms.progress = 0;
  ms.animating = true;

  // Create hit particle effect
  createHitEffect(ms.group.position.x, ms.group.position.y + 1, ms.group.position.z);

  updateHUD();
}

function updateDifficulty() {
  const level = state.difficultyLevel;
  state.moleVisibleDuration = parseFloat((2.0 - 0.3 * (level - 1)).toFixed(1));

  if (level <= 2) state.maxSimultaneousMoles = 2;
  else if (level <= 4) state.maxSimultaneousMoles = 3;
  else state.maxSimultaneousMoles = 4;
}

function getSpawnInterval() {
  const level = state.difficultyLevel;
  return 1.5 - 0.225 * (level - 1); // 1.5 at level 1, 0.6 at level 5
}

function spawnMole() {
  // Count active moles
  const activeCount = moleStates.filter(m => m.active).length;
  state.activeMoles = activeCount;

  if (activeCount >= state.maxSimultaneousMoles) return;

  // Find available holes
  const available = [];
  for (let i = 0; i < 9; i++) {
    if (!moleStates[i].active && !moleStates[i].animating) {
      available.push(i);
    }
  }

  if (available.length === 0) return;

  const idx = available[Math.floor(Math.random() * available.length)];
  const ms = moleStates[idx];

  ms.active = true;
  ms.animating = true;
  ms.direction = 'up';
  ms.progress = 0;
  ms.stayTimer = 0;
  ms.whacked = false;
  ms.flashTimer = 0;

  state.holeStates[idx] = true;
  state.molesSpawned++;
}

function resetMole(index) {
  const ms = moleStates[index];
  ms.active = false;
  ms.animating = false;
  ms.direction = 'none';
  ms.progress = 0;
  ms.stayTimer = 0;
  ms.whacked = false;
  ms.flashTimer = 0;

  state.holeStates[index] = false;

  if (ms.group) {
    ms.group.position.y = -1.0;
  }

  // Restore original materials
  ms.originalMaterials.forEach(({ mesh, material }) => {
    mesh.material = material.clone();
  });
}

// Easing functions
function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function easeInCubic(t) {
  return t * t * t;
}

// ============ PARTICLE EFFECTS ============
const particles = [];

function createHitEffect(x, y, z) {
  const count = 12;
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.08, 6, 6);
    const mat = new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(Math.random() * 0.1, 1, 0.5),
      transparent: true,
      opacity: 1
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);

    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 4,
      Math.random() * 3 + 1,
      (Math.random() - 0.5) * 4
    );

    scene.add(mesh);
    particles.push({ mesh, vel, life: 1.0 });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt * 2;
    p.vel.y -= 9.8 * dt;
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
    p.mesh.material.opacity = Math.max(0, p.life);
    p.mesh.scale.setScalar(Math.max(0.01, p.life));

    if (p.life <= 0) {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
      particles.splice(i, 1);
    }
  }
}

// ============ HUD ============
function updateHUD() {
  document.getElementById('scoreText').textContent = `Score: ${state.score}`;
  document.getElementById('timeText').textContent = `Time: ${state.timeRemaining}s`;
  document.getElementById('levelText').textContent = `Level: ${state.difficultyLevel}`;
  document.getElementById('comboText').textContent = `Combo: ${state.combo}`;
}

// ============ GAME FLOW ============
function startGame() {
  state.gameState = 'playing';
  state.score = 0;
  state.totalWhacks = 0;
  state.missCount = 0;
  state.combo = 0;
  state.bestCombo = 0;
  state.difficultyLevel = 1;
  state.timeRemaining = 30;
  state.activeMoles = 0;
  state.molesSpawned = 0;
  state.holeStates = [false, false, false, false, false, false, false, false, false];

  updateDifficulty();

  gameTimer = 30;
  spawnTimer = 0;

  // Reset all moles
  for (let i = 0; i < 9; i++) {
    resetMole(i);
  }

  // Disable orbit controls during play
  controls.enabled = false;

  // Reset camera
  camera.position.set(0, 8, 10);
  camera.lookAt(0, 0, 0);

  document.getElementById('startButton').style.display = 'none';
  document.getElementById('gameOverText').style.display = 'none';

  updateHUD();
}

function endGame() {
  state.gameState = 'gameover';

  // Reset all moles
  for (let i = 0; i < 9; i++) {
    resetMole(i);
  }

  controls.enabled = true;

  const goText = document.getElementById('gameOverText');
  goText.textContent = `Game Over! Final Score: ${state.score}`;
  goText.style.display = 'block';

  const btn = document.getElementById('startButton');
  btn.textContent = 'Play Again';
  btn.style.display = 'inline-block';
}

document.getElementById('startButton').addEventListener('click', () => {
  if (!state.ferrarisLoaded) {
    alert('Models are still loading, please wait...');
    return;
  }
  startGame();
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.1); // Cap delta time

  if (state.gameState === 'playing') {
    // Update game timer
    gameTimer -= dt;
    state.timeRemaining = Math.max(0, Math.ceil(gameTimer));

    if (gameTimer <= 0) {
      endGame();
    } else {
      // Spawn logic
      spawnTimer -= dt;
      if (spawnTimer <= 0) {
        spawnMole();
        spawnTimer = getSpawnInterval();
      }

      // Update moles
      let activeCount = 0;
      for (let i = 0; i < 9; i++) {
        const ms = moleStates[i];
        if (!ms.group) continue;

        // Flash timer
        if (ms.flashTimer > 0) {
          ms.flashTimer -= dt;
          if (ms.flashTimer <= 0) {
            // Restore materials
            ms.originalMaterials.forEach(({ mesh, material }) => {
              mesh.material = material.clone();
            });
          }
        }

        if (ms.animating) {
          const upSpeed = 1 / 0.3; // 0.3 seconds to go up
          const downSpeed = ms.whacked ? (1 / 0.15) : (1 / 0.3); // 2x faster when whacked

          if (ms.direction === 'up') {
            ms.progress += dt * upSpeed;
            if (ms.progress >= 1) {
              ms.progress = 1;
              ms.animating = false;
              ms.direction = 'stay';
              ms.stayTimer = state.moleVisibleDuration;
            }
            const t = easeOutCubic(Math.min(1, ms.progress));
            ms.group.position.y = -1.0 + t * 2.2; // -1.0 to 1.2
          } else if (ms.direction === 'down') {
            ms.progress += dt * downSpeed;
            if (ms.progress >= 1) {
              resetMole(i);
              continue;
            }
            const t = easeInCubic(Math.min(1, ms.progress));
            const startY = 1.2;
            ms.group.position.y = startY - t * 2.2; // 1.2 to -1.0
          }
        } else if (ms.direction === 'stay') {
          ms.stayTimer -= dt;
          if (ms.stayTimer <= 0) {
            ms.direction = 'down';
            ms.progress = 0;
            ms.animating = true;
          }
        }

        if (ms.active) activeCount++;
      }
      state.activeMoles = activeCount;
    }

    updateHUD();
  }

  // Update particles
  updateParticles(dt);

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ CURSOR ============
renderer.domElement.style.cursor = 'crosshair';

</script>
</body>
</html>
