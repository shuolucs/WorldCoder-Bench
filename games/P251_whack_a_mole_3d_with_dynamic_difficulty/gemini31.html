<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Whack-a-Mole (Ferrari Edition)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #score-display {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        #time-display {
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
        }
        .hud-right {
            text-align: right;
        }
        #level-display {
            color: yellow;
            font-size: 24px;
            font-weight: bold;
        }
        #combo-display {
            color: orange;
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }
        #center-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        #gameOverText {
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin-bottom: 20px;
            display: none;
        }
        #startButton {
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #4CAF50;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        #startButton:hover {
            background-color: #45a049;
        }
        #startButton:active {
            transform: scale(0.95);
        }
        #startButton:disabled {
            background-color: #888;
            cursor: not-allowed;
        }
        #loading-text {
            color: white;
            font-size: 18px;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="hud">
        <div class="hud-top">
            <div id="score-display">Score: 0</div>
            <div id="time-display">Time: 30s</div>
            <div class="hud-right">
                <div id="level-display">Level: 1</div>
                <div id="combo-display">Combo: 0</div>
            </div>
        </div>
        <div id="center-ui">
            <div id="gameOverText">Game Over! Final Score: 0</div>
            <button id="startButton" disabled>Loading...</button>
            <div id="loading-text">Loading Ferrari model...</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'idle', // 'idle' | 'playing' | 'gameover'
            score: 0,
            totalWhacks: 0,
            missCount: 0,
            combo: 0,
            bestCombo: 0,
            difficultyLevel: 1,
            timeRemaining: 30,
            activeMoles: 0,
            maxSimultaneousMoles: 2,
            moleVisibleDuration: 2.0,
            molesSpawned: 0,
            ferrarisLoaded: false,
            holeStates: Array(9).fill(false)
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const scoreEl = document.getElementById('score-display');
        const timeEl = document.getElementById('time-display');
        const levelEl = document.getElementById('level-display');
        const comboEl = document.getElementById('combo-display');
        const startBtn = document.getElementById('startButton');
        const gameOverText = document.getElementById('gameOverText');
        const loadingText = document.getElementById('loading-text');

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; // Don't go below ground

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Environment ---
        // Platform
        const platformGeo = new THREE.BoxGeometry(12, 1, 12);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 }); // Green
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.5; // Top surface at y=0
        platform.receiveShadow = true;
        scene.add(platform);

        // Holes & Grid
        const holePositions = [
            new THREE.Vector3(-3.5, 0.5, -3.5), new THREE.Vector3(0, 0.5, -3.5), new THREE.Vector3(3.5, 0.5, -3.5),
            new THREE.Vector3(-3.5, 0.5, 0),    new THREE.Vector3(0, 0.5, 0),    new THREE.Vector3(3.5, 0.5, 0),
            new THREE.Vector3(-3.5, 0.5, 3.5),  new THREE.Vector3(0, 0.5, 3.5),  new THREE.Vector3(3.5, 0.5, 3.5)
        ];

        const holeGeo = new THREE.CylinderGeometry(0.8, 0.8, 0.51, 32);
        const holeMat = new THREE.MeshStandardMaterial({ color: 0x3e2723 }); // Dark brown

        const colliders = [];
        const colliderGeo = new THREE.CylinderGeometry(0.8, 0.8, 2.5, 16);
        const colliderMat = new THREE.MeshBasicMaterial({ visible: false });

        holePositions.forEach((pos, index) => {
            // Visual hole
            const hole = new THREE.Mesh(holeGeo, holeMat);
            hole.position.set(pos.x, 0, pos.z); // y=0 to sit flush with platform
            hole.receiveShadow = true;
            scene.add(hole);

            // Invisible collider for raycasting
            const collider = new THREE.Mesh(colliderGeo, colliderMat);
            collider.position.set(pos.x, 0.75, pos.z); // Center above hole
            collider.userData = { isCollider: true, index: index };
            scene.add(collider);
            colliders.push(collider);
        });

        // --- Moles (Ferraris) ---
        const moles = [];
        const loader = new GLTFLoader();
        
        // Fallback geometry in case model fails to load
        const fallbackGeo = new THREE.BoxGeometry(1, 0.5, 2);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });

        loader.load(
            'ferrari.glb',
            (gltf) => {
                setupFerraris(gltf.scene);
            },
            undefined,
            (error) => {
                console.warn("Failed to load ferrari.glb, using fallback boxes.", error);
                const fallbackScene = new THREE.Group();
                const mesh = new THREE.Mesh(fallbackGeo, fallbackMat);
                mesh.position.y = 0.25;
                fallbackScene.add(mesh);
                setupFerraris(fallbackScene, true);
            }
        );

        function setupFerraris(baseModel, isFallback = false) {
            for (let i = 0; i < 9; i++) {
                const clone = baseModel.clone();
                
                // Clone materials so we can flash them individually
                clone.traverse((child) => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Store original emissive color
                        if (child.material.emissive) {
                            child.userData.origEmissive = child.material.emissive.clone();
                        }
                    }
                });

                if (!isFallback) {
                    clone.scale.set(0.006, 0.006, 0.006);
                }
                
                clone.position.set(holePositions[i].x, -1.0, holePositions[i].z);
                scene.add(clone);

                moles.push({
                    mesh: clone,
                    index: i,
                    state: 'hidden', // hidden, rising, up, falling, whacked
                    timer: 0,
                    flashTimer: 0,
                    startY: -1.0,
                    targetY: 1.2
                });
            }
            
            state.ferrarisLoaded = true;
            startBtn.disabled = false;
            startBtn.textContent = "Start Game";
            loadingText.style.display = 'none';
        }

        // --- Game Logic ---
        let lastTime = 0;
        let spawnTimer = 0;
        let currentSpawnInterval = 1.5;

        function updateDifficulty() {
            // Level increases every 5 whacks, max 5
            state.difficultyLevel = Math.min(5, 1 + Math.floor(state.totalWhacks / 5));
            
            // Duration: 2.0s at L1 down to 0.8s at L5
            state.moleVisibleDuration = Math.max(0.8, 2.0 - 0.3 * (state.difficultyLevel - 1));
            
            // Max moles: L1-2: 2, L3-4: 3, L5: 4
            const maxMolesMap = [2, 2, 3, 3, 4];
            state.maxSimultaneousMoles = maxMolesMap[state.difficultyLevel - 1];
            
            // Spawn interval: 1.5s down to 0.6s
            currentSpawnInterval = Math.max(0.6, 1.5 - 0.225 * (state.difficultyLevel - 1));

            updateUI();
        }

        function spawnMole() {
            if (state.activeMoles >= state.maxSimultaneousMoles) return;

            const hiddenMoles = moles.filter(m => m.state === 'hidden');
            if (hiddenMoles.length === 0) return;

            const randomMole = hiddenMoles[Math.floor(Math.random() * hiddenMoles.length)];
            randomMole.state = 'rising';
            randomMole.timer = 0;
            
            state.activeMoles++;
            state.molesSpawned++;
            state.holeStates[randomMole.index] = true;
        }

        function flashRed(mole) {
            mole.flashTimer = 0.15; // Flash duration
            mole.mesh.traverse((child) => {
                if (child.isMesh && child.material.emissive) {
                    child.material.emissive.setHex(0xff0000);
                }
            });
        }

        function resetColor(mole) {
            mole.mesh.traverse((child) => {
                if (child.isMesh && child.material.emissive && child.userData.origEmissive) {
                    child.material.emissive.copy(child.userData.origEmissive);
                }
            });
        }

        function whackMole(index) {
            const mole = moles[index];
            if (mole.state !== 'up' && mole.state !== 'rising') return;

            mole.state = 'whacked';
            mole.timer = 0;
            flashRed(mole);

            state.totalWhacks++;
            state.combo++;
            if (state.combo > state.bestCombo) state.bestCombo = state.combo;

            // Calculate score
            let points = 10 * state.difficultyLevel;
            if (state.combo >= 3) {
                points += state.combo * 5; // Bonus
            }
            state.score += points;

            updateDifficulty();
            updateUI();
        }

        function miss() {
            state.missCount++;
            state.combo = 0;
            updateUI();
        }

        // Easing functions
        const easeOutQuad = t => t * (2 - t);
        const easeInQuad = t => t * t;

        function updateMoles(dt) {
            state.activeMoles = 0;

            moles.forEach(mole => {
                // Handle flash timer
                if (mole.flashTimer > 0) {
                    mole.flashTimer -= dt;
                    if (mole.flashTimer <= 0) {
                        resetColor(mole);
                    }
                }

                if (mole.state === 'hidden') {
                    mole.mesh.position.y = mole.startY;
                    state.holeStates[mole.index] = false;
                    return;
                }

                state.activeMoles++;
                state.holeStates[mole.index] = true;
                mole.timer += dt;

                if (mole.state === 'rising') {
                    const duration = 0.3;
                    let t = Math.min(mole.timer / duration, 1.0);
                    mole.mesh.position.y = mole.startY + (mole.targetY - mole.startY) * easeOutQuad(t);
                    
                    if (t >= 1.0) {
                        mole.state = 'up';
                        mole.timer = 0;
                    }
                } 
                else if (mole.state === 'up') {
                    mole.mesh.position.y = mole.targetY;
                    if (mole.timer >= state.moleVisibleDuration) {
                        mole.state = 'falling';
                        mole.timer = 0;
                    }
                } 
                else if (mole.state === 'falling') {
                    const duration = 0.3;
                    let t = Math.min(mole.timer / duration, 1.0);
                    mole.mesh.position.y = mole.targetY - (mole.targetY - mole.startY) * easeInQuad(t);
                    
                    if (t >= 1.0) {
                        mole.state = 'hidden';
                        mole.timer = 0;
                        state.activeMoles--;
                        state.holeStates[mole.index] = false;
                    }
                }
                else if (mole.state === 'whacked') {
                    // Descend 2x faster
                    const duration = 0.15; 
                    // Start from current position to avoid snapping if whacked while rising
                    const currentY = mole.mesh.position.y;
                    let t = Math.min(mole.timer / duration, 1.0);
                    mole.mesh.position.y = currentY - (currentY - mole.startY) * easeInQuad(t);
                    
                    if (t >= 1.0) {
                        mole.state = 'hidden';
                        mole.timer = 0;
                        state.activeMoles--;
                        state.holeStates[mole.index] = false;
                        resetColor(mole);
                    }
                }
            });
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (event) => {
            if (state.gameState !== 'playing') return;
            if (event.target.id === 'startButton') return; // Ignore UI clicks

            // Calculate mouse position in normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect against colliders and platform
            const objectsToIntersect = [...colliders, platform];
            const intersects = raycaster.intersectObjects(objectsToIntersect);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                
                if (hit.userData.isCollider) {
                    const index = hit.userData.index;
                    const mole = moles[index];
                    if (mole.state === 'up' || mole.state === 'rising') {
                        whackMole(index);
                    } else {
                        miss();
                    }
                } else if (hit === platform) {
                    miss();
                }
            }
        });

        // --- Game Flow ---
        function startGame() {
            state.gameState = 'playing';
            state.score = 0;
            state.totalWhacks = 0;
            state.missCount = 0;
            state.combo = 0;
            state.difficultyLevel = 1;
            state.timeRemaining = 30;
            state.molesSpawned = 0;
            
            updateDifficulty();
            
            // Reset moles
            moles.forEach(m => {
                m.state = 'hidden';
                m.mesh.position.y = m.startY;
                resetColor(m);
            });

            startBtn.style.display = 'none';
            gameOverText.style.display = 'none';
            controls.enabled = false; // Disable camera movement during play

            lastTime = performance.now();
            spawnTimer = 0;
            updateUI();
        }

        function endGame() {
            state.gameState = 'gameover';
            startBtn.style.display = 'inline-block';
            startBtn.textContent = "Play Again";
            gameOverText.style.display = 'block';
            gameOverText.textContent = `Game Over! Final Score: ${state.score}`;
            controls.enabled = true; // Re-enable camera movement
        }

        startBtn.addEventListener('click', startGame);

        function updateUI() {
            scoreEl.textContent = `Score: ${state.score}`;
            timeEl.textContent = `Time: ${Math.ceil(state.timeRemaining)}s`;
            levelEl.textContent = `Level: ${state.difficultyLevel}`;
            comboEl.textContent = `Combo: ${state.combo}`;
            
            if (state.combo >= 3) {
                comboEl.style.color = '#ff5722'; // Brighter orange/red for high combo
                comboEl.style.transform = 'scale(1.2)';
            } else {
                comboEl.style.color = 'orange';
                comboEl.style.transform = 'scale(1)';
            }
        }

        // --- Main Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            const dt = (time - lastTime) / 1000;
            lastTime = time;

            if (state.gameState === 'playing') {
                // Timer
                state.timeRemaining -= dt;
                if (state.timeRemaining <= 0) {
                    state.timeRemaining = 0;
                    endGame();
                }
                updateUI();

                // Spawning
                spawnTimer += dt;
                if (spawnTimer >= currentSpawnInterval) {
                    spawnMole();
                    spawnTimer = 0;
                }

                updateMoles(dt);
            } else if (state.gameState === 'gameover') {
                // Let remaining moles fall down
                updateMoles(dt);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        requestAnimationFrame((time) => {
            lastTime = time;
            animate(time);
        });

    </script>
</body>
</html>
