<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js TransformControls Scene</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
  canvas { display: block; }

  #toolbar {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  #toolbar button {
    padding: 10px 20px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(30, 30, 60, 0.85);
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
    letter-spacing: 0.5px;
  }

  #toolbar button:hover {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(255,255,255,0.4);
  }

  #toolbar button.active {
    background: rgba(80, 120, 255, 0.7);
    border-color: rgba(80, 120, 255, 0.9);
    color: #fff;
    box-shadow: 0 0 15px rgba(80, 120, 255, 0.4);
  }

  #toolbar button.snap-on {
    background: rgba(50, 180, 100, 0.7);
    border-color: rgba(50, 180, 100, 0.9);
    color: #fff;
    box-shadow: 0 0 15px rgba(50, 180, 100, 0.4);
  }

  #infoPanel {
    position: absolute;
    top: 80px;
    right: 16px;
    width: 280px;
    background: rgba(20, 20, 50, 0.9);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    font-size: 13px;
    z-index: 10;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  #infoPanel h3 {
    margin-bottom: 14px;
    font-size: 16px;
    color: #8ab4ff;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
    letter-spacing: 0.5px;
  }

  #infoPanel .info-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    padding: 4px 0;
  }

  #infoPanel .info-label {
    color: #8a8aaa;
    font-weight: 500;
  }

  #infoPanel .info-value {
    color: #c0d0ff;
    font-family: 'Consolas', monospace;
    font-size: 12px;
  }

  #infoPanel .section-title {
    color: #6a9fff;
    font-weight: 600;
    margin-top: 12px;
    margin-bottom: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #infoPanel .no-selection {
    color: #666;
    font-style: italic;
    text-align: center;
    padding: 20px 0;
  }

  #undoRedoBar {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  #undoRedoBar button {
    padding: 10px 24px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    background: rgba(30, 30, 60, 0.85);
    color: #e0e0e0;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
  }

  #undoRedoBar button:hover:not(:disabled) {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(255,255,255,0.4);
  }

  #undoRedoBar button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div id="toolbar">
  <button id="translateBtn" class="active">⬛ Translate</button>
  <button id="rotateBtn">🔄 Rotate</button>
  <button id="scaleBtn">📐 Scale</button>
  <button id="snapToggle">🧲 Snap: OFF</button>
</div>

<div id="infoPanel">
  <h3>📋 Object Info</h3>
  <div id="infoPanelContent">
    <div class="no-selection">Click an object to select</div>
  </div>
</div>

<div id="undoRedoBar">
  <button id="undoBtn" disabled>⟲ Undo</button>
  <button id="redoBtn" disabled>⟳ Redo</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(8, 6, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x404080, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x5080ff, 1, 30);
pointLight.position.set(-5, 8, -5);
scene.add(pointLight);

const pointLight2 = new THREE.PointLight(0xff8050, 0.6, 20);
pointLight2.position.set(5, 3, 5);
scene.add(pointLight2);

// ─── Ground ───
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// ─── Grid ───
const gridHelper = new THREE.GridHelper(40, 80, 0x3a3a5a, 0x2a2a4a);
gridHelper.position.y = 0;
scene.add(gridHelper);

// ─── Create Objects ───
const objects = [];
const selectableObjects = [];

function createMaterial(color) {
  return new THREE.MeshStandardMaterial({
    color: color,
    roughness: 0.35,
    metalness: 0.3,
  });
}

// Box
const boxGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
const box = new THREE.Mesh(boxGeo, createMaterial(0xff6b6b));
box.name = 'box';
box.position.set(-4, 0.75, 0);
box.castShadow = true;
box.receiveShadow = true;
scene.add(box);
objects.push(box);
selectableObjects.push(box);

// Sphere
const sphereGeo = new THREE.SphereGeometry(0.9, 32, 32);
const sphere = new THREE.Mesh(sphereGeo, createMaterial(0x4ecdc4));
sphere.name = 'sphere';
sphere.position.set(-1.5, 0.9, 2);
sphere.castShadow = true;
sphere.receiveShadow = true;
scene.add(sphere);
objects.push(sphere);
selectableObjects.push(sphere);

// Cylinder
const cylinderGeo = new THREE.CylinderGeometry(0.7, 0.7, 2, 32);
const cylinder = new THREE.Mesh(cylinderGeo, createMaterial(0x45b7d1));
cylinder.name = 'cylinder';
cylinder.position.set(1.5, 1, -1);
cylinder.castShadow = true;
cylinder.receiveShadow = true;
scene.add(cylinder);
objects.push(cylinder);
selectableObjects.push(cylinder);

// Torus
const torusGeo = new THREE.TorusGeometry(0.8, 0.3, 16, 48);
const torus = new THREE.Mesh(torusGeo, createMaterial(0xf7dc6f));
torus.name = 'torus';
torus.position.set(4, 1, 1.5);
torus.castShadow = true;
torus.receiveShadow = true;
scene.add(torus);
objects.push(torus);
selectableObjects.push(torus);

// Cone
const coneGeo = new THREE.ConeGeometry(0.8, 2, 32);
const cone = new THREE.Mesh(coneGeo, createMaterial(0xbb8fce));
cone.name = 'cone';
cone.position.set(0, 1, -3);
cone.castShadow = true;
cone.receiveShadow = true;
scene.add(cone);
objects.push(cone);
selectableObjects.push(cone);

// ─── Controls ───
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enableDamping = true;
orbitControls.dampingFactor = 0.08;
orbitControls.minDistance = 3;
orbitControls.maxDistance = 30;

const transformControls = new TransformControls(camera, renderer.domElement);
scene.add(transformControls.getHelper());

transformControls.addEventListener('dragging-changed', (event) => {
  orbitControls.enabled = !event.value;
  if (!event.value && selectedObject) {
    // Dragging ended — save state
    pushUndoState();
  }
});

// ─── State ───
let selectedObject = null;
let currentMode = 'translate';
let snapEnabled = false;

// ─── Undo/Redo ───
const undoStack = [];
const redoStack = [];
const MAX_HISTORY = 50;

function captureState() {
  return objects.map(obj => ({
    name: obj.name,
    position: obj.position.clone(),
    rotation: obj.rotation.clone(),
    scale: obj.scale.clone(),
  }));
}

function applyState(state) {
  state.forEach(s => {
    const obj = objects.find(o => o.name === s.name);
    if (obj) {
      obj.position.copy(s.position);
      obj.rotation.copy(s.rotation);
      obj.scale.copy(s.scale);
    }
  });
  // Re-attach transform controls if object is selected
  if (selectedObject) {
    transformControls.attach(selectedObject);
  }
}

// Save initial state
let lastSavedState = captureState();

function pushUndoState() {
  const currentState = captureState();
  // Check if anything actually changed
  let changed = false;
  for (let i = 0; i < currentState.length; i++) {
    const c = currentState[i];
    const l = lastSavedState[i];
    if (!c.position.equals(l.position) || 
        c.rotation.x !== l.rotation.x || c.rotation.y !== l.rotation.y || c.rotation.z !== l.rotation.z ||
        !c.scale.equals(l.scale)) {
      changed = true;
      break;
    }
  }
  if (!changed) return;

  undoStack.push(lastSavedState);
  if (undoStack.length > MAX_HISTORY) undoStack.shift();
  redoStack.length = 0;
  lastSavedState = currentState;
  updateUndoRedoButtons();
}

function undo() {
  if (undoStack.length === 0) return;
  const currentState = captureState();
  redoStack.push(currentState);
  const prevState = undoStack.pop();
  applyState(prevState);
  lastSavedState = captureState();
  updateUndoRedoButtons();
}

function redo() {
  if (redoStack.length === 0) return;
  const currentState = captureState();
  undoStack.push(currentState);
  const nextState = redoStack.pop();
  applyState(nextState);
  lastSavedState = captureState();
  updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

// ─── Selection ───
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function selectObject(obj) {
  if (selectedObject) {
    // Reset emissive on previous selection
    if (selectedObject.material) {
      selectedObject.material.emissive.setHex(0x000000);
    }
  }
  selectedObject = obj;
  if (obj) {
    transformControls.attach(obj);
    if (obj.material) {
      obj.material.emissive.setHex(0x222244);
    }
    applySnap();
  } else {
    transformControls.detach();
  }
  updateInfoPanel();
}

// ─── Raycasting / Click ───
let pointerDownPos = new THREE.Vector2();

renderer.domElement.addEventListener('pointerdown', (event) => {
  pointerDownPos.set(event.clientX, event.clientY);
});

renderer.domElement.addEventListener('pointerup', (event) => {
  // Only treat as click if pointer didn't move much (not a drag)
  const dx = event.clientX - pointerDownPos.x;
  const dy = event.clientY - pointerDownPos.y;
  if (Math.sqrt(dx * dx + dy * dy) > 5) return;

  // Don't process clicks on the transform gizmo
  if (transformControls.dragging) return;

  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(selectableObjects, false);

  if (intersects.length > 0) {
    const hitObj = intersects[0].object;
    if (hitObj !== selectedObject) {
      // Save state before selection change (in case transform was in progress)
      selectObject(hitObj);
    }
  } else {
    // Click on blank: retain last selected object (behavior: retain last selection)
    // To deselect instead, uncomment the next line:
    // selectObject(null);
    selectObject(null);
  }
});

// ─── Mode Buttons ───
const translateBtn = document.getElementById('translateBtn');
const rotateBtn = document.getElementById('rotateBtn');
const scaleBtn = document.getElementById('scaleBtn');
const snapToggle = document.getElementById('snapToggle');

function setMode(mode) {
  currentMode = mode;
  transformControls.setMode(mode);
  translateBtn.classList.toggle('active', mode === 'translate');
  rotateBtn.classList.toggle('active', mode === 'rotate');
  scaleBtn.classList.toggle('active', mode === 'scale');
  applySnap();
}

translateBtn.addEventListener('click', () => setMode('translate'));
rotateBtn.addEventListener('click', () => setMode('rotate'));
scaleBtn.addEventListener('click', () => setMode('scale'));

// ─── Snap Toggle ───
function applySnap() {
  if (snapEnabled) {
    transformControls.setTranslationSnap(0.5);
    transformControls.setRotationSnap(Math.PI / 12); // 15 degrees
    transformControls.setScaleSnap(0.1);
  } else {
    transformControls.setTranslationSnap(null);
    transformControls.setRotationSnap(null);
    transformControls.setScaleSnap(null);
  }
}

snapToggle.addEventListener('click', () => {
  snapEnabled = !snapEnabled;
  snapToggle.textContent = snapEnabled ? '🧲 Snap: ON' : '🧲 Snap: OFF';
  snapToggle.classList.toggle('snap-on', snapEnabled);
  applySnap();
});

// ─── Undo/Redo Buttons ───
document.getElementById('undoBtn').addEventListener('click', undo);
document.getElementById('redoBtn').addEventListener('click', redo);

// ─── Keyboard Shortcuts ───
window.addEventListener('keydown', (e) => {
  if (e.key === 'w' || e.key === 'W') setMode('translate');
  if (e.key === 'e' || e.key === 'E') setMode('rotate');
  if (e.key === 'r' || e.key === 'R') setMode('scale');
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    e.preventDefault();
    if (e.shiftKey) redo();
    else undo();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
    e.preventDefault();
    redo();
  }
  if (e.key === 'Escape') {
    selectObject(null);
  }
});

// ─── Info Panel ───
function updateInfoPanel() {
  const content = document.getElementById('infoPanelContent');
  if (!selectedObject) {
    content.innerHTML = '<div class="no-selection">Click an object to select</div>';
    return;
  }

  const p = selectedObject.position;
  const r = selectedObject.rotation;
  const s = selectedObject.scale;

  // Display rotation in degrees for readability, __3D_STATE__ uses radians
  const toDeg = (rad) => (rad * 180 / Math.PI).toFixed(1);

  content.innerHTML = `
    <div class="info-row">
      <span class="info-label">Name:</span>
      <span class="info-value" style="color:#8ab4ff;font-weight:bold;">${selectedObject.name}</span>
    </div>
    <div class="section-title">Position</div>
    <div class="info-row"><span class="info-label">X:</span><span class="info-value">${p.x.toFixed(3)}</span></div>
    <div class="info-row"><span class="info-label">Y:</span><span class="info-value">${p.y.toFixed(3)}</span></div>
    <div class="info-row"><span class="info-label">Z:</span><span class="info-value">${p.z.toFixed(3)}</span></div>
    <div class="section-title">Rotation (radians)</div>
    <div class="info-row"><span class="info-label">X:</span><span class="info-value">${r.x.toFixed(3)} (${toDeg(r.x)}°)</span></div>
    <div class="info-row"><span class="info-label">Y:</span><span class="info-value">${r.y.toFixed(3)} (${toDeg(r.y)}°)</span></div>
    <div class="info-row"><span class="info-label">Z:</span><span class="info-value">${r.z.toFixed(3)} (${toDeg(r.z)}°)</span></div>
    <div class="section-title">Scale</div>
    <div class="info-row"><span class="info-label">X:</span><span class="info-value">${s.x.toFixed(3)}</span></div>
    <div class="info-row"><span class="info-label">Y:</span><span class="info-value">${s.y.toFixed(3)}</span></div>
    <div class="info-row"><span class="info-label">Z:</span><span class="info-value">${s.z.toFixed(3)}</span></div>
  `;
}

// ─── __3D_STATE__ ───
function updateState() {
  window.__3D_STATE__ = {
    objectCount: 5,
    selectedObject: selectedObject ? selectedObject.name : null,
    mode: currentMode,
    snapEnabled: snapEnabled,
    objects: objects.map(obj => ({
      name: obj.name,
      x: obj.position.x,
      y: obj.position.y,
      z: obj.position.z,
      rx: obj.rotation.x,
      ry: obj.rotation.y,
      rz: obj.rotation.z,
      sx: obj.scale.x,
      sy: obj.scale.y,
      sz: obj.scale.z,
    })),
  };
}

// ─── Evaluation Helpers ───
window.__ICG_select__ = function(name) {
  const obj = objects.find(o => o.name === name);
  if (obj) {
    selectObject(obj);
  }
};

window.__ICG_nudge__ = function(dx, dy, dz) {
  if (selectedObject) {
    selectedObject.position.x += dx;
    selectedObject.position.y += dy;
    selectedObject.position.z += dz;
    pushUndoState();
  }
};

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Transform change listener for live info panel updates ───
transformControls.addEventListener('change', () => {
  updateInfoPanel();
});

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);
  orbitControls.update();
  updateState();
  renderer.render(scene, camera);
}

// Initialize
setMode('translate');
updateState();
animate();
</script>
</body>
</html>
