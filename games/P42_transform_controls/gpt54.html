<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js TransformControls Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #eee;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: rgba(20, 20, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      backdrop-filter: blur(4px);
    }
    #toolbar button, #toolbar label {
      font-size: 14px;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #555;
      background: #222;
      color: #eee;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #2d2d2d; }
    button.active {
      background: #2d6cdf;
      border-color: #6ea0ff;
    }
    label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 6px;
      user-select: none;
    }
    #infoPanel {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 20;
      width: 320px;
      max-width: calc(100vw - 24px);
      padding: 12px;
      background: rgba(20, 20, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 13px;
    }
    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 20;
      padding: 10px 12px;
      background: rgba(20, 20, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 13px;
      color: #ddd;
    }
    canvas { display: block; }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="translateBtn" class="active">平移</button>
      <button id="rotateBtn">旋转</button>
      <button id="scaleBtn">缩放</button>
      <label><input type="checkbox" id="snapToggle" /> 吸附</label>
      <button id="undoBtn">撤销</button>
      <button id="redoBtn">重做</button>
    </div>

    <div id="infoPanel">未选中物体</div>

    <div id="hint">
      点击物体进行选择；点击空白处将取消选择。<br />
      拖拽坐标轴手柄进行平移 / 旋转 / 缩放。
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    const app = document.getElementById('app');
    const infoPanel = document.getElementById('infoPanel');

    const translateBtn = document.getElementById('translateBtn');
    const rotateBtn = document.getElementById('rotateBtn');
    const scaleBtn = document.getElementById('scaleBtn');
    const snapToggle = document.getElementById('snapToggle');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(8, 7, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const orbit = new OrbitControls(camera, renderer.domElement);
    orbit.enableDamping = true;
    orbit.target.set(0, 1, 0);

    const transformControls = new TransformControls(camera, renderer.domElement);
    transformControls.setMode('translate');
    scene.add(transformControls);

    transformControls.addEventListener('dragging-changed', (event) => {
      orbit.enabled = !event.value;
    });

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 40, 0x666666, 0x333333);
    scene.add(grid);

    const axes = new THREE.AxesHelper(3);
    scene.add(axes);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x222222, side: THREE.DoubleSide })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.001;
    scene.add(floor);

    const baseMaterial = (color) => new THREE.MeshStandardMaterial({ color, metalness: 0.15, roughness: 0.7 });

    const objects = [];
    const objectMap = new Map();

    function createObject(name, geometry, color, position) {
      const mesh = new THREE.Mesh(geometry, baseMaterial(color));
      mesh.name = name;
      mesh.position.copy(position);
      scene.add(mesh);
      objects.push(mesh);
      objectMap.set(name, mesh);
      return mesh;
    }

    createObject('box', new THREE.BoxGeometry(1.4, 1.4, 1.4), 0xff6b6b, new THREE.Vector3(-4, 0.7, 0));
    createObject('sphere', new THREE.SphereGeometry(0.9, 32, 24), 0x4ecdc4, new THREE.Vector3(-2, 0.9, -1));
    createObject('cylinder', new THREE.CylinderGeometry(0.7, 0.7, 1.8, 32), 0xffbe0b, new THREE.Vector3(0.5, 0.9, 1));
    createObject('torus', new THREE.TorusGeometry(0.8, 0.28, 16, 64), 0x8a5cff, new THREE.Vector3(3, 1.0, 0));
    createObject('cone', new THREE.ConeGeometry(0.8, 1.8, 32), 0x3a86ff, new THREE.Vector3(5.2, 0.9, -1));

    let selectedObject = null;
    let currentMode = 'translate';

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const history = [];
    const redoStack = [];
    let dragStartState = null;

    function cloneTransform(obj) {
      return {
        x: obj.position.x, y: obj.position.y, z: obj.position.z,
        rx: obj.rotation.x, ry: obj.rotation.y, rz: obj.rotation.z,
        sx: obj.scale.x, sy: obj.scale.y, sz: obj.scale.z
      };
    }

    function applyTransform(obj, state) {
      obj.position.set(state.x, state.y, state.z);
      obj.rotation.set(state.rx, state.ry, state.rz);
      obj.scale.set(state.sx, state.sy, state.sz);
    }

    function pushHistory(name, before, after) {
      const changed =
        before.x !== after.x || before.y !== after.y || before.z !== after.z ||
        before.rx !== after.rx || before.ry !== after.ry || before.rz !== after.rz ||
        before.sx !== after.sx || before.sy !== after.sy || before.sz !== after.sz;

      if (!changed) return;
      history.push({ name, before, after });
      redoStack.length = 0;
    }

    transformControls.addEventListener('mouseDown', () => {
      if (selectedObject) {
        dragStartState = cloneTransform(selectedObject);
      }
    });

    transformControls.addEventListener('objectChange', () => {
      updateInfoPanel();
    });

    transformControls.addEventListener('mouseUp', () => {
      if (selectedObject && dragStartState) {
        const after = cloneTransform(selectedObject);
        pushHistory(selectedObject.name, dragStartState, after);
      }
      dragStartState = null;
    });

    function setMode(mode) {
      currentMode = mode;
      transformControls.setMode(mode);
      updateButtons();
      applySnap();
    }

    function updateButtons() {
      translateBtn.classList.toggle('active', currentMode === 'translate');
      rotateBtn.classList.toggle('active', currentMode === 'rotate');
      scaleBtn.classList.toggle('active', currentMode === 'scale');
    }

    function applySnap() {
      const enabled = snapToggle.checked;
      if (!enabled) {
        transformControls.setTranslationSnap(null);
        transformControls.setRotationSnap(null);
        transformControls.setScaleSnap(null);
        return;
      }
      transformControls.setTranslationSnap(0.5);
      transformControls.setRotationSnap(Math.PI / 12);
      transformControls.setScaleSnap(null);
    }

    function selectObject(obj) {
      selectedObject = obj;
      if (obj) {
        transformControls.attach(obj);
      } else {
        transformControls.detach();
      }
      updateInfoPanel();
    }

    function updateInfoPanel() {
      if (!selectedObject) {
        infoPanel.textContent = [
          '当前选中: 无',
          `模式: ${currentMode}`,
          `吸附: ${snapToggle.checked ? '开' : '关'}`
        ].join('\n');
        return;
      }

      infoPanel.textContent = [
        `当前选中: ${selectedObject.name}`,
        `模式: ${currentMode}`,
        `吸附: ${snapToggle.checked ? '开' : '关'}`,
        '',
        `position:`,
        `  x: ${selectedObject.position.x.toFixed(3)}`,
        `  y: ${selectedObject.position.y.toFixed(3)}`,
        `  z: ${selectedObject.position.z.toFixed(3)}`,
        `rotation(rad):`,
        `  x: ${selectedObject.rotation.x.toFixed(3)}`,
        `  y: ${selectedObject.rotation.y.toFixed(3)}`,
        `  z: ${selectedObject.rotation.z.toFixed(3)}`,
        `scale:`,
        `  x: ${selectedObject.scale.x.toFixed(3)}`,
        `  y: ${selectedObject.scale.y.toFixed(3)}`,
        `  z: ${selectedObject.scale.z.toFixed(3)}`
      ].join('\n');
    }

    function getIntersects(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      return raycaster.intersectObjects(objects, false);
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (transformControls.dragging) return;

      const intersects = getIntersects(event.clientX, event.clientY);
      if (intersects.length > 0) {
        selectObject(intersects[0].object);
      } else {
        // 固定行为：点击空白处取消选择
        selectObject(null);
      }
    });

    translateBtn.addEventListener('click', () => setMode('translate'));
    rotateBtn.addEventListener('click', () => setMode('rotate'));
    scaleBtn.addEventListener('click', () => setMode('scale'));

    snapToggle.addEventListener('change', () => {
      applySnap();
      updateInfoPanel();
    });

    undoBtn.addEventListener('click', () => {
      const entry = history.pop();
      if (!entry) return;
      const obj = objectMap.get(entry.name);
      if (!obj) return;
      applyTransform(obj, entry.before);
      redoStack.push(entry);
      if (selectedObject === obj) updateInfoPanel();
    });

    redoBtn.addEventListener('click', () => {
      const entry = redoStack.pop();
      if (!entry) return;
      const obj = objectMap.get(entry.name);
      if (!obj) return;
      applyTransform(obj, entry.after);
      history.push(entry);
      if (selectedObject === obj) updateInfoPanel();
    });

    window.__ICG_select__ = function(name) {
      const obj = objectMap.get(name) || null;
      selectObject(obj);
    };

    window.__ICG_nudge__ = function(dx, dy, dz) {
      if (!selectedObject) return;
      const before = cloneTransform(selectedObject);
      selectedObject.position.x += dx;
      selectedObject.position.y += dy;
      selectedObject.position.z += dz;
      const after = cloneTransform(selectedObject);
      pushHistory(selectedObject.name, before, after);
      updateInfoPanel();
    };

    function update3DState() {
      window.__3D_STATE__ = {
        objectCount: 5,
        selectedObject: selectedObject ? selectedObject.name : null,
        mode: currentMode,
        snapEnabled: snapToggle.checked,
        objects: objects.map((obj) => ({
          name: obj.name,
          x: obj.position.x,
          y: obj.position.y,
          z: obj.position.z,
          rx: obj.rotation.x,
          ry: obj.rotation.y,
          rz: obj.rotation.z,
          sx: obj.scale.x,
          sy: obj.scale.y,
          sz: obj.scale.z
        }))
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', onResize);

    applySnap();
    updateButtons();
    updateInfoPanel();

    function animate() {
      requestAnimationFrame(animate);
      orbit.update();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
