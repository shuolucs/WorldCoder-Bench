<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Procedural Brain Connectivity Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: #ffffff;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border: 1px solid #334466;
            border-radius: 8px;
            pointer-events: none;
            line-height: 1.6;
        }
        #strengthFilterBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #334466;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        #strengthFilterBtn:hover {
            background: #445577;
        }
        .hud-label {
            color: #8899aa;
        }
        .hud-value {
            font-weight: bold;
            color: #00ffff;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div><span class="hud-label">Active Nodes:</span> <span id="activeCount" class="hud-value">0/3</span></div>
        <div><span class="hud-label">Group Filter:</span> <span id="groupFilter" class="hud-value">all</span></div>
        <div><span class="hud-label">Strength Threshold:</span> <span id="strengthThreshold" class="hud-value">0</span></div>
        <div><span class="hud-label">Signal Animation:</span> <span id="signalStatus" class="hud-value">ON</span></div>
        <div><span class="hud-label">Transparency Mode:</span> <span id="transparencyMode" class="hud-value">OFF</span></div>
        <div style="margin-top: 10px; font-size: 11px; color: #667788;">
            Click node to toggle<br>
            [G] Cycle Group<br>
            [R] Reset All<br>
            [S] Toggle Signals<br>
            [T] Toggle Transparency
        </div>
    </div>
    <button id="strengthFilterBtn">Strength Filter</button>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            nodeCount: 20,
            connectionCount: 35,
            activeNodes: [],
            activeConnectionCount: 0,
            groupFilter: 'all',
            strengthThreshold: 0.0,
            signalAnimationOn: true,
            transparencyMode: false,
            visibleNodeCount: 20,
            visibleConnectionCount: 35,
            cameraDistance: 80,
            frameCount: 0,
            lastClickedNodeId: -1,
            signalParticleCount: 0
        };

        const state = window.__3D_STATE__;
        const groupFilters = ['all', 'frontal', 'temporal', 'parietal', 'occipital'];
        const strengthThresholds = [0.0, 0.25, 0.5, 0.75];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 80);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(30, 30, 30);
        scene.add(pointLight);

        // --- Data Generation ---
        const nodesData = [];
        const nodeMeshes = [];
        const connectionsData = [];
        const connectionLines = [];
        const signalParticles = [];

        const groupColors = {
            'frontal': 0xff4466,
            'temporal': 0x44ff66,
            'parietal': 0x4466ff,
            'occipital': 0xffaa44
        };

        // Define left hemisphere indices to ensure exactly 10 left, 10 right
        const leftIndices = [0, 1, 2, 5, 6, 10, 11, 12, 15, 16];

        const nodeGeometry = new THREE.IcosahedronGeometry(1.5, 2);

        for (let i = 0; i < 20; i++) {
            let group;
            if (i < 5) group = 'frontal';
            else if (i < 10) group = 'temporal';
            else if (i < 15) group = 'parietal';
            else group = 'occipital';

            const isLeft = leftIndices.includes(i);
            const x = isLeft ? -5 - Math.random() * 20 : 5 + Math.random() * 20;
            const y = -15 + Math.random() * 30;
            const z = -10 + Math.random() * 20;

            const position = new THREE.Vector3(x, y, z);
            
            const material = new THREE.MeshStandardMaterial({
                color: groupColors[group],
                roughness: 0.4,
                metalness: 0.1,
                transparent: true,
                opacity: 1.0
            });

            const mesh = new THREE.Mesh(nodeGeometry, material);
            mesh.position.copy(position);
            mesh.userData = { id: i };
            scene.add(mesh);

            nodesData.push({
                id: i,
                position: position,
                group: group,
                active: false
            });
            nodeMeshes.push(mesh);
        }

        // Generate Connections
        const connectionPairs = new Set();
        
        function addConnection(u, v) {
            if (u === v) return false;
            const key = u < v ? `${u}-${v}` : `${v}-${u}`;
            if (connectionPairs.has(key)) return false;
            connectionPairs.add(key);
            
            const strength = 0.1 + Math.random() * 0.9;
            connectionsData.push({
                sourceId: u,
                targetId: v,
                strength: strength,
                active: false
            });
            return true;
        }

        // 5 intra-group per group
        for (let g = 0; g < 4; g++) {
            let added = 0;
            while (added < 5) {
                const u = g * 5 + Math.floor(Math.random() * 5);
                const v = g * 5 + Math.floor(Math.random() * 5);
                if (addConnection(u, v)) added++;
            }
        }

        // 5 cross-hemisphere
        let addedCross = 0;
        const rightIndices = Array.from({length: 20}, (_, i) => i).filter(i => !leftIndices.includes(i));
        while (addedCross < 5) {
            const u = leftIndices[Math.floor(Math.random() * leftIndices.length)];
            const v = rightIndices[Math.floor(Math.random() * rightIndices.length)];
            if (addConnection(u, v)) addedCross++;
        }

        // Remaining to 35
        while (connectionsData.length < 35) {
            const u = Math.floor(Math.random() * 20);
            const v = Math.floor(Math.random() * 20);
            addConnection(u, v);
        }

        // Create Line Meshes
        const lineMaterialBase = new THREE.LineBasicMaterial({
            color: 0x333355,
            transparent: true,
            opacity: 0.3
        });

        connectionsData.forEach((conn, index) => {
            const points = [
                nodesData[conn.sourceId].position,
                nodesData[conn.targetId].position
            ];
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(geometry, lineMaterialBase.clone());
            line.userData = { index: index };
            scene.add(line);
            connectionLines.push(line);
        });

        const particleGeometry = new THREE.SphereGeometry(0.4, 8, 8);
        const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffff });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateVisuals() {
            state.visibleNodeCount = 0;
            state.visibleConnectionCount = 0;
            state.activeConnectionCount = 0;

            // Update Nodes
            nodesData.forEach((node, i) => {
                const mesh = nodeMeshes[i];
                const isVisible = state.groupFilter === 'all' || node.group === state.groupFilter;
                mesh.visible = isVisible;
                
                if (isVisible) state.visibleNodeCount++;

                const isActive = state.activeNodes.includes(i);
                node.active = isActive;

                if (isActive) {
                    mesh.material.emissive.setHex(0xffffff);
                    mesh.material.emissiveIntensity = 0.6;
                    mesh.material.opacity = 1.0;
                } else {
                    mesh.material.emissive.setHex(0x000000);
                    mesh.material.emissiveIntensity = 0.0;
                    mesh.material.opacity = (state.transparencyMode && isVisible) ? 0.2 : 1.0;
                }
            });

            // Update Connections & Particles
            const currentActiveConnections = new Set();

            connectionsData.forEach((conn, i) => {
                const line = connectionLines[i];
                const sourceVisible = nodeMeshes[conn.sourceId].visible;
                const targetVisible = nodeMeshes[conn.targetId].visible;
                
                const isVisible = sourceVisible && targetVisible && (conn.strength >= state.strengthThreshold);
                line.visible = isVisible;

                if (isVisible) state.visibleConnectionCount++;

                const isActive = state.activeNodes.includes(conn.sourceId) || state.activeNodes.includes(conn.targetId);
                conn.active = isActive;

                if (isActive && isVisible) {
                    line.material.color.setHex(0xffffff);
                    line.material.opacity = 0.9;
                    currentActiveConnections.add(i);
                    state.activeConnectionCount++;
                } else {
                    line.material.color.setHex(0x333355);
                    line.material.opacity = 0.3;
                }
            });

            // Manage Signal Particles
            // Remove particles for inactive/hidden connections
            for (let i = signalParticles.length - 1; i >= 0; i--) {
                const p = signalParticles[i];
                if (!currentActiveConnections.has(p.connIndex)) {
                    scene.remove(p.mesh);
                    signalParticles.splice(i, 1);
                }
            }

            // Add particles for new active connections
            currentActiveConnections.forEach(connIndex => {
                const exists = signalParticles.some(p => p.connIndex === connIndex);
                if (!exists) {
                    const mesh = new THREE.Mesh(particleGeometry, particleMaterial);
                    scene.add(mesh);
                    signalParticles.push({
                        mesh: mesh,
                        connIndex: connIndex,
                        progress: Math.random() // Start at random position
                    });
                }
            });

            state.signalParticleCount = signalParticles.length;
            updateHUD();
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeMeshes);

            if (intersects.length > 0) {
                const clickedNodeMesh = intersects[0].object;
                // Only interact if visible
                if (!clickedNodeMesh.visible) return;

                const nodeId = clickedNodeMesh.userData.id;
                state.lastClickedNodeId = nodeId;

                const index = state.activeNodes.indexOf(nodeId);
                if (index > -1) {
                    // Deactivate
                    state.activeNodes.splice(index, 1);
                } else {
                    // Activate
                    state.activeNodes.push(nodeId);
                    if (state.activeNodes.length > 3) {
                        state.activeNodes.shift();
                    }
                }
                updateVisuals();
            }
        }

        window.addEventListener('click', onMouseClick);

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'g') {
                const currentIndex = groupFilters.indexOf(state.groupFilter);
                state.groupFilter = groupFilters[(currentIndex + 1) % groupFilters.length];
                updateVisuals();
            } else if (key === 'r') {
                state.activeNodes = [];
                state.groupFilter = 'all';
                state.strengthThreshold = 0.0;
                state.lastClickedNodeId = -1;
                updateVisuals();
            } else if (key === 's') {
                state.signalAnimationOn = !state.signalAnimationOn;
                updateVisuals();
            } else if (key === 't') {
                state.transparencyMode = !state.transparencyMode;
                updateVisuals();
            }
        });

        document.getElementById('strengthFilterBtn').addEventListener('click', () => {
            const currentIndex = strengthThresholds.indexOf(state.strengthThreshold);
            state.strengthThreshold = strengthThresholds[(currentIndex + 1) % strengthThresholds.length];
            updateVisuals();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        const hudActiveCount = document.getElementById('activeCount');
        const hudGroupFilter = document.getElementById('groupFilter');
        const hudStrengthThreshold = document.getElementById('strengthThreshold');
        const hudSignalStatus = document.getElementById('signalStatus');
        const hudTransparencyMode = document.getElementById('transparencyMode');

        function updateHUD() {
            hudActiveCount.innerText = `${state.activeNodes.length}/3`;
            hudGroupFilter.innerText = state.groupFilter.toUpperCase();
            hudStrengthThreshold.innerText = state.strengthThreshold.toFixed(2);
            hudSignalStatus.innerText = state.signalAnimationOn ? 'ON' : 'OFF';
            hudTransparencyMode.innerText = state.transparencyMode ? 'ON' : 'OFF';
        }

        // Initial visual update
        updateVisuals();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            state.frameCount++;
            state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            controls.update();

            if (state.signalAnimationOn) {
                signalParticles.forEach(p => {
                    const conn = connectionsData[p.connIndex];
                    // Speed proportional to strength
                    p.progress += 0.005 + (conn.strength * 0.015);
                    if (p.progress > 1) p.progress = 0;

                    const sourcePos = nodesData[conn.sourceId].position;
                    const targetPos = nodesData[conn.targetId].position;
                    
                    p.mesh.position.lerpVectors(sourcePos, targetPos, p.progress);
                    p.mesh.visible = true;
                });
            } else {
                signalParticles.forEach(p => {
                    p.mesh.visible = false;
                });
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
