<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Brain Connectivity Map</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(10, 10, 26, 0.75);
      border: 1px solid rgba(120, 160, 255, 0.25);
      border-radius: 10px;
      padding: 12px 14px;
      line-height: 1.55;
      font-size: 14px;
      min-width: 250px;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 18px rgba(50, 80, 180, 0.15);
    }

    #strengthFilterBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: #182040;
      color: white;
      border: 1px solid rgba(140, 180, 255, 0.35);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    #strengthFilterBtn:hover {
      background: #22305f;
    }

    #strengthFilterBtn:active {
      transform: scale(0.98);
    }

    .label {
      color: #9fb8ff;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><span class="label">Active nodes:</span> <span id="activeCount">0</span></div>
    <div><span class="label">Group filter:</span> <span id="groupFilter">all</span></div>
    <div><span class="label">Strength threshold:</span> <span id="strengthThreshold">0.00</span></div>
    <div><span class="label">Signal animation:</span> <span id="signalStatus">on</span></div>
    <div><span class="label">Transparency mode:</span> <span id="transparencyMode">off</span></div>
    <div style="margin-top:8px;color:#bfcfff;font-size:12px;">
      Click nodes to activate.<br/>
      Keys: <b>G</b> group, <b>R</b> reset, <b>S</b> signals, <b>T</b> transparency
    </div>
  </div>

  <button id="strengthFilterBtn">Strength Filter</button>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 0, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(30, 30, 30);
    scene.add(pointLight);

    const hud = {
      activeCount: document.getElementById("activeCount"),
      groupFilter: document.getElementById("groupFilter"),
      strengthThreshold: document.getElementById("strengthThreshold"),
      signalStatus: document.getElementById("signalStatus"),
      transparencyMode: document.getElementById("transparencyMode"),
    };

    const strengthFilterBtn = document.getElementById("strengthFilterBtn");

    const groupNames = ["all", "frontal", "temporal", "parietal", "occipital"];
    const groupColors = {
      frontal: 0xff4466,
      temporal: 0x44ff66,
      parietal: 0x4466ff,
      occipital: 0xffaa44,
    };

    const state = {
      activeNodeIds: [],
      groupFilter: "all",
      strengthThreshold: 0.0,
      signalAnimationOn: true,
      transparencyMode: false,
      frameCount: 0,
      lastClickedNodeId: -1,
    };

    window.__3D_STATE__ = {
      nodeCount: 20,
      connectionCount: 35,
      activeNodes: [],
      activeConnectionCount: 0,
      groupFilter: "all",
      strengthThreshold: 0,
      signalAnimationOn: true,
      transparencyMode: false,
      visibleNodeCount: 0,
      visibleConnectionCount: 0,
      cameraDistance: 80,
      frameCount: 0,
      lastClickedNodeId: -1,
      signalParticleCount: 0,
    };

    const nodes = [];
    const nodeMeshes = [];
    const nodeGroup = new THREE.Group();
    scene.add(nodeGroup);

    const nodeGeometry = new THREE.IcosahedronGeometry(1.5, 2);

    function groupForIndex(i) {
      if (i <= 4) return "frontal";
      if (i <= 9) return "temporal";
      if (i <= 14) return "parietal";
      return "occipital";
    }

    const predefinedPositions = [
      new THREE.Vector3(-22,  12,  2),
      new THREE.Vector3(-18,   8, -5),
      new THREE.Vector3(-20,   3,  6),
      new THREE.Vector3(-16,  -2, -3),
      new THREE.Vector3(-21,  -8,  4),

      new THREE.Vector3(-14,  10, -7),
      new THREE.Vector3(-12,   4,  8),
      new THREE.Vector3(-10,  -3, -6),
      new THREE.Vector3(-13,  -9,  2),
      new THREE.Vector3(-17, -13, -1),

      new THREE.Vector3( 17,  11,  3),
      new THREE.Vector3( 21,   7, -6),
      new THREE.Vector3( 18,   2,  7),
      new THREE.Vector3( 15,  -4, -4),
      new THREE.Vector3( 20,  -9,  5),

      new THREE.Vector3( 12,  10, -8),
      new THREE.Vector3( 10,   5,  8),
      new THREE.Vector3( 13,  -2, -7),
      new THREE.Vector3( 16,  -8,  1),
      new THREE.Vector3( 19, -13, -2),
    ];

    for (let i = 0; i < 20; i++) {
      const group = groupForIndex(i);
      const pos = predefinedPositions[i].clone();
      const material = new THREE.MeshStandardMaterial({
        color: groupColors[group],
        emissive: 0x000000,
        emissiveIntensity: 0,
        roughness: 0.35,
        metalness: 0.15,
        transparent: true,
        opacity: 1.0,
      });

      const mesh = new THREE.Mesh(nodeGeometry, material);
      mesh.position.copy(pos);
      mesh.userData.nodeId = i;

      nodeGroup.add(mesh);
      nodeMeshes.push(mesh);

      nodes.push({
        id: i,
        position: pos,
        group,
        active: false,
        mesh,
      });
    }

    const connections = [];
    const connectionGroup = new THREE.Group();
    scene.add(connectionGroup);

    function addConnection(sourceId, targetId, strength = THREE.MathUtils.randFloat(0.1, 1.0)) {
      if (sourceId === targetId) return false;

      const exists = connections.some(c =>
        (c.sourceId === sourceId && c.targetId === targetId) ||
        (c.sourceId === targetId && c.targetId === sourceId)
      );
      if (exists) return false;

      const p1 = nodes[sourceId].position;
      const p2 = nodes[targetId].position;

      const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
      const material = new THREE.LineBasicMaterial({
        color: 0x333355,
        transparent: true,
        opacity: 0.3,
      });

      const line = new THREE.Line(geometry, material);
      connectionGroup.add(line);

      connections.push({
        sourceId,
        targetId,
        strength,
        active: false,
        line,
        particle: null,
        progress: Math.random(),
      });

      return true;
    }

    // Exactly 35 connections
    // Frontal 5
    addConnection(0, 1);
    addConnection(1, 2);
    addConnection(2, 3);
    addConnection(3, 4);
    addConnection(0, 4);

    // Temporal 5
    addConnection(5, 6);
    addConnection(6, 7);
    addConnection(7, 8);
    addConnection(8, 9);
    addConnection(5, 9);

    // Parietal 5
    addConnection(10, 11);
    addConnection(11, 12);
    addConnection(12, 13);
    addConnection(13, 14);
    addConnection(10, 14);

    // Occipital 5
    addConnection(15, 16);
    addConnection(16, 17);
    addConnection(17, 18);
    addConnection(18, 19);
    addConnection(15, 19);

    // Cross-hemisphere 10
    addConnection(0, 10);
    addConnection(1, 11);
    addConnection(2, 12);
    addConnection(3, 13);
    addConnection(4, 14);
    addConnection(5, 15);
    addConnection(6, 16);
    addConnection(7, 17);
    addConnection(8, 18);
    addConnection(9, 19);

    // Additional 10 mixed
    addConnection(0, 5);
    addConnection(2, 7);
    addConnection(4, 9);
    addConnection(10, 15);
    addConnection(12, 17);
    addConnection(14, 19);
    addConnection(3, 8);
    addConnection(11, 16);
    addConnection(6, 12);
    addConnection(8, 14);

    const signalGeometry = new THREE.SphereGeometry(0.4, 12, 12);

    function createSignalParticle() {
      const material = new THREE.MeshBasicMaterial({
        color: 0x00ffff,
        transparent: true,
        opacity: 0.95,
      });
      return new THREE.Mesh(signalGeometry, material);
    }

    function refreshConnectionActivity() {
      for (const conn of connections) {
        const srcActive = nodes[conn.sourceId].active;
        const tgtActive = nodes[conn.targetId].active;
        conn.active = srcActive || tgtActive;

        if (conn.active) {
          conn.line.material.color.setHex(0xffffff);
          conn.line.material.opacity = 0.9;

          if (!conn.particle) {
            conn.particle = createSignalParticle();
            scene.add(conn.particle);
          }
        } else {
          conn.line.material.color.setHex(0x333355);
          conn.line.material.opacity = 0.3;

          if (conn.particle) {
            scene.remove(conn.particle);
            conn.particle.geometry.dispose?.();
            conn.particle.material.dispose?.();
            conn.particle = null;
          }
        }
      }
    }

    function updateNodeVisuals() {
      for (const node of nodes) {
        const mat = node.mesh.material;
        if (node.active) {
          mat.emissive.setHex(0xffffff);
          mat.emissiveIntensity = 0.6;
          mat.opacity = 1.0;
        } else {
          mat.emissive.setHex(0x000000);
          mat.emissiveIntensity = 0.0;
          mat.opacity = state.transparencyMode ? 0.2 : 1.0;
        }
      }
    }

    function nodePassesGroupFilter(node) {
      return state.groupFilter === "all" || node.group === state.groupFilter;
    }

    function connectionPassesFilters(conn) {
      const sourceNode = nodes[conn.sourceId];
      const targetNode = nodes[conn.targetId];
      const strengthOk = conn.strength >= state.strengthThreshold;
      const groupOk = state.groupFilter === "all"
        ? true
        : (sourceNode.group === state.groupFilter && targetNode.group === state.groupFilter);

      return strengthOk && groupOk;
    }

    function updateVisibility() {
      for (const node of nodes) {
        node.mesh.visible = nodePassesGroupFilter(node);
      }

      for (const conn of connections) {
        const visible = connectionPassesFilters(conn);
        conn.line.visible = visible;
        if (conn.particle) conn.particle.visible = visible && state.signalAnimationOn;
      }
    }

    function resetAll() {
      for (const node of nodes) node.active = false;
      state.activeNodeIds = [];
      state.groupFilter = "all";
      state.strengthThreshold = 0.0;
      state.signalAnimationOn = true;
      state.transparencyMode = false;
      state.lastClickedNodeId = -1;

      for (const conn of connections) {
        conn.active = false;
        if (conn.particle) {
          scene.remove(conn.particle);
          conn.particle.geometry.dispose?.();
          conn.particle.material.dispose?.();
          conn.particle = null;
        }
      }

      updateNodeVisuals();
      refreshConnectionActivity();
      updateVisibility();
      updateHud();
    }

    function toggleNode(nodeId) {
      const node = nodes[nodeId];
      state.lastClickedNodeId = nodeId;

      if (node.active) {
        node.active = false;
        state.activeNodeIds = state.activeNodeIds.filter(id => id !== nodeId);
      } else {
        if (state.activeNodeIds.length >= 3) {
          const oldestId = state.activeNodeIds.shift();
          if (oldestId !== undefined) nodes[oldestId].active = false;
        }
        node.active = true;
        state.activeNodeIds.push(nodeId);
      }

      updateNodeVisuals();
      refreshConnectionActivity();
      updateVisibility();
      updateHud();
    }

    function updateHud() {
      hud.activeCount.textContent = state.activeNodeIds.length;
      hud.groupFilter.textContent = state.groupFilter;
      hud.strengthThreshold.textContent = state.strengthThreshold.toFixed(2);
      hud.signalStatus.textContent = state.signalAnimationOn ? "on" : "off";
      hud.transparencyMode.textContent = state.transparencyMode ? "on" : "off";
    }

    strengthFilterBtn.addEventListener("click", () => {
      const thresholds = [0.0, 0.25, 0.5, 0.75];
      const idx = thresholds.indexOf(state.strengthThreshold);
      state.strengthThreshold = thresholds[(idx + 1) % thresholds.length];
      updateVisibility();
      updateHud();
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "g") {
        const idx = groupNames.indexOf(state.groupFilter);
        state.groupFilter = groupNames[(idx + 1) % groupNames.length];
        updateVisibility();
        updateHud();
      } else if (key === "r") {
        resetAll();
      } else if (key === "s") {
        state.signalAnimationOn = !state.signalAnimationOn;
        updateVisibility();
        updateHud();
      } else if (key === "t") {
        state.transparencyMode = !state.transparencyMode;
        updateNodeVisuals();
        updateHud();
      }
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    renderer.domElement.addEventListener("pointerdown", (event) => {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(nodeMeshes.filter(m => m.visible), false);

      if (intersects.length > 0) {
        const nodeId = intersects[0].object.userData.nodeId;
        toggleNode(nodeId);
      }
    });

    function updateSignalParticles(delta) {
      for (const conn of connections) {
        if (!conn.active || !conn.particle) continue;

        const visible = conn.line.visible && state.signalAnimationOn;
        conn.particle.visible = visible;

        if (!state.signalAnimationOn || !visible) continue;

        const source = nodes[conn.sourceId].position;
        const target = nodes[conn.targetId].position;
        const speed = 0.15 + conn.strength * 0.6;

        conn.progress = (conn.progress + delta * speed) % 1.0;
        conn.particle.position.lerpVectors(source, target, conn.progress);
      }
    }

    function update3DState() {
      const visibleNodeCount = nodes.filter(n => n.mesh.visible).length;
      const visibleConnectionCount = connections.filter(c => c.line.visible).length;
      const activeConnectionCount = connections.filter(c => c.active).length;
      const signalParticleCount = connections.filter(c => c.particle).length;

      window.__3D_STATE__.nodeCount = 20;
      window.__3D_STATE__.connectionCount = 35;
      window.__3D_STATE__.activeNodes = [...state.activeNodeIds];
      window.__3D_STATE__.activeConnectionCount = activeConnectionCount;
      window.__3D_STATE__.groupFilter = state.groupFilter;
      window.__3D_STATE__.strengthThreshold = state.strengthThreshold;
      window.__3D_STATE__.signalAnimationOn = state.signalAnimationOn;
      window.__3D_STATE__.transparencyMode = state.transparencyMode;
      window.__3D_STATE__.visibleNodeCount = visibleNodeCount;
      window.__3D_STATE__.visibleConnectionCount = visibleConnectionCount;
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.frameCount = state.frameCount;
      window.__3D_STATE__.lastClickedNodeId = state.lastClickedNodeId;
      window.__3D_STATE__.signalParticleCount = signalParticleCount;
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      state.frameCount++;
      controls.update();
      updateSignalParticles(delta);
      update3DState();

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateNodeVisuals();
    refreshConnectionActivity();
    updateVisibility();
    updateHud();
    animate();
  </script>
</body>
</html>
