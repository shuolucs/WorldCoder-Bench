<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Keyframe Editor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #eee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 30, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            gap: 15px;
            align-items: center;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }
        button, select {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            outline: none;
        }
        button:hover, select:hover {
            background: #4a4a4a;
        }
        button:active {
            background: #222;
        }
        #timeSlider {
            flex-grow: 1;
            cursor: pointer;
            accent-color: #4CAF50;
        }
        #timeDisplay {
            font-family: monospace;
            font-size: 16px;
            min-width: 45px;
            text-align: right;
            color: #4CAF50;
        }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            line-height: 1.5;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .key { color: #ffeb3b; font-weight: bold; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="instructions">
        <div>1. Drag the box using the gizmo to set a position.</div>
        <div>2. Move the slider to a specific time.</div>
        <div>3. Click <span class="key">Add Keyframe</span> to record.</div>
        <div style="margin-top: 8px; font-size: 12px; color: #aaa;">* Scrubbing timeline will pause playback.</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <button id="playPauseBtn">Play</button>
        <input type="range" id="timeSlider" min="0" max="5" step="0.01" value="0">
        <div id="timeDisplay">0.00</div>
        <button id="addKeyframeBtn">Add Keyframe</button>
        <select id="interpSelect">
            <option value="linear">Linear</option>
            <option value="smooth">Smooth</option>
        </select>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            keyframeCount: 0,
            currentTime: 0,
            isPlaying: false,
            interpType: 'linear',
            objectPos: { x: 0, y: 0, z: 0 }
        };

        let keyframes = []; // Array of { t: number, pos: THREE.Vector3 }
        const DURATION = 5.0;
        let isDragging = false;

        // --- DOM Elements ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const timeSlider = document.getElementById('timeSlider');
        const timeDisplay = document.getElementById('timeDisplay');
        const addKeyframeBtn = document.getElementById('addKeyframeBtn');
        const interpSelect = document.getElementById('interpSelect');
        const container = document.getElementById('canvas-container');

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.Fog(0x222222, 10, 50);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Grid & Helpers
        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
        scene.add(grid);

        // Object (Box)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x4CAF50, 
            roughness: 0.4, 
            metalness: 0.1 
        });
        const box = new THREE.Mesh(geometry, material);
        box.position.set(0, 0.5, 0);
        scene.add(box);

        // Controls
        const orbitControls = new OrbitControls(camera, renderer.domElement);
        orbitControls.enableDamping = true;
        orbitControls.dampingFactor = 0.05;

        const transformControls = new TransformControls(camera, renderer.domElement);
        transformControls.addEventListener('dragging-changed', function (event) {
            orbitControls.enabled = !event.value;
            isDragging = event.value;
        });
        transformControls.attach(box);
        scene.add(transformControls);

        // Visual Helpers for Keyframes
        let pathLine = null;
        const markerGroup = new THREE.Group();
        scene.add(markerGroup);

        // --- Logic Functions ---

        function getInterpolatedPosition(t) {
            if (keyframes.length === 0) return null;
            if (keyframes.length === 1) return keyframes[0].pos.clone();

            // Clamp time
            if (t <= keyframes[0].t) return keyframes[0].pos.clone();
            if (t >= keyframes[keyframes.length - 1].t) return keyframes[keyframes.length - 1].pos.clone();

            // Find segment
            let k0, k1;
            for (let i = 0; i < keyframes.length - 1; i++) {
                if (t >= keyframes[i].t && t <= keyframes[i+1].t) {
                    k0 = keyframes[i];
                    k1 = keyframes[i+1];
                    break;
                }
            }

            let alpha = (t - k0.t) / (k1.t - k0.t);

            // Apply interpolation type
            if (window.__3D_STATE__.interpType === 'smooth') {
                // Smoothstep for ease-in-out between keyframes
                alpha = THREE.MathUtils.smoothstep(alpha, 0, 1);
            }

            const pos = new THREE.Vector3();
            pos.lerpVectors(k0.pos, k1.pos, alpha);
            return pos;
        }

        function updateVisuals() {
            // Clear old
            markerGroup.clear();
            if (pathLine) {
                scene.remove(pathLine);
                pathLine.geometry.dispose();
                pathLine.material.dispose();
                pathLine = null;
            }

            if (keyframes.length === 0) return;

            // Draw Markers
            const markerGeo = new THREE.SphereGeometry(0.15, 16, 16);
            const markerMat = new THREE.MeshBasicMaterial({ color: 0xffeb3b });
            
            keyframes.forEach(k => {
                const marker = new THREE.Mesh(markerGeo, markerMat);
                marker.position.copy(k.pos);
                markerGroup.add(marker);
            });

            // Draw Path
            if (keyframes.length > 1) {
                const points = [];
                const steps = 100;
                const startT = keyframes[0].t;
                const endT = keyframes[keyframes.length - 1].t;
                
                for (let i = 0; i <= steps; i++) {
                    const t = startT + (endT - startT) * (i / steps);
                    points.push(getInterpolatedPosition(t));
                }
                
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
                pathLine = new THREE.Line(lineGeo, lineMat);
                scene.add(pathLine);
            }
        }

        function addKeyframe() {
            const t = window.__3D_STATE__.currentTime;
            const pos = box.position.clone();
            const epsilon = 0.01;

            const existingIndex = keyframes.findIndex(k => Math.abs(k.t - t) < epsilon);
            
            if (existingIndex !== -1) {
                // Overwrite
                keyframes[existingIndex].pos.copy(pos);
            } else {
                // Add and sort
                keyframes.push({ t: t, pos: pos });
                keyframes.sort((a, b) => a.t - b.t);
            }
            
            window.__3D_STATE__.keyframeCount = keyframes.length;
            updateVisuals();
        }

        // --- Event Listeners ---

        playPauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            playPauseBtn.textContent = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            playPauseBtn.style.background = window.__3D_STATE__.isPlaying ? '#f44336' : '#333';
        });

        timeSlider.addEventListener('input', (e) => {
            // Scrubbing pauses playback
            window.__3D_STATE__.isPlaying = false;
            playPauseBtn.textContent = 'Play';
            playPauseBtn.style.background = '#333';
            
            window.__3D_STATE__.currentTime = parseFloat(e.target.value);
            timeDisplay.textContent = window.__3D_STATE__.currentTime.toFixed(2);
            
            // Immediately update box position on scrub if not dragging
            if (!isDragging && keyframes.length > 0) {
                const newPos = getInterpolatedPosition(window.__3D_STATE__.currentTime);
                if (newPos) box.position.copy(newPos);
            }
        });

        addKeyframeBtn.addEventListener('click', addKeyframe);

        interpSelect.addEventListener('change', (e) => {
            window.__3D_STATE__.interpType = e.target.value;
            updateVisuals();
            // Force update position if paused
            if (!window.__3D_STATE__.isPlaying && !isDragging && keyframes.length > 0) {
                const newPos = getInterpolatedPosition(window.__3D_STATE__.currentTime);
                if (newPos) box.position.copy(newPos);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            // Handle Playback
            if (window.__3D_STATE__.isPlaying) {
                window.__3D_STATE__.currentTime += delta;
                
                // Loop
                if (window.__3D_STATE__.currentTime > DURATION) {
                    window.__3D_STATE__.currentTime = 0;
                }
                
                // Update UI
                timeSlider.value = window.__3D_STATE__.currentTime;
                timeDisplay.textContent = window.__3D_STATE__.currentTime.toFixed(2);
            }

            // Update Box Position from Keyframes (if not manually dragging)
            if (!isDragging && keyframes.length > 0 && (window.__3D_STATE__.isPlaying || keyframes.length === 1)) {
                const newPos = getInterpolatedPosition(window.__3D_STATE__.currentTime);
                if (newPos) {
                    box.position.copy(newPos);
                }
            }

            // Update Exposed State
            window.__3D_STATE__.objectPos.x = box.position.x;
            window.__3D_STATE__.objectPos.y = box.position.y;
            window.__3D_STATE__.objectPos.z = box.position.z;

            orbitControls.update();
            renderer.render(scene, camera);
        }

        // Start
        animate();
    </script>
</body>
</html>
