<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 关键帧动画编辑器</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }

    #app {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: 100%;
    }

    #panel {
      box-sizing: border-box;
      padding: 16px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      overflow: auto;
    }

    #panel h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .row {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #bbb;
    }

    button, select, input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }

    button, select {
      height: 36px;
      border: 1px solid #444;
      background: #262626;
      color: #eee;
      border-radius: 8px;
      padding: 0 10px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: #303030;
    }

    input[type="range"] {
      cursor: pointer;
    }

    #canvasWrap {
      position: relative;
      height: 100%;
    }

    #info {
      position: absolute;
      left: 12px;
      top: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
      white-space: pre-line;
    }

    #hint {
      font-size: 12px;
      color: #999;
      line-height: 1.6;
    }

    #keyframeList {
      font-size: 12px;
      line-height: 1.6;
      background: #141414;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px;
      max-height: 220px;
      overflow: auto;
      white-space: pre-wrap;
    }

    .mini {
      font-size: 12px;
      color: #999;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="panel">
      <h2>关键帧动画编辑器</h2>

      <div class="row">
        <label for="playPauseBtn">播放控制</label>
        <button id="playPauseBtn">播放</button>
      </div>

      <div class="row">
        <label for="timeSlider">时间轴（0–5 秒）</label>
        <input id="timeSlider" type="range" min="0" max="5" step="0.01" value="0" />
        <div class="mini">当前时间：<span id="timeLabel">0.00</span> s</div>
      </div>

      <div class="row">
        <label for="interpSelect">插值方式</label>
        <select id="interpSelect">
          <option value="linear">linear</option>
          <option value="smooth">smooth</option>
        </select>
      </div>

      <div class="row">
        <label for="addKeyframeBtn">关键帧</label>
        <button id="addKeyframeBtn">添加当前关键帧</button>
        <div class="mini" style="margin-top:6px;">
          若相同 t（按 0.01 秒精度）已存在关键帧，则直接覆盖。
        </div>
      </div>

      <div class="row">
        <label>当前盒体位置</label>
        <div id="posLabel" class="mini">x: 0.00, y: 0.00, z: 0.00</div>
      </div>

      <div class="row">
        <label>关键帧列表</label>
        <div id="keyframeList">（暂无关键帧）</div>
      </div>

      <div id="hint">
        操作说明：<br />
        1. 鼠标拖拽旋转视角，滚轮缩放。<br />
        2. 盒体带有 TransformControls，可直接拖动位置。<br />
        3. 点击“添加当前关键帧”把当前位置记录到当前时间。<br />
        4. 拖动时间轴可 scrub；本实现中 scrub 时会自动暂停。<br />
      </div>
    </div>

    <div id="canvasWrap">
      <div id="info"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { TransformControls } from 'three/addons/controls/TransformControls.js';

    const DURATION = 5.0;

    const playPauseBtn = document.getElementById('playPauseBtn');
    const addKeyframeBtn = document.getElementById('addKeyframeBtn');
    const timeSlider = document.getElementById('timeSlider');
    const interpSelect = document.getElementById('interpSelect');
    const timeLabel = document.getElementById('timeLabel');
    const posLabel = document.getElementById('posLabel');
    const keyframeList = document.getElementById('keyframeList');
    const info = document.getElementById('info');
    const canvasWrap = document.getElementById('canvasWrap');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252f);

    const camera = new THREE.PerspectiveCamera(
      60,
      canvasWrap.clientWidth / canvasWrap.clientHeight,
      0.1,
      100
    );
    camera.position.set(6, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(canvasWrap.clientWidth, canvasWrap.clientHeight);
    canvasWrap.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const transformControls = new TransformControls(camera, renderer.domElement);
    transformControls.setMode('translate');
    scene.add(transformControls);

    transformControls.addEventListener('dragging-changed', (event) => {
      controls.enabled = !event.value;
    });

    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 8, 4);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
    scene.add(grid);

    const axes = new THREE.AxesHelper(2.5);
    scene.add(axes);

    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const boxMat = new THREE.MeshStandardMaterial({
      color: 0x4da3ff,
      metalness: 0.15,
      roughness: 0.7
    });
    const box = new THREE.Mesh(boxGeo, boxMat);
    box.position.set(-2, 1, 0);
    scene.add(box);

    transformControls.attach(box);

    const pathLineMaterial = new THREE.LineBasicMaterial({ color: 0xffcc33 });
    let pathLine = null;

    let keyframes = [
      { t: 0.00, x: -2, y: 1, z: 0 },
      { t: 2.50, x: 0, y: 2, z: 2 },
      { t: 5.00, x: 2, y: 1, z: 0 }
    ];

    let currentTime = 0;
    let isPlaying = false;
    let interpType = 'linear';

    window.__3D_STATE__ = {
      keyframeCount: 0,
      currentTime: 0,
      isPlaying: false,
      interpType: 'linear',
      objectPos: { x: box.position.x, y: box.position.y, z: box.position.z }
    };

    function roundTime01(t) {
      return Math.round(t * 100) / 100;
    }

    function sortKeyframes() {
      keyframes.sort((a, b) => a.t - b.t);
    }

    function setState() {
      window.__3D_STATE__.keyframeCount = keyframes.length;
      window.__3D_STATE__.currentTime = currentTime;
      window.__3D_STATE__.isPlaying = isPlaying;
      window.__3D_STATE__.interpType = interpType;
      window.__3D_STATE__.objectPos = {
        x: box.getWorldPosition(new THREE.Vector3()).x,
        y: box.getWorldPosition(new THREE.Vector3()).y,
        z: box.getWorldPosition(new THREE.Vector3()).z
      };
    }

    function updateLabels() {
      timeLabel.textContent = currentTime.toFixed(2);
      posLabel.textContent = `x: ${box.position.x.toFixed(2)}, y: ${box.position.y.toFixed(2)}, z: ${box.position.z.toFixed(2)}`;

      info.textContent =
`Time: ${currentTime.toFixed(2)} s
Playing: ${isPlaying}
Interp: ${interpType}
Keyframes: ${keyframes.length}
Box Pos: (${box.position.x.toFixed(2)}, ${box.position.y.toFixed(2)}, ${box.position.z.toFixed(2)})`;
    }

    function refreshKeyframeList() {
      if (keyframes.length === 0) {
        keyframeList.textContent = '（暂无关键帧）';
        return;
      }
      keyframeList.textContent = keyframes
        .map((k, i) => `${i}. t=${k.t.toFixed(2)}  ->  (${k.x.toFixed(2)}, ${k.y.toFixed(2)}, ${k.z.toFixed(2)})`)
        .join('\n');
    }

    function rebuildPathLine() {
      if (pathLine) {
        scene.remove(pathLine);
        pathLine.geometry.dispose();
      }

      if (keyframes.length < 2) {
        pathLine = null;
        return;
      }

      let points = [];

      if (interpType === 'linear') {
        points = keyframes.map(k => new THREE.Vector3(k.x, k.y, k.z));
      } else {
        const curvePoints = keyframes.map(k => new THREE.Vector3(k.x, k.y, k.z));
        const curve = new THREE.CatmullRomCurve3(curvePoints, false, 'catmullrom', 0.5);
        points = curve.getPoints(100);
      }

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      pathLine = new THREE.Line(geometry, pathLineMaterial);
      scene.add(pathLine);
    }

    function vecFromKF(k) {
      return new THREE.Vector3(k.x, k.y, k.z);
    }

    function smoothInterpolate(t) {
      if (keyframes.length === 0) return new THREE.Vector3();
      if (keyframes.length === 1) return vecFromKF(keyframes[0]).clone();

      if (t <= keyframes[0].t) return vecFromKF(keyframes[0]).clone();
      if (t >= keyframes[keyframes.length - 1].t) return vecFromKF(keyframes[keyframes.length - 1]).clone();

      let i = 0;
      for (; i < keyframes.length - 1; i++) {
        if (t >= keyframes[i].t && t <= keyframes[i + 1].t) break;
      }

      const k0 = keyframes[Math.max(0, i - 1)];
      const k1 = keyframes[i];
      const k2 = keyframes[i + 1];
      const k3 = keyframes[Math.min(keyframes.length - 1, i + 2)];

      const localT = (t - k1.t) / Math.max(1e-6, (k2.t - k1.t));

      const p0 = vecFromKF(k0);
      const p1 = vecFromKF(k1);
      const p2 = vecFromKF(k2);
      const p3 = vecFromKF(k3);

      const out = new THREE.Vector3();
      out.x = THREE.MathUtils.catmullRom(localT, p0.x, p1.x, p2.x, p3.x);
      out.y = THREE.MathUtils.catmullRom(localT, p0.y, p1.y, p2.y, p3.y);
      out.z = THREE.MathUtils.catmullRom(localT, p0.z, p1.z, p2.z, p3.z);
      return out;
    }

    function linearInterpolate(t) {
      if (keyframes.length === 0) return box.position.clone();
      if (keyframes.length === 1) return vecFromKF(keyframes[0]).clone();

      if (t <= keyframes[0].t) return vecFromKF(keyframes[0]).clone();
      if (t >= keyframes[keyframes.length - 1].t) return vecFromKF(keyframes[keyframes.length - 1]).clone();

      for (let i = 0; i < keyframes.length - 1; i++) {
        const a = keyframes[i];
        const b = keyframes[i + 1];
        if (t >= a.t && t <= b.t) {
          const alpha = (t - a.t) / Math.max(1e-6, (b.t - a.t));
          return new THREE.Vector3(
            THREE.MathUtils.lerp(a.x, b.x, alpha),
            THREE.MathUtils.lerp(a.y, b.y, alpha),
            THREE.MathUtils.lerp(a.z, b.z, alpha)
          );
        }
      }

      return vecFromKF(keyframes[keyframes.length - 1]).clone();
    }

    function evaluateAt(t) {
      return interpType === 'smooth' ? smoothInterpolate(t) : linearInterpolate(t);
    }

    function applyTime(t) {
      currentTime = THREE.MathUtils.clamp(t, 0, DURATION);
      const p = evaluateAt(currentTime);
      box.position.copy(p);
      timeSlider.value = currentTime.toFixed(2);
      updateLabels();
      setState();
    }

    function addOrReplaceKeyframe() {
      const t = roundTime01(currentTime);
      const kf = {
        t,
        x: box.position.x,
        y: box.position.y,
        z: box.position.z
      };

      const idx = keyframes.findIndex(k => roundTime01(k.t) === t);
      if (idx >= 0) {
        // 约定：若相同 t 已存在，则覆盖该关键帧
        keyframes[idx] = kf;
      } else {
        keyframes.push(kf);
      }

      sortKeyframes();
      refreshKeyframeList();
      rebuildPathLine();
      setState();
    }

    playPauseBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      playPauseBtn.textContent = isPlaying ? '暂停' : '播放';
      setState();
    });

    addKeyframeBtn.addEventListener('click', () => {
      addOrReplaceKeyframe();
    });

    timeSlider.addEventListener('input', (e) => {
      // 本实现中，scrub 时自动暂停
      isPlaying = false;
      playPauseBtn.textContent = '播放';
      applyTime(parseFloat(e.target.value));
    });

    interpSelect.addEventListener('change', (e) => {
      interpType = e.target.value;
      applyTime(currentTime);
      rebuildPathLine();
      setState();
    });

    transformControls.addEventListener('objectChange', () => {
      updateLabels();
      setState();
    });

    window.addEventListener('resize', () => {
      camera.aspect = canvasWrap.clientWidth / canvasWrap.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(canvasWrap.clientWidth, canvasWrap.clientHeight);
    });

    sortKeyframes();
    refreshKeyframeList();
    rebuildPathLine();
    applyTime(0);

    let prevTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      const dt = (now - prevTime) / 1000;
      prevTime = now;

      if (isPlaying) {
        currentTime += dt;

        // 这里采用循环播放（loop）而不是 clamp
        if (currentTime > DURATION) {
          currentTime = currentTime % DURATION;
        }

        applyTime(currentTime);
      }

      controls.update();
      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
