<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Asteroid Defense</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 18px;
            pointer-events: none;
            text-shadow: 1px 1px 2px #000;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border: 1px solid #0f0;
        }
        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            display: none;
            text-shadow: 2px 2px 4px #000;
        }
        #game-over-overlay {
            color: #f00;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">Score: 0 | Wave: 1 | HP: 5 | Shield CD: 0s</div>
    <div id="game-over-overlay" class="overlay">GAME OVER</div>
    <div id="pause-overlay" class="overlay">PAUSED</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            score: 0,
            wave: 1,
            stationHP: 5,
            asteroidCount: 0,
            projectileCount: 0,
            shieldActive: false,
            shieldCooldownRemaining: 0,
            gameOver: false,
            paused: false,
            modelLoaded: false,
            totalAsteroidsDestroyed: 0,
            totalShotsFired: 0
        };
        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        // Starfield
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const starsVertices = [];
        for (let i = 0; i < 500; i++) {
            const r = 200 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            starsVertices.push(x, y, z);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const starfield = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starfield);

        // Player Model
        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/gh/AlaricRFF/assets-for-three-js/MaterialsVariantsShoe.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(3, 3, 3);
            model.position.set(0, 0, 0);
            model.rotation.x = -Math.PI / 2;
            scene.add(model);
            state.modelLoaded = true;
        });

        // Shield Mesh
        const shieldGeometry = new THREE.SphereGeometry(4, 16, 16);
        const shieldMaterial = new THREE.MeshBasicMaterial({ color: 0x0000ff, wireframe: true, transparent: true, opacity: 0.5 });
        const shieldMesh = new THREE.Mesh(shieldGeometry, shieldMaterial);

        // Game Entities & Variables
        const asteroids = [];
        const projectiles = [];
        const clock = new THREE.Clock();
        
        let waveTimer = 0;
        let spawnTimer = 0;
        let shieldActiveTimer = 0;

        const asteroidGeometry = new THREE.IcosahedronGeometry(1, 0);
        const asteroidMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const projectileGeometry = new THREE.SphereGeometry(0.2, 8, 8);
        const projectileMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });

        // Raycaster for shooting
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const targetPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
        const targetPoint = new THREE.Vector3();

        // Input Handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('click', (event) => {
            if (state.gameOver || state.paused) return;
            if (projectiles.length >= 20) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            raycaster.ray.intersectPlane(targetPlane, targetPoint);

            const projectile = new THREE.Mesh(projectileGeometry, projectileMaterial);
            projectile.position.set(0, 1, 0);
            
            const direction = new THREE.Vector3().subVectors(targetPoint, projectile.position).normalize();
            projectile.userData.velocity = direction.multiplyScalar(0.5); // 0.5 units/frame
            
            scene.add(projectile);
            projectiles.push(projectile);
            state.totalShotsFired++;
        });

        window.addEventListener('keydown', (event) => {
            if (state.gameOver) return;
            
            if (event.key.toLowerCase() === 'p') {
                state.paused = !state.paused;
                document.getElementById('pause-overlay').style.display = state.paused ? 'block' : 'none';
            }

            if (event.key.toLowerCase() === 's' && !state.paused) {
                if (state.shieldCooldownRemaining <= 0 && !state.shieldActive) {
                    state.shieldActive = true;
                    shieldActiveTimer = 3;
                    state.shieldCooldownRemaining = 5;
                    scene.add(shieldMesh);
                }
            }
        });

        function spawnAsteroid() {
            if (asteroids.length >= 10) return;

            const radius = 40;
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = radius * Math.sin(phi) * Math.cos(theta);
            const y = radius * Math.sin(phi) * Math.sin(theta);
            const z = radius * Math.cos(phi);

            const asteroid = new THREE.Mesh(asteroidGeometry, asteroidMaterial);
            asteroid.position.set(x, y, z);
            
            const speed = 0.05 * Math.pow(1.1, state.wave - 1); // 0.05 units/frame, +10% per wave
            const direction = new THREE.Vector3().subVectors(new THREE.Vector3(0,0,0), asteroid.position).normalize();
            asteroid.userData.velocity = direction.multiplyScalar(speed);
            asteroid.userData.hp = 3;

            scene.add(asteroid);
            asteroids.push(asteroid);
        }

        function updateHUD() {
            const hud = document.getElementById('hud');
            const cd = Math.max(0, Math.ceil(state.shieldCooldownRemaining));
            hud.innerHTML = `Score: ${state.score} | Wave: ${state.wave} | HP: ${state.stationHP} | Shield CD: ${cd}s`;
        }

        function removeAsteroid(index) {
            scene.remove(asteroids[index]);
            asteroids.splice(index, 1);
        }

        function removeProjectile(index) {
            scene.remove(projectiles[index]);
            projectiles.splice(index, 1);
        }

        // Game Loop
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (!state.gameOver && !state.paused) {
                // Wave System
                waveTimer += delta;
                if (waveTimer >= 20) {
                    state.wave++;
                    waveTimer = 0;
                }

                // Spawning
                const currentSpawnInterval = 2.0 * Math.pow(0.8, state.wave - 1);
                spawnTimer += delta;
                if (spawnTimer >= currentSpawnInterval) {
                    spawnAsteroid();
                    spawnTimer = 0;
                }

                // Shield Logic
                if (state.shieldActive) {
                    shieldActiveTimer -= delta;
                    if (shieldActiveTimer <= 0) {
                        state.shieldActive = false;
                        scene.remove(shieldMesh);
                    }
                }
                if (state.shieldCooldownRemaining > 0) {
                    state.shieldCooldownRemaining -= delta;
                    if (state.shieldCooldownRemaining < 0) state.shieldCooldownRemaining = 0;
                }

                // Update Projectiles
                for (let i = projectiles.length - 1; i >= 0; i--) {
                    const p = projectiles[i];
                    p.position.add(p.userData.velocity);
                    
                    if (p.position.length() > 50) {
                        removeProjectile(i);
                    }
                }

                // Update Asteroids & Collisions
                for (let i = asteroids.length - 1; i >= 0; i--) {
                    const a = asteroids[i];
                    a.position.add(a.userData.velocity);
                    const distToOrigin = a.position.length();

                    // Shield Collision
                    if (state.shieldActive && distToOrigin < 4) {
                        state.score += 50;
                        state.totalAsteroidsDestroyed++;
                        removeAsteroid(i);
                        continue;
                    }

                    // Station Collision
                    if (distToOrigin < 2) {
                        state.stationHP--;
                        removeAsteroid(i);
                        if (state.stationHP <= 0) {
                            state.gameOver = true;
                            document.getElementById('game-over-overlay').style.display = 'block';
                        }
                        continue;
                    }

                    // Projectile Collision
                    let hit = false;
                    for (let j = projectiles.length - 1; j >= 0; j--) {
                        const p = projectiles[j];
                        if (p.position.distanceTo(a.position) < 1.5) {
                            a.userData.hp--;
                            removeProjectile(j);
                            hit = true;
                            if (a.userData.hp <= 0) {
                                state.score += 100;
                                state.totalAsteroidsDestroyed++;
                                removeAsteroid(i);
                            }
                            break; // Asteroid hit, move to next asteroid
                        }
                    }
                }
            }

            // Update State counts
            state.asteroidCount = asteroids.length;
            state.projectileCount = projectiles.length;

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
