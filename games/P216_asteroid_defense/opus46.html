<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asteroid Defense Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 18px;
    background: rgba(0,0,0,0.6);
    padding: 10px 15px;
    border: 1px solid #0f0;
    border-radius: 5px;
    z-index: 10;
    pointer-events: none;
}
#game-over-overlay, #pause-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 20;
    pointer-events: none;
}
#game-over-overlay {
    background: rgba(139, 0, 0, 0.5);
}
#pause-overlay {
    background: rgba(0, 0, 0, 0.5);
}
#game-over-overlay span {
    color: #ff0000;
    font-family: 'Courier New', monospace;
    font-size: 72px;
    font-weight: bold;
    text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000;
}
#pause-overlay span {
    color: #ffff00;
    font-family: 'Courier New', monospace;
    font-size: 72px;
    font-weight: bold;
    text-shadow: 0 0 20px #ffff00, 0 0 40px #ffff00;
}
</style>
</head>
<body>

<div id="hud">Score: 0 | Wave: 1 | HP: 5 | Shield CD: 0s</div>
<div id="game-over-overlay"><span>GAME OVER</span></div>
<div id="pause-overlay"><span>PAUSED</span></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    score: 0,
    wave: 1,
    stationHP: 5,
    asteroidCount: 0,
    projectileCount: 0,
    shieldActive: false,
    shieldCooldownRemaining: 0,
    gameOver: false,
    paused: false,
    modelLoaded: false,
    totalAsteroidsDestroyed: 0,
    totalShotsFired: 0
};
window.__3D_STATE__ = state;

// Scene
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 20, 10);
scene.add(directionalLight);

// Starfield
const starGroup = new THREE.Group();
for (let i = 0; i < 500; i++) {
    const starGeo = new THREE.SphereGeometry(0.3, 4, 4);
    const starMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const star = new THREE.Mesh(starGeo, starMat);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 200;
    star.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    );
    starGroup.add(star);
}
scene.add(starGroup);

// Load model
let stationModel = null;
const loader = new GLTFLoader();
loader.load(
    'https://cdn.jsdelivr.net/gh/AlaricRFF/assets-for-three-js/MaterialsVariantsShoe.glb',
    (gltf) => {
        stationModel = gltf.scene;
        stationModel.scale.set(3, 3, 3);
        stationModel.position.set(0, 0, 0);
        stationModel.rotation.x = -Math.PI / 2;
        scene.add(stationModel);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.error('Error loading model:', error);
        // Fallback: create a simple station
        const fallbackGeo = new THREE.BoxGeometry(2, 2, 2);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
        stationModel = new THREE.Mesh(fallbackGeo, fallbackMat);
        stationModel.position.set(0, 0, 0);
        scene.add(stationModel);
        state.modelLoaded = true;
    }
);

// Asteroids
const asteroids = [];
let asteroidSpawnInterval = 2000; // ms
let asteroidSpeed = 0.05;
let lastAsteroidSpawn = 0;

function spawnAsteroid() {
    if (asteroids.length >= 10 || state.gameOver || state.paused) return;

    const geo = new THREE.IcosahedronGeometry(1, 0);
    const mat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const asteroid = new THREE.Mesh(geo, mat);

    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 40;
    asteroid.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    );

    asteroid.userData.hp = 3;
    const direction = new THREE.Vector3(0, 0, 0).sub(asteroid.position).normalize();
    asteroid.userData.direction = direction;

    scene.add(asteroid);
    asteroids.push(asteroid);
}

// Projectiles
const projectiles = [];

function shootProjectile(targetPoint) {
    if (projectiles.length >= 20 || state.gameOver || state.paused) return;

    const geo = new THREE.SphereGeometry(0.2, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
    const projectile = new THREE.Mesh(geo, mat);
    projectile.position.set(0, 1, 0);

    const direction = new THREE.Vector3().subVectors(targetPoint, projectile.position).normalize();
    projectile.userData.direction = direction;

    scene.add(projectile);
    projectiles.push(projectile);
    state.totalShotsFired++;
}

// Raycasting for shooting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Invisible plane for raycasting
const planeGeo = new THREE.PlaneGeometry(200, 200);
const planeMat = new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide });
const invisiblePlane = new THREE.Mesh(planeGeo, planeMat);
invisiblePlane.position.z = 0;
scene.add(invisiblePlane);

renderer.domElement.addEventListener('click', (event) => {
    if (state.gameOver || state.paused) return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(invisiblePlane);

    if (intersects.length > 0) {
        shootProjectile(intersects[0].point);
    } else {
        // Fallback: unproject to a point
        const target = new THREE.Vector3(mouse.x, mouse.y, 0.5);
        target.unproject(camera);
        const dir = target.sub(camera.position).normalize();
        const distance = 30;
        const point = camera.position.clone().add(dir.multiplyScalar(distance));
        shootProjectile(point);
    }
});

// Shield
let shieldMesh = null;
let shieldActiveTime = 0;
let shieldCooldownEnd = 0;
const SHIELD_DURATION = 3000; // ms
const SHIELD_COOLDOWN = 5000; // ms

function createShield() {
    const geo = new THREE.SphereGeometry(4, 16, 16);
    const mat = new THREE.MeshBasicMaterial({
        color: 0x0088ff,
        transparent: true,
        opacity: 0.3,
        wireframe: true
    });
    shieldMesh = new THREE.Mesh(geo, mat);
    shieldMesh.position.set(0, 0, 0);
    scene.add(shieldMesh);
}

function activateShield() {
    if (state.shieldActive || state.gameOver || state.paused) return;
    const now = performance.now();
    if (now < shieldCooldownEnd) return;

    state.shieldActive = true;
    shieldActiveTime = now;
    createShield();
}

function deactivateShield() {
    state.shieldActive = false;
    if (shieldMesh) {
        scene.remove(shieldMesh);
        shieldMesh.geometry.dispose();
        shieldMesh.material.dispose();
        shieldMesh = null;
    }
    shieldCooldownEnd = performance.now() + SHIELD_COOLDOWN;
}

// Keyboard
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    if (key === 's') {
        activateShield();
    } else if (key === 'p') {
        if (!state.gameOver) {
            state.paused = !state.paused;
            if (state.paused) {
                pauseStartTime = performance.now();
                document.getElementById('pause-overlay').style.display = 'flex';
            } else {
                const pauseDuration = performance.now() - pauseStartTime;
                // Adjust timers
                lastAsteroidSpawn += pauseDuration;
                waveStartTime += pauseDuration;
                if (state.shieldActive) shieldActiveTime += pauseDuration;
                if (shieldCooldownEnd > 0) shieldCooldownEnd += pauseDuration;
                document.getElementById('pause-overlay').style.display = 'none';
            }
        }
    }
});

let pauseStartTime = 0;

// Wave system
let waveStartTime = performance.now();
const WAVE_DURATION = 20000; // ms

// HUD
const hudEl = document.getElementById('hud');
const gameOverEl = document.getElementById('game-over-overlay');

function updateHUD() {
    const now = performance.now();
    let cdRemaining = 0;
    if (!state.shieldActive && shieldCooldownEnd > now) {
        cdRemaining = Math.ceil((shieldCooldownEnd - now) / 1000);
    }
    state.shieldCooldownRemaining = cdRemaining;
    hudEl.textContent = `Score: ${state.score} | Wave: ${state.wave} | HP: ${state.stationHP} | Shield CD: ${cdRemaining}s`;
}

function removeAsteroid(index) {
    const asteroid = asteroids[index];
    scene.remove(asteroid);
    asteroid.geometry.dispose();
    asteroid.material.dispose();
    asteroids.splice(index, 1);
}

function removeProjectile(index) {
    const projectile = projectiles[index];
    scene.remove(projectile);
    projectile.geometry.dispose();
    projectile.material.dispose();
    projectiles.splice(index, 1);
}

function gameOverFunc() {
    state.gameOver = true;
    gameOverEl.style.display = 'flex';
}

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
let lastTime = performance.now();
lastAsteroidSpawn = performance.now();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();

    if (state.paused || state.gameOver) {
        if (!state.gameOver) {
            // Still render but don't update
        }
        renderer.render(scene, camera);

        // Update state counts
        state.asteroidCount = asteroids.length;
        state.projectileCount = projectiles.length;
        return;
    }

    const currentSpeed = asteroidSpeed;
    const currentSpawnInterval = asteroidSpawnInterval;

    // Wave system
    if (now - waveStartTime >= WAVE_DURATION) {
        state.wave++;
        waveStartTime = now;
        asteroidSpawnInterval *= 0.8;
        asteroidSpeed *= 1.1;
    }

    // Spawn asteroids
    if (now - lastAsteroidSpawn >= currentSpawnInterval) {
        spawnAsteroid();
        lastAsteroidSpawn = now;
    }

    // Shield timer
    if (state.shieldActive && now - shieldActiveTime >= SHIELD_DURATION) {
        deactivateShield();
    }

    // Pulse shield
    if (shieldMesh) {
        shieldMesh.material.opacity = 0.2 + 0.15 * Math.sin(now * 0.005);
    }

    // Move asteroids
    for (let i = asteroids.length - 1; i >= 0; i--) {
        const asteroid = asteroids[i];
        asteroid.position.add(asteroid.userData.direction.clone().multiplyScalar(asteroidSpeed));
        asteroid.rotation.x += 0.01;
        asteroid.rotation.y += 0.015;

        const dist = asteroid.position.length();

        // Shield check
        if (state.shieldActive && dist < 4) {
            state.score += 50;
            state.totalAsteroidsDestroyed++;
            removeAsteroid(i);
            continue;
        }

        // Station hit
        if (dist < 2) {
            state.stationHP--;
            removeAsteroid(i);
            if (state.stationHP <= 0) {
                gameOverFunc();
                break;
            }
            continue;
        }
    }

    // Move projectiles
    for (let i = projectiles.length - 1; i >= 0; i--) {
        const projectile = projectiles[i];
        projectile.position.add(projectile.userData.direction.clone().multiplyScalar(0.5));

        // Remove if too far
        if (projectile.position.length() > 50) {
            removeProjectile(i);
            continue;
        }

        // Check collision with asteroids
        let hit = false;
        for (let j = asteroids.length - 1; j >= 0; j--) {
            const asteroid = asteroids[j];
            const dist = projectile.position.distanceTo(asteroid.position);
            if (dist < 1.5) {
                asteroid.userData.hp--;
                if (asteroid.userData.hp <= 0) {
                    state.score += 100;
                    state.totalAsteroidsDestroyed++;
                    removeAsteroid(j);
                }
                removeProjectile(i);
                hit = true;
                break;
            }
        }
        if (hit) continue;
    }

    // Rotate station slightly
    if (stationModel) {
        stationModel.rotation.z += 0.005;
    }

    // Update state
    state.asteroidCount = asteroids.length;
    state.projectileCount = projectiles.length;

    updateHUD();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
