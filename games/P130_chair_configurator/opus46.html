<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chair Advanced Configurator</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    color: #e0e0e0;
    padding: 18px 22px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 220px;
    z-index: 10;
  }
  #hud .label { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
  #hud .value { color: #fff; font-weight: 600; font-size: 15px; }
  #hud .divider { height: 1px; background: rgba(255,255,255,0.1); margin: 8px 0; }

  #controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(15px);
    padding: 24px 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 30px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
  }

  .control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .control-group .group-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #888;
    font-weight: 600;
  }
  .control-group .btn-row {
    display: flex;
    gap: 6px;
  }

  .btn {
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #ccc;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.25s ease;
    letter-spacing: 0.3px;
  }
  .btn:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  }

  .btn-action {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }
  #saveBtn {
    background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    color: #fff;
  }
  #saveBtn:hover {
    box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
    transform: translateY(-1px);
  }
  #loadBtn {
    background: linear-gradient(135deg, #fc5c7d 0%, #6a82fb 100%);
    color: #fff;
  }
  #loadBtn:hover {
    box-shadow: 0 4px 15px rgba(106, 130, 251, 0.3);
    transform: translateY(-1px);
  }

  input[type="color"] {
    -webkit-appearance: none;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    width: 44px;
    height: 44px;
    cursor: pointer;
    background: transparent;
    padding: 2px;
  }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
  input[type="color"]::-webkit-color-swatch { border-radius: 5px; border: none; }

  #loading-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #1a1a2e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 1000;
    transition: opacity 0.5s ease;
  }
  #loading-overlay.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 50px; height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: #888; margin-top: 16px; font-size: 14px; letter-spacing: 1px; }

  .separator {
    width: 1px;
    height: 50px;
    background: rgba(255,255,255,0.1);
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading Chair Model...</div>
</div>

<div id="hud">
  <div class="label">Material</div>
  <div class="value" id="materialType">Leather</div>
  <div class="divider"></div>
  <div class="label">Color</div>
  <div class="value" id="colorValue">#8B4513</div>
  <div class="divider"></div>
  <div class="label">Saved Configs</div>
  <div class="value" id="savedCount">0</div>
</div>

<div id="controls">
  <div class="control-group">
    <div class="group-label">Material</div>
    <div class="btn-row">
      <button class="btn active" id="matLeather">Leather</button>
      <button class="btn" id="matFabric">Fabric</button>
      <button class="btn" id="matVelvet">Velvet</button>
    </div>
  </div>

  <div class="separator"></div>

  <div class="control-group">
    <div class="group-label">Cushion Color</div>
    <input type="color" id="cushionColor" value="#8B4513">
  </div>

  <div class="separator"></div>

  <div class="control-group">
    <div class="group-label">Leg Style</div>
    <div class="btn-row">
      <button class="btn active" id="legStyle">Wood</button>
    </div>
  </div>

  <div class="separator"></div>

  <div class="control-group">
    <div class="group-label">Configuration</div>
    <div class="btn-row">
      <button class="btn-action" id="saveBtn">💾 Save</button>
      <button class="btn-action" id="loadBtn">📂 Load</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
let currentMaterial = 'Leather';
let currentColor = '#8B4513';
let currentLegStyle = 'wood';
let modelLoaded = false;
let chairModel = null;
let cushionMeshes = [];
let legMeshes = [];

window.__3D_STATE__ = {
  modelLoaded: false,
  materialType: 'Leather',
  colorHex: '#8B4513',
  legStyle: 'wood',
  savedConfigs: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(2.5, 2, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 1.5;
controls.maxDistance = 8;
controls.target.set(0, 0.5, 0);
controls.maxPolarAngle = Math.PI * 0.85;

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
mainLight.position.set(5, 8, 5);
mainLight.castShadow = true;
mainLight.shadow.mapSize.set(2048, 2048);
mainLight.shadow.camera.near = 0.5;
mainLight.shadow.camera.far = 20;
mainLight.shadow.camera.left = -5;
mainLight.shadow.camera.right = 5;
mainLight.shadow.camera.top = 5;
mainLight.shadow.camera.bottom = -5;
mainLight.shadow.bias = -0.001;
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0x8888ff, 0.5);
fillLight.position.set(-3, 4, -3);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xffc0cb, 0.4);
rimLight.position.set(0, 3, -5);
scene.add(rimLight);

const pointLight = new THREE.PointLight(0xffd700, 0.3, 10);
pointLight.position.set(-2, 2, 2);
scene.add(pointLight);

// Environment map (simple)
const envScene = new THREE.Scene();
const envColors = [0x2a2a4a, 0x3a3a5a, 0x4a4a6a, 0x2a2a4a, 0x1a1a3a, 0x3a3a5a];
const pmremGenerator = new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

// Create a simple gradient environment
const envRT = pmremGenerator.fromScene((() => {
  const s = new THREE.Scene();
  s.background = new THREE.Color(0x2a2a4a);
  const geo = new THREE.SphereGeometry(5, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color: 0x3a3a5a, side: THREE.BackSide });
  s.add(new THREE.Mesh(geo, mat));
  return s;
})());
scene.environment = envRT.texture;

// Ground plane
const groundGeo = new THREE.CircleGeometry(4, 64);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x222244,
  roughness: 0.8,
  metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Material presets
function createMaterialPreset(type, color) {
  const col = new THREE.Color(color);
  let mat;

  switch (type) {
    case 'Leather':
      mat = new THREE.MeshPhysicalMaterial({
        color: col,
        roughness: 0.3,
        metalness: 0.1,
        clearcoat: 0.3,
        clearcoatRoughness: 0.4,
      });
      break;
    case 'Fabric':
      mat = new THREE.MeshPhysicalMaterial({
        color: col,
        roughness: 0.9,
        metalness: 0,
      });
      break;
    case 'Velvet':
      mat = new THREE.MeshPhysicalMaterial({
        color: col,
        roughness: 0.7,
        metalness: 0.05,
        sheen: 1.0,
        sheenRoughness: 0.3,
        sheenColor: new THREE.Color(col).lerp(new THREE.Color(0xffffff), 0.3),
      });
      break;
    default:
      mat = new THREE.MeshPhysicalMaterial({ color: col, roughness: 0.5, metalness: 0.1 });
  }
  return mat;
}

function createLegMaterial(style) {
  if (style === 'wood') {
    return new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(0x8B5E3C),
      roughness: 0.8,
      metalness: 0.0,
    });
  } else {
    return new THREE.MeshPhysicalMaterial({
      color: new THREE.Color(0xC0C0C0),
      roughness: 0.2,
      metalness: 0.9,
    });
  }
}

// Identify meshes
function categorizeMeshes(model) {
  cushionMeshes = [];
  legMeshes = [];

  const allMeshes = [];
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      allMeshes.push(child);
    }
  });

  if (allMeshes.length === 0) return;

  // Try to categorize by name first
  let foundByName = false;
  allMeshes.forEach((mesh) => {
    const name = (mesh.name || '').toLowerCase();
    if (name.includes('leg') || name.includes('foot') || name.includes('base') || name.includes('support')) {
      legMeshes.push(mesh);
      foundByName = true;
    } else if (name.includes('cushion') || name.includes('seat') || name.includes('back') || name.includes('pad') || name.includes('fabric') || name.includes('cloth')) {
      cushionMeshes.push(mesh);
      foundByName = true;
    }
  });

  // If no categorization by name, use position-based heuristic
  if (!foundByName || (cushionMeshes.length === 0 && legMeshes.length === 0)) {
    cushionMeshes = [];
    legMeshes = [];

    // Compute bounding boxes for each mesh
    const meshData = allMeshes.map(mesh => {
      const box = new THREE.Box3().setFromObject(mesh);
      const center = new THREE.Vector3();
      box.getCenter(center);
      return { mesh, box, center, minY: box.min.y, maxY: box.max.y };
    });

    // Find overall bounding box
    const overallBox = new THREE.Box3().setFromObject(model);
    const midY = (overallBox.min.y + overallBox.max.y) / 2;
    const lowerThird = overallBox.min.y + (overallBox.max.y - overallBox.min.y) * 0.35;

    if (allMeshes.length === 1) {
      // Single mesh - treat as cushion
      cushionMeshes = [allMeshes[0]];
    } else {
      meshData.forEach(({ mesh, center, minY, maxY }) => {
        if (maxY < lowerThird || center.y < lowerThird) {
          legMeshes.push(mesh);
        } else {
          cushionMeshes.push(mesh);
        }
      });

      // If all ended up in one category, split differently
      if (cushionMeshes.length === 0) {
        cushionMeshes = allMeshes;
      }
      if (legMeshes.length === 0 && allMeshes.length > 1) {
        // Pick the mesh with lowest center as legs
        meshData.sort((a, b) => a.center.y - b.center.y);
        legMeshes = [meshData[0].mesh];
        cushionMeshes = cushionMeshes.filter(m => m !== meshData[0].mesh);
      }
    }
  }

  // If still no cushion meshes, use all
  if (cushionMeshes.length === 0) {
    cushionMeshes = allMeshes;
  }

  console.log('Cushion meshes:', cushionMeshes.map(m => m.name));
  console.log('Leg meshes:', legMeshes.map(m => m.name));
}

// Apply materials
function applyCushionMaterial() {
  const mat = createMaterialPreset(currentMaterial, currentColor);
  cushionMeshes.forEach(mesh => {
    mesh.material = mat;
  });
}

function applyLegMaterial() {
  const mat = createLegMaterial(currentLegStyle);
  legMeshes.forEach(mesh => {
    mesh.material = mat;
  });
}

// Load model
const loader = new GLTFLoader();
loader.load(
  'assets/SheenChair.glb',
  (gltf) => {
    chairModel = gltf.scene;

    // Center model
    const box = new THREE.Box3().setFromObject(chairModel);
    const center = new THREE.Vector3();
    box.getCenter(center);
    const size = new THREE.Vector3();
    box.getSize(size);

    chairModel.position.sub(center);
    chairModel.position.y += size.y / 2;

    // Scale if needed
    const maxDim = Math.max(size.x, size.y, size.z);
    if (maxDim > 3) {
      const scale = 2 / maxDim;
      chairModel.scale.setScalar(scale);
    }

    scene.add(chairModel);

    categorizeMeshes(chairModel);
    applyCushionMaterial();
    applyLegMaterial();

    modelLoaded = true;
    window.__3D_STATE__.modelLoaded = true;

    // Hide loading overlay
    document.getElementById('loading-overlay').classList.add('hidden');
    setTimeout(() => {
      document.getElementById('loading-overlay').style.display = 'none';
    }, 500);
  },
  (progress) => {
    // Loading progress
  },
  (error) => {
    console.error('Error loading model:', error);
    document.querySelector('.loading-text').textContent = 'Error loading model. Check console.';
  }
);

// UI Event Handlers
const matButtons = ['matLeather', 'matFabric', 'matVelvet'];
const matNames = { matLeather: 'Leather', matFabric: 'Fabric', matVelvet: 'Velvet' };

matButtons.forEach(id => {
  document.getElementById(id).addEventListener('click', () => {
    matButtons.forEach(bid => document.getElementById(bid).classList.remove('active'));
    document.getElementById(id).classList.add('active');
    currentMaterial = matNames[id];
    applyCushionMaterial();
    updateHUD();
  });
});

document.getElementById('cushionColor').addEventListener('input', (e) => {
  currentColor = e.target.value;
  applyCushionMaterial();
  updateHUD();
});

const legStyleBtn = document.getElementById('legStyle');
legStyleBtn.addEventListener('click', () => {
  currentLegStyle = currentLegStyle === 'wood' ? 'metal' : 'wood';
  legStyleBtn.textContent = currentLegStyle === 'wood' ? 'Wood' : 'Metal';
  legStyleBtn.classList.toggle('active');
  if (currentLegStyle === 'metal') {
    legStyleBtn.style.background = 'linear-gradient(135deg, #a8a8a8 0%, #e0e0e0 100%)';
    legStyleBtn.style.color = '#333';
    legStyleBtn.style.borderColor = 'transparent';
  } else {
    legStyleBtn.style.background = '';
    legStyleBtn.style.color = '';
    legStyleBtn.style.borderColor = '';
    legStyleBtn.classList.add('active');
  }
  applyLegMaterial();
  updateHUD();
});

// Save/Load
function getSavedConfigs() {
  try {
    const data = localStorage.getItem('chairConfigs');
    return data ? JSON.parse(data) : [];
  } catch {
    return [];
  }
}

function updateSavedCount() {
  const configs = getSavedConfigs();
  document.getElementById('savedCount').textContent = configs.length;
  window.__3D_STATE__.savedConfigs = configs.length;
}

document.getElementById('saveBtn').addEventListener('click', () => {
  const config = {
    material: currentMaterial,
    color: currentColor,
    legStyle: currentLegStyle,
    timestamp: Date.now()
  };

  const configs = getSavedConfigs();
  configs.push(config);
  localStorage.setItem('chairConfigs', JSON.stringify(configs));
  // Also save as "last config" for quick load
  localStorage.setItem('chairLastConfig', JSON.stringify(config));
  updateSavedCount();

  // Visual feedback
  const btn = document.getElementById('saveBtn');
  const orig = btn.textContent;
  btn.textContent = '✅ Saved!';
  setTimeout(() => { btn.textContent = orig; }, 1200);
});

document.getElementById('loadBtn').addEventListener('click', () => {
  const configStr = localStorage.getItem('chairLastConfig');
  if (!configStr) {
    const btn = document.getElementById('loadBtn');
    const orig = btn.textContent;
    btn.textContent = '❌ No Config';
    setTimeout(() => { btn.textContent = orig; }, 1200);
    return;
  }

  try {
    const config = JSON.parse(configStr);

    // Apply material
    currentMaterial = config.material || 'Leather';
    matButtons.forEach(bid => document.getElementById(bid).classList.remove('active'));
    const matKey = 'mat' + currentMaterial;
    if (document.getElementById(matKey)) {
      document.getElementById(matKey).classList.add('active');
    }

    // Apply color
    currentColor = config.color || '#8B4513';
    document.getElementById('cushionColor').value = currentColor;

    // Apply leg style
    currentLegStyle = config.legStyle || 'wood';
    legStyleBtn.textContent = currentLegStyle === 'wood' ? 'Wood' : 'Metal';
    if (currentLegStyle === 'metal') {
      legStyleBtn.style.background = 'linear-gradient(135deg, #a8a8a8 0%, #e0e0e0 100%)';
      legStyleBtn.style.color = '#333';
      legStyleBtn.style.borderColor = 'transparent';
    } else {
      legStyleBtn.style.background = '';
      legStyleBtn.style.color = '';
      legStyleBtn.style.borderColor = '';
    }

    applyCushionMaterial();
    applyLegMaterial();
    updateHUD();

    // Visual feedback
    const btn = document.getElementById('loadBtn');
    const orig = btn.textContent;
    btn.textContent = '✅ Loaded!';
    setTimeout(() => { btn.textContent = orig; }, 1200);
  } catch (e) {
    console.error('Error loading config:', e);
  }
});

// HUD update
function updateHUD() {
  document.getElementById('materialType').textContent = currentMaterial;
  document.getElementById('colorValue').textContent = currentColor.toUpperCase();
  updateSavedCount();
}

// Initialize saved count
updateSavedCount();

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  // Update global state
  window.__3D_STATE__ = {
    modelLoaded: modelLoaded,
    materialType: currentMaterial,
    colorHex: currentColor,
    legStyle: currentLegStyle,
    savedConfigs: getSavedConfigs().length
  };

  renderer.render(scene, camera);
}
animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
