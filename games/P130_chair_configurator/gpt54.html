<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SheenChair 高级配置器</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #111;
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 14px;
      min-width: 220px;
      line-height: 1.8;
      font-size: 14px;
    }

    #panel {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 20;
      width: 280px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px;
    }

    #panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .group {
      margin-bottom: 14px;
    }

    .group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #ddd;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button, input[type="color"] {
      border: none;
      outline: none;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      transition: 0.2s ease;
    }

    button:hover {
      background: #3a3a3a;
    }

    button.active {
      background: #4e7cff;
    }

    input[type="color"] {
      width: 100%;
      height: 42px;
      background: transparent;
      padding: 4px;
      border: 1px solid rgba(255,255,255,0.15);
    }

    #status {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 20;
      background: rgba(0,0,0,0.5);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>材质类型：<span id="materialType">Leather</span></div>
      <div>颜色 Hex：<span id="colorValue">#c0392b</span></div>
      <div>已保存配置数：<span id="savedCount">0</span></div>
    </div>

    <div id="panel">
      <h2>椅子配置器</h2>

      <div class="group">
        <label>材质选择</label>
        <div class="row">
          <button id="matLeather" class="active">Leather</button>
          <button id="matFabric">Fabric</button>
          <button id="matVelvet">Velvet</button>
        </div>
      </div>

      <div class="group">
        <label for="cushionColor">座垫颜色</label>
        <input id="cushionColor" type="color" value="#c0392b" />
      </div>

      <div class="group">
        <label>腿部风格</label>
        <div class="row">
          <button id="legStyle">切换为金属腿</button>
        </div>
      </div>

      <div class="group">
        <label>配置存取</label>
        <div class="row">
          <button id="saveBtn">保存</button>
          <button id="loadBtn">加载</button>
        </div>
      </div>
    </div>

    <div id="status">正在初始化场景...</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const statusEl = document.getElementById('status');

    const materialTypeEl = document.getElementById('materialType');
    const colorValueEl = document.getElementById('colorValue');
    const savedCountEl = document.getElementById('savedCount');

    const matLeatherBtn = document.getElementById('matLeather');
    const matFabricBtn = document.getElementById('matFabric');
    const matVelvetBtn = document.getElementById('matVelvet');
    const colorInput = document.getElementById('cushionColor');
    const legStyleBtn = document.getElementById('legStyle');
    const saveBtn = document.getElementById('saveBtn');
    const loadBtn = document.getElementById('loadBtn');

    const STORAGE_KEY = 'sheenChairConfigs';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x151515);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(2.8, 1.8, 3.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.8, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 1.6));

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 2.0);
    dirLight1.position.set(5, 8, 6);
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight2.position.set(-4, 3, -5);
    scene.add(dirLight2);

    const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1.1);
    scene.add(hemi);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(6, 64),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.95, metalness: 0.0 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.85;
    scene.add(floor);

    let chairRoot = null;
    let cushionMeshes = [];
    let legMeshes = [];
    let allChairMeshes = [];

    const state = {
      modelLoaded: false,
      materialType: 'Leather',
      colorHex: '#c0392b',
      legStyle: 'wood'
    };

    function getSavedConfigs() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function setSavedConfigs(configs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(configs));
    }

    function updateSavedCount() {
      savedCountEl.textContent = String(getSavedConfigs().length);
    }

    function updateHUD() {
      materialTypeEl.textContent = state.materialType;
      colorValueEl.textContent = state.colorHex;
      savedCountEl.textContent = String(getSavedConfigs().length);
    }

    function updateMaterialButtons() {
      [matLeatherBtn, matFabricBtn, matVelvetBtn].forEach(btn => btn.classList.remove('active'));
      if (state.materialType === 'Leather') matLeatherBtn.classList.add('active');
      if (state.materialType === 'Fabric') matFabricBtn.classList.add('active');
      if (state.materialType === 'Velvet') matVelvetBtn.classList.add('active');
    }

    function updateLegButton() {
      legStyleBtn.textContent = state.legStyle === 'wood' ? '切换为金属腿' : '切换为木质腿';
    }

    function makeCushionMaterial() {
      const color = new THREE.Color(state.colorHex);

      const params = {
        color,
        roughness: 0.3,
        metalness: 0.1
      };

      if (state.materialType === 'Leather') {
        params.roughness = 0.3;
        params.metalness = 0.1;
      } else if (state.materialType === 'Fabric') {
        params.roughness = 0.9;
        params.metalness = 0.0;
      } else if (state.materialType === 'Velvet') {
        params.roughness = 0.7;
        params.metalness = 0.05;
        params.sheen = 1.0;
        params.sheenColor = color.clone().lerp(new THREE.Color(0xffffff), 0.25);
        params.sheenRoughness = 0.45;
      }

      return new THREE.MeshPhysicalMaterial(params);
    }

    function makeLegMaterial() {
      if (state.legStyle === 'wood') {
        return new THREE.MeshStandardMaterial({
          color: 0x8b5a2b,
          roughness: 0.8,
          metalness: 0.05
        });
      }

      return new THREE.MeshStandardMaterial({
        color: 0xc0c0c0,
        roughness: 0.2,
        metalness: 0.9
      });
    }

    function isLikelyCushion(mesh, box, chairCenterY) {
      const n = mesh.name.toLowerCase();
      if (
        n.includes('cushion') ||
        n.includes('seat') ||
        n.includes('fabric') ||
        n.includes('upholstery') ||
        n.includes('pillow')
      ) return true;

      const size = new THREE.Vector3();
      box.getSize(size);
      const center = new THREE.Vector3();
      box.getCenter(center);

      const wideFlatSeat =
        size.x > 0.25 &&
        size.z > 0.25 &&
        size.y < Math.max(size.x, size.z) &&
        center.y > chairCenterY - 0.3 &&
        center.y < chairCenterY + 0.6;

      return wideFlatSeat;
    }

    function isLikelyLeg(mesh, box, chairCenterY) {
      const n = mesh.name.toLowerCase();
      if (
        n.includes('leg') ||
        n.includes('base') ||
        n.includes('foot') ||
        n.includes('support')
      ) return true;

      const size = new THREE.Vector3();
      box.getSize(size);
      const center = new THREE.Vector3();
      box.getCenter(center);

      const slenderVertical =
        center.y < chairCenterY + 0.1 &&
        size.y > 0.2 &&
        (size.x < 0.18 || size.z < 0.18);

      return slenderVertical;
    }

    function identifyChairParts(root) {
      cushionMeshes = [];
      legMeshes = [];
      allChairMeshes = [];

      const chairBox = new THREE.Box3().setFromObject(root);
      const chairCenter = new THREE.Vector3();
      chairBox.getCenter(chairCenter);

      root.traverse((obj) => {
        if (!obj.isMesh) return;

        obj.castShadow = true;
        obj.receiveShadow = true;
        allChairMeshes.push(obj);

        const box = new THREE.Box3().setFromObject(obj);

        if (isLikelyCushion(obj, box, chairCenter.y)) {
          cushionMeshes.push(obj);
        } else if (isLikelyLeg(obj, box, chairCenter.y)) {
          legMeshes.push(obj);
        }
      });

      if (cushionMeshes.length === 0 && allChairMeshes.length > 0) {
        let best = null;
        let bestScore = -Infinity;

        for (const mesh of allChairMeshes) {
          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          const score = (size.x * size.z) - Math.abs(center.y - chairCenter.y);
          if (score > bestScore) {
            bestScore = score;
            best = mesh;
          }
        }

        if (best) cushionMeshes.push(best);
      }

      if (legMeshes.length === 0 && allChairMeshes.length > 0) {
        for (const mesh of allChairMeshes) {
          if (cushionMeshes.includes(mesh)) continue;

          const box = new THREE.Box3().setFromObject(mesh);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          if (center.y < chairCenter.y && size.y > 0.15) {
            legMeshes.push(mesh);
          }
        }
      }
    }

    function applyCushionMaterial() {
      if (!cushionMeshes.length) return;
      const material = makeCushionMaterial();
      cushionMeshes.forEach(mesh => {
        mesh.material = material.clone();
      });
    }

    function applyLegMaterial() {
      if (!legMeshes.length) return;
      const material = makeLegMaterial();
      legMeshes.forEach(mesh => {
        mesh.material = material.clone();
      });
    }

    function applyConfiguration(config) {
      if (!config) return;

      if (config.material) state.materialType = config.material;
      if (config.color) state.colorHex = config.color;
      if (config.legStyle) state.legStyle = config.legStyle;

      colorInput.value = state.colorHex;
      updateMaterialButtons();
      updateLegButton();

      if (state.modelLoaded) {
        applyCushionMaterial();
        applyLegMaterial();
      }

      updateHUD();
    }

    function centerModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const center = new THREE.Vector3();
      const size = new THREE.Vector3();

      box.getCenter(center);
      box.getSize(size);

      root.position.sub(center);
      root.position.y += size.y / 2 - 0.85;

      const maxDim = Math.max(size.x, size.y, size.z);
      const fitDistance = maxDim * 2.1;

      camera.position.set(fitDistance * 0.9, fitDistance * 0.6, fitDistance * 1.0);
      controls.target.set(0, size.y * 0.25, 0);
      controls.update();
    }

    const loader = new GLTFLoader();
    loader.load(
      'assets/SheenChair.glb',
      (gltf) => {
        chairRoot = gltf.scene;
        scene.add(chairRoot);

        centerModel(chairRoot);
        identifyChairParts(chairRoot);
        applyCushionMaterial();
        applyLegMaterial();

        state.modelLoaded = true;
        updateHUD();
        statusEl.textContent = '模型加载完成，可自由旋转查看';
      },
      undefined,
      (error) => {
        console.error('模型加载失败:', error);
        statusEl.textContent = '模型加载失败，请检查 assets/SheenChair.glb 路径';
      }
    );

    matLeatherBtn.addEventListener('click', () => {
      state.materialType = 'Leather';
      updateMaterialButtons();
      applyCushionMaterial();
      updateHUD();
    });

    matFabricBtn.addEventListener('click', () => {
      state.materialType = 'Fabric';
      updateMaterialButtons();
      applyCushionMaterial();
      updateHUD();
    });

    matVelvetBtn.addEventListener('click', () => {
      state.materialType = 'Velvet';
      updateMaterialButtons();
      applyCushionMaterial();
      updateHUD();
    });

    colorInput.addEventListener('input', (e) => {
      state.colorHex = e.target.value;
      applyCushionMaterial();
      updateHUD();
    });

    legStyleBtn.addEventListener('click', () => {
      state.legStyle = state.legStyle === 'wood' ? 'metal' : 'wood';
      updateLegButton();
      applyLegMaterial();
      updateHUD();
    });

    saveBtn.addEventListener('click', () => {
      const configs = getSavedConfigs();
      configs.push({
        material: state.materialType,
        color: state.colorHex,
        legStyle: state.legStyle
      });
      setSavedConfigs(configs);
      updateSavedCount();
      updateHUD();
      statusEl.textContent = '当前配置已保存到 localStorage';
    });

    loadBtn.addEventListener('click', () => {
      const configs = getSavedConfigs();
      if (!configs.length) {
        statusEl.textContent = '没有可加载的配置';
        updateHUD();
        return;
      }

      const latest = configs[configs.length - 1];
      applyConfiguration(latest);
      statusEl.textContent = '已加载最近一次保存的配置';
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateMaterialButtons();
    updateLegButton();
    updateSavedCount();
    updateHUD();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();

      window.__3D_STATE__ = {
        modelLoaded: state.modelLoaded,
        materialType: state.materialType,
        colorHex: state.colorHex,
        legStyle: state.legStyle,
        savedConfigs: getSavedConfigs().length
      };

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
