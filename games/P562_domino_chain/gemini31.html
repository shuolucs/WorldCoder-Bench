<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Domino Chain Reaction</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2a2a3a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 45, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #445566;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            min-width: 200px;
        }
        #hud h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            color: #88ccff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .hud-label {
            color: #aaaabb;
        }
        .hud-value {
            font-weight: bold;
            color: #ffffff;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(30, 30, 45, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #445566;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .control-group label {
            font-size: 13px;
            color: #aaaabb;
            display: flex;
            justify-content: space-between;
        }
        input[type=range] {
            width: 100%;
            accent-color: #88ccff;
        }
        .instructions {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 45, 0.85);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #445566;
            font-size: 13px;
            color: #aaaabb;
            line-height: 1.6;
        }
        kbd {
            background: #445566;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud">
        <h2>Simulation State</h2>
        <div class="hud-row"><span class="hud-label">Layout:</span> <span class="hud-value" id="hud-layout">Line</span></div>
        <div class="hud-row"><span class="hud-label">Dominoes:</span> <span class="hud-value" id="hud-count">30</span></div>
        <div class="hud-row"><span class="hud-label">Toppled:</span> <span class="hud-value" id="hud-toppled">0</span></div>
        <div class="hud-row"><span class="hud-label">Wave Speed:</span> <span class="hud-value" id="hud-wave">0.00 u/s</span></div>
        <div class="hud-row"><span class="hud-label">Spacing:</span> <span class="hud-value" id="hud-spacing">0.60</span></div>
        <div class="hud-row"><span class="hud-label">Status:</span> <span class="hud-value" id="hud-paused" style="color: #88ff88;">Playing</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label><span>Spacing</span> <span id="val-spacing">0.6</span></label>
            <input type="range" id="slider-spacing" min="0.3" max="1.5" step="0.05" value="0.6">
        </div>
        <div class="control-group">
            <label><span>Count</span> <span id="val-count">30</span></label>
            <input type="range" id="slider-count" min="10" max="60" step="5" value="30">
        </div>
    </div>

    <div class="instructions">
        <b>Controls:</b><br>
        <kbd>T</kbd> Topple first domino<br>
        <kbd>1</kbd> Line Layout<br>
        <kbd>2</kbd> Curve Layout<br>
        <kbd>3</kbd> Spiral Layout<br>
        <kbd>4</kbd> Y-Split Layout<br>
        <kbd>R</kbd> Reset<br>
        <kbd>Space</kbd> Pause/Play
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            dominoCount: 30,
            toppledCount: 0,
            waveSpeed: 0,
            layout: 'Line',
            spacing: 0.6,
            isPaused: false,
            frameCount: 0,
            dominoesValid: true,
            chainComplete: false,
            maxAngle: 0
        };

        // --- Constants & Physics Parameters ---
        const DOMINO_WIDTH = 0.2;
        const DOMINO_HEIGHT = 1.0;
        const DOMINO_DEPTH = 0.5;
        const DOMINO_MASS = 0.5;
        // Moment of inertia around bottom edge
        const DOMINO_I = (1/3) * DOMINO_MASS * (DOMINO_HEIGHT**2 + DOMINO_DEPTH**2);
        const GRAVITY = 9.81;
        const K_CONTACT = 2500; // Spring constant for collision
        const C_CONTACT = 150;  // Damping for collision
        const RESTITUTION = 0.3;
        const AIR_DAMPING = 0.998;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a3a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 15);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 1, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 8);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Floor ---
        const texLoader = new THREE.TextureLoader();
        const floorTex = texLoader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg', (tex) => {
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            tex.repeat.set(4, 4);
            tex.colorSpace = THREE.SRGBColorSpace;
        });
        const floorMat = new THREE.MeshStandardMaterial({ 
            color: 0xaaaaaa, 
            map: floorTex,
            roughness: 0.8
        });
        const floorGeo = new THREE.PlaneGeometry(50, 50);
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // --- Domino InstancedMesh ---
        // Translate geometry so origin is at bottom-front edge (pivot point)
        const dominoGeo = new THREE.BoxGeometry(DOMINO_WIDTH, DOMINO_HEIGHT, DOMINO_DEPTH);
        dominoGeo.translate(0, DOMINO_HEIGHT / 2, -DOMINO_DEPTH / 2);
        
        const dominoMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff,
            roughness: 0.4,
            metalness: 0.1
        });
        
        let instancedMesh;
        
        // --- Simulation Data ---
        let dominoes = [];
        let connections = [];
        let currentLayout = 1; // 1: Line, 2: Curve, 3: Spiral, 4: Y-Split
        let currentSpacing = 0.6;
        let currentCount = 30;
        let isPaused = false;
        let startTime = 0;
        let waveSpeed = 0;

        const layoutNames = { 1: 'Line', 2: 'Curve', 3: 'Spiral', 4: 'Y-Split' };

        // --- Layout Generation ---
        function buildLayout() {
            if (instancedMesh) {
                scene.remove(instancedMesh);
                instancedMesh.dispose();
            }

            dominoes = [];
            connections = [];
            
            let actualCount = currentCount;

            if (currentLayout === 1) {
                // Line
                for (let i = 0; i < actualCount; i++) {
                    dominoes.push({
                        id: i, x: 0, y: 0, z: i * currentSpacing, rotY: 0,
                        angle: 0, omega: 0, distance: i * currentSpacing
                    });
                    if (i < actualCount - 1) connections.push({ src: i, tgt: i + 1, S: currentSpacing });
                }
            } 
            else if (currentLayout === 2) {
                // Curve (Semicircle)
                const R = 8;
                for (let i = 0; i < actualCount; i++) {
                    let theta = i * (currentSpacing / R);
                    dominoes.push({
                        id: i, 
                        x: R * Math.cos(theta) - R, 
                        y: 0, 
                        z: R * Math.sin(theta), 
                        rotY: -theta,
                        angle: 0, omega: 0, distance: i * currentSpacing
                    });
                    if (i < actualCount - 1) connections.push({ src: i, tgt: i + 1, S: currentSpacing });
                }
            }
            else if (currentLayout === 3) {
                // Spiral
                let R = 3;
                let theta = 0;
                for (let i = 0; i < actualCount; i++) {
                    dominoes.push({
                        id: i, 
                        x: R * Math.cos(theta) - 3, 
                        y: 0, 
                        z: R * Math.sin(theta), 
                        rotY: -theta,
                        angle: 0, omega: 0, distance: i * currentSpacing
                    });
                    if (i < actualCount - 1) connections.push({ src: i, tgt: i + 1, S: currentSpacing });
                    
                    R += (8 - 3) / actualCount;
                    theta += currentSpacing / R;
                }
            }
            else if (currentLayout === 4) {
                // Y-Split
                let nLine = Math.min(20, Math.floor(currentCount / 2));
                let nBranch = Math.floor((currentCount - nLine) / 2);
                actualCount = nLine + 2 * nBranch; // Adjust count to fit exactly

                // Line part
                for (let i = 0; i < nLine; i++) {
                    dominoes.push({
                        id: i, x: 0, y: 0, z: i * currentSpacing, rotY: 0,
                        angle: 0, omega: 0, distance: i * currentSpacing
                    });
                    if (i < nLine - 1) connections.push({ src: i, tgt: i + 1, S: currentSpacing });
                }

                let splitZ = (nLine - 1) * currentSpacing;
                let splitDist = (nLine - 1) * currentSpacing;

                // Branch 1 (+30 deg)
                for (let j = 0; j < nBranch; j++) {
                    let d = (j + 1) * currentSpacing;
                    dominoes.push({
                        id: nLine + j,
                        x: d * Math.sin(30 * Math.PI / 180),
                        y: 0,
                        z: splitZ + d * Math.cos(30 * Math.PI / 180),
                        rotY: 30 * Math.PI / 180,
                        angle: 0, omega: 0, distance: splitDist + d
                    });
                    if (j < nBranch - 1) connections.push({ src: nLine + j, tgt: nLine + j + 1, S: currentSpacing });
                }

                // Branch 2 (-30 deg)
                for (let j = 0; j < nBranch; j++) {
                    let d = (j + 1) * currentSpacing;
                    dominoes.push({
                        id: nLine + nBranch + j,
                        x: d * Math.sin(-30 * Math.PI / 180),
                        y: 0,
                        z: splitZ + d * Math.cos(-30 * Math.PI / 180),
                        rotY: -30 * Math.PI / 180,
                        angle: 0, omega: 0, distance: splitDist + d
                    });
                    if (j < nBranch - 1) connections.push({ src: nLine + nBranch + j, tgt: nLine + nBranch + j + 1, S: currentSpacing });
                }

                // Connect split
                connections.push({ src: nLine - 1, tgt: nLine, S: currentSpacing });
                connections.push({ src: nLine - 1, tgt: nLine + nBranch, S: currentSpacing });
            }

            // Create InstancedMesh
            instancedMesh = new THREE.InstancedMesh(dominoGeo, dominoMat, actualCount);
            instancedMesh.castShadow = true;
            instancedMesh.receiveShadow = true;
            
            const color1 = new THREE.Color(0xeeeeee);
            const color2 = new THREE.Color(0x222288);

            for (let i = 0; i < actualCount; i++) {
                instancedMesh.setColorAt(i, i % 2 === 0 ? color1 : color2);
            }
            instancedMesh.instanceColor.needsUpdate = true;

            scene.add(instancedMesh);
            
            window.__3D_STATE__.dominoCount = actualCount;
            resetSimulation();
            updateVisuals();
        }

        function resetSimulation() {
            dominoes.forEach(d => {
                d.angle = 0;
                d.omega = 0;
            });
            startTime = 0;
            waveSpeed = 0;
            window.__3D_STATE__.chainComplete = false;
            updateVisuals();
        }

        function topple() {
            if (dominoes.length > 0 && dominoes[0].angle === 0) {
                dominoes[0].omega = 1.5; // Initial push
                startTime = performance.now();
            }
        }

        // --- Physics Engine ---
        function updatePhysics(dt) {
            if (isPaused) return;
            
            // Cap dt to prevent explosions on lag
            dt = Math.min(dt, 0.05);
            
            const substeps = 10;
            const sdt = dt / substeps;

            for (let step = 0; step < substeps; step++) {
                // 1. Integrate and apply gravity
                for (let i = 0; i < dominoes.length; i++) {
                    let dom = dominoes[i];
                    
                    // Gravity torque: tau = m * g * (horizontal distance from pivot to CM)
                    // CM is at (0, h/2, -d/2) relative to pivot when upright.
                    // Rotated by angle: x_cm = (h/2)*sin(angle) - (d/2)*cos(angle)
                    let tau = DOMINO_MASS * GRAVITY * ( (DOMINO_HEIGHT/2) * Math.sin(dom.angle) - (DOMINO_DEPTH/2) * Math.cos(dom.angle) );
                    
                    dom.omega += (tau / DOMINO_I) * sdt;
                    dom.omega *= AIR_DAMPING; // Air friction
                    dom.angle += dom.omega * sdt;

                    // Ground collision
                    if (dom.angle < 0) {
                        dom.angle = 0;
                        dom.omega *= -RESTITUTION;
                    } else if (dom.angle > Math.PI / 2) {
                        dom.angle = Math.PI / 2;
                        dom.omega *= -RESTITUTION;
                    }
                }

                // 2. Resolve collisions
                for (let c of connections) {
                    let src = dominoes[c.src];
                    let tgt = dominoes[c.tgt];

                    // Simplified 1D collision check along the path
                    // Top front corner of src: z_top = h * sin(angle)
                    // Back face of tgt at height h*cos(src.angle): z_back = S - d + h*cos(src.angle)*tan(tgt.angle)
                    let z_top = DOMINO_HEIGHT * Math.sin(src.angle);
                    let z_back = c.S - DOMINO_DEPTH + DOMINO_HEIGHT * Math.cos(src.angle) * Math.tan(tgt.angle);
                    
                    let overlap = z_top - z_back;

                    if (overlap > 0) {
                        // Relative velocity approximation
                        let v_rel = DOMINO_HEIGHT * Math.cos(src.angle) * (src.omega - tgt.omega);
                        
                        // Penalty force
                        let force = K_CONTACT * overlap + C_CONTACT * v_rel;

                        // Only push forward
                        if (force > 0) {
                            let tau_src = -force * DOMINO_HEIGHT * Math.cos(src.angle);
                            let tau_tgt = force * DOMINO_HEIGHT * Math.cos(src.angle);

                            src.omega += (tau_src / DOMINO_I) * sdt;
                            tgt.omega += (tau_tgt / DOMINO_I) * sdt;
                        }
                    }
                }
            }
        }

        // --- Visuals Update ---
        const dummy = new THREE.Object3D();
        function updateVisuals() {
            if (!instancedMesh) return;
            
            let isValid = true;
            let maxAng = 0;
            let toppled = 0;
            let maxDistToppled = 0;

            for (let i = 0; i < dominoes.length; i++) {
                let d = dominoes[i];
                
                if (isNaN(d.angle) || isNaN(d.omega)) {
                    isValid = false;
                    d.angle = 0; d.omega = 0;
                }

                dummy.position.set(d.x, d.y, d.z);
                dummy.rotation.set(0, d.rotY, 0);
                dummy.rotateX(d.angle); // Rotate around local X (pivot)
                dummy.updateMatrix();
                instancedMesh.setMatrixAt(i, dummy.matrix);

                if (d.angle > maxAng) maxAng = d.angle;
                if (d.angle > Math.PI / 4) {
                    toppled++;
                    if (d.distance > maxDistToppled) maxDistToppled = d.distance;
                }
            }
            instancedMesh.instanceMatrix.needsUpdate = true;

            // Calculate Wave Speed
            if (startTime > 0 && toppled > 0 && toppled < dominoes.length) {
                let elapsed = (performance.now() - startTime) / 1000;
                waveSpeed = maxDistToppled / elapsed;
            } else if (toppled === 0) {
                waveSpeed = 0;
            }

            // Update State
            window.__3D_STATE__.toppledCount = toppled;
            window.__3D_STATE__.waveSpeed = parseFloat(waveSpeed.toFixed(2));
            window.__3D_STATE__.dominoesValid = isValid;
            window.__3D_STATE__.maxAngle = parseFloat((maxAng * 180 / Math.PI).toFixed(1));
            
            if (toppled === dominoes.length && dominoes.length > 0) {
                window.__3D_STATE__.chainComplete = true;
            }

            // Update HUD
            document.getElementById('hud-toppled').innerText = toppled;
            document.getElementById('hud-wave').innerText = waveSpeed.toFixed(2) + ' u/s';
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 't': topple(); break;
                case 'r': resetSimulation(); break;
                case '1': setLayout(1); break;
                case '2': setLayout(2); break;
                case '3': setLayout(3); break;
                case '4': setLayout(4); break;
                case ' ': 
                    isPaused = !isPaused; 
                    document.getElementById('hud-paused').innerText = isPaused ? 'Paused' : 'Playing';
                    document.getElementById('hud-paused').style.color = isPaused ? '#ff8888' : '#88ff88';
                    window.__3D_STATE__.isPaused = isPaused;
                    break;
            }
        });

        document.getElementById('slider-spacing').addEventListener('input', (e) => {
            currentSpacing = parseFloat(e.target.value);
            document.getElementById('val-spacing').innerText = currentSpacing.toFixed(2);
            document.getElementById('hud-spacing').innerText = currentSpacing.toFixed(2);
            window.__3D_STATE__.spacing = currentSpacing;
            buildLayout();
        });

        document.getElementById('slider-count').addEventListener('input', (e) => {
            currentCount = parseInt(e.target.value);
            document.getElementById('val-count').innerText = currentCount;
            buildLayout();
        });

        function setLayout(type) {
            currentLayout = type;
            document.getElementById('hud-layout').innerText = layoutNames[type];
            window.__3D_STATE__.layout = layoutNames[type];
            buildLayout();
        }

        // --- Main Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            let dt = clock.getDelta();
            
            updatePhysics(dt);
            updateVisuals();
            
            controls.update();
            renderer.render(scene, camera);
            
            window.__3D_STATE__.frameCount++;
        }

        // Initialize
        buildLayout();
        animate();

    </script>
</body>
</html>
