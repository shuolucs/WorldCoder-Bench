<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Domino Chain Reaction</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #2a2a3a; }
canvas { display: block; }
#hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #ddd; padding: 15px 20px;
    border-radius: 10px; font-size: 14px; line-height: 1.8;
    min-width: 220px; backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
}
#hud .label { color: #88aacc; font-weight: bold; }
#controls {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #ddd; padding: 15px 20px;
    border-radius: 10px; font-size: 13px; min-width: 280px;
    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
}
#controls label { display: block; margin: 8px 0 3px; color: #88aacc; font-weight: bold; }
#controls input[type="range"] { width: 100%; accent-color: #5588cc; }
#keys {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.75); color: #ddd; padding: 15px 20px;
    border-radius: 10px; font-size: 13px; line-height: 2;
    backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
}
#keys kbd {
    background: #444; padding: 2px 8px; border-radius: 4px;
    border: 1px solid #666; font-family: monospace; font-size: 13px;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Dominoes:</span> <span id="hud-count">30</span></div>
    <div><span class="label">Toppled:</span> <span id="hud-toppled">0</span></div>
    <div><span class="label">Wave Speed:</span> <span id="hud-wave">0.00</span> u/s</div>
    <div><span class="label">Layout:</span> <span id="hud-layout">Line</span></div>
    <div><span class="label">Spacing:</span> <span id="hud-spacing">0.60</span></div>
    <div><span class="label">Status:</span> <span id="hud-paused">Playing</span></div>
</div>

<div id="controls">
    <label>Spacing: <span id="spacing-val">0.60</span></label>
    <input type="range" id="slider-spacing" min="0.3" max="1.5" step="0.05" value="0.6">
    <label>Count: <span id="count-val">30</span></label>
    <input type="range" id="slider-count" min="10" max="60" step="5" value="30">
</div>

<div id="keys">
    <div><kbd>T</kbd> Topple first domino</div>
    <div><kbd>1</kbd> Line layout</div>
    <div><kbd>2</kbd> Curve layout</div>
    <div><kbd>3</kbd> Spiral layout</div>
    <div><kbd>4</kbd> Y-Split layout</div>
    <div><kbd>R</kbd> Reset</div>
    <div><kbd>Space</kbd> Pause/Play</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a3a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 10, 15);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
scene.add(dirLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorCanvas = document.createElement('canvas');
floorCanvas.width = 512;
floorCanvas.height = 512;
const fctx = floorCanvas.getContext('2d');
// Create hardwood-like texture
for (let y = 0; y < 512; y++) {
    for (let x = 0; x < 512; x++) {
        const base = 140 + Math.sin(y * 0.3 + Math.sin(x * 0.01) * 5) * 20;
        const grain = Math.sin(y * 0.8 + x * 0.02) * 8;
        const noise = Math.random() * 10 - 5;
        const v = Math.max(0, Math.min(255, base + grain + noise));
        fctx.fillStyle = `rgb(${v}, ${v * 0.7}, ${v * 0.45})`;
        fctx.fillRect(x, y, 1, 1);
    }
}
const floorTex = new THREE.CanvasTexture(floorCanvas);
floorTex.wrapS = THREE.RepeatWrapping;
floorTex.wrapT = THREE.RepeatWrapping;
floorTex.repeat.set(4, 4);
const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = 0;
floor.receiveShadow = true;
scene.add(floor);

// --- Domino Constants ---
const DOMINO_WIDTH = 0.2;
const DOMINO_HEIGHT = 1.0;
const DOMINO_DEPTH = 0.5;
const GRAVITY = 9.81;
const RESTITUTION = 0.3;
const AIR_DAMPING = 0.998;

// --- State ---
let dominoes = [];
let dominoMeshes = [];
let currentLayout = 'Line';
let currentSpacing = 0.6;
let currentCount = 30;
let isPaused = false;
let frameCount = 0;
let toppleStartTime = null;
let hasStartedToppling = false;
let waveSpeed = 0;

const dominoGroup = new THREE.Group();
scene.add(dominoGroup);

// --- Domino Physics Object ---
class Domino {
    constructor(x, z, facingAngle) {
        this.baseX = x;
        this.baseZ = z;
        this.facingAngle = facingAngle; // rotation around Y axis (direction domino faces/falls)
        this.tiltAngle = 0; // rotation around pivot (bottom edge), 0 = standing
        this.angularVel = 0;
        this.mass = 0.5;
        this.height = DOMINO_HEIGHT;
        this.width = DOMINO_WIDTH;
        this.depth = DOMINO_DEPTH;
        // Moment of inertia about pivot at bottom edge
        // I = I_cm + m*d^2 (parallel axis theorem)
        // I_cm = 1/12 * m * (h^2 + d^2) for rotation about center
        // d = h/2 (distance from center to pivot)
        this.I = (1/12) * this.mass * (this.height * this.height + this.width * this.width) + this.mass * (this.height / 2) * (this.height / 2);
        this.isToppled = false;
        this.isResting = false;
        this.toppleTime = null;
    }

    getTopPosition() {
        // Top corner position in world space when tilted
        const topLocalX = Math.sin(this.tiltAngle) * this.height;
        const topLocalY = Math.cos(this.tiltAngle) * this.height;
        
        // Transform to world coordinates based on facing angle
        const wx = this.baseX + Math.sin(this.facingAngle) * topLocalX;
        const wz = this.baseZ + Math.cos(this.facingAngle) * topLocalX;
        const wy = topLocalY;
        
        return { x: wx, y: wy, z: wz };
    }

    getContactDistance(other) {
        // Distance from top of this domino to base of other domino along the falling direction
        const top = this.getTopPosition();
        const dx = top.x - other.baseX;
        const dz = top.z - other.baseZ;
        
        // Project onto the direction perpendicular to the other domino's face
        const perpX = Math.sin(other.facingAngle);
        const perpZ = Math.cos(other.facingAngle);
        const perpDist = Math.abs(dx * perpX + dz * perpZ);
        
        // Along direction
        const alongX = Math.cos(other.facingAngle);
        const alongZ = -Math.sin(other.facingAngle);
        const alongDist = Math.abs(dx * alongX + dz * alongZ);
        
        return { perpDist, alongDist, topY: top.y };
    }
}

// --- Layout Generators ---
function generateLineLayout(count, spacing) {
    const positions = [];
    const startZ = -(count - 1) * spacing / 2;
    for (let i = 0; i < count; i++) {
        positions.push({ x: 0, z: startZ + i * spacing, angle: 0 });
    }
    return positions;
}

function generateCurveLayout(count, spacing) {
    const positions = [];
    const radius = 8;
    const totalArc = Math.PI;
    for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const theta = -totalArc / 2 + t * totalArc;
        const x = radius * Math.cos(theta);
        const z = radius * Math.sin(theta);
        // Facing angle: tangent direction
        const angle = theta + Math.PI / 2;
        positions.push({ x, z, angle });
    }
    return positions;
}

function generateSpiralLayout(count, spacing) {
    const positions = [];
    const turns = 2;
    const rMin = 3, rMax = 8;
    for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const theta = t * turns * 2 * Math.PI;
        const r = rMin + t * (rMax - rMin);
        const x = r * Math.cos(theta);
        const z = r * Math.sin(theta);
        // Tangent direction
        const angle = theta + Math.PI / 2;
        positions.push({ x, z, angle });
    }
    return positions;
}

function generateYSplitLayout(count, spacing) {
    const positions = [];
    const stemCount = Math.floor(count * 0.5);
    const branchCount = Math.floor((count - stemCount) / 2);
    
    const startZ = -(stemCount - 1) * spacing / 2 - 2;
    
    // Stem
    for (let i = 0; i < stemCount; i++) {
        positions.push({ x: 0, z: startZ + i * spacing, angle: 0 });
    }
    
    const splitZ = startZ + (stemCount - 1) * spacing;
    const branchAngle = Math.PI / 6; // 30 degrees
    
    // Left branch
    for (let i = 1; i <= branchCount; i++) {
        const x = -Math.sin(branchAngle) * i * spacing;
        const z = splitZ + Math.cos(branchAngle) * i * spacing;
        positions.push({ x, z, angle: -branchAngle });
    }
    
    // Right branch
    for (let i = 1; i <= branchCount; i++) {
        const x = Math.sin(branchAngle) * i * spacing;
        const z = splitZ + Math.cos(branchAngle) * i * spacing;
        positions.push({ x, z, angle: branchAngle });
    }
    
    return positions;
}

// --- Build Dominoes ---
function buildDominoes() {
    // Clear existing
    while (dominoGroup.children.length > 0) {
        const child = dominoGroup.children[0];
        dominoGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
        }
    }
    dominoes = [];
    dominoMeshes = [];
    
    let positions;
    switch (currentLayout) {
        case 'Line': positions = generateLineLayout(currentCount, currentSpacing); break;
        case 'Curve': positions = generateCurveLayout(currentCount, currentSpacing); break;
        case 'Spiral': positions = generateSpiralLayout(currentCount, currentSpacing); break;
        case 'Y-Split': positions = generateYSplitLayout(currentCount, currentSpacing); break;
        default: positions = generateLineLayout(currentCount, currentSpacing);
    }
    
    const geo = new THREE.BoxGeometry(DOMINO_WIDTH, DOMINO_HEIGHT, DOMINO_DEPTH);
    
    for (let i = 0; i < positions.length; i++) {
        const pos = positions[i];
        const color = i % 2 === 0 ? 0xeeeeee : 0x222288;
        const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.1 });
        
        // Add edge highlight
        const edgeGeo = new THREE.EdgesGeometry(geo);
        
        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        
        const edges = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.3 }));
        mesh.add(edges);
        
        // Add dot pattern on face
        const dotCanvas = document.createElement('canvas');
        dotCanvas.width = 64;
        dotCanvas.height = 128;
        const dctx = dotCanvas.getContext('2d');
        dctx.fillStyle = i % 2 === 0 ? '#eeeeee' : '#222288';
        dctx.fillRect(0, 0, 64, 128);
        dctx.fillStyle = i % 2 === 0 ? '#111111' : '#ffffff';
        // Draw dots based on index
        const dotCount = (i % 6) + 1;
        const dotPositions = [
            [[32, 64]],
            [[32, 40], [32, 88]],
            [[32, 32], [32, 64], [32, 96]],
            [[20, 40], [44, 40], [20, 88], [44, 88]],
            [[20, 32], [44, 32], [32, 64], [20, 96], [44, 96]],
            [[20, 28], [44, 28], [20, 64], [44, 64], [20, 100], [44, 100]]
        ];
        const dots = dotPositions[dotCount - 1];
        dots.forEach(([dx, dy]) => {
            dctx.beginPath();
            dctx.arc(dx, dy, 6, 0, Math.PI * 2);
            dctx.fill();
        });
        const dotTex = new THREE.CanvasTexture(dotCanvas);
        
        // Create materials array for box faces
        const materials = [
            mat.clone(), // right
            mat.clone(), // left
            mat.clone(), // top
            mat.clone(), // bottom
            new THREE.MeshStandardMaterial({ map: dotTex, roughness: 0.4, metalness: 0.1 }), // front
            new THREE.MeshStandardMaterial({ map: dotTex, roughness: 0.4, metalness: 0.1 }), // back
        ];
        
        const dominoMesh = new THREE.Mesh(geo, materials);
        dominoMesh.castShadow = true;
        dominoMesh.receiveShadow = true;
        
        // Position: center of domino at half height
        dominoMesh.position.set(pos.x, DOMINO_HEIGHT / 2, pos.z);
        dominoMesh.rotation.y = pos.angle;
        
        dominoGroup.add(dominoMesh);
        dominoMeshes.push(dominoMesh);
        
        const domino = new Domino(pos.x, pos.z, pos.angle);
        dominoes.push(domino);
    }
    
    // Build neighbor connections for collision detection
    buildNeighborConnections();
    
    hasStartedToppling = false;
    toppleStartTime = null;
    waveSpeed = 0;
}

// For each domino, find which dominoes it can potentially hit
let neighborMap = [];

function buildNeighborConnections() {
    neighborMap = [];
    for (let i = 0; i < dominoes.length; i++) {
        const neighbors = [];
        const d = dominoes[i];
        for (let j = 0; j < dominoes.length; j++) {
            if (i === j) continue;
            const other = dominoes[j];
            const dx = other.baseX - d.baseX;
            const dz = other.baseZ - d.baseZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            // Only consider dominoes within reach (height + some margin)
            if (dist < DOMINO_HEIGHT * 1.5) {
                // Check if the other domino is roughly in the falling direction
                const fallDirX = Math.sin(d.facingAngle);
                const fallDirZ = Math.cos(d.facingAngle);
                const dot = dx * fallDirX + dz * fallDirZ;
                if (dot > -0.1) { // roughly in front
                    neighbors.push(j);
                }
            }
        }
        neighborMap.push(neighbors);
    }
}

// --- Physics Update ---
function updatePhysics(dt) {
    if (dt > 0.05) dt = 0.05; // clamp
    
    const substeps = 4;
    const subDt = dt / substeps;
    
    for (let step = 0; step < substeps; step++) {
        for (let i = 0; i < dominoes.length; i++) {
            const d = dominoes[i];
            if (d.isResting) continue;
            if (d.tiltAngle === 0 && d.angularVel === 0) continue;
            
            // Only simulate if it has started tilting
            if (d.tiltAngle <= 0 && d.angularVel <= 0) {
                d.tiltAngle = 0;
                d.angularVel = 0;
                continue;
            }
            
            // Gravity torque: drives the domino to fall forward
            // torque = m * g * (h/2) * sin(angle) for pivot at bottom edge
            const halfDiag = Math.sqrt((d.height / 2) * (d.height / 2) + (d.width / 2) * (d.width / 2));
            const comAngle = d.tiltAngle + Math.atan2(d.width / 2, d.height / 2);
            // Actually simpler: COM is at (h/2) from pivot when standing
            // Torque = m * g * (h/2) * sin(tiltAngle)
            const torqueGravity = d.mass * GRAVITY * (d.height / 2) * Math.sin(d.tiltAngle);
            
            const angularAccel = torqueGravity / d.I;
            d.angularVel += angularAccel * subDt;
            d.angularVel *= AIR_DAMPING;
            d.tiltAngle += d.angularVel * subDt;
            
            // Ground collision
            if (d.tiltAngle > Math.PI / 2 * (80 / 90)) {
                d.tiltAngle = Math.PI / 2 * (80 / 90);
                d.angularVel = 0;
                d.isResting = true;
            }
            
            // Prevent going backward
            if (d.tiltAngle < 0) {
                d.tiltAngle = 0;
                d.angularVel = Math.max(0, d.angularVel);
            }
        }
        
        // Collision detection
        for (let i = 0; i < dominoes.length; i++) {
            const d = dominoes[i];
            if (d.tiltAngle <= 0.01) continue;
            if (d.isResting && d.angularVel === 0) continue;
            
            const neighbors = neighborMap[i];
            for (const j of neighbors) {
                const other = dominoes[j];
                if (other.isResting) continue;
                
                // Calculate top position of falling domino
                const topX = d.baseX + Math.sin(d.facingAngle) * Math.sin(d.tiltAngle) * d.height;
                const topZ = d.baseZ + Math.cos(d.facingAngle) * Math.sin(d.tiltAngle) * d.height;
                const topY = Math.cos(d.tiltAngle) * d.height;
                
                // Distance from top of d to base of other
                const dx = topX - other.baseX;
                const dz = topZ - other.baseZ;
                
                // Project onto other's facing direction (perpendicular to face)
                const perpX = Math.sin(other.facingAngle);
                const perpZ = Math.cos(other.facingAngle);
                const perpDist = dx * perpX + dz * perpZ;
                
                // Along other's face direction
                const alongX = Math.cos(other.facingAngle);
                const alongZ = -Math.sin(other.facingAngle);
                const alongDist = Math.abs(dx * alongX + dz * alongZ);
                
                // Check if top of domino i is touching domino j
                const halfWidth = other.width / 2;
                const halfDepth = other.depth / 2;
                
                // Contact condition: perpendicular distance within width, along within depth, and height overlap
                if (Math.abs(perpDist) < halfWidth + 0.05 && alongDist < halfDepth + 0.1 && topY > 0.05 && topY < other.height * Math.cos(other.tiltAngle) + 0.1) {
                    
                    // Contact point height on the other domino
                    const contactHeight = topY;
                    
                    // Relative velocity at contact point
                    const tipVel = d.angularVel * d.height; // velocity of tip
                    const otherVelAtContact = other.angularVel * contactHeight;
                    
                    const relVel = tipVel - otherVelAtContact;
                    
                    if (relVel > 0) {
                        // Impulse calculation
                        const e = RESTITUTION;
                        
                        // Effective masses at contact points
                        const effMass1 = d.I / (d.height * d.height);
                        const effMass2 = other.I / (contactHeight * contactHeight);
                        
                        const impulse = (1 + e) * relVel / (1 / effMass1 + 1 / effMass2);
                        
                        // Apply impulse
                        d.angularVel -= impulse / (effMass1 * d.height);
                        other.angularVel += impulse / (effMass2 * contactHeight);
                        
                        // Ensure the other domino starts falling
                        if (other.tiltAngle < 0.01) {
                            other.tiltAngle = 0.02;
                        }
                        
                        // Prevent negative angular velocity on pusher
                        if (d.angularVel < 0) d.angularVel = 0;
                    }
                }
            }
        }
    }
    
    // Update meshes
    for (let i = 0; i < dominoes.length; i++) {
        const d = dominoes[i];
        const mesh = dominoMeshes[i];
        
        // The domino pivots around its bottom edge
        // Bottom edge is at (baseX, 0, baseZ)
        // When tilted by tiltAngle, the center moves
        const centerDist = d.height / 2;
        const cx = d.baseX + Math.sin(d.facingAngle) * Math.sin(d.tiltAngle) * centerDist;
        const cz = d.baseZ + Math.cos(d.facingAngle) * Math.sin(d.tiltAngle) * centerDist;
        const cy = Math.cos(d.tiltAngle) * centerDist;
        
        mesh.position.set(cx, cy, cz);
        
        // Rotation: first Y rotation for facing, then tilt
        mesh.rotation.set(0, 0, 0);
        mesh.rotation.y = d.facingAngle;
        
        // Tilt around local X axis (perpendicular to facing direction)
        // We need to rotate around the axis perpendicular to facing direction
        const quaternion = new THREE.Quaternion();
        // Facing direction axis for tilt
        const tiltAxis = new THREE.Vector3(
            Math.cos(d.facingAngle),
            0,
            -Math.sin(d.facingAngle)
        ).normalize();
        
        quaternion.setFromAxisAngle(tiltAxis, d.tiltAngle);
        const yQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), d.facingAngle);
        mesh.quaternion.copy(quaternion).multiply(yQuat);
        
        // Track toppling
        if (d.tiltAngle > Math.PI / 4 && !d.isToppled) {
            d.isToppled = true;
            d.toppleTime = performance.now();
        }
    }
}

// --- Wave Speed Calculation ---
function calculateWaveSpeed() {
    if (!hasStartedToppling || !toppleStartTime) return 0;
    
    let maxDist = 0;
    const firstDomino = dominoes[0];
    let anyToppled = false;
    
    for (let i = 0; i < dominoes.length; i++) {
        if (dominoes[i].isToppled) {
            anyToppled = true;
            const dx = dominoes[i].baseX - firstDomino.baseX;
            const dz = dominoes[i].baseZ - firstDomino.baseZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist > maxDist) maxDist = dist;
        }
    }
    
    if (!anyToppled) return 0;
    
    const elapsed = (performance.now() - toppleStartTime) / 1000;
    if (elapsed < 0.01) return 0;
    
    return maxDist / elapsed;
}

// --- Check if chain is complete ---
function isChainComplete() {
    if (!hasStartedToppling) return false;
    
    let allResting = true;
    let anyActive = false;
    
    for (const d of dominoes) {
        if (d.tiltAngle > 0.01 && !d.isResting) {
            anyActive = true;
        }
        if (d.angularVel > 0.01) {
            allResting = false;
        }
    }
    
    // Chain is complete if all active dominoes have come to rest
    if (hasStartedToppling && !anyActive) return true;
    
    // Or if everything is resting
    let allSettled = true;
    for (const d of dominoes) {
        if (d.tiltAngle > 0.01 && !d.isResting && d.angularVel > 0.01) {
            allSettled = false;
            break;
        }
    }
    
    return allSettled && hasStartedToppling;
}

// --- Initialize ---
buildDominoes();

// --- State ---
window.__3D_STATE__ = {
    dominoCount: currentCount,
    toppledCount: 0,
    waveSpeed: 0,
    layout: currentLayout,
    spacing: currentSpacing,
    isPaused: false,
    frameCount: 0,
    dominoesValid: true,
    chainComplete: false,
    maxAngle: 0
};

// --- Controls ---
const sliderSpacing = document.getElementById('slider-spacing');
const sliderCount = document.getElementById('slider-count');

sliderSpacing.addEventListener('input', () => {
    currentSpacing = parseFloat(sliderSpacing.value);
    document.getElementById('spacing-val').textContent = currentSpacing.toFixed(2);
    buildDominoes();
});

sliderCount.addEventListener('input', () => {
    currentCount = parseInt(sliderCount.value);
    document.getElementById('count-val').textContent = currentCount;
    buildDominoes();
});

document.addEventListener('keydown', (e) => {
    switch (e.key.toLowerCase()) {
        case 't':
            if (!hasStartedToppling && dominoes.length > 0) {
                dominoes[0].angularVel = 1.0;
                dominoes[0].tiltAngle = 0.05;
                hasStartedToppling = true;
                toppleStartTime = performance.now();
            }
            break;
        case '1':
            currentLayout = 'Line';
            buildDominoes();
            break;
        case '2':
            currentLayout = 'Curve';
            buildDominoes();
            break;
        case '3':
            currentLayout = 'Spiral';
            currentCount = Math.max(currentCount, 40);
            sliderCount.value = currentCount;
            document.getElementById('count-val').textContent = currentCount;
            buildDominoes();
            break;
        case '4':
            currentLayout = 'Y-Split';
            buildDominoes();
            break;
        case 'r':
            buildDominoes();
            break;
        case ' ':
            e.preventDefault();
            isPaused = !isPaused;
            break;
    }
});

// --- HUD Update ---
function updateHUD() {
    const toppledCount = dominoes.filter(d => d.isToppled).length;
    const ws = calculateWaveSpeed();
    waveSpeed = ws;
    
    document.getElementById('hud-count').textContent = dominoes.length;
    document.getElementById('hud-toppled').textContent = toppledCount;
    document.getElementById('hud-wave').textContent = ws.toFixed(2);
    document.getElementById('hud-layout').textContent = currentLayout;
    document.getElementById('hud-spacing').textContent = currentSpacing.toFixed(2);
    document.getElementById('hud-paused').textContent = isPaused ? 'Paused' : 'Playing';
}

// --- Validate dominoes ---
function validateDominoes() {
    for (const d of dominoes) {
        if (isNaN(d.baseX) || isNaN(d.baseZ) || isNaN(d.tiltAngle) || isNaN(d.angularVel)) {
            return false;
        }
    }
    for (const m of dominoMeshes) {
        if (isNaN(m.position.x) || isNaN(m.position.y) || isNaN(m.position.z)) {
            return false;
        }
    }
    return true;
}

// --- Animation Loop ---
let lastTime = performance.now();

function animate() {
    requestAnimationFrame(animate);
    
    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.1);
    lastTime = now;
    
    if (!isPaused) {
        updatePhysics(dt);
    }
    
    controls.update();
    updateHUD();
    
    // Calculate max angle
    let maxAngle = 0;
    for (const d of dominoes) {
        const angleDeg = (d.tiltAngle * 180) / Math.PI;
        if (angleDeg > maxAngle) maxAngle = angleDeg;
    }
    
    const toppledCount = dominoes.filter(d => d.isToppled).length;
    
    // Update state
    frameCount++;
    window.__3D_STATE__ = {
        dominoCount: dominoes.length,
        toppledCount: toppledCount,
        waveSpeed: parseFloat(waveSpeed.toFixed(2)),
        layout: currentLayout,
        spacing: currentSpacing,
        isPaused: isPaused,
        frameCount: frameCount,
        dominoesValid: validateDominoes(),
        chainComplete: isChainComplete(),
        maxAngle: parseFloat(maxAngle.toFixed(1))
    };
    
    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
