<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Domino Chain Reaction - Three.js</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #2a2a3a;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 260px;
      backdrop-filter: blur(4px);
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 600;
    }

    .row {
      margin: 8px 0;
      font-size: 13px;
    }

    .row label {
      display: block;
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
    }

    #hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 240px;
      backdrop-filter: blur(4px);
      font-size: 13px;
      line-height: 1.6;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 12px;
      line-height: 1.5;
      max-width: 420px;
    }

    .value {
      color: #ffd37a;
      font-weight: 700;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <h3>Domino Controls</h3>
    <div class="row">
      <label for="slider-spacing">Spacing: <span id="label-spacing">0.60</span></label>
      <input id="slider-spacing" type="range" min="0.3" max="1.5" step="0.05" value="0.6" />
    </div>
    <div class="row">
      <label for="slider-count">Count: <span id="label-count">30</span></label>
      <input id="slider-count" type="range" min="10" max="60" step="5" value="30" />
    </div>
  </div>

  <div id="hud">
    <div>Domino count: <span id="hud-count" class="value">30</span></div>
    <div>Toppled: <span id="hud-toppled" class="value">0</span></div>
    <div>Wave speed: <span id="hud-wave" class="value">0.00</span></div>
    <div>Layout: <span id="hud-layout" class="value">Line</span></div>
    <div>Spacing: <span id="hud-spacing" class="value">0.60</span></div>
    <div>Paused: <span id="hud-paused" class="value">Playing</span></div>
  </div>

  <div id="help">
    <strong>Keys:</strong><br>
    T = topple first domino<br>
    1 = Line, 2 = Curve, 3 = Spiral, 4 = Y-Split<br>
    R = reset current layout<br>
    Space = pause / play
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ------------------------------------------------------------
    // Basic setup
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a3a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 10, 15);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;

    // Lights
    const ambient = new THREE.AmbientLight(0x445566, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 8);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    // Floor
    const textureLoader = new THREE.TextureLoader();
    const floorTexture = textureLoader.load(
      'https://threejs.org/examples/textures/hardwood2_diffuse.jpg',
      tex => {
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(4, 4);
        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
      }
    );

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshStandardMaterial({ map: floorTexture, color: 0xffffff, roughness: 0.85, metalness: 0.05 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    scene.add(floor);

    // ------------------------------------------------------------
    // Parameters / state
    // ------------------------------------------------------------
    const DOMINO_W = 0.2;
    const DOMINO_H = 1.0;
    const DOMINO_D = 0.5;
    const MASS = 0.5;
    const G = 9.81;
    const INERTIA = (1 / 12) * MASS * (DOMINO_H * DOMINO_H + DOMINO_D * DOMINO_D);
    const HALF_H = DOMINO_H / 2;
    const TOPPLE_THRESHOLD = THREE.MathUtils.degToRad(45);
    const REST_ANGLE = THREE.MathUtils.degToRad(80);
    const RESTITUTION = 0.3;
    const FRICTION = 0.5;
    const AIR_DAMPING = 0.998;

    let currentLayout = 'Line';
    let spacing = 0.6;
    let requestedCount = 30;
    let isPaused = false;
    let frameCount = 0;

    let dominoes = [];
    let layoutPathDistances = [];
    let topplingStarted = false;
    let topplingStartTime = 0;
    let furthestToppledDistance = 0;
    let chainComplete = false;
    let chainStoppedFrames = 0;

    const layoutGroup = new THREE.Group();
    scene.add(layoutGroup);

    // HUD refs
    const hudCount = document.getElementById('hud-count');
    const hudToppled = document.getElementById('hud-toppled');
    const hudWave = document.getElementById('hud-wave');
    const hudLayout = document.getElementById('hud-layout');
    const hudSpacing = document.getElementById('hud-spacing');
    const hudPaused = document.getElementById('hud-paused');

    const sliderSpacing = document.getElementById('slider-spacing');
    const sliderCount = document.getElementById('slider-count');
    const labelSpacing = document.getElementById('label-spacing');
    const labelCount = document.getElementById('label-count');

    // ------------------------------------------------------------
    // Utilities
    // ------------------------------------------------------------
    function clearDominoes() {
      for (const d of dominoes) {
        layoutGroup.remove(d.mesh);
        d.mesh.geometry.dispose();
        if (Array.isArray(d.mesh.material)) {
          d.mesh.material.forEach(m => m.dispose());
        } else {
          d.mesh.material.dispose();
        }
      }
      dominoes = [];
      layoutPathDistances = [];
    }

    function createDominoMaterial(index) {
      const color = index % 2 === 0 ? 0xeeeeee : 0x222288;
      return new THREE.MeshStandardMaterial({
        color,
        roughness: 0.55,
        metalness: 0.05
      });
    }

    function createDominoMesh(index) {
      const geom = new THREE.BoxGeometry(DOMINO_W, DOMINO_H, DOMINO_D);
      const mat = createDominoMaterial(index);
      const mesh = new THREE.Mesh(geom, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function makeDomino(index, basePos, yaw, pathDistance) {
      const mesh = createDominoMesh(index);
      layoutGroup.add(mesh);

      const domino = {
        index,
        mesh,
        basePos: basePos.clone(),
        yaw,
        angle: 0,
        angularVelocity: 0,
        linearVelocity: new THREE.Vector3(),
        pathDistance,
        toppled: false,
        hasTransferredToNext: false,
        resting: false
      };

      updateDominoTransform(domino);
      return domino;
    }

    function updateDominoTransform(domino) {
      const mesh = domino.mesh;
      mesh.position.copy(domino.basePos);

      const pivot = new THREE.Matrix4().makeTranslation(0, 0, 0);
      const toCenter = new THREE.Matrix4().makeTranslation(0, HALF_H, 0);
      const rotX = new THREE.Matrix4().makeRotationX(-domino.angle);
      const rotY = new THREE.Matrix4().makeRotationY(domino.yaw);

      const m = new THREE.Matrix4();
      m.multiplyMatrices(rotY, pivot);
      m.multiply(toCenter);
      m.multiply(rotX);

      mesh.matrixAutoUpdate = false;
      const world = new THREE.Matrix4().makeTranslation(domino.basePos.x, domino.basePos.y, domino.basePos.z);
      world.multiply(m);
      mesh.matrix.copy(world);
    }

    function getForwardDir(yaw) {
      return new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
    }

    function getRightDir(yaw) {
      return new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw)).normalize();
    }

    function getTopFrontPoint(domino) {
      const center = domino.basePos.clone()
        .add(new THREE.Vector3(0, HALF_H, 0).applyAxisAngle(new THREE.Vector3(0,1,0), domino.yaw));

      const local = new THREE.Vector3(0, HALF_H, DOMINO_D / 2);
      local.applyAxisAngle(new THREE.Vector3(1,0,0), -domino.angle);
      local.applyAxisAngle(new THREE.Vector3(0,1,0), domino.yaw);

      return domino.basePos.clone().add(new THREE.Vector3(0, 0, 0)).add(local);
    }

    function getDominioTopFrontPointAccurate(domino) {
      const local = new THREE.Vector3(0, DOMINO_H, DOMINO_D / 2);
      local.applyAxisAngle(new THREE.Vector3(1, 0, 0), -domino.angle);
      local.applyAxisAngle(new THREE.Vector3(0, 1, 0), domino.yaw);
      return domino.basePos.clone().add(local);
    }

    function resetPhysicsState() {
      topplingStarted = false;
      topplingStartTime = 0;
      furthestToppledDistance = 0;
      chainComplete = false;
      chainStoppedFrames = 0;

      for (const d of dominoes) {
        d.angle = 0;
        d.angularVelocity = 0;
        d.linearVelocity.set(0, 0, 0);
        d.toppled = false;
        d.hasTransferredToNext = false;
        d.resting = false;
        updateDominoTransform(d);
      }
    }

    function buildLine(count, sp) {
      const arr = [];
      const startZ = -((count - 1) * sp) / 2;
      for (let i = 0; i < count; i++) {
        const pos = new THREE.Vector3(0, 0, startZ + i * sp);
        arr.push({ pos, yaw: 0, pathDistance: i * sp });
      }
      return arr;
    }

    function buildCurve(count, sp) {
      const arr = [];
      const radius = 8;
      const startA = -Math.PI / 2;
      const endA = Math.PI / 2;
      const arc = endA - startA;

      for (let i = 0; i < count; i++) {
        const t = count === 1 ? 0 : i / (count - 1);
        const a = startA + arc * t;
        const x = Math.cos(a) * radius;
        const z = Math.sin(a) * radius;
        const tangentYaw = a + Math.PI / 2;
        arr.push({ pos: new THREE.Vector3(x, 0, z), yaw: tangentYaw, pathDistance: radius * arc * t });
      }
      return resampleBySpacing(arr, count, sp, true);
    }

    function buildSpiral(count, sp) {
      const arr = [];
      const turns = 2;
      const maxTheta = turns * Math.PI * 2;

      for (let i = 0; i < count; i++) {
        const t = count === 1 ? 0 : i / (count - 1);
        const theta = maxTheta * t;
        const r = 3 + (8 - 3) * t;
        const x = Math.cos(theta) * r;
        const z = Math.sin(theta) * r;

        const theta2 = theta + 0.05;
        const t2 = Math.min(1, (theta2 / maxTheta));
        const r2 = 3 + (8 - 3) * t2;
        const x2 = Math.cos(theta2) * r2;
        const z2 = Math.sin(theta2) * r2;
        const yaw = Math.atan2(x2 - x, z2 - z);

        arr.push({ pos: new THREE.Vector3(x, 0, z), yaw, pathDistance: 0 });
      }
      return resampleBySpacing(arr, count, sp, false);
    }

    function buildYSplit(sp) {
      const arr = [];
      const trunk = 20;
      const branch = 10;
      const startZ = -((trunk - 1) * sp) / 2;

      for (let i = 0; i < trunk; i++) {
        arr.push({
          pos: new THREE.Vector3(0, 0, startZ + i * sp),
          yaw: 0,
          pathDistance: i * sp
        });
      }

      const splitBase = new THREE.Vector3(0, 0, startZ + (trunk - 1) * sp);
      const leftYaw = THREE.MathUtils.degToRad(-30);
      const rightYaw = THREE.MathUtils.degToRad(30);
      const leftDir = getForwardDir(leftYaw);
      const rightDir = getForwardDir(rightYaw);

      for (let i = 1; i <= branch; i++) {
        arr.push({
          pos: splitBase.clone().add(leftDir.clone().multiplyScalar(i * sp)),
          yaw: leftYaw,
          pathDistance: trunk * sp + i * sp
        });
      }
      for (let i = 1; i <= branch; i++) {
        arr.push({
          pos: splitBase.clone().add(rightDir.clone().multiplyScalar(i * sp)),
          yaw: rightYaw,
          pathDistance: trunk * sp + i * sp
        });
      }

      return arr;
    }

    function polylineLength(points) {
      let len = 0;
      for (let i = 1; i < points.length; i++) {
        len += points[i].pos.distanceTo(points[i - 1].pos);
      }
      return len;
    }

    function resampleBySpacing(points, count, sp, closedLike) {
      if (points.length < 2) return points;

      const cumulative = [0];
      for (let i = 1; i < points.length; i++) {
        cumulative[i] = cumulative[i - 1] + points[i].pos.distanceTo(points[i - 1].pos);
      }
      const totalLen = cumulative[cumulative.length - 1];
      const targetCount = count;
      const maxDist = Math.min(totalLen, (targetCount - 1) * sp);

      const out = [];
      for (let i = 0; i < targetCount; i++) {
        const d = Math.min(i * sp, maxDist);
        let seg = 0;
        while (seg < cumulative.length - 2 && cumulative[seg + 1] < d) seg++;

        const d0 = cumulative[seg];
        const d1 = cumulative[seg + 1];
        const a = points[seg];
        const b = points[seg + 1];
        const t = d1 > d0 ? (d - d0) / (d1 - d0) : 0;

        const pos = a.pos.clone().lerp(b.pos, t);
        const dir = b.pos.clone().sub(a.pos).normalize();
        const yaw = Math.atan2(dir.x, dir.z);
        out.push({ pos, yaw, pathDistance: d });
      }
      return out;
    }

    function getLayoutName() {
      return currentLayout;
    }

    function generateLayout() {
      clearDominoes();

      let placements = [];
      if (currentLayout === 'Line') {
        placements = buildLine(requestedCount, spacing);
      } else if (currentLayout === 'Curve') {
        placements = buildCurve(requestedCount, spacing);
      } else if (currentLayout === 'Spiral') {
        placements = buildSpiral(requestedCount, spacing);
      } else if (currentLayout === 'Y-Split') {
        placements = buildYSplit(spacing);
      }

      dominoes = placements.map((p, i) => makeDomino(i, p.pos, p.yaw, p.pathDistance));
      layoutPathDistances = placements.map(p => p.pathDistance);
      resetPhysicsState();
      updateHUD();
    }

    // ------------------------------------------------------------
    // Physics
    // ------------------------------------------------------------
    function applyInitialTopple() {
      if (!dominoes.length) return;
      dominoes[0].angularVelocity = Math.max(dominoes[0].angularVelocity, 1.0);
      if (!topplingStarted) {
        topplingStarted = true;
        topplingStartTime = performance.now() * 0.001;
      }
    }

    function updatePhysics(dt) {
      let anyMotion = false;

      for (let i = 0; i < dominoes.length; i++) {
        const d = dominoes[i];

        if (d.resting) continue;

        const torqueGravity = MASS * G * HALF_H * Math.sin(d.angle);
        const angularAcc = torqueGravity / INERTIA;

        d.angularVelocity += angularAcc * dt;
        d.angularVelocity *= Math.pow(AIR_DAMPING, dt * 60);
        d.angle += d.angularVelocity * dt;

        if (d.angle < 0) {
          d.angle = 0;
          d.angularVelocity = 0;
        }

        if (d.angle >= REST_ANGLE) {
          d.angle = REST_ANGLE;
          d.angularVelocity *= 0.2;
          if (Math.abs(d.angularVelocity) < 0.15) {
            d.angularVelocity = 0;
            d.resting = true;
          }
        }

        if (Math.abs(d.angularVelocity) > 0.0001 || d.angle > 0.0001) {
          anyMotion = true;
        }

        if (!d.toppled && d.angle > TOPPLE_THRESHOLD) {
          d.toppled = true;
          furthestToppledDistance = Math.max(furthestToppledDistance, d.pathDistance);
          if (!topplingStarted) {
            topplingStarted = true;
            topplingStartTime = performance.now() * 0.001;
          }
        }
      }

      // Domino-domino collision / impulse transfer
      for (let i = 0; i < dominoes.length - 1; i++) {
        const a = dominoes[i];
        const b = dominoes[i + 1];

        if (a.hasTransferredToNext) continue;

        const topPoint = getDominioTopFrontPointAccurate(a);
        const localToB = topPoint.clone().sub(b.basePos);
        localToB.applyAxisAngle(new THREE.Vector3(0, 1, 0), -b.yaw);

        const withinWidth = Math.abs(localToB.x) <= (DOMINO_W * 0.65 + DOMINO_W * 0.5);
        const withinDepth = localToB.z >= -DOMINO_D * 0.75 && localToB.z <= DOMINO_D * 0.75;
        const withinHeight = localToB.y >= 0 && localToB.y <= DOMINO_H + 0.2;

        const angleEnough = a.angle > 0.25;

        if (withinWidth && withinDepth && withinHeight && angleEnough) {
          const edgeSpeed = a.angularVelocity * DOMINO_H;
          const impulse = Math.max(0, edgeSpeed) * (1 + RESTITUTION) * (1 - 0.25 * FRICTION);
          const transferredOmega = Math.max(0.6, impulse * 0.9);

          b.angularVelocity = Math.max(b.angularVelocity, transferredOmega);
          a.angularVelocity *= 0.82;
          a.hasTransferredToNext = true;
        }
      }

      // Extra handling for Y-split: last trunk domino can hit both branches
      if (currentLayout === 'Y-Split' && dominoes.length >= 40) {
        const splitIndex = 19;
        const trunkEnd = dominoes[splitIndex];
        if (trunkEnd && trunkEnd.angle > 0.35) {
          [20, 30].forEach(idx => {
            const target = dominoes[idx];
            if (!target || target.angularVelocity > 0.2) return;

            const p = getDominioTopFrontPointAccurate(trunkEnd);
            const rel = p.clone().sub(target.basePos);
            rel.applyAxisAngle(new THREE.Vector3(0, 1, 0), -target.yaw);

            if (Math.abs(rel.x) < 0.35 && rel.y > 0 && rel.y < DOMINO_H + 0.2 && rel.z > -0.6 && rel.z < 0.6) {
              target.angularVelocity = Math.max(target.angularVelocity, 0.95);
            }
          });
        }
      }

      for (const d of dominoes) {
        updateDominoTransform(d);
      }

      const toppledCount = dominoes.filter(d => d.angle > TOPPLE_THRESHOLD).length;
      if (topplingStarted && toppledCount < dominoes.length && !anyMotion) {
        chainStoppedFrames++;
      } else {
        chainStoppedFrames = 0;
      }

      if (!chainComplete) {
        if (toppledCount === dominoes.length || chainStoppedFrames > 45) {
          chainComplete = true;
        }
      }
    }

    // ------------------------------------------------------------
    // HUD / state
    // ------------------------------------------------------------
    function computeWaveSpeed(nowSec) {
      if (!topplingStarted) return 0;
      const elapsed = Math.max(0.0001, nowSec - topplingStartTime);
      return furthestToppledDistance / elapsed;
    }

    function dominoesAreValid() {
      for (const d of dominoes) {
        if (
          !Number.isFinite(d.basePos.x) ||
          !Number.isFinite(d.basePos.y) ||
          !Number.isFinite(d.basePos.z) ||
          !Number.isFinite(d.angle) ||
          !Number.isFinite(d.angularVelocity) ||
          !Number.isFinite(d.yaw)
        ) {
          return false;
        }
      }
      return true;
    }

    function updateHUD() {
      const nowSec = performance.now() * 0.001;
      const toppledCount = dominoes.filter(d => d.angle > TOPPLE_THRESHOLD).length;
      const waveSpeed = computeWaveSpeed(nowSec);
      const maxAngleDeg = dominoes.length
        ? Math.max(...dominoes.map(d => THREE.MathUtils.radToDeg(d.angle)))
        : 0;

      hudCount.textContent = String(dominoes.length);
      hudToppled.textContent = String(toppledCount);
      hudWave.textContent = waveSpeed.toFixed(2);
      hudLayout.textContent = getLayoutName();
      hudSpacing.textContent = spacing.toFixed(2);
      hudPaused.textContent = isPaused ? 'Paused' : 'Playing';

      window.__3D_STATE__ = {
        dominoCount: dominoes.length,
        toppledCount,
        waveSpeed: Number(waveSpeed.toFixed(2)),
        layout: getLayoutName(),
        spacing: Number(spacing.toFixed(2)),
        isPaused,
        frameCount,
        dominoesValid: dominoesAreValid(),
        chainComplete,
        maxAngle: Number(maxAngleDeg.toFixed(1))
      };
    }

    // ------------------------------------------------------------
    // Input
    // ------------------------------------------------------------
    sliderSpacing.addEventListener('input', () => {
      spacing = parseFloat(sliderSpacing.value);
      labelSpacing.textContent = spacing.toFixed(2);
      generateLayout();
    });

    sliderCount.addEventListener('input', () => {
      requestedCount = parseInt(sliderCount.value, 10);
      labelCount.textContent = String(requestedCount);
      if (currentLayout !== 'Y-Split') {
        generateLayout();
      } else {
        generateLayout();
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
        updateHUD();
        return;
      }

      const k = e.key.toLowerCase();

      if (k === 't') {
        applyInitialTopple();
      } else if (k === 'r') {
        resetPhysicsState();
      } else if (k === '1') {
        currentLayout = 'Line';
        generateLayout();
      } else if (k === '2') {
        currentLayout = 'Curve';
        generateLayout();
      } else if (k === '3') {
        currentLayout = 'Spiral';
        generateLayout();
      } else if (k === '4') {
        currentLayout = 'Y-Split';
        generateLayout();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ------------------------------------------------------------
    // Init
    // ------------------------------------------------------------
    labelSpacing.textContent = spacing.toFixed(2);
    labelCount.textContent = String(requestedCount);
    window.__3D_STATE__ = {
      dominoCount: 0,
      toppledCount: 0,
      waveSpeed: 0,
      layout: 'Line',
      spacing: 0.6,
      isPaused: false,
      frameCount: 0,
      dominoesValid: true,
      chainComplete: false,
      maxAngle: 0
    };

    generateLayout();

    // ------------------------------------------------------------
    // Loop
    // ------------------------------------------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dt = Math.min(clock.getDelta(), 0.033);

      controls.update();

      if (!isPaused) {
        // small substeps for stability
        const substeps = 2;
        const step = dt / substeps;
        for (let i = 0; i < substeps; i++) {
          updatePhysics(step);
        }
      }

      updateHUD(); // must happen every frame before rendering
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
