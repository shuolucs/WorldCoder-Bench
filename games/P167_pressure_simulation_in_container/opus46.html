<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gas Pressure Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 15px;
  left: 15px;
  background: rgba(0, 0, 0, 0.75);
  color: #e0e0e0;
  padding: 15px 20px;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.8;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  min-width: 220px;
  z-index: 10;
}

#hud .title {
  font-size: 16px;
  font-weight: bold;
  color: #00d4ff;
  margin-bottom: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  padding-bottom: 6px;
}

#hud .label {
  color: #888;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#hud .value {
  color: #fff;
  font-weight: 600;
}

#hud .gravity-on { color: #4caf50; }
#hud .gravity-off { color: #f44336; }
#hud .paused-yes { color: #ff9800; }
#hud .paused-no { color: #4caf50; }

#controls {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.75);
  padding: 15px 25px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 15px;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 10;
}

#controls label {
  color: #ccc;
  font-size: 13px;
  white-space: nowrap;
}

#tempSlider {
  width: 150px;
  accent-color: #00d4ff;
  cursor: pointer;
}

#controls button {
  background: linear-gradient(135deg, #00d4ff, #0090ff);
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  white-space: nowrap;
}

#controls button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
}

#controls button.remove {
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
}

#controls button.remove:hover {
  box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
}

#tempValue {
  color: #00d4ff;
  font-weight: bold;
  font-size: 13px;
  min-width: 30px;
}

#instructions {
  position: absolute;
  top: 15px;
  right: 15px;
  background: rgba(0, 0, 0, 0.75);
  color: #aaa;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 11px;
  line-height: 1.8;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  z-index: 10;
}

#instructions kbd {
  background: rgba(255,255,255,0.15);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 11px;
  color: #fff;
}
</style>
</head>
<body>

<div id="hud">
  <div class="title">⚛ Gas Simulation</div>
  <div><span class="label">Particles:</span> <span class="value" id="hudCount">30</span></div>
  <div><span class="label">Avg Speed:</span> <span class="value" id="hudAvgSpeed">0.00</span></div>
  <div><span class="label">Min Speed:</span> <span class="value" id="hudMinSpeed">0.00</span></div>
  <div><span class="label">Max Speed:</span> <span class="value" id="hudMaxSpeed">0.00</span></div>
  <div><span class="label">Pressure:</span> <span class="value" id="hudPressure">0</span> <span class="label">col/s</span></div>
  <div><span class="label">Container:</span> <span class="value" id="hudContainer">6x6x6</span></div>
  <div><span class="label">Gravity:</span> <span class="value" id="hudGravity">OFF</span></div>
  <div><span class="label">Paused:</span> <span class="value" id="hudPaused">NO</span></div>
  <div><span class="label">Temperature:</span> <span class="value" id="hudTemp">1.0</span></div>
  <div><span class="label">Total Energy:</span> <span class="value" id="hudEnergy">0.00</span></div>
</div>

<div id="instructions">
  <kbd>E</kbd> Expand container<br>
  <kbd>C</kbd> Compress container<br>
  <kbd>G</kbd> Toggle gravity<br>
  <kbd>Space</kbd> Pause/Resume
</div>

<div id="controls">
  <label for="tempSlider">🌡 Temperature:</label>
  <input type="range" id="tempSlider" min="0.5" max="3.0" step="0.1" value="1.0">
  <span id="tempValue">1.0</span>
  <button id="addParticlesBtn">+ Add 10</button>
  <button id="removeParticlesBtn" class="remove">− Remove 10</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let containerSize = 6;
let gravityOn = false;
let paused = false;
let tempFactor = 1.0;
let foxLoaded = false;
let frameCount = 0;

const particles = [];
const collisionTimestamps = [];
const COR = 0.95;

window.__3D_STATE__ = {
  particleCount: 0,
  avgSpeed: 0,
  pressure: 0,
  containerSize: containerSize,
  gravityOn: false,
  paused: false,
  tempFactor: 1.0,
  foxLoaded: false,
  totalEnergy: 0,
  frameCount: 0,
  minSpeed: 0,
  maxSpeed: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002244, 0.3);
scene.add(hemiLight);

// --- Ground Plane ---
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -3;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(40, 40, 0x444466, 0x333355);
gridHelper.position.y = -2.99;
scene.add(gridHelper);

// --- Container ---
let containerMesh;
let containerEdges;
let containerFaces;

function createContainer(size) {
  if (containerMesh) scene.remove(containerMesh);

  containerMesh = new THREE.Group();
  const half = size / 2;

  // Semi-transparent faces
  const faceMat = new THREE.MeshPhysicalMaterial({
    color: 0x00d4ff,
    transparent: true,
    opacity: 0.08,
    side: THREE.DoubleSide,
    roughness: 0.1,
    metalness: 0.0,
    transmission: 0.9,
    depthWrite: false
  });

  const boxGeo = new THREE.BoxGeometry(size, size, size);
  containerFaces = new THREE.Mesh(boxGeo, faceMat);
  containerMesh.add(containerFaces);

  // Edges
  const edgesGeo = new THREE.EdgesGeometry(boxGeo);
  const edgesMat = new THREE.LineBasicMaterial({ color: 0x00d4ff, linewidth: 2, transparent: true, opacity: 0.6 });
  containerEdges = new THREE.LineSegments(edgesGeo, edgesMat);
  containerMesh.add(containerEdges);

  // Corner glow spheres
  const cornerGeo = new THREE.SphereGeometry(0.08, 8, 8);
  const cornerMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
  for (let x = -1; x <= 1; x += 2) {
    for (let y = -1; y <= 1; y += 2) {
      for (let z = -1; z <= 1; z += 2) {
        const corner = new THREE.Mesh(cornerGeo, cornerMat);
        corner.position.set(x * half, y * half, z * half);
        containerMesh.add(corner);
      }
    }
  }

  scene.add(containerMesh);
}

createContainer(containerSize);

// --- Particle System ---
const particleGeometry = new THREE.SphereGeometry(0.15, 12, 12);

function speedToColor(speed) {
  const maxSpeed = 5.0;
  const t = Math.min(speed / maxSpeed, 1.0);
  const hue = (1.0 - t) * 0.65;
  return new THREE.Color().setHSL(hue, 1.0, 0.5);
}

function createParticle(tempMult = 1.0) {
  const half = containerSize / 2 - 0.2;
  const mat = new THREE.MeshStandardMaterial({
    color: 0x0000ff,
    emissive: 0x000044,
    emissiveIntensity: 0.5,
    roughness: 0.3,
    metalness: 0.5
  });
  const mesh = new THREE.Mesh(particleGeometry, mat);
  mesh.position.set(
    (Math.random() - 0.5) * 2 * half,
    (Math.random() - 0.5) * 2 * half,
    (Math.random() - 0.5) * 2 * half
  );
  mesh.castShadow = true;

  const vx = (Math.random() - 0.5) * 4 * tempMult;
  const vy = (Math.random() - 0.5) * 4 * tempMult;
  const vz = (Math.random() - 0.5) * 4 * tempMult;

  scene.add(mesh);

  // Trail
  const trailMat = new THREE.LineBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.2 });
  const trailGeo = new THREE.BufferGeometry();
  const trailPositions = new Float32Array(30 * 3);
  trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
  trailGeo.setDrawRange(0, 0);
  const trailLine = new THREE.Line(trailGeo, trailMat);
  scene.add(trailLine);

  return {
    mesh,
    vx, vy, vz,
    trail: trailLine,
    trailPositions: [],
    maxTrailLength: 10
  };
}

function removeParticle(p) {
  scene.remove(p.mesh);
  p.mesh.geometry.dispose && p.mesh.geometry.dispose();
  p.mesh.material.dispose();
  scene.remove(p.trail);
  p.trail.geometry.dispose();
  p.trail.material.dispose();
}

// Initialize 30 particles
for (let i = 0; i < 30; i++) {
  particles.push(createParticle(tempFactor));
}

// --- Fox Model ---
let foxMixer = null;
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Fox/glTF/Fox.glb',
  (gltf) => {
    const fox = gltf.scene;
    fox.scale.set(0.05, 0.05, 0.05);
    fox.position.set(6, -3, 0);
    fox.rotation.y = -Math.PI / 2;
    fox.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(fox);

    if (gltf.animations && gltf.animations.length > 0) {
      foxMixer = new THREE.AnimationMixer(fox);
      const action = foxMixer.clipAction(gltf.animations[0]);
      action.play();
    }

    foxLoaded = true;
    window.__3D_STATE__.foxLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Fox model failed to load:', error);
  }
);

// --- Controls ---
const tempSlider = document.getElementById('tempSlider');
const tempValue = document.getElementById('tempValue');
const addBtn = document.getElementById('addParticlesBtn');
const removeBtn = document.getElementById('removeParticlesBtn');

let oldTemp = 1.0;
tempSlider.addEventListener('input', (e) => {
  const newTemp = parseFloat(e.target.value);
  tempValue.textContent = newTemp.toFixed(1);
  const ratio = newTemp / oldTemp;
  particles.forEach(p => {
    p.vx *= ratio;
    p.vy *= ratio;
    p.vz *= ratio;
  });
  oldTemp = newTemp;
  tempFactor = newTemp;
});

addBtn.addEventListener('click', () => {
  for (let i = 0; i < 10; i++) {
    particles.push(createParticle(tempFactor));
  }
});

removeBtn.addEventListener('click', () => {
  const removeCount = Math.min(10, particles.length - 5);
  if (removeCount <= 0) return;
  for (let i = 0; i < removeCount; i++) {
    const p = particles.pop();
    removeParticle(p);
  }
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;

  if (e.code === 'KeyE') {
    if (containerSize < 12) {
      containerSize += 1;
      createContainer(containerSize);
    }
  } else if (e.code === 'KeyC') {
    if (containerSize > 3) {
      containerSize -= 1;
      createContainer(containerSize);
      // Reposition particles inside new bounds
      const half = containerSize / 2 - 0.2;
      particles.forEach(p => {
        let outside = false;
        if (Math.abs(p.mesh.position.x) > half) { p.mesh.position.x = (Math.random() - 0.5) * 2 * half; outside = true; }
        if (Math.abs(p.mesh.position.y) > half) { p.mesh.position.y = (Math.random() - 0.5) * 2 * half; outside = true; }
        if (Math.abs(p.mesh.position.z) > half) { p.mesh.position.z = (Math.random() - 0.5) * 2 * half; outside = true; }
        if (outside) {
          p.vx = (Math.random() - 0.5) * 2 * tempFactor;
          p.vy = (Math.random() - 0.5) * 2 * tempFactor;
          p.vz = (Math.random() - 0.5) * 2 * tempFactor;
        }
      });
    }
  } else if (e.code === 'KeyG') {
    gravityOn = !gravityOn;
  } else if (e.code === 'Space') {
    e.preventDefault();
    paused = !paused;
  }
});

// --- HUD Update ---
function updateHUD() {
  const now = performance.now() / 1000;
  // Remove old collision timestamps (older than 1 second)
  while (collisionTimestamps.length > 0 && collisionTimestamps[0] < now - 1) {
    collisionTimestamps.shift();
  }
  const pressure = collisionTimestamps.length;

  let totalSpeed = 0;
  let minSpeed = Infinity;
  let maxSpeed = -Infinity;
  let totalEnergy = 0;

  particles.forEach(p => {
    const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy + p.vz * p.vz);
    totalSpeed += speed;
    if (speed < minSpeed) minSpeed = speed;
    if (speed > maxSpeed) maxSpeed = speed;
    totalEnergy += 0.5 * speed * speed;
  });

  const count = particles.length;
  const avgSpeed = count > 0 ? totalSpeed / count : 0;
  if (count === 0) { minSpeed = 0; maxSpeed = 0; }

  document.getElementById('hudCount').textContent = count;
  document.getElementById('hudAvgSpeed').textContent = avgSpeed.toFixed(2);
  document.getElementById('hudMinSpeed').textContent = minSpeed.toFixed(2);
  document.getElementById('hudMaxSpeed').textContent = maxSpeed.toFixed(2);
  document.getElementById('hudPressure').textContent = pressure;
  document.getElementById('hudContainer').textContent = `${containerSize}x${containerSize}x${containerSize}`;

  const gravEl = document.getElementById('hudGravity');
  gravEl.textContent = gravityOn ? 'ON' : 'OFF';
  gravEl.className = 'value ' + (gravityOn ? 'gravity-on' : 'gravity-off');

  const pauseEl = document.getElementById('hudPaused');
  pauseEl.textContent = paused ? 'YES' : 'NO';
  pauseEl.className = 'value ' + (paused ? 'paused-yes' : 'paused-no');

  document.getElementById('hudTemp').textContent = tempFactor.toFixed(1);
  document.getElementById('hudEnergy').textContent = totalEnergy.toFixed(2);

  // Update global state
  window.__3D_STATE__.particleCount = count;
  window.__3D_STATE__.avgSpeed = parseFloat(avgSpeed.toFixed(2));
  window.__3D_STATE__.pressure = pressure;
  window.__3D_STATE__.containerSize = containerSize;
  window.__3D_STATE__.gravityOn = gravityOn;
  window.__3D_STATE__.paused = paused;
  window.__3D_STATE__.tempFactor = tempFactor;
  window.__3D_STATE__.foxLoaded = foxLoaded;
  window.__3D_STATE__.totalEnergy = parseFloat(totalEnergy.toFixed(2));
  window.__3D_STATE__.frameCount = frameCount;
  window.__3D_STATE__.minSpeed = parseFloat(minSpeed.toFixed(2));
  window.__3D_STATE__.maxSpeed = parseFloat(maxSpeed.toFixed(2));
}

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  const deltaTime = Math.min(clock.getDelta(), 0.05);

  controls.update();

  if (foxMixer) {
    foxMixer.update(deltaTime);
  }

  if (!paused) {
    const half = containerSize / 2;
    const now = performance.now() / 1000;

    particles.forEach(p => {
      // Apply gravity
      if (gravityOn) {
        p.vy -= 9.8 * deltaTime;
      }

      // Move
      p.mesh.position.x += p.vx * deltaTime;
      p.mesh.position.y += p.vy * deltaTime;
      p.mesh.position.z += p.vz * deltaTime;

      // Wall collisions
      const r = 0.15;
      const bound = half - r;

      if (p.mesh.position.x > bound) {
        p.mesh.position.x = bound;
        p.vx = -Math.abs(p.vx) * COR;
        collisionTimestamps.push(now);
      } else if (p.mesh.position.x < -bound) {
        p.mesh.position.x = -bound;
        p.vx = Math.abs(p.vx) * COR;
        collisionTimestamps.push(now);
      }

      if (p.mesh.position.y > bound) {
        p.mesh.position.y = bound;
        p.vy = -Math.abs(p.vy) * COR;
        collisionTimestamps.push(now);
      } else if (p.mesh.position.y < -bound) {
        p.mesh.position.y = -bound;
        p.vy = Math.abs(p.vy) * COR;
        collisionTimestamps.push(now);
      }

      if (p.mesh.position.z > bound) {
        p.mesh.position.z = bound;
        p.vz = -Math.abs(p.vz) * COR;
        collisionTimestamps.push(now);
      } else if (p.mesh.position.z < -bound) {
        p.mesh.position.z = -bound;
        p.vz = Math.abs(p.vz) * COR;
        collisionTimestamps.push(now);
      }

      // Update color based on speed
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy + p.vz * p.vz);
      const color = speedToColor(speed);
      p.mesh.material.color.copy(color);
      p.mesh.material.emissive.copy(color).multiplyScalar(0.3);

      // Update trail
      p.trailPositions.push(p.mesh.position.x, p.mesh.position.y, p.mesh.position.z);
      if (p.trailPositions.length > p.maxTrailLength * 3) {
        p.trailPositions.splice(0, 3);
      }
      const trailArray = new Float32Array(p.trailPositions);
      p.trail.geometry.setAttribute('position', new THREE.BufferAttribute(trailArray, 3));
      p.trail.geometry.setDrawRange(0, p.trailPositions.length / 3);
      p.trail.geometry.attributes.position.needsUpdate = true;

      // Trail color matches particle
      p.trail.material.color.copy(color);
    });
  }

  // Container pulse effect
  if (containerFaces) {
    const pulse = 0.08 + Math.sin(performance.now() * 0.002) * 0.02;
    containerFaces.material.opacity = pulse;
  }

  updateHUD();
  renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
