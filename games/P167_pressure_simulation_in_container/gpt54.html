<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Gas Pressure Simulation with Fox Mascot</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      width: 280px;
    }

    #ui label, #ui button {
      display: block;
      margin-top: 8px;
    }

    #ui input[type="range"] {
      width: 100%;
    }

    #ui button {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2d6cdf;
      color: white;
      font-weight: bold;
    }

    #ui button:hover {
      background: #4a82e8;
    }

    #hud {
      position: absolute;
      right: 12px;
      top: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(4px);
      min-width: 250px;
      line-height: 1.5;
      white-space: pre-line;
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="ui">
    <label for="tempSlider">Temperature Factor: <span id="tempValue">1.0</span></label>
    <input id="tempSlider" type="range" min="0.5" max="3.0" step="0.1" value="1.0" />
    <button id="addParticlesBtn">Add 10 Particles</button>
    <button id="removeParticlesBtn">Remove 10 Particles</button>
  </div>

  <div id="hud"></div>

  <div id="help">
    <strong>Controls</strong><br>
    E = Expand container<br>
    C = Compress container<br>
    G = Toggle gravity<br>
    Space = Pause/Resume<br>
    Mouse = Orbit camera
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(40, 40);
    const groundMat = new THREE.MeshStandardMaterial({
      color: 0x303848,
      roughness: 0.9,
      metalness: 0.05
    });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3;
    scene.add(ground);

    const grid = new THREE.GridHelper(40, 40, 0x6f86ff, 0x3a425a);
    grid.position.y = -2.99;
    scene.add(grid);

    let containerSize = 6;
    let containerGroup = new THREE.Group();
    scene.add(containerGroup);

    function buildContainer() {
      while (containerGroup.children.length) {
        const obj = containerGroup.children.pop();
        if (obj.geometry) obj.geometry.dispose?.();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose?.());
          else obj.material.dispose?.();
        }
      }

      const boxGeo = new THREE.BoxGeometry(containerSize, containerSize, containerSize);
      const edgesGeo = new THREE.EdgesGeometry(boxGeo);

      const boxMat = new THREE.MeshStandardMaterial({
        color: 0x66ccff,
        transparent: true,
        opacity: 0.12,
        side: THREE.DoubleSide
      });
      const boxMesh = new THREE.Mesh(boxGeo, boxMat);

      const edgeMat = new THREE.LineBasicMaterial({ color: 0xaee6ff });
      const edges = new THREE.LineSegments(edgesGeo, edgeMat);

      containerGroup.add(boxMesh);
      containerGroup.add(edges);
    }

    buildContainer();

    const particleRadius = 0.15;
    const restitution = 0.95;
    const particles = [];
    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const particleGeo = new THREE.SphereGeometry(particleRadius, 16, 16);

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function speedToColor(speed) {
      const normalized = THREE.MathUtils.clamp(speed / 8, 0, 1);
      const hue = (1 - normalized) * 0.66;
      const color = new THREE.Color();
      color.setHSL(hue, 1.0, 0.5);
      return color;
    }

    function randomInsideBounds(size, margin = particleRadius) {
      const half = size / 2 - margin;
      return new THREE.Vector3(
        randRange(-half, half),
        randRange(-half, half),
        randRange(-half, half)
      );
    }

    function randomVelocity(scale = 1) {
      return new THREE.Vector3(
        randRange(-2, 2) * scale,
        randRange(-2, 2) * scale,
        randRange(-2, 2) * scale
      );
    }

    function createParticle() {
      const mat = new THREE.MeshStandardMaterial({
        color: 0x44aaff,
        emissive: 0x111111,
        roughness: 0.35,
        metalness: 0.05
      });

      const mesh = new THREE.Mesh(particleGeo, mat);
      mesh.position.copy(randomInsideBounds(containerSize));

      const velocity = randomVelocity(tempFactor);

      particleGroup.add(mesh);
      particles.push({ mesh, velocity });
      updateParticleColor({ mesh, velocity });
    }

    function updateParticleColor(particle) {
      const speed = particle.velocity.length();
      particle.mesh.material.color.copy(speedToColor(speed));
    }

    function addParticles(count = 10) {
      for (let i = 0; i < count; i++) createParticle();
    }

    function removeParticles(count = 10) {
      const minRemain = 5;
      const removable = Math.max(0, particles.length - minRemain);
      const actual = Math.min(count, removable);
      for (let i = 0; i < actual; i++) {
        const p = particles.pop();
        particleGroup.remove(p.mesh);
        p.mesh.geometry?.dispose?.();
        p.mesh.material?.dispose?.();
      }
    }

    addParticles(30);

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();
    let mixer = null;
    let foxLoaded = false;

    loader.load(
      'https://threejs.org/examples/models/gltf/Fox.glb',
      (gltf) => {
        const fox = gltf.scene;
        fox.scale.setScalar(0.05);
        fox.position.set(6, -2, 0);
        fox.rotation.y = -Math.PI / 2;
        scene.add(fox);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(fox);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }

        foxLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load Fox.glb:', err);
      }
    );

    let gravityOn = false;
    let paused = false;
    let tempFactor = 1.0;
    let frameCount = 0;

    const collisionTimestamps = [];

    const hud = document.getElementById('hud');
    const tempSlider = document.getElementById('tempSlider');
    const tempValue = document.getElementById('tempValue');
    const addParticlesBtn = document.getElementById('addParticlesBtn');
    const removeParticlesBtn = document.getElementById('removeParticlesBtn');

    tempSlider.addEventListener('input', () => {
      const newTemp = parseFloat(tempSlider.value);
      const scale = newTemp / tempFactor;
      particles.forEach(p => {
        p.velocity.multiplyScalar(scale);
        updateParticleColor(p);
      });
      tempFactor = newTemp;
      tempValue.textContent = tempFactor.toFixed(1);
    });

    addParticlesBtn.addEventListener('click', () => addParticles(10));
    removeParticlesBtn.addEventListener('click', () => removeParticles(10));

    function repositionParticleInside(p) {
      const half = containerSize / 2 - particleRadius;
      p.mesh.position.set(
        THREE.MathUtils.clamp(p.mesh.position.x, -half, half),
        THREE.MathUtils.clamp(p.mesh.position.y, -half, half),
        THREE.MathUtils.clamp(p.mesh.position.z, -half, half)
      );

      const centerDir = new THREE.Vector3()
        .subVectors(new THREE.Vector3(0, 0, 0), p.mesh.position)
        .normalize();

      const inward = centerDir.multiplyScalar(randRange(1, 3) * tempFactor);
      p.velocity.copy(inward.add(randomVelocity(0.5)));
    }

    function resizeContainer(delta) {
      const newSize = THREE.MathUtils.clamp(containerSize + delta, 3, 12);
      if (newSize === containerSize) return;
      containerSize = newSize;
      buildContainer();

      const half = containerSize / 2 - particleRadius;
      particles.forEach(p => {
        const pos = p.mesh.position;
        if (
          pos.x < -half || pos.x > half ||
          pos.y < -half || pos.y > half ||
          pos.z < -half || pos.z > half
        ) {
          repositionParticleInside(p);
        }
      });
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyE') resizeContainer(1);
      if (e.code === 'KeyC') resizeContainer(-1);
      if (e.code === 'KeyG') gravityOn = !gravityOn;
      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
      }
    });

    window.__3D_STATE__ = {
      particleCount: particles.length,
      avgSpeed: 0,
      pressure: 0,
      containerSize,
      gravityOn,
      paused,
      tempFactor,
      foxLoaded,
      totalEnergy: 0,
      frameCount: 0,
      minSpeed: 0,
      maxSpeed: 0
    };

    function updateState() {
      let totalSpeed = 0;
      let totalEnergy = 0;
      let minSpeed = Infinity;
      let maxSpeed = 0;

      for (const p of particles) {
        const speed = p.velocity.length();
        totalSpeed += speed;
        totalEnergy += 0.5 * speed * speed;
        if (speed < minSpeed) minSpeed = speed;
        if (speed > maxSpeed) maxSpeed = speed;
      }

      const avgSpeed = particles.length ? totalSpeed / particles.length : 0;
      if (minSpeed === Infinity) minSpeed = 0;

      const now = performance.now() / 1000;
      while (collisionTimestamps.length && collisionTimestamps[0] < now - 1) {
        collisionTimestamps.shift();
      }

      window.__3D_STATE__ = {
        particleCount: particles.length,
        avgSpeed: Number(avgSpeed.toFixed(2)),
        pressure: collisionTimestamps.length,
        containerSize,
        gravityOn,
        paused,
        tempFactor,
        foxLoaded,
        totalEnergy: Number(totalEnergy.toFixed(2)),
        frameCount,
        minSpeed: Number(minSpeed.toFixed(2)),
        maxSpeed: Number(maxSpeed.toFixed(2))
      };

      hud.textContent =
        `Particle Count: ${window.__3D_STATE__.particleCount}\n` +
        `Average Speed: ${window.__3D_STATE__.avgSpeed}\n` +
        `Pressure: ${window.__3D_STATE__.pressure} collisions/sec\n` +
        `Container Size: ${containerSize}x${containerSize}x${containerSize}\n` +
        `Gravity: ${gravityOn ? 'ON' : 'OFF'}\n` +
        `Paused: ${paused ? 'YES' : 'NO'}\n` +
        `Temperature Factor: ${tempFactor.toFixed(1)}`;
    }

    function simulate(dt) {
      const half = containerSize / 2 - particleRadius;
      const now = performance.now() / 1000;

      for (const p of particles) {
        if (gravityOn) {
          p.velocity.y -= 9.8 * dt;
        }

        p.mesh.position.x += p.velocity.x * dt;
        p.mesh.position.y += p.velocity.y * dt;
        p.mesh.position.z += p.velocity.z * dt;

        if (p.mesh.position.x > half) {
          p.mesh.position.x = half;
          p.velocity.x = -Math.abs(p.velocity.x) * restitution;
          collisionTimestamps.push(now);
        } else if (p.mesh.position.x < -half) {
          p.mesh.position.x = -half;
          p.velocity.x = Math.abs(p.velocity.x) * restitution;
          collisionTimestamps.push(now);
        }

        if (p.mesh.position.y > half) {
          p.mesh.position.y = half;
          p.velocity.y = -Math.abs(p.velocity.y) * restitution;
          collisionTimestamps.push(now);
        } else if (p.mesh.position.y < -half) {
          p.mesh.position.y = -half;
          p.velocity.y = Math.abs(p.velocity.y) * restitution;
          collisionTimestamps.push(now);
        }

        if (p.mesh.position.z > half) {
          p.mesh.position.z = half;
          p.velocity.z = -Math.abs(p.velocity.z) * restitution;
          collisionTimestamps.push(now);
        } else if (p.mesh.position.z < -half) {
          p.mesh.position.z = -half;
          p.velocity.z = Math.abs(p.velocity.z) * restitution;
          collisionTimestamps.push(now);
        }

        updateParticleColor(p);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);
      frameCount++;

      if (!paused) {
        simulate(dt);
        if (mixer) mixer.update(dt);
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
