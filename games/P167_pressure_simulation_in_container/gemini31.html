<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gas Pressure Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: auto;
        }
        #hud {
            font-size: 14px;
            line-height: 1.5;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            width: 250px;
        }
        .hud-label {
            color: #aaa;
        }
        .hud-value {
            font-weight: bold;
            color: #0f0;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 250px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
        }
        button:hover {
            background: #444;
        }
        button:active {
            background: #222;
        }
        input[type=range] {
            width: 100%;
        }
        .instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #444;
            font-size: 12px;
            color: #ccc;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <div class="panel" id="hud">
            <div class="hud-row"><span class="hud-label">Particle Count:</span><span class="hud-value" id="hud-count">0</span></div>
            <div class="hud-row"><span class="hud-label">Average Speed:</span><span class="hud-value" id="hud-speed">0.00</span></div>
            <div class="hud-row"><span class="hud-label">Pressure (col/s):</span><span class="hud-value" id="hud-pressure">0</span></div>
            <div class="hud-row"><span class="hud-label">Container Size:</span><span class="hud-value" id="hud-size">6x6x6</span></div>
            <div class="hud-row"><span class="hud-label">Gravity:</span><span class="hud-value" id="hud-gravity">OFF</span></div>
            <div class="hud-row"><span class="hud-label">Paused:</span><span class="hud-value" id="hud-paused">NO</span></div>
            <div class="hud-row"><span class="hud-label">Temp Factor:</span><span class="hud-value" id="hud-temp">1.0</span></div>
        </div>

        <div class="panel controls">
            <div class="control-group">
                <label for="tempSlider">Temperature Factor</label>
                <input type="range" id="tempSlider" min="0.5" max="3.0" step="0.1" value="1.0">
            </div>
            <button id="addParticlesBtn">Add 10 Particles</button>
            <button id="removeParticlesBtn">Remove 10 Particles</button>
        </div>
    </div>

    <div class="instructions">
        Controls:<br>
        [E] Expand Container | [C] Compress Container<br>
        [G] Toggle Gravity | [Space] Pause/Resume<br>
        Mouse: Rotate/Zoom/Pan
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            particleCount: 0,
            avgSpeed: 0,
            pressure: 0,
            containerSize: 6,
            gravityOn: false,
            paused: false,
            tempFactor: 1.0,
            foxLoaded: false,
            totalEnergy: 0,
            frameCount: 0,
            minSpeed: 0,
            maxSpeed: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -3;
        scene.add(ground);

        // Grid Helper on ground
        const gridHelper = new THREE.GridHelper(50, 50, 0x444444, 0x444444);
        gridHelper.position.y = -2.99;
        scene.add(gridHelper);

        // Container
        let containerMesh, edgesMesh;
        function createContainer(size) {
            if (containerMesh) scene.remove(containerMesh);
            if (edgesMesh) scene.remove(edgesMesh);

            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshPhysicalMaterial({
                color: 0x88ccff,
                transparent: true,
                opacity: 0.1,
                side: THREE.DoubleSide,
                depthWrite: false
            });
            containerMesh = new THREE.Mesh(geo, mat);
            scene.add(containerMesh);

            const edgesGeo = new THREE.EdgesGeometry(geo);
            const edgesMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.5 });
            edgesMesh = new THREE.LineSegments(edgesGeo, edgesMat);
            scene.add(edgesMesh);
        }
        createContainer(window.__3D_STATE__.containerSize);

        // Fox Model
        let mixer;
        const gltfLoader = new GLTFLoader();
        gltfLoader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Fox/glTF-Binary/Fox.glb', (gltf) => {
            const fox = gltf.scene;
            fox.scale.set(0.05, 0.05, 0.05);
            fox.position.set(6, -2, 0);
            fox.lookAt(0, -2, 0);
            scene.add(fox);

            mixer = new THREE.AnimationMixer(fox);
            if (gltf.animations.length > 0) {
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
            window.__3D_STATE__.foxLoaded = true;
        });

        // Particle System
        const particles = [];
        const particleRadius = 0.15;
        const particleGeo = new THREE.SphereGeometry(particleRadius, 16, 16);
        const collisionTimestamps = [];

        class Particle {
            constructor() {
                this.material = new THREE.MeshStandardMaterial({ color: 0xffffff });
                this.mesh = new THREE.Mesh(particleGeo, this.material);
                
                const bounds = window.__3D_STATE__.containerSize / 2 - particleRadius;
                this.mesh.position.set(
                    (Math.random() - 0.5) * 2 * bounds,
                    (Math.random() - 0.5) * 2 * bounds,
                    (Math.random() - 0.5) * 2 * bounds
                );

                const temp = window.__3D_STATE__.tempFactor;
                this.velocity = new THREE.Vector3(
                    (Math.random() * 4 - 2) * temp,
                    (Math.random() * 4 - 2) * temp,
                    (Math.random() * 4 - 2) * temp
                );

                scene.add(this.mesh);
            }

            destroy() {
                scene.remove(this.mesh);
                this.material.dispose();
            }
        }

        function addParticles(count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
            window.__3D_STATE__.particleCount = particles.length;
        }

        function removeParticles(count) {
            const toRemove = Math.min(count, particles.length - 5);
            for (let i = 0; i < toRemove; i++) {
                const p = particles.pop();
                p.destroy();
            }
            window.__3D_STATE__.particleCount = particles.length;
        }

        // Initialize particles
        addParticles(30);

        // UI Interactions
        document.getElementById('tempSlider').addEventListener('input', (e) => {
            const newTemp = parseFloat(e.target.value);
            const oldTemp = window.__3D_STATE__.tempFactor;
            const ratio = newTemp / oldTemp;
            
            particles.forEach(p => {
                p.velocity.multiplyScalar(ratio);
            });
            
            window.__3D_STATE__.tempFactor = newTemp;
        });

        document.getElementById('addParticlesBtn').addEventListener('click', () => addParticles(10));
        document.getElementById('removeParticlesBtn').addEventListener('click', () => removeParticles(10));

        // Keyboard Interactions
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            if (key === 'e' || key === 'c') {
                let newSize = window.__3D_STATE__.containerSize + (key === 'e' ? 1 : -1);
                newSize = Math.max(3, Math.min(12, newSize));
                
                if (newSize !== window.__3D_STATE__.containerSize) {
                    window.__3D_STATE__.containerSize = newSize;
                    createContainer(newSize);
                    
                    const bounds = newSize / 2 - particleRadius;
                    particles.forEach(p => {
                        ['x', 'y', 'z'].forEach(axis => {
                            if (p.mesh.position[axis] > bounds) {
                                p.mesh.position[axis] = bounds - 0.01;
                                p.velocity[axis] = -Math.abs(p.velocity[axis] || (Math.random() * 2 + 1));
                            } else if (p.mesh.position[axis] < -bounds) {
                                p.mesh.position[axis] = -bounds + 0.01;
                                p.velocity[axis] = Math.abs(p.velocity[axis] || (Math.random() * 2 + 1));
                            }
                        });
                    });
                }
            }
            
            if (key === 'g') {
                window.__3D_STATE__.gravityOn = !window.__3D_STATE__.gravityOn;
            }
            
            if (e.code === 'Space') {
                window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function updateHUD() {
            const s = window.__3D_STATE__;
            document.getElementById('hud-count').innerText = s.particleCount;
            document.getElementById('hud-speed').innerText = s.avgSpeed.toFixed(2);
            document.getElementById('hud-pressure').innerText = s.pressure;
            document.getElementById('hud-size').innerText = `${s.containerSize}x${s.containerSize}x${s.containerSize}`;
            document.getElementById('hud-gravity').innerText = s.gravityOn ? 'ON' : 'OFF';
            document.getElementById('hud-gravity').style.color = s.gravityOn ? '#f00' : '#0f0';
            document.getElementById('hud-paused').innerText = s.paused ? 'YES' : 'NO';
            document.getElementById('hud-paused').style.color = s.paused ? '#f00' : '#0f0';
            document.getElementById('hud-temp').innerText = s.tempFactor.toFixed(1);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1);
            window.__3D_STATE__.frameCount++;

            if (mixer && !window.__3D_STATE__.paused) {
                mixer.update(dt);
            }

            controls.update();

            if (!window.__3D_STATE__.paused) {
                const bounds = window.__3D_STATE__.containerSize / 2 - particleRadius;
                const restitution = 0.95;
                let totalSpeed = 0;
                let totalEnergy = 0;
                let minSpeed = Infinity;
                let maxSpeed = 0;

                particles.forEach(p => {
                    if (window.__3D_STATE__.gravityOn) {
                        p.velocity.y -= 9.8 * dt;
                    }

                    p.mesh.position.addScaledVector(p.velocity, dt);

                    let collided = false;
                    ['x', 'y', 'z'].forEach(axis => {
                        if (p.mesh.position[axis] > bounds) {
                            p.mesh.position[axis] = bounds;
                            p.velocity[axis] *= -restitution;
                            collided = true;
                        } else if (p.mesh.position[axis] < -bounds) {
                            p.mesh.position[axis] = -bounds;
                            p.velocity[axis] *= -restitution;
                            collided = true;
                        }
                    });

                    if (collided) {
                        collisionTimestamps.push(performance.now());
                    }

                    const speed = p.velocity.length();
                    totalSpeed += speed;
                    totalEnergy += 0.5 * speed * speed;
                    if (speed < minSpeed) minSpeed = speed;
                    if (speed > maxSpeed) maxSpeed = speed;

                    // Color mapping: Blue (slow) to Red (fast)
                    // Hue 0.66 (blue) to 0.0 (red). Max expected speed ~15
                    const normalizedSpeed = Math.min(speed / 15, 1.0);
                    const hue = 0.66 * (1.0 - normalizedSpeed);
                    p.material.color.setHSL(hue, 1.0, 0.5);
                });

                // Update Pressure (collisions in last 1000ms)
                const now = performance.now();
                while (collisionTimestamps.length > 0 && now - collisionTimestamps[0] > 1000) {
                    collisionTimestamps.shift();
                }

                // Update State
                window.__3D_STATE__.pressure = collisionTimestamps.length;
                window.__3D_STATE__.avgSpeed = particles.length > 0 ? totalSpeed / particles.length : 0;
                window.__3D_STATE__.totalEnergy = totalEnergy;
                window.__3D_STATE__.minSpeed = particles.length > 0 ? minSpeed : 0;
                window.__3D_STATE__.maxSpeed = particles.length > 0 ? maxSpeed : 0;
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
