<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Configurator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    #title {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 20;
      color: white;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: 0.5px;
      user-select: none;
    }

    #top-right {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: flex-end;
    }

    #btn-rotate {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.35);
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }

    #btn-rotate.active {
      background: rgba(255,255,255,0.22);
      border-color: white;
    }

    #info-panel {
      position: fixed;
      top: 72px;
      left: 20px;
      z-index: 20;
      color: white;
      display: flex;
      flex-direction: column;
      gap: 8px;
      user-select: none;
    }

    #price-display, #strap-label {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      min-width: 90px;
      text-align: left;
      backdrop-filter: blur(6px);
    }

    #button-row {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 16px;
      padding: 14px 18px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    .strap-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      box-sizing: border-box;
      transition: transform 0.2s ease, border-color 0.2s ease;
      outline: none;
    }

    .strap-btn:hover {
      transform: scale(1.08);
    }

    .strap-btn.active {
      border-color: white;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
    }

    #btn-leather { background: #8B4513; }
    #btn-metal   { background: #C0C0C0; }
    #btn-rubber  { background: #222222; }
    #btn-nato    { background: #556B2F; }
  </style>
</head>
<body>
  <div id="title">Watch Configurator</div>

  <div id="top-right">
    <button id="btn-rotate">Rotate</button>
  </div>

  <div id="info-panel">
    <div id="price-display">$149</div>
    <div id="strap-label">LEATHER</div>
  </div>

  <div id="button-row">
    <button class="strap-btn active" id="btn-leather" aria-label="Leather strap"></button>
    <button class="strap-btn" id="btn-metal" aria-label="Metal strap"></button>
    <button class="strap-btn" id="btn-rubber" aria-label="Rubber strap"></button>
    <button class="strap-btn" id="btn-nato" aria-label="NATO strap"></button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

    const STRAPS = [
      { name: 'leather', color: 0x8B4513, price: 149, metalness: 0.15, roughness: 0.8 },
      { name: 'metal',   color: 0xC0C0C0, price: 299, metalness: 0.9,  roughness: 0.25 },
      { name: 'rubber',  color: 0x222222, price: 99,  metalness: 0.05, roughness: 0.8 },
      { name: 'nato',    color: 0x556B2F, price: 129, metalness: 0.1,  roughness: 0.85 }
    ];

    const state = {
      currentStrap: 'leather',
      strapIndex: 0,
      price: 149,
      autoRotate: false,
      particlesEnabled: true,
      particlesActive: false,
      swapCount: 0,
      modelLoaded: false,
      cameraDistance: 0,
      watchRotationY: 0
    };

    window.__3D_STATE__ = state;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 3.5);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(3, 5, 3);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(1024, 1024);
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 20;
    scene.add(dirLight);

    const rimLight = new THREE.PointLight(0xffffff, 0.6, 20);
    rimLight.position.set(-2, 2, -1);
    scene.add(rimLight);

    const watchGroup = new THREE.Group();
    scene.add(watchGroup);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64),
      new THREE.MeshStandardMaterial({
        color: 0x2a2d3a,
        metalness: 0.75,
        roughness: 0.35
      })
    );
    platform.position.set(0, -0.8, 0);
    platform.receiveShadow = true;
    scene.add(platform);

    function createRoundedStrapGeometry(width = 0.32, height = 0.7, depth = 0.08, radius = 0.08, smoothness = 8) {
      const shape = new THREE.Shape();
      const x = -width / 2;
      const y = -height / 2;
      const w = width;
      const h = height;
      const r = Math.min(radius, width / 2, height / 2);

      shape.moveTo(x + r, y);
      shape.lineTo(x + w - r, y);
      shape.quadraticCurveTo(x + w, y, x + w, y + r);
      shape.lineTo(x + w, y + h - r);
      shape.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      shape.lineTo(x + r, y + h);
      shape.quadraticCurveTo(x, y + h, x, y + h - r);
      shape.lineTo(x, y + r);
      shape.quadraticCurveTo(x, y, x + r, y);

      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: depth,
        bevelEnabled: false,
        curveSegments: smoothness
      });

      geometry.center();
      geometry.rotateX(Math.PI / 2);
      return geometry;
    }

    function createStrapPair(config, initialOpacity = 1) {
      const group = new THREE.Group();
      const geometry = createRoundedStrapGeometry();

      const material = new THREE.MeshStandardMaterial({
        color: config.color,
        metalness: config.metalness,
        roughness: config.roughness,
        transparent: true,
        opacity: initialOpacity
      });

      const top = new THREE.Mesh(geometry, material.clone());
      const bottom = new THREE.Mesh(geometry, material.clone());

      top.position.set(0, 0.85, 0);
      bottom.position.set(0, -0.85, 0);
      bottom.rotation.z = Math.PI;

      [top, bottom].forEach(m => {
        m.castShadow = true;
        m.receiveShadow = true;
      });

      group.add(top, bottom);
      group.userData.materials = [top.material, bottom.material];
      group.userData.name = config.name;
      return group;
    }

    let currentStrapGroup = createStrapPair(STRAPS[0], 1);
    watchGroup.add(currentStrapGroup);

    const loader = new GLTFLoader();
    loader.load(
      'PrimaryIonDrive.glb',
      (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const radius = size.length() * 0.5 || 1;
        const scale = 1.5 / radius;

        model.position.sub(center);
        model.scale.setScalar(scale);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material.needsUpdate = true;
            }
          }
        });

        watchGroup.add(model);
        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load PrimaryIonDrive.glb:', err);
      }
    );

    const particleCount = 200;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleAlphas = new Float32Array(particleCount);
    const particleVelocities = Array.from({ length: particleCount }, () => new THREE.Vector3());
    const particleOriginMix = new Array(particleCount).fill(0);
    const particleBasePositions = Array.from({ length: particleCount }, () => new THREE.Vector3());

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

    const particleTexture = (() => {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(size/2, size/2, 2, size/2, size/2, size/2);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.25, 'rgba(255,255,255,0.9)');
      gradient.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      const tex = new THREE.CanvasTexture(canvas);
      tex.needsUpdate = true;
      return tex;
    })();

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.06,
      map: particleTexture,
      transparent: true,
      opacity: 0,
      depthWrite: false,
      vertexColors: true,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    particles.visible = false;
    watchGroup.add(particles);

    let particleStartTime = 0;
    const particleDuration = 1.5;

    function triggerParticleBurst(colorHex) {
      if (!state.particlesEnabled) return;

      const color = new THREE.Color(colorHex);
      const origins = [
        new THREE.Vector3(0, 0.4, 0),
        new THREE.Vector3(0, -0.4, 0)
      ];

      for (let i = 0; i < particleCount; i++) {
        const originIndex = i % 2;
        const origin = origins[originIndex];

        particleOriginMix[i] = originIndex;
        particleBasePositions[i].copy(origin);

        particlePositions[i * 3 + 0] = origin.x;
        particlePositions[i * 3 + 1] = origin.y;
        particlePositions[i * 3 + 2] = origin.z;

        particleColors[i * 3 + 0] = color.r;
        particleColors[i * 3 + 1] = color.g;
        particleColors[i * 3 + 2] = color.b;

        particleAlphas[i] = 1.0;

        const angle = Math.random() * Math.PI * 2;
        const spread = Math.random() * Math.PI;
        const speed = 0.4 + Math.random() * 1.2;

        particleVelocities[i].set(
          Math.cos(angle) * Math.sin(spread),
          (Math.random() - 0.5) * 1.5 + (originIndex === 0 ? 0.3 : -0.3),
          Math.sin(angle) * Math.sin(spread)
        ).normalize().multiplyScalar(speed);
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.color.needsUpdate = true;
      particleMaterial.opacity = 1;
      particles.visible = true;
      state.particlesActive = true;
      particleStartTime = performance.now() * 0.001;
    }

    const activeFades = [];

    function fadeOutAndRemove(group, duration = 0.5) {
      activeFades.push({
        type: 'out',
        group,
        materials: group.userData.materials || [],
        start: performance.now() * 0.001,
        duration
      });
    }

    function fadeIn(group, duration = 0.5) {
      activeFades.push({
        type: 'in',
        group,
        materials: group.userData.materials || [],
        start: performance.now() * 0.001,
        duration
      });
    }

    function updateFades(now) {
      for (let i = activeFades.length - 1; i >= 0; i--) {
        const f = activeFades[i];
        const t = Math.min((now - f.start) / f.duration, 1);

        if (f.type === 'out') {
          const opacity = 1 - t;
          f.materials.forEach(m => m.opacity = opacity);
          if (t >= 1) {
            if (f.group.parent) f.group.parent.remove(f.group);
            f.group.traverse(obj => {
              if (obj.geometry) obj.geometry.dispose?.();
              if (obj.material) obj.material.dispose?.();
            });
            activeFades.splice(i, 1);
          }
        } else {
          const opacity = t;
          f.materials.forEach(m => m.opacity = opacity);
          if (t >= 1) {
            activeFades.splice(i, 1);
          }
        }
      }
    }

    const priceDisplay = document.getElementById('price-display');
    const strapLabel = document.getElementById('strap-label');
    const rotateBtn = document.getElementById('btn-rotate');

    const buttons = {
      leather: document.getElementById('btn-leather'),
      metal: document.getElementById('btn-metal'),
      rubber: document.getElementById('btn-rubber'),
      nato: document.getElementById('btn-nato')
    };

    function updateUI() {
      const cfg = STRAPS[state.strapIndex];
      priceDisplay.textContent = `$${cfg.price}`;
      strapLabel.textContent = cfg.name.toUpperCase();

      Object.values(buttons).forEach(btn => btn.classList.remove('active'));
      buttons[cfg.name].classList.add('active');

      rotateBtn.classList.toggle('active', state.autoRotate);
      rotateBtn.textContent = state.autoRotate ? 'Rotate: ON' : 'Rotate';
    }

    function selectStrap(index) {
      if (index < 0 || index >= STRAPS.length) return;
      if (index === state.strapIndex) return;

      const oldGroup = currentStrapGroup;
      const newConfig = STRAPS[index];
      const newGroup = createStrapPair(newConfig, 0);
      watchGroup.add(newGroup);

      fadeOutAndRemove(oldGroup, 0.5);
      fadeIn(newGroup, 0.5);

      currentStrapGroup = newGroup;
      state.strapIndex = index;
      state.currentStrap = newConfig.name;
      state.price = newConfig.price;
      state.swapCount += 1;

      triggerParticleBurst(newConfig.color);
      updateUI();
    }

    function toggleAutoRotate() {
      state.autoRotate = !state.autoRotate;
      updateUI();
    }

    buttons.leather.addEventListener('click', () => selectStrap(0));
    buttons.metal.addEventListener('click', () => selectStrap(1));
    buttons.rubber.addEventListener('click', () => selectStrap(2));
    buttons.nato.addEventListener('click', () => selectStrap(3));
    rotateBtn.addEventListener('click', toggleAutoRotate);

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();
      if (key === '1') selectStrap(0);
      if (key === '2') selectStrap(1);
      if (key === '3') selectStrap(2);
      if (key === '4') selectStrap(3);
      if (key === 'r') toggleAutoRotate();
      if (key === 'p') {
        state.particlesEnabled = !state.particlesEnabled;
        if (!state.particlesEnabled) {
          particles.visible = false;
          state.particlesActive = false;
        }
      }
    });

    updateUI();

    const clock = new THREE.Clock();

    function updateParticles(now, delta) {
      if (!state.particlesActive) return;

      const elapsed = now - particleStartTime;
      const life = Math.min(elapsed / particleDuration, 1);
      const fade = 1 - life;

      for (let i = 0; i < particleCount; i++) {
        const base = particleBasePositions[i];
        const vel = particleVelocities[i];

        particlePositions[i * 3 + 0] = base.x + vel.x * elapsed;
        particlePositions[i * 3 + 1] = base.y + vel.y * elapsed - 0.2 * elapsed * elapsed;
        particlePositions[i * 3 + 2] = base.z + vel.z * elapsed;

        particleAlphas[i] = fade;
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleMaterial.opacity = fade;

      if (life >= 1) {
        state.particlesActive = false;
        particles.visible = false;
        particleMaterial.opacity = 0;
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now() * 0.001;
      const delta = clock.getDelta();

      controls.update();

      if (state.autoRotate) {
        watchGroup.rotation.y += 0.01;
      }

      updateFades(now);
      updateParticles(now, delta);

      state.cameraDistance = camera.position.length();
      state.watchRotationY = watchGroup.rotation.y;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
