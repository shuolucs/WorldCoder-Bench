<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Configurator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #btn-rotate {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        #btn-rotate:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #ui-bottom {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        #strap-label {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #price-display {
            font-size: 22px;
            color: #a8b2d1;
            margin-bottom: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .btn-row {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }
        .strap-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .strap-btn:hover {
            transform: scale(1.1);
        }
        .strap-btn.active {
            border-color: #ffffff;
            transform: scale(1.1);
        }
        #btn-leather { background-color: #8B4513; }
        #btn-metal { background-color: #C0C0C0; }
        #btn-rubber { background-color: #222222; }
        #btn-nato { background-color: #556B2F; }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            color: rgba(255,255,255,0.7);
            z-index: 5;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="title">Watch Configurator</div>
    <button id="btn-rotate">Toggle Rotation (R)</button>
    
    <div id="loading">Loading Model...</div>

    <div id="ui-bottom">
        <div id="strap-label">LEATHER</div>
        <div id="price-display">$149</div>
        <div class="btn-row">
            <div id="btn-leather" class="strap-btn active" title="Leather (1)"></div>
            <div id="btn-metal" class="strap-btn" title="Metal (2)"></div>
            <div id="btn-rubber" class="strap-btn" title="Rubber (3)"></div>
            <div id="btn-nato" class="strap-btn" title="NATO (4)"></div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            currentStrap: 'leather',
            strapIndex: 0,
            price: 149,
            autoRotate: false,
            particlesEnabled: true,
            particlesActive: false,
            swapCount: 0,
            modelLoaded: false,
            cameraDistance: 3.5,
            watchRotationY: 0
        };

        const strapConfig = [
            { id: 'leather', name: 'LEATHER', color: 0x8B4513, price: 149, mat: { roughness: 0.9, metalness: 0.1 } },
            { id: 'metal', name: 'METAL', color: 0xC0C0C0, price: 299, mat: { roughness: 0.2, metalness: 0.9 } },
            { id: 'rubber', name: 'RUBBER', color: 0x222222, price: 99, mat: { roughness: 0.8, metalness: 0.0 } },
            { id: 'nato', name: 'NATO', color: 0x556B2F, price: 129, mat: { roughness: 1.0, metalness: 0.0 } }
        ];

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(3, 5, 3);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 15;
        dirLight.shadow.camera.left = -2;
        dirLight.shadow.camera.right = 2;
        dirLight.shadow.camera.top = 2;
        dirLight.shadow.camera.bottom = -2;
        scene.add(dirLight);

        const rimLight = new THREE.PointLight(0xffffff, 0.6);
        rimLight.position.set(-2, 2, -1);
        scene.add(rimLight);

        // --- PLATFORM ---
        const platformGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x111111, 
            roughness: 0.4, 
            metalness: 0.8 
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.8;
        platform.receiveShadow = true;
        scene.add(platform);

        // --- WATCH GROUP ---
        const watchGroup = new THREE.Group();
        scene.add(watchGroup);

        // --- MODEL LOADING ---
        const loader = new GLTFLoader();
        // Using a try-catch pattern for the loader to handle missing files gracefully in this standalone context
        loader.load(
            'PrimaryIonDrive.glb',
            (gltf) => {
                const model = gltf.scene;
                
                // Center and scale
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 1.5 / maxDim;
                
                model.position.sub(center); // Center
                
                const wrapper = new THREE.Group();
                wrapper.add(model);
                wrapper.scale.setScalar(scale);
                
                // Enable shadows
                wrapper.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                watchGroup.add(wrapper);
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.opacity = '0';
            },
            undefined,
            (error) => {
                console.warn("Could not load 'PrimaryIonDrive.glb'. Using a placeholder cylinder for the watch body.", error);
                // Fallback placeholder if model isn't found
                const placeholderGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3, 32);
                const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 });
                const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
                placeholder.rotation.x = Math.PI / 2;
                placeholder.castShadow = true;
                watchGroup.add(placeholder);
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.opacity = '0';
            }
        );

        // --- STRAP SYSTEM ---
        let activeStrapGroup = null;
        let fadingStrapGroup = null;
        let fadeTimer = 0;
        const FADE_DURATION = 0.5;

        function createStrapGeometry() {
            // Elongated rounded box approximation
            const geo = new THREE.BoxGeometry(0.36, 0.7, 0.06, 4, 4, 2);
            // Slight curve
            const pos = geo.attributes.position;
            for(let i=0; i<pos.count; i++) {
                const y = pos.getY(i);
                const z = pos.getZ(i);
                // Curve ends downwards slightly
                pos.setZ(i, z + Math.pow(Math.abs(y), 2) * 0.1);
            }
            geo.computeVertexNormals();
            return geo;
        }

        const strapGeometry = createStrapGeometry();

        function createStrapGroup(config) {
            const group = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({
                color: config.color,
                roughness: config.mat.roughness,
                metalness: config.mat.metalness,
                transparent: true,
                opacity: 1
            });

            const topStrap = new THREE.Mesh(strapGeometry, mat);
            topStrap.position.set(0, 0.55, 0);
            topStrap.castShadow = true;
            topStrap.receiveShadow = true;

            const bottomStrap = new THREE.Mesh(strapGeometry, mat);
            bottomStrap.position.set(0, -0.55, 0);
            bottomStrap.rotation.z = Math.PI; // Flip
            bottomStrap.castShadow = true;
            bottomStrap.receiveShadow = true;

            group.add(topStrap);
            group.add(bottomStrap);
            return group;
        }

        // Initialize default strap
        activeStrapGroup = createStrapGroup(strapConfig[0]);
        watchGroup.add(activeStrapGroup);

        // --- PARTICLE SYSTEM ---
        const PARTICLE_COUNT = 200;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(PARTICLE_COUNT * 3);
        const particleVel = [];

        for(let i=0; i<PARTICLE_COUNT; i++) {
            particleVel.push(new THREE.Vector3());
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({
            size: 0.04,
            transparent: true,
            opacity: 0,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particleGeo, particleMat);
        watchGroup.add(particleSystem); // Add to watchGroup so it rotates with it
        let particleAge = 0;

        function triggerParticles(colorHex) {
            if (!window.__3D_STATE__.particlesEnabled) return;
            
            particleMat.color.setHex(colorHex);
            particleMat.opacity = 1;
            particleAge = 0;
            window.__3D_STATE__.particlesActive = true;
            
            const positions = particleSystem.geometry.attributes.position.array;
            
            for(let i=0; i<PARTICLE_COUNT; i++) {
                const isTop = i < PARTICLE_COUNT / 2;
                const baseY = isTop ? 0.4 : -0.4;
                
                // Spawn near attachment points
                positions[i*3] = (Math.random() - 0.5) * 0.3;
                positions[i*3+1] = baseY + (Math.random() - 0.5) * 0.1;
                positions[i*3+2] = (Math.random() - 0.5) * 0.1;
                
                // Burst outward
                particleVel[i].set(
                    (Math.random() - 0.5) * 2,
                    (isTop ? 1 : -1) * Math.random() + (Math.random() - 0.5),
                    (Math.random() - 0.5) * 2
                ).normalize().multiplyScalar(Math.random() * 0.03 + 0.01);
            }
            particleSystem.geometry.attributes.position.needsUpdate = true;
        }

        // --- INTERACTION LOGIC ---
        function setStrap(index) {
            if (index === window.__3D_STATE__.strapIndex && window.__3D_STATE__.swapCount > 0) return;

            const config = strapConfig[index];
            
            // Update State
            window.__3D_STATE__.swapCount++;
            window.__3D_STATE__.strapIndex = index;
            window.__3D_STATE__.currentStrap = config.id;
            window.__3D_STATE__.price = config.price;

            // Update UI
            document.getElementById('strap-label').innerText = config.name;
            document.getElementById('price-display').innerText = '$' + config.price;
            
            const btns = ['btn-leather', 'btn-metal', 'btn-rubber', 'btn-nato'];
            btns.forEach((id, i) => {
                document.getElementById(id).classList.toggle('active', i === index);
            });

            // Handle 3D Transition
            if (activeStrapGroup) {
                if (fadingStrapGroup) {
                    watchGroup.remove(fadingStrapGroup);
                    fadingStrapGroup.children.forEach(c => {
                        c.geometry.dispose();
                        c.material.dispose();
                    });
                }
                fadingStrapGroup = activeStrapGroup;
            }

            activeStrapGroup = createStrapGroup(config);
            activeStrapGroup.children.forEach(c => c.material.opacity = 0);
            watchGroup.add(activeStrapGroup);
            
            fadeTimer = 0;
            triggerParticles(config.color);
        }

        // UI Event Listeners
        document.getElementById('btn-leather').addEventListener('click', () => setStrap(0));
        document.getElementById('btn-metal').addEventListener('click', () => setStrap(1));
        document.getElementById('btn-rubber').addEventListener('click', () => setStrap(2));
        document.getElementById('btn-nato').addEventListener('click', () => setStrap(3));

        document.getElementById('btn-rotate').addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
        });

        // Keyboard Event Listeners
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': setStrap(0); break;
                case '2': setStrap(1); break;
                case '3': setStrap(2); break;
                case '4': setStrap(3); break;
                case 'r': 
                    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate; 
                    break;
                case 'p': 
                    window.__3D_STATE__.particlesEnabled = !window.__3D_STATE__.particlesEnabled; 
                    break;
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            controls.update();

            // Auto Rotation
            if (window.__3D_STATE__.autoRotate) {
                watchGroup.rotation.y += 0.01;
            }

            // Strap Fading
            if (activeStrapGroup && activeStrapGroup.children[0].material.opacity < 1) {
                fadeTimer += delta;
                const progress = Math.min(fadeTimer / FADE_DURATION, 1);
                
                activeStrapGroup.children.forEach(c => c.material.opacity = progress);
                
                if (fadingStrapGroup) {
                    fadingStrapGroup.children.forEach(c => c.material.opacity = 1 - progress);
                    if (progress === 1) {
                        watchGroup.remove(fadingStrapGroup);
                        fadingStrapGroup.children.forEach(c => {
                            c.geometry.dispose();
                            c.material.dispose();
                        });
                        fadingStrapGroup = null;
                    }
                }
            }

            // Particles
            if (window.__3D_STATE__.particlesActive) {
                particleAge += delta;
                if (particleAge > 1.5) {
                    window.__3D_STATE__.particlesActive = false;
                    particleMat.opacity = 0;
                } else {
                    // Fade out
                    particleMat.opacity = 1 - (particleAge / 1.5);
                    
                    // Move
                    const positions = particleSystem.geometry.attributes.position.array;
                    for(let i=0; i<PARTICLE_COUNT; i++) {
                        positions[i*3] += particleVel[i].x;
                        positions[i*3+1] += particleVel[i].y;
                        positions[i*3+2] += particleVel[i].z;
                        
                        // Add slight gravity
                        particleVel[i].y -= 0.001;
                    }
                    particleSystem.geometry.attributes.position.needsUpdate = true;
                }
            }

            // Update State
            window.__3D_STATE__.cameraDistance = camera.position.length();
            window.__3D_STATE__.watchRotationY = watchGroup.rotation.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
