<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watch Configurator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #title {
    position: fixed;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    z-index: 100;
    letter-spacing: 2px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  #btn-rotate {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 14px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
  }
  #btn-rotate:hover { background: rgba(255,255,255,0.2); }
  #btn-rotate.active { background: rgba(255,255,255,0.3); border-color: white; }

  #price-display {
    position: fixed;
    top: 70px;
    right: 20px;
    z-index: 100;
    color: #00ff88;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(0,255,136,0.3);
  }

  #strap-label {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    color: white;
    font-size: 18px;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  #strap-buttons {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  .strap-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .strap-btn:hover { transform: scale(1.2); }
  .strap-btn.active { border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.4); }

  .strap-btn::after {
    content: attr(data-label);
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 10px;
    white-space: nowrap;
    letter-spacing: 1px;
  }

  #btn-leather { background: #8B4513; }
  #btn-metal { background: #C0C0C0; }
  #btn-rubber { background: #222222; border-color: rgba(255,255,255,0.2); }
  #btn-rubber.active { border-color: white; }
  #btn-nato { background: #556B2F; }

  #loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 16px;
    z-index: 200;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="title">Watch Configurator</div>
<button id="btn-rotate">Rotate</button>
<div id="price-display">$149</div>
<div id="strap-label">LEATHER</div>
<div id="loading">Loading model...</div>

<div id="strap-buttons">
  <div class="strap-btn active" id="btn-leather" data-label="Leather" onclick="selectStrap(0)"></div>
  <div class="strap-btn" id="btn-metal" data-label="Metal" onclick="selectStrap(1)"></div>
  <div class="strap-btn" id="btn-rubber" data-label="Rubber" onclick="selectStrap(2)"></div>
  <div class="strap-btn" id="btn-nato" data-label="NATO" onclick="selectStrap(3)"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  currentStrap: 'leather',
  strapIndex: 0,
  price: 149,
  autoRotate: false,
  particlesEnabled: true,
  particlesActive: false,
  swapCount: 0,
  modelLoaded: false,
  cameraDistance: 3.5,
  watchRotationY: 0
};

const strapData = [
  { name: 'leather', color: 0x8B4513, price: 149, metalness: 0.2, roughness: 0.7 },
  { name: 'metal', color: 0xC0C0C0, price: 299, metalness: 0.9, roughness: 0.2 },
  { name: 'rubber', color: 0x222222, price: 99, metalness: 0.1, roughness: 0.8 },
  { name: 'nato', color: 0x556B2F, price: 129, metalness: 0.1, roughness: 0.6 }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3.5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(3, 5, 3);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x8888ff, 0.6, 10);
pointLight.position.set(-2, 2, -1);
scene.add(pointLight);

// Platform
const platformGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  metalness: 0.8,
  roughness: 0.3
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = -0.6;
platform.receiveShadow = true;
scene.add(platform);

// Watch group
const watchGroup = new THREE.Group();
scene.add(watchGroup);

// Load GLB model
const loader = new GLTFLoader();
loader.load(
  'PrimaryIonDrive.glb',
  (gltf) => {
    const model = gltf.scene;

    // Calculate bounding sphere and scale
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.5 / maxDim;

    model.scale.setScalar(scale);
    model.position.sub(center.multiplyScalar(scale));

    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });

    watchGroup.add(model);
    window.__3D_STATE__.modelLoaded = true;
    document.getElementById('loading').style.display = 'none';
  },
  (progress) => {
    const pct = progress.total ? Math.round((progress.loaded / progress.total) * 100) : '...';
    document.getElementById('loading').textContent = `Loading model... ${pct}%`;
  },
  (error) => {
    console.error('Error loading model:', error);
    document.getElementById('loading').textContent = 'Model load failed - showing placeholder';

    // Create placeholder watch body
    const watchBodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.15, 32);
    const watchBodyMat = new THREE.MeshStandardMaterial({
      color: 0x333344,
      metalness: 0.8,
      roughness: 0.2
    });
    const watchBody = new THREE.Mesh(watchBodyGeo, watchBodyMat);
    watchBody.castShadow = true;
    watchBody.rotation.x = Math.PI / 2;
    watchGroup.add(watchBody);

    // Watch face
    const faceGeo = new THREE.CylinderGeometry(0.38, 0.38, 0.01, 32);
    const faceMat = new THREE.MeshStandardMaterial({
      color: 0x111122,
      metalness: 0.5,
      roughness: 0.3
    });
    const face = new THREE.Mesh(faceGeo, faceMat);
    face.rotation.x = Math.PI / 2;
    face.position.z = 0.08;
    watchGroup.add(face);

    window.__3D_STATE__.modelLoaded = true;
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
    }, 2000);
  }
);

// Strap creation
let currentStrapGroup = null;

function createStrap(index) {
  const data = strapData[index];
  const group = new THREE.Group();

  const strapWidth = 0.18;
  const strapLength = 0.55;
  const strapThickness = 0.04;

  const material = new THREE.MeshStandardMaterial({
    color: data.color,
    metalness: data.metalness,
    roughness: data.roughness,
    transparent: true,
    opacity: 1
  });

  // Top strap
  const topGeo = new THREE.BoxGeometry(strapWidth, strapLength, strapThickness);
  // Round the edges slightly by using a slightly modified geometry
  const topStrap = new THREE.Mesh(topGeo, material.clone());
  topStrap.position.set(0, 0.4 + strapLength / 2, 0);
  topStrap.castShadow = true;
  group.add(topStrap);

  // Top strap end (rounded)
  const topCapGeo = new THREE.CylinderGeometry(strapWidth / 2, strapWidth / 2, strapThickness, 16);
  const topCap = new THREE.Mesh(topCapGeo, material.clone());
  topCap.rotation.x = Math.PI / 2;
  topCap.position.set(0, 0.4 + strapLength, 0);
  topCap.castShadow = true;
  group.add(topCap);

  // Bottom strap
  const bottomStrap = new THREE.Mesh(topGeo.clone(), material.clone());
  bottomStrap.position.set(0, -0.4 - strapLength / 2, 0);
  bottomStrap.castShadow = true;
  group.add(bottomStrap);

  // Bottom strap end (rounded)
  const bottomCap = new THREE.Mesh(topCapGeo.clone(), material.clone());
  bottomCap.rotation.x = Math.PI / 2;
  bottomCap.position.set(0, -0.4 - strapLength, 0);
  bottomCap.castShadow = true;
  group.add(bottomCap);

  // Add buckle detail for leather/nato
  if (index === 0 || index === 3) {
    const buckleGeo = new THREE.BoxGeometry(strapWidth + 0.04, 0.06, strapThickness + 0.02);
    const buckleMat = new THREE.MeshStandardMaterial({
      color: 0x888888,
      metalness: 0.9,
      roughness: 0.2
    });
    const buckle = new THREE.Mesh(buckleGeo, buckleMat);
    buckle.position.set(0, -0.5, 0);
    buckle.castShadow = true;
    group.add(buckle);
  }

  // Add link details for metal strap
  if (index === 1) {
    for (let i = 0; i < 4; i++) {
      const linkGeo = new THREE.BoxGeometry(strapWidth + 0.01, 0.005, strapThickness + 0.01);
      const linkMat = new THREE.MeshStandardMaterial({
        color: 0x999999,
        metalness: 0.95,
        roughness: 0.1
      });
      const linkTop = new THREE.Mesh(linkGeo, linkMat);
      linkTop.position.set(0, 0.45 + i * 0.12, 0);
      group.add(linkTop);

      const linkBottom = new THREE.Mesh(linkGeo.clone(), linkMat.clone());
      linkBottom.position.set(0, -0.45 - i * 0.12, 0);
      group.add(linkBottom);
    }
  }

  return group;
}

// Initialize default strap
currentStrapGroup = createStrap(0);
watchGroup.add(currentStrapGroup);

// Particle system
const PARTICLE_COUNT = 200;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleVelocities = new Float32Array(PARTICLE_COUNT * 3);
const particleAlphas = new Float32Array(PARTICLE_COUNT);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);

particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleTexture = createParticleTexture();

const particleMaterial = new THREE.PointsMaterial({
  size: 0.04,
  map: particleTexture,
  transparent: true,
  opacity: 0,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
particleSystem.visible = false;
scene.add(particleSystem);

let particleLife = 0;
const PARTICLE_DURATION = 1.5;

function createParticleTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 32;
  canvas.height = 32;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 32, 32);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

function spawnParticles(color) {
  const col = new THREE.Color(color);
  const spawnPoints = [
    new THREE.Vector3(0, 0.4, 0),
    new THREE.Vector3(0, -0.4, 0)
  ];

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const spawnPoint = spawnPoints[i < PARTICLE_COUNT / 2 ? 0 : 1];

    particlePositions[i * 3] = spawnPoint.x + (Math.random() - 0.5) * 0.1;
    particlePositions[i * 3 + 1] = spawnPoint.y + (Math.random() - 0.5) * 0.1;
    particlePositions[i * 3 + 2] = spawnPoint.z + (Math.random() - 0.5) * 0.1;

    const speed = 0.5 + Math.random() * 1.5;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.random() * Math.PI;

    particleVelocities[i * 3] = Math.sin(phi) * Math.cos(theta) * speed;
    particleVelocities[i * 3 + 1] = Math.sin(phi) * Math.sin(theta) * speed * 0.5 + (i < PARTICLE_COUNT / 2 ? 0.5 : -0.5);
    particleVelocities[i * 3 + 2] = Math.cos(phi) * speed;

    particleAlphas[i] = 1.0;

    particleColors[i * 3] = col.r;
    particleColors[i * 3 + 1] = col.g;
    particleColors[i * 3 + 2] = col.b;
  }

  particleGeometry.attributes.position.needsUpdate = true;
  particleGeometry.attributes.color.needsUpdate = true;

  particleSystem.visible = true;
  particleMaterial.opacity = 1;
  particleLife = 0;
  window.__3D_STATE__.particlesActive = true;
}

function updateParticles(delta) {
  if (!window.__3D_STATE__.particlesActive) return;

  particleLife += delta;
  const progress = particleLife / PARTICLE_DURATION;

  if (progress >= 1) {
    particleSystem.visible = false;
    window.__3D_STATE__.particlesActive = false;
    return;
  }

  const fade = 1 - progress;
  particleMaterial.opacity = fade;

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particlePositions[i * 3] += particleVelocities[i * 3] * delta;
    particlePositions[i * 3 + 1] += particleVelocities[i * 3 + 1] * delta;
    particlePositions[i * 3 + 2] += particleVelocities[i * 3 + 2] * delta;

    // Gravity
    particleVelocities[i * 3 + 1] -= 1.5 * delta;

    // Damping
    particleVelocities[i * 3] *= 0.98;
    particleVelocities[i * 3 + 1] *= 0.98;
    particleVelocities[i * 3 + 2] *= 0.98;
  }

  particleGeometry.attributes.position.needsUpdate = true;
}

// Strap swap animation
let swapAnimation = null;

function selectStrap(index) {
  const state = window.__3D_STATE__;
  if (index === state.strapIndex) return;

  const data = strapData[index];

  // Update state
  state.strapIndex = index;
  state.currentStrap = data.name;
  state.price = data.price;
  state.swapCount++;

  // Update UI
  document.getElementById('price-display').textContent = `$${data.price}`;
  document.getElementById('strap-label').textContent = data.name.toUpperCase();

  document.querySelectorAll('.strap-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(`btn-${data.name}`).classList.add('active');

  // Spawn particles
  if (state.particlesEnabled) {
    spawnParticles(data.color);
  }

  // Animate strap swap
  const oldStrap = currentStrapGroup;
  const newStrap = createStrap(index);

  // Set new strap initially transparent
  newStrap.traverse((child) => {
    if (child.isMesh && child.material) {
      child.material.transparent = true;
      child.material.opacity = 0;
    }
  });

  watchGroup.add(newStrap);
  currentStrapGroup = newStrap;

  // Animate
  const duration = 500; // ms
  const startTime = performance.now();

  if (swapAnimation) cancelAnimationFrame(swapAnimation.id);

  function animateSwap() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(elapsed / duration, 1);
    const eased = t * (2 - t); // ease out quad

    // Fade out old
    if (oldStrap) {
      oldStrap.traverse((child) => {
        if (child.isMesh && child.material) {
          child.material.transparent = true;
          child.material.opacity = 1 - eased;
        }
      });
    }

    // Fade in new
    newStrap.traverse((child) => {
      if (child.isMesh && child.material) {
        child.material.opacity = eased;
      }
    });

    if (t < 1) {
      swapAnimation = { id: requestAnimationFrame(animateSwap) };
    } else {
      // Remove old strap
      if (oldStrap) {
        watchGroup.remove(oldStrap);
        oldStrap.traverse((child) => {
          if (child.isMesh) {
            child.geometry.dispose();
            child.material.dispose();
          }
        });
      }
      swapAnimation = null;
    }
  }

  swapAnimation = { id: requestAnimationFrame(animateSwap) };
}

// Make selectStrap global
window.selectStrap = selectStrap;

// Keyboard controls
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === '1') selectStrap(0);
  else if (key === '2') selectStrap(1);
  else if (key === '3') selectStrap(2);
  else if (key === '4') selectStrap(3);
  else if (key === 'r') {
    window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
    const btn = document.getElementById('btn-rotate');
    btn.classList.toggle('active', window.__3D_STATE__.autoRotate);
  }
  else if (key === 'p') {
    window.__3D_STATE__.particlesEnabled = !window.__3D_STATE__.particlesEnabled;
  }
});

// Rotate button
document.getElementById('btn-rotate').addEventListener('click', () => {
  window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
  document.getElementById('btn-rotate').classList.toggle('active', window.__3D_STATE__.autoRotate);
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const state = window.__3D_STATE__;

  // Auto rotation
  if (state.autoRotate) {
    watchGroup.rotation.y += 0.01;
  }

  // Update particles
  updateParticles(delta);

  // Update state
  state.cameraDistance = camera.position.length();
  state.watchRotationY = watchGroup.rotation.y;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
