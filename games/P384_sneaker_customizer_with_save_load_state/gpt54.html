<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sneaker/Product Customizer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f0f0f0;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #customizer-panel {
      position: absolute;
      left: 0;
      top: 0;
      width: 280px;
      height: 100%;
      box-sizing: border-box;
      padding: 16px;
      background: rgba(255, 255, 255, 0.95);
      border-right: 1px solid #ddd;
      z-index: 10;
      overflow-y: auto;
    }

    #canvas-container {
      position: absolute;
      left: 280px;
      top: 0;
      right: 0;
      bottom: 0;
    }

    h2, h3 {
      margin: 0 0 10px;
    }

    .section {
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid #e5e5e5;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      padding: 8px 12px;
      border: 2px solid #bbb;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #f7f7f7;
    }

    button.active {
      border-color: #ff8800;
      box-shadow: 0 0 0 2px rgba(255,136,0,0.15);
    }

    .swatches {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .color-swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 2px solid #999;
      cursor: pointer;
      box-sizing: border-box;
    }

    .color-swatch.active {
      border: 3px solid #ff8800;
      transform: scale(1.08);
    }

    #scale-slider {
      width: 100%;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    #status-text {
      margin-top: 10px;
      min-height: 20px;
      color: #0a7a2f;
      font-weight: bold;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="customizer-panel">
      <h2>Product Customizer</h2>

      <div class="section">
        <h3>Select Part</h3>
        <div class="button-row">
          <button id="btn-partA" class="active">Part A</button>
          <button id="btn-partB">Part B</button>
          <button id="btn-partC">Part C</button>
        </div>
      </div>

      <div class="section">
        <h3>Color</h3>
        <div class="swatches">
          <div id="swatch-red" class="color-swatch" data-color="16711680" style="background:#ff0000;"></div>
          <div id="swatch-blue" class="color-swatch" data-color="255" style="background:#0000ff;"></div>
          <div id="swatch-green" class="color-swatch" data-color="65280" style="background:#00ff00;"></div>
          <div id="swatch-yellow" class="color-swatch" data-color="16776960" style="background:#ffff00;"></div>
          <div id="swatch-purple" class="color-swatch" data-color="8388736" style="background:#800080;"></div>
          <div id="swatch-white" class="color-swatch" data-color="16777215" style="background:#ffffff;"></div>
        </div>
      </div>

      <div class="section">
        <h3>Material Type</h3>
        <div class="button-row">
          <button id="btn-mat-standard" class="active">Standard</button>
          <button id="btn-mat-metallic">Metallic</button>
          <button id="btn-mat-glossy">Glossy</button>
        </div>
      </div>

      <div class="section">
        <h3>Scale</h3>
        <input id="scale-slider" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
        <div>Value: <span id="scale-value">1.0</span></div>
      </div>

      <div class="section">
        <h3>Actions</h3>
        <div class="actions">
          <button id="btn-save">SAVE</button>
          <button id="btn-load">LOAD</button>
          <button id="btn-reset">RESET</button>
        </div>
        <div id="status-text"></div>
        <div class="hint">Press <strong>R</strong> to toggle auto-rotation.</div>
      </div>
    </div>

    <div id="canvas-container"></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const container = document.getElementById('canvas-container');
    const statusTextEl = document.getElementById('status-text');
    const scaleSlider = document.getElementById('scale-slider');
    const scaleValue = document.getElementById('scale-value');

    const partButtons = {
      partA: document.getElementById('btn-partA'),
      partB: document.getElementById('btn-partB'),
      partC: document.getElementById('btn-partC')
    };

    const materialButtons = {
      standard: document.getElementById('btn-mat-standard'),
      metallic: document.getElementById('btn-mat-metallic'),
      glossy: document.getElementById('btn-mat-glossy')
    };

    const swatches = Array.from(document.querySelectorAll('.color-swatch'));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f0f0);

    const camera = new THREE.PerspectiveCamera(
      45,
      Math.max(1, container.clientWidth) / Math.max(1, container.clientHeight),
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(Math.max(1, container.clientWidth), Math.max(1, container.clientHeight));
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 7);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 50;
    directionalLight.shadow.camera.left = -10;
    directionalLight.shadow.camera.right = 10;
    directionalLight.shadow.camera.top = 10;
    directionalLight.shadow.camera.bottom = -10;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.9, metalness: 0.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const modelRoot = new THREE.Group();
    scene.add(modelRoot);

    window.__3D_STATE__ = {
      modelLoaded: false,
      selectedPart: 'partA',
      partColors: { partA: 0xffffff, partB: 0xffffff, partC: 0xffffff },
      partMaterials: { partA: 'standard', partB: 'standard', partC: 'standard' },
      partScales: { partA: 1.0, partB: 1.0, partC: 1.0 },
      autoRotate: false,
      saveCount: 0,
      loadCount: 0,
      resetCount: 0,
      statusText: '',
      cameraDistance: 0,
      frameCount: 0
    };

    const customization = {
      model: null,
      parts: {
        partA: null,
        partB: null,
        partC: null
      },
      defaultColors: {
        partA: 0xffffff,
        partB: 0xffffff,
        partC: 0xffffff
      },
      defaultMaterialTypes: {
        partA: 'standard',
        partB: 'standard',
        partC: 'standard'
      },
      originalRelativeScales: {
        partA: new THREE.Vector3(1, 1, 1),
        partB: new THREE.Vector3(1, 1, 1),
        partC: new THREE.Vector3(1, 1, 1)
      }
    };

    const materialPresets = {
      standard: { roughness: 0.7, metalness: 0.1 },
      metallic: { roughness: 0.2, metalness: 0.9 },
      glossy: { roughness: 0.05, metalness: 0.3 }
    };

    function safeNumber(value, fallback = 0) {
      return Number.isFinite(value) ? value : fallback;
    }

    function setStatus(message) {
      window.__3D_STATE__.statusText = String(message || '');
      statusTextEl.textContent = window.__3D_STATE__.statusText;
      if (setStatus._timeout) clearTimeout(setStatus._timeout);
      if (message) {
        setStatus._timeout = setTimeout(() => {
          window.__3D_STATE__.statusText = '';
          statusTextEl.textContent = '';
        }, 2000);
      }
    }

    function getSelectedPartName() {
      return window.__3D_STATE__.selectedPart;
    }

    function getPartObject(partName) {
      return customization.parts[partName] || null;
    }

    function updatePartSelectionUI() {
      Object.entries(partButtons).forEach(([name, btn]) => {
        btn.classList.toggle('active', name === window.__3D_STATE__.selectedPart);
      });

      const selected = getSelectedPartName();
      const materialType = window.__3D_STATE__.partMaterials[selected];
      const scale = safeNumber(window.__3D_STATE__.partScales[selected], 1.0);
      const color = safeNumber(window.__3D_STATE__.partColors[selected], 0xffffff);

      Object.entries(materialButtons).forEach(([name, btn]) => {
        btn.classList.toggle('active', name === materialType);
      });

      scaleSlider.value = String(scale);
      scaleValue.textContent = scale.toFixed(1);

      swatches.forEach(swatch => {
        const swatchColor = parseInt(swatch.dataset.color, 10);
        swatch.classList.toggle('active', swatchColor === color);
      });
    }

    function cloneMaterialWithPreset(sourceMaterial, colorHex, presetName) {
      const preset = materialPresets[presetName] || materialPresets.standard;
      const mat = new THREE.MeshStandardMaterial({
        color: colorHex,
        roughness: preset.roughness,
        metalness: preset.metalness,
        map: sourceMaterial && sourceMaterial.map ? sourceMaterial.map : null,
        normalMap: sourceMaterial && sourceMaterial.normalMap ? sourceMaterial.normalMap : null,
        roughnessMap: sourceMaterial && sourceMaterial.roughnessMap ? sourceMaterial.roughnessMap : null,
        metalnessMap: sourceMaterial && sourceMaterial.metalnessMap ? sourceMaterial.metalnessMap : null,
        emissiveMap: sourceMaterial && sourceMaterial.emissiveMap ? sourceMaterial.emissiveMap : null,
        aoMap: sourceMaterial && sourceMaterial.aoMap ? sourceMaterial.aoMap : null,
        transparent: sourceMaterial ? !!sourceMaterial.transparent : false,
        opacity: sourceMaterial && Number.isFinite(sourceMaterial.opacity) ? sourceMaterial.opacity : 1,
        side: sourceMaterial && sourceMaterial.side !== undefined ? sourceMaterial.side : THREE.FrontSide
      });
      return mat;
    }

    function applyMaterialToMeshOrGroup(object3D, colorHex, materialType) {
      if (!object3D) return;

      object3D.traverse(child => {
        if (child.isMesh) {
          const currentMat = Array.isArray(child.material) ? child.material[0] : child.material;
          const newMat = cloneMaterialWithPreset(currentMat, colorHex, materialType);
          child.material = newMat;
          child.castShadow = true;
          child.receiveShadow = false;
        }
      });
    }

    function applyColor(partName, colorHex) {
      const part = getPartObject(partName);
      if (!part) return;
      const hex = safeNumber(colorHex, 0xffffff);
      window.__3D_STATE__.partColors[partName] = hex;
      applyMaterialToMeshOrGroup(part, hex, window.__3D_STATE__.partMaterials[partName]);
      if (partName === getSelectedPartName()) updatePartSelectionUI();
    }

    function applyMaterialType(partName, materialType) {
      const part = getPartObject(partName);
      if (!part) return;
      const validType = materialPresets[materialType] ? materialType : 'standard';
      window.__3D_STATE__.partMaterials[partName] = validType;
      applyMaterialToMeshOrGroup(part, window.__3D_STATE__.partColors[partName], validType);
      if (partName === getSelectedPartName()) updatePartSelectionUI();
    }

    function applyScale(partName, scaleFactor) {
      const part = getPartObject(partName);
      if (!part) return;
      const s = Math.min(2.0, Math.max(0.5, safeNumber(scaleFactor, 1.0)));
      window.__3D_STATE__.partScales[partName] = s;

      const baseScale = customization.originalRelativeScales[partName] || new THREE.Vector3(1, 1, 1);
      part.scale.set(
        safeNumber(baseScale.x * s, 1),
        safeNumber(baseScale.y * s, 1),
        safeNumber(baseScale.z * s, 1)
      );

      if (partName === getSelectedPartName()) {
        scaleSlider.value = String(s);
        scaleValue.textContent = s.toFixed(1);
      }
    }

    function selectPart(partName) {
      if (!customization.parts[partName]) {
        window.__3D_STATE__.selectedPart = partName;
        updatePartSelectionUI();
        return;
      }
      window.__3D_STATE__.selectedPart = partName;
      updatePartSelectionUI();
    }

    function saveConfig() {
      const payload = {
        partColors: window.__3D_STATE__.partColors,
        partMaterials: window.__3D_STATE__.partMaterials,
        partScales: window.__3D_STATE__.partScales,
        selectedPart: window.__3D_STATE__.selectedPart,
        autoRotate: window.__3D_STATE__.autoRotate
      };
      localStorage.setItem('sneaker_config', JSON.stringify(payload));
      window.__3D_STATE__.saveCount = safeNumber(window.__3D_STATE__.saveCount, 0) + 1;
      setStatus('Saved!');
    }

    function loadConfig() {
      const raw = localStorage.getItem('sneaker_config');
      if (!raw) {
        setStatus('Loaded!');
        window.__3D_STATE__.loadCount = safeNumber(window.__3D_STATE__.loadCount, 0) + 1;
        return;
      }

      try {
        const data = JSON.parse(raw);

        ['partA', 'partB', 'partC'].forEach(partName => {
          if (data.partColors && Number.isFinite(data.partColors[partName])) {
            window.__3D_STATE__.partColors[partName] = data.partColors[partName];
          }
          if (data.partMaterials && typeof data.partMaterials[partName] === 'string') {
            window.__3D_STATE__.partMaterials[partName] = data.partMaterials[partName];
          }
          if (data.partScales && Number.isFinite(data.partScales[partName])) {
            window.__3D_STATE__.partScales[partName] = data.partScales[partName];
          }
        });

        if (data.selectedPart && ['partA', 'partB', 'partC'].includes(data.selectedPart)) {
          window.__3D_STATE__.selectedPart = data.selectedPart;
        }
        window.__3D_STATE__.autoRotate = !!data.autoRotate;

        ['partA', 'partB', 'partC'].forEach(partName => {
          applyMaterialType(partName, window.__3D_STATE__.partMaterials[partName]);
          applyColor(partName, window.__3D_STATE__.partColors[partName]);
          applyScale(partName, window.__3D_STATE__.partScales[partName]);
        });

        updatePartSelectionUI();
      } catch (e) {
        console.error('Failed to load config:', e);
      }

      window.__3D_STATE__.loadCount = safeNumber(window.__3D_STATE__.loadCount, 0) + 1;
      setStatus('Loaded!');
    }

    function resetConfig() {
      ['partA', 'partB', 'partC'].forEach(partName => {
        window.__3D_STATE__.partColors[partName] = customization.defaultColors[partName];
        window.__3D_STATE__.partMaterials[partName] = customization.defaultMaterialTypes[partName];
        window.__3D_STATE__.partScales[partName] = 1.0;
      });

      window.__3D_STATE__.selectedPart = 'partA';

      ['partA', 'partB', 'partC'].forEach(partName => {
        applyMaterialType(partName, 'standard');
        applyColor(partName, customization.defaultColors[partName]);
        applyScale(partName, 1.0);
      });

      updatePartSelectionUI();
      window.__3D_STATE__.resetCount = safeNumber(window.__3D_STATE__.resetCount, 0) + 1;
      setStatus('Reset!');
    }

    partButtons.partA.addEventListener('click', () => selectPart('partA'));
    partButtons.partB.addEventListener('click', () => selectPart('partB'));
    partButtons.partC.addEventListener('click', () => selectPart('partC'));

    swatches.forEach(swatch => {
      swatch.addEventListener('click', () => {
        const color = parseInt(swatch.dataset.color, 10);
        applyColor(getSelectedPartName(), color);
        updatePartSelectionUI();
      });
    });

    materialButtons.standard.addEventListener('click', () => applyMaterialType(getSelectedPartName(), 'standard'));
    materialButtons.metallic.addEventListener('click', () => applyMaterialType(getSelectedPartName(), 'metallic'));
    materialButtons.glossy.addEventListener('click', () => applyMaterialType(getSelectedPartName(), 'glossy'));

    Object.values(materialButtons).forEach(btn => {
      btn.addEventListener('click', updatePartSelectionUI);
    });

    scaleSlider.addEventListener('input', (e) => {
      const value = parseFloat(e.target.value);
      applyScale(getSelectedPartName(), value);
      updatePartSelectionUI();
    });

    document.getElementById('btn-save').addEventListener('click', saveConfig);
    document.getElementById('btn-load').addEventListener('click', loadConfig);
    document.getElementById('btn-reset').addEventListener('click', resetConfig);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'r' || e.key === 'R') {
        window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      }
    });

    function fitModelToSize(object, targetSize = 2) {
      const box = new THREE.Box3().setFromObject(object);
      const size = new THREE.Vector3();
      box.getSize(size);

      const maxDim = Math.max(
        safeNumber(size.x, 1),
        safeNumber(size.y, 1),
        safeNumber(size.z, 1)
      );

      const scale = maxDim > 0 ? targetSize / maxDim : 1;
      object.scale.multiplyScalar(scale);

      const scaledBox = new THREE.Box3().setFromObject(object);
      const center = new THREE.Vector3();
      const min = new THREE.Vector3();
      scaledBox.getCenter(center);
      scaledBox.getMin(min);

      object.position.x -= center.x;
      object.position.z -= center.z;
      object.position.y -= min.y;
    }

    function assignCustomizableParts(root) {
      const meshList = [];
      root.traverse(child => {
        if (child.isMesh) {
          meshList.push(child);
          child.castShadow = true;
        }
      });

      if (meshList.length >= 3) {
        customization.parts.partA = meshList[0];
        customization.parts.partB = meshList[1];
        customization.parts.partC = meshList[2];
      } else {
        const groups = root.children.filter(c => c.type === 'Group' || c.isObject3D);
        customization.parts.partA = groups[0] || root;
        customization.parts.partB = groups[1] || root;
        customization.parts.partC = groups[2] || root;
      }

      ['partA', 'partB', 'partC'].forEach(partName => {
        const part = customization.parts[partName];
        let foundColor = 0xffffff;

        if (part) {
          const mesh = part.isMesh ? part : (() => {
            let firstMesh = null;
            part.traverse(c => {
              if (!firstMesh && c.isMesh) firstMesh = c;
            });
            return firstMesh;
          })();

          if (mesh && mesh.material) {
            const mat = Array.isArray(mesh.material) ? mesh.material[0] : mesh.material;
            if (mat && mat.color) {
              foundColor = mat.color.getHex();
            }
          }

          customization.defaultColors[partName] = foundColor;
          customization.originalRelativeScales[partName] = part.scale.clone();
          window.__3D_STATE__.partColors[partName] = foundColor;
          window.__3D_STATE__.partMaterials[partName] = 'standard';
          window.__3D_STATE__.partScales[partName] = 1.0;
        }
      });

      updatePartSelectionUI();
    }

    const loader = new GLTFLoader();
    loader.load(
      'robot.glb',
      (gltf) => {
        const model = gltf.scene;
        customization.model = model;
        modelRoot.add(model);

        fitModelToSize(model, 2);

        model.traverse(child => {
          if (child.isMesh) {
            child.castShadow = true;
          }
        });

        assignCustomizableParts(model);

        ['partA', 'partB', 'partC'].forEach(partName => {
          applyMaterialType(partName, 'standard');
          applyColor(partName, window.__3D_STATE__.partColors[partName]);
          applyScale(partName, 1.0);
        });

        window.__3D_STATE__.modelLoaded = true;
        updatePartSelectionUI();
      },
      undefined,
      (error) => {
        console.error('Failed to load robot.glb:', error);
        setStatus('Model load failed');
        window.__3D_STATE__.modelLoaded = false;
      }
    );

    function onResize() {
      const w = Math.max(1, container.clientWidth);
      const h = Math.max(1, container.clientHeight);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    window.addEventListener('resize', onResize);

    function animate() {
      requestAnimationFrame(animate);

      window.__3D_STATE__.frameCount = safeNumber(window.__3D_STATE__.frameCount, 0) + 1;

      if (window.__3D_STATE__.autoRotate && customization.model) {
        customization.model.rotation.y += 0.01;
        if (!Number.isFinite(customization.model.rotation.y)) {
          customization.model.rotation.y = 0;
        }
      }

      controls.update();

      window.__3D_STATE__.cameraDistance = safeNumber(camera.position.length(), 0);

      renderer.render(scene, camera);
    }

    updatePartSelectionUI();
    animate();
  </script>
</body>
</html>
