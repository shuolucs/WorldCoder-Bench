<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Product Customizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f0f0; }
  canvas { display: block; }

  #customizer-panel {
    position: absolute;
    left: 0;
    top: 0;
    width: 280px;
    height: 100vh;
    background: rgba(255,255,255,0.95);
    box-shadow: 2px 0 12px rgba(0,0,0,0.15);
    padding: 20px;
    overflow-y: auto;
    z-index: 10;
  }

  #customizer-panel h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: #333;
    border-bottom: 2px solid #333;
    padding-bottom: 8px;
  }

  .section-label {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #888;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .part-buttons, .material-buttons {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
  }

  .part-btn, .mat-btn {
    flex: 1;
    padding: 8px 4px;
    border: 2px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    text-align: center;
  }

  .part-btn:hover, .mat-btn:hover {
    border-color: #999;
  }

  .part-btn.active {
    border-color: #333;
    background: #333;
    color: #fff;
  }

  .mat-btn.active {
    border-color: #0066ff;
    background: #0066ff;
    color: #fff;
  }

  .color-swatches {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .color-swatch {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid #ddd;
    transition: all 0.2s;
  }

  .color-swatch:hover {
    transform: scale(1.15);
    border-color: #999;
  }

  .color-swatch.active {
    border-color: #333;
    box-shadow: 0 0 0 2px #333;
  }

  .slider-container {
    margin-bottom: 16px;
  }

  .slider-container label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  #scale-slider {
    width: 100%;
    -webkit-appearance: none;
    height: 6px;
    border-radius: 3px;
    background: #ddd;
    outline: none;
  }

  #scale-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
  }

  #scale-value {
    font-weight: 700;
    color: #333;
  }

  .action-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 20px;
  }

  .action-btn {
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  #btn-save {
    background: #28a745;
    color: #fff;
  }
  #btn-save:hover { background: #218838; }

  #btn-load {
    background: #007bff;
    color: #fff;
  }
  #btn-load:hover { background: #0056b3; }

  #btn-reset {
    background: #dc3545;
    color: #fff;
  }
  #btn-reset:hover { background: #c82333; }

  #status-text {
    display: block;
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #28a745;
    min-height: 20px;
    transition: opacity 0.3s;
  }

  .info-text {
    font-size: 11px;
    color: #aaa;
    margin-top: 16px;
    text-align: center;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="customizer-panel">
  <h2>🎨 Product Customizer</h2>

  <div class="section-label">Select Part</div>
  <div class="part-buttons">
    <button id="btn-partA" class="part-btn active" data-part="partA">Part A</button>
    <button id="btn-partB" class="part-btn" data-part="partB">Part B</button>
    <button id="btn-partC" class="part-btn" data-part="partC">Part C</button>
  </div>

  <div class="section-label">Color</div>
  <div class="color-swatches">
    <div id="swatch-red" class="color-swatch" data-color="0xff0000" style="background:#ff0000;"></div>
    <div id="swatch-blue" class="color-swatch" data-color="0x0000ff" style="background:#0000ff;"></div>
    <div id="swatch-green" class="color-swatch" data-color="0x00ff00" style="background:#00ff00;"></div>
    <div id="swatch-yellow" class="color-swatch" data-color="0xffff00" style="background:#ffff00;"></div>
    <div id="swatch-purple" class="color-swatch" data-color="0x800080" style="background:#800080;"></div>
    <div id="swatch-white" class="color-swatch" data-color="0xffffff" style="background:#ffffff;"></div>
  </div>

  <div class="section-label">Material</div>
  <div class="material-buttons">
    <button id="btn-mat-standard" class="mat-btn active" data-material="standard">Standard</button>
    <button id="btn-mat-metallic" class="mat-btn" data-material="metallic">Metallic</button>
    <button id="btn-mat-glossy" class="mat-btn" data-material="glossy">Glossy</button>
  </div>

  <div class="section-label">Scale</div>
  <div class="slider-container">
    <label>
      <span>Size</span>
      <span id="scale-value">1.0</span>
    </label>
    <input type="range" id="scale-slider" min="0.5" max="2.0" step="0.1" value="1.0">
  </div>

  <div class="action-buttons">
    <button id="btn-save" class="action-btn">💾 Save</button>
    <button id="btn-load" class="action-btn">📂 Load</button>
    <button id="btn-reset" class="action-btn">🔄 Reset</button>
  </div>

  <span id="status-text"></span>

  <div class="info-text">Press <strong>R</strong> to toggle auto-rotation<br>Drag to orbit • Scroll to zoom</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
  modelLoaded: false,
  selectedPart: 'partA',
  partColors: { partA: 0x888888, partB: 0x888888, partC: 0x888888 },
  partMaterials: { partA: 'standard', partB: 'standard', partC: 'standard' },
  partScales: { partA: 1.0, partB: 1.0, partC: 1.0 },
  autoRotate: false,
  saveCount: 0,
  loadCount: 0,
  resetCount: 0,
  statusText: '',
  cameraDistance: 5,
  frameCount: 0
};
window.__3D_STATE__ = state;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.8, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Ground plane
const groundGeom = new THREE.CircleGeometry(3, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Part references
const parts = { partA: null, partB: null, partC: null };
const originalColors = { partA: 0x888888, partB: 0x888888, partC: 0x888888 };
const originalScales = { partA: new THREE.Vector3(), partB: new THREE.Vector3(), partC: new THREE.Vector3() };
let modelGroup = null;

// Material factory
function createMaterial(type, color) {
  const c = new THREE.Color(color);
  switch(type) {
    case 'metallic':
      return new THREE.MeshStandardMaterial({ color: c, roughness: 0.2, metalness: 0.9 });
    case 'glossy':
      return new THREE.MeshStandardMaterial({ color: c, roughness: 0.05, metalness: 0.3 });
    case 'standard':
    default:
      return new THREE.MeshStandardMaterial({ color: c, roughness: 0.7, metalness: 0.1 });
  }
}

// Apply customization to a part
function applyPartCustomization(partKey) {
  const mesh = parts[partKey];
  if (!mesh) return;
  const color = state.partColors[partKey];
  const matType = state.partMaterials[partKey];
  const scale = state.partScales[partKey];

  mesh.material = createMaterial(matType, color);

  const orig = originalScales[partKey];
  mesh.scale.set(orig.x * scale, orig.y * scale, orig.z * scale);
}

// Load model
const loader = new GLTFLoader();
loader.load('robot.glb', (gltf) => {
  const model = gltf.scene;

  // Compute bounding box and scale to fit within 2 units
  const box = new THREE.Box3().setFromObject(model);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const scaleFactor = 2.0 / maxDim;
  model.scale.multiplyScalar(scaleFactor);

  // Recompute box after scaling
  const box2 = new THREE.Box3().setFromObject(model);
  const center = new THREE.Vector3();
  box2.getCenter(center);
  model.position.x -= center.x;
  model.position.z -= center.z;
  model.position.y -= box2.min.y; // sit on ground

  // Enable shadows
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Collect mesh children
  const meshes = [];
  model.traverse((child) => {
    if (child.isMesh) {
      meshes.push(child);
    }
  });

  // Assign at least 3 parts
  if (meshes.length >= 3) {
    // Distribute meshes into 3 groups
    const third = Math.floor(meshes.length / 3);
    // For simplicity, assign individual meshes or groups
    parts.partA = meshes[0];
    parts.partB = meshes[Math.min(third, meshes.length - 1)];
    parts.partC = meshes[Math.min(third * 2, meshes.length - 1)];

    // If any are the same, try to pick different ones
    if (parts.partB === parts.partA && meshes.length > 1) parts.partB = meshes[1];
    if (parts.partC === parts.partA && meshes.length > 2) parts.partC = meshes[2];
    if (parts.partC === parts.partB && meshes.length > 2) parts.partC = meshes[Math.min(2, meshes.length - 1)];
  } else if (meshes.length === 2) {
    parts.partA = meshes[0];
    parts.partB = meshes[1];
    parts.partC = meshes[1]; // duplicate
  } else if (meshes.length === 1) {
    parts.partA = meshes[0];
    parts.partB = meshes[0];
    parts.partC = meshes[0];
  }

  // Store original colors and scales
  for (const key of ['partA', 'partB', 'partC']) {
    const mesh = parts[key];
    if (mesh) {
      if (mesh.material && mesh.material.color) {
        originalColors[key] = mesh.material.color.getHex();
      }
      originalScales[key].copy(mesh.scale);
      state.partColors[key] = originalColors[key];
    }
  }

  // Update button labels with mesh names
  if (parts.partA) document.getElementById('btn-partA').textContent = parts.partA.name || 'Part A';
  if (parts.partB) document.getElementById('btn-partB').textContent = parts.partB.name || 'Part B';
  if (parts.partC) document.getElementById('btn-partC').textContent = parts.partC.name || 'Part C';

  modelGroup = model;
  scene.add(model);
  state.modelLoaded = true;

  // Apply default materials
  for (const key of ['partA', 'partB', 'partC']) {
    applyPartCustomization(key);
  }

  updateUI();
}, undefined, (error) => {
  console.error('Error loading model:', error);
});

// UI Elements
const btnPartA = document.getElementById('btn-partA');
const btnPartB = document.getElementById('btn-partB');
const btnPartC = document.getElementById('btn-partC');
const swatches = document.querySelectorAll('.color-swatch');
const btnMatStandard = document.getElementById('btn-mat-standard');
const btnMatMetallic = document.getElementById('btn-mat-metallic');
const btnMatGlossy = document.getElementById('btn-mat-glossy');
const scaleSlider = document.getElementById('scale-slider');
const scaleValue = document.getElementById('scale-value');
const btnSave = document.getElementById('btn-save');
const btnLoad = document.getElementById('btn-load');
const btnReset = document.getElementById('btn-reset');
const statusText = document.getElementById('status-text');

let statusTimeout = null;

function showStatus(msg) {
  state.statusText = msg;
  statusText.textContent = msg;
  statusText.style.opacity = '1';
  if (statusTimeout) clearTimeout(statusTimeout);
  statusTimeout = setTimeout(() => {
    statusText.style.opacity = '0';
    state.statusText = '';
  }, 2000);
}

function updateUI() {
  // Part buttons
  document.querySelectorAll('.part-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + state.selectedPart).classList.add('active');

  // Material buttons
  document.querySelectorAll('.mat-btn').forEach(btn => btn.classList.remove('active'));
  const currentMat = state.partMaterials[state.selectedPart];
  document.getElementById('btn-mat-' + currentMat).classList.add('active');

  // Scale slider
  const currentScale = state.partScales[state.selectedPart];
  scaleSlider.value = currentScale;
  scaleValue.textContent = currentScale.toFixed(1);

  // Color swatches - highlight active
  const currentColor = state.partColors[state.selectedPart];
  swatches.forEach(s => {
    s.classList.remove('active');
    const swatchColor = parseInt(s.getAttribute('data-color'));
    if (swatchColor === currentColor) {
      s.classList.add('active');
    }
  });
}

// Part selection
[btnPartA, btnPartB, btnPartC].forEach(btn => {
  btn.addEventListener('click', () => {
    state.selectedPart = btn.getAttribute('data-part');
    updateUI();
  });
});

// Color swatches
swatches.forEach(swatch => {
  swatch.addEventListener('click', () => {
    const color = parseInt(swatch.getAttribute('data-color'));
    state.partColors[state.selectedPart] = color;
    applyPartCustomization(state.selectedPart);
    updateUI();
  });
});

// Material buttons
[btnMatStandard, btnMatMetallic, btnMatGlossy].forEach(btn => {
  btn.addEventListener('click', () => {
    const matType = btn.getAttribute('data-material');
    state.partMaterials[state.selectedPart] = matType;
    applyPartCustomization(state.selectedPart);
    updateUI();
  });
});

// Scale slider
scaleSlider.addEventListener('input', () => {
  const val = parseFloat(scaleSlider.value);
  state.partScales[state.selectedPart] = val;
  scaleValue.textContent = val.toFixed(1);
  applyPartCustomization(state.selectedPart);
});

// Save
btnSave.addEventListener('click', () => {
  const config = {
    partColors: { ...state.partColors },
    partMaterials: { ...state.partMaterials },
    partScales: { ...state.partScales }
  };
  localStorage.setItem('sneaker_config', JSON.stringify(config));
  state.saveCount++;
  showStatus('Saved!');
});

// Load
btnLoad.addEventListener('click', () => {
  const raw = localStorage.getItem('sneaker_config');
  if (!raw) {
    showStatus('No saved config found!');
    return;
  }
  try {
    const config = JSON.parse(raw);
    if (config.partColors) Object.assign(state.partColors, config.partColors);
    if (config.partMaterials) Object.assign(state.partMaterials, config.partMaterials);
    if (config.partScales) Object.assign(state.partScales, config.partScales);

    for (const key of ['partA', 'partB', 'partC']) {
      applyPartCustomization(key);
    }
    state.loadCount++;
    showStatus('Loaded!');
    updateUI();
  } catch(e) {
    showStatus('Error loading config!');
  }
});

// Reset
btnReset.addEventListener('click', () => {
  for (const key of ['partA', 'partB', 'partC']) {
    state.partColors[key] = originalColors[key];
    state.partMaterials[key] = 'standard';
    state.partScales[key] = 1.0;
    applyPartCustomization(key);
  }
  state.resetCount++;
  showStatus('Reset!');
  updateUI();
});

// Keyboard - R for auto-rotate
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    state.autoRotate = !state.autoRotate;
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  state.frameCount++;

  // Auto-rotate
  if (state.autoRotate && modelGroup) {
    modelGroup.rotation.y += 0.01;
  }

  controls.update();

  // Camera distance
  const dist = camera.position.length();
  state.cameraDistance = isNaN(dist) ? 5 : dist;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
