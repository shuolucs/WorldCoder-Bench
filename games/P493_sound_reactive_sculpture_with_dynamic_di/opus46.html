<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sound-Reactive Sculpture</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a0a; }
  canvas { display: block; }
  .hud {
    position: fixed;
    color: white;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    padding: 10px 15px;
    background: rgba(0, 0, 0, 0.6);
    border-radius: 8px;
    pointer-events: none;
    line-height: 1.6;
  }
  #hud-top-left {
    top: 15px;
    left: 15px;
  }
  #hud-top-right {
    top: 15px;
    right: 15px;
    text-align: right;
  }
  #hud-bottom-center {
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }
</style>
</head>
<body>

<div id="hud-top-left" class="hud">
  <div>Difficulty: <span id="hud-difficulty">easy</span></div>
  <div>Color Mode: <span id="hud-colormode">spectrum</span></div>
  <div>Status: <span id="hud-paused">running</span></div>
</div>

<div id="hud-top-right" class="hud">
  <div>Avg Frequency: <span id="hud-avgfreq">0.000</span></div>
</div>

<div id="hud-bottom-center" class="hud">
  <div>Spheres: <span id="hud-spheres">54</span> | FPS: <span id="hud-fps">0</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // ==================== STATE ====================
  const state = {
    difficulty: 'easy',
    colorMode: 'spectrum',
    paused: false,
    elapsedTime: 0,
    avgFrequency: 0,
    coreRotationSpeed: 0.5,
    ringOrbitSpeeds: [0.3, 0.2, 0.1],
    sphereCount: 54,
    explosionActive: false,
    explosionProgress: 0,
    cameraAngle: 0,
    ring1AvgScale: 1,
    ring2AvgScale: 1,
    ring3AvgScale: 1,
    coreVerticesDisplaced: false,
    fps: 0
  };
  window.__3D_STATE__ = state;

  // ==================== DIFFICULTY SETTINGS ====================
  const difficultySettings = {
    easy: {
      scaleMin: 0.5, scaleMax: 1.5,
      coreRotationSpeed: 0.5,
      ringOrbitSpeeds: [0.3, 0.2, 0.1],
      radialDisplacement: 0,
      morphCore: false
    },
    medium: {
      scaleMin: 0.3, scaleMax: 2.5,
      coreRotationSpeed: 1.0,
      ringOrbitSpeeds: [0.6, 0.4, 0.2],
      radialDisplacement: 0.5,
      morphCore: false
    },
    hard: {
      scaleMin: 0.1, scaleMax: 3.5,
      coreRotationSpeed: 2.0,
      ringOrbitSpeeds: [1.2, 0.8, 0.4],
      radialDisplacement: 1.5,
      morphCore: true
    }
  };

  // ==================== SCENE SETUP ====================
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 12);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
  scene.add(ambientLight);

  const pointLight = new THREE.PointLight(0xffffff, 1.5);
  pointLight.position.set(5, 10, 5);
  scene.add(pointLight);

  // ==================== CENTRAL CORE ====================
  const coreGeometry = new THREE.IcosahedronGeometry(1.5, 2);
  const coreMaterial = new THREE.MeshStandardMaterial({
    color: 0x00ffaa,
    emissive: 0x003322,
    wireframe: true
  });
  const coreMesh = new THREE.Mesh(coreGeometry, coreMaterial);
  scene.add(coreMesh);

  // Store original vertex positions for morphing
  const originalCorePositions = new Float32Array(coreGeometry.attributes.position.array);

  // ==================== ORBITING RINGS ====================
  const ringConfigs = [
    { count: 12, radius: 3 },
    { count: 18, radius: 5 },
    { count: 24, radius: 7 }
  ];

  const rings = [];
  const ringGroups = [];

  ringConfigs.forEach((config, ringIndex) => {
    const group = new THREE.Group();
    scene.add(group);
    ringGroups.push(group);

    const spheres = [];
    for (let i = 0; i < config.count; i++) {
      const angle = (i / config.count) * Math.PI * 2;
      const sphereGeom = new THREE.SphereGeometry(0.15, 16, 16);
      const sphereMat = new THREE.MeshStandardMaterial({
        color: 0x00ffff,
        emissive: 0x004444,
        metalness: 0.3,
        roughness: 0.5
      });
      const sphere = new THREE.Mesh(sphereGeom, sphereMat);
      sphere.position.set(
        Math.cos(angle) * config.radius,
        0,
        Math.sin(angle) * config.radius
      );
      sphere.userData = {
        baseAngle: angle,
        baseRadius: config.radius,
        ringIndex: ringIndex,
        indexInRing: i
      };
      group.add(sphere);
      spheres.push(sphere);
    }
    rings.push(spheres);
  });

  // ==================== SIMULATED AUDIO ====================
  const frequencyBins = new Float32Array(64);

  function updateFrequencyBins(time) {
    for (let i = 0; i < 64; i++) {
      frequencyBins[i] = Math.abs(Math.sin(time * (0.5 + i * 0.1) + i * 0.3));
    }
  }

  function getAvgFrequency() {
    let sum = 0;
    for (let i = 0; i < 64; i++) sum += frequencyBins[i];
    return sum / 64;
  }

  // ==================== EXPLOSION STATE ====================
  let explosionStartTime = -1;
  const explosionDuration = 2.0; // 1s out + 1s back

  // ==================== RAYCASTING ====================
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(coreMesh);
    if (intersects.length > 0 && !state.explosionActive) {
      state.explosionActive = true;
      explosionStartTime = state.elapsedTime;
    }
  });

  // ==================== MOUSE CAMERA CONTROL ====================
  let mouseX = 0;
  window.addEventListener('mousemove', (event) => {
    mouseX = event.clientX / window.innerWidth;
  });

  // ==================== KEYBOARD CONTROLS ====================
  window.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    if (key === '1') setDifficulty('easy');
    else if (key === '2') setDifficulty('medium');
    else if (key === '3') setDifficulty('hard');
    else if (key === 'c') cycleColorMode();
    else if (key === ' ') { event.preventDefault(); state.paused = !state.paused; }
    else if (key === 'r') resetAll();
  });

  function setDifficulty(diff) {
    state.difficulty = diff;
    const s = difficultySettings[diff];
    state.coreRotationSpeed = s.coreRotationSpeed;
    state.ringOrbitSpeeds = [...s.ringOrbitSpeeds];
  }

  function cycleColorMode() {
    const modes = ['spectrum', 'pulse', 'monochrome'];
    const idx = modes.indexOf(state.colorMode);
    state.colorMode = modes[(idx + 1) % 3];
  }

  function resetAll() {
    setDifficulty('easy');
    state.colorMode = 'spectrum';
    state.paused = false;
    state.explosionActive = false;
    explosionStartTime = -1;
    state.explosionProgress = 0;
    state.elapsedTime = 0;
    lastTimestamp = null;

    // Reset core geometry
    const posAttr = coreGeometry.attributes.position;
    for (let i = 0; i < posAttr.count * 3; i++) {
      posAttr.array[i] = originalCorePositions[i];
    }
    posAttr.needsUpdate = true;
    state.coreVerticesDisplaced = false;
  }

  // ==================== HUD UPDATE ====================
  function updateHUD() {
    document.getElementById('hud-difficulty').textContent = state.difficulty;
    document.getElementById('hud-colormode').textContent = state.colorMode;
    document.getElementById('hud-paused').textContent = state.paused ? 'paused' : 'running';
    document.getElementById('hud-avgfreq').textContent = state.avgFrequency.toFixed(3);
    document.getElementById('hud-spheres').textContent = state.sphereCount;
    document.getElementById('hud-fps').textContent = state.fps;
  }

  // ==================== COLOR HELPERS ====================
  const tempColor = new THREE.Color();

  function hslToColor(h, s, l) {
    tempColor.setHSL(h, s, l);
    return tempColor.clone();
  }

  // ==================== ANIMATION LOOP ====================
  let lastTimestamp = null;
  let frameCount = 0;
  let fpsTimer = 0;
  let currentFps = 0;

  function animate(timestamp) {
    requestAnimationFrame(animate);

    if (lastTimestamp === null) lastTimestamp = timestamp;
    const rawDelta = (timestamp - lastTimestamp) / 1000;
    lastTimestamp = timestamp;

    // FPS calculation
    frameCount++;
    fpsTimer += rawDelta;
    if (fpsTimer >= 1.0) {
      currentFps = Math.round(frameCount / fpsTimer);
      state.fps = currentFps;
      frameCount = 0;
      fpsTimer = 0;
    }

    const delta = state.paused ? 0 : rawDelta;
    state.elapsedTime += delta;
    const time = state.elapsedTime;

    const settings = difficultySettings[state.difficulty];

    // Update camera based on mouse
    state.cameraAngle = mouseX * Math.PI * 2;
    camera.position.x = Math.sin(state.cameraAngle) * 12;
    camera.position.z = Math.cos(state.cameraAngle) * 12;
    camera.position.y = 5;
    camera.lookAt(0, 0, 0);

    if (!state.paused) {
      // Update frequency bins
      updateFrequencyBins(time);
      state.avgFrequency = getAvgFrequency();

      // Rotate core
      coreMesh.rotation.x += settings.coreRotationSpeed * delta;
      coreMesh.rotation.y += settings.coreRotationSpeed * delta * 0.7;

      // Core vertex morphing (hard mode)
      if (settings.morphCore) {
        const posAttr = coreGeometry.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
          const ox = originalCorePositions[i * 3];
          const oy = originalCorePositions[i * 3 + 1];
          const oz = originalCorePositions[i * 3 + 2];
          const len = Math.sqrt(ox * ox + oy * oy + oz * oz);
          const nx = ox / len, ny = oy / len, nz = oz / len;
          const binIdx = i % 64;
          const displacement = frequencyBins[binIdx] * 0.5;
          posAttr.array[i * 3] = ox + nx * displacement;
          posAttr.array[i * 3 + 1] = oy + ny * displacement;
          posAttr.array[i * 3 + 2] = oz + nz * displacement;
        }
        posAttr.needsUpdate = true;
        state.coreVerticesDisplaced = true;
      } else {
        // Reset vertices if not hard mode
        if (state.coreVerticesDisplaced) {
          const posAttr = coreGeometry.attributes.position;
          for (let i = 0; i < posAttr.count * 3; i++) {
            posAttr.array[i] = originalCorePositions[i];
          }
          posAttr.needsUpdate = true;
          state.coreVerticesDisplaced = false;
        }
      }

      // Explosion
      if (state.explosionActive) {
        const explosionElapsed = time - explosionStartTime;
        if (explosionElapsed >= explosionDuration) {
          state.explosionActive = false;
          state.explosionProgress = 0;
          explosionStartTime = -1;
        } else {
          state.explosionProgress = explosionElapsed / explosionDuration;
        }
      }

      // Update ring orbits and spheres
      const ringScaleSums = [0, 0, 0];

      rings.forEach((spheres, ringIdx) => {
        const orbitSpeed = settings.ringOrbitSpeeds[ringIdx];
        ringGroups[ringIdx].rotation.y += orbitSpeed * delta;

        spheres.forEach((sphere, sIdx) => {
          const baseAngle = sphere.userData.baseAngle;
          const baseRadius = sphere.userData.baseRadius;

          // Frequency bin for this sphere
          const totalBefore = ringIdx === 0 ? 0 : ringIdx === 1 ? 12 : 30;
          const globalIdx = totalBefore + sIdx;
          const binIdx = globalIdx % 64;
          const freq = frequencyBins[binIdx];

          // Scale
          const scaleVal = settings.scaleMin + freq * (settings.scaleMax - settings.scaleMin);
          sphere.scale.setScalar(scaleVal);
          ringScaleSums[ringIdx] += scaleVal;

          // Radial displacement
          let radius = baseRadius;
          if (settings.radialDisplacement > 0) {
            radius += (freq - 0.5) * 2 * settings.radialDisplacement;
          }

          // Explosion effect
          if (state.explosionActive) {
            let explosionMult;
            if (state.explosionProgress < 0.5) {
              // Expanding: 1x to 2x
              explosionMult = 1 + state.explosionProgress * 2;
            } else {
              // Contracting: 2x to 1x
              explosionMult = 1 + (1 - state.explosionProgress) * 2;
            }
            radius *= explosionMult;
          }

          // Y oscillation
          const yOffset = Math.sin(time * 2 + baseAngle * 3) * 0.3 * freq;

          sphere.position.set(
            Math.cos(baseAngle) * radius,
            yOffset,
            Math.sin(baseAngle) * radius
          );

          // Color
          const mat = sphere.material;
          if (state.colorMode === 'spectrum') {
            const hue = sIdx / spheres.length;
            const color = hslToColor(hue, 1.0, 0.5);
            mat.color.copy(color);
            mat.emissive.copy(hslToColor(hue, 1.0, 0.15 + freq * 0.2));
          } else if (state.colorMode === 'pulse') {
            const hue = (time * 0.1) % 1;
            const color = hslToColor(hue, 1.0, 0.5);
            mat.color.copy(color);
            mat.emissive.copy(hslToColor(hue, 1.0, 0.15 + freq * 0.2));
          } else if (state.colorMode === 'monochrome') {
            const brightness = 0.3 + freq * 0.7;
            mat.color.setRGB(0, brightness, brightness);
            mat.emissive.setRGB(0, freq * 0.3, freq * 0.3);
          }
        });
      });

      state.ring1AvgScale = ringScaleSums[0] / rings[0].length;
      state.ring2AvgScale = ringScaleSums[1] / rings[1].length;
      state.ring3AvgScale = ringScaleSums[2] / rings[2].length;

      // Update core emissive based on avg frequency
      const avgF = state.avgFrequency;
      coreMaterial.emissive.setRGB(0, avgF * 0.3, avgF * 0.2);
    }

    updateHUD();
    renderer.render(scene, camera);
  }

  // ==================== RESIZE ====================
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ==================== START ====================
  setDifficulty('easy');
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
