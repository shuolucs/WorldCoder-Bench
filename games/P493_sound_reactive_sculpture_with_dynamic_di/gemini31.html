<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sound-Reactive Sculpture</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a0a;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        canvas {
            display: block;
        }
        .hud {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
        #hud-top-left {
            top: 10px;
            left: 10px;
        }
        #hud-top-right {
            top: 10px;
            right: 10px;
            text-align: right;
        }
        #hud-bottom-center {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }
        .hud-item {
            margin: 5px 0;
        }
        .controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 10px;
            color: #888;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="hud-top-left" class="hud">
        <div class="hud-item">Difficulty: <span id="val-diff">easy</span></div>
        <div class="hud-item">Color Mode: <span id="val-color">spectrum</span></div>
        <div class="hud-item">Status: <span id="val-paused">Playing</span></div>
    </div>
    <div id="hud-top-right" class="hud">
        <div class="hud-item">Avg Freq: <span id="val-freq">0.000</span></div>
    </div>
    <div id="hud-bottom-center" class="hud">
        <div class="hud-item">Spheres: <span id="val-count">54</span> | FPS: <span id="val-fps">0</span></div>
    </div>
    <div class="controls-help">
        [1,2,3] Difficulty | [C] Color Mode | [Space] Pause | [Click Core] Explode | [R] Reset | [Mouse] Orbit
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- State Management ---
        window.__3D_STATE__ = {
            difficulty: 'easy',
            colorMode: 'spectrum',
            paused: false,
            elapsedTime: 0,
            avgFrequency: 0,
            coreRotationSpeed: 0.5,
            ringOrbitSpeeds: [0.3, 0.2, 0.1],
            sphereCount: 54,
            explosionActive: false,
            explosionProgress: 0,
            cameraAngle: 0,
            ring1AvgScale: 1,
            ring2AvgScale: 1,
            ring3AvgScale: 1,
            coreVerticesDisplaced: false,
            fps: 0
        };

        const state = window.__3D_STATE__;

        // --- Configuration ---
        const diffSettings = {
            easy: { minScale: 0.5, maxScale: 1.5, coreRot: 0.5, ringSpeeds: [0.3, 0.2, 0.1], radialMove: 0 },
            medium: { minScale: 0.3, maxScale: 2.5, coreRot: 1.0, ringSpeeds: [0.6, 0.4, 0.2], radialMove: 0.5 },
            hard: { minScale: 0.1, maxScale: 3.5, coreRot: 2.0, ringSpeeds: [1.2, 0.8, 0.4], radialMove: 1.5 }
        };

        const colorModes = ['spectrum', 'pulse', 'monochrome'];

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 10, 5);
        scene.add(pointLight);

        // --- Objects ---
        // Core
        const coreGeometry = new THREE.IcosahedronGeometry(1.5, 2);
        const coreOriginalPositions = new Float32Array(coreGeometry.attributes.position.array);
        const coreMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ffaa,
            emissive: 0x003322,
            wireframe: true
        });
        const core = new THREE.Mesh(coreGeometry, coreMaterial);
        scene.add(core);

        // Rings
        const ringsConfig = [
            { radius: 3, count: 12 },
            { radius: 5, count: 18 },
            { radius: 7, count: 24 }
        ];
        const spheres = [];
        const sphereGeometry = new THREE.SphereGeometry(0.15, 16, 16);

        ringsConfig.forEach((config, ringIndex) => {
            for (let i = 0; i < config.count; i++) {
                const material = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x000000 });
                const mesh = new THREE.Mesh(sphereGeometry, material);
                scene.add(mesh);
                
                spheres.push({
                    mesh: mesh,
                    ringIndex: ringIndex,
                    indexInRing: i,
                    totalInRing: config.count,
                    baseRadius: config.radius,
                    angleOffset: (i / config.count) * Math.PI * 2,
                    binIndex: Math.floor(Math.random() * 64) // Assign a random frequency bin
                });
            }
        });

        // --- Audio Simulation ---
        const audioData = new Array(64).fill(0);
        function updateAudioData(time) {
            let sum = 0;
            for (let i = 0; i < 64; i++) {
                audioData[i] = Math.abs(Math.sin(time * (0.5 + i * 0.1) + i * 0.3));
                sum += audioData[i];
            }
            state.avgFrequency = sum / 64;
        }

        // --- Interaction & Events ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let explosionTimer = 0;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('mousemove', (event) => {
            // Camera orbit
            state.cameraAngle = (event.clientX / window.innerWidth) * Math.PI * 2;
            
            // Raycaster mouse pos
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('click', () => {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(core);
            if (intersects.length > 0 && !state.explosionActive) {
                state.explosionActive = true;
                explosionTimer = 0;
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === '1') state.difficulty = 'easy';
            if (key === '2') state.difficulty = 'medium';
            if (key === '3') state.difficulty = 'hard';
            if (key === 'c') {
                const idx = colorModes.indexOf(state.colorMode);
                state.colorMode = colorModes[(idx + 1) % colorModes.length];
            }
            if (key === ' ') state.paused = !state.paused;
            if (key === 'r') resetSimulation();
        });

        function resetSimulation() {
            state.difficulty = 'easy';
            state.colorMode = 'spectrum';
            state.paused = false;
            state.elapsedTime = 0;
            state.explosionActive = false;
            state.explosionProgress = 0;
            explosionTimer = 0;
            
            // Reset core geometry
            const positions = coreGeometry.attributes.position.array;
            for (let i = 0; i < positions.length; i++) {
                positions[i] = coreOriginalPositions[i];
            }
            coreGeometry.attributes.position.needsUpdate = true;
            coreGeometry.computeVertexNormals();
        }

        // --- HUD Update ---
        const elDiff = document.getElementById('val-diff');
        const elColor = document.getElementById('val-color');
        const elPaused = document.getElementById('val-paused');
        const elFreq = document.getElementById('val-freq');
        const elFps = document.getElementById('val-fps');

        function updateHUD() {
            elDiff.innerText = state.difficulty;
            elColor.innerText = state.colorMode;
            elPaused.innerText = state.paused ? 'Paused' : 'Playing';
            elFreq.innerText = state.avgFrequency.toFixed(3);
            elFps.innerText = state.fps;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let lastFpsTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const rawDelta = clock.getDelta();
            const delta = state.paused ? 0 : rawDelta;
            
            if (!state.paused) {
                state.elapsedTime += delta;
            }

            // FPS Calculation
            frames++;
            if (clock.elapsedTime - lastFpsTime >= 1) {
                state.fps = frames;
                frames = 0;
                lastFpsTime = clock.elapsedTime;
            }

            // Update Audio
            updateAudioData(state.elapsedTime);

            // Apply Settings based on Difficulty
            const settings = diffSettings[state.difficulty];
            state.coreRotationSpeed = settings.coreRot;
            state.ringOrbitSpeeds = settings.ringSpeeds;

            // Camera Orbit
            camera.position.x = Math.sin(state.cameraAngle) * 12;
            camera.position.z = Math.cos(state.cameraAngle) * 12;
            camera.lookAt(0, 0, 0);

            // Core Update
            core.rotation.y += state.coreRotationSpeed * delta;
            core.rotation.x += state.coreRotationSpeed * 0.5 * delta;

            state.coreVerticesDisplaced = false;
            if (state.difficulty === 'hard' && !state.paused) {
                state.coreVerticesDisplaced = true;
                const positions = coreGeometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    const vertexIndex = i / 3;
                    const freqVal = audioData[vertexIndex % 64];
                    
                    // Original position acts as normal for a sphere centered at 0,0,0
                    const ox = coreOriginalPositions[i];
                    const oy = coreOriginalPositions[i+1];
                    const oz = coreOriginalPositions[i+2];
                    
                    // Normalize
                    const len = Math.sqrt(ox*ox + oy*oy + oz*oz);
                    const nx = ox / len;
                    const ny = oy / len;
                    const nz = oz / len;

                    const displacement = freqVal * 0.5;
                    
                    positions[i] = ox + nx * displacement;
                    positions[i+1] = oy + ny * displacement;
                    positions[i+2] = oz + nz * displacement;
                }
                coreGeometry.attributes.position.needsUpdate = true;
                coreGeometry.computeVertexNormals();
            } else if (state.difficulty !== 'hard') {
                // Ensure reset if switching away from hard
                const positions = coreGeometry.attributes.position.array;
                let needsReset = false;
                for (let i = 0; i < positions.length; i++) {
                    if (positions[i] !== coreOriginalPositions[i]) {
                        positions[i] = coreOriginalPositions[i];
                        needsReset = true;
                    }
                }
                if (needsReset) {
                    coreGeometry.attributes.position.needsUpdate = true;
                    coreGeometry.computeVertexNormals();
                }
            }

            // Explosion Logic
            let explosionMultiplier = 1;
            if (state.explosionActive && !state.paused) {
                explosionTimer += delta;
                state.explosionProgress = explosionTimer / 2.0; // 2 seconds total
                
                if (state.explosionProgress >= 1) {
                    state.explosionActive = false;
                    state.explosionProgress = 0;
                    explosionMultiplier = 1;
                } else {
                    // Sine wave mapping: 0 -> 1 -> 0 maps to multiplier 1 -> 2 -> 1
                    explosionMultiplier = 1 + Math.sin(state.explosionProgress * Math.PI);
                }
            }

            // Rings Update
            let ringScales = [0, 0, 0];
            let ringCounts = [0, 0, 0];

            spheres.forEach(s => {
                const freqVal = audioData[s.binIndex];
                
                // Orbit
                const orbitSpeed = state.ringOrbitSpeeds[s.ringIndex];
                const currentAngle = s.angleOffset + state.elapsedTime * orbitSpeed;
                
                // Radial Movement
                const radialOffset = (freqVal * 2 - 1) * settings.radialMove;
                const currentRadius = (s.baseRadius + radialOffset) * explosionMultiplier;

                s.mesh.position.x = Math.cos(currentAngle) * currentRadius;
                s.mesh.position.z = Math.sin(currentAngle) * currentRadius;
                
                // Add slight vertical wave
                s.mesh.position.y = Math.sin(currentAngle * 3 + state.elapsedTime) * 0.5;

                // Scale
                const scale = settings.minScale + freqVal * (settings.maxScale - settings.minScale);
                s.mesh.scale.setScalar(scale);
                
                ringScales[s.ringIndex] += scale;
                ringCounts[s.ringIndex]++;

                // Color
                const mat = s.mesh.material;
                if (state.colorMode === 'spectrum') {
                    const hue = s.indexInRing / s.totalInRing;
                    mat.color.setHSL(hue, 1, 0.5);
                    mat.emissive.setHSL(hue, 1, freqVal * 0.8);
                } else if (state.colorMode === 'pulse') {
                    const hue = (state.elapsedTime * 0.1) % 1;
                    mat.color.setHSL(hue, 1, 0.5);
                    mat.emissive.setHSL(hue, 1, freqVal * 0.8);
                } else if (state.colorMode === 'monochrome') {
                    mat.color.setHex(0x00ffff);
                    const lightness = 0.1 + freqVal * 0.6;
                    mat.emissive.setHSL(0.5, 1, lightness);
                }
            });

            // Update State Averages
            state.ring1AvgScale = ringScales[0] / ringCounts[0];
            state.ring2AvgScale = ringScales[1] / ringCounts[1];
            state.ring3AvgScale = ringScales[2] / ringCounts[2];

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
