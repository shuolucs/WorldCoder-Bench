<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Headphone Materials Demo</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f172a;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .panel {
      position: absolute;
      z-index: 10;
      background: rgba(10, 12, 20, 0.78);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    #materialPanel {
      top: 16px;
      left: 16px;
      width: 270px;
      padding: 14px;
    }

    #materialPanel h3 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      color: #e8f7ff;
    }

    .material-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      margin: 8px 0;
      background: rgba(255,255,255,0.05);
      color: white;
      border: 2px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
      text-align: left;
      font-size: 14px;
    }

    .material-btn:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .material-btn.active {
      border: 2px solid #00ff88;
      background: rgba(0,255,136,0.08);
    }

    .swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      flex: 0 0 auto;
    }

    #hud {
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: min(920px, calc(100vw - 32px));
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1.3fr 1fr 1fr auto auto auto;
      gap: 12px;
      align-items: center;
    }

    .hud-item {
      min-width: 0;
      font-size: 14px;
      color: #e8eefc;
    }

    .hud-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #9fb3d1;
      margin-bottom: 4px;
    }

    .controls-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button.ui-btn {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 10px;
      padding: 9px 12px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    button.ui-btn:hover {
      background: rgba(255,255,255,0.14);
    }

    input[type="range"] {
      width: 140px;
    }

    input[type="checkbox"] {
      transform: scale(1.1);
      cursor: pointer;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.25);
      color: #fff;
      font-size: 18px;
      letter-spacing: 0.04em;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      #hud {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">Loading model...</div>

    <div id="materialPanel" class="panel">
      <h3>Material Selector</h3>
      <div id="materialButtons"></div>
    </div>

    <div id="hud" class="panel">
      <div class="hud-item">
        <span class="hud-label">Current Material</span>
        <div id="currentMaterialText">Matte Black</div>
      </div>

      <div class="hud-item">
        <span class="hud-label">Roughness</span>
        <div id="roughnessText">0.9</div>
      </div>

      <div class="hud-item">
        <span class="hud-label">Metalness</span>
        <div id="metalnessText">0.1</div>
      </div>

      <div class="hud-item">
        <span class="hud-label">Wireframe</span>
        <label class="controls-inline">
          <input id="wireframeToggle" type="checkbox" />
          <span>Enable</span>
        </label>
      </div>

      <div class="hud-item">
        <span class="hud-label">Rotate Speed</span>
        <div class="controls-inline">
          <input id="rotateSpeed" type="range" min="0" max="10" step="0.5" value="2" />
          <span id="rotateSpeedValue">2.0</span>
        </div>
      </div>

      <div class="hud-item">
        <span class="hud-label">Actions</span>
        <div class="controls-inline">
          <button id="explodeBtn" class="ui-btn">Explode View</button>
          <button id="screenshotBtn" class="ui-btn">Screenshot</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const loadingEl = document.getElementById('loading');
    const materialButtonsEl = document.getElementById('materialButtons');
    const currentMaterialText = document.getElementById('currentMaterialText');
    const roughnessText = document.getElementById('roughnessText');
    const metalnessText = document.getElementById('metalnessText');
    const wireframeToggle = document.getElementById('wireframeToggle');
    const rotateSpeedSlider = document.getElementById('rotateSpeed');
    const rotateSpeedValue = document.getElementById('rotateSpeedValue');
    const explodeBtn = document.getElementById('explodeBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;
    controls.minDistance = 2;
    controls.maxDistance = 8;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 5, 5);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x4488ff, 0.6);
    pointLight.position.set(-3, 2, -3);
    scene.add(pointLight);

    const tempCenter = new THREE.Vector3();
    const box = new THREE.Box3();

    function createCarbonFiberTexture() {
      const size = 256;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#3a3a3a';
      ctx.fillRect(0, 0, size, size);

      const tile = 16;
      for (let y = 0; y < size; y += tile) {
        for (let x = 0; x < size; x += tile) {
          ctx.fillStyle = ((x / tile + y / tile) % 2 === 0) ? '#2a2a2a' : '#343434';
          ctx.fillRect(x, y, tile, tile);

          ctx.strokeStyle = 'rgba(255,255,255,0.08)';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x, y + tile);
          ctx.lineTo(x + tile, y);
          ctx.stroke();

          ctx.strokeStyle = 'rgba(0,0,0,0.18)';
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + tile, y + tile);
          ctx.stroke();
        }
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.repeat.set(4, 4);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const carbonFiberBumpMap = createCarbonFiberTexture();

    const materialPresets = [
      {
        name: 'Matte Black',
        color: '#1a1a1a',
        type: 'standard',
        params: { color: '#1a1a1a', roughness: 0.9, metalness: 0.1 }
      },
      {
        name: 'Brushed Aluminum',
        color: '#c0c0c0',
        type: 'standard',
        params: { color: '#c0c0c0', roughness: 0.35, metalness: 0.95 }
      },
      {
        name: 'Rose Gold',
        color: '#b76e79',
        type: 'standard',
        params: { color: '#b76e79', roughness: 0.25, metalness: 0.9 }
      },
      {
        name: 'Carbon Fiber',
        color: '#2a2a2a',
        type: 'standard',
        params: {
          color: '#2a2a2a',
          roughness: 0.4,
          metalness: 0.7,
          bumpMap: carbonFiberBumpMap,
          bumpScale: 0.3
        }
      },
      {
        name: 'Translucent White',
        color: '#ffffff',
        type: 'physical',
        params: {
          color: '#ffffff',
          roughness: 0.1,
          metalness: 0.0,
          transmission: 0.6,
          thickness: 1.5,
          ior: 1.5
        }
      }
    ];

    let modelRoot = null;
    let meshList = [];
    let explodeData = [];

    const state = {
      modelLoaded: false,
      currentMaterial: 'Matte Black',
      materialIndex: 0,
      roughness: 0.9,
      metalness: 0.1,
      wireframe: false,
      exploded: false,
      explodeProgress: 0,
      autoRotateSpeed: 2.0,
      pointLightOn: true,
      cameraDistance: camera.position.length(),
      meshCount: 0,
      frameCount: 0
    };
    window.__3D_STATE__ = state;

    function buildMaterialButtons() {
      materialButtonsEl.innerHTML = '';
      materialPresets.forEach((preset, index) => {
        const btn = document.createElement('button');
        btn.className = 'material-btn' + (index === state.materialIndex ? ' active' : '');
        btn.dataset.index = index;
        btn.innerHTML = `
          <div class="swatch" style="background:${preset.color}"></div>
          <span>${preset.name}</span>
        `;
        btn.addEventListener('click', () => setMaterialPreset(index));
        materialButtonsEl.appendChild(btn);
      });
    }

    function updateMaterialButtonState() {
      [...materialButtonsEl.children].forEach((btn, i) => {
        btn.classList.toggle('active', i === state.materialIndex);
      });
    }

    function makeMaterialFromPreset(preset) {
      const params = { ...preset.params, wireframe: state.wireframe };
      if (preset.type === 'physical') {
        return new THREE.MeshPhysicalMaterial(params);
      }
      return new THREE.MeshStandardMaterial(params);
    }

    function setMaterialPreset(index) {
      state.materialIndex = index;
      const preset = materialPresets[index];
      state.currentMaterial = preset.name;
      state.roughness = preset.params.roughness ?? 0;
      state.metalness = preset.params.metalness ?? 0;

      meshList.forEach((mesh) => {
        const oldMat = mesh.material;
        mesh.material = makeMaterialFromPreset(preset);
        if (oldMat) {
          if (Array.isArray(oldMat)) oldMat.forEach(m => m.dispose && m.dispose());
          else oldMat.dispose && oldMat.dispose();
        }
      });

      currentMaterialText.textContent = state.currentMaterial;
      roughnessText.textContent = state.roughness.toFixed(2).replace(/\.00$/, '.0');
      metalnessText.textContent = state.metalness.toFixed(2).replace(/\.00$/, '.0');
      wireframeToggle.checked = state.wireframe;
      updateMaterialButtonState();
    }

    function setWireframe(enabled) {
      state.wireframe = enabled;
      wireframeToggle.checked = enabled;
      meshList.forEach(mesh => {
        if (mesh.material) mesh.material.wireframe = enabled;
      });
    }

    function toggleExplode() {
      state.exploded = !state.exploded;
      explodeBtn.textContent = state.exploded ? 'Reset Explode' : 'Explode View';
    }

    function resetCamera() {
      camera.position.set(0, 1.5, 4);
      controls.target.set(0, 0, 0);
      controls.autoRotateSpeed = 2.0;
      rotateSpeedSlider.value = '2';
      rotateSpeedValue.textContent = '2.0';
      state.autoRotateSpeed = 2.0;
      controls.update();
    }

    buildMaterialButtons();

    const loader = new GLTFLoader();
    loader.load(
      'PrimaryIonDrive.glb',
      (gltf) => {
        modelRoot = gltf.scene;
        scene.add(modelRoot);

        box.setFromObject(modelRoot);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        modelRoot.position.sub(center);

        const longestAxis = Math.max(size.x, size.y, size.z) || 1;
        const scale = 2.5 / longestAxis;
        modelRoot.scale.setScalar(scale);

        box.setFromObject(modelRoot);
        box.getCenter(tempCenter);
        modelRoot.position.sub(tempCenter);

        meshList = [];
        explodeData = [];

        modelRoot.traverse((child) => {
          if (child.isMesh) {
            meshList.push(child);
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        const modelCenter = new THREE.Vector3(0, 0, 0);
        meshList.forEach((mesh) => {
          const localPos = mesh.getWorldPosition(new THREE.Vector3());
          const dir = localPos.clone().sub(modelCenter);
          if (dir.lengthSq() < 1e-6) dir.set(0, 1, 0);
          dir.normalize();

          explodeData.push({
            mesh,
            basePosition: mesh.position.clone(),
            direction: mesh.parent.worldToLocal(dir.clone().add(mesh.getWorldPosition(new THREE.Vector3())))
              .sub(mesh.parent.worldToLocal(mesh.getWorldPosition(new THREE.Vector3())))
              .normalize()
          });
        });

        state.meshCount = meshList.length;
        state.modelLoaded = true;

        setMaterialPreset(0);
        loadingEl.style.display = 'none';
      },
      undefined,
      (err) => {
        console.error('Failed to load PrimaryIonDrive.glb', err);
        loadingEl.textContent = 'Failed to load model.';
      }
    );

    wireframeToggle.addEventListener('change', (e) => {
      setWireframe(e.target.checked);
    });

    rotateSpeedSlider.addEventListener('input', (e) => {
      const val = parseFloat(e.target.value);
      controls.autoRotateSpeed = val;
      state.autoRotateSpeed = val;
      rotateSpeedValue.textContent = val.toFixed(1);
    });

    explodeBtn.addEventListener('click', toggleExplode);

    screenshotBtn.addEventListener('click', () => {
      console.log('screenshot_taken');
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (['1','2','3','4','5'].includes(key)) {
        setMaterialPreset(parseInt(key, 10) - 1);
      } else if (key === 'w') {
        setWireframe(!state.wireframe);
      } else if (key === 'e') {
        toggleExplode();
      } else if (key === 'r') {
        resetCamera();
      } else if (key === 'l') {
        state.pointLightOn = !state.pointLightOn;
        pointLight.visible = state.pointLightOn;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (state.exploded) {
        state.explodeProgress = Math.min(1, state.explodeProgress + delta / 0.5);
      } else {
        state.explodeProgress = Math.max(0, state.explodeProgress - delta / 0.5);
      }

      for (const item of explodeData) {
        const target = item.basePosition.clone().add(item.direction.clone().multiplyScalar(0.8 * state.explodeProgress));
        item.mesh.position.lerp(target, 0.18);
      }

      controls.update();
      renderer.render(scene, camera);

      state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      state.frameCount += 1;
      state.autoRotateSpeed = controls.autoRotateSpeed;
      state.pointLightOn = pointLight.visible;
      state.meshCount = meshList.length;
    }

    animate();
  </script>
</body>
</html>
