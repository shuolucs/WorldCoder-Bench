<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Headphone Materials Demo</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
    color: #ffffff;
}

#canvas-container {
    width: 100vw;
    height: 100vh;
    background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
}

canvas {
    display: block;
}

#material-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 16px;
    backdrop-filter: blur(10px);
    min-width: 200px;
}

#material-panel h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #aabbcc;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.material-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 6px;
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid transparent;
    border-radius: 8px;
    color: #ffffff;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.material-btn:hover {
    background: rgba(255, 255, 255, 0.1);
}

.material-btn.active {
    border-color: #00ff88;
    background: rgba(0, 255, 136, 0.1);
}

.color-swatch {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(255, 255, 255, 0.3);
    flex-shrink: 0;
}

#bottom-hud {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px 24px;
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
}

.hud-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
}

.hud-label {
    color: #7788aa;
    font-weight: 500;
}

.hud-value {
    color: #00ff88;
    font-weight: 600;
}

.hud-separator {
    width: 1px;
    height: 20px;
    background: rgba(255, 255, 255, 0.15);
}

input[type="checkbox"] {
    accent-color: #00ff88;
    cursor: pointer;
}

input[type="range"] {
    width: 80px;
    accent-color: #00ff88;
    cursor: pointer;
}

.action-btn {
    padding: 6px 14px;
    background: rgba(0, 255, 136, 0.15);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 6px;
    color: #00ff88;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.action-btn:hover {
    background: rgba(0, 255, 136, 0.25);
}

#keyboard-hints {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 12px 16px;
    backdrop-filter: blur(10px);
    font-size: 11px;
    color: #7788aa;
    line-height: 1.8;
}

.key {
    display: inline-block;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    color: #aabbcc;
    margin-right: 4px;
}

#loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 10, 30, 0.95);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    z-index: 100;
    transition: opacity 0.5s ease;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255, 255, 255, 0.1);
    border-top-color: #00ff88;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="loading-overlay">
    <div class="spinner"></div>
    <div style="color: #7788aa; font-size: 14px;">Loading Model...</div>
</div>

<div id="material-panel">
    <h3>Material Selector</h3>
    <button class="material-btn active" data-index="0">
        <div class="color-swatch" style="background: #1a1a1a;"></div>
        <span>Matte Black</span>
    </button>
    <button class="material-btn" data-index="1">
        <div class="color-swatch" style="background: #c0c0c0;"></div>
        <span>Brushed Aluminum</span>
    </button>
    <button class="material-btn" data-index="2">
        <div class="color-swatch" style="background: #b76e79;"></div>
        <span>Rose Gold</span>
    </button>
    <button class="material-btn" data-index="3">
        <div class="color-swatch" style="background: #2a2a2a;"></div>
        <span>Carbon Fiber</span>
    </button>
    <button class="material-btn" data-index="4">
        <div class="color-swatch" style="background: #ffffff;"></div>
        <span>Translucent White</span>
    </button>
</div>

<div id="bottom-hud">
    <div class="hud-item">
        <span class="hud-label">Material:</span>
        <span class="hud-value" id="hud-material">Matte Black</span>
    </div>
    <div class="hud-separator"></div>
    <div class="hud-item">
        <span class="hud-label">Roughness:</span>
        <span class="hud-value" id="hud-roughness">0.90</span>
    </div>
    <div class="hud-separator"></div>
    <div class="hud-item">
        <span class="hud-label">Metalness:</span>
        <span class="hud-value" id="hud-metalness">0.10</span>
    </div>
    <div class="hud-separator"></div>
    <div class="hud-item">
        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;">
            <input type="checkbox" id="wireframe-toggle">
            <span class="hud-label">Wireframe</span>
        </label>
    </div>
    <div class="hud-separator"></div>
    <div class="hud-item">
        <span class="hud-label">Rotate:</span>
        <input type="range" id="rotate-speed" min="0" max="10" step="0.5" value="2.0">
        <span class="hud-value" id="hud-rotate-speed">2.0</span>
    </div>
    <div class="hud-separator"></div>
    <button class="action-btn" id="explode-btn">Explode View</button>
    <button class="action-btn" id="screenshotBtn">Screenshot</button>
</div>

<div id="keyboard-hints">
    <div><span class="key">1-5</span> Material presets</div>
    <div><span class="key">W</span> Toggle wireframe</div>
    <div><span class="key">E</span> Toggle explode</div>
    <div><span class="key">R</span> Reset camera</div>
    <div><span class="key">L</span> Toggle point light</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    modelLoaded: false,
    currentMaterial: 'Matte Black',
    materialIndex: 0,
    roughness: 0.9,
    metalness: 0.1,
    wireframe: false,
    exploded: false,
    explodeProgress: 0.0,
    autoRotateSpeed: 2.0,
    pointLightOn: true,
    cameraDistance: 0,
    meshCount: 0,
    frameCount: 0
};

const state = window.__3D_STATE__;

// Scene setup
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 5, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x4488ff, 0.6);
pointLight.position.set(-3, 2, -3);
scene.add(pointLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 2.0;
controls.minDistance = 2;
controls.maxDistance = 8;

// Generate carbon fiber bump map
function createCarbonFiberTexture() {
    const size = 256;
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    ctx.fillStyle = '#808080';
    ctx.fillRect(0, 0, size, size);

    const cellSize = 16;
    for (let y = 0; y < size; y += cellSize) {
        for (let x = 0; x < size; x += cellSize) {
            const isEven = ((x / cellSize) + (y / cellSize)) % 2 === 0;

            if (isEven) {
                // Diagonal lines one way
                ctx.strokeStyle = '#606060';
                ctx.lineWidth = 1;
                for (let i = -cellSize; i < cellSize * 2; i += 3) {
                    ctx.beginPath();
                    ctx.moveTo(x + i, y);
                    ctx.lineTo(x + i + cellSize, y + cellSize);
                    ctx.stroke();
                }
            } else {
                // Diagonal lines other way
                ctx.strokeStyle = '#a0a0a0';
                ctx.lineWidth = 1;
                for (let i = -cellSize; i < cellSize * 2; i += 3) {
                    ctx.beginPath();
                    ctx.moveTo(x + i + cellSize, y);
                    ctx.lineTo(x + i, y + cellSize);
                    ctx.stroke();
                }
            }

            // Cell border
            ctx.strokeStyle = '#505050';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, cellSize, cellSize);
        }
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    texture.repeat.set(4, 4);
    return texture;
}

const carbonFiberBumpMap = createCarbonFiberTexture();

// Material presets
const materialPresets = [
    {
        name: 'Matte Black',
        create: (wireframe) => new THREE.MeshStandardMaterial({
            color: 0x1a1a1a,
            roughness: 0.9,
            metalness: 0.1,
            wireframe: wireframe
        }),
        roughness: 0.9,
        metalness: 0.1
    },
    {
        name: 'Brushed Aluminum',
        create: (wireframe) => new THREE.MeshStandardMaterial({
            color: 0xc0c0c0,
            roughness: 0.35,
            metalness: 0.95,
            wireframe: wireframe
        }),
        roughness: 0.35,
        metalness: 0.95
    },
    {
        name: 'Rose Gold',
        create: (wireframe) => new THREE.MeshStandardMaterial({
            color: 0xb76e79,
            roughness: 0.25,
            metalness: 0.9,
            wireframe: wireframe
        }),
        roughness: 0.25,
        metalness: 0.9
    },
    {
        name: 'Carbon Fiber',
        create: (wireframe) => new THREE.MeshStandardMaterial({
            color: 0x2a2a2a,
            roughness: 0.4,
            metalness: 0.7,
            bumpMap: carbonFiberBumpMap,
            bumpScale: 0.3,
            wireframe: wireframe
        }),
        roughness: 0.4,
        metalness: 0.7
    },
    {
        name: 'Translucent White',
        create: (wireframe) => new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            roughness: 0.1,
            metalness: 0.0,
            transmission: 0.6,
            thickness: 1.5,
            ior: 1.5,
            wireframe: wireframe
        }),
        roughness: 0.1,
        metalness: 0.0
    }
];

// Model data
let modelGroup = null;
let meshChildren = [];
let meshOriginalPositions = [];
let meshExplodeDirections = [];
let explodeTarget = 0;
let explodeProgress = 0;

// Load model
const loader = new GLTFLoader();
loader.load(
    'PrimaryIonDrive.glb',
    (gltf) => {
        modelGroup = gltf.scene;

        // Compute bounding box and center
        const box = new THREE.Box3().setFromObject(modelGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // Center the model
        modelGroup.position.sub(center);

        // Scale so longest axis is ~2.5
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.5 / maxDim;
        modelGroup.scale.setScalar(scale);

        scene.add(modelGroup);

        // Collect mesh children
        meshChildren = [];
        modelGroup.traverse((child) => {
            if (child.isMesh) {
                meshChildren.push(child);
            }
        });

        state.meshCount = meshChildren.length;

        // Store original positions and compute explode directions
        // We need world positions relative to the model center
        modelGroup.updateMatrixWorld(true);
        const modelCenter = new THREE.Vector3();
        const modelBox = new THREE.Box3().setFromObject(modelGroup);
        modelBox.getCenter(modelCenter);

        meshOriginalPositions = [];
        meshExplodeDirections = [];

        meshChildren.forEach((mesh) => {
            meshOriginalPositions.push(mesh.position.clone());

            // Get world position of mesh
            const worldPos = new THREE.Vector3();
            mesh.getWorldPosition(worldPos);

            // Direction from model center
            const dir = worldPos.sub(modelCenter);
            if (dir.length() < 0.001) {
                dir.set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5);
            }
            dir.normalize();

            // Convert direction to local space of parent
            if (mesh.parent) {
                const parentInverse = new THREE.Matrix4();
                parentInverse.copy(mesh.parent.matrixWorld).invert();
                dir.transformDirection(parentInverse);
            }

            meshExplodeDirections.push(dir);
        });

        // Apply initial material
        applyMaterial(0);

        state.modelLoaded = true;

        // Hide loading overlay
        const overlay = document.getElementById('loading-overlay');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 500);
    },
    (progress) => {
        // Loading progress
    },
    (error) => {
        console.error('Error loading model:', error);
        const overlay = document.getElementById('loading-overlay');
        overlay.innerHTML = '<div style="color: #ff4444; font-size: 14px;">Error loading model</div>';
    }
);

// Apply material to all meshes
function applyMaterial(index) {
    if (!meshChildren.length) return;

    const preset = materialPresets[index];
    const material = preset.create(state.wireframe);

    meshChildren.forEach((mesh) => {
        if (mesh.material) {
            if (Array.isArray(mesh.material)) {
                mesh.material.forEach(m => m.dispose());
            } else {
                mesh.material.dispose();
            }
        }
        mesh.material = material;
    });

    state.materialIndex = index;
    state.currentMaterial = preset.name;
    state.roughness = preset.roughness;
    state.metalness = preset.metalness;

    updateUI();
}

function updateUI() {
    // Update buttons
    document.querySelectorAll('.material-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === state.materialIndex);
    });

    // Update HUD
    document.getElementById('hud-material').textContent = state.currentMaterial;
    document.getElementById('hud-roughness').textContent = state.roughness.toFixed(2);
    document.getElementById('hud-metalness').textContent = state.metalness.toFixed(2);
    document.getElementById('wireframe-toggle').checked = state.wireframe;
    document.getElementById('rotate-speed').value = state.autoRotateSpeed;
    document.getElementById('hud-rotate-speed').textContent = state.autoRotateSpeed.toFixed(1);

    const explodeBtn = document.getElementById('explode-btn');
    explodeBtn.textContent = state.exploded ? 'Collapse View' : 'Explode View';
}

// Event listeners
document.querySelectorAll('.material-btn').forEach((btn) => {
    btn.addEventListener('click', () => {
        const index = parseInt(btn.dataset.index);
        applyMaterial(index);
    });
});

document.getElementById('wireframe-toggle').addEventListener('change', (e) => {
    state.wireframe = e.target.checked;
    applyMaterial(state.materialIndex);
});

document.getElementById('rotate-speed').addEventListener('input', (e) => {
    const speed = parseFloat(e.target.value);
    state.autoRotateSpeed = speed;
    controls.autoRotateSpeed = speed;
    document.getElementById('hud-rotate-speed').textContent = speed.toFixed(1);
});

document.getElementById('explode-btn').addEventListener('click', () => {
    state.exploded = !state.exploded;
    explodeTarget = state.exploded ? 1 : 0;
    updateUI();
});

document.getElementById('screenshotBtn').addEventListener('click', () => {
    console.log('screenshot_taken');
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
    // Ignore if typing in an input
    if (e.target.tagName === 'INPUT') return;

    const key = e.key.toLowerCase();

    if (key >= '1' && key <= '5') {
        const index = parseInt(key) - 1;
        applyMaterial(index);
    } else if (key === 'w') {
        state.wireframe = !state.wireframe;
        applyMaterial(state.materialIndex);
    } else if (key === 'e') {
        state.exploded = !state.exploded;
        explodeTarget = state.exploded ? 1 : 0;
        updateUI();
    } else if (key === 'r') {
        camera.position.set(0, 1.5, 4);
        camera.lookAt(0, 0, 0);
        controls.target.set(0, 0, 0);
        controls.autoRotateSpeed = 2.0;
        state.autoRotateSpeed = 2.0;
        updateUI();
    } else if (key === 'l') {
        state.pointLightOn = !state.pointLightOn;
        pointLight.visible = state.pointLightOn;
    }
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Animate explode
    const lerpSpeed = 4.0; // ~500ms transition
    if (Math.abs(explodeProgress - explodeTarget) > 0.001) {
        explodeProgress += (explodeTarget - explodeProgress) * Math.min(lerpSpeed * delta * 4, 1);
        if (Math.abs(explodeProgress - explodeTarget) < 0.001) {
            explodeProgress = explodeTarget;
        }
    }
    state.explodeProgress = explodeProgress;

    // Update mesh positions for explode
    if (meshChildren.length > 0) {
        meshChildren.forEach((mesh, i) => {
            const orig = meshOriginalPositions[i];
            const dir = meshExplodeDirections[i];
            mesh.position.set(
                orig.x + dir.x * 0.8 * explodeProgress,
                orig.y + dir.y * 0.8 * explodeProgress,
                orig.z + dir.z * 0.8 * explodeProgress
            );
        });
    }

    controls.update();

    // Update state
    state.cameraDistance = camera.position.length();
    state.frameCount++;

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
