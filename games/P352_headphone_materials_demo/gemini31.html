<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Headphone Materials Demo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            z-index: 1;
        }
        .panel {
            position: absolute;
            background: rgba(15, 15, 25, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            z-index: 10;
            backdrop-filter: blur(4px);
        }
        #ui-top-left {
            top: 20px;
            left: 20px;
            width: 280px;
        }
        #ui-bottom {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 14px;
            white-space: nowrap;
        }
        h3 {
            margin: 0 0 15px 0;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .mat-btn {
            display: flex;
            align-items: center;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid transparent;
            border-radius: 6px;
            padding: 8px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .mat-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .swatch {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .controls-group {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .slider-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        input[type="range"] {
            width: 120px;
        }
        button.action-btn {
            background: #4488ff;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button.action-btn:hover {
            background: #3366cc;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            z-index: 20;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="loading">Loading Model...</div>

    <div id="ui-top-left" class="panel">
        <h3>Material Selector</h3>
        <div id="mat-container"></div>
        
        <div class="controls-group">
            <div class="slider-row">
                <span>Rotate Speed</span>
                <input type="range" id="speedSlider" min="0" max="10" step="0.5" value="2.0">
            </div>
            <button id="explodeBtn" class="action-btn">Explode View (E)</button>
            <button id="screenshotBtn" class="action-btn" style="background: #555;">Screenshot</button>
        </div>
    </div>

    <div id="ui-bottom" class="panel">
        <strong><span id="hud-name">Matte Black</span></strong>
        <span>Roughness: <span id="hud-rough">0.90</span></span>
        <span>Metalness: <span id="hud-metal">0.10</span></span>
        <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
            <input type="checkbox" id="wireframeToggle"> Wireframe (W)
        </label>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            modelLoaded: false,
            currentMaterial: 'Matte Black',
            materialIndex: 0,
            roughness: 0.9,
            metalness: 0.1,
            wireframe: false,
            exploded: false,
            explodeProgress: 0,
            autoRotateSpeed: 2.0,
            pointLightOn: true,
            cameraDistance: 4,
            meshCount: 0,
            frameCount: 0
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 5, 5);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x4488ff, 0.6);
        pointLight.position.set(-3, 2, -3);
        scene.add(pointLight);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = state.autoRotateSpeed;
        controls.minDistance = 2;
        controls.maxDistance = 8;

        // Generate Carbon Fiber Bump Map
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#888';
        ctx.fillRect(0, 0, 64, 64);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0); ctx.lineTo(64, 64);
        ctx.moveTo(64, 0); ctx.lineTo(0, 64);
        ctx.stroke();
        const carbonTex = new THREE.CanvasTexture(canvas);
        carbonTex.wrapS = THREE.RepeatWrapping;
        carbonTex.wrapT = THREE.RepeatWrapping;
        carbonTex.repeat.set(20, 20);

        // Material Presets
        const materialPresets = [
            { name: 'Matte Black', color: 0x1a1a1a, cssColor: '#1a1a1a', mat: new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.9, metalness: 0.1 }) },
            { name: 'Brushed Aluminum', color: 0xc0c0c0, cssColor: '#c0c0c0', mat: new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.35, metalness: 0.95 }) },
            { name: 'Rose Gold', color: 0xb76e79, cssColor: '#b76e79', mat: new THREE.MeshStandardMaterial({ color: 0xb76e79, roughness: 0.25, metalness: 0.9 }) },
            { name: 'Carbon Fiber', color: 0x2a2a2a, cssColor: '#2a2a2a', mat: new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.4, metalness: 0.7, bumpMap: carbonTex, bumpScale: 0.3 }) },
            { name: 'Translucent White', color: 0xffffff, cssColor: '#ffffff', mat: new THREE.MeshPhysicalMaterial({ color: 0xffffff, roughness: 0.1, metalness: 0.0, transmission: 0.6, thickness: 1.5, ior: 1.5 }) }
        ];

        // UI Setup
        const matContainer = document.getElementById('mat-container');
        materialPresets.forEach((preset, index) => {
            const btn = document.createElement('div');
            btn.className = 'mat-btn';
            btn.innerHTML = `<div class="swatch" style="background-color: ${preset.cssColor};"></div>${preset.name}`;
            if (index === 0) btn.style.border = '2px solid #00ff88';
            btn.onclick = () => applyMaterial(index);
            matContainer.appendChild(btn);
        });

        const hudName = document.getElementById('hud-name');
        const hudRough = document.getElementById('hud-rough');
        const hudMetal = document.getElementById('hud-metal');
        const wireframeToggle = document.getElementById('wireframeToggle');
        const speedSlider = document.getElementById('speedSlider');
        const explodeBtn = document.getElementById('explodeBtn');
        const screenshotBtn = document.getElementById('screenshotBtn');

        let meshes = [];

        // Load Model
        const loader = new GLTFLoader();
        loader.load('PrimaryIonDrive.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center and Scale
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.5 / maxDim;
            model.scale.setScalar(scale);

            const box2 = new THREE.Box3().setFromObject(model);
            const center = box2.getCenter(new THREE.Vector3());
            model.position.sub(center);

            scene.add(model);
            
            // Setup meshes for explode and materials
            model.updateMatrixWorld(true);
            const sceneCenter = new THREE.Vector3(0,0,0);

            model.traverse((child) => {
                if (child.isMesh) {
                    meshes.push(child);
                    
                    // Store original position
                    child.userData.origPos = child.position.clone();

                    // Calculate explode target position
                    const meshBox = new THREE.Box3().setFromObject(child);
                    const meshWorldCenter = meshBox.getCenter(new THREE.Vector3());
                    
                    const worldDir = meshWorldCenter.clone().sub(sceneCenter).normalize();
                    if(worldDir.lengthSq() === 0) worldDir.set(0,1,0);

                    const parentInverseRot = new THREE.Quaternion();
                    if (child.parent) {
                        child.parent.getWorldQuaternion(parentInverseRot).invert();
                    }
                    const localDir = worldDir.clone().applyQuaternion(parentInverseRot);
                    
                    child.userData.targetPos = child.position.clone().add(localDir.multiplyScalar(0.8));
                }
            });

            state.modelLoaded = true;
            state.meshCount = meshes.length;
            document.getElementById('loading').style.display = 'none';
            
            applyMaterial(0);

        }, undefined, (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = 'Error loading model. Ensure PrimaryIonDrive.glb is in the same directory.';
        });

        // Functions
        function applyMaterial(index) {
            state.materialIndex = index;
            const preset = materialPresets[index];
            state.currentMaterial = preset.name;
            state.roughness = preset.mat.roughness;
            state.metalness = preset.mat.metalness;

            preset.mat.wireframe = state.wireframe;

            meshes.forEach(m => {
                m.material = preset.mat;
            });

            // Update UI
            document.querySelectorAll('.mat-btn').forEach((btn, i) => {
                btn.style.border = i === index ? '2px solid #00ff88' : '2px solid transparent';
            });
            hudName.innerText = preset.name;
            hudRough.innerText = preset.mat.roughness.toFixed(2);
            hudMetal.innerText = preset.mat.metalness.toFixed(2);
        }

        // Event Listeners
        wireframeToggle.addEventListener('change', (e) => {
            state.wireframe = e.target.checked;
            materialPresets[state.materialIndex].mat.wireframe = state.wireframe;
        });

        speedSlider.addEventListener('input', (e) => {
            state.autoRotateSpeed = parseFloat(e.target.value);
            controls.autoRotateSpeed = state.autoRotateSpeed;
        });

        explodeBtn.addEventListener('click', () => {
            state.exploded = !state.exploded;
            explodeBtn.style.background = state.exploded ? '#ff4444' : '#4488ff';
        });

        screenshotBtn.addEventListener('click', () => {
            console.log('screenshot_taken');
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (['1','2','3','4','5'].includes(key)) {
                const idx = parseInt(key) - 1;
                if(state.modelLoaded) applyMaterial(idx);
            } else if (key === 'w') {
                wireframeToggle.checked = !wireframeToggle.checked;
                wireframeToggle.dispatchEvent(new Event('change'));
            } else if (key === 'e') {
                explodeBtn.click();
            } else if (key === 'r') {
                camera.position.set(0, 1.5, 4);
                controls.target.set(0,0,0);
                speedSlider.value = 2.0;
                speedSlider.dispatchEvent(new Event('input'));
            } else if (key === 'l') {
                state.pointLightOn = !state.pointLightOn;
                pointLight.visible = state.pointLightOn;
            }
        });

        // Animation Loop
        let lastTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = now - lastTime;
            lastTime = now;

            controls.update();

            // Explode Animation
            if (state.exploded && state.explodeProgress < 1) {
                state.explodeProgress = Math.min(1, state.explodeProgress + dt / 500);
            } else if (!state.exploded && state.explodeProgress > 0) {
                state.explodeProgress = Math.max(0, state.explodeProgress - dt / 500);
            }

            if (meshes.length > 0) {
                // Simple ease-in-out
                const t = state.explodeProgress;
                const easeT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
                
                meshes.forEach(m => {
                    m.position.lerpVectors(m.userData.origPos, m.userData.targetPos, easeT);
                });
            }

            // Update State
            state.cameraDistance = camera.position.distanceTo(controls.target);
            state.frameCount++;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
