<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Maze Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            z-index: 10;
        }
        #hud h1 {
            margin: 0 0 10px 0;
            font-size: 20px;
        }
        #timer {
            font-size: 24px;
            font-weight: bold;
            color: #00ffcc;
            margin-bottom: 15px;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            background: #444;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #666;
        }
        #minimap {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: white;
            border: 2px solid #333;
            border-radius: 4px;
            z-index: 10;
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            cursor: pointer;
        }
        #instructions {
            font-size: 24px;
            text-align: center;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="hud">
        <h1>3D Maze</h1>
        <div id="timer">00:00</div>
        <button id="solveBtn">求解路径 (ESC解锁鼠标)</button>
        <button id="newMazeBtn">生成新迷宫</button>
    </div>
    <canvas id="minimap" width="200" height="200"></canvas>
    <div id="crosshair"></div>
    <div id="blocker">
        <div id="instructions">
            <p style="font-size:36px; font-weight:bold;">点击屏幕开始</p>
            <p>WASD 移动 | 鼠标控制视角 | ESC 暂停/显示鼠标</p>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            mazeSize: 15,
            playerCell: { row: 0, col: 0 },
            exitCell: { row: 14, col: 14 },
            solved: false,
            pathLength: 0,
            timer: 0,
            wallCount: 0
        };

        const size = 15;
        const cellSize = 2;
        const wallHeight = 3;
        const wallThickness = 0.2;
        const speed = 5.0;

        let camera, scene, renderer, controls;
        let maze = [];
        let wallMeshes = [];
        let pathLine = null;
        let floorMeshes = [];
        
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        
        let prevTime = performance.now();
        let timerStarted = false;
        let startTime = 0;
        let gameWon = false;

        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');
        const timerEl = document.getElementById('timer');

        init();
        animate();

        function init() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 0, 25);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(15, 20, 15);
            scene.add(dirLight);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Controls
            controls = new PointerLockControls(camera, document.body);
            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            blocker.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => blocker.style.display = 'none');
            controls.addEventListener('unlock', () => blocker.style.display = 'flex');

            // Input
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // UI Buttons
            document.getElementById('solveBtn').addEventListener('click', solveMaze);
            document.getElementById('newMazeBtn').addEventListener('click', resetGame);

            // Window resize
            window.addEventListener('resize', onWindowResize);

            // Generate Initial Maze
            resetGame();
        }

        function generateMazeData() {
            maze = Array.from({length: size}, () => Array.from({length: size}, () => ({
                visited: false,
                walls: { top: true, right: true, bottom: true, left: true }
            })));

            const stack = [];
            let current = {r: 0, c: 0};
            maze[current.r][current.c].visited = true;
            let unvisitedCount = size * size - 1;

            while (unvisitedCount > 0) {
                const neighbors = [];
                const {r, c} = current;
                if (r > 0 && !maze[r-1][c].visited) neighbors.push({r: r-1, c: c, dir: 'top'});
                if (r < size-1 && !maze[r+1][c].visited) neighbors.push({r: r+1, c: c, dir: 'bottom'});
                if (c > 0 && !maze[r][c-1].visited) neighbors.push({r: r, c: c-1, dir: 'left'});
                if (c < size-1 && !maze[r][c+1].visited) neighbors.push({r: r, c: c+1, dir: 'right'});

                if (neighbors.length > 0) {
                    const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                    stack.push(current);
                    
                    if (next.dir === 'top') { maze[r][c].walls.top = false; maze[next.r][next.c].walls.bottom = false; }
                    if (next.dir === 'bottom') { maze[r][c].walls.bottom = false; maze[next.r][next.c].walls.top = false; }
                    if (next.dir === 'left') { maze[r][c].walls.left = false; maze[next.r][next.c].walls.right = false; }
                    if (next.dir === 'right') { maze[r][c].walls.right = false; maze[next.r][next.c].walls.left = false; }

                    current = {r: next.r, c: next.c};
                    maze[current.r][current.c].visited = true;
                    unvisitedCount--;
                } else if (stack.length > 0) {
                    current = stack.pop();
                }
            }
        }

        function build3DMaze() {
            // Clear old
            wallMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            floorMeshes.forEach(m => { scene.remove(m); m.geometry.dispose(); m.material.dispose(); });
            if (pathLine) { scene.remove(pathLine); pathLine.geometry.dispose(); pathLine.material.dispose(); pathLine = null; }
            wallMeshes = [];
            floorMeshes = [];
            window.__3D_STATE__.wallCount = 0;

            const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
            const floorMatPath = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.9 });
            const floorMatWall = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0 });

            // Base dark floor
            const baseFloorGeo = new THREE.PlaneGeometry(size * cellSize, size * cellSize);
            const baseFloor = new THREE.Mesh(baseFloorGeo, floorMatWall);
            baseFloor.rotation.x = -Math.PI / 2;
            baseFloor.position.set(size * cellSize / 2, 0, size * cellSize / 2);
            scene.add(baseFloor);
            floorMeshes.push(baseFloor);

            const hWallGeo = new THREE.BoxGeometry(cellSize + wallThickness, wallHeight, wallThickness);
            const vWallGeo = new THREE.BoxGeometry(wallThickness, wallHeight, cellSize + wallThickness);

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cx = c * cellSize + cellSize / 2;
                    const cz = r * cellSize + cellSize / 2;

                    // Path floor
                    const pathFloorGeo = new THREE.PlaneGeometry(cellSize - wallThickness, cellSize - wallThickness);
                    const pathFloor = new THREE.Mesh(pathFloorGeo, floorMatPath);
                    pathFloor.rotation.x = -Math.PI / 2;
                    pathFloor.position.set(cx, 0.01, cz);
                    scene.add(pathFloor);
                    floorMeshes.push(pathFloor);

                    const cell = maze[r][c];
                    
                    if (cell.walls.top) {
                        const wall = new THREE.Mesh(hWallGeo, wallMat);
                        wall.position.set(cx, wallHeight / 2, r * cellSize);
                        scene.add(wall);
                        wallMeshes.push(wall);
                        window.__3D_STATE__.wallCount++;
                    }
                    if (cell.walls.left) {
                        const wall = new THREE.Mesh(vWallGeo, wallMat);
                        wall.position.set(c * cellSize, wallHeight / 2, cz);
                        scene.add(wall);
                        wallMeshes.push(wall);
                        window.__3D_STATE__.wallCount++;
                    }
                    if (r === size - 1 && cell.walls.bottom) {
                        const wall = new THREE.Mesh(hWallGeo, wallMat);
                        wall.position.set(cx, wallHeight / 2, (r + 1) * cellSize);
                        scene.add(wall);
                        wallMeshes.push(wall);
                        window.__3D_STATE__.wallCount++;
                    }
                    if (c === size - 1 && cell.walls.right) {
                        const wall = new THREE.Mesh(vWallGeo, wallMat);
                        wall.position.set((c + 1) * cellSize, wallHeight / 2, cz);
                        scene.add(wall);
                        wallMeshes.push(wall);
                        window.__3D_STATE__.wallCount++;
                    }
                }
            }

            // Markers
            const markerGeo = new THREE.CylinderGeometry(0.4, 0.4, 2, 16);
            const startMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.7 });
            const startMarker = new THREE.Mesh(markerGeo, startMat);
            startMarker.position.set(cellSize/2, 1, cellSize/2);
            scene.add(startMarker);
            floorMeshes.push(startMarker);

            const endMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.7 });
            const endMarker = new THREE.Mesh(markerGeo, endMat);
            endMarker.position.set((size-1)*cellSize + cellSize/2, 1, (size-1)*cellSize + cellSize/2);
            scene.add(endMarker);
            floorMeshes.push(endMarker);
        }

        function resetGame() {
            generateMazeData();
            build3DMaze();
            
            camera.position.set(cellSize / 2, 1.5, cellSize / 2);
            camera.rotation.set(0, 0, 0);
            
            timerStarted = false;
            gameWon = false;
            window.__3D_STATE__.timer = 0;
            window.__3D_STATE__.solved = false;
            window.__3D_STATE__.pathLength = 0;
            timerEl.innerText = "00:00";
            
            if (pathLine) {
                scene.remove(pathLine);
                pathLine.geometry.dispose();
                pathLine.material.dispose();
                pathLine = null;
            }
        }

        function solveMaze() {
            if (window.__3D_STATE__.solved) return;

            const startR = Math.floor(camera.position.z / cellSize);
            const startC = Math.floor(camera.position.x / cellSize);
            const endR = size - 1;
            const endC = size - 1;

            if (startR < 0 || startR >= size || startC < 0 || startC >= size) return;

            const queue = [{r: startR, c: startC, path: [{r: startR, c: startC}]}];
            const visited = Array.from({length: size}, () => Array(size).fill(false));
            visited[startR][startC] = true;

            let finalPath = null;

            while(queue.length > 0) {
                const {r, c, path} = queue.shift();
                if (r === endR && c === endC) {
                    finalPath = path;
                    break;
                }

                const walls = maze[r][c].walls;
                if (!walls.top && !visited[r-1][c]) { visited[r-1][c] = true; queue.push({r: r-1, c: c, path: [...path, {r: r-1, c: c}]}); }
                if (!walls.bottom && !visited[r+1][c]) { visited[r+1][c] = true; queue.push({r: r+1, c: c, path: [...path, {r: r+1, c: c}]}); }
                if (!walls.left && !visited[r][c-1]) { visited[r][c-1] = true; queue.push({r: r, c: c-1, path: [...path, {r: r, c: c-1}]}); }
                if (!walls.right && !visited[r][c+1]) { visited[r][c+1] = true; queue.push({r: r, c: c+1, path: [...path, {r: r, c: c+1}]}); }
            }

            if (finalPath) {
                const points = finalPath.map(p => new THREE.Vector3(p.c * cellSize + cellSize/2, 0.5, p.r * cellSize + cellSize/2));
                const geometry = new THREE.BufferGeometry().setFromPoints(points);
                const material = new THREE.LineBasicMaterial({ color: 0x00aaff, linewidth: 3 });
                pathLine = new THREE.Line(geometry, material);
                scene.add(pathLine);

                window.__3D_STATE__.solved = true;
                window.__3D_STATE__.pathLength = finalPath.length;
            }
        }

        function drawMinimap() {
            const w = minimapCanvas.width;
            const h = minimapCanvas.height;
            const cw = w / size;
            const ch = h / size;

            minimapCtx.fillStyle = '#ffffff';
            minimapCtx.fillRect(0, 0, w, h);

            minimapCtx.strokeStyle = '#000000';
            minimapCtx.lineWidth = 2;
            minimapCtx.beginPath();

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const x = c * cw;
                    const y = r * ch;
                    const walls = maze[r][c].walls;
                    
                    if (walls.top) { minimapCtx.moveTo(x, y); minimapCtx.lineTo(x + cw, y); }
                    if (walls.left) { minimapCtx.moveTo(x, y); minimapCtx.lineTo(x, y + ch); }
                    if (r === size - 1 && walls.bottom) { minimapCtx.moveTo(x, y + ch); minimapCtx.lineTo(x + cw, y + ch); }
                    if (c === size - 1 && walls.right) { minimapCtx.moveTo(x + cw, y); minimapCtx.lineTo(x + cw, y + ch); }
                }
            }
            minimapCtx.stroke();

            // End
            minimapCtx.fillStyle = '#ff0000';
            minimapCtx.beginPath();
            minimapCtx.arc((size-1)*cw + cw/2, (size-1)*ch + ch/2, cw/3, 0, Math.PI*2);
            minimapCtx.fill();

            // Player
            const px = (camera.position.x / (size * cellSize)) * w;
            const py = (camera.position.z / (size * cellSize)) * h;
            minimapCtx.fillStyle = '#0000ff';
            minimapCtx.beginPath();
            minimapCtx.arc(px, py, cw/3, 0, Math.PI*2);
            minimapCtx.fill();
        }

        function checkCollision(x, z) {
            const radius = 0.3;
            const points = [
                {x: x - radius, z: z - radius},
                {x: x + radius, z: z - radius},
                {x: x - radius, z: z + radius},
                {x: x + radius, z: z + radius}
            ];

            const halfThick = wallThickness / 2;

            for (let p of points) {
                const c = Math.floor(p.x / cellSize);
                const r = Math.floor(p.z / cellSize);
                
                if (r < 0 || r >= size || c < 0 || c >= size) return true;

                const lx = p.x - c * cellSize;
                const lz = p.z - r * cellSize;
                const cell = maze[r][c];

                if (cell.walls.left && lx < halfThick) return true;
                if (cell.walls.right && lx > cellSize - halfThick) return true;
                if (cell.walls.top && lz < halfThick) return true;
                if (cell.walls.bottom && lz > cellSize - halfThick) return true;
            }
            return false;
        }

        function onKeyDown(event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = true; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = true; break;
                case 'ArrowDown': case 'KeyS': moveBackward = true; break;
                case 'ArrowRight': case 'KeyD': moveRight = true; break;
            }
            if (!timerStarted && !gameWon && (moveForward || moveBackward || moveLeft || moveRight)) {
                timerStarted = true;
                startTime = performance.now() - (window.__3D_STATE__.timer * 1000);
            }
        }

        function onKeyUp(event) {
            switch (event.code) {
                case 'ArrowUp': case 'KeyW': moveForward = false; break;
                case 'ArrowLeft': case 'KeyA': moveLeft = false; break;
                case 'ArrowDown': case 'KeyS': moveBackward = false; break;
                case 'ArrowRight': case 'KeyD': moveRight = false; break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                const moveVec = new THREE.Vector3();
                if (moveForward) moveVec.add(forward);
                if (moveBackward) moveVec.sub(forward);
                if (moveLeft) moveVec.sub(right);
                if (moveRight) moveVec.add(right);
                
                if (moveVec.lengthSq() > 0) {
                    moveVec.normalize().multiplyScalar(speed * delta);
                    
                    const nextX = camera.position.x + moveVec.x;
                    const nextZ = camera.position.z + moveVec.z;

                    if (!checkCollision(nextX, camera.position.z)) camera.position.x = nextX;
                    if (!checkCollision(camera.position.x, nextZ)) camera.position.z = nextZ;
                }

                // Check Win
                const c = Math.floor(camera.position.x / cellSize);
                const r = Math.floor(camera.position.z / cellSize);
                if (c === size - 1 && r === size - 1 && !gameWon) {
                    gameWon = true;
                    timerStarted = false;
                }

                // Update State
                window.__3D_STATE__.playerCell = { row: r, col: c };
            }

            // Timer
            if (timerStarted) {
                const elapsed = (time - startTime) / 1000;
                window.__3D_STATE__.timer = elapsed;
                const m = Math.floor(elapsed / 60).toString().padStart(2, '0');
                const s = Math.floor(elapsed % 60).toString().padStart(2, '0');
                timerEl.innerText = `${m}:${s}`;
            }

            drawMinimap();
            renderer.render(scene, camera);
            prevTime = time;
        }
    </script>
</body>
</html>
