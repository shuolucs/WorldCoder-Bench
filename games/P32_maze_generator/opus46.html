<!DOCTYPE html>
<html lang="en">
<head>

<title>3D Maze Game with Pathfinding</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  #buttons button {

  #solveBtn {

  #newMazeBtn {

  }
  #newMazeBtn:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(245,87,108,0.6); }

  #crosshair {

  #overlay {

  }

  #overlay h1 {

  #winOverlay p {

  #winOverlay button {

  #instructions {

</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="overlay">
  <h1>🏰 3D MAZE</h1>
  <p>Click to start — Find the exit!</p>
  <p style="font-size:14px; color:#666;">WASD to move · Mouse to look</p>
</div>

<div id="winOverlay">
  <h1>🎉 YOU WIN!</h1>
  <p id="winTime"></p>
  <button id="playAgainBtn">Play Again</button>
</div>

<div id="crosshair"></div>
<div id="timer">00:00</div>
<canvas id="minimap" width="200" height="200"></canvas>

<div id="buttons">
  <button id="solveBtn">🧭 Solve</button>
  <button id="newMazeBtn">🔄 New Maze</button>
</div>

<div id="instructions">
  WASD — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; ESC — Pause
</div>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============ GLOBALS ============
const MAZE_SIZE = 15;
const CELL_SIZE = 2;
const WALL_HEIGHT = 3;
const WALL_THICKNESS = 0.2;
const PLAYER_SPEED = 5;
const PLAYER_RADIUS = 0.6;
const PLAYER_HEIGHT = 1.6;

let scene, camera, renderer, controls;
let maze = [];       // maze[row][col] = { walls: {N,S,E,W}, visited }
let wallMeshes = [];
let floorMeshes = [];
let pathLine = null;
let startMarker, exitMarker;
let solved = false;
let pathLength = 0;
let wallCount = 0;
let timerStarted = false;
let timerRunning = false;
let startTime = 0;
let elapsedSeconds = 0;
let gameWon = false;

const keys = { w: false, a: false, s: false, d: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

// ============ INIT ============
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 5, 30);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(1, PLAYER_HEIGHT, 1);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  controls = new PointerLockControls(camera, document.body);

  // Lighting
  const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(15, 20, 15);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 60;
  dirLight.shadow.camera.left = -35;
  dirLight.shadow.camera.right = 35;
  dirLight.shadow.camera.top = 35;
  dirLight.shadow.camera.bottom = -35;
  scene.add(dirLight);

  // Player torch light
  const pointLight = new THREE.PointLight(0xffeedd, 1.5, 12);
  pointLight.position.set(0, 0, 0);
  camera.add(pointLight);
  scene.add(camera);

  // Generate maze
  generateMaze();
  buildMazeGeometry();

  // Events
  document.getElementById('overlay').addEventListener('click', () => {
    controls.lock();
  });

  controls.addEventListener('lock', () => {
    document.getElementById('overlay').style.display = 'none';
  });

  controls.addEventListener('unlock', () => {
    if (!gameWon) {
      document.getElementById('overlay').style.display = 'flex';
    }
  });

  document.addEventListener('keydown', (e) => {
    switch(e.code) {
      case 'KeyW': keys.w = true; break;
      case 'KeyA': keys.a = true; break;
      case 'KeyS': keys.s = true; break;
      case 'KeyD': keys.d = true; break;
    }
  });

  document.addEventListener('keyup', (e) => {
    switch(e.code) {
      case 'KeyW': keys.w = false; break;
      case 'KeyA': keys.a = false; break;
      case 'KeyS': keys.s = false; break;
      case 'KeyD': keys.d = false; break;
    }
  });

  document.getElementById('solveBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    solveMaze();
  });

  document.getElementById('newMazeBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    resetGame();
  });

  document.getElementById('playAgainBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    document.getElementById('winOverlay').style.display = 'none';
    resetGame();
    controls.lock();
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Init state
  window.__3D_STATE__ = {
    mazeSize: MAZE_SIZE,
    playerCell: { row: 0, col: 0 },
    exitCell: { row: 14, col: 14 },
    solved: false,
    pathLength: 0,
    timer: 0,
    wallCount: 0
  };

  animate();
}

// ============ MAZE GENERATION (DFS Recursive Backtracker) ============
function generateMaze() {
  maze = [];
  for (let r = 0; r < MAZE_SIZE; r++) {
    maze[r] = [];
    for (let c = 0; c < MAZE_SIZE; c++) {
      maze[r][c] = {
        walls: { N: true, S: true, E: true, W: true },
        visited: false
      };
    }
  }

  const stack = [];
  const startR = 0, startC = 0;
  maze[startR][startC].visited = true;
  stack.push([startR, startC]);

  const dirs = [
    { dr: -1, dc: 0, wall: 'N', opposite: 'S' },
    { dr: 1, dc: 0, wall: 'S', opposite: 'N' },
    { dr: 0, dc: 1, wall: 'E', opposite: 'W' },
    { dr: 0, dc: -1, wall: 'W', opposite: 'E' }
  ];

  while (stack.length > 0) {
    const [cr, cc] = stack[stack.length - 1];
    const neighbors = [];

    for (const d of dirs) {
      const nr = cr + d.dr;
      const nc = cc + d.dc;
      if (nr >= 0 && nr < MAZE_SIZE && nc >= 0 && nc < MAZE_SIZE && !maze[nr][nc].visited) {
        neighbors.push({ nr, nc, wall: d.wall, opposite: d.opposite });
      }
    }

    if (neighbors.length === 0) {
      stack.pop();
    } else {
      const chosen = neighbors[Math.floor(Math.random() * neighbors.length)];
      maze[cr][cc].walls[chosen.wall] = false;
      maze[chosen.nr][chosen.nc].walls[chosen.opposite] = false;
      maze[chosen.nr][chosen.nc].visited = true;
      stack.push([chosen.nr, chosen.nc]);
    }
  }
}

// ============ BUILD 3D MAZE ============
function buildMazeGeometry() {
  // Clear old
  for (const m of wallMeshes) { scene.remove(m); m.geometry.dispose(); }
  for (const m of floorMeshes) { scene.remove(m); m.geometry.dispose(); }
  wallMeshes = [];
  floorMeshes = [];
  wallCount = 0;

  if (startMarker) { scene.remove(startMarker); }
  if (exitMarker) { scene.remove(exitMarker); }
  if (pathLine) { scene.remove(pathLine); pathLine = null; }

  const wallMat = new THREE.MeshStandardMaterial({
    color: 0x2c2c3e,
    roughness: 0.8,
    metalness: 0.2
  });

  const floorLightMat = new THREE.MeshStandardMaterial({
    color: 0x8899aa,
    roughness: 0.9,
    metalness: 0.1
  });

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE + 2, MAZE_SIZE * CELL_SIZE + 2);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x3a3a4e, roughness: 1 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.set(MAZE_SIZE * CELL_SIZE / 2, -0.01, MAZE_SIZE * CELL_SIZE / 2);
  ground.receiveShadow = true;
  scene.add(ground);
  floorMeshes.push(ground);

  // Floor tiles for each cell
  for (let r = 0; r < MAZE_SIZE; r++) {
    for (let c = 0; c < MAZE_SIZE; c++) {
      const cx = c * CELL_SIZE + CELL_SIZE / 2;
      const cz = r * CELL_SIZE + CELL_SIZE / 2;

      const tileGeo = new THREE.PlaneGeometry(CELL_SIZE - 0.05, CELL_SIZE - 0.05);
      const tile = new THREE.Mesh(tileGeo, floorLightMat);
      tile.rotation.x = -Math.PI / 2;
      tile.position.set(cx, 0.01, cz);
      tile.receiveShadow = true;
      scene.add(tile);
      floorMeshes.push(tile);
    }
  }

  // Walls
  // We track which wall segments we've already placed to avoid duplicates
  const placedH = new Set(); // horizontal walls (N/S)
  const placedV = new Set(); // vertical walls (E/W)

  for (let r = 0; r < MAZE_SIZE; r++) {
    for (let c = 0; c < MAZE_SIZE; c++) {
      const cx = c * CELL_SIZE + CELL_SIZE / 2;
      const cz = r * CELL_SIZE + CELL_SIZE / 2;
      const cell = maze[r][c];

      // North wall (top edge of cell, at z = r * CELL_SIZE)
      if (cell.walls.N) {
        const key = `H_${r}_${c}`;
        if (!placedH.has(key)) {
          placedH.add(key);
          const wallGeo = new THREE.BoxGeometry(CELL_SIZE + WALL_THICKNESS, WALL_HEIGHT, WALL_THICKNESS);
          const wall = new THREE.Mesh(wallGeo, wallMat);
          wall.position.set(cx, WALL_HEIGHT / 2, r * CELL_SIZE);
          wall.castShadow = true;
          wall.receiveShadow = true;
          scene.add(wall);
          wallMeshes.push(wall);
          wallCount++;
        }
      }

      // South wall
      if (cell.walls.S) {
        const key = `H_${r + 1}_${c}`;
        if (!placedH.has(key)) {
          placedH.add(key);
          const wallGeo = new THREE.BoxGeometry(CELL_SIZE + WALL_THICKNESS, WALL_HEIGHT, WALL_THICKNESS);
          const wall = new THREE.Mesh(wallGeo, wallMat);
          wall.position.set(cx, WALL_HEIGHT / 2, (r + 1) * CELL_SIZE);
          wall.castShadow = true;
          wall.receiveShadow = true;
          scene.add(wall);
          wallMeshes.push(wall);
          wallCount++;
        }
      }

      // West wall
      if (cell.walls.W) {
        const key = `V_${r}_${c}`;
        if (!placedV.has(key)) {
          placedV.add(key);
          const wallGeo = new THREE.BoxGeometry(WALL_THICKNESS, WALL_HEIGHT, CELL_SIZE + WALL_THICKNESS);
          const wall = new THREE.Mesh(wallGeo, wallMat);
          wall.position.set(c * CELL_SIZE, WALL_HEIGHT / 2, cz);
          wall.castShadow = true;
          wall.receiveShadow = true;
          scene.add(wall);
          wallMeshes.push(wall);
          wallCount++;
        }
      }

      // East wall
      if (cell.walls.E) {
        const key = `V_${r}_${c + 1}`;
        if (!placedV.has(key)) {
          placedV.add(key);
          const wallGeo = new THREE.BoxGeometry(WALL_THICKNESS, WALL_HEIGHT, CELL_SIZE + WALL_THICKNESS);
          const wall = new THREE.Mesh(wallGeo, wallMat);
          wall.position.set((c + 1) * CELL_SIZE, WALL_HEIGHT / 2, cz);
          wall.castShadow = true;
          wall.receiveShadow = true;
          scene.add(wall);
          wallMeshes.push(wall);
          wallCount++;
        }
      }
    }
  }

  // Ceiling (optional, adds atmosphere)
  const ceilGeo = new THREE.PlaneGeometry(MAZE_SIZE * CELL_SIZE + 2, MAZE_SIZE * CELL_SIZE + 2);
  const ceilMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 1, side: THREE.DoubleSide });
  const ceil = new THREE.Mesh(ceilGeo, ceilMat);
  ceil.rotation.x = Math.PI / 2;
  ceil.position.set(MAZE_SIZE * CELL_SIZE / 2, WALL_HEIGHT, MAZE_SIZE * CELL_SIZE / 2);
  scene.add(ceil);
  floorMeshes.push(ceil);

  // Start marker (green)
  const startGeo = new THREE.CylinderGeometry(0.3, 0.3, 2, 16);
  const startMat = new THREE.MeshStandardMaterial({
    color: 0x00ff88,
    emissive: 0x00ff88,
    emissiveIntensity: 0.5
  });
  startMarker = new THREE.Mesh(startGeo, startMat);
  startMarker.position.set(CELL_SIZE / 2, 1, CELL_SIZE / 2);
  scene.add(startMarker);

  const startLight = new THREE.PointLight(0x00ff88, 2, 5);
  startLight.position.set(0, 2, 0);
  startMarker.add(startLight);

  // Exit marker (red)
  const exitGeo = new THREE.CylinderGeometry(0.3, 0.3, 2, 16);
  const exitMat = new THREE.MeshStandardMaterial({
    color: 0xff4444,
    emissive: 0xff4444,
    emissiveIntensity: 0.5
  });
  exitMarker = new THREE.Mesh(exitGeo, exitMat);
  exitMarker.position.set(14 * CELL_SIZE + CELL_SIZE / 2, 1, 14 * CELL_SIZE + CELL_SIZE / 2);
  scene.add(exitMarker);

  const exitLight = new THREE.PointLight(0xff4444, 2, 5);
  exitLight.position.set(0, 2, 0);
  exitMarker.add(exitLight);
}

// ============ COLLISION DETECTION ============
function checkCollision(position, moveDir) {
  const raycaster = new THREE.Raycaster(position.clone(), moveDir.clone().normalize(), 0, PLAYER_RADIUS);
  const intersects = raycaster.intersectObjects(wallMeshes);
  return intersects.length > 0;
}

// ============ PLAYER MOVEMENT ============
let prevTime = performance.now();

function updatePlayer(delta) {
  if (!controls.isLocked) return;

  const moveSpeed = PLAYER_SPEED * delta;

  // Get camera forward/right vectors (horizontal only)
  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.y = 0;
  forward.normalize();

  const right = new THREE.Vector3();
  right.crossVectors(forward, new THREE.Vector3(0, 1, 0)).normalize();

  direction.set(0, 0, 0);
  if (keys.w) direction.add(forward);
  if (keys.s) direction.sub(forward);
  if (keys.d) direction.add(right);
  if (keys.a) direction.sub(right);

  if (direction.length() > 0) {
    direction.normalize();

    if (!timerStarted && !gameWon) {
      timerStarted = true;
      timerRunning = true;
      startTime = performance.now();
    }

    const newPos = camera.position.clone();

    // Try X movement
    const moveX = new THREE.Vector3(direction.x * moveSpeed, 0, 0);
    const testPosX = camera.position.clone().add(moveX);
    testPosX.y = PLAYER_HEIGHT;

    // Check collision in X direction
    const dirX = new THREE.Vector3(direction.x > 0 ? 1 : -1, 0, 0);
    if (!checkCollision(new THREE.Vector3(camera.position.x, PLAYER_HEIGHT * 0.5, camera.position.z), dirX)) {
      newPos.x = testPosX.x;
    }

    // Try Z movement
    const moveZ = new THREE.Vector3(0, 0, direction.z * moveSpeed);
    const testPosZ = newPos.clone().add(moveZ);

    const dirZ = new THREE.Vector3(0, 0, direction.z > 0 ? 1 : -1);
    if (!checkCollision(new THREE.Vector3(newPos.x, PLAYER_HEIGHT * 0.5, camera.position.z), dirZ)) {
      newPos.z = testPosZ.z;
    }

    // Clamp to maze bounds
    newPos.x = Math.max(0.3, Math.min(MAZE_SIZE * CELL_SIZE - 0.3, newPos.x));
    newPos.z = Math.max(0.3, Math.min(MAZE_SIZE * CELL_SIZE - 0.3, newPos.z));
    newPos.y = PLAYER_HEIGHT;

    camera.position.copy(newPos);
  }

  // Check win condition
  const playerCol = Math.floor(camera.position.x / CELL_SIZE);
  const playerRow = Math.floor(camera.position.z / CELL_SIZE);

  if (playerRow === 14 && playerCol === 14 && !gameWon) {
    gameWon = true;
    timerRunning = false;
    controls.unlock();
    document.getElementById('winTime').textContent = `Time: ${formatTime(elapsedSeconds)}`;
    document.getElementById('winOverlay').style.display = 'flex';
  }
}

// ============ TIMER ============
function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function updateTimer() {
  if (timerRunning) {
    elapsedSeconds = (performance.now() - startTime) / 1000;
  }
  document.getElementById('timer').textContent = formatTime(elapsedSeconds);
}

// ============ MINIMAP ============
function drawMinimap() {
  const canvas = document.getElementById('minimap');
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const cellW = w / MAZE_SIZE;
  const cellH = h / MAZE_SIZE;

  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, w, h);

  // Draw cells (white for passages)
  for (let r = 0; r < MAZE_SIZE; r++) {
    for (let c = 0; c < MAZE_SIZE; c++) {
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(c * cellW + 1, r * cellH + 1, cellW - 2, cellH - 2);
    }
  }

  // Draw walls
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;

  for (let r = 0; r < MAZE_SIZE; r++) {
    for (let c = 0; c < MAZE_SIZE; c++) {
      const x = c * cellW;
      const y = r * cellH;
      const cell = maze[r][c];

      if (cell.walls.N) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + cellW, y);
        ctx.stroke();
      }
      if (cell.walls.S) {
        ctx.beginPath();
        ctx.moveTo(x, y + cellH);
        ctx.lineTo(x + cellW, y + cellH);
        ctx.stroke();
      }
      if (cell.walls.W) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + cellH);
        ctx.stroke();
      }
      if (cell.walls.E) {
        ctx.beginPath();
        ctx.moveTo(x + cellW, y);
        ctx.lineTo(x + cellW, y + cellH);
        ctx.stroke();
      }
    }
  }

  // Draw solved path on minimap
  if (solved && pathLine && pathLine.userData.pathCells) {
    ctx.strokeStyle = 'rgba(255, 200, 0, 0.8)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    const cells = pathLine.userData.pathCells;
    for (let i = 0; i < cells.length; i++) {
      const px = cells[i].col * cellW + cellW / 2;
      const py = cells[i].row * cellH + cellH / 2;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }
    ctx.stroke();
  }

  // Exit marker (red)
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.arc(14 * cellW + cellW / 2, 14 * cellH + cellH / 2, 4, 0, Math.PI * 2);
  ctx.fill();

  // Player position (blue)
  const playerCol = camera.position.x / CELL_SIZE;
  const playerRow = camera.position.z / CELL_SIZE;
  ctx.fillStyle = '#4488ff';
  ctx.beginPath();
  ctx.arc(playerCol * cellW, playerRow * cellH, 4, 0, Math.PI * 2);
  ctx.fill();

  // Player direction indicator
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  ctx.strokeStyle = '#4488ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(playerCol * cellW, playerRow * cellH);
  ctx.lineTo(playerCol * cellW + dir.x * 10, playerRow * cellH + dir.z * 10);
  ctx.stroke();
}

// ============ PATHFINDING (BFS) ============
function solveMaze() {
  if (pathLine) {
    scene.remove(pathLine);
    pathLine = null;
  }

  const playerCol = Math.floor(camera.position.x / CELL_SIZE);
  const playerRow = Math.floor(camera.position.z / CELL_SIZE);
  const startR = Math.max(0, Math.min(MAZE_SIZE - 1, playerRow));
  const startC = Math.max(0, Math.min(MAZE_SIZE - 1, playerCol));
  const endR = 14, endC = 14;

  // BFS
  const visited = Array.from({ length: MAZE_SIZE }, () => Array(MAZE_SIZE).fill(false));
  const parent = Array.from({ length: MAZE_SIZE }, () => Array(MAZE_SIZE).fill(null));
  const queue = [[startR, startC]];
  visited[startR][startC] = true;

  const dirs = [
    { dr: -1, dc: 0, wall: 'N', opposite: 'S' },
    { dr: 1, dc: 0, wall: 'S', opposite: 'N' },
    { dr: 0, dc: 1, wall: 'E', opposite: 'W' },
    { dr: 0, dc: -1, wall: 'W', opposite: 'E' }
  ];

  let found = false;

  while (queue.length > 0) {
    const [cr, cc] = queue.shift();

    if (cr === endR && cc === endC) {
      found = true;
      break;
    }

    for (const d of dirs) {
      const nr = cr + d.dr;
      const nc = cc + d.dc;

      if (nr >= 0 && nr < MAZE_SIZE && nc >= 0 && nc < MAZE_SIZE &&
          !visited[nr][nc] && !maze[cr][cc].walls[d.wall]) {
        visited[nr][nc] = true;
        parent[nr][nc] = [cr, cc];
        queue.push([nr, nc]);
      }
    }
  }

  if (!found) return;

  // Reconstruct path
  const path = [];
  let cur = [endR, endC];
  while (cur) {
    path.unshift({ row: cur[0], col: cur[1] });
    cur = parent[cur[0]][cur[1]];
  }

  pathLength = path.length;
  solved = true;

  // Draw path in 3D
  const points = path.map(p =>
    new THREE.Vector3(
      p.col * CELL_SIZE + CELL_SIZE / 2,
      0.3,
      p.row * CELL_SIZE + CELL_SIZE / 2
    )
  );

  const curve = new THREE.CatmullRomCurve3(points, false);
  const tubeGeo = new THREE.TubeGeometry(curve, points.length * 4, 0.08, 8, false);
  const tubeMat = new THREE.MeshStandardMaterial({
    color: 0xffcc00,
    emissive: 0xffcc00,
    emissiveIntensity: 0.6,
    transparent: true,
    opacity: 0.8
  });
  pathLine = new THREE.Mesh(tubeGeo, tubeMat);
  pathLine.userData.pathCells = path;
  scene.add(pathLine);
}

// ============ RESET ============
function resetGame() {
  // Clear path
  if (pathLine) {
    scene.remove(pathLine);
    pathLine = null;
  }
  solved = false;
  pathLength = 0;
  timerStarted = false;
  timerRunning = false;
  elapsedSeconds = 0;
  startTime = 0;
  gameWon = false;

  document.getElementById('winOverlay').style.display = 'none';

  // Regenerate
  generateMaze();
  buildMazeGeometry();

  // Reset player
  camera.position.set(CELL_SIZE / 2, PLAYER_HEIGHT, CELL_SIZE / 2);
  camera.rotation.set(0, 0, 0);
}

// ============ ANIMATE ============
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const delta = Math.min((now - prevTime) / 1000, 0.1);
  prevTime = now;

  updatePlayer(delta);
  updateTimer();
  drawMinimap();

  // Animate markers
  if (startMarker) {
    startMarker.rotation.y += delta * 1.5;
    startMarker.position.y = 1 + Math.sin(now * 0.002) * 0.2;
  }
  if (exitMarker) {
    exitMarker.rotation.y -= delta * 1.5;
    exitMarker.position.y = 1 + Math.sin(now * 0.002 + Math.PI) * 0.2;
  }

  // Update state
  const playerCol = Math.floor(camera.position.x / CELL_SIZE);
  const playerRow = Math.floor(camera.position.z / CELL_SIZE);

  window.__3D_STATE__ = {
    mazeSize: MAZE_SIZE,
    playerCell: {
      row: Math.max(0, Math.min(MAZE_SIZE - 1, playerRow)),
      col: Math.max(0, Math.min(MAZE_SIZE - 1, playerCol))
    },
    exitCell: { row: 14, col: 14 },
    solved: solved,
    pathLength: pathLength,
    timer: Math.floor(elapsedSeconds),
    wallCount: wallCount
  };

  renderer.render(scene, camera);
}

// ============ START ============
init();
</script>
