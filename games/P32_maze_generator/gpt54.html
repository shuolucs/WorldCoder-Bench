<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 迷宫游戏</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 20;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #fff;
    }

    #timer {
      padding: 8px 12px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      width: fit-content;
      min-width: 90px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      background: #2c7be5;
      color: #fff;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #newMazeBtn {
      background: #28a745;
    }

    #minimap {
      position: fixed;
      top: 12px;
      right: 12px;
      width: 200px;
      height: 200px;
      background: rgba(255,255,255,0.9);
      border: 2px solid #222;
      z-index: 20;
    }

    #hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      user-select: none;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 15;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 22px;
      cursor: pointer;
      user-select: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="ui">
    <div id="timer">00:00</div>
    <div class="btn-row">
      <button id="solveBtn">求解</button>
      <button id="newMazeBtn">新迷宫</button>
    </div>
  </div>

  <canvas id="minimap" width="200" height="200"></canvas>
  <div id="hint">点击屏幕进入第一人称；WASD 移动；鼠标转向</div>
  <div id="overlay">点击开始游戏</div>

  <script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    const MAZE_SIZE = 15;
    const CELL_SIZE = 2;
    const HALF_CELL = CELL_SIZE / 2;
    const WALL_THICKNESS = 0.2;
    const WALL_HEIGHT = 3;
    const MOVE_SPEED = 5;
    const PLAYER_EYE_HEIGHT = 1.0;
    const COLLISION_DISTANCE = 0.6;
    const EXIT_CELL = { row: 14, col: 14 };

    let scene, camera, renderer, controls, clock;
    let wallGroup, floorGroup, markerGroup, pathGroup;
    let minimapCanvas, minimapCtx;
    let maze;
    let wallMeshes = [];
    let wallCount = 0;

    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;

    let solved = false;
    let pathLength = 0;

    let timerStarted = false;
    let timerRunning = false;
    let elapsedTime = 0;

    let reachedExit = false;

    const timerEl = document.getElementById('timer');
    const solveBtn = document.getElementById('solveBtn');
    const newMazeBtn = document.getElementById('newMazeBtn');
    const overlay = document.getElementById('overlay');
    minimapCanvas = document.getElementById('minimap');
    minimapCtx = minimapCanvas.getContext('2d');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x20252b);
      scene.fog = new THREE.Fog(0x20252b, 15, 60);

      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 200);
      camera.position.set(HALF_CELL, PLAYER_EYE_HEIGHT, HALF_CELL);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      controls = new PointerLockControls(camera, document.body);

      overlay.addEventListener('click', () => controls.lock());
      controls.addEventListener('lock', () => overlay.style.display = 'none');
      controls.addEventListener('unlock', () => overlay.style.display = 'flex');

      const ambient = new THREE.AmbientLight(0xffffff, 0.65);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.85);
      dirLight.position.set(10, 20, 8);
      scene.add(dirLight);

      const hemi = new THREE.HemisphereLight(0xbfdfff, 0x404040, 0.6);
      scene.add(hemi);

      wallGroup = new THREE.Group();
      floorGroup = new THREE.Group();
      markerGroup = new THREE.Group();
      pathGroup = new THREE.Group();

      scene.add(floorGroup, wallGroup, markerGroup, pathGroup);

      setupInput();
      setupButtons();
      generateNewMaze();

      window.addEventListener('resize', onResize);
    }

    function setupInput() {
      document.addEventListener('keydown', (e) => {
        switch (e.code) {
          case 'KeyW': moveForward = true; break;
          case 'KeyS': moveBackward = true; break;
          case 'KeyA': moveLeft = true; break;
          case 'KeyD': moveRight = true; break;
        }
      });

      document.addEventListener('keyup', (e) => {
        switch (e.code) {
          case 'KeyW': moveForward = false; break;
          case 'KeyS': moveBackward = false; break;
          case 'KeyA': moveLeft = false; break;
          case 'KeyD': moveRight = false; break;
        }
      });
    }

    function setupButtons() {
      solveBtn.addEventListener('click', () => {
        const playerCell = worldToCell(camera.position);
        const path = bfs(playerCell, EXIT_CELL);
        clearPath();

        if (path && path.length > 0) {
          drawPath3D(path);
          solved = true;
          pathLength = path.length;
        } else {
          solved = false;
          pathLength = 0;
        }
      });

      newMazeBtn.addEventListener('click', () => {
        generateNewMaze();
      });
    }

    function generateEmptyMaze(size) {
      const m = [];
      for (let r = 0; r < size; r++) {
        const row = [];
        for (let c = 0; c < size; c++) {
          row.push({
            row: r,
            col: c,
            visited: false,
            walls: { top: true, right: true, bottom: true, left: true }
          });
        }
        m.push(row);
      }
      return m;
    }

    function generateMazeDFS(size) {
      const m = generateEmptyMaze(size);
      const stack = [];
      const start = m[0][0];
      start.visited = true;
      stack.push(start);

      while (stack.length > 0) {
        const current = stack[stack.length - 1];
        const neighbors = getUnvisitedNeighbors(m, current.row, current.col);

        if (neighbors.length > 0) {
          const next = neighbors[Math.floor(Math.random() * neighbors.length)];
          removeWallBetween(current, next);
          next.visited = true;
          stack.push(next);
        } else {
          stack.pop();
        }
      }

      for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
          delete m[r][c].visited;
        }
      }

      return m;
    }

    function getUnvisitedNeighbors(m, row, col) {
      const dirs = [
        [-1, 0],
        [0, 1],
        [1, 0],
        [0, -1]
      ];
      const result = [];
      for (const [dr, dc] of dirs) {
        const nr = row + dr;
        const nc = col + dc;
        if (nr >= 0 && nr < MAZE_SIZE && nc >= 0 && nc < MAZE_SIZE && !m[nr][nc].visited) {
          result.push(m[nr][nc]);
        }
      }
      return result;
    }

    function removeWallBetween(a, b) {
      const dr = b.row - a.row;
      const dc = b.col - a.col;

      if (dr === -1) {
        a.walls.top = false;
        b.walls.bottom = false;
      } else if (dr === 1) {
        a.walls.bottom = false;
        b.walls.top = false;
      } else if (dc === -1) {
        a.walls.left = false;
        b.walls.right = false;
      } else if (dc === 1) {
        a.walls.right = false;
        b.walls.left = false;
      }
    }

    function generateNewMaze() {
      maze = generateMazeDFS(MAZE_SIZE);
      rebuildWorld();
      resetPlayerToStart();
      clearPath();
      solved = false;
      pathLength = 0;
      elapsedTime = 0;
      timerStarted = false;
      timerRunning = false;
      reachedExit = false;
      updateTimerDisplay();
      drawMinimap();
    }

    function clearGroup(group) {
      while (group.children.length) {
        const obj = group.children.pop();
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) {
          if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
          else obj.material.dispose();
        }
      }
    }

    function rebuildWorld() {
      clearGroup(wallGroup);
      clearGroup(floorGroup);
      clearGroup(markerGroup);
      wallMeshes = [];
      wallCount = 0;

      const floorLightMat = new THREE.MeshStandardMaterial({ color: 0xdedede });
      const floorDarkMat = new THREE.MeshStandardMaterial({ color: 0x6f6f6f });
      const floorGeo = new THREE.BoxGeometry(CELL_SIZE, 0.08, CELL_SIZE);

      for (let r = 0; r < MAZE_SIZE; r++) {
        for (let c = 0; c < MAZE_SIZE; c++) {
          const x = c * CELL_SIZE + HALF_CELL;
          const z = r * CELL_SIZE + HALF_CELL;

          const floor = new THREE.Mesh(floorGeo, floorLightMat);
          floor.position.set(x, -0.04, z);
          floor.receiveShadow = true;
          floorGroup.add(floor);
        }
      }

      const wallFloorGeoH = new THREE.BoxGeometry(CELL_SIZE + WALL_THICKNESS, 0.081, WALL_THICKNESS);
      const wallFloorGeoV = new THREE.BoxGeometry(WALL_THICKNESS, 0.081, CELL_SIZE + WALL_THICKNESS);

      for (let r = 0; r < MAZE_SIZE; r++) {
        for (let c = 0; c < MAZE_SIZE; c++) {
          const cell = maze[r][c];

          if (cell.walls.top) {
            const dark = new THREE.Mesh(wallFloorGeoH, floorDarkMat);
            dark.position.set(c * CELL_SIZE + HALF_CELL, -0.039, r * CELL_SIZE);
            floorGroup.add(dark);
          }
          if (cell.walls.left) {
            const dark = new THREE.Mesh(wallFloorGeoV, floorDarkMat);
            dark.position.set(c * CELL_SIZE, -0.039, r * CELL_SIZE + HALF_CELL);
            floorGroup.add(dark);
          }
          if (r === MAZE_SIZE - 1 && cell.walls.bottom) {
            const dark = new THREE.Mesh(wallFloorGeoH, floorDarkMat);
            dark.position.set(c * CELL_SIZE + HALF_CELL, -0.039, (r + 1) * CELL_SIZE);
            floorGroup.add(dark);
          }
          if (c === MAZE_SIZE - 1 && cell.walls.right) {
            const dark = new THREE.Mesh(wallFloorGeoV, floorDarkMat);
            dark.position.set((c + 1) * CELL_SIZE, -0.039, r * CELL_SIZE + HALF_CELL);
            floorGroup.add(dark);
          }
        }
      }

      const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2f, roughness: 0.9, metalness: 0.05 });
      const hGeo = new THREE.BoxGeometry(CELL_SIZE + WALL_THICKNESS, WALL_HEIGHT, WALL_THICKNESS);
      const vGeo = new THREE.BoxGeometry(WALL_THICKNESS, WALL_HEIGHT, CELL_SIZE + WALL_THICKNESS);

      for (let r = 0; r < MAZE_SIZE; r++) {
        for (let c = 0; c < MAZE_SIZE; c++) {
          const cell = maze[r][c];

          if (cell.walls.top) {
            addWallMesh(hGeo, wallMat, c * CELL_SIZE + HALF_CELL, WALL_HEIGHT / 2, r * CELL_SIZE);
          }
          if (cell.walls.left) {
            addWallMesh(vGeo, wallMat, c * CELL_SIZE, WALL_HEIGHT / 2, r * CELL_SIZE + HALF_CELL);
          }
          if (r === MAZE_SIZE - 1 && cell.walls.bottom) {
            addWallMesh(hGeo, wallMat, c * CELL_SIZE + HALF_CELL, WALL_HEIGHT / 2, (r + 1) * CELL_SIZE);
          }
          if (c === MAZE_SIZE - 1 && cell.walls.right) {
            addWallMesh(vGeo, wallMat, (c + 1) * CELL_SIZE, WALL_HEIGHT / 2, r * CELL_SIZE + HALF_CELL);
          }
        }
      }

      addMarker(0, 0, 0x00ff66);
      addMarker(EXIT_CELL.row, EXIT_CELL.col, 0xff3344);
    }

    function addWallMesh(geo, mat, x, y, z) {
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, y, z);
      wallGroup.add(mesh);
      wallMeshes.push(mesh);
      wallCount++;
    }

    function addMarker(row, col, color) {
      const geo = new THREE.CylinderGeometry(0.25, 0.25, 2.2, 24);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 0.6
      });
      const mesh = new THREE.Mesh(geo, mat);
      const p = cellToWorldCenter(row, col);
      mesh.position.set(p.x, 1.1, p.z);
      markerGroup.add(mesh);

      const light = new THREE.PointLight(color, 1.2, 6);
      light.position.set(p.x, 2.2, p.z);
      markerGroup.add(light);
    }

    function cellToWorldCenter(row, col) {
      return {
        x: col * CELL_SIZE + HALF_CELL,
        z: row * CELL_SIZE + HALF_CELL
      };
    }

    function worldToCell(pos) {
      let col = Math.floor(pos.x / CELL_SIZE);
      let row = Math.floor(pos.z / CELL_SIZE);
      col = THREE.MathUtils.clamp(col, 0, MAZE_SIZE - 1);
      row = THREE.MathUtils.clamp(row, 0, MAZE_SIZE - 1);
      return { row, col };
    }

    function resetPlayerToStart() {
      const start = cellToWorldCenter(0, 0);
      camera.position.set(start.x, PLAYER_EYE_HEIGHT, start.z);
      camera.rotation.set(0, 0, 0);
    }

    function canMoveBetween(fromCell, toCell) {
      if (
        toCell.row < 0 || toCell.row >= MAZE_SIZE ||
        toCell.col < 0 || toCell.col >= MAZE_SIZE
      ) return false;

      const cell = maze[fromCell.row][fromCell.col];
      const dr = toCell.row - fromCell.row;
      const dc = toCell.col - fromCell.col;

      if (dr === -1) return !cell.walls.top;
      if (dr === 1) return !cell.walls.bottom;
      if (dc === -1) return !cell.walls.left;
      if (dc === 1) return !cell.walls.right;
      return false;
    }

    function bfs(start, end) {
      const queue = [start];
      const visited = Array.from({ length: MAZE_SIZE }, () => Array(MAZE_SIZE).fill(false));
      const prev = Array.from({ length: MAZE_SIZE }, () => Array(MAZE_SIZE).fill(null));
      visited[start.row][start.col] = true;

      const dirs = [
        [-1, 0],
        [0, 1],
        [1, 0],
        [0, -1]
      ];

      while (queue.length > 0) {
        const current = queue.shift();

        if (current.row === end.row && current.col === end.col) {
          break;
        }

        for (const [dr, dc] of dirs) {
          const next = { row: current.row + dr, col: current.col + dc };
          if (
            next.row >= 0 && next.row < MAZE_SIZE &&
            next.col >= 0 && next.col < MAZE_SIZE &&
            !visited[next.row][next.col] &&
            canMoveBetween(current, next)
          ) {
            visited[next.row][next.col] = true;
            prev[next.row][next.col] = current;
            queue.push(next);
          }
        }
      }

      if (!visited[end.row][end.col]) return null;

      const path = [];
      let cur = end;
      while (cur) {
        path.push(cur);
        cur = prev[cur.row][cur.col];
      }
      path.reverse();
      return path;
    }

    function clearPath() {
      clearGroup(pathGroup);
    }

    function drawPath3D(path) {
      const points = path.map(p => {
        const wp = cellToWorldCenter(p.row, p.col);
        return new THREE.Vector3(wp.x, 0.15, wp.z);
      });

      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({ color: 0x00d4ff });
      const line = new THREE.Line(geometry, material);
      pathGroup.add(line);

      for (const point of points) {
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.12, 10, 10),
          new THREE.MeshStandardMaterial({ color: 0xffcc00, emissive: 0x442200, emissiveIntensity: 0.5 })
        );
        sphere.position.copy(point);
        pathGroup.add(sphere);
      }
    }

    function tryMove(delta) {
      if (!controls.isLocked) return;

      const direction = new THREE.Vector3();
      const right = new THREE.Vector3();
      camera.getWorldDirection(direction);
      direction.y = 0;
      direction.normalize();

      right.crossVectors(direction, camera.up).normalize();

      let moved = false;

      if (moveForward) moved = moveWithCollision(direction, delta) || moved;
      if (moveBackward) moved = moveWithCollision(direction.clone().multiplyScalar(-1), delta) || moved;
      if (moveLeft) moved = moveWithCollision(right.clone().multiplyScalar(-1), delta) || moved;
      if (moveRight) moved = moveWithCollision(right, delta) || moved;

      if (moved && !timerStarted) {
        timerStarted = true;
        timerRunning = true;
      }
    }

    function moveWithCollision(dir, delta) {
      const step = dir.clone().multiplyScalar(MOVE_SPEED * delta);
      const origin = camera.position.clone();

      const raycaster = new THREE.Raycaster(origin, dir.clone().normalize(), 0, COLLISION_DISTANCE);
      const intersects = raycaster.intersectObjects(wallMeshes, false);

      const nextPos = origin.clone().add(step);

      if (intersects.length === 0) {
        camera.position.x = nextPos.x;
        camera.position.z = nextPos.z;
        clampPlayerInsideBounds();
        return true;
      }

      const stepLen = step.length();
      if (intersects[0].distance > stepLen + 0.1) {
        camera.position.x = nextPos.x;
        camera.position.z = nextPos.z;
        clampPlayerInsideBounds();
        return true;
      }

      return false;
    }

    function clampPlayerInsideBounds() {
      camera.position.x = THREE.MathUtils.clamp(camera.position.x, 0.3, MAZE_SIZE * CELL_SIZE - 0.3);
      camera.position.z = THREE.MathUtils.clamp(camera.position.z, 0.3, MAZE_SIZE * CELL_SIZE - 0.3);
      camera.position.y = PLAYER_EYE_HEIGHT;
    }

    function updateTimer(delta) {
      if (timerRunning) {
        elapsedTime += delta;
      }
      updateTimerDisplay();
    }

    function updateTimerDisplay() {
      const total = Math.floor(elapsedTime);
      const mm = String(Math.floor(total / 60)).padStart(2, '0');
      const ss = String(total % 60).padStart(2, '0');
      timerEl.textContent = `${mm}:${ss}`;
    }

    function checkExitReached() {
      if (reachedExit) return;
      const playerCell = worldToCell(camera.position);
      if (playerCell.row === EXIT_CELL.row && playerCell.col === EXIT_CELL.col) {
        reachedExit = true;
        timerRunning = false;
        timerEl.textContent += ' 到达出口！';
      }
    }

    function drawMinimap() {
      const ctx = minimapCtx;
      const w = minimapCanvas.width;
      const h = minimapCanvas.height;
      const cell = w / MAZE_SIZE;

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 2;

      for (let r = 0; r < MAZE_SIZE; r++) {
        for (let c = 0; c < MAZE_SIZE; c++) {
          const x = c * cell;
          const y = r * cell;
          const walls = maze[r][c].walls;

          if (walls.top) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + cell, y);
            ctx.stroke();
          }
          if (walls.left) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + cell);
            ctx.stroke();
          }
          if (r === MAZE_SIZE - 1 && walls.bottom) {
            ctx.beginPath();
            ctx.moveTo(x, y + cell);
            ctx.lineTo(x + cell, y + cell);
            ctx.stroke();
          }
          if (c === MAZE_SIZE - 1 && walls.right) {
            ctx.beginPath();
            ctx.moveTo(x + cell, y);
            ctx.lineTo(x + cell, y + cell);
            ctx.stroke();
          }
        }
      }

      const exitX = (EXIT_CELL.col + 0.5) * cell;
      const exitY = (EXIT_CELL.row + 0.5) * cell;
      ctx.fillStyle = 'red';
      ctx.beginPath();
      ctx.arc(exitX, exitY, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    function updateMinimapPlayer() {
      drawMinimap();

      const ctx = minimapCtx;
      const w = minimapCanvas.width;
      const cell = w / MAZE_SIZE;

      const playerCell = worldToCell(camera.position);
      const x = (playerCell.col + 0.5) * cell;
      const y = (playerCell.row + 0.5) * cell;

      ctx.fillStyle = '#007bff';
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
    }

    function updateState() {
      const playerCell = worldToCell(camera.position);
      window.__3D_STATE__ = {
        mazeSize: MAZE_SIZE,
        playerCell: { row: playerCell.row, col: playerCell.col },
        exitCell: { row: EXIT_CELL.row, col: EXIT_CELL.col },
        solved,
        pathLength,
        timer: elapsedTime,
        wallCount
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      tryMove(delta);
      updateTimer(delta);
      checkExitReached();
      updateMinimapPlayer();
      updateState();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
