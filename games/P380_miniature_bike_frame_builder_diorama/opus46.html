<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bike Frame Builder Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #2a2a3a; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#ui-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
}

#color-buttons {
    position: absolute;
    top: 15px;
    left: 15px;
    display: flex;
    gap: 8px;
    pointer-events: all;
}

#color-buttons button {
    padding: 8px 16px;
    border: 2px solid #555;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#color-buttons button:hover {
    transform: scale(1.05);
    border-color: #fff;
}

#btn-silver { background: #C0C0C0; color: #333; }
#btn-red { background: #CC2222; color: #fff; }
#btn-blue { background: #2244CC; color: #fff; }

#progress-bar {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 28px;
    background: rgba(0,0,0,0.6);
    border-radius: 14px;
    border: 2px solid #555;
    overflow: hidden;
}

#progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #44aa44, #66dd66);
    border-radius: 12px;
    transition: width 0.5s ease;
    position: relative;
}

#progress-text {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 250px;
    height: 28px;
    line-height: 28px;
    text-align: center;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
}

#complete-msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #44ff44;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(68, 255, 68, 0.5), 0 0 40px rgba(68, 255, 68, 0.3);
    display: none;
    text-align: center;
    animation: pulseText 1s ease-in-out infinite alternate;
}

@keyframes pulseText {
    from { transform: translate(-50%, -50%) scale(1); }
    to { transform: translate(-50%, -50%) scale(1.05); }
}

#selection-label {
    position: absolute;
    bottom: 20px;
    left: 15px;
    color: #ccc;
    font-size: 14px;
    background: rgba(0,0,0,0.6);
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid #444;
}

#instructions {
    position: absolute;
    bottom: 20px;
    right: 15px;
    color: #999;
    font-size: 11px;
    background: rgba(0,0,0,0.6);
    padding: 10px 14px;
    border-radius: 6px;
    border: 1px solid #333;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="ui-overlay">
    <div id="color-buttons">
        <button id="btn-silver">Silver</button>
        <button id="btn-red">Red</button>
        <button id="btn-blue">Blue</button>
    </div>
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <div id="progress-text">Assembly: 0%</div>
    <div id="complete-msg">🚲 Frame Complete! 🚲</div>
    <div id="selection-label">Selected: None</div>
    <div id="instructions">
        Click: Select part<br>
        Arrow Keys: Move part<br>
        R: Rotate part<br>
        Space: Snap to zone
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a3a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = 1.4;
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.update();

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    scene.add(dirLight);

    // Additional fill light
    const fillLight = new THREE.DirectionalLight(0x8888ff, 0.2);
    fillLight.position.set(-3, 5, -3);
    scene.add(fillLight);

    // Workbench
    const benchGeom = new THREE.BoxGeometry(10, 0.3, 6);
    const benchMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8, metalness: 0.1 });
    const workbench = new THREE.Mesh(benchGeom, benchMat);
    workbench.position.y = 0;
    workbench.receiveShadow = true;
    scene.add(workbench);

    // Workbench edge trim
    const edgeGeom = new THREE.BoxGeometry(10.1, 0.05, 6.1);
    const edgeMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, roughness: 0.9 });
    const edge = new THREE.Mesh(edgeGeom, edgeMat);
    edge.position.y = 0.15;
    scene.add(edge);

    // Workbench legs
    const legGeom = new THREE.BoxGeometry(0.3, 2, 0.3);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, roughness: 0.9 });
    const legPositions = [
        [-4.5, -1.15, -2.5], [4.5, -1.15, -2.5],
        [-4.5, -1.15, 2.5], [4.5, -1.15, 2.5]
    ];
    legPositions.forEach(pos => {
        const leg = new THREE.Mesh(legGeom, legMat);
        leg.position.set(...pos);
        leg.castShadow = true;
        scene.add(leg);
    });

    // Grid helper on workbench surface
    const gridHelper = new THREE.GridHelper(8, 16, 0x555555, 0x3a3a3a);
    gridHelper.position.y = 0.16;
    scene.add(gridHelper);

    // Floor
    const floorGeom = new THREE.PlaneGeometry(30, 30);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 1 });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2.15;
    floor.receiveShadow = true;
    scene.add(floor);

    // Parts tray visual
    const trayGeom = new THREE.BoxGeometry(3, 0.05, 4.5);
    const trayMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.6, metalness: 0.3 });
    const tray = new THREE.Mesh(trayGeom, trayMat);
    tray.position.set(4.2, 0.17, 0.5);
    scene.add(tray);

    // Part definitions
    const partDefs = [
        {
            id: 'downTube',
            label: 'Down Tube',
            radius: 0.08, radiusTop: 0.08, height: 2.5,
            color: 0xC0C0C0,
            initPos: new THREE.Vector3(4, 0.5, -1),
            zonePos: new THREE.Vector3(-2, 0.2, 0),
            zoneRotation: new THREE.Euler(0, 0, Math.PI / 3), // ~60 degrees
            snapRotation: new THREE.Euler(0, 0, Math.PI / 3)
        },
        {
            id: 'seatTube',
            label: 'Seat Tube',
            radius: 0.08, radiusTop: 0.08, height: 2.0,
            color: 0xC0C0C0,
            initPos: new THREE.Vector3(4, 0.5, 0),
            zonePos: new THREE.Vector3(-1, 0.2, 0),
            zoneRotation: new THREE.Euler(0, 0, 0), // vertical
            snapRotation: new THREE.Euler(0, 0, 0)
        },
        {
            id: 'topTube',
            label: 'Top Tube',
            radius: 0.07, radiusTop: 0.07, height: 2.2,
            color: 0xC0C0C0,
            initPos: new THREE.Vector3(4, 0.5, 1),
            zonePos: new THREE.Vector3(-1.5, 0.2, 1),
            zoneRotation: new THREE.Euler(0, 0, Math.PI / 2), // horizontal
            snapRotation: new THREE.Euler(0, 0, Math.PI / 2)
        },
        {
            id: 'headTube',
            label: 'Head Tube',
            radius: 0.1, radiusTop: 0.1, height: 0.8,
            color: 0xA0A0A0,
            initPos: new THREE.Vector3(4, 0.5, 2),
            zonePos: new THREE.Vector3(-2.5, 0.2, 0.5),
            zoneRotation: new THREE.Euler(0, 0, Math.PI / 6),
            snapRotation: new THREE.Euler(0, 0, Math.PI / 6)
        },
        {
            id: 'chainStay',
            label: 'Chain Stay',
            radius: 0.06, radiusTop: 0.06, height: 2.0,
            color: 0xC0C0C0,
            initPos: new THREE.Vector3(5, 0.5, -1),
            zonePos: new THREE.Vector3(-0.5, 0.2, -0.5),
            zoneRotation: new THREE.Euler(0, 0, Math.PI / 2.5),
            snapRotation: new THREE.Euler(0, 0, Math.PI / 2.5)
        }
    ];

    // Create tubes
    const tubes = {};
    const tubeGroup = new THREE.Group();
    scene.add(tubeGroup);

    partDefs.forEach(def => {
        const geom = new THREE.CylinderGeometry(def.radiusTop, def.radius, def.height, 16);
        const mat = new THREE.MeshStandardMaterial({
            color: def.color,
            roughness: 0.3,
            metalness: 0.7,
            emissive: 0x000000
        });
        const mesh = new THREE.Mesh(geom, mat);
        mesh.position.copy(def.initPos);
        // Start lying flat (rotated 90 degrees on Z-axis)
        mesh.rotation.z = Math.PI / 2;
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData = {
            id: def.id,
            label: def.label,
            snapped: false,
            colorHex: '#' + def.color.toString(16).padStart(6, '0').toUpperCase()
        };
        tubeGroup.add(mesh);
        tubes[def.id] = mesh;
    });

    // Create assembly zones (torus rings)
    const zones = {};
    const zoneGroup = new THREE.Group();
    scene.add(zoneGroup);

    partDefs.forEach(def => {
        const torusGeom = new THREE.TorusGeometry(0.3, 0.03, 8, 24);
        const torusMat = new THREE.MeshStandardMaterial({
            color: 0x44ff44,
            transparent: true,
            opacity: 0.5,
            emissive: 0x114411,
            roughness: 0.5
        });
        const torus = new THREE.Mesh(torusGeom, torusMat);
        torus.position.copy(def.zonePos);
        torus.rotation.x = Math.PI / 2;
        torus.receiveShadow = true;
        torus.userData = { forPart: def.id };
        zoneGroup.add(torus);
        zones[def.id] = torus;

        // Add a subtle glow ring
        const glowGeom = new THREE.TorusGeometry(0.35, 0.01, 8, 24);
        const glowMat = new THREE.MeshBasicMaterial({
            color: 0x44ff44,
            transparent: true,
            opacity: 0.2
        });
        const glow = new THREE.Mesh(glowGeom, glowMat);
        glow.position.copy(def.zonePos);
        glow.rotation.x = Math.PI / 2;
        zoneGroup.add(glow);
    });

    // State
    let selectedPartId = null;
    let partsSnapped = 0;
    let isComplete = false;
    let celebrationActive = false;
    let celebrationStartTime = 0;
    let assembledGroup = null;

    // State exposed on window
    window.__3D_STATE__ = {
        selectedPart: null,
        partsSnapped: 0,
        assemblyPercent: 0,
        partPositions: {},
        partColors: {},
        partSnappedStatus: {},
        isComplete: false,
        celebrationActive: false,
        cameraDistance: 0
    };

    // DOM elements
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const completeMsg = document.getElementById('complete-msg');
    const selectionLabel = document.getElementById('selection-label');

    function updateUI() {
        const percent = partsSnapped * 20;
        progressFill.style.width = percent + '%';
        progressText.textContent = 'Assembly: ' + percent + '%';

        if (selectedPartId) {
            const def = partDefs.find(d => d.id === selectedPartId);
            selectionLabel.textContent = 'Selected: ' + (def ? def.label : selectedPartId);
        } else {
            selectionLabel.textContent = 'Selected: None';
        }

        if (isComplete) {
            completeMsg.style.display = 'block';
        }
    }

    function selectPart(id) {
        // Deselect previous
        if (selectedPartId && tubes[selectedPartId]) {
            tubes[selectedPartId].material.emissive.setHex(0x000000);
        }

        if (id && tubes[id] && !tubes[id].userData.snapped) {
            selectedPartId = id;
            tubes[id].material.emissive.setHex(0x444400);
        } else {
            selectedPartId = null;
        }
        updateUI();
    }

    function movePart(dx, dz) {
        if (!selectedPartId || !tubes[selectedPartId] || tubes[selectedPartId].userData.snapped) return;
        const mesh = tubes[selectedPartId];
        mesh.position.x += dx;
        mesh.position.z += dz;
        mesh.position.y = 0.5;

        // Clamp to workbench bounds
        mesh.position.x = Math.max(-4.8, Math.min(4.8, mesh.position.x));
        mesh.position.z = Math.max(-2.8, Math.min(2.8, mesh.position.z));
    }

    function rotatePart() {
        if (!selectedPartId || !tubes[selectedPartId] || tubes[selectedPartId].userData.snapped) return;
        const mesh = tubes[selectedPartId];
        mesh.rotation.y += Math.PI / 12; // 15 degrees
    }

    function trySnap() {
        if (!selectedPartId || !tubes[selectedPartId] || tubes[selectedPartId].userData.snapped) return;

        const mesh = tubes[selectedPartId];
        const def = partDefs.find(d => d.id === selectedPartId);
        if (!def) return;

        const dist = mesh.position.distanceTo(new THREE.Vector3(def.zonePos.x, mesh.position.y, def.zonePos.z));

        if (dist < 0.6) {
            // Snap!
            mesh.position.copy(def.zonePos);
            mesh.position.y = def.zonePos.y + def.height / 2 * Math.abs(Math.cos(def.snapRotation.z));
            mesh.rotation.set(def.snapRotation.x, def.snapRotation.y, def.snapRotation.z);
            mesh.userData.snapped = true;
            mesh.material.emissive.setHex(0x000000);

            // Turn zone ring gold
            const zone = zones[selectedPartId];
            if (zone) {
                zone.material.color.setHex(0xFFD700);
                zone.material.emissive.setHex(0x554400);
                zone.material.opacity = 0.8;
            }

            partsSnapped++;
            selectedPartId = null;

            if (partsSnapped >= 5) {
                isComplete = true;
                startCelebration();
            }

            updateUI();
        }
    }

    function changeColor(hexColor, hexNum) {
        if (!selectedPartId || !tubes[selectedPartId] || tubes[selectedPartId].userData.snapped) return;
        const mesh = tubes[selectedPartId];
        mesh.material.color.setHex(hexNum);
        mesh.userData.colorHex = hexColor;
    }

    function startCelebration() {
        celebrationActive = true;
        celebrationStartTime = performance.now();

        // Create assembled group for spinning
        assembledGroup = new THREE.Group();
        const center = new THREE.Vector3(-1.5, 0, 0);

        partDefs.forEach(def => {
            const mesh = tubes[def.id];
            // Store world position/rotation
            const worldPos = new THREE.Vector3();
            mesh.getWorldPosition(worldPos);
            const worldQuat = new THREE.Quaternion();
            mesh.getWorldQuaternion(worldQuat);

            tubeGroup.remove(mesh);
            assembledGroup.add(mesh);

            // Convert to group-local coords
            mesh.position.set(worldPos.x - center.x, worldPos.y - center.y, worldPos.z - center.z);
            mesh.quaternion.copy(worldQuat);
        });

        assembledGroup.position.copy(center);
        scene.add(assembledGroup);
    }

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    renderer.domElement.addEventListener('click', (event) => {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const meshes = Object.values(tubes);
        const intersects = raycaster.intersectObjects(meshes);

        if (intersects.length > 0) {
            const hit = intersects[0].object;
            if (!hit.userData.snapped) {
                selectPart(hit.userData.id);
            }
        } else {
            selectPart(null);
        }
    });

    // Keyboard
    document.addEventListener('keydown', (event) => {
        switch (event.key) {
            case 'ArrowLeft':
                event.preventDefault();
                movePart(-0.3, 0);
                break;
            case 'ArrowRight':
                event.preventDefault();
                movePart(0.3, 0);
                break;
            case 'ArrowUp':
                event.preventDefault();
                movePart(0, -0.3);
                break;
            case 'ArrowDown':
                event.preventDefault();
                movePart(0, 0.3);
                break;
            case 'r':
            case 'R':
                rotatePart();
                break;
            case ' ':
                event.preventDefault();
                trySnap();
                break;
        }
    });

    // Color buttons
    document.getElementById('btn-silver').addEventListener('click', () => changeColor('#C0C0C0', 0xC0C0C0));
    document.getElementById('btn-red').addEventListener('click', () => changeColor('#CC2222', 0xCC2222));
    document.getElementById('btn-blue').addEventListener('click', () => changeColor('#2244CC', 0x2244CC));

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Zone pulse animation
    let time = 0;

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);
        time += 0.016;

        controls.update();

        // Animate zone rings (pulse unsnapped zones)
        partDefs.forEach(def => {
            const zone = zones[def.id];
            if (zone && !tubes[def.id].userData.snapped) {
                const scale = 1 + 0.1 * Math.sin(time * 3);
                zone.scale.set(scale, scale, scale);
                zone.material.opacity = 0.3 + 0.2 * Math.sin(time * 2);
            }
        });

        // Celebration animation
        if (celebrationActive && assembledGroup) {
            const elapsed = (performance.now() - celebrationStartTime) / 1000;
            if (elapsed < 2) {
                assembledGroup.rotation.y = (elapsed / 2) * Math.PI * 2;
                // Also lift slightly
                assembledGroup.position.y = Math.sin(elapsed * Math.PI) * 0.5;
            } else {
                assembledGroup.rotation.y = 0;
                assembledGroup.position.y = 0;
                celebrationActive = false;
            }
        }

        // Update state
        const state = window.__3D_STATE__;
        state.selectedPart = selectedPartId;
        state.partsSnapped = partsSnapped;
        state.assemblyPercent = partsSnapped * 20;
        state.isComplete = isComplete;
        state.celebrationActive = celebrationActive;
        state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

        state.partPositions = {};
        state.partColors = {};
        state.partSnappedStatus = {};
        partDefs.forEach(def => {
            const mesh = tubes[def.id];
            state.partPositions[def.id] = {
                x: parseFloat(mesh.position.x.toFixed(3)),
                y: parseFloat(mesh.position.y.toFixed(3)),
                z: parseFloat(mesh.position.z.toFixed(3))
            };
            state.partColors[def.id] = mesh.userData.colorHex;
            state.partSnappedStatus[def.id] = mesh.userData.snapped;
        });

        renderer.render(scene, camera);
    }

    animate();
    updateUI();
})();
</script>
</body>
</html>
