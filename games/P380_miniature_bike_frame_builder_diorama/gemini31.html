<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Miniature Bike Frame Builder</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2a2a3a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .ui-panel {
            pointer-events: auto;
            position: absolute;
            background: rgba(30, 30, 40, 0.8);
            padding: 10px;
            border-radius: 8px;
            color: white;
            border: 1px solid #555;
        }
        #color-buttons {
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #color-buttons button {
            background: #444;
            color: white;
            border: 1px solid #666;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #color-buttons button:hover { background: #555; }
        #btn-silver { border-left: 4px solid #C0C0C0 !important; }
        #btn-red { border-left: 4px solid #CC2222 !important; }
        #btn-blue { border-left: 4px solid #2244CC !important; }

        #progress-container {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            text-align: center;
        }
        #progress-bar {
            width: 100%;
            height: 20px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
            border: 1px solid #555;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transition: width 0.5s ease-out;
        }
        
        #selection-label {
            bottom: 20px;
            left: 20px;
            font-size: 16px;
            font-weight: bold;
        }

        #complete-msg {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #4CAF50;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.6);
            padding: 20px 40px;
            border-radius: 10px;
            border: 2px solid #4CAF50;
            display: none;
        }

        #instructions {
            bottom: 20px;
            right: 20px;
            font-size: 14px;
            color: #ccc;
            text-align: right;
        }
        kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #666;
            font-family: monospace;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <div id="color-buttons" class="ui-panel">
            <div style="margin-bottom: 5px; font-size: 12px; color: #aaa;">Paint Selected:</div>
            <button id="btn-silver">Silver</button>
            <button id="btn-red">Red</button>
            <button id="btn-blue">Blue</button>
        </div>

        <div id="progress-container" class="ui-panel">
            <div>Assembly Progress</div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>

        <div id="selection-label" class="ui-panel">Selected: None</div>

        <div id="complete-msg" class="ui-panel">Frame Complete!</div>

        <div id="instructions" class="ui-panel">
            Click part to select<br>
            <kbd>Arrows</kbd> Move part<br>
            <kbd>R</kbd> Rotate part<br>
            <kbd>Space</kbd> Snap to zone
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            selectedPart: null,
            partsSnapped: 0,
            assemblyPercent: 0,
            partPositions: {},
            partColors: {},
            partSnappedStatus: {},
            isComplete: false,
            celebrationActive: false,
            cameraDistance: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a3a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minPolarAngle = 0.2;
        controls.maxPolarAngle = 1.4;
        controls.minDistance = 3;
        controls.maxDistance = 15;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Environment ---
        const workbenchGeo = new THREE.BoxGeometry(10, 0.3, 6);
        const workbenchMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
        const workbench = new THREE.Mesh(workbenchGeo, workbenchMat);
        workbench.position.y = 0;
        workbench.receiveShadow = true;
        scene.add(workbench);

        const gridHelper = new THREE.GridHelper(10, 20, 0x000000, 0x000000);
        gridHelper.position.y = 0.16;
        gridHelper.material.opacity = 0.15;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);

        // --- Bike Parts & Zones ---
        const assembledFrame = new THREE.Group();
        scene.add(assembledFrame);

        const partsConfig = [
            { id: 'downTube', r: 0.08, h: 2.5, color: 0xC0C0C0, initPos: [4, 0.5, -1], zonePos: [-2, 0.2, 0], snapPos: [-2, 1.0, 0], snapRot: [0, 0, -Math.PI/3] },
            { id: 'seatTube', r: 0.08, h: 2.0, color: 0xC0C0C0, initPos: [4, 0.5, 0], zonePos: [-1, 0.2, 0], snapPos: [-1, 1.15, 0], snapRot: [0, 0, 0] },
            { id: 'topTube', r: 0.07, h: 2.2, color: 0xC0C0C0, initPos: [4, 0.5, 1], zonePos: [-1.5, 0.2, 1], snapPos: [-1.5, 2.0, 1], snapRot: [0, 0, Math.PI/2] },
            { id: 'headTube', r: 0.1, h: 0.8, color: 0xA0A0A0, initPos: [4, 0.5, 2], zonePos: [-2.5, 0.2, 0.5], snapPos: [-2.5, 1.8, 0.5], snapRot: [0, 0, -Math.PI/6] },
            { id: 'chainStay', r: 0.06, h: 2.0, color: 0xC0C0C0, initPos: [5, 0.5, -1], zonePos: [-0.5, 0.2, -0.5], snapPos: [-0.5, 0.5, -0.5], snapRot: [0, 0, Math.PI/2] }
        ];

        const tubes = [];
        const zones = {};

        const torusGeo = new THREE.TorusGeometry(0.4, 0.05, 16, 32);

        partsConfig.forEach(config => {
            // Create Zone Ring
            const zoneMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
            const zone = new THREE.Mesh(torusGeo, zoneMat);
            zone.rotation.x = Math.PI / 2;
            zone.position.set(...config.zonePos);
            scene.add(zone);
            zones[config.id] = zone;

            // Create Tube
            const geo = new THREE.CylinderGeometry(config.r, config.r, config.h, 32);
            const mat = new THREE.MeshStandardMaterial({ color: config.color, metalness: 0.6, roughness: 0.4 });
            const tube = new THREE.Mesh(geo, mat);
            tube.position.set(...config.initPos);
            tube.rotation.z = Math.PI / 2; // Lying flat
            tube.castShadow = true;
            tube.receiveShadow = true;
            
            tube.userData = {
                id: config.id,
                isSnapped: false,
                zonePos: new THREE.Vector3(...config.zonePos),
                snapPos: new THREE.Vector3(...config.snapPos),
                snapRot: new THREE.Euler(...config.snapRot),
                zoneMesh: zone
            };
            
            scene.add(tube);
            tubes.push(tube);
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedTube = null;

        function updateSelectionUI() {
            const label = document.getElementById('selection-label');
            if (selectedTube) {
                label.textContent = `Selected: ${selectedTube.userData.id}`;
                window.__3D_STATE__.selectedPart = selectedTube.userData.id;
            } else {
                label.textContent = 'Selected: None';
                window.__3D_STATE__.selectedPart = null;
            }
        }

        window.addEventListener('pointerdown', (event) => {
            if (window.__3D_STATE__.isComplete) return;
            
            // Don't raycast if clicking UI
            if (event.target.tagName === 'BUTTON' || event.target.closest('.ui-panel') && event.target.id !== 'selection-label' && event.target.id !== 'instructions') {
                return;
            }

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(tubes);

            if (selectedTube) {
                selectedTube.material.emissive.setHex(0x000000);
                selectedTube = null;
            }

            for (let i = 0; i < intersects.length; i++) {
                const object = intersects[i].object;
                if (!object.userData.isSnapped) {
                    selectedTube = object;
                    selectedTube.material.emissive.setHex(0x444400);
                    break;
                }
            }
            updateSelectionUI();
        });

        window.addEventListener('keydown', (event) => {
            if (!selectedTube || window.__3D_STATE__.isComplete) return;

            const moveStep = 0.3;
            const rotStep = 15 * Math.PI / 180;

            switch (event.code) {
                case 'ArrowUp':
                    selectedTube.position.z -= moveStep;
                    break;
                case 'ArrowDown':
                    selectedTube.position.z += moveStep;
                    break;
                case 'ArrowLeft':
                    selectedTube.position.x -= moveStep;
                    break;
                case 'ArrowRight':
                    selectedTube.position.x += moveStep;
                    break;
                case 'KeyR':
                    selectedTube.rotation.y += rotStep;
                    break;
                case 'Space':
                    checkSnap();
                    break;
            }
            
            // Clamp Y to workbench surface
            if (!selectedTube.userData.isSnapped) {
                selectedTube.position.y = 0.5;
            }
        });

        function checkSnap() {
            if (!selectedTube) return;

            const targetPos = selectedTube.userData.zonePos;
            const dx = selectedTube.position.x - targetPos.x;
            const dz = selectedTube.position.z - targetPos.z;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist <= 0.6) {
                // Snap
                selectedTube.position.copy(selectedTube.userData.snapPos);
                selectedTube.rotation.copy(selectedTube.userData.snapRot);
                selectedTube.userData.isSnapped = true;
                selectedTube.material.emissive.setHex(0x000000);
                
                // Update Zone
                selectedTube.userData.zoneMesh.material.color.setHex(0xFFD700);
                selectedTube.userData.zoneMesh.material.opacity = 0.8;

                // Add to assembled group
                assembledFrame.add(selectedTube);

                // Update State & UI
                window.__3D_STATE__.partsSnapped++;
                window.__3D_STATE__.assemblyPercent = window.__3D_STATE__.partsSnapped * 20;
                document.getElementById('progress-fill').style.width = `${window.__3D_STATE__.assemblyPercent}%`;

                selectedTube = null;
                updateSelectionUI();

                if (window.__3D_STATE__.partsSnapped === 5) {
                    triggerCompletion();
                }
            }
        }

        // --- Color Buttons ---
        function changeColor(hex) {
            if (selectedTube) {
                selectedTube.material.color.setHex(hex);
            }
        }
        document.getElementById('btn-silver').addEventListener('click', () => changeColor(0xC0C0C0));
        document.getElementById('btn-red').addEventListener('click', () => changeColor(0xCC2222));
        document.getElementById('btn-blue').addEventListener('click', () => changeColor(0x2244CC));

        // --- Completion Animation ---
        let celebrationStartTime = 0;
        function triggerCompletion() {
            window.__3D_STATE__.isComplete = true;
            window.__3D_STATE__.celebrationActive = true;
            document.getElementById('complete-msg').style.display = 'block';
            celebrationStartTime = Date.now();
            
            // Hide zones
            Object.values(zones).forEach(z => z.visible = false);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function updateStateObject() {
            const state = window.__3D_STATE__;
            state.cameraDistance = camera.position.distanceTo(controls.target);
            
            tubes.forEach(tube => {
                const id = tube.userData.id;
                state.partPositions[id] = { x: tube.position.x, y: tube.position.y, z: tube.position.z };
                state.partColors[id] = '#' + tube.material.color.getHexString().padStart(6, '0');
                state.partSnappedStatus[id] = tube.userData.isSnapped;
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (window.__3D_STATE__.celebrationActive) {
                const elapsed = Date.now() - celebrationStartTime;
                const duration = 2000;
                if (elapsed <= duration) {
                    const progress = elapsed / duration;
                    // Ease in out cubic
                    const ease = progress < 0.5 ? 4 * progress * progress * progress : 1 - Math.pow(-2 * progress + 2, 3) / 2;
                    assembledFrame.rotation.y = ease * Math.PI * 2;
                } else {
                    assembledFrame.rotation.y = 0;
                    window.__3D_STATE__.celebrationActive = false;
                }
            }

            updateStateObject();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
