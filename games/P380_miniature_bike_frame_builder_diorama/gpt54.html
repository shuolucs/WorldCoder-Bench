<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Miniature Bike Frame Builder Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #2a2a3a;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #color-controls {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    #color-controls button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    #btn-silver { background: #888; }
    #btn-red { background: #CC2222; }
    #btn-blue { background: #2244CC; }

    #progress-bar {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      height: 22px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      overflow: hidden;
      pointer-events: none;
    }

    #progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #8bc34a);
      transition: width 0.2s ease;
    }

    #complete-msg {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: #7CFF7C;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 0 14px rgba(124,255,124,0.6);
      display: none;
      pointer-events: none;
    }

    #selection-label {
      position: absolute;
      left: 16px;
      bottom: 16px;
      color: #fff;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 16px;
      pointer-events: none;
    }

    #instructions {
      position: absolute;
      right: 16px;
      bottom: 16px;
      color: #ddd;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      max-width: 280px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="color-controls">
      <button id="btn-silver">Silver</button>
      <button id="btn-red">Red</button>
      <button id="btn-blue">Blue</button>
    </div>

    <div id="progress-bar">
      <div id="progress-fill"></div>
    </div>

    <div id="complete-msg">Frame Complete!</div>
    <div id="selection-label">Selected: None</div>

    <div id="instructions">
      Click a tube to select<br>
      Arrow keys: move on workbench<br>
      R: rotate selected tube<br>
      Space: snap when near matching zone
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color("#2a2a3a");

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.8, 0);
    controls.enableDamping = true;
    controls.minPolarAngle = 0.2;
    controls.maxPolarAngle = 1.4;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -10;
    dirLight.shadow.camera.right = 10;
    dirLight.shadow.camera.top = 10;
    dirLight.shadow.camera.bottom = -10;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    const bench = new THREE.Mesh(
      new THREE.BoxGeometry(10, 0.3, 6),
      new THREE.MeshStandardMaterial({ color: "#8B4513", roughness: 0.85, metalness: 0.05 })
    );
    bench.position.set(0, 0, 0);
    bench.receiveShadow = true;
    bench.castShadow = false;
    scene.add(bench);

    const grid = new THREE.GridHelper(9.6, 24, 0x88aa88, 0x557755);
    grid.position.y = 0.16;
    grid.material.transparent = true;
    grid.material.opacity = 0.22;
    scene.add(grid);

    const tray = new THREE.Mesh(
      new THREE.BoxGeometry(2.3, 0.08, 4.8),
      new THREE.MeshStandardMaterial({ color: "#555566", roughness: 0.9 })
    );
    tray.position.set(4.1, 0.23, 0.5);
    tray.receiveShadow = true;
    scene.add(tray);

    const assembledFrameGroup = new THREE.Group();
    scene.add(assembledFrameGroup);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const partDefs = [
      { id: "downTube", radius: 0.08, length: 2.5, color: "#C0C0C0", pos: [4, 0.5, -1] },
      { id: "seatTube", radius: 0.08, length: 2.0, color: "#C0C0C0", pos: [4, 0.5, 0] },
      { id: "topTube", radius: 0.07, length: 2.2, color: "#C0C0C0", pos: [4, 0.5, 1] },
      { id: "headTube", radius: 0.10, length: 0.8, color: "#A0A0A0", pos: [4, 0.5, 2] },
      { id: "chainStay", radius: 0.06, length: 2.0, color: "#C0C0C0", pos: [5, 0.5, -1] },
    ];

    const zoneDefs = {
      downTube: {
        position: new THREE.Vector3(-2, 0.2, 0),
        rotation: new THREE.Euler(0, 0, THREE.MathUtils.degToRad(30))
      },
      seatTube: {
        position: new THREE.Vector3(-1, 0.2, 0),
        rotation: new THREE.Euler(0, 0, 0)
      },
      topTube: {
        position: new THREE.Vector3(-1.5, 0.2, 1),
        rotation: new THREE.Euler(0, 0, THREE.MathUtils.degToRad(90))
      },
      headTube: {
        position: new THREE.Vector3(-2.5, 0.2, 0.5),
        rotation: new THREE.Euler(0, 0, THREE.MathUtils.degToRad(15))
      },
      chainStay: {
        position: new THREE.Vector3(-0.5, 0.2, -0.5),
        rotation: new THREE.Euler(0, 0, THREE.MathUtils.degToRad(65))
      }
    };

    const parts = {};
    const partList = [];
    const zones = {};
    let selectedPart = null;
    let partsSnapped = 0;
    let isComplete = false;
    let celebrationActive = false;
    let celebrationStart = 0;
    let celebrationStartRot = 0;

    const selectionLabel = document.getElementById("selection-label");
    const progressFill = document.getElementById("progress-fill");
    const completeMsg = document.getElementById("complete-msg");

    function createPart(def) {
      const geometry = new THREE.CylinderGeometry(def.radius, def.radius, def.length, 24);
      const material = new THREE.MeshStandardMaterial({
        color: def.color,
        metalness: 0.7,
        roughness: 0.3,
        emissive: 0x000000
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(...def.pos);
      mesh.rotation.z = Math.PI / 2;
      mesh.userData = {
        id: def.id,
        baseColor: def.color,
        snapped: false,
        selectable: true
      };
      scene.add(mesh);
      parts[def.id] = mesh;
      partList.push(mesh);
    }

    partDefs.forEach(createPart);

    function createZone(partId, radius = 0.28) {
      const ring = new THREE.Mesh(
        new THREE.TorusGeometry(radius, 0.03, 12, 32),
        new THREE.MeshStandardMaterial({
          color: "#44cc66",
          transparent: true,
          opacity: 0.55,
          emissive: 0x113311
        })
      );
      ring.position.copy(zoneDefs[partId].position);
      ring.rotation.x = Math.PI / 2;
      ring.receiveShadow = false;
      scene.add(ring);
      zones[partId] = ring;
    }

    createZone("downTube", 0.34);
    createZone("seatTube", 0.30);
    createZone("topTube", 0.32);
    createZone("headTube", 0.26);
    createZone("chainStay", 0.30);

    function setSelected(mesh) {
      if (selectedPart && parts[selectedPart]) {
        parts[selectedPart].material.emissive.setHex(0x000000);
      }

      if (mesh && mesh.userData.selectable && !mesh.userData.snapped) {
        selectedPart = mesh.userData.id;
        mesh.material.emissive.setHex(0x444400);
      } else {
        selectedPart = null;
      }

      selectionLabel.textContent = `Selected: ${selectedPart || "None"}`;
    }

    function updateProgressUI() {
      const percent = partsSnapped * 20;
      progressFill.style.width = `${percent}%`;
    }

    function trySnapSelected() {
      if (!selectedPart) return;
      const part = parts[selectedPart];
      if (!part || part.userData.snapped) return;

      const zone = zoneDefs[selectedPart];
      const dist = part.position.distanceTo(zone.position);

      if (dist <= 0.6) {
        part.position.copy(zone.position);
        part.position.y = 0.5;
        part.rotation.copy(zone.rotation);

        part.userData.snapped = true;
        part.userData.selectable = false;
        part.material.emissive.setHex(0x000000);
        zones[selectedPart].material.color.set("#FFD700");
        zones[selectedPart].material.emissive.setHex(0x665500);

        assembledFrameGroup.attach(part);

        partsSnapped++;
        updateProgressUI();

        if (selectedPart === part.userData.id) {
          selectedPart = null;
          selectionLabel.textContent = "Selected: None";
        }

        if (partsSnapped === 5 && !isComplete) {
          isComplete = true;
          completeMsg.style.display = "block";
          celebrationActive = true;
          celebrationStart = performance.now();
          celebrationStartRot = assembledFrameGroup.rotation.y;
        }
      }
    }

    function moveSelected(dx, dz) {
      if (!selectedPart) return;
      const part = parts[selectedPart];
      if (!part || part.userData.snapped) return;

      part.position.x = THREE.MathUtils.clamp(part.position.x + dx, -4.7, 4.7);
      part.position.z = THREE.MathUtils.clamp(part.position.z + dz, -2.7, 2.7);
      part.position.y = 0.5;
    }

    function rotateSelected() {
      if (!selectedPart) return;
      const part = parts[selectedPart];
      if (!part || part.userData.snapped) return;
      part.rotation.y += THREE.MathUtils.degToRad(15);
    }

    function setSelectedColor(hex) {
      if (!selectedPart) return;
      const part = parts[selectedPart];
      if (!part || part.userData.snapped) return;
      part.material.color.set(hex);
      part.userData.baseColor = hex;
    }

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(partList, false);

      if (intersects.length > 0) {
        const clicked = intersects.find(i => i.object.userData.selectable && !i.object.userData.snapped);
        if (clicked) {
          setSelected(clicked.object);
          return;
        }
      }

      setSelected(null);
    });

    window.addEventListener("keydown", (event) => {
      if (["ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Space"].includes(event.code)) {
        event.preventDefault();
      }

      switch (event.code) {
        case "ArrowLeft":
          moveSelected(-0.3, 0);
          break;
        case "ArrowRight":
          moveSelected(0.3, 0);
          break;
        case "ArrowUp":
          moveSelected(0, -0.3);
          break;
        case "ArrowDown":
          moveSelected(0, 0.3);
          break;
        case "KeyR":
          rotateSelected();
          break;
        case "Space":
          trySnapSelected();
          break;
      }
    });

    document.getElementById("btn-silver").addEventListener("click", () => setSelectedColor("#C0C0C0"));
    document.getElementById("btn-red").addEventListener("click", () => setSelectedColor("#CC2222"));
    document.getElementById("btn-blue").addEventListener("click", () => setSelectedColor("#2244CC"));

    window.__3D_STATE__ = {
      selectedPart: null,
      partsSnapped: 0,
      assemblyPercent: 0,
      partPositions: {},
      partColors: {},
      partSnappedStatus: {},
      isComplete: false,
      celebrationActive: false,
      cameraDistance: 0
    };

    function updateState() {
      const partPositions = {};
      const partColors = {};
      const partSnappedStatus = {};

      for (const def of partDefs) {
        const p = parts[def.id];
        partPositions[def.id] = {
          x: Number(p.position.x.toFixed(3)),
          y: Number(p.position.y.toFixed(3)),
          z: Number(p.position.z.toFixed(3))
        };
        partColors[def.id] = `#${p.material.color.getHexString().toUpperCase()}`;
        partSnappedStatus[def.id] = !!p.userData.snapped;
      }

      window.__3D_STATE__.selectedPart = selectedPart;
      window.__3D_STATE__.partsSnapped = partsSnapped;
      window.__3D_STATE__.assemblyPercent = partsSnapped * 20;
      window.__3D_STATE__.partPositions = partPositions;
      window.__3D_STATE__.partColors = partColors;
      window.__3D_STATE__.partSnappedStatus = partSnappedStatus;
      window.__3D_STATE__.isComplete = isComplete;
      window.__3D_STATE__.celebrationActive = celebrationActive;
      window.__3D_STATE__.cameraDistance = Number(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)).toFixed(3));
    }

    function animate(now) {
      requestAnimationFrame(animate);

      controls.update();

      for (const key in zones) {
        if (!parts[key].userData.snapped) {
          zones[key].rotation.z += 0.01;
        }
      }

      if (celebrationActive) {
        const elapsed = now - celebrationStart;
        const duration = 2000;
        const t = Math.min(elapsed / duration, 1);
        assembledFrameGroup.rotation.y = celebrationStartRot + t * Math.PI * 2;

        if (t >= 1) {
          celebrationActive = false;
        }
      }

      updateState();
      renderer.render(scene, camera);
    }

    updateProgressUI();
    animate(performance.now());

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
