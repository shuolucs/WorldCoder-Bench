<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendulum Wave & Dragon</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.75);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: none;
            min-width: 250px;
            text-shadow: 1px 1px 2px #000;
        }
        #hud h3 {
            margin: 0 0 10px 0;
            color: #4da6ff;
        }
        .hud-line {
            margin-bottom: 5px;
        }
        .controls-help {
            margin-top: 15px;
            font-size: 0.85em;
            color: #aaa;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            pendulumCount: 15,
            simTime: 0,
            simSpeed: 1.0,
            isPaused: false,
            particlesEnabled: true,
            selectedPendulum: -1,
            pendulumAngles: new Array(15).fill(0.4),
            pendulumLengths: [],
            totalParticleCount: 0,
            dragonLoaded: false,
            dragonRotationY: 0,
            bobPositions: new Array(15).fill({x: 0, y: 0}),
            maxAngle: 0.4
        };

        const STATE = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.FogExp2(0x050505, 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 6, 0);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        const d = 15;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.bias = -0.0005;
        scene.add(dirLight);

        // --- ENVIRONMENT ---
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.2 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Support Structure
        const beamMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.4, metalness: 0.6 });
        const beamGeo = new THREE.BoxGeometry(20, 0.3, 0.3);
        const beam = new THREE.Mesh(beamGeo, beamMat);
        beam.position.set(0, 12, 0);
        beam.castShadow = true;
        beam.receiveShadow = true;
        scene.add(beam);

        const postGeo = new THREE.BoxGeometry(0.3, 12, 0.3);
        const post1 = new THREE.Mesh(postGeo, beamMat);
        post1.position.set(-10, 6, 0);
        post1.castShadow = true;
        post1.receiveShadow = true;
        scene.add(post1);

        const post2 = new THREE.Mesh(postGeo, beamMat);
        post2.position.set(10, 6, 0);
        post2.castShadow = true;
        post2.receiveShadow = true;
        scene.add(post2);

        // Pedestal for Dragon
        const pedGeo = new THREE.CylinderGeometry(2, 2.5, 1, 32);
        const pedMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });
        const pedestal = new THREE.Mesh(pedGeo, pedMat);
        pedestal.position.set(0, 0.5, -8);
        pedestal.castShadow = true;
        pedestal.receiveShadow = true;
        scene.add(pedestal);

        // --- LOAD GLTF MODEL ---
        let dragonModel = null;
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb';
        
        loader.load(modelUrl, (gltf) => {
            dragonModel = gltf.scene;
            
            // Calculate bounding box to scale to ~3 units tall
            const box = new THREE.Box3().setFromObject(dragonModel);
            const size = box.getSize(new THREE.Vector3());
            const scale = 3.0 / size.y;
            dragonModel.scale.setScalar(scale);
            
            // Recompute box after scaling to position correctly
            const scaledBox = new THREE.Box3().setFromObject(dragonModel);
            const bottomY = scaledBox.min.y;
            
            // Place on pedestal (pedestal top is at y=1)
            dragonModel.position.set(0, 1 - bottomY, -8);
            
            dragonModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(dragonModel);
            STATE.dragonLoaded = true;
        });

        // --- PENDULUM WAVE SETUP ---
        const pendulums = [];
        const bobs = [];
        const bobGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const stringGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
        stringGeo.translate(0, -0.5, 0); // Move pivot to top

        for (let i = 0; i < STATE.pendulumCount; i++) {
            const L = 4.0 + i * 0.25;
            STATE.pendulumLengths.push(L);
            
            const anchorX = -7 + i * (14 / (STATE.pendulumCount - 1));
            const omega = Math.sqrt(9.81 / L);
            
            const hue = i * (300 / (STATE.pendulumCount - 1));
            const color = new THREE.Color().setHSL(hue / 360, 1.0, 0.5);
            
            const bobMat = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.2, 
                metalness: 0.1 
            });
            const bobMesh = new THREE.Mesh(bobGeo, bobMat);
            bobMesh.castShadow = true;
            bobMesh.receiveShadow = true;
            scene.add(bobMesh);
            bobs.push(bobMesh);
            
            const stringMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const stringMesh = new THREE.Mesh(stringGeo, stringMat);
            stringMesh.scale.y = L;
            stringMesh.position.set(anchorX, 12, 0);
            stringMesh.castShadow = true;
            scene.add(stringMesh);
            
            pendulums.push({
                index: i,
                L: L,
                anchorX: anchorX,
                omega: omega,
                color: color,
                bobMesh: bobMesh,
                stringMesh: stringMesh,
                spawnTimer: 0
            });
        }

        // --- PARTICLE SYSTEM ---
        const particles = [];
        const particleGeo = new THREE.SphereGeometry(0.06, 8, 8);
        const MAX_PARTICLES_PER_PENDULUM = 30;
        const PARTICLE_LIFE = 1.5;

        function spawnParticle(pendulum) {
            if (!STATE.particlesEnabled) return;

            // Enforce max particles per pendulum
            let pCount = 0;
            let oldestIdx = -1;
            let oldestLife = Infinity;

            for (let i = 0; i < particles.length; i++) {
                if (particles[i].pIndex === pendulum.index) {
                    pCount++;
                    if (particles[i].life < oldestLife) {
                        oldestLife = particles[i].life;
                        oldestIdx = i;
                    }
                }
            }

            if (pCount >= MAX_PARTICLES_PER_PENDULUM && oldestIdx !== -1) {
                // Remove oldest
                const p = particles[oldestIdx];
                scene.remove(p.mesh);
                p.mesh.material.dispose();
                particles.splice(oldestIdx, 1);
            }

            const mat = new THREE.MeshBasicMaterial({
                color: pendulum.color,
                transparent: true,
                opacity: 1.0,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.position.copy(pendulum.bobMesh.position);
            scene.add(mesh);

            particles.push({
                mesh: mesh,
                pIndex: pendulum.index,
                life: PARTICLE_LIFE,
                maxLife: PARTICLE_LIFE,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                vz: (Math.random() - 0.5) * 0.5
            });
        }

        // --- INTERACTIONS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bobs);

            // Reset previous selection
            if (STATE.selectedPendulum !== -1) {
                bobs[STATE.selectedPendulum].material.emissive.setHex(0x000000);
            }

            if (intersects.length > 0) {
                const selectedBob = intersects[0].object;
                const idx = bobs.indexOf(selectedBob);
                
                if (STATE.selectedPendulum === idx) {
                    STATE.selectedPendulum = -1; // Deselect
                } else {
                    STATE.selectedPendulum = idx;
                    selectedBob.material.emissive.setHex(0xaaaa00);
                }
            } else {
                STATE.selectedPendulum = -1;
            }
            updateHUD();
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case ' ':
                    STATE.isPaused = !STATE.isPaused;
                    break;
                case 'r':
                    STATE.simTime = 0;
                    // Clear particles
                    for (let i = particles.length - 1; i >= 0; i--) {
                        scene.remove(particles[i].mesh);
                        particles[i].mesh.material.dispose();
                    }
                    particles.length = 0;
                    break;
                case 'p':
                    STATE.particlesEnabled = !STATE.particlesEnabled;
                    break;
                case '=':
                case '+':
                    STATE.simSpeed = Math.min(3.0, STATE.simSpeed + 0.25);
                    break;
                case '-':
                    STATE.simSpeed = Math.max(0.25, STATE.simSpeed - 0.25);
                    break;
            }
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD UPDATE ---
        const hudElement = document.getElementById('hud');
        function updateHUD() {
            let html = `<h3>Pendulum Wave</h3>`;
            html += `<div class="hud-line">Time: ${STATE.simTime.toFixed(2)}s</div>`;
            html += `<div class="hud-line">Speed: ${STATE.simSpeed.toFixed(2)}x</div>`;
            html += `<div class="hud-line">Particles: <span style="color:${STATE.particlesEnabled?'#0f0':'#f00'}">${STATE.particlesEnabled ? 'ON' : 'OFF'}</span></div>`;
            html += `<div class="hud-line">Status: <span style="color:${STATE.isPaused?'#f00':'#0f0'}">${STATE.isPaused ? 'Paused' : 'Running'}</span></div>`;
            html += `<div class="hud-line">Active Particles: ${STATE.totalParticleCount}</div>`;
            
            html += `<div style="margin-top:15px; min-height: 90px;">`;
            if (STATE.selectedPendulum !== -1) {
                const idx = STATE.selectedPendulum;
                const L = STATE.pendulumLengths[idx];
                const freq = Math.sqrt(9.81 / L) / (2 * Math.PI);
                const angle = STATE.pendulumAngles[idx];
                
                html += `<div style="color: #ffff00; font-weight: bold; margin-bottom: 5px;">Selected: Pendulum #${idx}</div>`;
                html += `<div class="hud-line">Length: ${L.toFixed(2)} m</div>`;
                html += `<div class="hud-line">Frequency: ${freq.toFixed(3)} Hz</div>`;
                html += `<div class="hud-line">Current Angle: ${angle.toFixed(3)} rad</div>`;
            } else {
                html += `<div style="color: #888; font-style: italic;">Click a bob to view details</div>`;
            }
            html += `</div>`;

            html += `<div class="controls-help">`;
            html += `SPACE : Play/Pause<br>`;
            html += `R     : Reset Time<br>`;
            html += `P     : Toggle Particles<br>`;
            html += `+/-   : Adjust Speed<br>`;
            html += `Click : Select Pendulum`;
            html += `</div>`;

            hudElement.innerHTML = html;
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        let lastHudUpdate = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const rawDelta = clock.getDelta();
            const delta = Math.min(rawDelta, 0.1); // Cap delta to prevent huge jumps
            
            if (!STATE.isPaused) {
                STATE.simTime += delta * STATE.simSpeed;
            }

            const t = STATE.simTime;

            // Update Pendulums
            pendulums.forEach(p => {
                const theta = STATE.maxAngle * Math.cos(p.omega * t);
                STATE.pendulumAngles[p.index] = theta;

                const bx = p.anchorX + p.L * Math.sin(theta);
                const by = 12 - p.L * Math.cos(theta);
                
                p.bobMesh.position.set(bx, by, 0);
                STATE.bobPositions[p.index] = { x: bx, y: by };

                p.stringMesh.rotation.z = theta;

                // Particle Spawning logic (only when running)
                if (!STATE.isPaused && STATE.particlesEnabled) {
                    // Spawn roughly based on distance moved or fixed rate
                    p.spawnTimer += delta * STATE.simSpeed;
                    const spawnInterval = PARTICLE_LIFE / MAX_PARTICLES_PER_PENDULUM;
                    if (p.spawnTimer >= spawnInterval) {
                        spawnParticle(p);
                        p.spawnTimer %= spawnInterval;
                    }
                }
            });

            // Update Particles (always update so they fade/fall even if paused)
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta; // Fade in real-time
                
                if (p.life <= 0) {
                    scene.remove(p.mesh);
                    p.mesh.material.dispose();
                    particles.splice(i, 1);
                } else {
                    // Apply gravity (1.0 m/s^2)
                    p.vy -= 1.0 * delta;
                    
                    p.mesh.position.x += p.vx * delta;
                    p.mesh.position.y += p.vy * delta;
                    p.mesh.position.z += p.vz * delta;
                    
                    p.mesh.material.opacity = p.life / p.maxLife;
                }
            }
            STATE.totalParticleCount = particles.length;

            // Update Dragon
            if (STATE.dragonLoaded && dragonModel) {
                dragonModel.rotation.y += 0.2 * delta * (STATE.isPaused ? 1 : STATE.simSpeed);
                STATE.dragonRotationY = dragonModel.rotation.y;
            }

            controls.update();
            renderer.render(scene, camera);

            // Throttle HUD updates slightly for performance
            if (performance.now() - lastHudUpdate > 50) {
                updateHUD();
                lastHudUpdate = performance.now();
            }
        }

        // Initialize HUD and start loop
        updateHUD();
        animate();

    </script>
</body>
</html>
