<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pendulum Wave Demonstration</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #00ff88;
    background: rgba(0, 0, 0, 0.75);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #00ff44;
    font-size: 14px;
    line-height: 1.8;
    pointer-events: none;
    min-width: 250px;
    text-shadow: 0 0 5px #00ff88;
}
#hud .label { color: #888; }
#hud .value { color: #00ff88; }
#hud .selected-info { 
    margin-top: 10px; 
    padding-top: 10px; 
    border-top: 1px solid #00ff44; 
}
#controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #666;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-size: 11px;
    line-height: 1.6;
    pointer-events: none;
}
</style>
</head>
<body>
<div id="hud">
    <div><span class="label">Time: </span><span class="value" id="hud-time">0.00s</span></div>
    <div><span class="label">Speed: </span><span class="value" id="hud-speed">1.00x</span></div>
    <div><span class="label">Particles: </span><span class="value" id="hud-particles">ON</span></div>
    <div><span class="label">Status: </span><span class="value" id="hud-status">Running</span></div>
    <div id="selected-info" class="selected-info" style="display:none;">
        <div><span class="label">Selected: </span><span class="value" id="hud-selected"></span></div>
        <div><span class="label">Length: </span><span class="value" id="hud-length"></span></div>
        <div><span class="label">Frequency: </span><span class="value" id="hud-frequency"></span></div>
        <div><span class="label">Current Angle: </span><span class="value" id="hud-angle"></span></div>
    </div>
</div>
<div id="controls-help">
    SPACE: Pause/Resume | R: Reset | P: Toggle Particles | +/-: Speed | Click bob: Select
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    pendulumCount: 15,
    simTime: 0,
    simSpeed: 1.0,
    isPaused: false,
    particlesEnabled: true,
    selectedPendulum: -1,
    pendulumAngles: new Array(15).fill(0),
    pendulumLengths: [],
    totalParticleCount: 0,
    dragonLoaded: false,
    dragonRotationY: 0,
    bobPositions: [],
    maxAngle: 0.4
};

for (let i = 0; i < 15; i++) {
    state.pendulumLengths.push(4.0 + i * 0.25);
    state.bobPositions.push({ x: 0, y: 0 });
}

window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.FogExp2(0x111111, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 5, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 40;
scene.add(dirLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// --- Support Structure ---
const beamMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.3 });

const beam = new THREE.Mesh(new THREE.BoxGeometry(20, 0.3, 0.3), beamMat);
beam.position.set(0, 12, 0);
beam.castShadow = true;
scene.add(beam);

const postGeo = new THREE.BoxGeometry(0.3, 12, 0.3);
const postLeft = new THREE.Mesh(postGeo, beamMat);
postLeft.position.set(-10, 6, 0);
postLeft.castShadow = true;
scene.add(postLeft);

const postRight = new THREE.Mesh(postGeo, beamMat);
postRight.position.set(10, 6, 0);
postRight.castShadow = true;
scene.add(postRight);

// --- Pedestal for Dragon ---
const pedestalGeo = new THREE.CylinderGeometry(1.5, 2, 2, 32);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.5 });
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(0, 1, -8);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// --- Dragon Model ---
let dragonModel = null;
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
    (gltf) => {
        dragonModel = gltf.scene;
        
        // Calculate bounding box to scale properly
        const box = new THREE.Box3().setFromObject(dragonModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 3.0 / maxDim;
        dragonModel.scale.set(scale, scale, scale);
        
        // Recalculate after scaling
        const box2 = new THREE.Box3().setFromObject(dragonModel);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        
        dragonModel.position.set(0 - center.x, 2 - box2.min.y, -8 - center.z);
        
        dragonModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        
        scene.add(dragonModel);
        state.dragonLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Dragon model failed to load:', error);
        // Create a placeholder
        const placeholderGeo = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const placeholderMat = new THREE.MeshStandardMaterial({ 
            color: 0x8844ff, 
            metalness: 0.7, 
            roughness: 0.2,
            transparent: true,
            opacity: 0.8
        });
        dragonModel = new THREE.Mesh(placeholderGeo, placeholderMat);
        dragonModel.position.set(0, 3.5, -8);
        dragonModel.castShadow = true;
        scene.add(dragonModel);
        state.dragonLoaded = true;
    }
);

// --- Pendulums ---
const PENDULUM_COUNT = 15;
const THETA_0 = 0.4;
const G = 9.81;
const ANCHOR_Y = 12;

const pendulums = [];
const bobMeshes = [];

for (let i = 0; i < PENDULUM_COUNT; i++) {
    const anchorX = -7 + (14 / (PENDULUM_COUNT - 1)) * i;
    const length = state.pendulumLengths[i];
    const hue = (i / (PENDULUM_COUNT - 1)) * (300 / 360);
    const color = new THREE.Color().setHSL(hue, 1.0, 0.5);
    
    // Bob
    const bobGeo = new THREE.SphereGeometry(0.3, 16, 16);
    const bobMat = new THREE.MeshStandardMaterial({ 
        color: color, 
        metalness: 0.4, 
        roughness: 0.3,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
    });
    const bob = new THREE.Mesh(bobGeo, bobMat);
    bob.castShadow = true;
    bob.userData.pendulumIndex = i;
    scene.add(bob);
    bobMeshes.push(bob);
    
    // String
    const stringGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
    const stringMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
    const string = new THREE.Mesh(stringGeo, stringMat);
    scene.add(string);
    
    const omega = Math.sqrt(G / length);
    
    pendulums.push({
        anchorX,
        length,
        omega,
        color: color.clone(),
        hue,
        bob,
        string,
        bobMat,
        particles: [],
        particleEmitTimer: 0
    });
}

// --- Particle System ---
const particleGeometry = new THREE.BufferGeometry();
const particleTexture = createParticleTexture();

function createParticleTexture() {
    const canvas = document.createElement('canvas');
    canvas.width = 32;
    canvas.height = 32;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
    gradient.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 32, 32);
    const tex = new THREE.CanvasTexture(canvas);
    return tex;
}

// Particle pool per pendulum
const MAX_PARTICLES_PER_PENDULUM = 30;
const PARTICLE_LIFETIME = 1.5;
const PARTICLE_GRAVITY = 1.0;

// We'll use individual sprite-like points for particles
// For performance, use a single Points object with all particles
const MAX_TOTAL_PARTICLES = PENDULUM_COUNT * MAX_PARTICLES_PER_PENDULUM;
const particlePositions = new Float32Array(MAX_TOTAL_PARTICLES * 3);
const particleColors = new Float32Array(MAX_TOTAL_PARTICLES * 3);
const particleSizes = new Float32Array(MAX_TOTAL_PARTICLES);
const particleOpacities = new Float32Array(MAX_TOTAL_PARTICLES);

const allParticles = []; // flat array of particle data

const pGeometry = new THREE.BufferGeometry();
pGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
pGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
pGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
pGeometry.setAttribute('opacity', new THREE.BufferAttribute(particleOpacities, 1));

const particleShaderMat = new THREE.ShaderMaterial({
    uniforms: {
        pointTexture: { value: particleTexture }
    },
    vertexShader: `
        attribute float size;
        attribute float opacity;
        varying float vOpacity;
        varying vec3 vColor;
        void main() {
            vOpacity = opacity;
            vColor = color;
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_PointSize = size * (200.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    `,
    fragmentShader: `
        uniform sampler2D pointTexture;
        varying float vOpacity;
        varying vec3 vColor;
        void main() {
            vec4 texColor = texture2D(pointTexture, gl_PointCoord);
            gl_FragColor = vec4(vColor, texColor.a * vOpacity);
            if (gl_FragColor.a < 0.01) discard;
        }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true
});

const particleSystem = new THREE.Points(pGeometry, particleShaderMat);
scene.add(particleSystem);

// --- Raycaster for clicking ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(bobMeshes);
    
    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.pendulumIndex;
        if (state.selectedPendulum === idx) {
            deselectPendulum();
        } else {
            selectPendulum(idx);
        }
    } else {
        deselectPendulum();
    }
});

function selectPendulum(idx) {
    // Deselect previous
    if (state.selectedPendulum >= 0) {
        const prev = pendulums[state.selectedPendulum];
        prev.bobMat.emissive.set(0x000000);
        prev.bobMat.emissiveIntensity = 0;
    }
    
    state.selectedPendulum = idx;
    const p = pendulums[idx];
    p.bobMat.emissive.set(0xffff00);
    p.bobMat.emissiveIntensity = 0.8;
}

function deselectPendulum() {
    if (state.selectedPendulum >= 0) {
        const prev = pendulums[state.selectedPendulum];
        prev.bobMat.emissive.set(0x000000);
        prev.bobMat.emissiveIntensity = 0;
    }
    state.selectedPendulum = -1;
}

// --- Keyboard Controls ---
document.addEventListener('keydown', (event) => {
    switch (event.code) {
        case 'Space':
            event.preventDefault();
            state.isPaused = !state.isPaused;
            break;
        case 'KeyR':
            resetSimulation();
            break;
        case 'KeyP':
            state.particlesEnabled = !state.particlesEnabled;
            break;
        case 'Equal':
        case 'NumpadAdd':
            state.simSpeed = Math.min(3.0, state.simSpeed + 0.25);
            break;
        case 'Minus':
        case 'NumpadSubtract':
            state.simSpeed = Math.max(0.25, state.simSpeed - 0.25);
            break;
    }
});

function resetSimulation() {
    state.simTime = 0;
    // Clear all particles
    allParticles.length = 0;
    for (const p of pendulums) {
        p.particles.length = 0;
        p.particleEmitTimer = 0;
    }
    state.totalParticleCount = 0;
    deselectPendulum();
}

// --- Window Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- HUD Update ---
function updateHUD() {
    document.getElementById('hud-time').textContent = state.simTime.toFixed(2) + 's';
    document.getElementById('hud-speed').textContent = state.simSpeed.toFixed(2) + 'x';
    document.getElementById('hud-particles').textContent = state.particlesEnabled ? 'ON' : 'OFF';
    document.getElementById('hud-status').textContent = state.isPaused ? 'Paused' : 'Running';
    
    const selectedInfo = document.getElementById('selected-info');
    if (state.selectedPendulum >= 0) {
        const idx = state.selectedPendulum;
        const p = pendulums[idx];
        selectedInfo.style.display = 'block';
        document.getElementById('hud-selected').textContent = 'Pendulum #' + (idx + 1);
        document.getElementById('hud-length').textContent = p.length.toFixed(2) + ' m';
        document.getElementById('hud-frequency').textContent = (p.omega / (2 * Math.PI)).toFixed(2) + ' Hz';
        document.getElementById('hud-angle').textContent = state.pendulumAngles[idx].toFixed(4) + ' rad';
    } else {
        selectedInfo.style.display = 'none';
    }
}

// --- Animation Loop ---
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const delta = Math.min(clock.getDelta(), 0.05); // Cap delta to avoid huge jumps
    
    // Update simulation time
    if (!state.isPaused) {
        state.simTime += delta * state.simSpeed;
    }
    
    // Update dragon rotation
    if (dragonModel) {
        state.dragonRotationY += 0.2 * delta;
        dragonModel.rotation.y = state.dragonRotationY;
    }
    
    // Update pendulums
    for (let i = 0; i < PENDULUM_COUNT; i++) {
        const p = pendulums[i];
        const theta = THETA_0 * Math.cos(p.omega * state.simTime);
        state.pendulumAngles[i] = theta;
        
        const bobX = p.anchorX + p.length * Math.sin(theta);
        const bobY = ANCHOR_Y - p.length * Math.cos(theta);
        
        state.bobPositions[i].x = bobX;
        state.bobPositions[i].y = bobY;
        
        p.bob.position.set(bobX, bobY, 0);
        
        // Update string
        const midX = (p.anchorX + bobX) / 2;
        const midY = (ANCHOR_Y + bobY) / 2;
        const dx = bobX - p.anchorX;
        const dy = bobY - ANCHOR_Y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        p.string.position.set(midX, midY, 0);
        p.string.scale.set(1, dist, 1);
        p.string.rotation.z = Math.atan2(dx, dy) * -1;
        
        // Emit particles
        if (!state.isPaused && state.particlesEnabled) {
            p.particleEmitTimer += delta * state.simSpeed;
            const emitInterval = 0.03;
            while (p.particleEmitTimer >= emitInterval) {
                p.particleEmitTimer -= emitInterval;
                
                // Remove oldest if at max
                if (p.particles.length >= MAX_PARTICLES_PER_PENDULUM) {
                    p.particles.shift();
                }
                
                const particle = {
                    x: bobX + (Math.random() - 0.5) * 0.1,
                    y: bobY + (Math.random() - 0.5) * 0.1,
                    z: (Math.random() - 0.5) * 0.1,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.3 + 0.2,
                    vz: (Math.random() - 0.5) * 0.5,
                    life: PARTICLE_LIFETIME,
                    maxLife: PARTICLE_LIFETIME,
                    r: p.color.r,
                    g: p.color.g,
                    b: p.color.b
                };
                p.particles.push(particle);
            }
        }
        
        // Update particles
        for (let j = p.particles.length - 1; j >= 0; j--) {
            const part = p.particles[j];
            part.life -= delta;
            if (part.life <= 0) {
                p.particles.splice(j, 1);
                continue;
            }
            part.vy -= PARTICLE_GRAVITY * delta;
            part.x += part.vx * delta;
            part.y += part.vy * delta;
            part.z += part.vz * delta;
        }
    }
    
    // Rebuild particle buffers
    let particleIdx = 0;
    let totalParticles = 0;
    for (let i = 0; i < PENDULUM_COUNT; i++) {
        const p = pendulums[i];
        for (let j = 0; j < p.particles.length; j++) {
            if (particleIdx >= MAX_TOTAL_PARTICLES) break;
            const part = p.particles[j];
            const idx3 = particleIdx * 3;
            particlePositions[idx3] = part.x;
            particlePositions[idx3 + 1] = part.y;
            particlePositions[idx3 + 2] = part.z;
            particleColors[idx3] = part.r;
            particleColors[idx3 + 1] = part.g;
            particleColors[idx3 + 2] = part.b;
            particleSizes[particleIdx] = 3.0;
            particleOpacities[particleIdx] = Math.max(0, part.life / part.maxLife);
            particleIdx++;
            totalParticles++;
        }
    }
    
    // Zero out remaining
    for (let i = particleIdx; i < MAX_TOTAL_PARTICLES; i++) {
        particleSizes[i] = 0;
        particleOpacities[i] = 0;
    }
    
    state.totalParticleCount = totalParticles;
    
    pGeometry.attributes.position.needsUpdate = true;
    pGeometry.attributes.color.needsUpdate = true;
    pGeometry.attributes.size.needsUpdate = true;
    pGeometry.attributes.opacity.needsUpdate = true;
    pGeometry.setDrawRange(0, particleIdx);
    
    // Update HUD
    updateHUD();
    
    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
