<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Pendulum Wave with Dragon and Particles</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      min-width: 250px;
      user-select: none;
      z-index: 10;
    }

    #hud .title {
      font-weight: bold;
      margin-bottom: 6px;
      color: #ffd54a;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #ddd;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.4;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="title">Pendulum Wave HUD</div>
    <div id="hudContent"></div>
  </div>

  <div id="help">
    <div><b>Controls</b></div>
    <div>SPACE: Pause/Resume</div>
    <div>R: Reset</div>
    <div>P: Particles On/Off</div>
    <div>+ / = : Speed Up</div>
    <div>- : Slow Down</div>
    <div>Click bob: Select/Deselect</div>
    <div>Mouse: Orbit camera</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070b);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -30;
    dirLight.shadow.camera.right = 30;
    dirLight.shadow.camera.top = 30;
    dirLight.shadow.camera.bottom = -30;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 60;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(50, 50),
      new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.95, metalness: 0.05 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const supportMaterial = new THREE.MeshStandardMaterial({
      color: 0xaaaaaa,
      metalness: 0.9,
      roughness: 0.25
    });

    const beam = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.3, 0.3),
      supportMaterial
    );
    beam.position.set(0, 12, 0);
    beam.castShadow = true;
    beam.receiveShadow = true;
    scene.add(beam);

    const leftPost = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 12, 0.3),
      supportMaterial
    );
    leftPost.position.set(-10, 6, 0);
    leftPost.castShadow = true;
    leftPost.receiveShadow = true;
    scene.add(leftPost);

    const rightPost = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 12, 0.3),
      supportMaterial
    );
    rightPost.position.set(10, 6, 0);
    rightPost.castShadow = true;
    rightPost.receiveShadow = true;
    scene.add(rightPost);

    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(2.2, 2.6, 1.2, 32),
      new THREE.MeshStandardMaterial({
        color: 0x666666,
        metalness: 0.35,
        roughness: 0.7
      })
    );
    pedestal.position.set(0, 0.6, -8);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    scene.add(pedestal);

    let dragon = null;
    let dragonLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DragonAttenuation/glTF-Binary/DragonAttenuation.glb',
      (gltf) => {
        dragon = gltf.scene;
        dragon.position.set(0, 2, -8);

        const box = new THREE.Box3().setFromObject(dragon);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 3 / (size.y || maxDim || 1);
        dragon.scale.setScalar(scale);

        dragon.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(dragon);
        dragonLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load DragonAttenuation.glb:', err);
      }
    );

    const PENDULUM_COUNT = 15;
    const anchorStart = -7;
    const anchorEnd = 7;
    const anchorSpacing = (anchorEnd - anchorStart) / (PENDULUM_COUNT - 1);
    const theta0 = 0.4;
    const g = 9.81;
    const anchorY = 12;

    const pendulums = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const stringMaterial = new THREE.MeshStandardMaterial({
      color: 0xe0e0e0,
      metalness: 0.3,
      roughness: 0.6
    });

    const bobGeometry = new THREE.SphereGeometry(0.3, 24, 24);
    const stringGeometry = new THREE.CylinderGeometry(0.04, 0.04, 1, 10);

    let selectedPendulum = -1;
    let isPaused = false;
    let particlesEnabled = true;
    let simTime = 0;
    let simSpeed = 1.0;

    function createParticleMaterial(color) {
      return new THREE.MeshBasicMaterial({
        color,
        transparent: true,
        opacity: 1.0,
        depthWrite: false
      });
    }

    function createPendulum(index) {
      const anchorX = anchorStart + index * anchorSpacing;
      const length = 4.0 + index * 0.25;
      const omega = Math.sqrt(g / length);
      const hue = (300 * index) / (PENDULUM_COUNT - 1);
      const color = new THREE.Color().setHSL(hue / 360, 0.9, 0.55);

      const group = new THREE.Group();
      scene.add(group);

      const string = new THREE.Mesh(stringGeometry, stringMaterial.clone());
      string.castShadow = true;
      string.receiveShadow = true;
      group.add(string);

      const bobMaterial = new THREE.MeshStandardMaterial({
        color,
        emissive: 0x000000,
        roughness: 0.35,
        metalness: 0.15
      });

      const bob = new THREE.Mesh(bobGeometry, bobMaterial);
      bob.castShadow = true;
      bob.receiveShadow = true;
      bob.userData.pendulumIndex = index;
      group.add(bob);

      const particleGroup = new THREE.Group();
      scene.add(particleGroup);

      const pendulum = {
        index,
        anchorX,
        anchorY,
        length,
        omega,
        color,
        theta: theta0,
        string,
        bob,
        particles: [],
        particleGroup,
        emitAccumulator: 0
      };

      updatePendulumTransform(pendulum, 0);
      pendulums.push(pendulum);
    }

    function updateStringBetween(mesh, start, end) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const length = dir.length();
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);

      mesh.position.copy(mid);
      mesh.scale.set(1, length, 1);

      const axis = new THREE.Vector3(0, 1, 0);
      mesh.quaternion.setFromUnitVectors(axis, dir.clone().normalize());
    }

    function updatePendulumTransform(pendulum, time) {
      const theta = theta0 * Math.cos(pendulum.omega * time);
      pendulum.theta = theta;

      const x = pendulum.anchorX + pendulum.length * Math.sin(theta);
      const y = pendulum.anchorY - pendulum.length * Math.cos(theta);

      pendulum.bob.position.set(x, y, 0);

      const start = new THREE.Vector3(pendulum.anchorX, pendulum.anchorY, 0);
      const end = pendulum.bob.position.clone();
      updateStringBetween(pendulum.string, start, end);
    }

    function emitParticle(pendulum) {
      const pGeo = new THREE.SphereGeometry(0.06, 8, 8);
      const pMat = createParticleMaterial(pendulum.color);
      const particleMesh = new THREE.Mesh(pGeo, pMat);
      particleMesh.position.copy(pendulum.bob.position);

      const vel = new THREE.Vector3(
        (Math.random() - 0.5) * 0.6,
        Math.random() * 0.45,
        (Math.random() - 0.5) * 0.6
      );

      const particle = {
        mesh: particleMesh,
        velocity: vel,
        age: 0,
        life: 1.5
      };

      pendulum.particleGroup.add(particleMesh);
      pendulum.particles.push(particle);

      while (pendulum.particles.length > 30) {
        const oldest = pendulum.particles.shift();
        oldest.mesh.geometry.dispose();
        oldest.mesh.material.dispose();
        pendulum.particleGroup.remove(oldest.mesh);
      }
    }

    function updateParticles(dt) {
      for (const pendulum of pendulums) {
        if (!isPaused && particlesEnabled) {
          pendulum.emitAccumulator += dt * 18;
          while (pendulum.emitAccumulator >= 1) {
            emitParticle(pendulum);
            pendulum.emitAccumulator -= 1;
          }
        }

        for (let i = pendulum.particles.length - 1; i >= 0; i--) {
          const p = pendulum.particles[i];
          p.age += dt;
          p.velocity.y -= 1.0 * dt;
          p.mesh.position.addScaledVector(p.velocity, dt);

          const alpha = Math.max(0, 1 - p.age / p.life);
          p.mesh.material.opacity = alpha;

          if (p.age >= p.life) {
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            pendulum.particleGroup.remove(p.mesh);
            pendulum.particles.splice(i, 1);
          }
        }
      }
    }

    function clearAllParticles() {
      for (const pendulum of pendulums) {
        for (const p of pendulum.particles) {
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          pendulum.particleGroup.remove(p.mesh);
        }
        pendulum.particles.length = 0;
        pendulum.emitAccumulator = 0;
      }
    }

    function resetSimulation() {
      simTime = 0;
      clearAllParticles();
      for (const pendulum of pendulums) {
        updatePendulumTransform(pendulum, simTime);
      }
    }

    for (let i = 0; i < PENDULUM_COUNT; i++) {
      createPendulum(i);
    }

    function setSelection(index) {
      if (selectedPendulum !== -1) {
        pendulums[selectedPendulum].bob.material.emissive.setHex(0x000000);
      }

      if (selectedPendulum === index) {
        selectedPendulum = -1;
        return;
      }

      selectedPendulum = index;

      if (selectedPendulum !== -1) {
        pendulums[selectedPendulum].bob.material.emissive.setHex(0xffff00);
      }
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(pendulums.map(p => p.bob), false);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.pendulumIndex;
        setSelection(idx);
      } else {
        setSelection(-1);
      }
    });

    window.addEventListener('keydown', (event) => {
      const key = event.key;

      if (key === ' ') {
        event.preventDefault();
        isPaused = !isPaused;
      } else if (key === 'r' || key === 'R') {
        resetSimulation();
      } else if (key === 'p' || key === 'P') {
        particlesEnabled = !particlesEnabled;
      } else if (key === '+' || key === '=') {
        simSpeed = Math.min(3.0, simSpeed + 0.25);
      } else if (key === '-') {
        simSpeed = Math.max(0.25, simSpeed - 0.25);
      }
    });

    const hudContent = document.getElementById('hudContent');

    window.__3D_STATE__ = {
      pendulumCount: PENDULUM_COUNT,
      simTime: 0,
      simSpeed: simSpeed,
      isPaused: isPaused,
      particlesEnabled: particlesEnabled,
      selectedPendulum: selectedPendulum,
      pendulumAngles: new Array(PENDULUM_COUNT).fill(theta0),
      pendulumLengths: pendulums.map(p => p.length),
      totalParticleCount: 0,
      dragonLoaded: dragonLoaded,
      dragonRotationY: 0,
      bobPositions: pendulums.map(p => ({ x: p.bob.position.x, y: p.bob.position.y })),
      maxAngle: theta0
    };

    function updateHUD() {
      let html = '';
      html += `Time: ${simTime.toFixed(2)}s<br>`;
      html += `Speed: ${simSpeed.toFixed(2)}x<br>`;
      html += `Particles: ${particlesEnabled ? 'ON' : 'OFF'}<br>`;
      html += `Status: ${isPaused ? 'Paused' : 'Running'}<br>`;

      if (selectedPendulum !== -1) {
        const p = pendulums[selectedPendulum];
        const frequencyHz = p.omega / (2 * Math.PI);
        html += `<br>`;
        html += `Selected: Pendulum #${selectedPendulum}<br>`;
        html += `Length: ${p.length.toFixed(2)} m<br>`;
        html += `Frequency: ${frequencyHz.toFixed(2)} Hz<br>`;
        html += `Current Angle: ${p.theta.toFixed(2)} rad`;
      }

      hudContent.innerHTML = html;
    }

    const clock = new THREE.Clock();

    function updateStateObject() {
      window.__3D_STATE__.pendulumCount = PENDULUM_COUNT;
      window.__3D_STATE__.simTime = simTime;
      window.__3D_STATE__.simSpeed = simSpeed;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.particlesEnabled = particlesEnabled;
      window.__3D_STATE__.selectedPendulum = selectedPendulum;
      window.__3D_STATE__.pendulumAngles = pendulums.map(p => p.theta);
      window.__3D_STATE__.pendulumLengths = pendulums.map(p => p.length);
      window.__3D_STATE__.totalParticleCount = pendulums.reduce((sum, p) => sum + p.particles.length, 0);
      window.__3D_STATE__.dragonLoaded = dragonLoaded;
      window.__3D_STATE__.dragonRotationY = dragon ? dragon.rotation.y : 0;
      window.__3D_STATE__.bobPositions = pendulums.map(p => ({ x: p.bob.position.x, y: p.bob.position.y }));
      window.__3D_STATE__.maxAngle = theta0;
    }

    function animate() {
      requestAnimationFrame(animate);

      const rawDt = Math.min(clock.getDelta(), 1 / 30);
      const scaledDt = rawDt * simSpeed;

      if (!isPaused) {
        simTime += scaledDt;
        for (const pendulum of pendulums) {
          updatePendulumTransform(pendulum, simTime);
        }
      }

      updateParticles(scaledDt);

      if (dragon) {
        dragon.rotation.y += 0.2 * rawDt;
      }

      controls.update();
      updateHUD();
      updateStateObject();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
