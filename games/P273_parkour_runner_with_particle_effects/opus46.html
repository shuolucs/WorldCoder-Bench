<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stork Parkour Runner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }
#scoreDisplay {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    z-index: 10;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#speedDisplay {
    position: absolute;
    top: 50px;
    left: 20px;
    color: white;
    font-size: 18px;
    z-index: 10;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#particleCount {
    position: absolute;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 16px;
    z-index: 10;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
}
#gameOverText {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #ff3333;
    font-size: 64px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.9);
    display: none;
}
#startBtn, #restartBtn {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s;
}
#startBtn {
    background: linear-gradient(135deg, #44aa44, #338833);
    color: white;
}
#startBtn:hover {
    background: linear-gradient(135deg, #55bb55, #44aa44);
    transform: translate(-50%, -50%) scale(1.05);
}
#restartBtn {
    background: linear-gradient(135deg, #aa4444, #883333);
    color: white;
    display: none;
}
#restartBtn:hover {
    background: linear-gradient(135deg, #bb5555, #aa4444);
    transform: translate(-50%, -50%) scale(1.05);
}
#instructions {
    position: absolute;
    top: 65%;
    left: 50%;
    transform: translate(-50%, 0);
    color: #ccc;
    font-size: 16px;
    text-align: center;
    z-index: 10;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="scoreDisplay">Score: 0</div>
<div id="speedDisplay">Speed: 8.0</div>
<div id="particleCount">Particles: 0</div>
<div id="gameOverText">GAME OVER</div>
<button id="startBtn">Start</button>
<button id="restartBtn">Restart</button>
<div id="instructions">
    SPACE / UP: Jump<br>
    LEFT / A: Move Left | RIGHT / D: Move Right<br>
    Avoid red obstacles and gaps!
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gameState: 'menu',
    score: 0,
    storkPosition: { x: 0, y: 1, z: 0 },
    storkVelocityY: 0,
    isGrounded: false,
    currentLane: 0,
    currentSpeed: 8,
    jumpCount: 0,
    particlesActive: 0,
    platformCount: 0,
    obstacleCount: 0,
    elapsedTime: 0,
    modelLoaded: false,
    lastCollisionType: 'none'
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 80);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 5, 12);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -20;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Skybox-like background elements
const starGeometry = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 500; i++) {
    starPositions.push(
        (Math.random() - 0.5) * 200,
        Math.random() * 80 + 10,
        (Math.random() - 0.5) * 200
    );
}
starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Stork model
let storkModel = null;
let mixer = null;
let storkFallback = null;

// Create fallback stork model
function createFallbackStork() {
    const group = new THREE.Group();
    
    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.3, 0.8, 8, 16);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.z = Math.PI / 2;
    group.add(body);
    
    // Head
    const headGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const headMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.set(0.6, 0.2, 0);
    group.add(head);
    
    // Beak
    const beakGeo = new THREE.ConeGeometry(0.08, 0.4, 8);
    const beakMat = new THREE.MeshPhongMaterial({ color: 0xff6600 });
    const beak = new THREE.Mesh(beakGeo, beakMat);
    beak.rotation.z = -Math.PI / 2;
    beak.position.set(0.95, 0.2, 0);
    group.add(beak);
    
    // Legs
    const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.6, 8);
    const legMat = new THREE.MeshPhongMaterial({ color: 0xff3333 });
    const leg1 = new THREE.Mesh(legGeo, legMat);
    leg1.position.set(0.1, -0.6, 0.1);
    group.add(leg1);
    const leg2 = new THREE.Mesh(legGeo, legMat);
    leg2.position.set(0.1, -0.6, -0.1);
    group.add(leg2);
    
    // Wings
    const wingGeo = new THREE.BoxGeometry(0.5, 0.05, 0.8);
    const wingMat = new THREE.MeshPhongMaterial({ color: 0x111111 });
    const wing1 = new THREE.Mesh(wingGeo, wingMat);
    wing1.position.set(0, 0.15, 0.5);
    group.add(wing1);
    const wing2 = new THREE.Mesh(wingGeo, wingMat);
    wing2.position.set(0, 0.15, -0.5);
    group.add(wing2);
    
    group.wing1 = wing1;
    group.wing2 = wing2;
    
    return group;
}

// Load stork model
const loader = new GLTFLoader();
loader.load(
    'stork.glb',
    (gltf) => {
        storkModel = gltf.scene;
        storkModel.scale.set(0.02, 0.02, 0.02);
        storkModel.position.set(0, 1, 0);
        storkModel.castShadow = true;
        storkModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        scene.add(storkModel);
        
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(storkModel);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
        }
        
        state.modelLoaded = true;
        console.log('Stork model loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Could not load stork.glb, using fallback model:', error);
        storkFallback = createFallbackStork();
        storkFallback.position.set(0, 1, 0);
        scene.add(storkFallback);
        storkModel = storkFallback;
        state.modelLoaded = true;
    }
);

// Platforms
const platforms = [];
const obstacles = [];
const platformWidth = 4;
const platformHeight = 0.5;
const platformDepth = 6;
const platformSpacing = 6;
const colors = [0x44aa44, 0x338833];

let platformIndex = 0;
let nextGapIn = Math.floor(Math.random() * 3) + 3;
let gapCounter = 0;

function createPlatform(zPos, index) {
    const isGap = gapCounter >= nextGapIn;
    
    if (isGap) {
        gapCounter = 0;
        nextGapIn = Math.floor(Math.random() * 3) + 3;
        return { zPos, isGap: true, mesh: null, obstacle: null, passed: false };
    }
    
    gapCounter++;
    
    const color = colors[index % 2];
    const geo = new THREE.BoxGeometry(platformWidth, platformHeight, platformDepth);
    const mat = new THREE.MeshPhongMaterial({ color });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(0, 0.25, zPos);
    mesh.receiveShadow = true;
    scene.add(mesh);
    
    // Side rails for visual flair
    const railGeo = new THREE.BoxGeometry(0.1, 0.3, platformDepth);
    const railMat = new THREE.MeshPhongMaterial({ color: 0x666666 });
    const leftRail = new THREE.Mesh(railGeo, railMat);
    leftRail.position.set(-platformWidth / 2, 0.65, zPos);
    scene.add(leftRail);
    const rightRail = new THREE.Mesh(railGeo, railMat);
    rightRail.position.set(platformWidth / 2, 0.65, zPos);
    scene.add(rightRail);
    
    mesh.leftRail = leftRail;
    mesh.rightRail = rightRail;
    
    // Obstacle
    let obstacle = null;
    if (Math.random() < 0.35 && index > 2) {
        const lane = Math.floor(Math.random() * 3) - 1;
        const obsGeo = new THREE.BoxGeometry(0.8, 1.5, 0.8);
        const obsMat = new THREE.MeshPhongMaterial({ color: 0xcc2222, emissive: 0x331111 });
        obstacle = new THREE.Mesh(obsGeo, obsMat);
        obstacle.position.set(lane * 3, 1.25, zPos);
        obstacle.castShadow = true;
        obstacle.lane = lane;
        scene.add(obstacle);
        obstacles.push(obstacle);
    }
    
    return { zPos, isGap: false, mesh, obstacle, passed: false, leftRail, rightRail };
}

function initPlatforms() {
    // Clear existing
    platforms.forEach(p => {
        if (p.mesh) {
            scene.remove(p.mesh);
            if (p.mesh.leftRail) scene.remove(p.mesh.leftRail);
            if (p.mesh.rightRail) scene.remove(p.mesh.rightRail);
        }
        if (p.obstacle) scene.remove(p.obstacle);
    });
    obstacles.length = 0;
    platforms.length = 0;
    platformIndex = 0;
    gapCounter = 0;
    nextGapIn = Math.floor(Math.random() * 3) + 3;
    
    for (let i = 0; i < 15; i++) {
        const zPos = -i * platformSpacing;
        const p = createPlatform(zPos, i);
        platforms.push(p);
        platformIndex++;
    }
}

// Particle System
const MAX_PARTICLES = 500;
const particlePositions = new Float32Array(MAX_PARTICLES * 3);
const particleColors = new Float32Array(MAX_PARTICLES * 4);
const particleVelocities = new Float32Array(MAX_PARTICLES * 3);
const particleLifetimes = new Float32Array(MAX_PARTICLES);
const particleMaxLifetimes = new Float32Array(MAX_PARTICLES);
const particleSizes = new Float32Array(MAX_PARTICLES);

for (let i = 0; i < MAX_PARTICLES; i++) {
    particleLifetimes[i] = 0;
    particleMaxLifetimes[i] = 1;
    particleSizes[i] = 2;
}

const particleGeometry = new THREE.BufferGeometry();
particleGeometry.setAttribute('position', new THREE.Float32BufferAttribute(particlePositions, 3));
particleGeometry.setAttribute('color', new THREE.Float32BufferAttribute(particleColors, 4));
particleGeometry.setAttribute('size', new THREE.Float32BufferAttribute(particleSizes, 1));

const particleVertexShader = `
    attribute float size;
    attribute vec4 color;
    varying vec4 vColor;
    void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (200.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
    }
`;

const particleFragmentShader = `
    varying vec4 vColor;
    void main() {
        float dist = length(gl_PointCoord - vec2(0.5));
        if (dist > 0.5) discard;
        float alpha = vColor.a * (1.0 - dist * 2.0);
        gl_FragColor = vec4(vColor.rgb, alpha);
    }
`;

const particleMaterial = new THREE.ShaderMaterial({
    vertexShader: particleVertexShader,
    fragmentShader: particleFragmentShader,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending
});

const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particleSystem);

let nextParticleIndex = 0;

function emitParticle(x, y, z, vx, vy, vz, r, g, b, lifetime, size) {
    const i = nextParticleIndex;
    nextParticleIndex = (nextParticleIndex + 1) % MAX_PARTICLES;
    
    particlePositions[i * 3] = x;
    particlePositions[i * 3 + 1] = y;
    particlePositions[i * 3 + 2] = z;
    
    particleVelocities[i * 3] = vx;
    particleVelocities[i * 3 + 1] = vy;
    particleVelocities[i * 3 + 2] = vz;
    
    particleColors[i * 4] = r;
    particleColors[i * 4 + 1] = g;
    particleColors[i * 4 + 2] = b;
    particleColors[i * 4 + 3] = 1.0;
    
    particleLifetimes[i] = lifetime;
    particleMaxLifetimes[i] = lifetime;
    particleSizes[i] = size || 3;
}

function emitJumpBurst(x, y, z) {
    for (let i = 0; i < 20; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 3 + 1;
        emitParticle(
            x + (Math.random() - 0.5) * 0.5,
            y,
            z + (Math.random() - 0.5) * 0.5,
            Math.cos(angle) * speed,
            -(Math.random() * 3 + 1),
            Math.sin(angle) * speed,
            1.0, 0.9, 0.2,
            0.8 + Math.random() * 0.4,
            4
        );
    }
}

function emitSpeedTrail(x, y, z) {
    emitParticle(
        x + (Math.random() - 0.5) * 0.3,
        y + (Math.random() - 0.5) * 0.3,
        z + 1,
        (Math.random() - 0.5) * 0.5,
        (Math.random() - 0.5) * 0.3,
        2 + Math.random() * 2,
        0.5 + Math.random() * 0.5,
        0.9 + Math.random() * 0.1,
        1.0,
        0.8 + Math.random() * 0.3,
        2.5
    );
}

function emitDeathExplosion(x, y, z) {
    for (let i = 0; i < 50; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const speed = Math.random() * 8 + 3;
        emitParticle(
            x, y, z,
            Math.sin(phi) * Math.cos(theta) * speed,
            Math.sin(phi) * Math.sin(theta) * speed,
            Math.cos(phi) * speed,
            1.0, 0.1 + Math.random() * 0.3, 0.1,
            1.5 + Math.random() * 0.5,
            5
        );
    }
}

function updateParticles(dt) {
    let activeCount = 0;
    
    for (let i = 0; i < MAX_PARTICLES; i++) {
        if (particleLifetimes[i] <= 0) continue;
        
        particleLifetimes[i] -= dt;
        
        if (particleLifetimes[i] <= 0) {
            particleLifetimes[i] = 0;
            particleColors[i * 4 + 3] = 0;
            particleSizes[i] = 0;
            continue;
        }
        
        activeCount++;
        
        particlePositions[i * 3] += particleVelocities[i * 3] * dt;
        particlePositions[i * 3 + 1] += particleVelocities[i * 3 + 1] * dt;
        particlePositions[i * 3 + 2] += particleVelocities[i * 3 + 2] * dt;
        
        // Fade alpha
        const lifeRatio = particleLifetimes[i] / particleMaxLifetimes[i];
        particleColors[i * 4 + 3] = lifeRatio;
    }
    
    particleGeometry.attributes.position.needsUpdate = true;
    particleGeometry.attributes.color.needsUpdate = true;
    particleGeometry.attributes.size.needsUpdate = true;
    
    state.particlesActive = activeCount;
}

// Game variables
let storkY = 1.25;
let storkVelocityY = 0;
let isGrounded = true;
let currentLane = 0;
let targetLaneX = 0;
let currentSpeed = 8;
let score = 0;
let jumpCount = 0;
let elapsedTime = 0;
let speedTrailTimer = 0;
let wingFlapTime = 0;

const gravity = -20;
const terminalVelocity = -15;
const jumpVelocity = 10;
const lanePositions = [-3, 0, 3];

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
    if (keys[e.code]) return;
    keys[e.code] = true;
    
    if (state.gameState !== 'playing') return;
    
    if ((e.code === 'Space' || e.code === 'ArrowUp') && isGrounded) {
        storkVelocityY = jumpVelocity;
        isGrounded = false;
        jumpCount++;
        if (storkModel) {
            emitJumpBurst(storkModel.position.x, storkModel.position.y - 0.5, storkModel.position.z);
        }
        e.preventDefault();
    }
    
    if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        currentLane = Math.max(-1, currentLane - 1);
        targetLaneX = lanePositions[currentLane + 1];
        e.preventDefault();
    }
    
    if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        currentLane = Math.min(1, currentLane + 1);
        targetLaneX = lanePositions[currentLane + 1];
        e.preventDefault();
    }
});

window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// Buttons
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const gameOverText = document.getElementById('gameOverText');
const scoreDisplay = document.getElementById('scoreDisplay');
const speedDisplay = document.getElementById('speedDisplay');
const particleCountDisplay = document.getElementById('particleCount');
const instructions = document.getElementById('instructions');

startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

function startGame() {
    state.gameState = 'playing';
    score = 0;
    storkY = 1.25;
    storkVelocityY = 0;
    isGrounded = true;
    currentLane = 0;
    targetLaneX = 0;
    currentSpeed = 8;
    jumpCount = 0;
    elapsedTime = 0;
    state.lastCollisionType = 'none';
    
    startBtn.style.display = 'none';
    restartBtn.style.display = 'none';
    gameOverText.style.display = 'none';
    instructions.style.display = 'none';
    
    if (storkModel) {
        storkModel.position.set(0, 1.25, 0);
        storkModel.visible = true;
    }
    
    initPlatforms();
    
    // Clear particles
    for (let i = 0; i < MAX_PARTICLES; i++) {
        particleLifetimes[i] = 0;
        particleColors[i * 4 + 3] = 0;
        particleSizes[i] = 0;
    }
}

function gameOver(collisionType) {
    state.gameState = 'gameover';
    state.lastCollisionType = collisionType;
    
    gameOverText.style.display = 'block';
    restartBtn.style.display = 'block';
    
    if (storkModel) {
        emitDeathExplosion(storkModel.position.x, storkModel.position.y, storkModel.position.z);
    }
}

// Animation loop
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const dt = Math.min(clock.getDelta(), 0.05);
    
    if (mixer) mixer.update(dt);
    
    // Wing flap for fallback model
    if (storkFallback && storkFallback.wing1) {
        wingFlapTime += dt * 8;
        const flapAngle = Math.sin(wingFlapTime) * 0.4;
        storkFallback.wing1.rotation.x = flapAngle;
        storkFallback.wing2.rotation.x = -flapAngle;
    }
    
    if (state.gameState === 'playing') {
        elapsedTime += dt;
        
        // Increase speed over time
        currentSpeed = 8 + Math.floor(elapsedTime / 10) * 0.5;
        
        // Gravity
        if (!isGrounded) {
            storkVelocityY += gravity * dt;
            if (storkVelocityY < terminalVelocity) storkVelocityY = terminalVelocity;
        }
        
        storkY += storkVelocityY * dt;
        
        // Lane movement (smooth)
        if (storkModel) {
            const lerpSpeed = 10;
            storkModel.position.x += (targetLaneX - storkModel.position.x) * Math.min(lerpSpeed * dt, 1);
        }
        
        // Move platforms toward player
        let onPlatform = false;
        const storkX = storkModel ? storkModel.position.x : 0;
        const storkZ = storkModel ? storkModel.position.z : 0;
        
        for (let i = platforms.length - 1; i >= 0; i--) {
            const p = platforms[i];
            p.zPos += currentSpeed * dt;
            
            if (p.mesh) {
                p.mesh.position.z = p.zPos;
                if (p.mesh.leftRail) p.mesh.leftRail.position.z = p.zPos;
                if (p.mesh.rightRail) p.mesh.rightRail.position.z = p.zPos;
            }
            if (p.obstacle) {
                p.obstacle.position.z = p.zPos;
            }
            
            // Check if platform is beneath stork
            if (!p.isGap && p.mesh) {
                const pz = p.zPos;
                const halfDepth = platformDepth / 2;
                const halfWidth = platformWidth / 2;
                
                if (storkZ >= pz - halfDepth && storkZ <= pz + halfDepth &&
                    storkX >= -halfWidth && storkX <= halfWidth) {
                    
                    const platformTop = 0.5; // 0.25 center + 0.25 half height
                    
                    if (storkY <= platformTop + 0.75 && storkVelocityY <= 0) {
                        storkY = 1.25;
                        storkVelocityY = 0;
                        isGrounded = true;
                        onPlatform = true;
                    }
                }
                
                // Obstacle collision
                if (p.obstacle) {
                    const obs = p.obstacle;
                    const ox = obs.position.x;
                    const oz = p.zPos;
                    
                    if (Math.abs(storkX - ox) < 0.8 &&
                        Math.abs(storkZ - oz) < 0.8 &&
                        storkY < 2.0) {
                        gameOver('obstacle');
                    }
                }
            }
            
            // Score: platform passed
            if (!p.passed && p.zPos > 3) {
                p.passed = true;
                if (!p.isGap) score++;
            }
            
            // Remove platforms that are far behind
            if (p.zPos > 20) {
                if (p.mesh) {
                    scene.remove(p.mesh);
                    if (p.mesh.leftRail) scene.remove(p.mesh.leftRail);
                    if (p.mesh.rightRail) scene.remove(p.mesh.rightRail);
                }
                if (p.obstacle) {
                    scene.remove(p.obstacle);
                    const oi = obstacles.indexOf(p.obstacle);
                    if (oi >= 0) obstacles.splice(oi, 1);
                }
                platforms.splice(i, 1);
            }
        }
        
        if (!onPlatform && storkVelocityY <= 0 && storkY <= 1.25) {
            isGrounded = false;
        }
        
        // Add new platforms
        while (platforms.length < 15) {
            const lastZ = platforms.length > 0 ? 
                Math.min(...platforms.map(p => p.zPos)) : 0;
            const newZ = lastZ - platformSpacing;
            const p = createPlatform(newZ, platformIndex);
            platforms.push(p);
            platformIndex++;
        }
        
        // Update stork position
        if (storkModel) {
            storkModel.position.y = storkY;
            
            // Tilt based on movement
            const tiltTarget = (targetLaneX - storkModel.position.x) * 0.1;
            storkModel.rotation.z += (tiltTarget - storkModel.rotation.z) * 5 * dt;
        }
        
        // Fall death
        if (storkY < -5) {
            gameOver('fall');
        }
        
        // Speed trail particles
        speedTrailTimer += dt;
        if (speedTrailTimer > 0.03 && storkModel) {
            speedTrailTimer = 0;
            emitSpeedTrail(storkModel.position.x, storkModel.position.y, storkModel.position.z);
        }
    }
    
    // Update particles
    updateParticles(dt);
    
    // Update HUD
    scoreDisplay.textContent = `Score: ${score}`;
    speedDisplay.textContent = `Speed: ${currentSpeed.toFixed(1)}`;
    particleCountDisplay.textContent = `Particles: ${state.particlesActive}`;
    
    // Update state
    state.score = score;
    state.storkPosition = storkModel ? 
        { x: storkModel.position.x, y: storkModel.position.y, z: storkModel.position.z } : 
        { x: 0, y: storkY, z: 0 };
    state.storkVelocityY = storkVelocityY;
    state.isGrounded = isGrounded;
    state.currentLane = currentLane;
    state.currentSpeed = currentSpeed;
    state.jumpCount = jumpCount;
    state.platformCount = platforms.filter(p => !p.isGap).length;
    state.obstacleCount = obstacles.length;
    state.elapsedTime = elapsedTime;
    
    // Camera follow
    if (storkModel && state.gameState === 'playing') {
        camera.position.x += (storkModel.position.x * 0.3 - camera.position.x) * 3 * dt;
        camera.position.y += (storkModel.position.y + 4 - camera.position.y) * 3 * dt;
        camera.lookAt(storkModel.position.x * 0.5, storkModel.position.y + 1, storkModel.position.z - 5);
    }
    
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
