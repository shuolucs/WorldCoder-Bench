<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stork Parkour Runner</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hud-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            margin: 10px 20px;
        }
        #top-hud {
            display: flex;
            justify-content: space-between;
        }
        #left-hud {
            display: flex;
            flex-direction: column;
        }
        #center-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        button {
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #45a049;
        }
        button:active {
            transform: scale(0.95);
        }
        #gameOverText {
            color: #ff4444;
            font-size: 48px;
            margin-bottom: 20px;
            display: none;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="top-hud">
            <div id="left-hud">
                <div id="scoreDisplay" class="hud-text">Score: 0</div>
                <div id="speedDisplay" class="hud-text">Speed: 8.0</div>
            </div>
            <div id="particleCount" class="hud-text">Particles: 0</div>
        </div>
        <div id="center-hud">
            <div id="loading">Loading Model...</div>
            <button id="startBtn" style="display: none;">START GAME</button>
            <div id="gameOverText">GAME OVER</div>
            <button id="restartBtn" style="display: none;">RESTART</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'menu', // 'menu', 'playing', 'gameover'
            score: 0,
            storkPosition: { x: 0, y: 1.25, z: 0 },
            storkVelocityY: 0,
            isGrounded: true,
            currentLane: 0, // -1, 0, 1
            currentSpeed: 8,
            jumpCount: 0,
            particlesActive: 0,
            platformCount: 0,
            obstacleCount: 0,
            elapsedTime: 0,
            modelLoaded: false,
            lastCollisionType: 'none' // 'none', 'obstacle', 'fall'
        };

        const state = window.__3D_STATE__;

        // --- Constants ---
        const LANE_WIDTH = 3;
        const PLATFORM_WIDTH = 4;
        const PLATFORM_HEIGHT = 0.5;
        const PLATFORM_DEPTH = 6;
        const PLATFORM_SPACING = 6;
        const GROUND_Y = 1.25; // Top of platform (Center Y is 1.0)
        const GRAVITY = -20;
        const JUMP_VELOCITY = 10;
        const TERMINAL_VELOCITY = -15;
        const BASE_SPEED = 8;
        const SPEED_INCREMENT = 0.5;
        const SPEED_INTERVAL = 10; // seconds
        const OBSTACLE_SIZE = { w: 0.8, h: 1.5, d: 0.8 };

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 60);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- Objects ---
        let stork, mixer;
        const platforms = [];
        const obstacles = [];
        let nextSpawnZ = 0;
        let platformsPassed = 0;

        // Materials
        const matGreen1 = new THREE.MeshLambertMaterial({ color: 0x44aa44 });
        const matGreen2 = new THREE.MeshLambertMaterial({ color: 0x338833 });
        const matRed = new THREE.MeshLambertMaterial({ color: 0xff0000 });

        // Geometries
        const geoPlatform = new THREE.BoxGeometry(PLATFORM_WIDTH, PLATFORM_HEIGHT, PLATFORM_DEPTH);
        const geoObstacle = new THREE.BoxGeometry(OBSTACLE_SIZE.w, OBSTACLE_SIZE.h, OBSTACLE_SIZE.d);

        // --- Particle System ---
        const MAX_PARTICLES = 500;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(MAX_PARTICLES * 3);
        const particleColor = new Float32Array(MAX_PARTICLES * 3);
        const particleAlpha = new Float32Array(MAX_PARTICLES);
        const particleData = []; // { life, maxLife, velX, velY, velZ }

        for (let i = 0; i < MAX_PARTICLES; i++) {
            particleData.push({ life: 0, maxLife: 1, velX: 0, velY: 0, velZ: 0 });
            particleAlpha[i] = 0; // Hidden initially
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColor, 3));
        particleGeo.setAttribute('alpha', new THREE.BufferAttribute(particleAlpha, 1));

        // Custom shader material to handle per-particle alpha
        const particleMat = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/disc.png') }
            },
            vertexShader: `
                attribute float alpha;
                attribute vec3 color;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vColor = color;
                    vAlpha = alpha;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = 15.0 * (10.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    if (vAlpha <= 0.0) discard;
                    gl_FragColor = vec4(vColor, vAlpha);
                    gl_FragColor = gl_FragColor * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        function emitParticle(x, y, z, vx, vy, vz, r, g, b, life) {
            for (let i = 0; i < MAX_PARTICLES; i++) {
                if (particleData[i].life <= 0) {
                    const idx3 = i * 3;
                    particlePos[idx3] = x;
                    particlePos[idx3 + 1] = y;
                    particlePos[idx3 + 2] = z;
                    
                    particleColor[idx3] = r;
                    particleColor[idx3 + 1] = g;
                    particleColor[idx3 + 2] = b;
                    
                    particleAlpha[i] = 1.0;
                    
                    particleData[i].life = life;
                    particleData[i].maxLife = life;
                    particleData[i].velX = vx;
                    particleData[i].velY = vy;
                    particleData[i].velZ = vz;
                    
                    state.particlesActive++;
                    return;
                }
            }
        }

        function updateParticles(delta) {
            let activeCount = 0;
            const positions = particleGeo.attributes.position.array;
            const alphas = particleGeo.attributes.alpha.array;

            for (let i = 0; i < MAX_PARTICLES; i++) {
                const p = particleData[i];
                if (p.life > 0) {
                    p.life -= delta;
                    if (p.life <= 0) {
                        alphas[i] = 0;
                        state.particlesActive--;
                    } else {
                        const idx3 = i * 3;
                        positions[idx3] += p.velX * delta;
                        positions[idx3 + 1] += p.velY * delta;
                        positions[idx3 + 2] += p.velZ * delta;
                        
                        alphas[i] = p.life / p.maxLife;
                        activeCount++;
                    }
                }
            }
            
            particleGeo.attributes.position.needsUpdate = true;
            particleGeo.attributes.alpha.needsUpdate = true;
            state.particlesActive = activeCount;
        }

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Stork.glb',
            (gltf) => {
                stork = gltf.scene;
                stork.scale.set(0.02, 0.02, 0.02);
                // Stork faces +Z by default, rotate to face -Z (running away from camera)
                stork.rotation.y = Math.PI; 
                stork.position.set(0, GROUND_Y, 0);
                scene.add(stork);

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(stork);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }

                state.modelLoaded = true;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('startBtn').style.display = 'block';
            },
            undefined,
            (error) => console.error('Error loading model:', error)
        );

        // --- Environment Generation ---
        function spawnPlatform(zPos, isInitial = false) {
            // Random gap (don't spawn) - but not for the first few platforms
            if (!isInitial && Math.random() < 0.25) {
                return false;
            }

            const mesh = new THREE.Mesh(geoPlatform, platformsPassed % 2 === 0 ? matGreen1 : matGreen2);
            mesh.position.set(0, 1.0, zPos); // Center Y is 1.0, top is 1.25
            scene.add(mesh);
            platforms.push(mesh);
            state.platformCount++;
            platformsPassed++;

            // Spawn obstacle
            if (!isInitial && Math.random() < 0.4) {
                const obs = new THREE.Mesh(geoObstacle, matRed);
                const lane = Math.floor(Math.random() * 3) - 1; // -1, 0, 1
                obs.position.set(lane * LANE_WIDTH, 1.0 + PLATFORM_HEIGHT/2 + OBSTACLE_SIZE.h/2, zPos);
                scene.add(obs);
                obstacles.push(obs);
                state.obstacleCount++;
            }
            return true;
        }

        function initCourse() {
            // Clear existing
            platforms.forEach(p => scene.remove(p));
            obstacles.forEach(o => scene.remove(o));
            platforms.length = 0;
            obstacles.length = 0;
            state.platformCount = 0;
            state.obstacleCount = 0;
            platformsPassed = 0;
            nextSpawnZ = 0;

            // Generate initial platforms
            for (let i = 0; i < 15; i++) {
                spawnPlatform(nextSpawnZ, i < 5); // First 5 guaranteed no gaps/obstacles
                nextSpawnZ -= PLATFORM_SPACING;
            }
        }

        // --- Game Logic ---
        function startGame() {
            state.gameState = 'playing';
            state.score = 0;
            state.currentSpeed = BASE_SPEED;
            state.elapsedTime = 0;
            state.currentLane = 0;
            state.storkVelocityY = 0;
            state.isGrounded = true;
            state.jumpCount = 0;
            state.lastCollisionType = 'none';
            
            if (stork) {
                stork.position.set(0, GROUND_Y, 0);
            }
            
            initCourse();
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('restartBtn').style.display = 'none';
            document.getElementById('gameOverText').style.display = 'none';
            updateHUD();
        }

        function gameOver(reason) {
            state.gameState = 'gameover';
            state.lastCollisionType = reason;
            
            document.getElementById('gameOverText').style.display = 'block';
            document.getElementById('restartBtn').style.display = 'block';
            
            // Explosion particles
            if (stork) {
                for (let i = 0; i < 50; i++) {
                    const vx = (Math.random() - 0.5) * 10;
                    const vy = (Math.random() - 0.5) * 10 + 5;
                    const vz = (Math.random() - 0.5) * 10;
                    emitParticle(stork.position.x, stork.position.y + 1, stork.position.z, vx, vy, vz, 1, 0, 0, 1.5);
                }
            }
        }

        function jump() {
            if (state.gameState === 'playing' && state.isGrounded) {
                state.storkVelocityY = JUMP_VELOCITY;
                state.isGrounded = false;
                state.jumpCount++;
                
                // Jump burst particles
                if (stork) {
                    for (let i = 0; i < 20; i++) {
                        const vx = (Math.random() - 0.5) * 4;
                        const vy = -Math.random() * 5;
                        const vz = (Math.random() - 0.5) * 4;
                        emitParticle(stork.position.x, stork.position.y, stork.position.z, vx, vy, vz, 1, 1, 0, 0.5);
                    }
                }
            }
        }

        function moveLane(dir) {
            if (state.gameState === 'playing') {
                state.currentLane = Math.max(-1, Math.min(1, state.currentLane + dir));
            }
        }

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (state.gameState !== 'playing') return;
            
            switch(e.code) {
                case 'Space':
                case 'ArrowUp':
                case 'KeyW':
                    jump();
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    moveLane(-1);
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    moveLane(1);
                    break;
            }
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Update Loop ---
        const clock = new THREE.Clock();

        function updateHUD() {
            document.getElementById('scoreDisplay').innerText = `Score: ${state.score}`;
            document.getElementById('speedDisplay').innerText = `Speed: ${state.currentSpeed.toFixed(1)}`;
            document.getElementById('particleCount').innerText = `Particles: ${state.particlesActive}`;
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent huge jumps

            if (mixer && state.gameState !== 'gameover') {
                mixer.update(delta);
            }

            if (state.gameState === 'playing' && stork) {
                state.elapsedTime += delta;
                
                // Increase speed
                state.currentSpeed = BASE_SPEED + Math.floor(state.elapsedTime / SPEED_INTERVAL) * SPEED_INCREMENT;

                // Move Stork X (Lane switching)
                const targetX = state.currentLane * LANE_WIDTH;
                stork.position.x += (targetX - stork.position.x) * 10 * delta;

                // Physics (Y axis)
                state.storkVelocityY += GRAVITY * delta;
                if (state.storkVelocityY < TERMINAL_VELOCITY) state.storkVelocityY = TERMINAL_VELOCITY;
                stork.position.y += state.storkVelocityY * delta;

                // Move Environment (+Z)
                const moveDist = state.currentSpeed * delta;
                
                // Update Platforms
                let platformUnderStork = false;
                for (let i = platforms.length - 1; i >= 0; i--) {
                    const p = platforms[i];
                    p.position.z += moveDist;
                    
                    // Check if platform is under stork (stork is at Z=0)
                    if (Math.abs(p.position.z) <= PLATFORM_DEPTH / 2) {
                        platformUnderStork = true;
                    }

                    // Remove passed platforms
                    if (p.position.z > 10) {
                        scene.remove(p);
                        platforms.splice(i, 1);
                        state.platformCount--;
                        state.score++; // Increment score when platform passes
                        
                        // Spawn new
                        spawnPlatform(nextSpawnZ);
                        nextSpawnZ -= PLATFORM_SPACING;
                    }
                }
                
                // Update nextSpawnZ to move with the world
                nextSpawnZ += moveDist;

                // Update Obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obs = obstacles[i];
                    obs.position.z += moveDist;
                    
                    // Collision detection with obstacle
                    if (Math.abs(obs.position.z) < OBSTACLE_SIZE.d / 2 + 0.2) { // 0.2 tolerance
                        // Check lane
                        if (Math.abs(obs.position.x - stork.position.x) < 1.0) {
                            // Check height
                            if (stork.position.y < obs.position.y + OBSTACLE_SIZE.h / 2) {
                                gameOver('obstacle');
                            }
                        }
                    }

                    if (obs.position.z > 10) {
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        state.obstacleCount--;
                    }
                }

                // Ground Collision
                if (platformUnderStork && state.storkVelocityY <= 0) {
                    if (stork.position.y <= GROUND_Y) {
                        stork.position.y = GROUND_Y;
                        state.storkVelocityY = 0;
                        state.isGrounded = true;
                    } else {
                        state.isGrounded = false;
                    }
                } else {
                    state.isGrounded = false;
                }

                // Fall detection
                if (stork.position.y < -5) {
                    gameOver('fall');
                }

                // Speed Trail Particles
                if (Math.random() < 0.5) { // Emit rate
                    const px = stork.position.x + (Math.random() - 0.5) * 0.5;
                    const py = stork.position.y + 0.5 + (Math.random() - 0.5) * 0.5;
                    const pz = stork.position.z + 1; // Behind stork
                    emitParticle(px, py, pz, 0, 0, state.currentSpeed * 0.5, 0.8, 1, 1, 1.0);
                }

                updateHUD();
            }

            updateParticles(delta);

            // Sync state object
            if (stork) {
                state.storkPosition.x = stork.position.x;
                state.storkPosition.y = stork.position.y;
                state.storkPosition.z = stork.position.z;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
