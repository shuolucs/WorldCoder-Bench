<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Stork Parkour Runner</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      z-index: 10;
    }

    #scoreDisplay {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 24px;
    }

    #speedDisplay {
      position: absolute;
      top: 48px;
      left: 16px;
      font-size: 20px;
    }

    #particleCount {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 20px;
    }

    #gameOverText {
      position: absolute;
      top: 42%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      font-weight: bold;
      color: #ff4444;
      display: none;
      text-shadow: 0 0 16px rgba(255, 0, 0, 0.6);
    }

    .menu-button {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: auto;
      padding: 14px 28px;
      font-size: 24px;
      border: none;
      border-radius: 10px;
      background: #22aa44;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    .menu-button:hover {
      filter: brightness(1.1);
    }

    #startBtn {
      top: 50%;
      transform: translate(-50%, -50%);
      display: block;
    }

    #restartBtn {
      top: 58%;
      transform: translate(-50%, -50%);
      display: none;
      background: #aa3333;
    }

    #instructions {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      z-index: 10;
      font-size: 18px;
      background: rgba(0,0,0,0.35);
      padding: 10px 16px;
      border-radius: 10px;
      pointer-events: none;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="scoreDisplay">Score: 0</div>
    <div id="speedDisplay">Speed: 8.0</div>
    <div id="particleCount">Particles: 0</div>
    <div id="gameOverText">GAME OVER</div>
  </div>

  <button id="startBtn" class="menu-button">Start</button>
  <button id="restartBtn" class="menu-button">Restart</button>
  <div id="instructions">SPACE / ↑ = Jump &nbsp;&nbsp; | &nbsp;&nbsp; ← / A = Left &nbsp;&nbsp; | &nbsp;&nbsp; → / D = Right</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);
    scene.fog = new THREE.Fog(0x87ceeb, 20, 90);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 1, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const groundPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshPhongMaterial({ color: 0x6fb3d2, transparent: true, opacity: 0.15 })
    );
    groundPlane.rotation.x = -Math.PI / 2;
    groundPlane.position.y = -0.01;
    scene.add(groundPlane);

    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');
    const gameOverText = document.getElementById('gameOverText');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const particleCountDisplay = document.getElementById('particleCount');

    const lanePositions = [-3, 0, 3];
    const PLATFORM_WIDTH = 4;
    const PLATFORM_HEIGHT = 0.5;
    const PLATFORM_DEPTH = 6;
    const PLATFORM_TOP_Y = 1.25;
    const PLATFORM_CENTER_Y = 0.5;
    const BASE_SPEED = 8;
    const GRAVITY = -20;
    const TERMINAL_VELOCITY = -15;

    let gameState = 'menu';
    let elapsedTime = 0;
    let score = 0;
    let currentSpeed = BASE_SPEED;
    let jumpCount = 0;
    let lastCollisionType = 'none';

    let stork = null;
    let mixer = null;
    let modelLoaded = false;
    let fallbackStork = null;

    let currentLane = 0;
    let velocityY = 0;
    let isGrounded = false;

    const courseSegments = [];
    const obstacles = [];
    let nextPlatformIndex = 0;
    let nextPlatformZ = 0;
    let gapCountdown = randomInt(3, 5);

    const platformGeo = new THREE.BoxGeometry(PLATFORM_WIDTH, PLATFORM_HEIGHT, PLATFORM_DEPTH);
    const platformMatA = new THREE.MeshPhongMaterial({ color: 0x44aa44 });
    const platformMatB = new THREE.MeshPhongMaterial({ color: 0x338833 });
    const obstacleGeo = new THREE.BoxGeometry(0.8, 1.5, 0.8);
    const obstacleMat = new THREE.MeshPhongMaterial({ color: 0xcc3333 });

    // Particle system
    const MAX_PARTICLES = 400;
    const particlePositions = new Float32Array(MAX_PARTICLES * 3);
    const particleColors = new Float32Array(MAX_PARTICLES * 3);
    const particleSizes = new Float32Array(MAX_PARTICLES);
    const particleAlphas = new Float32Array(MAX_PARTICLES);
    const particleLife = new Float32Array(MAX_PARTICLES);
    const particleMaxLife = new Float32Array(MAX_PARTICLES);
    const particleVel = new Float32Array(MAX_PARTICLES * 3);
    const particleActive = new Uint8Array(MAX_PARTICLES);

    const particleGeometry = new THREE.BufferGeometry();
    particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    particleGeometry.setAttribute('aSize', new THREE.BufferAttribute(particleSizes, 1));
    particleGeometry.setAttribute('aAlpha', new THREE.BufferAttribute(particleAlphas, 1));

    const particleMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
      uniforms: {
        uPixelRatio: { value: Math.min(window.devicePixelRatio, 2) }
      },
      vertexShader: `
        attribute float aSize;
        attribute float aAlpha;
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          vColor = color;
          vAlpha = aAlpha;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = aSize * uPixelRatio * (120.0 / -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        varying float vAlpha;
        void main() {
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          float strength = smoothstep(0.5, 0.0, d);
          gl_FragColor = vec4(vColor, strength * vAlpha);
        }
      `
    });

    const particlePoints = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particlePoints);

    function createFallbackStork() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 16, 16),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
      );
      body.scale.set(1.2, 0.9, 1.6);

      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.08, 0.1, 0.8, 10),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
      );
      neck.position.set(0, 0.6, 0.35);
      neck.rotation.x = -0.4;

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 12, 12),
        new THREE.MeshPhongMaterial({ color: 0xffffff })
      );
      head.position.set(0, 0.95, 0.65);

      const beak = new THREE.Mesh(
        new THREE.ConeGeometry(0.06, 0.35, 8),
        new THREE.MeshPhongMaterial({ color: 0xffaa33 })
      );
      beak.position.set(0, 0.92, 0.9);
      beak.rotation.x = Math.PI / 2;

      const legMat = new THREE.MeshPhongMaterial({ color: 0xff8844 });
      const leg1 = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.9, 8), legMat);
      const leg2 = leg1.clone();
      leg1.position.set(-0.12, -0.6, 0);
      leg2.position.set(0.12, -0.6, 0);

      group.add(body, neck, head, beak, leg1, leg2);
      group.position.set(0, 1.25, 0);
      scene.add(group);
      return group;
    }

    fallbackStork = createFallbackStork();

    const loader = new GLTFLoader();
    loader.load(
      'stork.glb',
      (gltf) => {
        stork = gltf.scene;
        stork.scale.set(0.02, 0.02, 0.02);
        stork.position.set(0, 1, 0);
        scene.add(stork);
        fallbackStork.visible = false;
        modelLoaded = true;

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(stork);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    function getRunner() {
      return stork || fallbackStork;
    }

    function setRunnerPosition(x, y, z) {
      const runner = getRunner();
      runner.position.set(x, y, z);
    }

    function resetRunner() {
      currentLane = 0;
      velocityY = 0;
      isGrounded = true;
      setRunnerPosition(0, PLATFORM_TOP_Y, 0);
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function createPlatformSegment(z, index, isGap = false) {
      const segment = {
        index,
        z,
        passed: false,
        isGap,
        lanes: [null, null, null],
        obstacles: [null, null, null]
      };

      if (!isGap) {
        for (let lane = 0; lane < 3; lane++) {
          const mesh = new THREE.Mesh(
            platformGeo,
            (index + lane) % 2 === 0 ? platformMatA : platformMatB
          );
          mesh.position.set(lanePositions[lane], PLATFORM_CENTER_Y, z);
          scene.add(mesh);
          segment.lanes[lane] = mesh;

          if (Math.random() < 0.28 && index > 1) {
            const obstacle = new THREE.Mesh(obstacleGeo, obstacleMat);
            obstacle.position.set(lanePositions[lane], PLATFORM_CENTER_Y + 0.75 + 0.25, z);
            obstacle.userData.segmentIndex = index;
            obstacle.userData.lane = lane;
            scene.add(obstacle);
            segment.obstacles[lane] = obstacle;
            obstacles.push(obstacle);
          }
        }
      }

      courseSegments.push(segment);
    }

    function generateInitialCourse() {
      for (let i = 0; i < 12; i++) {
        let isGap = false;
        if (i > 1) {
          gapCountdown--;
          if (gapCountdown <= 0) {
            isGap = true;
            gapCountdown = randomInt(3, 5);
          }
        }
        createPlatformSegment(-i * 6, nextPlatformIndex++, isGap);
        nextPlatformZ = -i * 6;
      }
      nextPlatformZ = courseSegments[courseSegments.length - 1].z;
    }

    function appendCourseSegment() {
      const newZ = nextPlatformZ - 6;
      gapCountdown--;
      let isGap = false;
      if (gapCountdown <= 0) {
        isGap = true;
        gapCountdown = randomInt(3, 5);
      }
      createPlatformSegment(newZ, nextPlatformIndex++, isGap);
      nextPlatformZ = newZ;
    }

    function clearCourse() {
      for (const seg of courseSegments) {
        for (const mesh of seg.lanes) {
          if (mesh) scene.remove(mesh);
        }
        for (const obs of seg.obstacles) {
          if (obs) scene.remove(obs);
        }
      }
      courseSegments.length = 0;
      obstacles.length = 0;
      nextPlatformIndex = 0;
      nextPlatformZ = 0;
      gapCountdown = randomInt(3, 5);
    }

    function findSupportingPlatform() {
      const runner = getRunner();
      const lane = currentLane + 1;
      for (const seg of courseSegments) {
        if (Math.abs(seg.z - runner.position.z) <= PLATFORM_DEPTH / 2) {
          if (!seg.isGap && seg.lanes[lane]) {
            return seg;
          }
        }
      }
      return null;
    }

    function emitParticle(pos, vel, color, size, life) {
      for (let i = 0; i < MAX_PARTICLES; i++) {
        if (!particleActive[i]) {
          particleActive[i] = 1;
          particleLife[i] = life;
          particleMaxLife[i] = life;

          particlePositions[i * 3 + 0] = pos.x;
          particlePositions[i * 3 + 1] = pos.y;
          particlePositions[i * 3 + 2] = pos.z;

          particleVel[i * 3 + 0] = vel.x;
          particleVel[i * 3 + 1] = vel.y;
          particleVel[i * 3 + 2] = vel.z;

          particleColors[i * 3 + 0] = color.r;
          particleColors[i * 3 + 1] = color.g;
          particleColors[i * 3 + 2] = color.b;

          particleSizes[i] = size;
          particleAlphas[i] = 1.0;
          return true;
        }
      }
      return false;
    }

    function emitJumpBurst() {
      const runner = getRunner();
      const color = new THREE.Color(0xffdd44);
      for (let i = 0; i < 20; i++) {
        emitParticle(
          new THREE.Vector3(
            runner.position.x + (Math.random() - 0.5) * 0.4,
            runner.position.y - 0.8,
            runner.position.z + (Math.random() - 0.5) * 0.3
          ),
          new THREE.Vector3(
            (Math.random() - 0.5) * 2,
            -Math.random() * 4,
            (Math.random() - 0.5) * 2
          ),
          color,
          8 + Math.random() * 6,
          0.8 + Math.random() * 0.3
        );
      }
    }

    function emitSpeedTrail(dt) {
      const runner = getRunner();
      const count = Math.max(1, Math.floor(18 * dt));
      for (let i = 0; i < count; i++) {
        const c = Math.random() < 0.5 ? new THREE.Color(0xffffff) : new THREE.Color(0x88ffff);
        emitParticle(
          new THREE.Vector3(
            runner.position.x + (Math.random() - 0.5) * 0.5,
            runner.position.y + Math.random() * 0.6,
            runner.position.z + 1.0 + (Math.random() - 0.5) * 0.3
          ),
          new THREE.Vector3(
            (Math.random() - 0.5) * 0.4,
            (Math.random() - 0.5) * 0.3,
            3 + Math.random() * 4
          ),
          c,
          4 + Math.random() * 4,
          1.0
        );
      }
    }

    function emitGameOverExplosion() {
      const runner = getRunner();
      const color = new THREE.Color(0xff3333);
      for (let i = 0; i < 50; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI;
        const speed = 3 + Math.random() * 6;
        emitParticle(
          new THREE.Vector3(runner.position.x, runner.position.y, runner.position.z),
          new THREE.Vector3(
            Math.cos(theta) * Math.sin(phi) * speed,
            Math.cos(phi) * speed,
            Math.sin(theta) * Math.sin(phi) * speed
          ),
          color,
          8 + Math.random() * 8,
          1.0
        );
      }
    }

    function updateParticles(dt) {
      let activeCount = 0;
      for (let i = 0; i < MAX_PARTICLES; i++) {
        if (!particleActive[i]) {
          particleAlphas[i] = 0;
          continue;
        }

        particleLife[i] -= dt;
        if (particleLife[i] <= 0) {
          particleActive[i] = 0;
          particleAlphas[i] = 0;
          continue;
        }

        const idx = i * 3;
        particlePositions[idx + 0] += particleVel[idx + 0] * dt;
        particlePositions[idx + 1] += particleVel[idx + 1] * dt;
        particlePositions[idx + 2] += particleVel[idx + 2] * dt;

        particleVel[idx + 1] -= 6 * dt;
        particleAlphas[i] = particleLife[i] / particleMaxLife[i];
        activeCount++;
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.color.needsUpdate = true;
      particleGeometry.attributes.aAlpha.needsUpdate = true;
      particleGeometry.attributes.aSize.needsUpdate = true;

      return activeCount;
    }

    function moveLane(dir) {
      if (gameState !== 'playing') return;
      currentLane = Math.max(-1, Math.min(1, currentLane + dir));
      const runner = getRunner();
      runner.position.x = lanePositions[currentLane + 1];
    }

    function jump() {
      if (gameState !== 'playing') return;
      if (isGrounded) {
        velocityY = 10;
        isGrounded = false;
        jumpCount++;
        emitJumpBurst();
      }
    }

    function triggerGameOver(type) {
      if (gameState === 'gameover') return;
      gameState = 'gameover';
      lastCollisionType = type;
      gameOverText.style.display = 'block';
      restartBtn.style.display = 'block';
      emitGameOverExplosion();
    }

    function resetGame() {
      gameState = 'menu';
      elapsedTime = 0;
      score = 0;
      currentSpeed = BASE_SPEED;
      jumpCount = 0;
      lastCollisionType = 'none';

      clearCourse();
      generateInitialCourse();
      resetRunner();

      for (let i = 0; i < MAX_PARTICLES; i++) {
        particleActive[i] = 0;
        particleAlphas[i] = 0;
      }
      particleGeometry.attributes.aAlpha.needsUpdate = true;

      scoreDisplay.textContent = 'Score: 0';
      speedDisplay.textContent = 'Speed: 8.0';
      particleCountDisplay.textContent = 'Particles: 0';
      gameOverText.style.display = 'none';
      restartBtn.style.display = 'none';
      startBtn.style.display = 'block';
    }

    function startGame() {
      gameState = 'playing';
      elapsedTime = 0;
      score = 0;
      currentSpeed = BASE_SPEED;
      jumpCount = 0;
      lastCollisionType = 'none';
      scoreDisplay.textContent = 'Score: 0';
      gameOverText.style.display = 'none';
      restartBtn.style.display = 'none';
      startBtn.style.display = 'none';
      resetRunner();
    }

    function updateCourse(dt) {
      for (const seg of courseSegments) {
        seg.z += currentSpeed * dt;

        for (const mesh of seg.lanes) {
          if (mesh) mesh.position.z = seg.z;
        }

        for (const obs of seg.obstacles) {
          if (obs) obs.position.z = seg.z;
        }

        if (!seg.passed && seg.z > 6) {
          seg.passed = true;
          score += 1;
        }
      }

      while (courseSegments.length && courseSegments[0].z > 12) {
        const old = courseSegments.shift();
        for (const mesh of old.lanes) {
          if (mesh) scene.remove(mesh);
        }
        for (const obs of old.obstacles) {
          if (obs) {
            scene.remove(obs);
            const idx = obstacles.indexOf(obs);
            if (idx >= 0) obstacles.splice(idx, 1);
          }
        }
      }

      while (courseSegments.length < 12) {
        appendCourseSegment();
      }
    }

    function updateRunnerPhysics(dt) {
      const runner = getRunner();

      velocityY += GRAVITY * dt;
      if (velocityY < TERMINAL_VELOCITY) velocityY = TERMINAL_VELOCITY;
      runner.position.y += velocityY * dt;

      const support = findSupportingPlatform();
      if (support && velocityY <= 0 && runner.position.y <= PLATFORM_TOP_Y) {
        runner.position.y = PLATFORM_TOP_Y;
        velocityY = 0;
        isGrounded = true;
      } else {
        isGrounded = false;
      }

      if (runner.position.y < -5) {
        triggerGameOver('fall');
      }
    }

    function checkObstacleCollision() {
      if (gameState !== 'playing') return;
      const runner = getRunner();
      const runnerBox = new THREE.Box3().setFromCenterAndSize(
        new THREE.Vector3(runner.position.x, runner.position.y, runner.position.z),
        new THREE.Vector3(0.8, 1.6, 0.8)
      );

      for (const obs of obstacles) {
        const obsBox = new THREE.Box3().setFromObject(obs);
        if (runnerBox.intersectsBox(obsBox)) {
          triggerGameOver('obstacle');
          return;
        }
      }
    }

    function animateFallback(dt) {
      if (fallbackStork && fallbackStork.visible && gameState === 'playing') {
        fallbackStork.rotation.y = Math.sin(performance.now() * 0.005) * 0.08;
      }
    }

    window.__3D_STATE__ = {
      gameState: 'menu',
      score: 0,
      storkPosition: { x: 0, y: 1.25, z: 0 },
      storkVelocityY: 0,
      isGrounded: true,
      currentLane: 0,
      currentSpeed: 8,
      jumpCount: 0,
      particlesActive: 0,
      platformCount: 0,
      obstacleCount: 0,
      elapsedTime: 0,
      modelLoaded: false,
      lastCollisionType: 'none'
    };

    function update3DState(particlesActiveCount) {
      const runner = getRunner();
      const platformCount = courseSegments.reduce((sum, seg) => sum + seg.lanes.filter(Boolean).length, 0);
      const obstacleCount = courseSegments.reduce((sum, seg) => sum + seg.obstacles.filter(Boolean).length, 0);

      window.__3D_STATE__ = {
        gameState,
        score,
        storkPosition: {
          x: runner.position.x,
          y: runner.position.y,
          z: runner.position.z
        },
        storkVelocityY: velocityY,
        isGrounded,
        currentLane,
        currentSpeed,
        jumpCount,
        particlesActive: particlesActiveCount,
        platformCount,
        obstacleCount,
        elapsedTime,
        modelLoaded,
        lastCollisionType
      };
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        jump();
      } else if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        moveLane(-1);
      } else if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        moveLane(1);
      }
    });

    startBtn.addEventListener('click', () => {
      startGame();
    });

    restartBtn.addEventListener('click', () => {
      resetGame();
      startGame();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      particleMaterial.uniforms.uPixelRatio.value = Math.min(window.devicePixelRatio, 2);
    });

    generateInitialCourse();
    resetRunner();

    const clock = new THREE.Clock();

    function tick() {
      const dt = Math.min(clock.getDelta(), 0.033);

      if (mixer) mixer.update(dt);
      animateFallback(dt);

      let activeParticleCount = updateParticles(dt);

      if (gameState === 'playing') {
        elapsedTime += dt;
        currentSpeed = BASE_SPEED + Math.floor(elapsedTime / 10) * 0.5;

        updateCourse(dt);
        updateRunnerPhysics(dt);
        checkObstacleCollision();
        emitSpeedTrail(dt);

        activeParticleCount = updateParticles(0);

        scoreDisplay.textContent = `Score: ${score}`;
        speedDisplay.textContent = `Speed: ${currentSpeed.toFixed(1)}`;
      }

      particleCountDisplay.textContent = `Particles: ${activeParticleCount}`;

      update3DState(activeParticleCount);
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    resetGame();
    tick();
  </script>
</body>
</html>
