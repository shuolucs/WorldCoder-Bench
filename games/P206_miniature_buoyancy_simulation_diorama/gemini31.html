<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Buoyancy Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 15px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            pointer-events: auto;
        }
        #top-left-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            min-width: 300px;
        }
        #top-right-panel {
            position: absolute;
            top: 15px;
            right: 15px;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4CAF50;
        }
        .stat-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .stat-label {
            color: #aaa;
            display: inline-block;
            width: 120px;
        }
        .stat-value {
            font-weight: bold;
        }
        .controls-help {
            margin-top: 15px;
            font-size: 12px;
            color: #888;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .controls-help div { margin-bottom: 3px; }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            font-weight: bold;
        }
        button:hover { background: #45a049; }
        button.paused { background: #f44336; }
        button.paused:hover { background: #da190b; }
        
        #objects-container {
            margin-top: 15px;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
        .obj-stat {
            font-size: 12px;
            margin-bottom: 8px;
            padding: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            border-left: 3px solid transparent;
        }
        .obj-stat.selected {
            border-left-color: #FFEB3B;
            background: rgba(255, 235, 59, 0.1);
        }
        .obj-name { font-weight: bold; color: #ddd; display: inline-block; width: 80px;}
        .obj-val { display: inline-block; width: 60px; text-align: right; }
        .obj-status { display: inline-block; width: 60px; text-align: right; font-style: italic; }
        
        .status-falling { color: #aaa; }
        .status-floating { color: #4CAF50; }
        .status-sunk { color: #2196F3; }
        .status-resting { color: #f44336; }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 8px;
            font-size: 18px;
            color: #fff;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-left-panel" class="panel">
            <h1>Buoyancy Sim</h1>
            <div class="stat-row"><span class="stat-label">Status:</span> <span id="ui-status" class="stat-value">Running</span></div>
            <div class="stat-row"><span class="stat-label">Time Scale:</span> <span id="ui-timescale" class="stat-value">1.00x</span></div>
            <div class="stat-row"><span class="stat-label">Gravity:</span> <span id="ui-gravity" class="stat-value">9.81 m/s² (Earth)</span></div>
            <div class="stat-row"><span class="stat-label">Water Density:</span> <span id="ui-density" class="stat-value">1000 kg/m³ (Fresh)</span></div>
            <div class="stat-row"><span class="stat-label">Sim Time:</span> <span id="ui-simtime" class="stat-value">0.00s</span></div>
            
            <div id="objects-container"></div>

            <div class="controls-help">
                <div><span class="key">R</span> Reset Objects</div>
                <div><span class="key">G</span> Cycle Gravity</div>
                <div><span class="key">D</span> Cycle Water Density</div>
                <div><span class="key">T</span> Toggle Slow-Mo</div>
                <div><span class="key">Click</span> Select Object</div>
                <div><span class="key">Space</span> Impulse to Selected</div>
            </div>
        </div>

        <div id="top-right-panel" class="panel">
            <button id="btn-pause">Pause</button>
        </div>
    </div>

    <div id="loading">Loading Diorama...</div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            gravity: 9.81,
            waterDensity: 1000,
            timeScale: 1.0,
            paused: false,
            selectedObject: null,
            objects: {},
            modelLoaded: false,
            simTime: 0,
            gravityMode: 'earth',
            waterDensityMode: 'fresh',
            objectCount: 5,
            resetCount: 0
        };

        const GRAVITY_MODES = [
            { name: 'earth', val: 9.81 },
            { name: 'moon', val: 1.62 },
            { name: 'jupiter', val: 24.79 }
        ];
        let gravityIdx = 0;

        const DENSITY_MODES = [
            { name: 'fresh', val: 1000 },
            { name: 'salt', val: 1025 },
            { name: 'mercury', val: 13534 }
        ];
        let densityIdx = 0;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- LOAD DIORAMA ---
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/LittlestTokyo.glb';
        
        loader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            
            // Calculate bounding box and scale
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 10 / maxDim;
            
            model.scale.setScalar(scale);
            model.position.sub(center.multiplyScalar(scale));
            // Adjust slightly so floor is near y=0
            const newBox = new THREE.Box3().setFromObject(model);
            model.position.y -= newBox.min.y;

            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
        }, undefined, (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = 'Error loading model. Check console.';
        });

        // --- WATER VOLUME ---
        const waterGeometry = new THREE.BoxGeometry(8, 4, 6);
        const waterMaterial = new THREE.MeshPhysicalMaterial({
            color: 0x2288cc,
            transparent: true,
            opacity: 0.35,
            depthWrite: false,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.5
        });
        const waterMesh = new THREE.Mesh(waterGeometry, waterMaterial);
        waterMesh.position.set(0, 2, 0);
        waterMesh.receiveShadow = true;
        scene.add(waterMesh);

        // --- BUOYANCY OBJECTS ---
        const objectsConfig = [
            { id: 'woodBlock', type: 'box', size: [0.8, 0.8, 0.8], color: 0x8B4513, density: 600 },
            { id: 'steelBall', type: 'sphere', radius: 0.4, color: 0x888888, density: 7800 },
            { id: 'iceCube', type: 'box', size: [0.7, 0.7, 0.7], color: 0xccddff, density: 917 },
            { id: 'cork', type: 'sphere', radius: 0.35, color: 0xD2B48C, density: 240 },
            { id: 'rubber', type: 'sphere', radius: 0.45, color: 0x8B0000, density: 1100 }
        ];

        const physObjects = [];
        const meshes = [];
        let selectionHelper = null;

        objectsConfig.forEach((conf, index) => {
            let geometry, volume, height, halfHeight;
            if (conf.type === 'box') {
                geometry = new THREE.BoxGeometry(...conf.size);
                volume = conf.size[0] * conf.size[1] * conf.size[2];
                height = conf.size[1];
                halfHeight = height / 2;
            } else {
                geometry = new THREE.SphereGeometry(conf.radius, 32, 32);
                volume = (4/3) * Math.PI * Math.pow(conf.radius, 3);
                height = conf.radius * 2;
                halfHeight = conf.radius;
            }

            const material = new THREE.MeshStandardMaterial({ 
                color: conf.color,
                roughness: 0.4,
                metalness: conf.id === 'steelBall' ? 0.8 : 0.1
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            
            // Spread objects along X axis
            const startX = (index - 2) * 1.5;
            mesh.position.set(startX, 8, 0);
            mesh.userData.id = conf.id;
            scene.add(mesh);
            meshes.push(mesh);

            const mass = conf.density * volume;

            const physObj = {
                id: conf.id,
                mesh: mesh,
                y: 8,
                vy: 0,
                mass: mass,
                volume: volume,
                density: conf.density,
                height: height,
                halfHeight: halfHeight,
                status: 'falling'
            };
            physObjects.push(physObj);

            window.__3D_STATE__.objects[conf.id] = {
                y: 8, vy: 0, density: conf.density, status: 'falling'
            };
        });

        // Selection Helper
        selectionHelper = new THREE.BoxHelper(meshes[0], 0xFFFF00);
        selectionHelper.visible = false;
        selectionHelper.material.linewidth = 2;
        scene.add(selectionHelper);

        // --- PHYSICS ENGINE ---
        const WATER_TOP = 4;
        const FLOOR_Y = 0;
        const DRAG_COEFF = 2.0;

        function resetObjects() {
            physObjects.forEach((obj, i) => {
                obj.y = 8;
                obj.vy = 0;
                obj.mesh.position.y = 8;
                obj.status = 'falling';
            });
            window.__3D_STATE__.resetCount++;
        }

        function updatePhysics(dt) {
            if (window.__3D_STATE__.paused) return;
            
            dt *= window.__3D_STATE__.timeScale;
            if (dt > 0.016) dt = 0.016; // Cap dt
            if (dt === 0) return;

            window.__3D_STATE__.simTime += dt;

            const g = window.__3D_STATE__.gravity;
            const rho_w = window.__3D_STATE__.waterDensity;

            physObjects.forEach(obj => {
                const top = obj.y + obj.halfHeight;
                const bottom = obj.y - obj.halfHeight;
                
                let submergedFraction = 0;
                if (bottom < WATER_TOP) {
                    if (top <= WATER_TOP) {
                        submergedFraction = 1.0;
                    } else {
                        submergedFraction = (WATER_TOP - bottom) / obj.height;
                    }
                }

                // Forces
                const F_gravity = -obj.mass * g;
                const F_buoyancy = rho_w * g * (obj.volume * submergedFraction);
                
                // Linear drag proportional to velocity when submerged
                let F_drag = 0;
                if (submergedFraction > 0) {
                    F_drag = -DRAG_COEFF * obj.vy;
                }

                const F_net = F_gravity + F_buoyancy + F_drag;
                const acceleration = F_net / obj.mass;

                // Euler Integration
                obj.vy += acceleration * dt;
                obj.y += obj.vy * dt;

                // Floor collision
                if (obj.y <= FLOOR_Y + obj.halfHeight) {
                    obj.y = FLOOR_Y + obj.halfHeight;
                    obj.vy = 0;
                }

                // Update Mesh
                obj.mesh.position.y = obj.y;

                // Determine Status
                if (obj.y <= FLOOR_Y + obj.halfHeight + 0.01) {
                    obj.status = 'resting';
                } else if (submergedFraction === 0) {
                    obj.status = 'falling';
                } else if (submergedFraction > 0 && submergedFraction < 1) {
                    obj.status = 'floating';
                } else {
                    obj.status = 'sunk';
                }

                // Update State
                const stateObj = window.__3D_STATE__.objects[obj.id];
                stateObj.y = obj.y;
                stateObj.vy = obj.vy;
                stateObj.status = obj.status;
            });

            if (window.__3D_STATE__.selectedObject) {
                const selMesh = meshes.find(m => m.userData.id === window.__3D_STATE__.selectedObject);
                if (selMesh) selectionHelper.update();
            }
        }

        // --- INTERACTIONS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName === 'BUTTON') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                const selectedMesh = intersects[0].object;
                window.__3D_STATE__.selectedObject = selectedMesh.userData.id;
                selectionHelper.setFromObject(selectedMesh);
                selectionHelper.visible = true;
            } else {
                window.__3D_STATE__.selectedObject = null;
                selectionHelper.visible = false;
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            
            if (key === 'r') {
                resetObjects();
            } else if (key === 'g') {
                gravityIdx = (gravityIdx + 1) % GRAVITY_MODES.length;
                window.__3D_STATE__.gravity = GRAVITY_MODES[gravityIdx].val;
                window.__3D_STATE__.gravityMode = GRAVITY_MODES[gravityIdx].name;
            } else if (key === 'd') {
                densityIdx = (densityIdx + 1) % DENSITY_MODES.length;
                window.__3D_STATE__.waterDensity = DENSITY_MODES[densityIdx].val;
                window.__3D_STATE__.waterDensityMode = DENSITY_MODES[densityIdx].name;
            } else if (key === 't') {
                window.__3D_STATE__.timeScale = window.__3D_STATE__.timeScale === 1.0 ? 0.25 : 1.0;
            } else if (event.code === 'Space') {
                if (window.__3D_STATE__.selectedObject) {
                    const obj = physObjects.find(o => o.id === window.__3D_STATE__.selectedObject);
                    if (obj) obj.vy += 3.0; // Upward impulse
                }
            }
        });

        const btnPause = document.getElementById('btn-pause');
        btnPause.addEventListener('click', () => {
            window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
            if (window.__3D_STATE__.paused) {
                btnPause.textContent = 'Resume';
                btnPause.classList.add('paused');
            } else {
                btnPause.textContent = 'Pause';
                btnPause.classList.remove('paused');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- UI UPDATES ---
        const uiStatus = document.getElementById('ui-status');
        const uiTimeScale = document.getElementById('ui-timescale');
        const uiGravity = document.getElementById('ui-gravity');
        const uiDensity = document.getElementById('ui-density');
        const uiSimTime = document.getElementById('ui-simtime');
        const objectsContainer = document.getElementById('objects-container');

        function initUI() {
            objectsConfig.forEach(conf => {
                const div = document.createElement('div');
                div.id = `stat-${conf.id}`;
                div.className = 'obj-stat';
                div.innerHTML = `
                    <span class="obj-name">${conf.id}</span>
                    y: <span class="obj-val" id="val-y-${conf.id}">8.00</span>
                    v: <span class="obj-val" id="val-v-${conf.id}">0.00</span>
                    <span class="obj-status" id="val-s-${conf.id}">falling</span>
                `;
                objectsContainer.appendChild(div);
            });
        }
        initUI();

        function updateUI() {
            const state = window.__3D_STATE__;
            
            uiStatus.textContent = state.paused ? 'Paused' : 'Running';
            uiStatus.style.color = state.paused ? '#f44336' : '#4CAF50';
            
            uiTimeScale.textContent = state.timeScale.toFixed(2) + 'x';
            
            const gMode = GRAVITY_MODES.find(m => m.val === state.gravity);
            uiGravity.textContent = `${state.gravity.toFixed(2)} m/s² (${gMode.name})`;
            
            const dMode = DENSITY_MODES.find(m => m.val === state.waterDensity);
            uiDensity.textContent = `${state.waterDensity} kg/m³ (${dMode.name})`;
            
            uiSimTime.textContent = state.simTime.toFixed(2) + 's';

            objectsConfig.forEach(conf => {
                const objState = state.objects[conf.id];
                document.getElementById(`val-y-${conf.id}`).textContent = objState.y.toFixed(2);
                document.getElementById(`val-v-${conf.id}`).textContent = objState.vy.toFixed(2);
                
                const statusEl = document.getElementById(`val-s-${conf.id}`);
                statusEl.textContent = objState.status;
                statusEl.className = `obj-status status-${objState.status}`;

                const rowEl = document.getElementById(`stat-${conf.id}`);
                if (state.selectedObject === conf.id) {
                    rowEl.classList.add('selected');
                } else {
                    rowEl.classList.remove('selected');
                }
            });
        }

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            
            updatePhysics(dt);
            controls.update();
            updateUI();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
