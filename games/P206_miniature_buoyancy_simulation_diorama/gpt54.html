<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Buoyancy Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0f1720;
      font-family: Arial, sans-serif;
      color: #fff;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.4;
      min-width: 320px;
      pointer-events: none;
      white-space: pre-line;
    }
    #controlsInfo {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 12px;
    }
    #pauseBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }
    #pauseBtn:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="pauseBtn">Pause</button>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f1720);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.ShadowMaterial({ opacity: 0.25 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.001;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(40, 40, 0x446688, 0x334455);
    grid.position.y = 0;
    scene.add(grid);

    const waterSize = { w: 8, h: 4, d: 6 };
    const waterCenter = new THREE.Vector3(0, 2, 0);
    const waterTopY = 4;
    const waterBottomY = 0;

    const water = new THREE.Mesh(
      new THREE.BoxGeometry(waterSize.w, waterSize.h, waterSize.d),
      new THREE.MeshPhongMaterial({
        color: 0x2288cc,
        transparent: true,
        opacity: 0.35,
        side: THREE.DoubleSide
      })
    );
    water.position.copy(waterCenter);
    scene.add(water);

    const tankEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(waterSize.w, waterSize.h, waterSize.d)),
      new THREE.LineBasicMaterial({ color: 0x88ccff })
    );
    tankEdges.position.copy(waterCenter);
    scene.add(tankEdges);

    const loader = new GLTFLoader();
    let modelLoaded = false;

    loader.load(
      'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
      (gltf) => {
        const root = gltf.scene;
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 10 / maxDim;
        root.scale.setScalar(scale);

        const scaledBox = new THREE.Box3().setFromObject(root);
        const scaledCenter = new THREE.Vector3();
        scaledBox.getCenter(scaledCenter);

        root.position.sub(scaledCenter);

        root.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(root);
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load LittlestTokyo.glb', err);
      }
    );

    const gravityModes = [
      { name: 'earth', value: 9.81 },
      { name: 'moon', value: 1.62 },
      { name: 'jupiter', value: 24.79 }
    ];
    const waterDensityModes = [
      { name: 'fresh', value: 1000 },
      { name: 'salt', value: 1025 },
      { name: 'mercury', value: 13534 }
    ];

    let gravityIndex = 0;
    let waterDensityIndex = 0;
    let gravity = gravityModes[gravityIndex].value;
    let waterDensity = waterDensityModes[waterDensityIndex].value;
    let timeScale = 1.0;
    let paused = false;
    let simTime = 0;
    let resetCount = 0;

    const dragCoefficient = 2.0;

    function makeOutline(mesh) {
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(mesh.geometry),
        new THREE.LineBasicMaterial({ color: 0xffff00 })
      );
      edges.visible = false;
      edges.renderOrder = 10;
      mesh.add(edges);
      return edges;
    }

    function createObject(def, x) {
      const material = new THREE.MeshStandardMaterial({ color: def.color });
      const mesh = new THREE.Mesh(def.geometry, material);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(x, 8, 0);
      scene.add(mesh);

      const outline = makeOutline(mesh);

      const volume = def.volume;
      const mass = def.density * volume;

      return {
        name: def.name,
        mesh,
        outline,
        density: def.density,
        volume,
        mass,
        vy: 0,
        status: 'falling',
        radius: def.radius ?? null,
        halfHeight: def.halfHeight ?? null,
        height: def.height,
        x
      };
    }

    const objectDefs = [
      {
        name: 'woodBlock',
        geometry: new THREE.BoxGeometry(0.8, 0.8, 0.8),
        color: 0x8B4513,
        density: 600,
        volume: 0.8 * 0.8 * 0.8,
        halfHeight: 0.4,
        height: 0.8
      },
      {
        name: 'steelBall',
        geometry: new THREE.SphereGeometry(0.4, 32, 24),
        color: 0x888888,
        density: 7800,
        volume: (4 / 3) * Math.PI * Math.pow(0.4, 3),
        radius: 0.4,
        height: 0.8
      },
      {
        name: 'iceCube',
        geometry: new THREE.BoxGeometry(0.7, 0.7, 0.7),
        color: 0xccddff,
        density: 917,
        volume: 0.7 * 0.7 * 0.7,
        halfHeight: 0.35,
        height: 0.7
      },
      {
        name: 'cork',
        geometry: new THREE.SphereGeometry(0.35, 32, 24),
        color: 0xD2B48C,
        density: 240,
        volume: (4 / 3) * Math.PI * Math.pow(0.35, 3),
        radius: 0.35,
        height: 0.7
      },
      {
        name: 'rubber',
        geometry: new THREE.SphereGeometry(0.45, 32, 24),
        color: 0x8B0000,
        density: 1100,
        volume: (4 / 3) * Math.PI * Math.pow(0.45, 3),
        radius: 0.45,
        height: 0.9
      }
    ];

    const xPositions = [-2.4, -1.2, 0, 1.2, 2.4];
    const objects = objectDefs.map((def, i) => createObject(def, xPositions[i]));

    let selected = null;

    function supportHeight(obj) {
      return obj.radius ?? obj.halfHeight;
    }

    function resetObjects() {
      for (const obj of objects) {
        obj.mesh.position.set(obj.x, 8, 0);
        obj.vy = 0;
        obj.status = 'falling';
      }
      resetCount++;
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function setSelected(obj) {
      selected = obj;
      for (const o of objects) o.outline.visible = false;
      if (selected) selected.outline.visible = true;
    }

    window.addEventListener('pointerdown', (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObjects(objects.map(o => o.mesh), false);
      if (hits.length > 0) {
        const mesh = hits[0].object;
        const obj = objects.find(o => o.mesh === mesh);
        setSelected(obj || null);
      } else {
        setSelected(null);
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        resetObjects();
      } else if (e.code === 'KeyG') {
        gravityIndex = (gravityIndex + 1) % gravityModes.length;
        gravity = gravityModes[gravityIndex].value;
      } else if (e.code === 'KeyD') {
        waterDensityIndex = (waterDensityIndex + 1) % waterDensityModes.length;
        waterDensity = waterDensityModes[waterDensityIndex].value;
      } else if (e.code === 'Space') {
        if (selected) {
          selected.vy += 3;
        }
      } else if (e.code === 'KeyT') {
        timeScale = timeScale === 1.0 ? 0.25 : 1.0;
      }
    });

    const pauseBtn = document.getElementById('pauseBtn');
    pauseBtn.addEventListener('click', () => {
      paused = !paused;
      pauseBtn.textContent = paused ? 'Resume' : 'Pause';
    });

    const hud = document.getElementById('hud');

    function clamp(v, a, b) {
      return Math.max(a, Math.min(b, v));
    }

    function updateObject(obj, dt) {
      const y = obj.mesh.position.y;
      const h = obj.height;
      const top = y + h / 2;
      const bottom = y - h / 2;

      let submergedFraction = clamp((waterTopY - top) / h, 0, 1);
      if (bottom < waterTopY && submergedFraction <= 0) {
        submergedFraction = clamp((waterTopY - y) / h + 0.5, 0, 1);
      }

      let buoyancy = 0;
      let drag = 0;
      let isSubmerged = bottom < waterTopY && top > waterBottomY;

      if (isSubmerged) {
        const submergedVolume = obj.volume * submergedFraction;
        buoyancy = waterDensity * gravity * submergedVolume;
        drag = dragCoefficient * obj.vy;
      }

      const weight = obj.mass * gravity;
      const netForce = -weight + buoyancy - drag;
      const ay = netForce / obj.mass;

      obj.vy += ay * dt;
      obj.mesh.position.y += obj.vy * dt;

      const minY = supportHeight(obj);
      if (obj.mesh.position.y < minY) {
        obj.mesh.position.y = minY;
        if (obj.vy < 0) obj.vy = 0;
      }

      const currentY = obj.mesh.position.y;
      const currentTop = currentY + h / 2;
      const currentBottom = currentY - h / 2;
      const currentSubmergedFraction = clamp((waterTopY - currentTop) / h, 0, 1);

      const densityRatio = obj.density / waterDensity;
      const nearEquilibrium = Math.abs(currentSubmergedFraction - densityRatio) < 0.08 && Math.abs(obj.vy) < 0.15;

      if (currentY <= minY + 1e-4 && obj.density > waterDensity) {
        obj.status = 'sunk';
      } else if (currentBottom < waterTopY && obj.density <= waterDensity && nearEquilibrium) {
        obj.status = 'floating';
      } else if (currentY <= minY + 1e-4 && obj.vy === 0) {
        obj.status = 'resting';
      } else {
        obj.status = 'falling';
      }
    }

    function updateHUD() {
      const lines = [];
      lines.push(`Gravity: ${gravity.toFixed(2)} m/s² (${gravityModes[gravityIndex].name})`);
      lines.push(`Water density: ${waterDensity} kg/m³ (${waterDensityModes[waterDensityIndex].name})`);
      lines.push(`Time scale: ${timeScale.toFixed(2)}x`);
      lines.push(`Simulation: ${paused ? 'paused' : 'running'}`);
      lines.push(`Selected: ${selected ? selected.name : 'none'}`);
      lines.push(`Sim time: ${simTime.toFixed(2)} s`);
      lines.push('');
      for (const obj of objects) {
        let status = obj.status;
        if (selected && selected.name === obj.name) status += '/selected';
        lines.push(
          `${obj.name}: y=${obj.mesh.position.y.toFixed(2)} vy=${obj.vy.toFixed(2)} ${status}`
        );
      }
      lines.push('');
      lines.push('Controls:');
      lines.push('R = reset, G = gravity, D = water density, T = slow motion');
      lines.push('Click object = select, Space = +3 m/s upward impulse');

      hud.textContent = lines.join('\n');
    }

    function updateState() {
      window.__3D_STATE__ = {
        gravity,
        waterDensity,
        timeScale,
        paused,
        selectedObject: selected ? selected.name : null,
        objects: Object.fromEntries(objects.map(obj => [
          obj.name,
          {
            y: Number(obj.mesh.position.y.toFixed(4)),
            vy: Number(obj.vy.toFixed(4)),
            density: obj.density,
            status:
              obj.mesh.position.y <= supportHeight(obj) + 1e-4 && obj.density > waterDensity
                ? 'sunk'
                : obj.status === 'floating'
                ? 'floating'
                : obj.mesh.position.y <= supportHeight(obj) + 1e-4
                ? 'resting'
                : 'falling'
          }
        ])),
        modelLoaded,
        simTime: Number(simTime.toFixed(4)),
        gravityMode: gravityModes[gravityIndex].name,
        waterDensityMode: waterDensityModes[waterDensityIndex].name,
        objectCount: 5,
        resetCount
      };
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const rawDt = Math.min(clock.getDelta(), 0.016);
      const dt = rawDt * timeScale;

      if (!paused) {
        simTime += dt;
        for (const obj of objects) {
          updateObject(obj, dt);
        }
      }

      controls.update();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    resetObjects();
    resetCount = 0;
    updateState();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
