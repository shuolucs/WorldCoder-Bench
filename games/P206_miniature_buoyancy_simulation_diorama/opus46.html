<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buoyancy Simulation Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    min-width: 320px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
    max-height: 90vh;
    overflow-y: auto;
}
#hud h3 { 
    margin-bottom: 6px; 
    color: #4af; 
    font-size: 15px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 4px;
}
#hud .section { margin-bottom: 8px; }
#hud .obj-info {
    padding: 4px 8px;
    margin: 3px 0;
    border-radius: 4px;
    background: rgba(255,255,255,0.05);
    font-size: 12px;
}
#hud .obj-info.selected {
    background: rgba(255,255,0,0.15);
    border-left: 3px solid #ff0;
}
.status-falling { color: #f88; }
.status-floating { color: #8f8; }
.status-sunk { color: #888; }
.status-resting { color: #aa8; }
#pauseBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 10px 24px;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
}
#pauseBtn:hover { background: rgba(50,50,50,0.8); border-color: #4af; }
#controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #aaa;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.5;
}
#controls-help kbd {
    background: rgba(255,255,255,0.15);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: monospace;
}
#loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 18px;
    background: rgba(0,0,0,0.8);
    padding: 20px 40px;
    border-radius: 10px;
}
</style>
</head>
<body>

<div id="loading">Loading scene...</div>

<div id="hud">
    <h3>🌊 Buoyancy Simulation</h3>
    <div class="section" id="sim-info"></div>
    <div class="section" id="obj-list"></div>
</div>

<button id="pauseBtn">⏸ Pause</button>

<div id="controls-help">
    <kbd>R</kbd> Reset &nbsp; <kbd>G</kbd> Gravity &nbsp; <kbd>D</kbd> Density &nbsp; 
    <kbd>T</kbd> Slow-mo &nbsp; <kbd>Space</kbd> Impulse &nbsp; <kbd>Click</kbd> Select
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 30, 60);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);
controls.update();

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x88aacc, 0x444422, 0.3);
scene.add(hemiLight);

// ============ GROUND PLANE ============
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// ============ LOAD DIORAMA MODEL ============
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');

const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mixer = null;

gltfLoader.load(
    'https://threejs.org/examples/models/gltf/LittlestTokyo.glb',
    (gltf) => {
        const model = gltf.scene;
        
        // Calculate bounding box and scale to fit 10x10x10
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 10 / maxDim;
        model.scale.setScalar(scale);
        
        // Recalculate and center
        const box2 = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        model.position.sub(center);
        model.position.y -= 2; // Push it down a bit so water sits above it nicely
        
        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        
        scene.add(model);
        
        // Animation mixer
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach((clip) => {
                mixer.clipAction(clip).play();
            });
        }
        
        window.__3D_STATE__.modelLoaded = true;
        document.getElementById('loading').style.display = 'none';
    },
    (progress) => {
        const pct = progress.total ? Math.round(progress.loaded / progress.total * 100) : '...';
        document.getElementById('loading').textContent = `Loading model... ${pct}%`;
    },
    (error) => {
        console.warn('Model load error:', error);
        document.getElementById('loading').textContent = 'Model failed to load (simulation still works)';
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 2000);
        window.__3D_STATE__.modelLoaded = false;
    }
);

// ============ WATER TANK ============
const waterWidth = 8, waterHeight = 4, waterDepth = 6;
const waterY = 2; // center y
const waterTopY = 4; // top surface

// Tank walls (wireframe)
const tankGeo = new THREE.BoxGeometry(waterWidth, waterHeight, waterDepth);
const tankEdges = new THREE.EdgesGeometry(tankGeo);
const tankLine = new THREE.LineSegments(tankEdges, new THREE.LineBasicMaterial({ color: 0x44aaff, linewidth: 2 }));
tankLine.position.set(0, waterY, 0);
scene.add(tankLine);

// Tank floor
const tankFloorGeo = new THREE.PlaneGeometry(waterWidth, waterDepth);
const tankFloorMat = new THREE.MeshStandardMaterial({ color: 0x445566, roughness: 0.8 });
const tankFloor = new THREE.Mesh(tankFloorGeo, tankFloorMat);
tankFloor.rotation.x = -Math.PI / 2;
tankFloor.position.set(0, 0.01, 0);
tankFloor.receiveShadow = true;
scene.add(tankFloor);

// Water volume (semi-transparent)
const waterGeo = new THREE.BoxGeometry(waterWidth - 0.05, waterHeight - 0.05, waterDepth - 0.05);
const waterMat = new THREE.MeshPhysicalMaterial({
    color: 0x2288cc,
    transparent: true,
    opacity: 0.35,
    roughness: 0.1,
    metalness: 0.0,
    transmission: 0.3,
    side: THREE.DoubleSide,
    depthWrite: false
});
const waterMesh = new THREE.Mesh(waterGeo, waterMat);
waterMesh.position.set(0, waterY, 0);
waterMesh.renderOrder = 1;
scene.add(waterMesh);

// Water surface shimmer
const surfaceGeo = new THREE.PlaneGeometry(waterWidth, waterDepth);
const surfaceMat = new THREE.MeshPhysicalMaterial({
    color: 0x44aadd,
    transparent: true,
    opacity: 0.25,
    roughness: 0.0,
    metalness: 0.3,
    side: THREE.DoubleSide,
    depthWrite: false
});
const surfaceMesh = new THREE.Mesh(surfaceGeo, surfaceMat);
surfaceMesh.rotation.x = -Math.PI / 2;
surfaceMesh.position.set(0, waterTopY, 0);
surfaceMesh.renderOrder = 2;
scene.add(surfaceMesh);

// ============ PHYSICS CONFIG ============
const gravityModes = [
    { name: 'earth', value: 9.81 },
    { name: 'moon', value: 1.62 },
    { name: 'jupiter', value: 24.79 }
];
let gravityIndex = 0;

const densityModes = [
    { name: 'fresh', value: 1000 },
    { name: 'salt', value: 1025 },
    { name: 'mercury', value: 13534 }
];
let densityIndex = 0;

let paused = false;
let timeScale = 1.0;
let simTime = 0;
let resetCount = 0;
let selectedObjectName = null;

const DRAG_COEFF = 2.0;

// ============ BUOYANCY OBJECTS ============
class BuoyancyObject {
    constructor(name, mesh, density, halfExtents, isBox) {
        this.name = name;
        this.mesh = mesh;
        this.density = density;
        this.halfExtents = halfExtents; // {x, y, z} for box, or {radius} for sphere
        this.isBox = isBox;
        this.y = 8;
        this.vy = 0;
        this.status = 'falling';
        this.outline = null;
        
        // Calculate volume and mass
        if (isBox) {
            this.volume = (halfExtents.x * 2) * (halfExtents.y * 2) * (halfExtents.z * 2);
            this.height = halfExtents.y * 2;
            this.minY = halfExtents.y; // minimum y (center) when resting on floor
        } else {
            const r = halfExtents.radius;
            this.volume = (4/3) * Math.PI * r * r * r;
            this.height = r * 2;
            this.minY = r;
        }
        this.mass = density * this.volume;
        
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.position.y = this.y;
        mesh.userData.buoyancyName = name;
        scene.add(mesh);
    }
    
    getSubmergedFraction() {
        const objectTop = this.y + this.height / 2;
        const objectBottom = this.y - this.height / 2;
        
        if (objectBottom >= waterTopY) return 0; // fully above water
        if (objectTop <= 0) return 1; // below tank floor (shouldn't happen)
        
        // Fraction submerged based on how much is below water surface
        const submergedHeight = Math.min(waterTopY - objectBottom, this.height);
        return Math.max(0, Math.min(1, submergedHeight / this.height));
    }
    
    getSubmergedVolume() {
        if (this.isBox) {
            return this.getSubmergedFraction() * this.volume;
        } else {
            // For sphere, use spherical cap formula for more accuracy
            const r = this.halfExtents.radius;
            const objectBottom = this.y - r;
            
            if (objectBottom >= waterTopY) return 0;
            if (this.y + r <= waterTopY) return this.volume; // fully submerged
            
            // Partially submerged sphere
            const h = Math.min(waterTopY - objectBottom, 2 * r);
            // Volume of spherical cap: V = π*h²*(3r - h)/3
            return Math.PI * h * h * (3 * r - h) / 3;
        }
    }
    
    update(dt, gravity, waterDensity) {
        // Gravity force (downward)
        let netForce = -this.mass * gravity;
        
        // Buoyancy force (upward)
        const submergedVolume = this.getSubmergedVolume();
        const buoyancyForce = waterDensity * gravity * submergedVolume;
        netForce += buoyancyForce;
        
        // Drag force (opposes velocity, only when in water)
        const subFrac = this.getSubmergedFraction();
        if (subFrac > 0) {
            const dragForce = -DRAG_COEFF * this.vy * subFrac * this.mass;
            netForce += dragForce;
        }
        
        // Euler integration
        const acceleration = netForce / this.mass;
        this.vy += acceleration * dt;
        this.y += this.vy * dt;
        
        // Floor collision
        if (this.y < this.minY) {
            this.y = this.minY;
            this.vy = 0;
        }
        
        // Update status
        if (this.y <= this.minY + 0.01 && Math.abs(this.vy) < 0.01) {
            const eqFrac = this.density / waterDensity;
            if (eqFrac >= 1.0) {
                this.status = 'sunk';
            } else {
                this.status = 'resting';
            }
        } else if (subFrac > 0 && Math.abs(this.vy) < 0.05) {
            this.status = 'floating';
        } else if (subFrac === 0) {
            this.status = 'falling';
        } else if (this.vy < -0.05) {
            this.status = 'falling';
        } else {
            this.status = 'floating';
        }
        
        // Update mesh position
        this.mesh.position.y = this.y;
        
        // Gentle rotation when in water
        if (subFrac > 0) {
            this.mesh.rotation.y += dt * 0.3 * subFrac;
        }
    }
    
    reset() {
        this.y = 8;
        this.vy = 0;
        this.status = 'falling';
        this.mesh.position.y = this.y;
    }
    
    setSelected(selected) {
        if (selected) {
            if (!this.outline) {
                const outlineGeo = this.isBox 
                    ? new THREE.BoxGeometry(
                        this.halfExtents.x * 2 + 0.1,
                        this.halfExtents.y * 2 + 0.1,
                        this.halfExtents.z * 2 + 0.1
                    )
                    : new THREE.SphereGeometry(this.halfExtents.radius + 0.05, 16, 12);
                const outlineMat = new THREE.MeshBasicMaterial({
                    color: 0xffff00,
                    wireframe: true,
                    transparent: true,
                    opacity: 0.8
                });
                this.outline = new THREE.Mesh(outlineGeo, outlineMat);
                this.mesh.add(this.outline);
            }
            this.outline.visible = true;
        } else {
            if (this.outline) {
                this.outline.visible = false;
            }
        }
    }
}

// Create objects with spread positions
const objectSpread = [-2.5, -1.2, 0, 1.2, 2.5];

const objects = {};

// 1. Wood Block
const woodGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
const woodMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
const woodMesh = new THREE.Mesh(woodGeo, woodMat);
woodMesh.position.x = objectSpread[0];
woodMesh.position.z = 0;
objects.woodBlock = new BuoyancyObject('woodBlock', woodMesh, 600, { x: 0.4, y: 0.4, z: 0.4 }, true);

// 2. Steel Ball
const steelGeo = new THREE.SphereGeometry(0.4, 24, 18);
const steelMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
const steelMesh = new THREE.Mesh(steelGeo, steelMat);
steelMesh.position.x = objectSpread[1];
objects.steelBall = new BuoyancyObject('steelBall', steelMesh, 7800, { radius: 0.4 }, false);

// 3. Ice Cube
const iceGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
const iceMat = new THREE.MeshPhysicalMaterial({ 
    color: 0xccddff, roughness: 0.1, metalness: 0.0, 
    transparent: true, opacity: 0.8, transmission: 0.4 
});
const iceMesh = new THREE.Mesh(iceGeo, iceMat);
iceMesh.position.x = objectSpread[2];
objects.iceCube = new BuoyancyObject('iceCube', iceMesh, 917, { x: 0.35, y: 0.35, z: 0.35 }, true);

// 4. Cork
const corkGeo = new THREE.SphereGeometry(0.35, 20, 14);
const corkMat = new THREE.MeshStandardMaterial({ color: 0xD2B48C, roughness: 0.9 });
const corkMesh = new THREE.Mesh(corkGeo, corkMat);
corkMesh.position.x = objectSpread[3];
objects.cork = new BuoyancyObject('cork', corkMesh, 240, { radius: 0.35 }, false);

// 5. Rubber
const rubberGeo = new THREE.SphereGeometry(0.45, 22, 16);
const rubberMat = new THREE.MeshStandardMaterial({ color: 0x8B0000, roughness: 0.6 });
const rubberMesh = new THREE.Mesh(rubberGeo, rubberMat);
rubberMesh.position.x = objectSpread[4];
objects.rubber = new BuoyancyObject('rubber', rubberMesh, 1100, { radius: 0.45 }, false);

// ============ STATE ============
window.__3D_STATE__ = {
    gravity: gravityModes[gravityIndex].value,
    waterDensity: densityModes[densityIndex].value,
    timeScale: timeScale,
    paused: paused,
    selectedObject: null,
    objects: {},
    modelLoaded: false,
    simTime: 0,
    gravityMode: gravityModes[gravityIndex].name,
    waterDensityMode: densityModes[densityIndex].name,
    objectCount: 5,
    resetCount: 0
};

function updateState() {
    const s = window.__3D_STATE__;
    s.gravity = gravityModes[gravityIndex].value;
    s.waterDensity = densityModes[densityIndex].value;
    s.timeScale = timeScale;
    s.paused = paused;
    s.selectedObject = selectedObjectName;
    s.simTime = simTime;
    s.gravityMode = gravityModes[gravityIndex].name;
    s.waterDensityMode = densityModes[densityIndex].name;
    s.resetCount = resetCount;
    
    for (const [name, obj] of Object.entries(objects)) {
        s.objects[name] = {
            y: obj.y,
            vy: obj.vy,
            density: obj.density,
            status: obj.status
        };
    }
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    const meshes = Object.values(objects).map(o => o.mesh);
    const intersects = raycaster.intersectObjects(meshes, true);
    
    // Deselect all
    for (const obj of Object.values(objects)) {
        obj.setSelected(false);
    }
    selectedObjectName = null;
    
    if (intersects.length > 0) {
        let target = intersects[0].object;
        // Walk up to find the buoyancy mesh
        while (target && !target.userData.buoyancyName) {
            target = target.parent;
        }
        if (target && target.userData.buoyancyName) {
            selectedObjectName = target.userData.buoyancyName;
            objects[selectedObjectName].setSelected(true);
        }
    }
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    
    if (key === 'r') {
        for (const obj of Object.values(objects)) {
            obj.reset();
        }
        resetCount++;
    }
    
    if (key === 'g') {
        gravityIndex = (gravityIndex + 1) % gravityModes.length;
    }
    
    if (key === 'd') {
        densityIndex = (densityIndex + 1) % densityModes.length;
        // Update water color based on density
        const colors = [0x2288cc, 0x1177aa, 0xaaaaaa];
        const opacities = [0.35, 0.4, 0.6];
        waterMat.color.setHex(colors[densityIndex]);
        waterMat.opacity = opacities[densityIndex];
    }
    
    if (key === ' ') {
        event.preventDefault();
        if (selectedObjectName && objects[selectedObjectName]) {
            objects[selectedObjectName].vy += 3;
        }
    }
    
    if (key === 't') {
        timeScale = timeScale === 1.0 ? 0.25 : 1.0;
    }
});

// ============ PAUSE BUTTON ============
const pauseBtn = document.getElementById('pauseBtn');
pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '▶ Resume' : '⏸ Pause';
});

// ============ HUD UPDATE ============
function updateHUD() {
    const simInfo = document.getElementById('sim-info');
    const gravMode = gravityModes[gravityIndex];
    const densMode = densityModes[densityIndex];
    
    simInfo.innerHTML = `
        <div><b>Gravity:</b> ${gravMode.value} m/s² <span style="color:#888">(${gravMode.name})</span></div>
        <div><b>Water Density:</b> ${densMode.value} kg/m³ <span style="color:#888">(${densMode.name})</span></div>
        <div><b>Time Scale:</b> ${timeScale}x ${timeScale < 1 ? '🐌' : ''}</div>
        <div><b>Status:</b> ${paused ? '<span style="color:#f88">⏸ Paused</span>' : '<span style="color:#8f8">▶ Running</span>'}</div>
        <div><b>Sim Time:</b> ${simTime.toFixed(1)}s</div>
    `;
    
    const objList = document.getElementById('obj-list');
    let html = '<h3>Objects</h3>';
    
    const icons = {
        woodBlock: '🪵',
        steelBall: '⚙️',
        iceCube: '🧊',
        cork: '🟤',
        rubber: '🔴'
    };
    
    for (const [name, obj] of Object.entries(objects)) {
        const isSelected = name === selectedObjectName;
        const statusClass = `status-${obj.status}`;
        html += `<div class="obj-info ${isSelected ? 'selected' : ''}">
            ${icons[name] || '●'} <b>${name}</b> ${isSelected ? '⭐' : ''}
            <br>y: ${obj.y.toFixed(2)} | vy: ${obj.vy.toFixed(2)} m/s
            <br>ρ: ${obj.density} kg/m³ | <span class="${statusClass}">${obj.status}</span>
        </div>`;
    }
    
    objList.innerHTML = html;
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const rawDt = Math.min(clock.getDelta(), 0.016);
    const dt = paused ? 0 : rawDt * timeScale;
    
    if (!paused) {
        simTime += dt;
        
        const gravity = gravityModes[gravityIndex].value;
        const waterDensity = densityModes[densityIndex].value;
        
        for (const obj of Object.values(objects)) {
            obj.update(dt, gravity, waterDensity);
        }
        
        // Animate mixer
        if (mixer) {
            mixer.update(dt);
        }
        
        // Water surface animation
        surfaceMesh.position.y = waterTopY + Math.sin(simTime * 2) * 0.02;
    }
    
    controls.update();
    updateState();
    updateHUD();
    
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
