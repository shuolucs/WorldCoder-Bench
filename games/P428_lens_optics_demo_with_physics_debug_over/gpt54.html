<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Thin Lens Optics Demo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #debug-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.5;
      min-width: 220px;
      z-index: 10;
      border: 1px solid rgba(255,255,255,0.15);
      white-space: nowrap;
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      color: rgba(255,255,255,0.9);
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 10;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="debug-panel">
    <div>Object Distance: <span id="debug-do">0</span></div>
    <div>Image Distance: <span id="debug-di">0</span></div>
    <div>Focal Length: <span id="debug-f">0</span></div>
    <div>Magnification: <span id="debug-m">0</span></div>
    <div>Image Type: <span id="debug-type">-</span></div>
    <div>Orientation: <span id="debug-orientation">-</span></div>
  </div>

  <div id="help">
    Drag red object arrow left/right<br>
    ↑ / ↓ : focal length ±10<br>
    L : toggle convex/concave lens<br>
    D : toggle debug panel<br>
    R : reset<br>
    1 : object at 2f, 2 : at f, 3 : at f/2
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const frustumWidth = 1000;
    const frustumHeight = 600;
    let aspect = window.innerWidth / window.innerHeight;

    const camera = new THREE.OrthographicCamera(
      -frustumWidth / 2,
       frustumWidth / 2,
       frustumHeight / 2,
      -frustumHeight / 2,
      0.1,
      2000
    );
    camera.position.set(0, 500, 0);
    camera.lookAt(0, 0, 0);
    camera.up.set(0, 0, -1);

    const grid = new THREE.GridHelper(1000, 20, 0x3e4a61, 0x2f3850);
    grid.position.y = 0;
    grid.material.opacity = 0.18;
    grid.material.transparent = true;
    scene.add(grid);

    function makeLine(points, color = 0xffffff, dashed = false, dashSize = 10, gapSize = 6) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      let material;
      if (dashed) {
        material = new THREE.LineDashedMaterial({
          color,
          dashSize,
          gapSize,
          transparent: true,
          opacity: 0.95
        });
      } else {
        material = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.95 });
      }
      const line = new THREE.Line(geometry, material);
      if (dashed) line.computeLineDistances();
      return line;
    }

    function makeCircleDot(color, radius = 4) {
      const geom = new THREE.CircleGeometry(radius, 24);
      const mat = new THREE.MeshBasicMaterial({ color });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.rotation.x = -Math.PI / 2;
      return mesh;
    }

    const axisLine = makeLine(
      [new THREE.Vector3(-500, 0, 0), new THREE.Vector3(500, 0, 0)],
      0xffffff,
      true,
      12,
      8
    );
    scene.add(axisLine);

    const lensGroup = new THREE.Group();
    scene.add(lensGroup);

    function createLensShape(type = 'convex') {
      const h = 120;
      const halfH = h / 2;
      const depth = 22;
      const points = [];

      if (type === 'convex') {
        points.push(new THREE.Vector3(0, 0, -halfH));
        points.push(new THREE.Vector3(depth * 0.30, 0, -halfH * 0.75));
        points.push(new THREE.Vector3(depth * 0.55, 0, -halfH * 0.35));
        points.push(new THREE.Vector3(depth * 0.62, 0, 0));
        points.push(new THREE.Vector3(depth * 0.55, 0, halfH * 0.35));
        points.push(new THREE.Vector3(depth * 0.30, 0, halfH * 0.75));
        points.push(new THREE.Vector3(0, 0, halfH));

        points.push(new THREE.Vector3(0, 0, halfH));
        points.push(new THREE.Vector3(-depth * 0.30, 0, halfH * 0.75));
        points.push(new THREE.Vector3(-depth * 0.55, 0, halfH * 0.35));
        points.push(new THREE.Vector3(-depth * 0.62, 0, 0));
        points.push(new THREE.Vector3(-depth * 0.55, 0, -halfH * 0.35));
        points.push(new THREE.Vector3(-depth * 0.30, 0, -halfH * 0.75));
        points.push(new THREE.Vector3(0, 0, -halfH));
      } else {
        points.push(new THREE.Vector3(0, 0, -halfH));
        points.push(new THREE.Vector3(-depth * 0.35, 0, -halfH * 0.72));
        points.push(new THREE.Vector3(-depth * 0.52, 0, -halfH * 0.32));
        points.push(new THREE.Vector3(-depth * 0.58, 0, 0));
        points.push(new THREE.Vector3(-depth * 0.52, 0, halfH * 0.32));
        points.push(new THREE.Vector3(-depth * 0.35, 0, halfH * 0.72));
        points.push(new THREE.Vector3(0, 0, halfH));

        points.push(new THREE.Vector3(0, 0, halfH));
        points.push(new THREE.Vector3(depth * 0.35, 0, halfH * 0.72));
        points.push(new THREE.Vector3(depth * 0.52, 0, halfH * 0.32));
        points.push(new THREE.Vector3(depth * 0.58, 0, 0));
        points.push(new THREE.Vector3(depth * 0.52, 0, -halfH * 0.32));
        points.push(new THREE.Vector3(depth * 0.35, 0, -halfH * 0.72));
        points.push(new THREE.Vector3(0, 0, -halfH));
      }

      const color = type === 'convex' ? 0x00d4ff : 0xff4fd8;
      return makeLine(points, color, false);
    }

    function rebuildLens(type) {
      while (lensGroup.children.length) {
        const obj = lensGroup.children.pop();
        obj.geometry?.dispose?.();
        obj.material?.dispose?.();
      }
      lensGroup.add(createLensShape(type));
    }

    const focalLeft = makeCircleDot(0xffdd33, 4);
    const focalRight = makeCircleDot(0xffdd33, 4);
    scene.add(focalLeft, focalRight);

    function createArrow(color = 0xff0000, dashed = false) {
      const group = new THREE.Group();
      const shaftMat = dashed
        ? new THREE.LineDashedMaterial({ color, dashSize: 8, gapSize: 5 })
        : new THREE.LineBasicMaterial({ color });
      const headMat = dashed
        ? new THREE.LineDashedMaterial({ color, dashSize: 6, gapSize: 4 })
        : new THREE.LineBasicMaterial({ color });

      const shaft = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
        shaftMat
      );
      const headLeft = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
        headMat
      );
      const headRight = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
        headMat
      );

      group.add(shaft, headLeft, headRight);
      group.userData = { shaft, headLeft, headRight, dashed };
      return group;
    }

    function updateArrow(group, x, height, color, dashed = false) {
      const dir = height >= 0 ? 1 : -1;
      const absH = Math.max(1, Math.abs(height));
      const topZ = height;
      const headSize = Math.min(12, absH * 0.25);
      const headSpread = 7;

      const shaftPts = [new THREE.Vector3(x, 0, 0), new THREE.Vector3(x, 0, topZ)];
      const headBaseZ = topZ - dir * headSize;

      const leftPts = [
        new THREE.Vector3(x, 0, topZ),
        new THREE.Vector3(x - headSpread, 0, headBaseZ)
      ];
      const rightPts = [
        new THREE.Vector3(x, 0, topZ),
        new THREE.Vector3(x + headSpread, 0, headBaseZ)
      ];

      group.userData.shaft.geometry.dispose();
      group.userData.shaft.geometry = new THREE.BufferGeometry().setFromPoints(shaftPts);

      group.userData.headLeft.geometry.dispose();
      group.userData.headLeft.geometry = new THREE.BufferGeometry().setFromPoints(leftPts);

      group.userData.headRight.geometry.dispose();
      group.userData.headRight.geometry = new THREE.BufferGeometry().setFromPoints(rightPts);

      [group.userData.shaft, group.userData.headLeft, group.userData.headRight].forEach(line => {
        line.material.color.set(color);
        if (dashed && line.computeLineDistances) line.computeLineDistances();
      });
    }

    const objectArrow = createArrow(0xff3b3b, false);
    const imageArrow = createArrow(0x44ff88, false);
    scene.add(objectArrow, imageArrow);

    const raysGroup = new THREE.Group();
    scene.add(raysGroup);

    const state = {
      objectX: -200,
      objectHeight: 60,
      focalAbs: 100,
      lensType: 'convex',
      debugVisible: true,
      dragActive: false
    };

    function getFocalLength() {
      return state.lensType === 'convex' ? state.focalAbs : -state.focalAbs;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function computeOptics() {
      const f = getFocalLength();
      const doVal = Math.abs(state.objectX);
      const eps = 1e-6;

      let di;
      if (Math.abs(doVal - f) < eps) {
        di = f > 0 ? 9999 : -9999;
      } else {
        di = (f * doVal) / (doVal - f);
      }

      if (!Number.isFinite(di)) di = f >= 0 ? 9999 : -9999;
      di = clamp(di, -9999, 9999);

      let m = -di / Math.max(doVal, eps);
      if (!Number.isFinite(m)) m = 0;

      const imageX = di;
      const imageHeightSigned = m * state.objectHeight;
      const imageHeightAbs = Math.abs(imageHeightSigned);

      let imageType = di > 0 ? 'real' : 'virtual';
      if (Math.abs(doVal - Math.abs(f)) < eps) imageType = 'virtual';

      let imageOrientation = imageHeightSigned < 0 ? 'inverted' : 'upright';
      if (state.lensType === 'concave') {
        imageType = 'virtual';
        imageOrientation = 'upright';
      }

      return {
        f: safeNum(f),
        doVal: safeNum(doVal),
        di: safeNum(di),
        imageX: safeNum(imageX),
        m: safeNum(m),
        imageHeightSigned: safeNum(imageHeightSigned),
        imageHeightAbs: safeNum(imageHeightAbs),
        imageType,
        imageOrientation,
        isValid: [f, doVal, di, imageX, m, imageHeightSigned, imageHeightAbs].every(Number.isFinite)
      };
    }

    function clearGroup(group) {
      while (group.children.length) {
        const c = group.children.pop();
        c.geometry?.dispose?.();
        c.material?.dispose?.();
      }
    }

    function buildRay(points, color, dashed = false) {
      return makeLine(points, color, dashed, 8, 5);
    }

    function updateRays(optics) {
      clearGroup(raysGroup);

      const ox = state.objectX;
      const oz = state.objectHeight;
      const di = optics.di;
      const ix = optics.imageX;
      const iz = optics.imageHeightSigned;
      const f = optics.f;

      const lensX = 0;
      const lensTipZ = oz;
      const farFocusX = f > 0 ? Math.abs(f) : -Math.abs(f);
      const nearFocusX = f > 0 ? -Math.abs(f) : Math.abs(f);

      const imgTip = new THREE.Vector3(ix, 0, iz);

      // Ray 1: parallel to axis -> refracts through far focal point (or appears from far focus for concave)
      const p1a = new THREE.Vector3(ox, 0, oz);
      const p1b = new THREE.Vector3(lensX, 0, oz);
      raysGroup.add(buildRay([p1a, p1b], 0xffeb3b, false));

      if (f > 0) {
        const p1c = Math.abs(di) > 9000
          ? new THREE.Vector3(500, 0, oz + (500 - lensX) * ((0 - oz) / (farFocusX - lensX)))
          : imgTip;
        raysGroup.add(buildRay([p1b, p1c], 0xffeb3b, false));
      } else {
        const slope = (0 - oz) / (farFocusX - lensX || 1e-6);
        const endX = 250;
        const endZ = oz + (endX - lensX) * slope;
        raysGroup.add(buildRay([p1b, new THREE.Vector3(endX, 0, endZ)], 0xffeb3b, false));
        raysGroup.add(buildRay([p1b, new THREE.Vector3(farFocusX, 0, 0)], 0xffeb3b, true));
      }

      // Ray 2: through near focal point -> refracts parallel to axis
      const p2a = new THREE.Vector3(ox, 0, oz);
      const p2b = new THREE.Vector3(lensX, 0, oz);
      raysGroup.add(buildRay([p2a, p2b], 0xff9800, false));

      if (f > 0) {
        const z2 = Math.abs(di) > 9000 ? oz : iz;
        const p2c = Math.abs(di) > 9000 ? new THREE.Vector3(500, 0, oz) : imgTip;
        raysGroup.add(buildRay([p2b, p2c], 0xff9800, false));
      } else {
        const endX = 250;
        raysGroup.add(buildRay([p2b, new THREE.Vector3(endX, 0, oz)], 0xff9800, false));
        raysGroup.add(buildRay([p2b, new THREE.Vector3(nearFocusX, 0, 0)], 0xff9800, true));
      }

      // Ray 3: through center undeviated
      const centerStart = new THREE.Vector3(ox, 0, oz);
      if (Math.abs(di) > 9000) {
        const endX = 500;
        const slope = (0 - oz) / (0 - ox || 1e-6);
        const endZ = oz + (endX - ox) * slope;
        raysGroup.add(buildRay([centerStart, new THREE.Vector3(endX, 0, endZ)], 0xffffff, false));
      } else {
        raysGroup.add(buildRay([centerStart, imgTip], 0xffffff, false));
        if (di < 0) {
          raysGroup.add(buildRay([new THREE.Vector3(0,0,0), imgTip], 0xffffff, true));
        }
      }
    }

    function updateDebug(optics) {
      document.getElementById('debug-do').textContent = optics.doVal.toFixed(2);
      document.getElementById('debug-di').textContent = optics.di.toFixed(2);
      document.getElementById('debug-f').textContent = optics.f.toFixed(2);
      document.getElementById('debug-m').textContent = optics.m.toFixed(2);
      document.getElementById('debug-type').textContent = optics.imageType.charAt(0).toUpperCase() + optics.imageType.slice(1);
      document.getElementById('debug-orientation').textContent = optics.imageOrientation.charAt(0).toUpperCase() + optics.imageOrientation.slice(1);
      document.getElementById('debug-panel').style.display = state.debugVisible ? 'block' : 'none';
    }

    function updateScene() {
      const optics = computeOptics();

      rebuildLens(state.lensType);

      const fAbs = Math.abs(optics.f);
      focalLeft.position.set(-fAbs, 0.5, 0);
      focalRight.position.set(fAbs, 0.5, 0);

      updateArrow(objectArrow, state.objectX, state.objectHeight, 0xff3b3b, false);

      const imageDashed = optics.di < 0;
      if (imageArrow.userData.dashed !== imageDashed) {
        scene.remove(imageArrow);
      }
      updateArrow(imageArrow, optics.imageX, optics.imageHeightSigned, 0x44ff88, imageDashed);
      [imageArrow.userData.shaft, imageArrow.userData.headLeft, imageArrow.userData.headRight].forEach(line => {
        if (imageDashed && line.computeLineDistances) line.computeLineDistances();
      });

      updateRays(optics);
      updateDebug(optics);

      window.__3D_STATE__ = {
        objectX: safeNum(state.objectX),
        objectDistance: safeNum(optics.doVal),
        imageDistance: safeNum(optics.di),
        imageX: safeNum(optics.imageX),
        focalLength: safeNum(optics.f),
        magnification: Number(optics.m.toFixed(2)),
        imageType: optics.imageType,
        imageOrientation: optics.imageOrientation,
        lensType: state.lensType,
        debugVisible: state.debugVisible,
        rayCount: 3,
        objectHeight: 60,
        imageHeight: safeNum(optics.imageHeightAbs),
        isValid: optics.isValid
      };
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const dragPoint = new THREE.Vector3();

    function screenToWorld(clientX, clientY) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      raycaster.ray.intersectPlane(dragPlane, dragPoint);
      return dragPoint.clone();
    }

    function objectHitTest(world) {
      return (
        Math.abs(world.x - state.objectX) < 25 &&
        world.z >= -10 &&
        world.z <= state.objectHeight + 10
      );
    }

    renderer.domElement.addEventListener('pointerdown', (e) => {
      const world = screenToWorld(e.clientX, e.clientY);
      if (objectHitTest(world)) {
        state.dragActive = true;
      }
    });

    window.addEventListener('pointermove', (e) => {
      if (!state.dragActive) return;
      const world = screenToWorld(e.clientX, e.clientY);
      state.objectX = clamp(world.x, -450, -10);
    });

    window.addEventListener('pointerup', () => {
      state.dragActive = false;
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp') {
        state.focalAbs = clamp(state.focalAbs + 10, 20, 300);
      } else if (e.key === 'ArrowDown') {
        state.focalAbs = clamp(state.focalAbs - 10, 20, 300);
      } else if (e.key === 'l' || e.key === 'L') {
        state.lensType = state.lensType === 'convex' ? 'concave' : 'convex';
      } else if (e.key === 'd' || e.key === 'D') {
        state.debugVisible = !state.debugVisible;
      } else if (e.key === 'r' || e.key === 'R') {
        resetState();
      } else if (e.key === '1') {
        state.objectX = clamp(-2 * state.focalAbs, -450, -10);
      } else if (e.key === '2') {
        state.objectX = clamp(-state.focalAbs, -450, -10);
      } else if (e.key === '3') {
        state.objectX = clamp(-state.focalAbs / 2, -450, -10);
      }
    });

    function resetState() {
      state.objectX = -200;
      state.focalAbs = 100;
      state.lensType = 'convex';
      state.debugVisible = true;
      state.dragActive = false;
    }

    function onResize() {
      aspect = window.innerWidth / window.innerHeight;
      const desiredWidth = 1000;
      const desiredHeight = 600;
      const currentAspect = aspect;
      const desiredAspect = desiredWidth / desiredHeight;

      if (currentAspect >= desiredAspect) {
        const width = desiredHeight * currentAspect;
        camera.left = -width / 2;
        camera.right = width / 2;
        camera.top = desiredHeight / 2;
        camera.bottom = -desiredHeight / 2;
      } else {
        const height = desiredWidth / currentAspect;
        camera.left = -desiredWidth / 2;
        camera.right = desiredWidth / 2;
        camera.top = height / 2;
        camera.bottom = -height / 2;
      }

      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    window.addEventListener('resize', onResize);
    onResize();
    resetState();

    function animate() {
      requestAnimationFrame(animate);
      updateScene();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
