<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Lens Optics Demonstration</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: sans-serif;
            user-select: none;
        }
        #debug-panel {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.75);
            color: #ffffff;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 220px;
        }
        .debug-row {
            display: flex;
            justify-content: space-between;
        }
        .debug-label {
            color: #aaa;
        }
        #instructions {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 6px;
            line-height: 1.5;
        }
        kbd {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="debug-panel">
        <div class="debug-row"><span class="debug-label">Object Dist (do):</span> <span id="debug-do"></span></div>
        <div class="debug-row"><span class="debug-label">Image Dist (di):</span> <span id="debug-di"></span></div>
        <div class="debug-row"><span class="debug-label">Focal Length (f):</span> <span id="debug-f"></span></div>
        <div class="debug-row"><span class="debug-label">Magnification (m):</span> <span id="debug-m"></span></div>
        <div class="debug-row"><span class="debug-label">Image Type:</span> <span id="debug-type"></span></div>
        <div class="debug-row"><span class="debug-label">Orientation:</span> <span id="debug-orientation"></span></div>
    </div>
    
    <div id="instructions">
        <strong>Interactions:</strong><br>
        • Drag the red object arrow left/right<br>
        • <kbd>↑</kbd> / <kbd>↓</kbd> : Adjust focal length<br>
        • <kbd>L</kbd> : Toggle Convex/Concave lens<br>
        • <kbd>D</kbd> : Toggle Debug Panel<br>
        • <kbd>R</kbd> : Reset to defaults<br>
        • <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> : Snap object to 2f, f, f/2
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- State Variables ---
        let objectX = -200;
        const objectHeight = 60;
        let fMag = 100; // Absolute focal length
        let lensType = 'convex'; // 'convex' or 'concave'
        let debugVisible = true;

        // Computed Physics State
        let objectDistance = 200;
        let imageDistance = 200;
        let imageX = 200;
        let focalLength = 100;
        let magnification = -1;
        let imageHeight = -60;
        let imageType = 'real';
        let imageOrientation = 'inverted';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        // Camera Setup (Orthographic, looking down Y axis onto XZ plane)
        let aspect = window.innerWidth / window.innerHeight;
        let frustumHeight = 600;
        let frustumWidth = frustumHeight * aspect;
        if (frustumWidth < 1000) {
            frustumWidth = 1000;
            frustumHeight = frustumWidth / aspect;
        }
        const camera = new THREE.OrthographicCamera(-frustumWidth/2, frustumWidth/2, frustumHeight/2, -frustumHeight/2, 1, 1000);
        camera.position.set(0, 100, 0);
        camera.up.set(0, 0, 1); // +Z is up on screen
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- Visual Elements ---
        
        // Grid Helper
        const gridHelper = new THREE.GridHelper(2000, 40, 0x333344, 0x222233);
        scene.add(gridHelper);

        // Optical Axis
        const axisGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-1000, 0, 0),
            new THREE.Vector3(1000, 0, 0)
        ]);
        const axisMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 10, gapSize: 10, opacity: 0.5, transparent: true });
        const axisLine = new THREE.Line(axisGeo, axisMat);
        axisLine.computeLineDistances();
        scene.add(axisLine);

        // Lens Mesh
        let lensMesh;
        function updateLensMesh() {
            if (lensMesh) scene.remove(lensMesh);
            const shape = new THREE.Shape();
            const h = 120;
            const w = 15;
            
            if (lensType === 'convex') {
                shape.moveTo(0, h/2);
                shape.quadraticCurveTo(w, 0, 0, -h/2);
                shape.quadraticCurveTo(-w, 0, 0, h/2);
            } else {
                shape.moveTo(-w, h/2);
                shape.lineTo(w, h/2);
                shape.quadraticCurveTo(w/4, 0, w, -h/2);
                shape.lineTo(-w, -h/2);
                shape.quadraticCurveTo(-w/4, 0, -w, h/2);
            }
            
            const geo = new THREE.ShapeGeometry(shape);
            const mat = new THREE.MeshBasicMaterial({
                color: lensType === 'convex' ? 0x00d4ff : 0xff00ff,
                transparent: true,
                opacity: 0.6,
                side: THREE.DoubleSide
            });
            lensMesh = new THREE.Mesh(geo, mat);
            lensMesh.rotation.x = -Math.PI / 2; // Rotate to XZ plane
            scene.add(lensMesh);
        }

        // Focal Points
        const fGeo = new THREE.CircleGeometry(4, 16);
        const fMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const f1 = new THREE.Mesh(fGeo, fMat);
        const f2 = new THREE.Mesh(fGeo, fMat);
        f1.rotation.x = -Math.PI / 2;
        f2.rotation.x = -Math.PI / 2;
        scene.add(f1, f2);

        // Arrows
        function createArrow(color) {
            const group = new THREE.Group();

            // Solid Line
            const matSolid = new THREE.LineBasicMaterial({ color, linewidth: 2 });
            const geoSolid = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3(0,0,1)]);
            const lineSolid = new THREE.Line(geoSolid, matSolid);
            group.add(lineSolid);

            // Dashed Line
            const matDashed = new THREE.LineDashedMaterial({ color, dashSize: 5, gapSize: 5 });
            const geoDashed = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3(0,0,1)]);
            const lineDashed = new THREE.Line(geoDashed, matDashed);
            group.add(lineDashed);

            // Triangle Tip
            const triShape = new THREE.Shape();
            triShape.moveTo(0, 0);
            triShape.lineTo(-6, -15);
            triShape.lineTo(6, -15);
            triShape.lineTo(0, 0);
            const triGeo = new THREE.ShapeGeometry(triShape);
            const triMat = new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide });
            const tri = new THREE.Mesh(triGeo, triMat);
            group.add(tri);

            return group;
        }

        const objectArrow = createArrow(0xff0000);
        scene.add(objectArrow);
        
        const imageArrow = createArrow(0x00ff00);
        scene.add(imageArrow);

        function updateArrow(arrowObj, x, h, isDashed) {
            arrowObj.position.set(x, 0, 0);
            const lineSolid = arrowObj.children[0];
            const lineDashed = arrowObj.children[1];
            const tri = arrowObj.children[2];

            lineSolid.visible = !isDashed;
            lineDashed.visible = isDashed;

            const pts = [new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 0, h)];
            if (!isDashed) {
                lineSolid.geometry.setFromPoints(pts);
            } else {
                lineDashed.geometry.setFromPoints(pts);
                lineDashed.computeLineDistances();
            }

            tri.position.set(0, 0, h);
            tri.rotation.x = h < 0 ? Math.PI / 2 : -Math.PI / 2;
        }

        // Rays Group
        const raysGroup = new THREE.Group();
        scene.add(raysGroup);

        function drawRays() {
            raysGroup.clear();
            const objP = new THREE.Vector3(objectX, 0, objectHeight);
            const imgP = new THREE.Vector3(imageX, 0, imageHeight);
            const center = new THREE.Vector3(0, 0, 0);
            
            const denom = objectDistance - focalLength;
            const isInfinity = Math.abs(denom) < 0.1;

            function addRay(start, hit, color) {
                // 1. Incident Ray (Real)
                const geoIn = new THREE.BufferGeometry().setFromPoints([start, hit]);
                raysGroup.add(new THREE.Line(geoIn, new THREE.LineBasicMaterial({ color })));

                // 2. Refracted Ray (Real)
                let dirOut;
                if (isInfinity) {
                    dirOut = new THREE.Vector3(focalLength, 0, -objectHeight).normalize();
                } else {
                    dirOut = new THREE.Vector3().subVectors(imgP, hit).normalize();
                    if (imageX < 0) dirOut.negate(); // Force pointing right (+X)
                }

                const endP = hit.clone().add(dirOut.multiplyScalar(2000));
                const geoOut = new THREE.BufferGeometry().setFromPoints([hit, endP]);
                raysGroup.add(new THREE.Line(geoOut, new THREE.LineBasicMaterial({ color })));

                // 3. Virtual Extension (Dashed)
                if (imageX < 0 && !isInfinity) {
                    const geoVirt = new THREE.BufferGeometry().setFromPoints([imgP, hit]);
                    const matVirt = new THREE.LineDashedMaterial({ color, dashSize: 10, gapSize: 10 });
                    const lineVirt = new THREE.Line(geoVirt, matVirt);
                    lineVirt.computeLineDistances();
                    raysGroup.add(lineVirt);
                }
            }

            // Ray 1: Parallel in, through focal point out (Yellow)
            addRay(objP, new THREE.Vector3(0, 0, objectHeight), 0xffff00);

            // Ray 2: Through near focal point in, parallel out (Orange)
            if (!isInfinity) {
                addRay(objP, new THREE.Vector3(0, 0, imageHeight), 0xffa500);
            }

            // Ray 3: Through center (White)
            addRay(objP, center, 0xffffff);
        }

        // --- Physics & Update Logic ---
        function updatePhysics() {
            objectDistance = Math.abs(objectX);
            focalLength = lensType === 'convex' ? Math.abs(fMag) : -Math.abs(fMag);

            const denom = objectDistance - focalLength;
            const isInfinity = Math.abs(denom) < 0.1;

            if (isInfinity) {
                imageDistance = 9999 * Math.sign(focalLength);
                imageX = imageDistance;
                magnification = -9999;
                imageHeight = magnification * objectHeight;
                imageType = 'virtual';
                imageOrientation = 'inverted';
            } else {
                imageDistance = (focalLength * objectDistance) / denom;
                if (Math.abs(imageDistance) > 9999) {
                    imageDistance = 9999 * Math.sign(imageDistance);
                }
                imageX = imageDistance;
                magnification = -imageDistance / objectDistance;
                imageHeight = magnification * objectHeight;
                imageType = imageDistance > 0 ? 'real' : 'virtual';
                imageOrientation = magnification > 0 ? 'upright' : 'inverted';
            }

            updateVisuals();
            updateDebugPanel();
            updateGlobalState();
        }

        function updateVisuals() {
            updateArrow(objectArrow, objectX, objectHeight, false);
            
            if (Math.abs(imageDistance) > 5000) {
                imageArrow.visible = false;
            } else {
                imageArrow.visible = true;
                updateArrow(imageArrow, imageX, imageHeight, imageType === 'virtual');
            }

            f1.position.set(-Math.abs(fMag), 0, 0);
            f2.position.set(Math.abs(fMag), 0, 0);

            drawRays();
        }

        function updateDebugPanel() {
            document.getElementById('debug-do').textContent = objectDistance.toFixed(1);
            document.getElementById('debug-di').textContent = Math.abs(imageDistance) > 5000 ? 'Infinity' : imageDistance.toFixed(1);
            document.getElementById('debug-f').textContent = focalLength.toFixed(1);
            document.getElementById('debug-m').textContent = Math.abs(magnification) > 5000 ? 'Infinity' : magnification.toFixed(2);
            document.getElementById('debug-type').textContent = imageType.charAt(0).toUpperCase() + imageType.slice(1);
            document.getElementById('debug-orientation').textContent = imageOrientation.charAt(0).toUpperCase() + imageOrientation.slice(1);
        }

        function updateGlobalState() {
            window.__3D_STATE__ = {
                objectX: objectX,
                objectDistance: objectDistance,
                imageDistance: imageDistance,
                imageX: imageX,
                focalLength: focalLength,
                magnification: parseFloat(magnification.toFixed(2)),
                imageType: imageType,
                imageOrientation: imageOrientation,
                lensType: lensType,
                debugVisible: debugVisible,
                rayCount: 3,
                objectHeight: objectHeight,
                imageHeight: imageHeight,
                isValid: !isNaN(imageDistance) && !isNaN(magnification)
            };
        }

        // --- Interactions ---
        let isDragging = false;

        window.addEventListener('pointerdown', (e) => {
            const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            const mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            
            const worldX = mouseX * (camera.right - camera.left) / 2 + camera.position.x;
            const worldZ = mouseY * (camera.top - camera.bottom) / 2 + camera.position.z;

            // Hitbox around the object arrow
            if (Math.abs(worldX - objectX) < 30 && worldZ > -10 && worldZ < objectHeight + 20) {
                isDragging = true;
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            const mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            const worldX = mouseX * (camera.right - camera.left) / 2 + camera.position.x;
            
            objectX = Math.max(-450, Math.min(-10, worldX));
            updatePhysics();
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
        });

        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'arrowup':
                    fMag = Math.min(300, fMag + 10);
                    updateLensMesh();
                    updatePhysics();
                    break;
                case 'arrowdown':
                    fMag = Math.max(20, fMag - 10);
                    updateLensMesh();
                    updatePhysics();
                    break;
                case 'l':
                    lensType = lensType === 'convex' ? 'concave' : 'convex';
                    updateLensMesh();
                    updatePhysics();
                    break;
                case 'd':
                    debugVisible = !debugVisible;
                    document.getElementById('debug-panel').style.display = debugVisible ? 'block' : 'none';
                    updateGlobalState();
                    break;
                case 'r':
                    objectX = -200;
                    fMag = 100;
                    lensType = 'convex';
                    debugVisible = true;
                    document.getElementById('debug-panel').style.display = 'block';
                    updateLensMesh();
                    updatePhysics();
                    break;
                case '1':
                    objectX = -2 * fMag;
                    updatePhysics();
                    break;
                case '2':
                    objectX = -fMag;
                    updatePhysics();
                    break;
                case '3':
                    objectX = -fMag / 2;
                    updatePhysics();
                    break;
            }
        });

        window.addEventListener('resize', () => {
            aspect = window.innerWidth / window.innerHeight;
            frustumHeight = 600;
            frustumWidth = frustumHeight * aspect;
            if (frustumWidth < 1000) {
                frustumWidth = 1000;
                frustumHeight = frustumWidth / aspect;
            }
            
            camera.left = -frustumWidth / 2;
            camera.right = frustumWidth / 2;
            camera.top = frustumHeight / 2;
            camera.bottom = -frustumHeight / 2;
            camera.updateProjectionMatrix();
            
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        updateLensMesh();
        updatePhysics();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
