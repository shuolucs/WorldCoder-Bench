<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Lens Optics Demonstration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; }
  canvas { display: block; }
  #debug-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 8px;
    padding: 16px 20px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #ffffff;
    min-width: 300px;
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  #debug-panel h3 {
    margin-bottom: 12px;
    color: #00d4ff;
    font-size: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 8px;
  }
  #debug-panel .row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    line-height: 1.6;
  }
  #debug-panel .label { color: #aaa; }
  #debug-panel .value { color: #0f0; font-weight: bold; }
  #instructions {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.6);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: #888;
    z-index: 100;
  }
  #instructions span { color: #00d4ff; }
</style>
</head>
<body>

<div id="debug-panel">
  <h3>⚡ Physics Debug Overlay</h3>
  <div class="row"><span class="label">Object Distance (do):</span><span class="value" id="debug-do">200.00</span></div>
  <div class="row"><span class="label">Image Distance (di):</span><span class="value" id="debug-di">200.00</span></div>
  <div class="row"><span class="label">Focal Length (f):</span><span class="value" id="debug-f">100.00</span></div>
  <div class="row"><span class="label">Magnification (m):</span><span class="value" id="debug-m">-1.00</span></div>
  <div class="row"><span class="label">Image Type:</span><span class="value" id="debug-type">Real</span></div>
  <div class="row"><span class="label">Image Orientation:</span><span class="value" id="debug-orientation">Inverted</span></div>
</div>

<div id="instructions">
  <span>Drag</span> object arrow | <span>↑↓</span> focal length | <span>L</span> toggle lens | <span>D</span> debug | <span>R</span> reset | <span>1 2 3</span> snap positions
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // State
  let objectX = -200;
  let focalLength = 100;
  let lensType = 'convex';
  let debugVisible = true;
  const objectHeight = 60;

  // Three.js setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const aspect = window.innerWidth / window.innerHeight;
  const viewWidth = 1000;
  const viewHeight = 600;
  const camera = new THREE.OrthographicCamera(
    -viewWidth / 2, viewWidth / 2,
    viewHeight / 2, -viewHeight / 2,
    0.1, 1000
  );
  camera.position.set(0, 100, 0);
  camera.lookAt(0, 0, 0);
  camera.up.set(0, 0, -1);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Grid
  const gridHelper = new THREE.GridHelper(1000, 50, 0x333355, 0x222244);
  scene.add(gridHelper);

  // Groups for dynamic elements
  const dynamicGroup = new THREE.Group();
  scene.add(dynamicGroup);

  // Optical axis (dashed line)
  const axisMaterial = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 10, gapSize: 5, opacity: 0.5, transparent: true });
  const axisGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(-500, 0, 0),
    new THREE.Vector3(500, 0, 0)
  ]);
  const axisLine = new THREE.Line(axisGeom, axisMaterial);
  axisLine.computeLineDistances();
  scene.add(axisLine);

  // Helper functions
  function createArrow(x, height, color, dashed = false) {
    const group = new THREE.Group();

    // Shaft
    const shaftMat = dashed
      ? new THREE.LineDashedMaterial({ color: color, dashSize: 6, gapSize: 4, linewidth: 2 })
      : new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
    const shaftGeom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, 0, 0),
      new THREE.Vector3(x, 0, -height)
    ]);
    const shaft = new THREE.Line(shaftGeom, shaftMat);
    if (dashed) shaft.computeLineDistances();
    group.add(shaft);

    // Arrowhead
    const headSize = Math.min(Math.abs(height) * 0.2, 12);
    const dir = height > 0 ? -1 : 1;
    const tipZ = -height;
    const headMat = dashed
      ? new THREE.LineDashedMaterial({ color: color, dashSize: 6, gapSize: 4 })
      : new THREE.LineBasicMaterial({ color: color });
    
    const head1Geom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, 0, tipZ),
      new THREE.Vector3(x - headSize * 0.5, 0, tipZ + dir * headSize)
    ]);
    const head1 = new THREE.Line(head1Geom, headMat);
    if (dashed) head1.computeLineDistances();
    group.add(head1);

    const head2Geom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x, 0, tipZ),
      new THREE.Vector3(x + headSize * 0.5, 0, tipZ + dir * headSize)
    ]);
    const head2 = new THREE.Line(head2Geom, headMat);
    if (dashed) head2.computeLineDistances();
    group.add(head2);

    // Base on axis
    const baseMat = new THREE.LineBasicMaterial({ color: color });
    const baseGeom = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(x - 3, 0, 0),
      new THREE.Vector3(x + 3, 0, 0)
    ]);
    group.add(new THREE.Line(baseGeom, baseMat));

    return group;
  }

  function createConvexLens(height) {
    const group = new THREE.Group();
    const segments = 40;
    const halfH = height / 2;
    const bulge = 15;

    // Left arc
    const leftPoints = [];
    for (let i = 0; i <= segments; i++) {
      const t = (i / segments) * Math.PI;
      const z = -halfH + height * (i / segments);
      const x = -bulge * Math.sin(t);
      leftPoints.push(new THREE.Vector3(x, 0, z));
    }
    const leftGeom = new THREE.BufferGeometry().setFromPoints(leftPoints);
    const lensMat = new THREE.LineBasicMaterial({ color: 0x00d4ff, linewidth: 2 });
    group.add(new THREE.Line(leftGeom, lensMat));

    // Right arc
    const rightPoints = [];
    for (let i = 0; i <= segments; i++) {
      const t = (i / segments) * Math.PI;
      const z = -halfH + height * (i / segments);
      const x = bulge * Math.sin(t);
      rightPoints.push(new THREE.Vector3(x, 0, z));
    }
    const rightGeom = new THREE.BufferGeometry().setFromPoints(rightPoints);
    group.add(new THREE.Line(rightGeom, lensMat));

    // Small arrows at top and bottom indicating converging
    const tipSize = 8;
    // Top arrows
    const topArr1 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-tipSize, 0, -halfH),
      new THREE.Vector3(0, 0, -halfH - tipSize)
    ]);
    group.add(new THREE.Line(topArr1, lensMat));
    const topArr2 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(tipSize, 0, -halfH),
      new THREE.Vector3(0, 0, -halfH - tipSize)
    ]);
    group.add(new THREE.Line(topArr2, lensMat));

    // Bottom arrows
    const botArr1 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(-tipSize, 0, halfH),
      new THREE.Vector3(0, 0, halfH + tipSize)
    ]);
    group.add(new THREE.Line(botArr1, lensMat));
    const botArr2 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(tipSize, 0, halfH),
      new THREE.Vector3(0, 0, halfH + tipSize)
    ]);
    group.add(new THREE.Line(botArr2, lensMat));

    return group;
  }

  function createConcaveLens(height) {
    const group = new THREE.Group();
    const segments = 40;
    const halfH = height / 2;
    const bulge = 15;

    const lensMat = new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 2 });

    // Left arc (concave inward)
    const leftPoints = [];
    for (let i = 0; i <= segments; i++) {
      const t = (i / segments) * Math.PI;
      const z = -halfH + height * (i / segments);
      const x = bulge * Math.sin(t); // curves inward (positive x for left side)
      leftPoints.push(new THREE.Vector3(x, 0, z));
    }
    const leftGeom = new THREE.BufferGeometry().setFromPoints(leftPoints);
    group.add(new THREE.Line(leftGeom, lensMat));

    // Right arc (concave inward)
    const rightPoints = [];
    for (let i = 0; i <= segments; i++) {
      const t = (i / segments) * Math.PI;
      const z = -halfH + height * (i / segments);
      const x = -bulge * Math.sin(t); // curves inward (negative x for right side)
      rightPoints.push(new THREE.Vector3(x, 0, z));
    }
    const rightGeom = new THREE.BufferGeometry().setFromPoints(rightPoints);
    group.add(new THREE.Line(rightGeom, lensMat));

    // Small arrows at top and bottom indicating diverging
    const tipSize = 8;
    // Top arrows (pointing outward)
    const topArr1 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, -halfH),
      new THREE.Vector3(-tipSize, 0, -halfH - tipSize)
    ]);
    group.add(new THREE.Line(topArr1, lensMat));
    const topArr2 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, -halfH),
      new THREE.Vector3(tipSize, 0, -halfH - tipSize)
    ]);
    group.add(new THREE.Line(topArr2, lensMat));

    // Bottom arrows
    const botArr1 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, halfH),
      new THREE.Vector3(-tipSize, 0, halfH + tipSize)
    ]);
    group.add(new THREE.Line(botArr1, lensMat));
    const botArr2 = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, halfH),
      new THREE.Vector3(tipSize, 0, halfH + tipSize)
    ]);
    group.add(new THREE.Line(botArr2, lensMat));

    return group;
  }

  function createDot(x, z, color, size) {
    const geom = new THREE.CircleGeometry(size || 4, 16);
    const mat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.rotation.x = -Math.PI / 2;
    mesh.position.set(x, 0.1, z);
    return mesh;
  }

  function createRayLine(points, color, dashed = false) {
    const mat = dashed
      ? new THREE.LineDashedMaterial({ color: color, dashSize: 8, gapSize: 4, opacity: 0.7, transparent: true })
      : new THREE.LineBasicMaterial({ color: color, opacity: 0.7, transparent: true });
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, mat);
    if (dashed) line.computeLineDistances();
    return line;
  }

  function computePhysics() {
    const f = lensType === 'convex' ? Math.abs(focalLength) : -Math.abs(focalLength);
    const doVal = Math.abs(objectX); // object distance, positive

    let di, m;

    // Handle special case: object at focal point
    if (Math.abs(doVal - f) < 0.01) {
      di = f > 0 ? 9999 : -9999;
    } else {
      di = (f * doVal) / (doVal - f);
    }

    // Clamp di to avoid extreme values
    if (di > 9999) di = 9999;
    if (di < -9999) di = -9999;

    if (isNaN(di) || !isFinite(di)) {
      di = 9999;
    }

    m = -di / doVal;

    if (isNaN(m) || !isFinite(m)) {
      m = -1;
    }

    const imageType = di > 0 ? 'real' : 'virtual';
    const imageOrientation = m > 0 ? 'upright' : 'inverted';
    const imageX = di; // positive = right of lens, negative = left of lens
    const imageH = Math.abs(m) * objectHeight;

    return {
      f: f,
      doVal: doVal,
      di: di,
      m: m,
      imageType: imageType,
      imageOrientation: imageOrientation,
      imageX: imageX,
      imageHeight: imageH,
      isValid: !isNaN(di) && !isNaN(m) && isFinite(di) && isFinite(m)
    };
  }

  function rebuildScene() {
    // Clear dynamic group
    while (dynamicGroup.children.length > 0) {
      const child = dynamicGroup.children[0];
      dynamicGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
      // Recursively dispose group children
      if (child.children) {
        child.traverse(c => {
          if (c.geometry) c.geometry.dispose();
          if (c.material) c.material.dispose();
        });
      }
    }

    const physics = computePhysics();
    const f = physics.f;

    // Lens
    if (lensType === 'convex') {
      dynamicGroup.add(createConvexLens(120));
    } else {
      dynamicGroup.add(createConcaveLens(120));
    }

    // Focal points
    dynamicGroup.add(createDot(-Math.abs(f), 0, 0xffff00, 5));
    dynamicGroup.add(createDot(Math.abs(f), 0, 0xffff00, 5));

    // Labels for focal points
    // F and F' text would require sprites, let's add small rings instead
    const fLabelMat = new THREE.LineBasicMaterial({ color: 0xffff00 });
    const fRing1 = new THREE.RingGeometry(6, 8, 16);
    const fMesh1 = new THREE.Mesh(fRing1, new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, opacity: 0.5, transparent: true }));
    fMesh1.rotation.x = -Math.PI / 2;
    fMesh1.position.set(-Math.abs(f), 0.1, 0);
    dynamicGroup.add(fMesh1);

    const fMesh2 = new THREE.Mesh(new THREE.RingGeometry(6, 8, 16), new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide, opacity: 0.5, transparent: true }));
    fMesh2.rotation.x = -Math.PI / 2;
    fMesh2.position.set(Math.abs(f), 0.1, 0);
    dynamicGroup.add(fMesh2);

    // Lens center dot
    dynamicGroup.add(createDot(0, 0, 0x00d4ff, 3));

    // Object arrow
    dynamicGroup.add(createArrow(objectX, objectHeight, 0xff4444, false));

    // Image arrow
    const imageXPos = physics.imageX;
    const imageH = physics.m * objectHeight; // signed: negative = inverted (points down in Z)
    const isVirtual = physics.imageType === 'virtual';

    // Clamp image position for display
    const displayImageX = Math.max(-480, Math.min(480, imageXPos));
    const displayImageH = Math.max(-300, Math.min(300, imageH));

    dynamicGroup.add(createArrow(displayImageX, displayImageH, 0x44ff44, isVirtual));

    // Principal rays
    const objTipX = objectX;
    const objTipZ = -objectHeight; // tip of object in Z (negative because arrow points up = negative Z in our coord)
    const imgTipX = displayImageX;
    const imgTipZ = -displayImageH;

    // Ray 1: Parallel to axis from object tip, then through far focal point
    // From object tip, goes parallel to axis to the lens, then refracts through focal point
    const ray1Points = [];
    ray1Points.push(new THREE.Vector3(objTipX, 0, objTipZ));
    ray1Points.push(new THREE.Vector3(0, 0, objTipZ)); // hits lens at same height

    if (lensType === 'convex') {
      // Refracts through far focal point (f on right side)
      // Line from (0, objTipZ) through (f, 0) extended
      const dx = Math.abs(f);
      const dz = -objTipZ;
      const extendFactor = 500 / dx;
      ray1Points.push(new THREE.Vector3(Math.abs(f) + dx * extendFactor, 0, 0 + (-dz) * extendFactor));
    } else {
      // Concave: diverges as if coming from near focal point (f on left, which is positive x since f is negative)
      // The refracted ray diverges, but appears to come from the focal point on the same side
      // Focal point for concave on the right side is at x = f (negative), so it's on the left
      // Actually for concave lens with f<0: far focal point is at x=f (negative, left side)
      // Ray parallel to axis hits lens, diverges as if from focal point at x=f (left side)
      const focalX = f; // negative for concave
      // Direction from focal point (focalX, 0) to lens hit point (0, objTipZ)
      const dirX = 0 - focalX;
      const dirZ = objTipZ - 0;
      const len = Math.sqrt(dirX * dirX + dirZ * dirZ);
      const extendDist = 500;
      ray1Points.push(new THREE.Vector3(0 + (dirX / len) * extendDist, 0, objTipZ + (dirZ / len) * extendDist));
    }
    dynamicGroup.add(createRayLine(ray1Points, 0xffff00));

    // For virtual image with concave lens, draw the virtual extension (dashed) back to image
    if (isVirtual && lensType === 'concave') {
      const focalX = f;
      const virtualExtPoints = [
        new THREE.Vector3(0, 0, objTipZ),
        new THREE.Vector3(focalX, 0, 0)
      ];
      dynamicGroup.add(createRayLine(virtualExtPoints, 0xffff00, true));
    }

    // Ray 2: Through near focal point, then parallel to axis after lens
    const ray2Points = [];
    if (lensType === 'convex') {
      // Near focal point is at x = -f (left side)
      const nearFocalX = -Math.abs(f);
      // Line from object tip through near focal point to lens
      // Direction from objTip to nearFocal
      const dirToFocal_x = nearFocalX - objTipX;
      const dirToFocal_z = 0 - objTipZ;
      // Find where this line hits x=0 (the lens)
      const t = (0 - objTipX) / dirToFocal_x;
      const hitZ = objTipZ + t * dirToFocal_z;

      ray2Points.push(new THREE.Vector3(objTipX, 0, objTipZ));
      ray2Points.push(new THREE.Vector3(0, 0, hitZ));
      // After lens, goes parallel to axis at height hitZ
      ray2Points.push(new THREE.Vector3(500, 0, hitZ));
    } else {
      // Concave: ray aimed toward far focal point (on right, at x = |f|, but f<0 so far focal = -f = |f|)
      // Actually for concave: near focal point is at x = -f = |f| (right side, positive)
      // Ray directed toward the focal point on the other side
      const farFocalX = -f; // positive for concave (right side)
      // Direction from object tip toward far focal point
      const dirX = farFocalX - objTipX;
      const dirZ = 0 - objTipZ;
      // Find intersection with lens at x=0
      const t = (0 - objTipX) / dirX;
      const hitZ = objTipZ + t * dirZ;

      ray2Points.push(new THREE.Vector3(objTipX, 0, objTipZ));
      ray2Points.push(new THREE.Vector3(0, 0, hitZ));
      // After concave lens, exits parallel to axis
      ray2Points.push(new THREE.Vector3(500, 0, hitZ));

      // Virtual extension back
      const virtualExt = [
        new THREE.Vector3(0, 0, hitZ),
        new THREE.Vector3(displayImageX, 0, imgTipZ)
      ];
      dynamicGroup.add(createRayLine(virtualExt, 0xffa500, true));
    }
    dynamicGroup.add(createRayLine(ray2Points, 0xffa500));

    // Ray 3: Through center of lens, undeviated
    const ray3Points = [];
    ray3Points.push(new THREE.Vector3(objTipX, 0, objTipZ));
    ray3Points.push(new THREE.Vector3(0, 0, 0)); // center of lens is at origin... wait, the ray goes through center
    // Actually ray through center: from object tip, through (0,0), continues straight
    // Direction: from objTip to (0,0)
    const centerDirX = 0 - objTipX;
    const centerDirZ = 0 - objTipZ;
    const centerLen = Math.sqrt(centerDirX * centerDirX + centerDirZ * centerDirZ);
    const extDist = 500;

    // The ray goes from object tip, through lens center, and continues
    ray3Points.push(new THREE.Vector3(0 + (centerDirX / centerLen) * extDist, 0, 0 + (centerDirZ / centerLen) * extDist));
    dynamicGroup.add(createRayLine(ray3Points, 0xffffff));

    // For virtual images, draw virtual ray extensions to image point
    if (isVirtual && lensType === 'convex') {
      // Ray 1 virtual extension: from lens hit point back to virtual image
      const vr1 = [
        new THREE.Vector3(0, 0, objTipZ),
        new THREE.Vector3(displayImageX, 0, imgTipZ)
      ];
      dynamicGroup.add(createRayLine(vr1, 0xffff00, true));

      // Ray 2 virtual extension
      const nearFocalX = -Math.abs(f);
      const dirToFocal_x = nearFocalX - objTipX;
      const dirToFocal_z = 0 - objTipZ;
      const t2 = (0 - objTipX) / dirToFocal_x;
      const hitZ2 = objTipZ + t2 * dirToFocal_z;
      const vr2 = [
        new THREE.Vector3(0, 0, hitZ2),
        new THREE.Vector3(displayImageX, 0, imgTipZ)
      ];
      dynamicGroup.add(createRayLine(vr2, 0xffa500, true));

      // Ray 3 virtual extension
      const vr3 = [
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(displayImageX, 0, imgTipZ)
      ];
      dynamicGroup.add(createRayLine(vr3, 0xffffff, true));
    }

    // Update debug panel
    updateDebugPanel(physics);

    // Update global state
    updateGlobalState(physics);
  }

  function updateDebugPanel(physics) {
    document.getElementById('debug-do').textContent = physics.doVal.toFixed(2);
    document.getElementById('debug-di').textContent = physics.di.toFixed(2);
    document.getElementById('debug-f').textContent = physics.f.toFixed(2);
    document.getElementById('debug-m').textContent = physics.m.toFixed(2);
    document.getElementById('debug-type').textContent = physics.imageType === 'real' ? 'Real' : 'Virtual';
    document.getElementById('debug-type').style.color = physics.imageType === 'real' ? '#44ff44' : '#ff4444';
    document.getElementById('debug-orientation').textContent = physics.imageOrientation === 'inverted' ? 'Inverted' : 'Upright';
    document.getElementById('debug-orientation').style.color = physics.imageOrientation === 'inverted' ? '#ffaa00' : '#44aaff';
  }

  function updateGlobalState(physics) {
    window.__3D_STATE__ = {
      objectX: objectX,
      objectDistance: physics.doVal,
      imageDistance: physics.di,
      imageX: physics.imageX,
      focalLength: physics.f,
      magnification: parseFloat(physics.m.toFixed(2)),
      imageType: physics.imageType,
      imageOrientation: physics.imageOrientation,
      lensType: lensType,
      debugVisible: debugVisible,
      rayCount: 3,
      objectHeight: objectHeight,
      imageHeight: parseFloat(physics.imageHeight.toFixed(2)),
      isValid: physics.isValid
    };
  }

  // Dragging
  let isDragging = false;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function screenToWorld(clientX, clientY) {
    const rect = renderer.domElement.getBoundingClientRect();
    const ndcX = ((clientX - rect.left) / rect.width) * 2 - 1;
    const ndcY = -((clientY - rect.top) / rect.height) * 2 + 1;

    // For orthographic camera looking down Y axis
    const worldX = ndcX * (viewWidth / 2);
    const worldZ = ndcY * (viewHeight / 2); // Note: camera.up is (0,0,-1), so this maps differently

    // Actually let's use unproject
    const vec = new THREE.Vector3(ndcX, ndcY, 0);
    vec.unproject(camera);
    return { x: vec.x, z: vec.z };
  }

  renderer.domElement.addEventListener('mousedown', (e) => {
    const world = screenToWorld(e.clientX, e.clientY);
    // Check if click is near the object arrow
    if (Math.abs(world.x - objectX) < 20 && world.z > -objectHeight - 20 && world.z < 20) {
      isDragging = true;
      renderer.domElement.style.cursor = 'grabbing';
    }
  });

  renderer.domElement.addEventListener('mousemove', (e) => {
    if (isDragging) {
      const world = screenToWorld(e.clientX, e.clientY);
      objectX = Math.max(-450, Math.min(-10, world.x));
      rebuildScene();
    } else {
      // Hover detection
      const world = screenToWorld(e.clientX, e.clientY);
      if (Math.abs(world.x - objectX) < 20 && world.z > -objectHeight - 20 && world.z < 20) {
        renderer.domElement.style.cursor = 'grab';
      } else {
        renderer.domElement.style.cursor = 'default';
      }
    }
  });

  renderer.domElement.addEventListener('mouseup', () => {
    isDragging = false;
    renderer.domElement.style.cursor = 'default';
  });

  renderer.domElement.addEventListener('mouseleave', () => {
    isDragging = false;
  });

  // Touch support
  renderer.domElement.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const world = screenToWorld(touch.clientX, touch.clientY);
    if (Math.abs(world.x - objectX) < 30 && world.z > -objectHeight - 30 && world.z < 30) {
      isDragging = true;
    }
  }, { passive: false });

  renderer.domElement.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (isDragging) {
      const touch = e.touches[0];
      const world = screenToWorld(touch.clientX, touch.clientY);
      objectX = Math.max(-450, Math.min(-10, world.x));
      rebuildScene();
    }
  }, { passive: false });

  renderer.domElement.addEventListener('touchend', () => {
    isDragging = false;
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowUp':
        e.preventDefault();
        focalLength = Math.min(300, focalLength + 10);
        rebuildScene();
        break;
      case 'ArrowDown':
        e.preventDefault();
        focalLength = Math.max(20, focalLength - 10);
        rebuildScene();
        break;
      case 'l':
      case 'L':
        lensType = lensType === 'convex' ? 'concave' : 'convex';
        rebuildScene();
        break;
      case 'd':
      case 'D':
        debugVisible = !debugVisible;
        document.getElementById('debug-panel').style.display = debugVisible ? 'block' : 'none';
        if (window.__3D_STATE__) window.__3D_STATE__.debugVisible = debugVisible;
        break;
      case 'r':
      case 'R':
        objectX = -200;
        focalLength = 100;
        lensType = 'convex';
        debugVisible = true;
        document.getElementById('debug-panel').style.display = 'block';
        rebuildScene();
        break;
      case '1':
        // Place at 2f
        objectX = -2 * focalLength;
        objectX = Math.max(-450, Math.min(-10, objectX));
        rebuildScene();
        break;
      case '2':
        // Place at f
        objectX = -focalLength;
        objectX = Math.max(-450, Math.min(-10, objectX));
        rebuildScene();
        break;
      case '3':
        // Place at f/2
        objectX = -focalLength / 2;
        objectX = Math.max(-450, Math.min(-10, objectX));
        rebuildScene();
        break;
    }
  });

  // Window resize
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    const newAspect = window.innerWidth / window.innerHeight;
    // Maintain view
    if (newAspect > viewWidth / viewHeight) {
      camera.left = -viewHeight / 2 * newAspect;
      camera.right = viewHeight / 2 * newAspect;
      camera.top = viewHeight / 2;
      camera.bottom = -viewHeight / 2;
    } else {
      camera.left = -viewWidth / 2;
      camera.right = viewWidth / 2;
      camera.top = viewWidth / 2 / newAspect;
      camera.bottom = -viewWidth / 2 / newAspect;
    }
    camera.updateProjectionMatrix();
  });

  // Trigger initial resize
  window.dispatchEvent(new Event('resize'));

  // Initial build
  rebuildScene();

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
