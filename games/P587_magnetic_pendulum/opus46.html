<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Magnetic Pendulum Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; background: #111122; font-family: monospace; }
canvas#main-canvas { display: block; }
#hud {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: white;
    padding: 12px; font-size: 13px; font-family: monospace;
    border-radius: 8px; z-index: 1000; line-height: 1.6;
    min-width: 240px;
}
#controls {
    position: fixed; top: 10px; right: 10px;
    background: rgba(0,0,0,0.7); color: white;
    padding: 12px; font-size: 12px; font-family: monospace;
    border-radius: 8px; z-index: 1000; min-width: 220px;
}
#controls label { display: block; margin: 6px 0 2px; }
#controls input[type=range] { width: 100%; }
#fractal-container {
    position: fixed; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.7); padding: 8px;
    border-radius: 8px; z-index: 1000;
}
#fractal-canvas { display: block; border: 1px solid #444; image-rendering: pixelated; }
#fractal-label { color: #aaa; font-size: 11px; font-family: monospace; text-align: center; margin-top: 4px; }
#keys-help {
    position: fixed; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: #888;
    padding: 10px; font-size: 11px; font-family: monospace;
    border-radius: 8px; z-index: 1000; line-height: 1.5;
}
</style>
</head>
<body>

<div id="hud">
    <div>Magnet Strength: <span id="hud-magnet">1.0</span></div>
    <div>Damping: <span id="hud-damping">0.10</span></div>
    <div>Pendulum Length: <span id="hud-length">5.0</span></div>
    <div>Bob Speed: <span id="hud-speed">0.000</span></div>
    <div>Nearest Magnet: <span id="hud-nearest">Red(1)</span></div>
    <div>Fractal Progress: <span id="hud-fractal">0</span>%</div>
    <div>Status: <span id="hud-paused">Playing</span></div>
</div>

<div id="controls">
    <label>Magnet Strength: <span id="val-magnet">1.0</span></label>
    <input type="range" id="slider-magnet-strength" min="0.1" max="5.0" step="0.1" value="1.0">
    <label>Damping: <span id="val-damping">0.10</span></label>
    <input type="range" id="slider-damping" min="0.01" max="0.50" step="0.01" value="0.10">
    <label>Pendulum Length: <span id="val-length">5.0</span></label>
    <input type="range" id="slider-pendulum-length" min="3.0" max="8.0" step="0.1" value="5.0">
</div>

<div id="fractal-container">
    <canvas id="fractal-canvas" width="200" height="200"></canvas>
    <div id="fractal-label">Fractal Map</div>
</div>

<div id="keys-help">
    R: Reset | C: Random | Space: Pause<br>T: Toggle Trail
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
window.__3D_STATE__ = {
    magnetStrength: 1.0,
    damping: 0.10,
    pendulumLength: 5.0,
    bobPosition: { x: 0, y: 0, z: 0 },
    bobSpeed: 0,
    nearestMagnet: 1,
    fractalProgress: 0,
    isPaused: false,
    trailVisible: true,
    frameCount: 0,
    simValid: true
};

// ============ PARAMS ============
let magnetStrength = 1.0;
let damping = 0.10;
let pendulumLength = 5.0;
const mass = 0.1;
const gravity = 9.81;
const pivotPos = new THREE.Vector3(0, 5, 0);
const dt = 0.002;
const substeps = 5;
const maxTrailPoints = 500;
let isPaused = false;
let trailVisible = true;
let frameCount = 0;

// Magnet positions
const magnetPositions = [
    new THREE.Vector3(2, 0.05, 0),
    new THREE.Vector3(-1, 0.05, 1.732),
    new THREE.Vector3(-1, 0.05, -1.732)
];
const magnetColors = [0xff3333, 0x33ff33, 0x3333ff];
const magnetColorVec = [
    new THREE.Color(0xff3333),
    new THREE.Color(0x33ff33),
    new THREE.Color(0x3333ff)
];

// ============ RENDERER ============
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// ============ SCENE ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

// ============ CAMERA ============
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 6);
camera.lookAt(0, 0, 0);

// ============ CONTROLS ============
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.0, 50);
pointLight.position.set(0, 10, 0);
pointLight.castShadow = true;
pointLight.shadow.mapSize.width = 1024;
pointLight.shadow.mapSize.height = 1024;
scene.add(pointLight);

// ============ PLATFORM ============
const platformGeo = new THREE.CylinderGeometry(4, 4, 0.1, 64);
const platformMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8, metalness: 0.2 });
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = -0.05;
platform.receiveShadow = true;
scene.add(platform);

// ============ MAGNETS ============
const magnetMeshes = [];
for (let i = 0; i < 3; i++) {
    const magnetGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.3, 32);
    const magnetMat = new THREE.MeshStandardMaterial({
        color: magnetColors[i],
        emissive: magnetColors[i],
        emissiveIntensity: 0.6,
        roughness: 0.3,
        metalness: 0.5
    });
    const magnetMesh = new THREE.Mesh(magnetGeo, magnetMat);
    magnetMesh.position.copy(magnetPositions[i]);
    magnetMesh.castShadow = true;
    scene.add(magnetMesh);
    magnetMeshes.push(magnetMesh);

    // Halo ring
    const haloGeo = new THREE.TorusGeometry(0.4, 0.03, 16, 48);
    const haloMat = new THREE.MeshStandardMaterial({
        color: magnetColors[i],
        emissive: magnetColors[i],
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.7
    });
    const halo = new THREE.Mesh(haloGeo, haloMat);
    halo.rotation.x = -Math.PI / 2;
    halo.position.copy(magnetPositions[i]);
    halo.position.y = 0.2;
    scene.add(halo);
}

// ============ PENDULUM ARM ============
const armGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
armGeo.translate(0, 0.5, 0); // origin at bottom
const armMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5, roughness: 0.5 });
const armMesh = new THREE.Mesh(armGeo, armMat);
scene.add(armMesh);

// ============ PENDULUM BOB ============
const bobGeo = new THREE.SphereGeometry(0.2, 32, 32);
const bobMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
const bobMesh = new THREE.Mesh(bobGeo, bobMat);
bobMesh.castShadow = true;
scene.add(bobMesh);

// ============ PIVOT MARKER (invisible) ============
// Just for reference

// ============ BOB STATE ============
function computeY(x, z, L) {
    const r2 = x * x + z * z;
    if (r2 >= L * L) return pivotPos.y; // shouldn't happen
    return pivotPos.y - Math.sqrt(L * L - r2);
}

let bobX = 1.5, bobZ = 0.5;
let bobVx = 0, bobVz = 0;

function resetBob(x, z) {
    bobX = x; bobZ = z;
    bobVx = 0; bobVz = 0;
    trailPositions = [];
    trailColors = [];
    updateTrailGeometry();
}

resetBob(1.5, 0.5);

// ============ PHYSICS ============
function computeAcceleration(x, z, vx, vz) {
    let ax = 0, az = 0;

    // Gravity restoring force (projected)
    const gFactor = -(gravity / pendulumLength);
    ax += gFactor * x;
    az += gFactor * z;

    // Magnetic forces
    for (let i = 0; i < 3; i++) {
        const mx = magnetPositions[i].x;
        const mz = magnetPositions[i].z;
        const dx = mx - x;
        const dz = mz - z;
        let dist = Math.sqrt(dx * dx + dz * dz);
        dist = Math.max(dist, 0.3);
        const r3 = dist * dist * dist;
        const f = magnetStrength / r3;
        ax += f * dx / mass;
        az += f * dz / mass;
    }

    // Damping
    ax += -damping * vx / mass;
    az += -damping * vz / mass;

    return [ax, az];
}

function rk4Step(x, z, vx, vz, h) {
    const [ax1, az1] = computeAcceleration(x, z, vx, vz);
    const k1x = vx, k1z = vz, k1vx = ax1, k1vz = az1;

    const [ax2, az2] = computeAcceleration(x + 0.5*h*k1x, z + 0.5*h*k1z, vx + 0.5*h*k1vx, vz + 0.5*h*k1vz);
    const k2x = vx + 0.5*h*k1vx, k2z = vz + 0.5*h*k1vz, k2vx = ax2, k2vz = az2;

    const [ax3, az3] = computeAcceleration(x + 0.5*h*k2x, z + 0.5*h*k2z, vx + 0.5*h*k2vx, vz + 0.5*h*k2vz);
    const k3x = vx + 0.5*h*k2vx, k3z = vz + 0.5*h*k2vz, k3vx = ax3, k3vz = az3;

    const [ax4, az4] = computeAcceleration(x + h*k3x, z + h*k3z, vx + h*k3vx, vz + h*k3vz);
    const k4x = vx + h*k3vx, k4z = vz + h*k3vz, k4vx = ax4, k4vz = az4;

    const newX = x + (h / 6) * (k1x + 2*k2x + 2*k3x + k4x);
    const newZ = z + (h / 6) * (k1z + 2*k2z + 2*k3z + k4z);
    const newVx = vx + (h / 6) * (k1vx + 2*k2vx + 2*k3vx + k4vx);
    const newVz = vz + (h / 6) * (k1vz + 2*k2vz + 2*k3vz + k4vz);

    return [newX, newZ, newVx, newVz];
}

function constrainToSphere(x, z) {
    const maxR = pendulumLength * 0.95; // keep within sphere
    const r = Math.sqrt(x * x + z * z);
    if (r > maxR) {
        const scale = maxR / r;
        return [x * scale, z * scale];
    }
    return [x, z];
}

function stepPhysics() {
    for (let s = 0; s < substeps; s++) {
        const result = rk4Step(bobX, bobZ, bobVx, bobVz, dt);
        bobX = result[0]; bobZ = result[1]; bobVx = result[2]; bobVz = result[3];
        const constrained = constrainToSphere(bobX, bobZ);
        if (constrained[0] !== bobX || constrained[1] !== bobZ) {
            // Project velocity
            const r = Math.sqrt(bobX * bobX + bobZ * bobZ);
            if (r > 0.001) {
                const nx = bobX / r, nz = bobZ / r;
                const vDotN = bobVx * nx + bobVz * nz;
                if (vDotN > 0) {
                    bobVx -= vDotN * nx;
                    bobVz -= vDotN * nz;
                }
            }
            bobX = constrained[0]; bobZ = constrained[1];
        }
    }
}

// ============ NEAREST MAGNET ============
function getNearestMagnet(x, z) {
    let minDist = Infinity, nearest = 0;
    for (let i = 0; i < 3; i++) {
        const dx = magnetPositions[i].x - x;
        const dz = magnetPositions[i].z - z;
        const d = dx * dx + dz * dz;
        if (d < minDist) { minDist = d; nearest = i; }
    }
    return nearest;
}

// ============ TRAIL ============
let trailPositions = [];
let trailColors = [];

const trailMaxVerts = maxTrailPoints;
const trailPosArray = new Float32Array(trailMaxVerts * 3);
const trailColArray = new Float32Array(trailMaxVerts * 4);
const trailGeometry = new THREE.BufferGeometry();
trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPosArray, 3));
trailGeometry.setAttribute('color', new THREE.BufferAttribute(trailColArray, 4));
trailGeometry.setDrawRange(0, 0);

const trailMaterial = new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    linewidth: 2,
    depthWrite: false
});
const trailLine = new THREE.Line(trailGeometry, trailMaterial);
scene.add(trailLine);

function updateTrailGeometry() {
    const count = trailPositions.length;
    for (let i = 0; i < count; i++) {
        const p = trailPositions[i];
        trailPosArray[i * 3] = p.x;
        trailPosArray[i * 3 + 1] = p.y;
        trailPosArray[i * 3 + 2] = p.z;

        const c = trailColors[i];
        const alpha = 0.1 + 0.9 * (i / Math.max(count - 1, 1));
        trailColArray[i * 4] = c.r;
        trailColArray[i * 4 + 1] = c.g;
        trailColArray[i * 4 + 2] = c.b;
        trailColArray[i * 4 + 3] = alpha;
    }
    trailGeometry.attributes.position.needsUpdate = true;
    trailGeometry.attributes.color.needsUpdate = true;
    trailGeometry.setDrawRange(0, count);
}

function addTrailPoint(x, y, z) {
    if (trailPositions.length >= maxTrailPoints) {
        trailPositions.shift();
        trailColors.shift();
    }
    trailPositions.push(new THREE.Vector3(x, y, z));
    const nearest = getNearestMagnet(x, z);
    trailColors.push(magnetColorVec[nearest].clone());
}

// ============ FRACTAL MAP ============
const fractalCanvas = document.getElementById('fractal-canvas');
const fractalCtx = fractalCanvas.getContext('2d');
const fractalWidth = 200, fractalHeight = 200;
const fractalImageData = fractalCtx.createImageData(fractalWidth, fractalHeight);
let fractalRow = 0;
let fractalComputing = true;
let fractalProgress = 0;

// Also create a texture for the 3D plane
const fractalTexture = new THREE.CanvasTexture(fractalCanvas);
fractalTexture.minFilter = THREE.LinearFilter;
fractalTexture.magFilter = THREE.NearestFilter;

const fractalPlaneGeo = new THREE.PlaneGeometry(4, 4);
const fractalPlaneMat = new THREE.MeshBasicMaterial({
    map: fractalTexture,
    transparent: true,
    opacity: 0.6,
    side: THREE.DoubleSide
});
const fractalPlane = new THREE.Mesh(fractalPlaneGeo, fractalPlaneMat);
fractalPlane.rotation.x = -Math.PI / 2;
fractalPlane.position.y = 0.02;
scene.add(fractalPlane);

function simulateFractalPoint(startX, startZ) {
    let x = startX, z = startZ, vx = 0, vz = 0;
    const fdt = 0.005;
    const fDamping = damping;
    const fMagStr = magnetStrength;
    const fL = pendulumLength;
    const fMass = mass;

    for (let step = 0; step < 2000; step++) {
        // RK4 inline for performance
        let ax, az, dx, dz, dist, r3, f;

        // Compute acceleration
        function accel(px, pz, pvx, pvz) {
            let aax = -(gravity / fL) * px;
            let aaz = -(gravity / fL) * pz;
            for (let i = 0; i < 3; i++) {
                dx = magnetPositions[i].x - px;
                dz = magnetPositions[i].z - pz;
                dist = Math.sqrt(dx * dx + dz * dz);
                dist = Math.max(dist, 0.3);
                r3 = dist * dist * dist;
                f = fMagStr / r3;
                aax += f * dx / fMass;
                aaz += f * dz / fMass;
            }
            aax += -fDamping * pvx / fMass;
            aaz += -fDamping * pvz / fMass;
            return [aax, aaz];
        }

        const [a1x, a1z] = accel(x, z, vx, vz);
        const [a2x, a2z] = accel(x+0.5*fdt*vx, z+0.5*fdt*vz, vx+0.5*fdt*a1x, vz+0.5*fdt*a1z);
        const [a3x, a3z] = accel(x+0.5*fdt*(vx+0.5*fdt*a1x), z+0.5*fdt*(vz+0.5*fdt*a1z), vx+0.5*fdt*a2x, vz+0.5*fdt*a2z);
        const [a4x, a4z] = accel(x+fdt*(vx+0.5*fdt*a2x), z+fdt*(vz+0.5*fdt*a2z), vx+fdt*a3x, vz+fdt*a3z);

        x += fdt * (vx + (fdt/6)*(a1x + a2x + a3x));
        z += fdt * (vz + (fdt/6)*(a1z + a2z + a3z));
        vx += (fdt/6) * (a1x + 2*a2x + 2*a3x + a4x);
        vz += (fdt/6) * (a1z + 2*a2z + 2*a3z + a4z);

        // Constrain
        const rr = Math.sqrt(x*x + z*z);
        const maxR = fL * 0.95;
        if (rr > maxR) {
            const sc = maxR / rr;
            x *= sc; z *= sc;
        }

        // Check if settled near a magnet
        const speed = Math.sqrt(vx*vx + vz*vz);
        if (speed < 0.05) {
            for (let i = 0; i < 3; i++) {
                const ddx = magnetPositions[i].x - x;
                const ddz = magnetPositions[i].z - z;
                if (Math.sqrt(ddx*ddx + ddz*ddz) < 0.5) {
                    return i;
                }
            }
        }
    }

    // Timeout: return closest
    return getNearestMagnet(x, z);
}

function computeFractalRows(numRows) {
    if (!fractalComputing) return;

    const rgbColors = [
        [255, 50, 50],
        [50, 255, 50],
        [50, 50, 255]
    ];

    for (let r = 0; r < numRows && fractalRow < fractalHeight; r++, fractalRow++) {
        for (let col = 0; col < fractalWidth; col++) {
            const sx = -3 + 6 * (col / (fractalWidth - 1));
            const sz = -3 + 6 * (fractalRow / (fractalHeight - 1));

            const magnet = simulateFractalPoint(sx, sz);
            const idx = (fractalRow * fractalWidth + col) * 4;
            fractalImageData.data[idx] = rgbColors[magnet][0];
            fractalImageData.data[idx + 1] = rgbColors[magnet][1];
            fractalImageData.data[idx + 2] = rgbColors[magnet][2];
            fractalImageData.data[idx + 3] = 255;
        }
    }

    fractalCtx.putImageData(fractalImageData, 0, 0);
    fractalTexture.needsUpdate = true;
    fractalProgress = Math.floor((fractalRow / fractalHeight) * 100);

    if (fractalRow >= fractalHeight) {
        fractalComputing = false;
        fractalProgress = 100;
    }
}

function restartFractal() {
    fractalRow = 0;
    fractalComputing = true;
    fractalProgress = 0;
    // Clear
    for (let i = 0; i < fractalImageData.data.length; i += 4) {
        fractalImageData.data[i] = 0;
        fractalImageData.data[i+1] = 0;
        fractalImageData.data[i+2] = 0;
        fractalImageData.data[i+3] = 255;
    }
    fractalCtx.putImageData(fractalImageData, 0, 0);
    fractalTexture.needsUpdate = true;
}

// ============ UPDATE ARM ============
function updateArm(bobPos) {
    const dir = new THREE.Vector3().subVectors(pivotPos, bobPos);
    const length = dir.length();
    dir.normalize();

    armMesh.scale.set(1, length, 1);
    armMesh.position.copy(bobPos);
    armMesh.lookAt(pivotPos);
    // CylinderGeometry is along Y, we need to orient it
    armMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir);
}

// ============ SLIDERS ============
const sliderMagnet = document.getElementById('slider-magnet-strength');
const sliderDamping = document.getElementById('slider-damping');
const sliderLength = document.getElementById('slider-pendulum-length');

sliderMagnet.addEventListener('input', () => {
    magnetStrength = parseFloat(sliderMagnet.value);
    document.getElementById('val-magnet').textContent = magnetStrength.toFixed(1);
    restartFractal();
});

sliderDamping.addEventListener('input', () => {
    damping = parseFloat(sliderDamping.value);
    document.getElementById('val-damping').textContent = damping.toFixed(2);
    restartFractal();
});

sliderLength.addEventListener('input', () => {
    pendulumLength = parseFloat(sliderLength.value);
    document.getElementById('val-length').textContent = pendulumLength.toFixed(1);
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key.toLowerCase()) {
        case 'r':
            resetBob(1.5, 0.5);
            break;
        case 'c':
            resetBob((Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4);
            break;
        case ' ':
            e.preventDefault();
            isPaused = !isPaused;
            break;
        case 't':
            trailVisible = !trailVisible;
            trailLine.visible = trailVisible;
            break;
    }
});

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
let trailCounter = 0;

function animate() {
    requestAnimationFrame(animate);
    frameCount++;

    // Physics
    if (!isPaused) {
        stepPhysics();

        // Add trail point every 3 frames
        trailCounter++;
        if (trailCounter >= 3) {
            trailCounter = 0;
            const by = computeY(bobX, bobZ, pendulumLength);
            addTrailPoint(bobX, by, bobZ);
            updateTrailGeometry();
        }
    }

    // Fractal computation (2 rows per frame)
    if (fractalComputing) {
        computeFractalRows(2);
    }

    // Update bob position
    const bobY = computeY(bobX, bobZ, pendulumLength);
    bobMesh.position.set(bobX, bobY, bobZ);

    // Update arm
    updateArm(bobMesh.position);

    // Compute state
    const speed = Math.sqrt(bobVx * bobVx + bobVz * bobVz);
    const nearest = getNearestMagnet(bobX, bobZ);
    const nearestNames = ['Red(1)', 'Green(2)', 'Blue(3)'];
    const simValid = !isNaN(bobX) && !isNaN(bobZ) && !isNaN(bobVx) && !isNaN(bobVz) && isFinite(bobX) && isFinite(bobZ);

    // Update HUD
    document.getElementById('hud-magnet').textContent = magnetStrength.toFixed(1);
    document.getElementById('hud-damping').textContent = damping.toFixed(2);
    document.getElementById('hud-length').textContent = pendulumLength.toFixed(1);
    document.getElementById('hud-speed').textContent = speed.toFixed(3);
    document.getElementById('hud-nearest').textContent = nearestNames[nearest];
    document.getElementById('hud-fractal').textContent = fractalProgress;
    document.getElementById('hud-paused').textContent = isPaused ? 'Paused' : 'Playing';

    // Update __3D_STATE__
    window.__3D_STATE__ = {
        magnetStrength: parseFloat(magnetStrength.toFixed(1)),
        damping: parseFloat(damping.toFixed(2)),
        pendulumLength: parseFloat(pendulumLength.toFixed(1)),
        bobPosition: {
            x: parseFloat(bobX.toFixed(3)),
            y: parseFloat(bobY.toFixed(3)),
            z: parseFloat(bobZ.toFixed(3))
        },
        bobSpeed: parseFloat(speed.toFixed(4)),
        nearestMagnet: nearest + 1,
        fractalProgress: fractalProgress,
        isPaused: isPaused,
        trailVisible: trailVisible,
        frameCount: frameCount,
        simValid: simValid
    };

    // Render
    controls.update();
    renderer.render(scene, camera);
}

// Start fractal
restartFractal();

// Start animation
animate();
</script>
</body>
