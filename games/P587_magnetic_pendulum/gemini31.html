<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Magnetic Pendulum Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111122;
            color: white;
            font-family: monospace;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 13px;
            pointer-events: none;
            line-height: 1.5;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px;
            border-radius: 8px;
            z-index: 1000;
            font-size: 13px;
        }
        .control-group {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: inline-block;
            width: 140px;
        }
        input[type=range] {
            vertical-align: middle;
            width: 120px;
        }
        .value-display {
            display: inline-block;
            width: 30px;
            text-align: right;
            margin-left: 5px;
        }
        #fractal-canvas {
            position: absolute;
            bottom: 10px;
            right: 10px;
            width: 200px;
            height: 200px;
            border: 2px solid #444;
            border-radius: 4px;
            z-index: 1000;
            background-color: #000;
        }
        .instructions {
            margin-top: 10px;
            font-size: 11px;
            color: #aaa;
            border-top: 1px solid #444;
            padding-top: 8px;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="hud">
        <div>Magnet Strength: <span id="hud-magnet">1.0</span></div>
        <div>Damping: <span id="hud-damping">0.10</span></div>
        <div>Pendulum Length: <span id="hud-length">5.0</span></div>
        <div>Bob Speed: <span id="hud-speed">0.000</span></div>
        <div>Nearest Magnet: <span id="hud-nearest">None</span></div>
        <div>Fractal Progress: <span id="hud-fractal">0</span>%</div>
        <div>Status: <span id="hud-paused" style="color: #55ff55;">Playing</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-magnet-strength">Magnet Strength</label>
            <input type="range" id="slider-magnet-strength" min="0.1" max="5.0" step="0.1" value="1.0">
            <span class="value-display" id="val-magnet">1.0</span>
        </div>
        <div class="control-group">
            <label for="slider-damping">Damping</label>
            <input type="range" id="slider-damping" min="0.01" max="0.50" step="0.01" value="0.10">
            <span class="value-display" id="val-damping">0.10</span>
        </div>
        <div class="control-group">
            <label for="slider-pendulum-length">Pendulum Length</label>
            <input type="range" id="slider-pendulum-length" min="3.0" max="8.0" step="0.1" value="5.0">
            <span class="value-display" id="val-length">5.0</span>
        </div>
        <div class="instructions">
            [R] Reset Position<br>
            [C] Random Position<br>
            [Space] Pause/Play<br>
            [T] Toggle Trail
        </div>
    </div>

    <canvas id="fractal-canvas" width="200" height="200"></canvas>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State & Parameters ---
        let magnetStrength = 1.0;
        let damping = 0.1;
        let L = 5.0;
        const m = 0.1;
        const g = 9.81;
        
        let isPaused = false;
        let frameCount = 0;
        
        const pivot = new THREE.Vector3(0, 5, 0);
        let bobPos = new THREE.Vector3();
        let bobVel = new THREE.Vector3(0, 0, 0);

        const magnetPositions = [
            new THREE.Vector3(2, 0.05, 0),
            new THREE.Vector3(-1, 0.05, 1.732),
            new THREE.Vector3(-1, 0.05, -1.732)
        ];
        const magnetColors = [0xff3333, 0x33ff33, 0x3333ff];
        const magnetNames = ['Red(1)', 'Green(2)', 'Blue(3)'];
        
        // Pre-extracted for fast fractal computation
        const magX = [2, -1, -1];
        const magY = [0.05, 0.05, 0.05];
        const magZ = [0, 1.732, -1.732];
        const magRGB = [
            {r: 255, g: 51, b: 51},
            {r: 51, g: 255, b: 51},
            {r: 51, g: 51, b: 255}
        ];

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(0, 10, 0);
        pointLight.castShadow = true;
        pointLight.shadow.mapSize.width = 2048;
        pointLight.shadow.mapSize.height = 2048;
        scene.add(pointLight);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(4, 4, 0.1, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.8 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.05; // Top surface at y=0
        platform.receiveShadow = true;
        scene.add(platform);

        // Magnets
        for (let i = 0; i < 3; i++) {
            const magGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.3, 32);
            const magMat = new THREE.MeshStandardMaterial({
                color: magnetColors[i],
                emissive: magnetColors[i],
                emissiveIntensity: 0.6,
                roughness: 0.4
            });
            const magnet = new THREE.Mesh(magGeo, magMat);
            magnet.position.copy(magnetPositions[i]);
            magnet.castShadow = true;
            magnet.receiveShadow = true;
            scene.add(magnet);

            const haloGeo = new THREE.TorusGeometry(0.4, 0.03, 16, 64);
            const haloMat = new THREE.MeshBasicMaterial({ color: magnetColors[i] });
            const halo = new THREE.Mesh(haloGeo, haloMat);
            halo.position.copy(magnetPositions[i]);
            halo.position.y = 0.02;
            halo.rotation.x = Math.PI / 2;
            scene.add(halo);
        }

        // Pendulum
        const bobGeo = new THREE.SphereGeometry(0.2, 32, 32);
        const bobMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
        const bobMesh = new THREE.Mesh(bobGeo, bobMat);
        bobMesh.castShadow = true;
        scene.add(bobMesh);

        const armGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
        armGeo.translate(0, 0.5, 0); // Pivot at bottom of cylinder for easy scaling
        const armMat = new THREE.MeshBasicMaterial({ color: 0x888888 });
        const armMesh = new THREE.Mesh(armGeo, armMat);
        scene.add(armMesh);

        // Trail
        const maxTrail = 500;
        const trailPositions = new Float32Array(maxTrail * 3);
        const trailColors = new Float32Array(maxTrail * 3);
        const trailAlphas = new Float32Array(maxTrail);
        
        for(let i=0; i<maxTrail; i++) {
            trailAlphas[i] = 1.0 - (i / maxTrail) * 0.9; // Fades from 1.0 to 0.1
        }

        const trailGeo = new THREE.BufferGeometry();
        trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        trailGeo.setAttribute('color', new THREE.BufferAttribute(trailColors, 3));
        trailGeo.setAttribute('alpha', new THREE.BufferAttribute(trailAlphas, 1));

        const trailMat = new THREE.ShaderMaterial({
            vertexShader: `
                attribute float alpha;
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    vColor = color;
                    vAlpha = alpha;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                varying float vAlpha;
                void main() {
                    gl_FragColor = vec4(vColor, vAlpha);
                }
            `,
            transparent: true,
            depthWrite: false
        });

        const trailLine = new THREE.Line(trailGeo, trailMat);
        scene.add(trailLine);

        // Fractal Canvas & Texture
        const fractalCanvas = document.getElementById('fractal-canvas');
        const fractalCtx = fractalCanvas.getContext('2d', { willReadFrequently: true });
        const fractalImgData = fractalCtx.createImageData(200, 200);
        let fractalRow = 0;

        const fractalTexture = new THREE.CanvasTexture(fractalCanvas);
        fractalTexture.magFilter = THREE.NearestFilter;
        const fractalPlaneGeo = new THREE.PlaneGeometry(4, 4);
        const fractalPlaneMat = new THREE.MeshBasicMaterial({ 
            map: fractalTexture, 
            transparent: true, 
            opacity: 0.6,
            depthWrite: false
        });
        const fractalPlane = new THREE.Mesh(fractalPlaneGeo, fractalPlaneMat);
        fractalPlane.rotation.x = -Math.PI / 2;
        fractalPlane.position.y = 0.02;
        scene.add(fractalPlane);

        // --- Initialization ---
        function resetPendulum(x, z) {
            const y = 5 - Math.sqrt(Math.max(L * L - x * x - z * z, 0));
            bobPos.set(x, y, z);
            bobVel.set(0, 0, 0);
            
            // Clear trail
            for(let i=0; i<maxTrail*3; i++) {
                trailPositions[i] = bobPos.x;
                if(i%3===1) trailPositions[i] = bobPos.y;
                if(i%3===2) trailPositions[i] = bobPos.z;
            }
            trailGeo.attributes.position.needsUpdate = true;
        }

        resetPendulum(1.5, 0.5);

        // --- Physics Engine ---
        function computeDerivatives(pos, vel) {
            // Gravity restoring force (projected)
            const F = new THREE.Vector3(
                -(m * g / L) * pos.x,
                0,
                -(m * g / L) * pos.z
            );

            // Magnetic forces
            for (let i = 0; i < 3; i++) {
                const mPos = magnetPositions[i];
                const dist = Math.max(pos.distanceTo(mPos), 0.3);
                const dir = new THREE.Vector3().subVectors(mPos, pos);
                F.add(dir.multiplyScalar(magnetStrength / (dist * dist * dist)));
            }

            // Damping
            F.add(vel.clone().multiplyScalar(-damping));

            return { dp: vel.clone(), dv: F.divideScalar(m) };
        }

        function rk4Step(dt) {
            const k1 = computeDerivatives(bobPos, bobVel);
            
            const p2 = bobPos.clone().add(k1.dp.clone().multiplyScalar(dt / 2));
            const v2 = bobVel.clone().add(k1.dv.clone().multiplyScalar(dt / 2));
            const k2 = computeDerivatives(p2, v2);
            
            const p3 = bobPos.clone().add(k2.dp.clone().multiplyScalar(dt / 2));
            const v3 = bobVel.clone().add(k2.dv.clone().multiplyScalar(dt / 2));
            const k3 = computeDerivatives(p3, v3);
            
            const p4 = bobPos.clone().add(k3.dp.clone().multiplyScalar(dt));
            const v4 = bobVel.clone().add(k3.dv.clone().multiplyScalar(dt));
            const k4 = computeDerivatives(p4, v4);

            const dp = k1.dp.clone().add(k2.dp.clone().multiplyScalar(2)).add(k3.dp.clone().multiplyScalar(2)).add(k4.dp).multiplyScalar(dt / 6);
            const dv = k1.dv.clone().add(k2.dv.clone().multiplyScalar(2)).add(k3.dv.clone().multiplyScalar(2)).add(k4.dv).multiplyScalar(dt / 6);

            bobPos.add(dp);
            bobVel.add(dv);

            // Constrain to sphere
            const pivotToBob = new THREE.Vector3().subVectors(bobPos, pivot);
            pivotToBob.normalize().multiplyScalar(L);
            bobPos.copy(pivot).add(pivotToBob);

            // Project velocity to tangent plane
            const normal = pivotToBob.clone().normalize();
            bobVel.sub(normal.multiplyScalar(bobVel.dot(normal)));
        }

        function getNearestMagnetIndex(pos) {
            let minDist = Infinity;
            let idx = 0;
            for (let i = 0; i < 3; i++) {
                const d = pos.distanceToSquared(magnetPositions[i]);
                if (d < minDist) {
                    minDist = d;
                    idx = i;
                }
            }
            return idx;
        }

        // --- Fractal Computation ---
        function simulateFractalPixel(x0, z0) {
            let x = x0, z = z0;
            let vx = 0, vz = 0;
            const dt = 0.05;
            const m_inv = 1.0 / m;
            const g_L = g / L;
            const damp_m = damping * m_inv;

            for (let step = 0; step < 2000; step++) {
                let ax = -g_L * x;
                let az = -g_L * z;
                let y = 5.0 - Math.sqrt(Math.max(L * L - x * x - z * z, 0));

                for (let i = 0; i < 3; i++) {
                    const dx = magX[i] - x;
                    const dy = magY[i] - y;
                    const dz = magZ[i] - z;
                    const distSq = dx * dx + dy * dy + dz * dz;
                    const dist = Math.max(Math.sqrt(distSq), 0.3);
                    const force = magnetStrength / (dist * dist * dist);
                    ax += force * dx * m_inv;
                    az += force * dz * m_inv;
                }
                ax -= damp_m * vx;
                az -= damp_m * vz;

                vx += ax * dt;
                vz += az * dt;
                x += vx * dt;
                z += vz * dt;

                // Early exit if converged
                if (step % 20 === 0 && (vx * vx + vz * vz) < 0.0001) {
                    for (let i = 0; i < 3; i++) {
                        if ((x - magX[i]) ** 2 + (z - magZ[i]) ** 2 < 0.25) return i;
                    }
                }
            }
            
            // Timeout, find closest
            let closest = 0, minDist = Infinity;
            for (let i = 0; i < 3; i++) {
                const d = (x - magX[i]) ** 2 + (z - magZ[i]) ** 2;
                if (d < minDist) { minDist = d; closest = i; }
            }
            return closest;
        }

        function updateFractal() {
            if (fractalRow >= 200) return;
            
            const rowsPerFrame = 2;
            for (let r = 0; r < rowsPerFrame; r++) {
                if (fractalRow >= 200) break;
                const py = fractalRow;
                
                for (let px = 0; px < 200; px++) {
                    // Map pixel to [-3, 3]
                    const x0 = -3 + (px / 199) * 6;
                    const z0 = -3 + (py / 199) * 6; // py=0 maps to z=-3 (top of canvas)
                    
                    const magIdx = simulateFractalPixel(x0, z0);
                    const color = magRGB[magIdx];
                    
                    const idx = (py * 200 + px) * 4;
                    fractalImgData.data[idx] = color.r;
                    fractalImgData.data[idx + 1] = color.g;
                    fractalImgData.data[idx + 2] = color.b;
                    fractalImgData.data[idx + 3] = 255;
                }
                fractalRow++;
            }
            
            fractalCtx.putImageData(fractalImgData, 0, 0);
            fractalTexture.needsUpdate = true;
        }

        function restartFractal() {
            fractalRow = 0;
            fractalCtx.fillStyle = '#000';
            fractalCtx.fillRect(0, 0, 200, 200);
            fractalTexture.needsUpdate = true;
        }

        // --- UI & Controls ---
        document.getElementById('slider-magnet-strength').addEventListener('input', (e) => {
            magnetStrength = parseFloat(e.target.value);
            document.getElementById('val-magnet').innerText = magnetStrength.toFixed(1);
            restartFractal();
        });

        document.getElementById('slider-damping').addEventListener('input', (e) => {
            damping = parseFloat(e.target.value);
            document.getElementById('val-damping').innerText = damping.toFixed(2);
            restartFractal();
        });

        document.getElementById('slider-pendulum-length').addEventListener('input', (e) => {
            L = parseFloat(e.target.value);
            document.getElementById('val-length').innerText = L.toFixed(1);
            // Adjust bob position to new sphere
            const dir = new THREE.Vector3().subVectors(bobPos, pivot).normalize();
            bobPos.copy(pivot).add(dir.multiplyScalar(L));
            restartFractal();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyR') {
                resetPendulum(1.5, 0.5);
            } else if (e.code === 'KeyC') {
                resetPendulum(Math.random() * 4 - 2, Math.random() * 4 - 2);
            } else if (e.code === 'Space') {
                isPaused = !isPaused;
                document.getElementById('hud-paused').innerText = isPaused ? 'Paused' : 'Playing';
                document.getElementById('hud-paused').style.color = isPaused ? '#ff5555' : '#55ff55';
            } else if (e.code === 'KeyT') {
                trailLine.visible = !trailLine.visible;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isPaused) {
                // Physics substeps
                for (let i = 0; i < 5; i++) {
                    rk4Step(0.002);
                }

                // Update Trail
                for (let i = maxTrail - 1; i > 0; i--) {
                    trailPositions[i * 3] = trailPositions[(i - 1) * 3];
                    trailPositions[i * 3 + 1] = trailPositions[(i - 1) * 3 + 1];
                    trailPositions[i * 3 + 2] = trailPositions[(i - 1) * 3 + 2];
                    
                    trailColors[i * 3] = trailColors[(i - 1) * 3];
                    trailColors[i * 3 + 1] = trailColors[(i - 1) * 3 + 1];
                    trailColors[i * 3 + 2] = trailColors[(i - 1) * 3 + 2];
                }
                
                trailPositions[0] = bobPos.x;
                trailPositions[1] = bobPos.y;
                trailPositions[2] = bobPos.z;
                
                const nearestIdx = getNearestMagnetIndex(bobPos);
                const c = new THREE.Color(magnetColors[nearestIdx]);
                trailColors[0] = c.r;
                trailColors[1] = c.g;
                trailColors[2] = c.b;

                trailGeo.attributes.position.needsUpdate = true;
                trailGeo.attributes.color.needsUpdate = true;
            }

            // Update Meshes
            bobMesh.position.copy(bobPos);
            
            const dir = new THREE.Vector3().subVectors(bobPos, pivot);
            const length = dir.length();
            armMesh.position.copy(pivot);
            armMesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, -1, 0), dir.clone().normalize());
            armMesh.scale.set(1, length, 1);

            // Update Fractal
            updateFractal();

            // Update HUD
            document.getElementById('hud-magnet').innerText = magnetStrength.toFixed(1);
            document.getElementById('hud-damping').innerText = damping.toFixed(2);
            document.getElementById('hud-length').innerText = L.toFixed(1);
            document.getElementById('hud-speed').innerText = bobVel.length().toFixed(3);
            
            const nearest = getNearestMagnetIndex(bobPos);
            const nearestSpan = document.getElementById('hud-nearest');
            nearestSpan.innerText = magnetNames[nearest];
            nearestSpan.style.color = '#' + magnetColors[nearest].toString(16).padStart(6, '0');
            
            document.getElementById('hud-fractal').innerText = Math.floor((fractalRow / 200) * 100);

            // Update State Object
            window.__3D_STATE__ = {
                magnetStrength: parseFloat(magnetStrength.toFixed(1)),
                damping: parseFloat(damping.toFixed(2)),
                pendulumLength: parseFloat(L.toFixed(1)),
                bobPosition: {
                    x: parseFloat(bobPos.x.toFixed(3)),
                    y: parseFloat(bobPos.y.toFixed(3)),
                    z: parseFloat(bobPos.z.toFixed(3))
                },
                bobSpeed: parseFloat(bobVel.length().toFixed(4)),
                nearestMagnet: nearest + 1,
                fractalProgress: Math.floor((fractalRow / 200) * 100),
                isPaused: isPaused,
                trailVisible: trailLine.visible,
                frameCount: frameCount,
                simValid: !isNaN(bobPos.x) && !isNaN(bobVel.x)
            };

            controls.update();
            renderer.render(scene, camera);
            frameCount++;
        }

        // Start
        window.__3D_STATE__ = {};
        animate();

    </script>
</body>
</html>
