<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tower Crane with Pulley and Cable Physics</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #000; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #0f0;
    padding: 15px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.8;
    min-width: 260px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(0, 255, 0, 0.2);
}
#hud div { margin: 2px 0; }
#hud span { color: #0ff; font-weight: bold; }

#controls {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0, 0, 0, 0.8);
    padding: 15px 30px;
    display: flex;
    justify-content: center;
    gap: 40px;
    align-items: center;
    backdrop-filter: blur(5px);
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}
.control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}
.control-group label {
    color: #ccc;
    font-size: 12px;
}
.control-group .value {
    color: #0ff;
    font-size: 14px;
    font-weight: bold;
}
input[type="range"] {
    width: 200px;
    accent-color: #0ff;
}

#instructions {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(0, 0, 0, 0.7);
    color: #aaa;
    padding: 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    border: 1px solid rgba(255, 255, 255, 0.1);
}
#instructions kbd {
    background: rgba(255, 255, 255, 0.15);
    padding: 1px 5px;
    border-radius: 3px;
    color: #fff;
}
</style>
</head>
<body>

<div id="hud">
    <div>🏗️ <b>CRANE TELEMETRY</b></div>
    <hr style="border-color: rgba(0,255,0,0.2); margin: 5px 0;">
    <div id="hud-trolley">Trolley Position: <span>15.0</span></div>
    <div id="hud-cable">Cable Length: <span>10.0</span></div>
    <div id="hud-cargo-y">Cargo Y: <span>0.00</span></div>
    <div id="hud-swing">Swing Angle: <span>0.0°</span></div>
    <div id="hud-tension">Cable Tension: <span>0.0 N</span></div>
    <div id="hud-rotation">Crane Rotation: <span>0.0°</span></div>
</div>

<div id="instructions">
    <kbd>A</kbd> / <kbd>D</kbd> Rotate crane<br>
    <kbd>R</kbd> Reset rotation<br>
    Mouse: Orbit / Zoom
</div>

<div id="controls">
    <div class="control-group">
        <label>Trolley Position</label>
        <input type="range" id="slider-trolley" min="2" max="28" value="15" step="0.1">
        <div class="value" id="val-trolley">15.0</div>
    </div>
    <div class="control-group">
        <label>Cable Length</label>
        <input type="range" id="slider-cable" min="2" max="20" value="10" step="0.1">
        <div class="value" id="val-cable">10.0</div>
    </div>
    <div class="control-group">
        <label>Wind Strength</label>
        <input type="range" id="slider-wind" min="0" max="5" value="0" step="0.1">
        <div class="value" id="val-wind">0.0</div>
    </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();

// Gradient sky background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#87CEEB');
gradient.addColorStop(1, '#ffffff');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(30, 25, 30);
camera.lookAt(0, 12, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 12, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
sunLight.position.set(20, 40, 15);
sunLight.castShadow = true;
sunLight.shadow.mapSize.width = 2048;
sunLight.shadow.mapSize.height = 2048;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 100;
sunLight.shadow.camera.left = -40;
sunLight.shadow.camera.right = 40;
sunLight.shadow.camera.top = 40;
sunLight.shadow.camera.bottom = -40;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x444422, 0.4);
scene.add(hemiLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(100, 100);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid
const gridHelper = new THREE.GridHelper(100, 50, 0x555555, 0x444444);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ============ CRANE STRUCTURE ============
const cranePivot = new THREE.Group();
scene.add(cranePivot);

const yellowMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.4, metalness: 0.3 });
const grayMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.5, metalness: 0.5 });
const darkGrayMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.6, metalness: 0.4 });
const cabinMat = new THREE.MeshStandardMaterial({ color: 0x2266aa, roughness: 0.3, metalness: 0.2 });

// Base
const baseGeom = new THREE.BoxGeometry(3, 0.5, 3);
const base = new THREE.Mesh(baseGeom, grayMat);
base.position.y = 0.25;
base.castShadow = true;
base.receiveShadow = true;
cranePivot.add(base);

// Mast
const mastGeom = new THREE.BoxGeometry(0.8, 25, 0.8);
const mast = new THREE.Mesh(mastGeom, yellowMat);
mast.position.y = 12.5 + 0.5;
mast.castShadow = true;
mast.receiveShadow = true;
cranePivot.add(mast);

// Mast lattice details
for (let i = 0; i < 12; i++) {
    const crossGeom = new THREE.BoxGeometry(0.1, 0.1, 1.2);
    const cross = new THREE.Mesh(crossGeom, yellowMat);
    cross.position.set(0, 2 + i * 2, 0);
    cross.rotation.y = (i % 2) * Math.PI / 4;
    cross.castShadow = true;
    cranePivot.add(cross);
}

// Jib (boom)
const jibGeom = new THREE.BoxGeometry(30, 0.6, 0.6);
const jib = new THREE.Mesh(jibGeom, yellowMat);
jib.position.set(15, 24, 0);
jib.castShadow = true;
jib.receiveShadow = true;
cranePivot.add(jib);

// Counter-jib
const counterJibGeom = new THREE.BoxGeometry(10, 0.5, 0.5);
const counterJib = new THREE.Mesh(counterJibGeom, yellowMat);
counterJib.position.set(-5, 24, 0);
counterJib.castShadow = true;
cranePivot.add(counterJib);

// Counterweight
const cwGeom = new THREE.BoxGeometry(2.5, 2, 1.5);
const counterweight = new THREE.Mesh(cwGeom, darkGrayMat);
counterweight.position.set(-9.5, 23, 0);
counterweight.castShadow = true;
cranePivot.add(counterweight);

// Top tower / peak
const peakGeom = new THREE.BoxGeometry(0.3, 3, 0.3);
const peak = new THREE.Mesh(peakGeom, yellowMat);
peak.position.set(0, 26, 0);
peak.castShadow = true;
cranePivot.add(peak);

// Support cables (static)
const supportCableMat = new THREE.LineBasicMaterial({ color: 0x333333 });

// Front support cable
const frontCableGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 27.5, 0),
    new THREE.Vector3(25, 24, 0)
]);
cranePivot.add(new THREE.Line(frontCableGeom, supportCableMat));

// Rear support cable
const rearCableGeom = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 27.5, 0),
    new THREE.Vector3(-10, 24, 0)
]);
cranePivot.add(new THREE.Line(rearCableGeom, supportCableMat));

// Operator cabin
const cabinGeom = new THREE.BoxGeometry(1.8, 2, 1.8);
const cabin = new THREE.Mesh(cabinGeom, cabinMat);
cabin.position.set(1.2, 22.5, 0);
cabin.castShadow = true;
cranePivot.add(cabin);

// Cabin window
const windowGeom = new THREE.BoxGeometry(0.1, 0.8, 1.2);
const windowMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.8, transparent: true, opacity: 0.7 });
const cabinWindow = new THREE.Mesh(windowGeom, windowMat);
cabinWindow.position.set(2.1, 22.5, 0);
cranePivot.add(cabinWindow);

// Trolley
const trolleyGeom = new THREE.BoxGeometry(1.0, 0.4, 0.8);
const trolley = new THREE.Mesh(trolleyGeom, grayMat);
trolley.position.set(15, 23.6, 0);
trolley.castShadow = true;
cranePivot.add(trolley);

// Trolley wheels
for (let dx of [-0.35, 0.35]) {
    for (let dz of [-0.35, 0.35]) {
        const wheelGeom = new THREE.CylinderGeometry(0.12, 0.12, 0.1, 8);
        const wheel = new THREE.Mesh(wheelGeom, darkGrayMat);
        wheel.rotation.x = Math.PI / 2;
        wheel.position.set(dx, 0.2, dz);
        trolley.add(wheel);
    }
}

// ============ CARGO (fallback box if GLB fails) ============
let cargoGroup = new THREE.Group();
cranePivot.add(cargoGroup);

// Create fallback cargo
function createFallbackCargo() {
    const group = new THREE.Group();
    
    // Main body
    const bodyGeom = new THREE.BoxGeometry(1.5, 1.8, 1.2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc4444, roughness: 0.4, metalness: 0.3 });
    const body = new THREE.Mesh(bodyGeom, bodyMat);
    body.position.y = -0.9;
    body.castShadow = true;
    group.add(body);
    
    // Head
    const headGeom = new THREE.BoxGeometry(0.8, 0.6, 0.8);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.3, metalness: 0.5 });
    const head = new THREE.Mesh(headGeom, headMat);
    head.position.y = 0;
    head.castShadow = true;
    group.add(head);
    
    // Eyes
    for (let dx of [-0.2, 0.2]) {
        const eyeGeom = new THREE.SphereGeometry(0.08, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaaa });
        const eye = new THREE.Mesh(eyeGeom, eyeMat);
        eye.position.set(dx, 0.05, 0.4);
        group.add(eye);
    }
    
    // Arms
    for (let dx of [-1, 1]) {
        const armGeom = new THREE.BoxGeometry(0.3, 1.2, 0.3);
        const arm = new THREE.Mesh(armGeom, bodyMat);
        arm.position.set(dx * 0.9, -0.9, 0);
        arm.castShadow = true;
        group.add(arm);
    }
    
    // Hook attachment point
    const hookGeom = new THREE.TorusGeometry(0.15, 0.04, 8, 12);
    const hookMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 });
    const hook = new THREE.Mesh(hookGeom, hookMat);
    hook.position.y = 0.4;
    group.add(hook);
    
    return group;
}

// Try loading GLB, fallback to box cargo
const loader = new GLTFLoader();
let cargoLoaded = false;

try {
    loader.load(
        'https://threejs.org/examples/models/gltf/RobotExpressive/RobotExpressive.glb',
        (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            // Clear fallback
            while (cargoGroup.children.length > 0) {
                cargoGroup.remove(cargoGroup.children[0]);
            }
            cargoGroup.add(model);
            cargoLoaded = true;
        },
        undefined,
        (error) => {
            console.log('GLB load failed, using fallback cargo');
            if (!cargoLoaded) {
                cargoGroup.add(createFallbackCargo());
            }
        }
    );
} catch (e) {
    console.log('GLB loader error, using fallback');
}

// Add fallback immediately (will be replaced if GLB loads)
cargoGroup.add(createFallbackCargo());

// ============ CABLE PHYSICS (Verlet Integration) ============
const N = 20;
const cargoMass = 500; // kg
const gravity = 9.81;
const constraintIterations = 5;
const damping = 0.998;

let particles = [];
let oldParticles = [];

function initCable(trolleyWorldPos, cableLen) {
    particles = [];
    oldParticles = [];
    const segLen = cableLen / N;
    for (let i = 0; i <= N; i++) {
        const pos = new THREE.Vector3(
            trolleyWorldPos.x,
            trolleyWorldPos.y - i * segLen,
            trolleyWorldPos.z
        );
        particles.push(pos.clone());
        oldParticles.push(pos.clone());
    }
}

// Cable visual
const cableLineMat = new THREE.LineBasicMaterial({ color: 0x222222, linewidth: 2 });
const cablePoints = [];
for (let i = 0; i <= N; i++) {
    cablePoints.push(new THREE.Vector3(0, 24 - i * 0.5, 0));
}
const cableGeometry = new THREE.BufferGeometry().setFromPoints(cablePoints);
const cableLine = new THREE.Line(cableGeometry, cableLineMat);
scene.add(cableLine); // Add to scene, not cranePivot, since particles are in world space

// Initialize cable
const initTrolleyPos = new THREE.Vector3(15, 23.4, 0);
initCable(initTrolleyPos, 10);

// ============ STATE ============
let frameCount = 0;
let simTime = 0;
let craneRotation = 0;
let trolleyX = 15;
let cableLength = 10;
let windStrength = 0;
let isPaused = false;

const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

// Sliders
const sliderTrolley = document.getElementById('slider-trolley');
const sliderCable = document.getElementById('slider-cable');
const sliderWind = document.getElementById('slider-wind');

sliderTrolley.addEventListener('input', () => {
    trolleyX = parseFloat(sliderTrolley.value);
    document.getElementById('val-trolley').textContent = trolleyX.toFixed(1);
});
sliderCable.addEventListener('input', () => {
    cableLength = parseFloat(sliderCable.value);
    document.getElementById('val-cable').textContent = cableLength.toFixed(1);
});
sliderWind.addEventListener('input', () => {
    windStrength = parseFloat(sliderWind.value);
    document.getElementById('val-wind').textContent = windStrength.toFixed(1);
});

// ============ STATE OBJECT ============
window.__3D_STATE__ = {
    frameCount: 0,
    trolleyX: 15,
    cableLength: 10,
    cargoPos: { x: 0, y: 0, z: 0 },
    cargoSwingAngle: 0,
    cableTension: 0,
    craneRotation: 0,
    windStrength: 0,
    particleCount: N + 1,
    isPaused: false,
    simTime: 0
};

// ============ PHYSICS UPDATE ============
const dt = 1 / 60;
const tempVec = new THREE.Vector3();

function getTrolleyWorldPos() {
    // Trolley position in crane local space, then rotated
    const localPos = new THREE.Vector3(trolleyX, 23.4, 0);
    localPos.applyAxisAngle(new THREE.Vector3(0, 1, 0), craneRotation);
    return localPos;
}

function updatePhysics(deltaTime) {
    const trolleyWorldPos = getTrolleyWorldPos();
    const segmentLength = cableLength / N;
    
    // Wind force
    const wind = new THREE.Vector3(
        windStrength * Math.sin(simTime * 0.5),
        0,
        windStrength * Math.cos(simTime * 0.7)
    );
    
    // Verlet integration
    for (let i = 0; i <= N; i++) {
        if (i === 0) continue; // pinned to trolley
        
        const current = particles[i];
        const old = oldParticles[i];
        
        const vx = (current.x - old.x) * damping;
        const vy = (current.y - old.y) * damping;
        const vz = (current.z - old.z) * damping;
        
        old.copy(current);
        
        // Acceleration: gravity + wind
        const ax = wind.x;
        const ay = -gravity;
        const az = wind.z;
        
        current.x += vx + ax * deltaTime * deltaTime;
        current.y += vy + ay * deltaTime * deltaTime;
        current.z += vz + az * deltaTime * deltaTime;
    }
    
    // Pin top particle to trolley
    particles[0].copy(trolleyWorldPos);
    oldParticles[0].copy(trolleyWorldPos);
    
    // Distance constraints
    for (let iter = 0; iter < constraintIterations; iter++) {
        // Pin top again
        particles[0].copy(trolleyWorldPos);
        
        for (let i = 0; i < N; i++) {
            const p1 = particles[i];
            const p2 = particles[i + 1];
            
            const dx = p2.x - p1.x;
            const dy = p2.y - p1.y;
            const dz = p2.z - p1.z;
            const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
            
            if (dist < 0.001) continue;
            
            const diff = (dist - segmentLength) / dist;
            
            if (i === 0) {
                // Top is pinned, only move p2
                p2.x -= dx * diff;
                p2.y -= dy * diff;
                p2.z -= dz * diff;
            } else {
                const halfDiff = diff * 0.5;
                p1.x += dx * halfDiff;
                p1.y += dy * halfDiff;
                p1.z += dz * halfDiff;
                p2.x -= dx * halfDiff;
                p2.y -= dy * halfDiff;
                p2.z -= dz * halfDiff;
            }
        }
        
        // Ground collision
        for (let i = 1; i <= N; i++) {
            if (particles[i].y < 0.5) {
                particles[i].y = 0.5;
            }
        }
    }
}

function calculateTension() {
    // Tension at top segment
    const p0 = particles[0];
    const p1 = particles[1];
    const dx = p0.x - p1.x;
    const dy = p0.y - p1.y;
    const dz = p0.z - p1.z;
    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    const segmentLength = cableLength / N;
    
    // Tension approximation: based on stretch and cargo weight
    const stretch = Math.max(0, dist - segmentLength);
    const stiffness = 5000;
    const weightComponent = cargoMass * gravity;
    
    // Simple tension: weight distributed + any stretch force
    const tension = weightComponent + stretch * stiffness;
    return tension;
}

function calculateSwingAngle() {
    const trolleyWorldPos = getTrolleyWorldPos();
    const cargoPos = particles[N];
    
    const dx = cargoPos.x - trolleyWorldPos.x;
    const dy = cargoPos.y - trolleyWorldPos.y;
    const dz = cargoPos.z - trolleyWorldPos.z;
    
    const horizontalDist = Math.sqrt(dx * dx + dz * dz);
    const verticalDist = Math.abs(dy);
    
    return Math.atan2(horizontalDist, verticalDist);
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const delta = Math.min(clock.getDelta(), 0.05);
    
    if (!isPaused) {
        simTime += delta;
        frameCount++;
        
        // Crane rotation
        if (keys['a']) {
            craneRotation += 0.5 * delta;
        }
        if (keys['d']) {
            craneRotation -= 0.5 * delta;
        }
        if (keys['r']) {
            craneRotation = 0;
        }
        
        // Update crane pivot rotation
        cranePivot.rotation.y = craneRotation;
        
        // Update trolley position
        trolley.position.x = trolleyX;
        
        // Physics
        updatePhysics(delta);
        
        // Update cable visual (world space)
        const positions = cableGeometry.attributes.position;
        for (let i = 0; i <= N; i++) {
            positions.setXYZ(i, particles[i].x, particles[i].y, particles[i].z);
        }
        positions.needsUpdate = true;
        
        // Update cargo position (world space -> crane local space for cargoGroup)
        const cargoWorldPos = particles[N];
        // Convert world pos to cranePivot local space
        const invMatrix = new THREE.Matrix4().copy(cranePivot.matrixWorld).invert();
        const localCargoPos = cargoWorldPos.clone().applyMatrix4(invMatrix);
        cargoGroup.position.copy(localCargoPos);
        cargoGroup.position.y -= 0.5; // offset for cargo center
        
        // Calculate metrics
        const swingAngle = calculateSwingAngle();
        const tension = calculateTension();
        const swingDeg = (swingAngle * 180 / Math.PI);
        const rotDeg = (craneRotation * 180 / Math.PI);
        
        // Update HUD
        document.getElementById('hud-trolley').innerHTML = `Trolley Position: <span>${trolleyX.toFixed(1)}</span>`;
        document.getElementById('hud-cable').innerHTML = `Cable Length: <span>${cableLength.toFixed(1)}</span>`;
        document.getElementById('hud-cargo-y').innerHTML = `Cargo Y: <span>${cargoWorldPos.y.toFixed(2)}</span>`;
        document.getElementById('hud-swing').innerHTML = `Swing Angle: <span>${swingDeg.toFixed(1)}°</span>`;
        document.getElementById('hud-tension').innerHTML = `Cable Tension: <span>${tension.toFixed(1)} N</span>`;
        document.getElementById('hud-rotation').innerHTML = `Crane Rotation: <span>${rotDeg.toFixed(1)}°</span>`;
        
        // Update state
        window.__3D_STATE__ = {
            frameCount,
            trolleyX,
            cableLength,
            cargoPos: { x: cargoWorldPos.x, y: cargoWorldPos.y, z: cargoWorldPos.z },
            cargoSwingAngle: swingAngle,
            cableTension: tension,
            craneRotation,
            windStrength,
            particleCount: N + 1,
            isPaused,
            simTime
        };
    }
    
    controls.update();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
