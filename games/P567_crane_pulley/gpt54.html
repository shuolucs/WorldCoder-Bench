<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Tower Crane with Verlet Cable Physics</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #87CEEB;
    }

    body {
      background: linear-gradient(to bottom, #87CEEB 0%, #ffffff 100%);
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      border-radius: 8px;
      min-width: 220px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.55;
    }

    #controls {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: min(900px, calc(100vw - 24px));
      background: rgba(20, 20, 20, 0.55);
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      z-index: 10;
      box-sizing: border-box;
      backdrop-filter: blur(4px);
    }

    .control-row {
      display: grid;
      grid-template-columns: 180px 1fr 70px;
      gap: 10px;
      align-items: center;
      margin: 8px 0;
    }

    .control-row label {
      font-size: 14px;
    }

    .control-row input[type="range"] {
      width: 100%;
    }

    .value {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      margin-top: 8px;
      opacity: 0.9;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>

  <div id="hud">
    <div><strong>Tower Crane HUD</strong></div>
    <div id="hud-trolley">Trolley position: 0.0</div>
    <div id="hud-cable">Cable length: 0.0</div>
    <div id="hud-cargo-y">Cargo Y: 0.00</div>
    <div id="hud-swing">Swing angle: 0.0°</div>
    <div id="hud-tension">Cable tension: 0.0 N</div>
    <div id="hud-rotation">Crane rotation: 0.0°</div>
  </div>

  <div id="controls">
    <div class="control-row">
      <label for="slider-trolley">Trolley Position</label>
      <input id="slider-trolley" type="range" min="2" max="28" step="0.1" value="15" />
      <div class="value" id="value-trolley">15.0</div>
    </div>
    <div class="control-row">
      <label for="slider-cable">Cable Length</label>
      <input id="slider-cable" type="range" min="2" max="20" step="0.1" value="10" />
      <div class="value" id="value-cable">10.0</div>
    </div>
    <div class="control-row">
      <label for="slider-wind">Wind Strength</label>
      <input id="slider-wind" type="range" min="0" max="5" step="0.1" value="0" />
      <div class="value" id="value-wind">0.0</div>
    </div>
    <div class="hint">
      Keyboard: <strong>A</strong>/<strong>D</strong> rotate crane, <strong>R</strong> reset rotation
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ------------------------------------------------------------
    // Basic Setup
    // ------------------------------------------------------------
    const canvas = document.getElementById('app');
    const scene = new THREE.Scene();

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(30, 25, 30);
    camera.lookAt(0, 10, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(8, 10, 0);

    // ------------------------------------------------------------
    // Lights
    // ------------------------------------------------------------
    const ambient = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 1.1);
    sun.position.set(25, 40, 15);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -60;
    sun.shadow.camera.right = 60;
    sun.shadow.camera.top = 60;
    sun.shadow.camera.bottom = -60;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 150;
    scene.add(sun);

    // ------------------------------------------------------------
    // Ground
    // ------------------------------------------------------------
    const groundMat = new THREE.MeshStandardMaterial({ color: 0xd9d9d9, roughness: 0.95, metalness: 0.0 });
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 100, 0x666666, 0xaaaaaa);
    grid.position.y = 0.01;
    scene.add(grid);

    // ------------------------------------------------------------
    // Crane Structure
    // ------------------------------------------------------------
    const craneRoot = new THREE.Group();
    scene.add(craneRoot);

    const craneYellow = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.6, metalness: 0.2 });
    const grayMat = new THREE.MeshStandardMaterial({ color: 0x777777, roughness: 0.8, metalness: 0.2 });
    const darkGrayMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.9, metalness: 0.1 });
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222244, roughness: 0.4, metalness: 0.1 });

    const mast = new THREE.Mesh(new THREE.BoxGeometry(0.8, 25, 0.8), craneYellow);
    mast.position.set(0, 12.5, 0);
    mast.castShadow = true;
    mast.receiveShadow = true;
    craneRoot.add(mast);

    const jib = new THREE.Mesh(new THREE.BoxGeometry(30, 0.6, 0.6), craneYellow);
    jib.position.set(15, 24, 0);
    jib.castShadow = true;
    jib.receiveShadow = true;
    craneRoot.add(jib);

    const counterJib = new THREE.Mesh(new THREE.BoxGeometry(10, 0.5, 0.5), craneYellow);
    counterJib.position.set(-5, 24, 0);
    counterJib.castShadow = true;
    counterJib.receiveShadow = true;
    craneRoot.add(counterJib);

    const counterWeight = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), darkGrayMat);
    counterWeight.position.set(-10, 23.3, 0);
    counterWeight.castShadow = true;
    counterWeight.receiveShadow = true;
    craneRoot.add(counterWeight);

    const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.6, 1.2, 1.2), cabinMat);
    cabin.position.set(0.8, 23.3, 1.0);
    cabin.castShadow = true;
    cabin.receiveShadow = true;
    craneRoot.add(cabin);

    const trolley = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.4, 0.8), grayMat);
    trolley.castShadow = true;
    trolley.receiveShadow = true;
    craneRoot.add(trolley);

    const pulley = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.18, 0.5, 20), darkGrayMat);
    pulley.rotation.z = Math.PI / 2;
    pulley.castShadow = true;
    trolley.add(pulley);

    // ------------------------------------------------------------
    // Cable Physics: Verlet Chain
    // ------------------------------------------------------------
    const N = 20;
    const particleCount = N + 1;
    const gravity = new THREE.Vector3(0, -9.81, 0);
    const cargoMass = 80; // arbitrary mass in kg
    let targetCableLength = parseFloat(document.getElementById('slider-cable').value);
    let segmentLength = targetCableLength / N;

    const particles = [];
    for (let i = 0; i < particleCount; i++) {
      const p = new THREE.Vector3(15, 24 - i * segmentLength, 0);
      particles.push({
        pos: p.clone(),
        oldPos: p.clone(),
        acc: new THREE.Vector3(),
        pinned: i === 0
      });
    }

    const cableGeometry = new THREE.BufferGeometry();
    const cablePositions = new Float32Array(particleCount * 3);
    cableGeometry.setAttribute('position', new THREE.BufferAttribute(cablePositions, 3));
    const cableMaterial = new THREE.LineBasicMaterial({ color: 0x222222 });
    const cableLine = new THREE.Line(cableGeometry, cableMaterial);
    craneRoot.add(cableLine);

    // ------------------------------------------------------------
    // Cargo
    // ------------------------------------------------------------
    const cargoAnchor = new THREE.Group();
    cargoAnchor.castShadow = true;
    craneRoot.add(cargoAnchor);

    let cargoObject = null;
    let cargoLoaded = false;

    function createFallbackCargo() {
      const g = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.8, 0.9),
        new THREE.MeshStandardMaterial({ color: 0x3fa9f5, roughness: 0.6, metalness: 0.2 })
      );
      body.position.y = 0.9;
      body.castShadow = true;
      body.receiveShadow = true;
      g.add(body);

      const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.7, 0.7, 0.7),
        new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.8 })
      );
      head.position.y = 2.0;
      head.castShadow = true;
      head.receiveShadow = true;
      g.add(head);

      return g;
    }

    const loader = new GLTFLoader();
    loader.load(
      'robot.glb',
      (gltf) => {
        cargoObject = gltf.scene;
        const box = new THREE.Box3().setFromObject(cargoObject);
        const size = new THREE.Vector3();
        box.getSize(size);
        const scale = 2 / Math.max(size.y || 1, 0.001);
        cargoObject.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(cargoObject);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        cargoObject.position.sub(center);
        cargoObject.position.y += 1.0;

        cargoObject.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        cargoAnchor.add(cargoObject);
        cargoLoaded = true;
      },
      undefined,
      () => {
        cargoObject = createFallbackCargo();
        cargoAnchor.add(cargoObject);
        cargoLoaded = true;
      }
    );

    // ------------------------------------------------------------
    // UI
    // ------------------------------------------------------------
    const sliderTrolley = document.getElementById('slider-trolley');
    const sliderCable = document.getElementById('slider-cable');
    const sliderWind = document.getElementById('slider-wind');

    const valueTrolley = document.getElementById('value-trolley');
    const valueCable = document.getElementById('value-cable');
    const valueWind = document.getElementById('value-wind');

    const hudTrolley = document.getElementById('hud-trolley');
    const hudCable = document.getElementById('hud-cable');
    const hudCargoY = document.getElementById('hud-cargo-y');
    const hudSwing = document.getElementById('hud-swing');
    const hudTension = document.getElementById('hud-tension');
    const hudRotation = document.getElementById('hud-rotation');

    function updateSliderLabels() {
      valueTrolley.textContent = parseFloat(sliderTrolley.value).toFixed(1);
      valueCable.textContent = parseFloat(sliderCable.value).toFixed(1);
      valueWind.textContent = parseFloat(sliderWind.value).toFixed(1);
    }
    updateSliderLabels();

    sliderTrolley.addEventListener('input', updateSliderLabels);
    sliderCable.addEventListener('input', updateSliderLabels);
    sliderWind.addEventListener('input', updateSliderLabels);

    // ------------------------------------------------------------
    // Keyboard Controls
    // ------------------------------------------------------------
    const keys = {
      a: false,
      d: false
    };

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'a') keys.a = true;
      if (k === 'd') keys.d = true;
      if (k === 'r') craneRoot.rotation.y = 0;
    });

    window.addEventListener('keyup', (e) => {
      const k = e.key.toLowerCase();
      if (k === 'a') keys.a = false;
      if (k === 'd') keys.d = false;
    });

    // ------------------------------------------------------------
    // Helpers
    // ------------------------------------------------------------
    const tmpVecA = new THREE.Vector3();
    const tmpVecB = new THREE.Vector3();
    const tmpVecC = new THREE.Vector3();
    const worldTopPos = new THREE.Vector3();
    const cargoWorldPos = new THREE.Vector3();
    const trolleyLocalPos = new THREE.Vector3();

    function getPinnedLocalPosition() {
      const x = parseFloat(sliderTrolley.value);
      trolley.position.set(x, 24, 0);
      pulley.position.set(0, -0.35, 0);
      trolleyLocalPos.set(x, 23.65, 0);
      return trolleyLocalPos;
    }

    function initializeChainIfNeeded() {
      const top = getPinnedLocalPosition().clone();
      targetCableLength = parseFloat(sliderCable.value);
      segmentLength = targetCableLength / N;
      for (let i = 0; i < particleCount; i++) {
        particles[i].pos.copy(top).add(new THREE.Vector3(0, -i * segmentLength, 0));
        particles[i].oldPos.copy(particles[i].pos);
      }
    }

    initializeChainIfNeeded();

    // ------------------------------------------------------------
    // State
    // ------------------------------------------------------------
    let frameCount = 0;
    let simTime = 0;
    let isPaused = false;
    let previousCraneRotation = craneRoot.rotation.y;

    window.__3D_STATE__ = {
      frameCount: 0,
      trolleyX: parseFloat(sliderTrolley.value),
      cableLength: parseFloat(sliderCable.value),
      cargoPos: { x: 0, y: 0, z: 0 },
      cargoSwingAngle: 0,
      cableTension: 0,
      craneRotation: 0,
      windStrength: parseFloat(sliderWind.value),
      particleCount,
      isPaused,
      simTime: 0
    };

    // ------------------------------------------------------------
    // Physics
    // ------------------------------------------------------------
    function solveConstraints() {
      for (let iter = 0; iter < 5; iter++) {
        const pinned = getPinnedLocalPosition();
        particles[0].pos.copy(pinned);

        for (let i = 0; i < N; i++) {
          const p1 = particles[i];
          const p2 = particles[i + 1];

          tmpVecA.subVectors(p2.pos, p1.pos);
          const dist = Math.max(tmpVecA.length(), 1e-6);
          const diff = (dist - segmentLength) / dist;

          if (i === 0) {
            // top pinned
            p2.pos.addScaledVector(tmpVecA, -diff);
          } else if (i + 1 === N) {
            // bottom cargo particle acts like mass-heavy endpoint, but still movable
            p1.pos.addScaledVector(tmpVecA, 0.5 * diff);
            p2.pos.addScaledVector(tmpVecA, -0.5 * diff);
          } else {
            p1.pos.addScaledVector(tmpVecA, 0.5 * diff);
            p2.pos.addScaledVector(tmpVecA, -0.5 * diff);
          }
        }

        particles[0].pos.copy(pinned);
      }
    }

    function simulate(dt, elapsed) {
      const windStrength = parseFloat(sliderWind.value);
      const newCableLength = parseFloat(sliderCable.value);
      const prevRotation = previousCraneRotation;
      const currentRotation = craneRoot.rotation.y;
      const angularVel = (currentRotation - prevRotation) / Math.max(dt, 1e-6);

      targetCableLength = newCableLength;
      segmentLength = targetCableLength / N;

      const pinned = getPinnedLocalPosition();
      particles[0].pos.copy(pinned);

      const windForce = new THREE.Vector3(
        windStrength * Math.sin(elapsed * 0.5),
        0,
        windStrength * Math.cos(elapsed * 0.7)
      );

      for (let i = 1; i < particleCount; i++) {
        const p = particles[i];

        p.acc.copy(gravity);
        p.acc.addScaledVector(windForce, 0.6);

        const radial = tmpVecB.copy(p.pos);
        radial.y = 0;
        const r = radial.length();
        if (r > 1e-6) {
          radial.normalize();
          const centrifugalMag = angularVel * angularVel * r;
          p.acc.addScaledVector(radial, centrifugalMag);
        }

        const current = p.pos.clone();
        const velocity = tmpVecC.subVectors(p.pos, p.oldPos).multiplyScalar(0.995);
        p.pos.add(velocity).addScaledVector(p.acc, dt * dt);
        p.oldPos.copy(current);
      }

      solveConstraints();

      // bottom particle = cargo attachment
      cargoAnchor.position.copy(particles[N]);

      // orient cargo to hang with cable
      if (cargoLoaded) {
        const lastSeg = tmpVecA.subVectors(particles[N].pos, particles[N - 1].pos).normalize();
        const up = new THREE.Vector3(0, 1, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(up, lastSeg);
        cargoAnchor.quaternion.slerp(quat, 0.15);
      }

      // update cable line
      const posAttr = cableGeometry.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        posAttr[i * 3 + 0] = particles[i].pos.x;
        posAttr[i * 3 + 1] = particles[i].pos.y;
        posAttr[i * 3 + 2] = particles[i].pos.z;
      }
      cableGeometry.attributes.position.needsUpdate = true;

      previousCraneRotation = currentRotation;
    }

    // ------------------------------------------------------------
    // Animation
    // ------------------------------------------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 1 / 30);
      simTime += dt;
      frameCount++;

      // crane rotation control
      const rotSpeed = 0.5;
      if (keys.a) craneRoot.rotation.y += rotSpeed * dt;
      if (keys.d) craneRoot.rotation.y -= rotSpeed * dt;

      simulate(dt, simTime);

      // world measurements
      craneRoot.localToWorld(worldTopPos.copy(particles[0].pos));
      craneRoot.localToWorld(cargoWorldPos.copy(particles[N].pos));

      const cableVec = tmpVecA.subVectors(particles[N].pos, particles[0].pos);
      const cableDir = cableVec.clone().normalize();
      const verticalDown = new THREE.Vector3(0, -1, 0);
      const swingAngle = Math.acos(THREE.MathUtils.clamp(cableDir.dot(verticalDown), -1, 1));

      const bottomVel = tmpVecB.subVectors(particles[N].pos, particles[N].oldPos).multiplyScalar(1 / Math.max(dt, 1e-6));
      const horizSpeedSq = bottomVel.x * bottomVel.x + bottomVel.z * bottomVel.z;
      const tension = cargoMass * 9.81 + cargoMass * (horizSpeedSq / Math.max(targetCableLength, 0.1));

      // HUD
      hudTrolley.textContent = `Trolley position: ${parseFloat(sliderTrolley.value).toFixed(1)}`;
      hudCable.textContent = `Cable length: ${parseFloat(sliderCable.value).toFixed(1)}`;
      hudCargoY.textContent = `Cargo Y: ${cargoWorldPos.y.toFixed(2)}`;
      hudSwing.textContent = `Swing angle: ${THREE.MathUtils.radToDeg(swingAngle).toFixed(1)}°`;
      hudTension.textContent = `Cable tension: ${tension.toFixed(1)} N`;
      hudRotation.textContent = `Crane rotation: ${THREE.MathUtils.radToDeg(craneRoot.rotation.y).toFixed(1)}°`;

      // state
      window.__3D_STATE__ = {
        frameCount,
        trolleyX: parseFloat(sliderTrolley.value),
        cableLength: parseFloat(sliderCable.value),
        cargoPos: {
          x: cargoWorldPos.x,
          y: cargoWorldPos.y,
          z: cargoWorldPos.z
        },
        cargoSwingAngle: swingAngle,
        cableTension: tension,
        craneRotation: craneRoot.rotation.y,
        windStrength: parseFloat(sliderWind.value),
        particleCount,
        isPaused,
        simTime
      };

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
