<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Tower Crane Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Gradient sky background */
            background: linear-gradient(to bottom, #87CEEB 0%, #ffffff 100%);
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            z-index: 10;
            pointer-events: none;
            min-width: 200px;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 10;
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .control-group label {
            margin-bottom: 5px;
            font-size: 12px;
        }
        input[type=range] {
            width: 150px;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            font-size: 12px;
        }
    </style>
    <!-- Three.js Import Map -->
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud">
        <div class="hud-line">Trolley Pos: <span id="hud-trolley">15.0</span> m</div>
        <div class="hud-line">Cable Len: <span id="hud-cable">10.0</span> m</div>
        <div class="hud-line">Cargo Y: <span id="hud-cargo-y">0.00</span> m</div>
        <div class="hud-line">Swing Angle: <span id="hud-swing">0.0</span>°</div>
        <div class="hud-line">Tension: <span id="hud-tension">0.0</span> N</div>
        <div class="hud-line">Rotation: <span id="hud-rotation">0.0</span>°</div>
    </div>

    <div id="instructions">
        <b>Controls:</b><br>
        [A] Rotate Left<br>
        [D] Rotate Right<br>
        [R] Reset Rotation<br>
        Mouse: Orbit Camera
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-trolley">Trolley X: <span id="val-trolley">15.0</span></label>
            <input type="range" id="slider-trolley" min="2" max="28" step="0.1" value="15">
        </div>
        <div class="control-group">
            <label for="slider-cable">Cable Length: <span id="val-cable">10.0</span></label>
            <input type="range" id="slider-cable" min="2" max="20" step="0.1" value="10">
        </div>
        <div class="control-group">
            <label for="slider-wind">Wind Strength: <span id="val-wind">0.0</span></label>
            <input type="range" id="slider-wind" min="0" max="5" step="0.1" value="0">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            frameCount: 0,
            trolleyX: 15.0,
            cableLength: 10.0,
            cargoPos: { x: 0, y: 0, z: 0 },
            cargoSwingAngle: 0,
            cableTension: 0,
            craneRotation: 0,
            windStrength: 0,
            particleCount: 20,
            isPaused: false,
            simTime: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background is handled by CSS gradient, set renderer clear color to transparent
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(30, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearColor(0x000000, 0); // Transparent to show CSS gradient
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 10, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(20, 50, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 30;
        dirLight.shadow.camera.bottom = -30;
        dirLight.shadow.camera.left = -30;
        dirLight.shadow.camera.right = 30;
        dirLight.shadow.camera.near = 0.1;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- Crane Structure ---
        const craneGroup = new THREE.Group();
        scene.add(craneGroup);

        const yellowMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.4, metalness: 0.2 });
        const grayMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.6, metalness: 0.1 });

        // 1. Mast
        const mastGeo = new THREE.BoxGeometry(0.8, 25, 0.8);
        const mast = new THREE.Mesh(mastGeo, yellowMat);
        mast.position.y = 12.5;
        mast.castShadow = true;
        mast.receiveShadow = true;
        craneGroup.add(mast);

        // 2. Jib (Boom)
        const jibGeo = new THREE.BoxGeometry(30, 0.6, 0.6);
        const jib = new THREE.Mesh(jibGeo, yellowMat);
        jib.position.set(15, 24, 0); // Extends in +x
        jib.castShadow = true;
        jib.receiveShadow = true;
        craneGroup.add(jib);

        // 3. Counter-jib & Counterweight
        const counterJibGeo = new THREE.BoxGeometry(10, 0.5, 0.5);
        const counterJib = new THREE.Mesh(counterJibGeo, yellowMat);
        counterJib.position.set(-5, 24, 0); // Extends in -x
        counterJib.castShadow = true;
        counterJib.receiveShadow = true;
        craneGroup.add(counterJib);

        const weightGeo = new THREE.BoxGeometry(2, 2, 2);
        const weight = new THREE.Mesh(weightGeo, grayMat);
        weight.position.set(-9, 23.5, 0);
        weight.castShadow = true;
        weight.receiveShadow = true;
        craneGroup.add(weight);

        // 4. Cabin
        const cabinGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const cabin = new THREE.Mesh(cabinGeo, grayMat);
        cabin.position.set(1.2, 23, 1.2);
        cabin.castShadow = true;
        cabin.receiveShadow = true;
        craneGroup.add(cabin);

        // 5. Trolley
        const trolleyGeo = new THREE.BoxGeometry(1.0, 0.4, 0.8);
        const trolley = new THREE.Mesh(trolleyGeo, grayMat);
        trolley.position.set(15, 23.5, 0); // Initial position
        trolley.castShadow = true;
        trolley.receiveShadow = true;
        craneGroup.add(trolley);

        // --- Physics Setup (Verlet Cable) ---
        const N = window.__3D_STATE__.particleCount;
        const particles = [];
        const cableMass = 0.1; // per segment
        const cargoMass = 10.0;
        const gravity = new THREE.Vector3(0, -9.81, 0);
        
        // Initialize particles
        const startTrolleyWorld = new THREE.Vector3();
        trolley.getWorldPosition(startTrolleyWorld);
        
        for (let i = 0; i < N; i++) {
            particles.push({
                pos: new THREE.Vector3(startTrolleyWorld.x, startTrolleyWorld.y - i * (window.__3D_STATE__.cableLength / N), startTrolleyWorld.z),
                oldPos: new THREE.Vector3(startTrolleyWorld.x, startTrolleyWorld.y - i * (window.__3D_STATE__.cableLength / N), startTrolleyWorld.z),
                mass: (i === N - 1) ? cargoMass : cableMass
            });
        }

        // Cable Rendering
        const cableGeo = new THREE.BufferGeometry();
        const cablePositions = new Float32Array(N * 3);
        cableGeo.setAttribute('position', new THREE.BufferAttribute(cablePositions, 3));
        const cableMat = new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 2 });
        const cableLine = new THREE.Line(cableGeo, cableMat);
        scene.add(cableLine);

        // --- Cargo ---
        let cargoMesh = new THREE.Group();
        scene.add(cargoMesh);

        // Fallback box while loading or if loading fails
        const fallbackGeo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.castShadow = true;
        fallbackMesh.receiveShadow = true;
        cargoMesh.add(fallbackMesh);

        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            // Remove fallback
            cargoMesh.remove(fallbackMesh);
            
            const model = gltf.scene;
            
            // Center and scale model to approx 2 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.0 / maxDim;
            model.scale.set(scale, scale, scale);
            
            // Adjust so origin is at top of model (where cable attaches)
            const center = box.getCenter(new THREE.Vector3());
            model.position.set(-center.x * scale, -box.max.y * scale, -center.z * scale);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            cargoMesh.add(model);
        }, undefined, (error) => {
            console.warn('Could not load robot.glb, using fallback box.', error);
        });

        // --- Input Handling ---
        const keys = { a: false, d: false };
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key.toLowerCase() === 'r') {
                craneGroup.rotation.y = 0;
                window.__3D_STATE__.craneRotation = 0;
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
        });

        // Sliders
        const sliderTrolley = document.getElementById('slider-trolley');
        const sliderCable = document.getElementById('slider-cable');
        const sliderWind = document.getElementById('slider-wind');
        
        const valTrolley = document.getElementById('val-trolley');
        const valCable = document.getElementById('val-cable');
        const valWind = document.getElementById('val-wind');

        sliderTrolley.addEventListener('input', (e) => {
            window.__3D_STATE__.trolleyX = parseFloat(e.target.value);
            valTrolley.innerText = window.__3D_STATE__.trolleyX.toFixed(1);
        });
        sliderCable.addEventListener('input', (e) => {
            window.__3D_STATE__.cableLength = parseFloat(e.target.value);
            valCable.innerText = window.__3D_STATE__.cableLength.toFixed(1);
        });
        sliderWind.addEventListener('input', (e) => {
            window.__3D_STATE__.windStrength = parseFloat(e.target.value);
            valWind.innerText = window.__3D_STATE__.windStrength.toFixed(1);
        });

        // HUD Elements
        const hudTrolley = document.getElementById('hud-trolley');
        const hudCable = document.getElementById('hud-cable');
        const hudCargoY = document.getElementById('hud-cargo-y');
        const hudSwing = document.getElementById('hud-swing');
        const hudTension = document.getElementById('hud-tension');
        const hudRotation = document.getElementById('hud-rotation');

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        const trolleyWorldPos = new THREE.Vector3();
        const tempVec = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.05); // Cap dt to prevent physics explosion
            const time = clock.getElapsedTime();
            
            window.__3D_STATE__.frameCount++;
            window.__3D_STATE__.simTime = time;

            controls.update();

            // 1. Update Crane Rotation
            const rotSpeed = 0.5; // rad/s
            if (keys.a) craneGroup.rotation.y += rotSpeed * dt;
            if (keys.d) craneGroup.rotation.y -= rotSpeed * dt;
            window.__3D_STATE__.craneRotation = craneGroup.rotation.y;

            // 2. Update Trolley Position
            trolley.position.x = window.__3D_STATE__.trolleyX;
            trolley.getWorldPosition(trolleyWorldPos);

            // 3. Physics: Verlet Integration
            const windF = window.__3D_STATE__.windStrength;
            const windForce = new THREE.Vector3(
                windF * Math.sin(time * 0.5),
                0,
                windF * Math.cos(time * 0.7)
            );

            // Integration step
            for (let i = 1; i < N; i++) {
                const p = particles[i];
                const temp = p.pos.clone();
                
                // Forces
                const acc = gravity.clone();
                acc.add(windForce.clone().divideScalar(p.mass));

                // Verlet with slight damping (0.99)
                const vel = new THREE.Vector3().subVectors(p.pos, p.oldPos).multiplyScalar(0.99);
                p.pos.add(vel).add(acc.multiplyScalar(dt * dt));
                p.oldPos.copy(temp);
            }

            // Constraints (5 passes)
            const targetSegLen = window.__3D_STATE__.cableLength / (N - 1);
            for (let pass = 0; pass < 5; pass++) {
                // Pin top particle to trolley
                particles[0].pos.copy(trolleyWorldPos);

                for (let i = 0; i < N - 1; i++) {
                    const p1 = particles[i];
                    const p2 = particles[i + 1];
                    
                    const delta = new THREE.Vector3().subVectors(p2.pos, p1.pos);
                    const dist = delta.length();
                    if (dist === 0) continue;
                    
                    const diff = (dist - targetSegLen) / dist;
                    const offset = delta.multiplyScalar(0.5 * diff);

                    if (i !== 0) p1.pos.add(offset); // Don't move pinned particle
                    p2.pos.sub(offset);
                }
                // Ensure top is strictly pinned after constraints
                particles[0].pos.copy(trolleyWorldPos);
            }

            // 4. Update Rendering & Cargo
            const positions = cableLine.geometry.attributes.position.array;
            for (let i = 0; i < N; i++) {
                positions[i * 3] = particles[i].pos.x;
                positions[i * 3 + 1] = particles[i].pos.y;
                positions[i * 3 + 2] = particles[i].pos.z;
            }
            cableLine.geometry.attributes.position.needsUpdate = true;

            // Attach cargo to last particle
            const lastParticle = particles[N - 1];
            cargoMesh.position.copy(lastParticle.pos);
            
            // Optional: make cargo look at movement direction for realism, or just keep it upright
            // Keeping it upright is standard for crane loads unless swinging wildly

            // 5. Calculate Metrics for HUD & State
            window.__3D_STATE__.cargoPos = { x: lastParticle.pos.x, y: lastParticle.pos.y, z: lastParticle.pos.z };

            // Swing Angle
            const vertical = new THREE.Vector3(0, -1, 0);
            const cableDir = new THREE.Vector3().subVectors(lastParticle.pos, trolleyWorldPos).normalize();
            let swingAngleRad = vertical.angleTo(cableDir);
            if (isNaN(swingAngleRad)) swingAngleRad = 0;
            window.__3D_STATE__.cargoSwingAngle = swingAngleRad;

            // Tension Approximation: T = m_total * g / cos(theta)
            const totalMass = cargoMass + (N - 1) * cableMass;
            let tension = (totalMass * 9.81) / Math.cos(swingAngleRad);
            if (isNaN(tension) || !isFinite(tension)) tension = totalMass * 9.81;
            window.__3D_STATE__.cableTension = tension;

            // 6. Update HUD DOM
            hudTrolley.innerText = window.__3D_STATE__.trolleyX.toFixed(1);
            hudCable.innerText = window.__3D_STATE__.cableLength.toFixed(1);
            hudCargoY.innerText = window.__3D_STATE__.cargoPos.y.toFixed(2);
            hudSwing.innerText = THREE.MathUtils.radToDeg(swingAngleRad).toFixed(1);
            hudTension.innerText = tension.toFixed(1);
            
            // Normalize rotation for display (-180 to 180)
            let degRot = THREE.MathUtils.radToDeg(window.__3D_STATE__.craneRotation) % 360;
            if (degRot > 180) degRot -= 360;
            if (degRot < -180) degRot += 360;
            hudRotation.innerText = degRot.toFixed(1);

            renderer.render(scene, camera);
        }

        // Start loop
        animate();

    </script>
</body>
</html>
