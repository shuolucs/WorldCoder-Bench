<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Drone Assembly Timeline</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #ui {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), rgba(0,0,0,0.25));
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    #controlsRow {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    #timeSlider {
      width: 100%;
      cursor: pointer;
    }

    button, select {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      background: #2d2d44;
      color: #fff;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: #3c3c5f;
    }

    .info {
      font-size: 14px;
      margin-right: 10px;
    }

    #topInfo {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="topInfo">
    <div class="info">Time: <span id="timeDisplay">0%</span></div>
    <div class="info">Current Part: <span id="partLabel">none</span></div>
  </div>

  <div id="ui">
    <input id="timeSlider" type="range" min="0" max="1000" value="0" />
    <div id="controlsRow">
      <button id="playPauseBtn">Play</button>
      <button id="resetBtn">Reset</button>
      <button id="stepBackBtn">Step Backward</button>
      <button id="stepFwdBtn">Step Forward</button>
      <label for="speedSelect">Speed</label>
      <select id="speedSelect">
        <option value="0.5">0.5x</option>
        <option value="1" selected>1x</option>
        <option value="2">2x</option>
        <option value="4">4x</option>
      </select>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 3, 0);

    // Lights
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(5, 10, 5);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dir2.position.set(-3, 5, -3);
    scene.add(dir2);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({ color: '#2d2d44', side: THREE.DoubleSide });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(20, 20, 0x666688, 0x444466);
    grid.position.y = 0.01;
    scene.add(grid);

    // Helpers
    function makeStandardMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
    }

    function smoothstep01(x) {
      x = THREE.MathUtils.clamp(x, 0, 1);
      return x * x * (3 - 2 * x);
    }

    function segmentProgress(t, a, b) {
      if (t <= a) return 0;
      if (t >= b) return 1;
      return smoothstep01((t - a) / (b - a));
    }

    function round2(n) {
      return Math.round(n * 100) / 100;
    }

    function posObj(v) {
      return { x: round2(v.x), y: round2(v.y), z: round2(v.z) };
    }

    // Parts
    const parts = {};

    // Body
    parts.body = new THREE.Mesh(
      new THREE.CylinderGeometry(1.2, 1.2, 0.3, 8),
      makeStandardMaterial('#3498db')
    );
    parts.body.position.set(0, 5, 0);
    scene.add(parts.body);

    // Motors
    function createMotor(color, x, y, z, name) {
      const m = new THREE.Mesh(
        new THREE.CylinderGeometry(0.2, 0.2, 0.4, 24),
        makeStandardMaterial(color)
      );
      m.position.set(x, y, z);
      parts[name] = m;
      scene.add(m);
      return m;
    }

    createMotor('#e74c3c', -5, 5, 0, 'motor1');
    createMotor('#e67e22', 5, 5, 0, 'motor2');
    createMotor('#2ecc71', -5, 5, 4, 'motor3');
    createMotor('#9b59b6', 5, 5, 4, 'motor4');

    // Propeller pack group
    const propellerPack = new THREE.Group();
    propellerPack.position.set(0, 5, -5);
    scene.add(propellerPack);

    const propellers = [];
    for (let i = 0; i < 4; i++) {
      const p = new THREE.Mesh(
        new THREE.BoxGeometry(2, 0.05, 0.3),
        makeStandardMaterial('#ecf0f1')
      );
      p.rotation.y = (i % 2 === 0) ? 0 : Math.PI / 2;
      propellerPack.add(p);
      propellers.push(p);
    }
    parts.propellerPack = propellerPack;

    // Battery
    parts.battery = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.25, 0.4),
      makeStandardMaterial('#f1c40f')
    );
    parts.battery.position.set(0, 5, 5);
    scene.add(parts.battery);

    // Camera/Gimbal
    const cameraGimbal = new THREE.Group();
    const cameraSphere = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 24, 24),
      makeStandardMaterial('#1abc9c')
    );
    const gimbalStem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.06, 0.06, 0.25, 16),
      makeStandardMaterial('#16a085')
    );
    gimbalStem.position.y = -0.23;
    cameraGimbal.add(cameraSphere);
    cameraGimbal.add(gimbalStem);
    cameraGimbal.position.set(3, 5, -4);
    parts.cameraGimbal = cameraGimbal;
    scene.add(cameraGimbal);

    // Initial/local prop positions
    const propPackLocalStarts = [
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, 0)
    ];

    const targets = {
      body: new THREE.Vector3(0, 3, 0),
      motor1: new THREE.Vector3(-1.0, 3.15, -1.0),
      motor2: new THREE.Vector3(1.0, 3.15, -1.0),
      motor3: new THREE.Vector3(-1.0, 3.15, 1.0),
      motor4: new THREE.Vector3(1.0, 3.15, 1.0),
      battery: new THREE.Vector3(0, 2.75, 0),
      cameraGimbal: new THREE.Vector3(0, 2.5, 0),
      propellers: [
        new THREE.Vector3(-1.0, 3.55, -1.0),
        new THREE.Vector3(1.0, 3.55, -1.0),
        new THREE.Vector3(-1.0, 3.55, 1.0),
        new THREE.Vector3(1.0, 3.55, 1.0)
      ]
    };

    const starts = {
      body: new THREE.Vector3(0, 5, 0),
      motor1: new THREE.Vector3(-5, 5, 0),
      motor2: new THREE.Vector3(5, 5, 0),
      motor3: new THREE.Vector3(-5, 5, 4),
      motor4: new THREE.Vector3(5, 5, 4),
      battery: new THREE.Vector3(0, 5, 5),
      cameraGimbal: new THREE.Vector3(3, 5, -4),
      propellerPack: new THREE.Vector3(0, 5, -5)
    };

    // Particle effects
    const particleCount = 120;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleSpeeds = [];
    const particleOffsets = [];
    const particleGeom = new THREE.BufferGeometry();
    for (let i = 0; i < particleCount; i++) {
      particlePositions[i * 3 + 0] = 0;
      particlePositions[i * 3 + 1] = -100;
      particlePositions[i * 3 + 2] = 0;
      particleSpeeds.push(0.2 + Math.random() * 0.8);
      particleOffsets.push(Math.random() * Math.PI * 2);
    }
    particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.06,
      transparent: true,
      opacity: 0.8
    });
    const particles = new THREE.Points(particleGeom, particleMat);
    scene.add(particles);

    // UI
    const timeSlider = document.getElementById('timeSlider');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const speedSelect = document.getElementById('speedSelect');
    const resetBtn = document.getElementById('resetBtn');
    const stepFwdBtn = document.getElementById('stepFwdBtn');
    const stepBackBtn = document.getElementById('stepBackBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const partLabel = document.getElementById('partLabel');

    let currentTime = 0;
    let isPlaying = false;
    let speed = 1;
    let stepCount = 0;

    function clampTime() {
      currentTime = THREE.MathUtils.clamp(currentTime, 0, 1);
    }

    timeSlider.addEventListener('input', () => {
      currentTime = Number(timeSlider.value) / 1000;
      clampTime();
      if (currentTime >= 1) isPlaying = false;
      playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
    });

    playPauseBtn.addEventListener('click', () => {
      isPlaying = !isPlaying;
      if (currentTime >= 1 && isPlaying) currentTime = 0;
      playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
    });

    speedSelect.addEventListener('change', () => {
      speed = Number(speedSelect.value);
    });

    resetBtn.addEventListener('click', () => {
      currentTime = 0;
      isPlaying = false;
      playPauseBtn.textContent = 'Play';
    });

    stepFwdBtn.addEventListener('click', () => {
      currentTime += 0.05;
      clampTime();
      stepCount++;
      if (currentTime >= 1) isPlaying = false;
      playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
    });

    stepBackBtn.addEventListener('click', () => {
      currentTime -= 0.05;
      clampTime();
      stepCount++;
      if (currentTime < 1 && !isPlaying) playPauseBtn.textContent = 'Play';
    });

    function getCurrentPart(t) {
      if (t < 0.15) return 'Body/Frame';
      if (t < 0.40) return 'Motors';
      if (t < 0.60) return 'Propellers';
      if (t < 0.80) return 'Battery';
      if (t < 1.0) return 'Camera/Gimbal';
      return 'complete';
    }

    function getCurrentPartStateName(t) {
      if (t < 0.15) return 'body';
      if (t < 0.40) return 'motors';
      if (t < 0.60) return 'propellers';
      if (t < 0.80) return 'battery';
      if (t < 1.0) return 'camera';
      return 'complete';
    }

    function getAssembledParts(t) {
      const arr = [];
      if (t >= 0.15) arr.push('Body/Frame');
      if (t >= 0.40) arr.push('Motors');
      if (t >= 0.60) arr.push('Propellers');
      if (t >= 0.80) arr.push('Battery');
      if (t >= 1.00) arr.push('Camera/Gimbal');

      const expanded = [];
      if (t >= 0.15) expanded.push('Body/Frame');
      if (t >= 0.40) {
        expanded.push('Motor 1', 'Motor 2', 'Motor 3', 'Motor 4');
      }
      if (t >= 0.60) expanded.push('Propeller Pack');
      if (t >= 0.80) expanded.push('Battery');
      if (t >= 1.0) expanded.push('Camera/Gimbal');

      return { grouped: arr, expanded };
    }

    function applyGlowAndPulse(t, elapsed) {
      const pulse = 0.15 + 0.08 * (0.5 + 0.5 * Math.sin(elapsed * 4));

      const current = getCurrentPartStateName(t);

      const resetMat = (obj) => {
        obj.traverse?.((child) => {
          if (child.isMesh && child.material) {
            child.material.emissiveIntensity = 0;
          }
        });
        if (obj.isMesh && obj.material) obj.material.emissiveIntensity = 0;
      };

      const glowMat = (obj, intensity) => {
        obj.traverse?.((child) => {
          if (child.isMesh && child.material) {
            child.material.emissive.setRGB(0.8, 0.8, 0.8);
            child.material.emissiveIntensity = intensity;
          }
        });
        if (obj.isMesh && obj.material) {
          obj.material.emissive.setRGB(0.8, 0.8, 0.8);
          obj.material.emissiveIntensity = intensity;
        }
      };

      [
        parts.body, parts.motor1, parts.motor2, parts.motor3, parts.motor4,
        parts.battery, parts.cameraGimbal, ...propellers
      ].forEach(resetMat);

      // Current glow
      if (current === 'body') glowMat(parts.body, 0.7);
      if (current === 'motors') [parts.motor1, parts.motor2, parts.motor3, parts.motor4].forEach(p => glowMat(p, 0.7));
      if (current === 'propellers') propellers.forEach(p => glowMat(p, 0.7));
      if (current === 'battery') glowMat(parts.battery, 0.7);
      if (current === 'camera') glowMat(parts.cameraGimbal, 0.7);

      // Assembled pulse
      if (t >= 0.15 && current !== 'body') glowMat(parts.body, pulse);
      if (t >= 0.40 && current !== 'motors') [parts.motor1, parts.motor2, parts.motor3, parts.motor4].forEach(p => glowMat(p, pulse));
      if (t >= 0.60 && current !== 'propellers') propellers.forEach(p => glowMat(p, pulse));
      if (t >= 0.80 && current !== 'battery') glowMat(parts.battery, pulse);
      if (t >= 1.00 && current !== 'camera') glowMat(parts.cameraGimbal, pulse);
    }

    function updateParticles(t, elapsed) {
      const current = getCurrentPartStateName(t);
      let center = new THREE.Vector3(0, -100, 0);
      let active = current !== 'complete';

      if (current === 'body') center.copy(parts.body.position);
      else if (current === 'motors') {
        center.set(0, 3.15, 0);
      } else if (current === 'propellers') {
        center.set(0, 3.55, 0);
      } else if (current === 'battery') center.copy(parts.battery.position);
      else if (current === 'camera') center.copy(parts.cameraGimbal.position);

      const pos = particleGeom.attributes.position.array;
      for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        if (!active) {
          pos[i3 + 1] = -100;
          continue;
        }

        const ang = elapsed * particleSpeeds[i] + particleOffsets[i];
        const radius = 0.15 + (i % 12) * 0.03;
        const rise = ((elapsed * 0.8 + i * 0.03) % 1.5);
        pos[i3 + 0] = center.x + Math.cos(ang) * radius;
        pos[i3 + 1] = center.y + (rise - 0.75) * 0.8;
        pos[i3 + 2] = center.z + Math.sin(ang) * radius;
      }
      particleGeom.attributes.position.needsUpdate = true;
    }

    function updateAssembly(elapsed) {
      // Body
      const pBody = segmentProgress(currentTime, 0.0, 0.15);
      parts.body.position.lerpVectors(starts.body, targets.body, pBody);

      // Motors
      const pMotors = segmentProgress(currentTime, 0.15, 0.40);
      parts.motor1.position.lerpVectors(starts.motor1, targets.motor1, pMotors);
      parts.motor2.position.lerpVectors(starts.motor2, targets.motor2, pMotors);
      parts.motor3.position.lerpVectors(starts.motor3, targets.motor3, pMotors);
      parts.motor4.position.lerpVectors(starts.motor4, targets.motor4, pMotors);

      // Propellers: split from pack into 4 world positions
      const pProps = segmentProgress(currentTime, 0.40, 0.60);
      const worldStart = starts.propellerPack;
      for (let i = 0; i < 4; i++) {
        propellers[i].position.set(0, 0, 0);
        const worldPos = new THREE.Vector3().lerpVectors(worldStart, targets.propellers[i], pProps);
        propellers[i].parent = scene;
        scene.add(propellers[i]);
        propellers[i].position.copy(worldPos);
      }

      // Hide/keep pack logically
      propellerPack.visible = false;

      // Battery
      const pBattery = segmentProgress(currentTime, 0.60, 0.80);
      parts.battery.position.lerpVectors(starts.battery, targets.battery, pBattery);

      // Camera
      const pCam = segmentProgress(currentTime, 0.80, 1.00);
      parts.cameraGimbal.position.lerpVectors(starts.cameraGimbal, targets.cameraGimbal, pCam);

      // Propeller spin at completion
      const spin = currentTime >= 1.0;
      if (spin) {
        propellers.forEach((p, i) => {
          p.rotation.y += 0.4 + i * 0.03;
        });
      } else {
        propellers[0].rotation.y = 0;
        propellers[1].rotation.y = Math.PI / 2;
        propellers[2].rotation.y = 0;
        propellers[3].rotation.y = Math.PI / 2;
      }

      applyGlowAndPulse(currentTime, elapsed);
      updateParticles(currentTime, elapsed);
    }

    function updateUI() {
      timeSlider.value = Math.round(currentTime * 1000);
      timeDisplay.textContent = `${Math.round(currentTime * 100)}%`;

      const label = currentTime <= 0 ? 'none' : getCurrentPart(currentTime);
      partLabel.textContent = label;
    }

    window.__3D_STATE__ = {
      currentTime: 0,
      isPlaying: false,
      speed: 1,
      assembledParts: [],
      currentPart: 'none',
      bodyPosition: { x: 0, y: 5, z: 0 },
      motor1Position: { x: -5, y: 5, z: 0 },
      motor2Position: { x: 5, y: 5, z: 0 },
      motor3Position: { x: -5, y: 5, z: 4 },
      motor4Position: { x: 5, y: 5, z: 4 },
      batteryPosition: { x: 0, y: 5, z: 5 },
      cameraGimbalPosition: { x: 3, y: 5, z: -4 },
      propellersSpinning: false,
      partsCount: 0,
      stepCount: 0
    };

    function updateState() {
      const assembled = getAssembledParts(currentTime).expanded;
      let currentPart = 'none';
      if (currentTime > 0 && currentTime < 1) currentPart = getCurrentPart(currentTime);
      if (currentTime >= 1) currentPart = 'complete';

      let partsCount = 0;
      if (currentTime >= 0.15) partsCount = 1;
      if (currentTime >= 0.40) partsCount = 5;
      if (currentTime >= 0.60) partsCount = 6;
      if (currentTime >= 0.80) partsCount = 7;
      if (currentTime >= 1.00) partsCount = 7;

      window.__3D_STATE__ = {
        currentTime: round2(currentTime),
        isPlaying,
        speed,
        assembledParts: assembled,
        currentPart,
        bodyPosition: posObj(parts.body.position),
        motor1Position: posObj(parts.motor1.position),
        motor2Position: posObj(parts.motor2.position),
        motor3Position: posObj(parts.motor3.position),
        motor4Position: posObj(parts.motor4.position),
        batteryPosition: posObj(parts.battery.position),
        cameraGimbalPosition: posObj(parts.cameraGimbal.position),
        propellersSpinning: currentTime >= 1.0,
        partsCount,
        stepCount
      };
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      if (isPlaying) {
        currentTime += delta * 0.1 * speed;
        if (currentTime >= 1) {
          currentTime = 1;
          isPlaying = false;
          playPauseBtn.textContent = 'Play';
        }
      }

      updateAssembly(elapsed);
      updateUI();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
