<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drone Assembly</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(20, 20, 40, 0.92);
    backdrop-filter: blur(10px);
    padding: 15px 20px;
    border-top: 1px solid rgba(100, 100, 200, 0.3);
    z-index: 100;
}

#timelineRow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

#timeSlider {
    flex: 1;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #3498db, #e74c3c, #2ecc71, #f1c40f, #1abc9c);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}
#timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px rgba(52, 152, 219, 0.8);
    cursor: pointer;
}

#buttonRow {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.ctrl-btn {
    background: rgba(52, 152, 219, 0.3);
    border: 1px solid rgba(52, 152, 219, 0.6);
    color: #ecf0f1;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}
.ctrl-btn:hover {
    background: rgba(52, 152, 219, 0.6);
}
.ctrl-btn:active {
    transform: scale(0.95);
}

#speedSelect {
    background: rgba(30, 30, 60, 0.8);
    border: 1px solid rgba(52, 152, 219, 0.6);
    color: #ecf0f1;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 13px;
    cursor: pointer;
}

#timeDisplay {
    color: #3498db;
    font-size: 16px;
    font-weight: bold;
    min-width: 55px;
    text-align: center;
}

#partLabel {
    color: #f1c40f;
    font-size: 13px;
    margin-left: auto;
    padding: 4px 12px;
    background: rgba(241, 196, 15, 0.15);
    border-radius: 12px;
    border: 1px solid rgba(241, 196, 15, 0.3);
}

#infoOverlay {
    position: fixed;
    top: 15px;
    left: 15px;
    color: #ecf0f1;
    font-size: 14px;
    z-index: 100;
    pointer-events: none;
}
#infoOverlay h2 {
    font-size: 18px;
    margin-bottom: 5px;
    color: #3498db;
}
#assembledList {
    font-size: 12px;
    color: #95a5a6;
    line-height: 1.6;
}
.assembled-item { color: #2ecc71; }
.pending-item { color: #7f8c8d; }
</style>
</head>
<body>

<div id="infoOverlay">
    <h2>🛸 Drone Assembly</h2>
    <div id="assembledList"></div>
</div>

<div id="controls">
    <div id="timelineRow">
        <span id="timeDisplay">0%</span>
        <input type="range" id="timeSlider" min="0" max="1000" value="0">
    </div>
    <div id="buttonRow">
        <button class="ctrl-btn" id="stepBackBtn">⏪ Step</button>
        <button class="ctrl-btn" id="playPauseBtn">▶ Play</button>
        <button class="ctrl-btn" id="stepFwdBtn">Step ⏩</button>
        <button class="ctrl-btn" id="resetBtn">⟲ Reset</button>
        <label style="color:#95a5a6; font-size:13px; margin-left:8px;">Speed:</label>
        <select id="speedSelect">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
        </select>
        <span id="partLabel">Waiting...</span>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // State
    window.__3D_STATE__ = {
        currentTime: 0.0,
        isPlaying: false,
        speed: 1,
        assembledParts: [],
        currentPart: 'none',
        bodyPosition: {x: 0, y: 5, z: 0},
        motor1Position: {x: -5, y: 5, z: 0},
        motor2Position: {x: 5, y: 5, z: 0},
        motor3Position: {x: -5, y: 5, z: 4},
        motor4Position: {x: 5, y: 5, z: 4},
        batteryPosition: {x: 0, y: 5, z: 5},
        cameraGimbalPosition: {x: 3, y: 5, z: -4},
        propellersSpinning: false,
        partsCount: 0,
        stepCount: 0
    };

    let currentTime = 0.0;
    let isPlaying = false;
    let speed = 1;
    let stepCount = 0;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight1.position.set(5, 10, 5);
    dirLight1.castShadow = true;
    scene.add(dirLight1);

    const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
    dirLight2.position.set(-3, 5, -3);
    scene.add(dirLight2);

    // Ground
    const groundGeo = new THREE.PlaneGeometry(20, 20);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
    scene.add(gridHelper);

    // Helper to round
    function r2(v) { return Math.round(v * 100) / 100; }

    // Lerp
    function lerp(a, b, t) { return a + (b - a) * t; }
    function lerpVec(from, to, t) {
        return new THREE.Vector3(
            lerp(from.x, to.x, t),
            lerp(from.y, to.y, t),
            lerp(from.z, to.z, t)
        );
    }

    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    // Create drone parts
    // 1. Body/Frame
    const bodyGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.3, 8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3498db, emissive: 0x000000 });
    const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
    bodyMesh.castShadow = true;
    scene.add(bodyMesh);

    // Arms for the body (visual detail)
    const armGroup = new THREE.Group();
    const armPositions = [
        { x: -1.0, z: -1.0 },
        { x: 1.0, z: -1.0 },
        { x: -1.0, z: 1.0 },
        { x: 1.0, z: 1.0 }
    ];
    armPositions.forEach(pos => {
        const armGeo = new THREE.BoxGeometry(0.12, 0.1, 0.12);
        const armMat = new THREE.MeshStandardMaterial({ color: 0x2980b9 });
        const arm = new THREE.Mesh(armGeo, armMat);

        const connGeo = new THREE.CylinderGeometry(0.06, 0.06, Math.sqrt(pos.x * pos.x + pos.z * pos.z) - 0.3, 6);
        const connMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
        const conn = new THREE.Mesh(connGeo, connMat);
        const angle = Math.atan2(pos.z, pos.x);
        conn.rotation.z = Math.PI / 2;
        conn.rotation.y = -angle;
        conn.position.set(pos.x * 0.5, 0, pos.z * 0.5);
        armGroup.add(conn);
    });
    bodyMesh.add(armGroup);

    // 2-5. Motors
    function createMotor(color) {
        const group = new THREE.Group();
        const motorGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.4, 16);
        const motorMat = new THREE.MeshStandardMaterial({ color: color, emissive: 0x000000 });
        const motor = new THREE.Mesh(motorGeo, motorMat);
        motor.castShadow = true;
        group.add(motor);

        // Motor cap
        const capGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.1, 16);
        const capMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const cap = new THREE.Mesh(capGeo, capMat);
        cap.position.y = 0.25;
        group.add(cap);

        group.userData.mainMat = motorMat;
        return group;
    }

    const motor1 = createMotor(0xe74c3c);
    const motor2 = createMotor(0xe67e22);
    const motor3 = createMotor(0x2ecc71);
    const motor4 = createMotor(0x9b59b6);
    scene.add(motor1);
    scene.add(motor2);
    scene.add(motor3);
    scene.add(motor4);

    // 6. Propellers
    function createPropeller() {
        const group = new THREE.Group();
        const blade1Geo = new THREE.BoxGeometry(2, 0.05, 0.3);
        const blade1Mat = new THREE.MeshStandardMaterial({ color: 0xecf0f1, emissive: 0x000000, transparent: true, opacity: 0.9 });
        const blade1 = new THREE.Mesh(blade1Geo, blade1Mat);
        group.add(blade1);

        const blade2Geo = new THREE.BoxGeometry(2, 0.05, 0.3);
        const blade2Mat = new THREE.MeshStandardMaterial({ color: 0xecf0f1, emissive: 0x000000, transparent: true, opacity: 0.9 });
        const blade2 = new THREE.Mesh(blade2Geo, blade2Mat);
        blade2.rotation.y = Math.PI / 2;
        group.add(blade2);

        // Hub
        const hubGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.1, 8);
        const hubMat = new THREE.MeshStandardMaterial({ color: 0xbdc3c7 });
        const hub = new THREE.Mesh(hubGeo, hubMat);
        group.add(hub);

        group.userData.mainMat = blade1Mat;
        return group;
    }

    const propellerPack = new THREE.Group();
    const prop1 = createPropeller();
    const prop2 = createPropeller();
    const prop3 = createPropeller();
    const prop4 = createPropeller();
    propellerPack.add(prop1);
    propellerPack.add(prop2);
    propellerPack.add(prop3);
    propellerPack.add(prop4);
    scene.add(propellerPack);

    // 7. Battery
    const batteryGroup = new THREE.Group();
    const batteryGeo = new THREE.BoxGeometry(0.6, 0.25, 0.4);
    const batteryMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, emissive: 0x000000 });
    const batteryMesh = new THREE.Mesh(batteryGeo, batteryMat);
    batteryMesh.castShadow = true;
    batteryGroup.add(batteryMesh);
    // Battery connector
    const connGeo2 = new THREE.BoxGeometry(0.1, 0.08, 0.15);
    const connMat2 = new THREE.MeshStandardMaterial({ color: 0xe67e22 });
    const conn2 = new THREE.Mesh(connGeo2, connMat2);
    conn2.position.set(0.35, 0, 0);
    batteryGroup.add(conn2);
    batteryGroup.userData.mainMat = batteryMat;
    scene.add(batteryGroup);

    // 8. Camera/Gimbal
    const cameraGimbalGroup = new THREE.Group();
    const sphereGeo = new THREE.SphereGeometry(0.25, 16, 16);
    const sphereMat = new THREE.MeshStandardMaterial({ color: 0x1abc9c, emissive: 0x000000 });
    const sphereMesh = new THREE.Mesh(sphereGeo, sphereMat);
    sphereMesh.castShadow = true;
    cameraGimbalGroup.add(sphereMesh);

    const gimbalCylGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.2, 8);
    const gimbalCylMat = new THREE.MeshStandardMaterial({ color: 0x16a085 });
    const gimbalCyl = new THREE.Mesh(gimbalCylGeo, gimbalCylMat);
    gimbalCyl.position.y = -0.3;
    cameraGimbalGroup.add(gimbalCyl);

    // Lens
    const lensGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.08, 16);
    const lensMat = new THREE.MeshStandardMaterial({ color: 0x2c3e50 });
    const lens = new THREE.Mesh(lensGeo, lensMat);
    lens.rotation.x = Math.PI / 2;
    lens.position.z = 0.22;
    cameraGimbalGroup.add(lens);

    cameraGimbalGroup.userData.mainMat = sphereMat;
    scene.add(cameraGimbalGroup);

    // Particles
    const particleCount = 200;
    const particleGeo = new THREE.BufferGeometry();
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleSizes = new Float32Array(particleCount);
    const particleLifetimes = new Float32Array(particleCount);
    const particleVelocities = [];

    for (let i = 0; i < particleCount; i++) {
        particlePositions[i * 3] = 0;
        particlePositions[i * 3 + 1] = -10;
        particlePositions[i * 3 + 2] = 0;
        particleColors[i * 3] = 1;
        particleColors[i * 3 + 1] = 1;
        particleColors[i * 3 + 2] = 1;
        particleSizes[i] = 0;
        particleLifetimes[i] = 0;
        particleVelocities.push(new THREE.Vector3());
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particleGeo.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

    const particleMat = new THREE.PointsMaterial({
        size: 0.08,
        vertexColors: true,
        transparent: true,
        opacity: 0.8,
        blending: THREE.AdditiveBlending,
        depthWrite: false
    });

    const particles = new THREE.Points(particleGeo, particleMat);
    scene.add(particles);

    let nextParticle = 0;

    function emitParticles(position, color, count) {
        for (let i = 0; i < count; i++) {
            const idx = nextParticle % particleCount;
            nextParticle++;

            particlePositions[idx * 3] = position.x + (Math.random() - 0.5) * 0.5;
            particlePositions[idx * 3 + 1] = position.y + (Math.random() - 0.5) * 0.5;
            particlePositions[idx * 3 + 2] = position.z + (Math.random() - 0.5) * 0.5;

            particleColors[idx * 3] = color.r;
            particleColors[idx * 3 + 1] = color.g;
            particleColors[idx * 3 + 2] = color.b;

            particleLifetimes[idx] = 1.0;
            particleVelocities[idx].set(
                (Math.random() - 0.5) * 2,
                Math.random() * 2,
                (Math.random() - 0.5) * 2
            );
        }
    }

    function updateParticles(dt) {
        for (let i = 0; i < particleCount; i++) {
            if (particleLifetimes[i] > 0) {
                particleLifetimes[i] -= dt * 2;
                particlePositions[i * 3] += particleVelocities[i].x * dt;
                particlePositions[i * 3 + 1] += particleVelocities[i].y * dt;
                particlePositions[i * 3 + 2] += particleVelocities[i].z * dt;
                particleVelocities[i].y -= dt * 3;

                if (particleLifetimes[i] <= 0) {
                    particlePositions[i * 3 + 1] = -10;
                }
            }
        }
        particleGeo.attributes.position.needsUpdate = true;
        particleGeo.attributes.color.needsUpdate = true;
    }

    // Start positions
    const startPositions = {
        body: new THREE.Vector3(0, 5, 0),
        motor1: new THREE.Vector3(-5, 5, 0),
        motor2: new THREE.Vector3(5, 5, 0),
        motor3: new THREE.Vector3(-5, 5, 4),
        motor4: new THREE.Vector3(5, 5, 4),
        propellerPack: new THREE.Vector3(0, 5, -5),
        battery: new THREE.Vector3(0, 5, 5),
        cameraGimbal: new THREE.Vector3(3, 5, -4)
    };

    // Target positions
    const targetPositions = {
        body: new THREE.Vector3(0, 3, 0),
        motor1: new THREE.Vector3(-1.0, 3.15, -1.0),
        motor2: new THREE.Vector3(1.0, 3.15, -1.0),
        motor3: new THREE.Vector3(-1.0, 3.15, 1.0),
        motor4: new THREE.Vector3(1.0, 3.15, 1.0),
        prop1: new THREE.Vector3(-1.0, 3.55, -1.0),
        prop2: new THREE.Vector3(1.0, 3.55, -1.0),
        prop3: new THREE.Vector3(-1.0, 3.55, 1.0),
        prop4: new THREE.Vector3(1.0, 3.55, 1.0),
        battery: new THREE.Vector3(0, 2.75, 0),
        cameraGimbal: new THREE.Vector3(0, 2.5, 0)
    };

    // Assembly phases
    const phases = [
        { name: 'Body', start: 0.0, end: 0.15 },
        { name: 'Motors', start: 0.15, end: 0.40 },
        { name: 'Propellers', start: 0.40, end: 0.60 },
        { name: 'Battery', start: 0.60, end: 0.80 },
        { name: 'Camera/Gimbal', start: 0.80, end: 1.0 }
    ];

    function getPhaseProgress(t, phaseStart, phaseEnd) {
        if (t <= phaseStart) return 0;
        if (t >= phaseEnd) return 1;
        return easeInOutCubic((t - phaseStart) / (phaseEnd - phaseStart));
    }

    let prevTime = 0;
    let lastEmitTime = 0;

    function updateAssembly(t, dt) {
        const time = performance.now() * 0.001;

        // Body
        const bodyP = getPhaseProgress(t, 0.0, 0.15);
        const bodyPos = lerpVec(startPositions.body, targetPositions.body, bodyP);
        bodyMesh.position.copy(bodyPos);

        // Glow for active part
        const glowIntensity = 0.3;
        bodyMat.emissive.setHex(0x000000);
        motor1.userData.mainMat.emissive.setHex(0x000000);
        motor2.userData.mainMat.emissive.setHex(0x000000);
        motor3.userData.mainMat.emissive.setHex(0x000000);
        motor4.userData.mainMat.emissive.setHex(0x000000);
        batteryGroup.userData.mainMat.emissive.setHex(0x000000);
        cameraGimbalGroup.userData.mainMat.emissive.setHex(0x000000);

        // Pulse for assembled parts
        const pulse = Math.sin(time * 3) * 0.05 + 0.05;

        let currentPart = 'none';
        const assembledParts = [];

        // Body phase
        if (t > 0.0 && t < 0.15) {
            currentPart = 'Body';
            bodyMat.emissive.setRGB(0.2, 0.4, 0.8).multiplyScalar(glowIntensity);
            if (dt > 0 || (prevTime < t)) {
                emitParticles(bodyPos, new THREE.Color(0x3498db), 2);
            }
        }
        if (bodyP >= 1) {
            assembledParts.push('Body');
            bodyMat.emissive.setRGB(0.2 * pulse, 0.4 * pulse, 0.8 * pulse);
        }

        // Motors
        const motorP = getPhaseProgress(t, 0.15, 0.40);
        const m1Pos = lerpVec(startPositions.motor1, targetPositions.motor1, motorP);
        const m2Pos = lerpVec(startPositions.motor2, targetPositions.motor2, motorP);
        const m3Pos = lerpVec(startPositions.motor3, targetPositions.motor3, motorP);
        const m4Pos = lerpVec(startPositions.motor4, targetPositions.motor4, motorP);
        motor1.position.copy(m1Pos);
        motor2.position.copy(m2Pos);
        motor3.position.copy(m3Pos);
        motor4.position.copy(m4Pos);

        if (t >= 0.15 && t < 0.40) {
            currentPart = 'Motors';
            motor1.userData.mainMat.emissive.setRGB(0.9, 0.2, 0.2).multiplyScalar(glowIntensity);
            motor2.userData.mainMat.emissive.setRGB(0.9, 0.5, 0.1).multiplyScalar(glowIntensity);
            motor3.userData.mainMat.emissive.setRGB(0.2, 0.8, 0.4).multiplyScalar(glowIntensity);
            motor4.userData.mainMat.emissive.setRGB(0.6, 0.3, 0.7).multiplyScalar(glowIntensity);
            emitParticles(m1Pos, new THREE.Color(0xe74c3c), 1);
            emitParticles(m2Pos, new THREE.Color(0xe67e22), 1);
            emitParticles(m3Pos, new THREE.Color(0x2ecc71), 1);
            emitParticles(m4Pos, new THREE.Color(0x9b59b6), 1);
        }
        if (motorP >= 1) {
            assembledParts.push('Motors');
            motor1.userData.mainMat.emissive.setRGB(0.9 * pulse, 0.2 * pulse, 0.2 * pulse);
            motor2.userData.mainMat.emissive.setRGB(0.9 * pulse, 0.5 * pulse, 0.1 * pulse);
            motor3.userData.mainMat.emissive.setRGB(0.2 * pulse, 0.8 * pulse, 0.4 * pulse);
            motor4.userData.mainMat.emissive.setRGB(0.6 * pulse, 0.3 * pulse, 0.7 * pulse);
        }

        // Propellers
        const propP = getPhaseProgress(t, 0.40, 0.60);

        // When propellers are in pack (before assembly), they're grouped together
        // As they assemble, they split to their target positions
        const packPos = startPositions.propellerPack;
        const p1Pos = lerpVec(packPos, targetPositions.prop1, propP);
        const p2Pos = lerpVec(new THREE.Vector3(packPos.x + 0.5, packPos.y, packPos.z), targetPositions.prop2, propP);
        const p3Pos = lerpVec(new THREE.Vector3(packPos.x - 0.5, packPos.y, packPos.z + 0.5), targetPositions.prop3, propP);
        const p4Pos = lerpVec(new THREE.Vector3(packPos.x + 0.5, packPos.y, packPos.z + 0.5), targetPositions.prop4, propP);

        prop1.position.copy(p1Pos);
        prop2.position.copy(p2Pos);
        prop3.position.copy(p3Pos);
        prop4.position.copy(p4Pos);

        // Reset propeller pack transform so children use world-like coords
        propellerPack.position.set(0, 0, 0);

        if (t >= 0.40 && t < 0.60) {
            currentPart = 'Propellers';
            [prop1, prop2, prop3, prop4].forEach(p => {
                p.userData.mainMat.emissive.setRGB(0.9, 0.9, 0.9).multiplyScalar(glowIntensity);
            });
            emitParticles(p1Pos, new THREE.Color(0xecf0f1), 1);
            emitParticles(p2Pos, new THREE.Color(0xecf0f1), 1);
        }
        if (propP >= 1) {
            assembledParts.push('Propellers');
            [prop1, prop2, prop3, prop4].forEach(p => {
                p.userData.mainMat.emissive.setRGB(0.9 * pulse, 0.9 * pulse, 0.9 * pulse);
            });
        }

        // Battery
        const battP = getPhaseProgress(t, 0.60, 0.80);
        const battPos = lerpVec(startPositions.battery, targetPositions.battery, battP);
        batteryGroup.position.copy(battPos);

        if (t >= 0.60 && t < 0.80) {
            currentPart = 'Battery';
            batteryGroup.userData.mainMat.emissive.setRGB(0.9, 0.8, 0.2).multiplyScalar(glowIntensity);
            emitParticles(battPos, new THREE.Color(0xf1c40f), 2);
        }
        if (battP >= 1) {
            assembledParts.push('Battery');
            batteryGroup.userData.mainMat.emissive.setRGB(0.9 * pulse, 0.8 * pulse, 0.2 * pulse);
        }

        // Camera/Gimbal
        const camP = getPhaseProgress(t, 0.80, 1.0);
        const camPos = lerpVec(startPositions.cameraGimbal, targetPositions.cameraGimbal, camP);
        cameraGimbalGroup.position.copy(camPos);

        if (t >= 0.80 && t < 1.0) {
            currentPart = 'Camera/Gimbal';
            cameraGimbalGroup.userData.mainMat.emissive.setRGB(0.1, 0.7, 0.6).multiplyScalar(glowIntensity);
            emitParticles(camPos, new THREE.Color(0x1abc9c), 2);
        }
        if (camP >= 1) {
            assembledParts.push('Camera/Gimbal');
            cameraGimbalGroup.userData.mainMat.emissive.setRGB(0.1 * pulse, 0.7 * pulse, 0.6 * pulse);
        }

        if (t >= 1.0) {
            currentPart = 'complete';
        }

        // Propeller spinning when complete
        const propSpinning = t >= 1.0;
        if (propSpinning) {
            const spinSpeed = time * 15;
            prop1.rotation.y = spinSpeed;
            prop2.rotation.y = -spinSpeed;
            prop3.rotation.y = -spinSpeed;
            prop4.rotation.y = spinSpeed;
        } else {
            // Gentle idle rotation
            prop1.rotation.y = 0;
            prop2.rotation.y = 0;
            prop3.rotation.y = 0;
            prop4.rotation.y = 0;
        }

        // Floating effect for unassembled parts
        const floatOffset = Math.sin(time * 2) * 0.1;
        if (bodyP < 1) bodyMesh.position.y += floatOffset;
        if (motorP < 1) {
            motor1.position.y += floatOffset;
            motor2.position.y += floatOffset;
            motor3.position.y += floatOffset;
            motor4.position.y += floatOffset;
        }
        if (propP < 1) {
            prop1.position.y += floatOffset;
            prop2.position.y += floatOffset;
            prop3.position.y += floatOffset;
            prop4.position.y += floatOffset;
        }
        if (battP < 1) batteryGroup.position.y += floatOffset;
        if (camP < 1) cameraGimbalGroup.position.y += floatOffset;

        // Count assembled parts
        let partsCount = 0;
        if (bodyP >= 1) partsCount++;
        if (motorP >= 1) partsCount += 4; // 4 motors count as individual but grouped
        if (propP >= 1) partsCount++;
        if (battP >= 1) partsCount++;
        if (camP >= 1) partsCount++;

        // Recalculate partsCount as 0-7 based on part groups
        partsCount = 0;
        if (bodyP >= 1) partsCount++;
        if (motorP >= 1) partsCount++;  // Motors as one group
        if (propP >= 1) partsCount++;
        if (battP >= 1) partsCount++;
        if (camP >= 1) partsCount++;

        // Actually let's count individual: body=1, motor1-4=4, propellers=1, battery=1, camera=1 = 8? 
        // Spec says 0-7, so: body, motor1, motor2, motor3, motor4, propellers, battery, camera = 8 parts but max 7?
        // Let's use the assembled parts array length for groups
        partsCount = assembledParts.length;

        // Update state
        const state = window.__3D_STATE__;
        state.currentTime = r2(t);
        state.isPlaying = isPlaying;
        state.speed = speed;
        state.assembledParts = [...assembledParts];
        state.currentPart = currentPart;
        state.bodyPosition = { x: r2(bodyMesh.position.x), y: r2(bodyMesh.position.y), z: r2(bodyMesh.position.z) };
        state.motor1Position = { x: r2(motor1.position.x), y: r2(motor1.position.y), z: r2(motor1.position.z) };
        state.motor2Position = { x: r2(motor2.position.x), y: r2(motor2.position.y), z: r2(motor2.position.z) };
        state.motor3Position = { x: r2(motor3.position.x), y: r2(motor3.position.y), z: r2(motor3.position.z) };
        state.motor4Position = { x: r2(motor4.position.x), y: r2(motor4.position.y), z: r2(motor4.position.z) };
        state.batteryPosition = { x: r2(batteryGroup.position.x), y: r2(batteryGroup.position.y), z: r2(batteryGroup.position.z) };
        state.cameraGimbalPosition = { x: r2(cameraGimbalGroup.position.x), y: r2(cameraGimbalGroup.position.y), z: r2(cameraGimbalGroup.position.z) };
        state.propellersSpinning = propSpinning;
        state.partsCount = partsCount;
        state.stepCount = stepCount;

        prevTime = t;
    }

    // UI
    const timeSlider = document.getElementById('timeSlider');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const speedSelect = document.getElementById('speedSelect');
    const resetBtn = document.getElementById('resetBtn');
    const stepFwdBtn = document.getElementById('stepFwdBtn');
    const stepBackBtn = document.getElementById('stepBackBtn');
    const timeDisplay = document.getElementById('timeDisplay');
    const partLabel = document.getElementById('partLabel');
    const assembledList = document.getElementById('assembledList');

    timeSlider.addEventListener('input', () => {
        currentTime = parseInt(timeSlider.value) / 1000;
    });

    playPauseBtn.addEventListener('click', () => {
        isPlaying = !isPlaying;
        playPauseBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
    });

    speedSelect.addEventListener('change', () => {
        speed = parseFloat(speedSelect.value);
    });

    resetBtn.addEventListener('click', () => {
        currentTime = 0;
        isPlaying = false;
        playPauseBtn.textContent = '▶ Play';
        timeSlider.value = 0;
    });

    stepFwdBtn.addEventListener('click', () => {
        currentTime = Math.min(1.0, currentTime + 0.05);
        stepCount++;
        timeSlider.value = Math.round(currentTime * 1000);
    });

    stepBackBtn.addEventListener('click', () => {
        currentTime = Math.max(0.0, currentTime - 0.05);
        stepCount++;
        timeSlider.value = Math.round(currentTime * 1000);
    });

    // Update UI
    function updateUI() {
        timeDisplay.textContent = Math.round(currentTime * 100) + '%';
        timeSlider.value = Math.round(currentTime * 1000);

        const state = window.__3D_STATE__;
        let label = state.currentPart;
        if (label === 'none') label = 'Waiting...';
        else if (label === 'complete') label = '✅ Assembly Complete!';
        else label = '🔧 Assembling: ' + label;
        partLabel.textContent = label;

        // Update assembled list
        const allParts = ['Body', 'Motors', 'Propellers', 'Battery', 'Camera/Gimbal'];
        let html = '';
        allParts.forEach(p => {
            if (state.assembledParts.includes(p)) {
                html += `<div class="assembled-item">✓ ${p}</div>`;
            } else if (state.currentPart === p) {
                html += `<div style="color:#f39c12">⟳ ${p}...</div>`;
            } else {
                html += `<div class="pending-item">○ ${p}</div>`;
            }
        });
        assembledList.innerHTML = html;
    }

    // Animation loop
    let lastFrameTime = performance.now();

    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const dt = (now - lastFrameTime) / 1000;
        lastFrameTime = now;

        // Auto-advance time
        if (isPlaying) {
            currentTime += 0.1 * speed * dt;
            if (currentTime >= 1.0) {
                currentTime = 1.0;
                // Keep playing at 1.0 for spinning propellers
            }
        }

        currentTime = Math.max(0, Math.min(1, currentTime));

        updateAssembly(currentTime, dt);
        updateParticles(dt);
        updateUI();

        controls.update();
        renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize positions
    updateAssembly(0, 0);
    animate();
})();
</script>
</body>
</html>
