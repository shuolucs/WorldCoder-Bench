<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Drone Assembly</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(26, 26, 46, 0.85);
            backdrop-filter: blur(5px);
            border-top: 1px solid #3498db;
            padding: 15px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: #3498db;
        }
        button, select {
            background: #2d2d44;
            color: #fff;
            border: 1px solid #3498db;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover, select:hover {
            background: #3498db;
        }
        #partLabel {
            color: #f1c40f;
            font-weight: bold;
        }
        #timeDisplay {
            font-variant-numeric: tabular-nums;
            width: 50px;
            text-align: right;
        }
    </style>
    <!-- Import Three.js and OrbitControls -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <div class="top-row">
            <div>Assembling: <span id="partLabel">None</span></div>
            <div>Time: <span id="timeDisplay">0%</span></div>
        </div>
        <div class="controls-row">
            <button id="playPauseBtn">Play</button>
            <button id="stepBackBtn">-0.05</button>
            <input type="range" id="timeSlider" min="0" max="1000" value="0">
            <button id="stepFwdBtn">+0.05</button>
            <select id="speedSelect">
                <option value="0.5">0.5x</option>
                <option value="1" selected>1x</option>
                <option value="2">2x</option>
                <option value="4">4x</option>
            </select>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        
        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 5);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight2.position.set(-3, 5, -3);
        scene.add(dirLight2);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x222233);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // --- Drone Parts Creation ---
        const partsData = [];
        const propellers = [];
        let bodyMesh, motor1Mesh, motor2Mesh, motor3Mesh, motor4Mesh, batteryMesh, cameraGroup;

        function createMesh(geometry, colorHex) {
            const material = new THREE.MeshStandardMaterial({ 
                color: colorHex, 
                roughness: 0.4, 
                metalness: 0.3 
            });
            return new THREE.Mesh(geometry, material);
        }

        function addPart(name, mesh, start, target, tStart, tEnd, isGroup = false) {
            mesh.position.copy(start);
            scene.add(mesh);
            
            let baseColor = 0x000000;
            if (!isGroup) {
                baseColor = mesh.material.color.getHex();
            } else {
                // For groups, find first mesh child for color reference
                mesh.traverse(child => {
                    if (child.isMesh && baseColor === 0x000000) baseColor = child.material.color.getHex();
                });
            }

            partsData.push({
                name, mesh, start, target, tStart, tEnd, baseColor, isGroup
            });
            return mesh;
        }

        // 1. Body
        bodyMesh = addPart('Body/Frame', 
            createMesh(new THREE.CylinderGeometry(1.2, 1.2, 0.3, 8), 0x3498db),
            new THREE.Vector3(0, 5, 0), new THREE.Vector3(0, 3, 0), 0.0, 0.15
        );

        // 2-5. Motors
        const motorGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.4, 16);
        motor1Mesh = addPart('Motor 1', createMesh(motorGeo, 0xe74c3c), new THREE.Vector3(-5, 5, 0), new THREE.Vector3(-1.0, 3.15, -1.0), 0.15, 0.40);
        motor2Mesh = addPart('Motor 2', createMesh(motorGeo, 0xe67e22), new THREE.Vector3(5, 5, 0), new THREE.Vector3(1.0, 3.15, -1.0), 0.15, 0.40);
        motor3Mesh = addPart('Motor 3', createMesh(motorGeo, 0x2ecc71), new THREE.Vector3(-5, 5, 4), new THREE.Vector3(-1.0, 3.15, 1.0), 0.15, 0.40);
        motor4Mesh = addPart('Motor 4', createMesh(motorGeo, 0x9b59b6), new THREE.Vector3(5, 5, 4), new THREE.Vector3(1.0, 3.15, 1.0), 0.15, 0.40);

        // 6. Propellers
        const propGeo = new THREE.BoxGeometry(2, 0.05, 0.3);
        const propTargets = [
            new THREE.Vector3(-1.0, 3.55, -1.0),
            new THREE.Vector3(1.0, 3.55, -1.0),
            new THREE.Vector3(-1.0, 3.55, 1.0),
            new THREE.Vector3(1.0, 3.55, 1.0)
        ];
        for(let i=0; i<4; i++) {
            const prop = createMesh(propGeo, 0xecf0f1);
            propellers.push(prop);
            addPart('Propeller Pack', prop, new THREE.Vector3(0, 5, -5), propTargets[i], 0.40, 0.60);
        }

        // 7. Battery
        batteryMesh = addPart('Battery', 
            createMesh(new THREE.BoxGeometry(0.6, 0.25, 0.4), 0xf1c40f),
            new THREE.Vector3(0, 5, 5), new THREE.Vector3(0, 2.75, 0), 0.60, 0.80
        );

        // 8. Camera/Gimbal
        cameraGroup = new THREE.Group();
        const camSphere = createMesh(new THREE.SphereGeometry(0.25, 32, 32), 0x1abc9c);
        const camCyl = createMesh(new THREE.CylinderGeometry(0.08, 0.08, 0.15), 0x7f8c8d);
        camCyl.position.y = 0.3;
        cameraGroup.add(camSphere);
        cameraGroup.add(camCyl);
        addPart('Camera/Gimbal', cameraGroup, new THREE.Vector3(3, 5, -4), new THREE.Vector3(0, 2.5, 0), 0.80, 1.0, true);

        // --- Particle System ---
        const particleCount = 300;
        const particleGeo = new THREE.BufferGeometry();
        const particlePos = new Float32Array(particleCount * 3);
        const particleVel = [];
        const particleLife = new Float32Array(particleCount);

        for(let i=0; i<particleCount; i++) {
            particlePos[i*3] = 999;
            particleLife[i] = 0;
            particleVel.push(new THREE.Vector3());
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
        const particleMat = new THREE.PointsMaterial({
            color: 0xffffff, size: 0.08, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particleGeo, particleMat);
        scene.add(particles);

        function emitParticles(pos, colorHex) {
            particleMat.color.setHex(colorHex);
            for(let i=0; i<3; i++) {
                let idx = -1;
                for(let j=0; j<particleCount; j++) {
                    if(particleLife[j] <= 0) { idx = j; break; }
                }
                if(idx !== -1) {
                    particlePos[idx*3] = pos.x + (Math.random()-0.5)*0.8;
                    particlePos[idx*3+1] = pos.y + (Math.random()-0.5)*0.8;
                    particlePos[idx*3+2] = pos.z + (Math.random()-0.5)*0.8;
                    particleVel[idx].set((Math.random()-0.5)*1.5, Math.random()*1.5, (Math.random()-0.5)*1.5);
                    particleLife[idx] = 1.0;
                }
            }
        }

        // --- State & Controls ---
        let t = 0.0;
        let isPlaying = false;
        let speed = 1.0;
        let stepCount = 0;

        const timeSlider = document.getElementById('timeSlider');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const speedSelect = document.getElementById('speedSelect');
        const resetBtn = document.getElementById('resetBtn');
        const stepFwdBtn = document.getElementById('stepFwdBtn');
        const stepBackBtn = document.getElementById('stepBackBtn');
        const timeDisplay = document.getElementById('timeDisplay');
        const partLabel = document.getElementById('partLabel');

        function updateTime(newT) {
            t = Math.max(0, Math.min(1, newT));
            timeSlider.value = t * 1000;
        }

        playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? 'Pause' : 'Play';
            if(isPlaying && t >= 1) updateTime(0);
        });

        timeSlider.addEventListener('input', (e) => {
            updateTime(e.target.value / 1000);
            isPlaying = false;
            playPauseBtn.textContent = 'Play';
        });

        speedSelect.addEventListener('change', (e) => {
            speed = parseFloat(e.target.value);
        });

        resetBtn.addEventListener('click', () => {
            updateTime(0);
            isPlaying = false;
            playPauseBtn.textContent = 'Play';
        });

        stepFwdBtn.addEventListener('click', () => {
            updateTime(t + 0.05);
            stepCount++;
        });

        stepBackBtn.addEventListener('click', () => {
            updateTime(t - 0.05);
            stepCount++;
        });

        // Easing function
        function easeInOutQuad(x) {
            return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
        }

        function formatPos(pos) {
            return {
                x: Number(pos.x.toFixed(2)),
                y: Number(pos.y.toFixed(2)),
                z: Number(pos.z.toFixed(2))
            };
        }

        // Initialize State Object
        window.__3D_STATE__ = {};

        const clock = new THREE.Clock();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (isPlaying) {
                updateTime(t + delta * 0.1 * speed);
                if (t >= 1) {
                    t = 1;
                    isPlaying = false;
                    playPauseBtn.textContent = 'Play';
                }
            }

            let currentPartName = 'none';
            let assembledSet = new Set();

            // Update Parts
            partsData.forEach(p => {
                let local_t = Math.max(0, Math.min(1, (t - p.tStart) / (p.tEnd - p.tStart)));
                let eased_t = easeInOutQuad(local_t);
                
                p.mesh.position.lerpVectors(p.start, p.target, eased_t);

                const setEmissive = (mesh, hex, intensity) => {
                    if(mesh.material && mesh.material.emissive) {
                        mesh.material.emissive.setHex(hex);
                        mesh.material.emissiveIntensity = intensity;
                    }
                };

                if (local_t > 0 && local_t < 1) {
                    currentPartName = p.name;
                    emitParticles(p.mesh.position, p.baseColor);
                    
                    if(p.isGroup) {
                        p.mesh.traverse(c => setEmissive(c, p.baseColor, 0.6));
                    } else {
                        setEmissive(p.mesh, p.baseColor, 0.6);
                    }
                } else {
                    if(p.isGroup) {
                        p.mesh.traverse(c => setEmissive(c, 0x000000, 0));
                    } else {
                        setEmissive(p.mesh, 0x000000, 0);
                    }
                }

                if (local_t === 1) {
                    assembledSet.add(p.name);
                    // Pulse effect
                    let scale = 1 + Math.sin(Date.now() * 0.005) * 0.015;
                    p.mesh.scale.set(scale, scale, scale);
                } else {
                    p.mesh.scale.set(1, 1, 1);
                }
            });

            if (t === 1) currentPartName = 'complete';

            // Spin Propellers
            const propellersSpinning = t >= 1.0;
            if (propellersSpinning) {
                propellers.forEach(p => p.rotation.y -= 15 * delta);
            } else {
                propellers.forEach(p => p.rotation.y = 0);
            }

            // Update Particles
            for(let i=0; i<particleCount; i++) {
                if(particleLife[i] > 0) {
                    particleLife[i] -= delta * 1.5;
                    particlePos[i*3] += particleVel[i].x * delta;
                    particlePos[i*3+1] += particleVel[i].y * delta;
                    particlePos[i*3+2] += particleVel[i].z * delta;
                    if(particleLife[i] <= 0) particlePos[i*3] = 999;
                }
            }
            particleGeo.attributes.position.needsUpdate = true;

            // Update UI
            timeDisplay.textContent = Math.round(t * 100) + '%';
            partLabel.textContent = currentPartName.charAt(0).toUpperCase() + currentPartName.slice(1);
            if(currentPartName === 'none' && t === 0) partLabel.textContent = 'Ready';

            // Update State Object
            const assembledArray = Array.from(assembledSet);
            window.__3D_STATE__ = {
                currentTime: Number(t.toFixed(3)),
                isPlaying: isPlaying,
                speed: speed,
                assembledParts: assembledArray,
                currentPart: currentPartName,
                bodyPosition: formatPos(bodyMesh.position),
                motor1Position: formatPos(motor1Mesh.position),
                motor2Position: formatPos(motor2Mesh.position),
                motor3Position: formatPos(motor3Mesh.position),
                motor4Position: formatPos(motor4Mesh.position),
                batteryPosition: formatPos(batteryMesh.position),
                cameraGimbalPosition: formatPos(cameraGroup.position),
                propellersSpinning: propellersSpinning,
                partsCount: assembledArray.length,
                stepCount: stepCount
            };

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
