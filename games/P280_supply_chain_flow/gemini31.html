<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Supply Chain Flow Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            align-items: center;
            border: 1px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #2980b9; }
        button:active { background: #2471a3; }
        #btn-reset { background: #e74c3c; }
        #btn-reset:hover { background: #c0392b; }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: 10px;
            border-left: 1px solid #555;
            padding-left: 15px;
        }
        input[type=range] { cursor: pointer; }
        #hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            min-width: 200px;
            pointer-events: none;
        }
        #hud-panel h3 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #555; padding-bottom: 5px; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .hud-val { font-weight: bold; color: #2ecc71; }
        #instructions {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        .key { background: #555; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading">Loading Model...</div>

    <div id="instructions">
        <div>Click nodes to select</div>
        <div style="margin-top:5px"><span class="key">B</span> Toggle Bottleneck (Processing)</div>
        <div style="margin-top:5px"><span class="key">H</span> Toggle Heatmap</div>
    </div>

    <div id="hud-panel">
        <h3>Supply Chain Stats</h3>
        <div class="hud-row"><span>Total Spawned:</span> <span id="hud-spawned" class="hud-val">0</span></div>
        <div class="hud-row"><span>In Transit:</span> <span id="hud-transit" class="hud-val">0</span></div>
        <div class="hud-row"><span>Delivered:</span> <span id="hud-delivered" class="hud-val">0</span></div>
        <div style="margin-top: 10px; border-top: 1px solid #555; padding-top: 5px;">
            <div class="hud-row"><span>Selected Node:</span> <span id="hud-sel-name" class="hud-val" style="color:#f1c40f">None</span></div>
            <div class="hud-row"><span>Throughput:</span> <span id="hud-sel-through" class="hud-val" style="color:#f1c40f">-</span></div>
        </div>
    </div>

    <div id="ui-container">
        <button id="btn-start">Start</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-reset">Reset</button>
        <div class="slider-container">
            <label for="slider-speed">Speed:</label>
            <input type="range" id="slider-speed" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="speed-label">1.0x</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            simulationRunning: false,
            paused: false,
            speedMultiplier: 1.0,
            totalSpawned: 0,
            totalDelivered: 0,
            inTransitCount: 0,
            nodeThrough: { farm: 0, warehouse: 0, processing: 0, distribution: 0, retail: 0 },
            selectedNode: null,
            bottleneckActive: false,
            heatmapActive: false,
            avocadoPositions: [],
            modelLoaded: false
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- SUPPLY CHAIN NODES ---
        const nodesData = [
            { id: 'farm', name: 'FARM', pos: [-12, 0, 0], color: 0x2ecc71 },
            { id: 'warehouse', name: 'WAREHOUSE', pos: [-6, 0, -4], color: 0xe67e22 },
            { id: 'processing', name: 'PROCESSING', pos: [0, 0, -6], color: 0x3498db },
            { id: 'distribution', name: 'DISTRIBUTION', pos: [6, 0, -4], color: 0x9b59b6 },
            { id: 'retail', name: 'RETAIL', pos: [12, 0, 0], color: 0xe74c3c }
        ];

        const nodeMeshes = [];
        const curves = [];

        // Helper to create text sprites
        function createTextSprite(message) {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = 256;
            canvas.height = 128;
            context.font = 'Bold 30px Arial';
            context.fillStyle = 'rgba(0,0,0,0.5)';
            context.roundRect(10, 30, 236, 60, 10);
            context.fill();
            context.fillStyle = 'white';
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(message, 128, 60);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMaterial = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMaterial);
            sprite.scale.set(4, 2, 1);
            return sprite;
        }

        // Build Nodes
        const nodeGeo = new THREE.BoxGeometry(3, 0.5, 3);
        nodesData.forEach((data, index) => {
            const mat = new THREE.MeshStandardMaterial({ color: data.color });
            const mesh = new THREE.Mesh(nodeGeo, mat);
            mesh.position.set(...data.pos);
            mesh.userData = { id: data.id, name: data.name, color: data.color, index: index };
            scene.add(mesh);
            nodeMeshes.push(mesh);

            const label = createTextSprite(data.name);
            label.position.set(data.pos[0], data.pos[1] + 2.5, data.pos[2]);
            scene.add(label);
        });

        // Build Paths
        for (let i = 0; i < nodesData.length - 1; i++) {
            const p1 = new THREE.Vector3(...nodesData[i].pos);
            const p2 = new THREE.Vector3(...nodesData[i+1].pos);
            const mid = new THREE.Vector3().addVectors(p1, p2).multiplyScalar(0.5);
            mid.y += 1.5; // Curve upwards
            
            const curve = new THREE.CatmullRomCurve3([p1, mid, p2]);
            curves.push(curve);

            const tubeGeo = new THREE.TubeGeometry(curve, 30, 0.08, 8, false);
            const tubeMat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const tube = new THREE.Mesh(tubeGeo, tubeMat);
            scene.add(tube);
        }

        // Bottleneck Visual (Red Ring at Processing)
        const ringGeo = new THREE.TorusGeometry(2.5, 0.1, 8, 32);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const bottleneckRing = new THREE.Mesh(ringGeo, ringMat);
        bottleneckRing.rotation.x = Math.PI / 2;
        bottleneckRing.position.set(...nodesData[2].pos);
        bottleneckRing.visible = false;
        scene.add(bottleneckRing);

        // --- MODEL LOADING ---
        let avocadoModel = null;
        const loader = new GLTFLoader();
        // Using Khronos sample model repo
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/Avocado/glTF-Binary/Avocado.glb',
            (gltf) => {
                avocadoModel = gltf.scene;
                // Setup materials for fading
                avocadoModel.traverse((child) => {
                    if (child.isMesh) {
                        child.material = child.material.clone();
                        child.material.transparent = true;
                        child.material.opacity = 1;
                    }
                });
                window.__3D_STATE__.modelLoaded = true;
                document.getElementById('loading').style.display = 'none';
            },
            undefined,
            (error) => {
                console.error('Error loading model:', error);
                document.getElementById('loading').innerText = 'Error loading model';
            }
        );

        // --- AVOCADO LOGIC ---
        let activeAvocados = [];
        let spawnTimer = 0;

        class AvocadoItem {
            constructor() {
                this.mesh = avocadoModel.clone();
                this.mesh.scale.set(15, 15, 15);
                scene.add(this.mesh);

                this.pathIndex = 0;
                this.progress = 0;
                this.state = 'moving'; // moving, paused, fading
                this.timer = 0;

                // Start at farm
                this.mesh.position.copy(nodeMeshes[0].position);
                
                const state = window.__3D_STATE__;
                state.nodeThrough.farm++;
                state.totalSpawned++;
            }

            update(dt) {
                const state = window.__3D_STATE__;
                const speed = state.speedMultiplier;

                if (this.state === 'moving') {
                    this.progress += (dt * speed) / 3.0; // 3s base travel time
                    
                    if (this.progress >= 1) {
                        this.progress = 1;
                        this.state = 'paused';
                        this.timer = 0;
                        this.pathIndex++;

                        // Reached a node
                        const nodeIds = ['farm', 'warehouse', 'processing', 'distribution', 'retail'];
                        state.nodeThrough[nodeIds[this.pathIndex]]++;

                        if (this.pathIndex >= 4) {
                            this.state = 'fading';
                            state.totalDelivered++;
                        }
                    }

                    // Update position and rotation
                    if (this.pathIndex < 4) {
                        const curve = curves[this.pathIndex];
                        curve.getPointAt(this.progress, this.mesh.position);
                        
                        // Look ahead
                        if (this.progress < 0.99) {
                            const lookAtPt = curve.getPointAt(this.progress + 0.01);
                            this.mesh.lookAt(lookAtPt);
                        }
                    }

                } else if (this.state === 'paused') {
                    this.timer += dt * speed;
                    let pauseDuration = 1.0; // 1s base pause
                    
                    // Bottleneck logic at Processing node (index 2)
                    if (this.pathIndex === 2 && state.bottleneckActive) {
                        pauseDuration = 3.0;
                    }

                    if (this.timer >= pauseDuration) {
                        this.state = 'moving';
                        this.progress = 0;
                    }

                } else if (this.state === 'fading') {
                    this.timer += dt * speed;
                    const opacity = Math.max(0, 1 - (this.timer / 0.5)); // 0.5s fade
                    
                    this.mesh.traverse((child) => {
                        if (child.isMesh) child.material.opacity = opacity;
                    });

                    if (this.timer >= 0.5) {
                        scene.remove(this.mesh);
                        return true; // Signal to remove from array
                    }
                }
                return false;
            }
        }

        // --- INTERACTION & CONTROLS ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodeMeshes);

            if (intersects.length > 0) {
                window.__3D_STATE__.selectedNode = intersects[0].object.userData.id;
            } else {
                window.__3D_STATE__.selectedNode = null;
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'b') {
                window.__3D_STATE__.bottleneckActive = !window.__3D_STATE__.bottleneckActive;
                bottleneckRing.visible = window.__3D_STATE__.bottleneckActive;
            } else if (key === 'h') {
                window.__3D_STATE__.heatmapActive = !window.__3D_STATE__.heatmapActive;
            }
        });

        // DOM UI Events
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');
        const sliderSpeed = document.getElementById('slider-speed');
        const speedLabel = document.getElementById('speed-label');

        btnStart.addEventListener('click', () => {
            if (!window.__3D_STATE__.modelLoaded) return;
            window.__3D_STATE__.simulationRunning = true;
            window.__3D_STATE__.paused = false;
            btnStart.innerText = 'Running';
            btnPause.innerText = 'Pause';
        });

        btnPause.addEventListener('click', () => {
            if (!window.__3D_STATE__.simulationRunning) return;
            window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
            btnPause.innerText = window.__3D_STATE__.paused ? 'Resume' : 'Pause';
        });

        btnReset.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.simulationRunning = false;
            state.paused = false;
            state.totalSpawned = 0;
            state.totalDelivered = 0;
            state.nodeThrough = { farm: 0, warehouse: 0, processing: 0, distribution: 0, retail: 0 };
            
            activeAvocados.forEach(avo => scene.remove(avo.mesh));
            activeAvocados = [];
            spawnTimer = 0;

            btnStart.innerText = 'Start';
            btnPause.innerText = 'Pause';
        });

        sliderSpeed.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.speedMultiplier = val || 1.0;
            speedLabel.innerText = val.toFixed(1) + 'x';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function updateUI() {
            const state = window.__3D_STATE__;
            document.getElementById('hud-spawned').innerText = state.totalSpawned || 0;
            document.getElementById('hud-transit').innerText = state.inTransitCount || 0;
            document.getElementById('hud-delivered').innerText = state.totalDelivered || 0;

            const selNameEl = document.getElementById('hud-sel-name');
            const selThroughEl = document.getElementById('hud-sel-through');

            if (state.selectedNode) {
                const nodeData = nodesData.find(n => n.id === state.selectedNode);
                selNameEl.innerText = nodeData ? nodeData.name : 'Unknown';
                selThroughEl.innerText = state.nodeThrough[state.selectedNode] || 0;
            } else {
                selNameEl.innerText = 'None';
                selThroughEl.innerText = '-';
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            const state = window.__3D_STATE__;

            controls.update();

            // Spawning Logic
            if (state.simulationRunning && !state.paused && state.modelLoaded) {
                spawnTimer += dt;
                const spawnInterval = 2.0 / state.speedMultiplier;
                
                if (spawnTimer >= spawnInterval) {
                    spawnTimer = 0;
                    if (activeAvocados.length < 10) {
                        activeAvocados.push(new AvocadoItem());
                    }
                }
            }

            // Update Avocados
            if (!state.paused) {
                for (let i = activeAvocados.length - 1; i >= 0; i--) {
                    const isDone = activeAvocados[i].update(dt);
                    if (isDone) {
                        activeAvocados.splice(i, 1);
                    }
                }
            }

            // Update Node Visuals (Selection & Heatmap)
            nodeMeshes.forEach(mesh => {
                const id = mesh.userData.id;
                if (state.selectedNode === id) {
                    mesh.material.emissive.setHex(0xffff00);
                    mesh.material.emissiveIntensity = 1.0;
                } else if (state.heatmapActive) {
                    mesh.material.emissive.setHex(mesh.userData.color);
                    const count = state.nodeThrough[id] || 0;
                    mesh.material.emissiveIntensity = Math.min(count / 10.0, 1.0);
                } else {
                    mesh.material.emissive.setHex(0x000000);
                    mesh.material.emissiveIntensity = 0;
                }
            });

            // Update State Exports
            state.inTransitCount = activeAvocados.length;
            state.avocadoPositions = activeAvocados.map(a => ({
                x: a.mesh.position.x || 0,
                y: a.mesh.position.y || 0,
                z: a.mesh.position.z || 0
            }));

            updateUI();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
