<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Miniature Sunglasses Try-On Diorama</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f1f3a, #2e4f7a);
    }

    canvas {
      display: block;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #instructions {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      background: rgba(0,0,0,0.35);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      pointer-events: auto;
      backdrop-filter: blur(6px);
    }

    #sliderWrap {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      background: rgba(0,0,0,0.35);
      padding: 12px 18px;
      border-radius: 14px;
      text-align: center;
      pointer-events: auto;
      backdrop-filter: blur(6px);
    }

    #sliderWrap label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    #tintSlider {
      width: 260px;
    }

    #priceTag {
      position: absolute;
      top: 20px;
      right: 20px;
      min-width: 190px;
      color: #2b1b0f;
      background: #f6dfb8;
      border: 2px solid #b48543;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      font-weight: bold;
      pointer-events: none;
    }

    #priceTag .small {
      display: block;
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
      font-weight: normal;
    }

    #vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      background:
        radial-gradient(circle at center,
          rgba(0,0,0,0) 45%,
          rgba(0,0,0,0.18) 70%,
          rgba(0,0,0,0.45) 100%);
    }

    .hidden-ui {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="instructions">
      <div><strong>Controls</strong></div>
      <div>1-5: Select sunglasses</div>
      <div>← / →: Rotate mannequin</div>
      <div>Z: Zoom face</div>
      <div>L: Toggle lamp</div>
      <div>R: Rotate platform</div>
      <div>S: Screenshot mode</div>
    </div>

    <div id="priceTag">Select a style (1-5)<span class="small">Price will appear here</span></div>

    <div id="sliderWrap">
      <label for="tintSlider">Lens Tint</label>
      <input id="tintSlider" type="range" min="0" max="100" value="50" />
    </div>
  </div>

  <div id="vignette"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = null;
    scene.fog = new THREE.Fog(0x1e3556, 7, 16);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 1.2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minPolarAngle = 0.3;
    controls.maxPolarAngle = 1.4;
    controls.target.set(0, 1.2, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(3, 5, 2);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -6;
    dirLight.shadow.camera.right = 6;
    dirLight.shadow.camera.top = 6;
    dirLight.shadow.camera.bottom = -6;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 20;
    scene.add(dirLight);

    const fillLight = new THREE.PointLight(0x88aaff, 0.5, 12);
    fillLight.position.set(-2, 3, -1);
    scene.add(fillLight);

    const hemi = new THREE.HemisphereLight(0x7aa2ff, 0x3d2b1f, 0.25);
    scene.add(hemi);

    const dioramaRoot = new THREE.Group();
    scene.add(dioramaRoot);

    const platformMat = new THREE.MeshStandardMaterial({
      color: 0xd4a574,
      roughness: 0.75,
      metalness: 0.1
    });

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(2.5, 2.5, 0.15, 64),
      platformMat
    );
    platform.position.y = 0;
    platform.receiveShadow = true;
    platform.castShadow = false;
    dioramaRoot.add(platform);

    const groundShadow = new THREE.Mesh(
      new THREE.CircleGeometry(2.65, 64),
      new THREE.ShadowMaterial({ opacity: 0.18 })
    );
    groundShadow.rotation.x = -Math.PI / 2;
    groundShadow.position.y = 0.076;
    groundShadow.receiveShadow = true;
    dioramaRoot.add(groundShadow);

    const mannequinHead = new THREE.Group();
    mannequinHead.name = "mannequinHead";
    dioramaRoot.add(mannequinHead);

    const skinMat = new THREE.MeshStandardMaterial({
      color: 0xf5deb3,
      roughness: 0.8,
      metalness: 0.05
    });

    const darkMat = new THREE.MeshStandardMaterial({
      color: 0x333333,
      roughness: 0.6,
      metalness: 0.2
    });

    const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), skinMat);
    head.position.set(0, 1.5, 0);
    head.castShadow = true;
    head.receiveShadow = true;
    mannequinHead.add(head);

    const nose = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.12, 8), skinMat);
    nose.rotation.x = Math.PI / 2;
    nose.position.set(0, 1.45, 0.38);
    nose.castShadow = true;
    mannequinHead.add(nose);

    const leftEar = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), skinMat);
    leftEar.position.set(-0.38, 1.5, 0);
    leftEar.castShadow = true;
    mannequinHead.add(leftEar);

    const rightEar = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), skinMat);
    rightEar.position.set(0.38, 1.5, 0);
    rightEar.castShadow = true;
    mannequinHead.add(rightEar);

    const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.15, 0.4, 16), skinMat);
    neck.position.set(0, 1.05, 0);
    neck.castShadow = true;
    neck.receiveShadow = true;
    mannequinHead.add(neck);

    const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.3, 0.7, 16), darkMat);
    pedestal.position.set(0, 0.5, 0);
    pedestal.castShadow = true;
    pedestal.receiveShadow = true;
    mannequinHead.add(pedestal);

    const sunglassesData = [
      { name: "Aviator", price: 129, origin: new THREE.Vector3(-1.5, 0.3, -0.5) },
      { name: "Wayfarer", price: 99, origin: new THREE.Vector3(-0.7, 0.3, -1.2) },
      { name: "Round", price: 149, origin: new THREE.Vector3(0.3, 0.3, -1.2) },
      { name: "CatEye", price: 119, origin: new THREE.Vector3(1.2, 0.3, -0.5) },
      { name: "Sport", price: 179, origin: new THREE.Vector3(1.5, 0.3, 0.5) }
    ];

    const wearPosition = new THREE.Vector3(0, 1.55, 0.35);
    const sunglasses = [];
    const lensGroups = [];

    function applyShadows(group) {
      group.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });
    }

    function createLensMaterial(color, opts = {}) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: opts.roughness ?? 0.15,
        metalness: opts.metalness ?? 0.3,
        transparent: true,
        opacity: opts.opacity ?? 0.6,
        emissive: 0x000000,
        emissiveIntensity: 0
      });
    }

    function createFrameMaterial(color, opts = {}) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness: opts.roughness ?? 0.35,
        metalness: opts.metalness ?? 0.7,
        emissive: 0x000000,
        emissiveIntensity: 0
      });
    }

    function addSelectionGlow(group, active) {
      group.traverse(obj => {
        if (obj.material) {
          const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
          mats.forEach(m => {
            if ("emissiveIntensity" in m) {
              m.emissive = new THREE.Color(0xffffff);
              m.emissiveIntensity = active ? 0.15 : 0.0;
            }
          });
        }
      });
    }

    function collectLensMaterials(group, store) {
      group.traverse(obj => {
        if (obj.userData.isLens && obj.material) {
          store.push(obj.material);
        }
      });
    }

    function createAviator() {
      const g = new THREE.Group();

      const lensMat = createLensMaterial(0x2a5a2a, { metalness: 0.8, roughness: 0.1, opacity: 0.6 });
      const frameMat = createFrameMaterial(0xd4af37, { metalness: 0.9, roughness: 0.2 });

      const leftLens = new THREE.Mesh(new THREE.SphereGeometry(0.16, 24, 24), lensMat);
      leftLens.scale.set(0.8, 1.15, 0.18);
      leftLens.position.set(-0.18, 0, 0);
      leftLens.userData.isLens = true;

      const rightLens = leftLens.clone();
      rightLens.position.x = 0.18;

      const leftRing = new THREE.Mesh(new THREE.TorusGeometry(0.14, 0.015, 12, 32), frameMat);
      leftRing.scale.set(0.9, 1.2, 1);
      leftRing.position.set(-0.18, 0, 0.01);

      const rightRing = leftRing.clone();
      rightRing.position.x = 0.18;

      const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.1, 8), frameMat);
      bridge.rotation.z = Math.PI / 2;
      bridge.position.set(0, 0.04, 0.01);

      const leftTemple = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.015, 0.015), frameMat);
      leftTemple.position.set(-0.33, 0.02, -0.06);
      leftTemple.rotation.y = 0.4;

      const rightTemple = leftTemple.clone();
      rightTemple.position.set(0.33, 0.02, -0.06);
      rightTemple.rotation.y = -0.4;

      g.add(leftLens, rightLens, leftRing, rightRing, bridge, leftTemple, rightTemple);
      g.rotation.x = 0.1;
      return g;
    }

    function createWayfarer() {
      const g = new THREE.Group();

      const lensMat = createLensMaterial(0x1a1a2e, { roughness: 0.1, metalness: 0.2, opacity: 0.65 });
      const frameMat = createFrameMaterial(0x111111, { roughness: 0.25, metalness: 0.15 });

      const leftLens = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.15, 0.03), lensMat);
      leftLens.position.set(-0.17, 0, 0);
      leftLens.userData.isLens = true;

      const rightLens = leftLens.clone();
      rightLens.position.x = 0.17;

      const topBar = new THREE.Mesh(new THREE.BoxGeometry(0.62, 0.05, 0.04), frameMat);
      topBar.position.set(0, 0.07, 0);

      const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.19, 0.02), frameMat);
      leftFrame.position.set(-0.17, 0, -0.005);

      const rightFrame = leftFrame.clone();
      rightFrame.position.x = 0.17;

      const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.07, 0.03, 0.03), frameMat);
      bridge.position.set(0, 0.01, 0);

      const leftTemple = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.03, 0.02), frameMat);
      leftTemple.position.set(-0.42, 0.05, -0.06);
      leftTemple.rotation.y = 0.45;

      const rightTemple = leftTemple.clone();
      rightTemple.position.set(0.42, 0.05, -0.06);
      rightTemple.rotation.y = -0.45;

      g.add(leftFrame, rightFrame, leftLens, rightLens, topBar, bridge, leftTemple, rightTemple);
      return g;
    }

    function createRound() {
      const g = new THREE.Group();

      const lensMat = createLensMaterial(0xff6b35, { opacity: 0.7, roughness: 0.1, metalness: 0.3 });
      const frameMat = createFrameMaterial(0xc0c0c0, { roughness: 0.2, metalness: 0.95 });

      const leftLens = new THREE.Mesh(new THREE.CylinderGeometry(0.12, 0.12, 0.025, 32), lensMat);
      leftLens.rotation.x = Math.PI / 2;
      leftLens.position.set(-0.16, 0, 0);
      leftLens.userData.isLens = true;

      const rightLens = leftLens.clone();
      rightLens.position.x = 0.16;

      const leftRing = new THREE.Mesh(new THREE.TorusGeometry(0.125, 0.01, 10, 32), frameMat);
      leftRing.position.set(-0.16, 0, 0.012);

      const rightRing = leftRing.clone();
      rightRing.position.x = 0.16;

      const bridge = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.09, 8), frameMat);
      bridge.rotation.z = Math.PI / 2;
      bridge.position.set(0, 0.02, 0);

      const leftTemple = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.015, 0.015), frameMat);
      leftTemple.position.set(-0.37, 0.02, -0.05);
      leftTemple.rotation.y = 0.4;

      const rightTemple = leftTemple.clone();
      rightTemple.position.set(0.37, 0.02, -0.05);
      rightTemple.rotation.y = -0.4;

      g.add(leftLens, rightLens, leftRing, rightRing, bridge, leftTemple, rightTemple);
      return g;
    }

    function createCatEye() {
      const g = new THREE.Group();

      const lensMat = createLensMaterial(0x4a0e4e, { opacity: 0.6, roughness: 0.12, metalness: 0.25 });
      const frameMat = createFrameMaterial(0xff69b4, { roughness: 0.25, metalness: 0.5 });

      const leftLens = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.12, 0.025), lensMat);
      leftLens.position.set(-0.17, 0.02, 0);
      leftLens.rotation.z = 0.22;
      leftLens.userData.isLens = true;

      const rightLens = leftLens.clone();
      rightLens.position.set(0.17, 0.02, 0);
      rightLens.rotation.z = -0.22;

      const leftFrame = new THREE.Mesh(new THREE.BoxGeometry(0.28, 0.14, 0.02), frameMat);
      leftFrame.position.set(-0.17, 0.02, -0.004);
      leftFrame.rotation.z = 0.22;

      const rightFrame = leftFrame.clone();
      rightFrame.position.set(0.17, 0.02, -0.004);
      rightFrame.rotation.z = -0.22;

      const wingL = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.03, 0.02), frameMat);
      wingL.position.set(-0.3, 0.1, 0);
      wingL.rotation.z = 0.45;

      const wingR = wingL.clone();
      wingR.position.set(0.3, 0.1, 0);
      wingR.rotation.z = -0.45;

      const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.02, 0.02), frameMat);
      bridge.position.set(0, 0.02, 0);

      const leftTemple = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.02, 0.02), frameMat);
      leftTemple.position.set(-0.42, 0.05, -0.06);
      leftTemple.rotation.y = 0.45;

      const rightTemple = leftTemple.clone();
      rightTemple.position.set(0.42, 0.05, -0.06);
      rightTemple.rotation.y = -0.45;

      g.add(leftFrame, rightFrame, leftLens, rightLens, wingL, wingR, bridge, leftTemple, rightTemple);
      return g;
    }

    function createSport() {
      const g = new THREE.Group();

      const lensMat = createLensMaterial(0x1a1a1a, { opacity: 0.7, roughness: 0.08, metalness: 0.9 });
      const frameMat = createFrameMaterial(0xcc0000, { roughness: 0.25, metalness: 0.5 });

      const pts = [];
      for (let i = 0; i <= 12; i++) {
        const t = -0.4 + (i / 12) * 0.8;
        pts.push(new THREE.Vector2(Math.sin((i / 12) * Math.PI) * 0.05 + 0.22, t));
      }
      const wrapLens = new THREE.Mesh(new THREE.LatheGeometry(pts, 32, -0.9, 1.8), lensMat);
      wrapLens.rotation.z = Math.PI / 2;
      wrapLens.rotation.y = Math.PI / 2;
      wrapLens.scale.set(0.7, 0.45, 0.18);
      wrapLens.userData.isLens = true;

      const topFrame = new THREE.Mesh(new THREE.BoxGeometry(0.56, 0.05, 0.04), frameMat);
      topFrame.position.set(0, 0.08, 0);

      const leftTemple = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.025, 0.025), frameMat);
      leftTemple.position.set(-0.4, 0.03, -0.08);
      leftTemple.rotation.y = 0.55;

      const rightTemple = leftTemple.clone();
      rightTemple.position.set(0.4, 0.03, -0.08);
      rightTemple.rotation.y = -0.55;

      g.add(wrapLens, topFrame, leftTemple, rightTemple);
      return g;
    }

    const builders = [createAviator, createWayfarer, createRound, createCatEye, createSport];

    builders.forEach((build, i) => {
      const g = build();
      g.position.copy(sunglassesData[i].origin);
      g.userData.origin = sunglassesData[i].origin.clone();
      g.userData.target = sunglassesData[i].origin.clone();
      g.userData.name = sunglassesData[i].name;
      g.userData.price = sunglassesData[i].price;
      applyShadows(g);

      const lensMats = [];
      collectLensMaterials(g, lensMats);
      lensGroups.push(lensMats);

      dioramaRoot.add(g);
      sunglasses.push(g);
    });

    const lampLoader = new GLTFLoader();
    let lampModel = null;
    let lampOn = false;
    let lampLight = null;
    let lampModelLoaded = false;
    const lampPos = new THREE.Vector3(-1.2, 0.15, 0.8);

    lampLoader.load(
      "IridescenceLamp.glb",
      (gltf) => {
        lampModel = gltf.scene;
        lampModel.scale.set(0.5, 0.5, 0.5);
        lampModel.position.copy(lampPos);
        lampModel.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
              mats.forEach(m => {
                if ("emissiveIntensity" in m) {
                  m.emissive = new THREE.Color(0xffcc88);
                  m.emissiveIntensity = 0;
                }
              });
            }
          }
        });
        dioramaRoot.add(lampModel);
        lampModelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load IridescenceLamp.glb", err);
      }
    );

    function setLampState(on) {
      lampOn = on;
      if (lampOn) {
        if (!lampLight) {
          lampLight = new THREE.PointLight(0xffdd88, 1.5, 4);
          lampLight.position.copy(lampPos).add(new THREE.Vector3(0, 0.6, 0));
          lampLight.castShadow = true;
          scene.add(lampLight);
        }
        lampLight.visible = true;
      } else if (lampLight) {
        lampLight.visible = false;
      }

      if (lampModel) {
        lampModel.traverse(obj => {
          if (obj.isMesh && obj.material) {
            const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
            mats.forEach(m => {
              if ("emissiveIntensity" in m) {
                m.emissive = new THREE.Color(0xffcc88);
                m.emissiveIntensity = lampOn ? 0.8 : 0;
              }
            });
          }
        });
      }
    }

    const tintSlider = document.getElementById("tintSlider");
    const priceTag = document.getElementById("priceTag");
    const ui = document.getElementById("ui");
    const vignette = document.getElementById("vignette");

    let selectedIndex = -1;
    let headRotationDeg = 0;
    let isZoomed = false;
    let platformRotating = false;
    let screenshotMode = false;
    let lensOpacity = 0.2 + (parseInt(tintSlider.value, 10) / 100) * 0.8;

    const cameraAnim = {
      active: false,
      start: new THREE.Vector3(),
      end: new THREE.Vector3(),
      startTarget: new THREE.Vector3(),
      endTarget: new THREE.Vector3(),
      duration: 400,
      elapsed: 0
    };

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function animateCamera(toPos, toTarget, duration = 400) {
      cameraAnim.active = true;
      cameraAnim.elapsed = 0;
      cameraAnim.duration = duration;
      cameraAnim.start.copy(camera.position);
      cameraAnim.end.copy(toPos);
      cameraAnim.startTarget.copy(controls.target);
      cameraAnim.endTarget.copy(toTarget);
    }

    function updatePriceTag() {
      if (selectedIndex === -1) {
        priceTag.innerHTML = `Select a style (1-5)<span class="small">Price will appear here</span>`;
      } else {
        const item = sunglassesData[selectedIndex];
        priceTag.innerHTML = `${item.name} — $${item.price}<span class="small">Selected sunglasses style</span>`;
      }
    }

    function setSelected(index) {
      if (index < 0 || index >= sunglasses.length) return;

      selectedIndex = index;

      sunglasses.forEach((g, i) => {
        g.userData.target.copy(i === selectedIndex ? wearPosition : g.userData.origin);
        addSelectionGlow(g, i === selectedIndex);
      });

      lensGroups[selectedIndex].forEach(mat => {
        mat.opacity = lensOpacity;
      });

      updatePriceTag();
    }

    tintSlider.addEventListener("input", () => {
      lensOpacity = 0.2 + (parseInt(tintSlider.value, 10) / 100) * 0.8;
      if (selectedIndex !== -1) {
        lensGroups[selectedIndex].forEach(mat => {
          mat.opacity = lensOpacity;
          mat.transparent = true;
        });
      }
    });

    window.addEventListener("keydown", (e) => {
      if (["1","2","3","4","5"].includes(e.key)) {
        setSelected(parseInt(e.key, 10) - 1);
      }

      if (e.key === "ArrowLeft") {
        headRotationDeg = Math.max(-90, headRotationDeg - 15);
      }

      if (e.key === "ArrowRight") {
        headRotationDeg = Math.min(90, headRotationDeg + 15);
      }

      if (e.key.toLowerCase() === "z") {
        isZoomed = !isZoomed;
        if (isZoomed) {
          animateCamera(new THREE.Vector3(0, 1.8, 2.2), new THREE.Vector3(0, 1.5, 0.2), 400);
        } else {
          animateCamera(new THREE.Vector3(0, 2, 5), new THREE.Vector3(0, 1.2, 0), 400);
        }
      }

      if (e.key.toLowerCase() === "l") {
        setLampState(!lampOn);
      }

      if (e.key.toLowerCase() === "r") {
        platformRotating = !platformRotating;
      }

      if (e.key.toLowerCase() === "s") {
        screenshotMode = !screenshotMode;
        ui.classList.toggle("hidden-ui", screenshotMode);
        vignette.style.opacity = screenshotMode ? "1" : "0";
      }
    });

    window.__3D_STATE__ = {
      selectedIndex: -1,
      selectedName: "none",
      headRotationDeg: 0,
      lensOpacity: Number(lensOpacity.toFixed(2)),
      isZoomed: false,
      lampOn: false,
      platformRotating: false,
      screenshotMode: false,
      cameraPosition: { x: 0, y: 2, z: 5 },
      sunglassesPositions: [],
      lampModelLoaded: false,
      prices: [129, 99, 149, 119, 179],
      currentPrice: 0
    };

    const clock = new THREE.Clock();

    function updateState() {
      window.__3D_STATE__.selectedIndex = selectedIndex;
      window.__3D_STATE__.selectedName = selectedIndex === -1 ? "none" : sunglassesData[selectedIndex].name;
      window.__3D_STATE__.headRotationDeg = headRotationDeg;
      window.__3D_STATE__.lensOpacity = Number(lensOpacity.toFixed(2));
      window.__3D_STATE__.isZoomed = isZoomed;
      window.__3D_STATE__.lampOn = lampOn;
      window.__3D_STATE__.platformRotating = platformRotating;
      window.__3D_STATE__.screenshotMode = screenshotMode;
      window.__3D_STATE__.cameraPosition = {
        x: Number(camera.position.x.toFixed(2)),
        y: Number(camera.position.y.toFixed(2)),
        z: Number(camera.position.z.toFixed(2))
      };
      window.__3D_STATE__.sunglassesPositions = sunglasses.map(g => ({
        x: Number(g.position.x.toFixed(2)),
        y: Number(g.position.y.toFixed(2)),
        z: Number(g.position.z.toFixed(2))
      }));
      window.__3D_STATE__.lampModelLoaded = lampModelLoaded;
      window.__3D_STATE__.prices = [129, 99, 149, 119, 179];
      window.__3D_STATE__.currentPrice = selectedIndex === -1 ? 0 : sunglassesData[selectedIndex].price;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      mannequinHead.rotation.y = THREE.MathUtils.degToRad(headRotationDeg);

      sunglasses.forEach(g => {
        g.position.lerp(g.userData.target, Math.min(1, delta / 0.5 * 1.2));
      });

      if (cameraAnim.active) {
        cameraAnim.elapsed += delta * 1000;
        const t = Math.min(1, cameraAnim.elapsed / cameraAnim.duration);
        const et = easeInOut(t);
        camera.position.lerpVectors(cameraAnim.start, cameraAnim.end, et);
        controls.target.lerpVectors(cameraAnim.startTarget, cameraAnim.endTarget, et);
        if (t >= 1) cameraAnim.active = false;
      }

      if (platformRotating) {
        dioramaRoot.rotation.y += 0.5 * delta;
      }

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    updatePriceTag();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
