<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Miniature Sunglasses Try-On Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a2a40;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #ui-layer.hidden {
            opacity: 0;
        }
        #priceTag {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            color: #333;
            font-size: 1.2rem;
            font-weight: bold;
            pointer-events: auto;
            border-left: 5px solid #d4a574;
            transition: transform 0.2s ease;
        }
        #controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            pointer-events: auto;
            color: white;
            backdrop-filter: blur(5px);
        }
        input[type=range] {
            -webkit-appearance: none;
            width: 150px;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #555;
            border-radius: 2px;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            pointer-events: none;
        }
        #vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #vignette.active {
            opacity: 1;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.5rem;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading" class="loading">Loading Diorama...</div>
    <div id="vignette"></div>
    <div id="ui-layer">
        <div id="priceTag">Select a style (1-5)</div>
        <div id="controls">
            <label for="tintSlider">Lens Tint</label>
            <input type="range" id="tintSlider" min="0" max="100" value="50">
        </div>
        <div id="instructions">1-5: Select | &larr;&rarr;: Rotate Head | Z: Zoom | L: Lamp | R: Rotate Platform | S: Screenshot</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            selectedIndex: -1,
            selectedName: 'none',
            headRotationDeg: 0,
            lensOpacity: 0.6,
            isZoomed: false,
            lampOn: false,
            platformRotating: false,
            screenshotMode: false,
            cameraPosition: { x: 0, y: 2, z: 5 },
            sunglassesPositions: [],
            lampModelLoaded: false,
            prices: [129, 99, 149, 119, 179],
            currentPrice: 0
        };

        const stylesData = [
            { name: 'Aviator', price: 129, pos: new THREE.Vector3(-1.5, 0.3, -0.5) },
            { name: 'Wayfarer', price: 99, pos: new THREE.Vector3(-0.7, 0.3, -1.2) },
            { name: 'Round', price: 149, pos: new THREE.Vector3(0.3, 0.3, -1.2) },
            { name: 'CatEye', price: 119, pos: new THREE.Vector3(1.2, 0.3, -0.5) },
            { name: 'Sport', price: 179, pos: new THREE.Vector3(1.5, 0.3, 0.5) }
        ];

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a2a40);
        scene.fog = new THREE.FogExp2(0x1a2a40, 0.05);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minPolarAngle = 0.3;
        controls.maxPolarAngle = 1.4;
        controls.minDistance = 2;
        controls.maxDistance = 8;
        controls.target.set(0, 0.5, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(3, 5, 2);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 15;
        dirLight.shadow.camera.left = -3;
        dirLight.shadow.camera.right = 3;
        dirLight.shadow.camera.top = 3;
        dirLight.shadow.camera.bottom = -3;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        const fillLight = new THREE.PointLight(0x88aaff, 0.5);
        fillLight.position.set(-2, 3, -1);
        scene.add(fillLight);

        // --- Diorama Group ---
        const dioramaGroup = new THREE.Group();
        scene.add(dioramaGroup);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.15, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0xd4a574, 
            roughness: 0.8,
            metalness: 0.1
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        platform.receiveShadow = true;
        dioramaGroup.add(platform);

        // --- Mannequin Head ---
        const mannequinHead = new THREE.Group();
        dioramaGroup.add(mannequinHead);

        const skinMat = new THREE.MeshStandardMaterial({ color: 0xf5deb3, roughness: 0.5 });
        
        const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const head = new THREE.Mesh(headGeo, skinMat);
        head.position.set(0, 1.5, 0);
        head.castShadow = true;
        head.receiveShadow = true;
        mannequinHead.add(head);

        const noseGeo = new THREE.ConeGeometry(0.05, 0.12, 8);
        noseGeo.rotateX(Math.PI / 2);
        const nose = new THREE.Mesh(noseGeo, skinMat);
        nose.position.set(0, 1.45, 0.38);
        nose.castShadow = true;
        mannequinHead.add(nose);

        const earGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const leftEar = new THREE.Mesh(earGeo, skinMat);
        leftEar.position.set(-0.38, 1.5, 0);
        leftEar.castShadow = true;
        mannequinHead.add(leftEar);
        
        const rightEar = new THREE.Mesh(earGeo, skinMat);
        rightEar.position.set(0.38, 1.5, 0);
        rightEar.castShadow = true;
        mannequinHead.add(rightEar);

        const neckGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.4, 16);
        const neck = new THREE.Mesh(neckGeo, skinMat);
        neck.position.set(0, 1.05, 0);
        neck.castShadow = true;
        mannequinHead.add(neck);

        const pedestalGeo = new THREE.CylinderGeometry(0.2, 0.3, 0.7, 16);
        const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.7 });
        const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
        pedestal.position.set(0, 0.5, 0);
        pedestal.castShadow = true;
        pedestal.receiveShadow = true;
        mannequinHead.add(pedestal);

        // --- Lamp Prop ---
        let lampMaterials = [];
        const lampLight = new THREE.PointLight(0xffdd88, 0, 4);
        lampLight.position.set(-1.2, 0.8, 0.8);
        dioramaGroup.add(lampLight);

        const loader = new GLTFLoader();
        // Using a reliable public URL for the requested model
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/IridescenceLamp/glTF-Binary/IridescenceLamp.glb',
            (gltf) => {
                const lamp = gltf.scene;
                lamp.scale.set(0.5, 0.5, 0.5);
                lamp.position.set(-1.2, 0.15, 0.8);
                
                lamp.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        if (child.material.emissive) {
                            lampMaterials.push(child.material);
                            child.material.emissiveIntensity = 0;
                        }
                    }
                });
                
                dioramaGroup.add(lamp);
                window.__3D_STATE__.lampModelLoaded = true;
                document.getElementById('loading').style.display = 'none';
            },
            undefined,
            (error) => {
                console.warn('Could not load lamp model, continuing without it.', error);
                document.getElementById('loading').style.display = 'none';
            }
        );

        // --- Sunglasses Construction ---
        const sunglassesGroups = [];
        const facePosition = new THREE.Vector3(0, 1.55, 0.35);
        
        function createLensMaterial(color, opacity, metalness = 0.1, roughness = 0.1) {
            return new THREE.MeshStandardMaterial({
                color: color,
                transparent: true,
                opacity: opacity,
                metalness: metalness,
                roughness: roughness,
                side: THREE.DoubleSide
            });
        }

        function createFrameMaterial(color, metalness = 0.1) {
            return new THREE.MeshStandardMaterial({
                color: color,
                metalness: metalness,
                roughness: 0.2
            });
        }

        function buildSunglasses(index) {
            const group = new THREE.Group();
            const lenses = [];
            const frames = [];
            
            let frameMat, lensMat;

            switch(index) {
                case 0: // Aviator
                    frameMat = createFrameMaterial(0xd4af37, 0.8);
                    lensMat = createLensMaterial(0x2a5a2a, 0.6, 0.8, 0.2);
                    
                    for(let i of [-1, 1]) {
                        const frame = new THREE.Mesh(new THREE.TorusGeometry(0.12, 0.015, 8, 24), frameMat);
                        frame.scale.set(1, 0.8, 1);
                        frame.position.set(i * 0.13, 0, 0);
                        frames.push(frame);
                        
                        const lens = new THREE.Mesh(new THREE.SphereGeometry(0.11, 16, 16), lensMat);
                        lens.scale.set(1, 0.8, 0.1);
                        lens.position.set(i * 0.13, 0, 0);
                        lenses.push(lens);
                    }
                    const bridge0 = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.08), frameMat);
                    bridge0.rotation.z = Math.PI / 2;
                    bridge0.position.y = 0.05;
                    frames.push(bridge0);
                    break;

                case 1: // Wayfarer
                    frameMat = createFrameMaterial(0x111111);
                    lensMat = createLensMaterial(0x1a1a2e, 0.6, 0.1, 0.1);
                    
                    for(let i of [-1, 1]) {
                        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.26, 0.18, 0.04), frameMat);
                        frame.position.set(i * 0.14, 0, 0);
                        frames.push(frame);
                        
                        const lens = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.14, 0.05), lensMat);
                        lens.position.set(i * 0.14, 0, 0);
                        lenses.push(lens);
                    }
                    const bridge1 = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.04, 0.04), frameMat);
                    bridge1.position.y = 0.04;
                    frames.push(bridge1);
                    break;

                case 2: // Round
                    frameMat = createFrameMaterial(0xcccccc, 0.9);
                    lensMat = createLensMaterial(0xff6b35, 0.7);
                    
                    for(let i of [-1, 1]) {
                        const frame = new THREE.Mesh(new THREE.TorusGeometry(0.1, 0.015, 8, 24), frameMat);
                        frame.position.set(i * 0.12, 0, 0);
                        frames.push(frame);
                        
                        const lens = new THREE.Mesh(new THREE.CylinderGeometry(0.095, 0.095, 0.01, 16), lensMat);
                        lens.rotation.x = Math.PI / 2;
                        lens.position.set(i * 0.12, 0, 0);
                        lenses.push(lens);
                    }
                    const bridge2 = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.06), frameMat);
                    bridge2.rotation.z = Math.PI / 2;
                    frames.push(bridge2);
                    break;

                case 3: // CatEye
                    frameMat = createFrameMaterial(0xff69b4);
                    lensMat = createLensMaterial(0x4a0e4e, 0.6);
                    
                    for(let i of [-1, 1]) {
                        const frame = new THREE.Mesh(new THREE.BoxGeometry(0.24, 0.16, 0.03), frameMat);
                        frame.position.set(i * 0.13, 0, 0);
                        frame.rotation.z = i * 0.2;
                        
                        // Add the "cat eye" point
                        const point = new THREE.Mesh(new THREE.ConeGeometry(0.05, 0.1, 4), frameMat);
                        point.position.set(i * 0.1, 0.08, 0);
                        point.rotation.z = i * -0.5;
                        frame.add(point);
                        
                        frames.push(frame);
                        
                        const lens = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.12, 0.04), lensMat);
                        lens.position.set(i * 0.13, 0, 0);
                        lens.rotation.z = i * 0.2;
                        lenses.push(lens);
                    }
                    const bridge3 = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.03, 0.03), frameMat);
                    frames.push(bridge3);
                    break;

                case 4: // Sport
                    frameMat = createFrameMaterial(0xcc0000);
                    lensMat = createLensMaterial(0x1a1a1a, 0.6, 0.9, 0.1);
                    
                    // Single wraparound lens
                    const lensGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 32, 1, false, Math.PI * 0.25, Math.PI * 0.5);
                    const lens = new THREE.Mesh(lensGeo, lensMat);
                    lens.rotation.y = -Math.PI / 2;
                    lens.position.z = -0.15;
                    lenses.push(lens);
                    
                    // Top frame
                    const topFrameGeo = new THREE.CylinderGeometry(0.26, 0.26, 0.04, 32, 1, false, Math.PI * 0.25, Math.PI * 0.5);
                    const topFrame = new THREE.Mesh(topFrameGeo, frameMat);
                    topFrame.rotation.y = -Math.PI / 2;
                    topFrame.position.set(0, 0.08, -0.15);
                    frames.push(topFrame);
                    break;
            }

            // Add arms to all
            const armGeo = new THREE.BoxGeometry(0.02, 0.02, 0.3);
            for(let i of [-1, 1]) {
                const arm = new THREE.Mesh(armGeo, frameMat);
                arm.position.set(i * 0.25, 0, -0.15);
                frames.push(arm);
            }

            frames.forEach(f => { f.castShadow = true; group.add(f); });
            lenses.forEach(l => { l.castShadow = true; group.add(l); });

            group.userData = {
                id: index,
                originalPos: stylesData[index].pos.clone(),
                originalQuat: new THREE.Quaternion(),
                lenses: lenses,
                frames: frames
            };

            group.position.copy(group.userData.originalPos);
            
            // Orient slightly towards center when on platform
            group.lookAt(0, 0.3, 0);
            group.userData.originalQuat.copy(group.quaternion);

            dioramaGroup.add(group);
            sunglassesGroups.push(group);
            window.__3D_STATE__.sunglassesPositions.push({x: group.position.x, y: group.position.y, z: group.position.z});
        }

        for(let i=0; i<5; i++) buildSunglasses(i);

        // --- Animation System ---
        const animations = [];
        
        function animateProperty(obj, prop, target, duration, onComplete) {
            const start = obj[prop].clone ? obj[prop].clone() : obj[prop];
            animations.push({
                obj, prop, start, target, duration,
                startTime: performance.now(),
                onComplete
            });
        }

        function updateAnimations(time) {
            for (let i = animations.length - 1; i >= 0; i--) {
                const anim = animations[i];
                let t = (time - anim.startTime) / anim.duration;
                
                if (t >= 1) {
                    t = 1;
                    if (anim.target instanceof THREE.Vector3) anim.obj[anim.prop].copy(anim.target);
                    else if (anim.target instanceof THREE.Quaternion) anim.obj[anim.prop].copy(anim.target);
                    else anim.obj[anim.prop] = anim.target;
                    
                    if (anim.onComplete) anim.onComplete();
                    animations.splice(i, 1);
                } else {
                    // Ease out cubic
                    const easeT = 1 - Math.pow(1 - t, 3);
                    if (anim.target instanceof THREE.Vector3) {
                        anim.obj[anim.prop].lerpVectors(anim.start, anim.target, easeT);
                    } else if (anim.target instanceof THREE.Quaternion) {
                        anim.obj[anim.prop].slerpQuaternions(anim.start, anim.target, easeT);
                    } else {
                        anim.obj[anim.prop] = anim.start + (anim.target - anim.start) * easeT;
                    }
                }
            }
        }

        // --- Interactions ---
        let targetHeadRotation = 0;

        function selectStyle(index) {
            if (window.__3D_STATE__.selectedIndex === index) return;
            
            const prevIndex = window.__3D_STATE__.selectedIndex;
            window.__3D_STATE__.selectedIndex = index;
            window.__3D_STATE__.selectedName = stylesData[index].name;
            window.__3D_STATE__.currentPrice = stylesData[index].price;
            
            document.getElementById('priceTag').innerHTML = `${stylesData[index].name} - $${stylesData[index].price}`;

            // Animate previous back
            if (prevIndex !== -1) {
                const prevGroup = sunglassesGroups[prevIndex];
                dioramaGroup.attach(prevGroup); // Re-parent to diorama
                animateProperty(prevGroup, 'position', prevGroup.userData.originalPos, 500);
                animateProperty(prevGroup, 'quaternion', prevGroup.userData.originalQuat, 500);
                
                // Remove emissive
                prevGroup.userData.frames.forEach(f => {
                    if(f.material.emissive) f.material.emissive.setHex(0x000000);
                });
            }

            // Animate new to face
            const newGroup = sunglassesGroups[index];
            mannequinHead.attach(newGroup); // Parent to head so it rotates with it
            
            animateProperty(newGroup, 'position', facePosition, 500);
            animateProperty(newGroup, 'quaternion', new THREE.Quaternion(), 500);

            // Add emissive highlight
            newGroup.userData.frames.forEach(f => {
                if(!f.material.emissive) f.material.emissive = new THREE.Color(0x000000);
                f.material.emissive.setHex(0x222222);
            });

            // Apply current tint
            updateTint(window.__3D_STATE__.lensOpacity);
        }

        function updateTint(opacity) {
            window.__3D_STATE__.lensOpacity = opacity;
            if (window.__3D_STATE__.selectedIndex !== -1) {
                const group = sunglassesGroups[window.__3D_STATE__.selectedIndex];
                group.userData.lenses.forEach(l => {
                    l.material.opacity = opacity;
                });
            }
        }

        document.getElementById('tintSlider').addEventListener('input', (e) => {
            const val = parseInt(e.target.value);
            const opacity = 0.2 + (val / 100) * 0.8;
            updateTint(opacity);
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            
            // 1-5 Selection
            if (['1','2','3','4','5'].includes(key)) {
                selectStyle(parseInt(key) - 1);
            }
            
            // Left/Right Head Rotation
            if (e.key === 'ArrowLeft') {
                targetHeadRotation += 15 * (Math.PI / 180);
            } else if (e.key === 'ArrowRight') {
                targetHeadRotation -= 15 * (Math.PI / 180);
            }
            targetHeadRotation = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetHeadRotation));
            
            // Z: Zoom
            if (key === 'z') {
                window.__3D_STATE__.isZoomed = !window.__3D_STATE__.isZoomed;
                const targetPos = window.__3D_STATE__.isZoomed ? new THREE.Vector3(0, 1.8, 2.2) : new THREE.Vector3(0, 2, 5);
                animateProperty(camera, 'position', targetPos, 400);
                animateProperty(controls.target, 'clone', window.__3D_STATE__.isZoomed ? new THREE.Vector3(0, 1.5, 0) : new THREE.Vector3(0, 0.5, 0), 400, () => {
                    controls.target.copy(window.__3D_STATE__.isZoomed ? new THREE.Vector3(0, 1.5, 0) : new THREE.Vector3(0, 0.5, 0));
                });
            }

            // L: Lamp
            if (key === 'l') {
                window.__3D_STATE__.lampOn = !window.__3D_STATE__.lampOn;
                lampLight.intensity = window.__3D_STATE__.lampOn ? 1.5 : 0;
                lampMaterials.forEach(mat => {
                    mat.emissiveIntensity = window.__3D_STATE__.lampOn ? 0.8 : 0;
                });
            }

            // R: Platform Rotation
            if (key === 'r') {
                window.__3D_STATE__.platformRotating = !window.__3D_STATE__.platformRotating;
            }

            // S: Screenshot Mode
            if (key === 's') {
                window.__3D_STATE__.screenshotMode = !window.__3D_STATE__.screenshotMode;
                document.getElementById('ui-layer').classList.toggle('hidden');
                document.getElementById('vignette').classList.toggle('active');
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const time = performance.now();
            const delta = clock.getDelta();

            controls.update();
            updateAnimations(time);

            // Smooth head rotation
            mannequinHead.rotation.y += (targetHeadRotation - mannequinHead.rotation.y) * 0.1;
            window.__3D_STATE__.headRotationDeg = Math.round(mannequinHead.rotation.y * (180 / Math.PI));

            // Platform rotation
            if (window.__3D_STATE__.platformRotating) {
                dioramaGroup.rotation.y += 0.5 * delta;
            }

            // Update State
            window.__3D_STATE__.cameraPosition = {
                x: parseFloat(camera.position.x.toFixed(2)),
                y: parseFloat(camera.position.y.toFixed(2)),
                z: parseFloat(camera.position.z.toFixed(2))
            };
            
            for(let i=0; i<5; i++) {
                const pos = new THREE.Vector3();
                sunglassesGroups[i].getWorldPosition(pos);
                window.__3D_STATE__.sunglassesPositions[i] = {
                    x: parseFloat(pos.x.toFixed(2)),
                    y: parseFloat(pos.y.toFixed(2)),
                    z: parseFloat(pos.z.toFixed(2))
                };
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
