<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sunglasses Try-On Diorama</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#priceTag {
    position: fixed;
    top: 20px;
    right: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(240,235,225,0.95));
    border: 2px solid #c9a96e;
    border-radius: 12px;
    padding: 15px 25px;
    font-size: 16px;
    color: #333;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    z-index: 100;
    min-width: 180px;
    text-align: center;
    transition: all 0.3s ease;
}
#priceTag .name {
    font-weight: 700;
    font-size: 20px;
    color: #2c2c2c;
    margin-bottom: 5px;
}
#priceTag .price {
    font-size: 28px;
    font-weight: 800;
    color: #c9a96e;
}
#priceTag .hint {
    font-size: 13px;
    color: #888;
    margin-top: 5px;
}

#tintControl {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-radius: 25px;
    padding: 12px 30px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 100;
}
#tintControl label {
    color: #ddd;
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
}
#tintSlider {
    width: 200px;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, rgba(255,255,255,0.2), rgba(255,255,255,0.8));
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}
#tintSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #c9a96e;
    border: 2px solid #fff;
    cursor: pointer;
}

#controls {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    padding: 8px 20px;
    color: #aaa;
    font-size: 11px;
    z-index: 100;
    text-align: center;
    white-space: nowrap;
}
#controls span { margin: 0 8px; }

#vignette {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 50;
    display: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
}
</style>
</head>
<body>

<div id="priceTag">
    <div class="name" id="tagName">Select a Style</div>
    <div class="price" id="tagPrice"></div>
    <div class="hint">Press 1-5 to try on</div>
</div>

<div id="tintControl">
    <label for="tintSlider">Lens Tint</label>
    <input type="range" id="tintSlider" min="0" max="100" value="50">
</div>

<div id="controls">
    <span>[1-5] Styles</span>
    <span>[←→] Rotate Head</span>
    <span>[Z] Zoom</span>
    <span>[L] Lamp</span>
    <span>[R] Rotate Platform</span>
    <span>[S] Screenshot</span>
</div>

<div id="vignette"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    selectedIndex: -1,
    selectedName: 'none',
    headRotationDeg: 0,
    lensOpacity: 0.6,
    isZoomed: false,
    lampOn: false,
    platformRotating: false,
    screenshotMode: false,
    cameraPosition: { x: 0, y: 2, z: 5 },
    sunglassesPositions: [],
    lampModelLoaded: false,
    prices: [129, 99, 149, 119, 179],
    currentPrice: 0
};

const state = window.__3D_STATE__;
const names = ['Aviator', 'Wayfarer', 'Round', 'CatEye', 'Sport'];
const prices = [129, 99, 149, 119, 179];

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.prepend(renderer.domElement);

// Scene
const scene = new THREE.Scene();

// Gradient background
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2;
bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#0a0a2e');
grad.addColorStop(0.5, '#1a1a4e');
grad.addColorStop(1, '#2a3a5e');
bgCtx.fillStyle = grad;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minPolarAngle = 0.3;
controls.maxPolarAngle = 1.4;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 1, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xfff5e6, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(3, 5, 2);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

const fillLight = new THREE.PointLight(0x88aaff, 0.5, 15);
fillLight.position.set(-2, 3, -1);
scene.add(fillLight);

// Platform
const platformGroup = new THREE.Group();
scene.add(platformGroup);

const platformGeo = new THREE.CylinderGeometry(2.5, 2.5, 0.15, 64);
const platformMat = new THREE.MeshStandardMaterial({
    color: 0xd4a574,
    roughness: 0.6,
    metalness: 0.1
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
platformGroup.add(platform);

// Platform edge ring
const ringGeo = new THREE.TorusGeometry(2.5, 0.03, 8, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, metalness: 0.8, roughness: 0.2 });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2;
ring.position.y = 0.075;
platformGroup.add(ring);

// Mannequin Head
const mannequinHead = new THREE.Group();
mannequinHead.name = 'mannequinHead';

const headMat = new THREE.MeshStandardMaterial({ color: 0xf5deb3, roughness: 0.7, metalness: 0.05 });

// Head sphere
const headGeo = new THREE.SphereGeometry(0.4, 32, 32);
const headMesh = new THREE.Mesh(headGeo, headMat);
headMesh.position.set(0, 1.5, 0);
headMesh.castShadow = true;
mannequinHead.add(headMesh);

// Nose
const noseGeo = new THREE.ConeGeometry(0.05, 0.12, 8);
const noseMesh = new THREE.Mesh(noseGeo, headMat);
noseMesh.rotation.x = -Math.PI / 2;
noseMesh.position.set(0, 1.45, 0.38);
noseMesh.castShadow = true;
mannequinHead.add(noseMesh);

// Left ear
const earGeo = new THREE.SphereGeometry(0.08, 16, 16);
const leftEar = new THREE.Mesh(earGeo, headMat);
leftEar.position.set(-0.38, 1.5, 0);
leftEar.castShadow = true;
mannequinHead.add(leftEar);

// Right ear
const rightEar = new THREE.Mesh(earGeo, headMat);
rightEar.position.set(0.38, 1.5, 0);
rightEar.castShadow = true;
mannequinHead.add(rightEar);

// Neck
const neckGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.4, 16);
const neckMesh = new THREE.Mesh(neckGeo, headMat);
neckMesh.position.set(0, 1.05, 0);
neckMesh.castShadow = true;
mannequinHead.add(neckMesh);

// Pedestal
const pedestalGeo = new THREE.CylinderGeometry(0.2, 0.3, 0.7, 16);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.6 });
const pedestalMesh = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestalMesh.position.set(0, 0.5, 0);
pedestalMesh.castShadow = true;
pedestalMesh.receiveShadow = true;
mannequinHead.add(pedestalMesh);

// Eye indentations for reference
const eyeGeo = new THREE.SphereGeometry(0.06, 16, 16);
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.9 });
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.14, 1.53, 0.34);
mannequinHead.add(leftEye);
const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.14, 1.53, 0.34);
mannequinHead.add(rightEye);

platformGroup.add(mannequinHead);

// Sunglasses creation
const sunglassesArray = [];
const originalPositions = [
    new THREE.Vector3(-1.5, 0.3, -0.5),
    new THREE.Vector3(-0.7, 0.3, -1.2),
    new THREE.Vector3(0.3, 0.3, -1.2),
    new THREE.Vector3(1.2, 0.3, -0.5),
    new THREE.Vector3(1.5, 0.3, 0.5)
];
const wornPosition = new THREE.Vector3(0, 1.55, 0.35);

function setCastShadow(group) {
    group.traverse(child => {
        if (child.isMesh) {
            child.castShadow = true;
        }
    });
}

// 1. Aviator
function createAviator() {
    const group = new THREE.Group();
    group.name = 'Aviator';

    const lensMat = new THREE.MeshStandardMaterial({
        color: 0x2a5a2a,
        metalness: 0.8,
        roughness: 0.1,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
    });
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.9, roughness: 0.15 });

    // Left lens - teardrop shape using scaled sphere
    const lensGeo = new THREE.SphereGeometry(0.1, 24, 24);
    const leftLens = new THREE.Mesh(lensGeo, lensMat);
    leftLens.scale.set(1, 1.1, 0.15);
    leftLens.position.set(-0.12, 0, 0);
    group.add(leftLens);

    const rightLens = new THREE.Mesh(lensGeo, lensMat);
    rightLens.scale.set(1, 1.1, 0.15);
    rightLens.position.set(0.12, 0, 0);
    group.add(rightLens);

    // Frame rings
    const frameGeo = new THREE.TorusGeometry(0.1, 0.008, 8, 32);
    const leftFrame = new THREE.Mesh(frameGeo, frameMat);
    leftFrame.scale.set(1, 1.1, 1);
    leftFrame.position.set(-0.12, 0, 0);
    group.add(leftFrame);

    const rightFrame = new THREE.Mesh(frameGeo, frameMat);
    rightFrame.scale.set(1, 1.1, 1);
    rightFrame.position.set(0.12, 0, 0);
    group.add(rightFrame);

    // Bridge
    const bridgeGeo = new THREE.CylinderGeometry(0.005, 0.005, 0.06, 8);
    const bridge = new THREE.Mesh(bridgeGeo, frameMat);
    bridge.rotation.z = Math.PI / 2;
    bridge.position.set(0, 0.02, 0.005);
    group.add(bridge);

    // Arms
    const armGeo = new THREE.CylinderGeometry(0.004, 0.004, 0.35, 8);
    const leftArm = new THREE.Mesh(armGeo, frameMat);
    leftArm.rotation.x = Math.PI / 2;
    leftArm.position.set(-0.22, 0.02, -0.17);
    group.add(leftArm);

    const rightArm = new THREE.Mesh(armGeo, frameMat);
    rightArm.rotation.x = Math.PI / 2;
    rightArm.position.set(0.22, 0.02, -0.17);
    group.add(rightArm);

    group.userData.lensMeshes = [leftLens, rightLens];
    group.userData.allMaterials = [lensMat, frameMat];
    setCastShadow(group);
    return group;
}

// 2. Wayfarer
function createWayfarer() {
    const group = new THREE.Group();
    group.name = 'Wayfarer';

    const lensMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a2e,
        roughness: 0.1,
        metalness: 0.3,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
    });
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.2 });

    // Rectangular lenses
    const lensGeo = new THREE.BoxGeometry(0.14, 0.1, 0.02);
    const leftLens = new THREE.Mesh(lensGeo, lensMat);
    leftLens.position.set(-0.1, 0, 0);
    group.add(leftLens);

    const rightLens = new THREE.Mesh(lensGeo, lensMat);
    rightLens.position.set(0.1, 0, 0);
    group.add(rightLens);

    // Frame
    const frameTopGeo = new THREE.BoxGeometry(0.38, 0.025, 0.025);
    const frameTop = new THREE.Mesh(frameTopGeo, frameMat);
    frameTop.position.set(0, 0.055, 0);
    group.add(frameTop);

    // Frame around each lens
    const frameSideGeo = new THREE.BoxGeometry(0.15, 0.115, 0.025);
    const leftFrameOuter = new THREE.Mesh(frameSideGeo, frameMat);
    leftFrameOuter.position.set(-0.1, 0, -0.005);
    leftFrameOuter.scale.set(1.08, 1.08, 0.5);
    group.add(leftFrameOuter);

    const rightFrameOuter = new THREE.Mesh(frameSideGeo, frameMat);
    rightFrameOuter.position.set(0.1, 0, -0.005);
    rightFrameOuter.scale.set(1.08, 1.08, 0.5);
    group.add(rightFrameOuter);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.012, 0.012, 0.35);
    const leftArm = new THREE.Mesh(armGeo, frameMat);
    leftArm.position.set(-0.19, 0.03, -0.18);
    group.add(leftArm);

    const rightArm = new THREE.Mesh(armGeo, frameMat);
    rightArm.position.set(0.19, 0.03, -0.18);
    group.add(rightArm);

    group.userData.lensMeshes = [leftLens, rightLens];
    group.userData.allMaterials = [lensMat, frameMat];
    setCastShadow(group);
    return group;
}

// 3. Round
function createRound() {
    const group = new THREE.Group();
    group.name = 'Round';

    const lensMat = new THREE.MeshStandardMaterial({
        color: 0xff6b35,
        transparent: true,
        opacity: 0.7,
        roughness: 0.1,
        metalness: 0.2,
        side: THREE.DoubleSide
    });
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.9, roughness: 0.1 });

    // Circular lenses (flat cylinders)
    const lensGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.01, 32);
    const leftLens = new THREE.Mesh(lensGeo, lensMat);
    leftLens.rotation.x = Math.PI / 2;
    leftLens.position.set(-0.11, 0, 0);
    group.add(leftLens);

    const rightLens = new THREE.Mesh(lensGeo, lensMat);
    rightLens.rotation.x = Math.PI / 2;
    rightLens.position.set(0.11, 0, 0);
    group.add(rightLens);

    // Frame rings
    const frameGeo = new THREE.TorusGeometry(0.08, 0.006, 8, 32);
    const leftFrame = new THREE.Mesh(frameGeo, frameMat);
    leftFrame.position.set(-0.11, 0, 0);
    group.add(leftFrame);

    const rightFrame = new THREE.Mesh(frameGeo, frameMat);
    rightFrame.position.set(0.11, 0, 0);
    group.add(rightFrame);

    // Bridge
    const bridgeGeo = new THREE.TorusGeometry(0.04, 0.005, 8, 16, Math.PI);
    const bridge = new THREE.Mesh(bridgeGeo, frameMat);
    bridge.position.set(0, 0.02, 0.005);
    bridge.rotation.x = Math.PI;
    group.add(bridge);

    // Arms
    const armGeo = new THREE.CylinderGeometry(0.004, 0.004, 0.35, 8);
    const leftArm = new THREE.Mesh(armGeo, frameMat);
    leftArm.rotation.x = Math.PI / 2;
    leftArm.position.set(-0.19, 0, -0.17);
    group.add(leftArm);

    const rightArm = new THREE.Mesh(armGeo, frameMat);
    rightArm.rotation.x = Math.PI / 2;
    rightArm.position.set(0.19, 0, -0.17);
    group.add(rightArm);

    group.userData.lensMeshes = [leftLens, rightLens];
    group.userData.allMaterials = [lensMat, frameMat];
    setCastShadow(group);
    return group;
}

// 4. Cat Eye
function createCatEye() {
    const group = new THREE.Group();
    group.name = 'CatEye';

    const lensMat = new THREE.MeshStandardMaterial({
        color: 0x4a0e4e,
        transparent: true,
        opacity: 0.6,
        roughness: 0.15,
        metalness: 0.3,
        side: THREE.DoubleSide
    });
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xff69b4, roughness: 0.3, metalness: 0.4 });

    // Upswept lenses
    const lensGeo = new THREE.BoxGeometry(0.13, 0.09, 0.015);
    const leftLens = new THREE.Mesh(lensGeo, lensMat);
    leftLens.position.set(-0.1, 0, 0);
    leftLens.rotation.z = 0.15;
    group.add(leftLens);

    const rightLens = new THREE.Mesh(lensGeo, lensMat);
    rightLens.position.set(0.1, 0, 0);
    rightLens.rotation.z = -0.15;
    group.add(rightLens);

    // Frame - upswept corners
    const frameGeo = new THREE.BoxGeometry(0.14, 0.1, 0.02);
    const leftFrameShell = new THREE.Mesh(frameGeo, frameMat);
    leftFrameShell.position.set(-0.1, 0, -0.005);
    leftFrameShell.rotation.z = 0.15;
    leftFrameShell.scale.set(1.05, 1.05, 0.5);
    group.add(leftFrameShell);

    const rightFrameShell = new THREE.Mesh(frameGeo, frameMat);
    rightFrameShell.position.set(0.1, 0, -0.005);
    rightFrameShell.rotation.z = -0.15;
    rightFrameShell.scale.set(1.05, 1.05, 0.5);
    group.add(rightFrameShell);

    // Cat eye tips
    const tipGeo = new THREE.ConeGeometry(0.02, 0.06, 4);
    const leftTip = new THREE.Mesh(tipGeo, frameMat);
    leftTip.rotation.z = -0.8;
    leftTip.position.set(-0.17, 0.06, 0);
    group.add(leftTip);

    const rightTip = new THREE.Mesh(tipGeo, frameMat);
    rightTip.rotation.z = 0.8;
    rightTip.position.set(0.17, 0.06, 0);
    group.add(rightTip);

    // Bridge
    const bridgeGeo = new THREE.BoxGeometry(0.04, 0.01, 0.015);
    const bridge = new THREE.Mesh(bridgeGeo, frameMat);
    bridge.position.set(0, 0.01, 0);
    group.add(bridge);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.008, 0.008, 0.35);
    const leftArm = new THREE.Mesh(armGeo, frameMat);
    leftArm.position.set(-0.17, 0.02, -0.18);
    group.add(leftArm);

    const rightArm = new THREE.Mesh(armGeo, frameMat);
    rightArm.position.set(0.17, 0.02, -0.18);
    group.add(rightArm);

    group.userData.lensMeshes = [leftLens, rightLens];
    group.userData.allMaterials = [lensMat, frameMat];
    setCastShadow(group);
    return group;
}

// 5. Sport
function createSport() {
    const group = new THREE.Group();
    group.name = 'Sport';

    const lensMat = new THREE.MeshStandardMaterial({
        color: 0x1a1a1a,
        metalness: 0.9,
        roughness: 0.05,
        transparent: true,
        opacity: 0.6,
        side: THREE.DoubleSide
    });
    const frameMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.3, metalness: 0.6 });

    // Wraparound single lens using a curved shape
    const shape = new THREE.Shape();
    shape.moveTo(-0.2, -0.04);
    shape.quadraticCurveTo(-0.22, 0.06, -0.15, 0.06);
    shape.lineTo(0.15, 0.06);
    shape.quadraticCurveTo(0.22, 0.06, 0.2, -0.04);
    shape.quadraticCurveTo(0.15, -0.06, 0, -0.05);
    shape.quadraticCurveTo(-0.15, -0.06, -0.2, -0.04);

    const extrudeSettings = { depth: 0.02, bevelEnabled: true, bevelThickness: 0.005, bevelSize: 0.005, bevelSegments: 3 };
    const lensGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    const lens = new THREE.Mesh(lensGeo, lensMat);
    lens.position.set(0, 0, -0.01);
    group.add(lens);

    // Frame top
    const frameShape = new THREE.Shape();
    frameShape.moveTo(-0.22, 0.055);
    frameShape.quadraticCurveTo(-0.24, 0.08, -0.15, 0.08);
    frameShape.lineTo(0.15, 0.08);
    frameShape.quadraticCurveTo(0.24, 0.08, 0.22, 0.055);
    frameShape.lineTo(0.2, 0.06);
    frameShape.lineTo(-0.2, 0.06);
    frameShape.closePath();

    const frameExtSettings = { depth: 0.025, bevelEnabled: false };
    const frameGeo = new THREE.ExtrudeGeometry(frameShape, frameExtSettings);
    const frame = new THREE.Mesh(frameGeo, frameMat);
    frame.position.set(0, 0, -0.012);
    group.add(frame);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.01, 0.01, 0.38);
    const leftArm = new THREE.Mesh(armGeo, frameMat);
    leftArm.position.set(-0.21, 0.04, -0.19);
    group.add(leftArm);

    const rightArm = new THREE.Mesh(armGeo, frameMat);
    rightArm.position.set(0.21, 0.04, -0.19);
    group.add(rightArm);

    group.userData.lensMeshes = [lens];
    group.userData.allMaterials = [lensMat, frameMat];
    setCastShadow(group);
    return group;
}

// Create all sunglasses
const sg1 = createAviator();
const sg2 = createWayfarer();
const sg3 = createRound();
const sg4 = createCatEye();
const sg5 = createSport();

sunglassesArray.push(sg1, sg2, sg3, sg4, sg5);

sunglassesArray.forEach((sg, i) => {
    sg.position.copy(originalPositions[i]);
    // Lay flat on platform when not worn
    sg.rotation.x = -Math.PI / 2;
    platformGroup.add(sg);
});

// Animation state
const animState = {
    selectedIndex: -1,
    animating: [],
    targetCameraPos: new THREE.Vector3(0, 2, 5),
    cameraAnimating: false,
    cameraAnimStart: 0,
    cameraAnimDuration: 400,
    cameraStartPos: new THREE.Vector3()
};

// Lamp
let lampModel = null;
let lampLight = null;
const lampPosition = new THREE.Vector3(-1.2, 0.15, 0.8);

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/IridescenceLamp/glTF-Binary/IridescenceLamp.glb',
    (gltf) => {
        lampModel = gltf.scene;
        lampModel.scale.set(0.5, 0.5, 0.5);
        lampModel.position.copy(lampPosition);
        lampModel.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        platformGroup.add(lampModel);
        state.lampModelLoaded = true;
    },
    undefined,
    (err) => {
        console.warn('Lamp model failed to load, creating placeholder:', err);
        // Create a placeholder lamp
        const lampGroup = new THREE.Group();
        const base = new THREE.Mesh(
            new THREE.CylinderGeometry(0.1, 0.15, 0.05, 16),
            new THREE.MeshStandardMaterial({ color: 0x8B7355, metalness: 0.5, roughness: 0.4 })
        );
        lampGroup.add(base);
        const pole = new THREE.Mesh(
            new THREE.CylinderGeometry(0.02, 0.02, 0.4, 8),
            new THREE.MeshStandardMaterial({ color: 0xd4af37, metalness: 0.8, roughness: 0.2 })
        );
        pole.position.y = 0.2;
        lampGroup.add(pole);
        const shade = new THREE.Mesh(
            new THREE.ConeGeometry(0.12, 0.15, 16, 1, true),
            new THREE.MeshStandardMaterial({ color: 0xfff8dc, side: THREE.DoubleSide, roughness: 0.8 })
        );
        shade.position.y = 0.42;
        lampGroup.add(shade);
        const bulb = new THREE.Mesh(
            new THREE.SphereGeometry(0.03, 16, 16),
            new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 0 })
        );
        bulb.position.y = 0.38;
        lampGroup.add(bulb);

        lampGroup.scale.set(0.5, 0.5, 0.5);
        lampGroup.position.copy(lampPosition);
        lampModel = lampGroup;
        platformGroup.add(lampModel);
        state.lampModelLoaded = true;
    }
);

// Sunglasses selection
function selectSunglasses(index) {
    if (index === animState.selectedIndex) return;

    const prevIndex = animState.selectedIndex;

    // Return previous to platform
    if (prevIndex >= 0 && prevIndex < 5) {
        const prev = sunglassesArray[prevIndex];
        animState.animating.push({
            obj: prev,
            startPos: prev.position.clone(),
            endPos: originalPositions[prevIndex].clone(),
            startRot: prev.rotation.x,
            endRot: -Math.PI / 2,
            startTime: performance.now(),
            duration: 500,
            index: prevIndex,
            wearing: false
        });
        // Remove emissive
        prev.userData.lensMeshes.forEach(m => {
            m.material.emissive = new THREE.Color(0x000000);
            m.material.emissiveIntensity = 0;
        });
    }

    // Move new to face
    if (index >= 0 && index < 5) {
        const sg = sunglassesArray[index];
        animState.animating.push({
            obj: sg,
            startPos: sg.position.clone(),
            endPos: wornPosition.clone(),
            startRot: sg.rotation.x,
            endRot: 0,
            startTime: performance.now(),
            duration: 500,
            index: index,
            wearing: true
        });
        // Add emissive glow
        sg.userData.lensMeshes.forEach(m => {
            m.material.emissive = new THREE.Color(0x222222);
            m.material.emissiveIntensity = 0.15;
        });
    }

    animState.selectedIndex = index;
    state.selectedIndex = index;
    state.selectedName = index >= 0 ? names[index] : 'none';
    state.currentPrice = index >= 0 ? prices[index] : 0;

    // Update price tag
    const tagName = document.getElementById('tagName');
    const tagPrice = document.getElementById('tagPrice');
    if (index >= 0) {
        tagName.textContent = names[index];
        tagPrice.textContent = '$' + prices[index];
    } else {
        tagName.textContent = 'Select a Style';
        tagPrice.textContent = '';
    }
}

// Tint slider
const tintSlider = document.getElementById('tintSlider');
tintSlider.addEventListener('input', () => {
    const val = parseInt(tintSlider.value);
    const opacity = 0.2 + (val / 100) * 0.8;
    state.lensOpacity = parseFloat(opacity.toFixed(2));

    if (animState.selectedIndex >= 0) {
        const sg = sunglassesArray[animState.selectedIndex];
        sg.userData.lensMeshes.forEach(m => {
            m.material.opacity = opacity;
        });
    }
});

// Keyboard controls
let headRotDeg = 0;
let isZoomed = false;
let platformRotating = false;
let screenshotMode = false;

document.addEventListener('keydown', (e) => {
    const key = e.key;

    // Number keys 1-5
    if (key >= '1' && key <= '5') {
        const idx = parseInt(key) - 1;
        selectSunglasses(idx);
    }

    // Arrow keys for head rotation
    if (key === 'ArrowLeft') {
        headRotDeg = Math.max(-90, headRotDeg - 15);
        state.headRotationDeg = headRotDeg;
    }
    if (key === 'ArrowRight') {
        headRotDeg = Math.min(90, headRotDeg + 15);
        state.headRotationDeg = headRotDeg;
    }

    // Z for zoom
    if (key === 'z' || key === 'Z') {
        isZoomed = !isZoomed;
        state.isZoomed = isZoomed;
        animState.cameraStartPos.copy(camera.position);
        animState.targetCameraPos = isZoomed
            ? new THREE.Vector3(0, 1.8, 2.2)
            : new THREE.Vector3(0, 2, 5);
        animState.cameraAnimating = true;
        animState.cameraAnimStart = performance.now();
    }

    // L for lamp
    if (key === 'l' || key === 'L') {
        state.lampOn = !state.lampOn;
        if (state.lampOn) {
            if (!lampLight) {
                lampLight = new THREE.PointLight(0xffdd88, 1.5, 4);
                lampLight.position.copy(lampPosition).add(new THREE.Vector3(0, 0.3, 0));
                platformGroup.add(lampLight);
            }
            lampLight.intensity = 1.5;
            if (lampModel) {
                lampModel.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissive = new THREE.Color(0xffdd88);
                        child.material.emissiveIntensity = 0.8;
                    }
                });
            }
        } else {
            if (lampLight) lampLight.intensity = 0;
            if (lampModel) {
                lampModel.traverse(child => {
                    if (child.isMesh && child.material) {
                        child.material.emissiveIntensity = 0;
                    }
                });
            }
        }
    }

    // R for platform rotation
    if (key === 'r' || key === 'R') {
        platformRotating = !platformRotating;
        state.platformRotating = platformRotating;
    }

    // S for screenshot mode
    if (key === 's' || key === 'S') {
        screenshotMode = !screenshotMode;
        state.screenshotMode = screenshotMode;
        const uiElements = [
            document.getElementById('priceTag'),
            document.getElementById('tintControl'),
            document.getElementById('controls')
        ];
        const vignette = document.getElementById('vignette');

        if (screenshotMode) {
            uiElements.forEach(el => el.style.display = 'none');
            vignette.style.display = 'block';
        } else {
            uiElements.forEach(el => el.style.display = '');
            vignette.style.display = 'none';
        }
    }
});

// Easing function
function easeInOutCubic(t) {
    return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const delta = clock.getDelta();

    // Sunglasses animations
    animState.animating = animState.animating.filter(anim => {
        const elapsed = now - anim.startTime;
        const t = Math.min(elapsed / anim.duration, 1);
        const eased = easeInOutCubic(t);

        anim.obj.position.lerpVectors(anim.startPos, anim.endPos, eased);
        anim.obj.rotation.x = anim.startRot + (anim.endRot - anim.startRot) * eased;

        return t < 1;
    });

    // Head rotation (smooth)
    const targetRotY = THREE.MathUtils.degToRad(headRotDeg);
    mannequinHead.rotation.y = THREE.MathUtils.lerp(mannequinHead.rotation.y, targetRotY, 0.1);

    // Camera animation
    if (animState.cameraAnimating) {
        const elapsed = now - animState.cameraAnimStart;
        const t = Math.min(elapsed / animState.cameraAnimDuration, 1);
        const eased = easeInOutCubic(t);

        camera.position.lerpVectors(animState.cameraStartPos, animState.targetCameraPos, eased);

        if (t >= 1) {
            animState.cameraAnimating = false;
        }
    }

    // Platform rotation
    if (platformRotating) {
        platformGroup.rotation.y += 0.5 * delta;
    }

    // Update controls
    controls.update();

    // Update state
    state.cameraPosition = {
        x: parseFloat(camera.position.x.toFixed(2)),
        y: parseFloat(camera.position.y.toFixed(2)),
        z: parseFloat(camera.position.z.toFixed(2))
    };

    state.sunglassesPositions = sunglassesArray.map(sg => ({
        x: parseFloat(sg.position.x.toFixed(2)),
        y: parseFloat(sg.position.y.toFixed(2)),
        z: parseFloat(sg.position.z.toFixed(2))
    }));

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
