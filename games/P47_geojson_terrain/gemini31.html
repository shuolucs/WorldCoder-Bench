<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Procedural Terrain & GeoJSON Overlay</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background-color: #000;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            user-select: none;
        }
        .control-group {
            margin-bottom: 10px;
        }
        #regionStats {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #555;
            font-size: 14px;
            min-height: 60px;
        }
        .stat-row {
            margin: 5px 0;
        }
        .stat-label {
            color: #aaa;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label>
                <input type="checkbox" id="terrainToggle" checked> Show Terrain
            </label>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="regionToggle" checked> Show Regions
            </label>
        </div>
        <div id="regionStats">
            <div style="color: #888; font-style: italic;">Click a region to view stats</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { ImprovedNoise } from 'three/addons/math/ImprovedNoise.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            terrainVertices: 0,
            regionCount: 0,
            selectedRegion: null,
            maxElevation: -Infinity,
            minElevation: Infinity,
            layerVisibility: { terrain: true, regions: true }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 60, 80);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxPolarAngle = Math.PI / 2 - 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // --- Terrain Generation ---
        const terrainSize = 100;
        const segments = 128;
        const perlin = new ImprovedNoise();

        function getNoiseHeight(x, z) {
            let y = 0;
            let amplitude = 8;
            let frequency = 0.03;
            for (let i = 0; i < 4; i++) {
                y += perlin.noise(x * frequency, z * frequency, 0) * amplitude;
                amplitude *= 0.5;
                frequency *= 2;
            }
            return y;
        }

        const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, segments, segments);
        terrainGeo.rotateX(-Math.PI / 2);

        const posAttribute = terrainGeo.attributes.position;
        window.__3D_STATE__.terrainVertices = posAttribute.count;

        for (let i = 0; i < posAttribute.count; i++) {
            const x = posAttribute.getX(i);
            const z = posAttribute.getZ(i);
            const y = getNoiseHeight(x, z);
            posAttribute.setY(i, y);
            
            if (y > window.__3D_STATE__.maxElevation) window.__3D_STATE__.maxElevation = y;
            if (y < window.__3D_STATE__.minElevation) window.__3D_STATE__.minElevation = y;
        }

        terrainGeo.computeVertexNormals();

        // Elevation Coloring
        const colors = [];
        const color = new THREE.Color();
        const minE = window.__3D_STATE__.minElevation;
        const maxE = window.__3D_STATE__.maxElevation;
        const range = maxE - minE;

        for (let i = 0; i < posAttribute.count; i++) {
            const y = posAttribute.getY(i);
            const t = (y - minE) / range;
            
            if (t < 0.2) color.setHex(0x2b65ec); // Water/Deep
            else if (t < 0.3) color.setHex(0xd2b48c); // Sand
            else if (t < 0.6) color.setHex(0x228b22); // Grass
            else if (t < 0.8) color.setHex(0x8b4513); // Dirt/Rock
            else color.setHex(0xffffff); // Snow
            
            colors.push(color.r, color.g, color.b);
        }
        terrainGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

        const terrainMat = new THREE.MeshStandardMaterial({
            vertexColors: true,
            roughness: 0.8,
            flatShading: true
        });
        const terrainMesh = new THREE.Mesh(terrainGeo, terrainMat);
        scene.add(terrainMesh);

        // --- GeoJSON Overlay ---
        const geojson = {
            "type": "FeatureCollection",
            "features": [
                { "properties": { "id": "R1", "name": "Northwest Territory", "color": 0xff5555 }, "geometry": { "type": "Polygon", "coordinates": [[[-45, -45], [-5, -45], [-15, -25], [-5, -5], [-45, -5], [-45, -45]]] } },
                { "properties": { "id": "R2", "name": "Northeast Province", "color": 0x55ff55 }, "geometry": { "type": "Polygon", "coordinates": [[[5, -45], [45, -45], [45, -5], [20, -15], [5, -5], [5, -45]]] } },
                { "properties": { "id": "R3", "name": "Southwest District", "color": 0x5555ff }, "geometry": { "type": "Polygon", "coordinates": [[[-45, 5], [-5, 5], [-5, 45], [-25, 30], [-45, 45], [-45, 5]]] } },
                { "properties": { "id": "R4", "name": "Southeast Region", "color": 0xffff55 }, "geometry": { "type": "Polygon", "coordinates": [[[5, 5], [25, 20], [45, 5], [45, 45], [5, 45], [5, 5]]] } },
                { "properties": { "id": "R5", "name": "Central Valley", "color": 0xff55ff }, "geometry": { "type": "Polygon", "coordinates": [[[-10, -10], [10, -10], [15, 0], [10, 10], [-10, 10], [-15, 0], [-10, -10]]] } }
            ]
        };

        const regionsGroup = new THREE.Group();
        scene.add(regionsGroup);
        const regionMeshes = [];

        window.__3D_STATE__.regionCount = geojson.features.length;

        geojson.features.forEach(feature => {
            const coords = feature.geometry.coordinates[0];
            const contour2D = coords.map(c => new THREE.Vector2(c[0], c[1]));
            
            // Triangulate
            const faces = THREE.ShapeUtils.triangulateShape(contour2D, []);
            
            const positions = [];
            let totalHeight = 0;
            let area = 0;

            for (let i = 0; i < faces.length; i++) {
                const pA = contour2D[faces[i][0]];
                const pB = contour2D[faces[i][1]];
                const pC = contour2D[faces[i][2]];

                // Calculate 2D area of triangle
                area += Math.abs((pA.x * (pB.y - pC.y) + pB.x * (pC.y - pA.y) + pC.x * (pA.y - pB.y)) / 2);

                [pA, pB, pC].forEach(pt => {
                    const y = getNoiseHeight(pt.x, pt.y) + 0.3; // Offset to prevent z-fighting
                    positions.push(pt.x, y, pt.y);
                    totalHeight += y;
                });
            }

            const avgElevation = totalHeight / (faces.length * 3);

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.computeVertexNormals();

            const mat = new THREE.MeshStandardMaterial({
                color: feature.properties.color,
                transparent: true,
                opacity: 0.4,
                side: THREE.DoubleSide,
                depthWrite: false
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.userData = {
                id: feature.properties.id,
                name: feature.properties.name,
                baseColor: feature.properties.color,
                area: area.toFixed(2),
                avgElevation: avgElevation.toFixed(2)
            };

            regionsGroup.add(mesh);
            regionMeshes.push(mesh);
        });

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();
        let selectedMesh = null;

        window.addEventListener('pointerdown', (event) => {
            // Ignore clicks on UI
            if (event.target.closest('#ui-container')) return;

            pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
            pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            
            const intersects = raycaster.intersectObjects(regionMeshes, false);

            if (selectedMesh) {
                selectedMesh.material.opacity = 0.4;
                selectedMesh.material.emissive.setHex(0x000000);
            }

            const statsDiv = document.getElementById('regionStats');

            if (intersects.length > 0 && window.__3D_STATE__.layerVisibility.regions) {
                selectedMesh = intersects[0].object;
                selectedMesh.material.opacity = 0.8;
                selectedMesh.material.emissive.setHex(0x333333);
                
                const data = selectedMesh.userData;
                window.__3D_STATE__.selectedRegion = data.id;

                statsDiv.innerHTML = `
                    <div style="font-weight: bold; color: #${data.baseColor.toString(16).padStart(6, '0')}">${data.name}</div>
                    <div class="stat-row"><span class="stat-label">ID:</span> ${data.id}</div>
                    <div class="stat-row"><span class="stat-label">Approx Area:</span> ${data.area} sq units</div>
                    <div class="stat-row"><span class="stat-label">Avg Elevation:</span> ${data.avgElevation} units</div>
                `;
            } else {
                selectedMesh = null;
                window.__3D_STATE__.selectedRegion = null;
                statsDiv.innerHTML = '<div style="color: #888; font-style: italic;">Click a region to view stats</div>';
            }
        });

        // --- Toggles ---
        document.getElementById('terrainToggle').addEventListener('change', (e) => {
            const visible = e.target.checked;
            terrainMesh.visible = visible;
            window.__3D_STATE__.layerVisibility.terrain = visible;
        });

        document.getElementById('regionToggle').addEventListener('change', (e) => {
            const visible = e.target.checked;
            regionsGroup.visible = visible;
            window.__3D_STATE__.layerVisibility.regions = visible;
            if (!visible && selectedMesh) {
                selectedMesh.material.opacity = 0.4;
                selectedMesh.material.emissive.setHex(0x000000);
                selectedMesh = null;
                window.__3D_STATE__.selectedRegion = null;
                document.getElementById('regionStats').innerHTML = '<div style="color: #888; font-style: italic;">Click a region to view stats</div>';
            }
        });

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
