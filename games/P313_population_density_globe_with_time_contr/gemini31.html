<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Population Density Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            pointer-events: auto;
            position: absolute;
            background: rgba(10, 10, 26, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(68, 170, 255, 0.3);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #top-left {
            top: 20px;
            left: 20px;
            font-size: 1.4em;
            font-weight: bold;
            color: #44aaff;
        }
        #top-right {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #bottom-center {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            min-width: 250px;
        }
        button {
            background: #2266aa;
            border: 1px solid #44aaff;
            color: white;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #44aaff;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        #yearLabel {
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(68, 170, 255, 0.8);
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <div id="top-left" class="panel">
            <div id="totalPopulation">Total: 0.00 B</div>
        </div>
        <div id="top-right" class="panel">
            <button id="toggleRotation">Toggle Rotation</button>
            <button id="toggleBars">Toggle Bars</button>
        </div>
        <div id="bottom-center" class="panel">
            <div id="yearLabel">1990</div>
            <input type="range" id="timeSlider" min="0" max="2" step="1" value="0">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // State Management
        window.__3D_STATE__ = {
            currentYear: 'year_1990',
            autoRotation: true,
            barsVisible: true,
            barCount: 8,
            totalPopulation: 0,
            globeRotationY: 0,
            maxBarHeight: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 6;
        controls.maxDistance = 30;

        // Lighting
        scene.add(new THREE.AmbientLight(0x404040));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 10, 10);
        scene.add(dirLight);

        // Globe Group
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Earth Sphere
        const earthGeo = new THREE.SphereGeometry(5, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({ 
            color: 0x2266aa,
            shininess: 15
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        globeGroup.add(earth);

        // Wireframe Overlay
        const wireGeo = new THREE.SphereGeometry(5.02, 32, 32);
        const wireMat = new THREE.MeshBasicMaterial({
            color: 0x44aaff,
            wireframe: true,
            transparent: true,
            opacity: 0.15
        });
        const wireframe = new THREE.Mesh(wireGeo, wireMat);
        globeGroup.add(wireframe);

        // Population Data
        const data = [
            { name: 'China', lat: 35, lon: 105, pops: [1.14, 1.34, 1.40] },
            { name: 'India', lat: 20, lon: 78, pops: [0.87, 1.21, 1.50] },
            { name: 'USA', lat: 38, lon: -97, pops: [0.25, 0.31, 0.35] },
            { name: 'Indonesia', lat: 0, lon: 120, pops: [0.18, 0.24, 0.30] },
            { name: 'Brazil', lat: -10, lon: -55, pops: [0.15, 0.20, 0.22] },
            { name: 'Nigeria', lat: 10, lon: 8, pops: [0.10, 0.16, 0.26] },
            { name: 'Russia', lat: 60, lon: 100, pops: [0.15, 0.14, 0.13] },
            { name: 'Japan', lat: 36, lon: 138, pops: [0.12, 0.13, 0.12] }
        ];

        const years = ['year_1990', 'year_2010', 'year_2030'];
        const yearLabels = ['1990', '2010', '2030'];

        // Bars Setup
        const barsGroup = new THREE.Group();
        globeGroup.add(barsGroup);

        const barMeshes = [];
        const boxGeo = new THREE.BoxGeometry(0.3, 1, 0.3);
        boxGeo.translate(0, 0.5, 0); // Pivot at the bottom

        function getPosition(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = lon * (Math.PI / 180);
            const x = radius * Math.sin(phi) * Math.sin(theta);
            const y = radius * Math.cos(phi);
            const z = radius * Math.sin(phi) * Math.cos(theta);
            return new THREE.Vector3(x, y, z);
        }

        const colorLow = new THREE.Color(0x00ff00);
        const colorHigh = new THREE.Color(0xff0000);
        
        function getColor(pop) {
            // Map population (approx 0.1 to 1.5) to 0.0 - 1.0 for lerp
            const alpha = Math.max(0, Math.min(1, (pop - 0.1) / 1.4));
            return new THREE.Color().lerpColors(colorLow, colorHigh, alpha);
        }

        // Create initial bars
        data.forEach(d => {
            const mat = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const mesh = new THREE.Mesh(boxGeo, mat);
            const pos = getPosition(d.lat, d.lon, 5);
            
            mesh.position.copy(pos);
            // Orient bar to point outward from the center
            mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), pos.clone().normalize());
            
            barsGroup.add(mesh);
            barMeshes.push(mesh);
        });

        // Update function
        function updateBars(yearIndex) {
            let totalPop = 0;
            let maxH = 0;
            
            data.forEach((d, i) => {
                const pop = d.pops[yearIndex];
                totalPop += pop;
                const height = pop * 3;
                
                if (height > maxH) maxH = height;
                
                const mesh = barMeshes[i];
                mesh.scale.y = height;
                mesh.material.color = getColor(pop);
            });
            
            // Update UI
            document.getElementById('totalPopulation').innerText = `Total: ${totalPop.toFixed(2)} B`;
            document.getElementById('yearLabel').innerText = yearLabels[yearIndex];
            
            // Update State
            window.__3D_STATE__.currentYear = years[yearIndex];
            window.__3D_STATE__.totalPopulation = parseFloat(totalPop.toFixed(2));
            window.__3D_STATE__.maxBarHeight = parseFloat(maxH.toFixed(2));
        }

        // Initialize with first year
        updateBars(0);

        // Event Listeners
        document.getElementById('timeSlider').addEventListener('input', (e) => {
            updateBars(parseInt(e.target.value));
        });

        document.getElementById('toggleRotation').addEventListener('click', () => {
            window.__3D_STATE__.autoRotation = !window.__3D_STATE__.autoRotation;
            const btn = document.getElementById('toggleRotation');
            btn.style.background = window.__3D_STATE__.autoRotation ? '#2266aa' : '#555';
        });

        document.getElementById('toggleBars').addEventListener('click', () => {
            window.__3D_STATE__.barsVisible = !window.__3D_STATE__.barsVisible;
            barsGroup.visible = window.__3D_STATE__.barsVisible;
            const btn = document.getElementById('toggleBars');
            btn.style.background = window.__3D_STATE__.barsVisible ? '#2266aa' : '#555';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            if (window.__3D_STATE__.autoRotation) {
                globeGroup.rotation.y += 0.003;
            }
            
            controls.update();
            
            // Update continuous state
            window.__3D_STATE__.globeRotationY = parseFloat(globeGroup.rotation.y.toFixed(4));
            
            renderer.render(scene, camera);
        }
        
        animate();
    </script>
</body>
</html>
