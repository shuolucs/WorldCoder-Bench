<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Population Density Globe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #totalPopulation {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 10;
      user-select: none;
    }

    .top-right-btn {
      position: absolute;
      right: 16px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(30, 60, 120, 0.85);
      color: white;
      cursor: pointer;
      font-size: 14px;
      z-index: 10;
    }

    .top-right-btn:hover {
      background: rgba(50, 90, 170, 0.95);
    }

    #toggleRotation { top: 16px; }
    #toggleBars { top: 64px; }

    #sliderContainer {
      position: absolute;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 10;
      background: rgba(0,0,0,0.25);
      padding: 12px 16px;
      border-radius: 12px;
      user-select: none;
    }

    #yearLabel {
      font-size: 18px;
      font-weight: bold;
    }

    #timeSlider {
      width: 260px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="totalPopulation">Total: 0.00 B</div>

    <button id="toggleRotation" class="top-right-btn">Auto-Rotation: ON</button>
    <button id="toggleBars" class="top-right-btn">Bars: ON</button>

    <div id="sliderContainer">
      <div id="yearLabel">1990</div>
      <input id="timeSlider" type="range" min="0" max="2" step="1" value="0" />
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const container = document.getElementById("container");
    const yearLabel = document.getElementById("yearLabel");
    const timeSlider = document.getElementById("timeSlider");
    const toggleRotationBtn = document.getElementById("toggleRotation");
    const toggleBarsBtn = document.getElementById("toggleBars");
    const totalPopulationDiv = document.getElementById("totalPopulation");

    const years = ["year_1990", "year_2010", "year_2030"];
    const yearDisplay = {
      year_1990: "1990",
      year_2010: "2010",
      year_2030: "2030"
    };

    const populationData = [
      {
        name: "China",
        lat: 35,
        lon: 105,
        year_1990: 1.14,
        year_2010: 1.34,
        year_2030: 1.40
      },
      {
        name: "India",
        lat: 20,
        lon: 78,
        year_1990: 0.87,
        year_2010: 1.21,
        year_2030: 1.50
      },
      {
        name: "USA",
        lat: 38,
        lon: -97,
        year_1990: 0.25,
        year_2010: 0.31,
        year_2030: 0.35
      },
      {
        name: "Indonesia",
        lat: 0,
        lon: 120,
        year_1990: 0.18,
        year_2010: 0.24,
        year_2030: 0.30
      },
      {
        name: "Brazil",
        lat: -10,
        lon: -55,
        year_1990: 0.15,
        year_2010: 0.20,
        year_2030: 0.22
      },
      {
        name: "Nigeria",
        lat: 10,
        lon: 8,
        year_1990: 0.10,
        year_2010: 0.16,
        year_2030: 0.26
      },
      {
        name: "Russia",
        lat: 60,
        lon: 100,
        year_1990: 0.15,
        year_2010: 0.14,
        year_2030: 0.13
      },
      {
        name: "Japan",
        lat: 36,
        lon: 138,
        year_1990: 0.12,
        year_2010: 0.13,
        year_2030: 0.12
      }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x404040);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x2266aa });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    globeGroup.add(earth);

    const wireGeometry = new THREE.SphereGeometry(5.02, 32, 32);
    const wireMaterial = new THREE.MeshBasicMaterial({
      color: 0x44aaff,
      wireframe: true,
      transparent: true,
      opacity: 0.15
    });
    const wireSphere = new THREE.Mesh(wireGeometry, wireMaterial);
    globeGroup.add(wireSphere);

    const barsGroup = new THREE.Group();
    globeGroup.add(barsGroup);

    const radius = 5;
    const barWidth = 0.3;
    const barDepth = 0.3;
    const scaleFactor = 3;

    const allValues = [];
    populationData.forEach(d => {
      years.forEach(y => allValues.push(d[y]));
    });
    const minPop = Math.min(...allValues);
    const maxPop = Math.max(...allValues);

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function latLonToVector3(lat, lon, r) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);

      const x = -r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);

      return new THREE.Vector3(x, y, z);
    }

    function getColorForValue(value) {
      const t = THREE.MathUtils.clamp((value - minPop) / (maxPop - minPop || 1), 0, 1);
      const color = new THREE.Color();
      color.setHSL(0.33 * (1 - t), 1.0, 0.5); // green to red
      return color;
    }

    function createBar(dataPoint) {
      const geometry = new THREE.BoxGeometry(barWidth, 1, barDepth);
      geometry.translate(0, 0.5, 0);

      const initialValue = safeNumber(dataPoint.year_1990, 0);
      const material = new THREE.MeshPhongMaterial({
        color: getColorForValue(initialValue)
      });

      const bar = new THREE.Mesh(geometry, material);

      const normal = latLonToVector3(dataPoint.lat, dataPoint.lon, 1).normalize();
      const surfacePos = normal.clone().multiplyScalar(radius);

      bar.position.copy(surfacePos);
      bar.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), normal);

      bar.userData = {
        ...dataPoint,
        normal,
        surfacePos,
        currentHeight: 1
      };

      barsGroup.add(bar);
      return bar;
    }

    const bars = populationData.map(createBar);

    function updateBars(yearKey) {
      let total = 0;
      let maxHeight = 0;

      bars.forEach(bar => {
        const value = safeNumber(bar.userData[yearKey], 0);
        const height = safeNumber(value * scaleFactor, 0);
        total += value;
        maxHeight = Math.max(maxHeight, height);

        bar.scale.y = Math.max(height, 0.0001);
        bar.material.color.copy(getColorForValue(value));
        bar.visible = window.__3D_STATE__.barsVisible;
      });

      total = safeNumber(total, 0);
      maxHeight = safeNumber(maxHeight, 0);

      totalPopulationDiv.textContent = `Total: ${total.toFixed(2)} B`;
      yearLabel.textContent = yearDisplay[yearKey];

      window.__3D_STATE__.totalPopulation = total;
      window.__3D_STATE__.maxBarHeight = maxHeight;
    }

    window.__3D_STATE__ = {
      currentYear: "year_1990",
      autoRotation: true,
      barsVisible: true,
      barCount: bars.length,
      totalPopulation: 0,
      globeRotationY: 0,
      maxBarHeight: 0
    };

    timeSlider.addEventListener("input", () => {
      const index = Math.max(0, Math.min(2, parseInt(timeSlider.value, 10) || 0));
      const selectedYear = years[index];
      window.__3D_STATE__.currentYear = selectedYear;
      updateBars(selectedYear);
    });

    toggleRotationBtn.addEventListener("click", () => {
      window.__3D_STATE__.autoRotation = !window.__3D_STATE__.autoRotation;
      toggleRotationBtn.textContent = `Auto-Rotation: ${window.__3D_STATE__.autoRotation ? "ON" : "OFF"}`;
    });

    toggleBarsBtn.addEventListener("click", () => {
      window.__3D_STATE__.barsVisible = !window.__3D_STATE__.barsVisible;
      bars.forEach(bar => bar.visible = window.__3D_STATE__.barsVisible);
      toggleBarsBtn.textContent = `Bars: ${window.__3D_STATE__.barsVisible ? "ON" : "OFF"}`;
      updateBars(window.__3D_STATE__.currentYear);
    });

    updateBars(window.__3D_STATE__.currentYear);

    function animate() {
      requestAnimationFrame(animate);

      if (window.__3D_STATE__.autoRotation) {
        globeGroup.rotation.y += 0.003;
      }

      controls.update();

      window.__3D_STATE__.currentYear = window.__3D_STATE__.currentYear || "year_1990";
      window.__3D_STATE__.autoRotation = !!window.__3D_STATE__.autoRotation;
      window.__3D_STATE__.barsVisible = !!window.__3D_STATE__.barsVisible;
      window.__3D_STATE__.barCount = safeNumber(bars.length, 0);
      window.__3D_STATE__.globeRotationY = safeNumber(globeGroup.rotation.y, 0);

      let total = 0;
      let maxHeight = 0;
      bars.forEach(bar => {
        const value = safeNumber(bar.userData[window.__3D_STATE__.currentYear], 0);
        const h = safeNumber(value * scaleFactor, 0);
        total += value;
        maxHeight = Math.max(maxHeight, h);
      });

      window.__3D_STATE__.totalPopulation = safeNumber(total, 0);
      window.__3D_STATE__.maxBarHeight = safeNumber(maxHeight, 0);

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
