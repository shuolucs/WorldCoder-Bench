<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Population Density Globe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #controls-bottom {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
  }

  #yearLabel {
    color: #ffffff;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
    text-shadow: 0 0 10px rgba(68, 170, 255, 0.8);
    letter-spacing: 2px;
  }

  #timeSlider {
    width: 300px;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #22aa66, #aaaa22, #aa3322);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  #timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #44aaff;
    box-shadow: 0 0 8px rgba(68, 170, 255, 0.6);
    cursor: pointer;
  }

  #timeSlider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #ffffff;
    border: 2px solid #44aaff;
    box-shadow: 0 0 8px rgba(68, 170, 255, 0.6);
    cursor: pointer;
  }

  .slider-labels {
    display: flex;
    justify-content: space-between;
    width: 300px;
    margin-top: 5px;
  }

  .slider-labels span {
    color: #88aacc;
    font-size: 12px;
  }

  #controls-right {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
  }

  #controls-right button {
    padding: 10px 18px;
    border: 1px solid rgba(68, 170, 255, 0.4);
    border-radius: 8px;
    background: rgba(10, 10, 40, 0.8);
    color: #ccddff;
    font-size: 13px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    min-width: 140px;
  }

  #controls-right button:hover {
    background: rgba(68, 170, 255, 0.2);
    border-color: rgba(68, 170, 255, 0.8);
    color: #ffffff;
  }

  #controls-right button.active {
    border-color: #44aaff;
    box-shadow: 0 0 10px rgba(68, 170, 255, 0.3);
  }

  #totalPopulation {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #ffffff;
    font-size: 20px;
    font-weight: bold;
    z-index: 10;
    background: rgba(10, 10, 40, 0.8);
    padding: 12px 20px;
    border-radius: 8px;
    border: 1px solid rgba(68, 170, 255, 0.3);
    backdrop-filter: blur(10px);
    text-shadow: 0 0 8px rgba(68, 170, 255, 0.5);
  }

  #tooltip {
    position: fixed;
    display: none;
    background: rgba(10, 10, 40, 0.9);
    color: #ffffff;
    padding: 8px 14px;
    border-radius: 6px;
    border: 1px solid rgba(68, 170, 255, 0.5);
    font-size: 13px;
    pointer-events: none;
    z-index: 20;
    backdrop-filter: blur(10px);
  }
</style>
</head>
<body>

<div id="totalPopulation">Total: 0.00 B</div>

<div id="controls-right">
  <button id="toggleRotation" class="active">🌍 Auto-Rotate: ON</button>
  <button id="toggleBars">📊 Bars: ON</button>
</div>

<div id="controls-bottom">
  <div id="yearLabel">1990</div>
  <input type="range" id="timeSlider" min="0" max="2" step="1" value="0">
  <div class="slider-labels">
    <span>1990</span>
    <span>2010</span>
    <span>2030</span>
  </div>
</div>

<div id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  window.__3D_STATE__ = {
    currentYear: 'year_1990',
    autoRotation: true,
    barsVisible: true,
    barCount: 8,
    totalPopulation: 0,
    globeRotationY: 0,
    maxBarHeight: 0
  };

  // Population data
  const populationData = {
    year_1990: {
      China: 1.14, India: 0.87, USA: 0.25, Indonesia: 0.18,
      Brazil: 0.15, Nigeria: 0.10, Russia: 0.15, Japan: 0.12
    },
    year_2010: {
      China: 1.34, India: 1.21, USA: 0.31, Indonesia: 0.24,
      Brazil: 0.20, Nigeria: 0.16, Russia: 0.14, Japan: 0.13
    },
    year_2030: {
      China: 1.40, India: 1.50, USA: 0.35, Indonesia: 0.30,
      Brazil: 0.22, Nigeria: 0.26, Russia: 0.13, Japan: 0.12
    }
  };

  const locations = {
    China:     { lat: 35,  lon: 105 },
    India:     { lat: 20,  lon: 78 },
    USA:       { lat: 38,  lon: -97 },
    Indonesia: { lat: 0,   lon: 120 },
    Brazil:    { lat: -10, lon: -55 },
    Nigeria:   { lat: 10,  lon: 8 },
    Russia:    { lat: 60,  lon: 100 },
    Japan:     { lat: 36,  lon: 138 }
  };

  const yearNames = ['1990', '2010', '2030'];
  const yearKeys = ['year_1990', 'year_2010', 'year_2030'];

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a1a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 15);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 8;
  controls.maxDistance = 30;

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
  directionalLight.position.set(10, 10, 10);
  scene.add(directionalLight);

  // Globe group
  const globeGroup = new THREE.Group();
  scene.add(globeGroup);

  // Earth sphere
  const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
  const earthMaterial = new THREE.MeshPhongMaterial({
    color: 0x2266aa,
    shininess: 25,
    specular: 0x111133
  });
  const earth = new THREE.Mesh(earthGeometry, earthMaterial);
  globeGroup.add(earth);

  // Wireframe overlay
  const wireframeGeometry = new THREE.SphereGeometry(5.02, 36, 36);
  const wireframeMaterial = new THREE.MeshBasicMaterial({
    color: 0x44aaff,
    wireframe: true,
    transparent: true,
    opacity: 0.15
  });
  const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
  globeGroup.add(wireframe);

  // Helper: lat/lon to 3D position on sphere
  function latLonToPosition(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    const x = -radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }

  // Color gradient: green (low) to yellow to red (high)
  function getBarColor(population, maxPop) {
    const t = Math.min(population / maxPop, 1.0);
    const r = t < 0.5 ? t * 2 : 1.0;
    const g = t < 0.5 ? 1.0 : 1.0 - (t - 0.5) * 2;
    const b = 0.1;
    return new THREE.Color(r, g, b);
  }

  // Find max population across all years for consistent coloring
  const allPops = [];
  for (const year of yearKeys) {
    for (const country in populationData[year]) {
      allPops.push(populationData[year][country]);
    }
  }
  const globalMaxPop = Math.max(...allPops);

  // Create bars
  const bars = {};
  const barMeshes = [];
  const GLOBE_RADIUS = 5;
  const BAR_WIDTH = 0.3;
  const HEIGHT_SCALE = 3;

  for (const country in locations) {
    const loc = locations[country];
    const pop = populationData.year_1990[country];
    const height = pop * HEIGHT_SCALE;

    const geometry = new THREE.BoxGeometry(BAR_WIDTH, height, BAR_WIDTH);
    // Shift geometry so bottom is at origin
    geometry.translate(0, height / 2, 0);

    const color = getBarColor(pop, globalMaxPop);
    const material = new THREE.MeshPhongMaterial({
      color: color,
      emissive: color.clone().multiplyScalar(0.3),
      shininess: 30,
      transparent: true,
      opacity: 0.9
    });

    const mesh = new THREE.Mesh(geometry, material);

    // Position on globe surface
    const surfacePos = latLonToPosition(loc.lat, loc.lon, GLOBE_RADIUS);
    mesh.position.copy(surfacePos);

    // Orient bar to point outward from globe center
    mesh.lookAt(0, 0, 0);
    mesh.rotateX(Math.PI / 2);

    mesh.userData = { country: country, population: pop };

    globeGroup.add(mesh);
    bars[country] = mesh;
    barMeshes.push(mesh);
  }

  // Update bars for a given year
  function updateBars(yearKey) {
    const data = populationData[yearKey];
    let total = 0;
    let maxHeight = 0;

    for (const country in bars) {
      const mesh = bars[country];
      const pop = data[country];
      const height = pop * HEIGHT_SCALE;
      total += pop;
      if (height > maxHeight) maxHeight = height;

      // Recreate geometry with new height
      mesh.geometry.dispose();
      const newGeometry = new THREE.BoxGeometry(BAR_WIDTH, height, BAR_WIDTH);
      newGeometry.translate(0, height / 2, 0);
      mesh.geometry = newGeometry;

      // Update color
      const color = getBarColor(pop, globalMaxPop);
      mesh.material.color.copy(color);
      mesh.material.emissive.copy(color.clone().multiplyScalar(0.3));

      mesh.userData.population = pop;
    }

    // Update total population display
    const totalEl = document.getElementById('totalPopulation');
    totalEl.textContent = 'Total: ' + total.toFixed(2) + ' B';

    window.__3D_STATE__.totalPopulation = parseFloat(total.toFixed(2));
    window.__3D_STATE__.maxBarHeight = parseFloat(maxHeight.toFixed(2));
    window.__3D_STATE__.currentYear = yearKey;
  }

  // Initialize
  updateBars('year_1990');

  // Slider
  const slider = document.getElementById('timeSlider');
  const yearLabel = document.getElementById('yearLabel');

  slider.addEventListener('input', function() {
    const idx = parseInt(this.value);
    yearLabel.textContent = yearNames[idx];
    updateBars(yearKeys[idx]);
  });

  // Toggle rotation button
  const toggleRotBtn = document.getElementById('toggleRotation');
  toggleRotBtn.addEventListener('click', function() {
    window.__3D_STATE__.autoRotation = !window.__3D_STATE__.autoRotation;
    if (window.__3D_STATE__.autoRotation) {
      this.textContent = '🌍 Auto-Rotate: ON';
      this.classList.add('active');
    } else {
      this.textContent = '🌍 Auto-Rotate: OFF';
      this.classList.remove('active');
    }
  });

  // Toggle bars button
  const toggleBarsBtn = document.getElementById('toggleBars');
  toggleBarsBtn.addEventListener('click', function() {
    window.__3D_STATE__.barsVisible = !window.__3D_STATE__.barsVisible;
    for (const country in bars) {
      bars[country].visible = window.__3D_STATE__.barsVisible;
    }
    if (window.__3D_STATE__.barsVisible) {
      this.textContent = '📊 Bars: ON';
      this.classList.add('active');
    } else {
      this.textContent = '📊 Bars: OFF';
      this.classList.remove('active');
    }
  });

  // Tooltip / raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const tooltip = document.getElementById('tooltip');

  renderer.domElement.addEventListener('mousemove', function(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(barMeshes);

    if (intersects.length > 0 && window.__3D_STATE__.barsVisible) {
      const obj = intersects[0].object;
      tooltip.style.display = 'block';
      tooltip.style.left = (event.clientX + 15) + 'px';
      tooltip.style.top = (event.clientY - 10) + 'px';
      tooltip.innerHTML = '<strong>' + obj.userData.country + '</strong><br>' +
        'Pop: ' + obj.userData.population.toFixed(2) + ' B';
    } else {
      tooltip.style.display = 'none';
    }
  });

  // Add some stars
  const starsGeometry = new THREE.BufferGeometry();
  const starsCount = 2000;
  const starsPositions = new Float32Array(starsCount * 3);
  for (let i = 0; i < starsCount * 3; i += 3) {
    const r = 50 + Math.random() * 100;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starsPositions[i] = r * Math.sin(phi) * Math.cos(theta);
    starsPositions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
    starsPositions[i + 2] = r * Math.cos(phi);
  }
  starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
  const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, sizeAttenuation: true });
  const stars = new THREE.Points(starsGeometry, starsMaterial);
  scene.add(stars);

  // Atmosphere glow
  const atmosphereGeometry = new THREE.SphereGeometry(5.3, 64, 64);
  const atmosphereMaterial = new THREE.MeshBasicMaterial({
    color: 0x44aaff,
    transparent: true,
    opacity: 0.08,
    side: THREE.BackSide
  });
  const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
  globeGroup.add(atmosphere);

  // Resize handler
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);

    if (window.__3D_STATE__.autoRotation) {
      globeGroup.rotation.y += 0.003;
    }

    controls.update();

    // Update state
    window.__3D_STATE__.globeRotationY = parseFloat(globeGroup.rotation.y.toFixed(4));
    window.__3D_STATE__.barCount = 8;

    // Recalculate total and max bar height from current data
    const currentData = populationData[window.__3D_STATE__.currentYear];
    let total = 0;
    let maxH = 0;
    for (const country in currentData) {
      total += currentData[country];
      const h = currentData[country] * HEIGHT_SCALE;
      if (h > maxH) maxH = h;
    }
    window.__3D_STATE__.totalPopulation = parseFloat(total.toFixed(2));
    window.__3D_STATE__.maxBarHeight = parseFloat(maxH.toFixed(2));

    renderer.render(scene, camera);
  }

  animate();
})();
</script>
</body>
</html>
