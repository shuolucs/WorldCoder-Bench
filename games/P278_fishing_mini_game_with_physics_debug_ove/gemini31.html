<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Fishing Mini-Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #scoreDisplay {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #statusText {
            position: absolute;
            top: 30%;
            width: 100%;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
            transition: opacity 0.3s;
        }
        #tensionContainer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 30px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            border-radius: 15px;
            overflow: hidden;
            display: none;
        }
        #tensionBar {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s, background-color 0.2s;
        }
        #tensionLabel {
            position: absolute;
            width: 100%;
            text-align: center;
            line-height: 30px;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        #toggleDebug {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #333;
            color: white;
            border: 1px solid #666;
            cursor: pointer;
            pointer-events: auto;
            font-family: monospace;
        }
        #toggleDebug:hover {
            background: #555;
        }
        #debugPanel {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #0f0;
            display: none;
            white-space: pre;
            pointer-events: none;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 16px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="hud">
        <div id="scoreDisplay">Fish Caught: 0</div>
        <div id="statusText">Press SPACE to Cast</div>
        <div id="tensionContainer">
            <div id="tensionBar"></div>
            <div id="tensionLabel">TENSION</div>
        </div>
        <button id="toggleDebug">Toggle Debug</button>
        <div id="debugPanel"></div>
        <div class="controls-hint">SPACE: Cast | R: Reel in</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            gameState: 'idle', // 'idle', 'casting', 'waiting', 'bite', 'reeling', 'caught', 'missed', 'snapped'
            caughtCount: 0,
            bobberPosition: { x: 0, y: 0, z: 0 },
            tension: 0,
            reelProgress: 0,
            fishCount: 5,
            debugMode: false,
            fishPositions: [],
            lineLength: 0,
            frameTime: 0,
            bobberUnderwater: false,
            castCount: 0,
            modelLoaded: false
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        // Environment
        const waterGeo = new THREE.PlaneGeometry(30, 30);
        const waterMat = new THREE.MeshPhongMaterial({
            color: 0x2266AA,
            transparent: true,
            opacity: 0.6,
            side: THREE.DoubleSide
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI / 2;
        water.position.y = 0;
        scene.add(water);

        const shoreGeo = new THREE.BoxGeometry(30, 1, 10);
        const shoreMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
        const shore = new THREE.Mesh(shoreGeo, shoreMat);
        shore.position.set(0, -0.5, 10);
        scene.add(shore);

        // Load Model
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            model.position.set(3, 0.5, 10);
            scene.add(model);
            window.__3D_STATE__.modelLoaded = true;
        }, undefined, (error) => {
            console.error('Error loading model:', error);
        });

        // --- Fishing Gear ---
        const rodGeo = new THREE.CylinderGeometry(0.05, 0.03, 4, 8);
        rodGeo.translate(0, 2, 0); // Move origin to base
        const rodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
        const rod = new THREE.Mesh(rodGeo, rodMat);
        rod.position.set(-2, 2, 8);
        rod.rotation.x = -Math.PI / 4;
        scene.add(rod);

        // Calculate rod tip position
        const rodTipPos = new THREE.Vector3(0, 4, 0);
        rodTipPos.applyEuler(rod.rotation);
        rodTipPos.add(rod.position);

        const bobberGeo = new THREE.SphereGeometry(0.15);
        const bobberMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const bobber = new THREE.Mesh(bobberGeo, bobberMat);
        const idleBobberPos = new THREE.Vector3(-2, 0.5, 5);
        bobber.position.copy(idleBobberPos);
        scene.add(bobber);

        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const lineGeo = new THREE.BufferGeometry().setFromPoints([rodTipPos, bobber.position]);
        const line = new THREE.Line(lineGeo, lineMat);
        scene.add(line);

        // --- Fish System ---
        const fishes = [];
        const fishColors = [0xff9900, 0x00ff00, 0xff00ff, 0x00ffff, 0xffff00];
        const fishGeo = new THREE.SphereGeometry(0.4, 16, 16);
        fishGeo.scale(1, 0.5, 0.5); // Elongate

        for (let i = 0; i < 5; i++) {
            const mat = new THREE.MeshPhongMaterial({ color: fishColors[i] });
            const fish = new THREE.Mesh(fishGeo, mat);
            
            // Random initial state
            fish.position.set(
                (Math.random() - 0.5) * 20,
                -1 - Math.random() * 2,
                -10 + Math.random() * 15
            );
            
            fish.userData = {
                speed: 0.5 + Math.random() * 1.5,
                baseZ: fish.position.z,
                freq: 0.5 + Math.random(),
                amp: 1 + Math.random() * 2,
                phase: Math.random() * Math.PI * 2,
                velocity: new THREE.Vector3()
            };
            
            scene.add(fish);
            fishes.push(fish);
        }

        // --- Debug Helpers ---
        const debugGroup = new THREE.Group();
        debugGroup.visible = false;
        scene.add(debugGroup);

        // Bobber detection radius
        const detectGeo = new THREE.SphereGeometry(2.0, 16, 16);
        const detectMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true });
        const detectSphere = new THREE.Mesh(detectGeo, detectMat);
        debugGroup.add(detectSphere);

        // Fish debug
        const fishDebugs = [];
        fishes.forEach(fish => {
            const fGeo = new THREE.SphereGeometry(0.4, 8, 8);
            const fMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const fSphere = new THREE.Mesh(fGeo, fMat);
            
            const arrow = new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(), 1, 0xff0000);
            
            debugGroup.add(fSphere);
            debugGroup.add(arrow);
            fishDebugs.push({ sphere: fSphere, arrow: arrow });
        });

        // --- Game Logic Variables ---
        let castTarget = new THREE.Vector3();
        let castStart = new THREE.Vector3();
        let castProgress = 0;
        let activeFish = null;
        let reactionTimer = 0;
        let stateTimer = 0;
        let bobberBaseY = 0.1;

        // --- UI Elements ---
        const statusText = document.getElementById('statusText');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const tensionContainer = document.getElementById('tensionContainer');
        const tensionBar = document.getElementById('tensionBar');
        const debugPanel = document.getElementById('debugPanel');
        const toggleDebugBtn = document.getElementById('toggleDebug');

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__.gameState;
            
            if (e.code === 'Space') {
                if (['idle', 'caught', 'missed', 'snapped'].includes(state)) {
                    startCast();
                }
            } else if (e.code === 'KeyR') {
                if (state === 'bite') {
                    startReeling();
                } else if (state === 'reeling') {
                    reel();
                }
            }
        });

        toggleDebugBtn.addEventListener('click', () => {
            window.__3D_STATE__.debugMode = !window.__3D_STATE__.debugMode;
            debugGroup.visible = window.__3D_STATE__.debugMode;
            debugPanel.style.display = window.__3D_STATE__.debugMode ? 'block' : 'none';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Game Functions ---
        function setGameState(newState, message = '') {
            window.__3D_STATE__.gameState = newState;
            if (message) {
                statusText.innerText = message;
                statusText.style.opacity = 1;
            } else {
                statusText.style.opacity = 0;
            }

            if (newState === 'reeling') {
                tensionContainer.style.display = 'block';
            } else {
                tensionContainer.style.display = 'none';
            }
        }

        function startCast() {
            window.__3D_STATE__.castCount++;
            castStart.copy(bobber.position);
            castTarget.set(
                (Math.random() - 0.5) * 10, // x: -5 to 5
                0.1,
                -8 + Math.random() * 10    // z: -8 to 2
            );
            castProgress = 0;
            bobberMat.color.setHex(0xff0000);
            setGameState('casting', 'Casting...');
        }

        function triggerBite(fish) {
            activeFish = fish;
            bobberBaseY = -0.3;
            bobberMat.color.setHex(0xffff00);
            reactionTimer = 3.0;
            setGameState('bite', 'FISH ON!');
        }

        function startReeling() {
            window.__3D_STATE__.tension = 0;
            window.__3D_STATE__.reelProgress = 0;
            setGameState('reeling', 'Reel it in! (Press R)');
        }

        function reel() {
            window.__3D_STATE__.reelProgress += 10;
            window.__3D_STATE__.tension += 15;
            
            if (window.__3D_STATE__.tension > 80) {
                setGameState('snapped', 'Line snapped!');
                stateTimer = 2.0;
                resetBobber();
            } else if (window.__3D_STATE__.reelProgress >= 100) {
                catchFish();
            }
        }

        function catchFish() {
            window.__3D_STATE__.caughtCount++;
            scoreDisplay.innerText = `Fish Caught: ${window.__3D_STATE__.caughtCount}`;
            setGameState('caught', 'Caught one!');
            stateTimer = 2.0;
            
            // Move fish to shore
            if (activeFish) {
                activeFish.position.set(0, 0.5, 8);
            }
            resetBobber();
        }

        function resetBobber() {
            bobber.position.copy(idleBobberPos);
            bobberBaseY = 0.1;
            bobberMat.color.setHex(0xff0000);
            activeFish = null;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();
            window.__3D_STATE__.frameTime = dt * 1000;

            const state = window.__3D_STATE__.gameState;

            // Update Fish
            window.__3D_STATE__.fishPositions = [];
            fishes.forEach((fish, i) => {
                if (state === 'caught' && fish === activeFish) {
                    // Fish is on shore, don't move
                } else {
                    // Sinusoidal movement
                    const prevX = fish.position.x;
                    const prevZ = fish.position.z;

                    fish.position.x += fish.userData.speed * dt;
                    if (fish.position.x > 10) fish.position.x = -10;
                    
                    fish.position.z = fish.userData.baseZ + Math.sin(time * fish.userData.freq + fish.userData.phase) * fish.userData.amp;

                    // Calculate velocity for rotation and debug
                    fish.userData.velocity.set(
                        (fish.position.x - prevX) / dt,
                        0,
                        (fish.position.z - prevZ) / dt
                    );
                    
                    if (fish.userData.velocity.lengthSq() > 0.001) {
                        fish.rotation.y = Math.atan2(-fish.userData.velocity.z, fish.userData.velocity.x);
                    }
                }
                
                window.__3D_STATE__.fishPositions.push({
                    x: fish.position.x,
                    y: fish.position.y,
                    z: fish.position.z
                });

                // Update debug helpers
                if (window.__3D_STATE__.debugMode) {
                    fishDebugs[i].sphere.position.copy(fish.position);
                    fishDebugs[i].arrow.position.copy(fish.position);
                    if (fish.userData.velocity.lengthSq() > 0) {
                        fishDebugs[i].arrow.setDirection(fish.userData.velocity.clone().normalize());
                        fishDebugs[i].arrow.setLength(fish.userData.velocity.length() * 0.5 + 0.5);
                    }
                }
            });

            // State Machine Logic
            if (state === 'casting') {
                castProgress += dt * 2.0; // 0.5s cast time
                if (castProgress >= 1.0) {
                    castProgress = 1.0;
                    bobber.position.copy(castTarget);
                    bobberBaseY = 0.1;
                    setGameState('waiting', 'Waiting...');
                } else {
                    // Parabolic arc
                    bobber.position.lerpVectors(castStart, castTarget, castProgress);
                    bobber.position.y += Math.sin(castProgress * Math.PI) * 2.0;
                }
            } 
            else if (state === 'waiting') {
                // Bobbing animation
                bobber.position.y = bobberBaseY + Math.sin(time * 3) * 0.05;
                
                // Bite detection
                for (let fish of fishes) {
                    if (fish.position.distanceTo(bobber.position) < 2.0) {
                        if (Math.random() < dt / 3.0) { // Roughly 3s average wait when near
                            triggerBite(fish);
                            break;
                        }
                    }
                }
            }
            else if (state === 'bite') {
                bobber.position.y = bobberBaseY + Math.sin(time * 15) * 0.05; // Frantic bobbing
                reactionTimer -= dt;
                if (reactionTimer <= 0) {
                    setGameState('missed', 'It got away!');
                    stateTimer = 2.0;
                    resetBobber();
                }
            }
            else if (state === 'reeling') {
                // Tension decay
                window.__3D_STATE__.tension = Math.max(0, window.__3D_STATE__.tension - 5 * dt);
                
                // Update UI Bar
                tensionBar.style.width = `${window.__3D_STATE__.tension}%`;
                if (window.__3D_STATE__.tension < 40) tensionBar.style.background = '#00ff00';
                else if (window.__3D_STATE__.tension < 70) tensionBar.style.background = '#ffff00';
                else tensionBar.style.background = '#ff0000';

                // Bobber moves towards rod
                bobber.position.lerp(rodTipPos, dt * 0.5);
                
                // Fish follows bobber
                if (activeFish) {
                    activeFish.position.x = bobber.position.x;
                    activeFish.position.z = bobber.position.z;
                    activeFish.position.y = -0.5;
                }
            }
            else if (['caught', 'missed', 'snapped'].includes(state)) {
                stateTimer -= dt;
                if (stateTimer <= 0) {
                    setGameState('idle', 'Press SPACE to Cast');
                    // Reset caught fish position
                    if (state === 'caught' && activeFish) {
                        activeFish.position.set(
                            (Math.random() - 0.5) * 20,
                            -1 - Math.random() * 2,
                            -10 + Math.random() * 15
                        );
                        activeFish = null;
                    }
                }
            }

            // Update Line
            const positions = line.geometry.attributes.position.array;
            positions[0] = rodTipPos.x;
            positions[1] = rodTipPos.y;
            positions[2] = rodTipPos.z;
            positions[3] = bobber.position.x;
            positions[4] = bobber.position.y;
            positions[5] = bobber.position.z;
            line.geometry.attributes.position.needsUpdate = true;

            // Update State Object
            window.__3D_STATE__.bobberPosition = { x: bobber.position.x, y: bobber.position.y, z: bobber.position.z };
            window.__3D_STATE__.lineLength = rodTipPos.distanceTo(bobber.position);
            window.__3D_STATE__.bobberUnderwater = bobber.position.y < 0;

            // Update Debug Visuals
            if (window.__3D_STATE__.debugMode) {
                detectSphere.position.copy(bobber.position);
                detectSphere.position.y = 0; // Keep detection sphere at water level
                
                debugPanel.innerText = `
State: ${window.__3D_STATE__.gameState}
FPS: ${(1000/window.__3D_STATE__.frameTime).toFixed(1)}
Tension: ${window.__3D_STATE__.tension.toFixed(1)}
Reel Prog: ${window.__3D_STATE__.reelProgress.toFixed(1)}
Bobber: ${bobber.position.x.toFixed(2)}, ${bobber.position.y.toFixed(2)}, ${bobber.position.z.toFixed(2)}
Line Len: ${window.__3D_STATE__.lineLength.toFixed(2)}
                `.trim();
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
