<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fishing Mini-Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #87CEEB;
    }

    canvas {
      display: block;
    }

    #scoreDisplay {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 18px;
      z-index: 10;
    }

    #statusText {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 24px;
      font-weight: bold;
      z-index: 10;
      min-width: 220px;
      text-align: center;
      pointer-events: none;
    }

    #toggleDebug {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: rgba(0,0,0,0.6);
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #debugPanel {
      position: absolute;
      top: 56px;
      right: 12px;
      width: 320px;
      max-height: 60vh;
      overflow: auto;
      z-index: 10;
      background: rgba(0,0,0,0.65);
      color: #bfffbf;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      white-space: pre-wrap;
      display: none;
    }

    #tensionBarContainer {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      height: 22px;
      background: rgba(0,0,0,0.35);
      border-radius: 12px;
      overflow: hidden;
      z-index: 10;
      border: 2px solid rgba(255,255,255,0.5);
    }

    #tensionBar {
      width: 0%;
      height: 100%;
      background: #00cc66;
      transition: width 0.08s linear, background 0.08s linear;
    }

    #controlsHint {
      position: absolute;
      bottom: 50px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="scoreDisplay">Fish Caught: 0</div>
  <div id="statusText">Cast your line!</div>
  <button id="toggleDebug">Toggle Debug</button>
  <div id="debugPanel"></div>
  <div id="tensionBarContainer">
    <div id="tensionBar"></div>
  </div>
  <div id="controlsHint">
    SPACE: Cast<br />
    R: Reel in
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const water = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshPhongMaterial({
        color: 0x2266AA,
        opacity: 0.6,
        transparent: true,
        side: THREE.DoubleSide
      })
    );
    water.rotation.x = -Math.PI / 2;
    water.position.y = 0;
    scene.add(water);

    const shore = new THREE.Mesh(
      new THREE.BoxGeometry(30, 1, 10),
      new THREE.MeshPhongMaterial({ color: 0x8B4513 })
    );
    shore.position.set(0, -0.5, 10);
    scene.add(shore);

    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      'TextureTransformMultiTest.glb',
      (gltf) => {
        gltf.scene.scale.set(0.5, 0.5, 0.5);
        gltf.scene.position.set(3, 0.5, 10);
        scene.add(gltf.scene);
        modelLoaded = true;
      },
      undefined,
      () => {
        modelLoaded = false;
      }
    );

    const rod = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.03, 4, 8),
      new THREE.MeshPhongMaterial({ color: 0x6B4423 })
    );
    rod.position.set(-2, 2, 8);
    rod.rotation.x = -Math.PI / 4;
    scene.add(rod);

    const rodTipLocal = new THREE.Vector3(0, 2, 0);
    const rodTipWorld = new THREE.Vector3();

    function updateRodTipWorld() {
      rod.updateMatrixWorld();
      rodTipWorld.copy(rodTipLocal).applyMatrix4(rod.matrixWorld);
      if (!isFiniteVec3(rodTipWorld)) rodTipWorld.set(-2, 3.4, 6.6);
    }

    updateRodTipWorld();

    const initialHookPos = new THREE.Vector3(-2, 0.1, 5);

    const bobber = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 16, 16),
      new THREE.MeshPhongMaterial({ color: 0xff0000 })
    );
    bobber.position.copy(initialHookPos);
    scene.add(bobber);

    const lineGeometry = new THREE.BufferGeometry().setFromPoints([
      rodTipWorld.clone(),
      bobber.position.clone()
    ]);
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
    const fishingLine = new THREE.Line(lineGeometry, lineMaterial);
    scene.add(fishingLine);

    function updateFishingLine() {
      updateRodTipWorld();
      const positions = fishingLine.geometry.attributes.position.array;
      positions[0] = rodTipWorld.x;
      positions[1] = rodTipWorld.y;
      positions[2] = rodTipWorld.z;
      positions[3] = bobber.position.x;
      positions[4] = bobber.position.y;
      positions[5] = bobber.position.z;
      fishingLine.geometry.attributes.position.needsUpdate = true;
      fishingLine.geometry.computeBoundingSphere();
    }

    const fishGroup = new THREE.Group();
    scene.add(fishGroup);

    const fishColors = [0xff8844, 0x44ff88, 0x4488ff, 0xffff44, 0xff44ff];
    const fishes = [];

    function createFish(index) {
      const geometry = new THREE.SphereGeometry(0.4, 16, 16);
      geometry.scale(1.4, 0.6, 0.6);

      const fish = new THREE.Mesh(
        geometry,
        new THREE.MeshPhongMaterial({ color: fishColors[index % fishColors.length] })
      );

      const x = THREE.MathUtils.randFloat(-10, 10);
      const y = THREE.MathUtils.randFloat(-3, -1);
      const z = THREE.MathUtils.randFloat(-10, 5);

      fish.position.set(x, y, z);

      const data = {
        mesh: fish,
        baseX: x,
        baseY: y,
        baseZ: z,
        speed: THREE.MathUtils.randFloat(0.5, 2.0),
        phase: Math.random() * Math.PI * 2,
        zAmp: THREE.MathUtils.randFloat(0.5, 2.0),
        xAmp: THREE.MathUtils.randFloat(1.0, 4.0),
        lastPosition: fish.position.clone(),
        velocity: new THREE.Vector3(),
        nearBobberTime: 0,
        biteCooldown: 0,
        debugSphere: null,
        debugArrow: null
      };

      fishes.push(data);
      fishGroup.add(fish);
    }

    for (let i = 0; i < 5; i++) createFish(i);

    const debugGroup = new THREE.Group();
    scene.add(debugGroup);

    const bobberDetectSphere = new THREE.Mesh(
      new THREE.SphereGeometry(2.0, 16, 16),
      new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true })
    );
    bobberDetectSphere.visible = false;
    debugGroup.add(bobberDetectSphere);

    fishes.forEach((f) => {
      const s = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 12, 12),
        new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true })
      );
      s.visible = false;
      debugGroup.add(s);
      f.debugSphere = s;

      const arrow = new THREE.ArrowHelper(
        new THREE.Vector3(1, 0, 0),
        f.mesh.position.clone(),
        1,
        0x00ff00
      );
      arrow.visible = false;
      debugGroup.add(arrow);
      f.debugArrow = arrow;
    });

    const scoreDisplay = document.getElementById('scoreDisplay');
    const statusText = document.getElementById('statusText');
    const debugPanel = document.getElementById('debugPanel');
    const toggleDebugBtn = document.getElementById('toggleDebug');
    const tensionBar = document.getElementById('tensionBar');

    let debugMode = false;
    let gameState = 'idle';
    let caughtCount = 0;
    let tension = 0;
    let reelProgress = 0;
    let castCount = 0;

    let castStart = new THREE.Vector3();
    let castTarget = new THREE.Vector3();
    let castTimer = 0;
    const castDuration = 1.0;

    let biteTimer = 0;
    let hookedFish = null;
    let catchAnimTimer = 0;
    let catchAnimStart = new THREE.Vector3();
    let catchAnimEnd = new THREE.Vector3(-1, 0.5, 10);

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      gameState: 'idle',
      caughtCount: 0,
      bobberPosition: { x: 0, y: 0, z: 0 },
      tension: 0,
      reelProgress: 0,
      fishCount: 5,
      debugMode: false,
      fishPositions: [],
      lineLength: 0,
      frameTime: 0,
      bobberUnderwater: false,
      castCount: 0,
      modelLoaded: false
    };

    function setStatus(text) {
      statusText.textContent = text;
    }

    function clampNumber(v, min, max, fallback = 0) {
      if (!Number.isFinite(v)) return fallback;
      return Math.min(max, Math.max(min, v));
    }

    function isFiniteVec3(v) {
      return Number.isFinite(v.x) && Number.isFinite(v.y) && Number.isFinite(v.z);
    }

    function sanitizeVec3(v, fallback = new THREE.Vector3()) {
      if (!isFiniteVec3(v)) return fallback.clone();
      return v;
    }

    function updateTensionBar() {
      const safeTension = clampNumber(tension, 0, 100, 0);
      tensionBar.style.width = `${safeTension}%`;
      if (safeTension < 40) tensionBar.style.background = '#00cc66';
      else if (safeTension <= 70) tensionBar.style.background = '#ffcc00';
      else tensionBar.style.background = '#ff3333';
    }

    function resetBobberToShore() {
      bobber.position.set(-2, 0.1, 5);
      bobber.material.color.set(0xff0000);
    }

    function resetToIdle(message = 'Cast your line!') {
      gameState = 'idle';
      tension = 0;
      reelProgress = 0;
      biteTimer = 0;
      hookedFish = null;
      catchAnimTimer = 0;
      resetBobberToShore();
      setStatus(message);
    }

    function startCast() {
      if (gameState === 'casting') return;
      castCount++;
      gameState = 'casting';
      castTimer = 0;
      castStart.copy(bobber.position);
      castTarget.set(
        THREE.MathUtils.randFloat(-5, 5),
        0.1,
        THREE.MathUtils.randFloat(-8, 2)
      );
      bobber.material.color.set(0xff0000);
      setStatus('Casting...');
    }

    function triggerBite(fish) {
      if (gameState !== 'waiting') return;
      gameState = 'bite';
      hookedFish = fish;
      biteTimer = 3.0;
      bobber.position.y = -0.3;
      bobber.material.color.set(0xffff00);
      setStatus('FISH ON!');
      fish.biteCooldown = 3.0;
    }

    function missFish() {
      gameState = 'missed';
      hookedFish = null;
      bobber.material.color.set(0xff0000);
      setStatus('It got away!');
      setTimeout(() => resetToIdle('Cast your line!'), 1000);
    }

    function snapLine() {
      gameState = 'snapped';
      hookedFish = null;
      tension = 100;
      setStatus('Line snapped!');
      setTimeout(() => resetToIdle('Cast your line!'), 1200);
    }

    function catchFish() {
      if (!hookedFish) return;
      gameState = 'caught';
      caughtCount++;
      scoreDisplay.textContent = `Fish Caught: ${caughtCount}`;
      setStatus('Caught one!');
      catchAnimTimer = 0;
      catchAnimStart.copy(hookedFish.mesh.position);
      hookedFish.mesh.position.copy(bobber.position);
      hookedFish.mesh.visible = true;
      bobber.material.color.set(0xff0000);
    }

    function handleReelPress() {
      if (gameState !== 'bite' && gameState !== 'reeling') return;
      gameState = 'reeling';
      reelProgress = clampNumber(reelProgress + 10, 0, 100, 0);
      tension = clampNumber(tension + 15, 0, 100, 0);

      if (tension > 80) {
        snapLine();
        return;
      }

      if (hookedFish) {
        hookedFish.mesh.position.lerp(bobber.position, 0.2);
      }

      if (reelProgress >= 100) {
        catchFish();
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (gameState === 'idle' || gameState === 'waiting') startCast();
      }
      if (e.code === 'KeyR') {
        handleReelPress();
      }
    });

    toggleDebugBtn.addEventListener('click', () => {
      debugMode = !debugMode;
      debugPanel.style.display = debugMode ? 'block' : 'none';
      bobberDetectSphere.visible = debugMode;
      fishes.forEach((f) => {
        f.debugSphere.visible = debugMode;
        f.debugArrow.visible = debugMode;
      });
    });

    function updateFish(dt, elapsed) {
      for (let i = 0; i < fishes.length; i++) {
        const f = fishes[i];

        f.biteCooldown = Math.max(0, clampNumber(f.biteCooldown - dt, 0, 1000, 0));

        f.lastPosition.copy(f.mesh.position);

        const nx = f.baseX + Math.sin(elapsed * f.speed + f.phase) * f.xAmp;
        const nz = f.baseZ + Math.cos(elapsed * f.speed * 1.3 + f.phase) * f.zAmp;
        const ny = f.baseY + Math.sin(elapsed * f.speed * 2.1 + f.phase) * 0.1;

        f.mesh.position.set(
          clampNumber(nx, -14, 14, f.baseX),
          clampNumber(ny, -3.5, -0.5, f.baseY),
          clampNumber(nz, -14, 8, f.baseZ)
        );

        f.velocity.copy(f.mesh.position).sub(f.lastPosition);
        if (dt > 0) {
          f.velocity.divideScalar(dt);
        } else {
          f.velocity.set(0, 0, 0);
        }

        if (!isFiniteVec3(f.velocity)) f.velocity.set(0, 0, 0);
        if (!isFiniteVec3(f.mesh.position)) f.mesh.position.set(f.baseX, f.baseY, f.baseZ);

        if (gameState === 'waiting' && f.biteCooldown <= 0) {
          const dist = f.mesh.position.distanceTo(bobber.position);
          if (Number.isFinite(dist) && dist <= 2.0) {
            f.nearBobberTime += dt;
            if (f.nearBobberTime >= 3.0) {
              if (Math.random() < 0.02) {
                triggerBite(f);
              }
              f.nearBobberTime = 0;
            }
          } else {
            f.nearBobberTime = 0;
          }
        } else {
          if (gameState !== 'waiting') f.nearBobberTime = 0;
        }
      }
    }

    function updateGame(dt) {
      tension = clampNumber(tension - 5 * dt, 0, 100, 0);

      if (gameState === 'casting') {
        castTimer += dt;
        const t = clampNumber(castTimer / castDuration, 0, 1, 0);
        bobber.position.lerpVectors(castStart, castTarget, t);
        bobber.position.y = 0.1 + Math.sin(t * Math.PI) * 1.2;
        if (t >= 1) {
          bobber.position.copy(castTarget);
          bobber.position.y = 0.1;
          gameState = 'waiting';
          setStatus('Waiting...');
        }
      } else if (gameState === 'waiting') {
        const time = clock.elapsedTime;
        bobber.position.y = 0.1 + Math.sin(time * 3) * 0.03;
      } else if (gameState === 'bite') {
        biteTimer -= dt;
        bobber.position.y = -0.3 + Math.sin(clock.elapsedTime * 10) * 0.03;
        if (biteTimer <= 0) {
          missFish();
        }
      } else if (gameState === 'reeling') {
        if (hookedFish) {
          hookedFish.mesh.position.lerp(bobber.position, 0.05);
        }
      } else if (gameState === 'caught') {
        if (hookedFish) {
          catchAnimTimer += dt;
          const t = clampNumber(catchAnimTimer / 1.0, 0, 1, 0);
          hookedFish.mesh.position.lerpVectors(catchAnimStart, catchAnimEnd, t);
          hookedFish.mesh.position.y += Math.sin(t * Math.PI) * 2.0;
          if (t >= 1) {
            hookedFish.baseX = THREE.MathUtils.randFloat(-10, 10);
            hookedFish.baseY = THREE.MathUtils.randFloat(-3, -1);
            hookedFish.baseZ = THREE.MathUtils.randFloat(-10, 5);
            hookedFish.phase = Math.random() * Math.PI * 2;
            hookedFish.mesh.position.set(hookedFish.baseX, hookedFish.baseY, hookedFish.baseZ);
            hookedFish = null;
            resetToIdle('Cast your line!');
          }
        }
      }

      if (!isFiniteVec3(bobber.position)) {
        bobber.position.copy(initialHookPos);
      }

      updateFishingLine();
      updateTensionBar();
    }

    function updateDebug(frameTime) {
      bobberDetectSphere.position.copy(bobber.position);
      bobberDetectSphere.visible = debugMode;

      fishes.forEach((f, i) => {
        if (f.debugSphere) {
          f.debugSphere.position.copy(f.mesh.position);
          f.debugSphere.visible = debugMode;
        }

        if (f.debugArrow) {
          const vel = f.velocity.clone();
          const len = clampNumber(vel.length() * 0.05, 0.1, 2.0, 0.1);
          const dir = vel.lengthSq() > 0.0001 ? vel.clone().normalize() : new THREE.Vector3(1, 0, 0);
          f.debugArrow.position.copy(f.mesh.position);
          f.debugArrow.setDirection(dir);
          f.debugArrow.setLength(len);
          f.debugArrow.visible = debugMode;
        }
      });

      if (debugMode) {
        const fishLines = fishes.map((f, i) =>
          `Fish ${i}: (${f.mesh.position.x.toFixed(2)}, ${f.mesh.position.y.toFixed(2)}, ${f.mesh.position.z.toFixed(2)})`
        ).join('\n');

        debugPanel.textContent =
`Debug Mode: ON
State: ${gameState}
Bobber: (${bobber.position.x.toFixed(2)}, ${bobber.position.y.toFixed(2)}, ${bobber.position.z.toFixed(2)})
Tension: ${tension.toFixed(2)}
Reel Progress: ${reelProgress.toFixed(2)}
Frame Time: ${frameTime.toFixed(2)} ms
Line Length: ${rodTipWorld.distanceTo(bobber.position).toFixed(2)}

${fishLines}`;
      }
    }

    function update3DState(frameTime) {
      const fishPositions = fishes.map(f => ({
        x: clampNumber(f.mesh.position.x, -9999, 9999, 0),
        y: clampNumber(f.mesh.position.y, -9999, 9999, 0),
        z: clampNumber(f.mesh.position.z, -9999, 9999, 0)
      }));

      const lineLength = clampNumber(rodTipWorld.distanceTo(bobber.position), 0, 9999, 0);

      window.__3D_STATE__.gameState = gameState;
      window.__3D_STATE__.caughtCount = caughtCount;
      window.__3D_STATE__.bobberPosition = {
        x: clampNumber(bobber.position.x, -9999, 9999, 0),
        y: clampNumber(bobber.position.y, -9999, 9999, 0),
        z: clampNumber(bobber.position.z, -9999, 9999, 0)
      };
      window.__3D_STATE__.tension = clampNumber(tension, 0, 100, 0);
      window.__3D_STATE__.reelProgress = clampNumber(reelProgress, 0, 100, 0);
      window.__3D_STATE__.fishCount = 5;
      window.__3D_STATE__.debugMode = debugMode;
      window.__3D_STATE__.fishPositions = fishPositions;
      window.__3D_STATE__.lineLength = lineLength;
      window.__3D_STATE__.frameTime = clampNumber(frameTime, 0, 1000, 0);
      window.__3D_STATE__.bobberUnderwater = bobber.position.y < 0;
      window.__3D_STATE__.castCount = castCount;
      window.__3D_STATE__.modelLoaded = modelLoaded;
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clampNumber(clock.getDelta(), 0, 0.1, 0.016);
      const elapsed = clock.elapsedTime;
      const frameTime = dt * 1000;

      updateFish(dt, elapsed);
      updateGame(dt);
      updateDebug(frameTime);
      update3DState(frameTime);

      controls.update();
      renderer.render(scene, camera);
    }

    updateFishingLine();
    updateTensionBar();
    scoreDisplay.textContent = `Fish Caught: ${caughtCount}`;
    setStatus('Cast your line!');
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
