<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Mini-Game</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
canvas { display: block; }

#scoreDisplay {
    position: absolute;
    top: 15px;
    left: 15px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 10px 20px;
    border-radius: 8px;
}

#statusText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
}

#tensionBarContainer {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 30px;
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.5);
    display: none;
}

#tensionBar {
    height: 100%;
    width: 0%;
    background: #44cc44;
    transition: width 0.1s, background-color 0.3s;
    border-radius: 15px;
}

#tensionLabel {
    position: absolute;
    bottom: 65px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    display: none;
}

#reelProgressContainer {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 20px;
    background: rgba(0,0,0,0.5);
    border-radius: 10px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.5);
    display: none;
}

#reelProgressBar {
    height: 100%;
    width: 0%;
    background: #4488ff;
    border-radius: 10px;
    transition: width 0.1s;
}

#reelLabel {
    position: absolute;
    bottom: 125px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    display: none;
}

#toggleDebug {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 10px 20px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: bold;
    z-index: 100;
}
#toggleDebug:hover {
    background: rgba(0,0,0,0.8);
}

#debugPanel {
    position: absolute;
    top: 60px;
    right: 15px;
    background: rgba(0,0,0,0.75);
    color: #00ff00;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 15px;
    border-radius: 8px;
    max-height: 500px;
    overflow-y: auto;
    display: none;
    min-width: 280px;
    border: 1px solid #00ff00;
}

#instructions {
    position: absolute;
    bottom: 15px;
    left: 15px;
    color: white;
    font-size: 14px;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.4);
    padding: 10px 15px;
    border-radius: 8px;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="scoreDisplay">Fish Caught: 0</div>
<div id="statusText">Press SPACE to cast your line!</div>

<div id="tensionLabel">Tension</div>
<div id="tensionBarContainer">
    <div id="tensionBar"></div>
</div>

<div id="reelLabel">Reel Progress</div>
<div id="reelProgressContainer">
    <div id="reelProgressBar"></div>
</div>

<button id="toggleDebug">Toggle Debug</button>
<div id="debugPanel"></div>

<div id="instructions">
    SPACE - Cast line<br>
    R - Reel in (when fish bites)<br>
    Don't let tension exceed 80!
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.update();

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Water surface
const waterGeo = new THREE.PlaneGeometry(30, 30);
const waterMat = new THREE.MeshPhongMaterial({
    color: 0x2266AA,
    opacity: 0.6,
    transparent: true,
    side: THREE.DoubleSide
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = 0;
scene.add(water);

// Ground/shore
const shoreGeo = new THREE.BoxGeometry(30, 1, 10);
const shoreMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
const shore = new THREE.Mesh(shoreGeo, shoreMat);
shore.position.set(0, -0.5, 10);
shore.receiveShadow = true;
scene.add(shore);

// Load GLB model
let modelLoaded = false;
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/TextureTransformMultiTest/glTF-Binary/TextureTransformMultiTest.glb',
    (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.5, 0.5, 0.5);
        model.position.set(3, 0.5, 10);
        scene.add(model);
        modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLB load failed, creating placeholder:', error);
        const boxGeo = new THREE.BoxGeometry(1, 0.5, 0.6);
        const boxMat = new THREE.MeshPhongMaterial({ color: 0x556655 });
        const box = new THREE.Mesh(boxGeo, boxMat);
        box.position.set(3, 0.75, 10);
        scene.add(box);
        modelLoaded = true;
    }
);

// Fishing rod
const rodGeo = new THREE.CylinderGeometry(0.05, 0.03, 4, 8);
const rodMat = new THREE.MeshPhongMaterial({ color: 0x8B4513 });
const rod = new THREE.Mesh(rodGeo, rodMat);
rod.position.set(-2, 2, 8);
rod.rotation.x = -Math.PI / 4;
scene.add(rod);

// Calculate rod tip position
const rodTip = new THREE.Vector3();
function getRodTip() {
    const tipLocal = new THREE.Vector3(0, 2, 0);
    rod.localToWorld(tipLocal);
    rodTip.copy(tipLocal);
    return rodTip;
}

// Bobber
const bobberGeo = new THREE.SphereGeometry(0.15, 16, 16);
const bobberMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
const bobber = new THREE.Mesh(bobberGeo, bobberMat);
bobber.position.set(-2, 0.1, 5);
scene.add(bobber);

// Fishing line
const lineGeo = new THREE.BufferGeometry();
const linePoints = [getRodTip(), bobber.position.clone()];
lineGeo.setFromPoints(linePoints);
const lineMat = new THREE.LineBasicMaterial({ color: 0xcccccc });
const fishingLine = new THREE.Line(lineGeo, lineMat);
scene.add(fishingLine);

// Fish system
const fishColors = [0xff6633, 0x33cc66, 0xffcc00, 0x6699ff, 0xff66cc];
const fishes = [];
const fishMeshes = [];

for (let i = 0; i < 5; i++) {
    const fishGeo = new THREE.SphereGeometry(0.4, 16, 8);
    fishGeo.scale(1, 0.5, 0.5);
    const fishMat = new THREE.MeshPhongMaterial({ color: fishColors[i] });
    const fish = new THREE.Mesh(fishGeo, fishMat);

    const x = (Math.random() - 0.5) * 20;
    const y = -1 - Math.random() * 2;
    const z = -10 + Math.random() * 15;
    fish.position.set(x, y, z);

    scene.add(fish);
    fishMeshes.push(fish);

    // Add tail
    const tailGeo = new THREE.ConeGeometry(0.15, 0.3, 4);
    const tailMat = new THREE.MeshPhongMaterial({ color: fishColors[i] });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.rotation.z = Math.PI / 2;
    tail.position.x = -0.45;
    fish.add(tail);

    fishes.push({
        mesh: fish,
        speed: 0.5 + Math.random() * 1.5,
        baseX: x,
        baseY: y,
        baseZ: z,
        phase: Math.random() * Math.PI * 2,
        phaseZ: Math.random() * Math.PI * 2,
        direction: Math.random() > 0.5 ? 1 : -1,
        proximityTime: 0,
        velocity: new THREE.Vector3()
    });
}

// Debug visuals
const debugGroup = new THREE.Group();
debugGroup.visible = false;
scene.add(debugGroup);

const fishDebugSpheres = [];
const fishArrowHelpers = [];

for (let i = 0; i < 5; i++) {
    const debugSphereGeo = new THREE.SphereGeometry(0.4, 8, 8);
    const debugSphereMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
    const debugSphere = new THREE.Mesh(debugSphereGeo, debugSphereMat);
    debugGroup.add(debugSphere);
    fishDebugSpheres.push(debugSphere);

    const arrow = new THREE.ArrowHelper(
        new THREE.Vector3(1, 0, 0), new THREE.Vector3(), 1, 0x00ffff
    );
    debugGroup.add(arrow);
    fishArrowHelpers.push(arrow);
}

const bobberDetectGeo = new THREE.SphereGeometry(2.0, 16, 16);
const bobberDetectMat = new THREE.MeshBasicMaterial({ color: 0xffff00, wireframe: true, transparent: true, opacity: 0.3 });
const bobberDetectSphere = new THREE.Mesh(bobberDetectGeo, bobberDetectMat);
debugGroup.add(bobberDetectSphere);

// Game state
let gameState = 'idle';
let caughtCount = 0;
let tension = 0;
let reelProgress = 0;
let debugMode = false;
let castCount = 0;
let biteTimer = 0;
let biteFishIndex = -1;
let castAnimProgress = 0;
let castStart = new THREE.Vector3();
let castEnd = new THREE.Vector3();
let catchAnimProgress = 0;
let statusTimeout = null;

const clock = new THREE.Clock();
let frameTime = 0;

// DOM elements
const scoreDisplay = document.getElementById('scoreDisplay');
const statusText = document.getElementById('statusText');
const tensionBar = document.getElementById('tensionBar');
const tensionBarContainer = document.getElementById('tensionBarContainer');
const tensionLabel = document.getElementById('tensionLabel');
const reelProgressBar = document.getElementById('reelProgressBar');
const reelProgressContainer = document.getElementById('reelProgressContainer');
const reelLabel = document.getElementById('reelLabel');
const debugPanel = document.getElementById('debugPanel');
const toggleDebugBtn = document.getElementById('toggleDebug');

function showStatus(text, duration) {
    statusText.textContent = text;
    statusText.style.opacity = '1';
    if (statusTimeout) clearTimeout(statusTimeout);
    if (duration) {
        statusTimeout = setTimeout(() => {
            statusText.style.opacity = '0';
        }, duration);
    }
}

function showBars(show) {
    tensionBarContainer.style.display = show ? 'block' : 'none';
    tensionLabel.style.display = show ? 'block' : 'none';
    reelProgressContainer.style.display = show ? 'block' : 'none';
    reelLabel.style.display = show ? 'block' : 'none';
}

function updateTensionBar() {
    const t = Math.max(0, Math.min(100, tension));
    tensionBar.style.width = t + '%';
    if (t < 40) tensionBar.style.backgroundColor = '#44cc44';
    else if (t < 70) tensionBar.style.backgroundColor = '#cccc44';
    else tensionBar.style.backgroundColor = '#cc4444';
}

function updateReelBar() {
    const r = Math.max(0, Math.min(100, reelProgress));
    reelProgressBar.style.width = r + '%';
}

function resetToIdle() {
    gameState = 'idle';
    tension = 0;
    reelProgress = 0;
    biteFishIndex = -1;
    bobberMat.color.setHex(0xff0000);
    bobber.position.set(-2, 0.1, 5);
    showBars(false);
    showStatus('Press SPACE to cast your line!', 0);
}

// Cast
function castLine() {
    if (gameState !== 'idle') return;
    gameState = 'casting';
    castCount++;
    castAnimProgress = 0;
    castStart.copy(bobber.position);
    castEnd.set(
        (Math.random() - 0.5) * 10,
        0.1,
        -8 + Math.random() * 10
    );
    bobberMat.color.setHex(0xff0000);
    showStatus('Casting...', 0);
    showBars(false);
}

// Reel
function reelIn() {
    if (gameState === 'bite') {
        gameState = 'reeling';
        showBars(true);
        showStatus('Reel it in! Press R!', 0);
    }
    if (gameState === 'reeling') {
        reelProgress += 10;
        tension += 15;
        if (tension > 80) {
            gameState = 'snapped';
            showBars(false);
            showStatus('Line snapped!', 2000);
            setTimeout(resetToIdle, 2000);
            return;
        }
        if (reelProgress >= 100) {
            gameState = 'caught';
            caughtCount++;
            scoreDisplay.textContent = 'Fish Caught: ' + caughtCount;
            showBars(false);
            showStatus('Caught one! 🐟', 2000);
            catchAnimProgress = 0;
            return;
        }
        updateTensionBar();
        updateReelBar();
    }
}

// Input
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        castLine();
    }
    if (e.code === 'KeyR') {
        e.preventDefault();
        reelIn();
    }
});

// Debug toggle
toggleDebugBtn.addEventListener('click', () => {
    debugMode = !debugMode;
    debugGroup.visible = debugMode;
    debugPanel.style.display = debugMode ? 'block' : 'none';
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state
window.__3D_STATE__ = {
    gameState: 'idle',
    caughtCount: 0,
    bobberPosition: { x: 0, y: 0, z: 0 },
    tension: 0,
    reelProgress: 0,
    fishCount: 5,
    debugMode: false,
    fishPositions: [],
    lineLength: 0,
    frameTime: 0,
    bobberUnderwater: false,
    castCount: 0,
    modelLoaded: false
};

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const elapsed = clock.getElapsedTime();
    const frameStart = performance.now();

    // Update fish positions
    for (let i = 0; i < fishes.length; i++) {
        const f = fishes[i];
        const prevX = f.mesh.position.x;
        const prevZ = f.mesh.position.z;

        f.mesh.position.x = f.baseX + Math.sin(elapsed * f.speed * 0.5 + f.phase) * 5 * f.direction;
        f.mesh.position.z = f.baseZ + Math.sin(elapsed * f.speed * 0.3 + f.phaseZ) * 3;
        f.mesh.position.y = f.baseY + Math.sin(elapsed * 2 + f.phase) * 0.2;

        // Keep fish in bounds
        f.mesh.position.x = Math.max(-14, Math.min(14, f.mesh.position.x));
        f.mesh.position.z = Math.max(-14, Math.min(5, f.mesh.position.z));
        f.mesh.position.y = Math.max(-3, Math.min(-0.5, f.mesh.position.y));

        // Velocity
        f.velocity.set(
            (f.mesh.position.x - prevX) / Math.max(delta, 0.001),
            0,
            (f.mesh.position.z - prevZ) / Math.max(delta, 0.001)
        );

        // Face direction of movement
        if (f.velocity.length() > 0.01) {
            f.mesh.lookAt(
                f.mesh.position.x + f.velocity.x,
                f.mesh.position.y,
                f.mesh.position.z + f.velocity.z
            );
        }

        // Bite detection
        if (gameState === 'waiting') {
            const dist = f.mesh.position.distanceTo(bobber.position);
            if (dist < 2.0) {
                f.proximityTime += delta;
                if (f.proximityTime > 3.0 && Math.random() < delta * 0.5) {
                    gameState = 'bite';
                    biteFishIndex = i;
                    biteTimer = 3.0;
                    bobber.position.y = -0.3;
                    bobberMat.color.setHex(0xffff00);
                    showStatus('🐟 FISH ON! Press R to reel!', 0);
                    f.proximityTime = 0;
                }
            } else {
                f.proximityTime = Math.max(0, f.proximityTime - delta);
            }
        }
    }

    // Cast animation
    if (gameState === 'casting') {
        castAnimProgress += delta * 2;
        if (castAnimProgress >= 1) {
            castAnimProgress = 1;
            gameState = 'waiting';
            showStatus('Waiting for a bite...', 0);
        }
        const t = castAnimProgress;
        const arcY = Math.sin(t * Math.PI) * 3;
        bobber.position.lerpVectors(castStart, castEnd, t);
        bobber.position.y = castEnd.y + arcY * (1 - t);
    }

    // Bobber bobbing when waiting
    if (gameState === 'waiting') {
        bobber.position.y = 0.1 + Math.sin(elapsed * 3) * 0.05;
    }

    // Bite timer
    if (gameState === 'bite') {
        biteTimer -= delta;
        bobber.position.y = -0.3 + Math.sin(elapsed * 10) * 0.1;
        if (biteTimer <= 0) {
            gameState = 'missed';
            showStatus('It got away! 😞', 2000);
            setTimeout(resetToIdle, 2000);
        }
    }

    // Tension decay
    if (gameState === 'reeling' || gameState === 'bite') {
        tension = Math.max(0, tension - 5 * delta);
        updateTensionBar();
    }

    // Catch animation
    if (gameState === 'caught') {
        catchAnimProgress += delta * 1.5;
        if (biteFishIndex >= 0 && biteFishIndex < fishes.length) {
            const f = fishes[biteFishIndex];
            const shorePos = new THREE.Vector3(-2, 1, 8);
            f.mesh.position.lerp(shorePos, catchAnimProgress * 0.05);
            f.mesh.position.y += Math.sin(catchAnimProgress * Math.PI) * 2 * (1 - catchAnimProgress);
        }
        bobber.position.lerp(new THREE.Vector3(-2, 0.1, 5), catchAnimProgress * 0.05);

        if (catchAnimProgress >= 1) {
            // Reset caught fish to random underwater position
            if (biteFishIndex >= 0 && biteFishIndex < fishes.length) {
                const f = fishes[biteFishIndex];
                f.baseX = (Math.random() - 0.5) * 20;
                f.baseY = -1 - Math.random() * 2;
                f.baseZ = -10 + Math.random() * 15;
                f.mesh.position.set(f.baseX, f.baseY, f.baseZ);
                f.phase = Math.random() * Math.PI * 2;
            }
            resetToIdle();
        }
    }

    // Update fishing line
    const tip = getRodTip();
    const positions = fishingLine.geometry.attributes.position;
    if (positions) {
        fishingLine.geometry.setFromPoints([tip, bobber.position.clone()]);
    } else {
        fishingLine.geometry.setFromPoints([tip, bobber.position.clone()]);
    }

    // Debug visuals
    if (debugMode) {
        for (let i = 0; i < fishes.length; i++) {
            fishDebugSpheres[i].position.copy(fishes[i].mesh.position);
            fishArrowHelpers[i].position.copy(fishes[i].mesh.position);
            const vel = fishes[i].velocity.clone();
            const len = vel.length();
            if (len > 0.01) {
                vel.normalize();
                fishArrowHelpers[i].setDirection(vel);
                fishArrowHelpers[i].setLength(Math.min(len * 0.3, 2));
            }
        }
        bobberDetectSphere.position.copy(bobber.position);

        // Update debug panel
        let debugHTML = `<b>== DEBUG INFO ==</b><br>`;
        debugHTML += `State: ${gameState}<br>`;
        debugHTML += `Tension: ${tension.toFixed(1)}<br>`;
        debugHTML += `Reel: ${reelProgress.toFixed(1)}<br>`;
        debugHTML += `Casts: ${castCount}<br>`;
        debugHTML += `Caught: ${caughtCount}<br>`;
        debugHTML += `Bobber: (${bobber.position.x.toFixed(2)}, ${bobber.position.y.toFixed(2)}, ${bobber.position.z.toFixed(2)})<br>`;
        debugHTML += `Bobber underwater: ${bobber.position.y < 0}<br>`;
        debugHTML += `Line length: ${tip.distanceTo(bobber.position).toFixed(2)}<br>`;
        debugHTML += `<br><b>Fish Positions:</b><br>`;
        for (let i = 0; i < fishes.length; i++) {
            const p = fishes[i].mesh.position;
            const dist = p.distanceTo(bobber.position);
            debugHTML += `Fish ${i}: (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}) dist:${dist.toFixed(1)} spd:${fishes[i].speed.toFixed(1)}<br>`;
        }
        debugHTML += `<br>Frame: ${frameTime.toFixed(1)}ms<br>`;
        debugHTML += `Model loaded: ${modelLoaded}`;
        debugPanel.innerHTML = debugHTML;
    }

    // Update __3D_STATE__
    const lineLen = tip.distanceTo(bobber.position);
    window.__3D_STATE__ = {
        gameState: gameState,
        caughtCount: caughtCount,
        bobberPosition: {
            x: bobber.position.x || 0,
            y: bobber.position.y || 0,
            z: bobber.position.z || 0
        },
        tension: tension || 0,
        reelProgress: reelProgress || 0,
        fishCount: 5,
        debugMode: debugMode,
        fishPositions: fishes.map(f => ({
            x: f.mesh.position.x || 0,
            y: f.mesh.position.y || 0,
            z: f.mesh.position.z || 0
        })),
        lineLength: isNaN(lineLen) ? 0 : lineLen,
        frameTime: frameTime || 0,
        bobberUnderwater: bobber.position.y < 0,
        castCount: castCount,
        modelLoaded: modelLoaded
    };

    controls.update();
    renderer.render(scene, camera);

    frameTime = performance.now() - frameStart;
}

showStatus('Press SPACE to cast your line!', 0);
animate();
</script>
</body>
</html>
