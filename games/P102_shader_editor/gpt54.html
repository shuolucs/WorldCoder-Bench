<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js GLSL Shader Editor</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #eee;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #leftPanel {
      width: 42%;
      min-width: 320px;
      max-width: 620px;
      background: #1a1a1a;
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 10px;
    }
    #rightPanel {
      flex: 1;
      position: relative;
      background: #000;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .row label {
      font-size: 13px;
      color: #ccc;
    }
    select, button, input[type="range"] {
      background: #262626;
      color: #eee;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 6px 8px;
    }
    button {
      cursor: pointer;
      background: #2d6cdf;
      border-color: #2d6cdf;
    }
    button:hover { filter: brightness(1.08); }

    textarea {
      width: 100%;
      flex: 1;
      resize: none;
      background: #0f1115;
      color: #d6e2ff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      tab-size: 2;
      outline: none;
    }
    #errorDisplay {
      min-height: 72px;
      max-height: 140px;
      overflow: auto;
      white-space: pre-wrap;
      background: #2a1111;
      color: #ff9b9b;
      border: 1px solid #5a2222;
      border-radius: 8px;
      padding: 10px;
      font-size: 12px;
      line-height: 1.4;
    }
    #hud {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 12px;
      pointer-events: none;
    }
    .sliderGroup {
      display: grid;
      grid-template-columns: 60px 1fr 60px;
      gap: 8px;
      align-items: center;
      width: 100%;
    }
    .title {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 2px;
    }
    .hint {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 4px;
    }
  </style>

  <!-- 必须严格遵守的 importmap -->
  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="leftPanel">
      <div class="title">GLSL 片段着色器编辑器</div>
      <div class="hint">左侧编辑 fragment shader，点击“应用 Shader”实时更新右侧 3D 预览。</div>

      <div class="row">
        <label for="presetSelect">预设</label>
        <select id="presetSelect"></select>

        <label for="meshSelect">模型</label>
        <select id="meshSelect">
          <option value="plane">plane</option>
          <option value="sphere">sphere</option>
          <option value="torus">torus</option>
        </select>

        <button id="applyBtn">应用 Shader</button>
      </div>

      <div class="sliderGroup">
        <label for="u_slider1">u1</label>
        <input id="u_slider1" type="range" min="0" max="1" step="0.001" value="0.5" />
        <span id="u_val1">0.500</span>
      </div>

      <div class="sliderGroup">
        <label for="u_slider2">u2</label>
        <input id="u_slider2" type="range" min="0" max="1" step="0.001" value="0.5" />
        <span id="u_val2">0.500</span>
      </div>

      <div class="sliderGroup">
        <label for="u_slider3">u3</label>
        <input id="u_slider3" type="range" min="0" max="1" step="0.001" value="0.5" />
        <span id="u_val3">0.500</span>
      </div>

      <textarea id="shaderEditor" spellcheck="false"></textarea>
      <div id="errorDisplay">暂无错误</div>
    </div>

    <div id="rightPanel">
      <div id="hud">FPS: --</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const shaderEditor = document.getElementById('shaderEditor');
    const applyBtn = document.getElementById('applyBtn');
    const errorDisplay = document.getElementById('errorDisplay');
    const presetSelect = document.getElementById('presetSelect');
    const meshSelect = document.getElementById('meshSelect');
    const hud = document.getElementById('hud');

    const sliders = [
      document.getElementById('u_slider1'),
      document.getElementById('u_slider2'),
      document.getElementById('u_slider3')
    ];
    const sliderVals = [
      document.getElementById('u_val1'),
      document.getElementById('u_val2'),
      document.getElementById('u_val3')
    ];

    // uniforms 数组使用滑块原始值，范围 [0,1]
    window.__3D_STATE__ = {
      currentPreset: '',
      meshType: 'plane',
      uniforms: [0.5, 0.5, 0.5],
      hasError: false,
      errorMessage: '',
      fps: 0
    };

    const vertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const presets = {
      gradient: `
uniform float uTime;
uniform float u1;
uniform float u2;
uniform float u3;
varying vec2 vUv;

void main() {
  vec2 uv = vUv;
  float wave = 0.5 + 0.5 * sin(uTime * (0.5 + u1 * 4.0) + uv.x * 10.0);
  vec3 col = vec3(uv.x, uv.y, wave);
  col.rg *= mix(0.2, 1.5, u2);
  col.b *= mix(0.3, 1.8, u3);
  gl_FragColor = vec4(col, 1.0);
}
      `.trim(),

      rings: `
uniform float uTime;
uniform float u1;
uniform float u2;
uniform float u3;
varying vec2 vUv;

void main() {
  vec2 uv = vUv * 2.0 - 1.0;
  float r = length(uv);
  float a = atan(uv.y, uv.x);
  float rings = sin(30.0 * r - uTime * (1.0 + u1 * 6.0));
  float spokes = sin(a * (3.0 + u2 * 20.0) + uTime * 2.0);
  float m = 0.5 + 0.5 * rings * spokes;
  vec3 col = mix(
    vec3(0.08, 0.12, 0.30),
    vec3(1.0, 0.5 + 0.5 * u3, 0.1),
    m
  );
  gl_FragColor = vec4(col, 1.0);
}
      `.trim(),

      plasma: `
uniform float uTime;
uniform float u1;
uniform float u2;
uniform float u3;
varying vec2 vUv;

void main() {
  vec2 uv = vUv;
  float t = uTime * (0.5 + u1 * 3.0);
  float v = 0.0;
  v += sin((uv.x + t) * 10.0);
  v += sin((uv.y + t * 0.7) * 12.0);
  v += sin((uv.x + uv.y + t) * 8.0);
  v += sin(length(uv - 0.5) * (20.0 + u2 * 30.0) - t * 3.0);
  v *= 0.25;
  vec3 col = 0.5 + 0.5 * cos(6.28318 * (v + vec3(0.0, u3 * 0.3, 0.6)));
  gl_FragColor = vec4(col, 1.0);
}
      `.trim()
    };

    Object.keys(presets).forEach(key => {
      const opt = document.createElement('option');
      opt.value = key;
      opt.textContent = key;
      presetSelect.appendChild(opt);
    });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
    camera.position.set(0, 0.8, 2.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(100, 100);
    document.getElementById('rightPanel').appendChild(renderer.domElement);
    renderer.domElement.style.display = 'block';
    renderer.domElement.style.width = '100%';
    renderer.domElement.style.height = '100%';

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(2, 3, 4);
    scene.add(dirLight);

    const baseUniforms = {
      uTime: { value: 0 },
      u1: { value: parseFloat(sliders[0].value) },
      u2: { value: parseFloat(sliders[1].value) },
      u3: { value: parseFloat(sliders[2].value) }
    };

    let material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader: presets.gradient,
      uniforms: THREE.UniformsUtils.clone(baseUniforms),
      side: THREE.DoubleSide
    });

    function createGeometry(type) {
      if (type === 'sphere') return new THREE.SphereGeometry(0.85, 128, 128);
      if (type === 'torus') return new THREE.TorusKnotGeometry(0.55, 0.2, 180, 32);
      return new THREE.PlaneGeometry(2, 2, 1, 1);
    }

    let mesh = new THREE.Mesh(createGeometry('plane'), material);
    scene.add(mesh);

    function updateState() {
      window.__3D_STATE__.uniforms = sliders.map(s => parseFloat(s.value));
      window.__3D_STATE__.meshType = meshSelect.value;
    }

    function updateSliderLabels() {
      sliders.forEach((s, i) => {
        sliderVals[i].textContent = Number(s.value).toFixed(3);
      });
    }

    function setError(msg) {
      window.__3D_STATE__.hasError = !!msg;
      window.__3D_STATE__.errorMessage = msg || '';
      errorDisplay.textContent = msg || '编译成功';
      errorDisplay.style.background = msg ? '#2a1111' : '#112515';
      errorDisplay.style.color = msg ? '#ff9b9b' : '#9bffb0';
      errorDisplay.style.borderColor = msg ? '#5a2222' : '#245a2d';
    }

    function buildTestMaterial(fragmentCode) {
      return new THREE.ShaderMaterial({
        vertexShader,
        fragmentShader: fragmentCode,
        uniforms: {
          uTime: { value: material.uniforms.uTime.value },
          u1: { value: parseFloat(sliders[0].value) },
          u2: { value: parseFloat(sliders[1].value) },
          u3: { value: parseFloat(sliders[2].value) }
        },
        side: THREE.DoubleSide
      });
    }

    function applyShader(fragmentCode) {
      const testMaterial = buildTestMaterial(fragmentCode);
      const gl = renderer.getContext();

      renderer.compile(scene, camera);

      const tempMesh = new THREE.Mesh(mesh.geometry, testMaterial);
      const tempScene = new THREE.Scene();
      tempScene.add(tempMesh);

      let errorMsg = '';
      try {
        renderer.compile(tempScene, camera);

        const programInfo = renderer.info.programs;
        if (programInfo && programInfo.length > 0) {
          for (const p of programInfo) {
            if (p.diagnostics) {
              const d = p.diagnostics;
              if (d.fragmentShader && d.fragmentShader.log) errorMsg += d.fragmentShader.log + '\n';
              if (d.vertexShader && d.vertexShader.log) errorMsg += d.vertexShader.log + '\n';
              if (d.programLog) errorMsg += d.programLog + '\n';
            }
          }
        }

        // 某些驱动/浏览器 diagnostics 可能为空，这里额外读取一次 gl 错误状态
        const glErr = gl.getError();
        if (glErr !== gl.NO_ERROR && !errorMsg) {
          errorMsg = 'WebGL 编译/链接失败，GL Error Code: ' + glErr;
        }
      } catch (err) {
        errorMsg = String(err);
      }

      if (errorMsg.trim()) {
        testMaterial.dispose();
        setError(errorMsg.trim());
        return;
      }

      const oldMaterial = material;
      material = testMaterial;
      mesh.material = material;
      oldMaterial.dispose();

      setError('');
      updateState();
    }

    function setMesh(type) {
      const oldGeo = mesh.geometry;
      mesh.geometry = createGeometry(type);
      oldGeo.dispose();

      if (type === 'plane') {
        mesh.rotation.set(0, 0, 0);
      } else {
        mesh.rotation.set(0.4, 0.4, 0.0);
      }

      window.__3D_STATE__.meshType = type;
    }

    sliders.forEach((slider, i) => {
      slider.addEventListener('input', () => {
        const v = parseFloat(slider.value);
        sliderVals[i].textContent = v.toFixed(3);

        if (material.uniforms.u1) material.uniforms.u1.value = parseFloat(sliders[0].value);
        if (material.uniforms.u2) material.uniforms.u2.value = parseFloat(sliders[1].value);
        if (material.uniforms.u3) material.uniforms.u3.value = parseFloat(sliders[2].value);

        updateState();
      });
    });

    applyBtn.addEventListener('click', () => {
      applyShader(shaderEditor.value);
    });

    presetSelect.addEventListener('change', () => {
      const key = presetSelect.value;
      shaderEditor.value = presets[key];
      window.__3D_STATE__.currentPreset = key;
      applyShader(shaderEditor.value);
    });

    meshSelect.addEventListener('change', () => {
      setMesh(meshSelect.value);
      updateState();
    });

    function resize() {
      const rightPanel = document.getElementById('rightPanel');
      const w = rightPanel.clientWidth;
      const h = rightPanel.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }
    window.addEventListener('resize', resize);

    let lastFpsTime = performance.now();
    let frameCount = 0;

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();
      if (material.uniforms.uTime) material.uniforms.uTime.value = t;

      if (meshSelect.value !== 'plane') {
        mesh.rotation.y += 0.003;
      }

      controls.update();
      renderer.render(scene, camera);

      frameCount++;
      const now = performance.now();
      if (now - lastFpsTime >= 1000) {
        const fps = frameCount * 1000 / (now - lastFpsTime);
        window.__3D_STATE__.fps = Number(fps.toFixed(1));
        hud.textContent = 'FPS: ' + window.__3D_STATE__.fps;
        frameCount = 0;
        lastFpsTime = now;
      }
    }

    // 初始化
    presetSelect.value = 'gradient';
    meshSelect.value = 'plane';
    shaderEditor.value = presets.gradient;
    window.__3D_STATE__.currentPreset = 'gradient';
    updateSliderLabels();
    updateState();
    setMesh('plane');
    resize();
    applyShader(shaderEditor.value);
    animate();
  </script>
</body>
</html>
