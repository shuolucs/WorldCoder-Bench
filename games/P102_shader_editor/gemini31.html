<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js GLSL Editor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #left-panel {
            width: 40%;
            min-width: 300px;
            display: flex;
            flex-direction: column;
            padding: 15px;
            box-sizing: border-box;
            border-right: 1px solid #333;
            background-color: #252526;
        }
        #right-panel {
            width: 60%;
            flex-grow: 1;
            position: relative;
        }
        .control-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label {
            font-size: 14px;
            width: 60px;
        }
        select, button, input[type="range"] {
            background-color: #3c3c3c;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 3px;
            outline: none;
        }
        select { flex-grow: 1; }
        button {
            cursor: pointer;
            background-color: #0e639c;
            border: none;
            padding: 8px 15px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #1177bb; }
        .slider-container {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            gap: 10px;
        }
        .slider-container label { width: 30px; font-size: 12px;}
        input[type="range"] { flex-grow: 1; }
        .slider-val { width: 30px; font-size: 12px; text-align: right; }
        
        #shaderEditor {
            flex-grow: 1;
            width: 100%;
            background-color: #1e1e1e;
            color: #ce9178;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 10px;
            border: 1px solid #444;
            border-radius: 4px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 10px;
            outline: none;
        }
        #errorDisplay {
            min-height: 60px;
            max-height: 150px;
            overflow-y: auto;
            background-color: #3a0000;
            color: #ff6b6b;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
            border: 1px solid #6a0000;
            display: none;
        }
        #errorDisplay.show { display: block; }
        #canvas-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>

    <div id="left-panel">
        <div class="control-group">
            <label for="presetSelect">Preset:</label>
            <select id="presetSelect">
                <option value="preset1">1. UV Gradient & Time</option>
                <option value="preset2">2. Fractal Noise</option>
                <option value="preset3">3. Color Waves</option>
            </select>
        </div>
        <div class="control-group">
            <label for="meshSelect">Mesh:</label>
            <select id="meshSelect">
                <option value="plane">Plane</option>
                <option value="sphere">Sphere</option>
                <option value="torus">Torus</option>
            </select>
        </div>

        <div class="slider-container">
            <label>u1</label>
            <input type="range" id="u_slider1" min="0" max="1" step="0.01" value="1.0">
            <span class="slider-val" id="val1">1.00</span>
        </div>
        <div class="slider-container">
            <label>u2</label>
            <input type="range" id="u_slider2" min="0" max="1" step="0.01" value="0.5">
            <span class="slider-val" id="val2">0.50</span>
        </div>
        <div class="slider-container">
            <label>u3</label>
            <input type="range" id="u_slider3" min="0" max="1" step="0.01" value="0.5">
            <span class="slider-val" id="val3">0.50</span>
        </div>

        <textarea id="shaderEditor" spellcheck="false"></textarea>
        
        <div class="control-group" style="justify-content: flex-end; margin-bottom: 0;">
            <button id="applyBtn">Apply Shader</button>
        </div>
        
        <div id="errorDisplay"></div>
    </div>

    <div id="right-panel">
        <div id="canvas-container"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentPreset: 'preset1',
            meshType: 'plane',
            uniforms: [1.0, 0.5, 0.5], // [u1, u2, u3]
            hasError: false,
            errorMessage: '',
            fps: 0
        };

        // --- Presets ---
        const presets = {
            preset1: `void main() {
    vec2 uv = vUv;
    // u1: Brightness, u2: Red tint, u3: Blue tint
    vec3 col = 0.5 + 0.5 * cos(uTime + uv.xyx + vec3(0, 2, 4));
    col *= u1; 
    col.r += u2 * 0.5; 
    col.b += u3 * 0.5; 
    gl_FragColor = vec4(col, 1.0);
}`,
            preset2: `void main() {
    vec2 uv = vUv * 2.0 - 1.0;
    float d = length(uv);
    // u1: Speed, u2: Scale, u3: Intensity
    vec3 col = vec3(fract(d * (10.0 * u2) - uTime * (u1 * 2.0)));
    gl_FragColor = vec4(col * u3, 1.0);
}`,
            preset3: `void main() {
    vec2 uv = vUv;
    // u1: Frequency, u2: Color A mix, u3: Color B mix
    float wave = sin(uv.x * 20.0 * u1 + uTime * 2.0) * 0.5 + 0.5;
    float wave2 = cos(uv.y * 20.0 * u1 - uTime) * 0.5 + 0.5;
    vec3 colA = vec3(u2, 0.2, 0.8);
    vec3 colB = vec3(0.8, 0.2, u3);
    vec3 col = mix(colA, colB, wave * wave2);
    gl_FragColor = vec4(col, 1.0);
}`
        };

        const defaultVertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        // --- DOM Elements ---
        const editor = document.getElementById('shaderEditor');
        const applyBtn = document.getElementById('applyBtn');
        const errorDisplay = document.getElementById('errorDisplay');
        const presetSelect = document.getElementById('presetSelect');
        const meshSelect = document.getElementById('meshSelect');
        const sliders = [
            document.getElementById('u_slider1'),
            document.getElementById('u_slider2'),
            document.getElementById('u_slider3')
        ];
        const sliderVals = [
            document.getElementById('val1'),
            document.getElementById('val2'),
            document.getElementById('val3')
        ];

        // Initialize Editor
        editor.value = presets.preset1;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.z = 3;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const geometries = {
            plane: new THREE.PlaneGeometry(2, 2),
            sphere: new THREE.SphereGeometry(1, 64, 64),
            torus: new THREE.TorusGeometry(0.8, 0.3, 64, 64)
        };

        const uniforms = {
            uTime: { value: 0.0 },
            u1: { value: window.__3D_STATE__.uniforms[0] },
            u2: { value: window.__3D_STATE__.uniforms[1] },
            u3: { value: window.__3D_STATE__.uniforms[2] }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader: defaultVertexShader,
            fragmentShader: editor.value,
            uniforms: uniforms,
            side: THREE.DoubleSide
        });

        let mesh = new THREE.Mesh(geometries.plane, material);
        scene.add(mesh);

        // --- Logic & Events ---

        // WebGL Validator to catch errors before Three.js crashes the material
        function validateGLSL(fragmentCode) {
            const canvas = document.createElement('canvas');
            const gl = canvas.getContext('webgl');
            if (!gl) return null;

            const fs = gl.createShader(gl.FRAGMENT_SHADER);
            const prefix = `
                precision highp float;
                precision highp int;
                uniform float uTime;
                uniform float u1;
                uniform float u2;
                uniform float u3;
                varying vec2 vUv;
            `;
            gl.shaderSource(fs, prefix + fragmentCode);
            gl.compileShader(fs);

            if (!gl.getShaderParameter(fs, gl.COMPILE_STATUS)) {
                return gl.getShaderInfoLog(fs);
            }
            return null;
        }

        function applyShader() {
            const code = editor.value;
            const error = validateGLSL(code);

            if (error) {
                window.__3D_STATE__.hasError = true;
                window.__3D_STATE__.errorMessage = error;
                errorDisplay.textContent = "Shader Compile Error:\n" + error;
                errorDisplay.classList.add('show');
            } else {
                window.__3D_STATE__.hasError = false;
                window.__3D_STATE__.errorMessage = '';
                errorDisplay.textContent = '';
                errorDisplay.classList.remove('show');
                
                material.fragmentShader = code;
                material.needsUpdate = true;
            }
        }

        applyBtn.addEventListener('click', applyShader);

        presetSelect.addEventListener('change', (e) => {
            const presetKey = e.target.value;
            window.__3D_STATE__.currentPreset = presetKey;
            editor.value = presets[presetKey];
            applyShader();
        });

        meshSelect.addEventListener('change', (e) => {
            const type = e.target.value;
            window.__3D_STATE__.meshType = type;
            mesh.geometry = geometries[type];
        });

        sliders.forEach((slider, index) => {
            slider.addEventListener('input', (e) => {
                const val = parseFloat(e.target.value);
                sliderVals[index].textContent = val.toFixed(2);
                window.__3D_STATE__.uniforms[index] = val;
                uniforms[`u${index + 1}`].value = val;
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // --- Animation Loop & FPS ---
        const clock = new THREE.Clock();
        let frames = 0;
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            uniforms.uTime.value = time;

            controls.update();
            renderer.render(scene, camera);

            // FPS Calculation
            frames++;
            const timeNow = performance.now();
            if (timeNow >= prevTime + 1000) {
                window.__3D_STATE__.fps = Math.round((frames * 1000) / (timeNow - prevTime));
                frames = 0;
                prevTime = timeNow;
            }
        }

        // Initial apply to ensure state is synced
        applyShader();
        animate();

    </script>
</body>
</html>
