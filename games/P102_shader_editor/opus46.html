<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLSL Shader Editor with 3D Preview</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    overflow: hidden;
  }

  /* Left Panel */
  #leftPanel {
    width: 45%;
    min-width: 360px;
    display: flex;
    flex-direction: column;
    background: #16213e;
    border-right: 2px solid #0f3460;
    overflow-y: auto;
  }

  #leftPanel h2 {
    padding: 12px 16px;
    background: linear-gradient(135deg, #0f3460, #533483);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #e94560;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .controls-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 16px;
    background: #1a1a3e;
    border-bottom: 1px solid #0f3460;
    align-items: center;
    flex-shrink: 0;
  }

  .controls-bar label {
    font-size: 12px;
    color: #a0a0c0;
    font-weight: 600;
  }

  .controls-bar select, .controls-bar button {
    padding: 6px 12px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #16213e;
    color: #e0e0e0;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .controls-bar select:hover, .controls-bar button:hover {
    border-color: #e94560;
    background: #1a1a4e;
  }

  #applyBtn {
    background: linear-gradient(135deg, #e94560, #c23152) !important;
    color: #fff !important;
    font-weight: 700;
    border: none !important;
    padding: 8px 20px !important;
    border-radius: 6px !important;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 8px rgba(233, 69, 96, 0.3);
  }

  #applyBtn:hover {
    background: linear-gradient(135deg, #ff6b81, #e94560) !important;
    box-shadow: 0 4px 16px rgba(233, 69, 96, 0.5);
    transform: translateY(-1px);
  }

  .slider-group {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding: 10px 16px;
    background: #1a1a3e;
    border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }

  .slider-item {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }

  .slider-item label {
    font-size: 11px;
    color: #a0a0c0;
    font-weight: 600;
    min-width: 22px;
  }

  .slider-item input[type="range"] {
    flex: 1;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #0f3460;
    border-radius: 2px;
    outline: none;
  }

  .slider-item input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #e94560;
    cursor: pointer;
    box-shadow: 0 0 6px rgba(233, 69, 96, 0.5);
  }

  .slider-value {
    font-size: 11px;
    color: #e94560;
    min-width: 32px;
    text-align: right;
    font-family: monospace;
  }

  #shaderCode {
    flex: 1;
    resize: none;
    padding: 14px 16px;
    background: #0d1117;
    color: #c9d1d9;
    border: none;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.6;
    tab-size: 2;
    outline: none;
    min-height: 200px;
  }

  #shaderCode:focus {
    background: #0b0f14;
  }

  #errorDisplay {
    padding: 10px 16px;
    background: #2d1117;
    color: #f85149;
    font-family: monospace;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 120px;
    overflow-y: auto;
    border-top: 2px solid #f85149;
    flex-shrink: 0;
    display: none;
  }

  #errorDisplay.visible {
    display: block;
  }

  .success-bar {
    padding: 6px 16px;
    background: #0d2818;
    color: #3fb950;
    font-family: monospace;
    font-size: 12px;
    border-top: 2px solid #3fb950;
    flex-shrink: 0;
    display: none;
  }

  .success-bar.visible {
    display: block;
  }

  /* Right Panel */
  #rightPanel {
    flex: 1;
    position: relative;
    background: #0a0a1a;
  }

  #threeCanvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  #fpsCounter {
    position: absolute;
    top: 10px;
    right: 14px;
    background: rgba(0, 0, 0, 0.7);
    color: #3fb950;
    padding: 4px 10px;
    border-radius: 4px;
    font-family: monospace;
    font-size: 12px;
    pointer-events: none;
    z-index: 10;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #16213e; }
  ::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #533483; }
</style>
</head>
<body>

<div id="leftPanel">
  <h2>⚡ GLSL Shader Editor</h2>

  <div class="controls-bar">
    <label>Preset:</label>
    <select id="presetSelect">
      <option value="uvGradient">UV Gradient + Time</option>
      <option value="plasma">Plasma Wave</option>
      <option value="voronoi">Voronoi Cells</option>
    </select>

    <label>Mesh:</label>
    <select id="meshSelect">
      <option value="plane">Plane</option>
      <option value="sphere">Sphere</option>
      <option value="torus">Torus</option>
    </select>

    <button id="applyBtn">▶ Apply</button>
  </div>

  <div class="slider-group">
    <div class="slider-item">
      <label>u1</label>
      <input type="range" id="u_slider1" min="0" max="100" value="50">
      <span class="slider-value" id="val1">0.50</span>
    </div>
    <div class="slider-item">
      <label>u2</label>
      <input type="range" id="u_slider2" min="0" max="100" value="50">
      <span class="slider-value" id="val2">0.50</span>
    </div>
    <div class="slider-item">
      <label>u3</label>
      <input type="range" id="u_slider3" min="0" max="100" value="50">
      <span class="slider-value" id="val3">0.50</span>
    </div>
  </div>

  <textarea id="shaderCode" spellcheck="false"></textarea>

  <div id="errorDisplay"></div>
  <div id="successBar" class="success-bar">✓ Shader compiled successfully</div>
</div>

<div id="rightPanel">
  <canvas id="threeCanvas"></canvas>
  <div id="fpsCounter">FPS: --</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// Preset shader definitions
// ============================================================
const PRESETS = {
  uvGradient: `// UV Gradient + Time Sin Animation
// Uses u1 to control color mix, u2 for speed, u3 for brightness

uniform float uTime;
uniform float u1;
uniform float u2;
uniform float u3;
varying vec2 vUv;

void main() {
  vec2 uv = vUv;
  float t = uTime * (0.5 + u2 * 2.0);

  vec3 colA = vec3(uv.x, uv.y * 0.5 + 0.3, 0.8);
  vec3 colB = vec3(
    0.5 + 0.5 * sin(t + uv.x * 3.14),
    0.5 + 0.5 * cos(t + uv.y * 2.0),
    0.5 + 0.5 * sin(t * 0.7)
  );

  vec3 col = mix(colA, colB, u1);
  col *= 0.5 + u3 * 1.5;

  gl_FragColor = vec4(col, 1.0);
}`,

  plasma: `// Plasma Wave Effect
// u1 = scale, u2 = speed, u3 = color intensity

uniform float uTime;
uniform float u1;
uniform float u2;
uniform float u3;
varying vec2 vUv;

void main() {
  vec2 uv = vUv * 2.0 - 1.0;
  float scale = 2.0 + u1 * 8.0;
  float speed = 0.5 + u2 * 3.0;
  float t = uTime * speed;

  float v1 = sin(uv.x * scale + t);
  float v2 = sin(uv.y * scale + t * 0.7);
  float v3 = sin((uv.x + uv.y) * scale * 0.5 + t * 1.3);
  float v4 = sin(length(uv) * scale * 1.5 + t * 0.9);

  float v = (v1 + v2 + v3 + v4) * 0.25;

  vec3 col = vec3(
    0.5 + 0.5 * sin(v * 3.14 * 2.0),
    0.5 + 0.5 * sin(v * 3.14 * 2.0 + 2.094),
    0.5 + 0.5 * sin(v * 3.14 * 2.0 + 4.188)
  );

  col = pow(col, vec3(0.5 + (1.0 - u3) * 1.5));

  gl_FragColor = vec4(col, 1.0);
}`,

  voronoi: `// Voronoi Cells
// u1 = cell count, u2 = animation speed, u3 = edge sharpness

uniform float uTime;
uniform float u1;
uniform float u2;
uniform float u3;
varying vec2 vUv;

vec2 random2(vec2 p) {
  return fract(sin(vec2(
    dot(p, vec2(127.1, 311.7)),
    dot(p, vec2(269.5, 183.3))
  )) * 43758.5453);
}

void main() {
  float cells = 3.0 + u1 * 7.0;
  float speed = 0.3 + u2 * 2.0;
  float sharp = 1.0 + u3 * 4.0;

  vec2 uv = vUv * cells;
  vec2 iuv = floor(uv);
  vec2 fuv = fract(uv);

  float minDist = 1.0;
  vec2 minPoint;

  for (int y = -1; y <= 1; y++) {
    for (int x = -1; x <= 1; x++) {
      vec2 neighbor = vec2(float(x), float(y));
      vec2 point = random2(iuv + neighbor);
      point = 0.5 + 0.5 * sin(uTime * speed + 6.2831 * point);
      float dist = length(neighbor + point - fuv);
      if (dist < minDist) {
        minDist = dist;
        minPoint = point;
      }
    }
  }

  vec3 col = vec3(
    0.5 + 0.5 * sin(minPoint.x * 6.28 + 0.0),
    0.5 + 0.5 * sin(minPoint.y * 6.28 + 2.0),
    0.5 + 0.5 * sin((minPoint.x + minPoint.y) * 3.14 + 4.0)
  );

  float edge = pow(minDist, sharp);
  col *= 0.3 + 0.7 * edge;

  gl_FragColor = vec4(col, 1.0);
}`
};

// ============================================================
// Vertex shader (minimal, passes vUv)
// ============================================================
const VERTEX_SHADER = `
varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}`;

// ============================================================
// DOM references
// ============================================================
const shaderCodeEl = document.getElementById('shaderCode');
const applyBtn = document.getElementById('applyBtn');
const errorDisplay = document.getElementById('errorDisplay');
const successBar = document.getElementById('successBar');
const presetSelect = document.getElementById('presetSelect');
const meshSelect = document.getElementById('meshSelect');
const slider1 = document.getElementById('u_slider1');
const slider2 = document.getElementById('u_slider2');
const slider3 = document.getElementById('u_slider3');
const val1El = document.getElementById('val1');
const val2El = document.getElementById('val2');
const val3El = document.getElementById('val3');
const canvas = document.getElementById('threeCanvas');
const fpsCounter = document.getElementById('fpsCounter');

// ============================================================
// Global state exposed on window
// uniforms array: [u1, u2, u3] — normalized values in [0, 1],
//   derived from slider range [0, 100] / 100.
// ============================================================
window.__3D_STATE__ = {
  currentPreset: 'uvGradient',
  meshType: 'plane',
  uniforms: [0.5, 0.5, 0.5],
  hasError: false,
  errorMessage: '',
  fps: 0
};

// ============================================================
// Three.js setup
// ============================================================
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
camera.position.set(0, 0, 3);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Uniforms shared across shader materials
const sharedUniforms = {
  uTime: { value: 0 },
  u1: { value: 0.5 },
  u2: { value: 0.5 },
  u3: { value: 0.5 }
};

// Current material and mesh
let currentMaterial = null;
let currentMesh = null;

// ============================================================
// Geometry factory
// ============================================================
function createGeometry(type) {
  switch (type) {
    case 'sphere': return new THREE.SphereGeometry(1, 64, 64);
    case 'torus': return new THREE.TorusGeometry(0.7, 0.3, 64, 128);
    case 'plane':
    default: return new THREE.PlaneGeometry(2.5, 2.5, 1, 1);
  }
}

// ============================================================
// Compile and apply shader
// ============================================================
function applyShader() {
  const fragmentCode = shaderCodeEl.value;

  // Create new material
  const newMaterial = new THREE.ShaderMaterial({
    vertexShader: VERTEX_SHADER,
    fragmentShader: fragmentCode,
    uniforms: {
      uTime: sharedUniforms.uTime,
      u1: sharedUniforms.u1,
      u2: sharedUniforms.u2,
      u3: sharedUniforms.u3
    },
    side: THREE.DoubleSide
  });

  // We need to force compilation to detect errors
  // Create a temporary mesh to compile
  const testGeom = new THREE.PlaneGeometry(1, 1);
  const testMesh = new THREE.Mesh(testGeom, newMaterial);
  scene.add(testMesh);

  // Force compile
  renderer.compile(scene, camera);

  // Check for shader compilation errors
  const gl = renderer.getContext();
  const program = renderer.properties.get(newMaterial).currentProgram;

  let hasError = false;
  let errorMsg = '';

  if (program) {
    const glProgram = program.program;
    const fragShader = program.fragmentShader;

    if (fragShader) {
      const compiled = gl.getShaderParameter(fragShader, gl.COMPILE_STATUS);
      if (!compiled) {
        hasError = true;
        errorMsg = gl.getShaderInfoLog(fragShader) || 'Unknown fragment shader compilation error';
      }
    }

    if (!hasError) {
      const linked = gl.getProgramParameter(glProgram, gl.LINK_STATUS);
      if (!linked) {
        hasError = true;
        errorMsg = gl.getProgramInfoLog(glProgram) || 'Shader program linking error';
      }
    }
  } else {
    // If no program was created, there's likely an error
    // Try to get diagnostic info from the renderer
    const diag = renderer.info;
    hasError = true;
    errorMsg = 'Failed to create shader program. Check your GLSL code.';
  }

  // Remove test mesh
  scene.remove(testMesh);
  testGeom.dispose();

  if (hasError) {
    // Error
    newMaterial.dispose();
    errorDisplay.textContent = errorMsg;
    errorDisplay.classList.add('visible');
    successBar.classList.remove('visible');
    window.__3D_STATE__.hasError = true;
    window.__3D_STATE__.errorMessage = errorMsg;
  } else {
    // Success — apply to actual mesh
    errorDisplay.classList.remove('visible');
    successBar.classList.add('visible');
    setTimeout(() => successBar.classList.remove('visible'), 2000);

    if (currentMaterial) currentMaterial.dispose();
    currentMaterial = newMaterial;

    if (currentMesh) {
      currentMesh.material = currentMaterial;
    }

    window.__3D_STATE__.hasError = false;
    window.__3D_STATE__.errorMessage = '';
  }
}

// ============================================================
// Initialize mesh
// ============================================================
function initMesh(type) {
  if (currentMesh) {
    scene.remove(currentMesh);
    currentMesh.geometry.dispose();
  }

  const geom = createGeometry(type);

  if (!currentMaterial) {
    currentMaterial = new THREE.ShaderMaterial({
      vertexShader: VERTEX_SHADER,
      fragmentShader: PRESETS.uvGradient,
      uniforms: {
        uTime: sharedUniforms.uTime,
        u1: sharedUniforms.u1,
        u2: sharedUniforms.u2,
        u3: sharedUniforms.u3
      },
      side: THREE.DoubleSide
    });
  }

  currentMesh = new THREE.Mesh(geom, currentMaterial);
  scene.add(currentMesh);

  window.__3D_STATE__.meshType = type;
}

// ============================================================
// Resize handler
// ============================================================
function onResize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = rect.width;
  const h = rect.height;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

window.addEventListener('resize', onResize);
new ResizeObserver(onResize).observe(canvas.parentElement);

// ============================================================
// Event listeners
// ============================================================
applyBtn.addEventListener('click', applyShader);

// Ctrl+Enter / Cmd+Enter to apply
shaderCodeEl.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    applyShader();
  }
  // Tab support in textarea
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = shaderCodeEl.selectionStart;
    const end = shaderCodeEl.selectionEnd;
    shaderCodeEl.value = shaderCodeEl.value.substring(0, start) + '  ' + shaderCodeEl.value.substring(end);
    shaderCodeEl.selectionStart = shaderCodeEl.selectionEnd = start + 2;
  }
});

presetSelect.addEventListener('change', () => {
  const preset = presetSelect.value;
  window.__3D_STATE__.currentPreset = preset;
  shaderCodeEl.value = PRESETS[preset];
  applyShader();
});

meshSelect.addEventListener('change', () => {
  initMesh(meshSelect.value);
});

function updateSlider(slider, valEl, uniformKey, index) {
  slider.addEventListener('input', () => {
    const normalized = slider.value / 100;
    sharedUniforms[uniformKey].value = normalized;
    valEl.textContent = normalized.toFixed(2);
    window.__3D_STATE__.uniforms[index] = normalized;
  });
}

updateSlider(slider1, val1El, 'u1', 0);
updateSlider(slider2, val2El, 'u2', 1);
updateSlider(slider3, val3El, 'u3', 2);

// ============================================================
// FPS tracking
// ============================================================
let frameCount = 0;
let lastFpsTime = performance.now();

function updateFps() {
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    const fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    fpsCounter.textContent = `FPS: ${fps}`;
    window.__3D_STATE__.fps = fps;
    frameCount = 0;
    lastFpsTime = now;
  }
}

// ============================================================
// Animation loop
// ============================================================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  sharedUniforms.uTime.value = clock.getElapsedTime();
  controls.update();
  renderer.render(scene, camera);
  updateFps();
}

// ============================================================
// Initialize
// ============================================================
shaderCodeEl.value = PRESETS.uvGradient;
initMesh('plane');
onResize();
applyShader();
animate();
</script>
</body>
</html>
