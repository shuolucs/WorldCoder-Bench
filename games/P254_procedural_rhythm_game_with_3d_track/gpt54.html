<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Procedural Rhythm Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      user-select: none;
      z-index: 10;
    }

    .hud-text {
      position: absolute;
      font-size: 22px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
    }

    #scoreDisplay {
      top: 16px;
      left: 20px;
    }

    #timerDisplay {
      top: 16px;
      right: 20px;
    }

    #comboDisplay {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    #keysDisplay {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      font-weight: bold;
      letter-spacing: 10px;
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }

    #keysDisplay span {
      display: inline-block;
      width: 40px;
      text-align: center;
    }

    #feedback {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 44px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.08s linear;
      text-shadow: 0 0 18px rgba(0,0,0,1);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.65);
      z-index: 20;
    }

    .panel {
      background: rgba(20,20,20,0.95);
      border: 2px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 28px 36px;
      min-width: 320px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,255,255,0.12);
    }

    .panel h1, .panel h2 {
      margin: 0 0 16px 0;
    }

    .panel p {
      margin: 8px 0;
      font-size: 18px;
    }

    button {
      margin-top: 18px;
      padding: 10px 22px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: #00bcd4;
      color: white;
      cursor: pointer;
      pointer-events: auto;
    }

    button:hover {
      background: #00d8f0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="scoreDisplay" class="hud-text">Score: 0</div>
    <div id="comboDisplay" class="hud-text">Combo: 0 (1x)</div>
    <div id="timerDisplay" class="hud-text">Time: 60</div>

    <div id="feedback">PERFECT!</div>

    <div id="keysDisplay">
      <span style="color:#FF4444;">D</span>
      <span style="color:#4444FF;">F</span>
      <span style="color:#44FF44;">J</span>
      <span style="color:#FFFF44;">K</span>
    </div>
  </div>

  <div id="startOverlay" class="overlay">
    <div class="panel">
      <h1>Press SPACE to Start</h1>
      <p>Hit notes as they reach the cyan bar.</p>
      <p>Keys: D F J K</p>
    </div>
  </div>

  <div id="resultsOverlay" class="overlay hidden">
    <div class="panel">
      <h2>Results</h2>
      <p id="resultScore">Score: 0</p>
      <p id="resultPerfect">Perfect: 0</p>
      <p id="resultGood">Good: 0</p>
      <p id="resultMiss">Miss: 0</p>
      <p id="resultMaxCombo">Max Combo: 0</p>
      <button id="restartButton">Restart</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const laneXs = [-1.5, -0.5, 0.5, 1.5];
    const laneColors = [0xFF4444, 0x4444FF, 0x44FF44, 0xFFFF44];
    const laneKeys = ['KeyD', 'KeyF', 'KeyJ', 'KeyK'];

    const trackGroup = new THREE.Group();
    scene.add(trackGroup);

    const trackGeometry = new THREE.PlaneGeometry(4, 40);
    const trackMaterial = new THREE.MeshStandardMaterial({
      color: 0x222222,
      roughness: 0.9,
      metalness: 0.05,
      side: THREE.DoubleSide
    });
    const track = new THREE.Mesh(trackGeometry, trackMaterial);
    track.rotation.x = -Math.PI / 2;
    track.position.set(0, 0, -10);
    trackGroup.add(track);

    function createLaneDivider(x) {
      const geo = new THREE.BoxGeometry(0.03, 0.01, 40);
      const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const line = new THREE.Mesh(geo, mat);
      line.position.set(x, 0.01, -10);
      trackGroup.add(line);
    }

    createLaneDivider(-1);
    createLaneDivider(0);
    createLaneDivider(1);

    const hitZoneMaterial = new THREE.MeshStandardMaterial({
      color: 0x00FFFF,
      emissive: 0x00FFFF,
      emissiveIntensity: 1.6
    });
    const hitZoneGeometry = new THREE.BoxGeometry(4.1, 0.08, 0.35);
    const hitZone = new THREE.Mesh(hitZoneGeometry, hitZoneMaterial);
    hitZone.position.set(0, 0.08, 8);
    scene.add(hitZone);

    const noteGeometry = new THREE.BoxGeometry(0.8, 0.3, 0.8);

    const notes = [];

    const scoreDisplay = document.getElementById('scoreDisplay');
    const timerDisplay = document.getElementById('timerDisplay');
    const comboDisplay = document.getElementById('comboDisplay');
    const feedback = document.getElementById('feedback');
    const startOverlay = document.getElementById('startOverlay');
    const resultsOverlay = document.getElementById('resultsOverlay');
    const restartButton = document.getElementById('restartButton');

    const resultScore = document.getElementById('resultScore');
    const resultPerfect = document.getElementById('resultPerfect');
    const resultGood = document.getElementById('resultGood');
    const resultMiss = document.getElementById('resultMiss');
    const resultMaxCombo = document.getElementById('resultMaxCombo');

    const GAME = {
      gameState: 'waiting',
      score: 0,
      combo: 0,
      maxCombo: 0,
      multiplier: 1,
      perfectCount: 0,
      goodCount: 0,
      missCount: 0,
      timeRemaining: 60,
      notesOnTrack: 0,
      totalNotesSpawned: 0,
      noteSpeed: 8,
      lastHitResult: 'none',
      laneCount: 4
    };

    window.__3D_STATE__ = { ...GAME };

    let spawnInterval = 0.8;
    let spawnAccumulator = 0;
    let gameTimer = 60;
    let feedbackTimer = 0;
    let flashTimer = 0;
    let baseHitZoneColor = new THREE.Color(0x00FFFF);
    let clock = new THREE.Clock();

    function updateMultiplier() {
      if (GAME.combo >= 30) GAME.multiplier = 3;
      else if (GAME.combo >= 10) GAME.multiplier = 2;
      else GAME.multiplier = 1;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${GAME.score}`;
      timerDisplay.textContent = `Time: ${Math.ceil(GAME.timeRemaining)}`;
      comboDisplay.textContent = `Combo: ${GAME.combo} (${GAME.multiplier}x)`;
    }

    function showFeedback(text, color) {
      feedback.textContent = text;
      feedback.style.color = color;
      feedback.style.opacity = '1';
      feedbackTimer = 0.5;
    }

    function flashHitZone(colorHex) {
      hitZone.material.color.setHex(colorHex);
      hitZone.material.emissive.setHex(colorHex);
      flashTimer = 0.12;
    }

    function resetHitZone() {
      hitZone.material.color.copy(baseHitZoneColor);
      hitZone.material.emissive.copy(baseHitZoneColor);
    }

    function spawnNote() {
      const lane = Math.floor(Math.random() * 4);
      const mat = new THREE.MeshStandardMaterial({
        color: laneColors[lane],
        emissive: laneColors[lane],
        emissiveIntensity: 0.25,
        roughness: 0.5,
        metalness: 0.1
      });

      const mesh = new THREE.Mesh(noteGeometry, mat);
      mesh.position.set(laneXs[lane], 0.2, -30);
      scene.add(mesh);

      notes.push({
        mesh,
        lane
      });

      GAME.totalNotesSpawned++;
    }

    function removeNote(note) {
      scene.remove(note.mesh);
      note.mesh.geometry.dispose();
      note.mesh.material.dispose();
    }

    function clearAllNotes() {
      while (notes.length > 0) {
        const n = notes.pop();
        removeNote(n);
      }
    }

    function registerMiss() {
      GAME.missCount++;
      GAME.combo = 0;
      updateMultiplier();
      GAME.lastHitResult = 'miss';
      showFeedback('MISS!', '#ff6666');
    }

    function startGame() {
      clearAllNotes();

      GAME.gameState = 'playing';
      GAME.score = 0;
      GAME.combo = 0;
      GAME.maxCombo = 0;
      GAME.multiplier = 1;
      GAME.perfectCount = 0;
      GAME.goodCount = 0;
      GAME.missCount = 0;
      GAME.timeRemaining = 60;
      GAME.notesOnTrack = 0;
      GAME.totalNotesSpawned = 0;
      GAME.lastHitResult = 'none';

      gameTimer = 60;
      spawnAccumulator = 0;
      feedbackTimer = 0;
      flashTimer = 0;
      resetHitZone();

      startOverlay.classList.add('hidden');
      resultsOverlay.classList.add('hidden');

      updateHUD();
    }

    function endGame() {
      GAME.gameState = 'ended';
      clearAllNotes();
      GAME.notesOnTrack = 0;

      resultScore.textContent = `Score: ${GAME.score}`;
      resultPerfect.textContent = `Perfect: ${GAME.perfectCount}`;
      resultGood.textContent = `Good: ${GAME.goodCount}`;
      resultMiss.textContent = `Miss: ${GAME.missCount}`;
      resultMaxCombo.textContent = `Max Combo: ${GAME.maxCombo}`;

      resultsOverlay.classList.remove('hidden');
    }

    function resetToWaiting() {
      clearAllNotes();

      GAME.gameState = 'waiting';
      GAME.score = 0;
      GAME.combo = 0;
      GAME.maxCombo = 0;
      GAME.multiplier = 1;
      GAME.perfectCount = 0;
      GAME.goodCount = 0;
      GAME.missCount = 0;
      GAME.timeRemaining = 60;
      GAME.notesOnTrack = 0;
      GAME.totalNotesSpawned = 0;
      GAME.lastHitResult = 'none';

      gameTimer = 60;
      spawnAccumulator = 0;
      feedbackTimer = 0;
      flashTimer = 0;
      resetHitZone();
      feedback.style.opacity = '0';

      resultsOverlay.classList.add('hidden');
      startOverlay.classList.remove('hidden');

      updateHUD();
    }

    function tryHitLane(lane) {
      if (GAME.gameState !== 'playing') return;

      let target = null;
      let bestDistance = Infinity;

      for (const note of notes) {
        if (note.lane !== lane) continue;
        const z = note.mesh.position.z;
        if (z >= 6.5 && z <= 9.5) {
          const dist = Math.abs(z - 8);
          if (dist < bestDistance) {
            bestDistance = dist;
            target = note;
          }
        }
      }

      if (!target) return;

      const z = target.mesh.position.z;
      let basePoints = 0;

      if (z >= 7.5 && z <= 8.5) {
        basePoints = 100;
        GAME.perfectCount++;
        GAME.combo++;
        updateMultiplier();
        GAME.score += basePoints * GAME.multiplier;
        GAME.lastHitResult = 'perfect';
        showFeedback('PERFECT!', '#66ff99');
        flashHitZone(0x00ff66);
      } else {
        basePoints = 50;
        GAME.goodCount++;
        GAME.combo++;
        updateMultiplier();
        GAME.score += basePoints * GAME.multiplier;
        GAME.lastHitResult = 'good';
        showFeedback('GOOD!', '#ffee55');
        flashHitZone(0xffff00);
      }

      if (GAME.combo > GAME.maxCombo) GAME.maxCombo = GAME.combo;

      const index = notes.indexOf(target);
      if (index !== -1) notes.splice(index, 1);
      removeNote(target);
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (GAME.gameState === 'waiting') {
          startGame();
        }
        return;
      }

      const lane = laneKeys.indexOf(e.code);
      if (lane !== -1) {
        tryHitLane(lane);
      }
    });

    restartButton.addEventListener('click', () => {
      resetToWaiting();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateGame(delta) {
      if (GAME.gameState === 'playing') {
        gameTimer -= delta;
        GAME.timeRemaining = Math.max(0, gameTimer);

        spawnAccumulator += delta;
        while (spawnAccumulator >= spawnInterval) {
          spawnNote();
          spawnAccumulator -= spawnInterval;
        }

        for (let i = notes.length - 1; i >= 0; i--) {
          const note = notes[i];
          note.mesh.position.z += GAME.noteSpeed * delta;

          if (note.mesh.position.z > 12) {
            notes.splice(i, 1);
            removeNote(note);
            registerMiss();
          }
        }

        if (gameTimer <= 0) {
          GAME.timeRemaining = 0;
          endGame();
        }
      }

      if (feedbackTimer > 0) {
        feedbackTimer -= delta;
        if (feedbackTimer <= 0) {
          feedback.style.opacity = '0';
        }
      }

      if (flashTimer > 0) {
        flashTimer -= delta;
        if (flashTimer <= 0) {
          resetHitZone();
        }
      }

      GAME.notesOnTrack = notes.length;
      updateHUD();

      window.__3D_STATE__.gameState = GAME.gameState;
      window.__3D_STATE__.score = GAME.score;
      window.__3D_STATE__.combo = GAME.combo;
      window.__3D_STATE__.maxCombo = GAME.maxCombo;
      window.__3D_STATE__.multiplier = GAME.multiplier;
      window.__3D_STATE__.perfectCount = GAME.perfectCount;
      window.__3D_STATE__.goodCount = GAME.goodCount;
      window.__3D_STATE__.missCount = GAME.missCount;
      window.__3D_STATE__.timeRemaining = GAME.timeRemaining;
      window.__3D_STATE__.notesOnTrack = GAME.notesOnTrack;
      window.__3D_STATE__.totalNotesSpawned = GAME.totalNotesSpawned;
      window.__3D_STATE__.noteSpeed = GAME.noteSpeed;
      window.__3D_STATE__.lastHitResult = GAME.lastHitResult;
      window.__3D_STATE__.laneCount = GAME.laneCount;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.033);
      updateGame(delta);
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();
  </script>
</body>
</html>
