<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Rhythm Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            pointer-events: auto;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #fff;
        }
        p {
            font-size: 24px;
            margin: 10px 0;
        }
        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 24px;
            font-family: inherit;
            background: #00ffff;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
        }
        button:hover {
            background: #fff;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #hud {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }
        .hud-top {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
        }
        #combo-display {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 10px #fff;
        }
        .hud-bottom {
            position: absolute;
            bottom: 40px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 60px;
        }
        .key-hint {
            width: 60px;
            height: 60px;
            border: 3px solid white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: white;
            background: rgba(0,0,0,0.5);
            text-shadow: 1px 1px 2px #000;
        }
        #feedback {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.1s;
            text-shadow: 0 0 20px currentColor;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="ui-layer">
        <div id="start-screen" class="overlay">
            <h1>NEON RHYTHM</h1>
            <p>Press SPACE to Start</p>
            <p style="font-size: 18px; color: #aaa; margin-top: 20px;">Keys: D, F, J, K</p>
        </div>

        <div id="hud">
            <div class="hud-top">
                <div id="score-display">Score: 0</div>
                <div id="time-display">Time: 60</div>
            </div>
            <div id="combo-display">Combo: 0 (1x)</div>
            <div class="hud-bottom">
                <div class="key-hint" style="border-color: #FF4444; color: #FF4444;">D</div>
                <div class="key-hint" style="border-color: #4444FF; color: #4444FF;">F</div>
                <div class="key-hint" style="border-color: #44FF44; color: #44FF44;">J</div>
                <div class="key-hint" style="border-color: #FFFF44; color: #FFFF44;">K</div>
            </div>
            <div id="feedback"></div>
        </div>

        <div id="end-screen" class="overlay" style="display: none;">
            <h1>GAME OVER</h1>
            <p id="final-score">Score: 0</p>
            <p id="final-stats" style="font-size: 20px; color: #ccc; text-align: center; line-height: 1.5;"></p>
            <button id="restart-btn">Restart</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // State Management
        window.__3D_STATE__ = {
            gameState: 'waiting', // 'waiting', 'playing', 'ended'
            score: 0,
            combo: 0,
            maxCombo: 0,
            multiplier: 1,
            perfectCount: 0,
            goodCount: 0,
            missCount: 0,
            timeRemaining: 60,
            notesOnTrack: 0,
            totalNotesSpawned: 0,
            noteSpeed: 8,
            lastHitResult: 'none',
            laneCount: 4
        };

        // DOM Elements
        const startScreen = document.getElementById('start-screen');
        const hud = document.getElementById('hud');
        const endScreen = document.getElementById('end-screen');
        const scoreDisplay = document.getElementById('score-display');
        const timeDisplay = document.getElementById('time-display');
        const comboDisplay = document.getElementById('combo-display');
        const feedbackEl = document.getElementById('feedback');
        const finalScoreEl = document.getElementById('final-score');
        const finalStatsEl = document.getElementById('final-stats');
        const restartBtn = document.getElementById('restart-btn');

        // Three.js Setup
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, -5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Track
        const trackWidth = 4;
        const trackLength = 40;
        const trackGeo = new THREE.PlaneGeometry(trackWidth, trackLength);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 });
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        track.position.z = -10; // Spans from z=10 to z=-30
        scene.add(track);

        // Lane Dividers
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
        for (let i = -1; i <= 1; i++) {
            const points = [];
            points.push(new THREE.Vector3(i, 0.01, 10));
            points.push(new THREE.Vector3(i, 0.01, -30));
            const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
            const line = new THREE.Line(lineGeo, lineMat);
            scene.add(line);
        }

        // Hit Zone
        const hitZoneGeo = new THREE.BoxGeometry(trackWidth, 0.1, 1);
        const hitZoneMat = new THREE.MeshStandardMaterial({ 
            color: 0x00FFFF, 
            emissive: 0x00FFFF, 
            emissiveIntensity: 0.8 
        });
        const hitZone = new THREE.Mesh(hitZoneGeo, hitZoneMat);
        hitZone.position.set(0, 0.05, 8);
        scene.add(hitZone);

        // Note Setup
        const laneCenters = [-1.5, -0.5, 0.5, 1.5];
        const laneColors = [0xFF4444, 0x4444FF, 0x44FF44, 0xFFFF44];
        const noteGeo = new THREE.BoxGeometry(0.8, 0.3, 0.8);
        const noteMaterials = laneColors.map(color => new THREE.MeshStandardMaterial({ 
            color: color,
            emissive: color,
            emissiveIntensity: 0.2
        }));

        let activeNotes = [];
        let lastSpawnTime = 0;
        const spawnInterval = 0.8;
        const clock = new THREE.Clock();
        let hitZoneFlashTimer = 0;
        let feedbackTimeout = null;

        // Functions
        function spawnNote() {
            const lane = Math.floor(Math.random() * 4);
            const note = new THREE.Mesh(noteGeo, noteMaterials[lane]);
            note.position.set(laneCenters[lane], 0.15, -30);
            scene.add(note);
            activeNotes.push({ mesh: note, lane: lane });
            window.__3D_STATE__.totalNotesSpawned++;
        }

        function showFeedback(text, type) {
            feedbackEl.innerText = text;
            if (type === 'perfect') {
                feedbackEl.style.color = '#44FF44';
            } else if (type === 'good') {
                feedbackEl.style.color = '#FFFF44';
            } else {
                feedbackEl.style.color = '#FF4444';
            }
            
            feedbackEl.style.opacity = 1;
            feedbackEl.style.transform = 'translate(-50%, -50%) scale(1.2)';
            
            setTimeout(() => {
                feedbackEl.style.transform = 'translate(-50%, -50%) scale(1)';
            }, 50);

            if (feedbackTimeout) clearTimeout(feedbackTimeout);
            feedbackTimeout = setTimeout(() => {
                feedbackEl.style.opacity = 0;
            }, 500);
        }

        function flashHitZone(colorHex) {
            hitZoneMat.emissive.setHex(colorHex);
            hitZoneFlashTimer = 0.15;
        }

        function updateMultiplier() {
            const state = window.__3D_STATE__;
            if (state.combo >= 30) state.multiplier = 3;
            else if (state.combo >= 10) state.multiplier = 2;
            else state.multiplier = 1;
            
            if (state.combo > state.maxCombo) {
                state.maxCombo = state.combo;
            }
        }

        function handleHit(noteIndex, type) {
            const state = window.__3D_STATE__;
            const note = activeNotes[noteIndex];
            
            scene.remove(note.mesh);
            activeNotes.splice(noteIndex, 1);
            
            state.combo++;
            updateMultiplier();
            
            if (type === 'perfect') {
                state.score += 100 * state.multiplier;
                state.perfectCount++;
                state.lastHitResult = 'perfect';
                showFeedback('PERFECT!', 'perfect');
                flashHitZone(0x44FF44);
            } else {
                state.score += 50 * state.multiplier;
                state.goodCount++;
                state.lastHitResult = 'good';
                showFeedback('GOOD!', 'good');
                flashHitZone(0xFFFF44);
            }
        }

        function handleMiss() {
            const state = window.__3D_STATE__;
            state.combo = 0;
            updateMultiplier();
            state.missCount++;
            state.lastHitResult = 'miss';
            showFeedback('MISS!', 'miss');
            flashHitZone(0xFF4444);
        }

        function processInput(laneIndex) {
            if (window.__3D_STATE__.gameState !== 'playing') return;

            // Find closest note in the lane
            let closestNoteIndex = -1;
            let maxZ = -Infinity;

            for (let i = 0; i < activeNotes.length; i++) {
                if (activeNotes[i].lane === laneIndex) {
                    if (activeNotes[i].mesh.position.z > maxZ) {
                        maxZ = activeNotes[i].mesh.position.z;
                        closestNoteIndex = i;
                    }
                }
            }

            if (closestNoteIndex !== -1) {
                const z = activeNotes[closestNoteIndex].mesh.position.z;
                if (z >= 7.5 && z <= 8.5) {
                    handleHit(closestNoteIndex, 'perfect');
                } else if (z >= 6.5 && z <= 9.5) {
                    handleHit(closestNoteIndex, 'good');
                }
                // If outside 6.5 - 9.5, do nothing (no penalty for early/late press)
            }
        }

        // Input Listeners
        window.addEventListener('keydown', (e) => {
            const state = window.__3D_STATE__;
            const key = e.key.toLowerCase();

            if (state.gameState === 'waiting' && key === ' ') {
                startGame();
                return;
            }

            if (state.gameState === 'playing') {
                switch(key) {
                    case 'd': processInput(0); break;
                    case 'f': processInput(1); break;
                    case 'j': processInput(2); break;
                    case 'k': processInput(3); break;
                }
            }
        });

        // Game Flow
        function startGame() {
            const state = window.__3D_STATE__;
            state.gameState = 'playing';
            state.score = 0;
            state.combo = 0;
            state.maxCombo = 0;
            state.multiplier = 1;
            state.perfectCount = 0;
            state.goodCount = 0;
            state.missCount = 0;
            state.timeRemaining = 60;
            state.totalNotesSpawned = 0;
            state.lastHitResult = 'none';
            
            activeNotes.forEach(n => scene.remove(n.mesh));
            activeNotes = [];
            lastSpawnTime = 0;
            clock.start();

            startScreen.style.display = 'none';
            endScreen.style.display = 'none';
            hud.style.display = 'block';
        }

        function endGame() {
            const state = window.__3D_STATE__;
            state.gameState = 'ended';
            
            hud.style.display = 'none';
            endScreen.style.display = 'flex';
            
            finalScoreEl.innerText = `Score: ${state.score}`;
            finalStatsEl.innerHTML = `
                Perfect: ${state.perfectCount}<br>
                Good: ${state.goodCount}<br>
                Miss: ${state.missCount}<br>
                Max Combo: ${state.maxCombo}
            `;

            activeNotes.forEach(n => scene.remove(n.mesh));
            activeNotes = [];
        }

        restartBtn.addEventListener('click', () => {
            window.__3D_STATE__.gameState = 'waiting';
            endScreen.style.display = 'none';
            startScreen.style.display = 'flex';
        });

        // Resize Handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            if (state.gameState === 'playing') {
                // Timer
                state.timeRemaining -= delta;
                if (state.timeRemaining <= 0) {
                    state.timeRemaining = 0;
                    endGame();
                }

                // Spawning
                lastSpawnTime += delta;
                if (lastSpawnTime >= spawnInterval) {
                    spawnNote();
                    lastSpawnTime = 0;
                }

                // Update Notes
                for (let i = activeNotes.length - 1; i >= 0; i--) {
                    const note = activeNotes[i];
                    note.mesh.position.z += state.noteSpeed * delta;

                    // Miss condition
                    if (note.mesh.position.z > 12) {
                        scene.remove(note.mesh);
                        activeNotes.splice(i, 1);
                        handleMiss();
                    }
                }

                // Update HUD
                scoreDisplay.innerText = `Score: ${state.score}`;
                timeDisplay.innerText = `Time: ${Math.ceil(state.timeRemaining)}`;
                comboDisplay.innerText = `Combo: ${state.combo} (${state.multiplier}x)`;
                
                let comboColor = '#fff';
                if (state.multiplier === 2) comboColor = '#FFFF44';
                if (state.multiplier === 3) comboColor = '#44FF44';
                comboDisplay.style.color = comboColor;

                // Hit Zone Flash Revert
                if (hitZoneFlashTimer > 0) {
                    hitZoneFlashTimer -= delta;
                    if (hitZoneFlashTimer <= 0) {
                        hitZoneMat.emissive.setHex(0x00FFFF);
                    }
                }
            }

            state.notesOnTrack = activeNotes.length;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
