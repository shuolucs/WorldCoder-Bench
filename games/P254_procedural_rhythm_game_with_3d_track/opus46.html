<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Rhythm Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #hud {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  #score-display {
    position: absolute;
    top: 15px; left: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,255,0.5);
  }

  #timer-display {
    position: absolute;
    top: 15px; right: 20px;
    color: #fff;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,100,100,0.5);
  }

  #combo-display {
    position: absolute;
    top: 15px; left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,0,0.5);
    text-align: center;
  }

  #lane-hints {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 30px;
    font-size: 28px;
    font-weight: bold;
  }

  .lane-hint {
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.3);
    text-shadow: 0 0 5px currentColor;
  }

  .lane-hint.lane-0 { color: #FF4444; background: rgba(255,68,68,0.15); }
  .lane-hint.lane-1 { color: #4444FF; background: rgba(68,68,255,0.15); }
  .lane-hint.lane-2 { color: #44FF44; background: rgba(68,255,68,0.15); }
  .lane-hint.lane-3 { color: #FFFF44; background: rgba(255,255,68,0.15); }

  .lane-hint.active {
    transform: scale(1.2);
    border-color: #fff;
    box-shadow: 0 0 15px currentColor;
  }

  #hit-feedback {
    position: absolute;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    opacity: 0;
    transition: opacity 0.1s;
    text-shadow: 0 0 20px currentColor;
  }

  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.7);
    z-index: 20;
    pointer-events: auto;
  }

  .overlay-content {
    text-align: center;
    color: #fff;
    padding: 40px 60px;
    border-radius: 15px;
    background: rgba(20,20,40,0.9);
    border: 2px solid rgba(0,255,255,0.3);
    box-shadow: 0 0 30px rgba(0,255,255,0.2);
  }

  .overlay-content h1 {
    font-size: 42px;
    margin-bottom: 10px;
    color: #00FFFF;
    text-shadow: 0 0 20px rgba(0,255,255,0.5);
  }

  .overlay-content h2 {
    font-size: 28px;
    margin-bottom: 20px;
    color: #ccc;
  }

  .overlay-content p {
    font-size: 20px;
    margin: 8px 0;
    color: #ddd;
  }

  .overlay-content .stat-value {
    color: #00FFFF;
    font-weight: bold;
  }

  .start-text {
    font-size: 26px;
    color: #00FFFF;
    animation: pulse 1.5s ease-in-out infinite;
    margin-top: 20px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #restart-btn {
    margin-top: 25px;
    padding: 12px 40px;
    font-size: 20px;
    font-weight: bold;
    color: #000;
    background: #00FFFF;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.2s;
  }

  #restart-btn:hover {
    background: #66FFFF;
    box-shadow: 0 0 20px rgba(0,255,255,0.5);
    transform: scale(1.05);
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px 30px;
    text-align: left;
    margin: 15px auto;
    max-width: 300px;
  }

  .results-grid .label { color: #aaa; text-align: right; }
  .results-grid .value { color: #00FFFF; font-weight: bold; }
</style>
</head>
<body>

<div id="hud">
  <div id="score-display">Score: 0</div>
  <div id="timer-display">Time: 60</div>
  <div id="combo-display">Combo: 0 (1x)</div>
  <div id="hit-feedback"></div>
  <div id="lane-hints">
    <div class="lane-hint lane-0" id="hint-0">D</div>
    <div class="lane-hint lane-1" id="hint-1">F</div>
    <div class="lane-hint lane-2" id="hint-2">J</div>
    <div class="lane-hint lane-3" id="hint-3">K</div>
  </div>
</div>

<div id="overlay">
  <div class="overlay-content" id="overlay-content">
    <h1>🎵 Rhythm Game</h1>
    <h2>Procedural Beat Runner</h2>
    <p>Use <b style="color:#FF4444">D</b> <b style="color:#4444FF">F</b> <b style="color:#44FF44">J</b> <b style="color:#FFFF44">K</b> to hit notes</p>
    <p class="start-text">Press SPACE to Start</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // ---- State ----
  const state = {
    gameState: 'waiting',
    score: 0,
    combo: 0,
    maxCombo: 0,
    multiplier: 1,
    perfectCount: 0,
    goodCount: 0,
    missCount: 0,
    timeRemaining: 60,
    notesOnTrack: 0,
    totalNotesSpawned: 0,
    noteSpeed: 8,
    lastHitResult: 'none',
    laneCount: 4
  };
  window.__3D_STATE__ = state;

  // ---- Constants ----
  const LANE_POSITIONS = [-1.5, -0.5, 0.5, 1.5];
  const LANE_COLORS = [0xFF4444, 0x4444FF, 0x44FF44, 0xFFFF44];
  const LANE_KEYS = { 'd': 0, 'f': 1, 'j': 2, 'k': 3 };
  const NOTE_SPEED = 8;
  const SPAWN_INTERVAL = 0.8;
  const SPAWN_Z = -30;
  const MISS_Z = 12;
  const HIT_ZONE_Z = 8;
  const GAME_DURATION = 60;

  // ---- Three.js Setup ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111118);
  scene.fog = new THREE.Fog(0x111118, 25, 45);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 10);
  camera.lookAt(0, 0, -10);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 5);
  scene.add(dirLight);

  // ---- Track ----
  const trackGeom = new THREE.PlaneGeometry(4, 40);
  const trackMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8, metalness: 0.2 });
  const track = new THREE.Mesh(trackGeom, trackMat);
  track.rotation.x = -Math.PI / 2;
  track.position.set(0, 0, -10);
  scene.add(track);

  // Lane divider lines
  const lineMat = new THREE.LineBasicMaterial({ color: 0x444444 });
  for (let i = 0; i <= 4; i++) {
    const x = -2 + i;
    const points = [new THREE.Vector3(x, 0.01, 10), new THREE.Vector3(x, 0.01, -30)];
    const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(lineGeom, lineMat);
    scene.add(line);
  }

  // Center lane dividers (brighter)
  const brightLineMat = new THREE.LineBasicMaterial({ color: 0x666666 });
  for (let i = 1; i <= 3; i++) {
    const x = -2 + i;
    const points = [new THREE.Vector3(x, 0.02, 10), new THREE.Vector3(x, 0.02, -30)];
    const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(lineGeom, brightLineMat);
    scene.add(line);
  }

  // ---- Hit Zone ----
  const hitZoneGeom = new THREE.BoxGeometry(4.2, 0.05, 0.3);
  const hitZoneMat = new THREE.MeshStandardMaterial({
    color: 0x00FFFF,
    emissive: 0x00FFFF,
    emissiveIntensity: 0.8,
    transparent: true,
    opacity: 0.7
  });
  const hitZone = new THREE.Mesh(hitZoneGeom, hitZoneMat);
  hitZone.position.set(0, 0.15, HIT_ZONE_Z);
  scene.add(hitZone);

  // Hit zone glow plane
  const hitGlowGeom = new THREE.PlaneGeometry(4.2, 1.5);
  const hitGlowMat = new THREE.MeshBasicMaterial({
    color: 0x00FFFF,
    transparent: true,
    opacity: 0.08,
    side: THREE.DoubleSide
  });
  const hitGlow = new THREE.Mesh(hitGlowGeom, hitGlowMat);
  hitGlow.rotation.x = -Math.PI / 2;
  hitGlow.position.set(0, 0.02, HIT_ZONE_Z);
  scene.add(hitGlow);

  // Lane indicator lights at hit zone
  for (let i = 0; i < 4; i++) {
    const indicatorGeom = new THREE.BoxGeometry(0.8, 0.02, 0.3);
    const indicatorMat = new THREE.MeshStandardMaterial({
      color: LANE_COLORS[i],
      emissive: LANE_COLORS[i],
      emissiveIntensity: 0.2,
      transparent: true,
      opacity: 0.3
    });
    const indicator = new THREE.Mesh(indicatorGeom, indicatorMat);
    indicator.position.set(LANE_POSITIONS[i], 0.01, HIT_ZONE_Z);
    scene.add(indicator);
  }

  // Scrolling track lines for visual effect
  const scrollLines = [];
  const scrollLineMat = new THREE.LineBasicMaterial({ color: 0x333333 });
  for (let z = -30; z <= 10; z += 2) {
    const points = [new THREE.Vector3(-2, 0.01, z), new THREE.Vector3(2, 0.01, z)];
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, scrollLineMat);
    scene.add(line);
    scrollLines.push(line);
  }

  // ---- Notes Management ----
  const notes = [];
  let spawnTimer = 0;

  function createNote(lane) {
    const geom = new THREE.BoxGeometry(0.8, 0.3, 0.8);
    const mat = new THREE.MeshStandardMaterial({
      color: LANE_COLORS[lane],
      emissive: LANE_COLORS[lane],
      emissiveIntensity: 0.4,
      roughness: 0.3,
      metalness: 0.6
    });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.position.set(LANE_POSITIONS[lane], 0.3, SPAWN_Z);
    scene.add(mesh);

    // Add glow effect
    const glowGeom = new THREE.BoxGeometry(0.9, 0.35, 0.9);
    const glowMat = new THREE.MeshBasicMaterial({
      color: LANE_COLORS[lane],
      transparent: true,
      opacity: 0.15
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    mesh.add(glow);

    const noteObj = { mesh, lane, active: true };
    notes.push(noteObj);
    state.totalNotesSpawned++;
    return noteObj;
  }

  function removeNote(noteObj) {
    noteObj.active = false;
    scene.remove(noteObj.mesh);
    if (noteObj.mesh.geometry) noteObj.mesh.geometry.dispose();
    if (noteObj.mesh.material) noteObj.mesh.material.dispose();
  }

  // ---- Particle Effects ----
  const particles = [];

  function spawnParticles(x, z, color) {
    const count = 12;
    for (let i = 0; i < count; i++) {
      const geom = new THREE.BoxGeometry(0.1, 0.1, 0.1);
      const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
      const mesh = new THREE.Mesh(geom, mat);
      mesh.position.set(x, 0.3, z);
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
      const speed = 2 + Math.random() * 3;
      scene.add(mesh);
      particles.push({
        mesh,
        vx: Math.cos(angle) * speed,
        vy: 2 + Math.random() * 3,
        vz: Math.sin(angle) * speed,
        life: 0.6,
        maxLife: 0.6
      });
    }
  }

  function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life -= dt;
      if (p.life <= 0) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
        particles.splice(i, 1);
        continue;
      }
      p.mesh.position.x += p.vx * dt;
      p.mesh.position.y += p.vy * dt;
      p.mesh.position.z += p.vz * dt;
      p.vy -= 9.8 * dt;
      p.mesh.material.opacity = p.life / p.maxLife;
    }
  }

  // ---- HUD Elements ----
  const scoreDisplay = document.getElementById('score-display');
  const timerDisplay = document.getElementById('timer-display');
  const comboDisplay = document.getElementById('combo-display');
  const hitFeedback = document.getElementById('hit-feedback');
  const overlay = document.getElementById('overlay');
  const overlayContent = document.getElementById('overlay-content');
  const hud = document.getElementById('hud');

  let feedbackTimeout = null;

  function showFeedback(text, color) {
    hitFeedback.textContent = text;
    hitFeedback.style.color = color;
    hitFeedback.style.opacity = '1';
    if (feedbackTimeout) clearTimeout(feedbackTimeout);
    feedbackTimeout = setTimeout(() => {
      hitFeedback.style.opacity = '0';
    }, 500);
  }

  function updateHUD() {
    scoreDisplay.textContent = `Score: ${state.score}`;
    timerDisplay.textContent = `Time: ${Math.ceil(state.timeRemaining)}`;
    comboDisplay.textContent = `Combo: ${state.combo} (${state.multiplier}x)`;
  }

  function getMultiplier(combo) {
    if (combo >= 30) return 3;
    if (combo >= 10) return 2;
    return 1;
  }

  // ---- Hit Zone Flash ----
  let hitZoneFlashTimer = 0;
  let hitZoneFlashColor = null;

  function flashHitZone(color) {
    hitZoneFlashColor = color;
    hitZoneFlashTimer = 0.15;
  }

  // ---- Game Logic ----
  function handleHit(lane) {
    // Find closest note in lane within hit zone
    let bestNote = null;
    let bestDist = Infinity;

    for (const note of notes) {
      if (!note.active || note.lane !== lane) continue;
      const z = note.mesh.position.z;
      if (z >= 6.5 && z <= 9.5) {
        const dist = Math.abs(z - HIT_ZONE_Z);
        if (dist < bestDist) {
          bestDist = dist;
          bestNote = note;
        }
      }
    }

    if (!bestNote) return;

    const z = bestNote.mesh.position.z;
    const isPerfect = z >= 7.5 && z <= 8.5;

    state.combo++;
    if (state.combo > state.maxCombo) state.maxCombo = state.combo;
    state.multiplier = getMultiplier(state.combo);

    if (isPerfect) {
      state.score += 100 * state.multiplier;
      state.perfectCount++;
      state.lastHitResult = 'perfect';
      showFeedback('PERFECT!', '#00FF88');
      flashHitZone(0x00FF00);
      spawnParticles(bestNote.mesh.position.x, bestNote.mesh.position.z, LANE_COLORS[lane]);
    } else {
      state.score += 50 * state.multiplier;
      state.goodCount++;
      state.lastHitResult = 'good';
      showFeedback('GOOD!', '#FFFF00');
      flashHitZone(0xFFFF00);
      spawnParticles(bestNote.mesh.position.x, bestNote.mesh.position.z, 0xFFFF00);
    }

    removeNote(bestNote);
  }

  function handleMiss() {
    state.combo = 0;
    state.multiplier = 1;
    state.missCount++;
    state.lastHitResult = 'miss';
    showFeedback('MISS!', '#FF4444');
  }

  // ---- Key Handling ----
  const keysDown = {};

  function flashLaneHint(lane) {
    const el = document.getElementById(`hint-${lane}`);
    el.classList.add('active');
    setTimeout(() => el.classList.remove('active'), 150);
  }

  document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === ' ') {
      e.preventDefault();
      if (state.gameState === 'waiting') {
        startGame();
      }
      return;
    }

    if (state.gameState !== 'playing') return;

    if (key in LANE_KEYS && !keysDown[key]) {
      keysDown[key] = true;
      const lane = LANE_KEYS[key];
      flashLaneHint(lane);
      handleHit(lane);
    }
  });

  document.addEventListener('keyup', (e) => {
    const key = e.key.toLowerCase();
    keysDown[key] = false;
  });

  // ---- Game State Management ----
  function startGame() {
    state.gameState = 'playing';
    state.score = 0;
    state.combo = 0;
    state.maxCombo = 0;
    state.multiplier = 1;
    state.perfectCount = 0;
    state.goodCount = 0;
    state.missCount = 0;
    state.timeRemaining = GAME_DURATION;
    state.totalNotesSpawned = 0;
    state.lastHitResult = 'none';
    spawnTimer = 0;

    // Clear any remaining notes
    for (const note of notes) {
      if (note.active) {
        scene.remove(note.mesh);
      }
    }
    notes.length = 0;

    // Clear particles
    for (const p of particles) {
      scene.remove(p.mesh);
    }
    particles.length = 0;

    overlay.style.display = 'none';
    hud.style.display = 'block';
    updateHUD();
  }

  function endGame() {
    state.gameState = 'ended';

    // Clear remaining notes
    for (const note of notes) {
      if (note.active) {
        scene.remove(note.mesh);
      }
    }
    notes.length = 0;

    // Clear particles
    for (const p of particles) {
      scene.remove(p.mesh);
    }
    particles.length = 0;

    showResults();
  }

  function showResults() {
    overlay.style.display = 'flex';
    overlayContent.innerHTML = `
      <h1>🎵 Results</h1>
      <h2 style="color:#00FFFF; font-size:36px; margin:10px 0;">Score: ${state.score}</h2>
      <div class="results-grid">
        <span class="label">Perfect:</span><span class="value">${state.perfectCount}</span>
        <span class="label">Good:</span><span class="value">${state.goodCount}</span>
        <span class="label">Miss:</span><span class="value" style="color:#FF4444">${state.missCount}</span>
        <span class="label">Max Combo:</span><span class="value">${state.maxCombo}</span>
        <span class="label">Total Notes:</span><span class="value">${state.totalNotesSpawned}</span>
      </div>
      <button id="restart-btn" onclick="restartGame()">Restart</button>
    `;
  }

  window.restartGame = function() {
    state.gameState = 'waiting';
    state.timeRemaining = GAME_DURATION;
    overlay.style.display = 'flex';
    overlayContent.innerHTML = `
      <h1>🎵 Rhythm Game</h1>
      <h2>Procedural Beat Runner</h2>
      <p>Use <b style="color:#FF4444">D</b> <b style="color:#4444FF">F</b> <b style="color:#44FF44">J</b> <b style="color:#FFFF44">K</b> to hit notes</p>
      <p class="start-text">Press SPACE to Start</p>
    `;
    updateHUD();
  };

  // ---- Animation Loop ----
  let lastTime = performance.now();

  function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;

    if (state.gameState === 'playing') {
      // Timer
      state.timeRemaining -= dt;
      if (state.timeRemaining <= 0) {
        state.timeRemaining = 0;
        endGame();
      }

      // Spawn notes
      spawnTimer += dt;
      if (spawnTimer >= SPAWN_INTERVAL) {
        spawnTimer -= SPAWN_INTERVAL;
        const lane = Math.floor(Math.random() * 4);
        createNote(lane);
      }

      // Update notes
      for (let i = notes.length - 1; i >= 0; i--) {
        const note = notes[i];
        if (!note.active) {
          notes.splice(i, 1);
          continue;
        }

        note.mesh.position.z += NOTE_SPEED * dt;

        // Slight bob animation
        note.mesh.position.y = 0.3 + Math.sin(now * 0.005 + i) * 0.03;

        // Miss check
        if (note.mesh.position.z > MISS_Z) {
          removeNote(note);
          notes.splice(i, 1);
          handleMiss();
        }
      }

      // Update state
      state.notesOnTrack = notes.filter(n => n.active).length;
    }

    // Hit zone flash
    if (hitZoneFlashTimer > 0) {
      hitZoneFlashTimer -= dt;
      hitZoneMat.emissive.setHex(hitZoneFlashColor);
      hitZoneMat.emissiveIntensity = 2.0 * (hitZoneFlashTimer / 0.15);
      hitGlowMat.opacity = 0.3 * (hitZoneFlashTimer / 0.15);
    } else {
      hitZoneMat.emissive.setHex(0x00FFFF);
      hitZoneMat.emissiveIntensity = 0.5 + Math.sin(now * 0.003) * 0.3;
      hitGlowMat.opacity = 0.06 + Math.sin(now * 0.003) * 0.03;
    }

    // Scroll track lines
    for (const line of scrollLines) {
      if (state.gameState === 'playing') {
        line.position.z += NOTE_SPEED * dt;
        if (line.position.z > 12) {
          line.position.z -= 42;
        }
      }
    }

    // Update particles
    updateParticles(dt);

    // Update HUD
    if (state.gameState === 'playing') {
      updateHUD();
    }

    // Update state object
    state.notesOnTrack = notes.filter(n => n.active).length;

    renderer.render(scene, camera);
  }

  // ---- Resize ----
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
})();
</script>
</body>
</html>
