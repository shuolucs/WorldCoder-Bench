<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Billiard Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        #hud {
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 16px;
            line-height: 1.5;
            pointer-events: auto;
            border: 1px solid #333;
            width: fit-content;
        }
        .hud-item {
            display: flex;
            justify-content: space-between;
            gap: 20px;
        }
        .hud-value {
            font-weight: bold;
            color: #4CAF50;
        }
        #bottom-ui {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: auto;
        }
        #controls-help {
            background: rgba(0, 0, 0, 0.7);
            color: #aaa;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
        }
        #powerBarContainer {
            width: 300px;
            height: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
        }
        #powerBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #FFEB3B, #F44336);
            transition: width 0.1s;
        }
        #resetBtn {
            background: #F44336;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.2s;
        }
        #resetBtn:hover {
            background: #d32f2f;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="hud">
            <div class="hud-item"><span>Score:</span> <span id="ui-score" class="hud-value">0</span></div>
            <div class="hud-item"><span>Kinetic Energy:</span> <span id="ui-ke" class="hud-value">0.00</span></div>
            <div class="hud-item"><span>Status:</span> <span id="ui-status" class="hud-value" style="color: #2196F3;">Running</span></div>
        </div>

        <div id="powerBarContainer">
            <div id="powerBar"></div>
        </div>

        <div id="bottom-ui">
            <div id="controls-help">
                Drag on table to aim & shoot<br>
                Spacebar to Pause/Resume<br>
                Left Click + Drag to Rotate Camera
            </div>
            <button id="resetBtn">RESET TABLE</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            cueBall: { x: -3, y: 0.4, z: 0, vx: 0, vz: 0, pocketed: false, speed: 0 },
            ball1: { x: 2, y: 0.4, z: 0, vx: 0, vz: 0, pocketed: false, speed: 0 },
            ball2: { x: 3, y: 0.4, z: 0.5, vx: 0, vz: 0, pocketed: false, speed: 0 },
            totalKineticEnergy: 0,
            score: 0,
            paused: false,
            ballCount: 3,
            shotsFired: 0,
            totalMomentumX: 0,
            totalMomentumZ: 0,
            collisionCount: 0,
            animationLoaded: false,
            frameCount: 0
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2 - 0.1; // Don't go below table

        // --- LIGHTS ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.left = -6;
        dirLight.shadow.camera.right = 6;
        dirLight.shadow.camera.top = -6;
        dirLight.shadow.camera.bottom = 6;
        scene.add(dirLight);

        // --- TABLE ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);

        // Bed
        const bedGeo = new THREE.BoxGeometry(10, 0.3, 6);
        const bedMat = new THREE.MeshStandardMaterial({ color: 0x1b5e20, roughness: 0.8 });
        const bed = new THREE.Mesh(bedGeo, bedMat);
        bed.receiveShadow = true;
        tableGroup.add(bed); // Top surface at y = 0.15

        // Rails
        const railMat = new THREE.MeshStandardMaterial({ color: 0x5d4037, roughness: 0.9 });
        const railThickness = 0.3;
        const railHeight = 0.5;
        const railY = 0.25; // Centered at 0.25, top is 0.5

        const topRail = new THREE.Mesh(new THREE.BoxGeometry(10.6, railHeight, railThickness), railMat);
        topRail.position.set(0, railY, -3.15);
        topRail.castShadow = true; topRail.receiveShadow = true;
        
        const bottomRail = new THREE.Mesh(new THREE.BoxGeometry(10.6, railHeight, railThickness), railMat);
        bottomRail.position.set(0, railY, 3.15);
        bottomRail.castShadow = true; bottomRail.receiveShadow = true;

        const leftRail = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, 6), railMat);
        leftRail.position.set(-5.15, railY, 0);
        leftRail.castShadow = true; leftRail.receiveShadow = true;

        const rightRail = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, 6), railMat);
        rightRail.position.set(5.15, railY, 0);
        rightRail.castShadow = true; rightRail.receiveShadow = true;

        tableGroup.add(topRail, bottomRail, leftRail, rightRail);

        // Pockets
        const pocketRadius = 0.35;
        const pocketGeo = new THREE.CircleGeometry(pocketRadius, 32);
        const pocketMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const pocketPositions = [
            [-4.7, -2.7], [0, -2.7], [4.7, -2.7],
            [-4.7, 2.7], [0, 2.7], [4.7, 2.7]
        ];

        pocketPositions.forEach(pos => {
            const pocket = new THREE.Mesh(pocketGeo, pocketMat);
            pocket.rotation.x = -Math.PI / 2;
            pocket.position.set(pos[0], 0.151, pos[1]); // Slightly above bed to prevent z-fighting
            tableGroup.add(pocket);
        });

        // --- BALLS ---
        const ballRadius = 0.25;
        const ballMass = 1.0;
        const ballY = 0.15 + ballRadius; // 0.4
        const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);

        const balls = [];

        function createBall(color, x, z, id, type) {
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.2, metalness: 0.1 });
            const mesh = new THREE.Mesh(ballGeo, mat);
            mesh.position.set(x, ballY, z);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            
            const ballObj = {
                id: id,
                type: type,
                mesh: mesh,
                mass: ballMass,
                radius: ballRadius,
                vx: 0,
                vz: 0,
                pocketed: false,
                startX: x,
                startZ: z
            };
            balls.push(ballObj);
            return ballObj;
        }

        const cueBallObj = createBall(0xffffff, -3, 0, 'cueBall', 'cue');
        const ball1Obj = createBall(0xff0000, 2, 0, 'ball1', 'object');
        const ball2Obj = createBall(0x0000ff, 3, 0.5, 'ball2', 'object');

        // --- GLTF MODEL ---
        let mixer;
        const clock = new THREE.Clock();
        const loader = new GLTFLoader();
        loader.load(
            'https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Models/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb',
            function (gltf) {
                const model = gltf.scene;
                model.position.set(0, 1.5, -4.5);
                model.scale.set(0.5, 0.5, 0.5);
                
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });

                scene.add(model);
                window.__3D_STATE__.animationLoaded = true;

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                }
            },
            undefined,
            function (error) {
                console.error('Error loading GLTF:', error);
            }
        );

        // --- AIMING & INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -ballY);
        
        let isAiming = false;
        let dragStart = new THREE.Vector3();
        let dragCurrent = new THREE.Vector3();

        // Aim Line
        const aimMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.2, gapSize: 0.1, linewidth: 2 });
        const aimGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const aimLine = new THREE.Line(aimGeo, aimMat);
        aimLine.visible = false;
        scene.add(aimLine);

        const powerBarContainer = document.getElementById('powerBarContainer');
        const powerBar = document.getElementById('powerBar');

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'BUTTON' || window.__3D_STATE__.paused || cueBallObj.pocketed) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersectPoint = new THREE.Vector3();
            
            if (raycaster.ray.intersectPlane(tablePlane, intersectPoint)) {
                // Check if clicked near cue ball
                const distToCue = intersectPoint.distanceTo(cueBallObj.mesh.position);
                if (distToCue < 1.5) {
                    isAiming = true;
                    controls.enabled = false;
                    dragStart.copy(intersectPoint);
                    aimLine.visible = true;
                    powerBarContainer.style.display = 'block';
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isAiming) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersectPoint = new THREE.Vector3();
            
            if (raycaster.ray.intersectPlane(tablePlane, intersectPoint)) {
                dragCurrent.copy(intersectPoint);
                
                // Drag vector: from current mouse to start mouse (pull back)
                const dragVec = new THREE.Vector3().subVectors(dragStart, dragCurrent);
                dragVec.y = 0;
                
                // Update aim line
                const lineEnd = new THREE.Vector3().copy(cueBallObj.mesh.position).add(dragVec);
                aimGeo.setFromPoints([cueBallObj.mesh.position, lineEnd]);
                aimLine.computeLineDistances();

                // Update Power Bar
                const dist = dragVec.length();
                const power = Math.min(dist * 0.5, 8.0);
                const percent = (power / 8.0) * 100;
                powerBar.style.width = `${percent}%`;
                
                // Color gradient based on power
                if (percent < 33) powerBar.style.background = '#4CAF50';
                else if (percent < 66) powerBar.style.background = '#FFEB3B';
                else powerBar.style.background = '#F44336';
            }
        });

        window.addEventListener('pointerup', (e) => {
            if (!isAiming) return;
            isAiming = false;
            controls.enabled = true;
            aimLine.visible = false;
            powerBarContainer.style.display = 'none';
            powerBar.style.width = '0%';

            const dragVec = new THREE.Vector3().subVectors(dragStart, dragCurrent);
            dragVec.y = 0;
            const dist = dragVec.length();
            
            if (dist > 0.1) {
                const power = Math.min(dist * 0.5, 8.0);
                dragVec.normalize();
                cueBallObj.vx = dragVec.x * power;
                cueBallObj.vz = dragVec.z * power;
                window.__3D_STATE__.shotsFired++;
            }
        });

        // --- KEYBOARD CONTROLS ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
                document.getElementById('ui-status').innerText = window.__3D_STATE__.paused ? 'Paused' : 'Running';
                document.getElementById('ui-status').style.color = window.__3D_STATE__.paused ? '#F44336' : '#2196F3';
            }
        });

        // --- RESET BUTTON ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            balls.forEach(b => {
                b.mesh.position.set(b.startX, ballY, b.startZ);
                b.vx = 0;
                b.vz = 0;
                b.pocketed = false;
                b.mesh.visible = true;
            });
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.shotsFired = 0;
            window.__3D_STATE__.collisionCount = 0;
        });

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- PHYSICS SIMULATION ---
        const fixedDt = 1 / 60;
        const friction = 0.985;
        const boundsX = 4.7;
        const boundsZ = 2.7;

        function updatePhysics() {
            if (window.__3D_STATE__.paused) return;

            // 1. Move & Friction
            balls.forEach(b => {
                if (b.pocketed) return;

                b.vx *= friction;
                b.vz *= friction;

                if (Math.abs(b.vx) < 0.005) b.vx = 0;
                if (Math.abs(b.vz) < 0.005) b.vz = 0;

                b.mesh.position.x += b.vx * fixedDt;
                b.mesh.position.z += b.vz * fixedDt;
            });

            // 2. Wall Collisions
            balls.forEach(b => {
                if (b.pocketed) return;

                if (b.mesh.position.x < -boundsX) {
                    b.mesh.position.x = -boundsX;
                    b.vx *= -1;
                } else if (b.mesh.position.x > boundsX) {
                    b.mesh.position.x = boundsX;
                    b.vx *= -1;
                }

                if (b.mesh.position.z < -boundsZ) {
                    b.mesh.position.z = -boundsZ;
                    b.vz *= -1;
                } else if (b.mesh.position.z > boundsZ) {
                    b.mesh.position.z = boundsZ;
                    b.vz *= -1;
                }
            });

            // 3. Ball-Ball Collisions
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i];
                    const b2 = balls[j];

                    if (b1.pocketed || b2.pocketed) continue;

                    const dx = b2.mesh.position.x - b1.mesh.position.x;
                    const dz = b2.mesh.position.z - b1.mesh.position.z;
                    const distSq = dx * dx + dz * dz;
                    const minDist = b1.radius + b2.radius;

                    if (distSq <= minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        if (dist === 0) continue;

                        // Separate
                        const overlap = minDist - dist;
                        const nx = dx / dist;
                        const nz = dz / dist;

                        b1.mesh.position.x -= nx * (overlap / 2);
                        b1.mesh.position.z -= nz * (overlap / 2);
                        b2.mesh.position.x += nx * (overlap / 2);
                        b2.mesh.position.z += nz * (overlap / 2);

                        // Elastic Collision
                        const kx = b1.vx - b2.vx;
                        const kz = b1.vz - b2.vz;
                        
                        // Check if moving towards each other
                        if (kx * nx + kz * nz > 0) {
                            const p = 2.0 * (nx * kx + nz * kz) / (b1.mass + b2.mass);
                            
                            b1.vx -= p * b2.mass * nx;
                            b1.vz -= p * b2.mass * nz;
                            b2.vx += p * b1.mass * nx;
                            b2.vz += p * b1.mass * nz;

                            window.__3D_STATE__.collisionCount++;
                        }
                    }
                }
            }

            // 4. Pocket Detection
            balls.forEach(b => {
                if (b.pocketed) return;

                for (let i = 0; i < pocketPositions.length; i++) {
                    const px = pocketPositions[i][0];
                    const pz = pocketPositions[i][1];
                    const dx = b.mesh.position.x - px;
                    const dz = b.mesh.position.z - pz;
                    
                    if (dx * dx + dz * dz <= pocketRadius * pocketRadius) {
                        b.pocketed = true;
                        b.mesh.visible = false;
                        b.vx = 0;
                        b.vz = 0;

                        if (b.type === 'cue') {
                            window.__3D_STATE__.score = Math.max(0, window.__3D_STATE__.score - 1);
                            // Respawn cue ball
                            setTimeout(() => {
                                b.mesh.position.set(b.startX, ballY, b.startZ);
                                b.pocketed = false;
                                b.mesh.visible = true;
                            }, 1000);
                        } else {
                            window.__3D_STATE__.score++;
                        }
                        break;
                    }
                }
            });
        }

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            if (mixer && !window.__3D_STATE__.paused) {
                mixer.update(dt);
            }

            updatePhysics();
            controls.update();

            // Update State Object
            let totalKE = 0;
            let totalMomX = 0;
            let totalMomZ = 0;
            let activeBalls = 0;

            balls.forEach(b => {
                const speedSq = b.vx * b.vx + b.vz * b.vz;
                const speed = Math.sqrt(speedSq);
                
                window.__3D_STATE__[b.id] = {
                    x: b.mesh.position.x || 0,
                    y: b.mesh.position.y || 0,
                    z: b.mesh.position.z || 0,
                    vx: b.vx || 0,
                    vz: b.vz || 0,
                    pocketed: b.pocketed,
                    speed: speed || 0
                };

                if (!b.pocketed) {
                    totalKE += 0.5 * b.mass * speedSq;
                    totalMomX += b.mass * b.vx;
                    totalMomZ += b.mass * b.vz;
                    activeBalls++;
                }
            });

            window.__3D_STATE__.totalKineticEnergy = totalKE || 0;
            window.__3D_STATE__.totalMomentumX = totalMomX || 0;
            window.__3D_STATE__.totalMomentumZ = totalMomZ || 0;
            window.__3D_STATE__.ballCount = activeBalls;
            window.__3D_STATE__.frameCount++;

            // Update HUD DOM
            document.getElementById('ui-score').innerText = window.__3D_STATE__.score;
            document.getElementById('ui-ke').innerText = window.__3D_STATE__.totalKineticEnergy.toFixed(2);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
