<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Billiard Table Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 260px;
    }

    #hud {
      background: rgba(0, 0, 0, 0.65);
      padding: 10px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.4;
    }

    #resetBtn {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #2e7d32;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #resetBtn:hover {
      background: #388e3c;
    }

    #powerContainer {
      background: rgba(0, 0, 0, 0.65);
      padding: 8px;
      border-radius: 8px;
    }

    #powerLabel {
      margin-bottom: 6px;
      font-size: 13px;
    }

    #powerBarOuter {
      width: 100%;
      height: 18px;
      background: #333;
      border-radius: 9px;
      overflow: hidden;
      border: 1px solid #666;
    }

    #powerBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
      transition: width 0.03s linear;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="hud">
      Score: 0<br />
      Total Kinetic Energy: 0.000<br />
      Status: Running
    </div>
    <button id="resetBtn">Reset</button>
    <div id="powerContainer">
      <div id="powerLabel">Shot Power</div>
      <div id="powerBarOuter">
        <div id="powerBar"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252f);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 12, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0.5, 0);
    controls.enableDamping = true;

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ambLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambLight);

    const clock = new THREE.Clock();
    let mixer = null;

    const TABLE_WIDTH = 10;
    const TABLE_HEIGHT = 0.3;
    const TABLE_DEPTH = 6;
    const SURFACE_Y = 0.4;
    const BALL_RADIUS = 0.25;
    const BALL_MASS = 1.0;
    const FRICTION = 0.985;
    const INNER_MIN_X = -4.7;
    const INNER_MAX_X = 4.7;
    const INNER_MIN_Z = -2.7;
    const INNER_MAX_Z = 2.7;
    const POCKET_RADIUS = 0.35;
    const MAX_SPEED = 8.0;

    let paused = false;
    let score = 0;
    let shotsFired = 0;
    let collisionCount = 0;
    let frameCount = 0;
    let animationLoaded = false;

    const hud = document.getElementById('hud');
    const resetBtn = document.getElementById('resetBtn');
    const powerBar = document.getElementById('powerBar');

    // Table
    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const tableMat = new THREE.MeshPhongMaterial({ color: 0x1f7a1f });
    const tableGeo = new THREE.BoxGeometry(TABLE_WIDTH, TABLE_HEIGHT, TABLE_DEPTH);
    const tableMesh = new THREE.Mesh(tableGeo, tableMat);
    tableMesh.position.set(0, 0, 0);
    tableGroup.add(tableMesh);

    const railMat = new THREE.MeshPhongMaterial({ color: 0x6d4c41 });
    const railThickness = 0.3;
    const railHeight = 0.35;

    const railTop = new THREE.Mesh(new THREE.BoxGeometry(TABLE_WIDTH + railThickness * 2, railHeight, railThickness), railMat);
    railTop.position.set(0, railHeight / 2, -TABLE_DEPTH / 2 - railThickness / 2);
    tableGroup.add(railTop);

    const railBottom = new THREE.Mesh(new THREE.BoxGeometry(TABLE_WIDTH + railThickness * 2, railHeight, railThickness), railMat);
    railBottom.position.set(0, railHeight / 2, TABLE_DEPTH / 2 + railThickness / 2);
    tableGroup.add(railBottom);

    const railLeft = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, TABLE_DEPTH), railMat);
    railLeft.position.set(-TABLE_WIDTH / 2 - railThickness / 2, railHeight / 2, 0);
    tableGroup.add(railLeft);

    const railRight = new THREE.Mesh(new THREE.BoxGeometry(railThickness, railHeight, TABLE_DEPTH), railMat);
    railRight.position.set(TABLE_WIDTH / 2 + railThickness / 2, railHeight / 2, 0);
    tableGroup.add(railRight);

    // Pockets
    const pocketCenters = [
      new THREE.Vector3(-5, SURFACE_Y - 0.14, -3),
      new THREE.Vector3( 5, SURFACE_Y - 0.14, -3),
      new THREE.Vector3(-5, SURFACE_Y - 0.14,  3),
      new THREE.Vector3( 5, SURFACE_Y - 0.14,  3),
      new THREE.Vector3( 0, SURFACE_Y - 0.14, -3),
      new THREE.Vector3( 0, SURFACE_Y - 0.14,  3)
    ];

    const pocketGeo = new THREE.CylinderGeometry(POCKET_RADIUS, POCKET_RADIUS, 0.05, 32);
    const pocketMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
    pocketCenters.forEach(p => {
      const pocket = new THREE.Mesh(pocketGeo, pocketMat);
      pocket.rotation.x = Math.PI / 2;
      pocket.position.copy(p);
      scene.add(pocket);
    });

    // Balls
    function createBall(color, startPos, name) {
      const geo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);
      const mat = new THREE.MeshPhongMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(startPos);
      scene.add(mesh);

      return {
        name,
        mesh,
        startPos: startPos.clone(),
        vx: 0,
        vz: 0,
        mass: BALL_MASS,
        pocketed: false,
        countedPocket: false
      };
    }

    const cueBall = createBall(0xffffff, new THREE.Vector3(-3, SURFACE_Y, 0), 'cueBall');
    const ball1 = createBall(0xff0000, new THREE.Vector3(2, SURFACE_Y, 0), 'ball1');
    const ball2 = createBall(0x0000ff, new THREE.Vector3(3, SURFACE_Y, 0.5), 'ball2');

    const balls = [cueBall, ball1, ball2];

    // Decorative scoreboard GLB
    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/BoxAnimated.glb',
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 1.5, -4.5);
        model.scale.set(0.5, 0.5, 0.5);
        scene.add(model);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach(clip => mixer.clipAction(clip).play());
        }

        animationLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load BoxAnimated.glb:', err);
      }
    );

    // Aim line
    let aiming = false;
    let dragStart = null;
    let dragCurrent = null;

    const aimMaterial = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.2,
      gapSize: 0.1
    });
    const aimGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(),
      new THREE.Vector3()
    ]);
    const aimLine = new THREE.Line(aimGeometry, aimMaterial);
    aimLine.visible = false;
    scene.add(aimLine);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -SURFACE_Y);

    function getMouseNDC(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function getPlanePoint(event) {
      getMouseNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      raycaster.ray.intersectPlane(tablePlane, point);
      return point;
    }

    function ballIsMoving(ball) {
      return Math.hypot(ball.vx, ball.vz) > 0.02;
    }

    function anyBallMoving() {
      return balls.some(b => !b.pocketed && ballIsMoving(b));
    }

    renderer.domElement.addEventListener('mousedown', (event) => {
      if (paused || cueBall.pocketed || anyBallMoving()) return;

      getMouseNDC(event);
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(cueBall.mesh);

      if (intersects.length > 0) {
        aiming = true;
        dragStart = getPlanePoint(event);
        dragCurrent = dragStart.clone();
        aimLine.visible = true;
      }
    });

    renderer.domElement.addEventListener('mousemove', (event) => {
      if (!aiming) return;

      dragCurrent = getPlanePoint(event);
      updateAimLineAndPower();
    });

    renderer.domElement.addEventListener('mouseup', () => {
      if (!aiming || !dragStart || !dragCurrent) return;

      const dx = dragStart.x - dragCurrent.x;
      const dz = dragStart.z - dragCurrent.z;
      const dragDistance = Math.hypot(dx, dz);

      if (dragDistance > 0.001 && !cueBall.pocketed) {
        const power = Math.min(dragDistance * 0.5, MAX_SPEED);
        const dir = new THREE.Vector2(dx, dz).normalize();
        cueBall.vx = safeNumber(dir.x * power);
        cueBall.vz = safeNumber(dir.y * power);
        shotsFired++;
      }

      aiming = false;
      dragStart = null;
      dragCurrent = null;
      aimLine.visible = false;
      powerBar.style.width = '0%';
    });

    function updateAimLineAndPower() {
      if (!aiming || !dragStart || !dragCurrent) return;

      const cuePos = cueBall.mesh.position.clone();
      const pullVec = new THREE.Vector3().subVectors(dragCurrent, dragStart);
      const endPoint = cuePos.clone().add(pullVec);

      aimGeometry.setFromPoints([
        new THREE.Vector3(cuePos.x, SURFACE_Y + 0.02, cuePos.z),
        new THREE.Vector3(endPoint.x, SURFACE_Y + 0.02, endPoint.z)
      ]);
      aimLine.computeLineDistances();

      const dragDistance = Math.hypot(dragStart.x - dragCurrent.x, dragStart.z - dragCurrent.z);
      const power = Math.min(dragDistance * 0.5, MAX_SPEED);
      const percent = (power / MAX_SPEED) * 100;
      powerBar.style.width = `${safeNumber(percent)}%`;
    }

    function resolveBallCollision(a, b) {
      if (a.pocketed || b.pocketed) return;

      const dx = b.mesh.position.x - a.mesh.position.x;
      const dz = b.mesh.position.z - a.mesh.position.z;
      const dist = Math.hypot(dx, dz);
      const minDist = BALL_RADIUS * 2;

      if (dist <= minDist && dist > 0.000001) {
        const nx = dx / dist;
        const nz = dz / dist;

        const rvx = a.vx - b.vx;
        const rvz = a.vz - b.vz;
        const relVelAlongNormal = rvx * nx + rvz * nz;

        if (relVelAlongNormal > 0) return;

        const impulse = -(2 * relVelAlongNormal) / (a.mass + b.mass);
        a.vx = safeNumber(a.vx + impulse * b.mass * nx);
        a.vz = safeNumber(a.vz + impulse * b.mass * nz);
        b.vx = safeNumber(b.vx - impulse * a.mass * nx);
        b.vz = safeNumber(b.vz - impulse * a.mass * nz);

        const overlap = minDist - dist;
        const correction = overlap / 2;
        a.mesh.position.x -= nx * correction;
        a.mesh.position.z -= nz * correction;
        b.mesh.position.x += nx * correction;
        b.mesh.position.z += nz * correction;

        collisionCount++;
      }
    }

    function handleWallBounce(ball) {
      if (ball.pocketed) return;

      const pos = ball.mesh.position;

      if (pos.x - BALL_RADIUS < INNER_MIN_X) {
        pos.x = INNER_MIN_X + BALL_RADIUS;
        ball.vx = safeNumber(Math.abs(ball.vx));
      } else if (pos.x + BALL_RADIUS > INNER_MAX_X) {
        pos.x = INNER_MAX_X - BALL_RADIUS;
        ball.vx = safeNumber(-Math.abs(ball.vx));
      }

      if (pos.z - BALL_RADIUS < INNER_MIN_Z) {
        pos.z = INNER_MIN_Z + BALL_RADIUS;
        ball.vz = safeNumber(Math.abs(ball.vz));
      } else if (pos.z + BALL_RADIUS > INNER_MAX_Z) {
        pos.z = INNER_MAX_Z - BALL_RADIUS;
        ball.vz = safeNumber(-Math.abs(ball.vz));
      }
    }

    function handlePocket(ball) {
      if (ball.pocketed) return;

      const pos = ball.mesh.position;
      for (const pocket of pocketCenters) {
        const dx = pos.x - pocket.x;
        const dz = pos.z - pocket.z;
        const d = Math.hypot(dx, dz);

        if (d <= POCKET_RADIUS) {
          ball.pocketed = true;
          ball.mesh.visible = false;
          ball.vx = 0;
          ball.vz = 0;

          if (ball.name === 'cueBall') {
            score = Math.max(0, score - 1);
            setTimeout(() => {
              respawnCueBall();
            }, 200);
          } else if (!ball.countedPocket) {
            ball.countedPocket = true;
            score++;
          }
          break;
        }
      }
    }

    function respawnCueBall() {
      cueBall.pocketed = false;
      cueBall.mesh.visible = true;
      cueBall.mesh.position.copy(cueBall.startPos);
      cueBall.mesh.position.y = SURFACE_Y;
      cueBall.vx = 0;
      cueBall.vz = 0;
    }

    function resetBalls() {
      balls.forEach(ball => {
        ball.mesh.position.copy(ball.startPos);
        ball.mesh.position.y = SURFACE_Y;
        ball.vx = 0;
        ball.vz = 0;
        ball.pocketed = false;
        ball.mesh.visible = true;
        ball.countedPocket = false;
      });

      score = 0;
      shotsFired = 0;
      collisionCount = 0;
      powerBar.style.width = '0%';
      aimLine.visible = false;
      aiming = false;
      dragStart = null;
      dragCurrent = null;
    }

    resetBtn.addEventListener('click', resetBalls);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
      }
    });

    function safeNumber(n) {
      return Number.isFinite(n) ? n : 0;
    }

    function updatePhysics() {
      for (const ball of balls) {
        if (ball.pocketed) continue;

        ball.mesh.position.x = safeNumber(ball.mesh.position.x + ball.vx / 60);
        ball.mesh.position.z = safeNumber(ball.mesh.position.z + ball.vz / 60);
        ball.mesh.position.y = SURFACE_Y;

        ball.vx = safeNumber(ball.vx * FRICTION);
        ball.vz = safeNumber(ball.vz * FRICTION);

        if (Math.abs(ball.vx) < 0.001) ball.vx = 0;
        if (Math.abs(ball.vz) < 0.001) ball.vz = 0;

        handleWallBounce(ball);
      }

      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          resolveBallCollision(balls[i], balls[j]);
        }
      }

      for (const ball of balls) {
        handlePocket(ball);
      }
    }

    function updateHUDAndState() {
      let totalKineticEnergy = 0;
      let totalMomentumX = 0;
      let totalMomentumZ = 0;
      let ballCount = 0;

      for (const ball of balls) {
        if (!ball.pocketed) {
          const speedSq = safeNumber(ball.vx * ball.vx + ball.vz * ball.vz);
          totalKineticEnergy += 0.5 * ball.mass * speedSq;
          totalMomentumX += ball.mass * ball.vx;
          totalMomentumZ += ball.mass * ball.vz;
          ballCount++;
        }
      }

      totalKineticEnergy = safeNumber(totalKineticEnergy);
      totalMomentumX = safeNumber(totalMomentumX);
      totalMomentumZ = safeNumber(totalMomentumZ);

      hud.innerHTML = `
        Score: ${score}<br />
        Total Kinetic Energy: ${totalKineticEnergy.toFixed(3)}<br />
        Status: ${paused ? 'Paused' : 'Running'}
      `;

      window.__3D_STATE__ = {
        cueBall: getBallState(cueBall),
        ball1: getBallState(ball1),
        ball2: getBallState(ball2),
        totalKineticEnergy,
        score: safeNumber(score),
        paused: !!paused,
        ballCount: safeNumber(ballCount),
        shotsFired: safeNumber(shotsFired),
        totalMomentumX,
        totalMomentumZ,
        collisionCount: safeNumber(collisionCount),
        animationLoaded: !!animationLoaded,
        frameCount: safeNumber(frameCount)
      };
    }

    function getBallState(ball) {
      const vx = safeNumber(ball.vx);
      const vz = safeNumber(ball.vz);
      return {
        x: safeNumber(ball.mesh.position.x),
        y: safeNumber(ball.mesh.position.y),
        z: safeNumber(ball.mesh.position.z),
        vx,
        vz,
        pocketed: !!ball.pocketed,
        speed: safeNumber(Math.hypot(vx, vz))
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();
      controls.update();

      if (!paused) {
        if (mixer) mixer.update(delta);
        updatePhysics();
      }

      updateHUDAndState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetBalls();
    updateHUDAndState();
    animate();
  </script>
</body>
</html>
