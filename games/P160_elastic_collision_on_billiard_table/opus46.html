<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Billiard Table Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #e0e0e0;
    background: rgba(0,0,0,0.75);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    min-width: 220px;
}
#hud .label { color: #aaa; }
#hud .value { color: #4fc3f7; font-weight: bold; }
#hud .score-value { color: #ffd54f; font-size: 24px; }
#hud .status-running { color: #66bb6a; }
#hud .status-paused { color: #ef5350; }
#resetBtn {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 12px 28px;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(135deg, #e53935, #c62828);
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    letter-spacing: 1px;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(229,57,53,0.4);
}
#resetBtn:hover {
    background: linear-gradient(135deg, #f44336, #d32f2f);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(229,57,53,0.6);
}
#powerBar {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 30px;
    background: rgba(0,0,0,0.7);
    border-radius: 15px;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.2);
    display: none;
}
#powerBar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4caf50, #ffeb3b, #f44336);
    transition: width 0.05s;
    border-radius: 13px;
}
#powerBar .text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-weight: bold;
    font-size: 13px;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
}
#instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6);
    font-size: 12px;
    text-align: center;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Score: </span><span class="score-value" id="scoreVal">0</span></div>
    <div><span class="label">Kinetic Energy: </span><span class="value" id="keVal">0.000</span></div>
    <div><span class="label">Status: </span><span id="statusVal" class="status-running">Running</span></div>
    <div><span class="label">Shots: </span><span class="value" id="shotsVal">0</span></div>
    <div><span class="label">Collisions: </span><span class="value" id="collVal">0</span></div>
    <div><span class="label">Active Balls: </span><span class="value" id="ballsVal">3</span></div>
</div>

<button id="resetBtn">RESET</button>

<div id="powerBar">
    <div class="fill" id="powerFill"></div>
    <div class="text" id="powerText">0%</div>
</div>

<div id="instructions">Click & drag on cue ball to aim and shoot • Spacebar to pause • Scroll to zoom</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let score = 0;
let paused = false;
let shotsFired = 0;
let collisionCount = 0;
let animationLoaded = false;
let frameCount = 0;

const BALL_RADIUS = 0.25;
const FRICTION = 0.985;
const MAX_SPEED = 8.0;
const PLAY_X = 4.7;
const PLAY_Z = 2.7;
const POCKET_RADIUS = 0.35;
const TABLE_Y = 0.15;
const BALL_Y = 0.4;

// Pocket positions
const pockets = [
    { x: -4.7, z: -2.7 },
    { x: 4.7, z: -2.7 },
    { x: -4.7, z: 2.7 },
    { x: 4.7, z: 2.7 },
    { x: 0, z: -2.7 },
    { x: 0, z: 2.7 }
];

// Ball definitions
const ballDefs = [
    { name: 'cueBall', color: 0xFFFFFF, startX: -3, startZ: 0, isCue: true },
    { name: 'ball1', color: 0xFF0000, startX: 2, startZ: 0, isCue: false },
    { name: 'ball2', color: 0x0000FF, startX: 3, startZ: 0.5, isCue: false }
];

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI / 2.2;
controls.minDistance = 5;
controls.maxDistance = 25;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 6;
dirLight.shadow.camera.bottom = -6;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

// Extra fill light
const fillLight = new THREE.PointLight(0xfff5e6, 0.4, 30);
fillLight.position.set(-5, 8, -3);
scene.add(fillLight);

// --- Table ---
// Playing surface
const tableGeo = new THREE.BoxGeometry(10, 0.3, 6);
const tableMat = new THREE.MeshStandardMaterial({ 
    color: 0x1b7a2b, 
    roughness: 0.8, 
    metalness: 0.05 
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.set(0, 0, 0);
table.receiveShadow = true;
scene.add(table);

// Table legs
const legGeo = new THREE.CylinderGeometry(0.15, 0.2, 2, 8);
const legMat = new THREE.MeshStandardMaterial({ color: 0x4a2810, roughness: 0.7 });
const legPositions = [
    [-4.5, -1.15, -2.5], [4.5, -1.15, -2.5],
    [-4.5, -1.15, 2.5], [4.5, -1.15, 2.5]
];
legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...pos);
    leg.castShadow = true;
    scene.add(leg);
});

// Rails
const railMat = new THREE.MeshStandardMaterial({ 
    color: 0x5c2e0e, 
    roughness: 0.6, 
    metalness: 0.1 
});

// Long rails (along x-axis)
const longRailGeo = new THREE.BoxGeometry(10.6, 0.5, 0.3);
const rail1 = new THREE.Mesh(longRailGeo, railMat);
rail1.position.set(0, 0.25, -3.15);
rail1.castShadow = true;
scene.add(rail1);

const rail2 = new THREE.Mesh(longRailGeo, railMat);
rail2.position.set(0, 0.25, 3.15);
rail2.castShadow = true;
scene.add(rail2);

// Short rails (along z-axis)
const shortRailGeo = new THREE.BoxGeometry(0.3, 0.5, 6.6);
const rail3 = new THREE.Mesh(shortRailGeo, railMat);
rail3.position.set(-5.15, 0.25, 0);
rail3.castShadow = true;
scene.add(rail3);

const rail4 = new THREE.Mesh(shortRailGeo, railMat);
rail4.position.set(5.15, 0.25, 0);
rail4.castShadow = true;
scene.add(rail4);

// Pockets
const pocketGeo = new THREE.CircleGeometry(POCKET_RADIUS, 32);
const pocketMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1.0 });
pockets.forEach(p => {
    const pocket = new THREE.Mesh(pocketGeo, pocketMat);
    pocket.rotation.x = -Math.PI / 2;
    pocket.position.set(p.x, TABLE_Y + 0.005, p.z);
    scene.add(pocket);
});

// Floor
const floorGeo = new THREE.PlaneGeometry(40, 40);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x0d0d1a, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2.15;
floor.receiveShadow = true;
scene.add(floor);

// --- Balls ---
const balls = [];
const ballGeo = new THREE.SphereGeometry(BALL_RADIUS, 32, 32);

ballDefs.forEach(def => {
    const mat = new THREE.MeshStandardMaterial({ 
        color: def.color, 
        roughness: 0.2, 
        metalness: 0.3 
    });
    if (def.isCue) {
        mat.emissive = new THREE.Color(0x222222);
    }
    const mesh = new THREE.Mesh(ballGeo, mat);
    mesh.position.set(def.startX, BALL_Y, def.startZ);
    mesh.castShadow = true;
    scene.add(mesh);

    balls.push({
        name: def.name,
        mesh: mesh,
        vx: 0,
        vz: 0,
        mass: 1.0,
        pocketed: false,
        isCue: def.isCue,
        startX: def.startX,
        startZ: def.startZ,
        color: def.color
    });
});

// --- GLB Model ---
let mixer = null;
const loader = new GLTFLoader();
loader.load(
    'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/models/gltf/BoxAnimated.glb',
    (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 1.5, -4.5);
        model.scale.set(0.5, 0.5, 0.5);
        model.castShadow = true;
        scene.add(model);

        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(model);
            const action = mixer.clipAction(gltf.animations[0]);
            action.play();
        }
        animationLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLB load error:', error);
    }
);

// --- Aim Line ---
const aimLineMat = new THREE.LineDashedMaterial({ 
    color: 0xffff00, 
    dashSize: 0.2, 
    gapSize: 0.1,
    linewidth: 2
});
const aimLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(0, 0, 0)
]);
const aimLine = new THREE.Line(aimLineGeo, aimLineMat);
aimLine.computeLineDistances();
aimLine.visible = false;
scene.add(aimLine);

// --- Interaction ---
let isDragging = false;
let dragStart = new THREE.Vector2();
let dragEnd = new THREE.Vector2();
let dragStartWorld = new THREE.Vector3();
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tablePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -BALL_Y);

function getWorldPos(screenX, screenY) {
    mouse.x = (screenX / window.innerWidth) * 2 - 1;
    mouse.y = -(screenY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const target = new THREE.Vector3();
    raycaster.ray.intersectPlane(tablePlane, target);
    return target;
}

function isCueBallArea(screenX, screenY) {
    const cueBall = balls[0];
    if (cueBall.pocketed) return false;
    const worldPos = getWorldPos(screenX, screenY);
    if (!worldPos) return false;
    const dx = worldPos.x - cueBall.mesh.position.x;
    const dz = worldPos.z - cueBall.mesh.position.z;
    return Math.sqrt(dx * dx + dz * dz) < 1.0;
}

function allBallsStopped() {
    for (const ball of balls) {
        if (!ball.pocketed) {
            const speed = Math.sqrt(ball.vx * ball.vx + ball.vz * ball.vz);
            if (speed > 0.01) return false;
        }
    }
    return true;
}

renderer.domElement.addEventListener('mousedown', (e) => {
    if (e.button !== 0) return;
    if (!allBallsStopped()) return;
    if (!isCueBallArea(e.clientX, e.clientY)) return;

    isDragging = true;
    dragStart.set(e.clientX, e.clientY);
    dragStartWorld.copy(getWorldPos(e.clientX, e.clientY) || new THREE.Vector3());
    controls.enabled = false;

    document.getElementById('powerBar').style.display = 'block';
});

renderer.domElement.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    dragEnd.set(e.clientX, e.clientY);
    const dx = dragEnd.x - dragStart.x;
    const dy = dragEnd.y - dragStart.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const power = Math.min(dist * 0.5, MAX_SPEED);
    const pct = Math.round((power / MAX_SPEED) * 100);

    document.getElementById('powerFill').style.width = pct + '%';
    document.getElementById('powerText').textContent = pct + '%';

    // Update aim line
    const cueBall = balls[0];
    if (!cueBall.pocketed) {
        const currentWorld = getWorldPos(e.clientX, e.clientY);
        if (currentWorld) {
            const dirX = dragStartWorld.x - currentWorld.x;
            const dirZ = dragStartWorld.z - currentWorld.z;
            const len = Math.sqrt(dirX * dirX + dirZ * dirZ);
            if (len > 0.01) {
                const normX = dirX / len;
                const normZ = dirZ / len;
                const lineLen = power * 0.8;
                const startPos = cueBall.mesh.position.clone();
                const endPos = new THREE.Vector3(
                    startPos.x + normX * lineLen,
                    startPos.y,
                    startPos.z + normZ * lineLen
                );
                const positions = aimLine.geometry.attributes.position;
                positions.setXYZ(0, startPos.x, startPos.y, startPos.z);
                positions.setXYZ(1, endPos.x, endPos.y, endPos.z);
                positions.needsUpdate = true;
                aimLine.geometry.computeBoundingSphere();
                aimLine.computeLineDistances();
                aimLine.visible = true;
            }
        }
    }
});

renderer.domElement.addEventListener('mouseup', (e) => {
    if (!isDragging) return;
    isDragging = false;
    controls.enabled = true;
    aimLine.visible = false;
    document.getElementById('powerBar').style.display = 'none';

    const cueBall = balls[0];
    if (cueBall.pocketed) return;

    const currentWorld = getWorldPos(e.clientX, e.clientY);
    if (!currentWorld) return;

    const dirX = dragStartWorld.x - currentWorld.x;
    const dirZ = dragStartWorld.z - currentWorld.z;
    const len = Math.sqrt(dirX * dirX + dirZ * dirZ);
    if (len < 0.01) return;

    const dx = e.clientX - dragStart.x;
    const dy = e.clientY - dragStart.y;
    const screenDist = Math.sqrt(dx * dx + dy * dy);
    const power = Math.min(screenDist * 0.5, MAX_SPEED);

    if (power < 0.1) return;

    const normX = dirX / len;
    const normZ = dirZ / len;

    cueBall.vx = normX * power;
    cueBall.vz = normZ * power;
    shotsFired++;
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        paused = !paused;
    }
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
    balls.forEach(ball => {
        ball.vx = 0;
        ball.vz = 0;
        ball.pocketed = false;
        ball.mesh.visible = true;
        ball.mesh.position.set(ball.startX, BALL_Y, ball.startZ);
    });
    score = 0;
    shotsFired = 0;
    collisionCount = 0;
    paused = false;
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Physics ---
function safeNum(v) {
    if (typeof v !== 'number' || isNaN(v) || !isFinite(v)) return 0;
    return v;
}

function updatePhysics() {
    if (paused) return;

    // Move balls
    for (const ball of balls) {
        if (ball.pocketed) continue;

        ball.vx *= FRICTION;
        ball.vz *= FRICTION;

        // Stop very slow balls
        const speed = Math.sqrt(ball.vx * ball.vx + ball.vz * ball.vz);
        if (speed < 0.005) {
            ball.vx = 0;
            ball.vz = 0;
        }

        ball.mesh.position.x += ball.vx * (1 / 60);
        ball.mesh.position.z += ball.vz * (1 / 60);
        ball.mesh.position.y = BALL_Y;

        // Wall bouncing
        if (ball.mesh.position.x - BALL_RADIUS < -PLAY_X) {
            ball.mesh.position.x = -PLAY_X + BALL_RADIUS;
            ball.vx = Math.abs(ball.vx) * 0.9;
        }
        if (ball.mesh.position.x + BALL_RADIUS > PLAY_X) {
            ball.mesh.position.x = PLAY_X - BALL_RADIUS;
            ball.vx = -Math.abs(ball.vx) * 0.9;
        }
        if (ball.mesh.position.z - BALL_RADIUS < -PLAY_Z) {
            ball.mesh.position.z = -PLAY_Z + BALL_RADIUS;
            ball.vz = Math.abs(ball.vz) * 0.9;
        }
        if (ball.mesh.position.z + BALL_RADIUS > PLAY_Z) {
            ball.mesh.position.z = PLAY_Z - BALL_RADIUS;
            ball.vz = -Math.abs(ball.vz) * 0.9;
        }

        // Pocket detection
        for (const pocket of pockets) {
            const dx = ball.mesh.position.x - pocket.x;
            const dz = ball.mesh.position.z - pocket.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist < POCKET_RADIUS) {
                ball.pocketed = true;
                ball.mesh.visible = false;
                ball.vx = 0;
                ball.vz = 0;

                if (ball.isCue) {
                    score = Math.max(0, score - 1);
                    // Respawn cue ball
                    setTimeout(() => {
                        ball.pocketed = false;
                        ball.mesh.visible = true;
                        ball.mesh.position.set(ball.startX, BALL_Y, ball.startZ);
                        ball.vx = 0;
                        ball.vz = 0;
                    }, 500);
                } else {
                    score++;
                }
                break;
            }
        }
    }

    // Ball-ball collisions
    for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
            const a = balls[i];
            const b = balls[j];
            if (a.pocketed || b.pocketed) continue;

            const dx = b.mesh.position.x - a.mesh.position.x;
            const dz = b.mesh.position.z - a.mesh.position.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            const minDist = 2 * BALL_RADIUS;

            if (dist <= minDist && dist > 0.001) {
                // Separate balls
                const overlap = minDist - dist;
                const nx = dx / dist;
                const nz = dz / dist;

                a.mesh.position.x -= nx * overlap * 0.5;
                a.mesh.position.z -= nz * overlap * 0.5;
                b.mesh.position.x += nx * overlap * 0.5;
                b.mesh.position.z += nz * overlap * 0.5;

                // Elastic collision (equal masses)
                const dvx = a.vx - b.vx;
                const dvz = a.vz - b.vz;
                const dvDotN = dvx * nx + dvz * nz;

                if (dvDotN > 0) {
                    a.vx -= dvDotN * nx;
                    a.vz -= dvDotN * nz;
                    b.vx += dvDotN * nx;
                    b.vz += dvDotN * nz;
                    collisionCount++;
                }
            }
        }
    }
}

// --- HUD ---
function updateHUD() {
    let totalKE = 0;
    let activeBalls = 0;
    for (const ball of balls) {
        if (!ball.pocketed) {
            const speed2 = ball.vx * ball.vx + ball.vz * ball.vz;
            totalKE += 0.5 * ball.mass * speed2;
            activeBalls++;
        }
    }

    document.getElementById('scoreVal').textContent = score;
    document.getElementById('keVal').textContent = safeNum(totalKE).toFixed(3);
    document.getElementById('shotsVal').textContent = shotsFired;
    document.getElementById('collVal').textContent = collisionCount;
    document.getElementById('ballsVal').textContent = activeBalls;

    const statusEl = document.getElementById('statusVal');
    if (paused) {
        statusEl.textContent = 'Paused';
        statusEl.className = 'status-paused';
    } else {
        statusEl.textContent = 'Running';
        statusEl.className = 'status-running';
    }
}

// --- State ---
function updateState() {
    let totalKE = 0;
    let totalMomX = 0;
    let totalMomZ = 0;
    let activeBalls = 0;

    const state = {
        cueBall: null,
        ball1: null,
        ball2: null,
        totalKineticEnergy: 0,
        score: score,
        paused: paused,
        ballCount: 0,
        shotsFired: shotsFired,
        totalMomentumX: 0,
        totalMomentumZ: 0,
        collisionCount: collisionCount,
        animationLoaded: animationLoaded,
        frameCount: frameCount
    };

    for (const ball of balls) {
        const speed = Math.sqrt(safeNum(ball.vx) ** 2 + safeNum(ball.vz) ** 2);
        const info = {
            x: safeNum(ball.mesh.position.x),
            y: safeNum(ball.mesh.position.y),
            z: safeNum(ball.mesh.position.z),
            vx: safeNum(ball.vx),
            vz: safeNum(ball.vz),
            pocketed: ball.pocketed,
            speed: safeNum(speed)
        };

        if (ball.name === 'cueBall') state.cueBall = info;
        else if (ball.name === 'ball1') state.ball1 = info;
        else if (ball.name === 'ball2') state.ball2 = info;

        if (!ball.pocketed) {
            totalKE += 0.5 * ball.mass * speed * speed;
            totalMomX += ball.mass * safeNum(ball.vx);
            totalMomZ += ball.mass * safeNum(ball.vz);
            activeBalls++;
        }
    }

    state.totalKineticEnergy = safeNum(totalKE);
    state.totalMomentumX = safeNum(totalMomX);
    state.totalMomentumZ = safeNum(totalMomZ);
    state.ballCount = activeBalls;

    window.__3D_STATE__ = state;
}

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    frameCount++;

    const delta = clock.getDelta();

    if (mixer && !paused) {
        mixer.update(delta);
    }

    updatePhysics();
    updateHUD();
    updateState();

    controls.update();
    renderer.render(scene, camera);
}

// Initialize state
