<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 细胞有丝分裂五阶段演示</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #0d1b2a, #050814 70%);
      font-family: Arial, Helvetica, sans-serif;
      color: #eaf6ff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 320px;
      background: rgba(10, 18, 32, 0.72);
      border: 1px solid rgba(140, 200, 255, 0.22);
      border-radius: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      padding: 14px;
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 18px;
      font-weight: 700;
      color: #bfe8ff;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    button, label.toggle {
      border: 0;
      border-radius: 10px;
      padding: 8px 12px;
      background: #16314d;
      color: #eef8ff;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover, label.toggle:hover {
      background: #20476f;
    }

    label.toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    input[type="checkbox"] {
      accent-color: #6fd6ff;
      cursor: pointer;
    }

    #stageInfo {
      font-size: 14px;
      line-height: 1.5;
      background: rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 10px 12px;
      color: #d9efff;
    }

    #stageInfo .name {
      font-size: 16px;
      font-weight: 700;
      color: #8fe3ff;
      margin-bottom: 4px;
    }

    #hint {
      margin-top: 8px;
      font-size: 12px;
      color: #9ec4dc;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h2>细胞有丝分裂演示</h2>
    <div class="controls">
      <button id="prevStage">上一阶段</button>
      <button id="nextStage">下一阶段</button>
      <label class="toggle">
        <input type="checkbox" id="autoPlay" />
        自动播放
      </label>
    </div>
    <div id="stageInfo"></div>
    <div id="hint">拖拽可旋转，滚轮可缩放。</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const nextBtn = document.getElementById('nextStage');
    const prevBtn = document.getElementById('prevStage');
    const autoPlayInput = document.getElementById('autoPlay');
    const stageInfo = document.getElementById('stageInfo');

    const STAGES = [
      {
        name: 'Interphase',
        desc: '间期：细胞核完整可见，染色质未明显凝聚，细胞器分散在细胞质中。'
      },
      {
        name: 'Prophase',
        desc: '前期：核膜逐渐消失，染色体开始凝聚成清晰短棒状，并出现纺锤体方向。'
      },
      {
        name: 'Metaphase',
        desc: '中期：染色体排列在细胞中央赤道板附近，准备向两极分离。'
      },
      {
        name: 'Anaphase',
        desc: '后期：姐妹染色单体分离并分别向细胞两极移动。'
      },
      {
        name: 'Telophase',
        desc: '末期：两侧重新形成细胞核，细胞拉长并分裂为两个子细胞。'
      }
    ];

    let currentStage = 0;
    let autoPlaying = false;
    let simTime = 0;
    let autoTimer = 0;
    const autoInterval = 3.2;

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x08101d, 18, 40);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4.8, 11);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 22;

    const ambient = new THREE.AmbientLight(0xb8d8ff, 1.4);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xa8ddff, 1.8);
    dir1.position.set(6, 8, 6);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffc8dd, 0.7);
    dir2.position.set(-8, -3, -4);
    scene.add(dir2);

    const root = new THREE.Group();
    scene.add(root);

    const bgParticles = new THREE.Group();
    scene.add(bgParticles);
    const bgGeo = new THREE.SphereGeometry(0.03, 8, 8);
    const bgMat = new THREE.MeshBasicMaterial({ color: 0x5e87a8, transparent: true, opacity: 0.35 });
    for (let i = 0; i < 120; i++) {
      const p = new THREE.Mesh(bgGeo, bgMat);
      p.position.set(
        THREE.MathUtils.randFloatSpread(36),
        THREE.MathUtils.randFloatSpread(24),
        THREE.MathUtils.randFloatSpread(36)
      );
      bgParticles.add(p);
    }

    function createCellGroup() {
      const group = new THREE.Group();

      const membrane = new THREE.Mesh(
        new THREE.SphereGeometry(3, 48, 48),
        new THREE.MeshPhysicalMaterial({
          color: 0x57c7ff,
          transparent: true,
          opacity: 0.16,
          transmission: 0.55,
          roughness: 0.15,
          metalness: 0.0,
          thickness: 0.5,
          side: THREE.DoubleSide
        })
      );
      group.add(membrane);

      const cytoplasm = new THREE.Mesh(
        new THREE.SphereGeometry(2.92, 32, 32),
        new THREE.MeshPhongMaterial({
          color: 0x164a71,
          transparent: true,
          opacity: 0.14
        })
      );
      group.add(cytoplasm);

      const nucleus = new THREE.Mesh(
        new THREE.SphereGeometry(1.25, 32, 32),
        new THREE.MeshPhongMaterial({
          color: 0x9b7bff,
          transparent: true,
          opacity: 0.5,
          shininess: 90
        })
      );
      group.add(nucleus);

      const nucleusMembrane = new THREE.Mesh(
        new THREE.SphereGeometry(1.32, 32, 32),
        new THREE.MeshPhongMaterial({
          color: 0xd6c2ff,
          transparent: true,
          opacity: 0.15,
          side: THREE.DoubleSide
        })
      );
      group.add(nucleusMembrane);

      const organelles = new THREE.Group();
      group.add(organelles);

      const organelleGeo = new THREE.SphereGeometry(0.13, 12, 12);
      const organelleMats = [
        new THREE.MeshPhongMaterial({ color: 0xffb86b }),
        new THREE.MeshPhongMaterial({ color: 0x6bffb0 }),
        new THREE.MeshPhongMaterial({ color: 0xff7aa8 }),
        new THREE.MeshPhongMaterial({ color: 0xf7f58b })
      ];

      const organelleSeeds = [];
      for (let i = 0; i < 22; i++) {
        const mesh = new THREE.Mesh(organelleGeo, organelleMats[i % organelleMats.length]);
        const r = THREE.MathUtils.randFloat(1.65, 2.45);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(THREE.MathUtils.randFloat(-1, 1));
        const base = new THREE.Vector3(
          r * Math.sin(phi) * Math.cos(theta),
          r * Math.cos(phi),
          r * Math.sin(phi) * Math.sin(theta)
        );
        organelleSeeds.push({
          mesh,
          base,
          offset: Math.random() * Math.PI * 2,
          speed: THREE.MathUtils.randFloat(0.5, 1.3)
        });
        organelles.add(mesh);
      }

      const centrosomes = new THREE.Group();
      group.add(centrosomes);

      function createCentrosome(color = 0xffcc66) {
        const g = new THREE.Group();
        for (let i = 0; i < 2; i++) {
          const rod = new THREE.Mesh(
            new THREE.CylinderGeometry(0.05, 0.05, 0.42, 10),
            new THREE.MeshPhongMaterial({ color })
          );
          rod.rotation.z = Math.PI / 2;
          rod.rotation.y = i * Math.PI / 2;
          g.add(rod);
        }
        return g;
      }

      const centrosomeA = createCentrosome(0xffd36a);
      const centrosomeB = createCentrosome(0xffd36a);
      centrosomes.add(centrosomeA, centrosomeB);

      const spindleGroup = new THREE.Group();
      group.add(spindleGroup);

      const chromosomeGroup = new THREE.Group();
      group.add(chromosomeGroup);

      return {
        group,
        membrane,
        cytoplasm,
        nucleus,
        nucleusMembrane,
        organelles,
        organelleSeeds,
        centrosomes,
        centrosomeA,
        centrosomeB,
        spindleGroup,
        chromosomeGroup
      };
    }

    const cellA = createCellGroup();
    const cellB = createCellGroup();

    root.add(cellA.group);
    root.add(cellB.group);

    cellB.group.visible = false;

    function clearGroup(g) {
      while (g.children.length > 0) {
        const child = g.children.pop();
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      }
    }

    function createChromosome(color = 0xff5d8f) {
      const g = new THREE.Group();
      const mat = new THREE.MeshPhongMaterial({ color, shininess: 120 });
      const geo = new THREE.CylinderGeometry(0.07, 0.07, 0.58, 14);

      const left = new THREE.Mesh(geo, mat);
      const right = new THREE.Mesh(geo, mat);

      left.position.x = -0.09;
      right.position.x = 0.09;
      left.rotation.z = 0.42;
      right.rotation.z = -0.42;

      const center = new THREE.Mesh(
        new THREE.SphereGeometry(0.07, 10, 10),
        new THREE.MeshPhongMaterial({ color: 0xffd0dd })
      );

      g.add(left, right, center);
      return g;
    }

    function createSingleChromatid(color = 0xff5d8f) {
      const g = new THREE.Group();
      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07, 0.07, 0.55, 14),
        new THREE.MeshPhongMaterial({ color, shininess: 120 })
      );
      body.rotation.z = 0.08;
      g.add(body);
      return g;
    }

    function createSpindleLine(start, end, color = 0xaee7ff, opacity = 0.35) {
      const points = [start, end];
      const geo = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity });
      return new THREE.Line(geo, mat);
    }

    function configureStage(stage) {
      clearGroup(cellA.chromosomeGroup);
      clearGroup(cellA.spindleGroup);
      clearGroup(cellB.chromosomeGroup);
      clearGroup(cellB.spindleGroup);

      cellA.group.visible = true;
      cellB.group.visible = false;
      cellA.group.position.set(0, 0, 0);
      cellB.group.position.set(0, 0, 0);

      cellA.membrane.scale.set(1, 1, 1);
      cellA.cytoplasm.scale.set(1, 1, 1);
      cellA.nucleus.scale.set(1, 1, 1);
      cellA.nucleus.visible = true;
      cellA.nucleusMembrane.visible = true;
      cellA.nucleus.material.opacity = 0.5;
      cellA.nucleusMembrane.material.opacity = 0.15;

      cellB.nucleus.visible = true;
      cellB.nucleusMembrane.visible = true;
      cellB.nucleus.scale.set(0.72, 0.72, 0.72);
      cellB.nucleus.material.opacity = 0.5;
      cellB.nucleusMembrane.material.opacity = 0.15;

      cellA.centrosomes.visible = false;
      cellB.centrosomes.visible = false;

      let chromosomeCount = 0;
      let cellCount = 1;

      if (stage === 0) {
        cellA.nucleus.visible = true;
        cellA.nucleusMembrane.visible = true;
        chromosomeCount = 0;
      }

      if (stage === 1) {
        cellA.nucleus.visible = true;
        cellA.nucleusMembrane.visible = true;
        cellA.nucleus.material.opacity = 0.22;
        cellA.nucleusMembrane.material.opacity = 0.05;

        cellA.centrosomes.visible = true;
        cellA.centrosomeA.position.set(-2.1, 0, 0);
        cellA.centrosomeB.position.set(2.1, 0, 0);

        for (let i = 0; i < 6; i++) {
          const c = createChromosome(0xff6f91);
          c.position.set(
            THREE.MathUtils.randFloatSpread(1.4),
            THREE.MathUtils.randFloatSpread(1.3),
            THREE.MathUtils.randFloatSpread(1.0)
          );
          c.rotation.set(
            Math.random() * Math.PI,
            Math.random() * Math.PI,
            Math.random() * Math.PI
          );
          cellA.chromosomeGroup.add(c);
        }
        chromosomeCount = 6;
      }

      if (stage === 2) {
        cellA.nucleus.visible = false;
        cellA.nucleusMembrane.visible = false;
        cellA.centrosomes.visible = true;
        cellA.centrosomeA.position.set(-2.4, 0, 0);
        cellA.centrosomeB.position.set(2.4, 0, 0);

        const yPositions = [-1.15, -0.68, -0.22, 0.22, 0.68, 1.15];
        for (let i = 0; i < 6; i++) {
          const c = createChromosome(0xff5d8f);
          c.position.set(0, yPositions[i], 0);
          c.rotation.set(0, 0, Math.PI / 2);
          cellA.chromosomeGroup.add(c);

          const start1 = new THREE.Vector3(-2.4, 0, 0);
          const start2 = new THREE.Vector3(2.4, 0, 0);
          const end = c.position.clone();
          cellA.spindleGroup.add(createSpindleLine(start1, end));
          cellA.spindleGroup.add(createSpindleLine(start2, end));
        }
        chromosomeCount = 6;
      }

      if (stage === 3) {
        cellA.nucleus.visible = false;
        cellA.nucleusMembrane.visible = false;
        cellA.centrosomes.visible = true;
        cellA.centrosomeA.position.set(-2.45, 0, 0);
        cellA.centrosomeB.position.set(2.45, 0, 0);

        const ys = [-1.1, -0.66, -0.22, 0.22, 0.66, 1.1];
        for (let i = 0; i < 6; i++) {
          const left = createSingleChromatid(0xff8aa8);
          left.position.set(-0.95, ys[i], 0.12);
          left.rotation.set(0, 0, Math.PI / 2);
          cellA.chromosomeGroup.add(left);

          const right = createSingleChromatid(0xff8aa8);
          right.position.set(0.95, ys[i], -0.12);
          right.rotation.set(0, 0, Math.PI / 2);
          cellA.chromosomeGroup.add(right);

          cellA.spindleGroup.add(createSpindleLine(
            new THREE.Vector3(-2.45, 0, 0),
            left.position.clone()
          ));
          cellA.spindleGroup.add(createSpindleLine(
            new THREE.Vector3(2.45, 0, 0),
            right.position.clone()
          ));
        }
        chromosomeCount = 12;
      }

      if (stage === 4) {
        cellCount = 2;

        cellA.group.position.set(-2.15, 0, 0);
        cellB.group.position.set(2.15, 0, 0);
        cellB.group.visible = true;

        cellA.membrane.scale.set(0.82, 0.82, 0.82);
        cellA.cytoplasm.scale.set(0.82, 0.82, 0.82);
        cellB.membrane.scale.set(0.82, 0.82, 0.82);
        cellB.cytoplasm.scale.set(0.82, 0.82, 0.82);

        cellA.nucleus.visible = true;
        cellA.nucleusMembrane.visible = true;
        cellA.nucleus.scale.set(0.72, 0.72, 0.72);

        cellB.nucleus.visible = true;
        cellB.nucleusMembrane.visible = true;
        cellB.nucleus.scale.set(0.72, 0.72, 0.72);

        const ysLeft = [-0.58, -0.25, 0.08, 0.42];
        for (let i = 0; i < 4; i++) {
          const c1 = createSingleChromatid(0xff93a9);
          c1.position.set(-0.15 + (i % 2) * 0.18, ysLeft[i], 0);
          c1.rotation.z = 0.25;
          cellA.chromosomeGroup.add(c1);

          const c2 = createSingleChromatid(0xff93a9);
          c2.position.set(-0.15 + (i % 2) * 0.18, ysLeft[i], 0);
          c2.rotation.z = 0.25;
          cellB.chromosomeGroup.add(c2);
        }

        chromosomeCount = 8;
      }

      updateStageInfo();
      updateState(chromosomeCount, cellCount);
    }

    function updateStageInfo() {
      const stage = STAGES[currentStage];
      stageInfo.innerHTML = `
        <div class="name">${stage.name}</div>
        <div>${stage.desc}</div>
      `;
    }

    function updateState(chromosomeCountOverride = null, cellCountOverride = null) {
      const chromosomeCount =
        chromosomeCountOverride !== null
          ? chromosomeCountOverride
          : currentStage === 0 ? 0
          : currentStage === 1 ? 6
          : currentStage === 2 ? 6
          : currentStage === 3 ? 12
          : 8;

      const cellCount = cellCountOverride !== null ? cellCountOverride : (currentStage === 4 ? 2 : 1);

      window.__3D_STATE__ = {
        currentStage,
        stageName: STAGES[currentStage].name,
        autoPlaying,
        cellCount,
        chromosomeCount,
        simTime: Number(simTime.toFixed(3))
      };
    }

    function setStage(stage) {
      currentStage = (stage + STAGES.length) % STAGES.length;
      configureStage(currentStage);
    }

    nextBtn.addEventListener('click', () => {
      setStage(currentStage + 1);
      autoTimer = 0;
    });

    prevBtn.addEventListener('click', () => {
      setStage(currentStage - 1);
      autoTimer = 0;
    });

    autoPlayInput.addEventListener('change', () => {
      autoPlaying = autoPlayInput.checked;
      updateState();
    });

    setStage(0);

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      simTime += dt;
      autoTimer += dt;

      if (autoPlaying && autoTimer >= autoInterval) {
        autoTimer = 0;
        setStage(currentStage + 1);
      }

      controls.update();

      root.rotation.y += dt * 0.12;
      bgParticles.rotation.y += dt * 0.01;

      const pulse = 1 + Math.sin(simTime * 1.6) * 0.025;
      cellA.membrane.scale.y = (currentStage === 4 ? 0.82 : 1) * pulse;
      cellA.membrane.scale.x = (currentStage === 4 ? 0.82 : 1) * (1 / pulse * 0.995);
      cellA.membrane.scale.z = (currentStage === 4 ? 0.82 : 1) * 1.01;

      if (cellB.group.visible) {
        cellB.membrane.scale.y = 0.82 * (1 + Math.sin(simTime * 1.7 + 1.3) * 0.02);
        cellB.membrane.scale.x = 0.82 * (1 + Math.sin(simTime * 1.5 + 0.7) * 0.015);
      }

      [cellA, cellB].forEach((cell, cellIndex) => {
        cell.organelleSeeds.forEach((item, i) => {
          const s = simTime * item.speed + item.offset + cellIndex;
          const wobble = 0.12;
          item.mesh.position.set(
            item.base.x + Math.sin(s + i) * wobble,
            item.base.y + Math.cos(s * 0.9 + i * 0.5) * wobble,
            item.base.z + Math.sin(s * 1.1 + i * 0.7) * wobble
          );
        });
      });

      if (currentStage === 1) {
        cellA.nucleus.scale.setScalar(1 + Math.sin(simTime * 2.2) * 0.02);
      }

      if (currentStage === 3) {
        const t = (Math.sin(simTime * 1.8) + 1) * 0.5;
        cellA.chromosomeGroup.children.forEach((child, i) => {
          if (i < 6) child.position.x = -0.75 - t * 0.5;
          else child.position.x = 0.75 + t * 0.5;
        });
      }

      if (currentStage === 4) {
        const splitPulse = Math.min(1, 0.85 + Math.sin(simTime * 1.5) * 0.03 + 0.15);
        cellA.group.position.x = -2.0 * splitPulse;
        cellB.group.position.x = 2.0 * splitPulse;
      }

      updateState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
