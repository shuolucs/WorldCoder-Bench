<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mitosis 3D Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.85);
            padding: 20px 30px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            min-width: 400px;
            pointer-events: auto;
        }
        #stageInfo {
            margin-bottom: 15px;
        }
        #stageName {
            font-size: 1.8em;
            font-weight: bold;
            color: #44aaff;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }
        #stageDesc {
            font-size: 0.95em;
            color: #aaa;
            line-height: 1.4;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        button {
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #555;
            padding: 8px 16px;
            font-size: 1em;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        button:hover {
            background: #44aaff;
            border-color: #44aaff;
            color: #000;
        }
        button:active {
            transform: scale(0.95);
        }
        .toggle-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1a1a1a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #444;
            cursor: pointer;
        }
        .toggle-container:hover {
            border-color: #666;
        }
        input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
            accent-color: #44aaff;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <div id="stageInfo">
            <div id="stageName">Interphase</div>
            <div id="stageDesc">Cell grows and DNA replicates. Nucleus is intact.</div>
        </div>
        <div class="controls">
            <button id="prevStage">◄ Prev</button>
            <button id="nextStage">Next ►</button>
            <label class="toggle-container">
                <input type="checkbox" id="autoPlay">
                <span>Auto Play</span>
            </label>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State & Data ---
        const stagesData = [
            { name: "Interphase", desc: "Cell grows, DNA replicates. Nucleus is intact.", chromos: 0, cells: 1 },
            { name: "Prophase", desc: "Chromatin condenses into chromosomes. Nuclear envelope breaks down.", chromos: 4, cells: 1 },
            { name: "Metaphase", desc: "Chromosomes align at the cell equator (metaphase plate).", chromos: 4, cells: 1 },
            { name: "Anaphase", desc: "Sister chromatids separate and are pulled to opposite poles.", chromos: 8, cells: 1 },
            { name: "Telophase", desc: "Cell divides. Nuclear envelopes reform around two new nuclei.", chromos: 0, cells: 2 }
        ];

        let currentStageIndex = 0;
        let isAutoPlaying = false;
        let lastAutoPlayTime = 0;
        const autoPlayInterval = 4.0; // seconds per stage

        window.__3D_STATE__ = {
            currentStage: 0,
            stageName: stagesData[0].name,
            autoPlaying: false,
            cellCount: 1,
            chromosomeCount: 0,
            simTime: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050505, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight1.position.set(10, 10, 10);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0x88aaff, 1.0);
        dirLight2.position.set(-10, -10, -10);
        scene.add(dirLight2);

        const pointLight = new THREE.PointLight(0x44aaff, 2, 20);
        scene.add(pointLight);

        // --- Materials ---
        const membraneMat = new THREE.MeshPhysicalMaterial({
            color: 0x2288ff,
            transparent: true,
            opacity: 0.15,
            roughness: 0.2,
            transmission: 0.9,
            thickness: 0.5,
            depthWrite: false,
            side: THREE.DoubleSide
        });

        const nucleusMat = new THREE.MeshPhongMaterial({
            color: 0xff44aa,
            transparent: true,
            opacity: 0.7,
            shininess: 100,
            depthWrite: false
        });

        const chromoMat = new THREE.MeshPhongMaterial({
            color: 0xff2222,
            shininess: 50
        });

        const organelleMat = new THREE.MeshPhongMaterial({
            color: 0x22cc44,
            shininess: 30
        });

        // --- Geometries ---
        const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
        const chromoGeo = new THREE.CapsuleGeometry(0.12, 0.7, 4, 8);
        const organelleGeo = new THREE.SphereGeometry(0.15, 16, 16);

        // --- Objects ---
        const cellGroup = new THREE.Group();
        scene.add(cellGroup);

        const cell1 = new THREE.Mesh(sphereGeo, membraneMat.clone());
        const cell2 = new THREE.Mesh(sphereGeo, membraneMat.clone());
        cellGroup.add(cell1);
        cellGroup.add(cell2);

        const nuc1 = new THREE.Mesh(sphereGeo, nucleusMat.clone());
        const nuc2 = new THREE.Mesh(sphereGeo, nucleusMat.clone());
        cellGroup.add(nuc1);
        cellGroup.add(nuc2);

        const chromos = [];
        for (let i = 0; i < 8; i++) {
            const mesh = new THREE.Mesh(chromoGeo, chromoMat);
            cellGroup.add(mesh);
            chromos.push(mesh);
        }

        const organelles = [];
        for (let i = 0; i < 80; i++) {
            const mesh = new THREE.Mesh(organelleGeo, organelleMat);
            cellGroup.add(mesh);
            organelles.push(mesh);
        }

        // --- Target States for Animation ---
        const targets = {
            cell1: { pos: new THREE.Vector3(), scale: new THREE.Vector3(), opacity: 0 },
            cell2: { pos: new THREE.Vector3(), scale: new THREE.Vector3(), opacity: 0 },
            nuc1: { pos: new THREE.Vector3(), scale: new THREE.Vector3(), opacity: 0 },
            nuc2: { pos: new THREE.Vector3(), scale: new THREE.Vector3(), opacity: 0 },
            chromos: Array(8).fill(0).map(() => ({ pos: new THREE.Vector3(), rot: new THREE.Euler(), scale: new THREE.Vector3() })),
            organelles: Array(80).fill(0).map(() => ({ pos: new THREE.Vector3() }))
        };

        function randomPointInSphere(radius, minRadius = 0) {
            let p = new THREE.Vector3();
            do {
                p.set(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2
                );
            } while (p.length() > 1);
            p.normalize().multiplyScalar(minRadius + Math.random() * (radius - minRadius));
            return p;
        }

        function calculateTargets(stage) {
            // Base resets
            targets.cell1.scale.set(4, 4, 4);
            targets.cell1.pos.set(0, 0, 0);
            targets.cell1.opacity = 0.15;
            
            targets.cell2.scale.set(4, 4, 4);
            targets.cell2.pos.set(0, 0, 0);
            targets.cell2.opacity = 0;

            targets.nuc1.scale.set(1.5, 1.5, 1.5);
            targets.nuc1.pos.set(0, 0, 0);
            targets.nuc1.opacity = 0;

            targets.nuc2.scale.set(1.5, 1.5, 1.5);
            targets.nuc2.pos.set(0, 0, 0);
            targets.nuc2.opacity = 0;

            if (stage === 0) { // Interphase
                targets.nuc1.opacity = 0.7;
                chromos.forEach((_, i) => targets.chromos[i].scale.set(0, 0, 0));
                organelles.forEach((_, i) => {
                    targets.organelles[i].pos.copy(randomPointInSphere(3.5, 1.8));
                });
            } 
            else if (stage === 1) { // Prophase
                targets.nuc1.opacity = 0.1; // Fading
                chromos.forEach((_, i) => {
                    targets.chromos[i].scale.set(1, 1, 1);
                    targets.chromos[i].pos.copy(randomPointInSphere(1.2, 0));
                    targets.chromos[i].rot.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                });
                // Organelles stay roughly same, maybe push out slightly
                organelles.forEach((_, i) => {
                    let p = targets.organelles[i].pos;
                    if(p.length() < 2.0) p.setLength(2.0 + Math.random());
                });
            } 
            else if (stage === 2) { // Metaphase
                const r = 1.0;
                for (let i = 0; i < 4; i++) {
                    let angle = (i / 4) * Math.PI * 2;
                    let x = Math.cos(angle) * r;
                    let z = Math.sin(angle) * r;
                    // Pair alignment at equator (Y=0)
                    targets.chromos[i * 2].pos.set(x, 0.15, z);
                    targets.chromos[i * 2].rot.set(Math.PI/2, 0, -angle);
                    targets.chromos[i * 2].scale.set(1, 1, 1);
                    
                    targets.chromos[i * 2 + 1].pos.set(x, -0.15, z);
                    targets.chromos[i * 2 + 1].rot.set(Math.PI/2, 0, -angle);
                    targets.chromos[i * 2 + 1].scale.set(1, 1, 1);
                }
            } 
            else if (stage === 3) { // Anaphase
                targets.cell1.scale.set(3.2, 5.5, 3.2);
                for (let i = 0; i < 4; i++) {
                    let angle = (i / 4) * Math.PI * 2;
                    let x = Math.cos(angle) * 0.6;
                    let z = Math.sin(angle) * 0.6;
                    // Pull to poles
                    targets.chromos[i * 2].pos.set(x, 2.5, z);
                    targets.chromos[i * 2 + 1].pos.set(x, -2.5, z);
                }
                // Stretch organelles
                organelles.forEach((_, i) => {
                    let p = targets.organelles[i].pos;
                    p.y = (Math.random() - 0.5) * 8;
                    p.x *= 0.8;
                    p.z *= 0.8;
                });
            } 
            else if (stage === 4) { // Telophase
                targets.cell1.pos.set(0, 2.8, 0);
                targets.cell1.scale.set(2.8, 2.8, 2.8);
                
                targets.cell2.pos.set(0, -2.8, 0);
                targets.cell2.scale.set(2.8, 2.8, 2.8);
                targets.cell2.opacity = 0.15;

                targets.nuc1.pos.set(0, 2.8, 0);
                targets.nuc1.opacity = 0.7;
                
                targets.nuc2.pos.set(0, -2.8, 0);
                targets.nuc2.opacity = 0.7;

                chromos.forEach((_, i) => targets.chromos[i].scale.set(0, 0, 0));

                organelles.forEach((_, i) => {
                    let p = randomPointInSphere(2.2, 1.6);
                    if (i % 2 === 0) p.y += 2.8; // Top cell
                    else p.y -= 2.8; // Bottom cell
                    targets.organelles[i].pos.copy(p);
                });
            }
        }

        function applyTargetsInstantly() {
            cell1.position.copy(targets.cell1.pos);
            cell1.scale.copy(targets.cell1.scale);
            cell1.material.opacity = targets.cell1.opacity;

            cell2.position.copy(targets.cell2.pos);
            cell2.scale.copy(targets.cell2.scale);
            cell2.material.opacity = targets.cell2.opacity;

            nuc1.position.copy(targets.nuc1.pos);
            nuc1.scale.copy(targets.nuc1.scale);
            nuc1.material.opacity = targets.nuc1.opacity;

            nuc2.position.copy(targets.nuc2.pos);
            nuc2.scale.copy(targets.nuc2.scale);
            nuc2.material.opacity = targets.nuc2.opacity;

            chromos.forEach((c, i) => {
                c.position.copy(targets.chromos[i].pos);
                c.scale.copy(targets.chromos[i].scale);
                c.rotation.copy(targets.chromos[i].rot);
            });

            organelles.forEach((o, i) => {
                o.position.copy(targets.organelles[i].pos);
            });
        }

        function updateUI() {
            const data = stagesData[currentStageIndex];
            document.getElementById('stageName').innerText = data.name;
            document.getElementById('stageDesc').innerText = data.desc;
        }

        function setStage(index) {
            currentStageIndex = (index + 5) % 5;
            calculateTargets(currentStageIndex);
            updateUI();
            lastAutoPlayTime = clock.getElapsedTime();
        }

        // --- Initialization ---
        calculateTargets(0);
        applyTargetsInstantly();
        updateUI();

        // --- Event Listeners ---
        document.getElementById('nextStage').addEventListener('click', () => setStage(currentStageIndex + 1));
        document.getElementById('prevStage').addEventListener('click', () => setStage(currentStageIndex - 1));
        
        const autoPlayCheckbox = document.getElementById('autoPlay');
        autoPlayCheckbox.addEventListener('change', (e) => {
            isAutoPlaying = e.target.checked;
            if(isAutoPlaying) lastAutoPlayTime = clock.getElapsedTime();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const lerpSpeed = 0.04;

        function animate() {
            requestAnimationFrame(animate);
            
            const time = clock.getElapsedTime();
            const delta = clock.getDelta();

            // Auto Play Logic
            if (isAutoPlaying && time - lastAutoPlayTime > autoPlayInterval) {
                setStage(currentStageIndex + 1);
            }

            // Lerp Cells
            cell1.position.lerp(targets.cell1.pos, lerpSpeed);
            cell1.scale.lerp(targets.cell1.scale, lerpSpeed);
            cell1.material.opacity = THREE.MathUtils.lerp(cell1.material.opacity, targets.cell1.opacity, lerpSpeed);
            cell1.visible = cell1.material.opacity > 0.01;

            cell2.position.lerp(targets.cell2.pos, lerpSpeed);
            cell2.scale.lerp(targets.cell2.scale, lerpSpeed);
            cell2.material.opacity = THREE.MathUtils.lerp(cell2.material.opacity, targets.cell2.opacity, lerpSpeed);
            cell2.visible = cell2.material.opacity > 0.01;

            // Lerp Nuclei
            nuc1.position.lerp(targets.nuc1.pos, lerpSpeed);
            nuc1.scale.lerp(targets.nuc1.scale, lerpSpeed);
            nuc1.material.opacity = THREE.MathUtils.lerp(nuc1.material.opacity, targets.nuc1.opacity, lerpSpeed);
            nuc1.visible = nuc1.material.opacity > 0.01;

            nuc2.position.lerp(targets.nuc2.pos, lerpSpeed);
            nuc2.scale.lerp(targets.nuc2.scale, lerpSpeed);
            nuc2.material.opacity = THREE.MathUtils.lerp(nuc2.material.opacity, targets.nuc2.opacity, lerpSpeed);
            nuc2.visible = nuc2.material.opacity > 0.01;

            // Lerp Chromosomes
            const qTarget = new THREE.Quaternion();
            chromos.forEach((c, i) => {
                c.position.lerp(targets.chromos[i].pos, lerpSpeed);
                c.scale.lerp(targets.chromos[i].scale, lerpSpeed);
                qTarget.setFromEuler(targets.chromos[i].rot);
                c.quaternion.slerp(qTarget, lerpSpeed);
                c.visible = c.scale.x > 0.01;
            });

            // Lerp Organelles with slight floating effect
            organelles.forEach((o, i) => {
                o.position.lerp(targets.organelles[i].pos, lerpSpeed * 0.5);
                // Add subtle idle movement
                o.position.y += Math.sin(time * 2 + i) * 0.005;
                o.position.x += Math.cos(time * 1.5 + i) * 0.005;
            });

            // Update State Exposure
            window.__3D_STATE__.currentStage = currentStageIndex;
            window.__3D_STATE__.stageName = stagesData[currentStageIndex].name;
            window.__3D_STATE__.autoPlaying = isAutoPlaying;
            window.__3D_STATE__.cellCount = stagesData[currentStageIndex].cells;
            window.__3D_STATE__.chromosomeCount = stagesData[currentStageIndex].chromos;
            window.__3D_STATE__.simTime = time;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
