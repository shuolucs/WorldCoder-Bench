<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cell Mitosis Simulation</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    background: #0a0a1a; 
    color: #e0e0e0; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }
  #canvas-container { width: 100vw; height: 100vh; }
  canvas { display: block; }

  #ui-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  #stageInfo {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 180, 255, 0.3);
    border-radius: 16px;
    padding: 18px 32px;
    text-align: center;
    pointer-events: auto;
    backdrop-filter: blur(10px);
    min-width: 360px;
    box-shadow: 0 4px 30px rgba(0, 100, 255, 0.15);
  }
  #stageInfo h2 {
    font-size: 22px;
    margin-bottom: 6px;
    color: #7ec8ff;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  #stageInfo .stage-number {
    font-size: 12px;
    color: #888;
    margin-bottom: 8px;
  }
  #stageInfo p {
    font-size: 14px;
    color: #bbb;
    line-height: 1.5;
  }

  #controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    pointer-events: auto;
  }

  .ctrl-btn {
    background: rgba(20, 30, 60, 0.9);
    border: 1px solid rgba(100, 180, 255, 0.4);
    color: #7ec8ff;
    padding: 10px 22px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    backdrop-filter: blur(8px);
  }
  .ctrl-btn:hover {
    background: rgba(40, 60, 120, 0.9);
    border-color: rgba(100, 180, 255, 0.7);
    box-shadow: 0 0 15px rgba(100, 180, 255, 0.3);
  }
  .ctrl-btn:active {
    transform: scale(0.96);
  }
  .ctrl-btn.active {
    background: rgba(60, 100, 200, 0.7);
    border-color: #7ec8ff;
    box-shadow: 0 0 20px rgba(100, 180, 255, 0.4);
  }

  #progress-bar {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    pointer-events: auto;
  }
  .progress-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(100, 180, 255, 0.2);
    border: 1px solid rgba(100, 180, 255, 0.4);
    transition: all 0.3s;
  }
  .progress-dot.active {
    background: #7ec8ff;
    box-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
    transform: scale(1.3);
  }
  .progress-dot.completed {
    background: rgba(100, 180, 255, 0.5);
  }

  #stats-panel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.8);
    border: 1px solid rgba(100, 180, 255, 0.2);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 12px;
    pointer-events: auto;
    backdrop-filter: blur(8px);
  }
  #stats-panel div {
    margin: 4px 0;
    color: #999;
  }
  #stats-panel span {
    color: #7ec8ff;
    font-weight: 600;
  }
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="ui-overlay">
  <div id="stageInfo">
    <div class="stage-number">Stage 1 / 5</div>
    <h2>Interphase</h2>
    <p>The cell grows and DNA replicates. The nucleus is intact with visible nucleolus.</p>
  </div>

  <div id="stats-panel">
    <div>Cells: <span id="stat-cells">1</span></div>
    <div>Chromosomes: <span id="stat-chromo">4</span></div>
    <div>Time: <span id="stat-time">0.0s</span></div>
  </div>

  <div id="progress-bar">
    <div class="progress-dot active" data-stage="0"></div>
    <div class="progress-dot" data-stage="1"></div>
    <div class="progress-dot" data-stage="2"></div>
    <div class="progress-dot" data-stage="3"></div>
    <div class="progress-dot" data-stage="4"></div>
  </div>

  <div id="controls">
    <button class="ctrl-btn" id="prevStage">◀ Previous</button>
    <button class="ctrl-btn" id="autoPlay">▶ Auto Play</button>
    <button class="ctrl-btn" id="nextStage">Next ▶</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SETUP ============
const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x060612);
scene.fog = new THREE.FogExp2(0x060612, 0.015);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 3, 12);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxDistance = 30;
controls.minDistance = 5;

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0x334466, 0.8);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xaaccff, 1.5);
mainLight.position.set(5, 8, 5);
scene.add(mainLight);

const fillLight = new THREE.DirectionalLight(0xff8866, 0.4);
fillLight.position.set(-5, -3, -5);
scene.add(fillLight);

const pointLight = new THREE.PointLight(0x4488ff, 1, 30);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

// ============ STAGE DATA ============
const stageData = [
  {
    name: "Interphase",
    description: "The cell grows and DNA replicates. The nucleus is intact with a visible nucleolus. Organelles function normally.",
    chromosomeCount: 4,
    cellCount: 1
  },
  {
    name: "Prophase",
    description: "Chromosomes condense and become visible. The nuclear envelope begins to break down. Spindle fibers start forming.",
    chromosomeCount: 4,
    cellCount: 1
  },
  {
    name: "Metaphase",
    description: "Chromosomes align at the metaphase plate (cell equator). Spindle fibers attach to kinetochores of each chromosome.",
    chromosomeCount: 4,
    cellCount: 1
  },
  {
    name: "Anaphase",
    description: "Sister chromatids separate and move to opposite poles. The cell begins to elongate as spindle fibers shorten.",
    chromosomeCount: 8,
    cellCount: 1
  },
  {
    name: "Telophase",
    description: "Nuclear envelopes reform around each set of chromosomes. The cell pinches in the middle (cytokinesis), forming two daughter cells.",
    chromosomeCount: 4,
    cellCount: 2
  }
];

// ============ STATE ============
let currentStage = 0;
let autoPlaying = false;
let simTime = 0;
let stageTransition = 0; // 0-1 transition progress
let targetStage = 0;
let autoPlayTimer = 0;
const AUTO_PLAY_INTERVAL = 4.0; // seconds per stage

window.__3D_STATE__ = {
  currentStage: 0,
  stageName: "Interphase",
  autoPlaying: false,
  cellCount: 1,
  chromosomeCount: 4,
  simTime: 0
};

// ============ MATERIALS ============
const cellMembraneMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.15,
  roughness: 0.1,
  metalness: 0.0,
  transmission: 0.8,
  thickness: 0.5,
  side: THREE.DoubleSide,
  depthWrite: false
});

const cytoplasmMat = new THREE.MeshPhysicalMaterial({
  color: 0x446688,
  transparent: true,
  opacity: 0.05,
  roughness: 0.5,
  side: THREE.BackSide,
  depthWrite: false
});

const nucleusMat = new THREE.MeshPhysicalMaterial({
  color: 0x6644aa,
  transparent: true,
  opacity: 0.6,
  roughness: 0.3,
  metalness: 0.1,
  emissive: 0x221144,
  emissiveIntensity: 0.3
});

const nucleolusMat = new THREE.MeshStandardMaterial({
  color: 0x9966cc,
  emissive: 0x442266,
  emissiveIntensity: 0.5,
  roughness: 0.4
});

const chromosomeMat = new THREE.MeshStandardMaterial({
  color: 0xff6644,
  emissive: 0x882211,
  emissiveIntensity: 0.4,
  roughness: 0.5
});

const chromosomeMat2 = new THREE.MeshStandardMaterial({
  color: 0xff8844,
  emissive: 0x993311,
  emissiveIntensity: 0.4,
  roughness: 0.5
});

const organelleMat = new THREE.MeshStandardMaterial({
  color: 0x44aa88,
  emissive: 0x115533,
  emissiveIntensity: 0.3,
  roughness: 0.6
});

const organelleMat2 = new THREE.MeshStandardMaterial({
  color: 0xaa8844,
  emissive: 0x553311,
  emissiveIntensity: 0.3,
  roughness: 0.6
});

const spindleMat = new THREE.LineBasicMaterial({
  color: 0x88ff88,
  transparent: true,
  opacity: 0.4
});

const cleavageMat = new THREE.MeshStandardMaterial({
  color: 0xffaa44,
  emissive: 0x884411,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.6
});

// ============ CELL GROUP ============
const cellGroup = new THREE.Group();
scene.add(cellGroup);

// Cell membrane
const membraneGeo = new THREE.SphereGeometry(3, 64, 64);
const membrane = new THREE.Mesh(membraneGeo, cellMembraneMat.clone());
cellGroup.add(membrane);

// Inner glow
const innerGlowGeo = new THREE.SphereGeometry(2.9, 32, 32);
const innerGlow = new THREE.Mesh(innerGlowGeo, cytoplasmMat.clone());
cellGroup.add(innerGlow);

// Nucleus
const nucleusGeo = new THREE.SphereGeometry(1.2, 32, 32);
const nucleus = new THREE.Mesh(nucleusGeo, nucleusMat.clone());
cellGroup.add(nucleus);

// Nucleolus
const nucleolusGeo = new THREE.SphereGeometry(0.35, 16, 16);
const nucleolus = new THREE.Mesh(nucleolusGeo, nucleolusMat.clone());
cellGroup.add(nucleolus);

// Nuclear envelope fragments (for prophase)
const envelopeFragments = [];
for (let i = 0; i < 12; i++) {
  const fragGeo = new THREE.SphereGeometry(0.08 + Math.random() * 0.06, 8, 8);
  const frag = new THREE.Mesh(fragGeo, nucleusMat.clone());
  frag.userData.baseAngle = (i / 12) * Math.PI * 2;
  frag.userData.baseY = (Math.random() - 0.5) * 2;
  frag.visible = false;
  cellGroup.add(frag);
  envelopeFragments.push(frag);
}

// Chromosomes
const chromosomes = [];
const chromosomeGroup = new THREE.Group();
cellGroup.add(chromosomeGroup);

function createChromosome(color) {
  const group = new THREE.Group();
  
  // X-shaped chromosome using capsule-like cylinders
  const armGeo = new THREE.CapsuleGeometry(0.06, 0.35, 4, 8);
  const mat = color === 1 ? chromosomeMat.clone() : chromosomeMat2.clone();
  
  const arm1 = new THREE.Mesh(armGeo, mat);
  arm1.rotation.z = Math.PI / 6;
  group.add(arm1);
  
  const arm2 = new THREE.Mesh(armGeo, mat);
  arm2.rotation.z = -Math.PI / 6;
  group.add(arm2);
  
  // Centromere
  const centGeo = new THREE.SphereGeometry(0.07, 8, 8);
  const cent = new THREE.Mesh(centGeo, mat);
  group.add(cent);
  
  return group;
}

for (let i = 0; i < 8; i++) {
  const chromo = createChromosome(i % 2);
  chromo.visible = false;
  chromosomeGroup.add(chromo);
  chromosomes.push({
    mesh: chromo,
    basePos: new THREE.Vector3(),
    targetPos: new THREE.Vector3(),
    baseRot: new THREE.Euler()
  });
}

// Organelles
const organelles = [];
for (let i = 0; i < 20; i++) {
  const size = 0.08 + Math.random() * 0.12;
  let geo;
  const type = Math.random();
  if (type < 0.4) {
    // Mitochondria-like (elongated)
    geo = new THREE.CapsuleGeometry(size * 0.5, size * 1.5, 4, 8);
  } else if (type < 0.7) {
    // Ribosome-like (small sphere)
    geo = new THREE.SphereGeometry(size * 0.6, 8, 8);
  } else {
    // ER-like (torus)
    geo = new THREE.TorusGeometry(size * 0.7, size * 0.2, 8, 12);
  }
  
  const mat = i % 3 === 0 ? organelleMat2.clone() : organelleMat.clone();
  const org = new THREE.Mesh(geo, mat);
  
  // Random position inside cell
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 1.5 + Math.random() * 1.2;
  org.position.set(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
  org.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  
  org.userData.basePos = org.position.clone();
  org.userData.floatOffset = Math.random() * Math.PI * 2;
  org.userData.floatSpeed = 0.3 + Math.random() * 0.5;
  
  cellGroup.add(org);
  organelles.push(org);
}

// Spindle fibers
const spindleGroup = new THREE.Group();
cellGroup.add(spindleGroup);
const spindleLines = [];

function createSpindleFiber(from, to) {
  const points = [];
  const segments = 20;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const x = from.x + (to.x - from.x) * t;
    const y = from.y + (to.y - from.y) * t;
    const z = from.z + (to.z - from.z) * t;
    // Add slight curve
    const curve = Math.sin(t * Math.PI) * 0.15;
    points.push(new THREE.Vector3(x + curve * (Math.random() - 0.5), y, z + curve * (Math.random() - 0.5)));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const line = new THREE.Line(geo, spindleMat.clone());
  return line;
}

// Centrioles (poles)
const centrioleMat = new THREE.MeshStandardMaterial({
  color: 0x88ff88,
  emissive: 0x226622,
  emissiveIntensity: 0.5
});
const centrioleGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.3, 8);
const centriole1 = new THREE.Mesh(centrioleGeo, centrioleMat);
const centriole2 = new THREE.Mesh(centrioleGeo, centrioleMat);
centriole1.visible = false;
centriole2.visible = false;
cellGroup.add(centriole1);
cellGroup.add(centriole2);

// Cleavage furrow ring
const cleavageGeo = new THREE.TorusGeometry(3, 0.08, 8, 32);
const cleavageFurrow = new THREE.Mesh(cleavageGeo, cleavageMat.clone());
cleavageFurrow.rotation.x = Math.PI / 2;
cleavageFurrow.visible = false;
cellGroup.add(cleavageFurrow);

// Second cell (for telophase)
const cell2Group = new THREE.Group();
cell2Group.visible = false;
scene.add(cell2Group);

const membrane2 = new THREE.Mesh(membraneGeo.clone(), cellMembraneMat.clone());
cell2Group.add(membrane2);
const innerGlow2 = new THREE.Mesh(innerGlowGeo.clone(), cytoplasmMat.clone());
cell2Group.add(innerGlow2);
const nucleus2 = new THREE.Mesh(nucleusGeo.clone(), nucleusMat.clone());
cell2Group.add(nucleus2);
const nucleolus2 = new THREE.Mesh(nucleolusGeo.clone(), nucleolusMat.clone());
cell2Group.add(nucleolus2);

// Second cell organelles
const organelles2 = [];
for (let i = 0; i < 10; i++) {
  const size = 0.08 + Math.random() * 0.1;
  const type = Math.random();
  let geo;
  if (type < 0.4) {
    geo = new THREE.CapsuleGeometry(size * 0.5, size * 1.5, 4, 8);
  } else if (type < 0.7) {
    geo = new THREE.SphereGeometry(size * 0.6, 8, 8);
  } else {
    geo = new THREE.TorusGeometry(size * 0.7, size * 0.2, 8, 12);
  }
  const mat = i % 3 === 0 ? organelleMat2.clone() : organelleMat.clone();
  const org = new THREE.Mesh(geo, mat);
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 1.0 + Math.random() * 0.8;
  org.position.set(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta), r * Math.cos(phi));
  org.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  org.userData.floatOffset = Math.random() * Math.PI * 2;
  org.userData.floatSpeed = 0.3 + Math.random() * 0.5;
  cell2Group.add(org);
  organelles2.push(org);
}

// Second cell chromosomes
const chromosomes2 = [];
const chromosomeGroup2 = new THREE.Group();
cell2Group.add(chromosomeGroup2);
for (let i = 0; i < 4; i++) {
  const chromo = createChromosome(i % 2);
  chromo.visible = false;
  chromosomeGroup2.add(chromo);
  chromosomes2.push(chromo);
}

// ============ BACKGROUND PARTICLES ============
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 40;
  particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0x4466aa,
  size: 0.05,
  transparent: true,
  opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ STAGE UPDATE FUNCTIONS ============

function lerp(a, b, t) {
  return a + (b - a) * Math.max(0, Math.min(1, t));
}

function smoothstep(t) {
  t = Math.max(0, Math.min(1, t));
  return t * t * (3 - 2 * t);
}

function updateInterphase(t, time) {
  const s = smoothstep(t);
  
  // Cell membrane - normal sphere
  membrane.scale.setScalar(1);
  membrane.position.set(0, 0, 0);
  membrane.material.opacity = lerp(membrane.material.opacity, 0.15, 0.1);
  innerGlow.scale.setScalar(1);
  innerGlow.position.set(0, 0, 0);
  
  // Nucleus visible and intact
  nucleus.visible = true;
  nucleus.scale.setScalar(lerp(0.5, 1, s));
  nucleus.material.opacity = lerp(0.2, 0.6, s);
  nucleus.position.set(0, 0, 0);
  
  // Nucleolus visible
  nucleolus.visible = true;
  nucleolus.scale.setScalar(lerp(0.3, 1, s));
  nucleolus.position.set(0.2, 0.1, 0);
  
  // No chromosomes visible (DNA is diffuse)
  chromosomes.forEach(c => c.mesh.visible = false);
  
  // Envelope fragments hidden
  envelopeFragments.forEach(f => f.visible = false);
  
  // Spindle hidden
  spindleGroup.children.forEach(c => c.visible = false);
  centriole1.visible = false;
  centriole2.visible = false;
  
  // Cleavage furrow hidden
  cleavageFurrow.visible = false;
  
  // Second cell hidden
  cell2Group.visible = false;
  
  // Organelles float gently
  organelles.forEach((org, i) => {
    const base = org.userData.basePos;
    const offset = org.userData.floatOffset;
    const speed = org.userData.floatSpeed;
    org.position.set(
      base.x + Math.sin(time * speed + offset) * 0.1,
      base.y + Math.cos(time * speed * 0.7 + offset) * 0.1,
      base.z + Math.sin(time * speed * 0.5 + offset + 1) * 0.1
    );
    org.rotation.y += 0.002;
  });
  
  // Nucleus gentle pulse
  const pulse = 1 + Math.sin(time * 1.5) * 0.03;
  nucleus.scale.multiplyScalar(pulse);
}

function updateProphase(t, time) {
  const s = smoothstep(t);
  
  membrane.scale.setScalar(1);
  membrane.position.set(0, 0, 0);
  innerGlow.scale.setScalar(1);
  innerGlow.position.set(0, 0, 0);
  
  // Nuclear envelope dissolving
  nucleus.visible = true;
  nucleus.scale.setScalar(lerp(1, 0.3, s));
  nucleus.material.opacity = lerp(0.6, 0.05, s);
  nucleus.position.set(0, 0, 0);
  
  // Nucleolus disappearing
  nucleolus.visible = true;
  nucleolus.scale.setScalar(lerp(1, 0.1, s));
  nucleolus.material.opacity = lerp(1, 0, s);
  
  // Envelope fragments appear
  envelopeFragments.forEach((frag, i) => {
    frag.visible = s > 0.3;
    const angle = frag.userData.baseAngle + time * 0.3;
    const r = lerp(1.2, 1.8, s) + Math.sin(time + i) * 0.1;
    const y = frag.userData.baseY * lerp(0.5, 1.2, s);
    frag.position.set(Math.cos(angle) * r, y, Math.sin(angle) * r);
    frag.material.opacity = lerp(0, 0.4, (s - 0.3) / 0.7);
  });
  
  // Chromosomes condense and become visible
  for (let i = 0; i < 4; i++) {
    const chromo = chromosomes[i];
    chromo.mesh.visible = s > 0.2;
    
    const angle = (i / 4) * Math.PI * 2 + time * 0.2;
    const r = lerp(0.3, 0.7, s);
    chromo.mesh.position.set(
      Math.cos(angle) * r,
      (Math.sin(angle * 2) * 0.3),
      Math.sin(angle) * r
    );
    chromo.mesh.scale.setScalar(lerp(0.3, 1.2, s));
    chromo.mesh.rotation.z = angle;
    chromo.mesh.rotation.y = time * 0.5;
  }
  // Hide extra chromosomes
  for (let i = 4; i < 8; i++) {
    chromosomes[i].mesh.visible = false;
  }
  
  // Centrioles start appearing at poles
  centriole1.visible = s > 0.5;
  centriole2.visible = s > 0.5;
  const poleD = lerp(0, 2.5, Math.max(0, (s - 0.5) * 2));
  centriole1.position.set(0, poleD, 0);
  centriole2.position.set(0, -poleD, 0);
  
  spindleGroup.children.forEach(c => c.visible = false);
  cleavageFurrow.visible = false;
  cell2Group.visible = false;
  
  organelles.forEach((org, i) => {
    const base = org.userData.basePos;
    const offset = org.userData.floatOffset;
    const speed = org.userData.floatSpeed;
    org.position.set(
      base.x + Math.sin(time * speed + offset) * 0.15,
      base.y + Math.cos(time * speed * 0.7 + offset) * 0.15,
      base.z + Math.sin(time * speed * 0.5 + offset + 1) * 0.15
    );
  });
}

function updateMetaphase(t, time) {
  const s = smoothstep(t);
  
  membrane.scale.setScalar(1);
  membrane.position.set(0, 0, 0);
  innerGlow.scale.setScalar(1);
  innerGlow.position.set(0, 0, 0);
  
  // Nucleus gone
  nucleus.visible = false;
  nucleolus.visible = false;
  envelopeFragments.forEach(f => f.visible = false);
  
  // Chromosomes align at equator (y=0)
  for (let i = 0; i < 4; i++) {
    const chromo = chromosomes[i];
    chromo.mesh.visible = true;
    
    const angle = (i / 4) * Math.PI * 2;
    const r = 0.4 + i * 0.15;
    const targetY = 0;
    const currentY = chromo.mesh.position.y;
    
    chromo.mesh.position.set(
      Math.cos(angle + time * 0.3) * r,
      lerp(currentY, targetY, s) + Math.sin(time * 2 + i) * 0.02,
      Math.sin(angle + time * 0.3) * r
    );
    chromo.mesh.scale.setScalar(1.2);
    chromo.mesh.rotation.x = Math.PI / 2; // Align flat
    chromo.mesh.rotation.y = angle + time * 0.3;
  }
  for (let i = 4; i < 8; i++) {
    chromosomes[i].mesh.visible = false;
  }
  
  // Centrioles at poles
  centriole1.visible = true;
  centriole2.visible = true;
  centriole1.position.set(0, 2.5, 0);
  centriole2.position.set(0, -2.5, 0);
  
  // Spindle fibers
  // Remove old spindles
  while (spindleGroup.children.length > 0) {
    const child = spindleGroup.children[0];
    child.geometry.dispose();
    spindleGroup.remove(child);
  }
  
  if (s > 0.2) {
    for (let i = 0; i < 4; i++) {
      const chromoPos = chromosomes[i].mesh.position;
      const fiber1 = createSpindleFiber(
        new THREE.Vector3(0, 2.5, 0),
        chromoPos
      );
      const fiber2 = createSpindleFiber(
        new THREE.Vector3(0, -2.5, 0),
        chromoPos
      );
      fiber1.material.opacity = lerp(0, 0.4, (s - 0.2) / 0.8);
      fiber2.material.opacity = lerp(0, 0.4, (s - 0.2) / 0.8);
      spindleGroup.add(fiber1);
      spindleGroup.add(fiber2);
    }
  }
  
  cleavageFurrow.visible = false;
  cell2Group.visible = false;
  
  organelles.forEach((org, i) => {
    const base = org.userData.basePos;
    const offset = org.userData.floatOffset;
    const speed = org.userData.floatSpeed;
    org.position.set(
      base.x + Math.sin(time * speed + offset) * 0.1,
      base.y + Math.cos(time * speed * 0.7 + offset) * 0.1,
      base.z + Math.sin(time * speed * 0.5 + offset + 1) * 0.1
    );
  });
}

function updateAnaphase(t, time) {
  const s = smoothstep(t);
  
  // Cell starts elongating
  const elongation = lerp(1, 1.4, s);
  membrane.scale.set(lerp(1, 0.85, s), elongation, lerp(1, 0.85, s));
  membrane.position.set(0, 0, 0);
  innerGlow.scale.copy(membrane.scale);
  innerGlow.position.set(0, 0, 0);
  
  nucleus.visible = false;
  nucleolus.visible = false;
  envelopeFragments.forEach(f => f.visible = false);
  
  // Chromatids separate - 4 go up, 4 go down
  const separation = lerp(0, 2.0, s);
  for (let i = 0; i < 4; i++) {
    const chromo = chromosomes[i];
    chromo.mesh.visible = true;
    const angle = (i / 4) * Math.PI * 2;
    const r = 0.3 + i * 0.1;
    chromo.mesh.position.set(
      Math.cos(angle) * r,
      separation + Math.sin(time * 2 + i) * 0.02,
      Math.sin(angle) * r
    );
    chromo.mesh.scale.setScalar(lerp(1.2, 0.9, s));
    chromo.mesh.rotation.x = Math.PI / 2;
    chromo.mesh.rotation.y = angle;
  }
  for (let i = 4; i < 8; i++) {
    const chromo = chromosomes[i];
    chromo.mesh.visible = true;
    const angle = ((i - 4) / 4) * Math.PI * 2 + 0.3;
    const r = 0.3 + (i - 4) * 0.1;
    chromo.mesh.position.set(
      Math.cos(angle) * r,
      -separation + Math.sin(time * 2 + i) * 0.02,
      Math.sin(angle) * r
    );
    chromo.mesh.scale.setScalar(lerp(0.3, 0.9, s));
    chromo.mesh.rotation.x = Math.PI / 2;
    chromo.mesh.rotation.y = angle;
  }
  
  // Centrioles at poles, moving further apart
  centriole1.visible = true;
  centriole2.visible = true;
  const poleY = lerp(2.5, 3.5, s);
  centriole1.position.set(0, poleY, 0);
  centriole2.position.set(0, -poleY, 0);
  
  // Update spindle fibers
  while (spindleGroup.children.length > 0) {
    const child = spindleGroup.children[0];
    child.geometry.dispose();
    spindleGroup.remove(child);
  }
  
  for (let i = 0; i < 4; i++) {
    const fiber = createSpindleFiber(
      centriole1.position,
      chromosomes[i].mesh.position
    );
    fiber.material.opacity = lerp(0.4, 0.2, s);
    spindleGroup.add(fiber);
  }
  for (let i = 4; i < 8; i++) {
    const fiber = createSpindleFiber(
      centriole2.position,
      chromosomes[i].mesh.position
    );
    fiber.material.opacity = lerp(0.4, 0.2, s);
    spindleGroup.add(fiber);
  }
  
  // Cleavage furrow starts
  cleavageFurrow.visible = s > 0.5;
  const furrowScale = lerp(1, 0.7, Math.max(0, (s - 0.5) * 2));
  cleavageFurrow.scale.set(lerp(1, 0.85, s), 1, lerp(1, 0.85, s));
  cleavageFurrow.material.opacity = lerp(0, 0.6, Math.max(0, (s - 0.5) * 2));
  
  cell2Group.visible = false;
  
  // Organelles shift toward poles
  organelles.forEach((org, i) => {
    const base = org.userData.basePos;
    const offset = org.userData.floatOffset;
    const speed = org.userData.floatSpeed;
    const poleShift = (i < 10 ? 1 : -1) * separation * 0.3;
    org.position.set(
      base.x + Math.sin(time * speed + offset) * 0.1,
      base.y + poleShift + Math.cos(time * speed * 0.7 + offset) * 0.1,
      base.z + Math.sin(time * speed * 0.5 + offset + 1) * 0.1
    );
  });
}

function updateTelophase(t, time) {
  const s = smoothstep(t);
  
  // Cell pinches and separates into two
  const separation = lerp(0, 3.5, s);
  const cellScale = lerp(1, 0.65, s);
  
  // First cell moves up
  membrane.scale.set(lerp(0.85, cellScale, s), lerp(1.4, cellScale, s), lerp(0.85, cellScale, s));
  membrane.position.set(0, separation, 0);
  innerGlow.scale.copy(membrane.scale);
  innerGlow.position.copy(membrane.position);
  
  // Nucleus reforms in first cell
  nucleus.visible = true;
  nucleus.scale.setScalar(lerp(0.1, 0.7, s));
  nucleus.material.opacity = lerp(0.05, 0.5, s);
  nucleus.position.set(0, separation, 0);
  
  nucleolus.visible = s > 0.5;
  nucleolus.scale.setScalar(lerp(0, 0.5, Math.max(0, (s - 0.5) * 2)));
  nucleolus.position.set(0.1, separation + 0.05, 0);
  
  // Chromosomes decondense in first cell
  for (let i = 0; i < 4; i++) {
    const chromo = chromosomes[i];
    chromo.mesh.visible = s < 0.8;
    const angle = (i / 4) * Math.PI * 2;
    const r = lerp(0.3, 0.15, s);
    chromo.mesh.position.set(
      Math.cos(angle) * r,
      separation + Math.sin(time + i) * 0.02,
      Math.sin(angle) * r
    );
    chromo.mesh.scale.setScalar(lerp(0.9, 0.3, s));
  }
  for (let i = 4; i < 8; i++) {
    chromosomes[i].mesh.visible = false;
  }
  
  // Spindle disappears
  while (spindleGroup.children.length > 0) {
    const child = spindleGroup.children[0];
    child.geometry.dispose();
    spindleGroup.remove(child);
  }
  centriole1.visible = s < 0.5;
  centriole2.visible = s < 0.5;
  centriole1.position.set(0, separation + 1.5, 0);
  centriole2.position.set(0, -separation - 1.5, 0);
  
  envelopeFragments.forEach(f => f.visible = false);
  
  // Cleavage furrow
  cleavageFurrow.visible = s < 0.7;
  cleavageFurrow.scale.set(lerp(0.7, 0.05, s), 1, lerp(0.7, 0.05, s));
  cleavageFurrow.material.opacity = lerp(0.6, 0, s);
  
  // Second cell appears
  cell2Group.visible = true;
  cell2Group.position.set(0, -separation, 0);
  membrane2.scale.setScalar(cellScale);
  innerGlow2.scale.setScalar(cellScale);
  nucleus2.scale.setScalar(lerp(0.1, 0.7, s));
  nucleus2.material.opacity = lerp(0.05, 0.5, s);
  nucleolus2.visible = s > 0.5;
  nucleolus2.scale.setScalar(lerp(0, 0.5, Math.max(0, (s - 0.5) * 2)));
  nucleolus2.position.set(-0.1, 0.05, 0);
  
  // Second cell chromosomes
  for (let i = 0; i < 4; i++) {
    chromosomes2[i].visible = s < 0.8;
    const angle = (i / 4) * Math.PI * 2 + 0.5;
    const r = lerp(0.3, 0.15, s);
    chromosomes2[i].position.set(
      Math.cos(angle) * r,
      Math.sin(time + i) * 0.02,
      Math.sin(angle) * r
    );
    chromosomes2[i].scale.setScalar(lerp(0.9, 0.3, s));
  }
  
  // Organelles split between cells
  organelles.forEach((org, i) => {
    const base = org.userData.basePos;
    const offset = org.userData.floatOffset;
    const speed = org.userData.floatSpeed;
    const targetY = (i < 10 ? separation : -separation * 0.3);
    org.position.set(
      base.x * cellScale + Math.sin(time * speed + offset) * 0.08,
      lerp(base.y, targetY, s) + Math.cos(time * speed * 0.7 + offset) * 0.08,
      base.z * cellScale + Math.sin(time * speed * 0.5 + offset + 1) * 0.08
    );
  });
  
  organelles2.forEach((org, i) => {
    org.position.y += Math.sin(time * 0.5 + i) * 0.002;
  });
}

// ============ UI ============
const stageInfoEl = document.getElementById('stageInfo');
const prevBtn = document.getElementById('prevStage');
const nextBtn = document.getElementById('nextStage');
const autoPlayBtn = document.getElementById('autoPlay');
const progressDots = document.querySelectorAll('.progress-dot');

function updateUI() {
  const data = stageData[currentStage];
  stageInfoEl.innerHTML = `
    <div class="stage-number">Stage ${currentStage + 1} / 5</div>
    <h2>${data.name}</h2>
    <p>${data.description}</p>
  `;
  
  progressDots.forEach((dot, i) => {
    dot.classList.remove('active', 'completed');
    if (i === currentStage) dot.classList.add('active');
    else if (i < currentStage) dot.classList.add('completed');
  });
  
  document.getElementById('stat-cells').textContent = data.cellCount;
  document.getElementById('stat-chromo').textContent = data.chromosomeCount;
  
  autoPlayBtn.textContent = autoPlaying ? '⏸ Pause' : '▶ Auto Play';
  autoPlayBtn.classList.toggle('active', autoPlaying);
}

function setStage(stage) {
  currentStage = Math.max(0, Math.min(4, stage));
  stageTransition = 0;
  targetStage = currentStage;
  autoPlayTimer = 0;
  updateUI();
}

prevBtn.addEventListener('click', () => {
  if (currentStage > 0) setStage(currentStage - 1);
});

nextBtn.addEventListener('click', () => {
  if (currentStage < 4) setStage(currentStage + 1);
});

autoPlayBtn.addEventListener('click', () => {
  autoPlaying = !autoPlaying;
  autoPlayTimer = 0;
  updateUI();
});

progressDots.forEach(dot => {
  dot.addEventListener('click', () => {
    const stage = parseInt(dot.dataset.stage);
    setStage(stage);
  });
  dot.style.cursor = 'pointer';
  dot.style.pointerEvents = 'auto';
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  simTime += delta;
  
  // Transition progress
  stageTransition = Math.min(1, stageTransition + delta * 0.8);
  
  // Auto play
  if (autoPlaying) {
    autoPlayTimer += delta;
    if (autoPlayTimer >= AUTO_PLAY_INTERVAL) {
      autoPlayTimer = 0;
      if (currentStage < 4) {
        setStage(currentStage + 1);
      } else {
        // Loop back
        setStage(0);
      }
    }
  }
  
  // Update stage visuals
  switch (currentStage) {
    case 0: updateInterphase(stageTransition, simTime); break;
    case 1: updateProphase(stageTransition, simTime); break;
    case 2: updateMetaphase(stageTransition, simTime); break;
    case 3: updateAnaphase(stageTransition, simTime); break;
    case 4: updateTelophase(stageTransition, simTime); break;
  }
  
  // Gentle cell rotation
  cellGroup.rotation.y += 0.001;
  if (cell2Group.visible) {
    cell2Group.rotation.y = cellGroup.rotation.y;
  }
  
  // Background particles
  particles.rotation.y += 0.0002;
  particles.rotation.x += 0.0001;
  
  // Point light follows cell
  pointLight.position.set(
    Math.sin(simTime * 0.5) * 2,
    Math.cos(simTime * 0.3) * 1,
    Math.cos(simTime * 0.5) * 2
  );
  
  // Update stats
  document.getElementById('stat-time').textContent = simTime.toFixed(1) + 's';
  
  // Update global state
  const data = stageData[currentStage];
  window.__3D_STATE__ = {
    currentStage: currentStage,
    stageName: data.name,
    autoPlaying: autoPlaying,
    cellCount: data.cellCount,
    chromosomeCount: data.chromosomeCount,
    simTime: parseFloat(simTime.toFixed(2))
  };
  
  controls.update();
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
updateUI();
animate();
</script>
