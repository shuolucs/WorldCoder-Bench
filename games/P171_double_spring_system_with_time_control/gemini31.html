<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Double-Spring Physics Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: monospace;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        button {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid #333;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        button:hover {
            background: rgba(255, 255, 255, 1);
        }
        #hud {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            color: #00FF00;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            min-width: 200px;
            line-height: 1.5;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <button id="btn-pause">Pause/Resume</button>
        <button id="btn-slow">Slow Motion</button>
        <button id="btn-normal">Normal Speed</button>
        <button id="btn-reset">Reset</button>
    </div>
    <div id="hud"></div>
    <div id="instructions">
        Keyboard Controls:<br>
        [D] - Downward impulse to Mass A (-5 m/s)<br>
        [U] - Upward impulse to Mass B (+5 m/s)<br>
        [R] - Reset System
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            paused: false,
            timeScale: 1.0,
            massA_y: 4.0,
            massB_y: 2.0,
            massA_vy: 0.0,
            massB_vy: 0.0,
            totalEnergy: 0.0,
            simTime: 0.0,
            modelLoaded: false,
            impulseAppliedA: 0,
            impulseAppliedB: 0,
            resetCount: 0
        };

        // Physics Constants
        const g = 9.81;
        const anchorPos = new THREE.Vector3(-4, 6, 0);
        
        const mA = 2.0;
        const mB = 1.5;
        
        const k1 = 30.0;
        const rest1 = 1.5;
        const damp1 = 0.3;
        
        const k2 = 20.0;
        const rest2 = 1.5;
        const damp2 = 0.2;

        const fixedDt = 1 / 60;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground & Grid
        const groundGeo = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(50, 50);
        scene.add(gridHelper);

        // 3D Model (Michelle)
        let mixer;
        const clock = new THREE.Clock();
        const loader = new GLTFLoader();
        loader.load('https://unpkg.com/three@0.160.0/examples/models/gltf/Michelle.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.015, 0.015, 0.015);
            model.position.set(0, 0, -3);
            scene.add(model);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
            window.__3D_STATE__.modelLoaded = true;
        });

        // Double Spring System Visuals
        const anchorGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const anchorMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const anchorMesh = new THREE.Mesh(anchorGeo, anchorMat);
        anchorMesh.position.copy(anchorPos);
        scene.add(anchorMesh);

        const massAGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const massAMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const massAMesh = new THREE.Mesh(massAGeo, massAMat);
        scene.add(massAMesh);

        const massBGeo = new THREE.SphereGeometry(0.4, 32, 32);
        const massBMat = new THREE.MeshStandardMaterial({ color: 0x00ff00 });
        const massBMesh = new THREE.Mesh(massBGeo, massBMat);
        scene.add(massBMesh);

        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        
        const geo1 = new THREE.BufferGeometry().setFromPoints([anchorPos, new THREE.Vector3()]);
        const spring1Line = new THREE.Line(geo1, lineMat);
        scene.add(spring1Line);

        const geo2 = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const spring2Line = new THREE.Line(geo2, lineMat);
        scene.add(spring2Line);

        // Reset Function
        function resetSystem() {
            window.__3D_STATE__.massA_y = 4.0;
            window.__3D_STATE__.massB_y = 2.0;
            window.__3D_STATE__.massA_vy = 0.0;
            window.__3D_STATE__.massB_vy = 0.0;
            window.__3D_STATE__.simTime = 0.0;
            window.__3D_STATE__.resetCount++;
        }

        // UI Event Listeners
        document.getElementById('btn-pause').addEventListener('click', () => {
            window.__3D_STATE__.paused = !window.__3D_STATE__.paused;
        });
        document.getElementById('btn-slow').addEventListener('click', () => {
            window.__3D_STATE__.timeScale = 0.25;
        });
        document.getElementById('btn-normal').addEventListener('click', () => {
            window.__3D_STATE__.timeScale = 1.0;
        });
        document.getElementById('btn-reset').addEventListener('click', resetSystem);

        // Keyboard Event Listeners
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'd') {
                window.__3D_STATE__.massA_vy -= 5.0;
                window.__3D_STATE__.impulseAppliedA++;
            } else if (key === 'u') {
                window.__3D_STATE__.massB_vy += 5.0;
                window.__3D_STATE__.impulseAppliedB++;
            } else if (key === 'r') {
                resetSystem();
            }
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Physics Step
        function updatePhysics() {
            if (window.__3D_STATE__.paused) return;

            const dt = fixedDt * window.__3D_STATE__.timeScale;
            let yA = window.__3D_STATE__.massA_y;
            let yB = window.__3D_STATE__.massB_y;
            let vyA = window.__3D_STATE__.massA_vy;
            let vyB = window.__3D_STATE__.massB_vy;

            // Forces on A
            const stretch1 = anchorPos.y - yA;
            const fs1 = k1 * (stretch1 - rest1);
            const fd1 = -damp1 * vyA;
            
            const stretch2 = yA - yB;
            const fs2 = k2 * (stretch2 - rest2);
            const fd2 = -damp2 * (vyA - vyB);

            const fgA = -mA * g;
            const forceA = fgA + fs1 + fd1 - fs2 - fd2;

            // Forces on B
            const fgB = -mB * g;
            const forceB = fgB + fs2 + fd2;

            // Semi-implicit Euler Integration
            vyA += (forceA / mA) * dt;
            vyB += (forceB / mB) * dt;

            yA += vyA * dt;
            yB += vyB * dt;

            // Constraints (Clamp)
            if (yA > anchorPos.y) { yA = anchorPos.y; vyA = 0; }
            if (yA < -5) { yA = -5; vyA = 0; }
            
            if (yB > anchorPos.y) { yB = anchorPos.y; vyB = 0; }
            if (yB < -5) { yB = -5; vyB = 0; }

            // Update State
            window.__3D_STATE__.massA_y = yA;
            window.__3D_STATE__.massB_y = yB;
            window.__3D_STATE__.massA_vy = vyA;
            window.__3D_STATE__.massB_vy = vyB;
            window.__3D_STATE__.simTime += dt;

            // Energy Calculation
            const ke = 0.5 * mA * vyA * vyA + 0.5 * mB * vyB * vyB;
            const pe_g = mA * g * yA + mB * g * yB;
            const pe_s = 0.5 * k1 * Math.pow(anchorPos.y - yA - rest1, 2) + 0.5 * k2 * Math.pow(yA - yB - rest2, 2);
            window.__3D_STATE__.totalEnergy = ke + pe_g + pe_s;
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            updatePhysics();

            // Update Visuals
            const yA = window.__3D_STATE__.massA_y;
            const yB = window.__3D_STATE__.massB_y;

            massAMesh.position.set(-4, yA, 0);
            massBMesh.position.set(-4, yB, 0);

            const pos1 = spring1Line.geometry.attributes.position.array;
            pos1[0] = -4; pos1[1] = anchorPos.y; pos1[2] = 0;
            pos1[3] = -4; pos1[4] = yA; pos1[5] = 0;
            spring1Line.geometry.attributes.position.needsUpdate = true;

            const pos2 = spring2Line.geometry.attributes.position.array;
            pos2[0] = -4; pos2[1] = yA; pos2[2] = 0;
            pos2[3] = -4; pos2[4] = yB; pos2[5] = 0;
            spring2Line.geometry.attributes.position.needsUpdate = true;

            // Update HUD
            document.getElementById('hud').innerHTML = `
                <b>Simulation HUD</b><br>
                Status: ${window.__3D_STATE__.paused ? 'PAUSED' : 'RUNNING'}<br>
                Time Scale: ${window.__3D_STATE__.timeScale}x<br>
                Mass A Y: ${yA.toFixed(2)} m<br>
                Mass B Y: ${yB.toFixed(2)} m<br>
                Total Energy: ${window.__3D_STATE__.totalEnergy.toFixed(2)} J<br>
                Sim Time: ${window.__3D_STATE__.simTime.toFixed(2)} s
            `;

            renderer.render(scene, camera);
        }

        // Initialize positions before first frame
        resetSystem();
        animate();
    </script>
</body>
</html>
