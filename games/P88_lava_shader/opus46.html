<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Lava Shader</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(255,100,0,0.3);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    width: 280px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }
  #controls h2 {
    margin-bottom: 16px;
    font-size: 16px;
    color: #ff6600;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .control-group {
    margin-bottom: 12px;
  }
  .control-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    color: #ccc;
  }
  .control-group label span.val {
    color: #ff8800;
    font-weight: bold;
  }
  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(90deg, #331100, #ff6600);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ff8800;
    border: 2px solid #fff;
    cursor: pointer;
  }
  #fps-display {
    text-align: center;
    margin-top: 12px;
    font-size: 12px;
    color: #888;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="controls">
  <h2>🌋 Lava Controls</h2>
  <div class="control-group">
    <label>Noise Scale <span class="val" id="noiseScaleVal">3.0</span></label>
    <input type="range" id="noiseScale" min="1" max="10" step="0.1" value="3.0">
  </div>
  <div class="control-group">
    <label>Speed <span class="val" id="speedVal">1.0</span></label>
    <input type="range" id="speed" min="0.1" max="3.0" step="0.1" value="1.0">
  </div>
  <div class="control-group">
    <label>Color Intensity <span class="val" id="intensityVal">1.0</span></label>
    <input type="range" id="intensity" min="0.5" max="2.0" step="0.1" value="1.0">
  </div>
  <div class="control-group">
    <label>Displacement <span class="val" id="displacementVal">0.5</span></label>
    <input type="range" id="displacement" min="0" max="2.0" step="0.1" value="0.5">
  </div>
  <div class="control-group">
    <label>Bloom Strength <span class="val" id="bloomStrengthVal">1.5</span></label>
    <input type="range" id="bloomStrength" min="0" max="3" step="0.1" value="1.5">
  </div>
  <div class="control-group">
    <label>Bloom Threshold <span class="val" id="bloomThresholdVal">0.3</span></label>
    <input type="range" id="bloomThreshold" min="0" max="1" step="0.05" value="0.3">
  </div>
  <div id="fps-display">FPS: --</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

// ============ GLSL Noise (Simplex 3D) ============
const snoiseGLSL = `
vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
vec4 permute(vec4 x) { return mod289(((x*34.0)+10.0)*x); }
vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

float snoise(vec3 v) {
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);

  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);

  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;

  i = mod289(i);
  vec4 p = permute(permute(permute(
    i.z + vec4(0.0, i1.z, i2.z, 1.0))
  + i.y + vec4(0.0, i1.y, i2.y, 1.0))
  + i.x + vec4(0.0, i1.x, i2.x, 1.0));

  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;

  vec4 j = p - 49.0 * floor(p * ns.z * ns.z);

  vec4 x_ = floor(j * ns.z);
  vec4 y_ = floor(j - 7.0 * x_);

  vec4 x = x_ * ns.x + ns.yyyy;
  vec4 y = y_ * ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);

  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);

  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));

  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;

  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);

  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x;
  p1 *= norm.y;
  p2 *= norm.z;
  p3 *= norm.w;

  vec4 m = max(0.5 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m * m;
  return 105.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
`;

// ============ Vertex Shader ============
const vertexShader = `
${snoiseGLSL}

uniform float time;
uniform float noiseScale;
uniform float displacement;

varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vDisp;

void main() {
  vec3 pos = position;
  float eps = 0.01;

  // Compute noise displacement
  float n = snoise(pos * noiseScale + time * 0.5);
  float disp = displacement * n;

  // Displaced position
  vec3 displacedPos = pos + normal * disp;

  // Estimate displaced normal via finite differences
  // Compute tangent and bitangent in local space
  vec3 tangent1 = normalize(cross(normal, vec3(0.0, 1.0, 0.0)));
  if(length(cross(normal, vec3(0.0, 1.0, 0.0))) < 0.001) {
    tangent1 = normalize(cross(normal, vec3(1.0, 0.0, 0.0)));
  }
  vec3 tangent2 = normalize(cross(normal, tangent1));

  // Neighbor positions
  vec3 posT1 = pos + tangent1 * eps;
  vec3 posT2 = pos + tangent2 * eps;

  float nT1 = snoise(posT1 * noiseScale + time * 0.5);
  float nT2 = snoise(posT2 * noiseScale + time * 0.5);

  vec3 dispT1 = posT1 + normal * displacement * nT1;
  vec3 dispT2 = posT2 + normal * displacement * nT2;

  vec3 newTangent1 = dispT1 - displacedPos;
  vec3 newTangent2 = dispT2 - displacedPos;
  vec3 newNormal = normalize(cross(newTangent1, newTangent2));

  vNormal = normalize(normalMatrix * newNormal);
  vWorldPos = (modelMatrix * vec4(displacedPos, 1.0)).xyz;
  vDisp = n;

  gl_Position = projectionMatrix * modelViewMatrix * vec4(displacedPos, 1.0);
}
`;

// ============ Fragment Shader ============
const fragmentShader = `
${snoiseGLSL}

uniform float time;
uniform float noiseScale;
uniform float speed;
uniform float colorIntensity;

varying vec3 vWorldPos;
varying vec3 vNormal;
varying float vDisp;

vec3 colorRamp(float t) {
  t = clamp(t, 0.0, 1.0);
  if(t < 0.25) {
    float f = t / 0.25;
    return mix(vec3(0.1, 0.0, 0.0), vec3(0.8, 0.0, 0.0), f);
  } else if(t < 0.5) {
    float f = (t - 0.25) / 0.25;
    return mix(vec3(0.8, 0.0, 0.0), vec3(1.0, 0.5, 0.0), f);
  } else if(t < 0.75) {
    float f = (t - 0.5) / 0.25;
    return mix(vec3(1.0, 0.5, 0.0), vec3(1.0, 1.0, 0.0), f);
  } else {
    float f = (t - 0.75) / 0.25;
    return mix(vec3(1.0, 1.0, 0.0), vec3(1.0, 1.0, 1.0), f);
  }
}

void main() {
  float layer1 = snoise(vWorldPos * noiseScale * 2.0 + time * speed * 0.3);
  float layer2 = snoise(vWorldPos * noiseScale * 4.0 - time * speed * 0.2);
  float combined = (layer1 + layer2 * 0.5) * 0.667;
  float t = combined * 0.5 + 0.5; // map to [0,1]

  vec3 color = colorRamp(t);

  // Simple rim-like enhancement based on normal
  color *= colorIntensity;

  gl_FragColor = vec4(color, 1.0);
}
`;

// ============ Scene Setup ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ============ Lava Object ============
const uniforms = {
  time: { value: 0.0 },
  noiseScale: { value: 3.0 },
  speed: { value: 1.0 },
  colorIntensity: { value: 1.0 },
  displacement: { value: 0.5 }
};

const lavaMaterial = new THREE.ShaderMaterial({
  uniforms: uniforms,
  vertexShader: vertexShader,
  fragmentShader: fragmentShader,
  side: THREE.DoubleSide
});

const geometry = new THREE.TorusKnotGeometry(1, 0.4, 256, 64);
const lavaMesh = new THREE.Mesh(geometry, lavaMaterial);
scene.add(lavaMesh);

// ============ Starfield ============
const starCount = 500;
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 50 + Math.random() * 50;
  starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3, sizeAttenuation: true });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// ============ Post Processing ============
const composer = new EffectComposer(renderer);
const renderPass = new RenderPass(scene, camera);
composer.addPass(renderPass);

const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  1.5,  // strength
  0.5,  // radius
  0.3   // threshold
);
composer.addPass(bloomPass);

// ============ UI Controls ============
function setupSlider(id, uniform, valId) {
  const slider = document.getElementById(id);
  const valDisplay = document.getElementById(valId);
  slider.addEventListener('input', () => {
    const v = parseFloat(slider.value);
    if (uniform) {
      uniforms[uniform].value = v;
    }
    valDisplay.textContent = v.toFixed(1);
  });
}

setupSlider('noiseScale', 'noiseScale', 'noiseScaleVal');
setupSlider('speed', 'speed', 'speedVal');
setupSlider('intensity', 'colorIntensity', 'intensityVal');
setupSlider('displacement', 'displacement', 'displacementVal');

document.getElementById('bloomStrength').addEventListener('input', (e) => {
  bloomPass.strength = parseFloat(e.target.value);
  document.getElementById('bloomStrengthVal').textContent = parseFloat(e.target.value).toFixed(1);
});

document.getElementById('bloomThreshold').addEventListener('input', (e) => {
  bloomPass.threshold = parseFloat(e.target.value);
  document.getElementById('bloomThresholdVal').textContent = parseFloat(e.target.value).toFixed(2);
});

// ============ FPS Counter ============
let frameCount = 0;
let lastFpsTime = performance.now();
let currentFps = 0;

// ============ State ============
window.__3D_STATE__ = {};

// ============ Resize ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ============ Animation Loop ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  uniforms.time.value += delta;

  // Rotate lava mesh
  lavaMesh.rotation.y += 0.005;

  controls.update();
  composer.render();

  // FPS
  frameCount++;
  const now = performance.now();
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
    document.getElementById('fps-display').textContent = `FPS: ${currentFps}`;
  }

  // Update state
  window.__3D_STATE__ = {
    noiseScale: uniforms.noiseScale.value,
    speed: uniforms.speed.value,
    colorIntensity: uniforms.colorIntensity.value,
    displacement: uniforms.displacement.value,
    bloomStrength: bloomPass.strength,
    bloomThreshold: bloomPass.threshold,
    fps: currentFps,
    time: uniforms.time.value
  };
}

animate();
</script>
</body>
</html>
