<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 程序化熔岩着色器 + UnrealBloomPass</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 12px 14px;
      border-radius: 10px;
      backdrop-filter: blur(6px);
      min-width: 260px;
      box-shadow: 0 0 20px rgba(255, 120, 0, 0.15);
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 14px;
      color: #ffb347;
    }

    .control {
      display: grid;
      grid-template-columns: 110px 1fr 48px;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
      font-size: 12px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .value {
      text-align: right;
      color: #ffd7a1;
      font-variant-numeric: tabular-nums;
    }

    #hint {
      position: absolute;
      right: 12px;
      bottom: 12px;
      z-index: 10;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h3>程序化熔岩控制面板</h3>

      <div class="control">
        <label for="noiseScale">noiseScale</label>
        <input id="noiseScale" type="range" min="1" max="10" step="0.1" value="3.0" />
        <div class="value" id="noiseScaleVal">3.0</div>
      </div>

      <div class="control">
        <label for="speed">speed</label>
        <input id="speed" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
        <div class="value" id="speedVal">1.0</div>
      </div>

      <div class="control">
        <label for="intensity">colorIntensity</label>
        <input id="intensity" type="range" min="0.5" max="2.0" step="0.1" value="1.0" />
        <div class="value" id="intensityVal">1.0</div>
      </div>

      <div class="control">
        <label for="displacement">displacement</label>
        <input id="displacement" type="range" min="0" max="2.0" step="0.1" value="0.5" />
        <div class="value" id="displacementVal">0.5</div>
      </div>

      <div class="control">
        <label for="bloomStrength">bloomStrength</label>
        <input id="bloomStrength" type="range" min="0" max="3" step="0.1" value="1.5" />
        <div class="value" id="bloomStrengthVal">1.5</div>
      </div>

      <div class="control">
        <label for="bloomThreshold">bloomThreshold</label>
        <input id="bloomThreshold" type="range" min="0" max="1" step="0.05" value="0.3" />
        <div class="value" id="bloomThresholdVal">0.30</div>
      </div>
    </div>

    <div id="hint">鼠标拖拽旋转，滚轮缩放</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 1.8, 4.8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(ambient);

    // 星空粒子
    {
      const starCount = 700;
      const positions = new Float32Array(starCount * 3);
      const radiusMin = 25;
      const radiusMax = 60;

      for (let i = 0; i < starCount; i++) {
        const u = Math.random();
        const v = Math.random();
        const theta = 2.0 * Math.PI * u;
        const phi = Math.acos(2.0 * v - 1.0);
        const r = THREE.MathUtils.lerp(radiusMin, radiusMax, Math.random());

        const sinPhi = Math.sin(phi);
        positions[i * 3 + 0] = r * sinPhi * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * sinPhi * Math.sin(theta);
      }

      const starGeo = new THREE.BufferGeometry();
      starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const starMat = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.08,
        sizeAttenuation: true,
        transparent: true,
        opacity: 0.9
      });

      const stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);
    }

    const uniforms = {
      time: { value: 0.0 },
      noiseScale: { value: 3.0 },
      speed: { value: 1.0 },
      colorIntensity: { value: 1.0 },
      displacement: { value: 0.5 }
    };

    const noiseGLSL = /* glsl */`
      vec3 mod289(vec3 x) {
        return x - floor(x * (1.0 / 289.0)) * 289.0;
      }

      vec4 mod289(vec4 x) {
        return x - floor(x * (1.0 / 289.0)) * 289.0;
      }

      vec4 permute(vec4 x) {
        return mod289(((x * 34.0) + 10.0) * x);
      }

      vec4 taylorInvSqrt(vec4 r) {
        return 1.79284291400159 - 0.85373472095314 * r;
      }

      float snoise(vec3 v) {
        const vec2 C = vec2(1.0 / 6.0, 1.0 / 3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);

        vec3 i  = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);

        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);

        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;

        i = mod289(i);
        vec4 p = permute(
                  permute(
                    permute(i.z + vec4(0.0, i1.z, i2.z, 1.0))
                  + i.y + vec4(0.0, i1.y, i2.y, 1.0))
                  + i.x + vec4(0.0, i1.x, i2.x, 1.0));

        float n_ = 1.0 / 7.0;
        vec3 ns = n_ * D.wyz - D.xzx;

        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);

        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);

        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);

        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);

        vec4 s0 = floor(b0) * 2.0 + 1.0;
        vec4 s1 = floor(b1) * 2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));

        vec4 a0 = b0.xzyw + s0.xzyw * sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw * sh.zzww;

        vec3 p0 = vec3(a0.xy, h.x);
        vec3 p1 = vec3(a0.zw, h.y);
        vec3 p2 = vec3(a1.xy, h.z);
        vec3 p3 = vec3(a1.zw, h.w);

        vec4 norm = taylorInvSqrt(vec4(dot(p0, p0), dot(p1, p1), dot(p2, p2), dot(p3, p3)));
        p0 *= norm.x;
        p1 *= norm.y;
        p2 *= norm.z;
        p3 *= norm.w;

        vec4 m = max(0.6 - vec4(dot(x0, x0), dot(x1, x1), dot(x2, x2), dot(x3, x3)), 0.0);
        m = m * m;

        return 42.0 * dot(m * m, vec4(dot(p0, x0), dot(p1, x1), dot(p2, x2), dot(p3, x3)));
      }
    `;

    const vertexShader = /* glsl */`
      uniform float time;
      uniform float noiseScale;
      uniform float speed;
      uniform float displacement;

      varying vec3 vWorldPos;
      varying vec3 vNormalW;

      ${noiseGLSL}

      vec3 orthogonal(vec3 v) {
        return normalize(abs(v.x) > abs(v.z)
          ? vec3(-v.y, v.x, 0.0)
          : vec3(0.0, -v.z, v.y));
      }

      vec3 displacePoint(vec3 p, vec3 n) {
        float t = time * speed * 0.5;
        float nVal = snoise(p * noiseScale + vec3(t));
        return p + n * displacement * nVal;
      }

      void main() {
        vec3 p = position;
        vec3 n = normalize(normal);

        vec3 displaced = displacePoint(p, n);

        float eps = 0.02;
        vec3 tangent = orthogonal(n);
        vec3 bitangent = normalize(cross(n, tangent));

        vec3 p1 = displacePoint(p + tangent * eps, n);
        vec3 p2 = displacePoint(p + bitangent * eps, n);

        vec3 d1 = p1 - displaced;
        vec3 d2 = p2 - displaced;

        vec3 displacedNormal = normalize(cross(d1, d2));

        vec4 worldPos = modelMatrix * vec4(displaced, 1.0);
        vWorldPos = worldPos.xyz;
        vNormalW = normalize(mat3(modelMatrix) * displacedNormal);

        gl_Position = projectionMatrix * viewMatrix * worldPos;
      }
    `;

    const fragmentShader = /* glsl */`
      uniform float time;
      uniform float noiseScale;
      uniform float speed;
      uniform float colorIntensity;

      varying vec3 vWorldPos;
      varying vec3 vNormalW;

      ${noiseGLSL}

      vec3 lavaRamp(float t) {
        vec3 c0 = vec3(0.1, 0.0, 0.0);
        vec3 c1 = vec3(0.8, 0.0, 0.0);
        vec3 c2 = vec3(1.0, 0.5, 0.0);
        vec3 c3 = vec3(1.0, 1.0, 0.0);
        vec3 c4 = vec3(1.0, 1.0, 1.0);

        if (t < 0.25) {
          return mix(c0, c1, t / 0.25);
        } else if (t < 0.5) {
          return mix(c1, c2, (t - 0.25) / 0.25);
        } else if (t < 0.75) {
          return mix(c2, c3, (t - 0.5) / 0.25);
        } else {
          return mix(c3, c4, (t - 0.75) / 0.25);
        }
      }

      void main() {
        float t1 = time * speed * 0.3;
        float t2 = time * speed * 0.2;

        float layer1 = snoise(vWorldPos * noiseScale * 2.0 + vec3(t1));
        float layer2 = snoise(vWorldPos * noiseScale * 4.0 - vec3(t2));
        float combined = (layer1 + layer2 * 0.5) * 0.667;
        float lavaT = combined * 0.5 + 0.5;
        lavaT = clamp(lavaT, 0.0, 1.0);

        vec3 color = lavaRamp(lavaT);

        vec3 N = normalize(vNormalW);
        vec3 V = normalize(cameraPosition - vWorldPos);

        float fresnel = pow(1.0 - max(dot(N, V), 0.0), 2.0);
        float glowBoost = smoothstep(0.6, 1.0, lavaT) * 1.2 + fresnel * 0.25;

        color *= colorIntensity * (0.85 + glowBoost);

        gl_FragColor = vec4(color, 1.0);
      }
    `;

    const geometry = new THREE.TorusKnotGeometry(1, 0.4, 256, 64);
    const material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader,
      fragmentShader
    });

    const lavaMesh = new THREE.Mesh(geometry, material);
    scene.add(lavaMesh);

    // 后处理
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
    composer.addPass(renderPass);

    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      1.5,
      0.5,
      0.3
    );
    composer.addPass(bloomPass);

    // UI
    const sliders = {
      noiseScale: document.getElementById('noiseScale'),
      speed: document.getElementById('speed'),
      intensity: document.getElementById('intensity'),
      displacement: document.getElementById('displacement'),
      bloomStrength: document.getElementById('bloomStrength'),
      bloomThreshold: document.getElementById('bloomThreshold')
    };

    const labels = {
      noiseScale: document.getElementById('noiseScaleVal'),
      speed: document.getElementById('speedVal'),
      intensity: document.getElementById('intensityVal'),
      displacement: document.getElementById('displacementVal'),
      bloomStrength: document.getElementById('bloomStrengthVal'),
      bloomThreshold: document.getElementById('bloomThresholdVal')
    };

    function syncUI() {
      uniforms.noiseScale.value = parseFloat(sliders.noiseScale.value);
      uniforms.speed.value = parseFloat(sliders.speed.value);
      uniforms.colorIntensity.value = parseFloat(sliders.intensity.value);
      uniforms.displacement.value = parseFloat(sliders.displacement.value);

      bloomPass.strength = parseFloat(sliders.bloomStrength.value);
      bloomPass.threshold = parseFloat(sliders.bloomThreshold.value);
      bloomPass.radius = 0.5;

      labels.noiseScale.textContent = Number(sliders.noiseScale.value).toFixed(1);
      labels.speed.textContent = Number(sliders.speed.value).toFixed(1);
      labels.intensity.textContent = Number(sliders.intensity.value).toFixed(1);
      labels.displacement.textContent = Number(sliders.displacement.value).toFixed(1);
      labels.bloomStrength.textContent = Number(sliders.bloomStrength.value).toFixed(1);
      labels.bloomThreshold.textContent = Number(sliders.bloomThreshold.value).toFixed(2);
    }

    Object.values(sliders).forEach(el => el.addEventListener('input', syncUI));
    syncUI();

    // FPS 统计（最近 1 秒平均帧率）
    let lastTime = performance.now();
    let fpsAccumTime = 0;
    let fpsFrames = 0;
    let fps = 0;

    window.__3D_STATE__ = {
      noiseScale: uniforms.noiseScale.value,
      speed: uniforms.speed.value,
      colorIntensity: uniforms.colorIntensity.value,
      displacement: uniforms.displacement.value,
      bloomStrength: bloomPass.strength,
      bloomThreshold: bloomPass.threshold,
      fps: 0,
      time: 0
    };

    function updateState() {
      window.__3D_STATE__ = {
        noiseScale: uniforms.noiseScale.value,
        speed: uniforms.speed.value,
        colorIntensity: uniforms.colorIntensity.value,
        displacement: uniforms.displacement.value,
        bloomStrength: bloomPass.strength,
        bloomThreshold: bloomPass.threshold,
        fps: fps,
        time: uniforms.time.value
      };
    }

    function animate(now) {
      requestAnimationFrame(animate);

      const dt = Math.min((now - lastTime) / 1000, 0.1);
      lastTime = now;

      fpsAccumTime += dt;
      fpsFrames += 1;
      if (fpsAccumTime >= 1.0) {
        fps = fpsFrames / fpsAccumTime;
        fpsAccumTime = 0;
        fpsFrames = 0;
      }

      uniforms.time.value += dt;

      lavaMesh.rotation.y += 0.005;

      controls.update();
      composer.render();

      updateState();
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    requestAnimationFrame((t) => {
      lastTime = t;
      animate(t);
    });
  </script>
</body>
</html>
