<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Abstract Particle Art</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    font-size: 14px;
    line-height: 1.8;
    background: rgba(0, 0, 0, 0.6);
    padding: 12px 18px;
    border-radius: 8px;
    pointer-events: none;
    z-index: 10;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255,255,255,0.1);
  }
  
  #hud span {
    font-weight: bold;
  }
  
  #controls {
    position: absolute;
    top: 15px;
    right: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  
  #controls button {
    color: #fff;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
  }
  
  #controls button:hover {
    background: rgba(255, 255, 255, 0.15);
  }
  
  #instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Mode: <span id="modeDisplay">orbit</span></div>
  <div>Particles: <span id="particleCount">2000</span></div>
  <div>Helmet: <span id="helmetStatus">visible</span></div>
</div>

<div id="controls">
  <button id="toggleHelmet">Toggle Helmet</button>
  <button id="toggleSpin">Toggle Spin</button>
</div>

<div id="instructions">
  [1] Orbit &nbsp; [2] Explode &nbsp; [3] Converge &nbsp; [R] Reset Colors &nbsp; [Space] Toggle Particles &nbsp; Mouse: Orbit Camera
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── State ───
const STATE = {
  mode: 'orbit',
  particleCount: 2000,
  particlesVisible: true,
  helmetVisible: true,
  helmetSpinning: false,
  helmetRotationY: 0,
  avgParticleRadius: 3,
  frameCount: 0,
  helmetLoaded: false,
  colorResetCount: 0
};
window.__3D_STATE__ = STATE;

// ─── Color Palette ───
const PALETTE = [0xff3366, 0x33ffcc, 0x3366ff, 0xffcc33, 0xff33ff];
const PALETTE_VEC = PALETTE.map(c => new THREE.Color(c));

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.5);
pointLight.position.set(5, 5, 5);
scene.add(pointLight);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// ─── Helmet ───
let helmetModel = null;
const loader = new GLTFLoader();
loader.load(
  'DamagedHelmet.glb',
  (gltf) => {
    helmetModel = gltf.scene;
    helmetModel.scale.set(1.0, 1.0, 1.0);
    
    // Center at origin
    const box = new THREE.Box3().setFromObject(helmetModel);
    const center = box.getCenter(new THREE.Vector3());
    helmetModel.position.sub(center);
    
    scene.add(helmetModel);
    STATE.helmetLoaded = true;
    console.log('DamagedHelmet.glb loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load DamagedHelmet.glb:', error);
    // Create a fallback sphere
    const geo = new THREE.IcosahedronGeometry(1, 3);
    const mat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
    helmetModel = new THREE.Mesh(geo, mat);
    scene.add(helmetModel);
    STATE.helmetLoaded = true;
  }
);

// ─── Particle System ───
const PARTICLE_COUNT = 2000;
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);

// Per-particle data
const initialRadius = new Float32Array(PARTICLE_COUNT);
const currentRadius = new Float32Array(PARTICLE_COUNT);
const angles = new Float32Array(PARTICLE_COUNT);
const angularVelocities = new Float32Array(PARTICLE_COUNT);
const phi = new Float32Array(PARTICLE_COUNT); // polar angle (elevation)

function randomFromPalette() {
  return PALETTE_VEC[Math.floor(Math.random() * PALETTE_VEC.length)];
}

function initParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    // Random spherical coordinates
    const r = 3.0 * Math.cbrt(Math.random()); // uniform distribution in sphere
    const theta = Math.random() * Math.PI * 2; // azimuthal angle
    const p = Math.acos(2 * Math.random() - 1); // polar angle
    
    initialRadius[i] = r;
    currentRadius[i] = r;
    angles[i] = theta;
    phi[i] = p;
    
    // Closer particles orbit faster
    angularVelocities[i] = 0.005 + (0.02 * (1.0 - r / 3.0));
    
    // Position
    const x = r * Math.sin(p) * Math.cos(theta);
    const y = r * Math.cos(p);
    const z = r * Math.sin(p) * Math.sin(theta);
    
    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;
    
    // Color
    const col = randomFromPalette();
    colors[i * 3] = col.r;
    colors[i * 3 + 1] = col.g;
    colors[i * 3 + 2] = col.b;
  }
  
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
}

initParticles();

const particleMaterial = new THREE.PointsMaterial({
  size: 0.05,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  sizeAttenuation: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});

const particles = new THREE.Points(geometry, particleMaterial);
scene.add(particles);

// ─── Reset particles to sphere ───
function resetParticles() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const r = 3.0 * Math.cbrt(Math.random());
    const theta = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    
    initialRadius[i] = r;
    currentRadius[i] = r;
    angles[i] = theta;
    phi[i] = p;
    angularVelocities[i] = 0.005 + (0.02 * (1.0 - r / 3.0));
    
    // Randomize color
    const col = randomFromPalette();
    colors[i * 3] = col.r;
    colors[i * 3 + 1] = col.g;
    colors[i * 3 + 2] = col.b;
  }
  geometry.attributes.color.needsUpdate = true;
}

// ─── HUD Elements ───
const modeDisplay = document.getElementById('modeDisplay');
const particleCountDisplay = document.getElementById('particleCount');
const helmetStatusDisplay = document.getElementById('helmetStatus');

function updateHUD() {
  modeDisplay.textContent = STATE.mode;
  particleCountDisplay.textContent = STATE.particleCount;
  helmetStatusDisplay.textContent = STATE.helmetVisible ? 'visible' : 'hidden';
}

// ─── Keyboard Input ───
window.addEventListener('keydown', (event) => {
  const key = event.key.toLowerCase();
  
  if (key === '1') {
    event.preventDefault();
    STATE.mode = 'orbit';
    updateHUD();
  } else if (key === '2') {
    event.preventDefault();
    STATE.mode = 'explode';
    updateHUD();
  } else if (key === '3') {
    event.preventDefault();
    STATE.mode = 'converge';
    updateHUD();
  } else if (key === 'r') {
    event.preventDefault();
    STATE.colorResetCount++;
    resetParticles();
    updateHUD();
  } else if (key === ' ' || event.code === 'Space') {
    event.preventDefault();
    STATE.particlesVisible = !STATE.particlesVisible;
    particles.visible = STATE.particlesVisible;
  }
});

// ─── Button Interactions ───
document.getElementById('toggleHelmet').addEventListener('click', () => {
  STATE.helmetVisible = !STATE.helmetVisible;
  if (helmetModel) {
    helmetModel.visible = STATE.helmetVisible;
  }
  updateHUD();
});

document.getElementById('toggleSpin').addEventListener('click', () => {
  STATE.helmetSpinning = !STATE.helmetSpinning;
});

// ─── Window Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
function animate() {
  requestAnimationFrame(animate);
  
  STATE.frameCount++;
  
  // Update particles
  let totalRadius = 0;
  const posAttr = geometry.attributes.position;
  
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    let r = currentRadius[i];
    
    if (STATE.mode === 'orbit') {
      // Rotate around Y-axis
      angles[i] += angularVelocities[i];
    } else if (STATE.mode === 'explode') {
      // Move outward
      if (r < 8.0) {
        r += 0.02;
        currentRadius[i] = r;
      }
      angles[i] += angularVelocities[i] * 0.3; // slow rotation during explode
    } else if (STATE.mode === 'converge') {
      // Move inward
      if (r > 1.2) {
        r -= 0.015;
        currentRadius[i] = r;
      }
      angles[i] += angularVelocities[i] * 1.5; // faster rotation during converge
    }
    
    // Convert spherical to cartesian
    const p = phi[i];
    const theta = angles[i];
    
    posAttr.array[i * 3] = r * Math.sin(p) * Math.cos(theta);
    posAttr.array[i * 3 + 1] = r * Math.cos(p);
    posAttr.array[i * 3 + 2] = r * Math.sin(p) * Math.sin(theta);
    
    totalRadius += r;
  }
  
  posAttr.needsUpdate = true;
  STATE.avgParticleRadius = totalRadius / PARTICLE_COUNT;
  
  // Helmet auto-rotation
  if (helmetModel && STATE.helmetSpinning) {
    helmetModel.rotation.y += 0.01;
  }
  if (helmetModel) {
    STATE.helmetRotationY = helmetModel.rotation.y;
  }
  
  controls.update();
  renderer.render(scene, camera);
}

updateHUD();
animate();
</script>
</body>
</html>
