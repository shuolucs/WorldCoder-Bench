<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Interactive Particle Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
        #hud-left {
            top: 10px;
            left: 10px;
        }
        #hud-right {
            top: 10px;
            right: 10px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: none;
            padding: 0;
        }
        .hud p {
            margin: 5px 0;
            font-size: 14px;
        }
        button {
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud-left" class="hud">
        <p id="modeDisplay">Mode: orbit</p>
        <p id="particleCount">Particles: 2000</p>
        <p id="helmetStatus">Helmet: Visible</p>
    </div>

    <div id="hud-right" class="hud">
        <button id="toggleHelmet">Toggle Helmet</button>
        <button id="toggleSpin">Toggle Spin</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            mode: 'orbit',
            particleCount: 2000,
            particlesVisible: true,
            helmetVisible: true,
            helmetSpinning: false,
            helmetRotationY: 0,
            avgParticleRadius: 0,
            frameCount: 0,
            helmetLoaded: false,
            colorResetCount: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // Load Model
        let helmet;
        const loader = new GLTFLoader();
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb';
        
        loader.load(modelUrl, (gltf) => {
            helmet = gltf.scene;
            helmet.scale.set(1.0, 1.0, 1.0);
            helmet.position.set(0, 0, 0);
            scene.add(helmet);
            window.__3D_STATE__.helmetLoaded = true;
        });

        // Particle System
        const particleCount = window.__3D_STATE__.particleCount;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const angularVelocities = new Float32Array(particleCount);
        
        const palette = [0xff3366, 0x33ffcc, 0x3366ff, 0xffcc33, 0xff33ff];
        const colorObj = new THREE.Color();

        function initParticles() {
            for (let i = 0; i < particleCount; i++) {
                // Random position in sphere of radius 3
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const r = 3.0 * Math.cbrt(Math.random());

                const x = r * Math.sin(phi) * Math.cos(theta);
                const y = r * Math.sin(phi) * Math.sin(theta);
                const z = r * Math.cos(phi);

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                // Random color from palette
                const hex = palette[Math.floor(Math.random() * palette.length)];
                colorObj.setHex(hex);
                colors[i * 3] = colorObj.r;
                colors[i * 3 + 1] = colorObj.g;
                colors[i * 3 + 2] = colorObj.b;

                // Angular velocity (closer = faster)
                const dist = Math.sqrt(x*x + y*y + z*z);
                angularVelocities[i] = 0.05 / (dist + 0.5); 
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;
        }

        initParticles();

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // DOM Elements
        const modeDisplay = document.getElementById('modeDisplay');
        const particleCountDisplay = document.getElementById('particleCount');
        const helmetStatusDisplay = document.getElementById('helmetStatus');

        // Interactions
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            const handledKeys = ['1', '2', '3', 'r', ' '];
            
            if (handledKeys.includes(key)) {
                e.preventDefault();
            }

            if (key === '1') window.__3D_STATE__.mode = 'orbit';
            if (key === '2') window.__3D_STATE__.mode = 'explode';
            if (key === '3') window.__3D_STATE__.mode = 'converge';
            
            if (key === 'r') {
                initParticles();
                window.__3D_STATE__.colorResetCount++;
            }
            
            if (key === ' ') {
                window.__3D_STATE__.particlesVisible = !window.__3D_STATE__.particlesVisible;
                particleSystem.visible = window.__3D_STATE__.particlesVisible;
            }
        });

        document.getElementById('toggleHelmet').addEventListener('click', () => {
            window.__3D_STATE__.helmetVisible = !window.__3D_STATE__.helmetVisible;
            if (helmet) helmet.visible = window.__3D_STATE__.helmetVisible;
        });

        document.getElementById('toggleSpin').addEventListener('click', () => {
            window.__3D_STATE__.helmetSpinning = !window.__3D_STATE__.helmetSpinning;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            const state = window.__3D_STATE__;
            state.frameCount++;

            // Helmet Spin
            if (helmet && state.helmetSpinning) {
                helmet.rotation.y += 0.01;
                state.helmetRotationY = helmet.rotation.y;
            }

            // Particle Animation
            const posAttr = geometry.attributes.position;
            const pos = posAttr.array;
            let totalRadius = 0;

            for (let i = 0; i < particleCount; i++) {
                let x = pos[i * 3];
                let y = pos[i * 3 + 1];
                let z = pos[i * 3 + 2];
                
                const dist = Math.sqrt(x*x + y*y + z*z);
                totalRadius += dist;

                if (state.mode === 'orbit') {
                    const rxz = Math.sqrt(x*x + z*z);
                    let theta = Math.atan2(z, x);
                    theta += angularVelocities[i];
                    pos[i * 3] = rxz * Math.cos(theta);
                    pos[i * 3 + 2] = rxz * Math.sin(theta);
                } 
                else if (state.mode === 'explode') {
                    if (dist < 8 && dist > 0) {
                        const speed = 0.02;
                        pos[i * 3] += (x / dist) * speed;
                        pos[i * 3 + 1] += (y / dist) * speed;
                        pos[i * 3 + 2] += (z / dist) * speed;
                    }
                } 
                else if (state.mode === 'converge') {
                    if (dist > 1.2) {
                        const speed = 0.015;
                        pos[i * 3] -= (x / dist) * speed;
                        pos[i * 3 + 1] -= (y / dist) * speed;
                        pos[i * 3 + 2] -= (z / dist) * speed;
                    }
                }
            }

            posAttr.needsUpdate = true;
            state.avgParticleRadius = totalRadius / particleCount;

            // Update HUD
            modeDisplay.innerText = `Mode: ${state.mode}`;
            particleCountDisplay.innerText = `Particles: ${state.particleCount}`;
            helmetStatusDisplay.innerText = `Helmet: ${state.helmetVisible ? 'Visible' : 'Hidden'}`;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
