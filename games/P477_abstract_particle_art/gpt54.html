<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Abstract Particle Helmet Scene</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.35);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.6;
      font-size: 14px;
    }

    #controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 10px;
    }

    button {
      color: white;
      background: rgba(20, 20, 20, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: rgba(40, 40, 40, 0.85);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Mode: <span id="modeDisplay">orbit</span></div>
    <div>Particles: <span id="particleCount">2000</span></div>
    <div>Helmet Visible: <span id="helmetStatus">true</span></div>
  </div>

  <div id="controls">
    <button id="toggleHelmet">Toggle Helmet</button>
    <button id="toggleSpin">Toggle Spin</button>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(5, 5, 5);
    scene.add(pointLight);

    let helmet = null;
    let helmetVisible = true;
    let helmetSpinning = false;
    let helmetLoaded = false;

    const loader = new GLTFLoader();
    loader.load(
      'DamagedHelmet.glb',
      (gltf) => {
        helmet = gltf.scene;

        const box = new THREE.Box3().setFromObject(helmet);
        const center = new THREE.Vector3();
        box.getCenter(center);
        helmet.position.sub(center);

        helmet.scale.set(1, 1, 1);
        scene.add(helmet);
        helmetLoaded = true;
      },
      undefined,
      (error) => {
        console.error('Error loading DamagedHelmet.glb:', error);
      }
    );

    const PARTICLE_COUNT = 2000;
    const INITIAL_RADIUS = 3;
    const palette = [0xff3366, 0x33ffcc, 0x3366ff, 0xffcc33, 0xff33ff];

    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);

    const particleData = [];
    const tempColor = new THREE.Color();

    function randomDirection() {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      return {
        x: Math.sin(phi) * Math.cos(theta),
        y: Math.cos(phi),
        z: Math.sin(phi) * Math.sin(theta)
      };
    }

    function setParticleColor(i) {
      const hex = palette[Math.floor(Math.random() * palette.length)];
      tempColor.setHex(hex);
      colors[i * 3] = tempColor.r;
      colors[i * 3 + 1] = tempColor.g;
      colors[i * 3 + 2] = tempColor.b;
    }

    function initializeParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const dir = randomDirection();
        const radius = INITIAL_RADIUS;

        const x = dir.x * radius;
        const y = dir.y * radius;
        const z = dir.z * radius;

        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;

        setParticleColor(i);

        const angle = Math.atan2(z, x);
        const horizontalRadius = Math.sqrt(x * x + z * z);

        particleData[i] = {
          y,
          angle,
          radius,
          horizontalRadius,
          dir: new THREE.Vector3(dir.x, dir.y, dir.z),
          angularVelocity: 0.02 / Math.max(radius, 0.0001)
        };
      }

      particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    }

    initializeParticles();

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.05,
      vertexColors: true,
      sizeAttenuation: true
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    let mode = 'orbit';
    let particlesVisible = true;
    let frameCount = 0;
    let colorResetCount = 0;

    const modeDisplay = document.getElementById('modeDisplay');
    const particleCountDisplay = document.getElementById('particleCount');
    const helmetStatusDisplay = document.getElementById('helmetStatus');
    const toggleHelmetBtn = document.getElementById('toggleHelmet');
    const toggleSpinBtn = document.getElementById('toggleSpin');

    particleCountDisplay.textContent = PARTICLE_COUNT.toString();

    toggleHelmetBtn.addEventListener('click', () => {
      helmetVisible = !helmetVisible;
      if (helmet) helmet.visible = helmetVisible;
      helmetStatusDisplay.textContent = String(helmetVisible);
    });

    toggleSpinBtn.addEventListener('click', () => {
      helmetSpinning = !helmetSpinning;
    });

    function resetParticlesAndColors() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const dir = randomDirection();
        const radius = INITIAL_RADIUS;

        particleData[i].dir.copy(dir instanceof THREE.Vector3 ? dir : new THREE.Vector3(dir.x, dir.y, dir.z));
        particleData[i].radius = radius;
        particleData[i].y = dir.y * radius;
        particleData[i].horizontalRadius = Math.sqrt((dir.x * radius) ** 2 + (dir.z * radius) ** 2);
        particleData[i].angle = Math.atan2(dir.z * radius, dir.x * radius);
        particleData[i].angularVelocity = 0.02 / Math.max(radius, 0.0001);

        positions[i * 3] = dir.x * radius;
        positions[i * 3 + 1] = dir.y * radius;
        positions[i * 3 + 2] = dir.z * radius;

        setParticleColor(i);
      }

      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.color.needsUpdate = true;
    }

    window.addEventListener('keydown', (event) => {
      const key = event.key;

      if (key === '1') {
        event.preventDefault();
        mode = 'orbit';
      } else if (key === '2') {
        event.preventDefault();
        mode = 'explode';
      } else if (key === '3') {
        event.preventDefault();
        mode = 'converge';
      } else if (key === 'r' || key === 'R') {
        event.preventDefault();
        resetParticlesAndColors();
        colorResetCount++;
      } else if (key === ' ') {
        event.preventDefault();
        particlesVisible = !particlesVisible;
        particles.visible = particlesVisible;
      } else if (key === 'Spacebar' || event.code === 'Space') {
        event.preventDefault();
        particlesVisible = !particlesVisible;
        particles.visible = particlesVisible;
      }
    });

    window.__3D_STATE__ = {
      mode,
      particleCount: PARTICLE_COUNT,
      particlesVisible,
      helmetVisible,
      helmetSpinning,
      helmetRotationY: 0,
      avgParticleRadius: INITIAL_RADIUS,
      frameCount,
      helmetLoaded,
      colorResetCount
    };

    function updateParticles() {
      let radiusSum = 0;

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = particleData[i];

        if (mode === 'orbit') {
          p.angularVelocity = 0.02 / Math.max(p.radius, 0.0001);
          p.angle += p.angularVelocity;

          const x = Math.cos(p.angle) * p.horizontalRadius;
          const z = Math.sin(p.angle) * p.horizontalRadius;

          positions[i * 3] = x;
          positions[i * 3 + 1] = p.y;
          positions[i * 3 + 2] = z;
        } else if (mode === 'explode') {
          if (p.radius < 8) {
            p.radius = Math.min(8, p.radius + 0.02);
          }

          const x = p.dir.x * p.radius;
          const y = p.dir.y * p.radius;
          const z = p.dir.z * p.radius;

          p.y = y;
          p.horizontalRadius = Math.sqrt(x * x + z * z);
          p.angle = Math.atan2(z, x);
          p.angularVelocity = 0.02 / Math.max(p.radius, 0.0001);

          positions[i * 3] = x;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = z;
        } else if (mode === 'converge') {
          if (p.radius > 1.2) {
            p.radius = Math.max(1.2, p.radius - 0.015);
          }

          const x = p.dir.x * p.radius;
          const y = p.dir.y * p.radius;
          const z = p.dir.z * p.radius;

          p.y = y;
          p.horizontalRadius = Math.sqrt(x * x + z * z);
          p.angle = Math.atan2(z, x);
          p.angularVelocity = 0.02 / Math.max(p.radius, 0.0001);

          positions[i * 3] = x;
          positions[i * 3 + 1] = y;
          positions[i * 3 + 2] = z;
        }

        const x = positions[i * 3];
        const y = positions[i * 3 + 1];
        const z = positions[i * 3 + 2];
        radiusSum += Math.sqrt(x * x + y * y + z * z);
      }

      particleGeometry.attributes.position.needsUpdate = true;
      return radiusSum / PARTICLE_COUNT;
    }

    function animate() {
      requestAnimationFrame(animate);

      frameCount++;

      controls.update();

      if (helmet && helmetSpinning) {
        helmet.rotation.y += 0.01;
      }

      if (helmet) {
        helmet.visible = helmetVisible;
      }

      const avgParticleRadius = updateParticles();

      modeDisplay.textContent = mode;
      helmetStatusDisplay.textContent = String(helmetVisible);

      window.__3D_STATE__.mode = mode;
      window.__3D_STATE__.particleCount = PARTICLE_COUNT;
      window.__3D_STATE__.particlesVisible = particlesVisible;
      window.__3D_STATE__.helmetVisible = helmetVisible;
      window.__3D_STATE__.helmetSpinning = helmetSpinning;
      window.__3D_STATE__.helmetRotationY = helmet ? helmet.rotation.y : 0;
      window.__3D_STATE__.avgParticleRadius = avgParticleRadius;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.helmetLoaded = helmetLoaded;
      window.__3D_STATE__.colorResetCount = colorResetCount;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
