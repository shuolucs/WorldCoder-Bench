<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Marble Maze</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 10px;
    font-size: 14px;
    line-height: 1.8;
    min-width: 200px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
}
#hud div { margin: 2px 0; }
#hud span { font-weight: bold; color: #4fc3f7; }
.controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
}
.controls button {
    padding: 10px 24px;
    font-size: 14px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#btn-undo {
    background: linear-gradient(135deg, #e67e22, #d35400);
}
#btn-redo {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
}
#btn-reset {
    background: linear-gradient(135deg, #e74c3c, #c0392b);
}
.controls button:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
.controls button:active {
    transform: scale(0.95);
}
#instructions {
    position: absolute;
    top: 10px;
    right: 10px;
    color: #aaa;
    background: rgba(0,0,0,0.7);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.1);
}
#win-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #2ecc71;
    font-size: 48px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(46,204,113,0.5);
    display: none;
    pointer-events: none;
    animation: pulse 1s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}
</style>
</head>
<body>

<div id="hud">
    <div>⏱ Time: <span id="timer">0s</span></div>
    <div>↩ Undos: <span id="undo-count">0</span></div>
    <div>🎮 State: <span id="game-state">playing</span></div>
    <div>📜 History: <span id="history-info">0/0</span></div>
</div>

<div id="instructions">
    Arrow Keys: Tilt Board<br>
    U: Undo | R: Redo<br>
    Reach the green goal!
</div>

<div id="win-overlay">🏆 YOU WIN! 🏆</div>

<div class="controls">
    <button id="btn-undo">⟲ Undo</button>
    <button id="btn-redo">Redo ⟳</button>
    <button id="btn-reset">↺ Reset</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 12, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// --- Board Group (tilts) ---
const boardGroup = new THREE.Group();
scene.add(boardGroup);

// Board surface
const boardGeo = new THREE.BoxGeometry(12, 0.3, 12);
const boardMat = new THREE.MeshStandardMaterial({ color: 0x4a6741 });
const board = new THREE.Mesh(boardGeo, boardMat);
board.receiveShadow = true;
board.position.y = -0.15;
boardGroup.add(board);

// Board edge walls (rim)
const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const edgeHeight = 0.5;
const edgeThickness = 0.2;

function createWall(width, height, depth, x, y, z) {
    const geo = new THREE.BoxGeometry(width, height, depth);
    const mesh = new THREE.Mesh(geo, wallMat);
    mesh.position.set(x, y, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    boardGroup.add(mesh);
    return mesh;
}

// Board edges
createWall(12 + edgeThickness * 2, edgeHeight, edgeThickness, 0, edgeHeight / 2 - 0.15, -6 - edgeThickness / 2 + edgeThickness); // back
createWall(12 + edgeThickness * 2, edgeHeight, edgeThickness, 0, edgeHeight / 2 - 0.15, 6 + edgeThickness / 2 - edgeThickness); // front
createWall(edgeThickness, edgeHeight, 12, -6 - edgeThickness / 2 + edgeThickness, edgeHeight / 2 - 0.15, 0); // left
createWall(edgeThickness, edgeHeight, 12, 6 + edgeThickness / 2 - edgeThickness, edgeHeight / 2 - 0.15, 0); // right

// --- Maze Walls ---
const walls = [];
function addMazeWall(x, z, w, d) {
    const wall = createWall(w, edgeHeight, d, x, edgeHeight / 2 - 0.15, z);
    walls.push({ mesh: wall, x: x, z: z, w: w, d: d });
    return wall;
}

// Maze wall segments (at least 8)
addMazeWall(-2, -4, 4, 0.2);      // horizontal wall near start
addMazeWall(0, -2, 0.2, 4);       // vertical wall
addMazeWall(-3, -1, 0.2, 3);      // vertical wall left
addMazeWall(2, -1, 4, 0.2);       // horizontal wall
addMazeWall(-1, 1, 0.2, 3);       // vertical wall center
addMazeWall(2, 2, 3, 0.2);        // horizontal wall
addMazeWall(4, 0, 0.2, 4);        // vertical wall right
addMazeWall(-3, 3, 4, 0.2);       // horizontal wall
addMazeWall(1, 4, 0.2, 3);        // vertical wall
addMazeWall(-4, 1, 2, 0.2);       // small horizontal wall
addMazeWall(3, -3, 0.2, 3);       // vertical wall right area

// --- Holes (traps) ---
const holes = [
    { x: -1, z: -3 },
    { x: 3, z: 1 },
    { x: -3, z: 4 }
];
const holeRadius = 0.4;

holes.forEach(h => {
    const holeGeo = new THREE.CylinderGeometry(holeRadius, holeRadius, 0.35, 32);
    const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.9, roughness: 0.1 });
    const holeMesh = new THREE.Mesh(holeGeo, holeMat);
    holeMesh.position.set(h.x, -0.02, h.z);
    boardGroup.add(holeMesh);

    // Ring around hole
    const ringGeo = new THREE.TorusGeometry(holeRadius, 0.05, 8, 32);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(h.x, 0.02, h.z);
    boardGroup.add(ring);
});

// --- Goal Zone ---
const goalPos = { x: 4.5, z: 4.5 };
const goalRadius = 0.5;
const goalGeo = new THREE.CylinderGeometry(goalRadius, goalRadius, 0.05, 32);
const goalMat = new THREE.MeshStandardMaterial({
    color: 0x2ecc71,
    emissive: 0x2ecc71,
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.8
});
const goalMesh = new THREE.Mesh(goalGeo, goalMat);
goalMesh.position.set(goalPos.x, 0.03, goalPos.z);
boardGroup.add(goalMesh);

// Goal glow ring
const goalRingGeo = new THREE.TorusGeometry(goalRadius + 0.1, 0.05, 8, 32);
const goalRingMat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, emissive: 0x2ecc71, emissiveIntensity: 1 });
const goalRing = new THREE.Mesh(goalRingGeo, goalRingMat);
goalRing.rotation.x = -Math.PI / 2;
goalRing.position.set(goalPos.x, 0.06, goalPos.z);
boardGroup.add(goalRing);

// --- Marble ---
const marbleRadius = 0.3;
const marbleGeo = new THREE.SphereGeometry(marbleRadius, 32, 32);
const marbleMat = new THREE.MeshStandardMaterial({
    color: 0xe74c3c,
    metalness: 0.7,
    roughness: 0.3
});
const marble = new THREE.Mesh(marbleGeo, marbleMat);
marble.castShadow = true;
const startPos = { x: -4, y: 0.3 + marbleRadius, z: -4 };
marble.position.set(startPos.x, startPos.y, startPos.z);
boardGroup.add(marble);

// --- Animated Box (GLB) ---
let boxMixer = null;
let boxModel = null;
let boxAnimPlaying = false;
let boxBaseY = 0.5;
let boxJumping = false;
let boxJumpTime = 0;

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BoxAnimated/glTF-Binary/BoxAnimated.glb',
    (gltf) => {
        boxModel = gltf.scene;
        boxModel.scale.set(0.5, 0.5, 0.5);
        boxModel.position.set(4, boxBaseY, 4);
        boardGroup.add(boxModel);

        if (gltf.animations && gltf.animations.length > 0) {
            boxMixer = new THREE.AnimationMixer(boxModel);
            const action = boxMixer.clipAction(gltf.animations[0]);
            action.play();
            boxAnimPlaying = true;
        }
    },
    undefined,
    (error) => {
        console.warn('Could not load BoxAnimated.glb:', error);
        // Create a fallback animated box
        const fallbackGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, metalness: 0.5, roughness: 0.3 });
        boxModel = new THREE.Mesh(fallbackGeo, fallbackMat);
        boxModel.position.set(4, boxBaseY, 4);
        boxModel.castShadow = true;
        boardGroup.add(boxModel);
    }
);

// --- Game State ---
let tiltX = 0;
let tiltZ = 0;
let marbleVel = { x: 0, z: 0 };
let gameState = 'playing';
let startTime = Date.now();
let elapsedTime = 0;
let undoCount = 0;
let redoCount = 0;
let holesFallen = 0;
let goalReached = false;

// --- Input ---
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key] = true; });
window.addEventListener('keyup', (e) => { keys[e.key] = false; });

// --- Undo/Redo System ---
let history = [];
let historyIndex = -1;
let lastSnapshotTime = 0;
const SNAPSHOT_INTERVAL = 500; // ms
const MAX_HISTORY = 100;

function takeSnapshot() {
    const snapshot = {
        marblePos: { x: marble.position.x, y: marble.position.y, z: marble.position.z },
        marbleVel: { x: marbleVel.x, y: 0, z: marbleVel.z },
        tiltX: tiltX,
        tiltZ: tiltZ,
        timestamp: Date.now()
    };
    // Remove any future states if we're not at the end
    if (historyIndex < history.length - 1) {
        history = history.slice(0, historyIndex + 1);
    }
    history.push(snapshot);
    if (history.length > MAX_HISTORY) {
        history.shift();
    }
    historyIndex = history.length - 1;
}

function undo() {
    if (historyIndex > 0 && gameState === 'playing') {
        historyIndex--;
        restoreSnapshot(history[historyIndex]);
        undoCount++;
    }
}

function redo() {
    if (historyIndex < history.length - 1 && gameState === 'playing') {
        historyIndex++;
        restoreSnapshot(history[historyIndex]);
        redoCount++;
    }
}

function restoreSnapshot(snap) {
    marble.position.set(snap.marblePos.x, snap.marblePos.y, snap.marblePos.z);
    marbleVel.x = snap.marbleVel.x;
    marbleVel.z = snap.marbleVel.z;
    tiltX = snap.tiltX;
    tiltZ = snap.tiltZ;
}

function resetGame() {
    marble.position.set(startPos.x, startPos.y, startPos.z);
    marbleVel = { x: 0, z: 0 };
    tiltX = 0;
    tiltZ = 0;
    gameState = 'playing';
    startTime = Date.now();
    elapsedTime = 0;
    undoCount = 0;
    redoCount = 0;
    holesFallen = 0;
    goalReached = false;
    history = [];
    historyIndex = -1;
    lastSnapshotTime = 0;
    document.getElementById('win-overlay').style.display = 'none';
    takeSnapshot();
}

// Key handlers for undo/redo
window.addEventListener('keydown', (e) => {
    if (e.key === 'u' || e.key === 'U') undo();
    if (e.key === 'r' || e.key === 'R') redo();
});

// Button handlers
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-reset').addEventListener('click', resetGame);

// --- Collision Detection ---
function checkWallCollision(px, pz, vx, vz) {
    let newVx = vx;
    let newVz = vz;
    let newPx = px;
    let newPz = pz;
    const r = marbleRadius;
    const restitution = 0.3;

    // Board edges
    const boardHalf = 6 - edgeThickness - r;
    if (newPx < -boardHalf) { newPx = -boardHalf; newVx = Math.abs(newVx) * restitution; }
    if (newPx > boardHalf) { newPx = boardHalf; newVx = -Math.abs(newVx) * restitution; }
    if (newPz < -boardHalf) { newPz = -boardHalf; newVz = Math.abs(newVz) * restitution; }
    if (newPz > boardHalf) { newPz = boardHalf; newVz = -Math.abs(newVz) * restitution; }

    // Maze walls
    for (const wall of walls) {
        const wHalfW = wall.w / 2 + r;
        const wHalfD = wall.d / 2 + r;
        const wx = wall.x;
        const wz = wall.z;

        // Check if marble is within wall bounds
        if (newPx > wx - wHalfW && newPx < wx + wHalfW &&
            newPz > wz - wHalfD && newPz < wz + wHalfD) {

            // Find the smallest penetration axis
            const overlapLeft = (newPx) - (wx - wHalfW);
            const overlapRight = (wx + wHalfW) - (newPx);
            const overlapBack = (newPz) - (wz - wHalfD);
            const overlapFront = (wz + wHalfD) - (newPz);

            const minOverlap = Math.min(overlapLeft, overlapRight, overlapBack, overlapFront);

            if (minOverlap === overlapLeft) {
                newPx = wx - wHalfW;
                newVx = -Math.abs(newVx) * restitution;
            } else if (minOverlap === overlapRight) {
                newPx = wx + wHalfW;
                newVx = Math.abs(newVx) * restitution;
            } else if (minOverlap === overlapBack) {
                newPz = wz - wHalfD;
                newVz = -Math.abs(newVz) * restitution;
            } else if (minOverlap === overlapFront) {
                newPz = wz + wHalfD;
                newVz = Math.abs(newVz) * restitution;
            }
        }
    }

    return { px: newPx, pz: newPz, vx: newVx, vz: newVz };
}

// --- Initialize ---
takeSnapshot();

// --- Window State ---
window.__3D_STATE__ = {};

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const now = Date.now();

    if (gameState === 'playing') {
        elapsedTime = Math.floor((now - startTime) / 1000);

        // Tilt controls
        const tiltSpeed = 0.03;
        const maxTilt = 0.15;
        const tiltReturn = 0.95;

        if (keys['ArrowUp']) tiltX -= tiltSpeed;
        if (keys['ArrowDown']) tiltX += tiltSpeed;
        if (keys['ArrowLeft']) tiltZ += tiltSpeed;
        if (keys['ArrowRight']) tiltZ -= tiltSpeed;

        // Return to level when no keys pressed
        if (!keys['ArrowUp'] && !keys['ArrowDown']) tiltX *= tiltReturn;
        if (!keys['ArrowLeft'] && !keys['ArrowRight']) tiltZ *= tiltReturn;

        // Clamp tilt
        tiltX = Math.max(-maxTilt, Math.min(maxTilt, tiltX));
        tiltZ = Math.max(-maxTilt, Math.min(maxTilt, tiltZ));

        // Apply tilt to board
        boardGroup.rotation.x = tiltX;
        boardGroup.rotation.z = tiltZ;

        // Physics: gravity along tilted surface
        const gravity = 0.08;
        marbleVel.x += Math.sin(tiltZ) * gravity;
        marbleVel.z -= Math.sin(tiltX) * gravity;

        // Friction
        marbleVel.x *= 0.98;
        marbleVel.z *= 0.98;

        // Clamp speed
        const speed = Math.sqrt(marbleVel.x * marbleVel.x + marbleVel.z * marbleVel.z);
        const maxSpeed = 0.15;
        if (speed > maxSpeed) {
            marbleVel.x = (marbleVel.x / speed) * maxSpeed;
            marbleVel.z = (marbleVel.z / speed) * maxSpeed;
        }

        // NaN safety
        if (isNaN(marbleVel.x)) marbleVel.x = 0;
        if (isNaN(marbleVel.z)) marbleVel.z = 0;

        // Move marble
        let newPx = marble.position.x + marbleVel.x;
        let newPz = marble.position.z + marbleVel.z;

        // Collision
        const result = checkWallCollision(newPx, newPz, marbleVel.x, marbleVel.z);
        marble.position.x = result.px;
        marble.position.z = result.pz;
        marbleVel.x = result.vx;
        marbleVel.z = result.vz;

        // Keep marble on board surface
        marble.position.y = marbleRadius + 0.0;

        // Marble rotation (visual rolling)
        const rollAxis = new THREE.Vector3(-marbleVel.z, 0, marbleVel.x).normalize();
        const rollAngle = speed / marbleRadius;
        if (rollAngle > 0.001) {
            marble.rotateOnWorldAxis(rollAxis, rollAngle);
        }

        // Check holes
        for (const hole of holes) {
            const dx = marble.position.x - hole.x;
            const dz = marble.position.z - hole.z;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist < holeRadius * 0.7) {
                holesFallen++;
                marble.position.set(startPos.x, startPos.y, startPos.z);
                marbleVel = { x: 0, z: 0 };
                tiltX = 0;
                tiltZ = 0;
                break;
            }
        }

        // Check goal
        const gdx = marble.position.x - goalPos.x;
        const gdz = marble.position.z - goalPos.z;
        const gDist = Math.sqrt(gdx * gdx + gdz * gdz);
        if (gDist < goalRadius) {
            gameState = 'won';
            goalReached = true;
            document.getElementById('win-overlay').style.display = 'block';
            // Trigger box jump
            if (boxModel) {
                boxJumping = true;
                boxJumpTime = 0;
            }
        }

        // Snapshot
        if (now - lastSnapshotTime > SNAPSHOT_INTERVAL) {
            takeSnapshot();
            lastSnapshotTime = now;
        }
    }

    // Goal glow animation
    goalMat.emissiveIntensity = 0.3 + Math.sin(now * 0.005) * 0.3;
    goalRing.rotation.z += 0.02;

    // Box jump animation
    if (boxJumping && boxModel) {
        boxJumpTime += delta;
        const jumpDuration = 0.5;
        const jumpHeight = 2;
        if (boxJumpTime < jumpDuration) {
            const t = boxJumpTime / jumpDuration;
            const y = boxBaseY + jumpHeight * Math.sin(t * Math.PI);
            boxModel.position.y = y;
            boxModel.rotation.y += delta * 5;
        } else {
            boxModel.position.y = boxBaseY;
            boxJumping = false;
        }
    }

    // Box mixer
    if (boxMixer) {
        boxMixer.update(delta);
    }

    // Fallback box rotation
    if (boxModel && !boxMixer) {
        boxModel.rotation.y += delta * 1.5;
    }

    // Update HUD
    document.getElementById('timer').textContent = elapsedTime + 's';
    document.getElementById('undo-count').textContent = undoCount;
    document.getElementById('game-state').textContent = gameState;
    document.getElementById('history-info').textContent = (historyIndex + 1) + '/' + history.length;

    // Update global state
    const currentSpeed = Math.sqrt(marbleVel.x * marbleVel.x + marbleVel.z * marbleVel.z);
    window.__3D_STATE__ = {
        marbleX: parseFloat(marble.position.x.toFixed(3)),
        marbleY: parseFloat(marble.position.y.toFixed(3)),
        marbleZ: parseFloat(marble.position.z.toFixed(3)),
        marbleVelX: marbleVel.x,
        marbleVelZ: marbleVel.z,
        tiltX: tiltX,
        tiltZ: tiltZ,
        gameState: gameState,
        elapsedTime: elapsedTime,
        undoCount: undoCount,
        redoCount: redoCount,
        historyLength: history.length,
        historyIndex: historyIndex,
        marbleSpeed: currentSpeed,
        goalReached: goalReached,
        holesFallen: holesFallen,
        boxAnimPlaying: boxAnimPlaying || boxJumping,
        boardTiltMagnitude: Math.sqrt(tiltX * tiltX + tiltZ * tiltZ)
    };

    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
