<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Marble Maze</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            min-width: 200px;
            border: 1px solid #333;
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background: #4a6741;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            pointer-events: auto;
            transition: background 0.2s;
        }
        button:hover {
            background: #5c8051;
        }
        button:active {
            background: #384d31;
        }
        #instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            text-align: right;
            font-size: 12px;
            color: #ccc;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div>Time: <span id="timer">0</span>s</div>
        <div>Undos: <span id="undo-count">0</span></div>
        <div>State: <span id="game-state" style="color: #e74c3c; font-weight: bold;">playing</span></div>
        <div>History: <span id="history-info">0/0</span></div>
    </div>

    <div id="instructions">
        Arrow Keys: Tilt Board<br>
        U Key: Undo<br>
        R Key: Redo
    </div>

    <div id="controls">
        <button id="btn-undo">Undo (U)</button>
        <button id="btn-redo">Redo (R)</button>
        <button id="btn-reset">Reset</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            marbleX: 0, marbleY: 0, marbleZ: 0,
            marbleVelX: 0, marbleVelZ: 0,
            tiltX: 0, tiltZ: 0,
            gameState: 'playing', // playing, won, reset
            elapsedTime: 0,
            undoCount: 0,
            redoCount: 0,
            historyLength: 0,
            historyIndex: -1,
            marbleSpeed: 0,
            goalReached: false,
            holesFallen: 0,
            boxAnimPlaying: false,
            boardTiltMagnitude: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 12, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        // --- Game Objects ---
        const boardGroup = new THREE.Group();
        scene.add(boardGroup);

        // Board
        const boardGeo = new THREE.BoxGeometry(12, 0.3, 12);
        const boardMat = new THREE.MeshStandardMaterial({ color: 0x4a6741 });
        const board = new THREE.Mesh(boardGeo, boardMat);
        board.receiveShadow = true;
        boardGroup.add(board);

        // Walls
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
        const wallsData = [
            // Outer walls
            { x: 0, z: -5.9, w: 12, d: 0.2 },
            { x: 0, z: 5.9, w: 12, d: 0.2 },
            { x: -5.9, z: 0, w: 0.2, d: 12 },
            { x: 5.9, z: 0, w: 0.2, d: 12 },
            // Inner maze walls
            { x: -3, z: -3, w: 4, d: 0.2 },
            { x: 2, z: -2, w: 0.2, d: 4 },
            { x: -2, z: 2, w: 6, d: 0.2 },
            { x: 4, z: 3, w: 0.2, d: 4 },
            { x: 0, z: -4, w: 0.2, d: 2 },
            { x: -4, z: 0, w: 0.2, d: 4 },
            { x: 2, z: 4, w: 4, d: 0.2 },
            { x: 0, z: 0, w: 2, d: 0.2 }
        ];

        const wallMeshes = [];
        wallsData.forEach(data => {
            const geo = new THREE.BoxGeometry(data.w, 0.5, data.d);
            const mesh = new THREE.Mesh(geo, wallMat);
            mesh.position.set(data.x, 0.4, data.z); // 0.15 (half board) + 0.25 (half wall)
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            boardGroup.add(mesh);
            wallMeshes.push({
                mesh: mesh,
                minX: data.x - data.w / 2,
                maxX: data.x + data.w / 2,
                minZ: data.z - data.d / 2,
                maxZ: data.z + data.d / 2
            });
        });

        // Holes (Traps)
        const holeGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.31, 32);
        const holeMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
        const holesData = [
            { x: -2, z: -1 },
            { x: 3, z: 1 },
            { x: -3, z: 4 }
        ];
        holesData.forEach(pos => {
            const mesh = new THREE.Mesh(holeGeo, holeMat);
            mesh.position.set(pos.x, 0, pos.z);
            boardGroup.add(mesh);
        });

        // Goal
        const goalGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.32, 32);
        const goalMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, emissiveIntensity: 0.5 });
        const goal = new THREE.Mesh(goalGeo, goalMat);
        goal.position.set(4.5, 0, -4.5);
        boardGroup.add(goal);

        // Marble
        const marbleRadius = 0.3;
        const marbleGeo = new THREE.SphereGeometry(marbleRadius, 32, 32);
        const marbleMat = new THREE.MeshStandardMaterial({ 
            color: 0xe74c3c, 
            metalness: 0.7, 
            roughness: 0.3 
        });
        const marble = new THREE.Mesh(marbleGeo, marbleMat);
        marble.castShadow = true;
        boardGroup.add(marble);

        // Physics State
        const startPos = new THREE.Vector3(-4, 0.45, -4); // 0.15 (board top) + 0.3 (radius)
        let marblePos = startPos.clone();
        let marbleVel = new THREE.Vector3(0, 0, 0);
        const maxSpeed = 0.15;
        const friction = 0.98;
        const restitution = 0.3;
        const gravityConst = 0.02;

        // Animated Box
        let mixer;
        let boxModel;
        let boxJumpStartTime = 0;
        const loader = new GLTFLoader();
        // Using a reliable raw github link for the glTF sample model
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb',
            function (gltf) {
                boxModel = gltf.scene;
                boxModel.position.set(4, 0.5, 4);
                boxModel.scale.set(0.5, 0.5, 0.5);
                boxModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                boardGroup.add(boxModel);

                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(boxModel);
                    const action = mixer.clipAction(gltf.animations[0]);
                    action.play();
                    window.__3D_STATE__.boxAnimPlaying = true;
                }
            },
            undefined,
            function (error) {
                console.error('Error loading BoxAnimated.glb:', error);
            }
        );

        // --- Controls ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = true;
                e.preventDefault();
            }
            if (e.code === 'KeyU') undo();
            if (e.code === 'KeyR') redo();
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) {
                keys[e.code] = false;
                e.preventDefault();
            }
        });

        // --- Undo/Redo System ---
        let history = [];
        let lastSnapshotTime = 0;
        const snapshotInterval = 0.5;
        const maxHistory = 100;

        function saveSnapshot() {
            if (window.__3D_STATE__.gameState !== 'playing') return;
            
            // If we are not at the end of history and make a new move, truncate future
            if (window.__3D_STATE__.historyIndex < history.length - 1) {
                history = history.slice(0, window.__3D_STATE__.historyIndex + 1);
            }

            history.push({
                pos: marblePos.clone(),
                vel: marbleVel.clone(),
                tiltX: boardGroup.rotation.x,
                tiltZ: boardGroup.rotation.z,
                time: window.__3D_STATE__.elapsedTime
            });

            if (history.length > maxHistory) {
                history.shift();
            }
            window.__3D_STATE__.historyIndex = history.length - 1;
            window.__3D_STATE__.historyLength = history.length;
        }

        function restoreSnapshot(snap) {
            marblePos.copy(snap.pos);
            marbleVel.copy(snap.vel);
            boardGroup.rotation.x = snap.tiltX;
            boardGroup.rotation.z = snap.tiltZ;
            marble.position.copy(marblePos);
        }

        function undo() {
            if (window.__3D_STATE__.historyIndex > 0) {
                window.__3D_STATE__.historyIndex--;
                restoreSnapshot(history[window.__3D_STATE__.historyIndex]);
                window.__3D_STATE__.undoCount++;
            }
        }

        function redo() {
            if (window.__3D_STATE__.historyIndex < history.length - 1) {
                window.__3D_STATE__.historyIndex++;
                restoreSnapshot(history[window.__3D_STATE__.historyIndex]);
                window.__3D_STATE__.redoCount++;
            }
        }

        function resetGame() {
            marblePos.copy(startPos);
            marbleVel.set(0, 0, 0);
            boardGroup.rotation.set(0, 0, 0);
            marble.position.copy(marblePos);
            
            window.__3D_STATE__.gameState = 'playing';
            window.__3D_STATE__.goalReached = false;
            window.__3D_STATE__.elapsedTime = 0;
            gameStartTime = clock.getElapsedTime();
            
            history = [];
            window.__3D_STATE__.historyIndex = -1;
            window.__3D_STATE__.historyLength = 0;
            lastSnapshotTime = 0;
            
            if (boxModel) boxModel.position.y = 0.5;
            
            saveSnapshot();
        }

        // UI Buttons
        document.getElementById('btn-undo').addEventListener('click', undo);
        document.getElementById('btn-redo').addEventListener('click', redo);
        document.getElementById('btn-reset').addEventListener('click', resetGame);

        // --- Game Loop ---
        const clock = new THREE.Clock();
        let gameStartTime = clock.getElapsedTime();

        // Initial snapshot
        saveSnapshot();

        function handleCollisions() {
            // Board Bounds
            const bound = 6 - marbleRadius;
            if (marblePos.x < -bound) { marblePos.x = -bound; marbleVel.x *= -restitution; }
            if (marblePos.x > bound) { marblePos.x = bound; marbleVel.x *= -restitution; }
            if (marblePos.z < -bound) { marblePos.z = -bound; marbleVel.z *= -restitution; }
            if (marblePos.z > bound) { marblePos.z = bound; marbleVel.z *= -restitution; }

            // Walls (AABB vs Sphere)
            for (let i = 0; i < wallMeshes.length; i++) {
                const w = wallMeshes[i];
                
                // Find closest point on AABB to sphere center
                const closestX = Math.max(w.minX, Math.min(marblePos.x, w.maxX));
                const closestZ = Math.max(w.minZ, Math.min(marblePos.z, w.maxZ));

                const dx = marblePos.x - closestX;
                const dz = marblePos.z - closestZ;
                const distanceSq = dx * dx + dz * dz;

                if (distanceSq < marbleRadius * marbleRadius) {
                    const distance = Math.sqrt(distanceSq);
                    if (distance === 0) continue;

                    const nx = dx / distance;
                    const nz = dz / distance;

                    // Push out
                    const penetration = marbleRadius - distance;
                    marblePos.x += nx * penetration;
                    marblePos.z += nz * penetration;

                    // Reflect velocity
                    const dot = marbleVel.x * nx + marbleVel.z * nz;
                    if (dot < 0) {
                        marbleVel.x -= (1 + restitution) * dot * nx;
                        marbleVel.z -= (1 + restitution) * dot * nz;
                    }
                }
            }
        }

        function updatePhysics() {
            if (window.__3D_STATE__.gameState !== 'playing') return;

            // Apply gravity based on board tilt
            // Tilt X (pitch): positive means front goes down -> marble rolls -Z
            // Tilt Z (roll): positive means right goes down -> marble rolls +X
            marbleVel.x += Math.sin(boardGroup.rotation.z) * gravityConst;
            marbleVel.z -= Math.sin(boardGroup.rotation.x) * gravityConst;

            // Apply friction
            marbleVel.multiplyScalar(friction);

            // Clamp speed
            if (marbleVel.length() > maxSpeed) {
                marbleVel.normalize().multiplyScalar(maxSpeed);
            }

            // Prevent NaN
            if (isNaN(marbleVel.x)) marbleVel.x = 0;
            if (isNaN(marbleVel.z)) marbleVel.z = 0;

            marblePos.add(marbleVel);

            handleCollisions();

            // Check Holes
            for (let i = 0; i < holesData.length; i++) {
                const h = holesData[i];
                const dist = Math.hypot(marblePos.x - h.x, marblePos.z - h.z);
                if (dist < 0.4) {
                    window.__3D_STATE__.holesFallen++;
                    marblePos.copy(startPos);
                    marbleVel.set(0, 0, 0);
                    break;
                }
            }

            // Check Goal
            const goalDist = Math.hypot(marblePos.x - goal.position.x, marblePos.z - goal.position.z);
            if (goalDist < 0.5 && !window.__3D_STATE__.goalReached) {
                window.__3D_STATE__.goalReached = true;
                window.__3D_STATE__.gameState = 'won';
                boxJumpStartTime = clock.getElapsedTime();
            }

            // Update Mesh
            marble.position.copy(marblePos);
        }

        function updateUI() {
            document.getElementById('timer').innerText = window.__3D_STATE__.elapsedTime;
            document.getElementById('undo-count').innerText = window.__3D_STATE__.undoCount;
            
            const stateSpan = document.getElementById('game-state');
            stateSpan.innerText = window.__3D_STATE__.gameState;
            stateSpan.style.color = window.__3D_STATE__.gameState === 'won' ? '#2ecc71' : '#e74c3c';

            document.getElementById('history-info').innerText = 
                `${window.__3D_STATE__.historyIndex + 1}/${window.__3D_STATE__.historyLength}`;
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Update Animation Mixer
            if (mixer) mixer.update(delta);

            // Handle Input & Tilt
            let targetTiltX = 0;
            let targetTiltZ = 0;
            const tiltSpeed = 0.03;
            const maxTilt = 0.15;

            if (keys.ArrowUp) targetTiltX -= tiltSpeed;
            if (keys.ArrowDown) targetTiltX += tiltSpeed;
            if (keys.ArrowLeft) targetTiltZ -= tiltSpeed;
            if (keys.ArrowRight) targetTiltZ += tiltSpeed;

            if (!keys.ArrowUp && !keys.ArrowDown) {
                boardGroup.rotation.x *= 0.95;
            } else {
                boardGroup.rotation.x = THREE.MathUtils.clamp(boardGroup.rotation.x + targetTiltX, -maxTilt, maxTilt);
            }

            if (!keys.ArrowLeft && !keys.ArrowRight) {
                boardGroup.rotation.z *= 0.95;
            } else {
                boardGroup.rotation.z = THREE.MathUtils.clamp(boardGroup.rotation.z + targetTiltZ, -maxTilt, maxTilt);
            }

            // Update Time
            if (window.__3D_STATE__.gameState === 'playing') {
                window.__3D_STATE__.elapsedTime = Math.floor(time - gameStartTime);
                
                // Snapshots
                if (time - lastSnapshotTime >= snapshotInterval) {
                    saveSnapshot();
                    lastSnapshotTime = time;
                }
            }

            updatePhysics();

            // Box Jump Animation on Win
            if (window.__3D_STATE__.gameState === 'won' && boxModel) {
                const t = time - boxJumpStartTime;
                if (t < 0.5) {
                    boxModel.position.y = 0.5 + Math.sin((t / 0.5) * Math.PI) * 2;
                } else {
                    boxModel.position.y = 0.5;
                }
            }

            // Update Global State Object
            const worldPos = new THREE.Vector3();
            marble.getWorldPosition(worldPos);
            
            window.__3D_STATE__.marbleX = parseFloat(worldPos.x.toFixed(3));
            window.__3D_STATE__.marbleY = parseFloat(worldPos.y.toFixed(3));
            window.__3D_STATE__.marbleZ = parseFloat(worldPos.z.toFixed(3));
            window.__3D_STATE__.marbleVelX = marbleVel.x;
            window.__3D_STATE__.marbleVelZ = marbleVel.z;
            window.__3D_STATE__.tiltX = boardGroup.rotation.x;
            window.__3D_STATE__.tiltZ = boardGroup.rotation.z;
            window.__3D_STATE__.marbleSpeed = marbleVel.length();
            window.__3D_STATE__.boardTiltMagnitude = Math.sqrt(boardGroup.rotation.x**2 + boardGroup.rotation.z**2);

            updateUI();

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
