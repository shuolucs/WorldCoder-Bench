<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Sunglasses Virtual Try-On</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  overflow: hidden; 
  background: #F5F5F5;
}
#canvas-container { width: 100vw; height: 100vh; }
canvas { display: block; }

.ui-overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 20px;
  background: linear-gradient(transparent, rgba(0,0,0,0.6) 30%);
  pointer-events: none;
}
.ui-overlay > * { pointer-events: auto; }

.style-buttons {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.style-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  color: white;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.3s;
}
.style-btn:hover { background: rgba(255,255,255,0.3); transform: translateY(-2px); }
.style-btn.active { border-color: #FFD700; background: rgba(255,215,0,0.25); box-shadow: 0 0 15px rgba(255,215,0,0.3); }
.color-swatch {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.5);
}

.controls-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.control-group {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(10px);
  padding: 6px 12px;
  border-radius: 20px;
}
.control-group label {
  color: rgba(255,255,255,0.8);
  font-size: 12px;
  white-space: nowrap;
}
.control-group input[type="range"] {
  width: 120px;
  accent-color: #FFD700;
}

.action-btn {
  padding: 10px 22px;
  border: none;
  border-radius: 25px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.action-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

#try-on-btn {
  background: linear-gradient(135deg, #FFD700, #FFA500);
  color: #111;
}
#zoom-btn {
  background: rgba(255,255,255,0.2);
  color: white;
  border: 1px solid rgba(255,255,255,0.3);
}
#add-to-cart-btn {
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  color: white;
}

.price-cart-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-bottom: 8px;
}
#price-display {
  color: #FFD700;
  font-size: 24px;
  font-weight: 700;
  text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}
#cart-count {
  color: white;
  font-size: 14px;
  background: rgba(255,255,255,0.15);
  padding: 4px 12px;
  border-radius: 15px;
}

.top-info {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  color: #555;
  font-size: 14px;
  text-align: center;
  opacity: 0.7;
}
</style>
</head>
<body>
<div id="canvas-container"></div>

<div class="top-info">Press 1-5 for styles • T to try on • Z to zoom</div>

<div class="ui-overlay">
  <div class="style-buttons">
    <button class="style-btn active" id="style-btn-0">
      <span class="color-swatch" style="background:#111111"></span>Classic Black
    </button>
    <button class="style-btn" id="style-btn-1">
      <span class="color-swatch" style="background:#DAA520"></span>Aviator Gold
    </button>
    <button class="style-btn" id="style-btn-2">
      <span class="color-swatch" style="background:#CC0000"></span>Sport Red
    </button>
    <button class="style-btn" id="style-btn-3">
      <span class="color-swatch" style="background:#1E3A8A"></span>Retro Blue
    </button>
    <button class="style-btn" id="style-btn-4">
      <span class="color-swatch" style="background:#FFFFFF"></span>Transparent
    </button>
  </div>

  <div class="controls-row">
    <div class="control-group">
      <label>Lens Opacity</label>
      <input type="range" id="lens-opacity-slider" min="0" max="100" step="1" value="70">
    </div>
    <div class="control-group">
      <label>Head Rotation</label>
      <input type="range" id="head-rotation-slider" min="-180" max="180" step="1" value="0">
    </div>
  </div>

  <div class="price-cart-row">
    <span id="price-display">$29</span>
    <button class="action-btn" id="try-on-btn">Try On</button>
    <button class="action-btn" id="zoom-btn">🔍 Zoom In</button>
    <button class="action-btn" id="add-to-cart-btn">🛒 Add to Cart</button>
    <span id="cart-count">Cart: 0</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// State
window.__3D_STATE__ = {
  selectedStyle: 0,
  isWorn: false,
  isAnimating: false,
  lensOpacity: 0.7,
  headRotationY: 0,
  cameraZ: 6,
  isZoomed: false,
  cartCount: 0,
  currentPrice: 29,
  frameColor: '#111111',
  lensColor: '#333333',
  sunglassesY: 2.5
};

const styles = [
  { name: 'Classic Black', frameColor: '#111111', lensColor: '#333333', opacity: 0.7, price: 29 },
  { name: 'Aviator Gold', frameColor: '#DAA520', lensColor: '#2E5D2E', opacity: 0.6, price: 49 },
  { name: 'Sport Red', frameColor: '#CC0000', lensColor: '#FF6600', opacity: 0.5, price: 39 },
  { name: 'Retro Blue', frameColor: '#1E3A8A', lensColor: '#4488CC', opacity: 0.65, price: 35 },
  { name: 'Transparent', frameColor: '#FFFFFF', lensColor: '#FFFFFF', opacity: 0.15, price: 19 }
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xF5F5F5);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0, 6);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(3, 5, 4);
scene.add(dirLight);

// Add a subtle fill light
const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(-3, 2, 4);
scene.add(fillLight);

// Head group
const headGroup = new THREE.Group();
scene.add(headGroup);

// Head
const headGeo = new THREE.SphereGeometry(1.5, 64, 64);
const headMat = new THREE.MeshPhongMaterial({ color: 0xEDCBA0, shininess: 30 });
const headMesh = new THREE.Mesh(headGeo, headMat);
headGroup.add(headMesh);

// Eyes
const eyeGeo = new THREE.SphereGeometry(0.18, 32, 32);
const eyeMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
leftEye.position.set(-0.45, 0.15, 1.35);
headGroup.add(leftEye);

const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
rightEye.position.set(0.45, 0.15, 1.35);
headGroup.add(rightEye);

// Eye whites
const eyeWhiteGeo = new THREE.SphereGeometry(0.22, 32, 32);
const eyeWhiteMat = new THREE.MeshPhongMaterial({ color: 0xFFFFFF });
const leftEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
leftEyeWhite.position.set(-0.45, 0.15, 1.3);
headGroup.add(leftEyeWhite);
const rightEyeWhite = new THREE.Mesh(eyeWhiteGeo, eyeWhiteMat);
rightEyeWhite.position.set(0.45, 0.15, 1.3);
headGroup.add(rightEyeWhite);

// Nose
const noseGeo = new THREE.SphereGeometry(0.15, 32, 32);
const noseMat = new THREE.MeshPhongMaterial({ color: 0xDEB887 });
const nose = new THREE.Mesh(noseGeo, noseMat);
nose.position.set(0, -0.15, 1.5);
headGroup.add(nose);

// Ears
const earGeo = new THREE.TorusGeometry(0.2, 0.08, 16, 32);
const earMat = new THREE.MeshPhongMaterial({ color: 0xDEB887 });
const leftEar = new THREE.Mesh(earGeo, earMat);
leftEar.position.set(-1.5, 0.1, 0);
leftEar.rotation.y = Math.PI / 2;
headGroup.add(leftEar);

const rightEar = new THREE.Mesh(earGeo, earMat);
rightEar.position.set(1.5, 0.1, 0);
rightEar.rotation.y = Math.PI / 2;
headGroup.add(rightEar);

// Neck
const neckGeo = new THREE.CylinderGeometry(0.5, 0.6, 0.8, 32);
const neckMat = new THREE.MeshPhongMaterial({ color: 0xEDCBA0 });
const neck = new THREE.Mesh(neckGeo, neckMat);
neck.position.set(0, -1.8, 0);
headGroup.add(neck);

// Eyebrows
const eyebrowGeo = new THREE.BoxGeometry(0.35, 0.05, 0.05);
const eyebrowMat = new THREE.MeshPhongMaterial({ color: 0x5C4033 });
const leftBrow = new THREE.Mesh(eyebrowGeo, eyebrowMat);
leftBrow.position.set(-0.45, 0.42, 1.38);
leftBrow.rotation.z = 0.1;
headGroup.add(leftBrow);
const rightBrow = new THREE.Mesh(eyebrowGeo, eyebrowMat);
rightBrow.position.set(0.45, 0.42, 1.38);
rightBrow.rotation.z = -0.1;
headGroup.add(rightBrow);

// Mouth
const mouthShape = new THREE.Shape();
mouthShape.moveTo(-0.25, 0);
mouthShape.quadraticCurveTo(0, -0.1, 0.25, 0);
const mouthGeo = new THREE.ShapeGeometry(mouthShape);
const mouthMat = new THREE.MeshPhongMaterial({ color: 0xCC6666, side: THREE.DoubleSide });
const mouth = new THREE.Mesh(mouthGeo, mouthMat);
mouth.position.set(0, -0.55, 1.45);
headGroup.add(mouth);

// Hair (simple cap)
const hairGeo = new THREE.SphereGeometry(1.55, 64, 64, 0, Math.PI * 2, 0, Math.PI * 0.55);
const hairMat = new THREE.MeshPhongMaterial({ color: 0x3B2507 });
const hair = new THREE.Mesh(hairGeo, hairMat);
hair.position.set(0, 0.05, -0.05);
headGroup.add(hair);

// ---- Sunglasses Group ----
const sunglassesGroup = new THREE.Group();
sunglassesGroup.position.y = 2.5;

// Frame material
const frameMat = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 80 });

// Helper: create rounded box-like frame
function createLensFrame(x) {
  const frameGroup = new THREE.Group();
  
  // Outer frame using a torus-like ring
  const outerGeo = new THREE.BoxGeometry(0.7, 0.55, 0.1);
  // Round it by using a higher-detail approach
  const outerFrame = new THREE.Mesh(outerGeo, frameMat);
  outerFrame.position.set(x, 0.15, 1.55);
  
  // Create frame border using edges
  const borderThickness = 0.06;
  
  // Top
  const topGeo = new THREE.BoxGeometry(0.7, borderThickness, 0.1);
  const top = new THREE.Mesh(topGeo, frameMat);
  top.position.set(x, 0.15 + 0.55/2 - borderThickness/2, 1.55);
  frameGroup.add(top);
  
  // Bottom
  const bottom = new THREE.Mesh(topGeo, frameMat);
  bottom.position.set(x, 0.15 - 0.55/2 + borderThickness/2, 1.55);
  frameGroup.add(bottom);
  
  // Left
  const sideGeo = new THREE.BoxGeometry(borderThickness, 0.55, 0.1);
  const left = new THREE.Mesh(sideGeo, frameMat);
  left.position.set(x - 0.7/2 + borderThickness/2, 0.15, 1.55);
  frameGroup.add(left);
  
  // Right
  const right = new THREE.Mesh(sideGeo, frameMat);
  right.position.set(x + 0.7/2 - borderThickness/2, 0.15, 1.55);
  frameGroup.add(right);
  
  return frameGroup;
}

const leftFrame = createLensFrame(-0.5);
sunglassesGroup.add(leftFrame);
const rightFrame = createLensFrame(0.5);
sunglassesGroup.add(rightFrame);

// Bridge
const bridgeGeo = new THREE.CylinderGeometry(0.025, 0.025, 0.3, 16);
const bridge = new THREE.Mesh(bridgeGeo, frameMat);
bridge.rotation.z = Math.PI / 2;
bridge.position.set(0, 0.15, 1.58);
sunglassesGroup.add(bridge);

// Bridge curve (decorative arc)
const bridgeCurveGeo = new THREE.TorusGeometry(0.12, 0.02, 8, 16, Math.PI);
const bridgeCurve = new THREE.Mesh(bridgeCurveGeo, frameMat);
bridgeCurve.position.set(0, 0.08, 1.58);
bridgeCurve.rotation.x = Math.PI;
sunglassesGroup.add(bridgeCurve);

// Temple arms
function createTempleArm(side) {
  const armGroup = new THREE.Group();
  
  // Hinge part
  const hingeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.15);
  const hinge = new THREE.Mesh(hingeGeo, frameMat);
  hinge.position.set(side * 0.85, 0.2, 1.5);
  armGroup.add(hinge);
  
  // Main arm - goes from lens edge back to ear
  const armLength = 1.8;
  const armGeo = new THREE.BoxGeometry(0.04, 0.06, armLength);
  const arm = new THREE.Mesh(armGeo, frameMat);
  arm.position.set(side * 0.87, 0.18, 1.5 - armLength/2);
  armGroup.add(arm);
  
  // Ear hook (curved end)
  const hookGeo = new THREE.BoxGeometry(0.04, 0.3, 0.04);
  const hook = new THREE.Mesh(hookGeo, frameMat);
  hook.position.set(side * 0.87, 0.05, 1.5 - armLength);
  armGroup.add(hook);
  
  return armGroup;
}

const leftArm = createTempleArm(-1);
sunglassesGroup.add(leftArm);
const rightArm = createTempleArm(1);
sunglassesGroup.add(rightArm);

// Lenses
const lensMat = new THREE.MeshPhongMaterial({ 
  color: 0x333333, 
  transparent: true, 
  opacity: 0.7,
  shininess: 100,
  side: THREE.DoubleSide
});

const lensGeo = new THREE.PlaneGeometry(0.58, 0.43);

const leftLens = new THREE.Mesh(lensGeo, lensMat);
leftLens.position.set(-0.5, 0.15, 1.56);
sunglassesGroup.add(leftLens);

const rightLens = new THREE.Mesh(lensGeo, lensMat);
rightLens.position.set(0.5, 0.15, 1.56);
sunglassesGroup.add(rightLens);

// Lens reflection highlight
const reflectGeo = new THREE.PlaneGeometry(0.15, 0.08);
const reflectMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
const leftReflect = new THREE.Mesh(reflectGeo, reflectMat);
leftReflect.position.set(-0.35, 0.25, 1.57);
leftReflect.rotation.z = 0.3;
sunglassesGroup.add(leftReflect);
const rightReflect = new THREE.Mesh(reflectGeo, reflectMat);
rightReflect.position.set(0.35, 0.25, 1.57);
rightReflect.rotation.z = -0.3;
sunglassesGroup.add(rightReflect);

headGroup.add(sunglassesGroup);

// Collect all frame meshes for color changes
function getAllFrameMeshes() {
  const meshes = [];
  function traverse(obj) {
    if (obj.isMesh && obj.material === frameMat) {
      meshes.push(obj);
    }
    obj.children.forEach(c => traverse(c));
  }
  traverse(sunglassesGroup);
  return meshes;
}

// Style application
function applyStyle(index) {
  const style = styles[index];
  window.__3D_STATE__.selectedStyle = index;
  window.__3D_STATE__.currentPrice = style.price;
  window.__3D_STATE__.frameColor = style.frameColor;
  window.__3D_STATE__.lensColor = style.lensColor;
  
  frameMat.color.set(style.frameColor);
  lensMat.color.set(style.lensColor);
  
  // Only set opacity if slider hasn't been manually adjusted
  const slider = document.getElementById('lens-opacity-slider');
  slider.value = Math.round(style.opacity * 100);
  lensMat.opacity = style.opacity;
  window.__3D_STATE__.lensOpacity = style.opacity;
  
  // Update UI
  document.getElementById('price-display').textContent = '$' + style.price;
  
  document.querySelectorAll('.style-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });
}

// Animation system
let animations = [];

function animateTo(obj, prop, target, duration, easing) {
  return new Promise(resolve => {
    const start = prop.split('.').reduce((o, k) => o[k], obj);
    const startTime = performance.now();
    animations.push({
      update: (now) => {
        const elapsed = (now - startTime) / (duration * 1000);
        if (elapsed >= 1) {
          const keys = prop.split('.');
          let ref = obj;
          for (let i = 0; i < keys.length - 1; i++) ref = ref[keys[i]];
          ref[keys[keys.length - 1]] = target;
          resolve();
          return true; // done
        }
        // Ease out cubic
        const t = easing === 'easeOut' ? 1 - Math.pow(1 - elapsed, 3) : elapsed;
        const value = start + (target - start) * t;
        const keys = prop.split('.');
        let ref = obj;
        for (let i = 0; i < keys.length - 1; i++) ref = ref[keys[i]];
        ref[keys[keys.length - 1]] = value;
        return false;
      }
    });
  });
}

// Try on / Remove
function toggleTryOn() {
  if (window.__3D_STATE__.isAnimating) return;
  
  const state = window.__3D_STATE__;
  state.isAnimating = true;
  
  const btn = document.getElementById('try-on-btn');
  
  if (!state.isWorn) {
    animateTo(sunglassesGroup.position, 'y', 0.0, 0.5, 'easeOut').then(() => {
      state.isWorn = true;
      state.isAnimating = false;
      btn.textContent = 'Remove';
    });
  } else {
    animateTo(sunglassesGroup.position, 'y', 2.5, 0.5, 'easeOut').then(() => {
      state.isWorn = false;
      state.isAnimating = false;
      btn.textContent = 'Try On';
    });
  }
}

// Zoom
function toggleZoom() {
  if (window.__3D_STATE__.isZoomed) {
    animateTo(camera.position, 'z', 6, 0.3, 'easeOut');
    window.__3D_STATE__.isZoomed = false;
    document.getElementById('zoom-btn').textContent = '🔍 Zoom In';
  } else {
    animateTo(camera.position, 'z', 3.5, 0.3, 'easeOut');
    window.__3D_STATE__.isZoomed = true;
    document.getElementById('zoom-btn').textContent = '🔍 Zoom Out';
  }
}

// Event listeners
for (let i = 0; i < 5; i++) {
  document.getElementById('style-btn-' + i).addEventListener('click', () => applyStyle(i));
}

document.getElementById('try-on-btn').addEventListener('click', toggleTryOn);
document.getElementById('zoom-btn').addEventListener('click', toggleZoom);

document.getElementById('add-to-cart-btn').addEventListener('click', () => {
  window.__3D_STATE__.cartCount++;
  document.getElementById('cart-count').textContent = 'Cart: ' + window.__3D_STATE__.cartCount;
  
  // Flash effect
  const btn = document.getElementById('add-to-cart-btn');
  btn.style.transform = 'scale(1.1)';
  setTimeout(() => btn.style.transform = '', 200);
});

document.getElementById('lens-opacity-slider').addEventListener('input', (e) => {
  const val = e.target.value / 100;
  lensMat.opacity = val;
  window.__3D_STATE__.lensOpacity = val;
});

document.getElementById('head-rotation-slider').addEventListener('input', (e) => {
  const deg = parseFloat(e.target.value);
  window.__3D_STATE__.headRotationY = deg;
  headGroup.rotation.y = deg * Math.PI / 180;
});

// Keyboard
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key >= '1' && key <= '5') {
    applyStyle(parseInt(key) - 1);
  } else if (key === 't') {
    toggleTryOn();
  } else if (key === 'z') {
    toggleZoom();
  }
});

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate(now) {
  requestAnimationFrame(animate);
  
  // Process animations
  animations = animations.filter(anim => !anim.update(now));
  
  // Subtle idle animation for sunglasses when not worn
  if (!window.__3D_STATE__.isWorn && !window.__3D_STATE__.isAnimating) {
    sunglassesGroup.position.y = 2.5 + Math.sin(now * 0.002) * 0.08;
    sunglassesGroup.rotation.y = Math.sin(now * 0.001) * 0.1;
  } else if (window.__3D_STATE__.isWorn && !window.__3D_STATE__.isAnimating) {
    sunglassesGroup.rotation.y = 0;
  }
  
  // Update state
  const state = window.__3D_STATE__;
  state.sunglassesY = sunglassesGroup.position.y;
  state.cameraZ = camera.position.z;
  state.headRotationY = headGroup.rotation.y * 180 / Math.PI;
  state.lensOpacity = lensMat.opacity;
  
  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
