<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Advanced Solar Eclipse Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000511;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.5);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      min-width: 250px;
      z-index: 10;
      transition: background 0.2s ease;
    }

    #hud.flash {
      background: rgba(0, 180, 80, 0.85);
    }

    #btn-camera-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 10px 14px;
      background: #333;
      color: white;
      border: 1px solid #666;
      border-radius: 6px;
      cursor: pointer;
      z-index: 10;
    }

    #btn-camera-toggle:hover {
      background: #444;
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #bbb;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="btn-camera-toggle">Toggle Camera</button>
  <div id="info">
    Controls: ↑/↓ Moon Speed · Space Pause · R Reset · F Fish Toggle · Click Moon Trail
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, raycaster, mouse;
    let sun, earth, moon, fishGroup = null, fishWireframe = null;
    let moonTrail, moonTrailPositions = [];
    let ambientLight;
    let frameCount = 0;

    let moonAngle = 0;
    let moonSpeed = 0.01;
    let eclipseScore = 0;
    let totalScore = 0;
    let eclipseCount = 0;
    let bestEclipseScore = 0;
    let isPaused = false;
    let fishVisible = true;
    let moonTrailVisible = false;
    let cameraMode = 'perspective';
    let fishLoaded = false;
    let lastAbovePerfect = false;

    const SUN_X = 200;
    const EARTH_X = 0;
    const MOON_ORBIT_RADIUS = 35;
    const hud = document.getElementById('hud');
    const cameraToggleBtn = document.getElementById('btn-camera-toggle');

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000511);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        2000
      );
      camera.position.set(0, 50, 150);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      raycaster = new THREE.Raycaster();
      mouse = new THREE.Vector2();

      ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
      scene.add(ambientLight);

      createStarfield();
      createSun();
      createEarth();
      createMoon();
      createMoonTrail();
      loadFish();

      window.addEventListener('resize', onWindowResize);
      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('click', onClick);
      cameraToggleBtn.addEventListener('click', toggleCamera);

      updateMoonPosition();
      updateHUD();
      updateState();
    }

    function createStarfield() {
      const starCount = 500;
      const positions = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount; i++) {
        const r = 500 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);

        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.5,
        sizeAttenuation: true
      });

      const stars = new THREE.Points(geometry, material);
      scene.add(stars);
    }

    function createSun() {
      const sunGroup = new THREE.Group();

      const sunGeometry = new THREE.SphereGeometry(15, 32, 32);
      const sunMaterial = new THREE.MeshPhongMaterial({
        color: 0xffdd44,
        emissive: 0xffcc33,
        emissiveIntensity: 1.4
      });
      sun = new THREE.Mesh(sunGeometry, sunMaterial);
      sun.position.set(SUN_X, 0, 0);

      const sunLight = new THREE.PointLight(0xffffaa, 2, 1000);
      sunLight.position.set(0, 0, 0);
      sun.add(sunLight);

      const glowGeometry = new THREE.SphereGeometry(22, 32, 32);
      const glowMaterial = new THREE.MeshBasicMaterial({
        color: 0xffee88,
        transparent: true,
        opacity: 0.12,
        blending: THREE.AdditiveBlending,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const glow = new THREE.Mesh(glowGeometry, glowMaterial);
      glow.position.copy(sun.position);

      scene.add(sun);
      scene.add(glow);
    }

    function createEarth() {
      const earthGeometry = new THREE.SphereGeometry(8, 32, 32);
      const earthMaterial = new THREE.MeshPhongMaterial({
        color: 0x2244aa,
        emissive: 0x112233,
        shininess: 20
      });
      earth = new THREE.Mesh(earthGeometry, earthMaterial);
      earth.position.set(0, 0, 0);
      scene.add(earth);
    }

    function createMoon() {
      const moonGeometry = new THREE.SphereGeometry(3, 32, 32);
      const moonMaterial = new THREE.MeshPhongMaterial({
        color: 0x888888,
        shininess: 10
      });
      moon = new THREE.Mesh(moonGeometry, moonMaterial);
      scene.add(moon);
    }

    function createMoonTrail() {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(100 * 3);
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const material = new THREE.LineBasicMaterial({
        color: 0xcccccc,
        transparent: true,
        opacity: 0.8
      });

      moonTrail = new THREE.Line(geometry, material);
      moonTrail.visible = false;
      scene.add(moonTrail);
    }

    function updateMoonTrail() {
      moonTrailPositions.push(moon.position.clone());
      if (moonTrailPositions.length > 100) moonTrailPositions.shift();

      const arr = moonTrail.geometry.attributes.position.array;
      for (let i = 0; i < 100; i++) {
        const p = moonTrailPositions[i] || moonTrailPositions[moonTrailPositions.length - 1] || new THREE.Vector3();
        arr[i * 3] = p.x;
        arr[i * 3 + 1] = p.y;
        arr[i * 3 + 2] = p.z;
      }
      moonTrail.geometry.attributes.position.needsUpdate = true;
    }

    function loadFish() {
      const loader = new GLTFLoader();
      loader.load(
        'BarramundiFish.glb',
        (gltf) => {
          fishGroup = new THREE.Group();
          const fish = gltf.scene;
          fish.scale.set(5, 5, 5);
          fish.position.set(-80, 60, -50);

          fish.traverse((child) => {
            if (child.isMesh) {
              child.material = child.material.clone();
              if ('emissive' in child.material) {
                child.material.emissive = new THREE.Color(0x224466);
                child.material.emissiveIntensity = 0.4;
              }
            }
          });

          fishGroup.add(fish);

          const wireGroup = new THREE.Group();
          fish.traverse((child) => {
            if (child.isMesh && child.geometry) {
              const edges = new THREE.EdgesGeometry(child.geometry);
              const line = new THREE.LineSegments(
                edges,
                new THREE.LineBasicMaterial({
                  color: 0x66ccff,
                  transparent: true,
                  opacity: 0.35
                })
              );
              line.position.copy(child.position);
              line.rotation.copy(child.rotation);
              line.scale.copy(child.scale);
              wireGroup.add(line);
            }
          });

          wireGroup.position.copy(fish.position);
          fish.position.set(0, 0, 0);

          fishGroup.add(wireGroup);
          fishGroup.visible = fishVisible;
          scene.add(fishGroup);

          fishWireframe = wireGroup;
          fishLoaded = true;
        },
        undefined,
        (err) => {
          console.warn('Failed to load BarramundiFish.glb:', err);
          fishLoaded = false;
        }
      );
    }

    function updateMoonPosition() {
      const x = MOON_ORBIT_RADIUS * Math.cos(moonAngle);
      const z = MOON_ORBIT_RADIUS * Math.sin(moonAngle);
      moon.position.set(x, 0, z);
    }

    function calculateEclipseScore() {
      const moonX = moon.position.x;
      const moonZ = moon.position.z;
      if (moonX > 0) {
        const raw = 100 - (Math.abs(moonZ) / 35) * 500;
        return THREE.MathUtils.clamp(raw, 0, 100);
      }
      return 0;
    }

    function handleScoring() {
      const currentlyAbovePerfect = eclipseScore >= 95;
      if (currentlyAbovePerfect && !lastAbovePerfect) {
        eclipseCount += 1;
        totalScore += eclipseScore;
        flashHUD();
      }
      lastAbovePerfect = currentlyAbovePerfect;
      if (eclipseScore > bestEclipseScore) bestEclipseScore = eclipseScore;
    }

    function flashHUD() {
      hud.classList.add('flash');
      setTimeout(() => hud.classList.remove('flash'), 500);
    }

    function updateHUD() {
      hud.innerHTML = `
        <div><strong>Eclipse Score:</strong> ${eclipseScore.toFixed(2)}</div>
        <div><strong>Total Score:</strong> ${totalScore.toFixed(2)}</div>
        <div><strong>Eclipse Count:</strong> ${eclipseCount}</div>
        <div><strong>Best Eclipse Score:</strong> ${bestEclipseScore.toFixed(2)}</div>
        <div><strong>Moon Speed:</strong> ${moonSpeed.toFixed(3)} rad/frame</div>
        <div><strong>Simulation Status:</strong> ${isPaused ? 'Paused' : 'Running'}</div>
      `;
    }

    function updateState() {
      window.__3D_STATE__ = {
        moonAngle,
        moonSpeed,
        moonX: moon.position.x,
        moonZ: moon.position.z,
        eclipseScore,
        totalScore,
        eclipseCount,
        bestEclipseScore,
        isPaused,
        fishVisible,
        moonTrailVisible,
        cameraMode,
        sunX: SUN_X,
        earthX: EARTH_X,
        frameCount,
        fishLoaded
      };
    }

    function onKeyDown(event) {
      switch (event.code) {
        case 'ArrowUp':
          moonSpeed = Math.min(0.05, moonSpeed + 0.002);
          break;
        case 'ArrowDown':
          moonSpeed = Math.max(0.001, moonSpeed - 0.002);
          break;
        case 'Space':
          isPaused = !isPaused;
          break;
        case 'KeyR':
          resetSimulation();
          break;
        case 'KeyF':
          fishVisible = !fishVisible;
          if (fishGroup) fishGroup.visible = fishVisible;
          break;
      }
      updateHUD();
      updateState();
    }

    function onClick(event) {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(moon, true);

      if (intersects.length > 0) {
        moonTrailVisible = !moonTrailVisible;
        moonTrail.visible = moonTrailVisible;
        updateState();
      }
    }

    function toggleCamera() {
      if (cameraMode === 'perspective') {
        cameraMode = 'topdown';
        camera.position.set(0, 200, 0.001);
        camera.lookAt(0, 0, 0);
      } else {
        cameraMode = 'perspective';
        camera.position.set(0, 50, 150);
        camera.lookAt(0, 0, 0);
      }
      updateState();
    }

    function resetSimulation() {
      moonAngle = 0;
      moonSpeed = 0.01;
      totalScore = 0;
      eclipseCount = 0;
      bestEclipseScore = 0;
      eclipseScore = 0;
      isPaused = false;
      lastAbovePerfect = false;
      moonTrailPositions = [];
      updateMoonPosition();
      updateMoonTrail();
      updateHUD();
      updateState();
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (!isPaused) {
        moonAngle += moonSpeed;
        updateMoonPosition();
        eclipseScore = calculateEclipseScore();
        handleScoring();
        updateMoonTrail();

        earth.rotation.y += 0.003;
        sun.rotation.y += 0.002;
      }

      if (fishGroup) {
        fishGroup.rotation.y += 0.005;
      }

      moonTrail.visible = moonTrailVisible;

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
