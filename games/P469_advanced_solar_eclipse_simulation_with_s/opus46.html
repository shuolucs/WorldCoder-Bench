<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Eclipse Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000511; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 0, 20, 0.8);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(100, 150, 255, 0.3);
    line-height: 1.8;
    transition: background 0.3s;
    z-index: 10;
    min-width: 280px;
  }
  
  #hud.flash {
    background: rgba(0, 180, 60, 0.8) !important;
  }
  
  #hud h3 {
    margin-bottom: 8px;
    color: #88aaff;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 150, 255, 0.3);
    padding-bottom: 5px;
  }
  
  #hud .label {
    color: #aabbcc;
  }
  
  #hud .value {
    color: #ffffff;
    font-weight: bold;
  }
  
  #hud .eclipse-active {
    color: #ffdd44;
    text-shadow: 0 0 10px #ffdd44;
  }
  
  #btn-camera-toggle {
    position: absolute;
    top: 10px;
    right: 10px;
    padding: 10px 20px;
    background: #333;
    color: white;
    border: 1px solid #666;
    border-radius: 5px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    z-index: 10;
    transition: background 0.2s;
  }
  
  #btn-camera-toggle:hover {
    background: #555;
  }
  
  #controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: rgba(255,255,255,0.5);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.6;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>☀️ Solar Eclipse Simulator</h3>
  <div><span class="label">Eclipse Score: </span><span class="value" id="hud-eclipse-score">0</span></div>
  <div><span class="label">Total Score: </span><span class="value" id="hud-total-score">0</span></div>
  <div><span class="label">Eclipse Count: </span><span class="value" id="hud-eclipse-count">0</span></div>
  <div><span class="label">Best Eclipse: </span><span class="value" id="hud-best-score">0</span></div>
  <div><span class="label">Moon Speed: </span><span class="value" id="hud-moon-speed">0.010</span></div>
  <div><span class="label">Status: </span><span class="value" id="hud-status">Running</span></div>
</div>

<button id="btn-camera-toggle">📷 Toggle Camera</button>

<div id="controls-help">
  [↑/↓] Speed &nbsp; [Space] Pause &nbsp; [R] Reset &nbsp; [F] Fish &nbsp; [Click Moon] Trail
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
let moonAngle = 0;
let moonSpeed = 0.01;
let eclipseScore = 0;
let totalScore = 0;
let eclipseCount = 0;
let bestEclipseScore = 0;
let isPaused = false;
let fishVisible = true;
let moonTrailVisible = false;
let cameraMode = 'perspective';
let frameCount = 0;
let fishLoaded = false;
let wasAbove95 = false;

const moonTrailPositions = [];
const MAX_TRAIL = 100;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000511);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 50, 150);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// --- Ambient Light ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.1);
scene.add(ambientLight);

// --- Starfield ---
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(500 * 3);
for (let i = 0; i < 500; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 400 + Math.random() * 100;
  starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
  starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
  starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, sizeAttenuation: true });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// --- Sun ---
const sunGeometry = new THREE.SphereGeometry(15, 64, 64);
const sunMaterial = new THREE.MeshBasicMaterial({
  color: 0xFFFF44,
  emissive: 0xFFFF00,
});
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
sun.position.set(200, 0, 0);
scene.add(sun);

// Sun glow sprite
const sunGlowCanvas = document.createElement('canvas');
sunGlowCanvas.width = 256;
sunGlowCanvas.height = 256;
const ctx = sunGlowCanvas.getContext('2d');
const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
gradient.addColorStop(0, 'rgba(255, 255, 100, 1.0)');
gradient.addColorStop(0.2, 'rgba(255, 220, 50, 0.6)');
gradient.addColorStop(0.5, 'rgba(255, 180, 20, 0.2)');
gradient.addColorStop(1, 'rgba(255, 150, 0, 0.0)');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 256, 256);
const sunGlowTexture = new THREE.CanvasTexture(sunGlowCanvas);
const sunGlowMaterial = new THREE.SpriteMaterial({
  map: sunGlowTexture,
  transparent: true,
  blending: THREE.AdditiveBlending,
  opacity: 0.8,
});
const sunGlow = new THREE.Sprite(sunGlowMaterial);
sunGlow.scale.set(80, 80, 1);
sun.add(sunGlow);

// Sun corona (larger glow)
const coronaMaterial = new THREE.SpriteMaterial({
  map: sunGlowTexture,
  transparent: true,
  blending: THREE.AdditiveBlending,
  opacity: 0.3,
});
const corona = new THREE.Sprite(coronaMaterial);
corona.scale.set(120, 120, 1);
sun.add(corona);

// Sun PointLight
const sunLight = new THREE.PointLight(0xFFFFAA, 2, 1000);
sun.add(sunLight);

// --- Earth ---
const earthGeometry = new THREE.SphereGeometry(8, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({
  color: 0x2244AA,
  emissive: 0x112233,
  shininess: 25,
  specular: 0x333333,
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
earth.position.set(0, 0, 0);
scene.add(earth);

// Earth atmosphere glow
const atmosphereGeometry = new THREE.SphereGeometry(8.5, 64, 64);
const atmosphereMaterial = new THREE.MeshBasicMaterial({
  color: 0x4488ff,
  transparent: true,
  opacity: 0.15,
  side: THREE.BackSide,
});
const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
earth.add(atmosphere);

// --- Moon ---
const moonGeometry = new THREE.SphereGeometry(3, 32, 32);
const moonMaterial = new THREE.MeshPhongMaterial({
  color: 0x888888,
  shininess: 5,
  specular: 0x222222,
});
const moon = new THREE.Mesh(moonGeometry, moonMaterial);
scene.add(moon);

// --- Moon orbit ring (visual guide) ---
const orbitCurve = new THREE.EllipseCurve(0, 0, 35, 35, 0, 2 * Math.PI, false, 0);
const orbitPoints = orbitCurve.getPoints(128);
const orbitGeometry = new THREE.BufferGeometry().setFromPoints(
  orbitPoints.map(p => new THREE.Vector3(p.x, 0, p.y))
);
const orbitLine = new THREE.Line(
  orbitGeometry,
  new THREE.LineBasicMaterial({ color: 0x334466, transparent: true, opacity: 0.3 })
);
scene.add(orbitLine);

// --- Moon Trail ---
const trailGeometry = new THREE.BufferGeometry();
const trailPositionsArray = new Float32Array(MAX_TRAIL * 3);
trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositionsArray, 3));
trailGeometry.setDrawRange(0, 0);
const trailMaterial = new THREE.LineBasicMaterial({
  color: 0x88aaff,
  transparent: true,
  opacity: 0.6,
});
const trailLine = new THREE.Line(trailGeometry, trailMaterial);
trailLine.visible = false;
scene.add(trailLine);

// --- Fish (Easter Egg Constellation) ---
let fishModel = null;
let fishGlow = null;

const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BarramundiFish/glTF-Binary/BarramundiFish.glb',
  (gltf) => {
    fishModel = gltf.scene;
    fishModel.scale.set(5, 5, 5);
    fishModel.position.set(-80, 60, -50);
    scene.add(fishModel);

    // Add wireframe glow
    fishModel.traverse((child) => {
      if (child.isMesh) {
        child.material.emissive = new THREE.Color(0x224466);
        child.material.emissiveIntensity = 0.5;
      }
    });

    // Wireframe overlay
    const fishBox = new THREE.Box3().setFromObject(fishModel);
    const fishSize = fishBox.getSize(new THREE.Vector3());
    const wireGeo = new THREE.BoxGeometry(fishSize.x, fishSize.y, fishSize.z);
    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x4488cc,
      wireframe: true,
      transparent: true,
      opacity: 0.3,
    });
    fishGlow = new THREE.Mesh(wireGeo, wireMat);
    fishModel.add(fishGlow);

    // Add constellation label
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 512;
    labelCanvas.height = 64;
    const lctx = labelCanvas.getContext('2d');
    lctx.fillStyle = 'rgba(100, 180, 255, 0.8)';
    lctx.font = '24px Courier New';
    lctx.textAlign = 'center';
    lctx.fillText('✦ Celestial Fish Constellation ✦', 256, 40);
    const labelTexture = new THREE.CanvasTexture(labelCanvas);
    const labelMat = new THREE.SpriteMaterial({ map: labelTexture, transparent: true, opacity: 0.7 });
    const labelSprite = new THREE.Sprite(labelMat);
    labelSprite.scale.set(30, 4, 1);
    labelSprite.position.set(0, 5, 0);
    fishModel.add(labelSprite);

    fishLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Fish model failed to load:', error);
    // Create placeholder
    const placeholderGeo = new THREE.ConeGeometry(3, 8, 4);
    const placeholderMat = new THREE.MeshBasicMaterial({
      color: 0x4488cc,
      wireframe: true,
      transparent: true,
      opacity: 0.5,
    });
    fishModel = new THREE.Mesh(placeholderGeo, placeholderMat);
    fishModel.scale.set(5, 5, 5);
    fishModel.position.set(-80, 60, -50);
    scene.add(fishModel);
    fishLoaded = true;
  }
);

// --- Raycaster for Moon click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(moon);
  if (intersects.length > 0) {
    moonTrailVisible = !moonTrailVisible;
    trailLine.visible = moonTrailVisible;
  }
});

// --- Camera Toggle ---
const cameraBtn = document.getElementById('btn-camera-toggle');
cameraBtn.addEventListener('click', () => {
  if (cameraMode === 'perspective') {
    cameraMode = 'topdown';
    camera.position.set(0, 200, 0);
    camera.lookAt(0, 0, 0);
  } else {
    cameraMode = 'perspective';
    camera.position.set(0, 50, 150);
    camera.lookAt(0, 0, 0);
  }
});

// --- Keyboard Controls ---
document.addEventListener('keydown', (event) => {
  switch (event.code) {
    case 'ArrowUp':
      moonSpeed = Math.min(0.05, moonSpeed + 0.002);
      break;
    case 'ArrowDown':
      moonSpeed = Math.max(0.001, moonSpeed - 0.002);
      break;
    case 'Space':
      event.preventDefault();
      isPaused = !isPaused;
      break;
    case 'KeyR':
      moonAngle = 0;
      moonSpeed = 0.01;
      totalScore = 0;
      eclipseCount = 0;
      bestEclipseScore = 0;
      eclipseScore = 0;
      isPaused = false;
      wasAbove95 = false;
      moonTrailPositions.length = 0;
      trailGeometry.setDrawRange(0, 0);
      break;
    case 'KeyF':
      fishVisible = !fishVisible;
      if (fishModel) fishModel.visible = fishVisible;
      break;
  }
});

// --- HUD Elements ---
const hudEl = document.getElementById('hud');
const hudEclipseScore = document.getElementById('hud-eclipse-score');
const hudTotalScore = document.getElementById('hud-total-score');
const hudEclipseCount = document.getElementById('hud-eclipse-count');
const hudBestScore = document.getElementById('hud-best-score');
const hudMoonSpeed = document.getElementById('hud-moon-speed');
const hudStatus = document.getElementById('hud-status');

let flashTimeout = null;

function flashHUD() {
  hudEl.classList.add('flash');
  if (flashTimeout) clearTimeout(flashTimeout);
  flashTimeout = setTimeout(() => {
    hudEl.classList.remove('flash');
  }, 500);
}

// --- Window State ---
window.__3D_STATE__ = {};

function updateState() {
  const moonX = moon.position.x;
  const moonZ = moon.position.z;
  
  window.__3D_STATE__ = {
    moonAngle,
    moonSpeed,
    moonX,
    moonZ,
    eclipseScore,
    totalScore,
    eclipseCount,
    bestEclipseScore,
    isPaused,
    fishVisible,
    moonTrailVisible,
    cameraMode,
    sunX: 200,
    earthX: 0,
    frameCount,
    fishLoaded,
  };
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Eclipse visual effect (shadow on earth) ---
const eclipseOverlayGeo = new THREE.SphereGeometry(8.2, 64, 64);
const eclipseOverlayMat = new THREE.MeshBasicMaterial({
  color: 0x000000,
  transparent: true,
  opacity: 0,
  side: THREE.FrontSide,
});
const eclipseOverlay = new THREE.Mesh(eclipseOverlayGeo, eclipseOverlayMat);
earth.add(eclipseOverlay);

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);
  frameCount++;

  if (!isPaused) {
    moonAngle += moonSpeed;

    // Moon position
    const mx = 35 * Math.cos(moonAngle);
    const mz = 35 * Math.sin(moonAngle);
    moon.position.set(mx, 0, mz);

    // Eclipse score calculation
    if (mx > 0) {
      eclipseScore = Math.max(0, 100 - (Math.abs(mz) / 35) * 500);
      eclipseScore = Math.min(100, Math.max(0, eclipseScore));
    } else {
      eclipseScore = 0;
    }

    // Scoring
    const isAbove95 = eclipseScore >= 95;
    if (isAbove95 && !wasAbove95) {
      eclipseCount++;
      totalScore += Math.round(eclipseScore);
      flashHUD();
    }
    if (eclipseScore > bestEclipseScore) {
      bestEclipseScore = Math.round(eclipseScore);
    }
    wasAbove95 = isAbove95;

    // Eclipse visual effect
    eclipseOverlayMat.opacity = (eclipseScore / 100) * 0.7;

    // Sun corona pulse during eclipse
    corona.material.opacity = 0.3 + (eclipseScore / 100) * 0.5;
    sunGlow.material.opacity = 0.8 - (eclipseScore / 100) * 0.3;

    // Moon trail
    moonTrailPositions.push(new THREE.Vector3(mx, 0, mz));
    if (moonTrailPositions.length > MAX_TRAIL) {
      moonTrailPositions.shift();
    }

    // Update trail geometry
    const posAttr = trailGeometry.getAttribute('position');
    for (let i = 0; i < moonTrailPositions.length; i++) {
      posAttr.setXYZ(i, moonTrailPositions[i].x, moonTrailPositions[i].y, moonTrailPositions[i].z);
    }
    posAttr.needsUpdate = true;
    trailGeometry.setDrawRange(0, moonTrailPositions.length);

    // Fish rotation
    if (fishModel) {
      fishModel.rotation.y += 0.005;
      if (fishGlow) {
        fishGlow.rotation.y += 0.01;
        fishGlow.rotation.x += 0.005;
      }
    }

    // Earth slow rotation
    earth.rotation.y += 0.002;

    // Stars subtle twinkle
    if (frameCount % 30 === 0) {
      starMaterial.size = 1.2 + Math.random() * 0.6;
    }
  }

  // Update HUD
  const scoreClass = eclipseScore >= 95 ? ' eclipse-active' : '';
  hudEclipseScore.className = 'value' + scoreClass;
  hudEclipseScore.textContent = Math.round(eclipseScore);
  hudTotalScore.textContent = totalScore;
  hudEclipseCount.textContent = eclipseCount;
  hudBestScore.textContent = bestEclipseScore;
  hudMoonSpeed.textContent = moonSpeed.toFixed(3);
  hudStatus.textContent = isPaused ? 'Paused ⏸' : 'Running ▶';
  hudStatus.style.color = isPaused ? '#ff8844' : '#44ff88';

  // Update global state
  updateState();

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
