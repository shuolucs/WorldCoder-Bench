<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Solar Eclipse Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000511;
            font-family: monospace;
            color: white;
            user-select: none;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 15px;
            background: rgba(0, 5, 17, 0.8);
            border: 1px solid #334466;
            border-radius: 5px;
            transition: background-color 0.1s ease;
            pointer-events: none;
            z-index: 10;
        }
        #hud.flash-green {
            background-color: rgba(0, 255, 0, 0.4);
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .value {
            color: #00ffff;
            font-weight: bold;
        }
        #btn-camera-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px 15px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            z-index: 10;
            transition: background 0.2s;
        }
        #btn-camera-toggle:hover {
            background: #555;
        }
        #controls-help {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 12px;
            color: #888;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-line">Status: <span id="ui-status" class="value">Running</span></div>
        <div class="hud-line">Eclipse Score: <span id="ui-score" class="value">0.00</span></div>
        <div class="hud-line">Total Score: <span id="ui-total" class="value">0.00</span></div>
        <div class="hud-line">Eclipse Count: <span id="ui-count" class="value">0</span></div>
        <div class="hud-line">Best Score: <span id="ui-best" class="value">0.00</span></div>
        <div class="hud-line">Moon Speed: <span id="ui-speed" class="value">0.010</span></div>
    </div>
    
    <button id="btn-camera-toggle">Toggle Camera</button>

    <div id="controls-help">
        [↑/↓] Speed | [Space] Pause | [R] Reset | [F] Toggle Fish | [Click Moon] Toggle Trail
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            moonAngle: 0,
            moonSpeed: 0.01,
            moonX: 35,
            moonZ: 0,
            eclipseScore: 0,
            totalScore: 0,
            eclipseCount: 0,
            bestEclipseScore: 0,
            isPaused: false,
            fishVisible: true,
            moonTrailVisible: false,
            cameraMode: 'perspective',
            sunX: 200,
            earthX: 0,
            frameCount: 0,
            fishLoaded: false
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000511);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 50, 150);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));

        // Sun
        const sunGeometry = new THREE.SphereGeometry(15, 32, 32);
        const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xFFFFAA });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.position.set(state.sunX, 0, 0);
        scene.add(sun);

        const sunLight = new THREE.PointLight(0xFFFFAA, 2, 1000);
        sun.add(sunLight);

        const sunGlowGeom = new THREE.SphereGeometry(18, 32, 32);
        const sunGlowMat = new THREE.MeshBasicMaterial({ 
            color: 0xFFFFAA, 
            transparent: true, 
            opacity: 0.2,
            side: THREE.BackSide
        });
        const sunGlow = new THREE.Mesh(sunGlowGeom, sunGlowMat);
        sun.add(sunGlow);

        // Earth
        const earthGeometry = new THREE.SphereGeometry(8, 32, 32);
        const earthMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x2244AA, 
            emissive: 0x112233,
            shininess: 10
        });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        scene.add(earth);

        // Moon
        const moonGeometry = new THREE.SphereGeometry(3, 32, 32);
        const moonMaterial = new THREE.MeshPhongMaterial({ color: 0x888888 });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        scene.add(moon);

        // Moon Trail
        const trailPositions = [];
        const maxTrailPoints = 100;
        const trailGeometry = new THREE.BufferGeometry();
        const trailMaterial = new THREE.LineBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.5 });
        const moonTrail = new THREE.Line(trailGeometry, trailMaterial);
        moonTrail.visible = false;
        scene.add(moonTrail);

        // Starfield
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1, sizeAttenuation: false });
        const starsVertices = [];
        for (let i = 0; i < 500; i++) {
            const r = 500 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            starsVertices.push(
                r * Math.sin(phi) * Math.cos(theta),
                r * Math.sin(phi) * Math.sin(theta),
                r * Math.cos(phi)
            );
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // Celestial Fish Constellation (Easter Egg)
        const fishGroup = new THREE.Group();
        fishGroup.position.set(-80, 60, -50);
        scene.add(fishGroup);

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/BarramundiFish.glb', (gltf) => {
            const fish = gltf.scene;
            fish.scale.set(5, 5, 5);
            
            // Add emissive wireframe effect
            fish.traverse((child) => {
                if (child.isMesh) {
                    child.material = new THREE.MeshBasicMaterial({
                        color: 0x000000
                    });
                    const wireframe = new THREE.LineSegments(
                        new THREE.WireframeGeometry(child.geometry),
                        new THREE.LineBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.6 })
                    );
                    child.add(wireframe);
                }
            });
            
            fishGroup.add(fish);
            state.fishLoaded = true;
        });

        // Interaction & Events
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'ArrowUp':
                    state.moonSpeed = Math.min(0.05, state.moonSpeed + 0.002);
                    break;
                case 'ArrowDown':
                    state.moonSpeed = Math.max(0.001, state.moonSpeed - 0.002);
                    break;
                case 'Space':
                    state.isPaused = !state.isPaused;
                    break;
                case 'KeyR':
                    state.moonAngle = 0;
                    state.moonSpeed = 0.01;
                    state.totalScore = 0;
                    state.eclipseCount = 0;
                    state.bestEclipseScore = 0;
                    state.isPaused = false;
                    trailPositions.length = 0;
                    trailGeometry.setFromPoints([]);
                    break;
                case 'KeyF':
                    state.fishVisible = !state.fishVisible;
                    break;
            }
        });

        window.addEventListener('click', (e) => {
            if (e.target.id === 'btn-camera-toggle') return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(moon);
            
            if (intersects.length > 0) {
                state.moonTrailVisible = !state.moonTrailVisible;
                moonTrail.visible = state.moonTrailVisible;
                if (!state.moonTrailVisible) {
                    trailPositions.length = 0;
                    trailGeometry.setFromPoints([]);
                }
            }
        });

        document.getElementById('btn-camera-toggle').addEventListener('click', () => {
            if (state.cameraMode === 'perspective') {
                camera.position.set(0, 200, 0);
                camera.lookAt(0, 0, 0);
                state.cameraMode = 'topdown';
            } else {
                camera.position.set(0, 50, 150);
                camera.lookAt(0, 0, 0);
                state.cameraMode = 'perspective';
            }
        });

        // UI Elements
        const uiStatus = document.getElementById('ui-status');
        const uiScore = document.getElementById('ui-score');
        const uiTotal = document.getElementById('ui-total');
        const uiCount = document.getElementById('ui-count');
        const uiBest = document.getElementById('ui-best');
        const uiSpeed = document.getElementById('ui-speed');
        const hud = document.getElementById('hud');

        let wasPerfectEclipse = false;

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            state.frameCount++;

            if (!state.isPaused) {
                state.moonAngle += state.moonSpeed;
            }

            // Orbital Mechanics
            state.moonX = 35 * Math.cos(state.moonAngle);
            state.moonZ = 35 * Math.sin(state.moonAngle);
            moon.position.set(state.moonX, 0, state.moonZ);

            // Trail Update
            if (state.moonTrailVisible && !state.isPaused) {
                trailPositions.push(new THREE.Vector3(state.moonX, 0, state.moonZ));
                if (trailPositions.length > maxTrailPoints) {
                    trailPositions.shift();
                }
                trailGeometry.setFromPoints(trailPositions);
            }

            // Eclipse Calculation
            let currentScore = 0;
            if (state.moonX > 0) {
                currentScore = Math.max(0, 100 - (Math.abs(state.moonZ) / 35) * 500);
                currentScore = Math.min(100, currentScore);
            }
            state.eclipseScore = currentScore;

            // Scoring Logic
            if (state.eclipseScore >= 95) {
                if (!wasPerfectEclipse) {
                    state.eclipseCount++;
                    state.totalScore += state.eclipseScore;
                    if (state.eclipseScore > state.bestEclipseScore) {
                        state.bestEclipseScore = state.eclipseScore;
                    }
                    
                    // Flash HUD
                    hud.classList.add('flash-green');
                    setTimeout(() => {
                        hud.classList.remove('flash-green');
                    }, 500);
                    
                    wasPerfectEclipse = true;
                } else {
                    // Update best score if it gets even better during the same pass
                    if (state.eclipseScore > state.bestEclipseScore) {
                        state.totalScore += (state.eclipseScore - state.bestEclipseScore); // Add difference
                        state.bestEclipseScore = state.eclipseScore;
                    }
                }
            } else {
                wasPerfectEclipse = false;
            }

            // Fish Animation
            if (state.fishLoaded) {
                fishGroup.rotation.y += 0.005;
                fishGroup.visible = state.fishVisible;
            }

            // Update UI
            uiStatus.innerText = state.isPaused ? "Paused" : "Running";
            uiStatus.style.color = state.isPaused ? "#ffaa00" : "#00ffff";
            uiScore.innerText = state.eclipseScore.toFixed(2);
            uiTotal.innerText = state.totalScore.toFixed(2);
            uiCount.innerText = state.eclipseCount;
            uiBest.innerText = state.bestEclipseScore.toFixed(2);
            uiSpeed.innerText = state.moonSpeed.toFixed(3);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
