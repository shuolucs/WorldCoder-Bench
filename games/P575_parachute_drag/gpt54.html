<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Parachute Descent Simulation</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      background: #87ceeb;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 6px;
      z-index: 100;
      pointer-events: none;
      line-height: 1.45;
      min-width: 240px;
    }

    #controls-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 14px;
      border-radius: 8px;
      z-index: 100;
      min-width: 250px;
      font-size: 14px;
    }

    #controls-panel h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      margin-bottom: 4px;
    }

    .control-group input[type="range"] {
      width: 100%;
    }

    .control-value {
      font-size: 12px;
      color: #ddd;
    }

    #help {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.45);
      color: white;
      padding: 10px 12px;
      border-radius: 6px;
      z-index: 100;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Altitude: <span id="hud-altitude">500.0</span> m</div>
    <div>Velocity: <span id="hud-velocity">0.0</span> m/s</div>
    <div>Terminal Velocity: <span id="hud-terminal">0.0</span> m/s</div>
    <div>Drag Force: <span id="hud-drag">0.0</span> N</div>
    <div>Phase: <span id="hud-phase">Freefall</span></div>
    <div>Frame Count: <span id="hud-framecount">0</span></div>
    <div>Paused: <span id="hud-paused">No</span></div>
  </div>

  <div id="help">
    <strong>Controls</strong><br>
    Space = Deploy parachute<br>
    R = Reset simulation<br>
    P = Pause / Unpause
  </div>

  <div id="controls-panel">
    <h3>Simulation Controls</h3>

    <div class="control-group">
      <label for="slider-area">Parachute Area</label>
      <input id="slider-area" type="range" min="10" max="80" value="30" step="1">
      <div class="control-value"><span id="value-area">30</span> m²</div>
    </div>

    <div class="control-group">
      <label for="slider-cd">Drag Coefficient</label>
      <input id="slider-cd" type="range" min="0.5" max="3.0" value="1.5" step="0.1">
      <div class="control-value"><span id="value-cd">1.5</span></div>
    </div>

    <div class="control-group">
      <label for="slider-mass">Skydiver Mass</label>
      <input id="slider-mass" type="range" min="50" max="120" value="80" step="1">
      <div class="control-value"><span id="value-mass">80</span> kg</div>
    </div>

    <div class="control-group">
      <label for="slider-timescale">Time Scale</label>
      <input id="slider-timescale" type="range" min="0.5" max="5.0" value="1.0" step="0.5">
      <div class="control-value"><span id="value-timescale">1.0</span>x</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // Scene
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xdff4ff, 150, 900);

    // Sky gradient background via shader sphere
    const skyGeo = new THREE.SphereGeometry(1000, 32, 16);
    const skyMat = new THREE.ShaderMaterial({
      side: THREE.BackSide,
      depthWrite: false,
      uniforms: {
        topColor: { value: new THREE.Color(0x87ceeb) },
        bottomColor: { value: new THREE.Color(0xffffff) },
        offset: { value: 50 },
        exponent: { value: 0.8 }
      },
      vertexShader: `
        varying vec3 vWorldPosition;
        void main() {
          vec4 worldPosition = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPosition.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 topColor;
        uniform vec3 bottomColor;
        uniform float offset;
        uniform float exponent;
        varying vec3 vWorldPosition;
        void main() {
          float h = normalize(vWorldPosition + offset).y;
          float t = max(pow(max(h, 0.0), exponent), 0.0);
          gl_FragColor = vec4(mix(bottomColor, topColor, t), 1.0);
        }
      `
    });
    const sky = new THREE.Mesh(skyGeo, skyMat);
    scene.add(sky);

    // Camera
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
    camera.position.set(15, 5, 15);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 500, 0);

    // Lights
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 20, 10);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -100;
    dirLight.shadow.camera.right = 100;
    dirLight.shadow.camera.top = 100;
    dirLight.shadow.camera.bottom = -100;
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({ color: 0x4caf50 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 40, 0xffffff, 0xffffff);
    grid.position.y = 0.02;
    grid.material.transparent = true;
    grid.material.opacity = 0.25;
    scene.add(grid);

    // Clouds
    const clouds = new THREE.Group();
    scene.add(clouds);

    function createCloud(x, y, z, scale = 1) {
      const group = new THREE.Group();
      const cloudMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.7,
        roughness: 1
      });
      const parts = [
        [-1.2, 0, 0, 1.4],
        [0, 0.3, 0, 1.8],
        [1.3, 0, 0, 1.3],
        [0.3, -0.2, 0.5, 1.1]
      ];
      parts.forEach(([px, py, pz, s]) => {
        const m = new THREE.Mesh(new THREE.SphereGeometry(s, 16, 12), cloudMat);
        m.position.set(px, py, pz);
        group.add(m);
      });
      group.position.set(x, y, z);
      group.scale.setScalar(scale);
      clouds.add(group);
    }

    for (let i = 0; i < 18; i++) {
      createCloud(
        (Math.random() - 0.5) * 120,
        40 + Math.random() * 500,
        (Math.random() - 0.5) * 120,
        1.5 + Math.random() * 2.5
      );
    }

    // Skydiver group
    const skydiverGroup = new THREE.Group();
    skydiverGroup.position.set(0, 500, 0);
    scene.add(skydiverGroup);

    // Placeholder body
    const placeholder = new THREE.Mesh(
      new THREE.CapsuleGeometry(0.35, 1.3, 6, 12),
      new THREE.MeshStandardMaterial({ color: 0x3344ff })
    );
    placeholder.castShadow = true;
    placeholder.visible = true;
    skydiverGroup.add(placeholder);

    let soldierModel = null;
    const loader = new GLTFLoader();
    loader.load(
      'https://raw.githubusercontent.com/nicobailon/CodingWithVision/main/shared_assets/glb/soldier.glb',
      (gltf) => {
        soldierModel = gltf.scene;
        soldierModel.scale.setScalar(2.0);
        soldierModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        placeholder.visible = false;
        skydiverGroup.add(soldierModel);
      },
      undefined,
      (err) => {
        console.warn('Failed to load soldier.glb, using placeholder.', err);
      }
    );

    // Parachute setup
    const parachuteGroup = new THREE.Group();
    skydiverGroup.add(parachuteGroup);

    const canopyRadius = 3.2;
    const canopyGeo = new THREE.SphereGeometry(
      canopyRadius,
      32,
      16,
      0,
      Math.PI * 2,
      0,
      Math.PI / 2
    );

    const canopyMat = new THREE.MeshStandardMaterial({
      color: 0xff6600,
      transparent: true,
      opacity: 0.8,
      side: THREE.DoubleSide,
      roughness: 0.7,
      metalness: 0.0
    });

    const canopy = new THREE.Mesh(canopyGeo, canopyMat);
    canopy.position.set(0, 4.3, 0);
    canopy.castShadow = true;
    parachuteGroup.add(canopy);

    const baseCanopyPositions = canopy.geometry.attributes.position.array.slice();

    // Shroud lines
    const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
    const shroudLines = [];
    const lineAnchorLocal = new THREE.Vector3(0, 1.2, 0);

    for (let i = 0; i < 8; i++) {
      const geo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
      const line = new THREE.Line(geo, lineMaterial);
      shroudLines.push(line);
      parachuteGroup.add(line);
    }

    parachuteGroup.scale.setScalar(0);

    function updateShroudLines() {
      const rimY = 4.3;
      const target = lineAnchorLocal.clone();
      for (let i = 0; i < shroudLines.length; i++) {
        const angle = (i / shroudLines.length) * Math.PI * 2;
        const rim = new THREE.Vector3(
          Math.cos(angle) * canopyRadius * parachuteGroup.scale.x,
          rimY,
          Math.sin(angle) * canopyRadius * parachuteGroup.scale.z
        );
        const positions = shroudLines[i].geometry.attributes.position.array;
        positions[0] = rim.x;
        positions[1] = rim.y;
        positions[2] = rim.z;
        positions[3] = target.x;
        positions[4] = target.y;
        positions[5] = target.z;
        shroudLines[i].geometry.attributes.position.needsUpdate = true;
      }
    }

    // Trail
    const maxTrailPoints = 60;
    const trailPositions = new Float32Array(maxTrailPoints * 3);
    const trailGeo = new THREE.BufferGeometry();
    trailGeo.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
    const trailMat = new THREE.LineBasicMaterial({
      color: 0x00ffff,
      transparent: true,
      opacity: 0.6
    });
    const trailLine = new THREE.Line(trailGeo, trailMat);
    scene.add(trailLine);

    let trailHistory = [];

    function updateTrail() {
      trailHistory.unshift(skydiverGroup.position.clone());
      if (trailHistory.length > maxTrailPoints) trailHistory.pop();

      for (let i = 0; i < maxTrailPoints; i++) {
        const p = trailHistory[i] || skydiverGroup.position;
        trailPositions[i * 3 + 0] = p.x;
        trailPositions[i * 3 + 1] = p.y;
        trailPositions[i * 3 + 2] = p.z;
      }
      trailGeo.attributes.position.needsUpdate = true;
    }

    // Wind streamlines
    const windGroup = new THREE.Group();
    scene.add(windGroup);
    const windParticles = [];

    for (let i = 0; i < 18; i++) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, -0.8, 0),
        new THREE.Vector3(0, 0.8, 0)
      ]);
      const mat = new THREE.LineBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.35
      });
      const line = new THREE.Line(geo, mat);
      windGroup.add(line);
      windParticles.push({
        line,
        offset: new THREE.Vector3(
          (Math.random() - 0.5) * 6,
          (Math.random() - 0.5) * 12,
          (Math.random() - 0.5) * 6
        ),
        phase: Math.random() * Math.PI * 2
      });
    }

    function updateWind(dt, speed) {
      windParticles.forEach((p, i) => {
        p.phase += dt * (1.5 + speed * 0.03 + i * 0.01);
        let yOffset = ((p.phase * 8) % 16) - 8;
        p.line.position.set(
          skydiverGroup.position.x + p.offset.x + Math.sin(p.phase * 1.7) * 0.4,
          skydiverGroup.position.y + yOffset + p.offset.y * 0.2,
          skydiverGroup.position.z + p.offset.z + Math.cos(p.phase * 1.3) * 0.4
        );
      });
    }

    // Physics constants and state
    const G = 9.81;
    const RHO = 1.225;
    const BODY_CD = 0.5;
    const BODY_A = 0.7;

    const state = {
      frameCount: 0,
      isPaused: false,
      altitude: 500,
      velocity: 0, // positive downward
      terminalVelocity: 0,
      dragForce: 0,
      phase: 'freefall',
      parachuteArea: 30,
      dragCoefficient: 1.5,
      mass: 80,
      timeScale: 1.0,
      parachuteDeployed: false,
      elapsedTime: 0,
      deployTimer: 0,
      isValid: true
    };

    // UI elements
    const sliderArea = document.getElementById('slider-area');
    const sliderCd = document.getElementById('slider-cd');
    const sliderMass = document.getElementById('slider-mass');
    const sliderTimeScale = document.getElementById('slider-timescale');

    const valueArea = document.getElementById('value-area');
    const valueCd = document.getElementById('value-cd');
    const valueMass = document.getElementById('value-mass');
    const valueTimeScale = document.getElementById('value-timescale');

    const hudAltitude = document.getElementById('hud-altitude');
    const hudVelocity = document.getElementById('hud-velocity');
    const hudTerminal = document.getElementById('hud-terminal');
    const hudDrag = document.getElementById('hud-drag');
    const hudPhase = document.getElementById('hud-phase');
    const hudFrameCount = document.getElementById('hud-framecount');
    const hudPaused = document.getElementById('hud-paused');

    function dispatchInput(el) {
      el.dispatchEvent(new Event('input', { bubbles: true }));
    }

    function syncUI() {
      sliderArea.value = state.parachuteArea;
      sliderCd.value = state.dragCoefficient;
      sliderMass.value = state.mass;
      sliderTimeScale.value = state.timeScale;
      dispatchInput(sliderArea);
      dispatchInput(sliderCd);
      dispatchInput(sliderMass);
      dispatchInput(sliderTimeScale);
    }

    sliderArea.addEventListener('input', () => {
      state.parachuteArea = parseFloat(sliderArea.value);
      valueArea.textContent = state.parachuteArea.toFixed(0);
    });

    sliderCd.addEventListener('input', () => {
      state.dragCoefficient = parseFloat(sliderCd.value);
      valueCd.textContent = state.dragCoefficient.toFixed(1);
    });

    sliderMass.addEventListener('input', () => {
      state.mass = parseFloat(sliderMass.value);
      valueMass.textContent = state.mass.toFixed(0);
    });

    sliderTimeScale.addEventListener('input', () => {
      state.timeScale = parseFloat(sliderTimeScale.value);
      valueTimeScale.textContent = state.timeScale.toFixed(1);
    });

    syncUI();

    function computeCurrentDragConfig() {
      if (state.phase === 'freefall') {
        return { Cd: BODY_CD, A: BODY_A };
      }
      if (state.phase === 'deploying') {
        const t = Math.min(state.deployTimer / 1.5, 1);
        const smooth = t * t * (3 - 2 * t);
        return {
          Cd: THREE.MathUtils.lerp(BODY_CD, state.dragCoefficient, smooth),
          A: THREE.MathUtils.lerp(BODY_A, state.parachuteArea, smooth)
        };
      }
      if (state.phase === 'descent' || state.phase === 'landed') {
        return { Cd: state.dragCoefficient, A: state.parachuteArea };
      }
      return { Cd: BODY_CD, A: BODY_A };
    }

    function computeTerminalVelocity(Cd, A, m) {
      return Math.sqrt((2 * m * G) / (Cd * A * RHO));
    }

    function resetSimulation() {
      state.frameCount = 0;
      state.isPaused = false;
      state.altitude = 500;
      state.velocity = 0;
      state.dragForce = 0;
      state.phase = 'freefall';
      state.parachuteDeployed = false;
      state.elapsedTime = 0;
      state.deployTimer = 0;
      state.isValid = true;

      skydiverGroup.position.set(0, 500, 0);
      skydiverGroup.rotation.set(-Math.PI / 6, 0, 0);

      parachuteGroup.scale.setScalar(0);
      trailHistory = [];
      updateTrail();
      updateShroudLines();
      updateHUD();
      updateGlobalState();
    }

    function deployParachute() {
      if (!state.parachuteDeployed && state.phase === 'freefall') {
        state.parachuteDeployed = true;
        state.phase = 'deploying';
        state.deployTimer = 0;
      }
    }

    function phaseLabel(phase) {
      switch (phase) {
        case 'freefall': return 'Freefall';
        case 'deploying': return 'Deploying';
        case 'descent': return 'Descent';
        case 'landed': return 'Landed';
        default: return phase;
      }
    }

    function updateHUD() {
      const cfg = computeCurrentDragConfig();
      state.terminalVelocity = computeTerminalVelocity(cfg.Cd, cfg.A, state.mass);

      hudAltitude.textContent = state.altitude.toFixed(1);
      hudVelocity.textContent = state.velocity.toFixed(1);
      hudTerminal.textContent = state.terminalVelocity.toFixed(1);
      hudDrag.textContent = state.dragForce.toFixed(1);
      hudPhase.textContent = phaseLabel(state.phase);
      hudFrameCount.textContent = state.frameCount.toString();
      hudPaused.textContent = state.isPaused ? 'Yes' : 'No';
    }

    function updateGlobalState() {
      const vals = [
        state.frameCount, state.altitude, state.velocity, state.terminalVelocity,
        state.dragForce, state.parachuteArea, state.dragCoefficient, state.mass,
        state.timeScale, state.elapsedTime
      ];
      state.isValid = vals.every(v => Number.isFinite(v));

      window.__3D_STATE__ = {
        frameCount: state.frameCount,
        isPaused: state.isPaused,
        altitude: state.altitude,
        velocity: state.velocity,
        terminalVelocity: state.terminalVelocity,
        dragForce: state.dragForce,
        phase: state.phase,
        parachuteArea: state.parachuteArea,
        dragCoefficient: state.dragCoefficient,
        mass: state.mass,
        timeScale: state.timeScale,
        parachuteDeployed: state.parachuteDeployed,
        elapsedTime: state.elapsedTime,
        isValid: state.isValid
      };
    }

    // Keyboard
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        deployParachute();
      } else if (e.code === 'KeyR') {
        resetSimulation();
      } else if (e.code === 'KeyP') {
        state.isPaused = !state.isPaused;
      }
    });

    // Animation timing
    const fixedDt = 1 / 60;
    let accumulator = 0;
    let lastTime = performance.now();

    function updatePhysics(dt) {
      if (state.phase === 'landed') {
        state.velocity = 0;
        state.dragForce = 0;
        return;
      }

      if (state.phase === 'deploying') {
        state.deployTimer += dt;
        if (state.deployTimer >= 1.5) {
          state.deployTimer = 1.5;
          state.phase = 'descent';
        }
      }

      const cfg = computeCurrentDragConfig();

      const gravityForce = state.mass * G;
      const dragForce = 0.5 * cfg.Cd * cfg.A * RHO * state.velocity * state.velocity;
      state.dragForce = dragForce;

      const netForce = gravityForce - dragForce;
      const acceleration = netForce / state.mass;

      state.velocity += acceleration * dt;
      if (state.velocity < 0) state.velocity = 0;

      state.altitude -= state.velocity * dt;
      if (state.altitude <= 0) {
        state.altitude = 0;
        state.velocity = 0;
        state.phase = 'landed';
      }

      skydiverGroup.position.y = state.altitude;

      // Posture changes
      if (state.phase === 'freefall') {
        skydiverGroup.rotation.x = THREE.MathUtils.lerp(skydiverGroup.rotation.x, -Math.PI / 6, 0.12);
      } else {
        skydiverGroup.rotation.x = THREE.MathUtils.lerp(skydiverGroup.rotation.x, 0, 0.12);
      }

      // Parachute inflation
      let deployScale = 0;
      if (state.phase === 'deploying') {
        const t = Math.min(state.deployTimer / 1.5, 1);
        deployScale = t * t * (3 - 2 * t);
      } else if (state.phase === 'descent' || state.phase === 'landed') {
        deployScale = 1;
      }
      parachuteGroup.scale.setScalar(deployScale);

      // Billow animation
      const pos = canopy.geometry.attributes.position.array;
      const time = state.elapsedTime;
      for (let i = 0; i < pos.length; i += 3) {
        const bx = baseCanopyPositions[i];
        const by = baseCanopyPositions[i + 1];
        const bz = baseCanopyPositions[i + 2];
        const r = Math.sqrt(bx * bx + bz * bz);
        const wave = Math.sin(time * 4 + r * 1.7) * 0.08 * deployScale;
        pos[i] = bx;
        pos[i + 1] = by + wave;
        pos[i + 2] = bz;
      }
      canopy.geometry.attributes.position.needsUpdate = true;
      canopy.geometry.computeVertexNormals();

      updateShroudLines();
      updateTrail();
      updateWind(dt, state.velocity);
    }

    function updateCamera() {
      const desiredTarget = new THREE.Vector3(
        skydiverGroup.position.x,
        Math.max(3, skydiverGroup.position.y + 1.5),
        skydiverGroup.position.z
      );
      controls.target.lerp(desiredTarget, 0.08);

      const desiredPos = new THREE.Vector3(
        skydiverGroup.position.x + 15,
        skydiverGroup.position.y + 5,
        skydiverGroup.position.z + 15
      );
      camera.position.lerp(desiredPos, 0.04);
    }

    function animate() {
      requestAnimationFrame(animate);

      const now = performance.now();
      let delta = (now - lastTime) / 1000;
      lastTime = now;
      delta = Math.min(delta, 0.1);

      if (!state.isPaused) {
        accumulator += delta * state.timeScale;
        while (accumulator >= fixedDt) {
          state.frameCount++;
          state.elapsedTime += fixedDt;
          updatePhysics(fixedDt);
          accumulator -= fixedDt;
        }
      }

      updateCamera();
      controls.update();
      updateHUD();
      updateGlobalState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetSimulation();
    animate();
  </script>
</body>
</html>
