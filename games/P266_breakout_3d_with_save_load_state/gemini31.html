<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Breakout</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 20px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
        }
        button {
            padding: 8px 16px;
            margin-left: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #333;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            pointer-events: auto;
        }
        button:hover {
            background-color: #555;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            text-align: center;
            pointer-events: none;
            text-shadow: 2px 2px 4px black;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="hud">
        Score: <span id="scoreDisplay">0</span> | Lives: <span id="livesDisplay">3</span>
    </div>
    <div id="controls">
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
    </div>
    <div id="message">Press SPACE to Start</div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            score: 0,
            lives: 3,
            gameRunning: false,
            ballPosition: { x: 0, y: 0.4, z: 10 },
            ballVelocity: { x: 5, y: 0, z: -8 },
            paddleX: 0,
            bricksRemaining: 30,
            totalBricks: 30,
            robotLoaded: false,
            robotRotationY: 0,
            savedStateExists: false,
            lastLoadTime: 0
        };

        let score = 0;
        let lives = 3;
        let gameRunning = false;
        
        const keys = { ArrowLeft: false, ArrowRight: false };
        const paddleSpeed = 15;
        const ballSpeedMag = 9.4;
        let ballVelocity = new THREE.Vector3(5, 0, -8);

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Arena Walls
        const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x555555 });
        const wallThickness = 1;
        const arenaWidth = 20;
        const arenaDepth = 30;

        const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, 2, arenaDepth), wallMaterial);
        leftWall.position.set(-arenaWidth/2 - wallThickness/2, 1, 0);
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, 2, arenaDepth), wallMaterial);
        rightWall.position.set(arenaWidth/2 + wallThickness/2, 1, 0);
        scene.add(rightWall);

        const backWall = new THREE.Mesh(new THREE.BoxGeometry(arenaWidth + wallThickness*2, 2, wallThickness), wallMaterial);
        backWall.position.set(0, 1, -arenaDepth/2 - wallThickness/2);
        scene.add(backWall);

        // --- Game Objects ---
        // Robot
        let robotModel = null;
        const loader = new GLTFLoader();
        loader.load('robot.glb', (gltf) => {
            robotModel = gltf.scene;
            robotModel.scale.set(1.5, 1.5, 1.5);
            robotModel.position.set(0, 0, -13);
            scene.add(robotModel);
            window.__3D_STATE__.robotLoaded = true;
        }, undefined, (error) => {
            console.warn('Robot model not found, continuing without it.');
        });

        // Bricks
        const bricks = [];
        const rowColors = [0xff0000, 0xff8800, 0xffff00, 0x00ff00, 0x0088ff];
        const brickGeo = new THREE.BoxGeometry(2.8, 0.8, 1.2);
        
        for (let row = 0; row < 5; row++) {
            const mat = new THREE.MeshStandardMaterial({ color: rowColors[row] });
            for (let col = 0; col < 6; col++) {
                const mesh = new THREE.Mesh(brickGeo, mat);
                const x = (col - 2.5) * 3.2;
                const z = -12 + row * 2;
                mesh.position.set(x, 0.4, z);
                scene.add(mesh);
                bricks.push({ mesh, hit: false, row, col });
            }
        }

        // Paddle
        const paddleGeo = new THREE.BoxGeometry(4, 0.5, 1);
        const paddleMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const paddle = new THREE.Mesh(paddleGeo, paddleMat);
        paddle.position.set(0, 0.25, 12);
        scene.add(paddle);

        // Ball
        const ballGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xff00ff });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        ball.position.set(0, 0.4, 10);
        scene.add(ball);

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = true;
            if (e.code === 'ArrowRight') keys.ArrowRight = true;
            if (e.code === 'Space') {
                if (!gameRunning && lives > 0) {
                    gameRunning = true;
                    document.getElementById('message').style.display = 'none';
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft') keys.ArrowLeft = false;
            if (e.code === 'ArrowRight') keys.ArrowRight = false;
        });

        // --- Save/Load Logic ---
        function updateSavedStateExists() {
            window.__3D_STATE__.savedStateExists = !!window.__savedState || !!localStorage.getItem('breakout3d_save');
        }
        updateSavedStateExists();

        document.getElementById('saveBtn').addEventListener('click', () => {
            const state = {
                score,
                lives,
                gameRunning,
                ballPos: ball.position.toArray(),
                ballVel: ballVelocity.toArray(),
                paddleX: paddle.position.x,
                bricks: bricks.map(b => b.hit)
            };
            window.__savedState = state;
            localStorage.setItem('breakout3d_save', JSON.stringify(state));
            updateSavedStateExists();
        });

        document.getElementById('loadBtn').addEventListener('click', () => {
            let state = window.__savedState;
            if (!state) {
                const local = localStorage.getItem('breakout3d_save');
                if (local) state = JSON.parse(local);
            }
            
            if (state) {
                score = state.score;
                lives = state.lives;
                gameRunning = state.gameRunning;
                ball.position.fromArray(state.ballPos);
                ballVelocity.fromArray(state.ballVel);
                paddle.position.x = state.paddleX;
                
                state.bricks.forEach((hit, i) => {
                    bricks[i].hit = hit;
                    bricks[i].mesh.visible = !hit;
                });

                document.getElementById('scoreDisplay').innerText = score;
                document.getElementById('livesDisplay').innerText = lives;
                document.getElementById('message').style.display = gameRunning ? 'none' : 'block';
                if(lives <= 0) document.getElementById('message').innerText = "Game Over";
                else if(!gameRunning) document.getElementById('message').innerText = "Press SPACE to Resume";

                window.__3D_STATE__.lastLoadTime = Date.now();
            }
        });

        // --- Physics & Game Loop ---
        const clock = new THREE.Clock();
        const ballBox = new THREE.Box3();
        const paddleBox = new THREE.Box3();
        const brickBox = new THREE.Box3();

        function resetBall() {
            ball.position.set(0, 0.4, 10);
            ballVelocity.set(5, 0, -8);
            gameRunning = false;
            document.getElementById('message').style.display = 'block';
            if (lives <= 0) {
                document.getElementById('message').innerText = "Game Over";
            } else {
                document.getElementById('message').innerText = "Press SPACE to Start";
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            let dt = clock.getDelta();
            if (dt > 0.05) dt = 0.05; // Clamp delta time

            // Rotate Robot
            if (robotModel) {
                robotModel.rotation.y += 0.5 * dt;
                window.__3D_STATE__.robotRotationY = robotModel.rotation.y;
            }

            if (gameRunning) {
                // Move Paddle
                if (keys.ArrowLeft) paddle.position.x -= paddleSpeed * dt;
                if (keys.ArrowRight) paddle.position.x += paddleSpeed * dt;
                paddle.position.x = THREE.MathUtils.clamp(paddle.position.x, -8, 8);

                // Move Ball
                ball.position.addScaledVector(ballVelocity, dt);
                ballBox.setFromObject(ball);

                // Wall Collisions
                if (ball.position.x <= -9.6) {
                    ball.position.x = -9.6;
                    ballVelocity.x *= -1;
                } else if (ball.position.x >= 9.6) {
                    ball.position.x = 9.6;
                    ballVelocity.x *= -1;
                }
                if (ball.position.z <= -14.6) {
                    ball.position.z = -14.6;
                    ballVelocity.z *= -1;
                }

                // Paddle Collision
                paddleBox.setFromObject(paddle);
                if (ballBox.intersectsBox(paddleBox)) {
                    ballVelocity.z *= -1;
                    if (ballVelocity.z > 0) ballVelocity.z *= -1; // Ensure it bounces up
                    
                    // Add slight X influence based on hit position
                    let hitFactor = (ball.position.x - paddle.position.x) / 2;
                    ballVelocity.x += hitFactor * 2;
                    
                    ballVelocity.normalize().multiplyScalar(ballSpeedMag);
                    ball.position.z = paddle.position.z - 0.5 - 0.4 - 0.01; // Push out
                }

                // Brick Collision
                for (let b of bricks) {
                    if (!b.hit) {
                        brickBox.setFromObject(b.mesh);
                        if (ballBox.intersectsBox(brickBox)) {
                            b.hit = true;
                            b.mesh.visible = false;
                            score++;
                            document.getElementById('scoreDisplay').innerText = score;
                            
                            // Simple reflection
                            let overlapX = Math.min(ballBox.max.x - brickBox.min.x, brickBox.max.x - ballBox.min.x);
                            let overlapZ = Math.min(ballBox.max.z - brickBox.min.z, brickBox.max.z - ballBox.min.z);
                            
                            if (overlapX < overlapZ) {
                                ballVelocity.x *= -1;
                            } else {
                                ballVelocity.z *= -1;
                            }
                            
                            ballVelocity.normalize().multiplyScalar(ballSpeedMag);
                            break; // One hit per frame
                        }
                    }
                }

                // Miss
                if (ball.position.z > 14) {
                    lives--;
                    document.getElementById('livesDisplay').innerText = lives;
                    resetBall();
                }
            }

            // Update Global State
            let bricksRemaining = bricks.filter(b => !b.hit).length;
            window.__3D_STATE__.score = score;
            window.__3D_STATE__.lives = lives;
            window.__3D_STATE__.gameRunning = gameRunning;
            window.__3D_STATE__.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
            window.__3D_STATE__.ballVelocity = { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z };
            window.__3D_STATE__.paddleX = paddle.position.x;
            window.__3D_STATE__.bricksRemaining = bricksRemaining;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
