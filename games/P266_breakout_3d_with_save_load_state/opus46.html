<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Breakout Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    font-size: 18px;
    z-index: 10;
    user-select: none;
}
#hud div { margin-bottom: 8px; }
#buttons { margin-top: 10px; }
#buttons button {
    padding: 8px 16px;
    margin-right: 8px;
    font-size: 14px;
    cursor: pointer;
    background: #333;
    color: #fff;
    border: 1px solid #888;
    border-radius: 4px;
}
#buttons button:hover { background: #555; }
#message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 28px;
    text-align: center;
    z-index: 10;
    user-select: none;
    text-shadow: 2px 2px 4px #000;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div>Score: <span id="scoreDisplay">0</span></div>
    <div>Lives: <span id="livesDisplay">3</span></div>
    <div id="buttons">
        <button id="saveBtn">Save State</button>
        <button id="loadBtn">Load State</button>
    </div>
</div>
<div id="message">Press SPACE to Start</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111122);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 25, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
scene.add(dirLight);

// Floor
const floorGeo = new THREE.PlaneGeometry(20, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
floor.receiveShadow = true;
scene.add(floor);

// Walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0x555555 });

// Left wall: x = -10
const leftWallGeo = new THREE.BoxGeometry(0.3, 2, 30);
const leftWall = new THREE.Mesh(leftWallGeo, wallMat);
leftWall.position.set(-10.15, 1, 0);
scene.add(leftWall);

// Right wall: x = 10
const rightWall = new THREE.Mesh(leftWallGeo, wallMat);
rightWall.position.set(10.15, 1, 0);
scene.add(rightWall);

// Back wall: z = -15
const backWallGeo = new THREE.BoxGeometry(20.6, 2, 0.3);
const backWall = new THREE.Mesh(backWallGeo, wallMat);
backWall.position.set(0, 1, -15.15);
scene.add(backWall);

// Robot model
let robotModel = null;
let robotLoaded = false;

const loader = new GLTFLoader();
// Try loading robot.glb, if not available create a placeholder
function createPlaceholderRobot() {
    const group = new THREE.Group();
    // Body
    const bodyGeo = new THREE.BoxGeometry(0.8, 0.8, 0.5);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.6;
    group.add(body);
    // Head
    const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.4);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.y = 1.2;
    group.add(head);
    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.08);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00ff00, emissiveIntensity: 0.5 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.12, 1.25, 0.2);
    group.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
    rightEye.position.set(0.12, 1.25, 0.2);
    group.add(rightEye);
    // Arms
    const armGeo = new THREE.BoxGeometry(0.2, 0.6, 0.2);
    const leftArm = new THREE.Mesh(armGeo, bodyMat);
    leftArm.position.set(-0.6, 0.6, 0);
    group.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, bodyMat);
    rightArm.position.set(0.6, 0.6, 0);
    group.add(rightArm);
    // Legs
    const legGeo = new THREE.BoxGeometry(0.25, 0.5, 0.25);
    const leftLeg = new THREE.Mesh(legGeo, bodyMat);
    leftLeg.position.set(-0.2, 0.05, 0);
    group.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, bodyMat);
    rightLeg.position.set(0.2, 0.05, 0);
    group.add(rightLeg);
    // Trophy base
    const baseGeo = new THREE.CylinderGeometry(0.6, 0.8, 0.2, 16);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
    const base = new THREE.Mesh(baseGeo, baseMat);
    base.position.y = -0.2;
    group.add(base);

    return group;
}

try {
    loader.load('robot.glb', (gltf) => {
        robotModel = gltf.scene;
        // Scale to roughly 1.5 units tall
        const box = new THREE.Box3().setFromObject(robotModel);
        const size = box.getSize(new THREE.Vector3());
        const scale = 1.5 / size.y;
        robotModel.scale.set(scale, scale, scale);
        robotModel.position.set(0, 0, -13);
        scene.add(robotModel);
        robotLoaded = true;
    }, undefined, () => {
        // Fallback: create placeholder
        robotModel = createPlaceholderRobot();
        robotModel.position.set(0, 0, -13);
        scene.add(robotModel);
        robotLoaded = true;
    });
} catch (e) {
    robotModel = createPlaceholderRobot();
    robotModel.position.set(0, 0, -13);
    scene.add(robotModel);
    robotLoaded = true;
}

// Bricks
const rowColors = [0xff0000, 0xff8800, 0xffff00, 0x00ff00, 0x0088ff];
const bricks = [];
const brickWidth = 2.8;
const brickHeight = 0.8;
const brickDepth = 1.2;
const cols = 6;
const rows = 5;
const totalBricks = rows * cols;

const startX = -(cols - 1) * (brickWidth + 0.2) / 2;
const startZ = -12;

for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
        const geo = new THREE.BoxGeometry(brickWidth, brickHeight, brickDepth);
        const mat = new THREE.MeshStandardMaterial({ color: rowColors[row] });
        const brick = new THREE.Mesh(geo, mat);
        const x = startX + col * (brickWidth + 0.2);
        const z = startZ + row * (brickDepth + 0.4);
        brick.position.set(x, brickHeight / 2, z);
        brick.castShadow = true;
        brick.userData = { hit: false, row: row, col: col };
        scene.add(brick);
        bricks.push(brick);
    }
}

// Paddle
const paddleGeo = new THREE.BoxGeometry(4, 0.5, 1);
const paddleMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
const paddle = new THREE.Mesh(paddleGeo, paddleMat);
paddle.position.set(0, 0.25, 12);
paddle.castShadow = true;
scene.add(paddle);

// Ball
const ballGeo = new THREE.SphereGeometry(0.4, 16, 16);
const ballMat = new THREE.MeshStandardMaterial({ color: 0xff00ff, emissive: 0xff00ff, emissiveIntensity: 0.3 });
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.set(0, 0.4, 10);
ball.castShadow = true;
scene.add(ball);

// Game state
let score = 0;
let lives = 3;
let gameRunning = false;
let ballVelocity = new THREE.Vector3(5, 0, -8);
const BALL_SPEED = 9.4;

// Normalize initial velocity
ballVelocity.normalize().multiplyScalar(BALL_SPEED);

// Input
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        if (!gameRunning) {
            gameRunning = true;
            document.getElementById('message').textContent = '';
        }
    }
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

// HUD
const scoreDisplay = document.getElementById('scoreDisplay');
const livesDisplay = document.getElementById('livesDisplay');
const messageDiv = document.getElementById('message');

function updateHUD() {
    scoreDisplay.textContent = score;
    livesDisplay.textContent = lives;
}

// Reset ball
function resetBall() {
    ball.position.set(0, 0.4, 10);
    ballVelocity.set(5, 0, -8).normalize().multiplyScalar(BALL_SPEED);
    gameRunning = false;
    if (lives > 0) {
        messageDiv.textContent = 'Press SPACE to Continue';
    } else {
        messageDiv.textContent = 'Game Over! Press SPACE to Restart';
    }
}

// Normalize ball velocity
function normalizeBallSpeed() {
    const speed = ballVelocity.length();
    if (speed < 8 || speed > 12) {
        ballVelocity.normalize().multiplyScalar(BALL_SPEED);
    }
}

// Save/Load
window.__savedState = undefined;

document.getElementById('saveBtn').addEventListener('click', () => {
    const state = {
        ballPosition: { x: ball.position.x, y: ball.position.y, z: ball.position.z },
        ballVelocity: { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z },
        paddleX: paddle.position.x,
        score: score,
        lives: lives,
        gameRunning: gameRunning,
        bricks: bricks.map(b => b.userData.hit)
    };
    window.__savedState = JSON.parse(JSON.stringify(state));
    localStorage.setItem('breakout3d_save', JSON.stringify(state));
    messageDiv.textContent = 'State Saved!';
    setTimeout(() => {
        if (!gameRunning) {
            messageDiv.textContent = lives > 0 ? 'Press SPACE to Continue' : 'Game Over! Press SPACE to Restart';
        } else {
            messageDiv.textContent = '';
        }
    }, 1000);
});

document.getElementById('loadBtn').addEventListener('click', () => {
    let state = window.__savedState;
    if (!state) {
        const stored = localStorage.getItem('breakout3d_save');
        if (stored) {
            state = JSON.parse(stored);
            window.__savedState = state;
        }
    }
    if (!state) {
        messageDiv.textContent = 'No saved state found!';
        setTimeout(() => { messageDiv.textContent = ''; }, 1500);
        return;
    }

    ball.position.set(state.ballPosition.x, state.ballPosition.y, state.ballPosition.z);
    ballVelocity.set(state.ballVelocity.x, state.ballVelocity.y, state.ballVelocity.z);
    paddle.position.x = state.paddleX;
    score = state.score;
    lives = state.lives;
    gameRunning = state.gameRunning;

    for (let i = 0; i < bricks.length; i++) {
        bricks[i].userData.hit = state.bricks[i];
        bricks[i].visible = !state.bricks[i];
    }

    updateHUD();
    window.__3D_STATE__.lastLoadTime = Date.now();

    if (!gameRunning) {
        messageDiv.textContent = lives > 0 ? 'Press SPACE to Continue' : 'Game Over! Press SPACE to Restart';
    } else {
        messageDiv.textContent = '';
    }
});

// __3D_STATE__
window.__3D_STATE__ = {
    score: 0,
    lives: 3,
    gameRunning: false,
    ballPosition: { x: 0, y: 0.4, z: 10 },
    ballVelocity: { x: 5, y: 0, z: -8 },
    paddleX: 0,
    bricksRemaining: totalBricks,
    totalBricks: totalBricks,
    robotLoaded: false,
    robotRotationY: 0,
    savedStateExists: false,
    lastLoadTime: 0
};

function updateState() {
    const remaining = bricks.filter(b => !b.userData.hit).length;
    window.__3D_STATE__.score = score;
    window.__3D_STATE__.lives = lives;
    window.__3D_STATE__.gameRunning = gameRunning;
    window.__3D_STATE__.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
    window.__3D_STATE__.ballVelocity = { x: ballVelocity.x, y: ballVelocity.y, z: ballVelocity.z };
    window.__3D_STATE__.paddleX = paddle.position.x;
    window.__3D_STATE__.bricksRemaining = remaining;
    window.__3D_STATE__.totalBricks = totalBricks;
    window.__3D_STATE__.robotLoaded = robotLoaded;
    window.__3D_STATE__.robotRotationY = robotModel ? robotModel.rotation.y : 0;
    window.__3D_STATE__.savedStateExists = window.__savedState !== undefined;
}

// Particle effects
const particles = [];

function createParticles(position, color) {
    for (let i = 0; i < 8; i++) {
        const pGeo = new THREE.SphereGeometry(0.1);
        const pMat = new THREE.MeshBasicMaterial({ color: color });
        const p = new THREE.Mesh(pGeo, pMat);
        p.position.copy(position);
        p.userData.velocity = new THREE.Vector3(
            (Math.random() - 0.5) * 10,
            Math.random() * 5 + 2,
            (Math.random() - 0.5) * 10
        );
        p.userData.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

function updateParticles(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.userData.life -= dt * 2;
        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
            continue;
        }
        p.position.x += p.userData.velocity.x * dt;
        p.position.y += p.userData.velocity.y * dt;
        p.position.z += p.userData.velocity.z * dt;
        p.userData.velocity.y -= 15 * dt;
        p.material.opacity = p.userData.life;
        p.material.transparent = true;
        const s = p.userData.life;
        p.scale.set(s, s, s);
    }
}

// Animation loop
let lastTime = performance.now();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    let dt = (now - lastTime) / 1000;
    lastTime = now;
    dt = Math.min(dt, 0.05);

    // Robot rotation
    if (robotModel) {
        robotModel.rotation.y += 0.5 * dt;
    }

    // Paddle movement
    const paddleSpeed = 15;
    if (keys['ArrowLeft']) {
        paddle.position.x -= paddleSpeed * dt;
    }
    if (keys['ArrowRight']) {
        paddle.position.x += paddleSpeed * dt;
    }
    paddle.position.x = Math.max(-8, Math.min(8, paddle.position.x));

    if (gameRunning) {
        // Check for game over restart
        if (lives <= 0) {
            lives = 3;
            score = 0;
            for (const brick of bricks) {
                brick.userData.hit = false;
                brick.visible = true;
            }
            ball.position.set(0, 0.4, 10);
            ballVelocity.set(5, 0, -8).normalize().multiplyScalar(BALL_SPEED);
            updateHUD();
        }

        // Check win condition
        const remaining = bricks.filter(b => !b.userData.hit).length;
        if (remaining === 0) {
            messageDiv.textContent = 'You Win! Press SPACE to Play Again';
            gameRunning = false;
            // Reset bricks for new game
            for (const brick of bricks) {
                brick.userData.hit = false;
                brick.visible = true;
            }
            score += 100; // Bonus
            resetBall();
            updateHUD();
            updateState();
            renderer.render(scene, camera);
            return;
        }

        // Move ball
        ball.position.x += ballVelocity.x * dt;
        ball.position.z += ballVelocity.z * dt;

        // Wall collisions
        // Left wall
        if (ball.position.x - 0.4 <= -10) {
            ball.position.x = -10 + 0.4;
            ballVelocity.x = Math.abs(ballVelocity.x);
            normalizeBallSpeed();
        }
        // Right wall
        if (ball.position.x + 0.4 >= 10) {
            ball.position.x = 10 - 0.4;
            ballVelocity.x = -Math.abs(ballVelocity.x);
            normalizeBallSpeed();
        }
        // Back wall
        if (ball.position.z - 0.4 <= -15) {
            ball.position.z = -15 + 0.4;
            ballVelocity.z = Math.abs(ballVelocity.z);
            normalizeBallSpeed();
        }

        // Paddle collision
        const paddleHalfW = 2;
        const paddleHalfD = 0.5;
        if (ballVelocity.z > 0 &&
            ball.position.z + 0.4 >= paddle.position.z - paddleHalfD &&
            ball.position.z - 0.4 <= paddle.position.z + paddleHalfD &&
            ball.position.x + 0.4 >= paddle.position.x - paddleHalfW &&
            ball.position.x - 0.4 <= paddle.position.x + paddleHalfW) {
            
            ball.position.z = paddle.position.z - paddleHalfD - 0.4;
            ballVelocity.z = -Math.abs(ballVelocity.z);
            
            // Add some X influence based on where ball hits paddle
            const hitOffset = (ball.position.x - paddle.position.x) / paddleHalfW;
            ballVelocity.x += hitOffset * 3;
            
            ballVelocity.normalize().multiplyScalar(BALL_SPEED);
        }

        // Brick collisions
        for (const brick of bricks) {
            if (brick.userData.hit) continue;

            const bHalfW = brickWidth / 2;
            const bHalfH = brickHeight / 2;
            const bHalfD = brickDepth / 2;
            const bx = brick.position.x;
            const bz = brick.position.z;

            if (ball.position.x + 0.4 >= bx - bHalfW &&
                ball.position.x - 0.4 <= bx + bHalfW &&
                ball.position.z + 0.4 >= bz - bHalfD &&
                ball.position.z - 0.4 <= bz + bHalfD) {
                
                brick.userData.hit = true;
                brick.visible = false;
                score += 10;
                updateHUD();

                // Create particles
                createParticles(brick.position.clone(), brick.material.color.getHex());

                // Determine reflection direction
                const overlapLeft = (ball.position.x + 0.4) - (bx - bHalfW);
                const overlapRight = (bx + bHalfW) - (ball.position.x - 0.4);
                const overlapFront = (ball.position.z + 0.4) - (bz - bHalfD);
                const overlapBack = (bz + bHalfD) - (ball.position.z - 0.4);

                const minOverlapX = Math.min(overlapLeft, overlapRight);
                const minOverlapZ = Math.min(overlapFront, overlapBack);

                if (minOverlapX < minOverlapZ) {
                    ballVelocity.x = -ballVelocity.x;
                } else {
                    ballVelocity.z = -ballVelocity.z;
                }

                ballVelocity.normalize().multiplyScalar(BALL_SPEED);
                break; // Only one brick per frame
            }
        }

        // Ball out
        if (ball.position.z > 14) {
            lives--;
            updateHUD();
            createParticles(ball.position.clone(), 0xff00ff);
            resetBall();
        }
    }

    // Update particles
    updateParticles(dt);

    updateHUD();
    updateState();
    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Check for existing save in localStorage
const existingSave = localStorage.getItem('breakout3d_save');
if (existingSave) {
    try {
        window.__savedState = JSON.parse(existingSave);
    } catch (e) {}
}

animate();
</script>
</body>
</html>
