<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Breakout - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px;
      border-radius: 8px;
      min-width: 220px;
    }
    #hud div {
      margin-bottom: 8px;
    }
    button {
      margin-right: 8px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #2b2b2b;
      color: white;
    }
    button:hover {
      background: #444;
    }
    #info {
      font-size: 13px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="scoreText">Score: 0</div>
    <div id="livesText">Lives: 3</div>
    <div>
      <button id="saveBtn">Save State</button>
      <button id="loadBtn">Load State</button>
    </div>
    <div id="info">Press Space to start/resume</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer, clock;
    let paddle, ball, robot;
    let robotLoaded = false;

    const arena = {
      width: 20,
      depth: 30,
      left: -10,
      right: 10,
      back: -15,
      frontMiss: 14
    };

    const bricks = [];
    const brickRows = 5;
    const brickCols = 6;
    const brickGeom = new THREE.BoxGeometry(2.8, 0.8, 1.2);
    const rowColors = ["#ff0000", "#ff8800", "#ffff00", "#00ff00", "#0088ff"];

    const ballRadius = 0.4;
    const paddleSpeed = 15;
    const targetBallSpeed = 9.4;

    let score = 0;
    let lives = 3;
    let gameRunning = false;
    let ballVelocity = new THREE.Vector3(5, 0, -8);

    const keys = {
      left: false,
      right: false
    };

    window.__3D_STATE__ = {
      score: 0,
      lives: 3,
      gameRunning: false,
      ballPosition: { x: 0, y: 0.4, z: 10 },
      ballVelocity: { x: 5, y: 0, z: -8 },
      paddleX: 0,
      bricksRemaining: 30,
      totalBricks: 30,
      robotLoaded: false,
      robotRotationY: 0,
      savedStateExists: false,
      lastLoadTime: 0
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 25, 30);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(10, 20, 10);
      scene.add(dir);

      createArena();
      createBricks();
      createPaddle();
      createBall();
      loadRobot();

      setupEvents();
      updateHUD();
      update3DState();
    }

    function createArena() {
      const floor = new THREE.Mesh(
        new THREE.BoxGeometry(arena.width, 0.2, arena.depth),
        new THREE.MeshStandardMaterial({ color: 0x222222 })
      );
      floor.position.set(0, -0.1, 0);
      scene.add(floor);

      const wallMat = new THREE.MeshStandardMaterial({ color: "#555555" });

      const leftWall = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 2, arena.depth),
        wallMat
      );
      leftWall.position.set(arena.left - 0.2, 1, 0);
      scene.add(leftWall);

      const rightWall = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 2, arena.depth),
        wallMat
      );
      rightWall.position.set(arena.right + 0.2, 1, 0);
      scene.add(rightWall);

      const backWall = new THREE.Mesh(
        new THREE.BoxGeometry(arena.width, 2, 0.4),
        wallMat
      );
      backWall.position.set(0, 1, arena.back - 0.2);
      scene.add(backWall);
    }

    function createBricks() {
      const startZ = -12;
      const zSpacing = 2.0;
      const xSpacing = 3.2;
      const totalWidth = (brickCols - 1) * xSpacing;

      for (let row = 0; row < brickRows; row++) {
        for (let col = 0; col < brickCols; col++) {
          const mat = new THREE.MeshStandardMaterial({ color: rowColors[row] });
          const brick = new THREE.Mesh(brickGeom, mat);

          const x = col * xSpacing - totalWidth / 2;
          const z = startZ + row * zSpacing;

          brick.position.set(x, 0.4, z);
          brick.userData.hit = false;
          brick.userData.row = row;
          brick.userData.col = col;

          bricks.push(brick);
          scene.add(brick);
        }
      }
    }

    function createPaddle() {
      paddle = new THREE.Mesh(
        new THREE.BoxGeometry(4, 0.5, 1),
        new THREE.MeshStandardMaterial({ color: "#ffffff" })
      );
      paddle.position.set(0, 0.25, 12);
      scene.add(paddle);
    }

    function createBall() {
      ball = new THREE.Mesh(
        new THREE.SphereGeometry(ballRadius, 24, 24),
        new THREE.MeshStandardMaterial({ color: "#ff00ff" })
      );
      resetBall();
      scene.add(ball);
    }

    function loadRobot() {
      const loader = new GLTFLoader();
      loader.load(
        "robot.glb",
        (gltf) => {
          robot = gltf.scene;

          const box = new THREE.Box3().setFromObject(robot);
          const size = new THREE.Vector3();
          box.getSize(size);
          const currentHeight = size.y || 1;
          const scale = 1.5 / currentHeight;
          robot.scale.setScalar(scale);

          robot.position.set(0, 0, -14);
          scene.add(robot);
          robotLoaded = true;
        },
        undefined,
        (err) => {
          console.warn("Failed to load robot.glb:", err);
        }
      );
    }

    function setupEvents() {
      window.addEventListener("resize", onResize);

      window.addEventListener("keydown", (e) => {
        if (e.code === "ArrowLeft") keys.left = true;
        if (e.code === "ArrowRight") keys.right = true;
        if (e.code === "Space") {
          gameRunning = true;
          updateHUD();
        }
      });

      window.addEventListener("keyup", (e) => {
        if (e.code === "ArrowLeft") keys.left = false;
        if (e.code === "ArrowRight") keys.right = false;
      });

      document.getElementById("saveBtn").addEventListener("click", saveState);
      document.getElementById("loadBtn").addEventListener("click", loadState);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function resetBall() {
      ball.position.set(0, 0.4, 10);
      ballVelocity.set(5, 0, -8).normalize().multiplyScalar(targetBallSpeed);
    }

    function normalizeBallSpeed() {
      ballVelocity.y = 0;
      const len = Math.sqrt(ballVelocity.x * ballVelocity.x + ballVelocity.z * ballVelocity.z) || 1;
      ballVelocity.x = (ballVelocity.x / len) * targetBallSpeed;
      ballVelocity.z = (ballVelocity.z / len) * targetBallSpeed;
    }

    function updatePaddle(dt) {
      if (keys.left) paddle.position.x -= paddleSpeed * dt;
      if (keys.right) paddle.position.x += paddleSpeed * dt;
      paddle.position.x = THREE.MathUtils.clamp(paddle.position.x, -8, 8);
    }

    function updateBall(dt) {
      if (!gameRunning) return;

      ball.position.x += ballVelocity.x * dt;
      ball.position.z += ballVelocity.z * dt;

      // Wall collisions
      if (ball.position.x - ballRadius <= arena.left) {
        ball.position.x = arena.left + ballRadius;
        ballVelocity.x *= -1;
        normalizeBallSpeed();
      }

      if (ball.position.x + ballRadius >= arena.right) {
        ball.position.x = arena.right - ballRadius;
        ballVelocity.x *= -1;
        normalizeBallSpeed();
      }

      if (ball.position.z - ballRadius <= arena.back) {
        ball.position.z = arena.back + ballRadius;
        ballVelocity.z *= -1;
        normalizeBallSpeed();
      }

      // Paddle collision
      const paddleHalfX = 2;
      const paddleHalfZ = 0.5;

      const overlapsPaddleX =
        ball.position.x + ballRadius >= paddle.position.x - paddleHalfX &&
        ball.position.x - ballRadius <= paddle.position.x + paddleHalfX;

      const overlapsPaddleZ =
        ball.position.z + ballRadius >= paddle.position.z - paddleHalfZ &&
        ball.position.z - ballRadius <= paddle.position.z + paddleHalfZ;

      if (ballVelocity.z > 0 && overlapsPaddleX && overlapsPaddleZ) {
        ball.position.z = paddle.position.z - paddleHalfZ - ballRadius;

        const offset = (ball.position.x - paddle.position.x) / paddleHalfX;
        ballVelocity.z = -Math.abs(ballVelocity.z);
        ballVelocity.x += offset * 3.0;
        normalizeBallSpeed();
      }

      // Brick collisions
      for (let i = 0; i < bricks.length; i++) {
        const brick = bricks[i];
        if (brick.userData.hit) continue;

        const halfX = 1.4;
        const halfZ = 0.6;

        const hitX =
          ball.position.x + ballRadius >= brick.position.x - halfX &&
          ball.position.x - ballRadius <= brick.position.x + halfX;

        const hitZ =
          ball.position.z + ballRadius >= brick.position.z - halfZ &&
          ball.position.z - ballRadius <= brick.position.z + halfZ;

        if (hitX && hitZ) {
          brick.userData.hit = true;
          brick.visible = false;
          score += 1;

          ballVelocity.z *= -1;
          normalizeBallSpeed();
          updateHUD();
          break;
        }
      }

      // Miss
      if (ball.position.z > arena.frontMiss) {
        lives -= 1;
        gameRunning = false;
        resetBall();
        updateHUD();
      }
    }

    function saveState() {
      const state = {
        ballPosition: {
          x: ball.position.x,
          y: ball.position.y,
          z: ball.position.z
        },
        ballVelocity: {
          x: ballVelocity.x,
          y: ballVelocity.y,
          z: ballVelocity.z
        },
        paddlePosition: {
          x: paddle.position.x,
          y: paddle.position.y,
          z: paddle.position.z
        },
        score,
        lives,
        bricks: bricks.map(b => ({ hit: !!b.userData.hit })),
        gameRunning
      };

      window.__savedState = state;
      localStorage.setItem("breakout3d_save", JSON.stringify(state));
      update3DState();
    }

    function loadState() {
      let state = window.__savedState;

      if (!state) {
        const raw = localStorage.getItem("breakout3d_save");
        if (raw) {
          try {
            state = JSON.parse(raw);
          } catch (e) {
            console.warn("Invalid saved state in localStorage");
            return;
          }
        }
      }

      if (!state) return;

      ball.position.set(
        state.ballPosition.x,
        state.ballPosition.y,
        state.ballPosition.z
      );

      ballVelocity.set(
        state.ballVelocity.x,
        state.ballVelocity.y,
        state.ballVelocity.z
      );
      normalizeBallSpeed();

      paddle.position.set(
        state.paddlePosition.x,
        state.paddlePosition.y,
        state.paddlePosition.z
      );

      score = state.score;
      lives = state.lives;
      gameRunning = state.gameRunning;

      if (Array.isArray(state.bricks)) {
        for (let i = 0; i < bricks.length; i++) {
          const hit = !!state.bricks[i]?.hit;
          bricks[i].userData.hit = hit;
          bricks[i].visible = !hit;
        }
      }

      window.__savedState = state;
      window.__3D_STATE__.lastLoadTime = Date.now();
      updateHUD();
      update3DState();
    }

    function updateHUD() {
      document.getElementById("scoreText").textContent = `Score: ${score}`;
      document.getElementById("livesText").textContent = `Lives: ${lives}`;
      document.getElementById("info").textContent = gameRunning
        ? "Game running"
        : "Press Space to start/resume";
    }

    function update3DState() {
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.lives = lives;
      window.__3D_STATE__.gameRunning = gameRunning;
      window.__3D_STATE__.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      window.__3D_STATE__.ballVelocity = {
        x: ballVelocity.x,
        y: ballVelocity.y,
        z: ballVelocity.z
      };
      window.__3D_STATE__.paddleX = paddle.position.x;
      window.__3D_STATE__.bricksRemaining = bricks.filter(b => !b.userData.hit).length;
      window.__3D_STATE__.totalBricks = 30;
      window.__3D_STATE__.robotLoaded = robotLoaded;
      window.__3D_STATE__.robotRotationY = robot ? robot.rotation.y : 0;
      window.__3D_STATE__.savedStateExists = typeof window.__savedState !== "undefined";
      if (typeof window.__3D_STATE__.lastLoadTime !== "number") {
        window.__3D_STATE__.lastLoadTime = 0;
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      let dt = clock.getDelta();
      dt = Math.min(dt, 0.05);

      updatePaddle(dt);
      updateBall(dt);

      if (robot) {
        robot.rotation.y += 0.5 * dt;
      }

      update3DState();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
