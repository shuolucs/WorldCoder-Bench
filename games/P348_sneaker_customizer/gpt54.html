<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Sneaker Customizer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #uiPanel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 220px;
      background: rgba(0, 0, 0, 0.8);
      padding: 15px;
      color: white;
      border-radius: 10px;
      z-index: 10;
      box-sizing: border-box;
    }

    #uiPanel h2 {
      margin: 0 0 14px 0;
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    .label {
      display: block;
      margin: 10px 0 6px;
      font-size: 13px;
      opacity: 0.9;
    }

    select, button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: #3498db;
      color: white;
      font-weight: bold;
    }

    button:hover {
      filter: brightness(1.08);
    }

    #resetBtn {
      background: #e74c3c;
    }

    #toggleRotation {
      background: #8e44ad;
    }

    .swatches {
      display: flex;
      gap: 8px;
      margin: 8px 0 12px;
      flex-wrap: wrap;
    }

    .swatch {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      box-sizing: border-box;
      transition: transform 0.15s ease;
    }

    .swatch:hover {
      transform: scale(1.08);
    }

    .info {
      font-size: 13px;
      margin-top: 8px;
      line-height: 1.5;
    }

    .value {
      font-weight: bold;
      color: #f1c40f;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <h2>SNEAKER CUSTOMIZER</h2>

    <label class="label" for="partSelector">Select Part</label>
    <select id="partSelector">
      <option value="sole">sole</option>
      <option value="upper">upper</option>
      <option value="tongue">tongue</option>
      <option value="laces">laces</option>
      <option value="swoosh">swoosh</option>
    </select>

    <label class="label">Color Swatches</label>
    <div class="swatches">
      <div class="swatch" id="color0" data-color="#ffffff" style="background:#ffffff;"></div>
      <div class="swatch" id="color1" data-color="#222222" style="background:#222222;"></div>
      <div class="swatch" id="color2" data-color="#ff4444" style="background:#ff4444;"></div>
      <div class="swatch" id="color3" data-color="#3498db" style="background:#3498db;"></div>
      <div class="swatch" id="color4" data-color="#2ecc71" style="background:#2ecc71;"></div>
    </div>

    <button id="resetBtn">Reset All</button>
    <button id="toggleRotation">Pause Rotation</button>

    <div class="info">Current Color: <span id="currentColor" class="value">#222222</span></div>
    <div class="info">Changes Count: <span id="changesCount" class="value">0</span></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const DEFAULT_COLORS = {
      sole: '#222222',
      upper: '#ffffff',
      tongue: '#ffffff',
      laces: '#ff0000',
      swoosh: '#ff4444'
    };

    window.__3D_STATE__ = {
      selectedPart: 'sole',
      partColors: { ...DEFAULT_COLORS },
      isRotating: true,
      rotationAngle: 0,
      changesCount: 0,
      storkLoaded: false,
      storkY: 0,
      cameraDistance: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.8, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(1024, 1024);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(3, 64),
      new THREE.MeshStandardMaterial({ color: '#2d2d44' })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const sneakerGroup = new THREE.Group();
    sneakerGroup.position.set(0, 0.3, 0);
    scene.add(sneakerGroup);

    const materials = {
      sole: new THREE.MeshStandardMaterial({ color: DEFAULT_COLORS.sole }),
      upper: new THREE.MeshStandardMaterial({ color: DEFAULT_COLORS.upper }),
      tongue: new THREE.MeshStandardMaterial({ color: DEFAULT_COLORS.tongue }),
      laces: new THREE.MeshStandardMaterial({ color: DEFAULT_COLORS.laces }),
      swoosh: new THREE.MeshStandardMaterial({ color: DEFAULT_COLORS.swoosh })
    };

    const sole = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 0.15, 0.8),
      materials.sole
    );
    sole.castShadow = true;
    sole.receiveShadow = true;
    sneakerGroup.add(sole);

    const upper = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 0.4, 0.7),
      materials.upper
    );
    upper.position.set(0.05, 0.275, 0);
    upper.castShadow = true;
    upper.receiveShadow = true;
    sneakerGroup.add(upper);

    const tongue = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.5, 0.05),
      materials.tongue
    );
    tongue.position.set(0.45, 0.48, 0);
    tongue.rotation.z = -0.2;
    tongue.castShadow = true;
    tongue.receiveShadow = true;
    sneakerGroup.add(tongue);

    const lacePositions = [0.18, 0.0, -0.18];
    const laceGroup = new THREE.Group();
    laceGroup.position.set(0.05, 0.42, 0);

    lacePositions.forEach((z) => {
      const lace = new THREE.Mesh(
        new THREE.BoxGeometry(0.4, 0.03, 0.05),
        materials.laces
      );
      lace.rotation.x = 0.08;
      lace.position.set(0.05, 0, z);
      lace.castShadow = true;
      lace.receiveShadow = true;
      laceGroup.add(lace);
    });
    sneakerGroup.add(laceGroup);

    const swoosh = new THREE.Mesh(
      new THREE.TorusGeometry(0.4, 0.03, 8, 32, Math.PI),
      materials.swoosh
    );
    swoosh.position.set(0.0, 0.3, 0.37);
    swoosh.rotation.y = Math.PI / 2;
    swoosh.rotation.z = 0.35;
    swoosh.scale.set(1.1, 0.65, 0.3);
    swoosh.castShadow = true;
    sneakerGroup.add(swoosh);

    let stork = null;
    let storkBaseY = 0;

    const loader = new GLTFLoader();
    loader.load(
      'stork.glb',
      (gltf) => {
        stork = gltf.scene;
        stork.position.set(2, 0, -1);
        stork.scale.set(0.8, 0.8, 0.8);
        storkBaseY = stork.position.y;

        stork.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
          }
        });

        scene.add(stork);
        window.__3D_STATE__.storkLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Could not load stork.glb:', error);
      }
    );

    const partSelector = document.getElementById('partSelector');
    const currentColorEl = document.getElementById('currentColor');
    const changesCountEl = document.getElementById('changesCount');
    const resetBtn = document.getElementById('resetBtn');
    const toggleRotationBtn = document.getElementById('toggleRotation');

    function normalizeHex(color) {
      return new THREE.Color(color).getStyle().startsWith('rgb')
        ? '#' + new THREE.Color(color).getHexString()
        : color.toLowerCase();
    }

    function updateCurrentColorDisplay() {
      const part = window.__3D_STATE__.selectedPart;
      currentColorEl.textContent = window.__3D_STATE__.partColors[part];
      changesCountEl.textContent = String(window.__3D_STATE__.changesCount);
    }

    function applyColorToPart(part, color) {
      const hex = normalizeHex(color);
      materials[part].color.set(hex);
      window.__3D_STATE__.partColors[part] = hex;
      window.__3D_STATE__.changesCount += 1;
      updateCurrentColorDisplay();
    }

    function resetAllParts() {
      Object.keys(DEFAULT_COLORS).forEach((part) => {
        materials[part].color.set(DEFAULT_COLORS[part]);
        window.__3D_STATE__.partColors[part] = DEFAULT_COLORS[part];
      });
      window.__3D_STATE__.changesCount = 0;
      updateCurrentColorDisplay();
    }

    partSelector.addEventListener('change', (e) => {
      window.__3D_STATE__.selectedPart = e.target.value;
      updateCurrentColorDisplay();
    });

    for (let i = 0; i < 5; i++) {
      const swatch = document.getElementById(`color${i}`);
      swatch.addEventListener('click', () => {
        const selectedPart = window.__3D_STATE__.selectedPart;
        const color = swatch.dataset.color;
        applyColorToPart(selectedPart, color);
      });
    }

    resetBtn.addEventListener('click', () => {
      resetAllParts();
    });

    toggleRotationBtn.addEventListener('click', () => {
      window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
      toggleRotationBtn.textContent = window.__3D_STATE__.isRotating ? 'Pause Rotation' : 'Resume Rotation';
    });

    updateCurrentColorDisplay();

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const elapsed = clock.getElapsedTime();

      if (window.__3D_STATE__.isRotating) {
        sneakerGroup.rotation.y += 0.3 * delta;
      }

      if (stork) {
        stork.position.y = storkBaseY + Math.sin(elapsed * Math.PI * 2 * 1) * 0.15;
      }

      controls.update();

      window.__3D_STATE__.rotationAngle = sneakerGroup.rotation.y;
      window.__3D_STATE__.storkY = stork ? stork.position.y : 0;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.selectedPart = partSelector.value;
      window.__3D_STATE__.isRotating = window.__3D_STATE__.isRotating;
      window.__3D_STATE__.changesCount = window.__3D_STATE__.changesCount;
      window.__3D_STATE__.storkLoaded = !!stork;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
