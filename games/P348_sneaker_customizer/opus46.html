<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sneaker Customizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }

#uiPanel {
    position: fixed;
    left: 0;
    top: 0;
    width: 220px;
    height: 100vh;
    background: rgba(0, 0, 0, 0.8);
    padding: 15px;
    color: white;
    font-family: Arial, sans-serif;
    z-index: 10;
    overflow-y: auto;
}

#uiPanel h2 {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 20px;
    letter-spacing: 1px;
    border-bottom: 2px solid #ff4444;
    padding-bottom: 10px;
}

.section-label {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

#partSelector {
    width: 100%;
    padding: 8px;
    margin-bottom: 15px;
    background: #2d2d44;
    color: white;
    border: 1px solid #555;
    border-radius: 4px;
    font-size: 14px;
    cursor: pointer;
}

#partSelector option {
    background: #2d2d44;
    color: white;
}

.swatches {
    display: flex;
    gap: 8px;
    margin-bottom: 15px;
    flex-wrap: wrap;
}

.swatch {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s;
}

.swatch:hover {
    transform: scale(1.15);
    border-color: white;
}

.info-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 13px;
}

.info-row span:first-child {
    color: #aaa;
}

#currentColor {
    font-weight: bold;
    font-family: monospace;
    font-size: 14px;
}

#changesCount {
    font-weight: bold;
    color: #ff4444;
}

button {
    width: 100%;
    padding: 10px;
    margin-bottom: 8px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: background 0.2s;
}

#resetBtn {
    background: #ff4444;
    color: white;
}

#resetBtn:hover {
    background: #ff6666;
}

#toggleRotation {
    background: #3498db;
    color: white;
}

#toggleRotation:hover {
    background: #5dade2;
}
</style>
</head>
<body>

<div id="uiPanel">
    <h2>SNEAKER CUSTOMIZER</h2>

    <div class="section-label">Select Part</div>
    <select id="partSelector">
        <option value="sole">Sole</option>
        <option value="upper">Upper</option>
        <option value="tongue">Tongue</option>
        <option value="laces">Laces</option>
        <option value="swoosh">Swoosh</option>
    </select>

    <div class="section-label">Color Swatches</div>
    <div class="swatches">
        <div class="swatch" id="color0" style="background: #ffffff;"></div>
        <div class="swatch" id="color1" style="background: #222222;"></div>
        <div class="swatch" id="color2" style="background: #ff4444;"></div>
        <div class="swatch" id="color3" style="background: #3498db;"></div>
        <div class="swatch" id="color4" style="background: #2ecc71;"></div>
    </div>

    <div class="info-row">
        <span>Current Color:</span>
        <span id="currentColor">#222222</span>
    </div>

    <div class="info-row">
        <span>Changes Made:</span>
        <span id="changesCount">0</span>
    </div>

    <button id="resetBtn">Reset All</button>
    <button id="toggleRotation">Pause Rotation</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Default colors
const defaultColors = {
    sole: '#222222',
    upper: '#ffffff',
    tongue: '#ffffff',
    laces: '#ff0000',
    swoosh: '#ff4444'
};

const swatchColors = ['#ffffff', '#222222', '#ff4444', '#3498db', '#2ecc71'];

// State
window.__3D_STATE__ = {
    selectedPart: 'sole',
    partColors: { ...defaultColors },
    isRotating: true,
    rotationAngle: 0,
    changesCount: 0,
    storkLoaded: false,
    storkY: 0,
    cameraDistance: 0
};

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x1a1a2e);
document.body.appendChild(renderer.domElement);

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Ground plane
const groundGeo = new THREE.CircleGeometry(3, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Sneaker group
const sneakerGroup = new THREE.Group();
sneakerGroup.position.set(0, 0.3, 0);
scene.add(sneakerGroup);

// Materials storage
const materials = {};

// Sole
const soleGeo = new THREE.BoxGeometry(1.8, 0.15, 0.8);
materials.sole = new THREE.MeshStandardMaterial({ color: defaultColors.sole });
const sole = new THREE.Mesh(soleGeo, materials.sole);
sole.castShadow = true;
sole.receiveShadow = true;
sneakerGroup.add(sole);

// Upper
const upperGeo = new THREE.BoxGeometry(1.5, 0.4, 0.7);
materials.upper = new THREE.MeshStandardMaterial({ color: defaultColors.upper });
const upper = new THREE.Mesh(upperGeo, materials.upper);
upper.position.set(0, 0.075 + 0.2, 0);
upper.castShadow = true;
upper.receiveShadow = true;
sneakerGroup.add(upper);

// Tongue
const tongueGeo = new THREE.BoxGeometry(0.3, 0.5, 0.05);
materials.tongue = new THREE.MeshStandardMaterial({ color: defaultColors.tongue });
const tongue = new THREE.Mesh(tongueGeo, materials.tongue);
tongue.position.set(0.6, 0.075 + 0.4 + 0.1, 0);
tongue.rotation.z = 0.2;
tongue.castShadow = true;
sneakerGroup.add(tongue);

// Laces
materials.laces = new THREE.MeshStandardMaterial({ color: defaultColors.laces });
const lacePositions = [0.15, 0.0, -0.15];
const laces = [];
lacePositions.forEach((xOff, i) => {
    const laceGeo = new THREE.BoxGeometry(0.4, 0.03, 0.05);
    const lace = new THREE.Mesh(laceGeo, materials.laces);
    lace.position.set(0.2 + i * 0.15, 0.075 + 0.4 + 0.02, 0);
    lace.castShadow = true;
    sneakerGroup.add(lace);
    laces.push(lace);
});

// Swoosh
const swooshGeo = new THREE.TorusGeometry(0.4, 0.03, 8, 32, Math.PI);
materials.swoosh = new THREE.MeshStandardMaterial({ color: defaultColors.swoosh });
const swoosh = new THREE.Mesh(swooshGeo, materials.swoosh);
swoosh.position.set(0, 0.075 + 0.2, 0.36);
swoosh.rotation.x = Math.PI / 2;
swoosh.rotation.z = Math.PI / 2;
swoosh.scale.set(1, 0.5, 1);
swoosh.castShadow = true;
sneakerGroup.add(swoosh);

// Stork mascot
let storkModel = null;
const storkBaseY = 0;
const loader = new GLTFLoader();
loader.load('stork.glb', (gltf) => {
    storkModel = gltf.scene;
    storkModel.position.set(2, 0, -1);
    storkModel.scale.set(0.8, 0.8, 0.8);
    storkModel.traverse((child) => {
        if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
        }
    });
    scene.add(storkModel);
    window.__3D_STATE__.storkLoaded = true;
}, undefined, (error) => {
    console.warn('Could not load stork.glb:', error);
    // Create a placeholder stork from primitives
    const storkPlaceholder = new THREE.Group();

    // Body
    const bodyGeo = new THREE.CapsuleGeometry(0.15, 0.4, 8, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.z = Math.PI / 4;
    body.castShadow = true;
    storkPlaceholder.add(body);

    // Head
    const headGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.set(0.25, 0.25, 0);
    head.castShadow = true;
    storkPlaceholder.add(head);

    // Beak
    const beakGeo = new THREE.ConeGeometry(0.04, 0.2, 8);
    const beakMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
    const beak = new THREE.Mesh(beakGeo, beakMat);
    beak.position.set(0.4, 0.25, 0);
    beak.rotation.z = -Math.PI / 2;
    storkPlaceholder.add(beak);

    // Legs
    const legGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.5, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
    const leg1 = new THREE.Mesh(legGeo, legMat);
    leg1.position.set(-0.05, -0.4, 0.05);
    storkPlaceholder.add(leg1);
    const leg2 = new THREE.Mesh(legGeo, legMat);
    leg2.position.set(-0.05, -0.4, -0.05);
    storkPlaceholder.add(leg2);

    storkPlaceholder.position.set(2, 0, -1);
    storkPlaceholder.scale.set(0.8, 0.8, 0.8);
    scene.add(storkPlaceholder);
    storkModel = storkPlaceholder;
    window.__3D_STATE__.storkLoaded = true;
});

// UI Elements
const partSelector = document.getElementById('partSelector');
const currentColorSpan = document.getElementById('currentColor');
const changesCountSpan = document.getElementById('changesCount');
const resetBtn = document.getElementById('resetBtn');
const toggleRotationBtn = document.getElementById('toggleRotation');

// Update current color display
function updateCurrentColorDisplay() {
    const part = window.__3D_STATE__.selectedPart;
    const color = window.__3D_STATE__.partColors[part];
    currentColorSpan.textContent = color;
    currentColorSpan.style.color = color;
}

// Part selector
partSelector.addEventListener('change', (e) => {
    window.__3D_STATE__.selectedPart = e.target.value;
    updateCurrentColorDisplay();
});

// Color swatches
swatchColors.forEach((color, i) => {
    const swatch = document.getElementById(`color${i}`);
    swatch.addEventListener('click', () => {
        const part = window.__3D_STATE__.selectedPart;
        materials[part].color.set(color);
        window.__3D_STATE__.partColors[part] = color;
        window.__3D_STATE__.changesCount++;
        changesCountSpan.textContent = window.__3D_STATE__.changesCount;
        updateCurrentColorDisplay();
    });
});

// Reset button
resetBtn.addEventListener('click', () => {
    Object.keys(defaultColors).forEach((part) => {
        materials[part].color.set(defaultColors[part]);
        window.__3D_STATE__.partColors[part] = defaultColors[part];
    });
    window.__3D_STATE__.changesCount = 0;
    changesCountSpan.textContent = '0';
    updateCurrentColorDisplay();
});

// Toggle rotation
toggleRotationBtn.addEventListener('click', () => {
    window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
    toggleRotationBtn.textContent = window.__3D_STATE__.isRotating ? 'Pause Rotation' : 'Resume Rotation';
});

// Initial display
updateCurrentColorDisplay();

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();
    const delta = clock.getDelta();

    // Sneaker rotation
    if (window.__3D_STATE__.isRotating) {
        sneakerGroup.rotation.y += 0.3 * (1 / 60); // approx 0.3 rad/s
    }
    window.__3D_STATE__.rotationAngle = sneakerGroup.rotation.y;

    // Stork bobbing
    if (storkModel) {
        const bobY = storkBaseY + Math.sin(elapsed * Math.PI * 2) * 0.15;
        storkModel.position.y = bobY;
        window.__3D_STATE__.storkY = bobY;
    }

    // Camera distance
    window.__3D_STATE__.cameraDistance = camera.position.length();

    // Update controls
    controls.update();

    // Render
    renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
