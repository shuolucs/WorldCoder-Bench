<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Sneaker Customizer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 220px;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            color: white;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 10;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
        }
        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }
        select, button {
            width: 100%;
            padding: 8px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        select:focus, button:focus {
            outline: none;
            border-color: #888;
        }
        button:hover {
            background: #444;
        }
        .swatch-container {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .swatch {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            box-sizing: border-box;
            transition: transform 0.1s, border-color 0.1s;
        }
        .swatch:hover {
            transform: scale(1.1);
            border-color: #fff;
        }
        .stats {
            margin-top: auto;
            font-size: 12px;
            color: #aaa;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .stats span {
            color: #fff;
            font-weight: bold;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-panel">
        <h2>SNEAKER CUSTOMIZER</h2>
        
        <div>
            <label for="partSelector">Select Part:</label>
            <select id="partSelector">
                <option value="sole">Sole</option>
                <option value="upper">Upper</option>
                <option value="tongue">Tongue</option>
                <option value="laces">Laces</option>
                <option value="swoosh">Swoosh</option>
            </select>
        </div>

        <div>
            <label>Choose Color:</label>
            <div class="swatch-container">
                <div class="swatch" id="color0" style="background-color: #ffffff;" data-color="#ffffff"></div>
                <div class="swatch" id="color1" style="background-color: #222222;" data-color="#222222"></div>
                <div class="swatch" id="color2" style="background-color: #ff4444;" data-color="#ff4444"></div>
                <div class="swatch" id="color3" style="background-color: #3498db;" data-color="#3498db"></div>
                <div class="swatch" id="color4" style="background-color: #2ecc71;" data-color="#2ecc71"></div>
            </div>
        </div>

        <button id="toggleRotation">Pause Rotation</button>
        <button id="resetBtn">Reset All</button>

        <div class="stats">
            <div>Current Color: <span id="currentColor">#222222</span></div>
            <div>Changes: <span id="changesCount">0</span></div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        const defaultColors = {
            sole: '#222222',
            upper: '#ffffff',
            tongue: '#ffffff',
            laces: '#ff0000',
            swoosh: '#ff4444'
        };

        window.__3D_STATE__ = {
            selectedPart: 'sole',
            partColors: { ...defaultColors },
            isRotating: true,
            rotationAngle: 0,
            changesCount: 0,
            storkLoaded: false,
            storkY: 0,
            cameraDistance: 5
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.CircleGeometry(3, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Sneaker Model (Primitives) ---
        const sneakerGroup = new THREE.Group();
        sneakerGroup.position.set(0, 0.3, 0);
        scene.add(sneakerGroup);

        const materials = {
            sole: new THREE.MeshStandardMaterial({ color: defaultColors.sole }),
            upper: new THREE.MeshStandardMaterial({ color: defaultColors.upper }),
            tongue: new THREE.MeshStandardMaterial({ color: defaultColors.tongue }),
            laces: new THREE.MeshStandardMaterial({ color: defaultColors.laces }),
            swoosh: new THREE.MeshStandardMaterial({ color: defaultColors.swoosh })
        };

        // Sole
        const soleGeo = new THREE.BoxGeometry(1.8, 0.15, 0.8);
        const sole = new THREE.Mesh(soleGeo, materials.sole);
        sole.position.set(0, 0.075, 0);
        sole.castShadow = true;
        sole.receiveShadow = true;
        sneakerGroup.add(sole);

        // Upper
        const upperGeo = new THREE.BoxGeometry(1.5, 0.4, 0.7);
        const upper = new THREE.Mesh(upperGeo, materials.upper);
        upper.position.set(-0.1, 0.35, 0);
        upper.castShadow = true;
        upper.receiveShadow = true;
        sneakerGroup.add(upper);

        // Tongue
        const tongueGeo = new THREE.BoxGeometry(0.3, 0.5, 0.05);
        const tongue = new THREE.Mesh(tongueGeo, materials.tongue);
        tongue.position.set(0.5, 0.55, 0);
        tongue.rotation.z = -0.3; // Tilt back
        tongue.castShadow = true;
        tongue.receiveShadow = true;
        sneakerGroup.add(tongue);

        // Laces
        const lacesGroup = new THREE.Group();
        const laceGeo = new THREE.BoxGeometry(0.4, 0.03, 0.05);
        for (let i = 0; i < 3; i++) {
            const lace = new THREE.Mesh(laceGeo, materials.laces);
            lace.rotation.y = Math.PI / 2; // Rotate to go across
            lace.position.set(0.2 + i * 0.15, 0.56, 0);
            lace.castShadow = true;
            lace.receiveShadow = true;
            lacesGroup.add(lace);
        }
        sneakerGroup.add(lacesGroup);

        // Swoosh
        const swooshGeo = new THREE.TorusGeometry(0.4, 0.03, 8, 32, Math.PI);
        const swoosh = new THREE.Mesh(swooshGeo, materials.swoosh);
        swoosh.position.set(-0.1, 0.35, 0.36);
        swoosh.scale.set(1, 0.5, 0.1); // Flatten and shape
        swoosh.rotation.z = -0.2;
        swoosh.castShadow = true;
        swoosh.receiveShadow = true;
        
        // Add swoosh to both sides
        const swooshRight = swoosh.clone();
        swooshRight.position.set(-0.1, 0.35, -0.36);
        swooshRight.rotation.y = Math.PI;
        
        sneakerGroup.add(swoosh);
        sneakerGroup.add(swooshRight);

        // --- Stork Mascot ---
        let storkModel = null;
        const loader = new GLTFLoader();
        loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@master/examples/models/gltf/Stork.glb', (gltf) => {
            storkModel = gltf.scene;
            storkModel.position.set(2, 0, -1);
            storkModel.scale.set(0.8, 0.8, 0.8);
            
            storkModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(storkModel);
            window.__3D_STATE__.storkLoaded = true;
        });

        // --- UI Interactions ---
        const partSelector = document.getElementById('partSelector');
        const currentColorSpan = document.getElementById('currentColor');
        const changesCountSpan = document.getElementById('changesCount');
        const toggleRotationBtn = document.getElementById('toggleRotation');
        const resetBtn = document.getElementById('resetBtn');
        const swatches = document.querySelectorAll('.swatch');

        function updateUI() {
            const part = window.__3D_STATE__.selectedPart;
            currentColorSpan.textContent = window.__3D_STATE__.partColors[part];
            changesCountSpan.textContent = window.__3D_STATE__.changesCount;
            toggleRotationBtn.textContent = window.__3D_STATE__.isRotating ? 'Pause Rotation' : 'Resume Rotation';
        }

        partSelector.addEventListener('change', (e) => {
            window.__3D_STATE__.selectedPart = e.target.value;
            updateUI();
        });

        swatches.forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                const colorHex = e.target.getAttribute('data-color');
                const part = window.__3D_STATE__.selectedPart;
                
                materials[part].color.set(colorHex);
                window.__3D_STATE__.partColors[part] = colorHex;
                window.__3D_STATE__.changesCount++;
                
                updateUI();
            });
        });

        resetBtn.addEventListener('click', () => {
            for (const part in defaultColors) {
                materials[part].color.set(defaultColors[part]);
                window.__3D_STATE__.partColors[part] = defaultColors[part];
            }
            window.__3D_STATE__.changesCount = 0;
            updateUI();
        });

        toggleRotationBtn.addEventListener('click', () => {
            window.__3D_STATE__.isRotating = !window.__3D_STATE__.isRotating;
            updateUI();
        });

        // Initialize UI
        updateUI();

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const elapsedTime = clock.getElapsedTime();

            // Sneaker Rotation
            if (window.__3D_STATE__.isRotating) {
                sneakerGroup.rotation.y += 0.3 * delta;
            }

            // Stork Bobbing
            if (storkModel) {
                storkModel.position.y = Math.sin(elapsedTime * Math.PI * 2 * 1) * 0.15;
            }

            // Update State
            window.__3D_STATE__.rotationAngle = sneakerGroup.rotation.y;
            window.__3D_STATE__.storkY = storkModel ? storkModel.position.y : 0;
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
