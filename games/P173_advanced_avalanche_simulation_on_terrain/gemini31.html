<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalanche Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        .panel {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        p {
            margin: 8px 0;
            font-size: 18px;
            font-weight: bold;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #45a049;
        }
        #reset-btn {
            background-color: #f44336;
        }
        #reset-btn:hover {
            background-color: #da190b;
        }
        .instructions {
            margin-top: 15px;
            font-size: 14px;
            color: #ccc;
            font-weight: normal;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div class="panel">
            <h1>Avalanche Survival</h1>
            <p>Status: <span id="status-display">Ready</span></p>
            <p>Score: <span id="score-display">0</span></p>
            <p>Lives: <span id="lives-display">3</span></p>
            
            <div class="controls">
                <button id="start-btn">Start Avalanche</button>
                <button id="reset-btn">Reset</button>
            </div>
            
            <div class="instructions">
                Move: Left/Right Arrows or A/D<br>
                Start: Spacebar | Reset: R key
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            simulationStarted: false,
            score: 0,
            lives: 3,
            gameOver: false,
            ferrarLoaded: false,
            ferrariX: 0,
            bouldersSpawned: 0,
            bouldersActive: 0,
            bouldersDodged: 0,
            totalHits: 0,
            elapsedTime: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 30, 20);
        dirLight.castShadow = true;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        scene.add(dirLight);

        // --- Terrain ---
        const terrainGeo = new THREE.PlaneGeometry(80, 80, 40, 40);
        const posAttr = terrainGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            posAttr.setZ(i, Math.random() * 1.5); // Bumpy displacement
        }
        terrainGeo.computeVertexNormals();
        
        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0xeeeeee, 
            roughness: 0.8,
            flatShading: true
        });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        
        // Tilt ~30 degrees and position to pass through (0,20,-30) and (0,0,15)
        terrain.rotation.x = -Math.PI / 2 + Math.atan2(20, 45);
        terrain.position.set(0, 10, -7.5);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // --- Player (Ferrari) ---
        const ferrariGroup = new THREE.Group();
        ferrariGroup.position.set(0, 0, 15);
        scene.add(ferrariGroup);

        // Fallback geometry while loading or if loading fails
        const fallbackGeo = new THREE.BoxGeometry(2, 1, 4);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
        fallbackMesh.position.y = 0.5;
        fallbackMesh.castShadow = true;
        ferrariGroup.add(fallbackMesh);

        const loader = new GLTFLoader();
        loader.load('ferrari.glb', (gltf) => {
            ferrariGroup.remove(fallbackMesh);
            const model = gltf.scene;
            
            // Scale to roughly 2 units wide
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 2 / size.x;
            model.scale.setScalar(scale);
            
            // Center and position
            box.setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center);
            model.position.y += box.getSize(new THREE.Vector3()).y / 2;
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            ferrariGroup.add(model);
            window.__3D_STATE__.ferrarLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load ferrari.glb, using fallback box.", error);
            window.__3D_STATE__.ferrarLoaded = true;
        });

        // --- Boulders ---
        const boulders = [];
        const boulderGeo = new THREE.SphereGeometry(1, 16, 16);
        const boulderMat = new THREE.MeshStandardMaterial({ color: 0x6b543a, roughness: 0.9 });

        for (let i = 0; i < 15; i++) {
            const mesh = new THREE.Mesh(boulderGeo, boulderMat);
            mesh.castShadow = true;
            mesh.visible = false;
            scene.add(mesh);
            boulders.push({
                mesh: mesh,
                active: false,
                velocity: 0,
                radius: 1
            });
        }

        // --- Physics & Game Logic Variables ---
        const clock = new THREE.Clock();
        let spawnTimer = 0;
        const slopeDir = new THREE.Vector3(0, -20, 45).normalize();
        const gravityAcc = 9.8 * Math.sin(30 * Math.PI / 180);
        let flashTimeout = null;

        // --- Input Handling ---
        const keys = { left: false, right: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') startGame();
            if (e.code === 'KeyR') resetGame();
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        document.getElementById('start-btn').addEventListener('click', startGame);
        document.getElementById('reset-btn').addEventListener('click', resetGame);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Functions ---
        function startGame() {
            if (!window.__3D_STATE__.simulationStarted && !window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.simulationStarted = true;
            }
        }

        function resetGame() {
            window.__3D_STATE__.simulationStarted = false;
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.lives = 3;
            window.__3D_STATE__.gameOver = false;
            window.__3D_STATE__.bouldersSpawned = 0;
            window.__3D_STATE__.bouldersDodged = 0;
            window.__3D_STATE__.totalHits = 0;
            window.__3D_STATE__.elapsedTime = 0;
            
            spawnTimer = 0;
            ferrariGroup.position.set(0, 0, 15);
            
            boulders.forEach(b => {
                b.active = false;
                b.mesh.visible = false;
            });
            
            updateHUD();
        }

        function flashFerrari() {
            ferrariGroup.traverse((child) => {
                if (child.isMesh && child.material) {
                    if (!child.userData.origEmissive) {
                        child.userData.origEmissive = child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000);
                    }
                    child.material.emissive = new THREE.Color(0xff0000);
                }
            });
            
            clearTimeout(flashTimeout);
            flashTimeout = setTimeout(() => {
                ferrariGroup.traverse((child) => {
                    if (child.isMesh && child.material && child.userData.origEmissive) {
                        child.material.emissive.copy(child.userData.origEmissive);
                    }
                });
            }, 200);
        }

        function updateHUD() {
            document.getElementById('score-display').innerText = window.__3D_STATE__.score;
            document.getElementById('lives-display').innerText = window.__3D_STATE__.lives;
            
            let status = 'Ready';
            if (window.__3D_STATE__.gameOver) status = 'GAME OVER';
            else if (window.__3D_STATE__.simulationStarted) status = 'Running';
            document.getElementById('status-display').innerText = status;
        }

        // --- Main Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent huge jumps

            if (window.__3D_STATE__.simulationStarted && !window.__3D_STATE__.gameOver) {
                window.__3D_STATE__.elapsedTime += delta;
                spawnTimer += delta;

                // Player Movement
                const speed = 20;
                if (keys.left) ferrariGroup.position.x -= speed * delta;
                if (keys.right) ferrariGroup.position.x += speed * delta;
                ferrariGroup.position.x = Math.max(-15, Math.min(15, ferrariGroup.position.x));
                window.__3D_STATE__.ferrariX = ferrariGroup.position.x;

                // Spawning Logic
                if (spawnTimer >= 1.5) {
                    spawnTimer = 0;
                    const inactiveBoulder = boulders.find(b => !b.active);
                    if (inactiveBoulder) {
                        inactiveBoulder.active = true;
                        inactiveBoulder.mesh.visible = true;
                        inactiveBoulder.radius = 0.5 + Math.random() * 1.0; // 0.5 to 1.5
                        inactiveBoulder.mesh.scale.setScalar(inactiveBoulder.radius);
                        
                        const randomX = (Math.random() - 0.5) * 30; // [-15, 15]
                        inactiveBoulder.mesh.position.set(randomX, 20, -30);
                        inactiveBoulder.velocity = 0;
                        
                        window.__3D_STATE__.bouldersSpawned++;
                    }
                }

                // Update Boulders & Collisions
                let activeCount = 0;
                for (let b of boulders) {
                    if (b.active) {
                        activeCount++;
                        
                        // Physics
                        b.velocity += gravityAcc * delta;
                        b.mesh.position.addScaledVector(slopeDir, b.velocity * delta);
                        b.mesh.rotation.x += (b.velocity * delta) / b.radius; // Rolling effect

                        // Collision Detection
                        if (b.mesh.position.distanceTo(ferrariGroup.position) < 3) {
                            // Hit
                            b.active = false;
                            b.mesh.visible = false;
                            window.__3D_STATE__.totalHits++;
                            window.__3D_STATE__.lives--;
                            window.__3D_STATE__.score = Math.max(0, window.__3D_STATE__.score - 5);
                            
                            flashFerrari();
                            
                            if (window.__3D_STATE__.lives <= 0) {
                                window.__3D_STATE__.gameOver = true;
                            }
                        } 
                        // Recycling
                        else if (b.mesh.position.z > 25) {
                            b.active = false;
                            b.mesh.visible = false;
                            window.__3D_STATE__.bouldersDodged++;
                            window.__3D_STATE__.score += 10;
                        }
                    }
                }
                window.__3D_STATE__.bouldersActive = activeCount;
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
