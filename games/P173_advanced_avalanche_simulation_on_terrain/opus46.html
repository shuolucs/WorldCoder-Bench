<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalanche Simulation - Ferrari Dodge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 20px;
    pointer-events: none;
    z-index: 10;
}

#hud > div {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    max-width: 800px;
    margin: 0 auto;
}

.hud-panel {
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    padding: 15px 25px;
    color: #fff;
    backdrop-filter: blur(10px);
}

.hud-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 5px;
}

.hud-panel .value {
    font-size: 28px;
    font-weight: bold;
}

#score-display { color: #4fc3f7; }
#lives-display { color: #ef5350; }
#status-display { color: #66bb6a; }
#status-display.game-over { color: #ef5350; }
#status-display.running { color: #ffa726; }

.controls {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
    z-index: 10;
}

.controls button {
    pointer-events: all;
    padding: 12px 30px;
    font-size: 16px;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#start-btn {
    background: linear-gradient(135deg, #ff6b35, #ff4444);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 68, 68, 0.4);
}

#start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 68, 68, 0.6);
}

#start-btn:disabled {
    background: #555;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
}

#reset-btn {
    background: linear-gradient(135deg, #42a5f5, #1565c0);
    color: white;
    box-shadow: 0 4px 15px rgba(21, 101, 192, 0.4);
}

#reset-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(21, 101, 192, 0.6);
}

#game-over-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.8);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 20;
}

#game-over-overlay.visible {
    display: flex;
}

#game-over-overlay h1 {
    font-size: 72px;
    color: #ef5350;
    text-shadow: 0 0 30px rgba(239, 83, 80, 0.8);
    margin-bottom: 20px;
    animation: pulse 1s ease-in-out infinite alternate;
}

#game-over-overlay p {
    font-size: 24px;
    color: #fff;
    margin-bottom: 30px;
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}

.instructions {
    position: absolute;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 13px;
    text-align: center;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div>
        <div class="hud-panel">
            <h3>Score</h3>
            <div class="value" id="score-display">0</div>
        </div>
        <div class="hud-panel">
            <h3>Status</h3>
            <div class="value" id="status-display">Ready</div>
        </div>
        <div class="hud-panel">
            <h3>Lives</h3>
            <div class="value" id="lives-display">❤️ ❤️ ❤️</div>
        </div>
    </div>
</div>

<div id="game-over-overlay">
    <h1>GAME OVER</h1>
    <p>Final Score: <span id="final-score">0</span></p>
    <button id="restart-btn" onclick="resetSimulation()" style="padding:12px 30px;font-size:16px;font-weight:bold;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,#42a5f5,#1565c0);color:white;">Play Again</button>
</div>

<div class="instructions">
    Arrow Keys / A,D to move | Space to start | R to reset
</div>

<div class="controls">
    <button id="start-btn" onclick="startSimulation()">Start Avalanche</button>
    <button id="reset-btn" onclick="resetSimulation()">Reset</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    simulationStarted: false,
    score: 0,
    lives: 3,
    gameOver: false,
    ferrarLoaded: false,
    ferrariX: 0,
    bouldersSpawned: 0,
    bouldersActive: 0,
    bouldersDodged: 0,
    totalHits: 0,
    elapsedTime: 0
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 50, 100);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 25, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(10, 30, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x8899bb, 0.4);
scene.add(ambientLight);

const hemiLight = new THREE.HemisphereLight(0xaaccff, 0x445566, 0.5);
scene.add(hemiLight);

// --- Terrain ---
const slopeAngle = 30 * Math.PI / 180;
const terrainGeo = new THREE.PlaneGeometry(80, 80, 40, 40);
const posAttr = terrainGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
    const x = posAttr.getX(i);
    const y = posAttr.getY(i);
    const displacement = Math.sin(x * 0.3) * Math.cos(y * 0.3) * 0.5 +
                          Math.sin(x * 0.7 + 1.3) * 0.3 +
                          Math.cos(y * 0.5 + 0.7) * 0.4 +
                          (Math.random() - 0.5) * 0.3;
    posAttr.setZ(i, displacement);
}
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshStandardMaterial({
    color: 0xe8e8e8,
    roughness: 0.9,
    metalness: 0.0,
    flatShading: false,
});

const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.rotation.x = -Math.PI / 2 + slopeAngle;
terrain.receiveShadow = true;
scene.add(terrain);

// Side mountains
for (let side = -1; side <= 1; side += 2) {
    const mGeo = new THREE.ConeGeometry(15, 30, 8);
    const mMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.8, flatShading: true });
    const mountain = new THREE.Mesh(mGeo, mMat);
    mountain.position.set(side * 35, 10, -15);
    mountain.castShadow = true;
    scene.add(mountain);
}

// Snow particles
const snowGeo = new THREE.BufferGeometry();
const snowCount = 2000;
const snowPositions = new Float32Array(snowCount * 3);
for (let i = 0; i < snowCount; i++) {
    snowPositions[i * 3] = (Math.random() - 0.5) * 80;
    snowPositions[i * 3 + 1] = Math.random() * 40;
    snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 80;
}
snowGeo.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
const snow = new THREE.Points(snowGeo, snowMat);
scene.add(snow);

// --- Ferrari ---
let ferrari = null;
let ferrariMixer = null;
let ferrariOriginalMaterials = [];
const ferrariPos = new THREE.Vector3(0, 0, 15);

// Fallback car if GLB fails
function createFallbackCar() {
    const carGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(2, 0.6, 4);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.7, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.5;
    body.castShadow = true;
    carGroup.add(body);

    // Cabin
    const cabinGeo = new THREE.BoxGeometry(1.6, 0.5, 2);
    const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.2 });
    const cabin = new THREE.Mesh(cabinGeo, cabinMat);
    cabin.position.y = 1.05;
    cabin.position.z = -0.3;
    cabin.castShadow = true;
    carGroup.add(cabin);

    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
    const wheelPositions = [
        [-1.1, 0.3, 1.2], [1.1, 0.3, 1.2],
        [-1.1, 0.3, -1.2], [1.1, 0.3, -1.2]
    ];
    wheelPositions.forEach(pos => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(...pos);
        wheel.castShadow = true;
        carGroup.add(wheel);
    });

    // Headlights
    const hlGeo = new THREE.SphereGeometry(0.15, 8, 8);
    const hlMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 0.5 });
    [[-0.7, 0.5, 2], [0.7, 0.5, 2]].forEach(pos => {
        const hl = new THREE.Mesh(hlGeo, hlMat);
        hl.position.set(...pos);
        carGroup.add(hl);
    });

    return carGroup;
}

const loader = new GLTFLoader();
loader.load('ferrari.glb',
    (gltf) => {
        ferrari = gltf.scene;
        const box = new THREE.Box3().setFromObject(ferrari);
        const size = box.getSize(new THREE.Vector3());
        const scale = 2 / size.x;
        ferrari.scale.set(scale, scale, scale);
        ferrari.position.copy(ferrariPos);
        ferrari.castShadow = true;
        ferrari.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                ferrariOriginalMaterials.push({ mesh: child, material: child.material.clone() });
            }
        });
        scene.add(ferrari);
        state.ferrarLoaded = true;
        if (gltf.animations && gltf.animations.length > 0) {
            ferrariMixer = new THREE.AnimationMixer(ferrari);
        }
    },
    undefined,
    (error) => {
        console.warn('Failed to load ferrari.glb, using fallback car:', error);
        ferrari = createFallbackCar();
        ferrari.position.copy(ferrariPos);
        ferrari.traverse(child => {
            if (child.isMesh) {
                ferrariOriginalMaterials.push({ mesh: child, material: child.material.clone() });
            }
        });
        scene.add(ferrari);
        state.ferrarLoaded = true;
    }
);

// --- Boulders ---
const boulders = [];
const maxBoulders = 15;
const boulderPool = [];

function createBoulder() {
    const radius = 0.5 + Math.random() * 1.0;
    const detail = Math.floor(Math.random() * 2) + 1;
    const geo = new THREE.IcosahedronGeometry(radius, detail);

    // Displace vertices for rocky look
    const pos = geo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);
        const z = pos.getZ(i);
        const len = Math.sqrt(x*x + y*y + z*z);
        const noise = 1 + (Math.random() - 0.5) * 0.3;
        pos.setXYZ(i, x/len * radius * noise, y/len * radius * noise, z/len * radius * noise);
    }
    geo.computeVertexNormals();

    const colorChoice = Math.random();
    let color;
    if (colorChoice < 0.33) color = 0x666666;
    else if (colorChoice < 0.66) color = 0x8B7355;
    else color = 0x555555;

    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.9,
        metalness: 0.1,
        flatShading: true
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.visible = false;
    scene.add(mesh);

    return {
        mesh,
        radius,
        velocity: new THREE.Vector3(),
        active: false,
        rotationAxis: new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize(),
        rotationSpeed: Math.random() * 3 + 1,
        hasHit: false,
        hasPassed: false
    };
}

// Pre-create boulder pool
for (let i = 0; i < maxBoulders; i++) {
    boulderPool.push(createBoulder());
}

function spawnBoulder() {
    let boulder = boulderPool.find(b => !b.active);
    if (!boulder) {
        boulder = createBoulder();
        boulderPool.push(boulder);
    }

    const x = (Math.random() - 0.5) * 30;
    boulder.mesh.position.set(x, 20, -30);
    boulder.velocity.set(
        (Math.random() - 0.5) * 2,
        0,
        0
    );
    boulder.active = true;
    boulder.hasHit = false;
    boulder.hasPassed = false;
    boulder.mesh.visible = true;
    boulders.push(boulder);
    state.bouldersSpawned++;
}

// --- Game Logic ---
let simulationStarted = false;
let gameOver = false;
let score = 0;
let lives = 3;
let startTime = 0;
let lastSpawnTime = 0;
let spawnInterval = 1.5;
let hitFlashTimer = 0;
const keys = {};
const moveSpeed = 20;
const gravity = 9.8;
const slopeSin = Math.sin(slopeAngle);
const slopeCos = Math.cos(slopeAngle);

function updateHUD() {
    document.getElementById('score-display').textContent = score;

    let heartsStr = '';
    for (let i = 0; i < lives; i++) heartsStr += '❤️ ';
    if (lives === 0) heartsStr = '💀';
    document.getElementById('lives-display').textContent = heartsStr.trim();

    const statusEl = document.getElementById('status-display');
    statusEl.className = 'value';
    if (gameOver) {
        statusEl.textContent = 'Game Over';
        statusEl.classList.add('game-over');
    } else if (simulationStarted) {
        statusEl.textContent = 'Running';
        statusEl.classList.add('running');
    } else {
        statusEl.textContent = 'Ready';
    }
}

function updateState() {
    state.simulationStarted = simulationStarted;
    state.score = score;
    state.lives = lives;
    state.gameOver = gameOver;
    state.ferrariX = ferrari ? ferrari.position.x : 0;
    state.bouldersActive = boulders.filter(b => b.active).length;
    state.elapsedTime = simulationStarted ? (performance.now() / 1000 - startTime) : 0;
}

window.startSimulation = function() {
    if (simulationStarted || gameOver) return;
    simulationStarted = true;
    startTime = performance.now() / 1000;
    lastSpawnTime = startTime;
    document.getElementById('start-btn').disabled = true;
    updateHUD();
};

window.resetSimulation = function() {
    simulationStarted = false;
    gameOver = false;
    score = 0;
    lives = 3;
    startTime = 0;
    lastSpawnTime = 0;
    hitFlashTimer = 0;

    state.bouldersSpawned = 0;
    state.bouldersDodged = 0;
    state.totalHits = 0;

    // Reset boulders
    boulders.length = 0;
    boulderPool.forEach(b => {
        b.active = false;
        b.mesh.visible = false;
        b.hasHit = false;
        b.hasPassed = false;
    });

    // Reset ferrari position
    if (ferrari) {
        ferrari.position.copy(ferrariPos);
        restoreFerrariMaterials();
    }

    document.getElementById('start-btn').disabled = false;
    document.getElementById('game-over-overlay').classList.remove('visible');
    updateHUD();
    updateState();
};

function flashFerrariRed() {
    if (!ferrari) return;
    hitFlashTimer = 0.3;
    const redMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
    ferrari.traverse(child => {
        if (child.isMesh) {
            child.material = redMat;
        }
    });
}

function restoreFerrariMaterials() {
    ferrariOriginalMaterials.forEach(({ mesh, material }) => {
        mesh.material = material.clone();
    });
}

// --- Input ---
document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;

    if (e.code === 'Space') {
        e.preventDefault();
        window.startSimulation();
    }
    if (e.key.toLowerCase() === 'r') {
        window.resetSimulation();
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
    keys[e.code] = false;
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);
    const now = performance.now() / 1000;

    // Snow animation
    const snowPos = snow.geometry.attributes.position;
    for (let i = 0; i < snowCount; i++) {
        let y = snowPos.getY(i) - delta * 3;
        if (y < -5) y = 40;
        snowPos.setY(i, y);
        snowPos.setX(i, snowPos.getX(i) + Math.sin(now + i) * delta * 0.3);
    }
    snowPos.needsUpdate = true;

    // Move Ferrari
    if (ferrari && simulationStarted && !gameOver) {
        let dx = 0;
        if (keys['arrowleft'] || keys['a']) dx = -moveSpeed * delta;
        if (keys['arrowright'] || keys['d']) dx = moveSpeed * delta;
        ferrari.position.x += dx;
        ferrari.position.x = Math.max(-15, Math.min(15, ferrari.position.x));
    }

    // Hit flash timer
    if (hitFlashTimer > 0) {
        hitFlashTimer -= delta;
        if (hitFlashTimer <= 0) {
            restoreFerrariMaterials();
        }
    }

    // Spawn boulders
    if (simulationStarted && !gameOver) {
        if (now - lastSpawnTime >= spawnInterval) {
            spawnBoulder();
            lastSpawnTime = now;
            // Gradually increase difficulty
            spawnInterval = Math.max(0.5, 1.5 - state.bouldersSpawned * 0.03);
        }
    }

    // Update boulders
    for (let i = boulders.length - 1; i >= 0; i--) {
        const b = boulders[i];
        if (!b.active) continue;

        // Gravity along slope
        b.velocity.z += gravity * slopeSin * delta;
        b.velocity.y -= gravity * slopeCos * delta * 0.3;

        b.mesh.position.x += b.velocity.x * delta;
        b.mesh.position.y += b.velocity.y * delta;
        b.mesh.position.z += b.velocity.z * delta;

        // Keep boulder on slope surface approximately
        const slopeY = (-b.mesh.position.z + 15) * Math.tan(slopeAngle) * 0.3 + b.radius;
        if (b.mesh.position.y < slopeY) {
            b.mesh.position.y = slopeY;
            b.velocity.y = 0;
        }

        // Rotation
        b.mesh.rotateOnAxis(b.rotationAxis, b.rotationSpeed * delta);

        // Collision with Ferrari
        if (ferrari && !b.hasHit && !gameOver) {
            const dist = b.mesh.position.distanceTo(ferrari.position);
            if (dist < 3) {
                b.hasHit = true;
                state.totalHits++;
                lives--;
                score = Math.max(0, score - 5);
                flashFerrariRed();

                if (lives <= 0) {
                    gameOver = true;
                    document.getElementById('final-score').textContent = score;
                    document.getElementById('game-over-overlay').classList.add('visible');
                }
                updateHUD();
            }
        }

        // Remove if past bottom
        if (b.mesh.position.z > 25) {
            if (!b.hasHit && !b.hasPassed) {
                b.hasPassed = true;
                state.bouldersDodged++;
                score += 10;
                updateHUD();
            }
            b.active = false;
            b.mesh.visible = false;
            boulders.splice(i, 1);
        }
    }

    // Mixer update
    if (ferrariMixer) ferrariMixer.update(delta);

    updateState();
    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateHUD();
animate();
</script>
</body>
</html>
