<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Avalanche Ferrari Survival</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b1220;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 220px;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    #hud div {
      margin: 6px 0;
      font-size: 16px;
    }

    #controls {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      background: #d62828;
      color: white;
      border: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #f04a4a;
    }

    #reset-btn {
      background: #3a86ff;
    }

    #reset-btn:hover {
      background: #669fff;
    }

    #hint {
      position: fixed;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score-display">Score: 0</div>
    <div id="lives-display">Lives: 3</div>
    <div id="status-display">Status: Ready</div>
    <div id="controls">
      <button id="start-btn">Start Avalanche</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>

  <div id="hint">
    Controls: Space = Start, R = Reset, Arrow Left/Right or A/D = Move Ferrari
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, clock;
    let terrain;
    let ferrari = null;
    let ferrariLoaded = false;
    let fallbackCar = null;

    const slopeAngle = Math.PI / 6; // 30 degrees
    const gravityAlongSlope = 9.8 * Math.sin(slopeAngle); // ~4.9
    const maxBoulders = 15;
    const spawnInterval = 1.5;

    const keys = {
      left: false,
      right: false
    };

    const state = {
      simulationStarted: false,
      score: 0,
      lives: 3,
      gameOver: false,
      ferrarLoaded: false,
      ferrariX: 0,
      bouldersSpawned: 0,
      bouldersActive: 0,
      bouldersDodged: 0,
      totalHits: 0,
      elapsedTime: 0
    };

    window.__3D_STATE__ = state;

    const scoreDisplay = document.getElementById('score-display');
    const livesDisplay = document.getElementById('lives-display');
    const statusDisplay = document.getElementById('status-display');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');

    const boulders = [];
    let spawnTimer = 0;
    let simulationClockStart = 0;
    let ferrariFlashTime = 0;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xcfe8ff);
      scene.fog = new THREE.Fog(0xcfe8ff, 40, 110);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(0, 25, 40);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
      dirLight.position.set(10, 30, 20);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.set(2048, 2048);
      scene.add(dirLight);

      createTerrain();
      createBoulders();
      createFerrariFallback();
      loadFerrari();

      setupEvents();
      updateHUD();
      updateState();
    }

    function createTerrain() {
      const geo = new THREE.PlaneGeometry(80, 80, 40, 40);

      const pos = geo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i);

        const bump =
          Math.sin(x * 0.25) * 1.4 +
          Math.cos(y * 0.2) * 1.1 +
          (Math.random() - 0.5) * 0.8;

        pos.setZ(i, bump);
      }

      geo.computeVertexNormals();

      const mat = new THREE.MeshStandardMaterial({
        color: 0xe8ecef,
        roughness: 0.95,
        metalness: 0.02
      });

      terrain = new THREE.Mesh(geo, mat);
      terrain.rotation.x = -Math.PI / 2;
      terrain.rotation.x += slopeAngle;
      terrain.position.set(0, -4, 0);
      terrain.receiveShadow = true;
      scene.add(terrain);
    }

    function createFerrariFallback() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.2, 0.8, 4.2),
        new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.4, metalness: 0.35 })
      );
      body.position.y = 0.8;
      body.castShadow = true;
      group.add(body);

      const cabin = new THREE.Mesh(
        new THREE.BoxGeometry(1.6, 0.7, 1.8),
        new THREE.MeshStandardMaterial({ color: 0x550000, roughness: 0.25, metalness: 0.2 })
      );
      cabin.position.set(0, 1.35, 0);
      cabin.castShadow = true;
      group.add(cabin);

      const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 20);
      const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });

      const wheelOffsets = [
        [-1.0, 0.45, -1.35],
        [ 1.0, 0.45, -1.35],
        [-1.0, 0.45,  1.35],
        [ 1.0, 0.45,  1.35]
      ];

      wheelOffsets.forEach(([x, y, z]) => {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.z = Math.PI / 2;
        wheel.position.set(x, y, z);
        wheel.castShadow = true;
        group.add(wheel);
      });

      group.position.set(0, 0, 15);
      scene.add(group);
      fallbackCar = group;
    }

    function loadFerrari() {
      const loader = new GLTFLoader();
      loader.load(
        'ferrari.glb',
        (gltf) => {
          ferrari = gltf.scene;

          const box = new THREE.Box3().setFromObject(ferrari);
          const size = new THREE.Vector3();
          box.getSize(size);

          const targetWidth = 2;
          const scale = size.x > 0 ? targetWidth / size.x : 1;
          ferrari.scale.setScalar(scale);

          ferrari.traverse((child) => {
            if (child.isMesh) {
              child.castShadow = true;
              child.receiveShadow = true;
              if (child.material) child.material = child.material.clone();
            }
          });

          ferrari.position.set(0, 0, 15);
          ferrari.rotation.y = Math.PI;
          scene.add(ferrari);

          if (fallbackCar) fallbackCar.visible = false;

          ferrariLoaded = true;
          state.ferrarLoaded = true;
        },
        undefined,
        (err) => {
          console.warn('Failed to load ferrari.glb, using fallback car.', err);
          ferrariLoaded = false;
          state.ferrarLoaded = false;
        }
      );
    }

    function createBoulders() {
      for (let i = 0; i < maxBoulders; i++) {
        const radius = THREE.MathUtils.randFloat(0.5, 1.5);
        const geo = new THREE.SphereGeometry(radius, 18, 18);
        const colorChoices = [0x7b7b7b, 0x6a625d, 0x8b8178, 0x5c5c5c];
        const mat = new THREE.MeshStandardMaterial({
          color: colorChoices[Math.floor(Math.random() * colorChoices.length)],
          roughness: 0.95,
          metalness: 0.02
        });

        const mesh = new THREE.Mesh(geo, mat);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.visible = false;
        scene.add(mesh);

        boulders.push({
          mesh,
          radius,
          active: false,
          speed: 0,
          hitRegistered: false
        });
      }
    }

    function setupEvents() {
      window.addEventListener('resize', onResize);

      window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;

        if (e.code === 'Space') {
          e.preventDefault();
          startSimulation();
        }

        if (e.code === 'KeyR') {
          resetSimulation();
        }
      });

      window.addEventListener('keyup', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
      });

      startBtn.addEventListener('click', startSimulation);
      resetBtn.addEventListener('click', resetSimulation);
    }

    function startSimulation() {
      if (state.gameOver) return;
      if (!state.simulationStarted) {
        state.simulationStarted = true;
        spawnTimer = 0;
        simulationClockStart = performance.now() * 0.001;
        statusDisplay.textContent = 'Status: Running';
      }
    }

    function resetSimulation() {
      state.simulationStarted = false;
      state.score = 0;
      state.lives = 3;
      state.gameOver = false;
      state.bouldersSpawned = 0;
      state.bouldersActive = 0;
      state.bouldersDodged = 0;
      state.totalHits = 0;
      state.elapsedTime = 0;
      state.ferrariX = 0;

      spawnTimer = 0;
      ferrariFlashTime = 0;

      if (ferrari) ferrari.position.set(0, 0, 15);
      if (fallbackCar) fallbackCar.position.set(0, 0, 15);

      boulders.forEach((b) => {
        b.active = false;
        b.speed = 0;
        b.hitRegistered = false;
        b.mesh.visible = false;
        b.mesh.position.set(0, 1000, 0);
      });

      statusDisplay.textContent = 'Status: Ready';
      updateHUD();
      updateState();
      restoreFerrariColor();
    }

    function spawnBoulder() {
      const available = boulders.find(b => !b.active);
      if (!available) return;

      const x = THREE.MathUtils.randFloat(-18, 18);
      available.active = true;
      available.speed = 0;
      available.hitRegistered = false;
      available.mesh.visible = true;
      available.mesh.position.set(x, 20, -30);
      available.mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);

      state.bouldersSpawned++;
    }

    function updateFerrari(dt) {
      const target = ferrari || fallbackCar;
      if (!target) return;

      const moveSpeed = 12;
      if (keys.left) target.position.x -= moveSpeed * dt;
      if (keys.right) target.position.x += moveSpeed * dt;

      target.position.x = THREE.MathUtils.clamp(target.position.x, -15, 15);
      state.ferrariX = target.position.x;

      if (ferrari && fallbackCar) {
        fallbackCar.position.x = ferrari.position.x;
      }

      if (ferrariFlashTime > 0) {
        ferrariFlashTime -= dt;
        if (ferrariFlashTime <= 0) restoreFerrariColor();
      }
    }

    function flashFerrariRed() {
      const target = ferrari || fallbackCar;
      if (!target) return;

      target.traverse?.((child) => {
        if (child.isMesh && child.material && child.material.color) {
          child.userData.originalColor = child.userData.originalColor || child.material.color.clone();
          child.material.color.set(0xff3333);
        }
      });

      if (!target.traverse) {
        target.children.forEach((child) => {
          if (child.isMesh && child.material && child.material.color) {
            child.userData.originalColor = child.userData.originalColor || child.material.color.clone();
            child.material.color.set(0xff3333);
          }
        });
      }

      ferrariFlashTime = 0.25;
    }

    function restoreFerrariColor() {
      const target = ferrari || fallbackCar;
      if (!target) return;

      target.traverse?.((child) => {
        if (child.isMesh && child.material && child.userData.originalColor) {
          child.material.color.copy(child.userData.originalColor);
        }
      });

      if (!target.traverse) {
        target.children.forEach((child) => {
          if (child.isMesh && child.material && child.userData.originalColor) {
            child.material.color.copy(child.userData.originalColor);
          }
        });
      }
    }

    function updateBoulders(dt) {
      const car = ferrari || fallbackCar;
      if (!car) return;

      const carPos = car.position;

      for (const b of boulders) {
        if (!b.active) continue;

        b.speed += gravityAlongSlope * dt;

        b.mesh.position.z += b.speed * dt * 2.0;
        b.mesh.position.y -= gravityAlongSlope * dt * 0.55;
        b.mesh.rotation.x += b.speed * dt * 1.4;
        b.mesh.rotation.z += b.speed * dt * 0.7;

        const dx = b.mesh.position.x - carPos.x;
        const dy = b.mesh.position.y - carPos.y;
        const dz = b.mesh.position.z - carPos.z;
        const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);

        if (!b.hitRegistered && dist < 3) {
          b.hitRegistered = true;
          state.totalHits++;
          state.lives--;
          state.score = Math.max(0, state.score - 5);
          flashFerrariRed();

          if (state.lives <= 0) {
            state.lives = 0;
            state.gameOver = true;
            state.simulationStarted = false;
            statusDisplay.textContent = 'Status: Game Over';
          }
        }

        if (b.mesh.position.z > 25) {
          if (!b.hitRegistered) {
            state.score += 10;
            state.bouldersDodged++;
          }

          b.active = false;
          b.speed = 0;
          b.hitRegistered = false;
          b.mesh.visible = false;
          b.mesh.position.set(0, 1000, 0);
        }
      }

      state.bouldersActive = boulders.filter(b => b.active).length;
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${state.score}`;
      livesDisplay.textContent = `Lives: ${state.lives}`;
      if (state.gameOver) {
        statusDisplay.textContent = 'Status: GAME OVER';
      } else if (state.simulationStarted) {
        statusDisplay.textContent = 'Status: Running';
      } else {
        statusDisplay.textContent = 'Status: Ready';
      }
    }

    function updateState() {
      state.ferrarLoaded = ferrariLoaded;
      state.bouldersActive = boulders.filter(b => b.active).length;
      window.__3D_STATE__ = state;
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      updateFerrari(dt);

      if (state.simulationStarted && !state.gameOver) {
        spawnTimer += dt;

        if (spawnTimer >= spawnInterval) {
          spawnTimer = 0;
          spawnBoulder();
        }

        state.elapsedTime = performance.now() * 0.001 - simulationClockStart;
        updateBoulders(dt);
      } else if (!state.simulationStarted) {
        if (!state.gameOver) state.elapsedTime = 0;
      }

      updateHUD();
      updateState();

      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
