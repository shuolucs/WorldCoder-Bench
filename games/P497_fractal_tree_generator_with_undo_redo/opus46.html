<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fractal Tree Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 250px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }
  
  #hud h2 {
    text-align: center;
    margin-bottom: 15px;
    color: #88ccff;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(100, 180, 255, 0.5);
  }
  
  .btn-row {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
  }
  
  .btn {
    flex: 1;
    padding: 8px 4px;
    border: 1px solid rgba(100, 100, 255, 0.4);
    border-radius: 6px;
    background: rgba(40, 40, 80, 0.8);
    color: #c0c0e0;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  
  .btn:hover:not(:disabled) {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(140, 140, 255, 0.6);
    color: #ffffff;
    transform: translateY(-1px);
  }
  
  .btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  
  .btn-grow {
    background: rgba(30, 100, 30, 0.8);
    border-color: rgba(60, 180, 60, 0.5);
    color: #90ee90;
  }
  
  .btn-grow:hover:not(:disabled) {
    background: rgba(40, 130, 40, 0.9);
    border-color: rgba(80, 220, 80, 0.7);
  }
  
  .btn-reset {
    background: rgba(120, 30, 30, 0.8);
    border-color: rgba(200, 60, 60, 0.5);
    color: #ffaaaa;
  }
  
  .btn-reset:hover:not(:disabled) {
    background: rgba(150, 40, 40, 0.9);
  }
  
  .info-panel {
    margin-top: 12px;
    padding: 10px;
    background: rgba(20, 20, 50, 0.6);
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.8;
  }
  
  .info-panel span {
    color: #88ccff;
    font-weight: 600;
  }
  
  .color-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    padding: 8px 10px;
    background: rgba(20, 20, 50, 0.6);
    border-radius: 8px;
  }
  
  .color-row label {
    font-size: 13px;
  }
  
  #color-picker {
    width: 50px;
    height: 30px;
    border: 1px solid rgba(100, 100, 255, 0.4);
    border-radius: 4px;
    background: none;
    cursor: pointer;
  }
  
  .shortcuts {
    margin-top: 12px;
    padding: 8px 10px;
    background: rgba(20, 20, 50, 0.4);
    border-radius: 8px;
    font-size: 11px;
    color: #888;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="hud">
  <h2>🌳 Fractal Tree</h2>
  <div class="btn-row">
    <button class="btn btn-grow" id="btn-grow">🌱 Grow</button>
    <button class="btn btn-reset" id="btn-reset">🔄 Reset</button>
  </div>
  <div class="btn-row">
    <button class="btn" id="btn-undo" disabled>↩ Undo</button>
    <button class="btn" id="btn-redo" disabled>↪ Redo</button>
  </div>
  <div class="info-panel">
    <div id="depth-display">Depth: 0</div>
    <div id="branch-count">Branches: 1</div>
    <div id="leaf-count-display">Leaves: 0</div>
  </div>
  <div class="color-row">
    <label>Base Color:</label>
    <input type="color" id="color-picker" value="#8B4513">
  </div>
  <div class="shortcuts">
    <strong>Shortcuts:</strong><br>
    G = Grow | Ctrl+Z = Undo<br>
    Ctrl+Y = Redo
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 20);
camera.lookAt(0, 4, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Additional fill light
const fillLight = new THREE.HemisphereLight(0x4488bb, 0x002244, 0.3);
scene.add(fillLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({ 
  color: 0x2d5a1e, 
  roughness: 0.9,
  metalness: 0.0
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Add some ground detail
const groundDetail = new THREE.Mesh(
  new THREE.CircleGeometry(8, 32),
  new THREE.MeshStandardMaterial({ color: 0x3a6b2a, roughness: 0.95 })
);
groundDetail.rotation.x = -Math.PI / 2;
groundDetail.position.y = 0.01;
scene.add(groundDetail);

// State
let treeDepth = 0;
let baseColor = '#8B4513';
let undoStack = [];
let redoStack = [];
let treeGroup = new THREE.Group();
scene.add(treeGroup);
let leafGroup = new THREE.Group();
scene.add(leafGroup);
let maxTreeHeight = 4;
let leafCount = 0;

// Flamingo
let flamingo = null;
let flamingoMixer = null;
let flamingoLoaded = false;
let flamingoTargetY = 10;
let flamingoCurrentY = 10;
let flamingoTweening = false;
let flamingoTweenStart = 0;
let flamingoTweenDuration = 0.5;
let flamingoTweenFromY = 10;
let flamingoTweenToY = 10;

window.__flamingo = null;

// Load flamingo
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Flamingo.glb',
  (gltf) => {
    flamingo = gltf.scene;
    flamingo.scale.set(0.03, 0.03, 0.03);
    flamingo.position.set(0, 10, 0);
    flamingo.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });
    scene.add(flamingo);
    window.__flamingo = flamingo;
    flamingoLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      flamingoMixer = new THREE.AnimationMixer(flamingo);
      const action = flamingoMixer.clipAction(gltf.animations[0]);
      action.play();
    }

    updateFlamingoPosition(false);
    updateState();
  },
  undefined,
  (error) => {
    console.warn('Could not load flamingo model:', error);
    // Create a simple flamingo substitute
    const body = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 16, 12),
      new THREE.MeshStandardMaterial({ color: 0xff69b4 })
    );
    const neck = new THREE.Mesh(
      new THREE.CylinderGeometry(0.08, 0.1, 1, 8),
      new THREE.MeshStandardMaterial({ color: 0xff69b4 })
    );
    neck.position.set(0, 0.6, 0.1);
    neck.rotation.z = -0.3;
    const head = new THREE.Mesh(
      new THREE.SphereGeometry(0.15, 12, 8),
      new THREE.MeshStandardMaterial({ color: 0xff69b4 })
    );
    head.position.set(0.15, 1.1, 0.1);
    const beak = new THREE.Mesh(
      new THREE.ConeGeometry(0.06, 0.3, 6),
      new THREE.MeshStandardMaterial({ color: 0xff8c00 })
    );
    beak.position.set(0.35, 1.05, 0.1);
    beak.rotation.z = -Math.PI / 2;
    
    const flamingoGroup = new THREE.Group();
    flamingoGroup.add(body, neck, head, beak);
    flamingoGroup.position.set(0, 10, 0);
    scene.add(flamingoGroup);
    flamingo = flamingoGroup;
    window.__flamingo = flamingo;
    flamingoLoaded = true;
    updateFlamingoPosition(false);
    updateState();
  }
);

// Color interpolation
function lerpColor(color1, color2, t) {
  const c1 = new THREE.Color(color1);
  const c2 = new THREE.Color(color2);
  return new THREE.Color().lerpColors(c1, c2, t);
}

function getBaseColorHex() {
  return parseInt(baseColor.replace('#', ''), 16);
}

function getBranchColor(depth, maxDepth) {
  const t = maxDepth > 0 ? depth / 5 : 0;
  return lerpColor(getBaseColorHex(), 0x228B22, t);
}

// Build tree recursively
function buildTree(targetDepth) {
  // Clear existing tree
  while (treeGroup.children.length > 0) {
    const child = treeGroup.children[0];
    treeGroup.remove(child);
    disposeObject(child);
  }
  while (leafGroup.children.length > 0) {
    const child = leafGroup.children[0];
    leafGroup.remove(child);
    disposeObject(child);
  }
  
  leafCount = 0;
  maxTreeHeight = 0;
  
  // Build trunk and branches
  buildBranch(treeGroup, new THREE.Vector3(0, 0, 0), new THREE.Vector3(0, 1, 0), 4, 0.3, 0, targetDepth);
}

function buildBranch(parent, position, direction, length, radius, currentDepth, maxDepth) {
  const color = getBranchColor(currentDepth, maxDepth);
  
  // Create cylinder for branch
  const geom = new THREE.CylinderGeometry(radius * 0.7, radius, length, 8, 1);
  const mat = new THREE.MeshStandardMaterial({ 
    color: color, 
    roughness: 0.8, 
    metalness: 0.1 
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  
  // Position the branch
  // The cylinder is centered at origin, so we need to offset
  const branchGroup = new THREE.Group();
  branchGroup.position.copy(position);
  
  // Align branch along direction
  const up = new THREE.Vector3(0, 1, 0);
  const quat = new THREE.Quaternion().setFromUnitVectors(up, direction.clone().normalize());
  branchGroup.quaternion.copy(quat);
  
  mesh.position.y = length / 2;
  branchGroup.add(mesh);
  parent.add(branchGroup);
  
  // Calculate tip position in world space
  const tipLocal = new THREE.Vector3(0, length, 0);
  const tipWorld = tipLocal.clone().applyQuaternion(quat).add(position);
  
  if (tipWorld.y > maxTreeHeight) {
    maxTreeHeight = tipWorld.y;
  }
  
  if (currentDepth < maxDepth) {
    const childLength = length * 0.7;
    const childRadius = radius * 0.6;
    const angle = Math.PI / 6; // 30 degrees
    
    // Create 2 child branches with rotations in both X and Z for 3D effect
    const directions = [
      new THREE.Vector3(Math.sin(angle), Math.cos(angle), Math.sin(angle * 0.5)).normalize(),
      new THREE.Vector3(-Math.sin(angle), Math.cos(angle), -Math.sin(angle * 0.5)).normalize(),
    ];
    
    // Transform directions by parent orientation
    for (const dir of directions) {
      const worldDir = dir.clone().applyQuaternion(quat);
      buildBranch(parent, tipWorld, worldDir, childLength, childRadius, currentDepth + 1, maxDepth);
    }
  } else {
    // This is a leaf branch tip
    if (maxDepth >= 3) {
      const leafGeom = new THREE.SphereGeometry(0.15, 8, 6);
      const leafMat = new THREE.MeshStandardMaterial({ 
        color: 0x228B22, 
        roughness: 0.6,
        metalness: 0.0
      });
      const leaf = new THREE.Mesh(leafGeom, leafMat);
      leaf.position.copy(tipWorld);
      leaf.castShadow = true;
      leafGroup.add(leaf);
      leafCount++;
    }
  }
}

function disposeObject(obj) {
  if (obj.geometry) obj.geometry.dispose();
  if (obj.material) {
    if (Array.isArray(obj.material)) {
      obj.material.forEach(m => m.dispose());
    } else {
      obj.material.dispose();
    }
  }
  if (obj.children) {
    for (let i = obj.children.length - 1; i >= 0; i--) {
      disposeObject(obj.children[i]);
    }
  }
}

function getBranchCount(depth) {
  return Math.pow(2, depth + 1) - 1;
}

function getLeafCount(depth) {
  if (depth < 3) return 0;
  return Math.pow(2, depth);
}

function updateFlamingoPosition(animate = true) {
  if (!flamingo) return;
  
  const targetY = maxTreeHeight + 1;
  
  if (animate) {
    flamingoTweening = true;
    flamingoTweenStart = performance.now() / 1000;
    flamingoTweenFromY = flamingo.position.y;
    flamingoTweenToY = targetY;
  } else {
    flamingo.position.y = targetY;
    flamingoCurrentY = targetY;
  }
}

function updateState() {
  const branchCount = getBranchCount(treeDepth);
  
  window.__3D_STATE__ = {
    treeDepth: treeDepth,
    branchCount: branchCount,
    undoStackSize: undoStack.length,
    redoStackSize: redoStack.length,
    hasLeaves: treeDepth >= 3,
    flamingoLoaded: flamingoLoaded,
    flamingoY: flamingo ? flamingo.position.y : 10,
    maxTreeHeight: maxTreeHeight,
    baseColor: baseColor,
    leafCount: leafCount
  };
  
  // Update UI
  document.getElementById('depth-display').textContent = `Depth: ${treeDepth}`;
  document.getElementById('branch-count').textContent = `Branches: ${branchCount}`;
  document.getElementById('leaf-count-display').textContent = `Leaves: ${leafCount}`;
  
  document.getElementById('btn-grow').disabled = treeDepth >= 5;
  document.getElementById('btn-undo').disabled = undoStack.length === 0;
  document.getElementById('btn-redo').disabled = redoStack.length === 0;
}

function grow() {
  if (treeDepth >= 5) return;
  
  undoStack.push(treeDepth);
  redoStack = [];
  treeDepth++;
  
  buildTree(treeDepth);
  updateFlamingoPosition(true);
  updateState();
}

function undo() {
  if (undoStack.length === 0) return;
  
  redoStack.push(treeDepth);
  treeDepth = undoStack.pop();
  
  buildTree(treeDepth);
  updateFlamingoPosition(true);
  updateState();
}

function redo() {
  if (redoStack.length === 0) return;
  
  undoStack.push(treeDepth);
  treeDepth = redoStack.pop();
  
  buildTree(treeDepth);
  updateFlamingoPosition(true);
  updateState();
}

function reset() {
  undoStack = [];
  redoStack = [];
  treeDepth = 0;
  
  buildTree(treeDepth);
  updateFlamingoPosition(true);
  updateState();
}

// Event listeners
document.getElementById('btn-grow').addEventListener('click', grow);
document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-reset').addEventListener('click', reset);

document.getElementById('color-picker').addEventListener('input', (e) => {
  baseColor = e.target.value;
  buildTree(treeDepth);
  updateState();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'g' || e.key === 'G') {
    if (!e.ctrlKey && !e.metaKey) {
      grow();
    }
  }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    undo();
  }
  if (e.key === 'y' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    redo();
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize tree
buildTree(0);
updateState();

// Add some particles for atmosphere
const particleCount = 200;
const particleGeom = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  positions[i * 3] = (Math.random() - 0.5) * 30;
  positions[i * 3 + 1] = Math.random() * 20;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 30;
}
particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ 
  color: 0xffffff, 
  size: 0.05, 
  transparent: true, 
  opacity: 0.4 
});
const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  
  // Update flamingo mixer
  if (flamingoMixer) {
    flamingoMixer.update(delta);
  }
  
  // Flamingo tween
  if (flamingoTweening && flamingo) {
    const now = performance.now() / 1000;
    const elapsed = now - flamingoTweenStart;
    const t = Math.min(elapsed / flamingoTweenDuration, 1);
    
    // Ease in-out
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    
    flamingo.position.y = flamingoTweenFromY + (flamingoTweenToY - flamingoTweenFromY) * eased;
    
    if (t >= 1) {
      flamingoTweening = false;
      flamingo.position.y = flamingoTweenToY;
    }
    
    // Update state with current y
    if (window.__3D_STATE__) {
      window.__3D_STATE__.flamingoY = flamingo.position.y;
    }
  }
  
  // Gentle flamingo bob
  if (flamingo && !flamingoTweening) {
    flamingo.position.y = flamingoTweenToY + Math.sin(time * 2) * 0.1;
    flamingo.rotation.y = Math.sin(time * 0.5) * 0.2;
    if (window.__3D_STATE__) {
      window.__3D_STATE__.flamingoY = flamingo.position.y;
    }
  }
  
  // Animate particles
  const posArray = particleGeom.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    posArray[i * 3 + 1] += delta * 0.2;
    if (posArray[i * 3 + 1] > 20) posArray[i * 3 + 1] = 0;
  }
  particleGeom.attributes.position.needsUpdate = true;
  
  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
