<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fractal Tree Generator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #1a1a2e;
    }

    body {
      background: linear-gradient(to bottom, #1a1a2e 0%, #0f3460 100%);
    }

    #app {
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 250px;
      padding: 14px;
      background: rgba(10, 10, 20, 0.78);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      backdrop-filter: blur(6px);
      z-index: 10;
    }

    #hud h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .row {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      background: #16213e;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 72px;
    }

    button:hover:not(:disabled) {
      background: #1f2b50;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    input[type="color"] {
      width: 48px;
      height: 32px;
      padding: 0;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    .label {
      font-size: 14px;
      opacity: 0.95;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="hud">
    <h3>Fractal Tree Controls</h3>
    <div class="row">
      <button id="btn-grow">Grow</button>
      <button id="btn-undo" disabled>Undo</button>
      <button id="btn-redo" disabled>Redo</button>
      <button id="btn-reset">Reset</button>
    </div>
    <div class="row">
      <span id="depth-display" class="label">Depth: 0</span>
    </div>
    <div class="row">
      <span id="branch-count" class="label">Branches: 1</span>
    </div>
    <div class="row">
      <label for="color-picker" class="label">Base Color:</label>
      <input id="color-picker" type="color" value="#8b4513" />
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const btnGrow = document.getElementById('btn-grow');
    const btnUndo = document.getElementById('btn-undo');
    const btnRedo = document.getElementById('btn-redo');
    const btnReset = document.getElementById('btn-reset');
    const depthDisplay = document.getElementById('depth-display');
    const branchCountDisplay = document.getElementById('branch-count');
    const colorPicker = document.getElementById('color-picker');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 5, 0);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 20, 10);
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshPhongMaterial({ color: 0x2e8b57 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const mixerClock = new THREE.Clock();
    let mixer = null;

    const state = {
      treeDepth: 0,
      branchCount: 1,
      undoStack: [],
      redoStack: [],
      hasLeaves: false,
      flamingoLoaded: false,
      flamingoY: 10,
      maxTreeHeight: 4,
      baseColor: '#8b4513',
      leafCount: 0
    };

    window.__3D_STATE__ = {
      treeDepth: 0,
      branchCount: 1,
      undoStackSize: 0,
      redoStackSize: 0,
      hasLeaves: false,
      flamingoLoaded: false,
      flamingoY: 10,
      maxTreeHeight: 4,
      baseColor: '#8B4513',
      leafCount: 0
    };

    function syncWindowState() {
      window.__3D_STATE__ = {
        treeDepth: state.treeDepth,
        branchCount: state.branchCount,
        undoStackSize: state.undoStack.length,
        redoStackSize: state.redoStack.length,
        hasLeaves: state.hasLeaves,
        flamingoLoaded: state.flamingoLoaded,
        flamingoY: state.flamingoY,
        maxTreeHeight: state.maxTreeHeight,
        baseColor: state.baseColor.toUpperCase(),
        leafCount: state.leafCount
      };
    }

    function branchCountForDepth(d) {
      return Math.pow(2, d + 1) - 1;
    }

    function colorLerpHex(a, b, t) {
      const c1 = new THREE.Color(a);
      const c2 = new THREE.Color(b);
      return c1.lerp(c2, t);
    }

    function clearTree() {
      while (treeGroup.children.length) {
        const obj = treeGroup.children.pop();
        obj.traverse?.((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material) {
            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
            else child.material.dispose();
          }
        });
      }
    }

    function createBranch(start, direction, length, radius, color) {
      const end = start.clone().add(direction.clone().normalize().multiplyScalar(length));
      const center = start.clone().add(end).multiplyScalar(0.5);

      const geometry = new THREE.CylinderGeometry(radius * 0.6, radius, length, 8);
      const material = new THREE.MeshPhongMaterial({ color });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(center);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), direction.clone().normalize());

      treeGroup.add(mesh);
      return { mesh, end, length, radius, direction: direction.clone().normalize(), start: start.clone() };
    }

    function generateTree(depth) {
      clearTree();

      const baseColor = state.baseColor;
      const maxDepth = 5;
      const trunkLength = 4;
      const trunkRadius = 0.3;

      const leaves = [];
      let branchTips = [];
      let allBranches = [];
      let maxY = 4;

      const trunkDir = new THREE.Vector3(0, 1, 0);
      const trunkColor = colorLerpHex(baseColor, 0x228B22, 0 / maxDepth);
      const trunk = createBranch(new THREE.Vector3(0, 0, 0), trunkDir, trunkLength, trunkRadius, trunkColor);
      branchTips.push(trunk);
      allBranches.push(trunk);

      for (let level = 1; level <= depth; level++) {
        const newTips = [];

        for (const parent of branchTips) {
          const parentDir = parent.direction.clone();
          const childLength = parent.length * 0.7;
          const childRadius = parent.radius * 0.6;

          const dirA = parentDir.clone()
            .applyAxisAngle(new THREE.Vector3(1, 0, 0).normalize(), THREE.MathUtils.degToRad(30))
            .applyAxisAngle(new THREE.Vector3(0, 0, 1).normalize(), THREE.MathUtils.degToRad(30))
            .normalize();

          const dirB = parentDir.clone()
            .applyAxisAngle(new THREE.Vector3(1, 0, 0).normalize(), THREE.MathUtils.degToRad(-30))
            .applyAxisAngle(new THREE.Vector3(0, 0, 1).normalize(), THREE.MathUtils.degToRad(-30))
            .normalize();

          const branchColor = colorLerpHex(baseColor, 0x228B22, level / maxDepth);

          const childA = createBranch(parent.end, dirA, childLength, childRadius, branchColor);
          const childB = createBranch(parent.end, dirB, childLength, childRadius, branchColor);

          newTips.push(childA, childB);
          allBranches.push(childA, childB);

          maxY = Math.max(maxY, childA.end.y, childB.end.y);
        }

        branchTips = newTips;
      }

      if (depth >= 3) {
        const leafGeo = new THREE.SphereGeometry(0.15, 10, 10);
        const leafMat = new THREE.MeshPhongMaterial({ color: 0x32cd32 });

        for (const tip of branchTips) {
          const leaf = new THREE.Mesh(leafGeo, leafMat.clone());
          leaf.position.copy(tip.end);
          treeGroup.add(leaf);
          leaves.push(leaf);
          maxY = Math.max(maxY, tip.end.y);
        }
      }

      state.treeDepth = depth;
      state.branchCount = branchCountForDepth(depth);
      state.hasLeaves = depth >= 3;
      state.maxTreeHeight = maxY;
      state.leafCount = leaves.length;

      updateFlamingoTarget();
      updateHUD();
      syncWindowState();
    }

    function updateHUD() {
      depthDisplay.textContent = `Depth: ${state.treeDepth}`;
      branchCountDisplay.textContent = `Branches: ${state.branchCount}`;
      btnGrow.disabled = state.treeDepth >= 5;
      btnUndo.disabled = state.undoStack.length === 0;
      btnRedo.disabled = state.redoStack.length === 0;
    }

    function pushHistory(prevDepth) {
      state.undoStack.push(prevDepth);
      state.redoStack.length = 0;
    }

    function growTree() {
      if (state.treeDepth >= 5) return;
      const prevDepth = state.treeDepth;
      pushHistory(prevDepth);
      generateTree(prevDepth + 1);
    }

    function undoTree() {
      if (state.undoStack.length === 0) return;
      const current = state.treeDepth;
      const prev = state.undoStack.pop();
      state.redoStack.push(current);
      generateTree(prev);
    }

    function redoTree() {
      if (state.redoStack.length === 0) return;
      const current = state.treeDepth;
      const next = state.redoStack.pop();
      state.undoStack.push(current);
      generateTree(next);
    }

    function resetTree() {
      if (state.treeDepth !== 0) {
        state.undoStack.push(state.treeDepth);
      }
      state.redoStack.length = 0;
      generateTree(0);
    }

    let flamingoTween = null;

    function updateFlamingoTarget() {
      if (!window.__flamingo) {
        state.flamingoY = state.maxTreeHeight;
        syncWindowState();
        return;
      }

      const targetY = state.maxTreeHeight + 0.2;
      const startY = window.__flamingo.position.y;
      const duration = 500;
      const startTime = performance.now();

      flamingoTween = { startY, targetY, duration, startTime };
    }

    function updateFlamingoTween(time) {
      if (!flamingoTween || !window.__flamingo) return;
      const t = Math.min((time - flamingoTween.startTime) / flamingoTween.duration, 1);
      const eased = 1 - Math.pow(1 - t, 3);
      window.__flamingo.position.y = THREE.MathUtils.lerp(flamingoTween.startY, flamingoTween.targetY, eased);
      state.flamingoY = window.__flamingo.position.y;
      if (t >= 1) flamingoTween = null;
      syncWindowState();
    }

    const loader = new GLTFLoader();
    loader.load(
      'flamingo.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.03);
        model.position.set(0, 10, 0);
        scene.add(model);

        window.__flamingo = model;
        state.flamingoLoaded = true;
        state.flamingoY = model.position.y;

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();
        }

        updateFlamingoTarget();
        syncWindowState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load flamingo.glb', err);
        syncWindowState();
      }
    );

    btnGrow.addEventListener('click', growTree);
    btnUndo.addEventListener('click', undoTree);
    btnRedo.addEventListener('click', redoTree);
    btnReset.addEventListener('click', resetTree);

    colorPicker.addEventListener('input', (e) => {
      state.baseColor = e.target.value;
      generateTree(state.treeDepth);
    });

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'g' && !e.ctrlKey && !e.metaKey) {
        growTree();
      }

      if (e.ctrlKey && key === 'z') {
        e.preventDefault();
        undoTree();
      }

      if (e.ctrlKey && key === 'y') {
        e.preventDefault();
        redoTree();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    generateTree(0);
    updateHUD();
    syncWindowState();

    function animate(time) {
      requestAnimationFrame(animate);

      controls.update();

      if (mixer) {
        mixer.update(mixerClock.getDelta());
      }

      updateFlamingoTween(time);
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
