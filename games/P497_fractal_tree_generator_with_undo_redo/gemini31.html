<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 250px;
            background: rgba(20, 20, 35, 0.85);
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            padding: 15px;
            color: #e0e0e0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            text-align: center;
            color: #fff;
            border-bottom: 1px solid #3a3a5e;
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            background: #4a4a8a;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            flex: 1;
            margin: 0 4px;
        }
        button:hover:not(:disabled) {
            background: #5a5aaa;
        }
        button:disabled {
            background: #2a2a4a;
            color: #666;
            cursor: not-allowed;
        }
        .btn-row {
            display: flex;
            margin: 0 -4px 12px -4px;
        }
        .info-text {
            font-size: 14px;
            margin: 5px 0;
            font-family: monospace;
        }
        input[type="color"] {
            background: none;
            border: none;
            width: 30px;
            height: 30px;
            cursor: pointer;
            padding: 0;
        }
        .shortcuts {
            margin-top: 15px;
            font-size: 11px;
            color: #888;
            border-top: 1px solid #3a3a5e;
            padding-top: 10px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2>Fractal Tree</h2>
        
        <div class="btn-row">
            <button id="btn-grow">Grow (G)</button>
            <button id="btn-reset">Reset</button>
        </div>
        
        <div class="btn-row">
            <button id="btn-undo">Undo</button>
            <button id="btn-redo">Redo</button>
        </div>
        
        <div class="control-group">
            <label for="color-picker">Base Color:</label>
            <input type="color" id="color-picker" value="#8B4513">
        </div>
        
        <div id="depth-display" class="info-text">Depth: 0</div>
        <div id="branch-count" class="info-text">Branches: 1</div>
        
        <div class="shortcuts">
            Shortcuts: G (Grow), Ctrl+Z (Undo), Ctrl+Y (Redo)
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            treeDepth: 0,
            branchCount: 1,
            undoStackSize: 0,
            redoStackSize: 0,
            hasLeaves: false,
            flamingoLoaded: false,
            flamingoY: 10,
            maxTreeHeight: 4,
            baseColor: '#8B4513',
            leafCount: 0
        };

        let history = [];
        let historyIndex = -1;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Gradient Background
        const canvas = document.createElement('canvas');
        canvas.width = 2;
        canvas.height = 2;
        const context = canvas.getContext('2d');
        const gradient = context.createLinearGradient(0, 0, 0, 2);
        gradient.addColorStop(0, '#0a0a1a');
        gradient.addColorStop(1, '#1a1a2e');
        context.fillStyle = gradient;
        context.fillRect(0, 0, 2, 2);
        scene.background = new THREE.CanvasTexture(canvas);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 4, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 20;
        dirLight.shadow.camera.bottom = -20;
        dirLight.shadow.camera.left = -20;
        dirLight.shadow.camera.right = 20;
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a4a1a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Flamingo Model ---
        let mixer;
        window.__flamingo = null;
        const loader = new GLTFLoader();
        loader.load('https://unpkg.com/three@0.160.0/examples/models/gltf/Flamingo.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.03, 0.03, 0.03);
            model.position.set(0, 10, 0);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            scene.add(model);
            window.__flamingo = model;
            window.__3D_STATE__.flamingoLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                mixer.clipAction(gltf.animations[0]).play();
            }
            
            updateFlamingoPosition();
            updateState();
        });

        // --- Fractal Tree System ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        const tipColor = new THREE.Color(0x228B22);
        
        // Reusable geometries to save memory
        const branchGeometries = {};
        const leafGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 });

        function getBranchGeometry(radius, length) {
            const key = `${radius.toFixed(3)}_${length.toFixed(3)}`;
            if (!branchGeometries[key]) {
                const geo = new THREE.CylinderGeometry(radius * 0.6, radius, length, 8);
                geo.translate(0, length / 2, 0);
                branchGeometries[key] = geo;
            }
            return branchGeometries[key];
        }

        function buildBranch(parent, currentDepth, maxDepth, length, radius, baseColorObj) {
            window.__3D_STATE__.branchCount++;
            
            const color = baseColorObj.clone();
            if (maxDepth > 0) {
                color.lerp(tipColor, currentDepth / maxDepth);
            }

            const geo = getBranchGeometry(radius, length);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.9 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            parent.add(mesh);

            const isLeaf = currentDepth === maxDepth;

            if (isLeaf && maxDepth >= 3) {
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.position.set(0, length, 0);
                leaf.castShadow = true;
                mesh.add(leaf);
                window.__3D_STATE__.leafCount++;
            }

            if (currentDepth < maxDepth) {
                const childLength = length * 0.7;
                const childRadius = radius * 0.6;

                const branch1 = new THREE.Group();
                branch1.position.set(0, length, 0);
                branch1.rotation.set(Math.PI / 6, 0, Math.PI / 6);
                mesh.add(branch1);
                buildBranch(branch1, currentDepth + 1, maxDepth, childLength, childRadius, baseColorObj);

                const branch2 = new THREE.Group();
                branch2.position.set(0, length, 0);
                branch2.rotation.set(-Math.PI / 6, 0, -Math.PI / 6);
                mesh.add(branch2);
                buildBranch(branch2, currentDepth + 1, maxDepth, childLength, childRadius, baseColorObj);
            }
        }

        function generateTree() {
            // Clear existing tree
            while(treeGroup.children.length > 0){ 
                const child = treeGroup.children[0];
                treeGroup.remove(child); 
            }

            window.__3D_STATE__.branchCount = 0;
            window.__3D_STATE__.leafCount = 0;
            
            const depth = window.__3D_STATE__.treeDepth;
            const baseColorObj = new THREE.Color(window.__3D_STATE__.baseColor);
            
            buildBranch(treeGroup, 0, depth, 4, 0.3, baseColorObj);

            // Calculate max height
            treeGroup.updateMatrixWorld(true);
            let maxY = 0;
            treeGroup.traverse((child) => {
                if (child.isMesh && child.geometry.type !== 'SphereGeometry') {
                    const box = new THREE.Box3().setFromObject(child);
                    if (box.max.y > maxY) maxY = box.max.y;
                }
            });
            
            window.__3D_STATE__.maxTreeHeight = maxY;
            window.__3D_STATE__.hasLeaves = depth >= 3;
            
            updateFlamingoPosition();
            updateState();
            updateUI();
        }

        function updateFlamingoPosition() {
            if (window.__flamingo) {
                const targetY = window.__3D_STATE__.maxTreeHeight + 0.5;
                new TWEEN.Tween(window.__flamingo.position)
                    .to({ y: targetY }, 500)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .onUpdate(() => {
                        window.__3D_STATE__.flamingoY = window.__flamingo.position.y;
                    })
                    .start();
            }
        }

        // --- History & State Management ---
        function saveState(depth, color) {
            history = history.slice(0, historyIndex + 1);
            history.push({ depth, color });
            historyIndex++;
            applyState();
        }

        function applyState() {
            const state = history[historyIndex];
            window.__3D_STATE__.treeDepth = state.depth;
            window.__3D_STATE__.baseColor = state.color;
            document.getElementById('color-picker').value = state.color;
            generateTree();
        }

        function updateState() {
            window.__3D_STATE__.undoStackSize = historyIndex;
            window.__3D_STATE__.redoStackSize = history.length - 1 - historyIndex;
        }

        // --- UI & Interactions ---
        const btnGrow = document.getElementById('btn-grow');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const btnReset = document.getElementById('btn-reset');
        const colorPicker = document.getElementById('color-picker');
        const depthDisplay = document.getElementById('depth-display');
        const branchCountDisplay = document.getElementById('branch-count');

        function updateUI() {
            const depth = window.__3D_STATE__.treeDepth;
            depthDisplay.textContent = `Depth: ${depth}`;
            branchCountDisplay.textContent = `Branches: ${window.__3D_STATE__.branchCount}`;
            
            btnGrow.disabled = depth >= 5;
            btnUndo.disabled = historyIndex <= 0;
            btnRedo.disabled = historyIndex >= history.length - 1;
        }

        function handleGrow() {
            if (window.__3D_STATE__.treeDepth < 5) {
                saveState(window.__3D_STATE__.treeDepth + 1, window.__3D_STATE__.baseColor);
            }
        }

        function handleUndo() {
            if (historyIndex > 0) {
                historyIndex--;
                applyState();
            }
        }

        function handleRedo() {
            if (historyIndex < history.length - 1) {
                historyIndex++;
                applyState();
            }
        }

        function handleReset() {
            saveState(0, window.__3D_STATE__.baseColor);
        }

        btnGrow.addEventListener('click', handleGrow);
        btnUndo.addEventListener('click', handleUndo);
        btnRedo.addEventListener('click', handleRedo);
        btnReset.addEventListener('click', handleReset);
        
        colorPicker.addEventListener('change', (e) => {
            saveState(window.__3D_STATE__.treeDepth, e.target.value);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'g') {
                handleGrow();
            } else if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                handleUndo();
            } else if (e.ctrlKey && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                handleRedo();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        saveState(0, '#8B4513');

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            if (mixer) mixer.update(delta);
            TWEEN.update();
            controls.update();
            
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
