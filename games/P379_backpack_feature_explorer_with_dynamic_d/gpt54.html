<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Backpack Feature Explorer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
      color: #fff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      background: rgba(10, 14, 24, 0.78);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      border-radius: 12px;
      padding: 14px 16px;
      z-index: 10;
    }

    #statusPanel {
      top: 16px;
      left: 16px;
      min-width: 220px;
    }

    #featurePanel {
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
      width: 280px;
      display: none;
    }

    #featurePanel.visible {
      display: block;
    }

    #controlsBar {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      z-index: 10;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.16);
      transition: transform 0.15s ease, background 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }

    button:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.2);
    }

    button.active {
      background: #ff6b35;
      color: white;
      box-shadow: 0 0 18px rgba(255, 107, 53, 0.45);
    }

    .hotspot-label {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -120%);
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.14);
      color: #fff;
      font-size: 12px;
      white-space: nowrap;
      display: none;
      z-index: 9;
    }

    #hint {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      font-size: 12px;
      opacity: 0.85;
      background: rgba(0,0,0,0.28);
      padding: 8px 10px;
      border-radius: 8px;
    }

    h3 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    p {
      margin: 0;
      line-height: 1.4;
      color: #dbe4ff;
    }

    .status-line {
      margin: 4px 0;
      color: #dbe4ff;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="statusPanel" class="panel">
      <div class="status-line"><strong>Features Discovered:</strong> <span id="discoveredText">0/5</span></div>
      <div class="status-line"><strong>Difficulty:</strong> <span id="difficultyText">medium</span></div>
    </div>

    <div id="featurePanel" class="panel">
      <h3 id="featureTitle">Feature</h3>
      <p id="featureDescription">Details will appear here.</p>
    </div>

    <div id="controlsBar">
      <button id="easyBtn">Easy</button>
      <button id="mediumBtn" class="active">Medium</button>
      <button id="hardBtn">Hard</button>
      <button id="resetBtn">Reset</button>
      <button id="spinBtn">Spin Backpack</button>
    </div>

    <div id="hint">Mouse: orbit • Wheel: zoom • Click hotspots • Press R to reset camera</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";
    import { RoundedBoxGeometry } from "https://unpkg.com/three@0.160.0/examples/jsm/geometries/RoundedBoxGeometry.js";

    const app = document.getElementById("app");
    const discoveredText = document.getElementById("discoveredText");
    const difficultyText = document.getElementById("difficultyText");
    const featurePanel = document.getElementById("featurePanel");
    const featureTitle = document.getElementById("featureTitle");
    const featureDescription = document.getElementById("featureDescription");

    const easyBtn = document.getElementById("easyBtn");
    const mediumBtn = document.getElementById("mediumBtn");
    const hardBtn = document.getElementById("hardBtn");
    const resetBtn = document.getElementById("resetBtn");
    const spinBtn = document.getElementById("spinBtn");

    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x16213e, 10, 20);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    const initialCameraPos = new THREE.Vector3(0, 2, 5);
    camera.position.copy(initialCameraPos);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1, 0);
    controls.enableDamping = true;
    controls.minDistance = 3;
    controls.maxDistance = 10;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
    warmLight.position.set(5, 5, 5);
    scene.add(warmLight);

    const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
    coolLight.position.set(-3, 3, -2);
    scene.add(coolLight);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(8, 64),
      new THREE.MeshStandardMaterial({
        color: 0x111827,
        roughness: 0.95,
        metalness: 0.05,
        transparent: true,
        opacity: 0.55
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.01;
    scene.add(floor);

    const backpackGroup = new THREE.Group();
    backpackGroup.position.set(-2, 0.75, 0);
    scene.add(backpackGroup);

    const horseAnchor = new THREE.Group();
    horseAnchor.position.set(2, 0, 0);
    scene.add(horseAnchor);

    const horseGroup = new THREE.Group();
    horseAnchor.add(horseGroup);

    function createBackpack() {
      const mainMat = new THREE.MeshStandardMaterial({
        color: 0x2d5a27,
        roughness: 0.8,
        metalness: 0.15
      });
      const pocketMat = new THREE.MeshStandardMaterial({
        color: 0x3a7d32,
        roughness: 0.75,
        metalness: 0.1
      });
      const strapMat = new THREE.MeshStandardMaterial({
        color: 0x1a3a15,
        roughness: 0.9,
        metalness: 0.05
      });
      const zipperMat = new THREE.MeshStandardMaterial({
        color: 0xc0c0c0,
        roughness: 0.25,
        metalness: 0.9,
        emissive: 0x222222
      });

      const main = new THREE.Mesh(
        new RoundedBoxGeometry(1.2, 1.5, 0.6, 6, 0.12),
        mainMat
      );
      main.position.set(0, 0, 0);
      backpackGroup.add(main);

      const frontPocket = new THREE.Mesh(
        new RoundedBoxGeometry(0.8, 0.6, 0.2, 4, 0.06),
        pocketMat
      );
      frontPocket.position.set(0, -0.15, 0.38);
      backpackGroup.add(frontPocket);

      const strapGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.3, 16);
      const leftStrap = new THREE.Mesh(strapGeo, strapMat);
      leftStrap.rotation.z = 0.12;
      leftStrap.position.set(-0.35, 0.0, -0.34);
      backpackGroup.add(leftStrap);

      const rightStrap = new THREE.Mesh(strapGeo, strapMat);
      rightStrap.rotation.z = -0.12;
      rightStrap.position.set(0.35, 0.0, -0.34);
      backpackGroup.add(rightStrap);

      const zipperPull = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 20, 20),
        zipperMat
      );
      zipperPull.position.set(0.42, 0.32, 0.34);
      backpackGroup.add(zipperPull);

      return {
        main,
        frontPocket,
        leftStrap,
        rightStrap,
        zipperPull
      };
    }

    const backpackParts = createBackpack();

    function createFallbackHorse() {
      const group = new THREE.Group();
      const brown = new THREE.MeshStandardMaterial({
        color: 0x8B4513,
        roughness: 0.85,
        metalness: 0.05
      });

      const body = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.7, 0.45), brown);
      body.position.set(0, 1.0, 0);
      group.add(body);

      const neck = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.5, 0.22), brown);
      neck.position.set(0.45, 1.35, 0);
      neck.rotation.z = -0.3;
      group.add(neck);

      const head = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.3, 0.22), brown);
      head.position.set(0.75, 1.45, 0);
      group.add(head);

      const legGeo = new THREE.BoxGeometry(0.14, 0.7, 0.14);
      const legPositions = [
        [-0.4, 0.35, -0.12],
        [-0.15, 0.35, 0.12],
        [0.2, 0.35, -0.12],
        [0.45, 0.35, 0.12]
      ];
      legPositions.forEach(([x, y, z]) => {
        const leg = new THREE.Mesh(legGeo, brown);
        leg.position.set(x, y, z);
        group.add(leg);
      });

      const earGeo = new THREE.BoxGeometry(0.08, 0.14, 0.05);
      const ear1 = new THREE.Mesh(earGeo, brown);
      ear1.position.set(0.88, 1.65, -0.06);
      const ear2 = ear1.clone();
      ear2.position.z = 0.06;
      group.add(ear1, ear2);

      return group;
    }

    let modelLoaded = false;
    let horseModel = null;

    function fitHorseModel(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const desiredHeight = 2.0;
      const scale = desiredHeight / (size.y || maxDim);

      obj.scale.setScalar(scale);

      const box2 = new THREE.Box3().setFromObject(obj);
      const center2 = new THREE.Vector3();
      const size2 = new THREE.Vector3();
      box2.getCenter(center2);
      box2.getSize(size2);

      obj.position.sub(center2);
      obj.position.y += size2.y / 2;
    }

    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      "._horse.glb",
      (gltf) => {
        horseModel = gltf.scene;
        fitHorseModel(horseModel);
        horseGroup.add(horseModel);
        modelLoaded = true;
      },
      undefined,
      () => {
        horseModel = createFallbackHorse();
        horseGroup.add(horseModel);
        modelLoaded = true;
      }
    );

    const hotspotDefs = [
      {
        name: "Main Compartment",
        description: "The primary storage area for books, clothes, and daily essentials.",
        localPos: new THREE.Vector3(0, 0.05, 0.32)
      },
      {
        name: "Front Pocket",
        description: "A quick-access pocket for small items like keys, chargers, or snacks.",
        localPos: new THREE.Vector3(0, -0.15, 0.5)
      },
      {
        name: "Left Strap",
        description: "A padded shoulder strap designed for comfortable carrying support.",
        localPos: new THREE.Vector3(-0.35, 0.62, -0.34)
      },
      {
        name: "Right Strap",
        description: "The matching shoulder strap that balances load and improves comfort.",
        localPos: new THREE.Vector3(0.35, 0.62, -0.34)
      },
      {
        name: "Zipper Pull",
        description: "A metallic zipper pull that makes opening and closing smooth and easy.",
        localPos: new THREE.Vector3(0.42, 0.32, 0.34)
      }
    ];

    const hotspotGroup = new THREE.Group();
    backpackGroup.add(hotspotGroup);

    const hotspotObjects = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    hotspotDefs.forEach((def, index) => {
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff6b35,
        emissive: 0xff6b35,
        emissiveIntensity: 1.2,
        metalness: 0.2,
        roughness: 0.35
      });
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 20, 20),
        mat
      );
      mesh.position.copy(def.localPos);
      mesh.userData.feature = def;
      mesh.userData.index = index;
      mesh.userData.discovered = false;
      hotspotGroup.add(mesh);

      const label = document.createElement("div");
      label.className = "hotspot-label";
      label.textContent = def.name;
      app.appendChild(label);

      hotspotObjects.push({ mesh, def, label });
    });

    let discoveredFeatures = new Set();
    let currentDifficulty = "medium";
    let hoveredHotspot = null;
    let clickedVisibleLabel = null;
    let horseBaseY = horseAnchor.position.y;
    let jumpAnim = null;
    let spinAnim = null;
    let hardOrbitAngle = 0;

    function updateButtons() {
      [easyBtn, mediumBtn, hardBtn].forEach(btn => btn.classList.remove("active"));
      if (currentDifficulty === "easy") easyBtn.classList.add("active");
      if (currentDifficulty === "medium") mediumBtn.classList.add("active");
      if (currentDifficulty === "hard") hardBtn.classList.add("active");
    }

    function setDifficulty(level) {
      currentDifficulty = level;
      clickedVisibleLabel = null;
      hoveredHotspot = null;
      difficultyText.textContent = currentDifficulty;
      updateButtons();
    }

    easyBtn.addEventListener("click", () => setDifficulty("easy"));
    mediumBtn.addEventListener("click", () => setDifficulty("medium"));
    hardBtn.addEventListener("click", () => setDifficulty("hard"));

    function updateDiscoveryUI() {
      discoveredText.textContent = `${discoveredFeatures.size}/5`;
    }

    function showFeature(def) {
      featureTitle.textContent = def.name;
      featureDescription.textContent = def.description;
      featurePanel.classList.add("visible");
    }

    function resetFeatures() {
      discoveredFeatures.clear();
      hotspotObjects.forEach(h => {
        h.mesh.userData.discovered = false;
        h.mesh.material.color.set(0xff6b35);
        h.mesh.material.emissive.set(0xff6b35);
      });
      featurePanel.classList.remove("visible");
      clickedVisibleLabel = null;
      updateDiscoveryUI();
    }

    resetBtn.addEventListener("click", resetFeatures);

    spinBtn.addEventListener("click", () => {
      if (spinAnim) return;
      spinAnim = {
        start: performance.now(),
        duration: 2000,
        from: backpackGroup.rotation.y,
        delta: Math.PI * 2
      };
    });

    function triggerHorseJump() {
      jumpAnim = {
        start: performance.now(),
        duration: 500
      };
    }

    function discoverHotspot(mesh) {
      const def = mesh.userData.feature;
      const wasNew = !discoveredFeatures.has(def.name);
      discoveredFeatures.add(def.name);
      mesh.userData.discovered = true;
      mesh.material.color.set(0x00ff88);
      mesh.material.emissive.set(0x00ff88);
      showFeature(def);
      if (currentDifficulty === "hard") {
        clickedVisibleLabel = mesh;
      }
      updateDiscoveryUI();
      if (wasNew) triggerHorseJump();
    }

    renderer.domElement.addEventListener("pointermove", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hotspotObjects.map(h => h.mesh), false);
      hoveredHotspot = intersects.length ? intersects[0].object : null;
    });

    renderer.domElement.addEventListener("click", () => {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(hotspotObjects.map(h => h.mesh), false);
      if (intersects.length) {
        discoverHotspot(intersects[0].object);
      }
    });

    renderer.domElement.addEventListener("wheel", (event) => {
      event.preventDefault();
      const dir = new THREE.Vector3().subVectors(camera.position, controls.target);
      let dist = dir.length();
      dist += event.deltaY * 0.003;
      dist = THREE.MathUtils.clamp(dist, 3, 10);
      dir.normalize().multiplyScalar(dist);
      camera.position.copy(controls.target).add(dir);
      controls.update();
    }, { passive: false });

    window.addEventListener("keydown", (e) => {
      if (e.key.toLowerCase() === "r") {
        camera.position.copy(initialCameraPos);
        controls.target.set(0, 1, 0);
        controls.update();
      }
    });

    function projectToScreen(obj, label) {
      const pos = new THREE.Vector3();
      obj.getWorldPosition(pos);
      pos.project(camera);
      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
      label.style.left = `${x}px`;
      label.style.top = `${y}px`;
    }

    window.__3D_STATE__ = {
      discoveredCount: 0,
      discoveredFeatures: [],
      currentDifficulty: "medium",
      cameraDistance: 0,
      horsePosition: { x: 0, y: 0, z: 0 },
      backpackRotationY: 0,
      isSpinning: false,
      hotspotScale: 1,
      modelLoaded: false,
      featurePanelVisible: false
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();
      const now = performance.now();
      controls.update();

      let hotspotScaleMultiplier = 1.0;
      if (currentDifficulty === "easy") hotspotScaleMultiplier = 1.5;
      if (currentDifficulty === "medium") hotspotScaleMultiplier = 1.0;
      if (currentDifficulty === "hard") hotspotScaleMultiplier = 0.6;

      hotspotObjects.forEach((h, i) => {
        const pulse = 1 + Math.sin(t * 3.5 + i) * 0.2;
        const s = pulse * hotspotScaleMultiplier;
        h.mesh.scale.setScalar(s);

        if (currentDifficulty === "easy") {
          h.label.style.display = "block";
        } else if (currentDifficulty === "medium") {
          h.label.style.display = hoveredHotspot === h.mesh ? "block" : "none";
        } else {
          h.label.style.display = clickedVisibleLabel === h.mesh ? "block" : "none";
        }

        projectToScreen(h.mesh, h.label);
      });

      if (currentDifficulty === "easy") {
        horseAnchor.position.set(2, horseBaseY, 0);
      } else if (currentDifficulty === "medium") {
        horseAnchor.position.set(2, horseBaseY + Math.sin(t * 1.5) * 0.1, 0);
      } else if (currentDifficulty === "hard") {
        hardOrbitAngle += 0.003;
        const radius = 4.0;
        horseAnchor.position.set(
          Math.cos(hardOrbitAngle) * radius,
          horseBaseY + Math.sin(t * 2.0) * 0.1,
          Math.sin(hardOrbitAngle) * radius
        );
        horseAnchor.lookAt(backpackGroup.position);
        hotspotGroup.rotation.y += 0.003;
      }

      if (currentDifficulty !== "hard") {
        horseAnchor.lookAt(backpackGroup.position.clone().setY(1.0));
      }

      if (jumpAnim) {
        const p = (now - jumpAnim.start) / jumpAnim.duration;
        if (p >= 1) {
          jumpAnim = null;
        } else {
          const jump = Math.sin(p * Math.PI) * 0.5;
          horseAnchor.position.y += jump;
        }
      }

      if (spinAnim) {
        const p = (now - spinAnim.start) / spinAnim.duration;
        if (p >= 1) {
          backpackGroup.rotation.y = spinAnim.from + spinAnim.delta;
          spinAnim = null;
        } else {
          backpackGroup.rotation.y = spinAnim.from + spinAnim.delta * p;
        }
      }

      window.__3D_STATE__.discoveredCount = discoveredFeatures.size;
      window.__3D_STATE__.discoveredFeatures = Array.from(discoveredFeatures);
      window.__3D_STATE__.currentDifficulty = currentDifficulty;
      window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
      window.__3D_STATE__.horsePosition = {
        x: horseAnchor.position.x,
        y: horseAnchor.position.y,
        z: horseAnchor.position.z
      };
      window.__3D_STATE__.backpackRotationY = backpackGroup.rotation.y;
      window.__3D_STATE__.isSpinning = !!spinAnim;
      window.__3D_STATE__.hotspotScale = hotspotScaleMultiplier;
      window.__3D_STATE__.modelLoaded = modelLoaded;
      window.__3D_STATE__.featurePanelVisible = featurePanel.classList.contains("visible");

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setDifficulty("medium");
    updateDiscoveryUI();
    animate();
  </script>
</body>
</html>
