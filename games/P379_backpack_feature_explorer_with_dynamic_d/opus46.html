<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Backpack Feature Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#info-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(26, 26, 46, 0.9);
    border: 1px solid rgba(255, 107, 53, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #fff;
    min-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
}

#info-panel h2 {
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #ff6b35;
    margin-bottom: 12px;
}

#info-panel .stat {
    font-size: 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#info-panel .stat-value {
    color: #00ff88;
    font-weight: bold;
}

#progress-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-top: 12px;
    overflow: hidden;
}

#progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff6b35, #00ff88);
    border-radius: 3px;
    transition: width 0.5s ease;
    width: 0%;
}

#difficulty-buttons {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
}

#difficulty-buttons button, #action-buttons button {
    padding: 10px 24px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 25px;
    background: rgba(26, 26, 46, 0.8);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    letter-spacing: 1px;
}

#difficulty-buttons button:hover, #action-buttons button:hover {
    background: rgba(255, 107, 53, 0.3);
    border-color: #ff6b35;
    transform: translateY(-2px);
}

#difficulty-buttons button.active {
    background: rgba(255, 107, 53, 0.5);
    border-color: #ff6b35;
    box-shadow: 0 0 15px rgba(255, 107, 53, 0.3);
}

#action-buttons {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
}

#feature-panel {
    position: absolute;
    top: 50%;
    right: 30px;
    transform: translateY(-50%);
    background: rgba(26, 26, 46, 0.95);
    border: 1px solid rgba(0, 255, 136, 0.3);
    border-radius: 16px;
    padding: 30px;
    color: #fff;
    width: 280px;
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
    display: none;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(-50%) translateX(20px); }
    to { opacity: 1; transform: translateY(-50%) translateX(0); }
}

#feature-panel h3 {
    color: #00ff88;
    font-size: 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

#feature-panel h3::before {
    content: '✦';
    color: #ff6b35;
}

#feature-panel p {
    color: rgba(255,255,255,0.8);
    line-height: 1.6;
    font-size: 14px;
}

#feature-panel .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-size: 20px;
    cursor: pointer;
    transition: color 0.2s;
}

#feature-panel .close-btn:hover {
    color: #ff6b35;
}

#label-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
}

.hotspot-label {
    position: absolute;
    background: rgba(26, 26, 46, 0.9);
    color: #fff;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    white-space: nowrap;
    border: 1px solid rgba(255, 107, 53, 0.4);
    transform: translate(-50%, -100%) translateY(-10px);
    pointer-events: none;
    transition: opacity 0.2s;
}

#instructions {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="info-panel">
    <h2>Backpack Explorer</h2>
    <div class="stat">
        <span>Features Discovered:</span>
        <span class="stat-value" id="discovered-count">0/5</span>
    </div>
    <div class="stat">
        <span>Difficulty:</span>
        <span class="stat-value" id="difficulty-display">Easy</span>
    </div>
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>
</div>

<div id="instructions">Click hotspots to explore • Scroll to zoom • Press R to reset camera</div>

<div id="label-container"></div>

<div id="feature-panel">
    <button class="close-btn" onclick="closeFeaturePanel()">✕</button>
    <h3 id="feature-name"></h3>
    <p id="feature-desc"></p>
</div>

<div id="action-buttons">
    <button onclick="spinBackpack()">🔄 Spin Backpack</button>
    <button onclick="resetFeatures()">↺ Reset</button>
</div>

<div id="difficulty-buttons">
    <button class="active" onclick="setDifficulty('easy')">Easy</button>
    <button onclick="setDifficulty('medium')">Medium</button>
    <button onclick="setDifficulty('hard')">Hard</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    discoveredCount: 0,
    discoveredFeatures: [],
    currentDifficulty: 'easy',
    cameraDistance: 5,
    horsePosition: { x: 2, y: 0, z: 0 },
    backpackRotationY: 0,
    isSpinning: false,
    hotspotScale: 1.5,
    modelLoaded: false,
    featurePanelVisible: false
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();

// Gradient background
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a1a2e');
gradient.addColorStop(1, '#16213e');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(canvas2d);
scene.background = bgTexture;

// Camera
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
warmLight.position.set(5, 5, 5);
warmLight.castShadow = true;
scene.add(warmLight);

const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
coolLight.position.set(-3, 3, -2);
scene.add(coolLight);

// Ground plane (subtle)
const groundGeo = new THREE.CircleGeometry(8, 64);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x111122,
    roughness: 0.9,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 3;
controls.maxDistance = 10;
controls.target.set(0, 0.75, 0);
controls.update();

// Backpack Group
const backpackGroup = new THREE.Group();
backpackGroup.position.set(-1.5, 0, 0);
scene.add(backpackGroup);

// Main compartment (rounded box approximation)
function createRoundedBox(width, height, depth, radius, color) {
    const shape = new THREE.Shape();
    const w = width / 2 - radius;
    const h = height / 2 - radius;
    shape.moveTo(-w, -height / 2);
    shape.lineTo(w, -height / 2);
    shape.quadraticCurveTo(width / 2, -height / 2, width / 2, -h);
    shape.lineTo(width / 2, h);
    shape.quadraticCurveTo(width / 2, height / 2, w, height / 2);
    shape.lineTo(-w, height / 2);
    shape.quadraticCurveTo(-width / 2, height / 2, -width / 2, h);
    shape.lineTo(-width / 2, -h);
    shape.quadraticCurveTo(-width / 2, -height / 2, -w, -height / 2);

    const extrudeSettings = { depth: depth, bevelEnabled: true, bevelThickness: radius, bevelSize: radius, bevelSegments: 8 };
    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geometry.center();
    const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.7, metalness: 0.1 });
    return new THREE.Mesh(geometry, material);
}

const mainBody = createRoundedBox(1.2, 1.5, 0.6, 0.08, 0x2d5a27);
mainBody.position.set(0, 0.75, 0);
mainBody.castShadow = true;
backpackGroup.add(mainBody);

// Front pocket
const frontPocket = createRoundedBox(0.8, 0.6, 0.2, 0.05, 0x3a7d32);
frontPocket.position.set(0, 0.45, 0.45);
frontPocket.castShadow = true;
backpackGroup.add(frontPocket);

// Straps
const strapGeo = new THREE.CylinderGeometry(0.04, 0.04, 1.3, 12);
const strapMat = new THREE.MeshStandardMaterial({ color: 0x1a3a15, roughness: 0.8 });

const leftStrap = new THREE.Mesh(strapGeo, strapMat);
leftStrap.position.set(-0.35, 0.75, -0.38);
leftStrap.rotation.x = 0.15;
backpackGroup.add(leftStrap);

const rightStrap = new THREE.Mesh(strapGeo, strapMat);
rightStrap.position.set(0.35, 0.75, -0.38);
rightStrap.rotation.x = 0.15;
backpackGroup.add(rightStrap);

// Zipper pull
const zipperGeo = new THREE.SphereGeometry(0.06, 16, 16);
const zipperMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.9, roughness: 0.2 });
const zipperPull = new THREE.Mesh(zipperGeo, zipperMat);
zipperPull.position.set(0.55, 1.2, 0.15);
backpackGroup.add(zipperPull);

// Top handle
const handleCurve = new THREE.CatmullRomCurve3([
    new THREE.Vector3(-0.15, 1.55, -0.1),
    new THREE.Vector3(-0.1, 1.7, -0.1),
    new THREE.Vector3(0.1, 1.7, -0.1),
    new THREE.Vector3(0.15, 1.55, -0.1)
]);
const handleGeo = new THREE.TubeGeometry(handleCurve, 20, 0.03, 8, false);
const handleMat = new THREE.MeshStandardMaterial({ color: 0x1a3a15, roughness: 0.7 });
const handle = new THREE.Mesh(handleGeo, handleMat);
backpackGroup.add(handle);

// Feature data
const features = [
    {
        name: 'Main Compartment',
        desc: 'Spacious 30L main compartment with padded laptop sleeve. Water-resistant YKK zippers keep your gear dry in any weather.',
        position: new THREE.Vector3(0, 0.75, 0.35)
    },
    {
        name: 'Front Pocket',
        desc: 'Quick-access front pocket with internal organizer. Perfect for keys, wallet, and phone with soft-lined interior.',
        position: new THREE.Vector3(0, 0.45, 0.6)
    },
    {
        name: 'Left Strap',
        desc: 'Ergonomic S-curved shoulder strap with breathable mesh padding. Adjustable sternum strap for load distribution.',
        position: new THREE.Vector3(-0.35, 1.35, -0.38)
    },
    {
        name: 'Right Strap',
        desc: 'Matching right strap with integrated whistle buckle. Load lifter straps for fine-tuning the carry angle.',
        position: new THREE.Vector3(0.35, 1.35, -0.38)
    },
    {
        name: 'Zipper Pull',
        desc: 'Premium aluminum zipper pulls with glow-in-the-dark coating. Designed for easy grip even with gloves on.',
        position: new THREE.Vector3(0.55, 1.2, 0.15)
    }
];

// Hotspots
const hotspots = [];
const hotspotMeshes = [];
const discoveredSet = new Set();

const hotspotGeo = new THREE.SphereGeometry(0.08, 16, 16);

features.forEach((feature, i) => {
    const hotspotMat = new THREE.MeshStandardMaterial({
        color: 0xff6b35,
        emissive: 0xff6b35,
        emissiveIntensity: 0.8,
        transparent: true,
        opacity: 0.9
    });
    const hotspot = new THREE.Mesh(hotspotGeo, hotspotMat);
    hotspot.position.copy(feature.position);
    hotspot.userData = { featureIndex: i, name: feature.name };
    backpackGroup.add(hotspot);
    hotspots.push(hotspot);
    hotspotMeshes.push(hotspot);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(0.1, 0.15, 32);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0xff6b35,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(feature.position);
    ring.position.z += 0.01;
    ring.userData.isRing = true;
    backpackGroup.add(ring);
});

// Horse model (fallback)
const horseGroup = new THREE.Group();
horseGroup.position.set(2, 0, 0);
scene.add(horseGroup);

function createFallbackHorse() {
    const horseMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 });
    const darkMat = new THREE.MeshStandardMaterial({ color: 0x5C3317, roughness: 0.6 });

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.2, 0.6, 0.5);
    const body = new THREE.Mesh(bodyGeo, horseMat);
    body.position.set(0, 1.0, 0);
    body.castShadow = true;
    horseGroup.add(body);

    // Neck
    const neckGeo = new THREE.BoxGeometry(0.3, 0.7, 0.35);
    const neck = new THREE.Mesh(neckGeo, horseMat);
    neck.position.set(0.5, 1.5, 0);
    neck.rotation.z = -0.3;
    horseGroup.add(neck);

    // Head
    const headGeo = new THREE.BoxGeometry(0.5, 0.3, 0.3);
    const head = new THREE.Mesh(headGeo, horseMat);
    head.position.set(0.8, 1.8, 0);
    horseGroup.add(head);

    // Ears
    const earGeo = new THREE.ConeGeometry(0.05, 0.15, 4);
    const ear1 = new THREE.Mesh(earGeo, darkMat);
    ear1.position.set(0.75, 2.0, 0.08);
    horseGroup.add(ear1);
    const ear2 = new THREE.Mesh(earGeo, darkMat);
    ear2.position.set(0.75, 2.0, -0.08);
    horseGroup.add(ear2);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
    eye1.position.set(0.95, 1.85, 0.12);
    horseGroup.add(eye1);
    const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
    eye2.position.set(0.95, 1.85, -0.12);
    horseGroup.add(eye2);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.15, 0.7, 0.15);
    const positions = [
        [0.4, 0.35, 0.15], [0.4, 0.35, -0.15],
        [-0.4, 0.35, 0.15], [-0.4, 0.35, -0.15]
    ];
    positions.forEach(pos => {
        const leg = new THREE.Mesh(legGeo, darkMat);
        leg.position.set(...pos);
        leg.castShadow = true;
        horseGroup.add(leg);
    });

    // Hooves
    const hoofGeo = new THREE.BoxGeometry(0.17, 0.08, 0.17);
    const hoofMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    positions.forEach(pos => {
        const hoof = new THREE.Mesh(hoofGeo, hoofMat);
        hoof.position.set(pos[0], 0.02, pos[2]);
        horseGroup.add(hoof);
    });

    // Tail
    const tailGeo = new THREE.CylinderGeometry(0.03, 0.06, 0.6, 8);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0x2a1506 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(-0.7, 1.0, 0);
    tail.rotation.z = 0.5;
    horseGroup.add(tail);

    // Mane
    for (let i = 0; i < 5; i++) {
        const maneGeo = new THREE.BoxGeometry(0.05, 0.15, 0.4);
        const mane = new THREE.Mesh(maneGeo, tailMat);
        mane.position.set(0.3 + i * 0.1, 1.4 + i * 0.1, 0);
        horseGroup.add(mane);
    }

    state.modelLoaded = true;
}

// Try loading GLB, fallback to primitives
const loader = new GLTFLoader();
loader.load(
    '._horse.glb',
    (gltf) => {
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2 / maxDim;
        model.scale.setScalar(scale);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center.multiplyScalar(scale));
        model.position.y = 0;
        horseGroup.add(model);
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.log('GLB load failed, using fallback horse');
        createFallbackHorse();
    }
);

// If model hasn't loaded after 2 seconds, create fallback
setTimeout(() => {
    if (!state.modelLoaded) {
        createFallbackHorse();
    }
}, 2000);

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// Labels
const labelContainer = document.getElementById('label-container');
const labels = [];
features.forEach((feature, i) => {
    const label = document.createElement('div');
    label.className = 'hotspot-label';
    label.textContent = feature.name;
    label.style.opacity = '0';
    labelContainer.appendChild(label);
    labels.push(label);
});

// Horse animation state
let horseJumping = false;
let horseJumpTime = 0;
let horseBaseY = 0;
let horseOrbitAngle = 0;

// Spin animation
let spinStartTime = 0;
let spinStartAngle = 0;
let spinning = false;

// Difficulty
let currentDifficulty = 'easy';
let hoveredHotspot = null;

function setDifficulty(diff) {
    currentDifficulty = diff;
    state.currentDifficulty = diff;

    document.querySelectorAll('#difficulty-buttons button').forEach(btn => btn.classList.remove('active'));
    const buttons = document.querySelectorAll('#difficulty-buttons button');
    if (diff === 'easy') buttons[0].classList.add('active');
    else if (diff === 'medium') buttons[1].classList.add('active');
    else buttons[2].classList.add('active');

    document.getElementById('difficulty-display').textContent = diff.charAt(0).toUpperCase() + diff.slice(1);

    // Update hotspot scales
    let scaleMult = diff === 'easy' ? 1.5 : diff === 'medium' ? 1.0 : 0.6;
    state.hotspotScale = scaleMult;
}
window.setDifficulty = setDifficulty;

function spinBackpack() {
    if (spinning) return;
    spinning = true;
    state.isSpinning = true;
    spinStartTime = performance.now();
    spinStartAngle = backpackGroup.rotation.y;
}
window.spinBackpack = spinBackpack;

function resetFeatures() {
    discoveredSet.clear();
    state.discoveredCount = 0;
    state.discoveredFeatures = [];
    document.getElementById('discovered-count').textContent = '0/5';
    document.getElementById('progress-fill').style.width = '0%';

    hotspots.forEach(h => {
        h.material.color.setHex(0xff6b35);
        h.material.emissive.setHex(0xff6b35);
    });

    closeFeaturePanel();
}
window.resetFeatures = resetFeatures;

function closeFeaturePanel() {
    document.getElementById('feature-panel').style.display = 'none';
    state.featurePanelVisible = false;
}
window.closeFeaturePanel = closeFeaturePanel;

function showFeaturePanel(index) {
    const panel = document.getElementById('feature-panel');
    document.getElementById('feature-name').textContent = features[index].name;
    document.getElementById('feature-desc').textContent = features[index].desc;
    panel.style.display = 'block';
    state.featurePanelVisible = true;
}

function discoverFeature(index) {
    const name = features[index].name;
    if (discoveredSet.has(name)) {
        showFeaturePanel(index);
        return;
    }

    discoveredSet.add(name);
    state.discoveredFeatures = Array.from(discoveredSet);
    state.discoveredCount = discoveredSet.size;

    document.getElementById('discovered-count').textContent = `${discoveredSet.size}/5`;
    document.getElementById('progress-fill').style.width = `${(discoveredSet.size / 5) * 100}%`;

    // Change hotspot color
    hotspots[index].material.color.setHex(0x00ff88);
    hotspots[index].material.emissive.setHex(0x00ff88);

    // Show panel
    showFeaturePanel(index);

    // Horse jump
    if (!horseJumping) {
        horseJumping = true;
        horseJumpTime = 0;
    }
}

// Click handler
renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(hotspotMeshes);

    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.featureIndex;
        discoverFeature(idx);
    }
});

// Hover handler
renderer.domElement.addEventListener('mousemove', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(hotspotMeshes);

    if (intersects.length > 0) {
        hoveredHotspot = intersects[0].object.userData.featureIndex;
        renderer.domElement.style.cursor = 'pointer';
    } else {
        hoveredHotspot = null;
        renderer.domElement.style.cursor = 'default';
    }
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') {
        camera.position.set(0, 2, 5);
        controls.target.set(0, 0.75, 0);
        controls.update();
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    // Hotspot pulse
    const scaleMult = state.hotspotScale;
    hotspots.forEach((h, i) => {
        const pulse = 0.8 + 0.2 * Math.sin(time * 3 + i * 1.2);
        const s = pulse * scaleMult;
        h.scale.set(s, s, s);
    });

    // Update labels
    features.forEach((feature, i) => {
        const worldPos = new THREE.Vector3();
        hotspots[i].getWorldPosition(worldPos);
        const screenPos = worldPos.clone().project(camera);

        const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

        labels[i].style.left = x + 'px';
        labels[i].style.top = y + 'px';

        let showLabel = false;
        if (currentDifficulty === 'easy') {
            showLabel = true;
        } else if (currentDifficulty === 'medium') {
            showLabel = hoveredHotspot === i;
        } else {
            showLabel = false; // only on click, handled by feature panel
        }

        labels[i].style.opacity = showLabel ? '1' : '0';

        if (discoveredSet.has(feature.name)) {
            labels[i].style.borderColor = 'rgba(0, 255, 136, 0.4)';
            labels[i].style.color = '#00ff88';
        } else {
            labels[i].style.borderColor = 'rgba(255, 107, 53, 0.4)';
            labels[i].style.color = '#fff';
        }
    });

    // Horse animations based on difficulty
    if (currentDifficulty === 'medium') {
        horseGroup.position.y = Math.sin(time * 2) * 0.1;
        horseGroup.position.x = 2;
        horseGroup.position.z = 0;
        horseGroup.rotation.y = 0;
    } else if (currentDifficulty === 'hard') {
        horseOrbitAngle += delta * 0.3;
        const radius = 2.5;
        horseGroup.position.x = Math.cos(horseOrbitAngle) * radius;
        horseGroup.position.z = Math.sin(horseOrbitAngle) * radius;
        horseGroup.position.y = Math.sin(time * 2) * 0.05;
        horseGroup.rotation.y = -horseOrbitAngle + Math.PI / 2;

        // Hotspots rotate around backpack in hard mode
        hotspots.forEach((h, i) => {
            const basePos = features[i].position.clone();
            const angle = time * 0.5;
            const rotatedX = basePos.x * Math.cos(angle) - basePos.z * Math.sin(angle);
            const rotatedZ = basePos.x * Math.sin(angle) + basePos.z * Math.cos(angle);
            h.position.set(rotatedX, basePos.y, rotatedZ);
        });
    } else {
        horseGroup.position.set(2, 0, 0);
        horseGroup.rotation.y = 0;
        // Reset hotspot positions in easy mode
        hotspots.forEach((h, i) => {
            h.position.copy(features[i].position);
        });
    }

    // Horse jump animation
    if (horseJumping) {
        horseJumpTime += delta;
        const jumpDuration = 0.5;
        const t = horseJumpTime / jumpDuration;
        if (t < 1) {
            const jumpHeight = 0.5 * Math.sin(t * Math.PI);
            horseGroup.position.y += jumpHeight;
        } else {
            horseJumping = false;
            horseJumpTime = 0;
        }
    }

    // Spin animation
    if (spinning) {
        const elapsed = (performance.now() - spinStartTime) / 1000;
        const duration = 2;
        if (elapsed < duration) {
            const t = elapsed / duration;
            const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            backpackGroup.rotation.y = spinStartAngle + eased * Math.PI * 2;
        } else {
            backpackGroup.rotation.y = spinStartAngle + Math.PI * 2;
            spinning = false;
            state.isSpinning = false;
        }
    }

    // Update state
    state.backpackRotationY = backpackGroup.rotation.y;
    state.cameraDistance = camera.position.distanceTo(controls.target);
    state.horsePosition = {
        x: horseGroup.position.x,
        y: horseGroup.position.y,
        z: horseGroup.position.z
    };

    controls.update();
    renderer.render(scene, camera);
}

// Add some particles for atmosphere
const particleCount = 100;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 10;
    particlePositions[i * 3 + 1] = Math.random() * 5;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 10;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.02,
    transparent: true,
    opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Initialize
setDifficulty('easy');
animate();
</script>
