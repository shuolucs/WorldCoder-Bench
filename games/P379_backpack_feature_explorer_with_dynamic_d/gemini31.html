<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Backpack Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
        .interactive {
            pointer-events: auto;
        }
        #top-left-panel {
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }
        #top-left-panel h2 { margin: 0 0 10px 0; font-size: 18px; color: #00ff88; }
        #top-left-panel p { margin: 5px 0; font-size: 14px; }
        
        #bottom-center-panel {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(4px);
        }
        
        #right-panel {
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            width: 280px;
            background: rgba(0, 0, 0, 0.8);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            display: none;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #right-panel h3 { margin: 0 0 15px 0; color: #ff6b35; border-bottom: 1px solid #444; padding-bottom: 10px;}
        #right-panel p { font-size: 14px; line-height: 1.5; color: #ddd; }
        
        #controls-panel {
            bottom: 30px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            background: #2d5a27;
            color: white;
            border: 1px solid #4caf50;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #3a7d32; transform: scale(1.05); }
        button.active { background: #ff6b35; border-color: #ff8c61; }
        
        .action-btn { background: #1a3a15; border-radius: 8px; padding: 10px 20px; }
        .action-btn:hover { background: #2d5a27; }

        .hotspot-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            transform: translate(-50%, -150%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
            white-space: nowrap;
            z-index: 5;
        }
        .hotspot-label::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: rgba(0, 0, 0, 0.8) transparent transparent transparent;
        }

        #instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="instructions" class="ui-layer">Scroll to Zoom (3-10) | Drag to Rotate | Press 'R' to Reset Camera</div>

    <div id="top-left-panel" class="ui-layer interactive">
        <h2>Explorer Stats</h2>
        <p id="ui-discovered">Features Discovered: 0/5</p>
        <p id="ui-difficulty">Difficulty: easy</p>
    </div>

    <div id="bottom-center-panel" class="ui-layer interactive">
        <button id="btn-easy" class="active">Easy</button>
        <button id="btn-medium">Medium</button>
        <button id="btn-hard">Hard</button>
    </div>

    <div id="right-panel" class="ui-layer interactive">
        <h3 id="detail-title">Feature Name</h3>
        <p id="detail-desc">Feature description goes here.</p>
    </div>

    <div id="controls-panel" class="ui-layer interactive">
        <button id="btn-spin" class="action-btn">Spin Backpack</button>
        <button id="btn-reset" class="action-btn">Reset Progress</button>
    </div>

    <div id="labels-container" class="ui-layer"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            discoveredCount: 0,
            discoveredFeatures: [],
            currentDifficulty: 'easy',
            cameraDistance: 5,
            horsePosition: { x: 2, y: 0, z: 0 },
            backpackRotationY: 0,
            isSpinning: false,
            hotspotScale: 1,
            modelLoaded: false,
            featurePanelVisible: false
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 3;
        controls.maxDistance = 10;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        
        const warmLight = new THREE.DirectionalLight(0xffeedd, 0.8);
        warmLight.position.set(5, 5, 5);
        scene.add(warmLight);

        const coolLight = new THREE.DirectionalLight(0xaaccff, 0.5);
        coolLight.position.set(-3, 3, -2);
        scene.add(coolLight);

        // --- Objects ---
        
        // 1. Backpack
        const backpackGroup = new THREE.Group();
        backpackGroup.position.set(-2, 0.75, 0);
        scene.add(backpackGroup);

        // Main Compartment
        const mainGeo = new THREE.BoxGeometry(1.2, 1.5, 0.6);
        const mainMat = new THREE.MeshStandardMaterial({ color: 0x2d5a27, roughness: 0.7 });
        const mainMesh = new THREE.Mesh(mainGeo, mainMat);
        backpackGroup.add(mainMesh);

        // Front Pocket
        const frontGeo = new THREE.BoxGeometry(0.8, 0.6, 0.2);
        const frontMat = new THREE.MeshStandardMaterial({ color: 0x3a7d32, roughness: 0.7 });
        const frontMesh = new THREE.Mesh(frontGeo, frontMat);
        frontMesh.position.set(0, -0.2, 0.4);
        backpackGroup.add(frontMesh);

        // Straps
        const strapGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.4);
        const strapMat = new THREE.MeshStandardMaterial({ color: 0x1a3a15, roughness: 0.9 });
        const leftStrap = new THREE.Mesh(strapGeo, strapMat);
        leftStrap.position.set(-0.35, 0, -0.35);
        const rightStrap = new THREE.Mesh(strapGeo, strapMat);
        rightStrap.position.set(0.35, 0, -0.35);
        backpackGroup.add(leftStrap, rightStrap);

        // Zipper Pull
        const zipGeo = new THREE.SphereGeometry(0.06, 16, 16);
        const zipMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.8, roughness: 0.2 });
        const zipMesh = new THREE.Mesh(zipGeo, zipMat);
        zipMesh.position.set(0, 0.75, 0.1);
        backpackGroup.add(zipMesh);

        // 2. Horse Mascot
        let horseGroup = new THREE.Group();
        horseGroup.position.set(2, 0, 0);
        scene.add(horseGroup);

        const createFallbackHorse = () => {
            const mat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.8 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 1.2), mat);
            body.position.y = 0.8;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.5, 0.6), mat);
            head.position.set(0, 1.4, 0.5);
            const legGeo = new THREE.BoxGeometry(0.15, 0.6, 0.15);
            const fl = new THREE.Mesh(legGeo, mat); fl.position.set(0.2, 0.3, 0.4);
            const fr = new THREE.Mesh(legGeo, mat); fr.position.set(-0.2, 0.3, 0.4);
            const bl = new THREE.Mesh(legGeo, mat); bl.position.set(0.2, 0.3, -0.4);
            const br = new THREE.Mesh(legGeo, mat); br.position.set(-0.2, 0.3, -0.4);
            horseGroup.add(body, head, fl, fr, bl, br);
            state.modelLoaded = true;
        };

        const loader = new GLTFLoader();
        loader.load('._horse.glb', (gltf) => {
            const model = gltf.scene;
            // Approximate scaling to fit 2 units tall
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scale = 2 / size.y;
            model.scale.setScalar(scale);
            // Center bottom
            box.setFromObject(model);
            model.position.y = -box.min.y;
            
            horseGroup.add(model);
            state.modelLoaded = true;
        }, undefined, (error) => {
            console.warn("Failed to load horse.glb, using fallback.", error);
            createFallbackHorse();
        });

        // 3. Hotspots
        const hotspotGroup = new THREE.Group();
        backpackGroup.add(hotspotGroup);

        const hotspotsData = [
            { id: 'main', name: 'Main Compartment', desc: 'Spacious 20L capacity for all your daily essentials, books, and gear.', pos: new THREE.Vector3(0, 0, 0) },
            { id: 'front', name: 'Front Pocket', desc: 'Quick-access pocket for keys, wallet, and smaller items.', pos: new THREE.Vector3(0, -0.2, 0.55) },
            { id: 'l_strap', name: 'Left Strap', desc: 'Ergonomic padded shoulder strap with breathable mesh.', pos: new THREE.Vector3(-0.35, 0.7, -0.35) },
            { id: 'r_strap', name: 'Right Strap', desc: 'Ergonomic padded shoulder strap with adjustable sternum clip.', pos: new THREE.Vector3(0.35, 0.7, -0.35) },
            { id: 'zip', name: 'Zipper Pull', desc: 'Heavy-duty YKK metallic zipper for smooth operation.', pos: new THREE.Vector3(0, 0.85, 0.1) }
        ];

        const hotspots = [];
        const labelsContainer = document.getElementById('labels-container');
        const hotspotGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const colorUndiscovered = 0xff6b35;
        const colorDiscovered = 0x00ff88;

        hotspotsData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({ 
                color: colorUndiscovered, 
                emissive: colorUndiscovered,
                emissiveIntensity: 0.5
            });
            const mesh = new THREE.Mesh(hotspotGeo, mat);
            mesh.position.copy(data.pos);
            mesh.userData = { ...data, discovered: false };
            hotspotGroup.add(mesh);

            const label = document.createElement('div');
            label.className = 'hotspot-label';
            label.textContent = data.name;
            labelsContainer.appendChild(label);

            hotspots.push({ mesh, label, data });
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredHotspot = null;
        let activeHotspot = null;
        let horseJumpTimer = 0;
        let targetSpinRotation = 0;

        const uiDiscovered = document.getElementById('ui-discovered');
        const uiDifficulty = document.getElementById('ui-difficulty');
        const rightPanel = document.getElementById('right-panel');
        const detailTitle = document.getElementById('detail-title');
        const detailDesc = document.getElementById('detail-desc');

        function updateUI() {
            uiDiscovered.textContent = `Features Discovered: ${state.discoveredCount}/5`;
            uiDifficulty.textContent = `Difficulty: ${state.currentDifficulty}`;
            
            if (state.featurePanelVisible && activeHotspot) {
                rightPanel.style.display = 'block';
                detailTitle.textContent = activeHotspot.data.name;
                detailDesc.textContent = activeHotspot.data.desc;
                detailTitle.style.color = activeHotspot.mesh.userData.discovered ? '#00ff88' : '#ff6b35';
            } else {
                rightPanel.style.display = 'none';
            }
        }

        function triggerHorseJump() {
            horseJumpTimer = 0.5; // 0.5 seconds jump
        }

        function onPointerMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspots.map(h => h.mesh));

            if (intersects.length > 0) {
                document.body.style.cursor = 'pointer';
                hoveredHotspot = hotspots.find(h => h.mesh === intersects[0].object);
            } else {
                document.body.style.cursor = 'default';
                hoveredHotspot = null;
            }
        }

        function onClick(event) {
            if (hoveredHotspot) {
                activeHotspot = hoveredHotspot;
                state.featurePanelVisible = true;

                if (!hoveredHotspot.mesh.userData.discovered) {
                    hoveredHotspot.mesh.userData.discovered = true;
                    hoveredHotspot.mesh.material.color.setHex(colorDiscovered);
                    hoveredHotspot.mesh.material.emissive.setHex(colorDiscovered);
                    
                    state.discoveredCount++;
                    state.discoveredFeatures.push(hoveredHotspot.data.name);
                    triggerHorseJump();
                }
                updateUI();
            } else {
                // Clicked outside
                state.featurePanelVisible = false;
                activeHotspot = null;
                updateUI();
            }
        }

        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('click', onClick);

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                camera.position.set(0, 2, 5);
                controls.target.set(0, 0, 0);
            }
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // UI Buttons
        const diffBtns = {
            'easy': document.getElementById('btn-easy'),
            'medium': document.getElementById('btn-medium'),
            'hard': document.getElementById('btn-hard')
        };

        Object.keys(diffBtns).forEach(diff => {
            diffBtns[diff].addEventListener('click', (e) => {
                e.stopPropagation();
                state.currentDifficulty = diff;
                Object.values(diffBtns).forEach(b => b.classList.remove('active'));
                diffBtns[diff].classList.add('active');
                updateUI();
            });
        });

        document.getElementById('btn-reset').addEventListener('click', (e) => {
            e.stopPropagation();
            state.discoveredCount = 0;
            state.discoveredFeatures = [];
            state.featurePanelVisible = false;
            activeHotspot = null;
            hotspots.forEach(h => {
                h.mesh.userData.discovered = false;
                h.mesh.material.color.setHex(colorUndiscovered);
                h.mesh.material.emissive.setHex(colorUndiscovered);
            });
            updateUI();
        });

        document.getElementById('btn-spin').addEventListener('click', (e) => {
            e.stopPropagation();
            if (!state.isSpinning) {
                state.isSpinning = true;
                targetSpinRotation = backpackGroup.rotation.y + Math.PI * 2;
            }
        });

        // Prevent clicks on UI from triggering 3D raycast
        document.querySelectorAll('.interactive').forEach(el => {
            el.addEventListener('click', e => e.stopPropagation());
            el.addEventListener('pointermove', e => e.stopPropagation());
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // 1. Hotspot Animation & Logic
            const pulse = 1 + Math.sin(time * 5) * 0.2;
            let scaleMult = 1.0;
            
            if (state.currentDifficulty === 'easy') scaleMult = 1.5;
            else if (state.currentDifficulty === 'hard') scaleMult = 0.6;
            
            state.hotspotScale = pulse * scaleMult;

            hotspots.forEach(hs => {
                hs.mesh.scale.setScalar(state.hotspotScale);

                // Update Label Position
                const vector = hs.mesh.getWorldPosition(new THREE.Vector3());
                vector.project(camera);
                
                if (vector.z < 1) { // Only show if in front of camera
                    const x = (vector.x * .5 + .5) * window.innerWidth;
                    const y = (vector.y * -.5 + .5) * window.innerHeight;
                    hs.label.style.left = `${x}px`;
                    hs.label.style.top = `${y}px`;

                    // Label Visibility Logic
                    let opacity = 0;
                    if (state.currentDifficulty === 'easy') {
                        opacity = 1;
                    } else if (state.currentDifficulty === 'medium') {
                        opacity = (hoveredHotspot === hs) ? 1 : 0;
                    } else if (state.currentDifficulty === 'hard') {
                        opacity = (activeHotspot === hs && state.featurePanelVisible) ? 1 : 0;
                    }
                    hs.label.style.opacity = opacity;
                } else {
                    hs.label.style.opacity = 0;
                }
            });

            // 2. Horse Animation
            if (horseJumpTimer > 0) {
                // Jump overrides other animations
                const progress = 1 - (horseJumpTimer / 0.5);
                horseGroup.position.y = Math.sin(progress * Math.PI) * 0.5;
                horseJumpTimer -= delta;
                if (horseJumpTimer <= 0) horseGroup.position.y = 0;
            } else {
                if (state.currentDifficulty === 'medium') {
                    horseGroup.position.y = Math.sin(time * 2) * 0.1;
                    horseGroup.position.x = 2;
                    horseGroup.position.z = 0;
                    horseGroup.rotation.y = 0;
                } else if (state.currentDifficulty === 'hard') {
                    // Orbit around backpack (-2, 0, 0)
                    const angle = time * 0.5;
                    const radius = 3.5;
                    horseGroup.position.x = -2 + Math.cos(angle) * radius;
                    horseGroup.position.z = Math.sin(angle) * radius;
                    horseGroup.position.y = 0;
                    
                    // Look at backpack center, but keep upright
                    const target = new THREE.Vector3(-2, 0, 0);
                    horseGroup.lookAt(target);
                } else {
                    // Easy
                    horseGroup.position.set(2, 0, 0);
                    horseGroup.rotation.set(0, 0, 0);
                }
            }

            // 3. Hard Mode Hotspot Rotation
            if (state.currentDifficulty === 'hard') {
                hotspotGroup.rotation.y = time * 0.3;
            } else {
                hotspotGroup.rotation.y = 0;
            }

            // 4. Backpack Spin Animation
            if (state.isSpinning) {
                const spinSpeed = Math.PI; // PI rad/sec = 2 sec for 360
                backpackGroup.rotation.y += spinSpeed * delta;
                if (backpackGroup.rotation.y >= targetSpinRotation) {
                    backpackGroup.rotation.y = targetSpinRotation % (Math.PI * 2); // normalize
                    state.isSpinning = false;
                }
            }

            // 5. Update Global State
            state.cameraDistance = camera.position.distanceTo(controls.target);
            state.horsePosition.x = horseGroup.position.x;
            state.horsePosition.y = horseGroup.position.y;
            state.horsePosition.z = horseGroup.position.z;
            state.backpackRotationY = backpackGroup.rotation.y;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
