<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Morphing 3D Geometry with Physics Debug</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud-panel {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.75);
    border: 1px solid rgba(0, 170, 255, 0.3);
    border-radius: 8px;
    padding: 16px 20px;
    color: #00aaff;
    font-size: 13px;
    min-width: 220px;
    z-index: 100;
    backdrop-filter: blur(10px);
}

#hud-panel .hud-row {
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#hud-panel .hud-label {
    color: #6688aa;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#hud-panel .hud-value {
    color: #00ffcc;
    font-weight: bold;
}

#morph-progress-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin: 6px 0 10px 0;
    overflow: hidden;
}

#morph-progress {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00aaff, #00ffcc);
    border-radius: 3px;
    transition: width 0.05s linear;
}

#bottom-controls {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    z-index: 100;
}

#bottom-controls button {
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid rgba(0, 170, 255, 0.4);
    color: #00aaff;
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    transition: all 0.2s;
    backdrop-filter: blur(10px);
}

#bottom-controls button:hover {
    background: rgba(0, 170, 255, 0.2);
    border-color: #00ffcc;
    color: #00ffcc;
}

#bottom-controls button.active {
    background: rgba(0, 170, 255, 0.3);
    border-color: #00ffcc;
    color: #00ffcc;
}

#btn-debug {
    background: rgba(255, 255, 0, 0.1) !important;
    border-color: rgba(255, 255, 0, 0.4) !important;
    color: #ffff00 !important;
}

#btn-debug:hover {
    background: rgba(255, 255, 0, 0.25) !important;
}
</style>
</head>
<body>

<div id="hud-panel">
    <div class="hud-row">
        <span class="hud-label">Shape</span>
        <span class="hud-value" id="shape-name">Sphere</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Morph Progress</span>
    </div>
    <div id="morph-progress-container">
        <div id="morph-progress"></div>
    </div>
    <div class="hud-row">
        <span class="hud-label">Particles</span>
        <span class="hud-value" id="particle-count">0</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">Debug Mode</span>
        <span class="hud-value" id="debug-mode">off</span>
    </div>
    <div class="hud-row">
        <span class="hud-label">FPS</span>
        <span class="hud-value" id="fps-counter">0</span>
    </div>
</div>

<div id="bottom-controls">
    <button id="btn-sphere" class="active">1: Sphere</button>
    <button id="btn-box">2: Box</button>
    <button id="btn-torus">3: Torus</button>
    <button id="btn-icosa">4: Icosahedron</button>
    <button id="btn-debug">D: Debug (off)</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
    // Shape names
    const SHAPE_NAMES = ['Sphere', 'Box', 'Torus', 'Icosahedron'];
    const DEBUG_MODES = ['off', 'wireframe', 'full'];

    // State
    const state = {
        currentShapeIndex: 0,
        targetShapeIndex: 0,
        morphProgress: 0.0,
        isMorphing: false,
        activeParticleCount: 0,
        debugMode: 'off',
        objectPosition: { x: 0, y: 2.5, z: 0 },
        boundingBoxSize: { x: 0, y: 0, z: 0 },
        totalMorphCount: 0,
        fps: 0,
        particleSystemActive: false,
        groundPlaneVisible: true
    };
    window.__3D_STATE__ = state;

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.target.set(0, 2, 0);
    controls.update();

    // Lights
    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(5, 8, 5);
    scene.add(pointLight);

    // Ground plane
    const groundGeom = new THREE.PlaneGeometry(20, 20, 20, 20);
    const groundMat = new THREE.MeshStandardMaterial({
        color: 0x222244,
        wireframe: false,
        transparent: true,
        opacity: 0.6,
        metalness: 0.3,
        roughness: 0.8
    });
    const ground = new THREE.Mesh(groundGeom, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    // Ground grid
    const gridHelper = new THREE.GridHelper(20, 20, 0x333366, 0x222244);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // Generate geometries with same vertex count
    const VERTEX_COUNT = 642; // We'll use a common vertex count

    function createSpherePositions() {
        const geom = new THREE.SphereGeometry(1.5, 24, 18);
        return geom;
    }

    function createBoxPositions() {
        const geom = new THREE.BoxGeometry(2, 2, 2, 12, 12, 12);
        return geom;
    }

    function createTorusPositions() {
        const geom = new THREE.TorusGeometry(1.2, 0.5, 16, 32);
        return geom;
    }

    function createIcosaPositions() {
        const geom = new THREE.IcosahedronGeometry(1.5, 3);
        return geom;
    }

    // We need to normalize all geometries to the same vertex count
    // We'll sample positions from each geometry to a fixed count
    function sampleGeometryPositions(geometry, targetCount) {
        const positions = geometry.attributes.position;
        const srcCount = positions.count;
        const result = new Float32Array(targetCount * 3);

        for (let i = 0; i < targetCount; i++) {
            const srcIndex = Math.floor((i / targetCount) * srcCount) % srcCount;
            result[i * 3] = positions.getX(srcIndex);
            result[i * 3 + 1] = positions.getY(srcIndex);
            result[i * 3 + 2] = positions.getZ(srcIndex);
        }

        return result;
    }

    // Create base geometries
    const baseGeometries = [
        createSpherePositions(),
        createBoxPositions(),
        createTorusPositions(),
        createIcosaPositions()
    ];

    // Find max vertex count and use that
    const maxVertices = Math.max(...baseGeometries.map(g => g.attributes.position.count));

    // Sample all geometries to same vertex count
    const shapePositions = baseGeometries.map(g => sampleGeometryPositions(g, maxVertices));

    // Create the morphing geometry
    const morphGeom = new THREE.BufferGeometry();
    const positionAttr = new THREE.BufferAttribute(new Float32Array(shapePositions[0]), 3);
    morphGeom.setAttribute('position', positionAttr);

    // Copy index from sphere geometry (or create faces)
    // We'll use the sphere geometry as base and copy its index
    const baseGeom = new THREE.SphereGeometry(1.5, 24, 18);
    // Actually, let's use a simpler approach - create a geometry with points/triangles

    // Better approach: use a common subdivision and morph between shapes
    // Let's use IcosahedronGeometry with detail 4 as the base topology
    const commonDetail = 4;
    const commonGeom = new THREE.IcosahedronGeometry(1, commonDetail);
    const vertexCount = commonGeom.attributes.position.count;

    // Project common geometry vertices onto each target shape
    function projectOntoSphere(positions, radius) {
        const result = new Float32Array(positions.length);
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i], y = positions[i+1], z = positions[i+2];
            const len = Math.sqrt(x*x + y*y + z*z) || 1;
            result[i] = (x / len) * radius;
            result[i+1] = (y / len) * radius;
            result[i+2] = (z / len) * radius;
        }
        return result;
    }

    function projectOntoBox(positions, size) {
        const result = new Float32Array(positions.length);
        const half = size / 2;
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i], y = positions[i+1], z = positions[i+2];
            const len = Math.sqrt(x*x + y*y + z*z) || 1;
            const nx = x/len, ny = y/len, nz = z/len;
            // Project onto cube surface
            const ax = Math.abs(nx), ay = Math.abs(ny), az = Math.abs(nz);
            const maxComp = Math.max(ax, ay, az);
            const scale = half / maxComp;
            result[i] = nx * scale;
            result[i+1] = ny * scale;
            result[i+2] = nz * scale;
        }
        return result;
    }

    function projectOntoTorus(positions, R, r) {
        const result = new Float32Array(positions.length);
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i], y = positions[i+1], z = positions[i+2];
            // Map to torus using spherical-like coordinates
            const len = Math.sqrt(x*x + y*y + z*z) || 1;
            const nx = x/len, ny = y/len, nz = z/len;

            // theta = angle around the main ring (in xz plane)
            const theta = Math.atan2(nz, nx);
            // phi = angle around the tube
            const phi = Math.atan2(ny, Math.sqrt(nx*nx + nz*nz) - 0.6);

            result[i] = (R + r * Math.cos(phi)) * Math.cos(theta);
            result[i+1] = r * Math.sin(phi);
            result[i+2] = (R + r * Math.cos(phi)) * Math.sin(theta);
        }
        return result;
    }

    function projectOntoIcosahedron(positions, radius) {
        // Similar to sphere but with slight faceting
        const result = new Float32Array(positions.length);
        for (let i = 0; i < positions.length; i += 3) {
            const x = positions[i], y = positions[i+1], z = positions[i+2];
            const len = Math.sqrt(x*x + y*y + z*z) || 1;
            result[i] = (x / len) * radius;
            result[i+1] = (y / len) * radius;
            result[i+2] = (z / len) * radius;
        }
        return result;
    }

    const basePositions = commonGeom.attributes.position.array;

    const targetPositions = [
        projectOntoSphere(basePositions, 1.5),
        projectOntoBox(basePositions, 2.0),
        projectOntoTorus(basePositions, 1.2, 0.5),
        projectOntoIcosahedron(basePositions, 1.5)
    ];

    // Create the actual morph geometry using the common topology
    const morphGeometry = commonGeom.clone();
    // Set initial positions to sphere
    morphGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(targetPositions[0]), 3));

    // Current and target position arrays for morphing
    let currentPositions = new Float32Array(targetPositions[0]);
    let sourcePositions = new Float32Array(targetPositions[0]);

    // Materials
    const solidMaterial = new THREE.MeshStandardMaterial({
        color: 0x003366,
        emissive: 0x00aaff,
        emissiveIntensity: 0.3,
        metalness: 0.7,
        roughness: 0.3,
        transparent: true,
        opacity: 0.85
    });

    const wireframeMaterial = new THREE.MeshBasicMaterial({
        color: 0x00ffcc,
        wireframe: true,
        transparent: true,
        opacity: 0.4
    });

    // Create meshes
    const solidMesh = new THREE.Mesh(morphGeometry, solidMaterial);
    solidMesh.position.set(0, 2.5, 0);
    scene.add(solidMesh);

    const wireframeGeometry = morphGeometry.clone();
    const wireframeMesh = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
    wireframeMesh.position.set(0, 2.5, 0);
    scene.add(wireframeMesh);

    // Debug overlay objects
    const debugGroup = new THREE.Group();
    scene.add(debugGroup);

    // Bounding box helper
    let boundingBoxHelper = null;
    const bbMaterial = new THREE.LineBasicMaterial({ color: 0xffff00 });

    // Debug text sprite
    function createTextSprite(text) {
        const canvas = document.createElement('canvas');
        canvas.width = 512;
        canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, 512, 128);
        ctx.font = 'bold 28px Courier New';
        ctx.fillStyle = '#ffff00';
        ctx.fillText(text, 10, 45);
        ctx.font = '22px Courier New';
        ctx.fillStyle = '#00ffcc';
        ctx.fillText('', 10, 80);

        const texture = new THREE.CanvasTexture(canvas);
        const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(spriteMat);
        sprite.scale.set(3, 0.75, 1);
        return { sprite, canvas, ctx, texture };
    }

    let debugTextSprite = createTextSprite('');
    debugTextSprite.sprite.position.set(0, 5, 0);
    debugGroup.add(debugTextSprite.sprite);
    debugTextSprite.sprite.visible = false;

    // Velocity lines for particles
    const velocityLines = [];

    // Particle system
    const particles = [];
    const particleGeom = new THREE.SphereGeometry(0.05, 6, 6);
    const particleMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc });

    function emitParticles(count) {
        const posAttr = morphGeometry.attributes.position;
        for (let i = 0; i < count; i++) {
            const mesh = new THREE.Mesh(particleGeom, particleMat.clone());

            // Pick a random vertex on the surface
            const idx = Math.floor(Math.random() * posAttr.count);
            const lx = posAttr.getX(idx);
            const ly = posAttr.getY(idx);
            const lz = posAttr.getZ(idx);

            // Transform to world position
            mesh.position.set(
                lx + solidMesh.position.x,
                ly + solidMesh.position.y,
                lz + solidMesh.position.z
            );

            // Random velocity outward
            const dir = new THREE.Vector3(lx, ly, lz).normalize();
            const speed = 1.5 + Math.random() * 2;

            const particle = {
                mesh: mesh,
                velocity: new THREE.Vector3(
                    dir.x * speed + (Math.random() - 0.5) * 1,
                    dir.y * speed + Math.random() * 1,
                    dir.z * speed + (Math.random() - 0.5) * 1
                ),
                lifetime: 3.0,
                age: 0,
                bounced: false,
                alive: true
            };

            particles.push(particle);
            scene.add(mesh);
        }
    }

    // Morph state
    let morphStartTime = 0;
    let morphDuration = 1.0; // seconds
    let debugModeIndex = 0;
    let baseEmissiveIntensity = 0.3;

    // Easing function (ease-in-out)
    function easeInOut(t) {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    function startMorph(targetIndex) {
        if (targetIndex === state.currentShapeIndex && !state.isMorphing) return;
        if (state.isMorphing && targetIndex === state.targetShapeIndex) return;

        // If currently morphing, use current interpolated positions as source
        if (state.isMorphing) {
            sourcePositions = new Float32Array(currentPositions);
        } else {
            sourcePositions = new Float32Array(targetPositions[state.currentShapeIndex]);
        }

        state.targetShapeIndex = targetIndex;
        state.isMorphing = true;
        state.morphProgress = 0.0;
        state.totalMorphCount++;
        morphStartTime = performance.now() / 1000;

        // Emit particles
        emitParticles(20);

        updateButtonStates();
    }

    function updateButtonStates() {
        document.getElementById('btn-sphere').classList.toggle('active', state.targetShapeIndex === 0 || (!state.isMorphing && state.currentShapeIndex === 0));
        document.getElementById('btn-box').classList.toggle('active', state.targetShapeIndex === 1 || (!state.isMorphing && state.currentShapeIndex === 1));
        document.getElementById('btn-torus').classList.toggle('active', state.targetShapeIndex === 2 || (!state.isMorphing && state.currentShapeIndex === 2));
        document.getElementById('btn-icosa').classList.toggle('active', state.targetShapeIndex === 3 || (!state.isMorphing && state.currentShapeIndex === 3));
    }

    function cycleDebugMode() {
        debugModeIndex = (debugModeIndex + 1) % 3;
        state.debugMode = DEBUG_MODES[debugModeIndex];
        document.getElementById('btn-debug').textContent = `D: Debug (${state.debugMode})`;
    }

    // Keyboard input
    document.addEventListener('keydown', (e) => {
        if (e.key === '1') startMorph(0);
        else if (e.key === '2') startMorph(1);
        else if (e.key === '3') startMorph(2);
        else if (e.key === '4') startMorph(3);
        else if (e.key === 'd' || e.key === 'D') cycleDebugMode();
    });

    // Button clicks
    document.getElementById('btn-sphere').addEventListener('click', () => startMorph(0));
    document.getElementById('btn-box').addEventListener('click', () => startMorph(1));
    document.getElementById('btn-torus').addEventListener('click', () => startMorph(2));
    document.getElementById('btn-icosa').addEventListener('click', () => startMorph(3));
    document.getElementById('btn-debug').addEventListener('click', () => cycleDebugMode());

    // FPS tracking
    let frameCount = 0;
    let lastFpsTime = performance.now();
    let currentFps = 60;

    // Clock
    const clock = new THREE.Clock();
    let lastTime = 0;

    // Update debug visuals
    function updateDebugVisuals() {
        // Clear previous debug objects
        while (debugGroup.children.length > 0) {
            const child = debugGroup.children[0];
            debugGroup.remove(child);
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
        }

        // Remove old velocity lines
        velocityLines.forEach(line => {
            scene.remove(line);
            if (line.geometry) line.geometry.dispose();
            if (line.material) line.material.dispose();
        });
        velocityLines.length = 0;

        if (state.debugMode === 'off') return;

        // Bounding box
        morphGeometry.computeBoundingBox();
        const bb = morphGeometry.boundingBox;
        if (bb) {
            const size = new THREE.Vector3();
            bb.getSize(size);
            state.boundingBoxSize = { x: parseFloat(size.x.toFixed(2)), y: parseFloat(size.y.toFixed(2)), z: parseFloat(size.z.toFixed(2)) };

            const boxGeom = new THREE.BoxGeometry(size.x, size.y, size.z);
            const edges = new THREE.EdgesGeometry(boxGeom);
            const lineSegments = new THREE.LineSegments(edges, bbMaterial);
            const center = new THREE.Vector3();
            bb.getCenter(center);
            lineSegments.position.set(
                solidMesh.position.x + center.x,
                solidMesh.position.y + center.y,
                solidMesh.position.z + center.z
            );
            debugGroup.add(lineSegments);
        }

        if (state.debugMode === 'full') {
            // Velocity vectors on particles
            particles.forEach(p => {
                if (!p.alive) return;
                const start = p.mesh.position.clone();
                const end = start.clone().add(p.velocity.clone().multiplyScalar(0.2));
                const geom = new THREE.BufferGeometry().setFromPoints([start, end]);
                const mat = new THREE.LineBasicMaterial({ color: 0xff0000 });
                const line = new THREE.Line(geom, mat);
                scene.add(line);
                velocityLines.push(line);
            });

            // Text label
            const bbSize = state.boundingBoxSize;
            const textSprite = createTextSprite(
                `BB: ${bbSize.x.toFixed(1)} x ${bbSize.y.toFixed(1)} x ${bbSize.z.toFixed(1)}`
            );
            textSprite.sprite.position.set(solidMesh.position.x, solidMesh.position.y + 2.5, solidMesh.position.z);
            debugGroup.add(textSprite.sprite);
        }
    }

    function updateTextSprite(spriteObj, text) {
        const { canvas, ctx, texture } = spriteObj;
        ctx.clearRect(0, 0, 512, 128);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, 512, 128);
        ctx.font = 'bold 24px Courier New';
        ctx.fillStyle = '#ffff00';
        ctx.fillText(text, 10, 45);
        texture.needsUpdate = true;
    }

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();
        const time = now / 1000;
        const delta = clock.getDelta();

        // FPS
        frameCount++;
        if (now - lastFpsTime >= 500) {
            currentFps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
            frameCount = 0;
            lastFpsTime = now;
        }
        state.fps = currentFps;

        // Rotate main object
        solidMesh.rotation.y += 0.3 * delta;
        wireframeMesh.rotation.y = solidMesh.rotation.y;

        // Morph interpolation
        if (state.isMorphing) {
            const elapsed = time - morphStartTime;
            let t = Math.min(elapsed / morphDuration, 1.0);
            state.morphProgress = t;

            const easedT = easeInOut(t);

            const target = targetPositions[state.targetShapeIndex];
            const posAttr = morphGeometry.attributes.position;
            const posArray = posAttr.array;

            for (let i = 0; i < posArray.length; i++) {
                posArray[i] = sourcePositions[i] + (target[i] - sourcePositions[i]) * easedT;
                currentPositions[i] = posArray[i];
            }
            posAttr.needsUpdate = true;
            morphGeometry.computeVertexNormals();

            // Update wireframe geometry too
            const wfPosAttr = wireframeGeometry.attributes.position;
            wfPosAttr.array.set(posArray);
            wfPosAttr.needsUpdate = true;

            // Glow effect during morph
            const glowIntensity = baseEmissiveIntensity + 0.7 * Math.sin(t * Math.PI);
            solidMaterial.emissiveIntensity = glowIntensity;

            if (t >= 1.0) {
                state.isMorphing = false;
                state.currentShapeIndex = state.targetShapeIndex;
                state.morphProgress = 0.0;
                solidMaterial.emissiveIntensity = baseEmissiveIntensity;
                currentPositions = new Float32Array(target);
                updateButtonStates();
            }
        }

        // Update particles
        const gravity = -9.8;
        let aliveCount = 0;

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            if (!p.alive) continue;

            p.age += delta;
            if (p.age >= p.lifetime) {
                p.alive = false;
                scene.remove(p.mesh);
                continue;
            }

            // Euler integration
            p.velocity.y += gravity * delta;
            p.mesh.position.x += p.velocity.x * delta;
            p.mesh.position.y += p.velocity.y * delta;
            p.mesh.position.z += p.velocity.z * delta;

            // Bounce off ground
            if (p.mesh.position.y <= 0.05 && !p.bounced) {
                p.mesh.position.y = 0.05;
                p.velocity.y = -p.velocity.y * 0.4;
                p.velocity.x *= 0.8;
                p.velocity.z *= 0.8;
                p.bounced = true;
            }

            // Fade out
            const fadeT = p.age / p.lifetime;
            p.mesh.material.opacity = 1.0 - fadeT;
            p.mesh.material.transparent = true;

            aliveCount++;
        }

        // Clean up dead particles periodically
        if (particles.length > 200) {
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].alive) {
                    particles.splice(i, 1);
                }
            }
        }

        state.activeParticleCount = aliveCount;
        state.particleSystemActive = aliveCount > 0;

        // Update object position state
        state.objectPosition = {
            x: parseFloat(solidMesh.position.x.toFixed(3)),
            y: parseFloat(solidMesh.position.y.toFixed(3)),
            z: parseFloat(solidMesh.position.z.toFixed(3))
        };

        state.groundPlaneVisible = ground.visible;

        // Update debug visuals
        updateDebugVisuals();

        // Update HUD
        const shapeName = state.isMorphing
            ? `${SHAPE_NAMES[state.currentShapeIndex]} → ${SHAPE_NAMES[state.targetShapeIndex]}`
            : SHAPE_NAMES[state.currentShapeIndex];
        document.getElementById('shape-name').textContent = shapeName;
        document.getElementById('morph-progress').style.width = (state.isMorphing ? state.morphProgress * 100 : 0) + '%';
        document.getElementById('particle-count').textContent = aliveCount;
        document.getElementById('debug-mode').textContent = state.debugMode;
        document.getElementById('fps-counter').textContent = currentFps;

        // Update bounding box size
        morphGeometry.computeBoundingBox();
        if (morphGeometry.boundingBox) {
            const size = new THREE.Vector3();
            morphGeometry.boundingBox.getSize(size);
            state.boundingBoxSize = {
                x: parseFloat(size.x.toFixed(2)),
                y: parseFloat(size.y.toFixed(2)),
                z: parseFloat(size.z.toFixed(2))
            };
        }

        controls.update();
        renderer.render(scene, camera);
    }

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize button states
    updateButtonStates();

    // Start animation
    animate();
})();
</script>
</body>
</html>
