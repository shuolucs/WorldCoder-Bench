<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Three.js Morphing Geometry with Physics Debug</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, Helvetica, sans-serif;
      color: #eaf6ff;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      min-width: 240px;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      z-index: 20;
      font-size: 14px;
      line-height: 1.5;
    }

    .hud-row {
      margin: 6px 0;
    }

    .label {
      color: #8fb8ff;
      margin-right: 6px;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    #morph-progress {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00aaff, #00ffcc);
      border-radius: 999px;
      transition: width 0.05s linear;
    }

    #controls-bar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 20;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: rgba(20, 30, 60, 0.85);
      color: #dffcff;
      border: 1px solid rgba(0, 255, 204, 0.35);
      border-radius: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(30, 50, 90, 0.95);
      transform: translateY(-1px);
    }

    #debug-label {
      position: fixed;
      pointer-events: none;
      color: #ffe96b;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 4px 6px;
      border-radius: 6px;
      border: 1px solid rgba(255, 233, 107, 0.35);
      z-index: 25;
      display: none;
      white-space: nowrap;
    }

    #hint {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 20;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #b7cfff;
      border: 1px solid rgba(120,180,255,0.15);
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div class="hud-row"><span class="label">Shape:</span><span id="shape-name">Sphere</span></div>
    <div class="hud-row">
      <span class="label">Morph:</span>
      <div class="progress-wrap">
        <div id="morph-progress"></div>
      </div>
    </div>
    <div class="hud-row"><span class="label">Particles:</span><span id="particle-count">0</span></div>
    <div class="hud-row"><span class="label">Debug:</span><span id="debug-mode">off</span></div>
    <div class="hud-row"><span class="label">FPS:</span><span id="fps-counter">0</span></div>
  </div>

  <div id="controls-bar">
    <button id="btn-sphere">1 Sphere</button>
    <button id="btn-box">2 Box</button>
    <button id="btn-torus">3 Torus</button>
    <button id="btn-icosa">4 Icosahedron</button>
    <button id="btn-debug">D Debug</button>
  </div>

  <div id="debug-label"></div>

  <div id="hint">
    Keys: 1-4 morph shapes, D cycles debug
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const BG_COLOR = 0x0a0a1a;
    const WIRE_COLOR = 0x00ffcc;
    const SOLID_COLOR = 0x00aaff;
    const SHAPE_NAMES = ["Sphere", "Box", "Torus", "Icosahedron"];
    const DEBUG_MODES = ["off", "wireframe", "full"];

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setClearColor(BG_COLOR);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG_COLOR);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5, 100);
    pointLight.position.set(5, 8, 5);
    scene.add(pointLight);

    const groundGroup = new THREE.Group();
    scene.add(groundGroup);

    const groundPlane = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: 0x111122,
        metalness: 0.1,
        roughness: 0.95,
        side: THREE.DoubleSide
      })
    );
    groundPlane.rotation.x = -Math.PI * 0.5;
    groundPlane.position.y = 0;
    groundGroup.add(groundPlane);

    const grid = new THREE.GridHelper(20, 20, 0x222244, 0x222244);
    grid.position.y = 0.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.35;
    groundGroup.add(grid);

    function toNonIndexed(geometry) {
      const g = geometry.toNonIndexed();
      geometry.dispose();
      return g;
    }

    function sampleSurfacePoints(geometry, count) {
      const pos = geometry.attributes.position.array;
      const triCount = pos.length / 9;
      const areas = new Float32Array(triCount);
      let totalArea = 0;

      const a = new THREE.Vector3();
      const b = new THREE.Vector3();
      const c = new THREE.Vector3();
      const ab = new THREE.Vector3();
      const ac = new THREE.Vector3();
      const cross = new THREE.Vector3();

      for (let i = 0; i < triCount; i++) {
        const i9 = i * 9;
        a.set(pos[i9], pos[i9 + 1], pos[i9 + 2]);
        b.set(pos[i9 + 3], pos[i9 + 4], pos[i9 + 5]);
        c.set(pos[i9 + 6], pos[i9 + 7], pos[i9 + 8]);
        ab.subVectors(b, a);
        ac.subVectors(c, a);
        cross.crossVectors(ab, ac);
        const area = cross.length() * 0.5;
        totalArea += area;
        areas[i] = totalArea;
      }

      const points = [];
      for (let i = 0; i < count; i++) {
        const r = Math.random() * totalArea;
        let triIndex = 0;
        while (triIndex < triCount - 1 && areas[triIndex] < r) triIndex++;
        const i9 = triIndex * 9;

        a.set(pos[i9], pos[i9 + 1], pos[i9 + 2]);
        b.set(pos[i9 + 3], pos[i9 + 4], pos[i9 + 5]);
        c.set(pos[i9 + 6], pos[i9 + 7], pos[i9 + 8]);

        let u = Math.random();
        let v = Math.random();
        if (u + v > 1) {
          u = 1 - u;
          v = 1 - v;
        }
        const w = 1 - u - v;

        const p = new THREE.Vector3()
          .copy(a).multiplyScalar(w)
          .addScaledVector(b, u)
          .addScaledVector(c, v);

        points.push(p);
      }
      return points;
    }

    function fitGeometryToVertexCount(geometry, targetVertexCount) {
      geometry = toNonIndexed(geometry);
      const source = geometry.attributes.position.array;
      const srcVertexCount = source.length / 3;
      const arr = new Float32Array(targetVertexCount * 3);
      for (let i = 0; i < targetVertexCount; i++) {
        const srcIndex = (i % srcVertexCount) * 3;
        const dstIndex = i * 3;
        arr[dstIndex] = source[srcIndex];
        arr[dstIndex + 1] = source[srcIndex + 1];
        arr[dstIndex + 2] = source[srcIndex + 2];
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute("position", new THREE.BufferAttribute(arr, 3));
      g.computeVertexNormals();
      return g;
    }

    const rawGeometries = [
      new THREE.SphereGeometry(1.5, 28, 28),
      new THREE.BoxGeometry(2, 2, 2, 14, 14, 14),
      new THREE.TorusGeometry(1.2, 0.5, 24, 48),
      new THREE.IcosahedronGeometry(1.5, 3)
    ];

    const maxVertexCount = Math.max(
      ...rawGeometries.map(g => g.toNonIndexed().attributes.position.count)
    );

    const shapeGeometries = rawGeometries.map(g => fitGeometryToVertexCount(g, maxVertexCount));
    const shapePositions = shapeGeometries.map(g => new Float32Array(g.attributes.position.array));
    const shapeSurfaceSamples = shapeGeometries.map(g => sampleSurfacePoints(g, 100));

    const morphGeometry = new THREE.BufferGeometry();
    const currentPositions = new Float32Array(shapePositions[0]);
    morphGeometry.setAttribute("position", new THREE.BufferAttribute(currentPositions, 3));
    morphGeometry.computeVertexNormals();

    const solidMaterial = new THREE.MeshStandardMaterial({
      color: SOLID_COLOR,
      emissive: SOLID_COLOR,
      emissiveIntensity: 0.7,
      metalness: 0.2,
      roughness: 0.35,
      transparent: false
    });

    const mainMesh = new THREE.Mesh(morphGeometry, solidMaterial);
    mainMesh.position.set(0, 2.5, 0);
    scene.add(mainMesh);

    const wireframe = new THREE.LineSegments(
      new THREE.WireframeGeometry(morphGeometry),
      new THREE.LineBasicMaterial({ color: WIRE_COLOR, transparent: true, opacity: 0.9 })
    );
    mainMesh.add(wireframe);

    const bboxHelper = new THREE.Box3Helper(new THREE.Box3(), 0xffff00);
    bboxHelper.visible = false;
    scene.add(bboxHelper);

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const velocityLineMaterial = new THREE.LineBasicMaterial({ color: 0xff0000 });
    const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
    const particleMaterial = new THREE.MeshStandardMaterial({
      color: WIRE_COLOR,
      emissive: WIRE_COLOR,
      emissiveIntensity: 0.4,
      roughness: 0.5,
      metalness: 0.1
    });

    const particles = [];

    const hudShape = document.getElementById("shape-name");
    const hudProgress = document.getElementById("morph-progress");
    const hudParticles = document.getElementById("particle-count");
    const hudDebug = document.getElementById("debug-mode");
    const hudFPS = document.getElementById("fps-counter");
    const debugLabel = document.getElementById("debug-label");

    const state = {
      currentShapeIndex: 0,
      targetShapeIndex: 0,
      morphProgress: 0,
      isMorphing: false,
      activeParticleCount: 0,
      debugMode: "off",
      objectPosition: { x: 0, y: 2.5, z: 0 },
      boundingBoxSize: { x: 0, y: 0, z: 0 },
      totalMorphCount: 0,
      fps: 0,
      particleSystemActive: false,
      groundPlaneVisible: true
    };
    window.__3D_STATE__ = state;

    let morphElapsed = 0;
    const morphDuration = 1.0;
    let morphStartPositions = new Float32Array(shapePositions[0]);
    let morphTargetPositions = new Float32Array(shapePositions[0]);

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    function rebuildWireframe() {
      wireframe.geometry.dispose();
      wireframe.geometry = new THREE.WireframeGeometry(morphGeometry);
    }

    function spawnParticles(shapeIndex) {
      const samples = shapeSurfaceSamples[shapeIndex];
      for (let i = 0; i < 20; i++) {
        const local = samples[Math.floor(Math.random() * samples.length)].clone();
        const world = local.clone().applyMatrix4(mainMesh.matrixWorld);

        const mesh = new THREE.Mesh(particleGeometry, particleMaterial.clone());
        mesh.position.copy(world);
        particleGroup.add(mesh);

        const dir = local.clone().normalize();
        const tangentJitter = new THREE.Vector3(
          (Math.random() - 0.5) * 1.5,
          Math.random() * 1.2,
          (Math.random() - 0.5) * 1.5
        );
        const velocity = dir.multiplyScalar(1.5 + Math.random() * 2.0).add(tangentJitter);

        const lineGeom = new THREE.BufferGeometry();
        lineGeom.setAttribute("position", new THREE.BufferAttribute(new Float32Array(6), 3));
        const line = new THREE.Line(lineGeom, velocityLineMaterial);
        line.visible = false;
        scene.add(line);

        particles.push({
          mesh,
          velocity,
          age: 0,
          lifetime: 3,
          bounced: false,
          debugLine: line
        });
      }
    }

    function triggerMorph(targetIndex) {
      if (targetIndex === state.targetShapeIndex && !state.isMorphing && targetIndex === state.currentShapeIndex) return;

      morphStartPositions = new Float32Array(morphGeometry.attributes.position.array);
      morphTargetPositions = new Float32Array(shapePositions[targetIndex]);
      morphElapsed = 0;
      state.isMorphing = true;
      state.morphProgress = 0;
      state.targetShapeIndex = targetIndex;
      state.totalMorphCount++;

      spawnParticles(targetIndex);
    }

    function cycleDebugMode() {
      const idx = DEBUG_MODES.indexOf(state.debugMode);
      state.debugMode = DEBUG_MODES[(idx + 1) % DEBUG_MODES.length];
    }

    document.getElementById("btn-sphere").addEventListener("click", () => triggerMorph(0));
    document.getElementById("btn-box").addEventListener("click", () => triggerMorph(1));
    document.getElementById("btn-torus").addEventListener("click", () => triggerMorph(2));
    document.getElementById("btn-icosa").addEventListener("click", () => triggerMorph(3));
    document.getElementById("btn-debug").addEventListener("click", cycleDebugMode);

    window.addEventListener("keydown", (e) => {
      if (e.key === "1") triggerMorph(0);
      if (e.key === "2") triggerMorph(1);
      if (e.key === "3") triggerMorph(2);
      if (e.key === "4") triggerMorph(3);
      if (e.key.toLowerCase() === "d") cycleDebugMode();
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let fpsAccum = 0;
    let fpsFrames = 0;
    let fpsTime = 0;

    const tempBox = new THREE.Box3();
    const tempSize = new THREE.Vector3();
    const tempVec = new THREE.Vector3();

    function updateMorph(dt) {
      if (!state.isMorphing) {
        state.morphProgress = 0;
        solidMaterial.emissiveIntensity += (0.7 - solidMaterial.emissiveIntensity) * 0.08;
        return;
      }

      morphElapsed += dt;
      const linearT = Math.min(morphElapsed / morphDuration, 1);
      const easedT = easeInOut(linearT);
      state.morphProgress = linearT;

      const arr = morphGeometry.attributes.position.array;
      for (let i = 0; i < arr.length; i++) {
        arr[i] = THREE.MathUtils.lerp(morphStartPositions[i], morphTargetPositions[i], easedT);
      }

      morphGeometry.attributes.position.needsUpdate = true;
      morphGeometry.computeVertexNormals();
      rebuildWireframe();

      solidMaterial.emissiveIntensity = 0.7 + 1.2 * (1.0 - Math.abs(0.5 - linearT) * 2.0);

      if (linearT >= 1) {
        state.isMorphing = false;
        state.currentShapeIndex = state.targetShapeIndex;
        state.morphProgress = 0;
      }
    }

    function updateParticles(dt) {
      const g = -9.8;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.age += dt;

        p.velocity.y += g * dt;
        p.mesh.position.addScaledVector(p.velocity, dt);

        if (p.mesh.position.y <= 0.05) {
          if (!p.bounced) {
            p.mesh.position.y = 0.05;
            p.velocity.y = Math.abs(p.velocity.y) * 0.4;
            p.velocity.x *= 0.85;
            p.velocity.z *= 0.85;
            p.bounced = true;
          } else {
            p.mesh.position.y = 0.05;
            p.velocity.set(0, 0, 0);
          }
        }

        const lifeAlpha = 1.0 - p.age / p.lifetime;
        p.mesh.material.opacity = lifeAlpha;
        p.mesh.material.transparent = true;
        p.mesh.material.emissiveIntensity = 0.2 + lifeAlpha * 0.5;

        if (state.debugMode === "full") {
          const linePos = p.debugLine.geometry.attributes.position.array;
          linePos[0] = p.mesh.position.x;
          linePos[1] = p.mesh.position.y;
          linePos[2] = p.mesh.position.z;
          linePos[3] = p.mesh.position.x + p.velocity.x * 0.15;
          linePos[4] = p.mesh.position.y + p.velocity.y * 0.15;
          linePos[5] = p.mesh.position.z + p.velocity.z * 0.15;
          p.debugLine.geometry.attributes.position.needsUpdate = true;
          p.debugLine.visible = true;
        } else {
          p.debugLine.visible = false;
        }

        if (p.age >= p.lifetime) {
          particleGroup.remove(p.mesh);
          p.mesh.geometry.dispose();
          p.mesh.material.dispose();
          scene.remove(p.debugLine);
          p.debugLine.geometry.dispose();
          particles.splice(i, 1);
        }
      }

      state.activeParticleCount = particles.length;
      state.particleSystemActive = particles.length > 0;
    }

    function updateDebugOverlay() {
      tempBox.setFromObject(mainMesh);
      bboxHelper.box.copy(tempBox);
      tempBox.getSize(tempSize);

      state.boundingBoxSize.x = tempSize.x;
      state.boundingBoxSize.y = tempSize.y;
      state.boundingBoxSize.z = tempSize.z;

      const mode = state.debugMode;
      bboxHelper.visible = mode === "wireframe" || mode === "full";

      if (mode === "full") {
        tempVec.copy(mainMesh.position);
        tempVec.y += tempSize.y * 0.7 + 0.4;
        tempVec.project(camera);

        const x = (tempVec.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-tempVec.y * 0.5 + 0.5) * window.innerHeight;

        debugLabel.style.display = "block";
        debugLabel.style.left = `${x}px`;
        debugLabel.style.top = `${y}px`;
        debugLabel.textContent = `BBox: ${tempSize.x.toFixed(2)} × ${tempSize.y.toFixed(2)} × ${tempSize.z.toFixed(2)}`;
      } else {
        debugLabel.style.display = "none";
      }

      if (mode !== "full") {
        for (const p of particles) p.debugLine.visible = false;
      }
    }

    function updateHUD() {
      hudShape.textContent = SHAPE_NAMES[state.currentShapeIndex] + (state.isMorphing ? ` → ${SHAPE_NAMES[state.targetShapeIndex]}` : "");
      hudProgress.style.width = `${Math.round(state.morphProgress * 100)}%`;
      hudParticles.textContent = String(state.activeParticleCount);
      hudDebug.textContent = state.debugMode;
      hudFPS.textContent = state.fps.toFixed(0);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      controls.update();

      mainMesh.rotation.y += 0.3 * dt;

      updateMorph(dt);
      updateParticles(dt);
      updateDebugOverlay();

      state.objectPosition.x = mainMesh.position.x;
      state.objectPosition.y = mainMesh.position.y;
      state.objectPosition.z = mainMesh.position.z;
      state.groundPlaneVisible = groundPlane.visible;

      fpsAccum += 1 / dt;
      fpsFrames++;
      fpsTime += dt;
      if (fpsTime >= 0.5) {
        state.fps = fpsAccum / fpsFrames;
        fpsAccum = 0;
        fpsFrames = 0;
        fpsTime = 0;
      }

      updateHUD();
      renderer.render(scene, camera);
    }

    updateHUD();
    animate();
  </script>
</body>
</html>
