<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Morphing Geometry & Physics Debug</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            width: 250px;
            pointer-events: none;
        }
        .hud-row {
            margin-bottom: 10px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .hud-row:last-child {
            margin-bottom: 0;
        }
        .value {
            color: #00ffcc;
            font-weight: bold;
        }
        #progress-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 3px;
            margin-top: 5px;
            overflow: hidden;
        }
        #morph-progress {
            width: 0%;
            height: 100%;
            background: #00aaff;
            transition: width 0.05s linear;
        }
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 8px;
        }
        button {
            background: #1a1a3a;
            color: #fff;
            border: 1px solid #444;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover {
            background: #2a2a5a;
            border-color: #00aaff;
        }
        button.active {
            background: #00aaff;
            color: #000;
            border-color: #00ffcc;
        }
        #btn-debug {
            margin-left: 20px;
            background: #3a1a1a;
            border-color: #ff0000;
        }
        #btn-debug:hover {
            background: #5a2a2a;
        }
        #debug-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: #ffff00;
            padding: 5px 10px;
            border: 1px solid #ffff00;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
            display: none;
            white-space: pre;
            transform: translate(-50%, -100%);
            margin-top: -20px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="hud-panel">
        <div class="hud-row"><span>Shape:</span> <span id="shape-name" class="value">Sphere</span></div>
        <div class="hud-row" style="flex-direction: column;">
            <span>Morph Progress:</span>
            <div id="progress-container"><div id="morph-progress"></div></div>
        </div>
        <div class="hud-row"><span>Particles:</span> <span id="particle-count" class="value">0</span></div>
        <div class="hud-row"><span>Debug Mode:</span> <span id="debug-mode" class="value" style="color:#ffff00">off</span></div>
        <div class="hud-row"><span>FPS:</span> <span id="fps-counter" class="value">0</span></div>
    </div>

    <div id="controls-panel">
        <button id="btn-sphere" class="active">1: Sphere</button>
        <button id="btn-box">2: Box</button>
        <button id="btn-torus">3: Torus</button>
        <button id="btn-icosa">4: Icosahedron</button>
        <button id="btn-debug">D: Debug [Off]</button>
    </div>

    <div id="debug-label"></div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            currentShapeIndex: 0,
            targetShapeIndex: 0,
            morphProgress: 0.0,
            isMorphing: false,
            activeParticleCount: 0,
            debugMode: 'off', // 'off', 'wireframe', 'full'
            objectPosition: { x: 0, y: 2.5, z: 0 },
            boundingBoxSize: { x: 0, y: 0, z: 0 },
            totalMorphCount: 0,
            fps: 0,
            particleSystemActive: false,
            groundPlaneVisible: true
        };

        const shapeNames = ['Sphere', 'Box', 'Torus', 'Icosahedron'];
        const debugModes = ['off', 'wireframe', 'full'];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2.5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 8, 5);
        scene.add(pointLight);

        // Ground
        const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x222244);
        scene.add(gridHelper);

        // --- Geometry Preparation ---
        // Create base geometries and convert to non-indexed for easier vertex manipulation
        const baseGeometries = [
            new THREE.SphereGeometry(1.5, 32, 16).toNonIndexed(),
            new THREE.BoxGeometry(2, 2, 2, 8, 8, 8).toNonIndexed(),
            new THREE.TorusGeometry(1.2, 0.5, 16, 32).toNonIndexed(),
            new THREE.IcosahedronGeometry(1.5, 4).toNonIndexed()
        ];

        let maxVertices = 0;
        const originalVertexCounts = [];
        baseGeometries.forEach(geo => {
            const count = geo.attributes.position.count;
            originalVertexCounts.push(count);
            if (count > maxVertices) maxVertices = count;
        });

        // Pad geometries so they all have the exact same number of vertices
        const shapeArrays = [];
        baseGeometries.forEach(geo => {
            const pos = geo.attributes.position.array;
            const paddedArray = new Float32Array(maxVertices * 3);
            paddedArray.set(pos);
            
            // Pad by repeating the last vertex to avoid stray lines
            const lastX = pos[pos.length - 3];
            const lastY = pos[pos.length - 2];
            const lastZ = pos[pos.length - 1];
            
            for (let i = pos.length; i < maxVertices * 3; i += 3) {
                paddedArray[i] = lastX;
                paddedArray[i + 1] = lastY;
                paddedArray[i + 2] = lastZ;
            }
            shapeArrays.push(paddedArray);
        });

        // Create dynamic geometry for the mesh
        const dynamicGeometry = new THREE.BufferGeometry();
        dynamicGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(shapeArrays[0]), 3));
        dynamicGeometry.computeVertexNormals();

        // Materials
        const solidMaterial = new THREE.MeshStandardMaterial({
            color: 0x111111,
            emissive: 0x00aaff,
            emissiveIntensity: 0.5,
            roughness: 0.4,
            metalness: 0.8,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });

        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x00ffcc,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });

        // Main Object Group
        const mainGroup = new THREE.Group();
        mainGroup.position.y = 2.5;
        
        const solidMesh = new THREE.Mesh(dynamicGeometry, solidMaterial);
        const wireframeMesh = new THREE.Mesh(dynamicGeometry, wireframeMaterial);
        
        mainGroup.add(solidMesh);
        mainGroup.add(wireframeMesh);
        scene.add(mainGroup);

        // --- Physics Simulation (Particles) ---
        const maxParticles = 200;
        const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
        const particleMaterial = new THREE.MeshBasicMaterial({ color: 0x00ffcc });
        const particleMesh = new THREE.InstancedMesh(particleGeometry, particleMaterial, maxParticles);
        particleMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
        scene.add(particleMesh);

        const dummy = new THREE.Object3D();
        const particles = []; // { pos, vel, life, bounced }

        // Hide all initially
        for (let i = 0; i < maxParticles; i++) {
            dummy.scale.set(0, 0, 0);
            dummy.updateMatrix();
            particleMesh.setMatrixAt(i, dummy.matrix);
        }
        particleMesh.instanceMatrix.needsUpdate = true;

        function emitParticles() {
            const emitCount = 20;
            const currentPosArray = shapeArrays[window.__3D_STATE__.currentShapeIndex];
            const validVertexCount = originalVertexCounts[window.__3D_STATE__.currentShapeIndex];

            for (let i = 0; i < emitCount; i++) {
                if (particles.length >= maxParticles) break;

                // Pick random vertex from the original unpadded geometry
                const vIdx = Math.floor(Math.random() * validVertexCount) * 3;
                const localPos = new THREE.Vector3(
                    currentPosArray[vIdx],
                    currentPosArray[vIdx + 1],
                    currentPosArray[vIdx + 2]
                );

                // Transform to world space
                localPos.applyMatrix4(mainGroup.matrixWorld);

                // Normal-ish outward velocity + random
                const vel = new THREE.Vector3(
                    (Math.random() - 0.5) * 4,
                    Math.random() * 3 + 2,
                    (Math.random() - 0.5) * 4
                );

                particles.push({
                    pos: localPos,
                    vel: vel,
                    life: 3.0,
                    bounced: false
                });
            }
        }

        // --- Debug Overlay ---
        const boxHelper = new THREE.BoxHelper(mainGroup, 0xffff00);
        boxHelper.visible = false;
        scene.add(boxHelper);

        const velocityGeometry = new THREE.BufferGeometry();
        const velocityMaterial = new THREE.LineBasicMaterial({ color: 0xff0000 });
        const velocityLines = new THREE.LineSegments(velocityGeometry, velocityMaterial);
        velocityLines.visible = false;
        scene.add(velocityLines);

        const debugLabel = document.getElementById('debug-label');

        // --- Interaction & Logic ---
        function triggerMorph(targetIndex) {
            if (targetIndex === window.__3D_STATE__.currentShapeIndex && !window.__3D_STATE__.isMorphing) return;
            
            window.__3D_STATE__.targetShapeIndex = targetIndex;
            window.__3D_STATE__.isMorphing = true;
            window.__3D_STATE__.morphProgress = 0.0;
            window.__3D_STATE__.totalMorphCount++;
            
            emitParticles();
            updateButtons();
        }

        function toggleDebug() {
            let idx = debugModes.indexOf(window.__3D_STATE__.debugMode);
            idx = (idx + 1) % debugModes.length;
            window.__3D_STATE__.debugMode = debugModes[idx];
            
            const btn = document.getElementById('btn-debug');
            btn.innerText = `D: Debug [${debugModes[idx].charAt(0).toUpperCase() + debugModes[idx].slice(1)}]`;
            if(idx > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }

        function updateButtons() {
            ['sphere', 'box', 'torus', 'icosa'].forEach((id, idx) => {
                const btn = document.getElementById(`btn-${id}`);
                if (idx === window.__3D_STATE__.targetShapeIndex) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Event Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '4') {
                triggerMorph(parseInt(e.key) - 1);
            } else if (e.key.toLowerCase() === 'd') {
                toggleDebug();
            }
        });

        document.getElementById('btn-sphere').addEventListener('click', () => triggerMorph(0));
        document.getElementById('btn-box').addEventListener('click', () => triggerMorph(1));
        document.getElementById('btn-torus').addEventListener('click', () => triggerMorph(2));
        document.getElementById('btn-icosa').addEventListener('click', () => triggerMorph(3));
        document.getElementById('btn-debug').addEventListener('click', toggleDebug);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Easing function
        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1);
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            // FPS Calculation
            frames++;
            const currTime = performance.now();
            if (currTime >= prevTime + 1000) {
                state.fps = Math.round((frames * 1000) / (currTime - prevTime));
                frames = 0;
                prevTime = currTime;
                document.getElementById('fps-counter').innerText = state.fps;
            }

            // 1. Object Animation
            mainGroup.rotation.y += 0.3 * delta;

            // 2. Morphing Logic
            if (state.isMorphing) {
                state.morphProgress += delta / 1.0; // 1 second duration
                
                if (state.morphProgress >= 1.0) {
                    state.morphProgress = 1.0;
                    state.isMorphing = false;
                    state.currentShapeIndex = state.targetShapeIndex;
                }

                const t = easeInOutCubic(state.morphProgress);
                const positions = dynamicGeometry.attributes.position.array;
                const src = shapeArrays[state.currentShapeIndex];
                const dst = shapeArrays[state.targetShapeIndex];

                for (let i = 0; i < positions.length; i++) {
                    positions[i] = src[i] + (dst[i] - src[i]) * t;
                }

                dynamicGeometry.attributes.position.needsUpdate = true;
                dynamicGeometry.computeVertexNormals();
                
                // Glow effect
                solidMaterial.emissiveIntensity = 0.5 + Math.sin(state.morphProgress * Math.PI) * 1.5;
            } else {
                solidMaterial.emissiveIntensity = 0.5;
                state.morphProgress = 0.0;
            }

            // 3. Physics Simulation
            let activeCount = 0;
            const velLinePositions = [];

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.life -= delta;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                // Gravity
                p.vel.y += -9.8 * delta;
                
                // Integration
                p.pos.addScaledVector(p.vel, delta);

                // Ground Collision
                if (p.pos.y < 0.05 && !p.bounced) {
                    p.pos.y = 0.05;
                    p.vel.y *= -0.4; // Restitution
                    p.vel.x *= 0.8; // Friction
                    p.vel.z *= 0.8;
                    p.bounced = true;
                }

                // Update InstancedMesh
                dummy.position.copy(p.pos);
                dummy.scale.setScalar(p.life / 3.0); // Shrink over time
                dummy.updateMatrix();
                particleMesh.setMatrixAt(activeCount, dummy.matrix);

                // Collect velocity lines for debug
                if (state.debugMode === 'full') {
                    velLinePositions.push(
                        p.pos.x, p.pos.y, p.pos.z,
                        p.pos.x + p.vel.x * 0.15, p.pos.y + p.vel.y * 0.15, p.pos.z + p.vel.z * 0.15
                    );
                }

                activeCount++;
            }

            // Hide unused instances
            for (let i = activeCount; i < maxParticles; i++) {
                dummy.scale.set(0, 0, 0);
                dummy.updateMatrix();
                particleMesh.setMatrixAt(i, dummy.matrix);
            }
            particleMesh.instanceMatrix.needsUpdate = true;
            
            state.activeParticleCount = activeCount;
            state.particleSystemActive = activeCount > 0;

            // 4. Debug Overlay Updates
            boxHelper.visible = state.debugMode !== 'off';
            velocityLines.visible = state.debugMode === 'full';
            debugLabel.style.display = state.debugMode === 'full' ? 'block' : 'none';

            if (state.debugMode !== 'off') {
                dynamicGeometry.computeBoundingBox();
                boxHelper.update();
                
                const bbox = new THREE.Box3().setFromObject(mainGroup);
                bbox.getSize(state.boundingBoxSize);

                if (state.debugMode === 'full') {
                    // Update velocity lines
                    velocityGeometry.setAttribute('position', new THREE.Float32BufferAttribute(velLinePositions, 3));
                    
                    // Update Text Label
                    const screenPos = mainGroup.position.clone().project(camera);
                    if (screenPos.z < 1) { // Only show if in front of camera
                        const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
                        const y = (screenPos.y * -0.5 + 0.5) * window.innerHeight;
                        
                        debugLabel.style.left = `${x}px`;
                        debugLabel.style.top = `${y}px`;
                        debugLabel.innerText = `W: ${state.boundingBoxSize.x.toFixed(2)}\nH: ${state.boundingBoxSize.y.toFixed(2)}\nD: ${state.boundingBoxSize.z.toFixed(2)}`;
                    } else {
                        debugLabel.style.display = 'none';
                    }
                }
            }

            // 5. HUD Updates
            document.getElementById('shape-name').innerText = shapeNames[state.targetShapeIndex];
            document.getElementById('morph-progress').style.width = `${state.morphProgress * 100}%`;
            document.getElementById('particle-count').innerText = state.activeParticleCount;
            document.getElementById('debug-mode').innerText = state.debugMode;

            controls.update();
            renderer.render(scene, camera);
        }

        // Start
        animate();

    </script>
</body>
</html>
