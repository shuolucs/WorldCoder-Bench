<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a2e, #000000);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #controls {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 2;
            background: rgba(10, 10, 20, 0.85);
            padding: 20px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h3 {
            margin: 0 0 15px 0;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
            color: #4CAF50;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 13px;
            color: #ddd;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #4CAF50;
        }
        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 15px;
        }
        button {
            background: #2e7d32;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #4CAF50;
        }
        button:active {
            transform: scale(0.98);
        }
        #btn-regenerate, #btn-randomize {
            grid-column: span 2;
        }
        #stats {
            margin-top: 15px;
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.2);
            padding-top: 15px;
            color: #aaa;
        }
        #stats div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        #stats span {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="controls">
        <h3>Fractal Tree Generator</h3>
        
        <div class="control-group">
            <label>Depth <span id="val-depth">6</span></label>
            <input type="range" id="slider-depth" min="1" max="10" value="6" step="1">
        </div>
        <div class="control-group">
            <label>Angle (deg) <span id="val-angle">30</span></label>
            <input type="range" id="slider-angle" min="5" max="75" value="30" step="1">
        </div>
        <div class="control-group">
            <label>Length Decay <span id="val-lengthDecay">0.70</span></label>
            <input type="range" id="slider-lengthDecay" min="0.4" max="0.9" value="0.7" step="0.01">
        </div>
        <div class="control-group">
            <label>Radius Decay <span id="val-radiusDecay">0.65</span></label>
            <input type="range" id="slider-radiusDecay" min="0.3" max="0.9" value="0.65" step="0.01">
        </div>
        <div class="control-group">
            <label>Branches per Node <span id="val-branches">2</span></label>
            <input type="range" id="slider-branches" min="2" max="5" value="2" step="1">
        </div>

        <div class="btn-group">
            <button id="btn-regenerate">Regenerate (R)</button>
            <button id="btn-randomize">Randomize (Space)</button>
            <button id="btn-wind">Toggle Wind (W)</button>
            <button id="btn-leaves">Toggle Leaves (L)</button>
        </div>

        <div id="stats">
            <div>Total Branches: <span id="stat-branches">0</span></div>
            <div>Total Leaves: <span id="stat-leaves">0</span></div>
            <div>Current Depth: <span id="stat-depth">6</span></div>
        </div>
    </div>
    
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Global State Management
        window.__3D_STATE__ = {
            depth: 6,
            angle: 30,
            lengthDecay: 0.7,
            radiusDecay: 0.65,
            branches: 2,
            totalBranches: 0,
            totalLeaves: 0,
            windEnabled: false,
            leavesVisible: true,
            treeGroup: null,
            animationTime: 0,
            cameraDistance: 0,
            isGenerated: false
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 6, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 15, 10);
        scene.add(dirLight);

        // Ground Plane
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x1a3a1a,
            roughness: 0.8,
            metalness: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Reusable Geometries & Materials
        const leafGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const leafMat = new THREE.MeshStandardMaterial({ color: 0x33cc33, roughness: 0.6 });
        
        const cylinderGeometries = {};
        function getCylinderGeometry(radiusTop, radiusBottom, length) {
            const key = `${radiusTop.toFixed(3)}_${radiusBottom.toFixed(3)}_${length.toFixed(3)}`;
            if (!cylinderGeometries[key]) {
                cylinderGeometries[key] = new THREE.CylinderGeometry(radiusTop, radiusBottom, length, 8);
            }
            return cylinderGeometries[key];
        }

        const materialsCache = {};
        function getMaterial(level) {
            if (!materialsCache[level]) {
                const color = new THREE.Color().lerpColors(
                    new THREE.Color(0x8B4513), // Brown
                    new THREE.Color(0x228B22), // Green
                    (level - 1) / Math.max(1, state.depth - 1)
                );
                materialsCache[level] = new THREE.MeshStandardMaterial({ color: color, roughness: 0.9 });
            }
            return materialsCache[level];
        }

        // Recursive Tree Generation
        function buildBranch(parent, level, length, radius) {
            if (level > state.depth) {
                state.totalLeaves++;
                const leaf = new THREE.Mesh(leafGeo, leafMat);
                leaf.userData.isLeaf = true;
                leaf.visible = state.leavesVisible;
                parent.add(leaf);
                return;
            }

            const radiusTop = radius * state.radiusDecay;
            const geo = getCylinderGeometry(radiusTop, radius, length);
            const mat = getMaterial(level);
            
            const branch = new THREE.Mesh(geo, mat);
            branch.position.y = length / 2;
            parent.add(branch);
            state.totalBranches++;

            const nextStart = new THREE.Group();
            nextStart.position.y = length;
            parent.add(nextStart);

            for (let i = 0; i < state.branches; i++) {
                const childPivot = new THREE.Group();
                
                const yRot = (i * Math.PI * 2) / state.branches;
                const zRot = state.angle * Math.PI / 180;

                childPivot.rotation.set(0, yRot, zRot, 'YXZ');
                childPivot.userData.baseRotation = childPivot.rotation.clone();
                childPivot.userData.level = level + 1;

                nextStart.add(childPivot);
                buildBranch(childPivot, level + 1, length * state.lengthDecay, radiusTop);
            }
        }

        function generateTree() {
            if (state.treeGroup) {
                scene.remove(state.treeGroup);
            }

            state.totalBranches = 0;
            state.totalLeaves = 0;
            
            for (const key in materialsCache) delete materialsCache[key];

            state.treeGroup = new THREE.Group();
            scene.add(state.treeGroup);

            const trunkPivot = new THREE.Group();
            trunkPivot.userData.level = 1;
            trunkPivot.userData.baseRotation = new THREE.Euler();
            state.treeGroup.add(trunkPivot);

            buildBranch(trunkPivot, 1, 3.0, 0.2);

            state.isGenerated = true;
            updateStats();
        }

        // UI Updates
        function updateStats() {
            document.getElementById('stat-branches').innerText = state.totalBranches;
            document.getElementById('stat-leaves').innerText = state.totalLeaves;
            document.getElementById('stat-depth').innerText = state.depth;
        }

        function updateUIFromState() {
            document.getElementById('slider-depth').value = state.depth;
            document.getElementById('val-depth').innerText = state.depth;
            
            document.getElementById('slider-angle').value = state.angle;
            document.getElementById('val-angle').innerText = state.angle;
            
            document.getElementById('slider-lengthDecay').value = state.lengthDecay;
            document.getElementById('val-lengthDecay').innerText = state.lengthDecay.toFixed(2);
            
            document.getElementById('slider-radiusDecay').value = state.radiusDecay;
            document.getElementById('val-radiusDecay').innerText = state.radiusDecay.toFixed(2);
            
            document.getElementById('slider-branches').value = state.branches;
            document.getElementById('val-branches').innerText = state.branches;
        }

        // Event Listeners
        document.getElementById('slider-depth').addEventListener('input', (e) => { state.depth = parseInt(e.target.value); document.getElementById('val-depth').innerText = state.depth; });
        document.getElementById('slider-angle').addEventListener('input', (e) => { state.angle = parseInt(e.target.value); document.getElementById('val-angle').innerText = state.angle; });
        document.getElementById('slider-lengthDecay').addEventListener('input', (e) => { state.lengthDecay = parseFloat(e.target.value); document.getElementById('val-lengthDecay').innerText = state.lengthDecay.toFixed(2); });
        document.getElementById('slider-radiusDecay').addEventListener('input', (e) => { state.radiusDecay = parseFloat(e.target.value); document.getElementById('val-radiusDecay').innerText = state.radiusDecay.toFixed(2); });
        document.getElementById('slider-branches').addEventListener('input', (e) => { state.branches = parseInt(e.target.value); document.getElementById('val-branches').innerText = state.branches; });

        document.getElementById('btn-regenerate').addEventListener('click', generateTree);
        
        document.getElementById('btn-randomize').addEventListener('click', () => {
            state.depth = Math.floor(Math.random() * 10) + 1;
            state.angle = Math.floor(Math.random() * 71) + 5;
            state.lengthDecay = Math.random() * 0.5 + 0.4;
            state.radiusDecay = Math.random() * 0.6 + 0.3;
            state.branches = Math.floor(Math.random() * 4) + 2;
            updateUIFromState();
            generateTree();
        });

        document.getElementById('btn-wind').addEventListener('click', () => {
            state.windEnabled = !state.windEnabled;
            if (!state.windEnabled && state.treeGroup) {
                state.treeGroup.traverse((child) => {
                    if (child.userData.baseRotation) {
                        child.rotation.copy(child.userData.baseRotation);
                    }
                });
            }
        });

        document.getElementById('btn-leaves').addEventListener('click', () => {
            state.leavesVisible = !state.leavesVisible;
            if (state.treeGroup) {
                state.treeGroup.traverse((child) => {
                    if (child.userData.isLeaf) {
                        child.visible = state.leavesVisible;
                    }
                });
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') {
                if (e.code === 'Space') e.preventDefault();
                return;
            }
            
            const key = e.key.toLowerCase();
            if (key === 'r') {
                generateTree();
            } else if (key === '+' || key === '=') {
                state.depth = Math.min(10, state.depth + 1);
                updateUIFromState();
                generateTree();
            } else if (key === '-') {
                state.depth = Math.max(1, state.depth - 1);
                updateUIFromState();
                generateTree();
            } else if (key === 'w') {
                document.getElementById('btn-wind').click();
            } else if (key === 'l') {
                document.getElementById('btn-leaves').click();
            } else if (e.code === 'Space') {
                e.preventDefault();
                document.getElementById('btn-randomize').click();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        generateTree();

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            state.animationTime += delta;
            state.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0,0,0));

            if (state.windEnabled && state.treeGroup) {
                state.treeGroup.traverse((child) => {
                    if (child.userData.baseRotation) {
                        const level = child.userData.level;
                        const maxSway = 5 * Math.PI / 180;
                        const amplitude = (level / state.depth) * maxSway;
                        const freq = (Math.PI * 2) / 3;
                        
                        const sway = Math.sin(state.animationTime * freq - level * 0.5) * amplitude;
                        
                        child.rotation.z = child.userData.baseRotation.z + sway;
                        child.rotation.x = child.userData.baseRotation.x + sway * 0.3;
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
