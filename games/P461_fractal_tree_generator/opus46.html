<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fractal Tree Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #controls {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0e0;
    width: 280px;
    backdrop-filter: blur(10px);
    z-index: 100;
  }

  #controls h2 {
    margin-bottom: 15px;
    font-size: 16px;
    color: #88cc88;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 10px;
  }

  .slider-group {
    margin-bottom: 12px;
  }

  .slider-group label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 4px;
    color: #aaa;
  }

  .slider-group label span.val {
    color: #88cc88;
    font-weight: bold;
  }

  input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #33cc33;
    cursor: pointer;
  }

  input[type="range"]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #33cc33;
    cursor: pointer;
    border: none;
  }

  .btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .btn-row button {
    flex: 1;
    min-width: 80px;
    padding: 8px 6px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: #e0e0e0;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-row button:hover {
    background: rgba(51, 204, 51, 0.2);
    border-color: #33cc33;
  }

  .btn-row button.active {
    background: rgba(51, 204, 51, 0.3);
    border-color: #33cc33;
    color: #33cc33;
  }

  #stats {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 11px;
    color: #888;
    line-height: 1.8;
  }

  #stats .stat-val {
    color: #88cc88;
    font-weight: bold;
  }

  .keyboard-hint {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 10px;
    color: #666;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="controls">
  <h2>🌳 Fractal Tree Generator</h2>

  <div class="slider-group">
    <label>Depth <span class="val" id="val-depth">6</span></label>
    <input type="range" id="slider-depth" min="1" max="10" step="1" value="6">
  </div>

  <div class="slider-group">
    <label>Angle <span class="val" id="val-angle">30°</span></label>
    <input type="range" id="slider-angle" min="5" max="75" step="1" value="30">
  </div>

  <div class="slider-group">
    <label>Length Decay <span class="val" id="val-lengthDecay">0.70</span></label>
    <input type="range" id="slider-lengthDecay" min="0.4" max="0.9" step="0.01" value="0.70">
  </div>

  <div class="slider-group">
    <label>Radius Decay <span class="val" id="val-radiusDecay">0.65</span></label>
    <input type="range" id="slider-radiusDecay" min="0.3" max="0.9" step="0.01" value="0.65">
  </div>

  <div class="slider-group">
    <label>Branches <span class="val" id="val-branches">2</span></label>
    <input type="range" id="slider-branches" min="2" max="5" step="1" value="2">
  </div>

  <div class="btn-row">
    <button id="btn-regenerate">🔄 Regenerate</button>
    <button id="btn-randomize">🎲 Randomize</button>
  </div>
  <div class="btn-row">
    <button id="btn-wind">💨 Toggle Wind</button>
    <button id="btn-leaves">🍃 Toggle Leaves</button>
  </div>

  <div id="stats">
    <div>Branches: <span class="stat-val" id="stat-branches">0</span></div>
    <div>Leaves: <span class="stat-val" id="stat-leaves">0</span></div>
    <div>Depth: <span class="stat-val" id="stat-depth">0</span></div>
  </div>

  <div class="keyboard-hint">
    Keys: R=Regen | +/-=Depth | W=Wind | L=Leaves | Space=Random
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
window.__3D_STATE__ = {
  depth: 6,
  angle: 30,
  lengthDecay: 0.7,
  radiusDecay: 0.65,
  branches: 2,
  totalBranches: 0,
  totalLeaves: 0,
  windEnabled: false,
  leavesVisible: true,
  treeGroup: null,
  animationTime: 0,
  cameraDistance: 0,
  isGenerated: false
};

const state = window.__3D_STATE__;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.012);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 6, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 6, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -20;
dirLight.shadow.camera.right = 20;
dirLight.shadow.camera.top = 20;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Add a subtle hemisphere light for more natural look
const hemiLight = new THREE.HemisphereLight(0x4488ff, 0x002211, 0.15);
scene.add(hemiLight);

// Ground plane
const groundGeom = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a3a1a });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Tree Generation ---
const trunkColor = new THREE.Color(0x8B4513);
const leafBranchColor = new THREE.Color(0x228B22);
const leafColor = 0x33cc33;

let branchCount = 0;
let leafCount = 0;
let allWindTargets = []; // { mesh, depthLevel, originalRotation, pivotGroup }
let allLeaves = [];

function lerpColor(c1, c2, t) {
  const r = new THREE.Color();
  r.copy(c1).lerp(c2, t);
  return r;
}

function generateTree(parentGroup, length, radius, currentDepth, maxDepth, numBranches, angleDeg, lenDecay, radDecay) {
  // Create a pivot group for this branch segment
  const branchGroup = new THREE.Group();

  // Branch cylinder
  const geom = new THREE.CylinderGeometry(radius * radDecay, radius, length, 8, 1);
  // Shift geometry so bottom is at origin
  geom.translate(0, length / 2, 0);

  const t = maxDepth > 1 ? currentDepth / (maxDepth - 1) : 0;
  const color = lerpColor(trunkColor, leafBranchColor, t);
  const mat = new THREE.MeshLambertMaterial({ color: color });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  branchGroup.add(mesh);

  branchCount++;

  if (currentDepth >= maxDepth) {
    // Leaf node
    const leafGeom = new THREE.SphereGeometry(0.15, 8, 6);
    const leafMat = new THREE.MeshLambertMaterial({ color: leafColor });
    const leafMesh = new THREE.Mesh(leafGeom, leafMat);
    leafMesh.position.set(0, length, 0);
    leafMesh.castShadow = true;
    branchGroup.add(leafMesh);
    allLeaves.push(leafMesh);
    leafCount++;
  } else {
    // Recurse: create child branches
    const childLength = length * lenDecay;
    const childRadius = radius * radDecay;
    const angleRad = THREE.MathUtils.degToRad(angleDeg);

    for (let i = 0; i < numBranches; i++) {
      const childPivot = new THREE.Group();
      childPivot.position.set(0, length, 0);

      // Distribute around Y axis
      const yRotation = (2 * Math.PI * i) / numBranches;
      childPivot.rotation.y = yRotation;
      childPivot.rotation.z = angleRad;

      // Store wind data
      allWindTargets.push({
        pivot: childPivot,
        depthLevel: currentDepth + 1,
        baseRotZ: angleRad,
        baseRotY: yRotation
      });

      generateTree(childPivot, childLength, childRadius, currentDepth + 1, maxDepth, numBranches, angleDeg, lenDecay, radDecay);
      branchGroup.add(childPivot);
    }
  }

  parentGroup.add(branchGroup);
}

function buildTree() {
  // Remove old tree
  if (state.treeGroup) {
    scene.remove(state.treeGroup);
    // Dispose geometries and materials
    state.treeGroup.traverse((obj) => {
      if (obj.geometry) obj.geometry.dispose();
      if (obj.material) {
        if (Array.isArray(obj.material)) {
          obj.material.forEach(m => m.dispose());
        } else {
          obj.material.dispose();
        }
      }
    });
  }

  branchCount = 0;
  leafCount = 0;
  allWindTargets = [];
  allLeaves = [];

  const treeGroup = new THREE.Group();

  // Add trunk pivot at base
  allWindTargets.push({
    pivot: treeGroup,
    depthLevel: 0,
    baseRotZ: 0,
    baseRotY: 0
  });

  generateTree(
    treeGroup,
    3.0,       // branchLength
    0.2,       // branchRadius
    0,         // currentDepth
    state.depth,
    state.branches,
    state.angle,
    state.lengthDecay,
    state.radiusDecay
  );

  treeGroup.position.set(0, 0, 0);
  scene.add(treeGroup);

  state.treeGroup = treeGroup;
  state.totalBranches = branchCount;
  state.totalLeaves = leafCount;
  state.isGenerated = true;

  // Apply leaves visibility
  allLeaves.forEach(l => { l.visible = state.leavesVisible; });

  updateStats();
}

// --- UI ---
const sliderDepth = document.getElementById('slider-depth');
const sliderAngle = document.getElementById('slider-angle');
const sliderLengthDecay = document.getElementById('slider-lengthDecay');
const sliderRadiusDecay = document.getElementById('slider-radiusDecay');
const sliderBranches = document.getElementById('slider-branches');

const valDepth = document.getElementById('val-depth');
const valAngle = document.getElementById('val-angle');
const valLengthDecay = document.getElementById('val-lengthDecay');
const valRadiusDecay = document.getElementById('val-radiusDecay');
const valBranches = document.getElementById('val-branches');

function readSliders() {
  state.depth = parseInt(sliderDepth.value);
  state.angle = parseFloat(sliderAngle.value);
  state.lengthDecay = parseFloat(sliderLengthDecay.value);
  state.radiusDecay = parseFloat(sliderRadiusDecay.value);
  state.branches = parseInt(sliderBranches.value);
}

function updateSliderLabels() {
  valDepth.textContent = state.depth;
  valAngle.textContent = state.angle + '°';
  valLengthDecay.textContent = state.lengthDecay.toFixed(2);
  valRadiusDecay.textContent = state.radiusDecay.toFixed(2);
  valBranches.textContent = state.branches;
}

function updateStats() {
  document.getElementById('stat-branches').textContent = state.totalBranches;
  document.getElementById('stat-leaves').textContent = state.totalLeaves;
  document.getElementById('stat-depth').textContent = state.depth;
}

function syncSlidersFromState() {
  sliderDepth.value = state.depth;
  sliderAngle.value = state.angle;
  sliderLengthDecay.value = state.lengthDecay;
  sliderRadiusDecay.value = state.radiusDecay;
  sliderBranches.value = state.branches;
  updateSliderLabels();
}

// Slider events
[sliderDepth, sliderAngle, sliderLengthDecay, sliderRadiusDecay, sliderBranches].forEach(s => {
  s.addEventListener('input', () => {
    readSliders();
    updateSliderLabels();
  });
});

// Buttons
document.getElementById('btn-regenerate').addEventListener('click', () => {
  readSliders();
  buildTree();
});

document.getElementById('btn-randomize').addEventListener('click', randomizeAndRegenerate);

document.getElementById('btn-wind').addEventListener('click', toggleWind);
document.getElementById('btn-leaves').addEventListener('click', toggleLeaves);

function randomizeAndRegenerate() {
  state.depth = Math.floor(Math.random() * 10) + 1;
  state.angle = Math.floor(Math.random() * 71) + 5;
  state.lengthDecay = Math.round((Math.random() * 0.5 + 0.4) * 100) / 100;
  state.radiusDecay = Math.round((Math.random() * 0.6 + 0.3) * 100) / 100;
  state.branches = Math.floor(Math.random() * 4) + 2;
  syncSlidersFromState();
  buildTree();
}

function toggleWind() {
  state.windEnabled = !state.windEnabled;
  const btn = document.getElementById('btn-wind');
  btn.classList.toggle('active', state.windEnabled);
}

function toggleLeaves() {
  state.leavesVisible = !state.leavesVisible;
  const btn = document.getElementById('btn-leaves');
  btn.classList.toggle('active', !state.leavesVisible);
  allLeaves.forEach(l => { l.visible = state.leavesVisible; });
}

// Keyboard
document.addEventListener('keydown', (e) => {
  // Don't trigger if user is interacting with a slider
  if (e.target.tagName === 'INPUT') return;

  const key = e.key.toLowerCase();
  if (key === 'r') {
    readSliders();
    buildTree();
  } else if (key === '+' || key === '=') {
    if (state.depth < 10) {
      state.depth++;
      syncSlidersFromState();
      buildTree();
    }
  } else if (key === '-') {
    if (state.depth > 1) {
      state.depth--;
      syncSlidersFromState();
      buildTree();
    }
  } else if (key === 'w') {
    toggleWind();
  } else if (key === 'l') {
    toggleLeaves();
  } else if (key === ' ') {
    e.preventDefault();
    randomizeAndRegenerate();
  }
});

// --- Wind Animation ---
function applyWind(time) {
  if (!state.windEnabled) {
    // Reset rotations
    allWindTargets.forEach(wt => {
      if (wt.depthLevel > 0) {
        wt.pivot.rotation.z = wt.baseRotZ;
      }
    });
    return;
  }

  const period = 3.0;
  const maxSwayDeg = 5.0;

  allWindTargets.forEach(wt => {
    if (wt.depthLevel === 0) return;

    const depthFactor = wt.depthLevel / state.depth;
    const swayAngle = THREE.MathUtils.degToRad(maxSwayDeg) * depthFactor;
    const phase = wt.depthLevel * 0.7 + wt.baseRotY * 0.5;
    const sway = Math.sin((time / period) * Math.PI * 2 + phase) * swayAngle;

    wt.pivot.rotation.z = wt.baseRotZ + sway;
  });
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  state.animationTime += delta;

  controls.update();

  // Update camera distance
  state.cameraDistance = camera.position.length();

  // Wind
  applyWind(state.animationTime);

  // Ensure no NaN
  if (isNaN(state.animationTime)) state.animationTime = 0;
  if (isNaN(state.cameraDistance)) state.cameraDistance = 0;
  if (isNaN(state.totalBranches)) state.totalBranches = 0;
  if (isNaN(state.totalLeaves)) state.totalLeaves = 0;

  renderer.render(scene, camera);
}

// --- Init ---
syncSlidersFromState();
buildTree();
animate();

// Set initial button states
document.getElementById('btn-leaves').classList.toggle('active', !state.leavesVisible);
</script>
</body>
</html>
