<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fractal Tree Generator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a0a2e, #02020a);
      color: #fff;
    }

    canvas {
      display: block;
    }

    #controls {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 280px;
      padding: 12px;
      background: rgba(10, 10, 20, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    #controls h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    .control-row {
      margin-bottom: 10px;
    }

    .control-row label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control-row input[type="range"] {
      width: 100%;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    button {
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #2d5cff;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    button:hover {
      background: #4a74ff;
    }

    #stats {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
      line-height: 1.5;
      color: #d8f0d8;
    }
  </style>
</head>
<body>
  <div id="controls">
    <h2>Fractal Tree Controls</h2>

    <div class="control-row">
      <label for="slider-depth">
        <span>Depth</span>
        <span id="value-depth">6</span>
      </label>
      <input id="slider-depth" type="range" min="1" max="10" step="1" value="6" />
    </div>

    <div class="control-row">
      <label for="slider-angle">
        <span>Angle</span>
        <span id="value-angle">30</span>
      </label>
      <input id="slider-angle" type="range" min="5" max="75" step="1" value="30" />
    </div>

    <div class="control-row">
      <label for="slider-lengthDecay">
        <span>Length Decay</span>
        <span id="value-lengthDecay">0.70</span>
      </label>
      <input id="slider-lengthDecay" type="range" min="0.4" max="0.9" step="0.01" value="0.7" />
    </div>

    <div class="control-row">
      <label for="slider-radiusDecay">
        <span>Radius Decay</span>
        <span id="value-radiusDecay">0.65</span>
      </label>
      <input id="slider-radiusDecay" type="range" min="0.3" max="0.9" step="0.01" value="0.65" />
    </div>

    <div class="control-row">
      <label for="slider-branches">
        <span>Branches / Node</span>
        <span id="value-branches">2</span>
      </label>
      <input id="slider-branches" type="range" min="2" max="5" step="1" value="2" />
    </div>

    <div class="button-row">
      <button id="btn-regenerate">Regenerate</button>
      <button id="btn-randomize">Randomize</button>
      <button id="btn-wind">Toggle Wind</button>
      <button id="btn-leaves">Toggle Leaves</button>
    </div>

    <div id="stats">
      Total Branches: 0<br />
      Total Leaves: 0<br />
      Current Depth: 6
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = null;

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 6, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 6, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(30, 30),
      new THREE.MeshPhongMaterial({ color: 0x1a3a1a, side: THREE.DoubleSide })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const treeGroup = new THREE.Group();
    scene.add(treeGroup);

    const branchMaterialCache = [];
    const leafMaterial = new THREE.MeshPhongMaterial({ color: 0x33cc33 });

    const branchWindData = [];
    const leafMeshes = [];

    const sliderDepth = document.getElementById("slider-depth");
    const sliderAngle = document.getElementById("slider-angle");
    const sliderLengthDecay = document.getElementById("slider-lengthDecay");
    const sliderRadiusDecay = document.getElementById("slider-radiusDecay");
    const sliderBranches = document.getElementById("slider-branches");

    const valueDepth = document.getElementById("value-depth");
    const valueAngle = document.getElementById("value-angle");
    const valueLengthDecay = document.getElementById("value-lengthDecay");
    const valueRadiusDecay = document.getElementById("value-radiusDecay");
    const valueBranches = document.getElementById("value-branches");

    const btnRegenerate = document.getElementById("btn-regenerate");
    const btnRandomize = document.getElementById("btn-randomize");
    const btnWind = document.getElementById("btn-wind");
    const btnLeaves = document.getElementById("btn-leaves");
    const statsDiv = document.getElementById("stats");

    const defaultParams = {
      depth: 6,
      branchLength: 3.0,
      branchRadius: 0.2,
      angle: 30,
      lengthDecay: 0.7,
      radiusDecay: 0.65,
      branches: 2
    };

    let params = { ...defaultParams };
    let windEnabled = false;
    let leavesVisible = true;
    let totalBranches = 0;
    let totalLeaves = 0;
    let animationTime = 0;
    let isGenerated = false;

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function lerpColor(hex1, hex2, t) {
      const c1 = new THREE.Color(hex1);
      const c2 = new THREE.Color(hex2);
      return c1.lerp(c2, THREE.MathUtils.clamp(t, 0, 1));
    }

    function getBranchMaterial(level, maxDepth) {
      const t = maxDepth <= 1 ? 1 : level / (maxDepth - 1);
      const color = lerpColor("#8B4513", "#228B22", t);
      const key = `${color.getHexString()}`;
      let found = branchMaterialCache.find(m => m.userData.key === key);
      if (!found) {
        found = new THREE.MeshPhongMaterial({ color });
        found.userData.key = key;
        branchMaterialCache.push(found);
      }
      return found;
    }

    function updateSliderLabels() {
      valueDepth.textContent = sliderDepth.value;
      valueAngle.textContent = sliderAngle.value;
      valueLengthDecay.textContent = Number(sliderLengthDecay.value).toFixed(2);
      valueRadiusDecay.textContent = Number(sliderRadiusDecay.value).toFixed(2);
      valueBranches.textContent = sliderBranches.value;
    }

    function updateParamsFromUI() {
      params.depth = safeNumber(parseInt(sliderDepth.value, 10), 6);
      params.angle = safeNumber(parseFloat(sliderAngle.value), 30);
      params.lengthDecay = safeNumber(parseFloat(sliderLengthDecay.value), 0.7);
      params.radiusDecay = safeNumber(parseFloat(sliderRadiusDecay.value), 0.65);
      params.branches = safeNumber(parseInt(sliderBranches.value, 10), 2);

      params.depth = Math.min(10, Math.max(1, params.depth));
      params.angle = Math.min(75, Math.max(5, params.angle));
      params.lengthDecay = Math.min(0.9, Math.max(0.4, params.lengthDecay));
      params.radiusDecay = Math.min(0.9, Math.max(0.3, params.radiusDecay));
      params.branches = Math.min(5, Math.max(2, params.branches));
      params.branchLength = 3.0;
      params.branchRadius = 0.2;
    }

    function clearTree() {
      while (treeGroup.children.length > 0) {
        const child = treeGroup.children.pop();
        treeGroup.remove(child);
        child.traverse(obj => {
          if (obj.geometry) obj.geometry.dispose();
        });
      }
      branchWindData.length = 0;
      leafMeshes.length = 0;
      totalBranches = 0;
      totalLeaves = 0;
    }

    function createBranchSegment(length, radius, level, maxDepth) {
      const geometry = new THREE.CylinderGeometry(radius * 0.7, radius, length, 8);
      const material = getBranchMaterial(level, maxDepth);
      const mesh = new THREE.Mesh(geometry, material);
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      return mesh;
    }

    function createLeaf(position, parentGroup) {
      const leaf = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 10, 10),
        leafMaterial
      );
      leaf.position.copy(position);
      leaf.visible = leavesVisible;
      parentGroup.add(leaf);
      leafMeshes.push(leaf);
      totalLeaves++;
    }

    function generateBranch(parentGroup, startPos, direction, length, radius, remainingDepth, level, maxDepth) {
      if (remainingDepth <= 0) {
        createLeaf(startPos, parentGroup);
        return;
      }

      const segmentGroup = new THREE.Group();
      segmentGroup.position.copy(startPos);
      parentGroup.add(segmentGroup);

      const branchMesh = createBranchSegment(length, radius, level, maxDepth);
      branchMesh.position.y = length / 2;
      segmentGroup.add(branchMesh);

      const from = new THREE.Vector3(0, 1, 0);
      const to = direction.clone().normalize();
      const q = new THREE.Quaternion().setFromUnitVectors(from, to);
      segmentGroup.quaternion.copy(q);

      totalBranches++;

      const windFactor = maxDepth <= 1 ? 1 : (level / Math.max(1, maxDepth - 1));
      branchWindData.push({
        object: segmentGroup,
        baseRotationZ: segmentGroup.rotation.z,
        baseRotationX: segmentGroup.rotation.x,
        factor: windFactor,
        phase: level * 0.7 + startPos.x * 0.3 + startPos.z * 0.3
      });

      const endPos = startPos.clone().add(direction.clone().normalize().multiplyScalar(length));
      const angleRad = THREE.MathUtils.degToRad(params.angle);
      const childLength = length * params.lengthDecay;
      const childRadius = Math.max(0.01, radius * params.radiusDecay);

      for (let i = 0; i < params.branches; i++) {
        const azimuth = (i / params.branches) * Math.PI * 2;
        const localDir = new THREE.Vector3(
          Math.sin(angleRad) * Math.cos(azimuth),
          Math.cos(angleRad),
          Math.sin(angleRad) * Math.sin(azimuth)
        );

        const childDir = localDir.applyQuaternion(q).normalize();

        generateBranch(
          parentGroup,
          endPos,
          childDir,
          childLength,
          childRadius,
          remainingDepth - 1,
          level + 1,
          maxDepth
        );
      }
    }

    function regenerateTree() {
      updateParamsFromUI();
      clearTree();

      generateBranch(
        treeGroup,
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, 1, 0),
        params.branchLength,
        params.branchRadius,
        params.depth,
        0,
        params.depth
      );

      isGenerated = true;
      updateStats();
      updateState();
    }

    function updateStats() {
      statsDiv.innerHTML = `
        Total Branches: ${safeNumber(totalBranches, 0)}<br />
        Total Leaves: ${safeNumber(totalLeaves, 0)}<br />
        Current Depth: ${safeNumber(params.depth, 0)}
      `;
    }

    function randomInRange(min, max, step = 1) {
      const count = Math.round((max - min) / step);
      const idx = Math.floor(Math.random() * (count + 1));
      return min + idx * step;
    }

    function randomizeControls() {
      sliderDepth.value = String(randomInRange(1, 10, 1));
      sliderAngle.value = String(randomInRange(5, 75, 1));
      sliderLengthDecay.value = randomInRange(0.4, 0.9, 0.01).toFixed(2);
      sliderRadiusDecay.value = randomInRange(0.3, 0.9, 0.01).toFixed(2);
      sliderBranches.value = String(randomInRange(2, 5, 1));
      updateSliderLabels();
    }

    function toggleWind() {
      windEnabled = !windEnabled;
      updateState();
    }

    function toggleLeaves() {
      leavesVisible = !leavesVisible;
      for (const leaf of leafMeshes) {
        leaf.visible = leavesVisible;
      }
      updateState();
    }

    function updateState() {
      window.__3D_STATE__ = {
        depth: safeNumber(params.depth, 0),
        angle: safeNumber(params.angle, 0),
        lengthDecay: safeNumber(params.lengthDecay, 0),
        radiusDecay: safeNumber(params.radiusDecay, 0),
        branches: safeNumber(params.branches, 0),
        totalBranches: safeNumber(totalBranches, 0),
        totalLeaves: safeNumber(totalLeaves, 0),
        windEnabled: !!windEnabled,
        leavesVisible: !!leavesVisible,
        treeGroup: treeGroup,
        animationTime: safeNumber(animationTime, 0),
        cameraDistance: safeNumber(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)), 0),
        isGenerated: !!isGenerated
      };
    }

    sliderDepth.addEventListener("input", updateSliderLabels);
    sliderAngle.addEventListener("input", updateSliderLabels);
    sliderLengthDecay.addEventListener("input", updateSliderLabels);
    sliderRadiusDecay.addEventListener("input", updateSliderLabels);
    sliderBranches.addEventListener("input", updateSliderLabels);

    btnRegenerate.addEventListener("click", regenerateTree);

    btnRandomize.addEventListener("click", () => {
      randomizeControls();
      regenerateTree();
    });

    btnWind.addEventListener("click", toggleWind);
    btnLeaves.addEventListener("click", toggleLeaves);

    window.addEventListener("keydown", (e) => {
      const key = e.key;

      if (key === "r" || key === "R") {
        regenerateTree();
      } else if (key === "+" || key === "=") {
        sliderDepth.value = String(Math.min(10, parseInt(sliderDepth.value, 10) + 1));
        updateSliderLabels();
        regenerateTree();
      } else if (key === "-") {
        sliderDepth.value = String(Math.max(1, parseInt(sliderDepth.value, 10) - 1));
        updateSliderLabels();
        regenerateTree();
      } else if (key === "w" || key === "W") {
        toggleWind();
      } else if (key === "l" || key === "L") {
        toggleLeaves();
      } else if (key === " ") {
        e.preventDefault();
        randomizeControls();
        regenerateTree();
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateState();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = safeNumber(clock.getDelta(), 0.016);
      animationTime = safeNumber(animationTime + delta, 0);

      controls.update();

      if (windEnabled) {
        const period = 3.0;
        const omega = (Math.PI * 2) / period;
        const maxTopSway = THREE.MathUtils.degToRad(5);

        for (const item of branchWindData) {
          const sway = Math.sin(animationTime * omega + item.phase) * maxTopSway * item.factor;
          item.object.rotation.z = item.baseRotationZ + sway;
          item.object.rotation.x = item.baseRotationX + sway * 0.35;
        }
      } else {
        for (const item of branchWindData) {
          item.object.rotation.z = item.baseRotationZ;
          item.object.rotation.x = item.baseRotationX;
        }
      }

      updateState();
      renderer.render(scene, camera);
    }

    updateSliderLabels();
    regenerateTree();
    animate();
  </script>
</body>
</html>
