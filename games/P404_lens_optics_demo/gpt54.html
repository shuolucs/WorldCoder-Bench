<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thin Lens Optics Demo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.45);
      padding: 12px;
      border-radius: 8px;
      min-width: 240px;
    }

    #ui label, #ui button {
      display: block;
      margin-bottom: 8px;
    }

    #focalLengthSlider {
      width: 100%;
    }

    #infoPanel {
      margin-top: 10px;
      line-height: 1.5;
      font-size: 14px;
      background: rgba(255,255,255,0.06);
      padding: 8px;
      border-radius: 6px;
    }

    button {
      background: #2d6cdf;
      border: none;
      color: white;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #3e7cf0;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="ui">
    <label for="focalLengthSlider">
      Focal Length:
      <span id="focalValue">3</span>
    </label>
    <input id="focalLengthSlider" type="range" min="1" max="6" step="0.5" value="3" />
    <button id="toggleLensType">Toggle to Diverging Lens</button>
    <div id="infoPanel"></div>
  </div>

  <div id="canvas-container"></div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.159.0/build/three.module.js';

    const container = document.getElementById('canvas-container');
    const slider = document.getElementById('focalLengthSlider');
    const focalValue = document.getElementById('focalValue');
    const toggleBtn = document.getElementById('toggleLensType');
    const infoPanel = document.getElementById('infoPanel');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const aspect = window.innerWidth / window.innerHeight;
    const frustumSize = 20;
    const camera = new THREE.OrthographicCamera(
      -frustumSize * aspect / 2,
      frustumSize * aspect / 2,
      frustumSize / 2,
      -frustumSize / 2,
      0.1,
      100
    );

    // Looking down Y-axis, top-down 2D style
    camera.position.set(0, 20, 0);
    camera.up.set(0, 0, -1);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    // Grid helper on XZ plane
    const grid = new THREE.GridHelper(40, 40, 0x444466, 0x333355);
    scene.add(grid);

    // Optical axis dashed line
    const axisPoints = [
      new THREE.Vector3(-15, 0.01, 0),
      new THREE.Vector3(15, 0.01, 0)
    ];
    const axisGeom = new THREE.BufferGeometry().setFromPoints(axisPoints);
    const axisMat = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 0.5,
      gapSize: 0.3
    });
    const opticalAxis = new THREE.Line(axisGeom, axisMat);
    opticalAxis.computeLineDistances();
    scene.add(opticalAxis);

    function createTextSprite(text, color = '#ffffff') {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = color;
      ctx.font = '28px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(3, 0.75, 1);
      return sprite;
    }

    // Lens group
    const lensGroup = new THREE.Group();
    scene.add(lensGroup);

    let lensType = 'converging';
    let focalLength = 3;
    let objectX = -6;
    const objectHeight = 2;
    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let dragging = false;

    function makeArrow(color, height = 2, direction = 1, opacity = 1) {
      const group = new THREE.Group();

      const shaftMat = new THREE.MeshBasicMaterial({
        color,
        transparent: opacity < 1,
        opacity
      });
      const headMat = new THREE.MeshBasicMaterial({
        color,
        transparent: opacity < 1,
        opacity
      });

      const shaftHeight = Math.max(0.1, Math.abs(height) * 0.75);
      const headHeight = Math.max(0.15, Math.abs(height) * 0.25);

      const shaft = new THREE.Mesh(
        new THREE.BoxGeometry(0.15, 0.02, shaftHeight),
        shaftMat
      );

      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.25, headHeight, 16),
        headMat
      );

      // In this top-down setup:
      // X = horizontal axis, Z = vertical display axis
      // Arrow "up" means +Z
      if (direction >= 0) {
        shaft.position.set(0, 0.02, shaftHeight / 2);
        cone.rotation.x = Math.PI / 2;
        cone.position.set(0, 0.02, shaftHeight + headHeight / 2);
      } else {
        shaft.position.set(0, 0.02, -shaftHeight / 2);
        cone.rotation.x = -Math.PI / 2;
        cone.position.set(0, 0.02, -(shaftHeight + headHeight / 2));
      }

      group.add(shaft, cone);
      return group;
    }

    // Object arrow
    const objectGroup = new THREE.Group();
    scene.add(objectGroup);

    // Invisible larger hit target for dragging
    const objectHandle = new THREE.Mesh(
      new THREE.BoxGeometry(0.9, 0.2, 2.8),
      new THREE.MeshBasicMaterial({ transparent: true, opacity: 0 })
    );
    objectGroup.add(objectHandle);

    // Image arrow
    const imageGroup = new THREE.Group();
    scene.add(imageGroup);

    // Focal points
    const focalMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
    const focalLeft = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), focalMat);
    const focalRight = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), focalMat);
    scene.add(focalLeft, focalRight);

    const lensLabel = createTextSprite('Lens', '#8ec5ff');
    scene.add(lensLabel);

    const fLeftLabel = createTextSprite('F', '#ffff88');
    const fRightLabel = createTextSprite('F', '#ffff88');
    scene.add(fLeftLabel, fRightLabel);

    let rayGroup = new THREE.Group();
    scene.add(rayGroup);

    function clearGroup(group) {
      while (group.children.length) {
        const child = group.children[0];
        group.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
          else child.material.dispose();
        }
      }
    }

    function buildLens() {
      clearGroup(lensGroup);

      const color = lensType === 'converging' ? 0x4da6ff : 0xff9f43;
      const mat = new THREE.LineBasicMaterial({ color });

      if (lensType === 'converging') {
        const points = [
          new THREE.Vector3(0, 0.02, -2),
          new THREE.Vector3(0, 0.02, 2)
        ];
        const geom = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geom, mat);
        lensGroup.add(line);

        const topArrow1 = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0.02, 2),
            new THREE.Vector3(-0.25, 0.02, 1.65)
          ]),
          mat
        );
        const topArrow2 = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0.02, 2),
            new THREE.Vector3(0.25, 0.02, 1.65)
          ]),
          mat
        );
        const botArrow1 = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0.02, -2),
            new THREE.Vector3(-0.25, 0.02, -1.65)
          ]),
          mat
        );
        const botArrow2 = new THREE.Line(
          new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(0, 0.02, -2),
            new THREE.Vector3(0.25, 0.02, -1.65)
          ]),
          mat
        );
        lensGroup.add(topArrow1, topArrow2, botArrow1, botArrow2);
      } else {
        const leftCurvePts = [];
        const rightCurvePts = [];
        for (let i = 0; i <= 20; i++) {
          const t = i / 20;
          const z = -2 + 4 * t;
          const xOff = 0.25 * Math.cos((z / 2) * Math.PI / 2);
          leftCurvePts.push(new THREE.Vector3(-xOff, 0.02, z));
          rightCurvePts.push(new THREE.Vector3(xOff, 0.02, z));
        }
        lensGroup.add(
          new THREE.Line(new THREE.BufferGeometry().setFromPoints(leftCurvePts), mat),
          new THREE.Line(new THREE.BufferGeometry().setFromPoints(rightCurvePts), mat)
        );
      }

      lensLabel.position.set(0, 0.02, 2.8);
    }

    function updateFocalPoints() {
      const fAbs = Math.abs(focalLength);
      focalLeft.position.set(-fAbs, 0.05, 0);
      focalRight.position.set(fAbs, 0.05, 0);
      fLeftLabel.position.set(-fAbs, 0.05, -0.9);
      fRightLabel.position.set(fAbs, 0.05, -0.9);
    }

    function computeOptics() {
      const doDist = Math.abs(objectX);
      const f = focalLength;

      let di;
      if (Math.abs((1 / f) - (1 / doDist)) < 1e-6) {
        di = 1e6;
      } else {
        di = 1 / ((1 / f) - (1 / doDist));
      }

      const m = -di / doDist;
      const imageX = di;

      const imageType = di > 0 ? 'real' : 'virtual';

      return { doDist, di, m, imageX, imageType };
    }

    function rebuildObject() {
      clearGroup(objectGroup);
      const arrow = makeArrow(0xff4444, objectHeight, 1, 1);
      objectGroup.add(arrow);
      objectGroup.add(objectHandle);
      objectGroup.position.set(objectX, 0, 0);
    }

    function rebuildImage(di, m, imageX) {
      clearGroup(imageGroup);

      const imgHeight = Math.abs(m) * objectHeight;
      const direction = m >= 0 ? 1 : -1;
      const opacity = di < 0 ? 0.45 : 1.0;
      const arrow = makeArrow(0x44ff88, imgHeight, direction, opacity);

      imageGroup.add(arrow);
      imageGroup.position.set(imageX, 0, 0);
    }

    function addLine(points, color = 0xffff00, opacity = 1) {
      const geom = new THREE.BufferGeometry().setFromPoints(points);
      const mat = new THREE.LineBasicMaterial({
        color,
        transparent: opacity < 1,
        opacity
      });
      const line = new THREE.Line(geom, mat);
      rayGroup.add(line);
    }

    function drawExtendedLine(p1, p2, xMin, xMax, color = 0xffff00, opacity = 0.3) {
      const dir = new THREE.Vector3().subVectors(p2, p1);
      if (Math.abs(dir.x) < 1e-6) return;

      const t1 = (xMin - p1.x) / dir.x;
      const t2 = (xMax - p1.x) / dir.x;
      const a = new THREE.Vector3().copy(p1).addScaledVector(dir, t1);
      const b = new THREE.Vector3().copy(p1).addScaledVector(dir, t2);
      addLine([a, b], color, opacity);
    }

    function rebuildRays(di, imageX) {
      scene.remove(rayGroup);
      rayGroup = new THREE.Group();
      scene.add(rayGroup);

      const objTip = new THREE.Vector3(objectX, 0.03, objectHeight);
      const lensCenter = new THREE.Vector3(0, 0.03, 0);
      const lensPlanePoint = new THREE.Vector3(0, 0.03, objectHeight);

      const imgTipZ = computeOptics().m * objectHeight;
      const imageTip = new THREE.Vector3(imageX, 0.03, imgTipZ);

      const fAbs = Math.abs(focalLength);
      const farFocus = lensType === 'converging'
        ? new THREE.Vector3(fAbs, 0.03, 0)
        : new THREE.Vector3(-fAbs, 0.03, 0);

      const nearFocus = lensType === 'converging'
        ? new THREE.Vector3(-fAbs, 0.03, 0)
        : new THREE.Vector3(fAbs, 0.03, 0);

      // Ray 1: parallel to axis, refracts through far focal point (or appears from focal point for diverging)
      addLine([objTip, lensPlanePoint], 0xffff00, 1);

      if (di > 0) {
        addLine([lensPlanePoint, imageTip], 0xffff00, 1);
      } else {
        const outgoingDir1 = new THREE.Vector3(1, 0, 0)
          .sub(new THREE.Vector3(0, 0, 0))
          .normalize();

        const refractTarget = lensType === 'converging'
          ? new THREE.Vector3(fAbs, 0.03, 0)
          : new THREE.Vector3(1, 0.03, lensPlanePoint.z + (lensPlanePoint.z / fAbs));

        if (lensType === 'diverging') {
          const dir = new THREE.Vector3().subVectors(lensPlanePoint, new THREE.Vector3(-fAbs, 0.03, 0)).normalize();
          addLine([lensPlanePoint, lensPlanePoint.clone().addScaledVector(dir, 12)], 0xffff00, 1);
          drawExtendedLine(lensPlanePoint, new THREE.Vector3(-fAbs, 0.03, 0), -12, 0, 0xffff00, 0.3);
        } else {
          const dir = new THREE.Vector3().subVectors(refractTarget, lensPlanePoint).normalize();
          addLine([lensPlanePoint, lensPlanePoint.clone().addScaledVector(dir, 12)], 0xffff00, 1);
          drawExtendedLine(lensPlanePoint, imageTip, -12, 12, 0xffff00, 0.3);
        }
      }

      // Ray 2: through center, straight
      if (di > 0) {
        addLine([objTip, lensCenter, imageTip], 0xffff00, 1);
      } else {
        const dir = new THREE.Vector3().subVectors(lensCenter, objTip).normalize();
        addLine([objTip, lensCenter, lensCenter.clone().addScaledVector(dir, 12)], 0xffff00, 1);
        drawExtendedLine(objTip, lensCenter, -12, 12, 0xffff00, 0.3);
      }

      // Ray 3: through near focal point then parallel
      if (lensType === 'converging') {
        addLine([objTip, nearFocus, lensPlanePoint], 0xffff00, 1);
        if (di > 0) {
          addLine([lensPlanePoint, new THREE.Vector3(imageTip.x, 0.03, lensPlanePoint.z)], 0xffff00, 1);
        } else {
          addLine([lensPlanePoint, new THREE.Vector3(12, 0.03, lensPlanePoint.z)], 0xffff00, 1);
          drawExtendedLine(new THREE.Vector3(-fAbs, 0.03, 0), lensPlanePoint, -12, 0, 0xffff00, 0.3);
        }
      } else {
        addLine([objTip, new THREE.Vector3(fAbs, 0.03, 0), lensPlanePoint], 0xffff00, 1);
        addLine([lensPlanePoint, new THREE.Vector3(12, 0.03, lensPlanePoint.z)], 0xffff00, 1);
        drawExtendedLine(new THREE.Vector3(fAbs, 0.03, 0), lensPlanePoint, -12, 0, 0xffff00, 0.3);
      }
    }

    function updateInfo(state) {
      infoPanel.innerHTML = `
        <strong>Object Distance (do):</strong> ${state.objectDistance.toFixed(2)}<br>
        <strong>Image Distance (di):</strong> ${Math.abs(state.imageDistance) > 99999 ? '∞' : state.imageDistance.toFixed(2)}<br>
        <strong>Magnification (m):</strong> ${Math.abs(state.magnification) > 99999 ? '∞' : state.magnification.toFixed(2)}<br>
        <strong>Image Type:</strong> ${
          state.imageType === 'real' ? 'Real / Inverted' : 'Virtual / Upright'
        }
      `;
    }

    function updateScene() {
      buildLens();
      updateFocalPoints();
      rebuildObject();

      const { doDist, di, m, imageX, imageType } = computeOptics();
      rebuildImage(di, m, imageX);
      rebuildRays(di, imageX);

      focalValue.textContent = Math.abs(focalLength).toString();

      window.__3D_STATE__ = {
        objectDistance: doDist,
        imageDistance: di,
        magnification: m,
        focalLength,
        lensType,
        imageType,
        objectX,
        imageX
      };

      updateInfo(window.__3D_STATE__);
    }

    function setMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function getIntersectOnPlane(event) {
      setMouse(event);
      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      raycaster.ray.intersectPlane(dragPlane, point);
      return point;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      setMouse(event);
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(objectHandle, true);
      if (intersects.length > 0) {
        dragging = true;
      }
    });

    window.addEventListener('pointermove', (event) => {
      if (!dragging) return;
      const point = getIntersectOnPlane(event);
      objectX = THREE.MathUtils.clamp(point.x, -12, -1);
      updateScene();
    });

    window.addEventListener('pointerup', () => {
      dragging = false;
    });

    slider.addEventListener('input', () => {
      const mag = parseFloat(slider.value);
      focalLength = lensType === 'converging' ? mag : -mag;
      updateScene();
    });

    toggleBtn.addEventListener('click', () => {
      const mag = Math.abs(focalLength);
      if (lensType === 'converging') {
        lensType = 'diverging';
        focalLength = -mag;
        toggleBtn.textContent = 'Toggle to Converging Lens';
      } else {
        lensType = 'converging';
        focalLength = mag;
        toggleBtn.textContent = 'Toggle to Diverging Lens';
      }
      updateScene();
    });

    window.addEventListener('resize', () => {
      const aspect = window.innerWidth / window.innerHeight;
      camera.left = -frustumSize * aspect / 2;
      camera.right = frustumSize * aspect / 2;
      camera.top = frustumSize / 2;
      camera.bottom = -frustumSize / 2;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateScene();

    function animate() {
      requestAnimationFrame(animate);
      window.__3D_STATE__ = window.__3D_STATE__ || {};
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
