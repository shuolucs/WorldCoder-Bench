<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thin Lens Optics Demonstration</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 20, 50, 0.9);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  #controls label {
    color: #aab;
    font-size: 13px;
    white-space: nowrap;
  }

  #controls input[type="range"] {
    width: 140px;
    accent-color: #6688ff;
    cursor: pointer;
  }

  #focalValue {
    color: #ffdd44;
    font-weight: bold;
    font-size: 13px;
    min-width: 30px;
  }

  #toggleLensType {
    background: linear-gradient(135deg, #4466cc, #6688ff);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s;
    white-space: nowrap;
  }

  #toggleLensType:hover {
    background: linear-gradient(135deg, #5577dd, #7799ff);
    transform: scale(1.05);
  }

  #infoPanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(20, 20, 50, 0.92);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 12px;
    padding: 18px 22px;
    color: #dde;
    font-size: 14px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    z-index: 10;
    min-width: 240px;
  }

  #infoPanel h3 {
    color: #88aaff;
    margin-bottom: 8px;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.2);
    padding-bottom: 6px;
  }

  #infoPanel .row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  #infoPanel .label { color: #99a; }
  #infoPanel .value { color: #ffdd44; font-weight: 600; text-align: right; }
  #infoPanel .image-type { font-size: 15px; margin-top: 6px; padding-top: 6px; border-top: 1px solid rgba(100,100,255,0.2); }
  #infoPanel .real { color: #44ff88; }
  #infoPanel .virtual { color: #ff8844; }

  #title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #88aaff;
    font-size: 20px;
    font-weight: 700;
    z-index: 10;
  }

  #subtitle {
    color: #667;
    font-size: 12px;
    margin-top: 4px;
    font-weight: 400;
  }

  #equation {
    position: absolute;
    top: 70px;
    left: 20px;
    color: #aab;
    font-size: 14px;
    z-index: 10;
    font-style: italic;
  }

  #dragHint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.4);
    font-size: 14px;
    z-index: 10;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>

<div id="title">Thin Lens Optics<div id="subtitle">Interactive Ray Diagram</div></div>
<div id="equation">1/f = 1/d<sub>o</sub> + 1/d<sub>i</sub></div>

<div id="infoPanel">
  <h3>📊 Lens Parameters</h3>
  <div class="row"><span class="label">Object Distance (d₀):</span><span class="value" id="infoDo">6.00</span></div>
  <div class="row"><span class="label">Image Distance (d᷊):</span><span class="value" id="infoDi">6.00</span></div>
  <div class="row"><span class="label">Magnification (m):</span><span class="value" id="infoM">-1.00</span></div>
  <div class="row"><span class="label">Focal Length (f):</span><span class="value" id="infoF">3.00</span></div>
  <div class="row image-type"><span class="label">Image Type:</span><span class="value" id="infoType">Real / Inverted</span></div>
</div>

<div id="controls">
  <label>Focal Length:</label>
  <input type="range" id="focalLengthSlider" min="1" max="6" step="0.5" value="3">
  <span id="focalValue">3.0</span>
  <button id="toggleLensType">🔄 Switch to Diverging</button>
</div>

<div id="dragHint">← Drag the red arrow to move the object →</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
  // State
  let focalLength = 3;
  let lensType = 'converging';
  let objectX = -6;
  const objectHeight = 2;
  let isDragging = false;
  let dragHintShown = true;

  window.__3D_STATE__ = {
    objectDistance: 6,
    imageDistance: 6,
    magnification: -1,
    focalLength: 3,
    lensType: 'converging',
    imageType: 'real',
    objectX: -6,
    imageX: 6
  };

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const frustumSize = 18;
  const aspect = window.innerWidth / window.innerHeight;
  const camera = new THREE.OrthographicCamera(
    -frustumSize * aspect / 2, frustumSize * aspect / 2,
    frustumSize / 2, -frustumSize / 2,
    0.1, 100
  );
  camera.position.set(0, 20, 0);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Grid
  const gridHelper = new THREE.GridHelper(30, 30, 0x222244, 0x181830);
  scene.add(gridHelper);

  // Groups for dynamic elements
  const dynamicGroup = new THREE.Group();
  scene.add(dynamicGroup);

  // Utility: create arrow (vertical along Z in top-down view, but we're looking from Y, so arrow is along Z)
  // Actually in top-down view (camera looking down Y), X is horizontal, Z is vertical on screen
  // Optical axis along X, arrows point in +Z direction (up on screen)

  function createArrow(x, height, color, opacity = 1.0) {
    const group = new THREE.Group();

    const shaftHeight = Math.abs(height) - 0.3;
    const shaftGeo = new THREE.PlaneGeometry(0.08, shaftHeight);
    const shaftMat = new THREE.MeshBasicMaterial({ color, transparent: opacity < 1, opacity, side: THREE.DoubleSide });
    const shaft = new THREE.Mesh(shaftGeo, shaftMat);

    const dir = height > 0 ? 1 : -1;
    shaft.position.set(x, 0, dir * shaftHeight / 2);
    shaft.rotation.x = Math.PI / 2;
    group.add(shaft);

    // Arrowhead
    const headGeo = new THREE.BufferGeometry();
    const headSize = 0.35;
    const tipZ = dir * Math.abs(height);
    const baseZ = tipZ - dir * headSize;
    const vertices = new Float32Array([
      x, 0, tipZ,
      x - headSize * 0.5, 0, baseZ,
      x + headSize * 0.5, 0, baseZ
    ]);
    headGeo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    headGeo.computeVertexNormals();
    const headMat = new THREE.MeshBasicMaterial({ color, transparent: opacity < 1, opacity, side: THREE.DoubleSide });
    const head = new THREE.Mesh(headGeo, headMat);
    group.add(head);

    return group;
  }

  function createDashedLine(points, color) {
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineDashedMaterial({ color, dashSize: 0.3, gapSize: 0.15, linewidth: 1 });
    const line = new THREE.Line(geo, mat);
    line.computeLineDistances();
    return line;
  }

  function createSolidLine(points, color, linewidth = 1) {
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color, linewidth });
    return new THREE.Line(geo, mat);
  }

  // Static: optical axis
  const axisLine = createDashedLine([
    new THREE.Vector3(-15, 0, 0),
    new THREE.Vector3(15, 0, 0)
  ], 0xffffff);
  scene.add(axisLine);

  // Labels using sprites
  function createLabel(text, position, color = '#ffffff', fontSize = 48) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.font = `bold ${fontSize}px Arial`;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, 128, 32);

    const texture = new THREE.CanvasTexture(canvas);
    const mat = new THREE.SpriteMaterial({ map: texture, transparent: true });
    const sprite = new THREE.Sprite(mat);
    sprite.position.copy(position);
    sprite.scale.set(2, 0.5, 1);
    return sprite;
  }

  // Build scene
  function buildScene() {
    // Clear dynamic group
    while (dynamicGroup.children.length > 0) {
      const child = dynamicGroup.children[0];
      dynamicGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (child.material.map) child.material.map.dispose();
        child.material.dispose();
      }
    }

    const f = lensType === 'converging' ? Math.abs(focalLength) : -Math.abs(focalLength);
    const do_ = Math.abs(objectX); // object distance (positive)

    // Thin lens equation: 1/f = 1/do + 1/di => di = (f * do) / (do - f)
    let di, m;
    if (Math.abs(do_ - f) < 0.001) {
      // Object at focal point - image at infinity
      di = Infinity;
      m = -Infinity;
    } else {
      di = (f * do_) / (do_ - f);
      m = -di / do_;
    }

    const isVirtual = di < 0 || !isFinite(di);
    const imageType = isVirtual ? 'virtual' : 'real';

    let imageX_, imageHeight;
    if (!isFinite(di)) {
      imageX_ = 15; // show at edge
      imageHeight = 0; // no image formed
    } else {
      imageX_ = di; // positive = right side, negative = left side
      imageHeight = m * objectHeight;
    }

    // Clamp image position for display
    const clampedImageX = Math.max(-14, Math.min(14, imageX_));

    // Update state
    window.__3D_STATE__ = {
      objectDistance: parseFloat(do_.toFixed(4)),
      imageDistance: isFinite(di) ? parseFloat(di.toFixed(4)) : Infinity,
      magnification: isFinite(m) ? parseFloat(m.toFixed(4)) : -Infinity,
      focalLength: parseFloat(f.toFixed(4)),
      lensType,
      imageType,
      objectX: parseFloat(objectX.toFixed(4)),
      imageX: isFinite(di) ? parseFloat(imageX_.toFixed(4)) : Infinity
    };

    // Update info panel
    document.getElementById('infoDo').textContent = do_.toFixed(2);
    document.getElementById('infoDi').textContent = isFinite(di) ? di.toFixed(2) : '∞';
    document.getElementById('infoM').textContent = isFinite(m) ? m.toFixed(2) : '∞';
    document.getElementById('infoF').textContent = f.toFixed(2);
    const typeEl = document.getElementById('infoType');
    if (!isFinite(di)) {
      typeEl.textContent = 'At Infinity';
      typeEl.className = 'value virtual';
    } else if (isVirtual) {
      typeEl.textContent = 'Virtual / Upright';
      typeEl.className = 'value virtual';
    } else {
      typeEl.textContent = 'Real / Inverted';
      typeEl.className = 'value real';
    }

    // Draw lens
    const lensColor = lensType === 'converging' ? 0x4488ff : 0xff8844;
    if (lensType === 'converging') {
      // Convex lens shape - double convex
      const lensPoints = [];
      const lensH = 4;
      const segments = 30;
      // Right curve
      for (let i = 0; i <= segments; i++) {
        const t = (i / segments) * 2 - 1; // -1 to 1
        const z = t * lensH / 2;
        const x = 0.3 * (1 - t * t);
        lensPoints.push(new THREE.Vector3(x, 0, z));
      }
      // Left curve (reverse)
      for (let i = segments; i >= 0; i--) {
        const t = (i / segments) * 2 - 1;
        const z = t * lensH / 2;
        const x = -0.3 * (1 - t * t);
        lensPoints.push(new THREE.Vector3(x, 0, z));
      }
      lensPoints.push(lensPoints[0].clone());

      const lensGeo = new THREE.BufferGeometry().setFromPoints(lensPoints);
      const lensMat = new THREE.LineBasicMaterial({ color: lensColor, linewidth: 2 });
      const lensLine = new THREE.Line(lensGeo, lensMat);
      dynamicGroup.add(lensLine);

      // Fill
      const shape = new THREE.Shape();
      shape.moveTo(lensPoints[0].x, lensPoints[0].z);
      for (let i = 1; i < lensPoints.length; i++) {
        shape.lineTo(lensPoints[i].x, lensPoints[i].z);
      }
      const fillGeo = new THREE.ShapeGeometry(shape);
      const fillMat = new THREE.MeshBasicMaterial({ color: lensColor, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
      const fillMesh = new THREE.Mesh(fillGeo, fillMat);
      fillMesh.rotation.x = -Math.PI / 2;
      fillMesh.position.y = 0;
      dynamicGroup.add(fillMesh);

      // Arrows at top and bottom
      const arrowSize = 0.3;
      // Top arrow
      const topArrowGeo = new THREE.BufferGeometry();
      topArrowGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        0, 0, lensH / 2 + arrowSize,
        -arrowSize, 0, lensH / 2 - 0.05,
        arrowSize, 0, lensH / 2 - 0.05
      ]), 3));
      const arrowMat = new THREE.MeshBasicMaterial({ color: lensColor, side: THREE.DoubleSide });
      dynamicGroup.add(new THREE.Mesh(topArrowGeo, arrowMat));

      // Bottom arrow
      const botArrowGeo = new THREE.BufferGeometry();
      botArrowGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        0, 0, -lensH / 2 - arrowSize,
        -arrowSize, 0, -lensH / 2 + 0.05,
        arrowSize, 0, -lensH / 2 + 0.05
      ]), 3));
      dynamicGroup.add(new THREE.Mesh(botArrowGeo, arrowMat.clone()));

    } else {
      // Concave lens shape
      const lensH = 4;
      const segments = 30;
      const lensPoints = [];
      // Right curve (concave inward)
      for (let i = 0; i <= segments; i++) {
        const t = (i / segments) * 2 - 1;
        const z = t * lensH / 2;
        const x = 0.15 + 0.25 * t * t;
        lensPoints.push(new THREE.Vector3(x, 0, z));
      }
      // Left curve
      for (let i = segments; i >= 0; i--) {
        const t = (i / segments) * 2 - 1;
        const z = t * lensH / 2;
        const x = -0.15 - 0.25 * t * t;
        lensPoints.push(new THREE.Vector3(x, 0, z));
      }
      lensPoints.push(lensPoints[0].clone());

      const lensGeo = new THREE.BufferGeometry().setFromPoints(lensPoints);
      const lensMat = new THREE.LineBasicMaterial({ color: lensColor, linewidth: 2 });
      dynamicGroup.add(new THREE.Line(lensGeo, lensMat));

      const shape = new THREE.Shape();
      shape.moveTo(lensPoints[0].x, lensPoints[0].z);
      for (let i = 1; i < lensPoints.length; i++) {
        shape.lineTo(lensPoints[i].x, lensPoints[i].z);
      }
      const fillGeo = new THREE.ShapeGeometry(shape);
      const fillMat = new THREE.MeshBasicMaterial({ color: lensColor, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
      const fillMesh = new THREE.Mesh(fillGeo, fillMat);
      fillMesh.rotation.x = -Math.PI / 2;
      dynamicGroup.add(fillMesh);

      // Arrows pointing inward at top and bottom
      const arrowSize = 0.3;
      const topArrowGeo = new THREE.BufferGeometry();
      topArrowGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        0, 0, lensH / 2 - 0.05,
        -arrowSize, 0, lensH / 2 + arrowSize,
        arrowSize, 0, lensH / 2 + arrowSize
      ]), 3));
      dynamicGroup.add(new THREE.Mesh(topArrowGeo, new THREE.MeshBasicMaterial({ color: lensColor, side: THREE.DoubleSide })));

      const botArrowGeo = new THREE.BufferGeometry();
      botArrowGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
        0, 0, -lensH / 2 + 0.05,
        -arrowSize, 0, -lensH / 2 - arrowSize,
        arrowSize, 0, -lensH / 2 - arrowSize
      ]), 3));
      dynamicGroup.add(new THREE.Mesh(botArrowGeo, new THREE.MeshBasicMaterial({ color: lensColor, side: THREE.DoubleSide })));
    }

    // Lens label
    dynamicGroup.add(createLabel('Lens', new THREE.Vector3(0, 0, -3), lensType === 'converging' ? '#4488ff' : '#ff8844'));

    // Focal points
    const fAbs = Math.abs(f);
    const fpGeo = new THREE.SphereGeometry(0.15, 16, 16);
    const fpMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });

    const fp1 = new THREE.Mesh(fpGeo, fpMat);
    fp1.position.set(-fAbs, 0, 0);
    dynamicGroup.add(fp1);

    const fp2 = new THREE.Mesh(fpGeo, fpMat.clone());
    fp2.position.set(fAbs, 0, 0);
    dynamicGroup.add(fp2);

    // Focal point labels
    dynamicGroup.add(createLabel('F', new THREE.Vector3(-fAbs, 0, -0.7), '#ffdd44', 36));
    dynamicGroup.add(createLabel('F\'', new THREE.Vector3(fAbs, 0, -0.7), '#ffdd44', 36));

    // 2F points
    const fp2Geo = new THREE.SphereGeometry(0.1, 12, 12);
    const fp2Mat = new THREE.MeshBasicMaterial({ color: 0x886622 });
    const fp2a = new THREE.Mesh(fp2Geo, fp2Mat);
    fp2a.position.set(-2 * fAbs, 0, 0);
    dynamicGroup.add(fp2a);
    const fp2b = new THREE.Mesh(fp2Geo, fp2Mat.clone());
    fp2b.position.set(2 * fAbs, 0, 0);
    dynamicGroup.add(fp2b);
    dynamicGroup.add(createLabel('2F', new THREE.Vector3(-2 * fAbs, 0, -0.7), '#886622', 30));
    dynamicGroup.add(createLabel('2F\'', new THREE.Vector3(2 * fAbs, 0, -0.7), '#886622', 30));

    // Object arrow (red)
    const objArrow = createArrow(objectX, objectHeight, 0xff4444);
    dynamicGroup.add(objArrow);
    dynamicGroup.add(createLabel('Object', new THREE.Vector3(objectX, 0, objectHeight + 0.5), '#ff4444', 36));

    // Image arrow (green)
    if (isFinite(di) && isFinite(m) && Math.abs(imageHeight) > 0.01) {
      const imgOpacity = isVirtual ? 0.5 : 1.0;
      const imgColor = isVirtual ? 0x88cc44 : 0x44ff88;
      const imgArrow = createArrow(clampedImageX, imageHeight, imgColor, imgOpacity);
      dynamicGroup.add(imgArrow);

      const imgLabelZ = imageHeight > 0 ? imageHeight + 0.5 : imageHeight - 0.5;
      dynamicGroup.add(createLabel('Image', new THREE.Vector3(clampedImageX, 0, Math.min(Math.max(imgLabelZ, -6), 6)), isVirtual ? '#88cc44' : '#44ff88', 36));
    }

    // Draw principal rays
    const objTipX = objectX;
    const objTipZ = objectHeight;
    const rayColor = 0xffee44;
    const rayExtend = 15;

    if (isFinite(di) && isFinite(m)) {
      const imgTipX = clampedImageX;
      const imgTipZ = imageHeight;

      if (lensType === 'converging') {
        // Ray 1: Parallel to axis from object tip, then through far focal point
        // From object tip to lens (parallel to axis)
        const ray1a = createSolidLine([
          new THREE.Vector3(objTipX, 0, objTipZ),
          new THREE.Vector3(0, 0, objTipZ)
        ], rayColor);
        dynamicGroup.add(ray1a);

        // From lens to far focal point and beyond
        if (di > 0) {
          // Real image: ray goes through F' to image
          const ray1dir = new THREE.Vector3(fAbs, 0, -objTipZ).normalize();
          const ray1end = new THREE.Vector3(0 + ray1dir.x * rayExtend, 0, objTipZ + ray1dir.z * rayExtend);
          const ray1b = createSolidLine([
            new THREE.Vector3(0, 0, objTipZ),
            ray1end
          ], rayColor);
          dynamicGroup.add(ray1b);
        } else {
          // Virtual image: ray diverges, appears to come from virtual focal point
          // After lens, ray goes upward (diverging from axis)
          // The refracted ray: from (0, objTipZ) through (f, 0) direction but going right
          // Actually for virtual image with converging lens (object inside f):
          // Ray parallel to axis refracts toward F' on far side
          const ray1dir = new THREE.Vector3(fAbs, 0, -objTipZ).normalize();
          const ray1end = new THREE.Vector3(0 + ray1dir.x * rayExtend, 0, objTipZ + ray1dir.z * rayExtend);
          const ray1b = createSolidLine([
            new THREE.Vector3(0, 0, objTipZ),
            ray1end
          ], rayColor);
          dynamicGroup.add(ray1b);

          // Virtual ray extension (dashed, going backward)
          const ray1back = new THREE.Vector3(0 - ray1dir.x * rayExtend, 0, objTipZ - ray1dir.z * rayExtend);
          const ray1c = createDashedLine([
            new THREE.Vector3(0, 0, objTipZ),
            ray1back
          ], 0xffee44);
          dynamicGroup.add(ray1c);
        }

        // Ray 2: Through center of lens (straight line)
        const ray2dir = new THREE.Vector3(-objectX, 0, -objTipZ).normalize();
        const ray2start = new THREE.Vector3(objTipX, 0, objTipZ);
        const ray2end = new THREE.Vector3(objTipX + ray2dir.x * 30, 0, objTipZ + ray2dir.z * 30);
        const ray2 = createSolidLine([ray2start, ray2end], rayColor);
        dynamicGroup.add(ray2);

        if (di < 0) {
          // Extend backward for virtual image
          const ray2back = new THREE.Vector3(objTipX - ray2dir.x * 20, 0, objTipZ - ray2dir.z * 20);
          const ray2c = createDashedLine([ray2start, ray2back], 0xffee44);
          dynamicGroup.add(ray2c);
        }

        // Ray 3: Through near focal point, then parallel to axis after lens
        // From object tip toward near focal point F (at -f, 0)
        const toF = new THREE.Vector3(-fAbs - objTipX, 0, -objTipZ).normalize();
        // Find where this ray hits the lens (x=0)
        const t3 = -objTipX / toF.x;
        const lensHitZ = objTipZ + toF.z * t3;

        const ray3a = createSolidLine([
          new THREE.Vector3(objTipX, 0, objTipZ),
          new THREE.Vector3(0, 0, lensHitZ)
        ], rayColor);
        dynamicGroup.add(ray3a);

        // After lens, parallel to axis
        const ray3b = createSolidLine([
          new THREE.Vector3(0, 0, lensHitZ),
          new THREE.Vector3(rayExtend, 0, lensHitZ)
        ], rayColor);
        dynamicGroup.add(ray3b);

        if (di < 0) {
          // Virtual extension backward
          const ray3c = createDashedLine([
            new THREE.Vector3(0, 0, lensHitZ),
            new THREE.Vector3(-rayExtend, 0, lensHitZ)
          ], 0xffee44);
          dynamicGroup.add(ray3c);
        }

      } else {
        // Diverging lens
        // Ray 1: Parallel to axis, then diverges as if from near focal point (F on same side as object)
        const ray1a = createSolidLine([
          new THREE.Vector3(objTipX, 0, objTipZ),
          new THREE.Vector3(0, 0, objTipZ)
        ], rayColor);
        dynamicGroup.add(ray1a);

        // Diverging: ray appears to come from F on the same side (x = -fAbs for diverging, but f is negative)
        // The near focal point for diverging lens is at x = +fAbs (same side as incoming light? No.)
        // For diverging lens with f < 0: F is at x = f (negative, same side as object)
        // Ray parallel to axis refracts as if diverging from F' (at x = f, which is negative)
        // Actually: for diverging lens, F' is on the same side as the object
        // The focal point on the far side is F (at x = |f|), and F' is at x = -|f|
        // A ray parallel to axis diverges after lens as if coming from F' at x = f (= -|f|)
        const focalX = f; // negative for diverging
        const ray1dir = new THREE.Vector3(-focalX, 0, objTipZ).normalize(); // direction from F' to hit point
        // Wait, let me reconsider. For a diverging lens:
        // Ray parallel to axis hits lens at (0, objTipZ). After refraction, it diverges.
        // The refracted ray, when extended backward, passes through F' on the incoming side.
        // F' for diverging lens is at x = f (which is negative, so on the left/object side).
        // So the refracted ray goes from (0, objTipZ) in a direction away from (f, 0).
        // Direction from (f, 0) to (0, objTipZ) is (-f, objTipZ), and the ray continues in that direction.
        const dirFromF = new THREE.Vector3(-f, 0, objTipZ).normalize();
        const ray1end = new THREE.Vector3(dirFromF.x * rayExtend, 0, objTipZ + dirFromF.z / dirFromF.x * dirFromF.x * rayExtend);
        // Simpler: parametric from (0, objTipZ) in direction dirFromF
        const ray1endPt = new THREE.Vector3(
          0 + dirFromF.x * rayExtend,
          0,
          objTipZ + dirFromF.z * rayExtend
        );
        const ray1b = createSolidLine([
          new THREE.Vector3(0, 0, objTipZ),
          ray1endPt
        ], rayColor);
        dynamicGroup.add(ray1b);

        // Dashed backward extension to virtual focal point
        const ray1back = new THREE.Vector3(
          0 - dirFromF.x * rayExtend,
          0,
          objTipZ - dirFromF.z * rayExtend
        );
        const ray1c = createDashedLine([
          new THREE.Vector3(0, 0, objTipZ),
          ray1back
        ], 0xffee44);
        dynamicGroup.add(ray1c);

        // Ray 2: Through center (straight)
        const ray2dir = new THREE.Vector3(-objectX, 0, -objTipZ).normalize();
        const ray2end = new THREE.Vector3(objTipX + ray2dir.x * 30, 0, objTipZ + ray2dir.z * 30);
        const ray2 = createSolidLine([
          new THREE.Vector3(objTipX, 0, objTipZ),
          ray2end
        ], rayColor);
        dynamicGroup.add(ray2);

        // Backward extension
        const ray2back = new THREE.Vector3(objTipX - ray2dir.x * 20, 0, objTipZ - ray2dir.z * 20);
        const ray2c = createDashedLine([
          new THREE.Vector3(objTipX, 0, objTipZ),
          ray2back
        ], 0xffee44);
        dynamicGroup.add(ray2c);

        // Ray 3: Aimed toward F on far side (at x = -f = |f|), refracts parallel to axis
        // For diverging lens, a ray aimed toward the focal point on the far side (x = |f|) refracts parallel
        const farFocalX = -f; // = |f| for diverging (positive)
        const toFarF = new THREE.Vector3(farFocalX - objTipX, 0, 0 - objTipZ).normalize();
        const t3 = -objTipX / toFarF.x;
        const lensHitZ3 = objTipZ + toFarF.z * t3;

        const ray3a = createSolidLine([
          new THREE.Vector3(objTipX, 0, objTipZ),
          new THREE.Vector3(0, 0, lensHitZ3)
        ], rayColor);
        dynamicGroup.add(ray3a);

        // After lens, parallel to axis
        const ray3b = createSolidLine([
          new THREE.Vector3(0, 0, lensHitZ3),
          new THREE.Vector3(rayExtend, 0, lensHitZ3)
        ], rayColor);
        dynamicGroup.add(ray3b);

        // Dashed backward
        const ray3c = createDashedLine([
          new THREE.Vector3(0, 0, lensHitZ3),
          new THREE.Vector3(-rayExtend, 0, lensHitZ3)
        ], 0xffee44);
        dynamicGroup.add(ray3c);
      }
    }
  }

  buildScene();

  // Raycasting for drag
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);

  function getWorldPos(event) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersection = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersection);
    return intersection;
  }

  function isNearObject(worldPos) {
    const dx = Math.abs(worldPos.x - objectX);
    const dz = worldPos.z;
    return dx < 0.8 && dz >= -0.5 && dz <= objectHeight + 0.5;
  }

  renderer.domElement.addEventListener('pointerdown', (e) => {
    const pos = getWorldPos(e);
    if (pos && isNearObject(pos)) {
      isDragging = true;
      renderer.domElement.style.cursor = 'grabbing';
      if (dragHintShown) {
        document.getElementById('dragHint').style.opacity = '0';
        dragHintShown = false;
      }
    }
  });

  renderer.domElement.addEventListener('pointermove', (e) => {
    const pos = getWorldPos(e);
    if (!pos) return;

    if (isDragging) {
      objectX = Math.max(-12, Math.min(-1, pos.x));
      buildScene();
    } else {
      renderer.domElement.style.cursor = isNearObject(pos) ? 'grab' : 'default';
    }
  });

  renderer.domElement.addEventListener('pointerup', () => {
    isDragging = false;
    renderer.domElement.style.cursor = 'default';
  });

  renderer.domElement.addEventListener('pointerleave', () => {
    isDragging = false;
  });

  // Touch support
  renderer.domElement.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const pos = getWorldPos(touch);
    if (pos && isNearObject(pos)) {
      isDragging = true;
      if (dragHintShown) {
        document.getElementById('dragHint').style.opacity = '0';
        dragHintShown = false;
      }
    }
  }, { passive: false });

  renderer.domElement.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (!isDragging) return;
    const touch = e.touches[0];
    const pos = getWorldPos(touch);
    if (pos) {
      objectX = Math.max(-12, Math.min(-1, pos.x));
      buildScene();
    }
  }, { passive: false });

  renderer.domElement.addEventListener('touchend', () => {
    isDragging = false;
  });

  // Slider
  const slider = document.getElementById('focalLengthSlider');
  const focalValue = document.getElementById('focalValue');
  slider.addEventListener('input', () => {
    focalLength = parseFloat(slider.value);
    focalValue.textContent = focalLength.toFixed(1);
    buildScene();
  });

  // Toggle button
  const toggleBtn = document.getElementById('toggleLensType');
  toggleBtn.addEventListener('click', () => {
    if (lensType === 'converging') {
      lensType = 'diverging';
      toggleBtn.textContent = '🔄 Switch to Converging';
      toggleBtn.style.background = 'linear-gradient(135deg, #cc6622, #ff8844)';
    } else {
      lensType = 'converging';
      toggleBtn.textContent = '🔄 Switch to Diverging';
      toggleBtn.style.background = 'linear-gradient(135deg, #4466cc, #6688ff)';
    }
    buildScene();
  });

  // Resize
  window.addEventListener('resize', () => {
    const aspect = window.innerWidth / window.innerHeight;
    camera.left = -frustumSize * aspect / 2;
    camera.right = frustumSize * aspect / 2;
    camera.top = frustumSize / 2;
    camera.bottom = -frustumSize / 2;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
  }
  animate();

  // Hide drag hint after 4 seconds
  setTimeout(() => {
    if (dragHintShown) {
      document.getElementById('dragHint').style.opacity = '0';
      dragHintShown = false;
    }
  }, 4000);
})();
</script>
</body>
</html>
