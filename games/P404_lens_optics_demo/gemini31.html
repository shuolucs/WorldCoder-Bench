<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Thin Lens Optics</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }
        .panel {
            background: rgba(15, 15, 30, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 1.3rem;
            color: #4da8da;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 0.95rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 4px;
        }
        .stat-label {
            color: #aaaaaa;
        }
        .stat-value {
            font-weight: bold;
            color: #f9a826;
        }
        .control-group {
            margin-top: 10px;
        }
        label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #aaaaaa;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #4da8da;
        }
        button {
            background: #4da8da;
            color: #1a1a2e;
            border: none;
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover {
            background: #66c0f4;
        }
        #instructions {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            pointer-events: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="panel" id="infoPanel">
            <h1>Optics Data</h1>
            <div class="stat-row">
                <span class="stat-label">Object Dist (d<sub>o</sub>)</span>
                <span class="stat-value" id="val-do"></span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Image Dist (d<sub>i</sub>)</span>
                <span class="stat-value" id="val-di"></span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Magnification (m)</span>
                <span class="stat-value" id="val-m"></span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Image Type</span>
                <span class="stat-value" id="val-type" style="color: #00ff00;"></span>
            </div>
        </div>
        
        <div class="panel">
            <div class="control-group">
                <label for="focalLengthSlider">
                    <span>Focal Length (|f|)</span>
                    <span id="val-f" style="color: #fff; font-weight: bold;">3.0</span>
                </label>
                <input type="range" id="focalLengthSlider" min="1" max="6" step="0.5" value="3">
            </div>
            <button id="toggleLensType">Switch to Diverging Lens</button>
        </div>
    </div>

    <div id="instructions">Drag the red object arrow left/right along the optical axis</div>
    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- Global State ---
        window.__3D_STATE__ = {
            objectDistance: 6,
            imageDistance: 0,
            magnification: 0,
            focalLength: 3,
            lensType: 'converging',
            imageType: 'real',
            objectX: -6,
            imageX: 0
        };

        // --- Internal Variables ---
        let f_mag = 3;
        let isConverging = true;
        let x_o = -6;
        const h_o = 2;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        // Orthographic Camera looking down Y-axis. 
        // To make +X right and +Z up visually on screen, we set up=(0,0,-1)
        // This means world -Z points UP on the screen.
        const aspect = window.innerWidth / window.innerHeight;
        const frustumSize = 28;
        const camera = new THREE.OrthographicCamera(
            frustumSize * aspect / -2, frustumSize * aspect / 2,
            frustumSize / 2, frustumSize / -2,
            0.1, 100
        );
        camera.position.set(0, 20, 0);
        camera.lookAt(0, 0, 0);
        camera.up.set(0, 0, -1); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // --- Environment ---
        const gridHelper = new THREE.GridHelper(30, 30, 0x333344, 0x222233);
        scene.add(gridHelper);

        const axisGeo = new THREE.BufferGeometry().setFromPoints([
            new THREE.Vector3(-15, 0, 0), new THREE.Vector3(15, 0, 0)
        ]);
        const axisMat = new THREE.LineDashedMaterial({ color: 0xffffff, dashSize: 0.4, gapSize: 0.4 });
        const axisLine = new THREE.Line(axisGeo, axisMat);
        axisLine.computeLineDistances();
        scene.add(axisLine);

        // --- Helper Function ---
        // Maps logical 2D coordinates (x, y) to 3D world coordinates (x, 0, -y)
        // Since camera up is (0,0,-1), a negative Z value appears "up" on screen.
        const wPt = (x, y) => new THREE.Vector3(x, 0, -y);

        // --- Objects ---
        
        // Lens
        const lensGroup = new THREE.Group();
        scene.add(lensGroup);
        
        function buildLens() {
            lensGroup.clear();
            const color = isConverging ? 0x4da8da : 0xf9a826;
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const lineMat = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
            
            const lineGeo = new THREE.BufferGeometry().setFromPoints([wPt(0, 4), wPt(0, -4)]);
            lensGroup.add(new THREE.Line(lineGeo, lineMat));

            const coneGeo = new THREE.ConeGeometry(0.3, 0.8, 16);
            const topCone = new THREE.Mesh(coneGeo, mat);
            const botCone = new THREE.Mesh(coneGeo, mat);

            if (isConverging) {
                topCone.position.copy(wPt(0, 4));
                topCone.rotation.x = -Math.PI / 2;
                botCone.position.copy(wPt(0, -4));
                botCone.rotation.x = Math.PI / 2;
            } else {
                topCone.position.copy(wPt(0, 4));
                topCone.rotation.x = Math.PI / 2;
                botCone.position.copy(wPt(0, -4));
                botCone.rotation.x = -Math.PI / 2;
            }
            lensGroup.add(topCone);
            lensGroup.add(botCone);
        }
        buildLens();

        // Focal Points
        const fpGeo = new THREE.SphereGeometry(0.2, 16, 16);
        const fpMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const fp1 = new THREE.Mesh(fpGeo, fpMat);
        const fp2 = new THREE.Mesh(fpGeo, fpMat);
        scene.add(fp1);
        scene.add(fp2);

        // Arrows
        // Direction (0,0,-1) points "up" visually due to camera setup
        const objArrow = new THREE.ArrowHelper(new THREE.Vector3(0,0,-1), new THREE.Vector3(0,0,0), h_o, 0xff3333, 0.6, 0.4);
        scene.add(objArrow);

        const imgArrow = new THREE.ArrowHelper(new THREE.Vector3(0,0,-1), new THREE.Vector3(0,0,0), 1, 0x33ff33, 0.6, 0.4);
        scene.add(imgArrow);

        // Hitbox for dragging object
        const hitBoxGeo = new THREE.BoxGeometry(1.5, 2, h_o + 1);
        const hitBoxMat = new THREE.MeshBasicMaterial({ visible: false });
        const hitBox = new THREE.Mesh(hitBoxGeo, hitBoxMat);
        scene.add(hitBox);

        // Rays
        const solidRayMat = new THREE.LineBasicMaterial({ color: 0xffff00, opacity: 0.8, transparent: true });
        const dashedRayMat = new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 0.3, gapSize: 0.2, opacity: 0.6, transparent: true });
        
        const solidRays = new THREE.LineSegments(new THREE.BufferGeometry(), solidRayMat);
        const dashedRays = new THREE.LineSegments(new THREE.BufferGeometry(), dashedRayMat);
        scene.add(solidRays);
        scene.add(dashedRays);

        // --- Core Logic ---
        function updateOptics() {
            let f = isConverging ? f_mag : -f_mag;
            
            // Prevent object exactly at focal point to avoid infinity division
            if (Math.abs(x_o + f) < 0.001) {
                x_o = -f - 0.001; 
            }

            const d_o = -x_o;
            const d_i = 1 / (1/f - 1/d_o);
            const x_i = d_i;
            const m = -d_i / d_o;
            const h_i = m * h_o;

            // Update State Object
            window.__3D_STATE__.objectDistance = d_o;
            window.__3D_STATE__.imageDistance = d_i;
            window.__3D_STATE__.magnification = m;
            window.__3D_STATE__.focalLength = f;
            window.__3D_STATE__.lensType = isConverging ? 'converging' : 'diverging';
            window.__3D_STATE__.imageType = d_i > 0 ? 'real' : 'virtual';
            window.__3D_STATE__.objectX = x_o;
            window.__3D_STATE__.imageX = x_i;

            // Update UI
            document.getElementById('val-do').innerText = d_o.toFixed(2);
            document.getElementById('val-di').innerText = Math.abs(d_i).toFixed(2) + (d_i > 0 ? ' (Right)' : ' (Left)');
            document.getElementById('val-m').innerText = m.toFixed(2);
            
            const typeEl = document.getElementById('val-type');
            if (d_i > 0) {
                typeEl.innerText = 'Real / Inverted';
                typeEl.style.color = '#33ff33';
            } else {
                typeEl.innerText = 'Virtual / Upright';
                typeEl.style.color = '#aaaaaa';
            }
            document.getElementById('val-f').innerText = f_mag.toFixed(1);

            // Update 3D Objects
            fp1.position.copy(wPt(f_mag, 0));
            fp2.position.copy(wPt(-f_mag, 0));

            objArrow.position.copy(wPt(x_o, 0));
            hitBox.position.copy(wPt(x_o, h_o/2));

            imgArrow.position.copy(wPt(x_i, 0));
            const abs_hi = Math.abs(h_i);
            const safe_hi = Math.max(0.001, abs_hi);
            
            imgArrow.setLength(safe_hi, Math.min(0.6, safe_hi*0.5), Math.min(0.4, safe_hi*0.5));
            // If h_i > 0, point up (-Z). If h_i < 0, point down (+Z)
            imgArrow.setDirection(new THREE.Vector3(0, 0, h_i > 0 ? -1 : 1));

            if (d_i < 0) {
                imgArrow.line.material.transparent = true;
                imgArrow.line.material.opacity = 0.4;
                imgArrow.cone.material.transparent = true;
                imgArrow.cone.material.opacity = 0.4;
            } else {
                imgArrow.line.material.transparent = false;
                imgArrow.line.material.opacity = 1.0;
                imgArrow.cone.material.transparent = false;
                imgArrow.cone.material.opacity = 1.0;
            }

            // Update Rays
            const P_obj = wPt(x_o, h_o);
            const P_lens1 = wPt(0, h_o);
            const P_lens2 = wPt(0, 0);
            const P_lens3 = wPt(0, h_i);
            const P_img = wPt(x_i, h_i);

            const solidPts = [];
            const dashedPts = [];

            if (d_i > 0) {
                // Real Image: Rays converge at image tip
                solidPts.push(
                    P_obj, P_lens1, P_lens1, P_img,
                    P_obj, P_lens2, P_lens2, P_img,
                    P_obj, P_lens3, P_lens3, P_img
                );
            } else {
                // Virtual Image: Rays diverge, trace back to image tip
                const y_end1 = h_o - 15 * (h_o / f);
                const y_end2 = 15 * (h_o / x_o);
                const y_end3 = h_i;

                const P_ref1 = wPt(15, y_end1);
                const P_ref2 = wPt(15, y_end2);
                const P_ref3 = wPt(15, y_end3);

                solidPts.push(
                    P_obj, P_lens1, P_lens1, P_ref1,
                    P_obj, P_lens2, P_lens2, P_ref2,
                    P_obj, P_lens3, P_lens3, P_ref3
                );
                dashedPts.push(
                    P_lens1, P_img,
                    P_lens2, P_img,
                    P_lens3, P_img
                );
            }

            solidRays.geometry.setFromPoints(solidPts);
            dashedRays.geometry.setFromPoints(dashedPts);
            dashedRays.computeLineDistances();
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        let isDragging = false;

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(hitBox);
            if (intersects.length > 0) {
                isDragging = true;
                document.body.style.cursor = 'ew-resize';
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDragging) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(dragPlane, target);
            if (target) {
                x_o = Math.max(-14.5, Math.min(-1, target.x));
                updateOptics();
            }
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            document.body.style.cursor = 'default';
        });

        // UI Listeners
        document.getElementById('focalLengthSlider').addEventListener('input', (e) => {
            f_mag = parseFloat(e.target.value);
            updateOptics();
        });

        document.getElementById('toggleLensType').addEventListener('click', (e) => {
            isConverging = !isConverging;
            e.target.innerText = isConverging ? 'Switch to Diverging Lens' : 'Switch to Converging Lens';
            e.target.style.background = isConverging ? '#4da8da' : '#f9a826';
            e.target.style.color = '#1a1a2e';
            buildLens();
            updateOptics();
        });

        window.addEventListener('resize', () => {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize
        updateOptics();

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
