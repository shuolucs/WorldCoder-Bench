<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 打鸭子射击场</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            cursor: none; /* 隐藏默认鼠标，使用自定义准星 */
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            font-size: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.2);
        }
        .hud-item {
            margin-bottom: 8px;
        }
        .hud-item:last-child {
            margin-bottom: 0;
        }
        .hud-value {
            font-weight: bold;
            color: #FFD700;
        }
        #crosshair {
            position: absolute;
            width: 40px;
            height: 40px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #ff0000;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
        #crosshair::before {
            top: 19px; left: 0; width: 40px; height: 2px;
        }
        #crosshair::after {
            top: 0; left: 19px; width: 2px; height: 40px;
        }
        .crosshair-center {
            position: absolute;
            top: 16px; left: 16px; width: 8px; height: 8px;
            border-radius: 50%;
            border: 2px solid #ff0000;
            box-sizing: border-box;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 40px 60px;
            text-align: center;
            border-radius: 15px;
            border: 3px solid #FFD700;
            display: none;
            z-index: 20;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #gameOver h1 {
            margin-top: 0;
            color: #FF4500;
            font-size: 48px;
            text-shadow: 2px 2px 0 #000;
        }
        #gameOver p {
            font-size: 24px;
            margin: 15px 0;
        }
        #restartBtn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 22px;
            font-weight: bold;
            color: #000;
            background-color: #FFD700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }
        #restartBtn:hover {
            background-color: #FFA500;
            transform: scale(1.05);
        }
        #restartBtn:active {
            transform: scale(0.95);
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            background: rgba(0,0,0,0.7);
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 30;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="loading">加载模型中...</div>
    
    <div id="hud">
        <div class="hud-item">得分: <span id="score" class="hud-value">0</span></div>
        <div class="hud-item">未命中: <span id="missCount" class="hud-value">0</span></div>
        <div class="hud-item">倒计时: <span id="timer" class="hud-value">60</span>s</div>
        <div class="hud-item">存活鸭子: <span id="activeDucks" class="hud-value">0</span></div>
    </div>

    <div id="crosshair">
        <div class="crosshair-center"></div>
    </div>

    <div id="gameOver">
        <h1>游戏结束</h1>
        <p id="finalScoreText">最终得分: <span class="hud-value">0</span></p>
        <p id="finalHitRateText">命中率: <span class="hud-value">0%</span></p>
        <button id="restartBtn">重新开始</button>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 初始化全局状态
        window.__3D_STATE__ = {
            modelLoaded: false,
            score: 0,
            missCount: 0,
            timeLeft: 60,
            activeDucks: 0,
            gameOver: false,
            duckPositions: [],
            hitRate: 0
        };

        // 场景设置
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 天蓝色背景

        // 摄像机设置 (固定位置，不可移动)
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 3, 0);

        // 渲染器设置
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 光照设置
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        scene.add(dirLight);

        // 场景布置
        // 背景墙
        const wallGeo = new THREE.BoxGeometry(20, 10, 0.5);
        const wallMat = new THREE.MeshLambertMaterial({ color: 0x8B4513 });
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(0, 5, -5);
        wall.receiveShadow = true;
        scene.add(wall);

        // 地面
        const groundGeo = new THREE.PlaneGeometry(40, 20);
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x228B22 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 鸭子配置与管理
        const ducks = [];
        const duckConfigs = [
            { y: 1, speed: 2 },
            { y: 2, speed: 3 },
            { y: 3, speed: 4 },
            { y: 4, speed: 3.5 },
            { y: 5, speed: 2.5 }
        ];

        // 加载模型
        const loader = new GLTFLoader();
        loader.load('assets/Duck.glb', (gltf) => {
            const baseModel = gltf.scene;
            
            // 开启阴影
            baseModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            duckConfigs.forEach((config, index) => {
                const model = baseModel.clone();
                model.scale.set(0.8, 0.8, 0.8);
                model.rotation.y = Math.PI / 2; // 面朝右侧 (正X轴)
                
                // 初始位置稍微错开，避免重叠
                const startX = -12 - (index * 1.5); 
                model.position.set(startX, config.y, 0);
                scene.add(model);

                ducks.push({
                    mesh: model,
                    baseY: config.y,
                    speed: config.speed,
                    state: 'moving', // 'moving', 'falling', 'dead'
                    fallProgress: 0,
                    deadTimer: 0
                });
            });

            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
        }, undefined, (error) => {
            console.error('模型加载失败:', error);
            document.getElementById('loading').innerText = '模型加载失败，请检查路径';
        });

        // 交互逻辑 (射线检测与准星)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const crosshair = document.getElementById('crosshair');

        // 准星跟随鼠标
        window.addEventListener('mousemove', (e) => {
            crosshair.style.left = e.clientX + 'px';
            crosshair.style.top = e.clientY + 'px';
            
            // 归一化设备坐标
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        // 射击点击事件
        window.addEventListener('mousedown', (e) => {
            if (e.button !== 0) return; // 只响应左键
            const state = window.__3D_STATE__;
            if (!state.modelLoaded || state.gameOver) return;

            raycaster.setFromCamera(mouse, camera);
            
            // 获取所有处于移动状态的鸭子模型
            const movingDuckMeshes = ducks
                .filter(d => d.state === 'moving')
                .map(d => d.mesh);

            // 检测相交 (递归检测子网格)
            const intersects = raycaster.intersectObjects(movingDuckMeshes, true);

            if (intersects.length > 0) {
                // 找到被击中的根模型
                let hitObject = intersects[0].object;
                while (hitObject.parent && hitObject.parent !== scene) {
                    hitObject = hitObject.parent;
                }

                // 查找对应的鸭子数据对象
                const hitDuck = ducks.find(d => d.mesh === hitObject);
                
                if (hitDuck && hitDuck.state === 'moving') {
                    hitDuck.state = 'falling';
                    hitDuck.fallProgress = 0;
                    state.score += 1;
                }
            } else {
                state.missCount += 1;
            }
        });

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 游戏结束与重新开始逻辑
        const gameOverPanel = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');

        function showGameOver() {
            gameOverPanel.style.display = 'block';
            document.body.style.cursor = 'default'; // 显示鼠标以便点击按钮
            crosshair.style.display = 'none';
            
            const state = window.__3D_STATE__;
            const hitRatePct = (state.hitRate * 100).toFixed(1);
            
            document.querySelector('#finalScoreText span').innerText = state.score;
            document.querySelector('#finalHitRateText span').innerText = `${hitRatePct}%`;
        }

        restartBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.score = 0;
            state.missCount = 0;
            state.timeLeft = 60;
            state.gameOver = false;
            
            // 重置所有鸭子
            ducks.forEach((duck, index) => {
                duck.state = 'moving';
                duck.mesh.position.set(-12 - (index * 1.5), duck.baseY, 0);
                duck.mesh.rotation.z = 0;
            });

            gameOverPanel.style.display = 'none';
            document.body.style.cursor = 'none';
            crosshair.style.display = 'block';
            clock.getDelta(); // 重置时钟增量
        });

        // 动画循环
        const clock = new THREE.Clock();

        // DOM 元素缓存
        const scoreEl = document.getElementById('score');
        const missCountEl = document.getElementById('missCount');
        const timerEl = document.getElementById('timer');
        const activeDucksEl = document.getElementById('activeDucks');

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const state = window.__3D_STATE__;

            if (state.modelLoaded && !state.gameOver) {
                // 更新倒计时
                state.timeLeft -= dt;
                if (state.timeLeft <= 0) {
                    state.timeLeft = 0;
                    state.gameOver = true;
                    showGameOver();
                }

                let activeCount = 0;
                const currentPositions = [];

                // 更新鸭子状态
                ducks.forEach(duck => {
                    if (duck.state === 'moving') {
                        // 移动逻辑
                        duck.mesh.position.x += duck.speed * dt;
                        if (duck.mesh.position.x > 12) {
                            duck.mesh.position.x = -12;
                        }
                        activeCount++;
                    } else if (duck.state === 'falling') {
                        // 坠落动画逻辑 (1秒内完成)
                        duck.fallProgress += dt;
                        const t = Math.min(duck.fallProgress, 1);
                        
                        // 线性插值：y下降到-2，z轴旋转90度(向后仰)
                        duck.mesh.position.y = THREE.MathUtils.lerp(duck.baseY, -2, t);
                        duck.mesh.rotation.z = THREE.MathUtils.lerp(0, -Math.PI / 2, t);

                        if (t >= 1) {
                            duck.state = 'dead';
                            duck.deadTimer = 0;
                        }
                    } else if (duck.state === 'dead') {
                        // 死亡等待逻辑 (3秒后重生)
                        duck.deadTimer += dt;
                        if (duck.deadTimer >= 3) {
                            duck.state = 'moving';
                            duck.mesh.position.x = -12;
                            duck.mesh.position.y = duck.baseY;
                            duck.mesh.rotation.z = 0;
                        }
                    }

                    // 记录位置
                    currentPositions.push({
                        x: duck.mesh.position.x,
                        y: duck.mesh.position.y,
                        z: duck.mesh.position.z
                    });
                });

                // 更新全局状态
                state.activeDucks = activeCount;
                state.duckPositions = currentPositions;
                const totalShots = state.score + state.missCount;
                state.hitRate = totalShots > 0 ? state.score / totalShots : 0;

                // 更新 HUD
                scoreEl.innerText = state.score;
                missCountEl.innerText = state.missCount;
                timerEl.innerText = Math.ceil(state.timeLeft);
                activeDucksEl.innerText = state.activeDucks;
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
