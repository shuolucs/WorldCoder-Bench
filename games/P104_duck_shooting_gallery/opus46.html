<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Duck Shooting Gallery</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; cursor: none; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#crosshair {
    position: fixed;
    pointer-events: none;
    z-index: 100;
    transform: translate(-50%, -50%);
}
#crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: red;
}
#crosshair::before {
    width: 2px; height: 30px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
}
#crosshair::after {
    width: 30px; height: 2px;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
}
#crosshair .dot {
    position: absolute;
    width: 4px; height: 4px;
    background: red;
    border-radius: 50%;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
}

#hud {
    position: fixed;
    top: 20px; left: 20px;
    z-index: 50;
    color: #fff;
    font-size: 18px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.5);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.2);
    min-width: 200px;
}
#hud div {
    margin: 6px 0;
    display: flex;
    justify-content: space-between;
}
#hud .label { color: #aaa; }
#hud .value { color: #fff; font-weight: bold; }
#hud #timer-display .value { color: #ff4444; font-size: 24px; }

#gameOver {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 200;
    background: rgba(0,0,0,0.9);
    color: #fff;
    padding: 40px 60px;
    border-radius: 20px;
    text-align: center;
    border: 2px solid #ff6600;
    box-shadow: 0 0 40px rgba(255,102,0,0.5);
}
#gameOver h1 {
    font-size: 42px;
    color: #ff6600;
    margin-bottom: 20px;
    text-transform: uppercase;
}
#gameOver .stats {
    font-size: 22px;
    margin: 10px 0;
}
#gameOver .stats span { color: #ffcc00; font-weight: bold; }
#restartBtn {
    margin-top: 25px;
    padding: 12px 40px;
    font-size: 20px;
    background: #ff6600;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    transition: background 0.3s;
}
#restartBtn:hover { background: #ff8833; }

#muzzleFlash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,200,0.15);
    pointer-events: none;
    z-index: 90;
    display: none;
}

#hitMarker {
    position: fixed;
    pointer-events: none;
    z-index: 101;
    display: none;
    transform: translate(-50%, -50%);
    font-size: 30px;
    color: #ff0;
    font-weight: bold;
    text-shadow: 0 0 10px #ff0;
}
</style>
</head>
<body>

<div id="crosshair"><div class="dot"></div></div>
<div id="muzzleFlash"></div>
<div id="hitMarker">✕</div>

<div id="hud">
    <div id="timer-display">
        <span class="label">⏱ Time:</span>
        <span class="value" id="timer">60</span>
    </div>
    <div>
        <span class="label">🎯 Score:</span>
        <span class="value" id="score">0</span>
    </div>
    <div>
        <span class="label">✗ Missed:</span>
        <span class="value" id="missCount">0</span>
    </div>
    <div>
        <span class="label">🦆 Ducks:</span>
        <span class="value" id="activeDucks">5</span>
    </div>
</div>

<div id="gameOver">
    <h1>Game Over!</h1>
    <div class="stats">Final Score: <span id="finalScore">0</span></div>
    <div class="stats">Hit Rate: <span id="finalHitRate">0%</span></div>
    <div class="stats">Missed: <span id="finalMiss">0</span></div>
    <button id="restartBtn">Restart</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Global state
window.__3D_STATE__ = {
    modelLoaded: false,
    score: 0,
    missCount: 0,
    timeLeft: 60,
    activeDucks: 5,
    gameOver: false,
    duckPositions: [],
    hitRate: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 20, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 2.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Background wall
const wallGeometry = new THREE.BoxGeometry(20, 10, 0.5);
const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.9 });
const wall = new THREE.Mesh(wallGeometry, wallMaterial);
wall.position.set(0, 5, -5);
wall.receiveShadow = true;
scene.add(wall);

// Decorative elements on wall
const stripeMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, roughness: 0.9 });
for (let i = 0; i < 4; i++) {
    const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.1, 10, 0.6), stripeMat);
    stripe.position.set(-7.5 + i * 5, 5, -4.9);
    scene.add(stripe);
}

// Ground
const groundGeometry = new THREE.PlaneGeometry(30, 20);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Shelf/rails for ducks
const railMat = new THREE.MeshStandardMaterial({ color: 0x654321, roughness: 0.7 });
const duckHeights = [1, 2, 3, 4, 5];
duckHeights.forEach(h => {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(22, 0.1, 0.3), railMat);
    rail.position.set(0, h - 0.3, -4.5);
    rail.receiveShadow = true;
    scene.add(rail);
});

// Duck management
const duckSpeeds = [2, 3, 4, 3.5, 2.5];
const ducks = [];
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let score = 0;
let missCount = 0;
let timeLeft = 60;
let gameOver = false;
let timerInterval = null;
let duckTemplate = null;

class Duck {
    constructor(index, model) {
        this.index = index;
        this.model = model.clone();
        this.height = duckHeights[index];
        this.speed = duckSpeeds[index];
        this.active = true;
        this.falling = false;
        this.fallTimer = 0;
        this.fallDuration = 1.0;
        this.respawnTimer = 0;
        this.respawnDelay = 3.0;
        this.waitingRespawn = false;
        this.fallStartY = 0;
        this.fallStartRotZ = 0;

        this.model.scale.set(0.8, 0.8, 0.8);
        this.model.position.set(-12 + Math.random() * 4, this.height, -4);
        this.model.rotation.y = Math.PI / 2;

        this.model.traverse(child => {
            if (child.isMesh) {
                child.castShadow = true;
                child.userData.duckIndex = index;
            }
        });
        this.model.userData.duckIndex = index;

        scene.add(this.model);
    }

    reset() {
        this.model.position.set(-12 - Math.random() * 3, this.height, -4);
        this.model.rotation.set(0, Math.PI / 2, 0);
        this.active = true;
        this.falling = false;
        this.waitingRespawn = false;
        this.fallTimer = 0;
        this.respawnTimer = 0;
        this.model.visible = true;
    }

    hit() {
        if (!this.active || this.falling || this.waitingRespawn) return false;
        this.falling = true;
        this.active = false;
        this.fallTimer = 0;
        this.fallStartY = this.model.position.y;
        this.fallStartRotZ = this.model.rotation.z;
        return true;
    }

    update(delta) {
        if (gameOver) return;

        if (this.falling) {
            this.fallTimer += delta;
            const t = Math.min(this.fallTimer / this.fallDuration, 1);
            const easeT = t * t;
            this.model.rotation.z = this.fallStartRotZ + (Math.PI / 2) * easeT;
            this.model.position.y = this.fallStartY + (-2 - this.fallStartY) * easeT;

            if (t >= 1) {
                this.falling = false;
                this.waitingRespawn = true;
                this.respawnTimer = 0;
                this.model.visible = false;
            }
        } else if (this.waitingRespawn) {
            this.respawnTimer += delta;
            if (this.respawnTimer >= this.respawnDelay) {
                this.reset();
            }
        } else if (this.active) {
            this.model.position.x += this.speed * delta;
            if (this.model.position.x > 12) {
                this.model.position.x = -12;
            }
        }
    }
}

// Load duck model
const loader = new GLTFLoader();
loader.load('assets/Duck.glb', (gltf) => {
    duckTemplate = gltf.scene;
    duckTemplate.scale.set(0.8, 0.8, 0.8);

    for (let i = 0; i < 5; i++) {
        const duck = new Duck(i, duckTemplate);
        ducks.push(duck);
    }

    window.__3D_STATE__.modelLoaded = true;
    window.__3D_STATE__.duckPositions = ducks.map(d => ({
        x: d.model.position.x,
        y: d.model.position.y,
        z: d.model.position.z
    }));

    startTimer();
}, undefined, (error) => {
    console.error('Error loading Duck.glb:', error);
});

// Timer
function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (gameOver) return;
        timeLeft--;
        if (timeLeft <= 0) {
            timeLeft = 0;
            endGame();
        }
        document.getElementById('timer').textContent = timeLeft;
        window.__3D_STATE__.timeLeft = timeLeft;
    }, 1000);
}

function endGame() {
    gameOver = true;
    if (timerInterval) clearInterval(timerInterval);

    const totalShots = score + missCount;
    const hitRate = totalShots > 0 ? score / totalShots : 0;

    document.getElementById('finalScore').textContent = score;
    document.getElementById('finalHitRate').textContent = (hitRate * 100).toFixed(1) + '%';
    document.getElementById('finalMiss').textContent = missCount;
    document.getElementById('gameOver').style.display = 'block';

    window.__3D_STATE__.gameOver = true;
    window.__3D_STATE__.hitRate = hitRate;

    document.body.style.cursor = 'default';
}

function restartGame() {
    score = 0;
    missCount = 0;
    timeLeft = 60;
    gameOver = false;

    document.getElementById('score').textContent = '0';
    document.getElementById('missCount').textContent = '0';
    document.getElementById('timer').textContent = '60';
    document.getElementById('gameOver').style.display = 'none';

    ducks.forEach(d => d.reset());

    window.__3D_STATE__.score = 0;
    window.__3D_STATE__.missCount = 0;
    window.__3D_STATE__.timeLeft = 60;
    window.__3D_STATE__.gameOver = false;
    window.__3D_STATE__.activeDucks = 5;
    window.__3D_STATE__.hitRate = 0;

    document.body.style.cursor = 'none';
    startTimer();
}

document.getElementById('restartBtn').addEventListener('click', restartGame);

// Crosshair follow mouse
const crosshair = document.getElementById('crosshair');
document.addEventListener('mousemove', (e) => {
    crosshair.style.left = e.clientX + 'px';
    crosshair.style.top = e.clientY + 'px';
});

// Muzzle flash
const muzzleFlash = document.getElementById('muzzleFlash');
function showMuzzleFlash() {
    muzzleFlash.style.display = 'block';
    setTimeout(() => { muzzleFlash.style.display = 'none'; }, 50);
}

// Hit marker
const hitMarker = document.getElementById('hitMarker');
function showHitMarker(x, y) {
    hitMarker.style.left = x + 'px';
    hitMarker.style.top = y + 'px';
    hitMarker.style.display = 'block';
    hitMarker.style.opacity = '1';
    setTimeout(() => { hitMarker.style.display = 'none'; }, 300);
}

// Shooting
function getAllDuckMeshes() {
    const meshes = [];
    ducks.forEach(duck => {
        if (duck.active && !duck.falling && !duck.waitingRespawn) {
            duck.model.traverse(child => {
                if (child.isMesh) {
                    meshes.push(child);
                }
            });
        }
    });
    return meshes;
}

document.addEventListener('click', (e) => {
    if (gameOver) return;
    if (e.target.id === 'restartBtn') return;

    showMuzzleFlash();

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    const meshes = getAllDuckMeshes();
    const intersects = raycaster.intersectObjects(meshes, false);

    let hitDuck = false;
    if (intersects.length > 0) {
        // Find which duck was hit
        for (const intersect of intersects) {
            let obj = intersect.object;
            let duckIndex = -1;

            // Walk up to find duckIndex
            while (obj) {
                if (obj.userData && obj.userData.duckIndex !== undefined) {
                    duckIndex = obj.userData.duckIndex;
                    break;
                }
                obj = obj.parent;
            }

            if (duckIndex >= 0 && duckIndex < ducks.length) {
                const duck = ducks[duckIndex];
                if (duck.hit()) {
                    score++;
                    hitDuck = true;
                    document.getElementById('score').textContent = score;
                    showHitMarker(e.clientX, e.clientY);
                    // Create particle effect
                    createHitParticles(duck.model.position.clone());
                    break;
                }
            }
        }
    }

    if (!hitDuck) {
        missCount++;
        document.getElementById('missCount').textContent = missCount;
    }

    // Update state
    window.__3D_STATE__.score = score;
    window.__3D_STATE__.missCount = missCount;
    const totalShots = score + missCount;
    window.__3D_STATE__.hitRate = totalShots > 0 ? score / totalShots : 0;
});

// Hit particles
const particles = [];
function createHitParticles(position) {
    const count = 8;
    for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.05, 4, 4);
        const mat = new THREE.MeshBasicMaterial({ color: 0xFFFF00 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        const vel = new THREE.Vector3(
            (Math.random() - 0.5) * 4,
            Math.random() * 3 + 1,
            (Math.random() - 0.5) * 2
        );
        scene.add(mesh);
        particles.push({ mesh, vel, life: 1.0 });
    }
}

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    // Update ducks
    ducks.forEach(d => d.update(delta));

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= delta * 2;
        p.vel.y -= 9.8 * delta;
        p.mesh.position.add(p.vel.clone().multiplyScalar(delta));
        p.mesh.material.opacity = Math.max(0, p.life);
        p.mesh.material.transparent = true;
        if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.geometry.dispose();
            p.mesh.material.dispose();
            particles.splice(i, 1);
        }
    }

    // Update HUD
    const activeDuckCount = ducks.filter(d => d.active && !d.falling && !d.waitingRespawn).length;
    document.getElementById('activeDucks').textContent = activeDuckCount;

    // Update global state
    window.__3D_STATE__.activeDucks = activeDuckCount;
    window.__3D_STATE__.timeLeft = timeLeft;
    window.__3D_STATE__.duckPositions = ducks.map(d => ({
        x: d.model.position.x,
        y: d.model.position.y,
        z: d.model.position.z
    }));

    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
