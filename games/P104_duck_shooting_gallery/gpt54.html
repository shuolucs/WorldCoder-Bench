<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 打鸭子射击场</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.8;
      font-size: 16px;
      user-select: none;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28px;
      height: 28px;
      transform: translate(-50%, -50%);
      z-index: 11;
      pointer-events: none;
    }

    #crosshair::before,
    #crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.7);
    }

    #crosshair::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 28px;
      transform: translateX(-50%);
    }

    #crosshair::after {
      top: 50%;
      left: 0;
      width: 28px;
      height: 2px;
      transform: translateY(-50%);
    }

    #gameOver {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 20;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.55);
    }

    #gameOver .panel {
      min-width: 280px;
      color: white;
      text-align: center;
      background: rgba(20, 20, 20, 0.9);
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    #gameOver h2 {
      margin: 0 0 14px;
      font-size: 28px;
    }

    #gameOver p {
      margin: 8px 0;
      font-size: 18px;
    }

    #restartBtn {
      margin-top: 16px;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #ffb703;
      color: #222;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #restartBtn:hover {
      background: #ffd166;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>得分: <span id="score">0</span></div>
      <div>未命中: <span id="missCount">0</span></div>
      <div>倒计时: <span id="timer">60</span></div>
      <div>存活鸭子数: <span id="activeDucks">0</span></div>
    </div>

    <div id="crosshair"></div>

    <div id="gameOver">
      <div class="panel">
        <h2>游戏结束</h2>
        <p>最终得分: <span id="finalScore">0</span></p>
        <p>命中率: <span id="finalHitRate">0%</span></p>
        <button id="restartBtn">重新开始</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const scoreEl = document.getElementById('score');
    const missCountEl = document.getElementById('missCount');
    const timerEl = document.getElementById('timer');
    const activeDucksEl = document.getElementById('activeDucks');
    const gameOverEl = document.getElementById('gameOver');
    const finalScoreEl = document.getElementById('finalScore');
    const finalHitRateEl = document.getElementById('finalHitRate');
    const restartBtn = document.getElementById('restartBtn');

    window.__3D_STATE__ = {
      modelLoaded: false,
      score: 0,
      missCount: 0,
      timeLeft: 60,
      activeDucks: 0,
      gameOver: false,
      duckPositions: [],
      hitRate: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 2.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.target.set(0, 2.5, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
    dirLight.position.set(5, 10, 8);
    scene.add(dirLight);

    const wallGeometry = new THREE.BoxGeometry(20, 10, 0.5);
    const wallMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const backWall = new THREE.Mesh(wallGeometry, wallMaterial);
    backWall.position.set(0, 4, -5);
    scene.add(backWall);

    const groundGeometry = new THREE.PlaneGeometry(40, 20);
    const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -2;
    scene.add(ground);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const clock = new THREE.Clock();

    let score = 0;
    let missCount = 0;
    let timeLeft = 60;
    let gameEnded = false;
    let timerInterval = null;

    let duckTemplate = null;
    const ducks = [];
    const duckSpeeds = [2, 3, 4, 3.5, 2.5];
    const duckHeights = [1, 2, 3, 4, 5];
    const DUCK_START_X = -12;
    const DUCK_END_X = 12;

    function updateHUD() {
      const activeDucks = ducks.filter(d => d.active).length;
      scoreEl.textContent = score;
      missCountEl.textContent = missCount;
      timerEl.textContent = timeLeft;
      activeDucksEl.textContent = activeDucks;
    }

    function update3DState() {
      const totalShots = score + missCount;
      const hitRate = totalShots > 0 ? score / totalShots : 0;

      window.__3D_STATE__.modelLoaded = !!duckTemplate;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.missCount = missCount;
      window.__3D_STATE__.timeLeft = timeLeft;
      window.__3D_STATE__.activeDucks = ducks.filter(d => d.active).length;
      window.__3D_STATE__.gameOver = gameEnded;
      window.__3D_STATE__.duckPositions = ducks.map(d => ({
        x: d.group.position.x,
        y: d.group.position.y,
        z: d.group.position.z
      }));
      window.__3D_STATE__.hitRate = hitRate;
    }

    function showGameOver() {
      const totalShots = score + missCount;
      const hitRate = totalShots > 0 ? score / totalShots : 0;
      finalScoreEl.textContent = score;
      finalHitRateEl.textContent = `${(hitRate * 100).toFixed(1)}%`;
      gameOverEl.style.display = 'flex';
    }

    function endGame() {
      if (gameEnded) return;
      gameEnded = true;
      if (timerInterval) clearInterval(timerInterval);
      showGameOver();
      updateHUD();
      update3DState();
    }

    function startTimer() {
      if (timerInterval) clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (gameEnded) return;
        timeLeft -= 1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          updateHUD();
          endGame();
          return;
        }
        updateHUD();
      }, 1000);
    }

    function createDuckInstance(index) {
      const duck = duckTemplate.clone(true);
      duck.scale.setScalar(0.8);

      const group = new THREE.Group();
      group.add(duck);
      group.position.set(DUCK_START_X + index * 2.5, duckHeights[index], 0);
      group.rotation.y = 0;

      scene.add(group);

      const data = {
        group,
        meshRoot: duck,
        speed: duckSpeeds[index],
        baseY: duckHeights[index],
        active: true,
        hit: false,
        falling: false,
        respawnAt: 0,
        fallStartTime: 0,
        startFallY: duckHeights[index],
        initialX: DUCK_START_X + index * 2.5
      };

      ducks.push(data);
    }

    function resetDuck(duck, index) {
      duck.group.position.set(DUCK_START_X - index * 1.5, duck.baseY, 0);
      duck.group.rotation.set(0, 0, 0);
      duck.meshRoot.rotation.set(0, 0, 0);
      duck.active = true;
      duck.hit = false;
      duck.falling = false;
      duck.respawnAt = 0;
      duck.fallStartTime = 0;
      duck.startFallY = duck.baseY;
      duck.group.visible = true;
    }

    function hitDuck(duck) {
      if (!duck.active || duck.hit || gameEnded) return;

      duck.hit = true;
      duck.active = false;
      duck.falling = true;
      duck.fallStartTime = performance.now() / 1000;
      duck.startFallY = duck.group.position.y;

      score += 1;
      updateHUD();
    }

    function onPointerDown(event) {
      if (gameEnded || !duckTemplate) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const activeTargets = ducks
        .filter(d => d.active && !d.hit)
        .map(d => d.group);

      const intersects = raycaster.intersectObjects(activeTargets, true);

      if (intersects.length > 0) {
        let targetDuck = null;
        let current = intersects[0].object;
        while (current) {
          targetDuck = ducks.find(d => d.group === current);
          if (targetDuck) break;
          current = current.parent;
        }

        if (targetDuck) {
          hitDuck(targetDuck);
          return;
        }
      }

      missCount += 1;
      updateHUD();
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    const loader = new GLTFLoader();
    loader.load(
      'assets/Duck.glb',
      (gltf) => {
        duckTemplate = gltf.scene;
        duckTemplate.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
          }
        });

        for (let i = 0; i < 5; i++) {
          createDuckInstance(i);
        }

        window.__3D_STATE__.modelLoaded = true;
        updateHUD();
        update3DState();
      },
      undefined,
      (error) => {
        console.error('Duck.glb 加载失败:', error);
      }
    );

    function restartGame() {
      score = 0;
      missCount = 0;
      timeLeft = 60;
      gameEnded = false;
      gameOverEl.style.display = 'none';

      ducks.forEach((duck, index) => {
        resetDuck(duck, index);
      });

      updateHUD();
      update3DState();
      startTimer();
    }

    restartBtn.addEventListener('click', restartGame);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    startTimer();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const now = performance.now() / 1000;

      for (let i = 0; i < ducks.length; i++) {
        const duck = ducks[i];

        if (duck.falling) {
          const elapsed = now - duck.fallStartTime;
          const t = Math.min(elapsed / 1.0, 1);

          duck.group.rotation.z = -Math.PI * 0.5 * t;
          duck.group.position.y = THREE.MathUtils.lerp(duck.startFallY, -2, t);

          if (t >= 1) {
            duck.falling = false;
            duck.group.visible = false;
            duck.respawnAt = now + 3;
          }
          continue;
        }

        if (!duck.active && duck.respawnAt > 0) {
          if (now >= duck.respawnAt && !gameEnded) {
            duck.group.visible = true;
            duck.group.position.set(DUCK_START_X, duck.baseY, 0);
            duck.group.rotation.set(0, 0, 0);
            duck.meshRoot.rotation.set(0, 0, 0);
            duck.active = true;
            duck.hit = false;
            duck.respawnAt = 0;
          }
          continue;
        }

        if (duck.active && !gameEnded) {
          duck.group.position.x += duck.speed * delta;
          duck.group.rotation.y = 0;

          if (duck.group.position.x > DUCK_END_X) {
            duck.group.position.x = DUCK_START_X;
            duck.group.position.y = duck.baseY;
            duck.group.rotation.z = 0;
          }
        }
      }

      updateHUD();
      update3DState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
