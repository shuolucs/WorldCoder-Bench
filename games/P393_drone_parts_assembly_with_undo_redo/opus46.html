<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drone Assembly</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#btn-undo, #btn-redo, #btn-reset {
    position: fixed;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s ease;
    z-index: 100;
    color: white;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#btn-undo {
    top: 20px;
    left: 20px;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

#btn-redo {
    top: 20px;
    left: 120px;
    background: linear-gradient(135deg, #f093fb, #f5576c);
}

#btn-reset {
    top: 20px;
    left: 220px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
}

#btn-undo:disabled, #btn-redo:disabled {
    background: #444;
    color: #888;
    cursor: not-allowed;
    opacity: 0.5;
}

#btn-undo:not(:disabled):hover, #btn-redo:not(:disabled):hover, #btn-reset:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

#hud-progress {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #e0e0ff;
    font-size: 18px;
    font-weight: bold;
    background: rgba(0,0,0,0.6);
    padding: 10px 25px;
    border-radius: 25px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 100;
    backdrop-filter: blur(10px);
}

#hud-tooltip {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 16px;
    background: rgba(0,0,0,0.7);
    padding: 8px 20px;
    border-radius: 20px;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
}

#hud-tooltip.visible {
    opacity: 1;
}

#hud-complete {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #00ff88;
    font-size: 42px;
    font-weight: bold;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s ease;
    text-shadow: 0 0 20px rgba(0,255,136,0.5), 0 0 40px rgba(0,255,136,0.3);
    text-align: center;
}

#hud-complete.visible {
    opacity: 1;
}

#warning-text {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #ff4444;
    font-size: 16px;
    font-weight: bold;
    background: rgba(255,0,0,0.15);
    padding: 8px 20px;
    border-radius: 20px;
    border: 1px solid rgba(255,0,0,0.3);
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
}

#warning-text.visible {
    opacity: 1;
}

.parts-label {
    position: fixed;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 14px;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    letter-spacing: 3px;
    text-transform: uppercase;
    z-index: 50;
    pointer-events: none;
}
</style>
</head>
<body>

<button id="btn-undo" disabled>⟲ Undo</button>
<button id="btn-redo" disabled>⟳ Redo</button>
<button id="btn-reset">↺ Reset</button>

<div id="hud-progress">Parts Assembled: 0/5</div>
<div id="hud-tooltip"></div>
<div id="hud-complete">🎉 Assembly Complete! 🎉</div>
<div id="warning-text">⚠ Place the frame first!</div>
<div class="parts-label">PARTS TRAY</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
    assembledParts: [],
    undoStack: [],
    redoStack: [],
    totalAssembled: 0,
    isComplete: false,
    hoveredPart: null,
    storkLoaded: false,
    animating: false,
    undoEnabled: false,
    redoEnabled: false
};

function updateState(updates) {
    Object.assign(window.__3D_STATE__, updates);
}

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.03);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.set(2048, 2048);
directionalLight.shadow.camera.near = 0.5;
directionalLight.shadow.camera.far = 50;
directionalLight.shadow.camera.left = -10;
directionalLight.shadow.camera.right = 10;
directionalLight.shadow.camera.top = 10;
directionalLight.shadow.camera.bottom = -10;
scene.add(directionalLight);

// Extra fill light
const fillLight = new THREE.PointLight(0x4466ff, 0.3, 20);
fillLight.position.set(-5, 3, -5);
scene.add(fillLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 3;
controls.maxDistance = 25;
controls.target.set(0, 1, 0);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(30, 30);
const groundMat = new THREE.MeshStandardMaterial({
    color: 0x222244,
    roughness: 0.8,
    metalness: 0.2
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x333366, 0x222244);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Assembly platform
const platformGeo = new THREE.CylinderGeometry(2.5, 2.8, 0.15, 32);
const platformMat = new THREE.MeshStandardMaterial({
    color: 0x334455,
    roughness: 0.3,
    metalness: 0.7
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.set(0, 0.075, 0);
platform.castShadow = true;
platform.receiveShadow = true;
scene.add(platform);

// Platform ring
const ringGeo = new THREE.TorusGeometry(2.6, 0.05, 8, 64);
const ringMat = new THREE.MeshStandardMaterial({
    color: 0x4488ff,
    emissive: 0x2244aa,
    emissiveIntensity: 0.5
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.16;
scene.add(ring);

// Parts tray shelf
const trayGeo = new THREE.BoxGeometry(1.5, 0.1, 8);
const trayMat = new THREE.MeshStandardMaterial({
    color: 0x2a2a4a,
    roughness: 0.5,
    metalness: 0.5
});
const tray = new THREE.Mesh(trayGeo, trayMat);
tray.position.set(5, 0.35, 0);
tray.castShadow = true;
tray.receiveShadow = true;
scene.add(tray);

// Tray back wall
const trayWallGeo = new THREE.BoxGeometry(0.1, 2, 8);
const trayWall = new THREE.Mesh(trayWallGeo, trayMat.clone());
trayWall.position.set(5.75, 1.35, 0);
scene.add(trayWall);

// --- Stork/Mascot ---
let storkModel = null;
const loader = new GLTFLoader();
loader.load(
    'stork.glb',
    (gltf) => {
        storkModel = gltf.scene;
        storkModel.scale.set(0.3, 0.3, 0.3);
        storkModel.position.set(0, 4, 0);
        storkModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
            }
        });
        scene.add(storkModel);
        updateState({ storkLoaded: true });
    },
    undefined,
    (error) => {
        console.warn('Could not load stork.glb:', error);
        // Create a placeholder bird
        const birdGroup = new THREE.Group();
        const bodyGeo = new THREE.ConeGeometry(0.3, 1, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x222244, emissiveIntensity: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.z = Math.PI / 2;
        birdGroup.add(body);

        const wingGeo = new THREE.BoxGeometry(0.1, 0.6, 0.8);
        const wingMat = new THREE.MeshStandardMaterial({ color: 0xccccff });
        const wingL = new THREE.Mesh(wingGeo, wingMat);
        wingL.position.set(0, 0.3, 0);
        birdGroup.add(wingL);
        const wingR = new THREE.Mesh(wingGeo, wingMat);
        wingR.position.set(0, -0.3, 0);
        birdGroup.add(wingR);

        birdGroup.scale.set(0.3, 0.3, 0.3);
        birdGroup.position.set(0, 4, 0);
        storkModel = birdGroup;
        scene.add(storkModel);
        updateState({ storkLoaded: true });
    }
);

// --- Part Definitions ---
const partDefs = [
    {
        id: 'frame',
        name: 'Frame',
        color: 0x555555,
        emissiveColor: 0x333333,
        trayPos: new THREE.Vector3(5, 0.5, -3),
        assemblyPos: new THREE.Vector3(0, 0.5, 0),
        createGeometry: () => new THREE.BoxGeometry(2, 0.2, 2),
        requiresFrame: false
    },
    {
        id: 'motor_fl',
        name: 'Motor FL (Front-Left)',
        color: 0xff3333,
        emissiveColor: 0x661111,
        trayPos: new THREE.Vector3(5, 0.5, -1.5),
        assemblyPos: new THREE.Vector3(-0.8, 0.8, -0.8),
        createGeometry: () => new THREE.CylinderGeometry(0.2, 0.2, 0.5, 16),
        requiresFrame: true
    },
    {
        id: 'motor_fr',
        name: 'Motor FR (Front-Right)',
        color: 0x3333ff,
        emissiveColor: 0x111166,
        trayPos: new THREE.Vector3(5, 0.5, 0),
        assemblyPos: new THREE.Vector3(0.8, 0.8, -0.8),
        createGeometry: () => new THREE.CylinderGeometry(0.2, 0.2, 0.5, 16),
        requiresFrame: true
    },
    {
        id: 'motor_bl',
        name: 'Motor BL (Back-Left)',
        color: 0x33cc33,
        emissiveColor: 0x116611,
        trayPos: new THREE.Vector3(5, 0.5, 1.5),
        assemblyPos: new THREE.Vector3(-0.8, 0.8, 0.8),
        createGeometry: () => new THREE.CylinderGeometry(0.2, 0.2, 0.5, 16),
        requiresFrame: true
    },
    {
        id: 'motor_br',
        name: 'Motor BR (Back-Right)',
        color: 0xffcc00,
        emissiveColor: 0x665500,
        trayPos: new THREE.Vector3(5, 0.5, 3),
        assemblyPos: new THREE.Vector3(0.8, 0.8, 0.8),
        createGeometry: () => new THREE.CylinderGeometry(0.2, 0.2, 0.5, 16),
        requiresFrame: true
    }
];

// --- Ghost Outlines ---
const ghosts = {};
partDefs.forEach(def => {
    const geo = def.createGeometry();
    const mat = new THREE.MeshBasicMaterial({
        color: def.color,
        wireframe: true,
        transparent: true,
        opacity: 0.15
    });
    const ghost = new THREE.Mesh(geo, mat);
    ghost.position.copy(def.assemblyPos);
    scene.add(ghost);
    ghosts[def.id] = ghost;
});

// --- Create Parts ---
const parts = {};
const partMeshes = [];

partDefs.forEach(def => {
    const geo = def.createGeometry();
    const mat = new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: 0.4,
        metalness: 0.6,
        emissive: 0x000000,
        emissiveIntensity: 0
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(def.trayPos);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    mesh.userData = {
        id: def.id,
        name: def.name,
        trayPos: def.trayPos.clone(),
        assemblyPos: def.assemblyPos.clone(),
        assembled: false,
        requiresFrame: def.requiresFrame,
        originalColor: def.color,
        emissiveColor: def.emissiveColor
    };
    scene.add(mesh);
    parts[def.id] = mesh;
    partMeshes.push(mesh);

    // Add propeller visual on top of motors
    if (def.id !== 'frame') {
        const propGeo = new THREE.BoxGeometry(0.6, 0.02, 0.08);
        const propMat = new THREE.MeshStandardMaterial({
            color: 0xaaaaaa,
            roughness: 0.3,
            metalness: 0.8,
            transparent: true,
            opacity: 0.7
        });
        const prop = new THREE.Mesh(propGeo, propMat);
        prop.position.y = 0.26;
        mesh.add(prop);

        const prop2 = new THREE.Mesh(propGeo, propMat);
        prop2.position.y = 0.26;
        prop2.rotation.y = Math.PI / 2;
        mesh.add(prop2);
    }

    // Add label on tray
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 256;
    labelCanvas.height = 64;
    const ctx = labelCanvas.getContext('2d');
    ctx.fillStyle = 'rgba(0,0,0,0)';
    ctx.fillRect(0, 0, 256, 64);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(def.name.split(' ')[0], 128, 40);
    const labelTex = new THREE.CanvasTexture(labelCanvas);
    const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true, opacity: 0.6 });
    const label = new THREE.Sprite(labelMat);
    label.position.set(def.trayPos.x, def.trayPos.y + 0.8, def.trayPos.z);
    label.scale.set(1.2, 0.3, 1);
    label.userData.isLabel = true;
    label.userData.partId = def.id;
    scene.add(label);
});

// --- Animation System ---
const animations = [];

function animatePart(mesh, targetPos, duration, onComplete) {
    const startPos = mesh.position.clone();
    const startTime = performance.now();
    updateState({ animating: true });

    animations.push({
        mesh,
        startPos,
        targetPos: targetPos.clone(),
        startTime,
        duration: duration * 1000,
        onComplete
    });
}

function updateAnimations(now) {
    for (let i = animations.length - 1; i >= 0; i--) {
        const anim = animations[i];
        let t = (now - anim.startTime) / anim.duration;
        if (t >= 1) {
            t = 1;
            anim.mesh.position.copy(anim.targetPos);
            animations.splice(i, 1);
            if (anim.onComplete) anim.onComplete();
            if (animations.length === 0) {
                updateState({ animating: false });
            }
        } else {
            // Ease in-out cubic
            t = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            // Add arc
            const arcHeight = 2;
            const arc = Math.sin(t * Math.PI) * arcHeight;
            anim.mesh.position.lerpVectors(anim.startPos, anim.targetPos, t);
            anim.mesh.position.y += arc;
        }
    }
}

// --- Assembly Logic ---
function isFrameAssembled() {
    return window.__3D_STATE__.assembledParts.includes('frame');
}

function assemblePart(partId, addToUndo = true) {
    const mesh = parts[partId];
    if (!mesh || mesh.userData.assembled || window.__3D_STATE__.animating) return;

    if (mesh.userData.requiresFrame && !isFrameAssembled()) {
        showWarning();
        return;
    }

    mesh.userData.assembled = true;

    if (addToUndo) {
        window.__3D_STATE__.undoStack.push(partId);
        window.__3D_STATE__.redoStack = [];
    }

    window.__3D_STATE__.assembledParts.push(partId);
    window.__3D_STATE__.totalAssembled = window.__3D_STATE__.assembledParts.length;

    animatePart(mesh, mesh.userData.assemblyPos, 0.5, () => {
        // Hide ghost
        if (ghosts[partId]) ghosts[partId].visible = false;

        updateButtons();
        updateProgress();
        checkComplete();
    });

    updateButtons();
    updateProgress();
}

function unassemblePart(partId) {
    const mesh = parts[partId];
    if (!mesh || !mesh.userData.assembled || window.__3D_STATE__.animating) return;

    // If unassembling frame, check if motors are still assembled
    if (partId === 'frame') {
        const motorsAssembled = window.__3D_STATE__.assembledParts.filter(id => id !== 'frame');
        if (motorsAssembled.length > 0) {
            // Need to unassemble motors first - undo all motors then frame
            return;
        }
    }

    mesh.userData.assembled = false;

    const idx = window.__3D_STATE__.assembledParts.indexOf(partId);
    if (idx > -1) window.__3D_STATE__.assembledParts.splice(idx, 1);
    window.__3D_STATE__.totalAssembled = window.__3D_STATE__.assembledParts.length;

    // Show ghost again
    if (ghosts[partId]) ghosts[partId].visible = true;

    animatePart(mesh, mesh.userData.trayPos, 0.5, () => {
        updateButtons();
        updateProgress();
        hideComplete();
    });

    updateButtons();
    updateProgress();
    hideComplete();
}

// --- Undo/Redo ---
function undo() {
    if (window.__3D_STATE__.undoStack.length === 0 || window.__3D_STATE__.animating) return;

    const partId = window.__3D_STATE__.undoStack.pop();

    // If it's the frame and motors are assembled, undo motors first
    if (partId === 'frame') {
        // This shouldn't happen if we enforce order, but handle gracefully
    }

    window.__3D_STATE__.redoStack.push(partId);
    unassemblePart(partId);
    updateButtons();
}

function redo() {
    if (window.__3D_STATE__.redoStack.length === 0 || window.__3D_STATE__.animating) return;

    const partId = window.__3D_STATE__.redoStack.pop();
    assemblePart(partId, false);
    window.__3D_STATE__.undoStack.push(partId);
    updateButtons();
}

// --- UI Updates ---
function updateButtons() {
    const undoBtn = document.getElementById('btn-undo');
    const redoBtn = document.getElementById('btn-redo');

    const undoEnabled = window.__3D_STATE__.undoStack.length > 0 && !window.__3D_STATE__.animating;
    const redoEnabled = window.__3D_STATE__.redoStack.length > 0 && !window.__3D_STATE__.animating;

    undoBtn.disabled = !undoEnabled;
    redoBtn.disabled = !redoEnabled;

    updateState({
        undoEnabled,
        redoEnabled
    });
}

function updateProgress() {
    const el = document.getElementById('hud-progress');
    el.textContent = `Parts Assembled: ${window.__3D_STATE__.totalAssembled}/5`;
}

function checkComplete() {
    if (window.__3D_STATE__.totalAssembled === 5) {
        updateState({ isComplete: true });
        document.getElementById('hud-complete').classList.add('visible');
        startCelebration();
    }
}

function hideComplete() {
    updateState({ isComplete: false });
    document.getElementById('hud-complete').classList.remove('visible');
    stopCelebration();
}

let celebrating = false;
function startCelebration() {
    celebrating = true;
}
function stopCelebration() {
    celebrating = false;
    // Reset scales
    Object.values(parts).forEach(mesh => {
        mesh.scale.set(1, 1, 1);
    });
}

let warningTimeout = null;
function showWarning() {
    const el = document.getElementById('warning-text');
    el.classList.add('visible');
    if (warningTimeout) clearTimeout(warningTimeout);
    warningTimeout = setTimeout(() => {
        el.classList.remove('visible');
    }, 2000);
}

function resetAll() {
    if (window.__3D_STATE__.animating) return;

    stopCelebration();

    // Unassemble all parts in reverse order
    const assembled = [...window.__3D_STATE__.assembledParts].reverse();
    window.__3D_STATE__.assembledParts = [];
    window.__3D_STATE__.undoStack = [];
    window.__3D_STATE__.redoStack = [];
    window.__3D_STATE__.totalAssembled = 0;
    window.__3D_STATE__.isComplete = false;

    assembled.forEach(partId => {
        const mesh = parts[partId];
        mesh.userData.assembled = false;
        if (ghosts[partId]) ghosts[partId].visible = true;
        animatePart(mesh, mesh.userData.trayPos, 0.5);
    });

    updateButtons();
    updateProgress();
    hideComplete();
}

// --- Raycasting / Interaction ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
}

function onClick(event) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(partMeshes, true);

    if (intersects.length > 0) {
        let target = intersects[0].object;
        // Walk up to find the part mesh
        while (target && !target.userData.id) {
            target = target.parent;
        }
        if (target && target.userData.id && !target.userData.assembled) {
            assemblePart(target.userData.id);
        }
    }
}

function updateHover() {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(partMeshes, true);

    const tooltip = document.getElementById('hud-tooltip');

    // Reset previous hover
    if (hoveredMesh) {
        hoveredMesh.material.emissive.setHex(0x000000);
        hoveredMesh.material.emissiveIntensity = 0;
        hoveredMesh = null;
        updateState({ hoveredPart: null });
    }

    if (intersects.length > 0) {
        let target = intersects[0].object;
        while (target && !target.userData.id) {
            target = target.parent;
        }
        if (target && target.userData.id) {
            hoveredMesh = target;
            hoveredMesh.material.emissive.setHex(hoveredMesh.userData.emissiveColor);
            hoveredMesh.material.emissiveIntensity = 0.8;

            tooltip.textContent = hoveredMesh.userData.name + (hoveredMesh.userData.assembled ? ' (Assembled)' : ' (Click to assemble)');
            tooltip.classList.add('visible');
            updateState({ hoveredPart: hoveredMesh.userData.id });

            document.body.style.cursor = hoveredMesh.userData.assembled ? 'default' : 'pointer';
        } else {
            tooltip.classList.remove('visible');
            document.body.style.cursor = 'default';
        }
    } else {
        tooltip.classList.remove('visible');
        document.body.style.cursor = 'default';
    }
}

// --- Event Listeners ---
window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

document.getElementById('btn-undo').addEventListener('click', undo);
document.getElementById('btn-redo').addEventListener('click', redo);
document.getElementById('btn-reset').addEventListener('click', resetAll);

window.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') {
        e.preventDefault();
        undo();
    }
    if (e.ctrlKey && e.key === 'y') {
        e.preventDefault();
        redo();
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Render Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    const elapsed = clock.getElapsedTime();

    controls.update();

    // Stork rotation
    if (storkModel) {
        storkModel.rotation.y = elapsed * 0.5;
        storkModel.position.y = 4 + Math.sin(elapsed * 1.5) * 0.2;
    }

    // Ring pulse
    ring.material.emissiveIntensity = 0.3 + Math.sin(elapsed * 2) * 0.2;

    // Ghost outlines pulse
    Object.values(ghosts).forEach(ghost => {
        if (ghost.visible) {
            ghost.material.opacity = 0.1 + Math.sin(elapsed * 3) * 0.05;
        }
    });

    // Update animations
    updateAnimations(now);

    // Update hover
    updateHover();

    // Celebration animation
    if (celebrating) {
        Object.values(parts).forEach((mesh, i) => {
            const s = 1 + Math.sin(elapsed * 4 + i * 1.2) * 0.08;
            mesh.scale.set(s, s, s);
        });

        // Spin propellers fast
        Object.values(parts).forEach(mesh => {
            if (mesh.userData.id !== 'frame' && mesh.userData.assembled) {
                mesh.children.forEach(child => {
                    child.rotation.y += 0.3;
                });
            }
        });
    } else {
        // Slow propeller spin for assembled motors
        Object.values(parts).forEach(mesh => {
            if (mesh.userData.id !== 'frame' && mesh.userData.assembled) {
                mesh.children.forEach(child => {
                    child.rotation.y += 0.05;
                });
            }
        });
    }

    renderer.render(scene, camera);
}

animate();
updateButtons();
updateProgress();
</script>
