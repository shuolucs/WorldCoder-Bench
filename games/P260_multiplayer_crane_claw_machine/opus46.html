<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multiplayer Crane Claw Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
canvas { display: block; }

#hud {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,255,255,0.5);
}

#player-scores {
  position: absolute;
  top: 15px; left: 15px;
  font-size: 16px;
  line-height: 1.8;
}

#current-player {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 20px;
  font-weight: bold;
  text-align: center;
  padding: 8px 20px;
  border-radius: 8px;
  background: rgba(0,0,0,0.5);
  border: 2px solid;
}

#prizes-left {
  position: absolute;
  top: 15px; right: 15px;
  font-size: 16px;
}

#grab-stats {
  position: absolute;
  bottom: 15px; right: 15px;
  font-size: 14px;
}

#switch-btn {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  pointer-events: all;
  cursor: pointer;
  font-family: 'Courier New', monospace;
  font-size: 18px;
  font-weight: bold;
  padding: 12px 30px;
  background: linear-gradient(180deg, #ff00ff, #8800aa);
  color: #fff;
  border: 3px solid #ff66ff;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  text-shadow: 0 0 10px #ff00ff;
  box-shadow: 0 0 20px rgba(255,0,255,0.4), inset 0 0 10px rgba(255,255,255,0.1);
  transition: all 0.2s;
}

#switch-btn:hover {
  background: linear-gradient(180deg, #ff44ff, #aa22cc);
  box-shadow: 0 0 30px rgba(255,0,255,0.7), inset 0 0 15px rgba(255,255,255,0.2);
  transform: translateX(-50%) scale(1.05);
}

#switch-btn:active {
  transform: translateX(-50%) scale(0.95);
}

#game-over {
  display: none;
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  pointer-events: all;
  z-index: 100;
}

#game-over h1 {
  font-size: 60px;
  color: #ff0;
  text-shadow: 0 0 30px #ff0, 0 0 60px #ff8800;
  margin-bottom: 30px;
  animation: pulse 1s ease-in-out infinite alternate;
}

#game-over .scores {
  font-size: 24px;
  color: #fff;
  line-height: 2;
  text-align: center;
}

#game-over .winner {
  font-size: 32px;
  color: #0f0;
  margin-top: 20px;
  text-shadow: 0 0 20px #0f0;
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.05); }
}

#instructions {
  position: absolute;
  bottom: 70px;
  left: 15px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  line-height: 1.6;
  pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
  <div id="player-scores">
    <div id="p1-score" style="color: #00ffff;">Player 1 Score: 0</div>
    <div id="p2-score" style="color: #ff00ff;">Player 2 Score: 0</div>
  </div>
  <div id="current-player">Current Player: 1</div>
  <div id="prizes-left">Prizes Left: 7</div>
  <div id="grab-stats">Grabs: 0 / Successful: 0</div>
  <button id="switch-btn">Switch Player</button>
  <div id="instructions">
    P1: WASD + Space<br>
    P2: Arrows + Space
  </div>
</div>

<div id="game-over">
  <h1>GAME OVER</h1>
  <div class="scores">
    <div id="final-p1">Player 1: 0</div>
    <div id="final-p2">Player 2: 0</div>
  </div>
  <div class="winner" id="winner-text"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// State
window.__3D_STATE__ = {
  clawX: 0,
  clawZ: 0,
  clawY: 5,
  clawState: 'idle',
  currentPlayer: 1,
  player1Score: 0,
  player2Score: 0,
  prizesRemaining: 7,
  foxGrabbed: false,
  totalGrabs: 0,
  successfulGrabs: 0,
  lastGrabbedPrize: null
};

const state = window.__3D_STATE__;

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 5;
controls.maxDistance = 25;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Extra lights for ambiance
const pointLight1 = new THREE.PointLight(0x00ffff, 0.3, 20);
pointLight1.position.set(-4, 6, -4);
scene.add(pointLight1);

const pointLight2 = new THREE.PointLight(0xff00ff, 0.3, 20);
pointLight2.position.set(4, 6, 4);
scene.add(pointLight2);

// Floor
const floorGeo = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.01;
floor.receiveShadow = true;
scene.add(floor);

// Glass Cabinet
const cabinetGroup = new THREE.Group();
cabinetGroup.position.set(0, 3, 0);

// Cabinet edges using EdgesGeometry
const cabinetGeo = new THREE.BoxGeometry(8, 6, 8);
const cabinetMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.15,
  roughness: 0.05,
  metalness: 0.1,
  transmission: 0.9,
  thickness: 0.1,
  side: THREE.DoubleSide,
  depthWrite: false
});
const cabinet = new THREE.Mesh(cabinetGeo, cabinetMat);
cabinet.renderOrder = 1;
cabinetGroup.add(cabinet);

// Cabinet wireframe
const edgesGeo = new THREE.EdgesGeometry(cabinetGeo);
const edgesMat = new THREE.LineBasicMaterial({ color: 0x44aaff, linewidth: 1 });
const cabinetEdges = new THREE.LineSegments(edgesGeo, edgesMat);
cabinetGroup.add(cabinetEdges);

scene.add(cabinetGroup);

// Cabinet floor (inner)
const innerFloorGeo = new THREE.PlaneGeometry(7.9, 7.9);
const innerFloorMat = new THREE.MeshStandardMaterial({ color: 0x3a3a5a, roughness: 0.9 });
const innerFloor = new THREE.Mesh(innerFloorGeo, innerFloorMat);
innerFloor.rotation.x = -Math.PI / 2;
innerFloor.position.y = 0.01;
innerFloor.receiveShadow = true;
scene.add(innerFloor);

// Prizes
const prizePositions = [
  { x: -2, y: 0.25, z: -2, color: 0xff0000, name: 'red' },
  { x: -1, y: 0.25, z: 1, color: 0x0000ff, name: 'blue' },
  { x: 0.5, y: 0.25, z: -1, color: 0x00ff00, name: 'green' },
  { x: 1.5, y: 0.25, z: 2, color: 0xffff00, name: 'yellow' },
  { x: -0.5, y: 0.25, z: 0, color: 0x9900ff, name: 'purple' },
  { x: 2, y: 0.25, z: -1.5, color: 0xff8800, name: 'orange' }
];

const prizes = [];

prizePositions.forEach(p => {
  const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
  const mat = new THREE.MeshStandardMaterial({
    color: p.color,
    roughness: 0.3,
    metalness: 0.2,
    emissive: p.color,
    emissiveIntensity: 0.15
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(p.x, p.y, p.z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { type: 'cube', name: p.name, grabbed: false, points: 10 };
  scene.add(mesh);
  prizes.push(mesh);
});

// Fox prize placeholder (golden cube until model loads)
const foxPrizeGroup = new THREE.Group();
foxPrizeGroup.position.set(0, 0.25, 0.5);
foxPrizeGroup.userData = { type: 'fox', name: 'fox', grabbed: false, points: 50 };

const foxPlaceholder = new THREE.Mesh(
  new THREE.BoxGeometry(0.5, 0.5, 0.5),
  new THREE.MeshStandardMaterial({
    color: 0xffd700,
    roughness: 0.2,
    metalness: 0.8,
    emissive: 0xffd700,
    emissiveIntensity: 0.3
  })
);
foxPlaceholder.castShadow = true;
foxPrizeGroup.add(foxPlaceholder);

// Golden glow for fox
const foxGlow = new THREE.PointLight(0xffd700, 0.5, 3);
foxGlow.position.set(0, 0.5, 0);
foxPrizeGroup.add(foxGlow);

scene.add(foxPrizeGroup);
prizes.push(foxPrizeGroup);

// Load Fox model
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Fox.glb',
  (gltf) => {
    const fox = gltf.scene;
    fox.scale.set(0.02, 0.02, 0.02);
    fox.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
        // Make it golden
        if (child.material) {
          child.material = child.material.clone();
          child.material.color.set(0xffd700);
          child.material.emissive = new THREE.Color(0xffd700);
          child.material.emissiveIntensity = 0.2;
          child.material.metalness = 0.6;
          child.material.roughness = 0.3;
        }
      }
    });
    foxPrizeGroup.remove(foxPlaceholder);
    foxPrizeGroup.add(fox);

    // Animation mixer
    if (gltf.animations.length > 0) {
      const mixer = new THREE.AnimationMixer(fox);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play();
      foxPrizeGroup.userData.mixer = mixer;
    }
  },
  undefined,
  (err) => {
    console.warn('Fox model failed to load, using placeholder:', err);
  }
);

// Crane Mechanism
const craneGroup = new THREE.Group();

// Horizontal rail (X axis) at y=5.5
const hRailGeo = new THREE.BoxGeometry(7.5, 0.1, 0.15);
const railMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
const hRail = new THREE.Mesh(hRailGeo, railMat);
hRail.position.set(0, 5.5, 0);
hRail.castShadow = true;
craneGroup.add(hRail);

// Vertical rail (Z axis) - moves along X
const vRailGroup = new THREE.Group();
vRailGroup.position.set(0, 5.5, 0);

const vRailGeo = new THREE.BoxGeometry(0.15, 0.1, 7.5);
const vRail = new THREE.Mesh(vRailGeo, railMat);
vRail.castShadow = true;
vRailGroup.add(vRail);

craneGroup.add(vRailGroup);

// Claw assembly
const clawAssembly = new THREE.Group();
clawAssembly.position.set(0, 5, 0);

// Rope
const ropeGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 8);
const ropeMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.5 });
const rope = new THREE.Mesh(ropeGeo, ropeMat);
rope.position.y = -0.25;
clawAssembly.add(rope);

// Claw hub
const hubGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.15, 8);
const hubMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7, roughness: 0.3 });
const hub = new THREE.Mesh(hubGeo, hubMat);
hub.position.y = -0.55;
clawAssembly.add(hub);

// Claw prongs (3)
const clawProngs = [];
for (let i = 0; i < 3; i++) {
  const prongGroup = new THREE.Group();
  const angle = (i / 3) * Math.PI * 2;
  prongGroup.position.set(Math.cos(angle) * 0.1, -0.6, Math.sin(angle) * 0.1);
  prongGroup.rotation.y = -angle;

  const prongGeo = new THREE.BoxGeometry(0.06, 0.4, 0.06);
  const prongMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.7, roughness: 0.3 });
  const prong = new THREE.Mesh(prongGeo, prongMat);
  prong.position.y = -0.2;
  prong.castShadow = true;
  prongGroup.add(prong);

  // Tip
  const tipGeo = new THREE.BoxGeometry(0.08, 0.1, 0.08);
  const tip = new THREE.Mesh(tipGeo, prongMat);
  tip.position.y = -0.45;
  prongGroup.add(tip);

  clawAssembly.add(prongGroup);
  clawProngs.push(prongGroup);
}

craneGroup.add(clawAssembly);
scene.add(craneGroup);

// Drop zone indicator
const dropZoneGeo = new THREE.PlaneGeometry(2, 2);
const dropZoneMat = new THREE.MeshStandardMaterial({
  color: 0x00ff00,
  transparent: true,
  opacity: 0.3,
  emissive: 0x00ff00,
  emissiveIntensity: 0.2,
  side: THREE.DoubleSide
});
const dropZone = new THREE.Mesh(dropZoneGeo, dropZoneMat);
dropZone.rotation.x = -Math.PI / 2;
dropZone.position.set(5, 0.02, 0);
scene.add(dropZone);

// Drop zone label
const dropZoneBox = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.5, 2),
  new THREE.MeshStandardMaterial({ color: 0x004400, transparent: true, opacity: 0.5 })
);
dropZoneBox.position.set(5, 0.25, 0);
scene.add(dropZoneBox);

// Input
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Claw state machine
let clawAnimTime = 0;
let clawStartY = 5;
let grabbedPrize = null;
const DESCEND_TIME = 1.5;
const ASCEND_TIME = 1.5;
const GRAB_TIME = 0.3;

function startDrop() {
  if (state.clawState !== 'idle') return;
  state.clawState = 'descending';
  state.totalGrabs++;
  clawAnimTime = 0;
  clawStartY = state.clawY;
}

function updateClaw(dt) {
  const speed = 0.05;

  // Movement
  if (state.clawState === 'idle') {
    if (state.currentPlayer === 1) {
      if (keys['KeyA']) state.clawX = Math.max(-3.5, state.clawX - speed);
      if (keys['KeyD']) state.clawX = Math.min(3.5, state.clawX + speed);
      if (keys['KeyW']) state.clawZ = Math.max(-3.5, state.clawZ - speed);
      if (keys['KeyS']) state.clawZ = Math.min(3.5, state.clawZ + speed);
    }
    if (state.currentPlayer === 2) {
      if (keys['ArrowLeft']) state.clawX = Math.max(-3.5, state.clawX - speed);
      if (keys['ArrowRight']) state.clawX = Math.min(3.5, state.clawX + speed);
      if (keys['ArrowUp']) state.clawZ = Math.max(-3.5, state.clawZ - speed);
      if (keys['ArrowDown']) state.clawZ = Math.min(3.5, state.clawZ + speed);
    }

    if (keys['Space']) {
      startDrop();
    }
  }

  // Clamp
  state.clawX = Math.max(-3.5, Math.min(3.5, state.clawX));
  state.clawZ = Math.max(-3.5, Math.min(3.5, state.clawZ));

  // State machine
  clawAnimTime += dt;

  if (state.clawState === 'descending') {
    const t = Math.min(clawAnimTime / DESCEND_TIME, 1);
    const eased = t * t * (3 - 2 * t); // smoothstep
    state.clawY = clawStartY + (0.5 - clawStartY) * eased;

    if (t >= 1) {
      state.clawState = 'grabbing';
      clawAnimTime = 0;
      // Check for prize
      checkGrab();
    }
  } else if (state.clawState === 'grabbing') {
    const t = Math.min(clawAnimTime / GRAB_TIME, 1);
    // Close prongs
    const closeAngle = THREE.MathUtils.degToRad(15) * t;
    clawProngs.forEach((p, i) => {
      const baseAngle = (i / 3) * Math.PI * 2;
      p.rotation.z = closeAngle;
    });

    if (t >= 1) {
      state.clawState = 'ascending';
      clawAnimTime = 0;
    }
  } else if (state.clawState === 'ascending') {
    const t = Math.min(clawAnimTime / ASCEND_TIME, 1);
    const eased = t * t * (3 - 2 * t);
    state.clawY = 0.5 + (5 - 0.5) * eased;

    // Move grabbed prize with claw
    if (grabbedPrize) {
      grabbedPrize.position.x = state.clawX;
      grabbedPrize.position.y = state.clawY - 0.8;
      grabbedPrize.position.z = state.clawZ;
    }

    if (t >= 1) {
      state.clawState = 'returning';
      clawAnimTime = 0;
      // Score
      if (grabbedPrize) {
        const pts = grabbedPrize.userData.points;
        if (state.currentPlayer === 1) {
          state.player1Score += pts;
        } else {
          state.player2Score += pts;
        }
        state.successfulGrabs++;
        state.lastGrabbedPrize = grabbedPrize.userData.name;
        if (grabbedPrize.userData.name === 'fox') {
          state.foxGrabbed = true;
        }
        grabbedPrize.visible = false;
        grabbedPrize.userData.grabbed = true;
        state.prizesRemaining--;
        grabbedPrize = null;

        if (state.prizesRemaining <= 0) {
          showGameOver();
        }
      }
    }
  } else if (state.clawState === 'returning') {
    // Open prongs back
    const t = Math.min(clawAnimTime / 0.3, 1);
    const closeAngle = THREE.MathUtils.degToRad(15) * (1 - t);
    clawProngs.forEach(p => {
      p.rotation.z = closeAngle;
    });

    if (t >= 1) {
      state.clawState = 'idle';
      clawAnimTime = 0;
      clawProngs.forEach(p => { p.rotation.z = 0; });
    }
  }

  // Ensure no NaN
  if (isNaN(state.clawX)) state.clawX = 0;
  if (isNaN(state.clawZ)) state.clawZ = 0;
  if (isNaN(state.clawY)) state.clawY = 5;

  // Update crane visuals
  vRailGroup.position.x = state.clawX;
  clawAssembly.position.set(state.clawX, state.clawY, state.clawZ);

  // Update rope length
  const ropeLen = 5.5 - state.clawY;
  rope.scale.y = Math.max(0.1, ropeLen / 0.5);
  rope.position.y = ropeLen / 2 * -1 + (5.5 - state.clawY) / 2;
  // Recalculate rope position
  const halfRope = ropeLen / 2;
  rope.position.y = halfRope * -1 + (5.5 - state.clawY);
  rope.scale.y = ropeLen / 0.5;
  rope.position.y = -(ropeLen / 2) + (5.5 - state.clawY);

  // Simpler approach: rope from claw top to rail
  const topY = 5.5;
  const clawTopY = state.clawY;
  const ropeLenCalc = topY - clawTopY;
  if (ropeLenCalc > 0.01) {
    rope.visible = true;
    rope.scale.y = ropeLenCalc / 0.5;
    rope.position.set(0, ropeLenCalc / 2, 0);
  } else {
    rope.visible = false;
  }

  // Hub and prongs relative to clawAssembly (already positioned)
  hub.position.y = -0.05;
  clawProngs.forEach((p, i) => {
    const angle = (i / 3) * Math.PI * 2;
    p.position.set(Math.cos(angle) * 0.1, -0.1, Math.sin(angle) * 0.1);
  });
}

function checkGrab() {
  let closestDist = Infinity;
  let closestPrize = null;

  for (const prize of prizes) {
    if (prize.userData.grabbed || !prize.visible) continue;
    const dx = prize.position.x - state.clawX;
    const dz = prize.position.z - state.clawZ;
    const dist = Math.sqrt(dx * dx + dz * dz);
    if (dist < 0.8 && dist < closestDist) {
      closestDist = dist;
      closestPrize = prize;
    }
  }

  if (closestPrize) {
    grabbedPrize = closestPrize;
  }
}

// UI Updates
function updateUI() {
  document.getElementById('p1-score').textContent = `Player 1 Score: ${state.player1Score}`;
  document.getElementById('p2-score').textContent = `Player 2 Score: ${state.player2Score}`;

  const cpEl = document.getElementById('current-player');
  cpEl.textContent = `Current Player: ${state.currentPlayer}`;
  cpEl.style.borderColor = state.currentPlayer === 1 ? '#00ffff' : '#ff00ff';
  cpEl.style.color = state.currentPlayer === 1 ? '#00ffff' : '#ff00ff';

  document.getElementById('prizes-left').textContent = `Prizes Left: ${state.prizesRemaining}`;
  document.getElementById('grab-stats').textContent = `Grabs: ${state.totalGrabs} / Successful: ${state.successfulGrabs}`;
}

function showGameOver() {
  const el = document.getElementById('game-over');
  el.style.display = 'flex';
  document.getElementById('final-p1').textContent = `Player 1: ${state.player1Score}`;
  document.getElementById('final-p2').textContent = `Player 2: ${state.player2Score}`;

  const winnerEl = document.getElementById('winner-text');
  if (state.player1Score > state.player2Score) {
    winnerEl.textContent = '🏆 Player 1 Wins! 🏆';
    winnerEl.style.color = '#00ffff';
  } else if (state.player2Score > state.player1Score) {
    winnerEl.textContent = '🏆 Player 2 Wins! 🏆';
    winnerEl.style.color = '#ff00ff';
  } else {
    winnerEl.textContent = "It's a Tie!";
    winnerEl.style.color = '#ffff00';
  }
}

// Switch player button
document.getElementById('switch-btn').addEventListener('click', () => {
  if (state.clawState === 'idle') {
    state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
    updateUI();
  }
});

// Particles for ambiance
const particleCount = 50;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  particlePositions[i * 3] = (Math.random() - 0.5) * 7;
  particlePositions[i * 3 + 1] = Math.random() * 5 + 0.5;
  particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 7;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 0.05,
  transparent: true,
  opacity: 0.4
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Animation loop
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  updateClaw(dt);
  updateUI();

  // Animate fox
  if (foxPrizeGroup.userData.mixer) {
    foxPrizeGroup.userData.mixer.update(dt);
  }

  // Rotate prizes slightly
  prizes.forEach(p => {
    if (!p.userData.grabbed && p.visible && p.userData.type === 'cube') {
      p.rotation.y += dt * 0.5;
    }
  });

  // Fox glow pulse
  if (foxGlow && !state.foxGrabbed) {
    foxGlow.intensity = 0.3 + Math.sin(Date.now() * 0.003) * 0.2;
  }

  // Particle drift
  const positions = particleGeo.attributes.position.array;
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3 + 1] += dt * 0.1;
    if (positions[i * 3 + 1] > 5.5) {
      positions[i * 3 + 1] = 0.5;
    }
  }
  particleGeo.attributes.position.needsUpdate = true;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
