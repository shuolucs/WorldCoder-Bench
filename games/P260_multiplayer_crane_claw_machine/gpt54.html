<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Crane Claw Machine</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    .hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .panel {
      position: absolute;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 14px rgba(0,0,0,0.35);
      font-weight: bold;
      text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    }

    #scores {
      top: 16px;
      left: 16px;
      line-height: 1.6;
    }

    #currentPlayer {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      min-width: 220px;
    }

    #prizesLeft {
      top: 16px;
      right: 16px;
    }

    #stats {
      bottom: 16px;
      right: 16px;
    }

    #switchWrap {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
    }

    #switchBtn {
      pointer-events: auto;
      border: 2px solid #fff;
      background: linear-gradient(180deg, #ff4fd8, #7d3cff);
      color: white;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.5px;
      padding: 12px 24px;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(125,60,255,0.45);
      text-transform: uppercase;
    }

    #switchBtn:hover {
      filter: brightness(1.1);
    }

    .indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-left: 8px;
      vertical-align: middle;
      box-shadow: 0 0 10px currentColor;
    }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      background: rgba(0,0,0,0.7);
      color: white;
      text-align: center;
      flex-direction: column;
      font-weight: 900;
      letter-spacing: 1px;
    }

    #gameOver h1 {
      font-size: 64px;
      margin: 0 0 16px 0;
      color: #ffd54a;
      text-shadow: 0 0 20px rgba(255,213,74,0.6);
    }

    #gameOver p {
      font-size: 24px;
      margin: 6px 0;
    }

    #help {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 11;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.5;
      font-size: 13px;
      color: #dbe7ff;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div class="hud">
    <div id="scores" class="panel">
      <div id="p1Score">Player 1 Score: 0</div>
      <div id="p2Score">Player 2 Score: 0</div>
    </div>

    <div id="currentPlayer" class="panel">
      Current Player: <span id="currentPlayerText">1</span>
      <span id="playerIndicator" class="indicator" style="color: cyan; background: cyan;"></span>
    </div>

    <div id="prizesLeft" class="panel">Prizes Left: 7</div>

    <div id="stats" class="panel">Grabs: 0 / Successful: 0</div>

    <div id="switchWrap">
      <button id="switchBtn">Switch Player</button>
    </div>
  </div>

  <div id="help">
    P1: WASD + Space<br/>
    P2: Arrow Keys + Space
  </div>

  <div id="gameOver">
    <h1>GAME OVER</h1>
    <p id="final1">Player 1 Score: 0</p>
    <p id="final2">Player 2 Score: 0</p>
    <p id="winnerText"></p>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const p1ScoreEl = document.getElementById("p1Score");
    const p2ScoreEl = document.getElementById("p2Score");
    const currentPlayerTextEl = document.getElementById("currentPlayerText");
    const playerIndicatorEl = document.getElementById("playerIndicator");
    const prizesLeftEl = document.getElementById("prizesLeft");
    const statsEl = document.getElementById("stats");
    const switchBtn = document.getElementById("switchBtn");
    const gameOverEl = document.getElementById("gameOver");
    const final1El = document.getElementById("final1");
    const final2El = document.getElementById("final2");
    const winnerTextEl = document.getElementById("winnerText");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 10, 5);
    scene.add(dir);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x223344, metalness: 0.1, roughness: 0.85 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    scene.add(floor);

    const cabinetGroup = new THREE.Group();
    scene.add(cabinetGroup);

    const cabinetMaterial = new THREE.MeshPhysicalMaterial({
      color: 0xaadfff,
      transparent: true,
      opacity: 0.2,
      roughness: 0.1,
      transmission: 0.3,
      metalness: 0,
      side: THREE.DoubleSide
    });

    const cabinet = new THREE.Mesh(
      new THREE.BoxGeometry(8, 6, 8),
      cabinetMaterial
    );
    cabinet.position.set(0, 3, 0);
    cabinetGroup.add(cabinet);

    const cabinetEdges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(8, 6, 8)),
      new THREE.LineBasicMaterial({ color: 0xbfe8ff })
    );
    cabinetEdges.position.set(0, 3, 0);
    cabinetGroup.add(cabinetEdges);

    const innerFloor = new THREE.Mesh(
      new THREE.BoxGeometry(7.8, 0.1, 7.8),
      new THREE.MeshStandardMaterial({ color: 0x2b3b4f })
    );
    innerFloor.position.set(0, 0.05, 0);
    cabinetGroup.add(innerFloor);

    const dropZone = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 0.05, 2),
      new THREE.MeshStandardMaterial({ color: 0x44ff99, emissive: 0x114422 })
    );
    dropZone.position.set(4, 0.03, 0);
    scene.add(dropZone);

    const dropZoneLabel = new THREE.Mesh(
      new THREE.BoxGeometry(1.5, 0.02, 2),
      new THREE.MeshBasicMaterial({ color: 0x88ffbb, transparent: true, opacity: 0.2 })
    );
    dropZoneLabel.position.set(4, 0.06, 0);
    scene.add(dropZoneLabel);

    window.__3D_STATE__ = {
      clawX: 0,
      clawZ: 0,
      clawY: 5,
      clawState: "idle",
      currentPlayer: 1,
      player1Score: 0,
      player2Score: 0,
      prizesRemaining: 7,
      foxGrabbed: false,
      totalGrabs: 0,
      successfulGrabs: 0,
      lastGrabbedPrize: null
    };

    function safeNumber(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function clampClaw() {
      window.__3D_STATE__.clawX = THREE.MathUtils.clamp(safeNumber(window.__3D_STATE__.clawX), -3.5, 3.5);
      window.__3D_STATE__.clawZ = THREE.MathUtils.clamp(safeNumber(window.__3D_STATE__.clawZ), -3.5, 3.5);
      window.__3D_STATE__.clawY = THREE.MathUtils.clamp(safeNumber(window.__3D_STATE__.clawY), 0.5, 5);
    }

    const prizes = [];
    const prizePositions = [
      { pos: [-2, 0.25, -2], color: "red", hex: 0xff3333, value: 10 },
      { pos: [-1, 0.25, 1], color: "blue", hex: 0x3388ff, value: 10 },
      { pos: [0.5, 0.25, -1], color: "green", hex: 0x33dd66, value: 10 },
      { pos: [1.5, 0.25, 2], color: "yellow", hex: 0xffdd33, value: 10 },
      { pos: [-0.5, 0.25, 0], color: "purple", hex: 0xaa55ff, value: 10 },
      { pos: [2, 0.25, -1.5], color: "orange", hex: 0xff9933, value: 10 }
    ];

    prizePositions.forEach((item) => {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(0.5, 0.5, 0.5),
        new THREE.MeshStandardMaterial({ color: item.hex, metalness: 0.2, roughness: 0.6 })
      );
      mesh.position.set(...item.pos);
      scene.add(mesh);

      prizes.push({
        name: item.color,
        value: item.value,
        isFox: false,
        grabbed: false,
        scored: false,
        mesh
      });
    });

    const loader = new GLTFLoader();
    let foxPrize = null;

    loader.load(
      "Fox.glb",
      (gltf) => {
        const fox = gltf.scene;
        fox.scale.setScalar(0.02);
        fox.position.set(0, 0.25, 0.5);
        fox.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
            if (child.material) {
              child.material = child.material.clone();
              if ("color" in child.material) child.material.color = new THREE.Color(0xffd700);
              if ("emissive" in child.material) child.material.emissive = new THREE.Color(0x553300);
            }
          }
        });
        scene.add(fox);

        foxPrize = {
          name: "fox",
          value: 50,
          isFox: true,
          grabbed: false,
          scored: false,
          mesh: fox
        };
        prizes.push(foxPrize);
      },
      undefined,
      (err) => {
        console.warn("Fox.glb failed to load, using fallback golden cube.", err);
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(0.5, 0.5, 0.5),
          new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0x554400 })
        );
        fallback.position.set(0, 0.25, 0.5);
        scene.add(fallback);

        foxPrize = {
          name: "fox",
          value: 50,
          isFox: true,
          grabbed: false,
          scored: false,
          mesh: fallback
        };
        prizes.push(foxPrize);
      }
    );

    const craneGroup = new THREE.Group();
    scene.add(craneGroup);

    const horizontalRail = new THREE.Mesh(
      new THREE.BoxGeometry(7, 0.08, 0.12),
      new THREE.MeshStandardMaterial({ color: 0xc0c7d1, metalness: 0.7, roughness: 0.3 })
    );
    horizontalRail.position.set(0, 5.5, 0);
    craneGroup.add(horizontalRail);

    const carriageX = new THREE.Group();
    craneGroup.add(carriageX);

    const xCarriageBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.15, 0.3),
      new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.25 })
    );
    xCarriageBody.position.set(0, 5.5, 0);
    carriageX.add(xCarriageBody);

    const verticalRail = new THREE.Mesh(
      new THREE.BoxGeometry(0.12, 0.08, 7),
      new THREE.MeshStandardMaterial({ color: 0xb0b8c4, metalness: 0.7, roughness: 0.35 })
    );
    verticalRail.position.set(0, 5.35, 0);
    carriageX.add(verticalRail);

    const carriageZ = new THREE.Group();
    carriageX.add(carriageZ);

    const zCarriageBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.28, 0.18, 0.28),
      new THREE.MeshStandardMaterial({ color: 0xf2f2f2, metalness: 0.85, roughness: 0.2 })
    );
    zCarriageBody.position.set(0, 5.35, 0);
    carriageZ.add(zCarriageBody);

    const clawAssembly = new THREE.Group();
    carriageZ.add(clawAssembly);

    const ropeGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 8);
    const ropeMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
    const rope = new THREE.Mesh(ropeGeo, ropeMat);
    clawAssembly.add(rope);

    const clawBase = new THREE.Mesh(
      new THREE.SphereGeometry(0.12, 12, 12),
      new THREE.MeshStandardMaterial({ color: 0xcfd4db, metalness: 0.6, roughness: 0.35 })
    );
    clawAssembly.add(clawBase);

    const prongGroup = new THREE.Group();
    clawAssembly.add(prongGroup);

    const prongs = [];
    for (let i = 0; i < 3; i++) {
      const pivot = new THREE.Group();
      const angle = (i / 3) * Math.PI * 2;
      pivot.rotation.y = angle;

      const prong = new THREE.Mesh(
        new THREE.BoxGeometry(0.08, 0.5, 0.08),
        new THREE.MeshStandardMaterial({ color: 0xbfc7d8, metalness: 0.7, roughness: 0.3 })
      );
      prong.position.set(0.18, -0.32, 0);
      prong.rotation.z = THREE.MathUtils.degToRad(20);
      pivot.add(prong);

      prongGroup.add(pivot);
      prongs.push({ pivot, mesh: prong, baseRotZ: THREE.MathUtils.degToRad(20) });
    }

    let clawClosed = false;
    let grabbedPrize = null;
    let dropAnim = null;

    function setClawProngs(closed) {
      clawClosed = closed;
      const delta = THREE.MathUtils.degToRad(closed ? 15 : 0);
      prongs.forEach((p) => {
        p.mesh.rotation.z = p.baseRotZ + delta;
      });
    }

    function updateClawVisuals() {
      clampClaw();

      carriageX.position.x = window.__3D_STATE__.clawX;
      carriageZ.position.z = window.__3D_STATE__.clawZ;

      const topY = 5.35;
      const bottomY = safeNumber(window.__3D_STATE__.clawY, 5);

      const ropeLength = Math.max(0.15, topY - bottomY);
      rope.scale.y = ropeLength;
      rope.position.set(0, topY - ropeLength / 2, 0);

      clawBase.position.set(0, bottomY, 0);
      prongGroup.position.set(0, bottomY, 0);

      if (grabbedPrize && grabbedPrize.mesh && grabbedPrize.mesh.visible) {
        grabbedPrize.mesh.position.set(
          safeNumber(window.__3D_STATE__.clawX, 0),
          safeNumber(window.__3D_STATE__.clawY, 5) - 0.35,
          safeNumber(window.__3D_STATE__.clawZ, 0)
        );
      }
    }

    function updateHUD() {
      p1ScoreEl.textContent = `Player 1 Score: ${window.__3D_STATE__.player1Score}`;
      p2ScoreEl.textContent = `Player 2 Score: ${window.__3D_STATE__.player2Score}`;
      currentPlayerTextEl.textContent = `${window.__3D_STATE__.currentPlayer}`;
      const p1 = window.__3D_STATE__.currentPlayer === 1;
      playerIndicatorEl.style.background = p1 ? "cyan" : "magenta";
      playerIndicatorEl.style.color = p1 ? "cyan" : "magenta";
      prizesLeftEl.textContent = `Prizes Left: ${window.__3D_STATE__.prizesRemaining}`;
      statsEl.textContent = `Grabs: ${window.__3D_STATE__.totalGrabs} / Successful: ${window.__3D_STATE__.successfulGrabs}`;

      if (window.__3D_STATE__.prizesRemaining <= 0) {
        gameOverEl.style.display = "flex";
        final1El.textContent = `Player 1 Score: ${window.__3D_STATE__.player1Score}`;
        final2El.textContent = `Player 2 Score: ${window.__3D_STATE__.player2Score}`;
        if (window.__3D_STATE__.player1Score > window.__3D_STATE__.player2Score) {
          winnerTextEl.textContent = "Winner: Player 1";
        } else if (window.__3D_STATE__.player2Score > window.__3D_STATE__.player1Score) {
          winnerTextEl.textContent = "Winner: Player 2";
        } else {
          winnerTextEl.textContent = "It's a tie!";
        }
      }
    }

    function distanceXZ(a, b) {
      const dx = safeNumber(a.x) - safeNumber(b.x);
      const dz = safeNumber(a.z) - safeNumber(b.z);
      return Math.sqrt(dx * dx + dz * dz);
    }

    function findClosestPrize() {
      const clawPos = { x: window.__3D_STATE__.clawX, z: window.__3D_STATE__.clawZ };
      let best = null;
      let bestDist = Infinity;

      prizes.forEach((prize) => {
        if (!prize || prize.grabbed || prize.scored || !prize.mesh || !prize.mesh.visible) return;
        const pos = prize.mesh.position;
        const d = distanceXZ(clawPos, pos);
        if (d <= 0.8 && d < bestDist) {
          bestDist = d;
          best = prize;
        }
      });

      return best;
    }

    function scorePrize(prize) {
      if (!prize || prize.scored) return;

      prize.scored = true;
      prize.grabbed = true;
      if (prize.mesh) prize.mesh.visible = false;

      if (window.__3D_STATE__.currentPlayer === 1) {
        window.__3D_STATE__.player1Score += prize.value;
      } else {
        window.__3D_STATE__.player2Score += prize.value;
      }

      window.__3D_STATE__.successfulGrabs += 1;
      window.__3D_STATE__.prizesRemaining = Math.max(0, window.__3D_STATE__.prizesRemaining - 1);
      window.__3D_STATE__.lastGrabbedPrize = prize.name;

      if (prize.isFox) {
        window.__3D_STATE__.foxGrabbed = true;
      }

      if (safeNumber(window.__3D_STATE__.clawX, 0) > 3 && prize.mesh) {
        prize.mesh.position.set(4, 0.25, 0);
      }

      grabbedPrize = null;
    }

    function startDrop() {
      if (window.__3D_STATE__.clawState !== "idle") return;
      if (window.__3D_STATE__.prizesRemaining <= 0) return;

      window.__3D_STATE__.totalGrabs += 1;
      window.__3D_STATE__.clawState = "descending";
      window.__3D_STATE__.lastGrabbedPrize = null;
      setClawProngs(false);

      dropAnim = {
        phase: "down",
        elapsed: 0,
        duration: 1.5,
        startY: 5,
        endY: 0.5
      };
    }

    function updateDropAnimation(delta) {
      if (!dropAnim) return;

      dropAnim.elapsed += delta;
      const t = Math.min(dropAnim.elapsed / dropAnim.duration, 1);

      if (dropAnim.phase === "down") {
        window.__3D_STATE__.clawState = "descending";
        window.__3D_STATE__.clawY = THREE.MathUtils.lerp(dropAnim.startY, dropAnim.endY, t);

        if (t >= 1) {
          window.__3D_STATE__.clawState = "grabbing";
          const candidate = findClosestPrize();
          if (candidate) {
            candidate.grabbed = true;
            grabbedPrize = candidate;
          }
          setClawProngs(true);

          dropAnim = {
            phase: "up",
            elapsed: 0,
            duration: 1.5,
            startY: 0.5,
            endY: 5
          };
        }
      } else if (dropAnim.phase === "up") {
        window.__3D_STATE__.clawState = "ascending";
        window.__3D_STATE__.clawY = THREE.MathUtils.lerp(dropAnim.startY, dropAnim.endY, t);

        if (grabbedPrize && grabbedPrize.mesh && grabbedPrize.mesh.visible) {
          grabbedPrize.mesh.position.set(
            safeNumber(window.__3D_STATE__.clawX, 0),
            safeNumber(window.__3D_STATE__.clawY, 5) - 0.35,
            safeNumber(window.__3D_STATE__.clawZ, 0)
          );
        }

        if (t >= 1) {
          window.__3D_STATE__.clawY = 5;
          window.__3D_STATE__.clawState = "returning";
          if (grabbedPrize) {
            scorePrize(grabbedPrize);
          }
          setClawProngs(false);
          window.__3D_STATE__.clawState = "idle";
          dropAnim = null;
        }
      }

      clampClaw();
    }

    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;
      if (e.code === "Space") {
        e.preventDefault();
        startDrop();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    switchBtn.addEventListener("click", () => {
      window.__3D_STATE__.currentPlayer = window.__3D_STATE__.currentPlayer === 1 ? 2 : 1;
      updateHUD();
    });

    function updateMovement() {
      if (window.__3D_STATE__.clawState !== "idle") return;

      const speed = 0.05;
      let x = safeNumber(window.__3D_STATE__.clawX, 0);
      let z = safeNumber(window.__3D_STATE__.clawZ, 0);

      if (window.__3D_STATE__.currentPlayer === 1) {
        if (keys["KeyA"]) x -= speed;
        if (keys["KeyD"]) x += speed;
        if (keys["KeyW"]) z -= speed;
        if (keys["KeyS"]) z += speed;
      } else {
        if (keys["ArrowLeft"]) x -= speed;
        if (keys["ArrowRight"]) x += speed;
        if (keys["ArrowUp"]) z -= speed;
        if (keys["ArrowDown"]) z += speed;
      }

      window.__3D_STATE__.clawX = THREE.MathUtils.clamp(safeNumber(x), -3.5, 3.5);
      window.__3D_STATE__.clawZ = THREE.MathUtils.clamp(safeNumber(z), -3.5, 3.5);
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      updateMovement();
      updateDropAnimation(delta);
      updateClawVisuals();
      updateHUD();

      renderer.render(scene, camera);
    }

    updateClawVisuals();
    updateHUD();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
