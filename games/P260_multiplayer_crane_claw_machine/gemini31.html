<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Claw Machine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            z-index: 10;
        }
        #score-p1 { top: 20px; left: 20px; color: #00ffff; font-size: 24px; font-weight: bold; }
        #score-p2 { top: 50px; left: 20px; color: #ff00ff; font-size: 24px; font-weight: bold; }
        #current-player-display {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: bold;
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 10px;
            border: 2px solid #fff;
        }
        #prizes-left { top: 20px; right: 20px; font-size: 24px; }
        #stats { bottom: 20px; right: 20px; font-size: 18px; text-align: right; }
        
        #controls-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        button {
            background: #ffcc00;
            color: #000;
            border: 4px solid #fff;
            padding: 10px 20px;
            font-size: 20px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 0 #cc9900;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #cc9900;
        }
        button:disabled {
            background: #555;
            color: #888;
            border-color: #777;
            box-shadow: 0 4px 0 #333;
            cursor: not-allowed;
        }
        .instructions {
            background: rgba(0,0,0,0.7);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }

        #game-over {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }
        #game-over h1 { font-size: 64px; color: #ff0000; margin: 0 0 20px 0; text-shadow: 4px 4px 0 #fff; }
        #game-over p { font-size: 32px; margin: 10px 0; }
    </style>
    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <!-- HUD -->
    <div id="score-p1" class="hud">Player 1 Score: 0</div>
    <div id="score-p2" class="hud">Player 2 Score: 0</div>
    <div id="current-player-display" class="hud" style="color: #00ffff; border-color: #00ffff;">Current Player: 1</div>
    <div id="prizes-left" class="hud">Prizes Left: 7</div>
    <div id="stats" class="hud">Grabs: 0<br>Successful: 0</div>

    <div id="controls-ui">
        <div class="instructions">
            P1: WASD | P2: Arrows | Drop: Spacebar
        </div>
        <button id="btn-switch">Switch Player</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over">
        <h1>GAME OVER</h1>
        <p id="final-score-p1" style="color: #00ffff;">Player 1: 0</p>
        <p id="final-score-p2" style="color: #ff00ff;">Player 2: 0</p>
        <p id="winner-text" style="color: #ffcc00; font-weight: bold; margin-top: 30px; font-size: 40px;"></p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            clawX: 0,
            clawZ: 0,
            clawY: 5,
            clawState: 'idle', // 'idle' | 'descending' | 'grabbing' | 'ascending'
            currentPlayer: 1,
            player1Score: 0,
            player2Score: 0,
            prizesRemaining: 7,
            foxGrabbed: false,
            totalGrabs: 0,
            successfulGrabs: 0,
            lastGrabbedPrize: null
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        scene.add(dirLight);

        // --- Environment ---
        // Floor
        const floorGeo = new THREE.PlaneGeometry(20, 20);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Cabinet (Glass Box)
        const cabinetGeo = new THREE.BoxGeometry(8, 6, 8);
        const cabinetMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            metalness: 0.1,
            roughness: 0.1,
            transmission: 0.8,
            opacity: 0.2,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const cabinet = new THREE.Mesh(cabinetGeo, cabinetMat);
        cabinet.position.set(0, 3, 0);
        scene.add(cabinet);

        // Cabinet Edges (Wireframe look)
        const edgesGeo = new THREE.EdgesGeometry(cabinetGeo);
        const edgesMat = new THREE.LineBasicMaterial({ color: 0x8888aa, linewidth: 2 });
        const cabinetEdges = new THREE.LineSegments(edgesGeo, edgesMat);
        cabinetEdges.position.set(0, 3, 0);
        scene.add(cabinetEdges);

        // Cabinet Base
        const baseGeo = new THREE.BoxGeometry(8.2, 0.5, 8.2);
        const baseMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const base = new THREE.Mesh(baseGeo, baseMat);
        base.position.set(0, 0.25, 0);
        base.receiveShadow = true;
        scene.add(base);

        // Drop Zone
        const dropZoneGeo = new THREE.BoxGeometry(2, 0.1, 2);
        const dropZoneMat = new THREE.MeshStandardMaterial({ color: 0x442222 });
        const dropZone = new THREE.Mesh(dropZoneGeo, dropZoneMat);
        dropZone.position.set(5.5, 0.05, 0);
        dropZone.receiveShadow = true;
        scene.add(dropZone);
        
        const dropZoneEdges = new THREE.LineSegments(new THREE.EdgesGeometry(dropZoneGeo), new THREE.LineBasicMaterial({color: 0xff0000}));
        dropZoneEdges.position.copy(dropZone.position);
        scene.add(dropZoneEdges);

        // --- Prizes ---
        const prizes = [];
        const prizeCubesData = [
            { pos: [-2, -2], color: 0xff0000, name: 'red' },
            { pos: [-1, 1], color: 0x0000ff, name: 'blue' },
            { pos: [0.5, -1], color: 0x00ff00, name: 'green' },
            { pos: [1.5, 2], color: 0xffff00, name: 'yellow' },
            { pos: [-0.5, 0], color: 0x800080, name: 'purple' },
            { pos: [2, -1.5], color: 0xffa500, name: 'orange' }
        ];

        const cubeGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        prizeCubesData.forEach(data => {
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.4, metalness: 0.1 });
            const mesh = new THREE.Mesh(cubeGeo, mat);
            mesh.position.set(data.pos[0], 0.75, data.pos[1]); // 0.5 (base) + 0.25 (half height)
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            prizes.push({ mesh: mesh, name: data.name, points: 10, active: true, isFox: false });
        });

        // Load Fox
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Fox/glTF-Binary/Fox.glb', (gltf) => {
            const fox = gltf.scene;
            fox.scale.set(0.02, 0.02, 0.02);
            fox.position.set(0, 0.5, 0.5); // On top of base
            
            fox.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(fox);
            prizes.push({ mesh: fox, name: 'fox', points: 50, active: true, isFox: true });
        });

        // --- Crane Mechanism ---
        // Horizontal Rail (Fixed Z, spans X)
        const hRailGeo = new THREE.BoxGeometry(7.8, 0.1, 0.2);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.8, roughness: 0.2 });
        const hRail = new THREE.Mesh(hRailGeo, railMat);
        hRail.position.set(0, 5.8, 0);
        scene.add(hRail);

        // Vertical Rail (Moves along X, spans Z)
        const vRailGeo = new THREE.BoxGeometry(0.2, 0.1, 7.8);
        const vRail = new THREE.Mesh(vRailGeo, railMat);
        vRail.position.set(0, 5.7, 0);
        scene.add(vRail);

        // Claw Assembly
        const clawAssembly = new THREE.Group();
        scene.add(clawAssembly);

        // Carriage
        const carriageGeo = new THREE.BoxGeometry(0.4, 0.2, 0.4);
        const carriageMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
        const carriage = new THREE.Mesh(carriageGeo, carriageMat);
        carriage.position.set(0, 5.6, 0);
        scene.add(carriage);

        // Rope
        const ropeGeo = new THREE.CylinderGeometry(0.03, 0.03, 1);
        ropeGeo.translate(0, -0.5, 0); // Pivot at top
        const ropeMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const rope = new THREE.Mesh(ropeGeo, ropeMat);
        rope.position.set(0, 5.5, 0);
        scene.add(rope);

        // Claw Base & Prongs
        const clawBase = new THREE.Group();
        clawAssembly.add(clawBase);

        const clawCenterGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.2);
        const clawCenter = new THREE.Mesh(clawCenterGeo, carriageMat);
        clawBase.add(clawCenter);

        const prongs = [];
        const prongGeo = new THREE.BoxGeometry(0.05, 0.6, 0.1);
        prongGeo.translate(0, -0.3, 0); // Pivot at top
        const prongMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.5 });

        const openAngle = 15 * Math.PI / 180; // 15 degrees outward

        for (let i = 0; i < 3; i++) {
            const pivot = new THREE.Group();
            pivot.rotation.y = (i * Math.PI * 2) / 3;
            
            const prong = new THREE.Mesh(prongGeo, prongMat);
            prong.position.set(0.15, 0, 0); // Offset from center
            prong.rotation.z = -openAngle; // Angle outward
            
            pivot.add(prong);
            clawBase.add(pivot);
            prongs.push(prong);
        }

        // --- Input Handling ---
        const keys = { w: false, a: false, s: false, d: false, ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
            if (e.code === 'Space' && state.clawState === 'idle') {
                startDrop();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        const btnSwitch = document.getElementById('btn-switch');
        btnSwitch.addEventListener('click', () => {
            if (state.clawState === 'idle') {
                state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
                updateHUD();
            }
        });

        // --- Game Logic ---
        let actionTimer = 0;
        let grabbedPrizeObj = null;
        const clock = new THREE.Clock();

        function startDrop() {
            state.clawState = 'descending';
            actionTimer = 0;
            state.totalGrabs++;
            btnSwitch.disabled = true;
            updateHUD();
        }

        function checkGrab() {
            let closest = null;
            let minD = 0.8;

            for (let p of prizes) {
                if (!p.active) continue;
                
                // Calculate distance in XZ plane
                const dx = p.mesh.position.x - state.clawX;
                const dz = p.mesh.position.z - state.clawZ;
                const d = Math.sqrt(dx * dx + dz * dz);

                if (d < minD) {
                    minD = d;
                    closest = p;
                }
            }

            if (closest) {
                grabbedPrizeObj = closest;
                // Attach to claw
                clawBase.add(closest.mesh);
                // Reset local position relative to claw base
                closest.mesh.position.set(0, -0.6, 0);
            }
        }

        function processScore() {
            if (grabbedPrizeObj) {
                state.successfulGrabs++;
                state.prizesRemaining--;
                state.lastGrabbedPrize = grabbedPrizeObj.name;
                
                if (grabbedPrizeObj.isFox) {
                    state.foxGrabbed = true;
                }

                if (state.currentPlayer === 1) {
                    state.player1Score += grabbedPrizeObj.points;
                } else {
                    state.player2Score += grabbedPrizeObj.points;
                }

                // Remove prize
                clawBase.remove(grabbedPrizeObj.mesh);
                grabbedPrizeObj.mesh.visible = false;
                grabbedPrizeObj.active = false;
                grabbedPrizeObj = null;

                checkGameOver();
            }
            
            state.clawState = 'idle';
            btnSwitch.disabled = false;
            updateHUD();
        }

        function updateHUD() {
            document.getElementById('score-p1').innerText = `Player 1 Score: ${state.player1Score}`;
            document.getElementById('score-p2').innerText = `Player 2 Score: ${state.player2Score}`;
            
            const cpDisplay = document.getElementById('current-player-display');
            cpDisplay.innerText = `Current Player: ${state.currentPlayer}`;
            cpDisplay.style.color = state.currentPlayer === 1 ? '#00ffff' : '#ff00ff';
            cpDisplay.style.borderColor = state.currentPlayer === 1 ? '#00ffff' : '#ff00ff';
            
            document.getElementById('prizes-left').innerText = `Prizes Left: ${state.prizesRemaining}`;
            document.getElementById('stats').innerHTML = `Grabs: ${state.totalGrabs}<br>Successful: ${state.successfulGrabs}`;
        }

        function checkGameOver() {
            if (state.prizesRemaining <= 0) {
                const goScreen = document.getElementById('game-over');
                document.getElementById('final-score-p1').innerText = `Player 1: ${state.player1Score}`;
                document.getElementById('final-score-p2').innerText = `Player 2: ${state.player2Score}`;
                
                const winnerText = document.getElementById('winner-text');
                if (state.player1Score > state.player2Score) winnerText.innerText = "PLAYER 1 WINS!";
                else if (state.player2Score > state.player1Score) winnerText.innerText = "PLAYER 2 WINS!";
                else winnerText.innerText = "IT'S A TIE!";
                
                goScreen.style.display = 'flex';
            }
        }

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Movement Logic
            if (state.clawState === 'idle') {
                let dx = 0, dz = 0;
                const speed = 0.05; // per frame as requested, though delta is better. Using fixed per frame for strict adherence.
                
                if (state.currentPlayer === 1) {
                    if (keys.w) dz -= speed;
                    if (keys.s) dz += speed;
                    if (keys.a) dx -= speed;
                    if (keys.d) dx += speed;
                } else {
                    if (keys.ArrowUp) dz -= speed;
                    if (keys.ArrowDown) dz += speed;
                    if (keys.ArrowLeft) dx -= speed;
                    if (keys.ArrowRight) dx += speed;
                }

                if (dx !== 0 || dz !== 0) {
                    state.clawX = Math.max(-3.5, Math.min(3.5, state.clawX + dx));
                    state.clawZ = Math.max(-3.5, Math.min(3.5, state.clawZ + dz));
                }
            }

            // State Machine Logic
            if (state.clawState === 'descending') {
                actionTimer += delta;
                let t = Math.min(actionTimer / 1.5, 1);
                state.clawY = THREE.MathUtils.lerp(5, 0.5, t);
                
                if (t === 1) {
                    state.clawState = 'grabbing';
                    actionTimer = 0;
                    checkGrab();
                }
            } else if (state.clawState === 'grabbing') {
                actionTimer += delta;
                let t = Math.min(actionTimer / 0.5, 1); // 0.5s to close
                
                // Animate prongs closing
                prongs.forEach(p => {
                    p.rotation.z = THREE.MathUtils.lerp(-openAngle, 0, t);
                });

                if (t === 1) {
                    state.clawState = 'ascending';
                    actionTimer = 0;
                }
            } else if (state.clawState === 'ascending') {
                actionTimer += delta;
                let t = Math.min(actionTimer / 1.5, 1);
                state.clawY = THREE.MathUtils.lerp(0.5, 5, t);
                
                if (t === 1) {
                    processScore();
                    // Open prongs
                    prongs.forEach(p => p.rotation.z = -openAngle);
                }
            }

            // Update Visuals based on State
            hRail.position.z = state.clawZ;
            vRail.position.x = state.clawX;
            
            carriage.position.set(state.clawX, 5.6, state.clawZ);
            
            rope.position.set(state.clawX, 5.5, state.clawZ);
            rope.scale.y = 5.5 - state.clawY; // Stretch rope
            
            clawBase.position.set(state.clawX, state.clawY, state.clawZ);

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateHUD();
        animate();

    </script>
</body>
</html>
