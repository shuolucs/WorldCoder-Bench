<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Brain Connectivity Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #css2d-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }
        .node-label {
            color: #ffffff;
            font-size: 12px;
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
            white-space: nowrap;
        }
        .ref-label {
            color: #44ff88;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 8px;
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #44ff88;
            border-radius: 4px;
            pointer-events: none;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: rgba(10, 10, 26, 0.8);
            padding: 15px;
            border: 1px solid #334466;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            width: 250px;
        }
        button, select, input[type="range"] {
            background: #1a2a4a;
            color: #fff;
            border: 1px solid #335588;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        button:hover, select:hover {
            background: #2a3a5a;
            border-color: #4466aa;
        }
        button:active {
            background: #0a1a3a;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 12px;
            color: #aaa;
        }
        #infoPanel {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #334466;
            font-size: 13px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }
        .info-value {
            font-weight: bold;
            color: #44ff88;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            z-index: 3;
            color: #8899aa;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="css2d-container"></div>
    
    <div id="ui-container">
        <button id="toggleDebug">Toggle Debug Overlay (D)</button>
        <button id="activateRandom">Activate Random Node</button>
        <button id="toggleConnections">Toggle Connections</button>
        
        <div class="control-group">
            <label for="viewMode">View Mode</label>
            <select id="viewMode">
                <option value="normal">Normal</option>
                <option value="heatmap">Heatmap</option>
                <option value="wireframe">Wireframe</option>
            </select>
        </div>
        
        <div class="control-group">
            <label for="activitySpeed">Activity Speed: <span id="speedValue">1.0</span>x</label>
            <input type="range" id="activitySpeed" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>

        <div id="infoPanel">
            <div class="info-row"><span>Selected:</span> <span id="infoName" class="info-value">None</span></div>
            <div class="info-row"><span>Connections:</span> <span id="infoConn" class="info-value">0</span></div>
            <div class="info-row"><span>Activity:</span> <span id="infoAct" class="info-value">0.00</span></div>
        </div>
    </div>

    <div id="instructions">
        Click node to select | Space: Cascade Activation | R: Reset
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            nodeCount: 12,
            connectionCount: 0,
            debugOverlayVisible: false,
            connectionsVisible: true,
            selectedNodeIndex: -1,
            selectedNodeName: '',
            viewMode: 'normal',
            activitySpeedMultiplier: 1.0,
            activeNodeCount: 0,
            horseLoaded: false,
            allNodesActivated: false,
            frameCount: 0,
            nodesPositions: [],
            physicsValid: true
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const cssContainer = document.getElementById('css2d-container');
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        cssContainer.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Brain Network ---
        const nodePositions = [
            [-3, 2, 0], [-2, 3, 1], [-1, 2, 2], [0, 3, 0], [1, 2, 2], [2, 3, 1], [3, 2, 0],
            [-2, 0, -1], [0, 1, -2], [2, 0, -1], [-1, -1, 0], [1, -1, 0]
        ];
        const nodeNames = [
            'Frontal-L', 'Parietal-L', 'Temporal-L', 'Cingulate', 'Temporal-R', 'Parietal-R', 'Frontal-R',
            'Occipital-L', 'Cerebellum', 'Occipital-R', 'Thalamus-L', 'Thalamus-R'
        ];

        const nodes = [];
        const connections = [];
        const connectionLines = [];
        const nodeGroup = new THREE.Group();
        scene.add(nodeGroup);

        const colorStart = new THREE.Color(0x0066ff);
        const colorEnd = new THREE.Color(0xff3300);
        const heatmapLow = new THREE.Color(0x0000ff);
        const heatmapHigh = new THREE.Color(0xff0000);

        const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);

        // Create Nodes
        for (let i = 0; i < state.nodeCount; i++) {
            const color = new THREE.Color().lerpColors(colorStart, colorEnd, i / (state.nodeCount - 1));
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: color,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });

            const mesh = new THREE.Mesh(sphereGeo, material);
            mesh.position.set(...nodePositions[i]);
            
            // Physics/Animation data
            mesh.userData = {
                index: i,
                name: nodeNames[i],
                basePos: mesh.position.clone(),
                originalColor: color.clone(),
                amp: 0.1 + Math.random() * 0.2,
                freq: 0.5 + Math.random() * 1.5,
                phase: Math.random() * Math.PI * 2,
                active: false,
                activationTime: 0,
                connections: 0,
                velocity: new THREE.Vector3()
            };

            // Label
            const div = document.createElement('div');
            div.className = 'node-label';
            div.textContent = nodeNames[i];
            const label = new CSS2DObject(div);
            label.position.set(0, 0.4, 0);
            mesh.add(label);

            // Debug Elements
            const debugGroup = new THREE.Group();
            debugGroup.visible = state.debugOverlayVisible;
            
            // Bounding Sphere
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.3 });
            const boundSphere = new THREE.Mesh(new THREE.SphereGeometry(0.35, 8, 8), wireMat);
            debugGroup.add(boundSphere);

            // Velocity Arrow
            const arrow = new THREE.ArrowHelper(new THREE.Vector3(0,1,0), new THREE.Vector3(0,0,0), 1, 0xffff00, 0.2, 0.1);
            debugGroup.add(arrow);
            mesh.userData.debugArrow = arrow;

            mesh.add(debugGroup);
            mesh.userData.debugGroup = debugGroup;

            nodes.push(mesh);
            nodeGroup.add(mesh);
        }

        // Generate Connections
        const numConnections = 25;
        const connectionSet = new Set();

        while (connections.length < numConnections) {
            const from = Math.floor(Math.random() * state.nodeCount);
            let to = Math.floor(Math.random() * state.nodeCount);
            while (to === from) to = Math.floor(Math.random() * state.nodeCount);

            const key = from < to ? `${from}-${to}` : `${to}-${from}`;
            if (!connectionSet.has(key)) {
                connectionSet.add(key);
                const strength = 0.1 + Math.random() * 0.9;
                connections.push({ from, to, strength });
                nodes[from].userData.connections++;
                nodes[to].userData.connections++;
            }
        }
        state.connectionCount = connections.length;

        // Create Connection Lines
        const linesGroup = new THREE.Group();
        scene.add(linesGroup);

        connections.forEach(conn => {
            const mat = new THREE.LineDashedMaterial({
                color: 0x88bbff,
                linewidth: 1,
                transparent: true,
                opacity: conn.strength * 0.8,
                dashSize: 0.2,
                gapSize: 0.1
            });
            
            const geo = new THREE.BufferGeometry().setFromPoints([
                nodes[conn.from].position,
                nodes[conn.to].position
            ]);
            
            const line = new THREE.Line(geo, mat);
            line.computeLineDistances();
            line.userData = { from: conn.from, to: conn.to, strength: conn.strength };
            connectionLines.push(line);
            linesGroup.add(line);
        });

        // Highlight Ring
        const highlightGeo = new THREE.TorusGeometry(0.4, 0.02, 16, 32);
        const highlightMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const highlightRing = new THREE.Mesh(highlightGeo, highlightMat);
        highlightRing.rotation.x = Math.PI / 2;
        highlightRing.visible = false;
        scene.add(highlightRing);

        // --- Horse Model ---
        const loader = new GLTFLoader();
        // Using a reliable CDN for the standard three.js example model
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Horse.glb', (gltf) => {
            const horse = gltf.scene;
            horse.scale.setScalar(0.02);
            horse.position.set(8, -2, 0);
            
            const wireMaterial = new THREE.MeshBasicMaterial({
                color: 0x44ff88,
                wireframe: true,
                transparent: true,
                opacity: 0.5
            });

            horse.traverse((child) => {
                if (child.isMesh) {
                    child.material = wireMaterial;
                }
            });

            const div = document.createElement('div');
            div.className = 'ref-label';
            div.textContent = 'Anatomical Reference';
            const label = new CSS2DObject(div);
            label.position.set(0, 150, 0); // Relative to scaled model
            horse.add(label);

            scene.add(horse);
            state.horseLoaded = true;
        });

        // --- Interaction & UI ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function updateInfoPanel() {
            const nameEl = document.getElementById('infoName');
            const connEl = document.getElementById('infoConn');
            const actEl = document.getElementById('infoAct');

            if (state.selectedNodeIndex !== -1) {
                const node = nodes[state.selectedNodeIndex];
                nameEl.textContent = node.userData.name;
                connEl.textContent = node.userData.connections;
                
                // Calculate activity based on scale
                let act = 0;
                if (node.userData.active) {
                    act = (node.scale.x - 1.0) / 0.5; // 0 to 1
                }
                actEl.textContent = act.toFixed(2);
            } else {
                nameEl.textContent = 'None';
                connEl.textContent = '0';
                actEl.textContent = '0.00';
            }
        }

        function selectNode(index) {
            state.selectedNodeIndex = index;
            if (index !== -1) {
                state.selectedNodeName = nodes[index].userData.name;
                highlightRing.visible = true;
            } else {
                state.selectedNodeName = '';
                highlightRing.visible = false;
            }
            updateInfoPanel();
        }

        function activateNode(node) {
            node.userData.active = true;
            node.userData.activationTime = clock.getElapsedTime();
        }

        window.addEventListener('click', (event) => {
            // Don't raycast if clicking UI
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'SELECT' || event.target.tagName === 'INPUT') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);

            if (intersects.length > 0) {
                selectNode(intersects[0].object.userData.index);
            } else {
                selectNode(-1);
            }
        });

        // UI Listeners
        document.getElementById('toggleDebug').addEventListener('click', () => {
            state.debugOverlayVisible = !state.debugOverlayVisible;
            nodes.forEach(n => n.userData.debugGroup.visible = state.debugOverlayVisible);
        });

        document.getElementById('activateRandom').addEventListener('click', () => {
            const idx = Math.floor(Math.random() * state.nodeCount);
            activateNode(nodes[idx]);
        });

        document.getElementById('toggleConnections').addEventListener('click', () => {
            state.connectionsVisible = !state.connectionsVisible;
            linesGroup.visible = state.connectionsVisible;
        });

        document.getElementById('viewMode').addEventListener('change', (e) => {
            state.viewMode = e.target.value;
            nodes.forEach(n => {
                n.material.wireframe = (state.viewMode === 'wireframe');
                if (state.viewMode === 'normal') {
                    n.material.emissive.copy(n.userData.originalColor);
                    n.material.color.copy(n.userData.originalColor);
                }
            });
        });

        const speedSlider = document.getElementById('activitySpeed');
        const speedValue = document.getElementById('speedValue');
        speedSlider.addEventListener('input', (e) => {
            state.activitySpeedMultiplier = parseFloat(e.target.value);
            speedValue.textContent = state.activitySpeedMultiplier.toFixed(1);
        });

        // Keyboard Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'd') {
                document.getElementById('toggleDebug').click();
            } else if (e.code === 'Space') {
                state.allNodesActivated = true;
                nodes.forEach(n => activateNode(n));
                setTimeout(() => { state.allNodesActivated = false; }, 500);
            } else if (e.key.toLowerCase() === 'r') {
                nodes.forEach(n => {
                    n.userData.active = false;
                    n.scale.setScalar(1.0);
                });
                selectNode(-1);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            state.frameCount++;
            state.activeNodeCount = 0;
            state.nodesPositions = [];
            state.physicsValid = true;

            // Update Nodes
            nodes.forEach(node => {
                const ud = node.userData;
                
                // Physics: Oscillation
                const t = time * state.activitySpeedMultiplier;
                const yOffset = Math.sin(t * ud.freq + ud.phase) * ud.amp;
                node.position.y = ud.basePos.y + yOffset;
                
                // Velocity for debug
                const velY = Math.cos(t * ud.freq + ud.phase) * ud.amp * ud.freq * state.activitySpeedMultiplier;
                ud.velocity.set(0, velY, 0);
                
                if (state.debugOverlayVisible) {
                    ud.debugArrow.setDirection(ud.velocity.clone().normalize());
                    ud.debugArrow.setLength(Math.abs(velY) * 2 + 0.1);
                }

                // Activation Pulse
                if (ud.active) {
                    state.activeNodeCount++;
                    const elapsed = time - ud.activationTime;
                    const duration = 0.5;
                    
                    if (elapsed < duration) {
                        // Sine wave pulse: 1.0 -> 1.5 -> 1.0
                        const scale = 1.0 + Math.sin((elapsed / duration) * Math.PI) * 0.5;
                        node.scale.setScalar(scale);
                    } else {
                        ud.active = false;
                        node.scale.setScalar(1.0);
                    }
                }

                // View Mode Updates
                if (state.viewMode === 'heatmap') {
                    const actLevel = (node.scale.x - 1.0) / 0.5; // 0 to 1
                    node.material.emissive.copy(heatmapLow).lerp(heatmapHigh, actLevel);
                    node.material.color.copy(node.material.emissive);
                }

                // State tracking
                state.nodesPositions.push({x: node.position.x, y: node.position.y, z: node.position.z});
                if (isNaN(node.position.x) || isNaN(node.position.y) || isNaN(node.position.z)) {
                    state.physicsValid = false;
                }
            });

            // Update Highlight Ring
            if (state.selectedNodeIndex !== -1) {
                highlightRing.position.copy(nodes[state.selectedNodeIndex].position);
                // Update info panel activity continuously if selected
                if(state.frameCount % 5 === 0) updateInfoPanel();
            }

            // Update Connections (Traveling Glow & Positions)
            if (state.connectionsVisible) {
                connectionLines.forEach(line => {
                    const n1 = nodes[line.userData.from];
                    const n2 = nodes[line.userData.to];
                    
                    // Update positions
                    const positions = line.geometry.attributes.position.array;
                    positions[0] = n1.position.x; positions[1] = n1.position.y; positions[2] = n1.position.z;
                    positions[3] = n2.position.x; positions[4] = n2.position.y; positions[5] = n2.position.z;
                    line.geometry.attributes.position.needsUpdate = true;
                    
                    // Recompute distances for dashed effect
                    line.computeLineDistances();
                    
                    // Traveling glow effect
                    line.material.dashOffset -= 0.05 * state.activitySpeedMultiplier;
                    
                    // Boost opacity if connected nodes are active
                    if (n1.userData.active || n2.userData.active) {
                        line.material.opacity = Math.min(1.0, line.userData.strength * 1.5);
                        line.material.color.setHex(0xffffff);
                    } else {
                        line.material.opacity = line.userData.strength * 0.8;
                        line.material.color.setHex(0x88bbff);
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
