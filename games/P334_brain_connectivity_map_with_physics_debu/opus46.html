<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Brain Connectivity Map</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a1a;
}
canvas { display: block; }
#ui-container {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    gap: 8px;
}
#ui-container button, #ui-container select {
    padding: 8px 14px;
    background: rgba(20, 20, 50, 0.85);
    color: #aaccff;
    border: 1px solid #335588;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(4px);
    transition: all 0.2s;
}
#ui-container button:hover {
    background: rgba(40, 40, 80, 0.95);
    border-color: #5588cc;
    color: #ffffff;
}
#ui-container select {
    appearance: auto;
}
#ui-container label {
    color: #aaccff;
    font-size: 12px;
    margin-bottom: -4px;
}
#ui-container input[type="range"] {
    width: 180px;
    accent-color: #5588cc;
}
#infoPanel {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(10, 10, 40, 0.9);
    border: 1px solid #335588;
    border-radius: 8px;
    padding: 16px;
    color: #aaccff;
    font-size: 13px;
    min-width: 220px;
    backdrop-filter: blur(6px);
    z-index: 100;
}
#infoPanel h3 {
    margin: 0 0 10px 0;
    color: #ffffff;
    font-size: 15px;
    border-bottom: 1px solid #335588;
    padding-bottom: 8px;
}
#infoPanel .info-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
}
#infoPanel .info-label { color: #7799bb; }
#infoPanel .info-value { color: #ffffff; font-weight: bold; }
.node-label {
    color: #aaccff;
    font-size: 11px;
    font-family: 'Segoe UI', sans-serif;
    background: rgba(10, 10, 40, 0.7);
    padding: 2px 6px;
    border-radius: 3px;
    pointer-events: none;
    white-space: nowrap;
}
#speedValue {
    color: #ffffff;
    font-size: 12px;
    margin-left: 4px;
}
</style>
</head>
<body>

<div id="ui-container">
    <button id="toggleDebug">Toggle Debug Overlay</button>
    <button id="activateRandom">Activate Random Node</button>
    <button id="toggleConnections">Toggle Connections</button>
    <label>View Mode:</label>
    <select id="viewMode">
        <option value="normal">Normal</option>
        <option value="heatmap">Heatmap</option>
        <option value="wireframe">Wireframe</option>
    </select>
    <label>Activity Speed: <span id="speedValue">1.0</span></label>
    <input type="range" id="activitySpeed" min="0.1" max="3.0" step="0.1" value="1.0">
</div>

<div id="infoPanel">
    <h3>🧠 Brain Network Info</h3>
    <div class="info-row"><span class="info-label">Selected Node:</span><span class="info-value" id="infoNodeName">None</span></div>
    <div class="info-row"><span class="info-label">Connections:</span><span class="info-value" id="infoConnections">-</span></div>
    <div class="info-row"><span class="info-label">Activity Level:</span><span class="info-value" id="infoActivity">-</span></div>
    <div class="info-row"><span class="info-label">Active Nodes:</span><span class="info-value" id="infoActiveCount">0</span></div>
    <div class="info-row"><span class="info-label">Debug:</span><span class="info-value" id="infoDebug">OFF</span></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
scene.add(directionalLight);

// Add subtle fog
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

// ============ BRAIN NETWORK ============
const nodePositions = [
    new THREE.Vector3(-3, 2, 0),
    new THREE.Vector3(-2, 3, 1),
    new THREE.Vector3(-1, 2, 2),
    new THREE.Vector3(0, 3, 0),
    new THREE.Vector3(1, 2, 2),
    new THREE.Vector3(2, 3, 1),
    new THREE.Vector3(3, 2, 0),
    new THREE.Vector3(-2, 0, -1),
    new THREE.Vector3(0, 1, -2),
    new THREE.Vector3(2, 0, -1),
    new THREE.Vector3(-1, -1, 0),
    new THREE.Vector3(1, -1, 0)
];

const nodeNames = [
    'Frontal-L', 'Parietal-L', 'Temporal-L', 'Cingulate',
    'Temporal-R', 'Parietal-R', 'Frontal-R', 'Occipital-L',
    'Cerebellum', 'Occipital-R', 'Thalamus-L', 'Thalamus-R'
];

const nodes = [];
const nodeLabels = [];
const nodeMaterials = [];
const nodeBasePositions = [];
const nodePhysics = [];
const debugObjects = [];

// Color gradient from blue to red
function getNodeColor(index, total) {
    const t = index / (total - 1);
    const r = Math.floor(0x00 + (0xff - 0x00) * t);
    const g = Math.floor(0x66 + (0x33 - 0x66) * t);
    const b = Math.floor(0xff + (0x00 - 0xff) * t);
    return (r << 16) | (g << 8) | b;
}

for (let i = 0; i < nodePositions.length; i++) {
    const color = getNodeColor(i, nodePositions.length);
    const material = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.5,
        metalness: 0.3,
        roughness: 0.4
    });
    nodeMaterials.push(material);

    const geometry = new THREE.SphereGeometry(0.3, 32, 32);
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.copy(nodePositions[i]);
    mesh.userData = { nodeIndex: i, nodeName: nodeNames[i], baseColor: color };
    scene.add(mesh);
    nodes.push(mesh);
    nodeBasePositions.push(nodePositions[i].clone());

    // Label
    const labelDiv = document.createElement('div');
    labelDiv.className = 'node-label';
    labelDiv.textContent = nodeNames[i];
    const label = new CSS2DObject(labelDiv);
    label.position.set(0, 0.5, 0);
    mesh.add(label);
    nodeLabels.push(label);

    // Physics data
    nodePhysics.push({
        frequency: 0.5 + Math.random() * 1.5,
        amplitude: 0.1 + Math.random() * 0.2,
        phase: Math.random() * Math.PI * 2,
        velocity: new THREE.Vector3(0, 0, 0),
        activityLevel: 0.3 + Math.random() * 0.3,
        isActive: false,
        activationTime: 0,
        activationDuration: 0.5
    });

    // Point light per node for glow
    const pointLight = new THREE.PointLight(color, 0.3, 3);
    mesh.add(pointLight);
}

// ============ CONNECTIONS ============
const connections = [];
const connectionLines = [];
const connectionGroup = new THREE.Group();
scene.add(connectionGroup);

// Generate connections
const connectionPairs = [
    [0, 1], [0, 3], [0, 6], [1, 2], [1, 3], [2, 3], [2, 4],
    [3, 4], [3, 5], [3, 8], [4, 5], [5, 6], [6, 9], [7, 8],
    [7, 10], [8, 9], [8, 11], [9, 5], [10, 11], [10, 3],
    [0, 7], [1, 5], [2, 10], [4, 11], [6, 9], [7, 9]
];

for (const [from, to] of connectionPairs) {
    const strength = 0.1 + Math.random() * 0.9;
    connections.push({ from, to, strength });

    const points = [nodePositions[from].clone(), nodePositions[to].clone()];
    const geometry = new THREE.BufferGeometry().setFromPoints(points);

    const material = new THREE.LineBasicMaterial({
        color: new THREE.Color().lerpColors(
            new THREE.Color(0x0044aa),
            new THREE.Color(0xff4400),
            strength
        ),
        transparent: true,
        opacity: 0.15 + strength * 0.5,
        linewidth: 1
    });

    const line = new THREE.Line(geometry, material);
    line.userData = { from, to, strength, baseOpacity: 0.15 + strength * 0.5 };
    connectionGroup.add(line);
    connectionLines.push(line);
}

// Create tube connections for better visibility
const tubeConnections = [];
for (const conn of connections) {
    const fromPos = nodePositions[conn.from];
    const toPos = nodePositions[conn.to];
    const mid = new THREE.Vector3().addVectors(fromPos, toPos).multiplyScalar(0.5);
    // Slight curve
    mid.y += conn.strength * 0.3;

    const curve = new THREE.QuadraticBezierCurve3(fromPos, mid, toPos);
    const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.02 + conn.strength * 0.03, 8, false);
    const tubeMat = new THREE.MeshBasicMaterial({
        color: new THREE.Color().lerpColors(
            new THREE.Color(0x0044aa),
            new THREE.Color(0xff4400),
            conn.strength
        ),
        transparent: true,
        opacity: 0.2 + conn.strength * 0.4
    });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    tube.userData = { from: conn.from, to: conn.to, strength: conn.strength };
    connectionGroup.add(tube);
    tubeConnections.push(tube);
}

// ============ DEBUG OBJECTS ============
const debugGroup = new THREE.Group();
debugGroup.visible = false;
scene.add(debugGroup);

const arrowHelpers = [];
const boundingSpheres = [];

for (let i = 0; i < nodes.length; i++) {
    // Velocity arrow
    const arrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0), nodes[i].position, 0.5, 0xff00ff, 0.15, 0.1
    );
    debugGroup.add(arrow);
    arrowHelpers.push(arrow);

    // Bounding sphere
    const bsGeo = new THREE.SphereGeometry(0.5, 16, 16);
    const bsMat = new THREE.MeshBasicMaterial({
        color: 0x00ff00,
        wireframe: true,
        transparent: true,
        opacity: 0.3
    });
    const bs = new THREE.Mesh(bsGeo, bsMat);
    bs.position.copy(nodes[i].position);
    debugGroup.add(bs);
    boundingSpheres.push(bs);
}

// ============ SELECTION HIGHLIGHT ============
const highlightRingGeo = new THREE.TorusGeometry(0.5, 0.05, 16, 32);
const highlightRingMat = new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8 });
const highlightRing = new THREE.Mesh(highlightRingGeo, highlightRingMat);
highlightRing.visible = false;
scene.add(highlightRing);

// Second ring perpendicular
const highlightRing2 = new THREE.Mesh(
    new THREE.TorusGeometry(0.5, 0.05, 16, 32),
    new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.6 })
);
highlightRing2.rotation.x = Math.PI / 2;
highlightRing2.visible = false;
scene.add(highlightRing2);

// ============ HORSE MODEL ============
const gltfLoader = new GLTFLoader();

// Horse label
const horseLabelDiv = document.createElement('div');
horseLabelDiv.className = 'node-label';
horseLabelDiv.textContent = 'Anatomical Reference';
horseLabelDiv.style.fontSize = '13px';
horseLabelDiv.style.color = '#44ff88';
const horseLabel = new CSS2DObject(horseLabelDiv);
horseLabel.position.set(8, 1, 0);
scene.add(horseLabel);

let horseModel = null;

gltfLoader.load(
    'horse.glb',
    (gltf) => {
        horseModel = gltf.scene;
        horseModel.scale.set(0.02, 0.02, 0.02);
        horseModel.position.set(8, -2, 0);

        // Apply wireframe material
        const wireMat = new THREE.MeshBasicMaterial({
            color: 0x44ff88,
            wireframe: true,
            transparent: true,
            opacity: 0.6
        });
        horseModel.traverse((child) => {
            if (child.isMesh) {
                child.material = wireMat;
            }
        });

        scene.add(horseModel);
        state.horseLoaded = true;
        console.log('Horse model loaded successfully');
    },
    (progress) => {
        console.log('Loading horse:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
    },
    (error) => {
        console.warn('Could not load horse.glb:', error.message);
        // Create placeholder
        const placeholderGeo = new THREE.BoxGeometry(2, 1.5, 4);
        const placeholderMat = new THREE.MeshBasicMaterial({
            color: 0x44ff88,
            wireframe: true,
            transparent: true,
            opacity: 0.4
        });
        const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
        placeholder.position.set(8, -1, 0);
        scene.add(placeholder);

        // Add legs
        for (let lx = -0.6; lx <= 0.6; lx += 1.2) {
            for (let lz = -1.2; lz <= 1.2; lz += 2.4) {
                const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.5, 8);
                const leg = new THREE.Mesh(legGeo, placeholderMat);
                leg.position.set(8 + lx, -2.5, lz);
                scene.add(leg);
            }
        }

        // Head
        const headGeo = new THREE.ConeGeometry(0.4, 1.5, 8);
        const head = new THREE.Mesh(headGeo, placeholderMat);
        head.position.set(8, -0.2, 2.5);
        head.rotation.x = -Math.PI / 4;
        scene.add(head);

        state.horseLoaded = true;
    }
);

// ============ GRID AND AMBIENT ============
const gridHelper = new THREE.GridHelper(30, 30, 0x112233, 0x0a0a1a);
gridHelper.position.y = -3;
scene.add(gridHelper);

// Particle background
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 40;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 40;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x334466, size: 0.05, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ STATE ============
const state = {
    nodeCount: 12,
    connectionCount: connections.length,
    debugOverlayVisible: false,
    connectionsVisible: true,
    selectedNodeIndex: -1,
    selectedNodeName: '',
    viewMode: 'normal',
    activitySpeedMultiplier: 1.0,
    activeNodeCount: 0,
    horseLoaded: false,
    allNodesActivated: false,
    frameCount: 0,
    nodesPositions: nodePositions.map(p => ({ x: p.x, y: p.y, z: p.z })),
    physicsValid: true
};
window.__3D_STATE__ = state;

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(nodes);

    if (intersects.length > 0) {
        const node = intersects[0].object;
        selectNode(node.userData.nodeIndex);
    }
}

function selectNode(index) {
    state.selectedNodeIndex = index;
    state.selectedNodeName = nodeNames[index];

    highlightRing.visible = true;
    highlightRing2.visible = true;
    highlightRing.position.copy(nodes[index].position);
    highlightRing2.position.copy(nodes[index].position);

    // Count connections
    const connCount = connections.filter(c => c.from === index || c.to === index).length;

    document.getElementById('infoNodeName').textContent = nodeNames[index];
    document.getElementById('infoConnections').textContent = connCount;
    document.getElementById('infoActivity').textContent = nodePhysics[index].activityLevel.toFixed(2);
}

function deselectNode() {
    state.selectedNodeIndex = -1;
    state.selectedNodeName = '';
    highlightRing.visible = false;
    highlightRing2.visible = false;
    document.getElementById('infoNodeName').textContent = 'None';
    document.getElementById('infoConnections').textContent = '-';
    document.getElementById('infoActivity').textContent = '-';
}

renderer.domElement.addEventListener('click', onMouseClick);

// ============ NODE ACTIVATION ============
function activateNode(index) {
    nodePhysics[index].isActive = true;
    nodePhysics[index].activationTime = performance.now() / 1000;
}

function activateAllNodes() {
    state.allNodesActivated = true;
    for (let i = 0; i < nodes.length; i++) {
        setTimeout(() => activateNode(i), i * 80);
    }
    setTimeout(() => { state.allNodesActivated = false; }, nodes.length * 80 + 500);
}

function resetAllNodes() {
    for (let i = 0; i < nodes.length; i++) {
        nodePhysics[i].isActive = false;
        nodePhysics[i].activityLevel = 0.3 + Math.random() * 0.3;
        nodes[i].scale.set(1, 1, 1);
        nodes[i].position.copy(nodeBasePositions[i]);

        const baseColor = nodes[i].userData.baseColor;
        nodeMaterials[i].color.setHex(baseColor);
        nodeMaterials[i].emissive.setHex(baseColor);
        nodeMaterials[i].emissiveIntensity = 0.5;
        nodeMaterials[i].wireframe = false;
    }
    deselectNode();
    state.allNodesActivated = false;
}

// ============ VIEW MODE ============
function applyViewMode(mode) {
    state.viewMode = mode;

    for (let i = 0; i < nodes.length; i++) {
        const mat = nodeMaterials[i];
        const physics = nodePhysics[i];

        switch (mode) {
            case 'normal':
                mat.color.setHex(nodes[i].userData.baseColor);
                mat.emissive.setHex(nodes[i].userData.baseColor);
                mat.emissiveIntensity = 0.5;
                mat.wireframe = false;
                break;
            case 'heatmap':
                // Will be updated in animation loop
                mat.wireframe = false;
                break;
            case 'wireframe':
                mat.wireframe = true;
                mat.emissiveIntensity = 0.8;
                break;
        }
    }
}

// ============ UI EVENT HANDLERS ============
document.getElementById('toggleDebug').addEventListener('click', () => {
    state.debugOverlayVisible = !state.debugOverlayVisible;
    debugGroup.visible = state.debugOverlayVisible;
    document.getElementById('infoDebug').textContent = state.debugOverlayVisible ? 'ON' : 'OFF';
});

document.getElementById('activateRandom').addEventListener('click', () => {
    const idx = Math.floor(Math.random() * nodes.length);
    activateNode(idx);
});

document.getElementById('toggleConnections').addEventListener('click', () => {
    state.connectionsVisible = !state.connectionsVisible;
    connectionGroup.visible = state.connectionsVisible;
});

document.getElementById('viewMode').addEventListener('change', (e) => {
    applyViewMode(e.target.value);
});

document.getElementById('activitySpeed').addEventListener('input', (e) => {
    state.activitySpeedMultiplier = parseFloat(e.target.value);
    document.getElementById('speedValue').textContent = state.activitySpeedMultiplier.toFixed(1);
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.key === 'd' || e.key === 'D') {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
            state.debugOverlayVisible = !state.debugOverlayVisible;
            debugGroup.visible = state.debugOverlayVisible;
            document.getElementById('infoDebug').textContent = state.debugOverlayVisible ? 'ON' : 'OFF';
        }
    }
    if (e.key === ' ') {
        e.preventDefault();
        activateAllNodes();
    }
    if (e.key === 'r' || e.key === 'R') {
        if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'SELECT') {
            resetAllNodes();
        }
    }
});

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);

    const time = clock.getElapsedTime();
    const delta = clock.getDelta();
    const speedMult = state.activitySpeedMultiplier;
    state.frameCount++;

    let activeCount = 0;
    let physicsValid = true;

    for (let i = 0; i < nodes.length; i++) {
        const physics = nodePhysics[i];
        const node = nodes[i];
        const basePos = nodeBasePositions[i];

        // Oscillation
        const osc = Math.sin(time * physics.frequency * speedMult + physics.phase) * physics.amplitude;
        const oscX = Math.sin(time * physics.frequency * 0.7 * speedMult + physics.phase + 1) * physics.amplitude * 0.5;
        const oscZ = Math.cos(time * physics.frequency * 0.5 * speedMult + physics.phase + 2) * physics.amplitude * 0.3;

        node.position.set(
            basePos.x + oscX,
            basePos.y + osc,
            basePos.z + oscZ
        );

        // Velocity for debug
        physics.velocity.set(
            Math.cos(time * physics.frequency * 0.7 * speedMult + physics.phase + 1) * physics.amplitude * 0.5 * physics.frequency * 0.7 * speedMult,
            Math.cos(time * physics.frequency * speedMult + physics.phase) * physics.amplitude * physics.frequency * speedMult,
            -Math.sin(time * physics.frequency * 0.5 * speedMult + physics.phase + 2) * physics.amplitude * 0.3 * physics.frequency * 0.5 * speedMult
        );

        // Activity level oscillation
        physics.activityLevel = 0.3 + 0.3 * Math.sin(time * physics.frequency * 0.3 * speedMult + physics.phase);

        // Activation pulse
        if (physics.isActive) {
            const elapsed = time - physics.activationTime;
            if (elapsed < physics.activationDuration) {
                const t = elapsed / physics.activationDuration;
                const scale = 1 + 0.5 * Math.sin(t * Math.PI);
                node.scale.set(scale, scale, scale);
                physics.activityLevel = Math.min(1.0, physics.activityLevel + 0.5 * (1 - t));
                activeCount++;
            } else {
                physics.isActive = false;
                node.scale.set(1, 1, 1);
            }
        }

        // Emissive pulse
        const emissiveIntensity = 0.3 + 0.3 * Math.sin(time * physics.frequency * speedMult + physics.phase);
        nodeMaterials[i].emissiveIntensity = physics.isActive ? 1.0 : emissiveIntensity;

        // Heatmap mode
        if (state.viewMode === 'heatmap') {
            const heatColor = new THREE.Color();
            heatColor.setHSL(0.66 - physics.activityLevel * 0.66, 1.0, 0.4 + physics.activityLevel * 0.2);
            nodeMaterials[i].color.copy(heatColor);
            nodeMaterials[i].emissive.copy(heatColor);
        }

        // Update state positions
        state.nodesPositions[i] = { x: node.position.x, y: node.position.y, z: node.position.z };

        // Check for NaN
        if (isNaN(node.position.x) || isNaN(node.position.y) || isNaN(node.position.z)) {
            physicsValid = false;
        }

        // Update debug objects
        if (state.debugOverlayVisible) {
            arrowHelpers[i].position.copy(node.position);
            const velDir = physics.velocity.clone().normalize();
            const velLen = physics.velocity.length();
            if (velLen > 0.001) {
                arrowHelpers[i].setDirection(velDir);
                arrowHelpers[i].setLength(Math.min(velLen * 2, 1.5), 0.15, 0.1);
            }
            boundingSpheres[i].position.copy(node.position);
        }
    }

    state.activeNodeCount = activeCount;
    state.physicsValid = physicsValid;

    // Update connection lines
    for (let i = 0; i < connectionLines.length; i++) {
        const conn = connectionLines[i].userData;
        const fromPos = nodes[conn.from].position;
        const toPos = nodes[conn.to].position;

        const positions = connectionLines[i].geometry.attributes.position;
        positions.setXYZ(0, fromPos.x, fromPos.y, fromPos.z);
        positions.setXYZ(1, toPos.x, toPos.y, toPos.z);
        positions.needsUpdate = true;

        // Pulse opacity
        const pulse = 0.5 + 0.5 * Math.sin(time * 2 * speedMult + i * 0.5);
        connectionLines[i].material.opacity = conn.baseOpacity * (0.7 + 0.3 * pulse);
    }

    // Update tube connections
    for (let i = 0; i < tubeConnections.length; i++) {
        const conn = tubeConnections[i].userData;
        const fromPos = nodes[conn.from].position;
        const toPos = nodes[conn.to].position;
        const mid = new THREE.Vector3().addVectors(fromPos, toPos).multiplyScalar(0.5);
        mid.y += conn.strength * 0.3;

        const curve = new THREE.QuadraticBezierCurve3(fromPos, mid, toPos);
        const newGeo = new THREE.TubeGeometry(curve, 20, 0.02 + conn.strength * 0.03, 8, false);
        tubeConnections[i].geometry.dispose();
        tubeConnections[i].geometry = newGeo;

        const pulse = 0.5 + 0.5 * Math.sin(time * 3 * speedMult + i * 0.7);
        tubeConnections[i].material.opacity = (0.2 + conn.strength * 0.4) * (0.6 + 0.4 * pulse);
    }

    // Highlight ring animation
    if (highlightRing.visible && state.selectedNodeIndex >= 0) {
        highlightRing.position.copy(nodes[state.selectedNodeIndex].position);
        highlightRing2.position.copy(nodes[state.selectedNodeIndex].position);
        highlightRing.rotation.z = time * 2;
        highlightRing2.rotation.y = time * 1.5;

        // Update info panel activity
        document.getElementById('infoActivity').textContent = nodePhysics[state.selectedNodeIndex].activityLevel.toFixed(2);
    }

    document.getElementById('infoActiveCount').textContent = activeCount;

    // Rotate horse gently
    if (horseModel) {
        horseModel.rotation.y = Math.sin(time * 0.3) * 0.2;
    }

    // Rotate particles slowly
    particles.rotation.y = time * 0.02;

    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
