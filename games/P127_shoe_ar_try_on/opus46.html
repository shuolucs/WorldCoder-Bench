<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鞋款 AR 虚拟试穿模拟器</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
    overflow: hidden; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #fff;
}
#canvas-container {
    width: 100vw;
    height: 100vh;
    position: relative;
}
canvas { display: block; }

/* HUD Panel */
#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 16px 20px;
    min-width: 220px;
    z-index: 10;
}
#hud h3 {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}
#hud .hud-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0;
    font-size: 13px;
}
#hud .hud-row .label { color: #888; }
#hud .hud-row .value { color: #fff; font-weight: 600; }
#hud .hud-row .value.loaded { color: #4ade80; }
#hud .hud-row .value.loading { color: #fbbf24; }

/* Controls Panel */
#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 16px;
    padding: 20px 28px;
    display: flex;
    gap: 24px;
    align-items: flex-end;
    z-index: 10;
}
.control-group {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
}
.control-group label {
    font-size: 11px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.control-group .value-display {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    min-width: 60px;
    text-align: center;
}
input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 140px;
    height: 6px;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}
input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #6366f1;
    border: 2px solid #fff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(99, 102, 241, 0.5);
}
input[type="range"]::-moz-range-thumb {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #6366f1;
    border: 2px solid #fff;
    cursor: pointer;
}
button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
#footToggle {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: #fff;
    min-width: 80px;
}
#footToggle:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
}
#snapshotBtn {
    background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: #fff;
    min-width: 80px;
}
#snapshotBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
}

/* Snapshot Gallery */
#snapshotGallery {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    z-index: 10;
}
#snapshotGallery::-webkit-scrollbar { width: 4px; }
#snapshotGallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 2px; }
#snapshotGallery img {
    width: 140px;
    height: auto;
    border-radius: 8px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    cursor: pointer;
    transition: all 0.2s;
}
#snapshotGallery img:hover {
    border-color: #6366f1;
    transform: scale(1.05);
}

/* Loading overlay */
#loadingOverlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    transition: opacity 0.5s;
}
#loadingOverlay.hidden {
    opacity: 0;
    pointer-events: none;
}
.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top-color: #6366f1;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
    color: #fff;
    margin-top: 16px;
    font-size: 14px;
}
.loading-content {
    display: flex;
    flex-direction: column;
    align-items: center;
}
</style>
</head>
<body>
<div id="canvas-container">
    <div id="loadingOverlay">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">加载鞋子模型中...</div>
        </div>
    </div>

    <!-- HUD -->
    <div id="hud">
        <h3>👟 试穿信息</h3>
        <div class="hud-row">
            <span class="label">尺码</span>
            <span class="value" id="currentSize">EU 40</span>
        </div>
        <div class="hud-row">
            <span class="label">脚侧</span>
            <span class="value" id="footSideDisplay">左脚</span>
        </div>
        <div class="hud-row">
            <span class="label">旋转</span>
            <span class="value" id="rotationDisplay">0°</span>
        </div>
        <div class="hud-row">
            <span class="label">快照</span>
            <span class="value" id="snapshotCountDisplay">0</span>
        </div>
        <div class="hud-row">
            <span class="label">状态</span>
            <span class="value loading" id="loadStatus">加载中...</span>
        </div>
    </div>

    <!-- Controls -->
    <div id="controls">
        <div class="control-group">
            <label>尺码</label>
            <div class="value-display" id="sizeDisplay">EU 40</div>
            <input type="range" id="sizeSlider" min="36" max="46" step="1" value="40">
        </div>
        <div class="control-group">
            <label>角度微调</label>
            <div class="value-display" id="rotationValue">0°</div>
            <input type="range" id="rotationSlider" min="-15" max="15" step="1" value="0">
        </div>
        <div class="control-group">
            <label>脚侧</label>
            <button id="footToggle">左脚</button>
        </div>
        <div class="control-group">
            <label>拍照</label>
            <button id="snapshotBtn">📷 快照</button>
        </div>
    </div>

    <!-- Snapshot Gallery -->
    <div id="snapshotGallery"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Global state
window.__3D_STATE__ = {
    modelLoaded: false,
    currentSize: 40,
    footSide: 'left',
    rotationAngle: 0,
    snapshotCount: 0,
    shoeScale: 1.0,
    cameraDistance: 0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf0f0f0);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0.8, 0.6, 1.2);

const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.getElementById('canvas-container').appendChild(renderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.15, 0);
controls.minDistance = 0.5;
controls.maxDistance = 4;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// 3-point lighting
// Key light
const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(2, 3, 2);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 10;
keyLight.shadow.camera.left = -2;
keyLight.shadow.camera.right = 2;
keyLight.shadow.camera.top = 2;
keyLight.shadow.camera.bottom = -2;
keyLight.shadow.bias = -0.001;
scene.add(keyLight);

// Fill light
const fillLight = new THREE.DirectionalLight(0x8ecae6, 1.0);
fillLight.position.set(-2, 1.5, -1);
scene.add(fillLight);

// Rim light
const rimLight = new THREE.DirectionalLight(0xffd6a5, 1.5);
rimLight.position.set(0, 1, -3);
scene.add(rimLight);

// Ambient
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

// Platform
const platformGeom = new THREE.CylinderGeometry(0.5, 0.5, 0.03, 64);
const platformMat = new THREE.MeshStandardMaterial({ 
    color: 0x888888, 
    roughness: 0.3, 
    metalness: 0.1 
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -0.015;
platform.receiveShadow = true;
scene.add(platform);

// Shadow plane under platform
const shadowGeom = new THREE.CircleGeometry(0.6, 64);
const shadowMat = new THREE.MeshBasicMaterial({
    color: 0x000000,
    transparent: true,
    opacity: 0.15,
    depthWrite: false
});
const shadowPlane = new THREE.Mesh(shadowGeom, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.position.y = -0.029;
scene.add(shadowPlane);

// Ground plane for shadow receiving
const groundGeom = new THREE.PlaneGeometry(10, 10);
const groundMat = new THREE.ShadowMaterial({ opacity: 0.2 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.03;
ground.receiveShadow = true;
scene.add(ground);

// Foot placeholder
const footGroup = new THREE.Group();

const footGeom = new THREE.BoxGeometry(0.3, 0.15, 0.8);
const footMat = new THREE.MeshStandardMaterial({
    color: 0xffd1a4,
    transparent: true,
    opacity: 0.5,
    roughness: 0.8,
    metalness: 0.0
});
const footMesh = new THREE.Mesh(footGeom, footMat);
footMesh.position.y = 0.075 + 0.015; // half height + platform top
footGroup.add(footMesh);

scene.add(footGroup);

// Shoe container
const shoeContainer = new THREE.Group();
scene.add(shoeContainer);

let shoeModel = null;
let baseShoeScale = 1.0;
let isLeftFoot = true;
let baseRotationY = 0;

// Load shoe model
const loader = new GLTFLoader();
loader.load(
    'assets/MaterialsVariantsShoe.glb',
    (gltf) => {
        shoeModel = gltf.scene;

        // Compute bounding box to center and scale
        const box = new THREE.Box3().setFromObject(shoeModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        // Center the model
        shoeModel.position.sub(center);

        // Scale to fit nicely on the foot
        const maxDim = Math.max(size.x, size.y, size.z);
        baseShoeScale = 0.8 / maxDim;
        shoeModel.scale.setScalar(baseShoeScale);

        // Recalculate after scaling
        const scaledBox = new THREE.Box3().setFromObject(shoeModel);
        const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
        const scaledSize = scaledBox.getSize(new THREE.Vector3());

        // Enable shadows
        shoeModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        shoeContainer.add(shoeModel);

        // Position shoe on top of foot placeholder
        // Foot top is at footMesh.position.y + 0.075 = 0.165
        shoeContainer.position.y = footMesh.position.y + 0.02;
        shoeContainer.position.z = 0;

        // Store base rotation
        baseRotationY = shoeContainer.rotation.y;

        window.__3D_STATE__.modelLoaded = true;
        document.getElementById('loadStatus').textContent = '已加载';
        document.getElementById('loadStatus').className = 'value loaded';
        document.getElementById('loadingOverlay').classList.add('hidden');

        // Apply initial size
        updateSize(40);
    },
    (progress) => {
        if (progress.total > 0) {
            const pct = Math.round((progress.loaded / progress.total) * 100);
            document.querySelector('.loading-text').textContent = `加载中... ${pct}%`;
        }
    },
    (error) => {
        console.error('Error loading model:', error);
        document.getElementById('loadStatus').textContent = '加载失败';
        document.querySelector('.loading-text').textContent = '模型加载失败，请检查路径';
    }
);

// Size control
function updateSize(size) {
    const scaleFactor = 1.0 + (size - 40) * 0.03;
    window.__3D_STATE__.currentSize = size;
    window.__3D_STATE__.shoeScale = scaleFactor;

    // Scale shoe
    if (shoeModel) {
        const s = baseShoeScale * scaleFactor;
        const xSign = isLeftFoot ? 1 : -1;
        shoeModel.scale.set(s * xSign, s, s);
    }

    // Scale foot placeholder
    const footScaleX = scaleFactor * (isLeftFoot ? 1 : -1);
    footMesh.scale.set(footScaleX, scaleFactor, scaleFactor);

    // Update displays
    document.getElementById('sizeDisplay').textContent = `EU ${size}`;
    document.getElementById('currentSize').textContent = `EU ${size}`;
}

// Rotation control
function updateRotation(angle) {
    window.__3D_STATE__.rotationAngle = angle;
    const rad = THREE.MathUtils.degToRad(angle);
    shoeContainer.rotation.y = baseRotationY + rad;
    footGroup.rotation.y = rad;

    document.getElementById('rotationValue').textContent = `${angle}°`;
    document.getElementById('rotationDisplay').textContent = `${angle}°`;
}

// Foot toggle
function toggleFoot() {
    isLeftFoot = !isLeftFoot;
    window.__3D_STATE__.footSide = isLeftFoot ? 'left' : 'right';

    const size = window.__3D_STATE__.currentSize;
    updateSize(size);

    const label = isLeftFoot ? '左脚' : '右脚';
    document.getElementById('footToggle').textContent = label;
    document.getElementById('footSideDisplay').textContent = label;
}

// Snapshot
function takeSnapshot() {
    renderer.render(scene, camera);
    const dataURL = renderer.domElement.toDataURL('image/png');

    const img = document.createElement('img');
    img.src = dataURL;
    img.title = `快照 ${window.__3D_STATE__.snapshotCount + 1}`;
    img.addEventListener('click', () => {
        const w = window.open();
        w.document.write(`<img src="${dataURL}" style="max-width:100%">`);
    });

    document.getElementById('snapshotGallery').appendChild(img);
    window.__3D_STATE__.snapshotCount++;
    document.getElementById('snapshotCountDisplay').textContent = window.__3D_STATE__.snapshotCount;
}

// Event listeners
document.getElementById('sizeSlider').addEventListener('input', (e) => {
    updateSize(parseInt(e.target.value));
});

document.getElementById('rotationSlider').addEventListener('input', (e) => {
    updateRotation(parseInt(e.target.value));
});

document.getElementById('footToggle').addEventListener('click', toggleFoot);
document.getElementById('snapshotBtn').addEventListener('click', takeSnapshot);

// Resize handler
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Update camera distance
    window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
