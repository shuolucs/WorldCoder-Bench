<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 鞋款 AR 虚拟试穿模拟器</title>
  <style>
    :root {
      --panel-bg: rgba(255, 255, 255, 0.78);
      --panel-border: rgba(0, 0, 0, 0.08);
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f6f6f6 0%, #ececec 100%);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #canvasWrap {
      position: absolute;
      inset: 0;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      min-width: 220px;
      padding: 14px 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    #hud h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .hud-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 7px 0;
      font-size: 14px;
    }

    .hud-label {
      color: var(--muted);
    }

    .hud-value {
      font-weight: 600;
    }

    #controls {
      position: absolute;
      right: 16px;
      top: 16px;
      z-index: 20;
      width: min(360px, calc(100vw - 32px));
      padding: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    #controls h3 {
      margin: 0 0 14px;
      font-size: 16px;
    }

    .control-group {
      margin-bottom: 14px;
    }

    .control-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    button {
      appearance: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      background: var(--accent);
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease, box-shadow .12s ease;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.22);
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); opacity: 0.92; }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    #snapshotPanel {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      z-index: 20;
      padding: 12px;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-height: 180px;
      overflow: hidden;
    }

    #snapshotPanel h3 {
      margin: 0 0 10px;
      font-size: 15px;
    }

    #snapshotGallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 4px;
      min-height: 88px;
    }

    .snap-item {
      position: relative;
      flex: 0 0 auto;
      width: 140px;
      height: 88px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid rgba(0,0,0,0.08);
      background: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    .snap-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .snap-badge {
      position: absolute;
      left: 8px;
      top: 8px;
      padding: 2px 7px;
      font-size: 11px;
      border-radius: 999px;
      background: rgba(0,0,0,0.62);
      color: #fff;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      #controls {
        top: auto;
        bottom: 210px;
      }
      #snapshotPanel {
        max-height: 170px;
      }
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="canvasWrap"></div>

    <div id="hud">
      <h2>试穿状态</h2>
      <div class="hud-row"><span class="hud-label">当前尺码</span><span class="hud-value" id="currentSize">EU 40</span></div>
      <div class="hud-row"><span class="hud-label">脚侧</span><span class="hud-value" id="footSideDisplay">右脚</span></div>
      <div class="hud-row"><span class="hud-label">旋转角度</span><span class="hud-value" id="rotationDisplay">0°</span></div>
      <div class="hud-row"><span class="hud-label">快照数量</span><span class="hud-value" id="snapshotCountDisplay">0</span></div>
      <div class="hud-row"><span class="hud-label">模型状态</span><span class="hud-value" id="loadStatus">加载中...</span></div>
    </div>

    <div id="controls">
      <h3>虚拟试穿控制</h3>

      <div class="control-group">
        <div class="control-top">
          <label for="sizeSlider">尺码</label>
          <strong id="sizeDisplay">EU 40</strong>
        </div>
        <input id="sizeSlider" type="range" min="36" max="46" step="1" value="40" />
      </div>

      <div class="control-group">
        <div class="control-top">
          <label for="rotationSlider">角度微调</label>
          <strong><span id="rotationInline">0</span>°</strong>
        </div>
        <input id="rotationSlider" type="range" min="-15" max="15" step="1" value="0" />
      </div>

      <div class="button-row">
        <button id="footToggle" type="button">切换到左脚</button>
        <button id="snapshotBtn" type="button">快照</button>
      </div>

      <div class="hint">
        支持鼠标/触控拖拽环绕查看。尺码会同步缩放鞋子与脚部占位符，左右脚切换将进行镜像翻转。
      </div>
    </div>

    <div id="snapshotPanel">
      <h3>快照画廊</h3>
      <div id="snapshotGallery"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const canvasWrap = document.getElementById('canvasWrap');

    const sizeSlider = document.getElementById('sizeSlider');
    const sizeDisplay = document.getElementById('sizeDisplay');
    const currentSize = document.getElementById('currentSize');

    const rotationSlider = document.getElementById('rotationSlider');
    const rotationInline = document.getElementById('rotationInline');
    const rotationDisplay = document.getElementById('rotationDisplay');

    const footToggle = document.getElementById('footToggle');
    const snapshotBtn = document.getElementById('snapshotBtn');
    const snapshotGallery = document.getElementById('snapshotGallery');

    const footSideDisplay = document.getElementById('footSideDisplay');
    const snapshotCountDisplay = document.getElementById('snapshotCountDisplay');
    const loadStatus = document.getElementById('loadStatus');

    window.__3D_STATE__ = {
      modelLoaded: false,
      currentSize: 40,
      footSide: 'right',
      rotationAngle: 0,
      snapshotCount: 0,
      shoeScale: 1.0,
      cameraDistance: 0
    };

    const scene = new THREE.Scene();

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 32;
    bgCanvas.height = 256;
    const bgCtx = bgCanvas.getContext('2d');
    const gradient = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
    gradient.addColorStop(0, '#f7f7f7');
    gradient.addColorStop(1, '#e9e9e9');
    bgCtx.fillStyle = gradient;
    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(1.9, 1.4, 2.6);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    canvasWrap.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.45, 0);
    controls.minDistance = 1.2;
    controls.maxDistance = 6;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambient = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambient);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.35);
    keyLight.position.set(3.2, 4.0, 2.8);
    keyLight.castShadow = true;
    keyLight.shadow.mapSize.set(2048, 2048);
    keyLight.shadow.camera.near = 0.5;
    keyLight.shadow.camera.far = 15;
    keyLight.shadow.camera.left = -3;
    keyLight.shadow.camera.right = 3;
    keyLight.shadow.camera.top = 3;
    keyLight.shadow.camera.bottom = -3;
    scene.add(keyLight);

    const fillLight = new THREE.DirectionalLight(0xdde7ff, 0.7);
    fillLight.position.set(-3.2, 2.2, 2.0);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0xffffff, 0.95);
    rimLight.position.set(0.5, 2.8, -3.5);
    scene.add(rimLight);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(0.95, 1.05, 0.12, 64),
      new THREE.MeshStandardMaterial({
        color: 0xbcbcbc,
        roughness: 0.92,
        metalness: 0.06
      })
    );
    platform.position.y = 0;
    platform.receiveShadow = true;
    scene.add(platform);

    const shadowPlane = new THREE.Mesh(
      new THREE.CircleGeometry(0.72, 64),
      new THREE.MeshBasicMaterial({
        color: 0x000000,
        transparent: true,
        opacity: 0.12
      })
    );
    shadowPlane.rotation.x = -Math.PI / 2;
    shadowPlane.position.y = 0.061;
    scene.add(shadowPlane);

    const footRoot = new THREE.Group();
    footRoot.position.set(0, 0.19, 0);
    scene.add(footRoot);

    const footPlaceholder = new THREE.Mesh(
      new THREE.BoxGeometry(0.3, 0.15, 0.8),
      new THREE.MeshStandardMaterial({
        color: 0xffd1a4,
        transparent: true,
        opacity: 0.5,
        roughness: 0.85,
        metalness: 0.02
      })
    );
    footPlaceholder.castShadow = true;
    footPlaceholder.receiveShadow = true;
    footRoot.add(footPlaceholder);

    const footEdge = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(0.3, 0.15, 0.8)),
      new THREE.LineBasicMaterial({ color: 0xd29062, transparent: true, opacity: 0.55 })
    );
    footRoot.add(footEdge);

    const shoeRoot = new THREE.Group();
    scene.add(shoeRoot);

    let loadedShoe = null;
    let baseModelScale = 1;
    let currentSide = 'right';
    let currentSizeValue = 40;
    let currentRotationDeg = 0;

    const loader = new GLTFLoader();
    loader.load(
      'assets/MaterialsVariantsShoe.glb',
      (gltf) => {
        const model = gltf.scene;
        loadedShoe = model;

        model.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              if (Array.isArray(obj.material)) {
                obj.material.forEach(mat => {
                  if ('side' in mat) mat.side = THREE.FrontSide;
                });
              } else {
                if ('side' in obj.material) obj.material.side = THREE.FrontSide;
              }
            }
          }
        });

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        model.position.sub(center);

        const targetLength = 0.82;
        const targetHeight = 0.22;
        const scaleByLength = targetLength / Math.max(size.z, 0.0001);
        const scaleByHeight = targetHeight / Math.max(size.y, 0.0001);
        baseModelScale = Math.min(scaleByLength, scaleByHeight) * 0.98;

        model.scale.setScalar(baseModelScale);

        shoeRoot.add(model);

        const postBox = new THREE.Box3().setFromObject(model);
        const postSize = new THREE.Vector3();
        postBox.getSize(postSize);

        shoeRoot.position.set(0, footRoot.position.y + 0.01, 0.02);
        shoeRoot.rotation.set(0, 0, 0);

        applyTransforms();

        window.__3D_STATE__.modelLoaded = true;
        loadStatus.textContent = '已加载';
      },
      undefined,
      () => {
        loadStatus.textContent = '加载失败';
        window.__3D_STATE__.modelLoaded = false;
      }
    );

    function getSizeScale(sizeEU) {
      return 1 + (sizeEU - 40) * 0.03;
    }

    function updateHUD() {
      sizeDisplay.textContent = `EU ${currentSizeValue}`;
      currentSize.textContent = `EU ${currentSizeValue}`;
      rotationInline.textContent = `${currentRotationDeg}`;
      rotationDisplay.textContent = `${currentRotationDeg}°`;
      footSideDisplay.textContent = currentSide === 'left' ? '左脚' : '右脚';
      snapshotCountDisplay.textContent = `${window.__3D_STATE__.snapshotCount}`;
      footToggle.textContent = currentSide === 'left' ? '切换到右脚' : '切换到左脚';
      loadStatus.textContent = window.__3D_STATE__.modelLoaded ? '已加载' : (loadStatus.textContent === '加载失败' ? '加载失败' : '加载中...');
    }

    function applyTransforms() {
      const sizeScale = getSizeScale(currentSizeValue);
      const sideSign = currentSide === 'left' ? -1 : 1;

      footRoot.scale.set(sideSign * sizeScale, sizeScale, sizeScale);

      if (loadedShoe) {
        loadedShoe.scale.set(
          sideSign * baseModelScale * sizeScale,
          baseModelScale * sizeScale,
          baseModelScale * sizeScale
        );
        loadedShoe.rotation.set(0, THREE.MathUtils.degToRad(currentRotationDeg), 0);
      }

      window.__3D_STATE__.currentSize = currentSizeValue;
      window.__3D_STATE__.footSide = currentSide;
      window.__3D_STATE__.rotationAngle = currentRotationDeg;
      window.__3D_STATE__.shoeScale = sizeScale;

      updateHUD();
    }

    sizeSlider.addEventListener('input', () => {
      currentSizeValue = parseInt(sizeSlider.value, 10);
      applyTransforms();
    });

    rotationSlider.addEventListener('input', () => {
      currentRotationDeg = parseInt(rotationSlider.value, 10);
      applyTransforms();
    });

    footToggle.addEventListener('click', () => {
      currentSide = currentSide === 'left' ? 'right' : 'left';
      applyTransforms();
    });

    snapshotBtn.addEventListener('click', () => {
      const dataURL = renderer.domElement.toDataURL('image/png');
      const item = document.createElement('div');
      item.className = 'snap-item';

      const img = document.createElement('img');
      img.src = dataURL;
      img.alt = 'snapshot';

      const badge = document.createElement('div');
      badge.className = 'snap-badge';
      badge.textContent = `#${window.__3D_STATE__.snapshotCount + 1}`;

      item.appendChild(img);
      item.appendChild(badge);
      snapshotGallery.prepend(item);

      window.__3D_STATE__.snapshotCount++;
      updateHUD();
    });

    applyTransforms();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const camVec = new THREE.Vector3();

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      camera.getWorldPosition(camVec);
      window.__3D_STATE__.cameraDistance = camVec.distanceTo(controls.target);
      window.__3D_STATE__.modelLoaded = !!loadedShoe && window.__3D_STATE__.modelLoaded;
      window.__3D_STATE__.currentSize = currentSizeValue;
      window.__3D_STATE__.footSide = currentSide;
      window.__3D_STATE__.rotationAngle = currentRotationDeg;
      window.__3D_STATE__.shoeScale = getSizeScale(currentSizeValue);

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
