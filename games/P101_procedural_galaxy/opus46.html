<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spiral Galaxy - 50000 Particles</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; }
  canvas { display: block; }
  #controls {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 140, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #c8d8ff;
    width: 280px;
    z-index: 100;
    box-shadow: 0 0 30px rgba(50, 80, 200, 0.2);
  }
  #controls h2 {
    font-size: 16px;
    margin-bottom: 16px;
    text-align: center;
    color: #8ab4ff;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(100, 140, 255, 0.2);
    padding-bottom: 10px;
  }
  .control-group {
    margin-bottom: 14px;
  }
  .control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    margin-bottom: 6px;
    color: #9ab0d8;
  }
  .control-group label span.val {
    color: #6fa8ff;
    font-weight: bold;
    font-size: 14px;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: rgba(100, 140, 255, 0.2);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #5090ff;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(80, 144, 255, 0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #5090ff;
    cursor: pointer;
    border: none;
  }
  #stats {
    position: fixed;
    top: 20px;
    left: 20px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 140, 255, 0.2);
    border-radius: 12px;
    padding: 16px;
    color: #8ab4ff;
    font-size: 12px;
    z-index: 100;
    line-height: 1.8;
  }
  #stats .label { color: #6a80a8; }
  #stats .value { color: #a0c4ff; font-weight: bold; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="controls">
  <h2>✦ Galaxy Controls ✦</h2>
  <div class="control-group">
    <label>Spiral Arms <span class="val" id="armCountVal">4</span></label>
    <input type="range" id="armCount" min="2" max="6" step="1" value="4">
  </div>
  <div class="control-group">
    <label>Arm Spread <span class="val" id="spreadVal">0.8</span></label>
    <input type="range" id="spread" min="0.1" max="2.0" step="0.05" value="0.8">
  </div>
  <div class="control-group">
    <label>Rotation Speed <span class="val" id="rotSpeedVal">0.15</span></label>
    <input type="range" id="rotSpeed" min="0.0" max="1.0" step="0.01" value="0.15">
  </div>
</div>

<div id="stats">
  <div><span class="label">Particles: </span><span class="value" id="statCount">50000</span></div>
  <div><span class="label">Arms: </span><span class="value" id="statArms">4</span></div>
  <div><span class="label">FPS: </span><span class="value" id="statFPS">0</span></div>
  <div><span class="label">Time: </span><span class="value" id="statTime">0.0s</span></div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- Config ---
const STAR_COUNT = 50000;
const GALAXY_RADIUS = 15;
const BULGE_RATIO = 0.15; // fraction of stars in bulge
const BULGE_COUNT = Math.floor(STAR_COUNT * BULGE_RATIO);
const ARM_COUNT_DEFAULT = 4;
const CENTER_DENSITY = 0.7;

// --- State ---
window.__3D_STATE__ = {
  starCount: STAR_COUNT,
  armCount: ARM_COUNT_DEFAULT,
  spread: 0.8,
  rotSpeed: 0.15,
  galaxyRadius: GALAXY_RADIUS,
  centerDensity: CENTER_DENSITY,
  simTime: 0
};

// --- Scene Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 18, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000005, 1);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 5;
controls.maxDistance = 80;
controls.target.set(0, 0, 0);

// --- Gaussian random ---
function gaussianRandom() {
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
}

// --- Shader Material ---
const vertexShader = `
  attribute float aSize;
  attribute float aBrightness;
  varying vec3 vColor;
  varying float vBrightness;
  
  void main() {
    vColor = color;
    vBrightness = aBrightness;
    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * (200.0 / -mvPosition.z);
    gl_Position = projectionMatrix * mvPosition;
  }
`;

const fragmentShader = `
  varying vec3 vColor;
  varying float vBrightness;
  
  void main() {
    float dist = length(gl_PointCoord - vec2(0.5));
    if (dist > 0.5) discard;
    
    float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
    alpha *= alpha;
    
    // Glow effect
    vec3 col = vColor * vBrightness;
    col += vColor * 0.3 * exp(-dist * 6.0);
    
    gl_FragColor = vec4(col, alpha * vBrightness);
  }
`;

// --- Galaxy Generation ---
let galaxyPoints = null;
let galaxyGeometry = null;

function generateGalaxy(armCount, spread) {
  const positions = new Float32Array(STAR_COUNT * 3);
  const colors = new Float32Array(STAR_COUNT * 3);
  const sizes = new Float32Array(STAR_COUNT);
  const brightness = new Float32Array(STAR_COUNT);

  const a = 0.5;  // spiral scale
  const b = 0.3;  // spiral tightness

  let idx = 0;

  // --- Bulge stars ---
  for (let i = 0; i < BULGE_COUNT; i++) {
    const r = Math.pow(Math.random(), 1.5) * GALAXY_RADIUS * 0.2;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * Math.PI;

    const x = r * Math.cos(theta) * Math.cos(phi);
    const y = r * Math.sin(phi) * 0.4;
    const z = r * Math.sin(theta) * Math.cos(phi);

    positions[idx * 3] = x;
    positions[idx * 3 + 1] = y;
    positions[idx * 3 + 2] = z;

    // Bulge stars are hotter (bluer/whiter)
    const temp = 0.7 + Math.random() * 0.3;
    colors[idx * 3] = 0.9 + temp * 0.1;
    colors[idx * 3 + 1] = 0.85 + temp * 0.15;
    colors[idx * 3 + 2] = 0.95 + temp * 0.05;

    sizes[idx] = (0.8 + Math.random() * 1.5);
    brightness[idx] = 0.5 + Math.random() * 0.5;
    idx++;
  }

  // --- Arm stars ---
  const armStars = STAR_COUNT - BULGE_COUNT;
  const starsPerArm = Math.floor(armStars / armCount);
  const remainder = armStars - starsPerArm * armCount;

  for (let arm = 0; arm < armCount; arm++) {
    const armOffset = (arm / armCount) * Math.PI * 2;
    const count = starsPerArm + (arm < remainder ? 1 : 0);

    for (let i = 0; i < count; i++) {
      // Use power distribution for r to concentrate near center
      const t = Math.random();
      const r_base = Math.pow(t, 0.6) * GALAXY_RADIUS;

      // Logarithmic spiral: θ = (1/b) * ln(r/a)
      const spiralAngle = (1.0 / b) * Math.log(Math.max(r_base, 0.01) / a);

      // Scatter
      const angleScatter = gaussianRandom() * spread * (0.3 + 0.7 * (r_base / GALAXY_RADIUS));
      const radialScatter = gaussianRandom() * spread * 0.5;

      const theta = spiralAngle + armOffset + angleScatter;
      const r = Math.max(0, r_base + radialScatter);

      const x = r * Math.cos(theta);
      const z = r * Math.sin(theta);
      // Thin disk with slight vertical scatter
      const y = gaussianRandom() * 0.15 * (1.0 + r * 0.05) * spread;

      positions[idx * 3] = x;
      positions[idx * 3 + 1] = y;
      positions[idx * 3 + 2] = z;

      // Color based on distance (temperature gradient)
      // Inner = blue/white (hot), outer = red/orange (cool)
      const normalizedR = r / GALAXY_RADIUS;
      const temp = 1.0 - normalizedR; // 1=hot(center), 0=cool(edge)

      let cr, cg, cb;
      if (temp > 0.7) {
        // Hot: blue-white
        cr = 0.7 + temp * 0.3;
        cg = 0.75 + temp * 0.25;
        cb = 0.9 + temp * 0.1;
      } else if (temp > 0.4) {
        // Medium: white-yellow
        const f = (temp - 0.4) / 0.3;
        cr = 1.0;
        cg = 0.7 + f * 0.3;
        cb = 0.4 + f * 0.5;
      } else {
        // Cool: orange-red
        const f = temp / 0.4;
        cr = 0.8 + f * 0.2;
        cg = 0.3 + f * 0.4;
        cb = 0.1 + f * 0.3;
      }

      // Add some random variation
      const variation = (Math.random() - 0.5) * 0.15;
      colors[idx * 3] = Math.min(1, Math.max(0, cr + variation));
      colors[idx * 3 + 1] = Math.min(1, Math.max(0, cg + variation));
      colors[idx * 3 + 2] = Math.min(1, Math.max(0, cb + variation * 0.5));

      // Size varies with brightness
      const bright = 0.2 + Math.random() * 0.8;
      sizes[idx] = (0.3 + bright * 1.2) * (1.0 - normalizedR * 0.3);
      brightness[idx] = bright;

      idx++;
    }
  }

  return { positions, colors, sizes, brightness };
}

function buildGalaxy() {
  if (galaxyPoints) {
    scene.remove(galaxyPoints);
    galaxyGeometry.dispose();
  }

  const data = generateGalaxy(
    window.__3D_STATE__.armCount,
    window.__3D_STATE__.spread
  );

  galaxyGeometry = new THREE.BufferGeometry();
  galaxyGeometry.setAttribute('position', new THREE.BufferAttribute(data.positions, 3));
  galaxyGeometry.setAttribute('color', new THREE.BufferAttribute(data.colors, 3));
  galaxyGeometry.setAttribute('aSize', new THREE.BufferAttribute(data.sizes, 1));
  galaxyGeometry.setAttribute('aBrightness', new THREE.BufferAttribute(data.brightness, 1));

  const material = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  galaxyPoints = new THREE.Points(galaxyGeometry, material);
  scene.add(galaxyPoints);
}

buildGalaxy();

// --- Background stars ---
const bgCount = 3000;
const bgGeom = new THREE.BufferGeometry();
const bgPos = new Float32Array(bgCount * 3);
const bgCol = new Float32Array(bgCount * 3);
const bgSizes = new Float32Array(bgCount);
const bgBright = new Float32Array(bgCount);

for (let i = 0; i < bgCount; i++) {
  const r = 40 + Math.random() * 60;
  const theta = Math.random() * Math.PI * 2;
  const phi = (Math.random() - 0.5) * Math.PI;
  bgPos[i * 3] = r * Math.cos(theta) * Math.cos(phi);
  bgPos[i * 3 + 1] = r * Math.sin(phi);
  bgPos[i * 3 + 2] = r * Math.sin(theta) * Math.cos(phi);

  const c = 0.5 + Math.random() * 0.5;
  bgCol[i * 3] = c;
  bgCol[i * 3 + 1] = c;
  bgCol[i * 3 + 2] = c + Math.random() * 0.2;

  bgSizes[i] = 0.3 + Math.random() * 0.5;
  bgBright[i] = 0.3 + Math.random() * 0.7;
}

bgGeom.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
bgGeom.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
bgGeom.setAttribute('aSize', new THREE.BufferAttribute(bgSizes, 1));
bgGeom.setAttribute('aBrightness', new THREE.BufferAttribute(bgBright, 1));

const bgMat = new THREE.ShaderMaterial({
  vertexShader,
  fragmentShader,
  vertexColors: true,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const bgStars = new THREE.Points(bgGeom, bgMat);
scene.add(bgStars);

// --- Center glow ---
const glowTexture = createGlowTexture();
const glowMat = new THREE.SpriteMaterial({
  map: glowTexture,
  color: 0x6688cc,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const glowSprite = new THREE.Sprite(glowMat);
glowSprite.scale.set(6, 6, 1);
scene.add(glowSprite);

const glowMat2 = new THREE.SpriteMaterial({
  map: glowTexture,
  color: 0xaabbff,
  transparent: true,
  opacity: 0.25,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
});
const glowSprite2 = new THREE.Sprite(glowMat2);
glowSprite2.scale.set(10, 10, 1);
scene.add(glowSprite2);

function createGlowTexture() {
  const size = 256;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.2, 'rgba(200,220,255,0.6)');
  gradient.addColorStop(0.5, 'rgba(100,150,255,0.2)');
  gradient.addColorStop(1, 'rgba(0,0,50,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const tex = new THREE.CanvasTexture(canvas);
  return tex;
}

// --- UI Controls ---
const armCountSlider = document.getElementById('armCount');
const spreadSlider = document.getElementById('spread');
const rotSpeedSlider = document.getElementById('rotSpeed');

const armCountVal = document.getElementById('armCountVal');
const spreadVal = document.getElementById('spreadVal');
const rotSpeedVal = document.getElementById('rotSpeedVal');

armCountSlider.addEventListener('input', () => {
  const v = parseInt(armCountSlider.value);
  armCountVal.textContent = v;
  window.__3D_STATE__.armCount = v;
  document.getElementById('statArms').textContent = v;
  buildGalaxy();
});

spreadSlider.addEventListener('input', () => {
  const v = parseFloat(spreadSlider.value);
  spreadVal.textContent = v.toFixed(2);
  window.__3D_STATE__.spread = v;
  buildGalaxy();
});

rotSpeedSlider.addEventListener('input', () => {
  const v = parseFloat(rotSpeedSlider.value);
  rotSpeedVal.textContent = v.toFixed(2);
  window.__3D_STATE__.rotSpeed = v;
});

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation ---
const clock = new THREE.Clock();
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 0;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  window.__3D_STATE__.simTime = elapsed;

  // FPS counter
  frameCount++;
  fpsTime += delta;
  if (fpsTime >= 0.5) {
    currentFPS = Math.round(frameCount / fpsTime);
    document.getElementById('statFPS').textContent = currentFPS;
    frameCount = 0;
    fpsTime = 0;
  }
  document.getElementById('statTime').textContent = elapsed.toFixed(1) + 's';

  // Rotate galaxy
  if (galaxyPoints) {
    galaxyPoints.rotation.y += window.__3D_STATE__.rotSpeed * delta;
  }

  // Subtle glow pulse
  const pulse = 1.0 + Math.sin(elapsed * 0.5) * 0.1;
  glowSprite.scale.set(6 * pulse, 6 * pulse, 1);
  glowSprite2.scale.set(10 * pulse, 10 * pulse, 1);

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
