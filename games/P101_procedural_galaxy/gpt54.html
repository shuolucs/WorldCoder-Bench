<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 螺旋星系 50000 粒子</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #05070d 0%, #020308 55%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eaf2ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      width: 300px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(10, 16, 28, 0.68);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
    }

    #ui h2 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .control {
      margin: 10px 0 14px;
    }

    .control label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 13px;
      color: #d6e4ff;
    }

    .value {
      color: #8dc3ff;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #76b7ff;
      cursor: pointer;
    }

    #info {
      margin-top: 8px;
      font-size: 12px;
      line-height: 1.5;
      color: #aebdd6;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>螺旋星系参数</h2>

      <div class="control">
        <label for="armCount">
          <span>旋臂数量</span>
          <span class="value" id="armCountValue">4</span>
        </label>
        <input id="armCount" type="range" min="2" max="6" step="1" value="4" />
      </div>

      <div class="control">
        <label for="spread">
          <span>臂宽 / 离散度</span>
          <span class="value" id="spreadValue">0.80</span>
        </label>
        <input id="spread" type="range" min="0.1" max="2.0" step="0.01" value="0.8" />
      </div>

      <div class="control">
        <label for="rotSpeed">
          <span>旋转角速度</span>
          <span class="value" id="rotSpeedValue">0.15</span>
        </label>
        <input id="rotSpeed" type="range" min="0.00" max="1.00" step="0.01" value="0.15" />
      </div>

      <div id="info">
        50000 粒子，含中心核球与 4 条默认对数螺旋臂。<br />
        拖动鼠标可旋转视角，滚轮缩放。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const STAR_COUNT = 50000;
    const GALAXY_RADIUS = 32;
    const CENTER_DENSITY = 0.28;

    const app = document.getElementById('app');

    const armCountEl = document.getElementById('armCount');
    const spreadEl = document.getElementById('spread');
    const rotSpeedEl = document.getElementById('rotSpeed');

    const armCountValueEl = document.getElementById('armCountValue');
    const spreadValueEl = document.getElementById('spreadValue');
    const rotSpeedValueEl = document.getElementById('rotSpeedValue');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);
    scene.fog = new THREE.FogExp2(0x03050a, 0.018);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 300);
    camera.position.set(0, 18, 58);

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 2, 0);
    controls.minDistance = 12;
    controls.maxDistance = 120;

    const galaxyGroup = new THREE.Group();
    scene.add(galaxyGroup);

    const ambient = new THREE.AmbientLight(0xffffff, 0.15);
    scene.add(ambient);

    const textureLoader = new THREE.TextureLoader();
    const spriteTexture = createStarTexture();

    let galaxyPoints = null;

    const params = {
      starCount: STAR_COUNT,
      armCount: parseInt(armCountEl.value, 10),
      spread: parseFloat(spreadEl.value),
      rotSpeed: parseFloat(rotSpeedEl.value),
      galaxyRadius: GALAXY_RADIUS,
      centerDensity: CENTER_DENSITY,
      simTime: 0
    };

    window.__3D_STATE__ = { ...params };

    function updateState() {
      window.__3D_STATE__ = {
        starCount: params.starCount,
        armCount: params.armCount,
        spread: params.spread,
        rotSpeed: params.rotSpeed,
        galaxyRadius: params.galaxyRadius,
        centerDensity: params.centerDensity,
        simTime: params.simTime
      };
    }

    function gaussianRandom(mean = 0, stdDev = 1) {
      let u = 0, v = 0;
      while (u === 0) u = Math.random();
      while (v === 0) v = Math.random();
      const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
      return z * stdDev + mean;
    }

    function createStarTexture() {
      const size = 64;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
      gradient.addColorStop(0.0, 'rgba(255,255,255,1.0)');
      gradient.addColorStop(0.18, 'rgba(255,255,255,0.95)');
      gradient.addColorStop(0.4, 'rgba(200,220,255,0.55)');
      gradient.addColorStop(1.0, 'rgba(0,0,0,0.0)');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    function lerpColor(c1, c2, t) {
      return new THREE.Color().copy(c1).lerp(c2, t);
    }

    function buildGalaxy() {
      if (galaxyPoints) {
        galaxyGroup.remove(galaxyPoints);
        galaxyPoints.geometry.dispose();
        galaxyPoints.material.dispose();
      }

      const geometry = new THREE.BufferGeometry();

      const positions = new Float32Array(params.starCount * 3);
      const colors = new Float32Array(params.starCount * 3);
      const sizes = new Float32Array(params.starCount);

      const armCount = params.armCount;
      const spread = params.spread;

      const bulgeCount = Math.floor(params.starCount * params.centerDensity);
      const diskCount = params.starCount - bulgeCount;

      const coldColor = new THREE.Color(0xff8a6b);
      const warmColor = new THREE.Color(0xfff2cc);
      const hotColor = new THREE.Color(0x8ec5ff);

      // 对数螺旋参数: r = a * exp(b * theta)
      const a = 0.9;
      const b = 0.24;
      const maxTheta = Math.log((GALAXY_RADIUS + a) / a) / b;

      let ptr = 0;

      // 中心核球：在 r 小处提高密度
      for (let i = 0; i < bulgeCount; i++) {
        const u = Math.random();
        const r = Math.pow(u, 1.8) * GALAXY_RADIUS * 0.22;
        const phi = Math.random() * Math.PI * 2;
        const y = gaussianRandom(0, 0.9) * (1.0 - r / (GALAXY_RADIUS * 0.25));

        const x = Math.cos(phi) * r + gaussianRandom(0, 0.18);
        const z = Math.sin(phi) * r + gaussianRandom(0, 0.18);

        positions[ptr * 3 + 0] = x;
        positions[ptr * 3 + 1] = y;
        positions[ptr * 3 + 2] = z;

        const tempMix = 0.35 + Math.random() * 0.45;
        const bulgeColor = lerpColor(coldColor, warmColor, tempMix);
        colors[ptr * 3 + 0] = bulgeColor.r;
        colors[ptr * 3 + 1] = bulgeColor.g;
        colors[ptr * 3 + 2] = bulgeColor.b;

        sizes[ptr] = 4.0 + Math.random() * 7.0;
        ptr++;
      }

      // 旋臂星体
      for (let i = 0; i < diskCount; i++) {
        const armIndex = i % armCount;
        const armOffset = (armIndex / armCount) * Math.PI * 2;

        const radiusT = Math.pow(Math.random(), 0.72);
        const theta = radiusT * maxTheta * 0.98 + Math.random() * 0.08;
        let r = a * Math.exp(b * theta);
        r = Math.min(r, GALAXY_RADIUS);

        const armScatterAngular = gaussianRandom(0, 0.16 * spread + 0.015 * (r / GALAXY_RADIUS) * spread);
        const armScatterRadial = gaussianRandom(0, 0.45 * spread + 0.03 * r);
        const angle = theta + armOffset + armScatterAngular;

        const finalR = Math.max(0, r + armScatterRadial);
        const x = Math.cos(angle) * finalR;
        const z = Math.sin(angle) * finalR;
        const y = gaussianRandom(0, 0.06 + 0.028 * spread + 0.012 * finalR);

        positions[ptr * 3 + 0] = x;
        positions[ptr * 3 + 1] = y;
        positions[ptr * 3 + 2] = z;

        // 温度颜色：中心偏热蓝，外缘偏冷红
        const t = THREE.MathUtils.clamp(finalR / GALAXY_RADIUS, 0, 1);
        let color;
        if (t < 0.45) {
          color = lerpColor(hotColor, warmColor, t / 0.45);
        } else {
          color = lerpColor(warmColor, coldColor, (t - 0.45) / 0.55);
        }

        const brightness = 0.8 + Math.random() * 0.5;
        color.multiplyScalar(brightness);

        colors[ptr * 3 + 0] = Math.min(color.r, 1.0);
        colors[ptr * 3 + 1] = Math.min(color.g, 1.0);
        colors[ptr * 3 + 2] = Math.min(color.b, 1.0);

        sizes[ptr] = 2.0 + Math.random() * 5.5;
        ptr++;
      }

      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));

      const material = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending,
        vertexColors: true,
        uniforms: {
          uPixelRatio: { value: renderer.getPixelRatio() },
          uTexture: { value: spriteTexture }
        },
        vertexShader: `
          attribute float aSize;
          varying vec3 vColor;

          void main() {
            vColor = color;

            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            gl_Position = projectionMatrix * mvPosition;

            float size = aSize * uPixelRatio;
            size *= (120.0 / max(10.0, -mvPosition.z));
            gl_PointSize = size;
          }
        `,
        fragmentShader: `
          uniform sampler2D uTexture;
          varying vec3 vColor;

          void main() {
            vec4 tex = texture2D(uTexture, gl_PointCoord);
            vec3 finalColor = vColor * tex.rgb;
            float alpha = tex.a;

            if (alpha < 0.02) discard;
            gl_FragColor = vec4(finalColor, alpha);
          }
        `
      });

      galaxyPoints = new THREE.Points(geometry, material);
      galaxyGroup.add(galaxyPoints);
    }

    function updateUI() {
      armCountValueEl.textContent = String(params.armCount);
      spreadValueEl.textContent = params.spread.toFixed(2);
      rotSpeedValueEl.textContent = params.rotSpeed.toFixed(2);
    }

    armCountEl.addEventListener('input', () => {
      params.armCount = parseInt(armCountEl.value, 10);
      updateUI();
      buildGalaxy();
      updateState();
    });

    spreadEl.addEventListener('input', () => {
      params.spread = parseFloat(spreadEl.value);
      updateUI();
      buildGalaxy();
      updateState();
    });

    rotSpeedEl.addEventListener('input', () => {
      params.rotSpeed = parseFloat(rotSpeedEl.value);
      updateUI();
      updateState();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      params.simTime += delta;

      galaxyGroup.rotation.y += delta * params.rotSpeed * 0.35;

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

      if (galaxyPoints && galaxyPoints.material.uniforms?.uPixelRatio) {
        galaxyPoints.material.uniforms.uPixelRatio.value = renderer.getPixelRatio();
      }
    }

    updateUI();
    buildGalaxy();
    updateState();
    animate();

    window.addEventListener('resize', onResize);
  </script>
</body>
</html>
