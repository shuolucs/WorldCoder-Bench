<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 15px;
            width: 280px;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }
        #ui-container > * {
            pointer-events: auto;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 18px;
            border-bottom: 1px solid #555;
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 12px;
            font-size: 14px;
        }
        .control-group label {
            display: inline-block;
            width: 100px;
        }
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }
        button {
            background: #333;
            color: #fff;
            border: 1px solid #666;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        #planetInfo {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #555;
            min-height: 80px;
        }
        .info-row {
            margin-bottom: 5px;
            font-size: 14px;
        }
        .info-value {
            color: #4da6ff;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>

    <div id="ui-container">
        <h2>Solar System Control</h2>
        
        <div class="control-group">
            <label>Sim Time:</label>
            <span id="simTime" class="info-value">0.00</span> s
        </div>
        
        <div class="control-group">
            <label>Speed:</label>
            <span id="speedDisplay" class="info-value">1.0</span>x
            <input type="range" id="speedSlider" min="0.1" max="50" step="0.1" value="1">
        </div>
        
        <div class="control-group">
            <button id="pauseBtn">Pause Simulation</button>
        </div>

        <div id="planetInfo">
            <div class="info-row">Selected: <span id="selectedPlanet" class="info-value">None</span></div>
            <div id="planetDetails">
                <div class="info-row" style="color: #888; font-style: italic;">Click a planet to view details</div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        let simTime = 0;
        let isPaused = false;
        let speedMultiplier = 1.0;
        let selectedPlanetName = null;
        let moonAngle = 0;

        window.__3D_STATE__ = {
            simTime: 0,
            planets: [],
            isPaused: false,
            speedMultiplier: 1.0,
            selectedPlanet: null,
            moonAngle: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 60);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffffff, 3, 200);
        scene.add(sunLight);

        // --- Celestial Bodies Data ---
        const planetData = [
            { name: 'Mercury', radius: 0.15, distance: 4, color: 0x888888 },
            { name: 'Venus', radius: 0.3, distance: 6, color: 0xe6b800 },
            { name: 'Earth', radius: 0.32, distance: 8, color: 0x2266ff },
            { name: 'Mars', radius: 0.2, distance: 11, color: 0xff4422 },
            { name: 'Jupiter', radius: 0.8, distance: 16, color: 0xd9a066 },
            { name: 'Saturn', radius: 0.7, distance: 22, color: 0xebd699, hasRing: true },
            { name: 'Uranus', radius: 0.5, distance: 30, color: 0x99e6ff },
            { name: 'Neptune', radius: 0.48, distance: 38, color: 0x3333ff }
        ];

        // --- Create Sun ---
        const sunGeo = new THREE.SphereGeometry(2.0, 32, 32);
        const sunMat = new THREE.MeshStandardMaterial({ 
            color: 0xffcc00, 
            emissive: 0xffaa00, 
            emissiveIntensity: 1,
            roughness: 0.4
        });
        const sunMesh = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sunMesh);

        // --- Create Planets & Orbits ---
        const planetMeshes = [];
        const interactableObjects = [];

        planetData.forEach(data => {
            // Orbit Line
            const orbitGeo = new THREE.BufferGeometry();
            const orbitPts = [];
            const segments = 128;
            for (let i = 0; i <= segments; i++) {
                const theta = (i / segments) * Math.PI * 2;
                orbitPts.push(new THREE.Vector3(Math.cos(theta) * data.distance, 0, Math.sin(theta) * data.distance));
            }
            orbitGeo.setFromPoints(orbitPts);
            const orbitLine = new THREE.Line(orbitGeo, new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.6 }));
            scene.add(orbitLine);

            // Planet Mesh
            const geo = new THREE.SphereGeometry(data.radius, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.7 });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.userData = { 
                name: data.name, 
                radius: data.radius, 
                distance: data.distance, 
                angle: 0 
            };
            
            scene.add(mesh);
            planetMeshes.push(mesh);
            interactableObjects.push(mesh);

            // Saturn Ring
            if (data.hasRing) {
                const ringGeo = new THREE.TorusGeometry(data.radius * 1.6, 0.15, 16, 64);
                const ringMat = new THREE.MeshStandardMaterial({ color: 0xebd699, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.2; 
                mesh.add(ring);
            }
        });

        // --- Create Moon ---
        const earthMesh = planetMeshes.find(p => p.userData.name === 'Earth');
        const moonGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const moonMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.8 });
        const moonMesh = new THREE.Mesh(moonGeo, moonMat);
        earthMesh.add(moonMesh);
        const moonOrbitRadius = 0.6;

        // --- UI & Interaction ---
        const speedSlider = document.getElementById('speedSlider');
        const speedDisplay = document.getElementById('speedDisplay');
        const pauseBtn = document.getElementById('pauseBtn');
        const simTimeDisplay = document.getElementById('simTime');
        const selectedPlanetDisplay = document.getElementById('selectedPlanet');
        const planetDetailsDisplay = document.getElementById('planetDetails');

        speedSlider.addEventListener('input', (e) => {
            speedMultiplier = parseFloat(e.target.value);
            speedDisplay.innerText = speedMultiplier.toFixed(1);
        });

        pauseBtn.addEventListener('click', () => {
            isPaused = !isPaused;
            pauseBtn.innerText = isPaused ? 'Resume Simulation' : 'Pause Simulation';
            pauseBtn.style.background = isPaused ? '#883333' : '#333';
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            // Ignore clicks on UI
            if (e.target.closest('#ui-container')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableObjects);

            if (intersects.length > 0) {
                const data = intersects[0].object.userData;
                selectedPlanetName = data.name;
                selectedPlanetDisplay.innerText = selectedPlanetName;
                
                // Calculate period relative to Earth (Earth distance = 8)
                // T^2 proportional to r^3 => T proportional to r^1.5
                const earthDistance = 8;
                const periodEarthYears = Math.pow(data.distance / earthDistance, 1.5);
                
                planetDetailsDisplay.innerHTML = `
                    <div class="info-row">Radius: <span class="info-value">${data.radius}</span></div>
                    <div class="info-row">Orbit Radius: <span class="info-value">${data.distance}</span></div>
                    <div class="info-row">Period: <span class="info-value">${periodEarthYears.toFixed(2)}</span> Earth Yrs</div>
                `;
            } else {
                selectedPlanetName = null;
                selectedPlanetDisplay.innerText = 'None';
                planetDetailsDisplay.innerHTML = '<div class="info-row" style="color: #888; font-style: italic;">Click a planet to view details</div>';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const baseAngularVelocity = 2.0; // Base speed constant

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();

            if (!isPaused) {
                simTime += dt * speedMultiplier;
            }

            const statePlanets = [];

            // Update Planets
            planetMeshes.forEach(mesh => {
                const data = mesh.userData;
                
                // Kepler's Third Law: angular velocity w proportional to r^(-1.5)
                const w = Math.pow(data.distance, -1.5) * baseAngularVelocity;
                
                if (!isPaused) {
                    data.angle += dt * speedMultiplier * w;
                }

                mesh.position.x = data.distance * Math.cos(data.angle);
                mesh.position.z = data.distance * Math.sin(data.angle);
                
                // Self rotation (visual effect)
                if (!isPaused) mesh.rotation.y += dt * speedMultiplier * 0.5;

                statePlanets.push({
                    name: data.name,
                    x: mesh.position.x,
                    y: mesh.position.y,
                    z: mesh.position.z,
                    orbitRadius: data.distance,
                    angle: data.angle
                });
            });

            // Update Moon
            if (!isPaused) {
                // Moon orbits much faster
                moonAngle += dt * speedMultiplier * baseAngularVelocity * 2; 
            }
            moonMesh.position.x = moonOrbitRadius * Math.cos(moonAngle);
            moonMesh.position.z = moonOrbitRadius * Math.sin(moonAngle);

            // Update Sun rotation
            if (!isPaused) sunMesh.rotation.y += dt * speedMultiplier * 0.1;

            // Update UI
            simTimeDisplay.innerText = simTime.toFixed(2);

            // Update Global State
            window.__3D_STATE__ = {
                simTime: simTime,
                planets: statePlanets,
                isPaused: isPaused,
                speedMultiplier: speedMultiplier,
                selectedPlanet: selectedPlanetName,
                moonAngle: moonAngle
            };

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
