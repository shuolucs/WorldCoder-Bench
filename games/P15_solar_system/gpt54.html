<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 太阳系轨道模拟</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #050816 0%, #02040a 60%, #000 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: #eaf2ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .panel {
      position: absolute;
      z-index: 10;
      backdrop-filter: blur(10px);
      background: rgba(10, 15, 28, 0.72);
      border: 1px solid rgba(150, 180, 255, 0.2);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      color: #eef4ff;
    }

    #controlsPanel {
      top: 16px;
      left: 16px;
      padding: 14px 16px;
      min-width: 280px;
    }

    #infoPanel {
      top: 16px;
      right: 16px;
      padding: 14px 16px;
      min-width: 280px;
      max-width: 340px;
    }

    #legendPanel {
      left: 16px;
      bottom: 16px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #c9d8ff;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff3b0;
      letter-spacing: 0.5px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 8px 0;
    }

    .row label {
      font-size: 13px;
      color: #c8d7ff;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 160px;
      accent-color: #7fb3ff;
    }

    button {
      appearance: none;
      border: 1px solid rgba(160, 190, 255, 0.3);
      background: linear-gradient(180deg, rgba(80,120,220,0.28), rgba(40,70,140,0.28));
      color: #eef4ff;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: linear-gradient(180deg, rgba(100,140,240,0.36), rgba(50,80,160,0.36));
    }

    .hudItem {
      font-size: 13px;
      margin: 6px 0;
      color: #dce8ff;
    }

    .hudItem span.value {
      color: #ffffff;
      font-weight: 700;
    }

    #planetInfo {
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.7;
      color: #d9e5ff;
      white-space: pre-line;
    }

    .hint {
      font-size: 12px;
      color: #b8c7ea;
      margin-top: 10px;
      line-height: 1.6;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="controlsPanel" class="panel">
      <div class="title">太阳系轨道模拟</div>
      <div class="row">
        <label for="speedSlider">速度倍率</label>
        <input id="speedSlider" type="range" min="0.1" max="50" step="0.1" value="1" />
        <span id="speedDisplay">1.0×</span>
      </div>
      <div class="row">
        <button id="pauseBtn">暂停</button>
      </div>
      <div class="hudItem">仿真时间：<span id="simTime" class="value">0.0 s</span></div>
      <div class="hudItem">当前选中：<span id="selectedPlanet" class="value">无</span></div>
      <div class="hint">
        鼠标左键旋转，滚轮缩放，右键平移。<br/>
        点击行星可查看信息。
      </div>
    </div>

    <div id="infoPanel" class="panel">
      <div class="title">天体信息</div>
      <div id="planetInfo">点击任意行星查看名称、半径与轨道周期。</div>
    </div>

    <div id="legendPanel" class="panel">
      <div><span class="dot" style="background:#ffd35a;"></span>太阳位于中心，自发光并照亮行星</div>
      <div><span class="dot" style="background:#7fb3ff;"></span>轨道周期遵循开普勒第三定律：T² ∝ r³</div>
      <div><span class="dot" style="background:#d6d6d6;"></span>Earth 含 Moon，Moon 绕 Earth 公转</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const speedSlider = document.getElementById('speedSlider');
    const pauseBtn = document.getElementById('pauseBtn');
    const planetInfo = document.getElementById('planetInfo');
    const simTimeEl = document.getElementById('simTime');
    const selectedPlanetEl = document.getElementById('selectedPlanet');
    const speedDisplayEl = document.getElementById('speedDisplay');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02040a);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 24, 58);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 8;
    controls.maxDistance = 180;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x404a66, 1.1);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xfff1b3, 300, 300, 2);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    const stars = createStarField(2500, 260);
    scene.add(stars);

    const sun = new THREE.Mesh(
      new THREE.SphereGeometry(2.0, 48, 48),
      new THREE.MeshStandardMaterial({
        color: 0xffd45c,
        emissive: 0xffc84d,
        emissiveIntensity: 2.2,
        metalness: 0.05,
        roughness: 0.7
      })
    );
    scene.add(sun);

    const sunGlow = new THREE.Mesh(
      new THREE.SphereGeometry(2.5, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xffcc55,
        transparent: true,
        opacity: 0.12
      })
    );
    scene.add(sunGlow);

    const orbitMaterial = new THREE.LineBasicMaterial({
      color: 0x4b638f,
      transparent: true,
      opacity: 0.7
    });

    const planetDefs = [
      { name: 'Mercury', orbitRadius: 4,  radius: 0.15, color: 0xb8b1a9 },
      { name: 'Venus',   orbitRadius: 6,  radius: 0.3,  color: 0xd9b37a },
      { name: 'Earth',   orbitRadius: 8,  radius: 0.32, color: 0x4a88ff },
      { name: 'Mars',    orbitRadius: 11, radius: 0.2,  color: 0xc95b3b },
      { name: 'Jupiter', orbitRadius: 16, radius: 0.8,  color: 0xd2a679 },
      { name: 'Saturn',  orbitRadius: 22, radius: 0.7,  color: 0xd8c38a },
      { name: 'Uranus',  orbitRadius: 30, radius: 0.5,  color: 0x7fe7ea },
      { name: 'Neptune', orbitRadius: 38, radius: 0.48, color: 0x4f79ff }
    ];

    const earthOrbitRadius = 8;
    const earthPeriod = 20.0;
    const keplerK = earthPeriod / Math.pow(earthOrbitRadius, 1.5);

    let simTime = 0;
    let isPaused = false;
    let speedMultiplier = parseFloat(speedSlider.value);
    let selectedPlanet = null;
    let moonAngle = 0;

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const planetObjects = [];
    const pickableMeshes = [];
    let earthData = null;

    planetDefs.forEach((def, index) => {
      const orbitGroup = new THREE.Object3D();
      scene.add(orbitGroup);

      const planetPivot = new THREE.Object3D();
      orbitGroup.add(planetPivot);

      const geometry = new THREE.SphereGeometry(def.radius, 32, 32);
      const material = new THREE.MeshStandardMaterial({
        color: def.color,
        metalness: 0.1,
        roughness: 0.9
      });
      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.x = def.orbitRadius;
      mesh.userData.planetName = def.name;
      planetPivot.add(mesh);

      const orbitLine = createOrbitLine(def.orbitRadius, orbitMaterial);
      scene.add(orbitLine);

      let ring = null;
      if (def.name === 'Saturn') {
        ring = new THREE.Mesh(
          new THREE.TorusGeometry(def.radius * 1.6, def.radius * 0.18, 12, 64),
          new THREE.MeshStandardMaterial({
            color: 0xcab98d,
            metalness: 0.15,
            roughness: 0.85
          })
        );
        ring.rotation.x = Math.PI / 2.4;
        mesh.add(ring);
      }

      const period = keplerK * Math.pow(def.orbitRadius, 1.5);
      const angularSpeed = (Math.PI * 2) / period;
      const angleOffset = index * 0.55;

      const data = {
        ...def,
        period,
        angularSpeed,
        angleOffset,
        orbitGroup,
        planetPivot,
        mesh,
        ring,
        angle: angleOffset
      };

      if (def.name === 'Earth') {
        const moonPivot = new THREE.Object3D();
        mesh.add(moonPivot);

        const moon = new THREE.Mesh(
          new THREE.SphereGeometry(0.09, 20, 20),
          new THREE.MeshStandardMaterial({
            color: 0xd7d7d7,
            metalness: 0.05,
            roughness: 0.95
          })
        );
        moon.position.x = 0.85;
        moonPivot.add(moon);

        const moonOrbitLine = createLocalOrbitLine(0.85, 0x8c96a8);
        moonOrbitLine.rotation.x = Math.PI / 2;
        mesh.add(moonOrbitLine);

        data.moonPivot = moonPivot;
        data.moon = moon;
        data.moonPeriod = 2.2;
        data.moonAngularSpeed = (Math.PI * 2) / data.moonPeriod;
        earthData = data;
      }

      planetObjects.push(data);
      pickableMeshes.push(mesh);
    });

    function createOrbitLine(radius, material) {
      const segments = 180;
      const points = [];
      for (let i = 0; i <= segments; i++) {
        const a = (i / segments) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      return new THREE.Line(geometry, material.clone());
    }

    function createLocalOrbitLine(radius, color) {
      const segments = 100;
      const points = [];
      for (let i = 0; i <= segments; i++) {
        const a = (i / segments) * Math.PI * 2;
        points.push(new THREE.Vector3(Math.cos(a) * radius, Math.sin(a) * radius, 0));
      }
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      return new THREE.Line(
        geometry,
        new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.65 })
      );
    }

    function createStarField(count, spread) {
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const r = spread * (0.45 + Math.random() * 0.55);
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.cos(phi);
        positions[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
      }
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      return new THREE.Points(
        geometry,
        new THREE.PointsMaterial({
          color: 0xffffff,
          size: 0.7,
          sizeAttenuation: true,
          transparent: true,
          opacity: 0.95
        })
      );
    }

    function formatTime(seconds) {
      return `${seconds.toFixed(1)} s`;
    }

    function updateHUD() {
      simTimeEl.textContent = formatTime(simTime);
      selectedPlanetEl.textContent = selectedPlanet ? selectedPlanet.name : '无';
      speedDisplayEl.textContent = `${speedMultiplier.toFixed(1)}×`;
    }

    function updatePlanetInfo() {
      if (!selectedPlanet) {
        planetInfo.textContent = '点击任意行星查看名称、半径与轨道周期。';
        return;
      }
      const earthYears = selectedPlanet.period / earthPeriod;
      planetInfo.textContent =
        `名称：${selectedPlanet.name}\n` +
        `半径（相对标度）：${selectedPlanet.radius}\n` +
        `轨道半径（相对标度）：${selectedPlanet.orbitRadius}\n` +
        `轨道周期（模型时间）：${selectedPlanet.period.toFixed(2)} s\n` +
        `约合地球年：${earthYears.toFixed(2)} Earth years`;
    }

    speedSlider.addEventListener('input', () => {
      speedMultiplier = parseFloat(speedSlider.value);
      updateHUD();
    });

    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '继续' : '暂停';
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(pickableMeshes, false);
      if (intersects.length > 0) {
        const mesh = intersects[0].object;
        selectedPlanet = planetObjects.find(p => p.mesh === mesh) || null;
      } else {
        selectedPlanet = null;
      }
      updateHUD();
      updatePlanetInfo();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      if (!isPaused) {
        simTime += delta * speedMultiplier;
      }

      sun.rotation.y += delta * 0.2;
      sunGlow.rotation.y -= delta * 0.08;

      const statePlanets = [];

      for (const planet of planetObjects) {
        planet.angle = planet.angleOffset + simTime * planet.angularSpeed;
        planet.orbitGroup.rotation.y = planet.angle;

        planet.mesh.rotation.y += delta * (0.3 + 0.02 * planet.orbitRadius);

        const worldPos = new THREE.Vector3();
        planet.mesh.getWorldPosition(worldPos);

        statePlanets.push({
          name: planet.name,
          x: worldPos.x,
          y: worldPos.y,
          z: worldPos.z,
          orbitRadius: planet.orbitRadius,
          angle: planet.angle
        });
      }

      if (earthData) {
        moonAngle = simTime * earthData.moonAngularSpeed;
        earthData.moonPivot.rotation.y = moonAngle;
        earthData.moon.rotation.y += delta * 0.8;
      }

      if (selectedPlanet) {
        for (const p of planetObjects) {
          p.mesh.material.emissive = new THREE.Color(p === selectedPlanet ? 0x224488 : 0x000000);
          p.mesh.material.emissiveIntensity = p === selectedPlanet ? 0.9 : 0.0;
        }
      } else {
        for (const p of planetObjects) {
          p.mesh.material.emissive = new THREE.Color(0x000000);
          p.mesh.material.emissiveIntensity = 0.0;
        }
      }

      updateHUD();

      window.__3D_STATE__ = {
        simTime,
        planets: statePlanets,
        isPaused,
        speedMultiplier,
        selectedPlanet: selectedPlanet ? selectedPlanet.name : null,
        moonAngle
      };

      controls.update();
      renderer.render(scene, camera);
    }

    window.__3D_STATE__ = {
      simTime: 0,
      planets: planetDefs.map(def => ({
        name: def.name,
        x: 0,
        y: 0,
        z: 0,
        orbitRadius: def.orbitRadius,
        angle: 0
      })),
      isPaused,
      speedMultiplier,
      selectedPlanet: null,
      moonAngle: 0
    };

    updateHUD();
    updatePlanetInfo();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
