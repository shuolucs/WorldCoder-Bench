<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atwood Machine Simulation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #controlPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 10px;
    padding: 18px;
    color: #e0e0e0;
    min-width: 260px;
    backdrop-filter: blur(5px);
    z-index: 10;
  }

  #controlPanel h3 {
    margin-bottom: 12px;
    color: #8888ff;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.3);
    padding-bottom: 8px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .btn-row button {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(100, 100, 255, 0.4);
    border-radius: 6px;
    background: rgba(50, 50, 100, 0.6);
    color: #e0e0e0;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
  }

  .btn-row button:hover {
    background: rgba(80, 80, 150, 0.8);
  }

  .slider-group {
    margin-bottom: 10px;
  }

  .slider-group label {
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
    color: #aaa;
  }

  .slider-group input[type="range"] {
    width: 100%;
    accent-color: #6666cc;
  }

  .slider-group .value {
    text-align: right;
    font-size: 13px;
    color: #ccccff;
    font-weight: bold;
  }

  #hud {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 10px;
    padding: 18px;
    color: #e0e0e0;
    min-width: 240px;
    backdrop-filter: blur(5px);
    z-index: 10;
    font-size: 13px;
    line-height: 1.8;
  }

  #hud h3 {
    margin-bottom: 10px;
    color: #8888ff;
    font-size: 16px;
    border-bottom: 1px solid rgba(100, 100, 255, 0.3);
    padding-bottom: 8px;
  }

  #hud .row {
    display: flex;
    justify-content: space-between;
  }

  #hud .label { color: #aaa; }
  #hud .val { color: #ccccff; font-weight: bold; font-family: monospace; }

  #loadingOverlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 10, 30, 0.9);
    border: 1px solid rgba(100, 100, 255, 0.3);
    border-radius: 10px;
    padding: 30px 40px;
    color: #8888ff;
    font-size: 18px;
    z-index: 100;
    text-align: center;
  }
</style>
</head>
<body>

<div id="controlPanel">
  <h3>⚙ Atwood Machine</h3>
  <div class="btn-row">
    <button id="toggleSim">Start</button>
    <button id="resetBtn">Reset</button>
  </div>
  <div class="slider-group">
    <label>Left Mass (Avocado): <span id="massLeftVal" class="value">3.0 kg</span></label>
    <input type="range" id="massLeft" min="1" max="10" step="0.5" value="3.0">
  </div>
  <div class="slider-group">
    <label>Right Mass (Box): <span id="massRightVal" class="value">5.0 kg</span></label>
    <input type="range" id="massRight" min="1" max="10" step="0.5" value="5.0">
  </div>
</div>

<div id="hud">
  <h3>📊 Telemetry</h3>
  <div class="row"><span class="label">Left Height:</span><span class="val" id="hudLeftY">4.000 m</span></div>
  <div class="row"><span class="label">Right Height:</span><span class="val" id="hudRightY">4.000 m</span></div>
  <div class="row"><span class="label">Velocity:</span><span class="val" id="hudVel">0.000 m/s</span></div>
  <div class="row"><span class="label">Acceleration:</span><span class="val" id="hudAcc">0.000 m/s²</span></div>
  <div class="row"><span class="label">Elapsed Time:</span><span class="val" id="hudTime">0.000 s</span></div>
  <div class="row"><span class="label">Pulley Angle:</span><span class="val" id="hudAngle">0.000 rad</span></div>
  <div class="row"><span class="label">Status:</span><span class="val" id="hudStatus">Stopped</span></div>
</div>

<div id="loadingOverlay">Loading Avocado model...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
  simRunning: false,
  leftY: 4.0,
  rightY: 4.0,
  velocity: 0.0,
  acceleration: 0.0,
  massLeft: 3.0,
  massRight: 5.0,
  elapsedTime: 0.0,
  pulleyAngle: 0.0,
  avocadoLoaded: false,
  hitLimit: false
};
window.__3D_STATE__ = state;

const g = 9.81;
const PULLEY_RADIUS = 0.4;
const MIN_Y = 0.5;
const MAX_Y = 7.0;
const INITIAL_Y = 4.0;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 3, 0);
controls.update();

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
scene.add(dirLight);

// --- Ground plane for reference ---
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
scene.add(ground);

// --- Pulley Structure ---
// Vertical support beam
const beamGeo = new THREE.BoxGeometry(0.2, 8, 0.2);
const beamMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
const verticalBeam = new THREE.Mesh(beamGeo, beamMat);
verticalBeam.position.set(0, 4, 0);
scene.add(verticalBeam);

// Horizontal arm
const armGeo = new THREE.BoxGeometry(4, 0.15, 0.15);
const armMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
const horizontalArm = new THREE.Mesh(armGeo, armMat);
horizontalArm.position.set(0, 8, 0);
scene.add(horizontalArm);

// Pulley wheel
const pulleyGeo = new THREE.TorusGeometry(0.4, 0.08, 16, 32);
const pulleyMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.7, roughness: 0.3 });
const pulleyWheel = new THREE.Mesh(pulleyGeo, pulleyMat);
pulleyWheel.position.set(0, 7.8, 0);
pulleyWheel.rotation.y = Math.PI / 2;
scene.add(pulleyWheel);

// Pulley axle
const axleGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.3, 16);
const axleMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.2 });
const axle = new THREE.Mesh(axleGeo, axleMat);
axle.position.set(0, 7.8, 0);
axle.rotation.x = Math.PI / 2;
scene.add(axle);

// --- Ropes ---
const ropeMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, roughness: 0.9 });

// Left rope
const leftRopeGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
const leftRope = new THREE.Mesh(leftRopeGeo, ropeMat);
scene.add(leftRope);

// Right rope
const rightRopeGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
const rightRope = new THREE.Mesh(rightRopeGeo, ropeMat);
scene.add(rightRope);

// Rope over pulley (arc)
const ropeOverGeo = new THREE.TorusGeometry(0.4, 0.02, 8, 16, Math.PI);
const ropeOverMat = new THREE.MeshStandardMaterial({ color: 0xccaa77, roughness: 0.9 });
const ropeOver = new THREE.Mesh(ropeOverGeo, ropeOverMat);
ropeOver.position.set(0, 7.8, 0);
ropeOver.rotation.y = Math.PI / 2;
ropeOver.rotation.z = Math.PI / 2;
scene.add(ropeOver);

// --- Right Weight (Red Box) ---
const rightWeightGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
const rightWeightMat = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.4, metalness: 0.1 });
const rightWeight = new THREE.Mesh(rightWeightGeo, rightWeightMat);
rightWeight.position.set(0.4, INITIAL_Y, 0);
scene.add(rightWeight);

// --- Left Weight (Avocado) ---
let avocadoModel = null;
const avocadoGroup = new THREE.Group();
avocadoGroup.position.set(-0.4, INITIAL_Y, 0);
scene.add(avocadoGroup);

// Placeholder sphere while loading
const placeholderGeo = new THREE.SphereGeometry(0.3, 16, 16);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0x556b2f, roughness: 0.6 });
const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
avocadoGroup.add(placeholder);

// Load Avocado
const loader = new GLTFLoader();
loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Avocado/glTF-Binary/Avocado.glb',
  (gltf) => {
    avocadoModel = gltf.scene;
    avocadoModel.scale.set(15, 15, 15);
    avocadoGroup.remove(placeholder);
    avocadoGroup.add(avocadoModel);
    state.avocadoLoaded = true;
    document.getElementById('loadingOverlay').style.display = 'none';
    console.log('Avocado loaded successfully');
  },
  (progress) => {
    // loading progress
  },
  (error) => {
    console.warn('Failed to load Avocado.glb from remote, using placeholder:', error);
    state.avocadoLoaded = true;
    document.getElementById('loadingOverlay').style.display = 'none';
  }
);

// --- Update rope geometry ---
function updateRopes() {
  const pulleyY = 7.8;
  const leftX = -0.4;
  const rightX = 0.4;

  // Left rope
  const leftLen = pulleyY - state.leftY;
  leftRope.geometry.dispose();
  leftRope.geometry = new THREE.CylinderGeometry(0.02, 0.02, Math.max(leftLen, 0.01), 8);
  leftRope.position.set(leftX, pulleyY - leftLen / 2, 0);

  // Right rope
  const rightLen = pulleyY - state.rightY;
  rightRope.geometry.dispose();
  rightRope.geometry = new THREE.CylinderGeometry(0.02, 0.02, Math.max(rightLen, 0.01), 8);
  rightRope.position.set(rightX, pulleyY - rightLen / 2, 0);
}

function updateWeightPositions() {
  avocadoGroup.position.y = state.leftY;
  rightWeight.position.y = state.rightY;
  updateRopes();
}

function computeAcceleration() {
  return (state.massRight - state.massLeft) * g / (state.massLeft + state.massRight);
}

// --- UI ---
const toggleBtn = document.getElementById('toggleSim');
const resetBtn = document.getElementById('resetBtn');
const massLeftSlider = document.getElementById('massLeft');
const massRightSlider = document.getElementById('massRight');
const massLeftVal = document.getElementById('massLeftVal');
const massRightVal = document.getElementById('massRightVal');

toggleBtn.addEventListener('click', () => {
  if (state.hitLimit) return;
  state.simRunning = !state.simRunning;
  toggleBtn.textContent = state.simRunning ? 'Stop' : 'Start';
});

resetBtn.addEventListener('click', resetSimulation);

function resetSimulation() {
  state.simRunning = false;
  state.leftY = INITIAL_Y;
  state.rightY = INITIAL_Y;
  state.velocity = 0;
  state.elapsedTime = 0;
  state.pulleyAngle = 0;
  state.hitLimit = false;
  toggleBtn.textContent = 'Start';
  pulleyWheel.rotation.x = 0;
  updateWeightPositions();
}

massLeftSlider.addEventListener('input', () => {
  state.massLeft = parseFloat(massLeftSlider.value);
  massLeftVal.textContent = state.massLeft.toFixed(1) + ' kg';
});

massRightSlider.addEventListener('input', () => {
  state.massRight = parseFloat(massRightSlider.value);
  massRightVal.textContent = state.massRight.toFixed(1) + ' kg';
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!state.hitLimit) {
      state.simRunning = !state.simRunning;
      toggleBtn.textContent = state.simRunning ? 'Stop' : 'Start';
    }
  }
  if (e.code === 'KeyR') {
    resetSimulation();
  }
});

// --- HUD ---
function updateHUD() {
  document.getElementById('hudLeftY').textContent = state.leftY.toFixed(3) + ' m';
  document.getElementById('hudRightY').textContent = state.rightY.toFixed(3) + ' m';
  document.getElementById('hudVel').textContent = state.velocity.toFixed(3) + ' m/s';
  document.getElementById('hudAcc').textContent = state.acceleration.toFixed(3) + ' m/s²';
  document.getElementById('hudTime').textContent = state.elapsedTime.toFixed(3) + ' s';
  document.getElementById('hudAngle').textContent = state.pulleyAngle.toFixed(3) + ' rad';
  document.getElementById('hudStatus').textContent = state.hitLimit ? 'Limit Hit' : (state.simRunning ? 'Running' : 'Stopped');
}

// --- Animation Loop ---
let lastTime = performance.now();

function animate(currentTime) {
  requestAnimationFrame(animate);

  let dt = (currentTime - lastTime) / 1000;
  lastTime = currentTime;

  // Cap delta time
  if (dt > 1 / 30) dt = 1 / 30;
  if (dt < 0) dt = 0;

  state.acceleration = computeAcceleration();

  if (state.simRunning && !state.hitLimit) {
    // Update velocity: positive velocity means right goes down, left goes up
    state.velocity += state.acceleration * dt;

    // Displacement: dy is how much right weight moves down
    const dy = state.velocity * dt;

    // Right goes down, left goes up
    let newRightY = state.rightY - dy;
    let newLeftY = state.leftY + dy;

    // Check limits
    if (newRightY <= MIN_Y) {
      newRightY = MIN_Y;
      newLeftY = INITIAL_Y * 2 - MIN_Y; // Maintain constraint: leftY + rightY = 2 * INITIAL_Y
      // Recalculate based on constraint
      const totalRope = state.leftY + state.rightY; // Should remain constant
      newLeftY = totalRope - MIN_Y;
      if (newLeftY > MAX_Y) newLeftY = MAX_Y;
      state.velocity = 0;
      state.hitLimit = true;
      state.simRunning = false;
      toggleBtn.textContent = 'Start';
    } else if (newRightY >= MAX_Y) {
      newRightY = MAX_Y;
      const totalRope = state.leftY + state.rightY;
      newLeftY = totalRope - MAX_Y;
      if (newLeftY < MIN_Y) newLeftY = MIN_Y;
      state.velocity = 0;
      state.hitLimit = true;
      state.simRunning = false;
      toggleBtn.textContent = 'Start';
    } else if (newLeftY <= MIN_Y) {
      newLeftY = MIN_Y;
      const totalRope = state.leftY + state.rightY;
      newRightY = totalRope - MIN_Y;
      if (newRightY > MAX_Y) newRightY = MAX_Y;
      state.velocity = 0;
      state.hitLimit = true;
      state.simRunning = false;
      toggleBtn.textContent = 'Start';
    } else if (newLeftY >= MAX_Y) {
      newLeftY = MAX_Y;
      const totalRope = state.leftY + state.rightY;
      newRightY = totalRope - MAX_Y;
      if (newRightY < MIN_Y) newRightY = MIN_Y;
      state.velocity = 0;
      state.hitLimit = true;
      state.simRunning = false;
      toggleBtn.textContent = 'Start';
    }

    // Pulley rotation: angle = displacement / radius
    const actualDy = state.rightY - newRightY; // positive if right moved down
    state.pulleyAngle += actualDy / PULLEY_RADIUS;

    state.rightY = newRightY;
    state.leftY = newLeftY;
    state.elapsedTime += dt;
  }

  // Update visuals
  updateWeightPositions();

  // Pulley rotation (rotate around Z axis since rope hangs in Y, pulley faces forward via rotateY)
  // The torus is rotated with rotateY(PI/2), so we rotate around the local x-axis effectively
  // We need to set rotation carefully
  pulleyWheel.rotation.set(0, 0, 0);
  pulleyWheel.rotateY(Math.PI / 2);
  pulleyWheel.rotateZ(state.pulleyAngle);

  updateHUD();
  controls.update();
  renderer.render(scene, camera);
}

// Initial setup
updateWeightPositions();
updateHUD();
requestAnimationFrame(animate);

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
