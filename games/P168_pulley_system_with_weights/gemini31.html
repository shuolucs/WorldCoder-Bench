<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atwood Machine Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 15, 25, 0.85);
            padding: 20px;
            border-radius: 10px;
            width: 320px;
            box-sizing: border-box;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        h2 {
            margin-top: 0;
            font-size: 1.2em;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 10px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1em;
            transition: background 0.2s;
        }
        #toggleSim {
            background: #4CAF50;
            color: white;
        }
        #toggleSim:hover { background: #45a049; }
        #resetBtn {
            background: #f44336;
            color: white;
        }
        #resetBtn:hover { background: #da190b; }
        .slider-container {
            margin-bottom: 15px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .slider-label span:last-child {
            font-weight: bold;
            color: #4CAF50;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #4CAF50;
        }
        #hud {
            background: rgba(0, 0, 0, 0.4);
            padding: 15px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.95em;
            line-height: 1.6;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
        }
        .hud-val {
            color: #4CAF50;
            font-weight: bold;
        }
        .controls-hint {
            margin-top: 15px;
            font-size: 0.8em;
            color: #888;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-panel">
        <h2>Atwood Machine</h2>
        <div class="btn-group">
            <button id="toggleSim">Start</button>
            <button id="resetBtn">Reset</button>
        </div>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>Left Mass (Avocado):</span>
                <span><span id="massLeftVal">3.0</span> kg</span>
            </div>
            <input type="range" id="massLeft" min="1" max="10" step="0.5" value="3">
        </div>
        
        <div class="slider-container">
            <div class="slider-label">
                <span>Right Mass (Box):</span>
                <span><span id="massRightVal">5.0</span> kg</span>
            </div>
            <input type="range" id="massRight" min="1" max="10" step="0.5" value="5">
        </div>

        <div id="hud">
            <div class="hud-row"><span>Left Height:</span> <span class="hud-val"><span id="hudLeftY">4.00</span> m</span></div>
            <div class="hud-row"><span>Right Height:</span> <span class="hud-val"><span id="hudRightY">4.00</span> m</span></div>
            <div class="hud-row"><span>Velocity:</span> <span class="hud-val"><span id="hudVel">0.00</span> m/s</span></div>
            <div class="hud-row"><span>Acceleration:</span> <span class="hud-val"><span id="hudAcc">0.00</span> m/s²</span></div>
            <div class="hud-row"><span>Time:</span> <span class="hud-val"><span id="hudTime">0.00</span> s</span></div>
        </div>

        <div class="controls-hint">
            [Space] Toggle Sim &nbsp;|&nbsp; [R] Reset
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            simRunning: false,
            leftY: 4.0,
            rightY: 4.0,
            velocity: 0,
            acceleration: 0,
            massLeft: 3.0,
            massRight: 5.0,
            elapsedTime: 0,
            pulleyAngle: 0,
            avocadoLoaded: false,
            hitLimit: false
        };
        const state = window.__3D_STATE__;

        // Constants
        const GRAVITY = 9.81;
        const PULLEY_RADIUS = 0.4;
        const PULLEY_Y = 7.8;
        const ROPE_OFFSET_X = 0.4;
        const LIMIT_MIN = 0.5;
        const LIMIT_MAX = 7.0;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 4, 0);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Materials
        const woodMaterial = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.8 });
        const metalMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6, roughness: 0.4 });
        const ropeMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.9 });
        const redMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333, roughness: 0.5 });

        // Structure
        const beamGeo = new THREE.BoxGeometry(0.2, 8, 0.2);
        const beam = new THREE.Mesh(beamGeo, woodMaterial);
        beam.position.set(0, 4, 0);
        scene.add(beam);

        const armGeo = new THREE.BoxGeometry(4, 0.15, 0.15);
        const arm = new THREE.Mesh(armGeo, woodMaterial);
        arm.position.set(0, 8, 0);
        scene.add(arm);

        const pulleyGeo = new THREE.TorusGeometry(PULLEY_RADIUS, 0.08, 16, 100);
        const pulley = new THREE.Mesh(pulleyGeo, metalMaterial);
        pulley.position.set(0, PULLEY_Y, 0);
        pulley.rotation.y = Math.PI / 2;
        scene.add(pulley);

        // Ropes
        const ropeGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
        ropeGeo.translate(0, -0.5, 0); // Pivot at top

        const leftRope = new THREE.Mesh(ropeGeo, ropeMaterial);
        leftRope.position.set(-ROPE_OFFSET_X, PULLEY_Y, 0);
        scene.add(leftRope);

        const rightRope = new THREE.Mesh(ropeGeo, ropeMaterial);
        rightRope.position.set(ROPE_OFFSET_X, PULLEY_Y, 0);
        scene.add(rightRope);

        // Weights
        const leftWeightGroup = new THREE.Group();
        scene.add(leftWeightGroup);

        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Avocado/glTF-Binary/Avocado.glb', (gltf) => {
            const avocado = gltf.scene;
            avocado.scale.set(15, 15, 15);
            // Center avocado slightly below the attachment point
            avocado.position.set(0, -0.2, 0); 
            leftWeightGroup.add(avocado);
            state.avocadoLoaded = true;
        });

        const rightWeightGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const rightWeight = new THREE.Mesh(rightWeightGeo, redMaterial);
        scene.add(rightWeight);

        // UI Elements
        const btnToggle = document.getElementById('toggleSim');
        const btnReset = document.getElementById('resetBtn');
        const sliderLeft = document.getElementById('massLeft');
        const sliderRight = document.getElementById('massRight');
        const valLeft = document.getElementById('massLeftVal');
        const valRight = document.getElementById('massRightVal');

        // UI Event Listeners
        btnToggle.addEventListener('click', () => {
            if (state.hitLimit) return;
            state.simRunning = !state.simRunning;
            btnToggle.innerText = state.simRunning ? 'Stop' : 'Start';
            btnToggle.style.background = state.simRunning ? '#ff9800' : '#4CAF50';
        });

        btnReset.addEventListener('click', resetSimulation);

        sliderLeft.addEventListener('input', (e) => {
            state.massLeft = parseFloat(e.target.value);
            valLeft.innerText = state.massLeft.toFixed(1);
            if (!state.simRunning) updatePhysicsState();
        });

        sliderRight.addEventListener('input', (e) => {
            state.massRight = parseFloat(e.target.value);
            valRight.innerText = state.massRight.toFixed(1);
            if (!state.simRunning) updatePhysicsState();
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                btnToggle.click();
            } else if (e.code === 'KeyR') {
                resetSimulation();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Logic Functions
        function resetSimulation() {
            state.simRunning = false;
            state.leftY = 4.0;
            state.rightY = 4.0;
            state.velocity = 0;
            state.elapsedTime = 0;
            state.pulleyAngle = 0;
            state.hitLimit = false;
            
            btnToggle.innerText = 'Start';
            btnToggle.style.background = '#4CAF50';
            
            updatePhysicsState();
            updateVisuals();
            updateHUD();
        }

        function updatePhysicsState() {
            state.acceleration = ((state.massRight - state.massLeft) / (state.massLeft + state.massRight)) * GRAVITY;
        }

        function triggerLimit() {
            state.hitLimit = true;
            state.simRunning = false;
            state.velocity = 0;
            btnToggle.innerText = 'Limit Reached';
            btnToggle.style.background = '#9e9e9e';
        }

        function updateVisuals() {
            // Update ropes
            leftRope.scale.y = PULLEY_Y - state.leftY;
            rightRope.scale.y = PULLEY_Y - state.rightY;

            // Update weights (attach to bottom of ropes)
            leftWeightGroup.position.set(-ROPE_OFFSET_X, state.leftY, 0);
            rightWeight.position.set(ROPE_OFFSET_X, state.rightY - 0.3, 0); // Offset box center

            // Update pulley rotation
            // Since pulley is rotated Y by PI/2, its local Z is world X.
            pulley.rotation.x = state.pulleyAngle;
        }

        function updateHUD() {
            document.getElementById('hudLeftY').innerText = state.leftY.toFixed(2);
            document.getElementById('hudRightY').innerText = state.rightY.toFixed(2);
            document.getElementById('hudVel').innerText = Math.abs(state.velocity).toFixed(2);
            document.getElementById('hudAcc').innerText = Math.abs(state.acceleration).toFixed(2);
            document.getElementById('hudTime').innerText = state.elapsedTime.toFixed(2);
        }

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            let dt = clock.getDelta();
            if (dt > 1/30) dt = 1/30; // Cap delta time

            if (state.simRunning && !state.hitLimit) {
                state.elapsedTime += dt;
                updatePhysicsState();
                
                state.velocity += state.acceleration * dt;
                const dy = state.velocity * dt;

                state.rightY -= dy;
                state.leftY += dy;

                // Pulley rotation: dy is positive when right goes down.
                // Right rope down -> clockwise rotation looking from +Z -> negative angle around Z.
                // Since we rotate around X due to Y-rotation, we adjust accordingly.
                state.pulleyAngle -= dy / PULLEY_RADIUS;

                // Check limits
                if (state.leftY > LIMIT_MAX) {
                    const diff = state.leftY - LIMIT_MAX;
                    state.leftY = LIMIT_MAX;
                    state.rightY += diff;
                    triggerLimit();
                } else if (state.rightY > LIMIT_MAX) {
                    const diff = state.rightY - LIMIT_MAX;
                    state.rightY = LIMIT_MAX;
                    state.leftY += diff;
                    triggerLimit();
                } else if (state.leftY < LIMIT_MIN) {
                    const diff = LIMIT_MIN - state.leftY;
                    state.leftY = LIMIT_MIN;
                    state.rightY -= diff;
                    triggerLimit();
                } else if (state.rightY < LIMIT_MIN) {
                    const diff = LIMIT_MIN - state.rightY;
                    state.rightY = LIMIT_MIN;
                    state.leftY -= diff;
                    triggerLimit();
                }
            }

            updateVisuals();
            updateHUD();
            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        updatePhysicsState();
        updateVisuals();
        updateHUD();
        animate();

    </script>
</body>
</html>
