<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Atwood Machine</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #uiPanel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      background: rgba(10, 10, 20, 0.72);
      padding: 14px 16px;
      border-radius: 10px;
      min-width: 260px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    #uiPanel h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .row {
      margin-bottom: 10px;
    }

    .row label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      background: #3a4a7a;
      color: white;
    }

    button:hover {
      filter: brightness(1.1);
    }

    input[type="range"] {
      width: 100%;
    }

    #hud {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      background: rgba(10, 10, 20, 0.72);
      padding: 12px 14px;
      border-radius: 10px;
      min-width: 240px;
      line-height: 1.5;
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.35);
      backdrop-filter: blur(4px);
    }

    .small {
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="uiPanel">
    <h2>Atwood Machine Controls</h2>

    <div class="controls">
      <button id="toggleSim">Start</button>
      <button id="resetBtn">Reset</button>
    </div>

    <div class="row">
      <label for="massLeft">Left Mass (Avocado): <span id="massLeftValue">3.0</span> kg</label>
      <input id="massLeft" type="range" min="1" max="10" step="0.5" value="3.0" />
    </div>

    <div class="row">
      <label for="massRight">Right Mass (Box): <span id="massRightValue">5.0</span> kg</label>
      <input id="massRight" type="range" min="1" max="10" step="0.5" value="5.0" />
    </div>

    <div class="small">
      Keyboard: Space = Start/Stop, R = Reset
    </div>
  </div>

  <div id="hud">
    <div><strong>Simulation HUD</strong></div>
    <div>Left Height: <span id="hudLeftY">4.00</span></div>
    <div>Right Height: <span id="hudRightY">4.00</span></div>
    <div>Velocity: <span id="hudVelocity">0.00</span> m/s</div>
    <div>Acceleration: <span id="hudAcceleration">2.45</span> m/s²</div>
    <div>Elapsed Time: <span id="hudTime">0.00</span> s</div>
    <div>Avocado Loaded: <span id="hudLoaded">false</span></div>
    <div>Hit Limit: <span id="hudLimit">false</span></div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 4, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 1.0 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const beamMaterial = new THREE.MeshStandardMaterial({ color: 0x4a3728 });
    const metalMaterial = new THREE.MeshStandardMaterial({
      color: 0x888888,
      metalness: 0.7,
      roughness: 0.3
    });
    const ropeMaterial = new THREE.MeshStandardMaterial({ color: 0xd2c29d });
    const rightWeightMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333 });

    const verticalBeam = new THREE.Mesh(
      new THREE.BoxGeometry(0.2, 8, 0.2),
      beamMaterial
    );
    verticalBeam.position.set(0, 4, 0);
    scene.add(verticalBeam);

    const horizontalArm = new THREE.Mesh(
      new THREE.BoxGeometry(4, 0.15, 0.15),
      beamMaterial
    );
    horizontalArm.position.set(0, 8, 0);
    scene.add(horizontalArm);

    const pulleyRadius = 0.4;
    const pulleyTube = 0.08;
    const pulley = new THREE.Mesh(
      new THREE.TorusGeometry(pulleyRadius, pulleyTube, 16, 64),
      metalMaterial
    );
    pulley.position.set(0, 7.8, 0);
    pulley.rotation.y = Math.PI / 2;
    scene.add(pulley);

    const axle = new THREE.Mesh(
      new THREE.CylinderGeometry(0.05, 0.05, 0.3, 16),
      metalMaterial
    );
    axle.rotation.z = Math.PI / 2;
    axle.position.copy(pulley.position);
    scene.add(axle);

    const ropeRadius = 0.02;
    const leftRope = new THREE.Mesh(
      new THREE.CylinderGeometry(ropeRadius, ropeRadius, 1, 12),
      ropeMaterial
    );
    scene.add(leftRope);

    const rightRope = new THREE.Mesh(
      new THREE.CylinderGeometry(ropeRadius, ropeRadius, 1, 12),
      ropeMaterial
    );
    scene.add(rightRope);

    const leftWeightGroup = new THREE.Group();
    scene.add(leftWeightGroup);

    const rightWeight = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.6, 0.6),
      rightWeightMaterial
    );
    scene.add(rightWeight);

    const fallbackAvocado = new THREE.Mesh(
      new THREE.SphereGeometry(0.25, 24, 24),
      new THREE.MeshStandardMaterial({ color: 0x6faa3a, roughness: 0.8 })
    );
    fallbackAvocado.scale.set(1.2, 1.5, 1.0);
    leftWeightGroup.add(fallbackAvocado);

    const loader = new GLTFLoader();
    let avocadoLoaded = false;

    loader.load(
      'Avocado.glb',
      (gltf) => {
        leftWeightGroup.clear();
        const avocado = gltf.scene;
        avocado.scale.set(15, 15, 15);
        avocado.position.set(0, 0, 0);
        avocado.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = false;
          }
        });
        leftWeightGroup.add(avocado);
        avocadoLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Could not load Avocado.glb, using fallback shape.', err);
      }
    );

    const ui = {
      toggleSim: document.getElementById('toggleSim'),
      resetBtn: document.getElementById('resetBtn'),
      massLeft: document.getElementById('massLeft'),
      massRight: document.getElementById('massRight'),
      massLeftValue: document.getElementById('massLeftValue'),
      massRightValue: document.getElementById('massRightValue'),
      hudLeftY: document.getElementById('hudLeftY'),
      hudRightY: document.getElementById('hudRightY'),
      hudVelocity: document.getElementById('hudVelocity'),
      hudAcceleration: document.getElementById('hudAcceleration'),
      hudTime: document.getElementById('hudTime'),
      hudLoaded: document.getElementById('hudLoaded'),
      hudLimit: document.getElementById('hudLimit')
    };

    const g = 9.81;
    const initialY = 4.0;
    const minY = 0.5;
    const maxY = 7.0;
    const ropeTopY = pulley.position.y;
    const weightAttachOffset = 0.3;

    const sim = {
      simRunning: false,
      leftY: initialY,
      rightY: initialY,
      velocity: 0,
      acceleration: 0,
      massLeft: parseFloat(ui.massLeft.value),
      massRight: parseFloat(ui.massRight.value),
      elapsedTime: 0,
      pulleyAngle: 0,
      avocadoLoaded: false,
      hitLimit: false
    };

    function computeAcceleration() {
      sim.acceleration = ((sim.massRight - sim.massLeft) * g) / (sim.massLeft + sim.massRight);
    }

    function syncUIValues() {
      ui.massLeftValue.textContent = sim.massLeft.toFixed(1);
      ui.massRightValue.textContent = sim.massRight.toFixed(1);
    }

    function updateObjects() {
      const leftLength = Math.max(0.1, ropeTopY - sim.leftY);
      leftRope.scale.set(1, leftLength, 1);
      leftRope.position.set(-0.4, ropeTopY - leftLength / 2, 0);

      const rightLength = Math.max(0.1, ropeTopY - sim.rightY);
      rightRope.scale.set(1, rightLength, 1);
      rightRope.position.set(0.4, ropeTopY - rightLength / 2, 0);

      leftWeightGroup.position.set(-0.4, sim.leftY - weightAttachOffset, 0);
      rightWeight.position.set(0.4, sim.rightY - weightAttachOffset, 0);
    }

    function updateHUD() {
      ui.hudLeftY.textContent = sim.leftY.toFixed(2);
      ui.hudRightY.textContent = sim.rightY.toFixed(2);
      ui.hudVelocity.textContent = Math.abs(sim.velocity).toFixed(2);
      ui.hudAcceleration.textContent = sim.acceleration.toFixed(2);
      ui.hudTime.textContent = sim.elapsedTime.toFixed(2);
      ui.hudLoaded.textContent = String(sim.avocadoLoaded);
      ui.hudLimit.textContent = String(sim.hitLimit);
    }

    function updateStateExposure() {
      sim.avocadoLoaded = avocadoLoaded;
      window.__3D_STATE__ = {
        simRunning: sim.simRunning,
        leftY: sim.leftY,
        rightY: sim.rightY,
        velocity: Math.abs(sim.velocity),
        acceleration: sim.acceleration,
        massLeft: sim.massLeft,
        massRight: sim.massRight,
        elapsedTime: sim.elapsedTime,
        pulleyAngle: sim.pulleyAngle,
        avocadoLoaded: sim.avocadoLoaded,
        hitLimit: sim.hitLimit
      };
    }

    function setRunning(running) {
      if (sim.hitLimit && running) return;
      sim.simRunning = running;
      ui.toggleSim.textContent = sim.simRunning ? 'Stop' : 'Start';
    }

    function resetSimulation() {
      sim.simRunning = false;
      sim.leftY = initialY;
      sim.rightY = initialY;
      sim.velocity = 0;
      sim.elapsedTime = 0;
      sim.pulleyAngle = 0;
      sim.hitLimit = false;
      computeAcceleration();
      pulley.rotation.x = 0;
      ui.toggleSim.textContent = 'Start';
      updateObjects();
      updateHUD();
      updateStateExposure();
    }

    ui.toggleSim.addEventListener('click', () => {
      setRunning(!sim.simRunning);
    });

    ui.resetBtn.addEventListener('click', resetSimulation);

    ui.massLeft.addEventListener('input', () => {
      if (sim.simRunning) {
        ui.massLeft.value = sim.massLeft.toFixed(1);
        return;
      }
      sim.massLeft = parseFloat(ui.massLeft.value);
      syncUIValues();
      computeAcceleration();
      updateHUD();
      updateStateExposure();
    });

    ui.massRight.addEventListener('input', () => {
      if (sim.simRunning) {
        ui.massRight.value = sim.massRight.toFixed(1);
        return;
      }
      sim.massRight = parseFloat(ui.massRight.value);
      syncUIValues();
      computeAcceleration();
      updateHUD();
      updateStateExposure();
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        setRunning(!sim.simRunning);
      } else if (e.key === 'r' || e.key === 'R') {
        resetSimulation();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    computeAcceleration();
    syncUIValues();
    updateObjects();
    updateHUD();
    updateStateExposure();

    let lastTime = performance.now();

    function animate(now) {
      requestAnimationFrame(animate);

      let dt = (now - lastTime) / 1000;
      lastTime = now;
      dt = Math.min(dt, 1 / 30);

      sim.avocadoLoaded = avocadoLoaded;
      computeAcceleration();

      if (sim.simRunning && !sim.hitLimit) {
        const direction = Math.sign(sim.massRight - sim.massLeft);
        sim.velocity += sim.acceleration * dt;

        const dy = sim.velocity * dt;

        if (direction > 0) {
          sim.rightY -= dy;
          sim.leftY += dy;
          sim.pulleyAngle += dy / pulleyRadius;
        } else if (direction < 0) {
          sim.rightY += dy;
          sim.leftY -= dy;
          sim.pulleyAngle -= dy / pulleyRadius;
        }

        sim.elapsedTime += dt;

        let hit = false;

        if (sim.leftY <= minY) {
          sim.leftY = minY;
          sim.rightY = 8.0 - sim.leftY;
          hit = true;
        }
        if (sim.leftY >= maxY) {
          sim.leftY = maxY;
          sim.rightY = 8.0 - sim.leftY;
          hit = true;
        }
        if (sim.rightY <= minY) {
          sim.rightY = minY;
          sim.leftY = 8.0 - sim.rightY;
          hit = true;
        }
        if (sim.rightY >= maxY) {
          sim.rightY = maxY;
          sim.leftY = 8.0 - sim.rightY;
          hit = true;
        }

        if (hit) {
          sim.hitLimit = true;
          sim.simRunning = false;
          sim.velocity = 0;
          ui.toggleSim.textContent = 'Start';
        }
      }

      pulley.rotation.x = sim.pulleyAngle;

      updateObjects();
      updateHUD();
      updateStateExposure();

      controls.update();
      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
