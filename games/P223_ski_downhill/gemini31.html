<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ski Downhill Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            pointer-events: none;
            z-index: 10;
        }
        .hud-item {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
        }
        #startBtn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 20;
            transition: background-color 0.2s;
        }
        #startBtn:hover {
            background-color: #45a049;
        }
        #finishOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }
        #finishText {
            color: #FFD700;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px #000;
        }
        #restartBtn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background-color 0.2s;
        }
        #restartBtn:hover {
            background-color: #1976D2;
        }
        #controlsHelp {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="speedDisplay" class="hud-item">Speed: 0.00</div>
        <div id="scoreDisplay" class="hud-item">Score: 0 / 10</div>
        <div id="crashDisplay" class="hud-item">Crashes: 0</div>
    </div>

    <button id="startBtn">START GAME</button>

    <div id="controlsHelp">Controls: Left/Right Arrows or A/D to steer | Spacebar to brake</div>

    <div id="finishOverlay" style="display: none;">
        <h1 id="finishText">FINISH! Final Score: 0</h1>
        <button id="restartBtn">RESTART</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        // State Management
        window.__3D_STATE__ = {
            gameStarted: false,
            gameFinished: false,
            speed: 0,
            playerX: 0,
            playerZ: 0,
            score: 0,
            crashes: 0,
            totalObstacles: 20,
            totalRings: 10,
            ringsRemaining: 10,
            braking: false,
            fishModelLoaded: false
        };

        // Game Constants
        const MAX_SPEED = 1.5;
        const ACCELERATION = 0.02;
        const STEER_SPEED = 0.15;
        const BRAKE_MULTIPLIER = 0.7;
        const MIN_BRAKE_SPEED = 0.2;
        const CRASH_SPEED = 0.1;
        const FINISH_Z = -480;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 50, 200);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x8888cc, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(-50, 100, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 100;
        dirLight.shadow.camera.bottom = -100;
        dirLight.shadow.camera.left = -50;
        dirLight.shadow.camera.right = 50;
        scene.add(dirLight);

        // Slope Group (Rotated to simulate downhill)
        const slopeGroup = new THREE.Group();
        slopeGroup.rotation.x = 15 * Math.PI / 180; // 15 degrees downward
        scene.add(slopeGroup);

        // Slope Plane
        const slopeGeo = new THREE.PlaneGeometry(40, 550);
        const slopeMat = new THREE.MeshLambertMaterial({ color: 0xf0f0ff });
        const slopeMesh = new THREE.Mesh(slopeGeo, slopeMat);
        slopeMesh.rotation.x = -Math.PI / 2;
        slopeMesh.position.z = -250;
        slopeMesh.receiveShadow = true;
        slopeGroup.add(slopeMesh);

        // Player (Fish)
        const player = new THREE.Group();
        player.position.set(0, 0.5, 0);
        slopeGroup.add(player);

        // Load Fish Model
        const loader = new THREE.GLTFLoader();
        loader.load('._BarramundiFish.glb', (gltf) => {
            const fishModel = gltf.scene;
            fishModel.scale.set(1.5, 1.5, 1.5);
            // Ensure fish faces forward (-Z)
            fishModel.rotation.y = Math.PI;
            
            fishModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                }
            });
            
            player.add(fishModel);
            window.__3D_STATE__.fishModelLoaded = true;
        }, undefined, (error) => {
            console.warn("Could not load fish GLB, using fallback mesh.", error);
            // Fallback mesh if GLB fails to load
            const fallbackGeo = new THREE.ConeGeometry(0.5, 2, 8);
            fallbackGeo.rotateX(Math.PI / 2);
            const fallbackMat = new THREE.MeshLambertMaterial({ color: 0x0055ff });
            const fallbackMesh = new THREE.Mesh(fallbackGeo, fallbackMat);
            fallbackMesh.castShadow = true;
            player.add(fallbackMesh);
            window.__3D_STATE__.fishModelLoaded = true; // Set true to allow game to proceed
        });

        // Camera is added to slopeGroup to follow player naturally along the slope
        slopeGroup.add(camera);

        // Arrays for collision
        const trees = [];
        const rings = [];

        // Generate Trees
        const treeTrunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 1.5, 8);
        const treeTrunkMat = new THREE.MeshLambertMaterial({ color: 0x5c4033 });
        const treeLeavesGeo = new THREE.ConeGeometry(1.5, 3, 8);
        const treeLeavesMat = new THREE.MeshLambertMaterial({ color: 0x228b22 });

        for (let i = 0; i < window.__3D_STATE__.totalObstacles; i++) {
            const tree = new THREE.Group();
            
            const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            
            const leaves = new THREE.Mesh(treeLeavesGeo, treeLeavesMat.clone()); // Clone mat for individual color change
            leaves.position.y = 2.5;
            leaves.castShadow = true;
            
            tree.add(trunk);
            tree.add(leaves);

            tree.position.x = (Math.random() - 0.5) * 30; // -15 to 15
            tree.position.z = -30 - Math.random() * 420; // -30 to -450
            
            tree.userData = { crashed: false, leavesMesh: leaves };
            
            slopeGroup.add(tree);
            trees.push(tree);
        }

        // Generate Rings
        const ringGeo = new THREE.TorusGeometry(1, 0.2, 8, 24);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0xffff00, 
            emissive: 0xffaa00,
            emissiveIntensity: 0.5,
            metalness: 0.8,
            roughness: 0.2
        });

        for (let i = 0; i < window.__3D_STATE__.totalRings; i++) {
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.position.x = (Math.random() - 0.5) * 30;
            ring.position.z = -30 - Math.random() * 420;
            ring.position.y = 1.2;
            ring.castShadow = true;
            
            ring.userData = { collected: false };
            
            slopeGroup.add(ring);
            rings.push(ring);
        }

        // Finish Line
        const finishGeo = new THREE.PlaneGeometry(40, 2);
        const finishMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const finishLine = new THREE.Mesh(finishGeo, finishMat);
        finishLine.rotation.x = -Math.PI / 2;
        finishLine.position.set(0, 0.05, FINISH_Z);
        slopeGroup.add(finishLine);

        // Input Handling
        const keys = { left: false, right: false, brake: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'Space') keys.brake = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'Space') keys.brake = false;
        });

        // UI Elements
        const speedDisplay = document.getElementById('speedDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const crashDisplay = document.getElementById('crashDisplay');
        const startBtn = document.getElementById('startBtn');
        const finishOverlay = document.getElementById('finishOverlay');
        const finishText = document.getElementById('finishText');
        const restartBtn = document.getElementById('restartBtn');

        // Button Listeners
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            window.__3D_STATE__.gameStarted = true;
        });

        restartBtn.addEventListener('click', () => {
            // Reset State
            window.__3D_STATE__.gameStarted = true;
            window.__3D_STATE__.gameFinished = false;
            window.__3D_STATE__.speed = 0;
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.crashes = 0;
            window.__3D_STATE__.ringsRemaining = window.__3D_STATE__.totalRings;
            
            // Reset Player
            player.position.set(0, 0.5, 0);
            player.rotation.y = 0;

            // Reset Trees
            trees.forEach(tree => {
                tree.userData.crashed = false;
                tree.userData.leavesMesh.material.color.setHex(0x228b22);
            });

            // Reset Rings
            rings.forEach(ring => {
                ring.userData.collected = false;
                ring.visible = true;
            });

            finishOverlay.style.display = 'none';
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Collision Detection
        function checkCollisions() {
            const px = player.position.x;
            const pz = player.position.z;

            // Tree Collisions (Threshold 1.5 -> squared 2.25)
            trees.forEach(tree => {
                if (!tree.userData.crashed) {
                    const dx = px - tree.position.x;
                    const dz = pz - tree.position.z;
                    if (dx * dx + dz * dz < 2.25) {
                        tree.userData.crashed = true;
                        tree.userData.leavesMesh.material.color.setHex(0xff0000);
                        window.__3D_STATE__.speed = CRASH_SPEED;
                        window.__3D_STATE__.crashes++;
                    }
                }
            });

            // Ring Collisions (Threshold 2.0 -> squared 4.0)
            rings.forEach(ring => {
                if (!ring.userData.collected && ring.visible) {
                    const dx = px - ring.position.x;
                    const dz = pz - ring.position.z;
                    if (dx * dx + dz * dz < 4.0) {
                        ring.userData.collected = true;
                        ring.visible = false;
                        window.__3D_STATE__.score++;
                        window.__3D_STATE__.ringsRemaining--;
                    }
                }
            });
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            const state = window.__3D_STATE__;

            if (state.gameStarted && !state.gameFinished) {
                // Physics & Movement
                if (keys.brake) {
                    state.speed *= BRAKE_MULTIPLIER;
                    if (state.speed < MIN_BRAKE_SPEED) state.speed = MIN_BRAKE_SPEED;
                    state.braking = true;
                } else {
                    state.speed += ACCELERATION;
                    if (state.speed > MAX_SPEED) state.speed = MAX_SPEED;
                    state.braking = false;
                }

                // Steering
                let targetRotY = 0;
                if (keys.left) {
                    player.position.x -= STEER_SPEED;
                    targetRotY = 0.3;
                }
                if (keys.right) {
                    player.position.x += STEER_SPEED;
                    targetRotY = -0.3;
                }
                
                // Clamp X position
                player.position.x = Math.max(-18, Math.min(18, player.position.x));
                
                // Smooth rotation for steering visual
                player.rotation.y += (targetRotY - player.rotation.y) * 0.1;

                // Move forward
                player.position.z -= state.speed;

                // Check Collisions
                checkCollisions();

                // Check Finish
                if (player.position.z <= FINISH_Z) {
                    state.gameFinished = true;
                    finishOverlay.style.display = 'flex';
                    finishText.innerText = `FINISH! Final Score: ${state.score}`;
                }
            }

            // Camera Follow (Local space within slopeGroup)
            camera.position.x = player.position.x;
            camera.position.y = player.position.y + 4;
            camera.position.z = player.position.z + 8;
            camera.lookAt(player.position.x, player.position.y, player.position.z - 2);

            // Animate Rings
            rings.forEach(ring => {
                if (ring.visible) {
                    ring.rotation.y += 0.05;
                }
            });

            // Update State Object
            state.playerX = player.position.x;
            state.playerZ = player.position.z;

            // Update UI
            speedDisplay.innerText = `Speed: ${state.speed.toFixed(2)}`;
            scoreDisplay.innerText = `Score: ${state.score} / ${state.totalRings}`;
            crashDisplay.innerText = `Crashes: ${state.crashes}`;

            renderer.render(scene, camera);
        }

        // Start Loop
        animate();
    </script>
</body>
</html>
