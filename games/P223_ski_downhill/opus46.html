<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fish Ski Downhill</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    padding: 15px 25px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 10;
}

.hud-item {
    color: #fff;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    background: rgba(0,0,0,0.3);
    padding: 8px 16px;
    border-radius: 8px;
}

#startBtn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 60px;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: white;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
}

#startBtn:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

#finishOverlay {
    display: none;
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 30;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

#finishOverlay h1 {
    font-size: 64px;
    margin-bottom: 20px;
    text-shadow: 0 0 20px gold;
    color: gold;
}

#finishOverlay p {
    font-size: 28px;
    margin-bottom: 30px;
}

#restartBtn {
    display: none;
    padding: 15px 50px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(135deg, #2196F3, #1565C0);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    transition: transform 0.2s;
}

#restartBtn:hover {
    transform: scale(1.05);
}

#loadingText {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -70%);
    color: #aaa;
    font-size: 18px;
    z-index: 5;
}
</style>
</head>
<body>

<div id="hud">
    <div class="hud-item" id="speedDisplay">Speed: 0.00</div>
    <div class="hud-item" id="scoreDisplay">Score: 0 / 10</div>
    <div class="hud-item" id="crashDisplay">Crashes: 0</div>
</div>

<button id="startBtn">🎿 Start</button>

<div id="finishOverlay">
    <h1 id="finishTitle">FINISH!</h1>
    <p id="finishScore">Final Score: 0</p>
    <button id="restartBtn">🔄 Restart</button>
</div>

<div id="loadingText">Loading fish model...</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
    gameStarted: false,
    gameFinished: false,
    speed: 0,
    playerX: 0,
    playerZ: 0,
    score: 0,
    crashes: 0,
    totalObstacles: 20,
    totalRings: 10,
    ringsRemaining: 10,
    braking: false,
    fishModelLoaded: false
};

const state = window.__3D_STATE__;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc8ddf0);
scene.fog = new THREE.Fog(0xc8ddf0, 50, 200);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(-30, 50, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 300;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x8888cc, 0.5);
scene.add(ambientLight);

// --- Slope ---
const slopeAngle = 15 * Math.PI / 180;
const slopeLength = 550;
const slopeWidth = 40;

const slopeGeometry = new THREE.PlaneGeometry(slopeWidth, slopeLength, 40, 200);
const slopeMaterial = new THREE.MeshStandardMaterial({
    color: 0xf0f0ff,
    roughness: 0.8,
    metalness: 0.0
});
const slope = new THREE.Mesh(slopeGeometry, slopeMaterial);
slope.receiveShadow = true;
slope.rotation.x = -Math.PI / 2 + slopeAngle;
slope.position.set(0, -Math.sin(slopeAngle) * slopeLength / 2, -slopeLength / 2 * Math.cos(slopeAngle));
scene.add(slope);

// Add some snow texture variation with vertex displacement
const posAttr = slopeGeometry.getAttribute('position');
for (let i = 0; i < posAttr.count; i++) {
    posAttr.setZ(i, posAttr.getZ(i) + (Math.random() - 0.5) * 0.15);
}
slopeGeometry.computeVertexNormals();

// Side snow banks
for (let side of [-1, 1]) {
    const bankGeo = new THREE.BoxGeometry(5, 2, slopeLength);
    const bankMat = new THREE.MeshStandardMaterial({ color: 0xe8e8f8 });
    const bank = new THREE.Mesh(bankGeo, bankMat);
    bank.receiveShadow = true;
    bank.position.set(side * (slopeWidth / 2 + 2.5), 0, 0);
    bank.rotation.x = slopeAngle;
    bank.position.y = -Math.sin(slopeAngle) * slopeLength / 2;
    bank.position.z = -slopeLength / 2 * Math.cos(slopeAngle);
    scene.add(bank);
}

// Helper: get Y position on slope for a given Z
function getSlopeY(z) {
    return -Math.tan(slopeAngle) * (-z) + 0.5;
}

// --- Fish Model ---
let fishModel = null;
let fishMixer = null;
const loader = new GLTFLoader();

// Create a placeholder fish while loading
const placeholderGroup = new THREE.Group();
const bodyGeo = new THREE.ConeGeometry(0.4, 1.5, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff8844 });
const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
bodyMesh.rotation.x = Math.PI / 2;
placeholderGroup.add(bodyMesh);

const tailGeo = new THREE.ConeGeometry(0.3, 0.5, 4);
const tailMat = new THREE.MeshStandardMaterial({ color: 0xff6622 });
const tailMesh = new THREE.Mesh(tailGeo, tailMat);
tailMesh.position.z = 0.9;
tailMesh.rotation.x = Math.PI / 2;
placeholderGroup.add(tailMesh);

placeholderGroup.position.set(0, getSlopeY(0), 0);
scene.add(placeholderGroup);

let playerGroup = placeholderGroup;

// Add ski poles/skis to the fish
function addSkis(group) {
    const skiGeo = new THREE.BoxGeometry(0.1, 0.05, 2);
    const skiMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    for (let side of [-0.3, 0.3]) {
        const ski = new THREE.Mesh(skiGeo, skiMat);
        ski.position.set(side, -0.3, 0);
        group.add(ski);
    }
}

loader.load(
    '._BarramundiFish.glb',
    (gltf) => {
        fishModel = gltf.scene;
        fishModel.scale.set(1.5, 1.5, 1.5);
        fishModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        if (gltf.animations && gltf.animations.length > 0) {
            fishMixer = new THREE.AnimationMixer(fishModel);
            gltf.animations.forEach((clip) => {
                fishMixer.clipAction(clip).play();
            });
        }

        const newGroup = new THREE.Group();
        newGroup.add(fishModel);
        addSkis(newGroup);
        newGroup.position.copy(playerGroup.position);
        newGroup.rotation.copy(playerGroup.rotation);

        scene.remove(playerGroup);
        scene.add(newGroup);
        playerGroup = newGroup;

        state.fishModelLoaded = true;
        document.getElementById('loadingText').style.display = 'none';
        console.log('Fish model loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Could not load fish GLB, using placeholder:', error);
        addSkis(placeholderGroup);
        state.fishModelLoaded = false;
        document.getElementById('loadingText').textContent = 'Using placeholder fish (model not found)';
        setTimeout(() => {
            document.getElementById('loadingText').style.display = 'none';
        }, 2000);
    }
);

// --- Obstacles (Trees) ---
const trees = [];
const treesData = [];

function createTree(x, z) {
    const group = new THREE.Group();

    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1.5, 8);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 0.75;
    trunk.castShadow = true;
    group.add(trunk);

    // Foliage layers
    const colors = [0x228B22, 0x2E8B2E, 0x1E7B1E];
    for (let i = 0; i < 3; i++) {
        const coneGeo = new THREE.ConeGeometry(0.8 - i * 0.15, 1.2 - i * 0.1, 8);
        const coneMat = new THREE.MeshStandardMaterial({ color: colors[i] });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.y = 1.8 + i * 0.7;
        cone.castShadow = true;
        group.add(cone);
    }

    const y = getSlopeY(z);
    group.position.set(x, y, z);
    scene.add(group);

    return { mesh: group, x, z, hit: false };
}

for (let i = 0; i < 20; i++) {
    const x = (Math.random() - 0.5) * 30; // -15 to 15
    const z = -30 - Math.random() * 420; // -30 to -450
    const treeData = createTree(x, z);
    trees.push(treeData.mesh);
    treesData.push(treeData);
}

// --- Rings ---
const rings = [];
const ringsData = [];

function createRing(x, z) {
    const torusGeo = new THREE.TorusGeometry(0.5, 0.12, 16, 32);
    const torusMat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xffaa00,
        emissiveIntensity: 0.5,
        metalness: 0.8,
        roughness: 0.2
    });
    const torus = new THREE.Mesh(torusGeo, torusMat);
    const y = getSlopeY(z) + 1.0;
    torus.position.set(x, y, z);
    torus.rotation.x = Math.PI / 2;
    torus.castShadow = true;
    scene.add(torus);

    return { mesh: torus, x, z, collected: false };
}

for (let i = 0; i < 10; i++) {
    const x = (Math.random() - 0.5) * 30;
    const z = -30 - Math.random() * 420;
    const ringData = createRing(x, z);
    rings.push(ringData.mesh);
    ringsData.push(ringData);
}

// --- Finish Line ---
const finishGeo = new THREE.PlaneGeometry(slopeWidth, 3);
const finishMat = new THREE.MeshStandardMaterial({
    color: 0xff0000,
    emissive: 0x880000,
    emissiveIntensity: 0.3,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.7
});
const finishLine = new THREE.Mesh(finishGeo, finishMat);
finishLine.position.set(0, getSlopeY(-480) + 0.1, -480);
finishLine.rotation.x = -Math.PI / 2 + slopeAngle;
scene.add(finishLine);

// Finish line poles
for (let side of [-slopeWidth / 2, slopeWidth / 2]) {
    const poleGeo = new THREE.CylinderGeometry(0.15, 0.15, 4, 8);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(side, getSlopeY(-480) + 2, -480);
    scene.add(pole);
}

// --- Decorative snow particles ---
const snowParticles = new THREE.BufferGeometry();
const snowCount = 500;
const snowPositions = new Float32Array(snowCount * 3);
for (let i = 0; i < snowCount; i++) {
    snowPositions[i * 3] = (Math.random() - 0.5) * 60;
    snowPositions[i * 3 + 1] = Math.random() * 30;
    snowPositions[i * 3 + 2] = Math.random() * -100;
}
snowParticles.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));
const snowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
const snowSystem = new THREE.Points(snowParticles, snowMat);
scene.add(snowSystem);

// --- Input ---
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// --- UI ---
const startBtn = document.getElementById('startBtn');
const restartBtn = document.getElementById('restartBtn');
const finishOverlay = document.getElementById('finishOverlay');
const speedDisplay = document.getElementById('speedDisplay');
const scoreDisplay = document.getElementById('scoreDisplay');
const crashDisplay = document.getElementById('crashDisplay');

let currentSpeed = 0;
let playerX = 0;
let playerZ = 0;
let score = 0;
let crashes = 0;
let gameStarted = false;
let gameFinished = false;

startBtn.addEventListener('click', () => {
    startBtn.style.display = 'none';
    gameStarted = true;
    state.gameStarted = true;
});

restartBtn.addEventListener('click', () => {
    location.reload();
});

// --- Camera setup ---
camera.position.set(0, getSlopeY(0) + 8, 12);
camera.lookAt(0, getSlopeY(0), 0);

// --- Animation ---
const clock = new THREE.Clock();

function updateSnow() {
    const positions = snowParticles.getAttribute('position');
    for (let i = 0; i < snowCount; i++) {
        positions.array[i * 3 + 1] -= 0.03;
        positions.array[i * 3] += (Math.random() - 0.5) * 0.02;
        positions.array[i * 3 + 2] = playerZ + (positions.array[i * 3 + 2] - playerZ + 50) % 100 - 50;

        if (positions.array[i * 3 + 1] < getSlopeY(positions.array[i * 3 + 2]) - 2) {
            positions.array[i * 3 + 1] = getSlopeY(positions.array[i * 3 + 2]) + 25 + Math.random() * 5;
            positions.array[i * 3] = playerX + (Math.random() - 0.5) * 60;
        }
    }
    positions.needsUpdate = true;
}

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (fishMixer) {
        fishMixer.update(delta);
    }

    // Animate rings rotation
    ringsData.forEach((r) => {
        if (!r.collected) {
            r.mesh.rotation.y += 0.03;
            r.mesh.position.y = getSlopeY(r.z) + 1.0 + Math.sin(Date.now() * 0.003 + r.z) * 0.2;
        }
    });

    if (gameStarted && !gameFinished) {
        // Braking
        const braking = keys['Space'] === true;
        state.braking = braking;

        if (braking) {
            currentSpeed *= 0.7;
            if (currentSpeed < 0.2) currentSpeed = 0.2;
        } else {
            // Accelerate
            currentSpeed += 0.02;
            if (currentSpeed > 1.5) currentSpeed = 1.5;
        }

        // Steering
        if (keys['ArrowLeft'] || keys['KeyA']) {
            playerX -= 0.15;
        }
        if (keys['ArrowRight'] || keys['KeyD']) {
            playerX += 0.15;
        }
        playerX = Math.max(-18, Math.min(18, playerX));

        // Move downhill
        playerZ -= currentSpeed;

        // Update fish position
        const y = getSlopeY(playerZ);
        playerGroup.position.set(playerX, y, playerZ);
        playerGroup.rotation.x = slopeAngle;

        // Tilt fish when turning
        let targetRotY = 0;
        if (keys['ArrowLeft'] || keys['KeyA']) targetRotY = 0.3;
        if (keys['ArrowRight'] || keys['KeyD']) targetRotY = -0.3;
        playerGroup.rotation.z += (targetRotY - playerGroup.rotation.z) * 0.1;

        // Collision with trees
        treesData.forEach((t) => {
            if (!t.hit) {
                const dx = playerX - t.x;
                const dz = playerZ - t.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 1.5) {
                    t.hit = true;
                    crashes++;
                    currentSpeed = 0.1;
                    // Turn tree red
                    t.mesh.traverse((child) => {
                        if (child.isMesh) {
                            child.material = child.material.clone();
                            child.material.color.set(0xff2222);
                            child.material.emissive = new THREE.Color(0x880000);
                            child.material.emissiveIntensity = 0.3;
                        }
                    });
                }
            }
        });

        // Ring collection
        ringsData.forEach((r) => {
            if (!r.collected) {
                const dx = playerX - r.x;
                const dz = playerZ - r.z;
                const dist = Math.sqrt(dx * dx + dz * dz);
                if (dist < 2.0) {
                    r.collected = true;
                    scene.remove(r.mesh);
                    score++;
                    state.ringsRemaining--;
                }
            }
        });

        // Check finish
        if (playerZ <= -480) {
            gameFinished = true;
            state.gameFinished = true;
            finishOverlay.style.display = 'flex';
            document.getElementById('finishTitle').textContent = 'FINISH!';
            document.getElementById('finishScore').textContent = `Final Score: ${score} / 10 | Crashes: ${crashes}`;
            restartBtn.style.display = 'block';
        }

        // Camera follow
        const camTargetX = playerX * 0.5;
        const camTargetY = y + 8;
        const camTargetZ = playerZ + 12;
        camera.position.lerp(new THREE.Vector3(camTargetX, camTargetY, camTargetZ), 0.05);
        camera.lookAt(playerX, y, playerZ - 10);

        // Move directional light with player
        dirLight.position.set(playerX - 30, y + 50, playerZ + 20);
        dirLight.target.position.set(playerX, y, playerZ);
        dirLight.target.updateMatrixWorld();
    }

    // Update snow particles relative to camera
    updateSnow();

    // Update HUD
    speedDisplay.textContent = `Speed: ${currentSpeed.toFixed(2)}`;
    scoreDisplay.textContent = `Score: ${score} / 10`;
    crashDisplay.textContent = `Crashes: ${crashes}`;

    // Update state
    state.speed = parseFloat(currentSpeed.toFixed(2));
    state.playerX = parseFloat(playerX.toFixed(2));
    state.playerZ = parseFloat(playerZ.toFixed(2));
    state.score = score;
    state.crashes = crashes;
    state.ringsRemaining = ringsData.filter(r => !r.collected).length;

    renderer.render(scene, camera);
}

animate();

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
