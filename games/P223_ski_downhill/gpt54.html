<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fish Ski Downhill - Three.js</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #cfe6ff;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 14px 18px;
      box-sizing: border-box;
      color: white;
      font-weight: bold;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      pointer-events: none;
      z-index: 10;
    }

    #speedHud {
      position: absolute;
      top: 14px;
      left: 18px;
    }

    #scoreHud {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
    }

    #crashHud {
      position: absolute;
      top: 14px;
      right: 18px;
      text-align: right;
    }

    #startBtn, #restartBtn {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      padding: 14px 28px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #1f6feb;
      color: white;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    #startBtn {
      top: 50%;
      transform: translate(-50%, -50%);
    }

    #restartBtn {
      top: 62%;
      display: none;
      background: #d94c4c;
    }

    #finishOverlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.45);
      color: white;
      font-size: 42px;
      font-weight: bold;
      text-shadow: 0 3px 8px rgba(0,0,0,0.8);
      z-index: 15;
      pointer-events: none;
      text-align: center;
    }

    #finishOverlay .sub {
      margin-top: 14px;
      font-size: 26px;
    }

    #info {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.92);
      background: rgba(0,0,0,0.25);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="speedHud">Speed: 0.00</div>
    <div id="scoreHud">Score: 0 / 10</div>
    <div id="crashHud">Crashes: 0</div>
  </div>

  <button id="startBtn">Start</button>
  <button id="restartBtn">Restart</button>

  <div id="finishOverlay">
    <div id="finishText">FINISH!</div>
    <div class="sub" id="finishScore">Final Score: 0</div>
  </div>

  <div id="info">Controls: ←/→ or A/D to steer, Space to brake</div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer, clock;
    let slope;
    let player;
    let fishRoot;
    let directionalLight, ambientLight;
    let trees = [];
    let rings = [];
    let finishLine;

    const keys = {
      left: false,
      right: false,
      brake: false
    };

    const config = {
      slopeLength: 500,
      slopeWidth: 40,
      slopeAngleDeg: 15,
      accel: 0.02,
      maxSpeed: 1.5,
      steerSpeed: 0.15,
      minBrakeSpeed: 0.2,
      obstacleCount: 20,
      ringCount: 10,
      finishZ: -480
    };

    const game = {
      started: false,
      finished: false,
      speed: 0,
      score: 0,
      crashes: 0,
      fishModelLoaded: false
    };

    const speedHud = document.getElementById("speedHud");
    const scoreHud = document.getElementById("scoreHud");
    const crashHud = document.getElementById("crashHud");
    const startBtn = document.getElementById("startBtn");
    const restartBtn = document.getElementById("restartBtn");
    const finishOverlay = document.getElementById("finishOverlay");
    const finishScore = document.getElementById("finishScore");

    window.__3D_STATE__ = {
      gameStarted: false,
      gameFinished: false,
      speed: 0.00,
      playerX: 0,
      playerZ: 0,
      score: 0,
      crashes: 0,
      totalObstacles: config.obstacleCount,
      totalRings: config.ringCount,
      ringsRemaining: config.ringCount,
      braking: false,
      fishModelLoaded: false
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xbfdcff);
      scene.fog = new THREE.Fog(0xbfdcff, 120, 650);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 6, 10);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
      directionalLight.position.set(-20, 30, 20);
      scene.add(directionalLight);

      ambientLight = new THREE.AmbientLight(0x8888cc, 0.5);
      scene.add(ambientLight);

      createSlope();
      createFinishLine();
      createPlayerPlaceholder();
      loadFishModel();
      createTrees();
      createRings();
      createSkyHints();

      window.addEventListener("resize", onResize);

      window.addEventListener("keydown", (e) => {
        const k = e.key.toLowerCase();
        if (k === "arrowleft" || k === "a") keys.left = true;
        if (k === "arrowright" || k === "d") keys.right = true;
        if (k === " ") {
          keys.brake = true;
          e.preventDefault();
        }
      });

      window.addEventListener("keyup", (e) => {
        const k = e.key.toLowerCase();
        if (k === "arrowleft" || k === "a") keys.left = false;
        if (k === "arrowright" || k === "d") keys.right = false;
        if (k === " ") {
          keys.brake = false;
          e.preventDefault();
        }
      });

      startBtn.addEventListener("click", () => {
        game.started = true;
        startBtn.style.display = "none";
      });

      restartBtn.addEventListener("click", restartGame);

      updateHUD();
      updateState();
    }

    function createSlope() {
      const angle = THREE.MathUtils.degToRad(config.slopeAngleDeg);
      const geometry = new THREE.PlaneGeometry(config.slopeWidth, config.slopeLength, 10, 50);
      const material = new THREE.MeshPhongMaterial({
        color: 0xf0f0ff,
        shininess: 20
      });

      slope = new THREE.Mesh(geometry, material);
      slope.rotation.x = -Math.PI / 2 - angle;
      slope.position.set(0, -0.2, -config.slopeLength / 2);
      scene.add(slope);
    }

    function createFinishLine() {
      const geometry = new THREE.PlaneGeometry(config.slopeWidth, 3);
      const material = new THREE.MeshBasicMaterial({
        color: 0xff2222,
        side: THREE.DoubleSide
      });

      finishLine = new THREE.Mesh(geometry, material);
      finishLine.rotation.x = -Math.PI / 2 - THREE.MathUtils.degToRad(config.slopeAngleDeg);
      finishLine.position.set(0, yOnSlope(config.finishZ) + 0.05, config.finishZ);
      scene.add(finishLine);
    }

    function createPlayerPlaceholder() {
      fishRoot = new THREE.Group();
      fishRoot.position.set(0, 0.5, 0);
      scene.add(fishRoot);

      const placeholder = new THREE.Mesh(
        new THREE.SphereGeometry(0.7, 24, 16),
        new THREE.MeshPhongMaterial({ color: 0x66ccff })
      );
      placeholder.name = "placeholderFish";
      fishRoot.add(placeholder);

      player = fishRoot;
    }

    function loadFishModel() {
      const loader = new GLTFLoader();
      loader.load(
        "._BarramundiFish.glb",
        (gltf) => {
          const model = gltf.scene;
          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          box.getSize(size);

          const maxDim = Math.max(size.x || 1, size.y || 1, size.z || 1);
          const scale = 1.5 / maxDim;
          model.scale.setScalar(scale);

          const placeholder = fishRoot.getObjectByName("placeholderFish");
          if (placeholder) fishRoot.remove(placeholder);

          model.rotation.y = Math.PI;
          fishRoot.add(model);

          game.fishModelLoaded = true;
          updateState();
        },
        undefined,
        (err) => {
          console.warn("Failed to load fish model:", err);
          game.fishModelLoaded = false;
          updateState();
        }
      );
    }

    function createTrees() {
      const trunkGeo = new THREE.CylinderGeometry(0.18, 0.25, 1.1, 8);
      const leavesGeo = new THREE.ConeGeometry(0.9, 2.2, 10);

      for (let i = 0; i < config.obstacleCount; i++) {
        const x = randRange(-15, 15);
        const z = randRange(-30, -450);
        const y = yOnSlope(z);

        const tree = new THREE.Group();
        tree.position.set(x, y, z);
        tree.userData = { hit: false };

        const trunk = new THREE.Mesh(
          trunkGeo,
          new THREE.MeshPhongMaterial({ color: 0x7a4b2a })
        );
        trunk.position.y = 0.55;

        const leaves = new THREE.Mesh(
          leavesGeo,
          new THREE.MeshPhongMaterial({ color: 0x1f8b3a })
        );
        leaves.position.y = 1.9;

        tree.add(trunk);
        tree.add(leaves);
        scene.add(tree);
        trees.push(tree);
      }
    }

    function createRings() {
      const geo = new THREE.TorusGeometry(0.65, 0.18, 12, 24);

      for (let i = 0; i < config.ringCount; i++) {
        const x = randRange(-14, 14);
        const z = randRange(-35, -455);
        const y = yOnSlope(z) + 1.2;

        const ring = new THREE.Mesh(
          geo,
          new THREE.MeshPhongMaterial({
            color: 0xffdd33,
            emissive: 0xffaa00,
            emissiveIntensity: 0.8
          })
        );
        ring.position.set(x, y, z);
        ring.rotation.x = Math.PI / 2;
        ring.userData = { collected: false };
        scene.add(ring);
        rings.push(ring);
      }
    }

    function createSkyHints() {
      const mountainMat = new THREE.MeshPhongMaterial({
        color: 0xdde6f5,
        flatShading: true
      });

      for (let i = 0; i < 10; i++) {
        const mountain = new THREE.Mesh(
          new THREE.ConeGeometry(randRange(12, 25), randRange(20, 40), 4),
          mountainMat
        );
        mountain.position.set(
          randRange(-120, 120),
          randRange(8, 18),
          randRange(-520, 80)
        );
        mountain.rotation.y = randRange(0, Math.PI * 2);
        scene.add(mountain);
      }
    }

    function yOnSlope(z) {
      const angle = THREE.MathUtils.degToRad(config.slopeAngleDeg);
      return Math.tan(angle) * (-z);
    }

    function updateGame() {
      if (!game.started || game.finished) return;

      if (keys.brake) {
        game.speed = Math.max(config.minBrakeSpeed, game.speed * 0.7);
      } else {
        game.speed = Math.min(config.maxSpeed, game.speed + config.accel);
      }

      if (keys.left) player.position.x -= config.steerSpeed;
      if (keys.right) player.position.x += config.steerSpeed;

      player.position.x = THREE.MathUtils.clamp(player.position.x, -18, 18);
      player.position.z -= game.speed;
      player.position.y = yOnSlope(player.position.z) + 0.5;

      player.rotation.z = THREE.MathUtils.lerp(
        player.rotation.z,
        (keys.left ? 0.25 : 0) + (keys.right ? -0.25 : 0),
        0.15
      );
      player.rotation.x = THREE.MathUtils.lerp(player.rotation.x, -0.15, 0.08);
      player.rotation.y = THREE.MathUtils.lerp(player.rotation.y, Math.PI, 0.08);

      checkTreeCollisions();
      checkRingCollections();
      updateCamera();

      if (player.position.z <= config.finishZ) {
        game.finished = true;
        finishOverlay.style.display = "flex";
        finishScore.textContent = `Final Score: ${game.score}`;
        restartBtn.style.display = "block";
      }
    }

    function checkTreeCollisions() {
      for (const tree of trees) {
        if (!tree.visible || tree.userData.hit) continue;

        const dx = player.position.x - tree.position.x;
        const dz = player.position.z - tree.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.5) {
          tree.userData.hit = true;
          game.crashes += 1;
          game.speed = 0.1;

          const leaves = tree.children[1];
          if (leaves && leaves.material) {
            leaves.material = leaves.material.clone();
            leaves.material.color.set(0xff3333);
          }

          tree.visible = false;
        }
      }
    }

    function checkRingCollections() {
      for (const ring of rings) {
        if (!ring.visible || ring.userData.collected) continue;

        const dx = player.position.x - ring.position.x;
        const dz = player.position.z - ring.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 2.0) {
          ring.userData.collected = true;
          ring.visible = false;
          game.score += 1;
        }
      }
    }

    function updateCamera() {
      const targetPos = new THREE.Vector3(
        player.position.x,
        player.position.y + 5.5,
        player.position.z + 9
      );
      camera.position.lerp(targetPos, 0.12);

      const lookTarget = new THREE.Vector3(
        player.position.x,
        player.position.y + 1.2,
        player.position.z - 10
      );
      camera.lookAt(lookTarget);
    }

    function updateHUD() {
      speedHud.textContent = `Speed: ${game.speed.toFixed(2)}`;
      scoreHud.textContent = `Score: ${game.score} / ${config.ringCount}`;
      crashHud.textContent = `Crashes: ${game.crashes}`;
    }

    function updateState() {
      const ringsRemaining = rings.filter(r => r.visible && !r.userData.collected).length;

      window.__3D_STATE__ = {
        gameStarted: game.started,
        gameFinished: game.finished,
        speed: Number(game.speed.toFixed(2)),
        playerX: Number(player.position.x.toFixed(2)),
        playerZ: Number(player.position.z.toFixed(2)),
        score: game.score,
        crashes: game.crashes,
        totalObstacles: config.obstacleCount,
        totalRings: config.ringCount,
        ringsRemaining,
        braking: keys.brake,
        fishModelLoaded: game.fishModelLoaded
      };
    }

    function restartGame() {
      game.started = false;
      game.finished = false;
      game.speed = 0;
      game.score = 0;
      game.crashes = 0;

      keys.left = false;
      keys.right = false;
      keys.brake = false;

      player.position.set(0, 0.5, 0);
      player.rotation.set(0, 0, 0);

      for (const tree of trees) {
        tree.visible = true;
        tree.userData.hit = false;
        const leaves = tree.children[1];
        if (leaves && leaves.material) {
          leaves.material = leaves.material.clone();
          leaves.material.color.set(0x1f8b3a);
        }
      }

      for (const ring of rings) {
        ring.visible = true;
        ring.userData.collected = false;
      }

      startBtn.style.display = "block";
      restartBtn.style.display = "none";
      finishOverlay.style.display = "none";

      camera.position.set(0, 6, 10);
      camera.lookAt(0, 0, -10);

      updateHUD();
      updateState();
    }

    function animate() {
      requestAnimationFrame(animate);

      const t = clock.getElapsedTime();

      for (const ring of rings) {
        if (ring.visible) {
          ring.rotation.z += 0.03;
          ring.position.y += Math.sin(t * 2 + ring.position.z * 0.02) * 0.003;
        }
      }

      updateGame();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function randRange(min, max) {
      return min + Math.random() * (max - min);
    }
  </script>
</body>
</html>
