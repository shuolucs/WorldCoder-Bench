<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Molecular Diffusion Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .panel {
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #controls-panel {
            width: 300px;
        }
        #hud-panel {
            width: 250px;
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 5px;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
        }
        .instructions {
            font-size: 0.8rem;
            color: #aaa;
            line-height: 1.5;
            margin-top: 15px;
        }
        .hud-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .hud-value {
            font-family: monospace;
            font-weight: bold;
            color: #4488ff;
        }
        #hud-paused {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
            color: #ff4444;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="controls-panel" class="panel">
            <h2>Controls</h2>
            <div class="control-group">
                <label>
                    <span>Temperature (kT)</span>
                    <span id="val-temp">1.0</span>
                </label>
                <input type="range" id="slider-temperature" min="0.1" max="5.0" step="0.1" value="1.0">
            </div>
            <div class="control-group">
                <label>
                    <span>Drag Coefficient</span>
                    <span id="val-drag">2.0</span>
                </label>
                <input type="range" id="slider-drag" min="0" max="10" step="0.5" value="2.0">
            </div>
            <div class="instructions">
                <b>Keyboard Shortcuts:</b><br>
                [Space] Play / Pause<br>
                [R] Reset Simulation<br>
                [T] Toggle Trails<br>
                [H] Toggle Heatmap
            </div>
        </div>

        <div id="hud-panel" class="panel">
            <h2>Simulation HUD</h2>
            <div class="hud-item"><span>Temperature:</span> <span id="hud-temp" class="hud-value">1.0</span></div>
            <div class="hud-item"><span>Avg Speed A (Red):</span> <span id="hud-speed-a" class="hud-value">0.00</span></div>
            <div class="hud-item"><span>Avg Speed B (Blue):</span> <span id="hud-speed-b" class="hud-value">0.00</span></div>
            <div class="hud-item"><span>Mixing Index:</span> <span id="hud-mixing" class="hud-value">0.000</span></div>
            <div class="hud-item"><span>Collisions/Frame:</span> <span id="hud-collisions" class="hud-value">0</span></div>
            <div id="hud-paused">Playing</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            particleCount: 100,
            typeACount: 30,
            typeBCount: 70,
            temperature: 1.0,
            drag: 2.0,
            avgSpeedA: 0,
            avgSpeedB: 0,
            mixingIndex: 0,
            collisionsThisFrame: 0,
            isPaused: false,
            trailsEnabled: true,
            heatmapEnabled: true,
            frameCount: 0,
            particlesValid: true,
            totalKE: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334455, 0.3);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Simulation Container ---
        const boxGeom = new THREE.BoxGeometry(10, 10, 10);
        const boxEdges = new THREE.EdgesGeometry(boxGeom);
        const boxMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const boxWireframe = new THREE.LineSegments(boxEdges, boxMat);
        scene.add(boxWireframe);

        // --- Particles Setup ---
        const particles = [];
        const sphereGeom = new THREE.SphereGeometry(1, 16, 16);
        const colorA = new THREE.Color(0xff4444);
        const colorB = new THREE.Color(0x4488ff);
        const colorWhite = new THREE.Color(0xffffff);

        for (let i = 0; i < 100; i++) {
            const isTypeA = i < 30;
            const radius = isTypeA ? 0.2 : 0.15;
            const baseColor = isTypeA ? colorA : colorB;
            
            const mat = new THREE.MeshPhongMaterial({ 
                color: baseColor.clone(),
                shininess: 50
            });
            const mesh = new THREE.Mesh(sphereGeom, mat);
            mesh.scale.set(radius, radius, radius);
            scene.add(mesh);

            particles.push({
                type: isTypeA ? 'A' : 'B',
                pos: new THREE.Vector3(),
                vel: new THREE.Vector3(),
                mass: isTypeA ? 2.0 : 1.0,
                radius: radius,
                baseColor: baseColor,
                mesh: mesh,
                trail: []
            });
        }

        // --- Trails Setup (InstancedMesh with custom shader for alpha) ---
        const trailLength = 15;
        const totalTrails = 100 * trailLength;
        const trailGeom = new THREE.SphereGeometry(1, 8, 8);
        const trailMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, depthWrite: false });
        
        trailMat.onBeforeCompile = (shader) => {
            shader.vertexShader = `
                attribute float instanceAlpha;
                varying float vAlpha;
                ${shader.vertexShader}
            `.replace(
                `#include <begin_vertex>`,
                `#include <begin_vertex>\nvAlpha = instanceAlpha;`
            );
            shader.fragmentShader = `
                varying float vAlpha;
                ${shader.fragmentShader}
            `.replace(
                `vec4 diffuseColor = vec4( diffuse, opacity );`,
                `vec4 diffuseColor = vec4( diffuse, opacity * vAlpha );`
            );
        };

        const trailMesh = new THREE.InstancedMesh(trailGeom, trailMat, totalTrails);
        const trailAlphas = new Float32Array(totalTrails);
        trailMesh.geometry.setAttribute('instanceAlpha', new THREE.InstancedBufferAttribute(trailAlphas, 1));
        scene.add(trailMesh);

        // --- Heatmap Setup ---
        const heatmapSize = 10;
        const heatmapData = new Uint8Array(heatmapSize * heatmapSize * 4);
        const heatmapTex = new THREE.DataTexture(heatmapData, heatmapSize, heatmapSize, THREE.RGBAFormat);
        heatmapTex.magFilter = THREE.LinearFilter;
        const heatmapMat = new THREE.MeshBasicMaterial({ 
            map: heatmapTex, 
            transparent: true, 
            opacity: 0.6, 
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const heatmapPlane = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), heatmapMat);
        heatmapPlane.rotation.x = -Math.PI / 2;
        heatmapPlane.position.y = -4.99; // Just above floor
        scene.add(heatmapPlane);

        // --- Physics Helpers ---
        function randomGaussian(mean = 0, stdev = 1) {
            let u = 1 - Math.random();
            let v = Math.random();
            let z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            return z * stdev + mean;
        }

        function resetParticles() {
            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                let placed = false;
                let attempts = 0;
                
                while (!placed && attempts < 100) {
                    if (p.type === 'A') {
                        // Left half
                        p.pos.set(
                            Math.random() * 4.6 - 4.8,
                            Math.random() * 9.6 - 4.8,
                            Math.random() * 9.6 - 4.8
                        );
                    } else {
                        // Uniform
                        p.pos.set(
                            Math.random() * 9.6 - 4.8,
                            Math.random() * 9.6 - 4.8,
                            Math.random() * 9.6 - 4.8
                        );
                    }
                    
                    // Check overlap
                    let overlap = false;
                    for (let j = 0; j < i; j++) {
                        const distSq = p.pos.distanceToSquared(particles[j].pos);
                        const minDist = p.radius + particles[j].radius;
                        if (distSq < minDist * minDist) {
                            overlap = true;
                            break;
                        }
                    }
                    if (!overlap) placed = true;
                    attempts++;
                }
                
                p.vel.set(0, 0, 0);
                p.trail = [];
                p.mesh.position.copy(p.pos);
            }
            
            // Clear trails
            const dummy = new THREE.Object3D();
            dummy.scale.set(0,0,0);
            dummy.updateMatrix();
            for(let i=0; i<totalTrails; i++) {
                trailMesh.setMatrixAt(i, dummy.matrix);
                trailAlphas[i] = 0;
            }
            trailMesh.instanceMatrix.needsUpdate = true;
            trailMesh.geometry.attributes.instanceAlpha.needsUpdate = true;
            
            window.__3D_STATE__.frameCount = 0;
        }

        // --- Physics Engine ---
        const dt = 0.01;
        const substeps = 5;
        const sub_dt = dt / substeps;

        function stepPhysics() {
            let collisions = 0;
            const kT = window.__3D_STATE__.temperature;
            const drag = window.__3D_STATE__.drag;

            for (let step = 0; step < substeps; step++) {
                // 1. Brownian Motion, Drag, Position Update
                for (let i = 0; i < particles.length; i++) {
                    const p = particles[i];
                    
                    // Brownian kick
                    const kick = Math.sqrt(2 * kT / p.mass * sub_dt);
                    p.vel.x += randomGaussian(0, kick);
                    p.vel.y += randomGaussian(0, kick);
                    p.vel.z += randomGaussian(0, kick);

                    // Drag
                    p.vel.multiplyScalar(1 - drag * sub_dt);

                    // Position update
                    p.pos.addScaledVector(p.vel, sub_dt);

                    // Wall collisions
                    ['x', 'y', 'z'].forEach(axis => {
                        if (p.pos[axis] > 5 - p.radius) {
                            p.pos[axis] = 5 - p.radius;
                            p.vel[axis] *= -1;
                        } else if (p.pos[axis] < -5 + p.radius) {
                            p.pos[axis] = -5 + p.radius;
                            p.vel[axis] *= -1;
                        }
                    });
                }

                // 2. Particle-Particle Collisions
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const p1 = particles[i];
                        const p2 = particles[j];
                        
                        const dx = p2.pos.x - p1.pos.x;
                        const dy = p2.pos.y - p1.pos.y;
                        const dz = p2.pos.z - p1.pos.z;
                        const distSq = dx*dx + dy*dy + dz*dz;
                        const minDist = p1.radius + p2.radius;

                        if (distSq < minDist * minDist && distSq > 0.0001) {
                            collisions++;
                            const dist = Math.sqrt(distSq);
                            const nx = dx / dist;
                            const ny = dy / dist;
                            const nz = dz / dist;

                            const vrx = p1.vel.x - p2.vel.x;
                            const vry = p1.vel.y - p2.vel.y;
                            const vrz = p1.vel.z - p2.vel.z;
                            const vn = vrx*nx + vry*ny + vrz*nz;

                            // If approaching
                            if (vn > 0) {
                                const m1 = p1.mass;
                                const m2 = p2.mass;
                                const impulse = (2 * vn) / (1/m1 + 1/m2);

                                const ix = impulse * nx;
                                const iy = impulse * ny;
                                const iz = impulse * nz;

                                p1.vel.x -= ix / m1;
                                p1.vel.y -= iy / m1;
                                p1.vel.z -= iz / m1;

                                p2.vel.x += ix / m2;
                                p2.vel.y += iy / m2;
                                p2.vel.z += iz / m2;
                            }

                            // Positional correction (separate)
                            const overlap = minDist - dist;
                            const totalMassInv = 1/p1.mass + 1/p2.mass;
                            const corr1 = (overlap / p1.mass) / totalMassInv;
                            const corr2 = (overlap / p2.mass) / totalMassInv;

                            p1.pos.x -= nx * corr1;
                            p1.pos.y -= ny * corr1;
                            p1.pos.z -= nz * corr1;

                            p2.pos.x += nx * corr2;
                            p2.pos.y += ny * corr2;
                            p2.pos.z += nz * corr2;
                        }
                    }
                }
            }
            window.__3D_STATE__.collisionsThisFrame = collisions;
        }

        // --- Visualization Updates ---
        const dummy = new THREE.Object3D();
        const maxSpeedForColor = 15.0;

        function updateVisuals() {
            let trailIdx = 0;
            let sumSpeedA = 0, countA = 0;
            let sumSpeedB = 0, countB = 0;
            let typeAInLeft = 0;
            let totalKE = 0;
            let valid = true;

            // Heatmap grid
            const grid = new Array(100).fill(0);

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];
                
                // Validation
                if (isNaN(p.pos.x) || isNaN(p.vel.x)) valid = false;

                // Update Mesh
                p.mesh.position.copy(p.pos);
                
                // Color by speed
                const speed = p.vel.length();
                const lerpFactor = Math.min(1.0, speed / maxSpeedForColor);
                p.mesh.material.color.copy(p.baseColor).lerp(colorWhite, lerpFactor);

                // Stats
                totalKE += 0.5 * p.mass * speed * speed;
                if (p.type === 'A') {
                    sumSpeedA += speed;
                    countA++;
                    if (p.pos.x < 0) typeAInLeft++;
                } else {
                    sumSpeedB += speed;
                    countB++;
                }

                // Heatmap data
                if (window.__3D_STATE__.heatmapEnabled) {
                    let col = Math.floor(p.pos.x + 5);
                    let row = Math.floor(p.pos.z + 5);
                    col = Math.max(0, Math.min(9, col));
                    row = Math.max(0, Math.min(9, row));
                    grid[row * 10 + col]++;
                }

                // Trails
                if (window.__3D_STATE__.trailsEnabled) {
                    if (window.__3D_STATE__.frameCount % 2 === 0) {
                        p.trail.unshift(p.pos.clone());
                        if (p.trail.length > trailLength) p.trail.pop();
                    }

                    for (let j = 0; j < trailLength; j++) {
                        if (j < p.trail.length) {
                            dummy.position.copy(p.trail[j]);
                            const scale = p.radius * 0.5 * (1 - j / trailLength);
                            dummy.scale.set(scale, scale, scale);
                            dummy.updateMatrix();
                            trailMesh.setMatrixAt(trailIdx, dummy.matrix);
                            trailMesh.setColorAt(trailIdx, p.baseColor);
                            trailAlphas[trailIdx] = 0.6 * (1 - j / trailLength);
                        } else {
                            dummy.scale.set(0,0,0);
                            dummy.updateMatrix();
                            trailMesh.setMatrixAt(trailIdx, dummy.matrix);
                            trailAlphas[trailIdx] = 0;
                        }
                        trailIdx++;
                    }
                } else {
                    // Hide trails
                    for (let j = 0; j < trailLength; j++) {
                        dummy.scale.set(0,0,0);
                        dummy.updateMatrix();
                        trailMesh.setMatrixAt(trailIdx, dummy.matrix);
                        trailAlphas[trailIdx] = 0;
                        trailIdx++;
                    }
                }
            }

            // Update Trail InstancedMesh
            trailMesh.instanceMatrix.needsUpdate = true;
            if (trailMesh.instanceColor) trailMesh.instanceColor.needsUpdate = true;
            trailMesh.geometry.attributes.instanceAlpha.needsUpdate = true;
            trailMesh.visible = window.__3D_STATE__.trailsEnabled;

            // Update Heatmap Texture
            heatmapPlane.visible = window.__3D_STATE__.heatmapEnabled;
            if (window.__3D_STATE__.heatmapEnabled) {
                const maxCount = 5; // Color scaling max
                for (let i = 0; i < 100; i++) {
                    const count = grid[i];
                    const ratio = Math.min(1.0, count / maxCount);
                    // Blue to Red
                    heatmapData[i*4 + 0] = ratio * 255; // R
                    heatmapData[i*4 + 1] = 0;           // G
                    heatmapData[i*4 + 2] = (1 - ratio) * 255; // B
                    heatmapData[i*4 + 3] = count > 0 ? 180 : 30; // A
                }
                heatmapTex.needsUpdate = true;
            }

            // Update State
            window.__3D_STATE__.avgSpeedA = sumSpeedA / countA;
            window.__3D_STATE__.avgSpeedB = sumSpeedB / countB;
            const fractionA = typeAInLeft / countA;
            window.__3D_STATE__.mixingIndex = 1.0 - Math.abs(fractionA - 0.5) / 0.5;
            window.__3D_STATE__.particlesValid = valid;
            window.__3D_STATE__.totalKE = totalKE;
        }

        // --- UI & Controls ---
        const sliderTemp = document.getElementById('slider-temperature');
        const sliderDrag = document.getElementById('slider-drag');
        const valTemp = document.getElementById('val-temp');
        const valDrag = document.getElementById('val-drag');

        sliderTemp.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.temperature = val;
            valTemp.textContent = val.toFixed(1);
        });

        sliderDrag.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            window.__3D_STATE__.drag = val;
            valDrag.textContent = val.toFixed(1);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            } else if (e.code === 'KeyR') {
                resetParticles();
            } else if (e.code === 'KeyT') {
                window.__3D_STATE__.trailsEnabled = !window.__3D_STATE__.trailsEnabled;
            } else if (e.code === 'KeyH') {
                window.__3D_STATE__.heatmapEnabled = !window.__3D_STATE__.heatmapEnabled;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function updateHUDDOM() {
            const state = window.__3D_STATE__;
            document.getElementById('hud-temp').textContent = state.temperature.toFixed(1);
            document.getElementById('hud-speed-a').textContent = state.avgSpeedA.toFixed(2);
            document.getElementById('hud-speed-b').textContent = state.avgSpeedB.toFixed(2);
            document.getElementById('hud-mixing').textContent = state.mixingIndex.toFixed(3);
            document.getElementById('hud-collisions').textContent = state.collisionsThisFrame;
            
            const pauseEl = document.getElementById('hud-paused');
            if (state.isPaused) {
                pauseEl.textContent = 'Paused';
                pauseEl.style.color = '#ff4444';
            } else {
                pauseEl.textContent = 'Playing';
                pauseEl.style.color = '#44ff44';
            }
        }

        // --- Main Loop ---
        resetParticles();

        function animate() {
            requestAnimationFrame(animate);

            if (!window.__3D_STATE__.isPaused) {
                stepPhysics();
                window.__3D_STATE__.frameCount++;
            } else {
                window.__3D_STATE__.collisionsThisFrame = 0;
            }

            updateVisuals();
            updateHUDDOM();
            
            // Round state values for testing requirements
            window.__3D_STATE__.avgSpeedA = Math.round(window.__3D_STATE__.avgSpeedA * 1000) / 1000;
            window.__3D_STATE__.avgSpeedB = Math.round(window.__3D_STATE__.avgSpeedB * 1000) / 1000;
            window.__3D_STATE__.mixingIndex = Math.round(window.__3D_STATE__.mixingIndex * 1000) / 1000;
            window.__3D_STATE__.totalKE = Math.round(window.__3D_STATE__.totalKE * 1000) / 1000;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
