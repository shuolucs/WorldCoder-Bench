<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Darts Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            position: absolute;
            padding: 20px;
        }
        #scoreDisplay { top: 0; left: 0; }
        #lastThrow { top: 40px; left: 0; font-size: 18px; color: #ccc; }
        #dartsRemaining { top: 0; right: 0; }
        
        #crosshair {
            position: absolute;
            color: white;
            font-size: 30px;
            font-weight: bold;
            transform: translate(-50%, -50%);
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }

        #controls-bottom {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 30px;
            border-radius: 10px;
        }

        #newGameBtn {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
        }
        #newGameBtn:hover { background-color: #45a049; }
        #newGameBtn:disabled { background-color: #555; cursor: not-allowed; color: #888; }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            font-weight: bold;
        }
        
        #instructions {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            text-align: center;
            font-size: 14px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="scoreDisplay" class="hud-text">Score: 0</div>
        <div id="lastThrow" class="hud-text">Last: -</div>
        <div id="dartsRemaining" class="hud-text">Darts: 5</div>
        
        <div id="crosshair">+</div>
        
        <div id="instructions">
            Use Arrow Keys to aim. Press SPACE to throw.
        </div>

        <div id="controls-bottom">
            <div class="slider-container">
                <label for="powerSlider">Power:</label>
                <input type="range" id="powerSlider" min="1" max="10" value="7">
            </div>
            <button id="newGameBtn">New Game</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            aimX: 0,
            aimY: 1.5,
            score: 0,
            dartsRemaining: 5,
            dartsThrown: 0,
            lastScore: 0,
            isThrowInProgress: false,
            gameOver: false,
            dartPositions: [],
            power: 7,
            boardCenter: { x: 0, y: 1.5, z: -4 },
            modelLoaded: false
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const lastThrowDisplay = document.getElementById('lastThrow');
        const dartsRemainingDisplay = document.getElementById('dartsRemaining');
        const crosshair = document.getElementById('crosshair');
        const newGameBtn = document.getElementById('newGameBtn');
        const powerSlider = document.getElementById('powerSlider');

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 3);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.0);
        pointLight.position.set(2, 4, 2);
        scene.add(pointLight);

        // Floor Grid
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        gridHelper.position.y = -2;
        scene.add(gridHelper);

        // Load Environment Model
        const gltfLoader = new GLTFLoader();
        gltfLoader.load(
            'https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/collision-world.glb',
            (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.5, 0.5, 0.5);
                model.position.set(0, -2, -5);
                
                // Dim the environment slightly so dartboard pops
                model.traverse((child) => {
                    if (child.isMesh && child.material) {
                        child.material.color.multiplyScalar(0.5);
                    }
                });
                
                scene.add(model);
                state.modelLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load environment model, continuing without it.', error);
            }
        );

        // --- Dartboard Construction ---
        const boardGroup = new THREE.Group();
        boardGroup.position.set(state.boardCenter.x, state.boardCenter.y, state.boardCenter.z);

        function createRing(radius, color, zOffset) {
            const geo = new THREE.CylinderGeometry(radius, radius, 0.02, 64);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = Math.PI / 2;
            mesh.position.z = zOffset;
            return mesh;
        }

        // Outer (1 pt)
        boardGroup.add(createRing(1.0, 0x006400, 0));
        // Middle (5 pts)
        boardGroup.add(createRing(0.7, 0xcc0000, 0.01));
        // Inner (10 pts)
        boardGroup.add(createRing(0.4, 0x0000cc, 0.02));
        // Bullseye (25 pts)
        boardGroup.add(createRing(0.15, 0xffcc00, 0.03));

        scene.add(boardGroup);

        // --- Dart Construction ---
        let currentDart = null;
        let thrownDarts = [];

        function createDart() {
            const group = new THREE.Group();
            
            // Body (Cone)
            const bodyGeo = new THREE.ConeGeometry(0.02, 0.2, 16);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.3 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.rotation.x = -Math.PI / 2; // Point tip towards -Z
            body.position.z = -0.1; // Shift so group origin is near the middle/tail
            
            // Tail (Cylinder)
            const tailGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.1, 16);
            const tailMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.5 });
            const tail = new THREE.Mesh(tailGeo, tailMat);
            tail.rotation.x = Math.PI / 2;
            tail.position.z = 0.05;

            group.add(body);
            group.add(tail);
            
            // Start position
            group.position.set(0, 1.5, 2.5);
            return group;
        }

        function initDart() {
            if (currentDart) scene.remove(currentDart);
            currentDart = createDart();
            scene.add(currentDart);
        }

        initDart();

        // --- Input Handling ---
        document.addEventListener('keydown', (e) => {
            if (state.isThrowInProgress || state.gameOver) return;

            const step = 0.05;
            let moved = false;

            switch(e.code) {
                case 'ArrowLeft':
                    state.aimX = Math.max(-1.5, state.aimX - step);
                    moved = true;
                    break;
                case 'ArrowRight':
                    state.aimX = Math.min(1.5, state.aimX + step);
                    moved = true;
                    break;
                case 'ArrowDown':
                    state.aimY = Math.max(0.0, state.aimY - step);
                    moved = true;
                    break;
                case 'ArrowUp':
                    state.aimY = Math.min(3.0, state.aimY + step);
                    moved = true;
                    break;
                case 'Space':
                    startThrow();
                    break;
            }
        });

        powerSlider.addEventListener('input', (e) => {
            let val = parseFloat(e.target.value);
            if (!isNaN(val)) {
                state.power = val;
            }
        });

        newGameBtn.addEventListener('click', () => {
            state.score = 0;
            state.dartsRemaining = 5;
            state.dartsThrown = 0;
            state.lastScore = 0;
            state.gameOver = false;
            state.isThrowInProgress = false;
            state.dartPositions = [];
            state.aimX = 0;
            state.aimY = 1.5;

            // Remove thrown darts
            thrownDarts.forEach(dart => scene.remove(dart));
            thrownDarts = [];

            initDart();
            updateUI();
        });

        // --- Throw Logic ---
        let throwStartPos = new THREE.Vector3();
        let throwTargetPos = new THREE.Vector3();
        let throwStartTime = 0;
        let throwDuration = 0;

        function startThrow() {
            state.isThrowInProgress = true;
            
            throwStartPos.copy(currentDart.position);

            // Apply random deviation
            const devX = (Math.random() - 0.5) * 0.1;
            const devY = (Math.random() - 0.5) * 0.1;
            
            throwTargetPos.set(state.aimX + devX, state.aimY + devY, state.boardCenter.z);

            // Calculate duration based on power (min 0.2s)
            throwDuration = Math.max(0.2, 1.0 - state.power * 0.08);
            throwStartTime = performance.now();
            
            updateUI();
        }

        function finishThrow() {
            state.isThrowInProgress = false;
            state.dartsThrown++;
            state.dartsRemaining--;

            // Calculate Score
            const dx = throwTargetPos.x - state.boardCenter.x;
            const dy = throwTargetPos.y - state.boardCenter.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            let points = 0;
            if (distance <= 0.15) points = 25;
            else if (distance <= 0.4) points = 10;
            else if (distance <= 0.7) points = 5;
            else if (distance <= 1.0) points = 1;

            state.lastScore = points;
            state.score += points;
            
            state.dartPositions.push({
                x: throwTargetPos.x,
                y: throwTargetPos.y,
                z: throwTargetPos.z
            });

            thrownDarts.push(currentDart);

            if (state.dartsRemaining > 0) {
                initDart();
            } else {
                state.gameOver = true;
            }

            updateUI();
        }

        // --- UI Updates ---
        function updateUI() {
            scoreDisplay.textContent = `Score: ${state.score}`;
            dartsRemainingDisplay.textContent = `Darts: ${state.dartsRemaining}`;
            
            if (state.dartsThrown > 0) {
                lastThrowDisplay.textContent = `Last: ${state.lastScore}`;
            } else {
                lastThrowDisplay.textContent = `Last: -`;
            }

            newGameBtn.disabled = state.isThrowInProgress;
            
            if (state.gameOver) {
                lastThrowDisplay.textContent += " | Game Over!";
            }
        }

        function updateCrosshair() {
            // Project 3D aim point to 2D screen space
            const aimVector = new THREE.Vector3(state.aimX, state.aimY, state.boardCenter.z);
            aimVector.project(camera);

            const x = (aimVector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (aimVector.y * -0.5 + 0.5) * window.innerHeight;

            crosshair.style.left = `${x}px`;
            crosshair.style.top = `${y}px`;
            
            // Hide crosshair during throw or game over
            if (state.isThrowInProgress || state.gameOver) {
                crosshair.style.opacity = '0.2';
            } else {
                crosshair.style.opacity = '1';
            }
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            if (state.isThrowInProgress) {
                const elapsed = (time - throwStartTime) / 1000; // in seconds
                let progress = elapsed / throwDuration;
                
                if (progress >= 1.0) {
                    progress = 1.0;
                    currentDart.position.lerpVectors(throwStartPos, throwTargetPos, progress);
                    finishThrow();
                } else {
                    currentDart.position.lerpVectors(throwStartPos, throwTargetPos, progress);
                }
            }

            updateCrosshair();
            renderer.render(scene, camera);
        }

        // Start loop
        updateUI();
        requestAnimationFrame(animate);

    </script>
</body>
</html>
