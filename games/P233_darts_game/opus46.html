<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Darts Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }

  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 30px;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    user-select: none;
  }

  #scoreDisplay {
    position: fixed;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    z-index: 10;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  #lastThrow {
    position: fixed;
    top: 52px;
    left: 20px;
    color: #ccc;
    font-size: 18px;
    z-index: 10;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  #dartsRemaining {
    position: fixed;
    top: 20px;
    right: 20px;
    color: white;
    font-size: 24px;
    z-index: 10;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }

  #newGameBtn {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 30px;
    font-size: 18px;
    background: #e74c3c;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s;
  }
  #newGameBtn:hover { background: #c0392b; }

  #powerContainer {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  #powerContainer label {
    color: white;
    font-size: 16px;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }
  #powerSlider {
    width: 200px;
    cursor: pointer;
  }

  #gameOverMsg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -60%);
    color: #f1c40f;
    font-size: 36px;
    font-weight: bold;
    z-index: 10;
    text-shadow: 0 0 10px rgba(0,0,0,0.9);
    display: none;
    text-align: center;
    pointer-events: none;
  }

  #aimIndicator {
    position: fixed;
    bottom: 120px;
    left: 20px;
    color: #aaa;
    font-size: 14px;
    z-index: 10;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
  }
</style>
</head>
<body>

<div id="crosshair">+</div>
<div id="scoreDisplay">Score: 0</div>
<div id="lastThrow">Last: -</div>
<div id="dartsRemaining">Darts: 5</div>
<div id="gameOverMsg">Game Over!<br><span id="finalScore" style="font-size:24px;"></span></div>
<div id="aimIndicator"></div>

<div id="powerContainer">
  <label for="powerSlider">Power:</label>
  <input type="range" id="powerSlider" min="1" max="10" value="7">
</div>

<button id="newGameBtn">New Game</button>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.152.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.152.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 8, 20);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 3);
camera.lookAt(0, 1.5, -4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.0, 20);
pointLight.position.set(2, 4, 2);
pointLight.castShadow = true;
pointLight.shadow.mapSize.width = 1024;
pointLight.shadow.mapSize.height = 1024;
scene.add(pointLight);

// Additional light for dartboard visibility
const dartboardLight = new THREE.SpotLight(0xffffff, 0.8, 10, Math.PI / 6, 0.5);
dartboardLight.position.set(0, 3, -2);
dartboardLight.target.position.set(0, 1.5, -4);
scene.add(dartboardLight);
scene.add(dartboardLight.target);

// Floor plane
const floorGeom = new THREE.PlaneGeometry(20, 20);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x2c2c3e, roughness: 0.8 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -2;
floor.receiveShadow = true;
scene.add(floor);

// Grid
const gridHelper = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
gridHelper.position.y = -1.99;
scene.add(gridHelper);

// Back wall
const wallGeom = new THREE.PlaneGeometry(10, 8);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x3d3d5c, roughness: 0.9 });
const wall = new THREE.Mesh(wallGeom, wallMat);
wall.position.set(0, 1, -4.5);
wall.receiveShadow = true;
scene.add(wall);

// ============ LOAD GLB MODEL ============
const loader = new GLTFLoader();
loader.load(
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r152/examples/models/gltf/collision-world.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.5, 0.5, 0.5);
    model.position.set(0, -2, -5);
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(model);
    gameState.modelLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Could not load collision-world.glb:', error);
    gameState.modelLoaded = false;
  }
);

// ============ DARTBOARD ============
const boardCenter = new THREE.Vector3(0, 1.5, -4);

function createDartboard() {
  const boardGroup = new THREE.Group();

  // Board backing (dark wood)
  const backingGeom = new THREE.CylinderGeometry(1.1, 1.1, 0.05, 64);
  const backingMat = new THREE.MeshStandardMaterial({ color: 0x2d1b0e, roughness: 0.7 });
  const backing = new THREE.Mesh(backingGeom, backingMat);
  backing.rotation.x = Math.PI / 2;
  boardGroup.add(backing);

  // Outer ring - dark green, 1 point
  const outerGeom = new THREE.CylinderGeometry(1.0, 1.0, 0.06, 64);
  const outerMat = new THREE.MeshStandardMaterial({ color: 0x1a5c2a, roughness: 0.5 });
  const outer = new THREE.Mesh(outerGeom, outerMat);
  outer.rotation.x = Math.PI / 2;
  outer.position.z = 0.005;
  boardGroup.add(outer);

  // Middle ring - red, 5 points
  const middleGeom = new THREE.CylinderGeometry(0.7, 0.7, 0.07, 64);
  const middleMat = new THREE.MeshStandardMaterial({ color: 0xc0392b, roughness: 0.5 });
  const middle = new THREE.Mesh(middleGeom, middleMat);
  middle.rotation.x = Math.PI / 2;
  middle.position.z = 0.01;
  boardGroup.add(middle);

  // Inner ring - blue, 10 points
  const innerGeom = new THREE.CylinderGeometry(0.4, 0.4, 0.08, 64);
  const innerMat = new THREE.MeshStandardMaterial({ color: 0x2980b9, roughness: 0.5 });
  const inner = new THREE.Mesh(innerGeom, innerMat);
  inner.rotation.x = Math.PI / 2;
  inner.position.z = 0.015;
  boardGroup.add(inner);

  // Bullseye - gold, 25 points
  const bullseyeGeom = new THREE.CylinderGeometry(0.15, 0.15, 0.09, 32);
  const bullseyeMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f, roughness: 0.3, metalness: 0.3 });
  const bullseye = new THREE.Mesh(bullseyeGeom, bullseyeMat);
  bullseye.rotation.x = Math.PI / 2;
  bullseye.position.z = 0.02;
  boardGroup.add(bullseye);

  // Ring separators (wire rings)
  const ringRadii = [0.15, 0.4, 0.7, 1.0];
  ringRadii.forEach(r => {
    const ringGeom = new THREE.TorusGeometry(r, 0.008, 8, 64);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5 });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.position.z = 0.03;
    boardGroup.add(ring);
  });

  // Number markers around the board (simplified)
  const numbers = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
  // We'll skip actual number rendering for simplicity but add tick marks
  for (let i = 0; i < 20; i++) {
    const angle = (i / 20) * Math.PI * 2;
    const tickGeom = new THREE.BoxGeometry(0.005, 0.08, 0.01);
    const tickMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
    const tick = new THREE.Mesh(tickGeom, tickMat);
    tick.position.x = Math.cos(angle) * 1.05;
    tick.position.y = Math.sin(angle) * 1.05;
    tick.position.z = 0.03;
    tick.rotation.z = angle;
    boardGroup.add(tick);
  }

  boardGroup.position.copy(boardCenter);
  boardGroup.rotation.y = 0;

  boardGroup.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  return boardGroup;
}

const dartboard = createDartboard();
scene.add(dartboard);

// ============ DART CREATION ============
function createDart() {
  const dartGroup = new THREE.Group();

  // Body (cone) - red
  const bodyGeom = new THREE.ConeGeometry(0.015, 0.2, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c, roughness: 0.4 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.rotation.x = Math.PI / 2;
  body.position.z = -0.1;
  dartGroup.add(body);

  // Tip (small cone) - silver
  const tipGeom = new THREE.ConeGeometry(0.005, 0.06, 8);
  const tipMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
  const tip = new THREE.Mesh(tipGeom, tipMat);
  tip.rotation.x = Math.PI / 2;
  tip.position.z = -0.23;
  dartGroup.add(tip);

  // Tail (cylinder) - gray
  const tailGeom = new THREE.CylinderGeometry(0.012, 0.012, 0.08, 8);
  const tailMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.6 });
  const tail = new THREE.Mesh(tailGeom, tailMat);
  tail.rotation.x = Math.PI / 2;
  tail.position.z = 0.04;
  dartGroup.add(tail);

  // Flights (fins)
  const flightGeom = new THREE.PlaneGeometry(0.04, 0.06);
  const flightMat = new THREE.MeshStandardMaterial({ color: 0x3498db, side: THREE.DoubleSide });
  
  const flight1 = new THREE.Mesh(flightGeom, flightMat);
  flight1.position.z = 0.06;
  dartGroup.add(flight1);

  const flight2 = new THREE.Mesh(flightGeom, flightMat.clone());
  flight2.position.z = 0.06;
  flight2.rotation.z = Math.PI / 2;
  dartGroup.add(flight2);

  dartGroup.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
    }
  });

  return dartGroup;
}

// ============ GAME STATE ============
const gameState = {
  aimX: 0,
  aimY: 1.5,
  score: 0,
  dartsRemaining: 5,
  dartsThrown: 0,
  lastScore: 0,
  isThrowInProgress: false,
  gameOver: false,
  dartPositions: [],
  power: 7,
  boardCenter: { x: 0, y: 1.5, z: -4 },
  modelLoaded: false
};

window.__3D_STATE__ = gameState;

let currentDart = null;
const stuckDarts = [];
let throwAnimation = null;

const dartStartPos = new THREE.Vector3(0, 1.5, 2.5);

function spawnCurrentDart() {
  if (currentDart) {
    scene.remove(currentDart);
  }
  currentDart = createDart();
  currentDart.position.copy(dartStartPos);
  scene.add(currentDart);
}

spawnCurrentDart();

// ============ AIM SYSTEM ============
// Aim coordinates in board-local space
let aimOffsetX = 0; // -1.5 to 1.5
let aimOffsetY = 0; // relative to board center Y, so total Y = 1.5 + aimOffsetY, range 0 to 3 => aimOffsetY from -1.5 to 1.5

// Crosshair visual indicator
const crosshairEl = document.getElementById('crosshair');
const aimIndicatorEl = document.getElementById('aimIndicator');

function updateAimDisplay() {
  gameState.aimX = aimOffsetX;
  gameState.aimY = boardCenter.y + aimOffsetY;

  // Map aim to screen position for crosshair
  const aimWorldPos = new THREE.Vector3(aimOffsetX, boardCenter.y + aimOffsetY, boardCenter.z);
  const screenPos = aimWorldPos.clone().project(camera);
  
  const halfWidth = window.innerWidth / 2;
  const halfHeight = window.innerHeight / 2;
  const screenX = (screenPos.x * halfWidth) + halfWidth;
  const screenY = -(screenPos.y * halfHeight) + halfHeight;

  crosshairEl.style.left = screenX + 'px';
  crosshairEl.style.top = screenY + 'px';
  crosshairEl.style.transform = 'translate(-50%, -50%)';

  aimIndicatorEl.textContent = `Aim: (${aimOffsetX.toFixed(2)}, ${(boardCenter.y + aimOffsetY).toFixed(2)})`;
}

// ============ INPUT HANDLING ============
const keys = {};

document.addEventListener('keydown', (e) => {
  keys[e.code] = true;

  if (e.code === 'Space') {
    e.preventDefault();
    throwDart();
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

function handleAimInput() {
  const step = 0.05;
  if (keys['ArrowLeft']) {
    aimOffsetX = Math.max(-1.5, aimOffsetX - step);
    keys['ArrowLeft'] = false;
  }
  if (keys['ArrowRight']) {
    aimOffsetX = Math.min(1.5, aimOffsetX + step);
    keys['ArrowRight'] = false;
  }
  if (keys['ArrowUp']) {
    aimOffsetY = Math.min(1.5, aimOffsetY + step);
    keys['ArrowUp'] = false;
  }
  if (keys['ArrowDown']) {
    aimOffsetY = Math.max(-1.5, aimOffsetY - step);
    keys['ArrowDown'] = false;
  }
}

// ============ THROW MECHANICS ============
function throwDart() {
  if (gameState.isThrowInProgress || gameState.gameOver || gameState.dartsRemaining <= 0) return;

  gameState.isThrowInProgress = true;

  const power = parseInt(document.getElementById('powerSlider').value) || 7;
  gameState.power = power;

  // Calculate throw duration based on power
  let duration = 1.0 - power * 0.08;
  duration = Math.max(0.2, duration);

  // Target position with random deviation
  const deviationX = (Math.random() - 0.5) * 0.1; // ±0.05
  const deviationY = (Math.random() - 0.5) * 0.1;

  const targetX = aimOffsetX + deviationX;
  const targetY = boardCenter.y + aimOffsetY + deviationY;
  const targetZ = boardCenter.z + 0.04; // slightly in front of board

  const startPos = dartStartPos.clone();
  const endPos = new THREE.Vector3(targetX, targetY, targetZ);

  const startTime = performance.now();
  const durationMs = duration * 1000;

  throwAnimation = {
    startPos,
    endPos,
    startTime,
    durationMs,
    dart: currentDart
  };
}

function updateThrowAnimation(now) {
  if (!throwAnimation) return;

  const { startPos, endPos, startTime, durationMs, dart } = throwAnimation;
  const elapsed = now - startTime;
  let t = Math.min(elapsed / durationMs, 1.0);

  // Ease out
  t = 1 - Math.pow(1 - t, 3);

  // Lerp position
  dart.position.lerpVectors(startPos, endPos, t);

  // Add slight arc
  const arc = Math.sin(t * Math.PI) * 0.15;
  dart.position.y += arc * (1 - t);

  if (t >= 1.0) {
    // Dart has landed
    dart.position.copy(endPos);
    
    // Calculate score
    const dx = endPos.x - boardCenter.x;
    const dy = endPos.y - boardCenter.y;
    const distance = Math.sqrt(dx * dx + dy * dy);

    let points = 0;
    let hitText = '';
    if (distance <= 0.15) {
      points = 25;
      hitText = 'BULLSEYE! +25';
    } else if (distance <= 0.4) {
      points = 10;
      hitText = 'Inner Ring! +10';
    } else if (distance <= 0.7) {
      points = 5;
      hitText = 'Middle Ring! +5';
    } else if (distance <= 1.0) {
      points = 1;
      hitText = 'Outer Ring! +1';
    } else {
      points = 0;
      hitText = 'Miss! +0';
    }

    gameState.score += points;
    gameState.lastScore = points;
    gameState.dartsRemaining--;
    gameState.dartsThrown++;
    gameState.dartPositions.push({ x: endPos.x, y: endPos.y, z: endPos.z });

    // Update UI
    document.getElementById('scoreDisplay').textContent = `Score: ${gameState.score}`;
    document.getElementById('dartsRemaining').textContent = `Darts: ${gameState.dartsRemaining}`;
    document.getElementById('lastThrow').textContent = `Last: ${hitText}`;

    // Flash last throw text
    const lastThrowEl = document.getElementById('lastThrow');
    if (points >= 25) {
      lastThrowEl.style.color = '#f1c40f';
    } else if (points >= 10) {
      lastThrowEl.style.color = '#3498db';
    } else if (points >= 5) {
      lastThrowEl.style.color = '#e74c3c';
    } else if (points >= 1) {
      lastThrowEl.style.color = '#2ecc71';
    } else {
      lastThrowEl.style.color = '#888';
    }

    // Keep dart stuck
    stuckDarts.push(dart);

    throwAnimation = null;
    gameState.isThrowInProgress = false;

    // Check game over
    if (gameState.dartsRemaining <= 0) {
      gameState.gameOver = true;
      const gameOverMsg = document.getElementById('gameOverMsg');
      document.getElementById('finalScore').textContent = `Final Score: ${gameState.score}/125`;
      gameOverMsg.style.display = 'block';
    } else {
      // Spawn new dart
      currentDart = null;
      spawnCurrentDart();
    }
  }
}

// ============ NEW GAME ============
document.getElementById('newGameBtn').addEventListener('click', () => {
  // Reset state
  gameState.score = 0;
  gameState.dartsRemaining = 5;
  gameState.dartsThrown = 0;
  gameState.lastScore = 0;
  gameState.isThrowInProgress = false;
  gameState.gameOver = false;
  gameState.dartPositions = [];

  // Remove stuck darts
  stuckDarts.forEach(d => scene.remove(d));
  stuckDarts.length = 0;

  // Cancel any in-progress throw
  throwAnimation = null;

  // Reset aim
  aimOffsetX = 0;
  aimOffsetY = 0;

  // Update UI
  document.getElementById('scoreDisplay').textContent = 'Score: 0';
  document.getElementById('dartsRemaining').textContent = 'Darts: 5';
  document.getElementById('lastThrow').textContent = 'Last: -';
  document.getElementById('lastThrow').style.color = '#ccc';
  document.getElementById('gameOverMsg').style.display = 'none';

  // Spawn new dart
  spawnCurrentDart();
});

// ============ POWER SLIDER ============
document.getElementById('powerSlider').addEventListener('input', (e) => {
  gameState.power = parseInt(e.target.value) || 7;
});

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ ANIMATION LOOP ============
function animate(now) {
  requestAnimationFrame(animate);

  handleAimInput();
  updateAimDisplay();

  // Update power from slider
  gameState.power = parseInt(document.getElementById('powerSlider').value) || 7;

  // Animate current dart slight hover if not throwing
  if (currentDart && !gameState.isThrowInProgress) {
    const time = now * 0.001;
    currentDart.position.x = dartStartPos.x + aimOffsetX * 0.1;
    currentDart.position.y = dartStartPos.y + aimOffsetY * 0.1 + Math.sin(time * 2) * 0.005;
    currentDart.position.z = dartStartPos.z;

    // Point dart toward target
    const targetPos = new THREE.Vector3(aimOffsetX, boardCenter.y + aimOffsetY, boardCenter.z);
    currentDart.lookAt(targetPos);
  }

  // Update throw animation
  if (throwAnimation) {
    updateThrowAnimation(now);
  }

  // Ensure state values are never NaN
  if (isNaN(gameState.aimX)) gameState.aimX = 0;
  if (isNaN(gameState.aimY)) gameState.aimY = 1.5;
  if (isNaN(gameState.score)) gameState.score = 0;
  if (isNaN(gameState.dartsRemaining)) gameState.dartsRemaining = 5;
  if (isNaN(gameState.dartsThrown)) gameState.dartsThrown = 0;
  if (isNaN(gameState.lastScore)) gameState.lastScore = 0;
  if (isNaN(gameState.power)) gameState.power = 7;

  renderer.render(scene, camera);
}

requestAnimationFrame(animate);
</script>
</body>
</html>
