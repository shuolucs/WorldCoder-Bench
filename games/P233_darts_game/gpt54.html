<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Darts Game</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    #scoreDisplay, #lastThrow, #dartsRemaining {
      position: absolute;
      color: white;
      z-index: 10;
      font-size: 20px;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    #scoreDisplay {
      top: 20px;
      left: 20px;
    }

    #lastThrow {
      top: 50px;
      left: 20px;
    }

    #dartsRemaining {
      top: 20px;
      right: 20px;
    }

    #crosshair {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 30px;
      z-index: 10;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 6px rgba(0,0,0,0.9);
    }

    #controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 10px;
    }

    #newGameBtn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: #2d89ef;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #newGameBtn:hover {
      background: #1f6fc7;
    }

    #powerLabel {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="range"] {
      cursor: pointer;
    }

    #help {
      position: absolute;
      bottom: 80px;
      left: 20px;
      z-index: 10;
      color: #ddd;
      font-size: 14px;
      background: rgba(0,0,0,0.3);
      padding: 8px 10px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div id="scoreDisplay">Score: 0</div>
  <div id="lastThrow">Last: -</div>
  <div id="dartsRemaining">Darts: 5</div>
  <div id="crosshair">+</div>

  <div id="help">
    Arrow Keys: Aim &nbsp;|&nbsp; Space: Throw
  </div>

  <div id="controls">
    <button id="newGameBtn">New Game</button>
    <label id="powerLabel">
      Power
      <input id="powerSlider" type="range" min="1" max="10" value="7" />
      <span id="powerValue">7</span>
    </label>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.152.2/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.5, 3);
    camera.lookAt(0, 1.5, -4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.0);
    pointLight.position.set(2, 4, 2);
    scene.add(pointLight);

    const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
    grid.position.y = -2;
    scene.add(grid);

    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x222222,
      roughness: 0.9,
      metalness: 0.05,
      transparent: true,
      opacity: 0.35
    });
    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      floorMat
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -2.001;
    scene.add(floor);

    const loader = new GLTFLoader();
    let environmentModel = null;

    loader.load(
      'collision-world.glb',
      (gltf) => {
        environmentModel = gltf.scene;
        environmentModel.scale.setScalar(0.5);
        environmentModel.position.set(0, -2, -5);
        scene.add(environmentModel);
        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load collision-world.glb:', err);
        window.__3D_STATE__.modelLoaded = false;
      }
    );

    const boardCenter = new THREE.Vector3(0, 1.5, -4);
    const boardGroup = new THREE.Group();
    boardGroup.position.copy(boardCenter);
    boardGroup.rotation.y = 0;
    scene.add(boardGroup);

    function makeBoardDisc(radius, color, zOffset) {
      const geo = new THREE.CylinderGeometry(radius, radius, 0.04, 64);
      const mat = new THREE.MeshStandardMaterial({ color });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = Math.PI / 2;
      mesh.position.z = zOffset;
      return mesh;
    }

    boardGroup.add(makeBoardDisc(1.0, 0x0b5d1e, -0.06));
    boardGroup.add(makeBoardDisc(0.7, 0xcc2222, -0.04));
    boardGroup.add(makeBoardDisc(0.4, 0x2244cc, -0.02));
    boardGroup.add(makeBoardDisc(0.15, 0xffcc33, 0.0));

    const boardBacking = new THREE.Mesh(
      new THREE.CylinderGeometry(1.05, 1.05, 0.08, 64),
      new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    boardBacking.rotation.x = Math.PI / 2;
    boardBacking.position.z = -0.08;
    boardGroup.add(boardBacking);

    function createDart() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.04, 0.18, 16),
        new THREE.MeshStandardMaterial({ color: 0xdd3333 })
      );
      body.rotation.x = -Math.PI / 2;
      body.position.z = -0.04;
      group.add(body);

      const tail = new THREE.Mesh(
        new THREE.CylinderGeometry(0.02, 0.02, 0.12, 12),
        new THREE.MeshStandardMaterial({ color: 0xaaaaaa })
      );
      tail.rotation.x = Math.PI / 2;
      tail.position.z = 0.08;
      group.add(tail);

      const tip = new THREE.Mesh(
        new THREE.ConeGeometry(0.012, 0.06, 12),
        new THREE.MeshStandardMaterial({ color: 0xdddddd })
      );
      tip.rotation.x = Math.PI / 2;
      tip.position.z = -0.16;
      group.add(tip);

      return group;
    }

    const dartStart = new THREE.Vector3(0, 1.5, 2.5);
    let currentDart = null;
    const stuckDarts = [];

    function spawnCurrentDart() {
      if (currentDart) scene.remove(currentDart);
      currentDart = createDart();
      currentDart.position.copy(dartStart);
      currentDart.rotation.set(0, 0, 0);
      scene.add(currentDart);
    }

    spawnCurrentDart();

    const scoreDisplay = document.getElementById('scoreDisplay');
    const dartsRemainingDisplay = document.getElementById('dartsRemaining');
    const lastThrowDisplay = document.getElementById('lastThrow');
    const newGameBtn = document.getElementById('newGameBtn');
    const powerSlider = document.getElementById('powerSlider');
    const powerValue = document.getElementById('powerValue');

    const state = {
      aimX: 0,
      aimY: 1.5,
      score: 0,
      dartsRemaining: 5,
      dartsThrown: 0,
      lastScore: 0,
      isThrowInProgress: false,
      gameOver: false,
      dartPositions: [],
      power: 7,
      boardCenter: { x: 0, y: 1.5, z: -4 },
      modelLoaded: false
    };

    window.__3D_STATE__ = state;

    function safeNum(n, fallback = 0) {
      return Number.isFinite(n) ? n : fallback;
    }

    function clampAim() {
      state.aimX = Math.max(-1.5, Math.min(1.5, safeNum(state.aimX)));
      state.aimY = Math.max(0, Math.min(3.0, safeNum(state.aimY, 1.5)));
    }

    function updateHUD() {
      state.score = safeNum(state.score);
      state.dartsRemaining = safeNum(state.dartsRemaining);
      state.dartsThrown = safeNum(state.dartsThrown);
      state.lastScore = safeNum(state.lastScore);
      state.power = safeNum(state.power, 7);
      clampAim();

      scoreDisplay.textContent = `Score: ${state.score}`;
      dartsRemainingDisplay.textContent = `Darts: ${state.dartsRemaining}`;
      lastThrowDisplay.textContent = `Last: ${state.lastScore}`;
      powerValue.textContent = `${state.power}`;
    }

    function getScoreForHit(hitPos) {
      const dx = hitPos.x - boardCenter.x;
      const dy = hitPos.y - boardCenter.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist <= 0.15) return 25;
      if (dist <= 0.4) return 10;
      if (dist <= 0.7) return 5;
      if (dist <= 1.0) return 1;
      return 0;
    }

    let throwData = null;
    const clock = new THREE.Clock();

    function throwDart() {
      if (state.isThrowInProgress || state.gameOver || state.dartsRemaining <= 0 || !currentDart) return;

      state.isThrowInProgress = true;

      const deviationX = (Math.random() - 0.5) * 0.1;
      const deviationY = (Math.random() - 0.5) * 0.1;

      const target = new THREE.Vector3(
        safeNum(state.aimX) + deviationX,
        safeNum(state.aimY, 1.5) + deviationY,
        -4
      );

      const power = Math.max(1, Math.min(10, safeNum(Number(powerSlider.value), 7)));
      state.power = power;
      let duration = 1.0 - power * 0.08;
      duration = Math.max(0.2, duration);

      throwData = {
        dart: currentDart,
        start: currentDart.position.clone(),
        end: target.clone(),
        elapsed: 0,
        duration
      };

      const dir = new THREE.Vector3().subVectors(target, currentDart.position).normalize();
      const yaw = Math.atan2(dir.x, dir.z);
      const pitch = -Math.atan2(dir.y, Math.sqrt(dir.x * dir.x + dir.z * dir.z));
      currentDart.rotation.set(pitch, yaw, 0);
    }

    function finalizeThrow(finalPos, dart) {
      const points = getScoreForHit(finalPos);
      state.lastScore = points;
      state.score += points;
      state.score = safeNum(state.score);

      state.dartsRemaining -= 1;
      state.dartsThrown += 1;

      state.dartPositions.push({
        x: safeNum(finalPos.x),
        y: safeNum(finalPos.y),
        z: safeNum(finalPos.z)
      });

      stuckDarts.push(dart);

      state.isThrowInProgress = false;
      throwData = null;

      if (state.dartsRemaining <= 0) {
        state.dartsRemaining = 0;
        state.gameOver = true;
        currentDart = null;
      } else {
        spawnCurrentDart();
      }
    }

    function resetGame() {
      state.score = 0;
      state.dartsRemaining = 5;
      state.dartsThrown = 0;
      state.lastScore = 0;
      state.isThrowInProgress = false;
      state.gameOver = false;
      state.dartPositions = [];
      state.aimX = 0;
      state.aimY = 1.5;

      if (throwData && throwData.dart) {
        scene.remove(throwData.dart);
      }
      throwData = null;

      while (stuckDarts.length > 0) {
        const dart = stuckDarts.pop();
        scene.remove(dart);
      }

      spawnCurrentDart();
      updateHUD();
    }

    document.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') {
        state.aimX -= 0.05;
        clampAim();
      } else if (e.code === 'ArrowRight') {
        state.aimX += 0.05;
        clampAim();
      } else if (e.code === 'ArrowUp') {
        state.aimY += 0.05;
        clampAim();
      } else if (e.code === 'ArrowDown') {
        state.aimY -= 0.05;
        clampAim();
      } else if (e.code === 'Space') {
        e.preventDefault();
        throwDart();
      }
    });

    powerSlider.addEventListener('input', () => {
      state.power = safeNum(Number(powerSlider.value), 7);
      updateHUD();
    });

    newGameBtn.addEventListener('click', resetGame);

    function updateThrow(dt) {
      if (!throwData) return;

      throwData.elapsed += dt;
      const t = Math.min(throwData.elapsed / throwData.duration, 1);
      throwData.dart.position.lerpVectors(throwData.start, throwData.end, t);

      if (t >= 1) {
        finalizeThrow(throwData.end.clone(), throwData.dart);
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      updateThrow(dt);
      updateHUD();

      state.aimX = safeNum(state.aimX);
      state.aimY = safeNum(state.aimY, 1.5);
      state.score = safeNum(state.score);
      state.dartsRemaining = safeNum(state.dartsRemaining);
      state.dartsThrown = safeNum(state.dartsThrown);
      state.lastScore = safeNum(state.lastScore);
      state.power = safeNum(state.power, 7);
      state.isThrowInProgress = !!state.isThrowInProgress;
      state.gameOver = !!state.gameOver;
      state.modelLoaded = !!state.modelLoaded;

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    animate();
  </script>
</body>
</html>
