<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suspension Bridge Spring-Mass Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #B0C4DE, #F0F0F0);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      right: 12px;
      top: 12px;
      background: rgba(255,255,255,0.82);
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
      z-index: 10;
      min-width: 230px;
    }

    #ui h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
    }

    .row {
      margin: 8px 0;
      display: grid;
      grid-template-columns: 1fr 70px;
      gap: 8px;
      align-items: center;
      font-size: 13px;
    }

    .row input[type="range"] {
      grid-column: 1 / span 2;
      width: 100%;
    }

    .value {
      text-align: right;
      color: #333;
      font-weight: bold;
    }

    #hud {
      position: absolute;
      left: 12px;
      top: 12px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      padding: 10px 12px;
      border-radius: 10px;
      z-index: 10;
      min-width: 240px;
      line-height: 1.5;
      font-size: 13px;
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      background: rgba(0,0,0,0.35);
      color: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      z-index: 10;
      font-size: 12px;
    }

    .label {
      color: #cfe8ff;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div><span class="label">Vehicle X:</span> <span id="hud-vehicle-x">0.0</span></div>
      <div><span class="label">Max Stress:</span> <span id="hud-max-stress">0.000</span></div>
      <div><span class="label">Max Deflection:</span> <span id="hud-max-deflection">0.00</span></div>
      <div><span class="label">Avg Cable Tension:</span> <span id="hud-cable-tension">0.0</span></div>
      <div><span class="label">Wind:</span> <span id="hud-wind">0.0</span></div>
      <div><span class="label">Sim Time:</span> <span id="hud-sim-time">0.0</span></div>
    </div>

    <div id="ui">
      <h3>Bridge Controls</h3>

      <div class="row">
        <label for="slider-speed">Vehicle Speed</label>
        <div class="value" id="val-speed">2.0</div>
        <input id="slider-speed" type="range" min="0" max="5" step="0.1" value="2" />
      </div>

      <div class="row">
        <label for="slider-mass">Vehicle Mass</label>
        <div class="value" id="val-mass">5.0</div>
        <input id="slider-mass" type="range" min="1" max="20" step="0.5" value="5" />
      </div>

      <div class="row">
        <label for="slider-wind">Wind Strength</label>
        <div class="value" id="val-wind">0.0</div>
        <input id="slider-wind" type="range" min="0" max="3" step="0.1" value="0" />
      </div>
    </div>

    <div id="help">
      Space: Pause/Resume &nbsp; | &nbsp; R: Reset &nbsp; | &nbsp; V: Toggle Vehicle
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ----------------------------
    // Basic Scene Setup
    // ----------------------------
    const app = document.getElementById('app');
    const scene = new THREE.Scene();

    const bgCanvas = document.createElement('canvas');
    bgCanvas.width = 2;
    bgCanvas.height = 512;
    const bgCtx = bgCanvas.getContext('2d');
    const grad = bgCtx.createLinearGradient(0, 0, 0, 512);
    grad.addColorStop(0, '#B0C4DE');
    grad.addColorStop(1, '#F0F0F0');
    bgCtx.fillStyle = grad;
    bgCtx.fillRect(0, 0, 2, 512);
    const bgTexture = new THREE.CanvasTexture(bgCanvas);
    scene.background = bgTexture;

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
    camera.position.set(0, 15, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const hemi = new THREE.HemisphereLight(0x9fc5e8, 0x6b4f3a, 1.0);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.2);
    dir.position.set(20, 35, 15);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    dir.shadow.camera.left = -60;
    dir.shadow.camera.right = 60;
    dir.shadow.camera.top = 60;
    dir.shadow.camera.bottom = -60;
    dir.shadow.camera.near = 1;
    dir.shadow.camera.far = 120;
    scene.add(dir);

    // ----------------------------
    // Environment
    // ----------------------------
    const water = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.MeshStandardMaterial({
        color: 0x4f86c6,
        transparent: true,
        opacity: 0.55,
        roughness: 0.2,
        metalness: 0.1
      })
    );
    water.rotation.x = -Math.PI / 2;
    water.position.y = -5;
    water.receiveShadow = true;
    scene.add(water);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(200, 200),
      new THREE.ShadowMaterial({ opacity: 0.12 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -4.98;
    ground.receiveShadow = true;
    scene.add(ground);

    // ----------------------------
    // Towers
    // ----------------------------
    const towerMaterial = new THREE.MeshStandardMaterial({ color: 0x7d7d7d, roughness: 0.8 });
    const towerGroup = new THREE.Group();
    scene.add(towerGroup);

    function createTower(x) {
      const g = new THREE.Group();
      const legGeo = new THREE.BoxGeometry(1, 30, 1);
      const crossGeo = new THREE.BoxGeometry(5, 1, 1.2);
      const baseY = 15;

      const leg1 = new THREE.Mesh(legGeo, towerMaterial);
      leg1.position.set(x - 1.5, baseY, 0);
      leg1.castShadow = true;
      leg1.receiveShadow = true;
      g.add(leg1);

      const leg2 = new THREE.Mesh(legGeo, towerMaterial);
      leg2.position.set(x + 1.5, baseY, 0);
      leg2.castShadow = true;
      leg2.receiveShadow = true;
      g.add(leg2);

      const cross = new THREE.Mesh(crossGeo, towerMaterial);
      cross.position.set(x, 30, 0);
      cross.castShadow = true;
      cross.receiveShadow = true;
      g.add(cross);

      const brace1 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 12, 0.5), towerMaterial);
      brace1.position.set(x, 11, 0);
      brace1.rotation.z = Math.PI / 6;
      brace1.castShadow = true;
      brace1.receiveShadow = true;
      g.add(brace1);

      const brace2 = new THREE.Mesh(new THREE.BoxGeometry(0.5, 12, 0.5), towerMaterial);
      brace2.position.set(x, 11, 0);
      brace2.rotation.z = -Math.PI / 6;
      brace2.castShadow = true;
      brace2.receiveShadow = true;
      g.add(brace2);

      towerGroup.add(g);
    }

    createTower(-20);
    createTower(20);

    // ----------------------------
    // Physics Parameters
    // ----------------------------
    const N = 40;
    const deckSpacing = 40 / (N - 1);
    const deckMass = 0.5;
    const kDeck = 500;
    const kCable = 1000;
    const kHanger = 200;
    const g = 9.81;
    const dt = 0.005;
    const dampingFactor = 0.995;
    const substeps = 4;

    const leftX = -20;
    const rightX = 20;
    const cableZs = [-1.5, 1.5];
    const towerTopY = 30;

    let simTime = 0;
    let frameCount = 0;
    let isPaused = false;
    let vehicleVisible = true;

    // ----------------------------
    // UI Elements
    // ----------------------------
    const sliderSpeed = document.getElementById('slider-speed');
    const sliderMass = document.getElementById('slider-mass');
    const sliderWind = document.getElementById('slider-wind');
    const valSpeed = document.getElementById('val-speed');
    const valMass = document.getElementById('val-mass');
    const valWind = document.getElementById('val-wind');

    function syncSliderLabels() {
      valSpeed.textContent = Number(sliderSpeed.value).toFixed(1);
      valMass.textContent = Number(sliderMass.value).toFixed(1);
      valWind.textContent = Number(sliderWind.value).toFixed(1);
    }
    sliderSpeed.addEventListener('input', syncSliderLabels);
    sliderMass.addEventListener('input', syncSliderLabels);
    sliderWind.addEventListener('input', syncSliderLabels);
    syncSliderLabels();

    // ----------------------------
    // Node Data Structures
    // ----------------------------
    function makeNode(pos, pinned = false, mass = deckMass) {
      return {
        pos: pos.clone(),
        vel: new THREE.Vector3(),
        force: new THREE.Vector3(),
        mass,
        pinned,
        rest: pos.clone()
      };
    }

    const deckNodes = [];
    const cableNodesA = [];
    const cableNodesB = [];

    function cableSagY(x) {
      // Smooth parabola between tower tops; min near center
      // center sag around 11 units below top
      const t = (x - leftX) / (rightX - leftX);
      return towerTopY - 11 * (1 - Math.pow(2 * t - 1, 2));
    }

    function initNodes() {
      deckNodes.length = 0;
      cableNodesA.length = 0;
      cableNodesB.length = 0;

      for (let i = 0; i < N; i++) {
        const x = leftX + i * deckSpacing;
        const deckY = 0;
        const yCable = cableSagY(x);

        deckNodes.push(makeNode(
          new THREE.Vector3(x, deckY, 0),
          i === 0 || i === N - 1,
          deckMass
        ));

        cableNodesA.push(makeNode(
          new THREE.Vector3(x, yCable, cableZs[0]),
          i === 0 || i === N - 1,
          0.35
        ));

        cableNodesB.push(makeNode(
          new THREE.Vector3(x, yCable, cableZs[1]),
          i === 0 || i === N - 1,
          0.35
        ));
      }

      // Force exact endpoint positions to tower tops
      cableNodesA[0].pos.set(leftX, towerTopY, cableZs[0]);
      cableNodesA[0].rest.copy(cableNodesA[0].pos);
      cableNodesA[N - 1].pos.set(rightX, towerTopY, cableZs[0]);
      cableNodesA[N - 1].rest.copy(cableNodesA[N - 1].pos);

      cableNodesB[0].pos.set(leftX, towerTopY, cableZs[1]);
      cableNodesB[0].rest.copy(cableNodesB[0].pos);
      cableNodesB[N - 1].pos.set(rightX, towerTopY, cableZs[1]);
      cableNodesB[N - 1].rest.copy(cableNodesB[N - 1].pos);

      deckNodes[0].pos.set(leftX, 0, 0);
      deckNodes[0].rest.copy(deckNodes[0].pos);
      deckNodes[N - 1].pos.set(rightX, 0, 0);
      deckNodes[N - 1].rest.copy(deckNodes[N - 1].pos);
    }

    initNodes();

    const deckRestLength = deckSpacing;
    const cableRestLengthsA = [];
    const cableRestLengthsB = [];
    const hangerRestLengthsA = [];
    const hangerRestLengthsB = [];

    function initRestLengths() {
      cableRestLengthsA.length = 0;
      cableRestLengthsB.length = 0;
      hangerRestLengthsA.length = 0;
      hangerRestLengthsB.length = 0;

      for (let i = 0; i < N - 1; i++) {
        cableRestLengthsA.push(cableNodesA[i].rest.distanceTo(cableNodesA[i + 1].rest));
        cableRestLengthsB.push(cableNodesB[i].rest.distanceTo(cableNodesB[i + 1].rest));
      }

      for (let i = 0; i < N; i++) {
        hangerRestLengthsA.push(cableNodesA[i].rest.distanceTo(deckNodes[i].rest));
        hangerRestLengthsB.push(cableNodesB[i].rest.distanceTo(deckNodes[i].rest));
      }
    }
    initRestLengths();

    // ----------------------------
    // Bridge Visualization
    // ----------------------------
    const bridgeGroup = new THREE.Group();
    scene.add(bridgeGroup);

    const deckSegments = [];
    const deckSegmentGeo = new THREE.BoxGeometry(deckSpacing, 0.3, 3);

    function stressColor(strain) {
      const green = new THREE.Color(0x2ecc71);
      const yellow = new THREE.Color(0xf1c40f);
      const orange = new THREE.Color(0xe67e22);
      const red = new THREE.Color(0xe74c3c);

      if (strain < 0.02) return green;
      if (strain < 0.05) {
        return yellow.clone().lerp(green, 1 - (strain - 0.02) / 0.03);
      }
      if (strain < 0.1) {
        return orange.clone().lerp(yellow, 1 - (strain - 0.05) / 0.05);
      }
      return red;
    }

    for (let i = 0; i < N - 1; i++) {
      const mat = new THREE.MeshStandardMaterial({ color: 0x2ecc71, roughness: 0.7, metalness: 0.1 });
      const seg = new THREE.Mesh(deckSegmentGeo, mat);
      seg.castShadow = true;
      seg.receiveShadow = true;
      deckSegments.push(seg);
      bridgeGroup.add(seg);
    }

    // Cable lines
    const cableMat = new THREE.LineBasicMaterial({ color: 0x333333 });
    const cableGeomA = new THREE.BufferGeometry();
    const cableGeomB = new THREE.BufferGeometry();
    const cableLineA = new THREE.Line(cableGeomA, cableMat);
    const cableLineB = new THREE.Line(cableGeomB, cableMat);
    bridgeGroup.add(cableLineA, cableLineB);

    // Hangers
    const hangerLinesA = [];
    const hangerLinesB = [];
    const hangerMat = new THREE.LineBasicMaterial({ color: 0x888888 });

    for (let i = 0; i < N; i++) {
      const ga = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
      const gb = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
      const la = new THREE.Line(ga, hangerMat);
      const lb = new THREE.Line(gb, hangerMat);
      hangerLinesA.push(la);
      hangerLinesB.push(lb);
      bridgeGroup.add(la, lb);
    }

    // Cross deck supports visual
    const deckRails = [];
    for (let i = 0; i < N; i++) {
      const rail = new THREE.Line(
        new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]),
        new THREE.LineBasicMaterial({ color: 0x555555 })
      );
      deckRails.push(rail);
      bridgeGroup.add(rail);
    }

    // ----------------------------
    // Vehicle
    // ----------------------------
    const vehicleGroup = new THREE.Group();
    scene.add(vehicleGroup);

    let vehicleModel = null;
    const fallbackTruck = new THREE.Mesh(
      new THREE.BoxGeometry(3, 1.2, 1.6),
      new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.5, metalness: 0.2 })
    );
    fallbackTruck.castShadow = true;
    fallbackTruck.receiveShadow = true;
    vehicleGroup.add(fallbackTruck);

    const loader = new GLTFLoader();
    loader.load(
      'CesiumMilkTruck.glb',
      (gltf) => {
        if (vehicleModel) vehicleGroup.remove(vehicleModel);
        vehicleModel = gltf.scene;

        const box = new THREE.Box3().setFromObject(vehicleModel);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxLen = Math.max(size.x, size.y, size.z) || 1;
        const s = 3 / maxLen;
        vehicleModel.scale.setScalar(s);

        const box2 = new THREE.Box3().setFromObject(vehicleModel);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        vehicleModel.position.sub(center);

        vehicleModel.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        fallbackTruck.visible = false;
        vehicleGroup.add(vehicleModel);
      },
      undefined,
      () => {
        // Keep fallback if load fails.
      }
    );

    let vehicleX = leftX;
    let prevVehicleY = 0;

    // ----------------------------
    // Helpers
    // ----------------------------
    function applySpring(nodeA, nodeB, k, restLength, tensionOnly = false) {
      const delta = new THREE.Vector3().subVectors(nodeB.pos, nodeA.pos);
      const len = delta.length();
      if (len < 1e-6) return 0;

      const extension = len - restLength;
      if (tensionOnly && extension <= 0) return 0;

      const forceMag = k * extension;
      delta.multiplyScalar(1 / len);
      const f = delta.multiplyScalar(forceMag);

      if (!nodeA.pinned) nodeA.force.add(f);
      if (!nodeB.pinned) nodeB.force.sub(f);

      return Math.max(0, forceMag);
    }

    function interpolateDeckY(x) {
      const t = THREE.MathUtils.clamp((x - leftX) / (rightX - leftX), 0, 0.999999);
      const idx = Math.floor(t * (N - 1));
      const frac = t * (N - 1) - idx;
      const n0 = deckNodes[idx];
      const n1 = deckNodes[Math.min(idx + 1, N - 1)];
      return THREE.MathUtils.lerp(n0.pos.y, n1.pos.y, frac);
    }

    function interpolateDeckZ(x) {
      const t = THREE.MathUtils.clamp((x - leftX) / (rightX - leftX), 0, 0.999999);
      const idx = Math.floor(t * (N - 1));
      const frac = t * (N - 1) - idx;
      const n0 = deckNodes[idx];
      const n1 = deckNodes[Math.min(idx + 1, N - 1)];
      return THREE.MathUtils.lerp(n0.pos.z, n1.pos.z, frac);
    }

    function getDeckTangentAngle(x) {
      const eps = 0.25;
      const y1 = interpolateDeckY(Math.max(leftX, x - eps));
      const y2 = interpolateDeckY(Math.min(rightX, x + eps));
      return Math.atan2(y2 - y1, 2 * eps);
    }

    function resetBridge() {
      initNodes();
      initRestLengths();
      vehicleX = leftX;
      simTime = 0;
      prevVehicleY = interpolateDeckY(vehicleX);
    }

    // ----------------------------
    // Physics Step
    // ----------------------------
    function clearForces(nodeArr) {
      for (const n of nodeArr) {
        n.force.set(0, 0, 0);
      }
    }

    function applyNodeBasics(nodes, windStrength, timeBase) {
      for (let i = 0; i < nodes.length; i++) {
        const n = nodes[i];
        if (n.pinned) continue;
        n.force.y -= n.mass * g;
        n.force.z += windStrength * Math.sin(timeBase * 0.3 + i * 0.2);
      }
    }

    function applyVehicleLoad() {
      const vehicleMass = Number(sliderMass.value);
      const totalLoad = vehicleMass * g;

      const local = (vehicleX - leftX) / deckSpacing;
      const idx = Math.floor(local);
      const weights = [];

      for (let j = idx - 1; j <= idx + 1; j++) {
        if (j >= 0 && j < N) {
          const dx = Math.abs(deckNodes[j].pos.x - vehicleX);
          const w = 1 / Math.max(dx, 0.2);
          weights.push({ j, w });
        }
      }

      const wSum = weights.reduce((s, a) => s + a.w, 0);
      for (const item of weights) {
        const n = deckNodes[item.j];
        if (!n.pinned) {
          n.force.y -= totalLoad * (item.w / wSum);
        }
      }
    }

    function stepPhysics() {
      const windStrength = Number(sliderWind.value);
      let cableTensionSum = 0;
      let cableTensionCount = 0;

      for (let s = 0; s < substeps; s++) {
        clearForces(deckNodes);
        clearForces(cableNodesA);
        clearForces(cableNodesB);

        applyNodeBasics(deckNodes, windStrength, simTime);
        applyNodeBasics(cableNodesA, windStrength, simTime);
        applyNodeBasics(cableNodesB, windStrength, simTime);

        // Deck springs
        for (let i = 0; i < N - 1; i++) {
          applySpring(deckNodes[i], deckNodes[i + 1], kDeck, deckRestLength, false);
        }

        // Cable springs
        for (let i = 0; i < N - 1; i++) {
          cableTensionSum += applySpring(cableNodesA[i], cableNodesA[i + 1], kCable, cableRestLengthsA[i], false);
          cableTensionCount++;
          cableTensionSum += applySpring(cableNodesB[i], cableNodesB[i + 1], kCable, cableRestLengthsB[i], false);
          cableTensionCount++;
        }

        // Hangers, tension only
        for (let i = 0; i < N; i++) {
          applySpring(cableNodesA[i], deckNodes[i], kHanger, hangerRestLengthsA[i], true);
          applySpring(cableNodesB[i], deckNodes[i], kHanger, hangerRestLengthsB[i], true);
        }

        applyVehicleLoad();

        // Integrate
        const nodeSets = [deckNodes, cableNodesA, cableNodesB];
        for (const nodes of nodeSets) {
          for (const n of nodes) {
            if (n.pinned) {
              n.vel.set(0, 0, 0);
              n.pos.copy(n.rest);
              continue;
            }
            const acc = n.force.clone().multiplyScalar(1 / n.mass);
            n.vel.addScaledVector(acc, dt);
            n.vel.multiplyScalar(dampingFactor);
            n.pos.addScaledVector(n.vel, dt);
          }
        }

        simTime += dt;
      }

      return cableTensionCount > 0 ? cableTensionSum / cableTensionCount : 0;
    }

    // ----------------------------
    // Visual Update
    // ----------------------------
    let maxStress = 0;
    let maxDeflection = 0;
    let avgCableTension = 0;

    function updateDeckVisuals() {
      maxStress = 0;
      maxDeflection = 0;

      for (let i = 0; i < N - 1; i++) {
        const a = deckNodes[i].pos;
        const b = deckNodes[i + 1].pos;
        const seg = deckSegments[i];

        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        seg.position.copy(mid);

        const dirVec = new THREE.Vector3().subVectors(b, a);
        const len = dirVec.length();
        const strain = Math.abs(len - deckRestLength) / deckRestLength;
        maxStress = Math.max(maxStress, strain);

        const color = stressColor(strain);
        seg.material.color.copy(color);

        seg.scale.set(len / deckSpacing, 1, 1);

        const xAxis = new THREE.Vector3(1, 0, 0);
        const quat = new THREE.Quaternion().setFromUnitVectors(xAxis, dirVec.clone().normalize());
        seg.quaternion.copy(quat);
      }

      for (let i = 0; i < N; i++) {
        const deflection = Math.max(0, deckNodes[i].rest.y - deckNodes[i].pos.y);
        maxDeflection = Math.max(maxDeflection, deflection);
      }
    }

    function updateCableVisuals() {
      cableGeomA.setFromPoints(cableNodesA.map(n => n.pos));
      cableGeomB.setFromPoints(cableNodesB.map(n => n.pos));

      for (let i = 0; i < N; i++) {
        hangerLinesA[i].geometry.setFromPoints([cableNodesA[i].pos, deckNodes[i].pos]);
        hangerLinesB[i].geometry.setFromPoints([cableNodesB[i].pos, deckNodes[i].pos]);

        deckRails[i].geometry.setFromPoints([
          new THREE.Vector3(deckNodes[i].pos.x, deckNodes[i].pos.y, -1.5),
          new THREE.Vector3(deckNodes[i].pos.x, deckNodes[i].pos.y, 1.5)
        ]);
      }
    }

    function updateVehicle(dtFrame) {
      const speed = Number(sliderSpeed.value);
      vehicleX += speed * dtFrame;
      if (vehicleX > rightX) {
        vehicleX = leftX;
      }

      const y = interpolateDeckY(vehicleX);
      const z = interpolateDeckZ(vehicleX);
      const angle = getDeckTangentAngle(vehicleX);

      vehicleGroup.visible = vehicleVisible;
      vehicleGroup.position.set(vehicleX, y + 0.9, z);
      vehicleGroup.rotation.set(0, -Math.PI / 2, angle);
      prevVehicleY = y;
    }

    function updateHUD() {
      document.getElementById('hud-vehicle-x').textContent = vehicleX.toFixed(1);
      document.getElementById('hud-max-stress').textContent = maxStress.toFixed(3);
      document.getElementById('hud-max-deflection').textContent = maxDeflection.toFixed(2);
      document.getElementById('hud-cable-tension').textContent = avgCableTension.toFixed(1);
      document.getElementById('hud-wind').textContent = Number(sliderWind.value).toFixed(1);
      document.getElementById('hud-sim-time').textContent = simTime.toFixed(1);
    }

    function update3DState() {
      window.__3D_STATE__ = {
        frameCount,
        vehicleX,
        vehicleSpeed: Number(sliderSpeed.value),
        vehicleMass: Number(sliderMass.value),
        maxStress,
        maxDeflection,
        avgCableTension,
        windStrength: Number(sliderWind.value),
        deckNodeCount: N,
        midDeckY: deckNodes[Math.floor(N / 2)].pos.y,
        isPaused,
        simTime
      };
    }

    // ----------------------------
    // Initial Relaxation
    // ----------------------------
    function relaxBridge(iterations = 300) {
      const oldSpeed = sliderSpeed.value;
      sliderSpeed.value = 0;
      for (let i = 0; i < iterations; i++) {
        stepPhysics();
      }
      sliderSpeed.value = oldSpeed;
      syncSliderLabels();
    }
    relaxBridge(350);

    // ----------------------------
    // Input
    // ----------------------------
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        isPaused = !isPaused;
        e.preventDefault();
      } else if (e.key === 'r' || e.key === 'R') {
        resetBridge();
        relaxBridge(350);
      } else if (e.key === 'v' || e.key === 'V') {
        vehicleVisible = !vehicleVisible;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ----------------------------
    // Animation Loop
    // ----------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dtFrame = Math.min(clock.getDelta(), 0.033);

      if (!isPaused) {
        updateVehicle(dtFrame);
        avgCableTension = stepPhysics();
      }

      updateDeckVisuals();
      updateCableVisuals();
      updateHUD();
      update3DState();

      controls.update();
      renderer.render(scene, camera);
    }

    // Initial visual sync
    updateDeckVisuals();
    updateCableVisuals();
    updateHUD();
    update3DState();
    animate();
  </script>
</body>
</html>
