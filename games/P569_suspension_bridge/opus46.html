<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suspension Bridge Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#controls {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); color: #fff; padding: 15px 25px; border-radius: 10px;
    display: flex; gap: 25px; align-items: center; font-size: 13px;
}
#controls label { display: flex; flex-direction: column; align-items: center; gap: 4px; }
#controls input[type="range"] { width: 120px; }
#hud {
    position: absolute; top: 15px; left: 15px;
    background: rgba(0,0,0,0.65); color: #e0e0e0; padding: 15px 20px;
    border-radius: 8px; font-size: 13px; line-height: 1.8; min-width: 260px;
}
#hud span { color: #7fdbff; font-weight: bold; }
#instructions {
    position: absolute; top: 15px; right: 15px;
    background: rgba(0,0,0,0.55); color: #ccc; padding: 10px 15px;
    border-radius: 8px; font-size: 12px; line-height: 1.7;
}
</style>
</head>
<body>

<div id="hud">
    <div>Vehicle X: <span id="hud-vehicle-x">0.0</span></div>
    <div>Max Stress: <span id="hud-max-stress">0.000</span></div>
    <div>Max Deflection: <span id="hud-max-deflection">0.00</span></div>
    <div>Avg Cable Tension: <span id="hud-cable-tension">0.0</span> N</div>
    <div>Wind Strength: <span id="hud-wind">0.0</span></div>
    <div>Sim Time: <span id="hud-sim-time">0.0</span> s</div>
</div>

<div id="controls">
    <label>Speed: <span id="val-speed">2.0</span>
        <input type="range" id="slider-speed" min="0" max="5" step="0.1" value="2">
    </label>
    <label>Vehicle Mass: <span id="val-mass">5.0</span>
        <input type="range" id="slider-mass" min="1" max="20" step="0.5" value="5">
    </label>
    <label>Wind: <span id="val-wind">0.0</span>
        <input type="range" id="slider-wind" min="0" max="3" step="0.1" value="0">
    </label>
</div>

<div id="instructions">
    <b>Controls:</b><br>
    Space — Pause/Resume<br>
    R — Reset Bridge<br>
    V — Toggle Vehicle
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── Scene Setup ───
const scene = new THREE.Scene();
const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 2; canvas.height = 512;
const grad = ctx.createLinearGradient(0, 0, 0, 512);
grad.addColorStop(0, '#B0C4DE');
grad.addColorStop(1, '#F0F0F0');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 2, 512);
const bgTex = new THREE.CanvasTexture(canvas);
scene.background = bgTex;

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 15, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 2, 0);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(15, 30, 20);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -30; dirLight.shadow.camera.right = 30;
dirLight.shadow.camera.top = 30; dirLight.shadow.camera.bottom = -10;
dirLight.shadow.camera.near = 1; dirLight.shadow.camera.far = 80;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x8B7355, 0.6);
scene.add(hemiLight);
scene.add(new THREE.AmbientLight(0x404040, 0.3));

// Water plane
const waterGeo = new THREE.PlaneGeometry(200, 200);
const waterMat = new THREE.MeshStandardMaterial({
    color: 0x1a6e8a, transparent: true, opacity: 0.6, side: THREE.DoubleSide
});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x = -Math.PI / 2;
water.position.y = -5;
water.receiveShadow = true;
scene.add(water);

// Ground/terrain hint
const groundGeo = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a5a3a });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -5.1;
ground.receiveShadow = true;
scene.add(ground);

// ─── Tower Structures ───
function createTower(x) {
    const group = new THREE.Group();
    const towerMat = new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7 });
    const towerHeight = 20;
    const towerBase = -3;

    // Left pillar
    const pillarGeo = new THREE.BoxGeometry(1, towerHeight, 1);
    const pillarL = new THREE.Mesh(pillarGeo, towerMat);
    pillarL.position.set(x, towerBase + towerHeight / 2, -1.5);
    pillarL.castShadow = true; pillarL.receiveShadow = true;
    group.add(pillarL);

    // Right pillar
    const pillarR = new THREE.Mesh(pillarGeo, towerMat);
    pillarR.position.set(x, towerBase + towerHeight / 2, 1.5);
    pillarR.castShadow = true; pillarR.receiveShadow = true;
    group.add(pillarR);

    // Crossbar at top
    const crossGeo = new THREE.BoxGeometry(1.2, 1.2, 4.2);
    const cross = new THREE.Mesh(crossGeo, towerMat);
    cross.position.set(x, towerBase + towerHeight - 0.5, 0);
    cross.castShadow = true;
    group.add(cross);

    // Base
    const baseGeo = new THREE.BoxGeometry(3, 2, 5);
    const base = new THREE.Mesh(baseGeo, towerMat);
    base.position.set(x, towerBase, 0);
    base.castShadow = true; base.receiveShadow = true;
    group.add(base);

    scene.add(group);
    return { topY: towerBase + towerHeight - 0.5 };
}

const towerL = createTower(-20);
const towerR = createTower(20);
const towerTopY = towerL.topY; // ~16.5

// ─── Physics Constants ───
const N = 40;
const g = 9.81;
const mass = 0.5;
const k_deck = 500;
const k_cable = 1000;
const k_hanger = 200;
const deckRestLen = 40 / (N - 1); // ~1.026
const damping = 0.995;
const dt = 0.005;
const substeps = 8;

const bridgeStartX = -20;
const bridgeEndX = 20;
const deckRestY = 2.0; // rest height of deck

// Catenary shape for initial cable positions
function catenaryY(i) {
    const t = i / (N - 1);
    const sag = 8;
    return towerTopY - sag * 4 * t * (1 - t);
}

// ─── Physics Nodes ───
class PhysNode {
    constructor(x, y, z, pinned = false) {
        this.pos = new THREE.Vector3(x, y, z);
        this.vel = new THREE.Vector3(0, 0, 0);
        this.force = new THREE.Vector3(0, 0, 0);
        this.pinned = pinned;
        this.restPos = new THREE.Vector3(x, y, z);
    }
    reset() {
        this.pos.copy(this.restPos);
        this.vel.set(0, 0, 0);
        this.force.set(0, 0, 0);
    }
}

let deckNodes = [];
let cableNodesL = [];
let cableNodesR = [];

function initPhysics() {
    deckNodes = [];
    cableNodesL = [];
    cableNodesR = [];

    for (let i = 0; i < N; i++) {
        const t = i / (N - 1);
        const x = bridgeStartX + t * (bridgeEndX - bridgeStartX);
        const pinned = (i === 0 || i === N - 1);

        // Deck nodes - slight initial sag
        const deckSag = 2.0 * 4 * t * (1 - t);
        deckNodes.push(new PhysNode(x, deckRestY - deckSag, 0, pinned));

        // Cable nodes
        const cy = catenaryY(i);
        const cPinned = (i === 0 || i === N - 1);
        cableNodesL.push(new PhysNode(x, cy, -1.5, cPinned));
        cableNodesR.push(new PhysNode(x, cy, 1.5, cPinned));
    }
}

initPhysics();

// Compute hanger rest lengths from initial config
let hangerRestLenL = [];
let hangerRestLenR = [];
function computeHangerRestLengths() {
    hangerRestLenL = [];
    hangerRestLenR = [];
    for (let i = 0; i < N; i++) {
        hangerRestLenL.push(cableNodesL[i].pos.distanceTo(deckNodes[i].pos));
        hangerRestLenR.push(cableNodesR[i].pos.distanceTo(deckNodes[i].pos));
    }
}
computeHangerRestLengths();

// Cable rest lengths
const cableRestLen = deckRestLen; // approximately same spacing

// ─── Spring Force Helper ───
const _tmpVec = new THREE.Vector3();
function applySpring(nodeA, nodeB, k, restLen, tensionOnly = false) {
    _tmpVec.subVectors(nodeB.pos, nodeA.pos);
    const dist = _tmpVec.length();
    if (dist < 0.0001) return 0;

    const stretch = dist - restLen;
    if (tensionOnly && stretch < 0) return 0;

    const forceMag = k * stretch;
    _tmpVec.normalize().multiplyScalar(forceMag);

    if (!nodeA.pinned) nodeA.force.add(_tmpVec);
    if (!nodeB.pinned) {
        nodeB.force.sub(_tmpVec);
    }
    return Math.abs(forceMag);
}

// ─── State ───
let vehicleX = -20;
let vehicleSpeed = 2.0;
let vehicleMass = 5.0;
let windStrength = 0.0;
let isPaused = false;
let simTime = 0;
let frameCount = 0;
let vehicleVisible = true;
let maxStress = 0;
let maxDeflection = 0;
let avgCableTension = 0;

window.__3D_STATE__ = {
    frameCount: 0, vehicleX: 0, vehicleSpeed: 2, vehicleMass: 5,
    maxStress: 0, maxDeflection: 0, avgCableTension: 0, windStrength: 0,
    deckNodeCount: N, midDeckY: deckRestY, isPaused: false, simTime: 0
};

// ─── Deck Visualization ───
const deckSegments = [];
const deckMaterials = [];
for (let i = 0; i < N - 1; i++) {
    const mat = new THREE.MeshStandardMaterial({ color: 0x00ff00, roughness: 0.6 });
    const geo = new THREE.BoxGeometry(1, 0.15, 3);
    const mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    deckSegments.push(mesh);
    deckMaterials.push(mat);
}

// Railings
const railGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 4);
const railMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
const railPosts = [];
for (let i = 0; i < N; i += 2) {
    for (const zOff of [-1.4, 1.4]) {
        const post = new THREE.Mesh(railGeo, railMat);
        post.castShadow = true;
        scene.add(post);
        railPosts.push({ mesh: post, nodeIdx: i, zOff });
    }
}

// ─── Cable Visualization ───
function createCableLine(color, linewidth) {
    const positions = new Float32Array(N * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const mat = new THREE.LineBasicMaterial({ color, linewidth: linewidth || 2 });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    return { line, geo, positions };
}

const cableLineL = createCableLine(0x333333, 3);
const cableLineR = createCableLine(0x333333, 3);

// Hangers
const hangerLines = [];
for (let i = 0; i < N; i++) {
    for (const side of ['L', 'R']) {
        const positions = new Float32Array(6);
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.LineBasicMaterial({ color: 0x999999 });
        const line = new THREE.Line(geo, mat);
        scene.add(line);
        hangerLines.push({ line, geo, positions, nodeIdx: i, side });
    }
}

// ─── Vehicle ───
let vehicleMesh = null;
const loader = new GLTFLoader();
// Create a simple truck as fallback
function createFallbackVehicle() {
    const group = new THREE.Group();
    // Body
    const bodyGeo = new THREE.BoxGeometry(2.5, 1, 1.5);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.7;
    body.castShadow = true;
    group.add(body);
    // Cab
    const cabGeo = new THREE.BoxGeometry(1, 0.8, 1.3);
    const cabMat = new THREE.MeshStandardMaterial({ color: 0xdd5555 });
    const cab = new THREE.Mesh(cabGeo, cabMat);
    cab.position.set(-0.9, 1.3, 0);
    cab.castShadow = true;
    group.add(cab);
    // Wheels
    const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 12);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    for (const [wx, wz] of [[-0.8, -0.85], [-0.8, 0.85], [0.8, -0.85], [0.8, 0.85]]) {
        const wheel = new THREE.Mesh(wheelGeo, wheelMat);
        wheel.rotation.x = Math.PI / 2;
        wheel.position.set(wx, 0.3, wz);
        wheel.castShadow = true;
        group.add(wheel);
    }
    return group;
}

// Try loading GLTF, fallback to simple truck
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/CesiumMilkTruck/glTF-Binary/CesiumMilkTruck.glb',
    (gltf) => {
        vehicleMesh = gltf.scene;
        vehicleMesh.scale.set(0.8, 0.8, 0.8);
        vehicleMesh.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        vehicleMesh.rotation.y = Math.PI / 2;
        scene.add(vehicleMesh);
    },
    undefined,
    () => {
        vehicleMesh = createFallbackVehicle();
        scene.add(vehicleMesh);
    }
);

// Also create fallback immediately in case loading takes time
setTimeout(() => {
    if (!vehicleMesh) {
        vehicleMesh = createFallbackVehicle();
        scene.add(vehicleMesh);
    }
}, 2000);

// ─── Stress Color ───
function stressColor(strain) {
    if (strain < 0.02) return new THREE.Color(0x00cc00);
    if (strain < 0.05) {
        const t = (strain - 0.02) / 0.03;
        return new THREE.Color().setRGB(t, 0.8, 0);
    }
    if (strain < 0.1) {
        const t = (strain - 0.05) / 0.05;
        return new THREE.Color().setRGB(1, 0.8 * (1 - t * 0.5), 0);
    }
    return new THREE.Color(0xff0000);
}

// ─── Physics Step ───
function physicsStep() {
    const allNodes = [...deckNodes, ...cableNodesL, ...cableNodesR];

    // Reset forces
    for (const n of allNodes) {
        n.force.set(0, -mass * g, 0);
    }

    // Deck springs
    let totalDeckTension = 0;
    for (let i = 0; i < N - 1; i++) {
        totalDeckTension += applySpring(deckNodes[i], deckNodes[i + 1], k_deck, deckRestLen);
    }

    // Cable springs
    let totalCableTension = 0;
    let cableSpringCount = 0;
    for (let i = 0; i < N - 1; i++) {
        totalCableTension += applySpring(cableNodesL[i], cableNodesL[i + 1], k_cable, cableRestLen);
        totalCableTension += applySpring(cableNodesR[i], cableNodesR[i + 1], k_cable, cableRestLen);
        cableSpringCount += 2;
    }

    // Hanger springs (tension only)
    for (let i = 0; i < N; i++) {
        // Left hanger: cable node to deck node (offset z)
        const cL = cableNodesL[i];
        const cR = cableNodesR[i];
        const d = deckNodes[i];

        // Create virtual connection points on deck at z offsets
        // Apply hanger force
        {
            _tmpVec.subVectors(d.pos, cL.pos);
            // Adjust for z offset: deck is at z=0, cable at z=-1.5
            const virtualDeckPos = _tmpVec.set(d.pos.x, d.pos.y, -1.5);
            const diff = new THREE.Vector3().subVectors(virtualDeckPos, cL.pos);
            const dist = diff.length();
            if (dist > hangerRestLenL[i] && dist > 0.001) {
                const stretch = dist - hangerRestLenL[i];
                const forceMag = k_hanger * stretch;
                diff.normalize().multiplyScalar(forceMag);
                if (!cL.pinned) cL.force.add(diff);
                diff.negate();
                if (!d.pinned) d.force.add(diff);
                totalCableTension += forceMag;
                cableSpringCount++;
            }
        }
        {
            const virtualDeckPos = _tmpVec.set(d.pos.x, d.pos.y, 1.5);
            const diff = new THREE.Vector3().subVectors(virtualDeckPos, cR.pos);
            const dist = diff.length();
            if (dist > hangerRestLenR[i] && dist > 0.001) {
                const stretch = dist - hangerRestLenR[i];
                const forceMag = k_hanger * stretch;
                diff.normalize().multiplyScalar(forceMag);
                if (!cR.pinned) cR.force.add(diff);
                diff.negate();
                if (!d.pinned) d.force.add(diff);
                totalCableTension += forceMag;
                cableSpringCount++;
            }
        }
    }

    avgCableTension = cableSpringCount > 0 ? totalCableTension / cableSpringCount : 0;

    // Vehicle load
    if (vehicleVisible) {
        const vx = vehicleX;
        const loadForce = vehicleMass * g;
        // Find nearest nodes and distribute load
        for (let i = 0; i < N; i++) {
            const dx = Math.abs(deckNodes[i].pos.x - vx);
            if (dx < 2.0) {
                const weight = Math.max(0, 1.0 - dx / 2.0);
                if (!deckNodes[i].pinned) {
                    deckNodes[i].force.y -= loadForce * weight;
                }
            }
        }
    }

    // Wind
    if (windStrength > 0) {
        for (let i = 0; i < N; i++) {
            const windZ = windStrength * Math.sin(simTime * 0.3 + i * 0.2);
            if (!deckNodes[i].pinned) deckNodes[i].force.z += windZ;
            if (!cableNodesL[i].pinned) cableNodesL[i].force.z += windZ * 0.5;
            if (!cableNodesR[i].pinned) cableNodesR[i].force.z += windZ * 0.5;
        }
    }

    // Integration (semi-implicit Euler)
    for (const n of allNodes) {
        if (n.pinned) continue;
        const ax = n.force.x / mass;
        const ay = n.force.y / mass;
        const az = n.force.z / mass;
        n.vel.x = (n.vel.x + ax * dt) * damping;
        n.vel.y = (n.vel.y + ay * dt) * damping;
        n.vel.z = (n.vel.z + az * dt) * damping;
        n.pos.x += n.vel.x * dt;
        n.pos.y += n.vel.y * dt;
        n.pos.z += n.vel.z * dt;

        // Floor constraint
        if (n.pos.y < -4.5) {
            n.pos.y = -4.5;
            n.vel.y = 0;
        }
    }

    simTime += dt;
}

// ─── Get deck Y at x position ───
function getDeckYAtX(x) {
    for (let i = 0; i < N - 1; i++) {
        const x0 = deckNodes[i].pos.x;
        const x1 = deckNodes[i + 1].pos.x;
        if (x >= x0 && x <= x1) {
            const t = (x - x0) / (x1 - x0);
            return deckNodes[i].pos.y * (1 - t) + deckNodes[i + 1].pos.y * t;
        }
    }
    return deckRestY;
}

function getDeckZAtX(x) {
    for (let i = 0; i < N - 1; i++) {
        const x0 = deckNodes[i].pos.x;
        const x1 = deckNodes[i + 1].pos.x;
        if (x >= x0 && x <= x1) {
            const t = (x - x0) / (x1 - x0);
            return deckNodes[i].pos.z * (1 - t) + deckNodes[i + 1].pos.z * t;
        }
    }
    return 0;
}

// ─── UI ───
const sliderSpeed = document.getElementById('slider-speed');
const sliderMass = document.getElementById('slider-mass');
const sliderWind = document.getElementById('slider-wind');

sliderSpeed.addEventListener('input', () => {
    vehicleSpeed = parseFloat(sliderSpeed.value);
    document.getElementById('val-speed').textContent = vehicleSpeed.toFixed(1);
});
sliderMass.addEventListener('input', () => {
    vehicleMass = parseFloat(sliderMass.value);
    document.getElementById('val-mass').textContent = vehicleMass.toFixed(1);
});
sliderWind.addEventListener('input', () => {
    windStrength = parseFloat(sliderWind.value);
    document.getElementById('val-wind').textContent = windStrength.toFixed(1);
});

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    } else if (e.code === 'KeyR') {
        initPhysics();
        computeHangerRestLengths();
        vehicleX = -20;
        simTime = 0;
    } else if (e.code === 'KeyV') {
        vehicleVisible = !vehicleVisible;
        if (vehicleMesh) vehicleMesh.visible = vehicleVisible;
    }
});

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);

    if (!isPaused) {
        // Vehicle movement
        vehicleX += vehicleSpeed * delta;
        if (vehicleX > bridgeEndX + 2) vehicleX = bridgeStartX - 2;

        // Physics substeps
        for (let s = 0; s < substeps; s++) {
            physicsStep();
        }
    }

    // Update deck visuals
    maxStress = 0;
    maxDeflection = 0;
    for (let i = 0; i < N - 1; i++) {
        const a = deckNodes[i].pos;
        const b = deckNodes[i + 1].pos;
        const mid = new THREE.Vector3().addVectors(a, b).multiplyScalar(0.5);
        deckSegments[i].position.copy(mid);

        // Orient segment
        const dir = new THREE.Vector3().subVectors(b, a);
        const len = dir.length();
        deckSegments[i].scale.x = len / 1.0;

        // Rotation
        const angle = Math.atan2(dir.y, dir.x);
        deckSegments[i].rotation.z = angle;
        deckSegments[i].rotation.y = Math.atan2(dir.z, Math.sqrt(dir.x * dir.x + dir.y * dir.y));

        // Stress coloring
        const strain = Math.abs(len - deckRestLen) / deckRestLen;
        if (strain > maxStress) maxStress = strain;
        deckMaterials[i].color.copy(stressColor(strain));
    }

    // Max deflection
    for (let i = 0; i < N; i++) {
        const defl = deckNodes[i].restPos.y - deckNodes[i].pos.y;
        if (defl > maxDeflection) maxDeflection = defl;
    }

    // Update cable lines
    for (let i = 0; i < N; i++) {
        cableLineL.positions[i * 3] = cableNodesL[i].pos.x;
        cableLineL.positions[i * 3 + 1] = cableNodesL[i].pos.y;
        cableLineL.positions[i * 3 + 2] = cableNodesL[i].pos.z;

        cableLineR.positions[i * 3] = cableNodesR[i].pos.x;
        cableLineR.positions[i * 3 + 1] = cableNodesR[i].pos.y;
        cableLineR.positions[i * 3 + 2] = cableNodesR[i].pos.z;
    }
    cableLineL.geo.attributes.position.needsUpdate = true;
    cableLineR.geo.attributes.position.needsUpdate = true;

    // Update hangers
    for (const h of hangerLines) {
        const i = h.nodeIdx;
        const cable = h.side === 'L' ? cableNodesL[i] : cableNodesR[i];
        const deck = deckNodes[i];
        h.positions[0] = cable.pos.x;
        h.positions[1] = cable.pos.y;
        h.positions[2] = cable.pos.z;
        h.positions[3] = deck.pos.x;
        h.positions[4] = deck.pos.y;
        h.positions[5] = h.side === 'L' ? -1.5 + (deck.pos.z - 0) * 0.3 : 1.5 + (deck.pos.z - 0) * 0.3;
        // Simpler: just connect to deck z adjusted
        h.positions[3] = deck.pos.x;
        h.positions[4] = deck.pos.y;
        h.positions[5] = h.side === 'L' ? deck.pos.z - 1.2 : deck.pos.z + 1.2;
        h.geo.attributes.position.needsUpdate = true;
    }

    // Update rail posts
    for (const rp of railPosts) {
        const node = deckNodes[rp.nodeIdx];
        rp.mesh.position.set(node.pos.x, node.pos.y + 0.5, node.pos.z + rp.zOff);
    }

    // Update vehicle
    if (vehicleMesh) {
        vehicleMesh.visible = vehicleVisible;
        if (vehicleVisible) {
            const vy = getDeckYAtX(Math.max(bridgeStartX, Math.min(bridgeEndX, vehicleX)));
            const vz = getDeckZAtX(Math.max(bridgeStartX, Math.min(bridgeEndX, vehicleX)));
            vehicleMesh.position.set(vehicleX, vy + 0.15, vz);

            // Tilt vehicle based on deck slope
            const dx = 0.5;
            const y1 = getDeckYAtX(Math.max(bridgeStartX, Math.min(bridgeEndX, vehicleX - dx)));
            const y2 = getDeckYAtX(Math.max(bridgeStartX, Math.min(bridgeEndX, vehicleX + dx)));
            const tiltAngle = Math.atan2(y2 - y1, 2 * dx);
            vehicleMesh.rotation.z = tiltAngle;
        }
    }

    // Water animation
    water.material.opacity = 0.55 + 0.05 * Math.sin(simTime * 0.5);

    // HUD
    document.getElementById('hud-vehicle-x').textContent = vehicleX.toFixed(1);
    document.getElementById('hud-max-stress').textContent = maxStress.toFixed(3);
    document.getElementById('hud-max-deflection').textContent = maxDeflection.toFixed(2);
    document.getElementById('hud-cable-tension').textContent = avgCableTension.toFixed(1);
    document.getElementById('hud-wind').textContent = windStrength.toFixed(1);
    document.getElementById('hud-sim-time').textContent = simTime.toFixed(1);

    // State
    frameCount++;
    const midIdx = Math.floor(N / 2);
    window.__3D_STATE__ = {
        frameCount,
        vehicleX,
        vehicleSpeed,
        vehicleMass,
        maxStress,
        maxDeflection,
        avgCableTension,
        windStrength,
        deckNodeCount: N,
        midDeckY: deckNodes[midIdx].pos.y,
        isPaused,
        simTime
    };

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
