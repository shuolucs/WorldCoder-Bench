<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Periodic Table Timeline</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #14143f 0%, #0a0a2e 55%, #040412 100%);
      color: white;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #uiTop {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(1100px, 96vw);
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    #filterButtons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      pointer-events: auto;
      background: rgba(10, 10, 30, 0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(8px);
    }

    #filterButtons button {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.2s ease;
    }

    #filterButtons button:hover {
      background: rgba(255,255,255,0.16);
    }

    #filterButtons button.active {
      border-color: #00e5ff;
      box-shadow: 0 0 12px rgba(0,229,255,0.55);
      background: rgba(0,229,255,0.15);
    }

    #bottomUI {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: min(800px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }

    #yearLabel {
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 8px rgba(255,255,255,0.35);
      pointer-events: auto;
    }

    #timeSlider {
      width: 100%;
      pointer-events: auto;
      accent-color: #00d4ff;
    }

    #infoPanel {
      position: absolute;
      right: 18px;
      top: 90px;
      min-width: 220px;
      max-width: 300px;
      background: rgba(8, 12, 30, 0.88);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 14px;
      padding: 14px 16px;
      z-index: 20;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    #infoPanel h3 {
      margin: 0 0 8px 0;
      font-size: 22px;
    }

    #infoPanel .line {
      margin: 5px 0;
      font-size: 14px;
      opacity: 0.95;
    }

    #help {
      position: absolute;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      background: rgba(8, 12, 30, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.5;
      color: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="uiTop">
      <div id="filterButtons"></div>
    </div>

    <div id="infoPanel"></div>

    <div id="bottomUI">
      <div id="yearLabel">Year: 1900</div>
      <input id="timeSlider" type="range" min="1669" max="1900" step="1" value="1900" />
    </div>

    <div id="help">
      Click element to inspect<br>
      Esc: deselect<br>
      R: reset camera<br>
      T: toggle 2D / 3D<br>
      +/-: change year by 10
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById("app").appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 15, 10);
    scene.add(dirLight);

    const timeSlider = document.getElementById("timeSlider");
    const yearLabel = document.getElementById("yearLabel");
    const infoPanel = document.getElementById("infoPanel");
    const filterButtonsContainer = document.getElementById("filterButtons");

    const categoryColors = {
      "Alkali": 0xff6b6b,
      "Alkaline": 0xffa07a,
      "Transition": 0x4ecdc4,
      "Metalloid": 0x95e1d3,
      "Nonmetal": 0xa8e6cf,
      "Noble Gas": 0xdda0dd,
      "Other Metal": 0xf7dc6f,
      "Halogen": 0x87ceeb
    };

    const elementData = [
      { atomicNumber: 1, symbol: "H",  name: "Hydrogen",  category: "Nonmetal",   year: 1766,  period: 1, group: 1 },
      { atomicNumber: 2, symbol: "He", name: "Helium",    category: "Noble Gas",  year: 1868,  period: 1, group: 18 },

      { atomicNumber: 3, symbol: "Li", name: "Lithium",   category: "Alkali",     year: 1817,  period: 2, group: 1 },
      { atomicNumber: 4, symbol: "Be", name: "Beryllium", category: "Alkaline",   year: 1798,  period: 2, group: 2 },
      { atomicNumber: 5, symbol: "B",  name: "Boron",     category: "Metalloid",  year: 1808,  period: 2, group: 13 },
      { atomicNumber: 6, symbol: "C",  name: "Carbon",    category: "Nonmetal",   year: -3750, period: 2, group: 14 },
      { atomicNumber: 7, symbol: "N",  name: "Nitrogen",  category: "Nonmetal",   year: 1772,  period: 2, group: 15 },
      { atomicNumber: 8, symbol: "O",  name: "Oxygen",    category: "Nonmetal",   year: 1774,  period: 2, group: 16 },
      { atomicNumber: 9, symbol: "F",  name: "Fluorine",  category: "Halogen",    year: 1886,  period: 2, group: 17 },
      { atomicNumber: 10, symbol: "Ne", name: "Neon",     category: "Noble Gas",  year: 1898,  period: 2, group: 18 },

      { atomicNumber: 11, symbol: "Na", name: "Sodium",   category: "Alkali",     year: 1807,  period: 3, group: 1 },
      { atomicNumber: 12, symbol: "Mg", name: "Magnesium",category: "Alkaline",   year: 1755,  period: 3, group: 2 },
      { atomicNumber: 13, symbol: "Al", name: "Aluminum", category: "Other Metal",year: 1825,  period: 3, group: 13 },
      { atomicNumber: 14, symbol: "Si", name: "Silicon",  category: "Metalloid",  year: 1824,  period: 3, group: 14 },
      { atomicNumber: 15, symbol: "P",  name: "Phosphorus",category:"Nonmetal",   year: 1669,  period: 3, group: 15 },
      { atomicNumber: 16, symbol: "S",  name: "Sulfur",   category: "Nonmetal",   year: -2000, period: 3, group: 16 },
      { atomicNumber: 17, symbol: "Cl", name: "Chlorine", category: "Halogen",    year: 1774,  period: 3, group: 17 },
      { atomicNumber: 18, symbol: "Ar", name: "Argon",    category: "Noble Gas",  year: 1894,  period: 3, group: 18 },

      { atomicNumber: 19, symbol: "K",  name: "Potassium",category: "Alkali",     year: 1807,  period: 4, group: 1 },
      { atomicNumber: 20, symbol: "Ca", name: "Calcium",  category: "Alkaline",   year: 1808,  period: 4, group: 2 },
      { atomicNumber: 21, symbol: "Sc", name: "Scandium", category: "Transition", year: 1879,  period: 4, group: 3 },
      { atomicNumber: 22, symbol: "Ti", name: "Titanium", category: "Transition", year: 1791,  period: 4, group: 4 },
      { atomicNumber: 23, symbol: "V",  name: "Vanadium", category: "Transition", year: 1801,  period: 4, group: 5 },
      { atomicNumber: 24, symbol: "Cr", name: "Chromium", category: "Transition", year: 1797,  period: 4, group: 6 },
      { atomicNumber: 25, symbol: "Mn", name: "Manganese",category: "Transition", year: 1774,  period: 4, group: 7 },
      { atomicNumber: 26, symbol: "Fe", name: "Iron",     category: "Transition", year: -5000, period: 4, group: 8 },
      { atomicNumber: 27, symbol: "Co", name: "Cobalt",   category: "Transition", year: 1735,  period: 4, group: 9 },
      { atomicNumber: 28, symbol: "Ni", name: "Nickel",   category: "Transition", year: 1751,  period: 4, group: 10 },
      { atomicNumber: 29, symbol: "Cu", name: "Copper",   category: "Transition", year: -9000, period: 4, group: 11 },
      { atomicNumber: 30, symbol: "Zn", name: "Zinc",     category: "Transition", year: 1746,  period: 4, group: 12 },
      { atomicNumber: 31, symbol: "Ga", name: "Gallium",  category: "Other Metal",year: 1875,  period: 4, group: 13 },
      { atomicNumber: 32, symbol: "Ge", name: "Germanium",category: "Metalloid",  year: 1886,  period: 4, group: 14 },
      { atomicNumber: 33, symbol: "As", name: "Arsenic",  category: "Metalloid",  year: -300,  period: 4, group: 15 },
      { atomicNumber: 34, symbol: "Se", name: "Selenium", category: "Nonmetal",   year: 1817,  period: 4, group: 16 },
      { atomicNumber: 35, symbol: "Br", name: "Bromine",  category: "Halogen",    year: 1826,  period: 4, group: 17 },
      { atomicNumber: 36, symbol: "Kr", name: "Krypton",  category: "Noble Gas",  year: 1898,  period: 4, group: 18 }
    ];

    const spacing = 1.1;
    const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.4);
    const elementMeshes = [];
    let selectedMesh = null;
    let activeFilter = "All";
    let viewMode = "3D";

    function createFaceTexture(el) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");

      const color = categoryColors[el.category] || 0xffffff;
      const c = new THREE.Color(color);
      const rgb = `rgb(${Math.floor(c.r * 255)}, ${Math.floor(c.g * 255)}, ${Math.floor(c.b * 255)})`;

      ctx.fillStyle = rgb;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(255,255,255,0.35)";
      ctx.lineWidth = 6;
      ctx.strokeRect(3, 3, canvas.width - 6, canvas.height - 6);

      ctx.fillStyle = "rgba(15,15,25,0.95)";
      ctx.font = "bold 28px Arial";
      ctx.textAlign = "left";
      ctx.fillText(el.atomicNumber, 18, 34);

      ctx.fillStyle = "rgba(10,10,20,0.98)";
      ctx.font = "bold 82px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(el.symbol, canvas.width / 2, canvas.height / 2 - 8);

      ctx.font = "24px Arial";
      ctx.textBaseline = "alphabetic";
      ctx.fillText(el.name, canvas.width / 2, canvas.height - 22);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function createElementMesh(el) {
      const frontTexture = createFaceTexture(el);
      const baseColor = categoryColors[el.category] || 0xffffff;

      const frontMaterial = new THREE.MeshStandardMaterial({
        map: frontTexture,
        transparent: true,
        color: 0xffffff,
        roughness: 0.45,
        metalness: 0.15,
        emissive: 0x000000
      });

      const sideMaterial = new THREE.MeshStandardMaterial({
        color: new THREE.Color(baseColor).multiplyScalar(0.72),
        transparent: true,
        roughness: 0.55,
        metalness: 0.1,
        emissive: 0x000000
      });

      const materials = [
        sideMaterial, sideMaterial, sideMaterial, sideMaterial, frontMaterial, sideMaterial
      ];

      const mesh = new THREE.Mesh(geometry, materials);
      mesh.userData.element = el;
      mesh.userData.baseColor = baseColor;
      mesh.userData.currentOpacity = 1;
      mesh.userData.targetOpacity = 1;
      mesh.userData.currentScale = 1;
      mesh.userData.targetScale = 1;
      mesh.userData.currentDimFactor = 1;
      mesh.userData.targetDimFactor = 1;
      mesh.userData.animStart = performance.now();
      mesh.userData.animDuration = 300;

      const x = (el.group - 9.5) * spacing;
      const y = (2.5 - (el.period - 1)) * spacing;
      const z3D = -(el.period - 1) * 0.6;

      mesh.position.set(x, y, z3D);
      mesh.userData.grid2D = new THREE.Vector3(x, y, 0);
      mesh.userData.grid3D = new THREE.Vector3(x, y, z3D);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.0
        })
      );
      mesh.add(edges);
      mesh.userData.outline = edges;

      scene.add(mesh);
      elementMeshes.push(mesh);
    }

    elementData.forEach(createElementMesh);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function setInfoPanel(mesh) {
      if (!mesh) {
        infoPanel.style.display = "none";
        return;
      }
      const el = mesh.userData.element;
      infoPanel.innerHTML = `
        <h3>${el.symbol} — ${el.name}</h3>
        <div class="line"><strong>Atomic Number:</strong> ${el.atomicNumber}</div>
        <div class="line"><strong>Category:</strong> ${el.category}</div>
        <div class="line"><strong>Discovery Year:</strong> ${el.year}</div>
      `;
      infoPanel.style.display = "block";
    }

    function selectMesh(mesh) {
      if (selectedMesh && selectedMesh !== mesh) {
        selectedMesh.userData.outline.material.opacity = 0.0;
        selectedMesh.material.forEach(m => {
          if (m.emissive) m.emissive.setHex(0x000000);
        });
      }

      selectedMesh = mesh;

      if (!mesh) {
        setInfoPanel(null);
        return;
      }

      mesh.userData.outline.material.color.setHex(0xffffaa);
      mesh.userData.outline.material.opacity = 1.0;
      mesh.material.forEach(m => {
        if (m.emissive) m.emissive.setHex(0x333300);
      });

      setInfoPanel(mesh);
    }

    function updateYearVisuals() {
      const year = parseInt(timeSlider.value);
      yearLabel.textContent = `Year: ${year}`;
      const now = performance.now();

      elementMeshes.forEach(mesh => {
        const discovered = mesh.userData.element.year <= year;
        mesh.userData.targetOpacity = discovered ? 1.0 : 0.15;
        mesh.userData.targetScale = discovered ? 1.0 : 0.5;
        mesh.userData.animStart = now;
        mesh.userData.startOpacity = mesh.userData.currentOpacity ?? 1;
        mesh.userData.startScale = mesh.userData.currentScale ?? 1;
      });
    }

    function updateCategoryFilter(category) {
      activeFilter = category;
      const now = performance.now();

      [...filterButtonsContainer.querySelectorAll("button")].forEach(btn => {
        btn.classList.toggle("active", btn.dataset.category === category);
      });

      elementMeshes.forEach(mesh => {
        const match = category === "All" || mesh.userData.element.category === category;
        mesh.userData.targetDimFactor = match ? 1.0 : 0.2;
        mesh.userData.startDimFactor = mesh.userData.currentDimFactor ?? 1;
        mesh.userData.animStartDim = now;
      });
    }

    const filterNames = ["All", "Alkali", "Alkaline", "Transition", "Nonmetal", "Noble Gas", "Metalloid", "Halogen", "Other Metal"];
    filterNames.forEach(name => {
      const btn = document.createElement("button");
      btn.textContent = name;
      btn.dataset.category = name;
      if (name === "All") btn.classList.add("active");
      btn.addEventListener("click", () => updateCategoryFilter(name));
      filterButtonsContainer.appendChild(btn);
    });

    timeSlider.addEventListener("input", updateYearVisuals);

    renderer.domElement.addEventListener("pointerdown", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elementMeshes, false);

      if (intersects.length > 0) {
        selectMesh(intersects[0].object);
      } else {
        selectMesh(null);
      }
    });

    function animateCameraReset() {
      const start = camera.position.clone();
      const end = new THREE.Vector3(0, 5, 25);
      const targetStart = controls.target.clone();
      const targetEnd = new THREE.Vector3(0, 0, 0);
      const startTime = performance.now();
      const duration = 700;

      function step() {
        const t = Math.min((performance.now() - startTime) / duration, 1);
        const e = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        camera.position.lerpVectors(start, end, e);
        controls.target.lerpVectors(targetStart, targetEnd, e);
        if (t < 1) requestAnimationFrame(step);
      }
      step();
    }

    function toggleViewMode() {
      viewMode = viewMode === "3D" ? "2D" : "3D";
      const now = performance.now();
      elementMeshes.forEach(mesh => {
        mesh.userData.positionStart = mesh.position.clone();
        mesh.userData.positionTarget = (viewMode === "2D" ? mesh.userData.grid2D : mesh.userData.grid3D).clone();
        mesh.userData.positionAnimStart = now;
      });
    }

    function changeYearBy(delta) {
      const min = parseInt(timeSlider.min);
      const max = parseInt(timeSlider.max);
      let value = parseInt(timeSlider.value) + delta;
      value = Math.max(min, Math.min(max, value));
      timeSlider.value = value;
      updateYearVisuals();
    }

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        selectMesh(null);
      } else if (e.key.toLowerCase() === "r") {
        animateCameraReset();
      } else if (e.key.toLowerCase() === "t") {
        toggleViewMode();
      } else if (e.key === "+" || e.key === "=") {
        changeYearBy(10);
      } else if (e.key === "-") {
        changeYearBy(-10);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function ease(t) {
      return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    }

    updateYearVisuals();
    updateCategoryFilter("All");

    window.__3D_STATE__ = {};

    function updateState() {
      const currentYear = parseInt(timeSlider.value);
      const visibleCount = elementMeshes.filter(m => Math.abs(m.userData.currentOpacity - 1.0) < 0.01).length;

      window.__3D_STATE__ = {
        totalElements: elementMeshes.length,
        currentYear,
        visibleCount,
        selectedElement: selectedMesh ? selectedMesh.userData.element.symbol : null,
        activeFilter,
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        },
        viewMode,
        elementsData: elementMeshes.map(mesh => ({
          symbol: mesh.userData.element.symbol,
          atomicNumber: mesh.userData.element.atomicNumber,
          discoveryYear: mesh.userData.element.year,
          opacity: mesh.userData.currentOpacity,
          category: mesh.userData.element.category
        }))
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const now = performance.now();

      elementMeshes.forEach(mesh => {
        const duration = mesh.userData.animDuration || 300;

        if (mesh.userData.startOpacity !== undefined) {
          const t = Math.min((now - mesh.userData.animStart) / duration, 1);
          const k = ease(t);
          mesh.userData.currentOpacity = lerp(mesh.userData.startOpacity, mesh.userData.targetOpacity, k);
          mesh.userData.currentScale = lerp(mesh.userData.startScale, mesh.userData.targetScale, k);
        }

        if (mesh.userData.startDimFactor !== undefined) {
          const t2 = Math.min((now - (mesh.userData.animStartDim || now)) / duration, 1);
          const k2 = ease(t2);
          mesh.userData.currentDimFactor = lerp(mesh.userData.startDimFactor, mesh.userData.targetDimFactor, k2);
        }

        if (mesh.userData.positionStart && mesh.userData.positionTarget) {
          const t3 = Math.min((now - mesh.userData.positionAnimStart) / 400, 1);
          const k3 = ease(t3);
          mesh.position.lerpVectors(mesh.userData.positionStart, mesh.userData.positionTarget, k3);
        }

        const finalOpacity = mesh.userData.currentOpacity * mesh.userData.currentDimFactor;
        mesh.scale.setScalar(mesh.userData.currentScale);

        mesh.material.forEach((mat, idx) => {
          mat.transparent = true;
          mat.opacity = finalOpacity;
          if (!selectedMesh || mesh !== selectedMesh) {
            if (mat.emissive) mat.emissive.setHex(0x000000);
          }
        });

        mesh.userData.outline.material.opacity = (selectedMesh === mesh) ? 1.0 : 0.0;
      });

      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
