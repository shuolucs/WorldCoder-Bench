<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#filterButtons {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 10;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 95vw;
}

#filterButtons button {
    padding: 6px 12px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    background: rgba(10,10,46,0.8);
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.3s;
    backdrop-filter: blur(5px);
}

#filterButtons button:hover {
    background: rgba(255,255,255,0.15);
}

#filterButtons button.active {
    border-color: #fff;
    background: rgba(255,255,255,0.25);
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

#sliderContainer {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
    width: 80%;
    max-width: 600px;
}

#yearLabel {
    color: #fff;
    font-size: 18px;
    margin-bottom: 8px;
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
}

#timeSlider {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(to right, #4ecdc4, #ff6b6b);
    outline: none;
    cursor: pointer;
}

#timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

#infoPanel {
    display: none;
    position: absolute;
    top: 80px;
    right: 20px;
    background: rgba(10,10,46,0.95);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 15px;
    padding: 20px;
    color: #fff;
    z-index: 10;
    min-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

#infoPanel .symbol {
    font-size: 48px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 5px;
}

#infoPanel .name {
    font-size: 20px;
    text-align: center;
    margin-bottom: 15px;
    opacity: 0.9;
}

#infoPanel .detail {
    font-size: 14px;
    margin: 6px 0;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

#infoPanel .detail span {
    opacity: 0.6;
}

#instructions {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 11px;
    z-index: 10;
    text-align: center;
}
</style>
</head>
<body>

<div id="filterButtons">
    <button class="active" data-filter="All">All</button>
    <button data-filter="Alkali Metal">Alkali</button>
    <button data-filter="Alkaline Earth">Alkaline</button>
    <button data-filter="Transition Metal">Transition</button>
    <button data-filter="Nonmetal">Nonmetal</button>
    <button data-filter="Noble Gas">Noble Gas</button>
    <button data-filter="Metalloid">Metalloid</button>
    <button data-filter="Halogen">Halogen</button>
    <button data-filter="Other Metal">Other Metal</button>
</div>

<div id="infoPanel">
    <div class="symbol" id="infoSymbol"></div>
    <div class="name" id="infoName"></div>
    <div class="detail"><span>Atomic Number: </span><span id="infoNumber"></span></div>
    <div class="detail"><span>Category: </span><span id="infoCategory"></span></div>
    <div class="detail"><span>Discovery Year: </span><span id="infoYear"></span></div>
</div>

<div id="sliderContainer">
    <div id="yearLabel">Year: 1900</div>
    <input type="range" id="timeSlider" min="1669" max="1900" value="1900" step="1">
</div>

<div id="instructions">Keys: R = Reset Camera | T = Toggle 2D/3D | +/- = Change Year | Click element for info | ESC = Deselect</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>

const elementsData = [
    { z: 1, symbol: 'H', name: 'Hydrogen', row: 1, col: 1, category: 'Nonmetal', year: 1766, color: 0xa8e6cf },
    { z: 2, symbol: 'He', name: 'Helium', row: 1, col: 18, category: 'Noble Gas', year: 1868, color: 0xdda0dd },
    { z: 3, symbol: 'Li', name: 'Lithium', row: 2, col: 1, category: 'Alkali Metal', year: 1817, color: 0xff6b6b },
    { z: 4, symbol: 'Be', name: 'Beryllium', row: 2, col: 2, category: 'Alkaline Earth', year: 1798, color: 0xffa07a },
    { z: 5, symbol: 'B', name: 'Boron', row: 2, col: 13, category: 'Metalloid', year: 1808, color: 0x95e1d3 },
    { z: 6, symbol: 'C', name: 'Carbon', row: 2, col: 14, category: 'Nonmetal', year: -3750, color: 0xa8e6cf },
    { z: 7, symbol: 'N', name: 'Nitrogen', row: 2, col: 15, category: 'Nonmetal', year: 1772, color: 0xa8e6cf },
    { z: 8, symbol: 'O', name: 'Oxygen', row: 2, col: 16, category: 'Nonmetal', year: 1774, color: 0xa8e6cf },
    { z: 9, symbol: 'F', name: 'Fluorine', row: 2, col: 17, category: 'Halogen', year: 1886, color: 0x87ceeb },
    { z: 10, symbol: 'Ne', name: 'Neon', row: 2, col: 18, category: 'Noble Gas', year: 1898, color: 0xdda0dd },
    { z: 11, symbol: 'Na', name: 'Sodium', row: 3, col: 1, category: 'Alkali Metal', year: 1807, color: 0xff6b6b },
    { z: 12, symbol: 'Mg', name: 'Magnesium', row: 3, col: 2, category: 'Alkaline Earth', year: 1755, color: 0xffa07a },
    { z: 13, symbol: 'Al', name: 'Aluminium', row: 3, col: 13, category: 'Other Metal', year: 1825, color: 0xf7dc6f },
    { z: 14, symbol: 'Si', name: 'Silicon', row: 3, col: 14, category: 'Metalloid', year: 1824, color: 0x95e1d3 },
    { z: 15, symbol: 'P', name: 'Phosphorus', row: 3, col: 15, category: 'Nonmetal', year: 1669, color: 0xa8e6cf },
    { z: 16, symbol: 'S', name: 'Sulfur', row: 3, col: 16, category: 'Nonmetal', year: -2000, color: 0xa8e6cf },
    { z: 17, symbol: 'Cl', name: 'Chlorine', row: 3, col: 17, category: 'Halogen', year: 1774, color: 0x87ceeb },
    { z: 18, symbol: 'Ar', name: 'Argon', row: 3, col: 18, category: 'Noble Gas', year: 1894, color: 0xdda0dd },
    { z: 19, symbol: 'K', name: 'Potassium', row: 4, col: 1, category: 'Alkali Metal', year: 1807, color: 0xff6b6b },
    { z: 20, symbol: 'Ca', name: 'Calcium', row: 4, col: 2, category: 'Alkaline Earth', year: 1808, color: 0xffa07a },
    { z: 21, symbol: 'Sc', name: 'Scandium', row: 4, col: 3, category: 'Transition Metal', year: 1879, color: 0x4ecdc4 },
    { z: 22, symbol: 'Ti', name: 'Titanium', row: 4, col: 4, category: 'Transition Metal', year: 1791, color: 0x4ecdc4 },
    { z: 23, symbol: 'V', name: 'Vanadium', row: 4, col: 5, category: 'Transition Metal', year: 1801, color: 0x4ecdc4 },
    { z: 24, symbol: 'Cr', name: 'Chromium', row: 4, col: 6, category: 'Transition Metal', year: 1797, color: 0x4ecdc4 },
    { z: 25, symbol: 'Mn', name: 'Manganese', row: 4, col: 7, category: 'Transition Metal', year: 1774, color: 0x4ecdc4 },
    { z: 26, symbol: 'Fe', name: 'Iron', row: 4, col: 8, category: 'Transition Metal', year: -5000, color: 0x4ecdc4 },
    { z: 27, symbol: 'Co', name: 'Cobalt', row: 4, col: 9, category: 'Transition Metal', year: 1735, color: 0x4ecdc4 },
    { z: 28, symbol: 'Ni', name: 'Nickel', row: 4, col: 10, category: 'Transition Metal', year: 1751, color: 0x4ecdc4 },
    { z: 29, symbol: 'Cu', name: 'Copper', row: 4, col: 11, category: 'Transition Metal', year: -9000, color: 0x4ecdc4 },
    { z: 30, symbol: 'Zn', name: 'Zinc', row: 4, col: 12, category: 'Transition Metal', year: 1746, color: 0x4ecdc4 },
    { z: 31, symbol: 'Ga', name: 'Gallium', row: 4, col: 13, category: 'Other Metal', year: 1875, color: 0xf7dc6f },
    { z: 32, symbol: 'Ge', name: 'Germanium', row: 4, col: 14, category: 'Metalloid', year: 1886, color: 0x95e1d3 },
    { z: 33, symbol: 'As', name: 'Arsenic', row: 4, col: 15, category: 'Metalloid', year: -300, color: 0x95e1d3 },
    { z: 34, symbol: 'Se', name: 'Selenium', row: 4, col: 16, category: 'Nonmetal', year: 1817, color: 0xa8e6cf },
    { z: 35, symbol: 'Br', name: 'Bromine', row: 4, col: 17, category: 'Halogen', year: 1826, color: 0x87ceeb },
    { z: 36, symbol: 'Kr', name: 'Krypton', row: 4, col: 18, category: 'Noble Gas', year: 1898, color: 0xdda0dd },
];

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(10, 15, 10);
scene.add(directionalLight);

// State
let selectedElement = null;
let activeFilter = 'All';
let viewMode = '3D';
let currentYear = 1900;
const elementMeshes = [];
const tweens = [];

// Offset to center the table
const colOffset = -9.5 * 1.1;
const rowOffset = 2.5 * 1.1;

function createElementTexture(element, faceIndex) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    const r = (element.color >> 16) & 255;
    const g = (element.color >> 8) & 255;
    const b = element.color & 255;

    if (faceIndex === 'front') {
        // Main face
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(0, 0, 256, 256);

        // Darker border
        ctx.strokeStyle = `rgba(255,255,255,0.3)`;
        ctx.lineWidth = 4;
        ctx.strokeRect(2, 2, 252, 252);

        // Atomic number
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 32px Segoe UI, Arial';
        ctx.textAlign = 'left';
        ctx.fillText(element.z.toString(), 15, 40);

        // Symbol
        ctx.font = 'bold 90px Segoe UI, Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(element.symbol, 128, 128);

        // Name
        ctx.font = '24px Segoe UI, Arial';
        ctx.textBaseline = 'bottom';
        ctx.fillText(element.name, 128, 245);
    } else {
        // Side/back faces - solid color
        ctx.fillStyle = `rgb(${Math.floor(r*0.7)},${Math.floor(g*0.7)},${Math.floor(b*0.7)})`;
        ctx.fillRect(0, 0, 256, 256);
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

function createElementMesh(element) {
    const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.4);

    const frontTexture = createElementTexture(element, 'front');
    const sideTexture = createElementTexture(element, 'side');

    const materials = [
        new THREE.MeshPhongMaterial({ map: sideTexture, transparent: true }),  // right
        new THREE.MeshPhongMaterial({ map: sideTexture, transparent: true }),  // left
        new THREE.MeshPhongMaterial({ map: sideTexture, transparent: true }),  // top
        new THREE.MeshPhongMaterial({ map: sideTexture, transparent: true }),  // bottom
        new THREE.MeshPhongMaterial({ map: frontTexture, transparent: true }), // front
        new THREE.MeshPhongMaterial({ map: sideTexture, transparent: true }),  // back
    ];

    const mesh = new THREE.Mesh(geometry, materials);

    const x = (element.col - 1) * 1.1 + colOffset;
    const y = -(element.row - 1) * 1.1 + rowOffset;
    const zPos = viewMode === '3D' ? (element.row - 1) * 0.3 : 0;

    mesh.position.set(x, y, zPos);
    mesh.userData = {
        element: element,
        targetOpacity: 1.0,
        currentOpacity: 1.0,
        targetScale: 1.0,
        currentScale: 1.0,
        baseX: x,
        baseY: y,
        baseZ3D: (element.row - 1) * 0.3,
        baseZ2D: 0,
    };

    scene.add(mesh);
    elementMeshes.push(mesh);
    return mesh;
}

// Create all elements
elementsData.forEach(el => createElementMesh(el));

// Highlight mesh for selection
let highlightMesh = null;

function createHighlight(mesh) {
    removeHighlight();
    const geo = new THREE.BoxGeometry(1.0, 1.0, 0.5);
    const mat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.8,
    });
    highlightMesh = new THREE.Mesh(geo, mat);
    highlightMesh.position.copy(mesh.position);
    highlightMesh.scale.copy(mesh.scale);
    scene.add(highlightMesh);
}

function removeHighlight() {
    if (highlightMesh) {
        scene.remove(highlightMesh);
        highlightMesh.geometry.dispose();
        highlightMesh.material.dispose();
        highlightMesh = null;
    }
}

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(elementMeshes);

    if (intersects.length > 0) {
        const mesh = intersects[0].object;
        const el = mesh.userData.element;
        selectedElement = el.symbol;

        // Emissive boost
        elementMeshes.forEach(m => {
            m.material.forEach(mat => { mat.emissive = new THREE.Color(0x000000); });
        });
        mesh.material.forEach(mat => { mat.emissive = new THREE.Color(0x333333); });

        createHighlight(mesh);

        // Show info panel
        const panel = document.getElementById('infoPanel');
        const color = '#' + el.color.toString(16).padStart(6, '0');
        document.getElementById('infoSymbol').textContent = el.symbol;
        document.getElementById('infoSymbol').style.color = color;
        document.getElementById('infoName').textContent = el.name;
        document.getElementById('infoNumber').textContent = el.z;
        document.getElementById('infoCategory').textContent = el.category;
        document.getElementById('infoYear').textContent = el.year < 0 ? `${Math.abs(el.year)} BC` : el.year;
        panel.style.display = 'block';
        panel.style.borderColor = color;
    } else {
        deselectElement();
    }
}

function deselectElement() {
    selectedElement = null;
    removeHighlight();
    elementMeshes.forEach(m => {
        m.material.forEach(mat => { mat.emissive = new THREE.Color(0x000000); });
    });
    document.getElementById('infoPanel').style.display = 'none';
}

renderer.domElement.addEventListener('click', onMouseClick);

// Time slider
const timeSlider = document.getElementById('timeSlider');
const yearLabel = document.getElementById('yearLabel');

timeSlider.addEventListener('input', function() {
    currentYear = parseInt(this.value);
    yearLabel.textContent = 'Year: ' + currentYear;
    updateElementVisibility();
});

function updateElementVisibility() {
    elementMeshes.forEach(mesh => {
        const el = mesh.userData.element;
        const discovered = el.year <= currentYear;
        const categoryMatch = activeFilter === 'All' || el.category === activeFilter;

        if (discovered && categoryMatch) {
            mesh.userData.targetOpacity = 1.0;
            mesh.userData.targetScale = 1.0;
        } else if (!discovered) {
            mesh.userData.targetOpacity = 0.15;
            mesh.userData.targetScale = 0.5;
        } else if (!categoryMatch) {
            mesh.userData.targetOpacity = 0.2;
            mesh.userData.targetScale = 0.8;
        }
    });
}

// Filter buttons
document.getElementById('filterButtons').addEventListener('click', function(e) {
    if (e.target.tagName === 'BUTTON') {
        activeFilter = e.target.dataset.filter;
        document.querySelectorAll('#filterButtons button').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        updateElementVisibility();
    }
});

// Keyboard controls
let cameraAnimating = false;
let cameraAnimStart = null;
let cameraAnimFrom = null;
let cameraAnimTo = new THREE.Vector3(0, 5, 25);

document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        deselectElement();
    } else if (e.key === 'r' || e.key === 'R') {
        // Reset camera
        cameraAnimating = true;
        cameraAnimStart = performance.now();
        cameraAnimFrom = camera.position.clone();
    } else if (e.key === 't' || e.key === 'T') {
        viewMode = viewMode === '3D' ? '2D' : '3D';
        elementMeshes.forEach(mesh => {
            const el = mesh.userData.element;
            if (viewMode === '3D') {
                mesh.userData.targetZ = mesh.userData.baseZ3D;
            } else {
                mesh.userData.targetZ = mesh.userData.baseZ2D;
            }
        });
    } else if (e.key === '+' || e.key === '=') {
        currentYear = Math.min(1900, currentYear + 10);
        timeSlider.value = currentYear;
        yearLabel.textContent = 'Year: ' + currentYear;
        updateElementVisibility();
    } else if (e.key === '-' || e.key === '_') {
        currentYear = Math.max(1669, currentYear - 10);
        timeSlider.value = currentYear;
        yearLabel.textContent = 'Year: ' + currentYear;
        updateElementVisibility();
    }
});

// Window resize
window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize target Z positions
elementMeshes.forEach(mesh => {
    mesh.userData.targetZ = mesh.userData.baseZ3D;
});

// State management
window.__3D_STATE__ = {
    totalElements: 36,
    currentYear: 1900,
    visibleCount: 36,
    selectedElement: null,
    activeFilter: 'All',
    cameraPosition: { x: 0, y: 5, z: 25 },
    viewMode: '3D',
    elementsData: []
};

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const dt = 0.1; // Smooth interpolation factor (~0.3s feel)

    // Animate element opacity and scale
    let visibleCount = 0;
    const stateElements = [];

    elementMeshes.forEach(mesh => {
        const ud = mesh.userData;

        // Lerp opacity
        ud.currentOpacity += (ud.targetOpacity - ud.currentOpacity) * dt;
        mesh.material.forEach(mat => { mat.opacity = ud.currentOpacity; });

        // Lerp scale
        ud.currentScale += (ud.targetScale - ud.currentScale) * dt;
        mesh.scale.set(ud.currentScale, ud.currentScale, ud.currentScale);

        // Lerp Z position
        const targetZ = ud.targetZ !== undefined ? ud.targetZ : ud.baseZ3D;
        mesh.position.z += (targetZ - mesh.position.z) * dt;

        // Update highlight position
        if (highlightMesh && selectedElement === ud.element.symbol) {
            highlightMesh.position.copy(mesh.position);
            highlightMesh.scale.copy(mesh.scale);
        }

        if (Math.abs(ud.currentOpacity - 1.0) < 0.05) {
            visibleCount++;
        }

        stateElements.push({
            symbol: ud.element.symbol,
            atomicNumber: ud.element.z,
            discoveryYear: ud.element.year,
            opacity: parseFloat(ud.currentOpacity.toFixed(2)),
            category: ud.element.category
        });
    });

    // Camera animation
    if (cameraAnimating && cameraAnimFrom) {
        const elapsed = (performance.now() - cameraAnimStart) / 1000;
        const duration = 1.0;
        let t = Math.min(elapsed / duration, 1.0);
        // Ease out cubic
        t = 1 - Math.pow(1 - t, 3);

        camera.position.lerpVectors(cameraAnimFrom, cameraAnimTo, t);
        controls.target.set(0, 0, 0);

        if (t >= 1.0) {
            cameraAnimating = false;
        }
    }

    controls.update();

    // Update state
    window.__3D_STATE__.currentYear = currentYear;
    window.__3D_STATE__.visibleCount = visibleCount;
    window.__3D_STATE__.selectedElement = selectedElement;
    window.__3D_STATE__.activeFilter = activeFilter;
    window.__3D_STATE__.cameraPosition = {
        x: parseFloat(camera.position.x.toFixed(2)),
        y: parseFloat(camera.position.y.toFixed(2)),
        z: parseFloat(camera.position.z.toFixed(2))
    };
    window.__3D_STATE__.viewMode = viewMode;
    window.__3D_STATE__.elementsData = stateElements;

    renderer.render(scene, camera);
}

// Initial visibility update
updateElementVisibility();
animate();

</script>
</body>
</html>
