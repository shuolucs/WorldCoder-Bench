<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Periodic Table</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a2e, #02020a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .interactive {
            pointer-events: auto;
        }
        #filterButtons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 15px;
            background: rgba(10, 10, 46, 0.7);
            backdrop-filter: blur(5px);
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .filter-btn.active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
            font-weight: bold;
        }
        #bottom-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: rgba(10, 10, 46, 0.8);
            backdrop-filter: blur(5px);
        }
        #yearLabel {
            font-size: 18px;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #timeSlider {
            width: 60%;
            max-width: 600px;
            cursor: pointer;
        }
        #infoPanel {
            position: absolute;
            top: 50%;
            right: 20px;
            transform: translateY(-50%);
            background: rgba(15, 15, 50, 0.9);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 20px;
            width: 250px;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        #info-sym { font-size: 48px; font-weight: bold; text-align: center; margin: 0; }
        #info-name { font-size: 24px; text-align: center; margin: 5px 0 15px 0; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px;}
        .info-label { color: #aaa; }
        #instructions {
            position: absolute;
            bottom: 90px;
            left: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
    </style>
    <!-- Import Three.js and dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="filterButtons" class="interactive">
            <button class="filter-btn active" data-cat="All">All</button>
            <button class="filter-btn" data-cat="Alkali">Alkali</button>
            <button class="filter-btn" data-cat="Alkaline">Alkaline</button>
            <button class="filter-btn" data-cat="Transition">Transition</button>
            <button class="filter-btn" data-cat="Metalloid">Metalloid</button>
            <button class="filter-btn" data-cat="Nonmetal">Nonmetal</button>
            <button class="filter-btn" data-cat="Halogen">Halogen</button>
            <button class="filter-btn" data-cat="Noble Gas">Noble Gas</button>
            <button class="filter-btn" data-cat="Other Metal">Other Metal</button>
        </div>

        <div id="infoPanel" class="interactive">
            <div id="info-sym">Fe</div>
            <div id="info-name">Iron</div>
            <div class="info-row"><span class="info-label">Atomic Number</span><span id="info-num">26</span></div>
            <div class="info-row"><span class="info-label">Category</span><span id="info-cat">Transition</span></div>
            <div class="info-row"><span class="info-label">Discovered</span><span id="info-year">-5000</span></div>
        </div>

        <div id="instructions">
            Controls:<br>
            Left Click: Rotate / Select<br>
            Scroll: Zoom<br>
            R: Reset Camera<br>
            T: Toggle 2D/3D View<br>
            +/-: Adjust Year by 10
        </div>

        <div id="bottom-controls" class="interactive">
            <div id="yearLabel">Year: 1900</div>
            <input type="range" id="timeSlider" min="1669" max="1900" value="1900" step="1">
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import * as TWEEN from '@tweenjs/tween.js';

        // --- Data ---
        const elementsData = [
            { num: 1, sym: 'H', name: 'Hydrogen', cat: 'Nonmetal', year: 1766, r: 1, c: 1 },
            { num: 2, sym: 'He', name: 'Helium', cat: 'Noble Gas', year: 1868, r: 1, c: 18 },
            { num: 3, sym: 'Li', name: 'Lithium', cat: 'Alkali', year: 1817, r: 2, c: 1 },
            { num: 4, sym: 'Be', name: 'Beryllium', cat: 'Alkaline', year: 1798, r: 2, c: 2 },
            { num: 5, sym: 'B', name: 'Boron', cat: 'Metalloid', year: 1808, r: 2, c: 13 },
            { num: 6, sym: 'C', name: 'Carbon', cat: 'Nonmetal', year: -3750, r: 2, c: 14 },
            { num: 7, sym: 'N', name: 'Nitrogen', cat: 'Nonmetal', year: 1772, r: 2, c: 15 },
            { num: 8, sym: 'O', name: 'Oxygen', cat: 'Nonmetal', year: 1774, r: 2, c: 16 },
            { num: 9, sym: 'F', name: 'Fluorine', cat: 'Halogen', year: 1886, r: 2, c: 17 },
            { num: 10, sym: 'Ne', name: 'Neon', cat: 'Noble Gas', year: 1898, r: 2, c: 18 },
            { num: 11, sym: 'Na', name: 'Sodium', cat: 'Alkali', year: 1807, r: 3, c: 1 },
            { num: 12, sym: 'Mg', name: 'Magnesium', cat: 'Alkaline', year: 1755, r: 3, c: 2 },
            { num: 13, sym: 'Al', name: 'Aluminium', cat: 'Other Metal', year: 1825, r: 3, c: 13 },
            { num: 14, sym: 'Si', name: 'Silicon', cat: 'Metalloid', year: 1824, r: 3, c: 14 },
            { num: 15, sym: 'P', name: 'Phosphorus', cat: 'Nonmetal', year: 1669, r: 3, c: 15 },
            { num: 16, sym: 'S', name: 'Sulfur', cat: 'Nonmetal', year: -2000, r: 3, c: 16 },
            { num: 17, sym: 'Cl', name: 'Chlorine', cat: 'Halogen', year: 1774, r: 3, c: 17 },
            { num: 18, sym: 'Ar', name: 'Argon', cat: 'Noble Gas', year: 1894, r: 3, c: 18 },
            { num: 19, sym: 'K', name: 'Potassium', cat: 'Alkali', year: 1807, r: 4, c: 1 },
            { num: 20, sym: 'Ca', name: 'Calcium', cat: 'Alkaline', year: 1808, r: 4, c: 2 },
            { num: 21, sym: 'Sc', name: 'Scandium', cat: 'Transition', year: 1879, r: 4, c: 3 },
            { num: 22, sym: 'Ti', name: 'Titanium', cat: 'Transition', year: 1791, r: 4, c: 4 },
            { num: 23, sym: 'V', name: 'Vanadium', cat: 'Transition', year: 1801, r: 4, c: 5 },
            { num: 24, sym: 'Cr', name: 'Chromium', cat: 'Transition', year: 1797, r: 4, c: 6 },
            { num: 25, sym: 'Mn', name: 'Manganese', cat: 'Transition', year: 1774, r: 4, c: 7 },
            { num: 26, sym: 'Fe', name: 'Iron', cat: 'Transition', year: -5000, r: 4, c: 8 },
            { num: 27, sym: 'Co', name: 'Cobalt', cat: 'Transition', year: 1735, r: 4, c: 9 },
            { num: 28, sym: 'Ni', name: 'Nickel', cat: 'Transition', year: 1751, r: 4, c: 10 },
            { num: 29, sym: 'Cu', name: 'Copper', cat: 'Transition', year: -9000, r: 4, c: 11 },
            { num: 30, sym: 'Zn', name: 'Zinc', cat: 'Transition', year: 1746, r: 4, c: 12 },
            { num: 31, sym: 'Ga', name: 'Gallium', cat: 'Other Metal', year: 1875, r: 4, c: 13 },
            { num: 32, sym: 'Ge', name: 'Germanium', cat: 'Metalloid', year: 1886, r: 4, c: 14 },
            { num: 33, sym: 'As', name: 'Arsenic', cat: 'Metalloid', year: -300, r: 4, c: 15 },
            { num: 34, sym: 'Se', name: 'Selenium', cat: 'Nonmetal', year: 1817, r: 4, c: 16 },
            { num: 35, sym: 'Br', name: 'Bromine', cat: 'Halogen', year: 1826, r: 4, c: 17 },
            { num: 36, sym: 'Kr', name: 'Krypton', cat: 'Noble Gas', year: 1898, r: 4, c: 18 }
        ];

        const categoryColors = {
            'Alkali': 0xff6b6b,
            'Alkaline': 0xffa07a,
            'Transition': 0x4ecdc4,
            'Metalloid': 0x95e1d3,
            'Nonmetal': 0xa8e6cf,
            'Noble Gas': 0xdda0dd,
            'Other Metal': 0xf7dc6f,
            'Halogen': 0x87ceeb
        };

        // --- State Management ---
        window.__3D_STATE__ = {
            totalElements: 36,
            currentYear: 1900,
            visibleCount: 36,
            selectedElement: null,
            activeFilter: 'All',
            cameraPosition: { x: 0, y: 5, z: 25 },
            viewMode: '3D',
            elementsData: []
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // Background handled by CSS gradient, renderer transparent
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 15, 10);
        scene.add(dirLight);

        // --- Element Creation ---
        const meshes = [];
        const boxGeometry = new THREE.BoxGeometry(0.9, 0.9, 0.4);

        function createTexture(el) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');

            // Background
            ctx.fillStyle = '#' + categoryColors[el.cat].toString(16).padStart(6, '0');
            ctx.fillRect(0, 0, 256, 256);

            // Inner border
            ctx.strokeStyle = 'rgba(0,0,0,0.2)';
            ctx.lineWidth = 8;
            ctx.strokeRect(4, 4, 248, 248);

            ctx.fillStyle = '#111111';
            
            // Atomic Number
            ctx.font = 'bold 40px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(el.num, 15, 45);

            // Symbol
            ctx.font = 'bold 100px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(el.sym, 128, 150);

            // Name
            ctx.font = '30px Arial';
            ctx.fillText(el.name, 128, 220);

            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const spacing = 1.1;
        const colsOffset = 9.5; // Center 18 cols
        const rowsOffset = 2.5; // Center 4 rows

        elementsData.forEach(el => {
            const texture = createTexture(el);
            const material = new THREE.MeshStandardMaterial({ 
                map: texture,
                transparent: true,
                opacity: 1.0,
                roughness: 0.4,
                metalness: 0.1
            });

            const mesh = new THREE.Mesh(boxGeometry, material);
            mesh.userData = el;

            const x = (el.c - colsOffset) * spacing;
            const y = -(el.r - rowsOffset) * spacing;
            const z = (el.r - 1) * 0.5; // 3D layout default

            mesh.position.set(x, y, z);
            mesh.userData.baseZ = z; // Store for toggling
            
            scene.add(mesh);
            meshes.push(mesh);
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMesh = null;

        const timeSlider = document.getElementById('timeSlider');
        const yearLabel = document.getElementById('yearLabel');
        const infoPanel = document.getElementById('infoPanel');
        const filterButtons = document.querySelectorAll('.filter-btn');

        function updateVisuals() {
            const year = parseInt(timeSlider.value);
            const filter = window.__3D_STATE__.activeFilter;
            let visibleCount = 0;

            meshes.forEach(mesh => {
                const el = mesh.userData;
                let targetOpacity = 1.0;
                let targetScale = 1.0;

                if (el.year > year) {
                    targetOpacity = 0.15;
                    targetScale = 0.5;
                } else {
                    if (filter !== 'All' && el.cat !== filter) {
                        targetOpacity = 0.2;
                    } else {
                        visibleCount++;
                    }
                }

                new TWEEN.Tween(mesh.material)
                    .to({ opacity: targetOpacity }, 300)
                    .easing(TWEEN.Easing.Quadratic.Out)
                    .start();

                new TWEEN.Tween(mesh.scale)
                    .to({ x: targetScale, y: targetScale, z: targetScale }, 300)
                    .easing(TWEEN.Easing.Back.Out)
                    .start();
            });

            window.__3D_STATE__.currentYear = year;
            window.__3D_STATE__.visibleCount = visibleCount;
        }

        timeSlider.addEventListener('input', (e) => {
            yearLabel.textContent = `Year: ${e.target.value}`;
            updateVisuals();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                filterButtons.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                window.__3D_STATE__.activeFilter = e.target.dataset.cat;
                updateVisuals();
            });
        });

        function selectElement(mesh) {
            if (selectedMesh) {
                selectedMesh.material.emissive.setHex(0x000000);
            }
            if (mesh) {
                mesh.material.emissive.setHex(0x444444);
                selectedMesh = mesh;
                
                const el = mesh.userData;
                document.getElementById('info-sym').textContent = el.sym;
                document.getElementById('info-name').textContent = el.name;
                document.getElementById('info-num').textContent = el.num;
                document.getElementById('info-cat').textContent = el.cat;
                document.getElementById('info-year').textContent = el.year < 0 ? Math.abs(el.year) + ' BC' : el.year;
                
                infoPanel.style.display = 'block';
                window.__3D_STATE__.selectedElement = el.sym;
            } else {
                selectedMesh = null;
                infoPanel.style.display = 'none';
                window.__3D_STATE__.selectedElement = null;
            }
        }

        window.addEventListener('pointerdown', (event) => {
            // Don't raycast if clicking UI
            if (event.target.closest('.interactive')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(meshes);

            if (intersects.length > 0) {
                selectElement(intersects[0].object);
            } else {
                selectElement(null);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                selectElement(null);
            } else if (e.key.toLowerCase() === 'r') {
                new TWEEN.Tween(camera.position)
                    .to({ x: 0, y: 5, z: 25 }, 1000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
                new TWEEN.Tween(controls.target)
                    .to({ x: 0, y: 0, z: 0 }, 1000)
                    .easing(TWEEN.Easing.Cubic.Out)
                    .start();
            } else if (e.key.toLowerCase() === 't') {
                window.__3D_STATE__.viewMode = window.__3D_STATE__.viewMode === '3D' ? '2D' : '3D';
                const is3D = window.__3D_STATE__.viewMode === '3D';
                
                meshes.forEach(mesh => {
                    const targetZ = is3D ? mesh.userData.baseZ : 0;
                    new TWEEN.Tween(mesh.position)
                        .to({ z: targetZ }, 600)
                        .easing(TWEEN.Easing.Quadratic.InOut)
                        .start();
                });
            } else if (e.key === '=' || e.key === '+') {
                timeSlider.value = Math.min(1900, parseInt(timeSlider.value) + 10);
                timeSlider.dispatchEvent(new Event('input'));
            } else if (e.key === '-') {
                timeSlider.value = Math.max(1669, parseInt(timeSlider.value) - 10);
                timeSlider.dispatchEvent(new Event('input'));
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();
            renderer.render(scene, camera);

            // Update State
            window.__3D_STATE__.cameraPosition = {
                x: parseFloat(camera.position.x.toFixed(2)),
                y: parseFloat(camera.position.y.toFixed(2)),
                z: parseFloat(camera.position.z.toFixed(2))
            };
            
            window.__3D_STATE__.elementsData = meshes.map(m => ({
                symbol: m.userData.sym,
                atomicNumber: m.userData.num,
                discoveryYear: m.userData.year,
                category: m.userData.cat,
                opacity: parseFloat(m.material.opacity.toFixed(2))
            }));
        }

        // Initialize
        updateVisuals();
        animate();

    </script>
</body>
</html>
