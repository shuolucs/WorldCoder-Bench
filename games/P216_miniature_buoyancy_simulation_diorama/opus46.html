<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buoyancy Simulation Diorama</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.7); color: #fff; padding: 15px 20px;
    border-radius: 10px; font-size: 14px; line-height: 1.8;
    pointer-events: none; min-width: 220px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #hud h3 { margin: 0 0 8px 0; color: #4fc3f7; font-size: 16px; }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; }
  #btn-density {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    padding: 12px 24px; font-size: 15px; cursor: pointer;
    background: linear-gradient(135deg, #4fc3f7, #0288d1); color: #fff;
    border: none; border-radius: 8px; font-weight: bold;
    box-shadow: 0 4px 15px rgba(79,195,247,0.3);
    transition: all 0.3s;
  }
  #btn-density:hover { background: linear-gradient(135deg, #81d4fa, #0277bd); transform: translateX(-50%) scale(1.05); }
  #instructions {
    position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 12px; text-align: center;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="hud">
  <h3>🌊 Buoyancy Diorama</h3>
  <div><span class="label">Water Level:</span> <span class="value" id="hud-water">2.00</span></div>
  <div><span class="label">Objects in Water:</span> <span class="value" id="hud-count">0</span></div>
  <div><span class="label">Selected:</span> <span class="value" id="hud-selected">None</span></div>
</div>

<div id="instructions">Click an object on the shelf to select it • Press <b>D</b> to drop • Press <b>R</b> to reset</div>

<button id="btn-density">Toggle Density View</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 40);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.left = -12;
dirLight.shadow.camera.right = 12;
dirLight.shadow.camera.top = 12;
dirLight.shadow.camera.bottom = -12;
dirLight.shadow.camera.near = 0.1;
dirLight.shadow.camera.far = 30;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// Additional fill light
const fillLight = new THREE.DirectionalLight(0x4fc3f7, 0.2);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// Table
const tableGeo = new THREE.BoxGeometry(16, 0.5, 10);
const tableMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.8, metalness: 0.1 });
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.set(0, -3, 0);
table.receiveShadow = true;
table.castShadow = true;
scene.add(table);

// Table legs
const legGeo = new THREE.BoxGeometry(0.4, 3, 0.4);
const legMat = new THREE.MeshStandardMaterial({ color: 0x6B3A1F, roughness: 0.9 });
const legPositions = [[-7, -4.75, -4], [7, -4.75, -4], [-7, -4.75, 4], [7, -4.75, 4]];
legPositions.forEach(pos => {
  const leg = new THREE.Mesh(legGeo, legMat);
  leg.position.set(...pos);
  leg.castShadow = true;
  scene.add(leg);
});

// Glass Tank
const tankWidth = 8, tankHeight = 6, tankDepth = 6;
const tankBottomY = -2.75;
const tankCenterY = tankBottomY + tankHeight / 2;
const wallThickness = 0.15;

const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.15,
  roughness: 0.05,
  metalness: 0.0,
  transmission: 0.8,
  thickness: 0.1,
  side: THREE.DoubleSide,
  depthWrite: false
});

// Tank bottom
const bottomGeo = new THREE.BoxGeometry(tankWidth, wallThickness, tankDepth);
const bottomMat = new THREE.MeshStandardMaterial({ color: 0xd4c89a, roughness: 0.9 });
const tankBottom = new THREE.Mesh(bottomGeo, bottomMat);
tankBottom.position.set(0, tankBottomY, 0);
tankBottom.receiveShadow = true;
scene.add(tankBottom);

// Tank walls
function createWall(w, h, d, x, y, z) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const wall = new THREE.Mesh(geo, glassMat);
  wall.position.set(x, y, z);
  wall.renderOrder = 1;
  scene.add(wall);
  return wall;
}

createWall(wallThickness, tankHeight, tankDepth, -tankWidth/2, tankCenterY, 0); // left
createWall(wallThickness, tankHeight, tankDepth, tankWidth/2, tankCenterY, 0);  // right
createWall(tankWidth, tankHeight, wallThickness, 0, tankCenterY, -tankDepth/2); // back
createWall(tankWidth, tankHeight, wallThickness, 0, tankCenterY, tankDepth/2);  // front

// Tank edge frames
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.3, metalness: 0.8 });
const edgeSize = 0.1;
function createEdge(w, h, d, x, y, z) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const edge = new THREE.Mesh(geo, edgeMat);
  edge.position.set(x, y, z);
  scene.add(edge);
}
const topY = tankBottomY + tankHeight;
// Top edges
createEdge(tankWidth + 0.2, edgeSize, edgeSize, 0, topY, -tankDepth/2);
createEdge(tankWidth + 0.2, edgeSize, edgeSize, 0, topY, tankDepth/2);
createEdge(edgeSize, edgeSize, tankDepth + 0.2, -tankWidth/2, topY, 0);
createEdge(edgeSize, edgeSize, tankDepth + 0.2, tankWidth/2, topY, 0);

// Water
const initialWaterLevel = 2.0;
let currentWaterLevel = initialWaterLevel;
const waterHeight = currentWaterLevel - tankBottomY;
const waterGeo = new THREE.BoxGeometry(tankWidth - wallThickness * 2, waterHeight, tankDepth - wallThickness * 2);
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x1a8fdd,
  transparent: true,
  opacity: 0.3,
  roughness: 0.1,
  metalness: 0.0,
  side: THREE.DoubleSide,
  depthWrite: false
});
const waterMesh = new THREE.Mesh(waterGeo, waterMat);
waterMesh.position.set(0, tankBottomY + waterHeight / 2, 0);
waterMesh.renderOrder = 2;
scene.add(waterMesh);

// Water surface
const surfaceGeo = new THREE.PlaneGeometry(tankWidth - wallThickness * 2, tankDepth - wallThickness * 2);
const surfaceMat = new THREE.MeshPhysicalMaterial({
  color: 0x4fc3f7,
  transparent: true,
  opacity: 0.4,
  roughness: 0.0,
  metalness: 0.1,
  side: THREE.DoubleSide,
  depthWrite: false
});
const waterSurface = new THREE.Mesh(surfaceGeo, surfaceMat);
waterSurface.rotation.x = -Math.PI / 2;
waterSurface.position.set(0, currentWaterLevel, 0);
waterSurface.renderOrder = 3;
scene.add(waterSurface);

// Shelf
const shelfGeo = new THREE.BoxGeometry(3, 0.2, 2);
const shelfMat = new THREE.MeshStandardMaterial({ color: 0x6B3A1F, roughness: 0.8 });
const shelf = new THREE.Mesh(shelfGeo, shelfMat);
shelf.position.set(-5, -0.5, 0);
shelf.castShadow = true;
shelf.receiveShadow = true;
scene.add(shelf);

// Shelf bracket
const bracketGeo = new THREE.BoxGeometry(0.15, 3, 2);
const bracket = new THREE.Mesh(bracketGeo, shelfMat);
bracket.position.set(-6.5, -1.5, 0);
bracket.castShadow = true;
scene.add(bracket);

// Shelf back
const shelfBack = new THREE.Mesh(new THREE.BoxGeometry(3, 5, 0.15), shelfMat);
shelfBack.position.set(-5, -0.5, -1);
shelfBack.castShadow = true;
scene.add(shelfBack);

// Objects data
const WATER_DENSITY = 1.0;
const GRAVITY = 5.0;
const DAMPING = 0.97;
const WATER_RISE_FACTOR = 0.05;

const objectsData = {
  wood_cube: {
    name: 'wood_cube',
    displayName: 'Wood Cube',
    density: 0.6,
    shelfPos: new THREE.Vector3(-5.5, 0.1, 0),
    volume: 1.0, // 1x1x1
    halfHeight: 0.5,
    inWater: false,
    velocity: 0,
    physicsActive: false,
    mesh: null,
    label: null,
    densitySprite: null
  },
  steel_sphere: {
    name: 'steel_sphere',
    displayName: 'Steel Sphere',
    density: 7.8,
    shelfPos: new THREE.Vector3(-5, 0.0, 0),
    volume: (4/3) * Math.PI * 0.5 * 0.5 * 0.5,
    halfHeight: 0.5,
    inWater: false,
    velocity: 0,
    physicsActive: false,
    mesh: null,
    label: null,
    densitySprite: null
  },
  rubber_duck: {
    name: 'rubber_duck',
    displayName: 'Rubber Duck',
    density: 0.3,
    shelfPos: new THREE.Vector3(-4.5, 0.1, 0),
    volume: (4/3) * Math.PI * 0.6 * 0.6 * 0.6,
    halfHeight: 0.6,
    inWater: false,
    velocity: 0,
    physicsActive: false,
    mesh: null,
    label: null,
    densitySprite: null
  }
};

// Create text sprite
function createTextSprite(text, color = '#ffffff', fontSize = 48) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 128;
  const ctx = canvas.getContext('2d');
  ctx.font = `bold ${fontSize}px Arial`;
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 64);
  const texture = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(2, 1, 1);
  return sprite;
}

// Create Wood Cube
{
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const mat = new THREE.MeshStandardMaterial({ color: 0xC4883C, roughness: 0.7, metalness: 0.05 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.position.copy(objectsData.wood_cube.shelfPos);
  mesh.userData = { objectId: 'wood_cube' };
  scene.add(mesh);
  objectsData.wood_cube.mesh = mesh;

  const label = createTextSprite('Wood', '#C4883C', 36);
  label.position.set(mesh.position.x, mesh.position.y + 1.2, mesh.position.z);
  scene.add(label);
  objectsData.wood_cube.label = label;

  const densitySprite = createTextSprite('ρ=0.6', '#ffff00', 32);
  densitySprite.visible = false;
  scene.add(densitySprite);
  objectsData.wood_cube.densitySprite = densitySprite;
}

// Create Steel Sphere
{

  const mat = new THREE.MeshStandardMaterial({ color: 0x888899, roughness: 0.2, metalness: 0.9 });
  const mesh = new THREE.Mesh(geo, mat);

  objectsData.steel_sphere.mesh = mesh;

  const label = createTextSprite('Steel', '#888899', 36);
  label.position.set(mesh.position.x, mesh.position.y + 1.2, mesh.position.z);
  scene.add(label);
  objectsData.steel_sphere.label = label;

  const densitySprite = createTextSprite('ρ=7.8', '#ffff00', 32);
  densitySprite.visible = false;
  scene.add(densitySprite);
  objectsData.steel_sphere.densitySprite = densitySprite;
}

// Create Rubber Duck
{
  const duckGroup = new THREE.Group();
  // Body
  const bodyGeo = new THREE.SphereGeometry(0.6, 32, 32);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, roughness: 0.5, metalness: 0.05 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);

  const headGeo = new THREE.SphereGeometry(0.3, 32, 32);

// Selection state
let selectedObject = null;
let densityViewOn = false;

// Raycaster for clicking
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getAllClickableMeshes() {
  const meshes = [];
  Object.values(objectsData).forEach(obj => {
    if (obj.mesh.type === 'Group') {
      obj.mesh.traverse(child => {
        if (child.isMesh) meshes.push(child);
      });
    } else {
      meshes.push(obj.mesh);
    }
  });
  return meshes;
}

function getObjectIdFromMesh(mesh) {
  if (mesh.userData.objectId) return mesh.userData.objectId;
  let parent = mesh.parent;
  while (parent) {
    if (parent.userData.objectId) return parent.userData.objectId;
    parent = parent.parent;
  }
  return null;
}

function highlightObject(objData, highlight) {
  const mesh = objData.mesh;
  if (mesh.type === 'Group') {
    mesh.traverse(child => {
      if (child.isMesh && child.material) {
        child.material.emissive = highlight ? new THREE.Color(0xffff00) : new THREE.Color(0x000000);
        child.material.emissiveIntensity = highlight ? 0.3 : 0;
      }
    });
  } else {
    mesh.material.emissive = highlight ? new THREE.Color(0xffff00) : new THREE.Color(0x000000);
    mesh.material.emissiveIntensity = highlight ? 0.3 : 0;
  }
}

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(getAllClickableMeshes(), false);

  // Deselect previous
  if (selectedObject) {
    highlightObject(objectsData[selectedObject], false);
  }

  if (intersects.length > 0) {
    const objId = getObjectIdFromMesh(intersects[0].object);
    if (objId && objectsData[objId] && !objectsData[objId].inWater) {
      selectedObject = objId;
      highlightObject(objectsData[objId], true);
    } else {
      selectedObject = null;
    }
  } else {
    selectedObject = null;
  }
});

// Keyboard
document.addEventListener('keydown', (event) => {
  if (event.key === 'd' || event.key === 'D') {
    dropSelected();
  }
  if (event.key === 'r' || event.key === 'R') {
    resetAll();
  }
});

function dropSelected() {
  if (!selectedObject) return;
  const obj = objectsData[selectedObject];
  if (obj.inWater || obj.physicsActive) return;

  highlightObject(obj, false);
  obj.mesh.position.set(0, 4.0, 0);
  obj.velocity = 0;
  obj.physicsActive = true;
  obj.label.visible = false;
  selectedObject = null;
}

function resetAll() {
  Object.values(objectsData).forEach(obj => {
    obj.mesh.position.copy(obj.shelfPos);
    obj.velocity = 0;
    obj.physicsActive = false;
    obj.inWater = false;
    obj.label.visible = true;
    obj.label.position.set(obj.shelfPos.x, obj.shelfPos.y + 1.2, obj.shelfPos.z);
    highlightObject(obj, false);
  });
  selectedObject = null;
  currentWaterLevel = initialWaterLevel;
  updateWaterMesh();
}

function updateWaterMesh() {
  const waterH = currentWaterLevel - tankBottomY;
  waterMesh.geometry.dispose();
  waterMesh.geometry = new THREE.BoxGeometry(tankWidth - wallThickness * 2, waterH, tankDepth - wallThickness * 2);
  waterMesh.position.set(0, tankBottomY + waterH / 2, 0);
  waterSurface.position.y = currentWaterLevel;
}

function computeWaterLevel() {
  let totalDisplacedVolume = 0;
  Object.values(objectsData).forEach(obj => {
    if (obj.inWater || (obj.physicsActive && obj.mesh.position.y - obj.halfHeight < currentWaterLevel)) {
      const objY = obj.mesh.position.y;
      const objBottom = objY - obj.halfHeight;
      const objTop = objY + obj.halfHeight;

      if (obj.density < WATER_DENSITY) {
        // Floating: submerged fraction
        const submergedFraction = Math.min(1, Math.max(0, (currentWaterLevel - objBottom) / (objTop - objBottom)));
        totalDisplacedVolume += obj.volume * submergedFraction;
      } else {
        // Sunk: fully submerged if below water
        if (objTop <= currentWaterLevel) {
          totalDisplacedVolume += obj.volume;
        } else if (objBottom < currentWaterLevel) {
          const submergedFraction = (currentWaterLevel - objBottom) / (objTop - objBottom);
          totalDisplacedVolume += obj.volume * submergedFraction;
        }
      }
    }
  });

  currentWaterLevel = initialWaterLevel + totalDisplacedVolume * WATER_RISE_FACTOR;
  updateWaterMesh();
}

// Physics update
function updatePhysics(dt) {
  Object.values(objectsData).forEach(obj => {
    if (!obj.physicsActive) return;

    const y = obj.mesh.position.y;
    const objBottom = y - obj.halfHeight;
    const objTop = y + obj.halfHeight;
    const objHeight = obj.halfHeight * 2;
    const tankFloor = tankBottomY + wallThickness / 2;

    let force = -GRAVITY; // gravity pulling down

    // Check if in water
    if (objBottom < currentWaterLevel) {
      // Submerged fraction
      const submergedDepth = Math.min(currentWaterLevel - objBottom, objHeight);
      const submergedFraction = submergedDepth / objHeight;

      // Buoyancy force: (water_density / object_density) * g * submergedFraction
      const buoyancyForce = (WATER_DENSITY / obj.density) * GRAVITY * submergedFraction;
      force += buoyancyForce;

      // Water drag
      obj.velocity *= 0.95;

      if (!obj.inWater) {
        obj.inWater = true;
      }
    }

    obj.velocity += force * dt;
    obj.velocity *= DAMPING;

    let newY = y + obj.velocity * dt;

    // Floor collision
    if (newY - obj.halfHeight < tankFloor) {
      newY = tankFloor + obj.halfHeight;
      obj.velocity = -obj.velocity * 0.3;
      if (Math.abs(obj.velocity) < 0.05) obj.velocity = 0;
    }

    // Ceiling (don't go above drop point)
    const tankTop = tankBottomY + tankHeight;
    if (newY + obj.halfHeight > tankTop) {
      newY = tankTop - obj.halfHeight;
      obj.velocity = 0;
    }

    obj.mesh.position.y = newY;

    // Check if within tank x/z bounds (they should be since we drop at center)
    // Clamp x and z
    const halfTankW = (tankWidth - wallThickness * 2) / 2 - obj.halfHeight;
    const halfTankD = (tankDepth - wallThickness * 2) / 2 - obj.halfHeight;
    obj.mesh.position.x = Math.max(-halfTankW, Math.min(halfTankW, obj.mesh.position.x));
    obj.mesh.position.z = Math.max(-halfTankD, Math.min(halfTankD, obj.mesh.position.z));
  });

  computeWaterLevel();
}

// Density toggle
document.getElementById('btn-density').addEventListener('click', () => {
  densityViewOn = !densityViewOn;
  Object.values(objectsData).forEach(obj => {
    obj.densitySprite.visible = densityViewOn;
  });
});

// State

  selectedObject: null,

  steelSphereY: 0,
  rubberDuckY: 0,
  woodCubeInWater: false,
  steelSphereInWater: false,

  simRunning: false,

};

for (let i = 0; i < 20; i++) {

}

// Animation
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const dt = Math.min(clock.getDelta(), 0.05);

  controls.update();

  updatePhysics(dt);

  // Update density sprites positions
  Object.values(objectsData).forEach(obj => {
    if (obj.densitySprite) {
      obj.densitySprite.position.set(
        obj.mesh.position.x,
        obj.mesh.position.y + obj.halfHeight + 0.8,
        obj.mesh.position.z
      );
    }
  });

  // Update labels for shelf objects
  Object.values(objectsData).forEach(obj => {
    if (!obj.physicsActive && !obj.inWater) {
      obj.label.position.set(obj.mesh.position.x, obj.mesh.position.y + 1.2, obj.mesh.position.z);
    }
  });

  // Gentle water surface animation
  waterSurface.position.y = currentWaterLevel + Math.sin(Date.now() * 0.002) * 0.02;

  // Update HUD
  document.getElementById('hud-water').textContent = currentWaterLevel.toFixed(2);
  const inWaterCount = Object.values(objectsData).filter(o => o.inWater).length;
  document.getElementById('hud-count').textContent = inWaterCount;
  document.getElementById('hud-selected').textContent = selectedObject ? objectsData[selectedObject].displayName : 'None';

  // Check if sim is running
  let simRunning = false;
  Object.values(objectsData).forEach(obj => {
    if (obj.physicsActive && Math.abs(obj.velocity) > 0.01) {
      simRunning = true;
    }
  });

  // Update global state
  window.__3D_STATE__ = {
    waterLevel: currentWaterLevel,
    objectsInWater: inWaterCount,
    selectedObject: selectedObject,
    woodCubeY: objectsData.wood_cube.mesh.position.y,
    steelSphereY: objectsData.steel_sphere.mesh.position.y,
    rubberDuckY: objectsData.rubber_duck.mesh.position.y,
    woodCubeInWater: objectsData.wood_cube.inWater,
    steelSphereInWater: objectsData.steel_sphere.inWater,
    rubberDuckInWater: objectsData.rubber_duck.inWater,
    densityViewOn: densityViewOn,
    simRunning: simRunning,
    waterLevelRise: currentWaterLevel - initialWaterLevel
  };

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
