<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buoyancy Simulation Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            user-select: none;
            min-width: 200px;
        }
        #hud h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #4da6ff;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #ccc;
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.5;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
            font-weight: bold;
        }
        #btn-density {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            background: #4da6ff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        #btn-density:hover {
            background: #66b3ff;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h3>Simulation Status</h3>
        <div class="hud-line" id="hud-water">Water Level: 2.00</div>
        <div class="hud-line" id="hud-count">Objects in Water: 0</div>
        <div class="hud-line" id="hud-selected">Selected: None</div>
    </div>

    <div id="controls">
        <div>Click object on shelf to select</div>
        <div>Press <span class="key">D</span> to drop selected</div>
        <div>Press <span class="key">R</span> to reset scene</div>
        <div>Drag to rotate camera</div>
    </div>

    <button id="btn-density">Toggle Density View</button>

    <!-- Import Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            waterLevel: 2.0,
            objectsInWater: 0,
            selectedObject: null,
            woodCubeY: 2.0,
            steelSphereY: 0.5,
            rubberDuckY: -1.0,
            woodCubeInWater: false,
            steelSphereInWater: false,
            rubberDuckInWater: false,
            densityViewOn: false,
            simRunning: false,
            waterLevelRise: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Environment ---
        // Table
        const tableGeo = new THREE.BoxGeometry(16, 0.5, 10);
        const tableMat = new THREE.MeshStandardMaterial({ color: 0x5c4033, roughness: 0.8 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.set(0, -3, 0);
        table.receiveShadow = true;
        scene.add(table);

        // Tank (Glass)
        const tankGeo = new THREE.BoxGeometry(8, 6, 6);
        const tankMat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.15,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.1,
            side: THREE.DoubleSide,
            depthWrite: false
        });
        const tank = new THREE.Mesh(tankGeo, tankMat);
        tank.position.set(0, 0.25, 0); // Center between -2.75 and 3.25
        tank.receiveShadow = true;
        scene.add(tank);

        // Tank Edges (for visual definition)
        const edges = new THREE.EdgesGeometry(tankGeo);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 });
        const tankEdges = new THREE.LineSegments(edges, lineMat);
        tankEdges.position.copy(tank.position);
        scene.add(tankEdges);

        // Water
        const waterBaseY = -2.75;
        const initialWaterLevel = 2.0;
        const waterGeo = new THREE.BoxGeometry(7.9, 1, 7.9);
        // Move geometry origin to bottom for easy scaling
        waterGeo.translate(0, 0.5, 0); 
        const waterMat = new THREE.MeshStandardMaterial({
            color: 0x0077ff,
            transparent: true,
            opacity: 0.3,
            roughness: 0.1,
            metalness: 0.1,
            depthWrite: false
        });
        const water = new THREE.Mesh(waterGeo, waterMat);
        water.position.set(0, waterBaseY, 0);
        water.scale.y = initialWaterLevel - waterBaseY;
        scene.add(water);

        // Shelf (visual indicator for initial positions)
        const shelfGeo = new THREE.BoxGeometry(2, 0.2, 4);
        const shelfMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const shelf1 = new THREE.Mesh(shelfGeo, shelfMat);
        shelf1.position.set(-5, 1.4, 0);
        shelf1.receiveShadow = true;
        scene.add(shelf1);
        const shelf2 = new THREE.Mesh(shelfGeo, shelfMat);
        shelf2.position.set(-5, -0.1, 0);
        shelf2.receiveShadow = true;
        scene.add(shelf2);
        const shelf3 = new THREE.Mesh(shelfGeo, shelfMat);
        shelf3.position.set(-5, -1.6, 0);
        shelf3.receiveShadow = true;
        scene.add(shelf3);

        // --- Objects ---
        const objectsData = [];
        const interactableMeshes = [];

        function createTextSprite(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = 'bold 40px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
            
            const texture = new THREE.CanvasTexture(canvas);
            const spriteMat = new THREE.SpriteMaterial({ map: texture });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.scale.set(1.5, 0.75, 1);
            sprite.visible = false;
            return sprite;
        }

        // 1. Wooden Cube
        const woodGeo = new THREE.BoxGeometry(1, 1, 1);
        const woodMat = new THREE.MeshStandardMaterial({ color: 0x8b5a2b, roughness: 0.9 });
        const woodMesh = new THREE.Mesh(woodGeo, woodMat);
        woodMesh.castShadow = true;
        woodMesh.userData = { id: 'wood_cube', name: 'Wooden Cube' };
        scene.add(woodMesh);
        interactableMeshes.push(woodMesh);

        const woodSprite = createTextSprite('0.6 g/cm³');
        woodSprite.position.y = 1.0;
        woodMesh.add(woodSprite);

        objectsData.push({
            id: 'wood_cube',
            mesh: woodMesh,
            sprite: woodSprite,
            density: 0.6,
            volume: 1.0,
            h: 0.5,
            initPos: new THREE.Vector3(-5, 2, 0),
            state: 'shelf', // 'shelf', 'falling', 'water'
            vy: 0
        });

        // 2. Steel Sphere
        const steelGeo = new THREE.SphereGeometry(0.5, 32, 32);
        const steelMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
        const steelMesh = new THREE.Mesh(steelGeo, steelMat);
        steelMesh.castShadow = true;
        steelMesh.userData = { id: 'steel_sphere', name: 'Steel Sphere' };
        scene.add(steelMesh);
        interactableMeshes.push(steelMesh);

        const steelSprite = createTextSprite('7.8 g/cm³');
        steelSprite.position.y = 0.8;
        steelMesh.add(steelSprite);

        objectsData.push({
            id: 'steel_sphere',
            mesh: steelMesh,
            sprite: steelSprite,
            density: 7.8,
            volume: (4/3) * Math.PI * Math.pow(0.5, 3),
            h: 0.5,
            initPos: new THREE.Vector3(-5, 0.5, 0),
            state: 'shelf',
            vy: 0
        });

        // 3. Rubber Duck
        const duckGroup = new THREE.Group();
        const bodyGeo = new THREE.SphereGeometry(0.6, 32, 32);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, roughness: 0.4 });
        const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
        bodyMesh.castShadow = true;
        duckGroup.add(bodyMesh);

        const beakGeo = new THREE.ConeGeometry(0.2, 0.4, 16);
        const beakMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
        const beakMesh = new THREE.Mesh(beakGeo, beakMat);
        beakMesh.rotation.x = Math.PI / 2;
        beakMesh.position.set(0, 0.2, 0.6);
        beakMesh.castShadow = true;
        duckGroup.add(beakMesh);

        // Invisible hit box for raycasting
        const hitGeo = new THREE.SphereGeometry(0.7, 16, 16);
        const hitMat = new THREE.MeshBasicMaterial({ visible: false });
        const hitMesh = new THREE.Mesh(hitGeo, hitMat);
        hitMesh.userData = { id: 'rubber_duck', name: 'Rubber Duck' };
        duckGroup.add(hitMesh);
        interactableMeshes.push(hitMesh);

        scene.add(duckGroup);

        const duckSprite = createTextSprite('0.3 g/cm³');
        duckSprite.position.y = 1.2;
        duckGroup.add(duckSprite);

        objectsData.push({
            id: 'rubber_duck',
            mesh: duckGroup,
            sprite: duckSprite,
            density: 0.3,
            volume: (4/3) * Math.PI * Math.pow(0.6, 3),
            h: 0.6,
            initPos: new THREE.Vector3(-5, -1, 0),
            state: 'shelf',
            vy: 0
        });

        // Initialize positions
        objectsData.forEach(obj => {
            obj.mesh.position.copy(obj.initPos);
        });

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedId = null;

        function updateSelectionVisuals() {
            interactableMeshes.forEach(mesh => {
                const isSelected = mesh.userData.id === selectedId;
                // Find the actual visible mesh to apply emissive
                let targetMesh = mesh;
                if (mesh.userData.id === 'rubber_duck') {
                    targetMesh = mesh.parent.children[0]; // The yellow body
                }
                
                if (isSelected) {
                    targetMesh.material.emissive.setHex(0x555500);
                } else {
                    targetMesh.material.emissive.setHex(0x000000);
                }
            });
            
            const selectedName = selectedId ? interactableMeshes.find(m => m.userData.id === selectedId).userData.name : 'None';
            document.getElementById('hud-selected').innerText = `Selected: ${selectedName}`;
            window.__3D_STATE__.selectedObject = selectedId;
        }

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactableMeshes);

            if (intersects.length > 0) {
                const clickedId = intersects[0].object.userData.id;
                const objData = objectsData.find(o => o.id === clickedId);
                if (objData && objData.state === 'shelf') {
                    selectedId = clickedId;
                    updateSelectionVisuals();
                }
            } else {
                selectedId = null;
                updateSelectionVisuals();
            }
        });

        window.addEventListener('keydown', (event) => {
            if (event.key.toLowerCase() === 'd' && selectedId) {
                const obj = objectsData.find(o => o.id === selectedId);
                if (obj && obj.state === 'shelf') {
                    obj.state = 'falling';
                    obj.mesh.position.set(0, 4.0, 0);
                    obj.vy = 0;
                    selectedId = null;
                    updateSelectionVisuals();
                }
            }
            if (event.key.toLowerCase() === 'r') {
                objectsData.forEach(obj => {
                    obj.state = 'shelf';
                    obj.mesh.position.copy(obj.initPos);
                    obj.vy = 0;
                });
                selectedId = null;
                updateSelectionVisuals();
                window.__3D_STATE__.waterLevelRise = 0;
            }
        });

        document.getElementById('btn-density').addEventListener('click', () => {
            window.__3D_STATE__.densityViewOn = !window.__3D_STATE__.densityViewOn;
            objectsData.forEach(obj => {
                obj.sprite.visible = window.__3D_STATE__.densityViewOn;
            });
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Animation Loop ---
        const clock = new THREE.Clock();
        const GRAVITY = 5.0;
        const WATER_DENSITY = 1.0;
        const DAMPING = 0.97;

        function animate() {
            requestAnimationFrame(animate);

            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt to prevent huge jumps
            let totalDisplacedVolume = 0;
            let anyMoving = false;
            let objectsInWaterCount = 0;

            // 1. Calculate physics and displacement
            objectsData.forEach(obj => {
                if (obj.state === 'falling' || obj.state === 'water') {
                    // Apply gravity
                    obj.vy -= GRAVITY * dt;

                    // Calculate submerged fraction based on current water level
                    const currentWaterLevel = initialWaterLevel + window.__3D_STATE__.waterLevelRise;
                    const bottomY = obj.mesh.position.y - obj.h;
                    const topY = obj.mesh.position.y + obj.h;
                    let subFrac = 0;

                    if (bottomY < currentWaterLevel) {
                        obj.state = 'water';
                        if (topY < currentWaterLevel) {
                            subFrac = 1.0;
                        } else {
                            subFrac = (currentWaterLevel - bottomY) / (2 * obj.h);
                        }
                    }

                    if (subFrac > 0) {
                        totalDisplacedVolume += subFrac * obj.volume;
                        
                        // Buoyancy force
                        const mass = obj.volume * obj.density;
                        const Fb = subFrac * obj.volume * WATER_DENSITY * GRAVITY;
                        const acceleration = Fb / mass;
                        obj.vy += acceleration * dt;
                    }

                    // Apply damping
                    obj.vy *= DAMPING;

                    // Update position
                    obj.mesh.position.y += obj.vy * dt;

                    // Floor collision
                    if (obj.mesh.position.y - obj.h < waterBaseY) {
                        obj.mesh.position.y = waterBaseY + obj.h;
                        obj.vy = 0;
                    }

                    if (Math.abs(obj.vy) > 0.01) {
                        anyMoving = true;
                    }
                }

                if (obj.state === 'water') {
                    objectsInWaterCount++;
                }
            });

            // 2. Update Water Level
            window.__3D_STATE__.waterLevelRise = totalDisplacedVolume * 0.05;
            const newWaterLevel = initialWaterLevel + window.__3D_STATE__.waterLevelRise;
            const waterHeight = newWaterLevel - waterBaseY;
            
            water.scale.y = waterHeight;
            // Position is handled by geometry translation, scale scales from bottom

            // 3. Update State & HUD
            window.__3D_STATE__.waterLevel = newWaterLevel;
            window.__3D_STATE__.objectsInWater = objectsInWaterCount;
            window.__3D_STATE__.simRunning = anyMoving;
            
            objectsData.forEach(obj => {
                if (obj.id === 'wood_cube') {
                    window.__3D_STATE__.woodCubeY = obj.mesh.position.y;
                    window.__3D_STATE__.woodCubeInWater = obj.state === 'water';
                } else if (obj.id === 'steel_sphere') {
                    window.__3D_STATE__.steelSphereY = obj.mesh.position.y;
                    window.__3D_STATE__.steelSphereInWater = obj.state === 'water';
                } else if (obj.id === 'rubber_duck') {
                    window.__3D_STATE__.rubberDuckY = obj.mesh.position.y;
                    window.__3D_STATE__.rubberDuckInWater = obj.state === 'water';
                }
            });

            document.getElementById('hud-water').innerText = `Water Level: ${newWaterLevel.toFixed(2)}`;
            document.getElementById('hud-count').innerText = `Objects in Water: ${objectsInWaterCount}`;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
