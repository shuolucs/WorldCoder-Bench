<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Buoyancy Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #cfd8dc;
      font-family: Arial, sans-serif;
    }
    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      min-width: 220px;
    }
    #btn-density {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #1976d2;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }
    #btn-density:hover {
      background: #1565c0;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-water">Water Level: 2.00</div>
    <div id="hud-count">Objects in Water: 0</div>
    <div id="hud-selected">Selected: None</div>
  </div>
  <button id="btn-density">Toggle Density View</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdfe8ea);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 8, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    dirLight.shadow.camera.near = 0.1;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const table = new THREE.Mesh(
      new THREE.BoxGeometry(16, 0.5, 10),
      new THREE.MeshStandardMaterial({ color: 0x7b4a1f, roughness: 0.9 })
    );
    table.position.set(0, -3, 0);
    table.receiveShadow = true;
    table.castShadow = true;
    scene.add(table);

    const shelf = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.2, 3),
      new THREE.MeshStandardMaterial({ color: 0x8d6e63, roughness: 0.85 })
    );
    shelf.position.set(-5, -2, 0);
    shelf.castShadow = true;
    shelf.receiveShadow = true;
    scene.add(shelf);

    const TANK_OUTER = { w: 8, h: 6, d: 6 };
    const TANK_INNER = { w: 7.6, h: 5.6, d: 5.6 };
    const tankCenterY = 0.25;
    const tankBottomY = -2.75;
    const tankTopY = 3.25;
    const initialWaterLevel = 2.0;
    const wallThickness = 0.2;

    const tankGroup = new THREE.Group();
    scene.add(tankGroup);

    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0x88ccee,
      transparent: true,
      opacity: 0.15,
      transmission: 0.4,
      roughness: 0.05,
      metalness: 0.0,
      side: THREE.DoubleSide
    });

    function makeWall(w, h, d, x, y, z) {
      const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), glassMat);
      wall.position.set(x, y, z);
      wall.castShadow = true;
      wall.receiveShadow = true;
      tankGroup.add(wall);
      return wall;
    }

    makeWall(TANK_OUTER.w, wallThickness, TANK_OUTER.d, 0, tankBottomY, 0);
    makeWall(TANK_OUTER.w, wallThickness, TANK_OUTER.d, 0, tankTopY, 0);
    makeWall(wallThickness, TANK_OUTER.h, TANK_OUTER.d, -TANK_OUTER.w / 2, tankCenterY, 0);
    makeWall(wallThickness, TANK_OUTER.h, TANK_OUTER.d, TANK_OUTER.w / 2, tankCenterY, 0);
    makeWall(TANK_OUTER.w, TANK_OUTER.h, wallThickness, 0, tankCenterY, -TANK_OUTER.d / 2);
    makeWall(TANK_OUTER.w, TANK_OUTER.h, wallThickness, 0, tankCenterY, TANK_OUTER.d / 2);

    const waterMat = new THREE.MeshStandardMaterial({
      color: 0x3399ff,
      transparent: true,
      opacity: 0.3
    });

    let waterMesh;
    function rebuildWater(levelY) {
      if (waterMesh) {
        scene.remove(waterMesh);
        waterMesh.geometry.dispose();
      }
      const waterHeight = Math.max(0.01, levelY - tankBottomY);
      waterMesh = new THREE.Mesh(
        new THREE.BoxGeometry(TANK_INNER.w, waterHeight, TANK_INNER.d),
        waterMat
      );
      waterMesh.position.set(0, tankBottomY + waterHeight / 2, 0);
      waterMesh.receiveShadow = true;
      scene.add(waterMesh);
    }
    rebuildWater(initialWaterLevel);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function createTextSprite(text, bg = "rgba(0,0,0,0.65)", color = "white") {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 96;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = color;
      ctx.font = "28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(1.8, 0.68, 1);
      return sprite;
    }

    function createDensitySprite(text) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 96;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, 256, 96);
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      ctx.fillRect(10, 15, 236, 66);
      ctx.strokeStyle = "rgba(0,0,0,0.8)";
      ctx.strokeRect(10, 15, 236, 66);
      ctx.fillStyle = "black";
      ctx.font = "24px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(text, 128, 48);
      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.SpriteMaterial({ map: tex, transparent: true });
      const sprite = new THREE.Sprite(mat);
      sprite.scale.set(1.8, 0.7, 1);
      return sprite;
    }

    const objectDefs = {
      wood_cube: {
        name: "wood_cube",
        displayName: "Wooden Cube",
        density: 0.6,
        volume: 1.0,
        submergedFraction: 0.6,
        shelfPos: new THREE.Vector3(-5, 2, 0),
        halfHeight: 0.5
      },
      steel_sphere: {
        name: "steel_sphere",
        displayName: "Steel Sphere",
        density: 7.8,
        volume: (4 / 3) * Math.PI * Math.pow(0.5, 3),
        submergedFraction: 1.0,
        shelfPos: new THREE.Vector3(-5, 0.5, 0),
        halfHeight: 0.5
      },
      rubber_duck: {
        name: "rubber_duck",
        displayName: "Rubber Duck",
        density: 0.3,
        volume: (4 / 3) * Math.PI * Math.pow(0.6, 3),
        submergedFraction: 0.3,
        shelfPos: new THREE.Vector3(-5, -1, 0),
        halfHeight: 0.6
      }
    };

    const interactiveMeshes = [];
    const simObjects = {};

    function createObjectMaterials(baseColor, metalness = 0, roughness = 0.6) {
      return new THREE.MeshStandardMaterial({
        color: baseColor,
        metalness,
        roughness,
        emissive: 0x000000
      });
    }

    function addLabelToGroup(group, text, yOffset) {
      const label = createTextSprite(text);
      label.position.set(1.6, yOffset, 0);
      group.add(label);
      return label;
    }

    function addDensityLabel(group, text, yOffset) {
      const sprite = createDensitySprite(text);
      sprite.position.set(0, yOffset, 0);
      sprite.visible = false;
      group.add(sprite);
      return sprite;
    }

    function createWoodCube() {
      const group = new THREE.Group();
      const mat = createObjectMaterials(0x8b5a2b, 0.05, 0.8);
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.objectId = "wood_cube";
      group.add(mesh);
      group.position.copy(objectDefs.wood_cube.shelfPos);
      scene.add(group);

      const label = addLabelToGroup(group, "Wooden Cube", 0.9);
      const densityLabel = addDensityLabel(group, "0.6 g/cm³", 1.5);

      simObjects.wood_cube = {
        id: "wood_cube",
        group,
        mesh,
        label,
        densityLabel,
        density: objectDefs.wood_cube.density,
        volume: objectDefs.wood_cube.volume,
        halfHeight: objectDefs.wood_cube.halfHeight,
        shelfPos: objectDefs.wood_cube.shelfPos.clone(),
        velocity: 0,
        active: false,
        inWater: false,
        targetY: null,
        canFloat: true,
        submergedFraction: objectDefs.wood_cube.submergedFraction
      };
      interactiveMeshes.push(mesh);
    }

    function createSteelSphere() {
      const group = new THREE.Group();
      const mat = createObjectMaterials(0x888888, 0.7, 0.25);
      const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.5, 32, 32), mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData.objectId = "steel_sphere";
      group.add(mesh);
      group.position.copy(objectDefs.steel_sphere.shelfPos);
      scene.add(group);

      const label = addLabelToGroup(group, "Steel Sphere", 0.9);
      const densityLabel = addDensityLabel(group, "7.8 g/cm³", 1.4);

      simObjects.steel_sphere = {
        id: "steel_sphere",
        group,
        mesh,
        label,
        densityLabel,
        density: objectDefs.steel_sphere.density,
        volume: objectDefs.steel_sphere.volume,
        halfHeight: objectDefs.steel_sphere.halfHeight,
        shelfPos: objectDefs.steel_sphere.shelfPos.clone(),
        velocity: 0,
        active: false,
        inWater: false,
        targetY: null,
        canFloat: false,
        submergedFraction: objectDefs.steel_sphere.submergedFraction
      };
      interactiveMeshes.push(mesh);
    }

    function createRubberDuck() {
      const group = new THREE.Group();

      const bodyMat = createObjectMaterials(0xffeb3b, 0.0, 0.7);
      const body = new THREE.Mesh(new THREE.SphereGeometry(0.6, 32, 32), bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      body.userData.objectId = "rubber_duck";
      group.add(body);

      const beakMat = createObjectMaterials(0xff9800, 0.0, 0.8);
      const beak = new THREE.Mesh(new THREE.ConeGeometry(0.12, 0.28, 16), beakMat);
      beak.rotation.z = -Math.PI / 2;
      beak.position.set(0.58, 0.05, 0);
      beak.castShadow = true;
      group.add(beak);

      group.position.copy(objectDefs.rubber_duck.shelfPos);
      scene.add(group);

      const label = addLabelToGroup(group, "Rubber Duck", 1.0);
      const densityLabel = addDensityLabel(group, "0.3 g/cm³", 1.7);

      simObjects.rubber_duck = {
        id: "rubber_duck",
        group,
        mesh: body,
        label,
        densityLabel,
        density: objectDefs.rubber_duck.density,
        volume: objectDefs.rubber_duck.volume,
        halfHeight: objectDefs.rubber_duck.halfHeight,
        shelfPos: objectDefs.rubber_duck.shelfPos.clone(),
        velocity: 0,
        active: false,
        inWater: false,
        targetY: null,
        canFloat: true,
        submergedFraction: objectDefs.rubber_duck.submergedFraction
      };
      interactiveMeshes.push(body);
    }

    createWoodCube();
    createSteelSphere();
    createRubberDuck();

    let selectedObject = null;
    let densityViewOn = false;
    const gravity = 5.0;
    const damping = 0.97;
    let currentWaterLevel = initialWaterLevel;

    function setSelected(id) {
      selectedObject = id;
      Object.values(simObjects).forEach(obj => {
        obj.mesh.material.emissive.setHex(obj.id === id ? 0xffff00 : 0x000000);
        if (obj.id === "rubber_duck") {
          obj.group.children.forEach(child => {
            if (child.material && child.material.emissive) {
              child.material.emissive.setHex(obj.id === id ? 0x665500 : 0x000000);
            }
          });
        }
      });
      updateHUD();
    }

    function resetSimulation() {
      Object.values(simObjects).forEach(obj => {
        obj.group.position.copy(obj.shelfPos);
        obj.velocity = 0;
        obj.active = false;
        obj.inWater = false;
        obj.targetY = null;
      });
      selectedObject = null;
      currentWaterLevel = initialWaterLevel;
      rebuildWater(currentWaterLevel);
      setSelected(null);
      updateDensityView();
      updateHUD();
    }

    function updateDensityView() {
      Object.values(simObjects).forEach(obj => {
        obj.densityLabel.visible = densityViewOn;
      });
    }

    function getDisplacedVolume(obj) {
      if (!obj.inWater) return 0;
      if (obj.density >= 1.0) return obj.volume;
      return obj.volume * obj.submergedFraction;
    }

    function updateWaterLevel() {
      let totalDisplaced = 0;
      Object.values(simObjects).forEach(obj => {
        totalDisplaced += getDisplacedVolume(obj);
      });
      const rise = totalDisplaced * 0.05;
      currentWaterLevel = initialWaterLevel + rise;
      rebuildWater(currentWaterLevel);
    }

    function dropSelectedObject() {
      if (!selectedObject) return;
      const obj = simObjects[selectedObject];
      obj.group.position.set(0, 4.0, 0);
      obj.velocity = 0;
      obj.active = true;
      obj.inWater = false;
      obj.targetY = null;
    }

    function updatePhysics(dt) {
      Object.values(simObjects).forEach(obj => {
        if (!obj.active) return;

        obj.velocity -= gravity * dt;
        obj.group.position.y += obj.velocity * dt;

        const objectBottom = obj.group.position.y - obj.halfHeight;

        if (!obj.inWater && objectBottom <= currentWaterLevel) {
          obj.inWater = true;
          updateWaterLevel();

          if (obj.canFloat) {
            const subHeight = 2 * obj.halfHeight * obj.submergedFraction;
            obj.targetY = currentWaterLevel - obj.halfHeight + subHeight;
          } else {
            obj.targetY = tankBottomY + obj.halfHeight;
          }
        }

        if (obj.inWater) {
          if (obj.canFloat) {
            const subHeight = 2 * obj.halfHeight * obj.submergedFraction;
            obj.targetY = currentWaterLevel - obj.halfHeight + subHeight;
          } else {
            obj.targetY = tankBottomY + obj.halfHeight;
          }

          const spring = 8.0;
          const dy = obj.targetY - obj.group.position.y;
          obj.velocity += dy * spring * dt;
          obj.velocity *= damping;
        }

        const minY = tankBottomY + obj.halfHeight;
        if (obj.group.position.y < minY) {
          obj.group.position.y = minY;
          if (!obj.canFloat) {
            obj.velocity *= 0.3;
            if (Math.abs(obj.velocity) < 0.02) {
              obj.velocity = 0;
              obj.active = false;
            }
          }
        }

        if (obj.canFloat && obj.inWater) {
          if (Math.abs(obj.group.position.y - obj.targetY) < 0.01 && Math.abs(obj.velocity) < 0.02) {
            obj.group.position.y = obj.targetY;
            obj.velocity = 0;
            obj.active = false;
          }
        }
      });
    }

    function updateHUD() {
      const count = Object.values(simObjects).filter(o => o.inWater).length;
      document.getElementById("hud-water").textContent = `Water Level: ${currentWaterLevel.toFixed(2)}`;
      document.getElementById("hud-count").textContent = `Objects in Water: ${count}`;
      document.getElementById("hud-selected").textContent = `Selected: ${
        selectedObject ? selectedObject : "None"
      }`;
    }

    window.__3D_STATE__ = {
      waterLevel: currentWaterLevel,
      objectsInWater: 0,
      selectedObject: null,
      woodCubeY: simObjects.wood_cube.group.position.y,
      steelSphereY: simObjects.steel_sphere.group.position.y,
      rubberDuckY: simObjects.rubber_duck.group.position.y,
      woodCubeInWater: false,
      steelSphereInWater: false,
      rubberDuckInWater: false,
      densityViewOn: false,
      simRunning: false,
      waterLevelRise: 0
    };

    function updateState() {
      const objectsInWater = Object.values(simObjects).filter(o => o.inWater).length;
      const simRunning = Object.values(simObjects).some(o => Math.abs(o.velocity) > 0.01 || o.active);

      window.__3D_STATE__.waterLevel = currentWaterLevel;
      window.__3D_STATE__.objectsInWater = objectsInWater;
      window.__3D_STATE__.selectedObject = selectedObject;
      window.__3D_STATE__.woodCubeY = simObjects.wood_cube.group.position.y;
      window.__3D_STATE__.steelSphereY = simObjects.steel_sphere.group.position.y;
      window.__3D_STATE__.rubberDuckY = simObjects.rubber_duck.group.position.y;
      window.__3D_STATE__.woodCubeInWater = simObjects.wood_cube.inWater;
      window.__3D_STATE__.steelSphereInWater = simObjects.steel_sphere.inWater;
      window.__3D_STATE__.rubberDuckInWater = simObjects.rubber_duck.inWater;
      window.__3D_STATE__.densityViewOn = densityViewOn;
      window.__3D_STATE__.simRunning = simRunning;
      window.__3D_STATE__.waterLevelRise = currentWaterLevel - initialWaterLevel;
    }

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(interactiveMeshes, false);
      if (intersects.length > 0) {
        const id = intersects[0].object.userData.objectId;
        setSelected(id);
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "d" || e.key === "D") {
        dropSelectedObject();
      } else if (e.key === "r" || e.key === "R") {
        resetSimulation();
      }
    });

    document.getElementById("btn-density").addEventListener("click", () => {
      densityViewOn = !densityViewOn;
      updateDensityView();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      updatePhysics(dt);
      updateWaterLevel();
      updateHUD();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    resetSimulation();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
