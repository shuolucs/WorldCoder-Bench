<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procedural Phone Case Designer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
}

canvas {
    display: block;
}

#uiPanel {
    position: fixed;
    left: 0;
    top: 0;
    width: 260px;
    height: 100vh;
    background: rgba(20, 20, 40, 0.9);
    color: #e0e0e0;
    padding: 20px;
    overflow-y: auto;
    z-index: 100;
    border-right: 1px solid rgba(255, 255, 255, 0.1);
}

#uiPanel h2 {
    font-size: 18px;
    margin-bottom: 20px;
    color: #fff;
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
}

.control-group {
    margin-bottom: 18px;
}

.control-group label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input[type="color"] {
    width: 100%;
    height: 36px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
}

select {
    width: 100%;
    padding: 8px 10px;
    background: rgba(255, 255, 255, 0.1);
    color: #e0e0e0;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
}

select option {
    background: #2a2a4a;
    color: #e0e0e0;
}

.pattern-buttons {
    display: flex;
    gap: 6px;
}

.pattern-buttons button {
    flex: 1;
    padding: 8px 4px;
    background: rgba(255, 255, 255, 0.1);
    color: #e0e0e0;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    transition: all 0.2s;
}

.pattern-buttons button:hover {
    background: rgba(255, 255, 255, 0.2);
}

.pattern-buttons button.active {
    background: rgba(52, 152, 219, 0.5);
    border-color: #3498db;
}

.checkbox-group {
    display: flex;
    align-items: center;
    gap: 8px;
}

.checkbox-group input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
}

.checkbox-group label {
    margin-bottom: 0;
    cursor: pointer;
}

input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 3px;
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #3498db;
    cursor: pointer;
}

#rotateBtn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #3498db, #2980b9);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
}

#rotateBtn:hover {
    background: linear-gradient(135deg, #2980b9, #2471a3);
    transform: translateY(-1px);
}

#rotateBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

#exportInfo {
    background: rgba(0, 0, 0, 0.3);
    padding: 10px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.6;
    color: #888;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
}

.range-value {
    float: right;
    font-size: 12px;
    color: #3498db;
}
</style>
</head>
<body>

<div id="uiPanel">
    <h2>📱 Case Designer</h2>

    <div class="control-group">
        <label for="colorPicker">Case Color</label>
        <input type="color" id="colorPicker" value="#3498db">
    </div>

    <div class="control-group">
        <label for="materialSelect">Material</label>
        <select id="materialSelect">
            <option value="matte">Matte</option>
            <option value="glossy">Glossy</option>
            <option value="metallic">Metallic</option>
        </select>
    </div>

    <div class="control-group">
        <label>Pattern</label>
        <div class="pattern-buttons">
            <button id="patternNone" class="active">None</button>
            <button id="patternStripes">Stripes</button>
            <button id="patternDots">Dots</button>
        </div>
    </div>

    <div class="control-group">
        <div class="checkbox-group">
            <input type="checkbox" id="emblemToggle">
            <label for="emblemToggle">Show 3D Emblem</label>
        </div>
    </div>

    <div class="control-group">
        <label for="emblemScale">Emblem Size <span class="range-value" id="emblemScaleValue">0.3</span></label>
        <input type="range" id="emblemScale" min="0.1" max="1.0" step="0.1" value="0.3">
    </div>

    <div class="control-group">
        <button id="rotateBtn">Rotate 180°</button>
    </div>

    <div class="control-group">
        <label>Export Info</label>
        <div id="exportInfo">Loading...</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    caseColor: '#3498db',
    materialType: 'matte',
    pattern: 'none',
    emblemVisible: false,
    emblemScale: 0.3,
    caseRotationY: 0,
    isRotating: false,
    modelLoaded: false,
    roughness: 0.9,
    metalness: 0.0
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
scene.add(directionalLight);

// Additional fill light for better visuals
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
fillLight.position.set(-5, 5, -5);
scene.add(fillLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Material presets
const materialPresets = {
    matte: { roughness: 0.9, metalness: 0.0 },
    glossy: { roughness: 0.1, metalness: 0.2 },
    metallic: { roughness: 0.3, metalness: 0.9 }
};

// Create rounded rectangle shape
function createRoundedRectShape(width, height, radius) {
    const shape = new THREE.Shape();
    const x = -width / 2;
    const y = -height / 2;

    shape.moveTo(x + radius, y);
    shape.lineTo(x + width - radius, y);
    shape.quadraticCurveTo(x + width, y, x + width, y + radius);
    shape.lineTo(x + width, y + height - radius);
    shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    shape.lineTo(x + radius, y + height);
    shape.quadraticCurveTo(x, y + height, x, y + height - radius);
    shape.lineTo(x, y + radius);
    shape.quadraticCurveTo(x, y, x + radius, y);

    return shape;
}

// Create phone case
const caseShape = createRoundedRectShape(1.5, 3.0, 0.15);
const extrudeSettings = {
    depth: 0.2,
    bevelEnabled: true,
    bevelThickness: 0.05,
    bevelSize: 0.05,
    bevelOffset: 0,
    bevelSegments: 3
};

const caseGeometry = new THREE.ExtrudeGeometry(caseShape, extrudeSettings);
caseGeometry.center();

const caseMaterial = new THREE.MeshStandardMaterial({
    color: new THREE.Color('#3498db'),
    roughness: 0.9,
    metalness: 0.0
});

const caseMesh = new THREE.Mesh(caseGeometry, caseMaterial);
caseMesh.position.set(0, 0, 0);
caseMesh.castShadow = true;
caseMesh.receiveShadow = true;
scene.add(caseMesh);

// Floor/grid for reference
const gridHelper = new THREE.GridHelper(10, 20, 0x333355, 0x222244);
gridHelper.position.y = -2;
scene.add(gridHelper);

// Emblem (GLB model)
let emblemModel = null;
const loader = new GLTFLoader();

loader.load(
    '._BrainStem.glb',
    (gltf) => {
        emblemModel = gltf.scene;
        emblemModel.scale.set(0.3, 0.3, 0.3);
        emblemModel.position.set(0, 0.5, 0.15);
        emblemModel.visible = false;
        caseMesh.add(emblemModel);
        window.__3D_STATE__.modelLoaded = true;
        updateExportInfo();
    },
    undefined,
    (error) => {
        console.warn('GLB model could not be loaded:', error);
        // Create a fallback emblem (a torus knot as decorative element)
        const fallbackGeometry = new THREE.TorusKnotGeometry(0.2, 0.06, 64, 16);
        const fallbackMaterial = new THREE.MeshStandardMaterial({
            color: 0xffd700,
            roughness: 0.2,
            metalness: 0.8
        });
        emblemModel = new THREE.Mesh(fallbackGeometry, fallbackMaterial);
        emblemModel.scale.set(0.3, 0.3, 0.3);
        emblemModel.position.set(0, 0, 0.15);
        emblemModel.visible = false;
        caseMesh.add(emblemModel);
        window.__3D_STATE__.modelLoaded = true;
        updateExportInfo();
    }
);

// Pattern generation
function createStripesTexture(color) {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');

    const baseColor = new THREE.Color(color);
    const darkColor = new THREE.Color(color).multiplyScalar(0.6);

    const stripeCount = 5;
    const stripeHeight = canvas.height / (stripeCount * 2);

    for (let i = 0; i < stripeCount * 2; i++) {
        if (i % 2 === 0) {
            ctx.fillStyle = `#${baseColor.getHexString()}`;
        } else {
            ctx.fillStyle = `#${darkColor.getHexString()}`;
        }
        ctx.fillRect(0, i * stripeHeight, canvas.width, stripeHeight);
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    return texture;
}

function createDotsTexture(color) {
    const canvas = document.createElement('canvas');
    canvas.width = 512;
    canvas.height = 512;
    const ctx = canvas.getContext('2d');

    const baseColor = new THREE.Color(color);
    const darkColor = new THREE.Color(color).multiplyScalar(0.6);

    ctx.fillStyle = `#${baseColor.getHexString()}`;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const cols = 4;
    const rows = 6;
    const dotRadius = 20;
    const spacingX = canvas.width / cols;
    const spacingY = canvas.height / rows;

    ctx.fillStyle = `#${darkColor.getHexString()}`;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            const cx = spacingX * (c + 0.5);
            const cy = spacingY * (r + 0.5);
            ctx.beginPath();
            ctx.arc(cx, cy, dotRadius, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const texture = new THREE.CanvasTexture(canvas);
    texture.wrapS = THREE.RepeatWrapping;
    texture.wrapT = THREE.RepeatWrapping;
    return texture;
}

function applyPattern(pattern, color) {
    if (pattern === 'none') {
        caseMaterial.map = null;
    } else if (pattern === 'stripes') {
        caseMaterial.map = createStripesTexture(color);
    } else if (pattern === 'dots') {
        caseMaterial.map = createDotsTexture(color);
    }
    caseMaterial.needsUpdate = true;
}

// State update
function updateState(key, value) {
    window.__3D_STATE__[key] = value;
    updateExportInfo();
}

function updateExportInfo() {
    const state = window.__3D_STATE__;
    const info = document.getElementById('exportInfo');
    info.innerHTML = `
        <strong>Color:</strong> ${state.caseColor}<br>
        <strong>Material:</strong> ${state.materialType}<br>
        <strong>Pattern:</strong> ${state.pattern}<br>
        <strong>Emblem:</strong> ${state.emblemVisible ? 'Visible' : 'Hidden'}<br>
        <strong>Emblem Scale:</strong> ${state.emblemScale}<br>
        <strong>Rotation Y:</strong> ${state.caseRotationY} rad<br>
        <strong>Rotating:</strong> ${state.isRotating}<br>
        <strong>Model Loaded:</strong> ${state.modelLoaded}<br>
        <strong>Roughness:</strong> ${state.roughness}<br>
        <strong>Metalness:</strong> ${state.metalness}
    `;
}

// UI Event Listeners
const colorPicker = document.getElementById('colorPicker');
colorPicker.addEventListener('input', (e) => {
    const color = e.target.value;
    caseMaterial.color.set(color);
    updateState('caseColor', color);
    // Re-apply pattern with new color
    if (window.__3D_STATE__.pattern !== 'none') {
        applyPattern(window.__3D_STATE__.pattern, color);
    }
});

const materialSelect = document.getElementById('materialSelect');
materialSelect.addEventListener('change', (e) => {
    const type = e.target.value;
    const preset = materialPresets[type];
    caseMaterial.roughness = preset.roughness;
    caseMaterial.metalness = preset.metalness;
    updateState('materialType', type);
    updateState('roughness', preset.roughness);
    updateState('metalness', preset.metalness);
});

// Pattern buttons
const patternButtons = ['patternNone', 'patternStripes', 'patternDots'];
const patternMap = { patternNone: 'none', patternStripes: 'stripes', patternDots: 'dots' };

patternButtons.forEach(btnId => {
    document.getElementById(btnId).addEventListener('click', () => {
        patternButtons.forEach(id => document.getElementById(id).classList.remove('active'));
        document.getElementById(btnId).classList.add('active');
        const pattern = patternMap[btnId];
        applyPattern(pattern, window.__3D_STATE__.caseColor);
        updateState('pattern', pattern);
    });
});

// Emblem toggle
const emblemToggle = document.getElementById('emblemToggle');
emblemToggle.addEventListener('change', (e) => {
    const visible = e.target.checked;
    if (emblemModel) {
        emblemModel.visible = visible;
    }
    updateState('emblemVisible', visible);
});

// Emblem scale
const emblemScale = document.getElementById('emblemScale');
const emblemScaleValue = document.getElementById('emblemScaleValue');
emblemScale.addEventListener('input', (e) => {
    const scale = parseFloat(e.target.value);
    emblemScaleValue.textContent = scale.toFixed(1);
    if (emblemModel) {
        emblemModel.scale.set(scale, scale, scale);
    }
    updateState('emblemScale', scale);
});

// Rotate button
const rotateBtn = document.getElementById('rotateBtn');
let rotationAnimation = null;

rotateBtn.addEventListener('click', () => {
    if (window.__3D_STATE__.isRotating) return;

    rotateBtn.disabled = true;
    updateState('isRotating', true);

    const startRotation = caseMesh.rotation.y;
    const targetRotation = startRotation + Math.PI;
    const duration = 1000;
    const startTime = performance.now();

    function animateRotation(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);

        // Ease in-out
        const eased = progress < 0.5
            ? 2 * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 2) / 2;

        caseMesh.rotation.y = startRotation + (Math.PI * eased);
        updateState('caseRotationY', parseFloat(caseMesh.rotation.y.toFixed(2)));

        if (progress < 1) {
            rotationAnimation = requestAnimationFrame(animateRotation);
        } else {
            caseMesh.rotation.y = targetRotation;
            updateState('caseRotationY', parseFloat(caseMesh.rotation.y.toFixed(2)));
            updateState('isRotating', false);
            rotateBtn.disabled = false;
        }
    }

    rotationAnimation = requestAnimationFrame(animateRotation);
});

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    controls.update();

    // Slowly rotate emblem if visible
    if (emblemModel && emblemModel.visible) {
        emblemModel.rotation.y += 0.01;
    }

    renderer.render(scene, camera);
}

// Initialize
updateExportInfo();
animate();
</script>
</body>
</html>
