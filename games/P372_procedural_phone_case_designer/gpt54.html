<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Phone Case Designer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #uiPanel {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      box-sizing: border-box;
      padding: 16px;
      background: rgba(10, 10, 20, 0.8);
      backdrop-filter: blur(6px);
      z-index: 10;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.08);
    }

    #uiPanel h2 {
      margin: 0 0 16px;
      font-size: 20px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .control-group input[type="color"],
    .control-group select,
    .control-group input[type="range"],
    .control-group button {
      width: 100%;
      box-sizing: border-box;
    }

    .control-group button {
      margin-bottom: 8px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #2d4059;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }

    .control-group button:hover {
      background: #3e5875;
    }

    .inline {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #exportInfo {
      min-height: 120px;
      white-space: pre-wrap;
      font-size: 12px;
      line-height: 1.4;
      padding: 10px;
      background: rgba(255,255,255,0.06);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="uiPanel">
      <h2>Phone Case Designer</h2>

      <div class="control-group">
        <label for="colorPicker">Case Color</label>
        <input type="color" id="colorPicker" value="#3498db" />
      </div>

      <div class="control-group">
        <label for="materialSelect">Material</label>
        <select id="materialSelect">
          <option value="matte" selected>matte</option>
          <option value="glossy">glossy</option>
          <option value="metallic">metallic</option>
        </select>
      </div>

      <div class="control-group">
        <label>Pattern</label>
        <button id="patternNone">None</button>
        <button id="patternStripes">Stripes</button>
        <button id="patternDots">Dots</button>
      </div>

      <div class="control-group">
        <label class="inline">
          <input type="checkbox" id="emblemToggle" />
          <span>Show 3D Emblem</span>
        </label>
      </div>

      <div class="control-group">
        <label for="emblemScale">Emblem Size</label>
        <input type="range" id="emblemScale" min="0.1" max="1.0" step="0.1" value="0.3" />
      </div>

      <div class="control-group">
        <button id="rotateBtn">Rotate 180°</button>
      </div>

      <div class="control-group">
        <label>Export Info</label>
        <div id="exportInfo"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const exportInfo = document.getElementById('exportInfo');

    const colorPicker = document.getElementById('colorPicker');
    const materialSelect = document.getElementById('materialSelect');
    const patternNone = document.getElementById('patternNone');
    const patternStripes = document.getElementById('patternStripes');
    const patternDots = document.getElementById('patternDots');
    const emblemToggle = document.getElementById('emblemToggle');
    const emblemScale = document.getElementById('emblemScale');
    const rotateBtn = document.getElementById('rotateBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.5, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const materialPresets = {
      matte: { roughness: 0.9, metalness: 0.0 },
      glossy: { roughness: 0.1, metalness: 0.2 },
      metallic: { roughness: 0.3, metalness: 0.9 }
    };

    window.__3D_STATE__ = {
      caseColor: '#3498db',
      materialType: 'matte',
      pattern: 'none',
      emblemVisible: false,
      emblemScale: 0.3,
      caseRotationY: 0,
      isRotating: false,
      modelLoaded: false,
      roughness: materialPresets.matte.roughness,
      metalness: materialPresets.matte.metalness
    };

    function round2(v) {
      return Math.round(v * 100) / 100;
    }

    function darkenHex(hex, factor = 0.65) {
      const color = new THREE.Color(hex);
      color.multiplyScalar(factor);
      return '#' + color.getHexString();
    }

    function createRoundedRectShape(width, height, radius) {
      const x = -width / 2;
      const y = -height / 2;
      const shape = new THREE.Shape();

      shape.moveTo(x + radius, y);
      shape.lineTo(x + width - radius, y);
      shape.quadraticCurveTo(x + width, y, x + width, y + radius);
      shape.lineTo(x + width, y + height - radius);
      shape.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
      shape.lineTo(x + radius, y + height);
      shape.quadraticCurveTo(x, y + height, x, y + height - radius);
      shape.lineTo(x, y + radius);
      shape.quadraticCurveTo(x, y, x + radius, y);

      return shape;
    }

    function createCaseGeometry() {
      const width = 1.5;
      const height = 3.0;
      const depth = 0.2;
      const radius = 0.18;

      const shape = createRoundedRectShape(width, height, radius);

      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: depth,
        bevelEnabled: true,
        bevelSegments: 3,
        steps: 1,
        bevelSize: 0.1,
        bevelThickness: 0.04,
        curveSegments: 24
      });

      geometry.center();
      geometry.computeVertexNormals();

      const uvAttr = geometry.attributes.uv;
      if (!uvAttr) {
        const pos = geometry.attributes.position;
        const uvs = [];
        const bbox = new THREE.Box3().setFromBufferAttribute(pos);
        const size = new THREE.Vector3();
        bbox.getSize(size);
        for (let i = 0; i < pos.count; i++) {
          const x = pos.getX(i);
          const y = pos.getY(i);
          uvs.push((x - bbox.min.x) / size.x, (y - bbox.min.y) / size.y);
        }
        geometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      }

      return geometry;
    }

    const caseMaterial = new THREE.MeshStandardMaterial({
      color: new THREE.Color('#3498db'),
      roughness: 0.4,
      metalness: 0.3
    });

    const caseMesh = new THREE.Mesh(createCaseGeometry(), caseMaterial);
    caseMesh.position.set(0, 0, 0);
    scene.add(caseMesh);

    let emblemModel = null;
    const emblemGroup = new THREE.Group();
    emblemGroup.position.set(0, 0.5, 0.15);
    emblemGroup.visible = false;
    scene.add(emblemGroup);

    const loader = new GLTFLoader();
    loader.load(
      '._BrainStem.glb',
      (gltf) => {
        emblemModel = gltf.scene;
        emblemModel.scale.setScalar(0.3);
        emblemModel.position.set(0, 0.5, 0);
        emblemGroup.add(emblemModel);

        window.__3D_STATE__.modelLoaded = true;
        updateEmblemTransform();
        syncState();
      },
      undefined,
      (error) => {
        console.warn('Failed to load ._BrainStem.glb', error);
        window.__3D_STATE__.modelLoaded = false;
        syncState();
      }
    );

    function generatePatternTexture(pattern, baseHex) {
      if (pattern === 'none') return null;

      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 1024;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (pattern === 'stripes') {
        const darker = darkenHex(baseHex, 0.55);
        const stripeCount = 5;
        const stripeHeight = canvas.height / stripeCount;

        for (let i = 0; i < stripeCount; i++) {
          ctx.fillStyle = i % 2 === 0 ? baseHex : darker;
          ctx.fillRect(0, i * stripeHeight, canvas.width, stripeHeight);
        }
      }

      if (pattern === 'dots') {
        const darker = darkenHex(baseHex, 0.55);
        ctx.fillStyle = baseHex;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const cols = 4;
        const rows = 6;
        const spacingX = canvas.width / cols;
        const spacingY = canvas.height / rows;
        const radius = Math.min(spacingX, spacingY) * 0.22;

        ctx.fillStyle = darker;
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const x = col * spacingX + spacingX / 2;
            const y = row * spacingY + spacingY / 2;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.ClampToEdgeWrapping;
      texture.wrapT = THREE.ClampToEdgeWrapping;
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.needsUpdate = true;
      return texture;
    }

    function applyMaterialPreset(type) {
      const preset = materialPresets[type];
      caseMaterial.roughness = preset.roughness;
      caseMaterial.metalness = preset.metalness;
      caseMaterial.needsUpdate = true;
    }

    function applyPattern(pattern) {
      const tex = generatePatternTexture(pattern, window.__3D_STATE__.caseColor);
      if (caseMaterial.map) {
        caseMaterial.map.dispose();
      }
      caseMaterial.map = tex;
      caseMaterial.color.set(window.__3D_STATE__.caseColor);
      caseMaterial.needsUpdate = true;
    }

    function updateEmblemTransform() {
      emblemGroup.visible = window.__3D_STATE__.emblemVisible;
      emblemGroup.position.set(0, 0.5, 0.15);
      if (emblemModel) {
        const s = window.__3D_STATE__.emblemScale;
        emblemModel.scale.setScalar(s);
        emblemModel.position.set(0, 0.5, 0);
      }
    }

    function syncState() {
      window.__3D_STATE__.caseRotationY = round2(caseMesh.rotation.y);
      window.__3D_STATE__.roughness = caseMaterial.roughness;
      window.__3D_STATE__.metalness = caseMaterial.metalness;

      exportInfo.textContent =
`caseColor: ${window.__3D_STATE__.caseColor}
materialType: ${window.__3D_STATE__.materialType}
pattern: ${window.__3D_STATE__.pattern}
emblemVisible: ${window.__3D_STATE__.emblemVisible}
emblemScale: ${window.__3D_STATE__.emblemScale}
caseRotationY: ${window.__3D_STATE__.caseRotationY}
isRotating: ${window.__3D_STATE__.isRotating}
modelLoaded: ${window.__3D_STATE__.modelLoaded}
roughness: ${window.__3D_STATE__.roughness}
metalness: ${window.__3D_STATE__.metalness}`;
    }

    function updateAllVisuals() {
      caseMaterial.color.set(window.__3D_STATE__.caseColor);
      applyMaterialPreset(window.__3D_STATE__.materialType);
      applyPattern(window.__3D_STATE__.pattern);
      updateEmblemTransform();
      syncState();
    }

    colorPicker.addEventListener('input', (e) => {
      window.__3D_STATE__.caseColor = e.target.value;
      updateAllVisuals();
    });

    materialSelect.addEventListener('change', (e) => {
      window.__3D_STATE__.materialType = e.target.value;
      applyMaterialPreset(window.__3D_STATE__.materialType);
      syncState();
    });

    patternNone.addEventListener('click', () => {
      window.__3D_STATE__.pattern = 'none';
      applyPattern('none');
      syncState();
    });

    patternStripes.addEventListener('click', () => {
      window.__3D_STATE__.pattern = 'stripes';
      applyPattern('stripes');
      syncState();
    });

    patternDots.addEventListener('click', () => {
      window.__3D_STATE__.pattern = 'dots';
      applyPattern('dots');
      syncState();
    });

    emblemToggle.addEventListener('change', (e) => {
      window.__3D_STATE__.emblemVisible = e.target.checked;
      updateEmblemTransform();
      syncState();
    });

    emblemScale.addEventListener('input', (e) => {
      window.__3D_STATE__.emblemScale = parseFloat(e.target.value);
      updateEmblemTransform();
      syncState();
    });

    let rotationAnim = null;

    rotateBtn.addEventListener('click', () => {
      if (window.__3D_STATE__.isRotating) return;

      rotationAnim = {
        start: performance.now(),
        duration: 1000,
        from: caseMesh.rotation.y,
        to: caseMesh.rotation.y + Math.PI
      };
      window.__3D_STATE__.isRotating = true;
      syncState();
    });

    function updateRotationAnimation(now) {
      if (!rotationAnim) return;

      const elapsed = now - rotationAnim.start;
      const t = Math.min(elapsed / rotationAnim.duration, 1);
      const eased = t < 0.5
        ? 2 * t * t
        : 1 - Math.pow(-2 * t + 2, 2) / 2;

      caseMesh.rotation.y = THREE.MathUtils.lerp(rotationAnim.from, rotationAnim.to, eased);
      emblemGroup.rotation.y = caseMesh.rotation.y;

      if (t >= 1) {
        caseMesh.rotation.y = rotationAnim.to;
        emblemGroup.rotation.y = caseMesh.rotation.y;
        rotationAnim = null;
        window.__3D_STATE__.isRotating = false;
      }

      syncState();
    }

    caseMesh.rotation.y = 0;
    emblemGroup.rotation.y = 0;
    updateAllVisuals();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate(now) {
      requestAnimationFrame(animate);
      controls.update();
      updateRotationAnimation(now);

      if (!window.__3D_STATE__.isRotating) {
        emblemGroup.rotation.y = caseMesh.rotation.y;
      }

      syncState();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
