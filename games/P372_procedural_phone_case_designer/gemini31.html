<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procedural Phone Case Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.9rem;
            color: #ccc;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            background: none;
        }
        select, button {
            width: 100%;
            padding: 8px;
            background: #2a2a40;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }
        select:focus, button:focus {
            outline: none;
            border-color: #3498db;
        }
        button:hover {
            background: #3a3a50;
        }
        .button-row {
            display: flex;
            gap: 5px;
        }
        .button-row button {
            flex: 1;
            font-size: 0.8rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-direction: row;
        }
        input[type="range"] {
            width: 100%;
        }
        #exportInfo {
            margin-top: auto;
            background: #111;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.75rem;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #a8ff60;
            max-height: 200px;
            overflow-y: auto;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="ui-panel">
        <h2>Case Designer</h2>
        
        <div class="control-group">
            <label for="colorPicker">Case Color</label>
            <input type="color" id="colorPicker" value="#3498db">
        </div>

        <div class="control-group">
            <label for="materialSelect">Material</label>
            <select id="materialSelect">
                <option value="matte" selected>Matte</option>
                <option value="glossy">Glossy</option>
                <option value="metallic">Metallic</option>
            </select>
        </div>

        <div class="control-group">
            <label>Pattern</label>
            <div class="button-row">
                <button id="patternNone">None</button>
                <button id="patternStripes">Stripes</button>
                <button id="patternDots">Dots</button>
            </div>
        </div>

        <div class="control-group checkbox-group">
            <input type="checkbox" id="emblemToggle">
            <label for="emblemToggle">Show 3D Emblem</label>
        </div>

        <div class="control-group">
            <label for="emblemScale">Emblem Size</label>
            <input type="range" id="emblemScale" min="0.1" max="1.0" step="0.1" value="0.3">
        </div>

        <div class="control-group">
            <button id="rotateBtn">Rotate 180°</button>
        </div>

        <div id="exportInfo"></div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            caseColor: '#3498db',
            materialType: 'matte',
            pattern: 'none',
            emblemVisible: false,
            emblemScale: 0.3,
            caseRotationY: 0,
            isRotating: false,
            modelLoaded: false,
            roughness: 0.9,
            metalness: 0.0
        };

        const materialPresets = {
            matte: { roughness: 0.9, metalness: 0.0 },
            glossy: { roughness: 0.1, metalness: 0.2 },
            metallic: { roughness: 0.3, metalness: 0.9 }
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Group for Case and Emblem
        const caseGroup = new THREE.Group();
        scene.add(caseGroup);

        // Phone Case Geometry
        const shape = new THREE.Shape();
        const width = 1.5, height = 3.0, radius = 0.2;
        const x = -width / 2, y = -height / 2;

        shape.moveTo(x, y + radius);
        shape.lineTo(x, y + height - radius);
        shape.quadraticCurveTo(x, y + height, x + radius, y + height);
        shape.lineTo(x + width - radius, y + height);
        shape.quadraticCurveTo(x + width, y + height, x + width, y + height - radius);
        shape.lineTo(x + width, y + radius);
        shape.quadraticCurveTo(x + width, y, x + width - radius, y);
        shape.lineTo(x + radius, y);
        shape.quadraticCurveTo(x, y, x, y + radius);

        const extrudeSettings = {
            depth: 0.2,
            bevelEnabled: true,
            bevelSegments: 3,
            bevelSteps: 2,
            bevelSize: 0.1,
            bevelThickness: 0.1
        };

        const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
        geometry.center();

        const material = new THREE.MeshStandardMaterial({
            color: window.__3D_STATE__.caseColor,
            roughness: window.__3D_STATE__.roughness,
            metalness: window.__3D_STATE__.metalness
        });

        const phoneCase = new THREE.Mesh(geometry, material);
        caseGroup.add(phoneCase);

        // GLTF Loader
        const loader = new GLTFLoader();
        let emblemModel = null;
        
        // Using a public Khronos sample model as a reliable fallback for '._BrainStem.glb'
        const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BrainStem/glTF-Binary/BrainStem.glb';
        
        loader.load(modelUrl, (gltf) => {
            emblemModel = gltf.scene;
            emblemModel.scale.set(0.3, 0.3, 0.3);
            emblemModel.position.set(0, 0.5, 0.15);
            emblemModel.visible = false;
            caseGroup.add(emblemModel);
            
            window.__3D_STATE__.modelLoaded = true;
            updateStateDisplay();
        });

        // Texture Generation
        function getDarkerColor(hex) {
            const c = new THREE.Color(hex);
            c.multiplyScalar(0.6);
            return '#' + c.getHexString();
        }

        function generateTexture(type, colorHex) {
            if (type === 'none') return null;

            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            if (type === 'stripes') {
                const stripeWidth = 512 / 5;
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = (i % 2 === 0) ? colorHex : getDarkerColor(colorHex);
                    ctx.fillRect(i * stripeWidth, 0, stripeWidth, 512);
                }
            } else if (type === 'dots') {
                ctx.fillStyle = colorHex;
                ctx.fillRect(0, 0, 512, 512);
                ctx.fillStyle = getDarkerColor(colorHex);
                const cols = 4, rows = 6;
                const cellW = 512 / cols;
                const cellH = 512 / rows;
                const r = Math.min(cellW, cellH) * 0.3;
                
                for (let i = 0; i < cols; i++) {
                    for (let j = 0; j < rows; j++) {
                        ctx.beginPath();
                        ctx.arc(i * cellW + cellW / 2, j * cellH + cellH / 2, r, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            
            // Adjust UV mapping scale for ExtrudeGeometry
            texture.repeat.set(0.5, 0.25);
            texture.offset.set(0.25, 0.375);
            
            return texture;
        }

        // Apply State to 3D Scene
        function applyState() {
            // Material properties
            material.color.set(window.__3D_STATE__.caseColor);
            material.roughness = window.__3D_STATE__.roughness;
            material.metalness = window.__3D_STATE__.metalness;

            // Pattern
            const newTexture = generateTexture(window.__3D_STATE__.pattern, window.__3D_STATE__.caseColor);
            if (material.map) material.map.dispose();
            material.map = newTexture;
            material.needsUpdate = true;

            // Emblem
            if (emblemModel) {
                emblemModel.visible = window.__3D_STATE__.emblemVisible;
                const s = window.__3D_STATE__.emblemScale;
                emblemModel.scale.set(s, s, s);
            }

            updateStateDisplay();
        }

        function updateStateDisplay() {
            const infoDiv = document.getElementById('exportInfo');
            infoDiv.textContent = JSON.stringify(window.__3D_STATE__, null, 2);
        }

        // UI Event Listeners
        document.getElementById('colorPicker').addEventListener('input', (e) => {
            window.__3D_STATE__.caseColor = e.target.value;
            applyState();
        });

        document.getElementById('materialSelect').addEventListener('change', (e) => {
            const type = e.target.value;
            window.__3D_STATE__.materialType = type;
            window.__3D_STATE__.roughness = materialPresets[type].roughness;
            window.__3D_STATE__.metalness = materialPresets[type].metalness;
            applyState();
        });

        document.getElementById('patternNone').addEventListener('click', () => {
            window.__3D_STATE__.pattern = 'none';
            applyState();
        });

        document.getElementById('patternStripes').addEventListener('click', () => {
            window.__3D_STATE__.pattern = 'stripes';
            applyState();
        });

        document.getElementById('patternDots').addEventListener('click', () => {
            window.__3D_STATE__.pattern = 'dots';
            applyState();
        });

        document.getElementById('emblemToggle').addEventListener('change', (e) => {
            window.__3D_STATE__.emblemVisible = e.target.checked;
            applyState();
        });

        document.getElementById('emblemScale').addEventListener('input', (e) => {
            window.__3D_STATE__.emblemScale = parseFloat(e.target.value);
            applyState();
        });

        // Rotation Animation Logic
        let animStartRot = 0;
        let animTargetRot = 0;
        let animStartTime = 0;
        const animDuration = 1000;

        document.getElementById('rotateBtn').addEventListener('click', () => {
            if (window.__3D_STATE__.isRotating) return;
            
            window.__3D_STATE__.isRotating = true;
            animStartRot = caseGroup.rotation.y;
            animTargetRot = animStartRot + Math.PI;
            animStartTime = performance.now();
            updateStateDisplay();
        });

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initial setup
        applyState();

        // Render Loop
        function animate(time) {
            requestAnimationFrame(animate);

            controls.update();

            if (window.__3D_STATE__.isRotating) {
                const elapsed = time - animStartTime;
                const progress = Math.min(elapsed / animDuration, 1.0);
                
                // Ease in-out quad
                const ease = progress < 0.5 ? 2 * progress * progress : 1 - Math.pow(-2 * progress + 2, 2) / 2;
                
                caseGroup.rotation.y = animStartRot + (animTargetRot - animStartRot) * ease;
                window.__3D_STATE__.caseRotationY = parseFloat(caseGroup.rotation.y.toFixed(2));
                
                if (progress >= 1.0) {
                    window.__3D_STATE__.isRotating = false;
                }
                updateStateDisplay();
            }

            renderer.render(scene, camera);
        }

        animate(performance.now());
    </script>
</body>
</html>
