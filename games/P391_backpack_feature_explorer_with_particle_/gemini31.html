<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Feature Explorer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }
        .pointer-events-auto {
            pointer-events: auto;
        }
        #title {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        #auto-rotate-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        #auto-rotate-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        #variants-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
        }
        .variant-btn {
            height: 40px;
            padding: 0 20px;
            border-radius: 20px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }
        .variant-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }
        .variant-btn.active {
            background: white;
            color: #1a1a2e;
        }
        #tooltip {
            position: absolute;
            top: 50%;
            right: 10%;
            transform: translateY(-50%);
            width: 200px;
            background: rgba(10, 10, 20, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 10px;
            opacity: 0;
            transition: opacity 0.3s;
            backdrop-filter: blur(5px);
        }
        #tooltip h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
        }
        #tooltip p {
            margin: 0;
            font-size: 14px;
            color: #ccc;
        }
        #particle-count {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
        }
        #instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: bold;
            z-index: 3;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="loading">Loading Asset...</div>

    <div id="ui-layer">
        <div id="title">EXPLORER PRO</div>
        <button id="auto-rotate-btn" class="pointer-events-auto">Auto-Rotate: ON</button>
        
        <div id="tooltip">
            <h3 id="tooltip-title">Feature</h3>
            <p id="tooltip-desc">Description goes here.</p>
        </div>

        <div id="instructions">Press 'E' to toggle Explode View</div>

        <div id="variants-container" class="pointer-events-auto">
            <button class="variant-btn active" data-variant="Midnight">Midnight</button>
            <button class="variant-btn" data-variant="Beach">Beach</button>
            <button class="variant-btn" data-variant="Mesh">Mesh</button>
        </div>

        <div id="particle-count">Particles: 0</div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.136.0/build/three.module.js';
        import { OrbitControls } from 'https://unpkg.com/three@0.136.0/examples/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from 'https://unpkg.com/three@0.136.0/examples/jsm/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            autoRotate: true,
            activeHotspot: null,
            currentVariant: 'Midnight',
            particlesActive: 0,
            exploded: false,
            hotspotClickCount: 0,
            cameraDistance: 4.0,
            platformVisible: true
        };

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.5, 4);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = window.__3D_STATE__.autoRotate;
        controls.autoRotateSpeed = 2.0;
        controls.target.set(0, 0, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(3, 5, 3);
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0x4fc3f7, 0.6);
        pointLight.position.set(-2, 3, -2);
        scene.add(pointLight);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64);
        const platformMat = new THREE.MeshStandardMaterial({ 
            color: 0x222233, 
            metalness: 0.8, 
            roughness: 0.2 
        });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = -0.5;
        scene.add(platform);

        // --- MODEL LOADING ---
        let productModel = null;
        let gltfData = null;
        const meshesForExplode = [];
        const loader = new GLTFLoader();
        
        // Using a reliable CDN for the requested sample model
        const modelUrl = 'https://modelviewer.dev/shared-assets/models/glTF-Sample-Models/2.0/MaterialsVariantsShoe/glTF-Binary/MaterialsVariantsShoe.glb';

        loader.load(modelUrl, (gltf) => {
            gltfData = gltf;
            productModel = gltf.scene;
            
            // Center and scale
            const box = new THREE.Box3().setFromObject(productModel);
            const center = box.getCenter(new THREE.Vector3());
            productModel.position.sub(center);
            
            const wrapper = new THREE.Group();
            wrapper.add(productModel);
            wrapper.scale.set(8, 8, 8);
            wrapper.position.y = 0.2; // Lift slightly above platform
            scene.add(wrapper);

            // Prepare for explode view
            productModel.traverse((child) => {
                if (child.isMesh) {
                    child.userData.originalPosition = child.position.clone();
                    
                    // Calculate local direction from center for explosion
                    child.geometry.computeBoundingBox();
                    const meshCenter = child.geometry.boundingBox.getCenter(new THREE.Vector3());
                    child.userData.explodeDirection = meshCenter.clone().normalize();
                    
                    // Save original material color for fallback variant switching
                    if (child.material) {
                        child.material = child.material.clone(); // Ensure unique materials
                        child.userData.originalColor = child.material.color ? child.material.color.clone() : new THREE.Color(0xffffff);
                    }
                    
                    meshesForExplode.push(child);
                }
            });

            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.opacity = '0';
            setTimeout(() => document.getElementById('loading').remove(), 500);

        }, undefined, (error) => {
            console.error('Error loading model:', error);
            document.getElementById('loading').innerText = 'Error loading asset.';
        });

        // --- HOTSPOTS ---
        const hotspotsData = [
            { id: 'Material', pos: new THREE.Vector3(0.5, 1.2, 0.3), color: 0xff6b6b, desc: 'Premium weather-resistant fabric.' },
            { id: 'Comfort', pos: new THREE.Vector3(-0.4, 0.6, 0.5), color: 0x4ecdc4, desc: 'Ergonomic padding for all-day wear.' },
            { id: 'Sole', pos: new THREE.Vector3(0.1, 0.2, 0.8), color: 0xffe66d, desc: 'High-traction durable base.' }
        ];

        const hotspots = [];
        const hotspotGeo = new THREE.SphereGeometry(0.08, 32, 32);

        hotspotsData.forEach(data => {
            const mat = new THREE.MeshBasicMaterial({ color: data.color });
            const mesh = new THREE.Mesh(hotspotGeo, mat);
            mesh.position.copy(data.pos);
            mesh.userData = { id: data.id, color: data.color, desc: data.desc };
            scene.add(mesh);
            hotspots.push(mesh);
        });

        // --- PARTICLE SYSTEM ---
        const PARTICLE_COUNT = 200;
        const particleGeo = new THREE.BufferGeometry();
        const pPositions = new Float32Array(PARTICLE_COUNT * 3);
        const pColors = new Float32Array(PARTICLE_COUNT * 3);
        const pVelocities = [];
        const pLifetimes = new Float32Array(PARTICLE_COUNT);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            pPositions[i*3] = 0; pPositions[i*3+1] = 0; pPositions[i*3+2] = 0;
            pColors[i*3] = 1; pColors[i*3+1] = 1; pColors[i*3+2] = 1;
            pVelocities.push(new THREE.Vector3());
            pLifetimes[i] = 0;
        }

        particleGeo.setAttribute('position', new THREE.BufferAttribute(pPositions, 3));
        particleGeo.setAttribute('color', new THREE.BufferAttribute(pColors, 3));

        const particleMat = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 1,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        function triggerParticles(origin, colorHex) {
            const color = new THREE.Color(colorHex);
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                pPositions[i*3] = origin.x;
                pPositions[i*3+1] = origin.y;
                pPositions[i*3+2] = origin.z;
                
                pColors[i*3] = color.r;
                pColors[i*3+1] = color.g;
                pColors[i*3+2] = color.b;

                // Spherical random velocity
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const speed = 1.5 + Math.random() * 2.0;

                pVelocities[i].set(
                    Math.sin(phi) * Math.cos(theta) * speed,
                    Math.sin(phi) * Math.sin(theta) * speed,
                    Math.cos(phi) * speed
                );

                pLifetimes[i] = 2.0; // 2 seconds lifetime
            }
            particleGeo.attributes.position.needsUpdate = true;
            particleGeo.attributes.color.needsUpdate = true;
            particleMat.opacity = 1;
        }

        // --- INTERACTION ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            // Ignore clicks on UI elements
            if(event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(hotspots);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                const data = hit.userData;
                
                window.__3D_STATE__.activeHotspot = data.id;
                window.__3D_STATE__.hotspotClickCount++;
                
                // Trigger Particles
                triggerParticles(hit.position, data.color);

                // Update DOM Tooltip
                const tooltip = document.getElementById('tooltip');
                document.getElementById('tooltip-title').innerText = data.id;
                document.getElementById('tooltip-title').style.color = '#' + data.color.toString(16).padStart(6, '0');
                document.getElementById('tooltip-desc').innerText = data.desc;
                tooltip.style.opacity = '1';
            } else {
                window.__3D_STATE__.activeHotspot = null;
                document.getElementById('tooltip').style.opacity = '0';
            }
        });

        // --- UI CONTROLS ---
        const autoRotateBtn = document.getElementById('auto-rotate-btn');
        autoRotateBtn.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            controls.autoRotate = window.__3D_STATE__.autoRotate;
            autoRotateBtn.innerText = `Auto-Rotate: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
        });

        const variantBtns = document.querySelectorAll('.variant-btn');
        const variantColors = {
            'Midnight': 0x2c3e50,
            'Beach': 0xe8d5b7,
            'Mesh': 0x95a5a6
        };

        variantBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const variantName = e.target.getAttribute('data-variant');
                window.__3D_STATE__.currentVariant = variantName;
                
                variantBtns.forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');

                if (productModel) {
                    // Attempt to use KHR_materials_variants if available via GLTFLoader functions
                    let variantSwitched = false;
                    if (gltfData && gltfData.functions && gltfData.functions.selectVariant) {
                        // The sample model variants are usually lowercase
                        const gltfVariantName = variantName.toLowerCase();
                        try {
                            gltfData.functions.selectVariant(productModel, gltfVariantName);
                            variantSwitched = true;
                        } catch(err) {
                            console.warn("Variant not found in extension, falling back to color change.");
                        }
                    }

                    // Fallback: Change base color
                    if (!variantSwitched) {
                        const targetColor = new THREE.Color(variantColors[variantName]);
                        productModel.traverse((child) => {
                            if (child.isMesh && child.material && child.material.color) {
                                child.material.color.copy(targetColor);
                            }
                        });
                    }
                }
            });
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'e') {
                window.__3D_STATE__.exploded = !window.__3D_STATE__.exploded;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            // Pulse Hotspots
            hotspots.forEach(h => {
                const scale = 1.0 + 0.2 * Math.sin(time * 3.0 + h.position.x);
                h.scale.set(scale, scale, scale);
            });

            // Update Particles
            let activeParticles = 0;
            const positions = particleGeo.attributes.position.array;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                if (pLifetimes[i] > 0) {
                    pLifetimes[i] -= delta;
                    
                    positions[i*3] += pVelocities[i].x * delta;
                    positions[i*3+1] += pVelocities[i].y * delta;
                    positions[i*3+2] += pVelocities[i].z * delta;
                    
                    activeParticles++;
                } else if (pLifetimes[i] < 0) {
                    pLifetimes[i] = 0;
                    // Move offscreen when dead
                    positions[i*3] = 999; 
                }
            }
            
            if (activeParticles > 0) {
                particleGeo.attributes.position.needsUpdate = true;
                // Fade out based on max lifetime
                let maxLife = 0;
                for(let i=0; i<PARTICLE_COUNT; i++) if(pLifetimes[i] > maxLife) maxLife = pLifetimes[i];
                particleMat.opacity = Math.max(0, maxLife / 2.0);
            }
            
            window.__3D_STATE__.particlesActive = activeParticles;
            document.getElementById('particle-count').innerText = `Particles: ${activeParticles}`;

            // Explode View Animation
            if (meshesForExplode.length > 0) {
                meshesForExplode.forEach(mesh => {
                    const targetPos = mesh.userData.originalPosition.clone();
                    if (window.__3D_STATE__.exploded) {
                        targetPos.add(mesh.userData.explodeDirection.clone().multiplyScalar(0.5));
                    }
                    mesh.position.lerp(targetPos, 10 * delta);
                });
            }

            // Update State
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
