<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Backpack Feature Explorer</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, #1a1a2e, #16213e);
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ui-title {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 1px;
      z-index: 10;
      user-select: none;
    }

    .ui-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: background 0.2s ease;
    }

    .ui-toggle:hover {
      background: rgba(255,255,255,0.18);
    }

    .variant-bar {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
    }

    .variant-btn {
      height: 40px;
      padding: 0 20px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      color: white;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      backdrop-filter: blur(8px);
      transition: all 0.2s ease;
      font-weight: 600;
    }

    .variant-btn:hover,
    .variant-btn.active {
      background: rgba(255,255,255,0.24);
      transform: translateY(-1px);
    }

    .tooltip {
      position: absolute;
      width: 200px;
      background: rgba(10, 10, 20, 0.82);
      color: white;
      border-radius: 12px;
      padding: 14px;
      z-index: 10;
      display: none;
      pointer-events: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .tooltip h3 {
      margin: 0 0 8px 0;
      font-size: 16px;
    }

    .tooltip p {
      margin: 0;
      font-size: 13px;
      line-height: 1.4;
      color: rgba(255,255,255,0.88);
    }

    .particle-indicator {
      position: absolute;
      left: 20px;
      bottom: 20px;
      color: white;
      z-index: 10;
      font-size: 14px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 8px 12px;
      backdrop-filter: blur(8px);
    }

    .hint {
      position: absolute;
      bottom: 72px;
      left: 20px;
      color: rgba(255,255,255,0.75);
      z-index: 10;
      font-size: 12px;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ui-title">EXPLORER PRO</div>
    <button id="rotateToggle" class="ui-toggle">Auto-Rotate: ON</button>

    <div id="tooltip" class="tooltip">
      <h3 id="tooltipTitle">Material</h3>
      <p id="tooltipDesc"></p>
    </div>

    <div class="variant-bar">
      <button class="variant-btn active" data-variant="Midnight">Midnight</button>
      <button class="variant-btn" data-variant="Beach">Beach</button>
      <button class="variant-btn" data-variant="Mesh">Mesh</button>
    </div>

    <div class="particle-indicator" id="particleIndicator">Particles: 0</div>
    <div class="hint">Press <strong>E</strong> to toggle explode view</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.1/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/loaders/GLTFLoader.js';
    import { KHRMaterialsVariantsExtension } from 'https://cdn.jsdelivr.net/npm/three@0.160.1/examples/jsm/loaders/gltf/extensions/KHRMaterialsVariantsExtension.js';

    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');
    const tooltipTitle = document.getElementById('tooltipTitle');
    const tooltipDesc = document.getElementById('tooltipDesc');
    const rotateToggle = document.getElementById('rotateToggle');
    const particleIndicator = document.getElementById('particleIndicator');
    const variantButtons = [...document.querySelectorAll('.variant-btn')];

    const descriptions = {
      Material: 'Premium outer construction designed for durability, weather resistance, and a refined urban aesthetic.',
      Comfort: 'Ergonomic support concept focused on lighter carry feel, adaptable fit, and all-day wearability.',
      Sole: 'Stand-in base structure representing reinforced bottom protection and traction-inspired stability.'
    };

    window.__3D_STATE__ = {
      modelLoaded: false,
      autoRotate: true,
      activeHotspot: null,
      currentVariant: 'Midnight',
      particlesActive: 0,
      exploded: false,
      hotspotClickCount: 0,
      cameraDistance: 4.0,
      platformVisible: true
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, 4);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 2.0;
    controls.target.set(0, 0.8, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(3, 5, 3);
    scene.add(dirLight);

    const pointLight = new THREE.PointLight('#4fc3f7', 0.6, 20);
    pointLight.position.set(-2, 3, -2);
    scene.add(pointLight);

    const platform = new THREE.Mesh(
      new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64),
      new THREE.MeshStandardMaterial({
        color: '#2a2f3a',
        metalness: 0.85,
        roughness: 0.25
      })
    );
    platform.position.set(0, -0.35, 0);
    scene.add(platform);

    let model = null;
    let modelRoot = new THREE.Group();
    scene.add(modelRoot);

    const loader = new GLTFLoader();
    loader.register((parser) => new KHRMaterialsVariantsExtension(parser));

    let variantExtension = null;
    const meshMaterials = [];
    const explodeParts = [];

    loader.load(
      'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/MaterialsVariantsShoe/glTF-Binary/MaterialsVariantsShoe.glb',
      (gltf) => {
        model = gltf.scene;
        model.scale.setScalar(8);

        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        model.position.sub(center);
        model.position.y += size.y * 0.5 - 0.3;

        modelRoot.add(model);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = false;
            child.receiveShadow = true;

            if (Array.isArray(child.material)) {
              child.material.forEach((mat) => {
                if (mat && mat.color) meshMaterials.push(mat);
              });
            } else if (child.material && child.material.color) {
              meshMaterials.push(child.material);
            }

            const localPos = child.position.clone();
            const dir = localPos.lengthSq() > 0.0001
              ? localPos.clone().normalize()
              : new THREE.Vector3(
                  (Math.random() - 0.5) * 0.5,
                  (Math.random() - 0.2) * 0.5,
                  (Math.random() - 0.5) * 0.5
                ).normalize();

            explodeParts.push({
              mesh: child,
              original: child.position.clone(),
              exploded: child.position.clone().add(dir.multiplyScalar(0.5)),
              t: 0
            });
          }
        });

        variantExtension = gltf.userData?.gltfExtensions?.KHR_materials_variants || null;
        applyVariant('Midnight');

        window.__3D_STATE__.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load model:', err);
      }
    );

    const hotspotData = [
      { position: new THREE.Vector3(0.5, 1.2, 0.3), color: '#ff6b6b', label: 'Material' },
      { position: new THREE.Vector3(-0.4, 0.6, 0.5), color: '#4ecdc4', label: 'Comfort' },
      { position: new THREE.Vector3(0.1, 0.2, 0.8), color: '#ffe66d', label: 'Sole' }
    ];

    const hotspotGroup = new THREE.Group();
    scene.add(hotspotGroup);

    const hotspots = hotspotData.map((data, i) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 24, 24),
        new THREE.MeshStandardMaterial({
          color: data.color,
          emissive: new THREE.Color(data.color),
          emissiveIntensity: 0.6,
          metalness: 0.2,
          roughness: 0.3
        })
      );
      mesh.position.copy(data.position);
      mesh.userData = { ...data, index: i };
      hotspotGroup.add(mesh);
      return mesh;
    });

    const particleCount = 200;
    const particlePositions = new Float32Array(particleCount * 3);
    const particleColors = new Float32Array(particleCount * 3);
    const particleSizes = new Float32Array(particleCount);
    const particleLife = new Float32Array(particleCount);
    const particleVelocity = Array.from({ length: particleCount }, () => new THREE.Vector3());
    const particleOrigin = Array.from({ length: particleCount }, () => new THREE.Vector3());

    const particlesGeometry = new THREE.BufferGeometry();
    particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
    particlesGeometry.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));
    particlesGeometry.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.06,
      vertexColors: true,
      transparent: true,
      opacity: 0,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(particlesGeometry, particleMaterial);
    scene.add(particles);

    function triggerParticleBurst(position, colorHex) {
      const color = new THREE.Color(colorHex);
      for (let i = 0; i < particleCount; i++) {
        particleOrigin[i].copy(position);

        const dir = new THREE.Vector3(
          Math.random() * 2 - 1,
          Math.random() * 2 - 1,
          Math.random() * 2 - 1
        ).normalize();

        const speed = 0.6 + Math.random() * 1.4;
        particleVelocity[i].copy(dir.multiplyScalar(speed));

        particlePositions[i * 3 + 0] = position.x;
        particlePositions[i * 3 + 1] = position.y;
        particlePositions[i * 3 + 2] = position.z;

        particleColors[i * 3 + 0] = color.r;
        particleColors[i * 3 + 1] = color.g;
        particleColors[i * 3 + 2] = color.b;

        particleSizes[i] = 1;
        particleLife[i] = 2.0;
      }

      particleMaterial.opacity = 1.0;
      particlesGeometry.attributes.position.needsUpdate = true;
      particlesGeometry.attributes.color.needsUpdate = true;
    }

    function updateParticles(dt) {
      let active = 0;

      for (let i = 0; i < particleCount; i++) {
        if (particleLife[i] > 0) {
          particleLife[i] -= dt;

          const ageRatio = Math.max(particleLife[i] / 2.0, 0);
          particlePositions[i * 3 + 0] += particleVelocity[i].x * dt;
          particlePositions[i * 3 + 1] += particleVelocity[i].y * dt;
          particlePositions[i * 3 + 2] += particleVelocity[i].z * dt;

          particleVelocity[i].multiplyScalar(0.985);

          if (particleLife[i] <= 0) {
            particlePositions[i * 3 + 0] = 9999;
            particlePositions[i * 3 + 1] = 9999;
            particlePositions[i * 3 + 2] = 9999;
          } else {
            active++;
          }

          particleMaterial.opacity = ageRatio;
        }
      }

      if (active === 0) particleMaterial.opacity = 0;

      particlesGeometry.attributes.position.needsUpdate = true;
      window.__3D_STATE__.particlesActive = active;
      particleIndicator.textContent = `Particles: ${active}`;
    }

    function showTooltip(label) {
      tooltipTitle.textContent = label;
      tooltipDesc.textContent = descriptions[label] || '';
      tooltip.style.display = 'block';
      tooltip.style.left = `${window.innerWidth * 0.68}px`;
      tooltip.style.top = `${window.innerHeight * 0.38}px`;
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    function setActiveHotspot(mesh) {
      if (!mesh) return;

      const { label, color } = mesh.userData;
      window.__3D_STATE__.activeHotspot = label;
      window.__3D_STATE__.hotspotClickCount += 1;
      showTooltip(label);
      triggerParticleBurst(mesh.position, color);

      hotspots.forEach(h => {
        h.material.emissiveIntensity = h === mesh ? 1.2 : 0.6;
      });
    }

    function applyFallbackColor(hex) {
      meshMaterials.forEach((mat) => {
        if (mat && mat.color) {
          mat.color.set(hex);
          mat.needsUpdate = true;
        }
      });
    }

    function applyVariant(name) {
      const fallbackMap = {
        Midnight: '#2c3e50',
        Beach: '#e8d5b7',
        Mesh: '#95a5a6'
      };

      let applied = false;

      try {
        if (variantExtension && model) {
          const available = variantExtension.variants?.map(v => v.name) || [];
          if (available.includes(name)) {
            model.traverse((obj) => {
              if (obj.isMesh) {
                KHRMaterialsVariantsExtension.selectVariant(obj, name);
              }
            });
            applied = true;
          }
        }
      } catch (e) {
        console.warn('Variant selection fallback used:', e);
      }

      if (!applied) {
        applyFallbackColor(fallbackMap[name]);
      }

      window.__3D_STATE__.currentVariant = name;
      variantButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.variant === name);
      });
    }

    variantButtons.forEach(btn => {
      btn.addEventListener('click', () => applyVariant(btn.dataset.variant));
    });

    rotateToggle.addEventListener('click', () => {
      controls.autoRotate = !controls.autoRotate;
      window.__3D_STATE__.autoRotate = controls.autoRotate;
      rotateToggle.textContent = `Auto-Rotate: ${controls.autoRotate ? 'ON' : 'OFF'}`;
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(hotspots, false);

      if (hits.length > 0) {
        setActiveHotspot(hits[0].object);
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    let explodeTarget = false;

    window.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'e') {
        explodeTarget = !explodeTarget;
        window.__3D_STATE__.exploded = explodeTarget;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      const dt = Math.min(clock.getDelta(), 0.033);

      hotspots.forEach((hotspot, i) => {
        const pulse = 1 + Math.sin(elapsed * 3 + i) * 0.2;
        hotspot.scale.setScalar(pulse);
      });

      for (const part of explodeParts) {
        part.t = THREE.MathUtils.lerp(part.t, explodeTarget ? 1 : 0, dt / 0.5 * 0.15 + 0.08);
        part.mesh.position.lerpVectors(part.original, part.exploded, part.t);
      }

      updateParticles(dt);
      controls.update();
      renderer.render(scene, camera);

      window.__3D_STATE__.autoRotate = controls.autoRotate;
      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.platformVisible = platform.visible;
    }

    hideTooltip();
    animate();
  </script>
</body>
</html>
