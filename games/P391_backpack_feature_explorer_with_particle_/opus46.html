<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Explorer Pro - Product Feature Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #product-title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    letter-spacing: 3px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    z-index: 10;
  }
  #product-title span {
    display: block;
    font-size: 12px;
    font-weight: normal;
    letter-spacing: 1px;
    color: #4fc3f7;
    margin-top: 4px;
  }

  #auto-rotate-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    padding: 10px 18px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    z-index: 10;
  }
  #auto-rotate-btn:hover {
    background: rgba(255,255,255,0.2);
    border-color: rgba(255,255,255,0.5);
  }

  #variant-buttons {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .variant-btn {
    height: 40px;
    padding: 0 20px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s;
    letter-spacing: 1px;
  }
  .variant-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-2px);
  }
  .variant-btn.active {
    background: rgba(79, 195, 247, 0.3);
    border-color: #4fc3f7;
    box-shadow: 0 0 15px rgba(79, 195, 247, 0.3);
  }

  #tooltip {
    position: absolute;
    top: 50%;
    right: 40px;
    transform: translateY(-50%);
    width: 200px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 20px;
    color: white;
    display: none;
    z-index: 10;
    transition: opacity 0.3s;
  }
  #tooltip.visible { display: block; }
  #tooltip h3 {
    font-size: 16px;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  #tooltip p {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(255,255,255,0.7);
  }
  #tooltip .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    vertical-align: middle;
  }
  #tooltip .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    font-size: 16px;
  }

  #particle-count {
    position: absolute;
    bottom: 20px;
    left: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    z-index: 10;
    font-family: monospace;
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 16px;
    z-index: 20;
    letter-spacing: 2px;
  }
  #loading .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #4fc3f7;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #explode-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    z-index: 10;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div id="product-title">EXPLORER PRO<span>Feature Explorer</span></div>
<button id="auto-rotate-btn">Auto-Rotate: ON</button>

<div id="variant-buttons">
  <button class="variant-btn active" data-variant="Midnight">Midnight</button>
  <button class="variant-btn" data-variant="Beach">Beach</button>
  <button class="variant-btn" data-variant="Mesh">Mesh</button>
</div>

<div id="tooltip">
  <button class="close-btn" id="tooltip-close">&times;</button>
  <h3><span class="dot" id="tooltip-dot"></span><span id="tooltip-label"></span></h3>
  <p id="tooltip-desc"></p>
</div>

<div id="particle-count">Particles: 0</div>
<div id="explode-hint">Press 'E' to toggle explode view</div>

<div id="loading"><div class="spinner"></div>Loading Model...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
  modelLoaded: false,
  autoRotate: true,
  activeHotspot: null,
  currentVariant: 'Midnight',
  particlesActive: 0,
  exploded: false,
  hotspotClickCount: 0,
  cameraDistance: 4.0,
  platformVisible: true
};

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');

// Camera
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 4);
camera.lookAt(0, 0, 0);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 2.0;
controls.target.set(0, 0.5, 0);
controls.minDistance = 2;
controls.maxDistance = 10;

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(3, 5, 3);
dirLight.castShadow = true;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x4fc3f7, 0.6);
pointLight.position.set(-2, 3, -2);
scene.add(pointLight);

// Platform
const platformGeom = new THREE.CylinderGeometry(1.5, 1.5, 0.05, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x111122,
  metalness: 0.9,
  roughness: 0.3
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -0.025;
scene.add(platform);

// Hotspot data
const hotspotData = [
  { position: new THREE.Vector3(0.5, 1.2, 0.3), color: '#ff6b6b', label: 'Material', desc: 'Premium water-resistant fabric with reinforced stitching. Designed to withstand extreme weather conditions while maintaining breathability.' },
  { position: new THREE.Vector3(-0.4, 0.6, 0.5), color: '#4ecdc4', label: 'Comfort', desc: 'Ergonomic padding system with memory foam inserts. Adjustable straps distribute weight evenly across shoulders and back.' },
  { position: new THREE.Vector3(0.1, 0.2, 0.8), color: '#ffe66d', label: 'Sole', desc: 'Anti-slip rubber base with shock absorption technology. Protects contents from impact and provides stable ground placement.' }
];

// Create hotspots
const hotspots = [];
const hotspotGroup = new THREE.Group();
scene.add(hotspotGroup);

hotspotData.forEach((data) => {
  const geom = new THREE.SphereGeometry(0.08, 16, 16);
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(data.color),
    emissive: new THREE.Color(data.color),
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.9
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.copy(data.position);
  mesh.userData = { label: data.label, color: data.color, desc: data.desc };
  hotspotGroup.add(mesh);
  hotspots.push(mesh);

  // Outer ring
  const ringGeom = new THREE.RingGeometry(0.1, 0.13, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: new THREE.Color(data.color),
    transparent: true,
    opacity: 0.4,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeom, ringMat);
  ring.position.copy(data.position);
  ring.lookAt(camera.position);
  ring.userData.isRing = true;
  hotspotGroup.add(ring);
});

// Particle system
const PARTICLE_COUNT = 200;
const particleGeom = new THREE.BufferGeometry();
const particlePositions = new Float32Array(PARTICLE_COUNT * 3);
const particleColors = new Float32Array(PARTICLE_COUNT * 3);
const particleOpacities = new Float32Array(PARTICLE_COUNT);
const particleVelocities = [];
const particleLifetimes = new Float32Array(PARTICLE_COUNT);

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particlePositions[i * 3] = 0;
  particlePositions[i * 3 + 1] = 0;
  particlePositions[i * 3 + 2] = 0;
  particleOpacities[i] = 0;
  particleLifetimes[i] = 0;
  particleVelocities.push(new THREE.Vector3());
}

particleGeom.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
particleGeom.setAttribute('color', new THREE.BufferAttribute(particleColors, 3));

const particleTexture = createParticleTexture();

const particleMat = new THREE.PointsMaterial({
  size: 0.05,
  map: particleTexture,
  transparent: true,
  opacity: 1,
  vertexColors: true,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true
});

const particles = new THREE.Points(particleGeom, particleMat);
scene.add(particles);

let particlesActiveCount = 0;
let particleBurstTime = -10;

function createParticleTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 32;
  canvas.height = 32;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, 32, 32);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

function burstParticles(position, color) {
  const col = new THREE.Color(color);
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particlePositions[i * 3] = position.x;
    particlePositions[i * 3 + 1] = position.y;
    particlePositions[i * 3 + 2] = position.z;

    particleColors[i * 3] = col.r;
    particleColors[i * 3 + 1] = col.g;
    particleColors[i * 3 + 2] = col.b;

    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const speed = 0.5 + Math.random() * 1.5;
    particleVelocities[i].set(
      Math.sin(phi) * Math.cos(theta) * speed,
      Math.sin(phi) * Math.sin(theta) * speed,
      Math.cos(phi) * speed
    );

    particleLifetimes[i] = 2.0;
    particleOpacities[i] = 1.0;
  }
  particleGeom.attributes.position.needsUpdate = true;
  particleGeom.attributes.color.needsUpdate = true;
  particleBurstTime = clock.getElapsedTime();
}

function updateParticles(delta) {
  let activeCount = 0;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    if (particleLifetimes[i] > 0) {
      particleLifetimes[i] -= delta;
      if (particleLifetimes[i] <= 0) {
        particleLifetimes[i] = 0;
        particleOpacities[i] = 0;
        particlePositions[i * 3] = 0;
        particlePositions[i * 3 + 1] = -100;
        particlePositions[i * 3 + 2] = 0;
      } else {
        particlePositions[i * 3] += particleVelocities[i].x * delta;
        particlePositions[i * 3 + 1] += particleVelocities[i].y * delta;
        particlePositions[i * 3 + 2] += particleVelocities[i].z * delta;

        // Slow down
        particleVelocities[i].multiplyScalar(0.98);

        particleOpacities[i] = particleLifetimes[i] / 2.0;
        activeCount++;
      }
    }
  }
  particleGeom.attributes.position.needsUpdate = true;
  particlesActiveCount = activeCount;

  // Update overall material opacity based on max particle opacity
  const maxOp = Math.max(...particleOpacities);
  particleMat.opacity = Math.max(maxOp, 0);
}

// Model loading
let model = null;
let gltf = null;
let modelMeshes = [];
let originalPositions = [];
let explodedPositions = [];
let variantsExtension = null;

const loader = new GLTFLoader();
const modelUrl = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/MaterialsVariantsShoe/glTF-Binary/MaterialsVariantsShoe.glb';

loader.load(modelUrl, (loadedGltf) => {
  gltf = loadedGltf;
  model = gltf.scene;
  model.scale.set(8, 8, 8);

  // Center model
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  model.position.y += (box.max.y - box.min.y) / 2 * 0;

  // Recalculate after centering
  const box2 = new THREE.Box3().setFromObject(model);
  const center2 = box2.getCenter(new THREE.Vector3());
  model.position.y -= center2.y - 0.5;

  scene.add(model);

  // Collect meshes
  model.traverse((child) => {
    if (child.isMesh) {
      modelMeshes.push(child);
      const worldPos = new THREE.Vector3();
      child.getWorldPosition(worldPos);
      originalPositions.push(child.position.clone());

      // Calculate exploded position
      const localCenter = new THREE.Vector3();
      const parentWorldPos = new THREE.Vector3();
      if (child.parent) {
        child.parent.getWorldPosition(parentWorldPos);
      }
      const dir = worldPos.clone().sub(new THREE.Vector3(0, 0.5, 0)).normalize();
      if (dir.length() < 0.01) dir.set(0, 1, 0);
      explodedPositions.push(child.position.clone().add(dir.multiplyScalar(0.5)));
    }
  });

  // Check for material variants
  if (gltf.parser && gltf.parser.json.extensions && gltf.parser.json.extensions.KHR_materials_variants) {
    variantsExtension = gltf.parser.json.extensions.KHR_materials_variants;
  }

  window.__3D_STATE__.modelLoaded = true;
  document.getElementById('loading').style.display = 'none';
}, (progress) => {
  // Loading progress
}, (error) => {
  console.error('Error loading model:', error);
  document.getElementById('loading').innerHTML = 'Error loading model. Please refresh.';
});

// Material variant switching
const variantColors = {
  'Midnight': 0x2c3e50,
  'Beach': 0xe8d5b7,
  'Mesh': 0x95a5a6
};

async function switchVariant(variantName) {
  window.__3D_STATE__.currentVariant = variantName;

  // Update button states
  document.querySelectorAll('.variant-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.variant === variantName);
  });

  if (!model) return;

  // Try to use KHR_materials_variants
  let variantApplied = false;

  if (gltf && gltf.parser) {
    try {
      const variantExtension = gltf.userData?.variants;
      if (variantExtension && variantExtension.length > 0) {
        // Map our names to variant indices
        const variantMap = { 'Midnight': 0, 'Beach': 1, 'Mesh': 2 };
        const idx = variantMap[variantName];
        if (idx !== undefined && idx < variantExtension.length) {
          // Use the variant extension functions if available
          await gltf.scene.traverse(async (object) => {
            if (object.isMesh && object.userData.variantMaterials) {
              const variantMaterial = object.userData.variantMaterials[idx];
              if (variantMaterial) {
                object.material = await gltf.parser.getDependency('material', variantMaterial.material);
                variantApplied = true;
              }
            }
          });
        }
      }
    } catch (e) {
      // Fallback
    }
  }

  // Fallback: change material colors
  if (!variantApplied) {
    const color = new THREE.Color(variantColors[variantName]);
    model.traverse((child) => {
      if (child.isMesh && child.material) {
        if (Array.isArray(child.material)) {
          child.material.forEach(m => {
            m.color.copy(color);
            m.needsUpdate = true;
          });
        } else {
          child.material.color.copy(color);
          child.material.needsUpdate = true;
        }
      }
    });
  }
}

// Raycasting
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspots);

  if (intersects.length > 0) {
    const hotspot = intersects[0].object;
    const data = hotspot.userData;

    window.__3D_STATE__.activeHotspot = data.label;
    window.__3D_STATE__.hotspotClickCount++;

    // Show tooltip
    const tooltip = document.getElementById('tooltip');
    const dot = document.getElementById('tooltip-dot');
    const label = document.getElementById('tooltip-label');
    const desc = document.getElementById('tooltip-desc');

    dot.style.backgroundColor = data.color;
    label.textContent = data.label;
    desc.textContent = data.desc;
    tooltip.classList.add('visible');

    // Burst particles
    burstParticles(hotspot.position, data.color);

    // Pause auto-rotate briefly
    controls.autoRotate = false;
    setTimeout(() => {
      if (window.__3D_STATE__.autoRotate) {
        controls.autoRotate = true;
      }
    }, 3000);
  }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Tooltip close
document.getElementById('tooltip-close').addEventListener('click', () => {
  document.getElementById('tooltip').classList.remove('visible');
  window.__3D_STATE__.activeHotspot = null;
});

// Auto-rotate toggle
document.getElementById('auto-rotate-btn').addEventListener('click', () => {
  window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
  controls.autoRotate = window.__3D_STATE__.autoRotate;
  document.getElementById('auto-rotate-btn').textContent =
    `Auto-Rotate: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
});

// Variant buttons
document.querySelectorAll('.variant-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    switchVariant(btn.dataset.variant);
  });
});

// Explode view
let explodeProgress = 0;
let explodeTarget = 0;

document.addEventListener('keydown', (e) => {
  if (e.key === 'e' || e.key === 'E') {
    window.__3D_STATE__.exploded = !window.__3D_STATE__.exploded;
    explodeTarget = window.__3D_STATE__.exploded ? 1 : 0;
  }
});

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Update controls
  controls.update();

  // Hotspot pulsing
  hotspots.forEach((hotspot, i) => {
    const scale = 1.0 + 0.2 * Math.sin(elapsed * 3 + i * 2);
    hotspot.scale.setScalar(scale);
  });

  // Update rings to face camera
  hotspotGroup.children.forEach(child => {
    if (child.userData.isRing) {
      child.lookAt(camera.position);
      const scale = 1.0 + 0.15 * Math.sin(elapsed * 2.5);
      child.scale.setScalar(scale);
    }
  });

  // Update particles
  updateParticles(delta);

  // Explode animation
  if (modelMeshes.length > 0) {
    explodeProgress += (explodeTarget - explodeProgress) * Math.min(delta * 4, 1);

    modelMeshes.forEach((mesh, i) => {
      if (originalPositions[i] && explodedPositions[i]) {
        mesh.position.lerpVectors(originalPositions[i], explodedPositions[i], explodeProgress);
      }
    });
  }

  // Update state
  window.__3D_STATE__.cameraDistance = camera.position.distanceTo(controls.target);
  window.__3D_STATE__.particlesActive = particlesActiveCount;
  window.__3D_STATE__.platformVisible = platform.visible;

  // Update particle count display
  document.getElementById('particle-count').textContent = `Particles: ${particlesActiveCount}`;

  renderer.render(scene, camera);
}

animate();

// Resize handler
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
