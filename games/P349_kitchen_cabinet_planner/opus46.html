<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kitchen Cabinet Planner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #ui-panel {
    position: absolute;
    top: 10px;
    left: 10px;
    width: 220px;
    background: rgba(30, 30, 30, 0.92);
    color: #eee;
    border-radius: 10px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 100;
    user-select: none;
  }
  
  #ui-panel h2 {
    text-align: center;
    margin-bottom: 14px;
    font-size: 18px;
    color: #f0c040;
    letter-spacing: 1px;
  }
  
  .section-label {
    font-size: 11px;
    color: #aaa;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 12px;
    margin-bottom: 6px;
  }
  
  .btn-group {
    display: flex;
    gap: 4px;
    margin-bottom: 8px;
  }
  
  .btn-group button {
    flex: 1;
    padding: 8px 4px;
    border: 2px solid #555;
    background: #2a2a2a;
    color: #ccc;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    transition: all 0.2s;
  }
  
  .btn-group button:hover {
    background: #3a3a3a;
    border-color: #888;
  }
  
  .btn-group button.active {
    background: #4a3a10;
    border-color: #f0c040;
    color: #f0c040;
  }
  
  .action-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    transition: all 0.2s;
  }
  
  #btn-place {
    background: #2d7d2d;
    color: white;
  }
  #btn-place:hover { background: #3a9a3a; }
  
  #btn-delete {
    background: #8b2020;
    color: white;
  }
  #btn-delete:hover { background: #a53030; }
  
  #btn-reset {
    background: #555;
    color: white;
  }
  #btn-reset:hover { background: #777; }
  
  .color-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }
  
  .color-row label {
    font-size: 12px;
    color: #bbb;
  }
  
  #color-picker {
    width: 50px;
    height: 30px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    background: none;
  }
  
  .info-box {
    margin-top: 12px;
    padding: 10px;
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
  }
  
  .info-box div {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    padding: 3px 0;
  }
  
  .info-box .value {
    color: #f0c040;
    font-weight: 700;
  }
  
  .price-list {
    margin-top: 10px;
    font-size: 10px;
    color: #888;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="ui-panel">
  <h2>🏠 Cabinet Planner</h2>
  
  <div class="section-label">Cabinet Type</div>
  <div class="btn-group">
    <button id="btn-base" class="active">Base</button>
    <button id="btn-tall">Tall</button>
    <button id="btn-wall">Wall</button>
  </div>
  
  <button id="btn-place" class="action-btn">📦 Place Cabinet</button>
  <button id="btn-delete" class="action-btn">🗑️ Delete Selected</button>
  <button id="btn-reset" class="action-btn">🔄 Reset All</button>
  
  <div class="color-row">
    <label>Color:</label>
    <input type="color" id="color-picker" value="#8B6914">
  </div>
  
  <div class="info-box">
    <div><span>Cabinets:</span><span class="value" id="cabinet-count">0</span></div>
    <div><span>Total Cost:</span><span class="value" id="cost-display">$0</span></div>
  </div>
  
  <div class="price-list">
    Base: $150 · Tall: $320 · Wall: $95
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
  // Cabinet catalog
  const CATALOG = {
    base: { width: 0.6, height: 0.9, depth: 0.6, color: '#8B6914', y: 0.45, z: -5.7, cost: 150 },
    tall: { width: 0.6, height: 2.0, depth: 0.6, color: '#A0522D', y: 1.0, z: -5.7, cost: 320 },
    wall: { width: 0.6, height: 0.6, depth: 0.35, color: '#CD853F', y: 2.1, z: -5.825, cost: 95 }
  };

  const GRID_STEP = 0.3;
  const OVERLAP_TOLERANCE = 0.01;

  // State
  let cabinetIdCounter = 0;
  const placedCabinets = []; // { id, type, mesh, edgesMesh, x, y, z, color, bbox }

  window.__3D_STATE__ = {
    cabinetCount: 0,
    totalCost: 0,
    selectedType: 'base',
    selectedCabinetId: null,
    cursorX: 0,
    lastPlacedPosition: null,
    lastDeletedType: null,
    overlapRejected: false,
    cabinets: [],
    sceneReady: false
  };

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2a2a3a);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(0, 5, 10);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(5, 10, 7);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.width = 2048;
  dirLight.shadow.mapSize.height = 2048;
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 50;
  dirLight.shadow.camera.left = -10;
  dirLight.shadow.camera.right = 10;
  dirLight.shadow.camera.top = 10;
  dirLight.shadow.camera.bottom = -10;
  scene.add(dirLight);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(12, 12);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0xd4c4a8, roughness: 0.8 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Back wall
  const backWallGeo = new THREE.PlaneGeometry(12, 4);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0xf0ece4, roughness: 0.9 });
  const backWall = new THREE.Mesh(backWallGeo, wallMat);
  backWall.position.set(0, 2, -6);
  backWall.receiveShadow = true;
  scene.add(backWall);

  // Left wall
  const sideWallGeo = new THREE.PlaneGeometry(12, 4);
  const leftWall = new THREE.Mesh(sideWallGeo, wallMat.clone());
  leftWall.position.set(-6, 2, 0);
  leftWall.rotation.y = Math.PI / 2;
  leftWall.receiveShadow = true;
  scene.add(leftWall);

  // Right wall
  const rightWall = new THREE.Mesh(sideWallGeo, wallMat.clone());
  rightWall.position.set(6, 2, 0);
  rightWall.rotation.y = -Math.PI / 2;
  rightWall.receiveShadow = true;
  scene.add(rightWall);

  // Grid helper on floor
  const gridHelper = new THREE.GridHelper(12, 40, 0x888888, 0x444444);
  gridHelper.position.y = 0.01;
  gridHelper.material.opacity = 0.15;
  gridHelper.material.transparent = true;
  scene.add(gridHelper);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 1.5, -3);
  controls.update();

  // Preview box
  let previewMesh = null;
  let previewEdges = null;

  function createPreview() {
    if (previewMesh) {
      scene.remove(previewMesh);
      if (previewEdges) scene.remove(previewEdges);
    }
    const type = window.__3D_STATE__.selectedType;
    const cat = CATALOG[type];
    const geo = new THREE.BoxGeometry(cat.width, cat.height, cat.depth);
    const mat = new THREE.MeshStandardMaterial({
      color: 0x00ff00,
      transparent: true,
      opacity: 0.3,
      depthWrite: false
    });
    previewMesh = new THREE.Mesh(geo, mat);
    previewMesh.position.set(window.__3D_STATE__.cursorX, cat.y, cat.z);
    scene.add(previewMesh);

    const edgesGeo = new THREE.EdgesGeometry(geo);
    const edgesMat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
    previewEdges = new THREE.LineSegments(edgesGeo, edgesMat);
    previewEdges.position.copy(previewMesh.position);
    scene.add(previewEdges);
  }

  function updatePreviewPosition() {
    const type = window.__3D_STATE__.selectedType;
    const cat = CATALOG[type];
    const x = window.__3D_STATE__.cursorX;
    previewMesh.position.set(x, cat.y, cat.z);
    previewEdges.position.copy(previewMesh.position);
  }

  function snapToGrid(val) {
    return Math.round(val / GRID_STEP) * GRID_STEP;
  }

  // Create cabinet mesh
  function createCabinetMesh(type, x, color) {
    const cat = CATALOG[type];
    const geo = new THREE.BoxGeometry(cat.width, cat.height, cat.depth);
    const mat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(color || cat.color),
      roughness: 0.6,
      metalness: 0.1
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, cat.y, cat.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);

    // Edges
    const edgesGeo = new THREE.EdgesGeometry(geo);
    const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000 });
    const edgesMesh = new THREE.LineSegments(edgesGeo, edgesMat);
    edgesMesh.position.copy(mesh.position);
    scene.add(edgesMesh);

    // Add door detail - a slightly inset rectangle on the front face
    const doorWidth = cat.width * 0.8;
    const doorHeight = cat.height * 0.85;
    const doorGeo = new THREE.PlaneGeometry(doorWidth, doorHeight);
    const doorMat = new THREE.MeshStandardMaterial({
      color: new THREE.Color(color || cat.color).multiplyScalar(0.85),
      roughness: 0.5
    });
    const doorMesh = new THREE.Mesh(doorGeo, doorMat);
    doorMesh.position.set(0, 0, cat.depth / 2 + 0.001);
    mesh.add(doorMesh);

    // Handle
    const handleGeo = new THREE.CylinderGeometry(0.01, 0.01, 0.1, 8);
    const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });
    const handle = new THREE.Mesh(handleGeo, handleMat);
    handle.rotation.x = Math.PI / 2;
    handle.position.set(doorWidth * 0.35, 0, cat.depth / 2 + 0.02);
    mesh.add(handle);

    return { mesh, edgesMesh };
  }

  // Bounding box check
  function getCabinetBBox(type, x) {
    const cat = CATALOG[type];
    return {
      minX: x - cat.width / 2 + OVERLAP_TOLERANCE,
      maxX: x + cat.width / 2 - OVERLAP_TOLERANCE,
      minY: cat.y - cat.height / 2 + OVERLAP_TOLERANCE,
      maxY: cat.y + cat.height / 2 - OVERLAP_TOLERANCE,
      minZ: cat.z - cat.depth / 2 + OVERLAP_TOLERANCE,
      maxZ: cat.z + cat.depth / 2 - OVERLAP_TOLERANCE
    };
  }

  function boxesOverlap(a, b) {
    return (a.minX < b.maxX && a.maxX > b.minX) &&
           (a.minY < b.maxY && a.maxY > b.minY) &&
           (a.minZ < b.maxZ && a.maxZ > b.minZ);
  }

  function checkOverlap(type, x) {
    const newBox = getCabinetBBox(type, x);
    for (const cab of placedCabinets) {
      const existBox = getCabinetBBox(cab.type, cab.x);
      if (boxesOverlap(newBox, existBox)) return true;
    }
    return false;
  }

  // Flash preview red
  function flashPreviewRed() {
    if (!previewMesh) return;
    previewMesh.material.color.set(0xff0000);
    previewEdges.material.color.set(0xff0000);
    setTimeout(() => {
      if (previewMesh) {
        previewMesh.material.color.set(0x00ff00);
        previewEdges.material.color.set(0x00ff00);
      }
    }, 300);
  }

  // Place cabinet
  function placeCabinet() {
    const type = window.__3D_STATE__.selectedType;
    const x = window.__3D_STATE__.cursorX;
    const cat = CATALOG[type];

    if (checkOverlap(type, x)) {
      window.__3D_STATE__.overlapRejected = true;
      flashPreviewRed();
      return;
    }

    window.__3D_STATE__.overlapRejected = false;
    const id = 'cab_' + (++cabinetIdCounter);
    const color = cat.color;
    const { mesh, edgesMesh } = createCabinetMesh(type, x, color);
    mesh.userData.cabinetId = id;

    const cabData = {
      id, type, mesh, edgesMesh,
      x, y: cat.y, z: cat.z, color,
      bbox: getCabinetBBox(type, x)
    };
    placedCabinets.push(cabData);

    window.__3D_STATE__.lastPlacedPosition = { x, y: cat.y, z: cat.z };
    updateState();
  }

  // Delete selected
  function deleteSelected() {
    const selId = window.__3D_STATE__.selectedCabinetId;
    if (!selId) return;

    const idx = placedCabinets.findIndex(c => c.id === selId);
    if (idx === -1) return;

    const cab = placedCabinets[idx];
    window.__3D_STATE__.lastDeletedType = cab.type;
    scene.remove(cab.mesh);
    scene.remove(cab.edgesMesh);
    // Dispose geometry/material
    cab.mesh.geometry.dispose();
    cab.mesh.material.dispose();
    cab.edgesMesh.geometry.dispose();
    cab.edgesMesh.material.dispose();
    placedCabinets.splice(idx, 1);

    window.__3D_STATE__.selectedCabinetId = null;
    updateState();
  }

  // Reset all
  function resetAll() {
    for (const cab of placedCabinets) {
      scene.remove(cab.mesh);
      scene.remove(cab.edgesMesh);
      cab.mesh.geometry.dispose();
      cab.mesh.material.dispose();
      cab.edgesMesh.geometry.dispose();
      cab.edgesMesh.material.dispose();
    }
    placedCabinets.length = 0;
    window.__3D_STATE__.selectedCabinetId = null;
    window.__3D_STATE__.lastDeletedType = null;
    window.__3D_STATE__.overlapRejected = false;
    updateState();
  }

  // Select cabinet
  function selectCabinet(id) {
    // Deselect previous
    for (const cab of placedCabinets) {
      cab.mesh.material.emissive.set(0x000000);
    }

    if (id === window.__3D_STATE__.selectedCabinetId) {
      window.__3D_STATE__.selectedCabinetId = null;
      return;
    }

    window.__3D_STATE__.selectedCabinetId = id;
    const cab = placedCabinets.find(c => c.id === id);
    if (cab) {
      cab.mesh.material.emissive.set(0x444400);
      document.getElementById('color-picker').value = cab.color;
    }
  }

  // Update state
  function updateState() {
    const state = window.__3D_STATE__;
    state.cabinetCount = placedCabinets.length;
    state.totalCost = placedCabinets.reduce((sum, c) => sum + CATALOG[c.type].cost, 0);
    state.cabinets = placedCabinets.map(c => ({
      id: c.id, type: c.type, x: c.x, y: c.y, z: c.z, color: c.color
    }));

    document.getElementById('cabinet-count').textContent = state.cabinetCount;
    document.getElementById('cost-display').textContent = '$' + state.totalCost;
  }

  // UI event handlers
  const btnBase = document.getElementById('btn-base');
  const btnTall = document.getElementById('btn-tall');
  const btnWall = document.getElementById('btn-wall');
  const btnPlace = document.getElementById('btn-place');
  const btnDelete = document.getElementById('btn-delete');
  const btnReset = document.getElementById('btn-reset');
  const colorPicker = document.getElementById('color-picker');

  function setSelectedType(type) {
    window.__3D_STATE__.selectedType = type;
    btnBase.classList.toggle('active', type === 'base');
    btnTall.classList.toggle('active', type === 'tall');
    btnWall.classList.toggle('active', type === 'wall');
    createPreview();
  }

  btnBase.addEventListener('click', () => setSelectedType('base'));
  btnTall.addEventListener('click', () => setSelectedType('tall'));
  btnWall.addEventListener('click', () => setSelectedType('wall'));
  btnPlace.addEventListener('click', placeCabinet);
  btnDelete.addEventListener('click', deleteSelected);
  btnReset.addEventListener('click', resetAll);

  colorPicker.addEventListener('input', (e) => {
    const selId = window.__3D_STATE__.selectedCabinetId;
    if (!selId) return;
    const cab = placedCabinets.find(c => c.id === selId);
    if (!cab) return;
    const newColor = e.target.value;
    cab.color = newColor;
    cab.mesh.material.color.set(newColor);
    // Update door color too
    if (cab.mesh.children.length > 0) {
      cab.mesh.children[0].material.color.set(new THREE.Color(newColor).multiplyScalar(0.85));
    }
    updateState();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') {
      window.__3D_STATE__.cursorX = snapToGrid(window.__3D_STATE__.cursorX - GRID_STEP);
      window.__3D_STATE__.cursorX = Math.max(-5.7, window.__3D_STATE__.cursorX);
      updatePreviewPosition();
    } else if (e.key === 'ArrowRight') {
      window.__3D_STATE__.cursorX = snapToGrid(window.__3D_STATE__.cursorX + GRID_STEP);
      window.__3D_STATE__.cursorX = Math.min(5.7, window.__3D_STATE__.cursorX);
      updatePreviewPosition();
    } else if (e.key === 'Delete' || e.key === 'Backspace') {
      deleteSelected();
    }
  });

  // Mouse interaction - raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  // Create an invisible plane along the back wall for mouse tracking
  const wallPlaneGeo = new THREE.PlaneGeometry(12, 4);
  const wallPlaneMat = new THREE.MeshBasicMaterial({ visible: false });
  const wallPlane = new THREE.Mesh(wallPlaneGeo, wallPlaneMat);
  wallPlane.position.set(0, 2, -5.7);
  scene.add(wallPlane);

  renderer.domElement.addEventListener('mousemove', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(wallPlane);
    if (intersects.length > 0) {
      const point = intersects[0].point;
      const snappedX = snapToGrid(point.x);
      const clampedX = Math.max(-5.7, Math.min(5.7, snappedX));
      window.__3D_STATE__.cursorX = clampedX;
      if (previewMesh) {
        updatePreviewPosition();
      }
    }
  });

  renderer.domElement.addEventListener('click', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check if clicking on a placed cabinet
    const cabinetMeshes = placedCabinets.map(c => c.mesh);
    const intersects = raycaster.intersectObjects(cabinetMeshes, true);

    if (intersects.length > 0) {
      // Find the root cabinet mesh
      let obj = intersects[0].object;
      while (obj.parent && !obj.userData.cabinetId) {
        obj = obj.parent;
      }
      if (obj.userData.cabinetId) {
        selectCabinet(obj.userData.cabinetId);
        return;
      }
    }

    // Deselect if clicking on nothing
    if (window.__3D_STATE__.selectedCabinetId) {
      for (const cab of placedCabinets) {
        cab.mesh.material.emissive.set(0x000000);
      }
      window.__3D_STATE__.selectedCabinetId = null;
    }
  });

  // Handle resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Initialize
  createPreview();
  window.__3D_STATE__.sceneReady = true;

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
