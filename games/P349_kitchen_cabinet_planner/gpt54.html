<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Kitchen Cabinet Planner</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #cfcfcf;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 220px;
      background: rgba(255,255,255,0.94);
      border-radius: 10px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      z-index: 10;
      user-select: none;
    }

    #ui h2 {
      margin: 0 0 12px 0;
      font-size: 20px;
    }

    #ui button, #ui input[type="color"] {
      width: 100%;
      margin: 6px 0;
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #bbb;
      box-sizing: border-box;
    }

    #ui button {
      cursor: pointer;
      background: #f7f7f7;
    }

    #ui button.active {
      background: #dfefff;
      border-color: #6ea8ff;
      font-weight: bold;
    }

    .stat {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #555;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui">
      <h2>Cabinet Planner</h2>
      <button id="btn-base" class="active">Base Cabinet</button>
      <button id="btn-tall">Tall Cabinet</button>
      <button id="btn-wall">Wall Cabinet</button>
      <button id="btn-place">Place Cabinet</button>
      <button id="btn-delete">Delete Selected</button>
      <button id="btn-reset">Reset All</button>
      <input id="color-picker" type="color" value="#8B6914" />
      <div class="stat" id="cost-display">Total Cost: $0</div>
      <div class="stat" id="cabinet-count">Cabinets: 0</div>
      <div class="hint">
        Mouse: move preview<br>
        Click cabinet: select<br>
        ←/→: move cursor<br>
        Delete: remove selected
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const app = document.getElementById("app");
    const btnBase = document.getElementById("btn-base");
    const btnTall = document.getElementById("btn-tall");
    const btnWall = document.getElementById("btn-wall");
    const btnPlace = document.getElementById("btn-place");
    const btnDelete = document.getElementById("btn-delete");
    const btnReset = document.getElementById("btn-reset");
    const colorPicker = document.getElementById("color-picker");
    const costDisplay = document.getElementById("cost-display");
    const cabinetCountDisplay = document.getElementById("cabinet-count");

    const GRID = 0.3;
    const BACK_LIMIT = 6 - 0.3;

    const catalog = {
      base: {
        type: "base",
        width: 0.6,
        height: 0.9,
        depth: 0.6,
        color: "#8B6914",
        cost: 150,
        y: 0.45,
        z: -5.7
      },
      tall: {
        type: "tall",
        width: 0.6,
        height: 2.0,
        depth: 0.6,
        color: "#A0522D",
        cost: 320,
        y: 1.0,
        z: -5.7
      },
      wall: {
        type: "wall",
        width: 0.6,
        height: 0.6,
        depth: 0.35,
        color: "#CD853F",
        cost: 95,
        y: 2.1,
        z: -5.825
      }
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xe9edf2);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, -4);
    controls.update();
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -12;
    dirLight.shadow.camera.right = 12;
    dirLight.shadow.camera.top = 12;
    dirLight.shadow.camera.bottom = -12;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    function createRoom() {
      const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 12),
        new THREE.MeshStandardMaterial({ color: "#d4c4a8" })
      );
      floor.rotation.x = -Math.PI / 2;
      floor.receiveShadow = true;
      scene.add(floor);

      const wallMat = new THREE.MeshStandardMaterial({ color: "#f0ece4", side: THREE.DoubleSide });

      const backWall = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 4),
        wallMat
      );
      backWall.position.set(0, 2, -6);
      backWall.receiveShadow = true;
      scene.add(backWall);

      const leftWall = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 4),
        wallMat
      );
      leftWall.rotation.y = Math.PI / 2;
      leftWall.position.set(-6, 2, 0);
      scene.add(leftWall);

      const rightWall = new THREE.Mesh(
        new THREE.PlaneGeometry(12, 4),
        wallMat
      );
      rightWall.rotation.y = -Math.PI / 2;
      rightWall.position.set(6, 2, 0);
      scene.add(rightWall);
    }
    createRoom();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let nextCabinetId = 1;
    let cabinets = [];
    let selectedCabinet = null;
    let selectedType = "base";
    let cursorX = 0;
    let totalCost = 0;
    let lastPlacedPosition = null;
    let lastDeletedType = null;
    let overlapRejected = false;

    const previewGroup = new THREE.Group();
    scene.add(previewGroup);

    function snapToGrid(x) {
      const snapped = Math.round(x / GRID) * GRID;
      return THREE.MathUtils.clamp(Number(snapped.toFixed(3)), -BACK_LIMIT, BACK_LIMIT);
    }

    function getSpec(type) {
      return catalog[type];
    }

    function createCabinetObject(type, colorOverride = null) {
      const spec = getSpec(type);
      const group = new THREE.Group();
      group.userData.isCabinet = true;
      group.userData.type = type;

      const geo = new THREE.BoxGeometry(spec.width, spec.height, spec.depth);
      const mat = new THREE.MeshStandardMaterial({
        color: colorOverride || spec.color,
        emissive: 0x000000
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      group.add(mesh);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0x000000 })
      );
      group.add(edges);

      group.userData.mesh = mesh;
      group.userData.dimensions = { width: spec.width, height: spec.height, depth: spec.depth };
      return group;
    }

    function getBoxForPlacement(type, x) {
      const spec = getSpec(type);
      const min = new THREE.Vector3(
        x - spec.width / 2,
        spec.y - spec.height / 2,
        spec.z - spec.depth / 2
      );
      const max = new THREE.Vector3(
        x + spec.width / 2,
        spec.y + spec.height / 2,
        spec.z + spec.depth / 2
      );
      return new THREE.Box3(min, max);
    }

    function boxOverlapWithTolerance(a, b, tolerance = 0.01) {
      return (
        a.min.x < b.max.x - tolerance &&
        a.max.x > b.min.x + tolerance &&
        a.min.y < b.max.y - tolerance &&
        a.max.y > b.min.y + tolerance &&
        a.min.z < b.max.z - tolerance &&
        a.max.z > b.min.z + tolerance
      );
    }

    function placementOverlaps(type, x) {
      const newBox = getBoxForPlacement(type, x);
      for (const cab of cabinets) {
        const existingBox = getBoxForPlacement(cab.type, cab.x);
        if (boxOverlapWithTolerance(newBox, existingBox, 0.01)) {
          return true;
        }
      }
      return false;
    }

    function setSelectedType(type) {
      selectedType = type;
      btnBase.classList.toggle("active", type === "base");
      btnTall.classList.toggle("active", type === "tall");
      btnWall.classList.toggle("active", type === "wall");
      if (!selectedCabinet) {
        colorPicker.value = getSpec(type).color;
      }
      updatePreview();
      syncState();
    }

    function clearSelection() {
      if (selectedCabinet && selectedCabinet.userData.mesh) {
        selectedCabinet.userData.mesh.material.emissive.setHex(0x000000);
      }
      selectedCabinet = null;
      syncState();
    }

    function selectCabinet(cabinet) {
      clearSelection();
      selectedCabinet = cabinet;
      selectedCabinet.userData.mesh.material.emissive.setHex(0x444400);
      const currentColor = "#" + selectedCabinet.userData.mesh.material.color.getHexString();
      colorPicker.value = currentColor;
      syncState();
    }

    function updateStats() {
      totalCost = cabinets.reduce((sum, c) => sum + getSpec(c.type).cost, 0);
      costDisplay.textContent = `Total Cost: $${totalCost}`;
      cabinetCountDisplay.textContent = `Cabinets: ${cabinets.length}`;
    }

    function syncState() {
      window.__3D_STATE__ = {
        cabinetCount: cabinets.length,
        totalCost: totalCost,
        selectedType: selectedType,
        selectedCabinetId: selectedCabinet ? selectedCabinet.userData.id : null,
        cursorX: cursorX,
        lastPlacedPosition: lastPlacedPosition,
        lastDeletedType: lastDeletedType,
        overlapRejected: overlapRejected,
        cabinets: cabinets.map(c => ({
          id: c.id,
          type: c.type,
          x: c.x,
          y: c.y,
          z: c.z,
          color: c.color
        })),
        sceneReady: true
      };
    }

    function buildPreview() {
      while (previewGroup.children.length) {
        const child = previewGroup.children.pop();
        previewGroup.remove(child);
      }

      const spec = getSpec(selectedType);
      const geo = new THREE.BoxGeometry(spec.width, spec.height, spec.depth);
      const mat = new THREE.MeshStandardMaterial({
        color: 0x00ff00,
        transparent: true,
        opacity: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);

      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({ color: 0x003300 })
      );

      previewGroup.add(mesh);
      previewGroup.add(edges);
      previewGroup.userData.mesh = mesh;
    }

    function updatePreview() {
      buildPreview();
      const spec = getSpec(selectedType);
      previewGroup.position.set(cursorX, spec.y, spec.z);
    }

    function flashPreviewRed() {
      const mesh = previewGroup.userData.mesh;
      if (!mesh) return;
      const old = mesh.material.color.clone();
      mesh.material.color.set("#ff3333");
      setTimeout(() => {
        if (previewGroup.userData.mesh === mesh) {
          mesh.material.color.copy(old);
        }
      }, 220);
    }

    function placeCabinet() {
      overlapRejected = false;
      if (placementOverlaps(selectedType, cursorX)) {
        overlapRejected = true;
        flashPreviewRed();
        syncState();
        return;
      }

      const spec = getSpec(selectedType);
      const obj = createCabinetObject(selectedType);
      obj.position.set(cursorX, spec.y, spec.z);
      obj.userData.id = nextCabinetId++;
      scene.add(obj);

      const color = "#" + obj.userData.mesh.material.color.getHexString();

      cabinets.push({
        id: obj.userData.id,
        object: obj,
        type: selectedType,
        x: cursorX,
        y: spec.y,
        z: spec.z,
        color: color
      });

      lastPlacedPosition = { x: cursorX, y: spec.y, z: spec.z };
      updateStats();
      syncState();
    }

    function deleteSelectedCabinet() {
      if (!selectedCabinet) return;
      const id = selectedCabinet.userData.id;
      const idx = cabinets.findIndex(c => c.id === id);
      if (idx >= 0) {
        lastDeletedType = cabinets[idx].type;
        scene.remove(cabinets[idx].object);
        cabinets.splice(idx, 1);
      }
      clearSelection();
      updateStats();
      syncState();
    }

    function resetAll() {
      cabinets.forEach(c => scene.remove(c.object));
      cabinets = [];
      clearSelection();
      totalCost = 0;
      lastDeletedType = null;
      lastPlacedPosition = null;
      overlapRejected = false;
      updateStats();
      syncState();
    }

    function updateCursorFromMouse(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);

      const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 6);
      const hit = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(plane, hit)) {
        cursorX = snapToGrid(hit.x);
        updatePreview();
        syncState();
      }
    }

    function pickCabinet(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const objs = cabinets.map(c => c.object);
      const intersects = raycaster.intersectObjects(objs, true);
      if (intersects.length > 0) {
        let obj = intersects[0].object;
        while (obj && !obj.userData.isCabinet) obj = obj.parent;
        if (obj && obj.userData.isCabinet) {
          selectCabinet(obj);
          return true;
        }
      }
      clearSelection();
      return false;
    }

    btnBase.addEventListener("click", () => setSelectedType("base"));
    btnTall.addEventListener("click", () => setSelectedType("tall"));
    btnWall.addEventListener("click", () => setSelectedType("wall"));
    btnPlace.addEventListener("click", placeCabinet);
    btnDelete.addEventListener("click", deleteSelectedCabinet);
    btnReset.addEventListener("click", resetAll);

    colorPicker.addEventListener("input", () => {
      if (!selectedCabinet) return;
      selectedCabinet.userData.mesh.material.color.set(colorPicker.value);
      const found = cabinets.find(c => c.id === selectedCabinet.userData.id);
      if (found) found.color = colorPicker.value;
      syncState();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        cursorX = snapToGrid(cursorX - GRID);
        updatePreview();
        syncState();
      } else if (e.key === "ArrowRight") {
        cursorX = snapToGrid(cursorX + GRID);
        updatePreview();
        syncState();
      } else if (e.key === "Delete") {
        deleteSelectedCabinet();
      }
    });

    renderer.domElement.addEventListener("mousemove", updateCursorFromMouse);

    renderer.domElement.addEventListener("click", (e) => {
      pickCabinet(e);
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateStats();
    updatePreview();
    syncState();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
