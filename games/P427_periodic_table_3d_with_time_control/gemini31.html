<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Periodic Table</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.85);
            padding: 15px 25px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 80%;
            max-width: 800px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }
        .buttons-container {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        button, select {
            background: #2a2a4a;
            color: white;
            border: 1px solid #4a4a7a;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover, select:hover {
            background: #3a3a6a;
        }
        #info-panel {
            position: absolute;
            top: 20px;
            right: -350px;
            width: 300px;
            background: rgba(15, 15, 30, 0.9);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: right 0.3s ease-in-out;
            backdrop-filter: blur(5px);
        }
        #info-panel.visible {
            right: 20px;
        }
        #info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 32px;
            border-bottom: 2px solid #4a4a7a;
            padding-bottom: 5px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .info-label {
            color: #aaaaaa;
        }
        .info-value {
            font-weight: bold;
        }
        #instructions {
            position: absolute;
            top: 80px;
            left: 20px;
            font-size: 14px;
            color: #aaaaaa;
            pointer-events: none;
            background: rgba(0,0,0,0.3);
            padding: 10px;
            border-radius: 8px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">Year: <span id="year-display">2020</span></div>
    
    <div id="instructions">
        Controls:<br>
        Left Click: Rotate / Select Element<br>
        Right Click: Pan<br>
        Scroll: Zoom<br>
        T: Toggle Layout (3D/Flat)<br>
        R: Rotate Table<br>
        Space: Play/Pause Timeline<br>
        Esc: Close Panel
    </div>

    <div id="info-panel">
        <h2 id="info-sym">H</h2>
        <div class="info-row"><span class="info-label">Name:</span> <span class="info-value" id="info-name">Hydrogen</span></div>
        <div class="info-row"><span class="info-label">Atomic Number:</span> <span class="info-value" id="info-num">1</span></div>
        <div class="info-row"><span class="info-label">Category:</span> <span class="info-value" id="info-cat">nonmetals</span></div>
        <div class="info-row"><span class="info-label">Discovered:</span> <span class="info-value" id="info-year">1766</span></div>
    </div>

    <div id="controls">
        <div class="slider-container">
            <span>-8000</span>
            <input type="range" id="timeline-slider" min="-8000" max="2020" value="2020">
            <span>2020</span>
        </div>
        <div class="buttons-container">
            <button id="btn-play">Play</button>
            <button id="btn-pause">Pause</button>
            <button id="btn-reset">Reset</button>
            <select id="speed-select">
                <option value="1">Speed: 1x</option>
                <option value="2">Speed: 2x</option>
                <option value="5">Speed: 5x</option>
            </select>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            currentYear: 2020,
            visibleElementCount: 36,
            totalElements: 36,
            isPlaying: false,
            playbackSpeed: 1,
            selectedElement: null,
            infoPanelVisible: false,
            layoutMode: '3d',
            isRotating: false,
            waterBottleLoaded: false,
            waterBottleHighlightActive: false,
            hydrogenHighlighted: false,
            oxygenHighlighted: false,
            elementPositions: {},
            cameraPosition: {x: 0, y: 30, z: 80}
        };

        // --- Data ---
        const elementsData = [
            { num: 1, sym: 'H', name: 'Hydrogen', cat: 'nonmetals', year: 1766, col: 0, row: 0 },
            { num: 2, sym: 'He', name: 'Helium', cat: 'noble gases', year: 1868, col: 17, row: 0 },
            { num: 3, sym: 'Li', name: 'Lithium', cat: 'alkali metals', year: 1817, col: 0, row: 1 },
            { num: 4, sym: 'Be', name: 'Beryllium', cat: 'alkaline earth', year: 1798, col: 1, row: 1 },
            { num: 5, sym: 'B', name: 'Boron', cat: 'metalloids', year: 1808, col: 12, row: 1 },
            { num: 6, sym: 'C', name: 'Carbon', cat: 'nonmetals', year: -3750, col: 13, row: 1 },
            { num: 7, sym: 'N', name: 'Nitrogen', cat: 'nonmetals', year: 1772, col: 14, row: 1 },
            { num: 8, sym: 'O', name: 'Oxygen', cat: 'nonmetals', year: 1774, col: 15, row: 1 },
            { num: 9, sym: 'F', name: 'Fluorine', cat: 'halogens', year: 1886, col: 16, row: 1 },
            { num: 10, sym: 'Ne', name: 'Neon', cat: 'noble gases', year: 1898, col: 17, row: 1 },
            { num: 11, sym: 'Na', name: 'Sodium', cat: 'alkali metals', year: 1807, col: 0, row: 2 },
            { num: 12, sym: 'Mg', name: 'Magnesium', cat: 'alkaline earth', year: 1755, col: 1, row: 2 },
            { num: 13, sym: 'Al', name: 'Aluminum', cat: 'other metals', year: 1825, col: 12, row: 2 },
            { num: 14, sym: 'Si', name: 'Silicon', cat: 'metalloids', year: 1824, col: 13, row: 2 },
            { num: 15, sym: 'P', name: 'Phosphorus', cat: 'nonmetals', year: 1669, col: 14, row: 2 },
            { num: 16, sym: 'S', name: 'Sulfur', cat: 'nonmetals', year: -2000, col: 15, row: 2 },
            { num: 17, sym: 'Cl', name: 'Chlorine', cat: 'halogens', year: 1774, col: 16, row: 2 },
            { num: 18, sym: 'Ar', name: 'Argon', cat: 'noble gases', year: 1894, col: 17, row: 2 },
            { num: 19, sym: 'K', name: 'Potassium', cat: 'alkali metals', year: 1807, col: 0, row: 3 },
            { num: 20, sym: 'Ca', name: 'Calcium', cat: 'alkaline earth', year: 1808, col: 1, row: 3 },
            { num: 21, sym: 'Sc', name: 'Scandium', cat: 'transition metals', year: 1879, col: 2, row: 3 },
            { num: 22, sym: 'Ti', name: 'Titanium', cat: 'transition metals', year: 1791, col: 3, row: 3 },
            { num: 23, sym: 'V', name: 'Vanadium', cat: 'transition metals', year: 1801, col: 4, row: 3 },
            { num: 24, sym: 'Cr', name: 'Chromium', cat: 'transition metals', year: 1797, col: 5, row: 3 },
            { num: 25, sym: 'Mn', name: 'Manganese', cat: 'transition metals', year: 1774, col: 6, row: 3 },
            { num: 26, sym: 'Fe', name: 'Iron', cat: 'transition metals', year: -5000, col: 7, row: 3 },
            { num: 27, sym: 'Co', name: 'Cobalt', cat: 'transition metals', year: 1735, col: 8, row: 3 },
            { num: 28, sym: 'Ni', name: 'Nickel', cat: 'transition metals', year: 1751, col: 9, row: 3 },
            { num: 29, sym: 'Cu', name: 'Copper', cat: 'transition metals', year: -9000, col: 10, row: 3 },
            { num: 30, sym: 'Zn', name: 'Zinc', cat: 'transition metals', year: -1000, col: 11, row: 3 },
            { num: 31, sym: 'Ga', name: 'Gallium', cat: 'other metals', year: 1875, col: 12, row: 3 },
            { num: 32, sym: 'Ge', name: 'Germanium', cat: 'metalloids', year: 1886, col: 13, row: 3 },
            { num: 33, sym: 'As', name: 'Arsenic', cat: 'metalloids', year: 1250, col: 14, row: 3 },
            { num: 34, sym: 'Se', name: 'Selenium', cat: 'nonmetals', year: 1817, col: 15, row: 3 },
            { num: 35, sym: 'Br', name: 'Bromine', cat: 'halogens', year: 1826, col: 16, row: 3 },
            { num: 36, sym: 'Kr', name: 'Krypton', cat: 'noble gases', year: 1898, col: 17, row: 3 }
        ];

        const catColors = {
            'alkali metals': 0xff6b6b,
            'alkaline earth': 0xffa06b,
            'transition metals': 0x6bc5ff,
            'metalloids': 0xa06bff,
            'nonmetals': 0x6bff6b,
            'noble gases': 0xffff6b,
            'halogens': 0xff6bff,
            'other metals': 0x6bffff
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 30, 80);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        // --- Periodic Table Construction ---
        const tableGroup = new THREE.Group();
        scene.add(tableGroup);
        const elementMeshes = {};

        function createLabelTexture(sym, num) {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, 256, 256);
            
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 8;
            ctx.strokeRect(4, 4, 248, 248);
            
            ctx.fillStyle = '#000000';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            ctx.font = 'bold 110px Arial';
            ctx.fillText(sym, 128, 140);
            
            ctx.font = 'bold 45px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(num, 15, 45);
            
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return tex;
        }

        const boxGeo = new THREE.BoxGeometry(2.8, 2.8, 1.0);

        elementsData.forEach(el => {
            const tex = createLabelTexture(el.sym, el.num);
            const color = catColors[el.cat] || 0xffffff;
            
            const sideMat = new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 1 });
            const frontMat = new THREE.MeshStandardMaterial({ map: tex, color: color, transparent: true, opacity: 1 });
            
            // right, left, top, bottom, front, back
            const materials = [sideMat, sideMat, sideMat, sideMat, frontMat, frontMat];
            
            const mesh = new THREE.Mesh(boxGeo, materials);
            
            // Calculate grid position (centered)
            const gridX = (el.col - 8.5) * 3.2;
            const gridZ = -(el.row - 1.5) * 3.2;
            
            mesh.position.set(gridX, 0, gridZ);
            
            mesh.userData = {
                ...el,
                gridX: gridX,
                gridZ: gridZ,
                baseColor: color
            };
            
            tableGroup.add(mesh);
            elementMeshes[el.sym] = mesh;
        });

        // --- Water Bottle Asset ---
        let waterBottleGroup = new THREE.Group();
        scene.add(waterBottleGroup);
        waterBottleGroup.position.set(25, 5, -10);

        const loader = new GLTFLoader();
        loader.load(
            'WaterBottle.glb',
            (gltf) => {
                const bottle = gltf.scene;
                bottle.scale.set(8, 8, 8);
                waterBottleGroup.add(bottle);
                window.__3D_STATE__.waterBottleLoaded = true;
            },
            undefined,
            (error) => {
                // Fallback if GLB fails to load
                const cylGeo = new THREE.CylinderGeometry(1.5, 1.5, 6, 32);
                const cylMat = new THREE.MeshStandardMaterial({ color: 0x44aaff, transparent: true, opacity: 0.8, roughness: 0.1, metalness: 0.2 });
                const fallbackBottle = new THREE.Mesh(cylGeo, cylMat);
                
                const capGeo = new THREE.CylinderGeometry(0.8, 0.8, 1, 32);
                const capMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
                const cap = new THREE.Mesh(capGeo, capMat);
                cap.position.y = 3.5;
                
                fallbackBottle.add(cap);
                waterBottleGroup.add(fallbackBottle);
                window.__3D_STATE__.waterBottleLoaded = true;
            }
        );

        // Floating Label for Bottle
        const labelCanvas = document.createElement('canvas');
        labelCanvas.width = 512;
        labelCanvas.height = 128;
        const lctx = labelCanvas.getContext('2d');
        lctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        lctx.fillRoundRect = function(x, y, w, h, r) {
            this.beginPath(); this.moveTo(x+r, y); this.lineTo(x+w-r, y); this.quadraticCurveTo(x+w, y, x+w, y+r); this.lineTo(x+w, y+h-r); this.quadraticCurveTo(x+w, y+h, x+w-r, y+h); this.lineTo(x+r, y+h); this.quadraticCurveTo(x, y+h, x, y+h-r); this.lineTo(x, y+r); this.quadraticCurveTo(x, y, x+r, y); this.closePath(); this.fill();
        }
        lctx.fillRoundRect(0, 0, 512, 128, 20);
        lctx.fillStyle = '#ffffff';
        lctx.font = 'bold 40px Arial';
        lctx.textAlign = 'center';
        lctx.textBaseline = 'middle';
        lctx.fillText('H₂O - Water Molecule Demo', 256, 64);
        
        const labelTex = new THREE.CanvasTexture(labelCanvas);
        const labelMat = new THREE.SpriteMaterial({ map: labelTex });
        const labelSprite = new THREE.Sprite(labelMat);
        labelSprite.scale.set(15, 3.75, 1);
        labelSprite.position.set(0, 6, 0);
        waterBottleGroup.add(labelSprite);

        // --- UI Interactions ---
        const slider = document.getElementById('timeline-slider');
        const yearDisplay = document.getElementById('year-display');
        const btnPlay = document.getElementById('btn-play');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');
        const speedSelect = document.getElementById('speed-select');
        const infoPanel = document.getElementById('info-panel');

        function updateYearUI(year) {
            const y = Math.floor(year);
            slider.value = y;
            yearDisplay.innerText = y < 0 ? `${Math.abs(y)} BC` : y;
            window.__3D_STATE__.currentYear = y;
        }

        slider.addEventListener('input', (e) => {
            updateYearUI(e.target.value);
            window.__3D_STATE__.isPlaying = false;
        });

        btnPlay.addEventListener('click', () => window.__3D_STATE__.isPlaying = true);
        btnPause.addEventListener('click', () => window.__3D_STATE__.isPlaying = false);
        btnReset.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = false;
            updateYearUI(-8000);
        });
        speedSelect.addEventListener('change', (e) => {
            window.__3D_STATE__.playbackSpeed = parseFloat(e.target.value);
        });

        function showInfoPanel(data) {
            document.getElementById('info-sym').innerText = data.sym;
            document.getElementById('info-name').innerText = data.name;
            document.getElementById('info-num').innerText = data.num;
            document.getElementById('info-cat').innerText = data.cat;
            document.getElementById('info-year').innerText = data.year < 0 ? `${Math.abs(data.year)} BC` : data.year;
            infoPanel.classList.add('visible');
            window.__3D_STATE__.infoPanelVisible = true;
            window.__3D_STATE__.selectedElement = data.sym;
        }

        function hideInfoPanel() {
            infoPanel.classList.remove('visible');
            window.__3D_STATE__.infoPanelVisible = false;
            window.__3D_STATE__.selectedElement = null;
        }

        // --- Raycasting ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            // Ignore UI clicks
            if (event.target.tagName === 'BUTTON' || event.target.tagName === 'INPUT' || event.target.tagName === 'SELECT' || event.target.closest('#info-panel') || event.target.closest('#controls')) {
                return;
            }

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            
            let clickedElement = null;
            let clickedBottle = false;

            for (let i = 0; i < intersects.length; i++) {
                let obj = intersects[i].object;
                
                // Check if element
                if (obj.userData && obj.userData.sym) {
                    clickedElement = obj;
                    break;
                }
                
                // Check if bottle
                let parent = obj;
                while (parent) {
                    if (parent === waterBottleGroup) {
                        clickedBottle = true;
                        break;
                    }
                    parent = parent.parent;
                }
                if (clickedBottle) break;
            }

            if (clickedBottle) {
                window.__3D_STATE__.waterBottleHighlightActive = !window.__3D_STATE__.waterBottleHighlightActive;
            } else if (clickedElement) {
                showInfoPanel(clickedElement.userData);
            } else {
                hideInfoPanel();
            }
        });

        // --- Keyboard Controls ---
        let rotationProgress = 0;

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 't') {
                window.__3D_STATE__.layoutMode = window.__3D_STATE__.layoutMode === '3d' ? 'flat' : '3d';
            } else if (e.key.toLowerCase() === 'r' && !window.__3D_STATE__.isRotating) {
                window.__3D_STATE__.isRotating = true;
                rotationProgress = 0;
            } else if (e.code === 'Space') {
                window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            } else if (e.key === 'Escape') {
                hideInfoPanel();
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            const state = window.__3D_STATE__;

            // Timeline Auto-play
            if (state.isPlaying) {
                let newYear = state.currentYear + (50 * state.playbackSpeed * delta);
                if (newYear > 2020) {
                    newYear = 2020;
                    state.isPlaying = false;
                }
                updateYearUI(newYear);
            }

            // Update Elements (Timeline & Layout)
            let visibleCount = 0;
            
            Object.values(elementMeshes).forEach(mesh => {
                const data = mesh.userData;
                let targetY = 0;
                let targetOpacity = 1.0;

                if (state.currentYear < data.year) {
                    targetY = state.layoutMode === '3d' ? -2 : 0;
                    targetOpacity = 0.15;
                }

                // Lerp position and opacity
                mesh.position.y = THREE.MathUtils.lerp(mesh.position.y, targetY, 10 * delta);
                
                mesh.material.forEach(mat => {
                    mat.opacity = THREE.MathUtils.lerp(mat.opacity, targetOpacity, 10 * delta);
                });

                if (mesh.material[0].opacity > 0.5) visibleCount++;
                
                // Update state positions
                state.elementPositions[data.sym] = { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z };
            });
            
            state.visibleElementCount = visibleCount;

            // Water Bottle Highlight Logic
            const hMesh = elementMeshes['H'];
            const oMesh = elementMeshes['O'];
            
            if (state.waterBottleHighlightActive) {
                const scale = 1.2 + 0.2 * Math.sin(time * 5);
                hMesh.scale.set(scale, scale, scale);
                oMesh.scale.set(scale, scale, scale);
                
                hMesh.material.forEach(m => { m.emissive.setHex(0xffffff); m.emissiveIntensity = 0.5; });
                oMesh.material.forEach(m => { m.emissive.setHex(0xffffff); m.emissiveIntensity = 0.5; });
                
                state.hydrogenHighlighted = true;
                state.oxygenHighlighted = true;
            } else {
                hMesh.scale.lerp(new THREE.Vector3(1, 1, 1), 10 * delta);
                oMesh.scale.lerp(new THREE.Vector3(1, 1, 1), 10 * delta);
                
                hMesh.material.forEach(m => { m.emissive.setHex(0x000000); m.emissiveIntensity = 0; });
                oMesh.material.forEach(m => { m.emissive.setHex(0x000000); m.emissiveIntensity = 0; });
                
                state.hydrogenHighlighted = false;
                state.oxygenHighlighted = false;
            }

            // Table Rotation
            if (state.isRotating) {
                rotationProgress += delta;
                tableGroup.rotation.y = THREE.MathUtils.lerp(0, Math.PI * 2, rotationProgress / 3.0);
                if (rotationProgress >= 3.0) {
                    state.isRotating = false;
                    tableGroup.rotation.y = 0; // Reset to exact 0 to prevent drift
                }
            }

            // Update Camera State
            state.cameraPosition = { x: camera.position.x, y: camera.position.y, z: camera.position.z };

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize UI and start
        updateYearUI(2020);
        animate();

    </script>
</body>
</html>
