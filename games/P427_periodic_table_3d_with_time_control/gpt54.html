<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Periodic Table Timeline</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.25));
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #controlsRow {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #yearLabel {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      font-size: 26px;
      font-weight: bold;
      padding: 10px 14px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
    }

    #timeline {
      width: 100%;
    }

    button, select {
      background: #16213e;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover, select:hover {
      background: #243b68;
    }

    #infoPanel {
      position: fixed;
      top: 70px;
      right: 14px;
      width: 260px;
      min-height: 140px;
      z-index: 12;
      background: rgba(0,0,0,0.72);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 14px;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #infoPanel h3 {
      margin: 0 0 10px 0;
      color: #ffff9a;
    }

    #hint {
      position: fixed;
      top: 70px;
      left: 14px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.4;
      padding: 10px 12px;
      background: rgba(0,0,0,0.35);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      max-width: 320px;
    }

    .small {
      opacity: 0.85;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="yearLabel">Year: -8000</div>

  <div id="hint">
    <div><b>Controls</b></div>
    <div>T = toggle 3D/flat layout</div>
    <div>R = rotate table</div>
    <div>Space = play/pause timeline</div>
    <div>Esc = close info panel</div>
    <div class="small">Click elements for info. Click the water bottle to highlight H and O.</div>
  </div>

  <div id="infoPanel"></div>

  <div id="ui">
    <input id="timeline" type="range" min="-8000" max="2020" step="1" value="-8000" />
    <div id="controlsRow">
      <button id="playBtn">Play</button>
      <button id="pauseBtn">Pause</button>
      <button id="resetBtn">Reset</button>
      <label for="speedSelect">Speed</label>
      <select id="speedSelect">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="5">5x</option>
      </select>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 30, 80);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 15);
    scene.add(dirLight);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const elements = [];
    const elementMeshes = [];
    const symbolToElement = {};

    let waterBottle = null;
    let waterBottleLoaded = false;
    let waterBottleHighlightActive = false;
    let isPlaying = false;
    let playbackSpeed = 1;
    let currentYear = -8000;
    let selectedElement = null;
    let infoPanelVisible = false;
    let layoutMode = '3d';
    let isRotating = false;
    let rotateStart = 0;
    let rotateFrom = 0;
    let rotateTo = 0;

    const timeline = document.getElementById('timeline');
    const yearLabel = document.getElementById('yearLabel');
    const infoPanel = document.getElementById('infoPanel');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedSelect = document.getElementById('speedSelect');

    const categoryColors = {
      'alkali metal': '#ff6b6b',
      'alkaline earth': '#ffa06b',
      'transition metal': '#6bc5ff',
      'metalloid': '#a06bff',
      'nonmetal': '#6bff6b',
      'noble gas': '#ffff6b',
      'halogen': '#ff6bff',
      'other metal': '#6bffff'
    };

    const periodicData = [
      { atomicNumber: 1, symbol: 'H',  name: 'Hydrogen',  category: 'nonmetal',         discoveryYear: 1766,  row: 1, col: 0 },
      { atomicNumber: 2, symbol: 'He', name: 'Helium',    category: 'noble gas',        discoveryYear: 1868,  row: 1, col: 17 },

      { atomicNumber: 3, symbol: 'Li', name: 'Lithium',   category: 'alkali metal',     discoveryYear: 1817,  row: 2, col: 0 },
      { atomicNumber: 4, symbol: 'Be', name: 'Beryllium', category: 'alkaline earth',   discoveryYear: 1798,  row: 2, col: 1 },
      { atomicNumber: 5, symbol: 'B',  name: 'Boron',     category: 'metalloid',        discoveryYear: 1808,  row: 2, col: 12 },
      { atomicNumber: 6, symbol: 'C',  name: 'Carbon',    category: 'nonmetal',         discoveryYear: -3750, row: 2, col: 13 },
      { atomicNumber: 7, symbol: 'N',  name: 'Nitrogen',  category: 'nonmetal',         discoveryYear: 1772,  row: 2, col: 14 },
      { atomicNumber: 8, symbol: 'O',  name: 'Oxygen',    category: 'nonmetal',         discoveryYear: 1774,  row: 2, col: 15 },
      { atomicNumber: 9, symbol: 'F',  name: 'Fluorine',  category: 'halogen',          discoveryYear: 1886,  row: 2, col: 16 },
      { atomicNumber:10, symbol: 'Ne', name: 'Neon',      category: 'noble gas',        discoveryYear: 1898,  row: 2, col: 17 },

      { atomicNumber:11, symbol: 'Na', name: 'Sodium',    category: 'alkali metal',     discoveryYear: 1807,  row: 3, col: 0 },
      { atomicNumber:12, symbol: 'Mg', name: 'Magnesium', category: 'alkaline earth',   discoveryYear: 1755,  row: 3, col: 1 },
      { atomicNumber:13, symbol: 'Al', name: 'Aluminum',  category: 'other metal',      discoveryYear: 1825,  row: 3, col: 12 },
      { atomicNumber:14, symbol: 'Si', name: 'Silicon',   category: 'metalloid',        discoveryYear: 1824,  row: 3, col: 13 },
      { atomicNumber:15, symbol: 'P',  name: 'Phosphorus',category: 'nonmetal',         discoveryYear: 1669,  row: 3, col: 14 },
      { atomicNumber:16, symbol: 'S',  name: 'Sulfur',    category: 'nonmetal',         discoveryYear: -2000, row: 3, col: 15 },
      { atomicNumber:17, symbol: 'Cl', name: 'Chlorine',  category: 'halogen',          discoveryYear: 1774,  row: 3, col: 16 },
      { atomicNumber:18, symbol: 'Ar', name: 'Argon',     category: 'noble gas',        discoveryYear: 1894,  row: 3, col: 17 },

      { atomicNumber:19, symbol: 'K',  name: 'Potassium', category: 'alkali metal',     discoveryYear: 1807,  row: 4, col: 0 },
      { atomicNumber:20, symbol: 'Ca', name: 'Calcium',   category: 'alkaline earth',   discoveryYear: 1808,  row: 4, col: 1 },
      { atomicNumber:21, symbol: 'Sc', name: 'Scandium',  category: 'transition metal', discoveryYear: 1879,  row: 4, col: 2 },
      { atomicNumber:22, symbol: 'Ti', name: 'Titanium',  category: 'transition metal', discoveryYear: 1791,  row: 4, col: 3 },
      { atomicNumber:23, symbol: 'V',  name: 'Vanadium',  category: 'transition metal', discoveryYear: 1801,  row: 4, col: 4 },
      { atomicNumber:24, symbol: 'Cr', name: 'Chromium',  category: 'transition metal', discoveryYear: 1797,  row: 4, col: 5 },
      { atomicNumber:25, symbol: 'Mn', name: 'Manganese', category: 'transition metal', discoveryYear: 1774,  row: 4, col: 6 },
      { atomicNumber:26, symbol: 'Fe', name: 'Iron',      category: 'transition metal', discoveryYear: -5000, row: 4, col: 7 },
      { atomicNumber:27, symbol: 'Co', name: 'Cobalt',    category: 'transition metal', discoveryYear: 1735,  row: 4, col: 8 },
      { atomicNumber:28, symbol: 'Ni', name: 'Nickel',    category: 'transition metal', discoveryYear: 1751,  row: 4, col: 9 },
      { atomicNumber:29, symbol: 'Cu', name: 'Copper',    category: 'transition metal', discoveryYear: -9000, row: 4, col: 10 },
      { atomicNumber:30, symbol: 'Zn', name: 'Zinc',      category: 'transition metal', discoveryYear: -1000, row: 4, col: 11 },
      { atomicNumber:31, symbol: 'Ga', name: 'Gallium',   category: 'other metal',      discoveryYear: 1875,  row: 4, col: 12 },
      { atomicNumber:32, symbol: 'Ge', name: 'Germanium', category: 'metalloid',        discoveryYear: 1886,  row: 4, col: 13 },
      { atomicNumber:33, symbol: 'As', name: 'Arsenic',   category: 'metalloid',        discoveryYear: 1250,  row: 4, col: 14 },
      { atomicNumber:34, symbol: 'Se', name: 'Selenium',  category: 'nonmetal',         discoveryYear: 1817,  row: 4, col: 15 },
      { atomicNumber:35, symbol: 'Br', name: 'Bromine',   category: 'halogen',          discoveryYear: 1826,  row: 4, col: 16 },
      { atomicNumber:36, symbol: 'Kr', name: 'Krypton',   category: 'noble gas',        discoveryYear: 1898,  row: 4, col: 17 }
    ];

    function createTextTexture(symbol, atomicNumber) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 8;
      ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);

      ctx.fillStyle = '#111';
      ctx.font = 'bold 88px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(symbol, canvas.width / 2, canvas.height / 2 + 14);

      ctx.font = 'bold 34px Arial';
      ctx.textAlign = 'left';
      ctx.fillText(String(atomicNumber), 18, 34);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function makeElementMesh(el) {
      const geometry = new THREE.BoxGeometry(2.8, 2.8, 1.0);

      const color = categoryColors[el.category] || '#cccccc';
      const faceMaterial = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.45,
        metalness: 0.15,
        transparent: true,
        opacity: 1.0,
        emissive: 0x000000
      });

      const labelTexture = createTextTexture(el.symbol, el.atomicNumber);
      const labelMaterial = new THREE.MeshStandardMaterial({
        map: labelTexture,
        transparent: true
      });

      const materials = [
        faceMaterial,
        faceMaterial,
        faceMaterial,
        faceMaterial,
        labelMaterial,
        faceMaterial
      ];

      const mesh = new THREE.Mesh(geometry, materials);

      const x = el.col * 3.2 - (17 * 3.2) / 2;
      const z = -(el.row - 1) * 3.2;
      const y3d = ((el.atomicNumber % 5) - 2) * 0.7;

      mesh.position.set(x, y3d, z);
      mesh.userData.element = el;
      mesh.userData.baseColor = new THREE.Color(color);
      mesh.userData.targetVisibleY = 0;
      mesh.userData.targetHiddenY = -2;
      mesh.userData.flatY = 0;
      mesh.userData.threeDY = y3d;
      mesh.userData.targetOpacity = 1;
      mesh.userData.pulse = false;
      mesh.castShadow = false;
      mesh.receiveShadow = false;

      tableGroup.add(mesh);
      elements.push({ data: el, mesh });
      elementMeshes.push(mesh);
      symbolToElement[el.symbol] = mesh;
    }

    periodicData.forEach(makeElementMesh);

    function createSpriteLabel(text, position, scale = 8) {
      const canvas = document.createElement('canvas');
      canvas.width = 512;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(8, 8, canvas.width - 16, canvas.height - 16);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);

      ctx.fillStyle = 'white';
      ctx.font = 'bold 42px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.position.copy(position);
      sprite.scale.set(scale, scale * 0.25, 1);
      return sprite;
    }

    const bottleLabel = createSpriteLabel('H₂O - Water Molecule Demo', new THREE.Vector3(25, 13, -10), 14);
    scene.add(bottleLabel);

    const loader = new GLTFLoader();
    loader.load(
      'WaterBottle.glb',
      (gltf) => {
        waterBottle = gltf.scene;
        waterBottle.position.set(25, 5, -10);
        waterBottle.scale.set(8, 8, 8);
        waterBottle.traverse((obj) => {
          if (obj.isMesh) {
            obj.userData.isWaterBottle = true;
            if (obj.material) {
              obj.material = obj.material.clone();
            }
          }
        });
        scene.add(waterBottle);
        waterBottleLoaded = true;
      },
      undefined,
      () => {
        // Fallback bottle if asset fails
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(1.2, 1.2, 5.5, 24),
          new THREE.MeshStandardMaterial({ color: 0x66ccff, transparent: true, opacity: 0.7, roughness: 0.3 })
        );
        const cap = new THREE.Mesh(
          new THREE.CylinderGeometry(0.7, 0.7, 1.0, 24),
          new THREE.MeshStandardMaterial({ color: 0x3366aa, roughness: 0.5 })
        );
        cap.position.y = 3.2;
        fallback.add(body, cap);
        fallback.position.set(25, 5, -10);
        fallback.scale.set(2.6, 2.6, 2.6);
        fallback.traverse((obj) => { obj.userData.isWaterBottle = true; });
        scene.add(fallback);
        waterBottle = fallback;
        waterBottleLoaded = true;
      }
    );

    function setInfoPanel(elementData) {
      if (!elementData) {
        infoPanel.style.display = 'none';
        infoPanel.innerHTML = '';
        selectedElement = null;
        infoPanelVisible = false;
        return;
      }

      infoPanel.innerHTML = `
        <h3>${elementData.symbol} - ${elementData.name}</h3>
        <div><b>Atomic Number:</b> ${elementData.atomicNumber}</div>
        <div><b>Category:</b> ${elementData.category}</div>
        <div><b>Discovery Year:</b> ${elementData.discoveryYear}</div>
      `;
      infoPanel.style.display = 'block';
      selectedElement = elementData.symbol;
      infoPanelVisible = true;
    }

    function updateYearUI() {
      yearLabel.textContent = `Year: ${Math.round(currentYear)}`;
      timeline.value = Math.round(currentYear);
    }

    function togglePlay() {
      isPlaying = !isPlaying;
    }

    function setHighlightActive(active) {
      waterBottleHighlightActive = active;
      ['H', 'O'].forEach(sym => {
        const mesh = symbolToElement[sym];
        if (!mesh) return;
        mesh.userData.pulse = active;
        if (!active) {
          mesh.scale.set(1, 1, 1);
          mesh.material.forEach(mat => {
            if (mat && mat.emissive) mat.emissive.setHex(0x000000);
          });
        }
      });
    }

    function startTableRotation() {
      if (isRotating) return;
      isRotating = true;
      rotateStart = performance.now();
      rotateFrom = tableGroup.rotation.y;
      rotateTo = rotateFrom + Math.PI * 2;
    }

    function toggleLayout() {
      layoutMode = layoutMode === '3d' ? 'flat' : '3d';
    }

    timeline.addEventListener('input', () => {
      currentYear = parseInt(timeline.value, 10);
      updateYearUI();
    });

    playBtn.addEventListener('click', () => { isPlaying = true; });
    pauseBtn.addEventListener('click', () => { isPlaying = false; });
    resetBtn.addEventListener('click', () => {
      currentYear = -8000;
      updateYearUI();
      isPlaying = false;
    });

    speedSelect.addEventListener('change', () => {
      playbackSpeed = parseInt(speedSelect.value, 10);
    });

    function getIntersects(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const clickable = [...elementMeshes];
      if (waterBottle) {
        waterBottle.traverse(obj => {
          if (obj.isMesh) clickable.push(obj);
        });
      }
      return raycaster.intersectObjects(clickable, true);
    }

    window.addEventListener('click', (event) => {
      const intersects = getIntersects(event);
      if (intersects.length === 0) {
        setInfoPanel(null);
        return;
      }

      const hit = intersects[0].object;

      if (hit.userData?.element) {
        setInfoPanel(hit.userData.element);
        return;
      }

      let obj = hit;
      while (obj) {
        if (obj.userData?.isWaterBottle) {
          setHighlightActive(!waterBottleHighlightActive);
          return;
        }
        obj = obj.parent;
      }

      setInfoPanel(null);
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        togglePlay();
      } else if (e.key.toLowerCase() === 't') {
        toggleLayout();
      } else if (e.key.toLowerCase() === 'r') {
        startTableRotation();
      } else if (e.key === 'Escape') {
        setInfoPanel(null);
      }
    });

    window.__3D_STATE__ = {};

    function updateState() {
      const visibleCount = elements.filter(({ mesh }) => {
        const mat = mesh.material[0];
        return mat.opacity > 0.5;
      }).length;

      const posMap = {};
      elements.forEach(({ data, mesh }) => {
        posMap[data.symbol] = {
          x: mesh.position.x,
          y: mesh.position.y,
          z: mesh.position.z
        };
      });

      window.__3D_STATE__ = {
        currentYear: Math.round(currentYear),
        visibleElementCount: visibleCount,
        totalElements: 36,
        isPlaying,
        playbackSpeed,
        selectedElement,
        infoPanelVisible,
        layoutMode,
        isRotating,
        waterBottleLoaded,
        waterBottleHighlightActive,
        hydrogenHighlighted: !!symbolToElement['H']?.userData?.pulse,
        oxygenHighlighted: !!symbolToElement['O']?.userData?.pulse,
        elementPositions: posMap,
        cameraPosition: {
          x: camera.position.x,
          y: camera.position.y,
          z: camera.position.z
        }
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = clock.getDelta();
      const t = performance.now() * 0.001;

      if (isPlaying) {
        currentYear += 50 * playbackSpeed * dt;
        if (currentYear > 2020) {
          currentYear = 2020;
          isPlaying = false;
        }
        updateYearUI();
      }

      if (isRotating) {
        const elapsed = performance.now() - rotateStart;
        const alpha = Math.min(elapsed / 3000, 1);
        tableGroup.rotation.y = THREE.MathUtils.lerp(rotateFrom, rotateTo, alpha);
        if (alpha >= 1) {
          isRotating = false;
        }
      }

      elements.forEach(({ data, mesh }) => {
        const discovered = data.discoveryYear <= currentYear;
        const targetOpacity = discovered ? 1.0 : 0.15;
        const targetBaseY = discovered ? 0 : -2;
        const layoutY = layoutMode === 'flat' ? 0 : mesh.userData.threeDY;
        const targetY = layoutY + targetBaseY;

        mesh.position.y = THREE.MathUtils.lerp(mesh.position.y, targetY, 0.12);

        mesh.material.forEach((mat, idx) => {
          if (mat.transparent !== undefined) mat.transparent = true;
          if (idx !== 4 || mat.opacity !== undefined) {
            mat.opacity = THREE.MathUtils.lerp(mat.opacity ?? 1, targetOpacity, 0.12);
          }
        });

        if (mesh.userData.pulse) {
          const pulse = 1.2 + Math.sin(t * 4.5) * 0.2;
          mesh.scale.setScalar(pulse);
          mesh.material.forEach(mat => {
            if (mat && mat.emissive) {
              mat.emissive.setRGB(0.6, 0.6, 0.6);
            }
          });
        } else {
          mesh.scale.lerp(new THREE.Vector3(1,1,1), 0.15);
          mesh.material.forEach(mat => {
            if (mat && mat.emissive) {
              mat.emissive.lerp(new THREE.Color(0x000000), 0.15);
            }
          });
        }
      });

      if (waterBottle) {
        waterBottle.rotation.y += 0.003;
      }

      bottleLabel.lookAt(camera.position);
      controls.update();
      updateState();
      renderer.render(scene, camera);
    }

    updateYearUI();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
