<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Arial, sans-serif; background: #1a1a2e; }
canvas { display: block; }

#hud {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 32px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(107, 197, 255, 0.8);
    z-index: 10;
    pointer-events: none;
}

#timeline-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
    background: rgba(0,0,0,0.7);
    padding: 12px 24px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

#timeline-slider {
    width: 400px;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #6bc5ff, #ff6b6b);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
}

#timeline-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(107, 197, 255, 0.8);
}

.btn {
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
}

.btn:hover {
    background: rgba(255,255,255,0.25);
}

.btn.active {
    background: rgba(107, 197, 255, 0.4);
    border-color: #6bc5ff;
}

#speed-select {
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.1);
    color: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
}

#speed-select option {
    background: #1a1a2e;
    color: #fff;
}

#info-panel {
    position: fixed;
    right: -350px;
    top: 50%;
    transform: translateY(-50%);
    width: 300px;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 30px;
    color: #fff;
    z-index: 20;
    transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

#info-panel.visible {
    right: 20px;
}

#info-panel .symbol {
    font-size: 64px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 5px;
}

#info-panel .name {
    font-size: 24px;
    text-align: center;
    margin-bottom: 20px;
    opacity: 0.9;
}

#info-panel .detail {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 15px;
}

#info-panel .detail .label {
    opacity: 0.6;
}

#info-panel .close-btn {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    opacity: 0.6;
}

#info-panel .close-btn:hover {
    opacity: 1;
}

#water-label {
    position: fixed;
    color: #6bffff;
    font-size: 14px;
    font-weight: bold;
    pointer-events: none;
    z-index: 5;
    text-shadow: 0 0 10px rgba(107, 255, 255, 0.6);
    white-space: nowrap;
    display: none;
}

#instructions {
    position: fixed;
    top: 70px;
    left: 20px;
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    z-index: 5;
    line-height: 1.8;
}
</style>
</head>
<body>

<div id="hud">Year: -8000</div>

<div id="water-label">H₂O - Water Molecule Demo</div>

<div id="instructions">
    [T] Toggle Layout &nbsp; [R] Rotate Table &nbsp; [Space] Play/Pause<br>
    Click element for info &nbsp; Click bottle to highlight H & O
</div>

<div id="timeline-container">
    <button class="btn" id="btn-play">▶ Play</button>
    <button class="btn" id="btn-pause">⏸ Pause</button>
    <button class="btn" id="btn-reset">⏮ Reset</button>
    <input type="range" id="timeline-slider" min="-8000" max="2020" value="-8000" step="1">
    <select id="speed-select">
        <option value="1">1x</option>
        <option value="2">2x</option>
        <option value="5">5x</option>
    </select>
</div>

<div id="info-panel">
    <button class="close-btn" id="close-panel">&times;</button>
    <div class="symbol" id="panel-symbol">H</div>
    <div class="name" id="panel-name">Hydrogen</div>
    <div class="detail"><span class="label">Atomic Number</span><span id="panel-number">1</span></div>
    <div class="detail"><span class="label">Category</span><span id="panel-category">Nonmetal</span></div>
    <div class="detail"><span class="label">Discovery Year</span><span id="panel-year">1766</span></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ============ STATE ============
window.__3D_STATE__ = {
    currentYear: -8000,
    visibleElementCount: 0,
    totalElements: 36,
    isPlaying: false,
    playbackSpeed: 1,
    selectedElement: null,
    infoPanelVisible: false,
    layoutMode: '3d',
    isRotating: false,
    waterBottleLoaded: false,
    waterBottleHighlightActive: false,
    hydrogenHighlighted: false,
    oxygenHighlighted: false,
    elementPositions: {},
    cameraPosition: { x: 0, y: 30, z: 80 }
};

// ============ ELEMENT DATA ============
const CATEGORIES = {
    'alkali': { color: '#ff6b6b', name: 'Alkali Metal' },
    'alkaline': { color: '#ffa06b', name: 'Alkaline Earth Metal' },
    'transition': { color: '#6bc5ff', name: 'Transition Metal' },
    'metalloid': { color: '#a06bff', name: 'Metalloid' },
    'nonmetal': { color: '#6bff6b', name: 'Nonmetal' },
    'noble': { color: '#ffff6b', name: 'Noble Gas' },
    'halogen': { color: '#ff6bff', name: 'Halogen' },
    'other_metal': { color: '#6bffff', name: 'Other Metal' }
};

const elements = [
    { z: 1, symbol: 'H', name: 'Hydrogen', row: 0, col: 0, category: 'nonmetal', year: 1766 },
    { z: 2, symbol: 'He', name: 'Helium', row: 0, col: 17, category: 'noble', year: 1868 },
    { z: 3, symbol: 'Li', name: 'Lithium', row: 1, col: 0, category: 'alkali', year: 1817 },
    { z: 4, symbol: 'Be', name: 'Beryllium', row: 1, col: 1, category: 'alkaline', year: 1798 },
    { z: 5, symbol: 'B', name: 'Boron', row: 1, col: 12, category: 'metalloid', year: 1808 },
    { z: 6, symbol: 'C', name: 'Carbon', row: 1, col: 13, category: 'nonmetal', year: -3750 },
    { z: 7, symbol: 'N', name: 'Nitrogen', row: 1, col: 14, category: 'nonmetal', year: 1772 },
    { z: 8, symbol: 'O', name: 'Oxygen', row: 1, col: 15, category: 'nonmetal', year: 1774 },
    { z: 9, symbol: 'F', name: 'Fluorine', row: 1, col: 16, category: 'halogen', year: 1886 },
    { z: 10, symbol: 'Ne', name: 'Neon', row: 1, col: 17, category: 'noble', year: 1898 },
    { z: 11, symbol: 'Na', name: 'Sodium', row: 2, col: 0, category: 'alkali', year: 1807 },
    { z: 12, symbol: 'Mg', name: 'Magnesium', row: 2, col: 1, category: 'alkaline', year: 1755 },
    { z: 13, symbol: 'Al', name: 'Aluminium', row: 2, col: 12, category: 'other_metal', year: 1825 },
    { z: 14, symbol: 'Si', name: 'Silicon', row: 2, col: 13, category: 'metalloid', year: 1824 },
    { z: 15, symbol: 'P', name: 'Phosphorus', row: 2, col: 14, category: 'nonmetal', year: 1669 },
    { z: 16, symbol: 'S', name: 'Sulfur', row: 2, col: 15, category: 'nonmetal', year: -2000 },
    { z: 17, symbol: 'Cl', name: 'Chlorine', row: 2, col: 16, category: 'halogen', year: 1774 },
    { z: 18, symbol: 'Ar', name: 'Argon', row: 2, col: 17, category: 'noble', year: 1894 },
    { z: 19, symbol: 'K', name: 'Potassium', row: 3, col: 0, category: 'alkali', year: 1807 },
    { z: 20, symbol: 'Ca', name: 'Calcium', row: 3, col: 1, category: 'alkaline', year: 1808 },
    { z: 21, symbol: 'Sc', name: 'Scandium', row: 3, col: 2, category: 'transition', year: 1879 },
    { z: 22, symbol: 'Ti', name: 'Titanium', row: 3, col: 3, category: 'transition', year: 1791 },
    { z: 23, symbol: 'V', name: 'Vanadium', row: 3, col: 4, category: 'transition', year: 1801 },
    { z: 24, symbol: 'Cr', name: 'Chromium', row: 3, col: 5, category: 'transition', year: 1797 },
    { z: 25, symbol: 'Mn', name: 'Manganese', row: 3, col: 6, category: 'transition', year: 1774 },
    { z: 26, symbol: 'Fe', name: 'Iron', row: 3, col: 7, category: 'transition', year: -5000 },
    { z: 27, symbol: 'Co', name: 'Cobalt', row: 3, col: 8, category: 'transition', year: 1735 },
    { z: 28, symbol: 'Ni', name: 'Nickel', row: 3, col: 9, category: 'transition', year: 1751 },
    { z: 29, symbol: 'Cu', name: 'Copper', row: 3, col: 10, category: 'transition', year: -8000 },
    { z: 30, symbol: 'Zn', name: 'Zinc', row: 3, col: 11, category: 'transition', year: 1746 },
    { z: 31, symbol: 'Ga', name: 'Gallium', row: 3, col: 12, category: 'other_metal', year: 1875 },
    { z: 32, symbol: 'Ge', name: 'Germanium', row: 3, col: 13, category: 'metalloid', year: 1886 },
    { z: 33, symbol: 'As', name: 'Arsenic', row: 3, col: 14, category: 'metalloid', year: 1250 },
    { z: 34, symbol: 'Se', name: 'Selenium', row: 3, col: 15, category: 'nonmetal', year: 1817 },
    { z: 35, symbol: 'Br', name: 'Bromine', row: 3, col: 16, category: 'halogen', year: 1826 },
    { z: 36, symbol: 'Kr', name: 'Krypton', row: 3, col: 17, category: 'noble', year: 1898 }
];

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 30, 80);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(27, 0, -5);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 15);
scene.add(dirLight);

// ============ TABLE GROUP ============
const tableGroup = new THREE.Group();
scene.add(tableGroup);

// ============ CREATE ELEMENT BOXES ============
const SPACING = 3.2;
const elementMeshes = [];
const elementDataMap = {};

function createTextTexture(symbol, atomicNumber, color) {
    const canvas = document.createElement('canvas');
    canvas.width = 256;
    canvas.height = 256;
    const ctx = canvas.getContext('2d');

    // Background
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 256, 256);

    // Darker border
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 8;
    ctx.strokeRect(4, 4, 248, 248);

    // Inner highlight
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 2;
    ctx.strokeRect(12, 12, 232, 232);

    // Atomic number
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.font = 'bold 36px Segoe UI, Arial';
    ctx.textAlign = 'left';
    ctx.fillText(atomicNumber.toString(), 20, 45);

    // Symbol
    ctx.fillStyle = '#000';
    ctx.font = 'bold 90px Segoe UI, Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbol, 128, 140);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

function createSideTexture(color) {
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = color;
    ctx.fillRect(0, 0, 64, 64);
    // Slightly darker
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(0, 0, 64, 64);
    const texture = new THREE.CanvasTexture(canvas);
    return texture;
}

elements.forEach((el) => {
    const catInfo = CATEGORIES[el.category];
    const color = catInfo.color;

    const frontTexture = createTextTexture(el.symbol, el.z, color);
    const sideTexture = createSideTexture(color);

    const materials = [
        new THREE.MeshStandardMaterial({ map: sideTexture, transparent: true }),
        new THREE.MeshStandardMaterial({ map: sideTexture, transparent: true }),
        new THREE.MeshStandardMaterial({ map: sideTexture, transparent: true }),
        new THREE.MeshStandardMaterial({ map: sideTexture, transparent: true }),
        new THREE.MeshStandardMaterial({ map: frontTexture, transparent: true }),
        new THREE.MeshStandardMaterial({ map: sideTexture, transparent: true })
    ];

    const geometry = new THREE.BoxGeometry(2.8, 2.8, 1.0);
    const mesh = new THREE.Mesh(geometry, materials);

    const targetX = el.col * SPACING;
    const targetZ = -el.row * SPACING;
    const targetY = 0;

    mesh.position.set(targetX, targetY, targetZ);
    // Rotate so front face is up (facing camera from above)
    // Actually let's keep it flat on the XZ plane with face up
    mesh.rotation.x = -Math.PI / 2;

    mesh.userData = {
        element: el,
        targetX: targetX,
        targetY: targetY,
        targetZ: targetZ,
        baseY: 0,
        currentOpacity: 1.0,
        targetOpacity: 1.0,
        currentY: 0,
        baseScale: 1.0,
        pulseActive: false,
        pulsePhase: 0
    };

    tableGroup.add(mesh);
    elementMeshes.push(mesh);
    elementDataMap[el.symbol] = mesh;
});

// Center the table
const centerX = (17 * SPACING) / 2;
const centerZ = (-3 * SPACING) / 2;
tableGroup.position.set(-centerX, 0, -centerZ);

// ============ WATER BOTTLE ============
let waterBottleMesh = null;
const waterBottleGroup = new THREE.Group();
waterBottleGroup.position.set(25, 5, -10);
scene.add(waterBottleGroup);

// Create a placeholder water bottle since we can't load the actual GLB
function createWaterBottle() {
    const group = new THREE.Group();

    // Bottle body
    const bodyGeo = new THREE.CylinderGeometry(1.2, 1.2, 5, 16);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.6,
        roughness: 0.1,
        metalness: 0.3
    });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0;
    group.add(body);

    // Bottle neck
    const neckGeo = new THREE.CylinderGeometry(0.5, 0.8, 1.5, 16);
    const neckMat = new THREE.MeshStandardMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.6,
        roughness: 0.1,
        metalness: 0.3
    });
    const neck = new THREE.Mesh(neckGeo, neckMat);
    neck.position.y = 3.2;
    group.add(neck);

    // Cap
    const capGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.6, 16);
    const capMat = new THREE.MeshStandardMaterial({ color: 0x2255aa, roughness: 0.3 });
    const cap = new THREE.Mesh(capGeo, capMat);
    cap.position.y = 4.2;
    group.add(cap);

    // Water inside
    const waterGeo = new THREE.CylinderGeometry(1.0, 1.0, 3.5, 16);
    const waterMat = new THREE.MeshStandardMaterial({
        color: 0x00aaff,
        transparent: true,
        opacity: 0.4,
        roughness: 0.0,
        metalness: 0.1
    });
    const water = new THREE.Mesh(waterGeo, waterMat);
    water.position.y = -0.5;
    group.add(water);

    // Label "H₂O"
    const labelCanvas = document.createElement('canvas');
    labelCanvas.width = 256;
    labelCanvas.height = 128;
    const lctx = labelCanvas.getContext('2d');
    lctx.fillStyle = 'rgba(255,255,255,0.9)';
    lctx.fillRect(0, 0, 256, 128);
    lctx.fillStyle = '#0055aa';
    lctx.font = 'bold 48px Arial';
    lctx.textAlign = 'center';
    lctx.textBaseline = 'middle';
    lctx.fillText('H₂O', 128, 64);
    const labelTex = new THREE.CanvasTexture(labelCanvas);
    const labelGeo = new THREE.PlaneGeometry(2.4, 1.2);
    const labelMat = new THREE.MeshBasicMaterial({ map: labelTex, transparent: true });
    const labelMesh = new THREE.Mesh(labelGeo, labelMat);
    labelMesh.position.set(0, 0, 1.25);
    group.add(labelMesh);

    group.scale.set(1.5, 1.5, 1.5);
    return group;
}

// Try loading GLB, fallback to placeholder
const loader = new THREE.GLTFLoader();
try {
    loader.load(
        'WaterBottle.glb',
        (gltf) => {
            waterBottleMesh = gltf.scene;
            waterBottleMesh.scale.set(8, 8, 8);
            waterBottleGroup.add(waterBottleMesh);
            window.__3D_STATE__.waterBottleLoaded = true;
        },
        undefined,
        (error) => {
            console.log('GLB not found, using placeholder water bottle');
            waterBottleMesh = createWaterBottle();
            waterBottleGroup.add(waterBottleMesh);
            window.__3D_STATE__.waterBottleLoaded = true;
        }
    );
} catch (e) {
    waterBottleMesh = createWaterBottle();
    waterBottleGroup.add(waterBottleMesh);
    window.__3D_STATE__.waterBottleLoaded = true;
}

// ============ RAYCASTER ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

// ============ DOM ELEMENTS ============
const hudEl = document.getElementById('hud');
const sliderEl = document.getElementById('timeline-slider');
const btnPlay = document.getElementById('btn-play');
const btnPause = document.getElementById('btn-pause');
const btnReset = document.getElementById('btn-reset');
const speedSelect = document.getElementById('speed-select');
const infoPanel = document.getElementById('info-panel');
const closePanel = document.getElementById('close-panel');
const waterLabel = document.getElementById('water-label');

// ============ TIMELINE CONTROLS ============
let isPlaying = false;
let playbackSpeed = 1;
let lastTime = 0;
let accumulatedTime = 0;

sliderEl.addEventListener('input', () => {
    window.__3D_STATE__.currentYear = parseInt(sliderEl.value);
});

btnPlay.addEventListener('click', () => {
    isPlaying = true;
    window.__3D_STATE__.isPlaying = true;
    btnPlay.classList.add('active');
    btnPause.classList.remove('active');
});

btnPause.addEventListener('click', () => {
    isPlaying = false;
    window.__3D_STATE__.isPlaying = false;
    btnPause.classList.add('active');
    btnPlay.classList.remove('active');
});

btnReset.addEventListener('click', () => {
    sliderEl.value = -8000;
    window.__3D_STATE__.currentYear = -8000;
    isPlaying = false;
    window.__3D_STATE__.isPlaying = false;
    btnPlay.classList.remove('active');
    btnPause.classList.remove('active');
});

speedSelect.addEventListener('change', () => {
    playbackSpeed = parseInt(speedSelect.value);
    window.__3D_STATE__.playbackSpeed = playbackSpeed;
});

// ============ INFO PANEL ============
function showInfoPanel(el) {
    const catInfo = CATEGORIES[el.category];
    document.getElementById('panel-symbol').textContent = el.symbol;
    document.getElementById('panel-symbol').style.color = catInfo.color;
    document.getElementById('panel-name').textContent = el.name;
    document.getElementById('panel-number').textContent = el.z;
    document.getElementById('panel-category').textContent = catInfo.name;
    document.getElementById('panel-year').textContent = el.year < 0 ? `${Math.abs(el.year)} BC` : el.year;
    infoPanel.classList.add('visible');
    window.__3D_STATE__.infoPanelVisible = true;
    window.__3D_STATE__.selectedElement = el.symbol;
}

function hideInfoPanel() {
    infoPanel.classList.remove('visible');
    window.__3D_STATE__.infoPanelVisible = false;
    window.__3D_STATE__.selectedElement = null;
}

closePanel.addEventListener('click', hideInfoPanel);

// ============ CLICK HANDLING ============
let waterBottleHighlightActive = false;

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    // Check water bottle
    const bottleIntersects = raycaster.intersectObject(waterBottleGroup, true);
    if (bottleIntersects.length > 0) {
        waterBottleHighlightActive = !waterBottleHighlightActive;
        window.__3D_STATE__.waterBottleHighlightActive = waterBottleHighlightActive;

        if (!waterBottleHighlightActive) {
            // Reset H and O
            const hMesh = elementDataMap['H'];
            const oMesh = elementDataMap['O'];
            if (hMesh) {
                hMesh.userData.pulseActive = false;
                hMesh.scale.set(1, 1, 1);
                hMesh.materials && hMesh.materials.forEach(m => m.emissive && m.emissive.set(0, 0, 0));
                hMesh.material.forEach && hMesh.material.forEach(m => { if (m.emissive) m.emissive.set(0, 0, 0); });
            }
            if (oMesh) {
                oMesh.userData.pulseActive = false;
                oMesh.scale.set(1, 1, 1);
                oMesh.material.forEach && oMesh.material.forEach(m => { if (m.emissive) m.emissive.set(0, 0, 0); });
            }
            window.__3D_STATE__.hydrogenHighlighted = false;
            window.__3D_STATE__.oxygenHighlighted = false;
        } else {
            const hMesh = elementDataMap['H'];
            const oMesh = elementDataMap['O'];
            if (hMesh) hMesh.userData.pulseActive = true;
            if (oMesh) oMesh.userData.pulseActive = true;
            window.__3D_STATE__.hydrogenHighlighted = true;
            window.__3D_STATE__.oxygenHighlighted = true;
        }
        return;
    }

    // Check element boxes
    const elementIntersects = raycaster.intersectObjects(elementMeshes, false);
    if (elementIntersects.length > 0) {
        const mesh = elementIntersects[0].object;
        const el = mesh.userData.element;
        showInfoPanel(el);
        return;
    }

    // Clicked empty space
    hideInfoPanel();
});

// ============ KEYBOARD CONTROLS ============
let layoutMode = '3d';
let isRotating = false;
let rotationStart = 0;
let rotationDuration = 3000;
let rotationStartAngle = 0;

document.addEventListener('keydown', (event) => {
    if (event.key === 't' || event.key === 'T') {
        layoutMode = layoutMode === '3d' ? 'flat' : '3d';
        window.__3D_STATE__.layoutMode = layoutMode;

        elementMeshes.forEach((mesh) => {
            const el = mesh.userData.element;
            if (layoutMode === 'flat') {
                mesh.userData.targetY = 0;
            } else {
                // 3D mode - stagger rows in Y
                mesh.userData.targetY = el.row * 1.5;
            }
        });
    }

    if (event.key === 'r' || event.key === 'R') {
        if (!isRotating) {
            isRotating = true;
            window.__3D_STATE__.isRotating = true;
            rotationStart = performance.now();
            rotationStartAngle = tableGroup.rotation.y;
        }
    }

    if (event.key === ' ') {
        event.preventDefault();
        if (isPlaying) {
            btnPause.click();
        } else {
            btnPlay.click();
        }
    }

    if (event.key === 'Escape') {
        hideInfoPanel();
    }
});

// ============ GRID FLOOR ============
const gridHelper = new THREE.GridHelper(120, 40, 0x333355, 0x222244);
gridHelper.position.y = -4;
scene.add(gridHelper);

// ============ PARTICLES ============
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 120;
    particlePositions[i * 3 + 1] = Math.random() * 40;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 60;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x6bc5ff, size: 0.15, transparent: true, opacity: 0.4 });
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ ANIMATION LOOP ============
function lerp(a, b, t) {
    return a + (b - a) * t;
}

function animate(time) {
    requestAnimationFrame(animate);

    const delta = lastTime ? (time - lastTime) / 1000 : 0;
    lastTime = time;

    // Timeline auto-play
    if (isPlaying) {
        accumulatedTime += delta;
        const yearsPerSecond = 50 * playbackSpeed;
        let currentYear = parseInt(sliderEl.value);
        currentYear += yearsPerSecond * delta;
        if (currentYear > 2020) {
            currentYear = 2020;
            isPlaying = false;
            window.__3D_STATE__.isPlaying = false;
            btnPlay.classList.remove('active');
        }
        sliderEl.value = Math.round(currentYear);
        window.__3D_STATE__.currentYear = Math.round(currentYear);
    }

    const currentYear = parseInt(sliderEl.value);
    window.__3D_STATE__.currentYear = currentYear;

    // Update HUD
    const yearDisplay = currentYear < 0 ? `${Math.abs(currentYear)} BC` : `${currentYear} AD`;
    hudEl.textContent = `Year: ${yearDisplay}`;

    // Update element visibility based on timeline
    let visibleCount = 0;
    const lerpSpeed = 0.05;

    elementMeshes.forEach((mesh) => {
        const el = mesh.userData.element;
        const discovered = el.year <= currentYear;

        mesh.userData.targetOpacity = discovered ? 1.0 : 0.15;
        const targetY = discovered ? mesh.userData.targetY : -2;

        // Lerp opacity
        mesh.userData.currentOpacity = lerp(mesh.userData.currentOpacity, mesh.userData.targetOpacity, lerpSpeed);

        // Lerp Y position
        mesh.userData.currentY = lerp(mesh.userData.currentY, targetY, lerpSpeed);

        // Apply
        const baseX = el.col * SPACING;
        const baseZ = -el.row * SPACING;
        mesh.position.set(baseX, mesh.userData.currentY, baseZ);

        mesh.material.forEach(mat => {
            mat.opacity = mesh.userData.currentOpacity;
        });

        if (mesh.userData.currentOpacity > 0.5) visibleCount++;

        // Pulse effect for H and O
        if (mesh.userData.pulseActive) {
            mesh.userData.pulsePhase += delta * 4;
            const scale = 1.0 + 0.4 * Math.abs(Math.sin(mesh.userData.pulsePhase));
            mesh.scale.set(scale, scale, scale);
            mesh.material.forEach(mat => {
                if (mat.emissive) mat.emissive.set(1, 1, 1);
                mat.emissiveIntensity = 0.3 + 0.3 * Math.abs(Math.sin(mesh.userData.pulsePhase));
            });
        } else {
            mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
            mesh.material.forEach(mat => {
                if (mat.emissive) {
                    mat.emissive.lerp(new THREE.Color(0, 0, 0), 0.1);
                    mat.emissiveIntensity = lerp(mat.emissiveIntensity || 0, 0, 0.1);
                }
            });
        }

        // Update positions in state
        const worldPos = new THREE.Vector3();
        mesh.getWorldPosition(worldPos);
        window.__3D_STATE__.elementPositions[el.symbol] = {
            x: parseFloat(worldPos.x.toFixed(2)),
            y: parseFloat(worldPos.y.toFixed(2)),
            z: parseFloat(worldPos.z.toFixed(2))
        };
    });

    window.__3D_STATE__.visibleElementCount = visibleCount;

    // Rotation animation
    if (isRotating) {
        const elapsed = time - rotationStart;
        const progress = Math.min(elapsed / rotationDuration, 1);
        // Ease in-out
        const eased = progress < 0.5
            ? 2 * progress * progress
            : 1 - Math.pow(-2 * progress + 2, 2) / 2;
        tableGroup.rotation.y = rotationStartAngle + eased * Math.PI * 2;

        if (progress >= 1) {
            isRotating = false;
            window.__3D_STATE__.isRotating = false;
            tableGroup.rotation.y = rotationStartAngle + Math.PI * 2;
        }
    }

    // Water bottle floating animation
    if (waterBottleMesh) {
        waterBottleGroup.position.y = 5 + Math.sin(time * 0.001) * 0.5;
        waterBottleGroup.rotation.y += delta * 0.3;
    }

    // Update water label position
    const labelPos = new THREE.Vector3(25, 12, -10);
    labelPos.project(camera);
    const lx = (labelPos.x * 0.5 + 0.5) * window.innerWidth;
    const ly = (-labelPos.y * 0.5 + 0.5) * window.innerHeight;
    waterLabel.style.left = lx + 'px';
    waterLabel.style.top = ly + 'px';
    waterLabel.style.display = labelPos.z < 1 ? 'block' : 'none';
    waterLabel.style.transform = 'translate(-50%, -50%)';

    // Animate particles
    const positions = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += delta * 0.5;
        if (positions[i * 3 + 1] > 40) positions[i * 3 + 1] = 0;
    }
    particleGeo.attributes.position.needsUpdate = true;

    // Update state
    window.__3D_STATE__.cameraPosition = {
        x: parseFloat(camera.position.x.toFixed(2)),
        y: parseFloat(camera.position.y.toFixed(2)),
        z: parseFloat(camera.position.z.toFixed(2))
    };
    window.__3D_STATE__.layoutMode = layoutMode;

    controls.update();
    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
animate(0);
</script>
</body>
</html>
