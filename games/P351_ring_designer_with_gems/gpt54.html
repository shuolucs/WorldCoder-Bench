<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Ring Designer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #111827 45%, #1f2937 100%);
      color: white;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #ui-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 280px;
      padding: 18px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #title {
      margin: 0 0 16px 0;
      font-size: 24px;
    }

    .section {
      margin-bottom: 16px;
    }

    .section label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 12px;
      cursor: pointer;
      color: white;
      background: #334155;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    button.active {
      outline: 2px solid white;
      background: #475569;
    }

    input[type="range"] {
      width: 100%;
    }

    #price-display {
      margin-top: 8px;
      padding: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      font-size: 18px;
      font-weight: bold;
      color: #facc15;
    }

    .small-text {
      font-size: 13px;
      color: #cbd5e1;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-panel">
      <h2 id="title">Ring Designer</h2>

      <div class="section">
        <label>Ring Metal</label>
        <div class="button-row">
          <button id="metal-gold" class="active">Gold</button>
          <button id="metal-silver">Silver</button>
          <button id="metal-rosegold">Rose Gold</button>
        </div>
      </div>

      <div class="section">
        <label>Gem Color</label>
        <div class="button-row">
          <button id="gem-red" class="active">Red</button>
          <button id="gem-blue">Blue</button>
          <button id="gem-green">Green</button>
          <button id="gem-diamond">Diamond</button>
        </div>
      </div>

      <div class="section">
        <label for="gem-count">Gem Count: <span id="gem-count-label">6</span></label>
        <input id="gem-count" type="range" min="0" max="12" step="1" value="6" />
      </div>

      <div class="section">
        <label for="ring-size">Ring Size: <span id="ring-size-label">1.2</span></label>
        <input id="ring-size" type="range" min="0.8" max="2.0" step="0.1" value="1.2" />
      </div>

      <div class="section">
        <div class="button-row">
          <button id="toggle-rotate">Toggle Auto-Rotate</button>
          <button id="toggle-fish">Toggle Fish</button>
        </div>
      </div>

      <div id="price-display">$1600</div>
      <div class="small-text">Base $500 + $150/gem + metal surcharge</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { RoomEnvironment } from 'https://unpkg.com/three@0.160.0/examples/jsm/environments/RoomEnvironment.js';

    const app = document.getElementById('app');

    const METALS = {
      gold: { color: 0xFFD700, surcharge: 200 },
      silver: { color: 0xC0C0C0, surcharge: 0 },
      rosegold: { color: 0xB76E79, surcharge: 300 }
    };

    const GEMS = {
      red: { color: 0xFF0000, transmission: 0.5 },
      blue: { color: 0x0000FF, transmission: 0.5 },
      green: { color: 0x00FF00, transmission: 0.5 },
      diamond: { color: 0xFFFFFF, transmission: 0.9 }
    };

    function safeNumber(v, fallback) {
      return Number.isFinite(v) ? v : fallback;
    }

    window.__3D_STATE__ = {
      ringColor: 0xFFD700,
      gemColor: 0xFF0000,
      gemCount: 6,
      ringSize: 1.2,
      autoRotate: false,
      fishVisible: true,
      fishY: 0.5,
      totalPrice: 1600,
      metalType: 'gold',
      gemType: 'red',
      frameCount: 0
    };

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      45,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 2, 5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.autoRotate = false;
    controls.autoRotateSpeed = 1.2;

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 0.8);
    pointLight.position.set(-3, 3, 3);
    scene.add(pointLight);

    const ringGroup = new THREE.Group();
    scene.add(ringGroup);

    let ringMesh;
    let gemMeshes = [];
    let fishModel = null;

    const ringMaterial = new THREE.MeshStandardMaterial({
      color: window.__3D_STATE__.ringColor,
      metalness: 0.9,
      roughness: 0.1
    });

    function createRing(radius = 1.2) {
      if (ringMesh) {
        ringGroup.remove(ringMesh);
        ringMesh.geometry.dispose();
      }

      const geometry = new THREE.TorusGeometry(radius, 0.15, 32, 100);
      ringMesh = new THREE.Mesh(geometry, ringMaterial);
      ringMesh.position.set(0, 0, 0);
      ringGroup.add(ringMesh);
    }

    function getGemMaterial() {
      const gemType = window.__3D_STATE__.gemType;
      const gemConfig = GEMS[gemType] || GEMS.red;

      return new THREE.MeshPhysicalMaterial({
        color: gemConfig.color,
        transmission: gemConfig.transmission,
        roughness: 0.05,
        metalness: 0.1,
        transparent: true,
        opacity: 1.0,
        thickness: 0.4,
        ior: gemType === 'diamond' ? 2.4 : 1.5,
        clearcoat: 1.0
      });
    }

    function clearGems() {
      gemMeshes.forEach(gem => {
        ringGroup.remove(gem);
        gem.geometry.dispose();
        gem.material.dispose();
      });
      gemMeshes = [];
    }

    function createGems(count, radius) {
      clearGems();

      const safeCount = Math.max(0, Math.min(12, safeNumber(count, 6)));
      const gemRadius = 0.08;
      const tubeRadius = 0.15;
      const geometry = new THREE.SphereGeometry(gemRadius, 32, 32);

      for (let i = 0; i < safeCount; i++) {
        const t = safeCount <= 1 ? 0.5 : i / (safeCount - 1);
        const angle = Math.PI * t;
        const x = Math.cos(angle) * radius;
        const y = Math.sin(angle) * radius;
        const z = tubeRadius + 0.05;

        const material = getGemMaterial();
        const gem = new THREE.Mesh(geometry.clone(), material);
        gem.position.set(x, y, z);
        ringGroup.add(gem);
        gemMeshes.push(gem);
      }
    }

    function updateRingAndGems() {
      const radius = Math.max(0.8, Math.min(2.0, safeNumber(window.__3D_STATE__.ringSize, 1.2)));
      window.__3D_STATE__.ringSize = radius;
      createRing(radius);
      createGems(window.__3D_STATE__.gemCount, radius);
    }

    function updateRingColor() {
      const color = safeNumber(window.__3D_STATE__.ringColor, 0xFFD700);
      ringMaterial.color.setHex(color);
    }

    function updateGemColor() {
      const gemType = window.__3D_STATE__.gemType in GEMS ? window.__3D_STATE__.gemType : 'red';
      const gemConfig = GEMS[gemType];

      window.__3D_STATE__.gemColor = gemConfig.color;

      gemMeshes.forEach(gem => {
        gem.material.color.setHex(gemConfig.color);
        gem.material.transmission = gemConfig.transmission;
        gem.material.ior = gemType === 'diamond' ? 2.4 : 1.5;
        gem.material.needsUpdate = true;
      });
    }

    function calculatePrice() {
      const gemCount = Math.max(0, Math.min(12, safeNumber(window.__3D_STATE__.gemCount, 6)));
      const metalType = window.__3D_STATE__.metalType in METALS ? window.__3D_STATE__.metalType : 'gold';
      const surcharge = safeNumber(METALS[metalType].surcharge, 200);

      const total = 500 + gemCount * 150 + surcharge;
      window.__3D_STATE__.totalPrice = safeNumber(total, 500);
      document.getElementById('price-display').textContent = `$${window.__3D_STATE__.totalPrice}`;
    }

    function setActiveButton(groupIds, activeId) {
      groupIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.toggle('active', id === activeId);
      });
    }

    createRing(window.__3D_STATE__.ringSize);
    createGems(window.__3D_STATE__.gemCount, window.__3D_STATE__.ringSize);
    calculatePrice();

    const loader = new GLTFLoader();
    loader.load(
      'BarramundiFish.glb',
      (gltf) => {
        fishModel = gltf.scene;
        fishModel.scale.setScalar(0.3);
        fishModel.position.set(0, 0.5, 0);
        fishModel.visible = window.__3D_STATE__.fishVisible;
        ringGroup.add(fishModel);
      },
      undefined,
      (error) => {
        console.warn('Failed to load BarramundiFish.glb:', error);
      }
    );

    document.getElementById('metal-gold').addEventListener('click', () => {
      window.__3D_STATE__.metalType = 'gold';
      window.__3D_STATE__.ringColor = METALS.gold.color;
      updateRingColor();
      calculatePrice();
      setActiveButton(['metal-gold', 'metal-silver', 'metal-rosegold'], 'metal-gold');
    });

    document.getElementById('metal-silver').addEventListener('click', () => {
      window.__3D_STATE__.metalType = 'silver';
      window.__3D_STATE__.ringColor = METALS.silver.color;
      updateRingColor();
      calculatePrice();
      setActiveButton(['metal-gold', 'metal-silver', 'metal-rosegold'], 'metal-silver');
    });

    document.getElementById('metal-rosegold').addEventListener('click', () => {
      window.__3D_STATE__.metalType = 'rosegold';
      window.__3D_STATE__.ringColor = METALS.rosegold.color;
      updateRingColor();
      calculatePrice();
      setActiveButton(['metal-gold', 'metal-silver', 'metal-rosegold'], 'metal-rosegold');
    });

    document.getElementById('gem-red').addEventListener('click', () => {
      window.__3D_STATE__.gemType = 'red';
      window.__3D_STATE__.gemColor = GEMS.red.color;
      updateGemColor();
      calculatePrice();
      setActiveButton(['gem-red', 'gem-blue', 'gem-green', 'gem-diamond'], 'gem-red');
    });

    document.getElementById('gem-blue').addEventListener('click', () => {
      window.__3D_STATE__.gemType = 'blue';
      window.__3D_STATE__.gemColor = GEMS.blue.color;
      updateGemColor();
      calculatePrice();
      setActiveButton(['gem-red', 'gem-blue', 'gem-green', 'gem-diamond'], 'gem-blue');
    });

    document.getElementById('gem-green').addEventListener('click', () => {
      window.__3D_STATE__.gemType = 'green';
      window.__3D_STATE__.gemColor = GEMS.green.color;
      updateGemColor();
      calculatePrice();
      setActiveButton(['gem-red', 'gem-blue', 'gem-green', 'gem-diamond'], 'gem-green');
    });

    document.getElementById('gem-diamond').addEventListener('click', () => {
      window.__3D_STATE__.gemType = 'diamond';
      window.__3D_STATE__.gemColor = GEMS.diamond.color;
      updateGemColor();
      calculatePrice();
      setActiveButton(['gem-red', 'gem-blue', 'gem-green', 'gem-diamond'], 'gem-diamond');
    });

    document.getElementById('gem-count').addEventListener('input', (e) => {
      const count = Math.max(0, Math.min(12, parseInt(e.target.value, 10) || 0));
      window.__3D_STATE__.gemCount = count;
      document.getElementById('gem-count-label').textContent = String(count);
      createGems(count, window.__3D_STATE__.ringSize);
      updateGemColor();
      calculatePrice();
    });

    document.getElementById('ring-size').addEventListener('input', (e) => {
      const size = Math.max(0.8, Math.min(2.0, parseFloat(e.target.value) || 1.2));
      window.__3D_STATE__.ringSize = size;
      document.getElementById('ring-size-label').textContent = size.toFixed(1);
      updateRingAndGems();
      updateGemColor();

      if (fishModel) {
        fishModel.position.set(0, 0.5, 0);
      }
    });

    document.getElementById('toggle-rotate').addEventListener('click', () => {
      window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
      controls.autoRotate = window.__3D_STATE__.autoRotate;
    });

    document.getElementById('toggle-fish').addEventListener('click', () => {
      window.__3D_STATE__.fishVisible = !window.__3D_STATE__.fishVisible;
      if (fishModel) {
        fishModel.visible = window.__3D_STATE__.fishVisible;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function clampObjectBounds() {
      const maxRadius = 5;

      if (fishModel) {
        const p = fishModel.position;
        const len = Math.sqrt(p.x * p.x + p.y * p.y + p.z * p.z);
        if (len > maxRadius) {
          p.multiplyScalar(maxRadius / len);
        }
      }
    }

    function animate() {
      requestAnimationFrame(animate);

      window.__3D_STATE__.frameCount = safeNumber(window.__3D_STATE__.frameCount, 0) + 1;

      if (fishModel) {
        const y = 0.5 + Math.sin(Date.now() * 0.001) * 0.1;
        fishModel.position.y = safeNumber(y, 0.5);
        window.__3D_STATE__.fishY = safeNumber(fishModel.position.y, 0.5);
        fishModel.visible = !!window.__3D_STATE__.fishVisible;
      } else {
        window.__3D_STATE__.fishY = 0.5;
      }

      controls.autoRotate = !!window.__3D_STATE__.autoRotate;
      controls.update();

      clampObjectBounds();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
