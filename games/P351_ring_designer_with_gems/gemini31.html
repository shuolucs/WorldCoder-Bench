<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ring Designer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(15, 20, 35, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            max-height: 90vh;
            overflow-y: auto;
        }
        #title {
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
            color: #e0e0e0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .control-group {
            margin-bottom: 20px;
        }
        .control-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaaaaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        button {
            flex: 1;
            min-width: 70px;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: transform 0.1s, opacity 0.2s;
            color: #ffffff;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        button:hover {
            opacity: 0.8;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(1px);
        }
        /* Metal Buttons */
        #metal-gold { background: linear-gradient(135deg, #FFD700, #B8860B); color: #000; text-shadow: none;}
        #metal-silver { background: linear-gradient(135deg, #E0E0E0, #808080); color: #000; text-shadow: none;}
        #metal-rosegold { background: linear-gradient(135deg, #B76E79, #8A3346); }
        
        /* Gem Buttons */
        #gem-red { background: #cc0000; }
        #gem-blue { background: #0044cc; }
        #gem-green { background: #009900; }
        #gem-diamond { background: #ffffff; color: #000; text-shadow: none; }

        /* Sliders */
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] {
            flex: 1;
            accent-color: #4CAF50;
        }
        .slider-value {
            min-width: 24px;
            text-align: right;
            font-weight: bold;
        }

        /* Toggles */
        .toggle-btn {
            background: #333;
            width: 100%;
            margin-bottom: 8px;
            padding: 10px;
        }

        #price-display {
            margin-top: 25px;
            padding: 15px;
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid #4CAF50;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            color: #4CAF50;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-panel">
        <h2 id="title">Ring Designer</h2>
        
        <div class="control-group">
            <span class="control-label">Ring Metal</span>
            <div class="btn-group">
                <button id="metal-gold">Gold</button>
                <button id="metal-silver">Silver</button>
                <button id="metal-rosegold">Rose Gold</button>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Gem Color</span>
            <div class="btn-group">
                <button id="gem-red">Ruby</button>
                <button id="gem-blue">Sapphire</button>
                <button id="gem-green">Emerald</button>
                <button id="gem-diamond">Diamond</button>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Gem Count</span>
            <div class="slider-container">
                <input type="range" id="gem-count" min="0" max="12" value="6">
                <span id="gem-count-label" class="slider-value">6</span>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">Ring Size</span>
            <div class="slider-container">
                <input type="range" id="ring-size" min="0.8" max="2.0" step="0.1" value="1.2">
                <span id="ring-size-label" class="slider-value">1.2</span>
            </div>
        </div>

        <div class="control-group">
            <span class="control-label">View Options</span>
            <button id="toggle-rotate" class="toggle-btn">Toggle Auto-Rotate</button>
            <button id="toggle-fish" class="toggle-btn">Toggle Fish Ornament</button>
        </div>

        <div id="price-display">Price: $1600</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

        // Initialize State
        window.__3D_STATE__ = {
            ringColor: 0xFFD700,
            gemColor: 0xFF0000,
            gemCount: 6,
            ringSize: 1.2,
            autoRotate: false,
            fishVisible: true,
            fishY: 0.5,
            totalPrice: 1600,
            metalType: 'gold',
            gemType: 'red',
            frameCount: 0
        };
        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 5);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Environment for realistic reflections
        const pmremGenerator = new THREE.PMREMGenerator(renderer);
        scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

        // Lights
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 0.8);
        pointLight.position.set(-3, 3, 3);
        scene.add(pointLight);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = state.autoRotate;
        controls.autoRotateSpeed = 2.0;

        // 3D Objects
        // 1. Ring
        let ringGeometry = new THREE.TorusGeometry(state.ringSize, 0.15, 32, 100);
        const ringMaterial = new THREE.MeshStandardMaterial({
            color: state.ringColor,
            metalness: 0.9,
            roughness: 0.1
        });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.rotation.x = -Math.PI / 2; // Lay flat
        scene.add(ring);

        // 2. Gems
        const gemsGroup = new THREE.Group();
        scene.add(gemsGroup);
        const gemGeometry = new THREE.SphereGeometry(0.08, 32, 32);

        function updateGems() {
            // Clear existing gems
            while (gemsGroup.children.length > 0) {
                const child = gemsGroup.children[0];
                gemsGroup.remove(child);
                if(child.material) child.material.dispose();
            }

            if (state.gemCount === 0) return;

            const isDiamond = state.gemType === 'diamond';
            const gemMaterial = new THREE.MeshPhysicalMaterial({
                color: state.gemColor,
                transmission: isDiamond ? 0.9 : 0.5,
                opacity: 1,
                metalness: 0.1,
                roughness: 0.05,
                ior: isDiamond ? 2.4 : 1.5,
                thickness: 0.1,
                specularIntensity: 1.0
            });

            for (let i = 0; i < state.gemCount; i++) {
                const gem = new THREE.Mesh(gemGeometry, gemMaterial);
                
                // Distribute evenly along the upper half (semi-circle in XZ plane)
                let angle = Math.PI / 2; // Default to center if only 1
                if (state.gemCount > 1) {
                    angle = Math.PI * (i / (state.gemCount - 1));
                }

                gem.position.x = state.ringSize * Math.cos(angle);
                gem.position.z = -state.ringSize * Math.sin(angle);
                gem.position.y = 0.15; // Sit on top surface of the flat ring

                gemsGroup.add(gem);
            }
        }
        updateGems();

        // 3. Fish Ornament
        let fishModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BarramundiFish/glTF-Binary/BarramundiFish.glb',
            function (gltf) {
                fishModel = gltf.scene;
                fishModel.scale.set(0.3, 0.3, 0.3);
                fishModel.position.set(0, 0.5, 0);
                scene.add(fishModel);
            },
            undefined,
            function (error) {
                console.error('Error loading fish model:', error);
            }
        );

        // UI Logic & State Updates
        function updatePriceDisplay() {
            let metalSurcharge = 0;
            if (state.metalType === 'gold') metalSurcharge = 200;
            else if (state.metalType === 'rosegold') metalSurcharge = 300;
            // silver is 0

            state.totalPrice = 500 + (state.gemCount * 150) + metalSurcharge;
            document.getElementById('price-display').innerText = `Price: $${state.totalPrice}`;
        }

        // Metal Buttons
        document.getElementById('metal-gold').addEventListener('click', () => {
            state.metalType = 'gold';
            state.ringColor = 0xFFD700;
            ringMaterial.color.setHex(state.ringColor);
            updatePriceDisplay();
        });
        document.getElementById('metal-silver').addEventListener('click', () => {
            state.metalType = 'silver';
            state.ringColor = 0xC0C0C0;
            ringMaterial.color.setHex(state.ringColor);
            updatePriceDisplay();
        });
        document.getElementById('metal-rosegold').addEventListener('click', () => {
            state.metalType = 'rosegold';
            state.ringColor = 0xB76E79;
            ringMaterial.color.setHex(state.ringColor);
            updatePriceDisplay();
        });

        // Gem Buttons
        document.getElementById('gem-red').addEventListener('click', () => {
            state.gemType = 'red';
            state.gemColor = 0xFF0000;
            updateGems();
            updatePriceDisplay();
        });
        document.getElementById('gem-blue').addEventListener('click', () => {
            state.gemType = 'blue';
            state.gemColor = 0x0000FF;
            updateGems();
            updatePriceDisplay();
        });
        document.getElementById('gem-green').addEventListener('click', () => {
            state.gemType = 'green';
            state.gemColor = 0x00FF00;
            updateGems();
            updatePriceDisplay();
        });
        document.getElementById('gem-diamond').addEventListener('click', () => {
            state.gemType = 'diamond';
            state.gemColor = 0xFFFFFF;
            updateGems();
            updatePriceDisplay();
        });

        // Sliders
        document.getElementById('gem-count').addEventListener('input', (e) => {
            state.gemCount = parseInt(e.target.value);
            document.getElementById('gem-count-label').innerText = state.gemCount;
            updateGems();
            updatePriceDisplay();
        });

        document.getElementById('ring-size').addEventListener('input', (e) => {
            state.ringSize = parseFloat(e.target.value);
            document.getElementById('ring-size-label').innerText = state.ringSize.toFixed(1);
            
            // Recreate ring geometry
            ring.geometry.dispose();
            ring.geometry = new THREE.TorusGeometry(state.ringSize, 0.15, 32, 100);
            
            // Reposition gems
            updateGems();
        });

        // Toggles
        document.getElementById('toggle-rotate').addEventListener('click', () => {
            state.autoRotate = !state.autoRotate;
            controls.autoRotate = state.autoRotate;
        });

        document.getElementById('toggle-fish').addEventListener('click', () => {
            state.fishVisible = !state.fishVisible;
            if (fishModel) {
                fishModel.visible = state.fishVisible;
            }
        });

        // Window Resize
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            controls.update();

            // Fish Animation
            if (fishModel && state.fishVisible) {
                state.fishY = 0.5 + Math.sin(Date.now() * 0.001) * 0.1;
                fishModel.position.y = state.fishY;
            }

            state.frameCount++;
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
