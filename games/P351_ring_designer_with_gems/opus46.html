<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Ring Designer</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
    color: #fff;
}

canvas {
    display: block;
}

#ui-panel {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 280px;
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(255, 215, 0, 0.3);
    border-radius: 16px;
    padding: 24px;
    backdrop-filter: blur(10px);
    max-height: calc(100vh - 40px);
    overflow-y: auto;
}

#ui-panel::-webkit-scrollbar {
    width: 4px;
}

#ui-panel::-webkit-scrollbar-thumb {
    background: rgba(255, 215, 0, 0.4);
    border-radius: 2px;
}

#title {
    font-size: 24px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

.section {
    margin-bottom: 18px;
}

.section-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #aaa;
    margin-bottom: 8px;
}

.btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.color-btn {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 2px solid rgba(255, 255, 255, 0.2);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}

.color-btn:hover {
    transform: scale(1.1);
    border-color: rgba(255, 255, 255, 0.6);
}

.color-btn.active {
    border-color: #fff;
    box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
}

#metal-gold { background: linear-gradient(135deg, #FFD700, #DAA520); }
#metal-silver { background: linear-gradient(135deg, #C0C0C0, #A8A8A8); }
#metal-rosegold { background: linear-gradient(135deg, #B76E79, #E8A0A0); }

#gem-red { background: radial-gradient(circle at 30% 30%, #FF4444, #CC0000); }
#gem-blue { background: radial-gradient(circle at 30% 30%, #4444FF, #0000CC); }
#gem-green { background: radial-gradient(circle at 30% 30%, #44FF44, #00CC00); }
#gem-diamond { background: radial-gradient(circle at 30% 30%, #FFFFFF, #CCCCCC); }

.slider-container {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.slider-value {
    font-size: 14px;
    font-weight: 600;
    color: #FFD700;
}

input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: rgba(255, 255, 255, 0.15);
    outline: none;
}

input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #FFD700;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.5);
}

.toggle-btn {
    width: 100%;
    padding: 10px 16px;
    border: 1px solid rgba(255, 215, 0, 0.4);
    border-radius: 10px;
    background: rgba(255, 215, 0, 0.1);
    color: #FFD700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
}

.toggle-btn:hover {
    background: rgba(255, 215, 0, 0.2);
    border-color: rgba(255, 215, 0, 0.7);
}

.toggle-btn.active {
    background: rgba(255, 215, 0, 0.3);
    border-color: #FFD700;
}

#price-display {
    text-align: center;
    padding: 16px;
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 165, 0, 0.1));
    border-radius: 12px;
    border: 1px solid rgba(255, 215, 0, 0.3);
    margin-top: 10px;
}

#price-display .price-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #aaa;
    margin-bottom: 4px;
}

#price-display .price-value {
    font-size: 32px;
    font-weight: 700;
    background: linear-gradient(90deg, #FFD700, #FFA500);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
</style>
</head>
<body>

<div id="ui-panel">
    <h2 id="title">Ring Designer</h2>

    <div class="section">
        <div class="section-label">Ring Metal</div>
        <div class="btn-row">
            <button class="color-btn active" id="metal-gold" title="Gold"></button>
            <button class="color-btn" id="metal-silver" title="Silver"></button>
            <button class="color-btn" id="metal-rosegold" title="Rose Gold"></button>
        </div>
    </div>

    <div class="section">
        <div class="section-label">Gem Color</div>
        <div class="btn-row">
            <button class="color-btn active" id="gem-red" title="Ruby"></button>
            <button class="color-btn" id="gem-blue" title="Sapphire"></button>
            <button class="color-btn" id="gem-green" title="Emerald"></button>
            <button class="color-btn" id="gem-diamond" title="Diamond"></button>
        </div>
    </div>

    <div class="section">
        <div class="slider-container">
            <div class="slider-header">
                <div class="section-label" style="margin-bottom:0">Gem Count</div>
                <span class="slider-value" id="gem-count-label">6</span>
            </div>
            <input type="range" id="gem-count" min="0" max="12" value="6">
        </div>
    </div>

    <div class="section">
        <div class="slider-container">
            <div class="slider-header">
                <div class="section-label" style="margin-bottom:0">Ring Size</div>
                <span class="slider-value" id="ring-size-label">1.2</span>
            </div>
            <input type="range" id="ring-size" min="0.8" max="2.0" step="0.1" value="1.2">
        </div>
    </div>

    <div class="section">
        <button class="toggle-btn" id="toggle-rotate">🔄 Auto-Rotate: OFF</button>
    </div>

    <div class="section">
        <button class="toggle-btn" id="toggle-fish">🐟 Fish Ornament: ON</button>
    </div>

    <div id="price-display">
        <div class="price-label">Estimated Price</div>
        <div class="price-value" id="price-value">$1,600</div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// State
window.__3D_STATE__ = {
    ringColor: 0xFFD700,
    gemColor: 0xFF0000,
    gemCount: 6,
    ringSize: 1.2,
    autoRotate: false,
    fishVisible: true,
    fishY: 0.5,
    totalPrice: 1600,
    metalType: 'gold',
    gemType: 'red',
    frameCount: 0
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.05);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 5);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 0.8);
pointLight.position.set(-3, 3, 3);
scene.add(pointLight);

// Additional accent lights for better ring reflections
const pointLight2 = new THREE.PointLight(0xFFD700, 0.3);
pointLight2.position.set(3, -2, -3);
scene.add(pointLight2);

// Environment map for reflections
const pmremGenerator = new THREE.PMREMGenerator(renderer);
const envScene = new THREE.Scene();
const envGeo = new THREE.SphereGeometry(5, 32, 32);
const envMat = new THREE.MeshBasicMaterial({ 
    color: 0x222244, 
    side: THREE.BackSide 
});
envScene.add(new THREE.Mesh(envGeo, envMat));
const envLight1 = new THREE.PointLight(0xffffff, 20);
envLight1.position.set(2, 3, 2);
envScene.add(envLight1);
const envLight2 = new THREE.PointLight(0xFFD700, 15);
envLight2.position.set(-2, 1, -2);
envScene.add(envLight2);
const envMap = pmremGenerator.fromScene(envScene).texture;
scene.environment = envMap;

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = false;
controls.autoRotateSpeed = 2.0;
controls.target.set(0, 0, 0);

// Ring
const ringTubeRadius = 0.15;
let ringGeometry = new THREE.TorusGeometry(1.2, ringTubeRadius, 32, 100);
const ringMaterial = new THREE.MeshStandardMaterial({
    color: 0xFFD700,
    metalness: 0.9,
    roughness: 0.1,
    envMapIntensity: 1.5
});
let ring = new THREE.Mesh(ringGeometry, ringMaterial);
ring.rotation.x = Math.PI / 2;
ring.castShadow = true;
ring.receiveShadow = true;
scene.add(ring);

// Gems
const gems = [];
let gemMaterialProps = {
    color: 0xFF0000,
    transmission: 0.5,
    roughness: 0.05,
    metalness: 0.1,
    thickness: 0.5,
    ior: 2.4,
    envMapIntensity: 2.0,
    clearcoat: 1.0,
    clearcoatRoughness: 0.0
};

function createGemMaterial() {
    return new THREE.MeshPhysicalMaterial({
        color: state.gemColor,
        transmission: state.gemType === 'diamond' ? 0.9 : 0.5,
        roughness: 0.05,
        metalness: 0.1,
        thickness: 0.5,
        ior: 2.4,
        envMapIntensity: 2.0,
        clearcoat: 1.0,
        clearcoatRoughness: 0.0
    });
}

function positionGemsOnRing() {
    // Remove existing gems
    gems.forEach(gem => {
        scene.remove(gem);
        gem.geometry.dispose();
        gem.material.dispose();
    });
    gems.length = 0;

    const count = state.gemCount;
    const radius = state.ringSize;

    for (let i = 0; i < count; i++) {
        const gemGeo = new THREE.SphereGeometry(0.08, 32, 32);
        const gemMat = createGemMaterial();
        const gem = new THREE.Mesh(gemGeo, gemMat);

        // Position gems on the upper half of the torus
        // Spread evenly along the top of the ring
        const angle = (i / Math.max(count, 1)) * Math.PI * 2;
        
        // Gems sit on top of the torus (upper surface)
        gem.position.x = radius * Math.cos(angle);
        gem.position.z = radius * Math.sin(angle);
        gem.position.y = ringTubeRadius; // On top of the ring tube

        gem.castShadow = true;
        scene.add(gem);
        gems.push(gem);
    }
}

positionGemsOnRing();

// Fish ornament
let fishModel = null;
let fishLoaded = false;

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BarramundiFish/glTF-Binary/BarramundiFish.glb',
    (gltf) => {
        fishModel = gltf.scene;
        fishModel.scale.set(0.3, 0.3, 0.3);
        fishModel.position.set(0, 0.5, 0);
        fishModel.rotation.y = Math.PI / 4;
        fishModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        scene.add(fishModel);
        fishLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load fish model, creating placeholder:', error);
        // Create a simple fish placeholder
        const fishGroup = new THREE.Group();
        
        // Body
        const bodyGeo = new THREE.ConeGeometry(0.12, 0.4, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4488aa, metalness: 0.6, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.rotation.z = Math.PI / 2;
        fishGroup.add(body);
        
        // Tail
        const tailGeo = new THREE.ConeGeometry(0.1, 0.15, 4);
        const tail = new THREE.Mesh(tailGeo, bodyMat);
        tail.position.x = -0.25;
        tail.rotation.z = -Math.PI / 2;
        fishGroup.add(tail);
        
        // Eye
        const eyeGeo = new THREE.SphereGeometry(0.025, 16, 16);
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(0.12, 0.05, 0.08);
        fishGroup.add(eye);
        
        fishGroup.scale.set(0.8, 0.8, 0.8);
        fishGroup.position.set(0, 0.5, 0);
        
        fishModel = fishGroup;
        scene.add(fishModel);
        fishLoaded = true;
    }
);

// Ground plane for shadow
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ 
    color: 0x111122, 
    roughness: 0.8,
    metalness: 0.2
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.5;
ground.receiveShadow = true;
scene.add(ground);

// Particle background
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 20;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const particleMat = new THREE.PointsMaterial({ 
    color: 0xFFD700, 
    size: 0.02, 
    transparent: true, 
    opacity: 0.4 
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// Price calculation
function calculatePrice() {
    const metalSurcharges = { gold: 200, silver: 0, rosegold: 300 };
    const surcharge = metalSurcharges[state.metalType] || 0;
    state.totalPrice = 500 + (state.gemCount * 150) + surcharge;
    document.getElementById('price-value').textContent = '$' + state.totalPrice.toLocaleString();
}

// UI Event Handlers
// Metal buttons
const metalColors = {
    'metal-gold': { color: 0xFFD700, type: 'gold' },
    'metal-silver': { color: 0xC0C0C0, type: 'silver' },
    'metal-rosegold': { color: 0xB76E79, type: 'rosegold' }
};

Object.keys(metalColors).forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
        const { color, type } = metalColors[id];
        state.ringColor = color;
        state.metalType = type;
        ringMaterial.color.setHex(color);
        
        // Update active state
        document.querySelectorAll('#metal-gold, #metal-silver, #metal-rosegold').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        calculatePrice();
    });
});

// Gem buttons
const gemColors = {
    'gem-red': { color: 0xFF0000, type: 'red' },
    'gem-blue': { color: 0x0000FF, type: 'blue' },
    'gem-green': { color: 0x00FF00, type: 'green' },
    'gem-diamond': { color: 0xFFFFFF, type: 'diamond' }
};

Object.keys(gemColors).forEach(id => {
    document.getElementById(id).addEventListener('click', () => {
        const { color, type } = gemColors[id];
        state.gemColor = color;
        state.gemType = type;
        
        const transmission = type === 'diamond' ? 0.9 : 0.5;
        gems.forEach(gem => {
            gem.material.color.setHex(color);
            gem.material.transmission = transmission;
        });
        
        // Update active state
        document.querySelectorAll('#gem-red, #gem-blue, #gem-green, #gem-diamond').forEach(btn => btn.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        calculatePrice();
    });
});

// Gem count slider
document.getElementById('gem-count').addEventListener('input', (e) => {
    state.gemCount = parseInt(e.target.value) || 0;
    document.getElementById('gem-count-label').textContent = state.gemCount;
    positionGemsOnRing();
    calculatePrice();
});

// Ring size slider
document.getElementById('ring-size').addEventListener('input', (e) => {
    state.ringSize = parseFloat(e.target.value) || 1.2;
    document.getElementById('ring-size-label').textContent = state.ringSize.toFixed(1);
    
    // Recreate ring with new size
    scene.remove(ring);
    ring.geometry.dispose();
    ringGeometry = new THREE.TorusGeometry(state.ringSize, ringTubeRadius, 32, 100);
    ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.rotation.x = Math.PI / 2;
    ring.castShadow = true;
    ring.receiveShadow = true;
    scene.add(ring);
    
    // Reposition gems
    positionGemsOnRing();
});

// Toggle auto-rotate
document.getElementById('toggle-rotate').addEventListener('click', () => {
    state.autoRotate = !state.autoRotate;
    controls.autoRotate = state.autoRotate;
    const btn = document.getElementById('toggle-rotate');
    btn.textContent = `🔄 Auto-Rotate: ${state.autoRotate ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', state.autoRotate);
});

// Toggle fish
document.getElementById('toggle-fish').addEventListener('click', () => {
    state.fishVisible = !state.fishVisible;
    if (fishModel) {
        fishModel.visible = state.fishVisible;
    }
    const btn = document.getElementById('toggle-fish');
    btn.textContent = `🐟 Fish Ornament: ${state.fishVisible ? 'ON' : 'OFF'}`;
    btn.classList.toggle('active', !state.fishVisible);
});

// Window resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
    requestAnimationFrame(animate);
    
    state.frameCount = (state.frameCount || 0) + 1;
    
    // Fish bobbing animation
    if (fishModel && fishLoaded) {
        const newY = 0.5 + Math.sin(Date.now() * 0.001 * 1.0) * 0.1;
        state.fishY = isNaN(newY) ? 0.5 : newY;
        fishModel.position.y = state.fishY;
        fishModel.rotation.y += 0.005;
    }
    
    // Subtle gem sparkle
    gems.forEach((gem, i) => {
        const sparkle = 0.08 + Math.sin(Date.now() * 0.003 + i * 1.5) * 0.01;
        gem.scale.setScalar(sparkle / 0.08);
    });
    
    // Rotate particles slowly
    particles.rotation.y += 0.0002;
    
    // Ensure state values are valid
    if (isNaN(state.totalPrice)) state.totalPrice = 500;
    if (isNaN(state.gemCount)) state.gemCount = 0;
    if (isNaN(state.ringSize)) state.ringSize = 1.2;
    if (isNaN(state.fishY)) state.fishY = 0.5;
    if (isNaN(state.frameCount)) state.frameCount = 0;
    
    controls.update();
    renderer.render(scene, camera);
}

animate();
calculatePrice();
</script>
</body>
</html>
