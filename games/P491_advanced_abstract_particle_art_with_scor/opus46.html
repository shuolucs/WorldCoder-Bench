<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstract Particle Art Experience</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.8;
    z-index: 100;
    min-width: 260px;
    border: 1px solid rgba(255, 255, 255, 0.15);
}
#hud h2 {
    margin-bottom: 8px;
    font-size: 16px;
    color: #00ffff;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    padding-bottom: 5px;
}
#hud .label { color: #aaa; }
#hud .value { color: #0ff; font-weight: bold; }
#resetBtn {
    margin-top: 10px;
    padding: 8px 20px;
    background: rgba(0, 255, 255, 0.2);
    color: #0ff;
    border: 1px solid #0ff;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    transition: all 0.2s;
    width: 100%;
}
#resetBtn:hover {
    background: rgba(0, 255, 255, 0.4);
}
#controls {
    position: absolute;
    bottom: 10px;
    left: 10px;
    color: #888;
    background: rgba(0, 0, 0, 0.6);
    padding: 10px 15px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    line-height: 1.6;
    z-index: 100;
}
</style>
</head>
<body>

<div id="hud">
    <h2>✦ PARTICLE ART ✦</h2>
    <div><span class="label">Score: </span><span class="value" id="scoreDisplay">0</span></div>
    <div><span class="label">Active Attractors: </span><span class="value" id="attractorCount">5</span></div>
    <div><span class="label">Particle Color: </span><span class="value" id="colorName">Cyan</span></div>
    <div><span class="label">Status: </span><span class="value" id="pauseStatus">Running</span></div>
    <div><span class="label">Kinetic Energy: </span><span class="value" id="energyDisplay">0.00</span></div>
    <button id="resetBtn">⟳ RESET [R]</button>
</div>

<div id="controls">
    Click orbs to toggle | R: Reset | P: Pause | E: Explode | C: Color | 1-5: Toggle Attractors
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
const state = {
    score: 0,
    activeAttractors: 5,
    particleCount: 500,
    paused: false,
    colorIndex: 0,
    kineticEnergy: 0,
    explosionCount: 0,
    boxLoaded: false,
    boxAnimationPlaying: false,
    allDeactivatedBonus: 0,
    attractorStates: [true, true, true, true, true],
    particleColorHex: 0x00ffff,
    frameCount: 0,
    resetCount: 0
};
window.__3D_STATE__ = state;

const colorCycle = [
    { hex: 0x00ffff, name: 'Cyan' },
    { hex: 0xff00ff, name: 'Magenta' },
    { hex: 0xffff00, name: 'Yellow' },
    { hex: 0xffffff, name: 'White' }
];

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.5);
pointLight.position.set(10, 15, 10);
scene.add(pointLight);

// --- GLB Model ---
let mixer = null;
let boxModel = null;
const clock = new THREE.Clock();

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb',
    (gltf) => {
        boxModel = gltf.scene;
        boxModel.position.set(0, 0, 0);
        boxModel.scale.set(0.5, 0.5, 0.5);
        scene.add(boxModel);

        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(boxModel);
            gltf.animations.forEach((clip) => {
                mixer.clipAction(clip).play();
            });
            state.boxAnimationPlaying = true;
        }
        state.boxLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLB load failed, creating fallback box:', error);
        const fallbackGeo = new THREE.BoxGeometry(1, 1, 1);
        const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        boxModel = new THREE.Mesh(fallbackGeo, fallbackMat);
        boxModel.scale.set(0.5, 0.5, 0.5);
        scene.add(boxModel);
        state.boxLoaded = true;
    }
);

// --- Particles ---
const PARTICLE_COUNT = 500;
const particleGeometry = new THREE.BufferGeometry();
const positions = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);

function randomInSphere(radius) {
    const u = Math.random();
    const v = Math.random();
    const theta = 2 * Math.PI * u;
    const phi = Math.acos(2 * v - 1);
    const r = radius * Math.cbrt(Math.random());
    return [
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    ];
}

function initParticles() {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const [x, y, z] = randomInSphere(15);
        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        velocities[i * 3] = 0;
        velocities[i * 3 + 1] = 0;
        velocities[i * 3 + 2] = 0;
    }
}

initParticles();
particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

const particleMaterial = new THREE.PointsMaterial({
    color: 0x00ffff,
    size: 0.15,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false
});

const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particleSystem);

// --- Attractor Orbs ---
const attractorPositions = [
    new THREE.Vector3(-6, 0, 0),
    new THREE.Vector3(6, 0, 0),
    new THREE.Vector3(0, 6, 0),
    new THREE.Vector3(0, -6, 0),
    new THREE.Vector3(0, 0, 6)
];
const attractorColors = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00, 0xff00ff];

const attractors = [];
for (let i = 0; i < 5; i++) {
    const geo = new THREE.SphereGeometry(0.3, 32, 32);
    const mat = new THREE.MeshStandardMaterial({
        color: attractorColors[i],
        emissive: attractorColors[i],
        emissiveIntensity: 2,
        metalness: 0.5,
        roughness: 0.3
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(attractorPositions[i]);
    mesh.userData.index = i;
    mesh.userData.active = true;
    scene.add(mesh);
    attractors.push(mesh);
}

// --- Raycaster ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function toggleAttractor(index) {
    const orb = attractors[index];
    orb.userData.active = !orb.userData.active;
    orb.material.emissiveIntensity = orb.userData.active ? 2 : 0.1;
    state.attractorStates[index] = orb.userData.active;
    updateActiveCount();
    checkAllDeactivated();
}

function updateActiveCount() {
    state.activeAttractors = attractors.filter(a => a.userData.active).length;
}

let allDeactivatedFlag = false;
function checkAllDeactivated() {
    const allOff = attractors.every(a => !a.userData.active);
    if (allOff && !allDeactivatedFlag) {
        state.score += 200;
        state.allDeactivatedBonus++;
        allDeactivatedFlag = true;
    } else if (!allOff) {
        allDeactivatedFlag = false;
    }
}

// --- Mouse Click ---
renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(attractors);
    if (intersects.length > 0) {
        const idx = intersects[0].object.userData.index;
        toggleAttractor(idx);
    }
});

// --- Keyboard ---
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();

    if (key === 'r') {
        resetAll();
    } else if (key === 'p') {
        state.paused = !state.paused;
    } else if (key === 'e') {
        triggerExplosion();
    } else if (key === 'c') {
        cycleColor();
    } else if (key >= '1' && key <= '5') {
        toggleAttractor(parseInt(key) - 1);
    }
});

document.getElementById('resetBtn').addEventListener('click', resetAll);

function resetAll() {
    initParticles();
    particleGeometry.attributes.position.needsUpdate = true;
    state.score = 0;
    state.paused = false;
    state.resetCount++;
    allDeactivatedFlag = false;
    for (let i = 0; i < 5; i++) {
        attractors[i].userData.active = true;
        attractors[i].material.emissiveIntensity = 2;
        state.attractorStates[i] = true;
    }
    state.activeAttractors = 5;
}

function triggerExplosion() {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const px = positions[i * 3];
        const py = positions[i * 3 + 1];
        const pz = positions[i * 3 + 2];
        const dist = Math.sqrt(px * px + py * py + pz * pz) || 1;
        velocities[i * 3] = (px / dist) * 0.3;
        velocities[i * 3 + 1] = (py / dist) * 0.3;
        velocities[i * 3 + 2] = (pz / dist) * 0.3;
    }
    state.score += 50;
    state.explosionCount++;
}

function cycleColor() {
    state.colorIndex = (state.colorIndex + 1) % 4;
    const c = colorCycle[state.colorIndex];
    particleMaterial.color.setHex(c.hex);
    state.particleColorHex = c.hex;
}

// --- Scoring Timer ---
let scoreTimer = 0;

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);
    state.frameCount++;

    const delta = clock.getDelta();

    if (!state.paused) {
        // Update mixer
        if (mixer) {
            mixer.update(delta);
            state.boxAnimationPlaying = true;
        }

        // Rotate box slowly
        if (boxModel) {
            boxModel.rotation.y += 0.005;
        }

        // Score timer
        scoreTimer += delta;
        if (scoreTimer >= 1.0) {
            scoreTimer -= 1.0;
            state.score += state.activeAttractors * 10;
        }

        // Particle physics
        let totalKE = 0;
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const idx = i * 3;
            let px = positions[idx];
            let py = positions[idx + 1];
            let pz = positions[idx + 2];

            // Find nearest active attractor
            let nearestDist = Infinity;
            let nearestIdx = -1;
            for (let a = 0; a < 5; a++) {
                if (!attractors[a].userData.active) continue;
                const ap = attractorPositions[a];
                const dx = ap.x - px;
                const dy = ap.y - py;
                const dz = ap.z - pz;
                const d = Math.sqrt(dx * dx + dy * dy + dz * dz);
                if (d < nearestDist) {
                    nearestDist = d;
                    nearestIdx = a;
                }
            }

            if (nearestIdx >= 0) {
                const ap = attractorPositions[nearestIdx];
                const dx = ap.x - px;
                const dy = ap.y - py;
                const dz = ap.z - pz;
                const distSq = dx * dx + dy * dy + dz * dz;
                const dist = Math.sqrt(distSq) || 0.01;
                let force = Math.min(1 / distSq, 0.05);
                velocities[idx] += (dx / dist) * force;
                velocities[idx + 1] += (dy / dist) * force;
                velocities[idx + 2] += (dz / dist) * force;
            }

            // Random drift
            velocities[idx] += (Math.random() - 0.5) * 0.02;
            velocities[idx + 1] += (Math.random() - 0.5) * 0.02;
            velocities[idx + 2] += (Math.random() - 0.5) * 0.02;

            // Update positions
            positions[idx] += velocities[idx];
            positions[idx + 1] += velocities[idx + 1];
            positions[idx + 2] += velocities[idx + 2];

            // Wrap around
            for (let j = 0; j < 3; j++) {
                if (positions[idx + j] > 20) positions[idx + j] = -20;
                else if (positions[idx + j] < -20) positions[idx + j] = 20;
            }

            // Kinetic energy
            const vx = velocities[idx];
            const vy = velocities[idx + 1];
            const vz = velocities[idx + 2];
            totalKE += Math.sqrt(vx * vx + vy * vy + vz * vz);
        }

        state.kineticEnergy = totalKE;
        particleGeometry.attributes.position.needsUpdate = true;

        // Animate attractor orbs (gentle pulse)
        const time = performance.now() * 0.001;
        for (let i = 0; i < 5; i++) {
            if (attractors[i].userData.active) {
                const scale = 1 + 0.1 * Math.sin(time * 3 + i);
                attractors[i].scale.setScalar(scale);
            } else {
                attractors[i].scale.setScalar(0.7);
            }
        }
    } else {
        state.boxAnimationPlaying = false;
    }

    // Update HUD
    document.getElementById('scoreDisplay').textContent = state.score;
    document.getElementById('attractorCount').textContent = state.activeAttractors;
    document.getElementById('colorName').textContent = colorCycle[state.colorIndex].name;
    document.getElementById('pauseStatus').textContent = state.paused ? 'Paused' : 'Running';
    document.getElementById('energyDisplay').textContent = state.kineticEnergy.toFixed(2);

    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
