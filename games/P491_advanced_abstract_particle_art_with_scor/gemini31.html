<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Abstract Particle Art</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 10;
        }
        #hud h1 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #0ff;
        }
        .hud-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .val {
            font-weight: bold;
            color: #ff0;
        }
        #resetBtn {
            margin-top: 10px;
            padding: 5px 10px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            cursor: pointer;
            pointer-events: auto;
            font-family: monospace;
        }
        #resetBtn:hover {
            background: #555;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <h1>Particle Art System</h1>
        <div class="hud-line">Score: <span id="scoreDisplay" class="val">0</span></div>
        <div class="hud-line">Active Attractors: <span id="attractorCount" class="val">5</span></div>
        <div class="hud-line">Color: <span id="colorName" class="val">Cyan</span></div>
        <div class="hud-line">Status: <span id="pauseStatus" class="val">Running</span></div>
        <div class="hud-line">Kinetic Energy: <span id="energyDisplay" class="val">0.00</span></div>
        <button id="resetBtn">Reset (R)</button>
    </div>
    <div id="controls">
        Click Orbs / 1-5: Toggle Attractors | P: Pause | E: Explosion | C: Color | R: Reset
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            score: 0,
            activeAttractors: 5,
            particleCount: 500,
            paused: false,
            colorIndex: 0,
            kineticEnergy: 0,
            explosionCount: 0,
            boxLoaded: false,
            boxAnimationPlaying: false,
            allDeactivatedBonus: 0,
            attractorStates: [true, true, true, true, true],
            particleColorHex: 0x00ffff,
            frameCount: 0,
            resetCount: 0
        };

        const state = window.__3D_STATE__;
        const colors = [0x00ffff, 0xff00ff, 0xffff00, 0xffffff];
        const colorNames = ['Cyan', 'Magenta', 'Yellow', 'White'];
        let allDeactivatedBonusAvailable = true;
        let lastScoreTime = 0;

        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('scoreDisplay');
        const attractorCountDisplay = document.getElementById('attractorCount');
        const colorNameDisplay = document.getElementById('colorName');
        const pauseStatusDisplay = document.getElementById('pauseStatus');
        const energyDisplay = document.getElementById('energyDisplay');
        const resetBtn = document.getElementById('resetBtn');

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(10, 15, 10);
        scene.add(pointLight);

        // --- GLTF Loader ---
        let mixer;
        const gltfLoader = new GLTFLoader();
        // Using a reliable public URL for BoxAnimated.glb
        gltfLoader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BoxAnimated/glTF-Binary/BoxAnimated.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            model.position.set(0, 0, 0);
            scene.add(model);
            state.boxLoaded = true;

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                gltf.animations.forEach((clip) => {
                    mixer.clipAction(clip).play();
                });
                state.boxAnimationPlaying = !state.paused;
            }
        });

        // --- Particle System ---
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(state.particleCount * 3);
        const velocities = new Float32Array(state.particleCount * 3);

        function initParticles() {
            for (let i = 0; i < state.particleCount; i++) {
                const r = 15 * Math.cbrt(Math.random());
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(2 * Math.random() - 1);
                
                positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
                positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
                positions[i * 3 + 2] = r * Math.cos(phi);

                velocities[i * 3] = 0;
                velocities[i * 3 + 1] = 0;
                velocities[i * 3 + 2] = 0;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        }
        initParticles();

        const particleMat = new THREE.PointsMaterial({
            color: state.particleColorHex,
            size: 0.15,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particleSystem = new THREE.Points(particleGeo, particleMat);
        scene.add(particleSystem);

        // --- Attractor Orbs ---
        const orbs = [];
        const orbData = [
            { pos: [-6, 0, 0], color: 0xff0000 }, // Red
            { pos: [6, 0, 0], color: 0x0000ff },  // Blue
            { pos: [0, 6, 0], color: 0x00ff00 },  // Green
            { pos: [0, -6, 0], color: 0xffff00 }, // Yellow
            { pos: [0, 0, 6], color: 0xff00ff }   // Magenta
        ];

        const orbGeo = new THREE.SphereGeometry(0.3, 16, 16);

        orbData.forEach((data, index) => {
            const mat = new THREE.MeshStandardMaterial({
                color: data.color,
                emissive: data.color,
                emissiveIntensity: 2
            });
            const mesh = new THREE.Mesh(orbGeo, mat);
            mesh.position.set(...data.pos);
            mesh.userData = { index: index, active: true };
            scene.add(mesh);
            orbs.push(mesh);
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function toggleOrb(index) {
            const orb = orbs[index];
            orb.userData.active = !orb.userData.active;
            orb.material.emissiveIntensity = orb.userData.active ? 2 : 0.1;
            state.attractorStates[index] = orb.userData.active;
            
            state.activeAttractors = orbs.filter(o => o.userData.active).length;

            if (state.activeAttractors === 0 && allDeactivatedBonusAvailable) {
                state.score += 200;
                state.allDeactivatedBonus++;
                allDeactivatedBonusAvailable = false;
            } else if (state.activeAttractors > 0) {
                allDeactivatedBonusAvailable = true;
            }
        }

        function triggerExplosion() {
            for (let i = 0; i < state.particleCount; i++) {
                const px = positions[i * 3];
                const py = positions[i * 3 + 1];
                const pz = positions[i * 3 + 2];
                
                const len = Math.sqrt(px*px + py*py + pz*pz) || 1;
                velocities[i * 3] += (px / len) * 0.3;
                velocities[i * 3 + 1] += (py / len) * 0.3;
                velocities[i * 3 + 2] += (pz / len) * 0.3;
            }
            state.score += 50;
            state.explosionCount++;
        }

        function resetSystem() {
            initParticles();
            state.score = 0;
            state.resetCount++;
            orbs.forEach((orb, i) => {
                if (!orb.userData.active) toggleOrb(i);
            });
            allDeactivatedBonusAvailable = true;
        }

        function cycleColor() {
            state.colorIndex = (state.colorIndex + 1) % colors.length;
            state.particleColorHex = colors[state.colorIndex];
            particleMat.color.setHex(state.particleColorHex);
        }

        // Events
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('pointerdown', (event) => {
            if (event.target !== renderer.domElement) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(orbs);
            if (intersects.length > 0) {
                toggleOrb(intersects[0].object.userData.index);
            }
        });

        window.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (key === 'r') resetSystem();
            if (key === 'p') {
                state.paused = !state.paused;
                state.boxAnimationPlaying = state.boxLoaded && !state.paused;
            }
            if (key === 'e') triggerExplosion();
            if (key === 'c') cycleColor();
            if (['1', '2', '3', '4', '5'].includes(key)) {
                toggleOrb(parseInt(key) - 1);
            }
        });

        resetBtn.addEventListener('click', resetSystem);

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            state.frameCount++;
            const dt = clock.getDelta();
            const time = clock.getElapsedTime();

            if (!state.paused) {
                // Mixer
                if (mixer) mixer.update(dt);

                // Scoring
                if (time - lastScoreTime >= 1) {
                    state.score += state.activeAttractors * 10;
                    lastScoreTime = time;
                }

                // Physics
                let totalEnergy = 0;
                const activeOrbs = orbs.filter(o => o.userData.active);

                for (let i = 0; i < state.particleCount; i++) {
                    let px = positions[i * 3];
                    let py = positions[i * 3 + 1];
                    let pz = positions[i * 3 + 2];
                    let vx = velocities[i * 3];
                    let vy = velocities[i * 3 + 1];
                    let vz = velocities[i * 3 + 2];

                    // Drift
                    vx += (Math.random() - 0.5) * 0.02;
                    vy += (Math.random() - 0.5) * 0.02;
                    vz += (Math.random() - 0.5) * 0.02;

                    // Attraction
                    if (activeOrbs.length > 0) {
                        let minDistSq = Infinity;
                        let target = null;

                        for (let j = 0; j < activeOrbs.length; j++) {
                            const orb = activeOrbs[j];
                            const dx = orb.position.x - px;
                            const dy = orb.position.y - py;
                            const dz = orb.position.z - pz;
                            const distSq = dx*dx + dy*dy + dz*dz;
                            if (distSq < minDistSq) {
                                minDistSq = distSq;
                                target = orb;
                            }
                        }

                        if (target && minDistSq > 0.01) {
                            const dist = Math.sqrt(minDistSq);
                            let force = 1 / minDistSq;
                            if (force > 0.05) force = 0.05;
                            
                            vx += ((target.position.x - px) / dist) * force;
                            vy += ((target.position.y - py) / dist) * force;
                            vz += ((target.position.z - pz) / dist) * force;
                        }
                    }

                    // Update Pos
                    px += vx;
                    py += vy;
                    pz += vz;

                    // Wrap
                    if (px > 20) px = -20; else if (px < -20) px = 20;
                    if (py > 20) py = -20; else if (py < -20) py = 20;
                    if (pz > 20) pz = -20; else if (pz < -20) pz = 20;

                    positions[i * 3] = px;
                    positions[i * 3 + 1] = py;
                    positions[i * 3 + 2] = pz;
                    velocities[i * 3] = vx;
                    velocities[i * 3 + 1] = vy;
                    velocities[i * 3 + 2] = vz;

                    totalEnergy += Math.sqrt(vx*vx + vy*vy + vz*vz);
                }

                particleGeo.attributes.position.needsUpdate = true;
                state.kineticEnergy = totalEnergy;
            } else {
                // Keep clock running but don't process logic to avoid delta spikes
                lastScoreTime += dt; 
            }

            // Update HUD
            scoreDisplay.innerText = state.score;
            attractorCountDisplay.innerText = state.activeAttractors;
            colorNameDisplay.innerText = colorNames[state.colorIndex];
            colorNameDisplay.style.color = '#' + state.particleColorHex.toString(16).padStart(6, '0');
            pauseStatusDisplay.innerText = state.paused ? 'Paused' : 'Running';
            pauseStatusDisplay.style.color = state.paused ? '#f00' : '#0f0';
            energyDisplay.innerText = state.kineticEnergy.toFixed(2);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
