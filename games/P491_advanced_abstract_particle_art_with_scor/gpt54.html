<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Abstract Particle Art Experience</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 10;
      min-width: 220px;
      line-height: 1.5;
      font-size: 14px;
    }

    #hud button {
      margin-top: 8px;
      padding: 6px 10px;
      background: #111;
      color: white;
      border: 1px solid #666;
      border-radius: 4px;
      cursor: pointer;
    }

    #hud button:hover {
      background: #222;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div>Score: <span id="scoreDisplay">0</span></div>
    <div>Active Attractors: <span id="attractorCount">5</span></div>
    <div>Particle Color: <span id="colorName">Cyan</span></div>
    <div>Paused: <span id="pauseStatus">No</span></div>
    <div>Kinetic Energy: <span id="energyDisplay">0.00</span></div>
    <button id="resetBtn">Reset (R)</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(10, 15, 10);
    scene.add(pointLight);

    let mixer = null;
    let boxLoaded = false;
    let boxAnimationPlaying = false;

    const loader = new GLTFLoader();
    loader.load(
      "BoxAnimated.glb",
      (gltf) => {
        const model = gltf.scene;
        model.position.set(0, 0, 0);
        model.scale.set(0.5, 0.5, 0.5);
        scene.add(model);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach((clip) => {
            mixer.clipAction(clip).play();
          });
          boxAnimationPlaying = true;
        }

        boxLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Failed to load BoxAnimated.glb", err);
      }
    );

    const PARTICLE_COUNT = 500;
    const WRAP_LIMIT = 20;
    const ATTRACTOR_POSITIONS = [
      new THREE.Vector3(-6, 0, 0),
      new THREE.Vector3(6, 0, 0),
      new THREE.Vector3(0, 6, 0),
      new THREE.Vector3(0, -6, 0),
      new THREE.Vector3(0, 0, 6)
    ];
    const ATTRACTOR_COLORS = [0xff0000, 0x0000ff, 0x00ff00, 0xffff00, 0xff00ff];

    const particleColors = [
      { hex: 0x00ffff, name: "Cyan" },
      { hex: 0xff00ff, name: "Magenta" },
      { hex: 0xffff00, name: "Yellow" },
      { hex: 0xffffff, name: "White" }
    ];

    let colorIndex = 0;
    let paused = false;
    let score = 0;
    let explosionCount = 0;
    let allDeactivatedBonus = 0;
    let resetCount = 0;
    let frameCount = 0;
    let allOffBonusReady = true;
    let kineticEnergy = 0;

    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = [];
    const drift = [];

    function randomPointInSphere(radius) {
      const u = Math.random();
      const v = Math.random();
      const theta = 2 * Math.PI * u;
      const phi = Math.acos(2 * v - 1);
      const r = radius * Math.cbrt(Math.random());

      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
    }

    function resetParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const p = randomPointInSphere(15);
        positions[i * 3] = p.x;
        positions[i * 3 + 1] = p.y;
        positions[i * 3 + 2] = p.z;

        velocities[i].set(0, 0, 0);

        drift[i].set(
          (Math.random() * 2 - 1) * 0.01,
          (Math.random() * 2 - 1) * 0.01,
          (Math.random() * 2 - 1) * 0.01
        );
      }
      particleGeometry.attributes.position.needsUpdate = true;
    }

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = randomPointInSphere(15);
      positions[i * 3] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;

      velocities.push(new THREE.Vector3(0, 0, 0));
      drift.push(
        new THREE.Vector3(
          (Math.random() * 2 - 1) * 0.01,
          (Math.random() * 2 - 1) * 0.01,
          (Math.random() * 2 - 1) * 0.01
        )
      );
    }

    particleGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));

    const particleMaterial = new THREE.PointsMaterial({
      color: particleColors[colorIndex].hex,
      size: 0.15,
      transparent: true,
      opacity: 0.8,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const attractors = [];
    const attractorStates = [true, true, true, true, true];
    const attractorGeometry = new THREE.SphereGeometry(0.3, 24, 24);

    for (let i = 0; i < 5; i++) {
      const material = new THREE.MeshStandardMaterial({
        color: ATTRACTOR_COLORS[i],
        emissive: ATTRACTOR_COLORS[i],
        emissiveIntensity: 2
      });
      const orb = new THREE.Mesh(attractorGeometry, material);
      orb.position.copy(ATTRACTOR_POSITIONS[i]);
      orb.userData.index = i;
      scene.add(orb);
      attractors.push(orb);
    }

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function getActiveAttractorCount() {
      return attractorStates.filter(Boolean).length;
    }

    function updateOrbVisual(index) {
      attractors[index].material.emissiveIntensity = attractorStates[index] ? 2 : 0.1;
    }

    function updateAllOrbsVisual() {
      for (let i = 0; i < attractors.length; i++) updateOrbVisual(i);
    }

    function checkAllDeactivatedBonus() {
      const activeCount = getActiveAttractorCount();
      if (activeCount === 0 && allOffBonusReady) {
        score += 200;
        allDeactivatedBonus += 1;
        allOffBonusReady = false;
      } else if (activeCount > 0) {
        allOffBonusReady = true;
      }
    }

    function toggleAttractor(index) {
      attractorStates[index] = !attractorStates[index];
      updateOrbVisual(index);
      checkAllDeactivatedBonus();
      updateHUD();
    }

    function setParticleColor(idx) {
      colorIndex = idx % particleColors.length;
      particleMaterial.color.setHex(particleColors[colorIndex].hex);
      updateHUD();
    }

    function triggerExplosion() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const x = positions[i * 3];
        const y = positions[i * 3 + 1];
        const z = positions[i * 3 + 2];
        const dir = new THREE.Vector3(x, y, z);
        if (dir.lengthSq() < 0.0001) {
          dir.set(Math.random() - 0.5, Math.random() - 0.5, Math.random() - 0.5);
        }
        dir.normalize().multiplyScalar(0.3);
        velocities[i].copy(dir);
      }
      score += 50;
      explosionCount += 1;
      updateHUD();
    }

    function resetAll() {
      resetParticles();
      score = 0;
      paused = false;
      explosionCount = 0;
      allDeactivatedBonus = 0;
      allOffBonusReady = true;
      kineticEnergy = 0;
      for (let i = 0; i < 5; i++) {
        attractorStates[i] = true;
        updateOrbVisual(i);
      }
      if (mixer) boxAnimationPlaying = true;
      resetCount += 1;
      updateHUD();
    }

    function updateHUD() {
      document.getElementById("scoreDisplay").textContent = score;
      document.getElementById("attractorCount").textContent = getActiveAttractorCount();
      document.getElementById("colorName").textContent = particleColors[colorIndex].name;
      document.getElementById("pauseStatus").textContent = paused ? "Yes" : "No";
      document.getElementById("energyDisplay").textContent = kineticEnergy.toFixed(2);
    }

    document.getElementById("resetBtn").addEventListener("click", resetAll);

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(attractors);
      if (intersects.length > 0) {
        const index = intersects[0].object.userData.index;
        toggleAttractor(index);
      }
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === "r") {
        resetAll();
      } else if (key === "p") {
        paused = !paused;
        boxAnimationPlaying = !!mixer && !paused;
        updateHUD();
      } else if (key === "e") {
        triggerExplosion();
      } else if (key === "c") {
        setParticleColor((colorIndex + 1) % particleColors.length);
      } else if (["1", "2", "3", "4", "5"].includes(key)) {
        toggleAttractor(parseInt(key, 10) - 1);
      }
    });

    let scoreAccumulator = 0;
    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      score: 0,
      activeAttractors: 5,
      particleCount: PARTICLE_COUNT,
      paused: false,
      colorIndex: 0,
      kineticEnergy: 0,
      explosionCount: 0,
      boxLoaded: false,
      boxAnimationPlaying: false,
      allDeactivatedBonus: 0,
      attractorStates: [...attractorStates],
      particleColorHex: particleColors[colorIndex].hex,
      frameCount: 0,
      resetCount: 0
    };

    function updateState() {
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.activeAttractors = getActiveAttractorCount();
      window.__3D_STATE__.particleCount = PARTICLE_COUNT;
      window.__3D_STATE__.paused = paused;
      window.__3D_STATE__.colorIndex = colorIndex;
      window.__3D_STATE__.kineticEnergy = kineticEnergy;
      window.__3D_STATE__.explosionCount = explosionCount;
      window.__3D_STATE__.boxLoaded = boxLoaded;
      window.__3D_STATE__.boxAnimationPlaying = boxAnimationPlaying;
      window.__3D_STATE__.allDeactivatedBonus = allDeactivatedBonus;
      window.__3D_STATE__.attractorStates = [...attractorStates];
      window.__3D_STATE__.particleColorHex = particleColors[colorIndex].hex;
      window.__3D_STATE__.frameCount = frameCount;
      window.__3D_STATE__.resetCount = resetCount;
    }

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const delta = clock.getDelta();

      if (!paused) {
        if (mixer) {
          mixer.update(delta);
          boxAnimationPlaying = true;
        } else {
          boxAnimationPlaying = false;
        }

        scoreAccumulator += delta;
        while (scoreAccumulator >= 1.0) {
          score += getActiveAttractorCount() * 10;
          scoreAccumulator -= 1.0;
        }

        kineticEnergy = 0;
        const posAttr = particleGeometry.attributes.position;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const p = new THREE.Vector3(
            positions[i * 3],
            positions[i * 3 + 1],
            positions[i * 3 + 2]
          );

          let nearestIndex = -1;
          let nearestDistSq = Infinity;

          for (let j = 0; j < attractors.length; j++) {
            if (!attractorStates[j]) continue;
            const distSq = p.distanceToSquared(attractors[j].position);
            if (distSq < nearestDistSq) {
              nearestDistSq = distSq;
              nearestIndex = j;
            }
          }

          if (nearestIndex !== -1) {
            const dir = new THREE.Vector3().subVectors(attractors[nearestIndex].position, p);
            const distSq = Math.max(dir.lengthSq(), 0.01);
            dir.normalize();
            const forceMag = Math.min(1 / distSq, 0.05);
            velocities[i].addScaledVector(dir, forceMag);
          }

          velocities[i].add(drift[i]);

          positions[i * 3] += velocities[i].x;
          positions[i * 3 + 1] += velocities[i].y;
          positions[i * 3 + 2] += velocities[i].z;

          if (positions[i * 3] > WRAP_LIMIT) positions[i * 3] = -WRAP_LIMIT;
          if (positions[i * 3] < -WRAP_LIMIT) positions[i * 3] = WRAP_LIMIT;
          if (positions[i * 3 + 1] > WRAP_LIMIT) positions[i * 3 + 1] = -WRAP_LIMIT;
          if (positions[i * 3 + 1] < -WRAP_LIMIT) positions[i * 3 + 1] = WRAP_LIMIT;
          if (positions[i * 3 + 2] > WRAP_LIMIT) positions[i * 3 + 2] = -WRAP_LIMIT;
          if (positions[i * 3 + 2] < -WRAP_LIMIT) positions[i * 3 + 2] = WRAP_LIMIT;

          kineticEnergy += velocities[i].length();
        }

        posAttr.needsUpdate = true;
      } else {
        boxAnimationPlaying = false;
      }

      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateHUD();
    updateState();
    animate();
  </script>
</body>
</html>
