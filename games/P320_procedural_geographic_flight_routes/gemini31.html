<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Flight Routes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: sans-serif;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
            font-size: 14px;
        }
        #speedBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 10px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        #speedBtn:hover {
            background: #555;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>
    <button id="speedBtn">Toggle Speed (normal)</button>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            globeRadius: 5,
            routeCount: 5,
            planePositions: Array(5).fill(null).map(() => ({ x: 0, y: 0, z: 0 })),
            planeProgress: [0, 0.2, 0.4, 0.6, 0.8],
            rotationEnabled: false,
            speedLevel: 'normal',
            speedValue: 0.002,
            highlightedRoute: -1,
            selectedCity: '',
            landmarkLoaded: false,
            cityCount: 5,
            frameCount: 0,
            globeRotationY: 0
        };

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        // Globe Group
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Globe Mesh
        const sphereGeom = new THREE.SphereGeometry(5, 64, 64);
        const sphereMat = new THREE.MeshPhongMaterial({ color: 0x1a5276 });
        const globe = new THREE.Mesh(sphereGeom, sphereMat);
        globeGroup.add(globe);

        const wireframeGeom = new THREE.SphereGeometry(5.01, 32, 32);
        const wireframeMat = new THREE.MeshBasicMaterial({ 
            color: 0x2980b9, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.3 
        });
        const wireframe = new THREE.Mesh(wireframeGeom, wireframeMat);
        globeGroup.add(wireframe);

        // Coordinate Conversion
        function getPos(lat, lon, R) {
            const latRad = lat * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            return new THREE.Vector3(
                R * Math.cos(latRad) * Math.cos(lonRad),
                R * Math.sin(latRad),
                R * Math.cos(latRad) * Math.sin(lonRad)
            );
        }

        // 3D Asset (Landmark)
        const loader = new GLTFLoader();
        loader.load('AntiqueCamera.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.3, 0.3, 0.3);
            const pos = getPos(48.8, 2.3, 5.2);
            model.position.copy(pos);
            const targetWorld = globeGroup.localToWorld(pos.clone().multiplyScalar(2));
            model.lookAt(targetWorld);
            globeGroup.add(model);
            window.__landmark = model;
            window.__3D_STATE__.landmarkLoaded = true;
        }, undefined, () => {
            window.__3D_STATE__.landmarkLoaded = true;
        });

        // Cities & Routes
        const cities = [
            { name: 'New York', lat: 40.7, lon: -74.0 },
            { name: 'London', lat: 51.5, lon: -0.1 },
            { name: 'Tokyo', lat: 35.7, lon: 139.7 },
            { name: 'Sydney', lat: -33.9, lon: 151.2 },
            { name: 'São Paulo', lat: -23.5, lon: -46.6 }
        ];
        const routeColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff];

        const markers = [];
        const markerGeom = new THREE.SphereGeometry(0.15, 16, 16);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });

        cities.forEach(city => {
            const marker = new THREE.Mesh(markerGeom, markerMat);
            marker.position.copy(getPos(city.lat, city.lon, 5));
            marker.userData = { city: city };
            globeGroup.add(marker);
            markers.push(marker);
        });

        const curves = [];
        const tubes = [];
        const planes = [];
        const coneGeom = new THREE.ConeGeometry(0.1, 0.3, 16);
        coneGeom.rotateX(Math.PI / 2);

        for (let i = 0; i < 5; i++) {
            const p1 = getPos(cities[i].lat, cities[i].lon, 5);
            const p2 = getPos(cities[(i + 1) % 5].lat, cities[(i + 1) % 5].lon, 5);
            const mid = p1.clone().add(p2).multiplyScalar(0.5).normalize().multiplyScalar(5 * 1.8);
            
            const curve = new THREE.QuadraticBezierCurve3(p1, mid, p2);
            curves.push(curve);

            const tubeGeom = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
            const tubeMat = new THREE.MeshBasicMaterial({ color: routeColors[i], transparent: true, opacity: 1 });
            const tube = new THREE.Mesh(tubeGeom, tubeMat);
            globeGroup.add(tube);
            tubes.push(tube);

            const planeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const plane = new THREE.Mesh(coneGeom, planeMat);
            globeGroup.add(plane);
            planes.push({ mesh: plane, progress: window.__3D_STATE__.planeProgress[i] });
        }

        // Interactions
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                window.__3D_STATE__.rotationEnabled = !window.__3D_STATE__.rotationEnabled;
            }
            
            const num = parseInt(e.key);
            if (num >= 1 && num <= 5) {
                const idx = num - 1;
                if (window.__3D_STATE__.highlightedRoute === idx) {
                    window.__3D_STATE__.highlightedRoute = -1;
                    tubes.forEach(t => { t.scale.y = 1; t.material.opacity = 1; });
                } else {
                    window.__3D_STATE__.highlightedRoute = idx;
                    tubes.forEach((t, i) => {
                        if (i === idx) {
                            t.scale.y = 3;
                            t.material.opacity = 1;
                        } else {
                            t.scale.y = 1;
                            t.material.opacity = 0.3;
                        }
                    });
                }
            }
        });

        const speeds = [
            { level: 'normal', val: 0.002 },
            { level: 'fast', val: 0.006 },
            { level: 'slow', val: 0.001 }
        ];
        let speedIdx = 0;
        document.getElementById('speedBtn').addEventListener('click', () => {
            speedIdx = (speedIdx + 1) % 3;
            window.__3D_STATE__.speedLevel = speeds[speedIdx].level;
            window.__3D_STATE__.speedValue = speeds[speedIdx].val;
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let camAnim = { active: false, frame: 0, startPos: null, endPos: null };

        window.addEventListener('click', (e) => {
            if (e.target.id === 'speedBtn') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(markers);
            
            if (intersects.length > 0) {
                const marker = intersects[0].object;
                window.__3D_STATE__.selectedCity = marker.userData.city.name;
                
                camAnim.active = true;
                camAnim.frame = 0;
                camAnim.startPos = camera.position.clone();
                
                const targetPos = new THREE.Vector3();
                marker.getWorldPosition(targetPos);
                camAnim.endPos = targetPos.clone().normalize().multiplyScalar(11).add(new THREE.Vector3(0, 4, 0));
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // HUD Update
        function updateHUD() {
            const s = window.__3D_STATE__;
            const hud = document.getElementById('hud');
            hud.innerHTML = `Routes: ${s.routeCount} | Planes: ${s.routeCount}<br>` +
                            `Speed: ${s.speedLevel} | Rotation: ${s.rotationEnabled ? 'ON' : 'OFF'}` +
                            (s.selectedCity ? `<br>City: ${s.selectedCity}` : '');
            document.getElementById('speedBtn').innerText = `Toggle Speed (${s.speedLevel})`;
        }

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            window.__3D_STATE__.frameCount++;

            if (window.__3D_STATE__.rotationEnabled) {
                globeGroup.rotation.y += 0.003;
            }
            window.__3D_STATE__.globeRotationY = globeGroup.rotation.y;

            planes.forEach((p, i) => {
                p.progress += window.__3D_STATE__.speedValue;
                if (p.progress > 1) p.progress -= 1;
                window.__3D_STATE__.planeProgress[i] = p.progress;

                const pt = curves[i].getPointAt(p.progress);
                p.mesh.position.copy(pt);

                let nextProg = p.progress + 0.01;
                if (nextProg > 1) nextProg = 1;
                const nextPt = curves[i].getPointAt(nextProg);
                const nextPtWorld = globeGroup.localToWorld(nextPt.clone());
                p.mesh.lookAt(nextPtWorld);

                const wp = new THREE.Vector3();
                p.mesh.getWorldPosition(wp);
                window.__3D_STATE__.planePositions[i] = { x: wp.x, y: wp.y, z: wp.z };
            });

            if (camAnim.active) {
                controls.enabled = false;
                camAnim.frame++;
                const t = camAnim.frame / 60;
                const easeT = t * (2 - t);
                camera.position.lerpVectors(camAnim.startPos, camAnim.endPos, easeT);
                if (camAnim.frame >= 60) {
                    camAnim.active = false;
                    controls.enabled = true;
                }
            } else {
                controls.update();
            }

            updateHUD();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
