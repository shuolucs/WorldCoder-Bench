<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Globe Flight Routes</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; }
#hud {
position: absolute;
top: 10px;
left: 10px;
color: white;
background: rgba(0,0,0,0.6);
padding: 12px 16px;
border-radius: 8px;
font-size: 14px;
line-height: 1.6;
z-index: 10;
}
#speedBtn {
position: absolute;
top: 10px;
right: 10px;
padding: 10px;
background: #333;
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
font-size: 14px;
z-index: 10;
}
#speedBtn:hover { background: #555; }
#cityLabel {
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
color: #ffd700;
background: rgba(0,0,0,0.7);
padding: 8px 16px;
border-radius: 5px;
font-size: 16px;
display: none;
z-index: 10;
}
</style>
</head>
<body>
<div id="hud">Routes: 5 | Planes: 5 | Speed: normal | Rotation: OFF</div>
<button id="speedBtn">Toggle Speed (normal)</button>
<div id="cityLabel"></div>

<script type="importmap">
{
"imports": {
"three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
}
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 10, 10);
scene.add(directionalLight);

// Globe
const globeRadius = 5;
const globeGroup = new THREE.Group();
scene.add(globeGroup);

const globeGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
const globeMaterial = new THREE.MeshPhongMaterial({ color: 0x1a5276 });
const globe = new THREE.Mesh(globeGeometry, globeMaterial);
globeGroup.add(globe);

const wireframeGeometry = new THREE.SphereGeometry(globeRadius + 0.01, 36, 18);
const wireframeMaterial = new THREE.MeshBasicMaterial({
color: 0x2980b9,
wireframe: true,
transparent: true,
opacity: 0.3
});
const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
globeGroup.add(wireframe);

// Helper: lat/lon to 3D position
function latLonToVec3(lat, lon, radius) {
const latRad = THREE.MathUtils.degToRad(lat);
const lonRad = THREE.MathUtils.degToRad(lon);
const x = radius * Math.cos(latRad) * Math.cos(lonRad);
const y = radius * Math.sin(latRad);
const z = radius * Math.cos(latRad) * Math.sin(lonRad);
return new THREE.Vector3(x, y, z);
}

// Cities
const cities = [
{ name: 'New York', lat: 40.7, lon: -74.0 },
{ name: 'London', lat: 51.5, lon: -0.1 },
{ name: 'Tokyo', lat: 35.7, lon: 139.7 },
{ name: 'Sydney', lat: -33.9, lon: 151.2 },
{ name: 'São Paulo', lat: -23.5, lon: -46.6 }
];

// City markers
const cityMarkers = [];
const markerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
const markerMaterial = new THREE.MeshPhongMaterial({ color: 0xffd700 });

cities.forEach((city) => {
const pos = latLonToVec3(city.lat, city.lon, globeRadius + 0.05);
const marker = new THREE.Mesh(markerGeometry, markerMaterial.clone());
marker.position.copy(pos);
marker.userData = { cityName: city.name, isCity: true };
globeGroup.add(marker);
cityMarkers.push(marker);
});

// Flight routes
const routeColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff];
const routes = [];
const routeMeshes = [];
const planes = [];
const curves = [];

for (let i = 0; i < 5; i++) {
const startCity = cities[i];
const endCity = cities[(i + 1) % 5];

const startPos = latLonToVec3(startCity.lat, startCity.lon, globeRadius + 0.05);
const endPos = latLonToVec3(endCity.lat, endCity.lon, globeRadius + 0.05);

// Midpoint elevated
const mid = new THREE.Vector3().addVectors(startPos, endPos).multiplyScalar(0.5);
mid.normalize().multiplyScalar(globeRadius * 1.8);

const curve = new THREE.QuadraticBezierCurve3(startPos, mid, endPos);
curves.push(curve);

const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
const tubeMaterial = new THREE.MeshPhongMaterial({
color: routeColors[i],
transparent: true,
opacity: 1.0
});
const tubeMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
tubeMesh.userData = { routeIndex: i };
globeGroup.add(tubeMesh);
routeMeshes.push(tubeMesh);

// Plane (cone)
const coneGeometry = new THREE.ConeGeometry(0.1, 0.3, 8);
const coneMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
const plane = new THREE.Mesh(coneGeometry, coneMaterial);
plane.userData = { progress: i * 0.2, routeIndex: i };
globeGroup.add(plane);
planes.push(plane);
}

// Load landmark
window.__landmark = null;
const gltfLoader = new GLTFLoader();
let landmarkLoaded = false;

gltfLoader.load(
'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
(gltf) => {
const model = gltf.scene;
model.scale.set(0.3, 0.3, 0.3);
const parisPos = latLonToVec3(48.8, 2.3, 5.2);
model.position.copy(parisPos);
// Orient model to stand on globe surface
model.lookAt(0, 0, 0);
model.rotateX(Math.PI / 2);
globeGroup.add(model);
window.__landmark = model;
landmarkLoaded = true;
updateHUD();
},
undefined,
(error) => {
console.warn('Could not load AntiqueCamera.glb:', error);
// Create a placeholder
const placeholderGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
const placeholderMat = new THREE.MeshPhongMaterial({ color: 0xff8800 });
const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
const parisPos = latLonToVec3(48.8, 2.3, 5.2);
placeholder.position.copy(parisPos);
globeGroup.add(placeholder);
window.__landmark = placeholder;
landmarkLoaded = true;
updateHUD();
}
);

// State
let rotationEnabled = false;
let speedLevels = ['normal', 'fast', 'slow'];
let speedValues = [0.002, 0.006, 0.001];
let speedIndex = 0;
let highlightedRoute = -1;
let selectedCity = '';
let frameCount = 0;

// Camera zoom animation
let cameraZoomTarget = null;
let cameraZoomStart = null;
let cameraZoomFrame = 0;
let cameraZoomDuration = 60;
let isZooming = false;

// State object
window.__3D_STATE__ = {
globeRadius: globeRadius,
routeCount: 5,
planePositions: Array(5).fill(null).map(() => ({ x: 0, y: 0, z: 0 })),
planeProgress: Array(5).fill(0),
rotationEnabled: false,
speedLevel: 'normal',
speedValue: 0.002,
highlightedRoute: -1,
selectedCity: '',
landmarkLoaded: false,
cityCount: 5,
frameCount: 0,
globeRotationY: 0
};

// HUD
const hud = document.getElementById('hud');
const speedBtn = document.getElementById('speedBtn');
const cityLabel = document.getElementById('cityLabel');

function updateHUD() {
hud.textContent = `Routes: 5 | Planes: 5 | Speed: ${speedLevels[speedIndex]} | Rotation: ${rotationEnabled ? 'ON' : 'OFF'}`;
speedBtn.textContent = `Toggle Speed (${speedLevels[speedIndex]})`;
}

// Speed button
speedBtn.addEventListener('click', () => {
speedIndex = (speedIndex + 1) % 3;
updateHUD();
});

// Keyboard
window.addEventListener('keydown', (e) => {
const key = e.key.toLowerCase();

if (key === 'r') {
rotationEnabled = !rotationEnabled;
updateHUD();
}

if (key >= '1' && key <= '5') {
const routeIdx = parseInt(key) - 1;
if (highlightedRoute === routeIdx) {
// Reset all
highlightedRoute = -1;
routeMeshes.forEach((mesh) => {
mesh.scale.set(1, 1, 1);
mesh.material.opacity = 1.0;
});
} else {
highlightedRoute = routeIdx;
routeMeshes.forEach((mesh, idx) => {
if (idx === routeIdx) {
mesh.scale.set(1, 3, 1);
mesh.material.opacity = 1.0;
} else {
mesh.scale.set(1, 1, 1);
mesh.material.opacity = 0.3;
}
});
}
}
});

// Raycasting for city click
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

raycaster.setFromCamera(mouse, camera);
const intersects = raycaster.intersectObjects(cityMarkers);

if (intersects.length > 0) {
const marker = intersects[0].object;
const cityName = marker.userData.cityName;
selectedCity = cityName;

// Show label
cityLabel.textContent = cityName;
cityLabel.style.display = 'block';

// Calculate zoom target
const worldPos = new THREE.Vector3();
marker.getWorldPosition(worldPos);
const direction = worldPos.clone().normalize();
const targetCamPos = direction.multiplyScalar(8).add(new THREE.Vector3(0, 2, 0));

cameraZoomStart = camera.position.clone();
cameraZoomTarget = targetCamPos;
cameraZoomFrame = 0;
isZooming = true;
controls.enabled = false;
}
});

// Window resize
window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
requestAnimationFrame(animate);
frameCount++;

const currentSpeed = speedValues[speedIndex];

// Globe rotation
if (rotationEnabled) {
globeGroup.rotation.y += 0.003;
}

// Update planes
for (let i = 0; i < 5; i++) {
const plane = planes[i];
let progress = plane.userData.progress;
progress += currentSpeed;
if (progress > 1) progress -= 1;
plane.userData.progress = progress;

const curve = curves[i];
const point = curve.getPointAt(progress);
plane.position.copy(point);

// Orient plane along curve
const nextT = Math.min(progress + 0.01, 1.0);
const nextPoint = curve.getPointAt(nextT);
plane.lookAt(nextPoint);
plane.rotateX(Math.PI / 2);

// Update state
const worldPos = new THREE.Vector3();
plane.getWorldPosition(worldPos);
window.__3D_STATE__.planePositions[i] = { x: worldPos.x, y: worldPos.y, z: worldPos.z };
window.__3D_STATE__.planeProgress[i] = progress;
}

// Camera zoom animation
if (isZooming && cameraZoomTarget) {
cameraZoomFrame++;
const t = Math.min(cameraZoomFrame / cameraZoomDuration, 1);
const easeT = t * t * (3 - 2 * t); // smoothstep

camera.position.lerpVectors(cameraZoomStart, cameraZoomTarget, easeT);
camera.lookAt(0, 0, 0);

if (cameraZoomFrame >= cameraZoomDuration) {
isZooming = false;
controls.enabled = true;
controls.update();
}
}

// Update state
window.__3D_STATE__.rotationEnabled = rotationEnabled;
window.__3D_STATE__.speedLevel = speedLevels[speedIndex];
window.__3D_STATE__.speedValue = speedValues[speedIndex];
window.__3D_STATE__.highlightedRoute = highlightedRoute;
window.__3D_STATE__.selectedCity = selectedCity;
window.__3D_STATE__.landmarkLoaded = landmarkLoaded;
window.__3D_STATE__.frameCount = frameCount;
window.__3D_STATE__.globeRotationY = globeGroup.rotation.y;

controls.update();
renderer.render(scene, camera);
}

updateHUD();
animate();
</script>
</body>
</html>
