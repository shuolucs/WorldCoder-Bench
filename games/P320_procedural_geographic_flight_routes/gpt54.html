<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Procedural Flight Routes Globe</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
      user-select: none;
      line-height: 1.4;
    }

    #speedBtn {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      z-index: 10;
      font-size: 14px;
    }

    #speedBtn:hover {
      background: #444;
    }
  </style>
</head>
<body>
  <div id="hud">Routes: 5 | Planes: 5 | Speed: normal | Rotation: OFF</div>
  <button id="speedBtn">Toggle Speed (normal)</button>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const globeRadius = 5;

    const globeGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0x1a5276
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    globeGroup.add(globe);

    const wireGeometry = new THREE.SphereGeometry(globeRadius + 0.01, 32, 32);
    const wireMaterial = new THREE.MeshBasicMaterial({
      color: 0x2980b9,
      wireframe: true,
      transparent: true,
      opacity: 0.3
    });
    const wireGlobe = new THREE.Mesh(wireGeometry, wireMaterial);
    globeGroup.add(wireGlobe);

    function latLonToVector3(lat, lon, radius) {
      const latRad = THREE.MathUtils.degToRad(lat);
      const lonRad = THREE.MathUtils.degToRad(lon);
      const x = radius * Math.cos(latRad) * Math.cos(lonRad);
      const y = radius * Math.sin(latRad);
      const z = radius * Math.cos(latRad) * Math.sin(lonRad);
      return new THREE.Vector3(x, y, z);
    }

    const cities = [
      { name: "New York", lat: 40.7, lon: -74.0 },
      { name: "London", lat: 51.5, lon: -0.1 },
      { name: "Tokyo", lat: 35.7, lon: 139.7 },
      { name: "Sydney", lat: -33.9, lon: 151.2 },
      { name: "São Paulo", lat: -23.5, lon: -46.6 }
    ];

    const routeColors = [0xff4444, 0x44ff44, 0x4444ff, 0xffff44, 0xff44ff];

    const cityMarkers = [];
    const routes = [];
    const planes = [];
    const routeCurves = [];

    const markerGeometry = new THREE.SphereGeometry(0.15, 16, 16);
    const markerMaterialBase = new THREE.MeshPhongMaterial({ color: 0xffd700 });

    cities.forEach((city) => {
      const marker = new THREE.Mesh(markerGeometry, markerMaterialBase.clone());
      marker.position.copy(latLonToVector3(city.lat, city.lon, globeRadius + 0.02));
      marker.userData.cityName = city.name;
      marker.userData.city = city;
      globeGroup.add(marker);
      cityMarkers.push(marker);
    });

    function createArc(startVec, endVec, color) {
      const midpoint = startVec.clone().add(endVec).multiplyScalar(0.5).normalize().multiplyScalar(globeRadius * 1.8);
      const curve = new THREE.QuadraticBezierCurve3(startVec, midpoint, endVec);
      const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
      const material = new THREE.MeshPhongMaterial({
        color,
        transparent: true,
        opacity: 1
      });
      const mesh = new THREE.Mesh(tubeGeometry, material);
      globeGroup.add(mesh);
      return { curve, mesh, material };
    }

    for (let i = 0; i < cities.length; i++) {
      const from = cities[i];
      const to = cities[(i + 1) % cities.length];
      const start = latLonToVector3(from.lat, from.lon, globeRadius + 0.02);
      const end = latLonToVector3(to.lat, to.lon, globeRadius + 0.02);

      const routeData = createArc(start, end, routeColors[i]);
      routes.push(routeData.mesh);
      routeCurves.push(routeData.curve);

      const planeGeometry = new THREE.ConeGeometry(0.1, 0.3, 12);
      const planeMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
      const plane = new THREE.Mesh(planeGeometry, planeMaterial);
      plane.rotation.x = Math.PI / 2;
      globeGroup.add(plane);

      planes.push({
        mesh: plane,
        progress: i * 0.2
      });
    }

    const loader = new GLTFLoader();
    window.__landmark = null;

    loader.load(
      "AntiqueCamera.glb",
      (gltf) => {
        const model = gltf.scene;
        model.scale.set(0.3, 0.3, 0.3);
        const parisPos = latLonToVector3(48.8, 2.3, 5.2);
        model.position.copy(parisPos);
        model.lookAt(0, 0, 0);
        globeGroup.add(model);
        window.__landmark = model;
        window.__3D_STATE.landmarkLoaded = true;
      },
      undefined,
      () => {
        window.__3D_STATE.landmarkLoaded = false;
      }
    );

    const hud = document.getElementById("hud");
    const speedBtn = document.getElementById("speedBtn");

    let rotationEnabled = false;
    let highlightedRoute = -1;
    let selectedCity = "";
    let frameCount = 0;

    const speedLevels = [
      { label: "normal", value: 0.002 },
      { label: "fast", value: 0.006 },
      { label: "slow", value: 0.001 }
    ];
    let speedIndex = 0;

    const zoomState = {
      active: false,
      frame: 0,
      totalFrames: 60,
      startPos: new THREE.Vector3(),
      endPos: new THREE.Vector3(),
      startTarget: new THREE.Vector3(),
      endTarget: new THREE.Vector3()
    };

    function updateHud() {
      const cityPart = selectedCity ? ` | City: ${selectedCity}` : "";
      hud.textContent =
        `Routes: 5 | Planes: 5 | Speed: ${speedLevels[speedIndex].label} | Rotation: ${rotationEnabled ? "ON" : "OFF"}${cityPart}`;
      speedBtn.textContent = `Toggle Speed (${speedLevels[speedIndex].label})`;
    }

    function applyRouteHighlight(index) {
      if (highlightedRoute === index) {
        highlightedRoute = -1;
        routes.forEach((route) => {
          route.scale.set(1, 1, 1);
          route.material.opacity = 1;
        });
      } else {
        highlightedRoute = index;
        routes.forEach((route, i) => {
          if (i === index) {
            route.scale.set(1, 3, 1);
            route.material.opacity = 1;
          } else {
            route.scale.set(1, 1, 1);
            route.material.opacity = 0.3;
          }
        });
      }
    }

    speedBtn.addEventListener("click", () => {
      speedIndex = (speedIndex + 1) % speedLevels.length;
      updateHud();
    });

    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();

      if (key === "r") {
        rotationEnabled = !rotationEnabled;
        updateHud();
      }

      if (["1", "2", "3", "4", "5"].includes(event.key)) {
        applyRouteHighlight(parseInt(event.key, 10) - 1);
      }
    });

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function startCameraZoomToCity(cityName, cityLat, cityLon) {
      const cityPos = latLonToVector3(cityLat, cityLon, globeRadius + 0.02);
      const offset = cityPos.clone().normalize().multiplyScalar(8);
      const angledOffset = offset.clone().add(new THREE.Vector3(2, 2, 2)).normalize().multiplyScalar(8);
      const endCameraPos = cityPos.clone().add(angledOffset);

      zoomState.active = true;
      zoomState.frame = 0;
      zoomState.startPos.copy(camera.position);
      zoomState.endPos.copy(endCameraPos);
      zoomState.startTarget.copy(controls.target);
      zoomState.endTarget.copy(cityPos);

      selectedCity = cityName;
      updateHud();
    }

    renderer.domElement.addEventListener("click", (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(cityMarkers, false);

      if (intersects.length > 0) {
        const marker = intersects[0].object;
        const city = marker.userData.city;
        startCameraZoomToCity(city.name, city.lat, city.lon);
      }
    });

    window.__3D_STATE = {
      globeRadius: 5,
      routeCount: 5,
      planePositions: new Array(5).fill(0).map(() => ({ x: 0, y: 0, z: 0 })),
      planeProgress: new Array(5).fill(0),
      rotationEnabled: false,
      speedLevel: "normal",
      speedValue: 0.002,
      highlightedRoute: -1,
      selectedCity: "",
      landmarkLoaded: false,
      cityCount: 5,
      frameCount: 0,
      globeRotationY: 0
    };

    updateHud();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (rotationEnabled) {
        globeGroup.rotation.y += 0.003;
      }

      const speed = speedLevels[speedIndex].value;

      planes.forEach((planeObj, i) => {
        planeObj.progress += speed;
        if (planeObj.progress > 1) planeObj.progress -= 1;

        const curve = routeCurves[i];
        const p = curve.getPointAt(planeObj.progress);
        const nextT = (planeObj.progress + 0.01) % 1;
        const nextP = curve.getPointAt(nextT);

        planeObj.mesh.position.copy(p);
        planeObj.mesh.lookAt(nextP);

        window.__3D_STATE.planePositions[i] = {
          x: planeObj.mesh.getWorldPosition(new THREE.Vector3()).x,
          y: planeObj.mesh.getWorldPosition(new THREE.Vector3()).y,
          z: planeObj.mesh.getWorldPosition(new THREE.Vector3()).z
        };
        window.__3D_STATE.planeProgress[i] = planeObj.progress;
      });

      if (zoomState.active) {
        zoomState.frame++;
        const t = Math.min(zoomState.frame / zoomState.totalFrames, 1);
        const eased = t * t * (3 - 2 * t);

        camera.position.lerpVectors(zoomState.startPos, zoomState.endPos, eased);
        controls.target.lerpVectors(zoomState.startTarget, zoomState.endTarget, eased);

        if (t >= 1) {
          zoomState.active = false;
        }
      }

      controls.update();

      window.__3D_STATE.globeRadius = globeRadius;
      window.__3D_STATE.routeCount = 5;
      window.__3D_STATE.rotationEnabled = rotationEnabled;
      window.__3D_STATE.speedLevel = speedLevels[speedIndex].label;
      window.__3D_STATE.speedValue = speedLevels[speedIndex].value;
      window.__3D_STATE.highlightedRoute = highlightedRoute;
      window.__3D_STATE.selectedCity = selectedCity;
      window.__3D_STATE.cityCount = 5;
      window.__3D_STATE.frameCount = frameCount;
      window.__3D_STATE.globeRotationY = globeGroup.rotation.y;

      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
