<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Kaleidoscope with Undo/Redo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        button {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: background-color 0.2s, opacity 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background-color: #555555 !important;
            color: #aaaaaa;
            cursor: not-allowed;
            transform: none;
        }
        #addShapeBtn { background-color: #4CAF50; }
        #addShapeBtn:hover:not(:disabled) { background-color: #45a049; }
        
        #undoBtn { background-color: #FF9800; }
        #undoBtn:hover:not(:disabled) { background-color: #e68a00; }
        
        #redoBtn { background-color: #2196F3; }
        #redoBtn:hover:not(:disabled) { background-color: #0b7dda; }
        
        #clearBtn { background-color: #f44336; }
        #clearBtn:hover:not(:disabled) { background-color: #da190b; }
    </style>
    <!-- Load Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="hud">
        <button id="addShapeBtn">Add Shape</button>
        <button id="undoBtn" disabled>Undo</button>
        <button id="redoBtn" disabled>Redo</button>
        <button id="clearBtn">Clear All</button>
    </div>
    <div id="canvas-container"></div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            seedCount: 0,
            totalMeshCount: 0,
            historyLength: 0,
            redoLength: 0,
            undoBtnDisabled: true,
            redoBtnDisabled: true,
            rotationAngle: 0,
            isAnimating: true
        };

        let undoStack = [];
        let redoStack = [];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        // --- Kaleidoscope Group ---
        const kaleidoscopeGroup = new THREE.Group();
        scene.add(kaleidoscopeGroup);

        // --- Geometries & Materials ---
        const geometries = [
            () => new THREE.BoxGeometry(1, 1, 1),
            () => new THREE.SphereGeometry(0.5, 32, 32),
            () => new THREE.ConeGeometry(0.5, 1, 32)
        ];

        const brightColors = [
            0xFF004D, 0x00FF66, 0x0066FF, 0xFFCC00, 0xCC00FF, 0x00FFFF, 
            0xFF5733, 0x33FFBD, 0xFF33A8, 0x335BFF, 0xE0FF33
        ];

        // --- Logic Functions ---
        function createRandomShapeGroup() {
            // 1. Create Seed Shape
            const geoFunc = geometries[Math.floor(Math.random() * geometries.length)];
            const geometry = geoFunc();
            
            // Scale to ~0.3 - 0.5
            const scale = 0.3 + Math.random() * 0.2;
            geometry.scale(scale, scale, scale);

            const color = brightColors[Math.floor(Math.random() * brightColors.length)];
            const material = new THREE.MeshStandardMaterial({ 
                color: color,
                roughness: 0.3,
                metalness: 0.2
            });

            const seedMesh = new THREE.Mesh(geometry, material);

            // Random position within radius 2 on XY plane
            const radius = Math.random() * 2;
            const angle = Math.random() * Math.PI * 2;
            seedMesh.position.set(Math.cos(angle) * radius, Math.sin(angle) * radius, 0);
            
            // Random rotation
            seedMesh.rotation.set(
                Math.random() * Math.PI,
                Math.random() * Math.PI,
                Math.random() * Math.PI
            );

            // 2. Create 6-fold symmetry group
            const symGroup = new THREE.Group();
            const segments = 6;
            const angleStep = (Math.PI * 2) / segments;

            for (let i = 0; i < segments; i++) {
                const clone = seedMesh.clone();
                const pivot = new THREE.Group();
                pivot.rotation.z = i * angleStep;
                pivot.add(clone);
                symGroup.add(pivot);
            }

            return symGroup;
        }

        function updateUIAndState() {
            const undoBtn = document.getElementById('undoBtn');
            const redoBtn = document.getElementById('redoBtn');

            const canUndo = undoStack.length > 0;
            const canRedo = redoStack.length > 0;

            undoBtn.disabled = !canUndo;
            redoBtn.disabled = !canRedo;

            window.__3D_STATE__.seedCount = undoStack.length;
            window.__3D_STATE__.totalMeshCount = undoStack.length * 6;
            window.__3D_STATE__.historyLength = undoStack.length;
            window.__3D_STATE__.redoLength = redoStack.length;
            window.__3D_STATE__.undoBtnDisabled = !canUndo;
            window.__3D_STATE__.redoBtnDisabled = !canRedo;
        }

        // --- Interaction Handlers ---
        document.getElementById('addShapeBtn').addEventListener('click', () => {
            const newGroup = createRandomShapeGroup();
            kaleidoscopeGroup.add(newGroup);
            undoStack.push(newGroup);
            
            // Clear redo stack on new action
            redoStack.forEach(group => {
                // Dispose geometries and materials to prevent memory leaks
                group.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        child.material.dispose();
                    }
                });
            });
            redoStack = [];
            
            updateUIAndState();
        });

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length === 0) return;
            const groupToUndo = undoStack.pop();
            kaleidoscopeGroup.remove(groupToUndo);
            redoStack.push(groupToUndo);
            updateUIAndState();
        });

        document.getElementById('redoBtn').addEventListener('click', () => {
            if (redoStack.length === 0) return;
            const groupToRedo = redoStack.pop();
            kaleidoscopeGroup.add(groupToRedo);
            undoStack.push(groupToRedo);
            updateUIAndState();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            // Remove all from scene
            undoStack.forEach(group => kaleidoscopeGroup.remove(group));
            
            // Dispose resources
            const allGroups = [...undoStack, ...redoStack];
            allGroups.forEach(group => {
                group.traverse(child => {
                    if (child.isMesh) {
                        child.geometry.dispose();
                        child.material.dispose();
                    }
                });
            });

            undoStack = [];
            redoStack = [];
            updateUIAndState();
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            
            // Rotate kaleidoscope at 0.3 radians per second
            kaleidoscopeGroup.rotation.z += 0.3 * delta;
            
            // Update state rotation
            window.__3D_STATE__.rotationAngle = kaleidoscopeGroup.rotation.z;

            renderer.render(scene, camera);
        }

        // Initialize UI state and start loop
        updateUIAndState();
        animate();

    </script>
</body>
</html>
