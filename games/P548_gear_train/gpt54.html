<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>3D Gear Train Simulator</title>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1e1e26;
      font-family: Arial, Helvetica, sans-serif;
      color: #eef3ff;
    }

    #app {
      position: fixed;
      inset: 0;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 320px;
      background: rgba(20, 24, 32, 0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      z-index: 10;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    #ui h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .control {
      margin: 10px 0;
    }

    .control label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .control input[type="range"] {
      width: 100%;
    }

    .small {
      font-size: 12px;
      color: #cbd3e0;
      line-height: 1.4;
    }

    #hud {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
      font-size: 13px;
      line-height: 1.6;
    }

    .hud-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .key {
      color: #99b8ff;
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="ui">
    <h2>Gear Train Simulator</h2>

    <div class="control">
      <label for="slider-input-speed">Input Angular Velocity ωA: <span id="label-input-speed">2.0</span> rad/s</label>
      <input id="slider-input-speed" type="range" min="0.5" max="10" step="0.5" value="2" />
    </div>

    <div class="control">
      <label for="slider-friction">Friction Coefficient: <span id="label-friction">0.010</span></label>
      <input id="slider-friction" type="range" min="0" max="0.1" step="0.005" value="0.01" />
    </div>

    <div class="small">
      <div><span class="key">Space</span>: Pause/Play</div>
      <div><span class="key">R</span>: Reset angles</div>
      <div><span class="key">1-5</span>: Highlight gear A-E</div>
    </div>

    <div id="hud">
      <div class="hud-row"><span>Input speed</span><span id="hud-input">0.00</span></div>
      <div class="hud-row"><span>Output speed</span><span id="hud-output">0.00</span></div>
      <div class="hud-row"><span>Gear ratio</span><span id="hud-ratio">0.000</span></div>
      <div class="hud-row"><span>Total teeth</span><span id="hud-teeth">92</span></div>
      <div class="hud-row"><span>Selected gear</span><span id="hud-selected">None</span></div>
      <div class="hud-row"><span>Status</span><span id="hud-paused">Playing</span></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a35);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 15);
    camera.lookAt(0, 2, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0x445566, 0.4));

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 8);
    scene.add(dirLight);

    const basePlate = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.2, 10),
      new THREE.MeshStandardMaterial({
        color: 0x556677,
        metalness: 0.8,
        roughness: 0.35
      })
    );
    basePlate.position.y = 0;
    scene.add(basePlate);

    const grid = new THREE.GridHelper(20, 20, 0x667788, 0x445566);
    grid.position.y = 0.101;
    scene.add(grid);

    const MODULE = 0.3;
    const GEAR_THICKNESS = 0.5;
    const AXLE_RADIUS = 0.1;
    const AXLE_HEIGHT = 0.8;

    function createGearShape(teeth, moduleSize = MODULE) {
      const pitchRadius = teeth * moduleSize / 2;
      const addendum = moduleSize;
      const dedendum = 1.25 * moduleSize;
      const rootRadius = Math.max(0.08, pitchRadius - dedendum);
      const outerRadius = pitchRadius + addendum;
      const toothThicknessArc = Math.PI * moduleSize / 2;
      const toothAngle = toothThicknessArc / pitchRadius;
      const halfToothAngle = toothAngle * 0.5;
      const stepsPerTooth = 4;

      const pts = [];
      for (let i = 0; i < teeth; i++) {
        const base = (i / teeth) * Math.PI * 2;
        const nextBase = ((i + 1) / teeth) * Math.PI * 2;
        const valleyHalf = (nextBase - base - toothAngle) * 0.5;

        const a0 = base;
        const a1 = base + valleyHalf;
        const a2 = base + valleyHalf + halfToothAngle * 0.35;
        const a3 = base + valleyHalf + halfToothAngle * 1.0;
        const a4 = base + valleyHalf + toothAngle - halfToothAngle * 1.0;
        const a5 = base + valleyHalf + toothAngle - halfToothAngle * 0.35;
        const a6 = nextBase;

        pts.push(new THREE.Vector2(rootRadius * Math.cos(a0), rootRadius * Math.sin(a0)));
        pts.push(new THREE.Vector2(rootRadius * Math.cos(a1), rootRadius * Math.sin(a1)));

        for (let s = 0; s <= stepsPerTooth; s++) {
          const t = s / stepsPerTooth;
          const angle = THREE.MathUtils.lerp(a2, a3, t);
          const radius = THREE.MathUtils.lerp(pitchRadius * 0.98, outerRadius, Math.pow(t, 0.8));
          pts.push(new THREE.Vector2(radius * Math.cos(angle), radius * Math.sin(angle)));
        }

        for (let s = 0; s <= stepsPerTooth; s++) {
          const t = s / stepsPerTooth;
          const angle = THREE.MathUtils.lerp(a4, a5, t);
          const radius = THREE.MathUtils.lerp(outerRadius, pitchRadius * 0.98, t);
          pts.push(new THREE.Vector2(radius * Math.cos(angle), radius * Math.sin(angle)));
        }

        pts.push(new THREE.Vector2(rootRadius * Math.cos(a6), rootRadius * Math.sin(a6)));
      }

      const shape = new THREE.Shape(pts);
      const bore = new THREE.Path();
      bore.absellipse(0, 0, 0.16, 0.16, 0, Math.PI * 2, false, 0);
      shape.holes.push(bore);

      return {
        shape,
        pitchRadius,
        rootRadius,
        outerRadius
      };
    }

    function createGearGeometry(teeth) {
      const { shape, pitchRadius, rootRadius, outerRadius } = createGearShape(teeth, MODULE);
      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: GEAR_THICKNESS,
        bevelEnabled: false,
        curveSegments: 10
      });
      geometry.center();
      geometry.rotateX(Math.PI / 2);
      return { geometry, pitchRadius, rootRadius, outerRadius };
    }

    function gearMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color,
        metalness: 0.7,
        roughness: 0.3,
        emissive: 0x000000,
        emissiveIntensity: 0
      });
    }

    function createGear(name, teeth, color, position, zOffset = 0) {
      const { geometry, pitchRadius, rootRadius, outerRadius } = createGearGeometry(teeth);

      const group = new THREE.Group();
      group.position.copy(position);
      group.position.z += zOffset;

      const mat = gearMaterial(color);
      const mesh = new THREE.Mesh(geometry, mat);
      group.add(mesh);

      const axle = new THREE.Mesh(
        new THREE.CylinderGeometry(AXLE_RADIUS, AXLE_RADIUS, AXLE_HEIGHT, 24),
        new THREE.MeshStandardMaterial({
          color: 0xc8d0da,
          metalness: 0.85,
          roughness: 0.25
        })
      );
      axle.position.y = GEAR_THICKNESS * 0.5 + 0.15;
      group.add(axle);

      scene.add(group);

      const arrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0),
        new THREE.Vector3(position.x, position.y + GEAR_THICKNESS * 0.6, position.z + zOffset),
        1.5,
        0x88ddff,
        0.35,
        0.2
      );
      scene.add(arrow);

      return {
        name,
        teeth,
        color,
        pitchRadius,
        rootRadius,
        outerRadius,
        group,
        mesh,
        material: mat,
        axle,
        arrow,
        omega: 0,
        angle: 0,
        targetOmega: 0
      };
    }

    const posA = new THREE.Vector3(-4, 1.8, 0);
    const rA = 12 * MODULE / 2;
    const rB = 24 * MODULE / 2;
    const rC = 16 * MODULE / 2;
    const rD = 32 * MODULE / 2;
    const rE = 8 * MODULE / 2;

    const posB = new THREE.Vector3(posA.x + rA + rB, 1.8, 0);
    const posC = posB.clone();
    const posD = new THREE.Vector3(posC.x + rC + rD, 1.8, 0.7);
    const posE = new THREE.Vector3(posD.x + rD + rE, 1.8, 0.7);

    const gears = [
      createGear('Gear A', 12, 0xff4444, posA, 0),
      createGear('Gear B', 24, 0x44ff44, posB, 0),
      createGear('Gear C', 16, 0x4488ff, posC, 0.7),
      createGear('Gear D', 32, 0xffaa44, posD, 0),
      createGear('Gear E', 8, 0xff44ff, posE, 0)
    ];

    const [gearA, gearB, gearC, gearD, gearE] = gears;

    const totalTeeth = gears.reduce((s, g) => s + g.teeth, 0);

    function createContactSphere() {
      const s = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        new THREE.MeshStandardMaterial({
          color: 0xffee44,
          emissive: 0xffdd33,
          emissiveIntensity: 0.6,
          metalness: 0.2,
          roughness: 0.4
        })
      );
      scene.add(s);
      return s;
    }

    const contactAB = createContactSphere();
    const contactCD = createContactSphere();
    const contactDE = createContactSphere();

    function createTorqueArrow(start, end, color = 0xffff88) {
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = dir.length();
      dir.normalize();
      const arrow = new THREE.ArrowHelper(dir, start, len, color, 0.4, 0.2);
      scene.add(arrow);
      return arrow;
    }

    const torqueArrows = [
      createTorqueArrow(
        new THREE.Vector3(posA.x, 2.8, posA.z),
        new THREE.Vector3(posB.x, 2.8, posB.z)
      ),
      createTorqueArrow(
        new THREE.Vector3(posB.x, 3.2, posB.z + 0.15),
        new THREE.Vector3(posC.x, 3.2, posC.z - 0.15)
      ),
      createTorqueArrow(
        new THREE.Vector3(posC.x, 2.8, posC.z),
        new THREE.Vector3(posD.x, 2.8, posD.z)
      ),
      createTorqueArrow(
        new THREE.Vector3(posD.x, 2.8, posD.z),
        new THREE.Vector3(posE.x, 2.8, posE.z)
      )
    ];

    function setContactBetween(g1, g2, sphere) {
      const p1 = g1.group.position.clone();
      const p2 = g2.group.position.clone();
      const dir = p2.clone().sub(p1);
      const dist = dir.length();
      if (dist < 1e-6) {
        sphere.position.copy(p1);
        return;
      }
      dir.normalize();
      const point = p1.add(dir.multiplyScalar(g1.pitchRadius));
      sphere.position.copy(point);
    }

    setContactBetween(gearA, gearB, contactAB);
    setContactBetween(gearC, gearD, contactCD);
    setContactBetween(gearD, gearE, contactDE);

    const sliderInput = document.getElementById('slider-input-speed');
    const sliderFriction = document.getElementById('slider-friction');
    const labelInput = document.getElementById('label-input-speed');
    const labelFriction = document.getElementById('label-friction');

    const hudInput = document.getElementById('hud-input');
    const hudOutput = document.getElementById('hud-output');
    const hudRatio = document.getElementById('hud-ratio');
    const hudTeeth = document.getElementById('hud-teeth');
    const hudSelected = document.getElementById('hud-selected');
    const hudPaused = document.getElementById('hud-paused');

    let inputOmega = parseFloat(sliderInput.value);
    let frictionCoefficient = parseFloat(sliderFriction.value);
    let isPaused = false;
    let selectedGear = -1;
    let frameCount = 0;

    labelInput.textContent = inputOmega.toFixed(1);
    labelFriction.textContent = frictionCoefficient.toFixed(3);
    hudTeeth.textContent = totalTeeth.toString();

    sliderInput.addEventListener('input', () => {
      inputOmega = parseFloat(sliderInput.value);
      labelInput.textContent = inputOmega.toFixed(1);
    });

    sliderFriction.addEventListener('input', () => {
      frictionCoefficient = parseFloat(sliderFriction.value);
      labelFriction.textContent = frictionCoefficient.toFixed(3);
    });

    function resetAngles() {
      for (const gear of gears) {
        gear.angle = 0;
        gear.group.rotation.y = 0;
      }
    }

    function updateSelection() {
      gears.forEach((gear, i) => {
        const selected = i === selectedGear;
        gear.material.emissive.setHex(selected ? 0xffffff : 0x000000);
        gear.material.emissiveIntensity = selected ? 0.55 : 0.0;
      });
      hudSelected.textContent = selectedGear >= 0 ? gears[selectedGear].name : 'None';
    }

    updateSelection();

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.key === 'r' || e.key === 'R') {
        resetAngles();
      } else if (e.key >= '1' && e.key <= '5') {
        selectedGear = parseInt(e.key, 10) - 1;
        updateSelection();
      }
    });

    function computeTargetOmegas() {
      gearA.targetOmega = inputOmega;
      gearB.targetOmega = -gearA.targetOmega * (gearA.teeth / gearB.teeth);
      gearC.targetOmega = gearB.targetOmega;
      gearD.targetOmega = -gearC.targetOmega * (gearC.teeth / gearD.teeth);
      gearE.targetOmega = -gearD.targetOmega * (gearD.teeth / gearE.teeth);
    }

    function applyFrictionAndSetOmegas() {
      const loss = Math.max(0, 1 - frictionCoefficient);
      gearA.omega = gearA.targetOmega * loss;
      gearB.omega = gearB.targetOmega * loss;
      gearC.omega = gearC.targetOmega * loss;
      gearD.omega = gearD.targetOmega * loss;
      gearE.omega = gearE.targetOmega * loss;
    }

    function updateArrows() {
      for (const gear of gears) {
        const mag = Math.max(0.25, Math.abs(gear.omega) * 0.75);
        const dir = gear.omega >= 0 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(0, -1, 0);
        gear.arrow.setDirection(dir);
        gear.arrow.setLength(mag, 0.25, 0.15);
        gear.arrow.position.set(
          gear.group.position.x,
          gear.group.position.y + GEAR_THICKNESS * 0.65,
          gear.group.position.z
        );
      }
    }

    const clock = new THREE.Clock();

    function round(n, d) {
      const p = Math.pow(10, d);
      return Math.round(n * p) / p;
    }

    function updateHud() {
      const ratio = inputOmega !== 0 ? gearE.omega / gearA.omega : 0;
      hudInput.textContent = gearA.omega.toFixed(2);
      hudOutput.textContent = gearE.omega.toFixed(2);
      hudRatio.textContent = ratio.toFixed(3);
      hudTeeth.textContent = totalTeeth.toString();
      hudPaused.textContent = isPaused ? 'Paused' : 'Playing';
    }

    function updateState() {
      const ratio = gearA.omega !== 0 ? gearE.omega / gearA.omega : 0;
      const angles = gears.map(g => round(g.angle, 3));
      const values = [gearA.omega, gearB.omega, gearC.omega, gearD.omega, gearE.omega, ...angles];
      const gearsValid = values.every(v => Number.isFinite(v) && !Number.isNaN(v));

      const checks = [];
      if (Math.abs(gearA.omega) > 1e-6 && Math.abs(gearB.omega) > 1e-6) {
        checks.push(Math.abs(Math.abs(gearB.omega / gearA.omega) - gearA.teeth / gearB.teeth) <= (gearA.teeth / gearB.teeth) * 0.05 + 1e-6);
      }
      if (Math.abs(gearB.omega) > 1e-6 && Math.abs(gearC.omega) > 1e-6) {
        checks.push(Math.abs(gearC.omega - gearB.omega) <= Math.abs(gearB.omega) * 0.05 + 1e-6);
      }
      if (Math.abs(gearC.omega) > 1e-6 && Math.abs(gearD.omega) > 1e-6) {
        checks.push(Math.abs(Math.abs(gearD.omega / gearC.omega) - gearC.teeth / gearD.teeth) <= (gearC.teeth / gearD.teeth) * 0.05 + 1e-6);
      }
      if (Math.abs(gearD.omega) > 1e-6 && Math.abs(gearE.omega) > 1e-6) {
        checks.push(Math.abs(Math.abs(gearE.omega / gearD.omega) - gearD.teeth / gearE.teeth) <= (gearD.teeth / gearE.teeth) * 0.05 + 1e-6);
      }
      const meshingCorrect = checks.every(Boolean);

      window.__3D_STATE__ = {
        inputSpeed: round(gearA.omega, 2),
        outputSpeed: round(gearE.omega, 2),
        gearRatio: round(ratio, 4),
        totalTeeth: 92,
        gearAngles: angles,
        friction: frictionCoefficient,
        isPaused,
        selectedGear,
        frameCount,
        gearsValid,
        meshingCorrect
      };
    }

    resetAngles();
    computeTargetOmegas();
    applyFrictionAndSetOmegas();
    updateArrows();
    updateHud();
    updateState();

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      const dt = Math.min(clock.getDelta(), 0.05);

      computeTargetOmegas();
      applyFrictionAndSetOmegas();

      if (!isPaused) {
        for (const gear of gears) {
          gear.angle += gear.omega * dt;
          gear.group.rotation.y = gear.angle;
        }
      }

      updateArrows();
      updateHud();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
