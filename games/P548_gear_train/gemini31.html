<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gear Train Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #2a2a35;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .panel {
            background: rgba(30, 30, 40, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #445;
            pointer-events: auto;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-group {
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type=range] {
            width: 200px;
            accent-color: #4488ff;
        }
        .instructions {
            font-size: 12px;
            color: #889;
            margin-top: 10px;
            line-height: 1.4;
        }
        .hud-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-size: 14px;
            width: 200px;
        }
        .hud-value {
            font-weight: bold;
            color: #4488ff;
        }
        .key {
            background: #445;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="panel" id="controls">
            <h2>Controls</h2>
            <div class="control-group">
                <label><span>Input Speed (rad/s)</span> <span id="val-speed">2.0</span></label>
                <input type="range" id="slider-input-speed" min="0.5" max="10" step="0.5" value="2">
            </div>
            <div class="control-group">
                <label><span>Friction</span> <span id="val-friction">0.010</span></label>
                <input type="range" id="slider-friction" min="0" max="0.1" step="0.005" value="0.01">
            </div>
            <div class="instructions">
                <span class="key">Space</span> Pause / Play<br>
                <span class="key">R</span> Reset Angles<br>
                <span class="key">1</span>-<span class="key">5</span> Highlight Gear
            </div>
        </div>
        <div class="panel" id="hud">
            <h2>Telemetry</h2>
            <div class="hud-row"><span>Input Speed:</span> <span class="hud-value" id="hud-input">0.00</span></div>
            <div class="hud-row"><span>Output Speed:</span> <span class="hud-value" id="hud-output">0.00</span></div>
            <div class="hud-row"><span>Gear Ratio:</span> <span class="hud-value" id="hud-ratio">0.000</span></div>
            <div class="hud-row"><span>Total Teeth:</span> <span class="hud-value" id="hud-teeth">92</span></div>
            <div class="hud-row"><span>Selected:</span> <span class="hud-value" id="hud-selected" style="color:#fff">None</span></div>
            <div class="hud-row"><span>Status:</span> <span class="hud-value" id="hud-paused" style="color:#4f4">Playing</span></div>
        </div>
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            inputSpeed: 2.0,
            outputSpeed: 0.0,
            gearRatio: 0.0,
            totalTeeth: 92,
            gearAngles: [0, 0, 0, 0, 0],
            friction: 0.01,
            isPaused: false,
            selectedGear: -1,
            frameCount: 0,
            gearsValid: true,
            meshingCorrect: true
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a35);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.set(0, 2, 0);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 8);
        scene.add(dirLight);

        // Base Plate
        const baseGeometry = new THREE.BoxGeometry(25, 0.2, 10);
        const baseMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x556677, 
            metalness: 0.8, 
            roughness: 0.4 
        });
        const basePlate = new THREE.Mesh(baseGeometry, baseMaterial);
        basePlate.position.set(5, 0, 0);
        scene.add(basePlate);

        // --- Gear Generation Logic ---
        const MODULE = 0.3;
        const GEAR_THICKNESS = 0.5;

        function createGearGeometry(N) {
            const shape = new THREE.Shape();
            const r = N * MODULE / 2;
            const r_o = r + MODULE;
            const r_r = r - 1.25 * MODULE;
            const pitchAngle = Math.PI * 2 / N;

            for (let i = 0; i < N; i++) {
                const theta = i * pitchAngle;
                // Trapezoidal tooth profile
                const a1 = theta - pitchAngle * 0.4;
                const a2 = theta - pitchAngle * 0.15;
                const a3 = theta + pitchAngle * 0.15;
                const a4 = theta + pitchAngle * 0.4;

                if (i === 0) shape.moveTo(Math.cos(a1) * r_r, Math.sin(a1) * r_r);
                else shape.lineTo(Math.cos(a1) * r_r, Math.sin(a1) * r_r);

                shape.lineTo(Math.cos(a2) * r_o, Math.sin(a2) * r_o);
                shape.lineTo(Math.cos(a3) * r_o, Math.sin(a3) * r_o);
                shape.lineTo(Math.cos(a4) * r_r, Math.sin(a4) * r_r);
            }
            shape.closePath();

            // Central hole
            const hole = new THREE.Path();
            hole.absarc(0, 0, 0.2, 0, Math.PI * 2, false);
            shape.holes.push(hole);

            const extrudeSettings = {
                depth: GEAR_THICKNESS,
                bevelEnabled: true,
                bevelSegments: 2,
                steps: 1,
                bevelSize: 0.02,
                bevelThickness: 0.02
            };

            const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
            geometry.translate(0, 0, -GEAR_THICKNESS / 2); // Center on Z
            return geometry;
        }

        function createGearMesh(N, colorHex) {
            const geometry = createGearGeometry(N);
            const material = new THREE.MeshStandardMaterial({
                color: colorHex,
                metalness: 0.7,
                roughness: 0.3
            });
            const mesh = new THREE.Mesh(geometry, material);

            // Axle
            const axleGeo = new THREE.CylinderGeometry(0.1, 0.1, GEAR_THICKNESS + 0.6, 16);
            axleGeo.rotateX(Math.PI / 2);
            const axleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
            const axle = new THREE.Mesh(axleGeo, axleMat);
            mesh.add(axle);

            return mesh;
        }

        // --- Gear Train Layout ---
        const gearsData = [
            { id: 'A', N: 12, color: 0xff4444, pos: new THREE.Vector3(-4, 1.8, 0) },
            { id: 'B', N: 24, color: 0x44ff44, pos: new THREE.Vector3(1.091, 3.6, 0) },
            { id: 'C', N: 16, color: 0x4488ff, pos: new THREE.Vector3(1.091, 3.6, 0.7) },
            { id: 'D', N: 32, color: 0xffaa44, pos: new THREE.Vector3(8.19, 4.8, 0.7) },
            { id: 'E', N: 8,  color: 0xff44ff, pos: new THREE.Vector3(14.19, 4.8, 0.7) }
        ];

        // Calculate radii
        gearsData.forEach(g => g.r = g.N * MODULE / 2);

        // Calculate exact meshing phases
        function calcPhase(pos1, phase1, N1, pos2, N2) {
            const a12 = Math.atan2(pos2.y - pos1.y, pos2.x - pos1.x);
            const a21 = a12 + Math.PI;
            return a21 - Math.PI / N2 + (a12 - phase1) * (N1 / N2);
        }

        gearsData[0].phase = 0;
        gearsData[1].phase = calcPhase(gearsData[0].pos, gearsData[0].phase, gearsData[0].N, gearsData[1].pos, gearsData[1].N);
        gearsData[2].phase = gearsData[1].phase; // Coaxial
        gearsData[3].phase = calcPhase(gearsData[2].pos, gearsData[2].phase, gearsData[2].N, gearsData[3].pos, gearsData[3].N);
        gearsData[4].phase = calcPhase(gearsData[3].pos, gearsData[3].phase, gearsData[3].N, gearsData[4].pos, gearsData[4].N);

        const gears = [];
        gearsData.forEach((data, index) => {
            const mesh = createGearMesh(data.N, data.color);
            mesh.position.copy(data.pos);
            mesh.rotation.z = data.phase;
            scene.add(mesh);
            
            gears.push({
                ...data,
                mesh: mesh,
                angle: 0,
                omega: 0
            });
        });

        // --- Visualizations ---
        // Contact Points
        const contactMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        const contactGeo = new THREE.SphereGeometry(0.08, 16, 16);
        const contactPoints = [];

        function addContactPoint(g1, g2) {
            const dir = new THREE.Vector3().subVectors(g2.pos, g1.pos).normalize();
            const pos = new THREE.Vector3().copy(g1.pos).add(dir.multiplyScalar(g1.r));
            const sphere = new THREE.Mesh(contactGeo, contactMat);
            sphere.position.copy(pos);
            scene.add(sphere);
            contactPoints.push(sphere);
        }
        addContactPoint(gears[0], gears[1]);
        addContactPoint(gears[2], gears[3]);
        addContactPoint(gears[3], gears[4]);

        // Torque Flow Arrows
        function addTorqueArrow(g1, g2) {
            const dir = new THREE.Vector3().subVectors(g2.pos, g1.pos);
            const length = dir.length();
            dir.normalize();
            const arrow = new THREE.ArrowHelper(dir, g1.pos, length, 0x00ffff, 0.3, 0.2);
            scene.add(arrow);
        }
        addTorqueArrow(gears[0], gears[1]);
        // B to C (along Z)
        const dirBC = new THREE.Vector3(0, 0, 1);
        scene.add(new THREE.ArrowHelper(dirBC, gears[1].pos, 0.7, 0x00ffff, 0.2, 0.15));
        addTorqueArrow(gears[2], gears[3]);
        addTorqueArrow(gears[3], gears[4]);

        // Angular Velocity Arrows
        const omegaArrows = gears.map(g => {
            const arrow = new THREE.ArrowHelper(new THREE.Vector3(0,0,1), g.pos, 1, 0xffff00, 0.2, 0.15);
            scene.add(arrow);
            return arrow;
        });

        // --- Controls & UI ---
        const sliderSpeed = document.getElementById('slider-input-speed');
        const sliderFriction = document.getElementById('slider-friction');
        const valSpeed = document.getElementById('val-speed');
        const valFriction = document.getElementById('val-friction');

        sliderSpeed.addEventListener('input', (e) => {
            window.__3D_STATE__.inputSpeed = parseFloat(e.target.value);
            valSpeed.textContent = window.__3D_STATE__.inputSpeed.toFixed(1);
        });

        sliderFriction.addEventListener('input', (e) => {
            window.__3D_STATE__.friction = parseFloat(e.target.value);
            valFriction.textContent = window.__3D_STATE__.friction.toFixed(3);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
                document.getElementById('hud-paused').textContent = window.__3D_STATE__.isPaused ? 'Paused' : 'Playing';
                document.getElementById('hud-paused').style.color = window.__3D_STATE__.isPaused ? '#f44' : '#4f4';
            }
            if (e.code === 'KeyR') {
                gears.forEach(g => g.angle = 0);
            }
            if (e.key >= '1' && e.key <= '5') {
                const index = parseInt(e.key) - 1;
                if (window.__3D_STATE__.selectedGear === index) {
                    window.__3D_STATE__.selectedGear = -1; // Toggle off
                } else {
                    window.__3D_STATE__.selectedGear = index;
                }
                updateHighlights();
            }
        });

        function updateHighlights() {
            const sel = window.__3D_STATE__.selectedGear;
            gears.forEach((g, i) => {
                if (i === sel) {
                    g.mesh.material.emissive.setHex(0x444444);
                } else {
                    g.mesh.material.emissive.setHex(0x000000);
                }
            });
            const names = ['Gear A', 'Gear B', 'Gear C', 'Gear D', 'Gear E'];
            const hudSel = document.getElementById('hud-selected');
            if (sel >= 0) {
                hudSel.textContent = names[sel];
                hudSel.style.color = '#' + gears[sel].color.toString(16).padStart(6, '0');
            } else {
                hudSel.textContent = 'None';
                hudSel.style.color = '#fff';
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const state = window.__3D_STATE__;

            if (!state.isPaused) {
                // Kinematics with friction simulation (reduces effective input speed)
                const effectiveInputSpeed = state.inputSpeed * (1 - state.friction);
                
                gears[0].omega = effectiveInputSpeed;
                gears[1].omega = -gears[0].omega * (gears[0].N / gears[1].N);
                gears[2].omega = gears[1].omega;
                gears[3].omega = -gears[2].omega * (gears[2].N / gears[3].N);
                gears[4].omega = -gears[3].omega * (gears[3].N / gears[4].N);

                gears.forEach(g => {
                    g.angle += g.omega * dt;
                    g.mesh.rotation.z = g.phase + g.angle;
                });
            }

            // Update Arrows
            gears.forEach((g, i) => {
                const arrow = omegaArrows[i];
                if (Math.abs(g.omega) > 0.01) {
                    arrow.visible = true;
                    const dir = g.omega > 0 ? 1 : -1;
                    arrow.setDirection(new THREE.Vector3(0, 0, dir));
                    arrow.setLength(Math.max(0.5, Math.abs(g.omega) * 0.4), 0.2, 0.15);
                } else {
                    arrow.visible = false;
                }
            });

            // Update State Object
            state.outputSpeed = Number(gears[4].omega.toFixed(2));
            const ratio = gears[0].omega !== 0 ? gears[4].omega / gears[0].omega : 0;
            state.gearRatio = Number(ratio.toFixed(4));
            state.gearAngles = gears.map(g => Number(g.angle.toFixed(3)));
            state.frameCount++;
            
            state.gearsValid = !isNaN(gears[0].angle) && !isNaN(gears[4].omega);
            
            // Verify meshing correctness (kinematic ratios match tooth ratios)
            if (Math.abs(gears[0].omega) > 0.01) {
                const rAB = Math.abs(gears[1].omega / gears[0].omega - (-12/24)) < 0.05;
                const rCD = Math.abs(gears[3].omega / gears[2].omega - (-16/32)) < 0.05;
                const rDE = Math.abs(gears[4].omega / gears[3].omega - (-32/8)) < 0.05;
                state.meshingCorrect = rAB && rCD && rDE;
            } else {
                state.meshingCorrect = true;
            }

            // Update HUD
            document.getElementById('hud-input').textContent = gears[0].omega.toFixed(2);
            document.getElementById('hud-output').textContent = gears[4].omega.toFixed(2);
            document.getElementById('hud-ratio').textContent = state.gearRatio.toFixed(3);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
