<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Gear Train Simulator</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #2a2a35; }
canvas { display: block; }
#hud {
    position: absolute; top: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #ddd; padding: 15px 20px;
    border-radius: 10px; font-size: 14px; line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 220px;
}
#hud .label { color: #888; }
#hud .value { color: #fff; font-weight: bold; }
#controls {
    position: absolute; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.75); color: #ddd; padding: 15px 20px;
    border-radius: 10px; font-size: 13px;
    border: 1px solid rgba(255,255,255,0.1);
}
#controls label { display: block; margin: 8px 0 3px; }
#controls input[type="range"] { width: 220px; }
.key-hint {
    position: absolute; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.75); color: #888; padding: 12px 16px;
    border-radius: 10px; font-size: 12px; line-height: 1.8;
    border: 1px solid rgba(255,255,255,0.1);
}
.key-hint kbd {
    background: #444; color: #fff; padding: 1px 6px; border-radius: 3px;
    font-family: monospace;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">Input Speed: </span><span class="value" id="hud-input">2.00</span> <span class="label">rad/s</span></div>
    <div><span class="label">Output Speed: </span><span class="value" id="hud-output">0.00</span> <span class="label">rad/s</span></div>
    <div><span class="label">Gear Ratio: </span><span class="value" id="hud-ratio">0.000</span></div>
    <div><span class="label">Total Teeth: </span><span class="value" id="hud-teeth">92</span></div>
    <div><span class="label">Selected: </span><span class="value" id="hud-selected">None</span></div>
    <div><span class="label">Status: </span><span class="value" id="hud-paused">Playing</span></div>
</div>

<div id="controls">
    <label for="slider-input-speed">Input Speed (rad/s):</label>
    <input type="range" id="slider-input-speed" min="0.5" max="10" step="0.5" value="2">
    <span id="speed-val">2.0</span>
    <label for="slider-friction">Friction Coefficient:</label>
    <input type="range" id="slider-friction" min="0" max="0.1" step="0.005" value="0.01">
    <span id="friction-val">0.010</span>
</div>

<div class="key-hint">
    <kbd>Space</kbd> Pause/Play<br>
    <kbd>R</kbd> Reset Angles<br>
    <kbd>1</kbd>-<kbd>5</kbd> Select Gear
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x2a2a35);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 15);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x445566, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 8);
dirLight.castShadow = true;
scene.add(dirLight);

// Base plate
const basePlate = new THREE.Mesh(
    new THREE.BoxGeometry(20, 0.2, 10),
    new THREE.MeshStandardMaterial({ color: 0x556677, metalness: 0.8, roughness: 0.3 })
);
basePlate.position.y = 0;
basePlate.receiveShadow = true;
scene.add(basePlate);

// Gear parameters
const gearModule = 0.3;
const gearDefs = [
    { name: 'A', teeth: 12, color: 0xff4444 },
    { name: 'B', teeth: 24, color: 0x44ff44 },
    { name: 'C', teeth: 16, color: 0x4488ff },
    { name: 'D', teeth: 32, color: 0xffaa44 },
    { name: 'E', teeth: 8,  color: 0xff44ff },
];

function getRadius(N) { return N * gearModule / 2; }

// Compute gear positions
const gearPositions = [];
const rA = getRadius(12);
const rB = getRadius(24);
const rC = getRadius(16);
const rD = getRadius(32);
const rE = getRadius(8);

// Gear A at (-4, 1.8, 0)
const posA = new THREE.Vector3(-4, 1.8, 0);
gearPositions.push(posA);

// Gear B meshes with A: center distance = rA + rB
const posB = new THREE.Vector3(posA.x + rA + rB, 1.8, 0);
gearPositions.push(posB);

// Gear C coaxial with B, offset in z
const posC = new THREE.Vector3(posB.x, 1.8, 0.7);
gearPositions.push(posC);

// Gear D meshes with C
const posD = new THREE.Vector3(posC.x + rC + rD, 1.8, 0.7);
gearPositions.push(posD);

// Gear E meshes with D
const posE = new THREE.Vector3(posD.x + rD + rE, 1.8, 0.7);
gearPositions.push(posE);

// Generate involute gear shape
function createGearShape(N, m) {
    const r = N * m / 2; // pitch radius
    const addendum = m;
    const dedendum = 1.25 * m;
    const ra = r + addendum; // outer radius
    const rd = r - dedendum; // root radius
    const toothThickness = Math.PI * m / 2;
    const angularPitch = (2 * Math.PI) / N;
    const toothAngle = toothThickness / r;
    const tipAngle = toothThickness * 0.6 / ra;

    const shape = new THREE.Shape();
    const points = [];

    for (let i = 0; i < N; i++) {
        const baseAngle = i * angularPitch;

        // Root start
        const a0 = baseAngle - angularPitch / 2;
        const a1 = baseAngle - toothAngle / 2 * 1.1;
        const a2 = baseAngle - tipAngle / 2;
        const a3 = baseAngle + tipAngle / 2;
        const a4 = baseAngle + toothAngle / 2 * 1.1;
        const a5 = baseAngle + angularPitch / 2;

        // Root arc from a0 to a1
        points.push({ x: rd * Math.cos(a0), y: rd * Math.sin(a0) });
        points.push({ x: rd * Math.cos(a1), y: rd * Math.sin(a1) });
        // Rise to tip
        points.push({ x: ra * Math.cos(a2), y: ra * Math.sin(a2) });
        // Tip
        points.push({ x: ra * Math.cos(a3), y: ra * Math.sin(a3) });
        // Fall to root
        points.push({ x: rd * Math.cos(a4), y: rd * Math.sin(a4) });
        // Root arc to next tooth
        points.push({ x: rd * Math.cos(a5), y: rd * Math.sin(a5) });
    }

    if (points.length > 0) {
        shape.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
            shape.lineTo(points[i].x, points[i].y);
        }
        shape.closePath();
    }

    return shape;
}

function createGearMesh(N, m, color, thickness = 0.5) {
    const shape = createGearShape(N, m);
    const extrudeSettings = {
        depth: thickness,
        bevelEnabled: false,
    };
    const geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
    geometry.center();

    const material = new THREE.MeshStandardMaterial({
        color: color,
        metalness: 0.7,
        roughness: 0.3,
    });

    const mesh = new THREE.Mesh(geometry, material);
    mesh.castShadow = true;

    // Add central axle
    const axleGeom = new THREE.CylinderGeometry(0.1, 0.1, thickness + 0.6, 16);
    const axleMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.9, roughness: 0.2 });
    const axle = new THREE.Mesh(axleGeom, axleMat);
    axle.rotation.x = Math.PI / 2;
    axle.position.z = 0.3;
    mesh.add(axle);

    // Hub
    const hubGeom = new THREE.CylinderGeometry(0.2, 0.2, thickness * 0.3, 16);
    const hubMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.9, roughness: 0.2 });
    const hub = new THREE.Mesh(hubGeom, hubMat);
    hub.rotation.x = Math.PI / 2;
    mesh.add(hub);

    return mesh;
}

// Create gears
const gearMeshes = [];
const gearGroups = [];
const gearThickness = 0.5;

for (let i = 0; i < gearDefs.length; i++) {
    const def = gearDefs[i];
    const group = new THREE.Group();
    const mesh = createGearMesh(def.teeth, gearModule, def.color, gearThickness);

    // Rotate gear so teeth face up (gear lies in XY plane, extruded along Z)
    // We want gears to rotate around Y axis
    mesh.rotation.x = Math.PI / 2;

    group.add(mesh);
    group.position.copy(gearPositions[i]);
    scene.add(group);
    gearMeshes.push(mesh);
    gearGroups.push(group);
}

// Axle posts (from base to gear center)
for (let i = 0; i < gearPositions.length; i++) {
    // Skip C since it's coaxial with B
    if (i === 2) continue;
    const pos = gearPositions[i];
    const height = pos.y;
    const postGeom = new THREE.CylinderGeometry(0.08, 0.08, height, 8);
    const postMat = new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.8, roughness: 0.3 });
    const post = new THREE.Mesh(postGeom, postMat);
    post.position.set(pos.x, height / 2, pos.z);
    scene.add(post);
}

// For coaxial B-C, draw a connecting axle
const coaxialAxle = new THREE.Mesh(
    new THREE.CylinderGeometry(0.09, 0.09, 0.9, 8),
    new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 0.9, roughness: 0.2 })
);
coaxialAxle.position.set(posB.x, posB.y, (posB.z + posC.z) / 2);
coaxialAxle.rotation.x = Math.PI / 2;
scene.add(coaxialAxle);

// Contact point spheres
const contactSpheres = [];
const contactMat = new THREE.MeshStandardMaterial({ color: 0xffff00, emissive: 0xffff00, emissiveIntensity: 0.5 });

// A-B contact
function meshingPoint(p1, r1, p2, r2) {
    const dx = p2.x - p1.x;
    const dz = p2.z - p1.z;
    const dist = Math.sqrt(dx * dx + dz * dz);
    const t = r1 / (r1 + r2);
    return new THREE.Vector3(
        p1.x + dx * t,
        p1.y,
        p1.z + dz * t
    );
}

const meshPairs = [
    { i: 0, j: 1 }, // A-B
    { i: 2, j: 3 }, // C-D
    { i: 3, j: 4 }, // D-E
];

for (const pair of meshPairs) {
    const p1 = gearPositions[pair.i];
    const p2 = gearPositions[pair.j];
    const r1 = getRadius(gearDefs[pair.i].teeth);
    const r2 = getRadius(gearDefs[pair.j].teeth);
    const cp = meshingPoint(p1, r1, p2, r2);

    const sphere = new THREE.Mesh(
        new THREE.SphereGeometry(0.08, 16, 16),
        contactMat.clone()
    );
    sphere.position.copy(cp);
    scene.add(sphere);
    contactSpheres.push(sphere);
}

// Angular velocity arrows
const arrowHelpers = [];
for (let i = 0; i < 5; i++) {
    const arrow = new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0),
        gearPositions[i].clone(),
        1,
        0x00ffff,
        0.15,
        0.1
    );
    scene.add(arrow);
    arrowHelpers.push(arrow);
}

// Torque flow arrows
const torqueArrows = [];
const flowPairs = [
    [0, 1], [1, 2], [2, 3], [3, 4]
];
for (const [from, to] of flowPairs) {
    const dir = new THREE.Vector3().subVectors(gearPositions[to], gearPositions[from]).normalize();
    const len = gearPositions[from].distanceTo(gearPositions[to]) * 0.6;
    const midPoint = new THREE.Vector3().lerpVectors(gearPositions[from], gearPositions[to], 0.2);
    midPoint.y += 1.2;
    const arrow = new THREE.ArrowHelper(dir, midPoint, len, 0xff8800, 0.12, 0.08);
    scene.add(arrow);
    torqueArrows.push(arrow);
}

// Glow rings for selection
const glowRings = [];
for (let i = 0; i < 5; i++) {
    const r = getRadius(gearDefs[i].teeth) + gearModule;
    const ringGeom = new THREE.TorusGeometry(r, 0.04, 8, 32);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
    const ring = new THREE.Mesh(ringGeom, ringMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.copy(gearPositions[i]);
    ring.position.y += 0.4;
    scene.add(ring);
    glowRings.push(ring);
}

// State
let inputSpeed = 2.0;
let friction = 0.01;
let isPaused = false;
let selectedGear = -1;
let frameCount = 0;
const gearAngles = [0, 0, 0, 0, 0];
const gearOmegas = [0, 0, 0, 0, 0];

// Compute angular velocities
function computeOmegas() {
    const N = gearDefs.map(g => g.teeth);
    gearOmegas[0] = inputSpeed;
    // A meshes with B: opposite direction
    gearOmegas[1] = -gearOmegas[0] * (N[0] / N[1]);
    // C coaxial with B
    gearOmegas[2] = gearOmegas[1];
    // C meshes with D
    gearOmegas[3] = -gearOmegas[2] * (N[2] / N[3]);
    // D meshes with E
    gearOmegas[4] = -gearOmegas[3] * (N[3] / N[4]);

    // Apply friction losses
    for (let i = 1; i < 5; i++) {
        const frictionFactor = Math.pow(1 - friction, i);
        gearOmegas[i] *= frictionFactor;
    }
}

// UI
const speedSlider = document.getElementById('slider-input-speed');
const frictionSlider = document.getElementById('slider-friction');
const speedVal = document.getElementById('speed-val');
const frictionVal = document.getElementById('friction-val');

speedSlider.addEventListener('input', () => {
    inputSpeed = parseFloat(speedSlider.value);
    speedVal.textContent = inputSpeed.toFixed(1);
});

frictionSlider.addEventListener('input', () => {
    friction = parseFloat(frictionSlider.value);
    frictionVal.textContent = friction.toFixed(3);
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    }
    if (e.code === 'KeyR') {
        for (let i = 0; i < 5; i++) gearAngles[i] = 0;
    }
    if (e.key >= '1' && e.key <= '5') {
        const idx = parseInt(e.key) - 1;
        selectedGear = selectedGear === idx ? -1 : idx;
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Phase offsets for proper meshing
// For gears to mesh correctly, we need to align teeth at the contact point
function computePhaseOffset(gearIdx) {
    const N = gearDefs[gearIdx].teeth;
    // Half tooth angular width
    return Math.PI / N;
}

// Animation
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const dt = clock.getDelta();
    frameCount++;

    if (!isPaused) {
        computeOmegas();
        for (let i = 0; i < 5; i++) {
            gearAngles[i] += gearOmegas[i] * dt;
        }
    }

    // Update gear rotations
    for (let i = 0; i < 5; i++) {
        gearGroups[i].rotation.y = gearAngles[i];
    }

    // Update arrow helpers
    for (let i = 0; i < 5; i++) {
        const omega = gearOmegas[i];
        const len = Math.min(Math.abs(omega) * 0.3, 3);
        const dir = omega >= 0 ? new THREE.Vector3(0, 1, 0) : new THREE.Vector3(0, -1, 0);
        arrowHelpers[i].setDirection(dir);
        arrowHelpers[i].setLength(Math.max(len, 0.2), 0.15, 0.1);
        arrowHelpers[i].setColor(omega >= 0 ? 0x00ffcc : 0xff6644);
    }

    // Animate contact spheres (pulsing)
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.005);
    for (const sphere of contactSpheres) {
        sphere.material.emissiveIntensity = 0.3 + pulse * 0.7;
        sphere.scale.setScalar(0.8 + pulse * 0.4);
    }

    // Glow selection
    for (let i = 0; i < 5; i++) {
        if (i === selectedGear) {
            glowRings[i].material.opacity = 0.5 + 0.3 * Math.sin(Date.now() * 0.008);
            gearMeshes[i].material.emissive = new THREE.Color(gearDefs[i].color);
            gearMeshes[i].material.emissiveIntensity = 0.3 + 0.2 * Math.sin(Date.now() * 0.006);
        } else {
            glowRings[i].material.opacity = 0;
            gearMeshes[i].material.emissive = new THREE.Color(0x000000);
            gearMeshes[i].material.emissiveIntensity = 0;
        }
    }

    // HUD
    const outputSpeed = gearOmegas[4];
    const gearRatio = inputSpeed !== 0 ? outputSpeed / inputSpeed : 0;
    const gearNames = ['A', 'B', 'C', 'D', 'E'];

    document.getElementById('hud-input').textContent = inputSpeed.toFixed(2);
    document.getElementById('hud-output').textContent = outputSpeed.toFixed(2);
    document.getElementById('hud-ratio').textContent = gearRatio.toFixed(3);
    document.getElementById('hud-teeth').textContent = '92';
    document.getElementById('hud-selected').textContent = selectedGear >= 0 ? `Gear ${gearNames[selectedGear]}` : 'None';
    document.getElementById('hud-paused').textContent = isPaused ? 'Paused' : 'Playing';

    // Check meshing correctness
    const N = gearDefs.map(g => g.teeth);
    let meshingCorrect = true;
    if (Math.abs(inputSpeed) > 0.01) {
        // Check A-B ratio
        const expectedAB = -N[0] / N[1];
        const actualAB = gearOmegas[1] / gearOmegas[0];
        if (Math.abs(gearOmegas[0]) > 0.001 && Math.abs(actualAB - expectedAB * Math.pow(1 - friction, 1)) / Math.abs(expectedAB) > 0.05) {
            meshingCorrect = false;
        }
    }

    // Validate no NaN
    let gearsValid = true;
    for (let i = 0; i < 5; i++) {
        if (isNaN(gearAngles[i]) || isNaN(gearOmegas[i])) {
            gearsValid = false;
            break;
        }
    }

    // Update state
    window.__3D_STATE__ = {
        inputSpeed: parseFloat(inputSpeed.toFixed(2)),
        outputSpeed: parseFloat(outputSpeed.toFixed(2)),
        gearRatio: parseFloat(gearRatio.toFixed(4)),
        totalTeeth: 92,
        gearAngles: gearAngles.map(a => parseFloat(a.toFixed(3))),
        friction: friction,
        isPaused: isPaused,
        selectedGear: selectedGear,
        frameCount: frameCount,
        gearsValid: gearsValid,
        meshingCorrect: meshingCorrect,
    };

    controls.update();
    renderer.render(scene, camera);
}

// Initialize state
window.__3D_STATE__ = {
    inputSpeed: 2.0,
    outputSpeed: 0,
    gearRatio: 0,
    totalTeeth: 92,
    gearAngles: [0, 0, 0, 0, 0],
    friction: 0.01,
    isPaused: false,
    selectedGear: -1,
    frameCount: 0,
    gearsValid: true,
    meshingCorrect: true,
};

computeOmegas();
animate();
</script>
</body>
</html>
