<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Spring Physics Simulation</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: monospace;
    background: #000;
  }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #fff;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.6;
    pointer-events: none;
    min-width: 300px;
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #0f0; }
  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
  }
  #controls button {
    padding: 10px 20px;
    font-family: monospace;
    font-size: 14px;
    border: 1px solid #555;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.2s;
  }
  #controls button:hover {
    background: rgba(50,50,50,0.9);
  }
  #keyHelp {
    position: absolute;
    top: 10px;
    right: 10px;
    color: #888;
    background: rgba(0,0,0,0.7);
    padding: 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.8;
  }
</style>
</head>
<body>

<div id="hud"></div>

<div id="keyHelp">
  <strong style="color:#fff;">Controls:</strong><br>
  Space: Impulse ↓ Mass B<br>
  W: Impulse ↑ Mass A<br>
  1: Slow Motion (0.25x)<br>
  2: Normal Speed (1.0x)<br>
  3: Fast Forward (2.0x)<br>
  P: Pause/Resume<br>
  R: Reset
</div>

<div id="controls">
  <button id="resetBtn">Reset (R)</button>
  <button id="impulseBtn">Impulse ↓ Mass B (Space)</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State management
window.__3D_STATE__ = {
  massA_y: 6,
  massB_y: 4,
  massA_vy: 0,
  massB_vy: 0,
  timeScale: 1.0,
  paused: false,
  totalEnergy: 0,
  simTime: 0,
  springForce1: 0,
  springForce2: 0,
  impulseCount: 0,
  resetCount: 0,
  antiqueCameraLoaded: false,
  initialized: false,
  antiqueCamera: null
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 20, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 4, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
directionalLight.position.set(5, 10, 5);
directionalLight.castShadow = true;
directionalLight.shadow.mapSize.width = 2048;
directionalLight.shadow.mapSize.height = 2048;
scene.add(directionalLight);

// Ground plane
const groundGeometry = new THREE.PlaneGeometry(50, 50);
const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeometry, groundMaterial);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(50, 50, 0x444444, 0x333333);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Load AntiqueCamera model
const gltfLoader = new GLTFLoader();
gltfLoader.load(
  'https://threejs.org/examples/models/gltf/AntiqueCamera.glb',
  (gltf) => {
    const model = gltf.scene;
    model.scale.set(0.005, 0.005, 0.005);
    model.position.set(5, 0, -3);
    model.castShadow = true;
    model.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(model);
    state.antiqueCamera = model;
    state.antiqueCameraLoaded = true;
  },
  undefined,
  (error) => {
    console.warn('Failed to load AntiqueCamera model:', error);
  }
);

// Ceiling bar
const ceilingBarGeometry = new THREE.BoxGeometry(2, 0.2, 0.2);
const ceilingBarMaterial = new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.5, roughness: 0.3 });
const ceilingBar = new THREE.Mesh(ceilingBarGeometry, ceilingBarMaterial);
ceilingBar.position.set(0, 8, 0);
ceilingBar.castShadow = true;
scene.add(ceilingBar);

// Mass A (red sphere)
const massAGeometry = new THREE.SphereGeometry(0.3, 32, 32);
const massAMaterial = new THREE.MeshStandardMaterial({ color: 0xff3333, metalness: 0.3, roughness: 0.4 });
const massAMesh = new THREE.Mesh(massAGeometry, massAMaterial);
massAMesh.castShadow = true;
scene.add(massAMesh);

// Mass B (blue sphere)
const massBGeometry = new THREE.SphereGeometry(0.3, 32, 32);
const massBMaterial = new THREE.MeshStandardMaterial({ color: 0x3333ff, metalness: 0.3, roughness: 0.4 });
const massBMesh = new THREE.Mesh(massBGeometry, massBMaterial);
massBMesh.castShadow = true;
scene.add(massBMesh);

// Spring visualization - zigzag lines
function createSpringLine(color) {
  const material = new THREE.LineBasicMaterial({ color: color, linewidth: 2 });
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(60 * 3); // 60 points for zigzag
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const line = new THREE.Line(geometry, material);
  scene.add(line);
  return line;
}

const spring1Line = createSpringLine(0xffffff);
const spring2Line = createSpringLine(0xffff00);

function updateSpringGeometry(line, startY, endY, numCoils = 20) {
  const positions = line.geometry.attributes.position;
  const totalPoints = 60;
  const amplitude = 0.15;
  
  for (let i = 0; i < totalPoints; i++) {
    const t = i / (totalPoints - 1);
    const y = startY + (endY - startY) * t;
    let x = 0;
    let z = 0;
    
    if (i > 0 && i < totalPoints - 1) {
      const angle = t * numCoils * Math.PI * 2;
      x = Math.sin(angle) * amplitude;
      z = Math.cos(angle) * amplitude * 0.3;
    }
    
    positions.setXYZ(i, x, y, z);
  }
  positions.needsUpdate = true;
}

// Physics parameters
const gravity = 9.81;
const k1 = 20;
const k2 = 15;
const restLength1 = 2.0;
const restLength2 = 2.0;
const damping = 0.3;
const massAWeight = 1.0;
const massBWeight = 1.5;

// Physics state
let massA_y = 6.0;
let massA_vy = 0.0;
let massB_y = 4.0;
let massB_vy = 0.0;
let timeScale = 1.0;
let previousTimeScale = 1.0;
let paused = false;
let simTime = 0;
let impulseCount = 0;
let resetCount = 0;

const ceilingY = 8.0;

function resetSystem() {
  massA_y = 6.0;
  massA_vy = 0.0;
  massB_y = 4.0;
  massB_vy = 0.0;
  simTime = 0;
  resetCount++;
  state.resetCount = resetCount;
}

function applyImpulseMassB() {
  massB_vy += -5.0;
  impulseCount++;
  state.impulseCount = impulseCount;
}

function applyImpulseMassA() {
  massA_vy += 5.0;
  impulseCount++;
  state.impulseCount = impulseCount;
}

function computeSpringForce(anchorY, massY, k, restLength) {
  const displacement = massY - anchorY;
  const currentLength = Math.abs(displacement);
  const direction = displacement >= 0 ? 1 : -1;
  const extension = currentLength - restLength;
  const force = -k * extension * direction;
  return { force, magnitude: Math.abs(k * extension) };
}

function updatePhysics() {
  if (paused) return;
  
  const dt = 0.016 * timeScale;
  if (dt === 0) return;
  
  // Spring 1: ceiling to Mass A
  const spring1Disp = massA_y - ceilingY;
  const spring1Len = Math.abs(spring1Disp);
  const spring1Dir = spring1Disp !== 0 ? spring1Disp / spring1Len : -1;
  const spring1Force = -k1 * (spring1Len - restLength1) * spring1Dir;
  const spring1Mag = Math.abs(k1 * (spring1Len - restLength1));
  
  // Spring 2: Mass A to Mass B
  const spring2Disp = massB_y - massA_y;
  const spring2Len = Math.abs(spring2Disp);
  const spring2Dir = spring2Disp !== 0 ? spring2Disp / spring2Len : -1;
  const spring2Extension = spring2Len - restLength2;
  const spring2ForceOnB = -k2 * spring2Extension * spring2Dir;
  const spring2ForceOnA = k2 * spring2Extension * spring2Dir; // reaction on A
  const spring2Mag = Math.abs(k2 * spring2Extension);
  
  // Forces on Mass A
  const forceA = -massAWeight * gravity + spring1Force + spring2ForceOnA - damping * massA_vy;
  
  // Forces on Mass B
  const forceB = -massBWeight * gravity + spring2ForceOnB - damping * massB_vy;
  
  // Semi-implicit Euler integration
  massA_vy += (forceA / massAWeight) * dt;
  massA_y += massA_vy * dt;
  
  massB_vy += (forceB / massBWeight) * dt;
  massB_y += massB_vy * dt;
  
  // Constraints
  if (massA_y < -2) { massA_y = -2; massA_vy = 0; }
  if (massA_y > 8) { massA_y = 8; massA_vy = 0; }
  if (massB_y < -2) { massB_y = -2; massB_vy = 0; }
  if (massB_y > 8) { massB_y = 8; massB_vy = 0; }
  
  simTime += dt;
  
  // Update state
  state.springForce1 = spring1Mag;
  state.springForce2 = spring2Mag;
}

function computeTotalEnergy() {
  // Kinetic energy
  const KE_A = 0.5 * massAWeight * massA_vy * massA_vy;
  const KE_B = 0.5 * massBWeight * massB_vy * massB_vy;
  
  // Gravitational potential energy (reference at y=0)
  const PE_grav_A = massAWeight * gravity * massA_y;
  const PE_grav_B = massBWeight * gravity * massB_y;
  
  // Spring elastic potential energy
  const spring1Len = Math.abs(massA_y - ceilingY);
  const spring1Extension = spring1Len - restLength1;
  const PE_spring1 = 0.5 * k1 * spring1Extension * spring1Extension;
  
  const spring2Len = Math.abs(massB_y - massA_y);
  const spring2Extension = spring2Len - restLength2;
  const PE_spring2 = 0.5 * k2 * spring2Extension * spring2Extension;
  
  return KE_A + KE_B + PE_grav_A + PE_grav_B + PE_spring1 + PE_spring2;
}

// HUD update
const hudElement = document.getElementById('hud');

function updateHUD() {
  const energy = computeTotalEnergy();
  state.totalEnergy = energy;
  
  hudElement.innerHTML = `
    <div><span class="label">Time Scale:</span> <span class="value">${timeScale.toFixed(2)}x</span></div>
    <div><span class="label">Mass A pos Y:</span> <span class="value" style="color:#ff6666">${massA_y.toFixed(2)}</span></div>
    <div><span class="label">Mass B pos Y:</span> <span class="value" style="color:#6666ff">${massB_y.toFixed(2)}</span></div>
    <div><span class="label">Mass A vel Y:</span> <span class="value" style="color:#ff6666">${massA_vy.toFixed(2)}</span></div>
    <div><span class="label">Mass B vel Y:</span> <span class="value" style="color:#6666ff">${massB_vy.toFixed(2)}</span></div>
    <div><span class="label">Total Energy:</span> <span class="value" style="color:#ffff00">${energy.toFixed(2)} J</span></div>
    <div><span class="label">Paused:</span> <span class="value" style="color:${paused ? '#ff4444' : '#44ff44'}">${paused}</span></div>
    <div><span class="label">Sim Time:</span> <span class="value">${simTime.toFixed(2)} s</span></div>
    <div><span class="label">Spring 1 Force:</span> <span class="value">${state.springForce1.toFixed(2)} N</span></div>
    <div><span class="label">Spring 2 Force:</span> <span class="value">${state.springForce2.toFixed(2)} N</span></div>
    <div><span class="label">Impulses:</span> <span class="value">${impulseCount}</span> | <span class="label">Resets:</span> <span class="value">${resetCount}</span></div>
  `;
}

// Keyboard input
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  
  if (key === '1') {
    timeScale = 0.25;
    previousTimeScale = timeScale;
    if (paused) previousTimeScale = 0.25;
  } else if (key === '2') {
    timeScale = 1.0;
    previousTimeScale = timeScale;
    if (paused) previousTimeScale = 1.0;
  } else if (key === '3') {
    timeScale = 2.0;
    previousTimeScale = timeScale;
    if (paused) previousTimeScale = 2.0;
  } else if (key === 'p') {
    if (paused) {
      paused = false;
      timeScale = previousTimeScale;
    } else {
      previousTimeScale = timeScale;
      paused = true;
      timeScale = 0;
    }
  } else if (key === 'r') {
    resetSystem();
  } else if (key === ' ' || e.code === 'Space') {
    e.preventDefault();
    applyImpulseMassB();
  } else if (key === 'w') {
    applyImpulseMassA();
  }
});

// Button handlers
document.getElementById('resetBtn').addEventListener('click', resetSystem);
document.getElementById('impulseBtn').addEventListener('click', applyImpulseMassB);

// Window resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Add some vertical reference poles
const poleGeometry = new THREE.CylinderGeometry(0.02, 0.02, 8.5, 8);
const poleMaterial = new THREE.MeshStandardMaterial({ color: 0x666666 });
const leftPole = new THREE.Mesh(poleGeometry, poleMaterial);
leftPole.position.set(-1.2, 4, 0);
scene.add(leftPole);
const rightPole = new THREE.Mesh(poleGeometry, poleMaterial);
rightPole.position.set(1.2, 4, 0);
scene.add(rightPole);

// Ceiling support
const ceilingSupportGeo = new THREE.BoxGeometry(3, 0.1, 0.5);
const ceilingSupportMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.6 });
const ceilingSupport = new THREE.Mesh(ceilingSupportGeo, ceilingSupportMat);
ceilingSupport.position.set(0, 8.15, 0);
scene.add(ceilingSupport);

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  
  // Update physics
  updatePhysics();
  
  // Update mesh positions
  massAMesh.position.set(0, massA_y, 0);
  massBMesh.position.set(0, massB_y, 0);
  
  // Update spring visualizations
  updateSpringGeometry(spring1Line, ceilingY, massA_y, 15);
  updateSpringGeometry(spring2Line, massA_y, massB_y, 15);
  
  // Update global state
  state.massA_y = massA_y;
  state.massB_y = massB_y;
  state.massA_vy = massA_vy;
  state.massB_vy = massB_vy;
  state.timeScale = timeScale;
  state.paused = paused;
  state.simTime = simTime;
  
  // Update HUD
  updateHUD();
  
  // Update controls
  controls.update();
  
  renderer.render(scene, camera);
}

state.initialized = true;
animate();

</script>
</body>
</html>
