<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Double Spring Physics Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
            line-height: 1.5;
            min-width: 250px;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 3px;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        .instructions {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #aaa;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            z-index: 100;
            line-height: 1.5;
            text-align: right;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud"></div>
    <div class="instructions">
        <b>Controls:</b><br>
        [1] Slow Motion (0.25x)<br>
        [2] Normal Speed (1.0x)<br>
        [3] Fast Forward (2.0x)<br>
        [P] Toggle Pause<br>
        [R] Reset System<br>
        [Space] Impulse Mass B (-5 m/s)<br>
        [W] Impulse Mass A (+5 m/s)
    </div>
    <div id="controls">
        <button id="resetBtn">Reset System (R)</button>
        <button id="impulseBtn">Impulse Mass B (Space)</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            massA_y: 6,
            massB_y: 4,
            massA_vy: 0,
            massB_vy: 0,
            timeScale: 1.0,
            paused: false,
            totalEnergy: 0,
            simTime: 0,
            springForce1: 0,
            springForce2: 0,
            impulseCount: 0,
            resetCount: 0,
            antiqueCameraLoaded: false,
            initialized: false,
            antiqueCamera: null
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Ground & Grid
        const groundGeom = new THREE.PlaneGeometry(50, 50);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
        const ground = new THREE.Mesh(groundGeom, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(50, 50);
        scene.add(gridHelper);

        // Load Antique Camera
        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/AntiqueCamera.glb', (gltf) => {
            const cameraModel = gltf.scene;
            cameraModel.scale.set(0.005, 0.005, 0.005);
            cameraModel.position.set(5, 0, -3);
            scene.add(cameraModel);
            state.antiqueCamera = cameraModel;
            state.antiqueCameraLoaded = true;
        });

        // --- Double Spring System Visuals ---
        const ceilingY = 8;
        
        // Ceiling Bar
        const ceilingGeom = new THREE.BoxGeometry(2, 0.2, 0.5);
        const ceilingMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const ceiling = new THREE.Mesh(ceilingGeom, ceilingMat);
        ceiling.position.y = ceilingY;
        scene.add(ceiling);

        // Masses
        const radius = 0.3;
        const massAGeom = new THREE.SphereGeometry(radius, 32, 32);
        const massAMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const massA = new THREE.Mesh(massAGeom, massAMat);
        scene.add(massA);

        const massBGeom = new THREE.SphereGeometry(radius, 32, 32);
        const massBMat = new THREE.MeshStandardMaterial({ color: 0x0000ff });
        const massB = new THREE.Mesh(massBGeom, massBMat);
        scene.add(massB);

        // Springs (Zigzag lines)
        const springSegments = 20;
        const springWidth = 0.2;

        function createSpringGeometry() {
            const geom = new THREE.BufferGeometry();
            const positions = new Float32Array((springSegments + 1) * 3);
            geom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            return geom;
        }

        const spring1Geom = createSpringGeometry();
        const spring1Mat = new THREE.LineBasicMaterial({ color: 0xffffff });
        const spring1 = new THREE.Line(spring1Geom, spring1Mat);
        scene.add(spring1);

        const spring2Geom = createSpringGeometry();
        const spring2Mat = new THREE.LineBasicMaterial({ color: 0xffff00 });
        const spring2 = new THREE.Line(spring2Geom, spring2Mat);
        scene.add(spring2);

        function updateSpringVisual(geom, yStart, yEnd) {
            const positions = geom.attributes.position.array;
            const dy = (yEnd - yStart) / springSegments;
            for (let i = 0; i <= springSegments; i++) {
                let x = (i % 2 === 0) ? springWidth : -springWidth;
                if (i === 0 || i === springSegments) x = 0;
                positions[i * 3] = x;
                positions[i * 3 + 1] = yStart + i * dy;
                positions[i * 3 + 2] = 0;
            }
            geom.attributes.position.needsUpdate = true;
        }

        // --- Physics Parameters ---
        const mA_mass = 1.0;
        const mB_mass = 1.5;
        const k1 = 20;
        const k2 = 15;
        const rest1 = 2.0;
        const rest2 = 2.0;
        const damp1 = 0.3;
        const damp2 = 0.3;
        const g = 9.81;

        let prevTimeScale = 1.0;

        // --- Interaction Functions ---
        function resetSystem() {
            state.massA_y = 6;
            state.massB_y = 4;
            state.massA_vy = 0;
            state.massB_vy = 0;
            state.resetCount++;
        }

        function impulseMassB() {
            state.massB_vy -= 5;
            state.impulseCount++;
        }

        function impulseMassA() {
            state.massA_vy += 5;
            state.impulseCount++;
        }

        // Event Listeners
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case '1': state.timeScale = 0.25; if(state.paused) state.paused = false; break;
                case '2': state.timeScale = 1.0; if(state.paused) state.paused = false; break;
                case '3': state.timeScale = 2.0; if(state.paused) state.paused = false; break;
                case 'p': 
                    if (state.paused) {
                        state.paused = false;
                        state.timeScale = prevTimeScale;
                    } else {
                        state.paused = true;
                        prevTimeScale = state.timeScale;
                        state.timeScale = 0;
                    }
                    break;
                case 'r': resetSystem(); break;
                case ' ': impulseMassB(); break;
                case 'w': impulseMassA(); break;
            }
        });

        document.getElementById('resetBtn').addEventListener('click', resetSystem);
        document.getElementById('impulseBtn').addEventListener('click', impulseMassB);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const hudElement = document.getElementById('hud');

        function animate() {
            requestAnimationFrame(animate);

            // Physics Integration (Semi-implicit Euler)
            const dt = 0.016 * state.timeScale;

            if (!state.paused && dt > 0) {
                // Current lengths
                const len1 = ceilingY - state.massA_y;
                const len2 = state.massA_y - state.massB_y;

                // Spring forces (magnitude and direction)
                // fs1 > 0 means spring 1 is stretched, pulling A up
                const fs1 = k1 * (len1 - rest1); 
                // fs2 > 0 means spring 2 is stretched, pulling B up and A down
                const fs2 = k2 * (len2 - rest2); 

                state.springForce1 = Math.abs(fs1);
                state.springForce2 = Math.abs(fs2);

                // Damping forces
                const fd1 = -damp1 * state.massA_vy;
                const fd2 = -damp2 * state.massB_vy;

                // Total forces
                const forceA = -mA_mass * g + fs1 - fs2 + fd1;
                const forceB = -mB_mass * g + fs2 + fd2;

                // Update velocities
                state.massA_vy += (forceA / mA_mass) * dt;
                state.massB_vy += (forceB / mB_mass) * dt;

                // Update positions
                state.massA_y += state.massA_vy * dt;
                state.massB_y += state.massB_vy * dt;

                // Constraints [-2, 8]
                if (state.massA_y > 8) { state.massA_y = 8; state.massA_vy = 0; }
                if (state.massA_y < -2) { state.massA_y = -2; state.massA_vy = 0; }
                if (state.massB_y > 8) { state.massB_y = 8; state.massB_vy = 0; }
                if (state.massB_y < -2) { state.massB_y = -2; state.massB_vy = 0; }

                state.simTime += dt;
            }

            // Calculate Energy
            const ke = 0.5 * mA_mass * state.massA_vy ** 2 + 0.5 * mB_mass * state.massB_vy ** 2;
            const pe_g = mA_mass * g * state.massA_y + mB_mass * g * state.massB_y;
            const pe_s = 0.5 * k1 * Math.pow((ceilingY - state.massA_y) - rest1, 2) + 
                         0.5 * k2 * Math.pow((state.massA_y - state.massB_y) - rest2, 2);
            state.totalEnergy = ke + pe_g + pe_s;

            // Update Visuals
            massA.position.y = state.massA_y;
            massB.position.y = state.massB_y;
            updateSpringVisual(spring1Geom, ceilingY, state.massA_y);
            updateSpringVisual(spring2Geom, state.massA_y, state.massB_y);

            // Update HUD
            hudElement.innerHTML = `
                Time Scale: ${state.timeScale.toFixed(2)}x<br>
                Paused: ${state.paused}<br>
                Sim Time: ${state.simTime.toFixed(2)} s<br>
                <br>
                Mass A Pos Y: ${state.massA_y.toFixed(2)} m<br>
                Mass B Pos Y: ${state.massB_y.toFixed(2)} m<br>
                Mass A Vel Y: ${state.massA_vy.toFixed(2)} m/s<br>
                Mass B Vel Y: ${state.massB_vy.toFixed(2)} m/s<br>
                <br>
                Total Energy: ${state.totalEnergy.toFixed(2)} J
            `;

            renderer.render(scene, camera);
        }

        state.initialized = true;
        animate();
    </script>
</body>
</html>
