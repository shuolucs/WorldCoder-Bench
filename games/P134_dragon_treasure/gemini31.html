<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Encounter RPG</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* UI Overlay */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .panel {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            pointer-events: auto;
            color: white;
            text-shadow: 1px 1px 2px black;
        }
        /* Top: Dragon HUD */
        #top-hud {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        .hp-container {
            width: 300px;
            text-align: center;
        }
        .hp-bar-bg {
            width: 100%;
            height: 20px;
            background: #333;
            border: 2px solid #222;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }
        .hp-bar-fill {
            height: 100%;
            width: 100%;
            transition: width 0.3s ease-out;
        }
        #dragonHP { background: linear-gradient(90deg, #8b0000, #ff0000); }
        #playerHP { background: linear-gradient(90deg, #006400, #00ff00); }
        
        /* Bottom: Player HUD & Controls */
        #bottom-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 20px;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        button {
            background: #4a3728;
            color: #ffd700;
            border: 2px solid #ffd700;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        button:hover:not(:disabled) {
            background: #ffd700;
            color: #4a3728;
        }
        button:disabled {
            background: #333;
            color: #777;
            border-color: #555;
            cursor: not-allowed;
        }
        
        /* Right: Battle Log */
        #battleLog-container {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 250px;
            height: 300px;
            display: flex;
            flex-direction: column;
        }
        #battleLog {
            flex-grow: 1;
            overflow-y: auto;
            font-size: 14px;
            display: flex;
            flex-direction: column-reverse; /* Latest at top visually if we prepend, but we append and scroll */
        }
        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #444; padding-bottom: 2px;}
        .log-player { color: #00ff00; }
        .log-dragon { color: #ff4444; }
        .log-system { color: #ffd700; }

        /* Effects */
        #vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(255, 0, 0, 0);
            pointer-events: none;
            transition: box-shadow 0.1s;
            z-index: 10;
        }
        .flash-red { box-shadow: inset 0 0 150px rgba(255, 0, 0, 0.8) !important; }
        
        #screen-darken {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0);
            pointer-events: none;
            transition: background 2s;
            z-index: 15;
        }
        .darkened { background: rgba(0,0,0,0.8) !important; pointer-events: auto !important; }

        .floating-text {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: floatUp 1s ease-out forwards;
            z-index: 20;
            text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(1.5); }
        }

        /* Game Over Screen */
        #game-over-screen {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 30;
            display: none;
            pointer-events: auto;
        }
        #game-over-screen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #000;
        }
        .victory-text { color: #ffd700; }
        .defeat-text { color: #ff0000; }

        /* Hidden state element */
        #battleState { display: none; }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="game-container"></div>
    <div id="vignette"></div>
    <div id="screen-darken"></div>
    
    <div id="ui-layer">
        <div id="top-hud">
            <div class="panel hp-container">
                <div>DRAGON HP: <span id="dragonHP-text">200</span>/200</div>
                <div class="hp-bar-bg"><div id="dragonHP" class="hp-bar-fill"></div></div>
            </div>
        </div>
        
        <div id="bottom-hud">
            <div class="panel hp-container">
                <div>PLAYER HP: <span id="playerHP-text">100</span>/100</div>
                <div class="hp-bar-bg"><div id="playerHP" class="hp-bar-fill"></div></div>
                <div class="controls">
                    <button id="attackBtn">ATTACK</button>
                    <button id="healBtn">HEAL (<span id="healUses">3</span>)</button>
                </div>
            </div>
        </div>

        <div id="battleLog-container" class="panel">
            <h3 style="margin:0 0 10px 0; border-bottom: 1px solid #777; padding-bottom: 5px;">BATTLE LOG</h3>
            <div id="battleLog"></div>
        </div>
    </div>

    <div id="game-over-screen">
        <h1 id="game-over-text"></h1>
        <button id="restartBtn">RESTART</button>
    </div>
    <div id="battleState">fighting</div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Global State ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            playerHP: 100,
            dragonHP: 200,
            healUsesLeft: 3,
            battleState: 'fighting', // fighting, victory, defeat
            lastDamageToPlayer: 0,
            lastDamageToDragon: 0,
            totalDamageDealt: 0,
            totalDamageTaken: 0,
            turnsPlayed: 0
        };

        const MAX_PLAYER_HP = 100;
        const MAX_DRAGON_HP = 200;

        // --- DOM Elements ---
        const ui = {
            playerHP: document.getElementById('playerHP'),
            playerHPText: document.getElementById('playerHP-text'),
            dragonHP: document.getElementById('dragonHP'),
            dragonHPText: document.getElementById('dragonHP-text'),
            healUses: document.getElementById('healUses'),
            attackBtn: document.getElementById('attackBtn'),
            healBtn: document.getElementById('healBtn'),
            restartBtn: document.getElementById('restartBtn'),
            battleLog: document.getElementById('battleLog'),
            vignette: document.getElementById('vignette'),
            screenDarken: document.getElementById('screen-darken'),
            gameOverScreen: document.getElementById('game-over-screen'),
            gameOverText: document.getElementById('game-over-text'),
            battleState: document.getElementById('battleState')
        };

        // --- Three.js Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a0a00);
        scene.fog = new THREE.FogExp2(0x1a0a00, 0.04);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.enableZoom = false;
        controls.minPolarAngle = Math.PI / 4;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minAzimuthAngle = -Math.PI / 4;
        controls.maxAzimuthAngle = Math.PI / 4;
        controls.target.set(0, 1, -3);
        controls.update();

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5); // Dim ambient
        scene.add(ambientLight);

        // Torch lights
        const createTorch = (x, z) => {
            const light = new THREE.PointLight(0xff8800, 1.5, 15);
            light.position.set(x, 3, z);
            light.castShadow = true;
            scene.add(light);
            return light;
        };
        createTorch(-4, -2);
        createTorch(4, -2);
        const chestLight = new THREE.PointLight(0xffd700, 0, 5); // Glows when open
        chestLight.position.set(0, 1, -5);
        scene.add(chestLight);

        // --- Environment ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ 
            color: 0x4a3728, 
            roughness: 0.9,
            bumpScale: 0.2
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Objects ---
        // Chest
        const chestGroup = new THREE.Group();
        chestGroup.position.set(0, 0, -5);
        scene.add(chestGroup);

        const chestMat = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.4, metalness: 0.8 });
        const chestBaseGeo = new THREE.BoxGeometry(2, 1, 1.5);
        const chestBase = new THREE.Mesh(chestBaseGeo, chestMat);
        chestBase.position.y = 0.5;
        chestBase.castShadow = true;
        chestBase.receiveShadow = true;
        chestGroup.add(chestBase);

        const chestLidGeo = new THREE.BoxGeometry(2, 0.5, 1.5);
        chestLidGeo.translate(0, 0.25, 0.75); // Pivot at back
        const chestLid = new THREE.Mesh(chestLidGeo, chestMat);
        chestLid.position.set(0, 1, -0.75);
        chestLid.castShadow = true;
        chestGroup.add(chestLid);

        // Coins scattered
        const coinGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.02, 8);
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.2 });
        for(let i=0; i<30; i++) {
            const coin = new THREE.Mesh(coinGeo, coinMat);
            const angle = Math.random() * Math.PI * 2;
            const radius = 1.5 + Math.random() * 2;
            coin.position.set(Math.cos(angle)*radius, 0.01, -5 + Math.sin(angle)*radius);
            coin.rotation.x = Math.random() > 0.5 ? 0 : Math.PI/2;
            coin.rotation.y = Math.random() * Math.PI;
            coin.castShadow = true;
            scene.add(coin);
        }

        // --- Particles ---
        // Chest Glow (inside)
        const glowGeo = new THREE.BufferGeometry();
        const glowCount = 50;
        const glowPos = new Float32Array(glowCount * 3);
        for(let i=0; i<glowCount*3; i++) glowPos[i] = (Math.random() - 0.5) * 1.5;
        glowGeo.setAttribute('position', new THREE.BufferAttribute(glowPos, 3));
        const glowMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.5, blending: THREE.AdditiveBlending });
        const chestGlow = new THREE.Points(glowGeo, glowMat);
        chestGlow.position.set(0, 0.8, -5);
        chestGlow.visible = false;
        scene.add(chestGlow);

        // Heal Particles
        const healGeo = new THREE.BufferGeometry();
        const healCount = 100;
        const healPos = new Float32Array(healCount * 3);
        const healVel = [];
        for(let i=0; i<healCount; i++) {
            healPos[i*3] = (Math.random() - 0.5) * 4;
            healPos[i*3+1] = Math.random() * -2; // Start below
            healPos[i*3+2] = 2 + (Math.random() - 0.5) * 2; // Near camera
            healVel.push(0.05 + Math.random() * 0.05);
        }
        healGeo.setAttribute('position', new THREE.BufferAttribute(healPos, 3));
        const healMat = new THREE.PointsMaterial({ color: 0x00ff00, size: 0.15, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending });
        const healParticles = new THREE.Points(healGeo, healMat);
        healParticles.visible = false;
        scene.add(healParticles);

        // Coin Fountain Particles
        const fountainGeo = new THREE.BufferGeometry();
        const fountainCount = 200;
        const fountainPos = new Float32Array(fountainCount * 3);
        const fountainVel = [];
        for(let i=0; i<fountainCount; i++) {
            fountainPos[i*3] = 0; fountainPos[i*3+1] = 1; fountainPos[i*3+2] = -5;
            fountainVel.push({
                x: (Math.random() - 0.5) * 0.2,
                y: 0.2 + Math.random() * 0.3,
                z: (Math.random() - 0.5) * 0.2
            });
        }
        fountainGeo.setAttribute('position', new THREE.BufferAttribute(fountainPos, 3));
        const fountainMat = new THREE.PointsMaterial({ color: 0xffd700, size: 0.15 });
        const fountainParticles = new THREE.Points(fountainGeo, fountainMat);
        fountainParticles.visible = false;
        scene.add(fountainParticles);

        // --- Model Loading ---
        let dragonModel, mixer;
        let idleAction, attackAction;
        let dragonMaterials = [];
        let originalEmissives = [];

        const loader = new GLTFLoader();
        loader.load(
            'assets/DragonAttenuation.glb',
            (gltf) => {
                dragonModel = gltf.scene;
                dragonModel.position.set(0, 0, -3);
                // Adjust scale if necessary, assuming 1 is okay, but let's make it imposing
                dragonModel.scale.set(1.5, 1.5, 1.5); 
                
                dragonModel.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                        // Clone material to flash independently
                        child.material = child.material.clone();
                        dragonMaterials.push(child.material);
                        originalEmissives.push(child.material.emissive ? child.material.emissive.clone() : new THREE.Color(0x000000));
                    }
                });

                scene.add(dragonModel);

                // Animations
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(dragonModel);
                    
                    // Try to find by name, otherwise use indices
                    const idleClip = gltf.animations.find(a => a.name.toLowerCase().includes('idle')) || gltf.animations[0];
                    const attackClip = gltf.animations.find(a => a.name.toLowerCase().includes('attack')) || gltf.animations[1] || gltf.animations[0];

                    if (idleClip) {
                        idleAction = mixer.clipAction(idleClip);
                        idleAction.play();
                    }
                    if (attackClip) {
                        attackAction = mixer.clipAction(attackClip);
                        attackAction.loop = THREE.LoopOnce;
                    }
                }

                window.__3D_STATE__.modelLoaded = true;
                log("A fearsome Dragon guards the treasure!", "system");
            },
            undefined,
            (error) => {
                console.error('Error loading dragon model:', error);
                // Fallback if model fails
                const boxGeo = new THREE.BoxGeometry(2, 3, 4);
                const boxMat = new THREE.MeshStandardMaterial({color: 0x8b0000});
                dragonModel = new THREE.Mesh(boxGeo, boxMat);
                dragonModel.position.set(0, 1.5, -3);
                dragonMaterials.push(boxMat);
                originalEmissives.push(new THREE.Color(0x000000));
                scene.add(dragonModel);
                window.__3D_STATE__.modelLoaded = true;
                log("A blocky Dragon appears! (Model load failed)", "system");
            }
        );

        // --- Game Logic & Effects ---
        const clock = new THREE.Clock();
        let cameraShakeTime = 0;
        let isHealing = false;
        let isFountainActive = false;
        let chestOpenAnim = 0;

        function log(msg, type = 'system') {
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.innerText = `> ${msg}`;
            ui.battleLog.prepend(entry); // Add to top
        }

        function updateUI() {
            const state = window.__3D_STATE__;
            ui.playerHPText.innerText = state.playerHP;
            ui.playerHP.style.width = `${(state.playerHP / MAX_PLAYER_HP) * 100}%`;
            
            ui.dragonHPText.innerText = state.dragonHP;
            ui.dragonHP.style.width = `${(state.dragonHP / MAX_DRAGON_HP) * 100}%`;
            
            ui.healUses.innerText = state.healUsesLeft;
            ui.battleState.innerText = state.battleState;

            if (state.healUsesLeft <= 0 || state.playerHP >= MAX_PLAYER_HP) {
                ui.healBtn.disabled = true;
            } else {
                ui.healBtn.disabled = false;
            }
        }

        function setButtonsEnabled(enabled) {
            ui.attackBtn.disabled = !enabled;
            if(enabled) updateUI(); // Re-evaluates heal button
            else ui.healBtn.disabled = true;
        }

        function showFloatingText(pos3D, text, color, isPlayer = false) {
            const div = document.createElement('div');
            div.className = 'floating-text';
            div.style.color = color;
            div.innerText = text;
            document.body.appendChild(div);

            if (isPlayer) {
                div.style.left = '50%';
                div.style.top = '70%';
            } else {
                const vector = pos3D.clone();
                vector.y += 2; // Offset above target
                vector.project(camera);
                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (vector.y * -.5 + .5) * window.innerHeight;
                div.style.left = `${x}px`;
                div.style.top = `${y}px`;
            }

            setTimeout(() => div.remove(), 1000);
        }

        function flashDragon() {
            dragonMaterials.forEach(mat => {
                if(mat.emissive) mat.emissive.setHex(0xff0000);
            });
            setTimeout(() => {
                dragonMaterials.forEach((mat, i) => {
                    if(mat.emissive) mat.emissive.copy(originalEmissives[i]);
                });
            }, 200);
        }

        function triggerCameraShake() {
            cameraShakeTime = 0.3;
        }

        function triggerVignette() {
            ui.vignette.classList.add('flash-red');
            setTimeout(() => ui.vignette.classList.remove('flash-red'), 200);
        }

        function playDragonAttackAnim() {
            if (mixer && attackAction) {
                attackAction.reset();
                attackAction.play();
                if(idleAction) idleAction.crossFadeTo(attackAction, 0.1, false);
                
                mixer.addEventListener('finished', function restoreIdle(e) {
                    if (e.action === attackAction) {
                        mixer.removeEventListener('finished', restoreIdle);
                        if(idleAction) attackAction.crossFadeTo(idleAction, 0.2, false);
                    }
                });
            } else if (dragonModel) {
                // Procedural lunge
                const origZ = dragonModel.position.z;
                dragonModel.position.z += 1;
                setTimeout(() => dragonModel.position.z = origZ, 300);
            }
        }

        function checkWinLoss() {
            const state = window.__3D_STATE__;
            if (state.dragonHP <= 0) {
                state.battleState = 'victory';
                setButtonsEnabled(false);
                log("Victory! The treasure is yours!", "system");
                
                // Victory Effects
                chestLight.intensity = 2;
                chestGlow.visible = true;
                isFountainActive = true;
                fountainParticles.visible = true;
                
                ui.gameOverText.innerText = "Victory! The treasure is yours!";
                ui.gameOverText.className = "victory-text";
                setTimeout(() => ui.gameOverScreen.style.display = 'block', 1500);
                return true;
            }
            if (state.playerHP <= 0) {
                state.battleState = 'defeat';
                setButtonsEnabled(false);
                log("You were defeated by the Dragon...", "system");
                
                ui.screenDarken.classList.add('darkened');
                ui.gameOverText.innerText = "You were defeated...";
                ui.gameOverText.className = "defeat-text";
                setTimeout(() => ui.gameOverScreen.style.display = 'block', 2000);
                return true;
            }
            return false;
        }

        function dragonTurn() {
            if (window.__3D_STATE__.battleState !== 'fighting') return;
            
            playDragonAttackAnim();
            
            // Delay damage to sync with animation roughly
            setTimeout(() => {
                const dmg = Math.floor(Math.random() * 11) + 15; // 15-25
                const state = window.__3D_STATE__;
                state.playerHP = Math.max(0, state.playerHP - dmg);
                state.lastDamageToPlayer = dmg;
                state.totalDamageTaken += dmg;
                
                log(`Dragon attacks for ${dmg} damage!`, "dragon");
                showFloatingText(new THREE.Vector3(), `-${dmg}`, '#ff0000', true);
                triggerVignette();
                triggerCameraShake();
                updateUI();
                
                if (!checkWinLoss()) {
                    setButtonsEnabled(true);
                }
            }, 500);
        }

        // --- Event Listeners ---
        ui.attackBtn.addEventListener('click', () => {
            if (window.__3D_STATE__.battleState !== 'fighting') return;
            setButtonsEnabled(false);
            
            const dmg = Math.floor(Math.random() * 11) + 10; // 10-20
            const state = window.__3D_STATE__;
            state.dragonHP = Math.max(0, state.dragonHP - dmg);
            state.lastDamageToDragon = dmg;
            state.totalDamageDealt += dmg;
            state.turnsPlayed++;
            
            log(`You attack for ${dmg} damage!`, "player");
            showFloatingText(dragonModel ? dragonModel.position : new THREE.Vector3(0,2,-3), `-${dmg}`, '#ffffff');
            flashDragon();
            triggerCameraShake();
            updateUI();

            if (!checkWinLoss()) {
                setTimeout(dragonTurn, 1000);
            }
        });

        ui.healBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            if (state.battleState !== 'fighting' || state.healUsesLeft <= 0) return;
            setButtonsEnabled(false);
            
            const healAmount = 20;
            const actualHeal = Math.min(healAmount, MAX_PLAYER_HP - state.playerHP);
            state.playerHP += actualHeal;
            state.healUsesLeft--;
            state.turnsPlayed++;
            
            log(`You heal for ${actualHeal} HP.`, "player");
            showFloatingText(new THREE.Vector3(), `+${actualHeal}`, '#00ff00', true);
            
            // Heal VFX
            isHealing = true;
            healParticles.visible = true;
            const positions = healParticles.geometry.attributes.position.array;
            for(let i=0; i<healCount; i++) {
                positions[i*3+1] = Math.random() * -2; // Reset to bottom
            }
            healParticles.geometry.attributes.position.needsUpdate = true;
            setTimeout(() => { isHealing = false; healParticles.visible = false; }, 1000);

            updateUI();

            if (!checkWinLoss()) {
                setTimeout(dragonTurn, 1000);
            }
        });

        ui.restartBtn.addEventListener('click', () => {
            const state = window.__3D_STATE__;
            state.playerHP = MAX_PLAYER_HP;
            state.dragonHP = MAX_DRAGON_HP;
            state.healUsesLeft = 3;
            state.battleState = 'fighting';
            state.turnsPlayed = 0;
            
            ui.battleLog.innerHTML = '';
            log("Battle restarted!", "system");
            
            ui.gameOverScreen.style.display = 'none';
            ui.screenDarken.classList.remove('darkened');
            
            chestLid.rotation.x = 0;
            chestLight.intensity = 0;
            chestGlow.visible = false;
            isFountainActive = false;
            fountainParticles.visible = false;
            chestOpenAnim = 0;
            
            if(mixer && idleAction) {
                mixer.stopAllAction();
                idleAction.play();
            }
            
            updateUI();
            setButtonsEnabled(true);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        const baseCameraPos = camera.position.clone();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            if (mixer) mixer.update(delta);
            controls.update();

            // Camera Shake
            if (cameraShakeTime > 0) {
                cameraShakeTime -= delta;
                camera.position.x = baseCameraPos.x + (Math.random() - 0.5) * 0.2;
                camera.position.y = baseCameraPos.y + (Math.random() - 0.5) * 0.2;
            } else {
                camera.position.lerp(baseCameraPos, 0.1);
            }

            // Procedural Idle (if no animation loaded)
            if (window.__3D_STATE__.modelLoaded && !mixer && dragonModel && window.__3D_STATE__.battleState === 'fighting') {
                dragonModel.position.y = Math.sin(clock.elapsedTime * 2) * 0.1;
            }

            // Heal Particles Animation
            if (isHealing) {
                const positions = healParticles.geometry.attributes.position.array;
                for(let i=0; i<healCount; i++) {
                    positions[i*3+1] += healVel[i];
                    if(positions[i*3+1] > 2) positions[i*3+1] = -2;
                }
                healParticles.geometry.attributes.position.needsUpdate = true;
            }

            // Victory Animations
            if (window.__3D_STATE__.battleState === 'victory') {
                if (chestOpenAnim < Math.PI / 2) {
                    chestOpenAnim += delta * 2;
                    chestLid.rotation.x = -Math.min(chestOpenAnim, Math.PI / 2);
                }
                
                if (chestGlow.visible) {
                    chestGlow.material.opacity = 0.5 + Math.sin(clock.elapsedTime * 5) * 0.3;
                }

                if (isFountainActive) {
                    const positions = fountainParticles.geometry.attributes.position.array;
                    for(let i=0; i<fountainCount; i++) {
                        positions[i*3] += fountainVel[i].x;
                        positions[i*3+1] += fountainVel[i].y;
                        positions[i*3+2] += fountainVel[i].z;
                        fountainVel[i].y -= delta * 0.8; // Gravity
                        
                        // Reset if falls below ground
                        if (positions[i*3+1] < 0) {
                            positions[i*3] = 0;
                            positions[i*3+1] = 1;
                            positions[i*3+2] = -5;
                            fountainVel[i].y = 0.2 + Math.random() * 0.3;
                        }
                    }
                    fountainParticles.geometry.attributes.position.needsUpdate = true;
                }
            }

            renderer.render(scene, camera);
        }

        // Init
        updateUI();
        animate();

    </script>
</body>
</html>
