<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RPG 遭遇战 - 巨龙守护宝藏</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; color: #fff; }
canvas { display: block; }

#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
}
#ui-overlay > * { pointer-events: auto; }

/* HP Bars */
#hp-container {
  position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 40px; align-items: flex-start;
}
.hp-box {
  background: rgba(0,0,0,0.7); border: 1px solid #555; border-radius: 10px;
  padding: 12px 20px; min-width: 220px; text-align: center;
}
.hp-box h3 { font-size: 14px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 2px; }
.hp-bar-outer {
  width: 100%; height: 20px; background: #333; border-radius: 10px; overflow: hidden;
  border: 1px solid #555; position: relative;
}
.hp-bar-inner {
  height: 100%; border-radius: 10px; transition: width 0.4s ease;
  position: relative;
}
.hp-bar-inner::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
  border-radius: 10px 10px 0 0;
}
.hp-text { font-size: 12px; margin-top: 4px; opacity: 0.8; }
#playerHPBar { background: linear-gradient(90deg, #2ecc71, #27ae60); }
#dragonHPBar { background: linear-gradient(90deg, #e74c3c, #c0392b); }

/* Action Buttons */
#action-panel {
  position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 15px; align-items: center;
}
.action-btn {
  padding: 14px 30px; border: 2px solid; border-radius: 8px;
  font-size: 16px; font-weight: bold; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
  transition: all 0.2s; position: relative; overflow: hidden;
  font-family: inherit;
}
.action-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.action-btn:active:not(:disabled) { transform: translateY(0); }
.action-btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
#attackBtn {
  background: linear-gradient(135deg, #e74c3c, #c0392b); border-color: #e74c3c; color: #fff;
}
#healBtn {
  background: linear-gradient(135deg, #2ecc71, #27ae60); border-color: #2ecc71; color: #fff;
}
#heal-info { font-size: 11px; color: #aaa; }

/* Battle Log */
#log-panel {
  position: absolute; top: 100px; right: 20px; width: 280px; max-height: 400px;
  background: rgba(0,0,0,0.75); border: 1px solid #444; border-radius: 10px;
  overflow: hidden; display: flex; flex-direction: column;
}
#log-header {
  padding: 10px 15px; background: rgba(255,255,255,0.05);
  border-bottom: 1px solid #444; font-size: 13px; font-weight: bold;
  text-transform: uppercase; letter-spacing: 1px; color: #aaa;
}
#battleLog {
  flex: 1; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.6;
  scrollbar-width: thin; scrollbar-color: #555 transparent;
}
#battleLog::-webkit-scrollbar { width: 4px; }
#battleLog::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
.log-entry { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); animation: logFadeIn 0.3s ease; }
.log-attack { color: #e74c3c; }
.log-player-attack { color: #f39c12; }
.log-heal { color: #2ecc71; }
.log-info { color: #95a5a6; }
@keyframes logFadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

/* Battle State */
#battleState {
  position: absolute; top: 20px; right: 20px; font-size: 11px;
  background: rgba(0,0,0,0.5); padding: 4px 10px; border-radius: 4px; color: #888;
}

/* Vignette */
#vignette {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
  box-shadow: inset 0 0 150px 60px rgba(255,0,0,0.6);
}

/* Result Screen */
#result-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; justify-content: center; align-items: center;
  flex-direction: column; z-index: 100;
}
#result-screen.show { display: flex; }
#result-bg {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  transition: background 1s;
}
#result-content {
  position: relative; z-index: 1; text-align: center;
  animation: resultAppear 0.8s ease;
}
@keyframes resultAppear { from { opacity: 0; transform: scale(0.8) translateY(30px); } to { opacity: 1; transform: scale(1) translateY(0); } }
#result-title { font-size: 42px; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 30px currentColor; }
#result-subtitle { font-size: 18px; opacity: 0.8; margin-bottom: 30px; }
#restartBtn {
  padding: 14px 40px; background: linear-gradient(135deg, #8e44ad, #9b59b6);
  border: 2px solid #9b59b6; border-radius: 8px; color: #fff;
  font-size: 16px; font-weight: bold; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px; font-family: inherit;
  transition: all 0.2s;
}
#restartBtn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px rgba(155,89,182,0.5); }

/* Damage Numbers */
.damage-number {
  position: absolute; font-size: 28px; font-weight: bold;
  text-shadow: 0 0 10px currentColor, 2px 2px 4px rgba(0,0,0,0.8);
  pointer-events: none; z-index: 50; animation: floatUp 1.2s ease-out forwards;
  white-space: nowrap;
}
.damage-number.crit { font-size: 36px; }
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1.2); }
  20% { transform: translateY(-20px) scale(1); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.8); }
}
.heal-number { color: #2ecc71 !important; }

/* Darkness overlay for defeat */
#darkness-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; opacity: 0; pointer-events: none; transition: opacity 2s;
}
</style>
</head>
<body>

<div id="ui-overlay">
  <div id="hp-container">
    <div class="hp-box">
      <h3>⚔️ 勇者</h3>
      <div class="hp-bar-outer">
        <div class="hp-bar-inner" id="playerHPBar" style="width:100%"></div>
      </div>
      <div class="hp-text" id="playerHP">HP: 100 / 100</div>
    </div>
    <div class="hp-box">
      <h3>🐉 巨龙</h3>
      <div class="hp-bar-outer">
        <div class="hp-bar-inner" id="dragonHPBar" style="width:100%"></div>
      </div>
      <div class="hp-text" id="dragonHP">HP: 200 / 200</div>
    </div>
  </div>

  <div id="action-panel">
    <button class="action-btn" id="attackBtn">⚔️ 攻击</button>
    <button class="action-btn" id="healBtn">💚 治疗</button>
    <span id="heal-info" id="healUses">剩余: 3次</span>
  </div>

  <div id="log-panel">
    <div id="log-header">📜 战斗日志</div>
    <div id="battleLog"></div>
  </div>

  <div id="battleState">fighting</div>
  <div id="vignette"></div>
  <div id="darkness-overlay"></div>

  <div id="result-screen">
    <div id="result-bg"></div>
    <div id="result-content">
      <div id="result-title"></div>
      <div id="result-subtitle"></div>
      <button id="restartBtn">🔄 重新开始</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ STATE ============
window.__3D_STATE__ = {
  modelLoaded: false,
  playerHP: 100,
  dragonHP: 200,
  healUsesLeft: 3,
  battleState: 'fighting',
  lastDamageToPlayer: 0,
  lastDamageToDragon: 0,
  totalDamageDealt: 0,
  totalDamageTaken: 0,
  turnsPlayed: 0
};

const state = window.__3D_STATE__;
let isPlayerTurn = true;
let isBattleActive = true;

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a0a00);
scene.fog = new THREE.FogExp2(0x1a0a00, 0.06);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.8;
document.body.prepend(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, -2);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minPolarAngle = Math.PI * 0.15;
controls.maxPolarAngle = Math.PI * 0.55;
controls.minAzimuthAngle = -Math.PI * 0.4;
controls.maxAzimuthAngle = Math.PI * 0.4;
controls.minDistance = 6;
controls.maxDistance = 18;
controls.update();

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x331100, 0.4);
scene.add(ambientLight);

// Fire torches
const torchPositions = [
  new THREE.Vector3(-5, 3, -2),
  new THREE.Vector3(5, 3, -2),
  new THREE.Vector3(-3, 3, 2),
  new THREE.Vector3(3, 3, 2),
];
const torchLights = [];
torchPositions.forEach(pos => {
  const light = new THREE.PointLight(0xff6600, 2, 15, 1.5);
  light.position.copy(pos);
  light.castShadow = true;
  light.shadow.mapSize.set(512, 512);
  scene.add(light);
  torchLights.push(light);

  // Torch visual
  const torchGeo = new THREE.CylinderGeometry(0.08, 0.1, 1.5, 8);
  const torchMat = new THREE.MeshStandardMaterial({ color: 0x4a3020, roughness: 0.9 });
  const torch = new THREE.Mesh(torchGeo, torchMat);
  torch.position.copy(pos);
  torch.position.y -= 0.8;
  scene.add(torch);

  // Flame sprite
  const flameMat = new THREE.SpriteMaterial({
    color: 0xff8800,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending
  });
  const flame = new THREE.Sprite(flameMat);
  flame.position.copy(pos);
  flame.position.y += 0.2;
  flame.scale.set(0.6, 0.8, 1);
  scene.add(flame);
});

// Main spotlight on dragon
const spotLight = new THREE.SpotLight(0xff8844, 3, 20, Math.PI * 0.3, 0.5, 1);
spotLight.position.set(0, 8, 2);
spotLight.target.position.set(0, 0, -3);
spotLight.castShadow = true;
spotLight.shadow.mapSize.set(1024, 1024);
scene.add(spotLight);
scene.add(spotLight.target);

// ============ GROUND ============
const groundGeo = new THREE.PlaneGeometry(30, 30, 20, 20);
// Displace vertices for rocky feel
const posAttr = groundGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i);
  const y = posAttr.getY(i);
  posAttr.setZ(i, (Math.sin(x * 2) * Math.cos(y * 2) * 0.15) + (Math.random() * 0.05));
}
groundGeo.computeVertexNormals();
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x4a3728,
  roughness: 0.95,
  metalness: 0.05,
  flatShading: true
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Cave walls (curved back wall)
const wallGeo = new THREE.SphereGeometry(15, 32, 16, 0, Math.PI * 2, 0, Math.PI * 0.5);
const wallMat = new THREE.MeshStandardMaterial({
  color: 0x2a1a10,
  roughness: 1,
  metalness: 0,
  side: THREE.BackSide,
  flatShading: true
});
const wall = new THREE.Mesh(wallGeo, wallMat);
wall.position.y = -0.5;
scene.add(wall);

// ============ TREASURE CHEST ============
const chestGroup = new THREE.Group();
chestGroup.position.set(0, 0, -6);

// Chest body
const chestBodyGeo = new THREE.BoxGeometry(1.5, 0.8, 1);
const chestMat = new THREE.MeshStandardMaterial({
  color: 0x8B4513,
  roughness: 0.6,
  metalness: 0.2
});
const chestBody = new THREE.Mesh(chestBodyGeo, chestMat);
chestBody.position.y = 0.4;
chestBody.castShadow = true;
chestGroup.add(chestBody);

// Gold trim
const trimGeo = new THREE.BoxGeometry(1.55, 0.05, 1.05);
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xffd700,
  roughness: 0.3,
  metalness: 0.8,
  emissive: 0xffd700,
  emissiveIntensity: 0.1
});
const trim1 = new THREE.Mesh(trimGeo, goldMat);
trim1.position.y = 0.8;
chestGroup.add(trim1);

// Chest lid
const lidGroup = new THREE.Group();
lidGroup.position.set(0, 0.82, -0.5);
const lidGeo = new THREE.BoxGeometry(1.5, 0.3, 1);
const lid = new THREE.Mesh(lidGeo, chestMat.clone());
lid.position.set(0, 0.15, 0.5);
lid.castShadow = true;
lidGroup.add(lid);

const lidTrim = new THREE.Mesh(trimGeo.clone(), goldMat.clone());
lidTrim.position.set(0, 0, 0.5);
lidGroup.add(lidTrim);

// Rounded top for lid
const lidTopGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 16, 1, false, 0, Math.PI);
const lidTop = new THREE.Mesh(lidTopGeo, chestMat.clone());
lidTop.rotation.z = Math.PI / 2;
lidTop.rotation.y = Math.PI / 2;
lidTop.position.set(0, 0.3, 0.5);
lidGroup.add(lidTop);

chestGroup.add(lidGroup);

// Lock
const lockGeo = new THREE.BoxGeometry(0.2, 0.25, 0.1);
const lockMesh = new THREE.Mesh(lockGeo, goldMat.clone());
lockMesh.position.set(0, 0.7, 0.52);
chestGroup.add(lockMesh);

scene.add(chestGroup);

// Chest glow particles
const chestGlowCount = 50;
const chestGlowGeo = new THREE.BufferGeometry();
const chestGlowPositions = new Float32Array(chestGlowCount * 3);
const chestGlowVelocities = [];
for (let i = 0; i < chestGlowCount; i++) {
  chestGlowPositions[i * 3] = (Math.random() - 0.5) * 1.2;
  chestGlowPositions[i * 3 + 1] = Math.random() * 0.6 + 0.2;
  chestGlowPositions[i * 3 + 2] = (Math.random() - 0.5) * 0.8;
  chestGlowVelocities.push({
    x: (Math.random() - 0.5) * 0.005,
    y: Math.random() * 0.01 + 0.005,
    z: (Math.random() - 0.5) * 0.005
  });
}
chestGlowGeo.setAttribute('position', new THREE.BufferAttribute(chestGlowPositions, 3));
const chestGlowMat = new THREE.PointsMaterial({
  color: 0xffd700,
  size: 0.08,
  transparent: true,
  opacity: 0.6,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const chestGlowParticles = new THREE.Points(chestGlowGeo, chestGlowMat);
chestGlowParticles.position.copy(chestGroup.position);
chestGlowParticles.position.y += 0.5;
scene.add(chestGlowParticles);

// Chest light
const chestLight = new THREE.PointLight(0xffd700, 1, 5);
chestLight.position.set(0, 1.5, -6);
scene.add(chestLight);

// ============ GOLD COINS ============
const coinGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.03, 16);
const coinMat = new THREE.MeshStandardMaterial({
  color: 0xffd700,
  roughness: 0.3,
  metalness: 0.9,
  emissive: 0xffd700,
  emissiveIntensity: 0.05
});
const coins = [];
for (let i = 0; i < 25; i++) {
  const coin = new THREE.Mesh(coinGeo, coinMat);
  const angle = Math.random() * Math.PI * 2;
  const dist = 1 + Math.random() * 4;
  coin.position.set(
    Math.cos(angle) * dist,
    0.015 + Math.random() * 0.02,
    -3 + Math.sin(angle) * dist * 0.6
  );
  coin.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.3;
  coin.rotation.z = Math.random() * Math.PI;
  coin.castShadow = true;
  scene.add(coin);
  coins.push(coin);
}

// ============ DRAGON MODEL ============
let dragonModel = null;
let dragonMixer = null;
let idleAction = null;
let attackAction = null;
let dragonMaterials = [];

const loader = new GLTFLoader();
loader.load('assets/DragonAttenuation.glb', (gltf) => {
  dragonModel = gltf.scene;
  dragonModel.position.set(0, 0, -3);
  dragonModel.scale.set(2, 2, 2);

  dragonModel.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      if (child.material) {
        const mats = Array.isArray(child.material) ? child.material : [child.material];
        mats.forEach(m => {
          if (!dragonMaterials.includes(m)) dragonMaterials.push(m);
        });
      }
    }
  });

  scene.add(dragonModel);

  // Animations
  if (gltf.animations && gltf.animations.length > 0) {
    dragonMixer = new THREE.AnimationMixer(dragonModel);
    gltf.animations.forEach(clip => {
      const name = clip.name.toLowerCase();
      if (name.includes('idle') || name.includes('breath')) {
        idleAction = dragonMixer.clipAction(clip);
      } else if (name.includes('attack') || name.includes('bite') || name.includes('fire')) {
        attackAction = dragonMixer.clipAction(clip);
      }
    });
    // If no specific idle found, use first animation
    if (!idleAction && gltf.animations.length > 0) {
      idleAction = dragonMixer.clipAction(gltf.animations[0]);
    }
    if (idleAction) {
      idleAction.setLoop(THREE.LoopRepeat);
      idleAction.play();
    }
  }

  state.modelLoaded = true;
  addLog('巨龙从沉睡中苏醒，守护着身后的宝藏...', 'info');
}, undefined, (error) => {
  console.error('Model load error:', error);
  // Create placeholder dragon
  createPlaceholderDragon();
  state.modelLoaded = true;
});

function createPlaceholderDragon() {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.SphereGeometry(1.2, 16, 12);
  bodyGeo.scale(1, 0.7, 1.3);
  const dragonMat = new THREE.MeshStandardMaterial({
    color: 0x2d5a27,
    roughness: 0.6,
    metalness: 0.3,
    emissive: 0x000000
  });
  dragonMaterials.push(dragonMat);
  const body = new THREE.Mesh(bodyGeo, dragonMat);
  body.position.y = 1.5;
  body.castShadow = true;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.6, 12, 10);
  headGeo.scale(0.8, 0.7, 1.2);
  const head = new THREE.Mesh(headGeo, dragonMat);
  head.position.set(0, 2.5, 0.8);
  head.castShadow = true;
  group.add(head);

  // Snout
  const snoutGeo = new THREE.ConeGeometry(0.3, 0.6, 8);
  const snout = new THREE.Mesh(snoutGeo, dragonMat);
  snout.rotation.x = Math.PI / 2;
  snout.position.set(0, 2.3, 1.5);
  group.add(snout);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 2 });
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.3, 2.7, 1.2);
  group.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(0.3, 2.7, 1.2);
  group.add(eyeR);

  // Wings
  const wingGeo = new THREE.PlaneGeometry(2, 1.5, 4, 3);
  const wingMat = new THREE.MeshStandardMaterial({
    color: 0x1a4a15,
    roughness: 0.7,
    side: THREE.DoubleSide
  });
  const wingL = new THREE.Mesh(wingGeo, wingMat);
  wingL.position.set(-1.8, 2, 0);
  wingL.rotation.y = -0.5;
  wingL.rotation.z = 0.3;
  group.add(wingL);
  const wingR = new THREE.Mesh(wingGeo, wingMat);
  wingR.position.set(1.8, 2, 0);
  wingR.rotation.y = 0.5;
  wingR.rotation.z = -0.3;
  group.add(wingR);

  // Tail
  const tailGeo = new THREE.ConeGeometry(0.3, 2, 8);
  const tail = new THREE.Mesh(tailGeo, dragonMat);
  tail.rotation.x = -Math.PI / 3;
  tail.position.set(0, 1, -1.5);
  group.add(tail);

  // Horns
  const hornGeo = new THREE.ConeGeometry(0.08, 0.5, 6);
  const hornMat = new THREE.MeshStandardMaterial({ color: 0x888866, roughness: 0.5, metalness: 0.4 });
  const hornL = new THREE.Mesh(hornGeo, hornMat);
  hornL.position.set(-0.25, 3, 0.6);
  hornL.rotation.z = 0.3;
  group.add(hornL);
  const hornR = new THREE.Mesh(hornGeo, hornMat);
  hornR.position.set(0.25, 3, 0.6);
  hornR.rotation.z = -0.3;
  group.add(hornR);

  group.position.set(0, 0, -3);
  scene.add(group);
  dragonModel = group;
}

// ============ PARTICLE SYSTEMS ============
// Heal particles
let healParticles = null;
let healParticleData = [];

function createHealParticles() {
  const count = 60;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  healParticleData = [];

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * 1.5;
    positions[i * 3] = Math.cos(angle) * radius;
    positions[i * 3 + 1] = Math.random() * 0.5;
    positions[i * 3 + 2] = Math.sin(angle) * radius + 5;
    colors[i * 3] = 0.1;
    colors[i * 3 + 1] = 0.9;
    colors[i * 3 + 2] = 0.3;
    healParticleData.push({
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 0.02,
        Math.random() * 0.05 + 0.02,
        (Math.random() - 0.5) * 0.02
      ),
      life: 1.0,
      decay: Math.random() * 0.02 + 0.01
    });
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const mat = new THREE.PointsMaterial({
    size: 0.12,
    vertexColors: true,
    transparent: true,
    opacity: 0.8,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  healParticles = new THREE.Points(geo, mat);
  healParticles.visible = false;
  scene.add(healParticles);
}
createHealParticles();

let healAnimActive = false;
let healAnimTime = 0;

function triggerHealEffect() {
  healAnimActive = true;
  healAnimTime = 0;
  healParticles.visible = true;
  const positions = healParticles.geometry.attributes.position.array;
  for (let i = 0; i < healParticleData.length; i++) {
    const angle = Math.random() * Math.PI * 2;
    const radius = Math.random() * 1.5;
    positions[i * 3] = Math.cos(angle) * radius;
    positions[i * 3 + 1] = Math.random() * 0.5;
    positions[i * 3 + 2] = Math.sin(angle) * radius + 5;
    healParticleData[i].life = 1.0;
  }
  healParticles.geometry.attributes.position.needsUpdate = true;
}

// Victory coin particles
let victoryParticles = null;
let victoryParticleData = [];
let victoryActive = false;

function createVictoryParticles() {
  const count = 200;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  victoryParticleData = [];

  for (let i = 0; i < count; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 1;
    positions[i * 3 + 2] = -6;
    victoryParticleData.push({
      velocity: new THREE.Vector3(
        (Math.random() - 0.5) * 0.15,
        Math.random() * 0.2 + 0.1,
        (Math.random() - 0.5) * 0.15
      ),
      life: 1.0,
      gravity: -0.003
    });
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xffd700,
    size: 0.15,
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });

  victoryParticles = new THREE.Points(geo, mat);
  victoryParticles.visible = false;
  scene.add(victoryParticles);
}
createVictoryParticles();

// ============ CAMERA SHAKE ============
let shakeIntensity = 0;
let shakeDuration = 0;
let shakeTime = 0;
const originalCamPos = new THREE.Vector3();

function triggerShake(intensity = 0.15, duration = 0.3) {
  shakeIntensity = intensity;
  shakeDuration = duration;
  shakeTime = 0;
  originalCamPos.copy(camera.position);
}

// ============ DRAGON FLASH ============
let flashTime = 0;
let isFlashing = false;
const originalEmissives = new Map();

function triggerDragonFlash() {
  isFlashing = true;
  flashTime = 0;
  dragonMaterials.forEach(m => {
    if (!originalEmissives.has(m)) {
      originalEmissives.set(m, m.emissive ? m.emissive.clone() : new THREE.Color(0));
    }
    if (m.emissive) m.emissive.set(0xff0000);
    if (m.emissiveIntensity !== undefined) m.emissiveIntensity = 2;
  });
}

// ============ DRAGON ATTACK ANIMATION ============
let dragonAttackAnim = false;
let dragonAttackTime = 0;
let dragonOriginalZ = -3;

function triggerDragonAttack() {
  if (attackAction && dragonMixer) {
    attackAction.reset();
    attackAction.setLoop(THREE.LoopOnce);
    attackAction.clampWhenFinished = false;
    attackAction.play();
    if (idleAction) {
      idleAction.crossFadeTo(attackAction, 0.2);
    }
    setTimeout(() => {
      if (idleAction) {
        attackAction.crossFadeTo(idleAction, 0.3);
        idleAction.reset().play();
      }
    }, 1000);
  }
  dragonAttackAnim = true;
  dragonAttackTime = 0;
}

// ============ DAMAGE NUMBERS ============
function showDamageNumber(value, isHeal, targetSide) {
  const el = document.createElement('div');
  el.className = 'damage-number' + (isHeal ? ' heal-number' : '');
  el.textContent = isHeal ? `+${value}` : `-${value}`;
  el.style.color = isHeal ? '#2ecc71' : '#ff4444';

  if (targetSide === 'dragon') {
    // Project dragon position to screen
    const pos = new THREE.Vector3(0, 3, -3);
    pos.project(camera);
    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
    el.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
    el.style.top = (y - 20) + 'px';
  } else {
    // Player side - bottom left area
    el.style.left = (window.innerWidth * 0.3 + (Math.random() - 0.5) * 80) + 'px';
    el.style.top = (window.innerHeight * 0.6) + 'px';
  }

  document.getElementById('ui-overlay').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ============ VIGNETTE ============
function triggerVignette() {
  const v = document.getElementById('vignette');
  v.style.opacity = '1';
  setTimeout(() => { v.style.opacity = '0'; }, 300);
}

// ============ BATTLE LOG ============
function addLog(text, type = 'info') {
  const log = document.getElementById('battleLog');
  const entry = document.createElement('div');
  entry.className = `log-entry log-${type}`;
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  entry.innerHTML = `<small style="opacity:0.5">[${time}]</small> ${text}`;
  log.insertBefore(entry, log.firstChild);
}

// ============ UI UPDATE ============
function updateUI() {
  const playerBar = document.getElementById('playerHPBar');
  const dragonBar = document.getElementById('dragonHPBar');
  const playerText = document.getElementById('playerHP');
  const dragonText = document.getElementById('dragonHP');
  const healInfo = document.getElementById('heal-info');
  const battleStateEl = document.getElementById('battleState');

  playerBar.style.width = Math.max(0, state.playerHP) + '%';
  dragonBar.style.width = Math.max(0, state.dragonHP / 2) + '%';
  playerText.textContent = `HP: ${Math.max(0, state.playerHP)} / 100`;
  dragonText.textContent = `HP: ${Math.max(0, state.dragonHP)} / 200`;
  healInfo.textContent = `剩余: ${state.healUsesLeft}次`;
  battleStateEl.textContent = state.battleState;

  if (state.healUsesLeft <= 0) {
    document.getElementById('healBtn').disabled = true;
  }
}

// ============ BATTLE LOGIC ============
function playerAttack() {
  if (!isBattleActive || !isPlayerTurn) return;
  isPlayerTurn = false;

  const damage = Math.floor(Math.random() * 11) + 10; // 10-20
  state.dragonHP = Math.max(0, state.dragonHP - damage);
  state.lastDamageToDragon = damage;
  state.totalDamageDealt += damage;
  state.turnsPlayed++;

  // Effects
  triggerShake(0.2, 0.3);
  triggerDragonFlash();
  showDamageNumber(damage, false, 'dragon');
  addLog(`⚔️ 你挥剑攻击巨龙，造成 <b style="color:#f39c12">${damage}</b> 点伤害！`, 'player-attack');

  updateUI();

  // Check dragon death
  if (state.dragonHP <= 0) {
    setTimeout(() => victory(), 500);
    return;
  }

  // Disable buttons during dragon turn
  document.getElementById('attackBtn').disabled = true;
  document.getElementById('healBtn').disabled = true;

  // Dragon counterattack after delay
  setTimeout(() => dragonAttack(), 1200);
}

function dragonAttack() {
  if (!isBattleActive) return;

  const damage = Math.floor(Math.random() * 11) + 15; // 15-25
  state.playerHP = Math.max(0, state.playerHP - damage);
  state.lastDamageToPlayer = damage;
  state.totalDamageTaken += damage;

  // Effects
  triggerDragonAttack();
  triggerVignette();
  triggerShake(0.3, 0.4);
  showDamageNumber(damage, false, 'player');
  addLog(`🐉 巨龙发动攻击，对你造成 <b style="color:#e74c3c">${damage}</b> 点伤害！`, 'attack');

  updateUI();

  // Check player death
  if (state.playerHP <= 0) {
    setTimeout(() => defeat(), 800);
    return;
  }

  // Re-enable buttons
  setTimeout(() => {
    isPlayerTurn = true;
    document.getElementById('attackBtn').disabled = false;
    if (state.healUsesLeft > 0) {
      document.getElementById('healBtn').disabled = false;
    }
  }, 600);
}

function playerHeal() {
  if (!isBattleActive || !isPlayerTurn || state.healUsesLeft <= 0) return;
  isPlayerTurn = false;

  const healAmount = 20;
  const oldHP = state.playerHP;
  state.playerHP = Math.min(100, state.playerHP + healAmount);
  const actualHeal = state.playerHP - oldHP;
  state.healUsesLeft--;
  state.turnsPlayed++;

  // Effects
  triggerHealEffect();
  showDamageNumber(actualHeal, true, 'player');
  addLog(`💚 你使用治疗术，恢复了 <b style="color:#2ecc71">${actualHeal}</b> 点生命值！(剩余${state.healUsesLeft}次)`, 'heal');

  updateUI();

  // Disable buttons during dragon turn
  document.getElementById('attackBtn').disabled = true;
  document.getElementById('healBtn').disabled = true;

  // Dragon counterattack
  setTimeout(() => dragonAttack(), 1200);
}

function victory() {
  isBattleActive = false;
  state.battleState = 'victory';
  document.getElementById('battleState').textContent = 'victory';

  document.getElementById('attackBtn').disabled = true;
  document.getElementById('healBtn').disabled = true;

  addLog('🏆 巨龙倒下了！宝藏是你的了！', 'info');

  // Open chest animation
  chestOpenAnim = true;
  chestOpenTime = 0;

  // Victory particles
  victoryActive = true;
  victoryParticles.visible = true;
  const positions = victoryParticles.geometry.attributes.position.array;
  for (let i = 0; i < victoryParticleData.length; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 0.5;
    positions[i * 3 + 1] = 1;
    positions[i * 3 + 2] = -6;
    victoryParticleData[i].velocity.set(
      (Math.random() - 0.5) * 0.15,
      Math.random() * 0.2 + 0.1,
      (Math.random() - 0.5) * 0.15
    );
    victoryParticleData[i].life = 1.0;
  }
  victoryParticles.geometry.attributes.position.needsUpdate = true;

  // Dragon collapse
  if (dragonModel) {
    dragonCollapseAnim = true;
    dragonCollapseTime = 0;
  }

  // Show result
  setTimeout(() => {
    showResult('victory');
  }, 1500);
}

function defeat() {
  isBattleActive = false;
  state.battleState = 'defeat';
  document.getElementById('battleState').textContent = 'defeat';

  document.getElementById('attackBtn').disabled = true;
  document.getElementById('healBtn').disabled = true;

  addLog('💀 你被巨龙击败了...', 'info');

  // Darken screen
  document.getElementById('darkness-overlay').style.opacity = '0.7';

  setTimeout(() => {
    showResult('defeat');
  }, 1500);
}

function showResult(type) {
  const screen = document.getElementById('result-screen');
  const bg = document.getElementById('result-bg');
  const title = document.getElementById('result-title');
  const subtitle = document.getElementById('result-subtitle');

  screen.classList.add('show');

  if (type === 'victory') {
    bg.style.background = 'radial-gradient(ellipse at center, rgba(255,215,0,0.3) 0%, rgba(0,0,0,0.8) 70%)';
    title.style.color = '#ffd700';
    title.textContent = '🏆 胜利！宝藏是你的了！';
    subtitle.textContent = `总共造成 ${state.totalDamageDealt} 点伤害 | 承受 ${state.totalDamageTaken} 点伤害 | ${state.turnsPlayed} 回合`;
  } else {
    bg.style.background = 'radial-gradient(ellipse at center, rgba(255,0,0,0.2) 0%, rgba(0,0,0,0.9) 70%)';
    title.style.color = '#e74c3c';
    title.textContent = '💀 你被巨龙击败了...';
    subtitle.textContent = `总共造成 ${state.totalDamageDealt} 点伤害 | 承受 ${state.totalDamageTaken} 点伤害 | ${state.turnsPlayed} 回合`;
  }
}

function restart() {
  state.playerHP = 100;
  state.dragonHP = 200;
  state.healUsesLeft = 3;
  state.battleState = 'fighting';
  state.lastDamageToPlayer = 0;
  state.lastDamageToDragon = 0;
  state.totalDamageDealt = 0;
  state.totalDamageTaken = 0;
  state.turnsPlayed = 0;

  isBattleActive = true;
  isPlayerTurn = true;

  document.getElementById('attackBtn').disabled = false;
  document.getElementById('healBtn').disabled = false;
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('darkness-overlay').style.opacity = '0';
  document.getElementById('battleLog').innerHTML = '';

  // Reset chest
  lidGroup.rotation.x = 0;
  chestOpenAnim = false;

  // Reset dragon
  if (dragonModel) {
    dragonModel.rotation.x = 0;
    dragonModel.position.y = 0;
    dragonCollapseAnim = false;
  }

  // Reset particles
  victoryActive = false;
  victoryParticles.visible = false;
  healParticles.visible = false;
  healAnimActive = false;

  updateUI();
  addLog('新的战斗开始了！巨龙怒吼着向你扑来！', 'info');
}

// ============ EVENT LISTENERS ============
document.getElementById('attackBtn').addEventListener('click', playerAttack);
document.getElementById('healBtn').addEventListener('click', playerHeal);
document.getElementById('restartBtn').addEventListener('click', restart);

// ============ CHEST OPEN ANIMATION ============
let chestOpenAnim = false;
let chestOpenTime = 0;

// ============ DRAGON COLLAPSE ============
let dragonCollapseAnim = false;
let dragonCollapseTime = 0;

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();

  // Dragon mixer
  if (dragonMixer) {
    dragonMixer.update(delta);
  }

  // Dragon idle breathing (if no animation mixer)
  if (dragonModel && !dragonMixer && isBattleActive && !dragonCollapseAnim) {
    dragonModel.position.y = Math.sin(elapsed * 1.5) * 0.1;
    dragonModel.rotation.y = Math.sin(elapsed * 0.5) * 0.05;
  }

  // Torch light flicker
  torchLights.forEach((light, i) => {
    light.intensity = 2 + Math.sin(elapsed * 3 + i * 1.5) * 0.5 + Math.sin(elapsed * 7 + i * 2.3) * 0.3;
  });

  // Chest glow particles
  const cgPos = chestGlowParticles.geometry.attributes.position.array;
  for (let i = 0; i < chestGlowVelocities.length; i++) {
    cgPos[i * 3] += chestGlowVelocities[i].x;
    cgPos[i * 3 + 1] += chestGlowVelocities[i].y;
    cgPos[i * 3 + 2] += chestGlowVelocities[i].z;
    if (cgPos[i * 3 + 1] > 1.5) {
      cgPos[i * 3] = (Math.random() - 0.5) * 1.2;
      cgPos[i * 3 + 1] = Math.random() * 0.3;
      cgPos[i * 3 + 2] = (Math.random() - 0.5) * 0.8;
    }
  }
  chestGlowParticles.geometry.attributes.position.needsUpdate = true;
  chestGlowMat.opacity = 0.4 + Math.sin(elapsed * 2) * 0.2;
  chestLight.intensity = 1 + Math.sin(elapsed * 2) * 0.3;

  // Camera shake
  if (shakeTime < shakeDuration) {
    shakeTime += delta;
    const progress = shakeTime / shakeDuration;
    const decay = 1 - progress;
    camera.position.x = originalCamPos.x + (Math.random() - 0.5) * shakeIntensity * decay;
    camera.position.y = originalCamPos.y + (Math.random() - 0.5) * shakeIntensity * decay;
  }

  // Dragon flash
  if (isFlashing) {
    flashTime += delta;
    if (flashTime > 0.3) {
      isFlashing = false;
      dragonMaterials.forEach(m => {
        const orig = originalEmissives.get(m);
        if (m.emissive && orig) m.emissive.copy(orig);
        if (m.emissiveIntensity !== undefined) m.emissiveIntensity = 0;
      });
    }
  }

  // Dragon attack animation (lunge forward)
  if (dragonAttackAnim && dragonModel) {
    dragonAttackTime += delta;
    const t = dragonAttackTime;
    if (t < 0.3) {
      dragonModel.position.z = dragonOriginalZ + (t / 0.3) * 1.5;
    } else if (t < 0.6) {
      dragonModel.position.z = dragonOriginalZ + 1.5 - ((t - 0.3) / 0.3) * 1.5;
    } else {
      dragonModel.position.z = dragonOriginalZ;
      dragonAttackAnim = false;
    }
  }

  // Heal particles
  if (healAnimActive) {
    healAnimTime += delta;
    const hPos = healParticles.geometry.attributes.position.array;
    let allDead = true;
    for (let i = 0; i < healParticleData.length; i++) {
      const p = healParticleData[i];
      if (p.life > 0) {
        allDead = false;
        hPos[i * 3] += p.velocity.x;
        hPos[i * 3 + 1] += p.velocity.y;
        hPos[i * 3 + 2] += p.velocity.z;
        p.life -= p.decay;
      }
    }
    healParticles.geometry.attributes.position.needsUpdate = true;
    healParticles.material.opacity = Math.max(0, 0.8 - healAnimTime * 0.5);
    if (allDead || healAnimTime > 2) {
      healAnimActive = false;
      healParticles.visible = false;
    }
  }

  // Chest open animation
  if (chestOpenAnim) {
    chestOpenTime += delta;
    const targetAngle = -Math.PI * 0.7;
    const currentAngle = lidGroup.rotation.x;
    if (currentAngle > targetAngle) {
      lidGroup.rotation.x = Math.max(targetAngle, currentAngle - delta * 2);
    }
  }

  // Dragon collapse
  if (dragonCollapseAnim && dragonModel) {
    dragonCollapseTime += delta;
    if (dragonCollapseTime < 2) {
      dragonModel.rotation.x = Math.min(Math.PI / 6, dragonCollapseTime * 0.15);
      dragonModel.position.y = Math.max(-0.5, -dragonCollapseTime * 0.3);
    }
  }

  // Victory particles
  if (victoryActive) {
    const vPos = victoryParticles.geometry.attributes.position.array;
    for (let i = 0; i < victoryParticleData.length; i++) {
      const p = victoryParticleData[i];
      p.velocity.y += p.gravity;
      vPos[i * 3] += p.velocity.x;
      vPos[i * 3 + 1] += p.velocity.y;
      vPos[i * 3 + 2] += p.velocity.z;
      if (vPos[i * 3 + 1] < 0) {
        vPos[i * 3] = (Math.random() - 0.5) * 0.5;
        vPos[i * 3 + 1] = 1;
        vPos[i * 3 + 2] = -6;
        p.velocity.set(
          (Math.random() - 0.5) * 0.15,
          Math.random() * 0.2 + 0.1,
          (Math.random() - 0.5) * 0.15
        );
      }
    }
    victoryParticles.geometry.attributes.position.needsUpdate = true;
  }

  // Coin shimmer
  coins.forEach((coin, i) => {
    coin.rotation.z += delta * (0.5 + i * 0.05);
  });

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initial log
addLog('你进入了一个幽暗的洞穴，前方巨龙正守护着宝藏...', 'info');
updateUI();
</script>
</body>
</html>
