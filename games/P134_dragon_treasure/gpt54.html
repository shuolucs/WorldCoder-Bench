<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js RPG 巨龙遭遇战</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #120700;
      color: #f5e6c8;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .panel {
      position: absolute;
      background: rgba(20, 10, 5, 0.7);
      border: 1px solid rgba(255, 180, 90, 0.35);
      border-radius: 12px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 20px rgba(255, 120, 40, 0.12);
      pointer-events: auto;
    }

    #topHUD {
      top: 16px;
      left: 16px;
      width: 360px;
      padding: 14px;
    }

    .hudRow {
      margin-bottom: 12px;
    }

    .hudLabel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .barWrap {
      width: 100%;
      height: 20px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 100%;
      transition: width 0.3s ease;
    }

    #playerHP {
      background: linear-gradient(90deg, #2ea043, #57d66e);
    }

    #dragonHP {
      background: linear-gradient(90deg, #8a1010, #ff4a4a);
    }

    #statusText {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 13px;
      opacity: 0.95;
    }

    #controlsPanel {
      bottom: 20px;
      left: 16px;
      padding: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      outline: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.2s ease, filter 0.2s ease;
      color: #fff7ea;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #attackBtn {
      background: linear-gradient(180deg, #d04a2e, #962413);
    }

    #healBtn {
      background: linear-gradient(180deg, #2ea043, #1f6f30);
    }

    #restartBtn {
      background: linear-gradient(180deg, #c9a227, #866a10);
      display: none;
    }

    #battleLogPanel {
      top: 16px;
      right: 16px;
      width: 320px;
      height: 55%;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    #battleLogPanel h3 {
      margin: 4px 0 10px;
      font-size: 16px;
      color: #ffd7a0;
    }

    #battleLog {
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .logItem {
      background: rgba(255, 255, 255, 0.05);
      border-left: 3px solid #ff9a52;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }

    #messageOverlay {
      position: absolute;
      left: 50%;
      top: 15%;
      transform: translateX(-50%);
      min-width: 320px;
      max-width: 80vw;
      text-align: center;
      padding: 18px 22px;
      border-radius: 14px;
      background: rgba(18, 8, 0, 0.75);
      border: 1px solid rgba(255, 190, 90, 0.35);
      box-shadow: 0 0 30px rgba(255, 140, 40, 0.18);
      display: none;
      pointer-events: auto;
    }

    #messageTitle {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #ffe3a8;
    }

    #messageDesc {
      font-size: 15px;
      color: #f7e6ca;
      opacity: 0.95;
    }

    #damageLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .floatingText {
      position: absolute;
      font-size: 28px;
      font-weight: 900;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      transform: translate(-50%, -50%);
      animation: floatUp 1s ease-out forwards;
      white-space: nowrap;
    }

    .damageRed { color: #ff6b6b; }
    .damageGreen { color: #7dff9e; }
    .damageYellow { color: #ffd85e; }

    @keyframes floatUp {
      0% { opacity: 0; transform: translate(-50%, -10px) scale(0.8); }
      10% { opacity: 1; transform: translate(-50%, -24px) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -90px) scale(1.08); }
    }

    #vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(255,0,0,0) 45%, rgba(180,0,0,0.35) 100%);
      opacity: 0;
      transition: opacity 0.25s ease;
      mix-blend-mode: screen;
    }

    #darkness {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: rgba(0, 0, 0, 0);
      transition: background 0.6s ease;
    }

    #loadingTip {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f3d9ae;
      font-size: 13px;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <div id="topHUD" class="panel">
        <div class="hudRow">
          <div class="hudLabel">
            <span>玩家 HP</span>
            <span id="playerHPText">100 / 100</span>
          </div>
          <div class="barWrap">
            <div id="playerHP" class="bar"></div>
          </div>
        </div>

        <div class="hudRow">
          <div class="hudLabel">
            <span>巨龙 HP</span>
            <span id="dragonHPText">200 / 200</span>
          </div>
          <div class="barWrap">
            <div id="dragonHP" class="bar"></div>
          </div>
        </div>

        <div id="statusText">
          <div>治疗剩余：<span id="healUses">3</span></div>
          <div>状态：<span id="battleState">fighting</span></div>
        </div>
      </div>

      <div id="battleLogPanel" class="panel">
        <h3>战斗日志</h3>
        <div id="battleLog"></div>
      </div>

      <div id="controlsPanel" class="panel">
        <button id="attackBtn">攻击</button>
        <button id="healBtn">治疗</button>
        <button id="restartBtn">重新开始</button>
      </div>

      <div id="messageOverlay">
        <div id="messageTitle"></div>
        <div id="messageDesc"></div>
      </div>

      <div id="damageLayer"></div>
      <div id="vignette"></div>
      <div id="darkness"></div>
      <div id="loadingTip">正在加载巨龙模型...</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const playerHPBar = document.getElementById('playerHP');
    const dragonHPBar = document.getElementById('dragonHP');
    const playerHPText = document.getElementById('playerHPText');
    const dragonHPText = document.getElementById('dragonHPText');
    const healUsesText = document.getElementById('healUses');
    const battleStateText = document.getElementById('battleState');
    const battleLog = document.getElementById('battleLog');
    const attackBtn = document.getElementById('attackBtn');
    const healBtn = document.getElementById('healBtn');
    const restartBtn = document.getElementById('restartBtn');
    const damageLayer = document.getElementById('damageLayer');
    const vignette = document.getElementById('vignette');
    const darkness = document.getElementById('darkness');
    const messageOverlay = document.getElementById('messageOverlay');
    const messageTitle = document.getElementById('messageTitle');
    const messageDesc = document.getElementById('messageDesc');
    const loadingTip = document.getElementById('loadingTip');

    window.__3D_STATE__ = {
      modelLoaded: false,
      playerHP: 100,
      dragonHP: 200,
      healUsesLeft: 3,
      battleState: 'fighting',
      lastDamageToPlayer: 0,
      lastDamageToDragon: 0,
      totalDamageDealt: 0,
      totalDamageTaken: 0,
      turnsPlayed: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a0a00);
    scene.fog = new THREE.Fog(0x1a0a00, 8, 22);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    const baseCameraPos = new THREE.Vector3(0, 4.5, 8.5);
    camera.position.copy(baseCameraPos);
    camera.lookAt(0, 1.2, -2.4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, -2.5);
    controls.enablePan = false;
    controls.enableDamping = true;
    controls.minDistance = 6;
    controls.maxDistance = 11;
    controls.minPolarAngle = 0.7;
    controls.maxPolarAngle = 1.25;
    controls.minAzimuthAngle = -0.5;
    controls.maxAzimuthAngle = 0.5;

    const clock = new THREE.Clock();

    const ambient = new THREE.AmbientLight(0xffd8aa, 0.35);
    scene.add(ambient);

    const torch1 = new THREE.PointLight(0xff7a22, 35, 18, 2);
    torch1.position.set(-4, 3.2, 1);
    torch1.castShadow = true;
    scene.add(torch1);

    const torch2 = new THREE.PointLight(0xffa347, 28, 16, 2);
    torch2.position.set(4, 2.6, -4);
    scene.add(torch2);

    const torch3 = new THREE.PointLight(0xff5b1f, 18, 14, 2);
    torch3.position.set(0, 2, 3);
    scene.add(torch3);

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(15, 64),
      new THREE.MeshStandardMaterial({
        color: 0x4a3728,
        roughness: 1,
        metalness: 0.05
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const rockMaterial = new THREE.MeshStandardMaterial({
      color: 0x35251a,
      roughness: 1,
      metalness: 0
    });

    for (let i = 0; i < 14; i++) {
      const rock = new THREE.Mesh(
        new THREE.DodecahedronGeometry(0.6 + Math.random() * 1.3, 0),
        rockMaterial
      );
      rock.position.set(
        (Math.random() - 0.5) * 16,
        0.2 + Math.random() * 0.5,
        -7 + Math.random() * 12
      );
      rock.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
      rock.scale.y *= 0.6;
      rock.castShadow = true;
      rock.receiveShadow = true;
      scene.add(rock);
    }

    const chestGroup = new THREE.Group();
    chestGroup.position.set(0, 0.45, -6.2);
    scene.add(chestGroup);

    const chestBase = new THREE.Mesh(
      new THREE.BoxGeometry(1.8, 0.9, 1.2),
      new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.35, metalness: 0.8 })
    );
    chestBase.castShadow = true;
    chestBase.receiveShadow = true;
    chestGroup.add(chestBase);

    const chestLidPivot = new THREE.Group();
    chestLidPivot.position.set(0, 0.45, -0.6);
    chestGroup.add(chestLidPivot);

    const chestLid = new THREE.Mesh(
      new THREE.BoxGeometry(1.86, 0.35, 1.24),
      new THREE.MeshStandardMaterial({ color: 0xe8bf22, roughness: 0.3, metalness: 0.85 })
    );
    chestLid.position.set(0, 0.18, 0.6);
    chestLid.castShadow = true;
    chestLidPivot.add(chestLid);

    const chestGlow = new THREE.PointLight(0xffcc55, 2.5, 6, 2);
    chestGlow.position.set(0, 0.8, 0);
    chestGroup.add(chestGlow);

    const coinGroup = new THREE.Group();
    scene.add(coinGroup);

    const coinMaterial = new THREE.MeshStandardMaterial({
      color: 0xffd700,
      roughness: 0.25,
      metalness: 0.9
    });

    for (let i = 0; i < 28; i++) {
      const coin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.13, 0.13, 0.04, 18),
        coinMaterial
      );
      coin.rotation.x = Math.PI / 2;
      coin.position.set(
        (Math.random() - 0.5) * 10,
        0.03,
        -6 + Math.random() * 9
      );
      coin.castShadow = true;
      coin.receiveShadow = true;
      coinGroup.add(coin);
    }

    function createParticleSystem(count, color, size = 0.08) {
      const positions = new Float32Array(count * 3);
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const material = new THREE.PointsMaterial({
        color,
        size,
        transparent: true,
        opacity: 0.9,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });
      const points = new THREE.Points(geometry, material);
      points.userData.velocities = [];
      for (let i = 0; i < count; i++) {
        points.userData.velocities.push(new THREE.Vector3());
      }
      return points;
    }

    const chestParticles = createParticleSystem(50, 0xffe680, 0.09);
    chestParticles.position.set(0, 0.65, -6.2);
    scene.add(chestParticles);

    const healParticles = createParticleSystem(36, 0x66ff99, 0.1);
    healParticles.visible = false;
    scene.add(healParticles);

    const victoryCoins = createParticleSystem(120, 0xffd700, 0.11);
    victoryCoins.visible = false;
    scene.add(victoryCoins);

    function initChestParticleBurst() {
      const pos = chestParticles.geometry.attributes.position.array;
      for (let i = 0; i < chestParticles.userData.velocities.length; i++) {
        pos[i * 3 + 0] = (Math.random() - 0.5) * 1.1;
        pos[i * 3 + 1] = Math.random() * 0.4;
        pos[i * 3 + 2] = (Math.random() - 0.5) * 0.8;
        chestParticles.userData.velocities[i].set(
          (Math.random() - 0.5) * 0.004,
          0.006 + Math.random() * 0.006,
          (Math.random() - 0.5) * 0.004
        );
      }
      chestParticles.geometry.attributes.position.needsUpdate = true;
    }
    initChestParticleBurst();

    let dragon = null;
    let mixer = null;
    let idleAction = null;
    let attackAction = null;
    let dragonMaterials = [];
    let dragonBaseY = 0;
    let dragonFlashTime = 0;
    let dragonAttackLean = 0;
    let chestOpenProgress = 0;
    let victoryBurstStarted = false;
    let shakeTime = 0;
    let shakeStrength = 0;
    let playerMarker = new THREE.Vector3(-2.4, 1.6, 1.8);
    let dragonMarker = new THREE.Vector3(0, 2.2, -3);
    let dragonLoadedWithAnimations = false;

    const loader = new GLTFLoader();
    loader.load(
      'assets/DragonAttenuation.glb',
      (gltf) => {
        dragon = gltf.scene;
        dragon.position.set(0, 0, -3);
        dragon.scale.setScalar(1.7);
        dragon.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              const materials = Array.isArray(obj.material) ? obj.material : [obj.material];
              materials.forEach(mat => {
                if ('emissive' in mat) {
                  mat.emissive = mat.emissive ? mat.emissive.clone() : new THREE.Color(0x000000);
                  mat.userData.originalEmissive = mat.emissive.clone();
                  dragonMaterials.push(mat);
                }
              });
            }
          }
        });
        scene.add(dragon);
        dragonBaseY = dragon.position.y;

        if (gltf.animations && gltf.animations.length) {
          mixer = new THREE.AnimationMixer(dragon);
          let idleClip = null;
          let attackClip = null;

          for (const clip of gltf.animations) {
            const name = clip.name.toLowerCase();
            if (!idleClip && (name.includes('idle') || name.includes('breath') || name.includes('fly_idle'))) {
              idleClip = clip;
            }
            if (!attackClip && (name.includes('attack') || name.includes('bite') || name.includes('fire'))) {
              attackClip = clip;
            }
          }

          if (!idleClip) idleClip = gltf.animations[0] || null;
          if (!attackClip && gltf.animations.length > 1) attackClip = gltf.animations[1];

          if (idleClip) {
            idleAction = mixer.clipAction(idleClip);
            idleAction.play();
          }
          if (attackClip) {
            attackAction = mixer.clipAction(attackClip);
            attackAction.setLoop(THREE.LoopOnce, 1);
            attackAction.clampWhenFinished = true;
          }

          dragonLoadedWithAnimations = !!idleClip || !!attackClip;
        }

        window.__3D_STATE__.modelLoaded = true;
        loadingTip.textContent = '巨龙已就位，准备战斗！';
        setTimeout(() => {
          loadingTip.style.display = 'none';
        }, 1200);
      },
      undefined,
      (err) => {
        console.error('模型加载失败:', err);
        loadingTip.textContent = '巨龙模型加载失败，仍可继续战斗场景。';
        window.__3D_STATE__.modelLoaded = false;

        const fallbackDragon = new THREE.Mesh(
          new THREE.ConeGeometry(1.4, 3.6, 6),
          new THREE.MeshStandardMaterial({ color: 0x6a2b1f, roughness: 0.7, metalness: 0.1, emissive: 0x000000 })
        );
        fallbackDragon.position.set(0, 1.8, -3);
        fallbackDragon.rotation.z = Math.PI;
        fallbackDragon.castShadow = true;
        fallbackDragon.receiveShadow = true;
        fallbackDragon.material.userData.originalEmissive = new THREE.Color(0x000000);
        dragonMaterials.push(fallbackDragon.material);
        dragon = new THREE.Group();
        dragon.add(fallbackDragon);
        dragon.position.set(0, 0, 0);
        dragonBaseY = dragon.position.y;
        scene.add(dragon);
      }
    );

    const state = {
      playerHP: 100,
      dragonHP: 200,
      healUsesLeft: 3,
      battleState: 'fighting',
      lastDamageToPlayer: 0,
      lastDamageToDragon: 0,
      totalDamageDealt: 0,
      totalDamageTaken: 0,
      turnsPlayed: 0,
      busy: false
    };

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function addLog(text) {
      const item = document.createElement('div');
      item.className = 'logItem';
      item.textContent = text;
      battleLog.prepend(item);
    }

    function updateHUD() {
      playerHPBar.style.width = `${Math.max(0, state.playerHP)}%`;
      dragonHPBar.style.width = `${Math.max(0, state.dragonHP / 2)}%`;
      playerHPText.textContent = `${Math.max(0, state.playerHP)} / 100`;
      dragonHPText.textContent = `${Math.max(0, state.dragonHP)} / 200`;
      healUsesText.textContent = `${state.healUsesLeft}`;
      battleStateText.textContent = state.battleState;
      healBtn.disabled = state.healUsesLeft <= 0 || state.battleState !== 'fighting' || state.busy;
      attackBtn.disabled = state.battleState !== 'fighting' || state.busy;
      if (state.healUsesLeft <= 0) {
        healBtn.style.filter = 'grayscale(1)';
      } else {
        healBtn.style.filter = 'none';
      }
    }

    function updateExposedState() {
      window.__3D_STATE__.modelLoaded = !!window.__3D_STATE__.modelLoaded;
      window.__3D_STATE__.playerHP = state.playerHP;
      window.__3D_STATE__.dragonHP = state.dragonHP;
      window.__3D_STATE__.healUsesLeft = state.healUsesLeft;
      window.__3D_STATE__.battleState = state.battleState;
      window.__3D_STATE__.lastDamageToPlayer = state.lastDamageToPlayer;
      window.__3D_STATE__.lastDamageToDragon = state.lastDamageToDragon;
      window.__3D_STATE__.totalDamageDealt = state.totalDamageDealt;
      window.__3D_STATE__.totalDamageTaken = state.totalDamageTaken;
      window.__3D_STATE__.turnsPlayed = state.turnsPlayed;
    }

    function worldToScreen(pos) {
      const p = pos.clone().project(camera);
      return {
        x: (p.x * 0.5 + 0.5) * window.innerWidth,
        y: (-p.y * 0.5 + 0.5) * window.innerHeight
      };
    }

    function showFloatingText(worldPos, text, cls = 'damageRed') {
      const screen = worldToScreen(worldPos);
      const div = document.createElement('div');
      div.className = `floatingText ${cls}`;
      div.textContent = text;
      div.style.left = `${screen.x}px`;
      div.style.top = `${screen.y}px`;
      damageLayer.appendChild(div);
      setTimeout(() => div.remove(), 1000);
    }

    function triggerShake(strength = 0.12, duration = 0.3) {
      shakeStrength = strength;
      shakeTime = duration;
    }

    function dragonFlash() {
      dragonFlashTime = 0.22;
      dragonMaterials.forEach(mat => {
        if ('emissive' in mat) mat.emissive.set(0xff2222);
      });
    }

    function triggerVignette() {
      vignette.style.opacity = '1';
      setTimeout(() => vignette.style.opacity = '0', 220);
    }

    function playDragonAttackAnimation() {
      if (mixer && attackAction) {
        if (idleAction) idleAction.fadeOut(0.12);
        attackAction.reset().fadeIn(0.08).play();
        setTimeout(() => {
          if (idleAction) idleAction.reset().fadeIn(0.25).play();
        }, 700);
      } else {
        dragonAttackLean = 0.45;
      }
    }

    function triggerHealEffect() {
      healParticles.visible = true;
      healParticles.position.set(playerMarker.x, 0.6, playerMarker.z);
      const pos = healParticles.geometry.attributes.position.array;
      for (let i = 0; i < healParticles.userData.velocities.length; i++) {
        pos[i * 3 + 0] = 0;
        pos[i * 3 + 1] = 0.5;
        pos[i * 3 + 2] = 0;
        healParticles.userData.velocities[i].set(
          (Math.random() - 0.5) * 0.03,
          0.04 + Math.random() * 0.04,
          (Math.random() - 0.5) * 0.03
        );
      }
      healParticles.material.opacity = 1;
      healParticles.geometry.attributes.position.needsUpdate = true;
      setTimeout(() => {
        healParticles.visible = false;
      }, 700);
    }

    function openChestAndBurst() {
      victoryBurstStarted = true;
      victoryCoins.visible = true;
      victoryCoins.position.set(0, 0.9, -6.2);
      const pos = victoryCoins.geometry.attributes.position.array;
      for (let i = 0; i < victoryCoins.userData.velocities.length; i++) {
        pos[i * 3 + 0] = 0;
        pos[i * 3 + 1] = 0;
        pos[i * 3 + 2] = 0;
        victoryCoins.userData.velocities[i].set(
          (Math.random() - 0.5) * 0.07,
          0.08 + Math.random() * 0.09,
          (Math.random() - 0.5) * 0.07
        );
      }
      victoryCoins.material.opacity = 1;
      victoryCoins.geometry.attributes.position.needsUpdate = true;
    }

    function endBattle(victory) {
      state.battleState = victory ? 'victory' : 'defeat';
      state.busy = false;
      updateHUD();
      restartBtn.style.display = 'inline-block';
      attackBtn.disabled = true;
      healBtn.disabled = true;
      messageOverlay.style.display = 'block';

      if (victory) {
        messageTitle.textContent = '胜利！宝藏是你的了！';
        messageDesc.textContent = '巨龙倒下，宝箱缓缓开启，金币与光辉喷涌而出。';
        addLog('你击败了巨龙，夺得宝藏！');
        chestOpenProgress = 1;
        openChestAndBurst();
      } else {
        messageTitle.textContent = '你被巨龙击败了...';
        messageDesc.textContent = '洞穴陷入阴影，巨龙的低吼在耳边回荡。';
        addLog('玩家倒下，战斗失败。');
        darkness.style.background = 'rgba(0, 0, 0, 0.55)';
      }
    }

    function playerAttack() {
      if (state.battleState !== 'fighting' || state.busy) return;
      state.busy = true;
      state.turnsPlayed += 1;

      const damage = randomInt(10, 20);
      state.lastDamageToDragon = damage;
      state.totalDamageDealt += damage;
      state.dragonHP = Math.max(0, state.dragonHP - damage);

      triggerShake(0.14, 0.28);
      dragonFlash();
      showFloatingText(dragonMarker, `-${damage}`, 'damageYellow');
      addLog(`玩家发动攻击，对巨龙造成 ${damage} 点伤害。`);
      updateHUD();

      if (state.dragonHP <= 0) {
        setTimeout(() => {
          endBattle(true);
        }, 350);
        return;
      }

      setTimeout(() => {
        dragonCounterAttack();
      }, 1000);
    }

    function dragonCounterAttack() {
      if (state.battleState !== 'fighting') return;

      const damage = randomInt(15, 25);
      state.lastDamageToPlayer = damage;
      state.totalDamageTaken += damage;
      state.playerHP = Math.max(0, state.playerHP - damage);

      playDragonAttackAnimation();
      triggerVignette();
      triggerShake(0.18, 0.22);
      showFloatingText(playerMarker, `-${damage}`, 'damageRed');
      addLog(`巨龙反击，玩家受到 ${damage} 点伤害！`);
      updateHUD();

      if (state.playerHP <= 0) {
        setTimeout(() => endBattle(false), 400);
      } else {
        state.busy = false;
        updateHUD();
      }
    }

    function playerHeal() {
      if (state.battleState !== 'fighting' || state.busy || state.healUsesLeft <= 0) return;
      state.busy = true;
      state.turnsPlayed += 1;

      const before = state.playerHP;
      state.playerHP = Math.min(100, state.playerHP + 20);
      const recovered = state.playerHP - before;
      state.healUsesLeft -= 1;

      state.lastDamageToPlayer = 0;
      triggerHealEffect();
      showFloatingText(playerMarker, `+${recovered}`, 'damageGreen');
      addLog(`玩家使用治疗，恢复 ${recovered} 点 HP。`);
      updateHUD();

      setTimeout(() => {
        if (state.battleState === 'fighting') {
          dragonCounterAttack();
        }
      }, 1000);
    }

    function resetBattle() {
      state.playerHP = 100;
      state.dragonHP = 200;
      state.healUsesLeft = 3;
      state.battleState = 'fighting';
      state.lastDamageToPlayer = 0;
      state.lastDamageToDragon = 0;
      state.totalDamageDealt = 0;
      state.totalDamageTaken = 0;
      state.turnsPlayed = 0;
      state.busy = false;

      battleLog.innerHTML = '';
      addLog('新的战斗开始。巨龙守护着宝箱。');
      messageOverlay.style.display = 'none';
      restartBtn.style.display = 'none';
      darkness.style.background = 'rgba(0,0,0,0)';
      chestOpenProgress = 0;
      chestLidPivot.rotation.x = 0;
      victoryBurstStarted = false;
      victoryCoins.visible = false;

      if (mixer && idleAction) {
        idleAction.reset().play();
      }

      updateHUD();
    }

    attackBtn.addEventListener('click', playerAttack);
    healBtn.addEventListener('click', playerHeal);
    restartBtn.addEventListener('click', resetBattle);

    addLog('新的战斗开始。巨龙守护着宝箱。');
    updateHUD();

    function animateParticles(points, delta, behavior = 'rise') {
      if (!points.visible) return;
      const pos = points.geometry.attributes.position.array;
      for (let i = 0; i < points.userData.velocities.length; i++) {
        const v = points.userData.velocities[i];
        pos[i * 3 + 0] += v.x * delta * 60;
        pos[i * 3 + 1] += v.y * delta * 60;
        pos[i * 3 + 2] += v.z * delta * 60;

        if (behavior === 'rise') {
          if (pos[i * 3 + 1] > 1.4) {
            pos[i * 3 + 0] = (Math.random() - 0.5) * 1.1;
            pos[i * 3 + 1] = 0;
            pos[i * 3 + 2] = (Math.random() - 0.5) * 0.8;
          }
        } else if (behavior === 'burst') {
          v.y -= 0.0016;
        }
      }
      points.geometry.attributes.position.needsUpdate = true;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;

      controls.update();

      torch1.intensity = 32 + Math.sin(elapsed * 7.5) * 3 + Math.random() * 1.5;
      torch2.intensity = 26 + Math.sin(elapsed * 6.7 + 1.2) * 2.6 + Math.random() * 1.2;
      torch3.intensity = 16 + Math.sin(elapsed * 8.1 + 2.4) * 2;

      animateParticles(chestParticles, delta, 'rise');
      animateParticles(healParticles, delta, 'burst');
      animateParticles(victoryCoins, delta, 'burst');

      if (dragon) {
        if (mixer) mixer.update(delta);

        if (!dragonLoadedWithAnimations && state.battleState === 'fighting') {
          dragon.position.y = dragonBaseY + Math.sin(elapsed * 2.2) * 0.12;
        }

        if (dragonAttackLean > 0) {
          dragonAttackLean -= delta * 2.5;
          const lean = Math.sin((0.45 - dragonAttackLean) * 10) * 0.18;
          dragon.rotation.x = lean;
        } else if (!dragonLoadedWithAnimations) {
          dragon.rotation.x = 0;
        }
      }

      if (dragonFlashTime > 0) {
        dragonFlashTime -= delta;
        if (dragonFlashTime <= 0) {
          dragonMaterials.forEach(mat => {
            if ('emissive' in mat && mat.userData.originalEmissive) {
              mat.emissive.copy(mat.userData.originalEmissive);
            }
          });
        }
      }

      if (shakeTime > 0) {
        shakeTime -= delta;
        const intensity = shakeStrength * Math.max(shakeTime / 0.3, 0);
        camera.position.set(
          baseCameraPos.x + (Math.random() - 0.5) * intensity,
          baseCameraPos.y + (Math.random() - 0.5) * intensity,
          baseCameraPos.z + (Math.random() - 0.5) * intensity
        );
      } else {
        camera.position.lerp(baseCameraPos, 0.1);
      }

      if (chestOpenProgress > 0) {
        chestLidPivot.rotation.x = -Math.PI / 2.8 * chestOpenProgress;
      }

      if (victoryBurstStarted) {
        victoryCoins.material.opacity = Math.max(0, victoryCoins.material.opacity - delta * 0.18);
      }

      coinGroup.children.forEach((coin, i) => {
        coin.rotation.z += 0.01 + (i % 4) * 0.002;
      });

      updateExposedState();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
