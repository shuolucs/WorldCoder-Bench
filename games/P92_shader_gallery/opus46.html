<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui {
    position: fixed; top: 10px; left: 10px; z-index: 100;
    background: rgba(0,0,0,0.7); color: #fff; padding: 12px 16px;
    border-radius: 8px; font-size: 14px; min-width: 200px;
  }
  #ui label { display: block; margin-bottom: 6px; }
  #speedSlider { width: 100%; cursor: pointer; }
  #fpsDisplay { margin-top: 8px; font-size: 13px; color: #0f0; }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 13px; z-index: 100;
    pointer-events: none; transition: opacity 0.3s;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <label>Animation Speed
    <input type="range" id="speedSlider" min="0" max="3" step="0.01" value="1">
  </label>
  <div id="fpsDisplay">FPS: --</div>
</div>
<div id="hint">Click a painting to zoom in · ESC or click elsewhere to return</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ State ============
window.__3D_STATE__ = {
  paintingCount: 6,
  selectedPainting: null,
  speed: 1,
  fps: 0
};

// ============ Scene Setup ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.85;
controls.minDistance = 1;
controls.maxDistance = 12;
controls.target.set(0, 2, 0);

// ============ Lights ============
const ambient = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambient);

const mainLight = new THREE.PointLight(0xffeedd, 1.5, 20);
mainLight.position.set(0, 4.5, 0);
mainLight.castShadow = true;
scene.add(mainLight);

// Spot lights for paintings
const spotPositions = [
  [-4, 4.5, -4.5], [0, 4.5, -4.5], [4, 4.5, -4.5],
  [-5.5, 4.5, -1], [-5.5, 4.5, 3], [5.5, 4.5, 1]
];

spotPositions.forEach((pos, i) => {
  const spot = new THREE.SpotLight(0xfff5e0, 2, 10, Math.PI / 6, 0.5);
  spot.position.set(pos[0], pos[1], pos[2]);
  const paintingPos = getPaintingTransform(i);
  spot.target.position.set(paintingPos.pos[0], paintingPos.pos[1], paintingPos.pos[2]);
  scene.add(spot);
  scene.add(spot.target);
});

// ============ Room ============
const roomW = 12, roomH = 5.5, roomD = 10;

// Floor
const floorGeo = new THREE.PlaneGeometry(roomW, roomD);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x2a2a3a, roughness: 0.3, metalness: 0.1
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// Ceiling
const ceilGeo = new THREE.PlaneGeometry(roomW, roomD);
const ceilMat = new THREE.MeshStandardMaterial({ color: 0x1e1e30, roughness: 0.9 });
const ceiling = new THREE.Mesh(ceilGeo, ceilMat);
ceiling.rotation.x = Math.PI / 2;
ceiling.position.y = roomH;
scene.add(ceiling);

// Walls
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2d2d44, roughness: 0.8, side: THREE.DoubleSide });

// Back wall
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallMat);
backWall.position.set(0, roomH / 2, -roomD / 2);
scene.add(backWall);

// Front wall (with opening feel - just make it)
const frontWall = new THREE.Mesh(new THREE.PlaneGeometry(roomW, roomH), wallMat);
frontWall.position.set(0, roomH / 2, roomD / 2);
frontWall.rotation.y = Math.PI;
scene.add(frontWall);

// Left wall
const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
leftWall.position.set(-roomW / 2, roomH / 2, 0);
leftWall.rotation.y = Math.PI / 2;
scene.add(leftWall);

// Right wall
const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(roomD, roomH), wallMat);
rightWall.position.set(roomW / 2, roomH / 2, 0);
rightWall.rotation.y = -Math.PI / 2;
scene.add(rightWall);

// ============ Shader Definitions ============
const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

// Shader 0: Plasma waves
const fragShader0 = `
  uniform float uTime;
  varying vec2 vUv;
  void main() {
    vec2 uv = vUv;
    float v = 0.0;
    v += sin(uv.x * 10.0 + uTime);
    v += sin((uv.y * 10.0 + uTime) * 0.5);
    v += sin((uv.x * 10.0 + uv.y * 10.0 + uTime) * 0.5);
    float cx = uv.x + 0.5 * sin(uTime * 0.3);
    float cy = uv.y + 0.5 * cos(uTime * 0.4);
    v += sin(sqrt(100.0 * (cx * cx + cy * cy)) - uTime);
    v *= 0.5;
    vec3 col = vec3(
      sin(v * 3.14159) * 0.5 + 0.5,
      sin(v * 3.14159 + 2.094) * 0.5 + 0.5,
      sin(v * 3.14159 + 4.188) * 0.5 + 0.5
    );
    gl_FragColor = vec4(col, 1.0);
  }
`;

// Shader 1: Voronoi cells
const fragShader1 = `
  uniform float uTime;
  varying vec2 vUv;
  vec2 random2(vec2 p) {
    return fract(sin(vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)))) * 43758.5453);
  }
  void main() {
    vec2 uv = vUv * 5.0;
    vec2 iuv = floor(uv);
    vec2 fuv = fract(uv);
    float minDist = 1.0;
    vec2 minPoint;
    for (int y = -1; y <= 1; y++) {
      for (int x = -1; x <= 1; x++) {
        vec2 neighbor = vec2(float(x), float(y));
        vec2 point = random2(iuv + neighbor);
        point = 0.5 + 0.5 * sin(uTime * 0.8 + 6.2831 * point);
        float dist = length(neighbor + point - fuv);
        if (dist < minDist) {
          minDist = dist;
          minPoint = point;
        }
      }
    }
    vec3 col = vec3(0.0);
    col += 0.5 + 0.5 * sin(minDist * 8.0 + vec3(0.0, 1.0, 2.0) + uTime);
    col *= 1.0 - 0.4 * minDist;
    gl_FragColor = vec4(col, 1.0);
  }
`;

// Shader 2: Fractal Mandelbrot zoom
const fragShader2 = `
  uniform float uTime;
  varying vec2 vUv;
  void main() {
    float zoom = 2.0 + 1.5 * sin(uTime * 0.2);
    vec2 c = (vUv - 0.5) * zoom + vec2(-0.745, 0.186);
    vec2 z = vec2(0.0);
    float iter = 0.0;
    for (int i = 0; i < 64; i++) {
      z = vec2(z.x * z.x - z.y * z.y, 2.0 * z.x * z.y) + c;
      if (dot(z, z) > 4.0) break;
      iter += 1.0;
    }
    float t = iter / 64.0;
    vec3 col = 0.5 + 0.5 * cos(6.2831 * (t * 2.0 + vec3(0.0, 0.33, 0.67) + uTime * 0.1));
    if (iter >= 63.0) col = vec3(0.0);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// Shader 3: Kaleidoscope
const fragShader3 = `
  uniform float uTime;
  varying vec2 vUv;
  void main() {
    vec2 uv = vUv - 0.5;
    float a = atan(uv.y, uv.x);
    float r = length(uv);
    float segments = 8.0;
    a = mod(a, 6.2831 / segments);
    a = abs(a - 3.14159 / segments);
    vec2 p = vec2(cos(a), sin(a)) * r;
    float pattern = 0.0;
    pattern += sin(p.x * 20.0 + uTime * 2.0) * 0.5;
    pattern += sin(p.y * 15.0 - uTime * 1.5) * 0.5;
    pattern += sin((p.x + p.y) * 10.0 + uTime) * 0.5;
    pattern += sin(r * 30.0 - uTime * 3.0) * 0.3;
    vec3 col = vec3(
      0.5 + 0.5 * sin(pattern * 3.0 + uTime),
      0.5 + 0.5 * sin(pattern * 3.0 + uTime + 2.094),
      0.5 + 0.5 * sin(pattern * 3.0 + uTime + 4.188)
    );
    col *= smoothstep(0.5, 0.1, r);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// Shader 4: Ocean / water ripples
const fragShader4 = `
  uniform float uTime;
  varying vec2 vUv;
  void main() {
    vec2 uv = vUv * 6.0;
    float wave = 0.0;
    for (float i = 1.0; i <= 5.0; i++) {
      float freq = i * 1.5;
      float speed = i * 0.4;
      wave += sin(uv.x * freq + uTime * speed) / i;
      wave += sin(uv.y * freq * 0.8 + uTime * speed * 1.3) / i;
      uv = mat2(0.866, -0.5, 0.5, 0.866) * uv;
    }
    wave = wave * 0.5 + 0.5;
    vec3 deep = vec3(0.0, 0.05, 0.2);
    vec3 shallow = vec3(0.0, 0.4, 0.6);
    vec3 foam = vec3(0.8, 0.9, 1.0);
    vec3 col = mix(deep, shallow, wave);
    col = mix(col, foam, smoothstep(0.75, 0.95, wave));
    col += 0.05 * sin(uTime + vUv.x * 50.0) * sin(uTime * 1.3 + vUv.y * 50.0);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// Shader 5: Neon grid / retro synthwave
const fragShader5 = `
  uniform float uTime;
  varying vec2 vUv;
  void main() {
    vec2 uv = vUv;
    vec3 col = vec3(0.02, 0.0, 0.05);
    
    // Perspective grid
    float y = uv.y;
    float perspective = 1.0 / (1.1 - y * 0.9);
    float gridX = sin((uv.x - 0.5) * perspective * 20.0 + uTime * 0.5);
    float gridY = sin(perspective * 5.0 - uTime * 3.0);
    
    float lineX = smoothstep(0.0, 0.05, abs(gridX)) ;
    lineX = 1.0 - lineX;
    float lineY = smoothstep(0.0, 0.05, abs(gridY));
    lineY = 1.0 - lineY;
    
    float grid = max(lineX, lineY) * smoothstep(0.0, 0.5, y);
    
    col += grid * vec3(1.0, 0.0, 0.8) * 0.8;
    col += grid * vec3(0.0, 0.5, 1.0) * 0.3;
    
    // Sun
    float sunDist = length(vec2(uv.x - 0.5, (uv.y - 0.35) * 1.5));
    float sun = smoothstep(0.2, 0.18, sunDist);
    float sunLines = step(0.5, sin(uv.y * 80.0 + uTime));
    sun *= mix(1.0, 0.6, sunLines * step(uv.y, 0.35));
    col += sun * mix(vec3(1.0, 0.8, 0.0), vec3(1.0, 0.0, 0.5), smoothstep(0.25, 0.45, uv.y));
    
    // Glow
    col += vec3(0.5, 0.0, 0.3) * smoothstep(0.5, 0.0, abs(uv.y - 0.5)) * 0.2;
    
    gl_FragColor = vec4(col, 1.0);
  }
`;

const fragmentShaders = [fragShader0, fragShader1, fragShader2, fragShader3, fragShader4, fragShader5];

// ============ Painting Placement ============
function getPaintingTransform(index) {
  const paintingW = 2.4, paintingH = 1.8;
  const wallY = 2.5;
  const transforms = [
    // Back wall: 3 paintings
    { pos: [-3.5, wallY, -roomD/2 + 0.05], rot: [0, 0, 0] },
    { pos: [0, wallY, -roomD/2 + 0.05], rot: [0, 0, 0] },
    { pos: [3.5, wallY, -roomD/2 + 0.05], rot: [0, 0, 0] },
    // Left wall: 2 paintings
    { pos: [-roomW/2 + 0.05, wallY, -1.5], rot: [0, Math.PI/2, 0] },
    { pos: [-roomW/2 + 0.05, wallY, 2.5], rot: [0, Math.PI/2, 0] },
    // Right wall: 1 painting
    { pos: [roomW/2 - 0.05, wallY, 0.5], rot: [0, -Math.PI/2, 0] },
  ];
  return transforms[index];
}

// ============ Create Paintings ============
const paintings = [];
const shaderMaterials = [];
const paintingMeshes = [];
const frameGroup = new THREE.Group();
scene.add(frameGroup);

const paintingW = 2.4, paintingH = 1.8;

for (let i = 0; i < 6; i++) {
  const transform = getPaintingTransform(i);
  
  // Shader material
  const mat = new THREE.ShaderMaterial({
    vertexShader,
    fragmentShader: fragmentShaders[i],
    uniforms: {
      uTime: { value: 0 }
    }
  });
  shaderMaterials.push(mat);
  
  // Painting plane
  const planeGeo = new THREE.PlaneGeometry(paintingW, paintingH);
  const planeMesh = new THREE.Mesh(planeGeo, mat);
  planeMesh.userData.paintingIndex = i;
  
  // Frame
  const frameDepth = 0.08;
  const frameBorder = 0.12;
  const frameShape = new THREE.Shape();
  const fw = paintingW / 2 + frameBorder;
  const fh = paintingH / 2 + frameBorder;
  frameShape.moveTo(-fw, -fh);
  frameShape.lineTo(fw, -fh);
  frameShape.lineTo(fw, fh);
  frameShape.lineTo(-fw, fh);
  frameShape.lineTo(-fw, -fh);
  
  const hole = new THREE.Path();
  hole.moveTo(-paintingW/2, -paintingH/2);
  hole.lineTo(paintingW/2, -paintingH/2);
  hole.lineTo(paintingW/2, paintingH/2);
  hole.lineTo(-paintingW/2, paintingH/2);
  hole.lineTo(-paintingW/2, -paintingH/2);
  frameShape.holes.push(hole);
  
  const frameGeo = new THREE.ExtrudeGeometry(frameShape, { depth: frameDepth, bevelEnabled: true, bevelThickness: 0.02, bevelSize: 0.02, bevelSegments: 2 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xc9a84c, roughness: 0.3, metalness: 0.7 });
  const frameMesh = new THREE.Mesh(frameGeo, frameMat);
  frameMesh.castShadow = true;
  
  // Group
  const group = new THREE.Group();
  planeMesh.position.z = frameDepth / 2;
  frameMesh.position.z = -frameDepth / 2;
  group.add(planeMesh);
  group.add(frameMesh);
  
  group.position.set(transform.pos[0], transform.pos[1], transform.pos[2]);
  group.rotation.set(transform.rot[0], transform.rot[1], transform.rot[2]);
  
  frameGroup.add(group);
  paintings.push(group);
  paintingMeshes.push(planeMesh);
}

// ============ Decorative Elements ============
// Bench in center
const benchGeo = new THREE.BoxGeometry(2, 0.5, 0.8);
const benchMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.5 });
const bench = new THREE.Mesh(benchGeo, benchMat);
bench.position.set(0, 0.25, 2);
bench.castShadow = true;
bench.receiveShadow = true;
scene.add(bench);

// Bench legs
for (let dx of [-0.8, 0.8]) {
  for (let dz of [-0.3, 0.3]) {
    const leg = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, 0.5),
      new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    leg.position.set(dx, 0.25, 2 + dz);
    scene.add(leg);
  }
}

// ============ Camera Animation ============
let cameraState = {
  isAnimating: false,
  startPos: new THREE.Vector3(),
  endPos: new THREE.Vector3(),
  startTarget: new THREE.Vector3(),
  endTarget: new THREE.Vector3(),
  progress: 0,
  duration: 1.0
};

const defaultCamPos = new THREE.Vector3(0, 2, 6);
const defaultTarget = new THREE.Vector3(0, 2, 0);

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function animateCameraTo(targetPos, lookAtPos) {
  cameraState.startPos.copy(camera.position);
  cameraState.endPos.copy(targetPos);
  cameraState.startTarget.copy(controls.target);
  cameraState.endTarget.copy(lookAtPos);
  cameraState.progress = 0;
  cameraState.isAnimating = true;
  controls.enabled = false;
}

function selectPainting(index) {
  if (index === null || index === undefined) {
    // Deselect
    window.__3D_STATE__.selectedPainting = null;
    animateCameraTo(defaultCamPos, defaultTarget);
    return;
  }
  
  if (index < 0 || index > 5) return;
  
  window.__3D_STATE__.selectedPainting = index;
  
  const transform = getPaintingTransform(index);
  const paintingPos = new THREE.Vector3(transform.pos[0], transform.pos[1], transform.pos[2]);
  
  // Camera position: offset from painting along its normal
  const normal = new THREE.Vector3(0, 0, 1);
  const euler = new THREE.Euler(transform.rot[0], transform.rot[1], transform.rot[2]);
  normal.applyEuler(euler);
  
  const camPos = paintingPos.clone().add(normal.multiplyScalar(2.5));
  camPos.y = transform.pos[1];
  
  animateCameraTo(camPos, paintingPos);
}

// ============ ICG API ============
window.__ICG_selectPainting__ = function(i) {
  if (i === null || i === undefined) {
    selectPainting(null);
  } else {
    selectPainting(i);
  }
};

// ============ Raycaster ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (cameraState.isAnimating) return;
  
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(paintingMeshes);
  
  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.paintingIndex;
    if (window.__3D_STATE__.selectedPainting === idx) {
      // Clicking same painting deselects
      selectPainting(null);
    } else {
      selectPainting(idx);
    }
  } else {
    // Click on empty space
    if (window.__3D_STATE__.selectedPainting !== null) {
      selectPainting(null);
    }
  }
});

// ESC to deselect
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && window.__3D_STATE__.selectedPainting !== null) {
    selectPainting(null);
  }
});

// ============ Speed Slider ============
const speedSlider = document.getElementById('speedSlider');
speedSlider.addEventListener('input', () => {
  window.__3D_STATE__.speed = parseFloat(speedSlider.value);
});

// ============ FPS ============
const fpsDisplay = document.getElementById('fpsDisplay');
const frameTimes = [];
const FPS_SAMPLES = 30;

// ============ Resize ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ Animation Loop ============
let globalTime = 0;
let lastTime = performance.now();

function animate(now) {
  requestAnimationFrame(animate);
  
  const dt = (now - lastTime) / 1000;
  lastTime = now;
  
  // FPS calculation
  frameTimes.push(dt);
  if (frameTimes.length > FPS_SAMPLES) frameTimes.shift();
  const avgDt = frameTimes.reduce((a, b) => a + b, 0) / frameTimes.length;
  const fps = Math.round(1 / avgDt);
  window.__3D_STATE__.fps = fps;
  fpsDisplay.textContent = `FPS: ${fps}`;
  
  // Speed
  const speed = window.__3D_STATE__.speed;
  globalTime += dt * speed;
  
  // Update shader uniforms
  for (let i = 0; i < shaderMaterials.length; i++) {
    shaderMaterials[i].uniforms.uTime.value = globalTime;
  }
  
  // Camera animation
  if (cameraState.isAnimating) {
    cameraState.progress += dt / cameraState.duration;
    if (cameraState.progress >= 1) {
      cameraState.progress = 1;
      cameraState.isAnimating = false;
      controls.enabled = window.__3D_STATE__.selectedPainting === null;
    }
    const t = easeInOutCubic(Math.min(cameraState.progress, 1));
    
    camera.position.lerpVectors(cameraState.startPos, cameraState.endPos, t);
    const currentTarget = new THREE.Vector3().lerpVectors(cameraState.startTarget, cameraState.endTarget, t);
    controls.target.copy(currentTarget);
  }
  
  controls.update();
  renderer.render(scene, camera);
}

animate(performance.now());
</script>
</body>
</html>
