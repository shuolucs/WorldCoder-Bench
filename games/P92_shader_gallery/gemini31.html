<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js Gallery</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type="range"] {
            cursor: pointer;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label for="speedSlider">Animation Speed:</label>
            <input type="range" id="speedSlider" min="0" max="5" step="0.1" value="1">
        </div>
        <div style="font-size: 12px; color: #aaa;">Click a painting to zoom. Click empty space or ESC to reset.</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            paintingCount: 6,
            selectedPainting: null,
            speed: 1.0,
            fps: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.Fog(0x111111, 10, 40);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        const defaultCameraPos = new THREE.Vector3(0, 5, 12);
        const defaultControlsTarget = new THREE.Vector3(0, 5, 0);
        camera.position.copy(defaultCameraPos);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.target.copy(defaultControlsTarget);
        controls.enableDamping = true;
        controls.maxDistance = 20;
        controls.maxPolarAngle = Math.PI / 2 + 0.1;

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pointLight = new THREE.PointLight(0xffffff, 0.8, 50);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // --- Room Construction ---
        const roomMaterial = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.9 });
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const ceilingMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 1.0 });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), ceilingMaterial);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 12;
        scene.add(ceiling);

        const wallGeo = new THREE.PlaneGeometry(30, 12);
        const backWall = new THREE.Mesh(wallGeo, roomMaterial);
        backWall.position.set(0, 6, -15);
        scene.add(backWall);

        const frontWall = new THREE.Mesh(wallGeo, roomMaterial);
        frontWall.position.set(0, 6, 15);
        frontWall.rotation.y = Math.PI;
        scene.add(frontWall);

        const leftWall = new THREE.Mesh(wallGeo, roomMaterial);
        leftWall.position.set(-15, 6, 0);
        leftWall.rotation.y = Math.PI / 2;
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(wallGeo, roomMaterial);
        rightWall.position.set(15, 6, 0);
        rightWall.rotation.y = -Math.PI / 2;
        scene.add(rightWall);

        // --- Shaders ---
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
        `;

        const fragmentShaders = [
            // 0: Color Waves
            `varying vec2 vUv; uniform float u_time;
             void main() {
                 vec3 col = 0.5 + 0.5 * cos(u_time + vUv.xyx * 5.0 + vec3(0, 2, 4));
                 gl_FragColor = vec4(col, 1.0);
             }`,
            // 1: Expanding Rings
            `varying vec2 vUv; uniform float u_time;
             void main() {
                 float d = length(vUv - 0.5);
                 vec3 col = vec3(fract(d * 15.0 - u_time));
                 gl_FragColor = vec4(col, 1.0);
             }`,
            // 2: Polar Swirl
            `varying vec2 vUv; uniform float u_time;
             void main() {
                 vec2 p = vUv * 2.0 - 1.0;
                 float a = atan(p.y, p.x);
                 float r = length(p);
                 vec3 col = vec3(sin(a * 6.0 + u_time) * 0.5 + 0.5, cos(r * 12.0 - u_time) * 0.5 + 0.5, 0.8);
                 gl_FragColor = vec4(col, 1.0);
             }`,
            // 3: Wavy Stripes
            `varying vec2 vUv; uniform float u_time;
             void main() {
                 vec2 p = vUv;
                 p.x += sin(p.y * 15.0 + u_time) * 0.05;
                 float c = step(0.5, fract(p.x * 8.0));
                 gl_FragColor = vec4(vec3(c * 0.8 + 0.1, 0.2, 0.4), 1.0);
             }`,
            // 4: Rotating Checkerboard
            `varying vec2 vUv; uniform float u_time;
             void main() {
                 vec2 p = vUv - 0.5;
                 float s = sin(u_time * 0.5), c = cos(u_time * 0.5);
                 p = mat2(c, -s, s, c) * p;
                 float chk = step(0.5, fract(p.x * 6.0)) * step(0.5, fract(p.y * 6.0));
                 chk += step(0.5, fract(p.x * 6.0 + 0.5)) * step(0.5, fract(p.y * 6.0 + 0.5));
                 gl_FragColor = vec4(vec3(chk * 0.9), 1.0);
             }`,
            // 5: Plasma Blobs
            `varying vec2 vUv; uniform float u_time;
             void main() {
                 vec2 p = vUv * 2.0 - 1.0;
                 float v = sin(p.x * 5.0 + u_time) + cos(p.y * 5.0 + u_time) + sin((p.x + p.y) * 5.0 - u_time);
                 vec3 col = mix(vec3(0.1, 0.5, 0.9), vec3(0.9, 0.2, 0.1), sin(v) * 0.5 + 0.5);
                 gl_FragColor = vec4(col, 1.0);
             }`
        ];

        // --- Paintings Setup ---
        const paintings = [];
        const paintingGeo = new THREE.PlaneGeometry(4, 3);
        const frameGeo = new THREE.PlaneGeometry(4.4, 3.4);
        const frameMat = new THREE.MeshBasicMaterial({ color: 0x050505 });

        const paintingConfigs = [
            { pos: [-14.9, 5, -6], rot: [0, Math.PI / 2, 0] },
            { pos: [-14.9, 5, 6], rot: [0, Math.PI / 2, 0] },
            { pos: [14.9, 5, -6], rot: [0, -Math.PI / 2, 0] },
            { pos: [14.9, 5, 6], rot: [0, -Math.PI / 2, 0] },
            { pos: [-6, 5, -14.9], rot: [0, 0, 0] },
            { pos: [6, 5, -14.9], rot: [0, 0, 0] }
        ];

        paintingConfigs.forEach((config, i) => {
            const group = new THREE.Group();
            group.position.set(...config.pos);
            group.rotation.set(...config.rot);

            const frame = new THREE.Mesh(frameGeo, frameMat);
            group.add(frame);

            const material = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader: fragmentShaders[i],
                uniforms: { u_time: { value: 0 } }
            });

            const painting = new THREE.Mesh(paintingGeo, material);
            painting.position.z = 0.01; // Slightly in front of frame
            group.add(painting);
            scene.add(group);

            paintings.push(painting);
        });

        // --- Interaction & Tweening ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let tween = null;

        function easeInOutCubic(x) {
            return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
        }

        function startCameraTween(targetPos, targetLookAt) {
            tween = {
                progress: 0,
                startPos: camera.position.clone(),
                endPos: targetPos.clone(),
                startLookAt: controls.target.clone(),
                endLookAt: targetLookAt.clone()
            };
            controls.enabled = false;
        }

        window.__ICG_selectPainting__ = (index) => {
            if (index === null || index < 0 || index >= window.__3D_STATE__.paintingCount) {
                window.__3D_STATE__.selectedPainting = null;
                startCameraTween(defaultCameraPos, defaultControlsTarget);
            } else {
                window.__3D_STATE__.selectedPainting = index;
                const p = paintings[index];
                const worldPos = new THREE.Vector3();
                p.getWorldPosition(worldPos);
                
                const groupRot = p.parent.rotation;
                const normal = new THREE.Vector3(0, 0, 1).applyEuler(groupRot);
                
                const targetCamPos = worldPos.clone().add(normal.multiplyScalar(4));
                startCameraTween(targetCamPos, worldPos);
            }
        };

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(paintings);
            
            if (intersects.length > 0) {
                const index = paintings.indexOf(intersects[0].object);
                window.__ICG_selectPainting__(index);
            } else {
                window.__ICG_selectPainting__(null);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                window.__ICG_selectPainting__(null);
            }
        });

        // --- UI Events ---
        const speedSlider = document.getElementById('speedSlider');
        speedSlider.addEventListener('input', (e) => {
            window.__3D_STATE__.speed = parseFloat(e.target.value);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        let lastTime = performance.now();
        let globalTime = 0;
        const fpsHistory = [];

        function animate() {
            requestAnimationFrame(animate);

            const now = performance.now();
            const dt = now - lastTime;
            lastTime = now;

            // FPS Calculation
            if (dt > 0) {
                fpsHistory.push(1000 / dt);
                if (fpsHistory.length > 30) fpsHistory.shift();
                window.__3D_STATE__.fps = Math.round(fpsHistory.reduce((a, b) => a + b, 0) / fpsHistory.length);
            }

            // Shader Animation
            globalTime += (dt / 1000) * window.__3D_STATE__.speed;
            paintings.forEach(p => {
                p.material.uniforms.u_time.value = globalTime;
            });

            // Camera Tweening
            if (tween) {
                tween.progress += (dt / 1000) * 1.5; // 0.66s duration
                if (tween.progress >= 1.0) {
                    camera.position.copy(tween.endPos);
                    controls.target.copy(tween.endLookAt);
                    controls.enabled = true;
                    tween = null;
                } else {
                    const t = easeInOutCubic(tween.progress);
                    camera.position.lerpVectors(tween.startPos, tween.endPos, t);
                    controls.target.lerpVectors(tween.startLookAt, tween.endLookAt, t);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
