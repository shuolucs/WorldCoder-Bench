<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Shader Gallery</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
      padding: 10px 12px;
      border-radius: 10px;
      min-width: 220px;
      user-select: none;
    }

    #ui .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }

    #ui label {
      font-size: 14px;
      white-space: nowrap;
    }

    #speedSlider {
      width: 140px;
    }

    #hint {
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.4;
      margin-top: 6px;
    }

    #title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    #selectedLabel {
      font-size: 12px;
      opacity: 0.85;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="ui">
      <div id="title">Shader 画廊</div>
      <div class="row">
        <label for="speedSlider">动画速度</label>
        <input id="speedSlider" type="range" min="0" max="3" step="0.01" value="1" />
        <span id="speedValue">1.00</span>
      </div>
      <div class="row">
        <label>FPS</label>
        <span id="fpsText">0.0</span>
      </div>
      <div id="selectedLabel">当前选中：无</div>
      <div id="hint">
        点击画框放大查看；点击空白处或按 ESC 退出。<br />
        鼠标拖拽可旋转，滚轮缩放。
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const speedSlider = document.getElementById('speedSlider');
    const speedValue = document.getElementById('speedValue');
    const fpsText = document.getElementById('fpsText');
    const selectedLabel = document.getElementById('selectedLabel');

    window.__3D_STATE__ = {
      paintingCount: 6,
      selectedPainting: null,
      speed: parseFloat(speedSlider.value),
      fps: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0f0f12);
    scene.fog = new THREE.Fog(0x0f0f12, 10, 28);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2.6, 9.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2.2, 0);
    controls.enableDamping = true;
    controls.minDistance = 3;
    controls.maxDistance = 18;
    controls.maxPolarAngle = Math.PI * 0.49;

    const ambient = new THREE.AmbientLight(0xffffff, 1.2);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 1.6);
    dir.position.set(4, 8, 6);
    scene.add(dir);

    const point1 = new THREE.PointLight(0xfff1cc, 30, 20, 2);
    point1.position.set(-4, 4.5, 1);
    scene.add(point1);

    const point2 = new THREE.PointLight(0xccddff, 24, 20, 2);
    point2.position.set(4, 4.2, -1);
    scene.add(point2);

    const room = new THREE.Group();
    scene.add(room);

    const floorMat = new THREE.MeshStandardMaterial({
      color: 0x707070,
      roughness: 0.9,
      metalness: 0.05
    });
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    room.add(floor);

    const ceilingMat = new THREE.MeshStandardMaterial({
      color: 0x2b2c30,
      roughness: 0.95,
      metalness: 0
    });
    const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(14, 14), ceilingMat);
    ceiling.rotation.x = Math.PI / 2;
    ceiling.position.y = 5.5;
    room.add(ceiling);

    const wallMat = new THREE.MeshStandardMaterial({
      color: 0xd9d4cc,
      roughness: 0.95,
      metalness: 0.02
    });

    const backWall = new THREE.Mesh(new THREE.PlaneGeometry(14, 5.5), wallMat);
    backWall.position.set(0, 2.75, -7);
    room.add(backWall);

    const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(14, 5.5), wallMat);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-7, 2.75, 0);
    room.add(leftWall);

    const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(14, 5.5), wallMat);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(7, 2.75, 0);
    room.add(rightWall);

    const baseVertexShader = `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    function fragmentShader0() {
      return `
        uniform float uTime;
        varying vec2 vUv;

        void main() {
          vec2 uv = vUv * 2.0 - 1.0;
          float a = atan(uv.y, uv.x);
          float r = length(uv);
          float wave = sin(10.0 * r - uTime * 3.0 + a * 3.0);
          vec3 c1 = vec3(0.10, 0.20, 0.80);
          vec3 c2 = vec3(1.00, 0.50, 0.10);
          vec3 col = mix(c1, c2, 0.5 + 0.5 * wave);
          col *= smoothstep(1.1, 0.2, r);
          gl_FragColor = vec4(col, 1.0);
        }
      `;
    }

    function fragmentShader1() {
      return `
        uniform float uTime;
        varying vec2 vUv;

        float grid(vec2 uv, float scale) {
          vec2 gv = fract(uv * scale) - 0.5;
          vec2 id = floor(uv * scale);
          float t = uTime * 1.7;
          gv.x += 0.15 * sin(t + id.y * 0.7);
          gv.y += 0.15 * cos(t + id.x * 0.7);
          float d = min(abs(gv.x), abs(gv.y));
          return smoothstep(0.08, 0.0, d);
        }

        void main() {
          vec2 uv = vUv;
          float g1 = grid(uv, 8.0);
          float g2 = grid(uv + 0.13, 14.0) * 0.5;
          vec3 bg = vec3(0.05, 0.05, 0.08);
          vec3 line = vec3(0.2 + 0.8 * uv.x, 0.8 * uv.y, 1.0);
          vec3 col = bg + line * (g1 + g2);
          gl_FragColor = vec4(col, 1.0);
        }
      `;
    }

    function fragmentShader2() {
      return `
        uniform float uTime;
        varying vec2 vUv;

        float circle(vec2 uv, vec2 p, float r) {
          return smoothstep(r, r - 0.01, length(uv - p));
        }

        void main() {
          vec2 uv = vUv;
          vec3 col = vec3(0.08, 0.06, 0.10);

          for (int i = 0; i < 7; i++) {
            float fi = float(i);
            vec2 p = vec2(
              0.5 + 0.32 * sin(uTime * 0.7 + fi * 1.33),
              0.5 + 0.32 * cos(uTime * 1.1 + fi * 0.97)
            );
            float r = 0.10 + 0.04 * sin(uTime * 1.5 + fi * 2.1);
            vec3 cc = 0.5 + 0.5 * cos(vec3(0.0, 2.0, 4.0) + fi * 1.2 + uTime);
            col += cc * circle(uv, p, r);
          }

          col = pow(col, vec3(0.9));
          gl_FragColor = vec4(col, 1.0);
        }
      `;
    }

    function fragmentShader3() {
      return `
        uniform float uTime;
        varying vec2 vUv;

        float stripe(float x) {
          return 0.5 + 0.5 * sin(x);
        }

        void main() {
          vec2 uv = vUv * 2.0 - 1.0;
          float ang = 1.2 + 0.5 * sin(uTime * 0.7);
          mat2 rot = mat2(cos(ang), -sin(ang), sin(ang), cos(ang));
          uv = rot * uv;

          float s1 = stripe(uv.x * 20.0 + uTime * 3.0);
          float s2 = stripe(uv.y * 26.0 - uTime * 2.2);
          float s3 = stripe((uv.x + uv.y) * 18.0 + uTime * 1.5);

          vec3 col = vec3(s1, s2, s3);
          col = mix(col, col.bgr, 0.5 + 0.5 * sin(uTime + uv.xyx * 2.0).x);
          gl_FragColor = vec4(col, 1.0);
        }
      `;
    }

    function fragmentShader4() {
      return `
        uniform float uTime;
        varying vec2 vUv;

        float box(vec2 uv, vec2 b) {
          vec2 d = abs(uv) - b;
          return length(max(d, 0.0)) + min(max(d.x, d.y), 0.0);
        }

        void main() {
          vec2 uv = vUv * 2.0 - 1.0;
          vec3 col = vec3(0.03, 0.04, 0.06);

          for (int i = 0; i < 9; i++) {
            float fi = float(i);
            vec2 p = vec2(
              sin(uTime * 0.6 + fi * 1.2) * 0.55,
              cos(uTime * 0.9 + fi * 1.6) * 0.55
            );
            float a = uTime * 0.8 + fi;
            mat2 r = mat2(cos(a), -sin(a), sin(a), cos(a));
            vec2 q = r * (uv - p);
            float d = box(q, vec2(0.12 + 0.03 * sin(fi + uTime), 0.06 + 0.02 * cos(fi * 2.0 + uTime)));
            float m = smoothstep(0.03, 0.0, d);
            vec3 cc = 0.5 + 0.5 * cos(vec3(0.5, 1.8, 3.4) + fi * 0.8 + uTime * 1.4);
            col += cc * m;
          }

          gl_FragColor = vec4(col, 1.0);
        }
      `;
    }

    function fragmentShader5() {
      return `
        uniform float uTime;
        varying vec2 vUv;

        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
        }

        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          float a = hash(i);
          float b = hash(i + vec2(1.0, 0.0));
          float c = hash(i + vec2(0.0, 1.0));
          float d = hash(i + vec2(1.0, 1.0));
          vec2 u = f * f * (3.0 - 2.0 * f);
          return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
        }

        void main() {
          vec2 uv = vUv * 3.0;
          float t = uTime * 0.8;
          float n = 0.0;
          n += 0.55 * noise(uv + vec2(t, 0.0));
          n += 0.25 * noise(uv * 2.0 - vec2(0.0, t * 1.3));
          n += 0.20 * noise(uv * 4.0 + vec2(t * 0.7, t * 0.4));

          float bands = smoothstep(0.35, 0.85, n + 0.15 * sin((vUv.y + n) * 18.0 - t * 5.0));
          vec3 deep = vec3(0.02, 0.08, 0.20);
          vec3 bright = vec3(0.20, 0.95, 0.85);
          vec3 col = mix(deep, bright, bands);
          col += 0.15 * vec3(1.0, 0.5, 0.1) * smoothstep(0.8, 1.0, n);
          gl_FragColor = vec4(col, 1.0);
        }
      `;
    }

    const shaderFns = [
      fragmentShader0,
      fragmentShader1,
      fragmentShader2,
      fragmentShader3,
      fragmentShader4,
      fragmentShader5
    ];

    const paintings = [];
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function createPainting(index, position, rotationY = 0) {
      const frameGroup = new THREE.Group();
      frameGroup.position.copy(position);
      frameGroup.rotation.y = rotationY;

      const frameOuter = new THREE.Mesh(
        new THREE.BoxGeometry(2.35, 1.65, 0.10),
        new THREE.MeshStandardMaterial({
          color: 0x3b2618,
          roughness: 0.6,
          metalness: 0.2
        })
      );
      frameGroup.add(frameOuter);

      const mat = new THREE.ShaderMaterial({
        vertexShader: baseVertexShader,
        fragmentShader: shaderFns[index](),
        uniforms: {
          uTime: { value: 0 }
        }
      });

      const art = new THREE.Mesh(new THREE.PlaneGeometry(2.0, 1.3), mat);
      art.position.z = 0.055;
      art.userData.index = index;
      art.userData.frameGroup = frameGroup;
      frameGroup.add(art);

      const matte = new THREE.Mesh(
        new THREE.BoxGeometry(2.08, 1.38, 0.03),
        new THREE.MeshStandardMaterial({
          color: 0xf0ede6,
          roughness: 0.9,
          metalness: 0.0
        })
      );
      matte.position.z = 0.02;
      frameGroup.add(matte);

      frameGroup.userData.index = index;
      frameGroup.userData.art = art;

      scene.add(frameGroup);
      paintings.push({
        index,
        frameGroup,
        art,
        material: mat
      });
    }

    createPainting(0, new THREE.Vector3(-4.2, 2.6, -6.9), 0);
    createPainting(1, new THREE.Vector3(0.0, 2.6, -6.9), 0);
    createPainting(2, new THREE.Vector3(4.2, 2.6, -6.9), 0);

    createPainting(3, new THREE.Vector3(-6.9, 2.6, -3.5), Math.PI / 2);
    createPainting(4, new THREE.Vector3(-6.9, 2.6, 3.5), Math.PI / 2);

    createPainting(5, new THREE.Vector3(6.9, 2.6, 0.0), -Math.PI / 2);

    const tween = {
      active: false,
      fromPos: new THREE.Vector3(),
      toPos: new THREE.Vector3(),
      fromTarget: new THREE.Vector3(),
      toTarget: new THREE.Vector3(),
      start: 0,
      duration: 900
    };

    const galleryView = {
      position: new THREE.Vector3(0, 2.6, 9.5),
      target: new THREE.Vector3(0, 2.2, 0)
    };

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function startCameraTween(toPos, toTarget, duration = 900) {
      tween.active = true;
      tween.fromPos.copy(camera.position);
      tween.fromTarget.copy(controls.target);
      tween.toPos.copy(toPos);
      tween.toTarget.copy(toTarget);
      tween.start = performance.now();
      tween.duration = duration;
    }

    function focusPainting(index) {
      const p = paintings[index];
      if (!p) return;

      const targetWorld = new THREE.Vector3();
      p.art.getWorldPosition(targetWorld);

      const normal = new THREE.Vector3(0, 0, 1).applyQuaternion(p.art.getWorldQuaternion(new THREE.Quaternion())).normalize();
      const camPos = targetWorld.clone().add(normal.clone().multiplyScalar(2.2));
      camPos.y += 0.1;

      window.__3D_STATE__.selectedPainting = index;
      selectedLabel.textContent = `当前选中：${index}`;
      controls.enabled = false;
      startCameraTween(camPos, targetWorld, 800);
    }

    function exitFocus() {
      window.__3D_STATE__.selectedPainting = null;
      selectedLabel.textContent = `当前选中：无`;
      startCameraTween(galleryView.position, galleryView.target, 800);
    }

    function setSelectedPainting(indexOrNull) {
      if (indexOrNull === null) {
        if (window.__3D_STATE__.selectedPainting !== null) {
          exitFocus();
        }
        return;
      }
      if (indexOrNull < 0 || indexOrNull >= paintings.length) return;
      if (window.__3D_STATE__.selectedPainting === indexOrNull) return;
      focusPainting(indexOrNull);
    }

    window.__ICG_selectPainting__ = function(i) {
      setSelectedPainting(i);
    };

    function updateSpeedState() {
      const v = parseFloat(speedSlider.value);
      window.__3D_STATE__.speed = v;
      speedValue.textContent = v.toFixed(2);
    }
    speedSlider.addEventListener('input', updateSpeedState);
    updateSpeedState();

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(paintings.map(p => p.art), false);

      if (intersects.length > 0) {
        const idx = intersects[0].object.userData.index;
        if (window.__3D_STATE__.selectedPainting === idx) {
          return;
        }
        setSelectedPainting(idx);
      } else {
        setSelectedPainting(null);
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        setSelectedPainting(null);
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    const clock = new THREE.Clock();
    let accumulatedTime = 0;
    let fpsAvg = 60;

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);
      accumulatedTime += delta * window.__3D_STATE__.speed;

      for (const p of paintings) {
        p.material.uniforms.uTime.value = accumulatedTime;
      }

      const instantFps = 1 / Math.max(delta, 1e-6);
      fpsAvg = fpsAvg * 0.9 + instantFps * 0.1;
      window.__3D_STATE__.fps = fpsAvg;
      fpsText.textContent = fpsAvg.toFixed(1);

      if (tween.active) {
        const now = performance.now();
        let t = (now - tween.start) / tween.duration;
        if (t >= 1) {
          t = 1;
          tween.active = false;
        }
        const e = easeInOutCubic(t);
        camera.position.lerpVectors(tween.fromPos, tween.toPos, e);
        controls.target.lerpVectors(tween.fromTarget, tween.toTarget, e);

        if (!tween.active) {
          if (window.__3D_STATE__.selectedPainting === null) {
            controls.enabled = true;
          }
        }
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
