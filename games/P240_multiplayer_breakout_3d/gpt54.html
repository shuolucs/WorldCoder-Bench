<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Multiplayer Breakout</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #05070d;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .hud {
      position: absolute;
      font-size: 24px;
      color: white;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      user-select: none;
    }

    #score { top: 16px; left: 16px; }
    #lives { top: 16px; right: 16px; }
    #bricks { top: 16px; left: 50%; transform: translateX(-50%); }
    #controlsHint {
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      opacity: 0.9;
    }

    #message {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 56px;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 4px 20px rgba(0,0,0,0.9);
      pointer-events: none;
      white-space: pre-line;
    }

    #subMessage {
      position: absolute;
      left: 50%;
      top: calc(50% + 60px);
      transform: translateX(-50%);
      font-size: 22px;
      text-align: center;
      opacity: 0.95;
      text-shadow: 0 2px 10px rgba(0,0,0,0.9);
      pointer-events: none;
    }

    #buttons {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 20;
      pointer-events: auto;
    }

    button {
      background: rgba(20, 26, 40, 0.9);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,0.35);
    }

    button:hover {
      background: rgba(35, 45, 70, 0.95);
    }

    #powerupInfo {
      position: absolute;
      top: 52px;
      right: 16px;
      font-size: 16px;
      color: #ffd166;
      text-shadow: 0 2px 10px rgba(0,0,0,0.8);
    }

    canvas { display: block; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="buttons">
    <button id="startBtn">Start Game</button>
    <button id="pauseBtn">Pause</button>
    <button id="resetBtn">Reset</button>
  </div>

  <div id="ui">
    <div id="score" class="hud">Score: 0</div>
    <div id="lives" class="hud">Lives: ❤️❤️❤️</div>
    <div id="bricks" class="hud">Bricks: 40/40</div>
    <div id="powerupInfo" class="hud" style="font-size:16px;">Power-Up: None</div>
    <div id="controlsHint" class="hud">P1: A/D | P2: ←/→</div>
    <div id="message">3D MULTIPLAYER BREAKOUT</div>
    <div id="subMessage">Press Start Game</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05070d);
    scene.fog = new THREE.Fog(0x05070d, 25, 55);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
    camera.position.set(0, 25, 30);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.9);
    dir1.position.set(15, 20, 15);
    dir1.castShadow = true;
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.7);
    dir2.position.set(-15, 20, -15);
    scene.add(dir2);

    // Arena constants
    const FIELD_WIDTH = 20;
    const FIELD_DEPTH = 30;
    const HALF_W = FIELD_WIDTH / 2;
    const HALF_D = FIELD_DEPTH / 2;
    const FLOOR_Y = 0;
    const WALL_H = 2;
    const BALL_Y = 0.5;

    // Floor
    const floorGeo = new THREE.BoxGeometry(FIELD_WIDTH, 0.5, FIELD_DEPTH);
    const floorMat = new THREE.MeshStandardMaterial({
      color: '#1a1a2e',
      roughness: 0.85,
      metalness: 0.15
    });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.position.set(0, -0.25, 0);
    floor.receiveShadow = true;
    scene.add(floor);

    // Grid on floor
    const grid = new THREE.GridHelper(FIELD_WIDTH, 20, 0x334155, 0x1f2937);
    grid.position.y = 0.01;
    scene.add(grid);

    // Glass walls
    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0x88ccff,
      transparent: true,
      opacity: 0.18,
      roughness: 0.05,
      metalness: 0.0,
      transmission: 0.9
    });

    const sideWallGeo = new THREE.BoxGeometry(0.3, WALL_H, FIELD_DEPTH);
    const backWallGeo = new THREE.BoxGeometry(FIELD_WIDTH, WALL_H, 0.3);

    const leftWall = new THREE.Mesh(sideWallGeo, glassMat);
    leftWall.position.set(-HALF_W, WALL_H / 2, 0);
    scene.add(leftWall);

    const rightWall = new THREE.Mesh(sideWallGeo, glassMat);
    rightWall.position.set(HALF_W, WALL_H / 2, 0);
    scene.add(rightWall);

    const backWall = new THREE.Mesh(backWallGeo, glassMat);
    backWall.position.set(0, WALL_H / 2, -HALF_D);
    scene.add(backWall);

    // Decorative edge glow
    const edgeMat = new THREE.LineBasicMaterial({ color: 0x88ccff });
    const arenaEdges = new THREE.EdgesGeometry(new THREE.BoxGeometry(FIELD_WIDTH, WALL_H, FIELD_DEPTH));
    const arenaLines = new THREE.LineSegments(arenaEdges, edgeMat);
    arenaLines.position.set(0, WALL_H / 2, 0);
    scene.add(arenaLines);

    // Bricks
    const brickGroup = new THREE.Group();
    scene.add(brickGroup);

    const brickColors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db'];
    const brickScoreByRow = [50, 40, 30, 20, 10];
    const brickDarkened = ['#922b21', '#a04000', '#b7950b', '#1e8449', '#21618c'];

    let bricks = [];

    function createBricks() {
      bricks.forEach(b => brickGroup.remove(b.mesh));
      bricks = [];

      const cols = 8;
      const rows = 5;
      const brickW = 2;
      const brickH = 0.6;
      const brickD = 1;
      const gapX = 0.35;
      const gapZ = 0.45;

      const totalWidth = cols * brickW + (cols - 1) * gapX;
      const startX = -totalWidth / 2 + brickW / 2;
      const startZ = -10.5;

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const geo = new THREE.BoxGeometry(brickW, brickH, brickD);
          const mat = new THREE.MeshStandardMaterial({
            color: brickColors[row],
            emissive: new THREE.Color(brickColors[row]).multiplyScalar(0.12),
            roughness: 0.45,
            metalness: 0.25
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.castShadow = true;
          mesh.receiveShadow = true;

          const x = startX + col * (brickW + gapX);
          const z = startZ + row * (brickD + gapZ);
          mesh.position.set(x, 0.7, z);

          brickGroup.add(mesh);

          bricks.push({
            mesh,
            row,
            col,
            hp: row === 0 ? 2 : 1,
            alive: true,
            width: brickW,
            depth: brickD
          });
        }
      }
    }

    // Paddles
    function makePaddle(color, z) {
      const geo = new THREE.BoxGeometry(3, 0.4, 0.8);
      const mat = new THREE.MeshStandardMaterial({
        color,
        emissive: new THREE.Color(color).multiplyScalar(0.12),
        roughness: 0.35,
        metalness: 0.4
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.position.set(0, 0.4, z);
      scene.add(mesh);
      return {
        mesh,
        width: 3,
        baseWidth: 3,
        z,
        prevX: 0
      };
    }

    const p1 = makePaddle('#2980b9', 13);
    const p2 = makePaddle('#c0392b', 11);

    // Balls
    const ballGeo = new THREE.SphereGeometry(0.3, 20, 20);
    const ballMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0xffffff,
      emissiveIntensity: 1.2,
      roughness: 0.2,
      metalness: 0.3
    });

    const ballLightMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0xffffff,
      emissiveIntensity: 2.0,
      transparent: true,
      opacity: 0.18
    });

    let balls = [];

    function createBall(x = 0, z = 5, vx = 0.08, vz = -0.12) {
      const mesh = new THREE.Mesh(ballGeo, ballMat.clone());
      mesh.castShadow = true;
      mesh.position.set(x, BALL_Y, z);

      const glow = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), ballLightMat.clone());
      glow.position.set(0, 0, 0);
      mesh.add(glow);

      scene.add(mesh);

      return {
        mesh,
        x,
        z,
        vx,
        vz,
        radius: 0.3,
        active: true
      };
    }

    function clearBalls() {
      balls.forEach(b => scene.remove(b.mesh));
      balls = [];
    }

    function resetMainBall() {
      clearBalls();
      balls.push(createBall(0, 5, 0.08 * game.speedMultiplier, -0.12 * game.speedMultiplier));
    }

    // Trophy GLB
    let trophy = null;
    let trophyBox = new THREE.Box3();

    const loader = new GLTFLoader();
    loader.load(
      'ABeautifulGame.glb',
      (gltf) => {
        trophy = gltf.scene;
        trophy.scale.setScalar(0.02);
        trophy.position.set(0, 0.25, 0);
        trophy.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(trophy);
        game.trophyExists = true;
      },
      undefined,
      () => {
        // Fallback trophy placeholder if model fails
        const g = new THREE.TorusKnotGeometry(0.6, 0.2, 100, 16);
        const m = new THREE.MeshStandardMaterial({
          color: 0xffd700,
          emissive: 0xaa8800,
          roughness: 0.3,
          metalness: 0.85
        });
        trophy = new THREE.Mesh(g, m);
        trophy.scale.setScalar(0.5);
        trophy.position.set(0, 1, 0);
        trophy.castShadow = true;
        scene.add(trophy);
        game.trophyExists = true;
      }
    );

    // Powerups
    let powerUps = [];
    const powerUpCycle = ['wide_paddle', 'multi_ball', 'slow_ball'];
    let powerUpCycleIndex = 0;

    function spawnPowerUp(x, z) {
      const type = powerUpCycle[powerUpCycleIndex % powerUpCycle.length];
      powerUpCycleIndex++;

      const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xaa7700,
        roughness: 0.3,
        metalness: 0.8
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.castShadow = true;
      mesh.position.set(x, 0.8, z);
      scene.add(mesh);

      powerUps.push({
        mesh,
        type,
        zSpeed: 0.05,
        active: true
      });
    }

    function clearPowerUps() {
      powerUps.forEach(p => scene.remove(p.mesh));
      powerUps = [];
    }

    // State
    const game = {
      gameState: 'waiting',
      score: 0,
      lives: 3,
      bricksRemaining: 40,
      bricksDestroyed: 0,
      activePowerUp: null,
      trophyHit: false,
      trophyExists: false,
      speedMultiplier: 1.0,
      totalBrickHits: 0,
      powerUpsCollected: 0
    };

    const timers = {
      widePaddleUntil: 0,
      slowBallUntil: 0
    };

    window.__3D_STATE__ = {};

    // Input
    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { keys[e.key] = false; });

    // UI refs
    const scoreEl = document.getElementById('score');
    const livesEl = document.getElementById('lives');
    const bricksEl = document.getElementById('bricks');
    const messageEl = document.getElementById('message');
    const subMessageEl = document.getElementById('subMessage');
    const powerupEl = document.getElementById('powerupInfo');

    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');

    function updateHUD() {
      scoreEl.textContent = `Score: ${game.score}`;
      livesEl.textContent = `Lives: ${'❤️'.repeat(game.lives)}${game.lives === 0 ? ' 0' : ''}`;
      bricksEl.textContent = `Bricks: ${game.bricksRemaining}/40`;
      powerupEl.textContent = `Power-Up: ${game.activePowerUp || 'None'}`;

      if (game.gameState === 'waiting') {
        messageEl.textContent = '3D MULTIPLAYER BREAKOUT';
        subMessageEl.textContent = 'Press Start Game';
      } else if (game.gameState === 'paused') {
        messageEl.textContent = 'PAUSED';
        subMessageEl.textContent = 'Press Pause to resume';
      } else if (game.gameState === 'won') {
        messageEl.textContent = 'YOU WIN!';
        subMessageEl.textContent = `Final Score: ${game.score}`;
      } else if (game.gameState === 'gameover') {
        messageEl.textContent = 'GAME OVER';
        subMessageEl.textContent = `Final Score: ${game.score}`;
      } else {
        messageEl.textContent = '';
        subMessageEl.textContent = '';
      }
    }

    function setPaddleWidth(paddle, width) {
      paddle.width = width;
      paddle.mesh.scale.x = width / paddle.baseWidth;
    }

    function resetPowerEffects() {
      setPaddleWidth(p1, 3);
      setPaddleWidth(p2, 3);
      timers.widePaddleUntil = 0;
      timers.slowBallUntil = 0;
      game.activePowerUp = null;
    }

    function applyPowerUp(type) {
      game.activePowerUp = type;
      game.powerUpsCollected++;
      const now = performance.now();

      if (type === 'wide_paddle') {
        setPaddleWidth(p1, 5);
        setPaddleWidth(p2, 5);
        timers.widePaddleUntil = now + 10000;
      } else if (type === 'multi_ball') {
        const base = balls[0] || { x: 0, z: 5, vx: 0.08, vz: -0.12 };
        balls.push(createBall(base.x + 0.4, base.z, Math.abs(base.vx) + 0.03, base.vz));
        balls.push(createBall(base.x - 0.4, base.z, -Math.abs(base.vx) - 0.03, base.vz * 0.95));
        setTimeout(() => {
          if (game.activePowerUp === 'multi_ball') game.activePowerUp = null;
        }, 2000);
      } else if (type === 'slow_ball') {
        balls.forEach(ball => {
          ball.vx *= 0.7;
          ball.vz *= 0.7;
        });
        timers.slowBallUntil = now + 8000;
      }
    }

    function updatePowerEffects(now) {
      if (timers.widePaddleUntil && now > timers.widePaddleUntil) {
        setPaddleWidth(p1, 3);
        setPaddleWidth(p2, 3);
        timers.widePaddleUntil = 0;
        if (game.activePowerUp === 'wide_paddle') game.activePowerUp = null;
      }

      if (timers.slowBallUntil && now > timers.slowBallUntil) {
        balls.forEach(ball => {
          ball.vx /= 0.7;
          ball.vz /= 0.7;
        });
        timers.slowBallUntil = 0;
        if (game.activePowerUp === 'slow_ball') game.activePowerUp = null;
      }
    }

    function getBallSpeed(ball) {
      return Math.sqrt(ball.vx * ball.vx + ball.vz * ball.vz);
    }

    function speedUpAllBalls(multiplier) {
      balls.forEach(ball => {
        ball.vx *= multiplier;
        ball.vz *= multiplier;
      });
    }

    function damageBrick(brick) {
      if (!brick.alive) return;

      game.totalBrickHits++;

      if (brick.row === 0 && brick.hp === 2) {
        brick.hp -= 1;
        brick.mesh.material.color.set(brickDarkened[brick.row]);
        brick.mesh.material.emissive.set(new THREE.Color(brickDarkened[brick.row]).multiplyScalar(0.12));
        return;
      }

      brick.hp -= 1;
      if (brick.hp <= 0) {
        brick.alive = false;
        brickGroup.remove(brick.mesh);
        game.bricksRemaining--;
        game.bricksDestroyed++;
        game.score += brickScoreByRow[brick.row];

        if (game.bricksDestroyed % 5 === 0) {
          game.speedMultiplier *= 1.02;
          speedUpAllBalls(1.02);
        }

        if (game.bricksDestroyed % 10 === 0) {
          spawnPowerUp(brick.mesh.position.x, brick.mesh.position.z);
        }

        if (game.bricksRemaining <= 0) {
          game.gameState = 'won';
        }
      }
    }

    function checkBallBrickCollision(ball) {
      for (const brick of bricks) {
        if (!brick.alive) continue;

        const dx = ball.mesh.position.x - brick.mesh.position.x;
        const dz = ball.mesh.position.z - brick.mesh.position.z;
        const overlapX = Math.abs(dx) <= (brick.width / 2 + ball.radius);
        const overlapZ = Math.abs(dz) <= (brick.depth / 2 + ball.radius);

        if (overlapX && overlapZ) {
          const penX = (brick.width / 2 + ball.radius) - Math.abs(dx);
          const penZ = (brick.depth / 2 + ball.radius) - Math.abs(dz);

          if (penX < penZ) {
            ball.vx *= -1;
          } else {
            ball.vz *= -1;
          }

          damageBrick(brick);
          return true;
        }
      }
      return false;
    }

    function checkTrophyCollision(ball) {
      if (!trophy || game.trophyHit === true) return false;

      trophyBox.setFromObject(trophy);
      const sphere = new THREE.Sphere(ball.mesh.position.clone(), ball.radius);
      if (trophyBox.intersectsSphere(sphere)) {
        game.score += 500;
        game.trophyHit = true;
        ball.vz *= -1;
        if (trophy.material && trophy.material.emissive) {
          trophy.material.emissive.set(0x00ff99);
        }
        return true;
      }
      return false;
    }

    function paddleCollision(ball, paddle) {
      const px = paddle.mesh.position.x;
      const pz = paddle.mesh.position.z;
      const halfW = paddle.width / 2;
      const halfD = 0.8 / 2;

      const dx = ball.mesh.position.x - px;
      const dz = ball.mesh.position.z - pz;

      if (Math.abs(dx) <= halfW + ball.radius && Math.abs(dz) <= halfD + ball.radius) {
        if (ball.vz > 0) {
          ball.vz *= -1;
          const deltaX = paddle.mesh.position.x - paddle.prevX;
          ball.vx += deltaX * 0.02;
          const offset = dx / Math.max(halfW, 0.01);
          ball.vx += offset * 0.01;

          // avoid too-flat movement
          const minZ = 0.06;
          if (Math.abs(ball.vz) < minZ) {
            ball.vz = ball.vz < 0 ? -minZ : minZ;
          }

          return true;
        }
      }
      return false;
    }

    function updatePaddles() {
      p1.prevX = p1.mesh.position.x;
      p2.prevX = p2.mesh.position.x;

      if (keys['a'] || keys['A']) p1.mesh.position.x -= 0.3;
      if (keys['d'] || keys['D']) p1.mesh.position.x += 0.3;

      if (keys['ArrowLeft']) p2.mesh.position.x -= 0.3;
      if (keys['ArrowRight']) p2.mesh.position.x += 0.3;

      p1.mesh.position.x = THREE.MathUtils.clamp(p1.mesh.position.x, -8.5, 8.5);
      p2.mesh.position.x = THREE.MathUtils.clamp(p2.mesh.position.x, -8.5, 8.5);
    }

    function updatePowerUps() {
      for (let i = powerUps.length - 1; i >= 0; i--) {
        const p = powerUps[i];
        if (!p.active) continue;

        p.mesh.rotation.x += 0.05;
        p.mesh.rotation.y += 0.07;
        p.mesh.position.z += p.zSpeed;

        const hitP1 =
          Math.abs(p.mesh.position.z - p1.mesh.position.z) < 0.8 &&
          Math.abs(p.mesh.position.x - p1.mesh.position.x) < p1.width / 2 + 0.5;

        const hitP2 =
          Math.abs(p.mesh.position.z - p2.mesh.position.z) < 0.8 &&
          Math.abs(p.mesh.position.x - p2.mesh.position.x) < p2.width / 2 + 0.5;

        if (hitP1 || hitP2) {
          applyPowerUp(p.type);
          scene.remove(p.mesh);
          powerUps.splice(i, 1);
          continue;
        }

        if (p.mesh.position.z > 15) {
          scene.remove(p.mesh);
          powerUps.splice(i, 1);
        }
      }
    }

    function loseLife() {
      game.lives--;
      clearPowerUps();
      resetPowerEffects();

      if (game.lives <= 0) {
        game.lives = 0;
        game.gameState = 'gameover';
      } else {
        resetMainBall();
      }
    }

    function updateBalls() {
      let anyPast = false;

      for (let i = balls.length - 1; i >= 0; i--) {
        const ball = balls[i];
        if (!ball.active) continue;

        ball.x += ball.vx;
        ball.z += ball.vz;
        ball.mesh.position.set(ball.x, BALL_Y, ball.z);

        // Walls
        if (ball.x <= -9.7) {
          ball.x = -9.7;
          ball.vx *= -1;
        }
        if (ball.x >= 9.7) {
          ball.x = 9.7;
          ball.vx *= -1;
        }
        if (ball.z <= -14.7) {
          ball.z = -14.7;
          ball.vz *= -1;
        }

        // Paddles
        if (paddleCollision(ball, p2)) {
          ball.z = p2.mesh.position.z - 0.9;
        } else if (paddleCollision(ball, p1)) {
          ball.z = p1.mesh.position.z - 0.9;
        }

        checkBallBrickCollision(ball);
        checkTrophyCollision(ball);

        // Ball behind paddles
        if (ball.z > 14) {
          if (balls.length > 1) {
            scene.remove(ball.mesh);
            balls.splice(i, 1);
          } else {
            anyPast = true;
          }
        }
      }

      if (anyPast && game.gameState === 'playing') {
        loseLife();
      }
    }

    function updateTrophy() {
      if (trophy) {
        trophy.rotation.y += 0.01;
      }
    }

    function resetGame() {
      game.gameState = 'waiting';
      game.score = 0;
      game.lives = 3;
      game.bricksRemaining = 40;
      game.bricksDestroyed = 0;
      game.activePowerUp = null;
      game.trophyHit = false;
      game.speedMultiplier = 1.0;
      game.totalBrickHits = 0;
      game.powerUpsCollected = 0;
      powerUpCycleIndex = 0;

      p1.mesh.position.x = 0;
      p2.mesh.position.x = 0;
      p1.prevX = 0;
      p2.prevX = 0;
      setPaddleWidth(p1, 3);
      setPaddleWidth(p2, 3);

      clearPowerUps();
      resetPowerEffects();
      createBricks();
      resetMainBall();

      if (trophy) {
        trophy.position.set(0, trophy.position.y, 0);
      }

      updateHUD();
    }

    startBtn.addEventListener('click', () => {
      if (game.gameState === 'waiting' || game.gameState === 'gameover' || game.gameState === 'won') {
        game.gameState = 'playing';
      }
      updateHUD();
    });

    pauseBtn.addEventListener('click', () => {
      if (game.gameState === 'playing') game.gameState = 'paused';
      else if (game.gameState === 'paused') game.gameState = 'playing';
      updateHUD();
    });

    resetBtn.addEventListener('click', () => {
      resetGame();
    });

    function updateExposedState() {
      const mainBall = balls[0];
      const speed = mainBall ? getBallSpeed(mainBall) : 0;

      window.__3D_STATE__ = {
        gameState: game.gameState,
        score: game.score,
        lives: game.lives,
        bricksRemaining: game.bricksRemaining,
        bricksDestroyed: game.bricksDestroyed,
        ballPosition: mainBall ? { x: mainBall.x, z: mainBall.z } : { x: 0, z: 0 },
        ballVelocity: mainBall ? { x: mainBall.vx, z: mainBall.vz } : { x: 0, z: 0 },
        ballSpeed: speed,
        p1PaddleX: p1.mesh.position.x,
        p2PaddleX: p2.mesh.position.x,
        p1PaddleWidth: p1.width,
        p2PaddleWidth: p2.width,
        activePowerUp: game.activePowerUp,
        ballCount: balls.length,
        trophyHit: game.trophyHit,
        trophyExists: !!trophy,
        speedMultiplier: game.speedMultiplier,
        totalBrickHits: game.totalBrickHits,
        powerUpsCollected: game.powerUpsCollected
      };
    }

    function animate(now = 0) {
      requestAnimationFrame(animate);

      updatePaddles();
      updateTrophy();

      if (game.gameState === 'playing') {
        updateBalls();
        updatePowerUps();
        updatePowerEffects(now);
      }

      updateHUD();
      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    createBricks();
    resetMainBall();
    updateHUD();
    updateExposedState();
    animate();
  </script>
</body>
</html>
