<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Multiplayer Breakout</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }
        .hud-top {
            display: flex;
            justify-content: space-between;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .hud-center-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        .hud-bottom {
            text-align: center;
            font-size: 18px;
            color: #aaa;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: auto;
        }
        #message-text {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            display: none;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid white;
            border-radius: 5px;
            transition: all 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background: white;
            color: black;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-top">
            <div id="score-display">Score: 0</div>
            <div id="lives-display">Lives: ❤️❤️❤️</div>
        </div>
        <div class="hud-center-top" id="bricks-display">Bricks: 40/40</div>
        
        <div id="message-overlay">
            <div id="message-text">GAME OVER</div>
            <div class="controls">
                <button id="btn-start">Start Game</button>
                <button id="btn-pause" style="display:none;">Pause</button>
                <button id="btn-reset" style="display:none;">Reset</button>
            </div>
        </div>

        <div class="hud-bottom">
            P1: A/D | P2: ←/→
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameState: 'waiting', // waiting, playing, paused, won, gameover
            score: 0,
            lives: 3,
            bricksRemaining: 40,
            bricksDestroyed: 0,
            ballPosition: { x: 0, z: 0 },
            ballVelocity: { x: 0, z: 0 },
            ballSpeed: 0,
            p1PaddleX: 0,
            p2PaddleX: 0,
            p1PaddleWidth: 3,
            p2PaddleWidth: 3,
            activePowerUp: null,
            ballCount: 1,
            trophyHit: false,
            trophyExists: false,
            speedMultiplier: 1.0,
            totalBrickHits: 0,
            powerUpsCollected: 0
        };

        let state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(-20, 20, -20);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight2.position.set(20, 20, 20);
        scene.add(dirLight2);

        // --- Game Objects ---
        const fieldWidth = 20;
        const fieldDepth = 30;

        // Floor
        const floorGeo = new THREE.PlaneGeometry(fieldWidth, fieldDepth);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // Walls (Glass-like)
        const wallMat = new THREE.MeshPhysicalMaterial({
            color: 0x88ccff,
            transparent: true,
            opacity: 0.2,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.5
        });

        const wallHeight = 2;
        const wallThickness = 0.5;

        const leftWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, fieldDepth), wallMat);
        leftWall.position.set(-fieldWidth/2 - wallThickness/2, wallHeight/2, 0);
        scene.add(leftWall);

        const rightWall = new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, fieldDepth), wallMat);
        rightWall.position.set(fieldWidth/2 + wallThickness/2, wallHeight/2, 0);
        scene.add(rightWall);

        const backWall = new THREE.Mesh(new THREE.BoxGeometry(fieldWidth + wallThickness*2, wallHeight, wallThickness), wallMat);
        backWall.position.set(0, wallHeight/2, -fieldDepth/2 - wallThickness/2);
        scene.add(backWall);

        // Bricks
        const bricks = [];
        const brickRows = 5;
        const brickCols = 8;
        const brickW = 2;
        const brickH = 0.6;
        const brickD = 1;
        const brickGapX = 0.2;
        const brickGapZ = 0.2;
        
        const rowColors = [0xe74c3c, 0xe67e22, 0xf1c40f, 0x2ecc71, 0x3498db];
        const rowScores = [50, 40, 30, 20, 10];

        const totalBricksWidth = brickCols * brickW + (brickCols - 1) * brickGapX;
        const startX = -totalBricksWidth / 2 + brickW / 2;
        const startZ = -12;

        const brickGeo = new THREE.BoxGeometry(brickW, brickH, brickD);

        function createBricks() {
            bricks.forEach(b => scene.remove(b.mesh));
            bricks.length = 0;
            
            for (let r = 0; r < brickRows; r++) {
                for (let c = 0; c < brickCols; c++) {
                    const mat = new THREE.MeshStandardMaterial({ color: rowColors[r], roughness: 0.4 });
                    const mesh = new THREE.Mesh(brickGeo, mat);
                    mesh.position.set(
                        startX + c * (brickW + brickGapX),
                        brickH / 2,
                        startZ + r * (brickD + brickGapZ)
                    );
                    mesh.castShadow = true;
                    scene.add(mesh);
                    
                    bricks.push({
                        mesh: mesh,
                        row: r,
                        hp: r === 0 ? 2 : 1,
                        score: rowScores[r],
                        active: true
                    });
                }
            }
            state.bricksRemaining = 40;
            state.bricksDestroyed = 0;
        }

        // Paddles
        const paddleGeo = new THREE.BoxGeometry(3, 0.4, 0.8);
        
        const p1Mat = new THREE.MeshStandardMaterial({ color: 0x2980b9 });
        const p1 = new THREE.Mesh(paddleGeo, p1Mat);
        p1.position.set(0, 0.2, 13);
        scene.add(p1);

        const p2Mat = new THREE.MeshStandardMaterial({ color: 0xc0392b });
        const p2 = new THREE.Mesh(paddleGeo, p2Mat);
        p2.position.set(0, 0.2, 11);
        scene.add(p2);

        // Balls
        const ballGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, 
            emissive: 0xffffff, 
            emissiveIntensity: 0.5 
        });
        
        let balls = [];
        const initialBallVel = { x: 0.08, y: 0, z: -0.12 };

        function createBall(x, z, vx, vz) {
            const mesh = new THREE.Mesh(ballGeo, ballMat);
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
            balls.push({ mesh, vx, vz });
        }

        function resetBalls() {
            balls.forEach(b => scene.remove(b.mesh));
            balls = [];
            createBall(0, 0.5, 5, initialBallVel.x * state.speedMultiplier, initialBallVel.z * state.speedMultiplier);
        }

        // Trophy
        let trophyModel = null;
        let trophyBox = null;
        const loader = new GLTFLoader();
        loader.load('https://unpkg.com/three@0.160.0/examples/models/gltf/ABeautifulGame/ABeautifulGame.glb', (gltf) => {
            trophyModel = gltf.scene;
            trophyModel.scale.set(0.02, 0.02, 0.02);
            trophyModel.position.set(0, 0.5, 0);
            scene.add(trophyModel);
            trophyBox = new THREE.Box3().setFromObject(trophyModel);
            state.trophyExists = true;
        });

        // Power-ups
        const powerUps = [];
        const powerUpTypes = ['wide_paddle', 'multi_ball', 'slow_ball'];
        let powerUpCycle = 0;
        const puGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const puMat = new THREE.MeshStandardMaterial({ color: 0xffd700, emissive: 0xffaa00, emissiveIntensity: 0.5 });

        function spawnPowerUp(x, z) {
            const mesh = new THREE.Mesh(puGeo, puMat);
            mesh.position.set(x, 0.5, z);
            scene.add(mesh);
            powerUps.push({
                mesh: mesh,
                type: powerUpTypes[powerUpCycle % 3],
                vz: 0.05
            });
            powerUpCycle++;
        }

        let widePaddleTimer = 0;
        let slowBallTimer = 0;
        let lastSpeedIncreaseBrickCount = 0;
        let lastPowerUpBrickCount = 0;

        // --- Input Handling ---
        const keys = { a: false, d: false, ArrowLeft: false, ArrowRight: false };
        
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;
        });
        
        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        // --- UI & Game Flow ---
        const uiScore = document.getElementById('score-display');
        const uiLives = document.getElementById('lives-display');
        const uiBricks = document.getElementById('bricks-display');
        const msgOverlay = document.getElementById('message-overlay');
        const msgText = document.getElementById('message-text');
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');

        function updateHUD() {
            uiScore.innerText = `Score: ${state.score}`;
            uiLives.innerText = `Lives: ${'❤️'.repeat(state.lives)}`;
            uiBricks.innerText = `Bricks: ${state.bricksRemaining}/40`;
        }

        function setGameState(newState) {
            state.gameState = newState;
            if (newState === 'waiting') {
                msgText.style.display = 'none';
                btnStart.style.display = 'inline-block';
                btnPause.style.display = 'none';
                btnReset.style.display = 'none';
            } else if (newState === 'playing') {
                msgText.style.display = 'none';
                btnStart.style.display = 'none';
                btnPause.style.display = 'inline-block';
                btnPause.innerText = 'Pause';
                btnReset.style.display = 'inline-block';
            } else if (newState === 'paused') {
                msgText.style.display = 'block';
                msgText.innerText = 'PAUSED';
                btnPause.innerText = 'Resume';
            } else if (newState === 'gameover') {
                msgText.style.display = 'block';
                msgText.innerText = 'GAME OVER';
                msgText.style.color = '#e74c3c';
                btnPause.style.display = 'none';
            } else if (newState === 'won') {
                msgText.style.display = 'block';
                msgText.innerText = 'YOU WIN!';
                msgText.style.color = '#2ecc71';
                btnPause.style.display = 'none';
            }
        }

        function initGame() {
            state.score = 0;
            state.lives = 3;
            state.speedMultiplier = 1.0;
            state.trophyHit = false;
            state.activePowerUp = null;
            state.totalBrickHits = 0;
            state.powerUpsCollected = 0;
            
            p1.scale.x = 1; p2.scale.x = 1;
            state.p1PaddleWidth = 3; state.p2PaddleWidth = 3;
            p1.position.x = 0; p2.position.x = 0;
            
            widePaddleTimer = 0;
            slowBallTimer = 0;
            lastSpeedIncreaseBrickCount = 0;
            lastPowerUpBrickCount = 0;

            powerUps.forEach(pu => scene.remove(pu.mesh));
            powerUps.length = 0;

            if (trophyModel && !state.trophyExists) {
                scene.add(trophyModel);
                state.trophyExists = true;
            }

            createBricks();
            resetBalls();
            updateHUD();
            setGameState('playing');
        }

        btnStart.addEventListener('click', initGame);
        btnReset.addEventListener('click', initGame);
        btnPause.addEventListener('click', () => {
            if (state.gameState === 'playing') setGameState('paused');
            else if (state.gameState === 'paused') setGameState('playing');
        });

        // --- Collision Helpers ---
        function checkAABB(x1, z1, w1, d1, x2, z2, w2, d2) {
            return (Math.abs(x1 - x2) * 2 < (w1 + w2)) &&
                   (Math.abs(z1 - z2) * 2 < (d1 + d2));
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);

            // Update State Object
            if (balls.length > 0) {
                state.ballPosition.x = balls[0].mesh.position.x;
                state.ballPosition.z = balls[0].mesh.position.z;
                state.ballVelocity.x = balls[0].vx;
                state.ballVelocity.z = balls[0].vz;
                state.ballSpeed = Math.sqrt(balls[0].vx**2 + balls[0].vz**2);
            }
            state.p1PaddleX = p1.position.x;
            state.p2PaddleX = p2.position.x;
            state.ballCount = balls.length;

            if (state.gameState !== 'playing') {
                renderer.render(scene, camera);
                return;
            }

            // Paddle Movement
            const paddleSpeed = 0.3;
            let p1PrevX = p1.position.x;
            let p2PrevX = p2.position.x;

            if (keys.a) p1.position.x -= paddleSpeed;
            if (keys.d) p1.position.x += paddleSpeed;
            if (keys.ArrowLeft) p2.position.x -= paddleSpeed;
            if (keys.ArrowRight) p2.position.x += paddleSpeed;

            // Clamp paddles
            const limitX = 8.5;
            p1.position.x = Math.max(-limitX, Math.min(limitX, p1.position.x));
            p2.position.x = Math.max(-limitX, Math.min(limitX, p2.position.x));

            const p1DeltaX = p1.position.x - p1PrevX;
            const p2DeltaX = p2.position.x - p2PrevX;

            // Power-up Timers
            if (widePaddleTimer > 0) {
                widePaddleTimer--;
                if (widePaddleTimer === 0) {
                    state.p1PaddleWidth = 3; state.p2PaddleWidth = 3;
                    p1.scale.x = 1; p2.scale.x = 1;
                    if (state.activePowerUp === 'wide_paddle') state.activePowerUp = null;
                }
            }
            if (slowBallTimer > 0) {
                slowBallTimer--;
                if (slowBallTimer === 0) {
                    balls.forEach(b => { b.vx /= 0.7; b.vz /= 0.7; });
                    if (state.activePowerUp === 'slow_ball') state.activePowerUp = null;
                }
            }

            // Ball Physics
            for (let i = balls.length - 1; i >= 0; i--) {
                let ball = balls[i];
                ball.mesh.position.x += ball.vx;
                ball.mesh.position.z += ball.vz;

                const bx = ball.mesh.position.x;
                const bz = ball.mesh.position.z;
                const br = 0.3;

                // Wall Collisions
                if (bx + br > fieldWidth/2 || bx - br < -fieldWidth/2) {
                    ball.vx *= -1;
                    ball.mesh.position.x = bx > 0 ? fieldWidth/2 - br : -fieldWidth/2 + br;
                }
                if (bz - br < -fieldDepth/2) {
                    ball.vz *= -1;
                    ball.mesh.position.z = -fieldDepth/2 + br;
                }

                // Bottom out (Lose life)
                if (bz > 14) {
                    scene.remove(ball.mesh);
                    balls.splice(i, 1);
                    if (balls.length === 0) {
                        state.lives--;
                        updateHUD();
                        if (state.lives > 0) {
                            resetBalls();
                        } else {
                            setGameState('gameover');
                        }
                    }
                    continue;
                }

                // Paddle Collisions
                const checkPaddle = (paddle, pWidth, pDeltaX) => {
                    if (checkAABB(bx, bz, br*2, br*2, paddle.position.x, paddle.position.z, pWidth, 0.8)) {
                        // Determine bounce direction based on relative position
                        if (bz < paddle.position.z) { // Hit front
                            ball.vz = -Math.abs(ball.vz);
                            ball.vx += pDeltaX * 0.02;
                            ball.mesh.position.z = paddle.position.z - 0.4 - br;
                        } else { // Hit side
                            ball.vx *= -1;
                        }
                    }
                };
                checkPaddle(p1, state.p1PaddleWidth, p1DeltaX);
                checkPaddle(p2, state.p2PaddleWidth, p2DeltaX);

                // Brick Collisions
                for (let j = 0; j < bricks.length; j++) {
                    let brick = bricks[j];
                    if (!brick.active) continue;

                    if (checkAABB(bx, bz, br*2, br*2, brick.mesh.position.x, brick.mesh.position.z, brickW, brickD)) {
                        state.totalBrickHits++;
                        
                        // Simple reflection
                        const overlapX = Math.min(bx + br - (brick.mesh.position.x - brickW/2), (brick.mesh.position.x + brickW/2) - (bx - br));
                        const overlapZ = Math.min(bz + br - (brick.mesh.position.z - brickD/2), (brick.mesh.position.z + brickD/2) - (bz - br));
                        
                        if (overlapX < overlapZ) ball.vx *= -1;
                        else ball.vz *= -1;

                        brick.hp--;
                        if (brick.hp === 1 && brick.row === 0) {
                            brick.mesh.material.color.setHex(0x8b0000); // Dark red
                        } else if (brick.hp <= 0) {
                            brick.active = false;
                            scene.remove(brick.mesh);
                            state.score += brick.score;
                            state.bricksRemaining--;
                            state.bricksDestroyed++;
                            updateHUD();

                            // Speed increase
                            if (state.bricksDestroyed % 5 === 0 && lastSpeedIncreaseBrickCount !== state.bricksDestroyed) {
                                state.speedMultiplier *= 1.02;
                                balls.forEach(b => { b.vx *= 1.02; b.vz *= 1.02; });
                                lastSpeedIncreaseBrickCount = state.bricksDestroyed;
                            }

                            // Power-up spawn
                            if (state.bricksDestroyed % 10 === 0 && lastPowerUpBrickCount !== state.bricksDestroyed) {
                                spawnPowerUp(brick.mesh.position.x, brick.mesh.position.z);
                                lastPowerUpBrickCount = state.bricksDestroyed;
                            }

                            if (state.bricksRemaining === 0) {
                                setGameState('won');
                            }
                        }
                        break; // Only hit one brick per frame per ball
                    }
                }

                // Trophy Collision
                if (state.trophyExists && !state.trophyHit && trophyBox) {
                    // Simple point in box check for ball center
                    if (bx > trophyBox.min.x && bx < trophyBox.max.x &&
                        bz > trophyBox.min.z && bz < trophyBox.max.z) {
                        state.score += 500;
                        state.trophyHit = true;
                        scene.remove(trophyModel);
                        state.trophyExists = false;
                        updateHUD();
                        
                        // Bounce off trophy
                        ball.vz *= -1;
                    }
                }
            }

            // Power-ups Update
            for (let i = powerUps.length - 1; i >= 0; i--) {
                let pu = powerUps[i];
                pu.mesh.position.z += pu.vz;
                pu.mesh.rotation.x += 0.05;
                pu.mesh.rotation.y += 0.05;

                // Check paddle collision
                let collected = false;
                if (checkAABB(pu.mesh.position.x, pu.mesh.position.z, 0.6, 0.6, p1.position.x, p1.position.z, state.p1PaddleWidth, 0.8) ||
                    checkAABB(pu.mesh.position.x, pu.mesh.position.z, 0.6, 0.6, p2.position.x, p2.position.z, state.p2PaddleWidth, 0.8)) {
                    collected = true;
                }

                if (collected) {
                    state.powerUpsCollected++;
                    state.activePowerUp = pu.type;
                    
                    if (pu.type === 'wide_paddle') {
                        state.p1PaddleWidth = 5; state.p2PaddleWidth = 5;
                        p1.scale.x = 5/3; p2.scale.x = 5/3;
                        widePaddleTimer = 600; // 10s at 60fps
                    } else if (pu.type === 'multi_ball') {
                        if (balls.length > 0) {
                            let base = balls[0];
                            createBall(base.mesh.position.x, base.mesh.position.z, base.vx * 1.1, -base.vz);
                            createBall(base.mesh.position.x, base.mesh.position.z, -base.vx, base.vz * 1.1);
                        }
                    } else if (pu.type === 'slow_ball') {
                        balls.forEach(b => { b.vx *= 0.7; b.vz *= 0.7; });
                        slowBallTimer = 480; // 8s at 60fps
                    }

                    scene.remove(pu.mesh);
                    powerUps.splice(i, 1);
                } else if (pu.mesh.position.z > 15) {
                    scene.remove(pu.mesh);
                    powerUps.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        createBricks();
        updateHUD();
        animate();

    </script>
</body>
</html>
