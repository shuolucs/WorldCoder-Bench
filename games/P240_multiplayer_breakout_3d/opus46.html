<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Multiplayer Breakout</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white;
}
#score {
    position: absolute; top: 15px; left: 20px; font-size: 24px;
    text-shadow: 0 0 10px rgba(0,150,255,0.8);
}
#lives {
    position: absolute; top: 15px; right: 20px; font-size: 24px;
    text-shadow: 0 0 10px rgba(255,50,50,0.8);
}
#bricks {
    position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
    font-size: 20px; text-shadow: 0 0 10px rgba(255,255,0,0.8);
}
#controls {
    position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
    font-size: 16px; opacity: 0.7; text-align: center;
}
#message {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 48px; font-weight: bold; display: none;
    text-shadow: 0 0 20px rgba(255,255,255,0.8);
}
#powerUpDisplay {
    position: absolute; top: 50px; left: 50%; transform: translateX(-50%);
    font-size: 18px; color: #f1c40f; display: none;
    text-shadow: 0 0 10px rgba(241,196,15,0.8);
}
#buttons {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    display: flex; gap: 15px; pointer-events: all;
}
.btn {
    padding: 12px 30px; font-size: 18px; border: 2px solid rgba(255,255,255,0.5);
    background: rgba(0,0,0,0.7); color: white; cursor: pointer;
    border-radius: 8px; transition: all 0.3s;
    text-transform: uppercase; letter-spacing: 2px;
}
.btn:hover { background: rgba(255,255,255,0.2); border-color: white; }
#pauseBtn, #resetBtn {
    position: absolute; pointer-events: all;
}
#pauseBtn { top: 55px; right: 20px; }
#resetBtn { top: 55px; right: 120px; }
</style>
</head>
<body>

<div id="hud">
    <div id="score">Score: 0</div>
    <div id="lives">Lives: ❤️❤️❤️</div>
    <div id="bricks">Bricks: 40/40</div>
    <div id="controls">P1: A/D | P2: ←/→</div>
    <div id="message"></div>
    <div id="powerUpDisplay"></div>
    <div id="buttons">
        <button class="btn" id="startBtn">Start Game</button>
    </div>
    <button class="btn" id="pauseBtn" style="display:none;">Pause</button>
    <button class="btn" id="resetBtn" style="display:none;">Reset</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 30, 60);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 25, 30);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(10, 15, 10);
dirLight1.castShadow = true;
dirLight1.shadow.mapSize.set(2048, 2048);
dirLight1.shadow.camera.near = 1;
dirLight1.shadow.camera.far = 50;
dirLight1.shadow.camera.left = -15;
dirLight1.shadow.camera.right = 15;
dirLight1.shadow.camera.top = 20;
dirLight1.shadow.camera.bottom = -20;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.5);
dirLight2.position.set(-10, 12, -10);
scene.add(dirLight2);

// --- Floor ---
const floorGeom = new THREE.BoxGeometry(20, 0.2, 30);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.8, metalness: 0.2 });
const floor = new THREE.Mesh(floorGeom, floorMat);
floor.position.set(0, -0.1, 0);
floor.receiveShadow = true;
scene.add(floor);

// Floor grid lines for visual effect
const gridHelper = new THREE.GridHelper(30, 30, 0x2a2a4e, 0x2a2a4e);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Walls (glass-like) ---
function createWall(width, height, depth, position) {
    const geom = new THREE.BoxGeometry(width, height, depth);
    const mat = new THREE.MeshPhysicalMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.15,
        roughness: 0.1,
        metalness: 0.1,
        transmission: 0.8,
        thickness: 0.5,
    });
    const wall = new THREE.Mesh(geom, mat);
    wall.position.copy(position);
    scene.add(wall);
    return wall;
}

// Left wall
createWall(0.3, 2, 30, new THREE.Vector3(-10.15, 1, 0));
// Right wall
createWall(0.3, 2, 30, new THREE.Vector3(10.15, 1, 0));
// Back wall
createWall(20.3, 2, 0.3, new THREE.Vector3(0, 1, -15.15));

// Wall edge glow lines
const edgeMat = new THREE.LineBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.5 });
function addEdgeLine(points) {
    const geom = new THREE.BufferGeometry().setFromPoints(points);
    const line = new THREE.Line(geom, edgeMat);
    scene.add(line);
}
addEdgeLine([new THREE.Vector3(-10, 0, -15), new THREE.Vector3(-10, 2, -15), new THREE.Vector3(10, 2, -15), new THREE.Vector3(10, 0, -15)]);
addEdgeLine([new THREE.Vector3(-10, 0, -15), new THREE.Vector3(-10, 0, 15)]);
addEdgeLine([new THREE.Vector3(10, 0, -15), new THREE.Vector3(10, 0, 15)]);
addEdgeLine([new THREE.Vector3(-10, 2, -15), new THREE.Vector3(-10, 2, 15)]);
addEdgeLine([new THREE.Vector3(10, 2, -15), new THREE.Vector3(10, 2, 15)]);

// --- Bricks ---
const rowColors = [0xe74c3c, 0xe67e22, 0xf1c40f, 0x2ecc71, 0x3498db];
const rowDarkColors = [0x922b21, 0xe67e22, 0xf1c40f, 0x2ecc71, 0x3498db];
const rowScores = [50, 40, 30, 20, 10];
let bricks = [];
let bricksGroup = new THREE.Group();
scene.add(bricksGroup);

function createBricks() {
    bricksGroup.clear();
    bricks = [];
    for (let row = 0; row < 5; row++) {
        for (let col = 0; col < 8; col++) {
            const geom = new THREE.BoxGeometry(2, 0.6, 1);
            const mat = new THREE.MeshStandardMaterial({
                color: rowColors[row],
                roughness: 0.4,
                metalness: 0.3,
                emissive: rowColors[row],
                emissiveIntensity: 0.15,
            });
            const brick = new THREE.Mesh(geom, mat);
            const x = -7.5 + col * 2.2 + (col >= 4 ? 0.4 : 0);
            const z = -12 + row * 1.5;
            brick.position.set(x, 0.3, z);
            brick.castShadow = true;
            brick.receiveShadow = true;
            brick.userData = {
                row: row,
                col: col,
                hp: row === 0 ? 2 : 1,
                score: rowScores[row],
                alive: true,
            };
            bricksGroup.add(brick);
            bricks.push(brick);
        }
    }
}
createBricks();

// --- Trophy (GLTF model) ---
let trophy = null;
let trophyHit = false;
let trophyExists = false;
let trophyMixer = null;

const loader = new GLTFLoader();
function loadTrophy() {
    trophyHit = false;
    if (trophy) {
        scene.remove(trophy);
        trophy = null;
    }
    loader.load(
        'https://threejs.org/examples/models/gltf/ABeautifulGame.glb',
        (gltf) => {
            trophy = gltf.scene;
            trophy.scale.set(0.02, 0.02, 0.02);
            trophy.position.set(0, 0, -5);
            trophy.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(trophy);
            trophyExists = true;

            if (gltf.animations && gltf.animations.length > 0) {
                trophyMixer = new THREE.AnimationMixer(trophy);
                gltf.animations.forEach((clip) => {
                    trophyMixer.clipAction(clip).play();
                });
            }
        },
        undefined,
        (error) => {
            console.warn('Could not load trophy model:', error);
            // Create fallback trophy
            const fallbackGeom = new THREE.DodecahedronGeometry(0.8);
            const fallbackMat = new THREE.MeshStandardMaterial({
                color: 0xffd700,
                metalness: 0.8,
                roughness: 0.2,
                emissive: 0xffd700,
                emissiveIntensity: 0.3,
            });
            trophy = new THREE.Mesh(fallbackGeom, fallbackMat);
            trophy.position.set(0, 0.8, -5);
            trophy.castShadow = true;
            scene.add(trophy);
            trophyExists = true;
        }
    );
}
loadTrophy();

// --- Paddles ---
function createPaddle(color, z, width) {
    const geom = new THREE.BoxGeometry(width, 0.4, 0.8);
    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.3,
        metalness: 0.5,
        emissive: color,
        emissiveIntensity: 0.2,
    });
    const paddle = new THREE.Mesh(geom, mat);
    paddle.position.set(0, 0.2, z);
    paddle.castShadow = true;
    paddle.receiveShadow = true;
    paddle.userData = { width: width, baseWidth: 3, prevX: 0 };
    scene.add(paddle);
    return paddle;
}

let p1Paddle = createPaddle(0x2980b9, 13, 3);
let p2Paddle = createPaddle(0xc0392b, 11, 3);

// --- Ball ---
function createBall(x, z, vx, vz) {
    const geom = new THREE.SphereGeometry(0.3, 16, 16);
    const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0xffffff,
        emissiveIntensity: 0.8,
        roughness: 0.1,
        metalness: 0.5,
    });
    const ball = new THREE.Mesh(geom, mat);
    ball.position.set(x, 0.5, z);
    ball.castShadow = true;
    ball.userData = { vx: vx, vz: vz };
    scene.add(ball);

    // Ball glow
    const glowGeom = new THREE.SphereGeometry(0.5, 16, 16);
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.2,
    });
    const glow = new THREE.Mesh(glowGeom, glowMat);
    ball.add(glow);

    // Point light on ball
    const pointLight = new THREE.PointLight(0x4488ff, 1, 5);
    ball.add(pointLight);

    return ball;
}

let balls = [];
let mainBall = null;

function resetBall() {
    balls.forEach(b => scene.remove(b));
    balls = [];
    mainBall = createBall(0, 5, 0.08, -0.12);
    balls.push(mainBall);
}
resetBall();

// --- Power-ups ---
let powerUps = [];
let activePowerUp = null;
let powerUpTimer = null;
let powerUpTypeIndex = 0;
const powerUpTypes = ['wide_paddle', 'multi_ball', 'slow_ball'];

function spawnPowerUp(x, z) {
    const geom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
    const mat = new THREE.MeshStandardMaterial({
        color: 0xffd700,
        emissive: 0xffd700,
        emissiveIntensity: 0.5,
        metalness: 0.8,
        roughness: 0.2,
    });
    const pu = new THREE.Mesh(geom, mat);
    pu.position.set(x, 0.5, z);
    pu.userData = { type: powerUpTypes[powerUpTypeIndex % powerUpTypes.length] };
    powerUpTypeIndex++;
    scene.add(pu);
    powerUps.push(pu);
}

// --- Game State ---
let gameState = 'waiting';
let score = 0;
let lives = 3;
let bricksDestroyed = 0;
let totalBrickHits = 0;
let powerUpsCollected = 0;
let speedMultiplier = 1.0;

const keys = {};
window.addEventListener('keydown', (e) => { keys[e.key] = true; keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.key] = false; keys[e.code] = false; });

// --- DOM Elements ---
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const bricksEl = document.getElementById('bricks');
const messageEl = document.getElementById('message');
const buttonsEl = document.getElementById('buttons');
const startBtn = document.getElementById('startBtn');
const pauseBtn = document.getElementById('pauseBtn');
const resetBtn = document.getElementById('resetBtn');
const powerUpDisplay = document.getElementById('powerUpDisplay');

startBtn.addEventListener('click', () => {
    if (gameState === 'waiting') {
        gameState = 'playing';
        buttonsEl.style.display = 'none';
        pauseBtn.style.display = 'block';
        resetBtn.style.display = 'block';
    }
});

pauseBtn.addEventListener('click', () => {
    if (gameState === 'playing') {
        gameState = 'paused';
        pauseBtn.textContent = 'Resume';
    } else if (gameState === 'paused') {
        gameState = 'playing';
        pauseBtn.textContent = 'Pause';
    }
});

resetBtn.addEventListener('click', resetGame);

function resetGame() {
    gameState = 'waiting';
    score = 0;
    lives = 3;
    bricksDestroyed = 0;
    totalBrickHits = 0;
    powerUpsCollected = 0;
    speedMultiplier = 1.0;
    activePowerUp = null;
    powerUpTypeIndex = 0;

    if (powerUpTimer) { clearTimeout(powerUpTimer); powerUpTimer = null; }

    // Remove power-ups
    powerUps.forEach(p => scene.remove(p));
    powerUps = [];

    // Reset bricks
    createBricks();

    // Reset paddles
    scene.remove(p1Paddle);
    scene.remove(p2Paddle);
    p1Paddle = createPaddle(0x2980b9, 13, 3);
    p2Paddle = createPaddle(0xc0392b, 11, 3);

    // Reset ball
    resetBall();

    // Reset trophy
    loadTrophy();

    // UI
    messageEl.style.display = 'none';
    buttonsEl.style.display = 'flex';
    startBtn.style.display = 'block';
    pauseBtn.style.display = 'none';
    resetBtn.style.display = 'none';
    pauseBtn.textContent = 'Pause';
    powerUpDisplay.style.display = 'none';
}

function updateHUD() {
    scoreEl.textContent = `Score: ${score}`;
    livesEl.textContent = `Lives: ${'❤️'.repeat(Math.max(0, lives))}`;
    const remaining = 40 - bricksDestroyed;
    bricksEl.textContent = `Bricks: ${remaining}/40`;
}

function setPaddleWidth(paddle, width) {
    const oldPos = paddle.position.clone();
    const oldColor = paddle.material.color.getHex();
    const z = paddle.position.z;
    scene.remove(paddle);
    const geom = new THREE.BoxGeometry(width, 0.4, 0.8);
    const mat = new THREE.MeshStandardMaterial({
        color: oldColor,
        roughness: 0.3,
        metalness: 0.5,
        emissive: oldColor,
        emissiveIntensity: 0.2,
    });
    const newPaddle = new THREE.Mesh(geom, mat);
    newPaddle.position.copy(oldPos);
    newPaddle.castShadow = true;
    newPaddle.receiveShadow = true;
    newPaddle.userData = { width: width, baseWidth: 3, prevX: paddle.userData.prevX };
    scene.add(newPaddle);
    return newPaddle;
}

function activatePowerUpEffect(type) {
    // Clear previous timer
    if (powerUpTimer) { clearTimeout(powerUpTimer); powerUpTimer = null; }

    // Revert previous power-up if needed
    revertPowerUp();

    activePowerUp = type;
    powerUpDisplay.textContent = `Power-Up: ${type.replace('_', ' ').toUpperCase()}`;
    powerUpDisplay.style.display = 'block';

    if (type === 'wide_paddle') {
        p1Paddle = setPaddleWidth(p1Paddle, 5);
        p2Paddle = setPaddleWidth(p2Paddle, 5);
        powerUpTimer = setTimeout(() => {
            revertPowerUp();
        }, 10000);
    } else if (type === 'multi_ball') {
        if (balls.length > 0) {
            const refBall = balls[0];
            const b1 = createBall(refBall.position.x, refBall.position.z, 
                refBall.userData.vx * 1.2, refBall.userData.vz * 0.8);
            const b2 = createBall(refBall.position.x, refBall.position.z, 
                refBall.userData.vx * -0.8, refBall.userData.vz * 1.1);
            balls.push(b1, b2);
        }
        powerUpTimer = setTimeout(() => {
            revertPowerUp();
        }, 15000);
    } else if (type === 'slow_ball') {
        balls.forEach(b => {
            b.userData.vx *= 0.7;
            b.userData.vz *= 0.7;
        });
        powerUpTimer = setTimeout(() => {
            revertPowerUp();
        }, 8000);
    }
}

function revertPowerUp() {
    if (activePowerUp === 'wide_paddle') {
        p1Paddle = setPaddleWidth(p1Paddle, 3);
        p2Paddle = setPaddleWidth(p2Paddle, 3);
    }
    activePowerUp = null;
    powerUpDisplay.style.display = 'none';
}

// --- Particle system for brick destruction ---
let particles = [];
function spawnParticles(position, color, count = 8) {
    for (let i = 0; i < count; i++) {
        const geom = new THREE.BoxGeometry(0.15, 0.15, 0.15);
        const mat = new THREE.MeshBasicMaterial({ color: color });
        const p = new THREE.Mesh(geom, mat);
        p.position.copy(position);
        p.userData = {
            vx: (Math.random() - 0.5) * 0.3,
            vy: Math.random() * 0.2 + 0.1,
            vz: (Math.random() - 0.5) * 0.3,
            life: 1.0,
        };
        scene.add(p);
        particles.push(p);
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.position.x += p.userData.vx;
        p.position.y += p.userData.vy;
        p.position.z += p.userData.vz;
        p.userData.vy -= 0.008;
        p.userData.life -= 0.02;
        p.material.opacity = p.userData.life;
        p.material.transparent = true;
        p.scale.multiplyScalar(0.98);
        if (p.userData.life <= 0) {
            scene.remove(p);
            particles.splice(i, 1);
        }
    }
}

// --- Collision Detection ---
function ballBrickCollision(ball, brick) {
    const bx = ball.position.x, bz = ball.position.z;
    const br = 0.3;
    const bkx = brick.position.x, bkz = brick.position.z;
    const hw = 1, hd = 0.5; // half width, half depth of brick

    const closestX = Math.max(bkx - hw, Math.min(bx, bkx + hw));
    const closestZ = Math.max(bkz - hd, Math.min(bz, bkz + hd));

    const dx = bx - closestX;
    const dz = bz - closestZ;
    return (dx * dx + dz * dz) < (br * br);
}

function ballPaddleCollision(ball, paddle) {
    const bx = ball.position.x, bz = ball.position.z;
    const br = 0.3;
    const px = paddle.position.x, pz = paddle.position.z;
    const hw = paddle.userData.width / 2, hd = 0.4;

    const closestX = Math.max(px - hw, Math.min(bx, px + hw));
    const closestZ = Math.max(pz - hd, Math.min(bz, pz + hd));

    const dx = bx - closestX;
    const dz = bz - closestZ;
    return (dx * dx + dz * dz) < (br * br);
}

// --- Expose State ---
window.__3D_STATE__ = {};

function updateState() {
    const remaining = 40 - bricksDestroyed;
    const mainB = balls[0];
    window.__3D_STATE__ = {
        gameState: gameState,
        score: score,
        lives: lives,
        bricksRemaining: remaining,
        bricksDestroyed: bricksDestroyed,
        ballPosition: mainB ? { x: mainB.position.x, z: mainB.position.z } : { x: 0, z: 0 },
        ballVelocity: mainB ? { x: mainB.userData.vx, z: mainB.userData.vz } : { x: 0, z: 0 },
        ballSpeed: mainB ? Math.sqrt(mainB.userData.vx ** 2 + mainB.userData.vz ** 2) : 0,
        p1PaddleX: p1Paddle.position.x,
        p2PaddleX: p2Paddle.position.x,
        p1PaddleWidth: p1Paddle.userData.width,
        p2PaddleWidth: p2Paddle.userData.width,
        activePowerUp: activePowerUp,
        ballCount: balls.length,
        trophyHit: trophyHit,
        trophyExists: trophyExists,
        speedMultiplier: speedMultiplier,
        totalBrickHits: totalBrickHits,
        powerUpsCollected: powerUpsCollected,
    };
}

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Trophy rotation
    if (trophy && !trophyHit) {
        trophy.rotation.y += 0.01;
    }
    if (trophyMixer) {
        trophyMixer.update(delta);
    }

    // Update particles
    updateParticles();

    // Power-up rotation
    powerUps.forEach(pu => {
        pu.rotation.x += 0.03;
        pu.rotation.y += 0.05;
    });

    if (gameState === 'playing') {
        // --- Paddle Movement ---
        p1Paddle.userData.prevX = p1Paddle.position.x;
        p2Paddle.userData.prevX = p2Paddle.position.x;

        const paddleSpeed = 0.3;
        if (keys['a'] || keys['A']) p1Paddle.position.x -= paddleSpeed;
        if (keys['d'] || keys['D']) p1Paddle.position.x += paddleSpeed;
        if (keys['ArrowLeft']) p2Paddle.position.x -= paddleSpeed;
        if (keys['ArrowRight']) p2Paddle.position.x += paddleSpeed;

        const p1HalfW = p1Paddle.userData.width / 2;
        const p2HalfW = p2Paddle.userData.width / 2;
        p1Paddle.position.x = Math.max(-10 + p1HalfW + 0.5, Math.min(10 - p1HalfW - 0.5, p1Paddle.position.x));
        p2Paddle.position.x = Math.max(-10 + p2HalfW + 0.5, Math.min(10 - p2HalfW - 0.5, p2Paddle.position.x));

        const p1DeltaX = p1Paddle.position.x - p1Paddle.userData.prevX;
        const p2DeltaX = p2Paddle.position.x - p2Paddle.userData.prevX;

        // --- Ball Movement ---
        for (let bi = balls.length - 1; bi >= 0; bi--) {
            const ball = balls[bi];
            ball.position.x += ball.userData.vx;
            ball.position.z += ball.userData.vz;
            ball.position.y = 0.5;

            // Wall collisions
            if (ball.position.x <= -9.7) {
                ball.position.x = -9.7;
                ball.userData.vx = Math.abs(ball.userData.vx);
            }
            if (ball.position.x >= 9.7) {
                ball.position.x = 9.7;
                ball.userData.vx = -Math.abs(ball.userData.vx);
            }
            if (ball.position.z <= -14.7) {
                ball.position.z = -14.7;
                ball.userData.vz = Math.abs(ball.userData.vz);
            }

            // Paddle collisions
            if (ball.userData.vz > 0) {
                // Check P2 paddle first (z=11)
                if (ballPaddleCollision(ball, p2Paddle)) {
                    ball.userData.vz = -Math.abs(ball.userData.vz);
                    ball.userData.vx += p2DeltaX * 0.02;
                    ball.position.z = p2Paddle.position.z - 0.7;
                    spawnParticles(ball.position.clone(), 0xc0392b, 4);
                }
                // Check P1 paddle (z=13)
                else if (ballPaddleCollision(ball, p1Paddle)) {
                    ball.userData.vz = -Math.abs(ball.userData.vz);
                    ball.userData.vx += p1DeltaX * 0.02;
                    ball.position.z = p1Paddle.position.z - 0.7;
                    spawnParticles(ball.position.clone(), 0x2980b9, 4);
                }
            }

            // Ball out of bounds
            if (ball.position.z > 14) {
                if (balls.length > 1) {
                    // Extra ball, just remove it
                    scene.remove(ball);
                    balls.splice(bi, 1);
                    continue;
                } else {
                    // Main ball - lose life
                    lives--;
                    if (lives <= 0) {
                        gameState = 'gameover';
                        messageEl.textContent = 'GAME OVER';
                        messageEl.style.display = 'block';
                        messageEl.style.color = '#e74c3c';
                        pauseBtn.style.display = 'none';
                    } else {
                        resetBall();
                        // Apply current speed multiplier
                        balls[0].userData.vx *= speedMultiplier;
                        balls[0].userData.vz *= speedMultiplier;
                    }
                    break;
                }
            }

            // Brick collisions
            for (let i = bricks.length - 1; i >= 0; i--) {
                const brick = bricks[i];
                if (!brick.userData.alive) continue;

                if (ballBrickCollision(ball, brick)) {
                    totalBrickHits++;
                    brick.userData.hp--;

                    // Determine bounce direction
                    const dx = ball.position.x - brick.position.x;
                    const dz = ball.position.z - brick.position.z;
                    if (Math.abs(dx) / 1.0 > Math.abs(dz) / 0.5) {
                        ball.userData.vx = -ball.userData.vx;
                    } else {
                        ball.userData.vz = -ball.userData.vz;
                    }

                    if (brick.userData.hp <= 0) {
                        brick.userData.alive = false;
                        spawnParticles(brick.position.clone(), brick.material.color.getHex(), 12);
                        bricksGroup.remove(brick);
                        score += brick.userData.score;
                        bricksDestroyed++;

                        // Speed increase every 5 bricks
                        if (bricksDestroyed % 5 === 0) {
                            speedMultiplier *= 1.02;
                            balls.forEach(b => {
                                b.userData.vx *= 1.02;
                                b.userData.vz *= 1.02;
                            });
                        }

                        // Power-up spawn every 10th brick
                        if (bricksDestroyed % 10 === 0) {
                            spawnPowerUp(brick.position.x, brick.position.z);
                        }

                        // Check win
                        if (bricksDestroyed >= 40) {
                            gameState = 'won';
                            messageEl.textContent = 'YOU WIN!';
                            messageEl.style.display = 'block';
                            messageEl.style.color = '#2ecc71';
                            pauseBtn.style.display = 'none';
                        }
                    } else {
                        // Brick damaged - change to darker color
                        brick.material.color.setHex(rowDarkColors[brick.userData.row]);
                        brick.material.emissive.setHex(rowDarkColors[brick.userData.row]);
                        brick.material.emissiveIntensity = 0.3;
                        spawnParticles(brick.position.clone(), brick.material.color.getHex(), 4);
                    }
                    break; // Only one brick collision per frame per ball
                }
            }

            // Trophy collision
            if (trophy && !trophyHit && trophyExists) {
                const tdx = ball.position.x - trophy.position.x;
                const tdz = ball.position.z - trophy.position.z;
                const tDist = Math.sqrt(tdx * tdx + tdz * tdz);
                if (tDist < 1.5) {
                    trophyHit = true;
                    score += 500;
                    spawnParticles(trophy.position.clone(), 0xffd700, 30);
                    // Make trophy fly up and fade
                    const trophyFade = () => {
                        if (trophy) {
                            trophy.position.y += 0.1;
                            trophy.rotation.y += 0.1;
                            trophy.scale.multiplyScalar(0.95);
                            if (trophy.scale.x > 0.001) {
                                requestAnimationFrame(trophyFade);
                            } else {
                                scene.remove(trophy);
                                trophy = null;
                                trophyExists = false;
                            }
                        }
                    };
                    trophyFade();

                    // Bounce ball
                    ball.userData.vz = -ball.userData.vz;
                }
            }
        }

        // --- Power-up movement and collection ---
        for (let i = powerUps.length - 1; i >= 0; i--) {
            const pu = powerUps[i];
            pu.position.z += 0.05;

            // Check collection by paddles
            const puCollected = (
                (Math.abs(pu.position.x - p1Paddle.position.x) < p1Paddle.userData.width / 2 + 0.3 &&
                 Math.abs(pu.position.z - p1Paddle.position.z) < 1) ||
                (Math.abs(pu.position.x - p2Paddle.position.x) < p2Paddle.userData.width / 2 + 0.3 &&
                 Math.abs(pu.position.z - p2Paddle.position.z) < 1)
            );

            if (puCollected) {
                powerUpsCollected++;
                activatePowerUpEffect(pu.userData.type);
                spawnParticles(pu.position.clone(), 0xffd700, 10);
                scene.remove(pu);
                powerUps.splice(i, 1);
            } else if (pu.position.z > 16) {
                scene.remove(pu);
                powerUps.splice(i, 1);
            }
        }
    }

    updateHUD();
    updateState();
    renderer.render(scene, camera);
}

animate();

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
