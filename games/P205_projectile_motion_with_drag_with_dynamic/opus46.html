<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Projectile Motion Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#difficulty-buttons {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    display: flex;
    gap: 8px;
}

#difficulty-buttons button {
    padding: 8px 20px;
    border: 2px solid #fff;
    border-radius: 6px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#difficulty-buttons button:hover {
    transform: scale(1.05);
}

#btn-easy {
    background: rgba(46, 204, 113, 0.8);
}
#btn-easy.active {
    background: rgba(46, 204, 113, 1);
    box-shadow: 0 0 15px rgba(46, 204, 113, 0.8);
}

#btn-medium {
    background: rgba(241, 196, 15, 0.8);
}
#btn-medium.active {
    background: rgba(241, 196, 15, 1);
    box-shadow: 0 0 15px rgba(241, 196, 15, 0.8);
}

#btn-hard {
    background: rgba(231, 76, 60, 0.8);
}
#btn-hard.active {
    background: rgba(231, 76, 60, 1);
    box-shadow: 0 0 15px rgba(231, 76, 60, 0.8);
}

#hud {
    position: absolute;
    top: 55px;
    left: 10px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    padding: 15px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    min-width: 320px;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
}

#hud .section-title {
    color: #3498db;
    font-weight: bold;
    font-size: 14px;
    margin-top: 8px;
    margin-bottom: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 2px;
}

#hud .section-title:first-child {
    margin-top: 0;
}

#hud .value {
    color: #f1c40f;
    font-weight: bold;
}

#hud .hit {
    color: #2ecc71;
}

#hud .miss {
    color: #e74c3c;
}

#controls-help {
    position: absolute;
    bottom: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0, 0, 0, 0.7);
    color: #aaa;
    padding: 12px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.5;
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255,255,255,0.1);
}

#controls-help span {
    color: #fff;
    background: rgba(255,255,255,0.15);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: monospace;
}
</style>
</head>
<body>

<div id="difficulty-buttons">
    <button id="btn-easy" class="active" onclick="setDifficulty('easy')">Easy</button>
    <button id="btn-medium" onclick="setDifficulty('medium')">Medium</button>
    <button id="btn-hard" onclick="setDifficulty('hard')">Hard</button>
</div>

<div id="hud"></div>

<div id="controls-help">
    <span>↑↓</span> Elevation &nbsp; <span>←→</span> Azimuth &nbsp; <span>W/S</span> Power &nbsp; <span>SPACE</span> Fire &nbsp; <span>R</span> Reset
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Difficulty Settings ---
const DIFFICULTIES = {
    easy:   { cd: 0.1, targetDist: 15, targetRadius: 4 },
    medium: { cd: 0.3, targetDist: 25, targetRadius: 3 },
    hard:   { cd: 0.6, targetDist: 35, targetRadius: 2 }
};

// --- State ---
let difficulty = 'easy';
let launchAngle = 45;
let azimuthAngle = 0;
let launchSpeed = 20;
let projectileStatus = 'ready';
let projectilePosition = new THREE.Vector3(0, 0, 0);
let projectileVelocity = new THREE.Vector3(0, 0, 0);
let landingPosition = null;
let distanceToTarget = null;
let isHit = false;
let score = { easy: { hits: 0, total: 0 }, medium: { hits: 0, total: 0 }, hard: { hits: 0, total: 0 } };
let trailPoints = [];
let modelLoaded = false;
let timeInFlight = 0;
let maxHeight = 0;
let currentDragForce = new THREE.Vector3(0, 0, 0);

const dt = 1 / 60;
const g = 9.81;
const rho = 1.225;
const projectileRadius = 0.5;
const projectileMass = 1.0;
const A = Math.PI * projectileRadius * projectileRadius;

// --- Three.js Setup ---
const scene = new THREE.Scene();

// Sky gradient
const canvas2d = document.createElement('canvas');
canvas2d.width = 2;
canvas2d.height = 512;
const ctx = canvas2d.getContext('2d');
const gradient = ctx.createLinearGradient(0, 0, 0, 512);
gradient.addColorStop(0, '#1a2a6c');
gradient.addColorStop(0.3, '#4a90d9');
gradient.addColorStop(0.6, '#87ceeb');
gradient.addColorStop(1, '#b5d8f0');
ctx.fillStyle = gradient;
ctx.fillRect(0, 0, 2, 512);
const skyTexture = new THREE.CanvasTexture(canvas2d);
skyTexture.magFilter = THREE.LinearFilter;
scene.background = skyTexture;

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 15, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(10, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(10, 20, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

// Ground
const groundGeom = new THREE.PlaneGeometry(200, 200);
const groundMat = new THREE.MeshStandardMaterial({ 
    color: 0x3a7d44,
    roughness: 0.8,
    metalness: 0.1
});
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Grid helper
const gridHelper = new THREE.GridHelper(200, 40, 0x2d6a35, 0x2d6a35);
gridHelper.position.y = 0.01;
gridHelper.material.opacity = 0.3;
gridHelper.material.transparent = true;
scene.add(gridHelper);

// Launcher placeholder (before model loads)
const launcherGroup = new THREE.Group();
scene.add(launcherGroup);

const launcherPlaceholder = new THREE.Group();
// Base
const baseGeom = new THREE.CylinderGeometry(1, 1.2, 0.5, 16);
const baseMat = new THREE.MeshStandardMaterial({ color: 0x555555, metalness: 0.7, roughness: 0.3 });
const base = new THREE.Mesh(baseGeom, baseMat);
base.position.y = 0.25;
base.castShadow = true;
launcherPlaceholder.add(base);

// Barrel
const barrelGeom = new THREE.CylinderGeometry(0.3, 0.4, 3, 12);
const barrelMat = new THREE.MeshStandardMaterial({ color: 0x777777, metalness: 0.8, roughness: 0.2 });
const barrel = new THREE.Mesh(barrelGeom, barrelMat);
barrel.position.y = 1.5;
barrel.castShadow = true;
launcherPlaceholder.add(barrel);

launcherGroup.add(launcherPlaceholder);

// Load GLTF model
const loader = new GLTFLoader();
let gltfModel = null;
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
    (gltf) => {
        gltfModel = gltf.scene;
        gltfModel.scale.set(2, 2, 2);
        gltfModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        launcherGroup.remove(launcherPlaceholder);
        launcherGroup.add(gltfModel);
        modelLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load AntiqueCamera.glb, using placeholder:', error);
        modelLoaded = false;
    }
);

// Target
const targetGroup = new THREE.Group();
scene.add(targetGroup);

let targetMesh, targetRing1, targetRing2, targetCenter;

function createTarget() {
    // Clear old
    while (targetGroup.children.length > 0) {
        const child = targetGroup.children[0];
        targetGroup.remove(child);
        if (child.geometry) child.geometry.dispose();
        if (child.material) child.material.dispose();
    }

    const diff = DIFFICULTIES[difficulty];
    
    // Main target cylinder
    const targetGeom = new THREE.CylinderGeometry(diff.targetRadius, diff.targetRadius, 0.3, 32);
    const targetMat = new THREE.MeshStandardMaterial({ 
        color: 0xff0000, 
        transparent: true, 
        opacity: 0.5,
        emissive: 0xff0000,
        emissiveIntensity: 0.2
    });
    targetMesh = new THREE.Mesh(targetGeom, targetMat);
    targetMesh.position.set(diff.targetDist, 0.15, 0);
    targetMesh.receiveShadow = true;
    targetGroup.add(targetMesh);

    // Rings
    const ring1Geom = new THREE.RingGeometry(diff.targetRadius * 0.6, diff.targetRadius * 0.65, 32);
    const ring1Mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    targetRing1 = new THREE.Mesh(ring1Geom, ring1Mat);
    targetRing1.rotation.x = -Math.PI / 2;
    targetRing1.position.set(diff.targetDist, 0.32, 0);
    targetGroup.add(targetRing1);

    const ring2Geom = new THREE.RingGeometry(diff.targetRadius * 0.3, diff.targetRadius * 0.35, 32);
    const ring2Mat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
    targetRing2 = new THREE.Mesh(ring2Geom, ring2Mat);
    targetRing2.rotation.x = -Math.PI / 2;
    targetRing2.position.set(diff.targetDist, 0.33, 0);
    targetGroup.add(targetRing2);

    // Center dot
    const centerGeom = new THREE.CircleGeometry(0.3, 16);
    const centerMat = new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.DoubleSide });
    targetCenter = new THREE.Mesh(centerGeom, centerMat);
    targetCenter.rotation.x = -Math.PI / 2;
    targetCenter.position.set(diff.targetDist, 0.34, 0);
    targetGroup.add(targetCenter);

    // Distance markers
    for (let i = 5; i <= 40; i += 5) {
        const markerGeom = new THREE.PlaneGeometry(0.5, 0.1);
        const markerMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide });
        const marker = new THREE.Mesh(markerGeom, markerMat);
        marker.rotation.x = -Math.PI / 2;
        marker.position.set(i, 0.02, 0);
        targetGroup.add(marker);
    }
}

createTarget();

// Projectile
const projGeom = new THREE.SphereGeometry(projectileRadius, 16, 16);
const projMat = new THREE.MeshStandardMaterial({ 
    color: 0xffd700, 
    metalness: 0.8, 
    roughness: 0.2,
    emissive: 0xffa500,
    emissiveIntensity: 0.3
});
const projectile = new THREE.Mesh(projGeom, projMat);
projectile.castShadow = true;
projectile.visible = false;
scene.add(projectile);

// Trail
const MAX_TRAIL_POINTS = 5000;
const trailGeometry = new THREE.BufferGeometry();
const trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeometry.setDrawRange(0, 0);
const trailMaterial = new THREE.LineBasicMaterial({ 
    color: 0xffaa00, 
    transparent: true, 
    opacity: 0.6,
    linewidth: 2
});
const trailLine = new THREE.Line(trailGeometry, trailMaterial);
scene.add(trailLine);

// Direction arrow helper
const arrowHelper = new THREE.ArrowHelper(
    new THREE.Vector3(1, 1, 0).normalize(),
    new THREE.Vector3(0, 1, 0),
    5,
    0x00ff00,
    1,
    0.5
);
scene.add(arrowHelper);

// Landing marker
const landingMarkerGeom = new THREE.RingGeometry(0.3, 0.5, 16);
const landingMarkerMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide });
const landingMarker = new THREE.Mesh(landingMarkerGeom, landingMarkerMat);
landingMarker.rotation.x = -Math.PI / 2;
landingMarker.position.y = 0.02;
landingMarker.visible = false;
scene.add(landingMarker);

// --- Functions ---
function getTargetPosition() {
    const diff = DIFFICULTIES[difficulty];
    return new THREE.Vector3(diff.targetDist, 0, 0);
}

function getLaunchDirection() {
    const elevRad = THREE.MathUtils.degToRad(launchAngle);
    const azRad = THREE.MathUtils.degToRad(azimuthAngle);
    
    const dir = new THREE.Vector3(
        Math.cos(elevRad) * Math.cos(azRad),
        Math.sin(elevRad),
        -Math.cos(elevRad) * Math.sin(azRad)
    );
    return dir.normalize();
}

function updateArrow() {
    const dir = getLaunchDirection();
    const powerFraction = (launchSpeed - 10) / 20;
    const arrowLength = 3 + powerFraction * 7;
    arrowHelper.setDirection(dir);
    arrowHelper.setLength(arrowLength, 1, 0.5);
    arrowHelper.position.set(0, 1, 0);
    
    // Color based on power
    const r = powerFraction;
    const g = 1 - powerFraction;
    arrowHelper.setColor(new THREE.Color(r, g, 0));
}

function fireProjectile() {
    if (projectileStatus === 'in_flight') return;
    
    projectileStatus = 'in_flight';
    const dir = getLaunchDirection();
    
    projectilePosition.set(0, 1, 0);
    projectileVelocity.copy(dir).multiplyScalar(launchSpeed);
    
    projectile.position.copy(projectilePosition);
    projectile.visible = true;
    
    landingPosition = null;
    distanceToTarget = null;
    isHit = false;
    timeInFlight = 0;
    maxHeight = projectilePosition.y;
    currentDragForce.set(0, 0, 0);
    
    // Clear trail
    trailPoints = [];
    trailGeometry.setDrawRange(0, 0);
    
    landingMarker.visible = false;
    
    score[difficulty].total++;
}

function resetProjectile() {
    projectileStatus = 'ready';
    projectile.visible = false;
    projectilePosition.set(0, 0, 0);
    projectileVelocity.set(0, 0, 0);
    timeInFlight = 0;
    maxHeight = 0;
    currentDragForce.set(0, 0, 0);
    
    trailPoints = [];
    trailGeometry.setDrawRange(0, 0);
    
    landingMarker.visible = false;
}

function updatePhysics() {
    if (projectileStatus !== 'in_flight') return;
    
    const diff = DIFFICULTIES[difficulty];
    const cd = diff.cd;
    
    // Compute drag
    const speed = projectileVelocity.length();
    if (speed > 0) {
        const dragMag = 0.5 * cd * rho * A * speed * speed;
        currentDragForce.copy(projectileVelocity).normalize().multiplyScalar(-dragMag);
    } else {
        currentDragForce.set(0, 0, 0);
    }
    
    // Gravity
    const gravityForce = new THREE.Vector3(0, -g, 0);
    
    // Acceleration
    const accel = new THREE.Vector3();
    accel.copy(gravityForce).add(currentDragForce.clone().divideScalar(projectileMass));
    
    // Update velocity
    projectileVelocity.add(accel.clone().multiplyScalar(dt));
    
    // Update position
    projectilePosition.add(projectileVelocity.clone().multiplyScalar(dt));
    
    timeInFlight += dt;
    
    if (projectilePosition.y > maxHeight) {
        maxHeight = projectilePosition.y;
    }
    
    // Add trail point
    if (trailPoints.length < MAX_TRAIL_POINTS) {
        trailPoints.push(projectilePosition.clone());
        const idx = (trailPoints.length - 1) * 3;
        trailPositions[idx] = projectilePosition.x;
        trailPositions[idx + 1] = projectilePosition.y;
        trailPositions[idx + 2] = projectilePosition.z;
        trailGeometry.attributes.position.needsUpdate = true;
        trailGeometry.setDrawRange(0, trailPoints.length);
    }
    
    // Check ground collision
    if (projectilePosition.y <= 0) {
        projectilePosition.y = 0;
        projectileStatus = 'landed';
        
        landingPosition = projectilePosition.clone();
        
        const targetPos = getTargetPosition();
        const dx = landingPosition.x - targetPos.x;
        const dz = landingPosition.z - targetPos.z;
        distanceToTarget = Math.sqrt(dx * dx + dz * dz);
        
        isHit = distanceToTarget <= diff.targetRadius;
        if (isHit) {
            score[difficulty].hits++;
        }
        
        // Show landing marker
        landingMarker.position.set(landingPosition.x, 0.02, landingPosition.z);
        landingMarker.visible = true;
        if (isHit) {
            landingMarkerMat.color.setHex(0x00ff00);
        } else {
            landingMarkerMat.color.setHex(0xff00ff);
        }
    }
    
    projectile.position.copy(projectilePosition);
}

window.setDifficulty = function(diff) {
    difficulty = diff;
    
    document.querySelectorAll('#difficulty-buttons button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + diff).classList.add('active');
    
    createTarget();
    resetProjectile();
    landingPosition = null;
    distanceToTarget = null;
    isHit = false;
};

function updateHUD() {
    const diff = DIFFICULTIES[difficulty];
    const sc = score[difficulty];
    
    const ke = 0.5 * projectileMass * projectileVelocity.lengthSq();
    const pe = projectileMass * g * Math.max(0, projectilePosition.y);
    
    let statusColor = '#aaa';
    let statusText = projectileStatus.replace('_', ' ').toUpperCase();
    if (projectileStatus === 'ready') statusColor = '#2ecc71';
    else if (projectileStatus === 'in_flight') statusColor = '#f39c12';
    else if (projectileStatus === 'landed') statusColor = isHit ? '#2ecc71' : '#e74c3c';
    
    const hud = document.getElementById('hud');
    hud.innerHTML = `
        <div class="section-title">⚙ Settings</div>
        <div>Difficulty: <span class="value">${difficulty.toUpperCase()}</span> | Cd: <span class="value">${diff.cd}</span></div>
        <div>Elevation: <span class="value">${launchAngle}°</span> | Azimuth: <span class="value">${azimuthAngle}°</span></div>
        <div>Speed: <span class="value">${launchSpeed.toFixed(1)} m/s</span></div>
        
        <div class="section-title">🎯 Target</div>
        <div>Distance: <span class="value">${diff.targetDist}m</span> | Radius: <span class="value">${diff.targetRadius}m</span></div>
        
        <div class="section-title">📊 Status</div>
        <div>Status: <span style="color:${statusColor};font-weight:bold">${statusText}</span></div>
        <div>Position: <span class="value">(${projectilePosition.x.toFixed(2)}, ${projectilePosition.y.toFixed(2)}, ${projectilePosition.z.toFixed(2)})</span></div>
        <div>Time: <span class="value">${timeInFlight.toFixed(2)}s</span> | Max Height: <span class="value">${maxHeight.toFixed(2)}m</span></div>
        <div>KE: <span class="value">${ke.toFixed(1)}J</span> | PE: <span class="value">${pe.toFixed(1)}J</span></div>
        
        <div class="section-title">🏆 Score</div>
        <div>Hits: <span class="value">${sc.hits} / ${sc.total}</span> (${sc.total > 0 ? (sc.hits / sc.total * 100).toFixed(0) : 0}%)</div>
        ${distanceToTarget !== null ? `<div>Landing Distance: <span class="${isHit ? 'hit' : 'miss'}">${distanceToTarget.toFixed(2)}m ${isHit ? '✓ HIT!' : '✗ MISS'}</span></div>` : ''}
    `;
}

// --- State Export ---
window.__3D_STATE__ = {};

function updateState() {
    const diff = DIFFICULTIES[difficulty];
    const ke = 0.5 * projectileMass * projectileVelocity.lengthSq();
    const pe = projectileMass * g * Math.max(0, projectilePosition.y);
    const targetPos = getTargetPosition();
    
    window.__3D_STATE__ = {
        difficulty: difficulty,
        launchAngle: launchAngle,
        azimuthAngle: azimuthAngle,
        launchSpeed: launchSpeed,
        dragCoefficient: diff.cd,
        projectileStatus: projectileStatus,
        projectilePosition: { x: projectilePosition.x, y: projectilePosition.y, z: projectilePosition.z },
        projectileVelocity: { x: projectileVelocity.x, y: projectileVelocity.y, z: projectileVelocity.z },
        targetPosition: { x: targetPos.x, y: targetPos.y, z: targetPos.z },
        targetRadius: diff.targetRadius,
        landingPosition: landingPosition ? { x: landingPosition.x, y: landingPosition.y, z: landingPosition.z } : null,
        distanceToTarget: distanceToTarget,
        isHit: isHit,
        score: { hits: score[difficulty].hits, total: score[difficulty].total },
        shotsFired: score[difficulty].total,
        trailPoints: trailPoints.length,
        modelLoaded: modelLoaded,
        energy: { kinetic: ke, potential: pe },
        dragForce: { x: currentDragForce.x, y: currentDragForce.y, z: currentDragForce.z },
        timeInFlight: timeInFlight,
        maxHeight: maxHeight
    };
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        fireProjectile();
        return;
    }
    if (e.code === 'KeyR') {
        resetProjectile();
        return;
    }
    keys[e.code] = true;
});

document.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

function handleInput() {
    if (keys['ArrowUp']) {
        launchAngle = Math.min(80, launchAngle + 1);
        keys['ArrowUp'] = false;
    }
    if (keys['ArrowDown']) {
        launchAngle = Math.max(10, launchAngle - 1);
        keys['ArrowDown'] = false;
    }
    if (keys['ArrowLeft']) {
        azimuthAngle = Math.max(-45, azimuthAngle - 1);
        keys['ArrowLeft'] = false;
    }
    if (keys['ArrowRight']) {
        azimuthAngle = Math.min(45, azimuthAngle + 1);
        keys['ArrowRight'] = false;
    }
    if (keys['KeyW']) {
        launchSpeed = Math.min(30, launchSpeed + 0.5);
        keys['KeyW'] = false;
    }
    if (keys['KeyS']) {
        launchSpeed = Math.max(10, launchSpeed - 0.5);
        keys['KeyS'] = false;
    }
}

// --- Animate ---
function animate() {
    requestAnimationFrame(animate);
    
    handleInput();
    updateArrow();
    updatePhysics();
    
    // Animate target
    if (targetMesh) {
        const t = performance.now() * 0.001;
        targetMesh.material.opacity = 0.4 + 0.1 * Math.sin(t * 2);
    }
    
    // Projectile glow effect when in flight
    if (projectileStatus === 'in_flight') {
        const t = performance.now() * 0.003;
        projMat.emissiveIntensity = 0.3 + 0.2 * Math.sin(t);
    }
    
    controls.update();
    updateHUD();
    updateState();
    
    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

updateArrow();
