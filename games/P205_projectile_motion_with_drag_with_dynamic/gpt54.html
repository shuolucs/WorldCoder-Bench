<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Projectile Motion Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #87ceeb;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 10;
      line-height: 1.4;
      min-width: 320px;
      font-size: 14px;
      white-space: pre-line;
      pointer-events: none;
    }

    #controls {
      position: absolute;
      top: 12px;
      left: 370px;
      z-index: 11;
      display: flex;
      gap: 8px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: rgba(255,255,255,0.9);
      font-weight: bold;
    }

    button.active {
      background: #ffd54f;
    }

    #help {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      white-space: pre-line;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud"></div>
    <div id="controls">
      <button id="easyBtn" class="active">Easy</button>
      <button id="mediumBtn">Medium</button>
      <button id="hardBtn">Hard</button>
    </div>
    <div id="help">Keys: ↑/↓ Elevation | ←/→ Azimuth | W/S Power | SPACE Fire | R Reset</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById("app");
    const hud = document.getElementById("hud");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 15, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const groundGeo = new THREE.PlaneGeometry(200, 200);
    const groundMat = new THREE.MeshPhongMaterial({ color: 0x2e8b57 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const grid = new THREE.GridHelper(200, 40, 0xffffff, 0xffffff);
    grid.material.opacity = 0.15;
    grid.material.transparent = true;
    scene.add(grid);

    const difficulties = {
      easy:   { name: "Easy",   Cd: 0.1, targetDistance: 15, targetRadius: 4, speedMin: 10, speedMax: 30 },
      medium: { name: "Medium", Cd: 0.3, targetDistance: 25, targetRadius: 3, speedMin: 10, speedMax: 30 },
      hard:   { name: "Hard",   Cd: 0.6, targetDistance: 35, targetRadius: 2, speedMin: 10, speedMax: 30 },
    };

    const scoreByDifficulty = {
      easy: { hits: 0, total: 0 },
      medium: { hits: 0, total: 0 },
      hard: { hits: 0, total: 0 },
    };

    let currentDifficulty = "easy";

    let launcher = new THREE.Group();
    scene.add(launcher);

    let modelLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "AntiqueCamera.glb",
      (gltf) => {
        launcher.remove(...launcher.children);
        const model = gltf.scene;
        model.scale.set(2, 2, 2);
        model.position.set(0, 0, 0);
        launcher.add(model);
        modelLoaded = true;
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(2, 1.5, 3),
          new THREE.MeshStandardMaterial({ color: 0x555555 })
        );
        fallback.position.set(0, 0.75, 0);
        launcher.add(fallback);
        modelLoaded = false;
      }
    );

    const targetMat = new THREE.MeshPhongMaterial({
      color: 0xff0000,
      transparent: true,
      opacity: 0.5
    });
    let target = new THREE.Mesh(
      new THREE.CylinderGeometry(3, 3, 0.3, 32),
      targetMat
    );
    target.position.set(15, 0.15, 0);
    scene.add(target);

    const projectileRadius = 0.5;
    const projectileGeo = new THREE.SphereGeometry(projectileRadius, 24, 24);
    const projectileMat = new THREE.MeshPhongMaterial({ color: 0xffd700 });
    const projectile = new THREE.Mesh(projectileGeo, projectileMat);
    projectile.visible = false;
    scene.add(projectile);

    const trailMaterial = new THREE.LineBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.45
    });
    let trailPoints = [];
    let trailGeometry = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
    let trailLine = new THREE.Line(trailGeometry, trailMaterial);
    scene.add(trailLine);

    const g = 9.81;
    const dt = 1 / 60;
    const rho = 1.225;
    const mass = 1.0;
    const area = Math.PI * projectileRadius * projectileRadius;

    let launchAngle = 45;
    let azimuthAngle = 0;
    let launchSpeed = 20;

    let projectileStatus = "ready";
    let projectilePosition = new THREE.Vector3(0, 0, 0);
    let projectileVelocity = new THREE.Vector3(0, 0, 0);
    let landingPosition = null;
    let distanceToTarget = null;
    let isHit = false;
    let shotsFired = 0;
    let timeInFlight = 0;
    let maxHeight = 0;
    let currentDragForce = new THREE.Vector3(0, 0, 0);

    const launchOrigin = new THREE.Vector3(0, 1.2, 0);

    function getDifficultyData() {
      return difficulties[currentDifficulty];
    }

    function getTargetPosition() {
      return target.position.clone();
    }

    function updateTarget() {
      const d = getDifficultyData();
      scene.remove(target);
      target.geometry.dispose();
      target = new THREE.Mesh(
        new THREE.CylinderGeometry(d.targetRadius, d.targetRadius, 0.3, 32),
        targetMat
      );
      target.position.set(d.targetDistance, 0.15, 0);
      scene.add(target);
    }

    function resetProjectile(clearLanding = true) {
      projectile.visible = false;
      projectileStatus = "ready";
      projectilePosition.set(0, 0, 0);
      projectileVelocity.set(0, 0, 0);
      timeInFlight = 0;
      maxHeight = 0;
      currentDragForce.set(0, 0, 0);
      trailPoints = [];
      updateTrail();
      if (clearLanding) {
        landingPosition = null;
        distanceToTarget = null;
        isHit = false;
      }
    }

    function launchProjectile() {
      if (projectileStatus === "in_flight") return;

      const d = getDifficultyData();
      launchSpeed = THREE.MathUtils.clamp(launchSpeed, d.speedMin, d.speedMax);

      const elev = THREE.MathUtils.degToRad(launchAngle);
      const azim = THREE.MathUtils.degToRad(azimuthAngle);

      const vx = launchSpeed * Math.cos(elev) * Math.cos(azim);
      const vy = launchSpeed * Math.sin(elev);
      const vz = launchSpeed * Math.cos(elev) * Math.sin(azim);

      projectilePosition.copy(launchOrigin);
      projectileVelocity.set(vx, vy, vz);
      projectile.position.copy(projectilePosition);
      projectile.visible = true;
      projectileStatus = "in_flight";
      timeInFlight = 0;
      maxHeight = projectilePosition.y;
      currentDragForce.set(0, 0, 0);

      trailPoints = [projectilePosition.clone()];
      updateTrail();

      shotsFired++;
      scoreByDifficulty[currentDifficulty].total++;
      landingPosition = null;
      distanceToTarget = null;
      isHit = false;
    }

    function updateTrail() {
      if (trailGeometry) trailGeometry.dispose();
      const points = trailPoints.length > 1 ? trailPoints : [new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)];
      trailGeometry = new THREE.BufferGeometry().setFromPoints(points);
      trailLine.geometry = trailGeometry;
    }

    function simulateStep() {
      if (projectileStatus !== "in_flight") return;

      const d = getDifficultyData();
      const speed = projectileVelocity.length();

      let dragForce = new THREE.Vector3(0, 0, 0);
      if (speed > 0) {
        dragForce.copy(projectileVelocity)
          .multiplyScalar(-0.5 * d.Cd * rho * area * speed);
      }

      currentDragForce.copy(dragForce);

      const gravityForce = new THREE.Vector3(0, -mass * g, 0);
      const totalForce = gravityForce.clone().add(dragForce);
      const acceleration = totalForce.multiplyScalar(1 / mass);

      projectileVelocity.addScaledVector(acceleration, dt);
      projectilePosition.addScaledVector(projectileVelocity, dt);

      timeInFlight += dt;
      maxHeight = Math.max(maxHeight, projectilePosition.y);

      trailPoints.push(projectilePosition.clone());
      updateTrail();

      if (projectilePosition.y <= projectileRadius) {
        projectilePosition.y = projectileRadius;
        projectile.position.copy(projectilePosition);
        projectileStatus = "landed";
        landingPosition = projectilePosition.clone();

        const targetCenter = getTargetPosition();
        const dx = landingPosition.x - targetCenter.x;
        const dz = landingPosition.z - targetCenter.z;
        distanceToTarget = Math.sqrt(dx * dx + dz * dz);

        isHit = distanceToTarget <= d.targetRadius;
        if (isHit) scoreByDifficulty[currentDifficulty].hits++;

        projectileVelocity.set(0, 0, 0);
        currentDragForce.set(0, 0, 0);
        return;
      }

      projectile.position.copy(projectilePosition);
    }

    function getEnergy() {
      const kinetic = 0.5 * mass * projectileVelocity.lengthSq();
      const potential = projectileStatus === "ready" ? 0 : mass * g * Math.max(projectilePosition.y, 0);
      return { kinetic, potential };
    }

    function updateHUD() {
      const d = getDifficultyData();
      const score = scoreByDifficulty[currentDifficulty];
      const pos = projectileStatus === "ready"
        ? { x: 0, y: 0, z: 0 }
        : { x: projectilePosition.x, y: projectilePosition.y, z: projectilePosition.z };

      hud.textContent =
`Difficulty: ${d.name}
Elevation: ${launchAngle.toFixed(0)}°
Azimuth: ${azimuthAngle.toFixed(0)}°
Launch Speed: ${launchSpeed.toFixed(1)} m/s
Drag Coefficient: ${d.Cd.toFixed(2)}

Score: ${score.hits} / ${score.total}
Last Landing Distance: ${distanceToTarget == null ? "N/A" : distanceToTarget.toFixed(2) + " m"}
Status: ${projectileStatus === "in_flight" ? "In Flight" : projectileStatus === "landed" ? "Landed" : "Ready"}

Projectile Position:
x=${pos.x.toFixed(2)}  y=${pos.y.toFixed(2)}  z=${pos.z.toFixed(2)}`;
    }

    function updateButtons() {
      document.getElementById("easyBtn").classList.toggle("active", currentDifficulty === "easy");
      document.getElementById("mediumBtn").classList.toggle("active", currentDifficulty === "medium");
      document.getElementById("hardBtn").classList.toggle("active", currentDifficulty === "hard");
    }

    function setDifficulty(level) {
      currentDifficulty = level;
      const d = getDifficultyData();
      launchSpeed = THREE.MathUtils.clamp(launchSpeed, d.speedMin, d.speedMax);
      scoreByDifficulty[level] = { hits: 0, total: 0 };
      updateTarget();
      resetProjectile(true);
      updateButtons();
    }

    document.getElementById("easyBtn").addEventListener("click", () => setDifficulty("easy"));
    document.getElementById("mediumBtn").addEventListener("click", () => setDifficulty("medium"));
    document.getElementById("hardBtn").addEventListener("click", () => setDifficulty("hard"));

    window.addEventListener("keydown", (e) => {
      const d = getDifficultyData();

      if (e.code === "ArrowUp") {
        launchAngle = Math.min(80, launchAngle + 1);
      } else if (e.code === "ArrowDown") {
        launchAngle = Math.max(10, launchAngle - 1);
      } else if (e.code === "ArrowLeft") {
        azimuthAngle = Math.max(-45, azimuthAngle - 1);
      } else if (e.code === "ArrowRight") {
        azimuthAngle = Math.min(45, azimuthAngle + 1);
      } else if (e.code === "KeyW") {
        launchSpeed = Math.min(d.speedMax, launchSpeed + 0.5);
      } else if (e.code === "KeyS") {
        launchSpeed = Math.max(d.speedMin, launchSpeed - 0.5);
      } else if (e.code === "Space") {
        e.preventDefault();
        launchProjectile();
      } else if (e.code === "KeyR") {
        resetProjectile(true);
      }
    });

    function updateState() {
      const d = getDifficultyData();
      const energy = getEnergy();
      const score = scoreByDifficulty[currentDifficulty];

      window.__3D_STATE__ = {
        difficulty: currentDifficulty,
        launchAngle,
        azimuthAngle,
        launchSpeed,
        dragCoefficient: d.Cd,
        projectileStatus,
        projectilePosition: projectileStatus === "ready"
          ? { x: 0, y: 0, z: 0 }
          : { x: projectilePosition.x, y: projectilePosition.y, z: projectilePosition.z },
        projectileVelocity: { x: projectileVelocity.x, y: projectileVelocity.y, z: projectileVelocity.z },
        targetPosition: { x: target.position.x, y: target.position.y, z: target.position.z },
        targetRadius: d.targetRadius,
        landingPosition: landingPosition
          ? { x: landingPosition.x, y: landingPosition.y, z: landingPosition.z }
          : null,
        distanceToTarget,
        isHit,
        score: { hits: score.hits, total: score.total },
        shotsFired,
        trailPoints: trailPoints.length,
        modelLoaded,
        energy: {
          kinetic: energy.kinetic,
          potential: energy.potential
        },
        dragForce: {
          x: currentDragForce.x,
          y: currentDragForce.y,
          z: currentDragForce.z
        },
        timeInFlight,
        maxHeight
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      simulateStep();
      updateHUD();
      updateState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateTarget();
    resetProjectile(true);
    updateButtons();
    updateState();
    animate();
  </script>
</body>
</html>
