<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fire Tornado</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.5;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #controlPanel {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px;
            border-radius: 8px;
            width: 250px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #555;
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #aaa;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
    </style>
    <!-- Import Three.js and OrbitControls -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div>Active Particles: <span id="hud-active">0</span> / 3000</div>
        <div>FPS: <span id="hud-fps">0</span></div>
        <div>Max Height: <span id="hud-height">0.00</span></div>
        <div>Intensity: <span id="hud-intensity">1.0</span></div>
        <div>Theme: <span id="hud-theme">fire</span></div>
    </div>

    <div id="controlPanel">
        <div class="control-group">
            <label for="intensitySlider">Intensity: <span id="intensityVal">1.0</span></label>
            <input type="range" id="intensitySlider" min="0.1" max="3.0" step="0.1" value="1.0">
        </div>
        <div class="control-group">
            <button id="colorThemeBtn">Theme: Fire</button>
            <button id="toggleEmbersBtn">Hide Embers</button>
            <button id="pauseBtn">Pause</button>
        </div>
        <div class="instructions">
            Controls:<br>
            - Left Click + Drag: Rotate<br>
            - Scroll: Zoom<br>
            - Click Ground: Move Tornado<br>
            - Key 'R': Reset<br>
            - Key 'W': Toggle Wireframe
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            particleCount: 3000,
            activeParticleCount: 0,
            emberCount: 500,
            embersVisible: true,
            intensity: 1.0,
            colorTheme: 'fire',
            isPaused: false,
            tornadoBaseX: 0,
            tornadoBaseZ: 0,
            maxParticleHeight: 0,
            fps: 0,
            wireframeVisible: false,
            cameraDistance: 0,
            elapsedTime: 0,
            themeIndex: 0
        };
        const state = window.__3D_STATE__;

        const themes = [
            { name: 'fire', colors: [new THREE.Color(1.0, 1.0, 0.2), new THREE.Color(1.0, 0.4, 0.0), new THREE.Color(0.3, 0.0, 0.0)] },
            { name: 'ice', colors: [new THREE.Color(1.0, 1.0, 1.0), new THREE.Color(0.0, 1.0, 1.0), new THREE.Color(0.0, 0.0, 1.0)] },
            { name: 'toxic', colors: [new THREE.Color(0.5, 1.0, 0.0), new THREE.Color(0.2, 0.8, 0.0), new THREE.Color(0.0, 0.3, 0.0)] }
        ];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 8;
        controls.maxDistance = 40;
        controls.target.set(0, 5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xff4400, 2.0, 50);
        pointLight.position.set(0, 10, 0);
        scene.add(pointLight);

        // Ground
        const groundGeo = new THREE.CircleGeometry(10, 64);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Wireframe Debug Cylinder
        const wireGeo = new THREE.CylinderGeometry(5, 2, 16, 16, 1, true);
        const wireMat = new THREE.MeshBasicMaterial({ color: 0xffffff, wireframe: true, transparent: true, opacity: 0.2 });
        const wireMesh = new THREE.Mesh(wireGeo, wireMat);
        wireMesh.position.y = 8;
        wireMesh.visible = false;
        scene.add(wireMesh);

        // --- Particle System Setup ---
        
        // Generate circular gradient texture
        const canvas = document.createElement('canvas');
        canvas.width = 64;
        canvas.height = 64;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 64, 64);
        const particleTexture = new THREE.CanvasTexture(canvas);

        // Custom Shader Material for Particles
        const particleShaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                pointTexture: { value: particleTexture }
            },
            vertexShader: `
                attribute float size;
                attribute vec3 customColor;
                varying vec3 vColor;
                void main() {
                    vColor = customColor;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (300.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform sampler2D pointTexture;
                varying vec3 vColor;
                void main() {
                    gl_FragColor = vec4(vColor, 1.0) * texture2D(pointTexture, gl_PointCoord);
                }
            `,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            transparent: true
        });

        function createParticleSystem(count, isEmber) {
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            const sizes = new Float32Array(count);
            
            // Custom data for logic
            const data = [];

            for (let i = 0; i < count; i++) {
                positions[i * 3] = 0;
                positions[i * 3 + 1] = -1000; // Hide initially
                positions[i * 3 + 2] = 0;
                
                colors[i * 3] = 1; colors[i * 3 + 1] = 1; colors[i * 3 + 2] = 1;
                sizes[i] = 0;

                data.push({
                    life: isEmber ? Math.random() * 6 : Math.random() * 4, // Initial random life to stagger spawns
                    maxLife: isEmber ? 3.0 + Math.random() * 3.0 : 2.0 + Math.random() * 2.0,
                    angle: Math.random() * Math.PI * 2,
                    radius: 1.5 + Math.random() * 1.0,
                    vY: isEmber ? 3.0 + Math.random() * 3.0 : 2.0 + Math.random() * 2.0,
                    vAng: 2.0,
                    vRad: isEmber ? 0.5 + Math.random() * 1.0 : 0.3 + Math.random() * 0.5,
                    isEmber: isEmber,
                    breakaway: false
                });
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            const points = new THREE.Points(geometry, particleShaderMaterial);
            scene.add(points);

            return { points, data };
        }

        const mainParticles = createParticleSystem(state.particleCount, false);
        const emberParticles = createParticleSystem(state.emberCount, true);

        // --- Interaction & Events ---
        
        // UI Elements
        const intensitySlider = document.getElementById('intensitySlider');
        const intensityVal = document.getElementById('intensityVal');
        const colorThemeBtn = document.getElementById('colorThemeBtn');
        const toggleEmbersBtn = document.getElementById('toggleEmbersBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        // HUD Elements
        const hudActive = document.getElementById('hud-active');
        const hudFps = document.getElementById('hud-fps');
        const hudHeight = document.getElementById('hud-height');
        const hudIntensity = document.getElementById('hud-intensity');
        const hudTheme = document.getElementById('hud-theme');

        intensitySlider.addEventListener('input', (e) => {
            state.intensity = parseFloat(e.target.value);
            intensityVal.textContent = state.intensity.toFixed(1);
        });

        colorThemeBtn.addEventListener('click', () => {
            state.themeIndex = (state.themeIndex + 1) % themes.length;
            state.colorTheme = themes[state.themeIndex].name;
            colorThemeBtn.textContent = `Theme: ${state.colorTheme.charAt(0).toUpperCase() + state.colorTheme.slice(1)}`;
            
            // Update lights based on theme
            const c = themes[state.themeIndex].colors[0];
            pointLight.color.copy(c);
            ambientLight.color.setRGB(c.r*0.2, c.g*0.2, c.b*0.2);
        });

        toggleEmbersBtn.addEventListener('click', () => {
            state.embersVisible = !state.embersVisible;
            emberParticles.points.visible = state.embersVisible;
            toggleEmbersBtn.textContent = state.embersVisible ? 'Hide Embers' : 'Show Embers';
        });

        pauseBtn.addEventListener('click', () => {
            state.isPaused = !state.isPaused;
            pauseBtn.textContent = state.isPaused ? 'Resume' : 'Pause';
        });

        // Raycaster for ground click
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if(event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                let pt = intersects[0].point;
                const dist = Math.sqrt(pt.x * pt.x + pt.z * pt.z);
                if (dist > 8) {
                    pt.x = (pt.x / dist) * 8;
                    pt.z = (pt.z / dist) * 8;
                }
                state.tornadoBaseX = pt.x;
                state.tornadoBaseZ = pt.z;
                wireMesh.position.x = pt.x;
                wireMesh.position.z = pt.z;
            }
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'r') {
                state.intensity = 1.0;
                intensitySlider.value = 1.0;
                intensityVal.textContent = "1.0";
                
                state.themeIndex = 0;
                state.colorTheme = 'fire';
                colorThemeBtn.textContent = 'Theme: Fire';
                pointLight.color.copy(themes[0].colors[0]);
                ambientLight.color.setHex(0x331100);

                state.embersVisible = true;
                emberParticles.points.visible = true;
                toggleEmbersBtn.textContent = 'Hide Embers';

                state.isPaused = false;
                pauseBtn.textContent = 'Pause';

                state.tornadoBaseX = 0;
                state.tornadoBaseZ = 0;
                wireMesh.position.x = 0;
                wireMesh.position.z = 0;
            }
            if (e.key.toLowerCase() === 'w') {
                state.wireframeVisible = !state.wireframeVisible;
                wireMesh.visible = state.wireframeVisible;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let frames = 0;
        let lastFpsTime = performance.now();

        function updateParticles(sys, delta, themeColors) {
            const positions = sys.points.geometry.attributes.position.array;
            const colors = sys.points.geometry.attributes.customColor.array;
            const sizes = sys.points.geometry.attributes.size.array;
            const data = sys.data;
            
            let activeCount = 0;
            let maxHeight = 0;

            for (let i = 0; i < data.length; i++) {
                const p = data[i];
                p.life += delta;

                if (p.life >= p.maxLife) {
                    // Respawn
                    p.life = 0;
                    p.maxLife = p.isEmber ? 3.0 + Math.random() * 3.0 : 2.0 + Math.random() * 2.0;
                    p.angle = Math.random() * Math.PI * 2;
                    p.radius = 1.5 + Math.random() * 1.0;
                    p.vY = p.isEmber ? 3.0 + Math.random() * 3.0 : 2.0 + Math.random() * 2.0;
                    p.vAng = 2.0;
                    p.vRad = p.isEmber ? 0.5 + Math.random() * 1.0 : 0.3 + Math.random() * 0.5;
                    p.breakaway = p.isEmber && Math.random() > 0.8;
                    
                    positions[i * 3 + 1] = 0; // Reset Y
                }

                let y = positions[i * 3 + 1];
                
                if (y >= 0) {
                    activeCount++;
                    
                    // Motion
                    y += p.vY * state.intensity * delta;
                    
                    if (!p.breakaway) {
                        // Decrease angular velocity with height
                        const heightFactor = Math.max(0, 1.0 - y / 20.0);
                        p.angle += p.vAng * state.intensity * delta * heightFactor;
                        p.radius += p.vRad * delta;
                    } else {
                        // Embers breaking away drift outward more
                        p.radius += p.vRad * 2.0 * delta;
                        p.angle += p.vAng * 0.5 * delta;
                    }

                    const x = state.tornadoBaseX + p.radius * Math.cos(p.angle);
                    const z = state.tornadoBaseZ + p.radius * Math.sin(p.angle);

                    positions[i * 3] = x;
                    positions[i * 3 + 1] = y;
                    positions[i * 3 + 2] = z;

                    if (y > maxHeight) maxHeight = y;

                    // Visuals
                    const t = p.life / p.maxLife;
                    
                    // Color Interpolation
                    let c1, c2, factor;
                    if (t < 0.5) {
                        c1 = themeColors[0]; c2 = themeColors[1]; factor = t * 2.0;
                    } else {
                        c1 = themeColors[1]; c2 = themeColors[2]; factor = (t - 0.5) * 2.0;
                    }
                    colors[i * 3] = c1.r + (c2.r - c1.r) * factor;
                    colors[i * 3 + 1] = c1.g + (c2.g - c1.g) * factor;
                    colors[i * 3 + 2] = c1.b + (c2.b - c1.b) * factor;

                    // Size Interpolation
                    let baseSize = p.isEmber ? 0.2 : 0.5;
                    let midSize = p.isEmber ? 0.3 : 0.8;
                    let endSize = 0.1;
                    
                    if (t < 0.5) {
                        sizes[i] = baseSize + (midSize - baseSize) * (t * 2.0);
                    } else {
                        sizes[i] = midSize + (endSize - midSize) * ((t - 0.5) * 2.0);
                    }
                }
            }

            sys.points.geometry.attributes.position.needsUpdate = true;
            sys.points.geometry.attributes.customColor.needsUpdate = true;
            sys.points.geometry.attributes.size.needsUpdate = true;

            return { activeCount, maxHeight };
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const now = performance.now();

            if (!state.isPaused) {
                state.elapsedTime += delta;
                const currentThemeColors = themes[state.themeIndex].colors;

                const mainStats = updateParticles(mainParticles, delta, currentThemeColors);
                let maxH = mainStats.maxHeight;
                state.activeParticleCount = mainStats.activeCount;

                if (state.embersVisible) {
                    const emberStats = updateParticles(emberParticles, delta, currentThemeColors);
                    maxH = Math.max(maxH, emberStats.maxHeight);
                }

                state.maxParticleHeight = maxH;
            }

            controls.update();
            state.cameraDistance = camera.position.distanceTo(controls.target);

            // FPS Calculation
            frames++;
            if (now - lastFpsTime >= 1000) {
                state.fps = frames;
                frames = 0;
                lastFpsTime = now;
            }

            // Update HUD
            hudActive.textContent = state.activeParticleCount;
            hudFps.textContent = state.fps;
            hudHeight.textContent = state.maxParticleHeight.toFixed(2);
            hudIntensity.textContent = state.intensity.toFixed(1);
            hudTheme.textContent = state.colorTheme;

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
