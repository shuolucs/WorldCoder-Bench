<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Fire Tornado</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #050505;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #controlPanel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 12px 14px;
      border-radius: 8px;
      min-width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 0 16px rgba(255, 80, 0, 0.15);
    }

    #controlPanel label,
    #controlPanel button,
    #controlPanel input {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }

    #controlPanel label {
      margin-bottom: 6px;
      font-size: 14px;
    }

    #controlPanel input[type="range"] {
      margin-bottom: 10px;
    }

    #controlPanel button {
      margin-top: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      cursor: pointer;
    }

    #controlPanel button:hover {
      background: rgba(255,255,255,0.14);
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      color: #f0f0f0;
      padding: 10px 12px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-line;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <div id="hud"></div>

  <div id="controlPanel">
    <label for="intensitySlider">Intensity: <span id="intensityValue">1.0</span></label>
    <input id="intensitySlider" type="range" min="0.1" max="3.0" step="0.1" value="1.0" />
    <button id="colorThemeBtn">Theme: fire</button>
    <button id="toggleEmbersBtn">Hide Embers</button>
    <button id="pauseBtn">Pause</button>
    <div style="margin-top:10px;font-size:12px;opacity:0.85;">
      Keys: <b>R</b> reset, <b>W</b> wireframe<br/>
      Click ground to move tornado
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      200
    );
    camera.position.set(0, 8, 20);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 8;
    controls.maxDistance = 40;
    controls.target.set(0, 5, 0);

    const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
    scene.add(ambientLight);

    const pointLight = new THREE.PointLight(0xff4400, 2.0, 100, 2);
    pointLight.position.set(0, 10, 0);
    scene.add(pointLight);

    const groundGeometry = new THREE.CircleGeometry(10, 64);
    const groundMaterial = new THREE.MeshStandardMaterial({
      color: 0x111111,
      roughness: 1.0,
      metalness: 0.0
    });
    const ground = new THREE.Mesh(groundGeometry, groundMaterial);
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    scene.add(ground);

    const debugCylinder = new THREE.Mesh(
      new THREE.CylinderGeometry(5, 2.2, 14, 24, 1, true),
      new THREE.MeshBasicMaterial({
        color: 0xffffff,
        wireframe: true,
        transparent: true,
        opacity: 0.2
      })
    );
    debugCylinder.position.set(0, 7, 0);
    debugCylinder.visible = false;
    scene.add(debugCylinder);

    function createParticleTexture() {
      const size = 128;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      const gradient = ctx.createRadialGradient(
        size / 2, size / 2, 0,
        size / 2, size / 2, size / 2
      );
      gradient.addColorStop(0.0, "rgba(255,255,255,1)");
      gradient.addColorStop(0.2, "rgba(255,255,255,0.95)");
      gradient.addColorStop(0.5, "rgba(255,200,120,0.4)");
      gradient.addColorStop(1.0, "rgba(0,0,0,0)");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    const particleTexture = createParticleTexture();

    const THEMES = [
      {
        name: "fire",
        colors: [
          new THREE.Color(1.0, 1.0, 0.2),
          new THREE.Color(1.0, 0.4, 0.0),
          new THREE.Color(0.3, 0.0, 0.0)
        ]
      },
      {
        name: "ice",
        colors: [
          new THREE.Color(1.0, 1.0, 1.0),
          new THREE.Color(0.2, 1.0, 1.0),
          new THREE.Color(0.0, 0.15, 0.8)
        ]
      },
      {
        name: "toxic",
        colors: [
          new THREE.Color(0.5, 1.0, 0.3),
          new THREE.Color(0.8, 1.0, 0.1),
          new THREE.Color(0.0, 0.25, 0.0)
        ]
      }
    ];

    const MAIN_COUNT = 3000;
    const EMBER_COUNT = 500;

    const tornadoBase = new THREE.Vector3(0, 0, 0);

    let themeIndex = 0;
    let intensity = 1.0;
    let embersVisible = true;
    let isPaused = false;
    let elapsedTime = 0;
    let fps = 0;
    let fpsAccum = 0;
    let fpsFrames = 0;

    function lerpColor3(c1, c2, c3, t) {
      const out = new THREE.Color();
      if (t < 0.5) {
        out.copy(c1).lerp(c2, t / 0.5);
      } else {
        out.copy(c2).lerp(c3, (t - 0.5) / 0.5);
      }
      return out;
    }

    const mainGeometry = new THREE.BufferGeometry();
    const mainPositions = new Float32Array(MAIN_COUNT * 3);
    const mainColors = new Float32Array(MAIN_COUNT * 3);
    const mainSizes = new Float32Array(MAIN_COUNT);

    mainGeometry.setAttribute("position", new THREE.BufferAttribute(mainPositions, 3));
    mainGeometry.setAttribute("color", new THREE.BufferAttribute(mainColors, 3));
    mainGeometry.setAttribute("size", new THREE.BufferAttribute(mainSizes, 1));

    const mainMaterial = new THREE.ShaderMaterial({
      uniforms: {
        pointTexture: { value: particleTexture }
      },
      vertexShader: `
        attribute float size;
        varying vec3 vColor;
        void main() {
          vColor = color;
          vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
          gl_PointSize = size * 120.0 / max(1.0, -mvPosition.z);
          gl_Position = projectionMatrix * mvPosition;
        }
      `,
      fragmentShader: `
        uniform sampler2D pointTexture;
        varying vec3 vColor;
        void main() {
          vec4 tex = texture2D(pointTexture, gl_PointCoord);
          gl_FragColor = vec4(vColor, 1.0) * tex;
        }
      `,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true
    });

    const mainPoints = new THREE.Points(mainGeometry, mainMaterial);
    scene.add(mainPoints);

    const emberGeometry = new THREE.BufferGeometry();
    const emberPositions = new Float32Array(EMBER_COUNT * 3);
    const emberColors = new Float32Array(EMBER_COUNT * 3);
    const emberSizes = new Float32Array(EMBER_COUNT);

    emberGeometry.setAttribute("position", new THREE.BufferAttribute(emberPositions, 3));
    emberGeometry.setAttribute("color", new THREE.BufferAttribute(emberColors, 3));
    emberGeometry.setAttribute("size", new THREE.BufferAttribute(emberSizes, 1));

    const emberMaterial = mainMaterial.clone();
    emberMaterial.uniforms = {
      pointTexture: { value: particleTexture }
    };

    const emberPoints = new THREE.Points(emberGeometry, emberMaterial);
    scene.add(emberPoints);

    const mainData = [];
    const emberData = [];

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function clampRadius8(x, z) {
      const len = Math.sqrt(x * x + z * z);
      if (len > 8) {
        const s = 8 / len;
        return { x: x * s, z: z * s };
      }
      return { x, z };
    }

    function respawnMainParticle(i) {
      const radius = rand(1.5, 2.5);
      const angle = rand(0, Math.PI * 2);
      const y = 0;
      const verticalVelocity = rand(2.0, 4.0);
      const angularVelocity = rand(1.7, 2.3);
      const radialVelocity = rand(0.3, 0.8);
      const maxLifetime = rand(2.0, 4.0);

      mainData[i] = {
        angle,
        radius,
        y,
        verticalVelocity,
        angularVelocity,
        radialVelocity,
        lifetime: 0,
        maxLifetime,
        sizeStart: 0.5,
        sizeMid: 0.8,
        sizeEnd: 0.1,
        alive: true
      };

      const px = tornadoBase.x + Math.cos(angle) * radius;
      const pz = tornadoBase.z + Math.sin(angle) * radius;

      mainPositions[i * 3 + 0] = px;
      mainPositions[i * 3 + 1] = y;
      mainPositions[i * 3 + 2] = pz;
      mainSizes[i] = 0.5;
    }

    function respawnEmber(i) {
      const radius = rand(1.2, 2.0);
      const angle = rand(0, Math.PI * 2);
      const y = rand(0.3, 2.0);
      const verticalVelocity = rand(2.5, 5.0);
      const angularVelocity = rand(0.8, 1.6);
      const radialVelocity = rand(0.5, 1.2);
      const driftX = rand(-0.8, 0.8) * (Math.random() < 0.35 ? 1.5 : 0.4);
      const driftZ = rand(-0.8, 0.8) * (Math.random() < 0.35 ? 1.5 : 0.4);
      const maxLifetime = rand(3.0, 6.0);

      emberData[i] = {
        angle,
        radius,
        y,
        verticalVelocity,
        angularVelocity,
        radialVelocity,
        driftX,
        driftZ,
        lifetime: rand(0, maxLifetime * 0.4),
        maxLifetime,
        sizeStart: rand(0.1, 0.18),
        sizeMid: rand(0.18, 0.3),
        sizeEnd: 0.02,
        alive: true
      };

      const px = tornadoBase.x + Math.cos(angle) * radius;
      const pz = tornadoBase.z + Math.sin(angle) * radius;
      emberPositions[i * 3 + 0] = px;
      emberPositions[i * 3 + 1] = y;
      emberPositions[i * 3 + 2] = pz;
      emberSizes[i] = emberData[i].sizeStart;
    }

    for (let i = 0; i < MAIN_COUNT; i++) respawnMainParticle(i);
    for (let i = 0; i < EMBER_COUNT; i++) respawnEmber(i);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function updateThemeButton() {
      document.getElementById("colorThemeBtn").textContent = `Theme: ${THEMES[themeIndex].name}`;
    }

    function updateButtons() {
      document.getElementById("toggleEmbersBtn").textContent = embersVisible ? "Hide Embers" : "Show Embers";
      document.getElementById("pauseBtn").textContent = isPaused ? "Resume" : "Pause";
      document.getElementById("intensityValue").textContent = intensity.toFixed(1);
      updateThemeButton();
    }

    function resetDefaults() {
      intensity = 1.0;
      themeIndex = 0;
      embersVisible = true;
      isPaused = false;

      document.getElementById("intensitySlider").value = "1.0";
      emberPoints.visible = true;
      debugCylinder.visible = false;

      for (let i = 0; i < MAIN_COUNT; i++) respawnMainParticle(i);
      for (let i = 0; i < EMBER_COUNT; i++) respawnEmber(i);

      updateButtons();
    }

    document.getElementById("intensitySlider").addEventListener("input", (e) => {
      intensity = parseFloat(e.target.value);
      updateButtons();
    });

    document.getElementById("colorThemeBtn").addEventListener("click", () => {
      themeIndex = (themeIndex + 1) % THEMES.length;
      updateButtons();
    });

    document.getElementById("toggleEmbersBtn").addEventListener("click", () => {
      embersVisible = !embersVisible;
      emberPoints.visible = embersVisible;
      updateButtons();
    });

    document.getElementById("pauseBtn").addEventListener("click", () => {
      isPaused = !isPaused;
      updateButtons();
    });

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (key === "r") {
        resetDefaults();
      } else if (key === "w") {
        debugCylinder.visible = !debugCylinder.visible;
      }
    });

    renderer.domElement.addEventListener("pointerdown", (event) => {
      mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(ground);
      if (hits.length > 0) {
        const p = hits[0].point;
        const clamped = clampRadius8(p.x, p.z);
        tornadoBase.x = clamped.x;
        tornadoBase.z = clamped.z;
        debugCylinder.position.x = tornadoBase.x;
        debugCylinder.position.z = tornadoBase.z;
        pointLight.position.x = tornadoBase.x;
        pointLight.position.z = tornadoBase.z;
      }
    });

    window.__3D_STATE__ = {
      particleCount: MAIN_COUNT,
      activeParticleCount: MAIN_COUNT,
      emberCount: EMBER_COUNT,
      embersVisible: true,
      intensity: 1.0,
      colorTheme: "fire",
      isPaused: false,
      tornadoBaseX: 0,
      tornadoBaseZ: 0,
      maxParticleHeight: 0,
      fps: 0,
      wireframeVisible: false,
      cameraDistance: camera.position.length(),
      elapsedTime: 0,
      themeIndex: 0
    };

    const hud = document.getElementById("hud");

    let lastTime = performance.now();

    function updateMainParticles(dt) {
      const theme = THEMES[themeIndex];
      let maxHeight = 0;
      let activeCount = 0;

      for (let i = 0; i < MAIN_COUNT; i++) {
        const p = mainData[i];
        p.lifetime += dt;

        if (p.lifetime >= p.maxLifetime || !Number.isFinite(p.y) || !Number.isFinite(p.radius) || !Number.isFinite(p.angle)) {
          respawnMainParticle(i);
          continue;
        }

        const lifeT = p.lifetime / p.maxLifetime;
        const heightFactor = Math.min(p.y / 12.0, 1.0);

        p.y += p.verticalVelocity * intensity * dt;
        p.y = Math.max(0, p.y);

        const angularVel = p.angularVelocity * intensity * (1.0 - 0.6 * heightFactor);
        p.angle += angularVel * dt;

        p.radius += p.radialVelocity * dt * (0.35 + 0.65 * lifeT);

        const swirlRadius = p.radius * (1.0 + 0.2 * heightFactor);

        const px = tornadoBase.x + Math.cos(p.angle) * swirlRadius;
        const pz = tornadoBase.z + Math.sin(p.angle) * swirlRadius;

        mainPositions[i * 3 + 0] = Number.isFinite(px) ? px : tornadoBase.x;
        mainPositions[i * 3 + 1] = Number.isFinite(p.y) ? p.y : 0;
        mainPositions[i * 3 + 2] = Number.isFinite(pz) ? pz : tornadoBase.z;

        const color = lerpColor3(theme.colors[0], theme.colors[1], theme.colors[2], lifeT);
        mainColors[i * 3 + 0] = color.r;
        mainColors[i * 3 + 1] = color.g;
        mainColors[i * 3 + 2] = color.b;

        let size;
        if (lifeT < 0.5) {
          size = THREE.MathUtils.lerp(p.sizeStart, p.sizeMid, lifeT / 0.5);
        } else {
          size = THREE.MathUtils.lerp(p.sizeMid, p.sizeEnd, (lifeT - 0.5) / 0.5);
        }
        mainSizes[i] = Math.max(0.01, size);

        if (p.y > maxHeight) maxHeight = p.y;
        activeCount++;
      }

      mainGeometry.attributes.position.needsUpdate = true;
      mainGeometry.attributes.color.needsUpdate = true;
      mainGeometry.attributes.size.needsUpdate = true;

      return { maxHeight, activeCount };
    }

    function updateEmbers(dt) {
      const theme = THEMES[themeIndex];

      for (let i = 0; i < EMBER_COUNT; i++) {
        const p = emberData[i];
        p.lifetime += dt;

        if (p.lifetime >= p.maxLifetime || !Number.isFinite(p.y) || !Number.isFinite(p.radius) || !Number.isFinite(p.angle)) {
          respawnEmber(i);
          continue;
        }

        const lifeT = p.lifetime / p.maxLifetime;
        const heightFactor = Math.min(p.y / 16.0, 1.0);

        p.y += p.verticalVelocity * (0.8 + intensity * 0.5) * dt;
        p.y = Math.max(0, p.y);

        p.angle += p.angularVelocity * intensity * (1.0 - 0.75 * heightFactor) * dt;
        p.radius += p.radialVelocity * dt;

        const breakaway = lifeT > 0.35 ? (lifeT - 0.35) * 1.2 : 0.0;
        const px = tornadoBase.x + Math.cos(p.angle) * p.radius + p.driftX * breakaway;
        const pz = tornadoBase.z + Math.sin(p.angle) * p.radius + p.driftZ * breakaway;

        emberPositions[i * 3 + 0] = Number.isFinite(px) ? px : tornadoBase.x;
        emberPositions[i * 3 + 1] = Number.isFinite(p.y) ? p.y : 0;
        emberPositions[i * 3 + 2] = Number.isFinite(pz) ? pz : tornadoBase.z;

        const c = lerpColor3(theme.colors[0], theme.colors[1], theme.colors[2], lifeT);
        emberColors[i * 3 + 0] = c.r;
        emberColors[i * 3 + 1] = c.g;
        emberColors[i * 3 + 2] = c.b;

        let size;
        if (lifeT < 0.5) {
          size = THREE.MathUtils.lerp(p.sizeStart, p.sizeMid, lifeT / 0.5);
        } else {
          size = THREE.MathUtils.lerp(p.sizeMid, p.sizeEnd, (lifeT - 0.5) / 0.5);
        }
        emberSizes[i] = Math.max(0.01, size);
      }

      emberGeometry.attributes.position.needsUpdate = true;
      emberGeometry.attributes.color.needsUpdate = true;
      emberGeometry.attributes.size.needsUpdate = true;
    }

    function updateHUD(activeCount, maxHeight) {
      hud.textContent =
`Active particle count: ${activeCount}
Current FPS: ${fps.toFixed(1)}
Tornado height: ${maxHeight.toFixed(2)}
Current intensity: ${intensity.toFixed(1)}
Current color theme: ${THEMES[themeIndex].name}`;
    }

    function animate(now) {
      requestAnimationFrame(animate);

      let dt = (now - lastTime) / 1000;
      lastTime = now;
      if (!Number.isFinite(dt) || dt <= 0) dt = 0.016;
      dt = Math.min(dt, 0.05);

      fpsAccum += dt;
      fpsFrames++;
      if (fpsAccum >= 0.25) {
        fps = fpsFrames / fpsAccum;
        fpsAccum = 0;
        fpsFrames = 0;
      }

      if (!isPaused) {
        elapsedTime += dt;
        const result = updateMainParticles(dt);
        updateEmbers(dt);

        debugCylinder.position.x = tornadoBase.x;
        debugCylinder.position.z = tornadoBase.z;

        pointLight.position.x = tornadoBase.x;
        pointLight.position.z = tornadoBase.z;

        updateHUD(result.activeCount, result.maxHeight);

        window.__3D_STATE__.particleCount = MAIN_COUNT;
        window.__3D_STATE__.activeParticleCount = result.activeCount;
        window.__3D_STATE__.emberCount = EMBER_COUNT;
        window.__3D_STATE__.embersVisible = embersVisible;
        window.__3D_STATE__.intensity = intensity;
        window.__3D_STATE__.colorTheme = THEMES[themeIndex].name;
        window.__3D_STATE__.isPaused = isPaused;
        window.__3D_STATE__.tornadoBaseX = tornadoBase.x;
        window.__3D_STATE__.tornadoBaseZ = tornadoBase.z;
        window.__3D_STATE__.maxParticleHeight = result.maxHeight;
        window.__3D_STATE__.fps = fps;
        window.__3D_STATE__.wireframeVisible = debugCylinder.visible;
        window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
        window.__3D_STATE__.elapsedTime = elapsedTime;
        window.__3D_STATE__.themeIndex = themeIndex;
      } else {
        window.__3D_STATE__.isPaused = true;
        window.__3D_STATE__.fps = fps;
        window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
        window.__3D_STATE__.wireframeVisible = debugCylinder.visible;
        window.__3D_STATE__.embersVisible = embersVisible;
        window.__3D_STATE__.intensity = intensity;
        window.__3D_STATE__.colorTheme = THEMES[themeIndex].name;
        window.__3D_STATE__.themeIndex = themeIndex;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateButtons();
    resetDefaults();
    animate(performance.now());
  </script>
</body>
</html>
