<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fire Tornado</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #050505; }
  canvas { display: block; }

  #hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 12px 16px;
    border-radius: 8px;
    line-height: 1.6;
    pointer-events: none;
    z-index: 100;
    border: 1px solid rgba(255,100,0,0.3);
  }

  #controlPanel {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-family: Arial, sans-serif;
    font-size: 14px;
    padding: 16px 20px;
    border-radius: 8px;
    z-index: 100;
    min-width: 200px;
    border: 1px solid rgba(255,100,0,0.3);
  }

  #controlPanel label {
    display: block;
    margin-bottom: 4px;
    font-size: 12px;
    color: #ccc;
  }

  #controlPanel input[type="range"] {
    width: 100%;
    margin-bottom: 12px;
    accent-color: #ff6600;
  }

  #controlPanel button {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 8px;
    background: rgba(255,100,0,0.3);
    color: #fff;
    border: 1px solid rgba(255,100,0,0.5);
    border-radius: 4px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }

  #controlPanel button:hover {
    background: rgba(255,100,0,0.5);
  }

  #controlPanel .hint {
    font-size: 11px;
    color: #888;
    margin-top: 8px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div id="hud">
  <div>Particles: <span id="hudActive">0</span></div>
  <div>FPS: <span id="hudFPS">0</span></div>
  <div>Height: <span id="hudHeight">0.0</span></div>
  <div>Intensity: <span id="hudIntensity">1.0</span></div>
  <div>Theme: <span id="hudTheme">fire</span></div>
</div>

<div id="controlPanel">
  <label for="intensitySlider">Intensity: <span id="intensityValue">1.0</span></label>
  <input type="range" id="intensitySlider" min="0.1" max="3.0" step="0.1" value="1.0">
  <button id="colorThemeBtn">Theme: Fire</button>
  <button id="toggleEmbersBtn">Toggle Embers</button>
  <button id="pauseBtn">Pause</button>
  <div class="hint">
    R - Reset all<br>
    W - Toggle wireframe<br>
    Click ground to move tornado
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {

// ============ STATE ============
const STATE = {
  particleCount: 3000,
  activeParticleCount: 0,
  emberCount: 500,
  embersVisible: true,
  intensity: 1.0,
  colorTheme: 'fire',
  isPaused: false,
  tornadoBaseX: 0,
  tornadoBaseZ: 0,
  maxParticleHeight: 0,
  fps: 0,
  wireframeVisible: false,
  cameraDistance: 0,
  elapsedTime: 0,
  themeIndex: 0
};
window.__3D_STATE__ = STATE;

const THEMES = ['fire', 'ice', 'toxic'];
const THEME_COLORS = {
  fire: {
    birth: [1.0, 1.0, 0.2],
    mid: [1.0, 0.4, 0.0],
    death: [0.3, 0.0, 0.0]
  },
  ice: {
    birth: [1.0, 1.0, 1.0],
    mid: [0.0, 0.8, 1.0],
    death: [0.0, 0.0, 0.5]
  },
  toxic: {
    birth: [0.0, 1.0, 0.0],
    mid: [0.6, 1.0, 0.0],
    death: [0.0, 0.3, 0.0]
  }
};

const THEME_LIGHT_COLORS = {
  fire: 0xff4400,
  ice: 0x4488ff,
  toxic: 0x44ff00
};

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 20);
camera.lookAt(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 8;
controls.maxDistance = 40;
controls.target.set(0, 5, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x331100, 0.3);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xff4400, 2.0, 50);
pointLight.position.set(0, 10, 0);
scene.add(pointLight);

// Ground
const groundGeom = new THREE.CircleGeometry(10, 64);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
const ground = new THREE.Mesh(groundGeom, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// ============ PARTICLE TEXTURE ============
function createParticleTexture() {
  const size = 64;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const gradient = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  gradient.addColorStop(0, 'rgba(255,255,255,1)');
  gradient.addColorStop(0.3, 'rgba(255,255,255,0.8)');
  gradient.addColorStop(0.6, 'rgba(255,255,255,0.3)');
  gradient.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, size, size);
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

const particleTexture = createParticleTexture();

// ============ MAIN PARTICLE SYSTEM (3000) ============
const MAIN_COUNT = 3000;
const EMBER_COUNT = 500;

// Main particles data
const mainPositions = new Float32Array(MAIN_COUNT * 3);
const mainColors = new Float32Array(MAIN_COUNT * 3);
const mainSizes = new Float32Array(MAIN_COUNT);

// Per-particle state arrays
const mainLifetime = new Float32Array(MAIN_COUNT);
const mainMaxLifetime = new Float32Array(MAIN_COUNT);
const mainAngle = new Float32Array(MAIN_COUNT);
const mainRadius = new Float32Array(MAIN_COUNT);
const mainVelY = new Float32Array(MAIN_COUNT);
const mainRadialVel = new Float32Array(MAIN_COUNT);
const mainAngularVel = new Float32Array(MAIN_COUNT);
const mainAlive = new Uint8Array(MAIN_COUNT);

function initMainParticle(i) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 1.5 + Math.random() * 1.0;
  
  mainAngle[i] = angle;
  mainRadius[i] = radius;
  mainLifetime[i] = 0;
  mainMaxLifetime[i] = 2.0 + Math.random() * 2.0;
  mainVelY[i] = 2.0 + Math.random() * 2.0;
  mainRadialVel[i] = 0.3 + Math.random() * 0.5;
  mainAngularVel[i] = 2.0 + (Math.random() - 0.5) * 0.5;
  mainAlive[i] = 1;

  const x = STATE.tornadoBaseX + Math.cos(angle) * radius;
  const z = STATE.tornadoBaseZ + Math.sin(angle) * radius;
  
  mainPositions[i * 3] = x;
  mainPositions[i * 3 + 1] = 0;
  mainPositions[i * 3 + 2] = z;
  
  mainColors[i * 3] = 1.0;
  mainColors[i * 3 + 1] = 1.0;
  mainColors[i * 3 + 2] = 0.2;
  
  mainSizes[i] = 0.5;
}

// Initialize all main particles with staggered lifetimes
for (let i = 0; i < MAIN_COUNT; i++) {
  initMainParticle(i);
  mainLifetime[i] = Math.random() * mainMaxLifetime[i];
}

const mainGeometry = new THREE.BufferGeometry();
mainGeometry.setAttribute('position', new THREE.BufferAttribute(mainPositions, 3));
mainGeometry.setAttribute('color', new THREE.BufferAttribute(mainColors, 3));
mainGeometry.setAttribute('size', new THREE.BufferAttribute(mainSizes, 1));

const mainMaterial = new THREE.PointsMaterial({
  size: 0.8,
  map: particleTexture,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  vertexColors: true,
  sizeAttenuation: true
});

const mainPoints = new THREE.Points(mainGeometry, mainMaterial);
scene.add(mainPoints);

// ============ EMBER PARTICLE SYSTEM (500) ============
const emberPositions = new Float32Array(EMBER_COUNT * 3);
const emberColors = new Float32Array(EMBER_COUNT * 3);
const emberSizes = new Float32Array(EMBER_COUNT);

const emberLifetime = new Float32Array(EMBER_COUNT);
const emberMaxLifetime = new Float32Array(EMBER_COUNT);
const emberAngle = new Float32Array(EMBER_COUNT);
const emberRadius = new Float32Array(EMBER_COUNT);
const emberVelY = new Float32Array(EMBER_COUNT);
const emberRadialVel = new Float32Array(EMBER_COUNT);
const emberAngularVel = new Float32Array(EMBER_COUNT);
const emberBreakaway = new Float32Array(EMBER_COUNT); // random breakaway factor
const emberAlive = new Uint8Array(EMBER_COUNT);

function initEmberParticle(i) {
  const angle = Math.random() * Math.PI * 2;
  const radius = 1.5 + Math.random() * 1.0;
  
  emberAngle[i] = angle;
  emberRadius[i] = radius;
  emberLifetime[i] = 0;
  emberMaxLifetime[i] = 3.0 + Math.random() * 3.0;
  emberVelY[i] = 3.0 + Math.random() * 3.0;
  emberRadialVel[i] = 0.3 + Math.random() * 0.5;
  emberAngularVel[i] = 2.0 + (Math.random() - 0.5) * 0.5;
  emberBreakaway[i] = Math.random() < 0.3 ? (1.0 + Math.random() * 2.0) : 0.0;
  emberAlive[i] = 1;

  const x = STATE.tornadoBaseX + Math.cos(angle) * radius;
  const z = STATE.tornadoBaseZ + Math.sin(angle) * radius;
  
  emberPositions[i * 3] = x;
  emberPositions[i * 3 + 1] = 0;
  emberPositions[i * 3 + 2] = z;
  
  emberColors[i * 3] = 1.0;
  emberColors[i * 3 + 1] = 0.8;
  emberColors[i * 3 + 2] = 0.2;
  
  emberSizes[i] = 0.1 + Math.random() * 0.2;
}

for (let i = 0; i < EMBER_COUNT; i++) {
  initEmberParticle(i);
  emberLifetime[i] = Math.random() * emberMaxLifetime[i];
}

const emberGeometry = new THREE.BufferGeometry();
emberGeometry.setAttribute('position', new THREE.BufferAttribute(emberPositions, 3));
emberGeometry.setAttribute('color', new THREE.BufferAttribute(emberColors, 3));
emberGeometry.setAttribute('size', new THREE.BufferAttribute(emberSizes, 1));

const emberMaterial = new THREE.PointsMaterial({
  size: 0.3,
  map: particleTexture,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  vertexColors: true,
  sizeAttenuation: true
});

const emberPoints = new THREE.Points(emberGeometry, emberMaterial);
scene.add(emberPoints);

// ============ WIREFRAME DEBUG ============
const wireGeom = new THREE.CylinderGeometry(4, 2, 20, 16, 8, true);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.3 });
const wireMesh = new THREE.Mesh(wireGeom, wireMat);
wireMesh.position.set(0, 10, 0);
wireMesh.visible = false;
scene.add(wireMesh);

// ============ RAYCASTER ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(ground);
  
  if (intersects.length > 0) {
    let px = intersects[0].point.x;
    let pz = intersects[0].point.z;
    
    // Clamp within radius 8
    const dist = Math.sqrt(px * px + pz * pz);
    if (dist > 8) {
      px = (px / dist) * 8;
      pz = (pz / dist) * 8;
    }
    
    STATE.tornadoBaseX = px;
    STATE.tornadoBaseZ = pz;
    
    wireMesh.position.x = px;
    wireMesh.position.z = pz;
    
    pointLight.position.x = px;
    pointLight.position.z = pz;
  }
});

// ============ UI CONTROLS ============
const intensitySlider = document.getElementById('intensitySlider');
const intensityValue = document.getElementById('intensityValue');
const colorThemeBtn = document.getElementById('colorThemeBtn');
const toggleEmbersBtn = document.getElementById('toggleEmbersBtn');
const pauseBtn = document.getElementById('pauseBtn');

intensitySlider.addEventListener('input', () => {
  STATE.intensity = parseFloat(intensitySlider.value);
  intensityValue.textContent = STATE.intensity.toFixed(1);
});

colorThemeBtn.addEventListener('click', () => {
  STATE.themeIndex = (STATE.themeIndex + 1) % 3;
  STATE.colorTheme = THEMES[STATE.themeIndex];
  colorThemeBtn.textContent = 'Theme: ' + STATE.colorTheme.charAt(0).toUpperCase() + STATE.colorTheme.slice(1);
  
  // Update point light color
  pointLight.color.setHex(THEME_LIGHT_COLORS[STATE.colorTheme]);
  
  // Update ambient
  const ambColors = { fire: 0x331100, ice: 0x001133, toxic: 0x113300 };
  ambientLight.color.setHex(ambColors[STATE.colorTheme]);
});

toggleEmbersBtn.addEventListener('click', () => {
  STATE.embersVisible = !STATE.embersVisible;
  emberPoints.visible = STATE.embersVisible;
});

pauseBtn.addEventListener('click', () => {
  STATE.isPaused = !STATE.isPaused;
  pauseBtn.textContent = STATE.isPaused ? 'Resume' : 'Pause';
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') {
    // Reset
    STATE.intensity = 1.0;
    STATE.themeIndex = 0;
    STATE.colorTheme = 'fire';
    STATE.embersVisible = true;
    STATE.isPaused = false;
    STATE.tornadoBaseX = 0;
    STATE.tornadoBaseZ = 0;
    STATE.wireframeVisible = false;
    
    intensitySlider.value = 1.0;
    intensityValue.textContent = '1.0';
    colorThemeBtn.textContent = 'Theme: Fire';
    pauseBtn.textContent = 'Pause';
    emberPoints.visible = true;
    wireMesh.visible = false;
    wireMesh.position.set(0, 10, 0);
    pointLight.position.set(0, 10, 0);
    pointLight.color.setHex(0xff4400);
    ambientLight.color.setHex(0x331100);
    
    // Reinit particles
    for (let i = 0; i < MAIN_COUNT; i++) {
      initMainParticle(i);
      mainLifetime[i] = Math.random() * mainMaxLifetime[i];
    }
    for (let i = 0; i < EMBER_COUNT; i++) {
      initEmberParticle(i);
      emberLifetime[i] = Math.random() * emberMaxLifetime[i];
    }
  }
  
  if (e.key === 'w' || e.key === 'W') {
    STATE.wireframeVisible = !STATE.wireframeVisible;
    wireMesh.visible = STATE.wireframeVisible;
  }
});

// ============ COLOR INTERPOLATION ============
function lerpColor(out, t, theme) {
  const colors = THEME_COLORS[theme];
  if (t < 0.5) {
    const s = t / 0.5;
    out[0] = colors.birth[0] + (colors.mid[0] - colors.birth[0]) * s;
    out[1] = colors.birth[1] + (colors.mid[1] - colors.birth[1]) * s;
    out[2] = colors.birth[2] + (colors.mid[2] - colors.birth[2]) * s;
  } else {
    const s = (t - 0.5) / 0.5;
    out[0] = colors.mid[0] + (colors.death[0] - colors.mid[0]) * s;
    out[1] = colors.mid[1] + (colors.death[1] - colors.mid[1]) * s;
    out[2] = colors.mid[2] + (colors.death[2] - colors.mid[2]) * s;
  }
}

function lerpSize(t) {
  if (t < 0.5) {
    const s = t / 0.5;
    return 0.5 + (0.8 - 0.5) * s;
  } else {
    const s = (t - 0.5) / 0.5;
    return 0.8 + (0.1 - 0.8) * s;
  }
}

// ============ ANIMATION LOOP ============
let lastTime = performance.now();
let frameCount = 0;
let fpsTime = 0;
let currentFPS = 0;
const tempColor = [0, 0, 0];

function animate(now) {
  requestAnimationFrame(animate);
  
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  
  // FPS
  frameCount++;
  fpsTime += dt;
  if (fpsTime >= 0.5) {
    currentFPS = Math.round(frameCount / fpsTime);
    frameCount = 0;
    fpsTime = 0;
  }
  STATE.fps = currentFPS;
  
  if (!STATE.isPaused) {
    STATE.elapsedTime += dt;
    const intensity = STATE.intensity;
    let maxY = 0;
    let activeCount = 0;
    
    // Update main particles
    for (let i = 0; i < MAIN_COUNT; i++) {
      mainLifetime[i] += dt;
      
      if (mainLifetime[i] >= mainMaxLifetime[i]) {
        initMainParticle(i);
      }
      
      const t = mainLifetime[i] / mainMaxLifetime[i];
      const heightFactor = mainPositions[i * 3 + 1] / 20.0;
      
      // Angular velocity decreases with height
      const angVel = mainAngularVel[i] * intensity * (1.0 - heightFactor * 0.6);
      mainAngle[i] += angVel * dt;
      
      // Radial expansion
      mainRadius[i] += mainRadialVel[i] * dt;
      
      // Vertical movement
      const y = mainPositions[i * 3 + 1] + mainVelY[i] * intensity * dt;
      
      const currentRadius = mainRadius[i];
      const x = STATE.tornadoBaseX + Math.cos(mainAngle[i]) * currentRadius;
      const z = STATE.tornadoBaseZ + Math.sin(mainAngle[i]) * currentRadius;
      
      mainPositions[i * 3] = x;
      mainPositions[i * 3 + 1] = Math.max(0, y);
      mainPositions[i * 3 + 2] = z;
      
      // Color
      lerpColor(tempColor, t, STATE.colorTheme);
      mainColors[i * 3] = tempColor[0];
      mainColors[i * 3 + 1] = tempColor[1];
      mainColors[i * 3 + 2] = tempColor[2];
      
      // Size
      mainSizes[i] = lerpSize(t);
      
      if (mainPositions[i * 3 + 1] > maxY) maxY = mainPositions[i * 3 + 1];
      if (mainAlive[i]) activeCount++;
    }
    
    mainGeometry.attributes.position.needsUpdate = true;
    mainGeometry.attributes.color.needsUpdate = true;
    mainGeometry.attributes.size.needsUpdate = true;
    
    STATE.activeParticleCount = activeCount;
    STATE.maxParticleHeight = maxY;
    
    // Update ember particles
    if (STATE.embersVisible) {
      for (let i = 0; i < EMBER_COUNT; i++) {
        emberLifetime[i] += dt;
        
        if (emberLifetime[i] >= emberMaxLifetime[i]) {
          initEmberParticle(i);
        }
        
        const t = emberLifetime[i] / emberMaxLifetime[i];
        const heightFactor = emberPositions[i * 3 + 1] / 30.0;
        
        const angVel = emberAngularVel[i] * intensity * (1.0 - heightFactor * 0.5);
        emberAngle[i] += angVel * dt;
        
        // Radial expansion + breakaway
        const breakFactor = emberBreakaway[i] > 0 && t > 0.4 ? emberBreakaway[i] : 0;
        emberRadius[i] += (emberRadialVel[i] + breakFactor) * dt;
        
        const y = emberPositions[i * 3 + 1] + emberVelY[i] * intensity * dt;
        
        const x = STATE.tornadoBaseX + Math.cos(emberAngle[i]) * emberRadius[i];
        const z = STATE.tornadoBaseZ + Math.sin(emberAngle[i]) * emberRadius[i];
        
        emberPositions[i * 3] = x;
        emberPositions[i * 3 + 1] = Math.max(0, y);
        emberPositions[i * 3 + 2] = z;
        
        // Ember color (slightly different - brighter, more like sparks)
        lerpColor(tempColor, t, STATE.colorTheme);
        const brightness = 1.0 - t * 0.5;
        emberColors[i * 3] = Math.min(1, tempColor[0] * brightness + 0.2);
        emberColors[i * 3 + 1] = Math.min(1, tempColor[1] * brightness);
        emberColors[i * 3 + 2] = Math.min(1, tempColor[2] * brightness);
        
        // Ember size
        emberSizes[i] = (0.1 + Math.random() * 0.05) * (1.0 - t);
        
        if (emberPositions[i * 3 + 1] > maxY) {
          maxY = emberPositions[i * 3 + 1];
          STATE.maxParticleHeight = maxY;
        }
      }
      
      emberGeometry.attributes.position.needsUpdate = true;
      emberGeometry.attributes.color.needsUpdate = true;
      emberGeometry.attributes.size.needsUpdate = true;
    }
    
    // Update wireframe position
    wireMesh.position.x = STATE.tornadoBaseX;
    wireMesh.position.z = STATE.tornadoBaseZ;
    
    // Flicker point light
    pointLight.intensity = 2.0 * intensity + Math.sin(STATE.elapsedTime * 8) * 0.3;
    pointLight.position.x = STATE.tornadoBaseX;
    pointLight.position.z = STATE.tornadoBaseZ;
  }
  
  controls.update();
  
  // Camera distance
  STATE.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));
  
  // Update HUD
  document.getElementById('hudActive').textContent = STATE.activeParticleCount;
  document.getElementById('hudFPS').textContent = STATE.fps;
  document.getElementById('hudHeight').textContent = STATE.maxParticleHeight.toFixed(1);
  document.getElementById('hudIntensity').textContent = STATE.intensity.toFixed(1);
  document.getElementById('hudTheme').textContent = STATE.colorTheme;
  
  renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
animate(performance.now());

})();
</script>
</body>
</html>
