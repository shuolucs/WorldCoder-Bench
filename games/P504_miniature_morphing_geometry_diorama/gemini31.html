<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Miniature Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #c8d8e8;
            font-family: sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
        }
        #hudPanel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.6;
            z-index: 10;
            pointer-events: none;
            min-width: 150px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        input[type=range] {
            cursor: pointer;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background: #44aaff;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #2288dd;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 12px;
            pointer-events: none;
            text-align: center;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hudPanel">
        <div>Morph: <span id="hudMorph">0</span>%</div>
        <div>Spin: <span id="hudSpin">OFF</span></div>
        <div>Miniature: <span id="hudMini">OFF</span></div>
    </div>

    <div id="ui-container">
        <div class="control-group">
            <label id="morphLabel" for="morphSlider">Morph: 0%</label>
            <input type="range" id="morphSlider" min="0" max="100" value="0">
        </div>
        <button id="spinBtn">Spin: OFF</button>
    </div>

    <div id="instructions">
        Keys: [C] Color Cycle | [P] Pulse Scale | [M] Miniature Mode | [R] Reset
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            ferrariLoaded: false,
            morphProgress: 0,
            spinActive: false,
            spinAngle: 0,
            colorPaletteIndex: 0,
            pulseActive: false,
            ferrariScale: 0.8,
            miniatureMode: false,
            dioramaScale: 1.0,
            domeVisible: false,
            objectCount: 4,
            morphObjectsPositions: []
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xc8d8e8);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        dirLight.shadow.bias = -0.001;
        scene.add(dirLight);

        // --- Diorama Group ---
        const dioramaGroup = new THREE.Group();
        scene.add(dioramaGroup);

        // Platform
        const platformGeo = new THREE.CylinderGeometry(6, 6, 0.3, 64);
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x3a2518, roughness: 0.8 });
        const platform = new THREE.Mesh(platformGeo, platformMat);
        platform.position.y = 0;
        platform.receiveShadow = true;
        dioramaGroup.add(platform);

        // Glass Dome
        const domeGeo = new THREE.SphereGeometry(6.2, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2);
        const domeMat = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.15,
            roughness: 0.1,
            transmission: 0.9,
            thickness: 0.1
        });
        const dome = new THREE.Mesh(domeGeo, domeMat);
        dome.position.y = 0.15;
        dome.visible = false;
        dioramaGroup.add(dome);

        // --- Ferrari Model ---
        let ferrariModel = new THREE.Group();
        ferrariModel.name = 'ferrariModel';
        ferrariModel.position.set(0, 0.3, 0);
        ferrariModel.scale.set(0.8, 0.8, 0.8);
        dioramaGroup.add(ferrariModel);

        const loader = new GLTFLoader();
        loader.load('ferrari.glb', (gltf) => {
            const model = gltf.scene;
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            ferrariModel.add(model);
            state.ferrariLoaded = true;
        }, undefined, (error) => {
            console.warn("Ferrari model could not be loaded. Ensure 'ferrari.glb' is in the same directory.", error);
            // Fallback box if model fails to load so scene isn't empty
            const boxGeo = new THREE.BoxGeometry(2, 0.8, 4);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const box = new THREE.Mesh(boxGeo, boxMat);
            box.position.y = 0.4;
            box.castShadow = true;
            box.receiveShadow = true;
            ferrariModel.add(box);
            state.ferrariLoaded = true; // Set true anyway to allow interactions
        });

        // --- Morphing Geometries ---
        const morphObjects = [];
        const originalColors = [0xff4466, 0x44aaff, 0x66ff88, 0xffaa22];
        const palettes = [
            originalColors,
            [0xffffff, 0xffffff, 0xffffff, 0xffffff],
            [0x000000, 0x000000, 0x000000, 0x000000],
            [0xff00ff, 0xff00ff, 0xff00ff, 0xff00ff]
        ];

        function createMorphMesh(geo1, geo2, color, x, z, angle) {
            const g1 = geo1.toNonIndexed();
            const g2 = geo2.toNonIndexed();

            const pos1 = g1.attributes.position.array;
            const pos2 = g2.attributes.position.array;
            const norm1 = g1.attributes.normal.array;
            const norm2 = g2.attributes.normal.array;

            const maxVerts = Math.max(pos1.length, pos2.length) / 3;
            
            const basePos = new Float32Array(maxVerts * 3);
            const targetPos = new Float32Array(maxVerts * 3);
            const baseNorm = new Float32Array(maxVerts * 3);
            const targetNorm = new Float32Array(maxVerts * 3);
            const currentPos = new Float32Array(maxVerts * 3);
            const currentNorm = new Float32Array(maxVerts * 3);

            for (let i = 0; i < maxVerts * 3; i += 3) {
                const i1 = Math.min(i, pos1.length - 3);
                const i2 = Math.min(i, pos2.length - 3);

                basePos[i] = pos1[i1]; basePos[i+1] = pos1[i1+1]; basePos[i+2] = pos1[i1+2];
                targetPos[i] = pos2[i2]; targetPos[i+1] = pos2[i2+1]; targetPos[i+2] = pos2[i2+2];
                
                baseNorm[i] = norm1[i1]; baseNorm[i+1] = norm1[i1+1]; baseNorm[i+2] = norm1[i1+2];
                targetNorm[i] = norm2[i2]; targetNorm[i+1] = norm2[i2+1]; targetNorm[i+2] = norm2[i2+2];

                currentPos[i] = basePos[i]; currentPos[i+1] = basePos[i+1]; currentPos[i+2] = basePos[i+2];
                currentNorm[i] = baseNorm[i]; currentNorm[i+1] = baseNorm[i+1]; currentNorm[i+2] = baseNorm[i+2];
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(currentPos, 3));
            geometry.setAttribute('normal', new THREE.BufferAttribute(currentNorm, 3));

            const material = new THREE.MeshStandardMaterial({ 
                color: color, 
                roughness: 0.4, 
                metalness: 0.1,
                side: THREE.DoubleSide
            });
            
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.set(x, 1.2, z);
            
            dioramaGroup.add(mesh);

            return {
                mesh,
                basePos, targetPos,
                baseNorm, targetNorm,
                initialAngle: angle,
                radius: Math.sqrt(x*x + z*z),
                originalColor: color
            };
        }

        // 1. Sphere to Torus
        morphObjects.push(createMorphMesh(
            new THREE.IcosahedronGeometry(0.8, 3),
            new THREE.TorusGeometry(0.6, 0.25, 16, 32),
            originalColors[0], -3, 0, Math.PI
        ));

        // 2. Cube to Sphere
        morphObjects.push(createMorphMesh(
            new THREE.BoxGeometry(1.2, 1.2, 1.2, 4, 4, 4),
            new THREE.SphereGeometry(0.8, 32, 16),
            originalColors[1], 3, 0, 0
        ));

        // 3. Cone to Cylinder
        morphObjects.push(createMorphMesh(
            new THREE.ConeGeometry(0.7, 1.5, 16, 4),
            new THREE.CylinderGeometry(0.7, 0.7, 1.5, 16, 4),
            originalColors[2], 0, -3, -Math.PI/2
        ));

        // 4. Torus to Octahedron
        morphObjects.push(createMorphMesh(
            new THREE.TorusGeometry(0.6, 0.25, 16, 32),
            new THREE.OctahedronGeometry(0.8, 0),
            originalColors[3], 0, 3, Math.PI/2
        ));

        // --- DOM Elements & Events ---
        const morphSlider = document.getElementById('morphSlider');
        const morphLabel = document.getElementById('morphLabel');
        const spinBtn = document.getElementById('spinBtn');
        
        const hudMorph = document.getElementById('hudMorph');
        const hudSpin = document.getElementById('hudSpin');
        const hudMini = document.getElementById('hudMini');

        morphSlider.addEventListener('input', (e) => {
            state.morphProgress = parseInt(e.target.value);
            morphLabel.textContent = `Morph: ${state.morphProgress}%`;
        });

        spinBtn.addEventListener('click', () => {
            state.spinActive = !state.spinActive;
            spinBtn.textContent = state.spinActive ? 'Spin: ON' : 'Spin: OFF';
        });

        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'c') {
                state.colorPaletteIndex = (state.colorPaletteIndex + 1) % 4;
                const currentPalette = palettes[state.colorPaletteIndex];
                morphObjects.forEach((obj, i) => {
                    obj.mesh.material.color.setHex(currentPalette[i]);
                });
            } else if (key === 'p') {
                state.pulseActive = !state.pulseActive;
            } else if (key === 'm') {
                state.miniatureMode = !state.miniatureMode;
                state.domeVisible = state.miniatureMode;
                dome.visible = state.domeVisible;
            } else if (key === 'r') {
                // Reset
                state.morphProgress = 0;
                state.spinActive = false;
                state.spinAngle = 0;
                state.colorPaletteIndex = 0;
                state.pulseActive = false;
                state.miniatureMode = false;
                state.domeVisible = false;
                
                morphSlider.value = 0;
                morphLabel.textContent = 'Morph: 0%';
                spinBtn.textContent = 'Spin: OFF';
                dome.visible = false;
                
                morphObjects.forEach((obj, i) => {
                    obj.mesh.material.color.setHex(originalColors[i]);
                });
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // 1. Morphing
            const t = state.morphProgress / 100;
            morphObjects.forEach(obj => {
                const pos = obj.mesh.geometry.attributes.position.array;
                const norm = obj.mesh.geometry.attributes.normal.array;
                
                for (let i = 0; i < pos.length; i++) {
                    pos[i] = obj.basePos[i] + (obj.targetPos[i] - obj.basePos[i]) * t;
                    norm[i] = obj.baseNorm[i] + (obj.targetNorm[i] - obj.baseNorm[i]) * t;
                }
                
                obj.mesh.geometry.attributes.position.needsUpdate = true;
                obj.mesh.geometry.attributes.normal.needsUpdate = true;
            });

            // 2. Spinning
            if (state.spinActive) {
                state.spinAngle += 0.5 * delta;
            }
            
            state.morphObjectsPositions = [];
            morphObjects.forEach(obj => {
                const currentAngle = obj.initialAngle + state.spinAngle;
                obj.mesh.position.x = obj.radius * Math.cos(currentAngle);
                obj.mesh.position.z = obj.radius * Math.sin(currentAngle);
                
                // Keep objects looking somewhat towards center or rotating nicely
                obj.mesh.rotation.y = -currentAngle;
                obj.mesh.rotation.x = time * 0.5; // slight tumble
                
                state.morphObjectsPositions.push({
                    x: obj.mesh.position.x,
                    y: obj.mesh.position.y,
                    z: obj.mesh.position.z
                });
            });

            // 3. Pulse Ferrari
            if (state.pulseActive) {
                state.ferrariScale = 0.8 + Math.sin(time * 5) * 0.1;
            } else {
                // Smooth return to 0.8
                state.ferrariScale += (0.8 - state.ferrariScale) * 0.1;
            }
            ferrariModel.scale.setScalar(state.ferrariScale);

            // 4. Miniature Mode
            const targetDioramaScale = state.miniatureMode ? 0.4 : 1.0;
            state.dioramaScale += (targetDioramaScale - state.dioramaScale) * 0.1;
            dioramaGroup.scale.setScalar(state.dioramaScale);

            // 5. Update HUD
            hudMorph.textContent = state.morphProgress;
            hudSpin.textContent = state.spinActive ? 'ON' : 'OFF';
            hudMini.textContent = state.miniatureMode ? 'ON' : 'OFF';

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
