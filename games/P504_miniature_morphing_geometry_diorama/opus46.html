<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Three.js Diorama with Morphing Shapes & Ferrari</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#hudPanel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.65);
    color: #e0e0e0;
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.7;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 180px;
    z-index: 10;
}

#controls {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    z-index: 10;
}

#sliderContainer {
    background: rgba(0, 0, 0, 0.65);
    padding: 10px 20px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
}

#sliderLabel {
    color: #e0e0e0;
    font-size: 13px;
    min-width: 80px;
}

#morphSlider {
    width: 200px;
    cursor: pointer;
    accent-color: #ff4466;
}

#spinBtn {
    background: rgba(0, 0, 0, 0.65);
    color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(8px);
    transition: all 0.2s;
}
#spinBtn:hover {
    background: rgba(255,255,255,0.15);
}

#instructions {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.55);
    color: #aaa;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 11px;
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 10;
}
</style>
</head>
<body>

<div id="hudPanel">
    <div id="hudMorph">Morph: 0%</div>
    <div id="hudSpin">Spin: OFF</div>
    <div id="hudMiniature">Miniature: OFF</div>
</div>

<div id="controls">
    <div id="sliderContainer">
        <span id="sliderLabel">Morph: 0%</span>
        <input type="range" id="morphSlider" min="0" max="100" value="0">
    </div>
    <button id="spinBtn">Spin: OFF</button>
</div>

<div id="instructions">
    Keys: <b>C</b> = Cycle Colors | <b>P</b> = Pulse Ferrari | <b>M</b> = Miniature Mode | <b>R</b> = Reset
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xc8d8e8);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.5, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
dirLight.shadow.bias = -0.001;
scene.add(dirLight);

// ============ DIORAMA GROUP ============
const dioramaGroup = new THREE.Group();
scene.add(dioramaGroup);

// Platform
const platformGeo = new THREE.CylinderGeometry(6, 6, 0.3, 64);
const platformMat = new THREE.MeshStandardMaterial({
    color: 0x3a2518,
    roughness: 0.7,
    metalness: 0.1
});
const platform = new THREE.Mesh(platformGeo, platformMat);
platform.position.y = 0;
platform.receiveShadow = true;
platform.castShadow = true;
dioramaGroup.add(platform);

// ============ FERRARI ============
let ferrariModel = null;
let ferrariLoaded = false;

const loader = new GLTFLoader();
loader.load(
    'ferrari.glb',
    (gltf) => {
        ferrariModel = gltf.scene;
        ferrariModel.name = 'ferrariModel';
        ferrariModel.position.set(0, 0.3, 0);
        ferrariModel.scale.set(0.8, 0.8, 0.8);
        ferrariModel.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });
        dioramaGroup.add(ferrariModel);
        ferrariLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Ferrari model not found, creating placeholder:', error);
        // Create a placeholder car-like shape
        const carGroup = new THREE.Group();
        carGroup.name = 'ferrariModel';

        const bodyGeo = new THREE.BoxGeometry(3.5, 0.6, 1.5);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.7, roughness: 0.3 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.4;
        body.castShadow = true;
        carGroup.add(body);

        const cabinGeo = new THREE.BoxGeometry(1.8, 0.5, 1.3);
        const cabinMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.5, roughness: 0.2, transparent: true, opacity: 0.7 });
        const cabin = new THREE.Mesh(cabinGeo, cabinMat);
        cabin.position.set(-0.2, 0.9, 0);
        cabin.castShadow = true;
        carGroup.add(cabin);

        const wheelGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.2, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
        const wheelPositions = [
            [-1.1, 0.15, 0.8], [-1.1, 0.15, -0.8],
            [1.1, 0.15, 0.8], [1.1, 0.15, -0.8]
        ];
        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.position.set(...pos);
            wheel.rotation.x = Math.PI / 2;
            wheel.castShadow = true;
            carGroup.add(wheel);
        });

        carGroup.position.set(0, 0.3, 0);
        carGroup.scale.set(0.8, 0.8, 0.8);
        dioramaGroup.add(carGroup);
        ferrariModel = carGroup;
        ferrariLoaded = true;
    }
);

// ============ MORPHING GEOMETRY HELPERS ============
function createMorphMesh(baseGeo, targetGeo, color, position) {
    // Ensure both geometries have the same number of vertices
    const basePos = baseGeo.attributes.position;
    const targetPos = targetGeo.attributes.position;

    const baseCount = basePos.count;
    const targetCount = targetPos.count;

    let baseVertices, targetVertices;

    if (baseCount === targetCount) {
        baseVertices = new Float32Array(basePos.array);
        targetVertices = new Float32Array(targetPos.array);
    } else {
        // Resample to match vertex counts
        const maxCount = Math.max(baseCount, targetCount);
        baseVertices = resampleVertices(basePos.array, baseCount, maxCount);
        targetVertices = resampleVertices(targetPos.array, targetCount, maxCount);

        // Rebuild geometry with maxCount vertices
        const newGeo = new THREE.BufferGeometry();
        newGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(baseVertices), 3));
        newGeo.computeVertexNormals();

        const mat = new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.4,
            metalness: 0.3,
            flatShading: false
        });
        const mesh = new THREE.Mesh(newGeo, mat);
        mesh.position.set(position.x, position.y, position.z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        mesh.userData = {
            baseVertices: baseVertices,
            targetVertices: targetVertices,
            originalColor: color,
            basePosition: { x: position.x, y: position.y, z: position.z },
            orbitRadius: Math.sqrt(position.x * position.x + position.z * position.z),
            orbitAngleOffset: Math.atan2(position.x, position.z)
        };

        return mesh;
    }

    const mat = new THREE.MeshStandardMaterial({
        color: color,
        roughness: 0.4,
        metalness: 0.3,
        flatShading: false
    });

    const geo = baseGeo.clone();
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(position.x, position.y, position.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    mesh.userData = {
        baseVertices: new Float32Array(baseVertices),
        targetVertices: new Float32Array(targetVertices),
        originalColor: color,
        basePosition: { x: position.x, y: position.y, z: position.z },
        orbitRadius: Math.sqrt(position.x * position.x + position.z * position.z),
        orbitAngleOffset: Math.atan2(position.x, position.z)
    };

    return mesh;
}

function resampleVertices(srcArray, srcCount, dstCount) {
    const result = new Float32Array(dstCount * 3);
    for (let i = 0; i < dstCount; i++) {
        const srcIdx = Math.floor((i / dstCount) * srcCount);
        const clampedIdx = Math.min(srcIdx, srcCount - 1);
        result[i * 3] = srcArray[clampedIdx * 3];
        result[i * 3 + 1] = srcArray[clampedIdx * 3 + 1];
        result[i * 3 + 2] = srcArray[clampedIdx * 3 + 2];
    }
    return result;
}

// Create morph objects
// 1. MorphSphere: Icosahedron -> Torus
const icoGeo = new THREE.IcosahedronGeometry(0.8, 3);
const torusTargetGeo = new THREE.TorusGeometry(0.6, 0.3, 16, 32);
// Match vertex counts by using a common resolution
const morphSphere = createMorphMesh(
    icoGeo, torusTargetGeo,
    0xff4466,
    { x: -3, y: 1.2, z: 0 }
);
dioramaGroup.add(morphSphere);

// 2. MorphCube: Box -> Sphere
const boxGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2, 8, 8, 8);
const sphereTargetGeo = new THREE.SphereGeometry(0.7, 16, 16);
const morphCube = createMorphMesh(
    boxGeo, sphereTargetGeo,
    0x44aaff,
    { x: 3, y: 1.2, z: 0 }
);
dioramaGroup.add(morphCube);

// 3. MorphCone: Cone -> Cylinder
const coneGeo = new THREE.ConeGeometry(0.7, 1.5, 16, 8);
const cylinderTargetGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 16, 8);
const morphCone = createMorphMesh(
    coneGeo, cylinderTargetGeo,
    0x66ff88,
    { x: 0, y: 1.2, z: -3 }
);
dioramaGroup.add(morphCone);

// 4. MorphTorus: Torus -> Octahedron
const torusGeo = new THREE.TorusGeometry(0.6, 0.25, 16, 32);
const octaTargetGeo = new THREE.OctahedronGeometry(0.7, 3);
const morphTorus = createMorphMesh(
    torusGeo, octaTargetGeo,
    0xffaa22,
    { x: 0, y: 1.2, z: 3 }
);
dioramaGroup.add(morphTorus);

const morphObjects = [morphSphere, morphCube, morphCone, morphTorus];

// ============ DOME ============
const domeGeo = new THREE.SphereGeometry(6.5, 64, 32);
const domeMat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 0.15,
    roughness: 0.05,
    metalness: 0.0,
    transmission: 0.9,
    thickness: 0.5,
    side: THREE.DoubleSide,
    depthWrite: false
});
const dome = new THREE.Mesh(domeGeo, domeMat);
dome.position.y = 3;
dome.visible = false;
dioramaGroup.add(dome);

// ============ STATE ============
let morphProgress = 0;
let spinActive = false;
let spinAngle = 0;
let colorPaletteIndex = 0;
let pulseActive = false;
let miniatureMode = false;
let domeVisible = false;
let ferrariScale = 0.8;

const colorPalettes = [
    [0xff4466, 0x44aaff, 0x66ff88, 0xffaa22], // original
    [0xffffff, 0xffffff, 0xffffff, 0xffffff],
    [0x000000, 0x000000, 0x000000, 0x000000],
    [0xff00ff, 0xff00ff, 0xff00ff, 0xff00ff]
];

window.__3D_STATE__ = {
    ferrariLoaded: false,
    morphProgress: 0,
    spinActive: false,
    spinAngle: 0,
    colorPaletteIndex: 0,
    pulseActive: false,
    ferrariScale: 0.8,
    miniatureMode: false,
    dioramaScale: 1.0,
    domeVisible: false,
    objectCount: 4,
    morphObjectsPositions: [
        { x: -3, y: 1.2, z: 0 },
        { x: 3, y: 1.2, z: 0 },
        { x: 0, y: 1.2, z: -3 },
        { x: 0, y: 1.2, z: 3 }
    ]
};

// ============ UI ELEMENTS ============
const morphSlider = document.getElementById('morphSlider');
const sliderLabel = document.getElementById('sliderLabel');
const spinBtn = document.getElementById('spinBtn');
const hudMorph = document.getElementById('hudMorph');
const hudSpin = document.getElementById('hudSpin');
const hudMiniature = document.getElementById('hudMiniature');

morphSlider.addEventListener('input', (e) => {
    morphProgress = parseInt(e.target.value);
    sliderLabel.textContent = `Morph: ${morphProgress}%`;
});

spinBtn.addEventListener('click', () => {
    spinActive = !spinActive;
    spinBtn.textContent = spinActive ? 'Spin: ON' : 'Spin: OFF';
});

// ============ KEYBOARD ============
document.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();

    if (key === 'c') {
        colorPaletteIndex = (colorPaletteIndex + 1) % 4;
        const palette = colorPalettes[colorPaletteIndex];
        morphObjects.forEach((obj, i) => {
            obj.material.color.setHex(palette[i]);
        });
    }

    if (key === 'p') {
        pulseActive = !pulseActive;
        if (!pulseActive && ferrariModel) {
            ferrariModel.scale.set(0.8, 0.8, 0.8);
            ferrariScale = 0.8;
        }
    }

    if (key === 'm') {
        miniatureMode = !miniatureMode;
        if (miniatureMode) {
            dioramaGroup.scale.set(0.4, 0.4, 0.4);
            dome.visible = true;
            domeVisible = true;
        } else {
            dioramaGroup.scale.set(1, 1, 1);
            dome.visible = false;
            domeVisible = false;
        }
    }

    if (key === 'r') {
        resetAll();
    }
});

function resetAll() {
    // Morph
    morphProgress = 0;
    morphSlider.value = 0;
    sliderLabel.textContent = 'Morph: 0%';

    // Spin
    spinActive = false;
    spinAngle = 0;
    spinBtn.textContent = 'Spin: OFF';

    // Reset positions
    morphObjects.forEach((obj) => {
        const bp = obj.userData.basePosition;
        obj.position.set(bp.x, bp.y, bp.z);
    });

    // Colors
    colorPaletteIndex = 0;
    const palette = colorPalettes[0];
    morphObjects.forEach((obj, i) => {
        obj.material.color.setHex(palette[i]);
    });

    // Pulse
    pulseActive = false;
    ferrariScale = 0.8;
    if (ferrariModel) {
        ferrariModel.scale.set(0.8, 0.8, 0.8);
    }

    // Miniature
    miniatureMode = false;
    dioramaGroup.scale.set(1, 1, 1);
    dome.visible = false;
    domeVisible = false;
}

// ============ MORPH FUNCTION ============
function applyMorph(mesh, t) {
    const positions = mesh.geometry.attributes.position;
    const base = mesh.userData.baseVertices;
    const target = mesh.userData.targetVertices;
    const count = positions.count;

    for (let i = 0; i < count * 3; i++) {
        positions.array[i] = base[i] + (target[i] - base[i]) * t;
    }
    positions.needsUpdate = true;
    mesh.geometry.computeVertexNormals();
}

// ============ ANIMATION ============
const clock = new THREE.Clock();
let prevTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const elapsed = clock.getElapsedTime();
    const delta = clock.getDelta();

    controls.update();

    // Morph
    const t = morphProgress / 100;
    morphObjects.forEach(obj => {
        applyMorph(obj, t);
        // Gentle self-rotation
        obj.rotation.y = elapsed * 0.3;
        obj.rotation.x = Math.sin(elapsed * 0.5) * 0.2;
    });

    // Spin
    if (spinActive) {
        spinAngle += 0.5 * (1 / 60); // approximate 0.5 rad/s
        morphObjects.forEach((obj) => {
            const radius = obj.userData.orbitRadius;
            const angleOffset = obj.userData.orbitAngleOffset;
            const angle = spinAngle + angleOffset;
            obj.position.x = Math.sin(angle) * radius;
            obj.position.z = Math.cos(angle) * radius;
            obj.position.y = obj.userData.basePosition.y;
        });
    }

    // Pulse
    if (pulseActive && ferrariModel) {
        ferrariScale = 0.8 + 0.1 * Math.sin(elapsed * 3);
        ferrariScale = Math.max(0.7, Math.min(0.9, ferrariScale));
        ferrariModel.scale.set(ferrariScale, ferrariScale, ferrariScale);
    }

    // HUD
    hudMorph.textContent = `Morph: ${morphProgress}%`;
    hudSpin.textContent = `Spin: ${spinActive ? 'ON' : 'OFF'}`;
    hudMiniature.textContent = `Miniature: ${miniatureMode ? 'ON' : 'OFF'}`;

    // Update state
    const state = window.__3D_STATE__;
    state.ferrariLoaded = ferrariLoaded;
    state.morphProgress = morphProgress;
    state.spinActive = spinActive;
    state.spinAngle = spinAngle;
    state.colorPaletteIndex = colorPaletteIndex;
    state.pulseActive = pulseActive;
    state.ferrariScale = ferrariScale;
    state.miniatureMode = miniatureMode;
    state.dioramaScale = miniatureMode ? 0.4 : 1.0;
    state.domeVisible = domeVisible;
    state.objectCount = 4;
    state.morphObjectsPositions = morphObjects.map(obj => ({
        x: parseFloat(obj.position.x.toFixed(4)),
        y: parseFloat(obj.position.y.toFixed(4)),
        z: parseFloat(obj.position.z.toFixed(4))
    }));

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
