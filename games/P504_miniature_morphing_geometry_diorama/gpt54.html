<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Ferrari Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #c8d8e8;
    }

    #uiTop {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(20, 20, 20, 0.45);
      border-radius: 10px;
      color: #fff;
      backdrop-filter: blur(4px);
    }

    #morphContainer {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #morphSlider {
      width: 220px;
    }

    #spinBtn {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    #spinBtn:hover {
      background: #1f57b8;
    }

    #hudPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.5;
      min-width: 190px;
      white-space: pre-line;
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="uiTop">
    <div id="morphContainer">
      <label id="morphLabel" for="morphSlider">Morph: 0%</label>
      <input id="morphSlider" type="range" min="0" max="100" value="0" />
    </div>
    <button id="spinBtn">Spin: OFF</button>
  </div>

  <div id="hudPanel">Loading...</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { BufferGeometryUtils } from 'https://unpkg.com/three@0.160.0/examples/jsm/utils/BufferGeometryUtils.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xc8d8e8);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    scene.add(dirLight);

    const dioramaGroup = new THREE.Group();
    scene.add(dioramaGroup);

    const platformGeo = new THREE.CylinderGeometry(6, 6, 0.3, 64);
    const platformMat = new THREE.MeshStandardMaterial({
      color: 0x3a2518,
      roughness: 0.85,
      metalness: 0.1
    });
    const platform = new THREE.Mesh(platformGeo, platformMat);
    platform.position.y = 0;
    platform.receiveShadow = true;
    platform.castShadow = true;
    dioramaGroup.add(platform);

    const domeGeo = new THREE.SphereGeometry(7.5, 48, 32);
    const domeMat = new THREE.MeshPhysicalMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.15,
      roughness: 0.05,
      metalness: 0,
      transmission: 0.2,
      side: THREE.DoubleSide
    });
    const dome = new THREE.Mesh(domeGeo, domeMat);
    dome.position.set(0, 3.8, 0);
    dome.visible = false;
    dioramaGroup.add(dome);

    const morphSlider = document.getElementById('morphSlider');
    const morphLabel = document.getElementById('morphLabel');
    const spinBtn = document.getElementById('spinBtn');
    const hudPanel = document.getElementById('hudPanel');

    let ferrariModel = null;
    let ferrariLoaded = false;

    const originalFerrariScale = 0.8;
    let morphProgress = 0;
    let spinActive = false;
    let spinAngle = 0;
    let pulseActive = false;
    let miniatureMode = false;
    let colorPaletteIndex = 0;

    const paletteSteps = [null, 0xffffff, 0x000000, 0xff00ff];

    window.__3D_STATE__ = {
      ferrariLoaded: false,
      morphProgress: 0,
      spinActive: false,
      spinAngle: 0,
      colorPaletteIndex: 0,
      pulseActive: false,
      ferrariScale: originalFerrariScale,
      miniatureMode: false,
      dioramaScale: 1.0,
      domeVisible: false,
      objectCount: 4,
      morphObjectsPositions: []
    };

    function createMorphCompatibleGeometry(geometry, count) {
      let g = geometry.toNonIndexed();
      const pos = g.attributes.position;
      if (pos.count === count) return g;

      if (pos.count < count) {
        const oldArr = pos.array;
        const newArr = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          const src = (i % pos.count) * 3;
          newArr[i * 3 + 0] = oldArr[src + 0];
          newArr[i * 3 + 1] = oldArr[src + 1];
          newArr[i * 3 + 2] = oldArr[src + 2];
        }
        const newGeo = new THREE.BufferGeometry();
        newGeo.setAttribute('position', new THREE.BufferAttribute(newArr, 3));
        newGeo.computeVertexNormals();
        return newGeo;
      } else {
        const oldArr = pos.array;
        const newArr = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
          newArr[i * 3 + 0] = oldArr[i * 3 + 0];
          newArr[i * 3 + 1] = oldArr[i * 3 + 1];
          newArr[i * 3 + 2] = oldArr[i * 3 + 2];
        }
        const newGeo = new THREE.BufferGeometry();
        newGeo.setAttribute('position', new THREE.BufferAttribute(newArr, 3));
        newGeo.computeVertexNormals();
        return newGeo;
      }
    }

    function buildMorphMesh(baseGeo, targetGeo, color, name, initialPos) {
      const base = baseGeo.toNonIndexed();
      const target = targetGeo.toNonIndexed();

      const maxCount = Math.max(
        base.attributes.position.count,
        target.attributes.position.count
      );

      const baseFixed = createMorphCompatibleGeometry(base, maxCount);
      const targetFixed = createMorphCompatibleGeometry(target, maxCount);

      const currentGeo = baseFixed.clone();
      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.45,
        metalness: 0.15
      });

      const mesh = new THREE.Mesh(currentGeo, material);
      mesh.position.copy(initialPos);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.name = name;

      const orbitRadius = Math.sqrt(initialPos.x * initialPos.x + initialPos.z * initialPos.z);
      const baseOrbitAngle = Math.atan2(initialPos.z, initialPos.x);

      return {
        mesh,
        originalColor: color,
        basePositions: baseFixed.attributes.position.array.slice(),
        targetPositions: targetFixed.attributes.position.array.slice(),
        workingPositions: currentGeo.attributes.position.array,
        orbitRadius,
        baseOrbitAngle
      };
    }

    const morphObjects = [];

    morphObjects.push(
      buildMorphMesh(
        new THREE.IcosahedronGeometry(0.8, 3),
        new THREE.TorusGeometry(0.7, 0.25, 16, 32),
        0xff4466,
        'MorphSphere',
        new THREE.Vector3(-3, 1.2, 0)
      )
    );

    morphObjects.push(
      buildMorphMesh(
        new THREE.BoxGeometry(1.2, 1.2, 1.2, 12, 12, 12),
        new THREE.SphereGeometry(0.8, 24, 24),
        0x44aaff,
        'MorphCube',
        new THREE.Vector3(3, 1.2, 0)
      )
    );

    morphObjects.push(
      buildMorphMesh(
        new THREE.ConeGeometry(0.7, 1.5, 16, 8),
        new THREE.CylinderGeometry(0.6, 0.6, 1.5, 16, 8),
        0x66ff88,
        'MorphCone',
        new THREE.Vector3(0, 1.2, -3)
      )
    );

    morphObjects.push(
      buildMorphMesh(
        new THREE.TorusGeometry(0.6, 0.25, 16, 32),
        new THREE.OctahedronGeometry(0.9, 2),
        0xffaa22,
        'MorphTorus',
        new THREE.Vector3(0, 1.2, 3)
      )
    );

    morphObjects.forEach(obj => {
      dioramaGroup.add(obj.mesh);
    });

    const loader = new GLTFLoader();
    loader.load(
      'ferrari.glb',
      (gltf) => {
        ferrariModel = gltf.scene;
        ferrariModel.name = 'ferrariModel';
        ferrariModel.position.set(0, 0.3, 0);
        ferrariModel.scale.set(originalFerrariScale, originalFerrariScale, originalFerrariScale);

        ferrariModel.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) child.material.needsUpdate = true;
          }
        });

        dioramaGroup.add(ferrariModel);
        ferrariLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Error loading ferrari.glb:', err);
      }
    );

    morphSlider.addEventListener('input', () => {
      morphProgress = Number(morphSlider.value);
      morphLabel.textContent = `Morph: ${morphProgress}%`;
    });

    spinBtn.addEventListener('click', () => {
      spinActive = !spinActive;
      spinBtn.textContent = `Spin: ${spinActive ? 'ON' : 'OFF'}`;
    });

    function updateMorphColors() {
      morphObjects.forEach(obj => {
        const colorValue = colorPaletteIndex === 0
          ? obj.originalColor
          : paletteSteps[colorPaletteIndex];
        obj.mesh.material.color.setHex(colorValue);
      });
    }

    function setMiniatureMode(active) {
      miniatureMode = active;
      dioramaGroup.scale.setScalar(miniatureMode ? 0.4 : 1.0);
      dome.visible = miniatureMode;
    }

    function resetState() {
      morphProgress = 0;
      morphSlider.value = 0;
      morphLabel.textContent = 'Morph: 0%';

      spinActive = false;
      spinBtn.textContent = 'Spin: OFF';
      spinAngle = 0;

      colorPaletteIndex = 0;
      updateMorphColors();

      pulseActive = false;
      setMiniatureMode(false);

      morphObjects.forEach(obj => {
        const a = obj.baseOrbitAngle;
        obj.mesh.position.set(
          Math.cos(a) * obj.orbitRadius,
          1.2,
          Math.sin(a) * obj.orbitRadius
        );
      });

      if (ferrariModel) {
        ferrariModel.scale.set(
          originalFerrariScale,
          originalFerrariScale,
          originalFerrariScale
        );
      }
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key === 'c') {
        colorPaletteIndex = (colorPaletteIndex + 1) % 4;
        updateMorphColors();
      } else if (key === 'p') {
        pulseActive = !pulseActive;
      } else if (key === 'm') {
        setMiniatureMode(!miniatureMode);
      } else if (key === 'r') {
        resetState();
      }
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();
      const delta = clock.getDelta();
      const t = morphProgress / 100;

      morphObjects.forEach((obj, index) => {
        const wp = obj.workingPositions;
        const bp = obj.basePositions;
        const tp = obj.targetPositions;

        for (let i = 0; i < wp.length; i++) {
          wp[i] = THREE.MathUtils.lerp(bp[i], tp[i], t);
        }

        obj.mesh.geometry.attributes.position.needsUpdate = true;
        obj.mesh.geometry.computeVertexNormals();

        if (spinActive) {
          const angle = obj.baseOrbitAngle + spinAngle;
          obj.mesh.position.x = Math.cos(angle) * obj.orbitRadius;
          obj.mesh.position.z = Math.sin(angle) * obj.orbitRadius;
          obj.mesh.position.y = 1.2;
        }

        obj.mesh.rotation.y += 0.01 + index * 0.002;
      });

      if (spinActive) {
        spinAngle += 0.5 * delta;
      }

      if (ferrariModel) {
        let scaleValue = originalFerrariScale;
        if (pulseActive) {
          scaleValue = 0.8 + Math.sin(elapsed * 3.0) * 0.1;
        }
        ferrariModel.scale.set(scaleValue, scaleValue, scaleValue);
      }

      controls.update();

      window.__3D_STATE__.ferrariLoaded = ferrariLoaded;
      window.__3D_STATE__.morphProgress = morphProgress;
      window.__3D_STATE__.spinActive = spinActive;
      window.__3D_STATE__.spinAngle = spinAngle;
      window.__3D_STATE__.colorPaletteIndex = colorPaletteIndex;
      window.__3D_STATE__.pulseActive = pulseActive;
      window.__3D_STATE__.ferrariScale = ferrariModel ? ferrariModel.scale.x : originalFerrariScale;
      window.__3D_STATE__.miniatureMode = miniatureMode;
      window.__3D_STATE__.dioramaScale = dioramaGroup.scale.x;
      window.__3D_STATE__.domeVisible = dome.visible;
      window.__3D_STATE__.objectCount = 4;
      window.__3D_STATE__.morphObjectsPositions = morphObjects.map(obj => ({
        x: obj.mesh.position.x,
        y: obj.mesh.position.y,
        z: obj.mesh.position.z
      }));

      hudPanel.textContent =
        `Morph: ${morphProgress}%\n` +
        `Spin: ${spinActive ? 'ON' : 'OFF'}\n` +
        `Miniature: ${miniatureMode ? 'ON' : 'OFF'}`;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
