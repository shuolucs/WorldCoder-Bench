<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Helix Unzip Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
        }
        #title-hud {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            color: #ffffff;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
        #progress-bar-container {
            position: absolute;
            top: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 12px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 6px;
            pointer-events: none;
            z-index: 10;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5);
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff3333, #3333ff);
            border-radius: 6px;
            transition: width 0.3s ease-out;
        }
        #controls-bar {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #aaccff;
            font-size: 15px;
            pointer-events: none;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 0;
        }
        #debug-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 300px;
            background: rgba(10, 10, 20, 0.85);
            color: #ffffff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            pointer-events: none;
            box-sizing: border-box;
            z-index: 10;
            border: 1px solid #334466;
            line-height: 1.5;
        }
        .debug-title {
            color: #ffaa00;
            font-weight: bold;
            margin-bottom: 8px;
            border-bottom: 1px solid #334466;
            padding-bottom: 4px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="title-hud">DNA Helix Unzip Simulator</div>
    <div id="progress-bar-container">
        <div id="progress-bar"></div>
    </div>
    <div id="controls-bar">
        U: Unzip | R: Re-zip | Space: Auto | D: Debug | Click Lamp: Light
    </div>
    <div id="debug-overlay"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            sceneReady: false,
            unzipLevel: 0,
            autoUnzip: false,
            debugOverlayVisible: true,
            lampLoaded: false,
            lampLightOn: false,
            totalBasePairs: 20,
            separatedSpheres: 0,
            totalKineticEnergy: 0,
            elapsedTime: 0,
            progressPercent: 0,
            helixRadius: 1.5,
            basePairColors: ['green', 'yellow'],
            strandAColor: 'red',
            strandBColor: 'blue'
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(10, 15, 10);
        scene.add(directionalLight);

        // --- Lamp Setup ---
        const lampLight = new THREE.PointLight(0xff8800, 0, 15);
        lampLight.position.set(-8, -3, 0);
        scene.add(lampLight);

        let lampModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'IridescenceLamp.glb',
            (gltf) => {
                lampModel = gltf.scene;
                lampModel.position.set(-8, -3, 0);
                lampModel.scale.set(2, 2, 2);
                scene.add(lampModel);
                state.lampLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load IridescenceLamp.glb, creating fallback mesh.', error);
                // Fallback if asset is missing so interaction still works
                const geo = new THREE.CylinderGeometry(0.5, 0.8, 3, 16);
                const mat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
                lampModel = new THREE.Mesh(geo, mat);
                lampModel.position.set(-8, -3, 0);
                scene.add(lampModel);
                state.lampLoaded = true;
            }
        );

        // --- DNA Construction ---
        const numPairs = 20;
        const radius = 1.5;
        const verticalSpacing = 0.5;
        const twistAngle = Math.PI / 5; // 36 degrees

        const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const matA = new THREE.MeshPhongMaterial({ color: 0xff3333 });
        const matB = new THREE.MeshPhongMaterial({ color: 0x3333ff });
        
        const cylGeo = new THREE.CylinderGeometry(0.05, 0.05, 1, 8);
        // Rotate cylinder geometry so it aligns with Z axis for easier LookAt orientation
        cylGeo.rotateX(Math.PI / 2);

        const dnaPairs = [];

        for (let i = 0; i < numPairs; i++) {
            // Center the helix vertically
            const y = (i - (numPairs - 1) / 2) * verticalSpacing;
            const theta = i * twistAngle;

            const posA = new THREE.Vector3(radius * Math.cos(theta), y, radius * Math.sin(theta));
            const posB = new THREE.Vector3(-radius * Math.cos(theta), y, -radius * Math.sin(theta));

            const sphereA = new THREE.Mesh(sphereGeo, matA);
            sphereA.position.copy(posA);
            scene.add(sphereA);

            const sphereB = new THREE.Mesh(sphereGeo, matB);
            sphereB.position.copy(posB);
            scene.add(sphereB);

            const isAT = i % 2 === 0;
            const cylMat = new THREE.MeshPhongMaterial({ 
                color: isAT ? 0x33ff33 : 0xffff33,
                transparent: true,
                opacity: 1.0
            });
            
            const cylinder = new THREE.Mesh(cylGeo, cylMat);
            const distance = posA.distanceTo(posB);
            cylinder.scale.set(1, 1, distance);
            cylinder.position.copy(posA).lerp(posB, 0.5);
            cylinder.lookAt(posB);
            scene.add(cylinder);

            // Calculate outward separation targets (x offset increases by 2.0)
            // Using Math.sign to ensure they move outward along X axis relative to their current side
            const dirA = posA.x >= 0 ? 1 : -1;
            const dirB = posB.x >= 0 ? 1 : -1;
            
            const targetA = posA.clone(); targetA.x += dirA * 2.0;
            const targetB = posB.clone(); targetB.x += dirB * 2.0;

            dnaPairs.push({
                index: i,
                sphereA,
                sphereB,
                cylinder,
                basePosA: posA,
                basePosB: posB,
                targetA,
                targetB,
                progress: 0, // 0 = zipped, 1 = unzipped
                velA: new THREE.Vector3(),
                velB: new THREE.Vector3()
            });
        }

        // --- Interaction & Events ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'u') {
                state.unzipLevel = Math.min(numPairs, state.unzipLevel + 1);
            } else if (e.key.toLowerCase() === 'r') {
                state.unzipLevel = Math.max(0, state.unzipLevel - 1);
            } else if (e.code === 'Space') {
                state.autoUnzip = !state.autoUnzip;
            } else if (e.key.toLowerCase() === 'd') {
                state.debugOverlayVisible = !state.debugOverlayVisible;
                document.getElementById('debug-overlay').style.display = state.debugOverlayVisible ? 'block' : 'none';
            }
        });

        window.addEventListener('click', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            if (lampModel) {
                const intersects = raycaster.intersectObject(lampModel, true);
                if (intersects.length > 0) {
                    state.lampLightOn = !state.lampLightOn;
                    lampLight.intensity = state.lampLightOn ? 2.0 : 0.0;
                }
            }
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let lastAutoUnzipTime = 0;

        function updateUI() {
            state.progressPercent = (state.unzipLevel / numPairs) * 100;
            document.getElementById('progress-bar').style.width = `${state.progressPercent}%`;

            if (state.debugOverlayVisible) {
                const debugDiv = document.getElementById('debug-overlay');
                debugDiv.innerHTML = `
                    <div class="debug-title">Physics Debug Overlay</div>
                    Unzip Level: ${state.unzipLevel} / 20<br/>
                    Auto Unzip: <span style="color:${state.autoUnzip?'#33ff33':'#ff3333'}">${state.autoUnzip ? 'ON' : 'OFF'}</span><br/>
                    Separated Spheres: ${state.separatedSpheres}<br/>
                    Kinetic Energy: ${state.totalKineticEnergy.toFixed(4)}<br/>
                    Lamp Light: <span style="color:${state.lampLightOn?'#ffff33':'#aaaaaa'}">${state.lampLightOn ? 'ON' : 'OFF'}</span><br/>
                    Elapsed Time: ${state.elapsedTime.toFixed(2)} s
                `;
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            state.elapsedTime += delta;

            controls.update();

            // Auto Unzip Logic
            if (state.autoUnzip && state.elapsedTime - lastAutoUnzipTime > 0.8) {
                if (state.unzipLevel < numPairs) {
                    state.unzipLevel++;
                    lastAutoUnzipTime = state.elapsedTime;
                }
            }

            let currentKE = 0;
            let currentSeparated = 0;

            // Physics & Animation Update
            for (let i = 0; i < numPairs; i++) {
                const pair = dnaPairs[i];
                // Top-down unzipping: highest index (19) unzips first
                const isUnzipped = i >= (numPairs - state.unzipLevel);
                const targetProgress = isUnzipped ? 1.0 : 0.0;

                // Lerp progress over 0.5 seconds
                const speed = 1.0 / 0.5;
                if (pair.progress < targetProgress) {
                    pair.progress = Math.min(1.0, pair.progress + delta * speed);
                } else if (pair.progress > targetProgress) {
                    pair.progress = Math.max(0.0, pair.progress - delta * speed);
                }

                // Fade cylinder
                pair.cylinder.material.opacity = 1.0 - pair.progress;

                // Calculate base lerped position
                const currentTargetA = pair.basePosA.clone().lerp(pair.targetA, pair.progress);
                const currentTargetB = pair.basePosB.clone().lerp(pair.targetB, pair.progress);

                if (pair.progress === 1.0) {
                    currentSeparated += 2;
                    
                    // Thermal Jiggle A
                    pair.velA.x += (Math.random() - 0.5) * 0.02;
                    pair.velA.y += (Math.random() - 0.5) * 0.02;
                    pair.velA.z += (Math.random() - 0.5) * 0.02;
                    pair.velA.multiplyScalar(0.9); // Damping
                    pair.velA.add(currentTargetA.clone().sub(pair.sphereA.position).multiplyScalar(0.1)); // Spring to target
                    pair.sphereA.position.add(pair.velA);
                    currentKE += 0.5 * pair.velA.lengthSq();

                    // Thermal Jiggle B
                    pair.velB.x += (Math.random() - 0.5) * 0.02;
                    pair.velB.y += (Math.random() - 0.5) * 0.02;
                    pair.velB.z += (Math.random() - 0.5) * 0.02;
                    pair.velB.multiplyScalar(0.9);
                    pair.velB.add(currentTargetB.clone().sub(pair.sphereB.position).multiplyScalar(0.1));
                    pair.sphereB.position.add(pair.velB);
                    currentKE += 0.5 * pair.velB.lengthSq();
                } else {
                    // Strictly follow lerp path when not fully unzipped
                    pair.sphereA.position.copy(currentTargetA);
                    pair.sphereB.position.copy(currentTargetB);
                    pair.velA.set(0, 0, 0);
                    pair.velB.set(0, 0, 0);
                }
            }

            state.totalKineticEnergy = currentKE;
            state.separatedSpheres = currentSeparated;
            state.sceneReady = true;

            updateUI();
            renderer.render(scene, camera);
        }

        // Start simulation
        animate();

    </script>
</body>
</html>
