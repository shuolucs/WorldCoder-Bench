<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DNA Helix Unzip Simulator</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
    }

    canvas {
      display: block;
    }

    #title-hud {
      position: absolute;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(255,255,255,0.25);
      z-index: 10;
      pointer-events: none;
    }

    #progress-wrap {
      position: absolute;
      top: 54px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      max-width: 70vw;
      height: 16px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
      pointer-events: none;
      box-shadow: 0 0 12px rgba(0,0,0,0.35) inset;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #33ff99, #ffff33, #ff9933);
      transition: width 0.15s linear;
    }

    #controls-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 12px 18px;
      box-sizing: border-box;
      color: white;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid rgba(255,255,255,0.1);
      text-align: center;
      font-size: 15px;
      z-index: 10;
      pointer-events: none;
    }

    #debug-overlay {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 300px;
      padding: 12px 14px;
      box-sizing: border-box;
      color: white;
      background: rgba(8, 10, 24, 0.78);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.55;
      z-index: 10;
      white-space: pre-line;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="title-hud">DNA Helix Unzip Simulator</div>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="debug-overlay"></div>
  <div id="controls-bar">U: Unzip | R: Re-zip | Space: Auto | D: Debug | Click Lamp: Light</div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const TOTAL_BASE_PAIRS = 20;
    const HELIX_RADIUS = 1.5;
    const VERTICAL_SPACING = 0.5;
    const TWIST_PER_PAIR = THREE.MathUtils.degToRad(36);
    const SEPARATION_DISTANCE = 2.0;
    const SEPARATION_DURATION = 0.5;
    const THERMAL_JIGGLE = 0.02;

    const bgColor = 0x0a0a2e;

    const debugOverlay = document.getElementById('debug-overlay');
    const progressBar = document.getElementById('progress-bar');

    const state = {
      sceneReady: false,
      unzipLevel: 0,
      autoUnzip: false,
      debugOverlayVisible: true,
      lampLoaded: false,
      lampLightOn: false,
      totalBasePairs: TOTAL_BASE_PAIRS,
      separatedSpheres: 0,
      totalKineticEnergy: 0,
      elapsedTime: 0,
      progressPercent: 0,
      helixRadius: HELIX_RADIUS,
      basePairColors: ['green', 'yellow'],
      strandAColor: 'red',
      strandBColor: 'blue'
    };
    window.__3D_STATE__ = state;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(bgColor);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 15, 10);
    scene.add(directionalLight);

    const lampPointLight = new THREE.PointLight(0xff8800, 2, 15);
    lampPointLight.visible = false;
    scene.add(lampPointLight);

    let lampModel = null;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const dnaGroup = new THREE.Group();
    scene.add(dnaGroup);

    const strandMatA = new THREE.MeshStandardMaterial({ color: 0xff3333 });
    const strandMatB = new THREE.MeshStandardMaterial({ color: 0x3333ff });
    const pairMatGreen = new THREE.MeshStandardMaterial({
      color: 0x33ff33,
      transparent: true,
      opacity: 1
    });
    const pairMatYellow = new THREE.MeshStandardMaterial({
      color: 0xffff33,
      transparent: true,
      opacity: 1
    });

    const sphereGeo = new THREE.SphereGeometry(0.15, 20, 20);
    const baseCylinderGeo = new THREE.CylinderGeometry(0.05, 0.05, HELIX_RADIUS * 2, 16, 1, false);

    const basePairs = [];
    const centerYOffset = -((TOTAL_BASE_PAIRS - 1) * VERTICAL_SPACING) / 2;

    function createDNA() {
      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        const angle = i * TWIST_PER_PAIR;
        const y = centerYOffset + i * VERTICAL_SPACING;
        const xA = Math.cos(angle) * HELIX_RADIUS;
        const zA = Math.sin(angle) * HELIX_RADIUS;
        const xB = Math.cos(angle + Math.PI) * HELIX_RADIUS;
        const zB = Math.sin(angle + Math.PI) * HELIX_RADIUS;

        const sphereA = new THREE.Mesh(sphereGeo, strandMatA.clone());
        const sphereB = new THREE.Mesh(sphereGeo, strandMatB.clone());
        sphereA.position.set(xA, y, zA);
        sphereB.position.set(xB, y, zB);

        const pairMaterial = (i % 2 === 0 ? pairMatGreen : pairMatYellow).clone();
        pairMaterial.transparent = true;
        pairMaterial.opacity = 1;

        const cylinder = new THREE.Mesh(baseCylinderGeo, pairMaterial);
        cylinder.position.set((xA + xB) / 2, y, (zA + zB) / 2);

        const dir = new THREE.Vector3(xB - xA, 0, zB - zA).normalize();
        const axis = new THREE.Vector3(0, 1, 0);
        cylinder.quaternion.setFromUnitVectors(axis, dir);

        dnaGroup.add(sphereA, sphereB, cylinder);

        basePairs.push({
          index: i,
          angle,
          y,
          sphereA,
          sphereB,
          cylinder,
          baseXA: xA,
          baseZA: zA,
          baseXB: xB,
          baseZB: zB,
          currentSep: 0,
          targetSep: 0,
          velocityA: new THREE.Vector3(),
          velocityB: new THREE.Vector3(),
          jiggleA: new THREE.Vector3(),
          jiggleB: new THREE.Vector3()
        });
      }
    }

    createDNA();

    const loader = new GLTFLoader();
    loader.load(
      'IridescenceLamp.glb',
      (gltf) => {
        lampModel = gltf.scene;
        lampModel.position.set(-8, -3, 0);
        lampModel.scale.set(2, 2, 2);
        scene.add(lampModel);
        lampPointLight.position.copy(lampModel.position);
        state.lampLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load IridescenceLamp.glb', err);
      }
    );

    function setUnzipLevel(newLevel) {
      state.unzipLevel = THREE.MathUtils.clamp(newLevel, 0, TOTAL_BASE_PAIRS);
      for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
        const fromTopIndex = TOTAL_BASE_PAIRS - 1 - i;
        const shouldBeUnzipped = fromTopIndex < state.unzipLevel;
        basePairs[i].targetSep = shouldBeUnzipped ? SEPARATION_DISTANCE : 0;
      }
    }

    function unzipOne() {
      if (state.unzipLevel < TOTAL_BASE_PAIRS) setUnzipLevel(state.unzipLevel + 1);
    }

    function rezipOne() {
      if (state.unzipLevel > 0) setUnzipLevel(state.unzipLevel - 1);
    }

    let autoTimer = 0;
    const clock = new THREE.Clock();

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyU') {
        unzipOne();
      } else if (e.code === 'KeyR') {
        rezipOne();
      } else if (e.code === 'Space') {
        e.preventDefault();
        state.autoUnzip = !state.autoUnzip;
      } else if (e.code === 'KeyD') {
        state.debugOverlayVisible = !state.debugOverlayVisible;
        debugOverlay.style.display = state.debugOverlayVisible ? 'block' : 'none';
      }
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (!lampModel) return;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(lampModel, true);
      if (intersects.length > 0) {
        state.lampLightOn = !state.lampLightOn;
        lampPointLight.visible = state.lampLightOn;
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateDNA(dt) {
      let totalKE = 0;
      let separatedCount = 0;

      for (const bp of basePairs) {
        const lerpAlpha = Math.min(1, dt / SEPARATION_DURATION * 3.0);
        bp.currentSep = THREE.MathUtils.lerp(bp.currentSep, bp.targetSep, lerpAlpha);

        const sepFactor = bp.currentSep / SEPARATION_DISTANCE;
        const fadeOpacity = 1 - sepFactor;
        bp.cylinder.material.opacity = fadeOpacity;
        bp.cylinder.visible = fadeOpacity > 0.01;

        const dirA = new THREE.Vector3(bp.baseXA, 0, bp.baseZA).normalize();
        const dirB = new THREE.Vector3(bp.baseXB, 0, bp.baseZB).normalize();

        if (bp.currentSep > 0.001) {
          bp.velocityA.x += (Math.random() - 0.5) * THERMAL_JIGGLE;
          bp.velocityA.y += (Math.random() - 0.5) * THERMAL_JIGGLE;
          bp.velocityA.z += (Math.random() - 0.5) * THERMAL_JIGGLE;

          bp.velocityB.x += (Math.random() - 0.5) * THERMAL_JIGGLE;
          bp.velocityB.y += (Math.random() - 0.5) * THERMAL_JIGGLE;
          bp.velocityB.z += (Math.random() - 0.5) * THERMAL_JIGGLE;

          bp.velocityA.multiplyScalar(0.88);
          bp.velocityB.multiplyScalar(0.88);

          bp.jiggleA.addScaledVector(bp.velocityA, dt * 4.0);
          bp.jiggleB.addScaledVector(bp.velocityB, dt * 4.0);

          bp.jiggleA.multiplyScalar(0.9);
          bp.jiggleB.multiplyScalar(0.9);

          separatedCount += 2;
        } else {
          bp.velocityA.set(0, 0, 0);
          bp.velocityB.set(0, 0, 0);
          bp.jiggleA.lerp(new THREE.Vector3(), 0.25);
          bp.jiggleB.lerp(new THREE.Vector3(), 0.25);
        }

        const targetA = new THREE.Vector3(
          bp.baseXA + dirA.x * bp.currentSep,
          bp.y,
          bp.baseZA + dirA.z * bp.currentSep
        );
        const targetB = new THREE.Vector3(
          bp.baseXB + dirB.x * bp.currentSep,
          bp.y,
          bp.baseZB + dirB.z * bp.currentSep
        );

        bp.sphereA.position.copy(targetA).add(bp.jiggleA);
        bp.sphereB.position.copy(targetB).add(bp.jiggleB);

        totalKE += 0.5 * bp.velocityA.lengthSq();
        totalKE += 0.5 * bp.velocityB.lengthSq();
      }

      state.separatedSpheres = separatedCount;
      state.totalKineticEnergy = totalKE;
    }

    function updateOverlay() {
      state.progressPercent = (state.unzipLevel / TOTAL_BASE_PAIRS) * 100;
      progressBar.style.width = `${state.progressPercent}%`;

      debugOverlay.textContent =
`Physics Debug Overlay
unzipLevel: ${state.unzipLevel}
autoUnzip: ${state.autoUnzip ? 'on' : 'off'}
totalKineticEnergy: ${state.totalKineticEnergy.toFixed(4)}
separatedSpheres: ${state.separatedSpheres}
lampLightStatus: ${state.lampLightOn ? 'on' : 'off'}
elapsedTime: ${state.elapsedTime.toFixed(2)}s`;
    }

    let firstFrameRendered = false;

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      state.elapsedTime += dt;

      if (state.autoUnzip) {
        autoTimer += dt;
        if (autoTimer >= 0.8) {
          autoTimer = 0;
          unzipOne();
        }
      } else {
        autoTimer = 0;
      }

      updateDNA(dt);
      updateOverlay();
      controls.update();
      renderer.render(scene, camera);

      if (!firstFrameRendered) {
        state.sceneReady = true;
        firstFrameRendered = true;
      }

      window.__3D_STATE__ = {
        sceneReady: state.sceneReady,
        unzipLevel: state.unzipLevel,
        autoUnzip: state.autoUnzip,
        debugOverlayVisible: state.debugOverlayVisible,
        lampLoaded: state.lampLoaded,
        lampLightOn: state.lampLightOn,
        totalBasePairs: state.totalBasePairs,
        separatedSpheres: state.separatedSpheres,
        totalKineticEnergy: state.totalKineticEnergy,
        elapsedTime: state.elapsedTime,
        progressPercent: state.progressPercent,
        helixRadius: state.helixRadius,
        basePairColors: state.basePairColors,
        strandAColor: state.strandAColor,
        strandBColor: state.strandBColor
      };
    }

    updateOverlay();
    animate();
  </script>
</body>
</html>
