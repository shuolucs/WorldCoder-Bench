<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Helix Unzip Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a2e; font-family: 'Courier New', monospace; }
canvas { display: block; }

#title-hud {
    position: fixed;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 22px;
    font-weight: bold;
    text-shadow: 0 0 10px #4488ff, 0 0 20px #2244aa;
    z-index: 100;
    letter-spacing: 2px;
    text-align: center;
}

#progress-bar-container {
    position: fixed;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    overflow: hidden;
    z-index: 100;
}

#progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #33ff33, #ffff33, #ff3333);
    border-radius: 6px;
    transition: width 0.3s ease;
}

#progress-text {
    position: fixed;
    top: 65px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.7);
    font-size: 11px;
    z-index: 100;
}

#controls-bar {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    background: rgba(0,0,0,0.6);
    padding: 10px 25px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    z-index: 100;
    white-space: nowrap;
    letter-spacing: 1px;
}

#debug-overlay {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 300px;
    background: rgba(0, 5, 20, 0.85);
    color: #ffffff;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid rgba(100, 150, 255, 0.3);
    font-size: 12px;
    line-height: 1.8;
    z-index: 100;
    backdrop-filter: blur(5px);
}

#debug-overlay .label {
    color: #6688cc;
}

#debug-overlay .value {
    color: #44ffaa;
    float: right;
}

#debug-overlay h3 {
    color: #88aaff;
    margin-bottom: 8px;
    font-size: 13px;
    border-bottom: 1px solid rgba(100,150,255,0.2);
    padding-bottom: 5px;
}
</style>
</head>
<body>

<div id="title-hud">DNA Helix Unzip Simulator</div>

<div id="progress-bar-container">
    <div id="progress-bar"></div>
</div>
<div id="progress-text">0 / 20 base pairs unzipped (0%)</div>

<div id="controls-bar">U: Unzip | R: Re-zip | Space: Auto | D: Debug | Click Lamp: Light</div>

<div id="debug-overlay">
    <h3>⚛ Physics Debug Overlay</h3>
    <div id="debug-content"></div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let unzipLevel = 0;
let autoUnzip = false;
let autoUnzipTimer = 0;
let debugOverlayVisible = true;
let lampLoaded = false;
let lampLightOn = false;
let elapsedTime = 0;
let lampModel = null;
let lampPointLight = null;

const TOTAL_BASE_PAIRS = 20;
const HELIX_RADIUS = 1.5;
const VERTICAL_SPACING = 0.5;
const TWIST_PER_PAIR = THREE.MathUtils.degToRad(36);
const SEPARATION_OFFSET = 2.0;
const SEPARATION_DURATION = 0.5;
const JIGGLE_AMPLITUDE = 0.02;

// Base pair data
const basePairs = [];

// Global state
window.__3D_STATE__ = {
    sceneReady: false,
    unzipLevel: 0,
    autoUnzip: false,
    debugOverlayVisible: true,
    lampLoaded: false,
    lampLightOn: false,
    totalBasePairs: 20,
    separatedSpheres: 0,
    totalKineticEnergy: 0,
    elapsedTime: 0,
    progressPercent: 0,
    helixRadius: 1.5,
    basePairColors: ['green', 'yellow'],
    strandAColor: 'red',
    strandBColor: 'blue'
};

// --- Renderer ---
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0a2e);
document.body.appendChild(renderer.domElement);

// --- Scene ---
const scene = new THREE.Scene();

// --- Camera ---
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

// --- Controls ---
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0x334466, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
directionalLight.position.set(10, 15, 10);
scene.add(directionalLight);

// --- Load GLB ---
const gltfLoader = new GLTFLoader();
const lampPosition = new THREE.Vector3(-8, -3, 0);

gltfLoader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/IridescenceLamp/glTF-Binary/IridescenceLamp.glb',
    (gltf) => {
        lampModel = gltf.scene;
        lampModel.position.copy(lampPosition);
        lampModel.scale.set(2, 2, 2);
        scene.add(lampModel);
        lampLoaded = true;
        window.__3D_STATE__.lampLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('GLB load failed, creating placeholder:', error);
        // Create a placeholder lamp
        const lampGeo = new THREE.CylinderGeometry(0.3, 0.5, 2, 16);
        const lampMat = new THREE.MeshStandardMaterial({ color: 0x886644, metalness: 0.8, roughness: 0.3 });
        lampModel = new THREE.Mesh(lampGeo, lampMat);
        lampModel.position.copy(lampPosition);
        lampModel.scale.set(2, 2, 2);
        scene.add(lampModel);
        
        const shade = new THREE.Mesh(
            new THREE.ConeGeometry(0.8, 0.6, 16, 1, true),
            new THREE.MeshStandardMaterial({ color: 0xccaa66, side: THREE.DoubleSide, metalness: 0.5, roughness: 0.4 })
        );
        shade.position.y = 1.3;
        lampModel.add(shade);
        
        lampLoaded = true;
        window.__3D_STATE__.lampLoaded = true;
    }
);

// Lamp point light (initially off)
lampPointLight = new THREE.PointLight(0xff8800, 2, 15);
lampPointLight.position.copy(lampPosition).add(new THREE.Vector3(0, 2, 0));
lampPointLight.visible = false;
scene.add(lampPointLight);

// --- DNA Helix Construction ---
const helixGroup = new THREE.Group();
scene.add(helixGroup);

const totalHeight = (TOTAL_BASE_PAIRS - 1) * VERTICAL_SPACING;
const yOffset = totalHeight / 2;

for (let i = 0; i < TOTAL_BASE_PAIRS; i++) {
    const angle = i * TWIST_PER_PAIR;
    const y = i * VERTICAL_SPACING - yOffset;

    // Strand A position
    const ax = HELIX_RADIUS * Math.cos(angle);
    const az = HELIX_RADIUS * Math.sin(angle);

    // Strand B position (opposite side)
    const bx = HELIX_RADIUS * Math.cos(angle + Math.PI);
    const bz = HELIX_RADIUS * Math.sin(angle + Math.PI);

    // Sphere A
    const sphereGeoA = new THREE.SphereGeometry(0.15, 16, 16);
    const sphereMatA = new THREE.MeshStandardMaterial({ color: 0xff3333, transparent: true, opacity: 1 });
    const sphereA = new THREE.Mesh(sphereGeoA, sphereMatA);
    sphereA.position.set(ax, y, az);
    helixGroup.add(sphereA);

    // Sphere B
    const sphereGeoB = new THREE.SphereGeometry(0.15, 16, 16);
    const sphereMatB = new THREE.MeshStandardMaterial({ color: 0x3333ff, transparent: true, opacity: 1 });
    const sphereB = new THREE.Mesh(sphereGeoB, sphereMatB);
    sphereB.position.set(bx, y, bz);
    helixGroup.add(sphereB);

    // Base pair cylinder
    const pairColor = (i % 2 === 0) ? 0x33ff33 : 0xffff33;
    const direction = new THREE.Vector3(bx - ax, 0, bz - az);
    const length = direction.length();
    const cylGeo = new THREE.CylinderGeometry(0.05, 0.05, length, 8);
    const cylMat = new THREE.MeshStandardMaterial({ color: pairColor, transparent: true, opacity: 1 });
    const cylinder = new THREE.Mesh(cylGeo, cylMat);

    // Position at midpoint
    cylinder.position.set((ax + bx) / 2, y, (az + bz) / 2);

    // Orient cylinder to connect the two spheres
    const dir = direction.clone().normalize();
    const quaternion = new THREE.Quaternion();
    const up = new THREE.Vector3(0, 1, 0);
    quaternion.setFromUnitVectors(up, dir);
    cylinder.quaternion.copy(quaternion);

    helixGroup.add(cylinder);

    // Also add backbone connections (thin lines between consecutive spheres on same strand)
    // Store base pair data
    basePairs.push({
        index: i,
        sphereA: sphereA,
        sphereB: sphereB,
        cylinder: cylinder,
        originalA: new THREE.Vector3(ax, y, az),
        originalB: new THREE.Vector3(bx, y, bz),
        targetA: new THREE.Vector3(ax, y, az),
        targetB: new THREE.Vector3(bx, y, bz),
        separated: false,
        separationProgress: 0, // 0 = zipped, 1 = fully separated
        animating: false,
        animDirection: 0, // 1 = unzipping, -1 = rezipping
        velocityA: new THREE.Vector3(),
        velocityB: new THREE.Vector3(),
        jiggling: false,
        jiggleOffsetA: new THREE.Vector3(),
        jiggleOffsetB: new THREE.Vector3()
    });
}

// Add backbone tubes connecting consecutive spheres on each strand
for (let i = 0; i < TOTAL_BASE_PAIRS - 1; i++) {
    const bp = basePairs[i];
    const bpNext = basePairs[i + 1];

    // Strand A backbone
    const backboneMatA = new THREE.MeshStandardMaterial({ color: 0xff6666, transparent: true, opacity: 0.6 });
    const dirA = new THREE.Vector3().subVectors(bpNext.originalA, bp.originalA);
    const lenA = dirA.length();
    const backboneGeoA = new THREE.CylinderGeometry(0.04, 0.04, lenA, 6);
    const backboneA = new THREE.Mesh(backboneGeoA, backboneMatA);
    backboneA.position.copy(bp.originalA).lerp(bpNext.originalA, 0.5);
    const qA = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirA.clone().normalize());
    backboneA.quaternion.copy(qA);
    helixGroup.add(backboneA);

    // Strand B backbone
    const backboneMatB = new THREE.MeshStandardMaterial({ color: 0x6666ff, transparent: true, opacity: 0.6 });
    const dirB = new THREE.Vector3().subVectors(bpNext.originalB, bp.originalB);
    const lenB = dirB.length();
    const backboneGeoB = new THREE.CylinderGeometry(0.04, 0.04, lenB, 6);
    const backboneB = new THREE.Mesh(backboneGeoB, backboneMatB);
    backboneB.position.copy(bp.originalB).lerp(bpNext.originalB, 0.5);
    const qB = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dirB.clone().normalize());
    backboneB.quaternion.copy(qB);
    helixGroup.add(backboneB);
}

// --- Compute separation targets ---
function computeSeparationTargets(bp) {
    const midpoint = new THREE.Vector3().addVectors(bp.originalA, bp.originalB).multiplyScalar(0.5);
    const dirA = new THREE.Vector3().subVectors(bp.originalA, midpoint).normalize();
    const dirB = new THREE.Vector3().subVectors(bp.originalB, midpoint).normalize();

    bp.targetA = bp.originalA.clone().add(dirA.clone().multiplyScalar(SEPARATION_OFFSET));
    bp.targetB = bp.originalB.clone().add(dirB.clone().multiplyScalar(SEPARATION_OFFSET));
}

for (const bp of basePairs) {
    computeSeparationTargets(bp);
}

// --- Unzip / Rezip functions ---
function unzipNext() {
    if (unzipLevel >= TOTAL_BASE_PAIRS) return;
    // Unzip from top (highest index = top visually, but let's do from index = TOTAL_BASE_PAIRS - 1 downward)
    // Actually "from the top" means highest y, which is highest index
    const idx = TOTAL_BASE_PAIRS - 1 - unzipLevel;
    const bp = basePairs[idx];
    if (!bp.separated) {
        bp.animating = true;
        bp.animDirection = 1;
        bp.separated = true;
        unzipLevel++;
    }
}

function rezipNext() {
    if (unzipLevel <= 0) return;
    unzipLevel--;
    const idx = TOTAL_BASE_PAIRS - 1 - unzipLevel;
    const bp = basePairs[idx];
    if (bp.separated) {
        bp.animating = true;
        bp.animDirection = -1;
        bp.separated = false;
        bp.jiggling = false;
    }
}

// --- Raycaster for lamp click ---
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);

    if (lampModel) {
        const intersects = raycaster.intersectObject(lampModel, true);
        if (intersects.length > 0) {
            lampLightOn = !lampLightOn;
            lampPointLight.visible = lampLightOn;
        }
    }
});

// --- Keyboard ---
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    if (key === 'u') {
        unzipNext();
    } else if (key === 'r') {
        rezipNext();
    } else if (key === ' ') {
        event.preventDefault();
        autoUnzip = !autoUnzip;
        autoUnzipTimer = 0;
    } else if (key === 'd') {
        debugOverlayVisible = !debugOverlayVisible;
        document.getElementById('debug-overlay').style.display = debugOverlayVisible ? 'block' : 'none';
    }
});

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
const clock = new THREE.Clock();
let firstFrameRendered = false;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    elapsedTime += delta;

    controls.update();

    // Auto unzip
    if (autoUnzip) {
        autoUnzipTimer += delta;
        if (autoUnzipTimer >= 0.8) {
            autoUnzipTimer = 0;
            if (unzipLevel < TOTAL_BASE_PAIRS) {
                unzipNext();
            } else {
                autoUnzip = false;
            }
        }
    }

    // Update base pairs
    let totalKE = 0;
    let separatedCount = 0;

    for (const bp of basePairs) {
        // Animation
        if (bp.animating) {
            const speed = 1.0 / SEPARATION_DURATION; // progress per second
            bp.separationProgress += bp.animDirection * speed * delta;
            bp.separationProgress = THREE.MathUtils.clamp(bp.separationProgress, 0, 1);

            if ((bp.animDirection === 1 && bp.separationProgress >= 1) ||
                (bp.animDirection === -1 && bp.separationProgress <= 0)) {
                bp.animating = false;
                if (bp.separationProgress >= 1) {
                    bp.jiggling = true;
                    bp.velocityA.set(
                        (Math.random() - 0.5) * JIGGLE_AMPLITUDE,
                        (Math.random() - 0.5) * JIGGLE_AMPLITUDE,
                        (Math.random() - 0.5) * JIGGLE_AMPLITUDE
                    );
                    bp.velocityB.set(
                        (Math.random() - 0.5) * JIGGLE_AMPLITUDE,
                        (Math.random() - 0.5) * JIGGLE_AMPLITUDE,
                        (Math.random() - 0.5) * JIGGLE_AMPLITUDE
                    );
                }
                if (bp.separationProgress <= 0) {
                    bp.jiggleOffsetA.set(0, 0, 0);
                    bp.jiggleOffsetB.set(0, 0, 0);
                }
            }
        }

        // Lerp positions
        const t = bp.separationProgress;
        const posA = new THREE.Vector3().lerpVectors(bp.originalA, bp.targetA, t);
        const posB = new THREE.Vector3().lerpVectors(bp.originalB, bp.targetB, t);

        // Jiggle
        if (bp.jiggling) {
            // Simple spring-like jiggle around separated position
            const dampening = 0.98;
            const springK = 0.5;

            // Random perturbation
            bp.velocityA.x += (Math.random() - 0.5) * JIGGLE_AMPLITUDE * 0.5;
            bp.velocityA.y += (Math.random() - 0.5) * JIGGLE_AMPLITUDE * 0.5;
            bp.velocityA.z += (Math.random() - 0.5) * JIGGLE_AMPLITUDE * 0.5;

            bp.velocityB.x += (Math.random() - 0.5) * JIGGLE_AMPLITUDE * 0.5;
            bp.velocityB.y += (Math.random() - 0.5) * JIGGLE_AMPLITUDE * 0.5;
            bp.velocityB.z += (Math.random() - 0.5) * JIGGLE_AMPLITUDE * 0.5;

            // Spring back to zero offset
            bp.velocityA.add(bp.jiggleOffsetA.clone().multiplyScalar(-springK));
            bp.velocityB.add(bp.jiggleOffsetB.clone().multiplyScalar(-springK));

            // Dampen
            bp.velocityA.multiplyScalar(dampening);
            bp.velocityB.multiplyScalar(dampening);

            bp.jiggleOffsetA.add(bp.velocityA.clone().multiplyScalar(delta));
            bp.jiggleOffsetB.add(bp.velocityB.clone().multiplyScalar(delta));

            posA.add(bp.jiggleOffsetA);
            posB.add(bp.jiggleOffsetB);

            // Kinetic energy: 0.5 * m * v^2 (m=1)
            totalKE += 0.5 * bp.velocityA.lengthSq();
            totalKE += 0.5 * bp.velocityB.lengthSq();
        }

        bp.sphereA.position.copy(posA);
        bp.sphereB.position.copy(posB);

        // Cylinder fade
        bp.cylinder.material.opacity = 1.0 - t;
        bp.cylinder.visible = bp.cylinder.material.opacity > 0.01;

        if (bp.separated || bp.separationProgress > 0) {
            separatedCount += 2;
            if (bp.separationProgress < 1 && !bp.separated) {
                // Rezipping, still count as separated until fully rezipped
                if (bp.separationProgress > 0) separatedCount -= 0; // already counted
            }
        }
    }

    // Recalculate separated spheres more accurately
    separatedCount = 0;
    for (const bp of basePairs) {
        if (bp.separationProgress > 0) {
            separatedCount += 2;
        }
    }

    // Slow rotation of helix
    helixGroup.rotation.y += delta * 0.15;

    // Update UI
    const progressPercent = (unzipLevel / TOTAL_BASE_PAIRS) * 100;
    document.getElementById('progress-bar').style.width = progressPercent + '%';
    document.getElementById('progress-text').textContent =
        `${unzipLevel} / ${TOTAL_BASE_PAIRS} base pairs unzipped (${progressPercent.toFixed(0)}%)`;

    // Debug overlay
    if (debugOverlayVisible) {
        document.getElementById('debug-content').innerHTML = `
            <div><span class="label">Unzip Level:</span><span class="value">${unzipLevel} / ${TOTAL_BASE_PAIRS}</span></div>
            <div><span class="label">Auto Unzip:</span><span class="value">${autoUnzip ? 'ON' : 'OFF'}</span></div>
            <div><span class="label">Kinetic Energy:</span><span class="value">${totalKE.toFixed(4)}</span></div>
            <div><span class="label">Separated Spheres:</span><span class="value">${separatedCount}</span></div>
            <div><span class="label">Lamp Light:</span><span class="value">${lampLightOn ? 'ON' : 'OFF'}</span></div>
            <div><span class="label">Elapsed Time:</span><span class="value">${elapsedTime.toFixed(1)}s</span></div>
            <div><span class="label">Lamp Loaded:</span><span class="value">${lampLoaded ? 'YES' : 'NO'}</span></div>
            <div><span class="label">Helix Radius:</span><span class="value">${HELIX_RADIUS}</span></div>
            <div><span class="label">Progress:</span><span class="value">${progressPercent.toFixed(1)}%</span></div>
        `;
    }

    // Update global state
    window.__3D_STATE__.sceneReady = firstFrameRendered;
    window.__3D_STATE__.unzipLevel = unzipLevel;
    window.__3D_STATE__.autoUnzip = autoUnzip;
    window.__3D_STATE__.debugOverlayVisible = debugOverlayVisible;
    window.__3D_STATE__.lampLoaded = lampLoaded;
    window.__3D_STATE__.lampLightOn = lampLightOn;
    window.__3D_STATE__.separatedSpheres = separatedCount;
    window.__3D_STATE__.totalKineticEnergy = totalKE;
    window.__3D_STATE__.elapsedTime = elapsedTime;
    window.__3D_STATE__.progressPercent = progressPercent;

    renderer.render(scene, camera);
    firstFrameRendered = true;
}

animate();
</script>
</body>
</html>
