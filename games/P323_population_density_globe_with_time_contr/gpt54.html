<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Population Density Globe</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 12px;
      align-items: center;
      justify-content: center;
      min-width: 720px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      z-index: 10;
    }

    #hud button, #hud select, #hud input[type="range"] {
      background: rgba(255,255,255,0.08);
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 14px;
    }

    #hud button {
      cursor: pointer;
    }

    #hud button:hover, #hud select:hover {
      background: rgba(255,255,255,0.14);
    }

    #hud .label {
      font-size: 14px;
      white-space: nowrap;
    }

    #timeSlider {
      width: 180px;
      padding: 0;
    }

    #tooltip {
      position: absolute;
      display: none;
      pointer-events: none;
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.15);
      font-size: 13px;
      white-space: nowrap;
      z-index: 20;
      transform: translate(12px, 12px);
    }

    @media (max-width: 820px) {
      #hud {
        min-width: auto;
        width: calc(100% - 24px);
      }
    }
  </style>
</head>
<body>
  <div id="tooltip"></div>

  <div id="hud">
    <button id="playPauseBtn">Play</button>
    <button id="prevBtn">Previous</button>
    <button id="nextBtn">Next</button>
    <input id="timeSlider" type="range" min="0" max="4" step="1" value="0" />
    <div class="label" id="yearLabel">Year: 1960</div>
    <div class="label">Speed:</div>
    <select id="speedSelect">
      <option value="4000">0.5x</option>
      <option value="2000" selected>1x</option>
      <option value="1000">2x</option>
    </select>
    <button id="rotateToggle">Auto-Rotate: On</button>
    <div class="label" id="totalDisplay">Total Population: 130</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    const YEARS = [1960, 1980, 2000, 2020, 2040];
    const GLOBE_RADIUS = 1;
    const BAR_RADIUS = 0.03;

    const regions = [
      { name: "North America", lat: 40, lon: -100, densities: [15, 18, 22, 28, 35] },
      { name: "Europe", lat: 50, lon: 10, densities: [45, 55, 68, 72, 75] },
      { name: "Asia", lat: 35, lon: 105, densities: [50, 70, 100, 140, 150] },
      { name: "South America", lat: -15, lon: -60, densities: [10, 14, 20, 25, 30] },
      { name: "Africa", lat: 5, lon: 25, densities: [8, 12, 20, 35, 55] },
      { name: "Oceania", lat: -25, lon: 135, densities: [2, 3, 3, 4, 5] }
    ];

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 0, 3.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const globeGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
    const globeMaterial = new THREE.MeshPhongMaterial({
      color: 0x1a3a5c,
      shininess: 20
    });
    const globe = new THREE.Mesh(globeGeometry, globeMaterial);
    globeGroup.add(globe);

    const earthWireframe = new THREE.LineSegments(
      new THREE.WireframeGeometry(globeGeometry),
      new THREE.LineBasicMaterial({
        color: 0x3d78b3,
        transparent: true,
        opacity: 0.25
      })
    );
    globeGroup.add(earthWireframe);

    const gridGeometry = new THREE.SphereGeometry(1.005, 64, 64);
    const gridWire = new THREE.LineSegments(
      new THREE.WireframeGeometry(gridGeometry),
      new THREE.LineBasicMaterial({
        color: 0x2a5a8c,
        transparent: true,
        opacity: 0.3
      })
    );
    globeGroup.add(gridWire);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 2;
    controls.maxDistance = 8;

    let isDragging = false;
    controls.addEventListener("start", () => { isDragging = true; });
    controls.addEventListener("end", () => { isDragging = false; });

    function latLonToVector3(lat, lon, radius = GLOBE_RADIUS) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon + 180);

      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const z = radius * Math.sin(phi) * Math.sin(theta);
      const y = radius * Math.cos(phi);

      return new THREE.Vector3(x, y, z);
    }

    function getDensityColor(density) {
      const green = new THREE.Color(0x22c55e);
      const yellow = new THREE.Color(0xfacc15);
      const red = new THREE.Color(0xef4444);

      if (density < 20) {
        const t = THREE.MathUtils.clamp(density / 20, 0, 1);
        return green.clone().lerp(yellow, t * 0.5);
      } else if (density <= 60) {
        const t = THREE.MathUtils.clamp((density - 20) / 40, 0, 1);
        return green.clone().lerp(yellow, t);
      } else {
        const t = THREE.MathUtils.clamp((density - 60) / 90, 0, 1);
        return yellow.clone().lerp(red, t);
      }
    }

    const barGroup = new THREE.Group();
    globeGroup.add(barGroup);

    const barGeometry = new THREE.CylinderGeometry(BAR_RADIUS, BAR_RADIUS, 1, 12, 1, false);

    const bars = [];
    for (const region of regions) {
      const basePosition = latLonToVector3(region.lat, region.lon, GLOBE_RADIUS);
      const normal = basePosition.clone().normalize();

      const material = new THREE.MeshPhongMaterial({
        color: getDensityColor(region.densities[0]),
        emissive: 0x000000,
        shininess: 60
      });

      const bar = new THREE.Mesh(barGeometry, material);

      const q = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        normal
      );
      bar.quaternion.copy(q);

      const initialHeight = Math.max(0, region.densities[0] * 0.01);
      bar.scale.set(1, initialHeight, 1);

      const centerOffset = normal.clone().multiplyScalar(GLOBE_RADIUS + initialHeight / 2);
      bar.position.copy(centerOffset);

      bar.userData = {
        region: region.name,
        basePosition,
        normal,
        currentHeight: initialHeight,
        targetHeight: initialHeight,
        currentDensity: region.densities[0]
      };

      barGroup.add(bar);
      bars.push({ mesh: bar, data: region });
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let hoveredBar = null;

    const playPauseBtn = document.getElementById("playPauseBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const timeSlider = document.getElementById("timeSlider");
    const yearLabel = document.getElementById("yearLabel");
    const speedSelect = document.getElementById("speedSelect");
    const totalDisplay = document.getElementById("totalDisplay");
    const rotateToggle = document.getElementById("rotateToggle");
    const tooltip = document.getElementById("tooltip");

    let currentTimeIndex = 0;
    let isPlaying = false;
    let autoRotate = true;
    let playSpeed = parseInt(speedSelect.value, 10);
    let playTimer = null;

    function updateBarsForTime(index) {
      currentTimeIndex = THREE.MathUtils.clamp(index, 0, YEARS.length - 1);
      timeSlider.value = currentTimeIndex;
      yearLabel.textContent = `Year: ${YEARS[currentTimeIndex]}`;

      let total = 0;
      for (const item of bars) {
        const density = item.data.densities[currentTimeIndex];
        total += density;
        const targetHeight = Math.max(0, Number.isFinite(density * 0.01) ? density * 0.01 : 0);

        item.mesh.userData.targetHeight = targetHeight;
        item.mesh.userData.currentDensity = density;
        item.mesh.material.color.copy(getDensityColor(density));
      }

      totalDisplay.textContent = `Total Population: ${total}`;
    }

    function stopPlayback() {
      isPlaying = false;
      playPauseBtn.textContent = "Play";
      if (playTimer) {
        clearInterval(playTimer);
        playTimer = null;
      }
    }

    function startPlayback() {
      stopPlayback();
      isPlaying = true;
      playPauseBtn.textContent = "Pause";
      playTimer = setInterval(() => {
        const nextIndex = (currentTimeIndex + 1) % YEARS.length;
        updateBarsForTime(nextIndex);
      }, playSpeed);
    }

    playPauseBtn.addEventListener("click", () => {
      if (isPlaying) stopPlayback();
      else startPlayback();
    });

    prevBtn.addEventListener("click", () => {
      updateBarsForTime((currentTimeIndex - 1 + YEARS.length) % YEARS.length);
    });

    nextBtn.addEventListener("click", () => {
      updateBarsForTime((currentTimeIndex + 1) % YEARS.length);
    });

    timeSlider.addEventListener("input", (e) => {
      updateBarsForTime(parseInt(e.target.value, 10));
    });

    speedSelect.addEventListener("change", () => {
      playSpeed = parseInt(speedSelect.value, 10);
      if (isPlaying) startPlayback();
    });

    rotateToggle.addEventListener("click", () => {
      autoRotate = !autoRotate;
      rotateToggle.textContent = `Auto-Rotate: ${autoRotate ? "On" : "Off"}`;
    });

    function onPointerMove(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      tooltip.style.left = `${event.clientX}px`;
      tooltip.style.top = `${event.clientY}px`;
    }

    window.addEventListener("pointermove", onPointerMove);

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    window.__3D_STATE__ = {
      currentTimeIndex: 0,
      currentYear: YEARS[0],
      isPlaying: false,
      autoRotate: true,
      playSpeed,
      regionDensities: {},
      totalDensity: 0,
      barHeights: {},
      cameraDistance: camera.position.length(),
      hoveredRegion: null,
      globeRotationY: globeGroup.rotation.y
    };

    function updateHover() {
      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(bars.map(b => b.mesh), false);

      if (hoveredBar && (!intersects.length || intersects[0].object !== hoveredBar)) {
        hoveredBar.material.emissive.setHex(0x000000);
        hoveredBar = null;
      }

      if (intersects.length) {
        const bar = intersects[0].object;
        hoveredBar = bar;
        bar.material.emissive.setHex(0x333333);

        tooltip.style.display = "block";
        tooltip.textContent = `${bar.userData.region}: ${bar.userData.currentDensity}`;
      } else {
        tooltip.style.display = "none";
      }
    }

    function updateBarsAnimation() {
      for (const item of bars) {
        const mesh = item.mesh;
        const normal = mesh.userData.normal;
        const target = mesh.userData.targetHeight;

        let current = mesh.userData.currentHeight;
        current = THREE.MathUtils.lerp(current, target, 0.1);

        if (!Number.isFinite(current) || current < 0) current = 0;

        mesh.userData.currentHeight = current;
        mesh.scale.y = Math.max(0.0001, current);
        mesh.position.copy(
          normal.clone().multiplyScalar(GLOBE_RADIUS + current / 2)
        );
      }
    }

    function updateState() {
      const regionDensities = {};
      const barHeights = {};
      let totalDensity = 0;

      for (const item of bars) {
        const name = item.data.name;
        const density = item.data.densities[currentTimeIndex];
        const height = item.mesh.userData.currentHeight;

        regionDensities[name] = density;
        barHeights[name] = Number.isFinite(height) && height >= 0 ? height : 0;
        totalDensity += density;
      }

      const cameraDistance = THREE.MathUtils.clamp(camera.position.length(), 2, 8);

      window.__3D_STATE__.currentTimeIndex = currentTimeIndex;
      window.__3D_STATE__.currentYear = YEARS[currentTimeIndex];
      window.__3D_STATE__.isPlaying = isPlaying;
      window.__3D_STATE__.autoRotate = autoRotate;
      window.__3D_STATE__.playSpeed = playSpeed;
      window.__3D_STATE__.regionDensities = regionDensities;
      window.__3D_STATE__.totalDensity = totalDensity;
      window.__3D_STATE__.barHeights = barHeights;
      window.__3D_STATE__.cameraDistance = cameraDistance;
      window.__3D_STATE__.hoveredRegion = hoveredBar ? hoveredBar.userData.region : null;
      window.__3D_STATE__.globeRotationY = Number.isFinite(globeGroup.rotation.y) ? globeGroup.rotation.y : 0;
    }

    updateBarsForTime(0);

    function animate() {
      requestAnimationFrame(animate);

      controls.update();

      if (autoRotate && !isDragging) {
        globeGroup.rotation.y += 0.002;
        if (!Number.isFinite(globeGroup.rotation.y)) globeGroup.rotation.y = 0;
      }

      updateBarsAnimation();
      updateHover();
      updateState();

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
