<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Population Density Globe</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .controls-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }
        input[type=range] {
            width: 200px;
            cursor: pointer;
        }
        select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 5px;
            border-radius: 5px;
            cursor: pointer;
        }
        select option {
            background: #0a0a1a;
            color: white;
        }
        #yearLabel {
            font-size: 1.2em;
            font-weight: bold;
            min-width: 100px;
            text-align: center;
        }
        #top-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }
        #totalDisplay {
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            backdrop-filter: blur(5px);
        }
        #rotateToggle {
            align-self: flex-start;
        }
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
            font-size: 0.9em;
            transform: translate(-50%, -120%);
            white-space: nowrap;
        }
        .tooltip-title {
            font-weight: bold;
            margin-bottom: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 3px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="top-panel">
        <div id="totalDisplay">Total Population: 0</div>
        <button id="rotateToggle">Auto-Rotate: ON</button>
    </div>

    <div id="ui-panel">
        <div class="controls-row">
            <button id="prevBtn">|&lt; Prev</button>
            <button id="playPauseBtn">Play</button>
            <button id="nextBtn">Next &gt;|</button>
            <select id="speedSelect">
                <option value="4000">0.5x Speed</option>
                <option value="2000" selected>1x Speed</option>
                <option value="1000">2x Speed</option>
            </select>
        </div>
        <div class="controls-row">
            <span style="font-size: 0.9em;">1960</span>
            <input type="range" id="timeSlider" min="0" max="4" step="1" value="0">
            <span style="font-size: 0.9em;">2040</span>
        </div>
        <div id="yearLabel">Year: 1960</div>
    </div>

    <div id="tooltip">
        <div class="tooltip-title" id="tt-region">Region</div>
        <div id="tt-density">Density: 0</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Data Definition ---
        const years = [1960, 1980, 2000, 2020, 2040];
        const regionsData = [
            { name: 'North America', lat: 40, lon: -100, densities: [15, 18, 22, 28, 35] },
            { name: 'Europe', lat: 50, lon: 10, densities: [45, 55, 68, 72, 75] },
            { name: 'Asia', lat: 35, lon: 105, densities: [50, 70, 100, 140, 150] },
            { name: 'South America', lat: -15, lon: -60, densities: [10, 14, 20, 25, 30] },
            { name: 'Africa', lat: 5, lon: 25, densities: [8, 12, 20, 35, 55] },
            { name: 'Oceania', lat: -25, lon: 135, densities: [2, 3, 3, 4, 5] }
        ];

        // --- State Management ---
        window.__3D_STATE__ = {
            currentTimeIndex: 0,
            currentYear: years[0],
            isPlaying: false,
            autoRotate: true,
            playSpeed: 2000,
            regionDensities: {},
            totalDensity: 0,
            barHeights: {},
            cameraDistance: 3.5,
            hoveredRegion: null,
            globeRotationY: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 0, 3.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 3, 5);
        scene.add(directionalLight);

        // Globe Group (holds earth, grid, and bars)
        const globeGroup = new THREE.Group();
        scene.add(globeGroup);

        // Earth Sphere
        const earthGeo = new THREE.SphereGeometry(1, 64, 64);
        const earthMat = new THREE.MeshPhongMaterial({
            color: 0x1a3a5c,
            emissive: 0x05101a,
            shininess: 15
        });
        const earth = new THREE.Mesh(earthGeo, earthMat);
        globeGroup.add(earth);

        // Grid Sphere
        const gridGeo = new THREE.SphereGeometry(1.005, 32, 32);
        const gridMat = new THREE.MeshBasicMaterial({
            color: 0x2a5a8c,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const grid = new THREE.Mesh(gridGeo, gridMat);
        globeGroup.add(grid);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 2;
        controls.maxDistance = 8;
        controls.enablePan = false;

        let isDragging = false;
        controls.addEventListener('start', () => isDragging = true);
        controls.addEventListener('end', () => isDragging = false);

        // --- Population Bars ---
        const barMeshes = [];
        const barGeometry = new THREE.CylinderGeometry(0.015, 0.015, 1, 8);
        // Translate geometry so origin is at the bottom, then rotate to align with Z axis for lookAt
        barGeometry.translate(0, 0.5, 0);
        barGeometry.rotateX(Math.PI / 2);

        // Helper: Lat/Lon to Vector3
        function getPositionFromLatLon(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        // Helper: Get Color based on density
        const colorLow = new THREE.Color(0x4caf50); // Green
        const colorMid = new THREE.Color(0xffeb3b); // Yellow
        const colorHigh = new THREE.Color(0xf44336); // Red

        function getDensityColor(density) {
            const c = new THREE.Color();
            if (density < 20) {
                c.lerpColors(colorLow, colorMid, Math.max(0, density / 20));
            } else if (density < 60) {
                c.lerpColors(colorMid, colorHigh, Math.max(0, (density - 20) / 40));
            } else {
                c.copy(colorHigh);
            }
            return c;
        }

        // Create Bars
        regionsData.forEach((region, index) => {
            const material = new THREE.MeshPhongMaterial({ 
                color: 0xffffff,
                shininess: 30
            });
            const mesh = new THREE.Mesh(barGeometry, material);
            
            const pos = getPositionFromLatLon(region.lat, region.lon, 1.0);
            mesh.position.copy(pos);
            mesh.lookAt(new THREE.Vector3(0, 0, 0));
            
            // Store data in userData for animation and raycasting
            mesh.userData = {
                id: index,
                name: region.name,
                data: region.densities,
                currentHeight: 0.001 // Start small
            };
            
            globeGroup.add(mesh);
            barMeshes.push(mesh);
        });

        // --- UI & Interaction ---
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const timeSlider = document.getElementById('timeSlider');
        const yearLabel = document.getElementById('yearLabel');
        const speedSelect = document.getElementById('speedSelect');
        const rotateToggle = document.getElementById('rotateToggle');
        const totalDisplay = document.getElementById('totalDisplay');
        const tooltip = document.getElementById('tooltip');
        const ttRegion = document.getElementById('tt-region');
        const ttDensity = document.getElementById('tt-density');

        function updateUI() {
            timeSlider.value = window.__3D_STATE__.currentTimeIndex;
            window.__3D_STATE__.currentYear = years[window.__3D_STATE__.currentTimeIndex];
            yearLabel.innerText = `Year: ${window.__3D_STATE__.currentYear}`;
            playPauseBtn.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            rotateToggle.innerText = `Auto-Rotate: ${window.__3D_STATE__.autoRotate ? 'ON' : 'OFF'}`;
        }

        function setTimeIndex(index) {
            window.__3D_STATE__.currentTimeIndex = Math.max(0, Math.min(years.length - 1, index));
            updateUI();
        }

        playPauseBtn.addEventListener('click', () => {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            updateUI();
        });

        prevBtn.addEventListener('click', () => {
            setTimeIndex(window.__3D_STATE__.currentTimeIndex - 1);
        });

        nextBtn.addEventListener('click', () => {
            setTimeIndex(window.__3D_STATE__.currentTimeIndex + 1);
        });

        timeSlider.addEventListener('input', (e) => {
            setTimeIndex(parseInt(e.target.value));
        });

        speedSelect.addEventListener('change', (e) => {
            window.__3D_STATE__.playSpeed = parseInt(e.target.value);
        });

        rotateToggle.addEventListener('click', () => {
            window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
            updateUI();
        });

        // Raycaster for Hover
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredMesh = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            tooltip.style.left = event.clientX + 'px';
            tooltip.style.top = event.clientY + 'px';
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        let lastTimeChange = 0;
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime() * 1000;
            const state = window.__3D_STATE__;

            // Auto Play Logic
            if (state.isPlaying) {
                if (time - lastTimeChange > state.playSpeed) {
                    state.currentTimeIndex = (state.currentTimeIndex + 1) % years.length;
                    updateUI();
                    lastTimeChange = time;
                }
            } else {
                lastTimeChange = time; // Keep synced when paused
            }

            // Auto Rotate
            if (state.autoRotate && !isDragging) {
                globeGroup.rotation.y += 0.002;
                // Keep rotation finite
                if (globeGroup.rotation.y > Math.PI * 2) globeGroup.rotation.y -= Math.PI * 2;
            }

            // Update Bars (Lerp)
            let currentTotalDensity = 0;
            
            barMeshes.forEach(mesh => {
                const targetDensity = mesh.userData.data[state.currentTimeIndex];
                const targetHeight = targetDensity * 0.01;
                
                // Lerp height
                mesh.userData.currentHeight += (targetHeight - mesh.userData.currentHeight) * 0.1;
                
                // Ensure non-negative, finite height
                let safeHeight = mesh.userData.currentHeight;
                if (isNaN(safeHeight) || safeHeight < 0.001) safeHeight = 0.001;
                
                mesh.scale.z = safeHeight;

                // Update Color based on current interpolated density
                const currentDensity = safeHeight * 100;
                mesh.material.color.copy(getDensityColor(currentDensity));

                // Update State
                state.regionDensities[mesh.userData.name] = currentDensity;
                state.barHeights[mesh.userData.name] = safeHeight;
                currentTotalDensity += currentDensity;
            });

            state.totalDensity = currentTotalDensity;
            totalDisplay.innerText = `Total Population Index: ${Math.round(currentTotalDensity)}`;

            // Raycasting
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(barMeshes);

            if (intersects.length > 0) {
                const object = intersects[0].object;
                if (hoveredMesh !== object) {
                    if (hoveredMesh) hoveredMesh.material.emissive.setHex(0x000000);
                    hoveredMesh = object;
                    hoveredMesh.material.emissive.copy(hoveredMesh.material.color).multiplyScalar(0.5);
                    
                    state.hoveredRegion = hoveredMesh.userData.name;
                    ttRegion.innerText = hoveredMesh.userData.name;
                    tooltip.style.opacity = 1;
                }
                // Update tooltip value continuously while hovering
                ttDensity.innerText = `Density: ${Math.round(hoveredMesh.userData.currentHeight * 100)}`;
            } else {
                if (hoveredMesh) {
                    hoveredMesh.material.emissive.setHex(0x000000);
                    hoveredMesh = null;
                    state.hoveredRegion = null;
                    tooltip.style.opacity = 0;
                }
            }

            // Update remaining state
            controls.update();
            state.cameraDistance = camera.position.distanceTo(controls.target);
            state.globeRotationY = globeGroup.rotation.y;

            renderer.render(scene, camera);
        }

        // Initialize UI and start
        updateUI();
        animate();

    </script>
</body>
</html>
