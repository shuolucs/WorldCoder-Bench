<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Population Density Globe</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 30, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.3);
    border-radius: 12px;
    padding: 16px 24px;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    backdrop-filter: blur(10px);
    z-index: 100;
    min-width: 420px;
}

#yearLabel {
    font-size: 22px;
    font-weight: bold;
    color: #88ccff;
    letter-spacing: 1px;
}

#totalDisplay {
    font-size: 14px;
    color: #aaddff;
}

.controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

button {
    background: rgba(50, 100, 200, 0.4);
    border: 1px solid rgba(100, 150, 255, 0.4);
    color: white;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
}

button:hover {
    background: rgba(70, 130, 255, 0.6);
    border-color: rgba(130, 180, 255, 0.7);
}

button.active {
    background: rgba(70, 130, 255, 0.7);
    border-color: rgba(150, 200, 255, 0.8);
}

#timeSlider {
    width: 200px;
    accent-color: #4488ff;
    cursor: pointer;
}

select {
    background: rgba(50, 100, 200, 0.4);
    border: 1px solid rgba(100, 150, 255, 0.4);
    color: white;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
}

select option {
    background: #1a1a3a;
    color: white;
}

#tooltip {
    position: fixed;
    background: rgba(10, 10, 40, 0.92);
    border: 1px solid rgba(100, 150, 255, 0.5);
    border-radius: 8px;
    padding: 10px 14px;
    color: white;
    font-size: 13px;
    pointer-events: none;
    display: none;
    z-index: 200;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

#tooltip .region-name {
    font-weight: bold;
    font-size: 15px;
    color: #88ccff;
    margin-bottom: 4px;
}

#tooltip .density-value {
    color: #ccddff;
}

.speed-label {
    font-size: 12px;
    color: #8899bb;
}
</style>
</head>
<body>

<div id="tooltip">
    <div class="region-name"></div>
    <div class="density-value"></div>
</div>

<div id="hud">
    <div id="yearLabel">Year: 1960</div>
    <div id="totalDisplay">Total Density: 0</div>
    <div class="controls-row">
        <button id="prevBtn">◀ Prev</button>
        <button id="playPauseBtn">▶ Play</button>
        <button id="nextBtn">Next ▶</button>
    </div>
    <div class="controls-row">
        <input type="range" id="timeSlider" min="0" max="4" step="1" value="0">
    </div>
    <div class="controls-row">
        <span class="speed-label">Speed:</span>
        <select id="speedSelect">
            <option value="4000">0.5x</option>
            <option value="2000" selected>1x</option>
            <option value="1000">2x</option>
        </select>
        <button id="rotateToggle" class="active">🌍 Auto-Rotate</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// OrbitControls inline (minimal implementation)
THREE.OrbitControls = function(camera, domElement) {
    this.camera = camera;
    this.domElement = domElement;
    this.target = new THREE.Vector3();
    this.enableDamping = true;
    this.dampingFactor = 0.05;
    this.rotateSpeed = 0.8;
    this.zoomSpeed = 1.0;
    this.minDistance = 2;
    this.maxDistance = 8;
    this.enabled = true;

    let spherical = new THREE.Spherical();
    let sphericalDelta = new THREE.Spherical();
    let scale = 1;
    let rotateStart = new THREE.Vector2();
    let rotateEnd = new THREE.Vector2();
    let rotateDelta = new THREE.Vector2();
    let isMouseDown = false;
    let EPS = 0.000001;

    let offset = new THREE.Vector3();
    spherical.setFromVector3(camera.position.clone().sub(this.target));

    this.isDragging = false;

    const onMouseDown = (e) => {
        if (!this.enabled) return;
        isMouseDown = true;
        this.isDragging = true;
        rotateStart.set(e.clientX, e.clientY);
    };

    const onMouseMove = (e) => {
        if (!isMouseDown || !this.enabled) return;
        rotateEnd.set(e.clientX, e.clientY);
        rotateDelta.subVectors(rotateEnd, rotateStart);
        sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientWidth * this.rotateSpeed;
        sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight * this.rotateSpeed;
        rotateStart.copy(rotateEnd);
    };

    const onMouseUp = () => {
        isMouseDown = false;
        setTimeout(() => { this.isDragging = false; }, 100);
    };

    const onWheel = (e) => {
        if (!this.enabled) return;
        if (e.deltaY > 0) scale *= 1.05;
        else scale *= 0.95;
    };

    const onTouchStart = (e) => {
        if (!this.enabled || e.touches.length !== 1) return;
        isMouseDown = true;
        this.isDragging = true;
        rotateStart.set(e.touches[0].clientX, e.touches[0].clientY);
    };

    const onTouchMove = (e) => {
        if (!isMouseDown || !this.enabled || e.touches.length !== 1) return;
        rotateEnd.set(e.touches[0].clientX, e.touches[0].clientY);
        rotateDelta.subVectors(rotateEnd, rotateStart);
        sphericalDelta.theta -= 2 * Math.PI * rotateDelta.x / domElement.clientWidth * this.rotateSpeed;
        sphericalDelta.phi -= 2 * Math.PI * rotateDelta.y / domElement.clientHeight * this.rotateSpeed;
        rotateStart.copy(rotateEnd);
    };

    const onTouchEnd = () => {
        isMouseDown = false;
        setTimeout(() => { this.isDragging = false; }, 100);
    };

    domElement.addEventListener('mousedown', onMouseDown);
    domElement.addEventListener('mousemove', onMouseMove);
    domElement.addEventListener('mouseup', onMouseUp);
    domElement.addEventListener('mouseleave', onMouseUp);
    domElement.addEventListener('wheel', onWheel);
    domElement.addEventListener('touchstart', onTouchStart, { passive: true });
    domElement.addEventListener('touchmove', onTouchMove, { passive: true });
    domElement.addEventListener('touchend', onTouchEnd);

    this.update = function() {
        offset.copy(camera.position).sub(this.target);
        spherical.setFromVector3(offset);

        if (this.enableDamping) {
            spherical.theta += sphericalDelta.theta * this.dampingFactor;
            spherical.phi += sphericalDelta.phi * this.dampingFactor;
        } else {
            spherical.theta += sphericalDelta.theta;
            spherical.phi += sphericalDelta.phi;
        }

        spherical.phi = Math.max(EPS, Math.min(Math.PI - EPS, spherical.phi));
        spherical.radius *= scale;
        spherical.radius = Math.max(this.minDistance, Math.min(this.maxDistance, spherical.radius));

        offset.setFromSpherical(spherical);
        camera.position.copy(this.target).add(offset);
        camera.lookAt(this.target);

        if (this.enableDamping) {
            sphericalDelta.theta *= (1 - this.dampingFactor);
            sphericalDelta.phi *= (1 - this.dampingFactor);
        } else {
            sphericalDelta.set(0, 0, 0);
        }
        scale = 1;
    };

    this.dispose = function() {
        domElement.removeEventListener('mousedown', onMouseDown);
        domElement.removeEventListener('mousemove', onMouseMove);
        domElement.removeEventListener('mouseup', onMouseUp);
        domElement.removeEventListener('mouseleave', onMouseUp);
        domElement.removeEventListener('wheel', onWheel);
        domElement.removeEventListener('touchstart', onTouchStart);
        domElement.removeEventListener('touchmove', onTouchMove);
        domElement.removeEventListener('touchend', onTouchEnd);
    };
};

// Main application
(function() {
    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0, 3.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 3, 5);
    scene.add(directionalLight);

    // Globe group
    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    // Earth sphere
    const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
        color: 0x1a3a5c,
        shininess: 30,
        transparent: true,
        opacity: 0.95
    });
    const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
    globeGroup.add(earthMesh);

    // Wireframe overlay
    const wireGeometry = new THREE.SphereGeometry(1.005, 36, 18);
    const wireMaterial = new THREE.MeshBasicMaterial({
        color: 0x2a5a8c,
        wireframe: true,
        transparent: true,
        opacity: 0.3
    });
    const wireMesh = new THREE.Mesh(wireGeometry, wireMaterial);
    globeGroup.add(wireMesh);

    // Add subtle atmosphere glow
    const atmosphereGeometry = new THREE.SphereGeometry(1.08, 64, 64);
    const atmosphereMaterial = new THREE.MeshBasicMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.05,
        side: THREE.BackSide
    });
    const atmosphereMesh = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
    globeGroup.add(atmosphereMesh);

    // OrbitControls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2;
    controls.maxDistance = 8;

    // Population data
    const decades = [1960, 1980, 2000, 2020, 2040];
    const regions = [
        { name: 'North America', lat: 40, lon: -100, densities: [15, 18, 22, 28, 35] },
        { name: 'Europe', lat: 50, lon: 10, densities: [45, 55, 68, 72, 75] },
        { name: 'Asia', lat: 35, lon: 105, densities: [50, 70, 100, 140, 150] },
        { name: 'South America', lat: -15, lon: -60, densities: [10, 14, 20, 25, 30] },
        { name: 'Africa', lat: 5, lon: 25, densities: [8, 12, 20, 35, 55] },
        { name: 'Oceania', lat: -25, lon: 135, densities: [2, 3, 3, 4, 5] }
    ];

    // Convert lat/lon to 3D position
    function latLonToVector3(lat, lon, radius) {
        const phi = (90 - lat) * (Math.PI / 180);
        const theta = (lon + 180) * (Math.PI / 180);
        const x = -radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.cos(phi);
        const z = radius * Math.sin(phi) * Math.sin(theta);
        return new THREE.Vector3(x, y, z);
    }

    // Get color based on density
    function getDensityColor(density) {
        if (density < 20) {
            const t = density / 20;
            return new THREE.Color().setHSL(0.33 - t * 0.15, 0.9, 0.4 + t * 0.1);
        } else if (density <= 60) {
            const t = (density - 20) / 40;
            return new THREE.Color().setHSL(0.18 - t * 0.12, 0.9, 0.5);
        } else {
            const t = Math.min((density - 60) / 90, 1);
            return new THREE.Color().setHSL(0.06 - t * 0.06, 0.9, 0.45 + t * 0.1);
        }
    }

    // Create bars for each region
    const bars = [];
    const barMeshes = [];

    regions.forEach((region, index) => {
        const surfacePos = latLonToVector3(region.lat, region.lon, 1.0);
        const normal = surfacePos.clone().normalize();

        // Create bar geometry - using a cylinder
        const initialHeight = 0.01;
        const barGeometry = new THREE.CylinderGeometry(0.04, 0.04, 1, 12);
        barGeometry.translate(0, 0.5, 0); // pivot at bottom

        const color = getDensityColor(region.densities[0]);
        const barMaterial = new THREE.MeshPhongMaterial({
            color: color,
            emissive: new THREE.Color(0x000000),
            shininess: 60,
            transparent: true,
            opacity: 0.9
        });

        const barMesh = new THREE.Mesh(barGeometry, barMaterial);

        // Position on globe surface
        barMesh.position.copy(surfacePos);

        // Orient along normal
        const up = new THREE.Vector3(0, 1, 0);
        const quaternion = new THREE.Quaternion().setFromUnitVectors(up, normal);
        barMesh.quaternion.copy(quaternion);

        barMesh.scale.y = initialHeight;

        barMesh.userData = {
            regionIndex: index,
            regionName: region.name,
            normal: normal,
            currentHeight: initialHeight,
            targetHeight: region.densities[0] * 0.01
        };

        globeGroup.add(barMesh);
        barMeshes.push(barMesh);

        // Add a small glowing base indicator
        const baseGeometry = new THREE.SphereGeometry(0.05, 16, 16);
        const baseMaterial = new THREE.MeshBasicMaterial({
            color: color,
            transparent: true,
            opacity: 0.8
        });
        const baseMesh = new THREE.Mesh(baseGeometry, baseMaterial);
        baseMesh.position.copy(surfacePos);
        globeGroup.add(baseMesh);

        bars.push({
            mesh: barMesh,
            baseMesh: baseMesh,
            region: region,
            currentHeight: initialHeight,
            targetHeight: region.densities[0] * 0.01
        });
    });

    // Add small star particles in background
    const starsGeometry = new THREE.BufferGeometry();
    const starsCount = 2000;
    const starsPositions = new Float32Array(starsCount * 3);
    for (let i = 0; i < starsCount; i++) {
        starsPositions[i * 3] = (Math.random() - 0.5) * 50;
        starsPositions[i * 3 + 1] = (Math.random() - 0.5) * 50;
        starsPositions[i * 3 + 2] = (Math.random() - 0.5) * 50;
    }
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
    const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6 });
    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // State
    let currentTimeIndex = 0;
    let isPlaying = false;
    let autoRotate = true;
    let playSpeed = 2000;
    let playInterval = null;
    let hoveredRegion = null;
    let globeRotationY = 0;

    // UI Elements
    const yearLabel = document.getElementById('yearLabel');
    const totalDisplay = document.getElementById('totalDisplay');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const timeSlider = document.getElementById('timeSlider');
    const speedSelect = document.getElementById('speedSelect');
    const rotateToggle = document.getElementById('rotateToggle');
    const tooltip = document.getElementById('tooltip');

    // State object
    window.__3D_STATE__ = {
        currentTimeIndex: 0,
        currentYear: 1960,
        isPlaying: false,
        autoRotate: true,
        playSpeed: 2000,
        regionDensities: {},
        totalDensity: 0,
        barHeights: {},
        cameraDistance: 3.5,
        hoveredRegion: null,
        globeRotationY: 0
    };

    function updateTimeStep(index) {
        currentTimeIndex = Math.max(0, Math.min(4, index));
        timeSlider.value = currentTimeIndex;
        yearLabel.textContent = 'Year: ' + decades[currentTimeIndex];

        let total = 0;
        bars.forEach(bar => {
            const density = bar.region.densities[currentTimeIndex];
            bar.targetHeight = Math.max(0.01, density * 0.01);
            total += density;

            // Update color
            const color = getDensityColor(density);
            bar.mesh.material.color.copy(color);
            bar.baseMesh.material.color.copy(color);
        });

        totalDisplay.textContent = 'Total Density: ' + total;
    }

    function startPlayback() {
        isPlaying = true;
        playPauseBtn.textContent = '⏸ Pause';
        playPauseBtn.classList.add('active');
        clearInterval(playInterval);
        playInterval = setInterval(() => {
            if (currentTimeIndex < 4) {
                updateTimeStep(currentTimeIndex + 1);
            } else {
                updateTimeStep(0);
            }
        }, playSpeed);
    }

    function stopPlayback() {
        isPlaying = false;
        playPauseBtn.textContent = '▶ Play';
        playPauseBtn.classList.remove('active');
        clearInterval(playInterval);
    }

    playPauseBtn.addEventListener('click', () => {
        if (isPlaying) stopPlayback();
        else startPlayback();
    });

    prevBtn.addEventListener('click', () => {
        stopPlayback();
        updateTimeStep(currentTimeIndex - 1);
    });

    nextBtn.addEventListener('click', () => {
        stopPlayback();
        updateTimeStep(currentTimeIndex + 1);
    });

    timeSlider.addEventListener('input', (e) => {
        stopPlayback();
        updateTimeStep(parseInt(e.target.value));
    });

    speedSelect.addEventListener('change', (e) => {
        playSpeed = parseInt(e.target.value);
        if (isPlaying) {
            clearInterval(playInterval);
            playInterval = setInterval(() => {
                if (currentTimeIndex < 4) {
                    updateTimeStep(currentTimeIndex + 1);
                } else {
                    updateTimeStep(0);
                }
            }, playSpeed);
        }
    });

    rotateToggle.addEventListener('click', () => {
        autoRotate = !autoRotate;
        rotateToggle.classList.toggle('active', autoRotate);
        rotateToggle.textContent = autoRotate ? '🌍 Auto-Rotate' : '🌍 Rotation Off';
    });

    // Raycaster for hover
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let mouseX = 0, mouseY = 0;

    renderer.domElement.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    // Handle resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Initialize
    updateTimeStep(0);

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);

        // Auto-rotate
        if (autoRotate && !controls.isDragging) {
            globeRotationY += 0.002;
            globeGroup.rotation.y = globeRotationY;
        } else {
            globeRotationY = globeGroup.rotation.y;
        }

        // Ensure no NaN
        if (isNaN(globeRotationY)) globeRotationY = 0;
        if (isNaN(globeGroup.rotation.y)) globeGroup.rotation.y = 0;

        // Lerp bar heights
        bars.forEach(bar => {
            const target = bar.targetHeight;
            const current = bar.currentHeight;
            if (isNaN(current) || !isFinite(current)) bar.currentHeight = 0.01;
            if (isNaN(target) || !isFinite(target)) bar.targetHeight = 0.01;

            bar.currentHeight += (bar.targetHeight - bar.currentHeight) * 0.1;
            bar.currentHeight = Math.max(0.001, bar.currentHeight);
            bar.mesh.scale.y = bar.currentHeight;
            bar.mesh.userData.currentHeight = bar.currentHeight;
        });

        // Raycasting for hover
        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(barMeshes);

        let newHovered = null;

        // Reset all emissive
        barMeshes.forEach(m => {
            m.material.emissive.setHex(0x000000);
        });

        if (intersects.length > 0) {
            const hit = intersects[0].object;
            const regionName = hit.userData.regionName;
            const regionIndex = hit.userData.regionIndex;
            newHovered = regionName;

            hit.material.emissive.setHex(0x333333);

            const density = regions[regionIndex].densities[currentTimeIndex];
            tooltip.style.display = 'block';
            tooltip.style.left = (mouseX + 15) + 'px';
            tooltip.style.top = (mouseY - 50) + 'px';
            tooltip.querySelector('.region-name').textContent = regionName;
            tooltip.querySelector('.density-value').textContent = 'Density: ' + density + ' (Year: ' + decades[currentTimeIndex] + ')';
        } else {
            tooltip.style.display = 'none';
        }

        hoveredRegion = newHovered;

        // Update controls
        controls.update();

        // Camera distance
        const camDist = camera.position.length();

        // Update state
        const regionDensities = {};
        const barHeights = {};
        let totalDensity = 0;
        regions.forEach((r, i) => {
            const d = r.densities[currentTimeIndex];
            regionDensities[r.name] = d;
            barHeights[r.name] = bars[i].currentHeight;
            totalDensity += d;
        });

        window.__3D_STATE__.currentTimeIndex = currentTimeIndex;
        window.__3D_STATE__.currentYear = decades[currentTimeIndex];
        window.__3D_STATE__.isPlaying = isPlaying;
        window.__3D_STATE__.autoRotate = autoRotate;
        window.__3D_STATE__.playSpeed = playSpeed;
        window.__3D_STATE__.regionDensities = regionDensities;
        window.__3D_STATE__.totalDensity = totalDensity;
        window.__3D_STATE__.barHeights = barHeights;
        window.__3D_STATE__.cameraDistance = camDist;
        window.__3D_STATE__.hoveredRegion = hoveredRegion;
        window.__3D_STATE__.globeRotationY = globeRotationY;

        renderer.render(scene, camera);
    }

    animate();
})();
</script>
</body>
</html>
