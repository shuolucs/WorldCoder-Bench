<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Kitchen Cabinet Planner</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #222;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }

    #statusBar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      z-index: 10;
    }

    #cabinetPanel {
      position: absolute;
      top: 60px;
      right: 12px;
      width: 240px;
      background: rgba(255,255,255,0.95);
      color: #222;
      padding: 14px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
      z-index: 10;
      display: none;
    }

    #cabinetPanel h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
    }

    #cabinetPanel .row {
      margin-bottom: 10px;
    }

    #cabinetPanel label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
    }

    #cabinetPanel input,
    #cabinetPanel button {
      width: 100%;
      box-sizing: border-box;
    }

    #cabinetPanel button {
      padding: 8px;
      margin-top: 4px;
      border: none;
      border-radius: 6px;
      background: #333;
      color: white;
      cursor: pointer;
    }

    #cabinetPanel button:hover {
      background: #555;
    }

    #cabinetName {
      font-weight: bold;
      color: #444;
    }

    .hint {
      position: absolute;
      top: 12px;
      right: 270px;
      z-index: 10;
      background: rgba(0,0,0,0.65);
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">Cabinets: 0 | Selected: None</div>

    <div class="hint">
      Click cabinet to select<br>
      Arrows: move | R: rotate | A: add cabinet | H: toggle helmet<br>
      Shift + Drag: move selected cabinet
    </div>

    <div id="cabinetPanel">
      <h3>Cabinet Panel</h3>
      <div class="row">Name: <span id="cabinetName">None</span></div>

      <div class="row">
        <label for="colorPicker">Color</label>
        <input id="colorPicker" type="color" value="#8b6914" />
      </div>

      <div class="row">
        <button id="toggleDoor">Open/Close Door</button>
      </div>

      <div class="row">
        <button id="deleteCabinet">Delete Cabinet</button>
      </div>

      <div class="row">
        <label for="widthSlider">Width</label>
        <input id="widthSlider" type="range" min="1" max="4" step="0.5" value="2" />
      </div>
    </div>

    <div id="statusBar">Ready.</div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const hud = document.getElementById('hud');
    const statusBar = document.getElementById('statusBar');
    const cabinetPanel = document.getElementById('cabinetPanel');
    const cabinetNameEl = document.getElementById('cabinetName');
    const colorPicker = document.getElementById('colorPicker');
    const toggleDoorBtn = document.getElementById('toggleDoor');
    const deleteCabinetBtn = document.getElementById('deleteCabinet');
    const widthSlider = document.getElementById('widthSlider');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xcfc8bd);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    scene.add(dirLight);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: '#d4c4a8', side: THREE.DoubleSide })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    floor.name = 'floor';
    scene.add(floor);

    function createWall(width, height, color) {
      return new THREE.Mesh(
        new THREE.PlaneGeometry(width, height),
        new THREE.MeshStandardMaterial({ color, side: THREE.DoubleSide })
      );
    }

    const backWall = createWall(20, 6, '#f0ece4');
    backWall.position.set(0, 3, -5);
    scene.add(backWall);

    const leftWall = createWall(10, 6, '#ede8df');
    leftWall.rotation.y = Math.PI / 2;
    leftWall.position.set(-10, 3, 0);
    scene.add(leftWall);

    const rightWall = createWall(10, 6, '#ede8df');
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.position.set(10, 3, 0);
    scene.add(rightWall);

    const cabinets = [];
    const cabinetMap = {};
    const doorAnimations = {};
    let selectedCabinet = null;
    let decorHelmet = null;
    let cabinetIndex = 4;
    let isDragging = false;
    let dragPlane = new THREE.Plane();
    let dragIntersect = new THREE.Vector3();
    let dragOffset = new THREE.Vector3();
    let pointerDownMoved = false;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      cabinetCount: 0,
      selectedCabinet: null,
      doorStates: {},
      cabinetPositions: {},
      cabinetColors: {},
      cabinetWidths: {},
      helmetVisible: true,
      helmetPosition: { x: 3, y: 2.6, z: -3.5 },
      totalBaseUnits: 0,
      totalWallUnits: 0,
      lastAction: 'Ready.'
    };

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function setLastAction(text) {
      window.__3D_STATE__.lastAction = text;
      statusBar.textContent = text;
    }

    function makeMaterial(color) {
      return new THREE.MeshStandardMaterial({
        color: new THREE.Color(color),
        emissive: new THREE.Color(0x000000),
        emissiveIntensity: 0
      });
    }

    function createCabinet(name, position, size, color, type = 'base') {
      const group = new THREE.Group();
      group.name = name;
      group.userData.isCabinet = true;
      group.userData.type = type;
      group.userData.dimensions = { width: size.x, height: size.y, depth: size.z };
      group.userData.color = color;
      group.userData.doorOpen = false;

      const bodyGeom = new THREE.BoxGeometry(size.x, size.y, size.z);
      const bodyMat = makeMaterial(color);
      const body = new THREE.Mesh(bodyGeom, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      body.name = name + '_body';
      body.userData.isCabinetPart = true;
      group.add(body);

      const doorThickness = Math.min(0.05, size.z * 0.25);
      const doorGeom = new THREE.BoxGeometry(size.x, size.y, doorThickness);
      const doorMat = makeMaterial(color);
      const doorPivot = new THREE.Group();
      doorPivot.name = name + '_doorPivot';
      doorPivot.position.set(-size.x / 2, 0, size.z / 2 + doorThickness / 2);

      const door = new THREE.Mesh(doorGeom, doorMat);
      door.castShadow = true;
      door.receiveShadow = true;
      door.position.set(size.x / 2, 0, 0);
      door.name = name + '_door';
      door.userData.isCabinetPart = true;
      door.userData.isDoor = true;
      doorPivot.add(door);

      group.add(doorPivot);
      group.userData.body = body;
      group.userData.doorPivot = doorPivot;
      group.userData.door = door;

      group.position.set(position.x, position.y, position.z);
      scene.add(group);

      cabinets.push(group);
      cabinetMap[name] = group;
      window.__3D_STATE__.doorStates[name] = 'closed';
      window.__3D_STATE__.cabinetColors[name] = normalizeHex(color);
      window.__3D_STATE__.cabinetWidths[name] = safeNum(size.x, 2);

      return group;
    }

    function normalizeHex(color) {
      return '#' + new THREE.Color(color).getHexString();
    }

    createCabinet('baseCabinet1', new THREE.Vector3(-4, 0.5, -4.5), new THREE.Vector3(2, 1, 0.6), '#8B6914', 'base');
    createCabinet('baseCabinet2', new THREE.Vector3(-1.5, 0.5, -4.5), new THREE.Vector3(2, 1, 0.6), '#8B6914', 'base');
    createCabinet('baseCabinet3', new THREE.Vector3(1, 0.5, -4.5), new THREE.Vector3(2, 1, 0.6), '#8B6914', 'base');
    createCabinet('wallCabinet1', new THREE.Vector3(-4, 3.5, -4.8), new THREE.Vector3(2, 1.2, 0.4), '#A0822A', 'wall');
    createCabinet('wallCabinet2', new THREE.Vector3(-1.5, 3.5, -4.8), new THREE.Vector3(2, 1.2, 0.4), '#A0822A', 'wall');

    const countertop = new THREE.Mesh(
      new THREE.BoxGeometry(8, 0.1, 0.7),
      new THREE.MeshStandardMaterial({ color: '#404040' })
    );
    countertop.position.set(-1, 1.05, -4.5);
    countertop.castShadow = true;
    countertop.receiveShadow = true;
    countertop.name = 'countertop';
    scene.add(countertop);

    const loader = new GLTFLoader();
    loader.load(
      'https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
      (gltf) => {
        decorHelmet = gltf.scene;
        decorHelmet.name = 'decorHelmet';
        decorHelmet.scale.set(0.3, 0.3, 0.3);
        decorHelmet.position.set(3, 2.6, -3.5);
        decorHelmet.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });
        scene.add(decorHelmet);
        setLastAction('Loaded decorative helmet.');
      },
      undefined,
      () => {
        setLastAction('Failed to load decorative helmet.');
      }
    );

    function getCabinetFromObject(obj) {
      let current = obj;
      while (current) {
        if (current.userData && current.userData.isCabinet) return current;
        current = current.parent;
      }
      return null;
    }

    function setCabinetHighlight(cabinet, active) {
      if (!cabinet) return;
      [cabinet.userData.body, cabinet.userData.door].forEach(mesh => {
        if (!mesh || !mesh.material) return;
        mesh.material.emissive.set(active ? '#ffcc00' : '#000000');
        mesh.material.emissiveIntensity = active ? 0.3 : 0;
      });
    }

    function selectCabinet(cabinet) {
      if (selectedCabinet === cabinet) return;
      if (selectedCabinet) setCabinetHighlight(selectedCabinet, false);
      selectedCabinet = cabinet;
      if (selectedCabinet) {
        setCabinetHighlight(selectedCabinet, true);
        cabinetPanel.style.display = 'block';
        cabinetNameEl.textContent = selectedCabinet.name;
        colorPicker.value = normalizeHex(selectedCabinet.userData.color);
        widthSlider.value = safeNum(selectedCabinet.userData.dimensions.width, 2);
        setLastAction(`Selected ${selectedCabinet.name}.`);
      } else {
        cabinetPanel.style.display = 'none';
        cabinetNameEl.textContent = 'None';
        setLastAction('Deselected cabinet.');
      }
    }

    function animateDoor(cabinet, open) {
      if (!cabinet) return;
      const target = open ? -Math.PI / 2 : 0;
      doorAnimations[cabinet.name] = {
        cabinet,
        start: safeNum(cabinet.userData.doorPivot.rotation.y, 0),
        end: target,
        elapsed: 0,
        duration: 0.5
      };
      cabinet.userData.doorOpen = open;
      window.__3D_STATE__.doorStates[cabinet.name] = open ? 'open' : 'closed';
      setLastAction(`${open ? 'Opened' : 'Closed'} door of ${cabinet.name}.`);
    }

    function updateDoorAnimations(delta) {
      for (const key in doorAnimations) {
        const anim = doorAnimations[key];
        anim.elapsed += delta;
        const t = Math.min(anim.elapsed / anim.duration, 1);
        const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        anim.cabinet.userData.doorPivot.rotation.y = THREE.MathUtils.lerp(anim.start, anim.end, eased);
        if (t >= 1) {
          anim.cabinet.userData.doorPivot.rotation.y = anim.end;
          delete doorAnimations[key];
        }
      }
    }

    function updateCabinetColor(cabinet, color) {
      if (!cabinet) return;
      cabinet.userData.color = color;
      [cabinet.userData.body, cabinet.userData.door].forEach(mesh => {
        if (mesh && mesh.material) {
          mesh.material.color.set(color);
        }
      });
      if (cabinet === selectedCabinet) setCabinetHighlight(cabinet, true);
      window.__3D_STATE__.cabinetColors[cabinet.name] = normalizeHex(color);
      setLastAction(`Changed color of ${cabinet.name}.`);
    }

    function rebuildCabinetGeometry(cabinet, newWidth) {
      if (!cabinet) return;
      const dims = cabinet.userData.dimensions;
      const { height, depth } = dims;
      const color = cabinet.userData.color;

      dims.width = newWidth;

      cabinet.remove(cabinet.userData.body);
      cabinet.remove(cabinet.userData.doorPivot);

      cabinet.userData.body.geometry.dispose();
      cabinet.userData.door.geometry.dispose();

      const bodyGeom = new THREE.BoxGeometry(newWidth, height, depth);
      const bodyMat = makeMaterial(color);
      const body = new THREE.Mesh(bodyGeom, bodyMat);
      body.castShadow = true;
      body.receiveShadow = true;
      body.name = cabinet.name + '_body';
      body.userData.isCabinetPart = true;
      cabinet.add(body);

      const doorThickness = Math.min(0.05, depth * 0.25);
      const doorGeom = new THREE.BoxGeometry(newWidth, height, doorThickness);
      const doorMat = makeMaterial(color);
      const doorPivot = new THREE.Group();
      doorPivot.name = cabinet.name + '_doorPivot';
      doorPivot.position.set(-newWidth / 2, 0, depth / 2 + doorThickness / 2);

      const door = new THREE.Mesh(doorGeom, doorMat);
      door.castShadow = true;
      door.receiveShadow = true;
      door.position.set(newWidth / 2, 0, 0);
      door.name = cabinet.name + '_door';
      door.userData.isCabinetPart = true;
      door.userData.isDoor = true;
      doorPivot.add(door);
      cabinet.add(doorPivot);

      cabinet.userData.body = body;
      cabinet.userData.door = door;
      cabinet.userData.doorPivot = doorPivot;
      cabinet.userData.doorPivot.rotation.y = cabinet.userData.doorOpen ? -Math.PI / 2 : 0;

      if (cabinet === selectedCabinet) setCabinetHighlight(cabinet, true);
      window.__3D_STATE__.cabinetWidths[cabinet.name] = safeNum(newWidth, 2);
      setLastAction(`Resized ${cabinet.name} to width ${newWidth}.`);
    }

    function removeCabinet(cabinet) {
      if (!cabinet) return;
      const idx = cabinets.indexOf(cabinet);
      if (idx >= 0) cabinets.splice(idx, 1);
      delete cabinetMap[cabinet.name];
      delete doorAnimations[cabinet.name];
      delete window.__3D_STATE__.doorStates[cabinet.name];
      delete window.__3D_STATE__.cabinetColors[cabinet.name];
      delete window.__3D_STATE__.cabinetWidths[cabinet.name];
      delete window.__3D_STATE__.cabinetPositions[cabinet.name];

      scene.remove(cabinet);
      setLastAction(`Deleted ${cabinet.name}.`);
      if (selectedCabinet === cabinet) selectCabinet(null);
    }

    function snap(v) {
      return Math.round(safeNum(v, 0) * 2) / 2;
    }

    function updateHUD() {
      hud.textContent = `Cabinets: ${cabinets.length} | Selected: ${selectedCabinet ? selectedCabinet.name : 'None'}`;
    }

    function getIntersections(event, objects) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      return raycaster.intersectObjects(objects, true);
    }

    renderer.domElement.addEventListener('click', (event) => {
      if (pointerDownMoved) return;
      const intersections = getIntersections(event, cabinets);
      if (intersections.length > 0) {
        const cabinet = getCabinetFromObject(intersections[0].object);
        if (cabinet) selectCabinet(cabinet);
      } else {
        selectCabinet(null);
      }
    });

    renderer.domElement.addEventListener('pointerdown', (event) => {
      pointerDownMoved = false;
      if (!event.shiftKey || !selectedCabinet) return;

      const intersections = getIntersections(event, [selectedCabinet]);
      if (intersections.length > 0) {
        isDragging = true;
        const y = safeNum(selectedCabinet.position.y, 0.5);
        dragPlane.set(new THREE.Vector3(0, 1, 0), -y);
        raycaster.ray.intersectPlane(dragPlane, dragIntersect);
        dragOffset.copy(selectedCabinet.position).sub(dragIntersect);
        setLastAction(`Dragging ${selectedCabinet.name}.`);
      }
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!isDragging || !selectedCabinet) return;
      pointerDownMoved = true;

      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);

      const hit = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(dragPlane, hit)) {
        const newPos = hit.clone().add(dragOffset);
        selectedCabinet.position.x = snap(newPos.x);
        selectedCabinet.position.z = snap(newPos.z);
      }
    });

    renderer.domElement.addEventListener('pointerup', () => {
      if (isDragging && selectedCabinet) {
        setLastAction(`Moved ${selectedCabinet.name} by drag.`);
      }
      isDragging = false;
    });

    colorPicker.addEventListener('input', () => {
      if (!selectedCabinet) return;
      updateCabinetColor(selectedCabinet, colorPicker.value);
    });

    toggleDoorBtn.addEventListener('click', () => {
      if (!selectedCabinet) return;
      animateDoor(selectedCabinet, !selectedCabinet.userData.doorOpen);
    });

    deleteCabinetBtn.addEventListener('click', () => {
      if (!selectedCabinet) return;
      removeCabinet(selectedCabinet);
    });

    widthSlider.addEventListener('input', () => {
      if (!selectedCabinet) return;
      const width = safeNum(parseFloat(widthSlider.value), 2);
      rebuildCabinetGeometry(selectedCabinet, width);
    });

    window.addEventListener('keydown', (event) => {
      if (event.target && ['INPUT'].includes(event.target.tagName)) return;

      if (event.key.toLowerCase() === 'a') {
        const name = `baseCabinet${cabinetIndex++}`;
        const cab = createCabinet(name, new THREE.Vector3(0, 0.5, -2), new THREE.Vector3(2, 1, 0.6), '#8B6914', 'base');
        selectCabinet(cab);
        setLastAction(`Added ${name}.`);
        return;
      }

      if (event.key.toLowerCase() === 'h') {
        if (decorHelmet) {
          decorHelmet.visible = !decorHelmet.visible;
          setLastAction(`Helmet ${decorHelmet.visible ? 'shown' : 'hidden'}.`);
        }
        return;
      }

      if (!selectedCabinet) return;

      let moved = false;
      if (event.key === 'ArrowLeft') {
        selectedCabinet.position.x = snap(selectedCabinet.position.x - 0.5);
        moved = true;
      } else if (event.key === 'ArrowRight') {
        selectedCabinet.position.x = snap(selectedCabinet.position.x + 0.5);
        moved = true;
      } else if (event.key === 'ArrowUp') {
        selectedCabinet.position.z = snap(selectedCabinet.position.z - 0.5);
        moved = true;
      } else if (event.key === 'ArrowDown') {
        selectedCabinet.position.z = snap(selectedCabinet.position.z + 0.5);
        moved = true;
      } else if (event.key.toLowerCase() === 'r') {
        selectedCabinet.rotation.y = safeNum(selectedCabinet.rotation.y, 0) + Math.PI / 2;
        setLastAction(`Rotated ${selectedCabinet.name}.`);
      }

      if (moved) {
        setLastAction(`Moved ${selectedCabinet.name}.`);
      }
    });

    function updateState() {
      const state = window.__3D_STATE__;
      state.cabinetCount = cabinets.length;
      state.selectedCabinet = selectedCabinet ? selectedCabinet.name : null;
      state.helmetVisible = !!(decorHelmet ? decorHelmet.visible : true);
      state.helmetPosition = decorHelmet
        ? {
            x: safeNum(decorHelmet.position.x, 3),
            y: safeNum(decorHelmet.position.y, 2.6),
            z: safeNum(decorHelmet.position.z, -3.5)
          }
        : { x: 3, y: 2.6, z: -3.5 };

      state.cabinetPositions = {};
      state.totalBaseUnits = 0;
      state.totalWallUnits = 0;

      cabinets.forEach(cabinet => {
        state.cabinetPositions[cabinet.name] = {
          x: safeNum(cabinet.position.x, 0),
          y: safeNum(cabinet.position.y, 0),
          z: safeNum(cabinet.position.z, 0)
        };
        state.cabinetColors[cabinet.name] = normalizeHex(cabinet.userData.color);
        state.cabinetWidths[cabinet.name] = safeNum(cabinet.userData.dimensions.width, 2);
        state.doorStates[cabinet.name] = cabinet.userData.doorOpen ? 'open' : 'closed';

        if (cabinet.userData.type === 'base') state.totalBaseUnits++;
        if (cabinet.userData.type === 'wall') state.totalWallUnits++;
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = safeNum(clock.getDelta(), 0.016);

      updateDoorAnimations(delta);
      updateState();
      updateHUD();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateState();
    updateHUD();
    animate();
  </script>
</body>
</html>
