<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Kitchen Cabinet Planner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: Arial, sans-serif; background: #000; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 10;
    pointer-events: none;
}

#statusBar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.75);
    color: #ccc;
    padding: 8px 18px;
    font-size: 13px;
    z-index: 10;
    pointer-events: none;
}

#cabinetPanel {
    position: absolute;
    top: 60px;
    right: 15px;
    background: rgba(30,30,30,0.92);
    color: #eee;
    padding: 18px 22px;
    border-radius: 10px;
    width: 260px;
    display: none;
    z-index: 20;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}

#cabinetPanel h3 {
    margin-bottom: 12px;
    font-size: 16px;
    color: #ffcc00;
}

#cabinetPanel label {
    display: block;
    margin-top: 10px;
    margin-bottom: 4px;
    font-size: 13px;
    color: #aaa;
}

#cabinetPanel input[type="color"] {
    width: 50px;
    height: 30px;
    border: none;
    cursor: pointer;
    background: transparent;
}

#cabinetPanel input[type="range"] {
    width: 100%;
    margin-top: 4px;
}

#cabinetPanel button {
    display: block;
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: bold;
    transition: background 0.2s;
}

#toggleDoor {
    background: #4a90d9;
    color: #fff;
}
#toggleDoor:hover { background: #3a7bc8; }

#deleteCabinet {
    background: #d94a4a;
    color: #fff;
}
#deleteCabinet:hover { background: #c83a3a; }

#widthValue {
    color: #ffcc00;
    font-weight: bold;
}

.instructions {
    position: absolute;
    bottom: 40px;
    left: 10px;
    background: rgba(0,0,0,0.6);
    color: #999;
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 11px;
    line-height: 1.6;
    z-index: 10;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">Cabinets: 0 | Selected: None</div>
<div id="statusBar">Ready - Click a cabinet to select it</div>

<div id="cabinetPanel">
    <h3 id="cabinetName">Cabinet</h3>
    <label>Color:</label>
    <input type="color" id="colorPicker" value="#8B6914">
    <label>Width: <span id="widthValue">2</span></label>
    <input type="range" id="widthSlider" min="1" max="4" step="0.5" value="2">
    <button id="toggleDoor">Open/Close Door</button>
    <button id="deleteCabinet">Delete Cabinet</button>
</div>

<div class="instructions">
    Arrow Keys: Move selected | R: Rotate | A: Add cabinet | H: Toggle helmet<br>
    Shift+Drag: Move cabinet | Click: Select | Click empty: Deselect
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
    // ==================== STATE ====================
    const state = {
        cabinetCount: 0,
        selectedCabinet: null,
        doorStates: {},
        cabinetPositions: {},
        cabinetColors: {},
        cabinetWidths: {},
        helmetVisible: true,
        helmetPosition: { x: 3, y: 2.6, z: -3.5 },
        totalBaseUnits: 0,
        totalWallUnits: 0,
        lastAction: 'Initialized'
    };
    window.__3D_STATE__ = state;

    // ==================== SCENE SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x2a2a2a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 10);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 7);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 50;
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    scene.add(dirLight);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI / 2.1;

    // ==================== FLOOR & WALLS ====================
    const floorGeo = new THREE.PlaneGeometry(20, 20);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0xd4c4a8, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = 0;
    floor.receiveShadow = true;
    floor.name = 'floor';
    scene.add(floor);

    // Back wall
    const backWallGeo = new THREE.PlaneGeometry(20, 6);
    const backWallMat = new THREE.MeshStandardMaterial({ color: 0xf0ece4, roughness: 0.9, side: THREE.DoubleSide });
    const backWall = new THREE.Mesh(backWallGeo, backWallMat);
    backWall.position.set(0, 3, -5);
    backWall.receiveShadow = true;
    backWall.name = 'backWall';
    scene.add(backWall);

    // Left wall
    const sideWallGeo = new THREE.PlaneGeometry(10, 6);
    const leftWallMat = new THREE.MeshStandardMaterial({ color: 0xede8df, roughness: 0.9, side: THREE.DoubleSide });
    const leftWall = new THREE.Mesh(sideWallGeo, leftWallMat);
    leftWall.position.set(-10, 3, 0);
    leftWall.rotation.y = Math.PI / 2;
    leftWall.receiveShadow = true;
    leftWall.name = 'leftWall';
    scene.add(leftWall);

    // Right wall
    const rightWallMat = new THREE.MeshStandardMaterial({ color: 0xede8df, roughness: 0.9, side: THREE.DoubleSide });
    const rightWall = new THREE.Mesh(sideWallGeo, rightWallMat);
    rightWall.position.set(10, 3, 0);
    rightWall.rotation.y = -Math.PI / 2;
    rightWall.receiveShadow = true;
    rightWall.name = 'rightWall';
    scene.add(rightWall);

    // ==================== CABINET MANAGEMENT ====================
    const cabinets = [];
    const doorAnimations = [];
    let cabinetIdCounter = 0;
    let selectedCabinetObj = null;
    let decorHelmet = null;

    function createCabinet(name, x, y, z, w, h, d, color, type) {
        const group = new THREE.Group();
        group.name = name;
        group.position.set(x, y, z);
        group.userData = {
            type: type, // 'base' or 'wall'
            width: w,
            height: h,
            depth: d,
            color: color,
            doorOpen: false,
            doorAnimating: false
        };

        // Main body
        const bodyGeo = new THREE.BoxGeometry(w, h, d);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: color,
            roughness: 0.6,
            metalness: 0.1
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.name = name + '_body';
        body.userData.isCabinetPart = true;
        body.userData.cabinetName = name;
        group.add(body);

        // Door (front face)
        const doorPivot = new THREE.Group();
        doorPivot.name = name + '_doorPivot';
        doorPivot.position.set(-w / 2, 0, d / 2);

        const doorGeo = new THREE.BoxGeometry(w, h * 0.9, 0.04);
        const doorMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(color).multiplyScalar(1.15),
            roughness: 0.5,
            metalness: 0.15
        });
        const door = new THREE.Mesh(doorGeo, doorMat);
        door.position.set(w / 2, 0, 0.02);
        door.castShadow = true;
        door.name = name + '_door';
        door.userData.isCabinetPart = true;
        door.userData.cabinetName = name;
        doorPivot.add(door);

        // Door handle
        const handleGeo = new THREE.BoxGeometry(0.05, 0.2, 0.05);
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.set(w * 0.35, 0, 0.06);
        handle.name = name + '_handle';
        handle.userData.isCabinetPart = true;
        handle.userData.cabinetName = name;
        doorPivot.add(handle);

        group.add(doorPivot);
        group.userData.doorPivot = doorPivot;

        scene.add(group);
        cabinets.push(group);

        // Update state
        state.doorStates[name] = 'closed';
        state.cabinetPositions[name] = { x: x, y: y, z: z };
        state.cabinetColors[name] = '#' + new THREE.Color(color).getHexString();
        state.cabinetWidths[name] = w;

        return group;
    }

    function rebuildCabinetGeometry(cabinet, newWidth) {
        const ud = cabinet.userData;
        const w = newWidth;
        const h = ud.height;
        const d = ud.depth;

        // Remove old children
        while (cabinet.children.length > 0) {
            const child = cabinet.children[0];
            cabinet.remove(child);
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
            // Recursively dispose
            child.traverse(c => {
                if (c.geometry) c.geometry.dispose();
                if (c.material) c.material.dispose();
            });
        }

        ud.width = w;

        const colorVal = new THREE.Color(ud.color);

        // Body
        const bodyGeo = new THREE.BoxGeometry(w, h, d);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: colorVal,
            roughness: 0.6,
            metalness: 0.1
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.castShadow = true;
        body.receiveShadow = true;
        body.name = cabinet.name + '_body';
        body.userData.isCabinetPart = true;
        body.userData.cabinetName = cabinet.name;
        cabinet.add(body);

        // Door pivot
        const doorPivot = new THREE.Group();
        doorPivot.name = cabinet.name + '_doorPivot';
        doorPivot.position.set(-w / 2, 0, d / 2);

        if (ud.doorOpen) {
            doorPivot.rotation.y = -Math.PI / 2;
        } else {
            doorPivot.rotation.y = 0;
        }

        const doorGeo = new THREE.BoxGeometry(w, h * 0.9, 0.04);
        const doorMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(colorVal).multiplyScalar(1.15),
            roughness: 0.5,
            metalness: 0.15
        });
        const door = new THREE.Mesh(doorGeo, doorMat);
        door.position.set(w / 2, 0, 0.02);
        door.castShadow = true;
        door.name = cabinet.name + '_door';
        door.userData.isCabinetPart = true;
        door.userData.cabinetName = cabinet.name;
        doorPivot.add(door);

        const handleGeo = new THREE.BoxGeometry(0.05, 0.2, 0.05);
        const handleMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
        const handle = new THREE.Mesh(handleGeo, handleMat);
        handle.position.set(w * 0.35, 0, 0.06);
        handle.name = cabinet.name + '_handle';
        handle.userData.isCabinetPart = true;
        handle.userData.cabinetName = cabinet.name;
        doorPivot.add(handle);

        cabinet.add(doorPivot);
        cabinet.userData.doorPivot = doorPivot;

        // Apply highlight if selected
        if (selectedCabinetObj === cabinet) {
            applyHighlight(cabinet);
        }

        state.cabinetWidths[cabinet.name] = w;
    }

    // Create initial cabinets
    createCabinet('baseCabinet1', -4, 0.5, -4.5, 2, 1, 0.6, 0x8B6914, 'base');
    createCabinet('baseCabinet2', -1.5, 0.5, -4.5, 2, 1, 0.6, 0x8B6914, 'base');
    createCabinet('baseCabinet3', 1, 0.5, -4.5, 2, 1, 0.6, 0x8B6914, 'base');
    createCabinet('wallCabinet1', -4, 3.5, -4.8, 2, 1.2, 0.4, 0xA0822A, 'wall');
    createCabinet('wallCabinet2', -1.5, 3.5, -4.8, 2, 1.2, 0.4, 0xA0822A, 'wall');

    // Countertop
    const counterGeo = new THREE.BoxGeometry(8, 0.1, 0.7);
    const counterMat = new THREE.MeshStandardMaterial({ color: 0x404040, roughness: 0.3, metalness: 0.4 });
    const countertop = new THREE.Mesh(counterGeo, counterMat);
    countertop.position.set(-1, 1.05, -4.5);
    countertop.castShadow = true;
    countertop.receiveShadow = true;
    countertop.name = 'countertop';
    scene.add(countertop);

    // ==================== LOAD HELMET ====================
    const loader = new THREE.GLTFLoader();
    loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
        function(gltf) {
            decorHelmet = gltf.scene;
            decorHelmet.name = 'decorHelmet';
            decorHelmet.scale.set(0.3, 0.3, 0.3);
            decorHelmet.position.set(3, 2.6, -3.5);
            decorHelmet.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(decorHelmet);
            state.helmetPosition = { x: 3, y: 2.6, z: -3.5 };
            state.lastAction = 'Helmet loaded';
            updateStatusBar('Helmet model loaded');
        },
        undefined,
        function(error) {
            console.warn('Could not load helmet model:', error);
            // Create a placeholder
            const helmetGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const helmetMat = new THREE.MeshStandardMaterial({ color: 0x886633, roughness: 0.4, metalness: 0.6 });
            decorHelmet = new THREE.Mesh(helmetGeo, helmetMat);
            decorHelmet.name = 'decorHelmet';
            decorHelmet.position.set(3, 2.6, -3.5);
            decorHelmet.castShadow = true;
            scene.add(decorHelmet);
            state.lastAction = 'Helmet placeholder created';
        }
    );

    // ==================== SELECTION & HIGHLIGHT ====================
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function applyHighlight(cabinet) {
        cabinet.traverse(child => {
            if (child.isMesh && child.material) {
                child.material.emissive = new THREE.Color(0xffcc00);
                child.material.emissiveIntensity = 0.3;
            }
        });
    }

    function removeHighlight(cabinet) {
        cabinet.traverse(child => {
            if (child.isMesh && child.material) {
                child.material.emissive = new THREE.Color(0x000000);
                child.material.emissiveIntensity = 0;
            }
        });
    }

    function selectCabinet(cabinet) {
        if (selectedCabinetObj) {
            removeHighlight(selectedCabinetObj);
        }
        selectedCabinetObj = cabinet;
        applyHighlight(cabinet);
        state.selectedCabinet = cabinet.name;

        // Show panel
        const panel = document.getElementById('cabinetPanel');
        panel.style.display = 'block';
        document.getElementById('cabinetName').textContent = cabinet.name;
        document.getElementById('colorPicker').value = state.cabinetColors[cabinet.name] || '#8B6914';
        document.getElementById('widthSlider').value = cabinet.userData.width;
        document.getElementById('widthValue').textContent = cabinet.userData.width;

        state.lastAction = 'Selected ' + cabinet.name;
        updateStatusBar('Selected: ' + cabinet.name);
    }

    function deselectCabinet() {
        if (selectedCabinetObj) {
            removeHighlight(selectedCabinetObj);
        }
        selectedCabinetObj = null;
        state.selectedCabinet = null;
        document.getElementById('cabinetPanel').style.display = 'none';
        state.lastAction = 'Deselected';
        updateStatusBar('Deselected');
    }

    function findCabinetFromIntersect(intersect) {
        let obj = intersect.object;
        // Walk up to find cabinet group
        while (obj) {
            if (obj.userData && (obj.userData.type === 'base' || obj.userData.type === 'wall')) {
                return obj;
            }
            // Check if it's a cabinet part
            if (obj.userData && obj.userData.cabinetName) {
                const cab = cabinets.find(c => c.name === obj.userData.cabinetName);
                if (cab) return cab;
            }
            obj = obj.parent;
        }
        return null;
    }

    // ==================== DOOR ANIMATION ====================
    function toggleDoor(cabinet) {
        if (!cabinet || cabinet.userData.doorAnimating) return;

        const doorPivot = cabinet.userData.doorPivot;
        if (!doorPivot) return;

        const isOpen = cabinet.userData.doorOpen;
        const targetRotation = isOpen ? 0 : -Math.PI / 2;
        const startRotation = doorPivot.rotation.y;
        const startTime = performance.now();
        const duration = 500; // 0.5 seconds

        cabinet.userData.doorAnimating = true;

        doorAnimations.push({
            cabinet: cabinet,
            doorPivot: doorPivot,
            startRotation: startRotation,
            targetRotation: targetRotation,
            startTime: startTime,
            duration: duration,
            done: false
        });

        cabinet.userData.doorOpen = !isOpen;
        state.doorStates[cabinet.name] = cabinet.userData.doorOpen ? 'open' : 'closed';
        state.lastAction = (cabinet.userData.doorOpen ? 'Opened' : 'Closed') + ' door of ' + cabinet.name;
        updateStatusBar(state.lastAction);
    }

    // ==================== EVENT HANDLERS ====================
    let shiftDown = false;
    let isDragging = false;
    let dragPlane = new THREE.Plane();
    let dragOffset = new THREE.Vector3();

    renderer.domElement.addEventListener('mousedown', onMouseDown);
    renderer.domElement.addEventListener('mousemove', onMouseMove);
    renderer.domElement.addEventListener('mouseup', onMouseUp);
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    window.addEventListener('resize', onResize);

    function onMouseDown(event) {
        if (event.button !== 0) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        // Get all meshes from cabinets
        const cabinetMeshes = [];
        cabinets.forEach(cab => {
            cab.traverse(child => {
                if (child.isMesh) cabinetMeshes.push(child);
            });
        });

        const intersects = raycaster.intersectObjects(cabinetMeshes, false);

        if (intersects.length > 0) {
            const cabinet = findCabinetFromIntersect(intersects[0]);
            if (cabinet) {
                selectCabinet(cabinet);

                // Start drag if shift is held
                if (shiftDown) {
                    isDragging = true;
                    controls.enabled = false;

                    // Create drag plane at cabinet's y
                    dragPlane.setFromNormalAndCoplanarPoint(
                        new THREE.Vector3(0, 1, 0),
                        cabinet.position
                    );

                    const intersectPoint = new THREE.Vector3();
                    raycaster.ray.intersectPlane(dragPlane, intersectPoint);
                    if (intersectPoint) {
                        dragOffset.copy(cabinet.position).sub(intersectPoint);
                    }
                }
                return;
            }
        }

        // Clicked empty space
        deselectCabinet();
    }

    function onMouseMove(event) {
        if (!isDragging || !selectedCabinetObj) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        const intersectPoint = new THREE.Vector3();
        if (raycaster.ray.intersectPlane(dragPlane, intersectPoint)) {
            const newPos = intersectPoint.add(dragOffset);
            selectedCabinetObj.position.x = Math.round(newPos.x * 2) / 2; // snap to 0.5
            selectedCabinetObj.position.z = Math.round(newPos.z * 2) / 2;

            state.cabinetPositions[selectedCabinetObj.name] = {
                x: selectedCabinetObj.position.x,
                y: selectedCabinetObj.position.y,
                z: selectedCabinetObj.position.z
            };
            state.lastAction = 'Dragging ' + selectedCabinetObj.name;
        }
    }

    function onMouseUp(event) {
        if (isDragging) {
            isDragging = false;
            controls.enabled = true;
            if (selectedCabinetObj) {
                state.lastAction = 'Moved ' + selectedCabinetObj.name + ' by drag';
                updateStatusBar(state.lastAction);
            }
        }
    }

    function onKeyDown(event) {
        if (event.key === 'Shift') {
            shiftDown = true;
            return;
        }

        if (event.key === 'h' || event.key === 'H') {
            if (decorHelmet) {
                decorHelmet.visible = !decorHelmet.visible;
                state.helmetVisible = decorHelmet.visible;
                state.lastAction = 'Helmet ' + (decorHelmet.visible ? 'shown' : 'hidden');
                updateStatusBar(state.lastAction);
            }
            return;
        }

        if (event.key === 'a' || event.key === 'A') {
            cabinetIdCounter++;
            const name = 'baseCabinet_new' + cabinetIdCounter;
            createCabinet(name, 0, 0.5, -2, 2, 1, 0.6, 0x8B6914, 'base');
            state.lastAction = 'Added new cabinet: ' + name;
            updateStatusBar(state.lastAction);
            return;
        }

        if (!selectedCabinetObj) return;

        const step = 0.5;
        let moved = false;

        switch (event.key) {
            case 'ArrowLeft':
                selectedCabinetObj.position.x -= step;
                moved = true;
                event.preventDefault();
                break;
            case 'ArrowRight':
                selectedCabinetObj.position.x += step;
                moved = true;
                event.preventDefault();
                break;
            case 'ArrowUp':
                selectedCabinetObj.position.z -= step;
                moved = true;
                event.preventDefault();
                break;
            case 'ArrowDown':
                selectedCabinetObj.position.z += step;
                moved = true;
                event.preventDefault();
                break;
            case 'r':
            case 'R':
                selectedCabinetObj.rotation.y += Math.PI / 2;
                state.lastAction = 'Rotated ' + selectedCabinetObj.name;
                updateStatusBar(state.lastAction);
                break;
        }

        if (moved) {
            // Snap to grid
            selectedCabinetObj.position.x = Math.round(selectedCabinetObj.position.x * 2) / 2;
            selectedCabinetObj.position.z = Math.round(selectedCabinetObj.position.z * 2) / 2;

            state.cabinetPositions[selectedCabinetObj.name] = {
                x: selectedCabinetObj.position.x,
                y: selectedCabinetObj.position.y,
                z: selectedCabinetObj.position.z
            };
            state.lastAction = 'Moved ' + selectedCabinetObj.name;
            updateStatusBar(state.lastAction);
        }
    }

    function onKeyUp(event) {
        if (event.key === 'Shift') {
            shiftDown = false;
        }
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // ==================== PANEL CONTROLS ====================
    document.getElementById('colorPicker').addEventListener('input', function(e) {
        if (!selectedCabinetObj) return;
        const color = new THREE.Color(e.target.value);
        selectedCabinetObj.userData.color = color.getHex();
        selectedCabinetObj.traverse(child => {
            if (child.isMesh && child.name.includes('_body')) {
                child.material.color.copy(color);
            }
            if (child.isMesh && child.name.includes('_door')) {
                child.material.color.copy(new THREE.Color(color).multiplyScalar(1.15));
            }
        });
        state.cabinetColors[selectedCabinetObj.name] = '#' + color.getHexString();
        // Re-apply highlight
        applyHighlight(selectedCabinetObj);
        state.lastAction = 'Changed color of ' + selectedCabinetObj.name;
        updateStatusBar(state.lastAction);
    });

    document.getElementById('widthSlider').addEventListener('input', function(e) {
        if (!selectedCabinetObj) return;
        const newWidth = parseFloat(e.target.value);
        document.getElementById('widthValue').textContent = newWidth;
        rebuildCabinetGeometry(selectedCabinetObj, newWidth);
        state.lastAction = 'Resized ' + selectedCabinetObj.name + ' to width ' + newWidth;
        updateStatusBar(state.lastAction);
    });

    document.getElementById('toggleDoor').addEventListener('click', function() {
        if (selectedCabinetObj) {
            toggleDoor(selectedCabinetObj);
        }
    });

    document.getElementById('deleteCabinet').addEventListener('click', function() {
        if (!selectedCabinetObj) return;
        const name = selectedCabinetObj.name;

        // Remove from scene
        scene.remove(selectedCabinetObj);

        // Dispose
        selectedCabinetObj.traverse(child => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
        });

        // Remove from cabinets array
        const idx = cabinets.indexOf(selectedCabinetObj);
        if (idx > -1) cabinets.splice(idx, 1);

        // Clean state
        delete state.doorStates[name];
        delete state.cabinetPositions[name];
        delete state.cabinetColors[name];
        delete state.cabinetWidths[name];

        // Remove any pending animations for this cabinet
        for (let i = doorAnimations.length - 1; i >= 0; i--) {
            if (doorAnimations[i].cabinet.name === name) {
                doorAnimations.splice(i, 1);
            }
        }

        deselectCabinet();
        state.lastAction = 'Deleted ' + name;
        updateStatusBar(state.lastAction);
    });

    // ==================== HUD & STATUS ====================
    function updateHUD() {
        const hud = document.getElementById('hud');
        const count = cabinets.length;
        const sel = selectedCabinetObj ? selectedCabinetObj.name : 'None';
        hud.textContent = 'Cabinets: ' + count + ' | Selected: ' + sel;
    }

    function updateStatusBar(msg) {
        document.getElementById('statusBar').textContent = msg;
    }

    // ==================== STATE UPDATE ====================
    function updateState() {
        state.cabinetCount = cabinets.length;
        state.selectedCabinet = selectedCabinetObj ? selectedCabinetObj.name : null;
        state.totalBaseUnits = cabinets.filter(c => c.userData.type === 'base').length;
        state.totalWallUnits = cabinets.filter(c => c.userData.type === 'wall').length;

        if (decorHelmet) {
            state.helmetVisible = decorHelmet.visible;
            state.helmetPosition = {
                x: decorHelmet.position.x || 0,
                y: decorHelmet.position.y || 0,
                z: decorHelmet.position.z || 0
            };
        }

        // Update positions for all cabinets
        cabinets.forEach(cab => {
            state.cabinetPositions[cab.name] = {
                x: cab.position.x || 0,
                y: cab.position.y || 0,
                z: cab.position.z || 0
            };
        });

        // Ensure no NaN
        for (const key in state.cabinetPositions) {
            const pos = state.cabinetPositions[key];
            if (isNaN(pos.x)) pos.x = 0;
            if (isNaN(pos.y)) pos.y = 0;
            if (isNaN(pos.z)) pos.z = 0;
        }
        for (const key in state.cabinetWidths) {
            if (isNaN(state.cabinetWidths[key])) state.cabinetWidths[key] = 2;
        }
        if (isNaN(state.cabinetCount)) state.cabinetCount = 0;
        if (isNaN(state.totalBaseUnits)) state.totalBaseUnits = 0;
        if (isNaN(state.totalWallUnits)) state.totalWallUnits = 0;
        if (state.helmetPosition) {
            if (isNaN(state.helmetPosition.x)) state.helmetPosition.x = 0;
            if (isNaN(state.helmetPosition.y)) state.helmetPosition.y = 0;
            if (isNaN(state.helmetPosition.z)) state.helmetPosition.z = 0;
        }
    }

    // ==================== ANIMATION LOOP ====================
    function animate() {
        requestAnimationFrame(animate);

        const now = performance.now();

        // Process door animations
        for (let i = doorAnimations.length - 1; i >= 0; i--) {
            const anim = doorAnimations[i];
            const elapsed = now - anim.startTime;
            const t = Math.min(elapsed / anim.duration, 1);

            // Ease in-out
            const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;

            anim.doorPivot.rotation.y = anim.startRotation + (anim.targetRotation - anim.startRotation) * eased;

            if (t >= 1) {
                anim.doorPivot.rotation.y = anim.targetRotation;
                anim.cabinet.userData.doorAnimating = false;
                doorAnimations.splice(i, 1);
            }
        }

        controls.update();
        updateState();
        updateHUD();

        renderer.render(scene, camera);
    }

    animate();

    state.lastAction = 'Scene initialized';
    updateStatusBar('Kitchen Cabinet Planner ready - Click cabinets to interact');
})();
</script>
</body>
</html>
