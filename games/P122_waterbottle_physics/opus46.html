<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bottle Flip Challenge</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 20px; left: 20px;
    background: rgba(0,0,0,0.7); color: #fff;
    padding: 20px 25px; border-radius: 12px;
    font-size: 16px; line-height: 2;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    min-width: 220px;
    z-index: 10;
  }
  #hud h2 { margin-bottom: 8px; font-size: 20px; color: #00d4ff; }
  #hud .label { color: #aaa; }
  #hud .value { color: #fff; font-weight: bold; float: right; }
  #hud .row { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 2px 0; }
  #message {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px; font-weight: bold;
    pointer-events: none; opacity: 0;
    text-shadow: 0 0 30px currentColor;
    z-index: 20;
    transition: opacity 0.3s;
  }
  #instructions {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 14px;
    text-align: center; z-index: 10;
    pointer-events: none;
  }
  .flash-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; opacity: 0; z-index: 15;
    transition: opacity 0.15s;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="hud">
  <h2>🍾 Bottle Flip</h2>
  <div class="row"><span class="label">Score:</span><span class="value" id="score">0</span></div>
  <div class="row"><span class="label">Throws:</span><span class="value" id="throwCount">0</span></div>
  <div class="row"><span class="label">Last Angle:</span><span class="value" id="lastAngle">--°</span></div>
  <div class="row"><span class="label">Best Streak:</span><span class="value" id="bestStreak">0</span></div>
</div>
<div id="message"></div>
<div class="flash-overlay" id="flashOverlay"></div>
<div id="instructions">Click and drag up on the bottle to flip it! 🎯</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---- Scene Setup ----
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 40);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 6);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 3;
controls.maxDistance = 15;
controls.target.set(0, 1, 0);

// ---- Lights ----
const ambientLight = new THREE.AmbientLight(0x404060, 0.8);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 2.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -8;
dirLight.shadow.camera.right = 8;
dirLight.shadow.camera.top = 8;
dirLight.shadow.camera.bottom = -8;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0x00d4ff, 1, 20);
pointLight.position.set(-3, 5, -3);
scene.add(pointLight);

const pointLight2 = new THREE.PointLight(0xff6b6b, 0.5, 15);
pointLight2.position.set(3, 4, 2);
scene.add(pointLight2);

// ---- Table ----
const tableGeom = new THREE.BoxGeometry(10, 0.3, 10);
const tableMat = new THREE.MeshStandardMaterial({
  color: 0x556677,
  roughness: 0.4,
  metalness: 0.1
});
const table = new THREE.Mesh(tableGeom, tableMat);
table.position.y = -0.15;
table.receiveShadow = true;
scene.add(table);

// Table edge highlight
const edgeGeom = new THREE.BoxGeometry(10.05, 0.05, 10.05);
const edgeMat = new THREE.MeshStandardMaterial({ color: 0x334455, roughness: 0.3, metalness: 0.5 });
const edge = new THREE.Mesh(edgeGeom, edgeMat);
edge.position.y = 0.01;
scene.add(edge);

// Grid on table
const gridHelper = new THREE.GridHelper(10, 20, 0x445566, 0x334455);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ---- Landing target circle ----
const targetGeom = new THREE.RingGeometry(0.3, 0.5, 32);
const targetMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
const targetRing = new THREE.Mesh(targetGeom, targetMat);
targetRing.rotation.x = -Math.PI / 2;
targetRing.position.y = 0.02;
scene.add(targetRing);

// ---- State ----
let gameState = {
  score: 0,
  throwCount: 0,
  lastAngle: 0,
  bestStreak: 0,
  currentStreak: 0,
  isFlying: false,
  isDragging: false,
  isResetting: false,
  modelLoaded: false
};

let bottle = null;
let bottleGroup = new THREE.Group();
scene.add(bottleGroup);

let bottleHeight = 0.5; // will be updated after model load
let bottleInitialPos = new THREE.Vector3(0, 0, 0);

// Physics
let velocity = new THREE.Vector3();
let angularVelocity = new THREE.Vector3();
const gravity = 9.8;
let physicsTime = 0;

// Drag
let dragStart = new THREE.Vector2();
let dragCurrent = new THREE.Vector2();
let isDragOnBottle = false;

// Drag line
let dragLine = null;
const dragLineMat = new THREE.LineDashedMaterial({
  color: 0xffff00,
  dashSize: 0.1,
  gapSize: 0.05,
  linewidth: 2
});

// ---- Load Bottle ----
const loader = new GLTFLoader();
loader.load('assets/WaterBottle.glb', (gltf) => {
  bottle = gltf.scene;
  
  // Compute bounding box
  const box = new THREE.Box3().setFromObject(bottle);
  const size = new THREE.Vector3();
  box.getSize(size);
  const center = new THREE.Vector3();
  box.getCenter(center);
  
  // Scale bottle to reasonable size
  const desiredHeight = 1.2;
  const scale = desiredHeight / size.y;
  bottle.scale.setScalar(scale);
  
  // Recompute after scale
  const box2 = new THREE.Box3().setFromObject(bottle);
  const size2 = new THREE.Vector3();
  box2.getSize(size2);
  const center2 = new THREE.Vector3();
  box2.getCenter(center2);
  
  bottleHeight = size2.y;
  
  // Offset so bottom is at local y=0
  bottle.position.y = -box2.min.y;
  
  bottle.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  
  bottleGroup.add(bottle);
  resetBottle();
  
  gameState.modelLoaded = true;
  console.log('Bottle loaded, height:', bottleHeight);
}, undefined, (err) => {
  console.error('Failed to load bottle model, creating placeholder', err);
  createPlaceholderBottle();
});

function createPlaceholderBottle() {
  const group = new THREE.Group();
  
  // Body
  const bodyGeom = new THREE.CylinderGeometry(0.15, 0.18, 0.8, 16);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2288cc, transparent: true, opacity: 0.7, roughness: 0.1, metalness: 0.3 });
  const body = new THREE.Mesh(bodyGeom, bodyMat);
  body.position.y = 0.4;
  body.castShadow = true;
  group.add(body);
  
  // Neck
  const neckGeom = new THREE.CylinderGeometry(0.06, 0.12, 0.3, 16);
  const neck = new THREE.Mesh(neckGeom, bodyMat);
  neck.position.y = 0.95;
  neck.castShadow = true;
  group.add(neck);
  
  // Cap
  const capGeom = new THREE.CylinderGeometry(0.07, 0.07, 0.08, 16);
  const capMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
  const cap = new THREE.Mesh(capGeom, capMat);
  cap.position.y = 1.14;
  cap.castShadow = true;
  group.add(cap);
  
  // Water inside
  const waterGeom = new THREE.CylinderGeometry(0.13, 0.16, 0.5, 16);
  const waterMat = new THREE.MeshStandardMaterial({ color: 0x0066ff, transparent: true, opacity: 0.4 });
  const water = new THREE.Mesh(waterGeom, waterMat);
  water.position.y = 0.3;
  group.add(water);
  
  bottle = group;
  bottleHeight = 1.2;
  bottleGroup.add(bottle);
  resetBottle();
  gameState.modelLoaded = true;
}

function resetBottle() {
  bottleGroup.position.copy(bottleInitialPos);
  bottleGroup.position.y = 0;
  bottleGroup.rotation.set(0, 0, 0);
  velocity.set(0, 0, 0);
  angularVelocity.set(0, 0, 0);
  gameState.isFlying = false;
  gameState.isResetting = false;
}

// ---- Drag Line ----
function updateDragLine(start3D, end3D) {
  if (dragLine) {
    scene.remove(dragLine);
    dragLine.geometry.dispose();
  }
  
  const points = [];
  const segments = 20;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    points.push(new THREE.Vector3(
      THREE.MathUtils.lerp(start3D.x, end3D.x, t),
      THREE.MathUtils.lerp(start3D.y, end3D.y, t),
      THREE.MathUtils.lerp(start3D.z, end3D.z, t)
    ));
  }
  
  const geom = new THREE.BufferGeometry().setFromPoints(points);
  dragLine = new THREE.Line(geom, dragLineMat);
  dragLine.computeLineDistances();
  scene.add(dragLine);
}

function removeDragLine() {
  if (dragLine) {
    scene.remove(dragLine);
    dragLine.geometry.dispose();
    dragLine = null;
  }
}

// ---- Raycasting ----
const raycaster = new THREE.Raycaster();

function screenToWorld(screenPos, targetY = 0) {
  const ndc = new THREE.Vector2(
    (screenPos.x / window.innerWidth) * 2 - 1,
    -(screenPos.y / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
  // Project onto a plane facing camera through bottle
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(
    new THREE.Plane(new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion), -bottleGroup.position.clone().dot(new THREE.Vector3(0, 0, 1).applyQuaternion(camera.quaternion))),
    target
  );
  return target || new THREE.Vector3();
}

function isClickOnBottle(screenPos) {
  const ndc = new THREE.Vector2(
    (screenPos.x / window.innerWidth) * 2 - 1,
    -(screenPos.y / window.innerHeight) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  
  if (bottle) {
    const intersects = raycaster.intersectObject(bottleGroup, true);
    if (intersects.length > 0) return true;
  }
  
  // Also check a generous bounding area
  const bottleScreenPos = bottleGroup.position.clone().add(new THREE.Vector3(0, bottleHeight / 2, 0));
  bottleScreenPos.project(camera);
  const sx = (bottleScreenPos.x + 1) / 2 * window.innerWidth;
  const sy = (-bottleScreenPos.y + 1) / 2 * window.innerHeight;
  const dist = Math.sqrt((screenPos.x - sx) ** 2 + (screenPos.y - sy) ** 2);
  return dist < 80;
}

// ---- Input Handlers ----
function onPointerDown(e) {
  if (gameState.isFlying || gameState.isResetting || !gameState.modelLoaded) return;
  
  const pos = new THREE.Vector2(e.clientX, e.clientY);
  if (isClickOnBottle(pos)) {
    isDragOnBottle = true;
    dragStart.copy(pos);
    dragCurrent.copy(pos);
    controls.enabled = false;
  }
}

function onPointerMove(e) {
  if (!isDragOnBottle) return;
  
  dragCurrent.set(e.clientX, e.clientY);
  
  // Show drag line
  const startWorld = bottleGroup.position.clone().add(new THREE.Vector3(0, bottleHeight / 2, 0));
  
  const dragDelta = new THREE.Vector2().subVectors(dragStart, dragCurrent);
  const dragDist = dragDelta.length();
  const maxDrag = 300;
  const normalizedDist = Math.min(dragDist / maxDrag, 1);
  
  // Convert screen drag to world direction
  const dragDir3D = new THREE.Vector3();
  // Up on screen = up + forward in world
  dragDir3D.y = dragDelta.y / maxDrag * 3;
  dragDir3D.x = -dragDelta.x / maxDrag * 2;
  dragDir3D.z = -Math.abs(dragDelta.y) / maxDrag * 1;
  
  const endWorld = startWorld.clone().add(dragDir3D.multiplyScalar(2));
  
  // Color based on power
  const hue = (1 - normalizedDist) * 0.3; // green to red
  dragLineMat.color.setHSL(hue, 1, 0.5);
  
  updateDragLine(startWorld, endWorld);
}

function onPointerUp(e) {
  if (!isDragOnBottle) return;
  isDragOnBottle = false;
  controls.enabled = true;
  removeDragLine();
  
  const dragDelta = new THREE.Vector2().subVectors(dragStart, dragCurrent);
  const dragDist = dragDelta.length();
  
  if (dragDist < 20) return; // Too small, ignore
  
  // Launch!
  const maxDrag = 300;
  const power = Math.min(dragDist / maxDrag, 1);
  
  // Calculate launch velocity
  // Drag up on screen = launch up
  const launchSpeed = power * 8;
  
  velocity.set(0, 0, 0);
  velocity.y = (dragDelta.y / dragDist) * launchSpeed * 0.8;
  velocity.x = -(dragDelta.x / dragDist) * launchSpeed * 0.3;
  velocity.z = -power * 2; // slight forward
  
  // Ensure upward component
  if (velocity.y < 1) velocity.y = 1 + power * 3;
  
  // Angular velocity - rotation around x-axis (forward flip)
  angularVelocity.set(0, 0, 0);
  angularVelocity.x = -(power * 8 + 2); // Forward flip
  angularVelocity.z = (dragDelta.x / maxDrag) * 3; // Side spin from horizontal drag
  
  gameState.isFlying = true;
  gameState.throwCount++;
  physicsTime = 0;
  
  updateHUD();
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);
renderer.domElement.addEventListener('pointerleave', () => {
  if (isDragOnBottle) {
    isDragOnBottle = false;
    controls.enabled = true;
    removeDragLine();
  }
});

// ---- Flash Effect ----
function showFlash(color) {
  const overlay = document.getElementById('flashOverlay');
  overlay.style.background = color === 'green' 
    ? 'radial-gradient(circle, rgba(0,255,100,0.4), transparent)' 
    : 'radial-gradient(circle, rgba(255,50,50,0.4), transparent)';
  overlay.style.opacity = '1';
  setTimeout(() => { overlay.style.opacity = '0'; }, 300);
}

function showMessage(text, color) {
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.style.color = color;
  msg.style.opacity = '1';
  setTimeout(() => { msg.style.opacity = '0'; }, 1500);
}

// ---- HUD ----
function updateHUD() {
  document.getElementById('score').textContent = gameState.score;
  document.getElementById('throwCount').textContent = gameState.throwCount;
  document.getElementById('lastAngle').textContent = gameState.lastAngle.toFixed(1) + '°';
  document.getElementById('bestStreak').textContent = gameState.bestStreak;
}

// ---- Physics & Landing ----
function getBottleUpVector() {
  const up = new THREE.Vector3(0, 1, 0);
  up.applyQuaternion(bottleGroup.quaternion);
  return up;
}

function getAngleFromUpright() {
  const bottleUp = getBottleUpVector();
  const worldUp = new THREE.Vector3(0, 1, 0);
  const angle = THREE.MathUtils.radToDeg(bottleUp.angleTo(worldUp));
  return angle;
}

function checkLanding() {
  // Get bottom of bottle in world space
  const bottomWorld = new THREE.Vector3(0, 0, 0);
  bottleGroup.localToWorld(bottomWorld);
  
  if (bottomWorld.y <= 0 && velocity.y < 0) {
    // Landed!
    const angle = getAngleFromUpright();
    gameState.lastAngle = angle;
    
    // Check if on table
    const pos = bottleGroup.position;
    const onTable = Math.abs(pos.x) < 5 && Math.abs(pos.z) < 5;
    
    if (angle < 15 && onTable) {
      // Success!
      gameState.score++;
      gameState.currentStreak++;
      if (gameState.currentStreak > gameState.bestStreak) {
        gameState.bestStreak = gameState.currentStreak;
      }
      showFlash('green');
      showMessage('🎉 LANDED! +1', '#00ff66');
      
      // Snap upright
      bottleGroup.rotation.set(0, bottleGroup.rotation.y, 0);
      bottleGroup.position.y = 0;
    } else {
      // Fail
      gameState.currentStreak = 0;
      showFlash('red');
      if (!onTable) {
        showMessage('💨 Off table!', '#ff4444');
      } else {
        showMessage('😵 ' + angle.toFixed(0) + '° Fail!', '#ff4444');
      }
    }
    
    gameState.isFlying = false;
    velocity.set(0, 0, 0);
    angularVelocity.set(0, 0, 0);
    
    updateHUD();
    
    // Reset after delay
    gameState.isResetting = true;
    setTimeout(() => {
      resetBottle();
    }, 2000);
    
    return true;
  }
  return false;
}

// ---- Animation Loop ----
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = Math.min(clock.getDelta(), 0.05);
  
  controls.update();
  
  // Animate target ring
  targetRing.material.opacity = 0.15 + Math.sin(Date.now() * 0.003) * 0.1;
  const ringScale = 1 + Math.sin(Date.now() * 0.002) * 0.1;
  targetRing.scale.set(ringScale, ringScale, ringScale);
  
  // Physics update
  if (gameState.isFlying) {
    physicsTime += delta;
    
    // Gravity
    velocity.y -= gravity * delta;
    
    // Air resistance (slight)
    velocity.multiplyScalar(1 - 0.01 * delta);
    angularVelocity.multiplyScalar(1 - 0.02 * delta);
    
    // Update position
    bottleGroup.position.x += velocity.x * delta;
    bottleGroup.position.y += velocity.y * delta;
    bottleGroup.position.z += velocity.z * delta;
    
    // Update rotation
    bottleGroup.rotation.x += angularVelocity.x * delta;
    bottleGroup.rotation.y += angularVelocity.y * delta;
    bottleGroup.rotation.z += angularVelocity.z * delta;
    
    // Check landing (after some minimum flight time)
    if (physicsTime > 0.2) {
      checkLanding();
    }
    
    // Safety: if bottle falls way below, reset
    if (bottleGroup.position.y < -5) {
      gameState.isFlying = false;
      gameState.isResetting = true;
      gameState.currentStreak = 0;
      showMessage('💨 Lost!', '#ff4444');
      updateHUD();
      setTimeout(() => resetBottle(), 1500);
    }
  }
  
  // Idle bottle animation (subtle bob)
  if (!gameState.isFlying && !gameState.isResetting && gameState.modelLoaded) {
    // Subtle hover effect when idle
  }
  
  // Update state
  window.__3D_STATE__ = {
    modelLoaded: gameState.modelLoaded,
    score: gameState.score,
    throwCount: gameState.throwCount,
    lastAngle: gameState.lastAngle,
    bestStreak: gameState.bestStreak,
    bottlePos: {
      x: bottleGroup.position.x,
      y: bottleGroup.position.y,
      z: bottleGroup.position.z
    },
    bottleRotation: {
      x: bottleGroup.rotation.x,
      y: bottleGroup.rotation.y,
      z: bottleGroup.rotation.z
    },
    isFlying: gameState.isFlying
  };
  
  renderer.render(scene, camera);
}

// ---- Resize ----
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---- Init ----
window.__3D_STATE__ = {
  modelLoaded: false,
  score: 0,
  throwCount: 0,
  lastAngle: 0,
  bestStreak: 0,
  bottlePos: { x: 0, y: 0, z: 0 },
  bottleRotation: { x: 0, y: 0, z: 0 },
  isFlying: false
};

updateHUD();
animate();
</script>
</body>
</html>
