<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 瓶子翻转挑战</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101418;
      font-family: Arial, Helvetica, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      color: #fff;
      background: rgba(0, 0, 0, 0.42);
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 14px;
      min-width: 180px;
      user-select: none;
      backdrop-filter: blur(4px);
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
    }
    #hint {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      color: #e8eef7;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      user-select: none;
      pointer-events: none;
      white-space: nowrap;
    }
    #flash {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 9;
      transition: opacity 0.18s ease;
      background: rgba(0,255,100,0.22);
    }
    #crosshair {
      position: absolute;
      width: 10px;
      height: 10px;
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      box-shadow: 0 0 10px rgba(255,255,255,0.35);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div>得分：<span id="score">0</span></div>
      <div>投掷次数：<span id="throwCount">0</span></div>
      <div>上次落地角度：<span id="lastAngle">0.0</span>°</div>
      <div>最佳连续成功数：<span id="bestStreak">0</span></div>
    </div>
    <div id="flash"></div>
    <div id="crosshair"></div>
    <div id="hint">按住瓶子向上拖拽并松开，完成瓶子翻转挑战</div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const scoreEl = document.getElementById('score');
    const throwCountEl = document.getElementById('throwCount');
    const lastAngleEl = document.getElementById('lastAngle');
    const bestStreakEl = document.getElementById('bestStreak');
    const flashEl = document.getElementById('flash');
    const crosshairEl = document.getElementById('crosshair');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1b2230);
    scene.fog = new THREE.Fog(0x1b2230, 12, 30);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 4.5, 8.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.2, 0);
    controls.enableDamping = true;
    controls.enablePan = false;
    controls.minDistance = 5;
    controls.maxDistance = 16;
    controls.maxPolarAngle = Math.PI * 0.48;

    const ambient = new THREE.HemisphereLight(0xffffff, 0x445066, 1.15);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.6);
    dirLight.position.set(5, 8, 4);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -8;
    dirLight.shadow.camera.right = 8;
    dirLight.shadow.camera.top = 8;
    dirLight.shadow.camera.bottom = -8;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 30;
    scene.add(dirLight);

    const tableGeo = new THREE.PlaneGeometry(10, 10);
    const tableMat = new THREE.MeshStandardMaterial({
      color: 0x7c7c7c,
      roughness: 0.9,
      metalness: 0.05
    });
    const table = new THREE.Mesh(tableGeo, tableMat);
    table.rotation.x = -Math.PI / 2;
    table.position.y = 0;
    table.receiveShadow = true;
    scene.add(table);

    const grid = new THREE.GridHelper(10, 20, 0xffffff, 0x999999);
    grid.position.y = 0.001;
    grid.material.transparent = true;
    grid.material.opacity = 0.15;
    scene.add(grid);

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const clock = new THREE.Clock();

    let bottleRoot = null;
    let bottle = null;
    let bottleHeight = 2.2;
    let bottleRadius = 0.22;
    let modelLoaded = false;

    const initialPosition = new THREE.Vector3(0, 0, 0);
    const initialQuaternion = new THREE.Quaternion();
    const initialEuler = new THREE.Euler(0, 0, 0);

    let score = 0;
    let throwCount = 0;
    let lastAngle = 0;
    let bestStreak = 0;
    let currentStreak = 0;

    let isDragging = false;
    let isFlying = false;
    let hasLanded = false;
    let pendingReset = false;

    let dragStartWorld = new THREE.Vector3();
    let dragCurrentWorld = new THREE.Vector3();
    let launchVelocity = new THREE.Vector3();
    let angularVelocity = new THREE.Vector3();

    const gravity = new THREE.Vector3(0, -9.8, 0);

    const dragPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
    const planeHit = new THREE.Vector3();

    const lineMaterial = new THREE.LineDashedMaterial({
      color: 0xffdd66,
      dashSize: 0.18,
      gapSize: 0.1,
      linewidth: 1
    });
    const lineGeometry = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(),
      new THREE.Vector3()
    ]);
    const aimLine = new THREE.Line(lineGeometry, lineMaterial);
    aimLine.visible = false;
    scene.add(aimLine);

    const loader = new GLTFLoader();
    loader.load(
      'assets/WaterBottle.glb',
      (gltf) => {
        bottleRoot = gltf.scene;
        bottleRoot.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
            if (obj.material) {
              obj.material.envMapIntensity = 1.0;
            }
          }
        });

        const box = new THREE.Box3().setFromObject(bottleRoot);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        bottleHeight = Math.max(size.y || 2.2, 0.5);
        bottleRadius = Math.max(size.x, size.z) * 0.5 || 0.2;

        bottle = new THREE.Group();
        bottle.add(bottleRoot);

        bottleRoot.position.sub(center);
        bottleRoot.position.y += size.y * 0.5;

        const targetHeight = 2.0;
        const scaleFactor = targetHeight / bottleHeight;
        bottle.scale.setScalar(scaleFactor);

        bottleHeight *= scaleFactor;
        bottleRadius *= scaleFactor;

        bottle.position.copy(initialPosition);
        bottle.rotation.copy(initialEuler);
        bottle.quaternion.copy(initialQuaternion);

        scene.add(bottle);
        modelLoaded = true;
        updateHUD();
      },
      undefined,
      () => {
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.CylinderGeometry(0.18, 0.2, 1.5, 24),
          new THREE.MeshStandardMaterial({ color: 0x66aaff, roughness: 0.35, metalness: 0.1, transparent: true, opacity: 0.85 })
        );
        const cap = new THREE.Mesh(
          new THREE.CylinderGeometry(0.11, 0.11, 0.18, 24),
          new THREE.MeshStandardMaterial({ color: 0x1f3f8f, roughness: 0.6, metalness: 0.1 })
        );
        body.castShadow = true;
        cap.castShadow = true;
        body.position.y = 0.75;
        cap.position.y = 1.59;
        fallback.add(body, cap);

        bottleRoot = fallback;
        bottleHeight = 1.68;
        bottleRadius = 0.2;

        bottle = new THREE.Group();
        bottle.add(bottleRoot);
        bottle.position.copy(initialPosition);
        scene.add(bottle);
        modelLoaded = true;
        updateHUD();
      }
    );

    function updateHUD() {
      scoreEl.textContent = score.toString();
      throwCountEl.textContent = throwCount.toString();
      lastAngleEl.textContent = lastAngle.toFixed(1);
      bestStreakEl.textContent = bestStreak.toString();
    }

    function flash(color) {
      flashEl.style.background = color;
      flashEl.style.opacity = '1';
      requestAnimationFrame(() => {
        setTimeout(() => {
          flashEl.style.opacity = '0';
        }, 60);
      });
    }

    function resetBottle() {
      if (!bottle) return;
      isDragging = false;
      isFlying = false;
      hasLanded = false;
      pendingReset = false;
      launchVelocity.set(0, 0, 0);
      angularVelocity.set(0, 0, 0);
      bottle.position.copy(initialPosition);
      bottle.quaternion.copy(initialQuaternion);
      bottle.rotation.copy(initialEuler);
      aimLine.visible = false;
      crosshairEl.style.opacity = '0';
    }

    function getBottleBottomY() {
      if (!bottle) return 999;
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(bottle.quaternion);
      return bottle.position.y - (bottleHeight * 0.5) * up.y;
    }

    function getTiltAngleDeg() {
      if (!bottle) return 0;
      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(bottle.quaternion).normalize();
      const dot = THREE.MathUtils.clamp(up.dot(new THREE.Vector3(0, 1, 0)), -1, 1);
      return THREE.MathUtils.radToDeg(Math.acos(dot));
    }

    function launchBottle(from, to) {
      if (!bottle || isFlying) return;

      const drag = new THREE.Vector3().subVectors(to, from);

      const upwardStrength = THREE.MathUtils.clamp(Math.max(drag.y, 0.2), 0.2, 4.5);
      const sideX = THREE.MathUtils.clamp(drag.x, -2.2, 2.2);
      const forwardZ = THREE.MathUtils.clamp(-drag.z, -2.0, 2.0);

      launchVelocity.set(
        sideX * 1.6,
        4.5 + upwardStrength * 3.2,
        forwardZ * 1.6
      );

      const horizontalMag = Math.sqrt(launchVelocity.x * launchVelocity.x + launchVelocity.z * launchVelocity.z);
      const flipSpeed = 5.0 + upwardStrength * 3.5 + horizontalMag * 1.8;

      angularVelocity.set(
        forwardZ * 1.2,
        sideX * 0.8,
        flipSpeed
      );

      throwCount++;
      updateHUD();

      isFlying = true;
      hasLanded = false;
      aimLine.visible = false;
      crosshairEl.style.opacity = '0';
    }

    function setPointerFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      crosshairEl.style.left = event.clientX + 'px';
      crosshairEl.style.top = event.clientY + 'px';
    }

    function intersectBottle(event) {
      if (!bottle) return false;
      setPointerFromEvent(event);
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObject(bottle, true);
      return hits.length > 0;
    }

    function getDragPoint(event) {
      setPointerFromEvent(event);
      raycaster.setFromCamera(pointer, camera);
      const ok = raycaster.ray.intersectPlane(dragPlane, planeHit);
      return ok ? planeHit.clone() : null;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (!modelLoaded || !bottle || isFlying || pendingReset) return;
      if (!intersectBottle(event)) return;

      const point = getDragPoint(event);
      if (!point) return;

      isDragging = true;
      dragStartWorld.copy(point);
      dragCurrentWorld.copy(point);

      aimLine.visible = true;
      crosshairEl.style.opacity = '1';
      controls.enabled = false;
    });

    window.addEventListener('pointermove', (event) => {
      if (!isDragging || !bottle || isFlying) return;
      const point = getDragPoint(event);
      if (!point) return;

      dragCurrentWorld.copy(point);

      const dragVec = new THREE.Vector3().subVectors(dragCurrentWorld, dragStartWorld);
      if (dragVec.y < -0.2) dragCurrentWorld.y = dragStartWorld.y - 0.2;

      const start = bottle.position.clone().add(new THREE.Vector3(0, bottleHeight * 0.55, 0));
      const end = start.clone().add(
        new THREE.Vector3(
          THREE.MathUtils.clamp(dragCurrentWorld.x - dragStartWorld.x, -2, 2),
          THREE.MathUtils.clamp(dragCurrentWorld.y - dragStartWorld.y, -0.2, 3.2),
          THREE.MathUtils.clamp(dragCurrentWorld.z - dragStartWorld.z, -2, 2)
        )
      );

      aimLine.geometry.setFromPoints([start, end]);
      aimLine.computeLineDistances();
    });

    window.addEventListener('pointerup', () => {
      if (!isDragging) return;
      isDragging = false;
      controls.enabled = true;
      launchBottle(dragStartWorld, dragCurrentWorld);
    });

    window.addEventListener('pointercancel', () => {
      if (!isDragging) return;
      isDragging = false;
      controls.enabled = true;
      aimLine.visible = false;
      crosshairEl.style.opacity = '0';
    });

    function handleLanding() {
      if (!bottle || hasLanded) return;
      hasLanded = true;
      isFlying = false;

      lastAngle = getTiltAngleDeg();

      const success = lastAngle < 15;
      if (success) {
        score++;
        currentStreak++;
        bestStreak = Math.max(bestStreak, currentStreak);
        flash('rgba(0,255,100,0.22)');
      } else {
        currentStreak = 0;
        flash('rgba(255,50,50,0.22)');
      }

      updateHUD();

      const up = new THREE.Vector3(0, 1, 0).applyQuaternion(bottle.quaternion).normalize();
      const projectedHeight = Math.abs(up.y) * (bottleHeight * 0.5);
      bottle.position.y = Math.max(projectedHeight, bottle.position.y);

      pendingReset = true;
      setTimeout(() => {
        resetBottle();
      }, 2000);
    }

    function updatePhysics(dt) {
      if (!bottle || !isFlying) return;

      launchVelocity.addScaledVector(gravity, dt);
      bottle.position.addScaledVector(launchVelocity, dt);

      const deltaEuler = new THREE.Euler(
        angularVelocity.x * dt,
        angularVelocity.y * dt,
        angularVelocity.z * dt,
        'XYZ'
      );
      const deltaQuat = new THREE.Quaternion().setFromEuler(deltaEuler);
      bottle.quaternion.multiply(deltaQuat).normalize();

      angularVelocity.multiplyScalar(Math.max(0.995 - dt * 0.1, 0.985));

      if (getBottleBottomY() <= 0) {
        handleLanding();
      }
    }

    function updateState() {
      const pos = bottle ? bottle.position : new THREE.Vector3();
      const rot = bottle ? bottle.rotation : new THREE.Euler();

      window.__3D_STATE__ = {
        modelLoaded,
        score,
        throwCount,
        lastAngle,
        bestStreak,
        bottlePos: { x: pos.x, y: pos.y, z: pos.z },
        bottleRotation: { x: rot.x, y: rot.y, z: rot.z },
        isFlying
      };
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.033);

      controls.update();
      updatePhysics(dt);
      updateState();

      renderer.render(scene, camera);
    }

    updateHUD();
    resetBottle();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
