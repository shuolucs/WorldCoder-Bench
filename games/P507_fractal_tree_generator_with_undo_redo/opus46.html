<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Fractal Tree Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #control-panel {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(20, 20, 40, 0.92);
    border: 1px solid rgba(100, 100, 180, 0.3);
    border-radius: 12px;
    padding: 18px;
    color: #e0e0ff;
    z-index: 100;
    min-width: 220px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }

  #control-panel h3 {
    margin-bottom: 12px;
    font-size: 16px;
    color: #a0a0ff;
    text-align: center;
    border-bottom: 1px solid rgba(100,100,180,0.3);
    padding-bottom: 8px;
  }

  .btn-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .ctrl-btn {
    flex: 1;
    min-width: 45px;
    padding: 8px 4px;
    border: 1px solid rgba(100,100,180,0.4);
    border-radius: 6px;
    background: rgba(40, 40, 80, 0.8);
    color: #c0c0ff;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    text-align: center;
  }

  .ctrl-btn:hover:not(:disabled) {
    background: rgba(60, 60, 120, 0.9);
    border-color: rgba(140,140,220,0.6);
    transform: translateY(-1px);
  }

  .ctrl-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .ctrl-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .slider-group {
    margin: 10px 0;
  }

  .slider-group label {
    display: block;
    font-size: 11px;
    color: #9090cc;
    margin-bottom: 4px;
  }

  .slider-group input[type="range"] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(60,60,120,0.6);
    border-radius: 3px;
    outline: none;
  }

  .slider-group input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #7070dd;
    cursor: pointer;
    border: 2px solid #a0a0ff;
  }

  .slider-value {
    float: right;
    color: #b0b0ee;
    font-weight: 600;
  }

  #hud-info {
    margin-top: 12px;
    padding: 10px;
    background: rgba(30, 30, 60, 0.6);
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.8;
    border: 1px solid rgba(80,80,150,0.2);
  }

  #hud-info span {
    color: #80ff80;
    font-weight: 600;
  }
</style>
</head>
<body>

<div id="control-panel">
  <h3>🌳 Fractal Tree</h3>
  <div class="btn-row">
    <button class="ctrl-btn" id="btn-grow">Grow (G)</button>
    <button class="ctrl-btn" id="btn-prune">Prune (P)</button>
  </div>
  <div class="btn-row">
    <button class="ctrl-btn" id="btn-undo">↩ Undo</button>
    <button class="ctrl-btn" id="btn-redo">↪ Redo</button>
    <button class="ctrl-btn" id="btn-reset">Reset</button>
  </div>
  <div class="slider-group">
    <label>Angle Spread: <span class="slider-value" id="angle-val">30°</span></label>
    <input type="range" id="slider-angle" min="10" max="60" value="30" step="1">
  </div>
  <div class="slider-group">
    <label>Branch Ratio: <span class="slider-value" id="ratio-val">0.70</span></label>
    <input type="range" id="slider-ratio" min="0.4" max="0.9" value="0.7" step="0.05">
  </div>
  <div id="hud-info">
    Depth: <span id="hud-depth">1</span><br>
    Branches: <span id="hud-branches">1</span><br>
    Leaves: <span id="hud-leaves">0</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 8, 20);
  camera.lookAt(0, 5, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(30, 30);
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x2d5016 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = 0;
  scene.add(ground);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 5, 0);
  controls.update();

  // State
  let currentDepth = 1;
  let branchRatio = 0.7;
  let angleSpread = 30;
  let undoStack = [];
  let redoStack = [];
  let branchMeshes = [];
  let selectedBranchId = null;
  let animating = false;
  let branchIdCounter = 0;
  let treeGroup = new THREE.Group();
  scene.add(treeGroup);

  // Seeded random for consistent tree shapes at same depth
  let randomSeed = 42;
  function seededRandom() {
    randomSeed = (randomSeed * 16807 + 0) % 2147483647;
    return (randomSeed - 1) / 2147483646;
  }

  // Build tree recursively
  function buildTree(parentPos, parentDir, length, radius, depth, maxDepth, parentObj, animateDepth) {
    const isLeaf = depth >= 4;
    const color = isLeaf ? 0x228B22 : 0x8B4513;

    const geo = new THREE.CylinderGeometry(radius * 0.65, radius, length, 8, 1);
    geo.translate(0, length / 2, 0);

    const mat = new THREE.MeshLambertMaterial({ color: color });
    const mesh = new THREE.Mesh(geo, mat);

    mesh.userData.branchId = branchIdCounter++;
    mesh.userData.depth = depth;

    // Position at parent tip
    mesh.position.copy(parentPos);

    // Orient along parentDir
    const up = new THREE.Vector3(0, 1, 0);
    const quat = new THREE.Quaternion();
    quat.setFromUnitVectors(up, parentDir.clone().normalize());
    mesh.quaternion.copy(quat);

    // Animation for newly grown branches
    if (animateDepth !== null && depth === animateDepth) {
      mesh.scale.set(0, 0, 0);
      mesh.userData.animateGrow = true;
      mesh.userData.animateStart = performance.now();
    }

    parentObj.add(mesh);
    branchMeshes.push(mesh);

    // Calculate tip position
    const tip = parentPos.clone().add(parentDir.clone().normalize().multiplyScalar(length));

    if (depth < maxDepth) {
      // Create a random perpendicular axis for branching plane
      const randAngle = seededRandom() * Math.PI * 2;
      let perp = new THREE.Vector3(1, 0, 0);
      if (Math.abs(parentDir.dot(perp)) > 0.9) {
        perp = new THREE.Vector3(0, 0, 1);
      }
      perp.cross(parentDir).normalize();

      // Rotate perp around parentDir by random angle
      const rotQuat = new THREE.Quaternion();
      rotQuat.setFromAxisAngle(parentDir.clone().normalize(), randAngle);
      perp.applyQuaternion(rotQuat);

      const angleRad = (angleSpread * Math.PI) / 180;

      // Child 1: +angle
      const dir1 = parentDir.clone().normalize();
      const rotQuat1 = new THREE.Quaternion();
      rotQuat1.setFromAxisAngle(perp, angleRad);
      dir1.applyQuaternion(rotQuat1);

      // Child 2: -angle
      const dir2 = parentDir.clone().normalize();
      const rotQuat2 = new THREE.Quaternion();
      rotQuat2.setFromAxisAngle(perp, -angleRad);
      dir2.applyQuaternion(rotQuat2);

      const newLength = length * branchRatio;
      const newRadius = radius * 0.65;

      buildTree(tip, dir1, newLength, newRadius, depth + 1, maxDepth, treeGroup, animateDepth);
      buildTree(tip, dir2, newLength, newRadius, depth + 1, maxDepth, treeGroup, animateDepth);
    }
  }

  function clearTree() {
    while (treeGroup.children.length > 0) {
      const child = treeGroup.children[0];
      treeGroup.remove(child);
      if (child.geometry) child.geometry.dispose();
      if (child.material) child.material.dispose();
    }
    branchMeshes = [];
    branchIdCounter = 0;
    selectedBranchId = null;
  }

  function regenerateTree(animateDepth) {
    clearTree();
    randomSeed = 42;
    const startPos = new THREE.Vector3(0, 0, 0);
    const startDir = new THREE.Vector3(0, 1, 0);
    buildTree(startPos, startDir, 3.0, 0.15, 0, currentDepth - 1, treeGroup, animateDepth);
    updateState();
    updateHUD();
    updateButtons();
  }

  function getTreeHeight() {
    let maxY = 0;
    branchMeshes.forEach(mesh => {
      const worldPos = new THREE.Vector3();
      mesh.getWorldPosition(worldPos);
      // Approximate tip: position + direction * length
      // Since mesh is oriented, the tip is at local (0, length, 0) transformed
      const length = mesh.geometry.parameters ? mesh.geometry.parameters.height : 3.0;
      // Get the up direction in world space
      const localTip = new THREE.Vector3(0, length || 3.0, 0);
      // Actually, let's compute from bounding box
      mesh.geometry.computeBoundingBox();
      const bb = mesh.geometry.boundingBox;
      if (bb) {
        const topLocal = new THREE.Vector3(0, bb.max.y, 0);
        const topWorld = topLocal.clone();
        mesh.localToWorld(topWorld);
        if (topWorld.y > maxY) maxY = topWorld.y;
      }
    });
    return Math.round(maxY * 100) / 100;
  }

  function getLeafCount() {
    return branchMeshes.filter(m => m.userData.depth >= 4).length;
  }

  function updateState() {
    const state = window.__3D_STATE__;
    state.depth = currentDepth;
    state.branchCount = branchMeshes.length;
    state.branchRatio = branchRatio;
    state.angleSpread = angleSpread;
    state.undoStackSize = undoStack.length;
    state.redoStackSize = redoStack.length;
    state.selectedBranchId = selectedBranchId;
    state.treeHeight = getTreeHeight();
    state.leafCount = getLeafCount();
    state.animating = animating;
  }

  function updateHUD() {
    document.getElementById('hud-depth').textContent = currentDepth;
    document.getElementById('hud-branches').textContent = branchMeshes.length;
    document.getElementById('hud-leaves').textContent = getLeafCount();
  }

  function updateButtons() {
    document.getElementById('btn-grow').disabled = currentDepth >= 7 || animating;
    document.getElementById('btn-prune').disabled = currentDepth <= 1 || animating;
    document.getElementById('btn-undo').disabled = undoStack.length === 0 || animating;
    document.getElementById('btn-redo').disabled = redoStack.length === 0 || animating;
  }

  function pushUndo() {
    undoStack.push({
      depth: currentDepth,
      branchRatio: branchRatio,
      angleSpread: angleSpread
    });
  }

  function clearRedo() {
    redoStack = [];
  }

  // Animation tracking
  let animatingMeshes = [];

  function startGrowAnimation() {
    animating = true;
    animatingMeshes = branchMeshes.filter(m => m.userData.animateGrow);
    const startTime = performance.now();
    animatingMeshes.forEach(m => {
      m.userData.animateStart = startTime;
    });
    updateState();
    updateButtons();
  }

  function updateAnimations() {
    if (!animating) return;

    const now = performance.now();
    let allDone = true;

    animatingMeshes.forEach(mesh => {
      const elapsed = now - mesh.userData.animateStart;
      const progress = Math.min(elapsed / 500, 1);
      // Ease out
      const eased = 1 - Math.pow(1 - progress, 3);
      mesh.scale.set(eased, eased, eased);

      if (progress < 1) allDone = false;
    });

    if (allDone && animatingMeshes.length > 0) {
      animating = false;
      animatingMeshes.forEach(m => {
        m.scale.set(1, 1, 1);
        delete m.userData.animateGrow;
        delete m.userData.animateStart;
      });
      animatingMeshes = [];
      updateState();
      updateButtons();
    } else if (animatingMeshes.length === 0) {
      animating = false;
      updateState();
      updateButtons();
    }
  }

  // Actions
  function grow() {
    if (currentDepth >= 7 || animating) return;
    pushUndo();
    clearRedo();
    currentDepth++;
    regenerateTree(currentDepth - 1);
    startGrowAnimation();
  }

  function prune() {
    if (currentDepth <= 1 || animating) return;
    pushUndo();
    clearRedo();
    currentDepth--;
    regenerateTree(null);
  }

  function undo() {
    if (undoStack.length === 0 || animating) return;
    redoStack.push({
      depth: currentDepth,
      branchRatio: branchRatio,
      angleSpread: angleSpread
    });
    const state = undoStack.pop();
    currentDepth = state.depth;
    branchRatio = state.branchRatio;
    angleSpread = state.angleSpread;
    document.getElementById('slider-angle').value = angleSpread;
    document.getElementById('angle-val').textContent = angleSpread + '°';
    document.getElementById('slider-ratio').value = branchRatio;
    document.getElementById('ratio-val').textContent = branchRatio.toFixed(2);
    regenerateTree(null);
  }

  function redo() {
    if (redoStack.length === 0 || animating) return;
    undoStack.push({
      depth: currentDepth,
      branchRatio: branchRatio,
      angleSpread: angleSpread
    });
    const state = redoStack.pop();
    currentDepth = state.depth;
    branchRatio = state.branchRatio;
    angleSpread = state.angleSpread;
    document.getElementById('slider-angle').value = angleSpread;
    document.getElementById('angle-val').textContent = angleSpread + '°';
    document.getElementById('slider-ratio').value = branchRatio;
    document.getElementById('ratio-val').textContent = branchRatio.toFixed(2);
    regenerateTree(null);
  }

  function reset() {
    if (animating) return;
    currentDepth = 1;
    branchRatio = 0.7;
    angleSpread = 30;
    undoStack = [];
    redoStack = [];
    document.getElementById('slider-angle').value = 30;
    document.getElementById('angle-val').textContent = '30°';
    document.getElementById('slider-ratio').value = 0.7;
    document.getElementById('ratio-val').textContent = '0.70';
    regenerateTree(null);
  }

  // Button events
  document.getElementById('btn-grow').addEventListener('click', grow);
  document.getElementById('btn-prune').addEventListener('click', prune);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-reset').addEventListener('click', reset);

  // Slider events
  let sliderTimeout = null;
  document.getElementById('slider-angle').addEventListener('input', function(e) {
    const val = parseInt(e.target.value);
    document.getElementById('angle-val').textContent = val + '°';
    if (sliderTimeout) clearTimeout(sliderTimeout);
    sliderTimeout = setTimeout(() => {
      if (animating) return;
      pushUndo();
      clearRedo();
      angleSpread = val;
      regenerateTree(null);
    }, 150);
  });

  document.getElementById('slider-ratio').addEventListener('input', function(e) {
    const val = parseFloat(e.target.value);
    document.getElementById('ratio-val').textContent = val.toFixed(2);
    if (sliderTimeout) clearTimeout(sliderTimeout);
    sliderTimeout = setTimeout(() => {
      if (animating) return;
      pushUndo();
      clearRedo();
      branchRatio = val;
      regenerateTree(null);
    }, 150);
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'INPUT') return;

    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      undo();
    } else if (e.ctrlKey && e.key === 'y') {
      e.preventDefault();
      redo();
    } else if (e.key === 'g' || e.key === 'G') {
      grow();
    } else if (e.key === 'p' || e.key === 'P') {
      prune();
    }
  });

  // Raycaster for branch selection
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let previousSelected = null;

  renderer.domElement.addEventListener('click', function(e) {
    // Ignore if clicking on UI
    if (e.target !== renderer.domElement) return;

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(branchMeshes);

    // Deselect previous
    if (previousSelected) {
      previousSelected.material.emissive.setHex(0x000000);
      previousSelected = null;
    }
    selectedBranchId = null;

    if (intersects.length > 0) {
      const mesh = intersects[0].object;
      if (mesh.userData.branchId !== undefined) {
        mesh.material.emissive.setHex(0xffff00);
        selectedBranchId = mesh.userData.branchId;
        previousSelected = mesh;
      }
    }

    updateState();
  });

  // Window resize
  window.addEventListener('resize', function() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Initialize state
  window.__3D_STATE__ = {
    depth: 1,
    branchCount: 0,
    branchRatio: 0.7,
    angleSpread: 30,
    undoStackSize: 0,
    redoStackSize: 0,
    selectedBranchId: null,
    treeHeight: 0,
    leafCount: 0,
    animating: false
  };

  // Build initial tree
  regenerateTree(null);

  // Animation loop
  function animate() {
    requestAnimationFrame(animate);
    updateAnimations();
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
})();
</script>
</body>
</html>
