<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Fractal Tree Generator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 35, 0.85);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3a3a5e;
            color: #e0e0e0;
            width: 260px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            backdrop-filter: blur(4px);
        }
        h2 {
            margin: 0 0 15px 0;
            font-size: 16px;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #3a3a5e;
            padding-bottom: 8px;
        }
        .control-group {
            margin-bottom: 12px;
        }
        .button-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 60px;
            background: #2a2a4a;
            color: #fff;
            border: 1px solid #4a4a7a;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s;
        }
        button:hover:not(:disabled) {
            background: #3a3a6a;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }
        input[type=range] {
            width: 100%;
            accent-color: #6a6aaa;
        }
        #hud-info {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #3a3a5e;
            font-size: 12px;
            line-height: 1.6;
            color: #aaa;
        }
        #hud-info span {
            color: #fff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Fractal Tree</h2>
        
        <div class="button-row">
            <button id="btn-grow" title="Shortcut: G">Grow</button>
            <button id="btn-prune" title="Shortcut: P">Prune</button>
        </div>
        <div class="button-row">
            <button id="btn-undo" title="Shortcut: Ctrl+Z">Undo</button>
            <button id="btn-redo" title="Shortcut: Ctrl+Y">Redo</button>
            <button id="btn-reset">Reset</button>
        </div>

        <div class="control-group">
            <label><span>Angle Spread</span> <span id="val-angle">30°</span></label>
            <input type="range" id="slider-angle" min="10" max="60" step="1" value="30">
        </div>

        <div class="control-group">
            <label><span>Branch Ratio</span> <span id="val-ratio">0.70</span></label>
            <input type="range" id="slider-ratio" min="0.4" max="0.9" step="0.05" value="0.7">
        </div>

        <div id="hud-info">
            Depth: <span id="hud-depth">1</span> / 7<br>
            Branches: <span id="hud-branches">1</span><br>
            Leaves: <span id="hud-leaves">0</span>
        </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Three.js and OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            depth: 1,
            branchCount: 1,
            branchRatio: 0.7,
            angleSpread: 30,
            undoStackSize: 0,
            redoStackSize: 0,
            selectedBranchId: null,
            treeHeight: 3.0,
            leafCount: 0,
            animating: false
        };

        let currentState = {
            depth: 1,
            branchRatio: 0.7,
            angleSpread: 30
        };

        let undoStack = [];
        let redoStack = [];
        let preDragState = null;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 8, 20);
        camera.lookAt(0, 5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 5, 0);

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Ground
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2d5016, roughness: 1.0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // --- Tree System ---
        const treeGroup = new THREE.Group();
        scene.add(treeGroup);

        let branchIdCounter = 0;
        let animations = [];
        let selectedMesh = null;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dummyMatrix = new THREE.Object3D();

        function clearTree() {
            for (let i = treeGroup.children.length - 1; i >= 0; i--) {
                const child = treeGroup.children[i];
                child.geometry.dispose();
                child.material.dispose();
                treeGroup.remove(child);
            }
        }

        function generateTree(animateGrowth = false) {
            clearTree();
            branchIdCounter = 0;
            animations = [];
            window.__3D_STATE__.leafCount = 0;
            window.__3D_STATE__.treeHeight = 0;

            const rootMatrix = new THREE.Matrix4();
            buildBranch(rootMatrix, 0, 3.0, 0.15, animateGrowth);

            window.__3D_STATE__.branchCount = branchIdCounter;
            updateStateAndUI();
        }

        function buildBranch(matrix, level, length, bottomRadius, animateGrowth) {
            if (level >= currentState.depth) return;

            const topRadius = bottomRadius * 0.65;
            const geo = new THREE.CylinderGeometry(topRadius, bottomRadius, length, 8);
            geo.translate(0, length / 2, 0); // Base at origin

            const isLeaf = level >= 3; // Depth >= 4 (0,1,2, 3 is 4th level)
            const color = isLeaf ? 0x228B22 : 0x8B4513;
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.9 });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.applyMatrix4(matrix);
            mesh.userData = { branchId: branchIdCounter++, depth: level };

            if (isLeaf) window.__3D_STATE__.leafCount++;

            // Calculate height
            const tip = new THREE.Vector3(0, length, 0);
            tip.applyMatrix4(matrix);
            if (tip.y > window.__3D_STATE__.treeHeight) {
                window.__3D_STATE__.treeHeight = tip.y;
            }

            // Setup animation
            if (animateGrowth && level === currentState.depth - 1 && level > 0) {
                mesh.scale.set(0, 0, 0);
                animations.push({ mesh, startTime: performance.now() });
            }

            // Restore selection visually if it matches
            if (window.__3D_STATE__.selectedBranchId === mesh.userData.branchId) {
                mesh.material.emissive.setHex(0xffff00);
                selectedMesh = mesh;
            }

            treeGroup.add(mesh);

            // Recursive children
            if (level + 1 < currentState.depth) {
                const childLength = length * currentState.branchRatio;
                const angleRad = currentState.angleSpread * Math.PI / 180;
                
                // Pseudo-random spin for random plane around parent axis, deterministic by ID
                const spin = (Math.sin(branchIdCounter * 12.9898) * 43758.5453) % (Math.PI * 2);

                // Child 1 (+angle)
                dummyMatrix.matrix.identity();
                dummyMatrix.applyMatrix4(matrix);
                dummyMatrix.translateY(length);
                dummyMatrix.rotateY(spin);
                dummyMatrix.rotateX(angleRad);
                dummyMatrix.updateMatrix();
                buildBranch(dummyMatrix.matrix.clone(), level + 1, childLength, topRadius, animateGrowth);

                // Child 2 (-angle)
                dummyMatrix.matrix.identity();
                dummyMatrix.applyMatrix4(matrix);
                dummyMatrix.translateY(length);
                dummyMatrix.rotateY(spin);
                dummyMatrix.rotateX(-angleRad);
                dummyMatrix.updateMatrix();
                buildBranch(dummyMatrix.matrix.clone(), level + 1, childLength, topRadius, animateGrowth);
            }
        }

        // --- State & UI Logic ---
        const btnGrow = document.getElementById('btn-grow');
        const btnPrune = document.getElementById('btn-prune');
        const btnUndo = document.getElementById('btn-undo');
        const btnRedo = document.getElementById('btn-redo');
        const btnReset = document.getElementById('btn-reset');
        const sliderAngle = document.getElementById('slider-angle');
        const sliderRatio = document.getElementById('slider-ratio');
        const valAngle = document.getElementById('val-angle');
        const valRatio = document.getElementById('val-ratio');

        function pushState() {
            undoStack.push(JSON.parse(JSON.stringify(currentState)));
            redoStack = [];
        }

        function updateStateAndUI() {
            window.__3D_STATE__.depth = currentState.depth;
            window.__3D_STATE__.branchRatio = currentState.branchRatio;
            window.__3D_STATE__.angleSpread = currentState.angleSpread;
            window.__3D_STATE__.undoStackSize = undoStack.length;
            window.__3D_STATE__.redoStackSize = redoStack.length;
            window.__3D_STATE__.animating = animations.length > 0;

            // Update DOM
            btnGrow.disabled = currentState.depth >= 7 || window.__3D_STATE__.animating;
            btnPrune.disabled = currentState.depth <= 1 || window.__3D_STATE__.animating;
            btnUndo.disabled = undoStack.length === 0 || window.__3D_STATE__.animating;
            btnRedo.disabled = redoStack.length === 0 || window.__3D_STATE__.animating;

            sliderAngle.value = currentState.angleSpread;
            sliderRatio.value = currentState.branchRatio;
            valAngle.textContent = `${currentState.angleSpread}°`;
            valRatio.textContent = currentState.branchRatio.toFixed(2);

            document.getElementById('hud-depth').textContent = currentState.depth;
            document.getElementById('hud-branches').textContent = window.__3D_STATE__.branchCount;
            document.getElementById('hud-leaves').textContent = window.__3D_STATE__.leafCount;
        }

        function actionGrow() {
            if (currentState.depth < 7 && !window.__3D_STATE__.animating) {
                pushState();
                currentState.depth++;
                generateTree(true);
            }
        }

        function actionPrune() {
            if (currentState.depth > 1 && !window.__3D_STATE__.animating) {
                pushState();
                currentState.depth--;
                generateTree(false);
            }
        }

        function actionUndo() {
            if (undoStack.length > 0 && !window.__3D_STATE__.animating) {
                redoStack.push(JSON.parse(JSON.stringify(currentState)));
                currentState = undoStack.pop();
                generateTree(false);
            }
        }

        function actionRedo() {
            if (redoStack.length > 0 && !window.__3D_STATE__.animating) {
                undoStack.push(JSON.parse(JSON.stringify(currentState)));
                currentState = redoStack.pop();
                generateTree(false);
            }
        }

        function actionReset() {
            if (!window.__3D_STATE__.animating) {
                undoStack = [];
                redoStack = [];
                currentState = { depth: 1, branchRatio: 0.7, angleSpread: 30 };
                window.__3D_STATE__.selectedBranchId = null;
                selectedMesh = null;
                generateTree(false);
            }
        }

        // Event Listeners
        btnGrow.addEventListener('click', actionGrow);
        btnPrune.addEventListener('click', actionPrune);
        btnUndo.addEventListener('click', actionUndo);
        btnRedo.addEventListener('click', actionRedo);
        btnReset.addEventListener('click', actionReset);

        // Sliders
        sliderAngle.addEventListener('pointerdown', () => {
            if (!window.__3D_STATE__.animating) preDragState = JSON.parse(JSON.stringify(currentState));
        });
        sliderAngle.addEventListener('input', (e) => {
            if (window.__3D_STATE__.animating) return;
            currentState.angleSpread = parseInt(e.target.value);
            valAngle.textContent = `${currentState.angleSpread}°`;
            generateTree(false);
        });
        sliderAngle.addEventListener('change', () => {
            if (preDragState && !window.__3D_STATE__.animating) {
                undoStack.push(preDragState);
                redoStack = [];
                preDragState = null;
                updateStateAndUI();
            }
        });

        sliderRatio.addEventListener('pointerdown', () => {
            if (!window.__3D_STATE__.animating) preDragState = JSON.parse(JSON.stringify(currentState));
        });
        sliderRatio.addEventListener('input', (e) => {
            if (window.__3D_STATE__.animating) return;
            currentState.branchRatio = parseFloat(e.target.value);
            valRatio.textContent = currentState.branchRatio.toFixed(2);
            generateTree(false);
        });
        sliderRatio.addEventListener('change', () => {
            if (preDragState && !window.__3D_STATE__.animating) {
                undoStack.push(preDragState);
                redoStack = [];
                preDragState = null;
                updateStateAndUI();
            }
        });

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'g') actionGrow();
            if (e.key.toLowerCase() === 'p') actionPrune();
            if (e.ctrlKey && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                actionUndo();
            }
            if (e.ctrlKey && e.key.toLowerCase() === 'y') {
                e.preventDefault();
                actionRedo();
            }
        });

        // Selection
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('#ui-panel')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(treeGroup.children);

            if (selectedMesh) {
                selectedMesh.material.emissive.setHex(0x000000);
                selectedMesh = null;
                window.__3D_STATE__.selectedBranchId = null;
            }

            if (intersects.length > 0) {
                selectedMesh = intersects[0].object;
                selectedMesh.material.emissive.setHex(0xffff00);
                window.__3D_STATE__.selectedBranchId = selectedMesh.userData.branchId;
            }
            
            updateStateAndUI();
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            if (animations.length > 0) {
                const now = performance.now();
                let allDone = true;
                
                for (let anim of animations) {
                    let progress = (now - anim.startTime) / 500;
                    if (progress > 1.0) progress = 1.0;
                    
                    // Ease out cubic
                    const ease = 1 - Math.pow(1 - progress, 3);
                    anim.mesh.scale.set(ease, ease, ease);
                    
                    if (progress < 1.0) allDone = false;
                }

                if (allDone) {
                    animations = [];
                    updateStateAndUI();
                }
            }

            renderer.render(scene, camera);
        }

        // Init
        generateTree(false);
        animate();

    </script>
</body>
</html>
