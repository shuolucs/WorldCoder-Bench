<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Planetary Orbit Simulator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #050510; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ccc;
    z-index: 10;
    user-select: none;
}

#difficultyLabel {
    font-size: 18px;
    margin-bottom: 10px;
    color: #aaccff;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.btn {
    padding: 8px 16px;
    margin: 4px;
    border: 1px solid #446;
    background: rgba(20, 20, 60, 0.8);
    color: #aaccff;
    cursor: pointer;
    border-radius: 4px;
    font-size: 13px;
    transition: all 0.2s;
}

.btn:hover {
    background: rgba(40, 40, 100, 0.9);
    border-color: #88aaff;
    color: #fff;
}

.btn.active {
    background: rgba(60, 60, 140, 0.9);
    border-color: #aaccff;
    color: #fff;
}

#difficultyButtons { margin-bottom: 15px; }

#simTime, #planetCount {
    font-size: 14px;
    margin: 5px 0;
    color: #88aacc;
}

#topRight {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 10;
}

#startQuizBtn {
    padding: 10px 20px;
    border: 1px solid #664;
    background: rgba(60, 50, 20, 0.8);
    color: #ffdd88;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.2s;
}

#startQuizBtn:hover {
    background: rgba(100, 80, 30, 0.9);
    border-color: #ffdd88;
}

#quizPanel {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(10, 10, 40, 0.95);
    border: 2px solid #4466aa;
    border-radius: 12px;
    padding: 40px;
    z-index: 100;
    text-align: center;
    min-width: 400px;
    box-shadow: 0 0 40px rgba(68, 102, 170, 0.3);
}

#quizPanel h2 {
    color: #aaccff;
    margin-bottom: 25px;
    font-size: 20px;
}

.answer-btn {
    display: block;
    width: 100%;
    padding: 12px 20px;
    margin: 8px 0;
    border: 1px solid #446;
    background: rgba(30, 30, 80, 0.8);
    color: #ccc;
    cursor: pointer;
    border-radius: 6px;
    font-size: 15px;
    transition: all 0.2s;
}

.answer-btn:hover {
    background: rgba(50, 50, 120, 0.9);
    border-color: #88aaff;
    color: #fff;
}

#quizResult {
    margin-top: 15px;
    font-size: 18px;
    font-weight: bold;
    min-height: 30px;
}

#closeQuizBtn {
    margin-top: 20px;
    padding: 10px 30px;
    border: 1px solid #664;
    background: rgba(60, 50, 20, 0.8);
    color: #ffdd88;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.2s;
}

#closeQuizBtn:hover {
    background: rgba(100, 80, 30, 0.9);
}

#pauseIndicator {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255, 255, 255, 0.5);
    font-size: 48px;
    z-index: 50;
    pointer-events: none;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
}

#instructions {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(150, 170, 200, 0.5);
    font-size: 12px;
    z-index: 10;
    text-align: center;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="difficultyLabel">Difficulty: Easy</div>
    <div id="difficultyButtons">
        <button class="btn active" id="easyBtn">Easy</button>
        <button class="btn" id="mediumBtn">Medium</button>
        <button class="btn" id="hardBtn">Hard</button>
    </div>
    <div id="simTime">Time: 0.0s</div>
    <div id="planetCount">Planets: 4</div>
    <button class="btn" id="toggleTrailsBtn">Toggle Trails</button>
</div>

<div id="topRight">
    <button id="startQuizBtn">🪐 Start Quiz</button>
</div>

<div id="quizPanel">
    <h2>Which planet has the fastest orbital speed?</h2>
    <button class="answer-btn" id="answer1">Planet 1 (Blue)</button>
    <button class="answer-btn" id="answer2">Planet 2 (Red)</button>
    <button class="answer-btn" id="answer3">Planet 3 (Green)</button>
    <div id="quizResult"></div>
    <button id="closeQuizBtn">Close Quiz</button>
</div>

<div id="pauseIndicator">⏸ PAUSED</div>

<div id="instructions">
    Space: Pause | 1/2/3: Focus Planet | R: Reset Camera | Mouse: Orbit/Zoom
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
const state = {
    difficulty: 'easy',
    isPaused: false,
    simTime: 0,
    planet1Angle: 0,
    planet2Angle: 0,
    planet3Angle: 0,
    planet1Speed: 0,
    planet2Speed: 0,
    planet3Speed: 0,
    speedMultiplier: 0.5,
    trailsVisible: true,
    quizActive: false,
    quizResult: 'none',
    fishLoaded: false,
    fishAngle: 0,
    planetCount: 4,
    cameraTarget: 'default',
    planet1Radius: 0.8,
    sunPosition: { x: 0, y: 0, z: 0 }
};
window.__3D_STATE__ = state;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.set(0, 40, 50);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
scene.add(ambientLight);

const sunLight = new THREE.PointLight(0xffdd44, 2, 300);
sunLight.position.set(0, 0, 0);
scene.add(sunLight);

// Starfield
const starGeometry = new THREE.BufferGeometry();
const starPositions = new Float32Array(500 * 3);
for (let i = 0; i < 500; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 100 + Math.random() * 100;
    starPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    starPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    starPositions[i * 3 + 2] = r * Math.cos(phi);
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Sun
const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
scene.add(sun);

// Sun glow
const glowGeometry = new THREE.SphereGeometry(3.5, 32, 32);
const glowMaterial = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    transparent: true,
    opacity: 0.2
});
const sunGlow = new THREE.Mesh(glowGeometry, glowMaterial);
scene.add(sunGlow);

// Planet definitions
const planetDefs = [
    { name: 'planet1', color: 0x4488ff, baseRadius: 0.8, orbitRadius: 12 },
    { name: 'planet2', color: 0xff4444, baseRadius: 1.0, orbitRadius: 20 },
    { name: 'planet3', color: 0x44ff66, baseRadius: 0.6, orbitRadius: 30 }
];

// Base speed for planet 1
const baseSpeed = 0.5;

// Calculate Keplerian speeds
const baseSpeeds = planetDefs.map(p => baseSpeed * Math.sqrt(planetDefs[0].orbitRadius) / Math.sqrt(p.orbitRadius));

const planets = [];
const planetMeshes = [];

planetDefs.forEach((def, i) => {
    const geometry = new THREE.SphereGeometry(def.baseRadius, 24, 24);
    const material = new THREE.MeshStandardMaterial({
        color: def.color,
        roughness: 0.5,
        metalness: 0.3
    });
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
    planets.push({
        mesh,
        orbitRadius: def.orbitRadius,
        baseRadius: def.baseRadius,
        baseSpeed: baseSpeeds[i],
        angle: Math.random() * Math.PI * 2
    });
    planetMeshes.push(mesh);
});

// Orbit trails
const trails = [];
planetDefs.forEach(def => {
    const curve = new THREE.EllipseCurve(0, 0, def.orbitRadius, def.orbitRadius, 0, Math.PI * 2, false, 0);
    const points = curve.getPoints(128);
    const trailGeometry = new THREE.BufferGeometry().setFromPoints(
        points.map(p => new THREE.Vector3(p.x, 0, p.y))
    );
    const trailMaterial = new THREE.LineBasicMaterial({
        color: 0x334466,
        transparent: true,
        opacity: 0.4
    });
    const trail = new THREE.LineLoop(trailGeometry, trailMaterial);
    scene.add(trail);
    trails.push(trail);
});

// Fish
let fishMesh = null;
let fishOrbitRadius = 25;
let fishBaseSpeed = baseSpeed * Math.sqrt(planetDefs[0].orbitRadius) / Math.sqrt(fishOrbitRadius);
let fishAngle = Math.random() * Math.PI * 2;

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BarramundiFish/glTF-Binary/BarramundiFish.glb',
    (gltf) => {
        fishMesh = gltf.scene;
        fishMesh.scale.set(0.02, 0.02, 0.02);
        scene.add(fishMesh);
        state.fishLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load fish model:', error);
        // Create a placeholder fish
        const fishGeo = new THREE.ConeGeometry(0.5, 1.5, 8);
        const fishMat = new THREE.MeshStandardMaterial({ color: 0xff88cc, roughness: 0.4 });
        fishMesh = new THREE.Mesh(fishGeo, fishMat);
        fishMesh.rotation.z = Math.PI / 2;
        scene.add(fishMesh);
        state.fishLoaded = true;
    }
);

// Fish orbit trail
const fishCurve = new THREE.EllipseCurve(0, 0, fishOrbitRadius, fishOrbitRadius, 0, Math.PI * 2, false, 0);
const fishPoints = fishCurve.getPoints(128);
const fishTrailGeometry = new THREE.BufferGeometry().setFromPoints(
    fishPoints.map(p => new THREE.Vector3(p.x, 0, p.y))
);
const fishTrailMaterial = new THREE.LineBasicMaterial({
    color: 0x664466,
    transparent: true,
    opacity: 0.3
});
const fishTrail = new THREE.LineLoop(fishTrailGeometry, fishTrailMaterial);
scene.add(fishTrail);
trails.push(fishTrail);

// Difficulty settings
function setDifficulty(level) {
    state.difficulty = level;

    document.querySelectorAll('#difficultyButtons .btn').forEach(b => b.classList.remove('active'));

    switch (level) {
        case 'easy':
            state.speedMultiplier = 0.5;
            state.trailsVisible = true;
            document.getElementById('easyBtn').classList.add('active');
            planets.forEach((p, i) => {
                p.mesh.geometry.dispose();
                p.mesh.geometry = new THREE.SphereGeometry(p.baseRadius, 24, 24);
            });
            state.planet1Radius = planetDefs[0].baseRadius;
            break;
        case 'medium':
            state.speedMultiplier = 1.0;
            state.trailsVisible = false;
            document.getElementById('mediumBtn').classList.add('active');
            planets.forEach((p, i) => {
                p.mesh.geometry.dispose();
                p.mesh.geometry = new THREE.SphereGeometry(p.baseRadius, 24, 24);
            });
            state.planet1Radius = planetDefs[0].baseRadius;
            break;
        case 'hard':
            state.speedMultiplier = 2.0;
            state.trailsVisible = false;
            document.getElementById('hardBtn').classList.add('active');
            planets.forEach((p, i) => {
                p.mesh.geometry.dispose();
                p.mesh.geometry = new THREE.SphereGeometry(p.baseRadius * 0.5, 24, 24);
            });
            state.planet1Radius = planetDefs[0].baseRadius * 0.5;
            break;
    }

    trails.forEach(t => t.visible = state.trailsVisible);
    document.getElementById('difficultyLabel').textContent = `Difficulty: ${level.charAt(0).toUpperCase() + level.slice(1)}`;
}

// UI Event Listeners
document.getElementById('easyBtn').addEventListener('click', () => setDifficulty('easy'));
document.getElementById('mediumBtn').addEventListener('click', () => setDifficulty('medium'));
document.getElementById('hardBtn').addEventListener('click', () => setDifficulty('hard'));

document.getElementById('toggleTrailsBtn').addEventListener('click', () => {
    state.trailsVisible = !state.trailsVisible;
    trails.forEach(t => t.visible = state.trailsVisible);
});

// Quiz
document.getElementById('startQuizBtn').addEventListener('click', () => {
    state.isPaused = true;
    state.quizActive = true;
    state.quizResult = 'none';
    document.getElementById('quizPanel').style.display = 'block';
    document.getElementById('quizResult').textContent = '';
    document.getElementById('pauseIndicator').style.display = 'none';
});

document.getElementById('answer1').addEventListener('click', () => {
    state.quizResult = 'correct';
    const el = document.getElementById('quizResult');
    el.textContent = 'Correct!';
    el.style.color = '#44ff66';
});

document.getElementById('answer2').addEventListener('click', () => {
    state.quizResult = 'wrong';
    const el = document.getElementById('quizResult');
    el.textContent = 'Try Again!';
    el.style.color = '#ff4444';
});

document.getElementById('answer3').addEventListener('click', () => {
    state.quizResult = 'wrong';
    const el = document.getElementById('quizResult');
    el.textContent = 'Try Again!';
    el.style.color = '#ff4444';
});

document.getElementById('closeQuizBtn').addEventListener('click', () => {
    state.quizActive = false;
    state.isPaused = false;
    document.getElementById('quizPanel').style.display = 'none';
    document.getElementById('pauseIndicator').style.display = 'none';
});

// Keyboard controls
const defaultCameraPos = new THREE.Vector3(0, 40, 50);

document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        if (!state.quizActive) {
            state.isPaused = !state.isPaused;
            document.getElementById('pauseIndicator').style.display = state.isPaused ? 'block' : 'none';
        }
    }

    if (e.key === '1') {
        state.cameraTarget = 'planet1';
        const p = planets[0].mesh.position;
        controls.target.set(p.x, p.y, p.z);
    }
    if (e.key === '2') {
        state.cameraTarget = 'planet2';
        const p = planets[1].mesh.position;
        controls.target.set(p.x, p.y, p.z);
    }
    if (e.key === '3') {
        state.cameraTarget = 'planet3';
        const p = planets[2].mesh.position;
        controls.target.set(p.x, p.y, p.z);
    }
    if (e.key === 'r' || e.key === 'R') {
        state.cameraTarget = 'default';
        camera.position.copy(defaultCameraPos);
        controls.target.set(0, 0, 0);
    }
});

// Animation
const clock = new THREE.Clock();
let lastTime = 0;

function mod2PI(angle) {
    return ((angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
}

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();

    if (!state.isPaused) {
        state.simTime += delta;

        // Update planets
        planets.forEach((p, i) => {
            const speed = p.baseSpeed * state.speedMultiplier;
            p.angle = mod2PI(p.angle + speed * delta);

            p.mesh.position.x = Math.cos(p.angle) * p.orbitRadius;
            p.mesh.position.z = Math.sin(p.angle) * p.orbitRadius;
            p.mesh.position.y = 0;
        });

        // Update fish
        if (fishMesh) {
            const fishSpeed = fishBaseSpeed * state.speedMultiplier;
            fishAngle = mod2PI(fishAngle + fishSpeed * delta);

            fishMesh.position.x = Math.cos(fishAngle) * fishOrbitRadius;
            fishMesh.position.z = Math.sin(fishAngle) * fishOrbitRadius;
            fishMesh.position.y = 0;
            fishMesh.rotation.y += delta * 0.5;
        }

        // Sun glow pulse
        const pulse = 1 + Math.sin(state.simTime * 2) * 0.05;
        sunGlow.scale.set(pulse, pulse, pulse);
    }

    // Update camera target tracking
    if (state.cameraTarget === 'planet1') {
        controls.target.lerp(planets[0].mesh.position, 0.1);
    } else if (state.cameraTarget === 'planet2') {
        controls.target.lerp(planets[1].mesh.position, 0.1);
    } else if (state.cameraTarget === 'planet3') {
        controls.target.lerp(planets[2].mesh.position, 0.1);
    }

    controls.update();

    // Update state
    state.planet1Angle = planets[0].angle;
    state.planet2Angle = planets[1].angle;
    state.planet3Angle = planets[2].angle;
    state.planet1Speed = planets[0].baseSpeed * state.speedMultiplier;
    state.planet2Speed = planets[1].baseSpeed * state.speedMultiplier;
    state.planet3Speed = planets[2].baseSpeed * state.speedMultiplier;
    state.fishAngle = fishAngle;
    state.sunPosition = { x: sun.position.x, y: sun.position.y, z: sun.position.z };

    // Update HUD
    document.getElementById('simTime').textContent = `Time: ${state.simTime.toFixed(1)}s`;
    document.getElementById('planetCount').textContent = `Planets: ${state.planetCount}`;

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize
setDifficulty('easy');
animate();
</script>
</body>
</html>
