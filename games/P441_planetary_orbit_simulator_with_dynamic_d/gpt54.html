<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Planetary Orbit Simulator</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #050510;
      font-family: Arial, sans-serif;
      color: white;
    }

    #ui {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      background: rgba(0,0,0,0.35);
      padding: 10px 12px;
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    #difficultyLabel, #simTime, #planetCount {
      margin-bottom: 8px;
      font-size: 14px;
    }

    button {
      margin: 3px 2px;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background: #1d2a44;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #2d426a;
    }

    #startQuizBtn {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      background: #5a2c7a;
    }

    #startQuizBtn:hover {
      background: #78409e;
    }

    #quizPanel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      width: 360px;
      max-width: 90vw;
      background: rgba(10, 10, 30, 0.95);
      border: 1px solid #556;
      border-radius: 12px;
      padding: 20px;
      display: none;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    #quizPanel h2 {
      margin-top: 0;
      font-size: 20px;
    }

    #quizResult {
      margin-top: 12px;
      min-height: 24px;
      font-weight: bold;
    }

    .answerBtn {
      display: block;
      width: 100%;
      margin: 8px 0;
    }

    #helpText {
      margin-top: 8px;
      font-size: 12px;
      color: #cfd8ff;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="difficultyLabel">Difficulty: easy</div>
    <button id="easyBtn">Easy</button>
    <button id="mediumBtn">Medium</button>
    <button id="hardBtn">Hard</button>
    <br />
    <button id="toggleTrailsBtn">Toggle Trails</button>
    <div id="simTime">Simulation Time: 0.0 s</div>
    <div id="planetCount">Planet Count: 4</div>
    <div id="helpText">
      Space: Pause/Resume<br />
      1/2/3: Focus Planet<br />
      R: Reset Camera
    </div>
  </div>

  <button id="startQuizBtn">Start Quiz</button>

  <div id="quizPanel">
    <h2>Orbital Mechanics Quiz</h2>
    <p>Which planet has the fastest orbital speed?</p>
    <button class="answerBtn" id="answer1">Planet 1 (Blue)</button>
    <button class="answerBtn" id="answer2">Planet 2 (Red)</button>
    <button class="answerBtn" id="answer3">Planet 3 (Green)</button>
    <div id="quizResult"></div>
    <button id="closeQuizBtn">Close Quiz</button>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#050510');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 40, 50);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(0xffdd44, 2, 0, 2);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    const sunGeometry = new THREE.SphereGeometry(3, 32, 32);
    const sunMaterial = new THREE.MeshStandardMaterial({
      color: 0xffdd44,
      emissive: 0xffcc22,
      emissiveIntensity: 1.8
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    scene.add(sun);

    const starGeometry = new THREE.BufferGeometry();
    const starPositions = [];
    for (let i = 0; i < 500; i++) {
      const r = 200 * Math.cbrt(Math.random());
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const x = r * Math.sin(phi) * Math.cos(theta);
      const y = r * Math.cos(phi);
      const z = r * Math.sin(phi) * Math.sin(theta);
      starPositions.push(x, y, z);
    }
    starGeometry.setAttribute(
      'position',
      new THREE.Float32BufferAttribute(starPositions, 3)
    );
    const starMaterial = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.8,
      sizeAttenuation: true
    });
    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    const basePlanetData = [
      { name: 'planet1', color: 0x4488ff, radius: 0.8, orbitRadius: 12 },
      { name: 'planet2', color: 0xff4444, radius: 1.0, orbitRadius: 20 },
      { name: 'planet3', color: 0x44ff66, radius: 0.6, orbitRadius: 30 }
    ];

    const baseSpeedPlanet1 = 0.5;
    const baseAngularFactor = baseSpeedPlanet1 * Math.sqrt(12);

    function keplerSpeed(orbitRadius) {
      return baseAngularFactor / Math.sqrt(orbitRadius);
    }

    const planets = [];
    const trailObjects = [];

    basePlanetData.forEach((data, index) => {
      const geometry = new THREE.SphereGeometry(data.radius, 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color: data.color,
        emissive: data.color,
        emissiveIntensity: 0.15
      });
      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      const ringCurve = new THREE.EllipseCurve(
        0, 0,
        data.orbitRadius, data.orbitRadius,
        0, Math.PI * 2,
        false,
        0
      );
      const points2D = ringCurve.getPoints(128);
      const points3D = points2D.map(p => new THREE.Vector3(p.x, 0, p.y));
      const trailGeometry = new THREE.BufferGeometry().setFromPoints(points3D);
      const trailMaterial = new THREE.LineBasicMaterial({
        color: 0x8888aa,
        transparent: true,
        opacity: 0.7
      });
      const trail = new THREE.LineLoop(trailGeometry, trailMaterial);
      scene.add(trail);
      trailObjects.push(trail);

      planets.push({
        ...data,
        mesh,
        angle: (index / 3) * Math.PI * 2,
        speed: keplerSpeed(data.orbitRadius),
        currentRadius: data.radius
      });
    });

    let fish = null;
    let fishLoaded = false;
    let fishAngle = Math.PI / 3;
    const fishOrbitRadius = 25;
    const fishSpeed = keplerSpeed(fishOrbitRadius);

    const loader = new GLTFLoader();
    loader.load(
      'BarramundiFish.glb',
      (gltf) => {
        fish = gltf.scene;
        fish.scale.setScalar(0.02);
        fish.position.set(
          Math.cos(fishAngle) * fishOrbitRadius,
          0,
          Math.sin(fishAngle) * fishOrbitRadius
        );
        scene.add(fish);
        fishLoaded = true;
      },
      undefined,
      (error) => {
        console.warn('Failed to load BarramundiFish.glb', error);
      }
    );

    const difficultyLabel = document.getElementById('difficultyLabel');
    const simTimeLabel = document.getElementById('simTime');
    const planetCountLabel = document.getElementById('planetCount');
    const easyBtn = document.getElementById('easyBtn');
    const mediumBtn = document.getElementById('mediumBtn');
    const hardBtn = document.getElementById('hardBtn');
    const toggleTrailsBtn = document.getElementById('toggleTrailsBtn');
    const startQuizBtn = document.getElementById('startQuizBtn');
    const quizPanel = document.getElementById('quizPanel');
    const answer1 = document.getElementById('answer1');
    const answer2 = document.getElementById('answer2');
    const answer3 = document.getElementById('answer3');
    const quizResultDiv = document.getElementById('quizResult');
    const closeQuizBtn = document.getElementById('closeQuizBtn');

    let difficulty = 'easy';
    let speedMultiplier = 0.5;
    let trailsVisible = true;
    let userTrailOverride = null;
    let isPaused = false;
    let quizActive = false;
    let quizResult = 'none';
    let simTime = 0;
    let cameraTarget = 'default';

    function wrapAngle(a) {
      const twoPi = Math.PI * 2;
      return ((a % twoPi) + twoPi) % twoPi;
    }

    function applyDifficulty(level) {
      difficulty = level;

      if (level === 'easy') {
        speedMultiplier = 0.5;
        setPlanetScales(1.0);
        if (userTrailOverride === null) trailsVisible = true;
      } else if (level === 'medium') {
        speedMultiplier = 1.0;
        setPlanetScales(1.0);
        if (userTrailOverride === null) trailsVisible = false;
      } else if (level === 'hard') {
        speedMultiplier = 2.0;
        setPlanetScales(0.5);
        if (userTrailOverride === null) trailsVisible = false;
      }

      if (userTrailOverride !== null) {
        trailsVisible = userTrailOverride;
      }

      trailObjects.forEach(t => t.visible = trailsVisible);
      difficultyLabel.textContent = `Difficulty: ${difficulty}`;
    }

    function setPlanetScales(multiplier) {
      planets.forEach((planet) => {
        planet.mesh.scale.setScalar(multiplier);
        planet.currentRadius = planet.radius * multiplier;
      });
    }

    easyBtn.addEventListener('click', () => {
      userTrailOverride = null;
      applyDifficulty('easy');
    });

    mediumBtn.addEventListener('click', () => {
      userTrailOverride = null;
      applyDifficulty('medium');
    });

    hardBtn.addEventListener('click', () => {
      userTrailOverride = null;
      applyDifficulty('hard');
    });

    toggleTrailsBtn.addEventListener('click', () => {
      trailsVisible = !trailsVisible;
      userTrailOverride = trailsVisible;
      trailObjects.forEach(t => t.visible = trailsVisible);
    });

    startQuizBtn.addEventListener('click', () => {
      isPaused = true;
      quizActive = true;
      quizResult = 'none';
      quizResultDiv.textContent = '';
      quizResultDiv.style.color = 'white';
      quizPanel.style.display = 'block';
    });

    answer1.addEventListener('click', () => {
      quizResult = 'correct';
      quizResultDiv.textContent = 'Correct!';
      quizResultDiv.style.color = '#44ff66';
    });

    answer2.addEventListener('click', () => {
      quizResult = 'wrong';
      quizResultDiv.textContent = 'Try Again!';
      quizResultDiv.style.color = '#ff5555';
    });

    answer3.addEventListener('click', () => {
      quizResult = 'wrong';
      quizResultDiv.textContent = 'Try Again!';
      quizResultDiv.style.color = '#ff5555';
    });

    closeQuizBtn.addEventListener('click', () => {
      quizPanel.style.display = 'none';
      quizActive = false;
      isPaused = false;
    });

    function focusOnPlanet(index) {
      const planet = planets[index];
      if (!planet) return;
      controls.target.copy(planet.mesh.position);
      if (index === 0) cameraTarget = 'planet1';
      if (index === 1) cameraTarget = 'planet2';
      if (index === 2) cameraTarget = 'planet3';
    }

    function resetCamera() {
      camera.position.set(0, 40, 50);
      controls.target.set(0, 0, 0);
      cameraTarget = 'default';
    }

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        if (!quizActive) isPaused = !isPaused;
      } else if (e.key === '1') {
        focusOnPlanet(0);
      } else if (e.key === '2') {
        focusOnPlanet(1);
      } else if (e.key === '3') {
        focusOnPlanet(2);
      } else if (e.key.toLowerCase() === 'r') {
        resetCamera();
      }
    });

    const clock = new THREE.Clock();

    window.__3D_STATE__ = {
      difficulty: 'easy',
      isPaused: false,
      simTime: 0,
      planet1Angle: planets[0].angle,
      planet2Angle: planets[1].angle,
      planet3Angle: planets[2].angle,
      planet1Speed: planets[0].speed * speedMultiplier,
      planet2Speed: planets[1].speed * speedMultiplier,
      planet3Speed: planets[2].speed * speedMultiplier,
      speedMultiplier,
      trailsVisible,
      quizActive,
      quizResult,
      fishLoaded,
      fishAngle,
      planetCount: 4,
      cameraTarget: 'default',
      planet1Radius: planets[0].currentRadius,
      sunPosition: { x: 0, y: 0, z: 0 }
    };

    applyDifficulty('easy');

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      if (!isPaused) {
        simTime += delta;

        planets.forEach((planet) => {
          const actualSpeed = planet.speed * speedMultiplier;
          planet.angle = wrapAngle(planet.angle + actualSpeed * delta);
          planet.mesh.position.set(
            Math.cos(planet.angle) * planet.orbitRadius,
            0,
            Math.sin(planet.angle) * planet.orbitRadius
          );
        });

        fishAngle = wrapAngle(fishAngle + fishSpeed * speedMultiplier * delta);
        if (fish) {
          fish.position.set(
            Math.cos(fishAngle) * fishOrbitRadius,
            0,
            Math.sin(fishAngle) * fishOrbitRadius
          );
          fish.rotation.y += 0.4 * delta;
        }
      } else {
        planets.forEach((planet) => {
          planet.mesh.position.set(
            Math.cos(planet.angle) * planet.orbitRadius,
            0,
            Math.sin(planet.angle) * planet.orbitRadius
          );
        });

        if (fish) {
          fish.position.set(
            Math.cos(fishAngle) * fishOrbitRadius,
            0,
            Math.sin(fishAngle) * fishOrbitRadius
          );
        }
      }

      simTimeLabel.textContent = `Simulation Time: ${simTime.toFixed(1)} s`;
      planetCountLabel.textContent = `Planet Count: 4`;

      window.__3D_STATE__.difficulty = difficulty;
      window.__3D_STATE__.isPaused = isPaused;
      window.__3D_STATE__.simTime = Number(simTime.toFixed(1));
      window.__3D_STATE__.planet1Angle = wrapAngle(planets[0].angle);
      window.__3D_STATE__.planet2Angle = wrapAngle(planets[1].angle);
      window.__3D_STATE__.planet3Angle = wrapAngle(planets[2].angle);
      window.__3D_STATE__.planet1Speed = planets[0].speed * speedMultiplier;
      window.__3D_STATE__.planet2Speed = planets[1].speed * speedMultiplier;
      window.__3D_STATE__.planet3Speed = planets[2].speed * speedMultiplier;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
      window.__3D_STATE__.trailsVisible = trailsVisible;
      window.__3D_STATE__.quizActive = quizActive;
      window.__3D_STATE__.quizResult = quizResult;
      window.__3D_STATE__.fishLoaded = fishLoaded;
      window.__3D_STATE__.fishAngle = wrapAngle(fishAngle);
      window.__3D_STATE__.planetCount = 4;
      window.__3D_STATE__.cameraTarget = cameraTarget;
      window.__3D_STATE__.planet1Radius = planets[0].currentRadius;
      window.__3D_STATE__.sunPosition = { x: 0, y: 0, z: 0 };

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
