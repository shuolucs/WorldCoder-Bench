<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Planetary Orbit Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .panel {
            background: rgba(10, 10, 30, 0.7);
            border: 1px solid #446;
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #top-left {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #top-right {
            position: absolute;
            top: 20px;
            right: 20px;
            pointer-events: auto;
        }
        #quizPanel {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            min-width: 300px;
            z-index: 100;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: 1px solid #558;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 14px;
        }
        button:hover {
            background: #3a3a6a;
        }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .stat-row {
            font-size: 14px;
            margin-top: 5px;
        }
        #quizResult {
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
            min-height: 24px;
        }
        .correct { color: #44ff44; }
        .wrong { color: #ff4444; }
        .quiz-answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }
        #closeQuizBtn {
            margin-top: 20px;
            background: #555;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            color: #aaa;
            pointer-events: auto;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-layer">
        <div id="top-left" class="panel">
            <div id="difficultyLabel" style="font-weight: bold; font-size: 16px; text-transform: capitalize;">Difficulty: easy</div>
            <div class="btn-group">
                <button id="easyBtn">Easy</button>
                <button id="mediumBtn">Medium</button>
                <button id="hardBtn">Hard</button>
            </div>
            <div style="margin-top: 10px; border-top: 1px solid #446; padding-top: 10px;">
                <div class="stat-row">Time: <span id="simTime">0.0</span>s</div>
                <div class="stat-row">Planets: <span id="planetCount">4</span></div>
            </div>
            <button id="toggleTrailsBtn" style="margin-top: 10px;">Toggle Trails</button>
        </div>

        <div id="top-right">
            <button id="startQuizBtn" class="panel" style="font-weight: bold; font-size: 16px; background: #4a2a6a;">Start Quiz</button>
        </div>

        <div id="quizPanel" class="panel">
            <h2 style="margin-top: 0;">Orbital Mechanics Quiz</h2>
            <p>Which planet has the fastest orbital speed?</p>
            <div class="quiz-answers">
                <button id="answer1" style="border-color: #0044ff;">Planet 1 (Blue)</button>
                <button id="answer2" style="border-color: #ff2222;">Planet 2 (Red)</button>
                <button id="answer3" style="border-color: #22ff22;">Planet 3 (Green)</button>
            </div>
            <div id="quizResult"></div>
            <button id="closeQuizBtn">Close Quiz</button>
        </div>

        <div id="controls-help" class="panel">
            <strong>Controls:</strong><br>
            [Space] Pause/Unpause<br>
            [1, 2, 3] Focus Planet<br>
            [R] Reset Camera<br>
            Left Click: Rotate | Right Click: Pan | Scroll: Zoom
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            difficulty: 'easy',
            isPaused: false,
            simTime: 0,
            planet1Angle: 0,
            planet2Angle: 0,
            planet3Angle: 0,
            planet1Speed: 0,
            planet2Speed: 0,
            planet3Speed: 0,
            speedMultiplier: 0.5,
            trailsVisible: true,
            quizActive: false,
            quizResult: 'none',
            fishLoaded: false,
            fishAngle: 0,
            planetCount: 4,
            cameraTarget: 'default',
            planet1Radius: 0.8,
            sunPosition: { x: 0, y: 0, z: 0 }
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 40, 50);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x222244, 0.3);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xffdd44, 2, 300);
        sunLight.position.set(0, 0, 0);
        scene.add(sunLight);

        // --- Starfield ---
        const starsGeo = new THREE.BufferGeometry();
        const starsPos = new Float32Array(500 * 3);
        for (let i = 0; i < 500; i++) {
            const r = 200 * Math.cbrt(Math.random());
            const theta = Math.random() * 2 * Math.PI;
            const phi = Math.acos(2 * Math.random() - 1);
            starsPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            starsPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            starsPos[i * 3 + 2] = r * Math.cos(phi);
        }
        starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
        const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true, opacity: 0.8 });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // --- Sun ---
        const sunGeo = new THREE.SphereGeometry(3, 32, 32);
        const sunMat = new THREE.MeshBasicMaterial({ color: 0xffdd44 });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // --- Planets ---
        // Kepler approximation: speed = k / sqrt(r)
        // Base speed 0.5 for Planet 1 (r=12) -> k = 0.5 * sqrt(12)
        const k = 0.5 * Math.sqrt(12);

        const planetsData = [
            { id: 1, color: 0x0044ff, radius: 0.8, orbitRadius: 12, angle: Math.random() * Math.PI * 2 },
            { id: 2, color: 0xff2222, radius: 1.0, orbitRadius: 20, angle: Math.random() * Math.PI * 2 },
            { id: 3, color: 0x22ff22, radius: 0.6, orbitRadius: 30, angle: Math.random() * Math.PI * 2 }
        ];

        const planets = [];
        const trails = [];

        planetsData.forEach(data => {
            const baseSpeed = k / Math.sqrt(data.orbitRadius);
            
            const geo = new THREE.SphereGeometry(data.radius, 32, 32);
            const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.4, metalness: 0.1 });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);

            // Trail
            const trailGeo = new THREE.BufferGeometry();
            const trailPts = [];
            const segments = 128;
            for (let i = 0; i <= segments; i++) {
                const a = (i / segments) * Math.PI * 2;
                trailPts.push(new THREE.Vector3(Math.cos(a) * data.orbitRadius, 0, Math.sin(a) * data.orbitRadius));
            }
            trailGeo.setFromPoints(trailPts);
            const trailMat = new THREE.LineBasicMaterial({ color: data.color, transparent: true, opacity: 0.4 });
            const trail = new THREE.LineLoop(trailGeo, trailMat);
            scene.add(trail);
            trails.push(trail);

            planets.push({ ...data, mesh, baseSpeed });
        });

        // --- Easter Egg: Cosmic Fish ---
        let fishMesh = null;
        const fishOrbitRadius = 25;
        const fishBaseSpeed = k / Math.sqrt(fishOrbitRadius);
        
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/BarramundiFish/glTF-Binary/BarramundiFish.glb', (gltf) => {
            fishMesh = gltf.scene;
            fishMesh.scale.set(0.02, 0.02, 0.02);
            scene.add(fishMesh);
            state.fishLoaded = true;
        });

        // --- Logic Functions ---
        function updateTrailsVisibility() {
            trails.forEach(t => t.visible = state.trailsVisible);
        }

        function setPlanetScales(scaleFactor) {
            planets.forEach(p => {
                p.mesh.scale.set(scaleFactor, scaleFactor, scaleFactor);
            });
            state.planet1Radius = planets[0].radius * scaleFactor;
        }

        function setDifficulty(level) {
            state.difficulty = level;
            document.getElementById('difficultyLabel').innerText = `Difficulty: ${level}`;
            
            if (level === 'easy') {
                state.speedMultiplier = 0.5;
                state.trailsVisible = true;
                setPlanetScales(1.0);
            } else if (level === 'medium') {
                state.speedMultiplier = 1.0;
                state.trailsVisible = false;
                setPlanetScales(1.0);
            } else if (level === 'hard') {
                state.speedMultiplier = 2.0;
                state.trailsVisible = false;
                setPlanetScales(0.5);
            }
            updateTrailsVisibility();
        }

        // --- UI Event Listeners ---
        document.getElementById('easyBtn').addEventListener('click', () => setDifficulty('easy'));
        document.getElementById('mediumBtn').addEventListener('click', () => setDifficulty('medium'));
        document.getElementById('hardBtn').addEventListener('click', () => setDifficulty('hard'));

        document.getElementById('toggleTrailsBtn').addEventListener('click', () => {
            state.trailsVisible = !state.trailsVisible;
            updateTrailsVisibility();
        });

        // Quiz Logic
        const quizPanel = document.getElementById('quizPanel');
        const quizResult = document.getElementById('quizResult');

        document.getElementById('startQuizBtn').addEventListener('click', () => {
            state.isPaused = true;
            state.quizActive = true;
            state.quizResult = 'none';
            quizResult.innerText = '';
            quizResult.className = '';
            quizPanel.style.display = 'block';
        });

        document.getElementById('closeQuizBtn').addEventListener('click', () => {
            state.isPaused = false;
            state.quizActive = false;
            quizPanel.style.display = 'none';
        });

        function handleAnswer(isCorrect) {
            if (isCorrect) {
                state.quizResult = 'correct';
                quizResult.innerText = 'Correct!';
                quizResult.className = 'correct';
            } else {
                state.quizResult = 'wrong';
                quizResult.innerText = 'Try Again!';
                quizResult.className = 'wrong';
            }
        }

        document.getElementById('answer1').addEventListener('click', () => handleAnswer(true));
        document.getElementById('answer2').addEventListener('click', () => handleAnswer(false));
        document.getElementById('answer3').addEventListener('click', () => handleAnswer(false));

        // --- Keyboard Controls ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                state.isPaused = !state.isPaused;
            } else if (e.key === '1') {
                state.cameraTarget = 'planet1';
            } else if (e.key === '2') {
                state.cameraTarget = 'planet2';
            } else if (e.key === '3') {
                state.cameraTarget = 'planet3';
            } else if (e.key.toLowerCase() === 'r') {
                state.cameraTarget = 'default';
                camera.position.set(0, 40, 50);
                controls.target.set(0, 0, 0);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize default state
        setDifficulty('easy');

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (!state.isPaused) {
                state.simTime += dt;
                document.getElementById('simTime').innerText = state.simTime.toFixed(1);

                const mult = state.speedMultiplier;

                // Update Planets
                planets.forEach((p, index) => {
                    const actualSpeed = p.baseSpeed * mult;
                    p.angle = (p.angle + actualSpeed * dt) % (2 * Math.PI);
                    
                    p.mesh.position.x = Math.cos(p.angle) * p.orbitRadius;
                    p.mesh.position.z = Math.sin(p.angle) * p.orbitRadius;

                    // Update state object
                    state[`planet${index + 1}Angle`] = p.angle;
                    state[`planet${index + 1}Speed`] = actualSpeed;
                });

                // Update Fish
                if (fishMesh) {
                    state.fishAngle = (state.fishAngle + fishBaseSpeed * mult * dt) % (2 * Math.PI);
                    fishMesh.position.x = Math.cos(state.fishAngle) * fishOrbitRadius;
                    fishMesh.position.z = Math.sin(state.fishAngle) * fishOrbitRadius;
                    fishMesh.rotation.y += dt; // Spin on own axis
                }
            }

            // Camera Targeting
            if (state.cameraTarget === 'planet1') {
                controls.target.copy(planets[0].mesh.position);
            } else if (state.cameraTarget === 'planet2') {
                controls.target.copy(planets[1].mesh.position);
            } else if (state.cameraTarget === 'planet3') {
                controls.target.copy(planets[2].mesh.position);
            } else {
                controls.target.set(0, 0, 0);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
