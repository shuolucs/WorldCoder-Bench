<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crane Claw Machine</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    background: rgba(0,0,0,0.7);
    padding: 15px 20px;
    border-radius: 12px;
    font-size: 16px;
    line-height: 1.8;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
}
#hud .label { color: #aaa; font-size: 13px; }
#hud .value { color: #FFD700; font-weight: bold; font-size: 20px; }
#status-text {
    position: absolute;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    background: rgba(0,0,0,0.6);
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    backdrop-filter: blur(5px);
    z-index: 10;
    text-transform: uppercase;
    letter-spacing: 2px;
}
#drop-button {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #ff4444, #cc0000);
    border: 4px solid #ff6666;
    color: #fff;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,0,0,0.4), inset 0 -3px 8px rgba(0,0,0,0.3);
    z-index: 10;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
}
#drop-button:hover { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 20px rgba(255,0,0,0.6), inset 0 -3px 8px rgba(0,0,0,0.3); }
#drop-button:active { transform: translateX(-50%) scale(0.95); }
#reset-button {
    position: absolute;
    top: 15px;
    right: 15px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    backdrop-filter: blur(10px);
    z-index: 10;
    transition: background 0.2s;
}
#reset-button:hover { background: rgba(255,255,255,0.25); }
#controls-hint {
    position: absolute;
    bottom: 20px;
    left: 15px;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    line-height: 1.6;
    z-index: 10;
}
</style>
</head>
<body>

<div id="hud">
    <div><span class="label">SCORE</span><br><span class="value" id="hud-score">0</span></div>
    <div style="margin-top:8px"><span class="label">COLLECTED</span><br><span class="value" id="hud-collected">0 / 6</span></div>
    <div style="margin-top:8px"><span class="label">DROPS</span><br><span class="value" id="hud-drops">0</span></div>
</div>

<div id="status-text">IDLE — Move & Drop!</div>

<button id="drop-button">DROP</button>
<button id="reset-button">↻ Reset</button>

<div id="controls-hint">
    ← → Move X<br>
    ↑ ↓ Move Z<br>
    SPACE Drop<br>
    R Reset
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI / 2.1;
controls.minDistance = 8;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);

// ============ LIGHTS ============
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const warmLight = new THREE.PointLight(0xFFCC88, 0.8, 30);
warmLight.position.set(5, 10, 5);
warmLight.castShadow = true;
warmLight.shadow.mapSize.set(1024, 1024);
scene.add(warmLight);

const coolLight = new THREE.PointLight(0x88CCFF, 0.8, 30);
coolLight.position.set(-5, 10, -5);
coolLight.castShadow = true;
scene.add(coolLight);

// Interior lights
const interiorLight1 = new THREE.PointLight(0xffffff, 0.5, 15);
interiorLight1.position.set(0, 4, 0);
scene.add(interiorLight1);

const interiorLight2 = new THREE.PointLight(0xFF6699, 0.3, 10);
interiorLight2.position.set(0, -3, 0);
scene.add(interiorLight2);

// ============ GLASS BOX (Machine Cabinet) ============
// We'll build the cabinet with individual panels for better visual effect
const glassMaterial = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    transmission: 0.7,
    roughness: 0.1,
    metalness: 0,
    thickness: 0.5,
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide,
    envMapIntensity: 1,
});

const frameMaterial = new THREE.MeshStandardMaterial({
    color: 0x333344,
    metalness: 0.8,
    roughness: 0.3,
});

const cabinetGroup = new THREE.Group();

// Glass panels - front, back, left, right
function createGlassPanel(width, height, pos, rotY) {
    const geo = new THREE.PlaneGeometry(width, height);
    const panel = new THREE.Mesh(geo, glassMaterial);
    panel.position.copy(pos);
    panel.rotation.y = rotY;
    return panel;
}

// Front panel
cabinetGroup.add(createGlassPanel(8, 10, new THREE.Vector3(0, 0, 4), 0));
// Back panel
cabinetGroup.add(createGlassPanel(8, 10, new THREE.Vector3(0, 0, -4), Math.PI));
// Left panel
cabinetGroup.add(createGlassPanel(8, 10, new THREE.Vector3(-4, 0, 0), Math.PI / 2));
// Right panel
cabinetGroup.add(createGlassPanel(8, 10, new THREE.Vector3(4, 0, 0), -Math.PI / 2));

// Frame edges (vertical)
const frameGeo = new THREE.BoxGeometry(0.2, 10, 0.2);
const framePositions = [
    [-4, 0, -4], [-4, 0, 4], [4, 0, -4], [4, 0, 4]
];
framePositions.forEach(p => {
    const frame = new THREE.Mesh(frameGeo, frameMaterial);
    frame.position.set(...p);
    frame.castShadow = true;
    cabinetGroup.add(frame);
});

// Frame edges (horizontal top)
const hFrameGeoX = new THREE.BoxGeometry(8.4, 0.2, 0.2);
const hFrameGeoZ = new THREE.BoxGeometry(0.2, 0.2, 8.4);
[[-4, 4], [4, 4], [-4, -4], [4, -4]].forEach(([z, _], i) => {
    if (i < 2) {
        const f = new THREE.Mesh(hFrameGeoX, frameMaterial);
        f.position.set(0, 5, i === 0 ? -4 : 4);
        cabinetGroup.add(f);
    }
});
// Top horizontal X bars
const topBarX1 = new THREE.Mesh(hFrameGeoX, frameMaterial);
topBarX1.position.set(0, 5, -4);
cabinetGroup.add(topBarX1);
const topBarX2 = new THREE.Mesh(hFrameGeoX, frameMaterial);
topBarX2.position.set(0, 5, 4);
cabinetGroup.add(topBarX2);
// Top horizontal Z bars
const topBarZ1 = new THREE.Mesh(hFrameGeoZ, frameMaterial);
topBarZ1.position.set(-4, 5, 0);
cabinetGroup.add(topBarZ1);
const topBarZ2 = new THREE.Mesh(hFrameGeoZ, frameMaterial);
topBarZ2.position.set(4, 5, 0);
cabinetGroup.add(topBarZ2);

// Bottom horizontal bars
const botBarX1 = new THREE.Mesh(hFrameGeoX, frameMaterial);
botBarX1.position.set(0, -5, -4);
cabinetGroup.add(botBarX1);
const botBarX2 = new THREE.Mesh(hFrameGeoX, frameMaterial);
botBarX2.position.set(0, -5, 4);
cabinetGroup.add(botBarX2);
const botBarZ1 = new THREE.Mesh(hFrameGeoZ, frameMaterial);
botBarZ1.position.set(-4, -5, 0);
cabinetGroup.add(botBarZ1);
const botBarZ2 = new THREE.Mesh(hFrameGeoZ, frameMaterial);
botBarZ2.position.set(4, -5, 0);
cabinetGroup.add(botBarZ2);

scene.add(cabinetGroup);

// ============ FLOOR INSIDE BOX ============
const floorGeo = new THREE.PlaneGeometry(7.8, 7.8);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0xFF6699,
    roughness: 0.6,
    metalness: 0.1,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -4;
floor.receiveShadow = true;
scene.add(floor);

// Floor pattern
const patternCanvas = document.createElement('canvas');
patternCanvas.width = 256;
patternCanvas.height = 256;
const pctx = patternCanvas.getContext('2d');
pctx.fillStyle = '#FF6699';
pctx.fillRect(0, 0, 256, 256);
for (let i = 0; i < 8; i++) {
    for (let j = 0; j < 8; j++) {
        if ((i + j) % 2 === 0) {
            pctx.fillStyle = '#FF88AA';
            pctx.fillRect(i * 32, j * 32, 32, 32);
        }
    }
}
const floorTexture = new THREE.CanvasTexture(patternCanvas);
floorTexture.wrapS = floorTexture.wrapT = THREE.RepeatWrapping;
floorMat.map = floorTexture;
floorMat.needsUpdate = true;

// Base platform under the machine
const baseMat = new THREE.MeshStandardMaterial({ color: 0x222233, metalness: 0.9, roughness: 0.2 });
const baseGeo = new THREE.BoxGeometry(9, 1, 9);
const base = new THREE.Mesh(baseGeo, baseMat);
base.position.y = -5.5;
base.receiveShadow = true;
scene.add(base);

// ============ RAIL SYSTEM ============
const railMat = new THREE.MeshStandardMaterial({ color: 0x888899, metalness: 0.9, roughness: 0.2 });

// X-axis rail (moves along Z)
const xRailGeo = new THREE.BoxGeometry(7.6, 0.15, 0.15);
const xRail = new THREE.Mesh(xRailGeo, railMat);
xRail.position.set(0, 4.5, 0);
scene.add(xRail);

// Z-axis rails (fixed, on both sides)
const zRailGeo = new THREE.BoxGeometry(0.15, 0.15, 7.6);
const zRailLeft = new THREE.Mesh(zRailGeo, railMat);
zRailLeft.position.set(-3.5, 4.5, 0);
scene.add(zRailLeft);
const zRailRight = new THREE.Mesh(zRailGeo, railMat);
zRailRight.position.set(3.5, 4.5, 0);
scene.add(zRailRight);

// Rail carriage (moves along X rail)
const carriageGeo = new THREE.BoxGeometry(0.4, 0.3, 0.4);
const carriageMat = new THREE.MeshStandardMaterial({ color: 0xFFAA00, metalness: 0.7, roughness: 0.3 });
const carriage = new THREE.Mesh(carriageGeo, carriageMat);
carriage.position.set(0, 4.35, 0);
scene.add(carriage);

// ============ CLAW ASSEMBLY ============
const clawGroup = new THREE.Group();
clawGroup.position.set(0, 3, 0);

// Vertical arm
const armGeo = new THREE.CylinderGeometry(0.06, 0.06, 1.5, 8);
const armMat = new THREE.MeshStandardMaterial({ color: 0xCCCCDD, metalness: 0.8, roughness: 0.2 });
const arm = new THREE.Mesh(armGeo, armMat);
arm.position.y = -0.75;
clawGroup.add(arm);

// Claw hub
const hubGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.2, 8);
const hubMat = new THREE.MeshStandardMaterial({ color: 0xFFAA00, metalness: 0.7, roughness: 0.3 });
const hub = new THREE.Mesh(hubGeo, hubMat);
hub.position.y = -1.5;
clawGroup.add(hub);

// Claw fingers (3 fingers)
const fingers = [];
const fingerOpenAngle = Math.PI / 6;
const fingerClosedAngle = Math.PI / 20;

for (let i = 0; i < 3; i++) {
    const fingerGroup = new THREE.Group();
    const angle = (i / 3) * Math.PI * 2;
    fingerGroup.position.y = -1.6;
    fingerGroup.rotation.y = angle;

    const fingerGeo = new THREE.ConeGeometry(0.08, 0.8, 6);
    const fingerMat = new THREE.MeshStandardMaterial({ color: 0xDDDDEE, metalness: 0.8, roughness: 0.2 });
    const finger = new THREE.Mesh(fingerGeo, fingerMat);
    finger.position.set(0.2, -0.3, 0);
    finger.rotation.z = fingerOpenAngle;

    fingerGroup.add(finger);
    clawGroup.add(fingerGroup);
    fingers.push({ group: fingerGroup, mesh: finger });
}

scene.add(clawGroup);

// Wire from carriage to claw
const wireGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
const wireMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
const wire = new THREE.Mesh(wireGeo, wireMat);
scene.add(wire);

// ============ PRIZES ============
const prizes = [];
const prizeData = [
    { name: 'sphere_red', color: 0xff3333, pos: [-2, -3.6, 0] },
    { name: 'sphere_blue', color: 0x3333ff, pos: [0, -3.6, -2] },
    { name: 'sphere_green', color: 0x33cc33, pos: [2, -3.6, 1.5] },
    { name: 'sphere_yellow', color: 0xffcc00, pos: [-1, -3.6, 2] },
    { name: 'sphere_purple', color: 0xaa33ff, pos: [1.5, -3.6, -1.5] },
];

function createPrizes() {
    prizeData.forEach(data => {
        const geo = new THREE.SphereGeometry(0.4, 24, 24);
        const mat = new THREE.MeshStandardMaterial({
            color: data.color,
            roughness: 0.3,
            metalness: 0.2,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(...data.pos);
        mesh.castShadow = true;
        mesh.userData = {
            name: data.name,
            restY: data.pos[1],
            collected: false,
            held: false,
            falling: false,
            fallVelocity: 0,
            type: 'sphere',
        };
        scene.add(mesh);
        prizes.push(mesh);
    });
}
createPrizes();

// ============ ANTIQUE CAMERA MODEL ============
let cameraModel = null;
const loader = new GLTFLoader();

function loadCameraModel() {
    loader.load(
        'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/AntiqueCamera/glTF-Binary/AntiqueCamera.glb',
        (gltf) => {
            cameraModel = gltf.scene;
            cameraModel.scale.set(0.5, 0.5, 0.5);
            cameraModel.position.set(1, -3.5, 1);
            cameraModel.castShadow = true;
            cameraModel.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                }
            });
            cameraModel.userData = {
                name: 'antique_camera',
                restY: -3.5,
                collected: false,
                held: false,
                falling: false,
                fallVelocity: 0,
                type: 'camera',
            };
            scene.add(cameraModel);
            prizes.push(cameraModel);
            gameState.cameraModelLoaded = true;
            updateExposedState();
        },
        undefined,
        (error) => {
            console.warn('Failed to load AntiqueCamera.glb, creating placeholder:', error);
            // Create a placeholder
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(0.6, 0.8, 0.5);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.7 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            group.add(body);
            const lensGeo = new THREE.CylinderGeometry(0.15, 0.2, 0.3, 12);
            const lensMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8 });
            const lens = new THREE.Mesh(lensGeo, lensMat);
            lens.rotation.x = Math.PI / 2;
            lens.position.z = 0.4;
            group.add(lens);
            const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 1, 6);
            const legMat = new THREE.MeshStandardMaterial({ color: 0x654321 });
            for (let i = 0; i < 3; i++) {
                const leg = new THREE.Mesh(legGeo, legMat);
                const a = (i / 3) * Math.PI * 2;
                leg.position.set(Math.cos(a) * 0.25, -0.8, Math.sin(a) * 0.25);
                leg.rotation.z = Math.sin(a) * 0.15;
                leg.rotation.x = Math.cos(a) * 0.15;
                group.add(leg);
            }
            group.scale.set(0.5, 0.5, 0.5);
            group.position.set(1, -3.5, 1);
            group.userData = {
                name: 'antique_camera',
                restY: -3.5,
                collected: false,
                held: false,
                falling: false,
                fallVelocity: 0,
                type: 'camera',
            };
            scene.add(group);
            prizes.push(group);
            cameraModel = group;
            gameState.cameraModelLoaded = true;
            updateExposedState();
        }
    );
}
loadCameraModel();

// ============ DROP CHUTE ============
const chuteGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
const chuteMat = new THREE.MeshPhysicalMaterial({
    color: 0x44ff44,
    transmission: 0.5,
    roughness: 0.1,
    transparent: true,
    opacity: 0.3,
    side: THREE.DoubleSide,
});
const chute = new THREE.Mesh(chuteGeo, chuteMat);
chute.position.set(5, -2, 0);
scene.add(chute);

// Chute label
const chuteLabelGeo = new THREE.BoxGeometry(1.5, 0.4, 0.05);
const chuteLabelMat = new THREE.MeshStandardMaterial({ color: 0x44ff44, emissive: 0x22aa22, emissiveIntensity: 0.5 });
const chuteLabel = new THREE.Mesh(chuteLabelGeo, chuteLabelMat);
chuteLabel.position.set(5, -0.3, 0.78);
scene.add(chuteLabel);

// ============ GROUND PLANE ============
const groundGeo = new THREE.PlaneGeometry(50, 50);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -6;
ground.receiveShadow = true;
scene.add(ground);

// ============ GAME STATE ============
const gameState = {
    clawX: 0,
    clawZ: 0,
    clawY: 3,
    clawState: 'idle',
    clawOpen: true,
    prizesRemaining: 6,
    prizesCollected: 0,
    heldPrize: null,
    cameraModelLoaded: false,
    gameActive: true,
    dropCount: 0,
    score: 0,
};

function updateExposedState() {
    window.__3D_STATE__ = { ...gameState };
}
updateExposedState();

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (e.code === 'Space') {
        e.preventDefault();
        triggerDrop();
    }
    if (e.code === 'KeyR') {
        resetGame();
    }
});
window.addEventListener('keyup', (e) => {
    keys[e.code] = false;
});

document.getElementById('drop-button').addEventListener('click', triggerDrop);
document.getElementById('reset-button').addEventListener('click', resetGame);

function triggerDrop() {
    if (gameState.clawState === 'idle' && gameState.gameActive) {
        gameState.clawState = 'descending';
        gameState.dropCount++;
        updateExposedState();
    }
}

function resetGame() {
    // Remove all current prizes
    prizes.forEach(p => {
        scene.remove(p);
    });
    prizes.length = 0;

    // Reset state
    gameState.clawX = 0;
    gameState.clawZ = 0;
    gameState.clawY = 3;
    gameState.clawState = 'idle';
    gameState.clawOpen = true;
    gameState.prizesRemaining = 6;
    gameState.prizesCollected = 0;
    gameState.heldPrize = null;
    gameState.cameraModelLoaded = false;
    gameState.gameActive = true;
    gameState.dropCount = 0;
    gameState.score = 0;

    // Recreate prizes
    createPrizes();
    cameraModel = null;
    loadCameraModel();

    // Reset claw position
    clawGroup.position.set(0, 3, 0);
    setFingerAngle(fingerOpenAngle);

    updateExposedState();
}

// ============ CLAW MECHANICS ============
const CLAW_MOVE_SPEED = 3;
const CLAW_DESCEND_SPEED = 3;
const CLAW_ASCEND_SPEED = 2;
const CLAW_MIN_Y = -3;
const CLAW_MAX_Y = 3;
const CLAW_X_RANGE = [-3, 3];
const CLAW_Z_RANGE = [-3, 3];
const GRAB_DISTANCE = 1.0;
const DELIVER_X = 4;
const DELIVER_Z = 0;
const FINGER_CLOSE_SPEED = 2;
const FINGER_OPEN_SPEED = 2;

let currentFingerAngle = fingerOpenAngle;
let closeTimer = 0;
let heldPrizeMesh = null;

function setFingerAngle(angle) {
    currentFingerAngle = angle;
    fingers.forEach(f => {
        f.mesh.rotation.z = angle;
        f.mesh.position.x = 0.15 + 0.15 * (angle / fingerOpenAngle);
    });
}

function updateClaw(dt) {
    if (!gameState.gameActive) return;

    switch (gameState.clawState) {
        case 'idle': {
            // Move claw with arrow keys
            if (keys['ArrowLeft']) {
                gameState.clawX -= CLAW_MOVE_SPEED * dt;
            }
            if (keys['ArrowRight']) {
                gameState.clawX += CLAW_MOVE_SPEED * dt;
            }
            if (keys['ArrowUp']) {
                gameState.clawZ -= CLAW_MOVE_SPEED * dt;
            }
            if (keys['ArrowDown']) {
                gameState.clawZ += CLAW_MOVE_SPEED * dt;
            }
            gameState.clawX = Math.max(CLAW_X_RANGE[0], Math.min(CLAW_X_RANGE[1], gameState.clawX));
            gameState.clawZ = Math.max(CLAW_Z_RANGE[0], Math.min(CLAW_Z_RANGE[1], gameState.clawZ));
            gameState.clawY = CLAW_MAX_Y;
            gameState.clawOpen = true;
            setFingerAngle(fingerOpenAngle);
            break;
        }
        case 'descending': {
            gameState.clawY -= CLAW_DESCEND_SPEED * dt;
            if (gameState.clawY <= CLAW_MIN_Y) {
                gameState.clawY = CLAW_MIN_Y;
                gameState.clawState = 'closing';
                closeTimer = 0;
            }
            break;
        }
        case 'closing': {
            closeTimer += dt;
            const t = Math.min(closeTimer / 0.5, 1);
            const angle = THREE.MathUtils.lerp(fingerOpenAngle, fingerClosedAngle, t);
            setFingerAngle(angle);
            if (t >= 1) {
                gameState.clawOpen = false;
                // Check for prize grab
                tryGrabPrize();
                gameState.clawState = 'ascending';
            }
            break;
        }
        case 'ascending': {
            gameState.clawY += CLAW_ASCEND_SPEED * dt;
            if (heldPrizeMesh) {
                // Move held prize with claw
                heldPrizeMesh.position.x = gameState.clawX;
                heldPrizeMesh.position.z = gameState.clawZ;
                heldPrizeMesh.position.y = gameState.clawY - 2;
            }
            if (gameState.clawY >= CLAW_MAX_Y) {
                gameState.clawY = CLAW_MAX_Y;
                if (heldPrizeMesh) {
                    gameState.clawState = 'delivering';
                } else {
                    gameState.clawState = 'idle';
                    gameState.clawOpen = true;
                    setFingerAngle(fingerOpenAngle);
                }
            }
            break;
        }
        case 'delivering': {
            // Move claw to drop chute
            const dx = DELIVER_X - gameState.clawX;
            const dz = DELIVER_Z - gameState.clawZ;
            const dist = Math.sqrt(dx * dx + dz * dz);
            if (dist > 0.1) {
                const speed = 4;
                gameState.clawX += (dx / dist) * speed * dt;
                gameState.clawZ += (dz / dist) * speed * dt;
                if (heldPrizeMesh) {
                    heldPrizeMesh.position.x = gameState.clawX;
                    heldPrizeMesh.position.z = gameState.clawZ;
                    heldPrizeMesh.position.y = gameState.clawY - 2;
                }
            } else {
                gameState.clawX = DELIVER_X;
                gameState.clawZ = DELIVER_Z;
                gameState.clawState = 'releasing';
                closeTimer = 0;
            }
            break;
        }
        case 'releasing': {
            closeTimer += dt;
            const t = Math.min(closeTimer / 0.4, 1);
            const angle = THREE.MathUtils.lerp(fingerClosedAngle, fingerOpenAngle, t);
            setFingerAngle(angle);
            if (t >= 1) {
                gameState.clawOpen = true;
                // Release prize
                if (heldPrizeMesh) {
                    heldPrizeMesh.userData.held = false;
                    heldPrizeMesh.userData.falling = true;
                    heldPrizeMesh.userData.fallVelocity = 0;
                    heldPrizeMesh.userData.collected = true;

                    // Score
                    if (heldPrizeMesh.userData.name === 'antique_camera') {
                        gameState.score += 50;
                    } else {
                        gameState.score += 10;
                    }
                    gameState.prizesCollected++;
                    gameState.prizesRemaining = countRemainingPrizes();
                    gameState.heldPrize = null;
                    heldPrizeMesh = null;
                }
                // Return claw to center
                gameState.clawState = 'idle';
                gameState.clawX = 0;
                gameState.clawZ = 0;
            }
            break;
        }
    }

    // Update claw group position
    clawGroup.position.set(gameState.clawX, gameState.clawY, gameState.clawZ);

    // Update rail and carriage
    xRail.position.z = gameState.clawZ;
    carriage.position.set(gameState.clawX, 4.35, gameState.clawZ);

    // Update wire
    const wireTop = new THREE.Vector3(gameState.clawX, 4.35, gameState.clawZ);
    const wireBot = new THREE.Vector3(gameState.clawX, gameState.clawY, gameState.clawZ);
    const wireLen = wireTop.distanceTo(wireBot);
    wire.scale.y = wireLen > 0.01 ? wireLen : 0.01;
    wire.position.copy(wireTop).lerp(wireBot, 0.5);

    updateExposedState();
}

function tryGrabPrize() {
    let nearest = null;
    let nearestDist = Infinity;

    prizes.forEach(p => {
        if (p.userData.collected || p.userData.held) return;
        const dx = p.position.x - gameState.clawX;
        const dz = p.position.z - gameState.clawZ;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < GRAB_DISTANCE && dist < nearestDist) {
            nearest = p;
            nearestDist = dist;
        }
    });

    if (nearest) {
        nearest.userData.held = true;
        heldPrizeMesh = nearest;
        gameState.heldPrize = nearest.userData.name;
    }
}

function countRemainingPrizes() {
    return prizes.filter(p => !p.userData.collected && !p.userData.held).length;
}

// ============ PHYSICS (simple gravity for falling prizes) ============
function updatePrizePhysics(dt) {
    prizes.forEach(p => {
        if (p.userData.falling) {
            p.userData.fallVelocity += 9.8 * dt;
            p.position.y -= p.userData.fallVelocity * dt;

            // If collected and falling past the chute floor
            if (p.userData.collected && p.position.y < -6) {
                p.userData.falling = false;
                p.visible = false;
            }
            // If not collected, stop at floor
            if (!p.userData.collected && p.position.y <= p.userData.restY) {
                p.position.y = p.userData.restY;
                p.userData.falling = false;
                p.userData.fallVelocity = 0;
            }
        }
    });
}

// ============ HUD UPDATE ============
function updateHUD() {
    document.getElementById('hud-score').textContent = gameState.score;
    document.getElementById('hud-collected').textContent = `${gameState.prizesCollected} / 6`;
    document.getElementById('hud-drops').textContent = gameState.dropCount;

    const stateLabels = {
        'idle': 'IDLE — Move & Drop!',
        'descending': '⬇ DESCENDING...',
        'closing': '✊ GRABBING...',
        'ascending': '⬆ ASCENDING...',
        'delivering': '➡ DELIVERING...',
        'releasing': '📦 RELEASING!',
    };
    document.getElementById('status-text').textContent = stateLabels[gameState.clawState] || gameState.clawState;

    // Check win
    if (gameState.prizesCollected >= 6 && gameState.gameActive) {
        document.getElementById('status-text').textContent = '🎉 ALL PRIZES COLLECTED! Press R to reset.';
    }
}

// ============ DECORATIVE ELEMENTS ============
// Add some particle-like stars in background
const starGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 200; i++) {
    starPositions.push(
        (Math.random() - 0.5) * 40,
        Math.random() * 20 + 5,
        (Math.random() - 0.5) * 40
    );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// ============ SHADOW INDICATOR (claw position on floor) ============
const indicatorGeo = new THREE.RingGeometry(0.3, 0.5, 32);
const indicatorMat = new THREE.MeshBasicMaterial({ color: 0xFFAA00, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
const indicator = new THREE.Mesh(indicatorGeo, indicatorMat);
indicator.rotation.x = -Math.PI / 2;
indicator.position.y = -3.99;
scene.add(indicator);

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);

    updateClaw(dt);
    updatePrizePhysics(dt);
    updateHUD();

    // Update indicator position
    indicator.position.x = gameState.clawX;
    indicator.position.z = gameState.clawZ;
    indicator.material.opacity = gameState.clawState === 'idle' ? 0.4 + Math.sin(Date.now() * 0.005) * 0.2 : 0.2;

    // Gentle rotation for spheres
    prizes.forEach(p => {
        if (p.userData.type === 'sphere' && !p.userData.held && !p.userData.falling && !p.userData.collected) {
            p.rotation.y += dt * 0.5;
        }
    });

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
