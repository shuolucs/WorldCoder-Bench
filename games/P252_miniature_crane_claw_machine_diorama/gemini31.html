<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Claw Machine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            border: 2px solid #ff6699;
            pointer-events: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        #hud h2 { margin: 0 0 10px 0; font-size: 20px; color: #ffcc88; }
        .hud-stat { margin: 5px 0; font-size: 16px; font-weight: bold; }
        
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            pointer-events: none;
        }

        #status-text {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            color: #88ccff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
        }

        #reset-button {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #444;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #reset-button:hover { background: #666; }

        #drop-button {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #ff4d4d, #cc0000);
            border: 4px solid #880000;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 -5px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        #drop-button:active {
            transform: translateX(-50%) translateY(5px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 -2px 5px rgba(0,0,0,0.3);
        }
        #drop-button:disabled {
            background: radial-gradient(circle at 30% 30%, #888, #555);
            border-color: #333;
            cursor: not-allowed;
            transform: translateX(-50%);
            box-shadow: none;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
    <!-- Three.js and GLTFLoader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <h2>Claw Machine</h2>
        <div class="hud-stat">Score: <span id="ui-score">0</span></div>
        <div class="hud-stat">Collected: <span id="ui-collected">0</span>/6</div>
        <div class="hud-stat">Drops Used: <span id="ui-drops">0</span></div>
    </div>

    <div id="status-text">IDLE</div>
    <div id="controls-help">Arrows: Move | Space/Btn: Drop | R: Reset</div>
    
    <button id="reset-button">Reset Game (R)</button>
    <button id="drop-button">DROP</button>
    <div id="loading">Loading Camera Model...</div>

    <script>
        // --- State Management ---
        window.__3D_STATE__ = {
            clawX: 0,
            clawZ: 0,
            clawY: 3,
            clawState: 'idle', // 'idle' | 'descending' | 'closing' | 'ascending' | 'delivering' | 'releasing'
            clawOpen: true,
            prizesRemaining: 6,
            prizesCollected: 0,
            heldPrize: null,
            cameraModelLoaded: false,
            gameActive: true,
            dropCount: 0,
            score: 0
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const warmLight = new THREE.PointLight(0xFFCC88, 0.8, 50);
        warmLight.position.set(5, 10, 5);
        warmLight.castShadow = true;
        scene.add(warmLight);

        const coolLight = new THREE.PointLight(0x88CCFF, 0.8, 50);
        coolLight.position.set(-5, 10, -5);
        coolLight.castShadow = true;
        scene.add(coolLight);

        // --- Environment (Machine) ---
        // Glass Cabinet
        const glassMaterial = new THREE.MeshPhysicalMaterial({
            color: 0xffffff,
            transmission: 0.7,
            opacity: 1,
            metalness: 0,
            roughness: 0.1,
            ior: 1.5,
            thickness: 0.1,
            transparent: true,
            side: THREE.DoubleSide
        });
        const glassGeo = new THREE.BoxGeometry(8, 10, 8);
        const glassBox = new THREE.Mesh(glassGeo, glassMaterial);
        glassBox.position.y = 1; // Center at y=1, bottom at -4, top at 6
        scene.add(glassBox);

        // Edges for the glass box
        const edges = new THREE.EdgesGeometry(glassGeo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x333333, linewidth: 2 }));
        line.position.y = 1;
        scene.add(line);

        // Floor
        const floorGeo = new THREE.PlaneGeometry(7.9, 7.9);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xFF6699, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -3.99; // Slightly above box bottom to avoid z-fighting
        floor.receiveShadow = true;
        scene.add(floor);

        // Drop Chute Hole (Visual)
        const chuteGeo = new THREE.PlaneGeometry(2, 2);
        const chuteMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const chute = new THREE.Mesh(chuteGeo, chuteMat);
        chute.rotation.x = -Math.PI / 2;
        chute.position.set(3, -3.98, 0);
        scene.add(chute);

        // Rails
        const railMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
        const railZ1 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 8), railMat);
        railZ1.rotation.x = Math.PI / 2;
        railZ1.position.set(-3.2, 4.5, 0);
        scene.add(railZ1);
        const railZ2 = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 8), railMat);
        railZ2.rotation.x = Math.PI / 2;
        railZ2.position.set(3.2, 4.5, 0);
        scene.add(railZ2);
        
        const gantryX = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 6.6), railMat);
        gantryX.rotation.z = Math.PI / 2;
        gantryX.position.set(0, 4.5, 0);
        scene.add(gantryX);

        // --- Claw Assembly ---
        const clawAssembly = new THREE.Group();
        scene.add(clawAssembly);

        // String/Cable
        const cableGeo = new THREE.CylinderGeometry(0.02, 0.02, 1);
        const cableMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
        const cable = new THREE.Mesh(cableGeo, cableMat);
        scene.add(cable);

        // Claw Head
        const headGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.5 });
        const clawHead = new THREE.Mesh(headGeo, headMat);
        clawAssembly.add(clawHead);

        // Fingers
        const fingers = [];
        const fingerPivots = [];
        const fingerGeo = new THREE.ConeGeometry(0.08, 1.2, 4);
        fingerGeo.translate(0, -0.6, 0); // Move origin to top
        const fingerMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.7 });

        for (let i = 0; i < 3; i++) {
            const pivot = new THREE.Group();
            const angle = (i / 3) * Math.PI * 2;
            pivot.position.set(Math.cos(angle) * 0.2, -0.1, Math.sin(angle) * 0.2);
            pivot.rotation.y = -angle + Math.PI/2;
            
            const finger = new THREE.Mesh(fingerGeo, fingerMat);
            finger.rotation.z = 0.5; // Initial open angle
            
            pivot.add(finger);
            clawAssembly.add(pivot);
            fingers.push(finger);
            fingerPivots.push(pivot);
        }

        clawAssembly.position.set(0, 3, 0);

        // --- Prizes ---
        const prizes = [];
        const initialPrizeData = [
            { id: 'sphere_red', type: 'sphere', pos: [-2, -3.6, 0], color: 0xff0000, points: 10 },
            { id: 'sphere_blue', type: 'sphere', pos: [0, -3.6, -2], color: 0x0000ff, points: 10 },
            { id: 'sphere_green', type: 'sphere', pos: [2, -3.6, 1.5], color: 0x00ff00, points: 10 },
            { id: 'sphere_yellow', type: 'sphere', pos: [-1, -3.6, 2], color: 0xffff00, points: 10 },
            { id: 'sphere_purple', type: 'sphere', pos: [1.5, -3.6, -1.5], color: 0x800080, points: 10 },
            { id: 'antique_camera', type: 'model', pos: [1, -3.5, 1], points: 50 }
        ];

        const sphereGeo = new THREE.SphereGeometry(0.4, 32, 32);
        
        function createPrizes() {
            // Clear existing
            prizes.forEach(p => scene.remove(p.mesh));
            prizes.length = 0;

            initialPrizeData.forEach(data => {
                let mesh;
                if (data.type === 'sphere') {
                    const mat = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.3, metalness: 0.2 });
                    mesh = new THREE.Mesh(sphereGeo, mat);
                    mesh.position.set(...data.pos);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                    prizes.push({ ...data, mesh: mesh, state: 'floor', velocityY: 0 });
                } else if (data.type === 'model') {
                    // Placeholder until loaded
                    mesh = new THREE.Group();
                    mesh.position.set(...data.pos);
                    scene.add(mesh);
                    const prizeObj = { ...data, mesh: mesh, state: 'floor', velocityY: 0 };
                    prizes.push(prizeObj);

                    // Load GLTF
                    document.getElementById('loading').style.display = 'block';
                    const loader = new THREE.GLTFLoader();
                    // Using a reliable raw github content link for the Khronos sample model
                    loader.load('https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/AntiqueCamera/glTF/AntiqueCamera.gltf', 
                        (gltf) => {
                            const model = gltf.scene;
                            model.scale.set(0.5, 0.5, 0.5);
                            
                            // Center the model
                            const box = new THREE.Box3().setFromObject(model);
                            const center = box.getCenter(new THREE.Vector3());
                            model.position.sub(center);
                            
                            // Add to placeholder group
                            mesh.add(model);
                            
                            // Enable shadows
                            model.traverse((child) => {
                                if (child.isMesh) {
                                    child.castShadow = true;
                                    child.receiveShadow = true;
                                }
                            });
                            
                            window.__3D_STATE__.cameraModelLoaded = true;
                            document.getElementById('loading').style.display = 'none';
                        },
                        undefined,
                        (error) => {
                            console.error('Error loading model:', error);
                            // Fallback to a special sphere if model fails
                            const fbMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.1 });
                            const fbMesh = new THREE.Mesh(sphereGeo, fbMat);
                            mesh.add(fbMesh);
                            window.__3D_STATE__.cameraModelLoaded = true;
                            document.getElementById('loading').style.display = 'none';
                        }
                    );
                }
            });
        }

        createPrizes();

        // --- Input Handling ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };
        
        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'Space') triggerDrop();
            if (e.code === 'KeyR') resetGame();
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        document.getElementById('drop-button').addEventListener('click', triggerDrop);
        document.getElementById('reset-button').addEventListener('click', resetGame);

        function triggerDrop() {
            if (window.__3D_STATE__.clawState === 'idle') {
                window.__3D_STATE__.clawState = 'descending';
                window.__3D_STATE__.dropCount++;
                updateUI();
            }
        }

        function resetGame() {
            window.__3D_STATE__.clawX = 0;
            window.__3D_STATE__.clawZ = 0;
            window.__3D_STATE__.clawY = 3;
            window.__3D_STATE__.clawState = 'idle';
            window.__3D_STATE__.clawOpen = true;
            window.__3D_STATE__.prizesRemaining = 6;
            window.__3D_STATE__.prizesCollected = 0;
            window.__3D_STATE__.heldPrize = null;
            window.__3D_STATE__.dropCount = 0;
            window.__3D_STATE__.score = 0;
            
            clawAssembly.position.set(0, 3, 0);
            createPrizes();
            updateUI();
        }

        // --- Game Logic & Animation ---
        const clock = new THREE.Clock();
        let animationTimer = 0;
        let grabbedPrize = null;

        function updateUI() {
            document.getElementById('ui-score').innerText = window.__3D_STATE__.score;
            document.getElementById('ui-collected').innerText = window.__3D_STATE__.prizesCollected;
            document.getElementById('ui-drops').innerText = window.__3D_STATE__.dropCount;
            document.getElementById('status-text').innerText = window.__3D_STATE__.clawState;
            
            const btn = document.getElementById('drop-button');
            if (window.__3D_STATE__.clawState !== 'idle') {
                btn.disabled = true;
            } else {
                btn.disabled = false;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap dt
            const state = window.__3D_STATE__;

            if (!state.gameActive) return;

            // Claw State Machine
            switch (state.clawState) {
                case 'idle':
                    // Movement
                    const speed = 3;
                    if (keys.ArrowLeft) state.clawX -= speed * dt;
                    if (keys.ArrowRight) state.clawX += speed * dt;
                    if (keys.ArrowUp) state.clawZ -= speed * dt;
                    if (keys.ArrowDown) state.clawZ += speed * dt;

                    // Clamp
                    state.clawX = Math.max(-3, Math.min(3, state.clawX));
                    state.clawZ = Math.max(-3, Math.min(3, state.clawZ));
                    state.clawOpen = true;
                    break;

                case 'descending':
                    state.clawY -= 3 * dt;
                    if (state.clawY <= -3) {
                        state.clawY = -3;
                        state.clawState = 'closing';
                        animationTimer = 0;
                    }
                    break;

                case 'closing':
                    animationTimer += dt;
                    state.clawOpen = false;
                    
                    if (animationTimer > 0.5) { // Wait half second to close
                        // Check Grab
                        let nearest = null;
                        let minDist = 1.0;
                        
                        prizes.forEach(p => {
                            if (p.state === 'floor') {
                                const dx = p.mesh.position.x - state.clawX;
                                const dz = p.mesh.position.z - state.clawZ;
                                const dist = Math.sqrt(dx*dx + dz*dz);
                                if (dist < minDist) {
                                    minDist = dist;
                                    nearest = p;
                                }
                            }
                        });

                        if (nearest) {
                            grabbedPrize = nearest;
                            grabbedPrize.state = 'held';
                            state.heldPrize = grabbedPrize.id;
                        }
                        
                        state.clawState = 'ascending';
                    }
                    break;

                case 'ascending':
                    state.clawY += 2 * dt;
                    if (state.clawY >= 3) {
                        state.clawY = 3;
                        if (grabbedPrize) {
                            state.clawState = 'delivering';
                        } else {
                            state.clawState = 'idle';
                        }
                    }
                    break;

                case 'delivering':
                    // Move towards (4, 3, 0)
                    const targetX = 3.5; // Slightly inside to drop into chute
                    const targetZ = 0;
                    const dx = targetX - state.clawX;
                    const dz = targetZ - state.clawZ;
                    const dist = Math.sqrt(dx*dx + dz*dz);
                    
                    if (dist < 0.1) {
                        state.clawX = targetX;
                        state.clawZ = targetZ;
                        state.clawState = 'releasing';
                        animationTimer = 0;
                    } else {
                        const moveSpeed = 3 * dt;
                        state.clawX += (dx / dist) * moveSpeed;
                        state.clawZ += (dz / dist) * moveSpeed;
                    }
                    break;

                case 'releasing':
                    animationTimer += dt;
                    state.clawOpen = true;
                    
                    if (animationTimer > 0.2 && grabbedPrize) {
                        grabbedPrize.state = 'falling';
                        grabbedPrize.velocityY = 0;
                        grabbedPrize = null;
                        state.heldPrize = null;
                    }
                    
                    if (animationTimer > 1.0) {
                        state.clawState = 'idle';
                    }
                    break;
            }

            // Update Claw Visuals
            clawAssembly.position.set(state.clawX, state.clawY, state.clawZ);
            gantryX.position.z = state.clawZ;
            
            // Update Cable
            const cableLength = 4.5 - state.clawY;
            cable.scale.y = cableLength;
            cable.position.set(state.clawX, 4.5 - cableLength/2, state.clawZ);

            // Animate Fingers
            const targetAngle = state.clawOpen ? 0.5 : 0.1;
            fingers.forEach(f => {
                f.rotation.z += (targetAngle - f.rotation.z) * 10 * dt;
            });

            // Update Prizes
            prizes.forEach(p => {
                if (p.state === 'held') {
                    // Attach to claw bottom
                    p.mesh.position.set(state.clawX, state.clawY - 0.6, state.clawZ);
                } else if (p.state === 'falling') {
                    // Gravity
                    p.velocityY -= 9.8 * dt;
                    p.mesh.position.y += p.velocityY * dt;
                    
                    // Check collected
                    if (p.mesh.position.y < -10) {
                        p.state = 'collected';
                        scene.remove(p.mesh);
                        state.prizesCollected++;
                        state.prizesRemaining--;
                        state.score += p.points;
                        updateUI();
                    }
                }
            });

            // Sync UI text if state changed
            if (document.getElementById('status-text').innerText !== state.clawState.toUpperCase()) {
                updateUI();
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateUI();
        animate();

    </script>
</body>
</html>
