<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mini Crane Claw Machine Diorama</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      background: rgba(0,0,0,0.45);
      padding: 12px 14px;
      border-radius: 10px;
      line-height: 1.5;
      z-index: 10;
      min-width: 180px;
      backdrop-filter: blur(4px);
    }

    #status-text {
      position: absolute;
      top: 120px;
      left: 16px;
      background: rgba(0,0,0,0.45);
      padding: 8px 12px;
      border-radius: 8px;
      z-index: 10;
    }

    #drop-button {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 92px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 30% 30%, #ff7b7b, #cc1111);
      color: white;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4), inset 0 3px 6px rgba(255,255,255,0.25);
      z-index: 10;
    }

    #drop-button:active {
      transform: translateX(-50%) scale(0.96);
    }

    #reset-button {
      position: absolute;
      top: 16px;
      right: 16px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #ffffffdd;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      z-index: 10;
    }

    #info {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: rgba(0,0,0,0.35);
      padding: 8px 10px;
      border-radius: 8px;
      z-index: 10;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div><strong>Score:</strong> <span id="score-value">0</span></div>
    <div><strong>Prizes Collected:</strong> <span id="collected-value">0</span></div>
    <div><strong>Drops Used:</strong> <span id="drops-value">0</span></div>
  </div>

  <div id="status-text">State: idle</div>

  <button id="reset-button">Reset</button>
  <button id="drop-button">DROP</button>

  <div id="info">
    Arrow Keys: Move claw &nbsp;|&nbsp; Space: Drop &nbsp;|&nbsp; R: Reset
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.159.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.159.0/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer, clock;
    let cabinetGroup, clawCarrier, clawRoot, clawArm, fingersGroup, railGroup;
    let prizes = [];
    let antiqueCameraPrize = null;
    let keys = {};
    let releaseVelocity = new THREE.Vector3();
    let releasePrize = null;
    let releaseTargetFloorY = -3.6;
    let closingTimer = 0;
    let deliveringTarget = new THREE.Vector3(4, 3, 0);

    const DROP_DESCEND_SPEED = 3;
    const ASCEND_SPEED = 2;
    const HORIZONTAL_SPEED = 3;
    const GRAVITY = 9.8;
    const FLOOR_Y_SPHERE = -3.6;
    const FLOOR_Y_CAMERA = -3.5;

    const ui = {
      score: document.getElementById('score-value'),
      collected: document.getElementById('collected-value'),
      drops: document.getElementById('drops-value'),
      status: document.getElementById('status-text'),
      dropButton: document.getElementById('drop-button'),
      resetButton: document.getElementById('reset-button')
    };

    const state = {
      clawX: 0,
      clawZ: 0,
      clawY: 3,
      clawState: 'idle',
      clawOpen: true,
      prizesRemaining: 6,
      prizesCollected: 0,
      heldPrize: null,
      cameraModelLoaded: false,
      gameActive: true,
      dropCount: 0,
      score: 0
    };
    window.__3D_STATE__ = state;

    const spherePrizeDefs = [
      { name: 'sphere_red',    color: 0xff3333, pos: new THREE.Vector3(-2, FLOOR_Y_SPHERE, 0) },
      { name: 'sphere_blue',   color: 0x3366ff, pos: new THREE.Vector3(0, FLOOR_Y_SPHERE, -2) },
      { name: 'sphere_green',  color: 0x33cc66, pos: new THREE.Vector3(2, FLOOR_Y_SPHERE, 1.5) },
      { name: 'sphere_yellow', color: 0xffdd33, pos: new THREE.Vector3(-1, FLOOR_Y_SPHERE, 2) },
      { name: 'sphere_purple', color: 0xaa55ff, pos: new THREE.Vector3(1.5, FLOOR_Y_SPHERE, -1.5) }
    ];

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x181820);

      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 8, 12);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      setupLights();
      setupEnvironment();
      createCabinet();
      createRails();
      createClaw();
      createSpherePrizes();
      loadRarePrize();

      ui.dropButton.addEventListener('click', triggerDrop);
      ui.resetButton.addEventListener('click', resetGame);

      window.addEventListener('keydown', (e) => {
        if (e.code === 'ArrowLeft' || e.code === 'ArrowRight' || e.code === 'ArrowUp' || e.code === 'ArrowDown' || e.code === 'Space' || e.code === 'KeyR') {
          e.preventDefault();
        }
        keys[e.code] = true;

        if (e.code === 'Space') triggerDrop();
        if (e.code === 'KeyR') resetGame();
      });

      window.addEventListener('keyup', (e) => {
        keys[e.code] = false;
      });

      window.addEventListener('resize', onResize);
      syncHUD();
    }

    function setupLights() {
      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      const warm = new THREE.PointLight(0xFFCC88, 0.8, 50);
      warm.position.set(5, 10, 5);
      scene.add(warm);

      const cool = new THREE.PointLight(0x88CCFF, 0.8, 50);
      cool.position.set(-5, 10, -5);
      scene.add(cool);
    }

    function setupEnvironment() {
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(7, 7.5, 1, 48),
        new THREE.MeshStandardMaterial({ color: 0x2a2a35, metalness: 0.15, roughness: 0.85 })
      );
      base.position.y = -5.2;
      scene.add(base);
    }

    function createCabinet() {
      cabinetGroup = new THREE.Group();
      scene.add(cabinetGroup);

      const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xbfe8ff,
        transparent: true,
        opacity: 0.28,
        transmission: 0.7,
        roughness: 0.1,
        metalness: 0,
        thickness: 0.2
      });

      const frameMat = new THREE.MeshStandardMaterial({
        color: 0xdde4ff,
        metalness: 0.4,
        roughness: 0.35
      });

      const floor = new THREE.Mesh(
        new THREE.BoxGeometry(8, 0.3, 8),
        new THREE.MeshStandardMaterial({ color: 0xFF6699, roughness: 0.7, metalness: 0.1 })
      );
      floor.position.y = -4;
      cabinetGroup.add(floor);

      const wallThickness = 0.1;
      const sideGeo = new THREE.BoxGeometry(wallThickness, 10, 8);
      const frontBackGeo = new THREE.BoxGeometry(8, 10, wallThickness);

      const leftWall = new THREE.Mesh(sideGeo, glassMat);
      leftWall.position.set(-4, 0, 0);
      cabinetGroup.add(leftWall);

      const rightWall = new THREE.Mesh(sideGeo, glassMat);
      rightWall.position.set(4, 0, 0);
      cabinetGroup.add(rightWall);

      const backWall = new THREE.Mesh(frontBackGeo, glassMat);
      backWall.position.set(0, 0, -4);
      cabinetGroup.add(backWall);

      const frontWall = new THREE.Mesh(frontBackGeo, glassMat);
      frontWall.position.set(0, 0, 4);
      cabinetGroup.add(frontWall);

      const postGeo = new THREE.BoxGeometry(0.18, 10, 0.18);
      const posts = [
        [-4, 0, -4], [4, 0, -4], [-4, 0, 4], [4, 0, 4]
      ];
      posts.forEach(p => {
        const m = new THREE.Mesh(postGeo, frameMat);
        m.position.set(...p);
        cabinetGroup.add(m);
      });

      const topBarGeoX = new THREE.BoxGeometry(8, 0.18, 0.18);
      const topBarGeoZ = new THREE.BoxGeometry(0.18, 0.18, 8);

      [
        [0, 5, -4], [0, 5, 4]
      ].forEach(p => {
        const m = new THREE.Mesh(topBarGeoX, frameMat);
        m.position.set(...p);
        cabinetGroup.add(m);
      });

      [
        [-4, 5, 0], [4, 5, 0]
      ].forEach(p => {
        const m = new THREE.Mesh(topBarGeoZ, frameMat);
        m.position.set(...p);
        cabinetGroup.add(m);
      });

      const chute = new THREE.Mesh(
        new THREE.BoxGeometry(1.2, 1.2, 2),
        new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6 })
      );
      chute.position.set(4.6, -3.4, 0);
      scene.add(chute);
    }

    function createRails() {
      railGroup = new THREE.Group();
      scene.add(railGroup);

      const railMat = new THREE.MeshStandardMaterial({ color: 0x9999aa, metalness: 0.7, roughness: 0.3 });

      const xRail = new THREE.Mesh(
        new THREE.CylinderGeometry(0.07, 0.07, 6.5, 12),
        railMat
      );
      xRail.rotation.z = Math.PI / 2;
      xRail.position.set(0, 3.7, 0);
      railGroup.add(xRail);

      const zRail = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 6.5, 12),
        railMat
      );
      zRail.rotation.x = Math.PI / 2;
      zRail.position.set(0, 3.55, 0);
      railGroup.add(zRail);

      const motor = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 0.4, 0.8),
        new THREE.MeshStandardMaterial({ color: 0xccccdd, metalness: 0.5, roughness: 0.35 })
      );
      motor.position.set(0, 3.85, 0);
      railGroup.add(motor);
    }

    function createClaw() {
      clawCarrier = new THREE.Group();
      scene.add(clawCarrier);

      clawRoot = new THREE.Group();
      clawCarrier.add(clawRoot);

      const armMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.75, roughness: 0.25 });
      const fingerMat = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.7, roughness: 0.3 });

      clawArm = new THREE.Mesh(
        new THREE.CylinderGeometry(0.06, 0.06, 3, 12),
        armMat
      );
      clawArm.position.set(0, -1.5, 0);
      clawRoot.add(clawArm);

      const clawHub = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 16, 16),
        armMat
      );
      clawHub.position.set(0, -3, 0);
      clawRoot.add(clawHub);

      fingersGroup = new THREE.Group();
      fingersGroup.position.set(0, -3, 0);
      clawRoot.add(fingersGroup);

      for (let i = 0; i < 3; i++) {
        const fingerPivot = new THREE.Group();
        const angle = (i / 3) * Math.PI * 2;
        fingerPivot.rotation.y = angle;

        const finger = new THREE.Mesh(
          new THREE.ConeGeometry(0.08, 0.8, 10),
          fingerMat
        );
        finger.position.set(0.25, -0.35, 0);
        finger.rotation.z = -Math.PI / 2.8;
        finger.userData.baseOpen = 0.7;
        fingerPivot.add(finger);
        fingersGroup.add(fingerPivot);
      }

      setClawPosition(0, 3, 0);
      setClawOpen(true);
    }

    function createSpherePrizes() {
      spherePrizeDefs.forEach(def => {
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(0.4, 20, 20),
          new THREE.MeshStandardMaterial({
            color: def.color,
            roughness: 0.55,
            metalness: 0.15
          })
        );
        mesh.position.copy(def.pos);
        mesh.userData = {
          name: def.name,
          type: 'sphere',
          floorY: FLOOR_Y_SPHERE,
          collected: false,
          held: false,
          released: false,
          scoreValue: 10
        };
        scene.add(mesh);
        prizes.push(mesh);
      });
    }

    function loadRarePrize() {
      const loader = new GLTFLoader();
      loader.load(
        'AntiqueCamera.glb',
        (gltf) => {
          const model = gltf.scene;
          model.scale.setScalar(0.5);
          model.position.set(1, FLOOR_Y_CAMERA, 1);

          let box = new THREE.Box3().setFromObject(model);
          const center = new THREE.Vector3();
          box.getCenter(center);
          model.position.sub(center);
          model.position.add(new THREE.Vector3(1, FLOOR_Y_CAMERA, 1));

          model.traverse(obj => {
            if (obj.isMesh) {
              obj.castShadow = true;
              obj.receiveShadow = true;
            }
          });

          model.userData = {
            name: 'antique_camera',
            type: 'camera',
            floorY: FLOOR_Y_CAMERA,
            collected: false,
            held: false,
            released: false,
            scoreValue: 50
          };

          antiqueCameraPrize = model;
          prizes.push(model);
          scene.add(model);
          state.cameraModelLoaded = true;
        },
        undefined,
        () => {
          const fallback = new THREE.Mesh(
            new THREE.BoxGeometry(0.8, 0.5, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.4 })
          );
          fallback.position.set(1, FLOOR_Y_CAMERA, 1);
          fallback.userData = {
            name: 'antique_camera',
            type: 'camera',
            floorY: FLOOR_Y_CAMERA,
            collected: false,
            held: false,
            released: false,
            scoreValue: 50
          };
          antiqueCameraPrize = fallback;
          prizes.push(fallback);
          scene.add(fallback);
          state.cameraModelLoaded = true;
        }
      );
    }

    function triggerDrop() {
      if (!state.gameActive) return;
      if (state.clawState !== 'idle') return;

      state.clawState = 'descending';
      state.dropCount += 1;
      syncHUD();
    }

    function resetGame() {
      prizes.forEach(p => {
        if (p.parent && p.parent !== scene) p.parent.remove(p);
        if (!scene.children.includes(p)) scene.add(p);
        p.visible = true;
        p.userData.collected = false;
        p.userData.held = false;
        p.userData.released = false;
      });

      spherePrizeDefs.forEach(def => {
        const p = prizes.find(x => x.userData.name === def.name);
        if (p) p.position.copy(def.pos);
      });

      const cameraPrize = prizes.find(x => x.userData.name === 'antique_camera');
      if (cameraPrize) {
        cameraPrize.position.set(1, FLOOR_Y_CAMERA, 1);
      }

      state.clawX = 0;
      state.clawY = 3;
      state.clawZ = 0;
      state.clawState = 'idle';
      state.clawOpen = true;
      state.prizesRemaining = 6;
      state.prizesCollected = 0;
      state.heldPrize = null;
      state.gameActive = true;
      state.dropCount = 0;
      state.score = 0;

      releasePrize = null;
      releaseVelocity.set(0, 0, 0);
      closingTimer = 0;

      setClawPosition(0, 3, 0);
      setClawOpen(true);
      syncHUD();
    }

    function updateIdleMovement(dt) {
      if (state.clawState !== 'idle') return;

      let dx = 0, dz = 0;
      if (keys['ArrowLeft']) dx -= 1;
      if (keys['ArrowRight']) dx += 1;
      if (keys['ArrowUp']) dz -= 1;
      if (keys['ArrowDown']) dz += 1;

      state.clawX = THREE.MathUtils.clamp(state.clawX + dx * HORIZONTAL_SPEED * dt, -3, 3);
      state.clawZ = THREE.MathUtils.clamp(state.clawZ + dz * HORIZONTAL_SPEED * dt, -3, 3);

      setClawPosition(state.clawX, 3, state.clawZ);
    }

    function updateClawSequence(dt) {
      if (state.clawState === 'descending') {
        state.clawY -= DROP_DESCEND_SPEED * dt;
        if (state.clawY <= -3) {
          state.clawY = -3;
          state.clawState = 'closing';
          closingTimer = 0.35;
          attemptGrab();
          setClawOpen(false);
        }
        setClawPosition(state.clawX, state.clawY, state.clawZ);
      } else if (state.clawState === 'closing') {
        closingTimer -= dt;
        if (closingTimer <= 0) {
          state.clawState = 'ascending';
        }
      } else if (state.clawState === 'ascending') {
        state.clawY += ASCEND_SPEED * dt;
        if (state.clawY >= 3) {
          state.clawY = 3;
          if (state.heldPrize) {
            state.clawState = 'delivering';
          } else {
            state.clawState = 'idle';
            setClawOpen(true);
          }
        }
        setClawPosition(state.clawX, state.clawY, state.clawZ);
      } else if (state.clawState === 'delivering') {
        const current = new THREE.Vector3(state.clawX, 3, state.clawZ);
        const dir = deliveringTarget.clone().sub(current);
        const dist = dir.length();
        const speed = 3;

        if (dist < 0.03) {
          state.clawX = deliveringTarget.x;
          state.clawY = deliveringTarget.y;
          state.clawZ = deliveringTarget.z;
          setClawPosition(state.clawX, state.clawY, state.clawZ);
          state.clawState = 'releasing';
          setClawOpen(true);
          releaseHeldPrize();
        } else {
          dir.normalize().multiplyScalar(speed * dt);
          if (dir.length() > dist) dir.setLength(dist);
          state.clawX += dir.x;
          state.clawZ += dir.z;
          state.clawY = 3;
          setClawPosition(state.clawX, state.clawY, state.clawZ);
        }
      } else if (state.clawState === 'releasing') {
        if (!releasePrize) {
          state.clawState = 'idle';
          state.clawX = 0;
          state.clawZ = 0;
          setClawPosition(state.clawX, 3, state.clawZ);
        } else if (releasePrize.userData.collected) {
          state.clawState = 'idle';
          state.clawX = 0;
          state.clawZ = 0;
          setClawPosition(state.clawX, 3, state.clawZ);
        }
      }
    }

    function attemptGrab() {
      let nearest = null;
      let nearestDist = Infinity;

      prizes.forEach(prize => {
        if (!prize.visible) return;
        if (prize.userData.collected || prize.userData.held || prize.userData.released) return;

        const dx = prize.position.x - state.clawX;
        const dz = prize.position.z - state.clawZ;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist <= 1.0 && dist < nearestDist) {
          nearest = prize;
          nearestDist = dist;
        }
      });

      if (nearest) {
        nearest.userData.held = true;
        clawRoot.add(nearest);
        nearest.position.set(0, -3.8, 0);
        state.heldPrize = nearest.userData.name;
      }
    }

    function releaseHeldPrize() {
      const prize = prizes.find(p => p.userData.name === state.heldPrize);
      if (!prize) return;

      const worldPos = new THREE.Vector3();
      prize.getWorldPosition(worldPos);

      clawRoot.remove(prize);
      scene.add(prize);
      prize.position.copy(worldPos);

      prize.userData.held = false;
      prize.userData.released = true;

      releasePrize = prize;
      releaseVelocity.set(0, 0, 0);
      releaseTargetFloorY = -6.5;

      state.heldPrize = null;
    }

    function updateHeldPrize() {
      if (!state.heldPrize) return;
      const prize = prizes.find(p => p.userData.name === state.heldPrize);
      if (!prize) return;
    }

    function updateReleasedPrize(dt) {
      if (!releasePrize) return;

      releaseVelocity.y -= GRAVITY * dt;
      releasePrize.position.y += releaseVelocity.y * dt;

      if (releasePrize.position.y <= releaseTargetFloorY) {
        releasePrize.position.y = releaseTargetFloorY;
        releasePrize.userData.released = false;
        releasePrize.userData.collected = true;
        releasePrize.visible = false;

        state.prizesCollected += 1;
        state.prizesRemaining = Math.max(0, state.prizesRemaining - 1);
        state.score += releasePrize.userData.scoreValue;

        releasePrize = null;
        releaseVelocity.set(0, 0, 0);
        syncHUD();
      }
    }

    function setClawPosition(x, y, z) {
      clawCarrier.position.set(x, y, z);

      const visibleArmLength = Math.max(0.5, 3 - y + 3);
      clawArm.scale.y = visibleArmLength / 3;
      clawArm.position.y = -visibleArmLength / 2;
      clawRoot.position.y = 0;
      const bottomY = -visibleArmLength;
      clawRoot.children[1].position.y = bottomY;
      fingersGroup.position.y = bottomY;

      state.clawX = x;
      state.clawY = y;
      state.clawZ = z;
    }

    function setClawOpen(open) {
      state.clawOpen = open;
      fingersGroup.children.forEach((pivot, i) => {
        const finger = pivot.children[0];
        finger.position.x = open ? 0.32 : 0.16;
        finger.rotation.z = open ? -Math.PI / 2.8 : -Math.PI / 2.15;
      });
    }

    function syncHUD() {
      ui.score.textContent = state.score;
      ui.collected.textContent = state.prizesCollected;
      ui.drops.textContent = state.dropCount;
      ui.status.textContent = `State: ${state.clawState}`;
    }

    function syncState() {
      state.gameActive = true;
      state.prizesRemaining = prizes.filter(p => !p.userData.collected).length;
      window.__3D_STATE__ = {
        clawX: state.clawX,
        clawZ: state.clawZ,
        clawY: state.clawY,
        clawState: state.clawState,
        clawOpen: state.clawOpen,
        prizesRemaining: state.prizesRemaining,
        prizesCollected: state.prizesCollected,
        heldPrize: state.heldPrize,
        cameraModelLoaded: state.cameraModelLoaded,
        gameActive: state.gameActive,
        dropCount: state.dropCount,
        score: state.score
      };
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      updateIdleMovement(dt);
      updateClawSequence(dt);
      updateHeldPrize();
      updateReleasedPrize(dt);

      if (state.clawState !== 'closing') {
        if (state.clawState === 'idle') setClawOpen(true);
      }

      syncHUD();
      syncState();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
