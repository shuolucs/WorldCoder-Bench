<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Interactive Histogram</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #404060;
            pointer-events: none;
            z-index: 10;
        }
        #hud div {
            margin-bottom: 5px;
            font-size: 16px;
        }
        #hud div:last-child {
            margin-bottom: 0;
        }
        #sortBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }
        #sortBtn:hover {
            background: #2980b9;
        }
        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        .bar-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.6);
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
            font-size: 14px;
            white-space: pre-line;
            transform: translate(-50%, -100%);
            border: 1px solid rgba(255,255,255,0.2);
            text-shadow: 1px 1px 2px black;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
</head>
<body>
    <div id="hud">
        <div id="hud-total">Total: 0.0</div>
        <div id="hud-max">Max: None (0.0)</div>
        <div id="hud-selected">Selected: None</div>
    </div>
    <button id="sortBtn">Sort Ascending</button>
    <div id="labels-container"></div>
    <div id="instructions">
        Click: Select | Dbl-Click: Pulse | Up/Down: Change Value | R: Reset | S: Wireframe
    </div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State ---
        window.__3D_STATE__ = {
            barValues: [0,0,0,0,0],
            barHeights: [0,0,0,0,0],
            selectedBarIndex: -1,
            totalValue: 0,
            maxBarIndex: -1,
            maxBarValue: 0,
            sortState: 'none',
            wireframeMode: false,
            fishPosition: {x:0, y:0, z:0},
            fishLoaded: false,
            barPositionsX: [0,0,0,0,0],
            categoryNames: ['Salmon','Trout','Bass','Catfish','Perch'],
            pulsingBarIndex: -1,
            resetCount: 0,
            cameraDistance: 0
        };

        // --- Data ---
        const categories = [
            { name: 'Salmon', initVal: 4.0, color: 0xe74c3c },
            { name: 'Trout', initVal: 7.0, color: 0x3498db },
            { name: 'Bass', initVal: 3.0, color: 0x2ecc71 },
            { name: 'Catfish', initVal: 5.5, color: 0xf39c12 },
            { name: 'Perch', initVal: 6.0, color: 0x9b59b6 }
        ];
        const initialX = [-5, -2.5, 0, 2.5, 5];

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(12, 10, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 15, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 50;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2a2a4a, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Bars & Labels ---
        const bars = [];
        const labels = [];
        const labelsContainer = document.getElementById('labels-container');
        const barGeometry = new THREE.BoxGeometry(1.5, 1, 1.5);

        categories.forEach((cat, i) => {
            const material = new THREE.MeshStandardMaterial({
                color: cat.color,
                metalness: 0.3,
                roughness: 0.6
            });
            const mesh = new THREE.Mesh(barGeometry, material);
            mesh.position.set(initialX[i], cat.initVal / 2, 0);
            mesh.scale.y = cat.initVal;
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { index: i, value: cat.initVal, name: cat.name, color: cat.color };
            scene.add(mesh);
            bars.push(mesh);

            const label = document.createElement('div');
            label.className = 'bar-label';
            labelsContainer.appendChild(label);
            labels.push(label);
        });

        // --- Fish Model ---
        let fishModel = null;
        let currentMaxIndex = -1;
        const loader = new GLTFLoader();
        
        loader.load('._BarramundiFish.glb', (gltf) => {
            fishModel = gltf.scene;
            fishModel.scale.set(1.5, 1.5, 1.5);
            fishModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            scene.add(fishModel);
            checkMaxBar(true); // Initial placement
        }, undefined, (error) => {
            console.warn("Fish model could not be loaded. Ensure '._BarramundiFish.glb' is available.", error);
        });

        // --- Logic Variables ---
        let selectedBarIndex = -1;
        let sortState = 'none';
        let wireframeMode = false;
        let pulsingIndex = -1;
        let pulseTween = null;
        let resetCount = 0;

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // --- Functions ---
        function checkMaxBar(instant = false) {
            let maxVal = -1;
            let maxIdx = -1;
            bars.forEach((b, i) => {
                if (b.userData.value > maxVal) {
                    maxVal = b.userData.value;
                    maxIdx = i;
                }
            });

            if (maxIdx !== currentMaxIndex) {
                currentMaxIndex = maxIdx;
                if (fishModel) {
                    const targetBar = bars[currentMaxIndex];
                    if (instant) {
                        fishModel.position.set(targetBar.position.x, targetBar.userData.value, targetBar.position.z);
                    } else {
                        gsap.to(fishModel.position, {
                            x: targetBar.position.x,
                            y: targetBar.userData.value,
                            z: targetBar.position.z,
                            duration: 1.0,
                            ease: "power2.inOut"
                        });
                    }
                }
            }
        }

        function updateBarValue(index, newVal) {
            const bar = bars[index];
            bar.userData.value = newVal;
            
            gsap.to(bar.scale, { y: newVal, duration: 0.3, ease: "power1.out" });
            gsap.to(bar.position, { y: newVal / 2, duration: 0.3, ease: "power1.out" });

            checkMaxBar();

            if (index === currentMaxIndex && fishModel) {
                gsap.to(fishModel.position, { y: newVal, duration: 0.3, ease: "power1.out" });
            }
        }

        function resetBars() {
            resetCount++;
            bars.forEach((bar, i) => {
                const initVal = categories[i].initVal;
                bar.userData.value = initVal;
                gsap.to(bar.scale, { y: initVal, duration: 0.5, ease: "back.out(1.2)" });
                gsap.to(bar.position, { y: initVal / 2, duration: 0.5, ease: "back.out(1.2)" });
            });

            sortState = 'none';
            document.getElementById('sortBtn').innerText = 'Sort Ascending';
            
            bars.forEach((bar, i) => {
                gsap.to(bar.position, { x: initialX[i], duration: 0.8, ease: "power2.inOut" });
                if (i === currentMaxIndex && fishModel) {
                    gsap.to(fishModel.position, { x: initialX[i], duration: 0.8, ease: "power2.inOut" });
                }
            });

            setTimeout(checkMaxBar, 50);
        }

        function sortBars() {
            const btn = document.getElementById('sortBtn');
            if (sortState === 'none' || sortState === 'descending') {
                sortState = 'ascending';
                btn.innerText = 'Sort Descending';
            } else {
                sortState = 'descending';
                btn.innerText = 'Sort Ascending';
            }

            const indices = [0, 1, 2, 3, 4];
            indices.sort((a, b) => {
                const diff = bars[a].userData.value - bars[b].userData.value;
                return sortState === 'ascending' ? diff : -diff;
            });

            indices.forEach((originalIndex, newPositionIndex) => {
                const targetX = initialX[newPositionIndex];
                gsap.to(bars[originalIndex].position, { x: targetX, duration: 0.8, ease: "power2.inOut" });
                
                if (originalIndex === currentMaxIndex && fishModel) {
                    gsap.to(fishModel.position, { x: targetX, duration: 0.8, ease: "power2.inOut" });
                }
            });
        }

        function updateHUD() {
            let total = 0;
            let maxVal = -1;
            let maxName = '';
            bars.forEach(b => {
                total += b.userData.value;
                if (b.userData.value > maxVal) {
                    maxVal = b.userData.value;
                    maxName = b.userData.name;
                }
            });
            const selName = selectedBarIndex !== -1 ? bars[selectedBarIndex].userData.name : 'None';

            document.getElementById('hud-total').innerText = `Total: ${total.toFixed(1)}`;
            document.getElementById('hud-max').innerText = `Max: ${maxName} (${maxVal.toFixed(1)})`;
            document.getElementById('hud-selected').innerText = `Selected: ${selName}`;
        }

        function round1(val) {
            return Math.round(val * 10) / 10;
        }

        function updateState() {
            window.__3D_STATE__.barValues = bars.map(b => round1(b.userData.value));
            window.__3D_STATE__.barHeights = bars.map(b => round1(b.scale.y));
            window.__3D_STATE__.selectedBarIndex = selectedBarIndex;
            window.__3D_STATE__.totalValue = round1(bars.reduce((sum, b) => sum + b.userData.value, 0));
            window.__3D_STATE__.maxBarIndex = currentMaxIndex;
            window.__3D_STATE__.maxBarValue = currentMaxIndex !== -1 ? round1(bars[currentMaxIndex].userData.value) : 0;
            window.__3D_STATE__.sortState = sortState;
            window.__3D_STATE__.wireframeMode = wireframeMode;
            if (fishModel) {
                window.__3D_STATE__.fishPosition = {
                    x: round1(fishModel.position.x),
                    y: round1(fishModel.position.y),
                    z: round1(fishModel.position.z)
                };
            }
            window.__3D_STATE__.fishLoaded = !!fishModel;
            window.__3D_STATE__.barPositionsX = bars.map(b => round1(b.position.x));
            window.__3D_STATE__.pulsingBarIndex = pulsingIndex;
            window.__3D_STATE__.resetCount = resetCount;
            window.__3D_STATE__.cameraDistance = round1(camera.position.distanceTo(new THREE.Vector3(0,0,0)));
        }

        // --- Event Listeners ---
        document.getElementById('sortBtn').addEventListener('click', sortBars);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function getIntersects(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(bars);
        }

        renderer.domElement.addEventListener('pointerdown', (event) => {
            const intersects = getIntersects(event);
            if (intersects.length > 0) {
                const hitIndex = intersects[0].object.userData.index;
                if (selectedBarIndex !== -1 && selectedBarIndex !== hitIndex) {
                    bars[selectedBarIndex].material.emissive.setHex(0x000000);
                }
                selectedBarIndex = hitIndex;
                bars[selectedBarIndex].material.emissive.setHex(0x444444);
            } else {
                if (selectedBarIndex !== -1) {
                    bars[selectedBarIndex].material.emissive.setHex(0x000000);
                    selectedBarIndex = -1;
                }
            }
        });

        renderer.domElement.addEventListener('dblclick', (event) => {
            const intersects = getIntersects(event);
            if (intersects.length > 0) {
                const hitIndex = intersects[0].object.userData.index;
                if (pulsingIndex === hitIndex) {
                    if (pulseTween) pulseTween.kill();
                    gsap.to(bars[pulsingIndex].scale, { x: 1, z: 1, duration: 0.2 });
                    pulsingIndex = -1;
                } else {
                    if (pulsingIndex !== -1) {
                        if (pulseTween) pulseTween.kill();
                        gsap.to(bars[pulsingIndex].scale, { x: 1, z: 1, duration: 0.2 });
                    }
                    pulsingIndex = hitIndex;
                    pulseTween = gsap.to(bars[pulsingIndex].scale, {
                        x: 1.1, z: 1.1,
                        duration: 0.5,
                        yoyo: true,
                        repeat: -1,
                        ease: "sine.inOut"
                    });
                }
            }
        });

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') {
                wireframeMode = !wireframeMode;
                bars.forEach(b => b.material.wireframe = wireframeMode);
            }
            if (e.key.toLowerCase() === 'r') {
                resetBars();
            }
            if (selectedBarIndex !== -1) {
                let val = bars[selectedBarIndex].userData.value;
                if (e.key === 'ArrowUp') {
                    val = Math.min(10.0, val + 0.5);
                    updateBarValue(selectedBarIndex, val);
                } else if (e.key === 'ArrowDown') {
                    val = Math.max(0.5, val - 0.5);
                    updateBarValue(selectedBarIndex, val);
                }
            }
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            controls.update();

            if (fishModel) {
                fishModel.rotation.y += 0.5 * delta;
            }

            // Update Labels
            bars.forEach((bar, i) => {
                const label = labels[i];
                label.innerText = `${bar.userData.name}\n${bar.userData.value.toFixed(1)}`;
                
                const pos = new THREE.Vector3(bar.position.x, bar.scale.y + 0.5, bar.position.z);
                pos.project(camera);
                
                if (pos.z > 1) {
                    label.style.display = 'none';
                } else {
                    label.style.display = 'block';
                    const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (pos.y * -0.5 + 0.5) * window.innerHeight;
                    label.style.transform = `translate(-50%, -100%) translate(${x}px, ${y}px)`;
                }
            });

            updateHUD();
            updateState();

            renderer.render(scene, camera);
        }

        checkMaxBar(true);
        animate();
    </script>
</body>
</html>
