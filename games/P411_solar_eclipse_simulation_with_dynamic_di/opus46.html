<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Solar Eclipse Simulation</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud-panel {
    position: absolute;
    top: 15px;
    left: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    font-size: 14px;
    line-height: 1.8;
    min-width: 220px;
    backdrop-filter: blur(5px);
}

#hud-panel h2 {
    color: #FFD700;
    margin-bottom: 8px;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

#hud-panel .stat-label { color: #88aacc; }
#hud-panel .stat-value { color: #ffffff; font-weight: bold; }

#difficulty-display {
    display: inline-block;
    background: rgba(255, 165, 0, 0.3);
    padding: 2px 10px;
    border-radius: 5px;
    color: #FFD700;
    font-weight: bold;
}

#controls-panel {
    position: absolute;
    top: 15px;
    right: 15px;
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    font-size: 13px;
    min-width: 200px;
    backdrop-filter: blur(5px);
}

#controls-panel h3 {
    color: #88ccff;
    margin-bottom: 10px;
    font-size: 15px;
}

#controls-panel button {
    display: block;
    width: 100%;
    padding: 8px 12px;
    margin: 5px 0;
    background: rgba(50, 100, 180, 0.5);
    color: #fff;
    border: 1px solid rgba(100, 180, 255, 0.4);
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.2s;
}

#controls-panel button:hover {
    background: rgba(70, 130, 220, 0.7);
    border-color: rgba(100, 180, 255, 0.8);
}

.difficulty-controls {
    display: flex;
    gap: 5px;
    margin: 5px 0;
}

.difficulty-controls button {
    flex: 1;
}

.slider-container {
    margin: 10px 0;
}

.slider-container label {
    display: block;
    margin-bottom: 5px;
    color: #88aacc;
}

#slider-inclination {
    width: 100%;
    accent-color: #4488cc;
}

#info-panel {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0, 0, 0, 0.75);
    color: #e0e0e0;
    padding: 12px 25px;
    border-radius: 10px;
    border: 1px solid rgba(100, 180, 255, 0.3);
    font-size: 14px;
    display: flex;
    gap: 30px;
    backdrop-filter: blur(5px);
}

#info-panel .info-item {
    text-align: center;
}

#info-panel .info-label {
    color: #88aacc;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

#info-panel .info-value {
    color: #ffffff;
    font-weight: bold;
    font-size: 16px;
}

.eclipse-none { color: #666 !important; }
.eclipse-partial { color: #FFA500 !important; }
.eclipse-total { color: #FF4444 !important; }

#spacebar-hint {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255, 255, 255, 0.5);
    font-size: 13px;
    text-align: center;
}

#spacebar-hint kbd {
    background: rgba(255, 255, 255, 0.15);
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid rgba(255, 255, 255, 0.3);
}

#feedback {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 36px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 20px currentColor;
}

#level-up-msg {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: bold;
    color: #FFD700;
    pointer-events: none;
    opacity: 0;
    text-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
}
</style>
</head>
<body>

<div id="hud-panel">
    <h2>☀️ Solar Eclipse</h2>
    <div><span class="stat-label">Score: </span><span class="stat-value" id="score-val">0</span></div>
    <div><span class="stat-label">Level: </span><span id="difficulty-display">1</span></div>
    <div><span class="stat-label">Eclipses Caught: </span><span class="stat-value" id="caught-val">0</span></div>
    <div><span class="stat-label">Accuracy: </span><span class="stat-value" id="accuracy-val">0%</span></div>
</div>

<div id="controls-panel">
    <h3>⚙️ Controls</h3>
    <button id="btn-pause">Pause</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-toggle-orbits">Show Orbit</button>
    <div class="difficulty-controls">
        <button id="btn-difficulty-down">◀ Diff</button>
        <button id="btn-difficulty-up">Diff ▶</button>
    </div>
    <div class="slider-container">
        <label>Inclination: <span id="inclination-val">2.0</span></label>
        <input type="range" id="slider-inclination" min="0" max="10" step="0.1" value="2">
    </div>
</div>

<div id="info-panel">
    <div class="info-item">
        <div class="info-label">Eclipse Intensity</div>
        <div class="info-value" id="intensity-val">0.00</div>
    </div>
    <div class="info-item">
        <div class="info-label">Moon Angle</div>
        <div class="info-value" id="angle-val">0.0°</div>
    </div>
    <div class="info-item">
        <div class="info-label">Eclipse Type</div>
        <div class="info-value" id="type-val">None</div>
    </div>
</div>

<div id="spacebar-hint">Press <kbd>SPACE</kbd> during an eclipse to score points!</div>

<div id="feedback"></div>
<div id="level-up-msg"></div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- Scene Setup ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 10, 40);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;

// --- Ambient Light ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
scene.add(ambientLight);

// --- Starfield ---
const starGeometry = new THREE.SphereGeometry(0.3, 4, 4);
const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
for (let i = 0; i < 250; i++) {
    const star = new THREE.Mesh(starGeometry, starMaterial.clone());
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 400 + Math.random() * 200;
    star.position.set(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    );
    star.material.opacity = 0.5 + Math.random() * 0.5;
    scene.add(star);
}

// --- Sun ---
const sunGeometry = new THREE.SphereGeometry(15, 64, 64);
const sunMaterial = new THREE.MeshBasicMaterial({
    color: 0xFFCC33,
    emissive: 0xFFCC33,
});
const sun = new THREE.Mesh(sunGeometry, sunMaterial);
sun.position.set(0, 0, -200);
scene.add(sun);

// Sun glow
const sunGlowGeometry = new THREE.SphereGeometry(18, 64, 64);
const sunGlowMaterial = new THREE.MeshBasicMaterial({
    color: 0xFFDD44,
    transparent: true,
    opacity: 0.3,
});
const sunGlow = new THREE.Mesh(sunGlowGeometry, sunGlowMaterial);
sunGlow.position.copy(sun.position);
scene.add(sunGlow);

// Sun PointLight
const sunLight = new THREE.PointLight(0xFFDD44, 2, 0, 1);
sunLight.position.copy(sun.position);
scene.add(sunLight);

// --- Corona ---
const coronaGeometry = new THREE.RingGeometry(15.5, 25, 64);
const coronaMaterial = new THREE.MeshBasicMaterial({
    color: 0xFFEECC,
    transparent: true,
    opacity: 0,
    side: THREE.DoubleSide,
});
const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
corona.position.copy(sun.position);
corona.position.z += 1;
scene.add(corona);

// --- Earth ---
const earthGeometry = new THREE.SphereGeometry(5, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({
    color: 0x2244AA,
    shininess: 25,
    specular: 0x333333,
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
earth.position.set(0, 0, 0);
scene.add(earth);

// Earth atmosphere hint
const atmosGeometry = new THREE.SphereGeometry(5.15, 64, 64);
const atmosMaterial = new THREE.MeshPhongMaterial({
    color: 0x4488FF,
    transparent: true,
    opacity: 0.15,
});
const atmosphere = new THREE.Mesh(atmosGeometry, atmosMaterial);
atmosphere.position.copy(earth.position);
scene.add(atmosphere);

// --- Moon ---
const moonGeometry = new THREE.SphereGeometry(1.5, 32, 32);
const moonMaterial = new THREE.MeshPhongMaterial({
    color: 0x888888,
    shininess: 5,
});
const moon = new THREE.Mesh(moonGeometry, moonMaterial);
moon.position.set(20, 0, -50);
scene.add(moon);

// --- Orbit Path ---
const orbitPoints = [];
const orbitSegments = 256;
const semiMajor = 50;
const semiMinor = 45;
for (let i = 0; i <= orbitSegments; i++) {
    const a = (i / orbitSegments) * Math.PI * 2;
    orbitPoints.push(new THREE.Vector3(
        semiMinor * Math.sin(a),
        0,
        -semiMajor * Math.cos(a)
    ));
}
const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
const orbitLine = new THREE.Line(orbitGeometry, new THREE.LineDashedMaterial({
    color: 0x4488cc,
    dashSize: 2,
    gapSize: 1,
    transparent: true,
    opacity: 0.5,
}));
orbitLine.computeLineDistances();
orbitLine.visible = false;
scene.add(orbitLine);

// --- Observer Figure (GLTF) ---
let observerLoaded = false;
const loader = new GLTFLoader();
try {
    loader.load(
        'https://threejs.org/examples/models/gltf/facecap.glb',
        (gltf) => {
            const model = gltf.scene;
            model.scale.set(3, 3, 3);
            model.position.set(0, 5, 0);
            model.rotation.x = -0.3;
            scene.add(model);
            observerLoaded = true;
        },
        undefined,
        (error) => {
            console.warn('Could not load facecap.glb, creating placeholder observer');
            createPlaceholderObserver();
        }
    );
} catch (e) {
    createPlaceholderObserver();
}

function createPlaceholderObserver() {
    const group = new THREE.Group();
    // Body
    const bodyGeo = new THREE.CylinderGeometry(0.5, 0.7, 2, 8);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0x3366aa });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1;
    group.add(body);
    // Head
    const headGeo = new THREE.SphereGeometry(0.6, 16, 16);
    const headMat = new THREE.MeshPhongMaterial({ color: 0xffcc99 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.5;
    group.add(head);
    group.scale.set(1.5, 1.5, 1.5);
    group.position.set(0, 5, 0);
    scene.add(group);
    observerLoaded = true;
}

// --- Game State ---
const difficultySettings = {
    1: { speedMultiplier: 0.5, threshold: 0.3 },
    2: { speedMultiplier: 0.8, threshold: 0.5 },
    3: { speedMultiplier: 1.0, threshold: 0.6 },
    4: { speedMultiplier: 1.5, threshold: 0.75 },
    5: { speedMultiplier: 2.0, threshold: 0.85 },
};

let state = {
    moonAngle: 0,
    moonPosition: { x: 20, y: 0, z: -50 },
    eclipseIntensity: 0,
    eclipseType: 'none',
    score: 0,
    difficulty: 1,
    speedMultiplier: 0.5,
    isPaused: false,
    eclipsesCaught: 0,
    eclipsesMissed: 0,
    totalEclipses: 0,
    lightIntensity: 2.0,
    orbitVisible: false,
    inclination: 2.0,
    observerLoaded: false,
    coronaOpacity: 0,
    accuracy: 0,
    frameCount: 0,
    isEclipseActive: false,
};

let wasEclipseActive = false;
let eclipseScored = false;

window.__3D_STATE__ = state;

// --- UI References ---
const scoreVal = document.getElementById('score-val');
const difficultyDisplay = document.getElementById('difficulty-display');
const caughtVal = document.getElementById('caught-val');
const accuracyVal = document.getElementById('accuracy-val');
const intensityVal = document.getElementById('intensity-val');
const angleVal = document.getElementById('angle-val');
const typeVal = document.getElementById('type-val');
const inclinationVal = document.getElementById('inclination-val');
const feedbackEl = document.getElementById('feedback');
const levelUpMsg = document.getElementById('level-up-msg');

// --- UI Event Handlers ---
document.getElementById('btn-pause').addEventListener('click', () => {
    state.isPaused = !state.isPaused;
    document.getElementById('btn-pause').textContent = state.isPaused ? 'Resume' : 'Pause';
});

document.getElementById('btn-reset').addEventListener('click', resetGame);

document.getElementById('btn-toggle-orbits').addEventListener('click', () => {
    state.orbitVisible = !state.orbitVisible;
    orbitLine.visible = state.orbitVisible;
    document.getElementById('btn-toggle-orbits').textContent = state.orbitVisible ? 'Hide Orbit' : 'Show Orbit';
});

document.getElementById('btn-difficulty-up').addEventListener('click', () => {
    if (state.difficulty < 5) {
        setDifficulty(state.difficulty + 1);
    }
});

document.getElementById('btn-difficulty-down').addEventListener('click', () => {
    if (state.difficulty > 1) {
        setDifficulty(state.difficulty - 1);
    }
});

document.getElementById('slider-inclination').addEventListener('input', (e) => {
    state.inclination = parseFloat(e.target.value);
    inclinationVal.textContent = state.inclination.toFixed(1);
});

// --- Keyboard ---
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        handleSpacePress();
    }
});

function handleSpacePress() {
    if (state.isPaused) return;
    const threshold = difficultySettings[state.difficulty].threshold;

    if (state.eclipseIntensity > threshold) {
        const points = Math.round(state.eclipseIntensity * 100);
        state.score += points;
        state.eclipsesCaught++;
        eclipseScored = true;
        showFeedback(`+${points}`, '#44FF44');
    } else {
        state.score = Math.max(0, state.score - 20);
        showFeedback('-20', '#FF4444');
    }

    // Check auto-advance
    const advanceThreshold = state.difficulty * 100;
    if (state.score >= advanceThreshold && state.difficulty < 5) {
        setDifficulty(state.difficulty + 1);
        showLevelUp();
    }
}

function showFeedback(text, color) {
    feedbackEl.textContent = text;
    feedbackEl.style.color = color;
    feedbackEl.style.opacity = 1;
    setTimeout(() => { feedbackEl.style.opacity = 0; }, 800);
}

function showLevelUp() {
    levelUpMsg.textContent = `⬆ Level ${state.difficulty}!`;
    levelUpMsg.style.opacity = 1;
    setTimeout(() => { levelUpMsg.style.opacity = 0; }, 2000);
}

function setDifficulty(level) {
    state.difficulty = Math.max(1, Math.min(5, level));
    state.speedMultiplier = difficultySettings[state.difficulty].speedMultiplier;
}

function resetGame() {
    state.moonAngle = 0;
    state.score = 0;
    state.difficulty = 1;
    state.speedMultiplier = 0.5;
    state.isPaused = false;
    state.eclipsesCaught = 0;
    state.eclipsesMissed = 0;
    state.totalEclipses = 0;
    state.eclipseIntensity = 0;
    state.eclipseType = 'none';
    state.frameCount = 0;
    state.isEclipseActive = false;
    wasEclipseActive = false;
    eclipseScored = false;
    document.getElementById('btn-pause').textContent = 'Pause';
}

// --- Eclipse Calculation ---
function calculateEclipseIntensity(mx, my, mz) {
    if (mz < -180 || mz > -30) return 0;
    if (mx < -8 || mx > 8) return 0;
    if (my < -5 || my > 5) return 0;

    // Perfect alignment: x=0, y=0, z=-100
    const dx = Math.abs(mx) / 8;
    const dy = Math.abs(my) / 5;
    const dz = Math.abs(mz - (-100)) / 80;

    const dist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    const intensity = Math.max(0, 1.0 - dist);
    return Math.min(1.0, intensity);
}

// --- Animation Loop ---
function animate() {
    requestAnimationFrame(animate);

    if (!state.isPaused) {
        const baseSpeed = 0.005;
        const speed = baseSpeed * state.speedMultiplier;
        state.moonAngle += speed;
        if (state.moonAngle > Math.PI * 2) {
            state.moonAngle -= Math.PI * 2;
        }

        // Elliptical orbit
        const mx = semiMinor * Math.sin(state.moonAngle);
        const mz = -semiMajor * Math.cos(state.moonAngle);
        const my = state.inclination * Math.sin(state.moonAngle * 3);

        moon.position.set(mx, my, mz);
        state.moonPosition = { x: mx, y: my, z: mz };

        // Eclipse
        state.eclipseIntensity = calculateEclipseIntensity(mx, my, mz);
        const threshold = difficultySettings[state.difficulty].threshold;
        state.isEclipseActive = state.eclipseIntensity > threshold;

        // Eclipse type
        if (state.eclipseIntensity > 0.8) {
            state.eclipseType = 'total';
        } else if (state.eclipseIntensity > 0.3) {
            state.eclipseType = 'partial';
        } else {
            state.eclipseType = 'none';
        }

        // Track eclipse events
        if (state.isEclipseActive && !wasEclipseActive) {
            // Eclipse just started
            state.totalEclipses++;
            eclipseScored = false;
        }
        if (!state.isEclipseActive && wasEclipseActive) {
            // Eclipse just ended
            if (!eclipseScored) {
                state.eclipsesMissed++;
            }
        }
        wasEclipseActive = state.isEclipseActive;

        // Light intensity
        state.lightIntensity = 2.0 * (1.0 - state.eclipseIntensity * 0.9);
        sunLight.intensity = state.lightIntensity;

        // Corona
        state.coronaOpacity = state.eclipseIntensity * 0.8;
        coronaMaterial.opacity = state.coronaOpacity;

        // Sun glow dims during eclipse
        sunGlowMaterial.opacity = 0.3 * (1.0 - state.eclipseIntensity * 0.7);

        state.frameCount++;
    }

    // Update state
    state.observerLoaded = observerLoaded;
    const totalAttempts = state.eclipsesCaught + state.eclipsesMissed;
    state.accuracy = totalAttempts > 0 ? (state.eclipsesCaught / totalAttempts) * 100 : 0;
    if (isNaN(state.accuracy)) state.accuracy = 0;

    // Update UI
    scoreVal.textContent = state.score;
    difficultyDisplay.textContent = state.difficulty;
    caughtVal.textContent = state.eclipsesCaught;
    accuracyVal.textContent = state.accuracy.toFixed(1) + '%';
    intensityVal.textContent = state.eclipseIntensity.toFixed(2);
    angleVal.textContent = ((state.moonAngle * 180 / Math.PI) % 360).toFixed(1) + '°';

    const typeText = state.eclipseType.charAt(0).toUpperCase() + state.eclipseType.slice(1);
    typeVal.textContent = typeText === 'None' ? 'None' : typeText;
    typeVal.className = 'info-value eclipse-' + state.eclipseType;

    // Corona faces camera
    corona.lookAt(camera.position);

    controls.update();
    renderer.render(scene, camera);
}

// --- Window Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate();
</script>
</body>
</html>
