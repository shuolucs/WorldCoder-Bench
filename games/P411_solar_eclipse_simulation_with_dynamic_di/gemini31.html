<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar Eclipse Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .panel {
            position: absolute;
            background: rgba(10, 20, 40, 0.8);
            border: 1px solid #4466aa;
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }
        #hud-panel {
            top: 20px;
            left: 20px;
            min-width: 200px;
        }
        #controls-panel {
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            min-width: 200px;
        }
        #info-panel {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            min-width: 300px;
        }
        h2 { margin: 0 0 10px 0; font-size: 18px; color: #88bbff; border-bottom: 1px solid #4466aa; padding-bottom: 5px;}
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px;}
        .stat-value { font-weight: bold; color: #ffdd44; }
        button {
            background: #2244aa;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #3366cc; }
        button:active { background: #112255; }
        .slider-container { display: flex; flex-direction: column; gap: 5px; font-size: 12px;}
        input[type=range] { width: 100%; }
        .difficulty-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 10px;}
        .difficulty-controls button { padding: 4px 8px; }
        #instructions {
            position: absolute;
            top: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 20px;
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
            text-align: center;
        }
        .highlight { color: #ffdd44; font-weight: bold; }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="hud-panel" class="panel">
        <h2>Simulation HUD</h2>
        <div class="stat-row"><span>Score:</span> <span id="val-score" class="stat-value">0</span></div>
        <div class="stat-row"><span>Level:</span> <span id="difficulty-display" class="stat-value">1</span></div>
        <div class="stat-row"><span>Caught:</span> <span id="val-caught" class="stat-value">0</span></div>
        <div class="stat-row"><span>Missed:</span> <span id="val-missed" class="stat-value">0</span></div>
        <div class="stat-row"><span>Accuracy:</span> <span id="val-accuracy" class="stat-value">0%</span></div>
    </div>

    <div id="controls-panel" class="panel">
        <h2>Controls</h2>
        <button id="btn-pause">Pause</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-toggle-orbits">Show Orbit Path</button>
        
        <div class="slider-container">
            <label for="slider-inclination">Orbital Inclination: <span id="val-inclination">2.0</span></label>
            <input type="range" id="slider-inclination" min="0" max="10" step="0.1" value="2">
        </div>

        <div class="difficulty-controls">
            <span>Difficulty:</span>
            <button id="btn-difficulty-down">-</button>
            <button id="btn-difficulty-up">+</button>
        </div>
    </div>

    <div id="info-panel" class="panel">
        <div class="stat-row" style="justify-content: center; gap: 20px;">
            <span>Intensity: <span id="val-intensity" class="stat-value">0.00</span></span>
            <span>Angle: <span id="val-angle" class="stat-value">0.0°</span></span>
            <span>Type: <span id="val-type" class="stat-value" style="color:#fff;">None</span></span>
        </div>
    </div>

    <div id="instructions">
        Press <span class="highlight">SPACEBAR</span> during an eclipse to score points!
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            moonAngle: 5.0, // Start near (20, 0, -50) roughly
            moonPosition: { x: 0, y: 0, z: 0 },
            eclipseIntensity: 0,
            eclipseType: 'none',
            score: 0,
            difficulty: 1,
            speedMultiplier: 0.5,
            isPaused: false,
            eclipsesCaught: 0,
            eclipsesMissed: 0,
            totalEclipses: 0,
            lightIntensity: 2.0,
            orbitVisible: false,
            inclination: 2.0,
            observerLoaded: false,
            coronaOpacity: 0,
            accuracy: 0,
            frameCount: 0,
            isEclipseActive: false
        };

        const DIFFICULTY_SETTINGS = {
            1: { speed: 0.5, threshold: 0.3 },
            2: { speed: 0.8, threshold: 0.5 },
            3: { speed: 1.0, threshold: 0.6 },
            4: { speed: 1.5, threshold: 0.75 },
            5: { speed: 2.0, threshold: 0.85 }
        };

        const BASE_SPEED = 0.005;
        let currentEclipseHandled = false;

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 40);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
        scene.add(ambientLight);

        const sunLight = new THREE.PointLight(0xFFDD44, 2.0, 1000);
        sunLight.position.set(0, 0, -200);
        scene.add(sunLight);

        // --- Objects ---
        // Starfield
        const starsGeometry = new THREE.BufferGeometry();
        const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
        const starsVertices = [];
        for (let i = 0; i < 300; i++) {
            const r = 300 + Math.random() * 200;
            const theta = 2 * Math.PI * Math.random();
            const phi = Math.acos(2 * Math.random() - 1);
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta);
            const z = r * Math.cos(phi);
            starsVertices.push(x, y, z);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsVertices, 3));
        const starField = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(starField);

        // Sun
        const sunGeometry = new THREE.SphereGeometry(15, 32, 32);
        const sunMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xFFDD44, 
            emissive: 0xFFaa00,
            emissiveIntensity: 1 
        });
        const sun = new THREE.Mesh(sunGeometry, sunMaterial);
        sun.position.set(0, 0, -200);
        scene.add(sun);

        // Corona
        const coronaGeometry = new THREE.RingGeometry(16, 25, 64);
        const coronaMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0, 
            side: THREE.DoubleSide,
            blending: THREE.AdditiveBlending
        });
        const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
        corona.position.set(0, 0, -199); // Slightly in front of sun
        scene.add(corona);

        // Earth
        const earthGeometry = new THREE.SphereGeometry(5, 32, 32);
        const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x2244AA, shininess: 10 });
        const earth = new THREE.Mesh(earthGeometry, earthMaterial);
        earth.position.set(0, 0, 0);
        scene.add(earth);

        // Moon
        const moonGeometry = new THREE.SphereGeometry(1.5, 32, 32);
        const moonMaterial = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.8 });
        const moon = new THREE.Mesh(moonGeometry, moonMaterial);
        scene.add(moon);

        // Orbit Path
        const orbitMaterial = new THREE.LineDashedMaterial({ color: 0xaaaaaa, dashSize: 1, gapSize: 1 });
        const orbitGeometry = new THREE.BufferGeometry();
        const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
        scene.add(orbitLine);
        orbitLine.visible = false;

        function updateOrbitGeometry() {
            const points = [];
            const segments = 100;
            for (let i = 0; i <= segments; i++) {
                const a = (i / segments) * Math.PI * 2;
                const x = 50 * Math.cos(a);
                const z = 45 * Math.sin(a);
                const y = window.__3D_STATE__.inclination * Math.sin(a * 3);
                points.push(new THREE.Vector3(x, y, z));
            }
            orbitGeometry.setFromPoints(points);
            orbitLine.computeLineDistances();
        }
        updateOrbitGeometry();

        // Observer (GLTF)
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/facecap.glb', (gltf) => {
            const observer = gltf.scene;
            observer.scale.set(3, 3, 3);
            observer.position.set(0, 5, 0); // On surface
            // Orient to look outwards
            observer.rotation.y = Math.PI;
            earth.add(observer);
            window.__3D_STATE__.observerLoaded = true;
        }, undefined, (error) => {
            console.warn('Could not load facecap.glb, using fallback geometry.', error);
            // Fallback if network fails
            const fbGeo = new THREE.BoxGeometry(1, 2, 1);
            const fbMat = new THREE.MeshStandardMaterial({color: 0xff0000});
            const fbMesh = new THREE.Mesh(fbGeo, fbMat);
            fbMesh.position.set(0, 6, 0);
            earth.add(fbMesh);
            window.__3D_STATE__.observerLoaded = true;
        });

        // --- Logic Functions ---
        function updateDifficultySettings() {
            const settings = DIFFICULTY_SETTINGS[window.__3D_STATE__.difficulty];
            window.__3D_STATE__.speedMultiplier = settings.speed;
        }

        function setDifficulty(level) {
            if (level >= 1 && level <= 5) {
                window.__3D_STATE__.difficulty = level;
                updateDifficultySettings();
            }
        }

        function resetSimulation() {
            window.__3D_STATE__.moonAngle = 5.0;
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.difficulty = 1;
            window.__3D_STATE__.eclipsesCaught = 0;
            window.__3D_STATE__.eclipsesMissed = 0;
            window.__3D_STATE__.totalEclipses = 0;
            window.__3D_STATE__.isPaused = false;
            window.__3D_STATE__.isEclipseActive = false;
            currentEclipseHandled = false;
            updateDifficultySettings();
            document.getElementById('btn-pause').innerText = 'Pause';
        }

        function handleSpacebar() {
            if (window.__3D_STATE__.isPaused) return;

            const state = window.__3D_STATE__;
            const threshold = DIFFICULTY_SETTINGS[state.difficulty].threshold;

            if (state.eclipseIntensity > threshold) {
                if (!currentEclipseHandled) {
                    // Success
                    const points = Math.round(state.eclipseIntensity * 100);
                    state.score += points;
                    state.eclipsesCaught++;
                    currentEclipseHandled = true;

                    // Check level up
                    if (state.score >= state.difficulty * 100 && state.difficulty < 5) {
                        setDifficulty(state.difficulty + 1);
                    }
                    
                    // Visual feedback
                    document.getElementById('instructions').innerHTML = `<span style="color:#00ff00">Great! +${points}</span>`;
                    setTimeout(() => {
                        document.getElementById('instructions').innerHTML = `Press <span class="highlight">SPACEBAR</span> during an eclipse to score points!`;
                    }, 1000);
                }
            } else {
                // Penalty
                state.score = Math.max(0, state.score - 20);
                document.getElementById('instructions').innerHTML = `<span style="color:#ff0000">Miss! -20</span>`;
                setTimeout(() => {
                    document.getElementById('instructions').innerHTML = `Press <span class="highlight">SPACEBAR</span> during an eclipse to score points!`;
                }, 1000);
            }
        }

        // --- Event Listeners ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleSpacebar();
            }
        });

        document.getElementById('btn-pause').addEventListener('click', (e) => {
            window.__3D_STATE__.isPaused = !window.__3D_STATE__.isPaused;
            e.target.innerText = window.__3D_STATE__.isPaused ? 'Resume' : 'Pause';
        });

        document.getElementById('btn-reset').addEventListener('click', resetSimulation);

        document.getElementById('btn-toggle-orbits').addEventListener('click', (e) => {
            window.__3D_STATE__.orbitVisible = !window.__3D_STATE__.orbitVisible;
            orbitLine.visible = window.__3D_STATE__.orbitVisible;
            e.target.innerText = window.__3D_STATE__.orbitVisible ? 'Hide Orbit Path' : 'Show Orbit Path';
        });

        document.getElementById('slider-inclination').addEventListener('input', (e) => {
            window.__3D_STATE__.inclination = parseFloat(e.target.value);
            document.getElementById('val-inclination').innerText = window.__3D_STATE__.inclination.toFixed(1);
            updateOrbitGeometry();
        });

        document.getElementById('btn-difficulty-up').addEventListener('click', () => {
            setDifficulty(window.__3D_STATE__.difficulty + 1);
        });

        document.getElementById('btn-difficulty-down').addEventListener('click', () => {
            setDifficulty(window.__3D_STATE__.difficulty - 1);
        });

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const state = window.__3D_STATE__;
            state.frameCount++;

            if (!state.isPaused) {
                // Update Moon Position
                state.moonAngle += BASE_SPEED * state.speedMultiplier;
                if (state.moonAngle > Math.PI * 2) state.moonAngle -= Math.PI * 2;

                const x = 50 * Math.cos(state.moonAngle);
                const z = 45 * Math.sin(state.moonAngle);
                const y = state.inclination * Math.sin(state.moonAngle * 3);

                moon.position.set(x, y, z);
                state.moonPosition = { x, y, z };

                // Calculate Eclipse Intensity
                let intensity = 0;
                if (z < -30 && z > -180 && x > -8 && x < 8 && y > -5 && y < 5) {
                    const distToZAxis = Math.sqrt(x * x + y * y);
                    if (distToZAxis < 10) {
                        intensity = Math.max(0, 1.0 - (distToZAxis / 10.0));
                    }
                }
                state.eclipseIntensity = intensity;

                // Determine Type
                if (intensity > 0.8) state.eclipseType = 'total';
                else if (intensity > 0.3) state.eclipseType = 'partial';
                else state.eclipseType = 'none';

                // Update Lighting & Corona
                state.lightIntensity = 2.0 * (1.0 - intensity * 0.9);
                sunLight.intensity = state.lightIntensity;
                
                state.coronaOpacity = intensity * 0.8;
                corona.material.opacity = state.coronaOpacity;

                // Eclipse Tracking Logic
                const threshold = DIFFICULTY_SETTINGS[state.difficulty].threshold;
                const isCurrentlyActive = intensity > threshold;

                if (isCurrentlyActive && !state.isEclipseActive) {
                    // Eclipse just started
                    state.isEclipseActive = true;
                    currentEclipseHandled = false;
                    state.totalEclipses++;
                } else if (!isCurrentlyActive && state.isEclipseActive) {
                    // Eclipse just ended
                    state.isEclipseActive = false;
                    if (!currentEclipseHandled) {
                        state.eclipsesMissed++;
                    }
                }

                // Calculate Accuracy
                if (state.totalEclipses > 0) {
                    state.accuracy = (state.eclipsesCaught / state.totalEclipses) * 100;
                } else {
                    state.accuracy = 0;
                }
            }

            // Update UI
            document.getElementById('val-score').innerText = state.score;
            document.getElementById('difficulty-display').innerText = state.difficulty;
            document.getElementById('val-caught').innerText = state.eclipsesCaught;
            document.getElementById('val-missed').innerText = state.eclipsesMissed;
            document.getElementById('val-accuracy').innerText = state.accuracy.toFixed(1) + '%';
            
            document.getElementById('val-intensity').innerText = state.eclipseIntensity.toFixed(2);
            document.getElementById('val-angle').innerText = (state.moonAngle * (180/Math.PI)).toFixed(1) + '°';
            
            const typeEl = document.getElementById('val-type');
            typeEl.innerText = state.eclipseType.charAt(0).toUpperCase() + state.eclipseType.slice(1);
            if (state.eclipseType === 'total') typeEl.style.color = '#ff4444';
            else if (state.eclipseType === 'partial') typeEl.style.color = '#ffaa00';
            else typeEl.style.color = '#ffffff';

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize
        updateDifficultySettings();
        animate();

    </script>
</body>
</html>
