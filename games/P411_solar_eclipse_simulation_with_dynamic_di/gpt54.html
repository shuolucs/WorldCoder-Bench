<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Solar Eclipse Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    canvas {
      display: block;
    }

    #hud-panel {
      position: absolute;
      top: 12px;
      left: 12px;
      background: rgba(0, 0, 0, 0.65);
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      min-width: 220px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.5;
    }

    #controls-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.65);
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      z-index: 10;
      min-width: 240px;
    }

    #controls-panel button,
    #controls-panel input[type="range"] {
      margin: 6px 0;
      width: 100%;
    }

    #controls-panel button {
      background: #1d2a44;
      color: white;
      border: 1px solid rgba(255,255,255,0.15);
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    #controls-panel button:hover {
      background: #2c4068;
    }

    #difficulty-display {
      margin-top: 8px;
      font-weight: bold;
      color: #ffd95a;
    }

    #info-panel {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      z-index: 10;
      min-width: 420px;
      text-align: center;
      font-size: 14px;
    }

    .small-label {
      font-size: 12px;
      opacity: 0.85;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="hud-panel">
    <div><strong>Solar Eclipse Trainer</strong></div>
    <div>Score: <span id="hud-score">0</span></div>
    <div>Level: <span id="hud-level">1</span></div>
    <div>Eclipses Caught: <span id="hud-caught">0</span></div>
    <div>Accuracy: <span id="hud-accuracy">0.0</span>%</div>
  </div>

  <div id="controls-panel">
    <button id="btn-pause">Pause</button>
    <button id="btn-reset">Reset</button>
    <button id="btn-toggle-orbits">Hide Orbit</button>
    <button id="btn-difficulty-down">Difficulty Down</button>
    <button id="btn-difficulty-up">Difficulty Up</button>

    <div class="small-label">Inclination Amplitude</div>
    <input id="slider-inclination" type="range" min="0" max="10" step="0.1" value="2" />

    <div id="difficulty-display">Difficulty Level: 1</div>
    <div class="small-label">Press SPACEBAR during an eclipse to score.</div>
  </div>

  <div id="info-panel">
    Eclipse Intensity: <span id="info-intensity">0.00</span> |
    Moon Angle: <span id="info-angle">0.0</span>° |
    Eclipse Type: <span id="info-type">None</span>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02040a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 10, 40);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.05);
    scene.add(ambientLight);

    // Starfield: 200+ white sphere particles in large sphere
    const starGroup = new THREE.Group();
    const starGeometry = new THREE.SphereGeometry(0.35, 6, 6);
    const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const starCount = 260;

    for (let i = 0; i < starCount; i++) {
      const star = new THREE.Mesh(starGeometry, starMaterial);
      let x, y, z, len;
      do {
        x = (Math.random() * 2 - 1) * 900;
        y = (Math.random() * 2 - 1) * 900;
        z = (Math.random() * 2 - 1) * 900;
        len = Math.sqrt(x * x + y * y + z * z);
      } while (len < 250 || len > 900);

      star.position.set(x, y, z);
      starGroup.add(star);
    }
    scene.add(starGroup);

    // Sun
    const sunGeometry = new THREE.SphereGeometry(15, 32, 32);
    const sunMaterial = new THREE.MeshPhongMaterial({
      color: 0xffcc44,
      emissive: 0xffaa22,
      emissiveIntensity: 1.2
    });
    const sun = new THREE.Mesh(sunGeometry, sunMaterial);
    sun.position.set(0, 0, -200);
    scene.add(sun);

    const sunLight = new THREE.PointLight(0xffdd44, 2, 1200);
    sunLight.position.copy(sun.position);
    scene.add(sunLight);

    // Corona effect
    const coronaGeometry = new THREE.RingGeometry(17.5, 23, 64);
    const coronaMaterial = new THREE.MeshBasicMaterial({
      color: 0xfff3c2,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      depthWrite: false
    });
    const corona = new THREE.Mesh(coronaGeometry, coronaMaterial);
    corona.position.copy(sun.position);
    corona.lookAt(camera.position);
    scene.add(corona);

    // Earth
    const earthGeometry = new THREE.SphereGeometry(5, 32, 32);
    const earthMaterial = new THREE.MeshPhongMaterial({ color: 0x2244aa });
    const earth = new THREE.Mesh(earthGeometry, earthMaterial);
    earth.position.set(0, 0, 0);
    scene.add(earth);

    // Moon
    const moonGeometry = new THREE.SphereGeometry(1.5, 24, 24);
    const moonMaterial = new THREE.MeshPhongMaterial({ color: 0x888888 });
    const moon = new THREE.Mesh(moonGeometry, moonMaterial);
    moon.position.set(20, 0, -50);
    scene.add(moon);

    // Orbit path
    const orbitPoints = [];
    for (let i = 0; i <= 256; i++) {
      const a = (i / 256) * Math.PI * 2;
      orbitPoints.push(new THREE.Vector3(
        50 * Math.cos(a),
        0,
        45 * Math.sin(a)
      ));
    }
    const orbitGeometry = new THREE.BufferGeometry().setFromPoints(orbitPoints);
    const orbitMaterial = new THREE.LineDashedMaterial({
      color: 0xffffff,
      dashSize: 2,
      gapSize: 1,
      transparent: true,
      opacity: 0.5
    });
    const orbitLine = new THREE.Line(orbitGeometry, orbitMaterial);
    orbitLine.computeLineDistances();
    scene.add(orbitLine);

    // Observer figure
    let observerLoaded = false;
    const loader = new GLTFLoader();
    loader.load(
      "facecap.glb",
      (gltf) => {
        const model = gltf.scene;
        model.scale.set(3, 3, 3);
        model.position.set(0, 6, 0);
        earth.add(model);
        observerLoaded = true;
      },
      undefined,
      () => {
        observerLoaded = false;
      }
    );

    const difficultySettings = {
      1: { speedMultiplier: 0.5, threshold: 0.3 },
      2: { speedMultiplier: 0.8, threshold: 0.5 },
      3: { speedMultiplier: 1.0, threshold: 0.6 },
      4: { speedMultiplier: 1.5, threshold: 0.75 },
      5: { speedMultiplier: 2.0, threshold: 0.85 }
    };

    const state = {
      moonAngle: 0,
      speedMultiplier: 1.0,
      eclipseIntensity: 0,
      eclipseType: "none",
      score: 0,
      difficulty: 1,
      isPaused: false,
      eclipsesCaught: 0,
      eclipsesMissed: 0,
      totalEclipses: 0,
      orbitVisible: true,
      inclination: 2,
      frameCount: 0,
      isEclipseActive: false,
      lightIntensity: 2,
      coronaOpacity: 0,
      eclipsePressedThisPass: false,
      wasAboveThreshold: false
    };

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function safeNumber(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function getCurrentThreshold() {
      return difficultySettings[state.difficulty].threshold;
    }

    function applyDifficulty(level) {
      state.difficulty = clamp(level, 1, 5);
      state.speedMultiplier = difficultySettings[state.difficulty].speedMultiplier;
      updateUI();
    }

    function resetSimulation() {
      state.moonAngle = 0;
      state.score = 0;
      state.eclipseIntensity = 0;
      state.eclipseType = "none";
      state.eclipsePressedThisPass = false;
      state.wasAboveThreshold = false;
      state.eclipsesCaught = 0;
      state.eclipsesMissed = 0;
      state.totalEclipses = 0;
      state.frameCount = 0;
      state.isPaused = false;
      state.inclination = 2;
      document.getElementById("slider-inclination").value = "2";
      applyDifficulty(1);
      moon.position.set(20, 0, -50);
      sunLight.intensity = 2;
      coronaMaterial.opacity = 0;
      document.getElementById("btn-pause").textContent = "Pause";
      updateUI();
      updateExposedState();
    }

    function calculateMoonPosition() {
      const a = state.moonAngle;
      const x = 50 * Math.cos(a);
      const z = 45 * Math.sin(a);
      const y = state.inclination * Math.sin(a * 3);
      return { x: safeNumber(x), y: safeNumber(y), z: safeNumber(z) };
    }

    function calculateEclipseIntensity(pos) {
      const withinZone =
        pos.z >= -180 && pos.z <= -30 &&
        pos.x >= -8 && pos.x <= 8 &&
        pos.y >= -5 && pos.y <= 5;

      if (!withinZone) return 0;

      const xScore = 1 - clamp(Math.abs(pos.x) / 8, 0, 1);
      const yScore = 1 - clamp(Math.abs(pos.y) / 5, 0, 1);
      const zScore = 1 - clamp(Math.abs(pos.z - (-100)) / 80, 0, 1);

      const intensity = clamp((xScore * 0.45) + (yScore * 0.25) + (zScore * 0.30), 0, 1);
      return safeNumber(intensity);
    }

    function updateEclipseState() {
      const pos = moon.position;
      const intensity = calculateEclipseIntensity(pos);
      state.eclipseIntensity = intensity;

      if (intensity > 0.8) state.eclipseType = "total";
      else if (intensity > 0.3) state.eclipseType = "partial";
      else state.eclipseType = "none";

      const lightIntensity = 2.0 * (1.0 - intensity * 0.9);
      state.lightIntensity = safeNumber(lightIntensity, 2);
      sunLight.intensity = state.lightIntensity;

      state.coronaOpacity = safeNumber(clamp(intensity * 0.95, 0, 1));
      coronaMaterial.opacity = state.coronaOpacity;
      corona.lookAt(camera.position);

      const threshold = getCurrentThreshold();
      const aboveThreshold = intensity > threshold;
      state.isEclipseActive = aboveThreshold;

      if (aboveThreshold && !state.wasAboveThreshold) {
        state.totalEclipses++;
        state.eclipsePressedThisPass = false;
      }

      if (!aboveThreshold && state.wasAboveThreshold) {
        if (!state.eclipsePressedThisPass) {
          state.eclipsesMissed++;
        }
      }

      state.wasAboveThreshold = aboveThreshold;
    }

    function getAccuracy() {
      const attempts = state.eclipsesCaught + state.eclipsesMissed;
      if (attempts <= 0) return 0;
      return safeNumber((state.eclipsesCaught / attempts) * 100);
    }

    function maybeAutoAdvanceDifficulty() {
      const target = state.difficulty * 100;
      if (state.score >= target && state.difficulty < 5) {
        applyDifficulty(state.difficulty + 1);
      }
    }

    function handleSpacePress() {
      const threshold = getCurrentThreshold();
      if (state.eclipseIntensity > threshold) {
        const points = Math.round(state.eclipseIntensity * 100);
        state.score += points;
        if (!state.eclipsePressedThisPass) {
          state.eclipsesCaught++;
          state.eclipsePressedThisPass = true;
        }
        maybeAutoAdvanceDifficulty();
      } else {
        state.score = Math.max(0, state.score - 20);
      }
      updateUI();
      updateExposedState();
    }

    function updateUI() {
      document.getElementById("hud-score").textContent = String(state.score);
      document.getElementById("hud-level").textContent = String(state.difficulty);
      document.getElementById("hud-caught").textContent = String(state.eclipsesCaught);
      document.getElementById("hud-accuracy").textContent = getAccuracy().toFixed(1);
      document.getElementById("difficulty-display").textContent = `Difficulty Level: ${state.difficulty}`;
      document.getElementById("info-intensity").textContent = state.eclipseIntensity.toFixed(2);
      document.getElementById("info-angle").textContent = (THREE.MathUtils.radToDeg(state.moonAngle) % 360).toFixed(1);
      document.getElementById("info-type").textContent =
        state.eclipseType === "total"
          ? "Total"
          : state.eclipseType === "partial"
          ? "Partial"
          : "None";
      document.getElementById("btn-toggle-orbits").textContent = state.orbitVisible ? "Hide Orbit" : "Show Orbit";
      document.getElementById("btn-pause").textContent = state.isPaused ? "Resume" : "Pause";
    }

    function updateExposedState() {
      const pos = moon.position;
      const accuracy = getAccuracy();
      window.__3D_STATE__ = {
        moonAngle: safeNumber(state.moonAngle),
        moonPosition: {
          x: safeNumber(pos.x),
          y: safeNumber(pos.y),
          z: safeNumber(pos.z)
        },
        eclipseIntensity: safeNumber(state.eclipseIntensity),
        eclipseType: state.eclipseType,
        score: Math.round(safeNumber(state.score)),
        difficulty: Math.round(safeNumber(state.difficulty, 1)),
        speedMultiplier: safeNumber(state.speedMultiplier),
        isPaused: !!state.isPaused,
        eclipsesCaught: Math.round(safeNumber(state.eclipsesCaught)),
        eclipsesMissed: Math.round(safeNumber(state.eclipsesMissed)),
        totalEclipses: Math.round(safeNumber(state.totalEclipses)),
        lightIntensity: safeNumber(state.lightIntensity),
        orbitVisible: !!state.orbitVisible,
        inclination: safeNumber(state.inclination),
        observerLoaded: !!observerLoaded,
        coronaOpacity: safeNumber(state.coronaOpacity),
        accuracy: safeNumber(accuracy),
        frameCount: Math.round(safeNumber(state.frameCount)),
        isEclipseActive: !!state.isEclipseActive
      };
    }

    document.getElementById("btn-pause").addEventListener("click", () => {
      state.isPaused = !state.isPaused;
      updateUI();
      updateExposedState();
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      resetSimulation();
    });

    document.getElementById("btn-toggle-orbits").addEventListener("click", () => {
      state.orbitVisible = !state.orbitVisible;
      orbitLine.visible = state.orbitVisible;
      updateUI();
      updateExposedState();
    });

    document.getElementById("slider-inclination").addEventListener("input", (e) => {
      state.inclination = safeNumber(parseFloat(e.target.value), 2);
      updateExposedState();
    });

    document.getElementById("btn-difficulty-up").addEventListener("click", () => {
      applyDifficulty(state.difficulty + 1);
      updateExposedState();
    });

    document.getElementById("btn-difficulty-down").addEventListener("click", () => {
      applyDifficulty(state.difficulty - 1);
      updateExposedState();
    });

    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        handleSpacePress();
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      state.frameCount++;

      if (!state.isPaused) {
        state.moonAngle += 0.005 * state.speedMultiplier;
        if (state.moonAngle > Math.PI * 2) {
          state.moonAngle -= Math.PI * 2;
        }

        const pos = calculateMoonPosition();
        moon.position.set(pos.x, pos.y, pos.z);

        updateEclipseState();
        maybeAutoAdvanceDifficulty();
      }

      controls.update();
      updateUI();
      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    applyDifficulty(1);
    orbitLine.visible = true;
    updateUI();
    updateExposedState();
    animate();
  </script>
</body>
</html>
