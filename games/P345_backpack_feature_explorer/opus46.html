<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trail Horse Backpack Explorer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }

  #feature-panel {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 280px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    padding: 20px;
    z-index: 100;
    transition: all 0.3s ease;
  }
  #feature-panel h2 {
    font-size: 20px;
    color: #2E5090;
    margin-bottom: 6px;
  }
  #feature-panel .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 12px;
  }
  #feature-panel .feature-name {
    font-size: 16px;
    font-weight: 600;
    color: #FF6B35;
    margin-bottom: 6px;
    display: none;
  }
  #feature-panel .feature-desc {
    font-size: 14px;
    color: #444;
    line-height: 1.5;
    display: none;
  }

  #auto-rotate-btn {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    background: #2E5090;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    z-index: 100;
    transition: background 0.3s;
  }
  #auto-rotate-btn:hover { background: #1d3a6a; }

  #explode-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 24px;
    background: #FF6B35;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    z-index: 100;
    transition: background 0.3s;
  }
  #explode-btn:hover { background: #e55a28; }

  #color-themes {
    position: fixed;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 100;
  }
  .color-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 3px solid transparent;
    cursor: pointer;
    transition: border-color 0.3s, transform 0.2s;
  }
  .color-btn:hover { transform: scale(1.15); }
  .color-btn.active { border-color: #FFD700; }

  #mascot-label {
    position: fixed;
    background: rgba(255,255,255,0.9);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: #2E5090;
    font-weight: 600;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    white-space: nowrap;
  }

  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #F5F0EB;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    font-size: 18px;
    color: #2E5090;
    transition: opacity 0.5s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="loading">Loading Trail Horse Backpack Explorer...</div>

<div id="feature-panel">
  <h2>Trail Horse Backpack</h2>
  <div class="subtitle">Click a hotspot to explore features</div>
  <div class="feature-name" id="feat-name"></div>
  <div class="feature-desc" id="feat-desc"></div>
</div>

<button id="auto-rotate-btn">Auto Rotate: OFF</button>
<button id="explode-btn">Explode View</button>

<div id="color-themes">
  <div class="color-btn active" data-theme="navy" style="background:#2E5090;" title="Navy"></div>
  <div class="color-btn" data-theme="forest" style="background:#2E7D32;" title="Forest"></div>
  <div class="color-btn" data-theme="burgundy" style="background:#7B1F3A;" title="Burgundy"></div>
</div>

<div id="mascot-label">🐴 Trail Horse Mascot</div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// State
window.__3D_STATE__ = {
  horseLoaded: false,
  selectedFeature: null,
  featureCount: 5,
  autoRotate: false,
  currentTheme: 'navy',
  exploded: false,
  horsePosition: { x: 2, y: 0, z: 0 },
  backpackRotationY: 0,
  hotspotColors: ['#FF6B35','#FF6B35','#FF6B35','#FF6B35','#FF6B35'],
  panelVisible: true,
  cameraDistance: 5
};

const themeColors = {
  navy: { main: 0x2E5090, pocket: 0x3A6AAA },
  forest: { main: 0x2E7D32, pocket: 0x4CAF50 },
  burgundy: { main: 0x7B1F3A, pocket: 0xA0365A }
};

const featureData = {
  main_compartment: {
    name: 'Main Compartment',
    desc: '30L capacity with laptop sleeve fits up to 15.6 inch devices. Waterproof YKK zippers.'
  },
  front_pocket: {
    name: 'Quick Access Pocket',
    desc: 'Organized front pocket with key clip, pen holders, and phone sleeve.'
  },
  straps: {
    name: 'Ergonomic Straps',
    desc: 'Padded shoulder straps with adjustable sternum strap. Breathable mesh backing.'
  },
  water_bottle: {
    name: 'Bottle Holder',
    desc: 'Expandable side pocket fits bottles up to 32oz. Elastic drawstring closure.'
  },
  top_handle: {
    name: 'Grab Handle',
    desc: 'Reinforced nylon top handle rated for 50kg. Padded grip.'
  }
};

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xF5F0EB);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.8, 0);
controls.minPolarAngle = 0.2;
controls.maxPolarAngle = 1.5;
controls.minDistance = 3;
controls.maxDistance = 10;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(3, 5, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 20;
dirLight.shadow.camera.left = -5;
dirLight.shadow.camera.right = 5;
dirLight.shadow.camera.top = 5;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// Extra fill light
const fillLight = new THREE.DirectionalLight(0xffffff, 0.3);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// Ground plane
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0xE8E0D8, roughness: 0.9 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ============ BACKPACK ============
const backpackGroup = new THREE.Group();
backpackGroup.position.set(-1.5, 0.8, 0);
scene.add(backpackGroup);

// Main body
const mainBodyMat = new THREE.MeshStandardMaterial({ color: 0x2E5090, roughness: 0.6, metalness: 0.05 });
const mainBodyGeo = new THREE.BoxGeometry(1.2, 1.6, 0.6, 4, 4, 4);
// Slightly round the edges by modifying vertices
const mainBody = new THREE.Mesh(mainBodyGeo, mainBodyMat);
mainBody.castShadow = true;
mainBody.receiveShadow = true;
mainBody.name = 'mainBody';
backpackGroup.add(mainBody);

// Shoulder straps
const strapMat = new THREE.MeshStandardMaterial({ color: 0x1A1A1A, roughness: 0.7 });

function createStrap(xPos) {
  const strapGroup = new THREE.Group();
  // Upper part
  const upper = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.8, 0.08), strapMat.clone());
  upper.position.set(0, 0.4, 0.02);
  strapGroup.add(upper);
  // Lower curved part
  const lower = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.6, 0.08), strapMat.clone());
  lower.position.set(0, -0.15, 0.12);
  lower.rotation.x = 0.2;
  strapGroup.add(lower);
  // Padding
  const pad = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.5, 0.06), new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 }));
  pad.position.set(0, 0.2, 0.08);
  strapGroup.add(pad);

  strapGroup.position.set(xPos, 0, 0.3);
  strapGroup.name = 'strap';
  return strapGroup;
}

const leftStrap = createStrap(-0.4);
leftStrap.name = 'leftStrap';
backpackGroup.add(leftStrap);

const rightStrap = createStrap(0.4);
rightStrap.name = 'rightStrap';
backpackGroup.add(rightStrap);

// Front pocket
const pocketMat = new THREE.MeshStandardMaterial({ color: 0x3A6AAA, roughness: 0.6, metalness: 0.05 });
const frontPocket = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.6, 0.12), pocketMat);
frontPocket.position.set(0, -0.3, 0.36);
frontPocket.castShadow = true;
frontPocket.name = 'frontPocket';
backpackGroup.add(frontPocket);

// Pocket zipper detail
const zipperMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.8, roughness: 0.3 });
const zipper = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.02, 0.02), zipperMat);
zipper.position.set(0, -0.05, 0.43);
backpackGroup.add(zipper);

// Side water bottle pocket
const bottlePocketMat = new THREE.MeshStandardMaterial({ color: 0x3A6AAA, roughness: 0.6, metalness: 0.05 });
const bottlePocket = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.15, 0.5, 16, 1, true), bottlePocketMat);
bottlePocket.position.set(0.7, -0.2, 0);
bottlePocket.castShadow = true;
bottlePocket.name = 'bottlePocket';
backpackGroup.add(bottlePocket);

// Bottle pocket bottom
const bottleBottom = new THREE.Mesh(new THREE.CircleGeometry(0.15, 16), bottlePocketMat.clone());
bottleBottom.rotation.x = Math.PI / 2;
bottleBottom.position.set(0.7, -0.45, 0);
bottleBottom.name = 'bottlePocketBottom';
backpackGroup.add(bottleBottom);

// Top handle
const handleMat = new THREE.MeshStandardMaterial({ color: 0x1A1A1A, roughness: 0.7 });
const handleGeo = new THREE.TorusGeometry(0.15, 0.04, 8, 16, Math.PI);
const topHandle = new THREE.Mesh(handleGeo, handleMat);
topHandle.position.set(0, 0.85, 0);
topHandle.rotation.x = Math.PI;
topHandle.castShadow = true;
topHandle.name = 'topHandle';
backpackGroup.add(topHandle);

// Back padding detail
const backPad = new THREE.Mesh(
  new THREE.BoxGeometry(1.0, 1.3, 0.05),
  new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 })
);
backPad.position.set(0, 0, -0.32);
backpackGroup.add(backPad);

// ============ HOTSPOTS ============
const hotspotPositions = [
  { key: 'main_compartment', pos: new THREE.Vector3(0, 0, 0.35) },
  { key: 'front_pocket', pos: new THREE.Vector3(0, -0.3, 0.5) },
  { key: 'straps', pos: new THREE.Vector3(-0.45, 0.4, 0.1) },
  { key: 'water_bottle', pos: new THREE.Vector3(0.7, -0.2, 0) },
  { key: 'top_handle', pos: new THREE.Vector3(0, 0.85, 0) }
];

const hotspots = [];
const hotspotMaterials = [];

hotspotPositions.forEach((h, i) => {
  const mat = new THREE.MeshStandardMaterial({
    color: 0xFF6B35,
    emissive: 0xFF6B35,
    emissiveIntensity: 0.5,
    roughness: 0.3,
    metalness: 0.2
  });
  const sphere = new THREE.Mesh(new THREE.SphereGeometry(0.08, 16, 16), mat);
  sphere.position.copy(h.pos);
  sphere.userData.featureKey = h.key;
  sphere.userData.index = i;
  backpackGroup.add(sphere);
  hotspots.push(sphere);
  hotspotMaterials.push(mat);
});

// ============ HORSE MODEL ============
let horseModel = null;
let horseMixer = null;

const loader = new THREE.GLTFLoader();
loader.load(
  'horse.glb',
  (gltf) => {
    horseModel = gltf.scene;
    horseModel.scale.set(0.01, 0.01, 0.01);
    horseModel.position.set(2, 0, 0);
    horseModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.receiveShadow = true;
      }
    });
    scene.add(horseModel);
    window.__3D_STATE__.horseLoaded = true;

    if (gltf.animations && gltf.animations.length > 0) {
      horseMixer = new THREE.AnimationMixer(horseModel);
      const action = horseMixer.clipAction(gltf.animations[0]);
      action.play();
    }

    document.getElementById('loading').classList.add('hidden');
  },
  undefined,
  (error) => {
    console.warn('Horse model could not be loaded:', error);
    // Create a placeholder horse
    const placeholderGroup = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.2, 0.6, 0.5);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.7 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.8;
    body.castShadow = true;
    placeholderGroup.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.3, 0.5, 0.3);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.set(0.7, 1.2, 0);
    head.rotation.z = -0.3;
    head.castShadow = true;
    placeholderGroup.add(head);

    // Neck
    const neckGeo = new THREE.BoxGeometry(0.2, 0.5, 0.25);
    const neck = new THREE.Mesh(neckGeo, bodyMat);
    neck.position.set(0.55, 1.05, 0);
    neck.rotation.z = -0.4;
    neck.castShadow = true;
    placeholderGroup.add(neck);

    // Legs
    const legGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.6, 8);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x6B4F12, roughness: 0.7 });
    const legPositions = [
      [-0.4, 0.3, 0.15], [-0.4, 0.3, -0.15],
      [0.4, 0.3, 0.15], [0.4, 0.3, -0.15]
    ];
    legPositions.forEach(p => {
      const leg = new THREE.Mesh(legGeo, legMat);
      leg.position.set(p[0], p[1], p[2]);
      leg.castShadow = true;
      placeholderGroup.add(leg);
    });

    // Tail
    const tailGeo = new THREE.CylinderGeometry(0.03, 0.01, 0.5, 8);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0x2A1F0A, roughness: 0.8 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.set(-0.7, 0.9, 0);
    tail.rotation.z = 0.8;
    placeholderGroup.add(tail);

    // Mane
    const maneGeo = new THREE.BoxGeometry(0.05, 0.4, 0.15);
    const mane = new THREE.Mesh(maneGeo, tailMat);
    mane.position.set(0.45, 1.15, 0);
    mane.rotation.z = -0.3;
    placeholderGroup.add(mane);

    placeholderGroup.position.set(2, 0, 0);
    scene.add(placeholderGroup);
    horseModel = placeholderGroup;
    window.__3D_STATE__.horseLoaded = true;

    document.getElementById('loading').classList.add('hidden');
  }
);

// ============ RAYCASTER ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedHotspotIndex = -1;

renderer.domElement.addEventListener('click', (event) => {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(hotspots);

  if (intersects.length > 0) {
    const hit = intersects[0].object;
    const key = hit.userData.featureKey;
    const idx = hit.userData.index;

    // Reset previous
    if (selectedHotspotIndex >= 0) {
      hotspotMaterials[selectedHotspotIndex].color.setHex(0xFF6B35);
      hotspotMaterials[selectedHotspotIndex].emissive.setHex(0xFF6B35);
      window.__3D_STATE__.hotspotColors[selectedHotspotIndex] = '#FF6B35';
    }

    // Highlight new
    selectedHotspotIndex = idx;
    hotspotMaterials[idx].color.setHex(0xFFD700);
    hotspotMaterials[idx].emissive.setHex(0xFFD700);
    window.__3D_STATE__.hotspotColors[idx] = '#FFD700';
    window.__3D_STATE__.selectedFeature = key;

    // Update panel
    const data = featureData[key];
    const nameEl = document.getElementById('feat-name');
    const descEl = document.getElementById('feat-desc');
    nameEl.textContent = data.name;
    descEl.textContent = data.desc;
    nameEl.style.display = 'block';
    descEl.style.display = 'block';
  }
});

// ============ AUTO ROTATE ============
const autoRotateBtn = document.getElementById('auto-rotate-btn');
autoRotateBtn.addEventListener('click', () => {
  window.__3D_STATE__.autoRotate = !window.__3D_STATE__.autoRotate;
  autoRotateBtn.textContent = window.__3D_STATE__.autoRotate ? 'Auto Rotate: ON' : 'Auto Rotate: OFF';
});

// ============ COLOR THEMES ============
const colorBtns = document.querySelectorAll('.color-btn');
colorBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.theme;
    window.__3D_STATE__.currentTheme = theme;

    colorBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const colors = themeColors[theme];
    mainBodyMat.color.setHex(colors.main);
    pocketMat.color.setHex(colors.pocket);
    bottlePocketMat.color.setHex(colors.pocket);
  });
});

// ============ EXPLODE VIEW ============
const explodeBtn = document.getElementById('explode-btn');
let explodeTarget = false;
let explodeProgress = 0; // 0 = assembled, 1 = exploded

const originalPositions = {
  leftStrap: leftStrap.position.clone(),
  rightStrap: rightStrap.position.clone(),
  frontPocket: frontPocket.position.clone(),
  bottlePocket: bottlePocket.position.clone(),
  bottleBottom: bottleBottom.position.clone(),
  topHandle: topHandle.position.clone(),
  zipper: zipper.position.clone()
};

const explodedOffsets = {
  leftStrap: new THREE.Vector3(0, 0, -0.5),
  rightStrap: new THREE.Vector3(0, 0, -0.5),
  frontPocket: new THREE.Vector3(0, 0, 0.5),
  bottlePocket: new THREE.Vector3(0.5, 0, 0),
  bottleBottom: new THREE.Vector3(0.5, 0, 0),
  topHandle: new THREE.Vector3(0, 0.5, 0),
  zipper: new THREE.Vector3(0, 0, 0.5)
};

explodeBtn.addEventListener('click', () => {
  explodeTarget = !explodeTarget;
  window.__3D_STATE__.exploded = explodeTarget;
  explodeBtn.textContent = explodeTarget ? 'Assemble' : 'Explode View';
});

function updateExplode() {
  const target = explodeTarget ? 1 : 0;
  explodeProgress += (target - explodeProgress) * 0.08;

  // Clamp
  if (Math.abs(explodeProgress - target) < 0.001) explodeProgress = target;

  const parts = {
    leftStrap, rightStrap, frontPocket, bottlePocket, bottleBottom, topHandle, zipper
  };

  for (const [key, part] of Object.entries(parts)) {
    const orig = originalPositions[key];
    const offset = explodedOffsets[key];
    part.position.x = orig.x + offset.x * explodeProgress;
    part.position.y = orig.y + offset.y * explodeProgress;
    part.position.z = orig.z + offset.z * explodeProgress;
  }
}

// ============ MASCOT LABEL ============
const mascotLabel = document.getElementById('mascot-label');

function updateMascotLabel() {
  if (!horseModel) {
    mascotLabel.style.display = 'none';
    return;
  }
  mascotLabel.style.display = 'block';

  const pos = new THREE.Vector3();
  pos.copy(horseModel.position);
  pos.y += 1.8;

  const projected = pos.clone().project(camera);
  const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

  mascotLabel.style.left = (x - mascotLabel.offsetWidth / 2) + 'px';
  mascotLabel.style.top = (y - 20) + 'px';
}

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);

  const time = clock.getElapsedTime();
  const delta = clock.getDelta();

  // Horse bobbing
  if (horseModel) {
    horseModel.position.y = Math.sin(time * (2 * Math.PI / 3)) * 0.1;
    window.__3D_STATE__.horsePosition = {
      x: horseModel.position.x,
      y: horseModel.position.y,
      z: horseModel.position.z
    };
  }

  // Horse animation mixer
  if (horseMixer) {
    horseMixer.update(1/60);
  }

  // Hotspot pulsing
  hotspots.forEach((h, i) => {
    const s = 0.8 + 0.5 * (0.5 + 0.5 * Math.sin(time * 3 + i * 1.2));
    h.scale.set(s, s, s);
  });

  // Auto rotate
  if (window.__3D_STATE__.autoRotate) {
    backpackGroup.rotation.y += 0.01;
  }
  window.__3D_STATE__.backpackRotationY = backpackGroup.rotation.y;

  // Explode animation
  updateExplode();

  // Update mascot label
  updateMascotLabel();

  // Camera distance
  window.__3D_STATE__.cameraDistance = camera.position.distanceTo(new THREE.Vector3(0, 0, 0));

  // Panel visible
  window.__3D_STATE__.panelVisible = !!document.getElementById('feature-panel');

  controls.update();
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Hide loading after timeout if model doesn't load
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 5000);
</script>
</body>
</html>
