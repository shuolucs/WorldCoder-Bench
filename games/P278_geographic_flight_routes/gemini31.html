<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Geographic Flight Routes</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        button {
            background: rgba(26, 111, 196, 0.8);
            color: white;
            border: 1px solid #2a8fd4;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: rgba(42, 143, 212, 1);
        }
        #infoPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 46, 0.8);
            border: 1px solid #2a8fd4;
            padding: 15px;
            border-radius: 8px;
            min-width: 150px;
            z-index: 10;
            pointer-events: none;
        }
        #infoPanel h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #00ccff;
        }
        #infoPanel p {
            margin: 5px 0;
            font-size: 14px;
        }
        .city-label {
            position: absolute;
            top: 0;
            left: 0;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 5;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="ui-container">
        <button id="toggleRoutes">Toggle Routes</button>
        <button id="speedToggle">Speed: 1x</button>
    </div>

    <div id="infoPanel">
        <h3>Flight Info</h3>
        <p>Cities: 5</p>
        <p>Routes: 4</p>
        <p id="selectedInfo">Selected: None</p>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            cityCount: 5,
            routeCount: 4,
            routesVisible: true,
            selectedCity: null,
            speedMultiplier: 1,
            planePositions: [],
            globeRadius: 5,
            cameraDistance: 18,
            animationRunning: true
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 18);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 6;
        controls.maxDistance = 50;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        // Earth Globe
        const globeRadius = window.__3D_STATE__.globeRadius;
        const globeGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
        const globeMaterial = new THREE.MeshPhongMaterial({ 
            color: 0x1a6fc4,
            shininess: 10
        });
        const globe = new THREE.Mesh(globeGeometry, globeMaterial);
        scene.add(globe);

        // Wireframe Overlay
        const wireframeMaterial = new THREE.MeshBasicMaterial({
            color: 0x2a8fd4,
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        const wireframe = new THREE.Mesh(globeGeometry, wireframeMaterial);
        // Slightly scale up to avoid z-fighting
        wireframe.scale.setScalar(1.001);
        scene.add(wireframe);

        // --- Data ---
        const citiesData = [
            { name: 'New York', lat: 40.7, lon: -74.0, connections: 2 },
            { name: 'London', lat: 51.5, lon: -0.1, connections: 2 },
            { name: 'Tokyo', lat: 35.7, lon: 139.7, connections: 2 },
            { name: 'Sydney', lat: -33.9, lon: 151.2, connections: 1 },
            { name: 'São Paulo', lat: -23.5, lon: -46.6, connections: 1 }
        ];

        const routesData = [
            { from: 'New York', to: 'London', color: 0x00ff88 },
            { from: 'London', to: 'Tokyo', color: 0xffaa00 },
            { from: 'Tokyo', to: 'Sydney', color: 0xff00ff },
            { from: 'New York', to: 'São Paulo', color: 0x00ccff }
        ];

        // --- Helper Functions ---
        function getPositionFromLatLon(lat, lon, radius) {
            const phi = (90 - lat) * (Math.PI / 180);
            const theta = (lon + 180) * (Math.PI / 180);
            const x = -(radius * Math.sin(phi) * Math.cos(theta));
            const z = (radius * Math.sin(phi) * Math.sin(theta));
            const y = (radius * Math.cos(phi));
            return new THREE.Vector3(x, y, z);
        }

        // --- Cities and Markers ---
        const cityMarkers = [];
        const cityLabels = [];
        const cityPositions = {};

        const markerGeometry = new THREE.SphereGeometry(0.12, 16, 16);
        const defaultMarkerMaterial = new THREE.MeshBasicMaterial({ color: 0xff4444 });
        const selectedMarkerMaterial = new THREE.MeshBasicMaterial({ color: 0xffff00 });

        citiesData.forEach(city => {
            const pos = getPositionFromLatLon(city.lat, city.lon, globeRadius);
            cityPositions[city.name] = pos;

            // 3D Marker
            const marker = new THREE.Mesh(markerGeometry, defaultMarkerMaterial.clone());
            marker.position.copy(pos);
            marker.userData = city;
            scene.add(marker);
            cityMarkers.push(marker);

            // HTML Label
            const labelDiv = document.createElement('div');
            labelDiv.className = 'city-label';
            labelDiv.textContent = city.name;
            document.body.appendChild(labelDiv);
            cityLabels.push({ element: labelDiv, pos: pos });
        });

        // --- Flight Routes & Planes ---
        const routeGroup = new THREE.Group();
        scene.add(routeGroup);
        const planes = [];

        // Plane Geometry (Cone pointing along +Z)
        const planeGeo = new THREE.ConeGeometry(0.1, 0.3, 8);
        planeGeo.rotateX(Math.PI / 2);

        routesData.forEach(route => {
            const p1 = cityPositions[route.from];
            const p2 = cityPositions[route.to];
            
            if (!p1 || !p2) return;

            // Create Curve
            const distance = p1.distanceTo(p2);
            const midPoint = p1.clone().lerp(p2, 0.5);
            const elevation = distance * 0.25; 
            midPoint.normalize().multiplyScalar(globeRadius + elevation);

            const curve = new THREE.QuadraticBezierCurve3(p1, midPoint, p2);
            
            // Tube Geometry for Route
            const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
            const tubeMat = new THREE.MeshBasicMaterial({ color: route.color });
            const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
            routeGroup.add(tubeMesh);

            // Animated Plane
            const planeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const planeMesh = new THREE.Mesh(planeGeo, planeMat);
            routeGroup.add(planeMesh);

            planes.push({
                mesh: planeMesh,
                curve: curve,
                t: Math.random() // Start at random position
            });
        });

        // --- Interactions ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedMarkerMesh = null;

        window.addEventListener('click', (event) => {
            if (event.target.tagName === 'BUTTON') return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(cityMarkers);

            if (selectedMarkerMesh) {
                selectedMarkerMesh.material.color.setHex(0xff4444);
            }

            if (intersects.length > 0) {
                selectedMarkerMesh = intersects[0].object;
                selectedMarkerMesh.material.color.setHex(0xffff00);
                
                const data = selectedMarkerMesh.userData;
                document.getElementById('selectedInfo').innerText = `Selected: ${data.name} (${data.connections} routes)`;
                window.__3D_STATE__.selectedCity = data.name;
            } else {
                selectedMarkerMesh = null;
                document.getElementById('selectedInfo').innerText = `Selected: None`;
                window.__3D_STATE__.selectedCity = null;
            }
        });

        // Buttons
        document.getElementById('toggleRoutes').addEventListener('click', () => {
            window.__3D_STATE__.routesVisible = !window.__3D_STATE__.routesVisible;
            routeGroup.visible = window.__3D_STATE__.routesVisible;
        });

        const speedToggleBtn = document.getElementById('speedToggle');
        const speeds = [1, 2, 0.5];
        let speedIndex = 0;
        speedToggleBtn.addEventListener('click', () => {
            speedIndex = (speedIndex + 1) % speeds.length;
            window.__3D_STATE__.speedMultiplier = speeds[speedIndex];
            speedToggleBtn.innerText = `Speed: ${speeds[speedIndex]}x`;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        const tripDuration = 4.0; // seconds

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            controls.update();

            // Update Planes
            window.__3D_STATE__.planePositions = [];
            planes.forEach(p => {
                // t goes from 0 to 1 over tripDuration seconds
                p.t += (delta / tripDuration) * window.__3D_STATE__.speedMultiplier;
                if (p.t > 1) p.t = 0;

                const pos = p.curve.getPointAt(p.t);
                p.mesh.position.copy(pos);

                // Look ahead
                const nextT = Math.min(p.t + 0.01, 1);
                const nextPos = p.curve.getPointAt(nextT);
                p.mesh.lookAt(nextPos);

                window.__3D_STATE__.planePositions.push({ x: pos.x, y: pos.y, z: pos.z });
            });

            // Update HTML Labels
            cityLabels.forEach(label => {
                // Check if point is behind the globe relative to camera
                const camToCity = label.pos.clone().sub(camera.position);
                const cityNormal = label.pos.clone().normalize();
                
                // If dot product is positive, the city normal points away from camera
                if (camToCity.dot(cityNormal) > 0) {
                    label.element.style.display = 'none';
                } else {
                    label.element.style.display = 'block';
                    const vector = label.pos.clone();
                    vector.project(camera);
                    const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
                    const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
                    label.element.style.transform = `translate(-50%, -50%) translate(${x}px,${y}px)`;
                }
            });

            // Update State
            window.__3D_STATE__.cameraDistance = camera.position.distanceTo(scene.position);

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
