<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flight Routes Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }

  #infoPanel {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(42, 143, 212, 0.5);
    border-radius: 10px;
    padding: 20px;
    color: #e0e0ff;
    font-size: 14px;
    min-width: 200px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(42, 143, 212, 0.2);
  }
  #infoPanel h3 {
    margin-bottom: 12px;
    color: #00ff88;
    font-size: 16px;
    border-bottom: 1px solid rgba(42, 143, 212, 0.3);
    padding-bottom: 8px;
  }
  #infoPanel p {
    margin: 6px 0;
    line-height: 1.6;
  }
  #infoPanel span.value {
    color: #ffaa00;
    font-weight: bold;
  }

  #controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
  }
  #controls button {
    background: rgba(10, 10, 46, 0.85);
    border: 1px solid rgba(42, 143, 212, 0.5);
    color: #e0e0ff;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s;
    backdrop-filter: blur(10px);
  }
  #controls button:hover {
    background: rgba(42, 143, 212, 0.3);
    border-color: #00ff88;
    color: #ffffff;
  }

  .city-label {
    position: absolute;
    color: #ffffff;
    font-size: 12px;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.8), 0 0 12px rgba(0,0,0,0.5);
    white-space: nowrap;
    font-weight: 500;
    transform: translate(-50%, -100%);
    padding: 2px 6px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
  }
</style>
</head>
<body>

<div id="infoPanel">
  <h3>✈ Flight Dashboard</h3>
  <p>Cities: <span class="value" id="cityCountDisplay">5</span></p>
  <p>Routes: <span class="value" id="routeCountDisplay">4</span></p>
  <p>Selected: <span class="value" id="selectedDisplay">None</span></p>
</div>

<div id="controls">
  <button id="toggleRoutes">Toggle Routes</button>
  <button id="speedToggle">Speed: 1x</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function() {
  // State
  const state = {
    cityCount: 5,
    routeCount: 4,
    routesVisible: true,
    selectedCity: null,
    speedMultiplier: 1,
    planePositions: [{x:0,y:0,z:0},{x:0,y:0,z:0},{x:0,y:0,z:0},{x:0,y:0,z:0}],
    globeRadius: 5,
    cameraDistance: 18,
    animationRunning: true
  };
  window.__3D_STATE__ = state;

  // Scene setup
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a2e);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 0, 18);
  camera.lookAt(0, 0, 0);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  // Lights
  const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
  scene.add(ambientLight);

  const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
  directionalLight.position.set(10, 10, 10);
  scene.add(directionalLight);

  // Controls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.minDistance = 8;
  controls.maxDistance = 40;

  // Globe
  const globeRadius = 5;
  const globeGeometry = new THREE.SphereGeometry(globeRadius, 64, 64);
  const globeMaterial = new THREE.MeshPhongMaterial({
    color: 0x1a6fc4,
    shininess: 25,
    transparent: true,
    opacity: 0.9
  });
  const globe = new THREE.Mesh(globeGeometry, globeMaterial);
  scene.add(globe);

  // Wireframe overlay
  const wireGeometry = new THREE.SphereGeometry(globeRadius + 0.01, 32, 32);
  const wireMaterial = new THREE.MeshBasicMaterial({
    color: 0x2a8fd4,
    wireframe: true,
    transparent: true,
    opacity: 0.3
  });
  const wireframe = new THREE.Mesh(wireGeometry, wireMaterial);
  scene.add(wireframe);

  // Stars background
  const starsGeometry = new THREE.BufferGeometry();
  const starPositions = [];
  for (let i = 0; i < 2000; i++) {
    starPositions.push(
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200,
      (Math.random() - 0.5) * 200
    );
  }
  starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.3 });
  const stars = new THREE.Points(starsGeometry, starsMaterial);
  scene.add(stars);

  // Lat/Lon to 3D
  function latLonToVec3(lat, lon, radius) {
    const phi = (90 - lat) * (Math.PI / 180);
    const theta = (lon + 180) * (Math.PI / 180);
    const x = -radius * Math.sin(phi) * Math.cos(theta);
    const y = radius * Math.cos(phi);
    const z = radius * Math.sin(phi) * Math.sin(theta);
    return new THREE.Vector3(x, y, z);
  }

  // Cities data
  const cities = [
    { name: 'New York', lat: 40.7, lon: -74.0 },
    { name: 'London', lat: 51.5, lon: -0.1 },
    { name: 'Tokyo', lat: 35.7, lon: 139.7 },
    { name: 'Sydney', lat: -33.9, lon: 151.2 },
    { name: 'São Paulo', lat: -23.5, lon: -46.6 }
  ];

  const cityMeshes = [];
  const cityLabels = [];

  cities.forEach((city) => {
    const pos = latLonToVec3(city.lat, city.lon, globeRadius);

    // City marker
    const markerGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const markerMat = new THREE.MeshBasicMaterial({ color: 0xff4444 });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.copy(pos);
    marker.userData = { cityName: city.name, originalColor: 0xff4444 };
    scene.add(marker);
    cityMeshes.push(marker);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(0.15, 0.25, 32);
    const ringMat = new THREE.MeshBasicMaterial({
      color: 0xff4444,
      transparent: true,
      opacity: 0.4,
      side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.lookAt(0, 0, 0);
    scene.add(ring);

    // HTML label
    const label = document.createElement('div');
    label.className = 'city-label';
    label.textContent = city.name;
    document.body.appendChild(label);
    cityLabels.push({ element: label, position: pos.clone() });
  });

  // Routes
  const routeDefinitions = [
    { from: 0, to: 1, color: 0x00ff88, name: 'New York → London' },
    { from: 1, to: 2, color: 0xffaa00, name: 'London → Tokyo' },
    { from: 2, to: 3, color: 0xff00ff, name: 'Tokyo → Sydney' },
    { from: 0, to: 4, color: 0x00ccff, name: 'New York → São Paulo' }
  ];

  // Count connections per city
  const cityConnections = {};
  cities.forEach(c => cityConnections[c.name] = 0);
  routeDefinitions.forEach(r => {
    cityConnections[cities[r.from].name]++;
    cityConnections[cities[r.to].name]++;
  });

  const routeMeshes = [];
  const routeCurves = [];
  const planes = [];

  function createArc(fromCity, toCity, color) {
    const start = latLonToVec3(fromCity.lat, fromCity.lon, globeRadius);
    const end = latLonToVec3(toCity.lat, toCity.lon, globeRadius);

    const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
    const dist = start.distanceTo(end);
    const elevation = Math.max(2, dist * 0.4);
    mid.normalize().multiplyScalar(globeRadius + elevation);

    const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
    const points = curve.getPoints(80);

    const geometry = new THREE.BufferGeometry().setFromPoints(points);
    const material = new THREE.LineBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.8,
      linewidth: 2
    });
    const line = new THREE.Line(geometry, material);
    scene.add(line);

    // Also add a tube for better visibility
    const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.02, 8, false);
    const tubeMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: 0.6
    });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    scene.add(tube);

    return { line, tube, curve };
  }

  routeDefinitions.forEach((route) => {
    const fromCity = cities[route.from];
    const toCity = cities[route.to];
    const arc = createArc(fromCity, toCity, route.color);
    routeMeshes.push(arc.line, arc.tube);
    routeCurves.push(arc.curve);

    // Create plane (cone)
    const planeGeo = new THREE.ConeGeometry(0.1, 0.3, 8);
    const planeMat = new THREE.MeshBasicMaterial({ color: route.color });
    const planeMesh = new THREE.Mesh(planeGeo, planeMat);
    scene.add(planeMesh);
    planes.push({ mesh: planeMesh, curve: arc.curve, t: Math.random(), color: route.color });
  });

  // Raycasting
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selectedMarker = null;

  renderer.domElement.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(cityMeshes);

    // Reset previous selection
    if (selectedMarker) {
      selectedMarker.material.color.setHex(selectedMarker.userData.originalColor);
    }

    if (intersects.length > 0) {
      const marker = intersects[0].object;
      marker.material.color.setHex(0xffff00);
      selectedMarker = marker;

      const cityName = marker.userData.cityName;
      state.selectedCity = cityName;
      const connections = cityConnections[cityName] || 0;
      document.getElementById('selectedDisplay').textContent = `${cityName} (${connections} routes)`;
    } else {
      selectedMarker = null;
      state.selectedCity = null;
      document.getElementById('selectedDisplay').textContent = 'None';
    }
  });

  // Toggle Routes
  document.getElementById('toggleRoutes').addEventListener('click', () => {
    state.routesVisible = !state.routesVisible;
    routeMeshes.forEach(mesh => {
      mesh.visible = state.routesVisible;
    });
    planes.forEach(p => {
      p.mesh.visible = state.routesVisible;
    });
  });

  // Speed Toggle
  const speeds = [1, 2, 0.5];
  let speedIndex = 0;
  document.getElementById('speedToggle').addEventListener('click', () => {
    speedIndex = (speedIndex + 1) % speeds.length;
    state.speedMultiplier = speeds[speedIndex];
    document.getElementById('speedToggle').textContent = `Speed: ${speeds[speedIndex]}x`;
  });

  // Update labels
  function updateLabels() {
    cityLabels.forEach((label) => {
      const pos = label.position.clone();
      pos.project(camera);

      const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

      // Check if behind globe
      const cameraDir = new THREE.Vector3();
      camera.getWorldDirection(cameraDir);
      const labelDir = label.position.clone().sub(camera.position).normalize();
      const dot = cameraDir.dot(labelDir);

      if (pos.z > 1 || dot < 0) {
        label.element.style.display = 'none';
      } else {
        // Check if occluded by globe
        raycaster.set(camera.position, labelDir);
        const globeIntersects = raycaster.intersectObject(globe);
        if (globeIntersects.length > 0) {
          const distToGlobe = globeIntersects[0].distance;
          const distToLabel = camera.position.distanceTo(label.position);
          if (distToGlobe < distToLabel - 0.2) {
            label.element.style.display = 'none';
            return;
          }
        }
        label.element.style.display = 'block';
        label.element.style.left = x + 'px';
        label.element.style.top = (y - 15) + 'px';
      }
    });
  }

  // Animation
  let lastTime = 0;

  function animate(time) {
    requestAnimationFrame(animate);

    const delta = (time - lastTime) / 1000;
    lastTime = time;

    controls.update();

    // Update camera distance
    state.cameraDistance = camera.position.length();

    // Animate planes
    planes.forEach((plane, index) => {
      plane.t += (delta / 4) * state.speedMultiplier;
      if (plane.t > 1) plane.t -= 1;

      const pos = plane.curve.getPoint(plane.t);
      plane.mesh.position.copy(pos);

      // Orient plane along curve
      const nextT = Math.min(plane.t + 0.01, 1);
      const nextPos = plane.curve.getPoint(nextT);
      const direction = nextPos.clone().sub(pos).normalize();
      const quaternion = new THREE.Quaternion();
      const up = new THREE.Vector3(0, 1, 0);
      const axis = new THREE.Vector3().crossVectors(up, direction).normalize();
      const angle = Math.acos(up.dot(direction));
      quaternion.setFromAxisAngle(axis, angle);
      plane.mesh.quaternion.copy(quaternion);

      state.planePositions[index] = { x: pos.x, y: pos.y, z: pos.z };
    });

    // Slow globe rotation
    // globe.rotation.y += 0.001;
    // wireframe.rotation.y += 0.001;

    updateLabels();
    renderer.render(scene, camera);
  }

  state.animationRunning = true;
  animate(0);

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();
</script>
</body>
</html>
