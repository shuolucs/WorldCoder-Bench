<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Flight Routes Visualization</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, sans-serif;
    }

    #ui {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }

    button:hover {
      background: rgba(255,255,255,0.2);
    }

    #infoPanel {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 20;
      min-width: 220px;
      color: white;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      line-height: 1.6;
      backdrop-filter: blur(6px);
    }

    #labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 15;
    }

    .label {
      position: absolute;
      color: white;
      font-size: 13px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.4);
      border-radius: 6px;
      transform: translate(-50%, -50%);
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="toggleRoutes">Toggle Routes</button>
    <button id="speedToggle">Speed: 1x</button>
  </div>

  <div id="infoPanel">
    <div>Cities: 5</div>
    <div>Routes: 4</div>
    <div id="selectedText">Selected: None</div>
  </div>

  <div id="labels"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.159.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.159.0/examples/jsm/controls/OrbitControls.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      50,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 18);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.minDistance = 8;
    controls.maxDistance = 40;

    const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(10, 10, 10);
    scene.add(directionalLight);

    const GLOBE_RADIUS = 5;

    const globeGroup = new THREE.Group();
    scene.add(globeGroup);

    const earthGeometry = new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64);
    const earthMaterial = new THREE.MeshPhongMaterial({
      color: 0x1a6fc4,
      shininess: 20
    });
    const earthMesh = new THREE.Mesh(earthGeometry, earthMaterial);
    globeGroup.add(earthMesh);

    const wireframe = new THREE.Mesh(
      earthGeometry,
      new THREE.MeshBasicMaterial({
        color: 0x2a8fd4,
        wireframe: true,
        transparent: true,
        opacity: 0.3
      })
    );
    globeGroup.add(wireframe);

    function latLonToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);

      const x = -(radius * Math.sin(phi) * Math.cos(theta));
      const z = radius * Math.sin(phi) * Math.sin(theta);
      const y = radius * Math.cos(phi);

      return new THREE.Vector3(x, y, z);
    }

    const cities = [
      { name: "New York", lat: 40.7, lon: -74.0 },
      { name: "London", lat: 51.5, lon: -0.1 },
      { name: "Tokyo", lat: 35.7, lon: 139.7 },
      { name: "Sydney", lat: -33.9, lon: 151.2 },
      { name: "São Paulo", lat: -23.5, lon: -46.6 }
    ];

    const routeDefinitions = [
      { from: "New York", to: "London", color: 0x00ff88 },
      { from: "London", to: "Tokyo", color: 0xffaa00 },
      { from: "Tokyo", to: "Sydney", color: 0xff00ff },
      { from: "New York", to: "São Paulo", color: 0x00ccff }
    ];

    const cityMap = new Map();
    const cityMarkers = [];
    const labelsContainer = document.getElementById("labels");

    const markerGeometry = new THREE.SphereGeometry(0.12, 16, 16);
    const defaultMarkerColor = 0xff4444;
    const highlightMarkerColor = 0xffff00;

    cities.forEach(city => {
      const position = latLonToVector3(city.lat, city.lon, GLOBE_RADIUS + 0.01);

      const markerMaterial = new THREE.MeshPhongMaterial({ color: defaultMarkerColor });
      const marker = new THREE.Mesh(markerGeometry, markerMaterial);
      marker.position.copy(position);
      marker.userData = { type: "city", cityName: city.name };
      globeGroup.add(marker);

      const label = document.createElement("div");
      label.className = "label";
      label.textContent = city.name;
      labelsContainer.appendChild(label);

      const cityObj = {
        ...city,
        position,
        marker,
        label
      };

      cityMap.set(city.name, cityObj);
      cityMarkers.push(marker);
    });

    const routeGroup = new THREE.Group();
    scene.add(routeGroup);

    const routes = [];
    const planes = [];

    function createArc(start, end, color) {
      const mid = start.clone().add(end).multiplyScalar(0.5);
      const elevated = mid.clone().normalize().multiplyScalar(GLOBE_RADIUS + 2.5);

      const curve = new THREE.QuadraticBezierCurve3(
        start.clone(),
        elevated,
        end.clone()
      );

      const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.045, 8, false);
      const tubeMaterial = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.95
      });

      const arcMesh = new THREE.Mesh(tubeGeometry, tubeMaterial);
      routeGroup.add(arcMesh);

      return { curve, mesh: arcMesh };
    }

    function createPlane(color) {
      const geometry = new THREE.ConeGeometry(0.12, 0.35, 8);
      const material = new THREE.MeshPhongMaterial({ color });
      const plane = new THREE.Mesh(geometry, material);
      scene.add(plane);
      return plane;
    }

    routeDefinitions.forEach((routeDef, index) => {
      const fromCity = cityMap.get(routeDef.from);
      const toCity = cityMap.get(routeDef.to);

      const arc = createArc(fromCity.position, toCity.position, routeDef.color);
      const plane = createPlane(routeDef.color);

      routes.push({
        ...routeDef,
        curve: arc.curve,
        mesh: arc.mesh
      });

      planes.push({
        mesh: plane,
        curve: arc.curve,
        t: index * 0.2
      });
    });

    function getConnectedRoutesCount(cityName) {
      return routeDefinitions.filter(
        r => r.from === cityName || r.to === cityName
      ).length;
    }

    const selectedText = document.getElementById("selectedText");
    let selectedCity = null;

    function updateSelectedCity(cityName) {
      selectedCity = cityName;

      cities.forEach(city => {
        const marker = cityMap.get(city.name).marker;
        marker.material.color.setHex(
          city.name === cityName ? highlightMarkerColor : defaultMarkerColor
        );
      });

      if (cityName) {
        const connected = getConnectedRoutesCount(cityName);
        selectedText.textContent = `Selected: ${cityName} (${connected} routes)`;
      } else {
        selectedText.textContent = "Selected: None";
      }

      window.__3D_STATE__.selectedCity = cityName;
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(cityMarkers, false);

      if (intersects.length > 0) {
        const clicked = intersects[0].object.userData.cityName;
        updateSelectedCity(clicked);
      }
    }

    renderer.domElement.addEventListener("click", onPointerClick);

    const toggleRoutesBtn = document.getElementById("toggleRoutes");
    const speedToggleBtn = document.getElementById("speedToggle");

    let routesVisible = true;
    let speedMultiplier = 1;
    const speedCycle = [1, 2, 0.5];

    toggleRoutesBtn.addEventListener("click", () => {
      routesVisible = !routesVisible;
      routeGroup.visible = routesVisible;
      window.__3D_STATE__.routesVisible = routesVisible;
    });

    speedToggleBtn.addEventListener("click", () => {
      const idx = speedCycle.indexOf(speedMultiplier);
      speedMultiplier = speedCycle[(idx + 1) % speedCycle.length];
      speedToggleBtn.textContent = `Speed: ${speedMultiplier}x`;
      window.__3D_STATE__.speedMultiplier = speedMultiplier;
    });

    window.__3D_STATE__ = {
      cityCount: 5,
      routeCount: 4,
      routesVisible: true,
      selectedCity: null,
      speedMultiplier: 1,
      planePositions: [{x:0,y:0,z:0},{x:0,y:0,z:0},{x:0,y:0,z:0},{x:0,y:0,z:0}],
      globeRadius: 5,
      cameraDistance: camera.position.length(),
      animationRunning: true
    };

    function updateLabels() {
      cities.forEach(city => {
        const cityObj = cityMap.get(city.name);
        const pos = cityObj.position.clone();
        pos.project(camera);

        const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
        const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;

        const camToPoint = cityObj.position.clone().normalize();
        const camDir = camera.position.clone().normalize();
        const visible = camToPoint.dot(camDir) > -0.2;

        cityObj.label.style.display = visible ? "block" : "none";
        cityObj.label.style.left = `${x + 10}px`;
        cityObj.label.style.top = `${y - 10}px`;
      });
    }

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();

      planes.forEach((planeObj, i) => {
        planeObj.t = (planeObj.t + (delta / 4) * speedMultiplier) % 1;

        const point = planeObj.curve.getPointAt(planeObj.t);
        const tangent = planeObj.curve.getTangentAt(planeObj.t).normalize();

        planeObj.mesh.position.copy(point);

        const axis = new THREE.Vector3(0, 1, 0);
        planeObj.mesh.quaternion.setFromUnitVectors(axis, tangent.clone().normalize());

        window.__3D_STATE__.planePositions[i] = {
          x: point.x,
          y: point.y,
          z: point.z
        };
      });

      controls.update();
      updateLabels();

      window.__3D_STATE__.cameraDistance = camera.position.length();
      window.__3D_STATE__.animationRunning = true;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
