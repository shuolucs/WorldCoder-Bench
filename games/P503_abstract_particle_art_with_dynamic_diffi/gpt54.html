<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrainStem Particle Difficulty Scene</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050510;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      z-index: 10;
      white-space: pre-line;
      pointer-events: none;
    }

    #snapshot-btn {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      padding: 10px 18px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      color: white;
      font-family: monospace;
      font-size: 14px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.18);
    }

    #snapshot-btn:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <button id="snapshot-btn">Snapshot</button>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const PARTICLE_COUNT = 500;
    const MAX_RADIUS = 10;
    const RESET_RADIUS = 3;
    const START_RADIUS = 5;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 2, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.target.set(0, 0, 0);
    controls.update();

    const ambient = new THREE.AmbientLight(0x404040, 0.5);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0xffffff, 1.5);
    pointLight.position.set(5, 10, 5);
    scene.add(pointLight);

    const hud = document.getElementById('hud');
    const snapshotBtn = document.getElementById('snapshot-btn');

    const clock = new THREE.Clock();

    const state = {
      modelLoaded: false,
      difficultyLevel: 1,
      particleCount: PARTICLE_COUNT,
      activeAttractors: 1,
      cameraMode: 'orbit',
      paused: false,
      totalKineticEnergy: 0,
      repulsorCount: 0,
      snapshotCentroid: null,
      particlesInBounds: PARTICLE_COUNT,
      elapsedTime: 0,
      modelAnimationPlaying: false
    };
    window.__3D_STATE__ = state;

    let mixer = null;
    let brainModel = null;
    let brainRoot = new THREE.Group();
    scene.add(brainRoot);

    const loader = new GLTFLoader();
    loader.load(
      'BrainStem.glb',
      (gltf) => {
        brainModel = gltf.scene;
        brainRoot.add(brainModel);

        const box = new THREE.Box3().setFromObject(brainModel);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());

        brainModel.position.sub(center);

        const radius = Math.max(size.x, size.y, size.z) * 0.5 || 1;
        const scale = 2 / radius;
        brainModel.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(brainModel);
        const center2 = box2.getCenter(new THREE.Vector3());
        brainModel.position.sub(center2);

        if (gltf.animations && gltf.animations.length > 0) {
          mixer = new THREE.AnimationMixer(brainModel);
          gltf.animations.forEach((clip) => {
            mixer.clipAction(clip).play();
          });
          state.modelAnimationPlaying = true;
        }

        state.modelLoaded = true;
      },
      undefined,
      (err) => {
        console.warn('Failed to load BrainStem.glb:', err);
        state.modelLoaded = false;
        state.modelAnimationPlaying = false;
      }
    );

    function randomPointInSphere(radius) {
      const u = Math.random();
      const v = Math.random();
      const theta = u * Math.PI * 2;
      const phi = Math.acos(2 * v - 1);
      const r = radius * Math.cbrt(Math.random());
      return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
      );
    }

    const particleGeometry = new THREE.BufferGeometry();
    const positions = new Float32Array(PARTICLE_COUNT * 3);
    const colors = new Float32Array(PARTICLE_COUNT * 3);
    const velocities = new Float32Array(PARTICLE_COUNT * 3);
    const initialPositions = new Float32Array(PARTICLE_COUNT * 3);

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = randomPointInSphere(START_RADIUS);
      positions[i * 3 + 0] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;
      initialPositions[i * 3 + 0] = p.x;
      initialPositions[i * 3 + 1] = p.y;
      initialPositions[i * 3 + 2] = p.z;

      velocities[i * 3 + 0] = (Math.random() - 0.5) * 0.02;
      velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
      velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;

      colors[i * 3 + 0] = 0.3;
      colors[i * 3 + 1] = 0.5;
      colors[i * 3 + 2] = 1.0;
    }

    particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    particleGeometry.setAttribute('velocity', new THREE.BufferAttribute(velocities, 3));

    const particleMaterial = new THREE.PointsMaterial({
      size: 0.08,
      vertexColors: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(particleGeometry, particleMaterial);
    scene.add(particles);

    const trails = [];
    function createTrail(level) {
      const length = 8 + level * 8;
      const geom = new THREE.BufferGeometry();
      const arr = new Float32Array(PARTICLE_COUNT * 3 * length);
      for (let i = 0; i < arr.length; i++) arr[i] = 9999;
      geom.setAttribute('position', new THREE.BufferAttribute(arr, 3));

      const mat = new THREE.PointsMaterial({
        size: 0.03,
        vertexColors: false,
        color: 0x88ccff,
        transparent: true,
        opacity: 0.08 + level * 0.02,
        blending: THREE.AdditiveBlending,
        depthWrite: false
      });

      const pts = new THREE.Points(geom, mat);
      scene.add(pts);

      return { length, geom, arr, pts };
    }

    let trailSystem = createTrail(1);

    function rebuildTrail(level) {
      scene.remove(trailSystem.pts);
      trailSystem.geom.dispose();
      trailSystem.pts.material.dispose();
      trailSystem = createTrail(level);
    }

    const attractors = [];
    for (let i = 0; i < 5; i++) {
      attractors.push({
        position: new THREE.Vector3(),
        phase: Math.random() * Math.PI * 2
      });
    }

    const repulsors = [];
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clickPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

    const difficultySettings = {
      1: { speed: 0.5, palette: 'blue', trail: 16 },
      2: { speed: 1.0, palette: 'bluegreen', trail: 24 },
      3: { speed: 1.5, palette: 'rainbow', trail: 32 },
      4: { speed: 2.0, palette: 'neon', trail: 40 },
      5: { speed: 2.5, palette: 'full', trail: 48 }
    };

    function setDifficulty(level) {
      state.difficultyLevel = THREE.MathUtils.clamp(level, 1, 5);
      state.activeAttractors = state.difficultyLevel;
      rebuildTrail(state.difficultyLevel);
    }

    function resetParticles() {
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        positions[i * 3 + 0] = initialPositions[i * 3 + 0];
        positions[i * 3 + 1] = initialPositions[i * 3 + 1];
        positions[i * 3 + 2] = initialPositions[i * 3 + 2];

        velocities[i * 3 + 0] = 0;
        velocities[i * 3 + 1] = 0;
        velocities[i * 3 + 2] = 0;
      }
      particleGeometry.attributes.position.needsUpdate = true;
      particleGeometry.attributes.velocity.needsUpdate = true;
      setDifficulty(1);
    }

    function paletteColor(level, i, time, speedMag) {
      const t = i / PARTICLE_COUNT + time * 0.05 + speedMag * 0.2;
      const c = new THREE.Color();

      if (level === 1) {
        c.setRGB(0.2 + 0.2 * Math.sin(t * 3), 0.35 + 0.15 * Math.sin(t * 4), 1.0);
      } else if (level === 2) {
        c.setHSL(0.5 + 0.1 * Math.sin(t * 4), 0.9, 0.5);
      } else if (level === 3) {
        c.setHSL((t * 0.7) % 1, 1.0, 0.55);
      } else if (level === 4) {
        const hues = [0.85, 0.55, 0.15, 0.0, 0.33];
        c.setHSL(hues[i % hues.length] + 0.1 * Math.sin(time + i), 1.0, 0.6);
      } else {
        c.setHSL((t + Math.sin(time + i * 0.1) * 0.15) % 1, 1.0, 0.6);
      }
      return c;
    }

    function updateAttractors(time) {
      const level = state.difficultyLevel;
      const count = level;
      for (let i = 0; i < count; i++) {
        const a = attractors[i];

        if (level === 1) {
          a.position.set(0, 0, 0);
        } else if (level === 2) {
          if (i === 0) a.position.set(0, 0, 0);
          if (i === 1) a.position.set(2.5 * Math.cos(time * 0.8), 1.2 * Math.sin(time * 0.6), 2.5 * Math.sin(time * 0.8));
        } else if (level >= 3) {
          const orbitRadius = 3;
          const angularSpeed = 0.5 * (i + 1);
          const angle = time * angularSpeed + a.phase;

          if (level === 3) {
            a.position.set(
              orbitRadius * Math.cos(angle),
              Math.sin(angle * 0.7) * 1.5,
              orbitRadius * Math.sin(angle)
            );
          } else if (level === 4) {
            a.position.set(
              orbitRadius * Math.cos(angle) + Math.sin(time * 2.1 + i) * 0.9,
              Math.cos(angle * 1.3 + i) * 1.8,
              orbitRadius * Math.sin(angle) + Math.cos(time * 1.7 - i) * 0.9
            );
          } else if (level === 5) {
            const turbulence = 0.8;
            a.position.set(
              orbitRadius * Math.cos(angle) + turbulence * Math.sin(time * 3.1 + i * 2.3),
              Math.sin(angle * 1.9) * 2.0 + turbulence * Math.cos(time * 2.7 + i),
              orbitRadius * Math.sin(angle) + turbulence * Math.sin(time * 2.4 - i * 1.7)
            );
          }
        }
      }
    }

    function updateTrails() {
      const trailArr = trailSystem.arr;
      const chunk = PARTICLE_COUNT * 3;
      trailArr.copyWithin(chunk, 0, trailArr.length - chunk);
      trailArr.set(positions, 0);
      trailSystem.geom.attributes.position.needsUpdate = true;

      const level = state.difficultyLevel;
      const hue = level === 1 ? 0.6 : level === 2 ? 0.48 : (performance.now() * 0.0001) % 1;
      trailSystem.pts.material.color.setHSL(hue, 1.0, 0.6);
      trailSystem.pts.material.opacity = 0.05 + level * 0.025;
    }

    function updateHUD() {
      hud.textContent =
`Difficulty: ${state.difficultyLevel}
Particles: ${state.particleCount}
Active Attractors: ${state.activeAttractors}
Camera Mode: ${state.cameraMode}
Paused: ${state.paused}
Kinetic Energy: ${state.totalKineticEnergy.toFixed(2)}`;
    }

    function setCameraMode(mode) {
      state.cameraMode = mode;
      controls.enabled = mode === 'free';

      if (mode === 'top') {
        camera.position.set(0, 12, 0.001);
        camera.lookAt(0, 0, 0);
      } else if (mode === 'orbit') {
        camera.position.set(0, 2, 8);
        camera.lookAt(0, 0, 0);
      }
      controls.update();
    }

    function cycleCameraMode() {
      const modes = ['orbit', 'top', 'free'];
      const idx = modes.indexOf(state.cameraMode);
      setCameraMode(modes[(idx + 1) % modes.length]);
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key.toLowerCase();

      if (key >= '1' && key <= '5') {
        setDifficulty(parseInt(key, 10));
      } else if (key === 'r') {
        resetParticles();
      } else if (key === 'p') {
        state.paused = !state.paused;
        state.modelAnimationPlaying = !!mixer && !state.paused;
      } else if (key === 'c') {
        cycleCameraMode();
      }
    });

    renderer.domElement.addEventListener('click', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const point = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(clickPlane, point)) {
        repulsors.push({
          position: point.clone(),
          expiresAt: performance.now() + 3000
        });
      }
    });

    snapshotBtn.addEventListener('click', () => {
      const centroid = { x: 0, y: 0, z: 0 };
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        centroid.x += positions[i * 3 + 0];
        centroid.y += positions[i * 3 + 1];
        centroid.z += positions[i * 3 + 2];
      }
      centroid.x /= PARTICLE_COUNT;
      centroid.y /= PARTICLE_COUNT;
      centroid.z /= PARTICLE_COUNT;
      state.snapshotCentroid = centroid;
    });

    function animate() {
      requestAnimationFrame(animate);

      const dtRaw = clock.getDelta();
      const dt = Math.min(dtRaw, 0.033);
      const now = performance.now();
      state.repulsorCount = repulsors.length;

      if (!state.paused) {
        state.elapsedTime += dt;
        updateAttractors(state.elapsedTime);

        const level = state.difficultyLevel;
        const speedMultiplier = difficultySettings[level].speed;

        state.totalKineticEnergy = 0;
        state.particlesInBounds = 0;

        for (let i = repulsors.length - 1; i >= 0; i--) {
          if (now > repulsors[i].expiresAt) repulsors.splice(i, 1);
        }
        state.repulsorCount = repulsors.length;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const ix = i * 3;
          let px = positions[ix + 0];
          let py = positions[ix + 1];
          let pz = positions[ix + 2];

          let vx = velocities[ix + 0];
          let vy = velocities[ix + 1];
          let vz = velocities[ix + 2];

          for (let a = 0; a < state.activeAttractors; a++) {
            const ap = attractors[a].position;
            let dx = ap.x - px;
            let dy = ap.y - py;
            let dz = ap.z - pz;
            const distSq = Math.max(dx * dx + dy * dy + dz * dz, 0.05);
            const dist = Math.sqrt(distSq);
            let force = Math.min(0.5 / distSq, 2.0);

            dx /= dist;
            dy /= dist;
            dz /= dist;

            vx += dx * force * speedMultiplier * dt;
            vy += dy * force * speedMultiplier * dt;
            vz += dz * force * speedMultiplier * dt;
          }

          for (let r = 0; r < repulsors.length; r++) {
            const rp = repulsors[r].position;
            let dx = rp.x - px;
            let dy = rp.y - py;
            let dz = rp.z - pz;
            const distSq = Math.max(dx * dx + dy * dy + dz * dz, 0.05);
            const dist = Math.sqrt(distSq);
            let force = Math.max(-1.0 / distSq, -2.0);

            dx /= dist;
            dy /= dist;
            dz /= dist;

            vx += dx * force * dt;
            vy += dy * force * dt;
            vz += dz * force * dt;
          }

          if (level === 1) {
            const tangentX = -pz;
            const tangentZ = px;
            vx += tangentX * 0.01 * dt;
            vz += tangentZ * 0.01 * dt;
          }

          if (level === 5) {
            const n = Math.sin(px * 1.7 + state.elapsedTime * 2.2) +
                      Math.cos(py * 1.9 - state.elapsedTime * 1.6) +
                      Math.sin(pz * 2.1 + state.elapsedTime * 1.3);
            vx += Math.sin(n + i) * 0.015 * dt;
            vy += Math.cos(n + i * 0.7) * 0.015 * dt;
            vz += Math.sin(n * 0.8 + i * 0.3) * 0.015 * dt;
          }

          vx *= 0.98;
          vy *= 0.98;
          vz *= 0.98;

          px += vx;
          py += vy;
          pz += vz;

          const radius = Math.sqrt(px * px + py * py + pz * pz);
          if (radius > MAX_RADIUS) {
            const reset = randomPointInSphere(RESET_RADIUS);
            px = reset.x;
            py = reset.y;
            pz = reset.z;
            vx = 0;
            vy = 0;
            vz = 0;
          } else {
            state.particlesInBounds++;
          }

          positions[ix + 0] = px;
          positions[ix + 1] = py;
          positions[ix + 2] = pz;
          velocities[ix + 0] = vx;
          velocities[ix + 1] = vy;
          velocities[ix + 2] = vz;

          const speedMag = Math.sqrt(vx * vx + vy * vy + vz * vz);
          state.totalKineticEnergy += 0.5 * (vx * vx + vy * vy + vz * vz);

          const c = paletteColor(level, i, state.elapsedTime, speedMag);
          colors[ix + 0] = c.r;
          colors[ix + 1] = c.g;
          colors[ix + 2] = c.b;
        }

        particleGeometry.attributes.position.needsUpdate = true;
        particleGeometry.attributes.color.needsUpdate = true;
        particleGeometry.attributes.velocity.needsUpdate = true;

        updateTrails();

        if (mixer) {
          mixer.update(dt);
          state.modelAnimationPlaying = !state.paused;
        }
      }

      if (state.cameraMode === 'orbit' && !state.paused) {
        const t = state.elapsedTime * 0.25;
        camera.position.x = Math.cos(t) * 8;
        camera.position.z = Math.sin(t) * 8;
        camera.position.y = 2 + Math.sin(t * 0.7) * 0.8;
        camera.lookAt(0, 0, 0);
      } else if (state.cameraMode === 'top') {
        camera.position.set(0, 12, 0.001);
        camera.lookAt(0, 0, 0);
      } else if (state.cameraMode === 'free') {
        controls.update();
      }

      updateHUD();
      renderer.render(scene, camera);
    }

    setDifficulty(1);
    setCameraMode('orbit');
    updateHUD();
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
