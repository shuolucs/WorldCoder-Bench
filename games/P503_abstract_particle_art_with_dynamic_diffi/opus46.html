<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abstract Particle Art Scene</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #050510; }
canvas { display: block; }
#hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #ffffff;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    border-radius: 8px;
    pointer-events: none;
    z-index: 10;
    min-width: 280px;
}
#snapshot-btn {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 30px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.15);
    color: #ffffff;
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 5px;
    cursor: pointer;
    z-index: 10;
    transition: background 0.3s;
}
#snapshot-btn:hover {
    background: rgba(255, 255, 255, 0.3);
}
</style>
</head>
<body>

<div id="hud">Loading...</div>
<button id="snapshot-btn">Snapshot</button>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const state = {
    modelLoaded: false,
    difficultyLevel: 1,
    particleCount: 500,
    activeAttractors: 1,
    cameraMode: 'orbit',
    paused: false,
    totalKineticEnergy: 0,
    repulsorCount: 0,
    snapshotCentroid: null,
    particlesInBounds: 500,
    elapsedTime: 0,
    modelAnimationPlaying: false
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050510);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 2, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.5);
pointLight.position.set(5, 10, 5);
scene.add(pointLight);

// OrbitControls (for 'free' mode)
const orbitControls = new OrbitControls(camera, renderer.domElement);
orbitControls.enabled = false;
orbitControls.enableDamping = true;

// --- Model Loading ---
let mixer = null;
let modelGroup = null;

const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/BrainStem/glTF-Binary/BrainStem.glb',
    (gltf) => {
        modelGroup = gltf.scene;
        
        // Center and scale model
        const box = new THREE.Box3().setFromObject(modelGroup);
        const center = box.getCenter(new THREE.Vector3());
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 4.0 / maxDim; // fit within 2-unit bounding sphere (radius 2)
        
        modelGroup.position.sub(center.multiplyScalar(scale));
        modelGroup.scale.setScalar(scale);
        
        // Re-center after scaling
        const box2 = new THREE.Box3().setFromObject(modelGroup);
        const center2 = box2.getCenter(new THREE.Vector3());
        modelGroup.position.sub(center2);
        
        scene.add(modelGroup);
        
        // Animations
        if (gltf.animations && gltf.animations.length > 0) {
            mixer = new THREE.AnimationMixer(modelGroup);
            gltf.animations.forEach(clip => {
                mixer.clipAction(clip).play();
            });
            state.modelAnimationPlaying = true;
        }
        
        state.modelLoaded = true;
    },
    undefined,
    (error) => {
        console.error('Error loading model:', error);
        // Try alternate URL
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/BrainStem/glTF-Binary/BrainStem.glb',
            (gltf) => {
                modelGroup = gltf.scene;
                const box = new THREE.Box3().setFromObject(modelGroup);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 4.0 / maxDim;
                modelGroup.position.sub(center.multiplyScalar(scale));
                modelGroup.scale.setScalar(scale);
                const box2 = new THREE.Box3().setFromObject(modelGroup);
                const center2 = box2.getCenter(new THREE.Vector3());
                modelGroup.position.sub(center2);
                scene.add(modelGroup);
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(modelGroup);
                    gltf.animations.forEach(clip => {
                        mixer.clipAction(clip).play();
                    });
                    state.modelAnimationPlaying = true;
                }
                state.modelLoaded = true;
            },
            undefined,
            (err2) => {
                console.error('Fallback also failed:', err2);
                state.modelLoaded = false;
            }
        );
    }
);

// --- Particle System ---
const PARTICLE_COUNT = 500;
const positions = new Float32Array(PARTICLE_COUNT * 3);
const colors = new Float32Array(PARTICLE_COUNT * 3);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const initialPositions = new Float32Array(PARTICLE_COUNT * 3);

function randomSpherePoint(radius) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = radius * Math.cbrt(Math.random());
    return [
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    ];
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
    const [x, y, z] = randomSpherePoint(5);
    positions[i * 3] = x;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = z;
    initialPositions[i * 3] = x;
    initialPositions[i * 3 + 1] = y;
    initialPositions[i * 3 + 2] = z;
    
    colors[i * 3] = 0.2;
    colors[i * 3 + 1] = 0.4;
    colors[i * 3 + 2] = 1.0;
    
    velocities[i * 3] = (Math.random() - 0.5) * 0.02;
    velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
    velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;
}

const particleGeometry = new THREE.BufferGeometry();
particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMaterial = new THREE.PointsMaterial({
    size: 0.08,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.9,
    depthWrite: false
});

const particleSystem = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particleSystem);

// --- Difficulty & Attractors ---
let attractors = [];
let repulsors = [];

function getAttractorsForLevel(level, time) {
    const attractorList = [];
    
    if (level >= 1) {
        attractorList.push(new THREE.Vector3(0, 0, 0));
    }
    if (level >= 2) {
        attractorList.push(new THREE.Vector3(2, 1, 0));
    }
    if (level >= 3) {
        for (let i = 2; i < level; i++) {
            const angle = time * 0.5 * i;
            const r = 3;
            attractorList.push(new THREE.Vector3(
                r * Math.cos(angle),
                r * Math.sin(angle * 0.7),
                r * Math.sin(angle)
            ));
        }
        // Update the second attractor to orbit too at level 3+
        if (attractorList.length >= 2) {
            const angle2 = time * 0.5 * 1;
            attractorList[1] = new THREE.Vector3(
                3 * Math.cos(angle2),
                3 * Math.sin(angle2 * 0.7),
                3 * Math.sin(angle2)
            );
        }
    }
    
    return attractorList;
}

function getColorForLevel(level, particleIndex, time) {
    const t = (particleIndex / PARTICLE_COUNT + time * 0.1) % 1.0;
    let r, g, b;
    
    switch (level) {
        case 1: // Blue palette
            r = 0.1 + 0.1 * Math.sin(t * Math.PI * 2);
            g = 0.2 + 0.2 * Math.sin(t * Math.PI * 2 + 1);
            b = 0.6 + 0.4 * Math.sin(t * Math.PI * 2 + 2);
            break;
        case 2: // Blue-green palette
            r = 0.05 + 0.1 * Math.sin(t * Math.PI * 2);
            g = 0.4 + 0.4 * Math.sin(t * Math.PI * 2 + 0.5);
            b = 0.5 + 0.4 * Math.sin(t * Math.PI * 2 + 1.5);
            break;
        case 3: // Rainbow palette
            r = 0.5 + 0.5 * Math.sin(t * Math.PI * 2);
            g = 0.5 + 0.5 * Math.sin(t * Math.PI * 2 + 2.094);
            b = 0.5 + 0.5 * Math.sin(t * Math.PI * 2 + 4.189);
            break;
        case 4: // Neon palette
            r = 0.8 + 0.2 * Math.sin(t * Math.PI * 6);
            g = 0.2 + 0.8 * Math.sin(t * Math.PI * 4 + 1);
            b = 0.5 + 0.5 * Math.sin(t * Math.PI * 8 + 2);
            break;
        case 5: // Full spectrum
            r = 0.5 + 0.5 * Math.sin(t * Math.PI * 10 + time);
            g = 0.5 + 0.5 * Math.sin(t * Math.PI * 8 + time * 1.3 + 2);
            b = 0.5 + 0.5 * Math.sin(t * Math.PI * 6 + time * 0.7 + 4);
            break;
        default:
            r = g = b = 1;
    }
    
    return [r, g, b];
}

function getSpeedMultiplier(level) {
    return level * 0.5;
}

// Simple turbulence noise for level 5
function turbulence(x, y, z, time) {
    return new THREE.Vector3(
        Math.sin(x * 2.3 + time) * Math.cos(z * 1.7 + time * 0.8) * 0.3,
        Math.cos(y * 1.9 + time * 1.1) * Math.sin(x * 2.1 + time * 0.6) * 0.3,
        Math.sin(z * 2.5 + time * 0.9) * Math.cos(y * 1.5 + time * 1.2) * 0.3
    );
}

// --- Raycasting for click ---
const raycaster = new THREE.Raycaster();
const clickPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);

renderer.domElement.addEventListener('click', (event) => {
    const mouse = new THREE.Vector2(
        (event.clientX / window.innerWidth) * 2 - 1,
        -(event.clientY / window.innerHeight) * 2 + 1
    );
    
    raycaster.setFromCamera(mouse, camera);
    const intersectPoint = new THREE.Vector3();
    raycaster.ray.intersectPlane(clickPlane, intersectPoint);
    
    if (intersectPoint) {
        repulsors.push({
            position: intersectPoint.clone(),
            timeLeft: 3.0
        });
    }
});

// --- Keyboard Controls ---
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    
    if (key >= '1' && key <= '5') {
        state.difficultyLevel = parseInt(key);
    } else if (key === 'r') {
        // Reset
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const [x, y, z] = randomSpherePoint(5);
            positions[i * 3] = x;
            positions[i * 3 + 1] = y;
            positions[i * 3 + 2] = z;
            initialPositions[i * 3] = x;
            initialPositions[i * 3 + 1] = y;
            initialPositions[i * 3 + 2] = z;
            velocities[i * 3] = (Math.random() - 0.5) * 0.02;
            velocities[i * 3 + 1] = (Math.random() - 0.5) * 0.02;
            velocities[i * 3 + 2] = (Math.random() - 0.5) * 0.02;
        }
        particleGeometry.attributes.position.needsUpdate = true;
        state.difficultyLevel = 1;
        repulsors = [];
    } else if (key === 'p') {
        state.paused = !state.paused;
    } else if (key === 'c') {
        const modes = ['orbit', 'top', 'free'];
        const currentIndex = modes.indexOf(state.cameraMode);
        state.cameraMode = modes[(currentIndex + 1) % modes.length];
        
        if (state.cameraMode === 'free') {
            orbitControls.enabled = true;
            orbitControls.target.set(0, 0, 0);
        } else {
            orbitControls.enabled = false;
        }
    }
});

// --- Snapshot Button ---
document.getElementById('snapshot-btn').addEventListener('click', () => {
    let cx = 0, cy = 0, cz = 0;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        cx += positions[i * 3];
        cy += positions[i * 3 + 1];
        cz += positions[i * 3 + 2];
    }
    cx /= PARTICLE_COUNT;
    cy /= PARTICLE_COUNT;
    cz /= PARTICLE_COUNT;
    state.snapshotCentroid = {
        x: parseFloat(cx.toFixed(4)),
        y: parseFloat(cy.toFixed(4)),
        z: parseFloat(cz.toFixed(4))
    };
});

// --- HUD Update ---
const hudElement = document.getElementById('hud');

function updateHUD() {
    hudElement.innerHTML = `
<b>◆ PARTICLE ART SCENE</b>
─────────────────────
Difficulty : ${state.difficultyLevel} / 5
Particles  : ${state.particleCount}
Attractors : ${state.activeAttractors}
Camera     : ${state.cameraMode}
Paused     : ${state.paused ? 'YES' : 'NO'}
Kinetic E  : ${state.totalKineticEnergy.toFixed(2)}
Repulsors  : ${state.repulsorCount}
In Bounds  : ${state.particlesInBounds}
Time       : ${state.elapsedTime.toFixed(1)}s
Model      : ${state.modelLoaded ? 'Loaded' : 'Loading...'}
─────────────────────
<span style="font-size:11px; opacity:0.6">Keys: 1-5 Level | R Reset
P Pause | C Camera</span>`;
}

// --- Animation Loop ---
const clock = new THREE.Clock();
let simulationTime = 0;

function animate() {
    requestAnimationFrame(animate);
    
    const delta = clock.getDelta();
    
    if (!state.paused) {
        simulationTime += delta;
        state.elapsedTime = simulationTime;
        
        const level = state.difficultyLevel;
        const speedMult = getSpeedMultiplier(level);
        
        // Update attractors
        attractors = getAttractorsForLevel(level, simulationTime);
        state.activeAttractors = attractors.length;
        
        // Update repulsors
        for (let r = repulsors.length - 1; r >= 0; r--) {
            repulsors[r].timeLeft -= delta;
            if (repulsors[r].timeLeft <= 0) {
                repulsors.splice(r, 1);
            }
        }
        state.repulsorCount = repulsors.length;
        
        // Update particles
        let totalKE = 0;
        let inBounds = 0;
        const tempVec = new THREE.Vector3();
        const particlePos = new THREE.Vector3();
        
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const ix = i * 3;
            const iy = i * 3 + 1;
            const iz = i * 3 + 2;
            
            particlePos.set(positions[ix], positions[iy], positions[iz]);
            
            // Attractor forces
            for (let a = 0; a < attractors.length; a++) {
                tempVec.copy(attractors[a]).sub(particlePos);
                const dist = tempVec.length();
                if (dist > 0.01) {
                    let force = 0.5 / (dist * dist);
                    force = Math.min(force, 2.0);
                    tempVec.normalize().multiplyScalar(force * speedMult * delta * 60);
                    velocities[ix] += tempVec.x;
                    velocities[iy] += tempVec.y;
                    velocities[iz] += tempVec.z;
                }
            }
            
            // Repulsor forces
            for (let r = 0; r < repulsors.length; r++) {
                tempVec.copy(repulsors[r].position).sub(particlePos).negate();
                const dist = tempVec.length();
                if (dist > 0.01) {
                    let force = 1.0 / (dist * dist);
                    force = Math.min(force, 2.0);
                    tempVec.normalize().multiplyScalar(force * speedMult * delta * 60);
                    velocities[ix] += tempVec.x;
                    velocities[iy] += tempVec.y;
                    velocities[iz] += tempVec.z;
                }
            }
            
            // Turbulence for level 5
            if (level >= 5) {
                const turb = turbulence(positions[ix], positions[iy], positions[iz], simulationTime);
                velocities[ix] += turb.x * delta * 60 * speedMult;
                velocities[iy] += turb.y * delta * 60 * speedMult;
                velocities[iz] += turb.z * delta * 60 * speedMult;
            }
            
            // Damping
            velocities[ix] *= 0.98;
            velocities[iy] *= 0.98;
            velocities[iz] *= 0.98;
            
            // Update position
            positions[ix] += velocities[ix] * delta * 60;
            positions[iy] += velocities[iy] * delta * 60;
            positions[iz] += velocities[iz] * delta * 60;
            
            // Boundary check
            const distFromOrigin = Math.sqrt(
                positions[ix] * positions[ix] +
                positions[iy] * positions[iy] +
                positions[iz] * positions[iz]
            );
            
            if (distFromOrigin > 10) {
                const [nx, ny, nz] = randomSpherePoint(3);
                positions[ix] = nx;
                positions[iy] = ny;
                positions[iz] = nz;
                velocities[ix] = (Math.random() - 0.5) * 0.02;
                velocities[iy] = (Math.random() - 0.5) * 0.02;
                velocities[iz] = (Math.random() - 0.5) * 0.02;
            } else {
                inBounds++;
            }
            
            // Kinetic energy
            const vSq = velocities[ix] * velocities[ix] +
                        velocities[iy] * velocities[iy] +
                        velocities[iz] * velocities[iz];
            totalKE += 0.5 * vSq;
            
            // Update colors
            const [cr, cg, cb] = getColorForLevel(level, i, simulationTime);
            colors[ix] = cr;
            colors[iy] = cg;
            colors[iz] = cb;
        }
        
        particleGeometry.attributes.position.needsUpdate = true;
        particleGeometry.attributes.color.needsUpdate = true;
        
        state.totalKineticEnergy = totalKE;
        state.particlesInBounds = inBounds;
        
        // Update model animation
        if (mixer) {
            mixer.update(delta);
            state.modelAnimationPlaying = true;
        }
    } else {
        state.modelAnimationPlaying = false;
    }
    
    // Camera modes
    if (state.cameraMode === 'orbit') {
        const orbitAngle = simulationTime * 0.3;
        camera.position.set(
            8 * Math.cos(orbitAngle),
            2 + Math.sin(orbitAngle * 0.5) * 1,
            8 * Math.sin(orbitAngle)
        );
        camera.lookAt(0, 0, 0);
    } else if (state.cameraMode === 'top') {
        camera.position.set(0, 12, 0);
        camera.lookAt(0, 0, 0);
    } else if (state.cameraMode === 'free') {
        orbitControls.update();
    }
    
    updateHUD();
    renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
