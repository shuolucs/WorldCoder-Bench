<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bowling Game with Undo/Redo</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }
    #score {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 22px;
      z-index: 10;
    }
    #throw {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 22px;
      z-index: 10;
    }
    #undo-count {
      position: absolute;
      top: 46px;
      left: 12px;
      font-size: 16px;
      z-index: 10;
    }
    #redo-count {
      position: absolute;
      top: 46px;
      right: 12px;
      font-size: 16px;
      z-index: 10;
    }
    #instructions {
      position: absolute;
      bottom: 18px;
      width: 100%;
      text-align: center;
      font-size: 18px;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <div id="throw">Throw: 0</div>
  <div id="undo-count">Undo steps: 0</div>
  <div id="redo-count">Redo steps: 0</div>
  <div id="instructions">Press SPACE to launch | Arrows to aim | U=Undo R=Redo</div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152.2/examples/jsm/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20252b);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 8, 18);
    camera.lookAt(0, 0, -8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 15, 10);
    scene.add(dirLight);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const scoreEl = document.getElementById('score');
    const throwEl = document.getElementById('throw');
    const undoCountEl = document.getElementById('undo-count');
    const redoCountEl = document.getElementById('redo-count');

    const laneMaterial = new THREE.MeshStandardMaterial({ color: '#C4A36E' });
    const gutterMaterial = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const pinMaterial = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const ballMaterial = new THREE.MeshStandardMaterial({ color: '#1a1a6e' });
    const pedestalMaterial = new THREE.MeshStandardMaterial({
      color: 0xd4af37,
      metalness: 0.7,
      roughness: 0.3
    });

    const lane = new THREE.Mesh(
      new THREE.BoxGeometry(3, 0.2, 20),
      laneMaterial
    );
    lane.position.set(0, 0, -1);
    scene.add(lane);

    const leftGutter = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.12, 20),
      gutterMaterial
    );
    leftGutter.position.set(-1.9, -0.02, -1);
    scene.add(leftGutter);

    const rightGutter = new THREE.Mesh(
      new THREE.BoxGeometry(0.5, 0.12, 20),
      gutterMaterial
    );
    rightGutter.position.set(1.9, -0.02, -1);
    scene.add(rightGutter);

    const floor = new THREE.Mesh(
      new THREE.PlaneGeometry(40, 40),
      new THREE.MeshStandardMaterial({ color: 0x2a2a2a })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.11;
    scene.add(floor);

    const pinMeshes = [];
    let pinsDown = new Array(10).fill(false);

    function createPin(name, x, z, index) {
      const pin = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 0.6, 20),
        pinMaterial
      );
      pin.position.set(x, 0.4, z);
      pin.name = name;
      pin.userData.index = index;
      scene.add(pin);
      pinMeshes.push(pin);
    }

    const pinStartZ = -8;
    const rowSpacingZ = 0.55;
    const rowSpacingX = 0.35;
    const pinPositions = [
      { x: 0, z: pinStartZ },
      { x: -rowSpacingX / 2, z: pinStartZ - rowSpacingZ },
      { x: rowSpacingX / 2, z: pinStartZ - rowSpacingZ },
      { x: -rowSpacingX, z: pinStartZ - rowSpacingZ * 2 },
      { x: 0, z: pinStartZ - rowSpacingZ * 2 },
      { x: rowSpacingX, z: pinStartZ - rowSpacingZ * 2 },
      { x: -rowSpacingX * 1.5, z: pinStartZ - rowSpacingZ * 3 },
      { x: -rowSpacingX / 2, z: pinStartZ - rowSpacingZ * 3 },
      { x: rowSpacingX / 2, z: pinStartZ - rowSpacingZ * 3 },
      { x: rowSpacingX * 1.5, z: pinStartZ - rowSpacingZ * 3 }
    ];

    pinPositions.forEach((p, i) => createPin(`pin_${i}`, p.x, p.z, i));

    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.35, 32, 32),
      ballMaterial
    );
    ball.position.set(0, 0.55, 6);
    scene.add(ball);

    const pedestal = new THREE.Mesh(
      new THREE.CylinderGeometry(0.5, 0.5, 1.5, 32),
      pedestalMaterial
    );
    pedestal.position.set(4, 0.75, -4);
    scene.add(pedestal);

    let nefertitiLoaded = false;
    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'Nefertiti.glb',
      (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(0.015);
        model.position.set(4, 1.55, -4);
        scene.add(model);
        nefertitiLoaded = true;
        updateExposedState();
      },
      undefined,
      (err) => {
        console.warn('Failed to load Nefertiti.glb:', err);
        nefertitiLoaded = false;
        updateExposedState();
      }
    );

    let ballLaunched = false;
    let gamePhase = 'aiming';
    let throwCount = 0;
    let score = 0;
    let hitChecked = false;

    const undoStack = [];
    const redoStack = [];

    function cloneSnapshot(snapshot) {
      return {
        ballX: snapshot.ballX,
        pinsDown: [...snapshot.pinsDown],
        score: snapshot.score,
        throwCount: snapshot.throwCount
      };
    }

    function makeSnapshot() {
      return {
        ballX: ball.position.x,
        pinsDown: [...pinsDown],
        score,
        throwCount
      };
    }

    function pushInitialState() {
      undoStack.length = 0;
      redoStack.length = 0;
      undoStack.push(makeSnapshot());
      updateUI();
    }

    function applyPinsState() {
      for (let i = 0; i < pinMeshes.length; i++) {
        const pin = pinMeshes[i];
        if (pinsDown[i]) {
          pin.rotation.x = Math.PI / 2;
          pin.position.y = 0.15;
        } else {
          pin.rotation.x = 0;
          pin.position.y = 0.4;
        }
      }
    }

    function restoreSnapshot(snapshot) {
      pinsDown = [...snapshot.pinsDown];
      score = snapshot.score;
      throwCount = snapshot.throwCount;
      ball.position.set(0, 0.55, 6);
      ball.position.x = snapshot.ballX;
      ballLaunched = false;
      gamePhase = 'aiming';
      hitChecked = false;
      applyPinsState();
      updateUI();
    }

    function updateUI() {
      scoreEl.textContent = `Score: ${score}`;
      throwEl.textContent = `Throw: ${throwCount}`;
      undoCountEl.textContent = `Undo steps: ${Math.max(0, undoStack.length - 1)}`;
      redoCountEl.textContent = `Redo steps: ${redoStack.length}`;
      updateExposedState();
    }

    function updateExposedState() {
      window.__3D_STATE__ = {
        ballX: ball.position.x,
        ballZ: ball.position.z,
        ballLaunched,
        throwCount,
        score,
        pinsDown: [...pinsDown],
        undoStackSize: Math.max(0, undoStack.length - 1),
        redoStackSize: redoStack.length,
        nefertitiLoaded,
        gamePhase
      };
    }

    function resetBallToStart(centerX = 0) {
      ball.position.set(centerX, 0.55, 6);
      ballLaunched = false;
      hitChecked = false;
    }

    function completeThrow() {
      throwCount += 1;
      gamePhase = 'complete';

      const snapshot = makeSnapshot();
      undoStack.push(cloneSnapshot(snapshot));
      redoStack.length = 0;

      resetBallToStart(0);
      gamePhase = 'aiming';
      updateUI();
    }

    function checkPinHits() {
      if (hitChecked) return;
      hitChecked = true;

      for (let i = 0; i < pinMeshes.length; i++) {
        if (pinsDown[i]) continue;
        const pin = pinMeshes[i];
        const dx = Math.abs(pin.position.x - ball.position.x);
        if (dx <= 0.7) {
          pinsDown[i] = true;
          pin.rotation.x = Math.PI / 2;
          pin.position.y = 0.15;
          score += 1;
        }
      }

      updateUI();
    }

    window.addEventListener('keydown', (e) => {
      const key = e.key;

      if ((key === 'ArrowLeft' || key === 'ArrowRight') && gamePhase === 'aiming') {
        if (key === 'ArrowLeft') {
          ball.position.x = Math.max(-1.2, ball.position.x - 0.1);
        } else {
          ball.position.x = Math.min(1.2, ball.position.x + 0.1);
        }
        updateUI();
      }

      if (key === ' ' || key === 'Spacebar' || e.code === 'Space') {
        if (gamePhase === 'aiming' && !ballLaunched) {
          ballLaunched = true;
          gamePhase = 'rolling';
          hitChecked = false;
          updateUI();
        }
      }

      if (key === 'u' || key === 'U') {
        if (undoStack.length > 1) {
          const current = undoStack.pop();
          redoStack.push(cloneSnapshot(current));
          const previous = undoStack[undoStack.length - 1];
          restoreSnapshot(previous);
        }
      }

      if (key === 'r' || key === 'R') {
        if (redoStack.length > 0) {
          const snapshot = redoStack.pop();
          undoStack.push(cloneSnapshot(snapshot));
          restoreSnapshot(snapshot);
        }
      }
    });

    function animate() {
      requestAnimationFrame(animate);

      if (ballLaunched && gamePhase === 'rolling') {
        ball.position.z -= 0.3;
        ball.rotation.x += 0.15;

        if (ball.position.z < -7) {
          checkPinHits();
        }

        if (ball.position.z < -10) {
          completeThrow();
        }
      }

      updateExposedState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    pushInitialState();
    applyPinsState();
    updateUI();
    animate();
  </script>
</body>
</html>
