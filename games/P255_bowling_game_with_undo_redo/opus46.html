<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Game with Undo/Redo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; color: white; text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
  }
  #score {
    position: absolute; top: 20px; left: 20px; font-size: 28px; font-weight: bold;
  }
  #throw-count {
    position: absolute; top: 20px; right: 20px; font-size: 28px; font-weight: bold;
  }
  #instructions {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    font-size: 16px; text-align: center; background: rgba(0,0,0,0.5);
    padding: 10px 20px; border-radius: 8px;
  }
  #undo-count {
    position: absolute; top: 60px; left: 20px; font-size: 18px; color: #aaf;
  }
  #redo-count {
    position: absolute; top: 60px; right: 20px; font-size: 18px; color: #faa;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="score">Score: 0</div>
  <div id="throw-count">Throw: 0</div>
  <div id="undo-count">Undo steps: 0</div>
  <div id="redo-count">Redo steps: 0</div>
  <div id="instructions">Press SPACE to launch | Arrows to aim | U=Undo R=Redo</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.155.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.155.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 25, 50);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 18);
camera.lookAt(0, 0, -8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// ============ BOWLING LANE ============
const laneMat = new THREE.MeshStandardMaterial({ color: 0xC4A36E, roughness: 0.4, metalness: 0.1 });
const laneGeo = new THREE.BoxGeometry(3, 0.2, 20);
const lane = new THREE.Mesh(laneGeo, laneMat);
lane.position.set(0, -0.1, -0);
lane.receiveShadow = true;
scene.add(lane);

// Lane lines
const lineGeo = new THREE.BoxGeometry(0.02, 0.21, 20);
const lineMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
for (let i = -1; i <= 1; i += 0.5) {
  if (i === 0) continue;
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.position.set(i, -0.0, 0);
  scene.add(line);
}

// Gutters
const gutterGeo = new THREE.BoxGeometry(0.5, 0.15, 20);
const gutterMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
const gutterLeft = new THREE.Mesh(gutterGeo, gutterMat);
gutterLeft.position.set(-1.75, -0.12, 0);
gutterLeft.receiveShadow = true;
scene.add(gutterLeft);

const gutterRight = new THREE.Mesh(gutterGeo, gutterMat);
gutterRight.position.set(1.75, -0.12, 0);
gutterRight.receiveShadow = true;
scene.add(gutterRight);

// Gutter inner walls
const gutterWallGeo = new THREE.BoxGeometry(0.05, 0.3, 20);
const gutterWallMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
const gwl = new THREE.Mesh(gutterWallGeo, gutterWallMat);
gwl.position.set(-2.0, -0.05, 0);
scene.add(gwl);
const gwr = new THREE.Mesh(gutterWallGeo, gutterWallMat);
gwr.position.set(2.0, -0.05, 0);
scene.add(gwr);

// Floor
const floorGeo = new THREE.PlaneGeometry(30, 40);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.21;
floor.receiveShadow = true;
scene.add(floor);

// Back wall
const wallGeo = new THREE.BoxGeometry(10, 5, 0.3);
const wallMat = new THREE.MeshStandardMaterial({ color: 0x2a2a3e });
const backWall = new THREE.Mesh(wallGeo, wallMat);
backWall.position.set(0, 2.3, -10.5);
backWall.receiveShadow = true;
scene.add(backWall);

// ============ BOWLING PINS ============
const PIN_POSITIONS = [];
const pinRows = [
  [0],
  [-0.35, 0.35],
  [-0.7, 0, 0.7],
  [-1.05, -0.35, 0.35, 1.05]
];
const pinBaseZ = -8;
let pinIndex = 0;
for (let row = 0; row < pinRows.length; row++) {
  for (let col = 0; col < pinRows[row].length; col++) {
    PIN_POSITIONS.push({
      x: pinRows[row][col],
      z: pinBaseZ - row * 0.6
    });
    pinIndex++;
  }
}

const pinMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 });
const pinRedMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.3 });

const pins = [];
const pinsDown = new Array(10).fill(false);

function createPin(index) {
  const group = new THREE.Group();
  
  // Pin body (cylinder)
  const bodyGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 12);
  const body = new THREE.Mesh(bodyGeo, pinMat);
  body.position.y = 0.3;
  body.castShadow = true;
  group.add(body);
  
  // Pin neck (thinner part)
  const neckGeo = new THREE.CylinderGeometry(0.08, 0.12, 0.2, 12);
  const neck = new THREE.Mesh(neckGeo, pinMat);
  neck.position.y = 0.7;
  neck.castShadow = true;
  group.add(neck);
  
  // Pin head
  const headGeo = new THREE.SphereGeometry(0.1, 12, 8);
  const head = new THREE.Mesh(headGeo, pinMat);
  head.position.y = 0.85;
  head.castShadow = true;
  group.add(head);
  
  // Red stripe
  const stripeGeo = new THREE.CylinderGeometry(0.155, 0.155, 0.08, 12);
  const stripe = new THREE.Mesh(stripeGeo, pinRedMat);
  stripe.position.y = 0.5;
  group.add(stripe);
  
  group.name = `pin_${index}`;
  group.position.set(PIN_POSITIONS[index].x, 0, PIN_POSITIONS[index].z);
  
  return group;
}

for (let i = 0; i < 10; i++) {
  const pin = createPin(i);
  pins.push(pin);
  scene.add(pin);
}

// ============ BOWLING BALL ============
const ballGeo = new THREE.SphereGeometry(0.35, 32, 32);
const ballMat = new THREE.MeshStandardMaterial({ color: 0x1a1a6e, roughness: 0.2, metalness: 0.5 });
const ball = new THREE.Mesh(ballGeo, ballMat);
ball.position.set(0, 0.55, 6);
ball.castShadow = true;
scene.add(ball);

// Ball finger holes
const holeMat = new THREE.MeshStandardMaterial({ color: 0x0a0a3e });
const holeGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.1, 8);
for (let i = 0; i < 3; i++) {
  const hole = new THREE.Mesh(holeGeo, holeMat);
  const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
  hole.position.set(Math.cos(angle) * 0.15, 0.33, Math.sin(angle) * 0.15);
  ball.add(hole);
}

// ============ PEDESTAL & NEFERTITI ============
const pedestalGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 24);
const pedestalMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.3, metalness: 0.7 });
const pedestal = new THREE.Mesh(pedestalGeo, pedestalMat);
pedestal.position.set(4, 0.75, -4);
pedestal.castShadow = true;
pedestal.receiveShadow = true;
scene.add(pedestal);

// Pedestal top rim
const rimGeo = new THREE.CylinderGeometry(0.55, 0.55, 0.1, 24);
const rim = new THREE.Mesh(rimGeo, pedestalMat);
rim.position.set(4, 1.55, -4);
scene.add(rim);

// Pedestal base
const baseGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.1, 24);
const base = new THREE.Mesh(baseGeo, pedestalMat);
base.position.set(4, 0.05, -4);
scene.add(base);

// Load Nefertiti
let nefertitiLoaded = false;
const loader = new GLTFLoader();
loader.load('Nefertiti.glb', (gltf) => {
  const model = gltf.scene;
  model.scale.set(0.015, 0.015, 0.015);
  model.position.set(4, 1.6, -4);
  model.castShadow = true;
  model.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
  scene.add(model);
  nefertitiLoaded = true;
  updateGlobalState();
  console.log('Nefertiti model loaded successfully');
}, (progress) => {
  console.log('Loading Nefertiti:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
}, (error) => {
  console.warn('Could not load Nefertiti.glb, placing placeholder trophy:', error.message);
  // Placeholder bust
  const bustGroup = new THREE.Group();
  const bustHeadGeo = new THREE.SphereGeometry(0.3, 16, 16);
  const bustMat = new THREE.MeshStandardMaterial({ color: 0xD4A574, roughness: 0.4, metalness: 0.2 });
  const bustHead = new THREE.Mesh(bustHeadGeo, bustMat);
  bustHead.position.y = 0.5;
  bustGroup.add(bustHead);
  
  const bustNeckGeo = new THREE.CylinderGeometry(0.12, 0.15, 0.25, 12);
  const bustNeck = new THREE.Mesh(bustNeckGeo, bustMat);
  bustNeck.position.y = 0.2;
  bustGroup.add(bustNeck);
  
  const bustBodyGeo = new THREE.CylinderGeometry(0.25, 0.35, 0.3, 12);
  const bustBody = new THREE.Mesh(bustBodyGeo, bustMat);
  bustBody.position.y = 0.0;
  bustGroup.add(bustBody);
  
  // Crown
  const crownGeo = new THREE.ConeGeometry(0.2, 0.4, 8);
  const crownMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, metalness: 0.8, roughness: 0.2 });
  const crown = new THREE.Mesh(crownGeo, crownMat);
  crown.position.y = 0.85;
  bustGroup.add(crown);
  
  bustGroup.position.set(4, 1.6, -4);
  bustGroup.castShadow = true;
  scene.add(bustGroup);
  nefertitiLoaded = true;
  updateGlobalState();
});

// ============ GAME STATE ============
let ballX = 0;
let ballZ = 6;
let ballLaunched = false;
let throwCount = 0;
let score = 0;
let gamePhase = 'aiming'; // 'aiming' | 'rolling' | 'complete'

// Undo/Redo stacks
const undoStack = [];
const redoStack = [];

// Initial state snapshot (before any throw)
function createSnapshot() {
  return {
    ballX: ballX,
    pinsDown: [...pinsDown],
    score: score,
    throwCount: throwCount
  };
}

// Save initial state
undoStack.push(createSnapshot());

function applySnapshot(snapshot) {
  ballX = 0; // Reset aim to center
  ball.position.set(0, 0.55, 6);
  ballZ = 6;
  ballLaunched = false;
  gamePhase = 'aiming';
  
  score = snapshot.score;
  throwCount = snapshot.throwCount;
  
  for (let i = 0; i < 10; i++) {
    pinsDown[i] = snapshot.pinsDown[i];
    if (pinsDown[i]) {
      pins[i].rotation.x = Math.PI / 2;
      pins[i].position.y = -0.1;
    } else {
      pins[i].rotation.x = 0;
      pins[i].position.y = 0;
      pins[i].position.x = PIN_POSITIONS[i].x;
      pins[i].position.z = PIN_POSITIONS[i].z;
    }
  }
  
  updateHUD();
  updateGlobalState();
}

// ============ HUD UPDATE ============
function updateHUD() {
  document.getElementById('score').textContent = `Score: ${score}`;
  document.getElementById('throw-count').textContent = `Throw: ${throwCount}`;
  document.getElementById('undo-count').textContent = `Undo steps: ${undoStack.length - 1}`;
  document.getElementById('redo-count').textContent = `Redo steps: ${redoStack.length}`;
}

// ============ GLOBAL STATE ============
function updateGlobalState() {
  window.__3D_STATE__ = {
    ballX: ball.position.x,
    ballZ: ball.position.z,
    ballLaunched: ballLaunched,
    throwCount: throwCount,
    score: score,
    pinsDown: [...pinsDown],
    undoStackSize: undoStack.length - 1,
    redoStackSize: redoStack.length,
    nefertitiLoaded: nefertitiLoaded,
    gamePhase: gamePhase
  };
}

// ============ INPUT HANDLING ============
const keys = {};
document.addEventListener('keydown', (e) => {
  if (keys[e.code]) return; // Prevent repeat
  keys[e.code] = true;
  
  if (gamePhase === 'aiming') {
    if (e.code === 'ArrowLeft') {
      ballX = Math.max(ballX - 0.1, -1.2);
      ball.position.x = ballX;
      updateGlobalState();
    }
    if (e.code === 'ArrowRight') {
      ballX = Math.min(ballX + 0.1, 1.2);
      ball.position.x = ballX;
      updateGlobalState();
    }
    if (e.code === 'Space') {
      e.preventDefault();
      ballLaunched = true;
      gamePhase = 'rolling';
      updateGlobalState();
    }
  }
  
  if (e.code === 'KeyU' && gamePhase !== 'rolling') {
    // Undo
    if (undoStack.length > 1) {
      const currentState = undoStack.pop();
      redoStack.push(currentState);
      const prevState = undoStack[undoStack.length - 1];
      applySnapshot(prevState);
    }
  }
  
  if (e.code === 'KeyR' && gamePhase !== 'rolling') {
    // Redo
    if (redoStack.length > 0) {
      const redoState = redoStack.pop();
      undoStack.push(redoState);
      applySnapshot(redoState);
    }
  }
});

document.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ============ PIN KNOCK ANIMATION ============
const knockingPins = []; // { pin, targetRotX, targetY, speed }

function knockDownPin(index) {
  if (pinsDown[index]) return;
  pinsDown[index] = true;
  
  // Determine fall direction based on ball position relative to pin
  const pin = pins[index];
  const dx = pin.position.x - ball.position.x;
  
  knockingPins.push({
    pin: pin,
    index: index,
    targetRotX: Math.PI / 2,
    fallDir: dx > 0 ? 1 : -1,
    progress: 0
  });
}

// ============ ANIMATION LOOP ============
let throwCompleteProcessed = false;

function animate() {
  requestAnimationFrame(animate);
  
  // Ball rolling
  if (ballLaunched && gamePhase === 'rolling') {
    ballZ -= 0.3;
    ball.position.z = ballZ;
    
    // Ball rotation for rolling effect
    ball.rotation.x -= 0.15;
    
    // Check pin collisions at z < -7
    if (ballZ < -7 && !throwCompleteProcessed) {
      for (let i = 0; i < 10; i++) {
        if (!pinsDown[i]) {
          const pinX = PIN_POSITIONS[i].x;
          const pinZ = PIN_POSITIONS[i].z;
          const dist = Math.sqrt(
            Math.pow(ball.position.x - pinX, 2) + 
            Math.pow(ballZ - pinZ, 2)
          );
          if (dist < 0.7) {
            knockDownPin(i);
          }
        }
      }
    }
    
    // Throw complete
    if (ballZ < -10 && !throwCompleteProcessed) {
      throwCompleteProcessed = true;
      gamePhase = 'complete';
      
      // Count score
      score = pinsDown.filter(d => d).length;
      throwCount++;
      
      // Save snapshot
      const snapshot = createSnapshot();
      undoStack.push(snapshot);
      redoStack.length = 0; // Clear redo on new action
      
      // Reset ball after short delay
      setTimeout(() => {
        ballX = 0;
        ballZ = 6;
        ball.position.set(0, 0.55, 6);
        ball.rotation.x = 0;
        ballLaunched = false;
        gamePhase = 'aiming';
        throwCompleteProcessed = false;
        updateHUD();
        updateGlobalState();
      }, 500);
      
      updateHUD();
      updateGlobalState();
    }
  }
  
  // Animate knocking pins
  for (let i = knockingPins.length - 1; i >= 0; i--) {
    const kp = knockingPins[i];
    kp.progress += 0.08;
    if (kp.progress >= 1) {
      kp.pin.rotation.x = Math.PI / 2;
      kp.pin.position.y = -0.1;
      knockingPins.splice(i, 1);
    } else {
      kp.pin.rotation.x = kp.progress * Math.PI / 2;
      kp.pin.position.y = Math.max(-0.1, (1 - kp.progress) * 0);
      kp.pin.position.x = PIN_POSITIONS[kp.index].x + kp.fallDir * kp.progress * 0.2;
    }
  }
  
  // Aiming indicator - subtle ball glow
  if (gamePhase === 'aiming') {
    const t = Date.now() * 0.003;
    ball.position.y = 0.55 + Math.sin(t) * 0.02;
  }
  
  updateGlobalState();
  renderer.render(scene, camera);
}

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ INIT ============
updateHUD();
updateGlobalState();
animate();

</script>
</body>
</html>
