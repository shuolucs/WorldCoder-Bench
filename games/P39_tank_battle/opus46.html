<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
  canvas { display: block; }
  #hud {
    position: absolute; top: 20px; left: 20px; color: #fff;
    background: rgba(0,0,0,0.6); padding: 15px 20px; border-radius: 10px;
    font-size: 16px; line-height: 1.8; pointer-events: none;
    border: 1px solid rgba(255,255,255,0.2);
  }
  #hud .label { color: #aaa; }
  #hud .value { font-weight: bold; }
  #hp-bar-container {
    width: 200px; height: 14px; background: #333; border-radius: 7px;
    overflow: hidden; margin-top: 4px; border: 1px solid #555;
  }
  #hp-bar {
    height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a);
    transition: width 0.3s; border-radius: 7px;
  }
  #crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 30px; height: 30px; pointer-events: none;
  }
  #crosshair::before, #crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.7);
  }
  #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
  #crosshair::after { height: 2px; width: 100%; top: 50%; transform: translateY(-50%); }
  #gameOver {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #fff; font-size: 48px; font-weight: bold; text-align: center;
    display: none; text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
    background: rgba(0,0,0,0.7); padding: 40px 60px; border-radius: 20px;
  }
  #gameOver .sub { font-size: 20px; margin-top: 10px; color: #aaa; }
  #instructions {
    position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 13px; pointer-events: none;
    background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 6px;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="hud">
  <div><span class="label">HP: </span><span class="value" id="playerHP">200</span> / 200</div>
  <div id="hp-bar-container"><div id="hp-bar" style="width:100%"></div></div>
  <div style="margin-top:8px"><span class="label">Shells Fired: </span><span class="value" id="shellsFired">0</span></div>
  <div><span class="label">Enemies Alive: </span><span class="value" id="enemyCount">5</span></div>
  <div><span class="label">Score: </span><span class="value" id="score">0</span></div>
</div>
<div id="crosshair"></div>
<div id="gameOver">
  <div id="gameOverText">GAME OVER</div>
  <div class="sub">Click to restart</div>
</div>
<div id="instructions">WASD - Move | Mouse - Aim Turret | Left Click - Fire</div>

<script type="module">
import * as THREE from 'three';

// ============ GLOBALS ============
let scene, camera, renderer, clock;
let playerTank, playerHP = 200;
let shellsFired = 0, score = 0;
let enemies = [];
let shells = [];
let explosions = [];
let obstacles = [];
let walls = [];
let keys = {};
let turretAngle = 0;
let mouseX = 0;
let gameOver = false;
let gameResult = '';
const FIELD_SIZE = 100;
const HALF_FIELD = FIELD_SIZE / 2;
const WALL_HEIGHT = 3;
const WALL_THICKNESS = 2;

// ============ INIT ============
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 80, 150);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
  clock = new THREE.Clock();

  // Lights
  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(30, 50, 30);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.left = -60;
  dirLight.shadow.camera.right = 60;
  dirLight.shadow.camera.top = 60;
  dirLight.shadow.camera.bottom = -60;
  dirLight.shadow.camera.near = 1;
  dirLight.shadow.camera.far = 120;
  scene.add(dirLight);

  const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.3);
  scene.add(hemiLight);

  createGround();
  createWalls();
  createObstacles();
  createPlayerTank();
  createEnemyTanks();

  // Events
  window.addEventListener('resize', onResize);
  window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
  window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('click', onClick);
  renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());

  // Lock pointer
  renderer.domElement.addEventListener('click', () => {
    if (!gameOver) renderer.domElement.requestPointerLock();
  });

  window.__3D_STATE__ = {};
  animate();
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function onMouseMove(e) {
  if (document.pointerLockElement === renderer.domElement) {
    turretAngle -= e.movementX * 0.003;
  }
}

function onClick(e) {
  if (gameOver) {
    restartGame();
    return;
  }
  if (e.button === 0) {
    fireShell(playerTank, true);
  }
}

// ============ GROUND ============
function createGround() {
  const groundGeo = new THREE.PlaneGeometry(FIELD_SIZE, FIELD_SIZE);
  const groundMat = new THREE.MeshStandardMaterial({
    color: 0x8B9A46,
    roughness: 0.9,
    metalness: 0.0
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);
}

// ============ WALLS ============
function createWalls() {
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x8B7355, roughness: 0.8 });

  const wallConfigs = [
    { w: FIELD_SIZE + WALL_THICKNESS * 2, d: WALL_THICKNESS, x: 0, z: -HALF_FIELD - WALL_THICKNESS / 2 },
    { w: FIELD_SIZE + WALL_THICKNESS * 2, d: WALL_THICKNESS, x: 0, z: HALF_FIELD + WALL_THICKNESS / 2 },
    { w: WALL_THICKNESS, d: FIELD_SIZE, x: -HALF_FIELD - WALL_THICKNESS / 2, z: 0 },
    { w: WALL_THICKNESS, d: FIELD_SIZE, x: HALF_FIELD + WALL_THICKNESS / 2, z: 0 },
  ];

  wallConfigs.forEach(cfg => {
    const geo = new THREE.BoxGeometry(cfg.w, WALL_HEIGHT, cfg.d);
    const mesh = new THREE.Mesh(geo, wallMat);
    mesh.position.set(cfg.x, WALL_HEIGHT / 2, cfg.z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    walls.push({
      mesh,
      minX: cfg.x - cfg.w / 2,
      maxX: cfg.x + cfg.w / 2,
      minZ: cfg.z - cfg.d / 2,
      maxZ: cfg.z + cfg.d / 2,
      halfW: cfg.w / 2,
      halfD: cfg.d / 2
    });
  });
}

// ============ OBSTACLES ============
function createObstacles() {
  const obsMat = new THREE.MeshStandardMaterial({ color: 0x7A6B5D, roughness: 0.7 });

  for (let i = 0; i < 10; i++) {
    const w = 3 + Math.random() * 2;
    const h = 2 + Math.random() * 1;
    const d = 3 + Math.random() * 2;
    const geo = new THREE.BoxGeometry(w, h, d);
    const mesh = new THREE.Mesh(geo, obsMat);

    let x, z, valid;
    do {
      x = (Math.random() - 0.5) * (FIELD_SIZE - 10);
      z = (Math.random() - 0.5) * (FIELD_SIZE - 10);
      valid = Math.sqrt(x * x + z * z) > 10; // not too close to center
    } while (!valid);

    mesh.position.set(x, h / 2, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;
    scene.add(mesh);
    obstacles.push({
      mesh,
      x, z,
      halfW: w / 2,
      halfH: h / 2,
      halfD: d / 2,
      width: w,
      height: h,
      depth: d
    });
  }
}

// ============ TANK BUILDER ============
function createTankModel(bodyColor, turretColor) {
  const group = new THREE.Group();

  // Body
  const bodyGeo = new THREE.BoxGeometry(4, 1.2, 3);
  const bodyMat = new THREE.MeshStandardMaterial({ color: bodyColor, roughness: 0.6, metalness: 0.2 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  body.receiveShadow = true;
  group.add(body);

  // Tracks (visual)
  const trackGeo = new THREE.BoxGeometry(4.2, 0.5, 0.5);
  const trackMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
  const trackL = new THREE.Mesh(trackGeo, trackMat);
  trackL.position.set(0, 0.25, 1.5);
  trackL.castShadow = true;
  group.add(trackL);
  const trackR = new THREE.Mesh(trackGeo, trackMat);
  trackR.position.set(0, 0.25, -1.5);
  trackR.castShadow = true;
  group.add(trackR);

  // Turret pivot
  const turretPivot = new THREE.Group();
  turretPivot.position.y = 1.2;
  group.add(turretPivot);

  // Turret
  const turretGeo = new THREE.CylinderGeometry(1.2, 1.2, 0.8, 16);
  const turretMat = new THREE.MeshStandardMaterial({ color: turretColor, roughness: 0.5, metalness: 0.3 });
  const turret = new THREE.Mesh(turretGeo, turretMat);
  turret.position.y = 0.4;
  turret.castShadow = true;
  turretPivot.add(turret);

  // Barrel
  const barrelGeo = new THREE.CylinderGeometry(0.15, 0.15, 3, 8);
  const barrelMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.5, metalness: 0.5 });
  const barrel = new THREE.Mesh(barrelGeo, barrelMat);
  barrel.rotation.z = -Math.PI / 2;
  barrel.position.set(1.5 + 0.5, 0.4, 0);
  barrel.castShadow = true;
  turretPivot.add(barrel);

  group.userData.turretPivot = turretPivot;
  group.userData.body = body;

  return group;
}

// ============ PLAYER TANK ============
function createPlayerTank() {
  playerTank = createTankModel(0x2E5A1E, 0x3A7A2A);
  playerTank.position.set(0, 0, 0);
  scene.add(playerTank);
}

// ============ ENEMY TANKS ============
function createEnemyTanks() {
  enemies = [];
  const positions = [
    { x: -35, z: -35 },
    { x: 35, z: -35 },
    { x: -35, z: 35 },
    { x: 35, z: 35 },
    { x: 0, z: -40 },
  ];

  for (let i = 0; i < 5; i++) {
    const tank = createTankModel(0x8B1A1A, 0xAA2222);
    tank.position.set(positions[i].x, 0, positions[i].z);
    tank.rotation.y = Math.random() * Math.PI * 2;
    scene.add(tank);

    // HP bar
    const hpBarGroup = createHPBar();
    hpBarGroup.position.y = 3.5;
    tank.add(hpBarGroup);

    const enemy = {
      mesh: tank,
      hp: 150,
      maxHP: 150,
      alive: true,
      speed: 3,
      fireTimer: 3 + Math.random() * 2,
      patrolTimer: 0,
      patrolDir: Math.random() * Math.PI * 2,
      hpBar: hpBarGroup,
      turretAngle: 0
    };
    enemies.push(enemy);
  }
}

function createHPBar() {
  const group = new THREE.Group();

  const bgGeo = new THREE.PlaneGeometry(3, 0.3);
  const bgMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide });
  const bg = new THREE.Mesh(bgGeo, bgMat);
  group.add(bg);

  const fgGeo = new THREE.PlaneGeometry(3, 0.3);
  const fgMat = new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide });
  const fg = new THREE.Mesh(fgGeo, fgMat);
  fg.position.z = 0.01;
  group.add(fg);
  group.userData.fg = fg;
  group.userData.fgMat = fgMat;

  return group;
}

// ============ SHELL ============
function fireShell(tank, isPlayer) {
  const turretPivot = tank.userData.turretPivot;

  // Get world position of barrel tip
  const barrelTip = new THREE.Vector3(3.5, 0.4, 0);
  turretPivot.localToWorld(barrelTip);

  // Get direction
  const dir = new THREE.Vector3(1, 0, 0);
  const worldQuat = new THREE.Quaternion();
  turretPivot.getWorldQuaternion(worldQuat);
  dir.applyQuaternion(worldQuat).normalize();

  // Add slight upward angle for arc
  dir.y += 0.05;
  dir.normalize();

  const shellGeo = new THREE.SphereGeometry(0.2, 8, 8);
  const shellMat = new THREE.MeshStandardMaterial({
    color: isPlayer ? 0xFFDD44 : 0xFF4444,
    emissive: isPlayer ? 0xFFAA00 : 0xFF2200,
    emissiveIntensity: 0.5
  });
  const shellMesh = new THREE.Mesh(shellGeo, shellMat);
  shellMesh.position.copy(barrelTip);
  shellMesh.castShadow = true;
  scene.add(shellMesh);

  const speed = 30;
  shells.push({
    mesh: shellMesh,
    velocity: dir.multiplyScalar(speed),
    isPlayer,
    age: 0
  });

  if (isPlayer) {
    shellsFired++;
  }
}

// ============ EXPLOSION ============
function createExplosion(position, color = 0xFF8800) {
  const particles = [];
  const count = 12 + Math.floor(Math.random() * 8);

  for (let i = 0; i < count; i++) {
    const size = 0.15 + Math.random() * 0.25;
    const geo = new THREE.BoxGeometry(size, size, size);
    const mat = new THREE.MeshStandardMaterial({
      color: Math.random() > 0.5 ? color : 0xFFCC00,
      emissive: color,
      emissiveIntensity: 0.8
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(position);

    const vel = new THREE.Vector3(
      (Math.random() - 0.5) * 8,
      Math.random() * 6 + 2,
      (Math.random() - 0.5) * 8
    );

    scene.add(mesh);
    particles.push({ mesh, velocity: vel, life: 0.6 + Math.random() * 0.4 });
  }

  explosions.push({ particles, age: 0 });
}

// ============ SMOKE ============
function createSmoke(tank) {
  if (!tank.userData.smokeParticles) {
    tank.userData.smokeParticles = [];
    tank.userData.smokeTimer = 0;
  }
}

// ============ COLLISION ============
function checkTankObstacleCollision(x, z, halfW, halfD, excludeTank) {
  // Check walls
  if (x - halfW < -HALF_FIELD || x + halfW > HALF_FIELD ||
      z - halfD < -HALF_FIELD || z + halfD > HALF_FIELD) {
    return true;
  }

  // Check obstacles
  for (const obs of obstacles) {
    if (Math.abs(x - obs.x) < halfW + obs.halfW &&
        Math.abs(z - obs.z) < halfD + obs.halfD) {
      return true;
    }
  }

  // Check other tanks
  const allTanks = [playerTank, ...enemies.filter(e => e.alive).map(e => e.mesh)];
  for (const t of allTanks) {
    if (t === excludeTank) continue;
    const dx = Math.abs(x - t.position.x);
    const dz = Math.abs(z - t.position.z);
    if (dx < halfW + 2 && dz < halfD + 1.5) {
      return true;
    }
  }

  return false;
}

function checkShellCollision(shell) {
  const pos = shell.mesh.position;

  // Ground
  if (pos.y <= 0.2) return { type: 'ground' };

  // Out of bounds
  if (Math.abs(pos.x) > HALF_FIELD + 5 || Math.abs(pos.z) > HALF_FIELD + 5) return { type: 'oob' };

  // Obstacles
  for (const obs of obstacles) {
    if (Math.abs(pos.x - obs.x) < obs.halfW + 0.2 &&
        pos.y < obs.height + 0.2 &&
        Math.abs(pos.z - obs.z) < obs.halfD + 0.2) {
      return { type: 'obstacle' };
    }
  }

  // Walls
  if (Math.abs(pos.x) > HALF_FIELD - 0.5 || Math.abs(pos.z) > HALF_FIELD - 0.5) {
    if (pos.y < WALL_HEIGHT) return { type: 'wall' };
  }

  // Tanks
  if (shell.isPlayer) {
    for (const enemy of enemies) {
      if (!enemy.alive) continue;
      const ep = enemy.mesh.position;
      const dx = Math.abs(pos.x - ep.x);
      const dy = Math.abs(pos.y - (ep.y + 1));
      const dz = Math.abs(pos.z - ep.z);
      if (dx < 2.5 && dy < 1.5 && dz < 2) {
        return { type: 'enemy', enemy };
      }
    }
  } else {
    const pp = playerTank.position;
    const dx = Math.abs(pos.x - pp.x);
    const dy = Math.abs(pos.y - (pp.y + 1));
    const dz = Math.abs(pos.z - pp.z);
    if (dx < 2.5 && dy < 1.5 && dz < 2) {
      return { type: 'player' };
    }
  }

  return null;
}

// ============ UPDATE ============
function updatePlayer(dt) {
  if (gameOver) return;

  const moveSpeed = 6;
  const turnSpeed = 1.5;

  // Turn
  if (keys['a']) playerTank.rotation.y += turnSpeed * dt;
  if (keys['d']) playerTank.rotation.y -= turnSpeed * dt;

  // Move
  let moveDir = 0;
  if (keys['w']) moveDir = 1;
  if (keys['s']) moveDir = -1;

  if (moveDir !== 0) {
    const forward = new THREE.Vector3(Math.sin(playerTank.rotation.y), 0, Math.cos(playerTank.rotation.y));
    const newX = playerTank.position.x + forward.x * moveSpeed * dt * moveDir;
    const newZ = playerTank.position.z + forward.z * moveSpeed * dt * moveDir;

    // Collision with rotation considered - use AABB approximation
    if (!checkTankObstacleCollision(newX, newZ, 2.2, 2.2, playerTank)) {
      playerTank.position.x = newX;
      playerTank.position.z = newZ;
    } else {
      // Try sliding along axes
      if (!checkTankObstacleCollision(newX, playerTank.position.z, 2.2, 2.2, playerTank)) {
        playerTank.position.x = newX;
      } else if (!checkTankObstacleCollision(playerTank.position.x, newZ, 2.2, 2.2, playerTank)) {
        playerTank.position.z = newZ;
      }
    }
  }

  // Turret rotation
  const turretPivot = playerTank.userData.turretPivot;
  turretPivot.rotation.y = turretAngle;
}

function updateEnemies(dt) {
  for (const enemy of enemies) {
    if (!enemy.alive) {
      // Smoke effect for dead tanks
      if (enemy.mesh.userData.smokeTimer !== undefined) {
        enemy.mesh.userData.smokeTimer -= dt;
        if (enemy.mesh.userData.smokeTimer <= 0) {
          enemy.mesh.userData.smokeTimer = 0.2;
          const smokeGeo = new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 6, 6);
          const smokeMat = new THREE.MeshBasicMaterial({ color: 0x222222, transparent: true, opacity: 0.6 });
          const smoke = new THREE.Mesh(smokeGeo, smokeMat);
          smoke.position.copy(enemy.mesh.position);
          smoke.position.y += 2;
          smoke.position.x += (Math.random() - 0.5) * 0.5;
          smoke.position.z += (Math.random() - 0.5) * 0.5;
          scene.add(smoke);
          if (!enemy.smokeParticles) enemy.smokeParticles = [];
          enemy.smokeParticles.push({ mesh: smoke, life: 1.5 });
        }
        // Update smoke particles
        if (enemy.smokeParticles) {
          for (let i = enemy.smokeParticles.length - 1; i >= 0; i--) {
            const sp = enemy.smokeParticles[i];
            sp.life -= dt;
            sp.mesh.position.y += dt * 2;
            sp.mesh.material.opacity = Math.max(0, sp.life / 1.5 * 0.6);
            sp.mesh.scale.multiplyScalar(1 + dt * 0.5);
            if (sp.life <= 0) {
              scene.remove(sp.mesh);
              sp.mesh.geometry.dispose();
              sp.mesh.material.dispose();
              enemy.smokeParticles.splice(i, 1);
            }
          }
        }
      }
      continue;
    }

    // Patrol
    enemy.patrolTimer -= dt;
    if (enemy.patrolTimer <= 0) {
      enemy.patrolDir = Math.random() * Math.PI * 2;
      enemy.patrolTimer = 2 + Math.random() * 3;
    }

    // Move toward patrol direction
    const targetAngle = enemy.patrolDir;
    let angleDiff = targetAngle - enemy.mesh.rotation.y;
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    enemy.mesh.rotation.y += Math.sign(angleDiff) * Math.min(Math.abs(angleDiff), 1.5 * dt);

    const forward = new THREE.Vector3(
      Math.sin(enemy.mesh.rotation.y), 0, Math.cos(enemy.mesh.rotation.y)
    );
    const newX = enemy.mesh.position.x + forward.x * enemy.speed * dt;
    const newZ = enemy.mesh.position.z + forward.z * enemy.speed * dt;

    if (!checkTankObstacleCollision(newX, newZ, 2.2, 2.2, enemy.mesh)) {
      enemy.mesh.position.x = newX;
      enemy.mesh.position.z = newZ;
    } else {
      enemy.patrolDir = Math.random() * Math.PI * 2;
      enemy.patrolTimer = 1;
    }

    // Aim turret at player
    const toPlayer = new THREE.Vector3(
      playerTank.position.x - enemy.mesh.position.x,
      0,
      playerTank.position.z - enemy.mesh.position.z
    );
    const worldAngleToPlayer = Math.atan2(toPlayer.x, toPlayer.z);
    const localTurretAngle = worldAngleToPlayer - enemy.mesh.rotation.y;
    enemy.turretAngle = localTurretAngle;
    enemy.mesh.userData.turretPivot.rotation.y = localTurretAngle;

    // Fire
    enemy.fireTimer -= dt;
    if (enemy.fireTimer <= 0 && !gameOver) {
      enemy.fireTimer = 3 + Math.random() * 2;
      fireShell(enemy.mesh, false);
    }

    // Update HP bar billboard
    enemy.hpBar.lookAt(camera.position);
    const hpRatio = enemy.hp / enemy.maxHP;
    enemy.hpBar.userData.fg.scale.x = Math.max(0.001, hpRatio);
    enemy.hpBar.userData.fg.position.x = -(1 - hpRatio) * 1.5;
    if (hpRatio > 0.5) {
      enemy.hpBar.userData.fgMat.color.setHex(0x44ff44);
    } else if (hpRatio > 0.25) {
      enemy.hpBar.userData.fgMat.color.setHex(0xffaa00);
    } else {
      enemy.hpBar.userData.fgMat.color.setHex(0xff0000);
    }
  }
}

function updateShells(dt) {
  for (let i = shells.length - 1; i >= 0; i--) {
    const shell = shells[i];
    shell.age += dt;

    // Gravity
    shell.velocity.y -= 9.8 * dt;

    // Move
    shell.mesh.position.x += shell.velocity.x * dt;
    shell.mesh.position.y += shell.velocity.y * dt;
    shell.mesh.position.z += shell.velocity.z * dt;

    // Timeout
    if (shell.age > 10) {
      scene.remove(shell.mesh);
      shell.mesh.geometry.dispose();
      shell.mesh.material.dispose();
      shells.splice(i, 1);
      continue;
    }

    // Collision
    const hit = checkShellCollision(shell);
    if (hit) {
      if (hit.type === 'enemy') {
        hit.enemy.hp -= 50;
        createExplosion(shell.mesh.position.clone(), 0xFF4400);
        if (hit.enemy.hp <= 0) {
          hit.enemy.alive = false;
          score += 100;
          // Turn gray
          hit.enemy.mesh.traverse(child => {
            if (child.isMesh && child.material) {
              child.material = new THREE.MeshStandardMaterial({
                color: 0x555555, roughness: 0.8
              });
            }
          });
          hit.enemy.mesh.userData.smokeTimer = 0;
          createExplosion(hit.enemy.mesh.position.clone().add(new THREE.Vector3(0, 1, 0)), 0xFF6600);
        }
      } else if (hit.type === 'player') {
        playerHP -= 25;
        createExplosion(shell.mesh.position.clone(), 0xFF2200);
        if (playerHP <= 0) {
          playerHP = 0;
          gameOver = true;
          gameResult = 'DEFEAT';
        }
      } else if (hit.type !== 'oob') {
        createExplosion(shell.mesh.position.clone());
      }

      scene.remove(shell.mesh);
      shell.mesh.geometry.dispose();
      shell.mesh.material.dispose();
      shells.splice(i, 1);
    }
  }
}

function updateExplosions(dt) {
  for (let i = explosions.length - 1; i >= 0; i--) {
    const exp = explosions[i];
    exp.age += dt;

    let allDead = true;
    for (let j = exp.particles.length - 1; j >= 0; j--) {
      const p = exp.particles[j];
      p.life -= dt;
      if (p.life <= 0) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
        exp.particles.splice(j, 1);
      } else {
        allDead = false;
        p.velocity.y -= 9.8 * dt;
        p.mesh.position.x += p.velocity.x * dt;
        p.mesh.position.y += p.velocity.y * dt;
        p.mesh.position.z += p.velocity.z * dt;
        p.mesh.rotation.x += dt * 5;
        p.mesh.rotation.z += dt * 3;
        const s = Math.max(0.01, p.life / 1.0);
        p.mesh.scale.setScalar(s);
        if (p.mesh.position.y < 0.1) {
          p.mesh.position.y = 0.1;
          p.velocity.y *= -0.3;
          p.velocity.x *= 0.8;
          p.velocity.z *= 0.8;
        }
      }
    }

    if (allDead || exp.particles.length === 0) {
      explosions.splice(i, 1);
    }
  }
}

function updateCamera() {
  const offset = new THREE.Vector3(0, 8, -12);
  offset.applyAxisAngle(new THREE.Vector3(0, 1, 0), playerTank.rotation.y);
  const targetPos = playerTank.position.clone().add(offset);

  camera.position.lerp(targetPos, 0.1);

  const lookTarget = playerTank.position.clone();
  lookTarget.y += 2;
  const forward = new THREE.Vector3(0, 0, 5);
  forward.applyAxisAngle(new THREE.Vector3(0, 1, 0), playerTank.rotation.y);
  lookTarget.add(forward);

  camera.lookAt(lookTarget);
}

function updateHUD() {
  const aliveCount = enemies.filter(e => e.alive).length;

  document.getElementById('playerHP').textContent = Math.max(0, playerHP);
  document.getElementById('shellsFired').textContent = shellsFired;
  document.getElementById('enemyCount').textContent = aliveCount;
  document.getElementById('score').textContent = score;

  const hpBar = document.getElementById('hp-bar');
  const hpPercent = Math.max(0, playerHP / 200 * 100);
  hpBar.style.width = hpPercent + '%';
  if (hpPercent > 50) {
    hpBar.style.background = 'linear-gradient(90deg, #4caf50, #8bc34a)';
  } else if (hpPercent > 25) {
    hpBar.style.background = 'linear-gradient(90deg, #ff9800, #ffc107)';
  } else {
    hpBar.style.background = 'linear-gradient(90deg, #f44336, #ff5722)';
  }

  // Check win/lose
  if (!gameOver && aliveCount === 0) {
    gameOver = true;
    gameResult = 'VICTORY!';
  }

  if (gameOver) {
    const goDiv = document.getElementById('gameOver');
    goDiv.style.display = 'block';
    document.getElementById('gameOverText').textContent = gameResult;
    if (document.pointerLockElement) document.exitPointerLock();
  }
}

function updateState() {
  const aliveCount = enemies.filter(e => e.alive).length;
  window.__3D_STATE__ = {
    playerHP,
    shellsFired,
    enemyCount: aliveCount,
    score,
    playerPos: {
      x: playerTank.position.x,
      y: playerTank.position.y,
      z: playerTank.position.z
    },
    turretAngle,
    enemies: enemies.map(e => ({
      x: e.mesh.position.x,
      y: e.mesh.position.y,
      z: e.mesh.position.z,
      hp: e.hp,
      alive: e.alive
    })),
    activeShells: shells.length
  };
}

// ============ RESTART ============
function restartGame() {
  // Remove shells
  shells.forEach(s => {
    scene.remove(s.mesh);
    s.mesh.geometry.dispose();
    s.mesh.material.dispose();
  });
  shells = [];

  // Remove explosions
  explosions.forEach(exp => {
    exp.particles.forEach(p => {
      scene.remove(p.mesh);
      p.mesh.geometry.dispose();
      p.mesh.material.dispose();
    });
  });
  explosions = [];

  // Remove enemy smoke
  enemies.forEach(e => {
    if (e.smokeParticles) {
      e.smokeParticles.forEach(sp => {
        scene.remove(sp.mesh);
        sp.mesh.geometry.dispose();
        sp.mesh.material.dispose();
      });
    }
    scene.remove(e.mesh);
    e.mesh.traverse(child => {
      if (child.isMesh) {
        child.geometry.dispose();
        if (child.material) child.material.dispose();
      }
    });
  });

  // Remove player
  scene.remove(playerTank);
  playerTank.traverse(child => {
    if (child.isMesh) {
      child.geometry.dispose();
      if (child.material) child.material.dispose();
    }
  });

  // Reset state
  playerHP = 200;
  shellsFired = 0;
  score = 0;
  turretAngle = 0;
  gameOver = false;
  gameResult = '';

  document.getElementById('gameOver').style.display = 'none';

  createPlayerTank();
  createEnemyTanks();
}

// ============ ANIMATE ============
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);

  if (!gameOver) {
    updatePlayer(dt);
  }
  updateEnemies(dt);
  updateShells(dt);
  updateExplosions(dt);
  updateCamera();
  updateHUD();
  updateState();

  renderer.render(scene, camera);
}

// ============ START ============
init();
</script>
</body>
</html>
