<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 坦克大战</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #a9d8ff;
      font-family: Arial, sans-serif;
    }
    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 8px;
      line-height: 1.7;
      font-size: 14px;
      min-width: 180px;
      user-select: none;
    }
    #tips {
      position: fixed;
      right: 12px;
      top: 12px;
      z-index: 10;
      color: #fff;
      background: rgba(0,0,0,0.35);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.7;
      user-select: none;
      max-width: 260px;
    }
    #message {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      color: #fff;
      background: rgba(0,0,0,0.55);
      padding: 18px 28px;
      border-radius: 12px;
      font-size: 28px;
      display: none;
      text-align: center;
    }
    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>玩家血量: <span id="playerHP">200</span></div>
    <div>发射炮弹数: <span id="shellsFired">0</span></div>
    <div>存活敌方坦克数: <span id="enemyCount">5</span></div>
    <div>分数: <span id="score">0</span></div>
  </div>

  <div id="tips">
    <div><b>操作说明</b></div>
    <div>W / S：前进 / 后退</div>
    <div>A / D：车体左转 / 右转</div>
    <div>鼠标左右移动：旋转炮塔</div>
    <div>左键点击：发射炮弹</div>
    <div>点击游戏区域以锁定鼠标</div>
  </div>

  <div id="message"></div>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xa9d8ff);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();

    const WORLD_SIZE = 100;
    const HALF_WORLD = WORLD_SIZE / 2;
    const WALL_HEIGHT = 3;
    const WALL_THICKNESS = 1.5;
    const GRAVITY = 9.8;

    const obstacles = [];
    const shells = [];
    const particles = [];
    const enemies = [];

    let shellsFired = 0;
    let score = 0;
    let gameOver = false;

    const keys = {
      KeyW: false,
      KeyS: false,
      KeyA: false,
      KeyD: false,
    };

    const hud = {
      playerHP: document.getElementById('playerHP'),
      shellsFired: document.getElementById('shellsFired'),
      enemyCount: document.getElementById('enemyCount'),
      score: document.getElementById('score'),
      message: document.getElementById('message'),
    };

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(30, 50, 20);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -80;
    dirLight.shadow.camera.right = 80;
    dirLight.shadow.camera.top = 80;
    dirLight.shadow.camera.bottom = -80;
    dirLight.shadow.camera.near = 1;
    dirLight.shadow.camera.far = 150;
    scene.add(dirLight);

    // Ground
    const ground = new THREE.Mesh(
      new THREE.BoxGeometry(WORLD_SIZE, 1, WORLD_SIZE),
      new THREE.MeshStandardMaterial({ color: 0xcdbf8b })
    );
    ground.position.y = -0.5;
    ground.receiveShadow = true;
    scene.add(ground);

    // Walls
    const wallMat = new THREE.MeshStandardMaterial({ color: 0x8f8f8f });
    const walls = [
      { size: [WORLD_SIZE, WALL_HEIGHT, WALL_THICKNESS], pos: [0, WALL_HEIGHT / 2, -HALF_WORLD] },
      { size: [WORLD_SIZE, WALL_HEIGHT, WALL_THICKNESS], pos: [0, WALL_HEIGHT / 2, HALF_WORLD] },
      { size: [WALL_THICKNESS, WALL_HEIGHT, WORLD_SIZE], pos: [-HALF_WORLD, WALL_HEIGHT / 2, 0] },
      { size: [WALL_THICKNESS, WALL_HEIGHT, WORLD_SIZE], pos: [HALF_WORLD, WALL_HEIGHT / 2, 0] },
    ];
    walls.forEach(w => {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(...w.size), wallMat);
      mesh.position.set(...w.pos);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      obstacles.push({
        mesh,
        box: new THREE.Box3().setFromObject(mesh),
        wall: true,
      });
    });

    function randomRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function intersectsExisting(box) {
      for (const obs of obstacles) {
        if (box.intersectsBox(obs.box)) return true;
      }
      return false;
    }

    // Random obstacles
    for (let i = 0; i < 10; i++) {
      let placed = false;
      let tries = 0;
      while (!placed && tries < 100) {
        tries++;
        const w = randomRange(3, 5);
        const h = randomRange(2, 3);
        const d = randomRange(3, 5);
        const x = randomRange(-40, 40);
        const z = randomRange(-40, 40);

        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(w, h, d),
          new THREE.MeshStandardMaterial({ color: 0x8c7a62 })
        );
        mesh.position.set(x, h / 2, z);
        mesh.castShadow = true;
        mesh.receiveShadow = true;

        const box = new THREE.Box3().setFromObject(mesh);

        const centerSafe = new THREE.Box3(
          new THREE.Vector3(-12, -1, -12),
          new THREE.Vector3(12, 6, 12)
        );

        if (!box.intersectsBox(centerSafe) && !intersectsExisting(box)) {
          scene.add(mesh);
          obstacles.push({ mesh, box, wall: false });
          placed = true;
        }
      }
    }

    function createTank(colorBody, colorTurret) {
      const group = new THREE.Group();

      const bodyMat = new THREE.MeshStandardMaterial({ color: colorBody });
      const turretMat = new THREE.MeshStandardMaterial({ color: colorTurret });
      const barrelMat = new THREE.MeshStandardMaterial({ color: 0x2f2f2f });

      const body = new THREE.Mesh(
        new THREE.BoxGeometry(4, 1.2, 3),
        bodyMat
      );
      body.position.y = 0.6;
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const turretPivot = new THREE.Group();
      turretPivot.position.set(0, 1.4, 0);
      group.add(turretPivot);

      const turret = new THREE.Mesh(
        new THREE.CylinderGeometry(1.2, 1.2, 0.8, 24),
        turretMat
      );
      turret.rotation.z = Math.PI / 2;
      turret.castShadow = true;
      turret.receiveShadow = true;
      turretPivot.add(turret);

      const barrel = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.15, 3, 12),
        barrelMat
      );
      barrel.rotation.z = Math.PI / 2;
      barrel.position.set(1.9, 0, 0);
      barrel.castShadow = true;
      barrel.receiveShadow = true;
      turretPivot.add(barrel);

      group.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      return {
        group,
        body,
        turretPivot,
        turret,
        barrel,
      };
    }

    function createHPBar() {
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 16;
      const ctx = canvas.getContext('2d');

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(6, 0.8, 1);

      function update(ratio) {
        ratio = Math.max(0, Math.min(1, ratio));
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = ratio > 0.5 ? '#33dd44' : ratio > 0.25 ? '#ffcc33' : '#ff4444';
        ctx.fillRect(2, 2, (canvas.width - 4) * ratio, canvas.height - 4);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(1, 1, canvas.width - 2, canvas.height - 2);
        texture.needsUpdate = true;
      }

      update(1);

      return { sprite, update };
    }

    function tankBoxAtPosition(pos) {
      const halfX = 2;
      const halfY = 1.6;
      const halfZ = 1.5;
      return new THREE.Box3(
        new THREE.Vector3(pos.x - halfX, 0, pos.z - halfZ),
        new THREE.Vector3(pos.x + halfX, halfY * 2, pos.z + halfZ)
      );
    }

    function collidesTank(pos, self = null) {
      const box = tankBoxAtPosition(pos);

      for (const obs of obstacles) {
        if (box.intersectsBox(obs.box)) return true;
      }

      if (player !== self) {
        const pbox = tankBoxAtPosition(player.group.position);
        if (box.intersectsBox(pbox)) return true;
      }

      for (const e of enemies) {
        if (e === self || !e.alive) continue;
        const ebox = tankBoxAtPosition(e.group.position);
        if (box.intersectsBox(ebox)) return true;
      }
      return false;
    }

    const playerModel = createTank(0x2e6b3a, 0x3e8a4d);
    const player = {
      ...playerModel,
      hp: 200,
      maxHP: 200,
      turretAngle: 0,
      speed: 6,
      rotSpeed: 1.5,
    };
    player.group.position.set(0, 0, 0);
    scene.add(player.group);

    function spawnEnemy(index) {
      const model = createTank(0x8b2f2f, 0xb84a4a);
      const hpBar = createHPBar();

      let pos = new THREE.Vector3();
      let found = false;
      for (let i = 0; i < 200; i++) {
        pos.set(randomRange(-40, 40), 0, randomRange(-40, 40));
        if (pos.distanceTo(player.group.position) < 18) continue;
        if (!collidesTank(pos)) {
          found = true;
          break;
        }
      }
      if (!found) pos.set(randomRange(-35, 35), 0, randomRange(-35, 35));

      model.group.position.copy(pos);
      model.group.rotation.y = randomRange(0, Math.PI * 2);

      hpBar.sprite.position.set(0, 4.2, 0);
      model.group.add(hpBar.sprite);

      scene.add(model.group);

      return {
        ...model,
        hpBar,
        hp: 150,
        maxHP: 150,
        alive: true,
        speed: 3,
        turretAngle: 0,
        nextFireTime: randomRange(1.5, 4.5),
        patrolChangeTime: randomRange(2, 5),
        desiredTurn: randomRange(-1, 1),
        smokeTimer: 0,
      };
    }

    for (let i = 0; i < 5; i++) {
      enemies.push(spawnEnemy(i));
    }

    function getTurretWorldDirection(tank) {
      const quatBody = new THREE.Quaternion();
      tank.group.getWorldQuaternion(quatBody);

      const quatTurret = new THREE.Quaternion();
      quatTurret.setFromAxisAngle(new THREE.Vector3(0, 1, 0), tank.turretPivot.rotation.y);

      const finalQuat = quatBody.clone().multiply(quatTurret);
      return new THREE.Vector3(1, 0, 0).applyQuaternion(finalQuat).normalize();
    }

    function getBarrelMuzzlePosition(tank) {
      const dir = getTurretWorldDirection(tank);
      const origin = tank.group.position.clone();
      origin.y = 1.4;
      return origin.add(dir.clone().multiplyScalar(3.2));
    }

    function fireShell(shooter, ownerType) {
      if (gameOver) return;

      const shell = new THREE.Mesh(
        new THREE.SphereGeometry(0.2, 12, 12),
        new THREE.MeshStandardMaterial({ color: ownerType === 'player' ? 0xffdd66 : 0xff8855, emissive: ownerType === 'player' ? 0x553300 : 0x441100 })
      );
      shell.castShadow = true;

      const pos = getBarrelMuzzlePosition(shooter);
      const dir = getTurretWorldDirection(shooter);

      shell.position.copy(pos);
      scene.add(shell);

      shells.push({
        mesh: shell,
        pos: pos.clone(),
        vel: dir.clone().multiplyScalar(30),
        owner: ownerType,
        alive: true,
      });

      shellsFired++;
    }

    function createExplosion(position, color = 0xffaa33, count = Math.floor(randomRange(10, 21))) {
      for (let i = 0; i < count; i++) {
        const p = new THREE.Mesh(
          new THREE.BoxGeometry(0.15, 0.15, 0.15),
          new THREE.MeshStandardMaterial({ color })
        );
        p.position.copy(position);
        p.castShadow = true;
        scene.add(p);

        const dir = new THREE.Vector3(
          randomRange(-1, 1),
          randomRange(0.2, 1.5),
          randomRange(-1, 1)
        ).normalize().multiplyScalar(randomRange(2, 7));

        particles.push({
          mesh: p,
          vel: dir,
          life: randomRange(0.5, 1.0),
          maxLife: 1.0,
          gravity: 8,
        });
      }
    }

    function createSmoke(position) {
      const p = new THREE.Mesh(
        new THREE.BoxGeometry(0.25, 0.25, 0.25),
        new THREE.MeshStandardMaterial({ color: 0x222222, transparent: true, opacity: 0.8 })
      );
      p.position.copy(position);
      scene.add(p);

      particles.push({
        mesh: p,
        vel: new THREE.Vector3(randomRange(-0.3, 0.3), randomRange(0.8, 1.8), randomRange(-0.3, 0.3)),
        life: randomRange(0.8, 1.5),
        maxLife: 1.5,
        gravity: -0.5,
        fade: true,
      });
    }

    function damageEnemy(enemy, amount) {
      if (!enemy.alive) return;
      enemy.hp -= amount;
      enemy.hpBar.update(enemy.hp / enemy.maxHP);

      if (enemy.hp <= 0) {
        enemy.hp = 0;
        enemy.alive = false;
        enemy.hpBar.update(0);

        enemy.group.traverse(obj => {
          if (obj.isMesh && obj.material && obj.material.color) {
            obj.material = obj.material.clone();
            obj.material.color.set(0x666666);
          }
        });

        score += 100;
      }
    }

    function damagePlayer(amount) {
      if (gameOver) return;
      player.hp -= amount;
      if (player.hp <= 0) {
        player.hp = 0;
        endGame('游戏失败');
      }
    }

    function endGame(text) {
      gameOver = true;
      hud.message.style.display = 'block';
      hud.message.textContent = text;
    }

    function updatePlayer(dt) {
      if (gameOver) return;

      if (keys.KeyA) player.group.rotation.y += player.rotSpeed * dt;
      if (keys.KeyD) player.group.rotation.y -= player.rotSpeed * dt;

      const forward = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), player.group.rotation.y);
      let move = 0;
      if (keys.KeyW) move += player.speed * dt;
      if (keys.KeyS) move -= player.speed * dt;

      if (move !== 0) {
        const newPos = player.group.position.clone().add(forward.multiplyScalar(move));
        const clamped = new THREE.Vector3(
          THREE.MathUtils.clamp(newPos.x, -HALF_WORLD + 3, HALF_WORLD - 3),
          0,
          THREE.MathUtils.clamp(newPos.z, -HALF_WORLD + 3, HALF_WORLD - 3)
        );
        if (!collidesTank(clamped, player)) {
          player.group.position.copy(clamped);
        }
      }

      player.turretPivot.rotation.y = player.turretAngle;
    }

    function updateEnemies(dt, elapsed) {
      for (const enemy of enemies) {
        if (!enemy.alive) {
          enemy.smokeTimer -= dt;
          if (enemy.smokeTimer <= 0) {
            enemy.smokeTimer = 0.12;
            createSmoke(enemy.group.position.clone().add(new THREE.Vector3(0, 2.4, 0)));
          }
          continue;
        }

        enemy.patrolChangeTime -= dt;
        if (enemy.patrolChangeTime <= 0) {
          enemy.patrolChangeTime = randomRange(2, 5);
          enemy.desiredTurn = randomRange(-1, 1);
        }

        enemy.group.rotation.y += enemy.desiredTurn * 0.8 * dt;

        const fwd = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0,1,0), enemy.group.rotation.y);
        const candidate = enemy.group.position.clone().add(fwd.multiplyScalar(enemy.speed * dt));

        const clamped = new THREE.Vector3(
          THREE.MathUtils.clamp(candidate.x, -HALF_WORLD + 3, HALF_WORLD - 3),
          0,
          THREE.MathUtils.clamp(candidate.z, -HALF_WORLD + 3, HALF_WORLD - 3)
        );

        if (!collidesTank(clamped, enemy)) {
          enemy.group.position.copy(clamped);
        } else {
          enemy.group.rotation.y += randomRange(1.2, 2.4);
        }

        const toPlayer = player.group.position.clone().sub(enemy.group.position);
        const playerAngle = Math.atan2(toPlayer.z, toPlayer.x);
        let rel = playerAngle - enemy.group.rotation.y;
        rel = Math.atan2(Math.sin(rel), Math.cos(rel));
        enemy.turretAngle = THREE.MathUtils.clamp(rel, -1.4, 1.4);
        enemy.turretPivot.rotation.y = enemy.turretAngle;

        enemy.nextFireTime -= dt;
        if (enemy.nextFireTime <= 0) {
          enemy.nextFireTime = randomRange(3, 5);
          fireShell(enemy, 'enemy');
        }

        enemy.hpBar.sprite.quaternion.copy(camera.quaternion);
      }
    }

    function updateShells(dt) {
      for (let i = shells.length - 1; i >= 0; i--) {
        const s = shells[i];
        if (!s.alive) continue;

        s.vel.y -= GRAVITY * dt;
        s.pos.addScaledVector(s.vel, dt);
        s.mesh.position.copy(s.pos);

        if (s.pos.y <= 0) {
          createExplosion(s.pos.clone().setY(0.1));
          scene.remove(s.mesh);
          shells.splice(i, 1);
          continue;
        }

        const shellBox = new THREE.Box3().setFromCenterAndSize(
          s.pos.clone(),
          new THREE.Vector3(0.4, 0.4, 0.4)
        );

        let hitObstacle = false;
        for (const obs of obstacles) {
          if (shellBox.intersectsBox(obs.box)) {
            createExplosion(s.pos.clone(), 0xffaa33);
            scene.remove(s.mesh);
            shells.splice(i, 1);
            hitObstacle = true;
            break;
          }
        }
        if (hitObstacle) continue;

        if (s.owner === 'player') {
          let hitEnemy = false;
          for (const enemy of enemies) {
            if (!enemy.alive) continue;
            const ebox = tankBoxAtPosition(enemy.group.position);
            if (shellBox.intersectsBox(ebox)) {
              damageEnemy(enemy, 50);
              createExplosion(s.pos.clone(), 0xff5533);
              scene.remove(s.mesh);
              shells.splice(i, 1);
              hitEnemy = true;
              break;
            }
          }
          if (hitEnemy) continue;
        } else {
          const pbox = tankBoxAtPosition(player.group.position);
          if (shellBox.intersectsBox(pbox)) {
            damagePlayer(25);
            createExplosion(s.pos.clone(), 0xff4444);
            scene.remove(s.mesh);
            shells.splice(i, 1);
            continue;
          }
        }

        if (Math.abs(s.pos.x) > HALF_WORLD + 10 || Math.abs(s.pos.z) > HALF_WORLD + 10 || s.pos.y > 100) {
          scene.remove(s.mesh);
          shells.splice(i, 1);
        }
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= dt;
        p.vel.y -= p.gravity * dt;
        p.mesh.position.addScaledVector(p.vel, dt);

        if (p.fade && p.mesh.material) {
          p.mesh.material.opacity = Math.max(0, p.life / p.maxLife);
        }

        if (p.life <= 0) {
          scene.remove(p.mesh);
          particles.splice(i, 1);
        }
      }
    }

    function updateCamera() {
      const localOffset = new THREE.Vector3(-12, 8, 0);
      const worldOffset = localOffset.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.group.rotation.y);
      const desiredPos = player.group.position.clone().add(worldOffset);
      camera.position.lerp(desiredPos, 0.12);

      const lookTarget = player.group.position.clone().add(
        new THREE.Vector3(6, 2, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), player.group.rotation.y)
      );
      camera.lookAt(lookTarget);
    }

    function updateHUD() {
      const aliveEnemies = enemies.filter(e => e.alive).length;
      hud.playerHP.textContent = Math.round(player.hp);
      hud.shellsFired.textContent = shellsFired;
      hud.enemyCount.textContent = aliveEnemies;
      hud.score.textContent = score;

      if (!gameOver && aliveEnemies === 0) {
        endGame('胜利！');
      }
    }

    function updateStateExpose() {
      window.__3D_STATE__ = {
        playerHP: player.hp,
        shellsFired,
        enemyCount: enemies.filter(e => e.alive).length,
        score,
        playerPos: {
          x: player.group.position.x,
          y: player.group.position.y,
          z: player.group.position.z
        },
        turretAngle: player.turretAngle,
        enemies: enemies.map(e => ({
          x: e.group.position.x,
          y: e.group.position.y,
          z: e.group.position.z,
          hp: e.hp,
          alive: e.alive
        })),
        activeShells: shells.length
      };
    }

    document.addEventListener('keydown', (e) => {
      if (e.code in keys) keys[e.code] = true;
    });

    document.addEventListener('keyup', (e) => {
      if (e.code in keys) keys[e.code] = false;
    });

    renderer.domElement.addEventListener('click', () => {
      renderer.domElement.requestPointerLock();
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === renderer.domElement && !gameOver) {
        player.turretAngle -= e.movementX * 0.003;
        player.turretAngle = THREE.MathUtils.clamp(player.turretAngle, -Math.PI * 0.9, Math.PI * 0.9);
      }
    });

    document.addEventListener('mousedown', (e) => {
      if (e.button === 0 && !gameOver) {
        fireShell(player, 'player');
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      updatePlayer(dt);
      updateEnemies(dt, elapsed);
      updateShells(dt);
      updateParticles(dt);
      updateCamera();
      updateHUD();
      updateStateExpose();

      renderer.render(scene, camera);
    }

    updateHUD();
    updateStateExpose();
    animate();
  </script>
</body>
</html>
