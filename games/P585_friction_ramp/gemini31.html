<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Friction Ramp Physics Experiment</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #d4e8f0;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #hud {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 12px;
            font-size: 13px;
            border-radius: 8px;
            z-index: 1000;
            pointer-events: none;
            line-height: 1.5;
        }
        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .instructions {
            font-size: 12px;
            color: #555;
            text-align: center;
            margin-top: 5px;
        }
        span.val {
            display: inline-block;
            width: 40px;
            text-align: right;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="hud">
        <div>Ramp Angle: <span id="hud-angle">30</span>°</div>
        <div>Friction Mult: <span id="hud-friction">0.30</span></div>
        <hr style="border-color: #555; margin: 5px 0;">
        <div style="color: #ffaaaa;">Car (mu=0.25, m=1kg)</div>
        <div>Speed: <span id="hud-car-speed">0.00</span> m/s</div>
        <div>Accel: <span id="hud-car-accel">0.00</span> m/s²</div>
        <div>Status: <span id="hud-car-status">Static</span></div>
        <hr style="border-color: #555; margin: 5px 0;">
        <div style="color: #ffffaa;">Duck (mu=0.50, m=0.5kg)</div>
        <div>Speed: <span id="hud-duck-speed">0.00</span> m/s</div>
        <div>Accel: <span id="hud-duck-accel">0.00</span> m/s²</div>
        <div>Status: <span id="hud-duck-status">Static</span></div>
        <hr style="border-color: #555; margin: 5px 0;">
        <div>Models Loaded: <span id="hud-models">No</span></div>
        <div>State: <span id="hud-paused">Paused</span></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="slider-angle">Angle (°):</label>
            <input type="range" id="slider-angle" min="10" max="60" step="1" value="30">
            <span id="val-angle" class="val">30</span>
        </div>
        <div class="control-group">
            <label for="slider-friction">Friction Mult:</label>
            <input type="range" id="slider-friction" min="0.05" max="1.0" step="0.05" value="0.30">
            <span id="val-friction" class="val">0.30</span>
        </div>
        <div class="instructions">
            [Space] Play/Pause | [R] Reset | [G] Go/Race | [F] Toggle Forces
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State & Configuration ---
        const STATE = {
            rampAngle: 30,
            frictionMultiplier: 0.30,
            carSpeed: 0,
            duckSpeed: 0,
            carAcceleration: 0,
            duckAcceleration: 0,
            carPosition: 0,
            duckPosition: 0,
            carStatus: 'Static',
            duckStatus: 'Static',
            modelsLoaded: false,
            isPaused: true,
            isHeld: true,
            forceArrowsVisible: true,
            frameCount: 0,
            simValid: true
        };

        window.__3D_STATE__ = STATE;

        const PHYSICS = {
            g: 9.81,
            dt: 1 / 60,
            rampLength: 6
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd4e8f0);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 5, 8);
        camera.lookAt(0, 1.5, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.target.set(0, 1.5, 0);

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0x889999, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x667766 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // --- Ramp Construction ---
        const rampPivot = new THREE.Group();
        scene.add(rampPivot);

        // Texture loading with fallback
        const textureLoader = new THREE.TextureLoader();
        let rampTopMaterial = new THREE.MeshStandardMaterial({ color: 0x997755 });
        textureLoader.load('hardwood2_diffuse.jpg', (texture) => {
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(3, 1);
            rampTopMaterial.map = texture;
            rampTopMaterial.needsUpdate = true;
        }, undefined, () => {
            console.warn("Could not load hardwood2_diffuse.jpg, using solid color.");
        });

        const rampSideMaterial = new THREE.MeshStandardMaterial({ color: 0x997755 });
        const rampMaterials = [
            rampSideMaterial, rampSideMaterial, // right, left
            rampTopMaterial, rampSideMaterial,  // top, bottom
            rampSideMaterial, rampSideMaterial  // front, back
        ];

        // Ramp Mesh: Top surface pivots around (0,0,0)
        const rampGeo = new THREE.BoxGeometry(6, 0.15, 2);
        const rampMesh = new THREE.Mesh(rampGeo, rampMaterials);
        rampMesh.position.set(3, -0.075, 0); // Shifted down so top face is at Y=0 locally
        rampMesh.castShadow = true;
        rampMesh.receiveShadow = true;
        rampPivot.add(rampMesh);

        // Rails
        const railGeo = new THREE.BoxGeometry(6, 0.1, 0.05);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x554433 });
        const rail1 = new THREE.Mesh(railGeo, railMat);
        rail1.position.set(3, 0.05, 0.975);
        rail1.castShadow = true;
        const rail2 = new THREE.Mesh(railGeo, railMat);
        rail2.position.set(3, 0.05, -0.975);
        rail2.castShadow = true;
        rampPivot.add(rail1);
        rampPivot.add(rail2);

        // Protractor Arc
        const arcCurve = new THREE.EllipseCurve(0, 0, 1.5, 1.5, 0, Math.PI / 2, false, 0);
        const arcPoints = arcCurve.getPoints(50);
        const arcPoints3D = arcPoints.map(p => new THREE.Vector3(p.x, p.y, 0));
        const arcPath = new THREE.CatmullRomCurve3(arcPoints3D);
        const arcGeo = new THREE.TubeGeometry(arcPath, 20, 0.02, 8, false);
        const arcMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
        const protractor = new THREE.Mesh(arcGeo, arcMat);
        scene.add(protractor);

        // --- Objects Setup ---
        class PhysicsObject {
            constructor(name, mass, baseMu, zOffset, targetLength, fallbackColor) {
                this.name = name;
                this.mass = mass;
                this.baseMu = baseMu;
                this.zOffset = zOffset;
                this.targetLength = targetLength;
                
                this.s = 0; // Position along ramp (0 = top, 6 = bottom)
                this.v = 0;
                this.a = 0;
                this.status = 'Static';
                
                this.mesh = new THREE.Group();
                scene.add(this.mesh);
                
                this.height = 0.5; // Default, updated after load
                
                // Fallback mesh
                const fbGeo = new THREE.BoxGeometry(targetLength, targetLength, targetLength*0.8);
                const fbMat = new THREE.MeshStandardMaterial({ color: fallbackColor });
                this.fallbackMesh = new THREE.Mesh(fbGeo, fbMat);
                this.fallbackMesh.position.y = targetLength / 2;
                this.fallbackMesh.castShadow = true;
                this.mesh.add(this.fallbackMesh);

                // Force Arrows
                this.arrows = {
                    gravity: new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(), 1, 0x00ff00),
                    friction: new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(), 1, 0xff0000),
                    net: new THREE.ArrowHelper(new THREE.Vector3(1,0,0), new THREE.Vector3(), 1, 0x0000ff)
                };
                scene.add(this.arrows.gravity);
                scene.add(this.arrows.friction);
                scene.add(this.arrows.net);
            }

            loadGLTF(url, loader, onLoadCallback) {
                loader.load(url, (gltf) => {
                    const model = gltf.scene;
                    
                    // Compute bounding box to scale
                    const box = new THREE.Box3().setFromObject(model);
                    const size = new THREE.Vector3();
                    box.getSize(size);
                    
                    // Scale based on longest dimension (usually x or z for car, y for duck)
                    const maxDim = Math.max(size.x, size.y, size.z);
                    const scale = this.targetLength / maxDim;
                    model.scale.setScalar(scale);
                    
                    // Recompute box after scale to center it
                    const scaledBox = new THREE.Box3().setFromObject(model);
                    const center = new THREE.Vector3();
                    scaledBox.getCenter(center);
                    
                    // Shift model so its bottom center is at origin
                    model.position.sub(center);
                    model.position.y += (scaledBox.max.y - scaledBox.min.y) / 2;
                    
                    this.height = scaledBox.max.y - scaledBox.min.y;

                    model.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    this.mesh.remove(this.fallbackMesh);
                    this.mesh.add(model);
                    if(onLoadCallback) onLoadCallback();
                }, undefined, (error) => {
                    console.warn(`Failed to load ${url}, using fallback.`, error);
                    this.height = this.targetLength;
                    if(onLoadCallback) onLoadCallback();
                });
            }

            reset() {
                this.s = 0;
                this.v = 0;
                this.a = 0;
                this.status = 'Static';
            }
        }

        const car = new PhysicsObject('Car', 1.0, 0.25, -0.5, 0.6, 0xff5555);
        const duck = new PhysicsObject('Duck', 0.5, 0.50, 0.5, 0.5, 0xffff55);

        const gltfLoader = new THREE.GLTFLoader();
        let loadedCount = 0;
        const checkLoaded = () => {
            loadedCount++;
            if (loadedCount === 2) STATE.modelsLoaded = true;
        };

        car.loadGLTF('ToyCar.glb', gltfLoader, checkLoaded);
        duck.loadGLTF('Duck.glb', gltfLoader, checkLoaded);

        // --- Input Handling ---
        const sliderAngle = document.getElementById('slider-angle');
        const valAngle = document.getElementById('val-angle');
        sliderAngle.addEventListener('input', (e) => {
            STATE.rampAngle = parseFloat(e.target.value);
            valAngle.textContent = STATE.rampAngle;
            updateRampVisuals();
        });

        const sliderFriction = document.getElementById('slider-friction');
        const valFriction = document.getElementById('val-friction');
        sliderFriction.addEventListener('input', (e) => {
            STATE.frictionMultiplier = parseFloat(e.target.value);
            valFriction.textContent = STATE.frictionMultiplier.toFixed(2);
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                STATE.isPaused = !STATE.isPaused;
            } else if (e.code === 'KeyR') {
                STATE.isHeld = true;
                STATE.isPaused = true;
                car.reset();
                duck.reset();
            } else if (e.code === 'KeyG') {
                STATE.isHeld = false;
                STATE.isPaused = false;
            } else if (e.code === 'KeyF') {
                STATE.forceArrowsVisible = !STATE.forceArrowsVisible;
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Physics & Visuals Update ---
        function updateRampVisuals() {
            const thetaRad = THREE.MathUtils.degToRad(STATE.rampAngle);
            rampPivot.rotation.z = thetaRad;
        }

        function updatePhysics() {
            if (STATE.isPaused) return;

            const thetaRad = THREE.MathUtils.degToRad(STATE.rampAngle);
            const g = PHYSICS.g;
            const dt = PHYSICS.dt;

            [car, duck].forEach(obj => {
                const mu = obj.baseMu * STATE.frictionMultiplier;
                const mu_s = mu * 1.2;

                if (STATE.isHeld) {
                    obj.v = 0;
                    obj.a = 0;
                    obj.status = 'Static';
                    return;
                }

                if (obj.s < PHYSICS.rampLength) {
                    // On Ramp
                    const g_par = g * Math.sin(thetaRad);
                    const g_perp = g * Math.cos(thetaRad);
                    const N = obj.mass * g_perp;
                    const f_s_max = mu_s * N;
                    const forceDown = obj.mass * g_par;

                    if (obj.status === 'Static' || obj.status === 'Stopped') {
                        if (forceDown > f_s_max) {
                            obj.status = 'Sliding';
                        } else {
                            obj.a = 0;
                            obj.v = 0;
                            obj.status = 'Static';
                        }
                    }

                    if (obj.status === 'Sliding') {
                        const f_k = mu * N;
                        const netForce = forceDown - f_k;
                        obj.a = netForce / obj.mass;
                        obj.v += obj.a * dt;
                        obj.s += obj.v * dt;

                        if (obj.s >= PHYSICS.rampLength) {
                            obj.s = PHYSICS.rampLength; // Snap to bottom for transition
                        }
                    }
                } else {
                    // On Flat Ground
                    const N = obj.mass * g;
                    const f_k = mu * N;
                    obj.a = - (f_k / obj.mass);
                    
                    if (obj.v > 0) {
                        obj.v += obj.a * dt;
                        obj.s += obj.v * dt;
                        obj.status = 'Sliding';
                    }

                    if (obj.v <= 0) {
                        obj.v = 0;
                        obj.a = 0;
                        obj.status = 'Stopped';
                    }
                }
            });
        }

        function updateObjectVisuals() {
            const thetaRad = THREE.MathUtils.degToRad(STATE.rampAngle);
            const dirDownRamp = new THREE.Vector3(-Math.cos(thetaRad), -Math.sin(thetaRad), 0);
            const dirUpRamp = new THREE.Vector3(Math.cos(thetaRad), Math.sin(thetaRad), 0);
            const dirFlat = new THREE.Vector3(-1, 0, 0);
            const dirFlatOpposite = new THREE.Vector3(1, 0, 0);

            [car, duck].forEach(obj => {
                let pos = new THREE.Vector3();
                let rotZ = 0;
                
                let f_gravity_par = 0;
                let f_friction = 0;
                let f_net = 0;
                let dirG = dirDownRamp;
                let dirF = dirUpRamp;
                let dirN = dirDownRamp;

                const mu = obj.baseMu * STATE.frictionMultiplier;

                if (obj.s <= PHYSICS.rampLength) {
                    // On Ramp
                    const distFromTop = obj.s;
                    const distFromPivot = PHYSICS.rampLength - distFromTop;
                    
                    pos.x = distFromPivot * Math.cos(thetaRad) - (obj.height / 2) * Math.sin(thetaRad);
                    pos.y = distFromPivot * Math.sin(thetaRad) + (obj.height / 2) * Math.cos(thetaRad);
                    pos.z = obj.zOffset;
                    rotZ = thetaRad;

                    const g_par = PHYSICS.g * Math.sin(thetaRad);
                    const N = obj.mass * PHYSICS.g * Math.cos(thetaRad);
                    
                    f_gravity_par = obj.mass * g_par;
                    
                    if (obj.status === 'Static' || STATE.isHeld) {
                        f_friction = f_gravity_par; // Balances exactly
                        f_net = 0;
                    } else {
                        f_friction = mu * N;
                        f_net = f_gravity_par - f_friction;
                    }

                } else {
                    // On Flat Ground
                    const distPastBottom = obj.s - PHYSICS.rampLength;
                    
                    // Start from bottom of ramp position
                    const startX = -(obj.height / 2) * Math.sin(thetaRad);
                    
                    pos.x = startX - distPastBottom;
                    pos.y = obj.height / 2;
                    pos.z = obj.zOffset;
                    rotZ = 0;

                    f_gravity_par = 0;
                    const N = obj.mass * PHYSICS.g;
                    
                    if (obj.status === 'Stopped') {
                        f_friction = 0;
                        f_net = 0;
                    } else {
                        f_friction = mu * N;
                        f_net = -f_friction;
                    }

                    dirG = dirFlat; // Length 0 anyway
                    dirF = dirFlatOpposite;
                    dirN = dirFlat;
                }

                obj.mesh.position.copy(pos);
                obj.mesh.rotation.z = rotZ;

                // Update Arrows
                const arrowScale = 0.5; // 1 unit = 2 N -> length = force * 0.5
                
                obj.arrows.gravity.position.copy(pos);
                obj.arrows.gravity.setDirection(dirG);
                obj.arrows.gravity.setLength(Math.max(0.01, f_gravity_par * arrowScale));
                
                obj.arrows.friction.position.copy(pos);
                obj.arrows.friction.setDirection(dirF);
                obj.arrows.friction.setLength(Math.max(0.01, f_friction * arrowScale));

                obj.arrows.net.position.copy(pos);
                obj.arrows.net.setDirection(f_net >= 0 ? dirN : dirN.clone().negate());
                obj.arrows.net.setLength(Math.max(0.01, Math.abs(f_net) * arrowScale));

                const showArrows = STATE.forceArrowsVisible; // && !STATE.isPaused;
                obj.arrows.gravity.visible = showArrows && f_gravity_par > 0.01;
                obj.arrows.friction.visible = showArrows && f_friction > 0.01;
                obj.arrows.net.visible = showArrows && Math.abs(f_net) > 0.01;
            });
        }

        function updateHUD() {
            document.getElementById('hud-angle').textContent = STATE.rampAngle.toFixed(0);
            document.getElementById('hud-friction').textContent = STATE.frictionMultiplier.toFixed(2);
            
            document.getElementById('hud-car-speed').textContent = car.v.toFixed(2);
            document.getElementById('hud-car-accel').textContent = car.a.toFixed(2);
            document.getElementById('hud-car-status').textContent = STATE.isHeld ? 'Held' : car.status;
            
            document.getElementById('hud-duck-speed').textContent = duck.v.toFixed(2);
            document.getElementById('hud-duck-accel').textContent = duck.a.toFixed(2);
            document.getElementById('hud-duck-status').textContent = STATE.isHeld ? 'Held' : duck.status;
            
            document.getElementById('hud-models').textContent = STATE.modelsLoaded ? 'Yes' : 'No';
            document.getElementById('hud-paused').textContent = STATE.isPaused ? 'Paused' : 'Playing';
        }

        function updateStateObject() {
            STATE.carSpeed = Number(car.v.toFixed(3));
            STATE.duckSpeed = Number(duck.v.toFixed(3));
            STATE.carAcceleration = Number(car.a.toFixed(3));
            STATE.duckAcceleration = Number(duck.a.toFixed(3));
            STATE.carPosition = Number(car.s.toFixed(3));
            STATE.duckPosition = Number(duck.s.toFixed(3));
            STATE.carStatus = STATE.isHeld ? 'Static' : car.status;
            STATE.duckStatus = STATE.isHeld ? 'Static' : duck.status;
            STATE.frameCount++;
            
            STATE.simValid = !isNaN(car.s) && !isNaN(duck.s) && !isNaN(car.v) && !isNaN(duck.v);
        }

        // --- Main Loop ---
        updateRampVisuals();

        function animate() {
            requestAnimationFrame(animate);

            updatePhysics();
            updateObjectVisuals();
            updateHUD();
            updateStateObject();

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

    </script>
</body>
</html>
