<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Friction Ramp Physics Experiment</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #d4e8f0;
      font-family: sans-serif;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 12px;
      font: 13px monospace;
      border-radius: 8px;
      z-index: 1000;
      min-width: 280px;
      line-height: 1.45;
    }

    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(255,255,255,0.85);
      color: #111;
      padding: 12px;
      border-radius: 8px;
      z-index: 1000;
      min-width: 240px;
      font: 13px sans-serif;
    }

    #controls label {
      display: block;
      margin-bottom: 10px;
    }

    #controls input[type="range"] {
      width: 100%;
    }

    #help {
      margin-top: 10px;
      font-size: 12px;
      color: #333;
      line-height: 1.4;
    }

    canvas {
      display: block;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div>Ramp angle: <span id="hud-angle">30</span>°</div>
    <div>Friction multiplier: <span id="hud-friction">0.30</span></div>
    <div>Car speed: <span id="hud-car-speed">0.00</span> m/s</div>
    <div>Duck speed: <span id="hud-duck-speed">0.00</span> m/s</div>
    <div>Car accel: <span id="hud-car-accel">0.00</span> m/s²</div>
    <div>Duck accel: <span id="hud-duck-accel">0.00</span> m/s²</div>
    <div>Car status: <span id="hud-car-status">Static</span></div>
    <div>Duck status: <span id="hud-duck-status">Static</span></div>
    <div>Models loaded: <span id="hud-models">No</span></div>
    <div>Paused: <span id="hud-paused">Playing</span></div>
  </div>

  <div id="controls">
    <label>
      Ramp Angle: <span id="label-angle">30°</span>
      <input id="slider-angle" type="range" min="10" max="60" step="1" value="30">
    </label>
    <label>
      Friction Multiplier: <span id="label-friction">0.30</span>
      <input id="slider-friction" type="range" min="0.05" max="1.0" step="0.05" value="0.30">
    </label>
    <div id="help">
      <div><b>R</b> Reset</div>
      <div><b>Space</b> Pause/Play</div>
      <div><b>F</b> Toggle force arrows</div>
      <div><b>G</b> Start race</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd4e8f0);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(6, 5, 8);
    camera.lookAt(0, 1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x889999, 0.5);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(5, 10, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.set(2048, 2048);
    dirLight.shadow.camera.left = -15;
    dirLight.shadow.camera.right = 15;
    dirLight.shadow.camera.top = 15;
    dirLight.shadow.camera.bottom = -15;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 40;
    scene.add(dirLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({ color: 0x667766 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const rampLength = 6;
    const rampWidth = 2;
    const rampThickness = 0.15;
    const railWidth = 0.05;
    const railHeight = 0.1;
    const g = 9.81;
    const dt = 1 / 60;
    const forceScale = 0.5; // 1 unit = 2 N

    let frameCount = 0;
    let isPaused = false;
    let forceArrowsVisible = true;
    let modelsLoaded = false;

    const sliderAngle = document.getElementById('slider-angle');
    const sliderFriction = document.getElementById('slider-friction');
    const labelAngle = document.getElementById('label-angle');
    const labelFriction = document.getElementById('label-friction');

    let rampAngleDeg = parseFloat(sliderAngle.value);
    let frictionMultiplier = parseFloat(sliderFriction.value);

    const hud = {
      angle: document.getElementById('hud-angle'),
      friction: document.getElementById('hud-friction'),
      carSpeed: document.getElementById('hud-car-speed'),
      duckSpeed: document.getElementById('hud-duck-speed'),
      carAccel: document.getElementById('hud-car-accel'),
      duckAccel: document.getElementById('hud-duck-accel'),
      carStatus: document.getElementById('hud-car-status'),
      duckStatus: document.getElementById('hud-duck-status'),
      models: document.getElementById('hud-models'),
      paused: document.getElementById('hud-paused'),
    };

    const textureLoader = new THREE.TextureLoader();
    const woodTexture = textureLoader.load('hardwood2_diffuse.jpg');
    woodTexture.wrapS = THREE.RepeatWrapping;
    woodTexture.wrapT = THREE.RepeatWrapping;
    woodTexture.repeat.set(3, 1);

    const rampGroup = new THREE.Group();
    scene.add(rampGroup);

    const rampPivot = new THREE.Group();
    rampGroup.add(rampPivot);

    const rampMaterial = new THREE.MeshStandardMaterial({ color: 0x997755 });
    const topMaterial = new THREE.MeshStandardMaterial({ color: 0x997755, map: woodTexture });
    const sideMaterial = new THREE.MeshStandardMaterial({ color: 0x997755 });

    const rampGeometry = new THREE.BoxGeometry(rampThickness, rampLength, rampWidth);
    const rampMaterials = [
      sideMaterial,
      sideMaterial,
      topMaterial,
      sideMaterial,
      sideMaterial,
      sideMaterial
    ];
    const rampMesh = new THREE.Mesh(rampGeometry, rampMaterials);
    rampMesh.castShadow = true;
    rampMesh.receiveShadow = true;
    rampPivot.add(rampMesh);

    // Orient box so local +Y is along ramp length, +Z is ramp width, +X is thickness(normal)
    rampMesh.rotation.z = 0;
    rampMesh.position.set(rampThickness / 2, rampLength / 2, 0);

    const railMat = new THREE.MeshStandardMaterial({ color: 0x554433 });

    function createRail(zOffset) {
      const rail = new THREE.Mesh(
        new THREE.BoxGeometry(railWidth, rampLength, railHeight),
        railMat
      );
      rail.castShadow = true;
      rail.receiveShadow = true;
      rail.position.set(
        rampThickness + railWidth / 2,
        rampLength / 2,
        zOffset
      );
      rampPivot.add(rail);
      return rail;
    }

    createRail(rampWidth / 2 - railHeight / 2);
    createRail(-rampWidth / 2 + railHeight / 2);

    // Protractor arc
    class ArcCurve extends THREE.Curve {
      constructor(radius = 0.8) {
        super();
        this.radius = radius;
      }
      getPoint(t, target = new THREE.Vector3()) {
        const angle = t * Math.PI / 2;
        return target.set(
          Math.cos(angle) * this.radius,
          Math.sin(angle) * this.radius,
          -1.2
        );
      }
    }
    const arcCurve = new ArcCurve(0.8);
    const arcGeom = new THREE.TubeGeometry(arcCurve, 48, 0.02, 8, false);
    const arcMesh = new THREE.Mesh(
      arcGeom,
      new THREE.MeshStandardMaterial({ color: 0x333333 })
    );
    arcMesh.castShadow = true;
    rampGroup.add(arcMesh);

    function updateRampAngle() {
      const theta = THREE.MathUtils.degToRad(rampAngleDeg);
      rampPivot.rotation.z = -theta;
    }

    function getRampTheta() {
      return THREE.MathUtils.degToRad(rampAngleDeg);
    }

    const loader = new GLTFLoader();

    function computeScaleToSize(root, targetSize, mode = 'length') {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      box.getSize(size);
      let current = size.y;
      if (mode === 'height') current = size.x || size.y || size.z;
      if (mode === 'length') current = Math.max(size.x, size.y, size.z);
      if (!current || !isFinite(current)) return 1;
      return targetSize / current;
    }

    function makeFallback(color, sizeX, sizeY, sizeZ) {
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(sizeX, sizeY, sizeZ),
        new THREE.MeshStandardMaterial({ color })
      );
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    function enableShadows(obj) {
      obj.traverse((c) => {
        if (c.isMesh) {
          c.castShadow = true;
          c.receiveShadow = true;
        }
      });
    }

    function createForceArrow(color) {
      return new THREE.ArrowHelper(
        new THREE.Vector3(0, 1, 0),
        new THREE.Vector3(),
        0.5,
        color,
        0.12,
        0.08
      );
    }

    const objects = {
      car: {
        name: 'ToyCar',
        baseMu: 0.25,
        mass: 1.0,
        s: 0,
        v: 0,
        a: 0,
        sliding: false,
        status: 'Static',
        released: false,
        onGround: false,
        groundX: 0,
        widthOffset: -0.28,
        object3D: new THREE.Group(),
        modelReady: false,
        normalOffset: 0.12,
        arrows: {
          gravity: createForceArrow(0x00ff00),
          friction: createForceArrow(0xff0000),
          net: createForceArrow(0x0000ff)
        }
      },
      duck: {
        name: 'Duck',
        baseMu: 0.50,
        mass: 0.5,
        s: 0,
        v: 0,
        a: 0,
        sliding: false,
        status: 'Static',
        released: false,
        onGround: false,
        groundX: 0,
        widthOffset: 0.28,
        object3D: new THREE.Group(),
        modelReady: false,
        normalOffset: 0.12,
        arrows: {
          gravity: createForceArrow(0x00ff00),
          friction: createForceArrow(0xff0000),
          net: createForceArrow(0x0000ff)
        }
      }
    };

    Object.values(objects).forEach(obj => {
      scene.add(obj.object3D);
      obj.object3D.add(obj.arrows.gravity);
      obj.object3D.add(obj.arrows.friction);
      obj.object3D.add(obj.arrows.net);
    });

    function loadModel(url, key, targetSize, mode, fallback) {
      loader.load(
        url,
        (gltf) => {
          const model = gltf.scene;
          enableShadows(model);

          const scale = computeScaleToSize(model, targetSize, mode);
          model.scale.setScalar(scale);

          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          const center = new THREE.Vector3();
          box.getSize(size);
          box.getCenter(center);

          model.position.sub(center);
          model.position.y += size.y / 2;

          objects[key].normalOffset = Math.max(0.08, size.y * 0.45);
          objects[key].object3D.add(model);
          objects[key].modelReady = true;

          modelsLoaded = objects.car.modelReady && objects.duck.modelReady;
          resetObjects(false);
        },
        undefined,
        () => {
          const model = fallback;
          const box = new THREE.Box3().setFromObject(model);
          const size = new THREE.Vector3();
          box.getSize(size);
          objects[key].normalOffset = Math.max(0.08, size.y * 0.45);
          objects[key].object3D.add(model);
          objects[key].modelReady = true;
          modelsLoaded = objects.car.modelReady && objects.duck.modelReady;
          resetObjects(false);
        }
      );
    }

    loadModel('ToyCar.glb', 'car', 0.6, 'length', makeFallback(0xaa3333, 0.22, 0.12, 0.6));
    loadModel('Duck.glb', 'duck', 0.5, 'height', makeFallback(0xffdd33, 0.25, 0.5, 0.25));

    function getMu(obj) {
      return obj.baseMu * frictionMultiplier;
    }

    function getStaticMu(obj) {
      return getMu(obj) * 1.2;
    }

    function placeObject(obj) {
      const theta = getRampTheta();
      const tangent = new THREE.Vector3(
        Math.sin(theta),
        Math.cos(theta),
        0
      );
      const normal = new THREE.Vector3(
        Math.cos(theta),
        -Math.sin(theta),
        0
      );
      const binormal = new THREE.Vector3(0, 0, 1);

      if (!obj.onGround) {
        const base = new THREE.Vector3(0, 0, obj.widthOffset).addScaledVector(tangent, obj.s);
        const pos = base.clone().addScaledVector(normal, rampThickness / 2 + obj.normalOffset);
        obj.object3D.position.copy(pos);

        const matrix = new THREE.Matrix4().makeBasis(binormal, tangent, normal);
        obj.object3D.setRotationFromMatrix(matrix);

        if (obj.name === 'Duck') {
          obj.object3D.rotateY(Math.PI / 2);
        }
      } else {
        const y = obj.normalOffset;
        obj.object3D.position.set(obj.groundX, y, obj.widthOffset);

        obj.object3D.rotation.set(0, 0, 0);
        if (obj.name === 'Duck') {
          obj.object3D.rotation.y = Math.PI / 2;
        }
      }
    }

    function resetObjects(clearReleased = true) {
      Object.values(objects).forEach((obj) => {
        obj.s = 0.2;
        obj.v = 0;
        obj.a = 0;
        obj.sliding = false;
        obj.status = 'Static';
        obj.onGround = false;
        obj.groundX = 0;
        if (clearReleased) obj.released = false;
        placeObject(obj);
      });
    }

    function startRace() {
      Object.values(objects).forEach((obj) => {
        obj.released = true;
      });
    }

    function updateObjectPhysics(obj) {
      const theta = getRampTheta();
      const mu = getMu(obj);
      const muS = getStaticMu(obj);

      if (!obj.released) {
        obj.a = 0;
        obj.v = 0;
        obj.sliding = false;
        obj.status = 'Static';
        return;
      }

      if (!obj.onGround) {
        const gParallel = g * Math.sin(theta);
        const normalForce = obj.mass * g * Math.cos(theta);
        const staticThreshold = muS * g * Math.cos(theta);

        if (!obj.sliding) {
          if (gParallel > staticThreshold) {
            obj.sliding = true;
          } else {
            obj.a = 0;
            obj.v = 0;
            obj.status = 'Static';
            return;
          }
        }

        obj.a = g * Math.sin(theta) - mu * g * Math.cos(theta);
        if (obj.a < 0) obj.a = 0;

        obj.v += obj.a * dt;
        obj.s += obj.v * dt;

        obj.status = obj.v > 0 ? 'Sliding' : 'Static';

        if (obj.s >= rampLength) {
          const excess = obj.s - rampLength;
          obj.onGround = true;
          obj.s = rampLength;
          obj.groundX = Math.sin(theta) * rampLength + excess;
          obj.status = obj.v > 0 ? 'Sliding' : 'Stopped';
        }
      } else {
        obj.a = -mu * g;

        if (obj.v > 0) {
          obj.v += obj.a * dt;
          if (obj.v < 0) obj.v = 0;
          obj.groundX += obj.v * dt;
        }

        if (obj.v <= 0) {
          obj.v = 0;
          obj.a = 0;
          obj.status = 'Stopped';
        } else {
          obj.status = 'Sliding';
        }
      }
    }

    function updateForceArrows(obj) {
      const visible = forceArrowsVisible && !isPaused && obj.released;
      obj.arrows.gravity.visible = visible;
      obj.arrows.friction.visible = visible;
      obj.arrows.net.visible = visible;
      if (!visible) return;

      const theta = getRampTheta();
      const tangentDown = new THREE.Vector3(Math.sin(theta), Math.cos(theta), 0).normalize();
      const tangentUp = tangentDown.clone().multiplyScalar(-1);

      let gravityMag = 0;
      let frictionMag = 0;
      let netMag = 0;
      let frictionDir = tangentUp.clone();
      let netDir = tangentDown.clone();

      const mu = getMu(obj);
      const muS = getStaticMu(obj);

      if (!obj.onGround) {
        gravityMag = obj.mass * g * Math.sin(theta);

        if (obj.sliding && obj.v > 0) {
          frictionMag = mu * obj.mass * g * Math.cos(theta);
          netMag = Math.max(0, obj.mass * obj.a);
        } else {
          const neededStatic = Math.min(
            obj.mass * g * Math.sin(theta),
            muS * obj.mass * g * Math.cos(theta)
          );
          frictionMag = neededStatic;
          netMag = 0;
        }
      } else {
        gravityMag = 0;
        frictionMag = obj.v > 0 ? mu * obj.mass * g : 0;
        frictionDir = new THREE.Vector3(-1, 0, 0);
        netMag = obj.v > 0 ? Math.abs(obj.mass * obj.a) : 0;
        netDir = new THREE.Vector3(-1, 0, 0);
      }

      obj.arrows.gravity.position.set(0, obj.normalOffset + 0.15, 0);
      obj.arrows.friction.position.set(0, obj.normalOffset + 0.15, 0);
      obj.arrows.net.position.set(0, obj.normalOffset + 0.15, 0);

      obj.arrows.gravity.setDirection(obj.onGround ? new THREE.Vector3(1, 0, 0) : tangentDown);
      obj.arrows.gravity.setLength(Math.max(gravityMag * forceScale, 0.001), 0.12, 0.08);

      obj.arrows.friction.setDirection(frictionDir.normalize());
      obj.arrows.friction.setLength(Math.max(frictionMag * forceScale, 0.001), 0.12, 0.08);

      obj.arrows.net.setDirection(netDir.normalize());
      obj.arrows.net.setLength(Math.max(netMag * forceScale, 0.001), 0.12, 0.08);
    }

    function updateHUD() {
      hud.angle.textContent = rampAngleDeg.toFixed(0);
      hud.friction.textContent = frictionMultiplier.toFixed(2);
      hud.carSpeed.textContent = objects.car.v.toFixed(2);
      hud.duckSpeed.textContent = objects.duck.v.toFixed(2);
      hud.carAccel.textContent = objects.car.a.toFixed(2);
      hud.duckAccel.textContent = objects.duck.a.toFixed(2);
      hud.carStatus.textContent = objects.car.status;
      hud.duckStatus.textContent = objects.duck.status;
      hud.models.textContent = modelsLoaded ? 'Yes' : 'No';
      hud.paused.textContent = isPaused ? 'Paused' : 'Playing';
    }

    function safeNum(n) {
      return Number.isFinite(n) ? n : NaN;
    }

    function updateState() {
      const simValid = [
        objects.car.v, objects.duck.v,
        objects.car.a, objects.duck.a,
        objects.car.s, objects.duck.s,
        rampAngleDeg, frictionMultiplier
      ].every(Number.isFinite);

      window.__3D_STATE__ = {
        rampAngle: +rampAngleDeg.toFixed(1),
        frictionMultiplier: +frictionMultiplier.toFixed(2),
        carSpeed: +safeNum(objects.car.v).toFixed(3),
        duckSpeed: +safeNum(objects.duck.v).toFixed(3),
        carAcceleration: +safeNum(objects.car.a).toFixed(3),
        duckAcceleration: +safeNum(objects.duck.a).toFixed(3),
        carPosition: +(objects.car.onGround ? objects.car.groundX : objects.car.s).toFixed(3),
        duckPosition: +(objects.duck.onGround ? objects.duck.groundX : objects.duck.s).toFixed(3),
        carStatus: objects.car.status,
        duckStatus: objects.duck.status,
        modelsLoaded,
        isPaused,
        forceArrowsVisible,
        frameCount,
        simValid
      };
    }

    sliderAngle.addEventListener('input', () => {
      rampAngleDeg = parseFloat(sliderAngle.value);
      labelAngle.textContent = `${rampAngleDeg.toFixed(0)}°`;
      updateRampAngle();
      Object.values(objects).forEach(placeObject);
    });

    sliderFriction.addEventListener('input', () => {
      frictionMultiplier = parseFloat(sliderFriction.value);
      labelFriction.textContent = frictionMultiplier.toFixed(2);
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'KeyR') {
        resetObjects(true);
      } else if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
      } else if (e.code === 'KeyF') {
        forceArrowsVisible = !forceArrowsVisible;
      } else if (e.code === 'KeyG') {
        startRace();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    updateRampAngle();
    resetObjects(true);

    function animate() {
      requestAnimationFrame(animate);
      frameCount++;

      if (!isPaused) {
        updateObjectPhysics(objects.car);
        updateObjectPhysics(objects.duck);
      }

      placeObject(objects.car);
      placeObject(objects.duck);

      updateForceArrows(objects.car);
      updateForceArrows(objects.duck);

      updateHUD();
      updateState();

      controls.update();
      renderer.render(scene, camera);
    }

    updateState();
    animate();
  </script>
</body>
</html>
