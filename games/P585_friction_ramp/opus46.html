<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Friction Ramp Physics Experiment</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
body { margin: 0; overflow: hidden; font-family: monospace; }
canvas { display: block; }
#hud {
    position: fixed; top: 10px; left: 10px;
    background: rgba(0,0,0,0.6); color: white;
    padding: 12px; font-size: 13px; font-family: monospace;
    border-radius: 8px; z-index: 1000;
    line-height: 1.6;
}
#controls {
    position: fixed; bottom: 10px; left: 10px;
    background: rgba(0,0,0,0.6); color: white;
    padding: 12px; font-size: 13px; font-family: monospace;
    border-radius: 8px; z-index: 1000;
}
#controls label { display: block; margin: 4px 0; }
#controls input[type="range"] { width: 200px; vertical-align: middle; }
#keys-help {
    position: fixed; bottom: 10px; right: 10px;
    background: rgba(0,0,0,0.6); color: white;
    padding: 12px; font-size: 12px; font-family: monospace;
    border-radius: 8px; z-index: 1000;
    line-height: 1.6;
}
</style>
</head>
<body>

<div id="hud">
    Ramp Angle: <span id="hud-angle">30</span>°<br>
    Friction Mult: <span id="hud-friction">0.30</span><br>
    Car Speed: <span id="hud-car-speed">0.00</span> m/s<br>
    Duck Speed: <span id="hud-duck-speed">0.00</span> m/s<br>
    Car Accel: <span id="hud-car-accel">0.00</span> m/s²<br>
    Duck Accel: <span id="hud-duck-accel">0.00</span> m/s²<br>
    Car Status: <span id="hud-car-status">Static</span><br>
    Duck Status: <span id="hud-duck-status">Static</span><br>
    Models Loaded: <span id="hud-models">No</span><br>
    State: <span id="hud-paused">Playing</span>
</div>

<div id="controls">
    <label>Angle: <input type="range" id="slider-angle" min="10" max="60" step="1" value="30"> <span id="angle-val">30</span>°</label>
    <label>Friction: <input type="range" id="slider-friction" min="0.05" max="1.0" step="0.05" value="0.30"> <span id="friction-val">0.30</span></label>
</div>

<div id="keys-help">
    [Space] Pause/Play<br>
    [R] Reset<br>
    [F] Toggle Forces<br>
    [G] Start Race
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
window.__3D_STATE__ = {
    rampAngle: 30,
    frictionMultiplier: 0.30,
    carSpeed: 0,
    duckSpeed: 0,
    carAcceleration: 0,
    duckAcceleration: 0,
    carPosition: 0,
    duckPosition: 0,
    carStatus: 'Static',
    duckStatus: 'Static',
    modelsLoaded: false,
    isPaused: false,
    forceArrowsVisible: true,
    frameCount: 0,
    simValid: true
};

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd4e8f0);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(6, 5, 8);
camera.lookAt(0, 1.5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.update();

// Lights
const ambientLight = new THREE.AmbientLight(0x889999, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

// Ground
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x667766 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

// --- Ramp ---
const RAMP_LENGTH = 6;
const RAMP_WIDTH = 2;
const RAMP_THICKNESS = 0.15;

const rampGroup = new THREE.Group();
scene.add(rampGroup);

// Ramp body
const rampGeo = new THREE.BoxGeometry(RAMP_LENGTH, RAMP_THICKNESS, RAMP_WIDTH);
const rampMat = new THREE.MeshStandardMaterial({ color: 0x997755 });

// Try loading texture
const textureLoader = new THREE.TextureLoader();
textureLoader.load('hardwood2_diffuse.jpg',
    (tex) => {
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(3, 1);
        rampMat.map = tex;
        rampMat.needsUpdate = true;
    },
    undefined,
    () => {
        // Texture not found, create procedural wood texture
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#997755';
        ctx.fillRect(0, 0, 512, 256);
        for (let i = 0; i < 40; i++) {
            ctx.strokeStyle = `rgba(${80+Math.random()*40}, ${50+Math.random()*30}, ${30+Math.random()*20}, 0.3)`;
            ctx.lineWidth = 1 + Math.random() * 3;
            ctx.beginPath();
            const y = Math.random() * 256;
            ctx.moveTo(0, y);
            ctx.bezierCurveTo(128, y + Math.random()*20-10, 384, y + Math.random()*20-10, 512, y + Math.random()*10-5);
            ctx.stroke();
        }
        const tex = new THREE.CanvasTexture(canvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(3, 1);
        rampMat.map = tex;
        rampMat.needsUpdate = true;
    }
);

const rampMesh = new THREE.Mesh(rampGeo, rampMat);
rampMesh.castShadow = true;
rampMesh.receiveShadow = true;
// Position so that the geometry center is at (RAMP_LENGTH/2, 0, 0) relative to group
rampMesh.position.set(RAMP_LENGTH / 2, 0, 0);
rampGroup.add(rampMesh);

// Rails
const railGeo = new THREE.BoxGeometry(RAMP_LENGTH, 0.1, 0.05);
const railMat = new THREE.MeshStandardMaterial({ color: 0x554433 });

const railLeft = new THREE.Mesh(railGeo, railMat);
railLeft.position.set(RAMP_LENGTH / 2, RAMP_THICKNESS / 2 + 0.05, -RAMP_WIDTH / 2 + 0.025);
railLeft.castShadow = true;
rampGroup.add(railLeft);

const railRight = new THREE.Mesh(railGeo, railMat);
railRight.position.set(RAMP_LENGTH / 2, RAMP_THICKNESS / 2 + 0.05, RAMP_WIDTH / 2 - 0.025);
railRight.castShadow = true;
rampGroup.add(railRight);

// Protractor arc
function createProtractor() {
    const arcPoints = [];
    const radius = 1.2;
    for (let i = 0; i <= 90; i += 1) {
        const rad = (i * Math.PI) / 180;
        arcPoints.push(new THREE.Vector3(Math.cos(rad) * radius, Math.sin(rad) * radius, 0));
    }
    const curve = new THREE.CatmullRomCurve3(arcPoints);
    const tubeGeo = new THREE.TubeGeometry(curve, 90, 0.015, 8, false);
    const tubeMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    return tube;
}

const protractor = createProtractor();
protractor.position.set(0, 0, -RAMP_WIDTH / 2 - 0.1);
scene.add(protractor);

// Tick marks on protractor
for (let deg = 0; deg <= 90; deg += 10) {
    const rad = (deg * Math.PI) / 180;
    const r1 = 1.1, r2 = 1.3;
    const points = [
        new THREE.Vector3(Math.cos(rad) * r1, Math.sin(rad) * r1, 0),
        new THREE.Vector3(Math.cos(rad) * r2, Math.sin(rad) * r2, 0)
    ];
    const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
    const lineMat = new THREE.LineBasicMaterial({ color: 0x333333 });
    const line = new THREE.Line(lineGeo, lineMat);
    line.position.z = -RAMP_WIDTH / 2 - 0.1;
    scene.add(line);
}

// Angle indicator line
const angleLineMat = new THREE.LineBasicMaterial({ color: 0xff3333, linewidth: 2 });
const angleLineGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, 0, 0),
    new THREE.Vector3(1.4, 0, 0)
]);
const angleLine = new THREE.Line(angleLineGeo, angleLineMat);
angleLine.position.z = -RAMP_WIDTH / 2 - 0.1;
scene.add(angleLine);

// --- Physics State ---
const g = 9.81;
let rampAngleDeg = 30;
let frictionMultiplier = 0.30;
let isPaused = false;
let forceArrowsVisible = true;
const dt = 1 / 60;

const MU_CAR_BASE = 0.25;
const MU_DUCK_BASE = 0.50;
const MASS_CAR = 1.0;
const MASS_DUCK = 0.5;

const carState = { s: 0, v: 0, a: 0, status: 'Static', onRamp: true, groundX: 0, groundV: 0 };
const duckState = { s: 0, v: 0, a: 0, status: 'Static', onRamp: true, groundX: 0, groundV: 0 };

function resetObjects() {
    carState.s = 0;
    carState.v = 0;
    carState.a = 0;
    carState.status = 'Static';
    carState.onRamp = true;
    carState.groundX = 0;
    carState.groundV = 0;

    duckState.s = 0;
    duckState.v = 0;
    duckState.a = 0;
    duckState.status = 'Static';
    duckState.onRamp = true;
    duckState.groundX = 0;
    duckState.groundV = 0;
}

// --- Load Models ---
const loader = new GLTFLoader();
let carModel = null;
let duckModel = null;
let carLoaded = false;
let duckLoaded = false;

// Car placeholder
const carPlaceholder = new THREE.Group();
const carBoxGeo = new THREE.BoxGeometry(0.6, 0.25, 0.35);
const carBoxMat = new THREE.MeshStandardMaterial({ color: 0xdd3333 });
const carBox = new THREE.Mesh(carBoxGeo, carBoxMat);
carBox.castShadow = true;
carPlaceholder.add(carBox);
// Wheels
for (let i = 0; i < 4; i++) {
    const wheelGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.05, 16);
    const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.x = Math.PI / 2;
    wheel.position.set((i < 2 ? 0.2 : -0.2), -0.12, (i % 2 === 0 ? 0.18 : -0.18));
    carPlaceholder.add(wheel);
}

// Duck placeholder
const duckPlaceholder = new THREE.Group();
const duckBodyGeo = new THREE.SphereGeometry(0.2, 16, 16);
const duckBodyMat = new THREE.MeshStandardMaterial({ color: 0xffdd00 });
const duckBody = new THREE.Mesh(duckBodyGeo, duckBodyMat);
duckBody.castShadow = true;
duckBody.position.y = 0.05;
duckPlaceholder.add(duckBody);
const duckHeadGeo = new THREE.SphereGeometry(0.12, 16, 16);
const duckHead = new THREE.Mesh(duckHeadGeo, duckBodyMat);
duckHead.castShadow = true;
duckHead.position.set(0.15, 0.22, 0);
duckPlaceholder.add(duckHead);
const beakGeo = new THREE.ConeGeometry(0.04, 0.1, 8);
const beakMat = new THREE.MeshStandardMaterial({ color: 0xff6600 });
const beak = new THREE.Mesh(beakGeo, beakMat);
beak.rotation.z = -Math.PI / 2;
beak.position.set(0.28, 0.22, 0);
duckPlaceholder.add(beak);

let carObject = carPlaceholder;
let duckObject = duckPlaceholder;
scene.add(carObject);
scene.add(duckObject);

// Try loading GLB models
loader.load('ToyCar.glb',
    (gltf) => {
        scene.remove(carObject);
        carModel = gltf.scene;
        // Scale to fit ~0.6 units
        const box = new THREE.Box3().setFromObject(carModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 0.6 / maxDim;
        carModel.scale.setScalar(scale);
        carModel.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        carObject = carModel;
        scene.add(carObject);
        carLoaded = true;
        checkModelsLoaded();
    },
    undefined,
    () => { carLoaded = true; checkModelsLoaded(); }
);

loader.load('Duck.glb',
    (gltf) => {
        scene.remove(duckObject);
        duckModel = gltf.scene;
        const box = new THREE.Box3().setFromObject(duckModel);
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 0.5 / maxDim;
        duckModel.scale.setScalar(scale);
        duckModel.traverse(c => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
        duckObject = duckModel;
        scene.add(duckObject);
        duckLoaded = true;
        checkModelsLoaded();
    },
    undefined,
    () => { duckLoaded = true; checkModelsLoaded(); }
);

function checkModelsLoaded() {
    if (carLoaded && duckLoaded) {
        window.__3D_STATE__.modelsLoaded = true;
        document.getElementById('hud-models').textContent = 'Yes';
    }
}

// --- Force Arrows ---
function createArrow(color) {
    const arrow = new THREE.ArrowHelper(
        new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 0, 0),
        0.5, color, 0.1, 0.06
    );
    arrow.visible = forceArrowsVisible;
    scene.add(arrow);
    return arrow;
}

// Car arrows
const carGravArrow = createArrow(0x00ff00);
const carFricArrow = createArrow(0xff0000);
const carNetArrow = createArrow(0x0066ff);

// Duck arrows
const duckGravArrow = createArrow(0x00ff00);
const duckFricArrow = createArrow(0xff0000);
const duckNetArrow = createArrow(0x0066ff);

const allArrows = [carGravArrow, carFricArrow, carNetArrow, duckGravArrow, duckFricArrow, duckNetArrow];

// --- Update Ramp Geometry ---
function updateRamp(angleDeg) {
    const angleRad = (angleDeg * Math.PI) / 180;
    rampGroup.rotation.z = angleRad;
    rampGroup.position.set(0, 0, 0);

    // Update angle indicator line
    angleLine.rotation.z = angleRad;
}

updateRamp(rampAngleDeg);

// --- Physics Update ---
function updatePhysics(state, muBase, mass) {
    if (isPaused) return;

    const theta = (rampAngleDeg * Math.PI) / 180;
    const mu = muBase * frictionMultiplier;
    const muS = mu * 1.2;

    if (state.onRamp) {
        const gParallel = g * Math.sin(theta);
        const gNormal = g * Math.cos(theta);

        if (state.status === 'Static') {
            // Check if should start sliding
            if (Math.tan(theta) > muS) {
                state.status = 'Sliding';
                state.a = gParallel - mu * gNormal;
            } else {
                state.a = 0;
                state.v = 0;
            }
        }

        if (state.status === 'Sliding') {
            state.a = gParallel - mu * gNormal;
            if (state.a < 0) state.a = 0; // friction can't push backwards from rest
            state.v += state.a * dt;
            if (state.v < 0) { state.v = 0; state.a = 0; state.status = 'Static'; }
            state.s += state.v * dt;

            if (state.s >= RAMP_LENGTH) {
                // Transition to ground
                state.onRamp = false;
                state.groundX = 0;
                state.groundV = state.v;
                state.s = RAMP_LENGTH;
                state.status = 'Sliding';
            }
        }
    } else {
        // On ground
        const mu = muBase * frictionMultiplier;
        if (state.groundV > 0.001) {
            state.a = -mu * g;
            state.groundV += state.a * dt;
            if (state.groundV < 0) state.groundV = 0;
            state.groundX += state.groundV * dt;
            state.v = state.groundV;
            state.status = 'Sliding';
        } else {
            state.groundV = 0;
            state.v = 0;
            state.a = 0;
            state.status = 'Stopped';
        }
    }
}

// --- Position Objects ---
function positionObject(obj, state, zOffset) {
    const theta = (rampAngleDeg * Math.PI) / 180;

    if (state.onRamp) {
        // s=0 is top of ramp, s=RAMP_LENGTH is bottom
        const distFromBottom = RAMP_LENGTH - state.s;
        const x = distFromBottom * Math.cos(theta);
        const y = distFromBottom * Math.sin(theta) + RAMP_THICKNESS / 2 * Math.cos(theta) + 0.01;

        obj.position.set(x, y, zOffset);

        // Rotate object to align with ramp
        obj.rotation.set(0, 0, theta);
    } else {
        // On ground, moving in +x direction from ramp base
        const baseX = 0; // ramp bottom is at origin
        obj.position.set(baseX + state.groundX, RAMP_THICKNESS / 2 + 0.01, zOffset);
        obj.rotation.set(0, 0, 0);
    }
}

// --- Update Force Arrows ---
function updateForceArrows(state, muBase, mass, gravArrow, fricArrow, netArrow, objPos) {
    const theta = (rampAngleDeg * Math.PI) / 180;
    const mu = muBase * frictionMultiplier;
    const scale = 1 / 2; // 1 unit = 2 N, so length = force * 0.5

    // Direction along ramp (downhill)
    let rampDir, upRampDir;

    if (state.onRamp) {
        rampDir = new THREE.Vector3(Math.cos(theta), Math.sin(theta), 0).negate(); // downhill
        upRampDir = rampDir.clone().negate();

        const gParallel = mass * g * Math.sin(theta);
        const fFriction = state.status === 'Sliding' ? mu * mass * g * Math.cos(theta) :
                          Math.min(mu * 1.2 * mass * g * Math.cos(theta), gParallel);
        const fNet = Math.max(0, gParallel - fFriction);

        const arrowOrigin = objPos.clone().add(new THREE.Vector3(0, 0.3, 0));

        // Gravity arrow (downhill)
        gravArrow.position.copy(arrowOrigin);
        const gravLen = gParallel * scale;
        if (gravLen > 0.01) {
            gravArrow.setDirection(rampDir);
            gravArrow.setLength(gravLen, 0.1, 0.06);
            gravArrow.visible = forceArrowsVisible;
        } else {
            gravArrow.visible = false;
        }

        // Friction arrow (uphill, opposing motion)
        fricArrow.position.copy(arrowOrigin.clone().add(new THREE.Vector3(0, 0.15, 0)));
        const fricLen = fFriction * scale;
        if (fricLen > 0.01) {
            fricArrow.setDirection(upRampDir);
            fricArrow.setLength(fricLen, 0.1, 0.06);
            fricArrow.visible = forceArrowsVisible;
        } else {
            fricArrow.visible = false;
        }

        // Net arrow
        netArrow.position.copy(arrowOrigin.clone().add(new THREE.Vector3(0, -0.15, 0)));
        const netLen = fNet * scale;
        if (netLen > 0.01) {
            netArrow.setDirection(rampDir);
            netArrow.setLength(netLen, 0.1, 0.06);
            netArrow.visible = forceArrowsVisible;
        } else {
            netArrow.visible = false;
        }
    } else {
        // On ground
        const moveDir = new THREE.Vector3(1, 0, 0);
        const oppDir = new THREE.Vector3(-1, 0, 0);
        const arrowOrigin = objPos.clone().add(new THREE.Vector3(0, 0.3, 0));

        gravArrow.visible = false; // No gravity component on flat

        if (state.groundV > 0.001) {
            const fFriction = mu * mass * g;
            fricArrow.position.copy(arrowOrigin);
            fricArrow.setDirection(oppDir);
            fricArrow.setLength(fFriction * scale, 0.1, 0.06);
            fricArrow.visible = forceArrowsVisible;
        } else {
            fricArrow.visible = false;
        }
        netArrow.visible = false;
    }
}

// --- UI ---
const sliderAngle = document.getElementById('slider-angle');
const sliderFriction = document.getElementById('slider-friction');
const angleVal = document.getElementById('angle-val');
const frictionVal = document.getElementById('friction-val');

sliderAngle.addEventListener('input', () => {
    rampAngleDeg = parseFloat(sliderAngle.value);
    angleVal.textContent = rampAngleDeg;
    updateRamp(rampAngleDeg);
    // Re-evaluate static objects
    reEvaluateStatic(carState, MU_CAR_BASE);
    reEvaluateStatic(duckState, MU_DUCK_BASE);
});

sliderFriction.addEventListener('input', () => {
    frictionMultiplier = parseFloat(sliderFriction.value);
    frictionVal.textContent = frictionMultiplier.toFixed(2);
    reEvaluateStatic(carState, MU_CAR_BASE);
    reEvaluateStatic(duckState, MU_DUCK_BASE);
});

function reEvaluateStatic(state, muBase) {
    if (state.onRamp && state.status === 'Static') {
        const theta = (rampAngleDeg * Math.PI) / 180;
        const mu = muBase * frictionMultiplier;
        const muS = mu * 1.2;
        if (Math.tan(theta) > muS) {
            state.status = 'Sliding';
        }
    }
}

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault();
        isPaused = !isPaused;
    } else if (e.code === 'KeyR') {
        resetObjects();
    } else if (e.code === 'KeyF') {
        forceArrowsVisible = !forceArrowsVisible;
        allArrows.forEach(a => a.visible = forceArrowsVisible);
    } else if (e.code === 'KeyG') {
        // Start race
        resetObjects();
        carState.status = 'Sliding';
        duckState.status = 'Sliding';
        isPaused = false;
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- Animation Loop ---
let frameCount = 0;

function animate() {
    requestAnimationFrame(animate);

    // Physics
    updatePhysics(carState, MU_CAR_BASE, MASS_CAR);
    updatePhysics(duckState, MU_DUCK_BASE, MASS_DUCK);

    // Position objects
    positionObject(carObject, carState, -0.3);
    positionObject(duckObject, duckState, 0.3);

    // Force arrows
    if (forceArrowsVisible && !isPaused) {
        updateForceArrows(carState, MU_CAR_BASE, MASS_CAR, carGravArrow, carFricArrow, carNetArrow, carObject.position);
        updateForceArrows(duckState, MU_DUCK_BASE, MASS_DUCK, duckGravArrow, duckFricArrow, duckNetArrow, duckObject.position);
    } else if (!forceArrowsVisible) {
        allArrows.forEach(a => a.visible = false);
    }

    // Check for NaN
    const vals = [carState.s, carState.v, carState.a, duckState.s, duckState.v, duckState.a];
    const simValid = vals.every(v => !isNaN(v) && isFinite(v));

    frameCount++;

    // Update HUD
    document.getElementById('hud-angle').textContent = rampAngleDeg;
    document.getElementById('hud-friction').textContent = frictionMultiplier.toFixed(2);
    document.getElementById('hud-car-speed').textContent = carState.v.toFixed(2);
    document.getElementById('hud-duck-speed').textContent = duckState.v.toFixed(2);
    document.getElementById('hud-car-accel').textContent = carState.a.toFixed(2);
    document.getElementById('hud-duck-accel').textContent = duckState.a.toFixed(2);
    document.getElementById('hud-car-status').textContent = carState.status;
    document.getElementById('hud-duck-status').textContent = duckState.status;
    document.getElementById('hud-paused').textContent = isPaused ? 'Paused' : 'Playing';

    // Update state
    window.__3D_STATE__ = {
        rampAngle: Math.round(rampAngleDeg * 10) / 10,
        frictionMultiplier: Math.round(frictionMultiplier * 100) / 100,
        carSpeed: Math.round(carState.v * 1000) / 1000,
        duckSpeed: Math.round(duckState.v * 1000) / 1000,
        carAcceleration: Math.round(carState.a * 1000) / 1000,
        duckAcceleration: Math.round(duckState.a * 1000) / 1000,
        carPosition: Math.round(carState.s * 1000) / 1000,
        duckPosition: Math.round(duckState.s * 1000) / 1000,
        carStatus: carState.status,
        duckStatus: duckState.status,
        modelsLoaded: carLoaded && duckLoaded,
        isPaused: isPaused,
        forceArrowsVisible: forceArrowsVisible,
        frameCount: frameCount,
        simValid: simValid
    };

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
