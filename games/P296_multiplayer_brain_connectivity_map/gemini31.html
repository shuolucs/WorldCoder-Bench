<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Brain Connectivity Map</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .hud-panel {
            position: absolute;
            background: rgba(10, 10, 26, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 8px;
            pointer-events: auto;
            backdrop-filter: blur(4px);
        }
        #top-left {
            top: 20px;
            left: 20px;
            display: flex;
            gap: 10px;
        }
        #top-right {
            top: 20px;
            right: 20px;
            text-align: right;
            min-width: 150px;
        }
        #bottom-center {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2em;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .player-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-btn.active {
            border-color: #fff;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .stat-line {
            margin: 5px 0;
            font-size: 14px;
        }
        .stat-value {
            font-weight: bold;
            color: #aaaaff;
        }
        #instructions {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            font-size: 12px;
            color: #888;
            pointer-events: none;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
        }
        kbd {
            background: #333;
            padding: 2px 5px;
            border-radius: 3px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="top-left" class="hud-panel">
            <div class="player-btn active" id="btn-p1" style="background-color: #ff3333;">P1</div>
            <div class="player-btn active" id="btn-p2" style="background-color: #3333ff;">P2</div>
            <div class="player-btn active" id="btn-p3" style="background-color: #33ff33;">P3</div>
            <div class="player-btn active" id="btn-p4" style="background-color: #ffff33; color: #000; text-shadow: none;">P4</div>
        </div>
        <div id="top-right" class="hud-panel">
            <div class="stat-line">Connections: <span id="stat-connections" class="stat-value">12</span></div>
            <div class="stat-line">Selected: <span id="stat-selected" class="stat-value">None</span></div>
        </div>
        <div id="instructions">
            Click: Select Node | <kbd>C</kbd> + Click: Toggle Connection<br>
            <kbd>P</kbd>: Pulse | <kbd>R</kbd>: Auto-Rotate | <kbd>H</kbd>: Heatmap Mode
        </div>
        <div id="bottom-center" class="hud-panel">
            MODE: <span id="stat-mode" style="color: #aaaaff;">NORMAL</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            helmetLoaded: false,
            nodeCount: 12,
            connectionCount: 12,
            selectedNodeId: null,
            playerVisibility: [true, true, true, true],
            autoRotating: false,
            heatmapMode: false,
            pulseActive: false,
            nodePositions: [],
            connectionsData: [],
            visibleNodeCount: 12
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 3, 8);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0xffffff, 1.2);
        pointLight.position.set(5, 8, 5);
        scene.add(pointLight);

        // Groups
        const nodesGroup = new THREE.Group();
        scene.add(nodesGroup);
        
        const linesGroup = new THREE.Group();
        nodesGroup.add(linesGroup);

        // --- Load Model ---
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/DamagedHelmet/glTF/DamagedHelmet.gltf',
            (gltf) => {
                const helmet = gltf.scene;
                helmet.scale.set(1.5, 1.5, 1.5);
                scene.add(helmet);
                state.helmetLoaded = true;
            },
            undefined,
            (error) => console.error('Error loading helmet:', error)
        );

        // --- Nodes Setup ---
        const players = [
            { id: 0, color: 0xff3333 }, // P1 Red
            { id: 1, color: 0x3333ff }, // P2 Blue
            { id: 2, color: 0x33ff33 }, // P3 Green
            { id: 3, color: 0xffff33 }  // P4 Yellow
        ];

        const nodes = [];
        const nodeRadius = 0.15;
        const sphereRadius = 2.5;
        const nodeGeometry = new THREE.SphereGeometry(nodeRadius, 32, 32);

        // Selection Glow Mesh
        const glowGeometry = new THREE.SphereGeometry(nodeRadius * 1.3, 32, 32);
        const glowMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.5,
            side: THREE.BackSide
        });
        const selectionGlow = new THREE.Mesh(glowGeometry, glowMaterial);

        // Distribute nodes roughly spherically, grouped by player
        const positions = [
            // P1 (Top Front)
            new THREE.Vector3(0, 2.5, 0.5), new THREE.Vector3(1, 1.8, 1.5), new THREE.Vector3(-1, 1.8, 1.5),
            // P2 (Top Back)
            new THREE.Vector3(0, 2.5, -0.5), new THREE.Vector3(1, 1.8, -1.5), new THREE.Vector3(-1, 1.8, -1.5),
            // P3 (Bottom Front)
            new THREE.Vector3(0, -2.5, 0.5), new THREE.Vector3(1.5, -1.8, 1), new THREE.Vector3(-1.5, -1.8, 1),
            // P4 (Bottom Back)
            new THREE.Vector3(0, -2.5, -0.5), new THREE.Vector3(1.5, -1.8, -1), new THREE.Vector3(-1.5, -1.8, -1)
        ];

        for (let i = 0; i < 12; i++) {
            const playerId = Math.floor(i / 3);
            const pColor = players[playerId].color;
            
            const material = new THREE.MeshStandardMaterial({
                color: pColor,
                emissive: pColor,
                emissiveIntensity: 0.5,
                roughness: 0.2,
                metalness: 0.8
            });

            const mesh = new THREE.Mesh(nodeGeometry, material);
            const pos = positions[i].clone().normalize().multiplyScalar(sphereRadius);
            mesh.position.copy(pos);
            
            mesh.userData = {
                id: i,
                playerId: playerId,
                baseColor: new THREE.Color(pColor),
                baseScale: 1.0
            };

            nodesGroup.add(mesh);
            nodes.push(mesh);
            
            state.nodePositions.push({ x: pos.x, y: pos.y, z: pos.z });
        }

        // --- Connections Setup ---
        let connections = new Set(); // Store as "idA-idB" where idA < idB

        function addConnection(a, b) {
            const min = Math.min(a, b);
            const max = Math.max(a, b);
            connections.add(`${min}-${max}`);
        }

        function removeConnection(a, b) {
            const min = Math.min(a, b);
            const max = Math.max(a, b);
            connections.delete(`${min}-${max}`);
        }

        function hasConnection(a, b) {
            const min = Math.min(a, b);
            const max = Math.max(a, b);
            return connections.has(`${min}-${max}`);
        }

        // Initial connections (triangles within player groups)
        for (let p = 0; p < 4; p++) {
            const offset = p * 3;
            addConnection(offset, offset + 1);
            addConnection(offset + 1, offset + 2);
            addConnection(offset + 2, offset);
        }

        let lineMeshes = [];

        function updateLines() {
            // Clear old lines
            lineMeshes.forEach(mesh => linesGroup.remove(mesh));
            lineMeshes.forEach(mesh => {
                mesh.geometry.dispose();
                mesh.material.dispose();
            });
            lineMeshes = [];
            state.connectionsData = [];

            let activeCount = 0;

            connections.forEach(conn => {
                const [idA, idB] = conn.split('-').map(Number);
                const nodeA = nodes[idA];
                const nodeB = nodes[idB];

                // Only draw if both nodes are visible
                if (nodeA.visible && nodeB.visible) {
                    activeCount++;
                    state.connectionsData.push([idA, idB]);

                    const points = [nodeA.position, nodeB.position];
                    const geometry = new THREE.BufferGeometry().setFromPoints(points);
                    
                    let color = 0xffffff; // Default cross-player
                    if (nodeA.userData.playerId === nodeB.userData.playerId) {
                        color = players[nodeA.userData.playerId].color;
                    }

                    const material = new THREE.LineBasicMaterial({
                        color: color,
                        transparent: true,
                        opacity: 0.6,
                        depthWrite: false
                    });

                    const line = new THREE.Line(geometry, material);
                    line.userData = { baseOpacity: 0.6, baseColor: new THREE.Color(color) };
                    linesGroup.add(line);
                    lineMeshes.push(line);
                }
            });

            state.connectionCount = activeCount;
            document.getElementById('stat-connections').innerText = activeCount;
            updateHeatmap();
        }

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isCPressed = false;

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') isCPressed = true;
            if (e.key.toLowerCase() === 'p') triggerPulse();
            if (e.key.toLowerCase() === 'r') {
                state.autoRotating = !state.autoRotating;
            }
            if (e.key.toLowerCase() === 'h') {
                state.heatmapMode = !state.heatmapMode;
                document.getElementById('stat-mode').innerText = state.heatmapMode ? 'HEATMAP' : 'NORMAL';
                document.getElementById('stat-mode').style.color = state.heatmapMode ? '#ffaaaa' : '#aaaaff';
                updateHeatmap();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'c') isCPressed = false;
        });

        window.addEventListener('pointerdown', (event) => {
            // Don't raycast if clicking UI
            if (event.target.closest('.hud-panel')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const visibleNodes = nodes.filter(n => n.visible);
            const intersects = raycaster.intersectObjects(visibleNodes);

            if (intersects.length > 0) {
                const clickedNode = intersects[0].object;
                const clickedId = clickedNode.userData.id;

                if (isCPressed && state.selectedNodeId !== null && state.selectedNodeId !== clickedId) {
                    // Toggle connection
                    if (hasConnection(state.selectedNodeId, clickedId)) {
                        removeConnection(state.selectedNodeId, clickedId);
                    } else {
                        addConnection(state.selectedNodeId, clickedId);
                    }
                    updateLines();
                } else {
                    // Select / Deselect
                    if (state.selectedNodeId === clickedId) {
                        deselectNode();
                    } else {
                        selectNode(clickedNode);
                    }
                }
            } else if (!isCPressed) {
                deselectNode();
            }
        });

        function selectNode(node) {
            if (state.selectedNodeId !== null) {
                deselectNode();
            }
            state.selectedNodeId = node.userData.id;
            node.userData.baseScale = 1.8;
            node.scale.setScalar(1.8);
            node.add(selectionGlow);
            document.getElementById('stat-selected').innerText = state.selectedNodeId;
        }

        function deselectNode() {
            if (state.selectedNodeId !== null) {
                const prevNode = nodes[state.selectedNodeId];
                prevNode.userData.baseScale = 1.0;
                prevNode.scale.setScalar(1.0);
                prevNode.remove(selectionGlow);
                state.selectedNodeId = null;
                document.getElementById('stat-selected').innerText = 'None';
            }
        }

        // --- Player Filter Logic ---
        for (let i = 0; i < 4; i++) {
            document.getElementById(`btn-p${i+1}`).addEventListener('click', (e) => {
                state.playerVisibility[i] = !state.playerVisibility[i];
                e.target.classList.toggle('active', state.playerVisibility[i]);
                
                let vCount = 0;
                nodes.forEach(node => {
                    if (node.userData.playerId === i) {
                        node.visible = state.playerVisibility[i];
                        if (!node.visible && state.selectedNodeId === node.userData.id) {
                            deselectNode();
                        }
                    }
                    if (node.visible) vCount++;
                });
                state.visibleNodeCount = vCount;
                updateLines();
            });
        }

        // --- Heatmap Logic ---
        function updateHeatmap() {
            if (!state.heatmapMode) {
                nodes.forEach(node => {
                    node.material.color.copy(node.userData.baseColor);
                    node.material.emissive.copy(node.userData.baseColor);
                });
                return;
            }

            // Calculate connections per node
            const counts = new Array(12).fill(0);
            connections.forEach(conn => {
                const [a, b] = conn.split('-').map(Number);
                if (nodes[a].visible && nodes[b].visible) {
                    counts[a]++;
                    counts[b]++;
                }
            });

            const maxPossible = 11; // Max connections a node can have
            const white = new THREE.Color(0xffffff);

            nodes.forEach(node => {
                if (!node.visible) return;
                const id = node.userData.id;
                const ratio = Math.min(counts[id] / (maxPossible * 0.5), 1.0); // Scale up a bit for better visuals
                
                const heatColor = node.userData.baseColor.clone().lerp(white, ratio);
                node.material.color.copy(heatColor);
                node.material.emissive.copy(heatColor);
            });
        }

        // --- Pulse Animation ---
        let pulseTimer = 0;
        const clock = new THREE.Clock();

        function triggerPulse() {
            if (state.pulseActive) return;
            state.pulseActive = true;
            pulseTimer = 1.0;
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Initialize lines
        updateLines();

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();

            controls.update();

            // Auto-rotation
            if (state.autoRotating) {
                nodesGroup.rotation.y += 0.5 * delta;
            }

            // Pulse Animation
            if (state.pulseActive) {
                pulseTimer -= delta;
                if (pulseTimer <= 0) {
                    state.pulseActive = false;
                    pulseTimer = 0;
                    // Reset scales and opacities
                    nodes.forEach(node => {
                        node.scale.setScalar(node.userData.baseScale);
                    });
                    lineMeshes.forEach(line => {
                        line.material.opacity = line.userData.baseOpacity;
                        line.material.color.copy(line.userData.baseColor);
                    });
                } else {
                    // Animate
                    const progress = 1.0 - pulseTimer; // 0 to 1
                    const sinVal = Math.sin(progress * Math.PI); // 0 -> 1 -> 0

                    nodes.forEach(node => {
                        const s = node.userData.baseScale * (1 + 0.3 * sinVal);
                        node.scale.setScalar(s);
                    });

                    const brightWhite = new THREE.Color(0xffffff);
                    lineMeshes.forEach(line => {
                        line.material.opacity = line.userData.baseOpacity + (1.0 - line.userData.baseOpacity) * sinVal;
                        line.material.color.copy(line.userData.baseColor).lerp(brightWhite, sinVal * 0.8);
                    });
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
