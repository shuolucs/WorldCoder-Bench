<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiplayer Brain Connectivity Map</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui-left {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .player-btn {
      border: 2px solid rgba(255,255,255,0.35);
      color: white;
      padding: 8px 12px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      user-select: none;
      box-shadow: 0 0 8px rgba(255,255,255,0.12);
    }

    .player-btn.active {
      border-color: white;
      box-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

    #ui-right {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      text-align: right;
      line-height: 1.6;
      font-size: 16px;
    }

    #ui-bottom {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 18px;
      font-weight: bold;
      padding: 8px 14px;
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
    }

    #help {
      position: absolute;
      left: 12px;
      bottom: 12px;
      z-index: 10;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      background: rgba(0,0,0,0.25);
      padding: 8px 10px;
      border-radius: 6px;
      max-width: 320px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="ui-left">
      <button class="player-btn active" id="btn-p1" style="background:#ff3333;">P1</button>
      <button class="player-btn active" id="btn-p2" style="background:#3333ff;">P2</button>
      <button class="player-btn active" id="btn-p3" style="background:#33ff33; color:#111;">P3</button>
      <button class="player-btn active" id="btn-p4" style="background:#ffff33; color:#111;">P4</button>
    </div>

    <div id="ui-right">
      <div id="connectionsLabel">Connections: 12</div>
      <div id="selectedLabel">Selected: None</div>
    </div>

    <div id="ui-bottom">Normal</div>

    <div id="help">
      Click node: select/deselect<br>
      Press <b>C</b>: toggle connection mode, then click another node<br>
      Press <b>P</b>: pulse animation<br>
      Press <b>R</b>: toggle node network rotation<br>
      Press <b>H</b>: toggle heatmap mode
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.159.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.159.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.159.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 8);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.getElementById("app").appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x334466, 0.4);
    scene.add(ambient);

    const pointLight = new THREE.PointLight(0xffffff, 1.2);
    pointLight.position.set(5, 8, 5);
    scene.add(pointLight);

    const helmetGroup = new THREE.Group();
    scene.add(helmetGroup);

    const nodeNetworkGroup = new THREE.Group();
    scene.add(nodeNetworkGroup);

    const playerColors = [0xff3333, 0x3333ff, 0x33ff33, 0xffff33];
    const playerVisibility = [true, true, true, true];

    const nodes = [];
    const nodeOutlines = [];
    const connectionMap = new Map();
    const connectionObjects = new Map();

    let selectedNode = null;
    let connectionMode = false;
    let autoRotating = false;
    let heatmapMode = false;
    let pulseActive = false;
    let pulseStartTime = 0;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    const clock = new THREE.Clock();

    const connectionsLabel = document.getElementById("connectionsLabel");
    const selectedLabel = document.getElementById("selectedLabel");
    const modeLabel = document.getElementById("ui-bottom");

    const state = {
      helmetLoaded: false,
      nodeCount: 12,
      connectionCount: 12,
      selectedNodeId: null,
      playerVisibility,
      autoRotating: false,
      heatmapMode: false,
      pulseActive: false,
      nodePositions: [],
      connectionsData: [],
      visibleNodeCount: 12
    };
    window.__3D_STATE__ = state;

    function edgeKey(a, b) {
      return a < b ? `${a}-${b}` : `${b}-${a}`;
    }

    function updateState() {
      state.connectionCount = connectionMap.size;
      state.selectedNodeId = selectedNode ? selectedNode.userData.id : null;
      state.autoRotating = autoRotating;
      state.heatmapMode = heatmapMode;
      state.pulseActive = pulseActive;
      state.connectionsData = Array.from(connectionMap.values()).map(v => [v.a, v.b]);
      state.visibleNodeCount = nodes.filter(n => n.visible).length;
      connectionsLabel.textContent = `Connections: ${state.connectionCount}`;
      selectedLabel.textContent = `Selected: ${state.selectedNodeId !== null ? state.selectedNodeId : "None"}`;
      modeLabel.textContent = heatmapMode ? "Heatmap" : "Normal";
    }

    function createNode(id, player, position) {
      const color = playerColors[player];
      const geometry = new THREE.SphereGeometry(0.15, 24, 24);
      const material = new THREE.MeshStandardMaterial({
        color,
        emissive: color,
        emissiveIntensity: 1.2,
        metalness: 0.15,
        roughness: 0.4
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(position);
      mesh.userData = {
        id,
        player,
        baseColor: color,
        baseScale: 1
      };

      const outlineGeo = new THREE.SphereGeometry(0.19, 24, 24);
      const outlineMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.0,
        side: THREE.BackSide
      });
      const outline = new THREE.Mesh(outlineGeo, outlineMat);
      outline.visible = false;
      mesh.add(outline);

      nodeNetworkGroup.add(mesh);
      nodes.push(mesh);
      nodeOutlines.push(outline);
      state.nodePositions.push({ x: position.x, y: position.y, z: position.z });
    }

    function createLineObject(a, b, color, opacity = 0.6) {
      const posA = nodes[a].position;
      const posB = nodes[b].position;
      const geometry = new THREE.BufferGeometry().setFromPoints([posA, posB]);
      const material = new THREE.LineBasicMaterial({
        color,
        transparent: true,
        opacity
      });
      const line = new THREE.Line(geometry, material);
      line.userData = { a, b };
      nodeNetworkGroup.add(line);
      return line;
    }

    function getConnectionColor(a, b) {
      const playerA = nodes[a].userData.player;
      const playerB = nodes[b].userData.player;
      return playerA === playerB ? playerColors[playerA] : 0xffffff;
    }

    function addConnection(a, b) {
      const key = edgeKey(a, b);
      if (connectionMap.has(key) || a === b) return;
      const color = getConnectionColor(a, b);
      const line = createLineObject(a, b, color, 0.6);
      connectionMap.set(key, { a, b });
      connectionObjects.set(key, line);
      updateConnectionVisibility();
      updateHeatmapColors();
      updateState();
    }

    function removeConnection(a, b) {
      const key = edgeKey(a, b);
      if (!connectionMap.has(key)) return;
      const line = connectionObjects.get(key);
      if (line) {
        nodeNetworkGroup.remove(line);
        line.geometry.dispose();
        line.material.dispose();
      }
      connectionMap.delete(key);
      connectionObjects.delete(key);
      updateHeatmapColors();
      updateState();
    }

    function toggleConnection(a, b) {
      const key = edgeKey(a, b);
      if (connectionMap.has(key)) removeConnection(a, b);
      else addConnection(a, b);
    }

    function getConnectionCountForNode(id) {
      let count = 0;
      for (const c of connectionMap.values()) {
        if (c.a === id || c.b === id) count++;
      }
      return count;
    }

    function updateHeatmapColors() {
      let maxCount = 1;
      for (const n of nodes) {
        maxCount = Math.max(maxCount, getConnectionCountForNode(n.userData.id));
      }

      for (const n of nodes) {
        const count = getConnectionCountForNode(n.userData.id);
        const material = n.material;
        const base = new THREE.Color(n.userData.baseColor);

        if (!heatmapMode) {
          material.color.copy(base);
          material.emissive.copy(base);
          material.emissiveIntensity = 1.2;
        } else {
          const t = count / maxCount;
          const heatColor = base.clone().lerp(new THREE.Color(0xffffff), t * 0.85);
          material.color.copy(heatColor);
          material.emissive.copy(heatColor);
          material.emissiveIntensity = 1.0 + t * 1.5;
        }
      }

      for (const [key, line] of connectionObjects.entries()) {
        const { a, b } = connectionMap.get(key);
        const color = getConnectionColor(a, b);
        line.material.color.set(color);
      }
    }

    function selectNode(node) {
      if (selectedNode === node) {
        deselectNode();
        return;
      }

      deselectNode();
      selectedNode = node;
      selectedNode.scale.setScalar(1.8);
      const outline = selectedNode.children[0];
      outline.visible = true;
      outline.material.opacity = 0.9;
      updateState();
    }

    function deselectNode() {
      if (!selectedNode) return;
      selectedNode.scale.setScalar(1);
      const outline = selectedNode.children[0];
      outline.visible = false;
      outline.material.opacity = 0.0;
      selectedNode = null;
      updateState();
    }

    function updateConnectionVisibility() {
      for (const [key, conn] of connectionMap.entries()) {
        const line = connectionObjects.get(key);
        const pa = nodes[conn.a].userData.player;
        const pb = nodes[conn.b].userData.player;
        line.visible = playerVisibility[pa] && playerVisibility[pb];
      }

      nodes.forEach(node => {
        const player = node.userData.player;
        node.visible = playerVisibility[player];
      });

      updateState();
    }

    function triggerPulse() {
      pulseActive = true;
      pulseStartTime = performance.now();
      updateState();
    }

    function setupInitialNodes() {
      const positions = [
        new THREE.Vector3( 2.4,  0.4,  0.6),
        new THREE.Vector3( 1.6,  1.7, -1.0),
        new THREE.Vector3( 2.0, -1.3, -0.8),

        new THREE.Vector3(-2.3,  0.7,  0.4),
        new THREE.Vector3(-1.6,  1.6, -1.1),
        new THREE.Vector3(-2.0, -1.2, -0.9),

        new THREE.Vector3( 0.5,  2.2,  1.1),
        new THREE.Vector3(-0.8,  2.0, -1.2),
        new THREE.Vector3( 1.1,  1.4, -1.8),

        new THREE.Vector3( 0.7, -2.1,  1.2),
        new THREE.Vector3(-1.2, -1.8,  1.4),
        new THREE.Vector3( 0.1, -2.4, -0.8)
      ];

      for (let i = 0; i < 12; i++) {
        const player = Math.floor(i / 3);
        createNode(i, player, positions[i]);
      }

      const initialTriangles = [
        [0,1],[1,2],[2,0],
        [3,4],[4,5],[5,3],
        [6,7],[7,8],[8,6],
        [9,10],[10,11],[11,9]
      ];

      initialTriangles.forEach(([a,b]) => addConnection(a,b));
      updateState();
    }

    function loadHelmet() {
      const loader = new GLTFLoader();
      loader.load(
        "https://threejs.org/examples/models/gltf/DamagedHelmet/glTF-Binary/DamagedHelmet.glb",
        (gltf) => {
          const model = gltf.scene;
          model.scale.setScalar(1.5);
          model.position.set(0, 0, 0);
          helmetGroup.add(model);
          state.helmetLoaded = true;
        },
        undefined,
        () => {
          const fallback = new THREE.Mesh(
            new THREE.IcosahedronGeometry(1.0, 1),
            new THREE.MeshStandardMaterial({
              color: 0x666688,
              metalness: 0.7,
              roughness: 0.35
            })
          );
          fallback.scale.setScalar(1.5);
          helmetGroup.add(fallback);
          state.helmetLoaded = false;
        }
      );
    }

    function onPointerClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(nodes.filter(n => n.visible), false);
      if (intersects.length === 0) return;

      const clickedNode = intersects[0].object;

      if (connectionMode && selectedNode && clickedNode !== selectedNode) {
        toggleConnection(selectedNode.userData.id, clickedNode.userData.id);
        connectionMode = false;
        return;
      }

      selectNode(clickedNode);
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();

      if (key === "c") {
        if (selectedNode) connectionMode = true;
      } else if (key === "p") {
        triggerPulse();
      } else if (key === "r") {
        autoRotating = !autoRotating;
        updateState();
      } else if (key === "h") {
        heatmapMode = !heatmapMode;
        updateHeatmapColors();
        updateState();
      }
    });

    renderer.domElement.addEventListener("click", onPointerClick);

    function bindPlayerButton(index, id) {
      const btn = document.getElementById(id);
      btn.addEventListener("click", () => {
        playerVisibility[index] = !playerVisibility[index];
        btn.classList.toggle("active", playerVisibility[index]);
        updateConnectionVisibility();

        if (selectedNode && !selectedNode.visible) {
          deselectNode();
        }
      });
    }

    bindPlayerButton(0, "btn-p1");
    bindPlayerButton(1, "btn-p2");
    bindPlayerButton(2, "btn-p3");
    bindPlayerButton(3, "btn-p4");

    setupInitialNodes();
    loadHelmet();
    updateHeatmapColors();
    updateConnectionVisibility();
    updateState();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const now = performance.now();

      controls.update();

      if (autoRotating) {
        nodeNetworkGroup.rotation.y += 0.5 * delta;
      }

      let pulseFactor = 0;
      if (pulseActive) {
        const elapsed = (now - pulseStartTime) / 1000;
        if (elapsed >= 1) {
          pulseActive = false;
          pulseFactor = 0;
          updateState();
        } else {
          pulseFactor = Math.sin(elapsed * Math.PI);
        }
      }

      for (const node of nodes) {
        const isSelected = selectedNode === node;
        const baseScale = isSelected ? 1.8 : 1.0;
        const pulseScale = 1 + pulseFactor * 0.35;
        node.scale.setScalar(baseScale * pulseScale);

        const mat = node.material;
        const baseIntensity = heatmapMode
          ? mat.emissiveIntensity
          : 1.2;
        mat.emissiveIntensity = baseIntensity + pulseFactor * 1.2;
      }

      for (const line of connectionObjects.values()) {
        line.material.opacity = 0.6 + pulseFactor * 0.4;
      }

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
