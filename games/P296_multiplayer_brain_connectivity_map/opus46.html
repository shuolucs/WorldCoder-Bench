<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brain Connectivity Map</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#player-buttons {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 100;
}

.player-btn {
    width: 50px;
    height: 36px;
    border: 2px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 14px;
    color: #fff;
    text-shadow: 0 0 4px rgba(0,0,0,0.8);
    transition: all 0.2s;
}

.player-btn.active {
    border-color: #ffffff;
    box-shadow: 0 0 10px rgba(255,255,255,0.5);
}

.player-btn:hover {
    transform: scale(1.1);
}

#btn-p1 { background: rgba(255, 51, 51, 0.7); }
#btn-p2 { background: rgba(51, 51, 255, 0.7); }
#btn-p3 { background: rgba(51, 255, 51, 0.7); }
#btn-p4 { background: rgba(255, 255, 51, 0.7); color: #333; }

#hud-right {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #ffffff;
    font-size: 16px;
    text-align: right;
    z-index: 100;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
}

#hud-right div {
    margin-bottom: 6px;
    background: rgba(10, 10, 26, 0.6);
    padding: 6px 12px;
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
}

#mode-display {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ffffff;
    font-size: 18px;
    z-index: 100;
    background: rgba(10, 10, 26, 0.7);
    padding: 8px 20px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
}

#instructions {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 12px;
    z-index: 100;
    text-align: center;
    white-space: nowrap;
}
</style>
</head>
<body>

<div id="player-buttons">
    <button class="player-btn active" id="btn-p1" onclick="togglePlayer(0)">P1</button>
    <button class="player-btn active" id="btn-p2" onclick="togglePlayer(1)">P2</button>
    <button class="player-btn active" id="btn-p3" onclick="togglePlayer(2)">P3</button>
    <button class="player-btn active" id="btn-p4" onclick="togglePlayer(3)">P4</button>
</div>

<div id="hud-right">
    <div id="connection-count">Connections: 12</div>
    <div id="selected-display">Selected: None</div>
</div>

<div id="mode-display">Normal</div>
<div id="instructions">Click: Select Node | C+Click: Toggle Connection | P: Pulse | R: Rotate | H: Heatmap</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Player colors
const PLAYER_COLORS = [0xff3333, 0x3333ff, 0x33ff33, 0xffff33];
const PLAYER_COLOR_THREE = PLAYER_COLORS.map(c => new THREE.Color(c));

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x334466, 0.4);
scene.add(ambientLight);

const pointLight = new THREE.PointLight(0xffffff, 1.2);
pointLight.position.set(5, 8, 5);
scene.add(pointLight);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Node group (for rotation)
const nodesGroup = new THREE.Group();
scene.add(nodesGroup);

// Connection lines group
const linesGroup = new THREE.Group();
nodesGroup.add(linesGroup);

// State
const state = {
    helmetLoaded: false,
    nodeCount: 12,
    connectionCount: 12,
    selectedNodeId: null,
    playerVisibility: [true, true, true, true],
    autoRotating: false,
    heatmapMode: false,
    pulseActive: false,
    nodePositions: [],
    connectionsData: [],
    visibleNodeCount: 12
};

window.__3D_STATE__ = state;

// Connection mode
let connectMode = false;

// Nodes array
const nodes = [];
const nodeMeshes = [];
const nodeOriginalScales = [];

// Generate node positions in a spherical pattern
function generateNodePositions() {
    const positions = [];
    const radius = 2.5;
    
    // Distribute 12 nodes roughly spherically using fibonacci sphere
    const n = 12;
    const goldenAngle = Math.PI * (3 - Math.sqrt(5));
    
    for (let i = 0; i < n; i++) {
        const y = 1 - (i / (n - 1)) * 2; // y goes from 1 to -1
        const radiusAtY = Math.sqrt(1 - y * y);
        const theta = goldenAngle * i;
        
        const x = Math.cos(theta) * radiusAtY * radius;
        const z = Math.sin(theta) * radiusAtY * radius;
        const yPos = y * radius;
        
        positions.push({ x, y: yPos, z });
    }
    
    return positions;
}

const nodePositions = generateNodePositions();
state.nodePositions = nodePositions.map(p => ({ x: p.x, y: p.y, z: p.z }));

// Create nodes
for (let i = 0; i < 12; i++) {
    const playerId = Math.floor(i / 3);
    const color = PLAYER_COLORS[playerId];
    
    const geometry = new THREE.SphereGeometry(0.15, 32, 32);
    const material = new THREE.MeshStandardMaterial({
        color: color,
        emissive: color,
        emissiveIntensity: 0.6,
        metalness: 0.3,
        roughness: 0.4
    });
    
    const mesh = new THREE.Mesh(geometry, material);
    mesh.position.set(nodePositions[i].x, nodePositions[i].y, nodePositions[i].z);
    mesh.userData = { nodeId: i, playerId: playerId, originalColor: color };
    
    nodesGroup.add(mesh);
    nodes.push({
        id: i,
        playerId: playerId,
        mesh: mesh,
        color: color,
        connections: []
    });
    nodeMeshes.push(mesh);
    nodeOriginalScales.push(1.0);
}

// Connections storage
const connections = new Map(); // key: "a-b" (a < b), value: { line, color, nodeA, nodeB }

function connectionKey(a, b) {
    return `${Math.min(a, b)}-${Math.max(a, b)}`;
}

function addConnection(a, b, color) {
    const key = connectionKey(a, b);
    if (connections.has(key)) return false;
    
    const posA = nodeMeshes[a].position;
    const posB = nodeMeshes[b].position;
    
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array([
        posA.x, posA.y, posA.z,
        posB.x, posB.y, posB.z
    ]);
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    
    const material = new THREE.LineBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.6
    });
    
    const line = new THREE.Line(geometry, material);
    linesGroup.add(line);
    
    connections.set(key, { line, color, nodeA: a, nodeB: b, originalOpacity: 0.6 });
    
    nodes[a].connections.push(b);
    nodes[b].connections.push(a);
    
    updateState();
    return true;
}

function removeConnection(a, b) {
    const key = connectionKey(a, b);
    if (!connections.has(key)) return false;
    
    const conn = connections.get(key);
    linesGroup.remove(conn.line);
    conn.line.geometry.dispose();
    conn.line.material.dispose();
    connections.delete(key);
    
    nodes[a].connections = nodes[a].connections.filter(id => id !== b);
    nodes[b].connections = nodes[b].connections.filter(id => id !== a);
    
    updateState();
    return true;
}

// Initial connections: triangles within each player group
for (let p = 0; p < 4; p++) {
    const base = p * 3;
    const color = PLAYER_COLORS[p];
    addConnection(base, base + 1, color);
    addConnection(base + 1, base + 2, color);
    addConnection(base, base + 2, color);
}

function updateState() {
    state.connectionCount = connections.size;
    state.connectionsData = [];
    connections.forEach((val, key) => {
        state.connectionsData.push([val.nodeA, val.nodeB]);
    });
    
    let visCount = 0;
    for (let i = 0; i < 12; i++) {
        if (nodeMeshes[i].visible) visCount++;
    }
    state.visibleNodeCount = visCount;
    
    document.getElementById('connection-count').textContent = `Connections: ${state.connectionCount}`;
}

// Selection
let selectedNode = null;
let selectionOutline = null;

function createSelectionOutline() {
    const geometry = new THREE.SphereGeometry(0.2, 32, 32);
    const material = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.3,
        side: THREE.BackSide
    });
    selectionOutline = new THREE.Mesh(geometry, material);
    selectionOutline.visible = false;
    nodesGroup.add(selectionOutline);
}
createSelectionOutline();

function selectNode(nodeId) {
    if (selectedNode !== null) {
        // Deselect previous
        nodeMeshes[selectedNode].scale.setScalar(1.0);
    }
    
    if (selectedNode === nodeId) {
        // Deselect
        selectedNode = null;
        selectionOutline.visible = false;
        state.selectedNodeId = null;
        document.getElementById('selected-display').textContent = 'Selected: None';
        return;
    }
    
    selectedNode = nodeId;
    nodeMeshes[nodeId].scale.setScalar(1.8);
    selectionOutline.visible = true;
    selectionOutline.position.copy(nodeMeshes[nodeId].position);
    selectionOutline.scale.setScalar(1.8);
    state.selectedNodeId = nodeId;
    document.getElementById('selected-display').textContent = `Selected: Node ${nodeId}`;
}

// Raycaster
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function onMouseClick(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    
    raycaster.setFromCamera(mouse, camera);
    
    const visibleMeshes = nodeMeshes.filter(m => m.visible);
    const intersects = raycaster.intersectObjects(visibleMeshes);
    
    if (intersects.length > 0) {
        const clickedNode = intersects[0].object;
        const nodeId = clickedNode.userData.nodeId;
        
        if (connectMode && selectedNode !== null && selectedNode !== nodeId) {
            // Toggle connection
            const key = connectionKey(selectedNode, nodeId);
            if (connections.has(key)) {
                removeConnection(selectedNode, nodeId);
            } else {
                // Cross-player connections are white, same-player use player color
                const playerA = nodes[selectedNode].playerId;
                const playerB = nodes[nodeId].playerId;
                const color = (playerA === playerB) ? PLAYER_COLORS[playerA] : 0xffffff;
                addConnection(selectedNode, nodeId, color);
            }
            connectMode = false;
            if (state.heatmapMode) updateHeatmap();
        } else {
            selectNode(nodeId);
        }
    } else {
        // Click on empty space - deselect
        if (selectedNode !== null && !connectMode) {
            nodeMeshes[selectedNode].scale.setScalar(1.0);
            selectedNode = null;
            selectionOutline.visible = false;
            state.selectedNodeId = null;
            document.getElementById('selected-display').textContent = 'Selected: None';
        }
        connectMode = false;
    }
}

renderer.domElement.addEventListener('click', onMouseClick);

// Keyboard
document.addEventListener('keydown', (event) => {
    const key = event.key.toLowerCase();
    
    if (key === 'c') {
        if (selectedNode !== null) {
            connectMode = true;
        }
    }
    
    if (key === 'p') {
        triggerPulse();
    }
    
    if (key === 'r') {
        state.autoRotating = !state.autoRotating;
    }
    
    if (key === 'h') {
        state.heatmapMode = !state.heatmapMode;
        document.getElementById('mode-display').textContent = state.heatmapMode ? 'Heatmap' : 'Normal';
        if (state.heatmapMode) {
            updateHeatmap();
        } else {
            resetNodeColors();
        }
    }
});

// Player visibility toggle
window.togglePlayer = function(playerId) {
    state.playerVisibility[playerId] = !state.playerVisibility[playerId];
    const visible = state.playerVisibility[playerId];
    
    const btn = document.getElementById(`btn-p${playerId + 1}`);
    if (visible) {
        btn.classList.add('active');
    } else {
        btn.classList.remove('active');
    }
    
    // Toggle node visibility
    for (let i = playerId * 3; i < playerId * 3 + 3; i++) {
        nodeMeshes[i].visible = visible;
    }
    
    // Toggle connection visibility
    connections.forEach((conn, key) => {
        const playerA = nodes[conn.nodeA].playerId;
        const playerB = nodes[conn.nodeB].playerId;
        
        // A connection is visible only if both its nodes' players are visible
        const shouldBeVisible = state.playerVisibility[playerA] && state.playerVisibility[playerB];
        conn.line.visible = shouldBeVisible;
    });
    
    // Deselect if selected node becomes hidden
    if (selectedNode !== null) {
        const selPlayer = nodes[selectedNode].playerId;
        if (!state.playerVisibility[selPlayer]) {
            nodeMeshes[selectedNode].scale.setScalar(1.0);
            selectedNode = null;
            selectionOutline.visible = false;
            state.selectedNodeId = null;
            document.getElementById('selected-display').textContent = 'Selected: None';
        }
    }
    
    updateState();
};

// Pulse animation
let pulseStartTime = 0;
const PULSE_DURATION = 1.0;

function triggerPulse() {
    if (state.pulseActive) return;
    state.pulseActive = true;
    pulseStartTime = performance.now() / 1000;
}

function updatePulse(time) {
    if (!state.pulseActive) return;
    
    const elapsed = time - pulseStartTime;
    if (elapsed > PULSE_DURATION) {
        state.pulseActive = false;
        // Reset
        for (let i = 0; i < 12; i++) {
            if (selectedNode === i) {
                nodeMeshes[i].scale.setScalar(1.8);
            } else {
                nodeMeshes[i].scale.setScalar(1.0);
            }
        }
        connections.forEach((conn) => {
            conn.line.material.opacity = conn.originalOpacity;
        });
        return;
    }
    
    const t = elapsed / PULSE_DURATION;
    const pulse = Math.sin(t * Math.PI); // 0 -> 1 -> 0
    
    for (let i = 0; i < 12; i++) {
        if (!nodeMeshes[i].visible) continue;
        const baseScale = (selectedNode === i) ? 1.8 : 1.0;
        nodeMeshes[i].scale.setScalar(baseScale + pulse * 0.5);
    }
    
    connections.forEach((conn) => {
        if (!conn.line.visible) return;
        conn.line.material.opacity = 0.6 + pulse * 0.4;
    });
}

// Heatmap
function updateHeatmap() {
    let maxConn = 0;
    for (let i = 0; i < 12; i++) {
        if (nodes[i].connections.length > maxConn) maxConn = nodes[i].connections.length;
    }
    if (maxConn === 0) maxConn = 1;
    
    for (let i = 0; i < 12; i++) {
        const ratio = nodes[i].connections.length / maxConn;
        const baseColor = new THREE.Color(nodes[i].color);
        const white = new THREE.Color(0xffffff);
        const blended = baseColor.clone().lerp(white, ratio);
        
        nodeMeshes[i].material.color.copy(blended);
        nodeMeshes[i].material.emissive.copy(blended);
        nodeMeshes[i].material.emissiveIntensity = 0.4 + ratio * 0.8;
    }
}

function resetNodeColors() {
    for (let i = 0; i < 12; i++) {
        const color = new THREE.Color(nodes[i].color);
        nodeMeshes[i].material.color.copy(color);
        nodeMeshes[i].material.emissive.copy(color);
        nodeMeshes[i].material.emissiveIntensity = 0.6;
    }
}

// Update connection line positions (for when nodes rotate)
function updateConnectionLines() {
    connections.forEach((conn) => {
        const posA = new THREE.Vector3();
        const posB = new THREE.Vector3();
        nodeMeshes[conn.nodeA].getWorldPosition(posA);
        nodeMeshes[conn.nodeB].getWorldPosition(posB);
        
        // Convert to local space of linesGroup
        linesGroup.worldToLocal(posA);
        linesGroup.worldToLocal(posB);
        
        const positions = conn.line.geometry.attributes.position.array;
        positions[0] = posA.x; positions[1] = posA.y; positions[2] = posA.z;
        positions[3] = posB.x; positions[4] = posB.y; positions[5] = posB.z;
        conn.line.geometry.attributes.position.needsUpdate = true;
    });
}

// Load helmet
const loader = new GLTFLoader();
loader.load(
    'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/DamagedHelmet/glTF-Binary/DamagedHelmet.glb',
    (gltf) => {
        const helmet = gltf.scene;
        helmet.scale.setScalar(1.5);
        helmet.position.set(0, 0, 0);
        scene.add(helmet);
        state.helmetLoaded = true;
    },
    undefined,
    (error) => {
        console.warn('Could not load DamagedHelmet.glb, using placeholder', error);
        // Create a placeholder
        const geo = new THREE.IcosahedronGeometry(1.2, 2);
        const mat = new THREE.MeshStandardMaterial({
            color: 0x555577,
            metalness: 0.8,
            roughness: 0.2,
            wireframe: false
        });
        const placeholder = new THREE.Mesh(geo, mat);
        placeholder.scale.setScalar(1.5);
        scene.add(placeholder);
        state.helmetLoaded = true;
    }
);

// Add some ambient particles for atmosphere
const particleCount = 200;
const particleGeometry = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 15;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 15;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 15;
}
particleGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMaterial = new THREE.PointsMaterial({
    color: 0x445566,
    size: 0.03,
    transparent: true,
    opacity: 0.5
});
const particles = new THREE.Points(particleGeometry, particleMaterial);
scene.add(particles);

// Animation loop
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    const time = performance.now() / 1000;
    const delta = clock.getDelta();
    
    controls.update();
    
    // Auto rotation
    if (state.autoRotating) {
        // Rotate only the nodes (not the helmet)
        // We need to rotate nodes around Y axis
        for (let i = 0; i < 12; i++) {
            const pos = nodeMeshes[i].position;
            const angle = 0.5 * delta;
            const cosA = Math.cos(angle);
            const sinA = Math.sin(angle);
            const x = pos.x * cosA - pos.z * sinA;
            const z = pos.x * sinA + pos.z * cosA;
            pos.x = x;
            pos.z = z;
        }
        
        // Update state positions
        for (let i = 0; i < 12; i++) {
            state.nodePositions[i] = {
                x: nodeMeshes[i].position.x,
                y: nodeMeshes[i].position.y,
                z: nodeMeshes[i].position.z
            };
        }
        
        // Update selection outline position
        if (selectedNode !== null && selectionOutline.visible) {
            selectionOutline.position.copy(nodeMeshes[selectedNode].position);
        }
        
        updateConnectionLines();
    }
    
    // Pulse
    updatePulse(time);
    
    // Node glow animation (subtle breathing)
    for (let i = 0; i < 12; i++) {
        if (!state.heatmapMode) {
            const breathe = 0.5 + 0.15 * Math.sin(time * 2 + i * 0.5);
            nodeMeshes[i].material.emissiveIntensity = breathe;
        }
    }
    
    // Selection outline pulse
    if (selectionOutline.visible) {
        selectionOutline.material.opacity = 0.2 + 0.15 * Math.sin(time * 4);
        selectionOutline.scale.setScalar(1.8 + 0.1 * Math.sin(time * 3));
    }
    
    renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// Initialize state
updateState();
</script>
</body>
</html>
