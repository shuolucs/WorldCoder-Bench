<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Drone Assembly Experience</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Arial, sans-serif; }
canvas { display: block; }

#ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
}

#progressDisplay {
    position: absolute;
    top: 20px; left: 20px;
    color: #fff;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(0,150,255,0.5);
}

#speedDisplay {
    position: absolute;
    top: 20px; right: 20px;
    color: #fff;
    font-size: 18px;
    text-shadow: 0 0 10px rgba(0,150,255,0.5);
}

#partsCount {
    position: absolute;
    top: 50px; left: 20px;
    color: #aaf;
    font-size: 16px;
}

#completeBanner {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #0f0;
    font-size: 36px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(0,255,0,0.8), 0 0 40px rgba(0,255,0,0.4);
    display: none;
    animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
}

#controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    pointer-events: all;
}

#timeSlider {
    width: 400px;
    height: 8px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #0af, #f0a);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
}

#timeSlider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    box-shadow: 0 0 10px rgba(0,150,255,0.8);
}

.btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
}

.btn {
    padding: 8px 18px;
    border: 1px solid rgba(100,150,255,0.5);
    background: rgba(20,20,60,0.8);
    color: #aaf;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.2s;
    backdrop-filter: blur(5px);
}

.btn:hover {
    background: rgba(50,50,120,0.9);
    color: #fff;
    border-color: #0af;
    box-shadow: 0 0 15px rgba(0,150,255,0.3);
}

.btn:active {
    transform: scale(0.95);
}

#keyboard-hints {
    position: absolute;
    bottom: 110px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(170,170,255,0.5);
    font-size: 12px;
    text-align: center;
}
</style>
</head>
<body>

<div id="ui-overlay">
    <div id="progressDisplay">Progress: 0%</div>
    <div id="speedDisplay">Speed: 0.005</div>
    <div id="partsCount">Parts Assembled: 0/5</div>
    <div id="completeBanner">🛸 ASSEMBLY COMPLETE 🛸</div>
    <div id="keyboard-hints">Space: Play/Pause | R: Reset | ←→: Step | Scroll to zoom</div>
    <div id="controls">
        <input type="range" id="timeSlider" min="0" max="100" step="1" value="0">
        <div class="btn-row">
            <button class="btn" id="speedDown">◀ Slower</button>
            <button class="btn" id="playBtn">▶ Play</button>
            <button class="btn" id="resetBtn">↺ Reset</button>
            <button class="btn" id="speedUp">Faster ▶</button>
            <button class="btn" id="explodeBtn">💥 Explode</button>
        </div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- State ---
let assemblyProgress = 0.0;
let isPlaying = false;
let playbackSpeed = 0.005;
let isExploded = false;
let modelLoaded = false;

const speeds = [0.001, 0.005, 0.01, 0.02];
let speedIndex = 1;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 12);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 50;
dirLight.shadow.camera.left = -15;
dirLight.shadow.camera.right = 15;
dirLight.shadow.camera.top = 15;
dirLight.shadow.camera.bottom = -15;
scene.add(dirLight);

// Ground plane with grid
const groundGeo = new THREE.PlaneGeometry(20, 20);
const groundMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.8 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = 0;
ground.receiveShadow = true;
scene.add(ground);

const gridHelper = new THREE.GridHelper(20, 20, 0x333366, 0x222244);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// --- Smoothstep ---
function smoothstep(t) {
    t = Math.max(0, Math.min(1, t));
    return t * t * (3 - 2 * t);
}

function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
}

// --- Part definitions ---
const partDefs = [
    { name: 'chassis', startPos: new THREE.Vector3(0, 6, 0), endPos: new THREE.Vector3(0, 2, 0), timeStart: 0.0, timeEnd: 0.4 },
    { name: 'rotorA', startPos: new THREE.Vector3(-6, 6, 0), endPos: new THREE.Vector3(-1.5, 2.5, 1.5), timeStart: 0.2, timeEnd: 0.5 },
    { name: 'rotorB', startPos: new THREE.Vector3(6, 6, 0), endPos: new THREE.Vector3(1.5, 2.5, 1.5), timeStart: 0.3, timeEnd: 0.6 },
    { name: 'rotorC', startPos: new THREE.Vector3(-6, 6, -4), endPos: new THREE.Vector3(-1.5, 2.5, -1.5), timeStart: 0.5, timeEnd: 0.8 },
    { name: 'rotorD', startPos: new THREE.Vector3(6, 6, -4), endPos: new THREE.Vector3(1.5, 2.5, -1.5), timeStart: 0.6, timeEnd: 1.0 },
];

const parts = {};
const propellers = [];

// --- Create Rotor ---
function createRotor(color) {
    const group = new THREE.Group();

    // Cylinder body
    const cylGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.08, 32);
    const cylMat = new THREE.MeshStandardMaterial({ color: color, metalness: 0.6, roughness: 0.3 });
    const cyl = new THREE.Mesh(cylGeo, cylMat);
    cyl.castShadow = true;
    group.add(cyl);

    // Motor hub
    const hubGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.15, 16);
    const hubMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8, roughness: 0.2 });
    const hub = new THREE.Mesh(hubGeo, hubMat);
    hub.position.y = 0.1;
    hub.castShadow = true;
    group.add(hub);

    // Propeller torus
    const torusGeo = new THREE.TorusGeometry(0.5, 0.05, 8, 32);
    const torusMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.5, roughness: 0.4, transparent: true, opacity: 0.8 });
    const torus = new THREE.Mesh(torusGeo, torusMat);
    torus.rotation.x = Math.PI / 2;
    torus.position.y = 0.2;
    torus.castShadow = true;
    group.add(torus);

    propellers.push(torus);

    return group;
}

// Create rotors
const rotorColors = { rotorA: 0xff4444, rotorB: 0x44ff44, rotorC: 0x4444ff, rotorD: 0xffff44 };
for (const [name, color] of Object.entries(rotorColors)) {
    const rotor = createRotor(color);
    const def = partDefs.find(p => p.name === name);
    rotor.position.copy(def.startPos);
    scene.add(rotor);
    parts[name] = rotor;
}

// --- Load Chassis (horse.glb) ---
let chassisGroup = new THREE.Group();
chassisGroup.position.copy(partDefs[0].startPos);
scene.add(chassisGroup);
parts['chassis'] = chassisGroup;

// Create a fallback chassis in case model doesn't load
function createFallbackChassis() {
    const group = new THREE.Group();

    // Main body
    const bodyGeo = new THREE.BoxGeometry(1.5, 0.4, 2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x6644aa, metalness: 0.5, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.castShadow = true;
    group.add(body);

    // Front nose
    const noseGeo = new THREE.ConeGeometry(0.4, 0.8, 8);
    const noseMat = new THREE.MeshStandardMaterial({ color: 0x8866cc, metalness: 0.5, roughness: 0.3 });
    const nose = new THREE.Mesh(noseGeo, noseMat);
    nose.rotation.x = Math.PI / 2;
    nose.position.z = 1.4;
    nose.castShadow = true;
    group.add(nose);

    // Arms
    const armGeo = new THREE.BoxGeometry(3.5, 0.1, 0.15);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x444466, metalness: 0.7, roughness: 0.2 });
    const armFront = new THREE.Mesh(armGeo, armMat);
    armFront.position.set(0, 0.1, 0.6);
    armFront.castShadow = true;
    group.add(armFront);

    const armBack = new THREE.Mesh(armGeo, armMat);
    armBack.position.set(0, 0.1, -0.6);
    armBack.castShadow = true;
    group.add(armBack);

    // Camera gimbal
    const gimbalGeo = new THREE.SphereGeometry(0.2, 16, 16);
    const gimbalMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.1 });
    const gimbal = new THREE.Mesh(gimbalGeo, gimbalMat);
    gimbal.position.set(0, -0.3, 0.5);
    gimbal.castShadow = true;
    group.add(gimbal);

    return group;
}

const loader = new GLTFLoader();
loader.load(
    'horse.glb',
    (gltf) => {
        const model = gltf.scene;
        // Compute bounding box to scale appropriately
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 2.0 / maxDim;
        model.scale.set(scale, scale, scale);

        // Center the model
        const center = new THREE.Vector3();
        box.getCenter(center);
        model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);

        model.traverse((child) => {
            if (child.isMesh) {
                child.castShadow = true;
                child.receiveShadow = true;
            }
        });

        chassisGroup.add(model);
        modelLoaded = true;
        console.log('horse.glb loaded successfully as drone chassis');
    },
    undefined,
    (error) => {
        console.warn('Could not load horse.glb, using fallback chassis:', error);
        const fallback = createFallbackChassis();
        chassisGroup.add(fallback);
        modelLoaded = true;
    }
);

// --- UI Elements ---
const timeSlider = document.getElementById('timeSlider');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const speedUpBtn = document.getElementById('speedUp');
const speedDownBtn = document.getElementById('speedDown');
const explodeBtn = document.getElementById('explodeBtn');
const progressDisplay = document.getElementById('progressDisplay');
const speedDisplay = document.getElementById('speedDisplay');
const partsCountDisplay = document.getElementById('partsCount');
const completeBanner = document.getElementById('completeBanner');

// --- Event Handlers ---
timeSlider.addEventListener('input', (e) => {
    assemblyProgress = parseInt(e.target.value) / 100;
    if (assemblyProgress < 1.0) {
        isExploded = false;
    }
});

playBtn.addEventListener('click', () => {
    isPlaying = !isPlaying;
    playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
});

resetBtn.addEventListener('click', () => {
    assemblyProgress = 0.0;
    isPlaying = false;
    isExploded = false;
    playBtn.textContent = '▶ Play';
    timeSlider.value = 0;
});

speedUpBtn.addEventListener('click', () => {
    speedIndex = Math.min(speedIndex + 1, speeds.length - 1);
    playbackSpeed = speeds[speedIndex];
    speedDisplay.textContent = `Speed: ${playbackSpeed.toFixed(3)}`;
});

speedDownBtn.addEventListener('click', () => {
    speedIndex = Math.max(speedIndex - 1, 0);
    playbackSpeed = speeds[speedIndex];
    speedDisplay.textContent = `Speed: ${playbackSpeed.toFixed(3)}`;
});

explodeBtn.addEventListener('click', () => {
    if (assemblyProgress >= 0.99) {
        isExploded = !isExploded;
        explodeBtn.textContent = isExploded ? '🔧 Assemble' : '💥 Explode';
    }
});

// Keyboard
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.code) {
        case 'Space':
            e.preventDefault();
            isPlaying = !isPlaying;
            playBtn.textContent = isPlaying ? '⏸ Pause' : '▶ Play';
            break;
        case 'KeyR':
            assemblyProgress = 0.0;
            isPlaying = false;
            isExploded = false;
            playBtn.textContent = '▶ Play';
            timeSlider.value = 0;
            break;
        case 'ArrowLeft':
            e.preventDefault();
            assemblyProgress = clamp(assemblyProgress - 0.02, 0, 1);
            if (assemblyProgress < 1.0) isExploded = false;
            break;
        case 'ArrowRight':
            e.preventDefault();
            assemblyProgress = clamp(assemblyProgress + 0.02, 0, 1);
            break;
    }
});

// Resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// --- State Object ---
window.__3D_STATE__ = {
    assemblyProgress: 0,
    isPlaying: false,
    playbackSpeed: 0.005,
    partsAssembled: 0,
    isExploded: false,
    chassisPosition: { x: 0, y: 0, z: 0 },
    rotorAPosition: { x: 0, y: 0, z: 0 },
    rotorBPosition: { x: 0, y: 0, z: 0 },
    rotorCPosition: { x: 0, y: 0, z: 0 },
    rotorDPosition: { x: 0, y: 0, z: 0 },
    propellersSpinning: false,
    assemblyComplete: false,
    modelLoaded: false,
};

// --- Particle effects ---
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpeeds = [];
for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 20;
    particlePositions[i * 3 + 1] = Math.random() * 10;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 20;
    particleSpeeds.push(0.005 + Math.random() * 0.02);
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({ color: 0x4466ff, size: 0.05, transparent: true, opacity: 0.4 });
const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

// --- Animation Loop ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const delta = clock.getDelta();

    // Auto-play
    if (isPlaying) {
        assemblyProgress = clamp(assemblyProgress + playbackSpeed, 0, 1);
        if (assemblyProgress >= 1.0) {
            isPlaying = false;
            playBtn.textContent = '▶ Play';
        }
    }

    // Sync slider
    timeSlider.value = Math.round(assemblyProgress * 100);

    // Update parts positions
    let partsAssembled = 0;

    for (const def of partDefs) {
        const part = parts[def.name];
        if (!part) continue;

        // Calculate local progress
        let localProgress;
        if (def.timeEnd <= def.timeStart) {
            localProgress = assemblyProgress >= def.timeEnd ? 1 : 0;
        } else {
            localProgress = clamp((assemblyProgress - def.timeStart) / (def.timeEnd - def.timeStart), 0, 1);
        }
        const easedProgress = smoothstep(localProgress);

        // Lerp position
        const targetPos = new THREE.Vector3().lerpVectors(def.startPos, def.endPos, easedProgress);

        // Explode view
        if (isExploded && assemblyProgress >= 0.99 && def.name !== 'chassis') {
            const dir = new THREE.Vector3().subVectors(def.endPos, partDefs[0].endPos).normalize();
            targetPos.add(dir.multiplyScalar(2.0));
        }

        // Ensure valid numbers
        part.position.x = isFinite(targetPos.x) ? targetPos.x : 0;
        part.position.y = isFinite(targetPos.y) ? targetPos.y : 0;
        part.position.z = isFinite(targetPos.z) ? targetPos.z : 0;

        if (localProgress >= 0.99) partsAssembled++;
    }

    const assemblyComplete = partsAssembled >= 5;
    const propellersSpinning = assemblyComplete && !isExploded;

    // Spin propellers
    for (const prop of propellers) {
        if (propellersSpinning) {
            prop.rotation.z += 10 * delta;
        }
    }

    // Floating animation for unassembled parts
    const time = clock.elapsedTime;
    for (const def of partDefs) {
        const part = parts[def.name];
        if (!part) continue;
        const localProgress = clamp((assemblyProgress - def.timeStart) / (def.timeEnd - def.timeStart), 0, 1);
        if (localProgress < 0.01) {
            part.position.y += Math.sin(time * 2 + partDefs.indexOf(def)) * 0.003;
        }
    }

    // Update particles
    const positions = particleGeo.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += particleSpeeds[i];
        if (positions[i * 3 + 1] > 10) {
            positions[i * 3 + 1] = 0;
        }
    }
    particleGeo.attributes.position.needsUpdate = true;

    // Update UI
    progressDisplay.textContent = `Progress: ${Math.round(assemblyProgress * 100)}%`;
    partsCountDisplay.textContent = `Parts Assembled: ${partsAssembled}/5`;
    completeBanner.style.display = assemblyComplete ? 'block' : 'none';

    // Update state
    const state = window.__3D_STATE__;
    state.assemblyProgress = assemblyProgress;
    state.isPlaying = isPlaying;
    state.playbackSpeed = playbackSpeed;
    state.partsAssembled = partsAssembled;
    state.isExploded = isExploded;
    state.propellersSpinning = propellersSpinning;
    state.assemblyComplete = assemblyComplete;
    state.modelLoaded = modelLoaded;

    const posNames = ['chassis', 'rotorA', 'rotorB', 'rotorC', 'rotorD'];
    const stateNames = ['chassisPosition', 'rotorAPosition', 'rotorBPosition', 'rotorCPosition', 'rotorDPosition'];
    for (let i = 0; i < posNames.length; i++) {
        const p = parts[posNames[i]];
        if (p) {
            state[stateNames[i]] = {
                x: isFinite(p.position.x) ? p.position.x : 0,
                y: isFinite(p.position.y) ? p.position.y : 0,
                z: isFinite(p.position.z) ? p.position.z : 0
            };
        }
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
