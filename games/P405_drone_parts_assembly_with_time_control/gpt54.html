<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Drone Parts Assembly Timeline</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: Arial, sans-serif;
      color: white;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      font-size: 18px;
      line-height: 1.4;
    }

    #topLeft {
      top: 16px;
      left: 16px;
      text-align: left;
    }

    #topRight {
      top: 16px;
      right: 16px;
      text-align: right;
    }

    #completeBanner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      padding: 16px 28px;
      background: rgba(0, 255, 150, 0.15);
      border: 2px solid #00ffaa;
      border-radius: 12px;
      color: #00ffaa;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
      display: none;
      pointer-events: none;
      box-shadow: 0 0 20px rgba(0,255,170,0.25);
    }

    #controls {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 15;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      background: rgba(0,0,0,0.35);
      padding: 12px 16px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }

    #timeSlider {
      width: 420px;
      max-width: 80vw;
    }

    .buttonRow {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background: #24243e;
      color: white;
      border: 1px solid #4b4b7a;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      background: #2f2f52;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="topLeft" class="hud">
      <div id="progressDisplay">Progress: 0%</div>
      <div id="partsCount">Parts Assembled: 0/5</div>
    </div>

    <div id="topRight" class="hud">
      <div id="speedDisplay">Speed: 0.005</div>
    </div>

    <div id="completeBanner">ASSEMBLY COMPLETE</div>

    <div id="controls">
      <input id="timeSlider" type="range" min="0" max="100" step="1" value="0" />
      <div class="buttonRow">
        <button id="playBtn">Play</button>
        <button id="resetBtn">Reset</button>
        <button id="speedDown">Speed -</button>
        <button id="speedUp">Speed +</button>
        <button id="explodeBtn">Explode</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const progressDisplay = document.getElementById('progressDisplay');
    const speedDisplay = document.getElementById('speedDisplay');
    const partsCountDisplay = document.getElementById('partsCount');
    const completeBanner = document.getElementById('completeBanner');

    const timeSlider = document.getElementById('timeSlider');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');
    const speedUpBtn = document.getElementById('speedUp');
    const speedDownBtn = document.getElementById('speedDown');
    const explodeBtn = document.getElementById('explodeBtn');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#1a1a2e');

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 12);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 2, 0);
    controls.enableDamping = true;

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.0);
    directionalLight.position.set(5, 10, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.set(2048, 2048);
    directionalLight.shadow.camera.left = -15;
    directionalLight.shadow.camera.right = 15;
    directionalLight.shadow.camera.top = 15;
    directionalLight.shadow.camera.bottom = -15;
    directionalLight.shadow.camera.near = 0.5;
    directionalLight.shadow.camera.far = 50;
    scene.add(directionalLight);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(20, 20),
      new THREE.MeshStandardMaterial({
        color: 0x111111,
        metalness: 0.1,
        roughness: 0.9
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = 0;
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(20, 20, 0x444466, 0x222233);
    grid.position.y = 0.001;
    scene.add(grid);

    const speedOptions = [0.001, 0.005, 0.01, 0.02];
    let speedIndex = 1;

    let assemblyProgress = 0.0;
    let isPlaying = false;
    let isExploded = false;
    let modelLoaded = false;

    const clock = new THREE.Clock();

    function clamp01(v) {
      return Math.min(1, Math.max(0, Number.isFinite(v) ? v : 0));
    }

    function smoothstep01(t) {
      t = clamp01(t);
      return t * t * (3 - 2 * t);
    }

    function safeVec(x, y, z) {
      return new THREE.Vector3(
        Number.isFinite(x) ? x : 0,
        Number.isFinite(y) ? y : 0,
        Number.isFinite(z) ? z : 0
      );
    }

    function lerpVec(a, b, t) {
      return new THREE.Vector3().copy(a).lerp(b, clamp01(t));
    }

    function rangedProgress(globalProgress, start, end) {
      if (end <= start) return 1;
      const t = (globalProgress - start) / (end - start);
      return smoothstep01(t);
    }

    function toPlainPosition(v) {
      return {
        x: Number.isFinite(v.x) ? v.x : 0,
        y: Number.isFinite(v.y) ? v.y : 0,
        z: Number.isFinite(v.z) ? v.z : 0
      };
    }

    const chassisStart = safeVec(0, 6, 0);
    const chassisFinal = safeVec(0, 2, 0);

    const rotorAStart = safeVec(-6, 6, 0);
    const rotorAFinal = safeVec(-1.5, 2.5, 1.5);

    const rotorBStart = safeVec(6, 6, 0);
    const rotorBFinal = safeVec(1.5, 2.5, 1.5);

    const rotorCStart = safeVec(-6, 6, -4);
    const rotorCFinal = safeVec(-1.5, 2.5, -1.5);

    const rotorDStart = safeVec(6, 6, -4);
    const rotorDFinal = safeVec(1.5, 2.5, -1.5);

    function createRotor(color) {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6, 0.6, 0.08, 32),
        new THREE.MeshStandardMaterial({ color, metalness: 0.3, roughness: 0.4 })
      );
      body.castShadow = true;
      body.receiveShadow = true;
      group.add(body);

      const propeller = new THREE.Mesh(
        new THREE.TorusGeometry(0.5, 0.05, 12, 48),
        new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.2, roughness: 0.5 })
      );
      propeller.position.y = 0.08;
      propeller.rotation.x = Math.PI / 2;
      propeller.castShadow = true;
      propeller.receiveShadow = true;
      group.add(propeller);

      return { group, propeller };
    }

    const rotorA = createRotor('#ff4444');
    const rotorB = createRotor('#44ff44');
    const rotorC = createRotor('#4444ff');
    const rotorD = createRotor('#ffff44');

    scene.add(rotorA.group, rotorB.group, rotorC.group, rotorD.group);

    rotorA.group.position.copy(rotorAStart);
    rotorB.group.position.copy(rotorBStart);
    rotorC.group.position.copy(rotorCStart);
    rotorD.group.position.copy(rotorDStart);

    let chassisGroup = new THREE.Group();
    scene.add(chassisGroup);
    chassisGroup.position.copy(chassisStart);

    const loader = new GLTFLoader();
    loader.load(
      'horse.glb',
      (gltf) => {
        const model = gltf.scene;

        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);

        const targetSize = new THREE.Vector3(2, 1, 2);
        const sx = size.x > 0 ? targetSize.x / size.x : 1;
        const sy = size.y > 0 ? targetSize.y / size.y : 1;
        const sz = size.z > 0 ? targetSize.z / size.z : 1;
        const uniformScale = Math.min(sx, sy, sz);

        model.scale.setScalar(Number.isFinite(uniformScale) ? uniformScale : 1);

        const centeredBox = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        centeredBox.getCenter(center);
        model.position.sub(center);

        model.traverse((child) => {
          if (child.isMesh) {
            child.castShadow = true;
            child.receiveShadow = true;
            if (child.material) {
              child.material.metalness = 0.25;
              child.material.roughness = 0.65;
            }
          }
        });

        chassisGroup.add(model);
        modelLoaded = true;
      },
      undefined,
      (err) => {
        console.error('Failed to load horse.glb:', err);

        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(2, 1, 2),
          new THREE.MeshStandardMaterial({ color: 0x8888aa, metalness: 0.2, roughness: 0.7 })
        );
        fallback.castShadow = true;
        fallback.receiveShadow = true;
        chassisGroup.add(fallback);
        modelLoaded = false;
      }
    );

    function getExplodedPosition(finalPos) {
      const center = chassisFinal.clone();
      const dir = finalPos.clone().sub(center);
      return finalPos.clone().add(dir);
    }

    function updateAssembly() {
      assemblyProgress = clamp01(assemblyProgress);

      const chassisT = rangedProgress(assemblyProgress, 0.0, 0.4);
      const rotorAT = rangedProgress(assemblyProgress, 0.2, 0.5);
      const rotorBT = rangedProgress(assemblyProgress, 0.3, 0.6);
      const rotorCT = rangedProgress(assemblyProgress, 0.5, 0.8);
      const rotorDT = rangedProgress(assemblyProgress, 0.6, 1.0);

      let chassisPos = lerpVec(chassisStart, chassisFinal, chassisT);
      let rotorAPos = lerpVec(rotorAStart, rotorAFinal, rotorAT);
      let rotorBPos = lerpVec(rotorBStart, rotorBFinal, rotorBT);
      let rotorCPos = lerpVec(rotorCStart, rotorCFinal, rotorCT);
      let rotorDPos = lerpVec(rotorDStart, rotorDFinal, rotorDT);

      const assemblyComplete = assemblyProgress >= 1.0 - 1e-6;

      if (assemblyComplete && isExploded) {
        chassisPos = getExplodedPosition(chassisFinal);
        rotorAPos = getExplodedPosition(rotorAFinal);
        rotorBPos = getExplodedPosition(rotorBFinal);
        rotorCPos = getExplodedPosition(rotorCFinal);
        rotorDPos = getExplodedPosition(rotorDFinal);
      }

      chassisGroup.position.copy(chassisPos);
      rotorA.group.position.copy(rotorAPos);
      rotorB.group.position.copy(rotorBPos);
      rotorC.group.position.copy(rotorCPos);
      rotorD.group.position.copy(rotorDPos);

      const partsAssembled =
        (chassisT >= 0.99 ? 1 : 0) +
        (rotorAT >= 0.99 ? 1 : 0) +
        (rotorBT >= 0.99 ? 1 : 0) +
        (rotorCT >= 0.99 ? 1 : 0) +
        (rotorDT >= 0.99 ? 1 : 0);

      progressDisplay.textContent = `Progress: ${Math.round(assemblyProgress * 100)}%`;
      speedDisplay.textContent = `Speed: ${speedOptions[speedIndex].toFixed(3)}`;
      partsCountDisplay.textContent = `Parts Assembled: ${partsAssembled}/5`;
      completeBanner.style.display = partsAssembled === 5 ? 'block' : 'none';

      const sliderValue = Math.round(assemblyProgress * 100);
      if (Number(timeSlider.value) !== sliderValue) {
        timeSlider.value = String(sliderValue);
      }

      explodeBtn.textContent = isExploded ? 'Implode' : 'Explode';

      const propellersSpinning = assemblyComplete && !isExploded;

      window.__3D_STATE__ = {
        assemblyProgress,
        isPlaying,
        playbackSpeed: speedOptions[speedIndex],
        partsAssembled,
        isExploded,
        chassisPosition: toPlainPosition(chassisGroup.position),
        rotorAPosition: toPlainPosition(rotorA.group.position),
        rotorBPosition: toPlainPosition(rotorB.group.position),
        rotorCPosition: toPlainPosition(rotorC.group.position),
        rotorDPosition: toPlainPosition(rotorD.group.position),
        propellersSpinning,
        assemblyComplete,
        modelLoaded
      };
    }

    window.__3D_STATE__ = {
      assemblyProgress: 0,
      isPlaying: false,
      playbackSpeed: speedOptions[speedIndex],
      partsAssembled: 0,
      isExploded: false,
      chassisPosition: { x: 0, y: 6, z: 0 },
      rotorAPosition: { x: -6, y: 6, z: 0 },
      rotorBPosition: { x: 6, y: 6, z: 0 },
      rotorCPosition: { x: -6, y: 6, z: -4 },
      rotorDPosition: { x: 6, y: 6, z: -4 },
      propellersSpinning: false,
      assemblyComplete: false,
      modelLoaded: false
    };

    function setPlaying(value) {
      isPlaying = !!value;
      playBtn.textContent = isPlaying ? 'Pause' : 'Play';
    }

    timeSlider.addEventListener('input', () => {
      assemblyProgress = clamp01(Number(timeSlider.value) / 100);
      if (assemblyProgress < 1.0) {
        isExploded = false;
      }
      updateAssembly();
    });

    playBtn.addEventListener('click', () => {
      setPlaying(!isPlaying);
    });

    resetBtn.addEventListener('click', () => {
      assemblyProgress = 0.0;
      isExploded = false;
      setPlaying(false);
      updateAssembly();
    });

    speedUpBtn.addEventListener('click', () => {
      speedIndex = Math.min(speedOptions.length - 1, speedIndex + 1);
      updateAssembly();
    });

    speedDownBtn.addEventListener('click', () => {
      speedIndex = Math.max(0, speedIndex - 1);
      updateAssembly();
    });

    explodeBtn.addEventListener('click', () => {
      if (assemblyProgress >= 1.0 - 1e-6) {
        isExploded = !isExploded;
        updateAssembly();
      }
    });

    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        setPlaying(!isPlaying);
      } else if (e.key === 'r' || e.key === 'R') {
        assemblyProgress = 0.0;
        isExploded = false;
        setPlaying(false);
        updateAssembly();
      } else if (e.key === 'ArrowRight') {
        assemblyProgress = clamp01(assemblyProgress + 0.02);
        if (assemblyProgress < 1.0) isExploded = false;
        updateAssembly();
      } else if (e.key === 'ArrowLeft') {
        assemblyProgress = clamp01(assemblyProgress - 0.02);
        if (assemblyProgress < 1.0) isExploded = false;
        updateAssembly();
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      if (isPlaying) {
        assemblyProgress += speedOptions[speedIndex];
        if (assemblyProgress >= 1.0) {
          assemblyProgress = 1.0;
          setPlaying(false);
        }
      }

      updateAssembly();

      const canSpin =
        window.__3D_STATE__.assemblyComplete &&
        !window.__3D_STATE__.isExploded;

      if (canSpin) {
        const spinAmount = 10 * delta;
        rotorA.propeller.rotation.z += spinAmount;
        rotorB.propeller.rotation.z += spinAmount;
        rotorC.propeller.rotation.z += spinAmount;
        rotorD.propeller.rotation.z += spinAmount;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    updateAssembly();
    animate();
  </script>
</body>
</html>
