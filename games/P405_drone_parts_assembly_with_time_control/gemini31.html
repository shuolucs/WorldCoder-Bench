<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Drone Assembly</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .ui-panel {
            position: absolute;
            background: rgba(15, 15, 30, 0.8);
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            padding: 15px;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        #top-left { top: 20px; left: 20px; }
        #top-right { top: 20px; right: 20px; text-align: right; }
        #bottom-center {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            width: 100%;
            justify-content: center;
        }
        input[type=range] {
            width: 100%;
            cursor: pointer;
            accent-color: #4444ff;
        }
        button {
            background: #2a2a4e;
            color: white;
            border: 1px solid #5a5a8e;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background: #3a3a6e; }
        button:active { background: #1a1a3e; }
        button:disabled {
            background: #1a1a2e;
            color: #555;
            border-color: #333;
            cursor: not-allowed;
        }
        .stat-text { font-size: 1.2rem; font-weight: bold; margin-bottom: 5px; }
        .sub-text { font-size: 0.9rem; color: #aaa; }
        
        #completeBanner {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(90deg, rgba(0,255,0,0) 0%, rgba(0,200,0,0.8) 50%, rgba(0,255,0,0) 100%);
            padding: 20px 100px;
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00ff00;
            pointer-events: none;
            display: none;
            white-space: nowrap;
        }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="loading">Loading Model...</div>

    <div id="top-left" class="ui-panel">
        <div id="progressDisplay" class="stat-text">Progress: 0%</div>
        <div id="partsCount" class="sub-text">Parts Assembled: 0/5</div>
    </div>

    <div id="top-right" class="ui-panel">
        <div id="speedDisplay" class="stat-text">Speed: 0.005</div>
        <div class="sub-text">Space: Play/Pause | R: Reset</div>
        <div class="sub-text">Arrows: Step Progress</div>
    </div>

    <div id="completeBanner">ASSEMBLY COMPLETE</div>

    <div id="bottom-center" class="ui-panel">
        <input type="range" id="timeSlider" min="0" max="100" value="0" step="1">
        <div class="controls-row">
            <button id="playBtn">Play</button>
            <button id="resetBtn">Reset</button>
            <button id="speedDown">Slower</button>
            <button id="speedUp">Faster</button>
            <button id="explodeBtn" disabled>Explode View</button>
        </div>
    </div>

    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            assemblyProgress: 0.0,
            isPlaying: false,
            playbackSpeed: 0.005,
            partsAssembled: 0,
            isExploded: false,
            chassisPosition: { x: 0, y: 0, z: 0 },
            rotorAPosition: { x: 0, y: 0, z: 0 },
            rotorBPosition: { x: 0, y: 0, z: 0 },
            rotorCPosition: { x: 0, y: 0, z: 0 },
            rotorDPosition: { x: 0, y: 0, z: 0 },
            propellersSpinning: false,
            assemblyComplete: false,
            modelLoaded: false
        };

        const speeds = [0.001, 0.005, 0.01, 0.02];
        let currentSpeedIndex = 1;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a2e');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 12);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 2, 0);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- Ground ---
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        grid.position.y = 0.01;
        scene.add(grid);

        // --- Parts Definition ---
        const partsData = [
            { id: 'chassis', start: new THREE.Vector3(0, 6, 0), final: new THREE.Vector3(0, 2, 0), tStart: 0.0, tEnd: 0.4, mesh: new THREE.Group() },
            { id: 'rotorA', start: new THREE.Vector3(-6, 6, 0), final: new THREE.Vector3(-1.5, 2.5, 1.5), tStart: 0.2, tEnd: 0.5, color: 0xff4444 },
            { id: 'rotorB', start: new THREE.Vector3(6, 6, 0), final: new THREE.Vector3(1.5, 2.5, 1.5), tStart: 0.3, tEnd: 0.6, color: 0x44ff44 },
            { id: 'rotorC', start: new THREE.Vector3(-6, 6, -4), final: new THREE.Vector3(-1.5, 2.5, -1.5), tStart: 0.5, tEnd: 0.8, color: 0x4444ff },
            { id: 'rotorD', start: new THREE.Vector3(6, 6, -4), final: new THREE.Vector3(1.5, 2.5, -1.5), tStart: 0.6, tEnd: 1.0, color: 0xffff44 }
        ];

        const propellers = [];

        // Create Rotors
        const cylGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.08, 32);
        const torusGeo = new THREE.TorusGeometry(0.5, 0.05, 16, 32);
        torusGeo.rotateX(Math.PI / 2);

        for (let i = 1; i < partsData.length; i++) {
            const data = partsData[i];
            const group = new THREE.Group();
            
            const mat = new THREE.MeshStandardMaterial({ color: data.color, metalness: 0.3, roughness: 0.4 });
            const cyl = new THREE.Mesh(cylGeo, mat);
            cyl.castShadow = true;
            cyl.receiveShadow = true;
            
            const propMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.8, roughness: 0.2 });
            const prop = new THREE.Mesh(torusGeo, propMat);
            prop.position.y = 0.1;
            prop.castShadow = true;
            
            group.add(cyl);
            group.add(prop);
            
            group.position.copy(data.start);
            scene.add(group);
            
            data.mesh = group;
            propellers.push(prop);
        }

        // Load Chassis (Horse)
        scene.add(partsData[0].mesh);
        partsData[0].mesh.position.copy(partsData[0].start);

        const loader = new GLTFLoader();
        // Using a reliable public URL for horse.glb from three.js examples
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Horse.glb', (gltf) => {
            const model = gltf.scene;
            
            // Center and scale model to fit roughly 2x1x2
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = 2.0 / maxDim;
            model.scale.setScalar(scale);
            
            model.position.sub(center.multiplyScalar(scale));
            
            // Apply material properties for shadows
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    if (child.material) {
                        child.material.metalness = 0.5;
                        child.material.roughness = 0.5;
                        child.material.color.setHex(0x888888);
                    }
                }
            });

            partsData[0].mesh.add(model);
            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
        }, undefined, (error) => {
            console.error("Error loading model:", error);
            // Fallback to a box if loading fails
            const boxGeo = new THREE.BoxGeometry(2, 1, 2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
            const boxMesh = new THREE.Mesh(boxGeo, boxMat);
            boxMesh.castShadow = true;
            partsData[0].mesh.add(boxMesh);
            window.__3D_STATE__.modelLoaded = true;
            document.getElementById('loading').style.display = 'none';
        });

        // --- Math Utilities ---
        function clamp(val, min, max) {
            return Math.max(min, Math.min(max, val));
        }

        function smoothstep(x) {
            if (x <= 0) return 0;
            if (x >= 1) return 1;
            return x * x * (3 - 2 * x);
        }

        // --- UI Elements ---
        const ui = {
            slider: document.getElementById('timeSlider'),
            playBtn: document.getElementById('playBtn'),
            resetBtn: document.getElementById('resetBtn'),
            speedUp: document.getElementById('speedUp'),
            speedDown: document.getElementById('speedDown'),
            explodeBtn: document.getElementById('explodeBtn'),
            progressDisplay: document.getElementById('progressDisplay'),
            speedDisplay: document.getElementById('speedDisplay'),
            partsCount: document.getElementById('partsCount'),
            completeBanner: document.getElementById('completeBanner')
        };

        // --- Interaction Logic ---
        function updateUI() {
            ui.slider.value = (window.__3D_STATE__.assemblyProgress * 100).toFixed(0);
            ui.progressDisplay.innerText = `Progress: ${(window.__3D_STATE__.assemblyProgress * 100).toFixed(0)}%`;
            ui.playBtn.innerText = window.__3D_STATE__.isPlaying ? 'Pause' : 'Play';
            ui.speedDisplay.innerText = `Speed: ${window.__3D_STATE__.playbackSpeed.toFixed(3)}`;
            ui.partsCount.innerText = `Parts Assembled: ${window.__3D_STATE__.partsAssembled}/5`;
            
            if (window.__3D_STATE__.assemblyProgress >= 0.999) {
                ui.explodeBtn.disabled = false;
                ui.completeBanner.style.display = 'block';
            } else {
                ui.explodeBtn.disabled = true;
                window.__3D_STATE__.isExploded = false;
                ui.explodeBtn.innerText = 'Explode View';
                ui.completeBanner.style.display = 'none';
            }
        }

        function setProgress(val) {
            window.__3D_STATE__.assemblyProgress = clamp(val, 0, 1);
            if (window.__3D_STATE__.assemblyProgress < 1.0) {
                window.__3D_STATE__.isExploded = false;
                ui.explodeBtn.innerText = 'Explode View';
            }
            updateUI();
        }

        function togglePlay() {
            window.__3D_STATE__.isPlaying = !window.__3D_STATE__.isPlaying;
            if (window.__3D_STATE__.isPlaying && window.__3D_STATE__.assemblyProgress >= 1.0) {
                setProgress(0);
            }
            updateUI();
        }

        function reset() {
            setProgress(0);
            window.__3D_STATE__.isPlaying = false;
            updateUI();
        }

        function changeSpeed(dir) {
            currentSpeedIndex = clamp(currentSpeedIndex + dir, 0, speeds.length - 1);
            window.__3D_STATE__.playbackSpeed = speeds[currentSpeedIndex];
            updateUI();
        }

        // Event Listeners
        ui.slider.addEventListener('input', (e) => {
            window.__3D_STATE__.isPlaying = false;
            setProgress(e.target.value / 100);
        });

        ui.playBtn.addEventListener('click', togglePlay);
        ui.resetBtn.addEventListener('click', reset);
        ui.speedUp.addEventListener('click', () => changeSpeed(1));
        ui.speedDown.addEventListener('click', () => changeSpeed(-1));
        
        ui.explodeBtn.addEventListener('click', () => {
            window.__3D_STATE__.isExploded = !window.__3D_STATE__.isExploded;
            ui.explodeBtn.innerText = window.__3D_STATE__.isExploded ? 'Assemble View' : 'Explode View';
        });

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'KeyR') {
                reset();
            } else if (e.code === 'ArrowRight') {
                window.__3D_STATE__.isPlaying = false;
                setProgress(window.__3D_STATE__.assemblyProgress + 0.02);
            } else if (e.code === 'ArrowLeft') {
                window.__3D_STATE__.isPlaying = false;
                setProgress(window.__3D_STATE__.assemblyProgress - 0.02);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Animation Loop ---
        const clock = new THREE.Clock();
        let explodeLerpFactor = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const state = window.__3D_STATE__;

            // Handle Auto-play
            if (state.isPlaying) {
                setProgress(state.assemblyProgress + state.playbackSpeed);
                if (state.assemblyProgress >= 1.0) {
                    state.isPlaying = false;
                    updateUI();
                }
            }

            // Explode transition smoothing
            const targetExplode = state.isExploded ? 1.0 : 0.0;
            explodeLerpFactor += (targetExplode - explodeLerpFactor) * 10 * delta;

            // Update Positions
            let assembledCount = 0;
            const centerPoint = new THREE.Vector3(0, 2, 0);

            partsData.forEach(part => {
                // Calculate local progress
                let localRaw = (state.assemblyProgress - part.tStart) / (part.tEnd - part.tStart);
                localRaw = clamp(localRaw, 0, 1);
                const localP = smoothstep(localRaw);

                if (localP >= 0.99) assembledCount++;

                // Calculate target position
                const currentPos = new THREE.Vector3().lerpVectors(part.start, part.final, localP);

                // Apply explode offset if applicable
                if (localP >= 0.99 && explodeLerpFactor > 0.001) {
                    const dir = new THREE.Vector3().subVectors(part.final, centerPoint);
                    // Move 2x away from center (which means adding 1x dir to final pos)
                    const explodePos = new THREE.Vector3().addVectors(part.final, dir);
                    currentPos.lerpVectors(part.final, explodePos, explodeLerpFactor);
                }

                // Ensure valid numbers
                if (!isNaN(currentPos.x) && !isNaN(currentPos.y) && !isNaN(currentPos.z)) {
                    part.mesh.position.copy(currentPos);
                }
            });

            state.partsAssembled = assembledCount;
            state.assemblyComplete = (assembledCount === 5);

            // Post-Assembly Animation (Propellers)
            state.propellersSpinning = (state.assemblyComplete && !state.isExploded);
            if (state.propellersSpinning) {
                propellers.forEach(prop => {
                    prop.rotation.z -= 10 * delta; // Rotate around local Z (which is Y globally due to initial rotation)
                });
            }

            // Update State Object Positions
            state.chassisPosition = { x: partsData[0].mesh.position.x, y: partsData[0].mesh.position.y, z: partsData[0].mesh.position.z };
            state.rotorAPosition = { x: partsData[1].mesh.position.x, y: partsData[1].mesh.position.y, z: partsData[1].mesh.position.z };
            state.rotorBPosition = { x: partsData[2].mesh.position.x, y: partsData[2].mesh.position.y, z: partsData[2].mesh.position.z };
            state.rotorCPosition = { x: partsData[3].mesh.position.x, y: partsData[3].mesh.position.y, z: partsData[3].mesh.position.z };
            state.rotorDPosition = { x: partsData[4].mesh.position.x, y: partsData[4].mesh.position.y, z: partsData[4].mesh.position.z };

            // Sync UI text that might change without direct interaction
            if (ui.partsCount.innerText !== `Parts Assembled: ${state.partsAssembled}/5`) {
                ui.partsCount.innerText = `Parts Assembled: ${state.partsAssembled}/5`;
            }

            controls.update();
            renderer.render(scene, camera);
        }

        // Initialize UI and start loop
        updateUI();
        animate();

    </script>
</body>
</html>
