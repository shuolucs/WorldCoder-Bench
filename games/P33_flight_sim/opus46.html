<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Flight Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  
  #hud {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #0f0;
    background: rgba(0, 0, 0, 0.7);
    padding: 15px 20px;
    border: 1px solid #0f0;
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.8;
    pointer-events: none;
    text-shadow: 0 0 5px #0f0;
    min-width: 260px;
  }
  
  #hud .label { color: #0a0; }
  #hud .value { color: #0f0; font-weight: bold; }
  
  #stallWarning {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: red;
    font-size: 60px;
    font-weight: bold;
    text-shadow: 0 0 20px red, 0 0 40px red;
    pointer-events: none;
    display: none;
    z-index: 100;
  }
  
  #stallWarning.active {
    display: block;
    animation: blink 0.5s infinite;
  }
  
  @keyframes blink {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  
  #controls {
    position: fixed;
    top: 20px;
    right: 20px;
    color: #aaa;
    background: rgba(0, 0, 0, 0.6);
    padding: 12px 16px;
    border: 1px solid #555;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.6;
    pointer-events: none;
  }
  
  #controls h3 { color: #fff; margin-bottom: 5px; }
  
  #throttleBar {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 30px;
    height: 200px;
    background: rgba(0, 0, 0, 0.7);
    border: 1px solid #0f0;
    border-radius: 4px;
    pointer-events: none;
  }
  
  #throttleFill {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: linear-gradient(to top, #0a0, #ff0, #f00);
    border-radius: 0 0 3px 3px;
    transition: height 0.1s;
  }
  
  #throttleLabel {
    position: fixed;
    bottom: 225px;
    right: 15px;
    color: #0f0;
    font-size: 11px;
    pointer-events: none;
  }

  #crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 30px;
    height: 30px;
    pointer-events: none;
    z-index: 50;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(0, 255, 0, 0.5);
  }
  #crosshair::before {
    width: 2px; height: 100%;
    left: 50%; transform: translateX(-50%);
  }
  #crosshair::after {
    height: 2px; width: 100%;
    top: 50%; transform: translateY(-50%);
  }
</style>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>

<div id="hud">
  <div><span class="label">AIRSPEED: </span><span class="value" id="airspeed">0</span> <span class="label">m/s</span></div>
  <div><span class="label">ALTITUDE: </span><span class="value" id="altitude">0</span> <span class="label">m</span></div>
  <div><span class="label">THROTTLE: </span><span class="value" id="throttle">0</span><span class="label">%</span></div>
  <div><span class="label">HEADING:  </span><span class="value" id="heading">0</span><span class="label">°</span></div>
  <div><span class="label">V/S:      </span><span class="value" id="vsi">0</span> <span class="label">m/s</span></div>
  <div><span class="label">LIFT:     </span><span class="value" id="lift">0</span> <span class="label">N</span></div>
</div>

<div id="stallWarning">⚠ STALL ⚠</div>

<div id="controls">
  <h3>Controls</h3>
  W/S - Pitch Down/Up<br>
  A/D - Roll Left/Right<br>
  Q/E - Yaw Left/Right<br>
  Shift - Throttle Up<br>
  Z/Ctrl - Throttle Down<br>
</div>

<div id="throttleBar"><div id="throttleFill" style="height:0%"></div></div>
<div id="throttleLabel">THR</div>
<div id="crosshair"></div>

<script type="module">
import * as THREE from 'three';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 2000);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x6688aa, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
sunLight.position.set(100, 200, 100);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -150;
sunLight.shadow.camera.right = 150;
sunLight.shadow.camera.top = 150;
sunLight.shadow.camera.bottom = -150;
sunLight.shadow.camera.near = 1;
sunLight.shadow.camera.far = 500;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87CEEB, 0x556B2F, 0.4);
scene.add(hemiLight);

// ============ TERRAIN ============
const terrainSize = 2000;
const terrainSegments = 200;
const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, terrainSegments, terrainSegments);
terrainGeo.rotateX(-Math.PI / 2);

const positions = terrainGeo.attributes.position;
const colors = new Float32Array(positions.count * 3);

function getTerrainHeight(wx, wz) {
  let h = 0;
  h += Math.sin(wx * 0.01) * 15;
  h += Math.sin(wz * 0.01) * 15;
  h += Math.sin(wx * 0.005 + wz * 0.007) * 20;
  h += Math.sin(wx * 0.02) * Math.cos(wz * 0.02) * 5;
  h += Math.sin(wx * 0.003 + 1.0) * Math.sin(wz * 0.004 + 2.0) * 25;
  h += Math.cos(wx * 0.015 + wz * 0.01) * 8;
  return Math.max(0, h + 25);
}

for (let i = 0; i < positions.count; i++) {
  const x = positions.getX(i);
  const z = positions.getZ(i);
  const h = getTerrainHeight(x, z);
  positions.setY(i, h);

  const t = h / 50;
  const green = new THREE.Color(0x2d5a1e);
  const brown = new THREE.Color(0x8B7355);
  const snow = new THREE.Color(0xEEEEEE);
  
  let color;
  if (t < 0.3) {
    color = green.clone();
  } else if (t < 0.7) {
    color = green.clone().lerp(brown, (t - 0.3) / 0.4);
  } else {
    color = brown.clone().lerp(snow, (t - 0.7) / 0.3);
  }
  
  colors[i * 3] = color.r;
  colors[i * 3 + 1] = color.g;
  colors[i * 3 + 2] = color.b;
}

terrainGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
terrainGeo.computeVertexNormals();

const terrainMat = new THREE.MeshLambertMaterial({
  vertexColors: true,
  side: THREE.FrontSide
});

const terrain = new THREE.Mesh(terrainGeo, terrainMat);
terrain.receiveShadow = true;
scene.add(terrain);

// Water plane
const waterGeo = new THREE.PlaneGeometry(terrainSize * 2, terrainSize * 2);
waterGeo.rotateX(-Math.PI / 2);
const waterMat = new THREE.MeshLambertMaterial({ color: 0x1a5276, transparent: true, opacity: 0.7 });
const water = new THREE.Mesh(waterGeo, waterMat);
water.position.y = 0.5;
scene.add(water);

// ============ AIRPLANE MODEL ============
const airplane = new THREE.Group();

// Fuselage
const fuselageGeo = new THREE.CylinderGeometry(0.4, 0.5, 6, 12);
fuselageGeo.rotateX(Math.PI / 2);
const fuselageMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 80 });
const fuselage = new THREE.Mesh(fuselageGeo, fuselageMat);
fuselage.castShadow = true;
fuselage.receiveShadow = true;
airplane.add(fuselage);

// Nose cone
const noseGeo = new THREE.ConeGeometry(0.4, 1.5, 12);
noseGeo.rotateX(-Math.PI / 2);
const noseMat = new THREE.MeshPhongMaterial({ color: 0xdd0000, shininess: 80 });
const nose = new THREE.Mesh(noseGeo, noseMat);
nose.position.z = 3.75;
nose.castShadow = true;
airplane.add(nose);

// Main wings
const wingGeo = new THREE.BoxGeometry(10, 0.15, 2);
const wingMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, shininess: 60 });
const wings = new THREE.Mesh(wingGeo, wingMat);
wings.position.set(0, 0, 0.5);
wings.castShadow = true;
wings.receiveShadow = true;
airplane.add(wings);

// Horizontal tail
const tailGeo = new THREE.BoxGeometry(3, 0.1, 1);
const tailMat = new THREE.MeshPhongMaterial({ color: 0xaaaaaa, shininess: 60 });
const tail = new THREE.Mesh(tailGeo, tailMat);
tail.position.set(0, 0, -2.8);
tail.castShadow = true;
tail.receiveShadow = true;
airplane.add(tail);

// Vertical tail
const vtailGeo = new THREE.BoxGeometry(0.1, 1.5, 1);
const vtailMat = new THREE.MeshPhongMaterial({ color: 0xcc0000, shininess: 60 });
const vtail = new THREE.Mesh(vtailGeo, vtailMat);
vtail.position.set(0, 0.85, -2.8);
vtail.castShadow = true;
vtail.receiveShadow = true;
airplane.add(vtail);

// Propeller
const propGroup = new THREE.Group();
const propGeo = new THREE.BoxGeometry(2.5, 0.1, 0.2);
const propMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
const prop1 = new THREE.Mesh(propGeo, propMat);
propGroup.add(prop1);
const prop2 = new THREE.Mesh(propGeo, propMat);
prop2.rotation.z = Math.PI / 2;
propGroup.add(prop2);
propGroup.position.z = 4.5;
airplane.add(propGroup);

airplane.position.set(0, 100, 0);
scene.add(airplane);

// ============ PHYSICS STATE ============
const physics = {
  mass: 1000,
  g: 9.8,
  maxThrust: 5000,
  wingArea: 20,
  wingspan: 10,
  AR: 5, // wingspan^2 / S = 100/20 = 5
  e: 0.8,
  rhoSeaLevel: 1.225,
  
  velocity: new THREE.Vector3(0, 0, 50), // initial forward speed in world space
  throttle: 0.5,
  
  pitchRate: 0,
  rollRate: 0,
  yawRate: 0,
  
  airspeed: 50,
  altitude: 100,
  verticalSpeed: 0,
  heading: 0,
  isStalling: false,
  liftForce: 0,
  attackAngle: 0.05
};

// ============ INPUT ============
const keys = {};
window.addEventListener('keydown', (e) => {
  keys[e.code] = true;
  if (['Space', 'ShiftLeft', 'ShiftRight', 'ControlLeft', 'ControlRight'].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener('keyup', (e) => {
  keys[e.code] = false;
});

// ============ CAMERA STATE ============
const cameraOffset = new THREE.Vector3(0, 3, -15);
const cameraTarget = new THREE.Vector3();
const cameraPos = new THREE.Vector3();

// Initialize camera
camera.position.copy(airplane.position).add(new THREE.Vector3(0, 3, -15));
camera.lookAt(airplane.position);

// ============ STATE EXPOSURE ============
window.__3D_STATE__ = {
  position: { x: 0, y: 100, z: 0 },
  rotation: { pitch: 0, yaw: 0, roll: 0 },
  airspeed: 50,
  altitude: 100,
  throttle: 0.5,
  heading: 0,
  verticalSpeed: 0,
  isStalling: false,
  liftForce: 0
};

// ============ HUD ELEMENTS ============
const hudAirspeed = document.getElementById('airspeed');
const hudAltitude = document.getElementById('altitude');
const hudThrottle = document.getElementById('throttle');
const hudHeading = document.getElementById('heading');
const hudVsi = document.getElementById('vsi');
const hudLift = document.getElementById('lift');
const stallWarning = document.getElementById('stallWarning');
const throttleFill = document.getElementById('throttleFill');

// ============ CLOUDS ============
function createClouds() {
  const cloudGroup = new THREE.Group();
  const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.8 });
  
  for (let i = 0; i < 60; i++) {
    const cloud = new THREE.Group();
    const numPuffs = 3 + Math.floor(Math.random() * 5);
    
    for (let j = 0; j < numPuffs; j++) {
      const size = 5 + Math.random() * 15;
      const puffGeo = new THREE.SphereGeometry(size, 8, 6);
      const puff = new THREE.Mesh(puffGeo, cloudMat);
      puff.position.set(
        (Math.random() - 0.5) * 20,
        (Math.random() - 0.5) * 5,
        (Math.random() - 0.5) * 20
      );
      puff.scale.y = 0.5;
      cloud.add(puff);
    }
    
    cloud.position.set(
      (Math.random() - 0.5) * terrainSize,
      120 + Math.random() * 100,
      (Math.random() - 0.5) * terrainSize
    );
    cloudGroup.add(cloud);
  }
  
  scene.add(cloudGroup);
}
createClouds();

// ============ TREES (simple) ============
function createTrees() {
  const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 3, 5);
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3728 });
  const leafGeo = new THREE.ConeGeometry(1.5, 4, 6);
  const leafMat = new THREE.MeshLambertMaterial({ color: 0x1a6b1a });
  
  const treeInstances = new THREE.Group();
  
  for (let i = 0; i < 300; i++) {
    const x = (Math.random() - 0.5) * terrainSize * 0.8;
    const z = (Math.random() - 0.5) * terrainSize * 0.8;
    const h = getTerrainHeight(x, z);
    
    if (h > 5 && h < 35) {
      const tree = new THREE.Group();
      const trunk = new THREE.Mesh(trunkGeo, trunkMat);
      trunk.position.y = 1.5;
      tree.add(trunk);
      
      const leaves = new THREE.Mesh(leafGeo, leafMat);
      leaves.position.y = 5;
      tree.add(leaves);
      
      tree.position.set(x, h, z);
      tree.scale.setScalar(0.8 + Math.random() * 0.8);
      treeInstances.add(tree);
    }
  }
  
  scene.add(treeInstances);
}
createTrees();

// ============ MAIN LOOP ============
const clock = new THREE.Clock();
let prevAltitude = physics.altitude;

function update() {
  const dt = Math.min(clock.getDelta(), 0.05);
  if (dt === 0) return;
  
  // ---- Input handling ----
  const pitchSpeed = 2; // rad/s
  const rollSpeed = 3;
  const yawSpeed = 1;
  
  let pitchInput = 0, rollInput = 0, yawInput = 0;
  
  if (keys['KeyW']) pitchInput = -1; // pitch down (nose down)
  if (keys['KeyS']) pitchInput = 1;  // pitch up (nose up)
  if (keys['KeyA']) rollInput = -1;  // roll left
  if (keys['KeyD']) rollInput = 1;   // roll right
  if (keys['KeyQ']) yawInput = 1;    // yaw left
  if (keys['KeyE']) yawInput = -1;   // yaw right
  
  if (keys['ShiftLeft'] || keys['ShiftRight']) {
    physics.throttle = Math.min(1.0, physics.throttle + 0.02 * dt * 60);
  }
  if (keys['ControlLeft'] || keys['ControlRight'] || keys['KeyZ']) {
    physics.throttle = Math.max(0.0, physics.throttle - 0.02 * dt * 60);
  }
  
  // ---- Apply rotations in local space ----
  const pitchQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitchInput * pitchSpeed * dt);
  const rollQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 0, 1), rollInput * rollSpeed * dt);
  const yawQuat = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yawInput * yawSpeed * dt);
  
  airplane.quaternion.multiply(pitchQuat);
  airplane.quaternion.multiply(rollQuat);
  airplane.quaternion.multiply(yawQuat);
  airplane.quaternion.normalize();
  
  // ---- Get airplane axes ----
  const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(airplane.quaternion).normalize();
  const up = new THREE.Vector3(0, 1, 0).applyQuaternion(airplane.quaternion).normalize();
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(airplane.quaternion).normalize();
  
  // ---- Airspeed ----
  physics.airspeed = physics.velocity.length();
  
  // ---- Air density ----
  physics.altitude = airplane.position.y;
  const rho = physics.rhoSeaLevel * Math.exp(-physics.altitude / 8500);
  
  // ---- Angle of attack ----
  let alpha = 0;
  if (physics.airspeed > 1) {
    const velDir = physics.velocity.clone().normalize();
    const dotForward = velDir.dot(forward);
    const dotUp = velDir.dot(up);
    alpha = Math.atan2(-dotUp, dotForward);
  }
  physics.attackAngle = alpha;
  
  // ---- Lift coefficient ----
  let Cl = 2 * Math.PI * alpha;
  
  // Stall modeling
  const stallAlpha = 0.26; // ~15 degrees
  if (Math.abs(alpha) > stallAlpha) {
    // Post-stall: Cl drops
    const excess = Math.abs(alpha) - stallAlpha;
    const stallFactor = Math.max(0, 1 - excess * 5);
    Cl = Math.sign(alpha) * 1.5 * stallFactor;
  }
  Cl = THREE.MathUtils.clamp(Cl, -1.5, 1.5);
  
  // ---- Stall speed check ----
  const stallSpeed = Math.sqrt((2 * physics.mass * physics.g) / (rho * physics.wingArea * 1.5));
  physics.isStalling = physics.airspeed < stallSpeed && physics.altitude > 5;
  
  if (physics.isStalling) {
    // Reduce lift further during stall
    Cl *= 0.3;
  }
  
  // ---- Lift force ----
  const liftMag = 0.5 * Math.abs(Cl) * rho * physics.airspeed * physics.airspeed * physics.wingArea;
  physics.liftForce = liftMag;
  
  // Lift direction: perpendicular to velocity in the plane of (up, velocity)
  let liftDir;
  if (physics.airspeed > 1) {
    const velDir = physics.velocity.clone().normalize();
    liftDir = up.clone();
    // Remove component along velocity
    liftDir.sub(velDir.clone().multiplyScalar(liftDir.dot(velDir))).normalize();
  } else {
    liftDir = new THREE.Vector3(0, 1, 0);
  }
  if (Cl < 0) liftDir.negate();
  
  const liftForce = liftDir.multiplyScalar(liftMag);
  
  // ---- Drag ----
  const Cd = 0.02 + (Cl * Cl) / (Math.PI * physics.AR * physics.e);
  const dragMag = 0.5 * Cd * rho * physics.airspeed * physics.airspeed * physics.wingArea;
  
  let dragForce = new THREE.Vector3();
  if (physics.airspeed > 0.1) {
    dragForce = physics.velocity.clone().normalize().multiplyScalar(-dragMag);
  }
  
  // ---- Thrust ----
  const thrustMag = physics.throttle * physics.maxThrust;
  const thrustForce = forward.clone().multiplyScalar(thrustMag);
  
  // ---- Gravity ----
  const gravityForce = new THREE.Vector3(0, -physics.mass * physics.g, 0);
  
  // ---- Total force & acceleration ----
  const totalForce = new THREE.Vector3()
    .add(liftForce)
    .add(dragForce)
    .add(thrustForce)
    .add(gravityForce);
  
  const acceleration = totalForce.divideScalar(physics.mass);
  
  // ---- Integrate velocity and position ----
  physics.velocity.add(acceleration.clone().multiplyScalar(dt));
  
  // Damping for stability
  const dampFactor = 0.999;
  physics.velocity.multiplyScalar(dampFactor);
  
  airplane.position.add(physics.velocity.clone().multiplyScalar(dt));
  
  // ---- Ground collision ----
  const groundH = getTerrainHeight(airplane.position.x, airplane.position.z);
  if (airplane.position.y < groundH + 1) {
    airplane.position.y = groundH + 1;
    if (physics.velocity.y < 0) {
      physics.velocity.y *= -0.3; // Bounce slightly
      // Friction
      physics.velocity.x *= 0.95;
      physics.velocity.z *= 0.95;
    }
  }
  
  // ---- Vertical speed ----
  physics.verticalSpeed = (airplane.position.y - prevAltitude) / dt;
  prevAltitude = airplane.position.y;
  
  // ---- Heading ----
  const headingRad = Math.atan2(forward.x, forward.z);
  physics.heading = ((headingRad * 180 / Math.PI) + 360) % 360;
  
  // ---- Propeller spin ----
  propGroup.rotation.z += physics.throttle * 50 * dt;
  
  // ---- Camera ----
  const desiredCamPos = airplane.position.clone()
    .add(forward.clone().multiplyScalar(cameraOffset.z))
    .add(up.clone().multiplyScalar(cameraOffset.y));
  
  camera.position.lerp(desiredCamPos, 0.07);
  
  const lookTarget = airplane.position.clone().add(forward.clone().multiplyScalar(10));
  cameraTarget.lerp(lookTarget, 0.08);
  camera.lookAt(cameraTarget);
  
  // ---- Move sun shadow with airplane ----
  sunLight.position.set(
    airplane.position.x + 100,
    airplane.position.y + 200,
    airplane.position.z + 100
  );
  sunLight.target.position.copy(airplane.position);
  sunLight.target.updateMatrixWorld();
  
  // ---- Extract Euler angles for state ----
  const euler = new THREE.Euler().setFromQuaternion(airplane.quaternion, 'YXZ');
  
  // ---- Update HUD ----
  hudAirspeed.textContent = physics.airspeed.toFixed(1);
  hudAltitude.textContent = airplane.position.y.toFixed(1);
  hudThrottle.textContent = (physics.throttle * 100).toFixed(0);
  hudHeading.textContent = physics.heading.toFixed(0);
  hudVsi.textContent = physics.verticalSpeed.toFixed(1);
  hudLift.textContent = physics.liftForce.toFixed(0);
  
  throttleFill.style.height = (physics.throttle * 100) + '%';
  
  if (physics.isStalling) {
    stallWarning.classList.add('active');
  } else {
    stallWarning.classList.remove('active');
  }
  
  // ---- Update state ----
  window.__3D_STATE__ = {
    position: { x: airplane.position.x, y: airplane.position.y, z: airplane.position.z },
    rotation: { pitch: euler.x, yaw: euler.y, roll: euler.z },
    airspeed: physics.airspeed,
    altitude: airplane.position.y,
    throttle: physics.throttle,
    heading: physics.heading,
    verticalSpeed: physics.verticalSpeed,
    isStalling: physics.isStalling,
    liftForce: physics.liftForce
  };
}

function animate() {
  requestAnimationFrame(animate);
  update();
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
