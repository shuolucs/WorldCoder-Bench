<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 3D 飞行模拟器</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87b7e3;
      font-family: Arial, sans-serif;
    }

    #hud {
      position: fixed;
      top: 12px;
      left: 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 12px 14px;
      border-radius: 8px;
      line-height: 1.7;
      min-width: 220px;
      z-index: 10;
      font-size: 14px;
      backdrop-filter: blur(4px);
    }

    #hud .label {
      color: #9fd3ff;
      display: inline-block;
      min-width: 72px;
    }

    #stallWarning {
      margin-top: 8px;
      color: #ff4d4d;
      font-weight: bold;
      font-size: 22px;
      letter-spacing: 2px;
      display: none;
      text-align: center;
      animation: blink 0.5s steps(2, start) infinite;
    }

    @keyframes blink {
      to { opacity: 0.2; }
    }

    #help {
      position: fixed;
      right: 12px;
      top: 12px;
      color: #fff;
      background: rgba(0, 0, 0, 0.35);
      padding: 12px 14px;
      border-radius: 8px;
      z-index: 10;
      font-size: 13px;
      line-height: 1.6;
      max-width: 260px;
      backdrop-filter: blur(4px);
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="hud">
    <div><span class="label">空速</span><span id="airspeed">0</span> m/s</div>
    <div><span class="label">高度</span><span id="altitude">0</span> m</div>
    <div><span class="label">油门</span><span id="throttle">0</span> %</div>
    <div><span class="label">航向</span><span id="heading">0</span> °</div>
    <div><span class="label">垂直速度</span><span id="vsi">0</span> m/s</div>
    <div id="stallWarning">STALL</div>
  </div>

  <div id="help">
    <div><strong>控制说明</strong></div>
    <div>W：推杆（pitch down）</div>
    <div>S：拉杆（pitch up）</div>
    <div>A / D：滚转</div>
    <div>Q / E：偏航</div>
    <div>Shift：加油门</div>
    <div>Ctrl / Z：减油门</div>
  </div>

  <script type="module">
    import * as THREE from 'three';

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87b7e3);
    scene.fog = new THREE.Fog(0x87b7e3, 120, 420);

    const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 8, -20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);

    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(80, 120, 40);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -180;
    sun.shadow.camera.right = 180;
    sun.shadow.camera.top = 180;
    sun.shadow.camera.bottom = -180;
    sun.shadow.camera.near = 1;
    sun.shadow.camera.far = 400;
    scene.add(sun);

    function terrainHeight(x, z) {
      const h =
        14 * Math.sin(x * 0.05) * Math.cos(z * 0.05) +
        9 * Math.sin((x + z) * 0.08) +
        6 * Math.cos((x - z) * 0.035) +
        5 * Math.sin(Math.sqrt(x * x + z * z) * 0.045);
      return THREE.MathUtils.clamp(25 + h, 0, 50);
    }

    function createTerrain() {
      const size = 2000;
      const segments = 100;

      const geo = new THREE.PlaneGeometry(size, size, segments, segments);
      geo.rotateX(-Math.PI / 2);

      const pos = geo.attributes.position;
      const colors = [];

      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const z = pos.getZ(i);
        const y = terrainHeight(x, z);
        pos.setY(i, y);

        const t = y / 50;
        const low = new THREE.Color(0x2f8f3a);
        const high = new THREE.Color(0x7b5a3a);
        const c = low.clone().lerp(high, t);
        colors.push(c.r, c.g, c.b);
      }

      geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
      geo.computeVertexNormals();

      const mat = new THREE.MeshLambertMaterial({
        vertexColors: true
      });

      const mesh = new THREE.Mesh(geo, mat);
      mesh.receiveShadow = true;
      return mesh;
    }

    const terrain = createTerrain();
    scene.add(terrain);

    function createAirplane() {
      const plane = new THREE.Group();

      const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, metalness: 0.2, roughness: 0.7 });
      const grayMat = new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.25, roughness: 0.75 });

      const fuselageGeo = new THREE.CylinderGeometry(0.5, 0.5, 6, 20, 1, false);
      fuselageGeo.rotateX(Math.PI / 2);
      const fuselage = new THREE.Mesh(fuselageGeo, whiteMat);
      fuselage.castShadow = true;
      fuselage.receiveShadow = true;
      plane.add(fuselage);

      const noseGeo = new THREE.ConeGeometry(0.5, 1.2, 20);
      noseGeo.rotateX(Math.PI / 2);
      const nose = new THREE.Mesh(noseGeo, whiteMat);
      nose.position.z = 3.6;
      nose.castShadow = true;
      nose.receiveShadow = true;
      plane.add(nose);

      const wingGeo = new THREE.BoxGeometry(10, 0.15, 2);
      const wing = new THREE.Mesh(wingGeo, grayMat);
      wing.position.set(0, 0, 0);
      wing.castShadow = true;
      wing.receiveShadow = true;
      plane.add(wing);

      const tailWingGeo = new THREE.BoxGeometry(3, 0.1, 1);
      const tailWing = new THREE.Mesh(tailWingGeo, grayMat);
      tailWing.position.set(0, 0.25, -2.4);
      tailWing.castShadow = true;
      tailWing.receiveShadow = true;
      plane.add(tailWing);

      const finGeo = new THREE.BoxGeometry(0.1, 1.5, 1);
      const fin = new THREE.Mesh(finGeo, grayMat);
      fin.position.set(0, 0.8, -2.4);
      fin.castShadow = true;
      fin.receiveShadow = true;
      plane.add(fin);

      plane.traverse(obj => {
        if (obj.isMesh) {
          obj.castShadow = true;
          obj.receiveShadow = true;
        }
      });

      return plane;
    }

    const airplane = createAirplane();
    airplane.position.set(0, 120, 0);
    scene.add(airplane);

    const keys = {};
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (['ShiftLeft', 'ShiftRight', 'ControlLeft', 'ControlRight', 'KeyZ', 'KeyW', 'KeyS', 'KeyA', 'KeyD', 'KeyQ', 'KeyE'].includes(e.code)) {
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.code] = false;
    });

    const airspeedEl = document.getElementById('airspeed');
    const altitudeEl = document.getElementById('altitude');
    const throttleEl = document.getElementById('throttle');
    const headingEl = document.getElementById('heading');
    const vsiEl = document.getElementById('vsi');
    const stallWarningEl = document.getElementById('stallWarning');

    const physics = {
      mass: 1000,
      g: 9.8,
      wingArea: 20,
      maxThrust: 5000,
      AR: 5,
      e: 0.8,
      clMax: 1.5,
      velocity: new THREE.Vector3(0, 0, 40),
      throttle: 0.65,
      liftForce: 0,
      isStalling: false
    };

    const euler = new THREE.Euler(0, 0, 0, 'YXZ');
    euler.x = -0.03;
    euler.y = 0;
    euler.z = 0;
    airplane.rotation.copy(euler);

    const upWorld = new THREE.Vector3(0, 1, 0);
    const tempForward = new THREE.Vector3();
    const tempRight = new THREE.Vector3();
    const tempUp = new THREE.Vector3();
    const tempVelDir = new THREE.Vector3();

    const clock = new THREE.Clock();

    function getHeadingDegrees() {
      airplane.getWorldDirection(tempForward);
      const heading = Math.atan2(tempForward.x, tempForward.z);
      return (THREE.MathUtils.radToDeg(heading) + 360) % 360;
    }

    function updateControls(dt) {
      const pitchRate = 2.0;
      const rollRate = 3.0;
      const yawRate = 1.0;

      if (keys['KeyW']) euler.x += pitchRate * dt;
      if (keys['KeyS']) euler.x -= pitchRate * dt;
      if (keys['KeyA']) euler.z += rollRate * dt;
      if (keys['KeyD']) euler.z -= rollRate * dt;
      if (keys['KeyQ']) euler.y += yawRate * dt;
      if (keys['KeyE']) euler.y -= yawRate * dt;

      if (keys['ShiftLeft'] || keys['ShiftRight']) {
        physics.throttle = Math.min(1, physics.throttle + 0.02);
      }
      if (keys['ControlLeft'] || keys['ControlRight'] || keys['KeyZ']) {
        physics.throttle = Math.max(0, physics.throttle - 0.02);
      }

      euler.x = THREE.MathUtils.clamp(euler.x, -Math.PI / 2 + 0.05, Math.PI / 2 - 0.05);
      airplane.rotation.copy(euler);
    }

    function updatePhysics(dt) {
      const altitude = Math.max(airplane.position.y, 0);
      const rho = 1.225 * Math.exp(-altitude / 8500);

      const speed = physics.velocity.length();
      airplane.getWorldDirection(tempForward).normalize();
      tempRight.crossVectors(tempForward, upWorld).normalize();
      tempUp.crossVectors(tempRight, tempForward).normalize();

      let alpha = 0;
      if (speed > 0.001) {
        tempVelDir.copy(physics.velocity).normalize();
        const verticalVelComp = tempVelDir.dot(tempUp);
        alpha = Math.asin(THREE.MathUtils.clamp(verticalVelComp, -1, 1));
      }

      let Cl = 2 * Math.PI * alpha;
      Cl = THREE.MathUtils.clamp(Cl, -physics.clMax, physics.clMax);

      const stallSpeedSeaLevel = 25;
      const stallSpeed = stallSpeedSeaLevel * Math.sqrt(1.225 / rho);
      const isStalling = speed < stallSpeed;

      if (isStalling) {
        const ratio = THREE.MathUtils.clamp(speed / stallSpeed, 0, 1);
        Cl *= ratio * ratio * 0.35;
      }

      const liftMag = 0.5 * Cl * rho * speed * speed * physics.wingArea;
      const Cd = 0.02 + (Cl * Cl) / (Math.PI * physics.AR * physics.e);
      let dragMag = 0.5 * Cd * rho * speed * speed * physics.wingArea;

      if (isStalling) {
        dragMag *= 1.8;
      }

      const thrustMag = physics.throttle * physics.maxThrust;
      const weightMag = physics.mass * physics.g;

      const lift = tempUp.clone().multiplyScalar(liftMag);
      const drag = speed > 0.001
        ? physics.velocity.clone().normalize().multiplyScalar(-dragMag)
        : new THREE.Vector3();
      const thrust = tempForward.clone().multiplyScalar(thrustMag);
      const weight = new THREE.Vector3(0, -weightMag, 0);

      const totalForce = new THREE.Vector3()
        .add(lift)
        .add(drag)
        .add(thrust)
        .add(weight);

      const accel = totalForce.multiplyScalar(1 / physics.mass);
      physics.velocity.addScaledVector(accel, dt);

      if (physics.velocity.length() < 0.01) {
        physics.velocity.set(0, 0, 0.01);
      }

      airplane.position.addScaledVector(physics.velocity, dt);

      const ground = terrainHeight(airplane.position.x, airplane.position.z) + 2.2;
      if (airplane.position.y < ground) {
        airplane.position.y = ground;
        if (physics.velocity.y < 0) physics.velocity.y = 0;
      }

      physics.liftForce = liftMag;
      physics.isStalling = isStalling;
    }

    function updateCamera() {
      const offset = new THREE.Vector3(0, 3, -15);
      const cameraOffset = offset.clone().applyQuaternion(airplane.quaternion);
      const desiredPos = airplane.position.clone().add(cameraOffset);
      camera.position.lerp(desiredPos, 0.08);

      const lookAtTarget = airplane.position.clone().add(
        new THREE.Vector3(0, 1, 12).applyQuaternion(airplane.quaternion)
      );
      const currentLook = new THREE.Vector3();
      currentLook.lerpVectors(camera.getWorldDirection(new THREE.Vector3()).add(camera.position), lookAtTarget, 0.08);
      camera.lookAt(lookAtTarget);
    }

    function updateHUD() {
      const speed = physics.velocity.length();
      const altitude = Math.max(airplane.position.y, 0);
      const verticalSpeed = physics.velocity.y;
      const heading = getHeadingDegrees();
      const rho = 1.225 * Math.exp(-altitude / 8500);
      const stallSpeed = 25 * Math.sqrt(1.225 / rho);

      airspeedEl.textContent = speed.toFixed(1);
      altitudeEl.textContent = altitude.toFixed(1);
      throttleEl.textContent = Math.round(physics.throttle * 100);
      headingEl.textContent = heading.toFixed(0);
      vsiEl.textContent = verticalSpeed.toFixed(1);

      stallWarningEl.style.display = speed < stallSpeed ? 'block' : 'none';

      window.__3D_STATE__ = {
        position: {
          x: airplane.position.x,
          y: airplane.position.y,
          z: airplane.position.z
        },
        rotation: {
          pitch: airplane.rotation.x,
          yaw: airplane.rotation.y,
          roll: airplane.rotation.z
        },
        airspeed: speed,
        altitude: altitude,
        throttle: physics.throttle,
        heading: heading,
        verticalSpeed: verticalSpeed,
        isStalling: physics.isStalling,
        liftForce: physics.liftForce
      };
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.033);

      updateControls(dt);
      updatePhysics(dt);
      updateCamera();
      updateHUD();

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
