<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time CSG Editor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
        }
        #ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 280px;
            background: rgba(30, 30, 30, 0.85);
            color: #eee;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border: 1px solid #444;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
        }
        .control-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 13px;
            color: #aaa;
        }
        select, button {
            width: 100%;
            padding: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
        }
        select:hover, button:hover {
            background: #444;
        }
        button {
            background: #2c5282;
            border-color: #2b6cb0;
            font-weight: bold;
        }
        button:hover {
            background: #2b6cb0;
        }
        #primitiveList {
            list-style: none;
            padding: 0;
            margin: 0;
            border: 1px solid #555;
            border-radius: 4px;
            max-height: 120px;
            overflow-y: auto;
            background: #222;
        }
        #primitiveList li {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 13px;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
        }
        #primitiveList li:last-child {
            border-bottom: none;
        }
        #primitiveList li:hover {
            background: #333;
        }
        #primitiveList li.selected {
            background: #2c5282;
            color: #fff;
        }
        .color-box {
            width: 12px;
            height: 12px;
            display: inline-block;
            margin-right: 8px;
            border-radius: 2px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .slider-container span {
            font-size: 12px;
            width: 30px;
            text-align: right;
        }
        input[type="range"] {
            flex-grow: 1;
            margin: 0 10px;
            accent-color: #4299e1;
        }
        .stats {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #555;
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
        }
        .stats span {
            color: #fff;
            font-weight: bold;
        }
        #transformControls {
            display: none;
            background: #2a2a2a;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
            "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.16/build/index.module.js"
        }
    }
    </script>
</head>
<body>
    <div id="ui-panel">
        <div class="control-group">
            <label for="operation">Boolean Operation</label>
            <select id="operation">
                <option value="union">Union</option>
                <option value="subtract">Subtract</option>
                <option value="intersect">Intersect</option>
            </select>
        </div>

        <div class="control-group">
            <button id="addPrimitive">Add Primitive</button>
        </div>

        <div class="control-group">
            <label>Primitives (Click to select)</label>
            <ul id="primitiveList"></ul>
        </div>

        <div id="transformControls">
            <label>Position</label>
            <div class="slider-container">
                <label>X</label>
                <input type="range" id="posX" min="-5" max="5" step="0.1" value="0">
                <span id="valX">0.0</span>
            </div>
            <div class="slider-container">
                <label>Y</label>
                <input type="range" id="posY" min="-5" max="5" step="0.1" value="0">
                <span id="valY">0.0</span>
            </div>
            <div class="slider-container">
                <label>Z</label>
                <input type="range" id="posZ" min="-5" max="5" step="0.1" value="0">
                <span id="valZ">0.0</span>
            </div>
        </div>

        <div class="stats">
            Vertices: <span id="vertexCount">0</span><br>
            Faces: <span id="faceCount">0</span>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Evaluator, Brush, SUBTRACTION, ADDITION, INTERSECTION } from 'three-bvh-csg';

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lights ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(5, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        scene.add(dirLight);

        // --- Environment ---
        const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x333333);
        scene.add(gridHelper);

        // --- CSG Setup ---
        const evaluator = new Evaluator();
        evaluator.useGroups = false;
        
        const resultMaterial = new THREE.MeshStandardMaterial({
            color: 0x88cc88,
            metalness: 0.2,
            roughness: 0.5,
            side: THREE.DoubleSide
        });

        let resultMesh = new THREE.Mesh(new THREE.BufferGeometry(), resultMaterial);
        resultMesh.castShadow = true;
        resultMesh.receiveShadow = true;
        scene.add(resultMesh);

        // --- State ---
        const primitives = [];
        let selectedId = null;
        let primitiveCounter = 0;
        const typesSequence = ['sphere', 'box', 'cylinder'];
        let nextTypeIndex = 2; // Start from cylinder for new additions

        // --- UI Elements ---
        const uiOperation = document.getElementById('operation');
        const uiAddBtn = document.getElementById('addPrimitive');
        const uiList = document.getElementById('primitiveList');
        const uiTransform = document.getElementById('transformControls');
        const uiPosX = document.getElementById('posX');
        const uiPosY = document.getElementById('posY');
        const uiPosZ = document.getElementById('posZ');
        const uiValX = document.getElementById('valX');
        const uiValY = document.getElementById('valY');
        const uiValZ = document.getElementById('valZ');
        const uiVertexCount = document.getElementById('vertexCount');
        const uiFaceCount = document.getElementById('faceCount');

        // --- Functions ---
        function createPrimitive(type, x, y, z, colorHex) {
            let geometry;
            if (type === 'sphere') {
                geometry = new THREE.SphereGeometry(type === 'sphere' && primitives.length < 2 ? 1.5 : 1.2, 32, 16);
            } else if (type === 'box') {
                const size = primitives.length < 2 ? 2 : 1.8;
                geometry = new THREE.BoxGeometry(size, size, size);
            } else if (type === 'cylinder') {
                geometry = new THREE.CylinderGeometry(1, 1, 2, 32);
            }

            const brush = new Brush(geometry);
            brush.position.set(x, y, z);
            brush.updateMatrixWorld();

            const wireMaterial = new THREE.MeshBasicMaterial({
                color: colorHex,
                wireframe: true,
                transparent: true,
                opacity: 0.3,
                depthWrite: false
            });
            const wireframe = new THREE.Mesh(geometry, wireMaterial);
            wireframe.position.copy(brush.position);
            scene.add(wireframe);

            const id = primitiveCounter++;
            const prim = { id, type, brush, wireframe, color: colorHex };
            primitives.push(prim);
            
            updateListUI();
            return prim;
        }

        function updateCSG() {
            if (primitives.length === 0) {
                resultMesh.geometry.dispose();
                resultMesh.geometry = new THREE.BufferGeometry();
                updateStats();
                updateGlobalState();
                return;
            }

            let currentResult = primitives[0].brush;
            
            if (primitives.length > 1) {
                const opStr = uiOperation.value;
                let op = ADDITION;
                if (opStr === 'subtract') op = SUBTRACTION;
                if (opStr === 'intersect') op = INTERSECTION;

                for (let i = 1; i < primitives.length; i++) {
                    currentResult = evaluator.evaluate(currentResult, primitives[i].brush, op);
                }
            }

            resultMesh.geometry.dispose();
            resultMesh.geometry = currentResult.geometry.clone();
            
            updateStats();
            updateGlobalState();
        }

        function updateStats() {
            const geo = resultMesh.geometry;
            let vCount = 0;
            let fCount = 0;
            if (geo.attributes.position) {
                vCount = geo.attributes.position.count;
                if (geo.index) {
                    fCount = geo.index.count / 3;
                } else {
                    fCount = vCount / 3;
                }
            }
            uiVertexCount.textContent = vCount;
            uiFaceCount.textContent = fCount;
        }

        function updateGlobalState() {
            window.__3D_STATE__ = {
                primitiveCount: primitives.length,
                operation: uiOperation.value,
                vertexCount: parseInt(uiVertexCount.textContent),
                faceCount: parseInt(uiFaceCount.textContent),
                primitives: primitives.map(p => ({
                    type: p.type,
                    x: p.brush.position.x,
                    y: p.brush.position.y,
                    z: p.brush.position.z,
                    scaleX: p.brush.scale.x,
                    scaleY: p.brush.scale.y,
                    scaleZ: p.brush.scale.z
                }))
            };
        }

        function updateListUI() {
            uiList.innerHTML = '';
            primitives.forEach((p, index) => {
                const li = document.createElement('li');
                li.innerHTML = `<div class="color-box" style="background-color: ${p.color}"></div> ${p.type.charAt(0).toUpperCase() + p.type.slice(1)} ${index + 1}`;
                if (p.id === selectedId) li.classList.add('selected');
                li.onclick = () => selectPrimitive(p.id);
                uiList.appendChild(li);
            });
        }

        function selectPrimitive(id) {
            selectedId = id;
            updateListUI();
            
            primitives.forEach(p => {
                if (p.id === id) {
                    p.wireframe.material.opacity = 0.8;
                    p.wireframe.material.linewidth = 2;
                } else {
                    p.wireframe.material.opacity = 0.3;
                    p.wireframe.material.linewidth = 1;
                }
            });

            const selected = primitives.find(p => p.id === id);
            if (selected) {
                uiTransform.style.display = 'block';
                uiPosX.value = selected.brush.position.x;
                uiPosY.value = selected.brush.position.y;
                uiPosZ.value = selected.brush.position.z;
                uiValX.textContent = selected.brush.position.x.toFixed(1);
                uiValY.textContent = selected.brush.position.y.toFixed(1);
                uiValZ.textContent = selected.brush.position.z.toFixed(1);
            } else {
                uiTransform.style.display = 'none';
            }
        }

        // --- Event Listeners ---
        uiOperation.addEventListener('change', updateCSG);

        uiAddBtn.addEventListener('click', () => {
            const type = typesSequence[nextTypeIndex % typesSequence.length];
            nextTypeIndex++;
            const xOffset = primitives.length * 0.8;
            const color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            createPrimitive(type, xOffset, 0, 0, color);
            updateCSG();
        });

        const handleSliderChange = () => {
            if (selectedId === null) return;
            const selected = primitives.find(p => p.id === selectedId);
            if (selected) {
                const x = parseFloat(uiPosX.value);
                const y = parseFloat(uiPosY.value);
                const z = parseFloat(uiPosZ.value);
                
                selected.brush.position.set(x, y, z);
                selected.brush.updateMatrixWorld();
                
                selected.wireframe.position.set(x, y, z);
                
                uiValX.textContent = x.toFixed(1);
                uiValY.textContent = y.toFixed(1);
                uiValZ.textContent = z.toFixed(1);
                
                updateCSG();
            }
        };

        uiPosX.addEventListener('input', handleSliderChange);
        uiPosY.addEventListener('input', handleSliderChange);
        uiPosZ.addEventListener('input', handleSliderChange);

        // Raycaster for viewport selection
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (event) => {
            if (event.target.tagName !== 'CANVAS') return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const wireframes = primitives.map(p => p.wireframe);
            const intersects = raycaster.intersectObjects(wireframes);

            if (intersects.length > 0) {
                const hitWireframe = intersects[0].object;
                const hitPrim = primitives.find(p => p.wireframe === hitWireframe);
                if (hitPrim) selectPrimitive(hitPrim.id);
            } else {
                selectedId = null;
                selectPrimitive(null);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Initialization ---
        createPrimitive('sphere', 0, 0, 0, '#4488ff');
        createPrimitive('box', 1, 0, 0, '#ff8844');
        updateCSG();

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
