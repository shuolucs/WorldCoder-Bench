<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSG Boolean Operations Editor</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; }
canvas { display: block; }

#ui {
  position: absolute; top: 0; left: 0; width: 280px; height: 100vh;
  background: rgba(16, 16, 32, 0.92); backdrop-filter: blur(10px);
  padding: 16px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.1);
  display: flex; flex-direction: column; gap: 12px;
}

#ui h2 { font-size: 18px; color: #88ccff; border-bottom: 1px solid rgba(136,204,255,0.3); padding-bottom: 8px; }
#ui h3 { font-size: 14px; color: #aaa; margin-top: 4px; }

.section {
  background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}

label { font-size: 12px; color: #aaa; display: block; margin-bottom: 4px; }

select, button {
  width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08); color: #eee; font-size: 13px; cursor: pointer;
  transition: all 0.2s;
}
select:hover, button:hover { background: rgba(255,255,255,0.15); border-color: rgba(136,204,255,0.5); }
button { background: rgba(68, 136, 255, 0.3); border-color: rgba(68, 136, 255, 0.5); }
button:hover { background: rgba(68, 136, 255, 0.5); }

#primitiveList {
  max-height: 200px; overflow-y: auto;
}
.prim-item {
  padding: 8px 10px; margin-bottom: 4px; border-radius: 6px; cursor: pointer;
  background: rgba(255,255,255,0.05); border: 1px solid transparent;
  font-size: 12px; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
}
.prim-item:hover { background: rgba(255,255,255,0.1); }
.prim-item.selected { border-color: #88ccff; background: rgba(68,136,255,0.2); }
.prim-color { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

.slider-group { margin-bottom: 8px; }
.slider-group label { display: flex; justify-content: space-between; }
.slider-group label span { color: #88ccff; }
input[type="range"] {
  width: 100%; -webkit-appearance: none; height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.15); outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
  background: #88ccff; cursor: pointer;
}

.info-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; }
.info-row .val { color: #88ccff; font-weight: bold; }

#transformSection { display: none; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="ui">
  <h2>⬡ CSG Editor</h2>

  <div class="section">
    <label>Boolean Operation</label>
    <select id="operation">
      <option value="union" selected>Union (A ∪ B)</option>
      <option value="subtract">Subtract (A − B)</option>
      <option value="intersect">Intersect (A ∩ B)</option>
    </select>
  </div>

  <div class="section">
    <label>Primitives</label>
    <div id="primitiveList"></div>
    <button id="addPrimitive" style="margin-top:8px;">+ Add Primitive</button>
  </div>

  <div class="section" id="transformSection">
    <h3>Transform Selected</h3>
    <div class="slider-group">
      <label>X Position <span id="posXVal">0</span></label>
      <input type="range" id="posX" min="-5" max="5" step="0.1" value="0">
    </div>
    <div class="slider-group">
      <label>Y Position <span id="posYVal">0</span></label>
      <input type="range" id="posY" min="-5" max="5" step="0.1" value="0">
    </div>
    <div class="slider-group">
      <label>Z Position <span id="posZVal">0</span></label>
      <input type="range" id="posZ" min="-5" max="5" step="0.1" value="0">
    </div>
  </div>

  <div class="section">
    <h3>Result Info</h3>
    <div class="info-row"><span>Vertices:</span><span class="val" id="vertexCount">0</span></div>
    <div class="info-row"><span>Faces:</span><span class="val" id="faceCount">0</span></div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============================================================
// Simple CSG implementation based on BSP trees
// ============================================================

class CSGVector {
  constructor(x, y, z) { this.x = x; this.y = y; this.z = z; }
  clone() { return new CSGVector(this.x, this.y, this.z); }
  negated() { return new CSGVector(-this.x, -this.y, -this.z); }
  plus(a) { return new CSGVector(this.x + a.x, this.y + a.y, this.z + a.z); }
  minus(a) { return new CSGVector(this.x - a.x, this.y - a.y, this.z - a.z); }
  times(a) { return new CSGVector(this.x * a, this.y * a, this.z * a); }
  dividedBy(a) { return new CSGVector(this.x / a, this.y / a, this.z / a); }
  dot(a) { return this.x * a.x + this.y * a.y + this.z * a.z; }
  lerp(a, t) { return this.plus(a.minus(this).times(t)); }
  length() { return Math.sqrt(this.dot(this)); }
  unit() { return this.dividedBy(this.length()); }
  cross(a) {
    return new CSGVector(
      this.y * a.z - this.z * a.y,
      this.z * a.x - this.x * a.z,
      this.x * a.y - this.y * a.x
    );
  }
}

class CSGVertex {
  constructor(pos, normal) {
    this.pos = new CSGVector(pos.x, pos.y, pos.z);
    this.normal = new CSGVector(normal.x, normal.y, normal.z);
  }
  clone() { return new CSGVertex(this.pos.clone(), this.normal.clone()); }
  flip() { this.normal = this.normal.negated(); }
  interpolate(other, t) {
    return new CSGVertex(
      this.pos.lerp(other.pos, t),
      this.normal.lerp(other.normal, t)
    );
  }
}

const EPSILON = 1e-5;
const COPLANAR = 0;
const FRONT = 1;
const BACK = 2;
const SPANNING = 3;

class CSGPlane {
  constructor(normal, w) { this.normal = normal; this.w = w; }
  clone() { return new CSGPlane(this.normal.clone(), this.w); }
  flip() { this.normal = this.normal.negated(); this.w = -this.w; }

  static fromPoints(a, b, c) {
    const n = b.minus(a).cross(c.minus(a)).unit();
    return new CSGPlane(n, n.dot(a));
  }

  splitPolygon(polygon, coplanarFront, coplanarBack, front, back) {
    let polygonType = 0;
    const types = [];
    for (let i = 0; i < polygon.vertices.length; i++) {
      const t = this.normal.dot(polygon.vertices[i].pos) - this.w;
      const type = (t < -EPSILON) ? BACK : (t > EPSILON) ? FRONT : COPLANAR;
      polygonType |= type;
      types.push(type);
    }

    switch (polygonType) {
      case COPLANAR:
        (this.normal.dot(polygon.plane.normal) > 0 ? coplanarFront : coplanarBack).push(polygon);
        break;
      case FRONT:
        front.push(polygon);
        break;
      case BACK:
        back.push(polygon);
        break;
      case SPANNING: {
        const f = [], b2 = [];
        for (let i = 0; i < polygon.vertices.length; i++) {
          const j = (i + 1) % polygon.vertices.length;
          const ti = types[i], tj = types[j];
          const vi = polygon.vertices[i], vj = polygon.vertices[j];
          if (ti !== BACK) f.push(vi);
          if (ti !== FRONT) b2.push(ti !== BACK ? vi.clone() : vi);
          if ((ti | tj) === SPANNING) {
            const t = (this.w - this.normal.dot(vi.pos)) / this.normal.dot(vj.pos.minus(vi.pos));
            const v = vi.interpolate(vj, t);
            f.push(v);
            b2.push(v.clone());
          }
        }
        if (f.length >= 3) front.push(new CSGPolygon(f, polygon.shared));
        if (b2.length >= 3) back.push(new CSGPolygon(b2, polygon.shared));
        break;
      }
    }
  }
}

class CSGPolygon {
  constructor(vertices, shared) {
    this.vertices = vertices;
    this.shared = shared;
    this.plane = CSGPlane.fromPoints(vertices[0].pos, vertices[1].pos, vertices[2].pos);
  }
  clone() {
    return new CSGPolygon(this.vertices.map(v => v.clone()), this.shared);
  }
  flip() {
    this.vertices.reverse().forEach(v => v.flip());
    this.plane.flip();
  }
}

class CSGNode {
  constructor(polygons) {
    this.plane = null;
    this.front = null;
    this.back = null;
    this.polygons = [];
    if (polygons) this.build(polygons);
  }

  clone() {
    const node = new CSGNode();
    node.plane = this.plane && this.plane.clone();
    node.front = this.front && this.front.clone();
    node.back = this.back && this.back.clone();
    node.polygons = this.polygons.map(p => p.clone());
    return node;
  }

  invert() {
    for (let i = 0; i < this.polygons.length; i++) this.polygons[i].flip();
    if (this.plane) this.plane.flip();
    if (this.front) this.front.invert();
    if (this.back) this.back.invert();
    const temp = this.front;
    this.front = this.back;
    this.back = temp;
  }

  clipPolygons(polygons) {
    if (!this.plane) return polygons.slice();
    let front = [], back = [];
    for (let i = 0; i < polygons.length; i++) {
      this.plane.splitPolygon(polygons[i], front, back, front, back);
    }
    if (this.front) front = this.front.clipPolygons(front);
    if (this.back) back = this.back.clipPolygons(back);
    else back = [];
    return front.concat(back);
  }

  clipTo(bsp) {
    this.polygons = bsp.clipPolygons(this.polygons);
    if (this.front) this.front.clipTo(bsp);
    if (this.back) this.back.clipTo(bsp);
  }

  allPolygons() {
    let polygons = this.polygons.slice();
    if (this.front) polygons = polygons.concat(this.front.allPolygons());
    if (this.back) polygons = polygons.concat(this.back.allPolygons());
    return polygons;
  }

  build(polygons) {
    if (!polygons.length) return;
    if (!this.plane) this.plane = polygons[0].plane.clone();
    const front = [], back = [];
    for (let i = 0; i < polygons.length; i++) {
      this.plane.splitPolygon(polygons[i], this.polygons, this.polygons, front, back);
    }
    if (front.length) {
      if (!this.front) this.front = new CSGNode();
      this.front.build(front);
    }
    if (back.length) {
      if (!this.back) this.back = new CSGNode();
      this.back.build(back);
    }
  }
}

class CSG {
  constructor() { this.polygons = []; }

  clone() {
    const csg = new CSG();
    csg.polygons = this.polygons.map(p => p.clone());
    return csg;
  }

  static fromGeometry(geom, matrix) {
    const csg = new CSG();
    const posAttr = geom.getAttribute('position');
    const normAttr = geom.getAttribute('normal');
    const idx = geom.index;

    if (!normAttr) {
      geom.computeVertexNormals();
    }
    const norm = geom.getAttribute('normal');

    const triCount = idx ? idx.count / 3 : posAttr.count / 3;

    for (let i = 0; i < triCount; i++) {
      const vertices = [];
      for (let j = 0; j < 3; j++) {
        const index = idx ? idx.getX(i * 3 + j) : i * 3 + j;
        const pos = new THREE.Vector3(posAttr.getX(index), posAttr.getY(index), posAttr.getZ(index));
        const normal = new THREE.Vector3(norm.getX(index), norm.getY(index), norm.getZ(index));
        if (matrix) {
          pos.applyMatrix4(matrix);
          normal.applyMatrix3(new THREE.Matrix3().getNormalMatrix(matrix)).normalize();
        }
        vertices.push(new CSGVertex(pos, normal));
      }
      csg.polygons.push(new CSGPolygon(vertices, null));
    }
    return csg;
  }

  toGeometry() {
    const positions = [];
    const normals = [];

    for (const polygon of this.polygons) {
      // Triangulate polygon (fan triangulation)
      for (let i = 2; i < polygon.vertices.length; i++) {
        const verts = [polygon.vertices[0], polygon.vertices[i - 1], polygon.vertices[i]];
        for (const v of verts) {
          positions.push(v.pos.x, v.pos.y, v.pos.z);
          normals.push(v.normal.x, v.normal.y, v.normal.z);
        }
      }
    }

    const geom = new THREE.BufferGeometry();
    geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geom.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
    return geom;
  }

  union(csg) {
    const a = new CSGNode(this.clone().polygons);
    const b = new CSGNode(csg.clone().polygons);
    a.clipTo(b);
    b.clipTo(a);
    b.invert();
    b.clipTo(a);
    b.invert();
    a.build(b.allPolygons());
    const result = new CSG();
    result.polygons = a.allPolygons();
    return result;
  }

  subtract(csg) {
    const a = new CSGNode(this.clone().polygons);
    const b = new CSGNode(csg.clone().polygons);
    a.invert();
    a.clipTo(b);
    b.clipTo(a);
    b.invert();
    b.clipTo(a);
    b.invert();
    a.build(b.allPolygons());
    a.invert();
    const result = new CSG();
    result.polygons = a.allPolygons();
    return result;
  }

  intersect(csg) {
    const a = new CSGNode(this.clone().polygons);
    const b = new CSGNode(csg.clone().polygons);
    a.invert();
    b.clipTo(a);
    b.invert();
    a.clipTo(b);
    b.clipTo(a);
    a.build(b.allPolygons());
    a.invert();
    const result = new CSG();
    result.polygons = a.allPolygons();
    return result;
  }
}

// ============================================================
// Main Application
// ============================================================

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(5, 4, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
scene.add(dirLight);

const ambLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambLight);

// Grid
const grid = new THREE.GridHelper(20, 20, 0x444466, 0x333355);
scene.add(grid);

// ============================================================
// Primitives management
// ============================================================

const primitives = [];
const typesCycle = ['sphere', 'box', 'cylinder'];
let nextTypeIndex = 0;
let selectedIndex = -1;
let resultMesh = null;

const primColors = [0x4488ff, 0xff8844, 0x44ff88, 0xff44aa, 0xaaff44, 0x44aaff, 0xff88ff, 0xffaa44];

function createGeometry(type) {
  switch (type) {
    case 'sphere': return new THREE.SphereGeometry(1.2, 24, 16);
    case 'box': return new THREE.BoxGeometry(1.8, 1.8, 1.8);
    case 'cylinder': return new THREE.CylinderGeometry(1, 1, 2, 24);
    default: return new THREE.SphereGeometry(1.2, 24, 16);
  }
}

function addPrimitive(type, position, geometry, color) {
  const geom = geometry || createGeometry(type);
  const col = color || primColors[primitives.length % primColors.length];

  // Wireframe mesh for visualization
  const wireMat = new THREE.MeshBasicMaterial({
    color: col,
    wireframe: true,
    transparent: true,
    opacity: 0.3,
    depthTest: true
  });
  const wireMesh = new THREE.Mesh(geom.clone(), wireMat);
  wireMesh.position.copy(position);
  scene.add(wireMesh);

  const prim = {
    type: type,
    geometry: geom,
    wireframe: wireMesh,
    color: col,
    position: position.clone(),
    scale: new THREE.Vector3(1, 1, 1)
  };

  primitives.push(prim);
  updatePrimitiveList();
  updateCSG();
}

// Initial primitives
addPrimitive('sphere',
  new THREE.Vector3(0, 0, 0),
  new THREE.SphereGeometry(1.5, 24, 16),
  0x4488ff
);
nextTypeIndex = 1; // next will be box in cycle, but second initial is box
addPrimitive('box',
  new THREE.Vector3(1, 0, 0),
  new THREE.BoxGeometry(2, 2, 2),
  0xff8844
);
nextTypeIndex = 2; // next add will be cylinder

// ============================================================
// UI
// ============================================================

const operationSelect = document.getElementById('operation');
const addBtn = document.getElementById('addPrimitive');
const primListEl = document.getElementById('primitiveList');
const posXSlider = document.getElementById('posX');
const posYSlider = document.getElementById('posY');
const posZSlider = document.getElementById('posZ');
const posXVal = document.getElementById('posXVal');
const posYVal = document.getElementById('posYVal');
const posZVal = document.getElementById('posZVal');
const vertexCountEl = document.getElementById('vertexCount');
const faceCountEl = document.getElementById('faceCount');
const transformSection = document.getElementById('transformSection');

operationSelect.addEventListener('change', () => updateCSG());

addBtn.addEventListener('click', () => {
  const type = typesCycle[nextTypeIndex % 3];
  nextTypeIndex++;
  const pos = new THREE.Vector3(primitives.length * 0.8, 0, 0);
  addPrimitive(type, pos);
});

function updatePrimitiveList() {
  primListEl.innerHTML = '';
  primitives.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'prim-item' + (i === selectedIndex ? ' selected' : '');
    const colorDot = document.createElement('div');
    colorDot.className = 'prim-color';
    colorDot.style.background = '#' + new THREE.Color(p.color).getHexString();
    div.appendChild(colorDot);
    const label = document.createElement('span');
    label.textContent = `${p.type} #${i}`;
    div.appendChild(label);
    div.addEventListener('click', () => selectPrimitive(i));
    primListEl.appendChild(div);
  });
}

function selectPrimitive(index) {
  selectedIndex = index;
  updatePrimitiveList();

  if (index >= 0 && index < primitives.length) {
    transformSection.style.display = 'block';
    const p = primitives[index];
    posXSlider.value = p.position.x;
    posYSlider.value = p.position.y;
    posZSlider.value = p.position.z;
    posXVal.textContent = p.position.x.toFixed(1);
    posYVal.textContent = p.position.y.toFixed(1);
    posZVal.textContent = p.position.z.toFixed(1);

    // Highlight selected wireframe
    primitives.forEach((pr, i) => {
      pr.wireframe.material.opacity = i === index ? 0.6 : 0.3;
    });
  } else {
    transformSection.style.display = 'none';
  }
}

function onSliderChange() {
  if (selectedIndex < 0 || selectedIndex >= primitives.length) return;
  const p = primitives[selectedIndex];
  p.position.set(
    parseFloat(posXSlider.value),
    parseFloat(posYSlider.value),
    parseFloat(posZSlider.value)
  );
  p.wireframe.position.copy(p.position);
  posXVal.textContent = parseFloat(posXSlider.value).toFixed(1);
  posYVal.textContent = parseFloat(posYSlider.value).toFixed(1);
  posZVal.textContent = parseFloat(posZSlider.value).toFixed(1);
  updateCSG();
}

posXSlider.addEventListener('input', onSliderChange);
posYSlider.addEventListener('input', onSliderChange);
posZSlider.addEventListener('input', onSliderChange);

// ============================================================
// CSG computation
// ============================================================

function updateCSG() {
  if (primitives.length < 2) {
    // If only one primitive, just show it as result
    if (resultMesh) { scene.remove(resultMesh); resultMesh.geometry.dispose(); resultMesh = null; }
    if (primitives.length === 1) {
      const p = primitives[0];
      const mat = new THREE.Matrix4().makeTranslation(p.position.x, p.position.y, p.position.z);
      const geom = p.geometry.clone();
      geom.applyMatrix4(mat);
      const material = new THREE.MeshStandardMaterial({
        color: 0x88cc88, metalness: 0.2, roughness: 0.5
      });
      resultMesh = new THREE.Mesh(geom, material);
      scene.add(resultMesh);
      updateInfo(geom);
    }
    updateState();
    return;
  }

  const op = operationSelect.value;

  try {
    // Build CSG for first primitive
    const p0 = primitives[0];
    const mat0 = new THREE.Matrix4().makeTranslation(p0.position.x, p0.position.y, p0.position.z);
    let resultCSG = CSG.fromGeometry(p0.geometry, mat0);

    // Apply operation sequentially
    for (let i = 1; i < primitives.length; i++) {
      const pi = primitives[i];
      const mati = new THREE.Matrix4().makeTranslation(pi.position.x, pi.position.y, pi.position.z);
      const csgB = CSG.fromGeometry(pi.geometry, mati);

      switch (op) {
        case 'union': resultCSG = resultCSG.union(csgB); break;
        case 'subtract': resultCSG = resultCSG.subtract(csgB); break;
        case 'intersect': resultCSG = resultCSG.intersect(csgB); break;
      }
    }

    const geom = resultCSG.toGeometry();

    if (resultMesh) { scene.remove(resultMesh); resultMesh.geometry.dispose(); }

    const material = new THREE.MeshStandardMaterial({
      color: 0x88cc88, metalness: 0.2, roughness: 0.5,
      side: THREE.DoubleSide
    });
    resultMesh = new THREE.Mesh(geom, material);
    scene.add(resultMesh);

    updateInfo(geom);
  } catch (e) {
    console.warn('CSG computation error:', e);
  }

  updateState();
}

function updateInfo(geom) {
  const vCount = geom.attributes.position ? geom.attributes.position.count : 0;
  const fCount = geom.index ? geom.index.count / 3 : vCount / 3;
  vertexCountEl.textContent = vCount;
  faceCountEl.textContent = Math.floor(fCount);
}

function updateState() {
  const geom = resultMesh ? resultMesh.geometry : null;
  const vCount = geom && geom.attributes.position ? geom.attributes.position.count : 0;
  const fCount = geom ? (geom.index ? geom.index.count / 3 : vCount / 3) : 0;

  window.__3D_STATE__ = {
    primitiveCount: primitives.length,
    operation: operationSelect.value,
    vertexCount: vCount,
    faceCount: Math.floor(fCount),
    primitives: primitives.map(p => ({
      type: p.type,
      x: p.position.x,
      y: p.position.y,
      z: p.position.z,
      scaleX: p.scale.x,
      scaleY: p.scale.y,
      scaleZ: p.scale.z
    }))
  };
}

// ============================================================
// Raycasting for selection
// ============================================================

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);

  const wireframes = primitives.map(p => p.wireframe);
  const intersects = raycaster.intersectObjects(wireframes);

  if (intersects.length > 0) {
    const hitObj = intersects[0].object;
    const idx = primitives.findIndex(p => p.wireframe === hitObj);
    if (idx >= 0) selectPrimitive(idx);
  }
});

// ============================================================
// Resize
// ============================================================

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============================================================
// Animation loop
// ============================================================

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}

animate();
updateState();

</script>
</body>
