<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 实时 CSG 布尔运算编辑器</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #eee;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #sidebar {
      width: 320px;
      background: #222;
      border-right: 1px solid #333;
      box-sizing: border-box;
      padding: 16px;
      overflow-y: auto;
    }

    #viewport {
      flex: 1;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    h2, h3 {
      margin: 0 0 12px 0;
      font-weight: 600;
    }

    .section {
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid #333;
    }

    label {
      display: block;
      margin: 8px 0 6px;
      font-size: 14px;
      color: #ccc;
    }

    select, button, input[type="range"] {
      width: 100%;
      box-sizing: border-box;
    }

    select, button {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2e2e2e;
      color: #fff;
      font-size: 14px;
    }

    button {
      cursor: pointer;
    }

    button:hover {
      background: #3a3a3a;
    }

    #primitiveList {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .primitive-item {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #2b2b2b;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
    }

    .primitive-item:hover {
      background: #353535;
    }

    .primitive-item.selected {
      background: #3d4f6a;
      border-color: #6aa0ff;
    }

    .slider-row {
      margin-bottom: 10px;
    }

    .slider-value {
      font-size: 12px;
      color: #9cc;
      margin-top: 4px;
      text-align: right;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
    }

    #hint {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 8px 10px;
      background: rgba(0,0,0,0.5);
      color: #ddd;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
      "three-bvh-csg": "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.16/build/index.module.js",
      "three-mesh-bvh": "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.8.3/build/index.module.js"
  } }
  </script>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="section">
        <h2>实时 CSG 编辑器</h2>
        <label for="operation">布尔运算</label>
        <select id="operation">
          <option value="union" selected>union</option>
          <option value="subtract">subtract</option>
          <option value="intersect">intersect</option>
        </select>
      </div>

      <div class="section">
        <button id="addPrimitive">添加基本体</button>
      </div>

      <div class="section">
        <h3>基本体列表</h3>
        <div id="primitiveList"></div>
      </div>

      <div class="section">
        <h3>选中对象位置</h3>
        <div class="slider-row">
          <label for="posX">X</label>
          <input id="posX" type="range" min="-5" max="5" step="0.1" value="0" />
          <div class="slider-value" id="posXValue">0.0</div>
        </div>
        <div class="slider-row">
          <label for="posY">Y</label>
          <input id="posY" type="range" min="-5" max="5" step="0.1" value="0" />
          <div class="slider-value" id="posYValue">0.0</div>
        </div>
        <div class="slider-row">
          <label for="posZ">Z</label>
          <input id="posZ" type="range" min="-5" max="5" step="0.1" value="0" />
          <div class="slider-value" id="posZValue">0.0</div>
        </div>
      </div>

      <div class="section">
        <h3>结果网格信息</h3>
        <div class="stat"><span>顶点数</span><span id="vertexCount">0</span></div>
        <div class="stat"><span>面数</span><span id="faceCount">0</span></div>
      </div>
    </aside>

    <main id="viewport">
      <div id="canvas-container"></div>
      <div id="hint">左键旋转 / 滚轮缩放 / 点击线框或左侧列表选择基本体</div>
    </main>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { Evaluator, Brush, ADDITION, SUBTRACTION, INTERSECTION } from 'three-bvh-csg';

    const container = document.getElementById('canvas-container');
    const operationEl = document.getElementById('operation');
    const addPrimitiveEl = document.getElementById('addPrimitive');
    const primitiveListEl = document.getElementById('primitiveList');

    const posXEl = document.getElementById('posX');
    const posYEl = document.getElementById('posY');
    const posZEl = document.getElementById('posZ');
    const posXValueEl = document.getElementById('posXValue');
    const posYValueEl = document.getElementById('posYValue');
    const posZValueEl = document.getElementById('posZValue');

    const vertexCountEl = document.getElementById('vertexCount');
    const faceCountEl = document.getElementById('faceCount');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x151515);

    const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 100);
    camera.position.set(7, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(1, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(5, 8, 5);
    scene.add(dirLight);

    const grid = new THREE.GridHelper(20, 20, 0x666666, 0x333333);
    scene.add(grid);

    const primitiveGroup = new THREE.Group();
    scene.add(primitiveGroup);

    const resultGroup = new THREE.Group();
    scene.add(resultGroup);

    const evaluator = new Evaluator();
    evaluator.attributes = ['position', 'normal'];

    const resultMaterial = new THREE.MeshStandardMaterial({
      color: 0x88cc88,
      metalness: 0.2,
      roughness: 0.5
    });

    const wireframeMaterial = new THREE.LineBasicMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.3
    });

    const selectWireframeMaterial = new THREE.LineBasicMaterial({
      color: 0xffff66,
      transparent: true,
      opacity: 0.9
    });

    const primitiveTypesCycle = ['sphere', 'box', 'cylinder'];
    const primitives = [];
    let selectedPrimitiveIndex = 0;
    let resultMesh = null;

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function createGeometryByType(type) {
      switch (type) {
        case 'sphere':
          return new THREE.SphereGeometry(1.2, 32, 24);
        case 'box':
          return new THREE.BoxGeometry(1.8, 1.8, 1.8, 1, 1, 1);
        case 'cylinder':
          return new THREE.CylinderGeometry(1, 1, 2, 32, 1);
        default:
          return new THREE.BoxGeometry(1, 1, 1);
      }
    }

    function createInitialGeometryByType(type) {
      switch (type) {
        case 'sphere':
          return new THREE.SphereGeometry(1.5, 40, 30);
        case 'box':
          return new THREE.BoxGeometry(2, 2, 2, 1, 1, 1);
        default:
          return createGeometryByType(type);
      }
    }

    function createPrimitive(type, position, color, useInitialSize = false) {
      const geometry = useInitialSize ? createInitialGeometryByType(type) : createGeometryByType(type);
      geometry.computeVertexNormals();

      const solidMaterial = new THREE.MeshStandardMaterial({
        color,
        transparent: true,
        opacity: 0.25,
        metalness: 0.05,
        roughness: 0.8
      });

      const mesh = new THREE.Mesh(geometry, solidMaterial);
      mesh.position.copy(position);
      mesh.updateMatrixWorld(true);

      const edges = new THREE.EdgesGeometry(geometry);
      const wireframe = new THREE.LineSegments(edges, wireframeMaterial.clone());
      wireframe.position.copy(position);
      wireframe.userData.pickable = true;

      primitiveGroup.add(mesh);
      primitiveGroup.add(wireframe);

      const brush = new Brush(geometry.clone(), new THREE.MeshStandardMaterial());
      brush.position.copy(position);
      brush.updateMatrixWorld(true);

      const primitive = {
        type,
        mesh,
        wireframe,
        brush,
        color
      };

      primitives.push(primitive);
      return primitive;
    }

    function syncPrimitive(primitive) {
      primitive.mesh.position.copy(primitive.brush.position);
      primitive.mesh.rotation.copy(primitive.brush.rotation);
      primitive.mesh.scale.copy(primitive.brush.scale);
      primitive.mesh.updateMatrixWorld(true);

      primitive.wireframe.position.copy(primitive.brush.position);
      primitive.wireframe.rotation.copy(primitive.brush.rotation);
      primitive.wireframe.scale.copy(primitive.brush.scale);
      primitive.wireframe.updateMatrixWorld(true);

      primitive.brush.updateMatrixWorld(true);
    }

    function updatePrimitiveList() {
      primitiveListEl.innerHTML = '';

      primitives.forEach((p, index) => {
        const item = document.createElement('div');
        item.className = 'primitive-item' + (index === selectedPrimitiveIndex ? ' selected' : '');
        item.textContent = `${index}: ${p.type}  (${p.brush.position.x.toFixed(1)}, ${p.brush.position.y.toFixed(1)}, ${p.brush.position.z.toFixed(1)})`;
        item.addEventListener('click', () => {
          selectPrimitive(index);
        });
        primitiveListEl.appendChild(item);
      });

      primitives.forEach((p, index) => {
        p.wireframe.material = index === selectedPrimitiveIndex
          ? selectWireframeMaterial
          : wireframeMaterial;
      });
    }

    function selectPrimitive(index) {
      if (index < 0 || index >= primitives.length) return;
      selectedPrimitiveIndex = index;
      const p = primitives[index];
      posXEl.value = p.brush.position.x;
      posYEl.value = p.brush.position.y;
      posZEl.value = p.brush.position.z;
      posXValueEl.textContent = Number(p.brush.position.x).toFixed(1);
      posYValueEl.textContent = Number(p.brush.position.y).toFixed(1);
      posZValueEl.textContent = Number(p.brush.position.z).toFixed(1);
      updatePrimitiveList();
      updateState();
    }

    function updateSelectedPrimitiveFromSliders() {
      const p = primitives[selectedPrimitiveIndex];
      if (!p) return;

      p.brush.position.set(
        parseFloat(posXEl.value),
        parseFloat(posYEl.value),
        parseFloat(posZEl.value)
      );

      posXValueEl.textContent = Number(posXEl.value).toFixed(1);
      posYValueEl.textContent = Number(posYEl.value).toFixed(1);
      posZValueEl.textContent = Number(posZEl.value).toFixed(1);

      syncPrimitive(p);
      updatePrimitiveList();
      rebuildCSG();
    }

    function disposeResult() {
      if (resultMesh) {
        resultGroup.remove(resultMesh);
        resultMesh.geometry.dispose();
        resultMesh = null;
      }
    }

    function getOperationConst(op) {
      if (op === 'union') return ADDITION;
      if (op === 'subtract') return SUBTRACTION;
      if (op === 'intersect') return INTERSECTION;
      return ADDITION;
    }

    function rebuildCSG() {
      disposeResult();

      if (primitives.length === 0) {
        vertexCountEl.textContent = '0';
        faceCountEl.textContent = '0';
        updateState();
        return;
      }

      let current = primitives[0].brush.clone();
      current.updateMatrixWorld(true);

      const opConst = getOperationConst(operationEl.value);

      for (let i = 1; i < primitives.length; i++) {
        const next = primitives[i].brush;
        current.updateMatrixWorld(true);
        next.updateMatrixWorld(true);
        current = evaluator.evaluate(current, next, opConst);
        current.updateMatrixWorld(true);
      }

      const geometry = current.geometry;
      geometry.computeVertexNormals();

      resultMesh = new THREE.Mesh(geometry, resultMaterial);
      resultGroup.add(resultMesh);

      const vertexCount = geometry.attributes.position ? geometry.attributes.position.count : 0;
      const faceCount = geometry.index ? geometry.index.count / 3 : vertexCount / 3;

      vertexCountEl.textContent = String(vertexCount);
      faceCountEl.textContent = String(Math.floor(faceCount));

      updateState();
    }

    function updateState() {
      const vertexCount = parseInt(vertexCountEl.textContent || '0', 10) || 0;
      const faceCount = parseInt(faceCountEl.textContent || '0', 10) || 0;

      window.__3D_STATE__ = {
        primitiveCount: primitives.length,
        operation: operationEl.value,
        vertexCount,
        faceCount,
        primitives: primitives.map(p => ({
          type: p.type,
          x: Number(p.brush.position.x.toFixed(3)),
          y: Number(p.brush.position.y.toFixed(3)),
          z: Number(p.brush.position.z.toFixed(3)),
          scaleX: Number(p.brush.scale.x.toFixed(3)),
          scaleY: Number(p.brush.scale.y.toFixed(3)),
          scaleZ: Number(p.brush.scale.z.toFixed(3))
        }))
      };
    }

    function addNextPrimitive() {
      const primitiveCount = primitives.length;
      const type = primitiveTypesCycle[(primitiveCount - 2 + primitiveTypesCycle.length) % primitiveTypesCycle.length];
      const x = primitiveCount * 0.8;
      const colorMap = {
        sphere: 0x66aaff,
        box: 0xffaa66,
        cylinder: 0xaaffaa
      };

      createPrimitive(type, new THREE.Vector3(x, 0, 0), colorMap[type], false);
      selectPrimitive(primitives.length - 1);
      rebuildCSG();
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const pickTargets = primitives.map(p => p.wireframe);
      const intersects = raycaster.intersectObjects(pickTargets, false);

      if (intersects.length > 0) {
        const hit = intersects[0].object;
        const index = primitives.findIndex(p => p.wireframe === hit);
        if (index !== -1) {
          selectPrimitive(index);
        }
      }
    }

    operationEl.addEventListener('change', rebuildCSG);
    addPrimitiveEl.addEventListener('click', addNextPrimitive);

    posXEl.addEventListener('input', updateSelectedPrimitiveFromSliders);
    posYEl.addEventListener('input', updateSelectedPrimitiveFromSliders);
    posZEl.addEventListener('input', updateSelectedPrimitiveFromSliders);

    renderer.domElement.addEventListener('pointerdown', onPointerDown);

    function onResize() {
      const w = container.clientWidth;
      const h = container.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }

    window.addEventListener('resize', onResize);

    createPrimitive('sphere', new THREE.Vector3(0, 0, 0), 0x4488ff, true);
    createPrimitive('box', new THREE.Vector3(1, 0, 0), 0xff8844, true);

    primitives.forEach(syncPrimitive);
    selectPrimitive(0);
    rebuildCSG();
    onResize();

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
