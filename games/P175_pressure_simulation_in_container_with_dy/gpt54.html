<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js Pressure Simulation</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      background: rgba(0, 0, 0, 0.6);
      padding: 12px;
      border-radius: 8px;
      z-index: 10;
      min-width: 260px;
      line-height: 1.5;
      font-size: 14px;
    }

    #addParticlesBtn {
      position: absolute;
      top: 220px;
      left: 12px;
      z-index: 11;
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      background: #2d89ef;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    #addParticlesBtn:hover {
      background: #1f6fca;
    }

    #instructions {
      position: absolute;
      bottom: 12px;
      left: 12px;
      color: #ddd;
      background: rgba(0,0,0,0.55);
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 10;
      font-size: 13px;
      max-width: 420px;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div id="hud">Loading...</div>
  <button id="addParticlesBtn">Add Particles (+5)</button>
  <div id="instructions">
    Controls:<br>
    ↑ Move piston down<br>
    ↓ Move piston up<br>
    H Heat gas<br>
    C Cool gas<br>
    D Increase difficulty<br>
    R Reset
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    let scene, camera, renderer, controls, clock;
    let containerGroup, piston;
    let hud, addParticlesBtn;
    let soldierLoaded = false;

    const particles = [];
    const particleRadius = 0.15;
    const restitution = 0.98;

    const bounds = {
      minX: -3,
      maxX: 3,
      minZ: -3,
      maxZ: 3,
      minY: 1,
      maxY: 7
    };

    const state = {
      particleCount: 0,
      pistonY: 7,
      pressure: 0,
      temperature: 0,
      volume: 6 * 6 * (7 - 1),
      difficulty: 1,
      heated: false,
      cooled: false,
      totalKE: 0,
      avgKE: 0,
      soldierLoaded: false,
      paused: false,
      particlesAdded: 0,
      allParticlesInBounds: true,
      nanFree: true
    };

    window.__3D_STATE__ = state;

    init();
    animate();

    function init() {
      hud = document.getElementById('hud');
      addParticlesBtn = document.getElementById('addParticlesBtn');

      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x111111);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 5, 15);
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 4, 0);
      controls.update();

      clock = new THREE.Clock();

      const ambient = new THREE.AmbientLight(0xffffff, 0.5);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
      dirLight.position.set(5, 10, 5);
      scene.add(dirLight);

      const groundGeo = new THREE.PlaneGeometry(40, 40);
      const groundMat = new THREE.MeshStandardMaterial({
        color: 0x333333,
        side: THREE.DoubleSide
      });
      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = 0;
      scene.add(ground);

      createContainer();
      createPiston();
      loadSoldier();
      resetSimulation();

      addParticlesBtn.addEventListener('click', () => {
        addParticles(5);
        state.particlesAdded += 5;
      });

      window.addEventListener('keydown', onKeyDown);
      window.addEventListener('resize', onWindowResize);
    }

    function createContainer() {
      containerGroup = new THREE.Group();

      const boxGeo = new THREE.BoxGeometry(6, 6, 6);
      const boxMat = new THREE.MeshBasicMaterial({
        color: 0x66ccff,
        transparent: true,
        opacity: 0.12
      });
      const box = new THREE.Mesh(boxGeo, boxMat);
      box.position.set(0, 4, 0);
      containerGroup.add(box);

      const edges = new THREE.EdgesGeometry(boxGeo);
      const lineMat = new THREE.LineBasicMaterial({ color: 0xaaddff });
      const wire = new THREE.LineSegments(edges, lineMat);
      wire.position.set(0, 4, 0);
      containerGroup.add(wire);

      scene.add(containerGroup);
    }

    function createPiston() {
      const pistonGeo = new THREE.BoxGeometry(6.1, 0.2, 6.1);
      const pistonMat = new THREE.MeshStandardMaterial({
        color: 0xff4444,
        metalness: 0.2,
        roughness: 0.6
      });
      piston = new THREE.Mesh(pistonGeo, pistonMat);
      piston.position.set(0, 7, 0);
      scene.add(piston);
    }

    function loadSoldier() {
      const loader = new GLTFLoader();
      loader.load(
        'soldier.glb',
        (gltf) => {
          const soldier = gltf.scene;
          soldier.position.set(-6, 0, 0);
          soldier.scale.set(1.5, 1.5, 1.5);
          soldier.lookAt(0, 0, 0);
          scene.add(soldier);
          soldierLoaded = true;
          state.soldierLoaded = true;
        },
        undefined,
        (err) => {
          console.warn('Failed to load soldier.glb:', err);
          soldierLoaded = false;
          state.soldierLoaded = false;

          const fallbackGeo = new THREE.CapsuleGeometry(0.5, 1.4, 4, 8);
          const fallbackMat = new THREE.MeshStandardMaterial({ color: 0x88aa66 });
          const fallback = new THREE.Mesh(fallbackGeo, fallbackMat);
          fallback.position.set(-6, 1.2, 0);
          fallback.lookAt(0, 1, 0);
          scene.add(fallback);
        }
      );
    }

    function randomInRange(min, max) {
      return min + Math.random() * (max - min);
    }

    function randomColor() {
      return new THREE.Color(Math.random(), Math.random(), Math.random());
    }

    function createParticle() {
      const geo = new THREE.SphereGeometry(particleRadius, 16, 16);
      const mat = new THREE.MeshStandardMaterial({
        color: randomColor(),
        emissive: 0x111111
      });
      const mesh = new THREE.Mesh(geo, mat);

      const p = {
        mesh,
        position: new THREE.Vector3(
          randomInRange(bounds.minX + particleRadius, bounds.maxX - particleRadius),
          randomInRange(bounds.minY + particleRadius, state.pistonY - particleRadius),
          randomInRange(bounds.minZ + particleRadius, bounds.maxZ - particleRadius)
        ),
        velocity: new THREE.Vector3(
          randomInRange(-2, 2),
          randomInRange(-2, 2),
          randomInRange(-2, 2)
        ),
        radius: particleRadius
      };

      mesh.position.copy(p.position);
      scene.add(mesh);
      particles.push(p);
    }

    function clearParticles() {
      for (const p of particles) {
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
      particles.length = 0;
    }

    function addParticles(count) {
      for (let i = 0; i < count; i++) {
        createParticle();
      }
    }

    function resetSimulation() {
      clearParticles();

      state.pistonY = 7;
      piston.position.y = state.pistonY;
      state.difficulty = 1;
      state.heated = false;
      state.cooled = false;
      state.particlesAdded = 0;

      addParticles(20);
    }

    function applySpeedMultiplier(mult) {
      for (const p of particles) {
        p.velocity.multiplyScalar(mult);
      }
    }

    function rebuildForDifficulty(level) {
      const targetCount = 20 + (level - 1) * 10;
      while (particles.length < targetCount) createParticle();
      while (particles.length > targetCount) {
        const p = particles.pop();
        scene.remove(p.mesh);
        p.mesh.geometry.dispose();
        p.mesh.material.dispose();
      }
    }

    function onKeyDown(e) {
      switch (e.key) {
        case 'ArrowUp':
          state.pistonY = Math.max(3, state.pistonY - 0.5);
          piston.position.y = state.pistonY;
          clampParticlesBelowPiston();
          break;

        case 'ArrowDown':
          state.pistonY = Math.min(7, state.pistonY + 0.5);
          piston.position.y = state.pistonY;
          break;

        case 'h':
        case 'H':
          applySpeedMultiplier(1.5);
          state.heated = true;
          state.cooled = false;
          break;

        case 'c':
        case 'C':
          applySpeedMultiplier(0.5);
          state.cooled = true;
          state.heated = false;
          break;

        case 'd':
        case 'D':
          if (state.difficulty < 5) {
            state.difficulty += 1;
            rebuildForDifficulty(state.difficulty);
            applySpeedMultiplier(1.2);
          }
          break;

        case 'r':
        case 'R':
          resetSimulation();
          break;
      }
    }

    function clampParticlesBelowPiston() {
      for (const p of particles) {
        if (p.position.y > state.pistonY - p.radius) {
          p.position.y = state.pistonY - p.radius;
          if (p.velocity.y > 0) p.velocity.y *= -restitution;
          p.mesh.position.copy(p.position);
        }
      }
    }

    function updateParticles(dt) {
      const maxDt = Math.min(dt, 0.03);

      for (const p of particles) {
        p.position.addScaledVector(p.velocity, maxDt);

        if (p.position.x - p.radius < bounds.minX) {
          p.position.x = bounds.minX + p.radius;
          p.velocity.x *= -restitution;
        } else if (p.position.x + p.radius > bounds.maxX) {
          p.position.x = bounds.maxX - p.radius;
          p.velocity.x *= -restitution;
        }

        if (p.position.z - p.radius < bounds.minZ) {
          p.position.z = bounds.minZ + p.radius;
          p.velocity.z *= -restitution;
        } else if (p.position.z + p.radius > bounds.maxZ) {
          p.position.z = bounds.maxZ - p.radius;
          p.velocity.z *= -restitution;
        }

        if (p.position.y - p.radius < bounds.minY) {
          p.position.y = bounds.minY + p.radius;
          p.velocity.y *= -restitution;
        } else if (p.position.y + p.radius > state.pistonY) {
          p.position.y = state.pistonY - p.radius;
          p.velocity.y *= -restitution;
        }
      }

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const a = particles[i];
          const b = particles[j];
          const dist = a.position.distanceTo(b.position);
          const minDist = a.radius + b.radius;

          if (dist < minDist && dist > 0) {
            const temp = a.velocity.clone();
            a.velocity.copy(b.velocity);
            b.velocity.copy(temp);

            const normal = new THREE.Vector3().subVectors(a.position, b.position).normalize();
            const overlap = minDist - dist;
            a.position.addScaledVector(normal, overlap * 0.5);
            b.position.addScaledVector(normal, -overlap * 0.5);
          }
        }
      }

      for (const p of particles) {
        p.mesh.position.copy(p.position);
      }
    }

    function computeStats() {
      let totalKE = 0;
      let allParticlesInBounds = true;
      let nanFree = true;

      for (const p of particles) {
        const speedSq = p.velocity.lengthSq();
        const ke = 0.5 * speedSq;
        totalKE += ke;

        const inBounds =
          p.position.x >= bounds.minX - 1e-6 &&
          p.position.x <= bounds.maxX + 1e-6 &&
          p.position.z >= bounds.minZ - 1e-6 &&
          p.position.z <= bounds.maxZ + 1e-6 &&
          p.position.y >= bounds.minY - 1e-6 &&
          p.position.y <= state.pistonY + 1e-6;

        if (!inBounds) allParticlesInBounds = false;

        const values = [
          p.position.x, p.position.y, p.position.z,
          p.velocity.x, p.velocity.y, p.velocity.z
        ];

        if (values.some(v => Number.isNaN(v) || !Number.isFinite(v))) {
          nanFree = false;
        }
      }

      const N = particles.length;
      const avgKE = N > 0 ? totalKE / N : 0;
      const volume = 6 * 6 * (state.pistonY - 1);
      const pressure = volume > 0 ? (N * avgKE) / volume : 0;
      const temperature = avgKE * 500;

      state.particleCount = N;
      state.totalKE = totalKE;
      state.avgKE = avgKE;
      state.volume = volume;
      state.pressure = pressure;
      state.temperature = temperature;
      state.pistonY = piston.position.y;
      state.soldierLoaded = soldierLoaded;
      state.allParticlesInBounds = allParticlesInBounds;
      state.nanFree = nanFree;
      state.paused = false;

      window.__3D_STATE__ = state;
    }

    function updateHUD() {
      hud.innerHTML = `
        <strong>Gas Pressure Simulation</strong><br>
        Particle Count: ${state.particleCount}<br>
        Pressure: ${state.pressure.toFixed(2)}<br>
        Temperature: ${state.temperature.toFixed(2)}<br>
        Volume: ${state.volume.toFixed(2)}<br>
        Difficulty Level: ${state.difficulty}<br>
        Piston Y: ${state.pistonY.toFixed(2)}
      `;
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = clock.getDelta();

      updateParticles(dt);
      computeStats();
      updateHUD();

      controls.update();
      renderer.render(scene, camera);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }
  </script>
</body>
</html>
