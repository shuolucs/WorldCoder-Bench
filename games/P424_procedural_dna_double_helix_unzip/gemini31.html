<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Helicase Unzipping</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(10, 10, 46, 0.8);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #404060;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            width: 300px;
        }
        h1 {
            margin: 0 0 15px 0;
            font-size: 1.2rem;
            color: #4488ff;
            text-align: center;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 8px 12px;
            background: #4488ff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background: #2266dd;
        }
        button:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #btn-pause {
            background: #ffaa00;
        }
        #btn-pause:hover {
            background: #dd8800;
        }
        #btn-reset {
            background: #ff4444;
        }
        #btn-reset:hover {
            background: #dd2222;
        }
        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }
        input[type=range] {
            width: 100%;
        }
        #status-text {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
            color: #44ff88;
            min-height: 1.2em;
        }
        .duck-label {
            color: #ffffff;
            font-family: sans-serif;
            padding: 2px 6px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 4px;
            border: 1px solid #ffffff;
            font-size: 12px;
            pointer-events: none;
            margin-top: -20px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h1>DNA Helicase Unzipping</h1>
        <div class="stat-row">
            <span>Pairs Unzipped:</span>
            <span id="val-pairs">0 / 24</span>
        </div>
        <div class="stat-row">
            <span>Helicase Position Y:</span>
            <span id="val-pos">-12.0</span>
        </div>
        
        <div class="controls">
            <div class="btn-group">
                <button id="btn-start">Start Unzip</button>
                <button id="btn-pause" disabled>Pause</button>
            </div>
            <button id="btn-reset">Reset</button>
            
            <div class="slider-group">
                <label for="slider-speed">Speed: <span id="val-speed">2.0</span> units/sec</label>
                <input type="range" id="slider-speed" min="0.5" max="5.0" step="0.1" value="2.0">
            </div>
        </div>
        <div id="status-text"></div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            helicaseY: -12,
            pairsUnzipped: 0,
            totalPairs: 24,
            isUnzipping: false,
            isPaused: false,
            speed: 2.0,
            duckLoaded: false,
            unzipComplete: false,
            basePairStates: Array(24).fill('bonded'),
            helicaseVisible: false
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 25);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        container.appendChild(labelRenderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // --- DNA Construction ---
        const dnaGroup = new THREE.Group();
        scene.add(dnaGroup);

        const numPairs = 24;
        const radius = 3;
        const yStart = -12;
        const yStep = 1;
        const angleStep = Math.PI / 6;

        const matA = new THREE.MeshStandardMaterial({ color: 0x4488ff, roughness: 0.4, metalness: 0.1 });
        const matB = new THREE.MeshStandardMaterial({ color: 0xff4444, roughness: 0.4, metalness: 0.1 });
        const matBond = new THREE.MeshStandardMaterial({ color: 0x44ff88, transparent: true, opacity: 1, roughness: 0.6 });
        
        const sphereGeo = new THREE.SphereGeometry(0.3, 32, 32);
        const cylinderGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 16);
        cylinderGeo.rotateX(Math.PI / 2); // Orient along Z for easier lookAt

        const pairsData = [];

        function createConnection(p1, p2, material) {
            const mesh = new THREE.Mesh(cylinderGeo, material);
            updateConnection(mesh, p1, p2);
            return mesh;
        }

        function updateConnection(mesh, p1, p2) {
            const dist = p1.distanceTo(p2);
            if (dist === 0 || isNaN(dist)) return;
            mesh.position.copy(p1).lerp(p2, 0.5);
            mesh.scale.set(1, 1, dist);
            mesh.lookAt(p2);
        }

        for (let i = 0; i < numPairs; i++) {
            const angle = i * angleStep;
            const y = yStart + i * yStep;

            const posA = new THREE.Vector3(radius * Math.cos(angle), y, radius * Math.sin(angle));
            const posB = new THREE.Vector3(radius * Math.cos(angle + Math.PI), y, radius * Math.sin(angle + Math.PI));

            const sphereA = new THREE.Mesh(sphereGeo, matA);
            sphereA.position.copy(posA);
            const sphereB = new THREE.Mesh(sphereGeo, matB);
            sphereB.position.copy(posB);

            const bond = createConnection(posA, posB, matBond.clone());

            const radialA = new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize();
            const radialB = new THREE.Vector3(Math.cos(angle + Math.PI), 0, Math.sin(angle + Math.PI)).normalize();

            const pairObj = {
                index: i,
                y: y,
                sphereA, sphereB, bond,
                origPosA: posA.clone(), origPosB: posB.clone(),
                radialA, radialB,
                progress: 0,
                bbA: null, bbB: null // Backbone connections to previous pair
            };

            dnaGroup.add(sphereA, sphereB, bond);

            if (i > 0) {
                const prevPosA = pairsData[i - 1].origPosA;
                const prevPosB = pairsData[i - 1].origPosB;
                
                const bbA = createConnection(prevPosA, posA, matA);
                const bbB = createConnection(prevPosB, posB, matB);
                
                dnaGroup.add(bbA, bbB);
                pairObj.bbA = bbA;
                pairObj.bbB = bbB;
            }

            pairsData.push(pairObj);
        }

        // --- Duck (Helicase) ---
        const helicaseGroup = new THREE.Group();
        helicaseGroup.position.set(0, yStart, 0);
        scene.add(helicaseGroup);

        let duckModel = null;
        const loader = new GLTFLoader();
        loader.load(
            'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Duck/glTF-Binary/Duck.glb',
            function (gltf) {
                duckModel = gltf.scene;
                duckModel.scale.set(0.015, 0.015, 0.015);
                // Rotate duck to face up (+Y)
                duckModel.rotation.x = -Math.PI / 2;
                duckModel.rotation.z = Math.PI / 2; // Adjust facing direction
                
                helicaseGroup.add(duckModel);
                
                // Add Label
                const div = document.createElement('div');
                div.className = 'duck-label';
                div.textContent = 'Helicase';
                const label = new CSS2DObject(div);
                label.position.set(0, 1, 0);
                helicaseGroup.add(label);

                state.duckLoaded = true;
                state.helicaseVisible = true;
            },
            undefined,
            function (error) {
                console.error('Error loading Duck.glb:', error);
                // Fallback if duck fails to load
                const fallbackGeo = new THREE.ConeGeometry(1, 2, 16);
                const fallbackMat = new THREE.MeshStandardMaterial({color: 0xffff00});
                duckModel = new THREE.Mesh(fallbackGeo, fallbackMat);
                duckModel.rotation.x = Math.PI; // Point up
                helicaseGroup.add(duckModel);
                state.duckLoaded = true;
                state.helicaseVisible = true;
            }
        );

        // --- UI Elements & Events ---
        const btnStart = document.getElementById('btn-start');
        const btnPause = document.getElementById('btn-pause');
        const btnReset = document.getElementById('btn-reset');
        const sliderSpeed = document.getElementById('slider-speed');
        const valPairs = document.getElementById('val-pairs');
        const valPos = document.getElementById('val-pos');
        const valSpeed = document.getElementById('val-speed');
        const statusText = document.getElementById('status-text');

        btnStart.addEventListener('click', () => {
            if (state.unzipComplete) return;
            state.isUnzipping = true;
            state.isPaused = false;
            btnStart.disabled = true;
            btnPause.disabled = false;
            btnPause.textContent = 'Pause';
        });

        btnPause.addEventListener('click', () => {
            if (!state.isUnzipping) return;
            state.isPaused = !state.isPaused;
            btnPause.textContent = state.isPaused ? 'Resume' : 'Pause';
        });

        btnReset.addEventListener('click', resetScene);

        sliderSpeed.addEventListener('input', (e) => {
            state.speed = parseFloat(e.target.value);
            valSpeed.textContent = state.speed.toFixed(1);
        });

        function resetScene() {
            state.helicaseY = yStart;
            state.pairsUnzipped = 0;
            state.isUnzipping = false;
            state.isPaused = false;
            state.unzipComplete = false;
            state.basePairStates.fill('bonded');
            
            helicaseGroup.position.y = yStart;
            dnaGroup.rotation.y = 0;

            pairsData.forEach((pair, i) => {
                pair.progress = 0;
                pair.sphereA.position.copy(pair.origPosA);
                pair.sphereB.position.copy(pair.origPosB);
                
                pair.bond.visible = true;
                pair.bond.material.opacity = 1;
                updateConnection(pair.bond, pair.origPosA, pair.origPosB);

                if (pair.bbA) updateConnection(pair.bbA, pairsData[i-1].origPosA, pair.origPosA);
                if (pair.bbB) updateConnection(pair.bbB, pairsData[i-1].origPosB, pair.origPosB);
            });

            btnStart.disabled = false;
            btnPause.disabled = true;
            btnPause.textContent = 'Pause';
            statusText.textContent = '';
            updateUI();
        }

        function updateUI() {
            valPairs.textContent = `${state.pairsUnzipped} / ${state.totalPairs}`;
            valPos.textContent = state.helicaseY.toFixed(1);
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (!state.isUnzipping && !state.unzipComplete) {
                // Idle rotation
                dnaGroup.rotation.y += 0.1 * dt;
            }

            if (state.isUnzipping && !state.isPaused && !state.unzipComplete) {
                // Move helicase
                helicaseGroup.position.y += state.speed * dt;
                state.helicaseY = helicaseGroup.position.y;

                // Check and update pairs
                pairsData.forEach((pair, i) => {
                    if (state.basePairStates[i] === 'bonded' && helicaseGroup.position.y >= pair.y) {
                        state.basePairStates[i] = 'unzipping';
                    }

                    if (state.basePairStates[i] === 'unzipping') {
                        pair.progress += dt / 0.5; // 0.5s duration
                        
                        if (pair.progress >= 1) {
                            pair.progress = 1;
                            state.basePairStates[i] = 'unzipped';
                            state.pairsUnzipped++;
                            pair.bond.visible = false;
                            
                            if (state.pairsUnzipped === state.totalPairs) {
                                state.unzipComplete = true;
                                state.isUnzipping = false;
                                btnPause.disabled = true;
                                statusText.textContent = 'Replication Fork Complete!';
                            }
                        }

                        // Animate separation
                        const moveDist = 2 * pair.progress;
                        pair.sphereA.position.copy(pair.origPosA).add(pair.radialA.clone().multiplyScalar(moveDist));
                        pair.sphereB.position.copy(pair.origPosB).add(pair.radialB.clone().multiplyScalar(moveDist));

                        // Fade bond
                        if (pair.bond.visible) {
                            pair.bond.material.opacity = 1 - pair.progress;
                            updateConnection(pair.bond, pair.sphereA.position, pair.sphereB.position);
                        }

                        // Update backbones connected to this pair
                        if (pair.bbA) updateConnection(pair.bbA, pairsData[i-1].sphereA.position, pair.sphereA.position);
                        if (pair.bbB) updateConnection(pair.bbB, pairsData[i-1].sphereB.position, pair.sphereB.position);
                        
                        // Update backbones of the NEXT pair if it exists
                        if (i < numPairs - 1) {
                            const nextPair = pairsData[i+1];
                            if (nextPair.bbA) updateConnection(nextPair.bbA, pair.sphereA.position, nextPair.sphereA.position);
                            if (nextPair.bbB) updateConnection(nextPair.bbB, pair.sphereB.position, nextPair.sphereB.position);
                        }
                    }
                });
                updateUI();
            }

            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        animate();
    </script>
</body>
</html>
