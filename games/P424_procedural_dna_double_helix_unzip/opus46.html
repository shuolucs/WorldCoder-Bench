<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DNA Helicase Unzipping</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  canvas { display: block; }
  
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    color: #ffffff;
    background: rgba(10, 10, 46, 0.85);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(68, 136, 255, 0.3);
    backdrop-filter: blur(10px);
    min-width: 260px;
    z-index: 100;
  }
  
  #hud h1 {
    font-size: 18px;
    margin-bottom: 12px;
    color: #4488ff;
    text-shadow: 0 0 10px rgba(68, 136, 255, 0.5);
  }
  
  #hud .info {
    font-size: 13px;
    margin-bottom: 6px;
    color: #aabbdd;
  }
  
  #hud .info span {
    color: #ffffff;
    font-weight: bold;
  }
  
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.2s;
  }
  
  #btn-start {
    background: linear-gradient(135deg, #44ff88, #22cc66);
    color: #0a0a2e;
  }
  #btn-start:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(68, 255, 136, 0.5); }
  
  #btn-pause {
    background: linear-gradient(135deg, #ffaa44, #cc8822);
    color: #0a0a2e;
  }
  #btn-pause:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 170, 68, 0.5); }
  
  #btn-reset {
    background: linear-gradient(135deg, #ff4444, #cc2222);
    color: #ffffff;
  }
  #btn-reset:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 68, 68, 0.5); }
  
  .slider-container {
    margin-top: 14px;
  }
  
  .slider-container label {
    font-size: 13px;
    color: #aabbdd;
  }
  
  #slider-speed {
    width: 100%;
    margin-top: 6px;
    accent-color: #4488ff;
  }
  
  #completion-msg {
    display: none;
    margin-top: 12px;
    padding: 10px;
    background: linear-gradient(135deg, rgba(68, 255, 136, 0.2), rgba(68, 136, 255, 0.2));
    border-radius: 8px;
    text-align: center;
    font-weight: bold;
    color: #44ff88;
    font-size: 14px;
    animation: pulse 1.5s infinite;
  }
  
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  
  #helicase-label {
    position: absolute;
    color: #ffdd44;
    font-size: 12px;
    font-weight: bold;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(255, 221, 68, 0.8);
    z-index: 50;
    transform: translate(-50%, -100%);
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="hud">
  <h1>🧬 DNA Helicase Unzipping</h1>
  <div class="info">Pairs Unzipped: <span id="info-pairs">0 / 24</span></div>
  <div class="info">Helicase Position Y: <span id="info-pos">-12.0</span></div>
  <div class="info">Speed: <span id="info-speed">2.0</span> units/sec</div>
  <div class="btn-row">
    <button class="btn" id="btn-start">▶ Start Unzip</button>
    <button class="btn" id="btn-pause">⏸ Pause</button>
    <button class="btn" id="btn-reset">↺ Reset</button>
  </div>
  <div class="slider-container">
    <label>Speed: <span id="speed-val">2.0</span></label>
    <input type="range" id="slider-speed" min="0.5" max="5.0" step="0.1" value="2.0">
  </div>
  <div id="completion-msg">🎉 Replication Fork Complete!</div>
</div>

<div id="helicase-label">🦆 Helicase</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 25);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
dirLight.position.set(10, 20, 10);
scene.add(dirLight);

// Add subtle fog
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// State
const state = {
  helicaseY: -12,
  pairsUnzipped: 0,
  totalPairs: 24,
  isUnzipping: false,
  isPaused: false,
  speed: 2.0,
  duckLoaded: false,
  unzipComplete: false,
  basePairStates: new Array(24).fill('bonded'),
  helicaseVisible: false
};
window.__3D_STATE__ = state;

// DNA Group
const dnaGroup = new THREE.Group();
scene.add(dnaGroup);

// Materials
const strandAMat = new THREE.MeshPhongMaterial({ color: 0x4488ff, shininess: 80 });
const strandBMat = new THREE.MeshPhongMaterial({ color: 0xff4444, shininess: 80 });
const bondMat = new THREE.MeshPhongMaterial({ color: 0x44ff88, shininess: 60, transparent: true, opacity: 1.0 });
const backboneAMat = new THREE.MeshPhongMaterial({ color: 0x4488ff, shininess: 40 });
const backboneBMat = new THREE.MeshPhongMaterial({ color: 0xff4444, shininess: 40 });

// Geometries
const sphereGeo = new THREE.SphereGeometry(0.3, 16, 12);
const bondGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 8);
const tubeGeo = new THREE.CylinderGeometry(0.1, 0.1, 1, 8);

// Base pair data
const basePairs = [];

function getHelixPos(i, isStrandB) {
  const angle = i * (Math.PI / 6) + (isStrandB ? Math.PI : 0);
  const x = 3 * Math.cos(angle);
  const z = 3 * Math.sin(angle);
  const y = -12 + i * 1.0;
  return new THREE.Vector3(x, y, z);
}

function getRadialDirection(i, isStrandB) {
  const angle = i * (Math.PI / 6) + (isStrandB ? Math.PI : 0);
  return new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle)).normalize();
}

function createCylinderBetween(posA, posB, geo, mat) {
  const dir = new THREE.Vector3().subVectors(posB, posA);
  const length = dir.length();
  const mid = new THREE.Vector3().addVectors(posA, posB).multiplyScalar(0.5);
  
  const mesh = new THREE.Mesh(geo, mat.clone());
  mesh.position.copy(mid);
  mesh.scale.y = length;
  
  const axis = new THREE.Vector3(0, 1, 0);
  const normalized = dir.clone().normalize();
  const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, normalized);
  mesh.quaternion.copy(quaternion);
  
  return mesh;
}

// Build DNA
function buildDNA() {
  // Clear existing
  while (dnaGroup.children.length > 0) {
    dnaGroup.remove(dnaGroup.children[0]);
  }
  basePairs.length = 0;
  
  for (let i = 0; i < 24; i++) {
    const pairGroup = new THREE.Group();
    
    const posA = getHelixPos(i, false);
    const posB = getHelixPos(i, true);
    
    // Backbone spheres
    const sphereA = new THREE.Mesh(sphereGeo, strandAMat.clone());
    sphereA.position.copy(posA);
    pairGroup.add(sphereA);
    
    const sphereB = new THREE.Mesh(sphereGeo, strandBMat.clone());
    sphereB.position.copy(posB);
    pairGroup.add(sphereB);
    
    // Hydrogen bond
    const bond = createCylinderBetween(posA, posB, bondGeo, bondMat);
    pairGroup.add(bond);
    
    // Store data
    const pairData = {
      index: i,
      group: pairGroup,
      sphereA: sphereA,
      sphereB: sphereB,
      bond: bond,
      origPosA: posA.clone(),
      origPosB: posB.clone(),
      radialA: getRadialDirection(i, false),
      radialB: getRadialDirection(i, true),
      unzipping: false,
      unzipProgress: 0,
      unzipped: false,
      backboneA: null,
      backboneB: null
    };
    
    basePairs.push(pairData);
    dnaGroup.add(pairGroup);
  }
  
  // Backbone connections between consecutive pairs
  for (let i = 0; i < 23; i++) {
    const posA1 = getHelixPos(i, false);
    const posA2 = getHelixPos(i + 1, false);
    const backboneA = createCylinderBetween(posA1, posA2, tubeGeo, backboneAMat);
    dnaGroup.add(backboneA);
    basePairs[i].backboneA = backboneA;
    basePairs[i].backboneAEndPos = posA2.clone();
    
    const posB1 = getHelixPos(i, true);
    const posB2 = getHelixPos(i + 1, true);
    const backboneB = createCylinderBetween(posB1, posB2, tubeGeo, backboneBMat);
    dnaGroup.add(backboneB);
    basePairs[i].backboneB = backboneB;
    basePairs[i].backboneBEndPos = posB2.clone();
  }
  
  // Add some particle effects around the helix
  addParticles();
}

// Particles
let particles;
function addParticles() {
  const count = 200;
  const positions = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 20;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 30;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 20;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({ color: 0x4488ff, size: 0.08, transparent: true, opacity: 0.4 });
  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

buildDNA();

// Duck (Helicase)
let duck = null;
const loader = new GLTFLoader();

loader.load(
  'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/Duck/glTF-Binary/Duck.glb',
  (gltf) => {
    duck = gltf.scene;
    duck.scale.set(0.015, 0.015, 0.015);
    duck.position.set(0, -12, 0);
    // Rotate to face upward
    duck.rotation.x = -Math.PI / 2;
    scene.add(duck);
    state.duckLoaded = true;
    state.helicaseVisible = true;
    console.log('Duck loaded successfully');
  },
  undefined,
  (error) => {
    console.warn('Could not load Duck.glb, creating placeholder', error);
    // Create a placeholder
    const group = new THREE.Group();
    const bodyGeo = new THREE.ConeGeometry(0.5, 1.2, 8);
    const bodyMat = new THREE.MeshPhongMaterial({ color: 0xffdd44, emissive: 0x443300 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.rotation.x = Math.PI;
    group.add(body);
    
    const headGeo = new THREE.SphereGeometry(0.35, 12, 8);
    const head = new THREE.Mesh(headGeo, bodyMat);
    head.position.y = 0.7;
    group.add(head);
    
    // Glow ring
    const ringGeo = new THREE.TorusGeometry(0.8, 0.1, 8, 16);
    const ringMat = new THREE.MeshPhongMaterial({ color: 0x44ff88, emissive: 0x22aa44, transparent: true, opacity: 0.6 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = Math.PI / 2;
    group.add(ring);
    
    duck = group;
    duck.position.set(0, -12, 0);
    scene.add(duck);
    state.duckLoaded = true;
    state.helicaseVisible = true;
  }
);

// UI Elements
const btnStart = document.getElementById('btn-start');
const btnPause = document.getElementById('btn-pause');
const btnReset = document.getElementById('btn-reset');
const sliderSpeed = document.getElementById('slider-speed');
const infoPairs = document.getElementById('info-pairs');
const infoPos = document.getElementById('info-pos');
const infoSpeed = document.getElementById('info-speed');
const speedVal = document.getElementById('speed-val');
const completionMsg = document.getElementById('completion-msg');
const helicaseLabel = document.getElementById('helicase-label');

sliderSpeed.addEventListener('input', () => {
  state.speed = parseFloat(sliderSpeed.value);
  speedVal.textContent = state.speed.toFixed(1);
  infoSpeed.textContent = state.speed.toFixed(1);
});

btnStart.addEventListener('click', () => {
  if (!state.isUnzipping && !state.unzipComplete) {
    state.isUnzipping = true;
    state.isPaused = false;
    btnStart.textContent = '▶ Running...';
    btnStart.disabled = true;
  }
});

btnPause.addEventListener('click', () => {
  if (state.isUnzipping) {
    state.isPaused = !state.isPaused;
    btnPause.textContent = state.isPaused ? '▶ Resume' : '⏸ Pause';
  }
});

btnReset.addEventListener('click', () => {
  resetAll();
});

function resetAll() {
  state.isUnzipping = false;
  state.isPaused = false;
  state.unzipComplete = false;
  state.helicaseY = -12;
  state.pairsUnzipped = 0;
  state.basePairStates = new Array(24).fill('bonded');
  
  btnStart.textContent = '▶ Start Unzip';
  btnStart.disabled = false;
  btnPause.textContent = '⏸ Pause';
  completionMsg.style.display = 'none';
  
  // Rebuild DNA
  buildDNA();
  
  // Reset duck position
  if (duck) {
    duck.position.set(0, -12, 0);
  }
  
  // Reset rotation
  dnaGroup.rotation.y = 0;
}

// Animation
const clock = new THREE.Clock();
let prevTime = 0;

function updateHelicaseLabel() {
  if (!duck || !state.helicaseVisible) {
    helicaseLabel.style.display = 'none';
    return;
  }
  
  const pos = new THREE.Vector3();
  pos.copy(duck.position);
  pos.y += 1.5;
  
  pos.project(camera);
  
  const x = (pos.x * 0.5 + 0.5) * window.innerWidth;
  const y = (-pos.y * 0.5 + 0.5) * window.innerHeight;
  
  if (pos.z > 1) {
    helicaseLabel.style.display = 'none';
  } else {
    helicaseLabel.style.display = 'block';
    helicaseLabel.style.left = x + 'px';
    helicaseLabel.style.top = y + 'px';
  }
}

function easeOutCubic(t) {
  return 1 - Math.pow(1 - t, 3);
}

function updateBackbone(pair, nextPair) {
  if (!pair.backboneA || !pair.backboneB) return;
  
  const currentPosA = pair.sphereA.position.clone();
  const nextPosA = nextPair ? nextPair.sphereA.position.clone() : null;
  
  if (nextPosA) {
    const dir = new THREE.Vector3().subVectors(nextPosA, currentPosA);
    const length = dir.length();
    const mid = new THREE.Vector3().addVectors(currentPosA, nextPosA).multiplyScalar(0.5);
    
    pair.backboneA.position.copy(mid);
    pair.backboneA.scale.y = length;
    const axis = new THREE.Vector3(0, 1, 0);
    const normalized = dir.clone().normalize();
    if (normalized.length() > 0.001) {
      const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, normalized);
      pair.backboneA.quaternion.copy(quaternion);
    }
  }
  
  const currentPosB = pair.sphereB.position.clone();
  const nextPosB = nextPair ? nextPair.sphereB.position.clone() : null;
  
  if (nextPosB) {
    const dir = new THREE.Vector3().subVectors(nextPosB, currentPosB);
    const length = dir.length();
    const mid = new THREE.Vector3().addVectors(currentPosB, nextPosB).multiplyScalar(0.5);
    
    pair.backboneB.position.copy(mid);
    pair.backboneB.scale.y = length;
    const axis = new THREE.Vector3(0, 1, 0);
    const normalized = dir.clone().normalize();
    if (normalized.length() > 0.001) {
      const quaternion = new THREE.Quaternion().setFromUnitVectors(axis, normalized);
      pair.backboneB.quaternion.copy(quaternion);
    }
  }
}

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime();
  
  // Idle rotation when not unzipping
  if (!state.isUnzipping) {
    dnaGroup.rotation.y += 0.1 * delta;
  }
  
  // Unzipping logic
  if (state.isUnzipping && !state.isPaused && !state.unzipComplete) {
    state.helicaseY += state.speed * delta;
    
    if (duck) {
      duck.position.y = state.helicaseY;
      // Slight wobble
      duck.position.x = Math.sin(elapsed * 3) * 0.3;
      duck.position.z = Math.cos(elapsed * 3) * 0.3;
      // Spin duck slightly
      duck.rotation.z = Math.sin(elapsed * 2) * 0.1;
    }
    
    // Check each base pair
    for (let i = 0; i < 24; i++) {
      const pair = basePairs[i];
      const pairY = -12 + i * 1.0;
      
      if (!pair.unzipping && !pair.unzipped && state.helicaseY >= pairY) {
        pair.unzipping = true;
        pair.unzipProgress = 0;
      }
      
      if (pair.unzipping && !pair.unzipped) {
        pair.unzipProgress += delta / 0.5; // 0.5 seconds for animation
        pair.unzipProgress = Math.min(pair.unzipProgress, 1.0);
        
        const ease = easeOutCubic(pair.unzipProgress);
        
        // Move spheres outward
        const offsetA = pair.radialA.clone().multiplyScalar(2 * ease);
        const offsetB = pair.radialB.clone().multiplyScalar(2 * ease);
        
        pair.sphereA.position.copy(pair.origPosA.clone().add(offsetA));
        pair.sphereB.position.copy(pair.origPosB.clone().add(offsetB));
        
        // Fade bond
        if (pair.bond.material) {
          pair.bond.material.opacity = 1.0 - ease;
          pair.bond.material.transparent = true;
        }
        
        // Update backbone connections
        if (i < 23) {
          updateBackbone(pair, basePairs[i + 1]);
        }
        if (i > 0) {
          updateBackbone(basePairs[i - 1], pair);
        }
        
        if (pair.unzipProgress >= 1.0) {
          pair.unzipped = true;
          pair.unzipping = false;
          pair.bond.visible = false;
          state.basePairStates[i] = 'unzipped';
          state.pairsUnzipped = state.basePairStates.filter(s => s === 'unzipped').length;
        }
      }
    }
    
    // Check completion
    if (state.pairsUnzipped >= 24) {
      state.unzipComplete = true;
      state.isUnzipping = false;
      completionMsg.style.display = 'block';
      btnStart.textContent = '✓ Complete';
    }
    
    // Clamp helicase Y
    if (state.helicaseY > 14) {
      state.helicaseY = 14;
    }
  }
  
  // Particle animation
  if (particles) {
    particles.rotation.y += 0.02 * delta;
  }
  
  // Update HUD
  infoPairs.textContent = `${state.pairsUnzipped} / 24`;
  infoPos.textContent = state.helicaseY.toFixed(1);
  
  // Update helicase label
  updateHelicaseLabel();
  
  controls.update();
  renderer.render(scene, camera);
}

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
