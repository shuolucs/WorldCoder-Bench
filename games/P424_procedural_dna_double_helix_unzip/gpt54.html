<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>DNA Helicase Unzipping</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 20;
      background: rgba(10, 10, 46, 0.82);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 14px 16px;
      min-width: 260px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }

    #hud h1 {
      margin: 0 0 10px 0;
      font-size: 20px;
      line-height: 1.2;
    }

    #hud .row {
      margin: 8px 0;
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: #2d6cdf;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: #3c7cf0;
    }

    button:active {
      transform: scale(0.98);
    }

    #btn-pause {
      background: #8a63d2;
    }

    #btn-reset {
      background: #d25555;
    }

    .slider-wrap {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    input[type="range"] {
      width: 100%;
    }

    #fork-message {
      margin-top: 10px;
      color: #7dffb3;
      font-weight: bold;
      display: none;
    }

    #helicase-label {
      position: absolute;
      z-index: 15;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      font-size: 12px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <h1>DNA Helicase Unzipping</h1>
      <div class="row">Pairs Unzipped: <span id="pairs-count">0 / 24</span></div>
      <div class="row">Helicase Position Y: <span id="helicase-y">-12.0</span></div>

      <div class="controls">
        <button id="btn-start">Start Unzip</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-reset">Reset</button>
      </div>

      <div class="slider-wrap">
        <label for="slider-speed">Speed: <span id="speed-value">2.0</span></label>
        <input id="slider-speed" type="range" min="0.5" max="5.0" step="0.1" value="2.0" />
      </div>

      <div id="fork-message">Replication Fork Complete!</div>
    </div>

    <div id="helicase-label">Helicase</div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

    const app = document.getElementById('app');
    const pairsCountEl = document.getElementById('pairs-count');
    const helicaseYEl = document.getElementById('helicase-y');
    const speedSlider = document.getElementById('slider-speed');
    const speedValueEl = document.getElementById('speed-value');
    const forkMessageEl = document.getElementById('fork-message');
    const btnStart = document.getElementById('btn-start');
    const btnPause = document.getElementById('btn-pause');
    const btnReset = document.getElementById('btn-reset');
    const helicaseLabel = document.getElementById('helicase-label');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5, 25);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);

    const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
    dirLight.position.set(10, 20, 10);
    scene.add(dirLight);

    const helixRoot = new THREE.Group();
    scene.add(helixRoot);

    const dnaGroup = new THREE.Group();
    helixRoot.add(dnaGroup);

    const totalPairs = 24;
    const pairSpacing = 1.0;
    const yStart = -12;
    const helixRadius = 3;
    const outwardDistance = 2;
    const unzipDuration = 0.5;
    const idleRotationSpeed = 0.1;

    const blueMat = new THREE.MeshStandardMaterial({ color: 0x4488ff });
    const redMat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
    const greenMatTemplate = new THREE.MeshStandardMaterial({
      color: 0x44ff88,
      transparent: true,
      opacity: 1
    });

    const sphereGeo = new THREE.SphereGeometry(0.3, 24, 24);
    const backboneGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 12);
    const bondGeo = new THREE.CylinderGeometry(0.08, 0.08, 1, 12);

    const basePairs = [];
    const strandAConnectors = [];
    const strandBConnectors = [];

    let duck = null;
    let duckAnchor = new THREE.Group();
    scene.add(duckAnchor);

    duckAnchor.position.set(0, yStart, 0);

    const loader = new GLTFLoader();

    function safeNum(v, fallback = 0) {
      return Number.isFinite(v) ? v : fallback;
    }

    function updateWorldState() {
      window.__3D_STATE__ = {
        helicaseY: safeNum(duckAnchor.position.y, yStart),
        pairsUnzipped: safeNum(basePairs.filter(p => p.state === 'unzipped').length, 0),
        totalPairs: totalPairs,
        isUnzipping: sim.isUnzipping,
        isPaused: sim.isPaused,
        speed: safeNum(sim.speed, 2.0),
        duckLoaded: sim.duckLoaded,
        unzipComplete: sim.unzipComplete,
        basePairStates: basePairs.map(p => p.state === 'unzipped' ? 'unzipped' : 'bonded'),
        helicaseVisible: duckAnchor.visible === true
      };
    }

    function makeCylinderBetweenPoints(p1, p2, geometry, material) {
      const mesh = new THREE.Mesh(geometry, material);
      positionCylinder(mesh, p1, p2);
      return mesh;
    }

    function positionCylinder(mesh, p1, p2) {
      const start = p1.clone();
      const end = p2.clone();
      const mid = new THREE.Vector3().addVectors(start, end).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(end, start);
      const len = Math.max(dir.length(), 0.0001);

      mesh.position.copy(mid);
      mesh.scale.set(1, len, 1);

      const axis = new THREE.Vector3(0, 1, 0);
      const quat = new THREE.Quaternion().setFromUnitVectors(axis, dir.clone().normalize());
      mesh.quaternion.copy(quat);
    }

    function createDNA() {
      for (let i = 0; i < totalPairs; i++) {
        const angle = i * (Math.PI / 6);
        const y = yStart + i * pairSpacing;

        const ax = helixRadius * Math.cos(angle);
        const az = helixRadius * Math.sin(angle);

        const bx = helixRadius * Math.cos(angle + Math.PI);
        const bz = helixRadius * Math.sin(angle + Math.PI);

        const pairGroup = new THREE.Group();
        dnaGroup.add(pairGroup);

        const sphereA = new THREE.Mesh(sphereGeo, blueMat.clone());
        sphereA.position.set(ax, y, az);
        pairGroup.add(sphereA);

        const sphereB = new THREE.Mesh(sphereGeo, redMat.clone());
        sphereB.position.set(bx, y, bz);
        pairGroup.add(sphereB);

        const bondMat = greenMatTemplate.clone();
        const bond = makeCylinderBetweenPoints(sphereA.position, sphereB.position, bondGeo, bondMat);
        pairGroup.add(bond);

        const radialA = new THREE.Vector3(ax, 0, az).normalize();
        const radialB = new THREE.Vector3(bx, 0, bz).normalize();

        const pair = {
          index: i,
          y,
          angle,
          group: pairGroup,
          sphereA,
          sphereB,
          bond,
          state: 'bonded',
          unzipping: false,
          unzipTime: 0,
          radialA,
          radialB,
          initialA: sphereA.position.clone(),
          initialB: sphereB.position.clone(),
          targetA: sphereA.position.clone().add(radialA.clone().multiplyScalar(outwardDistance)),
          targetB: sphereB.position.clone().add(radialB.clone().multiplyScalar(outwardDistance)),
          connectorAprev: null,
          connectorBprev: null,
          connectorAnext: null,
          connectorBnext: null
        };

        basePairs.push(pair);
      }

      for (let i = 0; i < totalPairs - 1; i++) {
        const pCurr = basePairs[i];
        const pNext = basePairs[i + 1];

        const connA = makeCylinderBetweenPoints(
          pCurr.sphereA.position,
          pNext.sphereA.position,
          backboneGeo,
          blueMat.clone()
        );
        dnaGroup.add(connA);
        strandAConnectors.push(connA);
        pCurr.connectorAnext = connA;
        pNext.connectorAprev = connA;

        const connB = makeCylinderBetweenPoints(
          pCurr.sphereB.position,
          pNext.sphereB.position,
          backboneGeo,
          redMat.clone()
        );
        dnaGroup.add(connB);
        strandBConnectors.push(connB);
        pCurr.connectorBnext = connB;
        pNext.connectorBprev = connB;
      }
    }

    function refreshConnectorsForPair(i) {
      const pair = basePairs[i];
      if (!pair) return;

      if (pair.connectorAprev && i > 0) {
        positionCylinder(pair.connectorAprev, basePairs[i - 1].sphereA.position, pair.sphereA.position);
      }
      if (pair.connectorAnext && i < totalPairs - 1) {
        positionCylinder(pair.connectorAnext, pair.sphereA.position, basePairs[i + 1].sphereA.position);
      }
      if (pair.connectorBprev && i > 0) {
        positionCylinder(pair.connectorBprev, basePairs[i - 1].sphereB.position, pair.sphereB.position);
      }
      if (pair.connectorBnext && i < totalPairs - 1) {
        positionCylinder(pair.connectorBnext, pair.sphereB.position, basePairs[i + 1].sphereB.position);
      }
    }

    createDNA();

    const sim = {
      isUnzipping: false,
      isPaused: false,
      speed: 2.0,
      duckLoaded: false,
      unzipComplete: false
    };

    loader.load(
      'Duck.glb',
      (gltf) => {
        duck = gltf.scene;
        duck.scale.setScalar(0.015);
        duck.position.set(0, 0, 0);

        duck.rotation.x = -Math.PI / 2;
        duck.rotation.z = 0;
        duck.rotation.y = 0;

        duck.traverse((obj) => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
          }
        });

        duckAnchor.add(duck);
        sim.duckLoaded = true;
        updateWorldState();
      },
      undefined,
      () => {
        const fallback = new THREE.Mesh(
          new THREE.SphereGeometry(0.5, 16, 16),
          new THREE.MeshStandardMaterial({ color: 0xffdd44 })
        );
        fallback.scale.setScalar(0.6);
        duck = fallback;
        duckAnchor.add(duck);
        sim.duckLoaded = false;
        updateWorldState();
      }
    );

    function startUnzip() {
      if (sim.unzipComplete) return;
      sim.isUnzipping = true;
      sim.isPaused = false;
      updatePauseButton();
      updateWorldState();
    }

    function togglePause() {
      if (!sim.isUnzipping && !sim.unzipComplete) return;
      sim.isPaused = !sim.isPaused;
      updatePauseButton();
      updateWorldState();
    }

    function updatePauseButton() {
      btnPause.textContent = sim.isPaused ? 'Resume' : 'Pause';
    }

    function resetSimulation() {
      sim.isUnzipping = false;
      sim.isPaused = false;
      sim.unzipComplete = false;
      updatePauseButton();

      duckAnchor.position.set(0, yStart, 0);
      duckAnchor.visible = true;

      for (let i = 0; i < basePairs.length; i++) {
        const pair = basePairs[i];
        pair.state = 'bonded';
        pair.unzipping = false;
        pair.unzipTime = 0;

        pair.sphereA.position.copy(pair.initialA);
        pair.sphereB.position.copy(pair.initialB);

        pair.bond.visible = true;
        pair.bond.material.opacity = 1;
        refreshConnectorsForPair(i);
      }

      forkMessageEl.style.display = 'none';
      updateHUD();
      updateWorldState();
    }

    function triggerPairUnzip(pair) {
      if (!pair || pair.state === 'unzipped' || pair.unzipping) return;
      pair.unzipping = true;
      pair.unzipTime = 0;
    }

    function updatePairAnimation(pair, dt) {
      if (!pair.unzipping) return;

      pair.unzipTime += dt;
      const t = Math.min(pair.unzipTime / unzipDuration, 1);
      const eased = 1 - Math.pow(1 - t, 3);

      pair.sphereA.position.lerpVectors(pair.initialA, pair.targetA, eased);
      pair.sphereB.position.lerpVectors(pair.initialB, pair.targetB, eased);

      pair.bond.material.opacity = 1 - eased;
      if (pair.bond.material.opacity <= 0.02) {
        pair.bond.visible = false;
      }

      refreshConnectorsForPair(pair.index);

      if (t >= 1) {
        pair.sphereA.position.copy(pair.targetA);
        pair.sphereB.position.copy(pair.targetB);
        pair.bond.material.opacity = 0;
        pair.bond.visible = false;
        pair.unzipping = false;
        pair.state = 'unzipped';
      }
    }

    function updateHUD() {
      const unzipped = basePairs.filter(p => p.state === 'unzipped').length;
      pairsCountEl.textContent = `${unzipped} / ${totalPairs}`;
      helicaseYEl.textContent = safeNum(duckAnchor.position.y, yStart).toFixed(1);
      speedValueEl.textContent = safeNum(sim.speed, 2).toFixed(1);

      if (sim.unzipComplete) {
        forkMessageEl.style.display = 'block';
      } else {
        forkMessageEl.style.display = 'none';
      }
    }

    function updateHelicaseLabel() {
      if (!duckAnchor.visible) {
        helicaseLabel.style.display = 'none';
        return;
      }

      const labelPos = duckAnchor.position.clone().add(new THREE.Vector3(0, 1.2, 0));
      labelPos.project(camera);

      const x = (labelPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-labelPos.y * 0.5 + 0.5) * window.innerHeight;

      const onScreen = labelPos.z < 1;
      helicaseLabel.style.display = onScreen ? 'block' : 'none';
      helicaseLabel.style.left = `${x}px`;
      helicaseLabel.style.top = `${y}px`;
    }

    btnStart.addEventListener('click', startUnzip);
    btnPause.addEventListener('click', togglePause);
    btnReset.addEventListener('click', resetSimulation);

    speedSlider.addEventListener('input', (e) => {
      sim.speed = safeNum(parseFloat(e.target.value), 2.0);
      updateHUD();
      updateWorldState();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      controls.update();

      if (!sim.isUnzipping) {
        helixRoot.rotation.y += idleRotationSpeed * dt;
      }

      if (sim.isUnzipping && !sim.isPaused && !sim.unzipComplete) {
        duckAnchor.position.y += sim.speed * dt;
        duckAnchor.position.y = Math.min(duckAnchor.position.y, yStart + (totalPairs - 1) * pairSpacing + 0.5);

        for (let i = 0; i < basePairs.length; i++) {
          const pair = basePairs[i];
          if (duckAnchor.position.y >= pair.y && pair.state === 'bonded' && !pair.unzipping) {
            triggerPairUnzip(pair);
          }
        }
      }

      for (const pair of basePairs) {
        updatePairAnimation(pair, dt);
      }

      const unzippedCount = basePairs.filter(p => p.state === 'unzipped').length;
      if (unzippedCount === totalPairs && !sim.unzipComplete) {
        sim.unzipComplete = true;
        sim.isUnzipping = false;
      }

      duckAnchor.position.y = safeNum(duckAnchor.position.y, yStart);

      updateHUD();
      updateHelicaseLabel();
      updateWorldState();

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    resetSimulation();
    animate();
  </script>
</body>
</html>
