<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miniature Gyroscope Precession Diorama</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: #0f0;
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
            border: 1px solid #333;
            min-width: 250px;
        }
        .hud-line {
            margin: 5px 0;
            display: flex;
            justify-content: space-between;
        }
        .hud-label {
            color: #aaa;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            flex-direction: column;
            align-items: center;
        }
        .btn {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #555;
        }
        #instructions {
            color: #aaa;
            font-size: 12px;
            text-align: center;
            background: rgba(0,0,0,0.5);
            padding: 5px 10px;
            border-radius: 4px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="hud">
        <div class="hud-line"><span class="hud-label">Spin Rate:</span> <span id="hud-spin">0.00</span> rad/s</div>
        <div class="hud-line"><span class="hud-label">Precession:</span> <span id="hud-prec">0.00</span> rad/s</div>
        <div class="hud-line"><span class="hud-label">Tilt Angle:</span> <span id="hud-tilt">0.0</span>°</div>
        <div class="hud-line"><span class="hud-label">Gravity:</span> <span id="hud-grav">ON</span></div>
        <div class="hud-line"><span class="hud-label">Time Scale:</span> <span id="hud-time">1.0x</span></div>
        <div class="hud-line"><span class="hud-label">Toppled:</span> <span id="hud-toppled">NO</span></div>
        <div class="hud-line"><span class="hud-label">Energy:</span> <span id="hud-energy">0.00</span> J</div>
    </div>

    <div id="controls">
        <div id="instructions">W: Boost | S: Brake | R: Reset | G: Gravity | T: Slow-Mo</div>
        <button id="trailBtn" class="btn">Toggle Trails</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- STATE MANAGEMENT ---
        window.__3D_STATE__ = {
            spinRate: 10.0,
            precessionRate: 0.0,
            precessionAngle: 0.0,
            tiltAngle: Math.PI / 6,
            nutationOffset: 0.0,
            gravityOn: true,
            timeScale: 1.0,
            toppled: false,
            trailsVisible: false,
            horseLoaded: false,
            frameCount: 0,
            totalEnergy: 0.0,
            discRotation: 0.0
        };

        const state = window.__3D_STATE__;

        // --- SCENE SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);
        scene.fog = new THREE.Fog(0x1a1a1a, 10, 30);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- LIGHTING ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 25;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // --- MATERIALS ---
        const woodMat = new THREE.MeshStandardMaterial({ 
            color: 0x8B4513, 
            roughness: 0.8, 
            metalness: 0.1 
        });
        const grayMat = new THREE.MeshStandardMaterial({ 
            color: 0x888888, 
            roughness: 0.5, 
            metalness: 0.5 
        });
        const goldMat = new THREE.MeshStandardMaterial({ 
            color: 0xFFD700, 
            roughness: 0.3, 
            metalness: 0.8 
        });
        const silverMat = new THREE.MeshStandardMaterial({ 
            color: 0xC0C0C0, 
            roughness: 0.4, 
            metalness: 0.7 
        });
        const darkGrayMat = new THREE.MeshStandardMaterial({ 
            color: 0x333333, 
            roughness: 0.6, 
            metalness: 0.4 
        });

        // --- ENVIRONMENT ---
        // Base Platform
        const baseGeom = new THREE.CylinderGeometry(6, 6, 0.2, 64);
        const base = new THREE.Mesh(baseGeom, woodMat);
        base.position.y = 0;
        base.receiveShadow = true;
        scene.add(base);

        // Grid Helper on base
        const grid = new THREE.GridHelper(12, 12, 0x000000, 0x000000);
        grid.position.y = 0.11;
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // Support Pillar
        const pillarGeom = new THREE.CylinderGeometry(0.1, 0.1, 2, 16);
        const pillar = new THREE.Mesh(pillarGeom, grayMat);
        pillar.position.y = 1; // Center is at y=1, top is at y=2
        pillar.castShadow = true;
        pillar.receiveShadow = true;
        scene.add(pillar);

        // --- GYROSCOPE ASSEMBLY ---
        // Pivot point at the top of the pillar (y=2)
        const pivotGroup = new THREE.Group();
        pivotGroup.position.set(0, 2, 0);
        scene.add(pivotGroup);

        // Handles Precession (rotation around Y)
        const precessionGroup = new THREE.Group();
        pivotGroup.add(precessionGroup);

        // Handles Tilt (rotation around Z)
        const tiltGroup = new THREE.Group();
        precessionGroup.add(tiltGroup);

        // Offset to center the gyro disc at y=3 (world), which is local y=1 from pivot
        const gyroCenter = new THREE.Group();
        gyroCenter.position.set(0, 1, 0);
        tiltGroup.add(gyroCenter);

        // Gimbal Ring
        const gimbalGeom = new THREE.TorusGeometry(2.0, 0.08, 16, 64);
        const gimbal = new THREE.Mesh(gimbalGeom, silverMat);
        gimbal.rotation.x = Math.PI / 2;
        gimbal.castShadow = true;
        gyroCenter.add(gimbal);

        // Spin Group (Handles rotation around local Y)
        const spinGroup = new THREE.Group();
        gyroCenter.add(spinGroup);

        // Spinning Disc
        const discGeom = new THREE.TorusGeometry(1.5, 0.15, 16, 64);
        const disc = new THREE.Mesh(discGeom, goldMat);
        disc.rotation.x = Math.PI / 2;
        disc.castShadow = true;
        spinGroup.add(disc);

        // Axle
        const axleGeom = new THREE.CylinderGeometry(0.05, 0.05, 3, 16);
        const axle = new THREE.Mesh(axleGeom, darkGrayMat);
        axle.castShadow = true;
        spinGroup.add(axle);

        // --- LOAD MODEL ---
        const loader = new GLTFLoader();
        loader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/models/gltf/Horse.glb', (gltf) => {
            const horse = gltf.scene;
            
            // The standard Three.js horse is quite large, scale it down
            horse.scale.set(0.006, 0.006, 0.006);
            
            // Position on the disc
            horse.position.set(1.2, 0.15, 0);
            
            // Make horse cast shadows
            horse.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    // Give it a nice material
                    child.material = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        roughness: 0.4,
                        metalness: 0.1
                    });
                }
            });

            spinGroup.add(horse);
            state.horseLoaded = true;
        });

        // --- TRAILS ---
        const trailMax = 150;
        const trailPositions = new Float32Array(trailMax * 3);
        const trailGeom = new THREE.BufferGeometry();
        trailGeom.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
        const trailMat = new THREE.LineBasicMaterial({ 
            color: 0x00ffff, 
            transparent: true, 
            opacity: 0.6,
            linewidth: 2
        });
        const trailLine = new THREE.Line(trailGeom, trailMat);
        trailLine.visible = false;
        scene.add(trailLine);
        
        let trailCount = 0;
        const tipLocalPos = new THREE.Vector3(0, 1.5, 0); // Top of the axle

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (key === 'w') {
                state.spinRate = Math.min(20.0, state.spinRate + 5.0);
                if (state.toppled && state.spinRate > 1.0) {
                    state.toppled = false;
                    // Slight recovery in tilt
                    state.tiltAngle = Math.max(Math.PI / 6, state.tiltAngle - 0.5);
                }
            } else if (key === 's') {
                state.spinRate = Math.max(0.0, state.spinRate - 2.0);
            } else if (key === 'r') {
                state.spinRate = 10.0;
                state.precessionRate = 0.0;
                state.precessionAngle = 0.0;
                state.tiltAngle = Math.PI / 6;
                state.nutationOffset = 0.0;
                state.toppled = false;
                state.discRotation = 0.0;
                trailCount = 0;
                trailGeom.setDrawRange(0, 0);
            } else if (key === 'g') {
                state.gravityOn = !state.gravityOn;
            } else if (key === 't') {
                state.timeScale = state.timeScale === 1.0 ? 0.25 : 1.0;
            }
        });

        document.getElementById('trailBtn').addEventListener('click', () => {
            state.trailsVisible = !state.trailsVisible;
            trailLine.visible = state.trailsVisible;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD ELEMENTS ---
        const elSpin = document.getElementById('hud-spin');
        const elPrec = document.getElementById('hud-prec');
        const elTilt = document.getElementById('hud-tilt');
        const elGrav = document.getElementById('hud-grav');
        const elTime = document.getElementById('hud-time');
        const elToppled = document.getElementById('hud-toppled');
        const elEnergy = document.getElementById('hud-energy');

        // --- ANIMATION LOOP ---
        const clock = new THREE.Clock();
        let totalTime = 0;

        function animate() {
            requestAnimationFrame(animate);

            const rawDt = clock.getDelta();
            const dt = rawDt * state.timeScale;
            totalTime += dt;
            state.frameCount++;

            // Physics Logic
            if (state.gravityOn) {
                if (!state.toppled) {
                    // Friction decay
                    state.spinRate *= (1.0 - 0.001 * dt);
                    
                    // Check topple condition
                    if (state.spinRate < 1.0) {
                        state.toppled = true;
                    }

                    // Precession Rate = (m*g*r) / (I*spinRate) -> simplified to 2.0 / spinRate
                    const safeSpin = Math.max(state.spinRate, 0.1);
                    state.precessionRate = 2.0 / safeSpin;

                    // Nutation (wobble)
                    state.nutationOffset = 0.05 * Math.sin(totalTime * 3.0);
                } else {
                    // Toppled state
                    state.tiltAngle = THREE.MathUtils.lerp(state.tiltAngle, Math.PI / 2, 2.0 * dt);
                    state.precessionRate = THREE.MathUtils.lerp(state.precessionRate, 0, 2.0 * dt);
                    state.spinRate = Math.max(0, state.spinRate - 5.0 * dt); // Rapid decay
                    state.nutationOffset *= 0.9; // Dampen nutation
                }
            } else {
                // Zero gravity
                state.precessionRate = 0;
                state.nutationOffset = 0;
                // Spin rate does not decay in zero-g for this simulation
            }

            // Prevent NaNs
            if (isNaN(state.spinRate)) state.spinRate = 0;
            if (isNaN(state.precessionRate)) state.precessionRate = 0;
            if (isNaN(state.tiltAngle)) state.tiltAngle = Math.PI / 6;

            // Apply Rotations
            state.discRotation += state.spinRate * dt;
            state.precessionAngle += state.precessionRate * dt;
            state.precessionAngle %= (2 * Math.PI);

            // Update Three.js Objects
            precessionGroup.rotation.y = state.precessionAngle;
            tiltGroup.rotation.z = state.tiltAngle + state.nutationOffset;
            spinGroup.rotation.y = state.discRotation;

            // Calculate Energy (E = 0.5 * I * w^2, assuming I=1)
            state.totalEnergy = 0.5 * 1.0 * state.spinRate * state.spinRate;

            // Update Trails
            if (state.trailsVisible && state.frameCount % 2 === 0) {
                const tipWorld = tipLocalPos.clone().applyMatrix4(spinGroup.matrixWorld);
                const positions = trailGeom.attributes.position.array;
                
                // Shift array
                for (let i = trailMax - 1; i > 0; i--) {
                    positions[i * 3] = positions[(i - 1) * 3];
                    positions[i * 3 + 1] = positions[(i - 1) * 3 + 1];
                    positions[i * 3 + 2] = positions[(i - 1) * 3 + 2];
                }
                
                // Add new point
                positions[0] = tipWorld.x;
                positions[1] = tipWorld.y;
                positions[2] = tipWorld.z;
                
                trailCount = Math.min(trailCount + 1, trailMax);
                trailGeom.setDrawRange(0, trailCount);
                trailGeom.attributes.position.needsUpdate = true;
            }

            // Update HUD
            elSpin.innerText = state.spinRate.toFixed(2);
            elPrec.innerText = state.precessionRate.toFixed(2);
            elTilt.innerText = THREE.MathUtils.radToDeg(state.tiltAngle + state.nutationOffset).toFixed(1);
            elGrav.innerText = state.gravityOn ? "ON" : "OFF";
            elGrav.style.color = state.gravityOn ? "#0f0" : "#f00";
            elTime.innerText = state.timeScale === 1.0 ? "1.0x" : "0.25x";
            elToppled.innerText = state.toppled ? "YES" : "NO";
            elToppled.style.color = state.toppled ? "#f00" : "#0f0";
            elEnergy.innerText = state.totalEnergy.toFixed(2);

            renderer.render(scene, camera);
        }

        // Start loop
        animate();
    </script>
</body>
</html>
