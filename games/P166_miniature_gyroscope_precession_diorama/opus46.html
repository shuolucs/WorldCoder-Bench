<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gyroscope Precession Diorama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #0f0;
    line-height: 1.8;
    pointer-events: none;
    z-index: 10;
  }
  #hud .label { color: #aaa; }
  #hud .value { color: #0f0; font-weight: bold; }
  #hud .warning { color: #f00; }
  #toggleTrails {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    font-size: 16px;
    font-family: 'Courier New', monospace;
    background: rgba(0,0,0,0.8);
    color: #FFD700;
    border: 2px solid #FFD700;
    border-radius: 6px;
    cursor: pointer;
    z-index: 10;
    transition: all 0.2s;
  }
  #toggleTrails:hover {
    background: #FFD700;
    color: #000;
  }
  #controls-help {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    color: #888;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: center;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="hud">
  <div><span class="label">Spin Rate: </span><span id="hud-spin" class="value">10.00</span> <span class="label">rad/s</span></div>
  <div><span class="label">Precession Rate: </span><span id="hud-prec" class="value">0.20</span> <span class="label">rad/s</span></div>
  <div><span class="label">Tilt Angle: </span><span id="hud-tilt" class="value">30.0</span><span class="label">°</span></div>
  <div><span class="label">Gravity: </span><span id="hud-grav" class="value">ON</span></div>
  <div><span class="label">Time Scale: </span><span id="hud-time" class="value">1.0x</span></div>
  <div><span class="label">Toppled: </span><span id="hud-toppled" class="value">NO</span></div>
</div>

<div id="controls-help">
  W: Spin Boost | S: Brake | R: Reset | G: Toggle Gravity | T: Slow-Motion
</div>

<button id="toggleTrails">Toggle Trails</button>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// --- State ---
const state = {
  spinRate: 10.0,
  precessionRate: 0.2,
  precessionAngle: 0.0,
  tiltAngle: Math.PI / 6,
  nutationOffset: 0.0,
  gravityOn: true,
  timeScale: 1.0,
  toppled: false,
  trailsVisible: false,
  horseLoaded: false,
  frameCount: 0,
  totalEnergy: 50.0,
  discRotation: 0.0
};
window.__3D_STATE__ = state;

// --- Scene Setup ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.Fog(0x1a1a2e, 15, 30);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 10);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 2, 0);

// --- Lights ---
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 10;
dirLight.shadow.camera.bottom = -10;
scene.add(dirLight);

const pointLight = new THREE.PointLight(0xFFD700, 0.3, 15);
pointLight.position.set(0, 5, 0);
scene.add(pointLight);

// --- Platform ---
const platformGeom = new THREE.CylinderGeometry(6, 6, 0.3, 64);
const platformMat = new THREE.MeshStandardMaterial({
  color: 0x8B4513,
  roughness: 0.8,
  metalness: 0.1
});
const platform = new THREE.Mesh(platformGeom, platformMat);
platform.position.y = -0.15;
platform.receiveShadow = true;
scene.add(platform);

// Wood grain rings on platform
const ringGeom = new THREE.RingGeometry(1, 1.05, 64);
const ringMat = new THREE.MeshStandardMaterial({ color: 0x6B3410, side: THREE.DoubleSide, roughness: 0.9 });
for (let i = 1; i <= 5; i++) {
  const ring = new THREE.Mesh(new THREE.RingGeometry(i * 1.0, i * 1.0 + 0.03, 64), ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.01;
  scene.add(ring);
}

// --- Support Pillar ---
const pillarGeom = new THREE.CylinderGeometry(0.1, 0.1, 2, 16);
const pillarMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.4, metalness: 0.6 });
const pillar = new THREE.Mesh(pillarGeom, pillarMat);
pillar.position.y = 1.0;
pillar.castShadow = true;
scene.add(pillar);

// Pillar base
const pillarBaseGeom = new THREE.CylinderGeometry(0.3, 0.4, 0.1, 16);
const pillarBase = new THREE.Mesh(pillarBaseGeom, pillarMat);
pillarBase.position.y = 0.05;
scene.add(pillarBase);

// Pillar top bearing
const bearingGeom = new THREE.SphereGeometry(0.15, 16, 16);
const bearingMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, roughness: 0.2, metalness: 0.8 });
const bearing = new THREE.Mesh(bearingGeom, bearingMat);
bearing.position.y = 2.0;
scene.add(bearing);

// --- Gyroscope Assembly ---
// The gyroscope group handles precession (rotation around Y)
const gyroscopePrecessionGroup = new THREE.Group();
gyroscopePrecessionGroup.position.y = 3.0;
scene.add(gyroscopePrecessionGroup);

// Tilt group handles the tilt from vertical
const gyroscopeTiltGroup = new THREE.Group();
gyroscopePrecessionGroup.add(gyroscopeTiltGroup);

// Spin group handles the disc spinning
const gyroscopeSpinGroup = new THREE.Group();
gyroscopeTiltGroup.add(gyroscopeSpinGroup);

// Disc (Torus)
const discGeom = new THREE.TorusGeometry(1.5, 0.15, 16, 64);
const discMat = new THREE.MeshStandardMaterial({
  color: 0xFFD700,
  roughness: 0.2,
  metalness: 0.8,
  emissive: 0x332200,
  emissiveIntensity: 0.1
});
const disc = new THREE.Mesh(discGeom, discMat);
disc.castShadow = true;
gyroscopeSpinGroup.add(disc);

// Disc fill (to make it look more solid)
const discFillGeom = new THREE.CircleGeometry(1.5, 64);
const discFillMat = new THREE.MeshStandardMaterial({
  color: 0xDAA520,
  roughness: 0.3,
  metalness: 0.7,
  side: THREE.DoubleSide
});
const discFill = new THREE.Mesh(discFillGeom, discFillMat);
gyroscopeSpinGroup.add(discFill);

// Spokes on the disc
for (let i = 0; i < 6; i++) {
  const angle = (i / 6) * Math.PI * 2;
  const spokeGeom = new THREE.CylinderGeometry(0.03, 0.03, 3, 8);
  const spokeMat = new THREE.MeshStandardMaterial({ color: 0xDAA520, roughness: 0.3, metalness: 0.7 });
  const spoke = new THREE.Mesh(spokeGeom, spokeMat);
  spoke.rotation.z = Math.PI / 2;
  spoke.rotation.y = angle;
  gyroscopeSpinGroup.add(spoke);
}

// Axle
const axleGeom = new THREE.CylinderGeometry(0.05, 0.05, 3, 8);
const axleMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.8 });
const axle = new THREE.Mesh(axleGeom, axleMat);
axle.rotation.x = Math.PI / 2;
gyroscopeTiltGroup.add(axle);

// Axle end caps
const capGeom = new THREE.SphereGeometry(0.08, 8, 8);
const capMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8, roughness: 0.2 });
const cap1 = new THREE.Mesh(capGeom, capMat);
cap1.position.z = 1.5;
gyroscopeTiltGroup.add(cap1);
const cap2 = new THREE.Mesh(capGeom, capMat);
cap2.position.z = -1.5;
gyroscopeTiltGroup.add(cap2);

// Gimbal Ring
const gimbalGeom = new THREE.TorusGeometry(2.0, 0.08, 16, 64);
const gimbalMat = new THREE.MeshStandardMaterial({
  color: 0xC0C0C0,
  roughness: 0.2,
  metalness: 0.9
});
const gimbal = new THREE.Mesh(gimbalGeom, gimbalMat);
gimbal.castShadow = true;
gyroscopeTiltGroup.add(gimbal);

// Connection rod from pillar top to gyroscope
const connGeom = new THREE.CylinderGeometry(0.04, 0.04, 1, 8);
const connMat = new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.7, roughness: 0.3 });
const connector = new THREE.Mesh(connGeom, connMat);
connector.position.y = -0.5;
gyroscopePrecessionGroup.add(connector);

// --- Horse Model ---
let horseModel = null;
const loader = new GLTFLoader();
loader.load(
  'https://threejs.org/examples/models/gltf/Horse.glb',
  (gltf) => {
    horseModel = gltf.scene;
    horseModel.scale.set(0.005, 0.005, 0.005);
    horseModel.position.set(0.5, 0.15, 0);
    horseModel.rotation.y = Math.PI / 2;
    horseModel.traverse((child) => {
      if (child.isMesh) {
        child.castShadow = true;
        child.material = new THREE.MeshStandardMaterial({
          color: 0xcc8844,
          roughness: 0.6,
          metalness: 0.2
        });
      }
    });
    gyroscopeSpinGroup.add(horseModel);
    state.horseLoaded = true;
    console.log('Horse model loaded successfully');
  },
  (progress) => {
    console.log('Loading horse:', (progress.loaded / (progress.total || 1) * 100).toFixed(1) + '%');
  },
  (error) => {
    console.warn('Could not load horse.glb, creating placeholder:', error);
    // Create a placeholder horse-like figure
    const bodyGeom = new THREE.BoxGeometry(0.6, 0.3, 0.25);
    const horseMat = new THREE.MeshStandardMaterial({ color: 0xcc8844, roughness: 0.6 });
    const body = new THREE.Mesh(bodyGeom, horseMat);
    body.position.set(0.5, 0.35, 0);

    const headGeom = new THREE.BoxGeometry(0.15, 0.25, 0.15);
    const head = new THREE.Mesh(headGeom, horseMat);
    head.position.set(0.85, 0.55, 0);
    head.rotation.z = 0.3;

    const legGeom = new THREE.CylinderGeometry(0.03, 0.03, 0.2, 6);
    const positions = [
      [0.3, 0.1, 0.08], [0.3, 0.1, -0.08],
      [0.7, 0.1, 0.08], [0.7, 0.1, -0.08]
    ];
    const placeholder = new THREE.Group();
    placeholder.add(body);
    placeholder.add(head);
    positions.forEach(p => {
      const leg = new THREE.Mesh(legGeom, horseMat);
      leg.position.set(p[0], p[1], p[2]);
      placeholder.add(leg);
    });
    gyroscopeSpinGroup.add(placeholder);
    state.horseLoaded = true;
  }
);

// --- Trail ---
const MAX_TRAIL_POINTS = 500;
const trailPositions = new Float32Array(MAX_TRAIL_POINTS * 3);
const trailGeometry = new THREE.BufferGeometry();
trailGeometry.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
trailGeometry.setDrawRange(0, 0);
const trailMaterial = new THREE.LineBasicMaterial({
  color: 0x00ff88,
  transparent: true,
  opacity: 0.7
});
const trailLine = new THREE.Line(trailGeometry, trailMaterial);
trailLine.visible = false;
scene.add(trailLine);
let trailIndex = 0;
let trailCount = 0;

// --- Grid helper ---
const gridHelper = new THREE.GridHelper(12, 12, 0x333333, 0x222222);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// --- Animation State ---
let elapsedTime = 0;
let lastTime = performance.now();
let toppleStartTime = -1;
let initialTiltWhenToppled = Math.PI / 6;

// --- HUD Elements ---
const hudSpin = document.getElementById('hud-spin');
const hudPrec = document.getElementById('hud-prec');
const hudTilt = document.getElementById('hud-tilt');
const hudGrav = document.getElementById('hud-grav');
const hudTime = document.getElementById('hud-time');
const hudToppled = document.getElementById('hud-toppled');

// --- Input Handling ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if (key === 'w') {
    state.spinRate = Math.min(state.spinRate + 5, 20);
    if (state.toppled && state.spinRate >= 1.0) {
      // Un-topple if we boost enough
      state.toppled = false;
      state.tiltAngle = Math.PI / 6;
      toppleStartTime = -1;
    }
  } else if (key === 's') {
    state.spinRate = Math.max(state.spinRate - 2, 0);
  } else if (key === 'r') {
    resetGyroscope();
  } else if (key === 'g') {
    state.gravityOn = !state.gravityOn;
  } else if (key === 't') {
    state.timeScale = state.timeScale === 1.0 ? 0.25 : 1.0;
  }
});

document.getElementById('toggleTrails').addEventListener('click', () => {
  state.trailsVisible = !state.trailsVisible;
  trailLine.visible = state.trailsVisible;
  if (!state.trailsVisible) {
    trailIndex = 0;
    trailCount = 0;
    trailGeometry.setDrawRange(0, 0);
  }
});

function resetGyroscope() {
  state.spinRate = 10.0;
  state.tiltAngle = Math.PI / 6;
  state.precessionAngle = 0.0;
  state.toppled = false;
  state.nutationOffset = 0.0;
  state.discRotation = 0.0;
  toppleStartTime = -1;
  elapsedTime = 0;
  trailIndex = 0;
  trailCount = 0;
  trailGeometry.setDrawRange(0, 0);
}

// --- Sanitize ---
function sanitize(val) {
  if (isNaN(val) || !isFinite(val)) return 0;
  return val;
}

// --- Animation Loop ---
function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  let rawDt = (now - lastTime) / 1000;
  lastTime = now;

  // Clamp dt to avoid huge jumps
  rawDt = Math.min(rawDt, 0.1);
  const dt = sanitize(rawDt * state.timeScale);

  elapsedTime += dt;
  state.frameCount++;

  if (state.gravityOn) {
    // Spin decay
    if (!state.toppled) {
      state.spinRate *= (1 - 0.001 * dt);
      state.spinRate = sanitize(state.spinRate);

      // Check topple condition
      if (state.spinRate < 1.0) {
        state.toppled = true;
        toppleStartTime = elapsedTime;
        initialTiltWhenToppled = state.tiltAngle;
      }
    }

    if (state.toppled) {
      // Topple: tilt increases rapidly to 90 degrees
      const toppleElapsed = elapsedTime - toppleStartTime;
      state.tiltAngle = sanitize(initialTiltWhenToppled + toppleElapsed * 1.5);
      if (state.tiltAngle > Math.PI / 2) {
        state.tiltAngle = Math.PI / 2;
      }
      // Spin continues to decay
      state.spinRate *= (1 - 0.01 * dt);
      state.spinRate = Math.max(sanitize(state.spinRate), 0);
      state.precessionRate = 0;
    } else {
      // Precession rate
      if (state.spinRate > 0.01) {
        state.precessionRate = sanitize(2.0 / state.spinRate);
      } else {
        state.precessionRate = 0;
      }

      // Nutation
      state.nutationOffset = sanitize(0.05 * Math.sin(elapsedTime * 3));

      // Update precession angle
      state.precessionAngle += sanitize(state.precessionRate * dt);
      // Wrap to [0, 2*PI]
      state.precessionAngle = sanitize(state.precessionAngle % (Math.PI * 2));
      if (state.precessionAngle < 0) state.precessionAngle += Math.PI * 2;
    }
  } else {
    // Gravity off: no precession, no decay
    state.precessionRate = 0;
    state.nutationOffset = 0;
  }

  // Update disc rotation
  state.discRotation += sanitize(state.spinRate * dt);
  state.discRotation = sanitize(state.discRotation);

  // Total energy
  state.totalEnergy = sanitize(0.5 * 1.0 * state.spinRate * state.spinRate);

  // --- Apply transforms ---
  // Precession: rotate the whole assembly around Y
  gyroscopePrecessionGroup.rotation.y = sanitize(state.precessionAngle);

  // Tilt: rotate around X axis
  const effectiveTilt = sanitize(state.tiltAngle + state.nutationOffset);
  gyroscopeTiltGroup.rotation.x = effectiveTilt;

  // Spin: rotate disc around its local Z axis (which is the axle direction after tilt)
  gyroscopeSpinGroup.rotation.z = sanitize(state.discRotation);

  // Disc and fill should be in XY plane, spinning around Z
  disc.rotation.x = 0;
  disc.rotation.y = 0;
  discFill.rotation.x = 0;
  discFill.rotation.y = 0;

  // Gimbal ring stays with tilt but doesn't spin
  // (it's already in tiltGroup, not spinGroup)

  // Point light follows gyroscope
  const tipY = 3.0 + Math.sin(effectiveTilt) * 1.5;
  const tipX = Math.sin(state.precessionAngle) * Math.sin(effectiveTilt) * 1.5;
  const tipZ = Math.cos(state.precessionAngle) * Math.sin(effectiveTilt) * 1.5;
  pointLight.position.set(sanitize(tipX), sanitize(tipY), sanitize(tipZ));

  // Gold glow based on spin rate
  const glowIntensity = Math.min(state.spinRate / 10, 1) * 0.3;
  discMat.emissiveIntensity = sanitize(glowIntensity);

  // --- Trail ---
  if (state.trailsVisible && !state.toppled) {
    // Compute the tip of the axle in world space
    const axleTipLocal = new THREE.Vector3(0, 0, 1.5);
    const worldMatrix = new THREE.Matrix4();
    // Build the world position of the axle tip
    const tipWorld = new THREE.Vector3();
    // The axle tip in tilt group local space is at (0, 0, 1.5)
    // After tilt rotation around X by effectiveTilt
    tipWorld.x = 0;
    tipWorld.y = 1.5 * Math.sin(effectiveTilt);
    tipWorld.z = 1.5 * Math.cos(effectiveTilt);
    // After precession rotation around Y
    const px = tipWorld.x * Math.cos(state.precessionAngle) + tipWorld.z * Math.sin(state.precessionAngle);
    const pz = -tipWorld.x * Math.sin(state.precessionAngle) + tipWorld.z * Math.cos(state.precessionAngle);
    tipWorld.x = sanitize(px);
    tipWorld.z = sanitize(pz);
    tipWorld.y = sanitize(tipWorld.y + 3.0); // offset by gyroscope height

    const idx = trailIndex % MAX_TRAIL_POINTS;
    trailPositions[idx * 3] = tipWorld.x;
    trailPositions[idx * 3 + 1] = tipWorld.y;
    trailPositions[idx * 3 + 2] = tipWorld.z;
    trailIndex++;
    trailCount = Math.min(trailCount + 1, MAX_TRAIL_POINTS);

    trailGeometry.attributes.position.needsUpdate = true;
    trailGeometry.setDrawRange(0, trailCount);
  }

  // --- Update HUD ---
  hudSpin.textContent = sanitize(state.spinRate).toFixed(2);
  hudPrec.textContent = sanitize(state.precessionRate).toFixed(2);
  hudTilt.textContent = sanitize(state.tiltAngle * 180 / Math.PI).toFixed(1);
  hudGrav.textContent = state.gravityOn ? 'ON' : 'OFF';
  hudGrav.className = state.gravityOn ? 'value' : 'warning';
  hudTime.textContent = state.timeScale + 'x';
  hudToppled.textContent = state.toppled ? 'YES' : 'NO';
  hudToppled.className = state.toppled ? 'warning' : 'value';

  // Spin rate color
  if (state.spinRate < 2) {
    hudSpin.style.color = '#f00';
  } else if (state.spinRate < 5) {
    hudSpin.style.color = '#ff0';
  } else {
    hudSpin.style.color = '#0f0';
  }

  controls.update();
  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Start
animate();
</script>
</body>
</html>
