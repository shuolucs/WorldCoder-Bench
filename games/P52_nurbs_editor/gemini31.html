<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NURBS Surface Editor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(30, 30, 30, 0.85);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #444;
            pointer-events: auto;
            user-select: none;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group:last-child {
            margin-bottom: 0;
        }
        label {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }
        input[type="range"] {
            margin-left: 10px;
            flex-grow: 1;
        }
        input[type="checkbox"] {
            margin-right: 10px;
            cursor: pointer;
        }
        #degree-val {
            display: inline-block;
            width: 20px;
            text-align: right;
            margin-left: 5px;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <div class="control-group">
            <label>
                Degree (U & V): 
                <input type="range" id="degree" min="2" max="5" step="1" value="3">
                <span id="degree-val">3</span>
            </label>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="showPolygon" checked>
                Show Control Polygon
            </label>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { NURBSSurface } from 'three/addons/curves/NURBSSurface.js';

        // --- State Initialization ---
        window.__3D_STATE__ = {
            controlPointCount: 25,
            degree: 3,
            surfaceVertexCount: 0,
            showPolygon: true
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 15, 25);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight2.position.set(-10, -10, -10);
        scene.add(dirLight2);

        scene.add(new THREE.GridHelper(30, 30, 0x444444, 0x333333));

        // --- Data Structures ---
        const GRID_SIZE = 5;
        const controlPoints = [];
        const pointMeshes = [];
        const controlGroup = new THREE.Group();
        scene.add(controlGroup);

        const pointGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const pointMaterial = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
        const pointHoverMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });

        // Initialize 5x5 Control Points
        for (let i = 0; i < GRID_SIZE; i++) {
            const row = [];
            for (let j = 0; j < GRID_SIZE; j++) {
                const x = (i - 2) * 4;
                const z = (j - 2) * 4;
                const y = Math.sin(x * 0.3) * Math.cos(z * 0.3) * 3; 
                
                row.push(new THREE.Vector4(x, y, z, 1));

                const mesh = new THREE.Mesh(pointGeometry, pointMaterial);
                mesh.position.set(x, y, z);
                mesh.userData = { u: i, v: j };
                controlGroup.add(mesh);
                pointMeshes.push(mesh);
            }
            controlPoints.push(row);
        }

        // --- Control Polygon ---
        const polygonGeometry = new THREE.BufferGeometry();
        const polygonMaterial = new THREE.LineBasicMaterial({ color: 0x888888, opacity: 0.5, transparent: true });
        const polygonLines = new THREE.LineSegments(polygonGeometry, polygonMaterial);
        controlGroup.add(polygonLines);

        function updatePolygon() {
            const positions = [];
            for (let i = 0; i < GRID_SIZE; i++) {
                for (let j = 0; j < GRID_SIZE; j++) {
                    if (j < GRID_SIZE - 1) {
                        positions.push(controlPoints[i][j].x, controlPoints[i][j].y, controlPoints[i][j].z);
                        positions.push(controlPoints[i][j+1].x, controlPoints[i][j+1].y, controlPoints[i][j+1].z);
                    }
                    if (i < GRID_SIZE - 1) {
                        positions.push(controlPoints[i][j].x, controlPoints[i][j].y, controlPoints[i][j].z);
                        positions.push(controlPoints[i+1][j].x, controlPoints[i+1][j].y, controlPoints[i+1][j].z);
                    }
                }
            }
            polygonGeometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        }

        // --- NURBS Surface ---
        const surfaceGeometry = new THREE.BufferGeometry();
        const surfaceMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2194ce, 
            side: THREE.DoubleSide,
            roughness: 0.4,
            metalness: 0.1
        });
        const surfaceMesh = new THREE.Mesh(surfaceGeometry, surfaceMaterial);
        scene.add(surfaceMesh);

        function getKnotVector(degree, count) {
            const knots = [];
            for (let i = 0; i <= degree; i++) knots.push(0);
            const numSegments = count - degree;
            for (let i = 1; i < numSegments; i++) knots.push(i / numSegments);
            for (let i = 0; i <= degree; i++) knots.push(1);
            return knots;
        }

        function getPaddedControlPoints(points, degree) {
            const targetSize = Math.max(GRID_SIZE, degree + 1);
            const newPoints = [];
            for (let i = 0; i < targetSize; i++) {
                const row = [];
                const srcI = Math.min(i, GRID_SIZE - 1);
                for (let j = 0; j < targetSize; j++) {
                    const srcJ = Math.min(j, GRID_SIZE - 1);
                    row.push(points[srcI][srcJ]);
                }
                newPoints.push(row);
            }
            return newPoints;
        }

        function updateSurface() {
            const degree = parseInt(document.getElementById('degree').value);
            
            // Pad control points if degree >= GRID_SIZE to maintain valid NURBS math
            const paddedPoints = getPaddedControlPoints(controlPoints, degree);
            const count = paddedPoints.length;
            const knots = getKnotVector(degree, count);

            const nurbsSurface = new NURBSSurface(degree, degree, knots, knots, paddedPoints);

            const res = 64;
            const vertices = [];
            const indices = [];
            const uvs = [];

            const target = new THREE.Vector3();
            for (let i = 0; i <= res; i++) {
                const u = i / res;
                for (let j = 0; j <= res; j++) {
                    const v = j / res;
                    nurbsSurface.getPoint(u, v, target);
                    vertices.push(target.x, target.y, target.z);
                    uvs.push(u, v);
                }
            }

            for (let i = 0; i < res; i++) {
                for (let j = 0; j < res; j++) {
                    const a = i * (res + 1) + j;
                    const b = i * (res + 1) + j + 1;
                    const c = (i + 1) * (res + 1) + j;
                    const d = (i + 1) * (res + 1) + j + 1;

                    indices.push(a, c, b);
                    indices.push(b, c, d);
                }
            }

            surfaceGeometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            surfaceGeometry.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
            surfaceGeometry.setIndex(indices);
            surfaceGeometry.computeVertexNormals();

            // Update State
            window.__3D_STATE__.degree = degree;
            window.__3D_STATE__.surfaceVertexCount = vertices.length / 3;
        }

        // Initial Build
        updatePolygon();
        updateSurface();

        // --- Interaction (Drag & Drop) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const dragPlane = new THREE.Plane();
        const dragOffset = new THREE.Vector3();
        let hoveredPoint = null;
        let draggedPoint = null;

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            if (draggedPoint) {
                raycaster.setFromCamera(mouse, camera);
                const intersect = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(dragPlane, intersect)) {
                    draggedPoint.position.copy(intersect.sub(dragOffset));
                    const { u, v } = draggedPoint.userData;
                    controlPoints[u][v].set(draggedPoint.position.x, draggedPoint.position.y, draggedPoint.position.z, 1);
                    updatePolygon();
                    updateSurface();
                }
            } else {
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(pointMeshes);
                if (intersects.length > 0) {
                    if (hoveredPoint !== intersects[0].object) {
                        if (hoveredPoint) hoveredPoint.material = pointMaterial;
                        hoveredPoint = intersects[0].object;
                        hoveredPoint.material = pointHoverMaterial;
                        document.body.style.cursor = 'pointer';
                    }
                } else {
                    if (hoveredPoint) {
                        hoveredPoint.material = pointMaterial;
                        hoveredPoint = null;
                        document.body.style.cursor = 'auto';
                    }
                }
            }
        });

        window.addEventListener('pointerdown', (e) => {
            if (e.target.tagName !== 'CANVAS') return;
            if (hoveredPoint) {
                controls.enabled = false;
                draggedPoint = hoveredPoint;
                dragPlane.setFromNormalAndCoplanarPoint(
                    camera.getWorldDirection(new THREE.Vector3()).negate(),
                    draggedPoint.position
                );
                raycaster.setFromCamera(mouse, camera);
                raycaster.ray.intersectPlane(dragPlane, dragOffset);
                dragOffset.sub(draggedPoint.position);
            }
        });

        window.addEventListener('pointerup', () => {
            controls.enabled = true;
            draggedPoint = null;
        });

        // --- UI Events ---
        const degreeInput = document.getElementById('degree');
        const degreeVal = document.getElementById('degree-val');
        const showPolygonInput = document.getElementById('showPolygon');

        degreeInput.addEventListener('input', (e) => {
            degreeVal.textContent = e.target.value;
            updateSurface();
        });

        showPolygonInput.addEventListener('change', (e) => {
            const visible = e.target.checked;
            controlGroup.visible = visible;
            window.__3D_STATE__.showPolygon = visible;
        });

        // --- Window Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
