<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NURBS Surface Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
  canvas { display: block; }
  #ui {
    position: absolute; top: 16px; left: 16px;
    background: rgba(10, 10, 30, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(100, 120, 255, 0.3);
    border-radius: 12px;
    padding: 20px;
    color: #e0e0ff;
    min-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  #ui h2 {
    margin-bottom: 16px;
    font-size: 18px;
    color: #a0b0ff;
    border-bottom: 1px solid rgba(100,120,255,0.2);
    padding-bottom: 8px;
  }
  .control-group {
    margin-bottom: 14px;
  }
  .control-group label {
    display: block;
    margin-bottom: 6px;
    font-size: 13px;
    color: #8090cc;
  }
  #degree {
    width: 100%;
    accent-color: #6070ff;
    cursor: pointer;
  }
  .checkbox-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }
  .checkbox-wrap input {
    width: 18px; height: 18px;
    accent-color: #6070ff;
    cursor: pointer;
  }
  .checkbox-wrap span {
    font-size: 14px;
  }
  #info {
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1px solid rgba(100,120,255,0.2);
    font-size: 12px;
    color: #6070aa;
    line-height: 1.6;
  }
  #degreeVal {
    color: #a0b0ff;
    font-weight: bold;
  }
  #hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,10,30,0.7);
    color: #6070aa;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 12px;
  }
</style>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
</head>
<body>
<div id="ui">
  <h2>NURBS Surface Editor</h2>
  <div class="control-group">
    <label>Degree (U & V): <span id="degreeVal">3</span></label>
    <input type="range" id="degree" min="2" max="5" value="3" step="1">
  </div>
  <div class="control-group">
    <div class="checkbox-wrap">
      <input type="checkbox" id="showPolygon" checked>
      <span>Show Control Polygon</span>
    </div>
  </div>
  <div id="info">
    Control Points: 25<br>
    Surface Vertices: <span id="vertCount">—</span><br>
    Drag control points to edit surface
  </div>
</div>
<div id="hint">Click & drag control points to reshape the surface · Scroll to zoom · Right-click to orbit</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ State ============
window.__3D_STATE__ = {
  controlPointCount: 25,
  degree: 3,
  surfaceVertexCount: 0,
  showPolygon: true
};

// ============ Scene Setup ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);
scene.fog = new THREE.FogExp2(0x1a1a2e, 0.015);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(8, 10, 12);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x404080, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(10, 15, 10);
dirLight.castShadow = true;
scene.add(dirLight);

const dirLight2 = new THREE.DirectionalLight(0x4060ff, 0.4);
dirLight2.position.set(-8, 5, -8);
scene.add(dirLight2);

// Grid helper
const gridHelper = new THREE.GridHelper(20, 20, 0x2a2a4e, 0x2a2a4e);
gridHelper.position.y = -3;
scene.add(gridHelper);

// ============ Control Points (5x5) ============
const GRID_U = 5;
const GRID_V = 5;
const TOTAL_CP = GRID_U * GRID_V;
const SAMPLE_RES = 64; // 64x64 sampling

// Initialize control points with slight wave
const controlPoints = [];
for (let i = 0; i < GRID_U; i++) {
  for (let j = 0; j < GRID_V; j++) {
    const x = (i - 2) * 2;
    const z = (j - 2) * 2;
    const y = Math.sin(i * 0.8) * Math.cos(j * 0.8) * 1.5;
    controlPoints.push(new THREE.Vector3(x, y, z));
  }
}

// Control point spheres
const cpSpheres = [];
const cpMaterial = new THREE.MeshPhongMaterial({ color: 0xff4466, emissive: 0x441122 });
const cpHoverMaterial = new THREE.MeshPhongMaterial({ color: 0xffaa44, emissive: 0x442211 });
const cpGeometry = new THREE.SphereGeometry(0.2, 16, 16);

const controlPointGroup = new THREE.Group();
scene.add(controlPointGroup);

for (let i = 0; i < TOTAL_CP; i++) {
  const sphere = new THREE.Mesh(cpGeometry, cpMaterial.clone());
  sphere.position.copy(controlPoints[i]);
  sphere.userData.cpIndex = i;
  sphere.castShadow = true;
  cpSpheres.push(sphere);
  controlPointGroup.add(sphere);
}

// Control polygon lines
const polygonGroup = new THREE.Group();
scene.add(polygonGroup);

function buildControlPolygon() {
  // Clear old
  while (polygonGroup.children.length > 0) {
    const child = polygonGroup.children[0];
    child.geometry.dispose();
    child.material.dispose();
    polygonGroup.remove(child);
  }

  const lineMat = new THREE.LineBasicMaterial({ color: 0x4466ff, opacity: 0.5, transparent: true });

  // U-direction lines
  for (let i = 0; i < GRID_U; i++) {
    const pts = [];
    for (let j = 0; j < GRID_V; j++) {
      pts.push(controlPoints[i * GRID_V + j]);
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    polygonGroup.add(new THREE.Line(geo, lineMat.clone()));
  }

  // V-direction lines
  for (let j = 0; j < GRID_V; j++) {
    const pts = [];
    for (let i = 0; i < GRID_U; i++) {
      pts.push(controlPoints[i * GRID_V + j]);
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    polygonGroup.add(new THREE.Line(geo, lineMat.clone()));
  }
}

buildControlPolygon();

// ============ B-Spline Basis Functions ============
function generateUniformKnots(n, p) {
  // n+1 control points, degree p => n+p+2 knots
  // Clamped uniform knot vector
  const m = n + p + 1;
  const knots = [];
  for (let i = 0; i <= m; i++) {
    if (i <= p) knots.push(0);
    else if (i >= m - p) knots.push(m - 2 * p);
    else knots.push(i - p);
  }
  // Normalize to [0, 1]
  const maxK = knots[knots.length - 1];
  for (let i = 0; i < knots.length; i++) {
    knots[i] /= maxK;
  }
  return knots;
}

function bsplineBasis(i, p, t, knots) {
  // Cox-de Boor recursion
  if (p === 0) {
    if (t >= knots[i] && t < knots[i + 1]) return 1.0;
    // Handle the last knot span
    if (t === knots[knots.length - 1] && t >= knots[i] && t <= knots[i + 1]) return 1.0;
    return 0.0;
  }

  let left = 0.0;
  let right = 0.0;

  const denom1 = knots[i + p] - knots[i];
  if (denom1 !== 0) {
    left = ((t - knots[i]) / denom1) * bsplineBasis(i, p - 1, t, knots);
  }

  const denom2 = knots[i + p + 1] - knots[i + 1];
  if (denom2 !== 0) {
    right = ((knots[i + p + 1] - t) / denom2) * bsplineBasis(i + 1, p - 1, t, knots);
  }

  return left + right;
}

// Precompute basis for performance
function precomputeBasis(numCP, degree, resolution) {
  const knots = generateUniformKnots(numCP - 1, degree);
  const basisValues = new Float64Array(resolution * numCP);

  for (let s = 0; s < resolution; s++) {
    const t = s / (resolution - 1);
    for (let i = 0; i < numCP; i++) {
      basisValues[s * numCP + i] = bsplineBasis(i, degree, t, knots);
    }
  }

  return basisValues;
}

// ============ Surface Generation ============
let surfaceMesh = null;
const surfaceMaterial = new THREE.MeshPhysicalMaterial({
  color: 0x4488ff,
  metalness: 0.1,
  roughness: 0.3,
  side: THREE.DoubleSide,
  clearcoat: 0.3,
  clearcoatRoughness: 0.2,
});

function buildSurface(degree) {
  const res = SAMPLE_RES + 1; // 65 points per direction

  // Precompute basis values for U and V
  const basisU = precomputeBasis(GRID_U, degree, res);
  const basisV = precomputeBasis(GRID_V, degree, res);

  const vertices = new Float32Array(res * res * 3);
  const normals = new Float32Array(res * res * 3);
  const uvs = new Float32Array(res * res * 2);

  // Evaluate surface points
  for (let si = 0; si < res; si++) {
    for (let sj = 0; sj < res; sj++) {
      let x = 0, y = 0, z = 0;

      for (let i = 0; i < GRID_U; i++) {
        const bu = basisU[si * GRID_U + i];
        if (bu === 0) continue;
        for (let j = 0; j < GRID_V; j++) {
          const bv = basisV[sj * GRID_V + j];
          if (bv === 0) continue;
          const w = bu * bv;
          const cp = controlPoints[i * GRID_V + j];
          x += w * cp.x;
          y += w * cp.y;
          z += w * cp.z;
        }
      }

      const idx = (si * res + sj);
      vertices[idx * 3] = x;
      vertices[idx * 3 + 1] = y;
      vertices[idx * 3 + 2] = z;

      uvs[idx * 2] = sj / (res - 1);
      uvs[idx * 2 + 1] = si / (res - 1);
    }
  }

  // Build index buffer
  const indices = [];
  for (let si = 0; si < res - 1; si++) {
    for (let sj = 0; sj < res - 1; sj++) {
      const a = si * res + sj;
      const b = a + 1;
      const c = (si + 1) * res + sj;
      const d = c + 1;
      indices.push(a, c, b);
      indices.push(b, c, d);
    }
  }

  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
  geometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geometry.setIndex(indices);
  geometry.computeVertexNormals();

  if (surfaceMesh) {
    surfaceMesh.geometry.dispose();
    surfaceMesh.geometry = geometry;
  } else {
    surfaceMesh = new THREE.Mesh(geometry, surfaceMaterial);
    surfaceMesh.castShadow = true;
    surfaceMesh.receiveShadow = true;
    scene.add(surfaceMesh);
  }

  const vertCount = res * res;
  window.__3D_STATE__.surfaceVertexCount = vertCount;
  document.getElementById('vertCount').textContent = vertCount;
}

// ============ Dragging ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let draggedSphere = null;
let dragPlane = new THREE.Plane();
let dragOffset = new THREE.Vector3();
let intersection = new THREE.Vector3();

function onPointerDown(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(cpSpheres);

  if (hits.length > 0) {
    controls.enabled = false;
    draggedSphere = hits[0].object;
    draggedSphere.material.color.set(0xffaa44);
    draggedSphere.material.emissive.set(0x442211);

    // Create drag plane facing camera through the hit point
    const camDir = new THREE.Vector3();
    camera.getWorldDirection(camDir);
    dragPlane.setFromNormalAndCoplanarPoint(camDir, draggedSphere.position);

    raycaster.ray.intersectPlane(dragPlane, intersection);
    dragOffset.copy(draggedSphere.position).sub(intersection);
  }
}

function onPointerMove(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

  if (draggedSphere) {
    raycaster.setFromCamera(mouse, camera);
    if (raycaster.ray.intersectPlane(dragPlane, intersection)) {
      const newPos = intersection.add(dragOffset);
      draggedSphere.position.copy(newPos);

      const idx = draggedSphere.userData.cpIndex;
      controlPoints[idx].copy(newPos);

      buildSurface(currentDegree);
      buildControlPolygon();
    }
  } else {
    // Hover effect
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(cpSpheres);
    cpSpheres.forEach(s => {
      if (s !== draggedSphere) {
        s.material.color.set(0xff4466);
        s.material.emissive.set(0x441122);
      }
    });
    if (hits.length > 0) {
      hits[0].object.material.color.set(0xffcc66);
      hits[0].object.material.emissive.set(0x443311);
      renderer.domElement.style.cursor = 'grab';
    } else {
      renderer.domElement.style.cursor = 'default';
    }
  }
}

function onPointerUp() {
  if (draggedSphere) {
    draggedSphere.material.color.set(0xff4466);
    draggedSphere.material.emissive.set(0x441122);
    draggedSphere = null;
    renderer.domElement.style.cursor = 'default';
  }
  controls.enabled = true;
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup', onPointerUp);

// ============ UI Controls ============
let currentDegree = 3;

const degreeSlider = document.getElementById('degree');
const degreeVal = document.getElementById('degreeVal');
const showPolygonCB = document.getElementById('showPolygon');

degreeSlider.addEventListener('input', (e) => {
  currentDegree = parseInt(e.target.value);
  degreeVal.textContent = currentDegree;
  window.__3D_STATE__.degree = currentDegree;
  buildSurface(currentDegree);
});

showPolygonCB.addEventListener('change', (e) => {
  const show = e.target.checked;
  controlPointGroup.visible = show;
  polygonGroup.visible = show;
  window.__3D_STATE__.showPolygon = show;
});

// ============ Resize ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ Init ============
buildSurface(currentDegree);

window.__3D_STATE__.controlPointCount = TOTAL_CP;
window.__3D_STATE__.degree = currentDegree;
window.__3D_STATE__.showPolygon = true;

// ============ Animate ============
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
