<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bowling Game - Three.js</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: white;
    }

    #hud-info {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      font-size: 18px;
      z-index: 10;
    }

    #phase-text {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(0,0,0,0.5);
      border-radius: 8px;
      font-size: 18px;
      text-align: center;
      z-index: 10;
      min-width: 420px;
    }

    #score-message {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      background: rgba(20,80,20,0.7);
      border-radius: 8px;
      font-size: 22px;
      z-index: 10;
      display: none;
    }

    #aim-display {
      position: absolute;
      top: 110px;
      left: 12px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.45);
      border-radius: 8px;
      font-size: 16px;
      z-index: 10;
    }

    #power-meter-container {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 240px;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.5);
      border-radius: 10px;
      overflow: hidden;
      z-index: 10;
    }

    #power-meter-fill {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #1eff00, #ffee00, #ff2a00);
      transition: height 0.02s linear;
    }

    #power-meter-label {
      position: absolute;
      right: 12px;
      top: calc(50% + 130px);
      transform: translateY(-50%);
      font-size: 14px;
      z-index: 10;
      background: rgba(0,0,0,0.4);
      padding: 6px 8px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="hud-info">Frame: 1 | Throw: 1 | Score: 0</div>
  <div id="aim-display">Aim X: 0.00</div>
  <div id="score-message"></div>
  <div id="phase-text">Use LEFT/RIGHT to aim, SPACE to start power meter</div>

  <div id="power-meter-container">
    <div id="power-meter-fill"></div>
  </div>
  <div id="power-meter-label">Power</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // Scene / Camera / Renderer
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x20232a);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 5, 18);
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = false;
    document.body.appendChild(renderer.domElement);

    // Lighting
    scene.add(new THREE.AmbientLight(0x404040, 0.6));

    const pointLight1 = new THREE.PointLight(0xffffff, 1.0, 100);
    pointLight1.position.set(-5, 10, 0);
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xffffff, 1.0, 100);
    pointLight2.position.set(5, 10, 0);
    scene.add(pointLight2);

    // Ground / Lane
    const laneGroup = new THREE.Group();
    scene.add(laneGroup);

    const laneMat = new THREE.MeshPhongMaterial({ color: 0xD2A06D });
    const laneGeo = new THREE.BoxGeometry(3.6, 0.1, 30);
    const lane = new THREE.Mesh(laneGeo, laneMat);
    lane.position.set(0, -0.05, 0);
    laneGroup.add(lane);

    const foulLineGeo = new THREE.BoxGeometry(3.6, 0.01, 0.05);
    const foulLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const foulLine = new THREE.Mesh(foulLineGeo, foulLineMat);
    foulLine.position.set(0, 0.001, 15);
    laneGroup.add(foulLine);

    const gutterMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
    const gutterGeo = new THREE.BoxGeometry(0.5, 0.08, 30);

    const leftGutter = new THREE.Mesh(gutterGeo, gutterMat);
    leftGutter.position.set(-2.05, -0.04, 0);
    laneGroup.add(leftGutter);

    const rightGutter = new THREE.Mesh(gutterGeo, gutterMat);
    rightGutter.position.set(2.05, -0.04, 0);
    laneGroup.add(rightGutter);

    // Simple environment walls/background
    const backWall = new THREE.Mesh(
      new THREE.PlaneGeometry(12, 6),
      new THREE.MeshPhongMaterial({ color: 0x2a2a35, side: THREE.DoubleSide })
    );
    backWall.position.set(0, 3, -16);
    scene.add(backWall);

    // Ball
    const ballRadius = 0.3;
    const ballGeo = new THREE.SphereGeometry(ballRadius, 32, 32);
    const ballMat = new THREE.MeshPhongMaterial({
      color: 0x1a1a8a,
      shininess: 80
    });
    const ball = new THREE.Mesh(ballGeo, ballMat);
    scene.add(ball);

    // Add finger holes for visual detail
    const holeMat = new THREE.MeshBasicMaterial({ color: 0x050515 });
    const holeGeo = new THREE.SphereGeometry(0.035, 10, 10);
    const hole1 = new THREE.Mesh(holeGeo, holeMat);
    hole1.position.set(0.07, 0.12, 0.24);
    const hole2 = new THREE.Mesh(holeGeo, holeMat);
    hole2.position.set(-0.02, 0.15, 0.25);
    const hole3 = new THREE.Mesh(holeGeo, holeMat);
    hole3.position.set(-0.11, 0.08, 0.24);
    ball.add(hole1, hole2, hole3);

    // Pins
    const pinGroup = new THREE.Group();
    scene.add(pinGroup);

    const pinGeo = new THREE.CylinderGeometry(0.08, 0.15, 0.6, 24);
    const pinMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 60 });

    const pinPositions = [
      { x: 0, y: 0.3, z: -12 },
      { x: -0.35, y: 0.3, z: -12.6 },
      { x: 0.35, y: 0.3, z: -12.6 },
      { x: -0.7, y: 0.3, z: -13.2 },
      { x: 0, y: 0.3, z: -13.2 },
      { x: 0.7, y: 0.3, z: -13.2 },
      { x: -1.05, y: 0.3, z: -13.8 },
      { x: -0.35, y: 0.3, z: -13.8 },
      { x: 0.35, y: 0.3, z: -13.8 },
      { x: 1.05, y: 0.3, z: -13.8 }
    ];

    const pins = [];
    function createPins() {
      while (pinGroup.children.length) pinGroup.remove(pinGroup.children[0]);
      pins.length = 0;

      for (let i = 0; i < pinPositions.length; i++) {
        const mesh = new THREE.Mesh(pinGeo, pinMat);
        mesh.position.set(pinPositions[i].x, pinPositions[i].y, pinPositions[i].z);

        const stripeGeo = new THREE.TorusGeometry(0.11, 0.015, 8, 24);
        const stripeMat = new THREE.MeshBasicMaterial({ color: 0xcc2222 });
        const stripe = new THREE.Mesh(stripeGeo, stripeMat);
        stripe.rotation.x = Math.PI / 2;
        stripe.position.y = 0.08;
        mesh.add(stripe);

        pinGroup.add(mesh);

        pins.push({
          mesh,
          standing: true,
          animatingFall: false,
          fallStartTime: 0,
          fallFromRotX: 0,
          fallToRotX: Math.PI / 2,
          fallFromY: 0.3,
          fallToY: 0.15
        });
      }
    }

    createPins();

    // UI elements
    const hudInfo = document.getElementById("hud-info");
    const phaseText = document.getElementById("phase-text");
    const scoreMessage = document.getElementById("score-message");
    const aimDisplay = document.getElementById("aim-display");
    const powerFill = document.getElementById("power-meter-fill");

    // Game State
    const state = {
      gamePhase: "aiming", // aiming, power, rolling, scored
      ballAimX: 0,
      ballSpeed: 0,
      power: 0,
      throwNumber: 1,
      frameScore: 0,
      totalScore: 0,
      currentFrame: 1,
      isGutterBall: false,
      ballPosition: { x: 0, y: 0.3, z: 14 },
      pinStates: new Array(10).fill(true),
      pinsDown: 0,
      pinsStanding: 10,
      powerStartTime: 0,
      scoringProcessedForThrow: false
    };

    window.__3D_STATE__ = state;

    function syncState() {
      state.ballPosition = {
        x: ball.position.x,
        y: ball.position.y,
        z: ball.position.z
      };
      state.pinStates = pins.map(p => p.standing);
      state.pinsStanding = pins.filter(p => p.standing).length;
      state.pinsDown = 10 - state.pinsStanding;
      window.__3D_STATE__ = state;
    }

    function resetBallForThrow() {
      ball.position.set(state.ballAimX, 0.3, 14);
      ball.rotation.set(0, 0, 0);
      state.ballSpeed = 0;
      state.power = 0;
      state.isGutterBall = false;
      state.scoringProcessedForThrow = false;
      syncState();
    }

    function resetAllPins() {
      for (let i = 0; i < pins.length; i++) {
        const p = pins[i];
        p.standing = true;
        p.animatingFall = false;
        p.mesh.position.set(pinPositions[i].x, pinPositions[i].y, pinPositions[i].z);
        p.mesh.rotation.set(0, 0, 0);
      }
      syncState();
    }

    function startNewFrame() {
      resetAllPins();
      state.frameScore = 0;
      state.throwNumber = 1;
      state.ballAimX = 0;
      state.gamePhase = "aiming";
      scoreMessage.style.display = "none";
      resetBallForThrow();
      updateUI();
    }

    function knockDownPin(index, currentTime) {
      const pin = pins[index];
      if (!pin || !pin.standing) return;

      pin.standing = false;
      pin.animatingFall = true;
      pin.fallStartTime = currentTime;
      pin.fallFromRotX = pin.mesh.rotation.x;
      pin.fallFromY = pin.mesh.position.y;
      pin.fallToRotX = Math.PI / 2;
      pin.fallToY = 0.15;
    }

    function triggerChainReaction(index, currentTime) {
      const source = pins[index];
      if (!source) return;

      for (let i = 0; i < pins.length; i++) {
        if (i === index) continue;
        const target = pins[i];
        if (!target.standing) continue;

        const dx = source.mesh.position.x - target.mesh.position.x;
        const dz = source.mesh.position.z - target.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist <= 0.5) {
          knockDownPin(i, currentTime);
        }
      }
    }

    function processBallPinCollisions(currentTime) {
      if (state.isGutterBall) return;

      for (let i = 0; i < pins.length; i++) {
        const pin = pins[i];
        if (!pin.standing) continue;

        const dx = ball.position.x - pin.mesh.position.x;
        const dz = ball.position.z - pin.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist <= 0.45) {
          knockDownPin(i, currentTime);
          triggerChainReaction(i, currentTime);
        }
      }
    }

    function updateFallingPins(currentTime) {
      for (const pin of pins) {
        if (!pin.animatingFall) continue;

        const duration = 300;
        const t = Math.min((currentTime - pin.fallStartTime) / duration, 1);
        const eased = 1 - Math.pow(1 - t, 3);

        pin.mesh.rotation.x = pin.fallFromRotX + (pin.fallToRotX - pin.fallFromRotX) * eased;
        pin.mesh.position.y = pin.fallFromY + (pin.fallToY - pin.fallFromY) * eased;

        if (t >= 1) {
          pin.animatingFall = false;
          pin.mesh.rotation.x = pin.fallToRotX;
          pin.mesh.position.y = pin.fallToY;
        }
      }
    }

    function countPinsDownThisThrow() {
      return pins.filter(p => !p.standing).length;
    }

    function endThrowScoring() {
      if (state.scoringProcessedForThrow) return;
      state.scoringProcessedForThrow = true;

      const totalDown = countPinsDownThisThrow();
      state.frameScore = totalDown;

      syncState();

      scoreMessage.innerText = `Throw ${state.throwNumber}: Knocked down ${state.pinsDown} pin${state.pinsDown !== 1 ? "s" : ""}`;
      scoreMessage.style.display = "block";

      state.gamePhase = "scored";

      const allDown = state.pinsDown === 10;

      if (state.throwNumber === 1) {
        if (allDown) {
          state.totalScore += 10;
          phaseText.innerText = "Strike! Press N for new frame.";
        } else {
          phaseText.innerText = "Press R to reset ball for second throw, or N for new frame.";
        }
      } else {
        state.totalScore += state.frameScore;
        phaseText.innerText = "Frame complete. Press N for new frame.";
      }

      updateUI();
      syncState();
    }

    function updateUI() {
      hudInfo.innerText = `Frame: ${state.currentFrame} | Throw: ${state.throwNumber} | Score: ${state.totalScore}`;
      aimDisplay.innerText = `Aim X: ${state.ballAimX.toFixed(2)}`;

      if (state.gamePhase === "aiming") {
        phaseText.innerText = "Use LEFT/RIGHT to aim, SPACE to start power meter";
      } else if (state.gamePhase === "power") {
        phaseText.innerText = "Press SPACE again to lock power";
      } else if (state.gamePhase === "rolling") {
        phaseText.innerText = state.isGutterBall ? "Gutter ball..." : "Ball rolling...";
      }
    }

    // Input
    const keys = {};
    window.addEventListener("keydown", (e) => {
      keys[e.code] = true;

      if (e.code === "Space") {
        e.preventDefault();

        if (state.gamePhase === "aiming") {
          state.gamePhase = "power";
          state.powerStartTime = performance.now();
          scoreMessage.style.display = "none";
          updateUI();
        } else if (state.gamePhase === "power") {
          // Lock power and throw
          state.gamePhase = "rolling";
          state.ballSpeed = 0.1 + (state.power / 100) * 0.3;
          updateUI();
          syncState();
        }
      }

      if (e.code === "KeyR" && state.gamePhase === "scored" && state.throwNumber === 1 && state.pinsDown < 10) {
        state.throwNumber = 2;
        state.gamePhase = "aiming";
        state.ballAimX = 0;
        resetBallForThrow();
        scoreMessage.style.display = "none";
        updateUI();
      }

      if (e.code === "KeyN" && state.gamePhase === "scored") {
        if (state.currentFrame < 10) {
          state.currentFrame += 1;
        } else {
          state.currentFrame = 1;
          state.totalScore = 0;
        }
        startNewFrame();
      }
    });

    window.addEventListener("keyup", (e) => {
      keys[e.code] = false;
    });

    function updatePowerMeter(now) {
      if (state.gamePhase === "power") {
        const elapsed = (now - state.powerStartTime) / 1000;
        // 2 second full cycle using sinusoidal oscillation
        const omega = Math.PI; // period 2s for sin(omega * t)
        const value = ((Math.sin(omega * elapsed - Math.PI / 2) + 1) / 2) * 100;
        state.power = value;
      }
      powerFill.style.height = `${state.power}%`;
    }

    function updateAiming() {
      if (state.gamePhase !== "aiming") return;

      if (keys["ArrowLeft"]) state.ballAimX -= 0.05;
      if (keys["ArrowRight"]) state.ballAimX += 0.05;

      state.ballAimX = Math.max(-1.5, Math.min(1.5, state.ballAimX));
      ball.position.x = state.ballAimX;
      ball.position.y = 0.3;
      ball.position.z = 14;
    }

    function updateBallRolling(now) {
      if (state.gamePhase !== "rolling") return;

      ball.position.z -= state.ballSpeed;

      if (ball.position.x < -1.8) ball.position.x = -1.8;
      if (ball.position.x > 1.8) ball.position.x = 1.8;

      if (Math.abs(ball.position.x) > 1.5) {
        state.isGutterBall = true;
      }

      ball.rotation.x -= state.ballSpeed / ballRadius;

      processBallPinCollisions(now);

      if (ball.position.z < -15 || Math.abs(ball.position.x) > 1.8) {
        endThrowScoring();
      }
    }

    // Initialize
    resetBallForThrow();
    updateUI();

    // Animation loop
    function animate(now) {
      requestAnimationFrame(animate);

      updateAiming();
      updatePowerMeter(now);
      updateBallRolling(now);
      updateFallingPins(now);
      syncState();
      updateUI();

      renderer.render(scene, camera);
    }
    requestAnimationFrame(animate);

    // Resize
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
