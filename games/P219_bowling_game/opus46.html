<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Bowling Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#hud-info {
    position: absolute;
    top: 15px;
    left: 15px;
    color: #fff;
    font-size: 18px;
    background: rgba(0,0,0,0.7);
    padding: 10px 18px;
    border-radius: 8px;
    z-index: 10;
    text-shadow: 1px 1px 2px #000;
}

#power-meter-container {
    position: absolute;
    right: 30px;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 300px;
    background: rgba(0,0,0,0.7);
    border: 2px solid #fff;
    border-radius: 8px;
    overflow: hidden;
    z-index: 10;
}

#power-meter-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 0%;
    background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
    transition: none;
    border-radius: 0 0 6px 6px;
}

#power-meter-label {
    position: absolute;
    right: 25px;
    top: calc(50% + 165px);
    color: #fff;
    font-size: 14px;
    z-index: 10;
    text-align: center;
    width: 50px;
}

#phase-text {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 16px;
    background: rgba(0,0,0,0.75);
    padding: 12px 24px;
    border-radius: 8px;
    z-index: 10;
    text-align: center;
    max-width: 600px;
    text-shadow: 1px 1px 2px #000;
}

#score-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: #fff;
    font-size: 36px;
    font-weight: bold;
    background: rgba(0,0,0,0.8);
    padding: 20px 40px;
    border-radius: 12px;
    z-index: 20;
    display: none;
    text-align: center;
    text-shadow: 2px 2px 4px #000;
}
</style>
</head>
<body>

<div id="hud-info">Frame: 1 | Throw: 1 | Score: 0</div>

<div id="power-meter-container">
    <div id="power-meter-fill"></div>
</div>
<div id="power-meter-label">POWER</div>

<div id="phase-text">Use LEFT/RIGHT to aim, SPACE to start power meter</div>
<div id="score-message"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function() {
    // ==================== GAME STATE ====================
    const state = {
        gamePhase: 'aiming',
        ballPosition: { x: 0, y: 0.3, z: 14 },
        ballAimX: 0,
        power: 0,
        pinsDown: 0,
        pinsStanding: 10,
        throwNumber: 1,
        frameScore: 0,
        isGutterBall: false,
        ballSpeed: 0,
        pinStates: [true, true, true, true, true, true, true, true, true, true],
        totalScore: 0,
        currentFrame: 1
    };
    window.__3D_STATE__ = state;

    // ==================== THREE.JS SETUP ====================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 25, 45);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 18);
    camera.lookAt(0, 0, -10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // ==================== LIGHTING ====================
    const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
    scene.add(ambientLight);

    const pointLight1 = new THREE.PointLight(0xffffff, 1.0, 50);
    pointLight1.position.set(-5, 10, 0);
    pointLight1.castShadow = true;
    scene.add(pointLight1);

    const pointLight2 = new THREE.PointLight(0xffffff, 1.0, 50);
    pointLight2.position.set(5, 10, 0);
    pointLight2.castShadow = true;
    scene.add(pointLight2);

    // Extra fill light near pins
    const pinLight = new THREE.PointLight(0xffffee, 0.5, 20);
    pinLight.position.set(0, 8, -12);
    scene.add(pinLight);

    // ==================== LANE ====================
    const laneGeometry = new THREE.PlaneGeometry(3.6, 30);
    const laneMaterial = new THREE.MeshPhongMaterial({ color: 0xD2A06D, shininess: 40 });
    const lane = new THREE.Mesh(laneGeometry, laneMaterial);
    lane.rotation.x = -Math.PI / 2;
    lane.position.set(0, 0, 0);
    lane.receiveShadow = true;
    scene.add(lane);

    // Lane lines (decorative)
    const lineGeom = new THREE.PlaneGeometry(0.02, 30);
    const lineMat = new THREE.MeshBasicMaterial({ color: 0xc49050 });
    for (let i = -1.5; i <= 1.5; i += 0.5) {
        const line = new THREE.Mesh(lineGeom, lineMat);
        line.rotation.x = -Math.PI / 2;
        line.position.set(i, 0.005, 0);
        scene.add(line);
    }

    // Foul line
    const foulLineGeom = new THREE.PlaneGeometry(3.6, 0.05);
    const foulLineMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
    const foulLine = new THREE.Mesh(foulLineGeom, foulLineMat);
    foulLine.rotation.x = -Math.PI / 2;
    foulLine.position.set(0, 0.005, 15);
    scene.add(foulLine);

    // Gutters
    const gutterGeometry = new THREE.BoxGeometry(0.5, 0.15, 30);
    const gutterMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });

    const gutterLeft = new THREE.Mesh(gutterGeometry, gutterMaterial);
    gutterLeft.position.set(-2.05, -0.05, 0);
    gutterLeft.receiveShadow = true;
    scene.add(gutterLeft);

    const gutterRight = new THREE.Mesh(gutterGeometry, gutterMaterial);
    gutterRight.position.set(2.05, -0.05, 0);
    gutterRight.receiveShadow = true;
    scene.add(gutterRight);

    // Side walls
    const wallGeom = new THREE.BoxGeometry(0.1, 0.5, 30);
    const wallMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const wallL = new THREE.Mesh(wallGeom, wallMat);
    wallL.position.set(-2.35, 0.15, 0);
    scene.add(wallL);
    const wallR = new THREE.Mesh(wallGeom, wallMat);
    wallR.position.set(2.35, 0.15, 0);
    scene.add(wallR);

    // Back wall
    const backWallGeom = new THREE.BoxGeometry(5, 2, 0.2);
    const backWallMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
    const backWall = new THREE.Mesh(backWallGeom, backWallMat);
    backWall.position.set(0, 1, -15.1);
    scene.add(backWall);

    // Floor beyond lane
    const floorGeom = new THREE.PlaneGeometry(20, 40);
    const floorMat = new THREE.MeshPhongMaterial({ color: 0x1a1a1a });
    const floor = new THREE.Mesh(floorGeom, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.position.set(0, -0.1, 0);
    scene.add(floor);

    // ==================== BOWLING BALL ====================
    const ballGeometry = new THREE.SphereGeometry(0.3, 32, 32);
    const ballMaterial = new THREE.MeshPhongMaterial({
        color: 0x1a1a8a,
        shininess: 100,
        specular: 0x4444ff
    });
    const ball = new THREE.Mesh(ballGeometry, ballMaterial);
    ball.position.set(0, 0.3, 14);
    ball.castShadow = true;
    scene.add(ball);

    // Ball finger holes (decorative)
    const holeGeom = new THREE.CircleGeometry(0.05, 16);
    const holeMat = new THREE.MeshBasicMaterial({ color: 0x0a0a4a });
    for (let i = 0; i < 3; i++) {
        const hole = new THREE.Mesh(holeGeom, holeMat);
        const angle = (i / 3) * Math.PI * 0.5 - 0.3;
        hole.position.set(Math.cos(angle) * 0.15, 0.3 + Math.sin(angle) * 0.15, 0);
        hole.lookAt(hole.position.x * 2, hole.position.y * 2, hole.position.z);
        ball.add(hole);
    }

    // ==================== PINS ====================
    const pinPositions = [
        { x: 0, y: 0.3, z: -12 },           // Pin 1
        { x: -0.35, y: 0.3, z: -12.6 },     // Pin 2
        { x: 0.35, y: 0.3, z: -12.6 },      // Pin 3
        { x: -0.7, y: 0.3, z: -13.2 },      // Pin 4
        { x: 0, y: 0.3, z: -13.2 },         // Pin 5
        { x: 0.7, y: 0.3, z: -13.2 },       // Pin 6
        { x: -1.05, y: 0.3, z: -13.8 },     // Pin 7
        { x: -0.35, y: 0.3, z: -13.8 },     // Pin 8
        { x: 0.35, y: 0.3, z: -13.8 },      // Pin 9
        { x: 1.05, y: 0.3, z: -13.8 }       // Pin 10
    ];

    // Pin adjacency for chain reactions
    const pinAdjacency = [
        [1, 2],       // Pin 0 -> 1, 2
        [0, 2, 3, 4], // Pin 1 -> 0, 2, 3, 4
        [0, 1, 4, 5], // Pin 2 -> 0, 1, 4, 5
        [1, 4, 6, 7], // Pin 3 -> 1, 4, 6, 7
        [1, 2, 3, 5, 7, 8], // Pin 4 -> 1, 2, 3, 5, 7, 8
        [2, 4, 8, 9], // Pin 5 -> 2, 4, 8, 9
        [3, 7],       // Pin 6 -> 3, 7
        [3, 4, 6, 8], // Pin 7 -> 3, 4, 6, 8
        [4, 5, 7, 9], // Pin 8 -> 4, 5, 7, 9
        [5, 8]        // Pin 9 -> 5, 8
    ];

    const pins = [];
    const pinGroups = [];
    const pinFallAnimations = [];

    function createPin(index) {
        const group = new THREE.Group();

        // Pin body - main cylinder
        const bodyGeom = new THREE.CylinderGeometry(0.08, 0.15, 0.4, 16);
        const pinMat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 60 });
        const body = new THREE.Mesh(bodyGeom, pinMat);
        body.position.y = 0;
        body.castShadow = true;
        group.add(body);

        // Pin neck
        const neckGeom = new THREE.CylinderGeometry(0.06, 0.08, 0.12, 16);
        const neck = new THREE.Mesh(neckGeom, pinMat);
        neck.position.y = 0.26;
        group.add(neck);

        // Pin head
        const headGeom = new THREE.SphereGeometry(0.065, 16, 16);
        const head = new THREE.Mesh(headGeom, pinMat);
        head.position.y = 0.35;
        group.add(head);

        // Red stripe
        const stripeGeom = new THREE.CylinderGeometry(0.082, 0.1, 0.04, 16);
        const stripeMat = new THREE.MeshPhongMaterial({ color: 0xcc0000 });
        const stripe = new THREE.Mesh(stripeGeom, stripeMat);
        stripe.position.y = 0.12;
        group.add(stripe);

        const pos = pinPositions[index];
        group.position.set(pos.x, pos.y, pos.z);

        scene.add(group);
        pinGroups.push(group);
        pins.push({
            group: group,
            originalPos: { ...pos },
            standing: true,
            fallProgress: 0,
            fallDirection: { x: 0, z: 1 },
            falling: false
        });
    }

    for (let i = 0; i < 10; i++) {
        createPin(i);
    }

    // ==================== ARROW INDICATOR ====================
    const arrowGroup = new THREE.Group();
    const arrowBodyGeom = new THREE.BoxGeometry(0.05, 0.02, 1.5);
    const arrowMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.7 });
    const arrowBody = new THREE.Mesh(arrowBodyGeom, arrowMat);
    arrowBody.position.z = -0.75;
    arrowGroup.add(arrowBody);

    const arrowHeadGeom = new THREE.ConeGeometry(0.1, 0.3, 8);
    const arrowHead = new THREE.Mesh(arrowHeadGeom, arrowMat);
    arrowHead.rotation.x = Math.PI / 2;
    arrowHead.position.z = -1.6;
    arrowGroup.add(arrowHead);

    arrowGroup.position.set(0, 0.31, 14);
    scene.add(arrowGroup);

    // ==================== INPUT HANDLING ====================
    const keys = {};
    document.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'Space') {
            e.preventDefault();
            handleSpace();
        }
        if (e.code === 'KeyR') {
            handleReset();
        }
        if (e.code === 'KeyN') {
            handleNewFrame();
        }
    });
    document.addEventListener('keyup', (e) => {
        keys[e.code] = false;
    });

    // ==================== GAME LOGIC ====================
    let powerOscillating = false;
    let powerTime = 0;
    let ballRolling = false;
    let currentBallSpeed = 0;
    let ballTotalDistance = 0;
    let scoreDisplayTimer = 0;
    let pinsKnockedThisThrow = 0;
    let firstThrowPins = 0;

    function handleSpace() {
        if (state.gamePhase === 'aiming') {
            state.gamePhase = 'power';
            powerOscillating = true;
            powerTime = 0;
            updatePhaseText();
        } else if (state.gamePhase === 'power') {
            powerOscillating = false;
            state.gamePhase = 'rolling';
            currentBallSpeed = 0.1 + (state.power / 100) * 0.3;
            state.ballSpeed = currentBallSpeed;
            ballRolling = true;
            ballTotalDistance = 0;
            state.isGutterBall = false;
            arrowGroup.visible = false;
            updatePhaseText();
        }
    }

    function handleReset() {
        if (state.gamePhase === 'scored' && state.throwNumber === 1) {
            state.throwNumber = 2;
            firstThrowPins = pinsKnockedThisThrow;
            resetBall();
            state.gamePhase = 'aiming';
            state.power = 0;
            arrowGroup.visible = true;
            updateHUD();
            updatePhaseText();
            hideScoreMessage();
        }
    }

    function handleNewFrame() {
        if (state.gamePhase === 'scored') {
            if (state.currentFrame < 10) {
                state.currentFrame++;
            }
            state.throwNumber = 1;
            state.frameScore = 0;
            firstThrowPins = 0;
            pinsKnockedThisThrow = 0;
            resetBall();
            resetAllPins();
            state.gamePhase = 'aiming';
            state.power = 0;
            arrowGroup.visible = true;
            updateHUD();
            updatePhaseText();
            hideScoreMessage();
        }
    }

    function resetBall() {
        ball.position.set(state.ballAimX, 0.3, 14);
        ball.rotation.set(0, 0, 0);
        state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
        state.ballSpeed = 0;
        ballRolling = false;
        currentBallSpeed = 0;
        ballTotalDistance = 0;
    }

    function resetAllPins() {
        for (let i = 0; i < 10; i++) {
            const pin = pins[i];
            pin.standing = true;
            pin.falling = false;
            pin.fallProgress = 0;
            pin.group.position.set(pin.originalPos.x, pin.originalPos.y, pin.originalPos.z);
            pin.group.rotation.set(0, 0, 0);
            state.pinStates[i] = true;
        }
        state.pinsDown = 0;
        state.pinsStanding = 10;
    }

    function knockDownPin(index, dirX, dirZ) {
        const pin = pins[index];
        if (!pin.standing) return;
        pin.standing = false;
        pin.falling = true;
        pin.fallProgress = 0;
        pin.fallDirection = { x: dirX || 0, z: dirZ || 1 };
        state.pinStates[index] = false;

        // Chain reaction
        setTimeout(() => {
            const adj = pinAdjacency[index];
            for (const adjIdx of adj) {
                if (pins[adjIdx].standing) {
                    const dx = pins[adjIdx].originalPos.x - pin.originalPos.x;
                    const dz = pins[adjIdx].originalPos.z - pin.originalPos.z;
                    const dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < 0.5) {
                        const len = Math.max(dist, 0.01);
                        knockDownPin(adjIdx, dx / len, dz / len);
                    }
                }
            }
        }, 100);
    }

    function checkCollisions() {
        if (state.isGutterBall) return;

        const bx = ball.position.x;
        const bz = ball.position.z;

        for (let i = 0; i < 10; i++) {
            if (!pins[i].standing) continue;
            const px = pins[i].originalPos.x;
            const pz = pins[i].originalPos.z;
            const dx = bx - px;
            const dz = bz - pz;
            const dist = Math.sqrt(dx * dx + dz * dz);

            if (dist < 0.45) {
                const len = Math.max(dist, 0.01);
                knockDownPin(i, dx / len, dz / len);
            }
        }
    }

    function countPinsDown() {
        let count = 0;
        for (let i = 0; i < 10; i++) {
            if (!pins[i].standing) count++;
        }
        return count;
    }

    function finishThrow() {
        ballRolling = false;
        state.gamePhase = 'scored';

        const totalDown = countPinsDown();
        pinsKnockedThisThrow = totalDown - (state.throwNumber === 2 ? firstThrowPins : 0);
        state.pinsDown = totalDown;
        state.pinsStanding = 10 - totalDown;
        state.frameScore = totalDown;
        state.totalScore += pinsKnockedThisThrow;

        updateHUD();

        let message = '';
        if (state.throwNumber === 1 && totalDown === 10) {
            message = '🎳 STRIKE! 🎳';
        } else if (state.throwNumber === 2 && totalDown === 10) {
            message = '🎳 SPARE! 🎳';
        } else if (state.isGutterBall) {
            message = 'Gutter Ball! 😢';
        } else {
            message = `Knocked down ${pinsKnockedThisThrow} pin${pinsKnockedThisThrow !== 1 ? 's' : ''}!`;
        }

        if (state.throwNumber === 1 && totalDown < 10) {
            message += '\nPress R for second throw';
        } else {
            message += '\nPress N for next frame';
        }

        showScoreMessage(message);
        updatePhaseText();
    }

    // ==================== UI UPDATES ====================
    const hudInfo = document.getElementById('hud-info');
    const powerMeterFill = document.getElementById('power-meter-fill');
    const phaseText = document.getElementById('phase-text');
    const scoreMessage = document.getElementById('score-message');

    function updateHUD() {
        hudInfo.textContent = `Frame: ${state.currentFrame} | Throw: ${state.throwNumber} | Score: ${state.totalScore}`;
    }

    function updatePhaseText() {
        switch (state.gamePhase) {
            case 'aiming':
                phaseText.textContent = 'Use LEFT/RIGHT arrows to aim, SPACE to start power meter';
                break;
            case 'power':
                phaseText.textContent = 'Press SPACE to lock in power!';
                break;
            case 'rolling':
                phaseText.textContent = 'Rolling...';
                break;
            case 'scored':
                if (state.throwNumber === 1 && state.pinsStanding > 0) {
                    phaseText.textContent = 'Press R for second throw, or N for new frame';
                } else {
                    phaseText.textContent = 'Press N for next frame';
                }
                break;
        }
    }

    function showScoreMessage(msg) {
        scoreMessage.textContent = msg;
        scoreMessage.style.display = 'block';
        scoreMessage.style.whiteSpace = 'pre-line';
    }

    function hideScoreMessage() {
        scoreMessage.style.display = 'none';
    }

    // ==================== ANIMATION LOOP ====================
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        const elapsed = clock.getElapsedTime();

        // Aiming phase
        if (state.gamePhase === 'aiming') {
            if (keys['ArrowLeft']) {
                state.ballAimX = Math.max(state.ballAimX - 0.05, -1.5);
            }
            if (keys['ArrowRight']) {
                state.ballAimX = Math.min(state.ballAimX + 0.05, 1.5);
            }
            ball.position.x = state.ballAimX;
            ball.position.z = 14;
            ball.position.y = 0.3;
            arrowGroup.position.x = state.ballAimX;
            arrowGroup.position.z = 14;
            arrowGroup.visible = true;
        }

        // Power phase
        if (state.gamePhase === 'power' && powerOscillating) {
            powerTime += delta;
            state.power = Math.abs(Math.sin(powerTime * Math.PI)) * 100;
            powerMeterFill.style.height = state.power + '%';
        }

        // Rolling phase
        if (state.gamePhase === 'rolling' && ballRolling) {
            ball.position.z -= currentBallSpeed;
            ballTotalDistance += currentBallSpeed;

            // Ball rotation
            ball.rotation.x -= currentBallSpeed / 0.3;

            // Check gutter
            if (Math.abs(ball.position.x) > 1.5) {
                state.isGutterBall = true;
                // Move ball into gutter
                if (ball.position.x > 1.5) ball.position.x = 1.8;
                if (ball.position.x < -1.5) ball.position.x = -1.8;
            }

            // Clamp ball to lane bounds
            ball.position.x = Math.max(-1.8, Math.min(1.8, ball.position.x));

            // Update state
            state.ballPosition = { x: ball.position.x, y: ball.position.y, z: ball.position.z };
            state.ballSpeed = currentBallSpeed;

            // Check pin collisions
            checkCollisions();

            // Check if ball passed pins
            if (ball.position.z < -15) {
                setTimeout(() => {
                    if (state.gamePhase === 'rolling') {
                        finishThrow();
                    }
                }, 500);
            }

            // Safety: stop if ball goes too far
            if (ball.position.z < -20) {
                if (state.gamePhase === 'rolling') {
                    finishThrow();
                }
            }
        }

        // Pin fall animations
        for (let i = 0; i < 10; i++) {
            const pin = pins[i];
            if (pin.falling && pin.fallProgress < 1) {
                pin.fallProgress += delta / 0.3;
                if (pin.fallProgress > 1) pin.fallProgress = 1;

                const t = pin.fallProgress;
                const eased = 1 - (1 - t) * (1 - t); // ease out quad

                // Rotate pin to fall
                const fallAngle = eased * Math.PI / 2;
                const dirX = pin.fallDirection.x;
                const dirZ = pin.fallDirection.z;

                // Calculate rotation axis perpendicular to fall direction
                pin.group.rotation.x = fallAngle * dirZ;
                pin.group.rotation.z = -fallAngle * dirX;

                // Lower the pin
                pin.group.position.y = pin.originalPos.y - eased * 0.15;

                // Slight displacement in fall direction
                pin.group.position.x = pin.originalPos.x + dirX * eased * 0.15;
                pin.group.position.z = pin.originalPos.z + dirZ * eased * 0.15;

                if (pin.fallProgress >= 1) {
                    pin.falling = false;
                }
            }
        }

        // Update pin counts
        state.pinsDown = countPinsDown();
        state.pinsStanding = 10 - state.pinsDown;

        // Arrow pulsing
        if (arrowGroup.visible) {
            const pulse = 0.5 + Math.sin(elapsed * 4) * 0.3;
            arrowGroup.children.forEach(child => {
                child.material.opacity = pulse;
            });
        }

        // Camera slight follow during rolling
        if (state.gamePhase === 'rolling') {
            const targetZ = Math.max(ball.position.z + 6, 5);
            camera.position.z += (targetZ - camera.position.z) * 0.02;
            camera.lookAt(0, 0, Math.min(ball.position.z - 5, -10));
        } else {
            camera.position.z += (18 - camera.position.z) * 0.05;
            camera.lookAt(0, 0, -10);
        }

        renderer.render(scene, camera);
    }

    // ==================== WINDOW RESIZE ====================
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ==================== START ====================
    updateHUD();
    updatePhaseText();
    animate();
})();
</script>
</body>
</html>
