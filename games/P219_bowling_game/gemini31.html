<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Bowling Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #hud-info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            border: 2px solid #444;
        }
        #power-meter-container {
            position: absolute;
            right: 40px;
            bottom: 40px;
            width: 40px;
            height: 300px;
            background: rgba(0, 0, 0, 0.7);
            border: 3px solid #fff;
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
        }
        #power-meter-fill {
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
            transition: height 0.05s linear;
        }
        #phase-text {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 30px;
            border-radius: 10px;
        }
        #score-message {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 64px;
            font-weight: bold;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.9);
            text-align: center;
            display: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 50px;
            border-radius: 15px;
            border: 3px solid #ffd700;
        }
        .aim-indicator {
            color: #aaa;
            font-size: 18px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="ui-layer">
        <div id="hud-info">Frame: 1 | Throw: 1 | Score: 0</div>
        <div id="power-meter-container">
            <div id="power-meter-fill"></div>
        </div>
        <div id="phase-text">
            <div>AIMING PHASE</div>
            <div class="aim-indicator">Use LEFT/RIGHT to aim, SPACE to start power</div>
        </div>
        <div id="score-message"></div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';

        // --- Game State ---
        window.__3D_STATE__ = {
            gamePhase: 'aiming', // 'aiming', 'power', 'rolling', 'scored'
            ballPosition: { x: 0, y: 0.3, z: 14 },
            ballAimX: 0,
            power: 0,
            pinsDown: 0,
            pinsStanding: 10,
            throwNumber: 1,
            frameScore: 0,
            isGutterBall: false,
            ballSpeed: 0,
            pinStates: Array(10).fill(true),
            totalScore: 0,
            currentFrame: 1
        };

        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 18);
        camera.lookAt(0, 0, -10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
        scene.add(ambientLight);

        const light1 = new THREE.PointLight(0xffffff, 1.0);
        light1.position.set(-5, 10, 0);
        light1.castShadow = true;
        scene.add(light1);

        const light2 = new THREE.PointLight(0xffffff, 1.0);
        light2.position.set(5, 10, 0);
        light2.castShadow = true;
        scene.add(light2);

        // --- Environment ---
        // Lane
        const laneGeometry = new THREE.PlaneGeometry(3.6, 30);
        const laneMaterial = new THREE.MeshPhongMaterial({ color: 0xD2A06D, shininess: 30 });
        const lane = new THREE.Mesh(laneGeometry, laneMaterial);
        lane.rotation.x = -Math.PI / 2;
        lane.receiveShadow = true;
        scene.add(lane);

        // Gutters
        const gutterGeometry = new THREE.PlaneGeometry(0.5, 30);
        const gutterMaterial = new THREE.MeshPhongMaterial({ color: 0x222222 });
        
        const leftGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
        leftGutter.rotation.x = -Math.PI / 2;
        leftGutter.position.set(-2.05, -0.05, 0);
        leftGutter.receiveShadow = true;
        scene.add(leftGutter);

        const rightGutter = new THREE.Mesh(gutterGeometry, gutterMaterial);
        rightGutter.rotation.x = -Math.PI / 2;
        rightGutter.position.set(2.05, -0.05, 0);
        rightGutter.receiveShadow = true;
        scene.add(rightGutter);

        // --- Objects ---
        // Ball
        const ballRadius = 0.3;
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMaterial = new THREE.MeshPhongMaterial({ color: 0x1a1a8a, shininess: 80 });
        const ball = new THREE.Mesh(ballGeometry, ballMaterial);
        ball.castShadow = true;
        scene.add(ball);

        // Pins
        const pins = [];
        const pinGeometry = new THREE.CylinderGeometry(0.08, 0.15, 0.6, 16);
        const pinMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 50 });
        
        const pinPositions = [
            { x: 0, z: -12 },
            { x: -0.35, z: -12.6 }, { x: 0.35, z: -12.6 },
            { x: -0.7, z: -13.2 }, { x: 0, z: -13.2 }, { x: 0.7, z: -13.2 },
            { x: -1.05, z: -13.8 }, { x: -0.35, z: -13.8 }, { x: 0.35, z: -13.8 }, { x: 1.05, z: -13.8 }
        ];

        function createPins() {
            pinPositions.forEach((pos, index) => {
                const pinMesh = new THREE.Mesh(pinGeometry, pinMaterial);
                pinMesh.position.set(pos.x, 0.3, pos.z);
                pinMesh.castShadow = true;
                scene.add(pinMesh);
                pins.push({
                    mesh: pinMesh,
                    initialPos: { x: pos.x, z: pos.z },
                    falling: false,
                    fallStartTime: 0
                });
            });
        }
        createPins();

        // --- Logic Variables ---
        const keys = { ArrowLeft: false, ArrowRight: false };
        let powerStartTime = 0;
        let lastTime = performance.now();

        // --- Input Handling ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                keys[e.code] = true;
            }
            
            if (e.code === 'Space') {
                if (state.gamePhase === 'aiming') {
                    state.gamePhase = 'power';
                    powerStartTime = performance.now();
                } else if (state.gamePhase === 'power') {
                    state.gamePhase = 'rolling';
                    state.ballSpeed = 0.1 + (state.power / 100) * 0.3;
                }
            }

            if (e.code === 'KeyR' && state.gamePhase === 'scored' && state.throwNumber === 1 && state.pinsStanding > 0) {
                resetForSecondThrow();
            }

            if (e.code === 'KeyN' && state.gamePhase === 'scored') {
                startNewFrame();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
                keys[e.code] = false;
            }
        });

        // --- Game Functions ---
        function resetBall() {
            state.ballAimX = 0;
            state.ballPosition = { x: 0, y: 0.3, z: 14 };
            ball.position.set(0, 0.3, 14);
            ball.rotation.set(0, 0, 0);
            state.power = 0;
            state.isGutterBall = false;
            state.ballSpeed = 0;
        }

        function resetForSecondThrow() {
            resetBall();
            state.throwNumber = 2;
            state.gamePhase = 'aiming';
            updateUI();
            document.getElementById('score-message').style.display = 'none';
        }

        function startNewFrame() {
            resetBall();
            state.currentFrame++;
            state.throwNumber = 1;
            state.frameScore = 0;
            state.pinsDown = 0;
            state.pinsStanding = 10;
            state.pinStates.fill(true);
            
            pins.forEach(pin => {
                pin.mesh.position.set(pin.initialPos.x, 0.3, pin.initialPos.z);
                pin.mesh.rotation.set(0, 0, 0);
                pin.falling = false;
            });

            state.gamePhase = 'aiming';
            updateUI();
            document.getElementById('score-message').style.display = 'none';
        }

        function knockPin(index) {
            if (state.pinStates[index]) {
                state.pinStates[index] = false;
                pins[index].falling = true;
                pins[index].fallStartTime = performance.now();
                state.pinsDown++;
                state.pinsStanding--;
                state.frameScore++;
                state.totalScore++;
            }
        }

        function updateUI() {
            document.getElementById('hud-info').innerText = `Frame: ${state.currentFrame} | Throw: ${state.throwNumber} | Score: ${state.totalScore}`;
            
            const phaseTextEl = document.getElementById('phase-text');
            if (state.gamePhase === 'aiming') {
                phaseTextEl.innerHTML = `<div>AIMING PHASE</div><div class="aim-indicator">Use LEFT/RIGHT to aim, SPACE to start power</div>`;
                phaseTextEl.style.display = 'block';
            } else if (state.gamePhase === 'power') {
                phaseTextEl.innerHTML = `<div>POWER PHASE</div><div class="aim-indicator">Press SPACE to lock power and throw</div>`;
                phaseTextEl.style.display = 'block';
            } else if (state.gamePhase === 'rolling') {
                phaseTextEl.style.display = 'none';
            } else if (state.gamePhase === 'scored') {
                phaseTextEl.style.display = 'block';
                if (state.pinsStanding === 0 && state.throwNumber === 1) {
                    phaseTextEl.innerHTML = `<div>STRIKE!</div><div class="aim-indicator">Press 'N' for Next Frame</div>`;
                } else if (state.pinsStanding === 0 && state.throwNumber === 2) {
                    phaseTextEl.innerHTML = `<div>SPARE!</div><div class="aim-indicator">Press 'N' for Next Frame</div>`;
                } else if (state.throwNumber === 1) {
                    phaseTextEl.innerHTML = `<div>THROW COMPLETE</div><div class="aim-indicator">Press 'R' for Second Throw</div>`;
                } else {
                    phaseTextEl.innerHTML = `<div>FRAME COMPLETE</div><div class="aim-indicator">Press 'N' for Next Frame</div>`;
                }
            }

            document.getElementById('power-meter-fill').style.height = `${state.power}%`;
        }

        function showScoreMessage() {
            const msgEl = document.getElementById('score-message');
            if (state.isGutterBall && state.frameScore === 0) {
                msgEl.innerText = "GUTTER BALL!";
                msgEl.style.color = "#888";
                msgEl.style.borderColor = "#888";
            } else if (state.pinsStanding === 0 && state.throwNumber === 1) {
                msgEl.innerText = "STRIKE!!!";
                msgEl.style.color = "#ff4444";
                msgEl.style.borderColor = "#ff4444";
            } else if (state.pinsStanding === 0 && state.throwNumber === 2) {
                msgEl.innerText = "SPARE!!";
                msgEl.style.color = "#44ff44";
                msgEl.style.borderColor = "#44ff44";
            } else {
                msgEl.innerText = `${state.frameScore} PINS`;
                msgEl.style.color = "#ffd700";
                msgEl.style.borderColor = "#ffd700";
            }
            msgEl.style.display = 'block';
        }

        // --- Main Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            const currentTime = performance.now();
            const dt = currentTime - lastTime;
            lastTime = currentTime;

            // Phase Logic
            if (state.gamePhase === 'aiming') {
                if (keys.ArrowLeft) state.ballAimX -= 0.05;
                if (keys.ArrowRight) state.ballAimX += 0.05;
                
                // Clamp aim
                state.ballAimX = Math.max(-1.5, Math.min(1.5, state.ballAimX));
                
                ball.position.x = state.ballAimX;
                state.ballPosition.x = state.ballAimX;
            } 
            else if (state.gamePhase === 'power') {
                // Oscillate power 0-100 every 2 seconds
                const elapsed = currentTime - powerStartTime;
                state.power = (Math.sin(elapsed / 1000 * Math.PI - Math.PI / 2) + 1) / 2 * 100;
            }
            else if (state.gamePhase === 'rolling') {
                // Move ball
                ball.position.z -= state.ballSpeed;
                ball.rotation.x -= state.ballSpeed / ballRadius;
                state.ballPosition.z = ball.position.z;

                // Check Gutter
                if (!state.isGutterBall && Math.abs(ball.position.x) > 1.5) {
                    state.isGutterBall = true;
                }

                if (state.isGutterBall) {
                    // Move into gutter visually
                    const targetX = ball.position.x > 0 ? 2.05 : -2.05;
                    ball.position.x += (targetX - ball.position.x) * 0.1;
                    ball.position.y = Math.max(0.15, ball.position.y - 0.05);
                } else {
                    // Pin Collision
                    const newKnocks = [];
                    pins.forEach((pin, i) => {
                        if (state.pinStates[i]) {
                            const dx = ball.position.x - pin.mesh.position.x;
                            const dz = ball.position.z - pin.mesh.position.z;
                            const dist = Math.sqrt(dx * dx + dz * dz);
                            
                            if (dist < 0.45) {
                                knockPin(i);
                                newKnocks.push(i);
                            }
                        }
                    });

                    // Chain Reaction (1 level deep)
                    if (newKnocks.length > 0) {
                        const chainKnocks = [];
                        newKnocks.forEach(knockedIdx => {
                            const p1 = pins[knockedIdx];
                            pins.forEach((pin, j) => {
                                if (state.pinStates[j] && !newKnocks.includes(j)) {
                                    const dx = p1.initialPos.x - pin.initialPos.x;
                                    const dz = p1.initialPos.z - pin.initialPos.z;
                                    const dist = Math.sqrt(dx * dx + dz * dz);
                                    if (dist < 0.5) {
                                        chainKnocks.push(j);
                                    }
                                }
                            });
                        });
                        chainKnocks.forEach(j => knockPin(j));
                    }
                }

                // End of roll
                if (ball.position.z < -18) {
                    state.gamePhase = 'scored';
                    showScoreMessage();
                }
            }

            // Pin Animation
            pins.forEach(pin => {
                if (pin.falling) {
                    let t = (currentTime - pin.fallStartTime) / 300; // 0.3s duration
                    if (t >= 1) {
                        t = 1;
                        pin.falling = false;
                    }
                    pin.mesh.rotation.x = -Math.PI / 2 * t;
                    pin.mesh.position.y = 0.3 - (0.3 - 0.15) * t;
                }
            });

            // Sync State
            state.ballPosition.x = ball.position.x;
            state.ballPosition.y = ball.position.y;
            state.ballPosition.z = ball.position.z;

            updateUI();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start
        updateUI();
        animate();
    </script>
</body>
</html>
