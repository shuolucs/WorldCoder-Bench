<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ski Downhill Game</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #87b7d9;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      user-select: none;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }

    #score-display {
      top: 16px;
      left: 16px;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    #lives-display {
      top: 16px;
      right: 16px;
      color: white;
      font-size: 24px;
      font-weight: bold;
    }

    #difficulty-display {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: yellow;
      font-size: 20px;
      font-weight: bold;
    }

    #speed-display {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      pointer-events: none;
    }

    #start-button,
    #restart-button {
      padding: 14px 24px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #ffffff;
      color: #1e3a5f;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }

    #start-button {
      position: absolute;
      z-index: 20;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    #gameover-overlay {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: none;
      background: rgba(0, 0, 0, 0.65);
      color: white;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      gap: 18px;
    }

    #gameover-overlay h1 {
      margin: 0;
      font-size: 52px;
    }

    #gameover-overlay p {
      margin: 0;
      font-size: 24px;
    }
  </style>
</head>
<body>
  <div id="score-display" class="hud">Score: 0</div>
  <div id="lives-display" class="hud">Lives: 3</div>
  <div id="difficulty-display" class="hud">Difficulty: 1</div>
  <div id="speed-display" class="hud">Speed: 15.0</div>

  <button id="start-button">Start Game</button>

  <div id="gameover-overlay">
    <h1>Game Over</h1>
    <p id="final-score">Final Score: 0</p>
    <button id="restart-button">Restart</button>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    let scene, camera, renderer, clock;
    let skier;
    let slopeSegments = [];
    let obstacles = [];
    let fishItems = [];
    let fishTemplate = null;

    const keys = {};
    const slopeTilt = -0.65;
    const segmentLength = 120;
    const segmentCount = 4;
    const slopeWidth = 100;

    let gameStarted = false;
    let gameOver = false;
    let score = 0;
    let lives = 3;
    let difficultyLevel = 1;
    let currentSpeed = 15;
    let elapsedTime = 0;
    let fishCollected = 0;
    let isInvincible = false;
    let invincibleTimer = 0;
    let obstacleSpawnTimer = 0;
    let fishSpawnTimer = 0;
    let frameCount = 0;

    const collisionCooldowns = new Map();

    const scoreDisplay = document.getElementById("score-display");
    const livesDisplay = document.getElementById("lives-display");
    const difficultyDisplay = document.getElementById("difficulty-display");
    const speedDisplay = document.getElementById("speed-display");
    const startButton = document.getElementById("start-button");
    const gameoverOverlay = document.getElementById("gameover-overlay");
    const finalScore = document.getElementById("final-score");
    const restartButton = document.getElementById("restart-button");

    window.__3D_STATE__ = {
      gameStarted: false,
      gameOver: false,
      score: 0,
      lives: 3,
      difficultyLevel: 1,
      currentSpeed: 15,
      skierX: 0,
      elapsedTime: 0,
      fishCollected: 0,
      isInvincible: false,
      obstacleCount: 0,
      fishOnScreen: 0,
      skierExists: false,
      frameCount: 0
    };

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0xbddfff, 35, 180);

      camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        500
      );
      camera.position.set(0, 8, 15);
      camera.lookAt(0, 0, -30);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      document.body.appendChild(renderer.domElement);

      clock = new THREE.Clock();

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
      dirLight.position.set(5, 15, 10);
      scene.add(dirLight);

      const ambient = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambient);

      createSlope();
      createSkier();
      loadFishModel();

      window.addEventListener("resize", onResize);
      window.addEventListener("keydown", (e) => keys[e.key] = true);
      window.addEventListener("keyup", (e) => keys[e.key] = false);

      startButton.addEventListener("click", () => {
        startButton.style.display = "none";
        gameStarted = true;
        clock.start();
      });

      restartButton.addEventListener("click", restartGame);

      updateHUD();
      update3DState();
    }

    function createSlope() {
      const colors = [0xf4fbff, 0xe8f7ff, 0xf7fdff, 0xeaf6ff];

      for (let i = 0; i < segmentCount; i++) {
        const geom = new THREE.PlaneGeometry(slopeWidth, segmentLength, 20, 20);
        const mat = new THREE.MeshLambertMaterial({
          color: colors[i % colors.length]
        });
        const plane = new THREE.Mesh(geom, mat);
        plane.rotation.x = slopeTilt;
        plane.position.set(0, -2.2, -i * segmentLength + 20);
        scene.add(plane);
        slopeSegments.push(plane);
      }
    }

    function createSkier() {
      skier = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.35, 0.8, 16),
        new THREE.MeshStandardMaterial({ color: 0xff2d2d, emissive: 0x220000 })
      );
      body.position.y = 0.45;

      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffd2b1 })
      );
      head.position.y = 0.95;

      skier.add(body);
      skier.add(head);
      skier.position.set(0, 0.5, 2);
      scene.add(skier);
    }

    function loadFishModel() {
      const loader = new GLTFLoader();
      loader.load(
        "._BarramundiFish.glb",
        (gltf) => {
          fishTemplate = gltf.scene;
          fishTemplate.traverse((obj) => {
            if (obj.isMesh) {
              obj.castShadow = false;
              obj.receiveShadow = true;
            }
          });
        },
        undefined,
        () => {
          fishTemplate = createFallbackFish();
        }
      );
    }

    function createFallbackFish() {
      const group = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.SphereGeometry(0.45, 16, 12),
        new THREE.MeshStandardMaterial({ color: 0x88ccee, emissive: 0x112233 })
      );
      body.scale.set(1.5, 0.7, 0.5);

      const tail = new THREE.Mesh(
        new THREE.ConeGeometry(0.25, 0.5, 12),
        new THREE.MeshStandardMaterial({ color: 0x77bbdd })
      );
      tail.rotation.z = Math.PI / 2;
      tail.position.x = -0.8;

      group.add(body, tail);
      return group;
    }

    function spawnObstacle() {
      const isTree = Math.random() < 0.6;
      let mesh;

      if (isTree) {
        mesh = new THREE.Mesh(
          new THREE.ConeGeometry(0.5, 2, 10),
          new THREE.MeshStandardMaterial({ color: 0x1f8b3a })
        );
        mesh.position.y = 0.9;
      } else {
        mesh = new THREE.Mesh(
          new THREE.BoxGeometry(1, 0.8, 1),
          new THREE.MeshStandardMaterial({ color: 0x777777 })
        );
        mesh.position.y = 0.4;
      }

      const x = THREE.MathUtils.randFloat(-18, 18);
      const z = -80;
      mesh.position.x = x;
      mesh.position.z = z;

      const moveLateral = difficultyLevel >= 3 && Math.random() < 0.45;
      const obstacleData = {
        mesh,
        type: isTree ? "tree" : "rock",
        baseX: x,
        lateral: moveLateral,
        phase: Math.random() * Math.PI * 2
      };

      scene.add(mesh);
      obstacles.push(obstacleData);
    }

    function spawnFish() {
      if (!fishTemplate) return;

      const fish = fishTemplate.clone(true);
      fish.scale.setScalar(0.8);
      fish.rotation.x = -Math.PI / 2;
      fish.rotation.z = Math.PI * 0.5 * (Math.random() < 0.5 ? 1 : -1);
      fish.position.set(
        THREE.MathUtils.randFloat(-16, 16),
        0.25,
        -80
      );

      fish.traverse((obj) => {
        if (obj.isMesh && obj.material) {
          obj.material = obj.material.clone ? obj.material.clone() : obj.material;
        }
      });

      scene.add(fish);
      fishItems.push({
        mesh: fish
      });
    }

    function updateSlope(dt) {
      for (const seg of slopeSegments) {
        seg.position.z += currentSpeed * dt;
      }

      let farthestZ = Math.min(...slopeSegments.map(s => s.position.z));
      for (const seg of slopeSegments) {
        if (seg.position.z > 80) {
          seg.position.z = farthestZ - segmentLength;
          farthestZ = seg.position.z;
        }
      }
    }

    function updateSkier(dt) {
      if (!skier) return;

      let move = 0;
      if (keys["a"] || keys["A"] || keys["ArrowLeft"]) move -= 1;
      if (keys["d"] || keys["D"] || keys["ArrowRight"]) move += 1;

      skier.position.x += move * 12 * dt;
      skier.position.x = THREE.MathUtils.clamp(skier.position.x, -18, 18);

      if (move !== 0) {
        skier.rotation.z = -move * 0.25;
      } else {
        skier.rotation.z *= 0.85;
      }

      if (isInvincible) {
        invincibleTimer -= dt;
        const flash = (Math.sin(elapsedTime * 20) * 0.5 + 0.5) > 0.5;
        skier.traverse((obj) => {
          if (obj.isMesh && obj.material) {
            if ("emissive" in obj.material) {
              obj.material.emissive.setHex(flash ? 0x66ccff : 0x220000);
            }
            obj.visible = true;
            obj.material.transparent = true;
            obj.material.opacity = flash ? 0.65 : 1.0;
          }
        });

        if (invincibleTimer <= 0) {
          isInvincible = false;
          skier.traverse((obj) => {
            if (obj.isMesh && obj.material) {
              if ("emissive" in obj.material) obj.material.emissive.setHex(0x220000);
              obj.material.opacity = 1.0;
            }
          });
        }
      }
    }

    function updateObstacles(dt) {
      for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.mesh.position.z += currentSpeed * dt;

        if (obs.lateral) {
          obs.mesh.position.x = obs.baseX + Math.sin(elapsedTime * Math.PI * 2 + obs.phase) * 3;
        }

        const id = obs.mesh.uuid;
        if (collisionCooldowns.has(id)) {
          collisionCooldowns.set(id, collisionCooldowns.get(id) - dt);
          if (collisionCooldowns.get(id) <= 0) collisionCooldowns.delete(id);
        }

        const dist = xzDistance(skier.position, obs.mesh.position);
        if (!gameOver && !isInvincible && dist <= 1.5 && !collisionCooldowns.has(id)) {
          lives--;
          collisionCooldowns.set(id, 0.75);
          if (lives <= 0) {
            lives = 0;
            endGame();
          }
        }

        if (obs.mesh.position.z > 25) {
          scene.remove(obs.mesh);
          obstacles.splice(i, 1);
          collisionCooldowns.delete(id);
        }
      }
    }

    function updateFish(dt) {
      for (let i = fishItems.length - 1; i >= 0; i--) {
        const fish = fishItems[i];
        fish.mesh.position.z += currentSpeed * dt;
        fish.mesh.rotation.y += dt * 1.8;

        const dist = xzDistance(skier.position, fish.mesh.position);
        if (dist <= 2.0) {
          score += 50;
          fishCollected++;
          isInvincible = true;
          invincibleTimer = 2.0;
          scene.remove(fish.mesh);
          fishItems.splice(i, 1);
          continue;
        }

        if (fish.mesh.position.z > 25) {
          scene.remove(fish.mesh);
          fishItems.splice(i, 1);
        }
      }
    }

    function updateDifficulty() {
      difficultyLevel = Math.min(10, 1 + Math.floor(elapsedTime / 10));
      currentSpeed = 15 + (difficultyLevel - 1) * 2;
    }

    function handleSpawning(dt) {
      obstacleSpawnTimer += dt;
      fishSpawnTimer += dt;

      const obstacleInterval = Math.max(0.5, 1.5 - 0.1 * (difficultyLevel - 1));
      if (obstacleSpawnTimer >= obstacleInterval) {
        obstacleSpawnTimer = 0;
        spawnObstacle();
      }

      if (fishSpawnTimer >= 8.0) {
        fishSpawnTimer = 0;
        spawnFish();
      }
    }

    function updateScore(dt) {
      score += Math.round((60 * dt) * (currentSpeed / 15));
    }

    function endGame() {
      gameOver = true;
      gameStarted = false;
      finalScore.textContent = `Final Score: ${score}`;
      gameoverOverlay.style.display = "flex";
    }

    function restartGame() {
      for (const obs of obstacles) scene.remove(obs.mesh);
      for (const fish of fishItems) scene.remove(fish.mesh);

      obstacles = [];
      fishItems = [];
      collisionCooldowns.clear();

      score = 0;
      lives = 3;
      difficultyLevel = 1;
      currentSpeed = 15;
      elapsedTime = 0;
      fishCollected = 0;
      isInvincible = false;
      invincibleTimer = 0;
      obstacleSpawnTimer = 0;
      fishSpawnTimer = 0;
      frameCount = 0;
      gameOver = false;
      gameStarted = true;
      gameoverOverlay.style.display = "none";

      if (skier) {
        skier.position.set(0, 0.5, 2);
        skier.rotation.set(0, 0, 0);
        skier.traverse((obj) => {
          if (obj.isMesh && obj.material) {
            obj.visible = true;
            obj.material.opacity = 1;
            if ("emissive" in obj.material) obj.material.emissive.setHex(0x220000);
          }
        });
      }

      for (let i = 0; i < slopeSegments.length; i++) {
        slopeSegments[i].position.set(0, -2.2, -i * segmentLength + 20);
      }

      clock.start();
      updateHUD();
      update3DState();
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      livesDisplay.textContent = `Lives: ${lives}`;
      difficultyDisplay.textContent = `Difficulty: ${difficultyLevel}`;
      speedDisplay.textContent = `Speed: ${currentSpeed.toFixed(1)}`;
    }

    function update3DState() {
      window.__3D_STATE__.gameStarted = gameStarted;
      window.__3D_STATE__.gameOver = gameOver;
      window.__3D_STATE__.score = Math.floor(score);
      window.__3D_STATE__.lives = lives;
      window.__3D_STATE__.difficultyLevel = difficultyLevel;
      window.__3D_STATE__.currentSpeed = currentSpeed;
      window.__3D_STATE__.skierX = skier ? skier.position.x : 0;
      window.__3D_STATE__.elapsedTime = elapsedTime;
      window.__3D_STATE__.fishCollected = fishCollected;
      window.__3D_STATE__.isInvincible = isInvincible;
      window.__3D_STATE__.obstacleCount = obstacles.length;
      window.__3D_STATE__.fishOnScreen = fishItems.length;
      window.__3D_STATE__.skierExists = !!skier && scene.children.includes(skier);
      window.__3D_STATE__.frameCount = frameCount;
    }

    function xzDistance(a, b) {
      const dx = a.x - b.x;
      const dz = a.z - b.z;
      return Math.sqrt(dx * dx + dz * dz);
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(clock.getDelta(), 0.05);

      if (gameStarted && !gameOver) {
        elapsedTime += dt;
        frameCount++;

        updateDifficulty();
        handleSpawning(dt);
        updateSlope(dt);
        updateSkier(dt);
        updateObstacles(dt);
        updateFish(dt);
        updateScore(dt);
        updateHUD();
      }

      update3DState();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
