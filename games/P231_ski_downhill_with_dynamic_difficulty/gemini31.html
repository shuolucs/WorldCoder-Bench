<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Ski Downhill</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB; /* Sky blue background */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        .hud {
            position: absolute;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
        #score-display {
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        #lives-display {
            top: 20px;
            right: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        #difficulty-display {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: yellow;
            font-size: 20px;
            font-weight: bold;
        }
        #speed-display {
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 16px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 10;
        }
        .hidden {
            display: none !important;
        }
        button {
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            background-color: #ff4757;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: transform 0.1s, background-color 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #gameover-title {
            font-size: 48px;
            margin-bottom: 10px;
            color: #ff4757;
        }
        #final-score {
            font-size: 32px;
            margin-bottom: 30px;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="game-container"></div>
    
    <div id="score-display" class="hud">Score: 0</div>
    <div id="lives-display" class="hud">Lives: 3</div>
    <div id="difficulty-display" class="hud">Difficulty: 1</div>
    <div id="speed-display" class="hud">Speed: 15.0</div>

    <div id="start-overlay" class="overlay">
        <h1 style="font-size: 48px; margin-bottom: 30px; text-shadow: 2px 2px 4px #000;">Ski Downhill</h1>
        <button id="start-button">Start Game</button>
        <p style="margin-top: 20px; font-size: 18px;">Use A/D or Left/Right Arrows to move.</p>
        <p style="font-size: 18px;">Dodge trees and rocks. Collect fish for points and invincibility!</p>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
        <div id="gameover-title">Game Over</div>
        <div id="final-score">Final Score: 0</div>
        <button id="restart-button">Restart</button>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            gameOver: false,
            score: 0,
            lives: 3,
            difficultyLevel: 1,
            currentSpeed: 15.0,
            skierX: 0,
            elapsedTime: 0,
            fishCollected: 0,
            isInvincible: false,
            obstacleCount: 0,
            fishOnScreen: 0,
            skierExists: false,
            frameCount: 0
        };

        // --- Scene Setup ---
        const container = document.getElementById('game-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Sky blue
        scene.fog = new THREE.Fog(0x87CEEB, 40, 100);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 8, 15);
        camera.lookAt(0, 0, -20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Slope (Snow)
        const slopeGroup = new THREE.Group();
        scene.add(slopeGroup);

        const planeGeo = new THREE.PlaneGeometry(100, 200, 10, 20);
        const planeMat = new THREE.MeshStandardMaterial({ 
            color: 0xf0f8ff, // AliceBlue
            roughness: 0.8,
            metalness: 0.1
        });
        const plane = new THREE.Mesh(planeGeo, planeMat);
        plane.rotation.x = -Math.PI / 2;
        plane.position.z = -40;
        slopeGroup.add(plane);

        // Add grid to slope to visualize movement
        const gridHelper = new THREE.GridHelper(100, 50, 0xadd8e6, 0xadd8e6);
        gridHelper.position.y = 0.01;
        gridHelper.position.z = -40;
        slopeGroup.add(gridHelper);

        // Tilt the whole slope group slightly
        slopeGroup.rotation.x = 0.1;

        // --- Skier Setup ---
        const skierGroup = new THREE.Group();
        
        // Body (Red Cone)
        const bodyGeo = new THREE.ConeGeometry(0.5, 1, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.5;
        skierGroup.add(body);

        // Head (Peach Sphere)
        const headGeo = new THREE.SphereGeometry(0.25, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffdab9 }); // Peachpuff
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.15;
        skierGroup.add(head);

        // Skis
        const skiGeo = new THREE.BoxGeometry(0.1, 0.05, 1.5);
        const skiMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
        const skiL = new THREE.Mesh(skiGeo, skiMat);
        skiL.position.set(-0.3, 0.025, 0);
        const skiR = new THREE.Mesh(skiGeo, skiMat);
        skiR.position.set(0.3, 0.025, 0);
        skierGroup.add(skiL);
        skierGroup.add(skiR);

        skierGroup.position.set(0, 0, 0);
        scene.add(skierGroup);
        window.__3D_STATE__.skierExists = true;

        // --- Assets & Objects ---
        let fishModel = null;
        const loader = new GLTFLoader();
        
        // Create a fallback fish geometry in case loading fails
        const fallbackFishGeo = new THREE.CylinderGeometry(0.2, 0.4, 1.5, 8);
        fallbackFishGeo.rotateZ(Math.PI / 2);
        const fallbackFishMat = new THREE.MeshStandardMaterial({ color: 0x00aaff });
        const fallbackFish = new THREE.Mesh(fallbackFishGeo, fallbackFishMat);
        
        loader.load(
            '._BarramundiFish.glb',
            (gltf) => {
                fishModel = gltf.scene;
                // Normalize scale and rotation
                fishModel.scale.set(0.8, 0.8, 0.8);
                // Ensure it lies flat
                fishModel.rotation.x = -Math.PI / 2;
            },
            undefined,
            (error) => {
                console.warn("Could not load BarramundiFish.glb, using fallback model.", error);
                fishModel = fallbackFish;
                fishModel.scale.set(0.8, 0.8, 0.8);
            }
        );

        const obstacles = [];
        const fishes = [];

        const treeGeo = new THREE.ConeGeometry(0.5, 2, 8);
        const treeMat = new THREE.MeshStandardMaterial({ color: 0x228b22 }); // ForestGreen

        const rockGeo = new THREE.BoxGeometry(1, 0.8, 1);
        const rockMat = new THREE.MeshStandardMaterial({ color: 0x808080 }); // Gray

        function spawnObstacle() {
            const isTree = Math.random() > 0.4;
            const mesh = new THREE.Mesh(
                isTree ? treeGeo : rockGeo,
                isTree ? treeMat : rockMat
            );
            
            mesh.position.x = (Math.random() - 0.5) * 36; // [-18, 18]
            mesh.position.y = isTree ? 1 : 0.4;
            mesh.position.z = -80;
            
            mesh.userData = {
                type: 'obstacle',
                startX: mesh.position.x,
                phase: Math.random() * Math.PI * 2,
                isMovingLateral: window.__3D_STATE__.difficultyLevel >= 3 && Math.random() > 0.5
            };

            scene.add(mesh);
            obstacles.push(mesh);
        }

        function spawnFish() {
            let mesh;
            if (fishModel) {
                mesh = fishModel.clone();
            } else {
                mesh = fallbackFish.clone();
            }
            
            mesh.position.x = (Math.random() - 0.5) * 36;
            mesh.position.y = 0.5; // Slightly above ground
            mesh.position.z = -80;
            
            // Add a subtle rotation animation data
            mesh.userData = {
                type: 'fish',
                rotationSpeed: (Math.random() - 0.5) * 2
            };

            scene.add(mesh);
            fishes.push(mesh);
        }

        // --- Input Handling ---
        const keys = { left: false, right: false };
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.left = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.right = false;
        });

        // --- UI Elements ---
        const uiScore = document.getElementById('score-display');
        const uiLives = document.getElementById('lives-display');
        const uiDifficulty = document.getElementById('difficulty-display');
        const uiSpeed = document.getElementById('speed-display');
        const startOverlay = document.getElementById('start-overlay');
        const gameoverOverlay = document.getElementById('gameover-overlay');
        const finalScoreDisplay = document.getElementById('final-score');

        document.getElementById('start-button').addEventListener('click', startGame);
        document.getElementById('restart-button').addEventListener('click', startGame);

        // --- Game Logic ---
        let lastTime = 0;
        let obstacleTimer = 0;
        let fishTimer = 0;
        let invincibilityTimer = 0;
        let gridOffset = 0;

        function startGame() {
            // Reset State
            window.__3D_STATE__.gameStarted = true;
            window.__3D_STATE__.gameOver = false;
            window.__3D_STATE__.score = 0;
            window.__3D_STATE__.lives = 3;
            window.__3D_STATE__.difficultyLevel = 1;
            window.__3D_STATE__.currentSpeed = 15.0;
            window.__3D_STATE__.skierX = 0;
            window.__3D_STATE__.elapsedTime = 0;
            window.__3D_STATE__.fishCollected = 0;
            window.__3D_STATE__.isInvincible = false;
            window.__3D_STATE__.frameCount = 0;

            skierGroup.position.x = 0;
            skierGroup.visible = true;
            invincibilityTimer = 0;
            obstacleTimer = 0;
            fishTimer = 0;

            // Clear existing objects
            obstacles.forEach(obs => scene.remove(obs));
            obstacles.length = 0;
            fishes.forEach(fish => scene.remove(fish));
            fishes.length = 0;

            // UI
            startOverlay.classList.add('hidden');
            gameoverOverlay.classList.add('hidden');
            updateHUD();

            lastTime = performance.now();
        }

        function gameOver() {
            window.__3D_STATE__.gameOver = true;
            gameoverOverlay.classList.remove('hidden');
            finalScoreDisplay.innerText = `Final Score: ${Math.floor(window.__3D_STATE__.score)}`;
        }

        function updateHUD() {
            uiScore.innerText = `Score: ${Math.floor(window.__3D_STATE__.score)}`;
            uiLives.innerText = `Lives: ${window.__3D_STATE__.lives}`;
            uiDifficulty.innerText = `Difficulty: ${window.__3D_STATE__.difficultyLevel}`;
            uiSpeed.innerText = `Speed: ${window.__3D_STATE__.currentSpeed.toFixed(1)}`;
        }

        function updateGame(delta, time) {
            const state = window.__3D_STATE__;
            state.elapsedTime += delta;
            state.frameCount++;

            // Difficulty Update
            const newDiff = Math.min(10, 1 + Math.floor(state.elapsedTime / 10));
            if (newDiff !== state.difficultyLevel) {
                state.difficultyLevel = newDiff;
                state.currentSpeed = 15 + (state.difficultyLevel - 1) * 2;
            }

            // Skier Movement
            const lateralSpeed = 12;
            if (keys.left) state.skierX -= lateralSpeed * delta;
            if (keys.right) state.skierX += lateralSpeed * delta;
            
            // Clamp X
            state.skierX = Math.max(-18, Math.min(18, state.skierX));
            
            // Smoothly move skier mesh
            skierGroup.position.x += (state.skierX - skierGroup.position.x) * 10 * delta;
            // Tilt skier based on movement
            skierGroup.rotation.z = (skierGroup.position.x - state.skierX) * 0.1;

            // Grid scrolling effect
            gridOffset += state.currentSpeed * delta;
            gridHelper.position.z = -40 + (gridOffset % 10); // Wrap around

            // Spawning
            obstacleTimer += delta;
            const spawnInterval = Math.max(0.5, 1.5 - 0.1 * (state.difficultyLevel - 1));
            if (obstacleTimer >= spawnInterval) {
                spawnObstacle();
                obstacleTimer = 0;
            }

            fishTimer += delta;
            if (fishTimer >= 8.0) {
                spawnFish();
                fishTimer = 0;
            }

            // Invincibility
            if (invincibilityTimer > 0) {
                invincibilityTimer -= delta;
                state.isInvincible = true;
                // Flash effect
                skierGroup.visible = Math.floor(time / 100) % 2 === 0;
            } else {
                state.isInvincible = false;
                skierGroup.visible = true;
            }

            // Update Objects & Collisions
            const skierPos = skierGroup.position;

            // Obstacles
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += state.currentSpeed * delta;

                // Lateral movement for higher difficulty
                if (obs.userData.isMovingLateral) {
                    obs.position.x = obs.userData.startX + Math.sin(time / 1000 * Math.PI * 2 + obs.userData.phase) * 3;
                }

                // Collision
                const dx = obs.position.x - skierPos.x;
                const dz = obs.position.z - skierPos.z;
                const dist = Math.hypot(dx, dz);

                if (dist < 1.5) {
                    if (!state.isInvincible) {
                        state.lives--;
                        invincibilityTimer = 1.0; // Brief recovery
                        if (state.lives <= 0) {
                            gameOver();
                        }
                    }
                    // Remove obstacle on hit
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    continue;
                }

                // Remove if passed camera
                if (obs.position.z > 15) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                }
            }

            // Fishes
            for (let i = fishes.length - 1; i >= 0; i--) {
                const fish = fishes[i];
                fish.position.z += state.currentSpeed * delta;
                
                // Spin fish slightly
                if(fish.userData.rotationSpeed) {
                    fish.rotation.y += fish.userData.rotationSpeed * delta;
                }

                // Collision
                const dx = fish.position.x - skierPos.x;
                const dz = fish.position.z - skierPos.z;
                const dist = Math.hypot(dx, dz);

                if (dist < 2.0) {
                    state.score += 50;
                    state.fishCollected++;
                    invincibilityTimer = 2.0; // 2 seconds invincibility
                    scene.remove(fish);
                    fishes.splice(i, 1);
                    continue;
                }

                // Remove if passed camera
                if (fish.position.z > 15) {
                    scene.remove(fish);
                    fishes.splice(i, 1);
                }
            }

            // Score increment (1 pt per frame at 60fps baseline, scaled by speed)
            // Using delta to make it frame-rate independent. 60fps = ~0.016s delta.
            // 1 pt / 0.016s = 60 pts/sec.
            const speedMultiplier = state.currentSpeed / 15.0;
            state.score += (60 * delta) * speedMultiplier;

            // Update State counts
            state.obstacleCount = obstacles.length;
            state.fishOnScreen = fishes.length;

            updateHUD();
        }

        // --- Main Loop ---
        function animate(time) {
            requestAnimationFrame(animate);

            const delta = Math.min((time - lastTime) / 1000, 0.1); // Cap delta to prevent huge jumps
            lastTime = time;

            if (window.__3D_STATE__.gameStarted && !window.__3D_STATE__.gameOver) {
                updateGame(delta, time);
            } else if (!window.__3D_STATE__.gameStarted) {
                // Idle animation for start screen
                gridOffset += 5 * delta;
                gridHelper.position.z = -40 + (gridOffset % 10);
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start loop
        requestAnimationFrame(animate);

    </script>
</body>
</html>
