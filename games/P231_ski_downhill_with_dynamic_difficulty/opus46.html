<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ski Downhill Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
canvas { display: block; }

#score-display {
    position: absolute;
    top: 15px;
    left: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10;
}

#lives-display {
    position: absolute;
    top: 15px;
    right: 20px;
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10;
}

#difficulty-display {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    color: yellow;
    font-size: 20px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10;
}

#speed-display {
    position: absolute;
    top: 50px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 16px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    z-index: 10;
}

#start-button {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 20px 50px;
    font-size: 28px;
    font-weight: bold;
    background: linear-gradient(135deg, #4CAF50, #2E7D32);
    color: white;
    border: 3px solid white;
    border-radius: 15px;
    cursor: pointer;
    z-index: 20;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
}

#start-button:hover {
    transform: translate(-50%, -50%) scale(1.05);
    box-shadow: 0 0 30px rgba(76, 175, 80, 0.6);
}

#gameover-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.8);
    z-index: 30;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

#gameover-overlay.show {
    display: flex;
}

#gameover-overlay h1 {
    color: #ff4444;
    font-size: 64px;
    margin-bottom: 20px;
    text-shadow: 3px 3px 6px rgba(0,0,0,0.8);
}

#gameover-overlay .final-score {
    color: white;
    font-size: 32px;
    margin-bottom: 10px;
}

#gameover-overlay .fish-count {
    color: #FFD700;
    font-size: 24px;
    margin-bottom: 30px;
}

#restart-button {
    padding: 15px 40px;
    font-size: 24px;
    font-weight: bold;
    background: linear-gradient(135deg, #2196F3, #1565C0);
    color: white;
    border: 3px solid white;
    border-radius: 15px;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
}

#restart-button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(33, 150, 243, 0.6);
}
</style>
</head>
<body>

<div id="score-display">Score: 0</div>
<div id="lives-display">Lives: 3</div>
<div id="difficulty-display">Difficulty: 1</div>
<div id="speed-display">Speed: 15.0</div>
<button id="start-button">Start Game</button>

<div id="gameover-overlay">
    <h1>GAME OVER</h1>
    <div class="final-score" id="final-score">Score: 0</div>
    <div class="fish-count" id="final-fish">Fish Collected: 0</div>
    <button id="restart-button">Restart</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// State
window.__3D_STATE__ = {
    gameStarted: false,
    gameOver: false,
    score: 0,
    lives: 3,
    difficultyLevel: 1,
    currentSpeed: 15,
    skierX: 0,
    elapsedTime: 0,
    fishCollected: 0,
    isInvincible: false,
    obstacleCount: 0,
    fishOnScreen: 0,
    skierExists: false,
    frameCount: 0
};

const state = window.__3D_STATE__;

// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.Fog(0x87CEEB, 60, 100);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 8, 15);
camera.lookAt(0, 0, -10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Lights
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 15, 10);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 100;
dirLight.shadow.camera.left = -50;
dirLight.shadow.camera.right = 50;
dirLight.shadow.camera.top = 50;
dirLight.shadow.camera.bottom = -50;
scene.add(dirLight);

const ambientLight = new THREE.AmbientLight(0x6688cc, 0.4);
scene.add(ambientLight);

// Snow ground - create a large tilted plane
const snowGeometry = new THREE.PlaneGeometry(100, 200, 50, 100);
const snowCanvas = document.createElement('canvas');
snowCanvas.width = 512;
snowCanvas.height = 512;
const snowCtx = snowCanvas.getContext('2d');
// Create snow texture
const gradient = snowCtx.createLinearGradient(0, 0, 512, 512);
gradient.addColorStop(0, '#f0f5ff');
gradient.addColorStop(0.3, '#e8eeff');
gradient.addColorStop(0.6, '#f5f8ff');
gradient.addColorStop(1, '#dde8ff');
snowCtx.fillStyle = gradient;
snowCtx.fillRect(0, 0, 512, 512);
// Add some noise/sparkle
for (let i = 0; i < 2000; i++) {
    const x = Math.random() * 512;
    const y = Math.random() * 512;
    const brightness = 200 + Math.random() * 55;
    snowCtx.fillStyle = `rgb(${brightness},${brightness},${Math.min(255, brightness + 20)})`;
    snowCtx.fillRect(x, y, 2, 2);
}

const snowTexture = new THREE.CanvasTexture(snowCanvas);
snowTexture.wrapS = THREE.RepeatWrapping;
snowTexture.wrapT = THREE.RepeatWrapping;
snowTexture.repeat.set(4, 8);

const snowMaterial = new THREE.MeshStandardMaterial({
    map: snowTexture,
    color: 0xeef4ff,
    roughness: 0.8,
    metalness: 0.1
});

const snowPlane = new THREE.Mesh(snowGeometry, snowMaterial);
snowPlane.rotation.x = -Math.PI / 2 + 0.15; // Slight tilt for slope effect
snowPlane.position.set(0, -0.5, -40);
snowPlane.receiveShadow = true;
scene.add(snowPlane);

// Second snow plane for seamless scrolling
const snowPlane2 = new THREE.Mesh(snowGeometry, snowMaterial.clone());
snowPlane2.rotation.x = -Math.PI / 2 + 0.15;
snowPlane2.position.set(0, -0.5, -240);
snowPlane2.receiveShadow = true;
scene.add(snowPlane2);

// Side snow banks
for (let side of [-1, 1]) {
    const bankGeo = new THREE.BoxGeometry(20, 3, 200);
    const bankMat = new THREE.MeshStandardMaterial({ color: 0xd0dff0, roughness: 0.9 });
    const bank = new THREE.Mesh(bankGeo, bankMat);
    bank.position.set(side * 55, 0, -40);
    bank.receiveShadow = true;
    scene.add(bank);
}

// Skier
const skierGroup = new THREE.Group();

// Body - cone (red)
const bodyGeo = new THREE.ConeGeometry(0.25, 0.6, 8);
const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc2222 });
const body = new THREE.Mesh(bodyGeo, bodyMat);
body.position.y = 0.4;
body.castShadow = true;
skierGroup.add(body);

// Head - sphere (peach)
const headGeo = new THREE.SphereGeometry(0.15, 8, 8);
const headMat = new THREE.MeshStandardMaterial({ color: 0xffccaa });
const head = new THREE.Mesh(headGeo, headMat);
head.position.y = 0.8;
head.castShadow = true;
skierGroup.add(head);

// Skis
for (let side of [-0.12, 0.12]) {
    const skiGeo = new THREE.BoxGeometry(0.06, 0.03, 0.8);
    const skiMat = new THREE.MeshStandardMaterial({ color: 0x2244aa });
    const ski = new THREE.Mesh(skiGeo, skiMat);
    ski.position.set(side, 0.05, 0);
    skierGroup.add(ski);
}

// Poles
for (let side of [-0.3, 0.3]) {
    const poleGeo = new THREE.CylinderGeometry(0.015, 0.015, 0.7, 4);
    const poleMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
    const pole = new THREE.Mesh(poleGeo, poleMat);
    pole.position.set(side, 0.35, 0.1);
    pole.rotation.x = 0.3;
    skierGroup.add(pole);
}

skierGroup.position.set(0, 0.5, 5);
scene.add(skierGroup);
state.skierExists = true;

// Fish model
let fishTemplate = null;
const loader = new GLTFLoader();

loader.load(
    'BarramundiFish.glb',
    (gltf) => {
        fishTemplate = gltf.scene;
        fishTemplate.scale.set(0.8, 0.8, 0.8);
        console.log('Fish model loaded successfully');
    },
    undefined,
    (error) => {
        console.warn('Could not load fish model, using fallback:', error);
        // Create fallback fish
        fishTemplate = createFallbackFish();
    }
);

function createFallbackFish() {
    const group = new THREE.Group();
    // Fish body
    const bodyGeo = new THREE.ConeGeometry(0.3, 1.0, 6);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.3, roughness: 0.5 });
    const fishBody = new THREE.Mesh(bodyGeo, bodyMat);
    fishBody.rotation.z = Math.PI / 2;
    group.add(fishBody);
    // Tail
    const tailGeo = new THREE.ConeGeometry(0.25, 0.4, 4);
    const tailMat = new THREE.MeshStandardMaterial({ color: 0xFFA500, metalness: 0.3, roughness: 0.5 });
    const tail = new THREE.Mesh(tailGeo, tailMat);
    tail.position.x = -0.6;
    tail.rotation.z = Math.PI / 2;
    group.add(tail);
    // Eye
    const eyeGeo = new THREE.SphereGeometry(0.06, 6, 6);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const eye = new THREE.Mesh(eyeGeo, eyeMat);
    eye.position.set(0.3, 0.1, 0.2);
    group.add(eye);
    group.scale.set(0.8, 0.8, 0.8);
    return group;
}

// Ensure fallback is available after a timeout
setTimeout(() => {
    if (!fishTemplate) {
        fishTemplate = createFallbackFish();
    }
}, 3000);

// Game objects
const obstacles = [];
const fishes = [];
const particles = [];

// Input
const keys = {};
window.addEventListener('keydown', (e) => { keys[e.code] = true; });
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

// Game variables
let gameStarted = false;
let gameOver = false;
let score = 0;
let lives = 3;
let difficultyLevel = 1;
let currentSpeed = 15;
let elapsedTime = 0;
let fishCollected = 0;
let isInvincible = false;
let invincibleTimer = 0;
let frameCount = 0;
let lastObstacleSpawn = 0;
let lastFishSpawn = 0;
let lastDifficultyIncrease = 0;
let snowScrollOffset = 0;
let hitCooldown = 0;

// UI elements
const scoreDisplay = document.getElementById('score-display');
const livesDisplay = document.getElementById('lives-display');
const difficultyDisplay = document.getElementById('difficulty-display');
const speedDisplay = document.getElementById('speed-display');
const startButton = document.getElementById('start-button');
const gameoverOverlay = document.getElementById('gameover-overlay');
const finalScore = document.getElementById('final-score');
const finalFish = document.getElementById('final-fish');
const restartButton = document.getElementById('restart-button');

startButton.addEventListener('click', startGame);
restartButton.addEventListener('click', restartGame);

function startGame() {
    gameStarted = true;
    startButton.style.display = 'none';
    state.gameStarted = true;
}

function restartGame() {
    // Clear obstacles and fish
    obstacles.forEach(o => scene.remove(o.mesh));
    obstacles.length = 0;
    fishes.forEach(f => scene.remove(f.mesh));
    fishes.length = 0;
    particles.forEach(p => scene.remove(p.mesh));
    particles.length = 0;

    // Reset state
    gameStarted = true;
    gameOver = false;
    score = 0;
    lives = 3;
    difficultyLevel = 1;
    currentSpeed = 15;
    elapsedTime = 0;
    fishCollected = 0;
    isInvincible = false;
    invincibleTimer = 0;
    frameCount = 0;
    lastObstacleSpawn = 0;
    lastFishSpawn = 0;
    lastDifficultyIncrease = 0;
    hitCooldown = 0;

    skierGroup.position.x = 0;
    skierGroup.visible = true;

    gameoverOverlay.classList.remove('show');
    updateUI();
    updateState();
}

function createTree(x, z) {
    const group = new THREE.Group();

    // Trunk
    const trunkGeo = new THREE.CylinderGeometry(0.1, 0.15, 0.5, 6);
    const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 0.25;
    trunk.castShadow = true;
    group.add(trunk);

    // Foliage layers
    for (let i = 0; i < 3; i++) {
        const radius = 0.5 - i * 0.12;
        const height = 0.7 - i * 0.1;
        const coneGeo = new THREE.ConeGeometry(radius, height, 8);
        const coneMat = new THREE.MeshStandardMaterial({
            color: new THREE.Color(0.05 + i * 0.05, 0.4 + i * 0.1, 0.1)
        });
        const cone = new THREE.Mesh(coneGeo, coneMat);
        cone.position.y = 0.6 + i * 0.45;
        cone.castShadow = true;
        group.add(cone);
    }

    group.position.set(x, 0, z);
    return group;
}

function createRock(x, z) {
    const group = new THREE.Group();
    const rockGeo = new THREE.BoxGeometry(
        0.8 + Math.random() * 0.4,
        0.6 + Math.random() * 0.4,
        0.8 + Math.random() * 0.4
    );
    const grayVal = 0.35 + Math.random() * 0.2;
    const rockMat = new THREE.MeshStandardMaterial({
        color: new THREE.Color(grayVal, grayVal, grayVal + 0.05),
        roughness: 0.9
    });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.y = 0.3;
    rock.rotation.y = Math.random() * Math.PI;
    rock.castShadow = true;
    group.add(rock);

    // Sometimes add a smaller rock
    if (Math.random() > 0.5) {
        const smallRockGeo = new THREE.BoxGeometry(0.4, 0.3, 0.4);
        const smallRock = new THREE.Mesh(smallRockGeo, rockMat.clone());
        smallRock.position.set(0.4, 0.15, 0.2);
        smallRock.rotation.y = Math.random() * Math.PI;
        smallRock.castShadow = true;
        group.add(smallRock);
    }

    group.position.set(x, 0, z);
    return group;
}

function spawnObstacle() {
    const x = (Math.random() - 0.5) * 36; // -18 to 18
    const z = -80;
    const isTree = Math.random() > 0.4;
    const mesh = isTree ? createTree(x, z) : createRock(x, z);
    scene.add(mesh);

    const movesLaterally = difficultyLevel >= 3 && Math.random() > 0.6;

    obstacles.push({
        mesh,
        x: x,
        z: z,
        movesLaterally,
        lateralPhase: Math.random() * Math.PI * 2,
        baseX: x
    });
}

function spawnFish() {
    if (!fishTemplate) return;

    const x = (Math.random() - 0.5) * 30;
    const z = -80;
    const mesh = fishTemplate.clone();
    mesh.position.set(x, 0.3, z);
    mesh.rotation.x = -Math.PI / 2;
    mesh.rotation.z = Math.random() * Math.PI * 2;

    // Add glow effect
    const glowGeo = new THREE.SphereGeometry(0.6, 8, 8);
    const glowMat = new THREE.MeshBasicMaterial({
        color: 0xFFD700,
        transparent: true,
        opacity: 0.3
    });
    const glow = new THREE.Mesh(glowGeo, glowMat);
    glow.position.y = 0.2;
    mesh.add(glow);

    scene.add(mesh);
    fishes.push({
        mesh,
        x,
        z,
        glow,
        bobPhase: Math.random() * Math.PI * 2
    });
}

function createSnowParticle(x, y, z) {
    const geo = new THREE.SphereGeometry(0.05, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xffffff });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(x, y, z);
    scene.add(mesh);
    particles.push({
        mesh,
        velocity: new THREE.Vector3(
            (Math.random() - 0.5) * 3,
            Math.random() * 2 + 1,
            (Math.random() - 0.5) * 3
        ),
        life: 1.0
    });
}

function createCollectEffect(x, y, z) {
    for (let i = 0; i < 15; i++) {
        const geo = new THREE.SphereGeometry(0.08, 4, 4);
        const mat = new THREE.MeshBasicMaterial({
            color: new THREE.Color().setHSL(0.12 + Math.random() * 0.1, 1, 0.6),
            transparent: true
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(x, y, z);
        scene.add(mesh);
        particles.push({
            mesh,
            velocity: new THREE.Vector3(
                (Math.random() - 0.5) * 6,
                Math.random() * 4 + 2,
                (Math.random() - 0.5) * 6
            ),
            life: 1.5
        });
    }
}

function updateUI() {
    scoreDisplay.textContent = `Score: ${Math.floor(score)}`;
    livesDisplay.textContent = `Lives: ${lives}`;
    difficultyDisplay.textContent = `Difficulty: ${difficultyLevel}`;
    speedDisplay.textContent = `Speed: ${currentSpeed.toFixed(1)}`;
}

function updateState() {
    state.gameStarted = gameStarted;
    state.gameOver = gameOver;
    state.score = Math.floor(score);
    state.lives = lives;
    state.difficultyLevel = difficultyLevel;
    state.currentSpeed = currentSpeed;
    state.skierX = skierGroup.position.x;
    state.elapsedTime = elapsedTime;
    state.fishCollected = fishCollected;
    state.isInvincible = isInvincible;
    state.obstacleCount = obstacles.length;
    state.fishOnScreen = fishes.length;
    state.skierExists = true;
    state.frameCount = frameCount;
}

function endGame() {
    gameOver = true;
    gameStarted = false;
    finalScore.textContent = `Score: ${Math.floor(score)}`;
    finalFish.textContent = `Fish Collected: ${fishCollected}`;
    gameoverOverlay.classList.add('show');
    state.gameOver = true;
    state.gameStarted = false;
}

// Add some background trees for atmosphere
for (let i = 0; i < 30; i++) {
    const side = Math.random() > 0.5 ? 1 : -1;
    const x = side * (22 + Math.random() * 25);
    const z = -80 + Math.random() * 100;
    const tree = createTree(x, z);
    const scale = 1.5 + Math.random() * 2;
    tree.scale.set(scale, scale, scale);
    scene.add(tree);
}

// Snowflakes in the air
const snowflakeCount = 200;
const snowflakeGeo = new THREE.BufferGeometry();
const snowflakePositions = new Float32Array(snowflakeCount * 3);
for (let i = 0; i < snowflakeCount; i++) {
    snowflakePositions[i * 3] = (Math.random() - 0.5) * 80;
    snowflakePositions[i * 3 + 1] = Math.random() * 30;
    snowflakePositions[i * 3 + 2] = (Math.random() - 0.5) * 100 - 20;
}
snowflakeGeo.setAttribute('position', new THREE.BufferAttribute(snowflakePositions, 3));
const snowflakeMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.8 });
const snowflakes = new THREE.Points(snowflakeGeo, snowflakeMat);
scene.add(snowflakes);

// Clock
const clock = new THREE.Clock();

// Animation loop
function animate() {
    requestAnimationFrame(animate);

    const delta = Math.min(clock.getDelta(), 0.05);

    // Animate snowflakes always
    const sfPositions = snowflakeGeo.attributes.position.array;
    for (let i = 0; i < snowflakeCount; i++) {
        sfPositions[i * 3 + 1] -= delta * 2;
        sfPositions[i * 3] += Math.sin(elapsedTime + i) * delta * 0.5;
        if (sfPositions[i * 3 + 1] < -1) {
            sfPositions[i * 3 + 1] = 25 + Math.random() * 5;
            sfPositions[i * 3] = (Math.random() - 0.5) * 80;
        }
    }
    snowflakeGeo.attributes.position.needsUpdate = true;

    if (!gameStarted || gameOver) {
        renderer.render(scene, camera);
        return;
    }

    frameCount++;
    elapsedTime += delta;

    // Dynamic difficulty
    if (elapsedTime - lastDifficultyIncrease >= 10 && difficultyLevel < 10) {
        difficultyLevel++;
        lastDifficultyIncrease = elapsedTime;
    }

    // Update speed
    currentSpeed = 15 + (difficultyLevel - 1) * 2;

    // Skier movement
    const lateralSpeed = 12;
    if (keys['ArrowLeft'] || keys['KeyA']) {
        skierGroup.position.x -= lateralSpeed * delta;
        skierGroup.rotation.z = 0.15;
    } else if (keys['ArrowRight'] || keys['KeyD']) {
        skierGroup.position.x += lateralSpeed * delta;
        skierGroup.rotation.z = -0.15;
    } else {
        skierGroup.rotation.z *= 0.9;
    }
    skierGroup.position.x = THREE.MathUtils.clamp(skierGroup.position.x, -18, 18);

    // Snow spray when moving
    if ((keys['ArrowLeft'] || keys['KeyA'] || keys['ArrowRight'] || keys['KeyD']) && frameCount % 3 === 0) {
        createSnowParticle(
            skierGroup.position.x + (Math.random() - 0.5) * 0.3,
            0.1,
            skierGroup.position.z + 0.3
        );
    }

    // Invincibility
    if (isInvincible) {
        invincibleTimer -= delta;
        // Flash effect
        skierGroup.visible = Math.sin(elapsedTime * 20) > 0;
        body.material.emissive.setHex(0xffff00);
        body.material.emissiveIntensity = 0.5 + Math.sin(elapsedTime * 10) * 0.3;
        if (invincibleTimer <= 0) {
            isInvincible = false;
            skierGroup.visible = true;
            body.material.emissive.setHex(0x000000);
            body.material.emissiveIntensity = 0;
        }
    }

    // Hit cooldown
    if (hitCooldown > 0) hitCooldown -= delta;

    // Snow scroll
    snowScrollOffset += currentSpeed * delta;
    snowTexture.offset.y -= currentSpeed * delta * 0.02;

    // Spawn obstacles
    const spawnInterval = Math.max(0.5, 1.5 - 0.1 * (difficultyLevel - 1));
    if (elapsedTime - lastObstacleSpawn >= spawnInterval) {
        spawnObstacle();
        // At higher difficulty, spawn multiple
        if (difficultyLevel >= 5 && Math.random() > 0.5) {
            spawnObstacle();
        }
        lastObstacleSpawn = elapsedTime;
    }

    // Spawn fish
    if (elapsedTime - lastFishSpawn >= 8) {
        spawnFish();
        lastFishSpawn = elapsedTime;
    }

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        const obs = obstacles[i];
        obs.z += currentSpeed * delta;
        obs.mesh.position.z = obs.z;

        if (obs.movesLaterally) {
            obs.mesh.position.x = obs.baseX + Math.sin(elapsedTime * Math.PI * 2 + obs.lateralPhase) * 3;
        }

        // Collision
        const dx = skierGroup.position.x - obs.mesh.position.x;
        const dz = skierGroup.position.z - obs.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.5 && !isInvincible && hitCooldown <= 0) {
            lives--;
            hitCooldown = 1.0;

            // Hit effect
            for (let j = 0; j < 8; j++) {
                createSnowParticle(
                    skierGroup.position.x + (Math.random() - 0.5),
                    0.5 + Math.random(),
                    skierGroup.position.z + (Math.random() - 0.5)
                );
            }

            // Flash red
            body.material.color.setHex(0xff0000);
            setTimeout(() => { body.material.color.setHex(0xcc2222); }, 200);

            if (lives <= 0) {
                endGame();
            }
        }

        // Remove if past camera
        if (obs.z > 20) {
            scene.remove(obs.mesh);
            obstacles.splice(i, 1);
        }
    }

    // Update fish
    for (let i = fishes.length - 1; i >= 0; i--) {
        const fish = fishes[i];
        fish.z += currentSpeed * delta;
        fish.mesh.position.z = fish.z;
        fish.bobPhase += delta * 3;
        fish.mesh.position.y = 0.3 + Math.sin(fish.bobPhase) * 0.15;
        fish.mesh.rotation.z += delta * 2;

        // Glow pulse
        if (fish.glow) {
            fish.glow.material.opacity = 0.2 + Math.sin(fish.bobPhase * 2) * 0.15;
        }

        // Collection
        const dx = skierGroup.position.x - fish.mesh.position.x;
        const dz = skierGroup.position.z - fish.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 2.0) {
            fishCollected++;
            score += 50;
            isInvincible = true;
            invincibleTimer = 2.0;

            createCollectEffect(fish.mesh.position.x, fish.mesh.position.y, fish.mesh.position.z);

            scene.remove(fish.mesh);
            fishes.splice(i, 1);
            continue;
        }

        if (fish.z > 20) {
            scene.remove(fish.mesh);
            fishes.splice(i, 1);
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
        p.velocity.y -= 5 * delta;
        p.life -= delta;
        if (p.mesh.material.opacity !== undefined) {
            p.mesh.material.opacity = Math.max(0, p.life);
            p.mesh.material.transparent = true;
        }
        if (p.life <= 0) {
            scene.remove(p.mesh);
            particles.splice(i, 1);
        }
    }

    // Score
    const speedMultiplier = currentSpeed / 15;
    score += speedMultiplier * delta * 60;

    // Skier bob animation
    skierGroup.position.y = 0.5 + Math.sin(elapsedTime * 8) * 0.03;

    // Camera follows skier slightly
    camera.position.x = THREE.MathUtils.lerp(camera.position.x, skierGroup.position.x * 0.3, delta * 3);

    updateUI();
    updateState();

    renderer.render(scene, camera);
}

// Handle resize
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
