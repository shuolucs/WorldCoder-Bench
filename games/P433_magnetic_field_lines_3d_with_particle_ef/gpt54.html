<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Magnetic Field Lines with Horse Reference</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: monospace;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      color: #fff;
      background: rgba(10, 10, 26, 0.7);
      border: 1px solid rgba(255,255,255,0.15);
      padding: 10px 12px;
      border-radius: 8px;
      z-index: 10;
      line-height: 1.5;
      user-select: none;
      white-space: pre-line;
    }

    #btn-reset {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-family: monospace;
      cursor: pointer;
    }

    #btn-reset:hover {
      background: rgba(255,255,255,0.16);
    }

    #info {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 10;
      color: rgba(255,255,255,0.8);
      background: rgba(10, 10, 26, 0.5);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div id="hud-strength">Field Strength: 2.0</div>
    <div id="hud-particles">Particles: ACTIVE</div>
    <div id="hud-poles">Poles: NORMAL</div>
  </div>

  <button id="btn-reset">Reset</button>

  <div id="info">
    F: field lines | P: pause particles | H: horse<br>
    ↑/↓: field strength | R: reverse poles
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const BG = 0x0a0a1a;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(BG);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0x334455, 0.4);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(5, 10, 5);
    scene.add(dirLight);

    const clock = new THREE.Clock();

    const safeNum = (v, fallback = 0) => Number.isFinite(v) ? v : fallback;
    const clamp = (v, min, max) => Math.min(max, Math.max(min, v));

    window.__3D_STATE__ = {
      fieldLinesVisible: true,
      particlesPaused: false,
      fieldStrength: 2.0,
      horseVisible: true,
      polesReversed: false,
      particleCount: 200,
      fieldLineCount: 12,
      northPolePosition: { x: -6, y: 0, z: 0 },
      southPolePosition: { x: 6, y: 0, z: 0 },
      horseLoaded: false,
      cameraDistance: 15
    };

    const hudStrength = document.getElementById("hud-strength");
    const hudParticles = document.getElementById("hud-particles");
    const hudPoles = document.getElementById("hud-poles");
    const btnReset = document.getElementById("btn-reset");

    const fieldLineGroup = new THREE.Group();
    scene.add(fieldLineGroup);

    const particleGroup = new THREE.Group();
    scene.add(particleGroup);

    const horseGroup = new THREE.Group();
    scene.add(horseGroup);

    // Subtle reference floor
    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(14, 64),
      new THREE.MeshStandardMaterial({
        color: 0x111122,
        roughness: 1,
        metalness: 0,
        transparent: true,
        opacity: 0.35
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.2;
    scene.add(floor);

    // Pole creation
    const poleGeo = new THREE.SphereGeometry(0.5, 32, 32);

    const northMat = new THREE.MeshStandardMaterial({
      color: 0xff3333,
      emissive: 0xaa1111,
      emissiveIntensity: 1.2
    });

    const southMat = new THREE.MeshStandardMaterial({
      color: 0x3333ff,
      emissive: 0x1111aa,
      emissiveIntensity: 1.2
    });

    const northPole = new THREE.Mesh(poleGeo, northMat);
    northPole.position.set(-6, 0, 0);
    scene.add(northPole);

    const southPole = new THREE.Mesh(poleGeo, southMat);
    southPole.position.set(6, 0, 0);
    scene.add(southPole);

    const glowHaloGeo = new THREE.SphereGeometry(0.72, 32, 32);
    const northHalo = new THREE.Mesh(
      glowHaloGeo,
      new THREE.MeshBasicMaterial({
        color: 0xff5555,
        transparent: true,
        opacity: 0.18
      })
    );
    northHalo.position.copy(northPole.position);
    scene.add(northHalo);

    const southHalo = new THREE.Mesh(
      glowHaloGeo,
      new THREE.MeshBasicMaterial({
        color: 0x5555ff,
        transparent: true,
        opacity: 0.18
      })
    );
    southHalo.position.copy(southPole.position);
    scene.add(southHalo);

    // Horse loader
    const loader = new GLTFLoader();
    let horseModel = null;

    loader.load(
      "._horse.glb",
      (gltf) => {
        horseModel = gltf.scene;
        horseGroup.add(horseModel);

        const box = new THREE.Box3().setFromObject(horseModel);
        const size = new THREE.Vector3();
        const center = new THREE.Vector3();
        box.getSize(size);
        box.getCenter(center);

        const currentHeight = safeNum(size.y, 1);
        const scale = currentHeight > 0 ? 2 / currentHeight : 1;
        horseModel.scale.setScalar(scale);

        const box2 = new THREE.Box3().setFromObject(horseModel);
        const center2 = new THREE.Vector3();
        const min2 = new THREE.Vector3();
        box2.getCenter(center2);
        box2.min.clone(min2);

        horseModel.position.sub(center2);
        const finalBox = new THREE.Box3().setFromObject(horseModel);
        const finalSize = new THREE.Vector3();
        const finalCenter = new THREE.Vector3();
        finalBox.getSize(finalSize);
        finalBox.getCenter(finalCenter);

        horseModel.position.x -= finalCenter.x;
        horseModel.position.z -= finalCenter.z;
        horseModel.position.y -= finalBox.min.y;

        horseGroup.position.set(0, 0, 0);
        window.__3D_STATE__.horseLoaded = true;
      },
      undefined,
      (err) => {
        console.warn("Horse GLB failed to load:", err);
        window.__3D_STATE__.horseLoaded = false;

        // Fallback educational placeholder if GLB fails
        const fallback = new THREE.Mesh(
          new THREE.BoxGeometry(2.2, 2.0, 0.8),
          new THREE.MeshStandardMaterial({
            color: 0x887766,
            roughness: 0.9,
            metalness: 0.05
          })
        );
        fallback.position.y = 1.0;
        horseGroup.add(fallback);
      }
    );

    // Field lines
    const fieldCurves = [];
    const fieldLengths = [];
    const fieldLineCount = 12;

    function colorLerpHex(a, b, t) {
      const ca = new THREE.Color(a);
      const cb = new THREE.Color(b);
      return ca.lerp(cb, t);
    }

    function createFieldCurve(index, total) {
      const angle = (index / total) * Math.PI * 2;
      const radius = 2.5 + 1.8 * Math.sin(angle * 2);
      const lift = 1.0 + 0.7 * Math.cos(angle * 3);

      const p0 = new THREE.Vector3(-6, 0, 0);
      const p1 = new THREE.Vector3(-3.5, Math.cos(angle) * radius * 0.55 + lift, Math.sin(angle) * radius);
      const p2 = new THREE.Vector3(0, Math.cos(angle) * radius * 1.05 + lift * 1.6, Math.sin(angle) * radius * 1.4);
      const p3 = new THREE.Vector3(3.5, Math.cos(angle) * radius * 0.55 + lift, Math.sin(angle) * radius);
      const p4 = new THREE.Vector3(6, 0, 0);

      return new THREE.CatmullRomCurve3([p0, p1, p2, p3, p4], false, "catmullrom", 0.5);
    }

    function createGradientTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 16;
      const ctx = canvas.getContext("2d");
      const grad = ctx.createLinearGradient(0, 0, 256, 0);
      grad.addColorStop(0, "#ff3333");
      grad.addColorStop(1, "#3333ff");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 16);
      const tex = new THREE.CanvasTexture(canvas);
      tex.wrapS = THREE.ClampToEdgeWrapping;
      tex.wrapT = THREE.ClampToEdgeWrapping;
      return tex;
    }

    const gradientTexture = createGradientTexture();

    for (let i = 0; i < fieldLineCount; i++) {
      const curve = createFieldCurve(i, fieldLineCount);
      fieldCurves.push(curve);
      fieldLengths.push(safeNum(curve.getLength(), 1));

      const tubeGeo = new THREE.TubeGeometry(curve, 128, 0.08, 12, false);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        emissive: 0x222244,
        emissiveIntensity: 0.5,
        map: gradientTexture,
        roughness: 0.45,
        metalness: 0.1
      });

      const mesh = new THREE.Mesh(tubeGeo, mat);
      fieldLineGroup.add(mesh);
    }

    // Particles
    const particleCount = 200;
    const particleGeo = new THREE.SphereGeometry(0.05, 12, 12);
    const particleMat = new THREE.MeshStandardMaterial({
      color: 0x00ff88,
      emissive: 0x00ff88,
      emissiveIntensity: 1.3,
      roughness: 0.3,
      metalness: 0.0
    });

    const particles = [];

    function resetParticle(particle, keepT = false) {
      particle.lineIndex = Math.floor(Math.random() * fieldCurves.length);
      particle.curve = fieldCurves[particle.lineIndex];
      particle.length = safeNum(fieldLengths[particle.lineIndex], 1);
      particle.t = keepT ? clamp(safeNum(particle.t, 0), 0, 1) : Math.random();
      const displayT = window.__3D_STATE__.polesReversed ? (1 - particle.t) : particle.t;
      particle.mesh.position.copy(particle.curve.getPointAt(displayT));
    }

    for (let i = 0; i < particleCount; i++) {
      const mesh = new THREE.Mesh(particleGeo, particleMat);
      const particle = {
        mesh,
        lineIndex: 0,
        curve: null,
        length: 1,
        t: Math.random()
      };
      resetParticle(particle, true);
      particles.push(particle);
      particleGroup.add(mesh);
    }

    function updateHUD() {
      const strength = safeNum(window.__3D_STATE__.fieldStrength, 2).toFixed(1);
      hudStrength.textContent = `Field Strength: ${strength}`;
      hudParticles.textContent = `Particles: ${window.__3D_STATE__.particlesPaused ? "PAUSED" : "ACTIVE"}`;
      hudPoles.textContent = `Poles: ${window.__3D_STATE__.polesReversed ? "REVERSED" : "NORMAL"}`;
    }

    function applyPoleVisuals() {
      const reversed = !!window.__3D_STATE__.polesReversed;

      if (!reversed) {
        northPole.material.color.setHex(0xff3333);
        northPole.material.emissive.setHex(0xaa1111);
        southPole.material.color.setHex(0x3333ff);
        southPole.material.emissive.setHex(0x1111aa);
        northHalo.material.color.setHex(0xff5555);
        southHalo.material.color.setHex(0x5555ff);
      } else {
        northPole.material.color.setHex(0x3333ff);
        northPole.material.emissive.setHex(0x1111aa);
        southPole.material.color.setHex(0xff3333);
        southPole.material.emissive.setHex(0xaa1111);
        northHalo.material.color.setHex(0x5555ff);
        southHalo.material.color.setHex(0xff5555);
      }
    }

    function resetSceneState() {
      window.__3D_STATE__.fieldStrength = 2.0;
      window.__3D_STATE__.fieldLinesVisible = true;
      window.__3D_STATE__.particlesPaused = false;
      window.__3D_STATE__.horseVisible = true;

      fieldLineGroup.visible = true;
      horseGroup.visible = true;

      updateHUD();
    }

    document.addEventListener("keydown", (e) => {
      switch (e.key) {
        case "f":
        case "F":
          window.__3D_STATE__.fieldLinesVisible = !window.__3D_STATE__.fieldLinesVisible;
          fieldLineGroup.visible = window.__3D_STATE__.fieldLinesVisible;
          break;

        case "p":
        case "P":
          window.__3D_STATE__.particlesPaused = !window.__3D_STATE__.particlesPaused;
          break;

        case "ArrowUp":
          window.__3D_STATE__.fieldStrength = clamp(
            safeNum(window.__3D_STATE__.fieldStrength, 2) + 0.5,
            0.5,
            5.0
          );
          break;

        case "ArrowDown":
          window.__3D_STATE__.fieldStrength = clamp(
            safeNum(window.__3D_STATE__.fieldStrength, 2) - 0.5,
            0.5,
            5.0
          );
          break;

        case "h":
        case "H":
          window.__3D_STATE__.horseVisible = !window.__3D_STATE__.horseVisible;
          horseGroup.visible = window.__3D_STATE__.horseVisible;
          break;

        case "r":
        case "R":
          window.__3D_STATE__.polesReversed = !window.__3D_STATE__.polesReversed;
          applyPoleVisuals();
          break;
      }

      updateHUD();
    });

    btnReset.addEventListener("click", () => {
      resetSceneState();
    });

    updateHUD();
    applyPoleVisuals();

    window.addEventListener("resize", () => {
      camera.aspect = safeNum(window.innerWidth / Math.max(window.innerHeight, 1), 1);
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function updateStatePerFrame() {
      window.__3D_STATE__.fieldLinesVisible = !!fieldLineGroup.visible;
      window.__3D_STATE__.particlesPaused = !!window.__3D_STATE__.particlesPaused;
      window.__3D_STATE__.fieldStrength = safeNum(clamp(window.__3D_STATE__.fieldStrength, 0.5, 5.0), 2.0);
      window.__3D_STATE__.horseVisible = !!horseGroup.visible;
      window.__3D_STATE__.polesReversed = !!window.__3D_STATE__.polesReversed;
      window.__3D_STATE__.particleCount = safeNum(particles.length, 200);
      window.__3D_STATE__.fieldLineCount = safeNum(fieldCurves.length, 12);

      window.__3D_STATE__.northPolePosition = {
        x: safeNum(northPole.position.x, -6),
        y: safeNum(northPole.position.y, 0),
        z: safeNum(northPole.position.z, 0)
      };

      window.__3D_STATE__.southPolePosition = {
        x: safeNum(southPole.position.x, 6),
        y: safeNum(southPole.position.y, 0),
        z: safeNum(southPole.position.z, 0)
      };

      window.__3D_STATE__.cameraDistance = safeNum(camera.position.distanceTo(new THREE.Vector3(0, 0, 0)), 15);
    }

    function animate() {
      requestAnimationFrame(animate);

      const dt = Math.min(safeNum(clock.getDelta(), 0.016), 0.05);
      controls.update();

      northHalo.scale.setScalar(1 + 0.08 * Math.sin(performance.now() * 0.004));
      southHalo.scale.setScalar(1 + 0.08 * Math.sin(performance.now() * 0.004 + Math.PI));

      if (!window.__3D_STATE__.particlesPaused) {
        const speed = safeNum(window.__3D_STATE__.fieldStrength, 2.0);

        for (const p of particles) {
          const len = Math.max(safeNum(p.length, 1), 0.0001);
          p.t += (speed / len) * dt;

          if (p.t >= 1) {
            p.t = 0;
            resetParticle(p, true);
          }

          const displayT = window.__3D_STATE__.polesReversed ? (1 - p.t) : p.t;
          const pos = p.curve.getPointAt(clamp(safeNum(displayT, 0), 0, 1));
          p.mesh.position.copy(pos);
        }
      }

      updateStatePerFrame();
      updateHUD();
      renderer.render(scene, camera);
    }

    resetSceneState();
    animate();
  </script>
</body>
</html>
