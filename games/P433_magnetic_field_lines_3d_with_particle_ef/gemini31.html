<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Magnetic Field Visualization</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a1a;
            font-family: monospace;
            color: white;
        }
        canvas {
            display: block;
        }
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(10, 10, 26, 0.7);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #334455;
            pointer-events: none;
        }
        #hud div {
            margin-bottom: 5px;
        }
        #btn-reset {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #334455;
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.2s;
        }
        #btn-reset:hover {
            background: #445566;
        }
        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(10, 10, 26, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            color: #aaa;
        }
    </style>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="hud">
        <div id="hud-strength">Field Strength: 2.0</div>
        <div id="hud-particles">Particles: ACTIVE</div>
        <div id="hud-poles">Poles: NORMAL</div>
    </div>
    <button id="btn-reset">Reset</button>
    <div id="instructions">
        Controls:<br>
        [F] Toggle Field Lines | [P] Pause Particles | [H] Toggle Horse<br>
        [Up/Down] Adjust Strength | [R] Reverse Poles | Mouse to Rotate
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // State Management
        window.__3D_STATE__ = {
            fieldLinesVisible: true,
            particlesPaused: false,
            fieldStrength: 2.0,
            horseVisible: true,
            polesReversed: false,
            particleCount: 200,
            fieldLineCount: 12,
            northPolePosition: { x: -6, y: 0, z: 0 },
            southPolePosition: { x: 6, y: 0, z: 0 },
            horseLoaded: false,
            cameraDistance: 15
        };

        const state = window.__3D_STATE__;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Magnetic Poles
        const poleGeometry = new THREE.SphereGeometry(0.5, 32, 32);
        
        const northMaterial = new THREE.MeshStandardMaterial({ 
            color: 0xff3333, 
            emissive: 0xff3333, 
            emissiveIntensity: 0.5 
        });
        const northPole = new THREE.Mesh(poleGeometry, northMaterial);
        northPole.position.set(state.northPolePosition.x, state.northPolePosition.y, state.northPolePosition.z);
        scene.add(northPole);

        const southMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3333ff, 
            emissive: 0x3333ff, 
            emissiveIntensity: 0.5 
        });
        const southPole = new THREE.Mesh(poleGeometry, southMaterial);
        southPole.position.set(state.southPolePosition.x, state.southPolePosition.y, state.southPolePosition.z);
        scene.add(southPole);

        // Field Lines
        const fieldLinesGroup = new THREE.Group();
        scene.add(fieldLinesGroup);
        const curves = [];
        const curveLengths = [];

        for (let i = 0; i < state.fieldLineCount; i++) {
            const theta = (i / state.fieldLineCount) * Math.PI * 2;
            const points = [];
            
            // Generate dipole-like curve points
            const start = new THREE.Vector3(-6, 0, 0);
            const end = new THREE.Vector3(6, 0, 0);
            
            points.push(start);
            points.push(new THREE.Vector3(-3, 4 * Math.cos(theta), 4 * Math.sin(theta)));
            points.push(new THREE.Vector3(0, 5 * Math.cos(theta), 5 * Math.sin(theta)));
            points.push(new THREE.Vector3(3, 4 * Math.cos(theta), 4 * Math.sin(theta)));
            points.push(end);

            const curve = new THREE.CatmullRomCurve3(points);
            curves.push(curve);
            curveLengths.push(curve.getLength());

            const tubeGeometry = new THREE.TubeGeometry(curve, 64, 0.05, 8, false);
            
            // Gradient Colors
            const colors = [];
            const positions = tubeGeometry.attributes.position;
            const colorObj = new THREE.Color();
            
            for (let j = 0; j < positions.count; j++) {
                const x = positions.getX(j);
                let t = (x + 6) / 12;
                t = Math.max(0, Math.min(1, t));
                colorObj.lerpColors(new THREE.Color(0xff3333), new THREE.Color(0x3333ff), t);
                colors.push(colorObj.r, colorObj.g, colorObj.b);
            }
            
            tubeGeometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            
            const tubeMaterial = new THREE.MeshBasicMaterial({ 
                vertexColors: true, 
                transparent: true, 
                opacity: 0.4 
            });
            
            const tube = new THREE.Mesh(tubeGeometry, tubeMaterial);
            fieldLinesGroup.add(tube);
        }

        // Particle System
        const particles = [];
        const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);
        const particleMaterial = new THREE.MeshStandardMaterial({
            color: 0x00ff88,
            emissive: 0x00ff88,
            emissiveIntensity: 1
        });

        for (let i = 0; i < state.particleCount; i++) {
            const mesh = new THREE.Mesh(particleGeometry, particleMaterial);
            const curveIndex = Math.floor(Math.random() * state.fieldLineCount);
            const progress = Math.random();
            
            scene.add(mesh);
            particles.push({ mesh, curveIndex, progress });
        }

        // Horse Model
        let horseModel = null;
        const loader = new GLTFLoader();
        loader.load(
            '._horse.glb',
            (gltf) => {
                horseModel = gltf.scene;
                
                // Scale to roughly 2 units tall
                const box = new THREE.Box3().setFromObject(horseModel);
                const size = box.getSize(new THREE.Vector3());
                const scaleFactor = 2.0 / size.y;
                horseModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
                
                // Center model
                const center = box.getCenter(new THREE.Vector3());
                horseModel.position.set(-center.x * scaleFactor, -center.y * scaleFactor, -center.z * scaleFactor);
                
                const wrapper = new THREE.Group();
                wrapper.add(horseModel);
                scene.add(wrapper);
                
                horseModel = wrapper; // Use wrapper for visibility toggling
                state.horseLoaded = true;
            },
            undefined,
            (error) => {
                console.warn('Could not load ._horse.glb, creating placeholder.', error);
                // Fallback placeholder if model not found
                const geo = new THREE.BoxGeometry(1, 2, 1);
                const mat = new THREE.MeshStandardMaterial({ color: 0x888888 });
                horseModel = new THREE.Mesh(geo, mat);
                scene.add(horseModel);
                state.horseLoaded = true;
            }
        );

        // UI Elements
        const hudStrength = document.getElementById('hud-strength');
        const hudParticles = document.getElementById('hud-particles');
        const hudPoles = document.getElementById('hud-poles');
        const btnReset = document.getElementById('btn-reset');

        function updateHUD() {
            hudStrength.innerText = `Field Strength: ${state.fieldStrength.toFixed(1)}`;
            hudParticles.innerText = `Particles: ${state.particlesPaused ? 'PAUSED' : 'ACTIVE'}`;
            hudPoles.innerText = `Poles: ${state.polesReversed ? 'REVERSED' : 'NORMAL'}`;
        }

        function applyPoleColors() {
            if (state.polesReversed) {
                northPole.material.color.setHex(0x3333ff);
                northPole.material.emissive.setHex(0x3333ff);
                southPole.material.color.setHex(0xff3333);
                southPole.material.emissive.setHex(0xff3333);
            } else {
                northPole.material.color.setHex(0xff3333);
                northPole.material.emissive.setHex(0xff3333);
                southPole.material.color.setHex(0x3333ff);
                southPole.material.emissive.setHex(0x3333ff);
            }
        }

        // Interactions
        window.addEventListener('keydown', (e) => {
            switch(e.key.toLowerCase()) {
                case 'f':
                    state.fieldLinesVisible = !state.fieldLinesVisible;
                    fieldLinesGroup.visible = state.fieldLinesVisible;
                    break;
                case 'p':
                    state.particlesPaused = !state.particlesPaused;
                    break;
                case 'h':
                    state.horseVisible = !state.horseVisible;
                    if (horseModel) horseModel.visible = state.horseVisible;
                    break;
                case 'r':
                    state.polesReversed = !state.polesReversed;
                    applyPoleColors();
                    break;
                case 'arrowup':
                    state.fieldStrength = Math.min(5.0, state.fieldStrength + 0.5);
                    break;
                case 'arrowdown':
                    state.fieldStrength = Math.max(0.5, state.fieldStrength - 0.5);
                    break;
            }
            updateHUD();
        });

        btnReset.addEventListener('click', () => {
            state.fieldStrength = 2.0;
            state.fieldLinesVisible = true;
            fieldLinesGroup.visible = true;
            state.particlesPaused = false;
            state.horseVisible = true;
            if (horseModel) horseModel.visible = true;
            state.polesReversed = false;
            applyPoleColors();
            updateHUD();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = clock.getDelta();

            if (!state.particlesPaused) {
                particles.forEach(p => {
                    const curveLen = curveLengths[p.curveIndex];
                    const progressDelta = (state.fieldStrength * dt) / curveLen;
                    
                    if (state.polesReversed) {
                        p.progress -= progressDelta;
                        if (p.progress < 0) {
                            p.progress += 1;
                            p.curveIndex = Math.floor(Math.random() * state.fieldLineCount);
                        }
                    } else {
                        p.progress += progressDelta;
                        if (p.progress > 1) {
                            p.progress -= 1;
                            p.curveIndex = Math.floor(Math.random() * state.fieldLineCount);
                        }
                    }

                    const point = curves[p.curveIndex].getPointAt(p.progress);
                    p.mesh.position.copy(point);
                });
            }

            state.cameraDistance = camera.position.distanceTo(scene.position);
            
            controls.update();
            renderer.render(scene, camera);
        }

        updateHUD();
        animate();
    </script>
</body>
</html>
