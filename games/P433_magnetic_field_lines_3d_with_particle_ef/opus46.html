<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magnetic Field Lines 3D Visualization</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a1a; }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 15px;
    left: 15px;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px 20px;
    border-radius: 8px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    z-index: 100;
    line-height: 1.8;
    backdrop-filter: blur(5px);
  }
  #hud div { white-space: nowrap; }
  #btn-reset {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 10px 24px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
    color: #ffffff;
    background: rgba(80, 80, 120, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 6px;
    cursor: pointer;
    z-index: 100;
    backdrop-filter: blur(5px);
    transition: background 0.2s;
  }
  #btn-reset:hover {
    background: rgba(100, 100, 160, 0.8);
  }
  #controls-help {
    position: fixed;
    bottom: 15px;
    left: 15px;
    color: rgba(255, 255, 255, 0.5);
    font-family: 'Courier New', monospace;
    font-size: 11px;
    background: rgba(0, 0, 0, 0.4);
    padding: 10px 15px;
    border-radius: 6px;
    z-index: 100;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="hud">
  <div id="hud-strength">Field Strength: 2.0</div>
  <div id="hud-particles">Particles: ACTIVE</div>
  <div id="hud-poles">Poles: NORMAL</div>
</div>

<button id="btn-reset">Reset</button>

<div id="controls-help">
  [F] Toggle Field Lines &nbsp; [P] Pause/Resume &nbsp; [H] Toggle Horse<br>
  [↑/↓] Field Strength &nbsp; [R] Reverse Poles &nbsp; [Reset] Reset All
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ─── State ───
window.__3D_STATE__ = {
  fieldLinesVisible: true,
  particlesPaused: false,
  fieldStrength: 2.0,
  horseVisible: true,
  polesReversed: false,
  particleCount: 200,
  fieldLineCount: 12,
  northPolePosition: { x: -6, y: 0, z: 0 },
  southPolePosition: { x: 6, y: 0, z: 0 },
  horseLoaded: false,
  cameraDistance: 15
};

const state = window.__3D_STATE__;

// ─── Scene Setup ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 15);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Lights ───
const ambientLight = new THREE.AmbientLight(0x334455, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// ─── Grid helper (subtle) ───
const gridHelper = new THREE.GridHelper(20, 20, 0x222244, 0x111133);
gridHelper.position.y = -2;
scene.add(gridHelper);

// ─── Magnetic Poles ───
const northPolePos = new THREE.Vector3(-6, 0, 0);
const southPolePos = new THREE.Vector3(6, 0, 0);

function createPole(color, position) {
  const group = new THREE.Group();
  
  const geometry = new THREE.SphereGeometry(0.5, 32, 32);
  const material = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.8,
    metalness: 0.3,
    roughness: 0.4
  });
  const sphere = new THREE.Mesh(geometry, material);
  group.add(sphere);

  // Glow effect
  const glowGeo = new THREE.SphereGeometry(0.8, 32, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: color,
    transparent: true,
    opacity: 0.15,
    side: THREE.BackSide
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  group.add(glow);

  // Point light
  const light = new THREE.PointLight(color, 2, 8);
  group.add(light);

  group.position.copy(position);
  scene.add(group);
  return { group, sphere, glow, light, material };
}

let northPole = createPole(0xff3333, northPolePos);
let southPole = createPole(0x3333ff, southPolePos);

// ─── Field Lines ───
const fieldLineGroup = new THREE.Group();
scene.add(fieldLineGroup);

const fieldLineCurves = [];

function generateFieldLines() {
  // Clear existing
  while (fieldLineGroup.children.length > 0) {
    const child = fieldLineGroup.children[0];
    fieldLineGroup.remove(child);
    if (child.geometry) child.geometry.dispose();
    if (child.material) child.material.dispose();
  }
  fieldLineCurves.length = 0;

  const numLines = 12;
  
  for (let i = 0; i < numLines; i++) {
    const angle = (i / numLines) * Math.PI * 2;
    const points = [];
    const numPoints = 30;
    
    // Vary the arc height for different lines
    const arcHeight = 1.5 + (i % 3) * 1.5;
    
    for (let j = 0; j <= numPoints; j++) {
      const t = j / numPoints;
      
      // Interpolate x from north to south
      const x = northPolePos.x + (southPolePos.x - northPolePos.x) * t;
      
      // Arc shape using sine
      const arcFactor = Math.sin(t * Math.PI);
      const y = arcFactor * arcHeight * Math.cos(angle);
      const z = arcFactor * arcHeight * Math.sin(angle);
      
      points.push(new THREE.Vector3(x, y, z));
    }
    
    const curve = new THREE.CatmullRomCurve3(points);
    fieldLineCurves.push(curve);
    
    // Create tube
    const tubeGeo = new THREE.TubeGeometry(curve, 64, 0.03, 8, false);
    
    // Gradient material: vertex colors
    const colors = [];
    const posAttr = tubeGeo.attributes.position;
    for (let v = 0; v < posAttr.count; v++) {
      const px = posAttr.getX(v);
      const t = (px - northPolePos.x) / (southPolePos.x - northPolePos.x);
      const clampedT = Math.max(0, Math.min(1, t));
      
      // Red to blue gradient
      const r = 1.0 - clampedT * 0.8;
      const g = 0.1 + clampedT * 0.1;
      const b = 0.2 + clampedT * 0.8;
      
      colors.push(r, g, b);
    }
    tubeGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    
    const tubeMat = new THREE.MeshStandardMaterial({
      vertexColors: true,
      emissive: 0x222222,
      emissiveIntensity: 0.5,
      metalness: 0.5,
      roughness: 0.3,
      transparent: true,
      opacity: 0.7
    });
    
    const tube = new THREE.Mesh(tubeGeo, tubeMat);
    fieldLineGroup.add(tube);
  }
}

generateFieldLines();

// ─── Particles ───
const particleGroup = new THREE.Group();
scene.add(particleGroup);

const particles = [];
const particleMaterial = new THREE.MeshStandardMaterial({
  color: 0x00ff88,
  emissive: 0x00ff88,
  emissiveIntensity: 1.0,
  metalness: 0.0,
  roughness: 0.5
});

const particleGeometry = new THREE.SphereGeometry(0.05, 8, 8);

for (let i = 0; i < 200; i++) {
  const mesh = new THREE.Mesh(particleGeometry, particleMaterial.clone());
  
  const lineIndex = Math.floor(Math.random() * fieldLineCurves.length);
  const t = Math.random();
  
  const particle = {
    mesh: mesh,
    lineIndex: lineIndex,
    t: t,
    speed: 0.8 + Math.random() * 0.4 // variation factor
  };
  
  if (fieldLineCurves.length > 0) {
    const pos = fieldLineCurves[lineIndex].getPointAt(t);
    mesh.position.copy(pos);
  }
  
  particleGroup.add(mesh);
  particles.push(particle);
}

// ─── Horse Model ───
let horseModel = null;
let horseMixer = null;

const loader = new GLTFLoader();
loader.load(
  '._horse.glb',
  (gltf) => {
    horseModel = gltf.scene;
    
    // Calculate bounding box to scale
    const box = new THREE.Box3().setFromObject(horseModel);
    const size = new THREE.Vector3();
    box.getSize(size);
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 2.0 / maxDim;
    horseModel.scale.set(scale, scale, scale);
    
    // Center it
    const center = new THREE.Vector3();
    box.getCenter(center);
    horseModel.position.set(-center.x * scale, -box.min.y * scale, -center.z * scale);
    
    scene.add(horseModel);
    state.horseLoaded = true;
    
    // Setup animation if available
    if (gltf.animations && gltf.animations.length > 0) {
      horseMixer = new THREE.AnimationMixer(horseModel);
      const action = horseMixer.clipAction(gltf.animations[0]);
      action.play();
    }
  },
  undefined,
  (error) => {
    console.warn('Could not load horse model, creating placeholder:', error);
    createPlaceholderHorse();
  }
);

function createPlaceholderHorse() {
  // Create a simple placeholder horse shape
  const group = new THREE.Group();
  
  // Body
  const bodyGeo = new THREE.BoxGeometry(2, 0.8, 0.7);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x8B6914, roughness: 0.6, metalness: 0.1 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.set(0, 1.2, 0);
  group.add(body);
  
  // Head
  const headGeo = new THREE.BoxGeometry(0.5, 0.6, 0.4);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(1.2, 1.8, 0);
  head.rotation.z = -0.3;
  group.add(head);
  
  // Neck
  const neckGeo = new THREE.BoxGeometry(0.3, 0.8, 0.35);
  const neck = new THREE.Mesh(neckGeo, bodyMat);
  neck.position.set(0.9, 1.6, 0);
  neck.rotation.z = -0.4;
  group.add(neck);
  
  // Legs
  const legGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.0, 8);
  const legPositions = [
    [-0.7, 0.5, 0.25], [-0.7, 0.5, -0.25],
    [0.7, 0.5, 0.25], [0.7, 0.5, -0.25]
  ];
  legPositions.forEach(pos => {
    const leg = new THREE.Mesh(legGeo, bodyMat);
    leg.position.set(...pos);
    group.add(leg);
  });
  
  // Tail
  const tailGeo = new THREE.CylinderGeometry(0.05, 0.02, 0.8, 8);
  const tail = new THREE.Mesh(tailGeo, bodyMat);
  tail.position.set(-1.2, 1.4, 0);
  tail.rotation.z = 0.8;
  group.add(tail);
  
  // Label
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0, 0, 256, 64);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('🐴 Horse Model', 128, 40);
  
  const texture = new THREE.CanvasTexture(canvas);
  const spriteMat = new THREE.SpriteMaterial({ map: texture, transparent: true });
  const sprite = new THREE.Sprite(spriteMat);
  sprite.position.set(0, 2.5, 0);
  sprite.scale.set(2, 0.5, 1);
  group.add(sprite);
  
  group.position.set(0, 0, 0);
  scene.add(group);
  horseModel = group;
  state.horseLoaded = true;
}

// ─── HUD Elements ───
const hudStrength = document.getElementById('hud-strength');
const hudParticles = document.getElementById('hud-particles');
const hudPoles = document.getElementById('hud-poles');

function updateHUD() {
  hudStrength.textContent = `Field Strength: ${state.fieldStrength.toFixed(1)}`;
  hudParticles.textContent = `Particles: ${state.particlesPaused ? 'PAUSED' : 'ACTIVE'}`;
  hudPoles.textContent = `Poles: ${state.polesReversed ? 'REVERSED' : 'NORMAL'}`;
}

// ─── Keyboard Controls ───
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  
  if (key === 'f') {
    state.fieldLinesVisible = !state.fieldLinesVisible;
    fieldLineGroup.visible = state.fieldLinesVisible;
  }
  
  if (key === 'p') {
    state.particlesPaused = !state.particlesPaused;
  }
  
  if (e.key === 'ArrowUp') {
    e.preventDefault();
    state.fieldStrength = Math.min(5.0, state.fieldStrength + 0.5);
  }
  
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    state.fieldStrength = Math.max(0.5, state.fieldStrength - 0.5);
  }
  
  if (key === 'h') {
    state.horseVisible = !state.horseVisible;
    if (horseModel) horseModel.visible = state.horseVisible;
  }
  
  if (key === 'r') {
    state.polesReversed = !state.polesReversed;
    updatePoleColors();
  }
  
  updateHUD();
});

function updatePoleColors() {
  if (state.polesReversed) {
    // Swap colors
    northPole.material.color.setHex(0x3333ff);
    northPole.material.emissive.setHex(0x3333ff);
    northPole.glow.material.color.setHex(0x3333ff);
    northPole.light.color.setHex(0x3333ff);
    
    southPole.material.color.setHex(0xff3333);
    southPole.material.emissive.setHex(0xff3333);
    southPole.glow.material.color.setHex(0xff3333);
    southPole.light.color.setHex(0xff3333);
  } else {
    northPole.material.color.setHex(0xff3333);
    northPole.material.emissive.setHex(0xff3333);
    northPole.glow.material.color.setHex(0xff3333);
    northPole.light.color.setHex(0xff3333);
    
    southPole.material.color.setHex(0x3333ff);
    southPole.material.emissive.setHex(0x3333ff);
    southPole.glow.material.color.setHex(0x3333ff);
    southPole.light.color.setHex(0x3333ff);
  }
}

// ─── Reset Button ───
document.getElementById('btn-reset').addEventListener('click', () => {
  state.fieldStrength = 2.0;
  state.fieldLinesVisible = true;
  state.particlesPaused = false;
  state.horseVisible = true;
  state.polesReversed = false;
  
  fieldLineGroup.visible = true;
  if (horseModel) horseModel.visible = true;
  updatePoleColors();
  updateHUD();
});

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = clock.getDelta();
  
  controls.update();
  
  // Update horse animation mixer
  if (horseMixer) {
    horseMixer.update(delta);
  }
  
  // Animate particles
  if (!state.particlesPaused && fieldLineCurves.length > 0) {
    const speed = state.fieldStrength;
    const direction = state.polesReversed ? -1 : 1;
    
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      
      // Move along curve: speed is units/sec, curve length ~12 units, so dt in parameter space
      const curveLength = fieldLineCurves[p.lineIndex].getLength();
      const dtParam = (speed * p.speed * delta * direction) / curveLength;
      
      p.t += dtParam;
      
      // Wrap around
      if (p.t > 1.0) {
        p.t = 0.0;
        p.lineIndex = Math.floor(Math.random() * fieldLineCurves.length);
      } else if (p.t < 0.0) {
        p.t = 1.0;
        p.lineIndex = Math.floor(Math.random() * fieldLineCurves.length);
      }
      
      const clampedT = Math.max(0, Math.min(1, p.t));
      const pos = fieldLineCurves[p.lineIndex].getPointAt(clampedT);
      p.mesh.position.copy(pos);
      
      // Pulse emissive
      const pulse = 0.7 + 0.3 * Math.sin(clock.elapsedTime * 3 + i * 0.5);
      p.mesh.material.emissiveIntensity = pulse;
    }
  }
  
  // Animate pole glow
  const glowPulse = 0.1 + 0.08 * Math.sin(clock.elapsedTime * 2);
  northPole.glow.material.opacity = glowPulse;
  southPole.glow.material.opacity = glowPulse;
  
  const glowScale = 1.0 + 0.1 * Math.sin(clock.elapsedTime * 2);
  northPole.glow.scale.setScalar(glowScale);
  southPole.glow.scale.setScalar(glowScale);
  
  // Update state
  const camDist = camera.position.length();
  state.cameraDistance = isNaN(camDist) ? 15 : parseFloat(camDist.toFixed(2));
  state.fieldStrength = isNaN(state.fieldStrength) ? 2.0 : state.fieldStrength;
  state.particleCount = 200;
  state.fieldLineCount = 12;
  state.northPolePosition = { x: -6, y: 0, z: 0 };
  state.southPolePosition = { x: 6, y: 0, z: 0 };
  
  updateHUD();
  
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
