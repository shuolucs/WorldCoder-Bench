<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Flight Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; }
  canvas { display: block; }
  #hud {
    position: fixed;
    top: 20px;
    left: 20px;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    background: rgba(0, 0, 0, 0.6);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid rgba(255, 170, 0, 0.4);
    line-height: 1.8;
    z-index: 100;
    pointer-events: none;
    text-shadow: 0 0 5px rgba(255, 170, 0, 0.5);
  }
  #hud .label { color: #ffaa00; }
  #hud .value { color: #fff; font-weight: bold; }
  #instructions {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    background: rgba(0, 0, 0, 0.5);
    padding: 10px 20px;
    border-radius: 8px;
    text-align: center;
    z-index: 100;
    pointer-events: none;
  }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="hud">
  <div><span class="label">Speed: </span><span class="value" id="speed">0.0</span> <span class="label">m/s</span></div>
  <div><span class="label">Altitude: </span><span class="value" id="altitude">20.0</span> <span class="label">m</span></div>
  <div><span class="label">Score: </span><span class="value" id="score">0</span></div>
  <div><span class="label">Rings: </span><span class="value" id="ringsHit">0</span></div>
  <div><span class="label">Time: </span><span class="value" id="time">0.0</span> <span class="label">s</span></div>
</div>
<div id="instructions">
  WASD: Pitch/Yaw &nbsp;|&nbsp; SPACE: Ascend &nbsp;|&nbsp; SHIFT: Dive Boost
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ============ SCENE SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.003);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 25, -15);

// ============ LIGHTING ============
const ambientLight = new THREE.AmbientLight(0x6688cc, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
dirLight.position.set(50, 100, 50);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
dirLight.shadow.camera.near = 1;
dirLight.shadow.camera.far = 300;
dirLight.shadow.camera.left = -100;
dirLight.shadow.camera.right = 100;
dirLight.shadow.camera.top = 100;
dirLight.shadow.camera.bottom = -100;
scene.add(dirLight);

const hemiLight = new THREE.HemisphereLight(0x88bbff, 0x445522, 0.4);
scene.add(hemiLight);

// ============ GROUND WITH TERRAIN ============
const groundSize = 500;
const groundSegments = 128;
const groundGeo = new THREE.PlaneGeometry(groundSize, groundSize, groundSegments, groundSegments);
groundGeo.rotateX(-Math.PI / 2);

// Simple noise-based displacement
const posAttr = groundGeo.attributes.position;
for (let i = 0; i < posAttr.count; i++) {
  const x = posAttr.getX(i);
  const z = posAttr.getZ(i);
  const height = 
    Math.sin(x * 0.02) * Math.cos(z * 0.02) * 3 +
    Math.sin(x * 0.05 + 1.3) * Math.cos(z * 0.03 + 0.7) * 1.5 +
    Math.sin(x * 0.01 + z * 0.01) * 5;
  posAttr.setY(i, height);
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({
  color: 0x3a7d2a,
  roughness: 0.9,
  metalness: 0.0,
  flatShading: false
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.receiveShadow = true;
scene.add(ground);

// ============ CLOUDS ============
function createCloud(x, y, z) {
  const group = new THREE.Group();
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 1, metalness: 0, transparent: true, opacity: 0.8 });
  const count = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < count; i++) {
    const s = 2 + Math.random() * 4;
    const geo = new THREE.SphereGeometry(s, 8, 6);
    const mesh = new THREE.Mesh(geo, cloudMat);
    mesh.position.set((Math.random() - 0.5) * 6, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 6);
    mesh.scale.y = 0.5 + Math.random() * 0.3;
    group.add(mesh);
  }
  group.position.set(x, y, z);
  return group;
}

for (let i = 0; i < 30; i++) {
  const cloud = createCloud(
    (Math.random() - 0.5) * 400,
    40 + Math.random() * 60,
    (Math.random() - 0.5) * 400
  );
  scene.add(cloud);
}

// ============ TREES ============
const treeTrunkGeo = new THREE.CylinderGeometry(0.2, 0.4, 3, 6);
const treeTrunkMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
const treeTopGeo = new THREE.ConeGeometry(2, 4, 6);
const treeTopMat = new THREE.MeshStandardMaterial({ color: 0x228B22 });

for (let i = 0; i < 100; i++) {
  const x = (Math.random() - 0.5) * 400;
  const z = (Math.random() - 0.5) * 400;
  const trunk = new THREE.Mesh(treeTrunkGeo, treeTrunkMat);
  const top = new THREE.Mesh(treeTopGeo, treeTopMat);
  
  // Get approximate ground height
  const gx = x, gz = z;
  const gh = Math.sin(gx * 0.02) * Math.cos(gz * 0.02) * 3 +
    Math.sin(gx * 0.05 + 1.3) * Math.cos(gz * 0.03 + 0.7) * 1.5 +
    Math.sin(gx * 0.01 + gz * 0.01) * 5;
  
  trunk.position.set(x, gh + 1.5, z);
  top.position.set(x, gh + 5, z);
  trunk.castShadow = true;
  top.castShadow = true;
  scene.add(trunk);
  scene.add(top);
}

// ============ STATE ============
let gameState = {
  modelLoaded: false,
  speed: 8,
  altitude: 20,
  score: 0,
  ringsHit: 0,
  activeRings: 0,
  time: 0,
  dragonPos: { x: 0, y: 20, z: 0 },
  crashed: false
};
window.__3D_STATE__ = gameState;

const keys = {};
window.addEventListener('keydown', (e) => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', (e) => { keys[e.code] = false; e.preventDefault(); });

// ============ DRAGON ============
let dragon = null;
let mixer = null;
const dragonGroup = new THREE.Group();
dragonGroup.position.set(0, 20, 0);
scene.add(dragonGroup);

// Placeholder dragon (visible until model loads)
const placeholderGeo = new THREE.ConeGeometry(0.8, 3, 8);
placeholderGeo.rotateX(Math.PI / 2);
const placeholderMat = new THREE.MeshStandardMaterial({ color: 0xcc3333 });
const placeholder = new THREE.Mesh(placeholderGeo, placeholderMat);
dragonGroup.add(placeholder);

const loader = new GLTFLoader();
loader.load('assets/DragonAttenuation.glb', (gltf) => {
  dragon = gltf.scene;
  dragon.scale.set(0.5, 0.5, 0.5);
  
  dragon.traverse((child) => {
    if (child.isMesh) {
      child.castShadow = true;
    }
  });
  
  // Remove placeholder
  dragonGroup.remove(placeholder);
  dragonGroup.add(dragon);
  
  // Play animations if available
  if (gltf.animations && gltf.animations.length > 0) {
    mixer = new THREE.AnimationMixer(dragon);
    const clip = gltf.animations[0];
    const action = mixer.clipAction(clip);
    action.setLoop(THREE.LoopRepeat);
    action.play();
  }
  
  gameState.modelLoaded = true;
  console.log('Dragon model loaded!');
}, undefined, (error) => {
  console.warn('Could not load dragon model, using placeholder:', error);
  gameState.modelLoaded = false;
});

// ============ RING CHECKPOINTS ============
const rings = [];
const ringEffects = [];

function createRing(targetPos) {
  const torusGeo = new THREE.TorusGeometry(3, 0.3, 16, 32);
  const torusMat = new THREE.MeshStandardMaterial({
    color: 0xffaa00,
    emissive: 0xffaa00,
    emissiveIntensity: 0.8,
    metalness: 0.5,
    roughness: 0.3
  });
  const torus = new THREE.Mesh(torusGeo, torusMat);
  
  // Add glow ring
  const glowGeo = new THREE.TorusGeometry(3, 0.6, 8, 32);
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0xffaa00,
    transparent: true,
    opacity: 0.2,
    side: THREE.DoubleSide
  });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  torus.add(glow);
  
  // Point light for the ring
  const ringLight = new THREE.PointLight(0xffaa00, 2, 15);
  torus.add(ringLight);
  
  // Position
  if (targetPos) {
    torus.position.copy(targetPos);
  } else {
    const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(dragonGroup.quaternion);
    torus.position.set(
      dragonGroup.position.x + forward.x * (50 + Math.random() * 100) + (Math.random() - 0.5) * 60,
      10 + Math.random() * 30,
      dragonGroup.position.z + forward.z * (50 + Math.random() * 100) + (Math.random() - 0.5) * 60
    );
  }
  
  // Random rotation so rings face different directions
  torus.rotation.set(
    Math.random() * Math.PI * 0.3,
    Math.random() * Math.PI * 2,
    Math.random() * Math.PI * 0.3
  );
  
  torus.userData.passed = false;
  scene.add(torus);
  rings.push(torus);
  return torus;
}

// Generate initial rings
function generateInitialRings() {
  for (let i = 0; i < 5; i++) {
    const pos = new THREE.Vector3(
      (Math.random() - 0.5) * 60,
      10 + Math.random() * 30,
      50 + Math.random() * 100
    );
    createRing(pos);
  }
}
generateInitialRings();

// Ring pass effect
function createRingEffect(position) {
  const effectGroup = new THREE.Group();
  effectGroup.position.copy(position);
  
  // Expanding ring
  const ringGeo = new THREE.TorusGeometry(3, 0.2, 8, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffff00,
    transparent: true,
    opacity: 1.0
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  effectGroup.add(ring);
  
  // Particles
  const particleCount = 20;
  const particleGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(particleCount * 3);
  const velocities = [];
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = 0;
    positions[i * 3 + 1] = 0;
    positions[i * 3 + 2] = 0;
    velocities.push(new THREE.Vector3(
      (Math.random() - 0.5) * 20,
      (Math.random() - 0.5) * 20,
      (Math.random() - 0.5) * 20
    ));
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0xffaa00,
    size: 0.5,
    transparent: true,
    opacity: 1.0
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  effectGroup.add(particles);
  
  scene.add(effectGroup);
  ringEffects.push({
    group: effectGroup,
    ring,
    ringMat,
    particles,
    particleMat,
    particleGeo,
    velocities,
    life: 1.0
  });
}

// ============ FLIGHT PHYSICS ============
const BASE_SPEED = 8;
const PITCH_SPEED = 1.5;
const YAW_SPEED = 1.5;
const ASCEND_SPEED = 5;
const DIVE_SPEED = 5;

let currentSpeed = BASE_SPEED;
let elapsedTime = 0;

function resetDragon() {
  dragonGroup.position.set(0, 20, 0);
  dragonGroup.rotation.set(0, 0, 0);
  dragonGroup.quaternion.identity();
  gameState.crashed = true;
  gameState.score = Math.max(0, gameState.score - 5);
}

// ============ CAMERA ============
const cameraOffset = new THREE.Vector3(0, 5, -15);
const cameraLookOffset = new THREE.Vector3(0, 0, 10);

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  
  const delta = Math.min(clock.getDelta(), 0.05);
  elapsedTime += delta;
  
  gameState.crashed = false;
  
  // Update mixer
  if (mixer) mixer.update(delta);
  
  // ---- Flight Controls ----
  // Pitch
  if (keys['KeyW']) {
    dragonGroup.rotateX(PITCH_SPEED * delta);
  }
  if (keys['KeyS']) {
    dragonGroup.rotateX(-PITCH_SPEED * delta);
  }
  
  // Yaw
  if (keys['KeyA']) {
    dragonGroup.rotateY(YAW_SPEED * delta);
  }
  if (keys['KeyD']) {
    dragonGroup.rotateY(-YAW_SPEED * delta);
  }
  
  // Forward direction
  const forward = new THREE.Vector3(0, 0, 1).applyQuaternion(dragonGroup.quaternion).normalize();
  
  // Base movement
  let moveSpeed = BASE_SPEED;
  const velocity = forward.clone().multiplyScalar(moveSpeed * delta);
  
  // Space: ascend
  if (keys['Space']) {
    velocity.y += ASCEND_SPEED * delta;
  }
  
  // Shift: dive boost
  if (keys['ShiftLeft'] || keys['ShiftRight']) {
    const diveDir = forward.clone();
    diveDir.y -= 0.5;
    diveDir.normalize();
    velocity.add(diveDir.multiplyScalar(DIVE_SPEED * delta));
  }
  
  dragonGroup.position.add(velocity);
  
  // Calculate actual speed
  currentSpeed = velocity.length() / delta;
  
  // ---- Ground collision ----
  if (dragonGroup.position.y < 1) {
    resetDragon();
  }
  
  // Clamp to world bounds loosely
  const bound = 240;
  dragonGroup.position.x = THREE.MathUtils.clamp(dragonGroup.position.x, -bound, bound);
  dragonGroup.position.z = THREE.MathUtils.clamp(dragonGroup.position.z, -bound, bound);
  
  // ---- Ring collision ----
  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    if (ring.userData.passed) continue;
    
    const dist = dragonGroup.position.distanceTo(ring.position);
    if (dist < 3.5) {
      ring.userData.passed = true;
      gameState.score += 10;
      gameState.ringsHit++;
      
      // Effect
      createRingEffect(ring.position.clone());
      
      // Remove ring
      scene.remove(ring);
      rings.splice(i, 1);
      
      // Spawn new ring
      createRing();
    }
  }
  
  // Animate rings (bob and rotate)
  rings.forEach((ring) => {
    ring.rotation.z += delta * 0.5;
    ring.position.y += Math.sin(elapsedTime * 2 + ring.position.x) * 0.005;
  });
  
  // ---- Update ring effects ----
  for (let i = ringEffects.length - 1; i >= 0; i--) {
    const effect = ringEffects[i];
    effect.life -= delta * 2;
    
    if (effect.life <= 0) {
      scene.remove(effect.group);
      ringEffects.splice(i, 1);
      continue;
    }
    
    // Expand ring
    const scale = 1 + (1 - effect.life) * 3;
    effect.ring.scale.set(scale, scale, scale);
    effect.ringMat.opacity = effect.life;
    effect.particleMat.opacity = effect.life;
    
    // Move particles
    const posArr = effect.particleGeo.attributes.position.array;
    for (let j = 0; j < effect.velocities.length; j++) {
      posArr[j * 3] += effect.velocities[j].x * delta;
      posArr[j * 3 + 1] += effect.velocities[j].y * delta;
      posArr[j * 3 + 2] += effect.velocities[j].z * delta;
    }
    effect.particleGeo.attributes.position.needsUpdate = true;
  }
  
  // ---- Camera follow ----
  const desiredCamPos = cameraOffset.clone().applyQuaternion(dragonGroup.quaternion).add(dragonGroup.position);
  camera.position.lerp(desiredCamPos, 1 - Math.pow(0.01, delta));
  
  const lookTarget = cameraLookOffset.clone().applyQuaternion(dragonGroup.quaternion).add(dragonGroup.position);
  camera.lookAt(lookTarget);
  
  // ---- Update HUD ----
  document.getElementById('speed').textContent = currentSpeed.toFixed(1);
  document.getElementById('altitude').textContent = dragonGroup.position.y.toFixed(1);
  document.getElementById('score').textContent = gameState.score;
  document.getElementById('ringsHit').textContent = gameState.ringsHit;
  document.getElementById('time').textContent = elapsedTime.toFixed(1);
  
  // ---- Update state ----
  gameState.speed = parseFloat(currentSpeed.toFixed(1));
  gameState.altitude = parseFloat(dragonGroup.position.y.toFixed(1));
  gameState.activeRings = rings.length;
  gameState.time = parseFloat(elapsedTime.toFixed(1));
  gameState.dragonPos = {
    x: parseFloat(dragonGroup.position.x.toFixed(2)),
    y: parseFloat(dragonGroup.position.y.toFixed(2)),
    z: parseFloat(dragonGroup.position.z.toFixed(2))
  };
  window.__3D_STATE__ = gameState;
  
  // ---- Render ----
  renderer.render(scene, camera);
}

animate();

// ============ RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
