<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Flight Simulator</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            min-width: 150px;
        }
        #hud h2 {
            margin: 0 0 10px 0;
            font-size: 18px;
            color: #ffaa00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .hud-item {
            margin-bottom: 8px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }
        .hud-value {
            font-weight: bold;
            color: #aaddff;
        }
        #controls-help {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: #ddd;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
            line-height: 1.5;
        }
        .key {
            background: #333;
            padding: 2px 6px;
            border-radius: 3px;
            color: #fff;
            font-family: monospace;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="hud">
        <h2>Flight Status</h2>
        <div class="hud-item">Speed: <span class="hud-value"><span id="speed">0.0</span> m/s</span></div>
        <div class="hud-item">Altitude: <span class="hud-value"><span id="altitude">20.0</span> m</span></div>
        <div class="hud-item">Score: <span class="hud-value" id="score">0</span></div>
        <div class="hud-item">Rings Hit: <span class="hud-value" id="ringsHit">0</span></div>
        <div class="hud-item">Time: <span class="hud-value"><span id="time">0.0</span> s</span></div>
    </div>
    
    <div id="controls-help">
        <span class="key">W</span>/<span class="key">S</span> Pitch Down/Up<br>
        <span class="key">A</span>/<span class="key">D</span> Yaw Left/Right<br>
        <span class="key">Space</span> Ascend Boost<br>
        <span class="key">Shift</span> Dive Boost
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            modelLoaded: false,
            speed: 0,
            altitude: 20,
            score: 0,
            ringsHit: 0,
            activeRings: 0,
            time: 0,
            dragonPos: { x: 0, y: 20, z: 0 },
            crashed: false
        };
        const state = window.__3D_STATE__;

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.0);
        dirLight.position.set(100, 200, 50);
        dirLight.castShadow = true;
        dirLight.shadow.camera.top = 200;
        dirLight.shadow.camera.bottom = -200;
        dirLight.shadow.camera.left = -200;
        dirLight.shadow.camera.right = 200;
        scene.add(dirLight);

        // --- Terrain ---
        const terrainSize = 5000; // Made larger than 500 to allow continuous flight visually
        const terrainGeo = new THREE.PlaneGeometry(terrainSize, terrainSize, 100, 100);
        terrainGeo.rotateX(-Math.PI / 2);
        
        const posAttr = terrainGeo.attributes.position;
        for (let i = 0; i < posAttr.count; i++) {
            const x = posAttr.getX(i);
            const z = posAttr.getZ(i);
            // Simple displacement, keeping it mostly below y=0
            const y = Math.sin(x * 0.02) * Math.cos(z * 0.02) * 10 - 5;
            posAttr.setY(i, y);
        }
        terrainGeo.computeVertexNormals();

        const terrainMat = new THREE.MeshStandardMaterial({ 
            color: 0x2d5a27, 
            roughness: 0.8,
            flatShading: true
        });
        const terrain = new THREE.Mesh(terrainGeo, terrainMat);
        terrain.receiveShadow = true;
        scene.add(terrain);

        // --- Dragon Model ---
        const dragonGroup = new THREE.Group();
        dragonGroup.position.set(0, 20, 0);
        scene.add(dragonGroup);

        let mixer;
        const loader = new GLTFLoader();
        loader.load('assets/DragonAttenuation.glb', (gltf) => {
            const model = gltf.scene;
            model.scale.set(0.5, 0.5, 0.5);
            
            model.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            dragonGroup.add(model);

            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(model);
                const action = mixer.clipAction(gltf.animations[0]);
                action.play();
            }
            
            state.modelLoaded = true;
        });

        // --- Rings System ---
        const rings = [];
        const ringGeo = new THREE.TorusGeometry(3, 0.3, 16, 32);
        const ringMat = new THREE.MeshStandardMaterial({ 
            color: 0xffaa00, 
            emissive: 0xffaa00, 
            emissiveIntensity: 0.8,
            transparent: true,
            opacity: 0.9
        });

        function spawnRing() {
            const ring = new THREE.Mesh(ringGeo, ringMat);
            
            // Calculate position in front of dragon
            const forwardOffset = 50 + Math.random() * 100;
            const lateralOffset = (Math.random() - 0.5) * 60;
            
            const localOffset = new THREE.Vector3(lateralOffset, 0, forwardOffset);
            localOffset.applyQuaternion(dragonGroup.quaternion);
            
            ring.position.copy(dragonGroup.position).add(localOffset);
            ring.position.y = 10 + Math.random() * 30; // Force y between 10 and 40
            
            ring.lookAt(dragonGroup.position);
            
            scene.add(ring);
            rings.push(ring);
            state.activeRings = rings.length;
        }

        for (let i = 0; i < 5; i++) {
            spawnRing();
        }

        // --- Effects System ---
        const effects = [];
        function createExplosion(pos, quaternion) {
            const mat = new THREE.MeshBasicMaterial({ 
                color: 0xffdd55, 
                transparent: true, 
                opacity: 1,
                side: THREE.DoubleSide
            });
            const mesh = new THREE.Mesh(ringGeo, mat);
            mesh.position.copy(pos);
            mesh.quaternion.copy(quaternion);
            scene.add(mesh);
            effects.push({ mesh, life: 1.0 });
        }

        // --- Input Handling ---
        const keys = { w: false, a: false, s: false, d: false, ' ': false, shift: false };
        
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true;
            if (e.key === 'Shift') keys.shift = true;
        });
        
        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = false;
            if (e.key === 'Shift') keys.shift = false;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Main Loop ---
        const clock = new THREE.Clock();
        let lastPos = new THREE.Vector3(0, 20, 0);

        // DOM Elements for HUD
        const elSpeed = document.getElementById('speed');
        const elAltitude = document.getElementById('altitude');
        const elScore = document.getElementById('score');
        const elRingsHit = document.getElementById('ringsHit');
        const elTime = document.getElementById('time');

        function animate() {
            requestAnimationFrame(animate);
            
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent huge jumps
            state.time += delta;

            if (mixer) mixer.update(delta);

            if (state.modelLoaded) {
                // 1. Rotation Control
                const rotSpeed = 1.5 * delta;
                if (keys.w) dragonGroup.rotateX(rotSpeed);  // Pitch down
                if (keys.s) dragonGroup.rotateX(-rotSpeed); // Pitch up
                if (keys.a) dragonGroup.rotateY(-rotSpeed); // Yaw left (Three.js right-handed, +Y is up, CCW is positive)
                if (keys.d) dragonGroup.rotateY(rotSpeed);  // Yaw right

                // 2. Movement Calculation
                const baseSpeed = 8;
                // Forward vector (+Z in local space)
                const moveVec = new THREE.Vector3(0, 0, 1).applyQuaternion(dragonGroup.quaternion).multiplyScalar(baseSpeed * delta);
                
                if (keys[' ']) {
                    // Ascend boost (World +Y)
                    moveVec.y += 5 * delta;
                }
                if (keys.shift) {
                    // Dive boost (Local forward-down)
                    const forwardDown = new THREE.Vector3(0, -1, 1).normalize().applyQuaternion(dragonGroup.quaternion);
                    moveVec.add(forwardDown.multiplyScalar(5 * delta));
                }

                dragonGroup.position.add(moveVec);

                // Calculate actual speed for HUD
                const distMoved = dragonGroup.position.distanceTo(lastPos);
                state.speed = distMoved / delta;
                lastPos.copy(dragonGroup.position);

                // 3. Crash Detection
                state.crashed = false;
                if (dragonGroup.position.y < 1) {
                    state.score -= 5;
                    dragonGroup.position.set(0, 20, 0);
                    dragonGroup.rotation.set(0, 0, 0);
                    lastPos.copy(dragonGroup.position);
                    state.crashed = true;
                    
                    // Reset camera immediately to avoid sweeping through ground
                    const camOffset = new THREE.Vector3(0, 5, -15);
                    camera.position.copy(dragonGroup.position).add(camOffset);
                    camera.lookAt(dragonGroup.position);
                }

                // 4. Ring Collision
                for (let i = rings.length - 1; i >= 0; i--) {
                    const ring = rings[i];
                    if (dragonGroup.position.distanceTo(ring.position) < 3.5) {
                        state.score += 10;
                        state.ringsHit++;
                        createExplosion(ring.position, ring.quaternion);
                        scene.remove(ring);
                        rings.splice(i, 1);
                        spawnRing();
                    }
                }

                // Keep terrain centered under dragon to simulate infinite flight
                terrain.position.x = dragonGroup.position.x;
                terrain.position.z = dragonGroup.position.z;

                // 5. Camera Follow
                const camOffset = new THREE.Vector3(0, 5, -15);
                camOffset.applyQuaternion(dragonGroup.quaternion);
                const targetCamPos = dragonGroup.position.clone().add(camOffset);
                
                // Smooth position
                camera.position.lerp(targetCamPos, 5 * delta);
                
                // Smooth rotation
                const lookTarget = dragonGroup.position.clone().add(new THREE.Vector3(0, 0, 10).applyQuaternion(dragonGroup.quaternion));
                const targetRotation = new THREE.Quaternion().setFromRotationMatrix(
                    new THREE.Matrix4().lookAt(camera.position, lookTarget, new THREE.Vector3(0, 1, 0))
                );
                camera.quaternion.slerp(targetRotation, 5 * delta);

                // 6. Update State & HUD
                state.altitude = dragonGroup.position.y;
                state.dragonPos.x = dragonGroup.position.x;
                state.dragonPos.y = dragonGroup.position.y;
                state.dragonPos.z = dragonGroup.position.z;
                state.activeRings = rings.length;

                elSpeed.innerText = state.speed.toFixed(1);
                elAltitude.innerText = state.altitude.toFixed(1);
                elScore.innerText = state.score;
                elRingsHit.innerText = state.ringsHit;
                elTime.innerText = state.time.toFixed(1);
            }

            // Update Effects
            for (let i = effects.length - 1; i >= 0; i--) {
                const eff = effects[i];
                eff.life -= delta * 2;
                if (eff.life <= 0) {
                    scene.remove(eff.mesh);
                    eff.mesh.material.dispose();
                    effects.splice(i, 1);
                } else {
                    eff.mesh.scale.addScalar(delta * 8);
                    eff.mesh.material.opacity = eff.life;
                }
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
