<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Periodic Table Quiz</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0a0a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
        }
        .hud-panel {
            background: rgba(10, 10, 46, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 15px 25px;
            color: white;
            backdrop-filter: blur(4px);
            pointer-events: auto;
        }
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        #score-display {
            font-size: 1.2rem;
            font-weight: bold;
        }
        #question-display {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            flex-grow: 1;
            margin: 0 20px;
            color: #f8f9fa;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        #difficulty-display {
            font-size: 1.5rem;
            color: #ffd43b;
            letter-spacing: 2px;
        }
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        #streak-display {
            font-size: 1.1rem;
        }
        .streak-correct { color: #69db7c; }
        .streak-wrong { color: #ff6b6b; }
        .controls {
            display: flex;
            gap: 15px;
        }
        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 20px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            pointer-events: auto;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        #nextQuestionBtn {
            background: rgba(32, 201, 151, 0.3);
            border-color: #20c997;
            display: none;
        }
        #nextQuestionBtn:hover {
            background: rgba(32, 201, 151, 0.5);
        }
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            pointer-events: none;
            display: none;
            z-index: 20;
            border: 1px solid rgba(255,255,255,0.2);
            transform: translate(-50%, -120%);
            white-space: nowrap;
        }
        .tooltip-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 4px; }
        .tooltip-info { color: #adb5bd; }
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 2rem;
            z-index: 100;
            background: #0a0a2e;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="loading">Loading Scene...</div>
    <div id="canvas-container"></div>
    <div id="tooltip"></div>
    <div id="hud">
        <div class="top-row">
            <div class="hud-panel" id="score-display">Score: 0 / 0</div>
            <div class="hud-panel" id="question-display">Loading...</div>
            <div class="hud-panel" id="difficulty-display">★☆☆</div>
        </div>
        <div class="bottom-row">
            <div class="hud-panel" id="streak-display">Streak: 0</div>
            <div class="controls">
                <button id="resetBtn">Reset Quiz</button>
                <button id="nextQuestionBtn">Next Question</button>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            sceneReady: false,
            elementCount: 0,
            score: 0,
            totalAttempts: 0,
            currentDifficulty: 1,
            consecutiveCorrect: 0,
            consecutiveWrong: 0,
            currentQuestion: "",
            correctElementSymbol: "",
            lastAnswerCorrect: null,
            modelLoaded: false,
            hoveredElement: null,
            quizActive: false,
            difficultyChanges: 0
        };

        const state = window.__3D_STATE__;

        // --- Data ---
        const elementsData = [
            { n: 1, sym: 'H', name: 'Hydrogen', cat: 'nonmetal', p: 1, g: 1 },
            { n: 2, sym: 'He', name: 'Helium', cat: 'noble gas', p: 1, g: 18 },
            { n: 3, sym: 'Li', name: 'Lithium', cat: 'alkali metal', p: 2, g: 1 },
            { n: 4, sym: 'Be', name: 'Beryllium', cat: 'alkaline earth', p: 2, g: 2 },
            { n: 5, sym: 'B', name: 'Boron', cat: 'metalloid', p: 2, g: 13 },
            { n: 6, sym: 'C', name: 'Carbon', cat: 'nonmetal', p: 2, g: 14 },
            { n: 7, sym: 'N', name: 'Nitrogen', cat: 'nonmetal', p: 2, g: 15 },
            { n: 8, sym: 'O', name: 'Oxygen', cat: 'nonmetal', p: 2, g: 16 },
            { n: 9, sym: 'F', name: 'Fluorine', cat: 'halogen', p: 2, g: 17 },
            { n: 10, sym: 'Ne', name: 'Neon', cat: 'noble gas', p: 2, g: 18 },
            { n: 11, sym: 'Na', name: 'Sodium', cat: 'alkali metal', p: 3, g: 1 },
            { n: 12, sym: 'Mg', name: 'Magnesium', cat: 'alkaline earth', p: 3, g: 2 },
            { n: 13, sym: 'Al', name: 'Aluminum', cat: 'other metal', p: 3, g: 13 },
            { n: 14, sym: 'Si', name: 'Silicon', cat: 'metalloid', p: 3, g: 14 },
            { n: 15, sym: 'P', name: 'Phosphorus', cat: 'nonmetal', p: 3, g: 15 },
            { n: 16, sym: 'S', name: 'Sulfur', cat: 'nonmetal', p: 3, g: 16 },
            { n: 17, sym: 'Cl', name: 'Chlorine', cat: 'halogen', p: 3, g: 17 },
            { n: 18, sym: 'Ar', name: 'Argon', cat: 'noble gas', p: 3, g: 18 },
            { n: 19, sym: 'K', name: 'Potassium', cat: 'alkali metal', p: 4, g: 1 },
            { n: 20, sym: 'Ca', name: 'Calcium', cat: 'alkaline earth', p: 4, g: 2 },
            { n: 21, sym: 'Sc', name: 'Scandium', cat: 'transition metal', p: 4, g: 3 },
            { n: 22, sym: 'Ti', name: 'Titanium', cat: 'transition metal', p: 4, g: 4 },
            { n: 23, sym: 'V', name: 'Vanadium', cat: 'transition metal', p: 4, g: 5 },
            { n: 24, sym: 'Cr', name: 'Chromium', cat: 'transition metal', p: 4, g: 6 },
            { n: 25, sym: 'Mn', name: 'Manganese', cat: 'transition metal', p: 4, g: 7 },
            { n: 26, sym: 'Fe', name: 'Iron', cat: 'transition metal', p: 4, g: 8 },
            { n: 27, sym: 'Co', name: 'Cobalt', cat: 'transition metal', p: 4, g: 9 },
            { n: 28, sym: 'Ni', name: 'Nickel', cat: 'transition metal', p: 4, g: 10 },
            { n: 29, sym: 'Cu', name: 'Copper', cat: 'transition metal', p: 4, g: 11 },
            { n: 30, sym: 'Zn', name: 'Zinc', cat: 'transition metal', p: 4, g: 12 },
            { n: 31, sym: 'Ga', name: 'Gallium', cat: 'other metal', p: 4, g: 13 },
            { n: 32, sym: 'Ge', name: 'Germanium', cat: 'metalloid', p: 4, g: 14 },
            { n: 33, sym: 'As', name: 'Arsenic', cat: 'metalloid', p: 4, g: 15 },
            { n: 34, sym: 'Se', name: 'Selenium', cat: 'nonmetal', p: 4, g: 16 },
            { n: 35, sym: 'Br', name: 'Bromine', cat: 'halogen', p: 4, g: 17 },
            { n: 36, sym: 'Kr', name: 'Krypton', cat: 'noble gas', p: 4, g: 18 }
        ];

        const categoryColors = {
            'alkali metal': 0xff6b6b,
            'alkaline earth': 0xffa94d,
            'transition metal': 0x4dabf7,
            'metalloid': 0x69db7c,
            'nonmetal': 0xa9e34b,
            'noble gas': 0xcc5de8,
            'halogen': 0x20c997,
            'other metal': 0x748ffc
        };

        // --- Scene Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 5, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight2.position.set(-5, 5, -5);
        scene.add(dirLight2);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enablePan = false;
        controls.minDistance = 10;
        controls.maxDistance = 30;
        controls.maxPolarAngle = Math.PI / 2 + 0.2; 

        // --- Periodic Table Construction ---
        const elementMeshes = [];
        const boxGeo = new THREE.BoxGeometry(0.8, 0.8, 0.3);
        const spacing = 0.9;

        function createTextTexture(text) {
            const canvas = document.createElement('canvas');
            canvas.width = 128;
            canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = 'bold 60px sans-serif';
            ctx.fillText(text, 64, 64);
            const texture = new THREE.CanvasTexture(canvas);
            texture.colorSpace = THREE.SRGBColorSpace;
            return texture;
        }

        elementsData.forEach(el => {
            const color = categoryColors[el.cat] || 0xffffff;
            const tex = createTextTexture(el.sym);
            
            const baseMat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.4, metalness: 0.1 });
            const frontMat = new THREE.MeshStandardMaterial({ color: color, map: tex, roughness: 0.4, metalness: 0.1 });
            
            const materials = [
                baseMat.clone(), baseMat.clone(), 
                baseMat.clone(), baseMat.clone(), 
                frontMat, baseMat.clone()
            ];

            const mesh = new THREE.Mesh(boxGeo, materials);
            
            const x = (el.g - 9.5) * spacing;
            const y = (4 - el.p) * spacing;
            mesh.position.set(x, y, 0);
            
            mesh.userData = {
                ...el,
                baseColor: color,
                flashTime: 0,
                flashColor: null
            };

            scene.add(mesh);
            elementMeshes.push(mesh);
            state.elementCount++;
        });

        // --- Robot Tutor ---
        let robot, mixer;
        const robotActions = {};
        let currentRobotAction = null;
        let fallbackRobotAnim = 'idle';
        let fallbackAnimTimer = 0;

        const loader = new GLTFLoader();
        loader.load('https://threejs.org/examples/models/gltf/Xbot.glb', (gltf) => {
            robot = gltf.scene;
            robot.position.set(-8, -2, 3);
            robot.scale.set(2.0, 2.0, 2.0);
            
            robot.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            scene.add(robot);
            
            if (gltf.animations && gltf.animations.length > 0) {
                mixer = new THREE.AnimationMixer(robot);
                gltf.animations.forEach(clip => {
                    robotActions[clip.name.toLowerCase()] = mixer.clipAction(clip);
                });
                playRobotAnim('idle');
            }
            
            state.modelLoaded = true;
            checkReady();
        }, undefined, (error) => {
            console.error("Error loading robot model:", error);
            state.modelLoaded = true; // Proceed anyway
            checkReady();
        });

        function playRobotAnim(name) {
            if (mixer) {
                let targetAction = robotActions[name];
                if (!targetAction) {
                    // Fallbacks if specific names not found
                    if (name === 'agree' && robotActions['walk']) targetAction = robotActions['walk'];
                    if (name === 'headshake' && robotActions['run']) targetAction = robotActions['run'];
                    if (!targetAction && robotActions['idle']) targetAction = robotActions['idle'];
                }

                if (targetAction) {
                    if (currentRobotAction && currentRobotAction !== targetAction) {
                        currentRobotAction.fadeOut(0.2);
                    }
                    targetAction.reset().fadeIn(0.2).play();
                    currentRobotAction = targetAction;

                    if (name !== 'idle') {
                        setTimeout(() => playRobotAnim('idle'), 2000);
                    }
                }
            } else if (robot) {
                fallbackRobotAnim = name;
                fallbackAnimTimer = 2.0;
            }
        }

        function checkReady() {
            if (state.elementCount > 0 && state.modelLoaded) {
                state.sceneReady = true;
                document.getElementById('loading').style.display = 'none';
                generateQuestion();
            }
        }
        checkReady(); // In case elements load instantly

        // --- Quiz Logic ---
        let currentTargetElements = [];

        function generateQuestion() {
            const targetEl = elementsData[Math.floor(Math.random() * elementsData.length)];
            state.correctElementSymbol = targetEl.sym;
            currentTargetElements = [];

            if (state.currentDifficulty === 1) {
                state.currentQuestion = `Click on ${targetEl.sym}`;
                currentTargetElements.push(targetEl);
            } else if (state.currentDifficulty === 2) {
                state.currentQuestion = `Click on element with atomic number ${targetEl.n}`;
                currentTargetElements.push(targetEl);
            } else {
                state.currentQuestion = `Click on a ${targetEl.cat} in period ${targetEl.p}`;
                currentTargetElements = elementsData.filter(e => e.cat === targetEl.cat && e.p === targetEl.p);
            }

            state.quizActive = true;
            state.lastAnswerCorrect = null;
            updateHUD();
            document.getElementById('nextQuestionBtn').style.display = 'none';
        }

        function handleAnswer(clickedMesh) {
            if (!state.quizActive) return;
            
            state.quizActive = false;
            state.totalAttempts++;
            
            const clickedData = clickedMesh.userData;
            const isCorrect = currentTargetElements.some(e => e.sym === clickedData.sym);
            
            state.lastAnswerCorrect = isCorrect;

            if (isCorrect) {
                state.score++;
                state.consecutiveCorrect++;
                state.consecutiveWrong = 0;
                playRobotAnim('agree');
                flashMesh(clickedMesh, 0x00ff00);
                
                if (state.consecutiveCorrect >= 2 && state.currentDifficulty < 3) {
                    state.currentDifficulty++;
                    state.difficultyChanges++;
                    state.consecutiveCorrect = 0;
                }
            } else {
                state.consecutiveWrong++;
                state.consecutiveCorrect = 0;
                playRobotAnim('headshake');
                flashMesh(clickedMesh, 0xff0000);
                
                // Flash correct answers
                elementMeshes.forEach(m => {
                    if (currentTargetElements.some(e => e.sym === m.userData.sym)) {
                        flashMesh(m, 0x00ff00);
                    }
                });

                if (state.consecutiveWrong >= 2 && state.currentDifficulty > 1) {
                    state.currentDifficulty--;
                    state.difficultyChanges++;
                    state.consecutiveWrong = 0;
                }
            }

            updateHUD();
            document.getElementById('nextQuestionBtn').style.display = 'block';
        }

        function flashMesh(mesh, colorHex) {
            mesh.userData.flashColor = new THREE.Color(colorHex);
            mesh.userData.flashTime = 1.5; // seconds
        }

        // --- Interaction ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(elementMeshes);

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                const data = mesh.userData;
                state.hoveredElement = data.sym;
                
                tooltip.style.display = 'block';
                tooltip.style.left = e.clientX + 'px';
                tooltip.style.top = e.clientY + 'px';
                tooltip.innerHTML = `
                    <div class="tooltip-title">${data.name} (${data.sym})</div>
                    <div class="tooltip-info">Atomic Number: ${data.n}</div>
                    <div class="tooltip-info">Category: ${data.cat}</div>
                    <div class="tooltip-info">Period: ${data.p}, Group: ${data.g}</div>
                `;
                document.body.style.cursor = 'pointer';
            } else {
                state.hoveredElement = null;
                tooltip.style.display = 'none';
                document.body.style.cursor = 'default';
            }
        });

        window.addEventListener('click', (e) => {
            if (e.target.tagName === 'BUTTON') return;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(elementMeshes);
            if (intersects.length > 0) {
                handleAnswer(intersects[0].object);
            }
        });

        document.getElementById('nextQuestionBtn').addEventListener('click', generateQuestion);
        document.getElementById('resetBtn').addEventListener('click', () => {
            state.score = 0;
            state.totalAttempts = 0;
            state.currentDifficulty = 1;
            state.consecutiveCorrect = 0;
            state.consecutiveWrong = 0;
            generateQuestion();
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- HUD Update ---
        function updateHUD() {
            document.getElementById('score-display').innerText = `Score: ${state.score} / ${state.totalAttempts}`;
            document.getElementById('question-display').innerText = state.currentQuestion;
            
            let stars = '';
            for(let i=1; i<=3; i++) stars += i <= state.currentDifficulty ? '★' : '☆';
            document.getElementById('difficulty-display').innerText = stars;

            const streakEl = document.getElementById('streak-display');
            if (state.consecutiveCorrect > 0) {
                streakEl.innerHTML = `Streak: <span class="streak-correct">${state.consecutiveCorrect} Correct</span>`;
            } else if (state.consecutiveWrong > 0) {
                streakEl.innerHTML = `Streak: <span class="streak-wrong">${state.consecutiveWrong} Wrong</span>`;
            } else {
                streakEl.innerText = `Streak: 0`;
            }
        }

        // --- Animation Loop ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            controls.update();

            if (mixer) mixer.update(delta);

            // Fallback robot animation
            if (!mixer && robot) {
                if (fallbackAnimTimer > 0) {
                    fallbackAnimTimer -= delta;
                    if (fallbackRobotAnim === 'agree') {
                        robot.rotation.y = Math.sin(time * 10) * 0.2;
                    } else if (fallbackRobotAnim === 'headshake') {
                        robot.rotation.z = Math.sin(time * 15) * 0.1;
                    }
                } else {
                    robot.rotation.y = Math.sin(time) * 0.05;
                    robot.rotation.z = 0;
                }
            }

            // Update Meshes (Flash, Pulse, Hover)
            elementMeshes.forEach(mesh => {
                const isTarget = state.quizActive && currentTargetElements.some(e => e.sym === mesh.userData.sym);
                const isHovered = state.hoveredElement === mesh.userData.sym;
                
                if (mesh.userData.flashTime > 0) {
                    mesh.userData.flashTime -= delta;
                    mesh.material.forEach(m => {
                        m.color.copy(mesh.userData.flashColor);
                        m.emissive.setHex(0x000000);
                    });
                } else {
                    mesh.material.forEach(m => m.color.setHex(mesh.userData.baseColor));
                    
                    if (isTarget) {
                        const pulse = (Math.sin(time * 4) + 1) / 2 * 0.6;
                        mesh.material.forEach(m => {
                            m.emissive.setHex(0xffffff);
                            m.emissiveIntensity = pulse;
                        });
                    } else if (isHovered) {
                        mesh.material.forEach(m => {
                            m.emissive.setHex(mesh.userData.baseColor);
                            m.emissiveIntensity = 0.5;
                        });
                    } else {
                        mesh.material.forEach(m => {
                            m.emissive.setHex(0x000000);
                            m.emissiveIntensity = 0;
                        });
                    }
                }
            });

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
