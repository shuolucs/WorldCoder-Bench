<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Periodic Table Quiz</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0a0a2e;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    canvas {
      display: block;
    }

    .hud {
      position: absolute;
      z-index: 10;
      pointer-events: none;
    }

    .panel {
      background: rgba(10, 10, 35, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 10px 14px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    #scorePanel {
      top: 16px;
      left: 16px;
    }

    #questionPanel {
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 380px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
    }

    #difficultyPanel {
      top: 16px;
      right: 16px;
      font-size: 24px;
      letter-spacing: 2px;
    }

    #streakPanel {
      bottom: 16px;
      left: 16px;
    }

    #controlsPanel {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      gap: 12px;
      pointer-events: auto;
      background: rgba(10, 10, 35, 0.72);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px;
      padding: 12px;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 14px rgba(0,0,0,0.35);
    }

    button {
      background: rgba(255,255,255,0.12);
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    #tooltip {
      position: absolute;
      z-index: 30;
      pointer-events: none;
      display: none;
      background: rgba(0,0,0,0.82);
      color: white;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 13px;
      white-space: nowrap;
    }

    #loading {
      position: absolute;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      background: rgba(10, 10, 35, 0.45);
      font-size: 20px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">Loading 3D Periodic Table Quiz...</div>

    <div id="scorePanel" class="hud panel">Score: 0 / 0</div>
    <div id="questionPanel" class="hud panel">Preparing question...</div>
    <div id="difficultyPanel" class="hud panel">★☆☆</div>
    <div id="streakPanel" class="hud panel">Streak: 0 correct / 0 wrong</div>

    <div id="controlsPanel">
      <button id="nextQuestionBtn">Next Question</button>
      <button id="resetBtn">Reset Quiz</button>
    </div>

    <div id="tooltip"></div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const app = document.getElementById('app');
    const loadingEl = document.getElementById('loading');
    const scorePanel = document.getElementById('scorePanel');
    const questionPanel = document.getElementById('questionPanel');
    const difficultyPanel = document.getElementById('difficultyPanel');
    const streakPanel = document.getElementById('streakPanel');
    const tooltip = document.getElementById('tooltip');
    const nextQuestionBtn = document.getElementById('nextQuestionBtn');
    const resetBtn = document.getElementById('resetBtn');

    window.__3D_STATE__ = {
      sceneReady: false,
      elementCount: 0,
      score: 0,
      totalAttempts: 0,
      currentDifficulty: 1,
      consecutiveCorrect: 0,
      consecutiveWrong: 0,
      currentQuestion: "",
      correctElementSymbol: "",
      lastAnswerCorrect: null,
      modelLoaded: false,
      hoveredElement: null,
      quizActive: false,
      difficultyChanges: 0
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a2e);

    const camera = new THREE.PerspectiveCamera(
      60,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 5, 20);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    app.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const dir1 = new THREE.DirectionalLight(0xffffff, 0.8);
    dir1.position.set(5, 10, 7);
    scene.add(dir1);

    const dir2 = new THREE.DirectionalLight(0xffffff, 0.3);
    dir2.position.set(-5, 5, -5);
    scene.add(dir2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enablePan = false;
    controls.minDistance = 10;
    controls.maxDistance = 35;
    controls.minPolarAngle = Math.PI / 5;
    controls.maxPolarAngle = Math.PI / 2.2;
    controls.target.set(0, 2, 0);
    controls.update();

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    const clock = new THREE.Clock();

    const categoryColors = {
      "alkali metal": 0xff6b6b,
      "alkaline earth": 0xffa94d,
      "transition metal": 0x4dabf7,
      "metalloid": 0x69db7c,
      "nonmetal": 0xa9e34b,
      "noble gas": 0xcc5de8,
      "halogen": 0x20c997,
      "other metal": 0x748ffc
    };

    const elements = [
      { atomicNumber: 1, symbol: "H", name: "Hydrogen", category: "nonmetal", period: 1, group: 1 },
      { atomicNumber: 2, symbol: "He", name: "Helium", category: "noble gas", period: 1, group: 18 },

      { atomicNumber: 3, symbol: "Li", name: "Lithium", category: "alkali metal", period: 2, group: 1 },
      { atomicNumber: 4, symbol: "Be", name: "Beryllium", category: "alkaline earth", period: 2, group: 2 },
      { atomicNumber: 5, symbol: "B", name: "Boron", category: "metalloid", period: 2, group: 13 },
      { atomicNumber: 6, symbol: "C", name: "Carbon", category: "nonmetal", period: 2, group: 14 },
      { atomicNumber: 7, symbol: "N", name: "Nitrogen", category: "nonmetal", period: 2, group: 15 },
      { atomicNumber: 8, symbol: "O", name: "Oxygen", category: "nonmetal", period: 2, group: 16 },
      { atomicNumber: 9, symbol: "F", name: "Fluorine", category: "halogen", period: 2, group: 17 },
      { atomicNumber: 10, symbol: "Ne", name: "Neon", category: "noble gas", period: 2, group: 18 },

      { atomicNumber: 11, symbol: "Na", name: "Sodium", category: "alkali metal", period: 3, group: 1 },
      { atomicNumber: 12, symbol: "Mg", name: "Magnesium", category: "alkaline earth", period: 3, group: 2 },
      { atomicNumber: 13, symbol: "Al", name: "Aluminium", category: "other metal", period: 3, group: 13 },
      { atomicNumber: 14, symbol: "Si", name: "Silicon", category: "metalloid", period: 3, group: 14 },
      { atomicNumber: 15, symbol: "P", name: "Phosphorus", category: "nonmetal", period: 3, group: 15 },
      { atomicNumber: 16, symbol: "S", name: "Sulfur", category: "nonmetal", period: 3, group: 16 },
      { atomicNumber: 17, symbol: "Cl", name: "Chlorine", category: "halogen", period: 3, group: 17 },
      { atomicNumber: 18, symbol: "Ar", name: "Argon", category: "noble gas", period: 3, group: 18 },

      { atomicNumber: 19, symbol: "K", name: "Potassium", category: "alkali metal", period: 4, group: 1 },
      { atomicNumber: 20, symbol: "Ca", name: "Calcium", category: "alkaline earth", period: 4, group: 2 },
      { atomicNumber: 21, symbol: "Sc", name: "Scandium", category: "transition metal", period: 4, group: 3 },
      { atomicNumber: 22, symbol: "Ti", name: "Titanium", category: "transition metal", period: 4, group: 4 },
      { atomicNumber: 23, symbol: "V", name: "Vanadium", category: "transition metal", period: 4, group: 5 },
      { atomicNumber: 24, symbol: "Cr", name: "Chromium", category: "transition metal", period: 4, group: 6 },
      { atomicNumber: 25, symbol: "Mn", name: "Manganese", category: "transition metal", period: 4, group: 7 },
      { atomicNumber: 26, symbol: "Fe", name: "Iron", category: "transition metal", period: 4, group: 8 },
      { atomicNumber: 27, symbol: "Co", name: "Cobalt", category: "transition metal", period: 4, group: 9 },
      { atomicNumber: 28, symbol: "Ni", name: "Nickel", category: "transition metal", period: 4, group: 10 },
      { atomicNumber: 29, symbol: "Cu", name: "Copper", category: "transition metal", period: 4, group: 11 },
      { atomicNumber: 30, symbol: "Zn", name: "Zinc", category: "transition metal", period: 4, group: 12 },
      { atomicNumber: 31, symbol: "Ga", name: "Gallium", category: "other metal", period: 4, group: 13 },
      { atomicNumber: 32, symbol: "Ge", name: "Germanium", category: "metalloid", period: 4, group: 14 },
      { atomicNumber: 33, symbol: "As", name: "Arsenic", category: "metalloid", period: 4, group: 15 },
      { atomicNumber: 34, symbol: "Se", name: "Selenium", category: "nonmetal", period: 4, group: 16 },
      { atomicNumber: 35, symbol: "Br", name: "Bromine", category: "halogen", period: 4, group: 17 },
      { atomicNumber: 36, symbol: "Kr", name: "Krypton", category: "noble gas", period: 4, group: 18 }
    ];

    const tableGroup = new THREE.Group();
    scene.add(tableGroup);

    const elementMeshes = [];
    const symbolToMesh = new Map();

    function createTextTexture(symbol) {
      const canvas = document.createElement('canvas');
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext('2d');

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = 'rgba(255,255,255,0.0)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'white';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 110px Arial';
      ctx.fillText(symbol, 128, 128);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    }

    function createElementBox(element) {
      const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.3);
      const color = categoryColors[element.category] ?? 0xffffff;

      const materials = [];
      for (let i = 0; i < 6; i++) {
        if (i === 4) {
          materials.push(new THREE.MeshStandardMaterial({
            color,
            emissive: 0x000000,
            map: createTextTexture(element.symbol),
            roughness: 0.45,
            metalness: 0.15
          }));
        } else {
          materials.push(new THREE.MeshStandardMaterial({
            color,
            emissive: 0x000000,
            roughness: 0.45,
            metalness: 0.15
          }));
        }
      }

      const mesh = new THREE.Mesh(geometry, materials);
      mesh.userData.element = element;
      mesh.userData.baseColor = color;
      mesh.userData.flashUntil = 0;
      mesh.userData.flashColor = null;
      mesh.userData.baseY = 0;
      mesh.userData.hovered = false;
      mesh.castShadow = false;
      mesh.receiveShadow = false;
      return mesh;
    }

    function buildPeriodicTable() {
      const spacingX = 1.05;
      const spacingY = 1.1;
      const offsetX = -((18 - 1) * spacingX) / 2;
      const offsetY = 4.5;

      elements.forEach((element) => {
        const mesh = createElementBox(element);
        const x = offsetX + (element.group - 1) * spacingX;
        const y = offsetY - (element.period - 1) * spacingY;
        const z = 0;

        mesh.position.set(x, y, z);
        mesh.userData.baseY = y;

        tableGroup.add(mesh);
        elementMeshes.push(mesh);
        symbolToMesh.set(element.symbol, mesh);
      });

      window.__3D_STATE__.elementCount = elementMeshes.length;
    }

    buildPeriodicTable();

    const tableBase = new THREE.Mesh(
      new THREE.BoxGeometry(20, 0.4, 4),
      new THREE.MeshStandardMaterial({ color: 0x111133, roughness: 0.9, metalness: 0.1 })
    );
    tableBase.position.set(0, 1.0, -1.2);
    scene.add(tableBase);

    let robot = null;
    let mixer = null;
    let robotAnimations = [];
    let activeAction = null;
    let idleAction = null;
    let feedbackFallbackTween = { type: null, end: 0 };

    function playAnimationByName(preferredNames) {
      if (!mixer || !robotAnimations.length) return false;
      let clip = null;
      for (const name of preferredNames) {
        clip = robotAnimations.find(a => a.name.toLowerCase().includes(name));
        if (clip) break;
      }
      if (!clip) return false;

      const action = mixer.clipAction(clip);
      action.reset();
      action.fadeIn(0.2);
      action.play();

      if (activeAction && activeAction !== action) {
        activeAction.fadeOut(0.2);
      }
      activeAction = action;
      return true;
    }

    function playIdleAnimation() {
      if (!mixer || !robotAnimations.length) return;
      const candidates = ['idle', 'breath', 'standing'];
      let clip = robotAnimations.find(a => candidates.some(c => a.name.toLowerCase().includes(c)));
      if (!clip) clip = robotAnimations[0];
      idleAction = mixer.clipAction(clip);
      idleAction.reset();
      idleAction.fadeIn(0.2);
      idleAction.play();
      activeAction = idleAction;
    }

    function robotFeedback(type) {
      const success = type === 'correct';
      const animPlayed = success
        ? playAnimationByName(['wave', 'celebrat', 'dance', 'happy'])
        : playAnimationByName(['no', 'shake', 'sad', 'angry']);

      if (!animPlayed && robot) {
        feedbackFallbackTween.type = type;
        feedbackFallbackTween.end = performance.now() + 700;
      }

      if (animPlayed && idleAction) {
        setTimeout(() => {
          playIdleAnimation();
        }, 1200);
      }
    }

    const gltfLoader = new GLTFLoader();
    gltfLoader.load(
      'Xbot.glb',
      (gltf) => {
        robot = gltf.scene;
        robot.position.set(-8, 0, 3);
        robot.scale.setScalar(2.0);
        scene.add(robot);

        robotAnimations = gltf.animations || [];
        if (robotAnimations.length > 0) {
          mixer = new THREE.AnimationMixer(robot);
          playIdleAnimation();
        }

        window.__3D_STATE__.modelLoaded = true;
        checkSceneReady();
      },
      undefined,
      () => {
        const fallback = new THREE.Group();
        const body = new THREE.Mesh(
          new THREE.BoxGeometry(1.2, 2, 0.8),
          new THREE.MeshStandardMaterial({ color: 0x99ccff, metalness: 0.5, roughness: 0.35 })
        );
        body.position.y = 1.5;
        fallback.add(body);

        const head = new THREE.Mesh(
          new THREE.BoxGeometry(0.9, 0.9, 0.9),
          new THREE.MeshStandardMaterial({ color: 0xcce6ff, metalness: 0.4, roughness: 0.3 })
        );
        head.position.y = 2.8;
        fallback.add(head);

        const eyeGeo = new THREE.SphereGeometry(0.08, 12, 12);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x006666 });
        const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
        const eye2 = eye1.clone();
        eye1.position.set(-0.18, 2.85, 0.47);
        eye2.position.set(0.18, 2.85, 0.47);
        fallback.add(eye1, eye2);

        robot = fallback;
        robot.position.set(-8, 0, 3);
        robot.scale.setScalar(2.0);
        scene.add(robot);

        window.__3D_STATE__.modelLoaded = true;
        checkSceneReady();
      }
    );

    let currentDifficulty = 1;
    let score = 0;
    let totalAttempts = 0;
    let consecutiveCorrect = 0;
    let consecutiveWrong = 0;
    let difficultyChanges = 0;
    let quizActive = false;
    let currentQuestion = null;
    let currentCorrectElement = null;
    let hoveredMesh = null;
    let lastAnswerCorrect = null;

    function difficultyStars(level) {
      if (level === 1) return "★☆☆";
      if (level === 2) return "★★☆";
      return "★★★";
    }

    function updateHUD() {
      scorePanel.textContent = `Score: ${score} / ${totalAttempts}`;
      questionPanel.textContent = currentQuestion?.text || "Click Next Question";
      difficultyPanel.textContent = difficultyStars(currentDifficulty);
      streakPanel.textContent = `Streak: ${consecutiveCorrect} correct / ${consecutiveWrong} wrong`;
    }

    function chooseRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function generateQuestion() {
      let question = null;

      if (currentDifficulty === 1) {
        const el = chooseRandom(elements);
        question = {
          text: `Click on element ${el.symbol}`,
          answer: el
        };
      } else if (currentDifficulty === 2) {
        const el = chooseRandom(elements);
        question = {
          text: `Click on element with atomic number ${el.atomicNumber}`,
          answer: el
        };
      } else {
        let candidates = [];
        for (const el of elements) {
          const count = elements.filter(e => e.period === el.period && e.category === el.category).length;
          if (count === 1) candidates.push(el);
        }
        const el = chooseRandom(candidates.length ? candidates : elements);
        question = {
          text: `Click on the ${el.category} element in period ${el.period}`,
          answer: el
        };
      }

      currentQuestion = question;
      currentCorrectElement = question.answer;
      quizActive = true;
      lastAnswerCorrect = null;
      updateHUD();
    }

    function adjustDifficulty() {
      let changed = false;
      if (consecutiveCorrect >= 2 && currentDifficulty < 3) {
        currentDifficulty++;
        consecutiveCorrect = 0;
        changed = true;
      } else if (consecutiveWrong >= 2 && currentDifficulty > 1) {
        currentDifficulty--;
        consecutiveWrong = 0;
        changed = true;
      }
      if (changed) difficultyChanges++;
    }

    function flashMesh(mesh, colorHex, duration = 450) {
      mesh.userData.flashColor = colorHex;
      mesh.userData.flashUntil = performance.now() + duration;
    }

    function handleAnswer(clickedMesh) {
      if (!quizActive || !clickedMesh) return;

      const clickedElement = clickedMesh.userData.element;
      const isCorrect = clickedElement.symbol === currentCorrectElement.symbol;

      totalAttempts++;
      if (isCorrect) {
        score++;
        consecutiveCorrect++;
        consecutiveWrong = 0;
        flashMesh(clickedMesh, 0x00ff00, 500);
        robotFeedback('correct');
      } else {
        consecutiveWrong++;
        consecutiveCorrect = 0;
        flashMesh(clickedMesh, 0xff0000, 500);
        const correctMesh = symbolToMesh.get(currentCorrectElement.symbol);
        if (correctMesh) flashMesh(correctMesh, 0x00ff00, 700);
        robotFeedback('wrong');
      }

      lastAnswerCorrect = isCorrect;
      quizActive = false;
      adjustDifficulty();
      updateHUD();
    }

    function resetQuiz() {
      score = 0;
      totalAttempts = 0;
      consecutiveCorrect = 0;
      consecutiveWrong = 0;
      currentDifficulty = 1;
      difficultyChanges = 0;
      lastAnswerCorrect = null;
      generateQuestion();
      updateHUD();
    }

    nextQuestionBtn.addEventListener('click', () => {
      generateQuestion();
    });

    resetBtn.addEventListener('click', () => {
      resetQuiz();
    });

    function onPointerMove(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elementMeshes, false);

      if (hoveredMesh && (!intersects.length || hoveredMesh !== intersects[0].object)) {
        hoveredMesh.userData.hovered = false;
        hoveredMesh = null;
      }

      if (intersects.length) {
        hoveredMesh = intersects[0].object;
        hoveredMesh.userData.hovered = true;

        const el = hoveredMesh.userData.element;
        tooltip.style.display = 'block';
        tooltip.style.left = `${event.clientX + 12}px`;
        tooltip.style.top = `${event.clientY + 12}px`;
        tooltip.innerHTML = `${el.name} (${el.symbol})<br>Atomic #${el.atomicNumber}<br>${el.category}`;
        window.__3D_STATE__.hoveredElement = el.symbol;
      } else {
        tooltip.style.display = 'none';
        window.__3D_STATE__.hoveredElement = null;
      }
    }

    function onClick(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(elementMeshes, false);
      if (intersects.length) {
        handleAnswer(intersects[0].object);
      }
    }

    renderer.domElement.addEventListener('pointermove', onPointerMove);
    renderer.domElement.addEventListener('click', onClick);

    function checkSceneReady() {
      const ready = elementMeshes.length >= 36 && window.__3D_STATE__.modelLoaded;
      if (ready) {
        window.__3D_STATE__.sceneReady = true;
        loadingEl.style.display = 'none';
      }
    }

    function updateElementVisuals(time) {
      elementMeshes.forEach(mesh => {
        const mats = Array.isArray(mesh.material) ? mesh.material : [mesh.material];
        const baseColor = mesh.userData.baseColor;

        let emissive = 0x000000;
        let scale = 1.0;
        let y = mesh.userData.baseY;

        if (mesh.userData.hovered) {
          emissive = 0x333333;
          scale = 1.08;
        }

        if (quizActive && currentCorrectElement && mesh.userData.element.symbol === currentCorrectElement.symbol) {
          const pulse = 0.35 + 0.25 * Math.sin(time * 0.005);
          emissive = new THREE.Color(pulse, pulse, pulse * 1.4).getHex();
          y = mesh.userData.baseY + 0.05 * Math.sin(time * 0.006);
        }

        if (performance.now() < mesh.userData.flashUntil && mesh.userData.flashColor !== null) {
          mats.forEach(m => {
            m.color.setHex(mesh.userData.flashColor);
            m.emissive.setHex(mesh.userData.flashColor);
          });
        } else {
          mats.forEach((m, idx) => {
            m.color.setHex(baseColor);
            if (idx === 4 && m.map) {
              m.emissive.setHex(emissive);
            } else {
              m.emissive.setHex(emissive);
            }
          });
        }

        mesh.position.y = y;
        mesh.scale.set(scale, scale, scale);
      });
    }

    function updateRobotFallback(time) {
      if (!robot) return;

      if (feedbackFallbackTween.end > performance.now()) {
        if (feedbackFallbackTween.type === 'correct') {
          robot.rotation.y = Math.sin(time * 0.02) * 0.35;
        } else if (feedbackFallbackTween.type === 'wrong') {
          robot.rotation.z = Math.sin(time * 0.04) * 0.18;
        }
      } else {
        robot.rotation.y *= 0.9;
        robot.rotation.z *= 0.9;
      }
    }

    function syncState() {
      window.__3D_STATE__.sceneReady = window.__3D_STATE__.sceneReady && true;
      window.__3D_STATE__.elementCount = elementMeshes.length;
      window.__3D_STATE__.score = score;
      window.__3D_STATE__.totalAttempts = totalAttempts;
      window.__3D_STATE__.currentDifficulty = currentDifficulty;
      window.__3D_STATE__.consecutiveCorrect = consecutiveCorrect;
      window.__3D_STATE__.consecutiveWrong = consecutiveWrong;
      window.__3D_STATE__.currentQuestion = currentQuestion?.text || "";
      window.__3D_STATE__.correctElementSymbol = currentCorrectElement?.symbol || "";
      window.__3D_STATE__.lastAnswerCorrect = lastAnswerCorrect;
      window.__3D_STATE__.modelLoaded = !!window.__3D_STATE__.modelLoaded;
      window.__3D_STATE__.quizActive = quizActive;
      window.__3D_STATE__.difficultyChanges = difficultyChanges;
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const time = performance.now();

      if (mixer) mixer.update(delta);

      updateElementVisuals(time);
      updateRobotFallback(time);
      controls.update();
      syncState();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    generateQuestion();
    updateHUD();
    animate();
  </script>
</body>
</html>
