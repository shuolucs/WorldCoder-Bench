<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Periodic Table Quiz</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
canvas { display: block; }

#hud {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
}

#hud > div { pointer-events: auto; }

#score-display {
    position: absolute;
    top: 15px; left: 15px;
    background: rgba(10, 10, 46, 0.85);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 18px;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
}

#question-display {
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10, 10, 46, 0.9);
    color: #fff;
    padding: 14px 30px;
    border-radius: 12px;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(5px);
    max-width: 80%;
    text-shadow: 0 0 10px rgba(100,150,255,0.5);
}

#difficulty-display {
    position: absolute;
    top: 15px; right: 15px;
    background: rgba(10, 10, 46, 0.85);
    color: #ffd700;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 22px;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
}

#difficulty-label {
    font-size: 12px;
    color: #aaa;
    display: block;
    margin-bottom: 2px;
}

#bottom-controls {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 15px;
}

#bottom-controls button {
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
    pointer-events: auto;
}

#nextQuestionBtn {
    background: linear-gradient(135deg, #4dabf7, #228be6);
    color: #fff;
}
#nextQuestionBtn:hover { background: linear-gradient(135deg, #74c0fc, #339af0); transform: scale(1.05); }

#resetBtn {
    background: linear-gradient(135deg, #ff6b6b, #e03131);
    color: #fff;
}
#resetBtn:hover { background: linear-gradient(135deg, #ff8787, #f03e3e); transform: scale(1.05); }

#streak-display {
    position: absolute;
    bottom: 20px; left: 15px;
    background: rgba(10, 10, 46, 0.85);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 15px;
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(5px);
}

#tooltip {
    position: absolute;
    display: none;
    background: rgba(10, 10, 46, 0.95);
    color: #fff;
    padding: 10px 16px;
    border-radius: 10px;
    font-size: 14px;
    pointer-events: none;
    border: 1px solid rgba(100,150,255,0.4);
    backdrop-filter: blur(5px);
    z-index: 20;
    min-width: 140px;
}

#tooltip .symbol { font-size: 28px; font-weight: bold; }
#tooltip .name { font-size: 14px; color: #aaa; }
#tooltip .number { font-size: 12px; color: #74c0fc; }
#tooltip .category { font-size: 11px; color: #69db7c; margin-top: 4px; }

#feedback-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 20px currentColor;
    z-index: 15;
}

#robot-speech {
    position: absolute;
    bottom: 80px;
    left: 15px;
    background: rgba(10, 10, 46, 0.9);
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    max-width: 250px;
    border: 1px solid rgba(100,150,255,0.3);
    display: none;
    pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
    <div id="score-display">Score: 0 / 0</div>
    <div id="question-display">Loading...</div>
    <div id="difficulty-display">
        <span id="difficulty-label">Difficulty</span>
        <span id="stars">★☆☆</span>
    </div>
    <div id="bottom-controls">
        <button id="nextQuestionBtn">Next Question</button>
        <button id="resetBtn">Reset Quiz</button>
    </div>
    <div id="streak-display">Streak: 0</div>
    <div id="tooltip">
        <div class="symbol"></div>
        <div class="name"></div>
        <div class="number"></div>
        <div class="category"></div>
    </div>
    <div id="feedback-overlay"></div>
    <div id="robot-speech"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
// ============ STATE ============
window.__3D_STATE__ = {
    sceneReady: false,
    elementCount: 0,
    score: 0,
    totalAttempts: 0,
    currentDifficulty: 1,
    consecutiveCorrect: 0,
    consecutiveWrong: 0,
    currentQuestion: '',
    correctElementSymbol: '',
    lastAnswerCorrect: null,
    modelLoaded: false,
    hoveredElement: null,
    quizActive: false,
    difficultyChanges: 0
};

// ============ ELEMENT DATA ============
const CATEGORIES = {
    'alkali': { name: 'Alkali Metal', color: 0xff6b6b },
    'alkaline': { name: 'Alkaline Earth Metal', color: 0xffa94d },
    'transition': { name: 'Transition Metal', color: 0x4dabf7 },
    'metalloid': { name: 'Metalloid', color: 0x69db7c },
    'nonmetal': { name: 'Nonmetal', color: 0xa9e34b },
    'noble': { name: 'Noble Gas', color: 0xcc5de8 },
    'halogen': { name: 'Halogen', color: 0x20c997 },
    'other_metal': { name: 'Other Metal', color: 0x748ffc }
};

// Elements 1-36 with periodic table positions (col, row) 0-indexed
const ELEMENTS = [
    { z: 1, sym: 'H', name: 'Hydrogen', cat: 'nonmetal', col: 0, row: 0, period: 1 },
    { z: 2, sym: 'He', name: 'Helium', cat: 'noble', col: 17, row: 0, period: 1 },
    { z: 3, sym: 'Li', name: 'Lithium', cat: 'alkali', col: 0, row: 1, period: 2 },
    { z: 4, sym: 'Be', name: 'Beryllium', cat: 'alkaline', col: 1, row: 1, period: 2 },
    { z: 5, sym: 'B', name: 'Boron', cat: 'metalloid', col: 12, row: 1, period: 2 },
    { z: 6, sym: 'C', name: 'Carbon', cat: 'nonmetal', col: 13, row: 1, period: 2 },
    { z: 7, sym: 'N', name: 'Nitrogen', cat: 'nonmetal', col: 14, row: 1, period: 2 },
    { z: 8, sym: 'O', name: 'Oxygen', cat: 'nonmetal', col: 15, row: 1, period: 2 },
    { z: 9, sym: 'F', name: 'Fluorine', cat: 'halogen', col: 16, row: 1, period: 2 },
    { z: 10, sym: 'Ne', name: 'Neon', cat: 'noble', col: 17, row: 1, period: 2 },
    { z: 11, sym: 'Na', name: 'Sodium', cat: 'alkali', col: 0, row: 2, period: 3 },
    { z: 12, sym: 'Mg', name: 'Magnesium', cat: 'alkaline', col: 1, row: 2, period: 3 },
    { z: 13, sym: 'Al', name: 'Aluminium', cat: 'other_metal', col: 12, row: 2, period: 3 },
    { z: 14, sym: 'Si', name: 'Silicon', cat: 'metalloid', col: 13, row: 2, period: 3 },
    { z: 15, sym: 'P', name: 'Phosphorus', cat: 'nonmetal', col: 14, row: 2, period: 3 },
    { z: 16, sym: 'S', name: 'Sulfur', cat: 'nonmetal', col: 15, row: 2, period: 3 },
    { z: 17, sym: 'Cl', name: 'Chlorine', cat: 'halogen', col: 16, row: 2, period: 3 },
    { z: 18, sym: 'Ar', name: 'Argon', cat: 'noble', col: 17, row: 2, period: 3 },
    { z: 19, sym: 'K', name: 'Potassium', cat: 'alkali', col: 0, row: 3, period: 4 },
    { z: 20, sym: 'Ca', name: 'Calcium', cat: 'alkaline', col: 1, row: 3, period: 4 },
    { z: 21, sym: 'Sc', name: 'Scandium', cat: 'transition', col: 2, row: 3, period: 4 },
    { z: 22, sym: 'Ti', name: 'Titanium', cat: 'transition', col: 3, row: 3, period: 4 },
    { z: 23, sym: 'V', name: 'Vanadium', cat: 'transition', col: 4, row: 3, period: 4 },
    { z: 24, sym: 'Cr', name: 'Chromium', cat: 'transition', col: 5, row: 3, period: 4 },
    { z: 25, sym: 'Mn', name: 'Manganese', cat: 'transition', col: 6, row: 3, period: 4 },
    { z: 26, sym: 'Fe', name: 'Iron', cat: 'transition', col: 7, row: 3, period: 4 },
    { z: 27, sym: 'Co', name: 'Cobalt', cat: 'transition', col: 8, row: 3, period: 4 },
    { z: 28, sym: 'Ni', name: 'Nickel', cat: 'transition', col: 9, row: 3, period: 4 },
    { z: 29, sym: 'Cu', name: 'Copper', cat: 'transition', col: 10, row: 3, period: 4 },
    { z: 30, sym: 'Zn', name: 'Zinc', cat: 'transition', col: 11, row: 3, period: 4 },
    { z: 31, sym: 'Ga', name: 'Gallium', cat: 'other_metal', col: 12, row: 3, period: 4 },
    { z: 32, sym: 'Ge', name: 'Germanium', cat: 'metalloid', col: 13, row: 3, period: 4 },
    { z: 33, sym: 'As', name: 'Arsenic', cat: 'metalloid', col: 14, row: 3, period: 4 },
    { z: 34, sym: 'Se', name: 'Selenium', cat: 'nonmetal', col: 15, row: 3, period: 4 },
    { z: 35, sym: 'Br', name: 'Bromine', cat: 'halogen', col: 16, row: 3, period: 4 },
    { z: 36, sym: 'Kr', name: 'Krypton', cat: 'noble', col: 17, row: 3, period: 4 }
];

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a2e);
scene.fog = new THREE.FogExp2(0x0a0a2e, 0.015);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 5, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight1.position.set(5, 10, 7);
dirLight1.castShadow = true;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0x8888ff, 0.3);
dirLight2.position.set(-5, 5, -5);
scene.add(dirLight2);

// Add a subtle point light for atmosphere
const pointLight = new THREE.PointLight(0x4dabf7, 0.5, 30);
pointLight.position.set(0, 8, 5);
scene.add(pointLight);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enablePan = false;
controls.minDistance = 8;
controls.maxDistance = 35;
controls.minPolarAngle = Math.PI * 0.15;
controls.maxPolarAngle = Math.PI * 0.75;
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0, 0);

// ============ CREATE PERIODIC TABLE ============
const elementMeshes = [];
const elementGroup = new THREE.Group();
scene.add(elementGroup);

// Table offset to center it
const tableOffsetX = -8.5;
const tableOffsetY = 3;
const spacing = 1.05;

function createTextTexture(symbol, atomicNumber, bgColor) {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');

    // Background
    const r = (bgColor >> 16) & 255;
    const g = (bgColor >> 8) & 255;
    const b = bgColor & 255;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillRect(0, 0, 128, 128);

    // Border
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 3;
    ctx.strokeRect(2, 2, 124, 124);

    // Atomic number
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'left';
    ctx.fillText(atomicNumber.toString(), 8, 24);

    // Symbol
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbol, 64, 70);

    const texture = new THREE.CanvasTexture(canvas);
    texture.needsUpdate = true;
    return texture;
}

ELEMENTS.forEach((el) => {
    const catInfo = CATEGORIES[el.cat];
    const color = catInfo.color;

    const geometry = new THREE.BoxGeometry(0.8, 0.8, 0.3);

    // Create front face texture
    const frontTexture = createTextTexture(el.sym, el.z, color);

    const materials = [
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }), // right
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }), // left
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }), // top
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 }), // bottom
        new THREE.MeshStandardMaterial({ map: frontTexture, metalness: 0.1, roughness: 0.5 }), // front
        new THREE.MeshStandardMaterial({ color: color, metalness: 0.3, roughness: 0.6 })  // back
    ];

    const mesh = new THREE.Mesh(geometry, materials);

    const x = tableOffsetX + el.col * spacing;
    const y = tableOffsetY - el.row * spacing;
    const z_pos = 0;

    mesh.position.set(x, y, z_pos);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

    mesh.userData = {
        element: el,
        originalColor: color,
        originalEmissive: 0x000000,
        isElement: true
    };

    elementGroup.add(mesh);
    elementMeshes.push(mesh);
});

window.__3D_STATE__.elementCount = elementMeshes.length;

// Add a floor/base
const floorGeo = new THREE.PlaneGeometry(30, 15);
const floorMat = new THREE.MeshStandardMaterial({
    color: 0x0a0a2e,
    metalness: 0.8,
    roughness: 0.2,
    transparent: true,
    opacity: 0.5
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -1.5;
floor.receiveShadow = true;
scene.add(floor);

// Add grid helper for visual appeal
const gridHelper = new THREE.GridHelper(30, 30, 0x1a1a4e, 0x1a1a3e);
gridHelper.position.y = -1.49;
scene.add(gridHelper);

// ============ ROBOT TUTOR ============
let robotModel = null;
let robotMixer = null;
let robotAnimations = {};
let currentRobotAction = null;

// Create a simple robot since Xbot.glb may not be available
function createSimpleRobot() {
    const robot = new THREE.Group();

    // Body
    const bodyGeo = new THREE.BoxGeometry(1.2, 1.5, 0.8);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4dabf7, metalness: 0.6, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1.5;
    robot.add(body);

    // Head
    const headGeo = new THREE.BoxGeometry(0.9, 0.9, 0.7);
    const headMat = new THREE.MeshStandardMaterial({ color: 0x74c0fc, metalness: 0.5, roughness: 0.3 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.75;
    robot.add(head);

    // Eyes
    const eyeGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const eyeMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.8 });
    const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
    leftEye.position.set(-0.2, 2.8, 0.35);
    robot.add(leftEye);
    const rightEye = new THREE.Mesh(eyeGeo, eyeMat.clone());
    rightEye.position.set(0.2, 2.8, 0.35);
    robot.add(rightEye);

    // Mouth (a small box)
    const mouthGeo = new THREE.BoxGeometry(0.4, 0.08, 0.05);
    const mouthMat = new THREE.MeshStandardMaterial({ color: 0x00ff88, emissive: 0x00ff88, emissiveIntensity: 0.5 });
    const mouth = new THREE.Mesh(mouthGeo, mouthMat);
    mouth.position.set(0, 2.55, 0.35);
    robot.add(mouth);

    // Arms
    const armGeo = new THREE.BoxGeometry(0.3, 1.0, 0.3);
    const armMat = new THREE.MeshStandardMaterial({ color: 0x339af0, metalness: 0.6, roughness: 0.3 });
    const leftArm = new THREE.Mesh(armGeo, armMat);
    leftArm.position.set(-0.9, 1.5, 0);
    leftArm.name = 'leftArm';
    robot.add(leftArm);
    const rightArm = new THREE.Mesh(armGeo, armMat.clone());
    rightArm.position.set(0.9, 1.5, 0);
    rightArm.name = 'rightArm';
    robot.add(rightArm);

    // Legs
    const legGeo = new THREE.BoxGeometry(0.35, 0.8, 0.35);
    const legMat = new THREE.MeshStandardMaterial({ color: 0x228be6, metalness: 0.6, roughness: 0.3 });
    const leftLeg = new THREE.Mesh(legGeo, legMat);
    leftLeg.position.set(-0.3, 0.4, 0);
    robot.add(leftLeg);
    const rightLeg = new THREE.Mesh(legGeo, legMat.clone());
    rightLeg.position.set(0.3, 0.4, 0);
    robot.add(rightLeg);

    // Antenna
    const antennaGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.4, 8);
    const antennaMat = new THREE.MeshStandardMaterial({ color: 0xffd700 });
    const antenna = new THREE.Mesh(antennaGeo, antennaMat);
    antenna.position.set(0, 3.4, 0);
    robot.add(antenna);

    const antennaBallGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const antennaBallMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5 });
    const antennaBall = new THREE.Mesh(antennaBallGeo, antennaBallMat);
    antennaBall.position.set(0, 3.62, 0);
    robot.add(antennaBall);

    robot.position.set(-8, -1.5, 3);
    robot.scale.set(1.2, 1.2, 1.2);

    robot.userData.head = head;
    robot.userData.leftArm = leftArm;
    robot.userData.rightArm = rightArm;
    robot.userData.leftEye = leftEye;
    robot.userData.rightEye = rightEye;
    robot.userData.mouth = mouth;
    robot.userData.antennaBall = antennaBall;

    return robot;
}

// Try loading Xbot.glb, fall back to simple robot
const loader = new THREE.GLTFLoader();
let useSimpleRobot = false;

try {
    loader.load(
        'https://threejs.org/examples/models/gltf/Xbot.glb',
        (gltf) => {
            robotModel = gltf.scene;
            robotModel.position.set(-8, -1.5, 3);
            robotModel.scale.set(2.0, 2.0, 2.0);
            robotModel.rotation.y = Math.PI * 0.3;
            scene.add(robotModel);

            robotModel.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            if (gltf.animations && gltf.animations.length > 0) {
                robotMixer = new THREE.AnimationMixer(robotModel);
                gltf.animations.forEach((clip) => {
                    robotAnimations[clip.name.toLowerCase()] = robotMixer.clipAction(clip);
                });

                // Try to play idle
                const idleNames = ['idle', 'tpose', 'rest'];
                let played = false;
                for (const name of idleNames) {
                    if (robotAnimations[name]) {
                        robotAnimations[name].play();
                        currentRobotAction = robotAnimations[name];
                        played = true;
                        break;
                    }
                }
                if (!played) {
                    const firstAnim = Object.values(robotAnimations)[0];
                    if (firstAnim) {
                        firstAnim.play();
                        currentRobotAction = firstAnim;
                    }
                }
            }

            window.__3D_STATE__.modelLoaded = true;
            checkSceneReady();
        },
        undefined,
        (error) => {
            console.log('Could not load Xbot.glb, using simple robot');
            useSimpleRobot = true;
            robotModel = createSimpleRobot();
            scene.add(robotModel);
            window.__3D_STATE__.modelLoaded = true;
            checkSceneReady();
        }
    );
} catch (e) {
    useSimpleRobot = true;
    robotModel = createSimpleRobot();
    scene.add(robotModel);
    window.__3D_STATE__.modelLoaded = true;
}

// Fallback timeout
setTimeout(() => {
    if (!window.__3D_STATE__.modelLoaded) {
        useSimpleRobot = true;
        robotModel = createSimpleRobot();
        scene.add(robotModel);
        window.__3D_STATE__.modelLoaded = true;
        checkSceneReady();
    }
}, 5000);

function checkSceneReady() {
    if (window.__3D_STATE__.modelLoaded && elementMeshes.length > 0) {
        window.__3D_STATE__.sceneReady = true;
        generateQuestion();
    }
}

// ============ ROBOT ANIMATION HELPERS ============
let robotAnimState = 'idle';
let robotAnimTimer = 0;

function playRobotReaction(type) {
    robotAnimState = type;
    robotAnimTimer = 0;

    if (robotMixer && !useSimpleRobot) {
        // Try to play specific animations
        const animMap = {
            'correct': ['wave', 'dance', 'jump', 'happy'],
            'wrong': ['no', 'sad', 'shake', 'idle'],
            'idle': ['idle', 'tpose', 'rest']
        };

        const candidates = animMap[type] || animMap['idle'];
        for (const name of candidates) {
            if (robotAnimations[name]) {
                if (currentRobotAction) {
                    currentRobotAction.fadeOut(0.3);
                }
                robotAnimations[name].reset().fadeIn(0.3).play();
                currentRobotAction = robotAnimations[name];

                if (type !== 'idle') {
                    setTimeout(() => playRobotReaction('idle'), 2000);
                }
                return;
            }
        }
    }
}

function updateSimpleRobotAnimation(delta) {
    if (!robotModel || !useSimpleRobot) return;

    const time = performance.now() * 0.001;

    // Idle bobbing
    if (robotModel.userData.head) {
        robotModel.userData.head.rotation.y = Math.sin(time * 1.5) * 0.1;
    }

    // Antenna pulse
    if (robotModel.userData.antennaBall) {
        const s = 1 + Math.sin(time * 3) * 0.2;
        robotModel.userData.antennaBall.scale.set(s, s, s);
    }

    if (robotAnimState === 'correct') {
        robotAnimTimer += delta;
        // Wave arms up and down
        if (robotModel.userData.leftArm) {
            robotModel.userData.leftArm.rotation.z = Math.sin(time * 8) * 0.8;
        }
        if (robotModel.userData.rightArm) {
            robotModel.userData.rightArm.rotation.z = -Math.sin(time * 8) * 0.8;
        }
        // Happy eyes
        if (robotModel.userData.leftEye) {
            robotModel.userData.leftEye.material.emissive.setHex(0x00ff00);
        }
        if (robotModel.userData.rightEye) {
            robotModel.userData.rightEye.material.emissive.setHex(0x00ff00);
        }
        if (robotAnimTimer > 2) {
            robotAnimState = 'idle';
        }
    } else if (robotAnimState === 'wrong') {
        robotAnimTimer += delta;
        // Shake head
        if (robotModel.userData.head) {
            robotModel.userData.head.rotation.y = Math.sin(time * 12) * 0.3;
        }
        // Sad eyes
        if (robotModel.userData.leftEye) {
            robotModel.userData.leftEye.material.emissive.setHex(0xff0000);
        }
        if (robotModel.userData.rightEye) {
            robotModel.userData.rightEye.material.emissive.setHex(0xff0000);
        }
        if (robotAnimTimer > 2) {
            robotAnimState = 'idle';
        }
    } else {
        // Idle
        if (robotModel.userData.leftArm) {
            robotModel.userData.leftArm.rotation.z = Math.sin(time * 1.2) * 0.1;
        }
        if (robotModel.userData.rightArm) {
            robotModel.userData.rightArm.rotation.z = -Math.sin(time * 1.2 + 1) * 0.1;
        }
        if (robotModel.userData.leftEye) {
            robotModel.userData.leftEye.material.emissive.setHex(0x00ff88);
        }
        if (robotModel.userData.rightEye) {
            robotModel.userData.rightEye.material.emissive.setHex(0x00ff88);
        }
    }
}

// ============ QUIZ SYSTEM ============
let currentCorrectElement = null;
let quizActive = false;
let awaitingNext = false;

function generateQuestion() {
    const state = window.__3D_STATE__;
    const difficulty = state.currentDifficulty;

    // Reset element visuals
    elementMeshes.forEach(mesh => {
        resetElementVisual(mesh);
    });

    let question = '';
    let correctElement = null;

    if (difficulty === 1) {
        // Easy: Click on element [Symbol]
        correctElement = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
        question = `Click on element ${correctElement.sym}`;
    } else if (difficulty === 2) {
        // Medium: Click on element with atomic number N
        correctElement = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
        question = `Click on element with atomic number ${correctElement.z}`;
    } else {
        // Hard: Click on the [category] element in period [P]
        // Find valid combinations
        const catPeriodMap = {};
        ELEMENTS.forEach(el => {
            const key = `${el.cat}_${el.period}`;
            if (!catPeriodMap[key]) catPeriodMap[key] = [];
            catPeriodMap[key].push(el);
        });

        // Filter to unique (one element per cat+period)
        const uniqueKeys = Object.keys(catPeriodMap).filter(k => catPeriodMap[k].length === 1);

        if (uniqueKeys.length > 0) {
            const key = uniqueKeys[Math.floor(Math.random() * uniqueKeys.length)];
            correctElement = catPeriodMap[key][0];
            const catName = CATEGORIES[correctElement.cat].name;
            question = `Click on the ${catName} in period ${correctElement.period}`;
        } else {
            // Fallback: pick any and use category + period
            correctElement = ELEMENTS[Math.floor(Math.random() * ELEMENTS.length)];
            const catName = CATEGORIES[correctElement.cat].name;
            question = `Click on ${correctElement.name} (${catName}, period ${correctElement.period})`;
        }
    }

    currentCorrectElement = correctElement;
    state.currentQuestion = question;
    state.correctElementSymbol = correctElement.sym;
    state.quizActive = true;
    quizActive = true;
    awaitingNext = false;

    document.getElementById('question-display').textContent = question;
    document.getElementById('question-display').style.borderColor = 'rgba(100,150,255,0.4)';

    showRobotSpeech(getQuestionHint(difficulty));
}

function getQuestionHint(difficulty) {
    const hints = {
        1: ["Find the element! Look at the symbols.", "Easy one! Just match the symbol.", "You got this! Check the table."],
        2: ["Think about the atomic number!", "Count the elements...", "Remember the periodic order!"],
        3: ["Think about element categories!", "Which group does it belong to?", "Check the period and category!"]
    };
    const arr = hints[difficulty];
    return arr[Math.floor(Math.random() * arr.length)];
}

function showRobotSpeech(text) {
    const speech = document.getElementById('robot-speech');
    speech.textContent = '🤖 ' + text;
    speech.style.display = 'block';
    setTimeout(() => { speech.style.display = 'none'; }, 3000);
}

function handleAnswer(mesh) {
    if (!quizActive || awaitingNext) return;

    const state = window.__3D_STATE__;
    const clickedElement = mesh.userData.element;
    const isCorrect = clickedElement.sym === currentCorrectElement.sym;

    state.totalAttempts++;
    quizActive = false;
    state.quizActive = false;
    awaitingNext = true;

    if (isCorrect) {
        state.score++;
        state.consecutiveCorrect++;
        state.consecutiveWrong = 0;
        state.lastAnswerCorrect = true;

        flashElement(mesh, 0x00ff00);
        showFeedback('✓ Correct!', '#00ff88');
        playRobotReaction('correct');
        showRobotSpeech(getCorrectMessage());

        // Dynamic difficulty
        if (state.consecutiveCorrect >= 2 && state.currentDifficulty < 3) {
            state.currentDifficulty++;
            state.difficultyChanges++;
            state.consecutiveCorrect = 0;
            showRobotSpeech("Level up! Getting harder! 🚀");
        }
    } else {
        state.consecutiveWrong++;
        state.consecutiveCorrect = 0;
        state.lastAnswerCorrect = false;

        flashElement(mesh, 0xff0000);
        // Flash correct answer green
        const correctMesh = elementMeshes.find(m => m.userData.element.sym === currentCorrectElement.sym);
        if (correctMesh) {
            flashElement(correctMesh, 0x00ff00);
        }
        showFeedback(`✗ Wrong! It was ${currentCorrectElement.sym}`, '#ff4444');
        playRobotReaction('wrong');
        showRobotSpeech(getWrongMessage());

        // Dynamic difficulty
        if (state.consecutiveWrong >= 2 && state.currentDifficulty > 1) {
            state.currentDifficulty--;
            state.difficultyChanges++;
            state.consecutiveWrong = 0;
            showRobotSpeech("Let's try an easier one! 💪");
        }
    }

    updateHUD();
}

function getCorrectMessage() {
    const msgs = ["Excellent! 🎉", "Great job! ⭐", "You're a chemistry pro! 🧪", "Perfect! Keep going! 🔥", "Nailed it! 💯"];
    return msgs[Math.floor(Math.random() * msgs.length)];
}

function getWrongMessage() {
    const msgs = ["Not quite! Try again! 💪", "Close! Keep learning! 📚", "Don't worry, you'll get it! 🌟", "Practice makes perfect! 🎯"];
    return msgs[Math.floor(Math.random() * msgs.length)];
}

function flashElement(mesh, color) {
    mesh.userData.flashColor = color;
    mesh.userData.flashTime = performance.now();
    mesh.userData.isFlashing = true;
}

function resetElementVisual(mesh) {
    mesh.userData.isFlashing = false;
    mesh.userData.isPulsing = false;
    const origColor = mesh.userData.originalColor;
    mesh.material.forEach((mat, i) => {
        if (i === 4) return; // Skip textured front face
        mat.color.setHex(origColor);
        mat.emissive.setHex(0x000000);
        mat.emissiveIntensity = 0;
    });
    // Reset front face emissive
    mesh.material[4].emissive.setHex(0x000000);
    mesh.material[4].emissiveIntensity = 0;
}

function showFeedback(text, color) {
    const overlay = document.getElementById('feedback-overlay');
    overlay.textContent = text;
    overlay.style.color = color;
    overlay.style.opacity = '1';
    setTimeout(() => { overlay.style.opacity = '0'; }, 1500);
}

function updateHUD() {
    const state = window.__3D_STATE__;

    document.getElementById('score-display').innerHTML =
        `🏆 Score: <strong>${state.score}</strong> / ${state.totalAttempts}` +
        (state.totalAttempts > 0 ? ` (${Math.round(state.score / state.totalAttempts * 100)}%)` : '');

    const stars = '★'.repeat(state.currentDifficulty) + '☆'.repeat(3 - state.currentDifficulty);
    document.getElementById('stars').textContent = stars;

    const streakType = state.consecutiveCorrect > 0 ? '🔥' : (state.consecutiveWrong > 0 ? '❄️' : '');
    const streakCount = Math.max(state.consecutiveCorrect, state.consecutiveWrong);
    document.getElementById('streak-display').innerHTML =
        `Streak: ${streakType} ${streakCount}` +
        (state.consecutiveCorrect > 0 ? ' correct' : (state.consecutiveWrong > 0 ? ' wrong' : ''));
}

function resetQuiz() {
    const state = window.__3D_STATE__;
    state.score = 0;
    state.totalAttempts = 0;
    state.currentDifficulty = 1;
    state.consecutiveCorrect = 0;
    state.consecutiveWrong = 0;
    state.lastAnswerCorrect = null;
    state.difficultyChanges = 0;

    elementMeshes.forEach(mesh => resetElementVisual(mesh));
    updateHUD();
    generateQuestion();
    playRobotReaction('idle');
    showRobotSpeech("Fresh start! Let's learn chemistry! 🧪");
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredMesh = null;

function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(elementMeshes);

    const tooltip = document.getElementById('tooltip');

    if (hoveredMesh && (!intersects.length || intersects[0].object !== hoveredMesh)) {
        // Un-hover
        if (!hoveredMesh.userData.isFlashing) {
            hoveredMesh.material.forEach((mat, i) => {
                mat.emissive.setHex(0x000000);
                mat.emissiveIntensity = 0;
            });
        }
        hoveredMesh = null;
        window.__3D_STATE__.hoveredElement = null;
        tooltip.style.display = 'none';
    }

    if (intersects.length > 0) {
        const mesh = intersects[0].object;
        if (mesh.userData.isElement) {
            hoveredMesh = mesh;
            const el = mesh.userData.element;
            window.__3D_STATE__.hoveredElement = el.sym;

            // Highlight
            if (!mesh.userData.isFlashing) {
                mesh.material.forEach(mat => {
                    mat.emissive.setHex(0x333333);
                    mat.emissiveIntensity = 0.5;
                });
            }

            // Tooltip
            tooltip.querySelector('.symbol').textContent = el.sym;
            tooltip.querySelector('.name').textContent = el.name;
            tooltip.querySelector('.number').textContent = `Atomic Number: ${el.z}`;
            tooltip.querySelector('.category').textContent = CATEGORIES[el.cat].name;
            tooltip.style.display = 'block';
            tooltip.style.left = (event.clientX + 15) + 'px';
            tooltip.style.top = (event.clientY - 10) + 'px';

            // Keep tooltip on screen
            const rect = tooltip.getBoundingClientRect();
            if (rect.right > window.innerWidth) {
                tooltip.style.left = (event.clientX - rect.width - 15) + 'px';
            }
            if (rect.bottom > window.innerHeight) {
                tooltip.style.top = (event.clientY - rect.height - 10) + 'px';
            }

            document.body.style.cursor = 'pointer';
        }
    } else {
        document.body.style.cursor = 'default';
    }
}

function onClick(event) {
    if (event.target.tagName === 'BUTTON') return;

    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(elementMeshes);

    if (intersects.length > 0 && intersects[0].object.userData.isElement) {
        handleAnswer(intersects[0].object);
    }
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

// ============ BUTTONS ============
document.getElementById('nextQuestionBtn').addEventListener('click', () => {
    generateQuestion();
});

document.getElementById('resetBtn').addEventListener('click', () => {
    resetQuiz();
});

// ============ PARTICLES ============
const particleCount = 200;
const particleGeo = new THREE.BufferGeometry();
const particlePositions = new Float32Array(particleCount * 3);
const particleSpeeds = [];

for (let i = 0; i < particleCount; i++) {
    particlePositions[i * 3] = (Math.random() - 0.5) * 40;
    particlePositions[i * 3 + 1] = (Math.random() - 0.5) * 20;
    particlePositions[i * 3 + 2] = (Math.random() - 0.5) * 20 - 5;
    particleSpeeds.push(0.002 + Math.random() * 0.005);
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
const particleMat = new THREE.PointsMaterial({
    color: 0x4dabf7,
    size: 0.05,
    transparent: true,
    opacity: 0.6,
    blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ============ ANIMATION LOOP ============
const clock = new THREE.Clock();
let lastTime = 0;

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const time = performance.now() * 0.001;

    // Update controls
    controls.update();

    // Update robot mixer
    if (robotMixer) {
        robotMixer.update(delta);
    }

    // Update simple robot animation
    if (useSimpleRobot) {
        updateSimpleRobotAnimation(delta);
    }

    // Pulse target element
    if (currentCorrectElement && quizActive) {
        const targetMesh = elementMeshes.find(m => m.userData.element.sym === currentCorrectElement.sym);
        if (targetMesh) {
            const pulse = (Math.sin(time * 4) + 1) * 0.3;
            targetMesh.material.forEach(mat => {
                if (!targetMesh.userData.isFlashing) {
                    mat.emissive.setHex(0x4488ff);
                    mat.emissiveIntensity = pulse;
                }
            });
            // Subtle scale pulse
            const s = 1 + Math.sin(time * 3) * 0.05;
            targetMesh.scale.set(s, s, s);
        }
    }

    // Update flashing elements
    elementMeshes.forEach(mesh => {
        if (mesh.userData.isFlashing) {
            const elapsed = (performance.now() - mesh.userData.flashTime) / 1000;
            if (elapsed < 1.5) {
                const intensity = Math.max(0, 1 - elapsed / 1.5) * (0.5 + Math.sin(elapsed * 10) * 0.5);
                mesh.material.forEach(mat => {
                    mat.emissive.setHex(mesh.userData.flashColor);
                    mat.emissiveIntensity = intensity;
                });
            } else {
                mesh.userData.isFlashing = false;
                mesh.material.forEach(mat => {
                    mat.emissive.setHex(0x000000);
                    mat.emissiveIntensity = 0;
                });
                mesh.scale.set(1, 1, 1);
            }
        }
    });

    // Animate particles
    const positions = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
        positions[i * 3 + 1] += particleSpeeds[i];
        if (positions[i * 3 + 1] > 10) {
            positions[i * 3 + 1] = -10;
        }
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // Subtle point light animation
    pointLight.intensity = 0.5 + Math.sin(time * 2) * 0.1;

    // Update state
    const state = window.__3D_STATE__;
    state.quizActive = quizActive;

    renderer.render(scene, camera);
}

// ============ RESIZE ============
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ START ============
// Initial scene ready check
setTimeout(() => {
    if (!window.__3D_STATE__.sceneReady) {
        window.__3D_STATE__.sceneReady = true;
        if (!window.__3D_STATE__.modelLoaded) {
            useSimpleRobot = true;
            robotModel = createSimpleRobot();
            scene.add(robotModel);
            window.__3D_STATE__.modelLoaded = true;
        }
        generateQuestion();
    }
}, 3000);

// Start with simple robot immediately if GLTF hasn't loaded in 1s
setTimeout(() => {
    if (!window.__3D_STATE__.modelLoaded) {
        useSimpleRobot = true;
        robotModel = createSimpleRobot();
        scene.add(robotModel);
        window.__3D_STATE__.modelLoaded = true;
        window.__3D_STATE__.sceneReady = true;
        generateQuestion();
    }
}, 1000);

updateHUD();
animate();
</script>
