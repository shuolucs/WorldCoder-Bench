<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Phylogenetic Tree</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: monospace;
      color: white;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 20;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      backdrop-filter: blur(4px);
    }

    #hud .row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      background: #2d325a;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-family: monospace;
      transition: background 0.2s ease, transform 0.15s ease, border-color 0.2s ease;
    }

    button:hover {
      background: #3d457d;
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    #historyCount {
      font-size: 14px;
      min-width: 90px;
    }

    #labels {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .label {
      position: absolute;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 14px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 6px;
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.12);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="row">
        <button id="undoBtn">Undo</button>
        <button id="redoBtn">Redo</button>
      </div>
      <div id="historyCount">History: 0</div>
    </div>
    <div id="labels"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>

  <script>
    (() => {
      const BG_COLOR = 0x1a1a2e;
      const COLORS = {
        root: 0x00ff88,
        internal: 0xffcc00,
        leaf: 0x00ccff,
        selected: 0xff0044,
        branch: 0xffffff
      };

      const app = document.getElementById('app');
      const labelsContainer = document.getElementById('labels');
      const undoBtn = document.getElementById('undoBtn');
      const redoBtn = document.getElementById('redoBtn');
      const historyCountEl = document.getElementById('historyCount');

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(BG_COLOR);

      const camera = new THREE.PerspectiveCamera(
        60,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
      );
      camera.position.set(0, 5, 15);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      app.appendChild(renderer.domElement);

      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.target.set(0, 3, 0);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(5, 10, 5);
      scene.add(directionalLight);

      const raycaster = new THREE.Raycaster();
      const mouse = new THREE.Vector2();

      const nodeGeometry = new THREE.SphereGeometry(0.3, 16, 16);

      const nodes = {};
      const nodeMeshes = [];
      const labels = [];
      const branches = [];

      const historyStack = [];
      const redoStack = [];
      let selectedNodeId = null;

      const treeNodes = [
        { id: 'Root',  pos: [0, 0, 0],    color: COLORS.root },
        { id: 'NodeA', pos: [-3, 3, 0],   color: COLORS.internal },
        { id: 'NodeB', pos: [3, 3, 0],    color: COLORS.internal },
        { id: 'Leaf1', pos: [-5, 6, -2],  color: COLORS.leaf, label: 'Species A' },
        { id: 'Leaf2', pos: [-1, 6, 2],   color: COLORS.leaf, label: 'Species B' },
        { id: 'Leaf3', pos: [1, 6, -2],   color: COLORS.leaf, label: 'Species C' },
        { id: 'Leaf4', pos: [5, 6, 2],    color: COLORS.leaf, label: 'Species D' }
      ];

      const treeBranches = [
        ['Root', 'NodeA'],
        ['Root', 'NodeB'],
        ['NodeA', 'Leaf1'],
        ['NodeA', 'Leaf2'],
        ['NodeB', 'Leaf3'],
        ['NodeB', 'Leaf4']
      ];

      function createNode(nodeDef) {
        const material = new THREE.MeshStandardMaterial({ color: nodeDef.color });
        const mesh = new THREE.Mesh(nodeGeometry, material);
        mesh.position.set(...nodeDef.pos);
        mesh.name = nodeDef.id;
        mesh.userData.defaultColor = nodeDef.color;
        scene.add(mesh);

        nodes[nodeDef.id] = mesh;
        nodeMeshes.push(mesh);

        if (nodeDef.label) {
          const el = document.createElement('div');
          el.className = 'label';
          el.textContent = nodeDef.label;
          labelsContainer.appendChild(el);

          labels.push({
            nodeId: nodeDef.id,
            element: el,
            offsetY: 24
          });
        }
      }

      function createBranch(startMesh, endMesh) {
        const points = [startMesh.position.clone(), endMesh.position.clone()];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: COLORS.branch });
        const line = new THREE.Line(geometry, material);
        scene.add(line);
        branches.push(line);
      }

      treeNodes.forEach(createNode);
      treeBranches.forEach(([a, b]) => createBranch(nodes[a], nodes[b]));

      function getCurrentState() {
        return {
          selectedNodeId
        };
      }

      function applySelectionState(nextSelectedId) {
        Object.values(nodes).forEach(mesh => {
          const isSelected = mesh.name === nextSelectedId;
          const color = isSelected ? COLORS.selected : mesh.userData.defaultColor;
          mesh.material.color.setHex(color);
        });
        selectedNodeId = nextSelectedId;
        updateState();
      }

      function recordAction(prevSelectedId, nextSelectedId) {
        historyStack.push({ prevSelectedId, nextSelectedId });
        redoStack.length = 0;
        updateState();
      }

      function performSelection(nextSelectedId) {
        const prevSelectedId = selectedNodeId;
        if (prevSelectedId === nextSelectedId) return;
        applySelectionState(nextSelectedId);
        recordAction(prevSelectedId, nextSelectedId);
      }

      function undo() {
        if (historyStack.length === 0) return;
        const action = historyStack.pop();
        redoStack.push(action);
        applySelectionState(action.prevSelectedId);
        updateState();
      }

      function redo() {
        if (redoStack.length === 0) return;
        const action = redoStack.pop();
        historyStack.push(action);
        applySelectionState(action.nextSelectedId);
        updateState();
      }

      function updateHistoryUI() {
        historyCountEl.textContent = `History: ${historyStack.length}`;
      }

      function updateLabels() {
        const width = renderer.domElement.clientWidth;
        const height = renderer.domElement.clientHeight;

        labels.forEach(({ nodeId, element, offsetY }) => {
          const mesh = nodes[nodeId];
          const pos = mesh.position.clone();
          pos.project(camera);

          const x = (pos.x * 0.5 + 0.5) * width;
          const y = (-pos.y * 0.5 + 0.5) * height - offsetY;

          const visible = pos.z < 1;
          element.style.display = visible ? 'block' : 'none';
          element.style.left = `${x}px`;
          element.style.top = `${y}px`;
        });
      }

      function buildNodeColorsMap() {
        const map = {};
        Object.entries(nodes).forEach(([id, mesh]) => {
          map[id] = mesh.material.color.getHex();
        });
        return map;
      }

      function updateState() {
        window.__3D_STATE__ = {
          nodeCount: Object.keys(nodes).length,
          selectedNodeId: selectedNodeId,
          historyLength: historyStack.length,
          redoLength: redoStack.length,
          nodeColors: buildNodeColorsMap(),
          branchCount: branches.length,
          sceneReady: true
        };
        updateHistoryUI();
      }

      function onPointerClick(event) {
        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(nodeMeshes, false);

        if (intersects.length > 0) {
          const clicked = intersects[0].object;
          performSelection(clicked.name);
        } else {
          performSelection(null);
        }
      }

      renderer.domElement.addEventListener('click', onPointerClick);

      undoBtn.addEventListener('click', undo);
      redoBtn.addEventListener('click', redo);

      window.addEventListener('keydown', (event) => {
        const key = event.key.toLowerCase();
        if (event.ctrlKey && key === 'z') {
          event.preventDefault();
          undo();
        } else if (event.ctrlKey && key === 'y') {
          event.preventDefault();
          redo();
        }
      });

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      updateState();

      function animate() {
        requestAnimationFrame(animate);
        controls.update();
        updateLabels();
        renderer.render(scene, camera);
      }

      animate();
    })();
  </script>
</body>
</html>
