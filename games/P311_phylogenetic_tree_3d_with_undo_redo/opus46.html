<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Phylogenetic Tree</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    overflow: hidden;
    background: #1a1a2e;
    font-family: monospace;
    color: white;
}

canvas {
    display: block;
}

#hud {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0, 0, 0, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    backdrop-filter: blur(10px);
    z-index: 10;
}

#hud button {
    background: rgba(255, 255, 255, 0.1);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.25);
    padding: 8px 18px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
}

#hud button:hover {
    background: rgba(255, 255, 255, 0.25);
    border-color: rgba(255, 255, 255, 0.5);
}

#hud button:active {
    background: rgba(255, 255, 255, 0.35);
}

.btn-row {
    display: flex;
    gap: 8px;
}

#historyCount {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
    margin-top: 4px;
}

#selectedInfo {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.7);
}
</style>
</head>
<body>

<div id="hud">
    <div class="btn-row">
        <button id="undoBtn">⟲ Undo</button>
        <button id="redoBtn">⟳ Redo</button>
    </div>
    <div id="historyCount">History: 0</div>
    <div id="selectedInfo">Selected: None</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>

<script>
(function() {
    // State
    const state = {
        nodeCount: 7,
        selectedNodeId: null,
        historyLength: 0,
        redoLength: 0,
        nodeColors: {},
        branchCount: 6,
        sceneReady: false
    };
    window.__3D_STATE__ = state;

    // Tree definition
    const treeNodes = [
        { id: 'Root', pos: [0, 0, 0], color: 0x00ff88, originalColor: 0x00ff88 },
        { id: 'NodeA', pos: [-3, 3, 0], color: 0xffcc00, originalColor: 0xffcc00 },
        { id: 'NodeB', pos: [3, 3, 0], color: 0xffcc00, originalColor: 0xffcc00 },
        { id: 'Leaf1', pos: [-5, 6, -2], color: 0x00ccff, originalColor: 0x00ccff, label: 'Species A' },
        { id: 'Leaf2', pos: [-1, 6, 2], color: 0x00ccff, originalColor: 0x00ccff, label: 'Species B' },
        { id: 'Leaf3', pos: [1, 6, -2], color: 0x00ccff, originalColor: 0x00ccff, label: 'Species C' },
        { id: 'Leaf4', pos: [5, 6, 2], color: 0x00ccff, originalColor: 0x00ccff, label: 'Species D' },
    ];

    const branches = [
        ['Root', 'NodeA'],
        ['Root', 'NodeB'],
        ['NodeA', 'Leaf1'],
        ['NodeA', 'Leaf2'],
        ['NodeB', 'Leaf3'],
        ['NodeB', 'Leaf4'],
    ];

    // Scene setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 5, 15);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Lights
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
    directionalLight.position.set(5, 10, 5);
    scene.add(directionalLight);

    // Controls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.target.set(0, 3, 0);
    controls.update();

    // Node meshes
    const nodeMeshes = {};
    const nodeDataMap = {};
    const selectableObjects = [];

    treeNodes.forEach(node => {
        const geometry = new THREE.SphereGeometry(0.3, 16, 16);
        const material = new THREE.MeshStandardMaterial({ color: node.color, emissive: node.color, emissiveIntensity: 0.3 });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(node.pos[0], node.pos[1], node.pos[2]);
        mesh.name = node.id;
        scene.add(mesh);
        nodeMeshes[node.id] = mesh;
        nodeDataMap[node.id] = node;
        selectableObjects.push(mesh);
        state.nodeColors[node.id] = node.color;
    });

    // Branches
    branches.forEach(([parentId, childId]) => {
        const parentPos = nodeMeshes[parentId].position;
        const childPos = nodeMeshes[childId].position;

        const points = [parentPos.clone(), childPos.clone()];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const material = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 });
        const line = new THREE.Line(geometry, material);
        scene.add(line);
    });

    // Text sprites for leaf labels
    function createTextSprite(text, position) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 256;
        canvas.height = 64;

        ctx.fillStyle = 'transparent';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        // Text shadow
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillText(text, canvas.width / 2 + 1, canvas.height / 2 + 1);

        ctx.fillStyle = '#ffffff';
        ctx.fillText(text, canvas.width / 2, canvas.height / 2);

        const texture = new THREE.CanvasTexture(canvas);
        texture.needsUpdate = true;

        const spriteMaterial = new THREE.SpriteMaterial({ map: texture, transparent: true });
        const sprite = new THREE.Sprite(spriteMaterial);
        sprite.position.set(position.x, position.y + 0.7, position.z);
        sprite.scale.set(2.5, 0.625, 1);
        scene.add(sprite);
        return sprite;
    }

    treeNodes.forEach(node => {
        if (node.label) {
            createTextSprite(node.label, nodeMeshes[node.id].position);
        }
    });

    // Undo/Redo system
    const undoStack = [];
    const redoStack = [];

    function updateHUD() {
        state.historyLength = undoStack.length;
        state.redoLength = redoStack.length;
        document.getElementById('historyCount').textContent = `History: ${undoStack.length}`;
        document.getElementById('selectedInfo').textContent = `Selected: ${state.selectedNodeId || 'None'}`;
    }

    function setNodeColor(nodeId, color) {
        const mesh = nodeMeshes[nodeId];
        if (mesh) {
            mesh.material.color.setHex(color);
            mesh.material.emissive.setHex(color);
            state.nodeColors[nodeId] = color;
        }
    }

    function performAction(action) {
        // action: { type: 'select', nodeId, prevNodeId, prevNodeOrigColor, newNodeOrigColor }
        // Apply the action
        if (action.prevNodeId) {
            setNodeColor(action.prevNodeId, action.prevNodeOrigColor);
        }
        if (action.nodeId) {
            setNodeColor(action.nodeId, 0xff0044);
            state.selectedNodeId = action.nodeId;
        } else {
            state.selectedNodeId = null;
        }

        undoStack.push(action);
        redoStack.length = 0;
        updateHUD();
    }

    function undo() {
        if (undoStack.length === 0) return;
        const action = undoStack.pop();
        redoStack.push(action);

        // Reverse the action
        if (action.nodeId) {
            setNodeColor(action.nodeId, action.newNodeOrigColor);
        }
        if (action.prevNodeId) {
            setNodeColor(action.prevNodeId, 0xff0044);
            state.selectedNodeId = action.prevNodeId;
        } else {
            state.selectedNodeId = null;
        }

        updateHUD();
    }

    function redo() {
        if (redoStack.length === 0) return;
        const action = redoStack.pop();
        undoStack.push(action);

        // Re-apply the action
        if (action.prevNodeId) {
            setNodeColor(action.prevNodeId, action.prevNodeOrigColor);
        }
        if (action.nodeId) {
            setNodeColor(action.nodeId, 0xff0044);
            state.selectedNodeId = action.nodeId;
        } else {
            state.selectedNodeId = null;
        }

        updateHUD();
    }

    // Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(selectableObjects);

        if (intersects.length > 0) {
            const clickedMesh = intersects[0].object;
            const clickedId = clickedMesh.name;

            if (clickedId === state.selectedNodeId) {
                // Deselect current
                const action = {
                    type: 'deselect',
                    nodeId: null,
                    prevNodeId: state.selectedNodeId,
                    prevNodeOrigColor: nodeDataMap[state.selectedNodeId].originalColor,
                    newNodeOrigColor: null
                };
                performAction(action);
            } else {
                // Select new node
                const action = {
                    type: 'select',
                    nodeId: clickedId,
                    prevNodeId: state.selectedNodeId,
                    prevNodeOrigColor: state.selectedNodeId ? nodeDataMap[state.selectedNodeId].originalColor : null,
                    newNodeOrigColor: nodeDataMap[clickedId].originalColor
                };
                performAction(action);
            }
        } else {
            // Click empty space - deselect
            if (state.selectedNodeId) {
                const action = {
                    type: 'deselect',
                    nodeId: null,
                    prevNodeId: state.selectedNodeId,
                    prevNodeOrigColor: nodeDataMap[state.selectedNodeId].originalColor,
                    newNodeOrigColor: null
                };
                performAction(action);
            }
        }
    }

    renderer.domElement.addEventListener('click', onMouseClick);

    // Buttons
    document.getElementById('undoBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        undo();
    });
    document.getElementById('redoBtn').addEventListener('click', (e) => {
        e.stopPropagation();
        redo();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.ctrlKey && e.key === 'z') {
            e.preventDefault();
            undo();
        } else if (e.ctrlKey && e.key === 'y') {
            e.preventDefault();
            redo();
        }
    });

    // Resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Add subtle glow particles around nodes
    function createGlowParticles() {
        const particleCount = 200;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            const nodeIdx = Math.floor(Math.random() * treeNodes.length);
            const node = treeNodes[nodeIdx];
            positions[i * 3] = node.pos[0] + (Math.random() - 0.5) * 3;
            positions[i * 3 + 1] = node.pos[1] + (Math.random() - 0.5) * 3;
            positions[i * 3 + 2] = node.pos[2] + (Math.random() - 0.5) * 3;

            const color = new THREE.Color(node.color);
            colors[i * 3] = color.r;
            colors[i * 3 + 1] = color.g;
            colors[i * 3 + 2] = color.b;
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);
        return particles;
    }

    const particles = createGlowParticles();

    // Animation loop
    function animate() {
        requestAnimationFrame(animate);

        // Subtle rotation of particles
        if (particles) {
            particles.rotation.y += 0.001;
        }

        // Pulse selected node
        if (state.selectedNodeId) {
            const mesh = nodeMeshes[state.selectedNodeId];
            const scale = 1 + 0.15 * Math.sin(Date.now() * 0.005);
            mesh.scale.setScalar(scale);
        }

        // Reset scale for non-selected nodes
        treeNodes.forEach(node => {
            if (node.id !== state.selectedNodeId) {
                nodeMeshes[node.id].scale.setScalar(1);
            }
        });

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // Mark scene as ready
    state.sceneReady = true;
    updateHUD();

})();
</script>

</body>
</html>
