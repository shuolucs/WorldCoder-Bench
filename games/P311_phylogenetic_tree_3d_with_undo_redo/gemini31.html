<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Phylogenetic Tree</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: monospace;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            color: white;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: auto;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        button {
            background-color: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #555;
        }
        button:active {
            background-color: #777;
        }
        #historyCount {
            font-size: 14px;
        }
        .node-label {
            position: absolute;
            color: white;
            font-family: monospace;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
            transform: translate(-50%, -100%);
            margin-top: -10px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="btn-group">
            <button id="undoBtn">Undo</button>
            <button id="redoBtn">Redo</button>
        </div>
        <div id="historyCount">History: 0</div>
    </div>
    <div id="labels-container"></div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // Initialize State
        window.__3D_STATE__ = {
            nodeCount: 7,
            selectedNodeId: null,
            historyLength: 0,
            redoLength: 0,
            nodeColors: {},
            branchCount: 6,
            sceneReady: false
        };

        // Scene Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(5, 10, 5);
        scene.add(directionalLight);

        // Tree Data
        const treeData = [
            { id: 'Root', pos: [0, 0, 0], color: 0x00ff88, parent: null },
            { id: 'NodeA', pos: [-3, 3, 0], color: 0xffcc00, parent: 'Root' },
            { id: 'NodeB', pos: [3, 3, 0], color: 0xffcc00, parent: 'Root' },
            { id: 'Leaf1', pos: [-5, 6, -2], color: 0x00ccff, parent: 'NodeA', label: 'Species A' },
            { id: 'Leaf2', pos: [-1, 6, 2], color: 0x00ccff, parent: 'NodeA', label: 'Species B' },
            { id: 'Leaf3', pos: [1, 6, -2], color: 0x00ccff, parent: 'NodeB', label: 'Species C' },
            { id: 'Leaf4', pos: [5, 6, 2], color: 0x00ccff, parent: 'NodeB', label: 'Species D' }
        ];

        const nodes = [];
        const labels = [];
        const labelsContainer = document.getElementById('labels-container');
        const sphereGeo = new THREE.SphereGeometry(0.3, 16, 16);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff });

        // Build Tree
        treeData.forEach(data => {
            // Create Node
            const mat = new THREE.MeshStandardMaterial({ color: data.color });
            const mesh = new THREE.Mesh(sphereGeo, mat);
            mesh.position.set(...data.pos);
            mesh.name = data.id;
            mesh.userData = { defaultColor: data.color };
            scene.add(mesh);
            nodes.push(mesh);

            window.__3D_STATE__.nodeColors[data.id] = data.color;

            // Create Branch
            if (data.parent) {
                const parentData = treeData.find(n => n.id === data.parent);
                const points = [
                    new THREE.Vector3(...parentData.pos),
                    new THREE.Vector3(...data.pos)
                ];
                const lineGeo = new THREE.BufferGeometry().setFromPoints(points);
                const line = new THREE.Line(lineGeo, lineMat);
                scene.add(line);
            }

            // Create Label
            if (data.label) {
                const labelDiv = document.createElement('div');
                labelDiv.className = 'node-label';
                labelDiv.textContent = data.label;
                labelsContainer.appendChild(labelDiv);
                labels.push({ element: labelDiv, position: new THREE.Vector3(...data.pos) });
            }
        });

        // Interaction & Undo/Redo System
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        let historyStack = [];
        let redoStack = [];
        let currentSelectedId = null;

        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const historyCountDisplay = document.getElementById('historyCount');

        function updateUI() {
            historyCountDisplay.textContent = `History: ${historyStack.length}`;
            window.__3D_STATE__.historyLength = historyStack.length;
            window.__3D_STATE__.redoLength = redoStack.length;
        }

        function applySelection(nodeId) {
            currentSelectedId = nodeId;
            window.__3D_STATE__.selectedNodeId = nodeId;

            nodes.forEach(node => {
                const isSelected = node.name === nodeId;
                const targetColor = isSelected ? 0xff0044 : node.userData.defaultColor;
                node.material.color.setHex(targetColor);
                window.__3D_STATE__.nodeColors[node.name] = targetColor;
            });
        }

        function performAction(newNodeId) {
            if (currentSelectedId === newNodeId) return;

            const action = {
                prev: currentSelectedId,
                next: newNodeId
            };

            historyStack.push(action);
            redoStack = []; // Clear redo stack on new action
            
            applySelection(newNodeId);
            updateUI();
        }

        function undo() {
            if (historyStack.length === 0) return;
            const action = historyStack.pop();
            redoStack.push(action);
            applySelection(action.prev);
            updateUI();
        }

        function redo() {
            if (redoStack.length === 0) return;
            const action = redoStack.pop();
            historyStack.push(action);
            applySelection(action.next);
            updateUI();
        }

        // Event Listeners
        window.addEventListener('click', (event) => {
            // Ignore clicks on HUD
            if (event.target.closest('#hud')) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodes);

            if (intersects.length > 0) {
                performAction(intersects[0].object.name);
            } else {
                performAction(null);
            }
        });

        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);

        window.addEventListener('keydown', (event) => {
            if (event.ctrlKey || event.metaKey) {
                if (event.key.toLowerCase() === 'z') {
                    event.preventDefault();
                    undo();
                } else if (event.key.toLowerCase() === 'y') {
                    event.preventDefault();
                    redo();
                }
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Render Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            // Update Labels
            labels.forEach(label => {
                const vector = label.position.clone();
                vector.project(camera);
                
                const x = (vector.x * .5 + .5) * window.innerWidth;
                const y = (vector.y * -.5 + .5) * window.innerHeight;
                
                if (vector.z < 1) {
                    label.element.style.display = 'block';
                    label.element.style.left = `${x}px`;
                    label.element.style.top = `${y}px`;
                } else {
                    label.element.style.display = 'none';
                }
            });

            renderer.render(scene, camera);
        }

        window.__3D_STATE__.sceneReady = true;
        animate();
    </script>
</body>
</html>
