<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Wave Equation - Finite Difference Simulation</title>
<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
} }
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, sans-serif; }
canvas { display: block; }

#controls {
  position: absolute; top: 10px; left: 10px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 100, 255, 0.3);
  border-radius: 10px; padding: 15px; color: #ccc;
  width: 280px; backdrop-filter: blur(10px);
}
#controls h3 { color: #7b8cff; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.control-group { margin-bottom: 10px; }
.control-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 3px; }
.control-group input[type="range"] { width: 100%; accent-color: #7b8cff; }
.control-group select { width: 100%; padding: 4px; background: #2a2a4e; color: #ccc; border: 1px solid #444; border-radius: 4px; }
.control-group .value { float: right; color: #7b8cff; font-weight: bold; font-size: 12px; }
.checkbox-group { display: flex; align-items: center; gap: 8px; }
.checkbox-group input { accent-color: #7b8cff; }
.btn { 
  padding: 6px 12px; margin: 3px; border: 1px solid rgba(100,100,255,0.4);
  background: rgba(40,40,80,0.8); color: #aac; border-radius: 5px; cursor: pointer;
  font-size: 12px; transition: all 0.2s;
}
.btn:hover { background: rgba(60,60,120,0.9); color: #fff; border-color: #7b8cff; }

#hud {
  position: absolute; top: 10px; right: 10px;
  background: rgba(10, 10, 30, 0.85);
  border: 1px solid rgba(100, 100, 255, 0.3);
  border-radius: 10px; padding: 15px; color: #ccc;
  width: 220px; backdrop-filter: blur(10px);
}
#hud h3 { color: #7b8cff; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
.hud-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; }
.hud-row .label { color: #888; }
.hud-row .val { color: #7b8cff; font-weight: bold; }

#instructions {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(10, 10, 30, 0.8);
  border: 1px solid rgba(100, 100, 255, 0.2);
  border-radius: 8px; padding: 8px 16px; color: #888; font-size: 11px;
  text-align: center; backdrop-filter: blur(5px);
}
</style>
</head>
<body>

<div id="controls">
  <h3>⚙ Wave Controls</h3>
  <div class="control-group">
    <label>Wave Speed (c): <span class="value" id="speedVal">2.0</span></label>
    <input type="range" id="waveSpeed" min="0.5" max="5.0" step="0.1" value="2.0">
  </div>
  <div class="control-group">
    <label>Damping: <span class="value" id="dampVal">0.999</span></label>
    <input type="range" id="damping" min="0.990" max="1.000" step="0.001" value="0.999">
  </div>
  <div class="control-group">
    <label>Boundary Condition:</label>
    <select id="boundaryType">
      <option value="fixed">Fixed (Dirichlet)</option>
      <option value="open">Open (Absorbing/Mur)</option>
      <option value="reflective">Reflective (Neumann)</option>
    </select>
  </div>
  <div class="control-group checkbox-group">
    <input type="checkbox" id="vizMode" checked>
    <label style="margin:0">3D Height Map (uncheck for Color Map)</label>
  </div>
  <div style="margin-top:10px;">
    <button class="btn" id="resetWaves">🔄 Reset Waves</button>
    <button class="btn" id="clearObstacles">🧹 Clear Obstacles</button>
  </div>
</div>

<div id="hud">
  <h3>📊 Statistics</h3>
  <div class="hud-row"><span class="label">Grid Size:</span><span class="val" id="gridSizeDisplay">200×200</span></div>
  <div class="hud-row"><span class="label">Max Amplitude:</span><span class="val" id="maxAmplitude">0.000</span></div>
  <div class="hud-row"><span class="label">Total Energy:</span><span class="val" id="totalEnergy">0.000</span></div>
  <div class="hud-row"><span class="label">Obstacles:</span><span class="val" id="obstacleCount">0</span></div>
  <div class="hud-row"><span class="label">Frame:</span><span class="val" id="frameCount">0</span></div>
</div>

<div id="instructions">
  🖱 Click to create wave source &nbsp;|&nbsp; Shift+Drag to place obstacle &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Right-drag to rotate
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============ SIMULATION PARAMETERS ============
const Nx = 200, Ny = 200;
const dx = 0.05, dy = 0.05;
const dt = 0.01;
const SUB_STEPS = 3;

let waveSpeed = 2.0;
let damping = 0.999;
let boundaryType = 'fixed';
let vizMode = true; // true = height, false = color
let frameCount = 0;

// ============ WAVE FIELD ARRAYS ============
let current = new Float32Array(Nx * Ny);
let previous = new Float32Array(Nx * Ny);
let next = new Float32Array(Nx * Ny);

// Obstacle mask: 1 = obstacle, 0 = free
let obstacleMask = new Uint8Array(Nx * Ny);
let obstacles = []; // {x1, y1, x2, y2}

function idx(i, j) { return i * Ny + j; }

// ============ BOUNDARY CONDITIONS ============
function applyBoundary() {
  if (boundaryType === 'fixed') {
    for (let j = 0; j < Ny; j++) {
      next[idx(0, j)] = 0;
      next[idx(Nx - 1, j)] = 0;
    }
    for (let i = 0; i < Nx; i++) {
      next[idx(i, 0)] = 0;
      next[idx(i, Ny - 1)] = 0;
    }
  } else if (boundaryType === 'open') {
    // Mur first-order absorbing BC
    const c = waveSpeed;
    const r = (c * dt - dx) / (c * dt + dx);
    for (let j = 1; j < Ny - 1; j++) {
      // Left boundary (i=0)
      next[idx(0, j)] = current[idx(1, j)] + r * (next[idx(1, j)] - current[idx(0, j)]);
      // Right boundary (i=Nx-1)
      next[idx(Nx - 1, j)] = current[idx(Nx - 2, j)] + r * (next[idx(Nx - 2, j)] - current[idx(Nx - 1, j)]);
    }
    for (let i = 1; i < Nx - 1; i++) {
      // Bottom boundary (j=0)
      next[idx(i, 0)] = current[idx(i, 1)] + r * (next[idx(i, 1)] - current[idx(i, 0)]);
      // Top boundary (j=Ny-1)
      next[idx(i, Ny - 1)] = current[idx(i, Ny - 2)] + r * (next[idx(i, Ny - 2)] - current[idx(i, Ny - 1)]);
    }
    // Corners
    next[idx(0, 0)] = 0;
    next[idx(0, Ny - 1)] = 0;
    next[idx(Nx - 1, 0)] = 0;
    next[idx(Nx - 1, Ny - 1)] = 0;
  } else if (boundaryType === 'reflective') {
    for (let j = 0; j < Ny; j++) {
      next[idx(0, j)] = next[idx(1, j)];
      next[idx(Nx - 1, j)] = next[idx(Nx - 2, j)];
    }
    for (let i = 0; i < Nx; i++) {
      next[idx(i, 0)] = next[idx(i, 1)];
      next[idx(i, Ny - 1)] = next[idx(i, Ny - 2)];
    }
  }
}

// ============ SIMULATION STEP ============
function simulationStep() {
  const c = waveSpeed;
  const c2dt2 = c * c * dt * dt;
  const invDx2 = 1.0 / (dx * dx);

  // Interior points
  for (let i = 1; i < Nx - 1; i++) {
    for (let j = 1; j < Ny - 1; j++) {
      const id = idx(i, j);
      if (obstacleMask[id]) {
        next[id] = 0;
        continue;
      }
      const laplacian = (
        current[idx(i - 1, j)] + current[idx(i + 1, j)] +
        current[idx(i, j - 1)] + current[idx(i, j + 1)] -
        4.0 * current[id]
      ) * invDx2;

      next[id] = 2.0 * current[id] - previous[id] + c2dt2 * laplacian;
      next[id] *= damping;
    }
  }

  applyBoundary();

  // Enforce obstacles
  for (let i = 0; i < Nx * Ny; i++) {
    if (obstacleMask[i]) next[i] = 0;
  }

  // Rotate arrays
  const temp = previous;
  previous = current;
  current = next;
  next = temp;
}

// ============ THREE.JS SETUP ============
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 8, 8);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0x404060, 1.0);
scene.add(ambientLight);
const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 5);
scene.add(dirLight);

// ============ WAVE MESH ============
const planeWidth = Nx * dx;
const planeHeight = Ny * dy;

const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, Nx - 1, Ny - 1);
geometry.rotateX(-Math.PI / 2);

// Vertex colors
const colorAttr = new Float32Array(Nx * Ny * 3);
geometry.setAttribute('color', new THREE.BufferAttribute(colorAttr, 3));

const material = new THREE.MeshPhongMaterial({
  vertexColors: true,
  side: THREE.DoubleSide,
  shininess: 30,
  flatShading: false,
});

const waveMesh = new THREE.Mesh(geometry, material);
scene.add(waveMesh);

// ============ COLOR MAPPING ============
function heightToColor(h, r, g, b, offset) {
  const clamped = Math.max(-2, Math.min(2, h));
  if (clamped > 0) {
    const t = clamped / 2.0;
    r[offset] = t;
    g[offset] = t * 0.2;
    b[offset] = 0;
  } else {
    const t = -clamped / 2.0;
    r[offset] = 0;
    g[offset] = t * 0.2;
    b[offset] = t;
  }
}

// ============ UPDATE MESH ============
function updateMesh() {
  const positions = geometry.attributes.position.array;
  const colors = geometry.attributes.color.array;

  let maxAmp = 0;
  let totalEnergy = 0;

  for (let i = 0; i < Nx; i++) {
    for (let j = 0; j < Ny; j++) {
      const simIdx = idx(i, j);
      // PlaneGeometry vertices: row j, col i -> vertex index = j * Nx + i
      // But PlaneGeometry is created with width segments = Nx-1, height segments = Ny-1
      // Vertices are laid out: for iy in [0..Ny-1], for ix in [0..Nx-1]
      // The plane was rotated -90 around X, so original (x, y, z) -> (x, -z, y)
      // Original plane: x varies with ix, y varies with iy
      // After rotation: positions are (x, -z, y) but we just need to set the Y component
      
      const vertIdx = j * Nx + i;
      const h = current[simIdx];
      const isObs = obstacleMask[simIdx];

      // In rotated plane, Y is the height
      if (vizMode) {
        positions[vertIdx * 3 + 1] = isObs ? 0.1 : h * 0.5;
      } else {
        positions[vertIdx * 3 + 1] = isObs ? 0.05 : 0;
      }

      // Color
      if (isObs) {
        colors[vertIdx * 3] = 0.545;
        colors[vertIdx * 3 + 1] = 0;
        colors[vertIdx * 3 + 2] = 0;
      } else {
        const clamped = Math.max(-2, Math.min(2, h));
        if (clamped >= 0) {
          const t = clamped / 2.0;
          colors[vertIdx * 3] = t;
          colors[vertIdx * 3 + 1] = t * 0.3;
          colors[vertIdx * 3 + 2] = 0.05;
        } else {
          const t = -clamped / 2.0;
          colors[vertIdx * 3] = 0.05;
          colors[vertIdx * 3 + 1] = t * 0.3;
          colors[vertIdx * 3 + 2] = t;
        }
      }

      const absH = Math.abs(h);
      if (absH > maxAmp) maxAmp = absH;
      totalEnergy += h * h;
    }
  }

  geometry.attributes.position.needsUpdate = true;
  geometry.attributes.color.needsUpdate = true;
  geometry.computeVertexNormals();

  return { maxAmp, totalEnergy };
}

// ============ RAYCASTING ============
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getGridCoords(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(waveMesh);
  if (intersects.length > 0) {
    const point = intersects[0].point;
    const i = Math.round((point.x + planeWidth / 2) / dx);
    const j = Math.round((point.z + planeHeight / 2) / dy);
    if (i >= 0 && i < Nx && j >= 0 && j < Ny) {
      return { i, j };
    }
  }
  return null;
}

// ============ INTERACTION ============
let isShiftDragging = false;
let dragStart = null;
let dragEnd = null;

// Obstacle preview
const previewGeo = new THREE.PlaneGeometry(1, 1);
previewGeo.rotateX(-Math.PI / 2);
const previewMat = new THREE.MeshBasicMaterial({ color: 0x8B0000, transparent: true, opacity: 0.4 });
const previewMesh = new THREE.Mesh(previewGeo, previewMat);
previewMesh.visible = false;
previewMesh.position.y = 0.15;
scene.add(previewMesh);

renderer.domElement.addEventListener('mousedown', (e) => {
  if (e.shiftKey) {
    isShiftDragging = true;
    const coords = getGridCoords(e);
    if (coords) {
      dragStart = coords;
      dragEnd = coords;
      controls.enabled = false;
    }
  }
});

renderer.domElement.addEventListener('mousemove', (e) => {
  if (isShiftDragging && dragStart) {
    const coords = getGridCoords(e);
    if (coords) {
      dragEnd = coords;
      // Update preview
      const x1 = Math.min(dragStart.i, dragEnd.i);
      const x2 = Math.max(dragStart.i, dragEnd.i);
      const y1 = Math.min(dragStart.j, dragEnd.j);
      const y2 = Math.max(dragStart.j, dragEnd.j);
      const cx = ((x1 + x2) / 2) * dx - planeWidth / 2;
      const cz = ((y1 + y2) / 2) * dy - planeHeight / 2;
      const w = (x2 - x1 + 1) * dx;
      const h = (y2 - y1 + 1) * dy;
      previewMesh.position.x = cx;
      previewMesh.position.z = cz;
      previewMesh.scale.set(w, 1, h);
      previewMesh.visible = true;
    }
  }
});

renderer.domElement.addEventListener('mouseup', (e) => {
  if (isShiftDragging && dragStart && dragEnd) {
    const x1 = Math.min(dragStart.i, dragEnd.i);
    const x2 = Math.max(dragStart.i, dragEnd.i);
    const y1 = Math.min(dragStart.j, dragEnd.j);
    const y2 = Math.max(dragStart.j, dragEnd.j);

    // Add obstacle
    obstacles.push({ x1, y1, x2, y2 });
    for (let i = x1; i <= x2; i++) {
      for (let j = y1; j <= y2; j++) {
        if (i >= 0 && i < Nx && j >= 0 && j < Ny) {
          obstacleMask[idx(i, j)] = 1;
          current[idx(i, j)] = 0;
          previous[idx(i, j)] = 0;
        }
      }
    }
    document.getElementById('obstacleCount').textContent = obstacles.length;
  }
  isShiftDragging = false;
  dragStart = null;
  dragEnd = null;
  previewMesh.visible = false;
  controls.enabled = true;
});

renderer.domElement.addEventListener('click', (e) => {
  if (e.shiftKey) return;
  const coords = getGridCoords(e);
  if (coords) {
    const { i, j } = coords;
    if (!obstacleMask[idx(i, j)]) {
      // Apply impulse with small Gaussian spread
      for (let di = -2; di <= 2; di++) {
        for (let dj = -2; dj <= 2; dj++) {
          const ni = i + di, nj = j + dj;
          if (ni >= 0 && ni < Nx && nj >= 0 && nj < Ny && !obstacleMask[idx(ni, nj)]) {
            const r2 = di * di + dj * dj;
            current[idx(ni, nj)] += Math.exp(-r2 / 2.0);
          }
        }
      }
    }
  }
});

// ============ UI CONTROLS ============
document.getElementById('waveSpeed').addEventListener('input', (e) => {
  waveSpeed = parseFloat(e.target.value);
  document.getElementById('speedVal').textContent = waveSpeed.toFixed(1);
});

document.getElementById('damping').addEventListener('input', (e) => {
  damping = parseFloat(e.target.value);
  document.getElementById('dampVal').textContent = damping.toFixed(3);
});

document.getElementById('boundaryType').addEventListener('change', (e) => {
  boundaryType = e.target.value;
});

document.getElementById('vizMode').addEventListener('change', (e) => {
  vizMode = e.target.checked;
});

document.getElementById('resetWaves').addEventListener('click', () => {
  current.fill(0);
  previous.fill(0);
  next.fill(0);
});

document.getElementById('clearObstacles').addEventListener('click', () => {
  obstacles = [];
  obstacleMask.fill(0);
  document.getElementById('obstacleCount').textContent = '0';
});

// ============ WINDOW RESIZE ============
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ============ STATE ============
window.__3D_STATE__ = {
  gridSize: 200,
  maxAmplitude: 0,
  totalEnergy: 0,
  waveSpeed: 2.0,
  damping: 0.999,
  boundaryType: 'fixed',
  obstacleCount: 0,
  frameCount: 0,
};

// ============ ANIMATION LOOP ============
function animate() {
  requestAnimationFrame(animate);

  // Sub-steps
  for (let s = 0; s < SUB_STEPS; s++) {
    simulationStep();
  }

  const stats = updateMesh();

  frameCount++;

  // Update HUD
  document.getElementById('maxAmplitude').textContent = stats.maxAmp.toFixed(4);
  document.getElementById('totalEnergy').textContent = stats.totalEnergy.toFixed(4);
  document.getElementById('frameCount').textContent = frameCount;

  // Update state
  window.__3D_STATE__.maxAmplitude = stats.maxAmp;
  window.__3D_STATE__.totalEnergy = stats.totalEnergy;
  window.__3D_STATE__.waveSpeed = waveSpeed;
  window.__3D_STATE__.damping = damping;
  window.__3D_STATE__.boundaryType = boundaryType;
  window.__3D_STATE__.obstacleCount = obstacles.length;
  window.__3D_STATE__.frameCount = frameCount;

  controls.update();
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
