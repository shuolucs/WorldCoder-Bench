<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Wave Equation Simulation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a2e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 46, 0.85);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #3a3a5e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            width: 300px;
            pointer-events: auto;
            z-index: 10;
        }
        .control-group {
            margin-bottom: 15px;
        }
        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #a0a0c0;
        }
        .control-group input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .control-group select, .control-group button {
            width: 100%;
            padding: 8px;
            background: #2a2a4e;
            color: #fff;
            border: 1px solid #4a4a7e;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .control-group button:hover {
            background: #3a3a6e;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .checkbox-group input {
            margin-right: 10px;
            cursor: pointer;
        }
        .hud-stats {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #4a4a7e;
            font-size: 13px;
        }
        .hud-stats div {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        .hud-stats span.value {
            font-weight: bold;
            color: #4da8da;
        }
        .instructions {
            margin-top: 15px;
            font-size: 12px;
            color: #8080a0;
            line-height: 1.4;
        }
    </style>
    <script type="importmap">
    { "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    } }
    </script>
</head>
<body>
    <div id="ui-panel">
        <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 18px; color: #fff;">Wave Simulation</h3>
        
        <div class="control-group">
            <label for="waveSpeed">Wave Speed (c): <span id="speedVal">2.0</span></label>
            <input type="range" id="waveSpeed" min="0.5" max="5.0" step="0.1" value="2.0">
        </div>
        
        <div class="control-group">
            <label for="damping">Damping: <span id="dampingVal">0.999</span></label>
            <input type="range" id="damping" min="0.990" max="1.000" step="0.001" value="0.999">
        </div>
        
        <div class="control-group">
            <label for="boundaryType">Boundary Condition</label>
            <select id="boundaryType">
                <option value="fixed" selected>Fixed (h=0)</option>
                <option value="open">Open (Absorbing)</option>
                <option value="reflective">Reflective (Neumann)</option>
            </select>
        </div>
        
        <div class="checkbox-group">
            <input type="checkbox" id="vizMode" checked>
            <label for="vizMode" style="margin: 0; cursor: pointer;">Height Map Mode</label>
        </div>
        
        <div class="control-group">
            <button id="clearObstacles">Clear Obstacles</button>
        </div>
        <div class="control-group" style="margin-bottom: 0;">
            <button id="resetWaves">Reset Waves</button>
        </div>

        <div class="hud-stats">
            <div><span>Grid Size:</span> <span id="gridSizeDisplay" class="value">200×200</span></div>
            <div><span>Max Amplitude:</span> <span id="maxAmplitude" class="value">0.000</span></div>
            <div><span>Total Energy:</span> <span id="totalEnergy" class="value">0.00</span></div>
            <div><span>Obstacles:</span> <span id="obstacleCount" class="value">0</span></div>
            <div><span>Frame:</span> <span id="frameCount" class="value">0</span></div>
        </div>

        <div class="instructions">
            • <b>Click</b> to create a wave source.<br>
            • <b>Shift + Drag</b> to draw obstacles.<br>
            • <b>Drag</b> to rotate camera.
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuration & State ---
        const N = 200;
        const dx = 0.05;
        const dt = 0.01;
        
        let u = new Float32Array(N * N);
        let u_prev = new Float32Array(N * N);
        let u_next = new Float32Array(N * N);
        let obs = new Uint8Array(N * N);
        let obstaclesList = [];
        let frameCounter = 0;

        window.__3D_STATE__ = {
            gridSize: N,
            maxAmplitude: 0,
            totalEnergy: 0,
            waveSpeed: 2.0,
            damping: 0.999,
            boundaryType: 'fixed',
            obstacleCount: 0,
            frameCount: 0
        };

        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Lights
        const ambientLight = new THREE.AmbientLight(0x404040, 2.0);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // --- Textures & Materials ---
        const heightTex = new THREE.DataTexture(u, N, N, THREE.RedFormat, THREE.FloatType);
        const obsTex = new THREE.DataTexture(obs, N, N, THREE.RedFormat, THREE.UnsignedByteType);

        // 1. Height Mode Mesh (Updates vertices in JS for proper lighting)
        const geometryHeight = new THREE.PlaneGeometry(10, 10, N - 1, N - 1);
        geometryHeight.rotateX(-Math.PI / 2);
        const colors = new Float32Array(N * N * 3);
        geometryHeight.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const matHeight = new THREE.MeshStandardMaterial({
            vertexColors: true,
            side: THREE.DoubleSide,
            roughness: 0.4,
            metalness: 0.1
        });
        const meshHeight = new THREE.Mesh(geometryHeight, matHeight);
        scene.add(meshHeight);

        // 2. Color Mode Mesh (Uses ShaderMaterial with DataTexture)
        const matColor = new THREE.ShaderMaterial({
            uniforms: {
                u_heightTex: { value: heightTex },
                u_obsTex: { value: obsTex }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D u_heightTex;
                uniform sampler2D u_obsTex;
                varying vec2 vUv;
                void main() {
                    // Flip Y because DataTexture uploads from bottom to top
                    vec2 texUv = vec2(vUv.x, 1.0 - vUv.y);
                    float h = texture2D(u_heightTex, texUv).r;
                    float obs = texture2D(u_obsTex, texUv).r;
                    
                    if (obs > 0.5) {
                        gl_FragColor = vec4(0.545, 0.0, 0.0, 1.0); // Dark Red
                        return;
                    }
                    
                    vec3 color = vec3(0.0);
                    if (h > 0.0) {
                        color = mix(vec3(0.0), vec3(1.0, 0.0, 0.0), clamp(h, 0.0, 1.0));
                    } else {
                        color = mix(vec3(0.0), vec3(0.0, 0.0, 1.0), clamp(-h, 0.0, 1.0));
                    }
                    gl_FragColor = vec4(color, 1.0);
                }
            `,
            side: THREE.DoubleSide
        });
        const geometryColor = new THREE.PlaneGeometry(10, 10);
        geometryColor.rotateX(-Math.PI / 2);
        const meshColor = new THREE.Mesh(geometryColor, matColor);
        scene.add(meshColor);
        meshColor.visible = false;

        // Selection Box for drawing obstacles
        const selectionBox = new THREE.Mesh(
            new THREE.PlaneGeometry(1, 1),
            new THREE.MeshBasicMaterial({ color: 0x8B0000, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthTest: false })
        );
        selectionBox.rotateX(-Math.PI / 2);
        selectionBox.position.y = 0.05;
        scene.add(selectionBox);
        selectionBox.visible = false;

        // --- UI Event Listeners ---
        const uiSpeed = document.getElementById('waveSpeed');
        const uiDamping = document.getElementById('damping');
        const uiBoundary = document.getElementById('boundaryType');
        const uiVizMode = document.getElementById('vizMode');
        
        uiSpeed.addEventListener('input', (e) => document.getElementById('speedVal').innerText = parseFloat(e.target.value).toFixed(1));
        uiDamping.addEventListener('input', (e) => document.getElementById('dampingVal').innerText = parseFloat(e.target.value).toFixed(3));
        
        uiVizMode.addEventListener('change', (e) => {
            meshHeight.visible = e.target.checked;
            meshColor.visible = !e.target.checked;
        });

        document.getElementById('clearObstacles').addEventListener('click', () => {
            obs.fill(0);
            obsTex.needsUpdate = true;
            obstaclesList = [];
            document.getElementById('obstacleCount').innerText = '0';
        });

        document.getElementById('resetWaves').addEventListener('click', () => {
            u.fill(0);
            u_prev.fill(0);
            u_next.fill(0);
            heightTex.needsUpdate = true;
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Interaction Logic ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isDrawing = false;
        let startUV = new THREE.Vector2();
        let currentUV = new THREE.Vector2();

        renderer.domElement.addEventListener('pointerdown', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects([meshHeight, meshColor]);
            if (intersects.length > 0) {
                if (e.shiftKey) {
                    isDrawing = true;
                    startUV.copy(intersects[0].uv);
                    currentUV.copy(intersects[0].uv);
                    selectionBox.visible = true;
                    controls.enabled = false;
                } else {
                    let uv = intersects[0].uv;
                    let ix = Math.floor(uv.x * N);
                    let iy = Math.floor((1.0 - uv.y) * N);
                    ix = Math.max(0, Math.min(N - 1, ix));
                    iy = Math.max(0, Math.min(N - 1, iy));
                    u[iy * N + ix] += 2.0;
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects([meshHeight, meshColor]);
            if (intersects.length > 0) {
                currentUV.copy(intersects[0].uv);
                let centerUV = new THREE.Vector2().addVectors(startUV, currentUV).multiplyScalar(0.5);
                let sizeUV = new THREE.Vector2().subVectors(startUV, currentUV);
                sizeUV.x = Math.abs(sizeUV.x);
                sizeUV.y = Math.abs(sizeUV.y);
                
                selectionBox.position.x = (centerUV.x - 0.5) * 10;
                selectionBox.position.z = (0.5 - centerUV.y) * 10;
                selectionBox.scale.set(Math.max(0.01, sizeUV.x * 10), Math.max(0.01, sizeUV.y * 10), 1);
            }
        });

        window.addEventListener('pointerup', () => {
            if (isDrawing) {
                isDrawing = false;
                selectionBox.visible = false;
                controls.enabled = true;
                
                let minX = Math.floor(Math.min(startUV.x, currentUV.x) * N);
                let maxX = Math.floor(Math.max(startUV.x, currentUV.x) * N);
                let minY = Math.floor(Math.min(1.0 - startUV.y, 1.0 - currentUV.y) * N);
                let maxY = Math.floor(Math.max(1.0 - startUV.y, 1.0 - currentUV.y) * N);
                
                minX = Math.max(0, Math.min(N - 1, minX));
                maxX = Math.max(0, Math.min(N - 1, maxX));
                minY = Math.max(0, Math.min(N - 1, minY));
                maxY = Math.max(0, Math.min(N - 1, maxY));
                
                for (let y = minY; y <= maxY; y++) {
                    for (let x = minX; x <= maxX; x++) {
                        obs[y * N + x] = 1;
                    }
                }
                obsTex.needsUpdate = true;
                obstaclesList.push({x1: minX, y1: minY, x2: maxX, y2: maxY});
                document.getElementById('obstacleCount').innerText = obstaclesList.length;
            }
        });

        // --- Simulation & Render Loop ---
        function animate() {
            requestAnimationFrame(animate);

            const c = parseFloat(uiSpeed.value);
            const damping = parseFloat(uiDamping.value);
            const bType = uiBoundary.value;
            const coeff = (c * dt / dx) * (c * dt / dx);

            // 3 Sub-steps
            for (let step = 0; step < 3; step++) {
                // 1. Inner grid
                for (let y = 1; y < N - 1; y++) {
                    for (let x = 1; x < N - 1; x++) {
                        let i = y * N + x;
                        if (obs[i] === 1) continue;
                        let L = u[i - 1] + u[i + 1] + u[i - N] + u[i + N] - 4 * u[i];
                        let nextVal = 2 * u[i] - u_prev[i] + coeff * L;
                        // Clamp to prevent total explosion if CFL is violated heavily
                        u_next[i] = Math.max(-10, Math.min(10, nextVal)); 
                    }
                }

                // 2. Boundaries
                if (bType === 'fixed') {
                    for (let i = 0; i < N; i++) {
                        u_next[i] = 0; // Top
                        u_next[(N - 1) * N + i] = 0; // Bottom
                        u_next[i * N] = 0; // Left
                        u_next[i * N + N - 1] = 0; // Right
                    }
                } else if (bType === 'reflective') {
                    for (let i = 0; i < N; i++) {
                        u_next[i] = u_next[N + i];
                        u_next[(N - 1) * N + i] = u_next[(N - 2) * N + i];
                        u_next[i * N] = u_next[i * N + 1];
                        u_next[i * N + N - 1] = u_next[i * N + N - 2];
                    }
                } else if (bType === 'open') {
                    let c_mur = (c * dt - dx) / (c * dt + dx);
                    for (let i = 1; i < N - 1; i++) {
                        u_next[i] = u[N + i] + c_mur * (u_next[N + i] - u[i]);
                        u_next[(N - 1) * N + i] = u[(N - 2) * N + i] + c_mur * (u_next[(N - 2) * N + i] - u[(N - 1) * N + i]);
                        u_next[i * N] = u[i * N + 1] + c_mur * (u_next[i * N + 1] - u[i * N]);
                        u_next[i * N + N - 1] = u[i * N + N - 2] + c_mur * (u_next[i * N + N - 2] - u[i * N + N - 1]);
                    }
                    u_next[0] = u_next[1];
                    u_next[N - 1] = u_next[N - 2];
                    u_next[(N - 1) * N] = u_next[(N - 1) * N + 1];
                    u_next[(N - 1) * N + N - 1] = u_next[(N - 1) * N + N - 2];
                }

                // 3. Obstacles, Damping & Swap
                for (let i = 0; i < N * N; i++) {
                    if (obs[i] === 1) {
                        u_next[i] = 0;
                    } else {
                        u_next[i] *= damping;
                    }
                    u_prev[i] = u[i];
                    u[i] = u_next[i];
                }
            }

            heightTex.needsUpdate = true;

            // Update Visuals & Stats
            let maxAmp = 0;
            let energy = 0;

            if (meshHeight.visible) {
                const pos = meshHeight.geometry.attributes.position.array;
                const col = meshHeight.geometry.attributes.color.array;
                
                for (let i = 0; i < N * N; i++) {
                    let h = u[i];
                    pos[i * 3 + 1] = h; // Y is up
                    
                    let absH = Math.abs(h);
                    if (absH > maxAmp) maxAmp = absH;
                    energy += h * h;

                    if (obs[i] === 1) {
                        col[i*3] = 0.545; col[i*3+1] = 0.0; col[i*3+2] = 0.0;
                    } else if (h > 0) {
                        col[i*3] = Math.min(h, 1.0); col[i*3+1] = 0; col[i*3+2] = 0;
                    } else {
                        col[i*3] = 0; col[i*3+1] = 0; col[i*3+2] = Math.min(-h, 1.0);
                    }
                }
                meshHeight.geometry.attributes.position.needsUpdate = true;
                meshHeight.geometry.attributes.color.needsUpdate = true;
                meshHeight.geometry.computeVertexNormals();
            } else {
                for (let i = 0; i < N * N; i++) {
                    let h = u[i];
                    let absH = Math.abs(h);
                    if (absH > maxAmp) maxAmp = absH;
                    energy += h * h;
                }
            }

            // Update HUD
            frameCounter++;
            document.getElementById('maxAmplitude').innerText = maxAmp.toFixed(4);
            document.getElementById('totalEnergy').innerText = energy.toFixed(2);
            document.getElementById('frameCount').innerText = frameCounter;

            // Update Global State
            window.__3D_STATE__.maxAmplitude = maxAmp;
            window.__3D_STATE__.totalEnergy = energy;
            window.__3D_STATE__.waveSpeed = c;
            window.__3D_STATE__.damping = damping;
            window.__3D_STATE__.boundaryType = bType;
            window.__3D_STATE__.obstacleCount = obstaclesList.length;
            window.__3D_STATE__.frameCount = frameCounter;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
