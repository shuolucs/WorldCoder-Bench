<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Three.js 2D 波动方程有限差分仿真</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #eee;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 340px;
      background: rgba(10, 10, 20, 0.82);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      padding: 12px 14px;
      backdrop-filter: blur(6px);
      z-index: 10;
      user-select: none;
    }

    #hud h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
      font-weight: 700;
    }

    .control-group {
      margin-bottom: 10px;
    }

    .control-group label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: #ddd;
    }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row > * {
      flex: 1;
    }

    input[type="range"],
    select,
    button {
      width: 100%;
      box-sizing: border-box;
    }

    button {
      background: #2f3b67;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #40508a;
    }

    input[type="checkbox"] {
      transform: scale(1.2);
      margin-right: 8px;
    }

    .stats {
      margin-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 10px;
      font-size: 13px;
      line-height: 1.7;
    }

    .stat-line {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .hint {
      margin-top: 8px;
      color: #b7c0ff;
      font-size: 12px;
      line-height: 1.5;
    }

    #dragOverlay {
      position: absolute;
      border: 2px dashed rgba(255, 120, 120, 0.9);
      background: rgba(139, 0, 0, 0.25);
      pointer-events: none;
      display: none;
      z-index: 11;
    }
  </style>

  <script type="importmap">
  { "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  } }
  </script>
</head>
<body>
  <div id="app">
    <div id="hud">
      <h2>2D 波动方程仿真</h2>

      <div class="control-group">
        <label for="waveSpeed">波速 c: <span id="waveSpeedValue">2.0</span></label>
        <input id="waveSpeed" type="range" min="0.5" max="5.0" step="0.1" value="2.0" />
      </div>

      <div class="control-group">
        <label for="damping">衰减 damping: <span id="dampingValue">0.999</span></label>
        <input id="damping" type="range" min="0.990" max="1.000" step="0.001" value="0.999" />
      </div>

      <div class="control-group">
        <label for="boundaryType">边界条件</label>
        <select id="boundaryType">
          <option value="fixed" selected>fixed</option>
          <option value="open">open</option>
          <option value="reflective">reflective</option>
        </select>
      </div>

      <div class="control-group">
        <label class="row" style="justify-content:flex-start;">
          <span style="display:flex;align-items:center;flex:none;">
            <input id="vizMode" type="checkbox" checked />
            高度图模式（取消勾选为颜色图模式）
          </span>
        </label>
      </div>

      <div class="control-group row">
        <button id="clearObstacles">清除障碍物</button>
        <button id="resetWaves">重置波场</button>
      </div>

      <div class="stats">
        <div class="stat-line"><span>网格尺寸</span><span id="gridSizeDisplay">200×200</span></div>
        <div class="stat-line"><span>最大振幅</span><span id="maxAmplitude">0.0000</span></div>
        <div class="stat-line"><span>总能量</span><span id="totalEnergy">0.0000</span></div>
        <div class="stat-line"><span>障碍物数量</span><span id="obstacleCount">0</span></div>
        <div class="stat-line"><span>帧计数</span><span id="frameCount">0</span></div>
      </div>

      <div class="hint">
        点击平面：产生点源扰动<br/>
        Shift + 鼠标拖拽：绘制矩形障碍物<br/>
        鼠标右键/拖拽：OrbitControls 观察
      </div>
    </div>

    <div id="dragOverlay"></div>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const Nx = 200;
    const Ny = 200;
    const dx = 0.05;
    const dy = 0.05;
    const dt = 0.01;
    const SUBSTEPS = 3;

    const planeWidth = (Nx - 1) * dx;
    const planeHeight = (Ny - 1) * dy;

    let waveSpeed = 2.0;
    let damping = 0.999;
    let boundaryType = 'fixed';
    let heightMode = true;
    let frameCounter = 0;

    const app = document.getElementById('app');
    const dragOverlay = document.getElementById('dragOverlay');

    const waveSpeedSlider = document.getElementById('waveSpeed');
    const dampingSlider = document.getElementById('damping');
    const boundarySelect = document.getElementById('boundaryType');
    const vizModeCheckbox = document.getElementById('vizMode');
    const clearObstaclesBtn = document.getElementById('clearObstacles');
    const resetWavesBtn = document.getElementById('resetWaves');

    const waveSpeedValue = document.getElementById('waveSpeedValue');
    const dampingValue = document.getElementById('dampingValue');

    const maxAmplitudeEl = document.getElementById('maxAmplitude');
    const totalEnergyEl = document.getElementById('totalEnergy');
    const obstacleCountEl = document.getElementById('obstacleCount');
    const frameCountEl = document.getElementById('frameCount');

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x1a1a2e, 1);
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 5.8, 7.6);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0, 0);
    controls.update();

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(3, 6, 4);
    scene.add(dirLight);

    const current = new Float32Array(Nx * Ny);
    const previous = new Float32Array(Nx * Ny);
    const next = new Float32Array(Nx * Ny);

    const obstacleMask = new Uint8Array(Nx * Ny);
    const obstacles = [];

    function idx(i, j) {
      return i + j * Nx;
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    function colorMap(v, isObstacle = false) {
      if (isObstacle) {
        return { r: 139, g: 0, b: 0 };
      }
      const scale = 3.0;
      const t = clamp(v / scale, -1, 1);
      if (t > 0) {
        const c = Math.floor(255 * t);
        return { r: c, g: 0, b: 0 };
      } else if (t < 0) {
        const c = Math.floor(255 * (-t));
        return { r: 0, g: 0, b: c };
      }
      return { r: 0, g: 0, b: 0 };
    }

    const geometry = new THREE.PlaneGeometry(planeWidth, planeHeight, Nx - 1, Ny - 1);
    geometry.rotateX(-Math.PI / 2);

    const positions = geometry.attributes.position;
    const colors = new Float32Array(positions.count * 3);
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const texData = new Uint8Array(Nx * Ny * 4);
    const dataTexture = new THREE.DataTexture(texData, Nx, Ny, THREE.RGBAFormat);
    dataTexture.colorSpace = THREE.SRGBColorSpace;
    dataTexture.needsUpdate = true;
    dataTexture.magFilter = THREE.LinearFilter;
    dataTexture.minFilter = THREE.LinearFilter;
    dataTexture.wrapS = THREE.ClampToEdgeWrapping;
    dataTexture.wrapT = THREE.ClampToEdgeWrapping;

    const material = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      side: THREE.DoubleSide,
      vertexColors: true,
      metalness: 0.05,
      roughness: 0.75,
      map: null
    });

    const planeMesh = new THREE.Mesh(geometry, material);
    scene.add(planeMesh);

    const gridHelper = new THREE.GridHelper(Math.max(planeWidth, planeHeight) * 1.1, 20, 0x334466, 0x223344);
    gridHelper.position.y = -0.001;
    scene.add(gridHelper);

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let isPointerDown = false;
    let isShiftDrag = false;
    let dragStartCell = null;
    let dragEndCell = null;
    let startClient = null;
    let suppressClickImpulse = false;

    function worldToGrid(point) {
      const local = planeMesh.worldToLocal(point.clone());
      const x = local.x + planeWidth / 2;
      const z = local.z + planeHeight / 2;
      const i = clamp(Math.round(x / dx), 0, Nx - 1);
      const j = clamp(Math.round(z / dy), 0, Ny - 1);
      return { i, j };
    }

    function gridToVertexIndex(i, j) {
      return idx(i, j);
    }

    function applyImpulse(i, j, amplitude = 1.0) {
      const k = idx(i, j);
      if (obstacleMask[k]) return;
      current[k] += amplitude;
    }

    function clearWaves() {
      current.fill(0);
      previous.fill(0);
      next.fill(0);
    }

    function clearObstacles() {
      obstacleMask.fill(0);
      obstacles.length = 0;
    }

    function addObstacleRect(x1, y1, x2, y2) {
      const minX = clamp(Math.min(x1, x2), 0, Nx - 1);
      const maxX = clamp(Math.max(x1, x2), 0, Nx - 1);
      const minY = clamp(Math.min(y1, y2), 0, Ny - 1);
      const maxY = clamp(Math.max(y1, y2), 0, Ny - 1);

      obstacles.push({ x1: minX, y1: minY, x2: maxX, y2: maxY });

      for (let j = minY; j <= maxY; j++) {
        for (let i = minX; i <= maxX; i++) {
          const k = idx(i, j);
          obstacleMask[k] = 1;
          current[k] = 0;
          previous[k] = 0;
          next[k] = 0;
        }
      }
    }

    function applyObstacleConstraints() {
      for (let j = 0; j < Ny; j++) {
        for (let i = 0; i < Nx; i++) {
          const k = idx(i, j);
          if (obstacleMask[k]) {
            current[k] = 0;
            previous[k] = 0;
            next[k] = 0;
          }
        }
      }
    }

    function stepWave() {
      const c = waveSpeed;
      const alpha = (c * c * dt * dt) / (dx * dx);

      for (let j = 1; j < Ny - 1; j++) {
        for (let i = 1; i < Nx - 1; i++) {
          const k = idx(i, j);
          if (obstacleMask[k]) {
            next[k] = 0;
            continue;
          }

          const lap =
            current[idx(i - 1, j)] +
            current[idx(i + 1, j)] +
            current[idx(i, j - 1)] +
            current[idx(i, j + 1)] -
            4.0 * current[k];

          next[k] = (2.0 * current[k] - previous[k] + alpha * lap) * damping;
        }
      }

      applyBoundaryConditions();
      applyObstacleConstraints();

      let temp = previous;
      previous.set(current);
      current.set(next);
      next.set(temp);
      applyObstacleConstraints();
    }

    function applyBoundaryConditions() {
      if (boundaryType === 'fixed') {
        for (let i = 0; i < Nx; i++) {
          next[idx(i, 0)] = 0;
          next[idx(i, Ny - 1)] = 0;
        }
        for (let j = 0; j < Ny; j++) {
          next[idx(0, j)] = 0;
          next[idx(Nx - 1, j)] = 0;
        }
        return;
      }

      if (boundaryType === 'reflective') {
        for (let j = 0; j < Ny; j++) {
          next[idx(0, j)] = next[idx(1, j)];
          next[idx(Nx - 1, j)] = next[idx(Nx - 2, j)];
        }
        for (let i = 0; i < Nx; i++) {
          next[idx(i, 0)] = next[idx(i, 1)];
          next[idx(i, Ny - 1)] = next[idx(i, Ny - 2)];
        }
        return;
      }

      if (boundaryType === 'open') {
        const mur = (waveSpeed * dt - dx) / (waveSpeed * dt + dx);

        for (let j = 1; j < Ny - 1; j++) {
          next[idx(0, j)] =
            current[idx(1, j)] + mur * (next[idx(1, j)] - current[idx(0, j)]);
          next[idx(Nx - 1, j)] =
            current[idx(Nx - 2, j)] + mur * (next[idx(Nx - 2, j)] - current[idx(Nx - 1, j)]);
        }

        for (let i = 1; i < Nx - 1; i++) {
          next[idx(i, 0)] =
            current[idx(i, 1)] + mur * (next[idx(i, 1)] - current[idx(i, 0)]);
          next[idx(i, Ny - 1)] =
            current[idx(i, Ny - 2)] + mur * (next[idx(i, Ny - 2)] - current[idx(i, Ny - 1)]);
        }

        next[idx(0, 0)] = 0.5 * (next[idx(1, 0)] + next[idx(0, 1)]);
        next[idx(Nx - 1, 0)] = 0.5 * (next[idx(Nx - 2, 0)] + next[idx(Nx - 1, 1)]);
        next[idx(0, Ny - 1)] = 0.5 * (next[idx(1, Ny - 1)] + next[idx(0, Ny - 2)]);
        next[idx(Nx - 1, Ny - 1)] = 0.5 * (next[idx(Nx - 2, Ny - 1)] + next[idx(Nx - 1, Ny - 2)]);
      }
    }

    function updateVisualization() {
      let maxAmp = 0;
      let totalEnergy = 0;

      if (heightMode) {
        material.map = null;
        material.vertexColors = true;
        material.needsUpdate = true;

        for (let j = 0; j < Ny; j++) {
          for (let i = 0; i < Nx; i++) {
            const k = idx(i, j);
            const vIndex = gridToVertexIndex(i, j);
            const h = obstacleMask[k] ? 0 : current[k];

            positions.setY(vIndex, h);

            const absH = Math.abs(h);
            if (absH > maxAmp) maxAmp = absH;
            totalEnergy += h * h;

            const c = colorMap(h, obstacleMask[k] === 1);
            colors[vIndex * 3 + 0] = c.r / 255;
            colors[vIndex * 3 + 1] = c.g / 255;
            colors[vIndex * 3 + 2] = c.b / 255;
          }
        }

        positions.needsUpdate = true;
        geometry.attributes.color.needsUpdate = true;
        geometry.computeVertexNormals();
      } else {
        material.map = dataTexture;
        material.vertexColors = false;
        material.needsUpdate = true;

        for (let j = 0; j < Ny; j++) {
          for (let i = 0; i < Nx; i++) {
            const k = idx(i, j);
            const vIndex = gridToVertexIndex(i, j);
            const h = obstacleMask[k] ? 0 : current[k];

            positions.setY(vIndex, 0);

            const absH = Math.abs(h);
            if (absH > maxAmp) maxAmp = absH;
            totalEnergy += h * h;

            const c = colorMap(h, obstacleMask[k] === 1);
            const ti = (i + j * Nx) * 4;
            texData[ti + 0] = c.r;
            texData[ti + 1] = c.g;
            texData[ti + 2] = c.b;
            texData[ti + 3] = 255;
          }
        }

        positions.needsUpdate = true;
        dataTexture.needsUpdate = true;
      }

      maxAmplitudeEl.textContent = maxAmp.toFixed(4);
      totalEnergyEl.textContent = totalEnergy.toFixed(4);
      obstacleCountEl.textContent = String(obstacles.length);
      frameCountEl.textContent = String(frameCounter);

      window.__3D_STATE__ = {
        gridSize: 200,
        maxAmplitude: maxAmp,
        totalEnergy: totalEnergy,
        waveSpeed: waveSpeed,
        damping: damping,
        boundaryType: boundaryType,
        obstacleCount: obstacles.length,
        frameCount: frameCounter
      };
    }

    function setMouseFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
    }

    function raycastPlane(event) {
      setMouseFromEvent(event);
      raycaster.setFromCamera(mouse, camera);
      const hits = raycaster.intersectObject(planeMesh, false);
      return hits.length > 0 ? hits[0] : null;
    }

    function updateDragOverlay(startEvt, endEvt) {
      const x1 = Math.min(startEvt.clientX, endEvt.clientX);
      const y1 = Math.min(startEvt.clientY, endEvt.clientY);
      const x2 = Math.max(startEvt.clientX, endEvt.clientX);
      const y2 = Math.max(startEvt.clientY, endEvt.clientY);

      dragOverlay.style.display = 'block';
      dragOverlay.style.left = `${x1}px`;
      dragOverlay.style.top = `${y1}px`;
      dragOverlay.style.width = `${x2 - x1}px`;
      dragOverlay.style.height = `${y2 - y1}px`;
    }

    renderer.domElement.addEventListener('pointerdown', (event) => {
      isPointerDown = true;
      suppressClickImpulse = false;

      if (event.shiftKey) {
        const hit = raycastPlane(event);
        if (hit) {
          isShiftDrag = true;
          controls.enabled = false;
          const cell = worldToGrid(hit.point);
          dragStartCell = cell;
          dragEndCell = cell;
          startClient = { clientX: event.clientX, clientY: event.clientY };
          updateDragOverlay(startClient, startClient);
        }
      }
    });

    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!isPointerDown || !isShiftDrag) return;
      const hit = raycastPlane(event);
      if (!hit) return;

      dragEndCell = worldToGrid(hit.point);
      updateDragOverlay(startClient, event);

      const dxp = event.clientX - startClient.clientX;
      const dyp = event.clientY - startClient.clientY;
      if (Math.hypot(dxp, dyp) > 4) {
        suppressClickImpulse = true;
      }
    });

    renderer.domElement.addEventListener('pointerup', (event) => {
      if (isShiftDrag && dragStartCell && dragEndCell) {
        addObstacleRect(dragStartCell.i, dragStartCell.j, dragEndCell.i, dragEndCell.j);
      } else if (!event.shiftKey && !suppressClickImpulse) {
        const hit = raycastPlane(event);
        if (hit) {
          const { i, j } = worldToGrid(hit.point);
          applyImpulse(i, j, 1.0);
        }
      }

      isPointerDown = false;
      isShiftDrag = false;
      dragStartCell = null;
      dragEndCell = null;
      startClient = null;
      dragOverlay.style.display = 'none';
      controls.enabled = true;
    });

    renderer.domElement.addEventListener('pointerleave', () => {
      if (isShiftDrag) {
        dragOverlay.style.display = 'none';
      }
      isPointerDown = false;
      isShiftDrag = false;
      dragStartCell = null;
      dragEndCell = null;
      startClient = null;
      controls.enabled = true;
    });

    waveSpeedSlider.addEventListener('input', () => {
      waveSpeed = parseFloat(waveSpeedSlider.value);
      waveSpeedValue.textContent = waveSpeed.toFixed(1);

      const cfl = waveSpeed * dt / dx;
      if (cfl >= 1 / Math.sqrt(2)) {
        waveSpeedValue.textContent += ' ⚠';
      }
    });

    dampingSlider.addEventListener('input', () => {
      damping = parseFloat(dampingSlider.value);
      dampingValue.textContent = damping.toFixed(3);
    });

    boundarySelect.addEventListener('change', () => {
      boundaryType = boundarySelect.value;
    });

    vizModeCheckbox.addEventListener('change', () => {
      heightMode = vizModeCheckbox.checked;
    });

    clearObstaclesBtn.addEventListener('click', () => {
      clearObstacles();
    });

    resetWavesBtn.addEventListener('click', () => {
      clearWaves();
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    waveSpeedValue.textContent = waveSpeed.toFixed(1);
    dampingValue.textContent = damping.toFixed(3);

    function animate() {
      requestAnimationFrame(animate);

      for (let s = 0; s < SUBSTEPS; s++) {
        stepWave();
      }

      controls.update();
      frameCounter++;
      updateVisualization();
      renderer.render(scene, camera);
    }

    updateVisualization();
    animate();
  </script>
</body>
</html>
