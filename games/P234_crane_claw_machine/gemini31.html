<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Crane Claw Machine</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #111;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        .hud {
            position: absolute;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
            pointer-events: none;
            z-index: 10;
        }
        #score-display {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: bold;
        }
        #coins-display {
            top: 20px;
            left: 20px;
            font-size: 20px;
        }
        #claw-pos {
            bottom: 20px;
            left: 20px;
            font-size: 16px;
        }
        #game-over {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: #f00;
            text-shadow: 0 0 10px #f00;
            display: none;
            text-align: center;
        }
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 20;
        }
        button {
            background-color: #222;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            transition: all 0.2s;
            pointer-events: auto;
        }
        button:hover:not(:disabled) {
            background-color: #0f0;
            color: #000;
        }
        button:disabled {
            border-color: #555;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }
        #instructions {
            position: absolute;
            top: 60px;
            left: 20px;
            font-size: 14px;
            color: #aaa;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="score-display" class="hud">Score: 0</div>
    <div id="coins-display" class="hud">Coins: 3</div>
    <div id="claw-pos" class="hud">X: 0.00 Z: 0.00</div>
    <div id="game-over" class="hud">GAME OVER<br><span style="font-size: 20px; color: #aaa;">Press 'R' to Restart</span></div>
    
    <div id="instructions" class="hud">
        Arrows: Move Claw<br>
        SPACE: Drop Claw<br>
        R: Reset Game
    </div>

    <div class="controls">
        <button id="start-btn">INSERT COIN</button>
        <button id="drop-btn" disabled>DROP</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- State Management ---
        window.__3D_STATE__ = {
            gameStarted: false,
            clawX: 0,
            clawZ: 0,
            clawY: 9.0,
            clawState: 'idle', // idle, moving, descending, grabbing, ascending, delivering, releasing, returning
            clawOpen: true,
            score: 0,
            coins: 3,
            gameOver: false,
            lanternsRemaining: 5,
            grabbedLantern: false,
            dropSequenceActive: false,
            totalDrops: 0,
            lanternPositions: []
        };

        const state = window.__3D_STATE__;

        // --- DOM Elements ---
        const scoreDisplay = document.getElementById('score-display');
        const coinsDisplay = document.getElementById('coins-display');
        const clawPosDisplay = document.getElementById('claw-pos');
        const gameOverDisplay = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const dropBtn = document.getElementById('drop-btn');

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 8, 14);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Cabinet (Glass Box)
        const cabGeo = new THREE.BoxGeometry(10, 10, 10);
        const cabMat = new THREE.MeshPhysicalMaterial({
            color: 0xaaaaaa,
            transparent: true,
            opacity: 0.15,
            roughness: 0.1,
            metalness: 0.1,
            side: THREE.DoubleSide
        });
        const cabinet = new THREE.Mesh(cabGeo, cabMat);
        cabinet.position.set(0, 5, 0);
        scene.add(cabinet);

        const edges = new THREE.EdgesGeometry(cabGeo);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff, linewidth: 2 }));
        cabinet.add(line);

        // Floor
        const floorGeo = new THREE.BoxGeometry(9.8, 0.5, 9.8);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2a2a5a });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.set(0, 0.25, 0); // Top surface at y=0.5
        scene.add(floor);

        // Drop Zone Chute (Visual)
        const chuteGeo = new THREE.BoxGeometry(2, 1, 2);
        const chuteMat = new THREE.MeshStandardMaterial({ color: 0x552222 });
        const chute = new THREE.Mesh(chuteGeo, chuteMat);
        chute.position.set(5, 0.5, 0);
        scene.add(chute);

        // --- Claw Mechanism ---
        const clawAssembly = new THREE.Group();
        scene.add(clawAssembly);

        // Rails
        const xRailGeo = new THREE.BoxGeometry(8.5, 0.1, 0.2);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        const xRail = new THREE.Mesh(xRailGeo, railMat);
        xRail.position.set(0, 9.5, 0);
        scene.add(xRail); // Fixed X rail

        const zRailGeo = new THREE.BoxGeometry(0.2, 0.15, 8.5);
        const zRail = new THREE.Mesh(zRailGeo, railMat);
        zRail.position.set(0, 9.5, 0);
        scene.add(zRail); // Moves along X

        // Trolley
        const trolleyGeo = new THREE.BoxGeometry(0.6, 0.3, 0.6);
        const trolleyMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        const trolley = new THREE.Mesh(trolleyGeo, trolleyMat);
        trolley.position.set(0, 9.5, 0);
        scene.add(trolley);

        // Cable
        const cableGeo = new THREE.CylinderGeometry(0.02, 0.02, 1);
        cableGeo.translate(0, -0.5, 0); // Pivot at top
        const cableMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const cable = new THREE.Mesh(cableGeo, cableMat);
        trolley.add(cable);

        // Claw Base & Fingers
        const clawGroup = new THREE.Group();
        scene.add(clawGroup);

        const clawBaseGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.2);
        const clawBaseMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        const clawBaseMesh = new THREE.Mesh(clawBaseGeo, clawBaseMat);
        clawGroup.add(clawBaseMesh);

        const fingers = [];
        const fingerPivots = [];
        for (let i = 0; i < 3; i++) {
            const pivot = new THREE.Group();
            pivot.rotation.y = (i * Math.PI * 2) / 3;
            
            const fingerGeo = new THREE.BoxGeometry(0.05, 0.8, 0.1);
            fingerGeo.translate(0, -0.4, 0.1);
            const finger = new THREE.Mesh(fingerGeo, new THREE.MeshStandardMaterial({ color: 0xcccccc }));
            
            pivot.add(finger);
            clawGroup.add(pivot);
            fingers.push(finger);
            fingerPivots.push(pivot);
        }

        // --- Prizes (Lanterns) ---
        const lanterns = [];
        let grabbedMesh = null;

        function createProceduralLantern() {
            const group = new THREE.Group();
            const bodyGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.6, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff2222 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.3;
            group.add(body);

            const topGeo = new THREE.SphereGeometry(0.2, 8, 8);
            const topMat = new THREE.MeshStandardMaterial({ color: 0xffdd00 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = 0.7;
            group.add(top);
            
            group.scale.set(0.5, 0.5, 0.5);
            return group;
        }

        function spawnLanterns() {
            // Clear existing
            lanterns.forEach(l => scene.remove(l));
            lanterns.length = 0;

            const loader = new GLTFLoader();
            
            for (let i = 0; i < 5; i++) {
                const x = (Math.random() - 0.5) * 7;
                const z = (Math.random() - 0.5) * 7;
                
                loader.load('Lantern.glb', (gltf) => {
                    const model = gltf.scene;
                    model.scale.set(0.5, 0.5, 0.5);
                    model.position.set(x, 0.5, z);
                    scene.add(model);
                    lanterns.push(model);
                }, undefined, (error) => {
                    // Fallback if Lantern.glb is not found
                    const model = createProceduralLantern();
                    model.position.set(x, 0.5, z);
                    scene.add(model);
                    lanterns.push(model);
                });
            }
            state.lanternsRemaining = 5;
        }

        spawnLanterns();

        // --- Input Handling ---
        const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false };

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
            if (e.code === 'Space' && state.gameStarted && state.clawState === 'idle' && state.coins > 0) {
                initiateDrop();
            }
            if (e.code === 'KeyR') {
                resetGame();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
        });

        startBtn.addEventListener('click', () => {
            if (!state.gameStarted) {
                state.gameStarted = true;
                startBtn.innerText = 'PLAYING';
                startBtn.disabled = true;
                dropBtn.disabled = false;
            }
        });

        dropBtn.addEventListener('click', () => {
            if (state.gameStarted && state.clawState === 'idle' && state.coins > 0) {
                initiateDrop();
            }
        });

        function initiateDrop() {
            state.clawState = 'descending';
            state.dropSequenceActive = true;
            state.coins--;
            state.totalDrops++;
            updateUI();
        }

        function resetGame() {
            state.gameStarted = false;
            state.clawX = 0;
            state.clawZ = 0;
            state.clawY = 9.0;
            state.clawState = 'idle';
            state.clawOpen = true;
            state.score = 0;
            state.coins = 3;
            state.gameOver = false;
            state.grabbedLantern = false;
            state.dropSequenceActive = false;
            
            if (grabbedMesh) {
                scene.attach(grabbedMesh);
                grabbedMesh = null;
            }
            
            spawnLanterns();
            
            startBtn.innerText = 'INSERT COIN';
            startBtn.disabled = false;
            dropBtn.disabled = true;
            gameOverDisplay.style.display = 'none';
            updateUI();
        }

        function updateUI() {
            scoreDisplay.innerText = `Score: ${state.score}`;
            coinsDisplay.innerText = `Coins: ${state.coins}`;
            clawPosDisplay.innerText = `X: ${state.clawX.toFixed(2)} Z: ${state.clawZ.toFixed(2)}`;
            
            if (state.gameOver) {
                gameOverDisplay.style.display = 'block';
            }
        }

        // --- Game Loop ---
        const clock = new THREE.Clock();
        let grabTimer = 0;

        function animate() {
            requestAnimationFrame(animate);
            
            const dt = Math.min(clock.getDelta(), 0.1); // Cap delta time

            if (state.gameStarted) {
                const speedXZ = 3.0;
                const speedY = 4.0;

                switch (state.clawState) {
                    case 'idle':
                    case 'moving':
                        let moved = false;
                        if (keys.ArrowLeft) { state.clawX -= speedXZ * dt; moved = true; }
                        if (keys.ArrowRight) { state.clawX += speedXZ * dt; moved = true; }
                        if (keys.ArrowUp) { state.clawZ -= speedXZ * dt; moved = true; }
                        if (keys.ArrowDown) { state.clawZ += speedXZ * dt; moved = true; }
                        
                        // Clamp
                        state.clawX = Math.max(-4, Math.min(4, state.clawX));
                        state.clawZ = Math.max(-4, Math.min(4, state.clawZ));
                        
                        state.clawState = moved ? 'moving' : 'idle';
                        break;

                    case 'descending':
                        state.clawY -= speedY * dt;
                        if (state.clawY <= 1.5) {
                            state.clawY = 1.5;
                            state.clawState = 'grabbing';
                            grabTimer = 0;
                        }
                        break;

                    case 'grabbing':
                        grabTimer += dt;
                        state.clawOpen = false;
                        
                        // Animate fingers closing
                        fingerPivots.forEach(p => {
                            p.children[0].rotation.x = THREE.MathUtils.lerp(p.children[0].rotation.x, -0.2, dt * 10);
                        });

                        if (grabTimer > 0.5) {
                            // Check grab
                            for (let i = 0; i < lanterns.length; i++) {
                                const l = lanterns[i];
                                const dist = Math.hypot(l.position.x - state.clawX, l.position.z - state.clawZ);
                                if (dist < 1.2) {
                                    grabbedMesh = l;
                                    clawGroup.attach(grabbedMesh);
                                    state.grabbedLantern = true;
                                    lanterns.splice(i, 1);
                                    state.lanternsRemaining--;
                                    break;
                                }
                            }
                            state.clawState = 'ascending';
                        }
                        break;

                    case 'ascending':
                        state.clawY += speedY * dt;
                        if (state.clawY >= 9.0) {
                            state.clawY = 9.0;
                            state.clawState = 'delivering';
                        }
                        break;

                    case 'delivering':
                        // Move to x=5, z=0
                        const dx = 5 - state.clawX;
                        const dz = 0 - state.clawZ;
                        const dist = Math.hypot(dx, dz);
                        
                        if (dist < 0.1) {
                            state.clawX = 5;
                            state.clawZ = 0;
                            state.clawState = 'releasing';
                            grabTimer = 0;
                        } else {
                            state.clawX += (dx / dist) * speedXZ * dt;
                            state.clawZ += (dz / dist) * speedXZ * dt;
                        }
                        break;

                    case 'releasing':
                        grabTimer += dt;
                        state.clawOpen = true;
                        
                        // Animate fingers opening
                        fingerPivots.forEach(p => {
                            p.children[0].rotation.x = THREE.MathUtils.lerp(p.children[0].rotation.x, 0.5, dt * 10);
                        });

                        if (grabTimer > 0.3 && grabbedMesh) {
                            scene.attach(grabbedMesh);
                            // Simple drop animation logic could go here, but snapping to floor is safer
                            grabbedMesh.position.y = 0.5; 
                            grabbedMesh = null;
                            state.grabbedLantern = false;
                            state.score++;
                            updateUI();
                        }

                        if (grabTimer > 1.0) {
                            state.clawState = 'returning';
                        }
                        break;

                    case 'returning':
                        const rx = 0 - state.clawX;
                        const rz = 0 - state.clawZ;
                        const rDist = Math.hypot(rx, rz);
                        
                        if (rDist < 0.1) {
                            state.clawX = 0;
                            state.clawZ = 0;
                            state.clawState = 'idle';
                            state.dropSequenceActive = false;
                            
                            if (state.coins <= 0) {
                                state.gameOver = true;
                                updateUI();
                            }
                        } else {
                            state.clawX += (rx / rDist) * speedXZ * dt;
                            state.clawZ += (rz / rDist) * speedXZ * dt;
                        }
                        break;
                }

                // Ensure no NaNs
                if (isNaN(state.clawX)) state.clawX = 0;
                if (isNaN(state.clawY)) state.clawY = 9.0;
                if (isNaN(state.clawZ)) state.clawZ = 0;

                // Update Visuals
                trolley.position.set(state.clawX, 9.5, state.clawZ);
                zRail.position.x = state.clawX;
                
                clawGroup.position.set(state.clawX, state.clawY, state.clawZ);
                
                const cableLength = 9.5 - state.clawY;
                cable.scale.y = Math.max(0.01, cableLength);

                if (state.clawState === 'idle' || state.clawState === 'moving' || state.clawState === 'descending') {
                    const targetRot = state.clawOpen ? 0.5 : -0.2;
                    fingerPivots.forEach(p => {
                        p.children[0].rotation.x = THREE.MathUtils.lerp(p.children[0].rotation.x, targetRot, dt * 10);
                    });
                }

                // Update State Array
                state.lanternPositions = lanterns.map(l => ({ x: l.position.x, y: l.position.y, z: l.position.z }));
                
                // Update UI text frequently
                if (state.clawState === 'moving' || state.clawState === 'delivering' || state.clawState === 'returning') {
                    clawPosDisplay.innerText = `X: ${state.clawX.toFixed(2)} Z: ${state.clawZ.toFixed(2)}`;
                }
            }

            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start Loop
        animate();
    </script>
</body>
</html>
