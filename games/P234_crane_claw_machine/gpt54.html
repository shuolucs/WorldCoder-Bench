<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Crane Claw Machine</title>
  <style>
    html, body {
      margin: 0;
      overflow: hidden;
      background: #0b1020;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
    }

    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #score-display,
    #coins-display,
    #claw-pos,
    #game-over {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      box-shadow: 0 0 10px rgba(0,0,0,0.25);
      user-select: none;
      white-space: nowrap;
    }

    #score-display { top: 12px; font-size: 24px; font-weight: bold; }
    #coins-display { top: 56px; font-size: 20px; }
    #claw-pos { top: 96px; font-size: 16px; }
    #game-over {
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 52px;
      font-weight: 900;
      color: #ff4d6d;
      display: none;
      background: rgba(0,0,0,0.65);
      padding: 20px 28px;
    }

    #controls {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      pointer-events: auto;
      z-index: 10;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #6c63ff;
      color: white;
      box-shadow: 0 6px 20px rgba(0,0,0,0.28);
    }

    button:hover:not(:disabled) {
      filter: brightness(1.08);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.75;
      background: #3a3f66;
    }

    #drop-btn {
      background: #ff8c42;
    }

    #hint {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: rgba(0,0,0,0.45);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      line-height: 1.45;
      pointer-events: none;
    }

    canvas { display: block; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="score-display">Score: 0</div>
    <div id="coins-display">Coins: 3</div>
    <div id="claw-pos">X: 0.00 Z: 0.00</div>
    <div id="game-over">GAME OVER</div>
  </div>

  <div id="controls">
    <button id="start-btn">INSERT COIN</button>
    <button id="drop-btn">DROP</button>
  </div>

  <div id="hint">
    Arrows: Move claw<br>
    Space / DROP: Drop claw<br>
    R: Reset
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
    import { GLTFLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b1020);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 8, 14);
    camera.lookAt(0, 5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    const ambient = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambient);

    const dir = new THREE.DirectionalLight(0xffffff, 0.8);
    dir.position.set(5, 10, 5);
    scene.add(dir);

    const machineGroup = new THREE.Group();
    scene.add(machineGroup);

    const cabinetCenter = new THREE.Vector3(0, 5, 0);
    const cabinetSize = new THREE.Vector3(10, 10, 10);

    const glassMat = new THREE.MeshPhysicalMaterial({
      color: 0xaad8ff,
      transparent: true,
      opacity: 0.15,
      roughness: 0.2,
      metalness: 0.05,
      transmission: 0.3,
      clearcoat: 1
    });

    const edgeMat = new THREE.LineBasicMaterial({ color: 0x99ccff });

    const cabinetBox = new THREE.Mesh(
      new THREE.BoxGeometry(cabinetSize.x, cabinetSize.y, cabinetSize.z),
      glassMat
    );
    cabinetBox.position.copy(cabinetCenter);
    machineGroup.add(cabinetBox);

    const edges = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(cabinetSize.x, cabinetSize.y, cabinetSize.z)),
      edgeMat
    );
    edges.position.copy(cabinetCenter);
    machineGroup.add(edges);

    const floor = new THREE.Mesh(
      new THREE.BoxGeometry(9.6, 0.4, 9.6),
      new THREE.MeshStandardMaterial({ color: "#2a2a5a", roughness: 0.8, metalness: 0.1 })
    );
    floor.position.set(0, 0.5, 0);
    machineGroup.add(floor);

    const chute = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.6, 2.5),
      new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7, metalness: 0.3 })
    );
    chute.position.set(5, 1, 0);
    scene.add(chute);

    const railX = new THREE.Mesh(
      new THREE.BoxGeometry(8.2, 0.15, 0.15),
      new THREE.MeshStandardMaterial({ color: 0xb0b0b0, metalness: 0.7, roughness: 0.3 })
    );
    railX.position.set(0, 9.5, -4.2);
    scene.add(railX);

    const trolley = new THREE.Group();
    scene.add(trolley);
    trolley.position.set(0, 9.5, 0);

    const railZ = new THREE.Mesh(
      new THREE.BoxGeometry(0.15, 0.15, 8.2),
      new THREE.MeshStandardMaterial({ color: 0xc0c0c0, metalness: 0.7, roughness: 0.3 })
    );
    railZ.position.set(0, 0, 0);
    trolley.add(railZ);

    const trolleyBody = new THREE.Mesh(
      new THREE.BoxGeometry(0.6, 0.35, 0.6),
      new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.6, roughness: 0.35 })
    );
    trolleyBody.position.set(0, -0.15, 0);
    trolley.add(trolleyBody);

    const cable = new THREE.Mesh(
      new THREE.CylinderGeometry(0.04, 0.04, 0.5, 12),
      new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    trolley.add(cable);

    const clawRig = new THREE.Group();
    trolley.add(clawRig);

    const clawBase = new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 0.22, 0.18, 16),
      new THREE.MeshStandardMaterial({ color: 0xffd166, metalness: 0.5, roughness: 0.4 })
    );
    clawRig.add(clawBase);

    const fingerPivots = [];
    const fingerLength = 0.65;

    function createFinger(angleY) {
      const pivot = new THREE.Group();
      pivot.position.set(0, -0.1, 0);

      const arm = new THREE.Mesh(
        new THREE.BoxGeometry(0.12, fingerLength, 0.12),
        new THREE.MeshStandardMaterial({ color: 0xe0e0e0, metalness: 0.5, roughness: 0.4 })
      );
      arm.position.set(0, -fingerLength / 2, 0);

      const radial = 0.22;
      pivot.position.x = Math.cos(angleY) * radial;
      pivot.position.z = Math.sin(angleY) * radial;
      pivot.rotation.y = angleY;

      pivot.add(arm);
      clawRig.add(pivot);
      fingerPivots.push(pivot);
    }

    createFinger(0);
    createFinger((Math.PI * 2) / 3);
    createFinger((Math.PI * 4) / 3);

    let clawOpen = true;
    function setClawOpen(open) {
      clawOpen = open;
      const openAngle = -0.45;
      const closedAngle = -1.0;
      const angle = open ? openAngle : closedAngle;
      for (const p of fingerPivots) {
        p.rotation.x = angle;
      }
    }
    setClawOpen(true);

    let clawX = 0;
    let clawZ = 0;
    let clawY = 9.0;
    const minX = -4, maxX = 4;
    const minZ = -4, maxZ = 4;
    const topY = 9.0;
    const bottomY = 1.5;

    function updateClawTransform() {
      clawX = Number.isFinite(clawX) ? THREE.MathUtils.clamp(clawX, minX, maxX) : 0;
      clawZ = Number.isFinite(clawZ) ? THREE.MathUtils.clamp(clawZ, minZ, maxZ) : 0;
      clawY = Number.isFinite(clawY) ? THREE.MathUtils.clamp(clawY, bottomY, topY) : topY;

      trolley.position.x = clawX;
      trolley.position.z = clawZ;

      const cableLen = Math.max(0.1, topY - clawY);
      cable.geometry.dispose();
      cable.geometry = new THREE.CylinderGeometry(0.04, 0.04, cableLen, 12);
      cable.position.set(0, -cableLen / 2, 0);

      clawRig.position.set(0, -cableLen, 0);
    }

    updateClawTransform();

    const scoreDisplay = document.getElementById("score-display");
    const coinsDisplay = document.getElementById("coins-display");
    const clawPosDisplay = document.getElementById("claw-pos");
    const gameOverDisplay = document.getElementById("game-over");
    const startBtn = document.getElementById("start-btn");
    const dropBtn = document.getElementById("drop-btn");

    const keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false, ArrowDown: false };

    let gameStarted = false;
    let gameOver = false;
    let score = 0;
    let coins = 3;
    let totalDrops = 0;

    let clawState = "idle";
    let dropSequenceActive = false;
    let sequenceTimer = 0;
    let grabbedLantern = null;
    let lastMoveActive = false;

    const lanterns = [];
    let lanternTemplate = null;
    const loader = new GLTFLoader();

    function safeLanternSpawnPosition(existing = []) {
      let x = 0, z = 0;
      let tries = 0;
      do {
        x = THREE.MathUtils.randFloat(-3.6, 3.6);
        z = THREE.MathUtils.randFloat(-3.6, 3.6);
        tries++;
      } while (
        tries < 40 &&
        existing.some(p => Math.hypot(p.x - x, p.z - z) < 1.3)
      );
      return { x, z };
    }

    function createFallbackLantern() {
      const g = new THREE.Group();

      const body = new THREE.Mesh(
        new THREE.CylinderGeometry(0.28, 0.35, 0.7, 12),
        new THREE.MeshStandardMaterial({ color: 0xc08a2b, metalness: 0.5, roughness: 0.5 })
      );
      body.position.y = 0.45;
      g.add(body);

      const glow = new THREE.Mesh(
        new THREE.SphereGeometry(0.18, 16, 16),
        new THREE.MeshStandardMaterial({ color: 0xffdd88, emissive: 0xffcc55, emissiveIntensity: 0.8 })
      );
      glow.position.y = 0.45;
      g.add(glow);

      const top = new THREE.Mesh(
        new THREE.BoxGeometry(0.24, 0.12, 0.24),
        new THREE.MeshStandardMaterial({ color: 0x666666 })
      );
      top.position.y = 0.85;
      g.add(top);

      g.scale.setScalar(0.8);
      return g;
    }

    function placeLanterns() {
      const positions = [];
      for (let i = lanterns.length - 1; i >= 0; i--) {
        const l = lanterns[i];
        if (l.parent) l.parent.remove(l);
      }
      lanterns.length = 0;
      grabbedLantern = null;

      for (let i = 0; i < 5; i++) {
        const prize = lanternTemplate ? lanternTemplate.clone(true) : createFallbackLantern();
        const pos = safeLanternSpawnPosition(positions);
        positions.push(pos);

        prize.position.set(pos.x, 0.8, pos.z);
        prize.rotation.y = Math.random() * Math.PI * 2;
        prize.scale.setScalar(0.5);
        prize.userData.inMachine = true;
        scene.add(prize);
        lanterns.push(prize);
      }
    }

    loader.load(
      "Lantern.glb",
      (gltf) => {
        lanternTemplate = gltf.scene;
        lanternTemplate.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = false;
            obj.receiveShadow = false;
          }
        });
        placeLanterns();
      },
      undefined,
      () => {
        lanternTemplate = null;
        placeLanterns();
      }
    );

    function resetGame() {
      score = 0;
      coins = 3;
      totalDrops = 0;
      gameOver = false;
      gameStarted = false;
      dropSequenceActive = false;
      clawState = "idle";
      sequenceTimer = 0;
      grabbedLantern = null;
      clawX = 0;
      clawZ = 0;
      clawY = 9.0;
      setClawOpen(true);
      updateClawTransform();
      placeLanterns();

      startBtn.textContent = "INSERT COIN";
      startBtn.disabled = false;
      gameOverDisplay.style.display = "none";
      updateHUD();
    }

    function updateHUD() {
      scoreDisplay.textContent = `Score: ${score}`;
      coinsDisplay.textContent = `Coins: ${coins}`;
      clawPosDisplay.textContent = `X: ${clawX.toFixed(2)} Z: ${clawZ.toFixed(2)}`;
      gameOverDisplay.style.display = gameOver ? "block" : "none";
    }

    function grabCheck() {
      if (grabbedLantern) return;
      let candidate = null;
      let bestDist = Infinity;

      for (const lantern of lanterns) {
        if (!lantern.userData.inMachine) continue;
        const dx = lantern.position.x - clawX;
        const dz = lantern.position.z - clawZ;
        const dist = Math.hypot(dx, dz);
        if (dist <= 1.2 && dist < bestDist) {
          candidate = lantern;
          bestDist = dist;
        }
      }

      if (candidate) {
        grabbedLantern = candidate;
        candidate.userData.inMachine = false;
      }
    }

    function syncGrabbedLantern() {
      if (!grabbedLantern) return;
      grabbedLantern.position.set(clawX, clawY - 0.55, clawZ);
    }

    function releaseLantern() {
      if (!grabbedLantern) return;
      grabbedLantern.position.set(5, 1.2, 0);
      grabbedLantern.userData.inMachine = false;
      score += 1;
      grabbedLantern = null;
    }

    function canStartDrop() {
      return gameStarted && !gameOver && !dropSequenceActive && coins > 0;
    }

    function startDropSequence() {
      if (!canStartDrop()) return;
      coins -= 1;
      totalDrops += 1;
      dropSequenceActive = true;
      clawState = "descending";
      sequenceTimer = 0;
    }

    startBtn.addEventListener("click", () => {
      if (gameStarted) return;
      gameStarted = true;
      startBtn.textContent = "PLAYING";
      startBtn.disabled = true;
    });

    dropBtn.addEventListener("click", startDropSequence);

    window.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        startDropSequence();
      }
      if (e.key in keys) {
        keys[e.key] = true;
        e.preventDefault();
      }
      if (e.key.toLowerCase() === "r") {
        resetGame();
      }
    });

    window.addEventListener("keyup", (e) => {
      if (e.key in keys) {
        keys[e.key] = false;
        e.preventDefault();
      }
    });

    function updateMovement(dt) {
      if (!gameStarted || gameOver || dropSequenceActive) return;

      const speed = 3;
      let moved = false;

      if (keys.ArrowLeft) { clawX -= speed * dt; moved = true; }
      if (keys.ArrowRight) { clawX += speed * dt; moved = true; }
      if (keys.ArrowUp) { clawZ -= speed * dt; moved = true; }
      if (keys.ArrowDown) { clawZ += speed * dt; moved = true; }

      clawX = THREE.MathUtils.clamp(clawX, minX, maxX);
      clawZ = THREE.MathUtils.clamp(clawZ, minZ, maxZ);

      if (moved) {
        clawState = "moving";
      } else if (lastMoveActive) {
        clawState = "idle";
      }
      lastMoveActive = moved;
    }

    function updateDropSequence(dt) {
      if (!dropSequenceActive) return;

      const descendSpeed = 4;
      const ascendSpeed = 4;
      const deliverSpeed = 4;

      switch (clawState) {
        case "descending":
          clawY -= descendSpeed * dt;
          if (clawY <= bottomY) {
            clawY = bottomY;
            clawState = "grabbing";
            sequenceTimer = 0;
          }
          break;

        case "grabbing":
          sequenceTimer += dt;
          if (sequenceTimer < 0.2) {
            setClawOpen(false);
            grabCheck();
          } else {
            clawState = "ascending";
          }
          break;

        case "ascending":
          clawY += ascendSpeed * dt;
          if (clawY >= topY) {
            clawY = topY;
            clawState = "delivering";
          }
          break;

        case "delivering":
          const dx = 5 - clawX;
          const dz = 0 - clawZ;
          const dist = Math.hypot(dx, dz);

          if (dist > 0.02) {
            const step = Math.min(dist, deliverSpeed * dt);
            clawX += (dx / dist) * step;
            clawZ += (dz / dist) * step;
          } else {
            clawX = 5;
            clawZ = 0;
            clawState = "releasing";
            sequenceTimer = 0;
          }
          break;

        case "releasing":
          sequenceTimer += dt;
          setClawOpen(true);
          if (sequenceTimer > 0.15) {
            releaseLantern();
          }
          if (sequenceTimer > 0.45) {
            clawX = 0;
            clawZ = 0;
            clawState = "idle";
            dropSequenceActive = false;
            if (coins === 0) {
              gameOver = true;
            }
          }
          break;
      }
    }

    function sanitizeValues() {
      if (!Number.isFinite(clawX)) clawX = 0;
      if (!Number.isFinite(clawY)) clawY = topY;
      if (!Number.isFinite(clawZ)) clawZ = 0;
      clawX = THREE.MathUtils.clamp(clawX, Math.min(minX, 5), 5);
      clawZ = THREE.MathUtils.clamp(clawZ, minZ, maxZ);
      clawY = THREE.MathUtils.clamp(clawY, bottomY, topY);
    }

    window.__3D_STATE__ = {
      gameStarted: false,
      clawX: 0,
      clawZ: 0,
      clawY: 9,
      clawState: "idle",
      clawOpen: true,
      score: 0,
      coins: 3,
      gameOver: false,
      lanternsRemaining: 5,
      grabbedLantern: false,
      dropSequenceActive: false,
      totalDrops: 0,
      lanternPositions: []
    };

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      updateMovement(dt);
      updateDropSequence(dt);
      sanitizeValues();
      updateClawTransform();
      syncGrabbedLantern();
      updateHUD();

      const lanternPositions = lanterns
        .filter(l => l.userData.inMachine)
        .map(l => ({
          x: +l.position.x.toFixed(2),
          y: +l.position.y.toFixed(2),
          z: +l.position.z.toFixed(2)
        }));

      window.__3D_STATE__ = {
        gameStarted,
        clawX: +clawX.toFixed(2),
        clawZ: +clawZ.toFixed(2),
        clawY: +clawY.toFixed(2),
        clawState,
        clawOpen,
        score,
        coins,
        gameOver,
        lanternsRemaining: lanternPositions.length,
        grabbedLantern: !!grabbedLantern,
        dropSequenceActive,
        totalDrops,
        lanternPositions
      };

      renderer.render(scene, camera);
    }

    updateHUD();
    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
